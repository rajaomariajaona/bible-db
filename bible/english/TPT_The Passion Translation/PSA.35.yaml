  - type: usfm
    marker: s1
    children:
    - type: text
      text: Part One – David, a Warrior
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, fight for me! Harass the hecklers; accuse my accusers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fight those who fight against me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Everything inside of me will shout it out:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There’s no one like you, Lord!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For look at how you protect the weak and helpless
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the strong and heartless who oppress them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Part Two – David, a Witness
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are malicious men, hostile witnesses of wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rise up against me, accusers appearing out of nowhere.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I show them mercy, they bring me misery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m forsaken and forlorn, like a motherless child.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I even prayed over them when they were sick.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was burdened and bowed low with fasting
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and interceded for their healing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I didn’t stop praying.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I grieved for them, heavyhearted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as though they were my dearest family members
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or my good friends who were sick,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nearing death, needing prayer.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when I was the one who tripped up and stumbled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they came together to slander me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rejoicing in my time of trouble, tearing me to shreds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with their lies and betrayal.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These nameless ruffians,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mocking me like godless fools at a feast—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how they delight in throwing mud on my name.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, how long can you just stand there doing nothing?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now is the time to act.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from these brutal men,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am being torn to shreds by these beasts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who are out to get me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from their rage, their cruel grasp.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will praise you wherever I go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when everyone gathers for worship,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lift up your praise with a shout
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in front of the largest crowd I can find!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Part Three – David, a Worshiper
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let those who fight me for no reason be victorious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let them succeed, these heartless haters
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who come against me with their gloating sneers.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on your armor, Lord; take up your shield and protect me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rise up, mighty God! Grab your weapons of war
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and block the way of the wicked who come to fight me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stand for me when they stand against me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Speak over my soul: “I am your strong Savior!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word used here is found thirty-three times in the Psalms and clearly means “Savior.” Although a New Testament concept, David had a deep understanding almost one thousand years before the Savior was born that God would become his Savior. The Hebrew word for “Savior,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yasha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', is very similar to the name Jesus,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yeshua
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are the ones who would never seek peace as friends,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they are ever devising deceit against the innocent ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who mind their own business.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They open their mouths with ugly grins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gloating with glee over my every fault.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look,” they say, “we caught him red-handed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We saw him fall with our own eyes!”
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', my caring God, you have been there all along.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have seen their hypocrisy.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', don’t let them get away with this.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t walk away without doing something.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now is the time to awake! Rise up, Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vindicate me, my Lord and my God!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have every right to judge me, Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: according to your righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but don’t let them rejoice over me when I stumble.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them all be ashamed of themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: humiliated when they rejoice over my every blunder.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shame them, Lord, when they say, “We saw what he did.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now we have him right where we want him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s get him while he’s down!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them look ridiculous when they exalt themselves over me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they all be disgraced and dishonored!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But let all my true friends shout for joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all those who know and love what I do for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them all say, “The Lord is great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he delights in the prosperity of his servant.”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I won’t be able to hold it in—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: everyone will hear my joyous praises all day long!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness will be the theme of my glory-song of praise!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Humiliate those who seek my harm. Defeat them all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frustrate their plans to defeat me and drive them back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disgrace them all as they have devised their plans to disgrace me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blow them away like dust in the wind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the angel of Almighty God driving them back!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make the road in front of them nothing but slippery darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'with the angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' behind them, chasing them away!'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For though I did nothing wrong to them, they set a trap for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wanting me to fail and fall.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surprise them with your ambush, Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and catch them in the very trap they set for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be the ones to fail and fall into destruction!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then my fears will dissolve into limitless joy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my whole being will overflow with gladness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of your mighty deliverance.
