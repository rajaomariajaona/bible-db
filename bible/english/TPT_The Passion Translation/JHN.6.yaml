  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Holy Spirit is the one who gives life, that which is of the natural realm
  - type: text
    text: ' '
  - type: usfm
    marker: f
