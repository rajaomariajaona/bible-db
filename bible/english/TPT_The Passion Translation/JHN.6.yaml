  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The bread of God is the One who came out of heaven to give his life to feed the world.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Then please, sir, give us this bread every day,” they replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am the Bread of Life.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “I am the living God, the Bread of Life.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Come every day to me and you will never be hungry. Believe in me and you will never be thirsty.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yet I’ve told you that even though you’ve seen me, you still don’t believe in me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But everyone my Father has given to me, they will come. And all who come to me, I will embrace and will never turn them away.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And I have come out of heaven not for my own desires, but for the satisfaction
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of my Father who sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My Father who sent me has determined that I will not lose even one of those he has given to me, and I will raise them up in the last day.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the longing of my Father is that everyone who embraces the Son
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sees the Son.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and believes in him will experience eternal life and I will raise them up in the last day!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'When the Jews who were hostile to Jesus heard him say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am the Bread that came down from heaven,”
  - type: text
    text: ' they immediately began to complain, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: “How can he say these things about himself? We know him, and we know his parents. How dare he say, ‘I have come down from heaven?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stop your grumbling!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The only way people come to me is by the Father who sent me—he pulls
  - type: text
    text: ' '
