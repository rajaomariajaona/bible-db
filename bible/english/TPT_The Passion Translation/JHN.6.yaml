    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:63
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “the body.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is of no help. The words I speak to you are Spirit and life. But there are still some of you who won’t believe.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: In fact, Jesus already knew from the beginning who the skeptics were and who his traitor would be.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'He went on to say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is why I told you that no one embraces me unless the Father has given you to me.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Confession of Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'And so from that time on many of the disciples turned their backs on Jesus and refused to be associated with him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:66
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus went from feeding five thousand to offending five thousand. They wanted him to feed them, but didn’t want Jesus alone to be their feast.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'So Jesus said to his twelve, '
  - type: usfm
