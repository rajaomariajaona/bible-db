        text: As translated from the Aramaic. Although many Greek scholars believe this is borrowed from the Synoptic Gospels, and is found in variant forms in Greek texts, the Aramaic and many Greek manuscripts have “You are the Christ, the Son of the living God.”
    marker-yv: yv-n
  - type: text
    text: and we believe in you!”
- type: usfm
  marker: p
  children:
