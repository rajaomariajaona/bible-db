    - type: text
      text: '4'
  - type: text
    text: 'Now it was approaching the time of the Jewish celebration of Passover, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and there were many pilgrims on their way to Jerusalem in the crowd
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'As Jesus sat down, he looked out and saw the massive crowd of people scrambling up the hill, for they wanted to be near him. So he turned to Philip and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Where will we buy enough food to feed all these people?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Now Jesus already knew what he was about to do, but he said this to stretch Philip’s faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Philip answered, “Well, I suppose if we were to give everyone only a snack, it would cost thousands of dollars '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “two hundred pieces of silver.” This equates to about eight months’ wages of the average person. Philip didn’t answer the question and was focused on how much money it would cost, but Jesus’ question was, “Where will we buy bread?” Jesus was testing Philip to see if he would look to Jesus to supply all that was needed and not consider their limited resources.
    marker-yv: yv-n
  - type: text
    text: to buy enough food!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
