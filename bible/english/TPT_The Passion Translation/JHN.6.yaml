      - type: text
        text: 6:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When tempted by the devil, Jesus refused to turn stones into bread to satisfy his own hunger. Yet here Jesus multiplied bread to satisfy the hunger of others. Philip was hoping to give each one a little to eat, but Jesus’ supply is always abundant to satisfy the hunger of all.
    marker-yv: yv-n
