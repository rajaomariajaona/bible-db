    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And a massive crowd of people followed him everywhere. They were attracted by his miracles and the healings they watched him perform. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus went up the slope of a hill and sat down with his disciples. '
  - type: usfm
    marker: vlbl
