    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Iscariot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
