    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word is “drag” or “pull by force.” The name Moses means “pulled” (from the Nile). The Aramaic is “ransom” or “save.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on their hearts to embrace me. And those who are drawn to me, I will certainly raise them up in the last day.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jesus continued, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It has been written by the prophets, ‘They will all be taught by God himself.’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 54:13
      metadata:
        usfm: ISA.54.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 31:34
      metadata:
        usfm: JER.31.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you are really listening to the Father and learning directly from him, you will come to me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I am the only One who has come from the Father’s side, and I have seen the Father!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I speak to you living truth: Unite your heart to me and believe—and you will experience eternal life!'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the true Bread of Life.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:48
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although not found in the Greek text, there are some Aramaic manuscripts that have “I am the living God, the Bread of Life.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your ancestors ate manna in the desert and died.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But standing here before you is the true Bread that comes out of heaven, and when you eat this Bread you will never die.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I alone am this living Bread that has come to you from heaven. Eat this Bread and you will live forever. The living Bread I give you is my body, which I will offer as a sacrifice so that all may live.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: These words of Jesus sparked an angry outburst among the Jews. They protested, saying, “Does this man expect us to eat his body?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Jesus replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen to this eternal truth: Unless you eat the body of the Son of Man and drink his blood, you will not have eternal life.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Eternal life comes to the one who eats my body
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:54
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: To eat his flesh is to take into our life by faith all that Jesus did for us by giving his body for us. To drink his blood is to take by faith all that the blood of Jesus has purchased for us. This “eating” and “drinking” is receiving the life, power, and virtue of all that Jesus is to replace all that we were in Adam. Jesus’ blood and body is the Tree of Life, which is offered to everyone who follows him.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and drinks my blood, and I will raise him up in the last day.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For my body is real food for your spirit and my blood is real drink.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one who eats my body and drinks my blood lives in me and I live in him.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:56
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “He that eats my body and drinks my blood is strengthened in me and I in him.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Father of life sent me, and he is my life. In the same way, the one who feeds upon me, I will become his life.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am not like the bread your ancestors ate and later died. I am the living Bread that comes from heaven. Eat this Bread and you will live forever!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Jesus preached this sermon in the synagogue in Capernaum.
