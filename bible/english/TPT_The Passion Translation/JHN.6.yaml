    - type: usfm
      marker: ft
      children:
      - type: text
        text: The number five thousand would have likely been only the number of men in the crowd. Jesus had everyone sit down. To receive bread from Jesus, the Source, doesn’t require that you stand and work hard for it, you simply sit down and rest to be fed the living bread.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
