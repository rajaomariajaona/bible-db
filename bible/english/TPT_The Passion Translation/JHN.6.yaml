  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Peter spoke up and said, “But Lord, where would we go? No one but you gives us the revelation of eternal life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'We’re fully convinced that you are the Anointed One, the Son of the Living God, '
