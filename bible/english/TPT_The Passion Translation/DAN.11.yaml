  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The king’s sons will prepare for war, assembling a powerful group of warriors. One of his sons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Antiochus III the Great (223–187 BC).
      marker-yv: yv-n
    - type: text
      text: 'will swiftly advance, sweeping over the land like a powerful flood. Their armies will press forward and fight '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew text has a string of five consecutive verbs that when literally translated read: “It will come on to come on and will overflow and will pass along and will turn and will do battle.” A literal translation would bring little or no understanding to today’s English reader.'
      marker-yv: yv-n
    - type: text
      text: all the way to the strong, walled fortress of the king of Egypt.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Then the king of Egypt will fly into a rage and set out to launch an offensive against the king of Syria, who will have an immense army on his side. However, the king of Egypt will conquer the Syrian forces. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This battle may refer to the battle at Raphia, where Ptolemy IV (king of Egypt) fought Antiochus III in 217 BC and defeated his immense army. (See Edwyn Bevan,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The House of Seleucus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vol. 1 [London: Edward Arnold Publisher, 1902], 318–20.) It was recorded that Ptolemy had “seventy thousand infantry, five thousand horses, and seventy-three elephants,” whereas Antiochus III’s forces numbered “sixty-two thousand infantry, six thousand cavalry, and a hundred and two elephants.” Antiochus III was defeated and lost some seventeen thousand men. (See Polybius,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Histories
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 5.79;'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 3 Macc. 1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The king of Egypt will be filled with pride over his victory and of the many tens of thousands of soldiers he slaughtered, but he will not continue to be victorious.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Then the king of Syria will recruit an even larger army than before, and after some years, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, twelve years later.
      marker-yv: yv-n
    - type: text
      text: 'he will advance a second time with a massive army, fully equipped '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with weapons and supplies
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Once more, Antiochus III advanced to battle the Egyptians and pushed his way through the land of Israel all the way to the fortress city of Gaza, which fell in 201 BC.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“At that time, many will take up arms against the king of Egypt. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is likely a reference to Ptolemy V Epiphanes, who was only six years old when he became king after the mysterious death of Ptolemy IV Philopator. (See Polybius,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Histories
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 15.25.3–18.) The Syrian king knew that Egypt was being ruled by a child and took his opportunity to launch his attack against the weakened Egyptian kingdom. The people of Judea were caught in between these battles between Ptolemaic rulers and the Seleucids (Syrians). The decisive battle between the kingdom of Egypt, led by the Egyptian general Scopas, and the forces of the kingdom of Syria was fought at Banas (later renamed Caesarea Philippi) in 200 BC. The Syrians ultimately defeated the Egyptians, which meant that Judea then came under Seleucid control. (See Edouard Will,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Histoire politique du mond hellénistique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', vol. 2 [Paris: Seuil, 2003], 102.) It was then that the Jews made a pact with Antiochus III with the hope of eventually gaining independence.'
      marker-yv: yv-n
    - type: text
      text: 'Renegades from among your own people '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, pro-Syrian Jews.
      marker-yv: yv-n
    - type: text
      text: 'will rebel in the hope of realizing the vision; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew text is obscure and differs greatly from the Old Greek, which reads: “And in those times plots shall rise up against the king of Egypt, and he shall rebuild the ruins of your people, and he shall stand up in order to realize the prophecy, and they shall stumble.”'
      marker-yv: yv-n
    - type: text
      text: 'but they will fail. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the king of Syria will advance and build up siege-ramps to capture a strongly fortified city. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Sidon.
      marker-yv: yv-n
    - type: text
      text: 'The Egyptian forces will not stand their ground; even their elite troops will not be strong enough to resist. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: invading king of Syria
    - type: text
      text: ' will do as he pleases, and no one will be able to resist him. He will occupy the land of splendor, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the land of Israel. See “beautiful land” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; “glorious land” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and all of it will be under his control.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “destruction is in his hand.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“Then, with the might of his entire kingdom, he will resolve to conquer Egypt by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cunningly
    - type: text
      text: ' making a peace treaty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to do what is upright.” The point here is that the king of the north wants to utilize the ruse of a “peace treaty” as a means of deceiving the king of the south.
      marker-yv: yv-n
    - type: text
      text: 'with the king of Egypt. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “and upright ones with him and he will do,” which makes little sense. The Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: 'The king of Syria will offer one of his daughters in marriage to the king of Egypt in order to defeat his kingdom, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to defeat it [or her].”
      marker-yv: yv-n
    - type: text
      text: 'but his plan will fall apart and will not work to his advantage. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse is a reference to the marriage of the daughter of the Syrian king Antiochus III to the Egyptian king Ptolemy V. The daughter’s name was Cleopatra, who was given in marriage to Ptolemy in 193 BC. The Syrian king was planning to use this “alliance” to eventually overthrow the Egyptian dynasty, but Cleopatra took the side of her husband against her father.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The king of Syria will next turn to the coastlands and capture many cities, but a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foreign
    - type: text
      text: ' commander '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a Roman consul (commander). This verse is likely a reference to the incursion of Antiochus III along the coast of Asia Minor and Greece. The Roman Consul Lucius Cornelius Scipio stopped his advance and defeated Antiochus III’s army of eighty thousand in 190 BC at Thermopylae and Magnesia. The details of the prophecies in this chapter are astounding in their accuracy.
      marker-yv: yv-n
    - type: text
      text: will put a stop to his arrogance and make him suffer the consequences of his defiant insolence.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew text of this last clause is uncertain.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '“He will then retreat to the well protected fortresses of his own country. In time, he will be defeated, lose his grip on power, and disappear. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: History records that Antiochus III, defeated by the Roman commander, was subjected to paying an enormous tax to Rome. After returning to his homeland (Syria), he tried to destroy the temple of the gods, which infuriated his citizens. Due to a plot hatched by the people and carried out by his prime minister, Heliodorus, they assassinated Antiochus III in 187 BC.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“I will now reveal the truth to you: '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the overarching lessons of Daniel, and of this chapter in particular, is that God rules over the kingdoms of this world. His knowledge of the future spans the ages; he alone can tell us things that will take place centuries in the future. The course of history is determined by God, not by kings, presidents, councils, alliances, nor by any other person. Nations and kingdoms rise and fall, but the plan of the ages is determined by God alone.
      marker-yv: yv-n
    - type: text
      text: 'Three more kings will rise to power in Persia; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These three kings of Persia after the reign of Cyrus were Cambyses, Smerdis, and Darius I.
      marker-yv: yv-n
    - type: text
      text: 'a fourth will come who will be much richer than all the others. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This fourth is Xerxes I, who reigned approximately 486–465 BC.
      marker-yv: yv-n
    - type: text
      text: 'His great wealth will cause his power to grow until his empire wages war against all the kingdoms of Greece. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'His successor will send out a tax collector to maintain the wealth of his kingdom. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “one sending over an exactor of splendor of kingdom.” The meaning of the Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: 'In a short time, however, the king will die, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the sons of Antiochus III, Seleucus IV, succeeded his father to the throne of Syria. He sent his finance minister, Heliodorus, to Jerusalem to seize the temple treasure. But Heliodorus failed in his attempt, and he eventually assassinated King Seleucus IV.
      marker-yv: yv-n
    - type: text
      text: though not in the heat of battle.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Syria’s Evil King
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: it
      children:
      - type: text
        text: The man in white linen continued
    - type: text
      text: ': “In his place will rise a despised usurper of the throne, who had no claim to royal status. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a reference to Antiochus IV Epiphanes, who ruled approximately 175–164 BC.
      marker-yv: yv-n
    - type: text
      text: 'He will attack the kingdom when the people least suspect it, and he will seize the kingdom through deceit. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “flatteries,” “intrigue,” “trickery,” or “fraud.” The rightful heir to the throne was the son of Seleucus IV, named Demetrius, but his brother Antiochus IV seized it when his brother was assassinated. Later, Antiochus IV took the name of Epiphanes, which means “God manifest.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'He will totally sweep away every opposing army that stands before him and crush them. He will even kill the high priest '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the prince of the covenant.” Hebrew will occasionally use the word for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: prince
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in reference to the high priest. In 171 BC, Antiochus IV Epiphanes ordered the assassination of Onias III, the Jewish high priest.
      marker-yv: yv-n
    - type: text
      text: 'of the covenant. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
