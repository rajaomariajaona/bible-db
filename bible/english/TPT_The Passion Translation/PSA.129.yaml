document_id: PSA.129,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Persecuted But Not Defeated
  - type: text
    content: A song of the stairway
  - type: text
    content: Let all Israel admit it.
  - type: text
    content: From our very beginning we have been persecuted by the nations.
  '2':
  - type: text
    content: And from our very beginning
  - type: text
    content: we have faced never-ending discrimination.
  - type: text
    content: Nevertheless, our enemies have not defeated us. We’re still here!
  '3':
  - type: text
    content: They have hurt us more than can be expressed,
  - type: text
    content: ripping us to shreds, cutting deeply into our souls.
  '4':
  - type: text
    content: But no matter what, the Lord is good to us.
  - type: text
    content: He is a righteous God who stood to defend us,
  - type: text
    content: breaking the chains of the evil ones that bound us.
  '5':
  - type: text
    content: May all who hate the Jews
  - type: text
    content: fall back in disgrace to a shameful defeat!
  '6':
  - type: text
    content: Let them be like grass planted in shallow soil
  - type: text
    content: that soon withers with no sustenance.
  '7':
  - type: text
    content: Let them be like weeds ignored by the reaper
  - type: text
    content: and worthless to the harvester.
  '8':
  - type: text
    content: Let no one who sees them say,
  - type: text
    content: '“May the blessings of '
  - type: text
    content: Yahweh
  - type: text
    content: ' be upon your life.'
  - type: text
    content: May the Lord bless you.”
  - type: note
    content: In the Jewish culture, if you passed by one who was harvesting his crops, you would shout out, “The Lord bless you!”
