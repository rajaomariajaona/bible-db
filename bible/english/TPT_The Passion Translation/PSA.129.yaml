document_id: PSA.129,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Persecuted But Not Defeated
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all Israel admit it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From our very beginning we have been persecuted by the nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from our very beginning
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we have faced never-ending discrimination.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nevertheless, our enemies have not defeated us. We’re still here!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have hurt us more than can be expressed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ripping us to shreds, cutting deeply into our souls.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But no matter what, the Lord is good to us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is a righteous God who stood to defend us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breaking the chains of the evil ones that bound us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May all who hate the Jews
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fall back in disgrace to a shameful defeat!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be like grass planted in shallow soil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that soon withers with no sustenance.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be like weeds ignored by the reaper
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and worthless to the harvester.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let no one who sees them say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“May the blessings of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' be upon your life.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the Lord bless you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 129:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Jewish culture, if you passed by one who was harvesting his crops, you would shout out, “The Lord bless you!”
      marker-yv: yv-n
