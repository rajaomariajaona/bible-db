document_id: PSA.133,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Unity
  - type: text
    content: A song of the stairway by King David
  - type: text
    content: How truly wonderful and delightful it is
  - type: text
    content: to see brothers and sisters living together in sweet unity!
  - type: note
    content: This specifically speaks to the tribes of Israel that live in harmony, but it also applies to believers today. Nothing can be sweeter than the love of Christ we share with one another.
  '2':
  - type: text
    content: It’s as precious as the sacred scented oil
  - type: text
    content: flowing from the head of the high priest Aaron,
  - type: text
    content: dripping down upon his beard and running all the way down
  - type: text
    content: to the hem of his priestly robes.
  - type: note
    content: Or “running down the collar of his robe.”
  '3':
  - type: text
    content: This harmony can be compared to the dew
  - type: text
    content: dripping from Mount Hermon,
  - type: text
    content: which flows down upon the hills of Zion.
  - type: text
    content: 'Indeed, that is where '
  - type: text
    content: Yahweh
  - type: text
    content: ' has decreed his blessings'
  - type: text
    content: will be found, the promise of life forevermore!
