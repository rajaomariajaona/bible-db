document_id: PSA.133,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Unity
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway by King David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How truly wonderful and delightful it is
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to see brothers and sisters living together in sweet unity!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 133:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This specifically speaks to the tribes of Israel that live in harmony, but it also applies to believers today. Nothing can be sweeter than the love of Christ we share with one another.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s as precious as the sacred scented oil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: flowing from the head of the high priest Aaron,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dripping down upon his beard and running all the way down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the hem of his priestly robes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 133:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “running down the collar of his robe.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This harmony can be compared to the dew
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dripping from Mount Hermon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which flows down upon the hills of Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indeed, that is where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has decreed his blessings'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be found, the promise of life forevermore!
