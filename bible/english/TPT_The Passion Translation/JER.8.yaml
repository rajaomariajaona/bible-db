  - type: heading
    content: Jeremiah’s Description of Their Sin
  '6':
  - type: text
    content: I have listened carefully to what they say,
  - type: text
    content: but nothing they say is right.
  - type: text
    content: No one is sorry about his sin,
  - type: text
    content: saying, “What have I done wrong?”
  - type: text
    content: Everyone keeps on going his own way,
  - type: text
    content: like a war-horse plunging headlong into battle.
  - type: heading
    content: Yahweh Warns Those Who Mislead Others
  '7':
  - type: text
    content: '“Even the stork '
  - type: note
    content: The stork is seen by some as a symbol of godliness and kindness, being known for its love and care for its offspring. The Hebrew word for “stork” shares a root word with the word for “loving-kindness” (Hb. chesed).
  - type: text
    content: in the skies
  - type: text
    content: 'knows her season '
  - type: text
    content: of migration
  - type: text
    content: .
  - type: text
    content: And migratory birds
  - type: text
    content: '—the turtledove, '
  - type: note
    content: The dove is the most mentioned bird in the Bible. The sound of the turtledove signals a change of season, appearing in Israel in early spring. See Song. 2:12. Turtledoves have no bile and they mate for life; during their life together, they cooperate in nest-building labor and in raising their young. These habits make them beautiful symbols of love and faithfulness. Two turtledoves could be a replacement for a lamb sacrifice (see Lev. 12:8). Mary and Joseph offered two turtledoves in Jerusalem at Christ’s birth (see Luke 2:22–24).
  - type: text
    content: 'the swallow, '
  - type: note
    content: The swallow is noted for its grace and swiftness of flight. It appears suddenly every spring and has been recognized by the early church as a symbol of the resurrection of Christ. The swallow is also known as “the bird of freedom,” for it is next to impossible to catch and keep in captivity. See Ps. 84:3; Isa. 38:14.
  - type: text
    content: 'and the crane '
  - type: note
    content: The crane is a bird recognized in the Near East as a “sentinel bird,” for they take turns at night watching for intruding enemies.
  - type: text
    content: —
  - type: text
    content: instinctively take flight
  - type: text
    content: according to the times I have set for them,
  - type: text
    content: but my people pay no attention
  - type: text
    content: 'to the orders '
  - type: note
    content: Or “rules,” “ordinances,” “regulations,” or “instructions.” Yahweh was saying, “Dumb birds obey what I set in place for them, but my ‘wise’ people do not.” The birds don’t even have a direct instruction; they instinctively follow God’s orders. But the people have the explicit instructions through the law and are still more disobedient than the birds.
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '8':
  - type: text
    content: How dare you say, ‘We are wise,
  - type: text
    content: 'because we have the law of '
  - type: text
    content: Yahweh
  - type: text
    content: ?’
  - type: note
    content: 'Luther translated this clause: “and [we] have the Holy Scriptures before us [und haben die heilige Schrift vor uns].”'
  - type: text
    content: Look! The scribes teach lies about the law.
  - type: note
    content: There is a misconception that the scribes were only copyists of the sacred text. However, the scribes (Hb. soperim) were more than mere copyists. They transmitted the truth of God and likely had a teaching influence among the people. Both Jeremiah and Jesus warned us about the teaching of the scribes. By the time of the New Testament, the scribes had become the go-to people to discuss the nuances of the Tanakh (Old Testament). The scribes are mentioned as the “teachers” or “scholars” of the law (see Mark 1:22); they were rabbis and official leaders of the people, along with the Pharisees. They had become the religious scholars of their day. Jesus taught very much unlike the scribes (see Matt. 7:28–29).
  - type: text
    content: They have made the law itself into a lie!
  - type: note
    content: 'Or “Behold, the lying pen of the scribes!” The scribes “claimed to be the legitimate interpreters” of the written law. “Their confidence in the written page prevented them from accepting the word of Yahweh spoken through the prophets” (see John A. Thompson, The Book of Jeremiah, The New International Commentary on the Old Testament, [Grand Rapids, MI: Eerdmans, 1980]). Scholarship is a gift, but like all gifts, it can be misused. Jesus repeatedly warned his followers to beware of the “experts of the law” (scribes; Luke 20:41 and footnote) who had distorted God’s Word to fit their desires. He compared their teachings, along with that of the Pharisees, to leaven (or “yeast”; Matt. 16:5–12; Mark 8:14–21; Luke 12:1). See Mark 12:38–40; Luke 20:45–47.'
  '9':
  - type: text
    content: The know-it-alls will be shamed, terrorized, and trapped.
  - type: text
    content: 'They walked away from the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: so wisdom walked away from them.
