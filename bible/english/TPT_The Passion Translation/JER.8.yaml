  - type: heading
    content: Jeremiah’s Heart Is Crushed
  '18':
  - type: text
    content: My joy has vanished,
  - type: note
    content: Or “my brightness [shining] has vanished.” The Hebrew text is somewhat problematic and uncertain. Many translations, starting with Jerome and including the Septuagint, render this “My grief [weeping] is incurable.”
  - type: text
    content: grief grips my soul,
  - type: text
    content: and I am sick at heart.
  '19':
  - type: text
    content: 'Listen! '
  - type: text
    content: I hear
  - type: text
    content: ' my beloved people'
  - type: note
    content: Or “I hear the daughter of my people.”
  - type: text
    content: 'crying out in despair throughout the land:'
  - type: note
    content: Or “from a distant land” (i.e., from their place of exile).
  - type: text
    content: '“Is '
  - type: text
    content: Yahweh
  - type: text
    content: ' no longer in Zion?'
  - type: text
    content: Is her King not dwelling within her?”
  - type: text
    content: “So why have they provoked me to anger with their carved images
  - type: text
