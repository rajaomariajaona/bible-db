  '2':
  - type: text
    content: 'They will spread them out before the sun and the moon and all the stars of heaven, which they loved and served. They went after cosmic powers, inquired of them, bowed down before them in adoration, and worshiped them. '
  - type: text
    content: Because they did these things
  - type: text
    content: ', their bones will not be buried but will become fertilizer for the ground. '
  - type: note
    content: Or “dung on the ground.” This was fulfilled during the destruction of Jerusalem by the Babylonians. See Jer. 39:1–18; 2 Kings 25:1–26; 2 Baruch 2:24.
  '20':
  - type: text
    content: “Summer has ended,
  - type: text
    content: the harvest is past,
  - type: text
    content: and still we are not saved!”
  '21':
  - type: text
    content: I am broken over the brokenness of my dear people.
  - type: note
    content: Jeremiah fully identified with the suffering of his people. True prophetic ministry enters into the emotional life of God’s people and is able to “celebrate with those who celebrate, and weep with those who grieve” (Rom. 12:15).
  - type: text
    content: 'I mourn '
  - type: note
    content: Or “I am dark,” a figure of speech for wearing the dark clothes of mourning and grief.
  - type: text
    content: all day long
  - type: text
    content: .
  - type: text
    content: Horror has gripped me.
  '22':
  - type: text
    content: 'Is there no healer '
  - type: note
    content: Biblical Hebrew has no noun for a doctor, only for a healer. Jeremiah’s two questions were meant to be answered with a yes. We do have a healer named Jesus, whose love and mercy become a soothing ointment to our souls.
  - type: text
    content: in Gilead?
  - type: text
    content: 'Is there no medicine '
  - type: note
    content: 'Or “balm” (Hb. tsori). It is likely a reference to a resin harvested from the balsam tree, much like maple syrup taken from the maple tree. Balm was known as a fragrant, soothing medicine, and balm from Gilead was presumably known for its superior quality. It was traded by merchants and used as gifts (see Gen. 43:11; Ezek. 27:17). Recent excavations at both En Gedi and Qumran have uncovered small clay jugs dating back to Jeremiah’s time, which are thought to have contained balm (see Philip J. King, Jeremiah: An Archaeological Companion [Louisville, KY: Westminster John Knox Press, 1993], 113, 153–54).'
  - type: text
    content: there?
  - type: text
    content: Why then have the people I love not been healed?
  - type: note
    content: Or “So why has new skin [flesh] not arisen [over the wound] of the daughter of my people?”
  '3':
  - type: text
    content: 'However, I will leave some of these evil people alive and banish them to other places. Yet all the survivors will prefer death over life. '
  - type: note
    content: In other words, it will be even worse for the survivors who are taken in captivity and scattered abroad. See Deut. 28:64–68; 30:19–20; Lam. 4:9.
  - type: text
    content: 'For I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have spoken.”'
  - type: heading
    content: Stubbornness of Heart
  '4':
  - type: text
    content: “
  - type: text
    content: Jeremiah
  - type: text
    content: ', say to the people, ‘'
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Don’t people get back up when they fall down?
  - type: note
    content: God was reminding them that they still could repent and come back to him, for no matter how far people have fallen and strayed from God, mercy triumphs over judgment.
  - type: text
    content: Don’t they turn around when they take the wrong road?
  '5':
  - type: text
    content: So why have you, the people of Jerusalem,
  - type: text
    content: continually refused to turn back to me?
  - type: text
    content: Why do you cling so tightly to your deception
  - type: note
