  - type: heading
    content: The Remedy Forsaken
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “I will surely make an end of them.
  - type: text
    content: There will be neither cluster on the vine
  - type: text
    content: nor figs on the fig trees—
  - type: text
    content: even the leaves have withered.
  - type: note
    content: The day after entering triumphantly into Jerusalem, Jesus cursed a fig tree, and it withered. This was, in part, a sign to Jerusalem, taken from this passage in Jeremiah, that they were like the generation of Jeremiah’s day. It was a sign to them that their end was near. See Matt. 21:1–21.
  - type: text
