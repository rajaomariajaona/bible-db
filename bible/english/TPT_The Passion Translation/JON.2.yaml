      - type: text
        text: 'The Assyrians (of whose empire Nineveh was the capital) worshiped Dagon. Dagon was supposed to be their lord of lords, and in the coast cities, he was a fish. So, picture this: you’re a Ninevite on the coast, and your god is a giant fish, and here comes a giant fish that vomits out a man with a message from God.'
