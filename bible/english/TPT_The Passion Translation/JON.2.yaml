document_id: JON.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jonah’s Prayer
  - type: text
    content: 'This is Jonah’s prayer to '
  - type: text
    content: Yahweh
  - type: text
    content: ', his God, from out of the '
  - type: text
    content: darkness
  - type: text
    content: ' inside the huge fish:'
  '10':
  - type: text
    content: 'So '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to the fish, and it vomited Jonah onto the dry land.'
  - type: note
    content: 'The Assyrians (of whose empire Nineveh was the capital) worshiped Dagon. Dagon was supposed to be their lord of lords, and in the coast cities, he was a fish. So, picture this: you’re a Ninevite on the coast, and your god is a giant fish, and here comes a giant fish that vomits out a man with a message from God.'
  '2':
  - type: text
    content: '“I called out to '
  - type: text
    content: Yahweh
  - type: text
    content: ' from a place of total desperation'
  - type: text
    content: and he answered me.
  - type: text
    content: 'From inside the belly of Sheol '
  - type: note
    content: Sheol was known as the underworld, the realm of the dead (see Job 7:9–10; Ps. 141:7; Isa. 5:14; 38:17–18). This is possibly proof that Jonah, indeed, died inside the fish and was resurrected three days later.
  - type: text
    content: I cried out,
  - type: text
    content: and you heard my voice.
  '3':
  - type: text
    content: The waters closed in all around me;
  - type: text
    content: all your mighty waves and currents
  - type: text
    content: crashed over me.
  - type: note
    content: See Ps. 42:7.
  - type: text
    content: For you cast me into the deep,
  - type: text
    content: and I sank down to the bottom of the sea.
  - type: note
    content: Or “heart of the sea.”
  '4':
  - type: text
    content: 'I actually assumed '
  - type: note
    content: Although the primary translation of the Hebrew verb ʾamar in the Qal form is “to say,” it can also mean “to think to oneself,” “to imagine,” or even “it crossed my mind.”
  - type: text
    content: that you had banished me from your sight.
  - type: note
    content: See Isa. 38:11.
  - type: text
    content: Yet, I know that I will one day gaze again upon your holy temple.
  - type: note
    content: Or, if a conjectural statement (as per Theodotion), “How will I ever see your holy temple again?”
  '5':
  - type: text
    content: The waters rose to choke me to death.
  - type: text
    content: The sea was closing in around me—
  - type: text
    content: seaweed tightened around my head.
  '6':
  - type: text
    content: I sank down into the abyss,
  - type: text
    content: to the roots of the mountains,
  - type: text
    content: where the barred gates of that realm would lock me in forever.
  - type: note
    content: See Rev. 1:18.
  - type: text
    content: 'But you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', are my God;'
  - type: text
    content: you raised my life from the pit.
  - type: note
    content: Or “grave.” The term here literally refers to a “pit” (Hb. shachat), but in this context, it functions as a synonym for Sheol (see v. 2).
  '7':
  - type: text
    content: When my life was ebbing away,
  - type: text
    content: my thoughts turned toward you.
  - type: text
    content: My cries rose before you in your holy, heavenly temple,
  - type: note
    content: See Ps. 11:4.
  - type: text
    content: 'and '
  - type: text
    content: my prayer entered your heart
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '8':
  - type: text
    content: It’s true
  - type: text
    content: —some abandon faithful love to you
  - type: text
    content: by worshiping worthless idols.
  '9':
  - type: text
    content: But I will sing songs of praise and
  - type: text
    content: offer my sacrifices to you.
  - type: text
    content: 'I will keep every vow I’ve made to you, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'for salvation comes '
  - type: text
    content: only
  - type: text
    content: ' from you.”'
