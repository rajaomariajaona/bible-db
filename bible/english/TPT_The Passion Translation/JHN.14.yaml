    content: Jesus Comforts His Disciples
  - type: text
    content: “Don’t worry or surrender to your fear.
  - type: text
    content: ' '
  - type: note
    content: Or “Don’t let your hearts be distressed.” The Aramaic is translated “Let not your heart flutter.”
  - type: text
    content: For you’ve believed in God, now trust and believe in me also.
  - type: text
    content: ' '
  - type: note
    content: Or “Believe in God and believe in me.”
  '10':
  - type: text
    content: Don’t you believe that the Father is living in me and that I am living in the Father? Even my words are not my own but come from my Father, for he lives in me and performs his miracles of power through me.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Believe that I live as one with my Father and that my Father lives as one with me—or at least, believe because of the mighty miracles I have done.
  '12':
  - type: text
    content: '“I tell you this timeless truth: The person who follows me in faith, believing in me, will do the same mighty miracles that I do—even greater miracles than these because I go to be with my Father!'
  - type: text
    content: ' '
  '13':
  - type: text
    content: For I will do whatever you ask me to do when you ask me in my name. And that is how the Son will show what the Father is really like and bring glory to him.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Ask me anything in my name, and I will do it for you!”
  - type: heading
    content: Jesus Prophesies about the Holy Spirit
  '15':
  - type: text
    content: “Loving me empowers you to obey my commands.
  - type: text
    content: ' '
  - type: note
    content: Love for Christ is proven and demonstrated by our obedience to all that he says.
  '16':
  - type: text
    content: And I will ask the Father and he will give you another
  - type: text
    content: ' '
  - type: note
    content: The Greek word allos means “another of the same kind.” As Jesus is the Savior from the guilt of sin, the Holy Spirit is the Savior who saves us from the power of sin by living through us in fullness.
  - type: text
    content: Savior,
  - type: text
    content: ' '
  - type: note
    content: 'The Greek word used here is paráklētos, a technical word that could be translated “defense attorney.” It means “one called to stand next to you as a helper.” Various translations have rendered this “Counselor,” “Comforter,” “Advocate,” “Encourager,” “Intercessor,” or “Helper.” However none of these words alone are adequate and fall short in explaining the full meaning. This translation has chosen the word Savior, for it depicts the role of the Holy Spirit to protect, defend, and save us from our self and our enemies and keep us whole and healed. He is the One who guides and defends, comforts and consoles. Keep in mind that the Holy Spirit is the Spirit of Christ, our Savior. The Aramaic word is paraqleta, which is taken from two root words: (1) praq, “to end, finish, or to save,” and (2) lyta, which means “the curse.” What a beautiful word picture: the Holy Spirit comes to end the work of the curse (of sin) in our lives and to save us from its every effect! Paraqleta means “a redeemer who ends the curse.” (See Strong’s Concordance, Gr. 6561 and 6562; A Compendious Syriac Dictionary, p. 237; and Oraham’s Dictionary, p. 250.)'
  - type: text
    content: the Holy Spirit of Truth, who will be to you a friend just like me—and he will never leave you. The world won’t receive him because they can’t see him or know him. But you know him intimately because he remains with you and will live inside you.
  - type: note
    content: Jesus is prophesying about the coming of the Holy Spirit at Pentecost, who will indwell every believer. See Acts 2.
  '18':
  - type: text
    content: “I promise that I will never leave you helpless or abandon you as orphans—I will come back to you!
  - type: text
    content: ' '
  - type: note
    content: There are three ways Jesus will come to them. He came after his resurrection and appeared numerous times to his disciples. He came in the person of the Holy Spirit at Pentecost to live within them (Rom. 8:9), and he will come in the parousia, known traditionally as the second coming.
  '19':
  - type: text
    content: Soon I will leave this world and they will see me no longer, but you will see me, because I will live again, and you will come alive too.
  - type: text
    content: ' '
  '2':
  - type: text
    content: My Father’s house has many dwelling places.
  - type: text
    content: ' '
  - type: note
    content: Or “There are many resting places on the way to my Father’s house.” Or “There are many homes in my Father’s household.” The Father’s house is also mentioned by Jesus in John 2:16, where it is his temple on earth, his dwelling place. This is not just heaven, but the dwelling place of God among men. There is ample room for people from every nation and ethnicity, room to spare, for the church, the body of Christ, is now the house of God. See 1 Cor. 3:16; Eph. 2:21–22; 1 Tim. 3:15; Heb. 3:6; 1 Peter 2:5. Every believer is now one of the many dwelling places that make up God’s house (temple). See also v. 23.
  - type: text
    content: If it were otherwise, I would tell you plainly, because I go
  - type: text
    content: ' '
  - type: note
    content: Jesus’ “going” was to go through death and resurrection in order to make us ready to be his dwelling place. He had to “go,” not to heaven, but to the cross and pass through resurrection.
  - type: text
    content: to prepare a place for you.
  - type: text
    content: ' '
  '20':
  - type: text
    content: So when that day comes, you will know that I am living in the Father and that you are one with me, for I will be living in you.
  - type: text
    content: ' '
  '21':
  - type: text
    content: Those who truly love me are those who obey my commands. Whoever passionately loves me will be passionately loved by my Father. And I will passionately love him in return and will reveal
  - type: text
    content: ' '
  - type: note
    content: The verb translated “reveal” is used in John’s Gospel only here and in the following verse. As in the Septuagint of Exodus 33:13, it is used of a special divine manifestation. “I . . . will reveal myself to him” is more than merely “showing him who I am.” It means “I will personally come to him.”
  - type: text
    content: myself to him.”
  '22':
  - type: text
    content: 'Then one of the disciples named Judas '
  - type: note
    content: Judas was a common name in the time of Jesus. It is actually the name Judah.
  - type: text
    content: (not Judas Iscariot) said, “Lord, why is it you will only reveal your identity to us and not to everyone?”
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Loving me empowers you to obey my word.
  - type: text
    content: ' '
  - type: note
    content: Love for Christ is proven and demonstrated by our obedience to all that he says.
  - type: text
    content: And my Father will love you so deeply that we will come to you and make you our dwelling place.
  - type: text
    content: ' '
  '24':
  - type: text
    content: But those who don’t love me will not obey my words. The Father did not send me to speak my own revelation, but the words of my Father.
  - type: text
    content: ' '
  '25':
  - type: text
    content: I am telling you this while I am still with you.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But when the Father sends the Spirit of Holiness, the One like me who sets you free,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is translated “the Redeemer from the curse.” See the second footnote on John 14:16–17.
  - type: text
    content: he will teach you all things in my name. And he will inspire you to remember every word that I’ve told you.
  '27':
  - type: text
    content: “I leave the gift of peace with you—my peace. Not the kind of fragile peace given by the world, but my perfect peace. Don’t yield to fear or be troubled in your hearts—instead, be courageous!
  - type: text
    content: ' '
  - type: note
    content: These are the same words Moses gave before he died and the words God spoke to Joshua as he entered into his life’s plan of taking the promised land for Israel. See Deut. 31:8; Josh. 1:8–9; 10:25. God has not given us a spirit of cowardly fear. See also 2 Tim. 1:7.
  '28':
  - type: text
    content: “Remember what I’ve told you, that I must go away, but I promise to come back to you. So if you truly love me, you will be glad for me, since I’m returning to my Father, who is greater than I.
  - type: text
    content: ' '
  '29':
  - type: text
    content: So when all of these things happen, you will still trust and cling to me.
  - type: text
    content: ' '
  '3':
  - type: text
    content: And when everything is ready, I will come back and take
  - type: text
    content: ' '
  - type: note
    content: The Greek verb used here, paralambano, is the word used for a bridegroom coming to take his bride. He “takes” us as his bride through his death and resurrection. His “coming back” can also refer to his “coming” to live within believers. The place he has prepared for us is in his Father’s house (temple), which is the body of Christ. He chooses our place in the body where we will have the most impact for his glory. See 1 Cor. 12:18.
  - type: text
    content: you to myself so that you will be where I am.
  - type: text
    content: ' '
