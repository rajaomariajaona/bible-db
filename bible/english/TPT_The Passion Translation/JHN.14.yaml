    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I tell you this timeless truth: The person who follows me in faith, believing in me, will do the same mighty miracles that I do—even greater miracles than these because I go to be with my Father!'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I will do whatever you ask me to do when you ask me in my name. And that is how the Son will show what the Father is really like and bring glory to him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Ask me anything in my name, and I will do it for you!”
