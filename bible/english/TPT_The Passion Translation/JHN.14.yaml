  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Philip, I’ve been with you all this time and you still don’t know who I am? How could you ask me to show you the Father, for anyone who has looked at me has seen the Father.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t you believe that the Father is living in me and that I am living in the Father? Even my words are not my own but come from my Father, for he lives in me and performs his miracles of power through me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Believe that I live as one with my Father and that my Father lives as one with me—or at least, believe because of the mighty miracles I have done.
