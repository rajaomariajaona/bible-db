  - type: text
    content: I won’t speak with you much longer, for the ruler of this dark world
  - type: text
    content: ' '
  - type: note
    content: Implied in the text and in the word devil, which means “slanderer” and “accuser.”
  - type: text
    content: is coming. But he has no power over me,
  - type: text
    content: ' '
  - type: text
    content: for he has nothing to use against me.
  - type: text
    content: ' '
