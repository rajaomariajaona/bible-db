document_id: PSA.113,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalms 113–114 were sung before the meal during the Jewish family’s celebration of Passover, while Pss. 115–118 were sung after the meal (see Mark 14:26).God Is Kind
  - type: text
    content: Hallelujah! Praise the Lord!
  - type: text
    content: Go ahead, praise the Lord, all you loving servants of God!
  - type: text
    content: Keep it up! Praise him some more!
  '2':
  - type: text
    content: For the glorious name of the Lord is blessed forever and ever.
  '3':
  - type: text
    content: From sunrise-brilliance to sunset-beauty,
  - type: text
    content: lift up his praise from dawn to dusk!
  '4':
  - type: text
    content: For he rules on high over the nations
  - type: text
    content: with a glory that outshines even the heavens.
  '5':
  - type: text
    content: No one can be compared to God, enthroned on high!
  '6':
  - type: text
    content: He stoops down to look upon the sky and the earth.
  '7':
  - type: text
    content: He promotes the poor, picking them up from the dirt,
  - type: text
    content: and rescues the needy from the garbage dump.
  '8':
  - type: text
    content: He turns paupers into princes and seats them
  - type: text
    content: on their royal thrones of honor.
  '9':
  - type: text
    content: God’s grace provides for the barren ones a joyful home with children
  - type: text
    content: so that even childless couples find a family.
  - type: text
    content: He makes them happy parents surrounded by their pride and joy.
  - type: text
    content: That’s the God we praise, so give it all to him!
