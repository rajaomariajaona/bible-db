    - type: text
      text: God Is Kind
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah! Praise the Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead, praise the Lord, all you loving servants of God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep it up! Praise him some more!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the glorious name of the Lord is blessed forever and ever.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From sunrise-brilliance to sunset-beauty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lift up his praise from dawn to dusk!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he rules on high over the nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with a glory that outshines even the heavens.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one can be compared to God, enthroned on high!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stoops down to look upon the sky and the earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He promotes the poor, picking them up from the dirt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rescues the needy from the garbage dump.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He turns paupers into princes and seats them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on their royal thrones of honor.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s grace provides for the barren ones a joyful home with children
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that even childless couples find a family.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes them happy parents surrounded by their pride and joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s the God we praise, so give it all to him!
