document_id: PSA.44,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Wake Up, Lord, We’re in Trouble
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: usfm
    marker: d
    children:
    - type: text
      text: A contemplative poem for instruction
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Past
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: God, we’ve heard about all the glorious miracles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ve done for our ancestors in days gone by.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They told us about the ancient times, how by your power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you drove out the ungodly nations from this land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: crushing all their strongholds and giving the land to us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now the people of Israel cover the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from one end to the other,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: all because of your grace and power
    - type: text
      text: '!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: We retreat before our enemies in defeat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are no longer helping us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who hate us have invaded our land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and plundered our people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You have treated us like sheep in the slaughter pen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to be butchered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve scattered us to the four winds.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You have sold us as slaves for nothing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have counted us, your precious ones, as worthless.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You have caused our neighbors to despise and scorn us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All those around us mock and curse us.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You have made us the butt of their jokes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disliked by all, we are the laughingstock of the people.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: There’s no escape from this constant curse, this humiliation!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are despised, jeered, overwhelmed by shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and overcome at every turn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by our hateful and heartless enemies.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Despite all of this, we have not forgotten you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we have not broken covenant with you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: We have not betrayed you; our hearts are still yours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our steps have not strayed from your path.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Yet you have crushed us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'leaving us in this wilderness place '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of misery and desperation
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 44:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in this place of jackals.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With nowhere else to turn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: death’s dark door seems to be the only way out.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 20-21
    - type: text
      text: If we had forsaken your holy name, wouldn’t you know it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’d be right in leaving us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If we had worshiped before other gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no one would blame you for punishing us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, you know our every heart-secret.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You know we still want you!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Because of you we face death threats every day.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like martyrs we are dying daily.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are seen as lambs lined up to be slaughtered as sacrifices.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Future
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: So wake up, Lord God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you sleep when we’re in trouble?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you forsaking us forever?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You can’t hide your face any longer from us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How could you forget our agonizing sorrow?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Now we lay facedown, sinking into the dust of death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the quicksand of the grave.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Arise, awake, and come to help us, O Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your unfailing love save us from this sorrow!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Our forefathers didn’t take the land by their own strength
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or their own skill or strategy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it was through the shining forth of your radiant presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the display of your mighty power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You loved to give them victory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you took great delight in them.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You are my God, my King!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s now time to decree majesties for Jacob!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Through your glorious name and your awesome power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we can push through to any victory and defeat every enemy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For I will not trust in the weapons of the world;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 44:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bow and sword.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know they will never save me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Only you will be our Savior from all our enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All those who hate us you have brought to shame.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So now I constantly boast in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can never thank you enough!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Present
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But you have turned your back on us; you walked off and left us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve rejected us, tossing us aside in humiliating shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You don’t go before us anymore in our battles.
