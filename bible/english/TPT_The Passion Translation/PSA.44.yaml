document_id: PSA.44,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wake Up, Lord, We’re in Trouble
  - type: text
    content: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: text
    content: A contemplative poem for instruction
  - type: heading
    content: The Past
  - type: text
    content: God, we’ve heard about all the glorious miracles
  - type: text
    content: you’ve done for our ancestors in days gone by.
  - type: text
    content: They told us about the ancient times, how by your power
  - type: text
    content: you drove out the ungodly nations from this land,
  - type: text
    content: crushing all their strongholds and giving the land to us.
  - type: text
    content: Now the people of Israel cover the land
  - type: text
    content: from one end to the other,
  - type: text
    content: all because of your grace and power
  - type: text
    content: '!'
  '10':
  - type: text
    content: We retreat before our enemies in defeat,
  - type: text
    content: for you are no longer helping us.
  - type: text
    content: Those who hate us have invaded our land
  - type: text
    content: and plundered our people.
  '11':
  - type: text
    content: You have treated us like sheep in the slaughter pen,
  - type: text
    content: ready to be butchered.
  - type: text
    content: You’ve scattered us to the four winds.
  '12':
  - type: text
    content: You have sold us as slaves for nothing!
  - type: text
    content: You have counted us, your precious ones, as worthless.
  '13':
  - type: text
    content: You have caused our neighbors to despise and scorn us.
  - type: text
    content: All those around us mock and curse us.
  '14':
  - type: text
    content: You have made us the butt of their jokes.
  - type: text
    content: Disliked by all, we are the laughingstock of the people.
  '15':
  - type: text
    content: There’s no escape from this constant curse, this humiliation!
  - type: text
    content: We are despised, jeered, overwhelmed by shame,
  - type: text
    content: and overcome at every turn
  - type: text
    content: by our hateful and heartless enemies.
  '17':
  - type: text
    content: Despite all of this, we have not forgotten you;
  - type: text
    content: we have not broken covenant with you.
  '18':
  - type: text
    content: We have not betrayed you; our hearts are still yours.
  - type: text
    content: Our steps have not strayed from your path.
  '19':
  - type: text
    content: Yet you have crushed us,
  - type: text
    content: 'leaving us in this wilderness place '
  - type: text
    content: of misery and desperation
  - type: text
    content: .
  - type: note
    content: Or “in this place of jackals.”
  - type: text
    content: With nowhere else to turn,
  - type: text
    content: death’s dark door seems to be the only way out.
  '20':
  - type: text
    content: If we had forsaken your holy name, wouldn’t you know it?
  - type: text
    content: You’d be right in leaving us.
  - type: text
    content: If we had worshiped before other gods,
  - type: text
    content: no one would blame you for punishing us.
  - type: text
    content: God, you know our every heart-secret.
  - type: text
    content: You know we still want you!
  '22':
  - type: text
    content: Because of you we face death threats every day.
  - type: text
    content: Like martyrs we are dying daily.
  - type: text
    content: We are seen as lambs lined up to be slaughtered as sacrifices.
  - type: heading
    content: The Future
  '23':
  - type: text
    content: So wake up, Lord God!
  - type: text
    content: Why would you sleep when we’re in trouble?
  - type: text
    content: Are you forsaking us forever?
  '24':
  - type: text
    content: You can’t hide your face any longer from us!
  - type: text
    content: How could you forget our agonizing sorrow?
  '25':
  - type: text
    content: Now we lay facedown, sinking into the dust of death,
  - type: text
    content: the quicksand of the grave.
  '26':
  - type: text
    content: Arise, awake, and come to help us, O Lord.
  - type: text
    content: Let your unfailing love save us from this sorrow!
  '3':
  - type: text
    content: Our forefathers didn’t take the land by their own strength
  - type: text
    content: or their own skill or strategy.
  - type: text
    content: But it was through the shining forth of your radiant presence
  - type: text
    content: and the display of your mighty power.
  - type: text
    content: You loved to give them victory,
  - type: text
    content: for you took great delight in them.
  '4':
  - type: text
    content: You are my God, my King!
  - type: text
    content: It’s now time to decree majesties for Jacob!
  '5':
  - type: text
    content: Through your glorious name and your awesome power,
  - type: text
    content: we can push through to any victory and defeat every enemy.
  '6':
  - type: text
    content: For I will not trust in the weapons of the world;
  - type: note
    content: Or “bow and sword.”
  - type: text
    content: I know they will never save me.
  '7':
  - type: text
    content: Only you will be our Savior from all our enemies.
  - type: text
    content: All those who hate us you have brought to shame.
  '8':
  - type: text
    content: So now I constantly boast in you.
  - type: text
    content: I can never thank you enough!
  - type: text
    content: Pause in his presence
  - type: heading
    content: The Present
  '9':
  - type: text
    content: But you have turned your back on us; you walked off and left us!
  - type: text
    content: You’ve rejected us, tossing us aside in humiliating shame.
  - type: text
    content: You don’t go before us anymore in our battles.
