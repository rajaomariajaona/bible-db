  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'They can fast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and pray
    - type: text
      text: ' all they want, but I still won’t listen to their cry. Neither will I accept their burnt offerings and meal offerings that they present to me. I will destroy them by war, food shortages, and plague.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These three disasters were part of the curse that Israel brought on herself by breaking covenant with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 26:23–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jeremiah mentioned “war, food shortages, and plague” repeatedly in his book as judgment from God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
