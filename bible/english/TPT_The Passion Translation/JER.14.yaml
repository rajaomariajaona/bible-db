  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Prophets Will Be Judged
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I said, “But Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '! The prophets are prophesying: ‘You won’t experience war; neither will food shortages come upon you. God will protect you securely in this place.’ ”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' replied: “The prophets are using my name to lie to the people. I’ve not sent them or commissioned them. I’ve not spoken a word to them. They prophesy false promises '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “lying [false] visions.”
      marker-yv: yv-n
    - type: text
      text: 'and speak of an imaginary future—things they have made up in their minds. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is what I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', am going to do to those lying prophets. They claim to speak in my name although I did not send them, and they say that there will be no war or food shortages in this land. Therefore, it is by war and food shortages that I will kill them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And those who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foolishly
    - type: text
      text: ' believed these prophecies will meet the same end. They will all die from war and food shortages, along with their wives and sons and daughters. Their bodies will be thrown out into the streets of Jerusalem, with no one to bury them. For I will bring evil to them as they have been evil.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Sorrow
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“So, Jeremiah, speak your message of sorrow over them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘My eyes gush with tears day and night.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can’t stop weeping over all that my people have suffered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my beloved people have suffered a great wound
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and are left grievously injured.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At least one Jewish sage viewed this verse as being spoken, not by Jeremiah, but by
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', whose heart is deeply moved with love for his people. “Rabbi Tanhuma the Great preached as follows: ‘And do you speak to them thus: Let my eyes run with tears, day and night let them not cease’ ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jeremiah 14:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )—now the text was not explicit as to whether it was the prophet who said ‘let my eyes run with tears’ or not. But since it goes on to say ‘day and night let them not cease,’ and since flesh and blood cannot cry day and night, we must conclude that the verse speaks of the weeping of the Holy and Blessed One, who alone does not sleep” (Abraham Heschel,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Heavenly Torah as Refracted through the Generations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[London: A&C Black, 2005], 117).'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are as precious to me as a young daughter.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the virgin daughter of my people.” This is an idiom denoting great affection and love.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: If I go into the countryside—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there they lie, slain by the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If I enter the city—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there they lie, sick and starving.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both prophet and priest wander throughout the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with no revelation to share.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text of this sentence is uncertain. The common interpretation is that “prophet and priest traveled about the country like a merchant selling their wares.” However, according to the Jewish sage Rashi, it is perhaps “prophets and priests have wandered as beggars to a land they do not know [been taken in exile].”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People Question God
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have you completely rejected Judah?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does your soul really despise Zion?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have you crushed us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that we can’t be healed?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We longed for peace and happiness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but nothing good ever came.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We longed for a time of healing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and we find a time of terror instead.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Judah is weeping,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her doors are dark with discouragement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her people sink to the ground in mourning;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'their cries '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of lament
    - type: text
      text: ' rise from Jerusalem.'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', we acknowledge our wickedness before you—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we have sinned against you, just like our fathers did.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: For the sake of your great name, do not disown us;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'do not dishonor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem
    - type: text
      text: ', that glorious place from which you rule.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t break your promise; remember your covenant with us.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Can any of the false gods of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: foreign
    - type: text
      text: ' nations give '
    - type: usfm
      marker: it
      children:
      - type: text
        text: us
    - type: text
      text: ' rain?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can the skies by themselves give showers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Only you can, O  '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', our God!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So, we place all our hope in you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for only you accomplish all these things.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The elite send their servants for water,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when they come to the cisterns, they are bone dry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So, they return with their vessels empty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Humiliated, they cover their faces with shame.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Since there has been no rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the ground is dry and cracked at harvest season,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the farmers hang their heads in humiliation.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Because there is no grass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even the doe in the field
