document_id: JER.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Terrible Drought
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me concerning the drought:'
  - type: note
    content: This begins Jeremiah’s fifth sermon, a section of his prophecies stretching from 14:1 to 15:9 that pleaded with and warned God’s people. The cause of the drought was the sinful behavior of God’s people and their rebellious unbelief.
  '10':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me concerning these people: “They love to go astray, and they find such pleasure in their wandering. Therefore, I no longer find pleasure in them. Now I will remember all the evil they have done and punish their sins.”'
  '11':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Don’t intercede on behalf of these people! '
  - type: note
    content: This is the third time God told Jeremiah not to pray for the people (see 7:16; 11:14). Prayer (intercession) delays judgment. God was telling Jeremiah that judgment must fall upon a rebellious people, and he told Jeremiah not to pray but to keep on preaching. Preaching hastens judgment, for it brings greater light and responsibility to the hearers (see Matt. 11:20–24; Luke 12:42–48; John 15:22; 2 Peter 2:20–22).
  '12':
  - type: text
    content: 'They can fast '
  - type: text
    content: and pray
  - type: text
    content: ' all they want, but I still won’t listen to their cry. Neither will I accept their burnt offerings and meal offerings that they present to me. I will destroy them by war, food shortages, and plague.”'
  - type: note
    content: These three disasters were part of the curse that Israel brought on herself by breaking covenant with Yahweh (see Lev. 26:23–26). Jeremiah mentioned “war, food shortages, and plague” repeatedly in his book as judgment from God (see Jer. 21:7, 9; 24:10; 27:8, 13; 28:8; 29:17–18; 32:24, 36; 34:17; 38:2; 42:17, 22; 44:13).
  - type: heading
    content: False Prophets Will Be Judged
  '13':
  - type: text
    content: 'I said, “But Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '! The prophets are prophesying: ‘You won’t experience war; neither will food shortages come upon you. God will protect you securely in this place.’ ”'
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' replied: “The prophets are using my name to lie to the people. I’ve not sent them or commissioned them. I’ve not spoken a word to them. They prophesy false promises '
  - type: note
    content: Or “lying [false] visions.”
  - type: text
    content: 'and speak of an imaginary future—things they have made up in their minds. '
  '15':
  - type: text
    content: 'This is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', am going to do to those lying prophets. They claim to speak in my name although I did not send them, and they say that there will be no war or food shortages in this land. Therefore, it is by war and food shortages that I will kill them. '
  '16':
  - type: text
    content: 'And those who '
  - type: text
    content: foolishly
  - type: text
    content: ' believed these prophecies will meet the same end. They will all die from war and food shortages, along with their wives and sons and daughters. Their bodies will be thrown out into the streets of Jerusalem, with no one to bury them. For I will bring evil to them as they have been evil.”'
  - type: heading
    content: Jeremiah’s Sorrow
  '17':
  - type: text
    content: '“So, Jeremiah, speak your message of sorrow over them:'
  - type: text
    content: “ ‘My eyes gush with tears day and night.
  - type: text
    content: I can’t stop weeping over all that my people have suffered.
  - type: text
    content: For my beloved people have suffered a great wound
  - type: text
    content: and are left grievously injured.
  - type: note
    content: 'At least one Jewish sage viewed this verse as being spoken, not by Jeremiah, but by Yahweh, whose heart is deeply moved with love for his people. “Rabbi Tanhuma the Great preached as follows: ‘And do you speak to them thus: Let my eyes run with tears, day and night let them not cease’ (Jeremiah 14:17)—now the text was not explicit as to whether it was the prophet who said ‘let my eyes run with tears’ or not. But since it goes on to say ‘day and night let them not cease,’ and since flesh and blood cannot cry day and night, we must conclude that the verse speaks of the weeping of the Holy and Blessed One, who alone does not sleep” (Abraham Heschel, Heavenly Torah as Refracted through the Generations [London: A&C Black, 2005], 117).'
  - type: text
    content: They are as precious to me as a young daughter.
  - type: note
    content: Or “the virgin daughter of my people.” This is an idiom denoting great affection and love.
  '18':
  - type: text
    content: If I go into the countryside—
  - type: text
    content: there they lie, slain by the sword.
  - type: text
    content: If I enter the city—
  - type: text
    content: there they lie, sick and starving.
  - type: text
    content: Both prophet and priest wander throughout the land,
  - type: text
    content: with no revelation to share.’ ”
  - type: note
    content: The Hebrew text of this sentence is uncertain. The common interpretation is that “prophet and priest traveled about the country like a merchant selling their wares.” However, according to the Jewish sage Rashi, it is perhaps “prophets and priests have wandered as beggars to a land they do not know [been taken in exile].”
  - type: heading
    content: The People Question God
  '19':
  - type: text
    content: Lord
  - type: text
    content: ', have you completely rejected Judah?'
  - type: text
    content: Does your soul really despise Zion?
  - type: text
    content: Why have you crushed us
  - type: text
    content: so that we can’t be healed?
  - type: text
    content: We longed for peace and happiness,
  - type: text
    content: but nothing good ever came.
  - type: text
    content: We longed for a time of healing,
  - type: text
    content: and we find a time of terror instead.
  '2':
  - type: text
    content: “Judah is weeping,
  - type: text
    content: and her doors are dark with discouragement.
  - type: text
    content: Her people sink to the ground in mourning;
  - type: text
    content: 'their cries '
  - type: text
    content: of lament
  - type: text
    content: ' rise from Jerusalem.'
  '20':
  - type: text
    content: Yahweh
  - type: text
    content: ', we acknowledge our wickedness before you—'
  - type: text
    content: we have sinned against you, just like our fathers did.
  '21':
  - type: text
    content: For the sake of your great name, do not disown us;
  - type: text
    content: 'do not dishonor '
  - type: text
    content: Jerusalem
  - type: text
    content: ', that glorious place from which you rule.'
  - type: text
    content: Don’t break your promise; remember your covenant with us.
  '22':
  - type: text
    content: 'Can any of the false gods of '
  - type: text
    content: foreign
  - type: text
    content: ' nations give '
  - type: text
    content: us
  - type: text
    content: ' rain?'
  - type: text
    content: Can the skies by themselves give showers?
  - type: text
    content: 'Only you can, O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', our God!'
  - type: text
    content: So, we place all our hope in you,
  - type: text
    content: for only you accomplish all these things.
  '3':
  - type: text
    content: The elite send their servants for water,
  - type: text
    content: but when they come to the cisterns, they are bone dry.
  - type: text
    content: So, they return with their vessels empty.
  - type: text
    content: Humiliated, they cover their faces with shame.
  '4':
  - type: text
    content: Since there has been no rain,
  - type: text
    content: the ground is dry and cracked at harvest season,
  - type: text
    content: and the farmers hang their heads in humiliation.
  '5':
  - type: text
    content: Because there is no grass,
  - type: text
    content: even the doe in the field
  - type: text
    content: forsakes her newborn fawn.
  '6':
  - type: text
    content: The wild donkeys stand on the bare heights,
  - type: text
    content: Panting for air like jackals;
  - type: text
    content: their eyes are glazed over
  - type: text
    content: because there is no pasture.”
  - type: heading
    content: A Cry for Help
  '7':
  - type: text
    content: Our guilty sins cry out against us;
  - type: note
    content: Jeremiah identified with the sins of his people and wept as he preached the message of repentance to them.
  - type: text
    content: in our rebellion, time and time again,
  - type: text
    content: we have sinned against you.
  - type: text
    content: Yahweh
  - type: text
    content: ', do something to help us,'
  - type: text
    content: for the sake of your honor.
  '8':
  - type: text
    content: O Hope of Israel,
  - type: text
    content: Our only deliverer in time of trouble,
  - type: text
    content: why do you act like some stranger in the land,
  - type: text
    content: 'like an '
  - type: text
    content: uninterested
  - type: text
    content: ' traveler who stops only for the night?'
  '9':
  - type: text
    content: You are a mighty warrior!
  - type: text
    content: Why are you acting like a man overcome with weakness,
  - type: text
    content: like someone who can’t save us?
  - type: text
    content: 'Yet here you are, dwelling among us, '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: You’ve attached your name to us.
  - type: text
    content: Don’t leave us now!
  - type: heading
    content: Jeremiah Instructed Not to Intercede
