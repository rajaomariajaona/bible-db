document_id: EZK.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Boiling Pot
  - type: note
    content: Ezekiel 24 is the ninth panel (I) in the chiastic parallel structure in Ezekiel. This section contains an oracle depicting the “cooking pot” judgment on Jerusalem (24:3, 6). This panel I constitutes the corresponding parallel with panel I1 in ch. 33, which contains the oracle describing Ezekiel as a “watchman” for the house of Israel and in which Jerusalem’s fall is invoked and explained.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said: “Son of man, write down today’s date: January 15, the ninth year of your captivity, '
  - type: note
    content: This sentence is significant, for it contains the exact date Nebuchadnezzar would begin to attack Jerusalem. No doubt, this prophecy’s fulfillment established Ezekiel’s authority as an accurate prophet. See 2 Kings 25:1; Jer. 52:4.
  - type: text
    content: 'for this is the very day the king of Babylon begins his attack on Jerusalem. '
  '10':
  - type: text
    content: Heap on the firewood! Light it!
  - type: text
    content: Cook the meat well until the broth boils away,
  - type: note
    content: Or “mix in the spices.”
  - type: text
    content: until the bones are burned up!
  '11':
  - type: text
    content: Set the empty pot on the coals
  - type: text
    content: until it gets hot and the metal glows red-hot.
  - type: text
    content: 'The scum will become soft enough '
  - type: text
    content: to scrub
  - type: text
    content: ','
  - type: text
    content: and what is left will be burned off.
  '12':
  - type: text
    content: 'But it still can’t be cleaned '
  - type: note
    content: The Hebrew text is so uncertain that some translations omit it entirely. Others change the Hebrew to read “She has wearied me with toil.”
  - type: text
    content: and its scum can’t be removed, so into the fire you go!
  '13':
  - type: text
    content: “ ‘
  - type: text
    content: Jerusalem
  - type: text
    content: ', the filth of your '
  - type: text
    content: sexual immorality
  - type: text
    content: ' is infamous. Although I have tried to purify you, you were not cleansed of your filth, so now you will never be purged of your filth until I have emptied out my fury upon you. '
  '14':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed it. The time has come, and I will do it! I will not hold back or relent. I will show you no pity. I will judge you according to the way you have lived and acted. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Death of Ezekiel’s Wife
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '16':
  - type: text
    content: '“Son of man, behold, in the blink of an eye I am about to take from you your heart’s dearest treasure, the one you love the most. '
  - type: note
    content: Or “the delight of your eyes.”
  - type: text
    content: 'But you must not weep or wail or let your tears stream down your cheeks. '
  '17':
  - type: text
    content: 'Let no one hear your sobbing; don’t show that you are grieving. Wrap a turban around your head, put sandals on your feet, '
  - type: text
    content: and dress normally
  - type: text
    content: '. '
  - type: note
    content: In that culture and time, mourners would go barefoot with their heads uncovered and their lower face covered with a veil. God instructed Ezekiel to dress normally and act like nothing had happened as a sign that Jerusalem’s grief would come suddenly with no time to grieve or lament. The dearest thing to Ezekiel was his wife. The dearest thing to Jerusalem was her temple.
  - type: text
    content: 'Don’t cover your face, '
  - type: note
    content: Literally “Do not cover your mustache.” Also in v. 22.
  - type: text
    content: and don’t eat the customary food of mourners.”
  '18':
  - type: text
    content: 'So, I preached to the people the next day '
  - type: text
    content: as usual
  - type: text
    content: ', and by evening, my wife had died. And I did as I had been instructed. '
  '19':
  - type: text
    content: The people then said to me, “What’s the meaning of this? Why are you acting this way?”
  '20':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and I replied, “'
  - type: text
    content: Yahweh
  - type: text
    content: ' told me '
  '21':
  - type: text
    content: 'to prophesy to the people of Israel the words of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ': ‘Behold! I am about to make my sanctuary ritually unclean. My temple has become your boast, the pride of your strength, the delight of your eyes, the joy of your hearts, '
  - type: text
    content: and you believe it will keep you safe
  - type: text
    content: '. But your children whom you left behind in Jerusalem will be killed by the sword. '
  '22':
  - type: text
    content: 'Then you will do as I have done; you will not cover your faces nor eat the customary food of mourners. '
  '23':
  - type: text
    content: 'You will keep turbans on your heads and your sandals on your feet. You will not mourn nor weep but will waste away for your sins and groan among yourselves. '
  '24':
  - type: text
    content: 'Thus Ezekiel is a sign for you. Everything he has done, you will do. And when this happens, you will certainly know that I am Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  '25':
  - type: text
    content: '“And you, son of man, this is what will happen on the day that I deprive them of their '
  - type: text
    content: temple
  - type: text
    content: '-stronghold, their beautiful joy and glory, their heart’s desire, and their greatest treasure—I will also take away their sons and daughters. '
  '26':
  - type: text
    content: 'And on that day a survivor from '
  - type: text
    content: Jerusalem
  - type: text
    content: ' will bring you the report. '
  '27':
  - type: text
    content: 'That same day, '
  - type: note
    content: That is, the day when Nebuchadnezzar conquers Jerusalem.
  - type: text
    content: 'when he comes to you, your mouth will be opened, and you will be able to '
  - type: text
    content: prophesy
  - type: text
    content: ' to the survivor and be silent no longer. '
  - type: note
    content: This affirmation that Ezekiel will no longer be silent indicates the lifting of the prophet’s mute condition, imposed upon him by God, except when God spoke directly to him, and he conveyed those messages to the people (see Ezek. 3:26–27; 33:22).
  - type: text
    content: 'And you will be a living symbol '
  - type: text
    content: of hope
  - type: text
    content: ' for them, '
  - type: note
    content: Ezekiel’s prophetic messages in the second half of the book will begin to focus more and more on the promised hope of divine forgiveness and spiritual renewal for the people of God.
  - type: text
    content: 'and they will see and acknowledge that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  '3':
  - type: text
    content: 'Pronounce this parable for these rebels: ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: '“ ‘Put a cooking pot '
  - type: text
    content: on the fire
  - type: text
    content: ;
  - type: text
    content: put it on and fill it with water.
  '4':
  - type: text
    content: Take one of the best of the flock,
  - type: text
    content: kill it, cut it in pieces,
  - type: text
    content: 'then put the best pieces in the pot '
  - type: note
    content: The pieces in the pot symbolize the people of Jerusalem and fugitives from surrounding towns who sought refuge in the city. The “best pieces” would be the leaders of the city.
  - type: text
    content: —
  - type: text
    content: the thighs, the shoulders, and the choicest joints.
  - type: note
    content: See Gen. 32:24–32. The thighs and shoulders are symbols of the strength of the flesh.
  - type: text
    content: Fill the pot with the most tender cuts,
  - type: text
    content: pile firewood underneath it
  - type: text
    content: and boil it until the bones
  - type: text
    content: are thoroughly cooked.
  '6':
  - type: text
    content: '“ ‘For the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this:'
  - type: text
    content: Disaster is in store for the bloody city,
  - type: note
    content: That is, Jerusalem.
  - type: text
    content: for you are like a scum-filled cooking pot
  - type: text
    content: that no amount of scrubbing can make clean!
  - type: text
    content: Empty the pot, piece by piece,
  - type: note
    content: The people of Jerusalem would perish, not en masse, but in different portions at different times.
  - type: text
    content: in whatever order it comes.
  - type: note
    content: Or “don’t even allow lots to be cast for them.” The reference here is to the people of Jerusalem. After the siege of Jerusalem in 597 BC, the Babylonians had cast lots to see whom they would take away into exile. Now, everyone would go.
  '7':
  - type: text
    content: For your city is still full of bloodshed.
  - type: text
    content: Your people have poured the blood
  - type: text
    content: of your murdered victims
  - type: text
    content: ' on the bare rocks.'
  - type: note
    content: Jewish scholars see this as a reference to the martyrdom of the prophet Zechariah, who was killed in the temple courts.
  - type: text
    content: You didn’t bother to pour it on the ground
  - type: text
    content: where at least the dust could cover it.
  - type: note
    content: To leave the blood of a dead animal uncovered was against the law (see Lev. 17:13); so much more a person’s blood.
  '8':
  - type: text
    content: To awaken my anger and exact vengeance,
  - type: text
    content: 'I have put the blood '
  - type: text
    content: of those you murdered
  - type: text
    content: on a bare rock where it will not be hidden!
  '9':
  - type: text
    content: '“ ‘I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you:'
  - type: text
    content: Doom is in store for the city of bloodshed.
  - type: text
    content: I, too, will pile up wood for the fire.
