document_id: EZK.24,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Boiling Pot
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezekiel 24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the ninth panel (I) in the chiastic parallel structure in Ezekiel. This section contains an oracle depicting the “cooking pot” judgment on Jerusalem (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This panel I constitutes the corresponding parallel with panel I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which contains the oracle describing Ezekiel as a “watchman” for the house of Israel and in which Jerusalem’s fall is invoked and explained.'
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me and said: “Son of man, write down today’s date: January 15, the ninth year of your captivity, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This sentence is significant, for it contains the exact date Nebuchadnezzar would begin to attack Jerusalem. No doubt, this prophecy’s fulfillment established Ezekiel’s authority as an accurate prophet. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'for this is the very day the king of Babylon begins his attack on Jerusalem. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heap on the firewood! Light it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cook the meat well until the broth boils away,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “mix in the spices.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until the bones are burned up!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set the empty pot on the coals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until it gets hot and the metal glows red-hot.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The scum will become soft enough '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to scrub
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and what is left will be burned off.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But it still can’t be cleaned '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text is so uncertain that some translations omit it entirely. Others change the Hebrew to read “She has wearied me with toil.”
      marker-yv: yv-n
    - type: text
      text: and its scum can’t be removed, so into the fire you go!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “ ‘
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem
    - type: text
      text: ', the filth of your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sexual immorality
    - type: text
      text: ' is infamous. Although I have tried to purify you, you were not cleansed of your filth, so now you will never be purged of your filth until I have emptied out my fury upon you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have decreed it. The time has come, and I will do it! I will not hold back or relent. I will show you no pity. I will judge you according to the way you have lived and acted. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death of Ezekiel’s Wife
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me and said, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, behold, in the blink of an eye I am about to take from you your heart’s dearest treasure, the one you love the most. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the delight of your eyes.”
      marker-yv: yv-n
    - type: text
      text: 'But you must not weep or wail or let your tears stream down your cheeks. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let no one hear your sobbing; don’t show that you are grieving. Wrap a turban around your head, put sandals on your feet, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and dress normally
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In that culture and time, mourners would go barefoot with their heads uncovered and their lower face covered with a veil. God instructed Ezekiel to dress normally and act like nothing had happened as a sign that Jerusalem’s grief would come suddenly with no time to grieve or lament. The dearest thing to Ezekiel was his wife. The dearest thing to Jerusalem was her temple.
      marker-yv: yv-n
    - type: text
      text: 'Don’t cover your face, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “Do not cover your mustache.” Also in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and don’t eat the customary food of mourners.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, I preached to the people the next day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as usual
    - type: text
      text: ', and by evening, my wife had died. And I did as I had been instructed. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The people then said to me, “What’s the meaning of this? Why are you acting this way?”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me and I replied, “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' told me '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to prophesy to the people of Israel the words of Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ': ‘Behold! I am about to make my sanctuary ritually unclean. My temple has become your boast, the pride of your strength, the delight of your eyes, the joy of your hearts, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and you believe it will keep you safe
    - type: text
      text: '. But your children whom you left behind in Jerusalem will be killed by the sword. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will do as I have done; you will not cover your faces nor eat the customary food of mourners. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will keep turbans on your heads and your sandals on your feet. You will not mourn nor weep but will waste away for your sins and groan among yourselves. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus Ezekiel is a sign for you. Everything he has done, you will do. And when this happens, you will certainly know that I am Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And you, son of man, this is what will happen on the day that I deprive them of their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: temple
    - type: text
      text: '-stronghold, their beautiful joy and glory, their heart’s desire, and their greatest treasure—I will also take away their sons and daughters. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And on that day a survivor from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jerusalem
    - type: text
      text: ' will bring you the report. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That same day, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the day when Nebuchadnezzar conquers Jerusalem.
      marker-yv: yv-n
    - type: text
      text: 'when he comes to you, your mouth will be opened, and you will be able to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: prophesy
    - type: text
      text: ' to the survivor and be silent no longer. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This affirmation that Ezekiel will no longer be silent indicates the lifting of the prophet’s mute condition, imposed upon him by God, except when God spoke directly to him, and he conveyed those messages to the people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 3:26–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'And you will be a living symbol '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of hope
    - type: text
      text: ' for them, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ezekiel’s prophetic messages in the second half of the book will begin to focus more and more on the promised hope of divine forgiveness and spiritual renewal for the people of God.
      marker-yv: yv-n
    - type: text
      text: 'and they will see and acknowledge that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pronounce this parable for these rebels: ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘Put a cooking pot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on the fire
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: put it on and fill it with water.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take one of the best of the flock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kill it, cut it in pieces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'then put the best pieces in the pot '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The pieces in the pot symbolize the people of Jerusalem and fugitives from surrounding towns who sought refuge in the city. The “best pieces” would be the leaders of the city.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the thighs, the shoulders, and the choicest joints.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 32:24–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The thighs and shoulders are symbols of the strength of the flesh.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fill the pot with the most tender cuts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pile firewood underneath it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and boil it until the bones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are thoroughly cooked.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘For the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says this:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster is in store for the bloody city,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Jerusalem.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are like a scum-filled cooking pot
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that no amount of scrubbing can make clean!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Empty the pot, piece by piece,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The people of Jerusalem would perish, not en masse, but in different portions at different times.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in whatever order it comes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “don’t even allow lots to be cast for them.” The reference here is to the people of Jerusalem. After the siege of Jerusalem in 597 BC, the Babylonians had cast lots to see whom they would take away into exile. Now, everyone would go.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your city is still full of bloodshed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people have poured the blood
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: of your murdered victims
    - type: text
      text: ' on the bare rocks.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jewish scholars see this as a reference to the martyrdom of the prophet Zechariah, who was killed in the temple courts.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You didn’t bother to pour it on the ground
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where at least the dust could cover it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To leave the blood of a dead animal uncovered was against the law (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 17:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ); so much more a person’s blood.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To awaken my anger and exact vengeance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have put the blood '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of those you murdered
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on a bare rock where it will not be hidden!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“ ‘I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Doom is in store for the city of bloodshed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I, too, will pile up wood for the fire.
