document_id: ACT.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Apostle Paul in Corinth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Paul left Athens he traveled to Corinth, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Corinth is about forty-eight miles (seventy-eight kilometers) from Athens. It was a large commercial center with trade links all over the entire ancient world. It was the home of the famous Isthmian Games and the temple of Aphrodite, which held a thousand temple prostitutes. Corinth was known for its debauchery. In the midst of a depraved culture, God birthed a church to become light to the people of their city.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'where he met a Jewish man named Aquila, who was originally from northeastern Turkey. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Pontus,” a Roman province in northeastern Asia Minor (Turkey).
    marker-yv: yv-n
  - type: text
    text: 'He and his wife, Priscilla, had recently emigrated from Italy to Corinth because Emperor Claudius had expelled all the Jews from Rome. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Since Paul and Aquila were both tentmakers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can also mean “saddle makers.”
    marker-yv: yv-n
  - type: text
    text: by trade, Paul moved in with them and they became business partners.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Every Sabbath day Paul spoke openly in the synagogue, to both Jews and non-Jews, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “pagans.”
    marker-yv: yv-n
  - type: text
    text: 'attempting to persuade them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to believe the message of Jesus
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Silas and Timothy finally arrived from Macedonia, Paul spent all his time preaching the word of God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “the manifestation of God.”
    marker-yv: yv-n
  - type: text
    text: trying to convince the Jews that Jesus was the Messiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When they viciously slandered him and hurled abuse on him, he symbolically shook the dust off his clothes in protest against them. He said to them, “Have it your way then! I am guiltless as to your fate, for the blood-guilt of your actions will be on your own heads, and from now on I will preach to the non-Jews.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Leaving the synagogue, Paul went to the home of Titus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is “Titus Justus,” but the Aramaic only has Titus. It is possible that he is the Titus who accompanied Paul in ministry and the one Paul addressed in the book of Titus.
    marker-yv: yv-n
  - type: text
    text: 'a convert to Judaism, for he and his family attended the Jewish meetings '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek says that Titus Justus lived next door to the synagogue.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: and they had all become believers in Jesus
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Crispus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Crispus was one of the few people Paul baptized. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 1:14
      metadata:
        usfm: 1CO.1.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . According to church tradition he became the bishop of Aegina.
    marker-yv: yv-n
  - type: text
    text: the leader of the synagogue, believed in the Lord, together with his entire family, and many of the Corinthians who heard what had happened believed in the Lord and were baptized.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'One night, the Lord spoke to Paul in a supernatural vision and said, “Don’t ever be afraid. Speak '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the words that I give you
  - type: text
    text: ' and don’t be intimidated, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'because I am with you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Somewhat more explicit in the Aramaic, this is the great “I AM” who is speaking with Paul, assuring him of God’s presence.
    marker-yv: yv-n
  - type: text
    text: No one will be able to hurt you, for there are many in this city whom I call my own.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For the next year and a half, Paul stayed in Corinth, faithfully teaching the word of God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Brought before the Roman Official Gallio
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now, at that time, Gallio was the regional governor who ruled over the Roman province of Achaia, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The province of Achaia included the three most important parts of southern Greece: Attica, Boeotia, and the Peloponnesus. Gallio was the brother of Seneca, the tutor of Nero.'
    marker-yv: yv-n
  - type: text
    text: 'and the Jews turned against Paul and came together to seize him and bring him publicly before the governor’s court. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “judgment seat.” This was a raised platform with a marble bench where judicial and governmental decrees were issued. This bench has been discovered after excavations in the agora.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They accused him before Gallio, saying, “This man is creating a disturbance by persuading people to worship God in ways that are contrary to our laws.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Just as Paul was about to speak in his defense, Gallio interrupted and said, “Wait! If this involved some major crime or fraud, it would be my responsibility to hear the case. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But this is nothing more than a disagreement among yourselves over semantics '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “doctrines.”
    marker-yv: yv-n
  - type: text
    text: 'and personalities '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “names.”
    marker-yv: yv-n
  - type: text
    text: 'and traditions of your own Jewish laws. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “Torah” (the first five books of Moses).
    marker-yv: yv-n
  - type: text
    text: 'Go and settle it yourselves! I refuse to be the judge of these issues.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Gallio dismissed them from the court.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Immediately the crowd turned on Sosthenes, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sosthenes means “savior of our nation.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 1:1
      metadata:
        usfm: 1CO.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'one of the leaders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word used here can mean “priest” or “elder.” Crispus is mentioned as the president or leader (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ACT.18.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Some speculate that Crispus’ term of service had been completed and Sosthenes took his place.
    marker-yv: yv-n
  - type: text
    text: 'of the synagogue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who sided with Paul
  - type: text
    text: . They seized him and beat him up right there in the courtroom! But Gallio showed no concern at all over what was happening.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Priscilla and Aquila
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'After remaining in Corinth several more days, Paul finally bid '
  - type: usfm
    marker: it
    children:
    - type: text
      text: shalom
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shalom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the Hebrew and Aramaic word for “peace and well-being.” The Greek is “farewell.” The Aramaic can also be translated “Paul brought peace to the brothers.”
    marker-yv: yv-n
  - type: text
    text: 'to the believers and sailed away for the coast of Syria, accompanied by Priscilla and Aquila. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Priscilla means “Ancient”; Aquila means “Eagle.”
    marker-yv: yv-n
  - type: text
    text: 'Before they left, Paul had his head shaved at Cenchrea, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cenchrea was one of two major ports of Corinth, possibly where agricultural goods were exported, for Cenchrea means “millet,” a grain similar to quinoa.
    marker-yv: yv-n
  - type: text
    text: because he had taken a vow of dedication.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When they reached Ephesus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ephesus was in the ancient world, a white marble city, one of the most beautiful in the world. It had the temple of Artemis, one of the seven great wonders of that era. It also had two agoras, a beautiful fountain in the city supplied by an aqueduct, the monument of Phillio, the Koressian Gates, the Bouleuterion, a large stadium, and many terraced houses. It was the capital city of the Roman province of Asia and had a population of well over one hundred thousand at the time Paul visited the city. Ephesus was known historically as the center of powerful magical practices and the casting of spells, as well as the cult center of the worship of the Ephesian goddess Artemis, known as “the supreme power.” It was in this backdrop that the apostle Paul and his companions planted the renowned church of Ephesus.
    marker-yv: yv-n
  - type: text
    text: 'Paul left Priscilla and Aquila behind, then he went into the synagogue and spoke to the Jews. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They asked him to stay longer, but he refused '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and said farewell to them, adding, “I will come back to you, if it is God’s will, after I go to Jerusalem to observe the feast.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This last clause is only found in the Aramaic.
    marker-yv: yv-n
  - type: text
    text: Then he set sail from Ephesus for Caesarea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When he arrived there he traveled on to Jerusalem to visit the church and pray for them, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although this clause is missing in the Greek, the Aramaic can be translated “to pray for the peace of the congregation.” A true spiritual father prays for believers and brings them a message of hope and peace.
    marker-yv: yv-n
  - type: text
    text: 'then he left for Antioch. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: After spending some time there, Paul continued on through the region of Galatia and Phyrgia in central Turkey. And wherever he went he encouraged and strengthened the believers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Wherever he went he made them all disciples.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ministry of Apollos
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A Jewish man by the name of Apollos arrived in Ephesus. He was a native of Alexandria '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is Alexandria in Egypt.
    marker-yv: yv-n
  - type: text
    text: 'and was recognized as an educated and cultured man. He was powerful in the Scriptures, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'had accepted Jesus, and had been taught about the Lord. He was spiritually passionate '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “His spirit boiled.”
    marker-yv: yv-n
  - type: text
    text: 'for Jesus and a convincing teacher, although he only knew about the baptism of John. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He fearlessly preached '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, boldly and powerfully. The Aramaic can be translated “with crystal clarity.”
    marker-yv: yv-n
  - type: text
    text: 'in the synagogue. But when Priscilla and Aquila heard Apollos’ teachings, they met with him privately '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “they took him into their home.”
    marker-yv: yv-n
  - type: text
    text: and revealed to him the ways of God more completely.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “more accurately.” They filled in the gaps in his understanding of the Lord Jesus.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
