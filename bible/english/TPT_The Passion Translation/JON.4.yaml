          text: Or “it burned into him.” The contrast is stark. God’s burning anger over destroying Nineveh cooled off and dissipated while Jonah’s anger burned intensely over God not destroying the city. Jonah wished for vengeance; God longed to show mercy. Perhaps Jonah was angry that he now appeared to be a liar to the Ninevites, for his prophecy of doom did not take place (see
