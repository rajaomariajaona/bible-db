verses:
  '1':
  - type: heading
    content: Jonah’s Response to God’s Mercy toward Nineveh
  - type: text
    content: 'Jonah was extremely upset '
  - type: note
    content: Or “It was evil to Jonah, a great evil.”
  - type: text
    content: that God would show mercy to Nineveh
  - type: text
    content: '. Indignant, he fell into a rage. '
  - type: note
    content: 'Or “it burned into him.” The contrast is stark. God’s burning anger over destroying Nineveh cooled off and dissipated while Jonah’s anger burned intensely over God not destroying the city. Jonah wished for vengeance; God longed to show mercy. Perhaps Jonah was angry that he now appeared to be a liar to the Ninevites, for his prophecy of doom did not take place (see Pirke de-Rabbi Eliezer, trans. Gerald Friedlander [New York: Sepher-Hermon Press, 1981], 65–66). Sadly, today there are some who wish judgment upon the world. Yet God has sent us a Savior not to condemn the world but to save all those who believe in him (see John 3:16–17). Every day that judgment is delayed, more people are brought into the kingdom of God. Mercy must always take dominion over judgment in our hearts.'
  '10':
  - type: text
    content: Yahweh
  - type: text
    content: ' replied, “You are concerned for the vine, which you did not plant, nor did you do anything to make it grow. It sprang up one night and died the next. '
  '11':
  - type: text
    content: 'Should I not have compassion for the great city of Nineveh, in which there are more than 120,000 people who cannot tell their right hand from their left, '
  - type: note
    content: That is, infants and toddlers who had not reached the age of understanding the difference between right and left. Indeed, there could have been millions of people living in the region of Nineveh at that time. The book ends not with information about what happened to Jonah but with the wonderful mercy of God that spared a wicked city that repented. How willing therefore is God to spare your city and your nation when they turn to God with sincere, repentant hearts!
  - type: text
    content: to say nothing of all the animals?”
  '2':
  - type: text
    content: 'He prayed to '
  - type: text
    content: Yahweh
  - type: text
    content: ' and said, “God, I knew this is what would happen even before I left home. For I know that you are a tender, compassionate God, who is extremely patient, rich in faithful love. '
  - type: note
    content: See Ex. 34:6; Neh. 9:17; Pss. 86:15; 145:8; Joel 2:13.
  - type: text
    content: 'And I know you are always ready to relent from inflicting disaster. That was why I attempted to flee to Tarshish. '
  '3':
  - type: text
    content: 'So now, '
  - type: text
    content: Yahweh
  - type: text
    content: ', please take my life, for death seems better to me than life.”'
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ' replied, “What good reason do you have to be so angry?”'
  - type: note
    content: The Hebrew is “Does it burn to you rightly?” God was asking his wayward prophet, “Is it right that you are burning with anger?” We should rejoice when God shows mercy to sinners. Jonah rebelled and ran from God, yet the Lord gave Jonah another chance. Jonah had no right to be angry, for he himself had been forgiven by God.
  - type: heading
    content: Jonah Waits to See What Will Happen to Nineveh
  '5':
  - type: text
    content: 'Then Jonah went out '
  - type: note
    content: 'It is possible that vv. 5–11 are a flashback or a coda to the book. If so, the verbs need to be understood as pluperfect: “Jonah had gone out. . . . He had made a shelter.” Regardless, vv. 5–11 serve to show that Jonah had no right to be angry when God had determined to show mercy to sinners.'
  - type: text
    content: 'east of Nineveh, '
  - type: note
    content: Jonah’s home was west of Nineveh; he went east instead.
  - type: text
    content: 'where he made himself a makeshift shelter. He sat there under its shade waiting to see what would happen to the city. '
  - type: note
    content: It is possible that Jonah was hoping to see the people of Nineveh relapse into sin and bring God’s punishment upon themselves.
  '6':
  - type: text
    content: 'Now Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' arranged for a '
  - type: text
    content: gourd
  - type: text
    content: ' plant '
  - type: note
    content: The Hebrew qiqayon simply means “a plant.” It was possibly a climbing gourd or the castor oil plant.
  - type: text
    content: 'to grow up over Jonah to provide him shade to rest in and to soothe his sour demeanor. '
  - type: note
    content: Or “his evil.”
  - type: text
    content: 'Jonah was thrilled with the plant. '
  '7':
  - type: text
    content: 'But at dawn the next day, God sent a worm to chew through the plant—and it withered. '
  '8':
  - type: text
    content: 'As the sun rose into the sky, God sent a scorching '
  - type: note
    content: The adjectival term charishit here is derived from the verb charash, which carries the meaning “to be silent” or “to be quiet.” But a reference to a “silent east wind” makes no sense in this context. In relation to the nature of a “wind,” the rendering of a “very hot” or “scorching” wind makes much better sense, given the impact it had on Jonah.
  - type: text
    content: east wind. The wind and blazing sun beat down so hard on Jonah’s head that he was starting to faint. So he begged God to end his life, saying, “I’m better off dead than alive.”
  '9':
  - type: text
    content: God said to Jonah, “Are you right to be so angry about the plant that gave you shade?”
  - type: text
    content: He replied, “I have every right to be angry, angry enough to die!”
  - type: note
    content: Jonah grieved over the loss of his shade but was seemingly unconcerned about the loss of many lives in Nineveh. Do you long for God to show mercy to those who do not believe in Jesus? God spared Jonah’s life, the sailors’ lives, and, mercifully, the lives of the people of Nineveh. God is our Savior.
