        - type: text
          text: Jonah grieved over the loss of his shade but was seemingly unconcerned about the loss of many lives in Nineveh. Do you long for God to show mercy to those who do not believe in Jesus? God spared Jonah’s life, the sailors’ lives, and, mercifully, the lives of the people of Nineveh. God is our Savior.
