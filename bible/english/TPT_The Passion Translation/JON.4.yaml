        - type: text
          text: The Hebrew is “Does it burn to you rightly?” God was asking his wayward prophet, “Is it right that you are burning with anger?” We should rejoice when God shows mercy to sinners. Jonah rebelled and ran from God, yet the Lord gave Jonah another chance. Jonah had no right to be angry, for he himself had been forgiven by God.
