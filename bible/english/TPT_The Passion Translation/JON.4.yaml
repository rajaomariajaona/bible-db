        children:
        - type: text
          text: That is, infants and toddlers who had not reached the age of understanding the difference between right and left. Indeed, there could have been millions of people living in the region of Nineveh at that time. The book ends not with information about what happened to Jonah but with the wonderful mercy of God that spared a wicked city that repented. How willing therefore is God to spare your city and your nation when they turn to God with sincere, repentant hearts!
      marker-yv: yv-n
    - type: text
      text: to say nothing of all the animals?”
