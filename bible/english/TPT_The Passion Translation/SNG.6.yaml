document_id: SNG.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Brides-to-Be
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O rarest of beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where then has your lover gone?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We long to see him too.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where may we find him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will follow you as you seek after him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My lover has gone down
- type: usfm
  marker: q1
  children:
  - type: text
    text: into his garden of delight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to the flowerbeds of spices
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus went down into a garden tomb and lay in a flowerbed of spices. In his death, he was longing to gather his bride from her broken place. He met us there with him in his tomb, for we are the lilies he longs to gather. Adam fell in a garden, and in his garden tomb, Jesus gathered the chosen of Adam’s race and made them his where he lay in the flowerbed of spices.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: to feast with those pure in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I am fully devoted to my beloved,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my beloved is fully devoted to me.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom-King
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O my beloved, you are lovely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When I see you in your beauty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I see a radiant city where we will dwell as one.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The text includes a reference to Jerusalem. For the Jew, it is the city where God and man lived together. For the believer, it points to the New Jerusalem, where God and man dwell in holy union.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: More pleasing than any pleasure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: more delightful than any delight,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you have ravished my heart,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: stealing away my strength to resist you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Even hosts of angels stand in awe of you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This is how various Hebrew scholars have interpreted the phrase: “[you are] awe inspiring, as an army with banners.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Turn your eyes from me; I can’t take it anymore!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I can’t resist the passion of these eyes that I adore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Overpowered by a glance, my ravished heart—undone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Held captive by your love, I am truly overcome!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “overcome” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rahab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Like the harlot who was chosen, favored, saved from Jericho’s destruction, and included in the genealogy of Jesus, so you have “overcome” his heart. No one would have thought Rahab would be so honored, and many have said that about you. You have overcome many things, but to overcome him is love’s delight.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For your undying devotion to me
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is the most yielded sacrifice.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “Your hair is like a wave of goats streaming down Mount Gilead.” We see hair as a picture of our devotion to Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 4:1
      metadata:
        usfm: SNG.4.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The shining of your spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word used in most translations is “teeth,” which is taken from a Hebrew root word that some believe means “white” or “shining.” With our teeth we chew the Word of God and process its truths.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: shows how you have taken my truth
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to become balanced and complete.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your beautiful blushing cheeks
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: reveal how real your passion is for me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even hidden behind your veil of humility.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I could have chosen any from among the vast multitude
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of royal ones who follow me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text literally means “sixty queens, eighty brides, and endless numbers of women.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But unique is my beloved dove—unrivaled in beauty,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: without equal, beyond compare,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the perfect one, the favorite one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Others see your beauty and sing of your joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Brides and queens chant your praise:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How blessed is she!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Look at you now—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: arising as the dayspring of the dawn,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: fair as the shining moon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: bright and brilliant as the sun in all its strength—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: astonishing to behold as a majestic army
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: waving banners of victory.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I decided to go down to the valley streams
- type: usfm
  marker: q1
  children:
  - type: text
    text: where the orchards of the king grow and mature.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I longed to know if hearts were opening.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are the budding vines blooming with new growth?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has their springtime of passionate love arrived?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Then suddenly my longings transported me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My divine desire brought me next to my beloved prince,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sitting with him in his royal chariot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We were lifted up together!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Considered to be the most difficult verse to translate in the Song of Songs, the meaning of the Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zion Maidens, Brides-to-Be
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Come back! Return to us, O maiden of his majesty.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dance for us as we gaze upon your beauty.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why would you seek a mere Shulamite like me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why would you want to see my dance of love?
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom-King
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Because you dance so gracefully,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as though you danced with angels!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is literally “the dance of Mahanaim” or “the dance of two armies.” When Jacob (Israel) returned to the promised land, he entered at Mahanaim, the place where two camps of angels gathered. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 32:1–2
      metadata:
        usfm: GEN.32.1+GEN.32.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and the footnote on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 32:2
      metadata:
        usfm: GEN.32.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
