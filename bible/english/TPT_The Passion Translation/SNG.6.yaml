document_id: SNG.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Brides-to-Be
  - type: text
    content: O rarest of beauty,
  - type: text
    content: where then has your lover gone?
  - type: text
    content: We long to see him too.
  - type: text
    content: Where may we find him?
  - type: text
    content: We will follow you as you seek after him.
  - type: heading
    content: The Shulamite Bride
  '10':
  - type: text
    content: Look at you now—
  - type: text
    content: arising as the dayspring of the dawn,
  - type: text
    content: fair as the shining moon,
  - type: text
    content: bright and brilliant as the sun in all its strength—
  - type: text
    content: astonishing to behold as a majestic army
  - type: text
    content: waving banners of victory.
  - type: heading
    content: The Shulamite Bride
  '11':
  - type: text
    content: I decided to go down to the valley streams
  - type: text
    content: where the orchards of the king grow and mature.
  - type: text
    content: I longed to know if hearts were opening.
  - type: text
    content: Are the budding vines blooming with new growth?
  - type: text
    content: Has their springtime of passionate love arrived?
  '12':
  - type: text
    content: Then suddenly my longings transported me.
  - type: text
    content: My divine desire brought me next to my beloved prince,
  - type: text
    content: sitting with him in his royal chariot.
  - type: text
    content: We were lifted up together!
  - type: note
    content: Considered to be the most difficult verse to translate in the Song of Songs, the meaning of the Hebrew is uncertain.
  - type: heading
    content: Zion Maidens, Brides-to-Be
  '13':
  - type: text
    content: Come back! Return to us, O maiden of his majesty.
  - type: text
    content: Dance for us as we gaze upon your beauty.
  - type: heading
    content: The Shulamite Bride
  - type: text
    content: Why would you seek a mere Shulamite like me?
  - type: text
    content: Why would you want to see my dance of love?
  - type: heading
    content: The Bridegroom-King
  - type: text
    content: Because you dance so gracefully,
  - type: text
    content: as though you danced with angels!
  - type: note
    content: This is literally “the dance of Mahanaim” or “the dance of two armies.” When Jacob (Israel) returned to the promised land, he entered at Mahanaim, the place where two camps of angels gathered. See Gen. 32:1–2 and the footnote on 32:2.
  '2':
  - type: text
    content: My lover has gone down
  - type: text
    content: into his garden of delight,
  - type: text
    content: to the flowerbeds of spices
  - type: note
    content: Jesus went down into a garden tomb and lay in a flowerbed of spices. In his death, he was longing to gather his bride from her broken place. He met us there with him in his tomb, for we are the lilies he longs to gather. Adam fell in a garden, and in his garden tomb, Jesus gathered the chosen of Adam’s race and made them his where he lay in the flowerbed of spices.
  - type: text
    content: to feast with those pure in heart.
  '3':
  - type: text
    content: I am fully devoted to my beloved,
  - type: text
    content: and my beloved is fully devoted to me.
  - type: heading
    content: The Bridegroom-King
  '4':
  - type: text
    content: O my beloved, you are lovely.
  - type: text
    content: When I see you in your beauty,
  - type: text
    content: I see a radiant city where we will dwell as one.
  - type: note
    content: The text includes a reference to Jerusalem. For the Jew, it is the city where God and man lived together. For the believer, it points to the New Jerusalem, where God and man dwell in holy union.
  - type: text
    content: More pleasing than any pleasure,
  - type: text
    content: more delightful than any delight,
  - type: text
    content: you have ravished my heart,
  - type: text
    content: stealing away my strength to resist you.
  - type: text
    content: Even hosts of angels stand in awe of you.
  - type: note
    content: 'This is how various Hebrew scholars have interpreted the phrase: “[you are] awe inspiring, as an army with banners.”'
  '5':
  - type: text
    content: Turn your eyes from me; I can’t take it anymore!
  - type: text
    content: I can’t resist the passion of these eyes that I adore.
  - type: text
    content: Overpowered by a glance, my ravished heart—undone.
  - type: text
    content: Held captive by your love, I am truly overcome!
  - type: note
    content: The Hebrew word for “overcome” is rahab. Like the harlot who was chosen, favored, saved from Jericho’s destruction, and included in the genealogy of Jesus, so you have “overcome” his heart. No one would have thought Rahab would be so honored, and many have said that about you. You have overcome many things, but to overcome him is love’s delight.
  - type: text
    content: For your undying devotion to me
  - type: text
    content: is the most yielded sacrifice.
  - type: note
    content: Literally “Your hair is like a wave of goats streaming down Mount Gilead.” We see hair as a picture of our devotion to Christ. See Song. 4:1 and footnote.
  '6':
  - type: text
    content: The shining of your spirit
  - type: note
    content: The word used in most translations is “teeth,” which is taken from a Hebrew root word that some believe means “white” or “shining.” With our teeth we chew the Word of God and process its truths.
  - type: text
    content: shows how you have taken my truth
  - type: text
    content: to become balanced and complete.
  '7':
  - type: text
    content: Your beautiful blushing cheeks
  - type: text
    content: reveal how real your passion is for me,
  - type: text
    content: even hidden behind your veil of humility.
  '8':
  - type: text
    content: I could have chosen any from among the vast multitude
  - type: text
    content: of royal ones who follow me.
  - type: note
    content: The Hebrew text literally means “sixty queens, eighty brides, and endless numbers of women.”
  '9':
  - type: text
    content: But unique is my beloved dove—unrivaled in beauty,
  - type: text
    content: without equal, beyond compare,
  - type: text
    content: the perfect one, the favorite one.
  - type: text
    content: Others see your beauty and sing of your joy.
  - type: text
    content: 'Brides and queens chant your praise:'
  - type: text
    content: “How blessed is she!”
