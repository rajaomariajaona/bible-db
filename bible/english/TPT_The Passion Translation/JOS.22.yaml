  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When Phineas the priest, and the princes of the tribes heard the explanation of the tribes of Reuben, Gad, and East Manasseh, they were satisfied. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Phineas son of Eleazar the priest said to them, “Now we know that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is among us! Since you have not rebelled against him, you have indeed saved the Israelites from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s punishment.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Phineas and the ten princes of the western tribes returned to the land of Canaan and told the people of Israel everything that happened. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The outcome pleased the Israelites and they praised God. They spoke no more of going to war against the eastern tribes to destroy the land where they had lived. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The Reubenites and the Gadites called the altar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Witness
  - type: text
    text: ', for they said, “The altar stands as a witness to us all that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is God.”'
  - type: usfm
    marker: f
