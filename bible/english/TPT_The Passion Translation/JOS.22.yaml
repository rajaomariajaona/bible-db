document_id: JOS.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Eastern Tribes Return to Their Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Joshua summoned all the men of the tribes of Reuben, Gad, and East Manasseh '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and said to them, “You have done all that Moses the servant of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' commanded, and you have obeyed me in everything I commanded. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Through it all, you’ve never deserted your fellow Israelites '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and were always there to help them
  - type: text
    text: '. You’ve completed every task given to you by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' your God. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yes, he has promised peace to your fellow Israelites, and he has kept that promise. So now, return to the homeland east of the Jordan which Moses, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s servant, assigned to you. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Make sure you obey every command and instruction Moses, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s servant, gave you. Love '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! He is your God, so walk in his ways and obey his commands! Cling to him and serve him diligently with all your heart and with all your soul!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Joshua spoke a blessing over them and sent them on their way, and they settled there. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “they went to their tents.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'To one half of the tribe of Manasseh, Moses had assigned land in Bashan. To the other half, Joshua assigned land on the west side of the Jordan with their fellow Israelites. Joshua blessed them and sent them off to their homes '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'with these words: “You are free to go. You leave for your homes rich—with great herds of cattle, silver and gold, bronze and iron, and a great quantity of clothing! Share with your friends and families everything you took from your enemies.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So the tribes of Reuben, Gad, and East Manasseh left their fellow Israelites at Shiloh in Canaan and returned to Gilead, their homeland. For Moses had told them before he died, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' wants you to take this land for your own.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribes East of the Jordan Build an Altar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On their way home, the tribes of Reuben, Gad, and East Manasseh came to the town of Geliloth near the Jordan River. So they built their own large, impressive altar there. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text is somewhat ambiguous. Although some scholars (including the historian Josephus) believe the altar was on the east side of the river, it is more likely they built it on the west bank before they crossed over.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'When the rest of the Israelites heard that the people of the tribe of Reuben, Gad, and East Manasseh had built an altar at Geliloth at the entrance to the land of Canaan, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: they gathered at Shiloh to go to war against them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'The Israelites of the ten western tribes sent a delegation to the tribes of Reuben, Gad, and East Manasseh in the land of Gilead. They sent Phineas '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Phineas, the grandson of Aaron, was known for his zeal for
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: in resisting apostasy. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 25:11–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 2:4–6
      metadata:
        usfm: MAL.2.4+MAL.2.5+MAL.2.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The name
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Phineas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “mouth of brass [judgment].”
    marker-yv: yv-n
  - type: text
    text: 'son of Eleazar the priest, together with ten respected clan leaders, princes from each of their ten tribes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So they came to the people in the land of Gilead, to the tribes of Reuben, Gad, and East Manasseh. Phineas and the men with him said, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“We speak to you on behalf of all '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s people. Why did you rebel against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and build this altar for yourselves? Why did you quit following the God of Israel and do such an evil thing? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Haven’t we had enough trouble from the terrible sin '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Was that sin too little for us?” The implication is that building an altar to any god other than
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: would be worse than the sin the Israelites committed at Peor, which released an epidemic that killed twenty-four thousand. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 25:1–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Peor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “opening.” Their sin at Peor became an opening for darkness and sickness among them. Peor was the mountain where Balak attempted to entice Balaam to pronounce a curse upon Israel. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 23:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'we committed at Peor? There a plague came upon us even though we belong to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. To this day, our conscience is stained and we still suffer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “we have yet to cleanse ourselves.” This statement shows the depth to which their sin had rooted itself in the conscience of the nation.
    marker-yv: yv-n
  - type: text
    text: 'from our atrocious deeds. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'How dare you turn back from following '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! If you rebel against him today, he will be angry with everyone in Israel tomorrow. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: They were asserting that the altar constituted a rebellion against God and against the unity of the nation which was to worship
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: at Shiloh. The centralization of the worship of God’s people was at stake. Collective guilt can be a “plague” on the moral conscience of a nation.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'If you think your land is defiled, then come back to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s land, where his tabernacle stands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at Shiloh
  - type: text
    text: '. But don’t rebel against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' or us by building for yourself an altar. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Don’t forget what happened to Achan! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' told us, ‘Destroy everything in the city of Jericho.’ But Achan son of Zerah did not obey '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s command regarding the devoted things, and so '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' punished us all. Achan died because of what he did, and so did many other Israelites because of Achan’s sin.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reconciliation of the Tribes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The Reubenites, the Gadites, and the half-tribe of Manasseh answered the princes of the tribes of Israel: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is the God of all gods! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is the God of all gods! We appeal to God Almighty '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as our witness
  - type: text
    text: '. He knows why we did this, and we want you to know too! If we rebelled or betrayed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', then you may take our lives today. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But we built this altar with no intention of burning any kind of sacrifices '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “burnt sacrifices, grain offerings, or peace offerings.” The evident intention of listing these three types of sacrifice is to be comprehensive.
    marker-yv: yv-n
  - type: text
    text: 'on it. If we built this altar in rebellion against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' or to break our covenant with him, then may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' himself punish us. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 24-25
  - type: text
    text: 'No! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: We love
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: it
    children:
    - type: text
      text: '!'
  - type: text
    text: ' We were afraid that in the future your descendants will say '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:24–25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When we are afraid of what people will say, we are walking in fear, not faith. This entire episode could have been prevented if the two and a half tribes had consulted with the others beforehand.
    marker-yv: yv-n
  - type: text
    text: to our descendants, ‘
  - type: usfm
    marker: it
    children:
    - type: text
      text: Who are you?
  - type: text
    text: ' What right do you have to worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel? He has placed the Jordan River as a barrier between our people and your people. You Reubenites and Gadites have no part in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the worship of
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '.’ And your descendants may prevent ours from worshiping him. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'We did build an altar, but not for burning sacrifices or making offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'We built this altar to show to our people and to your people and to the generations to come that we will worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' at his tabernacle. We will bring all our offerings into '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s presence there so that your children may never say to our children in the future, ‘You have no part in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the worship of
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '.’ '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'We have decided among us that if that day should ever come, our descendants would reply: ‘See the replica of the altar of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', which our fathers made here '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the border between us
  - type: text
    text: '—not for burnt offerings or sacrifices, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'but as a witness '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that we both serve the same God
  - type: text
    text: '.’ '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Far be it from us to rebel against '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' or to turn away from following him this day by building an altar on which to present offerings or make sacrifices to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' our God. We would never build an altar to take the place of the altar which stands before his tabernacle, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the place of his presence
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
