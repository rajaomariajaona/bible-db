document_id: JOS.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Eastern Tribes Return to Their Land
  - type: text
    content: 'Then Joshua summoned all the men of the tribes of Reuben, Gad, and East Manasseh '
  '10':
  - type: text
    content: 'On their way home, the tribes of Reuben, Gad, and East Manasseh came to the town of Geliloth near the Jordan River. So they built their own large, impressive altar there. '
  - type: note
    content: The Hebrew text is somewhat ambiguous. Although some scholars (including the historian Josephus) believe the altar was on the east side of the river, it is more likely they built it on the west bank before they crossed over.
  '11':
  - type: text
    content: 'When the rest of the Israelites heard that the people of the tribe of Reuben, Gad, and East Manasseh had built an altar at Geliloth at the entrance to the land of Canaan, '
  '12':
  - type: text
    content: they gathered at Shiloh to go to war against them.
  '13':
  - type: text
    content: 'The Israelites of the ten western tribes sent a delegation to the tribes of Reuben, Gad, and East Manasseh in the land of Gilead. They sent Phineas '
  - type: note
    content: Phineas, the grandson of Aaron, was known for his zeal for Yahweh in resisting apostasy. See Num. 25:11–12; Mal. 2:4–6. The name Phineas means “mouth of brass [judgment].”
  - type: text
    content: 'son of Eleazar the priest, together with ten respected clan leaders, princes from each of their ten tribes. '
  '15':
  - type: text
    content: 'So they came to the people in the land of Gilead, to the tribes of Reuben, Gad, and East Manasseh. Phineas and the men with him said, '
  '16':
  - type: text
    content: '“We speak to you on behalf of all '
  - type: text
    content: Yahweh
  - type: text
    content: '’s people. Why did you rebel against '
  - type: text
    content: Yahweh
  - type: text
    content: ' and build this altar for yourselves? Why did you quit following the God of Israel and do such an evil thing? '
  '17':
  - type: text
    content: 'Haven’t we had enough trouble from the terrible sin '
  - type: note
    content: Or “Was that sin too little for us?” The implication is that building an altar to any god other than Yahweh would be worse than the sin the Israelites committed at Peor, which released an epidemic that killed twenty-four thousand. See Num. 25:1–9. Peor means “opening.” Their sin at Peor became an opening for darkness and sickness among them. Peor was the mountain where Balak attempted to entice Balaam to pronounce a curse upon Israel. See Num. 23:28.
  - type: text
    content: 'we committed at Peor? There a plague came upon us even though we belong to '
  - type: text
    content: Yahweh
  - type: text
    content: '. To this day, our conscience is stained and we still suffer '
  - type: note
    content: Or “we have yet to cleanse ourselves.” This statement shows the depth to which their sin had rooted itself in the conscience of the nation.
  - type: text
    content: 'from our atrocious deeds. '
  '18':
  - type: text
    content: 'How dare you turn back from following '
  - type: text
    content: Yahweh
  - type: text
    content: '! If you rebel against him today, he will be angry with everyone in Israel tomorrow. '
  - type: note
    content: They were asserting that the altar constituted a rebellion against God and against the unity of the nation which was to worship Yahweh at Shiloh. The centralization of the worship of God’s people was at stake. Collective guilt can be a “plague” on the moral conscience of a nation.
  '19':
  - type: text
    content: 'If you think your land is defiled, then come back to '
  - type: text
    content: Yahweh
  - type: text
    content: '’s land, where his tabernacle stands '
  - type: text
    content: at Shiloh
  - type: text
    content: '. But don’t rebel against '
  - type: text
    content: Yahweh
  - type: text
    content: ' or us by building for yourself an altar. '
  '2':
  - type: text
    content: 'and said to them, “You have done all that Moses the servant of '
  - type: text
    content: Yahweh
  - type: text
    content: ' commanded, and you have obeyed me in everything I commanded. '
  '20':
  - type: text
    content: 'Don’t forget what happened to Achan! '
  - type: text
    content: Yahweh
  - type: text
    content: ' told us, ‘Destroy everything in the city of Jericho.’ But Achan son of Zerah did not obey '
  - type: text
    content: Yahweh
  - type: text
    content: '’s command regarding the devoted things, and so '
  - type: text
    content: Yahweh
  - type: text
    content: ' punished us all. Achan died because of what he did, and so did many other Israelites because of Achan’s sin.”'
  - type: heading
    content: Reconciliation of the Tribes
  '21':
  - type: text
    content: 'The Reubenites, the Gadites, and the half-tribe of Manasseh answered the princes of the tribes of Israel: '
  '22':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' is the God of all gods! '
  - type: text
    content: Yahweh
  - type: text
    content: ' is the God of all gods! We appeal to God Almighty '
  - type: text
    content: as our witness
  - type: text
    content: '. He knows why we did this, and we want you to know too! If we rebelled or betrayed '
  - type: text
    content: Yahweh
  - type: text
    content: ', then you may take our lives today. '
  '23':
  - type: text
    content: 'But we built this altar with no intention of burning any kind of sacrifices '
  - type: note
    content: Or “burnt sacrifices, grain offerings, or peace offerings.” The evident intention of listing these three types of sacrifice is to be comprehensive.
  - type: text
    content: 'on it. If we built this altar in rebellion against '
  - type: text
    content: Yahweh
  - type: text
    content: ' or to break our covenant with him, then may '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself punish us. '
  '24':
  - type: text
    content: 'No! '
  - type: text
    content: We love
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: ' We were afraid that in the future your descendants will say '
  - type: note
    content: When we are afraid of what people will say, we are walking in fear, not faith. This entire episode could have been prevented if the two and a half tribes had consulted with the others beforehand.
  - type: text
    content: to our descendants, ‘
  - type: text
    content: Who are you?
  - type: text
    content: ' What right do you have to worship '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel? He has placed the Jordan River as a barrier between our people and your people. You Reubenites and Gadites have no part in '
  - type: text
    content: the worship of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: '.’ And your descendants may prevent ours from worshiping him. '
  '26':
  - type: text
    content: 'We did build an altar, but not for burning sacrifices or making offerings. '
  '27':
  - type: text
    content: 'We built this altar to show to our people and to your people and to the generations to come that we will worship '
  - type: text
    content: Yahweh
  - type: text
    content: ' at his tabernacle. We will bring all our offerings into '
  - type: text
    content: Yahweh
  - type: text
    content: '’s presence there so that your children may never say to our children in the future, ‘You have no part in '
  - type: text
    content: the worship of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: '.’ '
  '28':
  - type: text
    content: 'We have decided among us that if that day should ever come, our descendants would reply: ‘See the replica of the altar of '
  - type: text
    content: Yahweh
  - type: text
    content: ', which our fathers made here '
  - type: text
    content: at the border between us
  - type: text
    content: '—not for burnt offerings or sacrifices, '
  - type: note
    content: See Deut. 12:4; 13–14.
  - type: text
    content: 'but as a witness '
  - type: text
    content: that we both serve the same God
  - type: text
    content: '.’ '
  '29':
  - type: text
    content: 'Far be it from us to rebel against '
  - type: text
    content: Yahweh
  - type: text
    content: ' or to turn away from following him this day by building an altar on which to present offerings or make sacrifices to '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God. We would never build an altar to take the place of the altar which stands before his tabernacle, '
  - type: text
    content: the place of his presence
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Through it all, you’ve never deserted your fellow Israelites '
  - type: text
    content: and were always there to help them
  - type: text
    content: '. You’ve completed every task given to you by '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God. '
  '30':
  - type: text
    content: 'When Phineas the priest, and the princes of the tribes heard the explanation of the tribes of Reuben, Gad, and East Manasseh, they were satisfied. '
  '31':
  - type: text
    content: 'Phineas son of Eleazar the priest said to them, “Now we know that '
  - type: text
    content: Yahweh
  - type: text
    content: ' is among us! Since you have not rebelled against him, you have indeed saved the Israelites from '
  - type: text
    content: Yahweh
  - type: text
    content: ’s punishment.”
  '32':
  - type: text
    content: 'Then Phineas and the ten princes of the western tribes returned to the land of Canaan and told the people of Israel everything that happened. '
  '33':
  - type: text
    content: 'The outcome pleased the Israelites and they praised God. They spoke no more of going to war against the eastern tribes to destroy the land where they had lived. '
  '34':
  - type: text
    content: 'The Reubenites and the Gadites called the altar '
  - type: text
    content: Witness
  - type: text
    content: ', for they said, “The altar stands as a witness to us all that '
  - type: text
    content: Yahweh
  - type: text
    content: ' is God.”'
  - type: note
    content: How soon we forget all that God has accomplished for us! In a little over four centuries, the meaning of the altar of witness had been forgotten. See 1 Chron. 5:25–26.
  '4':
  - type: text
    content: 'Yes, he has promised peace to your fellow Israelites, and he has kept that promise. So now, return to the homeland east of the Jordan which Moses, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant, assigned to you. '
  '5':
  - type: text
    content: 'Make sure you obey every command and instruction Moses, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant, gave you. Love '
  - type: text
    content: Yahweh
  - type: text
    content: '! He is your God, so walk in his ways and obey his commands! Cling to him and serve him diligently with all your heart and with all your soul!”'
  '6':
  - type: text
    content: 'Then Joshua spoke a blessing over them and sent them on their way, and they settled there. '
  - type: note
    content: Or “they went to their tents.”
  '7':
  - type: text
    content: 'To one half of the tribe of Manasseh, Moses had assigned land in Bashan. To the other half, Joshua assigned land on the west side of the Jordan with their fellow Israelites. Joshua blessed them and sent them off to their homes '
  '8':
  - type: text
    content: 'with these words: “You are free to go. You leave for your homes rich—with great herds of cattle, silver and gold, bronze and iron, and a great quantity of clothing! Share with your friends and families everything you took from your enemies.”'
  '9':
  - type: text
    content: So the tribes of Reuben, Gad, and East Manasseh left their fellow Israelites at Shiloh in Canaan and returned to Gilead, their homeland. For Moses had told them before he died, “
  - type: text
    content: Yahweh
  - type: text
    content: ' wants you to take this land for your own.”'
  - type: heading
    content: The Tribes East of the Jordan Build an Altar
