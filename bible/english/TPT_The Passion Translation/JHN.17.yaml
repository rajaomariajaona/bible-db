document_id: JHN.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Finished the Father’s Work
  - type: text
    content: This is what Jesus prayed as he looked up into heaven,
  - type: text
    content: “Father, the time has come.
  - type: text
    content: Unveil the glorious splendor of your Son
  - type: note
    content: Or “Glorify your Son!” The Father unveiled the glory of his Son on the cross, by the empty tomb, through his ascension into heaven, and by the mighty outpouring of the Holy Spirit upon his church.
  - type: text
    content: so that I will magnify your glory!
  '10':
  - type: text
    content: For all who belong to me now belong to you.
  - type: text
    content: And all who belong to you now belong to me as well,
  - type: text
    content: and my glory is revealed through
  - type: text
    content: ' '
  - type: text
    content: their surrendered lives.
  - type: note
    content: Or “I am glorified in them.”
  '11':
  - type: text
    content: “Holy Father, I am about to leave this world
  - type: note
    content: Or “I am no longer in the world.”
  - type: text
    content: to return and be with you,
  - type: text
    content: but my disciples will remain here.
  - type: text
    content: Holy Father, each one that you have given me,
  - type: text
    content: 'keep them in your name '
  - type: text
    content: so that they will be united
  - type: text
    content: as one, even as we are one.
  '12':
  - type: text
    content: While I was with these that you have given me,
  - type: note
    content: See footnote on v. 11.
  - type: text
    content: I was guarding them and keeping them in your name.
  - type: text
    content: Not one of them is lost,
  - type: text
    content: except the one that was destined to be lost,
  - type: note
    content: Or “son of perdition,” which is a Semitic idiom that means “to be destined to destruction.” This obviously refers to Judas, the betrayer. See also Ps. 41:9; John 6:70.
  - type: text
    content: so that the Scripture would be fulfilled.
  '13':
  - type: text
    content: “But now I am returning to you so Father,
  - type: text
    content: I pray
  - type: text
    content: ' '
  - type: note
    content: Or “I speak these things [this prayer] in the world [before I leave].”
  - type: text
    content: that they will experience
  - type: text
    content: and enter into my joyous delight in you
  - type: note
    content: This “delight” is more than happiness. It is the complete satisfaction that comes in knowing that our lives are pleasing to the Father and that we fulfill his desires on the earth. This is the delight that Jesus shares with us and prays that we would experience.
  - type: text
    content: so that it is fulfilled in them and overflows.
  '14':
  - type: text
    content: I have given them your message
  - type: text
    content: and that is why the unbelieving world hates them.
  - type: text
    content: For their allegiance is no longer to this world
  - type: text
    content: because I am not of this world.
  '15':
  - type: text
    content: I am not asking that you remove them from the world,
  - type: text
    content: but I ask that you guard their hearts from evil,
  - type: note
    content: Or “the Evil One” (or “Satan”). The implication is that the disciples of Jesus will influence the systems of this world but need to be preserved from evil influences.
  '16':
  - type: text
    content: For they no longer belong to this world any more than I do.
  '17':
  - type: text
    content: “Your Word is truth! So make them holy by the truth.
  '18':
  - type: text
    content: I have commissioned them to represent me
  - type: text
    content: just as you commissioned me to represent you.
  '19':
  - type: text
    content: And now I dedicate myself to them as a holy sacrifice
  - type: text
    content: so that they will live as fully dedicated to God
  - type: text
    content: and be made holy by your truth.”
  - type: note
    content: The Aramaic can be translated “And in their sight I will glorify [consecrate] myself, so that they will be glorified [consecrated] by the truth.”
  - type: heading
    content: Jesus Prays for You
  '2':
  - type: text
    content: You have already given me authority
  - type: note
    content: The Aramaic is translated “responsibility.”
  - type: text
    content: over all people so that I may give
  - type: text
    content: the gift of eternal life to all those that you have given to me.
  '20':
  - type: text
    content: “And I ask not only for these disciples,
  - type: text
    content: but also for all those who will one day
  - type: text
    content: believe in me through their message.
  '21':
  - type: text
    content: I pray for them all to be joined together as one
  - type: note
    content: Jesus prayed for the birth of the church, made up of Jewish and non-Jewish believers.
  - type: text
    content: even as you and I, Father, are joined together as one.
  - type: text
    content: I pray for them to become one with us
  - type: note
    content: Or “in us.”
  - type: text
    content: so that the world will recognize that you sent me.
  '22':
  - type: text
    content: For the very glory you have given to me I have given them
  - type: text
    content: so that they will be joined together as one
  - type: text
    content: and experience the same unity that we enjoy.
  - type: note
    content: It is important to note that the key to unity among believers is experiencing the glory of God that Jesus has imparted to us. As one with God through faith in Christ, he shares his glory with us, since we are not “another,” but have been made one with the triune God through the blood of Jesus. See Isa. 42:8.
  '23':
  - type: text
    content: You live fully in me and now I live fully in them
  - type: text
    content: so that they will experience perfect unity,
  - type: note
    content: The Aramaic is “shrink into one.” When we see Jesus in one another, our vaulted opinions of ourselves will shrink.
  - type: text
    content: and the world will be convinced that you have sent me,
  - type: text
    content: for they will see that you love each one of them
  - type: text
    content: with the same passionate love that you have for me.
  '24':
  - type: text
    content: “Father, I ask that you allow everyone that you have given to me
  - type: text
    content: to be with me where I am!
  - type: note
    content: This is experienced not only after we die, but also took place when the ascended Christ took us up into the heavenly realm and seated us at his side with the Father. See Eph. 2:6; Col. 3:1–4.
  - type: text
    content: Then they will see my full glory—
  - type: text
    content: the very splendor you have placed upon me
  - type: text
    content: because you have loved me even before the beginning of time.
  '25':
  - type: text
    content: “You are my righteous Father,
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: but the unbelieving world has never known you
  - type: text
    content: in the perfect way that I know you!
  - type: text
    content: And all those who believe in me
  - type: note
    content: The Greek is simply “these” (disciples).
  - type: text
    content: also know that you have sent me!
  '26':
  - type: text
    content: I have revealed to them who you are
  - type: note
    content: Or “I have revealed your name to them.”
  - type: text
    content: and I will continue to make you even more real to them,
  - type: text
    content: so that they may experience the same endless love
  - type: text
    content: that you have for me,
  - type: text
    content: for your love will now live in them, even as I live in them!”
  '3':
  - type: text
    content: Eternal life means to know and experience you
  - type: text
    content: as the only true God,
  - type: note
    content: The Aramaic is translated “the God of truth.” This alludes to Deut. 6:4.
  - type: text
    content: and to know and experience Jesus Christ,
  - type: text
    content: as the Son whom you have sent.
  '4':
  - type: text
    content: I have glorified you on the earth
  - type: text
    content: by faithfully doing everything you’ve told me to do.
  '5':
  - type: text
    content: So my Father, restore me back to the glory
  - type: text
    content: that we shared together when we were face-to-face
  - type: text
    content: before the universe was created.”
  - type: note
    content: The Aramaic is translated “before the light of the universe.”
  - type: heading
    content: Jesus Prays for His Disciples
  '6':
  - type: text
    content: “Father, I have manifested who you really are
  - type: text
    content: and I have revealed you
  - type: text
    content: ' '
  - type: note
    content: Or “I have made known your name.” The Greek word, phaneroo, means “to make visible,” “to manifest,” “to reveal,” and “to be plainly recognized.” (See Strong’s Concordance, Gr. 5319.)
  - type: text
    content: to the men and women
  - type: text
    content: that you gave to me.
  - type: note
    content: Or “you gave to me out of the world.”
  - type: text
    content: They were yours, and you gave them to me,
  - type: text
    content: and they have fastened your Word firmly to their hearts.
  '7':
  - type: text
    content: And now at last they know that everything I have is a gift from you,
  '8':
  - type: text
    content: And the very words you gave to me to speak
  - type: text
    content: I have passed on to them.
  - type: text
    content: They have received your words
  - type: text
    content: and
  - type: text
    content: ' '
  - type: text
    content: carry them in their hearts.
  - type: text
    content: They are convinced that I have come from your presence,
  - type: text
    content: and they have fully believed that you sent me to represent you.
  '9':
  - type: text
    content: So with deep love,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can be translated “I desired [loved] them.” The Greek is “I pray for them.” This translation has chosen to include both concepts.
  - type: text
    content: I pray for my disciples.
  - type: text
    content: I’m not asking on behalf of the unbelieving world,
  - type: note
    content: This is emphatic in the Greek sentence structure. How could it be that Jesus loved the world and gave himself for the sin of the world, yet emphasized that he was praying for his disciples and not praying for the world? Jesus’ coming into the world brought life to those who believe and judgment to those who do not. The implication is that the key to reaching the world is the life, maturity, unity, and love of the disciples. This does not mean that Jesus didn’t love the world, but that the world will only be reached when the disciples come into the fullness of Christ and in unity of the faith. This is what consumed the heart of Jesus as he prayed for them before the cross.
  - type: text
    content: but for those who belong to you,
  - type: text
    content: those you have given me.
