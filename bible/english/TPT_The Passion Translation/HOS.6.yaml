  - type: heading
    content: Yahweh Responds
  '4':
  - type: text
    content: “Ephraim, what am I going to do with you?
  - type: text
    content: How should I deal with you, Judah?
  - type: note
    content: Ephraim is a poetic term of reference for the Northern Kingdom of Israel, Judah for the Southern Kingdom.
  - type: text
    content: 'For your faithfulness is '
  - type: text
    content: as fleeting
  - type: text
    content: ' as the morning mist,'
  - type: text
    content: like the dew that quickly disappears.
  '5':
  - type: text
    content: This is why I have used my prophets to slice you open
  - type: note
    content: The word of Yahweh spoken by the prophets was like a sword in their mouths. Their message was a message of judgment and impending destruction.
  - type: text
    content: and the words of my mouth to slay you.
  - type: text
    content: 'For my judgments '
  - type: text
    content: wake you up
  - type: note
    content: Or “my judgment goes forth.”
  - type: text
    content: like the blazing light of dawn.
  '6':
  - type: text
    content: 'What I want from you is steadfast love '
  - type: note
    content: Or “to show mercy” (LXX).
  - type: text
    content: 'not simply '
  - type: text
    content: dead
  - type: text
    content: ' sacrifices;'
  - type: note
    content: What pleases God is not outward rituals but the expressions of love that we demonstrate through our lives. Love and mercy are always supreme over every other virtue or deed. See Matt. 9:13 ; 12:7 ; 1 Cor. 13 .
  - type: text
    content: I want you to know me intimately not simply give burnt offerings.
  '7':
  - type: text
    content: But, like Adam, you have broken my covenant.
  - type: note
    content: Or “at [in] Adam they have broken my covenant.” “Adam” may be a reference to a town (see Josh. 3:16 ). There are obviously a number of possible meanings hidden in this poetic sentence. The essence of this verse is that God’s people have walked over God’s love-covenant and treated it like dirt. There is a play on words with the name Adam (Hb. ʾadam ) and the word for “dirt” (Hb. ʾadama ).
  - type: text
    content: How unfaithful you are to me!
  '8':
  - type: text
    content: “Gilead is a city with streets stained with bloody footprints,
  - type: text
    content: a city known for its evildoers.
  '9':
  - type: text
    content: “The priests are like a gang of robbers waiting in ambush,
  - type: text
    content: a gang of priests who commit murder on the road to Shechem.
  - type: text
    content: What heinous crimes they have committed!
  - type: note
    content: By opening a door of darkness into the land, the priests with their pagan compromises were guilty of causing the deaths of many people. God held them responsible for the judgment he poured out on the people because of their sins. Therefore, they were described as murderers by Hosea.
