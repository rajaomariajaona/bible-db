  - type: note
    content: Verses 1–3 are in the form of a poetic song of repentance, called a penitential song, like Ps. 6 and Ps. 51 . It is possible that these verses were used liturgically by the priests who led the people in worship. These verses in Hebrew truly reflect the beauty of Hebrew poetry.
  - type: text
    content: 'Although he hit us hard, '
  - type: note
    content: Or “has torn us.”
  - type: text
    content: now he will heal us.
  - type: text
    content: Although he wounded us, now he will bandage our wounds.
  '10':
  - type: text
    content: “I have witnessed a horrible thing in Israel’s temple;
  - type: note
    content: Or “the house [temple] of Israel.”
  - type: text
    content: there Ephraim practices temple prostitution,
  - type: text
    content: grossly defiling Israel.
  '11':
  - type: text
    content: Listen to me, Judah!
  - type: text
    content: A harvest of judgment is in store for you too.”
  - type: note
    content: 'This was a bitter warning of the impending captivity of the people of the Southern Kingdom. The Hebrew text adds a line to this verse: “when I restore the fortunes of my people.” However, based on the Biblia Hebraica Stuttgartensia and Hebrew parallelism, this line actually belongs with the first verse of ch. 7 and begins a new section of the book of Hosea. It is important to remember that verse and chapter numbers and headings have all been added to Scripture and are not part of the inspired text.'
  '2':
  - type: text
    content: After two days, he will revive us,
  - type: text
    content: and on the third day he will raise us up.
  - type: note
    content: From the writings of the New Testament onward, this text has been applied to the resurrection of Christ on the third day and our resurrection with him. See Matt. 27:63 ; Luke 24:46 ; 1 Cor. 15:4 ; Eph. 2:6 .
  - type: text
    content: Then we will live in his presence
  - type: note
    content: Or “so that we may live before his face.”
  '3':
