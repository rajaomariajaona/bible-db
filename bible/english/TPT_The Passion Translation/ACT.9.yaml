document_id: ACT.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Encounters Jesus
  - type: text
    content: 'During those days, Saul, full of angry threats and rage, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'wanted to murder the disciples of the Lord Jesus. So he went to ask the high priest '
  '10':
  - type: text
    content: 'Living in Damascus was a believer named Ananias. The Lord spoke to him in a vision, calling his name. '
  - type: text
    content: “Ananias.”
  - type: text
    content: “Yes, Lord,” Ananias answered.
  '11':
  - type: text
    content: 'The Lord said, '
  - type: text
    content: “Go at once to the street called Abundance
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, or “Fat Street.” The Greek is “Straight Street.” As the straightest street in the city, this is the main east-west thoroughfare in Damascus, which is known today as Midhat Pasha Souq. Damascus, only 190 miles northeast of Jerusalem, in 2017 has a population of about two million and is considered to be the oldest continually inhabited city in the world. Many remnants of the Roman occupation, including two-thirds of the walls of the city, can still be seen today. The conversion of Saul the legalist into Paul the grace preacher has a significant lesson for us. We can be amazingly wrong while thinking we are doing right. The Holy Spirit awakens our hearts to feast on Christ, our righteousness. Religion has a deadening effect on our hearts. Like Saul, we have to fall off our “high horse” and bite the dust before our blinded eyes can see.
  - type: text
    content: and look for a man from Tarsus
  - type: text
    content: ' '
  - type: note
    content: Tarsus, or Cilicia, is in southeastern Turkey. Tarsus means “a basket.” See v. 25.
  - type: text
    content: named Saul. You will find him at Judah’s house.
  - type: text
    content: ' '
  - type: note
    content: Or “Judas’ house.” (Judah’s house is the house of praise).
  - type: text
    content: While he was praying,
  - type: text
    content: ' '
  - type: note
    content: Made explicit from the text.
  - type: text
    content: he saw in a supernatural vision a man named Ananias
  - type: text
    content: ' '
  - type: note
    content: Ananias means “the Lord’s gracious gift.” He truly was the Lord’s gracious gift to Paul, who was healed by God’s gracious gift. The word grace is found 125 times in the New Testament, and Paul uses the word 120 times.
  - type: text
    content: coming to lay hands upon him to restore his sight.”
  - type: note
    content: Ananias means “Yah is merciful.” This is a wonderful play on words in the Aramaic, for God is about to show mercy to Saul and is asking Ananias to live up to his name.
  '13':
  - type: text
    content: '“But Lord,” Ananias replied, “many have told me about his terrible persecution of those in Jerusalem who are devoted to you. '
  - type: note
    content: Or “your holy ones.”
  '14':
  - type: text
    content: In fact, the high priest has authorized him to seize and imprison all those in Damascus who call on your name.”
  '15':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic word for “Yahweh,” MarYah.
  - type: text
    content: 'answered him, '
  - type: text
    content: “Arise and go! I have chosen this man to be my special messenger.
  - type: text
    content: ' '
  - type: note
    content: Or “tool.”
  - type: text
    content: He will be brought before kings, before many nations, and before the Jewish people to give them the revelation of who I am.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And I will show him how much he is destined to suffer
  - type: text
    content: ' '
  - type: note
    content: Or “experience.”
  - type: text
    content: because of his passion for me.”
  '17':
  - type: text
    content: Ananias left and found the house where Saul was staying. He went inside and laid hands on him, saying, “Saul, my brother, the Lord Jesus, who appeared to you on the road, has sent me to pray for you so that you might see again and be filled to overflowing with the Holy Spirit.”
  '18':
  - type: text
    content: 'All at once, the crusty substance that was over Saul’s eyes disappeared and he could see perfectly. Immediately, he got up and was baptized. '
  '19':
  - type: text
    content: 'After eating a meal, '
  - type: note
    content: Some Aramaic manuscripts add, “He accepted the message of salvation,” or “He received the hope” (of the kingdom).
  - type: text
    content: his strength returned.
  - type: note
    content: The sentence “Saul remained with the disciples for several days” has been placed in v. 22 as a concluding statement of the narrative.
  '2':
  - type: text
    content: 'and requested a letter of authorization he could take to the Jewish leaders in Damascus, '
  - type: note
    content: Or “synagogues of Damascus.”
  - type: text
    content: 'requesting their cooperation in finding and arresting any who were followers of the Way. '
  - type: note
    content: The “Way” is Jesus Christ, the way that God dispenses himself into human beings. He lives inside of those who believe in him. See John 14:6. “The Way” is also a term Luke uses throughout the book of Acts to designate believers in Jesus.
  - type: text
    content: 'Saul wanted to capture all of the believers he found, both men and women, and drag them as prisoners back to Jerusalem. '
  '20':
  - type: text
    content: 'Within the hour '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'he was in the synagogues, preaching about Jesus and proclaiming, “Jesus is the Son of God!” '
  - type: note
    content: Or “This Man is the Son of God.”
  '21':
  - type: text
    content: Those who heard him were astonished, saying among themselves, “Isn’t this the Saul who furiously persecuted those in Jerusalem who called on the name of Jesus? Didn’t he come here with permission from the high priest to drag them off and take them as prisoners?”
  '22':
  - type: text
    content: Saul’s power increased greatly as he became more and more proficient in proving that Jesus was the anointed Messiah. Saul remained there for several days with the disciples, even though it agitated the Jews of Damascus.
  - type: heading
    content: Saul Escapes from Damascus
  '23':
  - type: text
    content: 'As time passed, the Jews plotted together to kill Saul, '
  '24':
  - type: text
    content: 'but it was revealed to him what they were about to do. They closely guarded the gates of the city and tracked his every movement so they could kill him. '
  '25':
  - type: text
    content: But during the night, some of Saul’s converts helped him escape by lowering him down through an opening in the wall, hiding him in a woven basket.
  - type: note
    content: See 2 Cor. 11:33.
  - type: heading
    content: Saul Returns to Jerusalem
  '26':
  - type: text
    content: 'When Saul arrived in Jerusalem, he attempted to introduce himself to the fellowship of the believers, but everyone was afraid of him because they doubted he was a true disciple. '
  '27':
  - type: text
    content: 'Barnabas '
  - type: note
    content: See Acts 4:36–37.
  - type: text
    content: came to his defense and brought him before the apostles. Saul shared with them his supernatural experience of seeing the Lord, who spoke with him on the road to Damascus. Barnabas also told them how boldly Saul preached throughout the city in Jesus’ mighty name.
  '28':
  - type: text
    content: 'Then they accepted him as a brother and he remained with them, joining them wherever they went in Jerusalem, boldly preaching in the power and authority of Jesus. '
  - type: note
    content: Or “in the name of Jesus.”
  '29':
  - type: text
    content: 'He openly debated with some of the Jews who had adopted the Greek culture, '
  - type: note
    content: Or “Hellenist Jews.” These were Jews who had adopted the Greek culture and language, as opposed to the orthodox Jews, who were strictly following Hebrew culture. The respected historian Josephus writes in AD 44, in his book of Jewish wars, that Greek was not the predominant language spoken in Israel. (See Antiquities xx, xi, 2.) The Hellenists were Jewish immigrants who had lived in Alexandria, Greece, and in Rome. They would have learned Greek culture and language as well as Hebrew.
  - type: text
    content: 'yet they were secretly plotting to murder him. '
  '3':
  - type: text
    content: So he obtained the authorization
  - type: text
    content: ' and left for Damascus.'
  - type: text
    content: 'Just outside the city, a brilliant light flashing from heaven suddenly exploded all around him. '
  '30':
  - type: text
    content: When the believers discovered their scheme, they smuggled him out of the city and took him to Caesarea and then sent him on to Tarsus.
  - type: note
    content: Tarsus was a city in south-central Turkey, about ten miles from the Mediterranean coast. Saul’s family originated from Tarsus, but he grew up in Jerusalem as an orthodox Jew.
  '31':
  - type: text
    content: 'After this, the church all over Judea, Galilee, and Samaria experienced a season of peace. '
  - type: note
    content: The “church” in a region is mentioned here, “Judea, Galilee, and Samaria.” Even though great cultural distinctions existed between them, the Holy Spirit had made them one church.
  - type: text
    content: 'The congregations grew larger and larger, with the believers being empowered and encouraged by the Holy Spirit. They worshiped God in wonder and awe, '
  - type: note
    content: Implied in the Hebraic concept of “the fear of the Lord,” which means more than just dread or terror. It also includes “to worship with awe.”
  - type: text
    content: and walked in the fear of the Lord.
  - type: heading
    content: Peter Heals Aeneas
  '32':
  - type: text
    content: 'As Peter was ministering '
  - type: note
    content: Or “traveling.”
  - type: text
    content: 'from place to place, he visited God’s devoted ones in the village of Lydda. '
  - type: note
    content: Lydda (Aramaic, Lod) means “strife.”
  '33':
  - type: text
    content: 'He met a man there named Aeneas '
  - type: note
    content: Aeneas means “praise.” “Praise” had been paralyzed for eight years. Eight is the number of a new beginning.
  - type: text
    content: 'who had been paralyzed and bedridden for eight years. '
  '34':
  - type: text
    content: Peter said to him, “Aeneas, Jesus the Anointed One instantly and divinely heals you. Now, get up and make your bed.”
  '35':
  - type: text
    content: All at once he stood to his feet. And when all the people of Lydda and Sharon saw him, they became believers in the Lord.
  - type: note
    content: Or “they turned to the Lord.”
  - type: heading
    content: Peter Raises the Dead
  '36':
  - type: text
    content: 'Now, there was a follower of Jesus who lived in Joppa. Her Aramaic name, Tabitha, means “gazelle.” '
  - type: note
    content: Or “Dorcas,” which is the Greek word for “deer.” The name Dorcas is also found in v. 39 in the Greek.
  - type: text
    content: 'She lived her life doing kind things for others and serving the poor. '
  '37':
  - type: text
    content: 'But then she became very ill and died. After the disciples prepared her body for burial, '
  - type: note
    content: Or “washed her body.” By implication they prepared her for burial.
  - type: text
    content: they laid her in an upstairs room.
  '38':
  - type: text
    content: 'When the believers heard that Peter was nearby in Lydda, they sent two men with an urgent message for him to come without delay. '
  '39':
  - type: text
    content: So Peter went with them back to Joppa, and upon arriving they led him to the upper room.
  - type: text
    content: 'There were many widows standing next to Peter, weeping. One after another showed him the tunics and other garments that Tabitha had made to bless others. '
  '4':
  - type: text
    content: 'Falling to the ground, he heard a booming voice say to him, '
  - type: text
    content: “Saul, Saul, why are you persecuting me?”
  - type: note
    content: To persecute the church is to persecute Jesus. He is one with his beloved church. See Zech. 2:8.
  '40':
  - type: text
    content: 'Peter made them all leave the room. '
  - type: note
    content: The Greek word used here is ekballo, a strong word that can mean “drive out” or “cast out.”
  - type: text
    content: Then he knelt down and prayed. Turning to the dead body, he said, “Tabitha, rise up!”
  - type: text
    content: 'At once she opened her eyes, and seeing Peter, she sat up. '
  '41':
  - type: text
    content: He took her by the hand and helped her to her feet. Then he called for the believers and all the widows to come and see that she was alive!
  '42':
  - type: text
    content: 'The news spread all over the city of Joppa, and many believed in the Lord. '
  '43':
  - type: text
    content: Peter remained in Joppa for several more days as a guest at the house of Simon the tanner.
  - type: note
    content: Or “Simon Berseus.”
  '5':
  - type: text
    content: The men accompanying Saul were stunned and speechless, for they heard a heavenly voice but could see no one.
  - type: text
    content: Saul replied, “Who are you, Lord?”
  - type: text
    content: “I am Jesus, the Victorious,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, which uses the word scion. Although scion is often translated “branch” (Nazarene), it can also be mean “victorious” or “heir of a mighty family.”
  - type: text
    content: the one you are persecuting.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic adds a line here that can be translated “Is it hard for you to rear up against a scorpion’s stinger [or “goads”]?”
  - type: text
    content: Now, get up and go into the city, where you will be told what you are to do.”
  '8':
  - type: text
    content: 'Saul stood to his feet, and even though his eyes were open he could see nothing—he was blind. So the men had to take him by the hand and lead him into Damascus. '
  '9':
  - type: text
    content: For three days he didn’t eat or drink and couldn’t see a thing.
