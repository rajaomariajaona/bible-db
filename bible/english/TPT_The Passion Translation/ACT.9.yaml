          text: As translated from the Aramaic, or “Fat Street.” The Greek is “Straight Street.” As the straightest street in the city, this is the main east-west thoroughfare in Damascus, which is known today as Midhat Pasha Souq. Damascus, only 190 miles northeast of Jerusalem, in 2017 has a population of about two million and is considered to be the oldest continually inhabited city in the world. Many remnants of the Roman occupation, including two-thirds of the walls of the city, can still be seen today. The conversion of Saul the legalist into Paul the grace preacher has a significant lesson for us. We can be amazingly wrong while thinking we are doing right. The Holy Spirit awakens our hearts to feast on Christ, our righteousness. Religion has a deadening effect on our hearts. Like Saul, we have to fall off our “high horse” and bite the dust before our blinded eyes can see.
