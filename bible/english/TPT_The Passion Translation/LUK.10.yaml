type_code: eng
verses:
  '1':
  - type: heading
    content: Labor Shortage
  - type: text
    content: 'After this, the Lord Jesus formed thirty-five teams among the other disciples. Each team was two disciples, seventy in all, '
  - type: note
    content: A few Greek manuscripts have “seventy-two.” The number seventy is a key numerical symbol in the Bible. Seventy nations are listed in Gen. 10, seventy of Jacob’s clan went into Egypt (Ex. 1:5), seventy palm trees refreshed God’s people at Elim (Ex. 15:27), seventy elders served with Moses (Ex. 24:1), seventy princes are mentioned in Judg. 9:56, seventy men sat on the council of the Sanhedrin, and Jesus sent out seventy apostles to preach the message of the kingdom.
  - type: text
    content: 'and he commissioned them to go ahead of him into every town he was about to visit. '
  '10':
  - type: text
    content: But when you enter a city and they do not receive you, say to them publicly,
  - type: text
    content: ' '
  '11':
  - type: text
    content: ‘We wipe from our feet the very dust of your streets as a testimony before you!
  - type: text
    content: ' '
  - type: note
    content: See footnote on Luke 9:5.
  - type: text
    content: 'Understand this: God’s kingdom came within your reach and yet you have rejected God’s invitation!’ ”'
  '12':
  - type: text
    content: 'Jesus continued, '
  - type: text
    content: '“Let me say it clearly: on the day of judgment the wicked people of Sodom will have a lesser degree of judgment than the city that rejects you,'
  - type: text
    content: ' '
  - type: text
    content: for Sodom did not have the opportunity that was given to them
  - type: text
    content: .”
  - type: heading
    content: Jesus Condemns the Unrepentant Cities
  '13':
  - type: text
    content: “How disastrous it will be for the city of Korazin! How horrible for the city of Bethsaida! For if the powerful miracles that I performed in Korazin and Bethsaida had been done
  - type: text
    content: ' '
  - type: text
    content: in Tyre and Sidon
  - type: text
    content: ', they would have humbled themselves, repented, and turned from their sins.'
  - type: text
    content: ' '
  '14':
  - type: text
    content: Tyre and Sidon
  - type: text
    content: ' '
  - type: note
    content: Tyre and Sidon (present-day Lebanon) were two gentile cities on the Mediterranean coast that were known for their wickedness.
  - type: text
    content: will face a lesser degree of judgment than you will on the day of judgment.
  - type: text
    content: ' '
  '15':
  - type: text
    content: And Capernaum! Do you really think you’ll be highly exalted because of the great things I have done there? No! You’ll be brought down to the depths of hell
  - type: text
    content: ' '
  - type: note
    content: See Isa. 14:13–15.
  - type: text
    content: because of your rejection of me!”
  '16':
  - type: text
    content: 'Jesus concluded his instructions to the seventy with these words: '
  - type: text
    content: '“Remember this: Whoever listens to your message is actually listening to me. And anyone who rejects you is rejecting me, and not only me but the one who sent me.”'
  - type: heading
    content: The Seventy Return
  '17':
  - type: text
    content: 'When the seventy '
  - type: text
    content: missionaries
  - type: text
    content: ' returned to Jesus, they were ecstatic with joy, telling him, “Lord, even the demons obeyed us when we commanded them in your name!”'
  '18':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “
  - type: text
    content: While you were ministering
  - type: text
    content: ', I watched Satan topple until he fell suddenly from heaven like lightning to the ground.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: Now you understand that I have imparted to you my authority to trample over his kingdom. You will trample upon every demon before you and overcome every power
  - type: text
    content: ' '
  - type: note
    content: The Greek text is literally “snakes and scorpions,” which are emblems of demonic powers.
  - type: text
    content: Satan possesses. Absolutely nothing will harm you as you walk in this authority.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He released them with these instructions:'
  - type: text
    content: “The harvest is huge. But there are not enough harvesters to bring it in. As you go, plead with the Owner of the Harvest to send out
  - type: text
    content: ' '
  - type: note
    content: This is the term used many times in the Gospels for driving out or casting out demons. The Lord of the Harvest must cast them forth. The Holy Spirit is the Director of the Harvest.
  - type: text
    content: 'many more workers '
  - type: text
    content: into his harvest fields.
  - type: text
    content: ' '
  '20':
  - type: text
    content: However, your real source of joy isn’t merely that these spirits submit to your authority, but that your names are written in the journals of heaven and that you belong to God’s kingdom. This is the true source of your authority.”
  '21':
  - type: text
    content: 'Then Jesus, overflowing with the Holy Spirit’s joy, exclaimed, '
  - type: text
    content: '“Father, thank you, for you are Lord Supreme over heaven and earth! You have hidden the great revelation of this authority from those who are proud, those wise in their own eyes, and you have shared it with these who humbled themselves. Yes, Father. This is what pleases your heart: to give these things to those who are like trusting children.'
  '22':
  - type: text
    content: “Father, you have entrusted me with all that you have. No one fully knows the Son except the Father. And no one fully knows the Father except the Son. But the Son is able to reveal the Father to anyone he chooses.”
  '23':
  - type: text
    content: 'When Jesus was alone with the Twelve, he said to them, '
  - type: text
    content: “You are privileged to see and hear all these things.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Many kings and prophets of old longed to see these days of miracles that you’ve been favored to see. They would have given everything to hear the revelation you’ve been favored to hear. Yet they didn’t get to see a glimpse or hear even a whisper.”
  - type: heading
    content: Loving God, Loving Others
  '25':
  - type: text
    content: 'Just then a religious scholar stood before Jesus in order to test his doctrines. He posed this question: “Teacher, what requirement must I fulfill if I want to live forever in heaven?”'
  '26':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “What do you read in the Law? How do you understand it?”
  '27':
  - type: text
    content: The religious scholar answered, “It states, ‘You must love the Lord God with all your heart, all your passion, all your energy, and your every thought. And you must love your neighbor as yourself.’ ”
  '28':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “That is correct. Now go and do exactly that and you will live.”
  '29':
  - type: text
    content: Wanting to justify himself, he questioned Jesus further, saying, “What do you mean by ‘my neighbor’?”
  '3':
  - type: text
    content: Now, off you go! I am sending you out even though you feel as vulnerable as lambs going into a pack of wolves.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “There was once a
  - type: text
    content: ' '
  - type: text
    content: Jewish
  - type: text
    content: ' '
  - type: note
    content: Although the text does not describe him as Jewish, it is clearly implied in the context.
  - type: text
    content: man traveling from Jerusalem to Jericho when bandits robbed him along the way. They beat him severely, stripped him naked, and left him half dead.
  '31':
  - type: text
    content: “Soon, a Jewish priest walking down the same road came upon the wounded man. Seeing him from a distance, the priest crossed to the other side of the road and walked right past him, not turning to help him one bit.
  '32':
  - type: text
    content: “Later, a religious man, a Levite,
  - type: text
    content: ' '
  - type: note
    content: The Levites were temple assistants, helping the priests (1 Chron. 23:28–32).
  - type: text
    content: came walking down the same road and likewise crossed to the other side to pass by the wounded man without stopping to help him.
  '33':
  - type: text
    content: “Finally, another man, a Samaritan,
  - type: text
    content: ' '
  - type: note
    content: There was racial tension in those days between Jews and Samaritans. The Samaritans were considered to be a mixed race by the religious Jews. A Samaritan would be the most unlikely person to stop and help a Jewish man. The word Samaritan does not refer to people who lived in a geographical place, but is the Hebrew-Aramaic word Samarim, which means “keeper of the law.”
  - type: text
    content: came upon the bleeding man and was moved with tender compassion for him.
  - type: text
    content: ' '
  '34':
  - type: text
    content: He stooped down and gave him first aid, pouring olive oil on his wounds,
  - type: text
    content: ' '
  - type: text
    content: disinfecting them
  - type: text
    content: ' '
  - type: text
    content: with wine, and bandaging them to stop the bleeding. Lifting him up, he placed him on his own donkey and brought him to an inn. Then he took him from his donkey and carried him to a room for the night.
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'The next morning he took his own money from his wallet and gave it to the innkeeper with these words: ‘Take care of him until I come back from my journey. If it costs more than this, I will repay you when I return.’'
  - type: text
    content: ' '
  - type: note
    content: Jesus is the Good Samaritan. He stoops down to touch us, heal us, lift us up, carry us on our journey, and pay our debts, and he promises to return and reward those who do his will.
  '36':
  - type: text
    content: So, now, tell me, which one of the three men who saw the wounded man proved to be the true neighbor?”
  '37':
  - type: text
    content: The religious scholar responded, “The one who demonstrated kindness and mercy.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Go and do the same as he.”
  - type: heading
    content: Jesus Visits Martha and Mary
  '38':
  - type: text
    content: 'As Jesus and the disciples continued on their journey, they came to a village where a woman welcomed Jesus into her home. Her name was Martha and she had a sister named Mary. Mary sat down attentively before the Master, absorbing every revelation he shared. '
  '4':
  - type: text
    content: You won’t need to take anything
  - type: text
    content: ' '
  - type: note
    content: The text states literally “Take no money, no knapsack, no sandals.” The implication is that they were to trust in God alone for all their needs to be met.
  - type: text
    content: with you—trust in God alone. And don’t get distracted from my purpose by anyone you might meet along the way.
  '40':
  - type: text
    content: But Martha became exasperated with finishing the numerous household chores in preparation for her guests, so she interrupted Jesus and said, “Lord, don’t you think it’s unfair that my sister left me to do all the work by myself? You should tell her to get up and help me.”
  '41':
  - type: text
    content: 'The Lord answered her, '
  - type: text
    content: “Martha, my beloved Martha. Why are you upset and troubled, pulled away by all these many distractions?
  - type: text
    content: ' '
  '42':
  - type: text
    content: Mary has discovered the one thing most important by choosing to sit at my feet. She is undistracted, and I won’t take this privilege from her.”
  '5':
  - type: text
    content: “Once you enter a house, speak to the people there and say, ‘God’s blessing of peace be upon this house!’
  - type: text
    content: ' '
  '6':
  - type: text
    content: If a lover of peace
  - type: text
    content: ' '
  - type: note
    content: Literally “son of peace,” which is a way of saying, “a godly man.”
  - type: text
    content: resides there, your peace will rest upon that household.
  - type: text
    content: ' '
  - type: note
    content: Or as translated from the Aramaic, “Let him rest upon your peace.”
  - type: text
    content: But if you are rejected, your blessing of peace will come back upon you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Don’t shift from one house to another, but stay in one home during your time in that city. Eat and drink whatever they serve you. Receive their hospitality, for you are my harvester, and you deserve to be cared for.
  '8':
  - type: text
    content: '“When you enter into a new town, and you have been welcomed by its people, follow these rules: Eat'
  - type: text
    content: ' '
  - type: note
    content: This instruction to “eat what is served” was given twice, for the Jewish dietary laws were not meant to be a hindrance in their ministry, nor were the disciples to demand certain foods.
  - type: text
    content: what is served you.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Heal the sick, and tell them all, ‘God’s kingdom has arrived and is now within your reach!’
  - type: text
    content: ' '
