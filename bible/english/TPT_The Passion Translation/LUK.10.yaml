document_id: LUK.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Labor Shortage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this, the Lord Jesus formed thirty-five teams among the other disciples. Each team was two disciples, seventy in all, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A few Greek manuscripts have “seventy-two.” The number seventy is a key numerical symbol in the Bible. Seventy nations are listed in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', seventy of Jacob’s clan went into Egypt ('
      - type: text
        text: Ex. 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), seventy palm trees refreshed God’s people at Elim (
      - type: text
        text: Ex. 15:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), seventy elders served with Moses (
      - type: text
        text: Ex. 24:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), seventy princes are mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 9:56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', seventy men sat on the council of the Sanhedrin, and Jesus sent out seventy apostles to preach the message of the kingdom.'
      marker-yv: yv-n
    - type: text
      text: 'and he commissioned them to go ahead of him into every town he was about to visit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when you enter a city and they do not receive you, say to them publicly,
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘We wipe from our feet the very dust of your streets as a testimony before you!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See footnote on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 9:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Understand this: God’s kingdom came within your reach and yet you have rejected God’s invitation!’ ”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus continued, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Let me say it clearly: on the day of judgment the wicked people of Sodom will have a lesser degree of judgment than the city that rejects you,'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: for Sodom did not have the opportunity that was given to them
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Condemns the Unrepentant Cities
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How disastrous it will be for the city of Korazin! How horrible for the city of Bethsaida! For if the powerful miracles that I performed in Korazin and Bethsaida had been done
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in Tyre and Sidon
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', they would have humbled themselves, repented, and turned from their sins.'
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tyre and Sidon
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tyre and Sidon (present-day Lebanon) were two gentile cities on the Mediterranean coast that were known for their wickedness.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will face a lesser degree of judgment than you will on the day of judgment.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And Capernaum! Do you really think you’ll be highly exalted because of the great things I have done there? No! You’ll be brought down to the depths of hell
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 14:13–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because of your rejection of me!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus concluded his instructions to the seventy with these words: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Remember this: Whoever listens to your message is actually listening to me. And anyone who rejects you is rejecting me, and not only me but the one who sent me.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Seventy Return
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the seventy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: missionaries
    - type: text
      text: ' returned to Jesus, they were ecstatic with joy, telling him, “Lord, even the demons obeyed us when we commanded them in your name!”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: While you were ministering
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', I watched Satan topple until he fell suddenly from heaven like lightning to the ground.'
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now you understand that I have imparted to you my authority to trample over his kingdom. You will trample upon every demon before you and overcome every power
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is literally “snakes and scorpions,” which are emblems of demonic powers.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Satan possesses. Absolutely nothing will harm you as you walk in this authority.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He released them with these instructions:'
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The harvest is huge. But there are not enough harvesters to bring it in. As you go, plead with the Owner of the Harvest to send out
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the term used many times in the Gospels for driving out or casting out demons. The Lord of the Harvest must cast them forth. The Holy Spirit is the Director of the Harvest.
      marker-yv: yv-n
    - type: text
      text: 'many more workers '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: into his harvest fields.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: However, your real source of joy isn’t merely that these spirits submit to your authority, but that your names are written in the journals of heaven and that you belong to God’s kingdom. This is the true source of your authority.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus, overflowing with the Holy Spirit’s joy, exclaimed, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Father, thank you, for you are Lord Supreme over heaven and earth! You have hidden the great revelation of this authority from those who are proud, those wise in their own eyes, and you have shared it with these who humbled themselves. Yes, Father. This is what pleases your heart: to give these things to those who are like trusting children.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Father, you have entrusted me with all that you have. No one fully knows the Son except the Father. And no one fully knows the Father except the Son. But the Son is able to reveal the Father to anyone he chooses.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus was alone with the Twelve, he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are privileged to see and hear all these things.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Many kings and prophets of old longed to see these days of miracles that you’ve been favored to see. They would have given everything to hear the revelation you’ve been favored to hear. Yet they didn’t get to see a glimpse or hear even a whisper.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loving God, Loving Others
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then a religious scholar stood before Jesus in order to test his doctrines. He posed this question: “Teacher, what requirement must I fulfill if I want to live forever in heaven?”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What do you read in the Law? How do you understand it?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The religious scholar answered, “It states, ‘You must love the Lord God with all your heart, all your passion, all your energy, and your every thought. And you must love your neighbor as yourself.’ ”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “That is correct. Now go and do exactly that and you will live.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wanting to justify himself, he questioned Jesus further, saying, “What do you mean by ‘my neighbor’?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now, off you go! I am sending you out even though you feel as vulnerable as lambs going into a pack of wolves.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There was once a
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jewish
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the text does not describe him as Jewish, it is clearly implied in the context.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: man traveling from Jerusalem to Jericho when bandits robbed him along the way. They beat him severely, stripped him naked, and left him half dead.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Soon, a Jewish priest walking down the same road came upon the wounded man. Seeing him from a distance, the priest crossed to the other side of the road and walked right past him, not turning to help him one bit.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Later, a religious man, a Levite,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Levites were temple assistants, helping the priests (
      - type: text
        text: 1 Chron. 23:28–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: came walking down the same road and likewise crossed to the other side to pass by the wounded man without stopping to help him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Finally, another man, a Samaritan,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There was racial tension in those days between Jews and Samaritans. The Samaritans were considered to be a mixed race by the religious Jews. A Samaritan would be the most unlikely person to stop and help a Jewish man. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Samaritan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: does not refer to people who lived in a geographical place, but is the Hebrew-Aramaic word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Samarim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “keeper of the law.”'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: came upon the bleeding man and was moved with tender compassion for him.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He stooped down and gave him first aid, pouring olive oil on his wounds,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: disinfecting them
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: with wine, and bandaging them to stop the bleeding. Lifting him up, he placed him on his own donkey and brought him to an inn. Then he took him from his donkey and carried him to a room for the night.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'The next morning he took his own money from his wallet and gave it to the innkeeper with these words: ‘Take care of him until I come back from my journey. If it costs more than this, I will repay you when I return.’'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus is the Good Samaritan. He stoops down to touch us, heal us, lift us up, carry us on our journey, and pay our debts, and he promises to return and reward those who do his will.
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So, now, tell me, which one of the three men who saw the wounded man proved to be the true neighbor?”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The religious scholar responded, “The one who demonstrated kindness and mercy.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go and do the same as he.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Visits Martha and Mary
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Jesus and the disciples continued on their journey, they came to a village where a woman welcomed Jesus into her home. Her name was Martha and she had a sister named Mary. Mary sat down attentively before the Master, absorbing every revelation he shared. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You won’t need to take anything
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text states literally “Take no money, no knapsack, no sandals.” The implication is that they were to trust in God alone for all their needs to be met.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: with you—trust in God alone. And don’t get distracted from my purpose by anyone you might meet along the way.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Martha became exasperated with finishing the numerous household chores in preparation for her guests, so she interrupted Jesus and said, “Lord, don’t you think it’s unfair that my sister left me to do all the work by myself? You should tell her to get up and help me.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord answered her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Martha, my beloved Martha. Why are you upset and troubled, pulled away by all these many distractions?
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Mary has discovered the one thing most important by choosing to sit at my feet. She is undistracted, and I won’t take this privilege from her.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Once you enter a house, speak to the people there and say, ‘God’s blessing of peace be upon this house!’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If a lover of peace
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “son of peace,” which is a way of saying, “a godly man.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: resides there, your peace will rest upon that household.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or as translated from the Aramaic, “Let him rest upon your peace.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
