      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And remind them
    - type: text
      text: ' to never tear down anyone with their words or quarrel, '
    - type: usfm
