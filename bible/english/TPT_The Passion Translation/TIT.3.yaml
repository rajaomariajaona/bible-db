  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Encourage the believers to be passionately devoted to beautiful works of righteousness by meeting the urgent needs of others and not be unfruitful.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everyone here with me sends their loving greetings to you. Greet the believers who love us in the faith. May God’s wonderful grace be with you all!
  - type: usfm
