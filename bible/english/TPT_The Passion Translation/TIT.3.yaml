document_id: TIT.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Believers’ Conduct in Society
  - type: text
    content: 'Remind people to respect '
  - type: note
    content: Or “be subject to.”
  - type: text
    content: 'their governmental leaders on every level as law-abiding citizens and to be ready to fulfill their civic duty. '
  '10':
  - type: text
    content: 'After a first and second warning, have nothing more to do with a divisive person '
  - type: text
    content: who refuses to be corrected
  - type: text
    content: '. '
  '11':
  - type: text
    content: For you know that such a one is entwined with his sin and stands self-condemned.
  - type: heading
    content: Paul’s Coworkers
  '12':
  - type: text
    content: 'When I send Artemas '
  - type: note
    content: Artemas, or “Artemas of Lystra,” was considered to be one of the seventy disciples whom Jesus sent out.
  - type: text
    content: 'or Tychicus '
  - type: note
    content: Tychichus, an Ephesian, was a beloved coworker of Paul and is mentioned five times in the New Testament (here; Acts 20:4; Eph. 6:21; Col. 4:7; 2 Tim. 4:12). He was listed among the seventy disciples whom Jesus sent out according to Hippolytus of Rome. See Francis Mershman, “St. Tychicus” (1913) Catholic Encyclopedia, Charles Herbermann, editor.
  - type: text
    content: 'to you, be sure to meet me at the City of Victory, '
  - type: note
    content: Or “Nicopolis,” a Greek city on the western shore. Nicopolis means “the City of Victory.”
  - type: text
    content: for I’ve decided to spend the winter there.
  '13':
  - type: text
    content: 'Give a generous send-off to Zenas the scribe '
  - type: note
    content: Or “lawyer.” The word translated “lawyer” can be used for either Greek or Roman law. Zenas is considered to be one of the seventy whom Jesus sent out.
  - type: text
    content: 'and Apollos, '
  - type: note
    content: Apollos was a powerful preacher and coworker of Paul, who was very influential in the church of Corinth. He is listed ten times in the New Testament (Acts 18:24; 19:1; 1 Cor. 1:12; 3:4–6, 22; 4:6; 16:12). Jerome states that Apollos, after Paul’s letters brought healing to the divisions of the church in Corinth, returned and became an elder (overseer) in the church. See Jerome, Commentary on the Epistle of Titus.
  - type: text
    content: and send them on their journey with what they need.
  - type: heading
    content: Conclusion
  '14':
  - type: text
    content: Encourage the believers to be passionately devoted to beautiful works of righteousness by meeting the urgent needs of others and not be unfruitful.
  '15':
  - type: text
    content: Everyone here with me sends their loving greetings to you. Greet the believers who love us in the faith. May God’s wonderful grace be with you all!
  - type: text
    content: Love in Christ
  - type: text
    content: ','
  - type: text
    content: Paul
  - type: note
    content: The Aramaic adds, “The end of the letter written by Paul to Titus from Nicopolis, sent by the hand of Zenas and Apollos.”
  '2':
  - type: text
    content: And remind them
  - type: text
    content: ' to never tear down anyone with their words or quarrel, '
  - type: note
    content: Or “strive with others.” The implication is that we accept the differences of others and allow people to be who they are and not try to make them over into our image of who we think they should be.
  - type: text
    content: 'but instead be considerate, humble, and courteous to everyone. '
  '3':
  - type: text
    content: For it wasn’t that long ago that we behaved foolishly in our stubborn disobedience. We were easily led astray as slaves to worldly passions and pleasures. We wasted our lives in doing evil, and with hateful jealousy we hated others.
  - type: heading
    content: The Hymn of Salvation by Grace
  '4':
  - type: text
    content: When the extraordinary compassion of God our Savior
  - type: note
    content: Many scholars believe that vv. 4–7 are ancient Christian poetry or perhaps the words to a hymn.
  - type: text
    content: 'and his overpowering love suddenly appeared '
  - type: text
    content: in person
  - type: text
    content: ','
  - type: text
    content: as the brightness of a dawning day
  - type: text
    content: ','
  - type: note
    content: Implied in the Greek word epiphainō (epiphany), which means “to shine forth [brightly] in an appearing.”
  '5':
  - type: text
    content: he came to save us.
  - type: text
    content: Not because of any virtuous deed that we have done
  - type: text
    content: but only because of his extravagant mercy.
  '6':
  - type: text
    content: He saved us,
  - type: text
    content: 'resurrecting us '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: through the washing of rebirth.
  - type: text
    content: We are made completely new by the Holy Spirit,
  - type: note
    content: All three members of the Trinity are mentioned in vv. 4–6 and are seen as active participants in our salvation.
  - type: text
    content: whom he splashed over us richly
  - type: text
    content: by Jesus, the Messiah, our Life Giver.
  '7':
  - type: text
    content: So as a gift of his love,
  - type: text
    content: and since we are faultless—
  - type: text
    content: innocent before his face—
  - type: text
    content: 'we can now become heirs '
  - type: text
    content: of all things
  - type: text
    content: ','
  - type: text
    content: all because of an overflowing hope of eternal life.
  '8':
  - type: text
    content: How true and faithful is this message!
  - type: heading
    content: Faith Produces Good Works
  - type: text
    content: 'I want you to especially emphasize '
  - type: note
    content: Or “affirm strongly,” a hapax legomenon.
  - type: text
    content: 'these truths, so that those who believe in God will be careful to devote themselves to doing good works. It is '
  - type: text
    content: always
  - type: text
    content: ' beautiful and profitable '
  - type: text
    content: for believers
  - type: text
    content: ' to do good works.'
  '9':
  - type: text
    content: 'But avoid useless controversies, '
  - type: note
    content: The Aramaic can be translated “offensive debates.”
  - type: text
    content: 'genealogies, '
  - type: note
    content: The Aramaic can be translated “tribal traditions.”
  - type: text
    content: 'pointless quarrels, and arguments over the law, which will get you nowhere. '
  - type: note
    content: See also Heb. 13:9.
