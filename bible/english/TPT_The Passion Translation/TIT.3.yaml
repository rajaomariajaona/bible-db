        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “strive with others.” The implication is that we accept the differences of others and allow people to be who they are and not try to make them over into our image of who we think they should be.
      marker-yv: yv-n
    - type: text
      text: 'but instead be considerate, humble, and courteous to everyone. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For it wasn’t that long ago that we behaved foolishly in our stubborn disobedience. We were easily led astray as slaves to worldly passions and pleasures. We wasted our lives in doing evil, and with hateful jealousy we hated others.
  - type: usfm
