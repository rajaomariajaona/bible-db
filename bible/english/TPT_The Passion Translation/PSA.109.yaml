document_id: PSA.109,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God, It’s Time for Vengeance
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: A poetic song by King David
  - type: text
    content: God of all my praise, don’t stand silently by, aloof to my pain,
  '10':
  - type: text
    content: Let them wander as beggars in the street,
  - type: text
    content: like homeless vagabonds, evicted from their ruins!
  '11':
  - type: text
    content: Let the creditors seize his entire estate,
  - type: text
    content: and strangers, like vultures, take all that’s left!
  '12':
  - type: text
    content: Let no one be kind to him by showing pity to his fatherless children!
  '13':
  - type: text
    content: May all his posterity die with him! Cut down his family tree!
  '14':
  - type: text
    content: And may all the sins of his ancestors be recorded,
  - type: text
    content: remembered before you, forever!
  - type: text
    content: Cut off even the memory of his family from the face of the earth,
  '16':
  - type: text
    content: because he never once showed love or kindness to others,
  - type: text
    content: but persecuted the poor, the brokenhearted, and afflicted ones,
  - type: text
    content: even putting them to death!
  '17':
  - type: text
    content: Since he enjoyed cursing them,
  - type: text
    content: may all his curses now come raining back on him
  - type: text
    content: until it all overwhelms him with misfortune!
  - type: text
    content: Since he refused to bless others,
  - type: text
    content: God, withhold every single blessing from him!
  '18':
  - type: text
    content: Bitterness, such vile vindictiveness, was upon everything he did.
  - type: text
    content: Cursing was his lifestyle.
  '19':
  - type: text
    content: So smother him now with his own curses as his just reward.
  - type: text
    content: This will be the Lord’s punishment upon him and
  - type: text
    content: all my lying accusers who speak evil against me.
  '2':
  - type: text
    content: while the wicked slander me with their lies.
  - type: text
    content: Even right in front of my face they lie through their teeth.
  '21':
  - type: text
    content: 'But now, O  '
  - type: text
    content: Yahweh
  - type: text
    content: -God, make yourself real to me
  - type: text
    content: like you promised me you would.
  - type: note
    content: The Hebrew text reads “for your name’s sake.”
  - type: text
    content: Because of your constant love and your heart-melting kindness, come be my hero and deliver me!
  '22':
  - type: text
    content: I’m so broken, needy and hurting.
  - type: text
    content: My heart is pierced through and I’m so wounded.
  '23':
  - type: text
    content: I’m slipping down a dark slope, shaken to the core, and helpless.
  '24':
  - type: text
    content: All my fasting has left me so weak I can hardly stand.
  - type: text
    content: Now I’m shriveled up, nothing but skin and bones.
  '25':
  - type: text
    content: I’m the example of failure and shame to all who see me.
  - type: text
    content: They just walk by me, shaking their heads.
  '26':
  - type: text
    content: You have to help me, O Lord God!
  - type: text
    content: My true hero, come to my rescue and save me,
  - type: text
    content: for you are loving and kind.
  '27':
  - type: text
    content: Then everyone will know that you have won my victory,
  - type: text
    content: and they will all say to the Lord, “You have finished it!”
  '28':
  - type: text
    content: So let them curse me if they want,
  - type: text
    content: but I know you will bless me!
  - type: text
    content: All their efforts to destroy me will fail,
  - type: text
    content: but I will succeed and be glad.
  '29':
  - type: text
    content: So let my Satan-like accusers fail!
  - type: text
    content: Make them look ridiculous if they try to come against me.
  - type: text
    content: Clothe them with a robe of guilty shame from this day on!
  '3':
  - type: text
    content: I’ve done nothing to them, but they still surround me
  - type: text
    content: with their venomous words of hatred and vitriol.
  '30':
  - type: text
    content: But I will give my thanks to you over and over,
  - type: text
    content: and everyone will hear my lavish praises.
  '31':
  - type: text
    content: For you stand right next to the broken ones
  - type: text
    content: as their saving hero to rescue them from all their accusers!
  '4':
  - type: text
    content: Though I love them, they stand accusing me like Satan
  - type: text
    content: for what I’ve never done.
  - type: text
    content: I will pray until I become prayer itself.
  - type: note
    content: In the face of accusation and slander, David wrote in Hebrew literally “I am prayer!”
  '5':
  - type: text
    content: They continually repay me with evil when I show them good.
  - type: text
    content: They give me hatred when I show them love.
  '6':
  - type: text
    content: Show him how it feels! Let accusing liars be raised up against him,
  - type: text
    content: like Satan himself standing right next to him.
  - type: text
    content: And let him be declared guilty by a wicked judge.
  - type: text
    content: May even his prayers be seen as sinful!
  '8':
  - type: text
    content: Shorten his life and let another replace him!
  '9':
  - type: text
    content: Make his wife a widow and his children orphans!
