document_id: PSA.109,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God, It’s Time for Vengeance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poetic song by King David
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God of all my praise, don’t stand silently by, aloof to my pain,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Let them wander as beggars in the street,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like homeless vagabonds, evicted from their ruins!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Let the creditors seize his entire estate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and strangers, like vultures, take all that’s left!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Let no one be kind to him by showing pity to his fatherless children!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: May all his posterity die with him! Cut down his family tree!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 14-15
    - type: text
      text: And may all the sins of his ancestors be recorded,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: remembered before you, forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cut off even the memory of his family from the face of the earth,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: because he never once showed love or kindness to others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but persecuted the poor, the brokenhearted, and afflicted ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even putting them to death!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Since he enjoyed cursing them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may all his curses now come raining back on him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until it all overwhelms him with misfortune!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since he refused to bless others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, withhold every single blessing from him!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Bitterness, such vile vindictiveness, was upon everything he did.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cursing was his lifestyle.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: So smother him now with his own curses as his just reward.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This will be the Lord’s punishment upon him and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all my lying accusers who speak evil against me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: while the wicked slander me with their lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even right in front of my face they lie through their teeth.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But now, O  '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: -God, make yourself real to me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like you promised me you would.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 109:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text reads “for your name’s sake.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your constant love and your heart-melting kindness, come be my hero and deliver me!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I’m so broken, needy and hurting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is pierced through and I’m so wounded.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I’m slipping down a dark slope, shaken to the core, and helpless.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: All my fasting has left me so weak I can hardly stand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I’m shriveled up, nothing but skin and bones.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I’m the example of failure and shame to all who see me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They just walk by me, shaking their heads.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: You have to help me, O Lord God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My true hero, come to my rescue and save me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are loving and kind.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Then everyone will know that you have won my victory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they will all say to the Lord, “You have finished it!”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So let them curse me if they want,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I know you will bless me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their efforts to destroy me will fail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I will succeed and be glad.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So let my Satan-like accusers fail!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them look ridiculous if they try to come against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Clothe them with a robe of guilty shame from this day on!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I’ve done nothing to them, but they still surround me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with their venomous words of hatred and vitriol.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: But I will give my thanks to you over and over,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and everyone will hear my lavish praises.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: For you stand right next to the broken ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as their saving hero to rescue them from all their accusers!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Though I love them, they stand accusing me like Satan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for what I’ve never done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pray until I become prayer itself.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 109:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the face of accusation and slander, David wrote in Hebrew literally “I am prayer!”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: They continually repay me with evil when I show them good.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They give me hatred when I show them love.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: Show him how it feels! Let accusing liars be raised up against him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like Satan himself standing right next to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let him be declared guilty by a wicked judge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May even his prayers be seen as sinful!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Shorten his life and let another replace him!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Make his wife a widow and his children orphans!
