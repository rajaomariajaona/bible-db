document_id: PSA.94,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God of Vengeance
  - type: text
    content: A Wednesday song composed by King David
  - type: note
    content: This inscription is taken from the Septuagint. The Mishnah states that this psalm was sung by the Levites on the fourth day of the week, each Wednesday, in the temple.
  - type: text
    content: Lord God Almighty, you are the God
  - type: text
    content: who takes vengeance on your enemies.
  - type: text
    content: It’s time for you to punish evil!
  - type: text
    content: Let your rays of revelation-light shine from your people and
  - type: text
    content: pierce the conscience of the wicked and punish them.
  '10':
  - type: text
    content: Won’t the God who knows all things know what you’ve done?
  - type: text
    content: The God who punishes nations will surely punish you!
  '11':
  - type: text
    content: The Lord has fully examined every thought of man
  - type: text
    content: and found them all to be empty and futile.
  '12':
  - type: text
    content: Lord Yah, there’s such a blessing that comes
  - type: text
    content: when you teach us your Word and your ways.
  - type: note
    content: Or “from your Torah.”
  - type: text
    content: Even the sting of your correction can be sweet.
  '13':
  - type: text
    content: It rescues us from our days of trouble
  - type: text
    content: until you are ready to punish the wicked.
  - type: note
    content: Or “until a pit is dug for the wicked.”
  '14':
  - type: text
    content: For the Lord will never walk away from his cherished ones,
  - type: text
    content: nor would he forsake his chosen ones who belong to him.
  - type: note
    content: Or “[the people of] his inheritance.”
  '15':
  - type: text
    content: Whenever you pronounce judgments, they reveal righteousness.
  - type: note
    content: Or “justice will prevail.”
  - type: text
    content: All your devoted lovers will be pleased.
  - type: note
    content: The Hebrew reads “and after it [judgment] are the pure in heart.”
  '16':
  - type: text
    content: Lord, who will protect me from these wicked ones?
  - type: text
    content: If you don’t stand to defend me, who will? I have no one but you!
  '17':
  - type: text
    content: I would have been killed so many times
  - type: text
    content: if you had not been there for me.
  '18':
  - type: text
    content: When I screamed out, “Lord, I’m doomed!”
  - type: text
    content: your fiery love was stirred, and you raced to my rescue.
  '19':
  - type: text
    content: Whenever my busy thoughts were out of control,
  - type: text
    content: the soothing comfort of your presence
  - type: text
    content: calmed me down and overwhelmed me with delight.
  '2':
  - type: text
    content: It’s time to arise as judge of all the earth;
  - type: text
    content: arise to punish the proud with the penalty they deserve!
  '20':
  - type: text
    content: It’s obvious to all; you will have nothing to do
  - type: text
    content: with corrupt rulers who pass laws that empower evil
  - type: text
    content: and defeat what is right.
  '21':
  - type: text
    content: For they gang up against the lovers of righteousness
  - type: text
    content: and condemn the innocent to death.
  '22':
  - type: text
    content: But I know that all their evil plans will boomerang back onto them.
  - type: text
    content: Every plot they hatch will simply seal their own doom.
  - type: text
    content: For you, my God, you will destroy them,
  - type: text
    content: giving them what they deserve.
  - type: text
    content: For you are my true tower of strength,
  - type: text
    content: my safe place, my hideout, and my true shelter.
  '3':
  - type: text
    content: How much longer will you sit back and watch the wicked
  - type: text
    content: triumph in their evil, boasting in all that is wrong?
  '4':
  - type: text
    content: Listen to them bragging among themselves,
  - type: text
    content: big in their own eyes, all because of the crimes
  - type: text
    content: they’ve committed against your people!
  - type: text
    content: See how they’re crushing those who love you, God,
  - type: text
    content: cruelly oppressing those who belong to you.
  - type: note
    content: Or “[the people of] his inheritance.” (See also v. 14.)
  '6':
  - type: text
    content: Heartlessly they murder the widows, the foreigners,
  - type: text
    content: and even the orphaned children.
  '7':
  - type: text
    content: They say to themselves, “The Lord God doesn’t see this.
  - type: text
    content: Their God, the God of Jacob, he doesn’t even care!”
  '8':
  - type: text
    content: But you’d better watch out, you stupid fools!
  - type: text
    content: You’d better wise up! Why would you act like God doesn’t exist?
  - type: text
    content: Do you really think that God can’t hear their cries?
  '9':
  - type: text
    content: God isn’t hard of hearing; he’ll hear all their cries.
  - type: text
    content: God isn’t blind. He who made the eye has superb vision,
  - type: text
    content: and he’s watching all you do.
