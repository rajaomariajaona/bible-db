document_id: PSA.94,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God of Vengeance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Wednesday song composed by King David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '94'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This inscription is taken from the Septuagint. The Mishnah states that this psalm was sung by the Levites on the fourth day of the week, each Wednesday, in the temple.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord God Almighty, you are the God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who takes vengeance on your enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s time for you to punish evil!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your rays of revelation-light shine from your people and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pierce the conscience of the wicked and punish them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Won’t the God who knows all things know what you’ve done?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God who punishes nations will surely punish you!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has fully examined every thought of man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and found them all to be empty and futile.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord Yah, there’s such a blessing that comes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you teach us your Word and your ways.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 94:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from your Torah.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the sting of your correction can be sweet.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It rescues us from our days of trouble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until you are ready to punish the wicked.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 94:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “until a pit is dug for the wicked.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord will never walk away from his cherished ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor would he forsake his chosen ones who belong to him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 94:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[the people of] his inheritance.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whenever you pronounce judgments, they reveal righteousness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 94:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “justice will prevail.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your devoted lovers will be pleased.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 94:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew reads “and after it [judgment] are the pure in heart.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, who will protect me from these wicked ones?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you don’t stand to defend me, who will? I have no one but you!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would have been killed so many times
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if you had not been there for me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I screamed out, “Lord, I’m doomed!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your fiery love was stirred, and you raced to my rescue.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whenever my busy thoughts were out of control,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the soothing comfort of your presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: calmed me down and overwhelmed me with delight.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s time to arise as judge of all the earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arise to punish the proud with the penalty they deserve!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s obvious to all; you will have nothing to do
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with corrupt rulers who pass laws that empower evil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and defeat what is right.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they gang up against the lovers of righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and condemn the innocent to death.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I know that all their evil plans will boomerang back onto them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every plot they hatch will simply seal their own doom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you, my God, you will destroy them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: giving them what they deserve.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are my true tower of strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my safe place, my hideout, and my true shelter.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much longer will you sit back and watch the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: triumph in their evil, boasting in all that is wrong?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to them bragging among themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: big in their own eyes, all because of the crimes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they’ve committed against your people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how they’re crushing those who love you, God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cruelly oppressing those who belong to you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 94:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[the people of] his inheritance.” (See also v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heartlessly they murder the widows, the foreigners,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and even the orphaned children.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They say to themselves, “The Lord God doesn’t see this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their God, the God of Jacob, he doesn’t even care!”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you’d better watch out, you stupid fools!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’d better wise up! Why would you act like God doesn’t exist?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you really think that God can’t hear their cries?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God isn’t hard of hearing; he’ll hear all their cries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God isn’t blind. He who made the eye has superb vision,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he’s watching all you do.
