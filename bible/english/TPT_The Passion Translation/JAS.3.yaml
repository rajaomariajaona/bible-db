document_id: JAS.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Power of Your Words
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'My dear brothers and sisters, don’t be so eager to become a teacher in the church since you know that we who teach are held to a higher standard of judgment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'We all fail in many areas, but especially with our words. Yet if we’re able to bridle the words we say we are powerful enough to control ourselves in every way, and that means our character is mature and fully developed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Horses have bits and bridles in their mouths so that we can control and guide their large body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And the same with mighty ships, though they are massive and driven by fierce winds, yet they are steered by a tiny rudder at the direction of the person at the helm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And so the tongue is a small part of the body yet it carries great power! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “boasts of great things.” The Aramaic can be translated “the tongue has dominion.”
    marker-yv: yv-n
  - type: text
    text: 'Just think of how a small flame can set a huge forest ablaze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the tongue is a fire! It can be compared to the sum total of wickedness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Latin Vulgate. The Greek is “a world of wrongdoing.”
    marker-yv: yv-n
  - type: text
    text: 'and is the most dangerous part of our human body. It corrupts the entire body '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that the body Jacob refers to here is the body of believers (a local church).
    marker-yv: yv-n
  - type: text
    text: 'and is a hellish flame! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “is set ablaze by gehenna [hell].” The Aramaic does not mention
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gehenna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: but is simply “burns with fire.” Gehenna is taken from the concept of “The Valley of Hinnom” where rubbish was burned outside the city of Jerusalem, becoming a Hebrew metaphor for the fires of hell.
    marker-yv: yv-n
  - type: text
    text: It releases a fire that can burn throughout the course of human existence.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “a fire that passes through successive generations, rolling on like wheels.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For every wild animal on earth including birds, creeping reptiles, and creatures of the sea and land '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the Greek and made explicit in the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'have all been overpowered and tamed by humans, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'but the tongue is not able to be tamed. It’s a fickle, unrestrained evil that spews out words full of toxic poison! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'We use our tongue to praise God our Father '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Greek manuscripts have “Lord and Father.” The Aramaic can be translated “Lord God” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: MarYah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the Aramaic equivalent to'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'and then turn around and curse a person who was made in his very image! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “we curse a person and pretend to be God!”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Out of the same mouth we pour out words of praise one minute and curses the next. My brothers and sisters, this should never be!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Would you look for olives hanging on a fig tree or go to pick figs from a grapevine? Is it possible that fresh and bitter water can flow out of the same spring? So neither can a bitter spring produce fresh water.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom from Above
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'If you consider yourself to be wise and one who understands the ways of God, advertise it with a beautiful, fruitful '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'life guided by wisdom’s gentleness. Never brag or boast about what you’ve done and you’ll prove that you’re truly wise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But if there is bitter jealousy or competition hiding in your heart, then don’t deny it and try to compensate for it by boasting and being phony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For that has nothing to do with God’s heavenly wisdom but can best be described as the wisdom of this world, both selfish '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “unspiritual.”
    marker-yv: yv-n
  - type: text
    text: 'and devilish. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “behaves like a demon.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So wherever jealousy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for jealousy implies an obsession to promote one’s self at the expense of others.
    marker-yv: yv-n
  - type: text
    text: 'and selfishness are uncovered, you will also find many troubles '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “chaos.” The Greek can be translated “instability” or “disorder.”
    marker-yv: yv-n
  - type: text
    text: and every kind of meanness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But the wisdom from above is always pure, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “holy.”
    marker-yv: yv-n
  - type: text
    text: 'filled with peace, considerate and teachable. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A beautiful concept that means “easy to correct” or “ready to be convinced” or “willing to yield to others.” Is this true of your life?
    marker-yv: yv-n
  - type: text
    text: 'It is filled with love '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “mercy.”
    marker-yv: yv-n
  - type: text
    text: 'and never displays prejudice or hypocrisy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “never wears a mask.”
    marker-yv: yv-n
  - type: text
    text: 'in any form '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: and it always bears the beautiful harvest of righteousness! Good seeds of wisdom’s fruit will be planted with peaceful acts by those who cherish making peace.
