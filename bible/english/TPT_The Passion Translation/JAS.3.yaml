document_id: JAS.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Power of Your Words
  - type: text
    content: 'My dear brothers and sisters, don’t be so eager to become a teacher in the church since you know that we who teach are held to a higher standard of judgment. '
  '10':
  - type: text
    content: Out of the same mouth we pour out words of praise one minute and curses the next. My brothers and sisters, this should never be!
  '11':
  - type: text
    content: Would you look for olives hanging on a fig tree or go to pick figs from a grapevine? Is it possible that fresh and bitter water can flow out of the same spring? So neither can a bitter spring produce fresh water.
  - type: note
    content: As translated from the Aramaic.
  - type: heading
    content: Wisdom from Above
  '13':
  - type: text
    content: 'If you consider yourself to be wise and one who understands the ways of God, advertise it with a beautiful, fruitful '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'life guided by wisdom’s gentleness. Never brag or boast about what you’ve done and you’ll prove that you’re truly wise. '
  '14':
  - type: text
    content: 'But if there is bitter jealousy or competition hiding in your heart, then don’t deny it and try to compensate for it by boasting and being phony. '
  '15':
  - type: text
    content: 'For that has nothing to do with God’s heavenly wisdom but can best be described as the wisdom of this world, both selfish '
  - type: note
    content: Or “unspiritual.”
  - type: text
    content: 'and devilish. '
  - type: note
    content: Or “behaves like a demon.”
  '16':
  - type: text
    content: 'So wherever jealousy '
  - type: note
    content: The Greek word for jealousy implies an obsession to promote one’s self at the expense of others.
  - type: text
    content: 'and selfishness are uncovered, you will also find many troubles '
  - type: note
    content: The Aramaic can be translated “chaos.” The Greek can be translated “instability” or “disorder.”
  - type: text
    content: and every kind of meanness.
  '17':
  - type: text
    content: 'But the wisdom from above is always pure, '
  - type: note
    content: Or “holy.”
  - type: text
    content: 'filled with peace, considerate and teachable. '
  - type: note
    content: A beautiful concept that means “easy to correct” or “ready to be convinced” or “willing to yield to others.” Is this true of your life?
  - type: text
    content: 'It is filled with love '
  - type: note
    content: As translated from the Aramaic. The Greek is “mercy.”
  - type: text
    content: 'and never displays prejudice or hypocrisy '
  - type: note
    content: Or “never wears a mask.”
  - type: text
    content: 'in any form '
  '18':
  - type: text
    content: and it always bears the beautiful harvest of righteousness! Good seeds of wisdom’s fruit will be planted with peaceful acts by those who cherish making peace.
  '2':
  - type: text
    content: 'We all fail in many areas, but especially with our words. Yet if we’re able to bridle the words we say we are powerful enough to control ourselves in every way, and that means our character is mature and fully developed. '
  '3':
  - type: text
    content: 'Horses have bits and bridles in their mouths so that we can control and guide their large body. '
  '4':
  - type: text
    content: And the same with mighty ships, though they are massive and driven by fierce winds, yet they are steered by a tiny rudder at the direction of the person at the helm.
  '5':
  - type: text
    content: 'And so the tongue is a small part of the body yet it carries great power! '
  - type: note
    content: Or “boasts of great things.” The Aramaic can be translated “the tongue has dominion.”
  - type: text
    content: 'Just think of how a small flame can set a huge forest ablaze. '
  '6':
  - type: text
    content: 'And the tongue is a fire! It can be compared to the sum total of wickedness '
  - type: note
    content: As translated from the Latin Vulgate. The Greek is “a world of wrongdoing.”
  - type: text
    content: 'and is the most dangerous part of our human body. It corrupts the entire body '
  - type: note
    content: It is possible that the body Jacob refers to here is the body of believers (a local church).
  - type: text
    content: 'and is a hellish flame! '
  - type: note
    content: Or “is set ablaze by gehenna [hell].” The Aramaic does not mention gehenna but is simply “burns with fire.” Gehenna is taken from the concept of “The Valley of Hinnom” where rubbish was burned outside the city of Jerusalem, becoming a Hebrew metaphor for the fires of hell.
  - type: text
    content: It releases a fire that can burn throughout the course of human existence.
  - type: note
    content: The Aramaic can be translated “a fire that passes through successive generations, rolling on like wheels.”
  '7':
  - type: text
    content: 'For every wild animal on earth including birds, creeping reptiles, and creatures of the sea and land '
  - type: note
    content: Implied in the Greek and made explicit in the Aramaic.
  - type: text
    content: 'have all been overpowered and tamed by humans, '
  '8':
  - type: text
    content: 'but the tongue is not able to be tamed. It’s a fickle, unrestrained evil that spews out words full of toxic poison! '
  '9':
  - type: text
    content: 'We use our tongue to praise God our Father '
  - type: note
    content: Some Greek manuscripts have “Lord and Father.” The Aramaic can be translated “Lord God” (MarYah, the Aramaic equivalent to Yahweh).
  - type: text
    content: 'and then turn around and curse a person who was made in his very image! '
  - type: note
    content: The Aramaic can be translated “we curse a person and pretend to be God!”
