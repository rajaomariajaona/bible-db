  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: At Taanach foreign kings came and clashed;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they battled by the stream of Megiddo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The kings of Canaan fought,
- type: usfm
  marker: q1
  children:
  - type: text
