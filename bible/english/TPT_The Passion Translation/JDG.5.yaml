document_id: JDG.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Victory Song of Deborah and Barak
  - type: text
    content: 'Deborah and Barak son of Abinoam sang this '
  - type: text
    content: victory
  - type: text
    content: ' song:'
  - type: note
    content: Deborah likely composed this song, and both Deborah and Barak sang it. Utilizing brilliant imagery and forceful expression, this chapter is considered a literary masterpiece. It may also have been included in the Book of the Wars of the Lord (see Num. 21:14) or the Scroll of the Upright One (see Josh. 10:13; 2 Sam. 1:18).
  '10':
  - type: text
    content: 'Declare it, you '
  - type: text
    content: rich
  - type: text
    content: who ride on your white donkeys,
  - type: text
    content: 'sitting on your '
  - type: text
    content: fancy
  - type: text
    content: ' saddles!'
  - type: text
    content: 'Declare it, you '
  - type: text
    content: poor
  - type: text
    content: who must walk wherever you go!
  - type: note
    content: This verse is a merism encompassing the entire population of Israel (both rich and poor).
  '11':
  - type: text
    content: Listen to the sound of singers at the well,
  - type: note
    content: Some possible translations of this could include “Hear the sound of the archers,” “Hear the sound of thunder,” or “Hear the sound of those who divide the sheep.” The Hebrew is uncertain. See Isa. 12.
  - type: text
    content: 'as they proclaim the victories '
  - type: note
    content: Or “righteous acts.”
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the righteous triumph of his villagers in Israel!
  - type: text
    content: 'Then the people of '
  - type: text
    content: Yahweh
  - type: text
    content: marched out from their city gates!
  '12':
  - type: text
    content: Lead on, O Deborah, lead on!
  - type: text
    content: Awake, awake! Break out in a song!
  - type: text
    content: Arise, O Barak, arise!
  - type: text
    content: Son of Abinoam, arise!
  - type: text
    content: Carry off your captives
  - type: text
    content: and lead them all away
  - type: text
    content: '!'
  '13':
  - type: text
    content: The remaining nobles marched out,
  - type: text
    content: Yahweh
  - type: text
    content: ’s people came to me to fight against the mighty ones.
  '14':
  - type: text
    content: You men of Ephraim came out to the valley,
  - type: note
    content: Or “From Ephraim their root in Amalek.” The Hebrew meaning is uncertain.
  - type: text
    content: your brother Benjamin joined your ranks.
  - type: text
    content: Leaders came from Manasseh,
  - type: note
    content: Or “from Makir [the son of Manasseh].”
  - type: text
    content: and from Zebulun, those who hold the ruler’s staff.
  - type: note
    content: Or “the rod of the scribe.”
  '15':
  - type: text
    content: Issachar’s princes rallied to Deborah,
  - type: text
    content: Issachar stood fast alongside Barak,
  - type: text
    content: rushing into the valley under Barak’s command,
  - type: text
    content: while among Reuben’s clans there was great searching of heart.
  '16':
  - type: text
    content: Reuben, why do you remain by the sheepfolds,
  - type: note
    content: Or “by the campfires.”
  - type: text
    content: listening for the shepherds to whistle for their flocks?
  - type: note
    content: The men of Reuben loved their flocks (possessions) more than fighting for their brothers.
  - type: text
    content: Among Reuben’s clans there was great searching of heart.
  '17':
  - type: text
    content: 'Gad '
  - type: note
    content: Or “Gilead.”
  - type: text
    content: played it safe and
  - type: text
    content: ' stayed east of the Jordan,'
  - type: text
    content: and Dan lingered near their ships,
  - type: text
    content: while Asher kept their distance and stayed by the coast,
  - type: text
    content: safe and secure
  - type: text
    content: ' in their harbors.'
  '18':
  - type: text
    content: But Zebulun and Naphtali defied death
  - type: text
    content: and risked it all on the heights of the battlefield.
  - type: note
    content: Zebulun and Naphtali “triumphed because they did not love and cling to their own lives, even when faced with death” (Rev. 12:11).
  '19':
  - type: text
    content: At Taanach foreign kings came and clashed;
  - type: text
    content: they battled by the stream of Megiddo.
  - type: text
    content: The kings of Canaan fought,
  - type: text
    content: but they took away no spoils of silver.
  '2':
  - type: text
    content: 'Blessings be to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: who gave us victory
  - type: text
    content: ' today!'
  - type: text
    content: For the people answered the call,
  - type: text
    content: and Israel threw off what once held us back.
  - type: note
    content: The Hebrew text is uncertain. One possible translation is “When long locks of hair were worn loose in Israel.” This could be a poetic picture of warriors running to the battle with their hair blowing in the wind. Others translate this as “When the leaders led [cast off restraint] in Israel,” “Revelation was revealed in Israel [LXX],” or “When the breakers broke forth.”
  '20':
  - type: text
    content: Even the stars in the sky joined in the fight,
  - type: note
    content: Metaphorically, the stars represent the mighty host of heaven’s angels. Deborah declared that the angelic realm wheeled into formation and joined Israel in their fight. See Heb. 11:34.
  - type: text
    content: moving across the sky,
  - type: text
    content: shining as
  - type: text
    content: ' they fought against Sisera.'
  '21':
  - type: text
    content: The flooding Kishon swept them away—
  - type: text
    content: 'the ancient Kishon River '
  - type: note
    content: Or “the stream that had flowed for ages.” The Targums render this “the stream of the ancients.”
  - type: text
    content: contended with them
  - type: text
    content: .
  - type: text
    content: I shall march and keep marching on.
  - type: text
    content: So be strong, O my soul!
  - type: note
    content: Or “I will step on the necks of strength.”
  '22':
  - type: text
    content: 'Then thundered the horses’ hooves, '
  - type: text
    content: pulling the chariots of the kings of Canaan
  - type: text
    content: .
  - type: text
    content: Here they come galloping on,
  - type: text
    content: 'steeds and stallions '
  - type: note
    content: Or “their mighty ones,” possibly referring to the captains and princes of the Canaanites who rode in their chariots.
  - type: text
    content: stampeding on,
  - type: text
    content: but they all got stuck in the mud
  - type: text
    content: '!'
  - type: note
    content: Implied in the context and the Septuagint.
  '23':
  - type: text
    content: '“Speak a curse over Meroz,” '
  - type: note
    content: Although unidentified in the text, Meroz may have been a city in the region that Sisera conquered, whose inhabitants did not resist him.
  - type: text
    content: 'says the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: This angel may have been a reference to Barak, who was warring for God’s people. Or it could be the “angel of Yahweh” that Barak expected to go with him to battle (see Septuagint).
  - type: text
    content: “and speak a double curse over those who live there.
  - type: text
    content: 'For they did not come to help '
  - type: text
    content: Yahweh
  - type: text
    content: ’s cause
  - type: text
    content: 'nor rally to '
  - type: text
    content: Yahweh
  - type: text
    content: ’s side to fight the mighty.”
  '24':
  - type: text
    content: The most blessed of all women is Jael,
  - type: text
    content: wife of Heber the Kenite—
  - type: text
    content: the most fortunate of Bedouin women.
  '25':
  - type: text
    content: 'Sisera '
  - type: text
    content: came to Jael’s tent and
  - type: text
    content: ' asked for water,'
  - type: text
    content: but she gave him milk;
  - type: text
    content: she brought him buttermilk in a beautiful bowl.
  '26':
  - type: text
    content: With a tent peg in one hand
  - type: text
    content: and a workman’s hammer in the other,
  - type: text
    content: she struck Sisera and pierced his skull;
  - type: text
    content: she drove the peg through his temple.
  - type: note
    content: See 4:21 and footnote.
  '27':
  - type: text
    content: She shattered his skull,
  - type: text
    content: and he lay still before Jael.
  - type: text
    content: Sprawled on the tent floor,
  - type: text
    content: he bit the dust at her feet—
  - type: text
    content: deader than a doornail!
  '28':
  - type: text
    content: Sisera’s mother waited for him at her window;
  - type: text
    content: 'she gazed from behind the lattice and lamented:'
  - type: text
    content: “Why is the clatter of his chariot so late in coming?
  - type: text
    content: Why are his horses so slow to return?”
  '29':
  - type: text
    content: The wisest of her princesses replied;
  - type: text
    content: 'indeed, she even thought to herself:'
  '3':
  - type: text
    content: Listen, you kings!
  - type: text
    content: Open your ears, you princes!
  - type: text
    content: 'For I will sing a song to '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: 'I will make music to '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel.'
  '30':
  - type: text
    content: '“They must be gathering and dividing the spoils:'
  - type: text
    content: a slave-girl or two for each man,
  - type: text
    content: colorful cloth and garments as plunder for Sisera,
  - type: text
    content: two colorful garments, embroidered,
  - type: text
    content: and richly embroidered garments for my neck.”
  '31':
  - type: text
    content: Yahweh
  - type: text
    content: ', may all who hate you perish in the same way!'
  - type: text
    content: But may those who love you shine like the sun,
  - type: text
    content: bright in its strength as it crosses the sky!
  - type: note
    content: Those who love him become like him. See Dan. 12:3; Matt. 13:43; 17:2.
  - type: text
    content: Then the land had peace for forty years.
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ', when you advanced from Seir,'
  - type: note
    content: Probably referring to a mountainous region in Edom. See Deut. 33:2.
  - type: text
    content: and when you marched from Edom’s plains,
  - type: text
    content: the earth trembled,
  - type: text
    content: the sky poured,
  - type: text
    content: the clouds burst,
  '5':
  - type: text
    content: and the mountains melted,
  - type: text
    content: 'in the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the '
  - type: text
    content: Glorious
  - type: text
    content: ' One of Sinai,'
  - type: text
    content: 'in the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel!'
  '6':
  - type: text
    content: In the days of Shamgar son of Anath,
  - type: text
    content: 'and in the days of Jael, '
  - type: text
    content: no one felt safe
  - type: text
    content: ;
  - type: text
    content: the roads were deserted,
  - type: note
    content: Or “caravans ceased.”
  - type: text
    content: 'and those who '
  - type: text
    content: dared to
  - type: text
    content: ' travel took back roads.'
  '7':
  - type: text
    content: 'Champions were hard to find '
  - type: note
    content: Or “Villages were deserted.”
  - type: text
    content: —
  - type: text
    content: hard to find in Israel,
  - type: text
    content: until I, Deborah, took a stand!
  - type: text
    content: I arose as a mother in Israel!
  - type: note
    content: Would that there were “mothers” of God’s people today to lead them in the power of the Spirit into God’s victories!
  '8':
  - type: text
    content: The Israelites chose new gods,
  - type: note
    content: Or “God chose a new thing [leaders].”
  - type: text
    content: which brought war into the land.
  - type: note
    content: Or “there was war [warriors] in [over] the gates.”
  - type: text
    content: Of forty thousand men in Israel,
  - type: text
    content: not a shield or spear was seen.
  - type: note
    content: Or “Then there was not seen a shield for five cities, nor a spear among forty thousand in Israel.” Scholars acknowledge this entire verse to be difficult to translate.
  '9':
  - type: text
    content: My heart is with Israel’s princes,
  - type: text
    content: with the people who gladly volunteered.
  - type: text
    content: 'Praise '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
