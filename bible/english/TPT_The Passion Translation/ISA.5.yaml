document_id: ISA.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaiah’s Love Song
  - type: text
    content: Let me sing a song for the one I love, called
  - type: note
    content: 'It is proper, even as we honor God for his transcendence and holiness, to love him and sing about his love. Divine romance never diminishes God’s glory; it elevates and extols it. Isaiah is a singing prophet, as many prophets are. This chapter contains three prophetic songs: the Song of the Vineyard (vv. 1–7), the Song of Six Woes (vv. 8–23), and the Song of Judgment (vv. 24–30). What a variety of methods God will use to awaken his people and bring people to repentance! The prophet sings this song to the glory of his Beloved. Maybe it was sung by Isaiah at the Feast of Tabernacles when the grape harvest was brought in. Or perhaps Isaiah walked through the streets of Jerusalem or the hillsides of Israel singing to God’s people this prophetic message. Or perhaps the Lord Jesus himself sang this over Jerusalem as he stood on the hillside overlooking the city, weeping (see Luke 19:41).'
  - type: text
    content: '“My Lover and His Vineyard”:'
  - type: text
    content: 'My beloved '
  - type: text
    content: planted
  - type: text
    content: ' a vineyard on a very fertile hill.'
  '10':
  - type: text
    content: Indeed, even a vast vineyard
  - type: note
    content: Or “a ten-yoke vineyard,” the amount of land ten yoke of oxen could cultivate.
  - type: text
    content: will produce only a few gallons of wine,
  - type: text
    content: and several bushels of seed
  - type: text
    content: will produce only a bushel of harvest!”
  - type: note
    content: Or “A homer of seed will produce only an ephah.” The land-hungry people will go hungry.
  - type: heading
    content: Drunken Pleasure Seeking
  '11':
  - type: text
    content: Woe to those who start drinking early in the morning,
  - type: text
    content: lingering late into the night to get drunk with wine.
  '12':
  - type: text
    content: Their lavish parties are complete with
  - type: text
    content: the music of harps and flutes—and the wine flows!
  - type: text
    content: 'Yet they have no respect for what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has done,'
  - type: text
    content: nor do they contemplate the work of his hands!
  - type: note
    content: See 1 Sam. 12:24.
