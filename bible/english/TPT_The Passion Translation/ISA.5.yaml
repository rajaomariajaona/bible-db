        text: ). What a variety of methods God will use to awaken his people and bring people to repentance! The prophet sings this song to the glory of his Beloved. Maybe it was sung by Isaiah at the Feast of Tabernacles when the grape harvest was brought in. Or perhaps Isaiah walked through the streets of Jerusalem or the hillsides of Israel singing to God’s people this prophetic message. Or perhaps the Lord Jesus himself sang this over Jerusalem as he stood on the hillside overlooking the city, weeping (see
    - type: usfm
