        text: 'It is proper, even as we honor God for his transcendence and holiness, to love him and sing about his love. Divine romance never diminishes God’s glory; it elevates and extols it. Isaiah is a singing prophet, as many prophets are. This chapter contains three prophetic songs: the Song of the Vineyard (vv.'
