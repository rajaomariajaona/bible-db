        text: Or “Their belts don’t come loose, nor are their sandal straps broken.” This is a metaphor for being prepared and ready for action. Eastern people of that day wore long, loose garments that left them unprepared for action. But a fastened belt (girdle) meant they were ready for war. Their sandals unbroken meant that nothing would hinder them.
