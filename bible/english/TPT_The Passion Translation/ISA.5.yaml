    text: so he could plant within it the choicest of vines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He built a watchtower in the middle of it
- type: usfm
  marker: q1
  children:
  - type: text
    text: and carved a winepress out of its rock.
  - type: usfm
