        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For Israel, this watchtower was Jerusalem, the place where the owner of the vineyard dwelt and cared for his vineyard. For the church, the watchtower is the Zion-realm, the place of God’s presence. He not only planted us as his vineyard, but he also dwells among us (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 6:16
      metadata:
        usfm: 2CO.6.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The winepress or wine vat is the sacrificial system that God gave to his people to provide them with access to himself. For believers today, the wine vat is the privilege of open access that the Holy Spirit (our wine) provides for us as we gather together.
    marker-yv: yv-n
