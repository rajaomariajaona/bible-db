  - type: heading
    content: Perversion of Values
  '2':
  - type: text
    content: First
  - type: text
    content: ' he dug up its ground and hauled away its stones'
  - type: note
    content: Israel is the vineyard of the Lord (see Jer. 2:21). The parable is an obvious picture of how God planted and loved his vineyard, Israel. He cleared it of stones, removing all that would make his people stumble (see Isa. 62:10). With the stones, he built a wall of protection around them (5:5). For Israel, these stones would represent the Canaanites, those inhabitants of the land who made them stumble. Then he planted and established his people, calling them the “choicest [noblest] of vines,” with everything they needed to grow and be fruitful. In John 15, God’s vineyard is described as God’s redeemed people, the church. He has removed our stony hearts and given us hearts of flesh to respond to his voice. Throughout the Gospels, we see the people of the Lord compared to a vineyard (see Matt. 20:1; 21:28–41; Mark 12:1; Luke 13:6; 20:9–16; John 15:1).
  - type: text
    content: so he could plant within it the choicest of vines.
  - type: text
    content: He built a watchtower in the middle of it
  - type: text
    content: and carved a winepress out of its rock.
  - type: note
    content: For Israel, this watchtower was Jerusalem, the place where the owner of the vineyard dwelt and cared for his vineyard. For the church, the watchtower is the Zion-realm, the place of God’s presence. He not only planted us as his vineyard, but he also dwells among us (see 2 Cor. 6:16). The winepress or wine vat is the sacrificial system that God gave to his people to provide them with access to himself. For believers today, the wine vat is the privilege of open access that the Holy Spirit (our wine) provides for us as we gather together.
  - type: text
    content: He fully expected it to bear good grapes,
  - type: text
    content: but instead it produced only worthless wild grapes.
  '20':
  - type: text
    content: Woe to those who call evil good and good evil,
  - type: text
    content: who replace darkness with light and light with darkness,
  - type: text
    content: who replace bitter with sweet and sweet with bitter.
  - type: note
    content: Their moral code was reversed as sin was accepted as something good. Not content to abandon what is good, they must label it as evil. Those who abandon the absolute standards of God’s Word will find a reversal of every true virtue. Good is mocked and evil is embraced. Light is ridiculed and darkness is worn like a cloak. The sweetness of God is called bitter; the bitterness of sin is called sweet.
  - type: heading
    content: Arrogant Conceit
  '21':
  - type: text
    content: Woe to those who are wise in their own eyes
  - type: text
    content: and see themselves as clever and shrewd.
  - type: note
    content: See Prov. 3:7; Isa. 29:14. Who will outwit Eternal Wisdom? Who can outsmart Infinite Intelligence? God will resist the proud of heart. The wisdom that comes from above is without pride (see James 3:13–16).
  - type: heading
    content: Injustice
  '22':
  - type: text
    content: Woe to the champion wine drinkers
  - type: text
    content: who are heroes in mixing strong drinks—
  '23':
  - type: text
    content: judges and politicians
  - type: text
    content: ' who acquit the guilty for a bribe'
  - type: text
    content: and take away the rights of the innocent.
  - type: note
    content: Or “the righteousness of the righteous they take from them.” Verses 22 and 23 are Isaiah’s use of sarcasm, pointed to the leaders of the nation. The ones who should be champions and heroes are only “great” in their self-indulgence. With perverted justice, they corrupt the nation instead of safeguarding society.
  - type: heading
    content: Isaiah’s Song of Judgment
  '24':
  - type: text
    content: Therefore, just as tongues of fire
  - type: text
    content: 'lick up the straw '
  - type: note
    content: This prophetic poetry suggests that just as a tongue of fire licks at the dry ground to start a conflagration, so God would visit the people of Israel as a purging fire.
  - type: text
    content: and dry grass,
  - type: note
    content: See Num. 22:4.
  - type: text
    content: they will be destroyed, just as a plant with decaying roots
  - type: text
    content: and blossoms dries up like dust and is blown away in the wind.
  - type: note
    content: Some see the roots and flowers (blossoms) as a metaphor for parents and children.
  - type: text
    content: 'For they said, “No!” to the teachings of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the Lord of Angel Armies,
  - type: text
    content: and have despised the word of the Holy One of Israel!
  '25':
  - type: text
    content: 'For this reason '
  - type: text
    content: Yahweh
  - type: text
    content: ’s anger burned against his people,
  - type: note
    content: God’s anger is a righteous anger. It is the necessary vindication of the honor of his holiness and authority. There is no reason to make an apology for God’s anger. It is not a blemish on his divine character nor inconsistent with his mercy and grace. His anger is as pure and holy and good as his mercy or his love. Everything about God is holy and perfect. See Deut. 32:39–41; Ps. 7:11–13.
  - type: text
    content: and he struck them down with his holy hand!
  - type: text
    content: 'The mountains trembled, '
  - type: note
    content: This could be a reference to the days of King Uzziah and the great earthquake that took place during his reign. See Amos 1:1; Zech. 14:5.
  - type: text
    content: and dead bodies were littered
  - type: text
    content: like garbage left in the streets.
  - type: text
    content: Even with this, his anger has not turned away
  - type: text
    content: and still his hand is heavy upon them!
  '26':
  - type: text
    content: 'He will lift up a banner to '
  - type: text
    content: signal
  - type: text
    content: ' the distant nations;'
  - type: text
    content: 'he whistles '
  - type: note
    content: Or “hisses.”
  - type: text
    content: for them to come from the ends of the earth.
  - type: text
    content: Look! Here they come, running swiftly and speedily!
  '27':
  - type: text
    content: 'Not one '
  - type: text
    content: warrior
  - type: text
    content: ' stumbles or grows weary—'
  - type: text
    content: not even stopping to rest or sleep; they are battle ready!
  - type: note
    content: Or “Their belts don’t come loose, nor are their sandal straps broken.” This is a metaphor for being prepared and ready for action. Eastern people of that day wore long, loose garments that left them unprepared for action. But a fastened belt (girdle) meant they were ready for war. Their sandals unbroken meant that nothing would hinder them.
  '28':
  - type: text
    content: Their arrows are sharpened and every bow strung.
  - type: text
    content: Their horses’ hooves are hard as flint
  - type: text
    content: and their chariot wheels turn like the whirlwind.
  '29':
  - type: text
    content: Their shout is like a lion’s roar,
  - type: text
    content: the roar of strong lions growling as they seize their prey.
  - type: text
    content: 'They carry away '
  - type: text
    content: captives
  - type: text
    content: ', and none can rescue them.'
  '3':
  - type: text
    content: So now, you residents of Jerusalem and people of Judah,
  - type: text
    content: you be the judges!
  '30':
  - type: text
    content: They will roar and roar on that day
  - type: text
    content: like the roaring of crashing waves,
  - type: text
    content: and if you look back across the land
  - type: text
    content: you’ll see only darkness, disaster, and distress;
  - type: note
    content: Much of this verse is uncertain in the Hebrew. The Septuagint reads, “And these will look up to the heavens and down to the earth.”
  - type: text
    content: daylight itself will be obscured by thick clouds.
  - type: note
    content: Or “the gloomy vapor” (Syriac and Vulgate). There is a sense in which Jesus endured all the judgments of this chapter for us, becoming our Savior to set us free. Even the sun hid its face from the suffering Christ while he was on the cross.
  '4':
  - type: text
    content: What more could I have done for my vineyard?
  - type: text
    content: When I expected it to bear luscious grapes,
  - type: text
    content: why did it produce only wild, worthless grapes?
  '5':
  - type: text
    content: So let me tell you what I am about to do to my vineyard.
  - type: text
    content: I will tear down its fence and it will be plundered.
  - type: note
    content: As translated from the Septuagint. The Hebrew ba’ar has a homophone that could be translated “[a place of] grazing” or “burning.”
  - type: text
    content: 'I will break down its wall '
  - type: note
    content: Or “I will break through its wall.”
  - type: text
    content: and it will be destroyed!
  '6':
  - type: text
    content: I will make it a wasteland, and no one will cultivate the land.
  - type: note
    content: Or “it will not be pruned or hoed.” We would become a wasteland if God were to lift his favor and blessings from our lives.
  - type: text
    content: It will grow only weeds and thorns!
  - type: text
    content: I will command the clouds
  - type: text
    content: and they will not drop their rain upon it!
  - type: note
    content: Clouds giving rain is a metaphor for blessing. Rain is often a picture of revelation-teaching that falls on our hearts like rain.
  '7':
  - type: text
    content: 'For Israel is this vineyard of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the Commander of Angel Armies,
  - type: text
    content: and the people of Judah are the garden of his delight.
  - type: note
    content: Or “the planting of his pleasantness.”
  - type: text
    content: 'When he waited for '
  - type: text
    content: a crop of
  - type: text
    content: ' justice,'
  - type: text
    content: 'he got a '
  - type: text
    content: harvest of
  - type: text
    content: ' bloodshed!'
  - type: text
    content: 'When he waited to '
  - type: text
    content: reap
  - type: text
    content: ' fairness,'
  - type: text
    content: he heard only the cries of victims.
  - type: note
    content: There are remarkable plays on words found here in the Hebrew. The Hebrew word for “justice” is mishpat, and “bloodshed” is mishpakh. “Fairness” is zedakah, and “cries of distress” is zeakah.
  - type: heading
    content: Isaiah’s Song of Six Woes
  - type: heading
    content: Grasping Materialism
  '8':
  - type: text
    content: 'Woe to those who, '
  - type: text
    content: in their greed
  - type: text
    content: ', buy up'
  - type: text
    content: house after house to make one grand estate
  - type: text
    content: until there is no place for anyone else
  - type: text
    content: and only the landowner is left!
  - type: note
    content: This verse is a prohibition not on real estate endeavors but on the greedy accumulation of houses and land at the expense of the poor. This is the first of six woes found in this chapter (vv. 8, 11, 18, 20, 21, 22).
  '9':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies,'
  - type: text
    content: 'said in my ears:'
  - type: note
    content: Or “For the ears of the Lord of Hosts heard these things” (LXX).
  - type: text
    content: “Truly, many of your houses will become devastated
  - type: text
    content: and your large, impressive mansions
  - type: text
    content: will have no one living in them!
