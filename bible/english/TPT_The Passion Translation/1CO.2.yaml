      metadata:
        usfm: EPH.4.11+EPH.4.12+EPH.4.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'continually speak of this wonderful wisdom that comes from God, hidden before now in a mystery. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, something so profound it is beyond the scope of human ingenuity and unattainable by human reasoning. Wisdom comes from above and is given to those who love God and live in awe of him.
    marker-yv: yv-n
  - type: text
    text: 'It is his secret plan, destined '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “decreed.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: proorizo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to mark out the boundaries.” It is a form of the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: horizon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . God has marked out ahead of time the horizon of the ages and will finish his predetermined plan perfectly.
    marker-yv: yv-n
  - type: text
    text: 'before the ages, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to bring
  - type: text
    text: ' us into glory. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “for our glorification” or “so that glory may be ours.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'None of the rulers of this present world order understood it, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although it is possible that this refers to human rulers, it is hard to imagine how Herod, Pilate, and the Jewish authorities could be equated to the words “rulers of [over] this present world order (
    - type: usfm
      marker: it
      children:
      - type: text
        text: aeon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).” It seems clear that Paul is speaking of the principalities and powers of darkness, who were clueless about the efficacy of Christ’s crucifixion to realign the universe and initiate a new kingdom under our Lord Jesus Christ.
    marker-yv: yv-n
  - type: text
    text: 'for if they had, they never would have crucified the Lord of shining glory. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or a genitive of quality, “the Lord, to whom glory belongs.” This is the only place in the New Testament with the term “Lord of shining glory.” The church father Augustine translated this “the Lord who dispenses glory” (an objective genitive: Augustine,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: On the Trinity
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 1:12:24).'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
