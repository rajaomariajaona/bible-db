      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that Paul uses “we” in reference to apostles.
    marker-yv: yv-n
  - type: text
    text: 'articulate these realities with the words imparted to us by the Spirit and not with the words taught by human wisdom. We join together Spirit-revealed truths with Spirit-revealed words. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
