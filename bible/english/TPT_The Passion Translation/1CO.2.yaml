    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the natural man” or “the one without the Spirit.” The Aramaic can be translated “A man in his natural self cannot receive spiritual concepts.”
    marker-yv: yv-n
  - type: text
    text: 'rejects '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “does not have access to.”
    marker-yv: yv-n
  - type: text
    text: 'the revelations of God’s Spirit, for they make no sense to him. He can’t understand the revelations of the Spirit because they are only discovered by the illumination of the Spirit. '
  - type: usfm
