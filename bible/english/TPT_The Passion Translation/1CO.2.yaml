document_id: 1CO.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Reliance on Spiritual Power
  - type: text
    content: 'My brothers and sisters, '
  - type: note
    content: Or “brothers.”
  - type: text
    content: 'when I first came to proclaim to you the secrets '
  - type: note
    content: As translated from the Aramaic. Some Greek manuscripts have “testimony.” Paul, as a steward of the mysteries of God (1 Cor. 4:1), comes to them bringing a clear revelation of God’s mysteries. The Greek word mustērion (secret, or mystery) is found twenty-eight times in the New Testament.
  - type: text
    content: 'of God, I refused to come '
  - type: text
    content: as an expert
  - type: text
    content: ', trying to impress you with my eloquent speech and lofty wisdom. '
  '10':
  - type: text
    content: 'But God now unveils these profound realities to us by the Spirit. '
  - type: note
    content: Or “God has provided us with a revelation through the Spirit.” This difficult-to-translate Greek sentence may contain an ellipsis, which would render it “Yet we speak [or we know] what God has revealed to us by the Spirit.”
  - type: text
    content: 'Yes, he has revealed to us his inmost heart and deepest mysteries through the Holy Spirit, who constantly explores all things. '
  '11':
  - type: text
    content: After all, who can really see into a person’s heart and know his hidden impulses except for that person’s spirit? So it is with God. His thoughts and secrets are only fully understood by his Spirit, the Spirit of God.
  '12':
  - type: text
    content: 'For we did not receive the spirit of this world system but the Spirit of God, so that we might come to understand and experience all that grace has lavished upon us. '
  '13':
  - type: text
    content: 'And we '
  - type: note
    content: It is possible that Paul uses “we” in reference to apostles.
  - type: text
    content: 'articulate these realities with the words imparted to us by the Spirit and not with the words taught by human wisdom. We join together Spirit-revealed truths with Spirit-revealed words. '
  - type: note
    content: Or “We explain spiritual realities to spiritual people” or “We interpret spiritual truths by spiritual faculties.”
  '14':
  - type: text
    content: 'Someone living on an entirely human level '
  - type: note
    content: Or “the natural man” or “the one without the Spirit.” The Aramaic can be translated “A man in his natural self cannot receive spiritual concepts.”
  - type: text
    content: 'rejects '
  - type: note
    content: Or “does not have access to.”
  - type: text
    content: 'the revelations of God’s Spirit, for they make no sense to him. He can’t understand the revelations of the Spirit because they are only discovered by the illumination of the Spirit. '
  '15':
  - type: text
    content: 'Those who live in the Spirit are able to carefully evaluate all things, and they are subject to the scrutiny of no one '
  - type: text
    content: but God
  - type: text
    content: '. '
  '16':
  - type: text
    content: For
  - type: text
    content: 'Who has ever intimately known the mind of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: well enough to become his counselor?
  - type: note
    content: See Isa. 40:13.
  - type: text
    content: Christ has
  - type: text
    content: ', and we possess Christ’s perceptions.'
  - type: note
    content: That is, we believers possess the Holy Spirit, who reveals the thoughts and purposes of Christ. The revelation of the kingdom of God that Jesus preached was not understood by the intellect of men but by those who welcomed his truth. Humanly speaking, no one can understand the mysteries of God without the Holy Spirit. Those who have the Holy Spirit now possess the perceptions of Christ’s mind and can implement his purposes on the earth.
  '2':
  - type: text
    content: 'For while I was with you I was determined to be consumed with one topic—Jesus, the crucified Messiah. '
  - type: note
    content: Paul could have easily impressed the Corinthians with his vast knowledge of the Torah and the Jewish laws. But he was resolved to forget every other topic and stay focused on Christ and his cross. He wanted the power of the Spirit to work through his singular message.
  '3':
  - type: text
    content: 'I stood before you feeling inadequate, filled with reverence for God, '
  - type: note
    content: As translated from the Aramaic. The Greek is “I was with you in fear and trembling.”
  - type: text
    content: 'and trembling '
  - type: text
    content: under the sense of the importance of my words
  - type: text
    content: '. '
  - type: note
    content: Paul was not simply filled with dread or fear, but filled with how important it was to present the gospel clearly to the Corinthians. See also 2 Cor. 10:10; 11:6.
  '4':
  - type: text
    content: 'The message I preached and how I preached it was not an attempt to sway you with persuasive arguments but to prove to you the almighty power of God’s Holy Spirit. '
  '5':
  - type: text
    content: For God intended that your faith not be established on man’s wisdom but by trusting in his almighty power.
  - type: heading
    content: Wisdom from God
  '6':
  - type: text
    content: 'However, there is a wisdom that we continually speak of when we are among the spiritually mature. '
  - type: note
    content: Or “those who have reached perfection.” The Greek term for “spiritually mature” in this verse is found in classical Greek, describing those who have been initiated into mysteries. It most likely refers in this context to those who believed Paul’s message containing the mysteries of God (2:1). Paul uses the word wisdom sixteen times in the first three chapters of 1 Corinthians.
  - type: text
    content: 'It’s wisdom that didn’t originate in this present age, nor did it come from the rulers of this age who are in the process of being dethroned. '
  - type: note
    content: Or “rulers who are doomed to come to nothing” or “the nullified overlords of this present age.” This does not refer merely to human governments, but to the dethroned rulers of darkness that know nothing of God’s secret wisdom.
  '7':
  - type: text
    content: 'Instead, we '
  - type: note
    content: Many times in 1 and 2 Corinthians when Paul uses the pronoun we, he is referring to the apostles of the church, gifts of Christ who are sent to teach the mysteries of God. See 1 Cor. 4:1; Eph. 4:11–13.
  - type: text
    content: 'continually speak of this wonderful wisdom that comes from God, hidden before now in a mystery. '
  - type: note
    content: That is, something so profound it is beyond the scope of human ingenuity and unattainable by human reasoning. Wisdom comes from above and is given to those who love God and live in awe of him.
  - type: text
    content: 'It is his secret plan, destined '
  - type: note
    content: Or “decreed.” The Greek word proorizo means “to mark out the boundaries.” It is a form of the word horizon. God has marked out ahead of time the horizon of the ages and will finish his predetermined plan perfectly.
  - type: text
    content: 'before the ages, '
  - type: text
    content: to bring
  - type: text
    content: ' us into glory. '
  - type: note
    content: The Aramaic can be translated “for our glorification” or “so that glory may be ours.”
  '8':
  - type: text
    content: 'None of the rulers of this present world order understood it, '
  - type: note
    content: Although it is possible that this refers to human rulers, it is hard to imagine how Herod, Pilate, and the Jewish authorities could be equated to the words “rulers of [over] this present world order (aeon).” It seems clear that Paul is speaking of the principalities and powers of darkness, who were clueless about the efficacy of Christ’s crucifixion to realign the universe and initiate a new kingdom under our Lord Jesus Christ.
  - type: text
    content: 'for if they had, they never would have crucified the Lord of shining glory. '
  - type: note
    content: 'Or a genitive of quality, “the Lord, to whom glory belongs.” This is the only place in the New Testament with the term “Lord of shining glory.” The church father Augustine translated this “the Lord who dispenses glory” (an objective genitive: Augustine, On the Trinity, 1:12:24).'
  '9':
  - type: text
    content: 'This is why the Scriptures say:'
  - type: text
    content: Things never discovered or heard of before,
  - type: text
    content: 'things beyond our ability to imagine '
  - type: note
    content: Or “entered the heart.”
  - type: text
    content: —
  - type: text
    content: these are the many things God has in store
  - type: text
    content: for all his lovers.
  - type: note
    content: See Isa. 64:4.
