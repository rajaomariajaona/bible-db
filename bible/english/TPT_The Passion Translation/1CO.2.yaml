      children:
      - type: text
        text: 1 Cor. 4:1
      metadata:
        usfm: 1CO.4.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), comes to them bringing a clear revelation of God’s mysteries. The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mustērion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (secret, or mystery) is found twenty-eight times in the New Testament.
    marker-yv: yv-n
  - type: text
    text: 'of God, I refused to come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as an expert
  - type: text
    text: ', trying to impress you with my eloquent speech and lofty wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For while I was with you I was determined to be consumed with one topic—Jesus, the crucified Messiah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul could have easily impressed the Corinthians with his vast knowledge of the Torah and the Jewish laws. But he was resolved to forget every other topic and stay focused on Christ and his cross. He wanted the power of the Spirit to work through his singular message.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I stood before you feeling inadequate, filled with reverence for God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “I was with you in fear and trembling.”
    marker-yv: yv-n
  - type: text
    text: 'and trembling '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under the sense of the importance of my words
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul was not simply filled with dread or fear, but filled with how important it was to present the gospel clearly to the Corinthians. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 10:10
      metadata:
        usfm: 2CO.10.10
    - type: usfm
      marker: ft
