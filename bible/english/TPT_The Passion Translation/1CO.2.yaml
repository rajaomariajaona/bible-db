- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But God now unveils these profound realities to us by the Spirit. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “God has provided us with a revelation through the Spirit.” This difficult-to-translate Greek sentence may contain an ellipsis, which would render it “Yet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we speak
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[or'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we know
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '] what God has revealed to us by the Spirit.”'
    marker-yv: yv-n
  - type: text
    text: 'Yes, he has revealed to us his inmost heart and deepest mysteries through the Holy Spirit, who constantly explores all things. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: After all, who can really see into a person’s heart and know his hidden impulses except for that person’s spirit? So it is with God. His thoughts and secrets are only fully understood by his Spirit, the Spirit of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For we did not receive the spirit of this world system but the Spirit of God, so that we might come to understand and experience all that grace has lavished upon us. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And we '
  - type: usfm
    marker: f
    children:
