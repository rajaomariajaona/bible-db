      - type: text
        text: That is, we believers possess the Holy Spirit, who reveals the thoughts and purposes of Christ. The revelation of the kingdom of God that Jesus preached was not understood by the intellect of men but by those who welcomed his truth. Humanly speaking, no one can understand the mysteries of God without the Holy Spirit. Those who have the Holy Spirit now possess the perceptions of Christ’s mind and can implement his purposes on the earth.
