      children:
      - type: text
        text: Or “brothers.”
    marker-yv: yv-n
  - type: text
    text: 'when I first came to proclaim to you the secrets '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. Some Greek manuscripts have “testimony.” Paul, as a steward of the mysteries of God (
    - type: usfm
