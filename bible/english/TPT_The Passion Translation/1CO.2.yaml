      children:
      - type: text
        text: 11:6
      metadata:
        usfm: 2CO.11.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The message I preached and how I preached it was not an attempt to sway you with persuasive arguments but to prove to you the almighty power of God’s Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For God intended that your faith not be established on man’s wisdom but by trusting in his almighty power.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom from God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'However, there is a wisdom that we continually speak of when we are among the spiritually mature. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “those who have reached perfection.” The Greek term for “spiritually mature” in this verse is found in classical Greek, describing those who have been initiated into mysteries. It most likely refers in this context to those who believed Paul’s message containing the mysteries of God (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2:1
      metadata:
        usfm: 1CO.2.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Paul uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wisdom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sixteen times in the first three chapters of 1 Corinthians.
    marker-yv: yv-n
  - type: text
    text: 'It’s wisdom that didn’t originate in this present age, nor did it come from the rulers of this age who are in the process of being dethroned. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rulers who are doomed to come to nothing” or “the nullified overlords of this present age.” This does not refer merely to human governments, but to the dethroned rulers of darkness that know nothing of God’s secret wisdom.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Instead, we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many times in 1 and 2 Corinthians when Paul uses the pronoun
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: we
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', he is referring to the apostles of the church, gifts of Christ who are sent to teach the mysteries of God. See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 4:1
      metadata:
        usfm: 1CO.4.1
    - type: usfm
      marker: ft
      children:
      - type: text
