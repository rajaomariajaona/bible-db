document_id: EZK.39,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Destruction of Gog
  - type: text
    content: '“Son of man, prophesy against Gog. Prophesy this message that I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', give to you: ‘Behold I am against you, Gog, the supreme prince of Meshech and Tubal. '
  '10':
  - type: text
    content: 'They will not have to gather firewood from the countryside or cut it in the forests since they will be burning all the weapons. They will plunder those who plundered them and take spoils from those who took their spoils. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Cleansing of the Land
  '11':
  - type: text
    content: '“On that day, I will provide Gog a famous burial spot in Israel. It will be the Valley of Travelers '
  - type: note
    content: Or “the valley of those who travel east of the sea.” This is possibly the Arnon Valley, which is a steep, rocky gorge.
  - type: text
    content: 'east of the sea, '
  - type: text
    content: a graveyard so large
  - type: text
    content: ' that it blocks the way of the travelers. For there they will bury Gog and his entire horde, and it will be called the Valley of Gog’s Army. '
  - type: note
    content: Or “Hamon-Gog.” Hamon-Gog means the “Valley of Gog’s Multitude [warriors].” See v. 15.
  '12':
  - type: text
    content: 'It will take the Israelites seven months to bury them all in order to cleanse the land. '
  '13':
  - type: text
    content: 'Everyone in Israel will dig their graves, and for this, they will be honored on the day I display my glory, says Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'And after the seven months are over, men will be appointed to search full time throughout the country to find and bury any remaining corpse of the invaders '
  - type: note
    content: Or “travelers.”
  - type: text
    content: 'so that the land will be '
  - type: text
    content: ritually
  - type: text
    content: ' clean again. '
  '15':
  - type: text
    content: 'And as they go throughout the country, if one of them finds any human bones, he will set up a marker beside them so that the gravediggers can come and bury them in the Valley of Gog’s Army, '
  '16':
  - type: text
    content: 'near the town of Gog’s Army. '
  - type: note
    content: Or “Hamonah,” a feminine noun for “multitude” or “horde.”
  - type: text
    content: After that, the land will be ritually clean again.”
  '17':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Son of man, call for the birds of every kind and for all the wild animals to assemble and come. Say to them, ‘Gather from everywhere for the sacrificial feast '
  - type: text
    content: Yahweh
  - type: text
    content: ' prepares for you, a huge sacrificial feast on the mountains of Israel. Come and feast on the bodies '
  - type: text
    content: of those who died
  - type: text
    content: ' and drink '
  - type: text
    content: their
  - type: text
    content: ' blood. '
  '18':
  - type: text
    content: 'You will eat the flesh of mighty warriors and drink the blood of the princes of the earth as if they were the best fattened animals from Bashan '
  - type: note
    content: Bashan was the fertile land north and east of the Jordan Valley, known for its livestock. So the animals of Bashan would represent the best animals in the land.
  - type: text
    content: '—rams and lambs, goats and bulls. '
  '19':
  - type: text
    content: 'You will gorge yourselves on fat and drink yourselves drunk on the blood of this sacrifice I am making for you. '
  '2':
  - type: text
    content: 'I will turn you around, drive you out, and bring you from the distant north to fight against the mountains of Israel. '
  '20':
  - type: text
    content: 'You will be filled at my table, feasting on horses and riders, on mighty warriors of every rank. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: God Will Restore Israel
  '21':
  - type: text
    content: '“I will reveal my glory to the nations. They will witness the way I judge Gog and the display of my power when I punish Gog and his great army. '
  - type: note
    content: Or “All the nations will see the punishment I inflict and the power of my might that I display against them.” The point is clearly made here that the nations will all bear witness to the terrifying judgment that Yahweh brings against the armies of Gog and his allies.
  '22':
  - type: text
    content: 'The people of Israel will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God from that day forward and forever. '
  '23':
  - type: text
    content: 'The nations will also realize that the people of Israel went into captivity because of their guilt, for they were unfaithful '
  - type: note
    content: Or “dealt treacherously.”
  - type: text
    content: 'to me. So, I hid my face from them and gave them over to the power of their enemies, whereby they were all killed in war. '
  '24':
  - type: text
    content: I treated them as their despicable deeds of infidelity deserved and hid my face from them.”
  '25':
  - type: text
    content: 'So, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: “Now I will '
  - type: text
    content: be merciful and
  - type: text
    content: ' bring Jacob’s captives back and show pity on all the people of Israel. I will be zealous to not let them dishonor my holy name. '
  '26':
  - type: text
    content: 'They will forget '
  - type: note
    content: The Hebrew text (MT) reads nasu, meaning “will bear,” which, in reference to Israel’s shame, makes little or no sense in this context. However, a number of other versions adopt the alternative reading nashu, meaning “will forget,” which is ideally suited to this context.
  - type: text
    content: 'their shame and all their acts of unfaithfulness that they committed against me when they were living safely in their own land with none to make them afraid. '
  '27':
  - type: text
    content: 'When I have brought them back from the lands of their enemies, many nations will see the display of my holiness. '
  '28':
  - type: text
    content: 'And they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel. Yes, I sent them into exile among the nations, but I will then reunite them in their own land, not leaving a single one behind. '
  '29':
  - type: text
    content: 'I will pour out my Spirit on the people of Israel, and my divine presence will never again leave them. '
  - type: note
    content: It is hard not to see the fulfillment of this with God’s people today. The Lord promises never to leave us or forsake us. See Heb. 13:5.
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '3':
  - type: text
    content: 'I will knock the bow from your left hand and rip the arrows out of your right. '
  '4':
  - type: text
    content: 'You will fall on the mountains of Israel, you and all your hordes and your coalition with you. I will feed your flesh to every kind of bird of prey and wild animal. '
  '5':
  - type: text
    content: 'Your '
  - type: text
    content: corpses
  - type: text
    content: ' will lie '
  - type: text
    content: unburied
  - type: text
    content: ' in the open fields, '
  - type: note
    content: Or “you will [also] fall in the open fields.”
  - type: text
    content: 'for I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '6':
  - type: text
    content: '“ ‘I will send down fire on Magog and on those living securely on the coastlands, and they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'I will make sure that my holy name is acknowledged among my people Israel, and I will make sure that my holy name is no longer allowed to be profaned. Then the nations will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Holy One of Israel.'
  '8':
  - type: text
    content: '“ ‘Behold, these things I have prophesied will happen very soon. It will all be fulfilled, for this is the day I have spoken about. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare it.'
  '9':
  - type: text
    content: '“ ‘Then those living in the towns of Israel will go out and gather up all the '
  - type: text
    content: abandoned
  - type: text
    content: ' weapons '
  - type: text
    content: of the dead soldiers
  - type: text
    content: ', make a bonfire with them, and burn them all up—the shields large and small, bows and arrows, javelins and spears. It will take seven '
  - type: note
    content: The number seven is predominant in this chapter. It takes seven years to burn all the weapons and seven months to bury the dead (see v. 12). The root word for “bury” is also found seven times in this chapter. To take seven years to burn the weapons can be seen as denoting a complete end to the warfare of the enemy.
  - type: text
    content: 'years to burn them all. '
