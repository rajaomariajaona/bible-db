document_id: EZK.39,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Destruction of Gog
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, prophesy against Gog. Prophesy this message that I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', give to you: ‘Behold I am against you, Gog, the supreme prince of Meshech and Tubal. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will not have to gather firewood from the countryside or cut it in the forests since they will be burning all the weapons. They will plunder those who plundered them and take spoils from those who took their spoils. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cleansing of the Land
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“On that day, I will provide Gog a famous burial spot in Israel. It will be the Valley of Travelers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the valley of those who travel east of the sea.” This is possibly the Arnon Valley, which is a steep, rocky gorge.
      marker-yv: yv-n
    - type: text
      text: 'east of the sea, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a graveyard so large
    - type: text
      text: ' that it blocks the way of the travelers. For there they will bury Gog and his entire horde, and it will be called the Valley of Gog’s Army. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hamon-Gog.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hamon-Gog
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means the “Valley of Gog’s Multitude [warriors].” See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It will take the Israelites seven months to bury them all in order to cleanse the land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone in Israel will dig their graves, and for this, they will be honored on the day I display my glory, says Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And after the seven months are over, men will be appointed to search full time throughout the country to find and bury any remaining corpse of the invaders '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “travelers.”
      marker-yv: yv-n
    - type: text
      text: 'so that the land will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ritually
    - type: text
      text: ' clean again. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as they go throughout the country, if one of them finds any human bones, he will set up a marker beside them so that the gravediggers can come and bury them in the Valley of Gog’s Army, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'near the town of Gog’s Army. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hamonah,” a feminine noun for “multitude” or “horde.”
      marker-yv: yv-n
    - type: text
      text: After that, the land will be ritually clean again.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, “Son of man, call for the birds of every kind and for all the wild animals to assemble and come. Say to them, ‘Gather from everywhere for the sacrificial feast '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' prepares for you, a huge sacrificial feast on the mountains of Israel. Come and feast on the bodies '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of those who died
    - type: text
      text: ' and drink '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their
    - type: text
      text: ' blood. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will eat the flesh of mighty warriors and drink the blood of the princes of the earth as if they were the best fattened animals from Bashan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Bashan was the fertile land north and east of the Jordan Valley, known for its livestock. So the animals of Bashan would represent the best animals in the land.
      marker-yv: yv-n
    - type: text
      text: '—rams and lambs, goats and bulls. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will gorge yourselves on fat and drink yourselves drunk on the blood of this sacrifice I am making for you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will turn you around, drive you out, and bring you from the distant north to fight against the mountains of Israel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be filled at my table, feasting on horses and riders, on mighty warriors of every rank. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Will Restore Israel
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I will reveal my glory to the nations. They will witness the way I judge Gog and the display of my power when I punish Gog and his great army. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “All the nations will see the punishment I inflict and the power of my might that I display against them.” The point is clearly made here that the nations will all bear witness to the terrifying judgment that
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: brings against the armies of Gog and his allies.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of Israel will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' their God from that day forward and forever. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nations will also realize that the people of Israel went into captivity because of their guilt, for they were unfaithful '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dealt treacherously.”
      marker-yv: yv-n
    - type: text
      text: 'to me. So, I hid my face from them and gave them over to the power of their enemies, whereby they were all killed in war. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I treated them as their despicable deeds of infidelity deserved and hid my face from them.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says this: “Now I will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be merciful and
    - type: text
      text: ' bring Jacob’s captives back and show pity on all the people of Israel. I will be zealous to not let them dishonor my holy name. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will forget '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text (MT) reads
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nasu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', meaning “will bear,” which, in reference to Israel’s shame, makes little or no sense in this context. However, a number of other versions adopt the alternative reading'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nashu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', meaning “will forget,” which is ideally suited to this context.'
      marker-yv: yv-n
    - type: text
      text: 'their shame and all their acts of unfaithfulness that they committed against me when they were living safely in their own land with none to make them afraid. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I have brought them back from the lands of their enemies, many nations will see the display of my holiness. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel. Yes, I sent them into exile among the nations, but I will then reunite them in their own land, not leaving a single one behind. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will pour out my Spirit on the people of Israel, and my divine presence will never again leave them. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is hard not to see the fulfillment of this with God’s people today. The Lord promises never to leave us or forsake us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will knock the bow from your left hand and rip the arrows out of your right. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will fall on the mountains of Israel, you and all your hordes and your coalition with you. I will feed your flesh to every kind of bird of prey and wild animal. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: corpses
    - type: text
      text: ' will lie '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unburied
    - type: text
      text: ' in the open fields, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you will [also] fall in the open fields.”
      marker-yv: yv-n
    - type: text
      text: 'for I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘I will send down fire on Magog and on those living securely on the coastlands, and they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make sure that my holy name is acknowledged among my people Israel, and I will make sure that my holy name is no longer allowed to be profaned. Then the nations will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the Holy One of Israel.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Behold, these things I have prophesied will happen very soon. It will all be fulfilled, for this is the day I have spoken about. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', declare it.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Then those living in the towns of Israel will go out and gather up all the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: abandoned
    - type: text
      text: ' weapons '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the dead soldiers
    - type: text
      text: ', make a bonfire with them, and burn them all up—the shields large and small, bows and arrows, javelins and spears. It will take seven '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The number seven is predominant in this chapter. It takes seven years to burn all the weapons and seven months to bury the dead (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The root word for “bury” is also found seven times in this chapter. To take seven years to burn the weapons can be seen as denoting a complete end to the warfare of the enemy.
      marker-yv: yv-n
    - type: text
      text: 'years to burn them all. '
