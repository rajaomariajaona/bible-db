      marker: fr
      children:
      - type: text
        text: 20:1–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “cities of refuge.” The need for cities of asylum arose because it was the duty of the nearest relative of a man who had been killed to search out and kill the killer. When it was clearly not a murder (intentional killing) but manslaughter (accidental killing), then the killer could seek asylum in one of the six cities of asylum, three on the west side and three on the east side of the Jordan River. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 21:12–14
    - type: usfm
      marker: ft
