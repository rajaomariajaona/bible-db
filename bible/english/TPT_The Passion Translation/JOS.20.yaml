    - type: text
      text: Yahweh
  - type: text
    text: ' instructed Joshua: “A person who accidentally and unintentionally kills someone will need a place of asylum—a city where he can run for safety. Otherwise, the dead man’s relatives will kill him.” So now '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to Joshua, “Tell the people of Israel to choose these cities of asylum '
  - type: usfm
    marker: f
    children:
