        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The protection of the manslayer would be based on the killer being proven innocent (accidental death). If found innocent, he would remain in the city until the death of the ruling high priest. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 35:25
    - type: usfm
      marker: ft
