    - type: usfm
      marker: ft
      children:
      - type: text
        text: . After the high priest’s death, the manslayer would receive amnesty and permission to return home. However, if he were found guilty of premeditated murder, there was no protection for him—the leaders would turn him over to the avenging relative of the dead man. See
    - type: usfm
      marker: ft
      children:
      - type: text
