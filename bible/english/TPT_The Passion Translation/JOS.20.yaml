    - type: text
      text: on the west side of the Jordan River
  - type: text
    text: ': Kedesh in Galilee in the hill country of Naphtali, Shechem in the hill country of Ephraim, and Kiriath Arba (that is, Hebron) in the hill country of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And beyond the Jordan east of Jericho, they dedicated Bezer in the desert plain belonging to the tribe of Reuben, Ramoth in Gilead, from the tribe of Gad, and Golan in Bashan, from the tribe of Manasseh. '
  - type: usfm
    marker: f
