document_id: EZK.30,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me again, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: I will use the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: armies
    - type: text
      text: ' of Nebuchadnezzar king of Babylon to destroy the huge population '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wealth,” which includes Egypt’s people. See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'of Egypt. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will bring him and his savage armies to ravage the country. They will wage war against Egypt and fill the country with corpses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will dry up the waterways of the Nile and hand over the country to evil men. I will cause the land to be destroyed and everything in it, at the hand of foreigners. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: “I will demolish the idols and destroy the false gods from Noph. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Memphis,” once a very important governmental center of Egypt, located about thirteen miles (twenty kilometers) from the southern point of the Nile delta. When judging a nation, God begins with destroying their false gods.
      marker-yv: yv-n
    - type: text
      text: 'Egypt will be left without a ruler and a plague of fear will sweep over Egypt. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make southern Egypt deserted, burn Zoan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zoan was a city on one of the eastern branches of the Nile delta, not far from the mouth of the river. It is also known by its Greek name, Tanis. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 19:11–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to the ground, and punish Thebes. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “No” or “No-Amon,” after the god Amon. Thebes was a magnificent city and the second most important city in Egypt after Memphis. It was the religious capital of Egypt, where many Egyptian kings built magnificent temples. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nah. 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will pour out my fury on Pelusium, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Sin,” a strategic city on the border of Egypt and the Philistine lands.
      marker-yv: yv-n
    - type: text
      text: 'the stronghold of Egypt. I will wipe out the great population of Thebes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will set Egypt on fire! Pelusium will be seized with great agony! The walls of Thebes will be torn down, and Noph will face distress daily from her enemies. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “face her enemies by day.” The meaning of the last clause in the Hebrew is uncertain. The Septuagint reads “Memphis will be flooded.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the cities of Heliopolis and Bubastis '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “On and Pi-Beseth,” two cities located on the eastern branch of the Nile delta. Both cities were important religious sites in Egypt.
      marker-yv: yv-n
    - type: text
      text: 'will go into captivity and their young soldiers will fall by the sword. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At Tahpanhes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tahpanhes was a fortress city in the eastern Nile delta.
      marker-yv: yv-n
    - type: text
      text: 'I will turn day to darkness when I shatter Egypt’s strength '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Targum. The Hebrew is “[yoke] bars.”
      marker-yv: yv-n
    - type: text
      text: 'and silence the boast of her might. I will blanket Egypt with dark clouds, and her people '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “daughters” or “villages.” The term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: benot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a homonym that may denote both meanings.
      marker-yv: yv-n
    - type: text
      text: 'will go into captivity. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That is how I will punish Egypt, and then they will acknowledge that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Will Defeat Egypt
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, prophesy and announce what I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Egypt
    - type: text
      text: ':'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mighty Egypt, a dominant world power for centuries, known for her pagan worship, was being judged by the Sovereign God. King Nebuchadnezzar and the Babylonians were the instruments in God’s hands to bring Egypt’s downfall.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Weep and wail, for the day of disaster is here!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “Woe worth the day.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eleventh year '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of our captivity
    - type: text
      text: ', on the seventh day of the first month, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This date was probably April 29, 587 BC, almost four months after Ezekiel’s prophecy against Egypt in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, I have broken the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: powerful
    - type: text
      text: ' arm of Pharaoh king of Egypt. Behold, you can see that no one has set the bone to make it heal. No one has wrapped it to help it heal and get strong enough to hold a sword again. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, ‘Behold, I am against you, Pharaoh king of Egypt; I will break both his arms, the strong one and the broken one, and I will make him drop the sword from his hand. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will scatter the Egyptians to the wind and disperse them among the nations. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will strengthen the arms of the king of Babylon and put my sword in his hand. I will break Pharaoh’s arms, and he will moan in pain like a dying man before the Babylonian king. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will strengthen the arms of the king of Babylon, but I will make the arms of Pharaoh hang limp. And they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' when I put my sword into the hands of the king of Babylon and he wields it against Egypt. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will scatter the Egyptians among the nations and disperse them among foreign lands. And then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the people of Egypt
    - type: text
      text: ' will acknowledge that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, the day is near, the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is near!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be a day dark with clouds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'a time of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: trouble
    - type: text
      text: ' for the nations.’'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“War will come upon Egypt, and terror will invade the land of Ethiopia. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cush,” that is, the upper Nile region.
      marker-yv: yv-n
    - type: text
      text: 'Egypt’s foundations will be leveled, multitudes will be slaughtered, and her riches '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These “riches” would also include the people themselves.
      marker-yv: yv-n
    - type: text
      text: 'will be carried away. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Egypt and all her allies, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “and the sons of my covenant” (LXX), that is, the Jews.
      marker-yv: yv-n
    - type: text
      text: 'Ethiopia, Libya, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Put.”
      marker-yv: yv-n
    - type: text
      text: 'and Lydia, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Lud.”
      marker-yv: yv-n
    - type: text
      text: 'all Arabia, and Kub '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Lub” (LXX). The location of this land is unknown.
      marker-yv: yv-n
    - type: text
      text: —they will all fall by the sword!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, “Egypt’s allies will fall, and the pride of Egypt’s might will crumble. They will fall by the sword from Migdol '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the north
    - type: text
      text: ' to Syene '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the south
    - type: text
      text: '. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“They will be the most desolate in the midst of wasted countries, and their cities the most ruined among ruined cities. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' when I set fire to Egypt and shatter all who support her.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“At that time, I will dispatch messengers by '
    - type: usfm
      marker: it
      children:
      - type: text
        text: river
    - type: text
      text: ' ships '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “swift messengers” (LXX).
      marker-yv: yv-n
    - type: text
      text: 'to terrify the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unsuspecting
    - type: text
      text: ' Ethiopians. They will panic on the day of Egypt’s doom. Judgment is sure to come! '
