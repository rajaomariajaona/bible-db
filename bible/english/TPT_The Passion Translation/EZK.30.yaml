document_id: EZK.30,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Egypt
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '10':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: I will use the '
  - type: text
    content: armies
  - type: text
    content: ' of Nebuchadnezzar king of Babylon to destroy the huge population '
  - type: note
    content: Or “wealth,” which includes Egypt’s people. See v. 4.
  - type: text
    content: 'of Egypt. '
  '11':
  - type: text
    content: 'I will bring him and his savage armies to ravage the country. They will wage war against Egypt and fill the country with corpses. '
  '12':
  - type: text
    content: 'I will dry up the waterways of the Nile and hand over the country to evil men. I will cause the land to be destroyed and everything in it, at the hand of foreigners. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '13':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “I will demolish the idols and destroy the false gods from Noph. '
  - type: note
    content: Or “Memphis,” once a very important governmental center of Egypt, located about thirteen miles (twenty kilometers) from the southern point of the Nile delta. When judging a nation, God begins with destroying their false gods.
  - type: text
    content: 'Egypt will be left without a ruler and a plague of fear will sweep over Egypt. '
  '14':
  - type: text
    content: 'I will make southern Egypt deserted, burn Zoan '
  - type: note
    content: Zoan was a city on one of the eastern branches of the Nile delta, not far from the mouth of the river. It is also known by its Greek name, Tanis. See Isa. 19:11–15.
  - type: text
    content: 'to the ground, and punish Thebes. '
  - type: note
    content: Or “No” or “No-Amon,” after the god Amon. Thebes was a magnificent city and the second most important city in Egypt after Memphis. It was the religious capital of Egypt, where many Egyptian kings built magnificent temples. See Nah. 3:8.
  '15':
  - type: text
    content: 'I will pour out my fury on Pelusium, '
  - type: note
    content: Or “Sin,” a strategic city on the border of Egypt and the Philistine lands.
  - type: text
    content: 'the stronghold of Egypt. I will wipe out the great population of Thebes. '
  '16':
  - type: text
    content: 'I will set Egypt on fire! Pelusium will be seized with great agony! The walls of Thebes will be torn down, and Noph will face distress daily from her enemies. '
  - type: note
    content: Or “face her enemies by day.” The meaning of the last clause in the Hebrew is uncertain. The Septuagint reads “Memphis will be flooded.”
  '17':
  - type: text
    content: 'And the cities of Heliopolis and Bubastis '
  - type: note
    content: Or “On and Pi-Beseth,” two cities located on the eastern branch of the Nile delta. Both cities were important religious sites in Egypt.
  - type: text
    content: 'will go into captivity and their young soldiers will fall by the sword. '
  '18':
  - type: text
    content: 'At Tahpanhes, '
  - type: note
    content: Tahpanhes was a fortress city in the eastern Nile delta.
  - type: text
    content: 'I will turn day to darkness when I shatter Egypt’s strength '
  - type: note
    content: As translated from the Targum. The Hebrew is “[yoke] bars.”
  - type: text
    content: 'and silence the boast of her might. I will blanket Egypt with dark clouds, and her people '
  - type: note
    content: Or “daughters” or “villages.” The term benot is a homonym that may denote both meanings.
  - type: text
    content: 'will go into captivity. '
  '19':
  - type: text
    content: 'That is how I will punish Egypt, and then they will acknowledge that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: God Will Defeat Egypt
  '2':
  - type: text
    content: '“Son of man, prophesy and announce what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say '
  - type: text
    content: to Egypt
  - type: text
    content: ':'
  - type: note
    content: Mighty Egypt, a dominant world power for centuries, known for her pagan worship, was being judged by the Sovereign God. King Nebuchadnezzar and the Babylonians were the instruments in God’s hands to bring Egypt’s downfall.
  - type: text
    content: “ ‘Weep and wail, for the day of disaster is here!
  - type: note
    content: Literally “Woe worth the day.”
  '20':
  - type: text
    content: 'In the eleventh year '
  - type: text
    content: of our captivity
  - type: text
    content: ', on the seventh day of the first month, '
  - type: note
    content: This date was probably April 29, 587 BC, almost four months after Ezekiel’s prophecy against Egypt in 29:1.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying: '
  '21':
  - type: text
    content: '“Son of man, I have broken the '
  - type: text
    content: powerful
  - type: text
    content: ' arm of Pharaoh king of Egypt. Behold, you can see that no one has set the bone to make it heal. No one has wrapped it to help it heal and get strong enough to hold a sword again. '
  '22':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, ‘Behold, I am against you, Pharaoh king of Egypt; I will break both his arms, the strong one and the broken one, and I will make him drop the sword from his hand. '
  '23':
  - type: text
    content: 'I will scatter the Egyptians to the wind and disperse them among the nations. '
  '24':
  - type: text
    content: 'I will strengthen the arms of the king of Babylon and put my sword in his hand. I will break Pharaoh’s arms, and he will moan in pain like a dying man before the Babylonian king. '
  '25':
  - type: text
    content: 'I will strengthen the arms of the king of Babylon, but I will make the arms of Pharaoh hang limp. And they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' when I put my sword into the hands of the king of Babylon and he wields it against Egypt. '
  '26':
  - type: text
    content: 'I will scatter the Egyptians among the nations and disperse them among foreign lands. And then '
  - type: text
    content: the people of Egypt
  - type: text
    content: ' will acknowledge that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: 'Yes, the day is near, the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is near!'
  - type: text
    content: It will be a day dark with clouds,
  - type: text
    content: 'a time of '
  - type: text
    content: trouble
  - type: text
    content: ' for the nations.’'
  '4':
  - type: text
    content: '“War will come upon Egypt, and terror will invade the land of Ethiopia. '
  - type: note
    content: Or “Cush,” that is, the upper Nile region.
  - type: text
    content: 'Egypt’s foundations will be leveled, multitudes will be slaughtered, and her riches '
  - type: note
    content: These “riches” would also include the people themselves.
  - type: text
    content: 'will be carried away. '
  '5':
  - type: text
    content: 'Egypt and all her allies, '
  - type: note
    content: Or “and the sons of my covenant” (LXX), that is, the Jews.
  - type: text
    content: 'Ethiopia, Libya, '
  - type: note
    content: Or “Put.”
  - type: text
    content: 'and Lydia, '
  - type: note
    content: Or “Lud.”
  - type: text
    content: 'all Arabia, and Kub '
  - type: note
    content: Or “Lub” (LXX). The location of this land is unknown.
  - type: text
    content: —they will all fall by the sword!”
  '6':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “Egypt’s allies will fall, and the pride of Egypt’s might will crumble. They will fall by the sword from Migdol '
  - type: text
    content: in the north
  - type: text
    content: ' to Syene '
  - type: text
    content: in the south
  - type: text
    content: '. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '7':
  - type: text
    content: '“They will be the most desolate in the midst of wasted countries, and their cities the most ruined among ruined cities. '
  '8':
  - type: text
    content: 'Then they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' when I set fire to Egypt and shatter all who support her.'
  '9':
  - type: text
    content: '“At that time, I will dispatch messengers by '
  - type: text
    content: river
  - type: text
    content: ' ships '
  - type: note
    content: Or “swift messengers” (LXX).
  - type: text
    content: 'to terrify the '
  - type: text
    content: unsuspecting
  - type: text
    content: ' Ethiopians. They will panic on the day of Egypt’s doom. Judgment is sure to come! '
