  '1':
  - type: heading
    content: The Cupbearer and the Baker and Their Dreams
  - type: text
    content: 'Some time later, '
  - type: note
    content: Eleven years had passed since the time Joseph was sold into slavery. He was about twenty-eight at this time.
  - type: text
    content: 'both Pharaoh’s chief steward '
  - type: note
    content: Or “cupbearer” (lit. “drink-giver”). He was the king’s trusted official and had a position to influence Pharaoh.
  - type: text
    content: 'and chief baker deeply offended their master, the king of Egypt. '
  - type: note
    content: 'Jewish tradition states that a fly had fallen into Pharaoh’s cup of wine, and a pebble was found in his bread, thus causing this “offense.” See Midrash: by Rashi.'
  '11':
  - type: text
    content: I was holding Pharaoh’s cup, so I took the grapes, squeezed them into his cup, and handed the cup to the king.”
  '12':
  - type: text
    content: Joseph said to him, “
  - type: text
    content: God has given me
  - type: text
    content: ' the interpretation of your dream: The three branches are three days. '
  '13':
  - type: text
    content: 'In three days, Pharaoh will pardon you and restore you to your post. You will once again hand Pharaoh’s cup to him as you used to do as his steward. '
  '14':
  - type: text
    content: 'When things start to go well for you, remember me, and please be kind and mention me to Pharaoh so that he might release me from here. '
  - type: note
    content: Joseph could prophesy the release of another, but not his own. Often, prophetic gifts and words of revelation over other people simply do not come for the prophet. They are gifts to be used to bless others, not for self-consumption. We need others to come with a word for our need. This keeps us dependent not only upon God but also upon others.
  '15':
  - type: text
    content: For I was kidnapped from the land of the Hebrews, and I have done nothing here to deserve being thrown into this dungeon.”
  - type: note
    content: Joseph felt forgotten. He had been forgotten a long, long time. He became a slave when he was seventeen years old, and soon afterward, Potiphar cast him into prison. Not until he was thirty did Pharaoh release him from prison. Thirteen years is a long time to be forgotten. His faith in God and the fulfillment of his dreams kept Joseph faithfully waiting for his day of promotion. Perhaps, like Joseph, you have been let down by others who promised to be a help to you but did not follow through on their pledge. Don’t despair, for God will never forget the plans he has for his children (see Jer. 29:11–13). Even if others let us down, God is always faithful and will bring his plans to pass at the appointed time.
  '16':
  - type: text
    content: When the chief baker saw how favorably Joseph interpreted the dream, he said to him, “
  - type: text
    content: Let me tell you my dream
  - type: text
    content: '. I saw three wicker breadbaskets stacked on my head '
  - type: text
    content: one above the other
  - type: text
    content: '. '
  '17':
  - type: text
    content: In the top basket, I saw all kinds of bread and pastries for Pharaoh to enjoy, but the birds came and ate out of the basket above my head.”
  '18':
  - type: text
    content: Joseph said, “
  - type: text
    content: God has given me
  - type: text
    content: ' the interpretation of your dream: The three baskets are three days. '
  '19':
  - type: text
    content: In three days, Pharaoh will behead you and impale you on a pole, and birds will eat the flesh off your corpse.”
  '2':
  - type: text
    content: 'Pharaoh was angry with his two officers, the chief steward and the chief baker, '
  '20':
  - type: text
    content: 'Three days later, it was Pharaoh’s birthday, and he threw a huge feast for all his household. He singled out among his servants the chief steward and the chief baker. '
  '21':
  - type: text
    content: 'He pardoned the chief steward and restored him to his post, and the steward handed Pharaoh his drink. '
  '22':
  - type: text
    content: 'But he had the chief baker '
  - type: text
    content: beheaded and
  - type: text
    content: ' impaled on a pole. So, Joseph had accurately interpreted both their dreams, '
  '23':
  - type: text
    content: but the chief steward completely forgot about Joseph and never remembered him.
  '3':
  - type: text
    content: 'so he incarcerated them in the palace of Potiphar, the captain of the guard, in the same prison where Joseph was bound. '
  '4':
  - type: text
    content: The captain of the guard placed them under Joseph’s charge, and they remained in custody for some time.
  - type: note
    content: 'Jesus was falsely accused, maligned, and crucified between two thieves. At Calvary, the one thief was released (to enter paradise), and the other killed. So it was with the two men imprisoned with Joseph, three days after they were released! Christ was rejected by his brothers (see John 7:5), sold by one of his own (see Matt. 26:14–15), and eventually cast into the prison of death (see 1 Peter 3:18–19). Psalm 105:18 gives us additional information about Joseph’s time in prison: “His feet were bruised by strong shackles and his soul was held by iron.” The last phrase can be translated “his soul entered into iron.” The inner strength of loving and serving in painful circumstances made Joseph’s soul as strong as iron. He learned to serve and to rule over himself first, before God released him to rule over others.'
  '5':
  - type: text
    content: 'Then one night, they both dreamed—the steward and the baker, officials of the king of Egypt. They each had a '
  - type: text
    content: prophetic
  - type: text
    content: ' dream with different interpretations.'
  '6':
  - type: text
    content: 'When Joseph came to them in the morning, he saw they looked miserable, '
  '7':
  - type: text
    content: so he asked Pharaoh’s two officials who were under his custody, “
  - type: text
    content: What’s wrong?
  - type: text
    content: ' Why the sad faces?”'
  '8':
  - type: text
    content: “We had dreams last night,” they answered, “and we have no one to interpret them.”
  - type: text
    content: And Joseph said to them, “God can interpret your dreams! Please, tell them to me.”
  '9':
  - type: text
    content: 'So the chief steward shared his dream with Joseph first. He said, “In my dream, I saw a vine with three branches in front of me. I watched as it budded, then immediately it blossomed, and its clusters ripened into grapes. '
