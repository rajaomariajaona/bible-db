document_id: GEN.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cupbearer and the Baker and Their Dreams
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Some time later, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Eleven years had passed since the time Joseph was sold into slavery. He was about twenty-eight at this time.
    marker-yv: yv-n
  - type: text
    text: 'both Pharaoh’s chief steward '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “cupbearer” (lit. “drink-giver”). He was the king’s trusted official and had a position to influence Pharaoh.
    marker-yv: yv-n
  - type: text
    text: 'and chief baker deeply offended their master, the king of Egypt. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jewish tradition states that a fly had fallen into Pharaoh’s cup of wine, and a pebble was found in his bread, thus causing this “offense.” See Midrash: by Rashi.'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pharaoh was angry with his two officers, the chief steward and the chief baker, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'so he incarcerated them in the palace of Potiphar, the captain of the guard, in the same prison where Joseph was bound. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The captain of the guard placed them under Joseph’s charge, and they remained in custody for some time.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was falsely accused, maligned, and crucified between two thieves. At Calvary, the one thief was released (to enter paradise), and the other killed. So it was with the two men imprisoned with Joseph, three days after they were released! Christ was rejected by his brothers (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 7:5
      metadata:
        usfm: JHN.7.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), sold by one of his own (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 26:14–15
      metadata:
        usfm: MAT.26.14+MAT.26.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and eventually cast into the prison of death (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 3:18–19
      metadata:
        usfm: 1PE.3.18+1PE.3.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psalm 105:18
      metadata:
        usfm: PSA.105.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'gives us additional information about Joseph’s time in prison: “His feet were bruised by strong shackles and his soul was held by iron.” The last phrase can be translated “his soul entered into iron.” The inner strength of loving and serving in painful circumstances made Joseph’s soul as strong as iron. He learned to serve and to rule over himself first, before God released him to rule over others.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then one night, they both dreamed—the steward and the baker, officials of the king of Egypt. They each had a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophetic
  - type: text
    text: ' dream with different interpretations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When Joseph came to them in the morning, he saw they looked miserable, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: so he asked Pharaoh’s two officials who were under his custody, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: What’s wrong?
  - type: text
    text: ' Why the sad faces?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “We had dreams last night,” they answered, “and we have no one to interpret them.”
- type: usfm
  marker: p
  children:
  - type: text
    text: And Joseph said to them, “God can interpret your dreams! Please, tell them to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'So the chief steward shared his dream with Joseph first. He said, “In my dream, I saw a vine with three branches in front of me. I watched as it budded, then immediately it blossomed, and its clusters ripened into grapes. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I was holding Pharaoh’s cup, so I took the grapes, squeezed them into his cup, and handed the cup to the king.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Joseph said to him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: God has given me
  - type: text
    text: ' the interpretation of your dream: The three branches are three days. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In three days, Pharaoh will pardon you and restore you to your post. You will once again hand Pharaoh’s cup to him as you used to do as his steward. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When things start to go well for you, remember me, and please be kind and mention me to Pharaoh so that he might release me from here. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph could prophesy the release of another, but not his own. Often, prophetic gifts and words of revelation over other people simply do not come for the prophet. They are gifts to be used to bless others, not for self-consumption. We need others to come with a word for our need. This keeps us dependent not only upon God but also upon others.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For I was kidnapped from the land of the Hebrews, and I have done nothing here to deserve being thrown into this dungeon.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 40:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joseph felt forgotten. He had been forgotten a long, long time. He became a slave when he was seventeen years old, and soon afterward, Potiphar cast him into prison. Not until he was thirty did Pharaoh release him from prison. Thirteen years is a long time to be forgotten. His faith in God and the fulfillment of his dreams kept Joseph faithfully waiting for his day of promotion. Perhaps, like Joseph, you have been let down by others who promised to be a help to you but did not follow through on their pledge. Don’t despair, for God will never forget the plans he has for his children (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 29:11–13
      metadata:
        usfm: JER.29.11+JER.29.12+JER.29.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Even if others let us down, God is always faithful and will bring his plans to pass at the appointed time.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the chief baker saw how favorably Joseph interpreted the dream, he said to him, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Let me tell you my dream
  - type: text
    text: '. I saw three wicker breadbaskets stacked on my head '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one above the other
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: In the top basket, I saw all kinds of bread and pastries for Pharaoh to enjoy, but the birds came and ate out of the basket above my head.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Joseph said, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: God has given me
  - type: text
    text: ' the interpretation of your dream: The three baskets are three days. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: In three days, Pharaoh will behead you and impale you on a pole, and birds will eat the flesh off your corpse.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Three days later, it was Pharaoh’s birthday, and he threw a huge feast for all his household. He singled out among his servants the chief steward and the chief baker. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He pardoned the chief steward and restored him to his post, and the steward handed Pharaoh his drink. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But he had the chief baker '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beheaded and
  - type: text
    text: ' impaled on a pole. So, Joseph had accurately interpreted both their dreams, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: but the chief steward completely forgot about Joseph and never remembered him.
