    content: Micah’s Lament over Judah’s Wickedness
  - type: text
    content: I’m so depressed and disappointed,
  - type: note
    content: Or “Woe is me.” The prophet Micah was sad as he saw the wickedness of the people. He felt as though he had wasted his life in trying to bring his people back to following Yahweh.
