  '19':
  - type: text
    content: 'Once more we ask:'
  - type: text
    content: 'have tender mercy '
  - type: note
    content: This is the nearly untranslatable Hebrew word racham, a homonym for “womb.” It conveys the thought of mercy, pity, compassion, and a tender love like that of a mother for the child inside her womb. God has “womb-love” for you. Although righteous anger at evil is a part of God’s character, his delight is in showing tender love and mercy, which always triumphs over judgment.
  - type: text
    content: on us,
  - type: text
    content: tread our iniquities under your feet,
  - type: text
    content: and hurl all our sins to the bottom of the sea.
  - type: note
    content: See Ps. 103:12; Isa. 43:25; 44:22; 2 Cor. 5:19; Heb. 8:12.
  '2':
  - type: text
    content: 'The godly '
  - type: note
    content: This is the Hebrew word chasid (or hasid), which is taken from the same root word as chesed (chesed means “merciful,” “loyal love,” “loving-kindness,” or “tender love”). To be godly is to be loving and kind, a person of chesed.
  - type: text
