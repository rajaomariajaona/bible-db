        children:
        - type: text
          text: . This liturgy involves symbolically casting off the sins of the previous year by tossing pieces of bread or another food into a body of flowing water. Just as the water carries away the bits of bread, so, too, are sins symbolically carried away. Since Rosh Hashanah is the Jewish new year, in this way, the participants express hope to start the new year with a clean slate.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Concerning evil, both hands do it well.
    - type: usfm
      marker: f
      children:
