        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This was off-putting imagery meant to revolt the original Jewish hearers. They had a strict cultural regulation of the uses of the right and left hands: food was eaten only with the right hand, while the left was used for less sanitary tasks. The Hebrew word translated “hands” here is'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kap
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which refers more specifically to the hollow of one’s palm. The implication is that not only were the people doing evil acts with both hands, including the left hand reserved for filthy tasks, but they were cupping their hands to scoop up evil.'
      marker-yv: yv-n
