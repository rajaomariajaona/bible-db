  - type: text
    content: 'and pardons the rebellion '
  - type: note
    content: Or “passes over our crimes [transgressions].” See Ex. 34:6.
  - type: text
    content: of the remnant of your people.
  - type: text
    content: You don’t hold your anger against us forever,
  - type: text
