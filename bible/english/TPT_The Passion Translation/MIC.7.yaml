  '20':
  - type: text
    content: 'You will demonstrate endless faithfulness to Jacob’s '
  - type: text
    content: tribes
  - type: text
    content: 'and to Abraham’s '
  - type: text
    content: descendants
  - type: text
    content: ' your constant love,'
  - type: text
    content: just like you swore to our ancestors
  - type: text
    content: in ancient times.
  - type: note
    content: Our Jewish friends read vv. 18–20 on Sabbath Shuvah (the Sabbath of Repentance) and publicly recite them on Yom Kippur (the Day of Atonement) after the book of Jonah. On the first day of Rosh Hashanah, the Tashlik liturgy is performed near a body of water. Tashlik is the Hebrew word for “cast,” “throw,” or “hurl” found in v. 19. This liturgy involves symbolically casting off the sins of the previous year by tossing pieces of bread or another food into a body of flowing water. Just as the water carries away the bits of bread, so, too, are sins symbolically carried away. Since Rosh Hashanah is the Jewish new year, in this way, the participants express hope to start the new year with a clean slate.
  '3':
  - type: text
    content: Concerning evil, both hands do it well.
  - type: note
    content: 'This was off-putting imagery meant to revolt the original Jewish hearers. They had a strict cultural regulation of the uses of the right and left hands: food was eaten only with the right hand, while the left was used for less sanitary tasks. The Hebrew word translated “hands” here is kap, which refers more specifically to the hollow of one’s palm. The implication is that not only were the people doing evil acts with both hands, including the left hand reserved for filthy tasks, but they were cupping their hands to scoop up evil.'
  - type: text
    content: Officials and judges ask for bribes,
  - type: text
    content: the man in power pronounces whatever he pleases,
  - type: text
