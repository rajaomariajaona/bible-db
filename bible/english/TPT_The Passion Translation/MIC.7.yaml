  '4':
  - type: text
    content: The best and brightest is like a briar bush,
  - type: text
    content: the most honest of them like a thorn hedge.
  - type: text
    content: Now here comes the punishment your prophets proclaimed.
  - type: note
    content: Or “the day of your watchmen [the prophets], your appointed [time of punishment], is coming.” The prophets were viewed as Israel’s “watchmen” because they were to see prophetically when trouble was coming and were supposed to warn the people so that they could change their evil ways and be delivered. See Jer. 6:17; Ezek. 3:17–21; Hos. 9:8.
  - type: text
