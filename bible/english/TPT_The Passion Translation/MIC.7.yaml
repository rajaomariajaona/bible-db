          text: Bashan and Gilead were regions on the east of the river Jordan and were among the first areas to come into the possession of the Israelites at the conquest. Invaders in the 700s BC captured their land. In effect, Micah was praying for the restoration of the territory God had once given them. Micah asked for a future that would be as glorious as their past, like it was under the united monarchy during the days of King Solomon.
      marker-yv: yv-n
