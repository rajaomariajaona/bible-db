document_id: NAM.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Destruction of Nineveh
  - type: text
    content: Doomed is the city of bloodshed,
  - type: text
    content: embodiment of treachery and thievery,
  - type: text
    content: where the murdering never stops!
  '10':
  - type: text
    content: 'Yet '
  - type: text
    content: the people of Thebes
  - type: text
    content: ' became exiles'
  - type: text
    content: and were carried off into captivity.
  - type: text
    content: Their infants were dashed to pieces on every street corner.
  - type: text
    content: They cast lots for her honored men—
  - type: text
    content: all the best and brightest were bound in chains and taken captive.
  '11':
  - type: text
    content: You will fall into a drunken stupor.
  - type: text
    content: You will go into hiding
  - type: text
    content: and seek refuge from the enemy.
  - type: heading
    content: Assyria Will Crumble
  '12':
  - type: text
    content: All your fortified cities are like fig trees
  - type: text
    content: 'with first-ripe figs: shake the tree and they fall'
  - type: text
    content: right into the open mouth of the eater.
  '13':
  - type: text
    content: Behold, all who remain in the midst of your cities
  - type: text
    content: are the women.
  - type: text
    content: The borders of your land
  - type: text
    content: are wide open to your enemies.
  - type: text
    content: Fire will devour your fortresses.
  - type: note
    content: Or “bars [of your gates].”
  '14':
  - type: text
    content: Go ahead and
  - type: text
    content: ' draw plenty of water'
  - type: text
    content: and prepare
  - type: text
    content: ' for the siege.'
  - type: text
    content: Strengthen your defenses.
  - type: text
    content: Get mud, trample the clay, make more bricks.
  '15':
  - type: text
    content: Yet the fire will devour you there.
  - type: text
    content: You will be slaughtered by the sword.
  - type: text
    content: It will consume you like locusts.
  - type: text
    content: You multiplied like hopping locusts
  - type: text
    content: and like swarming grasshoppers.
  '16':
  - type: text
    content: Your merchants multiplied
  - type: text
    content: until they were more than the stars in the sky.
  - type: text
    content: Like locusts they stripped the land,
  - type: text
    content: spread their wings, and flew away.
  '17':
  - type: text
    content: 'Your officials '
  - type: note
    content: The Hebrew term minzarayik is a hapax legomenon [lit. “spoken only once”]. Consequently, its meaning cannot be ascertained with any certainty. Only the context can be a guide. In this case, the rendering “your officials” or “your guards” is a reasonable hypothesis.
  - type: text
    content: were as numerous as grasshoppers,
  - type: text
    content: 'your scribes '
  - type: note
    content: The Hebrew term tipsarayik here is likely an Assyrian loanword. It may be translated “your scribes” or “your marshals,” denoting those professionals employed by the military for their skills in writing.
  - type: text
    content: like a swarm of locusts.
  - type: text
    content: On a cold day, they settle on the stone fences,
  - type: text
    content: 'but when the sun appears, they '
  - type: text
    content: abandon you
  - type: text
    content: ' and fly away;'
  - type: text
    content: no one knows where they are.
  - type: note
    content: Nahum was saying that the officials and scribes of Nineveh would all run away when the city was attacked.
  '18':
  - type: text
    content: Emperor of Assyria, your shepherds slumber,
  - type: text
    content: your nobles nod off to sleep soundly.
  - type: text
    content: 'All your people are '
  - type: text
    content: like sheep
  - type: text
    content: ' scattered on the mountains'
  - type: text
    content: with no one to bring them home.
  '19':
  - type: text
    content: There is no remedy for your injuries;
  - type: text
    content: your wound is fatal.
  - type: text
    content: All who hear the news about you
  - type: text
    content: applaud for joy over your downfall.
  - type: text
    content: For whoever was untouched
  - type: text
    content: by your endless evil?
  '2':
  - type: text
    content: Listen to
  - type: text
    content: ' the crack of the whip,'
  - type: text
    content: the rumble of the chariot wheels,
  - type: text
    content: the thunder of horses’ hooves,
  - type: text
    content: and charging chariots.
  '3':
  - type: text
    content: Horsemen advancing,
  - type: text
    content: gleaming swords and glistening spears,
  - type: text
    content: hosts of slain, heaps of corpses,
  - type: text
    content: dead bodies, too many to count.
  - type: text
    content: People stumble over the carcasses.
  '4':
  - type: text
    content: This is because
  - type: text
    content: ' you lustfully lured the nations'
  - type: text
    content: like a wanton whore.
  - type: text
    content: You acted so gracefully, yet you are a mistress of witchcraft.
  - type: text
    content: You sold entire nations into the sex trade
  - type: text
    content: and bewitched whole families into slavery.
  '5':
  - type: text
    content: 'Behold, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'declares to you:'
  - type: text
    content: “I am your enemy!
  - type: text
    content: I will lift up your skirt over your face,
  - type: text
    content: and I will make nations gawk at your nakedness
  - type: text
    content: and kingdoms at your shame.
  - type: note
    content: Nineveh had acted like a prostitute by luring other nations into her treacherous schemes. In the culture of that day, communities would punish a prostitute by stripping off her clothes, publicly exposing her shame. So Nineveh would endure public disgrace as a prostitute. See Jer. 13:26; Ezek. 16:36–38; Hos. 2:10.
  '6':
  - type: text
    content: I will pelt you with filth
  - type: text
    content: and make you an object of scorn
  - type: text
    content: and will treat you with contempt.
  '7':
  - type: text
    content: And all who look at you
  - type: text
    content: will turn their backs on you and say,
  - type: text
    content: ‘Poor Nineveh is a pile of rubble; who will grieve for you?
  - type: text
    content: Who will have sympathy for you?’ ”
  '8':
  - type: text
    content: Are you any better than Thebes,
  - type: note
    content: Or “No-Amon.” No-Amon means “the city of the god Amon.” Thebes is the Greek name for the Egyptian capital, once considered the greatest city of the ancient world. It was situated on the Nile River about 400 miles (650 kilometers) south of Egypt’s present capital, Cairo. The massive temple ruins of Thebes can still be seen at Karnak and Luxor.
  - type: text
    content: which once sat by the Nile surrounded by water,
  - type: text
    content: 'her moat '
  - type: note
    content: Or “walls.”
  - type: text
    content: of defense, a mighty river?
  '9':
  - type: text
    content: 'Ethiopia '
  - type: note
    content: The Egyptian Empire included the land south of Thebes called Cush (or Kush) in Hebrew. This region was called Ethiopia in Greco-Roman times and is recognized as such in the Septuagint. Cush also included most of modern Sudan and part of present-day Ethiopia (Abyssinia).
  - type: text
    content: and Egypt were her endless strength;
  - type: text
    content: 'Somalia and Libya '
  - type: note
    content: Or “Put.” Most scholars believe that Put (or Phut, the third son of Ham) was a region located along the African coast at the southern end of the Red Sea that would have included portions of modern Libya and Somalia.
  - type: text
    content: were her helpful allies.
