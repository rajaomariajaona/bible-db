document_id: NAM.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Destruction of Nineveh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Doomed is the city of bloodshed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: embodiment of treachery and thievery,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where the murdering never stops!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Listen to
  - type: text
    text: ' the crack of the whip,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: the rumble of the chariot wheels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the thunder of horses’ hooves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and charging chariots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Horsemen advancing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: gleaming swords and glistening spears,
- type: usfm
  marker: q1
  children:
  - type: text
    text: hosts of slain, heaps of corpses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dead bodies, too many to count.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People stumble over the carcasses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: This is because
  - type: text
    text: ' you lustfully lured the nations'
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a wanton whore.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You acted so gracefully, yet you are a mistress of witchcraft.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You sold entire nations into the sex trade
- type: usfm
  marker: q1
  children:
  - type: text
    text: and bewitched whole families into slavery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'declares to you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am your enemy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will lift up your skirt over your face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will make nations gawk at your nakedness
- type: usfm
  marker: q1
  children:
  - type: text
    text: and kingdoms at your shame.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nineveh had acted like a prostitute by luring other nations into her treacherous schemes. In the culture of that day, communities would punish a prostitute by stripping off her clothes, publicly exposing her shame. So Nineveh would endure public disgrace as a prostitute. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 13:26
      metadata:
        usfm: JER.13.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 16:36–38
      metadata:
        usfm: EZK.16.36+EZK.16.37+EZK.16.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 2:10
      metadata:
        usfm: HOS.2.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will pelt you with filth
- type: usfm
  marker: q1
  children:
  - type: text
    text: and make you an object of scorn
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will treat you with contempt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And all who look at you
- type: usfm
  marker: q1
  children:
  - type: text
    text: will turn their backs on you and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Poor Nineveh is a pile of rubble; who will grieve for you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who will have sympathy for you?’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Are you any better than Thebes,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “No-Amon.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: No-Amon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “the city of the god Amon.” Thebes is the Greek name for the Egyptian capital, once considered the greatest city of the ancient world. It was situated on the Nile River about 400 miles (650 kilometers) south of Egypt’s present capital, Cairo. The massive temple ruins of Thebes can still be seen at Karnak and Luxor.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: which once sat by the Nile surrounded by water,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'her moat '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “walls.”
    marker-yv: yv-n
  - type: text
    text: of defense, a mighty river?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ethiopia '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Egyptian Empire included the land south of Thebes called Cush (or Kush) in Hebrew. This region was called Ethiopia in Greco-Roman times and is recognized as such in the Septuagint. Cush also included most of modern Sudan and part of present-day Ethiopia (Abyssinia).
    marker-yv: yv-n
  - type: text
    text: and Egypt were her endless strength;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Somalia and Libya '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Put.” Most scholars believe that Put (or Phut, the third son of Ham) was a region located along the African coast at the southern end of the Red Sea that would have included portions of modern Libya and Somalia.
    marker-yv: yv-n
  - type: text
    text: were her helpful allies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Yet '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the people of Thebes
  - type: text
    text: ' became exiles'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and were carried off into captivity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their infants were dashed to pieces on every street corner.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cast lots for her honored men—
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the best and brightest were bound in chains and taken captive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You will fall into a drunken stupor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will go into hiding
- type: usfm
  marker: q1
  children:
  - type: text
    text: and seek refuge from the enemy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assyria Will Crumble
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: All your fortified cities are like fig trees
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'with first-ripe figs: shake the tree and they fall'
- type: usfm
  marker: q1
  children:
  - type: text
    text: right into the open mouth of the eater.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Behold, all who remain in the midst of your cities
- type: usfm
  marker: q1
  children:
  - type: text
    text: are the women.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The borders of your land
- type: usfm
  marker: q1
  children:
  - type: text
    text: are wide open to your enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fire will devour your fortresses.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “bars [of your gates].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Go ahead and
  - type: text
    text: ' draw plenty of water'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: and prepare
  - type: text
    text: ' for the siege.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strengthen your defenses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Get mud, trample the clay, make more bricks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Yet the fire will devour you there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be slaughtered by the sword.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will consume you like locusts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You multiplied like hopping locusts
- type: usfm
  marker: q1
  children:
  - type: text
    text: and like swarming grasshoppers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Your merchants multiplied
- type: usfm
  marker: q1
  children:
  - type: text
    text: until they were more than the stars in the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like locusts they stripped the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: spread their wings, and flew away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Your officials '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: minzarayik
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a hapax legomenon [lit. “spoken only once”]. Consequently, its meaning cannot be ascertained with any certainty. Only the context can be a guide. In this case, the rendering “your officials” or “your guards” is a reasonable hypothesis.
    marker-yv: yv-n
  - type: text
    text: were as numerous as grasshoppers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'your scribes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tipsarayik
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here is likely an Assyrian loanword. It may be translated “your scribes” or “your marshals,” denoting those professionals employed by the military for their skills in writing.
    marker-yv: yv-n
  - type: text
    text: like a swarm of locusts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On a cold day, they settle on the stone fences,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but when the sun appears, they '
  - type: usfm
    marker: it
    children:
    - type: text
      text: abandon you
  - type: text
    text: ' and fly away;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: no one knows where they are.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nahum was saying that the officials and scribes of Nineveh would all run away when the city was attacked.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Emperor of Assyria, your shepherds slumber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your nobles nod off to sleep soundly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All your people are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like sheep
  - type: text
    text: ' scattered on the mountains'
- type: usfm
  marker: q1
  children:
  - type: text
    text: with no one to bring them home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: There is no remedy for your injuries;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your wound is fatal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who hear the news about you
- type: usfm
  marker: q1
  children:
  - type: text
    text: applaud for joy over your downfall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For whoever was untouched
- type: usfm
  marker: q1
  children:
  - type: text
    text: by your endless evil?
