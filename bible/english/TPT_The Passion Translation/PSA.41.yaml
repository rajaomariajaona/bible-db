document_id: PSA.41,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: I Need You, Lord
  - type: text
    content: King David’s poetic song for the Pure and Shining One
  - type: text
    content: God always blesses those who are kind to the poor and helpless.
  - type: text
    content: They’re the first ones God helps
  - type: text
    content: when they find themselves in any trouble.
  '10':
  - type: text
    content: So Lord, please don’t desert me when I need you!
  - type: text
    content: Give me grace and get me back on my feet
  - type: text
    content: so I can triumph over them all.
  '11':
  - type: text
    content: Then I’ll know you’re pleased with me
  - type: text
    content: when you allow me to taste victory over all my foes.
  '12':
  - type: text
    content: Now stand up for me and don’t let me fall,
  - type: text
    content: for I’ve walked with integrity.
  - type: text
    content: Keep me before your face forever.
  '13':
  - type: text
    content: Everyone praise the Lord God of Israel, always and forever!
  - type: text
    content: For he is from eternity past
  - type: text
    content: and will remain for the eternity to come.
  - type: text
    content: That’s the way it will be forever.
  - type: text
    content: Faithful is our King! Amen!
  - type: note
    content: Some scholars believe this last verse was added as a “doxology of praise,” marking the end of the first book of Psalms. The word amen could be translated as “Faithful is our King!”
  - type: heading
    content: Book 2
  - type: heading
    content: The Exodus Psalms
  - type: heading
    content: Psalms of suffering and redemption
  '2':
  - type: text
    content: The Lord will preserve and protect them.
  - type: text
    content: They’ll be honored and esteemed
  - type: note
    content: Or “They will be blessed in the land.”
  - type: text
    content: while their enemies are defeated.
  '3':
  - type: text
    content: When they are sick, lying upon their bed of suffering,
  - type: text
    content: God will restore them.
  - type: text
    content: He will raise them up again and restore them back to health.
  '4':
  - type: text
    content: 'So '
  - type: text
    content: in my sickness
  - type: text
    content: ' I say to you,'
  - type: text
    content: “Lord, be my kind healer.
  - type: text
    content: Heal my body and soul; heal me, God!
  - type: text
    content: For I have confessed my sins to you.”
  - type: note
    content: Or “For I have sinned against you.”
  '5':
  - type: text
    content: But those who hate me wish the worst for me, saying,
  - type: text
    content: “When will he die and be forgotten?”
  '6':
  - type: text
    content: And when these “friends” come to visit me
  - type: text
    content: with their pious sympathy and their hollow words
  - type: text
    content: and with hypocrisy hidden in their hearts,
  - type: text
    content: I can see right through it all.
  - type: text
    content: For they come merely to gather gossip about me,
  - type: text
    content: using all they find to mock me with malicious hearts of slander.
  '7':
  - type: text
    content: They are wicked whisperers who imagine the worst for me,
  - type: text
    content: repeating their rumors, saying,
  '8':
  - type: text
    content: “He got what he deserved; it’s over for him!
  - type: text
    content: 'The spirit of infirmity '
  - type: note
    content: Or “A thing of Belial” or “An affliction from the abandoned one.”
  - type: text
    content: is upon him,
  - type: text
    content: and he’ll never get over this illness.”
  '9':
  - type: text
    content: Even my ally, my friend, has turned against me.
  - type: text
    content: He was one I totally trusted with my life,
  - type: text
    content: sharing supper with him,
  - type: note
    content: In the ancient Near Eastern culture, sharing a meal together was a sign of covenant friendship.
  - type: text
    content: and now he shows me nothing but betrayal and treachery.
  - type: text
    content: He has sold me as an enemy.
  - type: note
    content: The Hebrew literally reads “He lifted up his heel against me.” This is a powerful figure of speech meaning he was sold as an enemy and was treated treacherously. This verse was quoted, in part, by Jesus at the Last Supper (see John 13:18 and footnote).
