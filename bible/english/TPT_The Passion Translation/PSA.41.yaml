document_id: PSA.41,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: I Need You, Lord
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song for the Pure and Shining One
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God always blesses those who are kind to the poor and helpless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re the first ones God helps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they find themselves in any trouble.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So Lord, please don’t desert me when I need you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me grace and get me back on my feet
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I can triumph over them all.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll know you’re pleased with me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you allow me to taste victory over all my foes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now stand up for me and don’t let me fall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I’ve walked with integrity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep me before your face forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone praise the Lord God of Israel, always and forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he is from eternity past
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will remain for the eternity to come.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s the way it will be forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faithful is our King! Amen!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 41:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars believe this last verse was added as a “doxology of praise,” marking the end of the first book of Psalms. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: amen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: could be translated as “Faithful is our King!”
      marker-yv: yv-n
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Book 2
    marker-yv: yv-h
  - type: usfm
    marker: ms2
    children:
    - type: text
      text: The Exodus Psalms
    marker-yv: yv-h
  - type: usfm
    marker: ms3
    children:
    - type: text
      text: Psalms of suffering and redemption
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord will preserve and protect them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll be honored and esteemed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 41:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They will be blessed in the land.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while their enemies are defeated.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When they are sick, lying upon their bed of suffering,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will restore them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will raise them up again and restore them back to health.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in my sickness
    - type: text
      text: ' I say to you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Lord, be my kind healer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heal my body and soul; heal me, God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have confessed my sins to you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 41:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “For I have sinned against you.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who hate me wish the worst for me, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When will he die and be forgotten?”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when these “friends” come to visit me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with their pious sympathy and their hollow words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and with hypocrisy hidden in their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can see right through it all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they come merely to gather gossip about me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: using all they find to mock me with malicious hearts of slander.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are wicked whisperers who imagine the worst for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: repeating their rumors, saying,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He got what he deserved; it’s over for him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The spirit of infirmity '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 41:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “A thing of Belial” or “An affliction from the abandoned one.”
      marker-yv: yv-n
    - type: text
      text: is upon him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he’ll never get over this illness.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even my ally, my friend, has turned against me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was one I totally trusted with my life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sharing supper with him,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 41:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the ancient Near Eastern culture, sharing a meal together was a sign of covenant friendship.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and now he shows me nothing but betrayal and treachery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has sold me as an enemy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 41:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew literally reads “He lifted up his heel against me.” This is a powerful figure of speech meaning he was sold as an enemy and was treated treacherously. This verse was quoted, in part, by Jesus at the Last Supper (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and footnote).
      marker-yv: yv-n
