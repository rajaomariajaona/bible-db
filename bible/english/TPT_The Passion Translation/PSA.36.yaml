document_id: PSA.36,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Blessing of the Wise
  - type: text
    content: A poetic song by King David, the servant of the Lord
  - type: text
    content: The rebellion of sin speaks as an oracle of God,
  - type: text
    content: speaking deeply to the conscience of wicked men.
  - type: note
    content: Or “The heart of the wicked is rebellious to the core.”
  - type: text
    content: Yet they are still eager to sin
  - type: text
    content: ','
  - type: text
    content: for the fear of God is not before their eyes.
  '10':
  - type: text
    content: Lord, keep pouring out your unfailing love
  - type: text
    content: on those who are near you.
  - type: text
    content: Release more of your blessings to those who are loyal to you.
  '11':
  - type: text
    content: Don’t let these proud boasters trample me down;
  - type: text
    content: don’t let them push me around
  - type: text
    content: by the sheer strength of their wickedness.
  '12':
  - type: text
    content: There they lie in the dirt, these evil ones,
  - type: text
    content: thrown down to the ground, never to arise again!
  '2':
  - type: text
    content: See how they flatter themselves,
  - type: text
    content: unable to detect and detest their sins.
  - type: text
    content: They are crooked and conceited,
  - type: text
    content: convinced they can get away with anything.
  '3':
  - type: text
    content: Their wicked words are nothing but lies.
  - type: text
    content: Wisdom is far from them.
  - type: text
    content: Goodness is both forgotten and forsaken.
  '4':
  - type: text
    content: They lie awake at night to hatch their evil plots,
  - type: text
    content: always planning their schemes of darkness,
  - type: text
    content: and never once do they consider the evil of their ways.
  '5':
  - type: text
    content: But you, O Lord, your mercy-seat love is limitless,
  - type: text
    content: reaching higher than the highest heavens.
  - type: text
    content: Your great faithfulness is infinite,
  - type: text
    content: stretching over the whole earth.
  '6':
  - type: text
    content: Your righteousness is unmovable,
  - type: text
    content: just like the mighty mountains.
  - type: text
    content: Your judgments are as full of wisdom
  - type: text
    content: as the oceans are full of water.
  - type: text
    content: Your tender care and kindness leave no one forgotten,
  - type: text
    content: not a man or even a mouse.
  '7':
  - type: text
    content: O God, how extravagant is your cherishing love!
  - type: text
    content: All mankind can find a hiding place
  - type: text
    content: under the shadow of your wings.
  '8':
  - type: text
    content: 'All may drink of the anointing from the abundance '
  - type: note
    content: The Hebrew word translated “abundance” is literally “butterfat” or “oil.” It is a symbol of the anointing of the Holy Spirit.
  - type: text
    content: of your house.
  - type: note
    content: Or “They will be satisfied [or watered] in the abundance of your house.”
  - type: text
    content: All may drink their fill from the rivers of Eden.
  - type: note
    content: Or “Eden’s rivers of pleasure.” The garden of Eden had flowing rivers of delight. Eden means “pleasure.” The Hebrew word used here is the plural form of Eden.
  '9':
  - type: text
    content: 'The fountain of life flows from you '
  - type: note
    content: See Prov. 10:11; 13:14; John 1:4.
  - type: text
    content: to satisfy me
  - type: text
    content: .
  - type: text
    content: 'In your light '
  - type: text
    content: of holiness
  - type: text
    content: ' we receive the light '
  - type: text
    content: of revelation
  - type: text
    content: .
