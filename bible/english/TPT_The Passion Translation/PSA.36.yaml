document_id: PSA.36,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Blessing of the Wise
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poetic song by King David, the servant of the Lord
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The rebellion of sin speaks as an oracle of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: speaking deeply to the conscience of wicked men.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The heart of the wicked is rebellious to the core.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yet they are still eager to sin
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the fear of God is not before their eyes.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Lord, keep pouring out your unfailing love
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on those who are near you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Release more of your blessings to those who are loyal to you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Don’t let these proud boasters trample me down;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: don’t let them push me around
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by the sheer strength of their wickedness.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: There they lie in the dirt, these evil ones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: thrown down to the ground, never to arise again!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: See how they flatter themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: unable to detect and detest their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are crooked and conceited,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: convinced they can get away with anything.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Their wicked words are nothing but lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is far from them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Goodness is both forgotten and forsaken.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They lie awake at night to hatch their evil plots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: always planning their schemes of darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and never once do they consider the evil of their ways.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: But you, O Lord, your mercy-seat love is limitless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reaching higher than the highest heavens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your great faithfulness is infinite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stretching over the whole earth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your righteousness is unmovable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just like the mighty mountains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your judgments are as full of wisdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as the oceans are full of water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your tender care and kindness leave no one forgotten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not a man or even a mouse.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: O God, how extravagant is your cherishing love!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All mankind can find a hiding place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: under the shadow of your wings.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'All may drink of the anointing from the abundance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “abundance” is literally “butterfat” or “oil.” It is a symbol of the anointing of the Holy Spirit.
      marker-yv: yv-n
    - type: text
      text: of your house.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They will be satisfied [or watered] in the abundance of your house.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All may drink their fill from the rivers of Eden.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Eden’s rivers of pleasure.” The garden of Eden had flowing rivers of delight. Eden means “pleasure.” The Hebrew word used here is the plural form of Eden.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The fountain of life flows from you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: to satisfy me
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In your light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of holiness
    - type: text
      text: ' we receive the light '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of revelation
    - type: text
      text: .
