document_id: 2PE.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning about False Teachers
  - type: text
    content: 'In the past there arose false prophets '
  - type: note
    content: Or “Pretend prophets birthed themselves.”
  - type: text
    content: 'among '
  - type: text
    content: God’s
  - type: text
    content: ' people, just as there will continue to be false teachers who will secretly infiltrate in your midst '
  - type: text
    content: to divide you
  - type: text
    content: ', bringing with them their destructive heresies. '
  - type: note
    content: Or “destructive ways of thinking” (viewpoints).
  - type: text
    content: 'They will even deny the Master, who paid the price for them, bringing swift destruction on themselves. '
  '10':
  - type: text
    content: 'And this especially applies to those who live their lives despising authorities '
  - type: note
    content: Or “despising realms of power” (authority). The Aramaic can be translated “They do not tremble with awe while they blaspheme.”
  - type: text
    content: and who abandon themselves to chasing the depraved lusts of their flesh.
  - type: heading
    content: The Arrogance of False Teachers
  - type: text
    content: 'They are willfully arrogant and insolent, unafraid to insult the glorious ones. '
  - type: note
    content: Or “slandering reputations” or “blaspheming glories” (dignitaries). Because of the context, most believe this is speaking of “glorious” celestial beings in heaven (e.g., archangels). See Judah (Jude) 8–10.
  '11':
  - type: text
    content: 'Yet even angels, who are greater than they in power and strength, do not dare slander them before the Lord. '
  - type: note
    content: Some manuscripts do not have “before the Lord.”
  '12':
  - type: text
    content: 'These individuals are nothing but brute beasts—irrational creatures, born in the wild to be caught and destroyed—and they will perish like beasts. They are professional insulters, who slander whatever they don’t understand, and in their destruction they will be destroyed. '
  '13':
  - type: text
    content: 'For all the evil they have done will come crashing down on them. They consider it their great pleasure to carouse in broad daylight. When they come to your love feasts '
  - type: note
    content: Peter equates the gatherings of believers as “love feasts.” Our true purpose in coming together is to magnify and feast on the love of Christ, sharing his love with all.
  - type: text
    content: 'they are but stains and blemishes, reveling in their deceptions as they feast with you. '
  '14':
  - type: text
    content: 'They are addicted to adultery, with eyes that are insatiable, '
  - type: note
    content: Or “Their eyes are full of an adulteress.”
  - type: text
    content: with sins that never end. They seduce the vulnerable and are experts in their greed—they are but children of a curse!
  - type: heading
    content: The Example of Balaam
  '15':
  - type: text
    content: 'They have wandered off the main road and have gone astray, because they are prophets who love profit—the wages they earn by wrongdoing. They are following the example of Balaam, son of Beor, '
  - type: note
    content: Or “Bosor.”
  '16':
  - type: text
    content: who was rebuked for evil by a donkey incapable of speech yet that spoke with a human voice and restrained the prophet’s madness.
  - type: note
    content: See Num. 22–24.
  '17':
  - type: text
    content: 'These people are dried-up riverbeds, waterless clouds pushed along by stormy winds—the deepest darkness of gloom has been prepared for them. '
  '18':
  - type: text
    content: 'They spout off with their grandiose, impressive nonsense. Consumed with the lusts of the flesh, they lure '
  - type: text
    content: back into sin
  - type: text
    content: ' those who recently escaped from their error. '
  '19':
  - type: text
    content: They promise others freedom, yet they themselves are slaves to corruption, for people are slaves to whatever overcomes them.
  '2':
  - type: text
    content: 'Many will follow immoral lifestyles. '
  - type: note
    content: Or “sensualities” (outrageous behaviors).
  - type: text
    content: 'Because of these '
  - type: text
    content: corrupt false teachers
  - type: text
    content: ', the way of truth '
  - type: note
    content: Or “the true Way.” Some manuscripts have “the glory of the truth.”
  - type: text
    content: 'will be slandered. '
  '20':
  - type: text
    content: 'Those who escape the corrupting forces of this world system through the experience of knowing about our Lord and Savior, Jesus the Messiah, then go back into entanglement with them and are defeated by them, becoming worse off than they were to start with. '
  '21':
  - type: text
    content: 'It would have been much better for them never to have experienced the way of righteousness than to know it and then turn away from the sacred obligation '
  - type: note
    content: Or “holy command.”
  - type: text
    content: 'that was given to them. '
  '22':
  - type: text
    content: 'They become illustrations of the true proverb:'
  - type: text
    content: A dog will return to his own vomit
  - type: note
    content: See Prov. 26:11. The rest of the proverb is believed to be a quote from Heraclitus of Ephesus, known as the “weeping philosopher” (535–475 BC).
  - type: text
    content: and a washed pig to its rolling in the mud.
  '3':
  - type: text
    content: 'They are only out for themselves, '
  - type: note
    content: Or “with greed.”
  - type: text
    content: 'ready to exploit you for their own gain through their cunning arguments. Their condemnation has been a long time coming. But their destruction does not slumber '
  - type: note
    content: The Aramaic can be translated “Abaddon never slumbers.” Abaddon is a Hebrew term for the realm of the dead and symbolizes the bottomless pit.
  - type: text
    content: 'or sit idly by, '
  - type: text
    content: for it is sure to come
  - type: text
    content: .
  '4':
  - type: text
    content: 'Now, '
  - type: text
    content: don’t forget
  - type: text
    content: ', God had no pity for the angels when they sinned '
  - type: note
    content: Because of the context of Noah’s flood, these were possibly the “Watchers,” angels who sinned and rebelled against God’s laws by having sexual relations with women, thus producing offspring (Gen. 6:1–4). They are mentioned in Dan. 4:13, 17, 23; Judah (Jude) 6–7; the Book of 1 Enoch 6–10; the Book of Jubilees 5; and the Dead Sea Scrolls (The Book of Giants). God put them in chains (ropes) and bound them in Tartarus (the deepest pit of gloom) until their final judgment.
  - type: text
    content: 'but threw them into the lowest, darkest dungeon of gloom '
  - type: note
    content: The Greek uses the term Tartarus, a Hellenistic mythical term for the subterranean underworld, the lowest pit (of hell).
  - type: text
    content: and locked them in chains, where they are firmly held until the judgment of torment.
  - type: note
    content: As translated from the Aramaic and two older Greek uncials.
  '5':
  - type: text
    content: 'And he did not spare the former world '
  - type: note
    content: Or “original world.”
  - type: text
    content: in the days of Noah
  - type: text
    content: ' when he sent a flood to destroy a depraved world '
  - type: note
    content: Or “a world devoid of awe.”
  - type: text
    content: (although he protected Noah, the preacher of righteousness, along with seven members of his family).
  - type: note
    content: See Gen. 6–8; 1 Peter 3:20.
  '6':
  - type: text
    content: 'And '
  - type: text
    content: don’t forget that
  - type: text
    content: ' he reduced to ashes the cities of Sodom and Gomorrah, condemning them to ruin and destruction. '
  - type: note
    content: See Gen. 19.
  - type: text
    content: 'God appointed them to be examples as to what is coming to the ungodly. '
  - type: note
    content: Or “as an example to the ungodly of coming generations.” After seeing these three examples (fallen angels, people who lived at the time of the flood, Sodom and Gomorrah), it is difficult to believe that everyone will ultimately be saved. There is a doom that awaits the ungodly (those who do not believe in Jesus Christ, the Savior).
  '7':
  - type: text
    content: 'Yet he rescued a righteous man, Lot, suffering the indignity of the unbridled lusts of the lawless. '
  - type: note
    content: As translated from the Aramaic.
  '8':
  - type: text
    content: For righteous Lot lived among them day after day, distressed in his righteous soul by the rebellious deeds he saw and heard.
  '9':
  - type: text
    content: 'If the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: rescued Lot
  - type: text
    content: ', he knows how to continually rescue the godly from their trials and to reserve the ungodly for punishment on the day of judgment. '
  - type: note
    content: Or “to keep the unrighteous under punishment until the day of judgment,” which implies that the wicked are living under God’s punishment even before they are ultimately judged.
