document_id: 2PE.2,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning about False Teachers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the past there arose false prophets '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Pretend prophets birthed themselves.”
      marker-yv: yv-n
    - type: text
      text: 'among '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s
    - type: text
      text: ' people, just as there will continue to be false teachers who will secretly infiltrate in your midst '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to divide you
    - type: text
      text: ', bringing with them their destructive heresies. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “destructive ways of thinking” (viewpoints).
      marker-yv: yv-n
    - type: text
      text: 'They will even deny the Master, who paid the price for them, bringing swift destruction on themselves. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And this especially applies to those who live their lives despising authorities '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “despising realms of power” (authority). The Aramaic can be translated “They do not tremble with awe while they blaspheme.”
      marker-yv: yv-n
    - type: text
      text: and who abandon themselves to chasing the depraved lusts of their flesh.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Arrogance of False Teachers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are willfully arrogant and insolent, unafraid to insult the glorious ones. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “slandering reputations” or “blaspheming glories” (dignitaries). Because of the context, most believe this is speaking of “glorious” celestial beings in heaven (e.g., archangels). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judah (Jude) 8–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet even angels, who are greater than they in power and strength, do not dare slander them before the Lord. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts do not have “before the Lord.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These individuals are nothing but brute beasts—irrational creatures, born in the wild to be caught and destroyed—and they will perish like beasts. They are professional insulters, who slander whatever they don’t understand, and in their destruction they will be destroyed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For all the evil they have done will come crashing down on them. They consider it their great pleasure to carouse in broad daylight. When they come to your love feasts '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter equates the gatherings of believers as “love feasts.” Our true purpose in coming together is to magnify and feast on the love of Christ, sharing his love with all.
      marker-yv: yv-n
    - type: text
      text: 'they are but stains and blemishes, reveling in their deceptions as they feast with you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are addicted to adultery, with eyes that are insatiable, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Their eyes are full of an adulteress.”
      marker-yv: yv-n
    - type: text
      text: with sins that never end. They seduce the vulnerable and are experts in their greed—they are but children of a curse!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Example of Balaam
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have wandered off the main road and have gone astray, because they are prophets who love profit—the wages they earn by wrongdoing. They are following the example of Balaam, son of Beor, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Bosor.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who was rebuked for evil by a donkey incapable of speech yet that spoke with a human voice and restrained the prophet’s madness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 22–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These people are dried-up riverbeds, waterless clouds pushed along by stormy winds—the deepest darkness of gloom has been prepared for them. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They spout off with their grandiose, impressive nonsense. Consumed with the lusts of the flesh, they lure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: back into sin
    - type: text
      text: ' those who recently escaped from their error. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They promise others freedom, yet they themselves are slaves to corruption, for people are slaves to whatever overcomes them.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many will follow immoral lifestyles. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sensualities” (outrageous behaviors).
      marker-yv: yv-n
    - type: text
      text: 'Because of these '
    - type: usfm
      marker: it
      children:
      - type: text
        text: corrupt false teachers
    - type: text
      text: ', the way of truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the true Way.” Some manuscripts have “the glory of the truth.”
      marker-yv: yv-n
    - type: text
      text: 'will be slandered. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who escape the corrupting forces of this world system through the experience of knowing about our Lord and Savior, Jesus the Messiah, then go back into entanglement with them and are defeated by them, becoming worse off than they were to start with. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It would have been much better for them never to have experienced the way of righteousness than to know it and then turn away from the sacred obligation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “holy command.”
      marker-yv: yv-n
    - type: text
      text: 'that was given to them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They become illustrations of the true proverb:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A dog will return to his own vomit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 26:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The rest of the proverb is believed to be a quote from Heraclitus of Ephesus, known as the “weeping philosopher” (535–475 BC).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a washed pig to its rolling in the mud.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are only out for themselves, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with greed.”
      marker-yv: yv-n
    - type: text
      text: 'ready to exploit you for their own gain through their cunning arguments. Their condemnation has been a long time coming. But their destruction does not slumber '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “Abaddon never slumbers.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abaddon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a Hebrew term for the realm of the dead and symbolizes the bottomless pit.
      marker-yv: yv-n
    - type: text
      text: 'or sit idly by, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for it is sure to come
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: don’t forget
    - type: text
      text: ', God had no pity for the angels when they sinned '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because of the context of Noah’s flood, these were possibly the “Watchers,” angels who sinned and rebelled against God’s laws by having sexual relations with women, thus producing offspring (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 6:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). They are mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judah (Jude) 6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Book of 1 Enoch
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6–10; the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Book of Jubilees
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5; and the Dead Sea Scrolls (The Book of Giants). God put them in chains (ropes) and bound them in Tartarus (the deepest pit of gloom) until their final judgment.
      marker-yv: yv-n
    - type: text
      text: 'but threw them into the lowest, darkest dungeon of gloom '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek uses the term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tartarus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a Hellenistic mythical term for the subterranean underworld, the lowest pit (of hell).'
      marker-yv: yv-n
    - type: text
      text: and locked them in chains, where they are firmly held until the judgment of torment.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and two older Greek uncials.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he did not spare the former world '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “original world.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the days of Noah
    - type: text
      text: ' when he sent a flood to destroy a depraved world '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a world devoid of awe.”
      marker-yv: yv-n
    - type: text
      text: (although he protected Noah, the preacher of righteousness, along with seven members of his family).
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Gen. 6–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: it
      children:
      - type: text
        text: don’t forget that
    - type: text
      text: ' he reduced to ashes the cities of Sodom and Gomorrah, condemning them to ruin and destruction. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'God appointed them to be examples as to what is coming to the ungodly. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as an example to the ungodly of coming generations.” After seeing these three examples (fallen angels, people who lived at the time of the flood, Sodom and Gomorrah), it is difficult to believe that everyone will ultimately be saved. There is a doom that awaits the ungodly (those who do not believe in Jesus Christ, the Savior).
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet he rescued a righteous man, Lot, suffering the indignity of the unbridled lusts of the lawless. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For righteous Lot lived among them day after day, distressed in his righteous soul by the rebellious deeds he saw and heard.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rescued Lot
    - type: text
      text: ', he knows how to continually rescue the godly from their trials and to reserve the ungodly for punishment on the day of judgment. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to keep the unrighteous under punishment until the day of judgment,” which implies that the wicked are living under God’s punishment even before they are ultimately judged.
      marker-yv: yv-n
