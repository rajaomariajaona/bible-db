document_id: PHP.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Call to Rejoice and a Warning
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My beloved ones, don’t ever limit your joy or fail to rejoice in the wonderful experience of knowing our Lord Jesus!
- type: usfm
  marker: p
  children:
  - type: text
    text: I don’t mind repeating what I’ve already written you because it protects you—
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'beware of those religious hypocrites '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “dogs,” which is a figure of speech for religious hypocrites.
    marker-yv: yv-n
  - type: text
    text: 'who teach that you should be circumcised to please God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For we have already experienced “heart-circumcision,” and we worship God in the power and freedom of the Holy Spirit, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: not in laws and religious duties
  - type: text
    text: . We are those who boast in what Jesus Christ has done, and not in what we can accomplish in our own strength.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'It’s true that '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I once relied on all that I had become
  - type: text
    text: . I had a reason to boast and impress people with my accomplishments—more than others—for my pedigree was impeccable.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Example of Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I was born a true Hebrew of the heritage of Israel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This meant that he could trace his family line all the way back to Abraham. There is also an inference that Paul spoke Hebrew-Aramaic as his native tongue and did not adopt Greek customs.
    marker-yv: yv-n
  - type: text
    text: 'as the son of a Jewish man from the tribe of Benjamin. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The tribe of Benjamin was honored as the tribe most loyal to the house of David.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Benjamin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “son of my right hand.”
    marker-yv: yv-n
  - type: text
    text: 'I was circumcised eight days after my birth and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was raised in the strict tradition of Orthodox Judaism
  - type: text
    text: ', living a separated '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A Pharisee was known as a “separated one,” who religiously followed all the laws of Judaism.
    marker-yv: yv-n
  - type: text
    text: 'and devout life as a Pharisee. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And concerning the righteousness of the Torah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the written law.”
    marker-yv: yv-n
  - type: text
    text: no one surpassed me; I was without a peer. Furthermore, as a fiery defender of the truth, I persecuted the messianic believers with religious zeal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Yet all of the accomplishments that I once took credit for, I’ve now forsaken them and I regard it all as nothing compared to the delight of experiencing Jesus Christ as my Lord! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: To truly know him meant letting go of everything from my past and throwing all my boasting on the garbage heap. It’s all like a pile of manure to me now, so that I may be enriched in the reality of knowing Jesus Christ and embrace him as Lord in all of his greatness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'My passion is to be consumed with him and not cling to my own “righteousness” based in keeping the written Law. My only “righteousness” will be his, based on the faithfulness of Jesus Christ—the very righteousness that comes from God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And I continually long to know the wonders of Jesus and to experience the overflowing power of his resurrection working in me. I will be one with him in his sufferings and become like him in his death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Only then will I be able to experience complete oneness with him in his resurrection from the realm of death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I admit that I haven’t yet acquired the absolute fullness that I’m pursuing, but I run with passion '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into his abundance
  - type: text
    text: ' so that I may reach the purpose for which Christ Jesus laid hold of me to make me his own. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I don’t depend on my own strength to accomplish this; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase is translated from the Aramaic. The Greek text states “I, myself, have not taken possession of it.”
    marker-yv: yv-n
  - type: text
    text: 'however I do have one compelling focus: I forget all of the past as I fasten my heart to the future instead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I run straight for the divine invitation of reaching the heavenly goal and gaining the victory-prize through the anointing of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So let all who are fully mature have this same passion, and if anyone is not yet gripped by these desires, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “those who don’t run this way, God will reveal it to them.”
    marker-yv: yv-n
  - type: text
    text: 'God will reveal it to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And let us all advance together to reach this victory-prize, following one path with one passion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'My beloved friends, imitate my walk with God and follow all those who walk according to the way of life we modeled before you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For there are many who live by different standards. As I’ve warned you many times (I weep as I write these words), they are enemies of the cross of the Anointed One and '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'doom awaits them. Their god has possessed them and made them mute. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic. The Greek states “their god is their belly,” which is meaningless to the average English speaker.
    marker-yv: yv-n
  - type: text
    text: Their boast is in their shameful lifestyles and their minds are in the dirt.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic. It literally means “their conscience is in the ground.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But we are a colony '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “citizenship,” or “commonwealth.”
    marker-yv: yv-n
  - type: text
    text: 'of heaven on earth as we cling tightly to our life-giver, the Lord Jesus Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'who will transform our humble bodies '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the body of our humility.”
    marker-yv: yv-n
  - type: text
    text: 'and transfigure us into the identical likeness of his glorified body. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the body of his glory.”
    marker-yv: yv-n
  - type: text
    text: And using his matchless power, he continually subdues everything to himself.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “everyone is in submission to him.”
    marker-yv: yv-n
