document_id: PHP.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Rejoice and a Warning
  - type: text
    content: My beloved ones, don’t ever limit your joy or fail to rejoice in the wonderful experience of knowing our Lord Jesus!
  - type: text
    content: I don’t mind repeating what I’ve already written you because it protects you—
  '10':
  - type: text
    content: 'And I continually long to know the wonders of Jesus and to experience the overflowing power of his resurrection working in me. I will be one with him in his sufferings and become like him in his death. '
  '11':
  - type: text
    content: Only then will I be able to experience complete oneness with him in his resurrection from the realm of death.
  '12':
  - type: text
    content: 'I admit that I haven’t yet acquired the absolute fullness that I’m pursuing, but I run with passion '
  - type: text
    content: into his abundance
  - type: text
    content: ' so that I may reach the purpose for which Christ Jesus laid hold of me to make me his own. '
  '13':
  - type: text
    content: 'I don’t depend on my own strength to accomplish this; '
  - type: note
    content: This phrase is translated from the Aramaic. The Greek text states “I, myself, have not taken possession of it.”
  - type: text
    content: 'however I do have one compelling focus: I forget all of the past as I fasten my heart to the future instead. '
  '14':
  - type: text
    content: 'I run straight for the divine invitation of reaching the heavenly goal and gaining the victory-prize through the anointing of Jesus. '
  '15':
  - type: text
    content: 'So let all who are fully mature have this same passion, and if anyone is not yet gripped by these desires, '
  - type: note
    content: The Aramaic can be translated “those who don’t run this way, God will reveal it to them.”
  - type: text
    content: 'God will reveal it to them. '
  '16':
  - type: text
    content: And let us all advance together to reach this victory-prize, following one path with one passion.
  '17':
  - type: text
    content: 'My beloved friends, imitate my walk with God and follow all those who walk according to the way of life we modeled before you. '
  '18':
  - type: text
    content: 'For there are many who live by different standards. As I’ve warned you many times (I weep as I write these words), they are enemies of the cross of the Anointed One and '
  '19':
  - type: text
    content: 'doom awaits them. Their god has possessed them and made them mute. '
  - type: note
    content: Translated from the Aramaic. The Greek states “their god is their belly,” which is meaningless to the average English speaker.
  - type: text
    content: Their boast is in their shameful lifestyles and their minds are in the dirt.
  - type: note
    content: Translated from the Aramaic. It literally means “their conscience is in the ground.”
  '2':
  - type: text
    content: 'beware of those religious hypocrites '
  - type: note
    content: Literally “dogs,” which is a figure of speech for religious hypocrites.
  - type: text
    content: 'who teach that you should be circumcised to please God. '
  '20':
  - type: text
    content: 'But we are a colony '
  - type: note
    content: Or “citizenship,” or “commonwealth.”
  - type: text
    content: 'of heaven on earth as we cling tightly to our life-giver, the Lord Jesus Christ, '
  '21':
  - type: text
    content: 'who will transform our humble bodies '
  - type: note
    content: Or “the body of our humility.”
  - type: text
    content: 'and transfigure us into the identical likeness of his glorified body. '
  - type: note
    content: Or “the body of his glory.”
  - type: text
    content: And using his matchless power, he continually subdues everything to himself.
  - type: note
    content: The Aramaic can be translated “everyone is in submission to him.”
  '3':
  - type: text
    content: 'For we have already experienced “heart-circumcision,” and we worship God in the power and freedom of the Holy Spirit, '
  - type: text
    content: not in laws and religious duties
  - type: text
    content: . We are those who boast in what Jesus Christ has done, and not in what we can accomplish in our own strength.
  '4':
  - type: text
    content: 'It’s true that '
  - type: text
    content: I once relied on all that I had become
  - type: text
    content: . I had a reason to boast and impress people with my accomplishments—more than others—for my pedigree was impeccable.
  - type: heading
    content: The Example of Paul
  '5':
  - type: text
    content: 'I was born a true Hebrew of the heritage of Israel '
  - type: note
    content: This meant that he could trace his family line all the way back to Abraham. There is also an inference that Paul spoke Hebrew-Aramaic as his native tongue and did not adopt Greek customs.
  - type: text
    content: 'as the son of a Jewish man from the tribe of Benjamin. '
  - type: note
    content: The tribe of Benjamin was honored as the tribe most loyal to the house of David. Benjamin means “son of my right hand.”
  - type: text
    content: 'I was circumcised eight days after my birth and '
  - type: text
    content: was raised in the strict tradition of Orthodox Judaism
  - type: text
    content: ', living a separated '
  - type: note
    content: A Pharisee was known as a “separated one,” who religiously followed all the laws of Judaism.
  - type: text
    content: 'and devout life as a Pharisee. '
  '6':
  - type: text
    content: 'And concerning the righteousness of the Torah, '
  - type: note
    content: Or “the written law.”
  - type: text
    content: no one surpassed me; I was without a peer. Furthermore, as a fiery defender of the truth, I persecuted the messianic believers with religious zeal.
  '7':
  - type: text
    content: 'Yet all of the accomplishments that I once took credit for, I’ve now forsaken them and I regard it all as nothing compared to the delight of experiencing Jesus Christ as my Lord! '
  '8':
  - type: text
    content: To truly know him meant letting go of everything from my past and throwing all my boasting on the garbage heap. It’s all like a pile of manure to me now, so that I may be enriched in the reality of knowing Jesus Christ and embrace him as Lord in all of his greatness.
  '9':
  - type: text
    content: 'My passion is to be consumed with him and not cling to my own “righteousness” based in keeping the written Law. My only “righteousness” will be his, based on the faithfulness of Jesus Christ—the very righteousness that comes from God. '
