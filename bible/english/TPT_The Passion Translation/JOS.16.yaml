- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to Joseph’s Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The territory assigned to Joseph’s descendants began east of the springs of Jericho near the Jordan, then turned north through the desert and into the hill country as far as Bethel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'From Bethel (that is, Luz), '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew reads “From Bethel to Luz.”
    marker-yv: yv-n
  - type: text
    text: 'it crossed over to Arkite '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Arkites were descendants of Arki, a son of Canaan and grandson of Ham (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 10:15–17
      metadata:
        usfm: GEN.10.15+GEN.10.16+GEN.10.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'territory at Ataroth. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Ataroth Addar.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'It then descended westward to the territory of the Japhletites as far as the border of Lower Beth Horon and Gezer, ending at the Mediterranean Sea. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ephraim and Manasseh, the descendants of Joseph, inherited this entire territory.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Land Given to Ephraim’s Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The southern boundary of the territory of the tribe of Ephraim went from Ataroth Addar in the east to Upper Beth Horon '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'then westward to the Sea. The northern boundary went from Michmethath to the east of Taanath-Shiloh and going further to the east of Janoah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Scholars identify Janoah with modern Yanun, eight miles southeast of Nablus.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'From Janoah the border descended to Ataroth and Naarah. It touched Jericho and came out at the Jordan River. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'From Tappuah, it proceeded westward to the Kanah Ravine and ended at the Sea. The inheritance of the families of the tribe of Ephraim also included the towns and villages set apart for them within the territory of West Manasseh. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:8–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17:8–10
      metadata:
        usfm: JOS.17.8+JOS.17.9+JOS.17.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: However, the Ephraimites did not drive out the Canaanites from the city of Gezer, but they conscripted the Canaanites to serve them to this day.
