document_id: JOS.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Land Given to Joseph’s Descendants
  - type: text
    content: 'The territory assigned to Joseph’s descendants began east of the springs of Jericho near the Jordan, then turned north through the desert and into the hill country as far as Bethel. '
  '10':
  - type: text
    content: However, the Ephraimites did not drive out the Canaanites from the city of Gezer, but they conscripted the Canaanites to serve them to this day.
  '2':
  - type: text
    content: 'From Bethel (that is, Luz), '
  - type: note
    content: As translated from the Septuagint. The Hebrew reads “From Bethel to Luz.”
  - type: text
    content: 'it crossed over to Arkite '
  - type: note
    content: The Arkites were descendants of Arki, a son of Canaan and grandson of Ham (see Gen. 10:15–17).
  - type: text
    content: 'territory at Ataroth. '
  - type: note
    content: Or “Ataroth Addar.”
  '3':
  - type: text
    content: 'It then descended westward to the territory of the Japhletites as far as the border of Lower Beth Horon and Gezer, ending at the Mediterranean Sea. '
  '4':
  - type: text
    content: Ephraim and Manasseh, the descendants of Joseph, inherited this entire territory.
  - type: heading
    content: The Land Given to Ephraim’s Descendants
  '5':
  - type: text
    content: 'The southern boundary of the territory of the tribe of Ephraim went from Ataroth Addar in the east to Upper Beth Horon '
  '6':
  - type: text
    content: 'then westward to the Sea. The northern boundary went from Michmethath to the east of Taanath-Shiloh and going further to the east of Janoah. '
  - type: note
    content: Scholars identify Janoah with modern Yanun, eight miles southeast of Nablus.
  '7':
  - type: text
    content: 'From Janoah the border descended to Ataroth and Naarah. It touched Jericho and came out at the Jordan River. '
  '8':
  - type: text
    content: 'From Tappuah, it proceeded westward to the Kanah Ravine and ended at the Sea. The inheritance of the families of the tribe of Ephraim also included the towns and villages set apart for them within the territory of West Manasseh. '
  - type: note
    content: See 17:8–10.
