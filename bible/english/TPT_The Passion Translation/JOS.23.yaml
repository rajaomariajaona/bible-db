document_id: JOS.23,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua’s Farewell at Shiloh
  - type: text
    content: 'Many years had passed since '
  - type: text
    content: Yahweh
  - type: text
    content: ' had given Israel rest '
  - type: note
    content: See Matt. 11:28; Heb. 4:1–11. Jesus brings us into the faith-rest life.
  - type: text
    content: 'from all their enemies, and Joshua was very old. '
  - type: note
    content: This was about twenty-five years later. Joshua was one hundred and ten when he made a final speech to the nation. As Jacob had blessed his sons (see Gen. 49) and Moses the people (see Deut. 33), so Joshua gave a final speech before he died.
  '10':
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God fights for you as he promised he would! That is why just one of you causes a thousand of our enemies to run away. '
  - type: note
    content: See Lev. 26:8; Deut. 32:30.
  '11':
  - type: text
    content: 'Above all else, keep watch over your hearts, so as to always love '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God.'
  - type: note
    content: To those under the law of Moses, God is to be loved (see Deut. 6:4–5), and so much more for those who have been set free to follow Jesus Christ, our Beloved. Serving God must be based on loving him with all our hearts.
  '12':
  - type: text
    content: '“But if you ever turn away and make alliances with the nations that remain in your midst, and establish friendly relations with them and intermarry, '
  '13':
  - type: text
    content: 'then you may be sure that '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God will no longer drive them out before you. Instead they will become a snare and a trap for you! They will be like whips on your backsides and thorns in your eyes until you perish from the good land that '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God has given you.'
  - type: note
    content: See Deut. 4:25–26; 11:16–17.
  '14':
  - type: text
    content: '“Now I am about to go the way of all humanity. '
  - type: note
    content: Or “I am going the way of everything earthly.” Joshua realized his mortality and knew he didn’t have much longer to live. See 1 Kings 2:2–3.
  - type: text
    content: 'You know with all your heart and soul that not one promise of '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God has failed. Without a doubt, every promise he made to us he has kept; he has fulfilled them all. '
  - type: note
    content: See 2 Cor. 1:20.
  '15':
  - type: text
    content: 'Just as he has kept every '
  - type: text
    content: wonderful
  - type: text
    content: ' promise he ever made to you, so '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God will carry out every threat and will obliterate you completely from this good land which he has given you. '
  '16':
  - type: text
    content: 'If you break the covenant our God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', made with you and worship other gods and bow down to them, his anger will blaze against you. He will punish you, and he will remove you from the face of this good land he has given you.”'
  '2':
  - type: text
    content: 'So Joshua called together all the Israelites, including all their leaders—elders, judges, and officials—and told them, “I’m now very old '
  - type: text
    content: and don’t have much longer to live
  - type: text
    content: '. '
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' your God '
  - type: text
    content: has shown you his power
  - type: text
    content: ' and fought against your enemies for you. You have seen all '
  - type: text
    content: the wonders
  - type: text
    content: ' that he has done to all these nations because '
  - type: text
    content: he loves
  - type: text
    content: ' you. '
  '4':
  - type: text
    content: 'See, I have assigned to your tribes all the land from the Jordan River in the east to the Mediterranean Sea in the west. I have given you the land of all the nations that we’ve already conquered as an inheritance, and also the land of those nations that we’ve yet to conquer. '
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' your God will '
  - type: text
    content: absolutely
  - type: text
    content: ' keep his promises to you. He will drive out all your enemies and make them retreat before you so that you will possess their land. '
  '6':
  - type: text
    content: 'So be very strong and steadfast; be careful to obey fully what is written in the Scroll '
  - type: note
    content: Singular, not “Scrolls,” which shows that Moses was the author of the Torah and that it is one book in five parts, a five-fold expression of God’s instruction to Israel.
  - type: text
    content: 'of the teaching of Moses, without deviating from it. '
  - type: note
    content: Or “turning aside from it neither to the right nor to the left.” See Num. 20:17; Deut. 2:27; 2 Sam. 2:19–21. This signifies being steadfast in following God’s Word.
  '7':
  - type: text
    content: 'Do not intermingle with the nations that are left among you nor speak the names of their gods when you take an oath. And by all means don’t worship or pray to them. '
  '8':
  - type: text
    content: 'As you have done until now, cling tightly to '
  - type: text
    content: Yahweh
  - type: text
    content: ', for he is your God. '
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ' has driven out great and powerful nations before you! No one was able to withstand you, '
