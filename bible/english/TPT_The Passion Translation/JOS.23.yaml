verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua’s Farewell at Shiloh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many years had passed since '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had given Israel rest '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 11:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 4:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus brings us into the faith-rest life.
      marker-yv: yv-n
    - type: text
      text: 'from all their enemies, and Joshua was very old. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was about twenty-five years later. Joshua was one hundred and ten when he made a final speech to the nation. As Jacob had blessed his sons (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and Moses the people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), so Joshua gave a final speech before he died.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God fights for you as he promised he would! That is why just one of you causes a thousand of our enemies to run away. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 26:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 32:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Above all else, keep watch over your hearts, so as to always love '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To those under the law of Moses, God is to be loved (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 6:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and so much more for those who have been set free to follow Jesus Christ, our Beloved. Serving God must be based on loving him with all our hearts.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if you ever turn away and make alliances with the nations that remain in your midst, and establish friendly relations with them and intermarry, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then you may be sure that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God will no longer drive them out before you. Instead they will become a snare and a trap for you! They will be like whips on your backsides and thorns in your eyes until you perish from the good land that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God has given you.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 4:25–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 11:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now I am about to go the way of all humanity. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I am going the way of everything earthly.” Joshua realized his mortality and knew he didn’t have much longer to live. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 2:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'You know with all your heart and soul that not one promise of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God has failed. Without a doubt, every promise he made to us he has kept; he has fulfilled them all. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just as he has kept every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wonderful
    - type: text
      text: ' promise he ever made to you, so '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God will carry out every threat and will obliterate you completely from this good land which he has given you. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you break the covenant our God, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', made with you and worship other gods and bow down to them, his anger will blaze against you. He will punish you, and he will remove you from the face of this good land he has given you.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua called together all the Israelites, including all their leaders—elders, judges, and officials—and told them, “I’m now very old '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and don’t have much longer to live
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has shown you his power
    - type: text
      text: ' and fought against your enemies for you. You have seen all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the wonders
    - type: text
      text: ' that he has done to all these nations because '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he loves
    - type: text
      text: ' you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, I have assigned to your tribes all the land from the Jordan River in the east to the Mediterranean Sea in the west. I have given you the land of all the nations that we’ve already conquered as an inheritance, and also the land of those nations that we’ve yet to conquer. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: absolutely
    - type: text
      text: ' keep his promises to you. He will drive out all your enemies and make them retreat before you so that you will possess their land. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So be very strong and steadfast; be careful to obey fully what is written in the Scroll '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Singular, not “Scrolls,” which shows that Moses was the author of the Torah and that it is one book in five parts, a five-fold expression of God’s instruction to Israel.
      marker-yv: yv-n
    - type: text
      text: 'of the teaching of Moses, without deviating from it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “turning aside from it neither to the right nor to the left.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 20:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 2:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 2:19–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This signifies being steadfast in following God’s Word.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not intermingle with the nations that are left among you nor speak the names of their gods when you take an oath. And by all means don’t worship or pray to them. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As you have done until now, cling tightly to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', for he is your God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has driven out great and powerful nations before you! No one was able to withstand you, '
