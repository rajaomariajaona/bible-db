  - type: text
    content: everybody everywhere, pay attention!
  - type: text
    content: Has anything like this ever happened in your lifetime
  - type: text
    content: or in the days of your ancestors?
  '20':
  - type: text
    content: The sources of water have run dry
  - type: text
    content: and fire has devoured the pasturelands,
  - type: text
    content: leaving the wild animals panting loudly for you.
  '3':
  - type: text
    content: Tell your children about it!
  - type: text
    content: And tell them to tell their children
  - type: text
    content: and to tell their children to tell the next generation.
  '4':
  - type: text
    content: 'What the cutting-locust '
  - type: note
    content: Is this locust plague to be interpreted literally or figuratively? Possibly both. Historians recorded many plagues of locusts that destroyed the land. However, as with all prophetic writings, there can be a metaphorical interpretation as well as a literal one. Joel used four distinct Hebrew words for the locust plague. These four names likely refer to the four stages of the locust as it develops. The first is the Hebrew word gazam, which refers to the larva of a locust that, after hatching, begins to cut and feed or gnaw on the sprout or first part of a plant that emerges. It is similar to a palmerworm or cutworm. Metaphorically, it speaks of doctrines or teachings that “cut” off significant portions of the Bible or “cut” out passages that contradict espoused theological positions. We must not cut or leave out anything from the Bible, even though portions may be confusing, difficult to understand, or beyond our experience. We are not to nibble on the pieces of the Word of God that we prefer but to consume it in its entirety. Locusts are a biblical symbol of intimidation that will keep believers from taking their inheritance by faith. John the Baptizer arrived on the scene and made locusts his food, eating up that symbol of intimidation—devouring the devourer (see Matt. 3:4). All end-time awakeners will likewise swallow up all that comes against them.
  - type: text
    content: has left,
  - type: text
    content: 'the swarming-locust '
  - type: note
    content: This is the Hebrew word ʾarbeh, which addresses the mature locust that comes in swarms over the land. It can represent the religious spirit that intimidates and makes others feel inferior. The Bible mentions locusts over thirty times.
  - type: text
    content: has eaten;
  - type: text
    content: what the swarming-locust has left,
  - type: text
    content: 'the hopping-locust '
  - type: note
    content: 'This is the Hebrew word yeleq, which is likely related to the Akkadian word ilqitu (Ovid R. Sellers, “Stages of Locust in Joel,” The American Journal of Semitic Languages and Literatures 52, no. 2 [1936]: 82), meaning “jumping” or “swift.” This is the juvenile locust that has wings but does not yet fly. It can represent the believer who “hops” about, having not yet learned to soar in the ways of the Holy Spirit (see Nah. 3:16; Rom. 8:2).'
  - type: text
    content: has eaten;
  - type: text
    content: what the hopping-locust has left,
  - type: text
    content: 'the destroying-locust '
  - type: note
    content: This is the Hebrew word chasil, which describes a locust known as the “finisher” or “devourer.” This is the full-blown religious spirit that crucified the One who was sent from heaven. This “devourer” will always seek to destroy the harvest and will be rebuked by the Lord (Mal. 3:11).
  - type: text
    content: has eaten.
  - type: note
    content: The destroying-locust (or “consuming-locust”) is the locust horde that completely devastated the land and darkened the sky. This was the eighth plague that God sent upon Egypt in the days of Moses (see Ex. 10:1–20). These locusts are symbolic of the enemies of the gospel of the kingdom—man’s traditions and lies that attempt to consume the harvest. See Matt. 15:9; Mark 7:13; Col. 2:20–23. It was a “grasshopper [locust] mentality” that kept Israel from going into the promised land (see Num. 13:25–33). Revelation 9:1–12 describes smoke rising from a pit, and from the smoke come locusts, who have the devil as their king. Like a smoke screen, the lies of the Evil One keep people from seeing the truth.
  - type: heading
    content: Wake Up!
  '5':
  - type: text
    content: Wake up, you drunkards, and weep!
  - type: text
    content: Wail, all you wine-drinkers!
  - type: text
    content: For the new wine has been snatched from your lips.
  '6':
  - type: text
    content: For a nation has invaded my land,
  - type: text
    content: powerful and innumerable,
  - type: text
    content: with teeth like a lion’s teeth,
  - type: text
    content: and with the fangs of a lioness.
  '7':
  - type: text
    content: They have completely destroyed my vineyards
  - type: text
    content: 'and reduced my fig trees '
  - type: note
    content: Vineyards and fig trees are important symbols in the Hebrew and Christian traditions. Vineyards are used metaphorically to refer to all of God’s people—both Israel and the universal church (Jew and gentile)—while the fig tree is often used as a symbol for Israel.
  - type: text
