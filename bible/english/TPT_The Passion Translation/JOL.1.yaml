  - type: heading
    content: The Day of Yahweh
  '15':
  - type: text
    content: How awful that time will be!
  - type: text
    content: 'Look! The day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: The Hebrew concept of “the day of Yahweh” is not a twenty-four-hour day but a period of time when Yahweh rises to judge. The phrase “the day of Yahweh” is found five times in Joel (1:15; 2:1, 11, 31; 3:14) and another eighteen times in the Old Testament.
  - type: text
    content: is certainly coming—
  - type: text
    content: the day when the Divine Destroyer brings destruction.
  - type: note
    content: Or “destruction from Shaddai.” There is a play on words in the Hebrew text that is diminished in an English translation. The word for “destruction” (Hb. shod) resembles the word Shaddai. One of the many possible translations for Shaddai is “the Divine Destroyer.” For additional translations that show more of the depth of meaning in this incredible name of our God, see Gen. 17:1 and second footnote; 28:3.
  '16':
  - type: text
    content: 'Has not the food supply '
  - type: note
    content: That is, the food brought to the temple as grain offerings and sacrifices.
  - type: text
    content: been cut off
  - type: text
    content: before our very eyes?
  - type: text
    content: Have not the joyful celebrations been silenced
  - type: text
    content: in the temple of our God?
  - type: note
    content: These are the fellowship offerings or peace offerings that were associated with the joy and gladness of worship in the temple (see Deut. 12:7). These offerings were eaten by the worshipers.
  '17':
  - type: text
    content: 'The seeds shrivel under the '
  - type: text
    content: dry
  - type: text
    content: ' clods.'
  - type: note
    content: Or “beneath their shovels.” The meaning of the Hebrew is uncertain since three of the four words of this line are used nowhere else in the Hebrew text. The word for “clods” may also mean “shovels.” The Qumran manuscript 4QXXIIc reads “the heifers decay in [their] stalls,” while the Septuagint reads “the heifers stomp in their stalls.” The seed under the dry clods can also be seen in believers today who have the “seed” of God’s Word within them (1 Peter 1:23), but it may remain beneath the dirt (clod) of our flesh. God’s Word must penetrate our hearts and pierce the flesh with its truth.
  - type: text
    content: The storehouses are empty;
  - type: text
    content: 'the barns are '
  - type: text
    content: bare and
  - type: text
    content: ' broken down'
  - type: text
    content: because the harvest has disappeared.
  '18':
  - type: text
    content: 'How '
  - type: text
    content: loudly
  - type: text
