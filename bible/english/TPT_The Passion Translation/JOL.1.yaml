  '12':
  - type: text
    content: The vine has withered,
  - type: text
    content: and the fig tree wilts away.
  - type: text
    content: In fact, every tree of the field has withered—
  - type: text
    content: pomegranate, date palm, and apple tree.
  - type: note
    content: See Song. 2:3.
  - type: text
    content: And in the same way, the people’s joy and gladness
  - type: text
    content: 'has withered '
  - type: note
    content: The Hebrew word for “withered” can also be translated “ashamed,” “confused,” “disappointed.” As believers, our joy withers when we allow our own ideas and circumstances to replace the joy of the Lord.
  - type: text
    content: too.
  - type: heading
