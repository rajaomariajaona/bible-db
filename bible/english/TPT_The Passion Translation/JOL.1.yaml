  '1':
  - type: heading
    content: The Plague of Locusts
  - type: text
    content: 'These are the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ' that came '
  - type: note
    content: Or literally “that was or came to be.” The prophet Joel received these “words [message]” by supernatural means (a vision, dream, trance, audible voice, divine visitation). Joel’s prophecies come to us with the authority of God himself.
  - type: text
    content: 'to Joel '
  - type: note
    content: The name Joel means “Yahweh is God.”
  - type: text
    content: son of Pethuel.
  - type: note
    content: 'Or “Bethuel” (LXX, Syriac), which was a common name in Hebrew (see Gen. 22:20–23; Josh. 19:2–6; 1 Chron. 4:30). Pethuel may possibly mean “enlarged by God,” “the vision of God,” or “the youth of God.” See Ludwig Koehler and Walter Baumgartner, Lexicon in Veteris Testamenti Libros (Leiden: E. J. Brill, 1958), 786.'
  '10':
  - type: text
    content: The fields are stripped bare,
  - type: text
    content: and the ground is plunged into sadness
  - type: note
    content: The ground is personified and pictured as mourning over its loss of crops.
  - type: text
    content: over the ruined harvest.
  - type: text
    content: The grapes have dried up, and there is no new wine;
  - type: note
    content: Or “the new wine is ashamed.”
  - type: text
    content: only a trickle of olive oil remains.
  - type: note
    content: God’s blessing of the land was traditionally found in the abundance of grain, wine, and oil. These three blessings had been removed from the land.
  '11':
  - type: text
    content: Be ashamed, you farmers,
  - type: text
    content: for there is no harvest of wheat and barley.
  - type: text
    content: You vinedressers, cry out in despair,
  - type: text
