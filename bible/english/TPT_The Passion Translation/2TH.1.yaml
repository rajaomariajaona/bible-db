document_id: 2TH.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Times and Seasons
  - type: text
    content: 'From Paul, Silas, '
  - type: note
    content: See the first footnote on 1 Thess. 1:1.
  - type: text
    content: 'and Timothy. '
  - type: note
    content: See the second footnote on 1 Thess. 1:1.
  - type: text
    content: We send our greetings
  - type: text
    content: ' to you, the Thessalonian congregation '
  - type: note
    content: See the third footnote on 1 Thess. 1:1.
  - type: text
    content: 'of believers, which is in God our Father and the Lord Jesus Christ. '
  - type: note
    content: The church is both “in” God the Father and “in” Jesus Christ. The Trinity is making room for the bride.
  '10':
  - type: text
    content: This will happen
  - type: text
    content: ' on that day when he glorifies his holy ones, '
  - type: note
    content: Or “is glorified in his holy ones.”
  - type: text
    content: and they will be marveled at in all those who believed—including you, since in fact, you believed our message.
  - type: note
    content: Or “testimony.”
  '11':
  - type: text
    content: 'With this in mind, we constantly pray that our God will empower you to live worthy of all that he has invited you to experience. '
  - type: note
    content: Or “that our God would make you worthy [or considered worthy] of your calling.”
  - type: text
    content: 'And we pray that by his power all the pleasures of goodness and all works inspired by faith would fill you completely. '
  - type: note
    content: This sentence is translated from the Aramaic. The Greek is “By his power he will fulfill your every resolve for goodness and works of faith.”
  '12':
  - type: text
    content: 'By doing this the name of our Lord Jesus will be glorified in you, and you will be glorified in him, by the '
  - type: text
    content: marvelous
  - type: text
    content: ' grace of our God and the Lord Jesus Christ.'
  - type: note
    content: Or “our God and Lord, Jesus Christ.”
  '2':
  - type: text
    content: 'May God’s delightful grace '
  - type: note
    content: The usage of charis (grace) in ancient classical Greek carries the connotation of something that awakens joy and pleasure. The Greek concept of grace imparts delight, often attached to a strong emotional element. Paul uses the term grace as a joyous delight that rests upon the people of God. See Thomas F. Torrance, The Doctrine of Grace in the Apostolic Fathers, 1–2.
  - type: text
    content: and peace rest upon you.
  - type: note
    content: Some manuscripts add “from God our Father and the Lord Jesus Christ.”
  '3':
  - type: text
    content: 'We feel a personal responsibility to continually be thanking God for you, our spiritual family, '
  - type: note
    content: Or “brothers and sisters.”
  - type: text
    content: 'every time we pray. And we have every reason to do so because your faith is growing marvelously beyond measure. The unselfish love each of you share for one another is increasing and overflowing! '
  '4':
  - type: text
    content: We point to you as an example of
  - type: text
    content: ' unwavering faith '
  - type: note
    content: Or “perseverance and faith,” a likely hendiadys.
  - type: text
    content: 'for all the churches of God. We boast about how you continue to demonstrate unflinching endurance '
  - type: note
    content: The Aramaic can be translated “your hope,” making it their faith, their love, and their hope that Paul lauds them for.
  - type: text
    content: 'through all the persecutions and painful trials you are experiencing. '
  - type: note
    content: No matter what difficulty we may pass through, a growing faith in Christ, an increasing love for others, and unwavering hope will be the keys to coming through it victoriously.
  '5':
  - type: text
    content: 'All of this proves that God’s judgment is always perfect and is intended to make you worthy of '
  - type: text
    content: inheriting
  - type: text
    content: ' the kingdom of God, which is why you are going through these troubles.'
  - type: heading
    content: Encouragement of Christ’s Appearing
  '6':
  - type: text
    content: 'It is right and just for God to trouble your troublers '
  '7':
  - type: text
    content: 'and give rest to the troubled, both to you and to us, at the unveiling '
  - type: note
    content: Or “uncovering” or “revelation.”
  - type: text
    content: 'of the Lord Jesus from heaven with his messengers of power '
  '8':
  - type: text
    content: 'within a flame of fire. He will bring perfect and full justice to those who don’t know God '
  - type: note
    content: Or “inflicting vengeance upon those who do not know God.” See Ps. 79:6; Isa. 66:15; Jer. 10:25.
  - type: text
    content: 'and on those who refuse to embrace the gospel of our Lord Jesus. '
  '9':
  - type: text
    content: 'They will suffer the penalty of eternal destruction, banished from the Lord’s presence '
  - type: note
    content: Or “face.”
  - type: text
    content: 'and from the manifestation of his glorious power. '
  - type: note
    content: See Isa. 2:10, 19, 21.
