document_id: JER.42,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Survivors Seek '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Counsel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Johanan son of Kareah and Jezaniah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Azariah” (LXX).
      marker-yv: yv-n
    - type: text
      text: 'son of Hoshaiah, the military leaders, and all the people from the least to the greatest who were with him, approached '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘If you will remain in this land, I will build you up and not pull you down; I will firmly plant you and not uproot you. For I am filled with sorrow because of the disaster I had to bring upon you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stop being afraid of the king of Babylon. Your fears are for nothing, for I am with you to save you and rescue you from his clutches,’ declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘I will show you mercy, so that he has mercy toward you and will restore you to your land. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you must obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God and remain in this land.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Death Awaits in Egypt
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Do not think for a moment
    - type: text
      text: ': ‘We must go live in Egypt, where we will see no warfare nor be hungry nor hear the sound of the trumpet.’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although this is meant to be literal, there is also a spiritual application for believers today. The people wanted no part of (spiritual) warfare, no hunger (for God’s Word), and no sound of the trumpet (prophetic utterance).
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you do, remnant of Judah, then listen to what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies says to you: ‘If you are determined to go to Egypt and settle there, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: then this is what will happen
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sword you fear will overtake you, and the famine you dread will follow you to Egypt, and there you will die. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone who is determined to run to Egypt and settle there will die by sword, plague, and food shortages. Not one of you will survive the disasters I will send. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies, say to you: Just as my furious anger was poured out on the people of Jerusalem, so will my fury be poured out on you if you go to Egypt. You will be something that people will curse, and people will use your name when they pronounce a curse. You will be a horrifying sight, and people will make fun of you, and you will never see this place again.’ ”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I said to the remnant of Judah, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has told you, ‘Do not go into Egypt.’ So now, you should know very clearly that I am warning you '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'me and said, “Please listen to our humble plea and pray to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God for us and for all this remnant. We were once many, but as you see, only a few of us remain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you are in danger of your very lives. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You deceived me
    - type: text
      text: ' when you sent me to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God and said, ‘Pray for us to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God; whatever he says, we will do it.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Today I have told you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: exactly what he said
    - type: text
      text: ', but you have not obeyed the voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God in anything he sent me to tell you. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So understand this clearly: you will die by sword, plague, and food shortages in Egypt, where you are determined to go.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the place where you want to go and settle.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pray that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God may show us where to go and what we must do.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Very well then,” I replied. “I will take your request to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God and tell you whatever answer he gives me, and I will keep nothing back from you.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they in their turn said to me, “May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' be an honest and faithful witness against us if we do not obey what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God speaks to us through you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whether we like it or not, we will obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God to whom we have asked you to pray. We know that all will go well with us if we obey the voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They were lying. Like many today, the people sought not for guidance but for a confirmation of a decision they had already made. God will always lead us perfectly if we leave the choice up to him.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Answer
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ten days later, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave me his answer. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah refused to give his own opinion to the people. He did not confuse divine revelation with the desires of his own heart but waited until God revealed it. Prophets must never give a word they claim is from God unless it has been divinely revealed.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I called together Johanan, the military leaders, and all the people who were with him without distinction '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and said, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, to whom you sent me to present your petition, says this: '
