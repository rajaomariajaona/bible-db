document_id: JER.42,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Survivors Seek Yahweh’s Counsel
  - type: text
    content: 'Then Johanan son of Kareah and Jezaniah '
  - type: note
    content: Or “Azariah” (LXX).
  - type: text
    content: 'son of Hoshaiah, the military leaders, and all the people from the least to the greatest who were with him, approached '
  '10':
  - type: text
    content: '‘If you will remain in this land, I will build you up and not pull you down; I will firmly plant you and not uproot you. For I am filled with sorrow because of the disaster I had to bring upon you. '
  '11':
  - type: text
    content: 'Stop being afraid of the king of Babylon. Your fears are for nothing, for I am with you to save you and rescue you from his clutches,’ declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '12':
  - type: text
    content: '‘I will show you mercy, so that he has mercy toward you and will restore you to your land. '
  '13':
  - type: text
    content: 'But you must obey '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God and remain in this land.’ ”'
  - type: heading
    content: Death Awaits in Egypt
  '14':
  - type: text
    content: “
  - type: text
    content: Do not think for a moment
  - type: text
    content: ': ‘We must go live in Egypt, where we will see no warfare nor be hungry nor hear the sound of the trumpet.’ '
  - type: note
    content: Although this is meant to be literal, there is also a spiritual application for believers today. The people wanted no part of (spiritual) warfare, no hunger (for God’s Word), and no sound of the trumpet (prophetic utterance).
  '15':
  - type: text
    content: 'If you do, remnant of Judah, then listen to what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies says to you: ‘If you are determined to go to Egypt and settle there, '
  - type: text
    content: then this is what will happen
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'The sword you fear will overtake you, and the famine you dread will follow you to Egypt, and there you will die. '
  '17':
  - type: text
    content: 'Everyone who is determined to run to Egypt and settle there will die by sword, plague, and food shortages. Not one of you will survive the disasters I will send. '
  '18':
  - type: text
    content: 'Yes, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, say to you: Just as my furious anger was poured out on the people of Jerusalem, so will my fury be poured out on you if you go to Egypt. You will be something that people will curse, and people will use your name when they pronounce a curse. You will be a horrifying sight, and people will make fun of you, and you will never see this place again.’ ”'
  '19':
  - type: text
    content: Then I said to the remnant of Judah, “
  - type: text
    content: Yahweh
  - type: text
    content: ' has told you, ‘Do not go into Egypt.’ So now, you should know very clearly that I am warning you '
  '2':
  - type: text
    content: 'me and said, “Please listen to our humble plea and pray to '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God for us and for all this remnant. We were once many, but as you see, only a few of us remain. '
  '20':
  - type: text
    content: 'that you are in danger of your very lives. '
  - type: text
    content: You deceived me
  - type: text
    content: ' when you sent me to '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God and said, ‘Pray for us to '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God; whatever he says, we will do it.’ '
  '21':
  - type: text
    content: 'Today I have told you '
  - type: text
    content: exactly what he said
  - type: text
    content: ', but you have not obeyed the voice of '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God in anything he sent me to tell you. '
  '22':
  - type: text
    content: 'So understand this clearly: you will die by sword, plague, and food shortages in Egypt, where you are determined to go.”'
  - type: note
    content: Or “the place where you want to go and settle.”
  '3':
  - type: text
    content: 'Pray that '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God may show us where to go and what we must do.”'
  '4':
  - type: text
    content: '“Very well then,” I replied. “I will take your request to '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God and tell you whatever answer he gives me, and I will keep nothing back from you.”'
  '5':
  - type: text
    content: 'Then they in their turn said to me, “May '
  - type: text
    content: Yahweh
  - type: text
    content: ' be an honest and faithful witness against us if we do not obey what '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God speaks to us through you. '
  '6':
  - type: text
    content: 'Whether we like it or not, we will obey '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God to whom we have asked you to pray. We know that all will go well with us if we obey the voice of '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God.”'
  - type: note
    content: They were lying. Like many today, the people sought not for guidance but for a confirmation of a decision they had already made. God will always lead us perfectly if we leave the choice up to him.
  - type: heading
    content: Yahweh’s Answer
  '7':
  - type: text
    content: 'Ten days later, '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave me his answer. '
  - type: note
    content: Jeremiah refused to give his own opinion to the people. He did not confuse divine revelation with the desires of his own heart but waited until God revealed it. Prophets must never give a word they claim is from God unless it has been divinely revealed.
  '8':
  - type: text
    content: 'So I called together Johanan, the military leaders, and all the people who were with him without distinction '
  '9':
  - type: text
    content: and said, “
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, to whom you sent me to present your petition, says this: '
