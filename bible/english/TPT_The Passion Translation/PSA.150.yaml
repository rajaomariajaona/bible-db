document_id: PSA.150,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Hallelujah Chorus
  - type: text
    content: Hallelujah! Praise the Lord! Praise God in his holy sanctuary!
  - type: text
    content: Praise him in his stronghold in the sky!
  '2':
  - type: text
    content: Praise him for his mighty miracles!
  - type: text
    content: Praise him for his magnificent greatness!
  '3':
  - type: text
    content: Praise him with trumpets blasting!
  - type: text
    content: Praise him with piano and guitar!
  '4':
  - type: text
    content: 'Praise him with drums '
  - type: note
    content: Or “tambourines.”
  - type: text
    content: and dancing!
  - type: text
    content: Praise him with loud clashing of cymbals!
  - type: text
    content: Praise him upon the high-sounding cymbals!
  '6':
  - type: text
    content: Let everyone everywhere join in the crescendo
  - type: text
    content: 'of ecstatic praise to '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: Hallelujah! Praise the Lord!
