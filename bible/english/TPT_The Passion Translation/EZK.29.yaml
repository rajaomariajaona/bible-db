document_id: EZK.29,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Egypt
  - type: text
    content: 'In the tenth year '
  - type: text
    content: of our exile
  - type: text
    content: ', on the twelfth day of the tenth month, '
  - type: note
    content: This would have been January of 586 BC, six months before the fall of Jerusalem and fifteen years before Nebuchadnezzar invaded Egypt. Chapters 29–32 contain seven prophecies against Egypt.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '10':
  - type: text
    content: 'therefore, I am your enemy and the enemy of your waterways. I will reduce Egypt to a desolate, empty desert, from Migdol '
  - type: note
    content: Migdol was a fortress in northern Egypt where Jews found refuge (see Jer. 44:1; 46:14).
  - type: text
    content: in the north
  - type: text
    content: ' to Syene '
  - type: note
    content: Syene is modern Aswan in southern Egypt.
  - type: text
    content: in the south
  - type: text
    content: ', as far as the border of Ethiopia. '
  - type: note
    content: Or “Cush.” To the Egyptians all the territory south of Aswan was known as Cush, which was called Ethiopia in Greco-Roman times and included portions of modern Sudan.
  '11':
  - type: text
    content: 'No person or animal will pass through it. For forty years it will remain uninhabited. '
  '12':
  - type: text
    content: I will turn Egypt into the most desolate of lands, and for forty years its cities will be the most desolate of ruined cities. And I will scatter your people among the nations and disperse them among foreign lands.
  '13':
  - type: text
    content: '“ ‘However, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: After forty years, I will gather the Egyptians back from the nations where I scattered them. '
  - type: note
    content: Like the exiled Israelites, the Egyptians were promised that they, too, would be brought back to their land.
  '14':
  - type: text
    content: 'I will bring the Egyptian captives back and restore them to the way they were before in their homeland of Pathros. '
  - type: note
    content: That is, southern Egypt.
  - type: text
    content: 'There they will be an insignificant kingdom. '
  '15':
  - type: text
    content: 'Egypt will be the weakest kingdom of all and no longer dominate other nations. For I will reduce it so that it will never again rule over the nations. '
  '16':
  - type: text
    content: 'It will never again be strong enough for the people of Israel to trust in. Its fate will be a reminder of Israel’s sin when they put their confidence in Egypt to help them. Then they will know that I am Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: Nebuchadnezzar Will Conquer Egypt
  '17':
  - type: text
    content: 'In the twenty-seventh year '
  - type: text
    content: of our exile
  - type: text
    content: ', on the first day of the first month, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying: '
  '18':
  - type: text
    content: '“Son of man, Nebuchadnezzar king of Babylon has taken his army and launched an attack against Tyre '
  - type: text
    content: and inflicted a heavy toll upon his soldiers
  - type: text
    content: '. '
  - type: note
    content: The Babylonian siege against Tyre lasted thirteen years.
  - type: text
    content: 'Their '
  - type: text
    content: helmets
  - type: text
    content: ' have rubbed their heads bare, and their heavy loads made their shoulders raw and chafed, yet neither Nebuchadnezzar nor his army gained any reward from the campaign he led against Tyre. '
  '19':
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', will hand Egypt over to Nebuchadnezzar, king of Babylon. He will carry off its riches and loot the wealth of Egypt to pay the wages of his army. '
  '2':
  - type: text
    content: '“Son of man, turn toward '
  - type: text
    content: Hophra
  - type: text
    content: ' '
  - type: note
    content: Or “Pharaoh,” which means “king.” Hophra, mentioned in Jer. 44:30, was the fourth king of the Twenty-sixth Dynasty of Egyptian pharaohs. He reigned from 589 to 570 BC.
  - type: text
    content: 'king of Egypt and prophesy against him and against all Egypt. '
  '20':
  - type: text
    content: 'I am giving him Egypt as a reward for the labor he has undertaken on my behalf. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken!'
  '21':
  - type: text
    content: '“At that time, I will raise up a new day of power '
  - type: note
    content: Or literally “a horn.” The horn of an ox or ram was a symbol of power, authority, and prosperity. God was decreeing that he would cause Israel to grow strong again.
  - type: text
    content: 'for the people of Israel. And Ezekiel, I will open your mouth, and when you speak, the people will listen to you. Then they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Tell them what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say:'
  - type: text
    content: “ ‘Behold, I am against you, Pharaoh king of Egypt—
  - type: text
    content: 'the great monster '
  - type: note
    content: Possible translations of the Hebrew word tannim include “serpent,” “dragon,” “sea monster,” “crocodile,” and “Leviathan.” See Gen. 1:21; Job 7:12; Pss. 74:13; 148:7; Isa. 51:9. This “great monster” was one of the gods of Egypt. Egypt represents bondage—the bondage of sin and of the world.
  - type: text
    content: wallowing in its waterways.
  - type: text
    content: 'You boasted: “I made the Nile River for myself, and I own it!”'
  '4':
  - type: text
    content: I will put hooks through your jaws,
  - type: text
    content: and make the fish of the Nile stick to your scales.
  - type: text
    content: Then I will drag you out of your waterways
  - type: text
    content: with all your fish clinging to your scales.
  '5':
  - type: text
    content: I will leave you and all your fish
  - type: text
    content: on the ground to die in the desert.
  - type: text
    content: You will die in the open field,
  - type: text
    content: and I will feed you
  - type: text
    content: to the wild animals and the birds of heaven,
  - type: text
    content: and no one will collect your bones or bury them.
  '6':
  - type: text
    content: 'Then all the inhabitants of Egypt will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: “ ‘
  - type: text
    content: The Lord says to Egypt
  - type: text
    content: ':'
  - type: text
    content: You have been no help whatsoever to my people, Israel;
  - type: text
    content: you are nothing more than a crutch of flimsy reeds!
  '7':
  - type: text
    content: Wherever they grasped you, you broke in their hands
  - type: text
    content: and splinters pierced their hands.
  - type: note
    content: As translated from the Septuagint. The Hebrew is “tore [dislocated] their shoulders.” See Isa. 36:6.
  - type: text
    content: Whenever they leaned on you, you collapsed,
  - type: text
    content: and sent them sprawling.
  '8':
  - type: text
    content: '“ ‘So, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: I will bring war against you to eliminate both people and animals. '
  '9':
  - type: text
    content: 'The land of Egypt will become an empty desert, and they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. Because you boasted, “The Nile is mine, I made it. '
  - type: text
    content: It’s all mine
  - type: text
    content: ',” '
