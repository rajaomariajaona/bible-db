document_id: EZK.29,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the tenth year '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of our exile
    - type: text
      text: ', on the twelfth day of the tenth month, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would have been January of 586 BC, six months before the fall of Jerusalem and fifteen years before Nebuchadnezzar invaded Egypt. Chapters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 29–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: contain seven prophecies against Egypt.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore, I am your enemy and the enemy of your waterways. I will reduce Egypt to a desolate, empty desert, from Migdol '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Migdol was a fortress in northern Egypt where Jews found refuge (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 44:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 46:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the north
    - type: text
      text: ' to Syene '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Syene is modern Aswan in southern Egypt.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the south
    - type: text
      text: ', as far as the border of Ethiopia. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cush.” To the Egyptians all the territory south of Aswan was known as Cush, which was called Ethiopia in Greco-Roman times and included portions of modern Sudan.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No person or animal will pass through it. For forty years it will remain uninhabited. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will turn Egypt into the most desolate of lands, and for forty years its cities will be the most desolate of ruined cities. And I will scatter your people among the nations and disperse them among foreign lands.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘However, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says this: After forty years, I will gather the Egyptians back from the nations where I scattered them. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Like the exiled Israelites, the Egyptians were promised that they, too, would be brought back to their land.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will bring the Egyptian captives back and restore them to the way they were before in their homeland of Pathros. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, southern Egypt.
      marker-yv: yv-n
    - type: text
      text: 'There they will be an insignificant kingdom. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Egypt will be the weakest kingdom of all and no longer dominate other nations. For I will reduce it so that it will never again rule over the nations. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It will never again be strong enough for the people of Israel to trust in. Its fate will be a reminder of Israel’s sin when they put their confidence in Egypt to help them. Then they will know that I am Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar Will Conquer Egypt
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the twenty-seventh year '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of our exile
    - type: text
      text: ', on the first day of the first month, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, Nebuchadnezzar king of Babylon has taken his army and launched an attack against Tyre '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and inflicted a heavy toll upon his soldiers
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Babylonian siege against Tyre lasted thirteen years.
      marker-yv: yv-n
    - type: text
      text: 'Their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: helmets
    - type: text
      text: ' have rubbed their heads bare, and their heavy loads made their shoulders raw and chafed, yet neither Nebuchadnezzar nor his army gained any reward from the campaign he led against Tyre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', will hand Egypt over to Nebuchadnezzar, king of Babylon. He will carry off its riches and loot the wealth of Egypt to pay the wages of his army. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, turn toward '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hophra
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Pharaoh,” which means “king.” Hophra, mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 44:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', was the fourth king of the Twenty-sixth Dynasty of Egyptian pharaohs. He reigned from 589 to 570 BC.'
      marker-yv: yv-n
    - type: text
      text: 'king of Egypt and prophesy against him and against all Egypt. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am giving him Egypt as a reward for the labor he has undertaken on my behalf. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“At that time, I will raise up a new day of power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “a horn.” The horn of an ox or ram was a symbol of power, authority, and prosperity. God was decreeing that he would cause Israel to grow strong again.
      marker-yv: yv-n
    - type: text
      text: 'for the people of Israel. And Ezekiel, I will open your mouth, and when you speak, the people will listen to you. Then they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell them what I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Behold, I am against you, Pharaoh king of Egypt—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the great monster '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possible translations of the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tannim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: include “serpent,” “dragon,” “sea monster,” “crocodile,” and “Leviathan.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 7:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 74:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 148:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 51:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This “great monster” was one of the gods of Egypt. Egypt represents bondage—the bondage of sin and of the world.
      marker-yv: yv-n
    - type: text
      text: wallowing in its waterways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You boasted: “I made the Nile River for myself, and I own it!”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put hooks through your jaws,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make the fish of the Nile stick to your scales.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will drag you out of your waterways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with all your fish clinging to your scales.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will leave you and all your fish
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on the ground to die in the desert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will die in the open field,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will feed you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the wild animals and the birds of heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and no one will collect your bones or bury them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then all the inhabitants of Egypt will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lord says to Egypt
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been no help whatsoever to my people, Israel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you are nothing more than a crutch of flimsy reeds!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherever they grasped you, you broke in their hands
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and splinters pierced their hands.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 29:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “tore [dislocated] their shoulders.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 36:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whenever they leaned on you, you collapsed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sent them sprawling.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘So, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: I will bring war against you to eliminate both people and animals. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The land of Egypt will become an empty desert, and they will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. Because you boasted, “The Nile is mine, I made it. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: It’s all mine
    - type: text
      text: ',” '
