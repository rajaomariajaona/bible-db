document_id: ZEC.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Third Vision: The Measuring Man'
  - type: text
    content: 'Then I looked up again and had another vision. Behold, I saw a man with a measuring line in his hand. '
  - type: note
    content: Compare Ezek. 40:3.
  '10':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare to you: “It’s time to sing out and rejoice, my daughter Zion, for now I am coming to live among you.”'
  - type: note
    content: Or “in the center of you.” See v. 11.
  '11':
  - type: text
    content: 'At that time, people from many nations will be converted to '
  - type: text
    content: Yahweh
  - type: text
    content: ' and become his people, and he will live among them. Then you will know that '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has sent me to you.'
  '12':
  - type: text
    content: 'The people of Judah will become '
  - type: text
    content: Yahweh
  - type: text
    content: '’s special people, his inheritance '
  - type: note
    content: See Eph. 1:18.
  - type: text
    content: 'in the holy land, '
  - type: note
    content: This is the only time in the Old Testament where the actual designation “holy land” (ʾadmat haqqodesh) is found, although the notion of Israel and Judah as a holy land, or nation belonging to God, is a common theme.
  - type: text
    content: 'and he will again choose Jerusalem. '
  '13':
  - type: text
    content: 'Let everyone be silent before '
  - type: text
    content: Yahweh
  - type: text
    content: ', for now he is stirring from his holy dwelling place.'
  '2':
  - type: text
    content: 'I asked him, “Where are you going '
  - type: text
    content: with that
  - type: text
    content: ?”
  - type: text
    content: “To measure Jerusalem,” he replied, “to calculate her width and length.”
  '3':
  - type: text
    content: 'And behold, the angel who was talking with me left, and another angel came out to meet him. '
  '4':
  - type: text
    content: 'He said to him, “Run, and tell the surveyor '
  - type: note
    content: Or “young man.”
  - type: text
    content: to stop measuring
  - type: text
    content: ', for Jerusalem will be too full of people and animals to measure or be enclosed by walls. '
  '5':
  - type: text
    content: 'So, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will be a protective wall of fire surrounding her and a '
  - type: text
    content: radiant
  - type: text
    content: ' glory within her.”'
  - type: heading
    content: Zechariah’s Exhortation to the Exiles
  '6':
  - type: text
    content: '“Look out! Look out! Flee from Babylon,” '
  - type: note
    content: Or “from the land of the north.”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', “for like the four winds of heaven I have scattered you in every direction,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '7':
  - type: text
    content: '“Escape, '
  - type: note
    content: Or “break out.”
  - type: text
    content: Zion, you who live within the fair city of Babylon!”
  '8':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, sent me after glory. '
  - type: note
    content: Scholars are divided over the exact meaning of the words “after glory.” It is possible that glory is just another way of referring to God himself. Some believe this glory refers to the vision of vv. 1–5 (i.e., “after the vision of glory he sent me”). Others take the words to mean “he sent me with his glory” or “he sent me in the wake of his glory.” Still others believe this means “with insistence he sent me.” Some believe it should be translated “after he has honored me and sent me.” Some Jewish scholars change two letters of the text and translate it as “he whose glory has sent me” or “he sent me on a glorious mission.”
  - type: text
    content: 'And he warns the nations who plundered you: “Whoever touches you, '
  - type: text
    content: my precious ones
  - type: text
    content: ', touches the apple of my eye. '
  - type: note
    content: See Deut. 32:10; Ps. 17:8. The Hebrew phrase ʾishon ʿayin refers to the pupil or dark part of the eye. However, etymologists see ʾishon as a diminutive form of “man” (ʾish), which could then be translated “the Little Man of the Eye.” Or using anthropomorphistic language, when God looks at his people, they become the reflection of his “eye.”
  '9':
  - type: text
    content: 'Now behold, I will raise my fist against them to crush them, and those whom they enslaved will plunder them. Then you will know that '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has sent me.”'
