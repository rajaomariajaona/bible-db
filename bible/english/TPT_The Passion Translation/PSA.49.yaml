document_id: PSA.49,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Wisdom Better Than Wealth
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poetic song by the prophetic singers of Korah’s clan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, one and all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Both rich and poor together, all over the world—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: everyone listen to what I have to say!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The brightest and best, along with the foolish and senseless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God sees that they all will die one day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving their houses and wealth to others.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though they name streets and lands after themselves,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:10–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They read their names in the ground.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hoping to have their memory endure beyond the grave,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: becoming legends in their own minds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their home address is now the cemetery!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The honor of man is short-lived and fleeting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s little difference between man and beast,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for both will one day perish.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such is the path of foolish men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who quote everything they say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they are here today and gone tomorrow!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A shepherd called “Death” herds them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leading them straight to hell like mindless sheep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet at daybreak you will find the righteous ruling in their place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every trace of them will be gone forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with all their “glory” lost in the darkness of their doom.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I know the loving God will redeem my soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: raising me up from the dark power of death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: taking me as his bridal partner.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he will offer his hand to me in marriage.”
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t be disturbed when you see the rich
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surround you with the “glory” of their wealth on full display.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when they die, they will carry nothing with them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their riches will not follow them beyond the grave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they have the greatest rewards of this world
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all applaud them for their accomplishments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will follow those who have gone before them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and go straight into the realm of darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where they will never ever see the light again.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So this is the way of mortal man—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: honored for a moment, yet without eternal insight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a beast that will one day perish.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For wisdom will come from my mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: words of insight and understanding will be heard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the musings of my heart.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will break open mysteries with my music,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my song will release riddles solved.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There’s no reason to fear when troubling times come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even when you’re surrounded with problems
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and persecutors who chase at your heels.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 49:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase contains a variant form of the name Jacob, which means “heel grabber.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They trust in their treasures and boast in their riches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet not one of them, though rich as a king,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: could rescue his own brother from the guilt of his sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one could give God the ransom price
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the soul of another, let alone for himself.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A soul’s redemption is too costly and precious
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for anyone to pay with earthly wealth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The price to pay is never enough
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to purchase eternal life for even one, to keep them out of hell.
