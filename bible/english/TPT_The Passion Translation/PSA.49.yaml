document_id: PSA.49,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Better Than Wealth
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A poetic song by the prophetic singers of Korah’s clan
  - type: text
    content: Listen, one and all!
  - type: text
    content: Both rich and poor together, all over the world—
  - type: text
    content: everyone listen to what I have to say!
  '10':
  - type: text
    content: The brightest and best, along with the foolish and senseless,
  - type: text
    content: God sees that they all will die one day,
  - type: text
    content: leaving their houses and wealth to others.
  - type: text
    content: Even though they name streets and lands after themselves,
  - type: note
    content: Or “They read their names in the ground.”
  - type: text
    content: hoping to have their memory endure beyond the grave,
  - type: text
    content: becoming legends in their own minds,
  - type: text
    content: their home address is now the cemetery!
  '12':
  - type: text
    content: The honor of man is short-lived and fleeting.
  - type: text
    content: There’s little difference between man and beast,
  - type: text
    content: for both will one day perish.
  '13':
  - type: text
    content: Such is the path of foolish men
  - type: text
    content: and those who quote everything they say,
  - type: text
    content: for they are here today and gone tomorrow!
  - type: text
    content: Pause in his presence
  '14':
  - type: text
    content: A shepherd called “Death” herds them,
  - type: text
    content: leading them straight to hell like mindless sheep.
  - type: text
    content: Yet at daybreak you will find the righteous ruling in their place.
  - type: text
    content: Every trace of them will be gone forever,
  - type: text
    content: with all their “glory” lost in the darkness of their doom.
  '15':
  - type: text
    content: But I know the loving God will redeem my soul,
  - type: text
    content: raising me up from the dark power of death,
  - type: text
    content: taking me as his bridal partner.
  - type: note
    content: Or “he will offer his hand to me in marriage.”
  - type: text
    content: Pause in his presence
  '16':
  - type: text
    content: So don’t be disturbed when you see the rich
  - type: text
    content: surround you with the “glory” of their wealth on full display.
  '17':
  - type: text
    content: For when they die, they will carry nothing with them,
  - type: text
    content: and their riches will not follow them beyond the grave.
  '18':
  - type: text
    content: Though they have the greatest rewards of this world
  - type: text
    content: and all applaud them for their accomplishments,
  - type: text
    content: they will follow those who have gone before them
  - type: text
    content: and go straight into the realm of darkness,
  - type: text
    content: where they will never ever see the light again.
  '20':
  - type: text
    content: So this is the way of mortal man—
  - type: text
    content: honored for a moment, yet without eternal insight,
  - type: text
    content: like a beast that will one day perish.
  '3':
  - type: text
    content: For wisdom will come from my mouth;
  - type: text
    content: words of insight and understanding will be heard
  - type: text
    content: from the musings of my heart.
  '4':
  - type: text
    content: I will break open mysteries with my music,
  - type: text
    content: and my song will release riddles solved.
  '5':
  - type: text
    content: There’s no reason to fear when troubling times come,
  - type: text
    content: even when you’re surrounded with problems
  - type: text
    content: and persecutors who chase at your heels.
  - type: note
    content: This phrase contains a variant form of the name Jacob, which means “heel grabber.”
  '6':
  - type: text
    content: They trust in their treasures and boast in their riches,
  - type: text
    content: yet not one of them, though rich as a king,
  - type: text
    content: could rescue his own brother from the guilt of his sins.
  - type: text
    content: No one could give God the ransom price
  - type: text
    content: for the soul of another, let alone for himself.
  '8':
  - type: text
    content: A soul’s redemption is too costly and precious
  - type: text
    content: for anyone to pay with earthly wealth.
  - type: text
    content: The price to pay is never enough
  - type: text
    content: to purchase eternal life for even one, to keep them out of hell.
