    children:
    - type: text
      text: '11'
  - type: text
    text: 'So he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever divorces his wife and marries another commits adultery against her.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if the wife divorces her husband and marries another, she also commits adultery.”
- type: usfm
