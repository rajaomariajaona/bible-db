  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus looked at the faces of his disciples and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How hard it is for the wealthy to enter into God’s kingdom realm.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The disciples were startled when they heard this. But Jesus again said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Children, it is next to impossible for those who trust in their riches to find their way into God’s kingdom.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some reliable Greek manuscripts leave out the words “who trust in their riches.” However, the majority of the Greek manuscripts and the Aramaic include it. The difficulty Jesus speaks of is not because it is evil to be rich, but because the wealthy are quick to put their confidence in riches and not in God. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
