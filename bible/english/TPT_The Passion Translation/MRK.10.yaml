document_id: MRK.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Revolutionary Values of the Kingdom
  - type: text
    content: 'Then Jesus left the region '
  - type: note
    content: Or “left that place” (Capernaum, on the shore of Lake Galilee).
  - type: text
    content: 'and went into the district of Judea, '
  - type: note
    content: Judea was a Roman province that included central Israel, with Jerusalem as its center. Jesus, leaving to go into Judea, began the journey he made to his destiny, to be crucified in Jerusalem.
  - type: text
    content: 'across from the Jordan River, '
  - type: note
    content: The reason this is important to note is that this places Jesus in the jurisdiction of Herod Antipas, who had John the Baptizer beheaded at the request of his stepdaughter. Now the Pharisees are coming to test Jesus in hopes of setting him up for likewise being put to death by Herod. The Aramaic notes the location as “the crossing place.” This could have been the place where Joshua and the Hebrews crossed the Jordan to enter into the promised land.
  - type: text
    content: 'and again, massive crowds flocked to him, and Jesus, as was his custom, began to teach the people. '
  '10':
  - type: text
    content: 'Once indoors, his disciples asked him to explain it to them again. '
  '11':
  - type: text
    content: 'So he said to them, '
  - type: text
    content: “Whoever divorces his wife and marries another commits adultery against her.
  - type: text
    content: ' '
  '12':
  - type: text
    content: And if the wife divorces her husband and marries another, she also commits adultery.”
  - type: heading
    content: Jesus Blesses Little Children
  '13':
  - type: text
    content: 'The parents kept bringing their little children to Jesus so that he would lay his hands on them '
  - type: text
    content: and bless them
  - type: text
    content: '. '
  - type: note
    content: Or “touch them.” The laying on of Jesus’ hands was an obvious impartation of a blessing. The words “and bless them,” though implied, are made explicit in v. 16. Parents should always bring their children to be blessed by Jesus. The apparent reason for Mark including this episode is to express not only Jesus’ desire to bless children, but also the disciple’s inability to see people the way Jesus sees them.
  - type: text
    content: 'But the disciples kept rebuking and scolding the people for doing it. '
  '14':
  - type: text
    content: 'When Jesus saw what was happening, he became indignant with his disciples and said to them, '
  - type: text
    content: “Let all the little children come to me and never hinder them! Don’t you know that God’s kingdom exists for such as these?
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Listen to the truth I speak: Whoever does not open their arms to receive God’s kingdom like a teachable child will never enter it.”'
  - type: text
    content: ' '
  - type: note
    content: Jesus uses an emphatic negative, something similar to “never, no never enter it.”
  '16':
  - type: text
    content: Then he embraced each child, and laying his hands on them, he lovingly blessed each one.
  - type: heading
    content: A Rich Man Meets Jesus
  '17':
  - type: text
    content: As Jesus started on his way, a man came running up to him. Kneeling down in front of him, he cried out, “Good Teacher, what one thing am I required to do to gain eternal life?”
  '18':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Why do you call me good? Only God is truly good.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'You already know the commandments: ‘Do not murder, do not commit adultery, do not steal, do not give a false testimony, do not cheat, and honor your father and mother.’ ”'
  - type: note
    content: See Ex. 20:12–16.
  '2':
  - type: text
    content: 'At one point, some of the Pharisees came, seeking to entrap him with a question. “Tell us,” they asked, “is it lawful for a man to divorce '
  - type: note
    content: The Greek word for divorce (apolyo) used also in vv. 2, 4, 11, and 12 can also be translated “to dismiss,” “to send away,” “to loose.”
  - type: text
    content: his wife?”
  '20':
  - type: text
    content: The man said to Jesus, “Teacher, I have carefully obeyed these laws since my youth.”
  '21':
  - type: text
    content: 'Jesus fixed his gaze upon the man, with tender love, and said to him, '
  - type: text
    content: “Yet there is still one thing in you lacking.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “You lack one thing.” The Greek wording used here is the same as found in Rom. 3:23, “we all have sinned and are in need of [lack] the glory of God.”
  - type: text
    content: Go, sell all that you have and give the money to the poor. Then all of your treasure will be in heaven. After you’ve done this, come back and walk with me.”
  - type: note
    content: There are a few Greek and Aramaic manuscripts that read “pick up your cross.”
  '22':
  - type: text
    content: Completely shocked by Jesus’ answer, he turned and walked away very sad, for he was extremely rich.
  - type: note
    content: Or “he had much property.” The Greek word used here implies that he was a wealthy landowner.
  '23':
  - type: text
    content: 'Jesus looked at the faces of his disciples and said, '
  - type: text
    content: “How hard it is for the wealthy to enter into God’s kingdom realm.”
  '24':
  - type: text
    content: 'The disciples were startled when they heard this. But Jesus again said to them, '
  - type: text
    content: “Children, it is next to impossible for those who trust in their riches to find their way into God’s kingdom.
  - type: text
    content: ' '
  - type: note
    content: Some reliable Greek manuscripts leave out the words “who trust in their riches.” However, the majority of the Greek manuscripts and the Aramaic include it. The difficulty Jesus speaks of is not because it is evil to be rich, but because the wealthy are quick to put their confidence in riches and not in God. See 1 Tim. 6:9, 17.
  '25':
  - type: text
    content: It is easier to stuff a rope through the eye of a needle
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “to stuff a camel through the eye of a needle.” The Aramaic word for “rope” and for “camel” is the homonym gamla. This could be an instance of the Aramaic text being misread by the Greek translators as “camel” instead of “rope.” Regardless, this becomes a metaphor for something impossible. It would be like saying, “It’s as hard as making pigs fly!”
  - type: text
    content: than for a wealthy person to enter into God’s kingdom.”
  - type: note
    content: To enter into God’s kingdom realm means more than salvation. It implies a participation in its principles and an experience of its power to change our hearts. The principles of God’s kingdom are not the principles of the world. Greed is conquered by generosity. Promotion is given to the humble. The power of God’s kingdom is found in the Holy Spirit. See Rom. 14:17.
  '26':
  - type: text
    content: But this left them all the more astonished, and they whispered to one another, “Then who could ever be saved?”
  '27':
  - type: text
    content: 'Jesus looked at them and replied, '
  - type: text
    content: “With people it is impossible, but not with God—God makes all things possible!”
  - type: note
    content: See Gen. 18:14; Luke 1:37.
  '28':
  - type: text
    content: Then Peter spoke up and said, “Can’t you see that we’ve left everything we had to cling to you?”
  '29':
  - type: text
    content: “Listen to my words,”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “Anyone who leaves his home behind and chooses me over children, parents, family, and possessions, all for the sake of the gospel,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “What did Moses command you?”
  '30':
  - type: text
    content: it will come back to him a hundred times as much in this lifetime—homes, family, mothers, brothers, sisters, children, possessions—along with persecutions. And in the age to come, he will inherit eternal life.
  - type: text
    content: ' '
  '31':
  - type: text
    content: But many who are considered to be the most important now will be the least important then. And many who are viewed as the least important now will be considered the most important then.”
  - type: heading
    content: Jesus Again Prophesies His Death and Resurrection
  '32':
  - type: text
    content: 'Jesus and his disciples were on the road that went up to Jerusalem, and Jesus was leading them forward. The disciples were filled with wonder and amazement at his bravery, but those following along with them were very afraid. As they approached the city, he took the Twelve aside privately and told them what was going to happen. '
  '33':
  - type: text
    content: “I want you to know that we are going to Jerusalem, where the Son of Man will be handed over to the ruling priests and religious scholars and they will condemn him to death and hand him over to the Romans.
  - type: text
    content: ' '
  '34':
  - type: text
    content: And they will mock him, spit in his face, torture him, and kill him, but three days later he will rise again.”
  - type: heading
    content: Jacob (James) and John Ask a Favor of Jesus
  '35':
  - type: text
    content: Jacob and John, sons of Zebedee, approached Jesus and said, “Teacher, will you do us a favor?”
  - type: note
    content: A better question that followers of Jesus should ask is, “What can we do to bring you glory? Anything you ask of us we will do for you if you will help us.”
  '36':
  - type: text
    content: “What is it?”
  - type: text
    content: ' he asked.'
  '37':
  - type: text
    content: “We want to sit next to you when you come into your glory,” they said, “one at your right hand and the other at your left.”
  '38':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You don’t have a clue what you’re asking for! Are you prepared to drink from the cup of suffering
  - type: text
    content: ' '
  - type: note
    content: The cup is mentioned many times in the Old Testament as a metaphor of a cup of suffering. See Ps. 75:8; Isa. 51:17–22; Jer. 25:15; Ezek. 23:31–34.
  - type: text
    content: that I am about to drink? And are you able to endure the baptism into death
  - type: text
    content: ' '
  - type: note
    content: Baptism is a metaphor for immersion into death. See Rom. 6:3–7; 1 Cor. 10:2; Col. 2:11–13.
  - type: text
    content: that I am about to experience?”
  '39':
  - type: text
    content: They replied, “Yes, we are able.”
  - type: note
    content: How naive was this for them to say! So many times we exaggerate our spirituality and believe we are more mature than we actually are. Yet in spite of their ambition and self-confidence, Jesus affirms that they will indeed taste of the sufferings of Christ.
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “You will certainly drink from the cup of my sufferings and be immersed into my death,
  - type: text
    content: ' '
  '4':
  - type: text
    content: They replied, “Moses permitted us to write a certificate of separation that would be valid to complete a divorce.”
  '40':
  - type: text
    content: but to have you sit in the position of highest honor is not mine to decide. It is reserved for those especially prepared to have it.”
  - type: note
    content: Mark’s Gospel records three times that Jesus prophesied of his death and resurrection. After each time he had to rebuke his disciples. The first time (Mark 8:31) he rebuked Peter for being used by Satan to try to hinder Jesus. The second time (Mark 9:31) the disciples argued over who would be the greatest. After the third time (Mark 10:33), Jesus corrected Jacob (James) and John about their ambition to be in the place of highest honor. This shows us that not only is the sacrifice of the cross difficult to understand, it also brings out the ambition that hides in our hearts. Jesus’ submission to the Father to choose who sits in glory next to him becomes a rebuke to the ambition of James and John.
  '41':
  - type: text
    content: 'Now the other ten disciples overheard this, and they became angry and began to criticize Jacob and John. '
  '42':
  - type: text
    content: 'Jesus gathered them all together and said to them, '
  - type: text
    content: “Those recognized as rulers of the people and those who are in top leadership positions rule oppressively over their subjects, but this is not the example you are to follow.
  - type: text
    content: ' '
  '43':
  - type: text
    content: You are to lead by a different model. If you want to be the greatest, then live as one called to serve others.
  - type: text
    content: ' '
  '44':
  - type: text
    content: The path to promotion comes by having the heart of a bond-slave
  - type: text
    content: ' '
  - type: note
    content: 'Jesus uses two Greek words for servant: diakonos (“minister,” “servant,” “deacon”) in v. 43, and doulos (“bondslave,” “bond servant”) in v. 44.'
  - type: text
    content: who serves everyone.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For even the Son of Man did not come expecting to be served by everyone, but to serve everyone, and to give his life as the ransom price for the salvation of many.”
  - type: heading
    content: Jesus Heals Blind Bar-Timai
  '46':
  - type: text
    content: 'When Jesus and his disciples had passed through Jericho, a large crowd joined them. Upon leaving the village, they met a blind beggar sitting on the side of the road named Timai, the son of Timai. '
  - type: note
    content: The name Timai is Aramaic and means “highly prized” (or “esteemed”). Though unable to see, he was highly prized in the eyes of Jesus, who stopped to heal him. The Greek transliteration is “Bar-Timaeus, son of Timaeus,” which is somewhat confusing, since the name Bar-Timaeus means “son of Timaeus.” The Aramaic is to be preferred, for Timai spoke Aramaic when he cried out to Jesus (v. 51), for “Rabbi” (“master-teacher”) is an Aramaic title of respect.
  '47':
  - type: text
    content: 'When he heard that Jesus from Nazareth was passing by, he began to shout “Jesus, son of David, '
  - type: note
    content: The term “son of David” was used for the Messiah. The blind man believed Jesus was the one who was fulfilling the messianic claims of restoring sight to the blind.
  - type: text
    content: 'have mercy on me now in my affliction. '
  - type: text
    content: Heal me
  - type: text
    content: '!”'
  - type: note
    content: Implied in the Hebraic saying “Have mercy on me.” The mark of mercy would be his healing.
  '48':
  - type: text
    content: 'Those in the crowd were indignant and scolded him for making so much of a disturbance, but he kept shouting with all his might, “Son of David, have mercy on me now '
  - type: text
    content: and heal me
  - type: text
    content: '!”'
  '49':
  - type: text
    content: 'Jesus stopped and said, '
  - type: text
    content: “Call him here.”
  - type: text
    content: ' So they went to the blind man and said, “Have courage! Get up! Jesus is calling for you!” '
  '5':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Yes, Moses wrote this exception
  - type: text
    content: ' '
  - type: note
    content: Or “commandment.”
  - type: text
    content: for you because you are hardhearted.
  - type: text
    content: ' '
  '50':
  - type: text
    content: So he threw off his beggars’ cloak, jumped up, and made his way to Jesus.
  '51':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: 'The man replied, “My Master, '
  - type: note
    content: 'This is the Aramaic emphatic form of Rabbi: Rabbouni. “My Master” is the best way to express this in English.'
  - type: text
    content: please, let me see again!”
  '52':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Your faith heals you. Go in peace, with your sight restored.”
  - type: text
    content: ' '
  - type: note
    content: 'This is the Greek word sozo and is best defined with multiple terms: “delivered, saved, restored, healed, rescued, preserved, made whole.” There is at least an implication that the man was saved, healed, and delivered, with sight restored, all at the same time.'
  - type: text
    content: All at once, the man’s eyes opened and he could see again, and he began at once to follow Jesus, walking down the road with him.
  '6':
  - type: text
    content: But from the beginning God created male and female.
  - type: text
    content: ' '
  - type: note
    content: See Gen. 1:27; 5:2.
  '7':
  - type: text
    content: For this reason a man will leave his parents and be wedded to his wife.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic and the majority of Greek manuscripts. See Gen. 2:24 (LXX).
  '8':
  - type: text
    content: And the husband and wife
  - type: text
    content: ' '
  - type: note
    content: Or “the two” (i.e., husband and wife).
  - type: text
    content: will be joined as one flesh, and after that they no longer exist as two, but one flesh.
  - type: text
    content: ' '
  '9':
  - type: text
    content: So there you have it. What God has joined together, no one has the right to split apart.”
  - type: note
    content: See Deut. 24:1; Matt. 19:3–12. This question in v. 2 was asked in the context of an ongoing debate between two schools of rabbinical thought. The liberal view (Rabbi Hillel’s) said that divorce could be made on any grounds, called “Any Matter” divorce, while the conservative viewpoint (Rabbi Shammai’s) believed that divorce was only legal on the grounds of adultery. Jesus gave them God’s view and used the creation of man and woman in the garden as the standard.
