      text: '17'
  - type: text
    text: As Jesus started on his way, a man came running up to him. Kneeling down in front of him, he cried out, “Good Teacher, what one thing am I required to do to gain eternal life?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why do you call me good? Only God is truly good.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You already know the commandments: ‘Do not murder, do not commit adultery, do not steal, do not give a false testimony, do not cheat, and honor your father and mother.’ ”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:19
    - type: usfm
