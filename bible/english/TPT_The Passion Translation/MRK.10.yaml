        text: was asked in the context of an ongoing debate between two schools of rabbinical thought. The liberal view (Rabbi Hillel’s) said that divorce could be made on any grounds, called “Any Matter” divorce, while the conservative viewpoint (Rabbi Shammai’s) believed that divorce was only legal on the grounds of adultery. Jesus gave them God’s view and used the creation of man and woman in the garden as the standard.
    marker-yv: yv-n
