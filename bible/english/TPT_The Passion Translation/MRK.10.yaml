      marker: fr
      children:
      - type: text
        text: 10:47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The term “son of David” was used for the Messiah. The blind man believed Jesus was the one who was fulfilling the messianic claims of restoring sight to the blind.
    marker-yv: yv-n
  - type: text
    text: 'have mercy on me now in my affliction. '
  - type: usfm
