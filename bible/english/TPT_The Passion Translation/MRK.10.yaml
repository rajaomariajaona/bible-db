      marker: fr
      children:
      - type: text
        text: 10:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “touch them.” The laying on of Jesus’ hands was an obvious impartation of a blessing. The words “and bless them,” though implied, are made explicit in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
