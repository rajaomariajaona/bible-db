    children:
    - type: text
      text: '22'
  - type: text
    text: Completely shocked by Jesus’ answer, he turned and walked away very sad, for he was extremely rich.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:22
