      marker: fr
      children:
      - type: text
        text: 10:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “You lack one thing.” The Greek wording used here is the same as found in
    - type: usfm
