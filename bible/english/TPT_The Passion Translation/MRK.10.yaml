      metadata:
        usfm: MRK.10.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Parents should always bring their children to be blessed by Jesus. The apparent reason for Mark including this episode is to express not only Jesus’ desire to bless children, but also the disciple’s inability to see people the way Jesus sees them.
    marker-yv: yv-n
  - type: text
    text: 'But the disciples kept rebuking and scolding the people for doing it. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jesus saw what was happening, he became indignant with his disciples and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let all the little children come to me and never hinder them! Don’t you know that God’s kingdom exists for such as these?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Listen to the truth I speak: Whoever does not open their arms to receive God’s kingdom like a teachable child will never enter it.”'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
