  - type: text
    text: 'Jesus and his disciples were on the road that went up to Jerusalem, and Jesus was leading them forward. The disciples were filled with wonder and amazement at his bravery, but those following along with them were very afraid. As they approached the city, he took the Twelve aside privately and told them what was going to happen. '
  - type: usfm
