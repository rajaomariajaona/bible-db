    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go, sell all that you have and give the money to the poor. Then all of your treasure will be in heaven. After you’ve done this, come back and walk with me.”
  - type: usfm
    marker: f
    children:
