        text: The reason this is important to note is that this places Jesus in the jurisdiction of Herod Antipas, who had John the Baptizer beheaded at the request of his stepdaughter. Now the Pharisees are coming to test Jesus in hopes of setting him up for likewise being put to death by Herod. The Aramaic notes the location as “the crossing place.” This could have been the place where Joshua and the Hebrews crossed the Jordan to enter into the promised land.
    marker-yv: yv-n
  - type: text
