      text: '46'
  - type: text
    text: 'When Jesus and his disciples had passed through Jericho, a large crowd joined them. Upon leaving the village, they met a blind beggar sitting on the side of the road named Timai, the son of Timai. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Timai is Aramaic and means “highly prized” (or “esteemed”). Though unable to see, he was highly prized in the eyes of Jesus, who stopped to heal him. The Greek transliteration is “Bar-Timaeus, son of Timaeus,” which is somewhat confusing, since the name Bar-Timaeus means “son of Timaeus.” The Aramaic is to be preferred, for Timai spoke Aramaic when he cried out to Jesus (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '51'
      metadata:
        usfm: MRK.10.51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), for “Rabbi” (“master-teacher”) is an Aramaic title of respect.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'When he heard that Jesus from Nazareth was passing by, he began to shout “Jesus, son of David, '
