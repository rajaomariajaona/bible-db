        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mark’s Gospel records three times that Jesus prophesied of his death and resurrection. After each time he had to rebuke his disciples. The first time (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 8:31
      metadata:
        usfm: MRK.8.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) he rebuked Peter for being used by Satan to try to hinder Jesus. The second time (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 9:31
      metadata:
        usfm: MRK.9.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) the disciples argued over who would be the greatest. After the third time (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 10:33
      metadata:
        usfm: MRK.10.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), Jesus corrected Jacob (James) and John about their ambition to be in the place of highest honor. This shows us that not only is the sacrifice of the cross difficult to understand, it also brings out the ambition that hides in our hearts. Jesus’ submission to the Father to choose who sits in glory next to him becomes a rebuke to the ambition of James and John.
    marker-yv: yv-n
