document_id: PSA.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Covered by the Glory
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s song when he was forced to flee from Absalom, his own son
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Humbling of a King
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, I have so many enemies, so many who are against me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to how they whisper their slander against me, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! He’s hopeless! Even God can’t save him from this!”
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: qs
        children:
        - type: text
          text: Selah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a puzzling word to translate. Most scholars believe it is a musical term for pause or rest. It is used seventy-one times in the Psalms as an instruction to the music leader to pause and ponder in God’s presence. An almost identical word,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: qs
        children:
        - type: text
          text: Sela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', means “a massive rock cliff.” It is said that when'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: qs
        children:
        - type: text
          text: Selah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is spoken, the words are carved in stone in the throne room of the heavens.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Help of God
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the depths of my heart I truly know
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have become my Shield;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You take me and surround me with yourself.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many translations render this “You are a shield around me.” The ancient Hebrew can be translated “You, O Lord, are my taker” (Augustine). The implication is that God shields us by taking us into himself. Jesus Christ is the taker of humanity, the one who was made flesh. He not only took our nature, he also took our sins that he might take us into glory.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your glory '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “my glory.”
      marker-yv: yv-n
    - type: text
      text: covers me continually.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You lift high my head.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the time of David, to lift up the head signified acquittal when judged, being freed from the prison of shame. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have cried out to you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew reads “I have cried out to you with my voice.” How else do we cry out to God—isn’t it always with our voice? But the word for “voice” has many different Hebrew meanings. It can also mean “the bleating of a lamb.” David was God’s lamb bleating out to his Shepherd for help.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', from your holy presence.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from your holy hill.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You send me a Father’s help.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Safety
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now I’ll lie down and sleep like a baby—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then I’ll awake in safety, for you surround me with your glory.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even though ten thousand dark powers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “military troops.”
      marker-yv: yv-n
    - type: text
      text: prowl around me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I won’t be afraid.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Secret of Strength
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Rise up and help me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '! Come and save me, God!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you will slap them in the face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breaking the power of their words to harm me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You broke the teeth [lies] of the wicked.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord alone is my Savior.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used sixty times in the Psalms for deliverance is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yeshuah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant form of the name for Jesus. This is pointing us to where our salvation is found.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a feast of favor and bliss he gives his people!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
