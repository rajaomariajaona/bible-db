document_id: PSA.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Covered by the Glory
  - type: text
    content: King David’s song when he was forced to flee from Absalom, his own son
  - type: heading
    content: The Humbling of a King
  - type: text
    content: Lord, I have so many enemies, so many who are against me.
  '2':
  - type: text
    content: 'Listen to how they whisper their slander against me, saying:'
  - type: text
    content: “Look! He’s hopeless! Even God can’t save him from this!”
  - type: text
    content: Pause in his presence
  - type: note
    content: This is the Hebrew word Selah, a puzzling word to translate. Most scholars believe it is a musical term for pause or rest. It is used seventy-one times in the Psalms as an instruction to the music leader to pause and ponder in God’s presence. An almost identical word, Sela, means “a massive rock cliff.” It is said that when Selah is spoken, the words are carved in stone in the throne room of the heavens.
  - type: heading
    content: The Help of God
  '3':
  - type: text
    content: 'But '
  - type: text
    content: in the depths of my heart I truly know
  - type: text
    content: 'that you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have become my Shield;'
  - type: text
    content: You take me and surround me with yourself.
  - type: note
    content: Many translations render this “You are a shield around me.” The ancient Hebrew can be translated “You, O Lord, are my taker” (Augustine). The implication is that God shields us by taking us into himself. Jesus Christ is the taker of humanity, the one who was made flesh. He not only took our nature, he also took our sins that he might take us into glory.
  - type: text
    content: 'Your glory '
  - type: note
    content: Or “my glory.”
  - type: text
    content: covers me continually.
  - type: text
    content: You lift high my head.
  - type: note
    content: In the time of David, to lift up the head signified acquittal when judged, being freed from the prison of shame. See 2 Kings 25:27–28; Jer. 52:31.
  '4':
  - type: text
    content: 'I have cried out to you, '
  - type: note
    content: The Hebrew reads “I have cried out to you with my voice.” How else do we cry out to God—isn’t it always with our voice? But the word for “voice” has many different Hebrew meanings. It can also mean “the bleating of a lamb.” David was God’s lamb bleating out to his Shepherd for help.
  - type: text
    content: Yahweh
  - type: text
    content: ', from your holy presence.'
  - type: note
    content: Or “from your holy hill.”
  - type: text
    content: You send me a Father’s help.
  - type: text
    content: Pause in his presence
  - type: heading
    content: The Song of Safety
  '5':
  - type: text
    content: So now I’ll lie down and sleep like a baby—
  - type: text
    content: then I’ll awake in safety, for you surround me with your glory.
  '6':
  - type: text
    content: 'Even though ten thousand dark powers '
  - type: note
    content: Or “military troops.”
  - type: text
    content: prowl around me,
  - type: text
    content: I won’t be afraid.
  - type: heading
    content: The Secret of Strength
  '7':
  - type: text
    content: 'Rise up and help me, '
  - type: text
    content: Yahweh
  - type: text
    content: '! Come and save me, God!'
  - type: text
    content: For you will slap them in the face,
  - type: text
    content: breaking the power of their words to harm me.
  - type: note
    content: Or “You broke the teeth [lies] of the wicked.”
  '8':
  - type: text
    content: For the Lord alone is my Savior.
  - type: note
    content: The Hebrew word used sixty times in the Psalms for deliverance is Yeshuah, a variant form of the name for Jesus. This is pointing us to where our salvation is found.
  - type: text
    content: What a feast of favor and bliss he gives his people!
  - type: text
    content: Pause in his presence
