document_id: 1CO.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apostolic Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: So then you must perceive us—
    - type: usfm
      marker: it
      children:
      - type: text
        text: not as leaders of factions
    - type: text
      text: ', but as servants '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses an unusual Greek word,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: huperetes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “subordinate” or “personal assistant.” The compound word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: huperetes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: literally means “under-rowers,” and it is used in classical Greek to describe those who sit on benches in the lower parts of the ship rowing. Apostolic ministry does not mean that an apostle is seen as important and in first place, but as one who will often be in a hidden role of moving a church and region forward as a subordinate of our captain, Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: 'of the Anointed One, those who have been entrusted '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “stewards” (“estate managers,” “trustees”). Paul is here referring to the apostles who helped establish and set in order the church at Corinth.
      marker-yv: yv-n
    - type: text
      text: 'with God’s mysteries. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'We are fools for Christ, but you are wise in Christ! We are the frail; you are the powerful. You are celebrated; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “famous.”
      marker-yv: yv-n
    - type: text
      text: 'we are humiliated. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'If you could see us now, you’d find that we are hungry and thirsty, poorly clothed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wearing rags” (tattered and threadbare).
      marker-yv: yv-n
    - type: text
      text: 'brutally treated, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “brutally beaten” (hit with fists). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 26:67
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and with no roof over our heads. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “homeless.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'We work hard, toiling with our own hands. When people abuse and insult us, we respond with a blessing, and when severely persecuted, we endure it with patience. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When we are slandered incessantly, we always answer gently, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “We appeal to them” (directly).
      marker-yv: yv-n
    - type: text
      text: 'ready to reconcile. Even now, in the world’s opinion, we are nothing but filth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scapegoats.”
      marker-yv: yv-n
    - type: text
      text: and the lowest scum.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Father’s Warning
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I’m not writing this to embarrass you or to shame you, but to correct you as the children I love. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For although you could have countless babysitters '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “guardians” (or “tutors”).
      marker-yv: yv-n
    - type: text
      text: 'in Christ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: telling you what you’re doing wrong
    - type: text
      text: ', you don’t have many fathers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who correct you in love
    - type: text
      text: '. But I’m a true father to you, for I became your father when I gave you the gospel and brought you into union with Jesus, the Anointed One. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: So I encourage you, my children, to follow the example that I live before you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “imitate me.” The Aramaic can be translated “I want you to resemble me.” Paul is saying, “Prove your parentage by your conduct; follow me like a father.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'That’s why I’ve sent my dear son Timothy, whom I love. He is faithful to the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “He is faithful [dependable] in the Lord.”
      marker-yv: yv-n
    - type: text
      text: and will remind you of how I conduct myself as one who lives in union with Jesus, the Anointed One, and of the teachings that I bring to every church everywhere.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'There are some among you who have exalted themselves as if I were not coming back to you. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'But I will come soon, if it pleases the Lord, and I will find out not only what these arrogant ones are saying, but also if they have power to back up their words! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'The most important quality of one entrusted with such secrets is that they are faithful and trustworthy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For the kingdom realm of God comes with power, not simply impressive words. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: So which would you prefer? Shall I come carrying the rod of authority to discipline or with an embrace in love with a gentle spirit?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But personally, I’m not the least bit concerned if I’m judged by you or any verdict I receive from any human court. In fact, I don’t even assume to be my own judge, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'even though my conscience is clear. But that doesn’t mean I stand acquitted before the Lord, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both here and in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the Aramaic can be translated “Lord'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
    - type: text
      text: for the only judge I care about is him!
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So resist the temptation to pronounce premature judgment on anything before the appointed time '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when all will be fully revealed
    - type: text
      text: '. Instead, wait until the Lord makes his appearance, for he will bring all that is hidden in darkness to light '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “He will pour light upon the hidden things of darkness.”
      marker-yv: yv-n
    - type: text
      text: 'and unveil every secret motive of everyone’s heart. Then, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when the whole truth is known
    - type: text
      text: ', each will receive praise from God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The clear inference is that God will bring to light the secret motives of love, faithfulness, righteousness, kindness, etc.—not only evil motives, but the pure motives of believers. When the Lord judges his godly lovers, their secret devotion and sacrifices will all be brought into the light and God will praise them for their faithful love. The reward of eternity will be that God affirms them. The word for “praise” can actually be translated, “thanks from God.” Can you imagine the day coming when God praises his faithful servants? See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 4:17–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Ministry of True Apostles
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dear brothers and sisters, I’ve been referring allusively to myself and Apollos in order to illustrate what I’ve been saying. It is futile to move beyond what is written in the Scriptures and be inflated with self-importance by following and promoting one leader in competition with another. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For what makes a distinction between you and someone else? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Who sees anything different in you?” The answer to this rhetorical question is “God.”
      marker-yv: yv-n
    - type: text
      text: 'And what do you have that grace has not given you? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “What do you have that you have not received?” The answer to this rhetorical question is “Nothing.”
      marker-yv: yv-n
    - type: text
      text: 'And if you received it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a gift
    - type: text
      text: ', why do you boast as though there is something special about you?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Why do you boast as though you did not receive it because of grace?” The church at Corinth was split into different factions, each following a different leader. Apparently, each clique thought they had the truth because they had a more anointed leader. But Paul exhorts them not to put their confidence in their hero-leader, because each leader is nothing more than a servant who receives God’s grace to minister according to his or her gift. No leader has a greater status than another.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Oh, I know, you already have all you need! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text uses a metaphor of overfed farmyard animals. They were stuffed with self-importance.
      marker-yv: yv-n
    - type: text
      text: 'Since when did you become so content and rich without us? You’ve already crowned yourselves as royalty, reigning on your thrones, leaving us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lowly apostles
    - type: text
      text: ' far behind! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . A smug, religious self-satisfaction is to have no place in our hearts. We must continually thirst for more of God. We have all things in Christ, but not all that he has given us has filled our hearts. Though we have every blessing, we must walk it out in our daily lives. With biting irony Paul uncovers their pride in thinking they have left the poor apostles behind and have become independent—greater and with more kingdom wealth than they. The deprivations and struggles of the apostles were looked down upon by the Corinthians. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Cor. 11:12–12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Although v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'is in the form of posing rhetorical questions (irony), it is possible to translate it this way: “You have already become full [like at a feast] and fully satisfied. You are already suddenly rich. You suddenly reign as kings apart from us.”'
      marker-yv: yv-n
    - type: text
      text: How I wish indeed that you really were reigning as kings already, for that would mean we would be reigning as kings alongside of you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic continues the irony. “Come, share your royal reign with us so we too can rule with you!”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apostolic Model of Ministry
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'It seems to me that God has appointed us apostles to be at the end of the line. We are like those on display at the end of the procession, as doomed gladiators soon to be killed. We have become a theatrical spectacle to all creation, both to people and to angels. '
