document_id: JOS.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' Speaks to Joshua'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Many years passed, and Joshua was a very old man. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joshua had spied out the land forty-five years earlier (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). He was over eighty years old at the time of this encounter with
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Despite all of Joshua’s victories, there remained more territory to conquer. Believers today, although complete in Christ, have yet more spiritual blessings to possess.
    marker-yv: yv-n
  - type: text
    text: 'One day, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to him: “Although you have reached a ripe old age, a great deal of land remains for you to conquer. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The territory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: waiting for you to possess
  - type: text
    text: ' includes all the land of the Geshurites '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Geshurites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “those who see themselves as proud.” These people lived in the extreme southwest of Canaan reaching as far south as the Egyptian border and are not to be confused with the Geshurites mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:5
      metadata:
        usfm: JOS.12.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and the Philistines. (The kings of the Philistines lived at Gaza, Ashdod, Ashkelon, Gath, and Ekron.) '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Philistia consisted of a federation of the five city-states mentioned in this verse.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ekron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “plucked up by the roots.” It was on the northeast border of Philistia, possibly the modern village of Akar.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And also all the territory of the Avvites '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Hivites.”
    marker-yv: yv-n
  - type: text
    text: 'to the south. (The land from the stream of Shihor, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some identify Shihor as an eastern tributary of the Nile, known as Wadi el-Arish. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 13:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 2:18
      metadata:
        usfm: JER.2.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Shihor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “dark.”
    marker-yv: yv-n
  - type: text
    text: 'at the Egyptian border, as far north as the border of Ekron was considered Canaanite.) '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'There is still all the Canaanite territory from the Sidonian city of Mearah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mearah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “cave.”
    marker-yv: yv-n
  - type: text
    text: '(which belonged to the Sidonians) as far as the Amorite border city of Aphek. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aphek
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “strong enclosure”; it was a city northeast of Beirut, Lebanon (modern Aphaca).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You have still not conquered
  - type: text
    text: ' the land of the Gebalites, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gebal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “boundary” or “limit” and was also known as “Babylus,” a city north of Beirut, Lebanon. Gebal was the center of worship of the god Dumuzid, later known as Tammuz.
    marker-yv: yv-n
  - type: text
    text: 'all the land eastward to Lebanon, from the city of Baal-Gad, which is south of Mount Hermon, to Hamath Pass. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or, if a proper noun, “Lebo Hamath.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You still must conquer
  - type: text
    text: ' the land of the Sidonians who live in the hill country between the Lebanon Mountains and Misrephoth Maim. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 11:8
      metadata:
        usfm: JOS.11.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
  - type: text
    text: 'As the people of Israel advance, I myself will drive out these peoples from before you! Divide the land among the tribes of Israel exactly as I have commanded you. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Divide among the other nine tribes and the other half-tribe of Manasseh the territory '
  - type: usfm
    marker: it
    children:
    - type: text
      text: west of the Jordan
  - type: text
    text: ' to possess as their inheritance.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word “inheritance” is the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nachalah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', taken from the root word'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nachal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which has a homonym meaning “a flowing stream.” We can interpret inheritance to mean wealth flowing from one generation to the next.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Division of the Land East of the Jordan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The tribes of Reuben, Gad, and the half-tribe of Manasseh had already received their portion of the land on the east side of the Jordan, which '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s servant Moses had assigned to them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 32:1–42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'These tribes occupied the land as far southeast as the city of Aroer on the edge of the Arnon Valley, including the city in the middle of the valley and the plain from Dibon in the south, north to Medeba. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Moabites eventually recaptured Dibon and Medeba, the two principal towns of Moab.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Their territory went as far east as the border of Ammon, including all the cities over which King Sihon, the Amorite king, ruled over from Heshbon. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It also included Gilead, the land of the Geshurites and Maacathites, all of Mount Hermon, and all of Bashan to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: its eastern boundary of
  - type: text
    text: ' Salecah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'It encompassed the entire kingdom of Og (the last of the Rephaites) in Bashan, who ruled from Ashtaroth and at Edrei. Moses had defeated them and possessed their lands, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'except for the Geshurites and Maacathites, who still live among the Israelites to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'However, Moses did not assign any land as an inheritance to the tribe of Levi, for their inheritance was to share in the sacrificial offerings '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fire offerings.” The people of Israel brought offerings to the Levites to support them in their priestly functions. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 18:20–26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'made to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, as he promised them.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Territory Assigned to Reuben
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The land Moses assigned to the families of the tribe of Reuben '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'extended from Aroer, on the edge of the Arnon Valley, including the city in the middle of the valley, the whole plain of Medeba, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Heshbon and all its surrounding towns on the plain, including Dibon, Bamoth Baal, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the high places of Baal.”
    marker-yv: yv-n
  - type: text
    text: 'Beth Baal Meon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the house of the lord of Meon,” a likely reference to the local deity worshiped at Meon.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jahaz, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the location where Sihon fought with Israel (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 21:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and later became a Levitical city (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 6:63–64
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Kedemoth, Mephaath, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kiriathaim, Sibmah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sibmah is possibly modern Sumeih.
    marker-yv: yv-n
  - type: text
    text: 'Zereth Shahar on the hill in the valley, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Beth Peor, the slopes of Pisgah, and Beth Jeshimoth, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'including all the cities of the plain, and the whole kingdom of Sihon the Amorite, who had ruled at Heshbon. Moses defeated him and the Midianite tribal chiefs, Evi, Rekem, Zur, Hur, and Reba, who dwelt in the land as princes of Sihon. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Among those the Israelites killed in battle was the fortune-teller Balaam son of Beor. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 22–24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 31:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The '
  - type: usfm
    marker: it
    children:
    - type: text
      text: western
  - type: text
    text: ' boundary of the Reubenites was the Jordan River. These cities and their surrounding villages comprised the inheritance of the families of the tribe of Reuben.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Territory Assigned to Gad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The land Moses assigned to the families of the tribe of Gad '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'included Jazer, all the cities of Gilead, and half the Ammonite country as far as Aroer, near Rabbah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rabbah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “the great,” and is the shortened form of Rabbah Ammon (modern Amman, Jordan).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'It extended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: north
  - type: text
    text: ' from the city of Heshbon to Ramath Mizpah and Betonim, continuing on to the city of Mahanaim, and to the borders of Lo-Debar. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Debir.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 9:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 17:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'In addition, the tribe of Gad received the land along the eastern side of the Jordan River as far north as the southern end of Lake Galilee. This included the cities of Beth Haram, Beth Nimrah, Sukkoth, and Zaphon, all of which were in the Jordan Valley. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: These cities and their surrounding villages comprised the inheritance of the families of the tribe of Gad.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Territory Assigned to East Manasseh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The land Moses assigned to the families of the half-tribe of Manasseh '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'extended '
  - type: usfm
    marker: it
    children:
    - type: text
      text: north
  - type: text
    text: ' from the city of Mahanaim, including all of Bashan and the sixty villages of Jair. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “forest”; he was the son (or possibly “descendant”) of Manasseh. The villages of Jair were villages he conquered (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 32:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'King Og of Bashan had once ruled over all this territory. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moses had given
  - type: text
    text: ' half of Gilead to this half-tribe of Manasseh, which descended from Manasseh’s son Machir, including the cities of Ashtaroth and Edrei, where king Og had once ruled.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Moses had distributed all the territory of Moab in the Jordan Valley east of Jericho as the inheritances '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of these two and a half tribes of Israel
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But Moses gave no inheritance of land to the tribe of Levi, but said to them, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, is to be your inheritance.”'
