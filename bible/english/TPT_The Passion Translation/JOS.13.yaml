document_id: JOS.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh Speaks to Joshua
  - type: text
    content: 'Many years passed, and Joshua was a very old man. '
  - type: note
    content: Joshua had spied out the land forty-five years earlier (see Num. 13–14). He was over eighty years old at the time of this encounter with Yahweh. Despite all of Joshua’s victories, there remained more territory to conquer. Believers today, although complete in Christ, have yet more spiritual blessings to possess.
  - type: text
    content: 'One day, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to him: “Although you have reached a ripe old age, a great deal of land remains for you to conquer. '
  '10':
  - type: text
    content: 'Their territory went as far east as the border of Ammon, including all the cities over which King Sihon, the Amorite king, ruled over from Heshbon. '
  '11':
  - type: text
    content: 'It also included Gilead, the land of the Geshurites and Maacathites, all of Mount Hermon, and all of Bashan to '
  - type: text
    content: its eastern boundary of
  - type: text
    content: ' Salecah. '
  '12':
  - type: text
    content: 'It encompassed the entire kingdom of Og (the last of the Rephaites) in Bashan, who ruled from Ashtaroth and at Edrei. Moses had defeated them and possessed their lands, '
  '13':
  - type: text
    content: 'except for the Geshurites and Maacathites, who still live among the Israelites to this day. '
  '14':
  - type: text
    content: 'However, Moses did not assign any land as an inheritance to the tribe of Levi, for their inheritance was to share in the sacrificial offerings '
  - type: note
    content: Or “fire offerings.” The people of Israel brought offerings to the Levites to support them in their priestly functions. See Num. 18:20–26.
  - type: text
    content: 'made to '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, as he promised them.'
  - type: heading
    content: The Territory Assigned to Reuben
  '15':
  - type: text
    content: 'The land Moses assigned to the families of the tribe of Reuben '
  '16':
  - type: text
    content: 'extended from Aroer, on the edge of the Arnon Valley, including the city in the middle of the valley, the whole plain of Medeba, '
  '17':
  - type: text
    content: 'Heshbon and all its surrounding towns on the plain, including Dibon, Bamoth Baal, '
  - type: note
    content: Or “the high places of Baal.”
  - type: text
    content: 'Beth Baal Meon, '
  - type: note
    content: Or “the house of the lord of Meon,” a likely reference to the local deity worshiped at Meon.
  '18':
  - type: text
    content: 'Jahaz, '
  - type: note
    content: This was the location where Sihon fought with Israel (see Num. 21:23) and later became a Levitical city (see 1 Chron. 6:63–64).
  - type: text
    content: 'Kedemoth, Mephaath, '
  '19':
  - type: text
    content: 'Kiriathaim, Sibmah, '
  - type: note
    content: Sibmah is possibly modern Sumeih.
  - type: text
    content: 'Zereth Shahar on the hill in the valley, '
  '2':
  - type: text
    content: 'The territory '
  - type: text
    content: waiting for you to possess
  - type: text
    content: ' includes all the land of the Geshurites '
  - type: note
    content: Geshurites means “those who see themselves as proud.” These people lived in the extreme southwest of Canaan reaching as far south as the Egyptian border and are not to be confused with the Geshurites mentioned in 12:5.
  - type: text
    content: 'and the Philistines. (The kings of the Philistines lived at Gaza, Ashdod, Ashkelon, Gath, and Ekron.) '
  - type: note
    content: Philistia consisted of a federation of the five city-states mentioned in this verse. Ekron means “plucked up by the roots.” It was on the northeast border of Philistia, possibly the modern village of Akar.
  '20':
  - type: text
    content: 'Beth Peor, the slopes of Pisgah, and Beth Jeshimoth, '
  '21':
  - type: text
    content: 'including all the cities of the plain, and the whole kingdom of Sihon the Amorite, who had ruled at Heshbon. Moses defeated him and the Midianite tribal chiefs, Evi, Rekem, Zur, Hur, and Reba, who dwelt in the land as princes of Sihon. '
  '22':
  - type: text
    content: 'Among those the Israelites killed in battle was the fortune-teller Balaam son of Beor. '
  - type: note
    content: See Num. 22–24; 31:8.
  '23':
  - type: text
    content: 'The '
  - type: text
    content: western
  - type: text
    content: ' boundary of the Reubenites was the Jordan River. These cities and their surrounding villages comprised the inheritance of the families of the tribe of Reuben.'
  - type: heading
    content: The Territory Assigned to Gad
  '24':
  - type: text
    content: 'The land Moses assigned to the families of the tribe of Gad '
  '25':
  - type: text
    content: 'included Jazer, all the cities of Gilead, and half the Ammonite country as far as Aroer, near Rabbah. '
  - type: note
    content: Rabbah means “the great,” and is the shortened form of Rabbah Ammon (modern Amman, Jordan).
  '26':
  - type: text
    content: 'It extended '
  - type: text
    content: north
  - type: text
    content: ' from the city of Heshbon to Ramath Mizpah and Betonim, continuing on to the city of Mahanaim, and to the borders of Lo-Debar. '
  - type: note
    content: Or “Debir.” See 2 Sam. 9:4–5; 17:27.
  '27':
  - type: text
    content: 'In addition, the tribe of Gad received the land along the eastern side of the Jordan River as far north as the southern end of Lake Galilee. This included the cities of Beth Haram, Beth Nimrah, Sukkoth, and Zaphon, all of which were in the Jordan Valley. '
  '28':
  - type: text
    content: These cities and their surrounding villages comprised the inheritance of the families of the tribe of Gad.
  - type: heading
    content: The Territory Assigned to East Manasseh
  '29':
  - type: text
    content: 'The land Moses assigned to the families of the half-tribe of Manasseh '
  '3':
  - type: text
    content: 'And also all the territory of the Avvites '
  - type: note
    content: Or “Hivites.”
  - type: text
    content: 'to the south. (The land from the stream of Shihor, '
  - type: note
    content: Some identify Shihor as an eastern tributary of the Nile, known as Wadi el-Arish. See 1 Chron. 13:5; Jer. 2:18. Shihor means “dark.”
  - type: text
    content: 'at the Egyptian border, as far north as the border of Ekron was considered Canaanite.) '
  '30':
  - type: text
    content: 'extended '
  - type: text
    content: north
  - type: text
    content: ' from the city of Mahanaim, including all of Bashan and the sixty villages of Jair. '
  - type: note
    content: Jair means “forest”; he was the son (or possibly “descendant”) of Manasseh. The villages of Jair were villages he conquered (see Num. 32:41).
  - type: text
    content: 'King Og of Bashan had once ruled over all this territory. '
  '31':
  - type: text
    content: Moses had given
  - type: text
    content: ' half of Gilead to this half-tribe of Manasseh, which descended from Manasseh’s son Machir, including the cities of Ashtaroth and Edrei, where king Og had once ruled.'
  '32':
  - type: text
    content: 'Moses had distributed all the territory of Moab in the Jordan Valley east of Jericho as the inheritances '
  - type: text
    content: of these two and a half tribes of Israel
  - type: text
    content: '. '
  '33':
  - type: text
    content: But Moses gave no inheritance of land to the tribe of Levi, but said to them, “
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, is to be your inheritance.”'
  '4':
  - type: text
    content: 'There is still all the Canaanite territory from the Sidonian city of Mearah '
  - type: note
    content: Mearah means “cave.”
  - type: text
    content: '(which belonged to the Sidonians) as far as the Amorite border city of Aphek. '
  - type: note
    content: Aphek means “strong enclosure”; it was a city northeast of Beirut, Lebanon (modern Aphaca).
  '5':
  - type: text
    content: You have still not conquered
  - type: text
    content: ' the land of the Gebalites, '
  - type: note
    content: Gebal means “boundary” or “limit” and was also known as “Babylus,” a city north of Beirut, Lebanon. Gebal was the center of worship of the god Dumuzid, later known as Tammuz.
  - type: text
    content: 'all the land eastward to Lebanon, from the city of Baal-Gad, which is south of Mount Hermon, to Hamath Pass. '
  - type: note
    content: Or, if a proper noun, “Lebo Hamath.”
  '6':
  - type: text
    content: You still must conquer
  - type: text
    content: ' the land of the Sidonians who live in the hill country between the Lebanon Mountains and Misrephoth Maim. '
  - type: note
    content: See Josh. 11:8 and footnote.
  - type: text
    content: 'As the people of Israel advance, I myself will drive out these peoples from before you! Divide the land among the tribes of Israel exactly as I have commanded you. '
  '7':
  - type: text
    content: 'Divide among the other nine tribes and the other half-tribe of Manasseh the territory '
  - type: text
    content: west of the Jordan
  - type: text
    content: ' to possess as their inheritance.”'
  - type: note
    content: The word “inheritance” is the Hebrew word nachalah, taken from the root word nachal, which has a homonym meaning “a flowing stream.” We can interpret inheritance to mean wealth flowing from one generation to the next.
  - type: heading
    content: The Division of the Land East of the Jordan
  '8':
  - type: text
    content: 'The tribes of Reuben, Gad, and the half-tribe of Manasseh had already received their portion of the land on the east side of the Jordan, which '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant Moses had assigned to them. '
  - type: note
    content: See Num. 32:1–42.
  '9':
  - type: text
    content: 'These tribes occupied the land as far southeast as the city of Aroer on the edge of the Arnon Valley, including the city in the middle of the valley and the plain from Dibon in the south, north to Medeba. '
  - type: note
    content: The Moabites eventually recaptured Dibon and Medeba, the two principal towns of Moab.
