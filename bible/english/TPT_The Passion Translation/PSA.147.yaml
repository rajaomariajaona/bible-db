document_id: PSA.147,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Amazing God
  - type: text
    content: Hallelujah! Praise the Lord!
  - type: text
    content: How beautiful it is when we sing our praises to the beautiful God,
  - type: text
    content: for praise makes you lovely before him
  - type: text
    content: and brings him great delight!
  '10':
  - type: text
    content: His people don’t find security in strong horses,
  - type: text
    content: for horsepower is nothing to him.
  - type: text
    content: Manpower is even less impressive!
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' shows favor to '
  - type: note
    content: Or “takes pleasure in,” “delights in,” “sets his affection on,” “enjoys,” “finds pleasing,” “is satisfied with.”
  - type: text
    content: those who fear him,
  - type: text
    content: those who wait for his tender embrace.
  - type: note
    content: Or “who wait for his loyal, unfailing love.”
  '12':
  - type: text
    content: Jerusalem, praise the Lord! Zion, worship your God!
  '13':
  - type: text
    content: For he has strengthened the authority of your gates.
  - type: text
    content: He even blesses you with more children.
  '14':
  - type: text
    content: He’s the one who brings peace to your borders,
  - type: note
    content: The Septuagint reads “He makes peace your borders.”
  - type: text
    content: feeding you the most excellent of fare.
  '15':
  - type: text
    content: He sends out his orders throughout the world;
  - type: text
    content: his words run as swift messengers, bringing them to pass.
  '16':
  - type: text
    content: He blankets the earth with glistening snow,
  - type: text
    content: painting the landscape with frost.
  '17':
  - type: text
    content: Sleet and hail fall from the sky,
  - type: text
    content: causing waters to freeze before winter’s icy blast.
  '18':
  - type: text
    content: Then he speaks his word and it all melts away;
  - type: text
    content: as the warm spring winds blow, the streams begin to flow.
  '19':
  - type: text
    content: In the same way, he speaks his word to Jacob,
  - type: text
    content: and to Israel he brings his life-giving instruction.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' builds up Jerusalem;'
  - type: text
    content: he gathers up the outcasts and brings them home.
  '20':
  - type: text
    content: He has dealt with Israel differently than with any other people,
  - type: text
    content: for they have received his laws.
  - type: text
    content: Hallelujah! Praise the Lord!
  '3':
  - type: text
    content: He heals the wounds of every shattered heart.
  '4':
  - type: text
    content: He sets his stars in place, calling them all by their names.
  - type: note
    content: See Job 9:9; 38:31–33; Isa. 40:26; Amos 5:8.
  '5':
  - type: text
    content: How great is our God!
  - type: text
    content: There’s absolutely nothing his power cannot accomplish,
  - type: text
    content: and he has infinite understanding of everything.
  '6':
  - type: text
    content: Yahweh
  - type: text
    content: ' supports and strengthens the humble,'
  - type: text
    content: but the ungodly will be brought down to the dust.
  '7':
  - type: text
    content: Sing out with songs of thanksgiving to the Lord!
  - type: text
    content: Let’s sing our praises with melodies overflowing!
  '8':
  - type: text
    content: He fills the sky with clouds, sending showers to water the earth
  - type: text
    content: so that the grass springs up on the mountain fields
  - type: text
    content: and the earth produces food for man.
  - type: note
    content: As translated from the Septuagint.
  '9':
  - type: text
    content: All the birds and beasts who cry with hunger to him
  - type: text
    content: are fed from his hands.
