document_id: PSA.147
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Our Amazing God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hallelujah! Praise the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: How beautiful it is when we sing our praises to the beautiful God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for praise makes you lovely before him
- type: usfm
  marker: q1
  children:
  - type: text
    text: and brings him great delight!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' builds up Jerusalem;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he gathers up the outcasts and brings them home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He heals the wounds of every shattered heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He sets his stars in place, calling them all by their names.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 147:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Job 9:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 38:31–33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 40:26
      metadata:
        usfm: ISA.40.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 5:8
      metadata:
        usfm: AMO.5.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: How great is our God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s absolutely nothing his power cannot accomplish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he has infinite understanding of everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' supports and strengthens the humble,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the ungodly will be brought down to the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sing out with songs of thanksgiving to the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s sing our praises with melodies overflowing!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He fills the sky with clouds, sending showers to water the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that the grass springs up on the mountain fields
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the earth produces food for man.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 147:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the birds and beasts who cry with hunger to him
- type: usfm
  marker: q1
  children:
  - type: text
    text: are fed from his hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His people don’t find security in strong horses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for horsepower is nothing to him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Manpower is even less impressive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' shows favor to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 147:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “takes pleasure in,” “delights in,” “sets his affection on,” “enjoys,” “finds pleasing,” “is satisfied with.”
    marker-yv: yv-n
  - type: text
    text: those who fear him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who wait for his tender embrace.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 147:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who wait for his loyal, unfailing love.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jerusalem, praise the Lord! Zion, worship your God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: For he has strengthened the authority of your gates.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He even blesses you with more children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He’s the one who brings peace to your borders,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 147:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “He makes peace your borders.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: feeding you the most excellent of fare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He sends out his orders throughout the world;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his words run as swift messengers, bringing them to pass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He blankets the earth with glistening snow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: painting the landscape with frost.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sleet and hail fall from the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: causing waters to freeze before winter’s icy blast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then he speaks his word and it all melts away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: as the warm spring winds blow, the streams begin to flow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: In the same way, he speaks his word to Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to Israel he brings his life-giving instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He has dealt with Israel differently than with any other people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they have received his laws.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah! Praise the Lord!
