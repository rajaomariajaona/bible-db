document_id: JER.35,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Faithfulness of the Rechabites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Jehoiakim son of Josiah was king of Judah, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me and said, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: However, when Nebuchadnezzar king of Babylon invaded the land, we decided, ‘
    - type: usfm
      marker: it
      children:
      - type: text
        text: We must protect ourselves!
    - type: text
      text: ' Let’s go to Jerusalem to escape the armies of the Babylonians and the Syrians.’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Aramaeans.” The Syrians were allies of Babylon. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 24:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: That is why we are living now in Jerusalem.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me and said, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies. Go and say to the people of Judah and Jerusalem: ‘You must listen to me and receive instruction. Learn a lesson '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from the Rechabites
    - type: text
      text: ', declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The words of Jonadab son of Rechab ordered his descendants to drink no wine, and they have fully obeyed their ancestor’s command, for they drank no wine even until today. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The example of the wine and the Rechabites revealed to Jeremiah that people can be faithful to their convictions and live with principles and with loyalty to their culture. The Rechabites were obedient to a dead ancestor’s wishes, while Israel was disobedient to the living God who gave them life.
      marker-yv: yv-n
    - type: text
      text: 'But I have spoken to you so urgently, over and over, yet you refuse to listen. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'I have repeatedly sent my servants the prophets to you, saying, “Repent, every one of you, from your evil actions and correct the way you’ve been living. Do not chase after other gods to serve them, and you will continue to live on the land I gave to you and your ancestors.” But you have not paid attention or listened to me. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The descendants of Jonadab and Rechab have kept the command their ancestor gave them, but your people have not listened to me. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'So now, I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, Commander of Angel Armies, say to you people of Judah and Jerusalem: I spoke to you, and you would not listen; because I called to you and you would not answer me, I will bring upon you all the destruction I have decreed against you.’ ”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then Jeremiah said to the Rechabites, “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies, says to you, ‘Because you have obeyed the commands of your ancestor Jonadab and observed all his rules, obeying everything he ordered you to do, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'therefore, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies, promises you this: There will always be a male descendant of Jonadab son of Rechab who will stand before me and serve me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The phrase “stand before me and serve me” is a common phrase of priestly ministry and is used of intercession in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Rechabites are a type of the righteous remnant of the last days. Faithful sons and daughters, like the sons of Zadok, will be those who stand before God to minister to him. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 134:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 135:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 44:1–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; see also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 2:26–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: forever.’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Go to the Rechabites '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Rechabites were a tribe of ascetic people descended from Rechab through Jonadab (or Jehonadab). They believed that agricultural and settled life was contrary to God’s will (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), so they lived a nomadic lifestyle, probably because of the corrupting influence of the Canaanite fertility cults. They also had the custom of not drinking wine because for them, grapes were a symbol of idolatrous Canaanite religious life. They are mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Chron. 2:55
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Apart from this chapter in Jeremiah, Jonadab is only mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 10:15–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Rechabites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “riders [on camels].”
      marker-yv: yv-n
    - type: text
      text: 'and invite them to come with you into one of the side rooms of the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: When they arrive
    - type: text
      text: ', offer them a drink of wine.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So I went to see Jaazaniah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jaazaniah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: hears.” Jaazaniah was likely the tribal leader of the Rechabites. It is surmised that Rechab had died over two hundred years earlier. His father’s name was Jeremiah but he was a different Jeremiah than the prophet.
      marker-yv: yv-n
    - type: text
      text: 'son of Jeremiah and grandson of Habazziniah, his brothers, and all his sons, and the entire Rechabite clan. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I brought them all to the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and into the room where the disciples '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sons.”
      marker-yv: yv-n
    - type: text
      text: 'of the prophet '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “man of God,” a common way of saying “prophet.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 33:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 12:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 1:9–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Hanan son of Igdaliah stayed. The room was next to that of the temple officials, directly above the room of Maaseiah son of Shallum, the keeper of the temple entrance. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “of the threshold.” Three leading priests were given the responsibility of being guardians for the three main entrances to the temple (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 52:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and the second footnote). Later, during the time of the reconstruction of the temple, they were also given the responsibility of overseeing the financial contributions toward the temple (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 12:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This episode was quite public. Many of the priests and worshipers in the temple would have noticed a large entourage of Rechabites coming into an anteroom of the temple compound. Jeremiah was not tempting them to drink wine and break their cultural taboo but was proving that they would remain faithful to their promises.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then I set before the Rechabites pitchers full of wine with some cups and said, “Here, have some wine.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But they replied, “We don’t drink wine because our ancestor Jonadab son of Rechab made a rule that we must obey. He insisted that we and our descendants must never drink wine, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'build houses for ourselves, or plant crops or vineyards. He told us, ‘You must always live in tents as resident aliens so that you may live long in the land.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-10
    - type: text
      text: 'Our clan has always fully obeyed the command of Jonadab son of Rechab, our ancestor. To this very day, we and our wives, sons, and daughters don’t drink wine, build houses, or plant vineyards or crops. And we have lived in tents. '
