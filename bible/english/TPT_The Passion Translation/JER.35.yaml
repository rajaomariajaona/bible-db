document_id: JER.35,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Faithfulness of the Rechabites
  - type: text
    content: 'When Jehoiakim son of Josiah was king of Judah, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '11':
  - type: text
    content: However, when Nebuchadnezzar king of Babylon invaded the land, we decided, ‘
  - type: text
    content: We must protect ourselves!
  - type: text
    content: ' Let’s go to Jerusalem to escape the armies of the Babylonians and the Syrians.’ '
  - type: note
    content: Or “Aramaeans.” The Syrians were allies of Babylon. See 2 Kings 24:2.
  - type: text
    content: That is why we are living now in Jerusalem.”
  '12':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '13':
  - type: text
    content: '“I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies. Go and say to the people of Judah and Jerusalem: ‘You must listen to me and receive instruction. Learn a lesson '
  - type: text
    content: from the Rechabites
  - type: text
    content: ', declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'The words of Jonadab son of Rechab ordered his descendants to drink no wine, and they have fully obeyed their ancestor’s command, for they drank no wine even until today. '
  - type: note
    content: The example of the wine and the Rechabites revealed to Jeremiah that people can be faithful to their convictions and live with principles and with loyalty to their culture. The Rechabites were obedient to a dead ancestor’s wishes, while Israel was disobedient to the living God who gave them life.
  - type: text
    content: 'But I have spoken to you so urgently, over and over, yet you refuse to listen. '
  '15':
  - type: text
    content: 'I have repeatedly sent my servants the prophets to you, saying, “Repent, every one of you, from your evil actions and correct the way you’ve been living. Do not chase after other gods to serve them, and you will continue to live on the land I gave to you and your ancestors.” But you have not paid attention or listened to me. '
  '16':
  - type: text
    content: 'The descendants of Jonadab and Rechab have kept the command their ancestor gave them, but your people have not listened to me. '
  '17':
  - type: text
    content: 'So now, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, say to you people of Judah and Jerusalem: I spoke to you, and you would not listen; because I called to you and you would not answer me, I will bring upon you all the destruction I have decreed against you.’ ”'
  '18':
  - type: text
    content: Then Jeremiah said to the Rechabites, “
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, says to you, ‘Because you have obeyed the commands of your ancestor Jonadab and observed all his rules, obeying everything he ordered you to do, '
  '19':
  - type: text
    content: 'therefore, '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, promises you this: There will always be a male descendant of Jonadab son of Rechab who will stand before me and serve me '
  - type: note
    content: The phrase “stand before me and serve me” is a common phrase of priestly ministry and is used of intercession in 15:1; see 18:20. The Rechabites are a type of the righteous remnant of the last days. Faithful sons and daughters, like the sons of Zadok, will be those who stand before God to minister to him. See Pss. 134:1; 135:1–2; Ezek. 44:1–31; see also Rev. 2:26–28; 12:5; 14:4.
  - type: text
    content: forever.’ ”
  '2':
  - type: text
    content: '“Go to the Rechabites '
  - type: note
    content: The Rechabites were a tribe of ascetic people descended from Rechab through Jonadab (or Jehonadab). They believed that agricultural and settled life was contrary to God’s will (see vv. 7–10), so they lived a nomadic lifestyle, probably because of the corrupting influence of the Canaanite fertility cults. They also had the custom of not drinking wine because for them, grapes were a symbol of idolatrous Canaanite religious life. They are mentioned in 1 Chron. 2:55. Apart from this chapter in Jeremiah, Jonadab is only mentioned in 2 Kings 10:15–28. Rechabites means “riders [on camels].”
  - type: text
    content: 'and invite them to come with you into one of the side rooms of the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: text
    content: When they arrive
  - type: text
    content: ', offer them a drink of wine.” '
  '3':
  - type: text
    content: 'So I went to see Jaazaniah '
  - type: note
    content: Jaazaniah means “Yahweh hears.” Jaazaniah was likely the tribal leader of the Rechabites. It is surmised that Rechab had died over two hundred years earlier. His father’s name was Jeremiah but he was a different Jeremiah than the prophet.
  - type: text
    content: 'son of Jeremiah and grandson of Habazziniah, his brothers, and all his sons, and the entire Rechabite clan. '
  '4':
  - type: text
    content: 'I brought them all to the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and into the room where the disciples '
  - type: note
    content: Or “sons.”
  - type: text
    content: 'of the prophet '
  - type: note
    content: Or “man of God,” a common way of saying “prophet.” See Deut. 33:1; 1 Kings 12:22; 2 Kings 1:9–14.
  - type: text
    content: 'Hanan son of Igdaliah stayed. The room was next to that of the temple officials, directly above the room of Maaseiah son of Shallum, the keeper of the temple entrance. '
  - type: note
    content: Or “of the threshold.” Three leading priests were given the responsibility of being guardians for the three main entrances to the temple (see 2 Kings 25:18; Jer. 52:24 and the second footnote). Later, during the time of the reconstruction of the temple, they were also given the responsibility of overseeing the financial contributions toward the temple (see 2 Kings 12:9). This episode was quite public. Many of the priests and worshipers in the temple would have noticed a large entourage of Rechabites coming into an anteroom of the temple compound. Jeremiah was not tempting them to drink wine and break their cultural taboo but was proving that they would remain faithful to their promises.
  '5':
  - type: text
    content: Then I set before the Rechabites pitchers full of wine with some cups and said, “Here, have some wine.”
  '6':
  - type: text
    content: 'But they replied, “We don’t drink wine because our ancestor Jonadab son of Rechab made a rule that we must obey. He insisted that we and our descendants must never drink wine, '
  '7':
  - type: text
    content: 'build houses for ourselves, or plant crops or vineyards. He told us, ‘You must always live in tents as resident aliens so that you may live long in the land.’ '
  '8':
  - type: text
    content: 'Our clan has always fully obeyed the command of Jonadab son of Rechab, our ancestor. To this very day, we and our wives, sons, and daughters don’t drink wine, build houses, or plant vineyards or crops. And we have lived in tents. '
