        usfm: REV.1.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the beginning and the end. I will give water to all who are thirsty. As my gracious gift, they will continuously drink from the fountain of living water. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The conquering ones will inherit these gifts from me. I will continue to be their God and they will continue being children for me. '
  - type: usfm
