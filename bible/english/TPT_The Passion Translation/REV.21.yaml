  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And God-Enthroned spoke to me and said, “Consider this! I am making everything to be new and fresh. Write down at once all that I have told you, because each word is trustworthy and dependable.”
- type: usfm
