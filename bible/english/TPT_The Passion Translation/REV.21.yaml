  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then one of the seven angels who had the seven bowls full of the last seven plagues came to me and said, “Come. I will show you the beautiful bride, the wife of the Lamb.” '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He carried me away in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the realm of
  - type: text
    text: ' the Spirit to the top of a great, high mountain. There he showed me the holy city, Jerusalem, descending out of heaven from God. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It was infused with the glory of God, and its radiance was like that of a very rare jewel, like a jasper, '
