    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in me.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But as for the cowardly, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “fearmongers.”
    marker-yv: yv-n
  - type: text
    text: 'the faithless, the despicable, the murderers, the perverts, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fornicators” or “male prostitutes.”
    marker-yv: yv-n
  - type: text
    text: 'the sorcerers, the idolaters, and all deceivers, '
  - type: usfm
    marker: f
    children:
