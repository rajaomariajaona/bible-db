document_id: REV.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Heaven, a New Earth, the New Jerusalem
  - type: text
    content: 'Then '
  - type: text
    content: in a vision
  - type: text
    content: ' I saw a new heaven and a new earth. The first heaven and earth had passed away, and the sea no longer existed. '
  '10':
  - type: text
    content: 'He carried me away in '
  - type: text
    content: the realm of
  - type: text
    content: ' the Spirit to the top of a great, high mountain. There he showed me the holy city, Jerusalem, descending out of heaven from God. '
  '11':
  - type: text
    content: 'It was infused with the glory of God, and its radiance was like that of a very rare jewel, like a jasper, '
  - type: note
    content: See the first footnote for Rev. 4:3.
  - type: text
    content: 'clear as crystal. '
  '12':
  - type: text
    content: It had a massive, high wall with twelve gates, and each gate had an angel. Each gate had written upon it a name of one of the twelve tribes of Israel—
  '13':
  - type: text
    content: 'three gates on the east, three gates on the north, three gates on the south, and three gates on the west. '
  '14':
  - type: text
    content: The city wall had twelve foundations, and on them were the names of the twelve apostles of the Lamb.
  '15':
  - type: text
    content: 'The angel who spoke with me had a gold measuring rod to measure the city, its gates and walls. '
  '16':
  - type: text
    content: 'The city was laid out in a perfect square; '
  - type: note
    content: Proportionately, the New Jerusalem is the same shape as the holy of holies.
  - type: text
    content: 'its length, width, '
  - type: text
    content: and height
  - type: text
    content: ' were equal. So he measured the city with his rod, and it was 12,000 '
  - type: note
    content: The number 12,000 (12 x 1,000) is found twenty-five times in the Bible. In Revelation, every measurement of the New Jerusalem is a multiple of twelve. We find twelve gates with twelve messengers, twelve tribes, twelve jewels, twelve foundations, and measuring 12,000 stadia. The walls of the “city” were 144 cubits (12 x 12).
  - type: text
    content: 'stadia, '
  - type: note
    content: Or “race courses.”
  - type: text
    content: 'with equal dimensions for its width, length, and height. '
  '17':
  - type: text
    content: He also measured the wall at 144 cubits, according to the measure of a man, which is angelic.
  '18':
  - type: text
    content: 'The city was pure gold, clear as crystal, '
  - type: note
    content: Or “as pure glass.”
  - type: text
    content: 'and its wall was made of jasper. '
  - type: note
    content: See the first footnote for Rev. 4:3.
  '19':
  - type: text
    content: 'The twelve foundations of the wall '
  - type: note
    content: That is, there were twelve layers of the foundation going all around the wall, or perhaps twelve sections of the wall were made of a corresponding precious stone.
  - type: text
    content: 'were adorned with every kind of precious stone—the first was jasper, '
  - type: note
    content: See the first footnote for Rev. 4:3.
  - type: text
    content: 'the second sapphire, '
  - type: note
    content: Or “lapis lazuli.”
  - type: text
    content: 'the third agate, '
  - type: note
    content: Or “chalcedony.”
  - type: text
    content: 'the fourth emerald, '
  '2':
  - type: text
    content: 'I saw the Holy City, the New Jerusalem, descending out of the heavenly realm from the presence of God, like a pleasing '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'bride that had been prepared for her husband, '
  - type: text
    content: adorned for her wedding
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'the fifth onyx, '
  - type: note
    content: Or “sardonyx.”
  - type: text
    content: 'the sixth carnelian, '
  - type: note
    content: A bloodred gemstone.
  - type: text
    content: 'the seventh chrysolite, '
  - type: note
    content: Or “a yellow quartz.”
  - type: text
    content: 'the eighth beryl, '
  - type: note
    content: A semiprecious gemstone usually aqua (blue-green) in color.
  - type: text
    content: 'the ninth topaz, '
  - type: note
    content: A transparent stone that is colored by its impurities, with many different possibilities in coloring.
  - type: text
    content: 'the tenth chrysoprase, '
  - type: note
    content: A greenish quartz.
  - type: text
    content: 'the eleventh turquoise, '
  - type: note
    content: Or “jacinth.”
  - type: text
    content: 'and the twelfth amethyst. '
  - type: note
    content: A purple quartz. The Greek word literally means “not intoxicated.” This list of jewels matches the twelve stones on the breastplate of the high priest. What once was only on the breastplate is now a part of the new creation life (New Jerusalem) of the believer.
  '21':
  - type: text
    content: The twelve gates are twelve pearls—each gate made of one pearl. And the street of the city was pure gold, clear as crystal.
  - type: note
    content: Or “pure as glass.” Note that the city only has one street and it is pure gold, an obvious metaphor for the “highway of holiness” (pure gold). See Isa. 35:8.
  '22':
  - type: text
    content: I saw no temple in the city, for its temple is the Lord God, the Almighty, and the Lamb.
  '23':
  - type: text
    content: The city has no need for the sun or moon to shine, for the glory of God is its light, and its lamp is the Lamb.
  - type: note
    content: See Isa. 60:19–20.
  '24':
  - type: text
    content: 'The people '
  - type: note
    content: Or “nations.”
  - type: text
    content: 'will walk by its light and the kings of the earth will bring their wealth '
  - type: note
    content: Or “glory.”
  - type: text
    content: into it.
  '25':
  - type: text
    content: Its gates will never be shut by day—standing always open—because there is no night there.
  '26':
  - type: text
    content: People will bring the glory and wealth of the nations into it.
  '27':
  - type: text
    content: 'Evil '
  - type: note
    content: Or “any unclean [defiling] thing.”
  - type: text
    content: will not enter, nor anyone who does what is abhorrent or deceitful, but only those whose names are written in the Book of the Life of the Lamb.
  '3':
  - type: text
    content: 'And I heard a thunderous voice from the throne, saying:'
  - type: text
    content: “Look! God’s tabernacle is with human beings.
  - type: text
    content: And from now on he will tabernacle with them as their God.
  - type: text
    content: Now God himself will have his home with them—
  - type: text
    content: ‘God-with-them’ will be their God!
  - type: note
    content: See Lev. 26:11–12; Isa. 7:14; 8:8–10; Jer. 31:33; Ezek. 37:27.
  '4':
  - type: text
    content: 'He will wipe away '
  - type: note
    content: Or “anoint.”
  - type: text
    content: every tear from their eyes
  - type: text
    content: and eliminate death entirely.
  - type: text
    content: No one will mourn or weep any longer.
  - type: text
    content: The pain of wounds will no longer exist,
  - type: text
    content: 'for the old order '
  - type: note
    content: Or “the first things.”
  - type: text
    content: has ceased.”
  '5':
  - type: text
    content: And God-Enthroned spoke to me and said, “Consider this! I am making everything to be new and fresh. Write down at once all that I have told you, because each word is trustworthy and dependable.”
  '6':
  - type: text
    content: 'Then he said to me, “It has been accomplished! For I am the Aleph and the Tav, '
  - type: note
    content: See footnote for Rev. 1:8.
  - type: text
    content: 'the beginning and the end. I will give water to all who are thirsty. As my gracious gift, they will continuously drink from the fountain of living water. '
  '7':
  - type: text
    content: 'The conquering ones will inherit these gifts from me. I will continue to be their God and they will continue being children for me. '
  - type: note
    content: Or “in me.”
  '8':
  - type: text
    content: 'But as for the cowardly, '
  - type: note
    content: The Aramaic can be translated “fearmongers.”
  - type: text
    content: 'the faithless, the despicable, the murderers, the perverts, '
  - type: note
    content: Or “fornicators” or “male prostitutes.”
  - type: text
    content: 'the sorcerers, the idolaters, and all deceivers, '
  - type: note
    content: Or “pretenders.”
  - type: text
    content: they will find their place in the lake of fire and sulfur, which is the second death.”
  - type: heading
    content: The New Jerusalem
  '9':
  - type: text
    content: 'Then one of the seven angels who had the seven bowls full of the last seven plagues came to me and said, “Come. I will show you the beautiful bride, the wife of the Lamb.” '
