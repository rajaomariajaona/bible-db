  - type: text
    text: 'clear as crystal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It had a massive, high wall with twelve gates, and each gate had an angel. Each gate had written upon it a name of one of the twelve tribes of Israel—
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'three gates on the east, three gates on the north, three gates on the south, and three gates on the west. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The city wall had twelve foundations, and on them were the names of the twelve apostles of the Lamb.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The angel who spoke with me had a gold measuring rod to measure the city, its gates and walls. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The city was laid out in a perfect square; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Proportionately, the New Jerusalem is the same shape as the holy of holies.
    marker-yv: yv-n
  - type: text
    text: 'its length, width, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and height
  - type: text
    text: ' were equal. So he measured the city with his rod, and it was 12,000 '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The number 12,000 (12 x 1,000) is found twenty-five times in the Bible. In Revelation, every measurement of the New Jerusalem is a multiple of twelve. We find twelve gates with twelve messengers, twelve tribes, twelve jewels, twelve foundations, and measuring 12,000 stadia. The walls of the “city” were 144 cubits (12 x 12).
    marker-yv: yv-n
  - type: text
    text: 'stadia, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “race courses.”
    marker-yv: yv-n
  - type: text
    text: 'with equal dimensions for its width, length, and height. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
