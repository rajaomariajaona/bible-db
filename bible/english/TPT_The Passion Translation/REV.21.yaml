        text: A purple quartz. The Greek word literally means “not intoxicated.” This list of jewels matches the twelve stones on the breastplate of the high priest. What once was only on the breastplate is now a part of the new creation life (New Jerusalem) of the believer.
    marker-yv: yv-n
