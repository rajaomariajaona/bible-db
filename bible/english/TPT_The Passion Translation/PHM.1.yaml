document_id: PHM.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Paul, a prisoner '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In other letters from Paul, he describes himself as an apostle, but here, writing to his dear friend, there is no need to remind Philemon of his apostleship.
      marker-yv: yv-n
    - type: text
      text: 'of the Anointed One, Jesus, and Timothy our brother, to Philemon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Philemon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “affectionate” and is derived from the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: philema
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “kiss.”'
      marker-yv: yv-n
    - type: text
      text: 'our precious friend and companion in this work. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Formerly he was not useful or valuable to you, but now he is valuable to both of us. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is my very heart, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “for he is my son.” It would be hard to imagine a more powerful way to describe the affection between Paul and his spiritual son, Onesimus. The one who gave us the love chapter (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) demonstrated that love in his relationships, even with those who were much younger than he.
      marker-yv: yv-n
    - type: text
      text: 'and I’ve sent him back to you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with this letter
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I would have preferred to keep him at my side so that he could take your place as my helper during my imprisonment for the sake of the gospel. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “in the chains of the gospel.” The Aramaic changes the object of the phrase to Onesimus: “I took him to serve me, chained to God’s message, on your behalf.”'
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, I did not want to make this decision without your consent, so that your act of kindness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By implication, this act of kindness refers to Philemon receiving the fugitive slave back with love and forgiveness.
      marker-yv: yv-n
    - type: text
      text: would not be a matter of obligation but out of willingness.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Perhaps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you could think of it this way
    - type: text
      text: ': he was separated from you for a short time so that you could have him back forever. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So welcome him no longer as a slave, but more than that, as a dearly loved brother. He is that to me especially, and how much more so to you, both humanly speaking and in the Lord.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you consider me your friend and partner, accept him the same way you would accept me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if he has stolen anything '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: adikeō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to do wrong” or “to defraud,” the clear implication is that Onesimus had stolen from his master.
      marker-yv: yv-n
    - type: text
      text: from you or owes you anything, just place it on my account.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I, Paul, have written these words in my own handwriting. I promise to pay you back everything, to say nothing of the fact that you owe me your very self.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By implication, it was Paul who had brought the message of life to Philemon and became his “spiritual father” as well.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To the church that meets in his house, along with our dear sister Apphia and our fellow soldier Archippus.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Apphia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fruitful one” and is believed to be the name of Philemon’s wife.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Archippus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “master of the horse” and was possibly their son’s name. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, my brother, enrich my soul '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “benefited” or “profited.” This is a play on words that would not be lost on the educated Philemon, for it is taken from the root word for “Onesimus” (“profitable”).
      marker-yv: yv-n
    - type: text
      text: 'in the Lord—refresh my heart in Christ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I’m writing to you with confidence that you will comply with my request and do even more than what I’m asking.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And would you do one more thing for me? Since I’m hoping through your prayers to be restored to you soon, please prepare a guest room for me.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Epaphras, my fellow prisoner in the Anointed One, Jesus, sends his greetings of peace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The cultural greeting of that day would be peace or “shalom.”
      marker-yv: yv-n
    - type: text
      text: 'to you, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and so does Mark, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, “John Mark.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 15:36–40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This shows that John Mark was fully restored in his relationship and partnership with the apostle Paul. Since Mark’s death was in Alexandria in AD 62, the book of Philemon was obviously written before then. This is the only place in the New Testament that records Mark and Luke being in the same place. Paul had two Gospel writers who traveled with him.
      marker-yv: yv-n
    - type: text
      text: 'Aristarchus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Aristarchus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “best prince” (“ruler”). He was also known as Aristarchus of Thessalonica and is identified in church history as one of the seventy whom Jesus sent out. He was both a ministry companion of Paul and Paul’s “fellow prisoner” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Demas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Demas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “governor of the people.” Demas would later desert Paul and turn back to the world. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and Luke, my companions in this ministry.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the unconditional love '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “grace.”
      marker-yv: yv-n
    - type: text
      text: of the Lord Jesus, the Anointed One, be with your spirit!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic adds a postscript: “End of the letter of Philemon, which was written from Rome and sent by the hands of Onesimus.”'
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God our Father and the Lord Jesus Christ pour out his grace and peace upon you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Philemon’s Faith and Love
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am always thankful to my God as I remember you in my prayers '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because I’m hearing reports about your faith in the Lord Jesus and how much love you have for all his holy followers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I pray for you that the faith we share '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is somewhat ambiguous, for the Greek is literally “for the sharing of the faith of you.” It can mean a number of things, including the common faith that Paul and Philemon shared, or it could mean the faith that Philemon shared with others through evangelism. The Aramaic can be translated “May your association [fellowship] of believers [Philemon’s house church] be fruitful in works and in the knowledge of all that you possess in Jesus, the Messiah.”
      marker-yv: yv-n
    - type: text
      text: 'may effectively deepen your understanding of every good thing that belongs to you in Christ. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: has impacted me
    - type: text
      text: ' and brings me great joy and encouragement, for the hearts of the believers have been greatly refreshed through you, dear brother.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Request on Behalf of Onesimus
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even though I have enough boldness in Christ that I could command you to do what is proper, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I’d much rather make an appeal because of our friendship. So here I am, an old man, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts have “an ambassador” in place of “an old man.”
      marker-yv: yv-n
    - type: text
      text: 'a prisoner for Christ, making my loving appeal to you. It is on behalf of my child, whose spiritual father I became '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “whom I birthed with my chains (while in prison).”
      marker-yv: yv-n
    - type: text
      text: 'while here in prison; that is, Onesimus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul employs a masterful play on words, for the name Onesimus means “useful” or “valuable.” The book of Philemon is a masterpiece of grace, tact, and love.
      marker-yv: yv-n
