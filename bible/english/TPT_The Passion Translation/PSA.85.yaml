document_id: PSA.85,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Mercy and Truth
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A prophetic song composed by the prophetic singers of Korah’s clan
  - type: text
    content: Lord, your love has poured out
  - type: text
    content: so many amazing blessings on our land!
  - type: text
    content: You’ve restored Jacob’s destiny from captivity.
  '10':
  - type: text
    content: Your mercy and your truth have married each other.
  - type: text
    content: Your righteousness and peace have kissed.
  '11':
  - type: text
    content: Flowers of your faithfulness are blooming on the earth.
  - type: text
    content: Righteousness shines down from the sky.
  '12':
  - type: text
    content: Yes, the Lord keeps raining down blessing after blessing,
  - type: text
    content: and prosperity will drench the land with a bountiful harvest.
  '13':
  - type: text
    content: 'For deliverance '
  - type: note
    content: Or “righteousness.”
  - type: text
    content: goes before him,
  - type: text
    content: preparing a path for his steps.
  '2':
  - type: text
    content: You’ve forgiven our many sins and covered
  - type: text
    content: every one of them in your love.
  - type: text
    content: Pause in his presence
  '3':
  - type: text
    content: So now it’s obvious that your blazing anger has ended and
  - type: text
    content: 'the furious fire of wrath has been extinguished '
  - type: text
    content: by your mercy
  - type: text
    content: .
  '4':
  - type: text
    content: So bring us back to loving you, God our Savior.
  - type: text
    content: Restore our hearts so that we’ll never again
  - type: text
    content: feel your anger rise against us.
  '5':
  - type: text
    content: Will you forever hold a grudge?
  - type: text
    content: Will your anger endure for all time?
  '6':
  - type: text
    content: Revive us again, O God! I know you will! Give us a fresh start!
  - type: text
    content: Then all your people will taste your joy and gladness.
  '7':
  - type: text
    content: Pour out even more of your love on us!
  - type: text
    content: Reveal more of your kindness and restore us back to you!
  '8':
  - type: text
    content: Now I’ll listen carefully for your voice
  - type: text
    content: and wait to hear whatever you say.
  - type: text
    content: Let me hear your promise of peace—
  - type: text
    content: the message every one of your godly lovers longs to hear.
  - type: text
    content: Don’t let us in our ignorance turn back from following you.
  '9':
  - type: text
    content: For I know your power and presence shines on all your devoted lovers.
  - type: text
    content: Your glory always hovers over all who bow low before you.
