document_id: PSA.85,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Mercy and Truth
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prophetic song composed by the prophetic singers of Korah’s clan
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lord, your love has poured out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so many amazing blessings on our land!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve restored Jacob’s destiny from captivity.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Your mercy and your truth have married each other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness and peace have kissed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Flowers of your faithfulness are blooming on the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteousness shines down from the sky.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Yes, the Lord keeps raining down blessing after blessing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and prosperity will drench the land with a bountiful harvest.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For deliverance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 85:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “righteousness.”
      marker-yv: yv-n
    - type: text
      text: goes before him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: preparing a path for his steps.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You’ve forgiven our many sins and covered
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every one of them in your love.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: So now it’s obvious that your blazing anger has ended and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the furious fire of wrath has been extinguished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by your mercy
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So bring us back to loving you, God our Savior.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore our hearts so that we’ll never again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: feel your anger rise against us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Will you forever hold a grudge?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will your anger endure for all time?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Revive us again, O God! I know you will! Give us a fresh start!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then all your people will taste your joy and gladness.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Pour out even more of your love on us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reveal more of your kindness and restore us back to you!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Now I’ll listen carefully for your voice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wait to hear whatever you say.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let me hear your promise of peace—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the message every one of your godly lovers longs to hear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let us in our ignorance turn back from following you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: For I know your power and presence shines on all your devoted lovers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your glory always hovers over all who bow low before you.
