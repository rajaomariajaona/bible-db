document_id: PSA.108,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer for God’s Help
  - type: text
    content: A poetic psalm by King David
  - type: text
    content: My heart, O God, is focused and determined.
  - type: text
    content: Now I can sing my song with passionate praises!
  - type: text
    content: Awake, O my soul, with the music of his splendor.
  '10':
  - type: text
    content: But who will bring my triumph into Edom’s fortresses?”
  - type: note
    content: Edom is a variant form of the word Adam.
  '11':
  - type: text
    content: Lord, have you really rejected us, refusing to fight our battles?
  '12':
  - type: text
    content: Give us a father’s help when we face our enemies.
  - type: text
    content: For to trust in any man is an empty hope.
  '13':
  - type: text
    content: With God’s help we will prevail with might and power.
  - type: text
    content: And with God’s help we’ll trample down our every foe!
  '2':
  - type: text
    content: Arise, my soul, and sing his praises!
  - type: text
    content: I will awaken the dawn with my worship,
  - type: text
    content: 'greeting the daybreak with my songs '
  - type: text
    content: of light
  - type: text
    content: .
  '3':
  - type: text
    content: Wherever I go, I will thank you.
  - type: text
    content: All the nations will hear my praise songs to you.
  '4':
  - type: text
    content: Your love is so extravagant, it reaches higher than the heavens!
  - type: text
    content: Your faithfulness is so astonishing, it stretches to the skies!
  '5':
  - type: text
    content: Lord God, be exalted as you soar throughout the heavens.
  - type: text
    content: May your shining glory be seen high above all the earth!
  '6':
  - type: text
    content: Come to your beloved ones and gently draw us out.
  - type: text
    content: Answer our prayer for your saving help.
  - type: text
    content: 'Come with your might and strength, '
  - type: text
    content: for we need you, Lord
  - type: text
    content: '!'
  '7':
  - type: text
    content: Then I heard the Lord speak in his holy splendor,
  - type: text
    content: 'and from his sanctuary I heard the Lord promise:'
  - type: text
    content: “In my triumph I will be the one to measure out
  - type: text
    content: the portion of my inheritance to my people,
  - type: text
    content: and I will secure the land as I promised you.
  - type: text
    content: 'Shechem, Succoth, Gilead, Manasseh '
  - type: note
    content: 'The Hebrew includes two geographical places in the text: Shechem and Succoth. Shechem is where Jacob (Israel) first bought title to the land, paying one hundred pieces of silver for the place where he camped. Succoth is another place where Jacob temporarily camped in the Land of Promise. These two places speak of God being the one who brought them in and portioned out the land for his people.'
  - type: text
    content: —
  - type: text
    content: they are all still mine!” he says.
  - type: text
    content: “Judah will continue to produce kings and lawgivers,
  - type: text
    content: and Ephraim will produce great warriors.
  - type: text
    content: Moab will become my lowly servant.
  - type: text
    content: Edom will likewise serve my purposes.
  - type: text
    content: I will lift up a shout of victory over the land of Philistia!
