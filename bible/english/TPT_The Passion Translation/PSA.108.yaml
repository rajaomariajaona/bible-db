document_id: PSA.108
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Prayer for God’s Help
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A poetic psalm by King David
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My heart, O God, is focused and determined.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I can sing my song with passionate praises!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Awake, O my soul, with the music of his splendor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Arise, my soul, and sing his praises!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will awaken the dawn with my worship,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'greeting the daybreak with my songs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of light
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Wherever I go, I will thank you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the nations will hear my praise songs to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Your love is so extravagant, it reaches higher than the heavens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithfulness is so astonishing, it stretches to the skies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lord God, be exalted as you soar throughout the heavens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May your shining glory be seen high above all the earth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Come to your beloved ones and gently draw us out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Answer our prayer for your saving help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Come with your might and strength, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for we need you, Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-9
  - type: text
    text: Then I heard the Lord speak in his holy splendor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and from his sanctuary I heard the Lord promise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In my triumph I will be the one to measure out
- type: usfm
  marker: q1
  children:
  - type: text
    text: the portion of my inheritance to my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will secure the land as I promised you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Shechem, Succoth, Gilead, Manasseh '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 108:7–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew includes two geographical places in the text: Shechem and Succoth. Shechem is where Jacob (Israel) first bought title to the land, paying one hundred pieces of silver for the place where he camped. Succoth is another place where Jacob temporarily camped in the Land of Promise. These two places speak of God being the one who brought them in and portioned out the land for his people.'
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are all still mine!” he says.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Judah will continue to produce kings and lawgivers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and Ephraim will produce great warriors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab will become my lowly servant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Edom will likewise serve my purposes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will lift up a shout of victory over the land of Philistia!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But who will bring my triumph into Edom’s fortresses?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 108:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Edom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a variant form of the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lord, have you really rejected us, refusing to fight our battles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Give us a father’s help when we face our enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For to trust in any man is an empty hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With God’s help we will prevail with might and power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And with God’s help we’ll trample down our every foe!
