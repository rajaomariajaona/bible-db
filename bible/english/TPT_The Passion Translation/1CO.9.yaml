document_id: 1CO.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Apostolic Freedom
  - type: text
    content: 'Am I not completely free and unrestrained? '
  - type: text
    content: Absolutely!
  - type: text
    content: ' Am I not an apostle? '
  - type: text
    content: Of course!
  - type: text
    content: ' Haven’t I had a personal encounter with our Jesus face-to-face—'
  - type: text
    content: and continue to see him
  - type: text
    content: '? '
  - type: note
    content: As implied by the perfect active indicative. Paul has seen the Lord, but the effects of that “seeing” continue on in full force (i.e., “I continue to have him in my sight”).
  - type: text
    content: Emphatically yes!
  - type: text
    content: ' Aren’t you all the proof of my ministry in the Lord? '
  - type: note
    content: 'These four forceful rhetorical questions are emphatic in the Greek construction, which means they each demand an answer in the affirmative. Although some commentators view these four questions as qualifications of an apostle, there is no indication that this is indeed the purpose of his questions. Paul is defending his apostleship, not listing qualifications of apostles. The seven arguments he makes in defense of his apostleship are the following: (1) He enjoys freedom from all bondage, both from the world and religion (v. 1). (2) He had face-to-face encounters with Jesus (v. 1; 15:8). (3) The formation of the church of Corinth validates his apostleship (vv. 1–2; Acts 18). (4) His unselfish lifestyle resulted in not demanding to be paid for his ministry (vv. 3–15). (5) He was given a divine stewardship (vv. 16–18). (6) He was determined to win everyone through the gospel of Christ (vv. 19–23). (7) He lived a disciplined life in order to succeed in the obstacle course of ministry for Christ (vv. 24–27).'
  - type: text
    content: Certainly!
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Doesn’t he also give us this principle so that we won’t withhold support from his workers? '
  - type: note
    content: Or “Doesn’t he say this for our sake [as apostles]?”
  - type: text
    content: 'It was written so that we would understand that the one '
  - type: text
    content: spiritually
  - type: text
    content: ' “plowing” and '
  - type: text
    content: spiritually
  - type: text
    content: ' “treading out the grain” also labors with the expectation of enjoying the harvest. '
  '11':
  - type: text
    content: 'So, if we’ve sowed many spiritual gifts '
  - type: note
    content: 'The Greek word pneumatikos is often used for spiritual gifts, not just spiritual blessings. See 1 Cor. 12:1; 14:1. The Aramaic is explicit: “Since we have planted the Spirit in you, we should harvest financially from you.”'
  - type: text
    content: 'among you, is it too much to expect to reap material gifts from you? '
  '12':
  - type: text
    content: And if you have supported others, don’t we rightfully deserve this privilege even more?
  - type: text
    content: 'But as you know, we haven’t used that right. Instead, we have continued to support ourselves '
  - type: note
    content: Or “We have endured all things.”
  - type: text
    content: 'so that we would never be a hindrance to the spread of the gospel of Christ. '
  '13':
  - type: text
    content: 'Don’t you know that the priests '
  - type: note
    content: Or “those who work with sacred things.”
  - type: text
    content: 'employed in sacred duty in the temple '
  - type: note
    content: The Aramaic word for temple is “house of blessing.”
  - type: text
    content: 'are provided for by temple resources? And the priests who serve at the altar receive a portion of the offerings? '
  - type: note
    content: Or “what is offered on the altar.” See Lev. 6:9–11, 19.
  '14':
  - type: text
    content: 'In the same way, the Lord has directed those who proclaim the gospel to receive their living by the gospel. As for me, I’ve preferred to never use any of these rights for myself. '
  '15':
  - type: text
    content: And keep in mind that I’m not writing all this because I’m hinting that you should support me.
  - type: heading
    content: Paul Renounces His Rights for the Sake of the Gospel
  - type: text
    content: 'Actually, I’d rather die than to have anyone rob me of this joyous reason for boasting! '
  - type: note
    content: Paul uses the rhetorical device of abruptly breaking off his statement (“I would rather die than—”). This is known as an aposiopesis, meant to intensify the importance of having the joy of boasting in the fact that Paul provided for his own needs in ministry.
  '16':
  - type: text
    content: 'For you see, even though I proclaim the good news, I can’t take the credit for my labors, for I am compelled to fulfill my duty by completing this work. It would be agony to me if I did not constantly preach the gospel! '
  '17':
  - type: text
    content: 'If it were my own idea to preach as a way to make a living, I would expect to be paid. Since it’s not my idea but God’s, who commissioned me, I am entrusted with the stewardship of the gospel '
  - type: text
    content: whether or not I’m paid
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'So then, where is my reward? It is found in continually depositing the good news '
  - type: text
    content: into people’s hearts
  - type: text
    content: ', without obligation, free of charge, and not insisting on my rights to be financially supported.'
  - type: heading
    content: Paul, a Servant to All
  '19':
  - type: text
    content: 'Now, even though I am free from obligations to others, '
  - type: note
    content: That is, Paul lived free from the obligation of pleasing those who paid him a salary. He lived by faith, yet he still became the servant of all.
  - type: text
    content: 'I '
  - type: text
    content: joyfully
  - type: text
    content: ' make myself a servant to all in order to win as many converts as possible. '
  '2':
  - type: text
    content: 'If others do not recognize me as their apostle, at least you are bound to do so, for now your lives are joined to the Lord. You are the '
  - type: text
    content: living proof
  - type: text
    content: ', the certificate of my apostleship.'
  '20':
  - type: text
    content: 'I became Jewish to the Jewish people in order to win them '
  - type: text
    content: to the Messiah
  - type: text
    content: '. I became like one under the law to gain the people who were stuck under the law, even though I myself am not under the law. '
  '21':
  - type: text
    content: 'And to those who are without the Jewish laws, I became like them, as one without the Jewish laws, in order to win them, although I’m not outside the law of God but under the law of Christ. '
  '22':
  - type: text
    content: 'I became “weak” to the weak to win the weak. I have adapted to the culture of every place I’ve gone '
  - type: note
    content: Or “I have become all things to all different kinds of people”; that is, he adapted culturally wherever he ministered.
  - type: text
    content: 'so that I could more easily win people to Christ. '
  '23':
  - type: text
    content: I’ve done all this so that I would become God’s partner for the sake of the gospel.
  - type: note
    content: 'Paul is declaring the five motivating principles for his ministry: (1) Always start by finding common ground with those you want to reach. (2) Avoid projecting to others that you are a know-it-all. (3) Accept everyone regardless of his or her issues. (4) Be sensitive to the culture of others. (5) Use every opportunity to share the good news of Jesus Christ with people.'
  - type: heading
    content: Paul’s Disciplined Lifestyle
  '24':
  - type: text
    content: 'Isn’t it obvious that all runners on the racetrack '
  - type: note
    content: Or “the runners in a stadium.” This refers to the Pan-Hellenic stadium near Corinth where the Isthmian games were held.
  - type: text
    content: 'keep on running to win, but only one receives the victor’s prize? Yet each one of you must run the race to be victorious. '
  '25':
  - type: text
    content: 'A true athlete will be disciplined in every respect, practicing constant self-control in order to win a laurel wreath that quickly withers. But we run our race to win a victor’s crown that will last forever. '
  '26':
  - type: text
    content: 'For that reason, I don’t run just for exercise '
  - type: note
    content: Or “I don’t run aimlessly.” That is, Paul ran with his eyes on the goal of ending well.
  - type: text
    content: 'or box like one throwing aimless punches, '
  '27':
  - type: text
    content: 'but I train like a champion athlete. I subdue my body '
  - type: note
    content: Or “I beat my body black and blue.” This is an obvious metaphor of placing the desires of one’s body as second place to the desires of the Holy Spirit. See Rom. 8:13.
  - type: text
    content: and get it under my control, so that after preaching the good news to others I myself won’t be disqualified.
  '3':
  - type: text
    content: 'So to those who want to continually criticize my apostolic ministry, here’s my statement of defense. '
  - type: note
    content: 'The Aramaic is quite blunt: “Those who judge me I rebuke in [the] spirit.”'
  '4':
  - type: text
    content: 'Don’t we apostles have the right to be supported financially? '
  - type: note
    content: Or “to eat and drink,” a euphemism to describe financial support.
  '5':
  - type: text
    content: 'Don’t we have the right to travel accompanied by our believing wives '
  - type: text
    content: and be supported as a couple
  - type: text
    content: ', as do the other apostles, such as Peter the Rock and the Lord’s brothers? '
  - type: note
    content: See Mark 6:3; John 2:12.
  '6':
  - type: text
    content: Of course we do!
  - type: text
    content: ' '
  - type: note
    content: Made explicit from the Greek disjunctive particle.
  - type: text
    content: Or is it only Barnabas and I who have no right to stop working for a living?
  - type: note
    content: Apostles were usually cared for and financially supported by the church so they didn’t have to engage in secular work for their wages, although Paul and Barnabas, on different occasions, supported themselves without being a burden to the congregations (see vv. 12–15).
  - type: heading
    content: Responsibility to Financially Support God’s Servants
  '7':
  - type: text
    content: 'Who serves in the military at his own expense? Who plants a vineyard and does not enjoy the grapes for himself? Who would nurture and shepherd a flock and never get to drink its fresh milk? '
  '8':
  - type: text
    content: 'Am I merely giving you my own opinions, or does the Torah teach the same things? '
  '9':
  - type: text
    content: 'For it is written in the law of Moses:'
  - type: text
    content: You should never put a muzzle over the mouth of an ox
  - type: text
    content: while he is treading out the grain.
  - type: note
    content: See Deut. 25:4; 1 Tim. 5:18.
  - type: text
    content: 'Tell me, is God only talking about oxen here? '
