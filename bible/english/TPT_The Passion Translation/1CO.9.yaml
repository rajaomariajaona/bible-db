document_id: 1CO.9,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Apostolic Freedom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Am I not completely free and unrestrained? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Absolutely!
    - type: text
      text: ' Am I not an apostle? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Of course!
    - type: text
      text: ' Haven’t I had a personal encounter with our Jesus face-to-face—'
    - type: usfm
      marker: it
      children:
      - type: text
        text: and continue to see him
    - type: text
      text: '? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As implied by the perfect active indicative. Paul has seen the Lord, but the effects of that “seeing” continue on in full force (i.e., “I continue to have him in my sight”).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Emphatically yes!
    - type: text
      text: ' Aren’t you all the proof of my ministry in the Lord? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'These four forceful rhetorical questions are emphatic in the Greek construction, which means they each demand an answer in the affirmative. Although some commentators view these four questions as qualifications of an apostle, there is no indication that this is indeed the purpose of his questions. Paul is defending his apostleship, not listing qualifications of apostles. The seven arguments he makes in defense of his apostleship are the following: (1) He enjoys freedom from all bondage, both from the world and religion (v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (2) He had face-to-face encounters with Jesus (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (3) The formation of the church of Corinth validates his apostleship (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (4) His unselfish lifestyle resulted in not demanding to be paid for his ministry (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (5) He was given a divine stewardship (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (6) He was determined to win everyone through the gospel of Christ (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (7) He lived a disciplined life in order to succeed in the obstacle course of ministry for Christ (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Certainly!
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Doesn’t he also give us this principle so that we won’t withhold support from his workers? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Doesn’t he say this for our sake [as apostles]?”
      marker-yv: yv-n
    - type: text
      text: 'It was written so that we would understand that the one '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritually
    - type: text
      text: ' “plowing” and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritually
    - type: text
      text: ' “treading out the grain” also labors with the expectation of enjoying the harvest. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So, if we’ve sowed many spiritual gifts '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pneumatikos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is often used for spiritual gifts, not just spiritual blessings. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. The Aramaic is explicit: “Since we have planted the Spirit in you, we should harvest financially from you.”'
      marker-yv: yv-n
    - type: text
      text: 'among you, is it too much to expect to reap material gifts from you? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And if you have supported others, don’t we rightfully deserve this privilege even more?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as you know, we haven’t used that right. Instead, we have continued to support ourselves '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “We have endured all things.”
      marker-yv: yv-n
    - type: text
      text: 'so that we would never be a hindrance to the spread of the gospel of Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Don’t you know that the priests '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those who work with sacred things.”
      marker-yv: yv-n
    - type: text
      text: 'employed in sacred duty in the temple '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is “house of blessing.”
      marker-yv: yv-n
    - type: text
      text: 'are provided for by temple resources? And the priests who serve at the altar receive a portion of the offerings? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “what is offered on the altar.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 6:9–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '19'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'In the same way, the Lord has directed those who proclaim the gospel to receive their living by the gospel. As for me, I’ve preferred to never use any of these rights for myself. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And keep in mind that I’m not writing all this because I’m hinting that you should support me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Renounces His Rights for the Sake of the Gospel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Actually, I’d rather die than to have anyone rob me of this joyous reason for boasting! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses the rhetorical device of abruptly breaking off his statement (“I would rather die than—”). This is known as an aposiopesis, meant to intensify the importance of having the joy of boasting in the fact that Paul provided for his own needs in ministry.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For you see, even though I proclaim the good news, I can’t take the credit for my labors, for I am compelled to fulfill my duty by completing this work. It would be agony to me if I did not constantly preach the gospel! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If it were my own idea to preach as a way to make a living, I would expect to be paid. Since it’s not my idea but God’s, who commissioned me, I am entrusted with the stewardship of the gospel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whether or not I’m paid
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So then, where is my reward? It is found in continually depositing the good news '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into people’s hearts
    - type: text
      text: ', without obligation, free of charge, and not insisting on my rights to be financially supported.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul, a Servant to All
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Now, even though I am free from obligations to others, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Paul lived free from the obligation of pleasing those who paid him a salary. He lived by faith, yet he still became the servant of all.
      marker-yv: yv-n
    - type: text
      text: 'I '
    - type: usfm
      marker: it
      children:
      - type: text
        text: joyfully
    - type: text
      text: ' make myself a servant to all in order to win as many converts as possible. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'If others do not recognize me as their apostle, at least you are bound to do so, for now your lives are joined to the Lord. You are the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: living proof
    - type: text
      text: ', the certificate of my apostleship.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'I became Jewish to the Jewish people in order to win them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the Messiah
    - type: text
      text: '. I became like one under the law to gain the people who were stuck under the law, even though I myself am not under the law. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And to those who are without the Jewish laws, I became like them, as one without the Jewish laws, in order to win them, although I’m not outside the law of God but under the law of Christ. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'I became “weak” to the weak to win the weak. I have adapted to the culture of every place I’ve gone '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I have become all things to all different kinds of people”; that is, he adapted culturally wherever he ministered.
      marker-yv: yv-n
    - type: text
      text: 'so that I could more easily win people to Christ. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I’ve done all this so that I would become God’s partner for the sake of the gospel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul is declaring the five motivating principles for his ministry: (1) Always start by finding common ground with those you want to reach. (2) Avoid projecting to others that you are a know-it-all. (3) Accept everyone regardless of his or her issues. (4) Be sensitive to the culture of others. (5) Use every opportunity to share the good news of Jesus Christ with people.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Disciplined Lifestyle
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Isn’t it obvious that all runners on the racetrack '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the runners in a stadium.” This refers to the Pan-Hellenic stadium near Corinth where the Isthmian games were held.
      marker-yv: yv-n
    - type: text
      text: 'keep on running to win, but only one receives the victor’s prize? Yet each one of you must run the race to be victorious. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'A true athlete will be disciplined in every respect, practicing constant self-control in order to win a laurel wreath that quickly withers. But we run our race to win a victor’s crown that will last forever. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For that reason, I don’t run just for exercise '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I don’t run aimlessly.” That is, Paul ran with his eyes on the goal of ending well.
      marker-yv: yv-n
    - type: text
      text: 'or box like one throwing aimless punches, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'but I train like a champion athlete. I subdue my body '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I beat my body black and blue.” This is an obvious metaphor of placing the desires of one’s body as second place to the desires of the Holy Spirit. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and get it under my control, so that after preaching the good news to others I myself won’t be disqualified.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'So to those who want to continually criticize my apostolic ministry, here’s my statement of defense. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic is quite blunt: “Those who judge me I rebuke in [the] spirit.”'
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Don’t we apostles have the right to be supported financially? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to eat and drink,” a euphemism to describe financial support.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Don’t we have the right to travel accompanied by our believing wives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and be supported as a couple
    - type: text
      text: ', as do the other apostles, such as Peter the Rock and the Lord’s brothers? '
    - type: usfm
      marker: f
      children:
