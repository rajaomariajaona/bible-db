  - type: text
    content: About Matthew
  - type: text
    content: Four centuries of silence. Where was the promised Messiah? The Jewish people were waiting for the word of the prophets to come true, for they had prophesied that he would come. Then suddenly, the angel Gabriel made an appearance to a teenage girl to announce his birth. Shepherds saw a brilliant angelic light show on the hillside.
  - type: text
    content: Wise men went out in search of him.
  - type: text
    content: The light of the star shone over his manger.
  - type: text
    content: Insecure Herod wanted to kill him.
  - type: text
    content: Satan cruelly tested him.
  - type: text
    content: The prophet John presented him to Israel.
  - type: text
    content: God anointed him with the power of the Holy Spirit.
  - type: text
    content: 'Then one day the King came into the synagogue and announced: “I’m here! I’ve come to set you free and to wash away sins, and liberate those who love and follow me.”'
  - type: text
    content: 'We can thank God for Matthew, for in his Gospel he presents our eternal King. Matthew means “gift of '
  - type: text
    content: Yahweh
  - type: text
    content: ',” and he lives up to his name. Thank you, Matthew, for the gift of your life and for what you have left for us in your Gospel!'
  - type: text
    content: Purpose
  - type: text
    content: Matthew is a natural bridge between the Old Testament and the New because it has the most Jewish character. From the first verse to the last, Matthew establishes Jesus as a direct descendant of King David, preserving and fulfilling his royal line as the rightful heir as well as a descendant of Abraham, the father of Israel.
  - type: text
    content: Furthermore, Matthew portrays Jesus as the new and greater Moses, who not only upholds the Jewish Torah but intensifies it—not in a legalistic way, but in a spiritual way, because following his teachings is the way into his heavenly kingdom realm.
  - type: text
    content: It would be a mistake, however, to say there is only one purpose for this book. While one primary purpose is to communicate the Jesus story to the Jewish people, Matthew also means to communicate Jesus’ story to us. One particular aspect of the Jesus story that Matthew wants to share is that Jesus is King of a heavenly kingdom realm. Mark and Luke also speak of God’s kingdom realm, but Matthew focuses on how people behave as citizens of that realm, with Jesus as their loving King.
  - type: text
    content: Author and Audience
  - type: text
    content: It is believed that Matthew may have been the first apostle to write a gospel, and he possibly wrote it in Hebrew (Aramaic). Though some maintain that Matthew wrote his Gospel after the destruction of the temple in AD 70, it’s possible he wrote it anywhere from AD 55 to the mid-60s. He was a wealthy tax collector who profited greatly from his duty of representing Rome. And then one day, the man from Galilee stood in front of him and said, “Come, follow me.”
  - type: text
    content: 'There continues to be debate over the original language of Matthew’s account. Eusebius, the Greek church historian, quoted Irenaeus as saying, “Matthew published his gospel among the Hebrews in their own language, while Peter and Paul in Rome were preaching and founding the church” (Eusebius, '
  - type: text
    content: Historia Ecclesiastica
  - type: text
    content: ' III. 24.5–6 and V. 8, 2.) This, along with numerous other quotations from church fathers (Origen, Jerome, Augustine) would mean that the original manuscript of Matthew’s Gospel was written in Hebrew. Regardless, it is without dispute that Matthew was a Jewish man who presents a Jewish King who now sits on the throne of glory for all people.'
  - type: text
    content: 'Perhaps an unbiased look at the Hebrew and Aramaic manuscripts would yield further nuances of our Jewish heritage as believers in '
  - type: text
    content: Yeshua
  - type: text
    content: ' (Jesus) and would strengthen our understanding of the inspired Scriptures. You will find ample footnotes throughout this translation to assist you in your study.'
  - type: text
    content: Major Themes
  - type: text
    content: Gospel-Telling.
  - type: text
    content: ' The word '
  - type: text
    content: gospel
  - type: text
    content: ' doesn’t simply mean “good news.” It is derived from the Greek verb '
  - type: text
    content: euangelizomai
  - type: text
    content: ', which means “to preach the good news.” In other words, Matthew is writing to tell us heaven’s truths embedded in the earthly events of the man Jesus. Matthew isn’t giving us dry theology, but sharing stories and teachings designed in such a way as to unfold the majestic, magisterial person of Jesus, who embodies all of our theologies!'
  - type: text
    content: Old Testament.
  - type: text
    content: ' As the first book of the New Testament, Matthew connects the past with the present and with the future. He quotes sixty times from the Old Testament, showing us that the New was enfolded in the Old, while the New Testament is the Old Testament unfolded and explained. The Old Testament is more central in Matthew than in any other Gospel, both in frequency and in emphasis. If the Jewish story is always pointing forward, Matthew’s Gospel is its final act. It brings resolution to the Old Testament by presenting King Jesus and his kingdom realm and community as fulfilling their prophetic expectations.'
  - type: text
    content: Parables.
  - type: text
    content: ' There are unique components to Matthew’s Gospel. For example, he records extensively the allegorical teachings of Jesus known as parables. Twelve are detailed by Matthew, and nine of them are unique to this account. He gives us two miracles of Jesus that are found nowhere else: the healing of two blind men and the miracle coin found in the fish’s mouth. It is through these simple stories that the nature of both our King and his kingdom really come to life!'
  - type: text
    content: Heavenly Kingdom Realm.
  - type: text
    content: ' Matthew brings us the realm of the heavenly kingdom and sets its virtue and reality before us. The phrase “kingdom realm” is used nearly forty times as Jesus offers it to you and me. And Jesus is described as the King fourteen times. This is the Gospel of the King and his kingdom, but a different kingdom than even his followers expected. For the kingdom realm that Jesus ushered in would not liberate the Jewish people from oppression from the Roman government as they expected—we can define neither the King nor his kingdom ourselves. Instead, he offers not only Jews but every person access to an eternal, heavenly realm free from the consequences of sin and an oasis to refresh our lives!'
  - type: text
    content: Kingdom-Realm Living.
  - type: text
    content: ' Matthew’s Gospel isn’t only about our loving King and his kingdom, it’s also about his subjects who act and live within that kingdom. The church is the community of Christ’s heavenly kingdom realm, and Jesus’ sermon on the hillside is the final Torah of the kingdom realm. For Matthew, a godly lover (the “righteous”) is someone who has chosen to submit to Jesus as King and whose life is lived in accordance with his ethics. The Gospel of Matthew will bring before your eyes the power and majesty of our loving King. Encounter the wonder of Jesus as you read this book!'
  - type: heading
    content: Matthew
  - type: heading
    content: Our Loving King
