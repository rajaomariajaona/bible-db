        usfm: ISA.9.14+ISA.9.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The tail is a symbol of false teaching, the lies of the enemy.
    marker-yv: yv-n
  - type: text
    text: 'and stingers like scorpions, with power to injure people for five months. '
  - type: usfm
    marker: f
