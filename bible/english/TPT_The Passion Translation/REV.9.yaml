      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Locusts emerged from the smoke. The smoke of the abyss is a picture of deception. The lies of the enemy are a “smoke screen.” The locusts are a picture of the words, actions, and lies of the religious system that dominates and intimidates others (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nah. 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It causes others to feel inferior, like “grasshoppers” (or “locusts”). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 13:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:1–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
