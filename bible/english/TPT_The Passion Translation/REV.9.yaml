        text: 9:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used for “torment” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: basanizo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is derived from the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: touchstone
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', or “to examine and test” (the purity of gold and silver). Our thoughts must be examined and made pure in the truth of our sonship and identity before God, which gives us power over the “locusts” that sting like scorpions (demonic power).'
    marker-yv: yv-n
  - type: text
    text: 'is like the scorpion’s sting, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and during that time people will seek death but will not find it; they will long to die but death will elude them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As believers, we don’t seek to die, for we have already been crucified with Christ (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 2:20
      metadata:
        usfm: GAL.2.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This is difficult to interpret literally. How strange it would be if those with mangled bodies still lived after trying to kill themselves. This is a picture of believers who try to put themselves to death, not recognizing that God has done so already through our co-crucifixion with Christ. Many today still suffer the sting of a scorpion (erroneous concepts of God and tormenting thoughts of self-hatred) until they see the glory of Christ’s empty tomb and the resurrection life that is available to us.
    marker-yv: yv-n
- type: usfm
