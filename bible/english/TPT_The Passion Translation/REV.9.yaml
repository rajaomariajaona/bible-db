      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: that the four messengers become the myriad of horsemen. They are the overcoming ones who are ready to wage war for the Lamb. The locust army and the army of horsemen are two armies facing each other and both are prepared for battle. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
