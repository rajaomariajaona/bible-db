      - type: text
        text: Locusts emerged from the smoke. The smoke of the abyss is a picture of deception. The lies of the enemy are a “smoke screen.” The locusts are a picture of the words, actions, and lies of the religious system that dominates and intimidates others (
    - type: usfm
