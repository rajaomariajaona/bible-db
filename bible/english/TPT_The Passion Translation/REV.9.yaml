      metadata:
        usfm: REV.9.7+REV.9.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . They come appearing as battle horses to intimidate with counterfeit crowns, looking like they are on a mission from God, but they are not genuine. They have what appears to be human faces, pointing to the fact that they are false teachers and false apostles with their fake crowns of gold. With hair like that of women and teeth like those of a lion, they will seduce and tear apart those who come into their religious bondage.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Their hair '
  - type: usfm
    marker: it
    children:
    - type: text
      text: was long
  - type: text
    text: ', like women’s hair, and their teeth like lion’s teeth. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
