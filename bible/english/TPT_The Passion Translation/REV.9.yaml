    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The life span of a locust in the region of Israel is about five months. And there are five months from the last day of Passover to the first day of the Feast of Tabernacles. Noah’s ark floated upon the floodwaters for five months.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The angel of the bottomless pit was king over them, and his name in Hebrew is Destruction '
  - type: usfm
    marker: f
