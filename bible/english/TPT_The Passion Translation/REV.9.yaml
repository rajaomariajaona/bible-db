  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He opened the shaft of the bottomless pit and a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: blanket of
    - type: text
      text: ' smoke began to rise out of it, like the smoke of a giant furnace. The sun and the atmosphere were darkened with the smoke rising from the shaft.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those not killed by these plagues did not repent of their deeds so that they would stop worshiping demons and idols of gold, silver, bronze, stone, and wood—blind and mute idols that have to be carried around. '
    - type: usfm
      marker: f
