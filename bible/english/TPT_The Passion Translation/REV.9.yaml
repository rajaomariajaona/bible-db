    children:
    - type: text
      text: '15'
  - type: text
    text: So the four angels were released, who had been prepared for the right hour, day, month, and year, to kill a third of humanity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I heard the number of soldiers on horseback—it was twice ten thousand times ten thousand. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “two myriads of myriads,” a symbolic number, an incalculable number of enormous proportions. The Aramaic and some Greek manuscripts have “twice ten thousand” or “twenty thousand.” It is clear by reading vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 14–16
      metadata:
        usfm: REV.9.14+REV.9.15+REV.9.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that the four messengers become the myriad of horsemen. They are the overcoming ones who are ready to wage war for the Lamb. The locust army and the army of horsemen are two armies facing each other and both are prepared for battle. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
