    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Abaddon,” which means “destruction.”
    marker-yv: yv-n
  - type: text
    text: 'and in Greek Destroyer. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or “Apollyon,” which means “destroyer.” The Aramaic has “in Hebrew, ‘Servant,’ and in Aramaic, ‘Prince.’ ” The devil holds no keys, for Christ has destroyed the works of the devil and holds the keys of every realm, including death and hell. Christ is the “angel” referred to in this passage. Notice the work of Christ to “destroy” in the following Scriptures:'
