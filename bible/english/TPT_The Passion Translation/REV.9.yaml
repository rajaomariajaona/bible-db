    children:
    - type: text
      text: '4'
  - type: text
    text: 'They were told not to harm the grass, or any green growth or any tree, but only to afflict those who did not have the seal of God on their foreheads. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The forehead is a metaphor for our thoughts, our minds. We must have the seal of sonship on our thoughts, the seal of God as our Father, or we will be tormented in our minds over our true identity in Christ.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The locusts were given authority to torment them for five months, but not to kill them. Their painful torment '
  - type: usfm
