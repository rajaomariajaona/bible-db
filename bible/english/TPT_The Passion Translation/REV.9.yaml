        text: ), for he unlocked both and walked out triumphantly in resurrection power. Many things are opened in Revelation (heaven, doors, books) with the purpose of releasing a new understanding or revelation. There is a deep place in the human heart, like a pit, that Jesus opens so that we can see what has been there inside us.
    marker-yv: yv-n
