      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the sixth angel sounded his trumpet, and I heard a voice from the four horns of the golden altar before God, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: responding to the sixth angel, who blew his trumpet, “Set free the four angels who are confined at the great river Euphrates.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “The great river Euphrates” is referred to over and over in Scripture as the boundary of Israel’s inheritance (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:18
      metadata:
        usfm: GEN.15.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 1:4
      metadata:
        usfm: JOS.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 4:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It becomes a symbol for us of the boundary of our spiritual inheritance, that which separates our “promised land” and religious “Babylon.” Many believers are “bound” at the boundary and living in less than what they are called to, but they will be loosed in the last days to enter their full inheritance (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 1:10–11
      metadata:
        usfm: EPH.1.10+EPH.1.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
