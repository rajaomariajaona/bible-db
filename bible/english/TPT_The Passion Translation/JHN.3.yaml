document_id: JHN.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Nicodemus
  - type: text
    content: 'Now there was a prominent religious leader among the Jews named Nicodemus, '
  - type: note
    content: Nicodemus means “conqueror.” Here we see a distinguished and moral man speaking with Jesus. In the next chapter, we will see an immoral woman coming to know Jesus, the woman at Jacob’s well.
  - type: text
    content: 'who was part of the sect called the Pharisees. '
  '10':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Nicodemus, aren’t you the respected teacher in Israel, and yet you don’t understand this revelation?
  - type: text
    content: ' '
  '11':
  - type: text
    content: I speak eternal truths about things I know, things I’ve seen and experienced—and still you don’t accept what I reveal.
  - type: text
    content: ' '
  '12':
  - type: text
    content: If you’re unable to believe what I’ve told you about the natural realm, what will you do when I begin to unveil the heavenly realm?
  - type: text
    content: ' '
  '13':
  - type: text
    content: No one has risen into the heavenly realm except the Son of Man who also exists in heaven.”
  - type: note
    content: Jesus shared a mystery with Nicodemus. While he was on the earth ministering, Jesus was also in heaven in the spirit realm. Being in two places at the same time is also the privilege given to every believer. We are at the same time seated with Christ in the heavenly realm, but also living our life on earth to please him. This is what it means to be “in Christ.” See Eph. 2:6; Col. 3:1–5. In the realm of the Spirit, heaven and earth are one. Jesus was telling Nicodemus that only those who are seated in the heavenly realm will understand spiritual truths. See 1 Cor. 2:1–10. Most Greek manuscripts read “the Son of Man who came from heaven.” But the Aramaic is clearly “who is in heaven.”
  - type: heading
    content: God’s Love for Everyone
  '14':
  - type: text
    content: “And just as Moses in the desert lifted up the brass replica of a venomous snake on a pole
  - type: text
    content: ' '
  - type: text
    content: for all the people to see and be healed,
  - type: text
    content: ' '
  - type: note
    content: See Num. 21:8–9. The brass snake symbolizes sin and disease. The Hebrew uses a word, seraph, which means a fiery one (fiery serpent). All of humanity has been bitten by the “snake of sin,” but Jesus was raised up on a cross for all people to see. We only need to look to him and believe, and we are healed and saved from sin.
  - type: text
    content: so the Son of Man is ready to be lifted up,
  - type: text
    content: ' '
  '15':
  - type: text
    content: so that those who truly believe in him
  - type: text
    content: ' '
  - type: note
    content: The Aramaic participle can also be “believe on him” or “believe into him,” which could explain the variations found in the Greek text.
  - type: text
    content: will not perish but be given eternal life.
  - type: text
    content: ' '
  '16':
  - type: text
    content: For here is the way God loved the world—he gave his only, unique Son
  - type: text
    content: ' '
  - type: text
    content: as a gift.
  - type: text
    content: ' '
  - type: note
    content: Or “God proved he loved the world by giving his Son.”
  - type: text
    content: So now everyone who believes in him
  - type: text
    content: ' '
  - type: note
    content: 'Or “believe into him.” Salvation and regeneration come only by faith. True faith (Gr. pistis) contains a number of components: acceptance, embracing something (someone) as truth, union with God and his Word, and an inner confidence that God alone is enough.'
  - type: text
    content: will never perish but experience everlasting life.
  '17':
  - type: text
    content: “God did not send his Son into the world to judge and condemn the world, but to be its Savior and rescue it!
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “so that they shall live by his hand” (of power).
  '18':
  - type: text
    content: So now there is no longer any condemnation for those who believe in him, but the unbeliever already lives under condemnation because they do not believe in the name of the only Son of God.
  - type: text
    content: ' '
  - type: note
    content: Or “one and only Son.”
  '19':
  - type: text
    content: 'And here is the basis for their judgment: The Light'
  - type: text
    content: ' '
  - type: text
    content: of God
  - type: text
    content: ' '
  - type: text
    content: has now come into the world, but the people loved darkness more than the Light, because they want the darkness to conceal their evil.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'One night he discreetly came to Jesus and said, “Rabbi, we know that you are a teacher come from God, for no one performs the miracle signs that you do, unless God’s '
  - type: text
    content: power
  - type: text
    content: ' is with him.”'
  '20':
  - type: text
    content: So the wicked hate the Light and try to hide from it, for the Light fully exposes their lives.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But those who love the truth
  - type: text
    content: ' '
  - type: note
    content: Or “practice the truth.”
  - type: text
    content: will come into the Light, for the Light will reveal that it was God who produced their fruitful works.”
  - type: note
    content: Some scholars believe that vv. 16–21 are explanatory material supplied by John, the author, rather than the words of Jesus.
  - type: heading
    content: John, Friend of the Bridegroom
  '22':
  - type: text
    content: 'Then Jesus and his disciples left for a length of time into the Judean countryside where they baptized the people. '
  '23':
  - type: text
    content: 'At this time John was still baptizing people at Aenon, '
  - type: note
    content: The Aramaic location is Ainyon, which in Aramaic means “the spring of doves,” or “dove’s eyes.” The Greek manuscripts have transliterated this to Aenon.
  - type: text
    content: 'near Salim, '
  - type: note
    content: Or in Aramaic, Shalim, which means “to follow.” One ancient tradition refers to this location to be eight miles south of the town of Scythopolis, or Beit She’an.
  - type: text
    content: 'where there was plenty of water, and the people kept coming for John to baptize them. '
  '24':
  - type: text
    content: (This was before John was thrown into prison.)
  '25':
  - type: text
    content: 'An argument started between John’s disciples and a particular Jewish man about baptism. '
  - type: note
    content: Or “purification.” The implication is that the Jewish man was telling John’s disciples that Jesus’ baptism was better than John’s.
  '26':
  - type: text
    content: So they went to John and asked him, “Teacher, are you aware that the One you told us about at the crossing place—he’s now baptizing crowds larger than yours. People are flocking to him!”
  '27':
  - type: text
    content: 'John answered them, “A person cannot receive even one thing unless God bestows it. '
  - type: note
    content: Or “No one of his own will can receive anything unless it comes to him from heaven.”
  '28':
  - type: text
    content: 'You’ve heard me tell you that I am not the Messiah, but certainly I am the messenger sent ahead of him. '
  '29':
  - type: text
    content: 'He is the Bridegroom, '
  - type: note
    content: See Isa. 62:5; Rev. 21:9.
  - type: text
    content: 'and the bride belongs to him. I am the friend '
  - type: note
    content: Or “family member.”
  - type: text
    content: 'of the Bridegroom who stands nearby and listens with great joy to the Bridegroom’s voice. Because of his words, my joy is complete and overflows! '
  '3':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“Nicodemus, listen to this eternal truth: Before a person can even perceive God’s kingdom, they must first experience a rebirth.”'
  - type: note
    content: The Greek word can be translated “born from above.” However, in the context Nicodemus understood it as a rebirth. The Aramaic word is clearly “born from the origin.” Nicodemus came seeking knowledge; Jesus offered him life.
  '30':
  - type: text
    content: 'It is necessary for him to increase '
  - type: note
    content: The increase of Christ in v. 30 is the bride of Christ in v. 29. We are the increase of Christ as his counterpart. Just as Eve was the increase of Adam, the bride is the increase of Christ on the earth.
  - type: text
    content: and for me to decrease.
  - type: note
    content: Or “He is destined to become greater, and I must be pruned.” Some translations end John the Baptizer’s words here and make vv. 31–36 the words of John the apostle.
  '31':
  - type: text
    content: '“For the one who is from the earth belongs to the earth and speaks from the natural realm. But the One who comes from above is above everything '
  - type: text
    content: and speaks of the highest realm of all
  - type: text
    content: '! '
  '32':
  - type: text
    content: 'His message is about what he has seen and experienced, even though people don’t accept it. '
  '33':
  - type: text
    content: Yet those who embrace his message know in their hearts that it’s the truth.
  - type: note
    content: The Aramaic is “Those who accept his testimony take God’s true seal (upon them).”
  '34':
  - type: text
    content: '“The One whom God has sent to represent him will speak the words of God, because God has poured out upon him the fullness of the Holy Spirit without limitation. '
  - type: note
    content: Or “the Spirit does not give anything in small measures.” There is some textual evidence that this verse is saying, “The Son gives the Spirit [to his people] without measure.”
  '35':
  - type: text
    content: 'The Father loves his Son so much that he has given all things into his hands. '
  - type: note
    content: The text is simply “he has given all into his hands.” The “all” can be all things, or “all authority,” but can also mean “all people.”
  '36':
  - type: text
    content: 'Those who trust in the Son possess eternal life; those who don’t obey '
  - type: note
    content: The Aramaic can be translated “those who do not cling to the Son.”
  - type: text
    content: the Son will not see life, and God’s anger will rise up against them.”
  - type: note
    content: As translated from the Aramaic. The Greek is “wrath rests upon them.”
  '4':
  - type: text
    content: Nicodemus said, “Rebirth? How can a gray-headed man be reborn? It’s impossible for anyone to go back into the womb a second time and be reborn!”
  '5':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“I speak an eternal truth: Unless you are born of water'
  - type: text
    content: ' '
  - type: note
    content: The pure water of the Word of God cleanses us and gives us life. See Eph. 5:25–26; James 1:18; 1 Peter 1:23. Some see in the water and Spirit analogy the creative beginning of Gen. 1, where God’s life-giving Spirit fluttered over the chaotic waters. New creation life comes the same way. Water and blood gushed from the side of our Lord Jesus. He was the last Adam who gave birth to his bride from his pierced side.
  - type: text
    content: and the Spirit, you will never enter God’s kingdom.
  - type: text
    content: ' '
  '6':
  - type: text
    content: For the natural realm only gives birth to things that are natural, but the spiritual realm gives birth to supernatural life!
  '7':
  - type: text
    content: “You shouldn’t be amazed by my statement,
  - type: text
    content: ' '
  - type: note
    content: Or “say to you all.”
  - type: text
    content: ‘You all must be born from above!’
  - type: text
    content: ' '
  - type: note
    content: A common poetic form of Hebraic teaching is to use a play on words, which Jesus utilizes in this poetic masterpiece with multiple words containing dual meanings. The word for “reborn” can also be translated “born from above.”
  '8':
  - type: text
    content: For the Spirit-Wind blows as it chooses. You can hear its sound,
  - type: text
    content: ' '
  - type: note
    content: The word for “blow” can also be translated “breathe.” The word for “sound” can be translated “voice.” And the same word for “Spirit” can also mean “wind.” If our new birth is so mysterious, how much more will be the ways of living each moment by the movement of the Holy Spirit? One can understand how confused Nicodemus was, for he took everything at face value and couldn’t see a deeper meaning.
  - type: text
    content: but you don’t know where it came from or where it’s going. So it is the same with those who are Spirit-born!”
  - type: note
    content: Or “The Spirit moves you as he chooses, and you hear his voice, but you don’t know where he came from or where he goes.” The Aramaic is so rich and multilayered in this passage. Perhaps it could be paraphrased as “The wind, the breath, and the Spirit are moved by mysterious moods and in their own wonderful ways. When you feel their touch and hear their voices, you know they are real, but you don’t understand how they flow and move over the earth. The same mysterious way is the way of everyone born by wind, breath, and Spirit.”
  '9':
  - type: text
    content: Nicodemus replied, “I don’t understand; what do you mean? How does this happen?”
