        children:
        - type: text
          text: Nicodemus means “conqueror.” Here we see a distinguished and moral man speaking with Jesus. In the next chapter, we will see an immoral woman coming to know Jesus, the woman at Jacob’s well.
      marker-yv: yv-n
    - type: text
      text: 'who was part of the sect called the Pharisees. '
