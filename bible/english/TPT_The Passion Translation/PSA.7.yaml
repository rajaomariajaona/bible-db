document_id: PSA.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Song for the Slandered Soul
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'David’s passionate song '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The inscription reads “shiggaion,” which means “a loud cry” and is taken from a Hebrew word that means “roar.” It is a wild and passionate song. Have you ever been under such pressure that you felt like roaring? That is a “shiggaion.” Some scholars believe the central thought of the word is that of wandering. It may also indicate the style of music to which the song was written.
      marker-yv: yv-n
    - type: text
      text: 'to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “Breaking the Curse of Cush, the Benjamite”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Cush means “firelike,” “burned,” or “blackened.” This person’s identity is not definite, but some believe this is an oblique reference to Saul, whose heart was burned and blackened by his sin and whose character was “firelike.” Saul was a Benjamite.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rescue Me
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', my God, I turn to hide my soul in you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from all those who pursue and persecute me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: God, your wraparound presence is my shield.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You bring victory to all who are pure in heart.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God, your righteousness is revealed when you judge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of the strength of your forgiveness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your anger does not break out every day.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As translated from the Septuagint. Although the Hebrew is “God is angry during all the day,” this verse has other possible translations. The Latin Vulgate: “God is a judge, righteous, strong, and patient. Will he be angry every day?” The Septuagint: “not bringing forth his anger every day.” The Syriac: “he is not angry every day.” In other words, even though God judges righteously, his anger does not break out every day. There are over ten words in Hebrew that can be translated “anger.” The word used in this verse is'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: za’am
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and comes from a word that means the “roar” or “groan” of a camel.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Lethal Weapons
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: Yet if one does not repent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you will not relent to sharpen '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “sharpen” can also be translated “brighten.” God will make bright his sword of truth for the righteous and to the ungodly. God’s Word is a sword to bring light and judgment to the heart.
      marker-yv: yv-n
    - type: text
      text: 'your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' sword.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have an arsenal of lethal weapons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you’ve prepared for them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have bent and strung your bow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making your judgment-arrows shafts of burning fire.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Look how the wicked conceive their evil schemes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They go into labor with their lies and give birth to trouble.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'They dig a pit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for others to fall into
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not knowing that they will be the very ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who will fall into it.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Every pit-digger who works to trap and harm others
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be trapped by his own treachery.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thankful Praise
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'But I will give my thanks to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you make everything right in the end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing my highest praise to the God of the Highest Place!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'There is none to deliver me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but you
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let my foes fall upon me like fierce lions with teeth bared.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t you see how they want to rip my soul to shreds?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', my God, if I have done evil like they say I have,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my hands are guilty,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: if I have wronged someone at peace with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if I have betrayed a friend, repaying evil for good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or if I have unjustly harmed my enemy,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then
    - type: text
      text: ' let my enemy pursue and overtake me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them grind me into the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them take my life from me and drag my dignity through the dust!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vindicate Me
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', arise in your anger against the anger '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “outrages (plural).”
      marker-yv: yv-n
    - type: text
      text: of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awaken your fury and stand up for me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Execute the judgment '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Command justice!” It is in God’s hands alone to bring true justice to the earth, for he is the Righteous Judge.
      marker-yv: yv-n
    - type: text
      text: you have decreed against them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: All the people gather around you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Return to your place on high to preside over them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is at least a hint here of the resurrection and ascension of Jesus, who had all authority to judge given to him and now rules from on high.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'You are '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' who judges the people.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vindicate me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: publicly
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and restore my honor and integrity.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Augustine, an early church father, translates this word as “harmlessness.” David saw himself as harmless to his enemies. This is what integrity is all about. We maintain our character even when misunderstood or persecuted. Are you like this?
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare me innocent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Once and for all, bring to an end the evil tactics of the wicked!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Establish the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cause of
    - type: text
      text: ' the righteous,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for you are the righteous God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the soul searcher
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who tests every heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to examine the thoughts and motives.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hearts and kidneys,” which is a Hebraic way of saying all of human nature, including our thoughts, motives, and feelings.
      marker-yv: yv-n
