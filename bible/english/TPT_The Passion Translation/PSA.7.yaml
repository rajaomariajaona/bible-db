document_id: PSA.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Song for the Slandered Soul
  - type: text
    content: 'David’s passionate song '
  - type: note
    content: The inscription reads “shiggaion,” which means “a loud cry” and is taken from a Hebrew word that means “roar.” It is a wild and passionate song. Have you ever been under such pressure that you felt like roaring? That is a “shiggaion.” Some scholars believe the central thought of the word is that of wandering. It may also indicate the style of music to which the song was written.
  - type: text
    content: 'to '
  - type: text
    content: Yahweh
  - type: text
    content: To the tune of “Breaking the Curse of Cush, the Benjamite”
  - type: note
    content: The name Cush means “firelike,” “burned,” or “blackened.” This person’s identity is not definite, but some believe this is an oblique reference to Saul, whose heart was burned and blackened by his sin and whose character was “firelike.” Saul was a Benjamite.
  - type: heading
    content: Rescue Me
  - type: text
    content: Yahweh
  - type: text
    content: ', my God, I turn to hide my soul in you.'
  - type: text
    content: Save me from all those who pursue and persecute me.
  '10':
  - type: text
    content: God, your wraparound presence is my shield.
  - type: text
    content: You bring victory to all who are pure in heart.
  '11':
  - type: text
    content: God, your righteousness is revealed when you judge.
  - type: text
    content: Because of the strength of your forgiveness,
  - type: text
    content: your anger does not break out every day.
  - type: note
    content: 'As translated from the Septuagint. Although the Hebrew is “God is angry during all the day,” this verse has other possible translations. The Latin Vulgate: “God is a judge, righteous, strong, and patient. Will he be angry every day?” The Septuagint: “not bringing forth his anger every day.” The Syriac: “he is not angry every day.” In other words, even though God judges righteously, his anger does not break out every day. There are over ten words in Hebrew that can be translated “anger.” The word used in this verse is za’am and comes from a word that means the “roar” or “groan” of a camel.'
  - type: heading
    content: God’s Lethal Weapons
  '12':
  - type: text
    content: Yet if one does not repent,
  - type: text
    content: 'you will not relent to sharpen '
  - type: note
    content: The Hebrew word for “sharpen” can also be translated “brighten.” God will make bright his sword of truth for the righteous and to the ungodly. God’s Word is a sword to bring light and judgment to the heart.
  - type: text
    content: 'your '
  - type: text
    content: shining
  - type: text
    content: ' sword.'
  - type: text
    content: You have an arsenal of lethal weapons
  - type: text
    content: that you’ve prepared for them.
  - type: text
    content: You have bent and strung your bow,
  - type: text
    content: making your judgment-arrows shafts of burning fire.
  '14':
  - type: text
    content: Look how the wicked conceive their evil schemes.
  - type: text
    content: They go into labor with their lies and give birth to trouble.
  '15':
  - type: text
    content: 'They dig a pit '
  - type: text
    content: for others to fall into
  - type: text
    content: ','
  - type: text
    content: not knowing that they will be the very ones
  - type: text
    content: who will fall into it.
  '16':
  - type: text
    content: Every pit-digger who works to trap and harm others
  - type: text
    content: will be trapped by his own treachery.
  - type: heading
    content: Thankful Praise
  '17':
  - type: text
    content: 'But I will give my thanks to you, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: for you make everything right in the end.
  - type: text
    content: I will sing my highest praise to the God of the Highest Place!
  '2':
  - type: text
    content: 'There is none to deliver me '
  - type: text
    content: but you
  - type: text
    content: '!'
  - type: text
    content: Don’t let my foes fall upon me like fierce lions with teeth bared.
  - type: text
    content: Can’t you see how they want to rip my soul to shreds?
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ', my God, if I have done evil like they say I have,'
  - type: text
    content: and my hands are guilty,
  '4':
  - type: text
    content: if I have wronged someone at peace with me,
  - type: text
    content: if I have betrayed a friend, repaying evil for good,
  - type: text
    content: or if I have unjustly harmed my enemy,
  '5':
  - type: text
    content: Then
  - type: text
    content: ' let my enemy pursue and overtake me.'
  - type: text
    content: Let them grind me into the ground.
  - type: text
    content: Let them take my life from me and drag my dignity through the dust!
  - type: text
    content: Pause in his presence
  - type: heading
    content: Vindicate Me
  '6':
  - type: text
    content: Yahweh
  - type: text
    content: ', arise in your anger against the anger '
  - type: note
    content: Or “outrages (plural).”
  - type: text
    content: of my enemies.
  - type: text
    content: Awaken your fury and stand up for me!
  - type: text
    content: 'Execute the judgment '
  - type: note
    content: Or “Command justice!” It is in God’s hands alone to bring true justice to the earth, for he is the Righteous Judge.
  - type: text
    content: you have decreed against them.
  '7':
  - type: text
    content: All the people gather around you.
  - type: text
    content: Return to your place on high to preside over them.
  - type: note
    content: There is at least a hint here of the resurrection and ascension of Jesus, who had all authority to judge given to him and now rules from on high.
  '8':
  - type: text
    content: 'You are '
  - type: text
    content: Yahweh
  - type: text
    content: ' who judges the people.'
  - type: text
    content: 'Vindicate me '
  - type: text
    content: publicly
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', and restore my honor and integrity.'
  - type: note
    content: Augustine, an early church father, translates this word as “harmlessness.” David saw himself as harmless to his enemies. This is what integrity is all about. We maintain our character even when misunderstood or persecuted. Are you like this?
  - type: text
    content: Declare me innocent.
  '9':
  - type: text
    content: Once and for all, bring to an end the evil tactics of the wicked!
  - type: text
    content: 'Establish the '
  - type: text
    content: cause of
  - type: text
    content: ' the righteous,'
  - type: text
    content: 'for you are the righteous God, '
  - type: text
    content: the soul searcher
  - type: text
    content: ','
  - type: text
    content: who tests every heart
  - type: text
    content: to examine the thoughts and motives.
  - type: note
    content: Or “hearts and kidneys,” which is a Hebraic way of saying all of human nature, including our thoughts, motives, and feelings.
