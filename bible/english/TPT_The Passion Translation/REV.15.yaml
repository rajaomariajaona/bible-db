document_id: REV.15,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Moses and of the Lamb
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I witnessed another great and astonishing sign in heaven: seven angels bringing the last seven plagues, for with them the wrath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “strong passion.” See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 7:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: of God is finished.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Then I saw what looked like a vast sea of glass blended with fiery flames. Standing beside the sea were those who continually conquer the wild beast, his image and the number of his name. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: All those who are one day victorious over the “beast” will learn to sing this eternal song of thanksgiving and praise. The “beast” is our self-life (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 73:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). We are called to overcome this beast through the life of Jesus within us. As we overcome by the power of the cross and borrow the life of Christ for ourselves, we qualify as overcomers who sing the sacred song of Moses. All that is of the beast must be laid aside as we take up the Christ nature and live in his strength. He can change each of us from a beast to a lamb (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:6–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'They each held the harps of God and they were singing the song of Moses, God’s servant, and the song of the Lamb:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The song of Moses was sung in a victory celebration of Israel’s deliverance from Egypt (
      - type: text
        text: Ex. 15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ); the song of the Lamb is sung in a victory celebration of believers who conquered the beast (the nature of man).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Mighty and marvelous are your miracles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God Almighty!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Righteous and true are your ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Sovereign King of the ages!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts have “King of the nations.” The Aramaic can be translated “King of the universe.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Who will not reverence you with awe, O Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bring glory to your name?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you alone are holy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all nations will come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bow in worship before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as your blessings have revealed.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “for your righteous works [judgments] are revealed.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seven Angels
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'After these things I looked, and behold, the inner sanctuary of the heavenly “tabernacle of testimony” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tent of witness.” This phrase is found 130 times from Exodus through Deuteronomy and refers to the innermost place of the tabernacle (holy of holies) where God’s testimony (the Ten Commandments) was kept inside the ark of glory.
      marker-yv: yv-n
    - type: text
      text: 'was opened before my eyes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The seven angels with the seven last plagues came out of the sanctuary in glistening robes of bright linen and golden sashes around their chests.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “across their chests.” Just as we will be clothed in the garments of our High Priest, these seven messengers are robed in pure garments and free from corruption.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Then one of the four living creatures gave each of the seven angels a golden bowl full of the wrath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both the Greek and the Aramaic can be translated “the strong passion of God.”
      marker-yv: yv-n
    - type: text
      text: 'of God, who lives forever and ever. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The sanctuary was filled with the thick cloud of smoke '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “incense.”
      marker-yv: yv-n
    - type: text
      text: 'billowing out from the glory and power of God—and no one could even enter the sanctuary '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 40:34–35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 8:10–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Aramaic can be translated “no one was able to depart the sanctuary.”
      marker-yv: yv-n
    - type: text
      text: until the seven plagues of the seven angels were completed.
