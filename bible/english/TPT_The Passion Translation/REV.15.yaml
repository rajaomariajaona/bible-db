document_id: REV.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Moses and of the Lamb
  - type: text
    content: 'Then I witnessed another great and astonishing sign in heaven: seven angels bringing the last seven plagues, for with them the wrath '
  - type: note
    content: Or “strong passion.” See also Mic. 7:18.
  - type: text
    content: of God is finished.
  '2':
  - type: text
    content: 'Then I saw what looked like a vast sea of glass blended with fiery flames. Standing beside the sea were those who continually conquer the wild beast, his image and the number of his name. '
  - type: note
    content: All those who are one day victorious over the “beast” will learn to sing this eternal song of thanksgiving and praise. The “beast” is our self-life (Ps. 73:22). We are called to overcome this beast through the life of Jesus within us. As we overcome by the power of the cross and borrow the life of Christ for ourselves, we qualify as overcomers who sing the sacred song of Moses. All that is of the beast must be laid aside as we take up the Christ nature and live in his strength. He can change each of us from a beast to a lamb (Isa. 11:6–10; Phil. 3:21; Rev. 12:11).
  '3':
  - type: text
    content: 'They each held the harps of God and they were singing the song of Moses, God’s servant, and the song of the Lamb:'
  - type: note
    content: The song of Moses was sung in a victory celebration of Israel’s deliverance from Egypt (Ex. 15); the song of the Lamb is sung in a victory celebration of believers who conquered the beast (the nature of man).
  - type: text
    content: “Mighty and marvelous are your miracles,
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', God Almighty!'
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: Righteous and true are your ways,
  - type: text
    content: O Sovereign King of the ages!
  - type: note
    content: Some manuscripts have “King of the nations.” The Aramaic can be translated “King of the universe.”
  '4':
  - type: text
    content: Who will not reverence you with awe, O Lord,
  - type: text
    content: and bring glory to your name?
  - type: text
    content: For you alone are holy,
  - type: text
    content: and all nations will come
  - type: text
    content: and bow in worship before you,
  - type: text
    content: as your blessings have revealed.”
  - type: note
    content: As translated from the Aramaic. The Greek is “for your righteous works [judgments] are revealed.”
  - type: heading
    content: Seven Angels
  '5':
  - type: text
    content: 'After these things I looked, and behold, the inner sanctuary of the heavenly “tabernacle of testimony” '
  - type: note
    content: Or “tent of witness.” This phrase is found 130 times from Exodus through Deuteronomy and refers to the innermost place of the tabernacle (holy of holies) where God’s testimony (the Ten Commandments) was kept inside the ark of glory.
  - type: text
    content: 'was opened before my eyes. '
  '6':
  - type: text
    content: The seven angels with the seven last plagues came out of the sanctuary in glistening robes of bright linen and golden sashes around their chests.
  - type: note
    content: Or “across their chests.” Just as we will be clothed in the garments of our High Priest, these seven messengers are robed in pure garments and free from corruption.
  '7':
  - type: text
    content: 'Then one of the four living creatures gave each of the seven angels a golden bowl full of the wrath '
  - type: note
    content: Both the Greek and the Aramaic can be translated “the strong passion of God.”
  - type: text
    content: 'of God, who lives forever and ever. '
  '8':
  - type: text
    content: 'The sanctuary was filled with the thick cloud of smoke '
  - type: note
    content: The Aramaic can be translated “incense.”
  - type: text
    content: 'billowing out from the glory and power of God—and no one could even enter the sanctuary '
  - type: note
    content: See Ex. 40:34–35; 1 Kings 8:10–11. The Aramaic can be translated “no one was able to depart the sanctuary.”
  - type: text
    content: until the seven plagues of the seven angels were completed.
