document_id: MAT.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: John the Baptizer Killed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Herod, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was Herod Antipas, the son of Herod the Great who had the infant boys killed in Bethlehem. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 2:16
      metadata:
        usfm: MAT.2.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Herod Antipas was the one who Jesus stood before to be judged. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 23:15
      metadata:
        usfm: LUK.23.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the Roman ruler over Galilee, heard reports about Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He told his officials, “This man has to be John the Baptizer who has come back from the dead. That’s why he has this power to work miracles.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “This is why powers are emanating from him.” Herod believed that it was the spirit of John working through Jesus, not the Spirit of God.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For Herod had earlier arrested John for confronting him for taking the wife of his brother Philip. He had John thrown in prison and placed in chains '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'because John had repeatedly said to him, “It’s not legal or proper for you to be married to Herodias, your sister-in-law!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Herod Antipas wanted to take his brother’s wife so he divorced his wife, a Nabatean princess, and Herodias divorced Philip so they could marry each other. This was why John confronted Herod. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 18:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So Herod wanted John dead, but he was afraid of the crowds who flocked to John because they considered him to be a prophet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'During Herod’s birthday celebration, the daughter of Herodias '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Josephus, the Jewish historian, notes that her daughter was named Salome.
    marker-yv: yv-n
  - type: text
    text: 'danced before Herod and all his distinguished guests, which greatly pleased the king. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So he said to her in front of them all, “I give you my oath, ask of me anything you wish and it will be yours!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Because she had been instructed by her mother, she said, “I want the head of John the Baptizer here on a platter!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'This grieved the king, but because of his oath in front of all of his guests, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'he had John beheaded in prison. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They brought in his head and displayed it to her on a platter, and she then had it shown to her mother.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: John’s disciples went into the prison and carried his body away and buried it. Then they left to find Jesus and tell him what had happened.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Feeds the Multitude
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On hearing this, Jesus slipped away privately by boat to be alone. But when the crowds discovered he had sailed away, they emerged from all the nearby towns and followed him on foot. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So when Jesus landed he had a huge crowd waiting for him. Seeing so many people, his heart was deeply moved with compassion toward them, so he healed all the sick who were in the crowd.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “he nurtured them in love and cured their frailties.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Later that afternoon the disciples came to Jesus and said, “It’s going to be dark soon and the people are hungry, but there’s nothing to eat here in this desolate place. You should send the crowds away to the nearby villages to buy themselves some food.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “They don’t need to leave,”
  - type: text
    text: ' Jesus responded. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You can give them something to eat.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They answered, “But all we have is five barley loaves and two fish.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let me have them,”
  - type: text
    text: ' Jesus replied. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then he had everyone sit down on the grass and he then took the five loaves and two fish. He looked up into heaven, gave thanks to God, and broke the bread into pieces. He then gave it to his disciples, who in turn gave it to the crowds. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And everyone ate until they were satisfied, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for the food was multiplied in front of their eyes
  - type: text
    text: '! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The miracle took place as the disciples distributed what they had. Each disciple ended up with a basket full of leftovers.
    marker-yv: yv-n
  - type: text
    text: 'They picked up the leftovers and filled up twelve baskets full! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: There were about five thousand men who were fed, in addition to many women and children!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Walks on Water
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'As soon as the people were fed, Jesus told his disciples to get into their boat and to go to the other side of the lake while he stayed behind to dismiss the people. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: After the crowds dispersed, Jesus went up into the hills to pray. And as night fell he was there praying alone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But the disciples, who were now in the middle of the lake, ran into trouble, for their boat was tossed about by the high winds and heavy seas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'At about four o’clock in the morning, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “during the fourth watch of the night” (between 3:00 and 6:00 a.m.).
    marker-yv: yv-n
  - type: text
    text: 'Jesus came to them, walking on the waves! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When the disciples saw him walking on top of the water, they were terrified and screamed, “A ghost!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be brave and don’t be afraid. I am here!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I AM,” which was the name of God used in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 3:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Peter shouted out, “Lord, if it’s really you, then have me join you on the water!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come and join me,”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Go for it!”
    marker-yv: yv-n
  - type: text
    text: Jesus replied.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So Peter stepped out onto the water and began to walk toward Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But when he realized how high the waves were, he became frightened and started to sink. “Save me, Lord!” he cried out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesus immediately stretched out his hand and lifted him up and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What little faith you have! Why would you let doubt win?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And the very moment they both stepped into the boat, the raging wind ceased. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Then all the disciples bowed down '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jewish disciples of Jesus bowed down before him, which was an amazing act of worship (
    - type: text
      text: Ex. 20:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'before him and worshiped Jesus. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used for “worship,”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: proskuneo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', includes three concepts: to bow, to kiss, and to pay homage (worship). All three are included here.'
    marker-yv: yv-n
  - type: text
    text: They said in adoration, “You are truly the Son of God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'After they crossed over and landed at Gennesaret, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gennesaret means “harp.” It was known as a lovely and fertile plain south of Capernaum. Lake Galilee was also called the Lake of Gennesaret.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'the people living there quickly recognized who he was. They were quick to spread the news throughout the surrounding region that Jesus had come to them. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: So they brought him all their sick, begging him to let them touch the fringe of his cloak. And everyone who touched it was instantly healed!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 9:21–22
      metadata:
        usfm: MAT.9.21+MAT.9.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 3:10
      metadata:
        usfm: MRK.3.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 6:19
      metadata:
        usfm: LUK.6.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The power of God exuding from Jesus was so incredible that merely touching his prayer shawl (or cloak) would bring instant healing. This same power is available to the church today, for Christ, the healer, lives in every believer. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 19:12
      metadata:
        usfm: ACT.19.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
