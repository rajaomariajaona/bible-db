document_id: MAT.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptizer Killed
  - type: text
    content: 'At that time Herod, '
  - type: note
    content: This was Herod Antipas, the son of Herod the Great who had the infant boys killed in Bethlehem. See Matt. 2:16. Herod Antipas was the one who Jesus stood before to be judged. See Luke 23:15.
  - type: text
    content: 'the Roman ruler over Galilee, heard reports about Jesus. '
  '10':
  - type: text
    content: 'he had John beheaded in prison. '
  '11':
  - type: text
    content: They brought in his head and displayed it to her on a platter, and she then had it shown to her mother.
  '12':
  - type: text
    content: John’s disciples went into the prison and carried his body away and buried it. Then they left to find Jesus and tell him what had happened.
  - type: heading
    content: Jesus Feeds the Multitude
  '13':
  - type: text
    content: 'On hearing this, Jesus slipped away privately by boat to be alone. But when the crowds discovered he had sailed away, they emerged from all the nearby towns and followed him on foot. '
  '14':
  - type: text
    content: So when Jesus landed he had a huge crowd waiting for him. Seeing so many people, his heart was deeply moved with compassion toward them, so he healed all the sick who were in the crowd.
  - type: note
    content: The Aramaic is “he nurtured them in love and cured their frailties.”
  '15':
  - type: text
    content: Later that afternoon the disciples came to Jesus and said, “It’s going to be dark soon and the people are hungry, but there’s nothing to eat here in this desolate place. You should send the crowds away to the nearby villages to buy themselves some food.”
  '16':
  - type: text
    content: “They don’t need to leave,”
  - type: text
    content: ' Jesus responded. '
  - type: text
    content: “You can give them something to eat.”
  '17':
  - type: text
    content: They answered, “But all we have is five barley loaves and two fish.”
  '18':
  - type: text
    content: “Let me have them,”
  - type: text
    content: ' Jesus replied. '
  '19':
  - type: text
    content: 'Then he had everyone sit down on the grass and he then took the five loaves and two fish. He looked up into heaven, gave thanks to God, and broke the bread into pieces. He then gave it to his disciples, who in turn gave it to the crowds. '
  '2':
  - type: text
    content: He told his officials, “This man has to be John the Baptizer who has come back from the dead. That’s why he has this power to work miracles.”
  - type: note
    content: The Aramaic is “This is why powers are emanating from him.” Herod believed that it was the spirit of John working through Jesus, not the Spirit of God.
  '20':
  - type: text
    content: 'And everyone ate until they were satisfied, '
  - type: text
    content: for the food was multiplied in front of their eyes
  - type: text
    content: '! '
  - type: note
    content: The miracle took place as the disciples distributed what they had. Each disciple ended up with a basket full of leftovers.
  - type: text
    content: 'They picked up the leftovers and filled up twelve baskets full! '
  '21':
  - type: text
    content: There were about five thousand men who were fed, in addition to many women and children!
  - type: heading
    content: Jesus Walks on Water
  '22':
  - type: text
    content: 'As soon as the people were fed, Jesus told his disciples to get into their boat and to go to the other side of the lake while he stayed behind to dismiss the people. '
  '23':
  - type: text
    content: After the crowds dispersed, Jesus went up into the hills to pray. And as night fell he was there praying alone.
  '24':
  - type: text
    content: But the disciples, who were now in the middle of the lake, ran into trouble, for their boat was tossed about by the high winds and heavy seas.
  '25':
  - type: text
    content: 'At about four o’clock in the morning, '
  - type: note
    content: Or “during the fourth watch of the night” (between 3:00 and 6:00 a.m.).
  - type: text
    content: 'Jesus came to them, walking on the waves! '
  '26':
  - type: text
    content: When the disciples saw him walking on top of the water, they were terrified and screamed, “A ghost!”
  '27':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Be brave and don’t be afraid. I am here!”
  - type: note
    content: Or “I AM,” which was the name of God used in Ex. 3:14.
  '28':
  - type: text
    content: Peter shouted out, “Lord, if it’s really you, then have me join you on the water!”
  '29':
  - type: text
    content: “Come and join me,”
  - type: text
    content: ' '
  - type: note
    content: Or “Go for it!”
  - type: text
    content: Jesus replied.
  - type: text
    content: 'So Peter stepped out onto the water and began to walk toward Jesus. '
  '3':
  - type: text
    content: 'For Herod had earlier arrested John for confronting him for taking the wife of his brother Philip. He had John thrown in prison and placed in chains '
  '30':
  - type: text
    content: But when he realized how high the waves were, he became frightened and started to sink. “Save me, Lord!” he cried out.
  '31':
  - type: text
    content: 'Jesus immediately stretched out his hand and lifted him up and said, '
  - type: text
    content: “What little faith you have! Why would you let doubt win?”
  '32':
  - type: text
    content: 'And the very moment they both stepped into the boat, the raging wind ceased. '
  '33':
  - type: text
    content: 'Then all the disciples bowed down '
  - type: note
    content: Jewish disciples of Jesus bowed down before him, which was an amazing act of worship (Ex. 20:4–5).
  - type: text
    content: 'before him and worshiped Jesus. '
  - type: note
    content: 'The Greek word used for “worship,” proskuneo, includes three concepts: to bow, to kiss, and to pay homage (worship). All three are included here.'
  - type: text
    content: They said in adoration, “You are truly the Son of God!”
  '34':
  - type: text
    content: 'After they crossed over and landed at Gennesaret, '
  - type: note
    content: Gennesaret means “harp.” It was known as a lovely and fertile plain south of Capernaum. Lake Galilee was also called the Lake of Gennesaret.
  '35':
  - type: text
    content: 'the people living there quickly recognized who he was. They were quick to spread the news throughout the surrounding region that Jesus had come to them. '
  '36':
  - type: text
    content: So they brought him all their sick, begging him to let them touch the fringe of his cloak. And everyone who touched it was instantly healed!
  - type: note
    content: See also Matt. 9:21–22; Mark 3:10; Luke 6:19. The power of God exuding from Jesus was so incredible that merely touching his prayer shawl (or cloak) would bring instant healing. This same power is available to the church today, for Christ, the healer, lives in every believer. See also Acts 19:12.
  '4':
  - type: text
    content: 'because John had repeatedly said to him, “It’s not legal or proper for you to be married to Herodias, your sister-in-law!” '
  - type: note
    content: Herod Antipas wanted to take his brother’s wife so he divorced his wife, a Nabatean princess, and Herodias divorced Philip so they could marry each other. This was why John confronted Herod. See Lev. 18:16.
  '5':
  - type: text
    content: So Herod wanted John dead, but he was afraid of the crowds who flocked to John because they considered him to be a prophet.
  '6':
  - type: text
    content: 'During Herod’s birthday celebration, the daughter of Herodias '
  - type: note
    content: Josephus, the Jewish historian, notes that her daughter was named Salome.
  - type: text
    content: 'danced before Herod and all his distinguished guests, which greatly pleased the king. '
  '7':
  - type: text
    content: So he said to her in front of them all, “I give you my oath, ask of me anything you wish and it will be yours!”
  '8':
  - type: text
    content: Because she had been instructed by her mother, she said, “I want the head of John the Baptizer here on a platter!”
  '9':
  - type: text
    content: 'This grieved the king, but because of his oath in front of all of his guests, '
