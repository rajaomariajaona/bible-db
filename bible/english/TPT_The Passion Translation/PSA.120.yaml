document_id: PSA.120,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Helped Me
  - type: text
    content: A song of the stairway
  - type: note
    content: Psalms 120–134 all begin with the words “A song to take you higher” or “A song of ascent” or “A song of the stairway.” It is likely these fifteen songs were sung on the fifteen steps that would take the worshiper into the temple. On each step they would stop to worship and sing the corresponding psalm as they went up ever higher into the temple to worship God. Others believe they were the songs sung as David brought up the ark of glory to Jerusalem. They are also known as “Songs of Degrees” or “Songs of Ascent.” One Hebrew manuscript titles them “Songs of the Homeward Marches.”
  - type: text
    content: I was desperate for you to help me in my struggles, and you did!
  '2':
  - type: text
    content: So come and deliver me now
  - type: text
    content: from this treachery and false accusation.
  '3':
  - type: text
    content: O lying deceivers, don’t you know what is your fate?
  '4':
  - type: text
    content: You will be pierced through with condemnation
  - type: text
    content: and consumed with burning coals of fire!
  '5':
  - type: text
    content: Why am I doomed to live as an alien,
  - type: text
    content: scattered among these cruel savages?
  - type: note
    content: The Hebrew text includes the word Meshech, which is a foreign land. The meaning of the word Meshech is “to scatter” and may refer to ancient Persia.
  - type: text
    content: Am I destined to dwell in the darkened tents of desert nomads?
  - type: note
    content: The Hebrew text includes the word Kedar, who was one of Ishmael’s sons, whose descendants became a wandering group of nomads. Kedar means “a dark place.” See Song. 1:5.
  '6':
  - type: text
    content: For too long I’ve had to live among those who hate peace.
  '7':
  - type: text
    content: I speak words of peace while they speak words of war,
  - type: text
    content: but they refuse to listen.
