    - type: usfm
      marker: ft
      children:
      - type: text
        text: all begin with the words “A song to take you higher” or “A song of ascent” or “A song of the stairway.” It is likely these fifteen songs were sung on the fifteen steps that would take the worshiper into the temple. On each step they would stop to worship and sing the corresponding psalm as they went up ever higher into the temple to worship God. Others believe they were the songs sung as David brought up the ark of glory to Jerusalem. They are also known as “Songs of Degrees” or “Songs of Ascent.” One Hebrew manuscript titles them “Songs of the Homeward Marches.”
    marker-yv: yv-n
