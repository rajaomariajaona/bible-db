  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“My decision is final,” the king answered. “If you cannot tell me what I dreamed and what it means, I will have you torn limb from limb and turn your homes into garbage dumps. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But if you can tell me what I dreamed and its interpretation, I will reward you with wonderful gifts and high honor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in my kingdom
  - type: text
    text: . So now, tell me my dream and what it means.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They again replied, “Let the king tell his dream to us his servants, and we will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gladly
  - type: text
    text: ' reveal its meaning.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the king retorted, “I know what you’re doing; you’re just stalling for time! My decision is firm. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If you do not interpret my dream for me, you will all receive the same punishment. You have conspired to continue deceiving me with your lies, hoping something will change. So, tell me now what I dreamed so that I can be assured that you are able to interpret it for me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The wise men answered the king, “There is no one on earth who could do what Your Majesty commands. Furthermore, no king great or small has ever requested such a thing of any magician, enchanter, or astrologer. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your Majesty
  - type: text
    text: ', what you ask is difficult, and it is impossible for anyone to reveal it except the gods, and they do not live with mortals.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'At this the king flew into a violent rage and ordered all the wise men of Babylon to be executed. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When the king’s decree was issued to have all the wise men killed, a search was also made for Daniel and his companions to have them put to death.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
