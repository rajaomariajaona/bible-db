        text: 2:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, it was a supernatural event, an invisible hand that caused this boulder to break away. This “boulder” is a picture of the altar of God. It, too, must not be cut by human hands (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 20:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The altar (where we meet God) becomes a mountain (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
