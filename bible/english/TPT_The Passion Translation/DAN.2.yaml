      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'It is curious that Daniel and his companions were not initially brought before Nebuchadnezzar to interpret his dream. Three reasons have been suggested: (1) They did not wish to appear to seek the rewards of the king. (2) The Babylonian wise men excluded them because of envy. (3) They had never let others know that they understood mysteries.'
    marker-yv: yv-n
