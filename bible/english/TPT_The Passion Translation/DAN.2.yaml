document_id: DAN.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar’s Troublesome Dream
  - type: text
    content: 'In the second year of his reign, '
  - type: note
    content: This was likely 604 BC.
  - type: text
    content: 'Nebuchadnezzar had an '
  - type: text
    content: ominous
  - type: text
    content: ' dream. '
  - type: note
    content: Or “dreamed dreams” (see v. 3). Supernatural dreams are a valid means of God’s communication with people. God will speak through dreams to believers and unbelievers. See Gen. 15:12; 20:3; 28:10–22; 37:5; Job 33:14–18; Matt. 1:20.
  - type: text
    content: 'It left him so disturbed that he could not sleep. '
  '10':
  - type: text
    content: 'The wise men answered the king, “There is no one on earth who could do what Your Majesty commands. Furthermore, no king great or small has ever requested such a thing of any magician, enchanter, or astrologer. '
  '11':
  - type: text
    content: Your Majesty
  - type: text
    content: ', what you ask is difficult, and it is impossible for anyone to reveal it except the gods, and they do not live with mortals.”'
  '12':
  - type: text
    content: 'At this the king flew into a violent rage and ordered all the wise men of Babylon to be executed. '
  '13':
  - type: text
    content: When the king’s decree was issued to have all the wise men killed, a search was also made for Daniel and his companions to have them put to death.
  - type: note
    content: 'It is curious that Daniel and his companions were not initially brought before Nebuchadnezzar to interpret his dream. Three reasons have been suggested: (1) They did not wish to appear to seek the rewards of the king. (2) The Babylonian wise men excluded them because of envy. (3) They had never let others know that they understood mysteries.'
  - type: heading
    content: Daniel Intervenes
  '14':
  - type: text
    content: 'As Arioch, captain of the royal bodyguard, '
  - type: note
    content: Or “chief slaughterer.”
  - type: text
    content: 'set out to execute the wise men of Babylon, Daniel cautiously and tactfully '
  - type: note
    content: Or “tastefully.”
  - type: text
    content: 'approached '
  '15':
  - type: text
    content: 'this royal official and asked him, “Why has the king issued such a harsh decree?” When Arioch explained all that had transpired, '
  '16':
  - type: text
    content: Daniel immediately went off to plead with the king for more time so that he could seek the interpretation of the king’s dream.
  - type: note
    content: Daniel’s admirable leadership skills are seen in this episode. He demonstrated the ability to keep calm under severe distress and pressure, even to the point of risking his life to spare others (see Est. 4:11). Daniel was unselfish, and he could think clearly. He exercised great faith in a moment of crisis. Truly, Daniel was one of the wisest men to ever live (see Dan. 1:17; 2:22–30).
  '17':
  - type: text
    content: 'Daniel then went home and explained everything to his friends Hananiah, Mishael, and Azariah. '
  '18':
  - type: text
    content: 'He urged them to beg the God of heaven for mercy to help them unravel the mysterious secret '
  - type: note
    content: This is the Hebrew word raz, a Persian loanword that is only found in the book of Daniel in the Dead Sea Scrolls. Its primary meaning is “profound secret.” Its Greek counterpart mysterion is found twenty-seven times in the New Testament. See Matt. 13:11; Rom. 16:25; Col. 1:26–27.
  - type: text
    content: of the king’s dream
  - type: text
    content: ' so that Daniel and his friends would not be executed with the other Babylonian wise men. '
  '19':
  - type: text
    content: That night
  - type: text
    content: ', God clearly revealed to Daniel in a night vision '
  - type: note
    content: See Job 33:15.
  - type: text
    content: 'the mystery of the dream. Then Daniel praised the God of heaven, '
  '2':
  - type: text
    content: 'So the king called for his magicians, enchanters, wizards, and wise men '
  - type: note
    content: Or “Chaldeans,” likely a general term for all who practice divination. The Babylonians were known as those who specialized in the magic arts. See “wise men” (v. 4).
  - type: text
    content: 'to tell him what he had dreamed. And they all came and stood before the '
  - type: text
    content: unsettled
  - type: text
    content: ' king. '
  '20':
  - type: text
    content: saying,
  - type: text
    content: “May the blessed name of God
  - type: text
    content: be praised forever and ever,
  - type: note
    content: See Ps. 113:2.
  - type: text
    content: for wisdom and might are his alone.
  - type: note
    content: See Job 12:13.
  '21':
  - type: text
    content: He alone controls the changes of times and seasons.
  - type: note
    content: 'Or “the times and the set times.” Or to paraphrase: “He alone has authority over time and history” or “He controls epochs and eras.” See Acts 1:7.'
  - type: text
    content: He enthrones and dethrones kings,
  - type: text
    content: he imparts wisdom to the wise,
  - type: note
    content: See 1 Kings 4:29.
  - type: text
    content: 'and he '
  - type: text
    content: pours out
  - type: text
    content: ' revelation-knowledge to those with understanding.'
  - type: note
    content: The Aramaic expression liyad‘e binah can be translated “the knowers of understanding [discernment].”
  '22':
  - type: text
    content: He alone reveals deep secrets and mysteries
  - type: note
    content: See Job 12:22.
  - type: text
    content: and knows what lies in darkness,
  - type: note
    content: The darkness is a metaphor for the unknown.
  - type: text
    content: for he radiates glory-light all around him.
  - type: note
    content: Or “light dwells along with him.” See Ex. 24:17; Ps. 104:2; Isa. 60:19–20; Ezek. 1:27; Hab. 3:4; John 8:12; 1 Tim. 6:16; James 1:17; 1 John 1:5–7. Ancient Jewish expositors taught that this verse spoke of the coming Messiah with his title of “Light.”
  '23':
  - type: text
    content: You are the God worshiped by all my ancestors;
  - type: text
    content: I give you thanks and praise,
  - type: text
    content: for you have given me wisdom and power!
  - type: text
    content: You have revealed to us the king’s dream
  - type: text
    content: and unraveled to me its meaning.”
  - type: note
    content: Or “you have now made [enabled] me to understand what we asked of you, for you have made known to us the word of the king.”
  - type: heading
    content: Daniel Interprets the King’s Dream
  '24':
  - type: text
    content: 'Then Daniel went back to see Arioch, whom the king had appointed to execute the wise men of Babylon, and said to him, “Do not kill the wise men. Take me into the king’s presence, and I will reveal the '
  - type: text
    content: dream’s
  - type: text
    content: ' meaning to the king.” '
  '25':
  - type: text
    content: 'Without wasting a moment, Arioch escorted Daniel to see the king. Arioch said to Nebuchadnezzar, “Your Majesty, I have found one of the Jewish exiles who can reveal the meaning of your '
  - type: text
    content: troublesome
  - type: text
    content: ' dream.”'
  '26':
  - type: text
    content: 'The king said to Daniel (whose '
  - type: text
    content: Babylonian
  - type: text
    content: ' name was Belteshazzar), “'
  - type: text
    content: Is this true?
  - type: text
    content: ' Can you tell me what I dreamed and what it means?”'
  '27':
  - type: text
    content: 'Daniel replied, “None of the wise men, enchanters, magicians, or astrologers are able to unveil the mystery you have asked about, '
  '28':
  - type: text
    content: 'but there is an '
  - type: text
    content: all-knowing
  - type: text
    content: ' God in heaven who reveals the deepest mysteries. Your Majesty, he is the one who has revealed to you what is to take place in the last days. Here is your dream, the vision that filled your mind as you lay in your bed:'
  '29':
  - type: text
    content: '“Your Majesty, as you were going to sleep, your thoughts turned to what would happen in the future. The Revealer of Mysteries has disclosed future events to you. '
  '3':
  - type: text
    content: He told them, “I’ve had a dream, and my heart is troubled. I want to know what my dream means.”
  '30':
  - type: text
    content: 'This mystery has been revealed to me not because I am wiser than anyone else but for one '
  - type: text
    content: divine
  - type: text
    content: ' purpose: '
  - type: note
    content: We get a glimpse of the humility of this seer, Daniel. He knew that only God reveals these mysteries for his own purposes. Compare Joseph’s words to Pharaoh (see Gen. 41:16, 25).
  - type: text
    content: so that you, the king, should learn what it means and that you would understand your innermost thoughts.
  '31':
  - type: text
    content: '“Your Majesty, you saw standing before you a huge statue of a man. It was both dazzling and terrifying to behold! '
  '32':
  - type: text
    content: 'The head of this statue was of purest gold, its chest and arms were of '
  - type: text
    content: gleaming
  - type: text
    content: ' silver, its belly and hips of '
  - type: text
    content: polished
  - type: text
    content: ' bronze, '
  '33':
  - type: text
    content: 'its legs of iron, and its feet were partly iron and partly clay. '
  - type: note
    content: That is, baked clay or pottery.
  '34':
  - type: text
    content: 'While you were staring at this statue, a boulder broke off '
  - type: text
    content: from a mountain
  - type: text
    content: ' '
  - type: note
    content: As translated from a few Hebrew and Greek manuscripts (see v. 45; see also Zech. 3:9; 4:7).
  - type: text
    content: 'but not by '
  - type: text
    content: the instrument of
  - type: text
    content: ' human hands. '
  - type: note
    content: That is, it was a supernatural event, an invisible hand that caused this boulder to break away. This “boulder” is a picture of the altar of God. It, too, must not be cut by human hands (see Ex. 20:25). The altar (where we meet God) becomes a mountain (see Dan. 2:35). This is the rock upon which Jesus builds his church (see Matt. 16:18).
  - type: text
    content: 'The boulder struck the statue at its base and shattered its feet of iron and clay into pieces. '
  '35':
  - type: text
    content: 'Then, all at once, the entire statue collapsed into a heap of rubble. The iron and clay, bronze, silver, and gold were all pulverized as fine as chaff on the summer threshing-floor. The wind blew the shattered pieces away, leaving not a trace behind. '
  - type: note
    content: Or “there was no room left for them.” See Rev. 20:11.
  - type: text
    content: 'But the boulder that hit the statue grew into a massive mountain that covered '
  - type: note
    content: The Aramaic word mela’ can also be translated “completed,” “accomplished,” “filled [to abundance],” “satisfied,” or “prospered.” This boulder that grew into a “massive mountain” is Jesus our King, who has grown into a kingdom of priests. This is the mountain of the temple of the Lord that is higher and greater than any other mountain (kingdom). It is destined to demolish the kingdoms of this world until it covers the earth with the glory of the Lord.
  - type: text
    content: 'the whole earth. '
  '36':
  - type: text
    content: 'This was your dream. And now, we '
  - type: note
    content: 'The first-person plural “we” at this point is surprising. Four different explanations have been proposed: (1) This was a royal “we” or plural of majesty, but it is unlikely that Daniel would speak a plural of majesty about himself before Nebuchadnezzar. (2) The “we” referred to Daniel and his three friends, but there is no indication that they were present with Daniel during his conversation with the king. (3) The “we” referred to Daniel and God. (4) The “we” was a form of modesty, a way of showing Daniel’s humility by avoiding the use of “I,” which may appear pretentious or boastful.'
  - type: text
    content: will explain to the king what it means.
  '37':
  - type: text
    content: '“Your Majesty, you are the greatest of kings. The God of heaven has bestowed upon you royal authority, power, might, and honor. '
  '38':
  - type: text
    content: He has handed over to you people, beasts, and birds, wherever they live, making you king of them all. You, O king, are the golden head.
  - type: note
    content: The statue’s golden head represented Nebuchadnezzar and the kingdom of Babylon (612–539 BC).
  '39':
  - type: text
    content: '“And after you '
  - type: text
    content: are gone
  - type: text
    content: ', another kingdom will arise, a kingdom not as great as yours.'
  - type: note
    content: Or literally “closer to the earth from you.” The statue’s silver chest and arms represented the kingdom of the Medes and Persians (539–331 BC). Some commentators divide this into two kingdoms, the Median and the Persian, but there never was a Median kingdom. The silver represented the Medes and Persians who ruled jointly and toppled the Babylonian Empire.
  - type: text
    content: And then a third kingdom will arise to rule the land, a kingdom of bronze.
  - type: note
    content: The statue’s belly and hips of bronze represented the kingdom of Greece (331–63 BC).
  '4':
  - type: text
    content: 'The wise men answered him in Aramaic: '
  - type: note
    content: The words “in Aramaic” are likely an editorial note added to the text. It is at this point that the text of Daniel changes from Hebrew to Aramaic and continues to the end of ch. 7. Aramaic was the lingua franca of the ancient Near East from the eighth century BC. It was the international language at the time of Daniel.
  - type: text
    content: '“May you live forever, O king! Tell your servants the dream you had, and we will '
  - type: text
    content: gladly
  - type: text
    content: ' reveal its meaning for you.”'
  '40':
  - type: text
    content: '“And there will be a fourth kingdom, strong and hard as iron. It will shatter all things in its way. Like iron that breaks everything to pieces, it will crush and break all the other '
  - type: text
    content: kingdoms
  - type: text
    content: .
  - type: note
    content: The statue’s legs of iron represented the kingdom of Rome (63 BC–AD 476).
  '41':
  - type: text
    content: '“The feet and toes you saw, partly of iron and partly of clay, represent a divided kingdom that will retain some of the iron’s strength, just as you saw the iron and the clay mixed together. '
  '42':
  - type: text
    content: 'That its feet and toes were partly iron and partly clay '
  - type: note
    content: The statue’s feet and toes of iron mixed with clay represented the divided nations (AD 476–present).
  - type: text
    content: 'means that this kingdom will be both strong and fragile. '
  '43':
  - type: text
    content: 'And just as you saw the iron and the clay mingled together, so the people of this kingdom will seek to be united, '
  - type: note
    content: Or “they will mix themselves with the seed of men,” a possible reference to attempting to join together by marriage between opposing tribes or nations. This was probably a reference to the intermarriage of the Seleucids and the Ptolemies in 194 BC.
  - type: text
    content: but they will not bond any more than iron will permanently bond with clay.
  '44':
  - type: text
    content: '“In the days of those kings '
  - type: text
    content: of iron and clay
  - type: text
    content: ', the God of heaven will set up an eternal kingdom that will never be destroyed nor ruled by other people. '
  - type: note
    content: Or “be left to another people [or other kingdoms].”
  - type: text
    content: 'It will shatter and bring all other kingdoms to an end, and it will stand forever! '
  '45':
  - type: text
    content: 'This is the meaning of what you saw in your vision: a rock cut out of a mountain—but not by human hands—a rock that shattered the iron, the bronze, the clay, the silver, and the gold to pieces '
  - type: text
    content: is his eternal kingdom
  - type: text
    content: '. The Great God has revealed to '
  - type: text
    content: you
  - type: text
    content: ', the king, what will take place after this. The dream is true, and its interpretation trustworthy.”'
  - type: heading
    content: The King Honors Daniel
  '46':
  - type: text
    content: 'Then King Nebuchadnezzar bowed low to the ground in awe '
  - type: note
    content: The Aramaic word carries the idea of the humility of one who bows before one greater, to show his submission and obedience.
  - type: text
    content: 'of Daniel. Then he gave orders for incense to be burned and a sacrifice of grain to be offered in Daniel’s honor. '
  '47':
  - type: text
    content: 'The king said to Daniel, “Your god is without question the God of all gods, the Master of all kings, and the Revealer of all mysteries since '
  - type: text
    content: he
  - type: text
    content: ' has given you the revelation of this mystery.”'
  '48':
  - type: text
    content: 'Then the king promoted Daniel and made him great '
  - type: text
    content: in the kingdom and
  - type: text
    content: ' gave him many wonderful gifts. He also made him ruler over the whole province of Babylon and the chief of all the wise men of Babylon. '
  '49':
  - type: text
    content: 'At Daniel’s request, the king delegated the affairs of the province of Babylon to '
  - type: text
    content: his friends
  - type: text
    content: ' Shadrach, Meshach, and Abednego. Daniel remained in the king’s palace.'
  - type: note
    content: Or literally “at the king’s door.” Daniel was not present for the events of ch. 3.
  '5':
  - type: text
    content: '“My decision is final,” the king answered. “If you cannot tell me what I dreamed and what it means, I will have you torn limb from limb and turn your homes into garbage dumps. '
  '6':
  - type: text
    content: 'But if you can tell me what I dreamed and its interpretation, I will reward you with wonderful gifts and high honor '
  - type: text
    content: in my kingdom
  - type: text
    content: . So now, tell me my dream and what it means.”
  '7':
  - type: text
    content: 'They again replied, “Let the king tell his dream to us his servants, and we will '
  - type: text
    content: gladly
  - type: text
    content: ' reveal its meaning.”'
  '8':
  - type: text
    content: 'But the king retorted, “I know what you’re doing; you’re just stalling for time! My decision is firm. '
  '9':
  - type: text
    content: If you do not interpret my dream for me, you will all receive the same punishment. You have conspired to continue deceiving me with your lies, hoping something will change. So, tell me now what I dreamed so that I can be assured that you are able to interpret it for me.”
