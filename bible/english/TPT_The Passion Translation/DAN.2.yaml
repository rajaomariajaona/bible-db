    - type: text
      text: kingdoms
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The statue’s legs of iron represented the kingdom of Rome (63 BC–AD 476).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '“The feet and toes you saw, partly of iron and partly of clay, represent a divided kingdom that will retain some of the iron’s strength, just as you saw the iron and the clay mixed together. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'That its feet and toes were partly iron and partly clay '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The statue’s feet and toes of iron mixed with clay represented the divided nations (AD 476–present).
    marker-yv: yv-n
  - type: text
    text: 'means that this kingdom will be both strong and fragile. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'And just as you saw the iron and the clay mingled together, so the people of this kingdom will seek to be united, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “they will mix themselves with the seed of men,” a possible reference to attempting to join together by marriage between opposing tribes or nations. This was probably a reference to the intermarriage of the Seleucids and the Ptolemies in 194 BC.
    marker-yv: yv-n
  - type: text
    text: but they will not bond any more than iron will permanently bond with clay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '“In the days of those kings '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of iron and clay
  - type: text
    text: ', the God of heaven will set up an eternal kingdom that will never be destroyed nor ruled by other people. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “be left to another people [or other kingdoms].”
    marker-yv: yv-n
  - type: text
    text: 'It will shatter and bring all other kingdoms to an end, and it will stand forever! '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'This is the meaning of what you saw in your vision: a rock cut out of a mountain—but not by human hands—a rock that shattered the iron, the bronze, the clay, the silver, and the gold to pieces '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is his eternal kingdom
  - type: text
    text: '. The Great God has revealed to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: you
  - type: text
    text: ', the king, what will take place after this. The dream is true, and its interpretation trustworthy.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The King Honors Daniel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then King Nebuchadnezzar bowed low to the ground in awe '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word carries the idea of the humility of one who bows before one greater, to show his submission and obedience.
    marker-yv: yv-n
  - type: text
    text: 'of Daniel. Then he gave orders for incense to be burned and a sacrifice of grain to be offered in Daniel’s honor. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'The king said to Daniel, “Your god is without question the God of all gods, the Master of all kings, and the Revealer of all mysteries since '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he
  - type: text
    text: ' has given you the revelation of this mystery.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Then the king promoted Daniel and made him great '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the kingdom and
  - type: text
    text: ' gave him many wonderful gifts. He also made him ruler over the whole province of Babylon and the chief of all the wise men of Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'At Daniel’s request, the king delegated the affairs of the province of Babylon to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his friends
  - type: text
    text: ' Shadrach, Meshach, and Abednego. Daniel remained in the king’s palace.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “at the king’s door.” Daniel was not present for the events of ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: DAN.3
    - type: usfm
      marker: ft
      children:
