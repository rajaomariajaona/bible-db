        text: ).
    marker-yv: yv-n
  - type: text
    text: so that you, the king, should learn what it means and that you would understand your innermost thoughts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Your Majesty, you saw standing before you a huge statue of a man. It was both dazzling and terrifying to behold! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
