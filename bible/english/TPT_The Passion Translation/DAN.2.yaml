  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then Daniel went back to see Arioch, whom the king had appointed to execute the wise men of Babylon, and said to him, “Do not kill the wise men. Take me into the king’s presence, and I will reveal the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dream’s
  - type: text
    text: ' meaning to the king.” '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Without wasting a moment, Arioch escorted Daniel to see the king. Arioch said to Nebuchadnezzar, “Your Majesty, I have found one of the Jewish exiles who can reveal the meaning of your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: troublesome
  - type: text
    text: ' dream.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The king said to Daniel (whose '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Babylonian
  - type: text
    text: ' name was Belteshazzar), “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Is this true?
  - type: text
    text: ' Can you tell me what I dreamed and what it means?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Daniel replied, “None of the wise men, enchanters, magicians, or astrologers are able to unveil the mystery you have asked about, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'but there is an '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all-knowing
  - type: text
    text: ' God in heaven who reveals the deepest mysteries. Your Majesty, he is the one who has revealed to you what is to take place in the last days. Here is your dream, the vision that filled your mind as you lay in your bed:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Your Majesty, as you were going to sleep, your thoughts turned to what would happen in the future. The Revealer of Mysteries has disclosed future events to you. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'This mystery has been revealed to me not because I am wiser than anyone else but for one '
  - type: usfm
    marker: it
    children:
    - type: text
      text: divine
  - type: text
    text: ' purpose: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We get a glimpse of the humility of this seer, Daniel. He knew that only God reveals these mysteries for his own purposes. Compare Joseph’s words to Pharaoh (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
