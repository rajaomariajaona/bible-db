      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'The boulder struck the statue at its base and shattered its feet of iron and clay into pieces. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then, all at once, the entire statue collapsed into a heap of rubble. The iron and clay, bronze, silver, and gold were all pulverized as fine as chaff on the summer threshing-floor. The wind blew the shattered pieces away, leaving not a trace behind. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “there was no room left for them.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
