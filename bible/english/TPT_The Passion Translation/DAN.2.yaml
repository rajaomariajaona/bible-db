    children:
    - type: text
      text: '34'
  - type: text
    text: 'While you were staring at this statue, a boulder broke off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from a mountain
  - type: text
    text: ' '
  - type: usfm
