  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '“And there will be a fourth kingdom, strong and hard as iron. It will shatter all things in its way. Like iron that breaks everything to pieces, it will crush and break all the other '
  - type: usfm
