      metadata:
        usfm: REV.20.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'But the boulder that hit the statue grew into a massive mountain that covered '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mela’
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can also be translated “completed,” “accomplished,” “filled [to abundance],” “satisfied,” or “prospered.” This boulder that grew into a “massive mountain” is Jesus our King, who has grown into a kingdom of priests. This is the mountain of the temple of the Lord that is higher and greater than any other mountain (kingdom). It is destined to demolish the kingdoms of this world until it covers the earth with the glory of the Lord.
    marker-yv: yv-n
  - type: text
    text: 'the whole earth. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'This was your dream. And now, we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The first-person plural “we” at this point is surprising. Four different explanations have been proposed: (1) This was a royal “we” or plural of majesty, but it is unlikely that Daniel would speak a plural of majesty about himself before Nebuchadnezzar. (2) The “we” referred to Daniel and his three friends, but there is no indication that they were present with Daniel during his conversation with the king. (3) The “we” referred to Daniel and God. (4) The “we” was a form of modesty, a way of showing Daniel’s humility by avoiding the use of “I,” which may appear pretentious or boastful.'
    marker-yv: yv-n
  - type: text
    text: will explain to the king what it means.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“Your Majesty, you are the greatest of kings. The God of heaven has bestowed upon you royal authority, power, might, and honor. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: He has handed over to you people, beasts, and birds, wherever they live, making you king of them all. You, O king, are the golden head.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The statue’s golden head represented Nebuchadnezzar and the kingdom of Babylon (612–539 BC).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '“And after you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: are gone
  - type: text
    text: ', another kingdom will arise, a kingdom not as great as yours.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “closer to the earth from you.” The statue’s silver chest and arms represented the kingdom of the Medes and Persians (539–331 BC). Some commentators divide this into two kingdoms, the Median and the Persian, but there never was a Median kingdom. The silver represented the Medes and Persians who ruled jointly and toppled the Babylonian Empire.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: And then a third kingdom will arise to rule the land, a kingdom of bronze.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The statue’s belly and hips of bronze represented the kingdom of Greece (331–63 BC).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
