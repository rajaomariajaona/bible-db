  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You will have the light shining with you for only a little while longer. While you still have me, walk in the light, so that the darkness doesn’t overtake you. For when you walk in the dark you have no idea where you’re going.
  - type: text
