  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Six days before the Passover began, Jesus went back to Bethany, the town where he raised Lazarus from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They had prepared a supper for Jesus. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We see from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 14:3
      metadata:
        usfm: MRK.14.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that this took place at the house of Simon, the leper Jesus had healed.
    marker-yv: yv-n
  - type: text
    text: 'Martha served, and Lazarus and Mary were among those at the table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mary picked up an alabaster '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'jar filled with nearly a liter '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “nearly a pound.”
    marker-yv: yv-n
  - type: text
    text: 'of extremely rare and costly perfume—the purest extract of nard, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nard is an extremely expensive perfume taken from the root and spike of the nard plant found in northern India. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 1:12
      metadata:
        usfm: SNG.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:13–14
      metadata:
        usfm: SNG.4.13+SNG.4.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and she anointed Jesus’ feet. Then she wiped them dry with her long hair. And the fragrance of the costly oil filled the house. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This fragrance, usually associated with a king, was upon Jesus’ feet as he stood before his accusers and as the soldiers pierced his feet with a nail. It is possible they would all have smelled the fragrance of this costly perfume.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But Judas the locksmith, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Iscariot,” a word related linguistically to “a lock” or “locksmith.” Judas apparently held the key to the lockbox of funds to support Jesus’ ministry. See ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 6:71
      metadata:
        usfm: JHN.6.71
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
  - type: text
    text: 'Simon’s son, the betrayer, spoke up and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“What a waste! We could have sold this perfume for a fortune '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “three hundred silver coins (denarii),” which would be equal to a year’s salary.
    marker-yv: yv-n
  - type: text
    text: and given the money to the poor!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '(In fact, Judas had no heart for the poor. He only said this because he was a thief and in charge of the money case. He would steal money whenever he wanted from the funds '
  - type: usfm
    marker: it
    children:
    - type: text
      text: given to support Jesus’ ministry
  - type: text
    text: .)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus said to Judas, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Leave her alone! She has saved it for the time of my burial.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic could be translated “Let her conduct my burial day ceremony.” It is possible that this rare and expensive perfume could have been her family’s treasure or her inheritance.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You’ll always have the poor with you;
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, “You will have many opportunities to help the poor, but you will not always have me.” See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 15:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but you won’t always have me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the word got out that Jesus was not far from Jerusalem, a large crowd came out to see him, and they also wanted to see Lazarus, the man Jesus had raised from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'This prompted the chief priests to seal their plans to do away with both Jesus and Lazarus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Darkness has only one way to deal with the truth—kill it.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: for his miracle testimony was irrefutable and was persuading many of the Jews living in Jerusalem to believe in Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The next day the news that Jesus was on his way to Jerusalem swept through the massive crowd gathered for the feast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So they took palm branches '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The palm tree is a symbol of triumph, victory over death. Palms grow in the desert and overcome the arid climate. Deborah sat under a palm tree as a judge in Israel and received the strategy to overcome her enemies. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 7:9
      metadata:
        usfm: REV.7.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and went out to meet him. Everyone was shouting, “Lord, be our Savior! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Hosanna!”
    marker-yv: yv-n
  - type: text
    text: 'Blessed is the one who comes to us sent from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 118:25–26
      metadata:
        usfm: PSA.118.25+PSA.118.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: the King of Israel!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Jesus found a young donkey and rode on it to fulfill what was prophesied: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“People of Zion, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Daughter of Zion.”
    marker-yv: yv-n
  - type: text
    text: have no fear! Look—it’s your king coming to you riding on a young donkey!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 9:9
      metadata:
        usfm: ZEC.9.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Conquering kings would ride on a warhorse or in a golden chariot, but Jesus rode into Jerusalem on a domesticated donkey. He is the King of Peace.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Now Jesus’ disciples didn’t fully understand the importance of what was taking place, but after he was raised and exalted into glory, they understood how Jesus fulfilled all the prophecies in the Scriptures that were written about him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All the eyewitnesses of the miracle Jesus performed when he called Lazarus out of the tomb and raised him from the dead kept spreading the news about Jesus to everyone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The news of this miracle of resurrection caused the crowds to swell as great numbers of people '
  - type: usfm
    marker: it
    children:
    - type: text
      text: welcomed him into the city with joy
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is “the crowd went out to meet him.” The Aramaic is “great crowds went in front of him.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But the Pharisees were disturbed by this and said to each other, “We won’t be able to stop this. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “See, you have lost your influence.”
    marker-yv: yv-n
  - type: text
    text: The whole world is going to run after him!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: True Seekers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now there were a number of foreigners from among the nations who were worshipers at the feast. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text states they were “Greeks.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They went to Philip (who came from the village of Bethsaida in Galilee) and they asked him, “Would you take us to see Jesus? We want to see him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So Philip went to find Andrew, and then they both went to inform Jesus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 55:5
      metadata:
        usfm: ISA.55.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He replied to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now is the time for the Son of Man to be glorified.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Let me make this clear:'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is translated “Timeless truth I say to you.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A single grain of wheat will never be more than a single grain of wheat unless it drops into the ground and dies. Because then it sprouts and produces
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic has an interesting word play with “it dies” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: myta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and “it produces” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: mytya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: a great harvest of wheat—all because one grain
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “one grain” is Jesus Christ, who will within days be offered as the sacrifice for sin on Calvary’s cross. He will “drop” into the ground as “a grain of wheat” and bring forth a great “harvest” of “seeds.” This parable given to Philip and Andrew was meant to be Jesus’ reply to the request by the non-Jewish seekers to see Jesus. Christ’s answer? “They will see me through you. As you follow me, you will also experience the dying and birthing experience.” The harvest among the nations will come when we follow Jesus where he goes.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: died.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is translated “if it dies, it will bring forth a great rebirth.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The person who loves his life and pampers himself will miss true life! But the one who detaches his life from this world and abandons himself to me, will find true life and enjoy it forever!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you want to be my disciple, follow me and you will go where I am going.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication in the text is that a life of full surrender to God will make us “a grain of wheat” that multiplies into a “harvest.” The Greek text can be translated “If anyone ministers to me (materially provides for me), where I am, my minister will be there too.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if you truly follow me as my disciple,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “materially provides for me.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the Father will shower his favor upon your life.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Even though I am torn within, and my soul is in turmoil, I will not ask the Father to rescue me from this hour of trial. For I have come to fulfill my purpose
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is translated “to fulfill this hour I have come.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: —
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: to offer myself to God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So, Father, bring glory to your name!”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some later manuscripts have “Father, bring glory to your Son.” One of the oldest manuscripts reads “Father, bring glory to your name with the glory that I had with you before the world was created.” The majority of reliable manuscripts have “Father, bring glory to your name.”
    marker-yv: yv-n
  - type: text
    text: Then suddenly a booming voice was heard from the sky,
- type: usfm
  marker: mi
  children:
  - type: text
    text: '“I have glorified my name! And I will glorify it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: through you
  - type: text
    text: ' again!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The audible voice of God startled the crowd standing nearby. Some thought it was only thunder, yet others said, “An angel just spoke to him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Then Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The voice you heard was not for my benefit, but for yours—
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: to help you believe.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: From this moment on, everything in this world is about to change,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the time of judging the world (system) has come.” The judging of the world is the overthrow of the kingdom of darkness. The preaching of the gospel of Jesus Christ is passing a sentence of judgment on this fallen world and declaring treason in the kingdom of darkness. Everything changes because of the cross—the hinge of history.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for the ruler of this dark world
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An obvious reference to Satan.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will be overthrown.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “driven into exile.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And I will do this
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: when I am lifted up off the ground
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic phrase “lifted up” is another way of saying “lifted up in crucifixion.” The Greek implies being lifted up from beneath the earth (resurrection).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and when I draw the hearts of people
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will draw all things to myself” or “I will bundle everyone/everything next to me.” Jesus also drew all our judgment to himself when he died for our sins. The Judge became the payment for the guilty.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to gather them to me.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He said this to indicate that he would die by being lifted up on the cross.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to clarify what kind of death he would die.”
    marker-yv: yv-n
