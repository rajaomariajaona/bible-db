document_id: JHN.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Mary Anoints Jesus
  - type: text
    content: 'Six days before the Passover began, Jesus went back to Bethany, the town where he raised Lazarus from the dead. '
  '10':
  - type: text
    content: 'This prompted the chief priests to seal their plans to do away with both Jesus and Lazarus, '
  - type: note
    content: Darkness has only one way to deal with the truth—kill it.
  '11':
  - type: text
    content: for his miracle testimony was irrefutable and was persuading many of the Jews living in Jerusalem to believe in Jesus.
  '12':
  - type: text
    content: 'The next day the news that Jesus was on his way to Jerusalem swept through the massive crowd gathered for the feast. '
  '13':
  - type: text
    content: 'So they took palm branches '
  - type: note
    content: The palm tree is a symbol of triumph, victory over death. Palms grow in the desert and overcome the arid climate. Deborah sat under a palm tree as a judge in Israel and received the strategy to overcome her enemies. See Rev. 7:9.
  - type: text
    content: 'and went out to meet him. Everyone was shouting, “Lord, be our Savior! '
  - type: note
    content: Or “Hosanna!”
  - type: text
    content: 'Blessed is the one who comes to us sent from '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: See Ps. 118:25–26.
  - type: text
    content: the King of Israel!”
  '14':
  - type: text
    content: 'Then Jesus found a young donkey and rode on it to fulfill what was prophesied: '
  '15':
  - type: text
    content: '“People of Zion, '
  - type: note
    content: Or “Daughter of Zion.”
  - type: text
    content: have no fear! Look—it’s your king coming to you riding on a young donkey!”
  - type: note
    content: See Zech. 9:9. Conquering kings would ride on a warhorse or in a golden chariot, but Jesus rode into Jerusalem on a domesticated donkey. He is the King of Peace.
  '16':
  - type: text
    content: Now Jesus’ disciples didn’t fully understand the importance of what was taking place, but after he was raised and exalted into glory, they understood how Jesus fulfilled all the prophecies in the Scriptures that were written about him.
  '17':
  - type: text
    content: 'All the eyewitnesses of the miracle Jesus performed when he called Lazarus out of the tomb and raised him from the dead kept spreading the news about Jesus to everyone. '
  '18':
  - type: text
    content: 'The news of this miracle of resurrection caused the crowds to swell as great numbers of people '
  - type: text
    content: welcomed him into the city with joy
  - type: text
    content: '. '
  - type: note
    content: The Greek is “the crowd went out to meet him.” The Aramaic is “great crowds went in front of him.”
  '19':
  - type: text
    content: 'But the Pharisees were disturbed by this and said to each other, “We won’t be able to stop this. '
  - type: note
    content: The Aramaic is “See, you have lost your influence.”
  - type: text
    content: The whole world is going to run after him!”
  - type: heading
    content: True Seekers
  '2':
  - type: text
    content: 'They had prepared a supper for Jesus. '
  - type: note
    content: We see from Mark 14:3 that this took place at the house of Simon, the leper Jesus had healed.
  - type: text
    content: 'Martha served, and Lazarus and Mary were among those at the table. '
  '20':
  - type: text
    content: 'Now there were a number of foreigners from among the nations who were worshipers at the feast. '
  - type: note
    content: As translated from the Aramaic. The Greek text states they were “Greeks.”
  '21':
  - type: text
    content: 'They went to Philip (who came from the village of Bethsaida in Galilee) and they asked him, “Would you take us to see Jesus? We want to see him.” '
  '22':
  - type: text
    content: So Philip went to find Andrew, and then they both went to inform Jesus.
  - type: note
    content: See Isa. 55:5.
  '23':
  - type: text
    content: 'He replied to them, '
  - type: text
    content: “Now is the time for the Son of Man to be glorified.
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Let me make this clear:'
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is translated “Timeless truth I say to you.”
  - type: text
    content: A single grain of wheat will never be more than a single grain of wheat unless it drops into the ground and dies. Because then it sprouts and produces
  - type: text
    content: ' '
  - type: note
    content: The Aramaic has an interesting word play with “it dies” (myta) and “it produces” (mytya).
  - type: text
    content: a great harvest of wheat—all because one grain
  - type: text
    content: ' '
  - type: note
    content: The “one grain” is Jesus Christ, who will within days be offered as the sacrifice for sin on Calvary’s cross. He will “drop” into the ground as “a grain of wheat” and bring forth a great “harvest” of “seeds.” This parable given to Philip and Andrew was meant to be Jesus’ reply to the request by the non-Jewish seekers to see Jesus. Christ’s answer? “They will see me through you. As you follow me, you will also experience the dying and birthing experience.” The harvest among the nations will come when we follow Jesus where he goes.
  - type: text
    content: died.
  - type: note
    content: The Aramaic is translated “if it dies, it will bring forth a great rebirth.”
  '25':
  - type: text
    content: “The person who loves his life and pampers himself will miss true life! But the one who detaches his life from this world and abandons himself to me, will find true life and enjoy it forever!
  - type: text
    content: ' '
  '26':
  - type: text
    content: If you want to be my disciple, follow me and you will go where I am going.
  - type: text
    content: ' '
  - type: note
    content: The implication in the text is that a life of full surrender to God will make us “a grain of wheat” that multiplies into a “harvest.” The Greek text can be translated “If anyone ministers to me (materially provides for me), where I am, my minister will be there too.”
  - type: text
    content: And if you truly follow me as my disciple,
  - type: text
    content: ' '
  - type: note
    content: Or “materially provides for me.”
  - type: text
    content: the Father will shower his favor upon your life.
  '27':
  - type: text
    content: “Even though I am torn within, and my soul is in turmoil, I will not ask the Father to rescue me from this hour of trial. For I have come to fulfill my purpose
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is translated “to fulfill this hour I have come.”
  - type: text
    content: —
  - type: text
    content: to offer myself to God.
  - type: text
    content: ' '
  '28':
  - type: text
    content: So, Father, bring glory to your name!”
  - type: text
    content: ' '
  - type: note
    content: Some later manuscripts have “Father, bring glory to your Son.” One of the oldest manuscripts reads “Father, bring glory to your name with the glory that I had with you before the world was created.” The majority of reliable manuscripts have “Father, bring glory to your name.”
  - type: text
    content: Then suddenly a booming voice was heard from the sky,
  - type: text
    content: '“I have glorified my name! And I will glorify it '
  - type: text
    content: through you
  - type: text
    content: ' again!”'
  '29':
  - type: text
    content: The audible voice of God startled the crowd standing nearby. Some thought it was only thunder, yet others said, “An angel just spoke to him!”
  '3':
  - type: text
    content: 'Mary picked up an alabaster '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'jar filled with nearly a liter '
  - type: note
    content: Or “nearly a pound.”
  - type: text
    content: 'of extremely rare and costly perfume—the purest extract of nard, '
  - type: note
    content: Nard is an extremely expensive perfume taken from the root and spike of the nard plant found in northern India. See Song. 1:12; 4:13–14.
  - type: text
    content: 'and she anointed Jesus’ feet. Then she wiped them dry with her long hair. And the fragrance of the costly oil filled the house. '
  - type: note
    content: This fragrance, usually associated with a king, was upon Jesus’ feet as he stood before his accusers and as the soldiers pierced his feet with a nail. It is possible they would all have smelled the fragrance of this costly perfume.
  '30':
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: “The voice you heard was not for my benefit, but for yours—
  - type: text
    content: to help you believe.
  - type: text
    content: ' '
  '31':
  - type: text
    content: From this moment on, everything in this world is about to change,
  - type: text
    content: ' '
  - type: note
    content: Or “the time of judging the world (system) has come.” The judging of the world is the overthrow of the kingdom of darkness. The preaching of the gospel of Jesus Christ is passing a sentence of judgment on this fallen world and declaring treason in the kingdom of darkness. Everything changes because of the cross—the hinge of history.
  - type: text
    content: for the ruler of this dark world
  - type: text
    content: ' '
  - type: note
    content: An obvious reference to Satan.
  - type: text
    content: will be overthrown.
  - type: text
    content: ' '
  - type: note
    content: Or “driven into exile.”
  '32':
  - type: text
    content: And I will do this
  - type: text
    content: ' '
  - type: text
    content: when I am lifted up off the ground
  - type: text
    content: ' '
  - type: note
    content: The Aramaic phrase “lifted up” is another way of saying “lifted up in crucifixion.” The Greek implies being lifted up from beneath the earth (resurrection).
  - type: text
    content: and when I draw the hearts of people
  - type: text
    content: ' '
  - type: note
    content: Or “I will draw all things to myself” or “I will bundle everyone/everything next to me.” Jesus also drew all our judgment to himself when he died for our sins. The Judge became the payment for the guilty.
  - type: text
    content: to gather them to me.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: He said this to indicate that he would die by being lifted up on the cross.
  - type: note
    content: Or “to clarify what kind of death he would die.”
  '34':
  - type: text
    content: 'People from the crowd spoke up and said, “Die? How could the Anointed One die? The Word of God says that the Anointed One will live with us forever, '
  - type: note
    content: See Ps. 89:35–37; Isa. 9:7; Ezek. 37:25; Dan. 7:14.
  - type: text
    content: 'but you just said that the Son of Man must be lifted up from the earth. '
  - type: note
    content: It was obvious to the crowd that Jesus being lifted up was a reference to the cross.
  - type: text
    content: And who is this Son of Man anyway?”
  '35':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You will have the light shining with you for only a little while longer. While you still have me, walk in the light, so that the darkness doesn’t overtake you. For when you walk in the dark you have no idea where you’re going.
  - type: text
    content: ' '
  '36':
  - type: text
    content: So believe and cling to the light while I am with you, so that you will become children of light.”
  - type: text
    content: ' After saying this, Jesus then entered into the crowd and hid himself from them.'
  - type: heading
    content: The Unbelief of the Crowd
  '37':
  - type: text
    content: 'Even with the overwhelming evidence of all the many signs and wonders that Jesus had performed in front of them, his critics still refused to believe. '
  '38':
  - type: text
    content: 'This fulfilled the prophecy given by Isaiah:'
  - type: text
    content: Lord, who has believed our message? Who has seen the unveiling of your great power?
  - type: note
    content: Or “To whom is the arm of the Lord revealed.” The arm of the Lord is a metaphor for God’s great power. The word for “revealed” means “to unveil.” See Isa. 53:1.
  '39':
  - type: text
    content: 'And the people were not able to believe, for Isaiah also prophesied:'
  '4':
  - type: text
    content: 'But Judas the locksmith, '
  - type: note
    content: Or “Iscariot,” a word related linguistically to “a lock” or “locksmith.” Judas apparently held the key to the lockbox of funds to support Jesus’ ministry. See ch. 6:71 and footnote.
  - type: text
    content: 'Simon’s son, the betrayer, spoke up and said, '
  '40':
  - type: text
    content: 'God has blinded their eyes and hardened their hearts '
  - type: note
    content: Or “closed their minds.” The Aramaic is translated “darkened their hearts.” The Aramaic indicates that they did this to themselves, rather than God doing this.
  - type: text
    content: to the truth. So with their eyes and hearts closed they cannot understand the truth nor turn to me so that I could instantly cleanse and heal them.
  - type: note
    content: The Aramaic is translated “cleansed”; the Greek is translated “healed.” Both are included here. See Isa. 6:10.
  '41':
  - type: text
    content: 'Isaiah said these things because he had seen and experienced the splendor of Jesus '
  - type: note
    content: See Isa. 6:1–5. This is a profound statement that Isaiah saw Jesus Christ when he was taken into heaven and encountered the Lord Yahweh on the throne. This “Lord high and exalted” was none less than Jesus Christ before he became a man.
  - type: text
    content: 'and prophesied about him. '
  '42':
  - type: text
    content: 'Yet there were many Jewish leaders who believed in Jesus, but because they feared the Pharisees they kept it secret, so they wouldn’t be ostracized by the assembly of the Jews. '
  '43':
  - type: text
    content: For they loved the glory that men could give them rather than the glory that came from God!
  - type: heading
    content: Jesus’ Last Public Teaching
  '44':
  - type: text
    content: 'Jesus shouted out passionately, '
  - type: text
    content: “To believe in me is to also believe in God who sent me.
  - type: text
    content: ' '
  '45':
  - type: text
    content: For when you look at me you are seeing the One who sent me.
  - type: text
    content: ' '
  '46':
  - type: text
    content: I have come as a light to shine in this dark world so that all who trust in me will no longer wander in darkness.
  - type: text
    content: ' '
  '47':
  - type: text
    content: If you hear my words and refuse to follow them, I do not judge you. For I have not come to judge you but to save you.
  - type: text
    content: ' '
  '48':
  - type: text
    content: If you reject me and refuse to follow my words,
  - type: text
    content: ' '
  - type: note
    content: This is the plural form of the Greek word rhema and would refer to all that Jesus taught.
  - type: text
    content: you already have a judge. The message of truth I have given you will rise up to judge you at the Day of Judgment.
  - type: text
    content: ' '
  - type: note
    content: Or “at the last day.”
  '49':
  - type: text
    content: For I’m not speaking as someone who is self-appointed, but I speak by the authority of the Father himself who sent me, and who instructed me what to say.
  - type: text
    content: ' '
  '5':
  - type: text
    content: '“What a waste! We could have sold this perfume for a fortune '
  - type: note
    content: Or “three hundred silver coins (denarii),” which would be equal to a year’s salary.
  - type: text
    content: and given the money to the poor!”
  '50':
  - type: text
    content: And I know that the Father’s commands result
  - type: text
    content: ' '
  - type: note
    content: Or in the Aramaic “represent.”
  - type: text
    content: in eternal life, and that’s why I speak the very words I’ve heard him speak.”
  '6':
  - type: text
    content: '(In fact, Judas had no heart for the poor. He only said this because he was a thief and in charge of the money case. He would steal money whenever he wanted from the funds '
  - type: text
    content: given to support Jesus’ ministry
  - type: text
    content: .)
  '7':
  - type: text
    content: 'Jesus said to Judas, '
  - type: text
    content: “Leave her alone! She has saved it for the time of my burial.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic could be translated “Let her conduct my burial day ceremony.” It is possible that this rare and expensive perfume could have been her family’s treasure or her inheritance.
  '8':
  - type: text
    content: You’ll always have the poor with you;
  - type: text
    content: ' '
  - type: note
    content: That is, “You will have many opportunities to help the poor, but you will not always have me.” See also Deut. 15:11.
  - type: text
    content: but you won’t always have me.”
  '9':
  - type: text
    content: 'When the word got out that Jesus was not far from Jerusalem, a large crowd came out to see him, and they also wanted to see Lazarus, the man Jesus had raised from the dead. '
