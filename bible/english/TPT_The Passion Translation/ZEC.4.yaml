document_id: ZEC.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Fifth Vision: The Lampstand and Two Olive Trees'
  - type: text
    content: 'Then the angel who had been explaining '
  - type: text
    content: the visions
  - type: text
    content: ' came back and roused me as someone awakened from sleep. '
  '10':
  - type: text
    content: '“Those who despise the day of small beginnings will rejoice when they see Zerubbabel holding the plumb line '
  - type: note
    content: There is a play on words in the Hebrew that is lost in translation. The Hebrew word for “plumb line” can also be translated “chosen stone.” See 3:9.
  - type: text
    content: in his hands.
  - type: text
    content: '“The seven '
  - type: text
    content: lamps
  - type: text
    content: ' represent the seven eyes of '
  - type: text
    content: Yahweh
  - type: text
    content: ' that keep a close watch over everything on earth.”'
  - type: note
    content: See 2 Chron. 16:9; Prov. 15:3.
  '11':
  - type: text
    content: 'Then I asked the angel '
  - type: text
    content: two questions
  - type: text
    content: ': “What about these two olive trees on each side of the lampstand? '
  '12':
  - type: text
    content: 'And what are the two branches from which golden oil '
  - type: note
    content: The Hebrew word for “oil” is the same as the Hebrew word for “gold.” This is likely a metonymy for the color of the oil.
  - type: text
    content: flows through the two golden pipes?”
  '13':
  - type: text
    content: He replied, “Don’t you know what these are?”
  - type: text
    content: “No, my lord,” I answered.
  '14':
  - type: text
    content: 'So he explained, “These branches are the two sons of oil '
  - type: note
    content: The two “sons of oil” point to Joshua (the priest, holding spiritual authority) and Zerubbabel (the governor, holding civil authority). Both kings and priests were anointed with oil as a symbol that they were being set apart by the Holy Spirit to fulfill God’s purposes. They represent the joining of the priestly and kingly anointing. Symbolically, the sons of oil can represent the Word (truth) and the Spirit (power). See Rev. 11:4. In a sense, every believer today should be a “son of oil,” filled, refreshed, and full of life (see Ps. 92:10). Jesus taught a parable of the wise and foolish virgins (see Matt. 25:1–13), in which the wise virgins had fresh oil to supply their lamps when the bridegroom arrived so they would be ready to go meet him. They were the daughters of oil.
  - type: text
    content: who serve the Lord of all the earth.”
  '2':
  - type: text
    content: And he asked me, “What do you see?”
  - type: text
    content: 'As I focused my eyes, I replied, “I see a solid gold lampstand '
  - type: note
    content: In the New Testament, a lampstand is a picture of the church (see Rev. 1:20) that gives light to a city and influences that city for God. When Jesus spoke of removing a church’s lampstand from its place (see Rev. 2:5), he referred to removing its influence in a city.
  - type: text
    content: 'with a bowl '
  - type: text
    content: for the oil
  - type: text
    content: ' on top. It has seven lamps, and each lamp has a golden spout for the wicks. '
  - type: note
    content: Or “seven pipes [lit. “lips”], yea, seven to the lamps.” The exact meaning of this verse is uncertain with many varied opinions among scholars.
  '3':
  - type: text
    content: 'And I also see two olive trees '
  - type: text
    content: overshadowing
  - type: text
    content: ' the lampstand, one on the right and one on the left.” '
  '4':
  - type: text
    content: So I asked the angel who was talking to me, “My lord, what do these things represent?”
  '5':
  - type: text
    content: The angel answered, “Do you not know what they are?”
  - type: text
    content: “No, my lord,” I said.
  - type: note
    content: The prophet asked the angel of interpretation a question in vv. 4–5, but the angel didn’t begin to answer the question until v. 10b. Many commentators are agreed that vv. 6–10a should be read after vv. 10b–14. Some modern translations incorporate this recommended change of order.
  - type: heading
    content: God’s Message to Zerubbabel
  '6':
  - type: text
    content: 'Here is the message of '
  - type: text
    content: Yahweh
  - type: text
    content: ' to Zerubbabel: '
  - type: note
    content: Zerubbabel was the “prince” or governor of Judah and grandson of Jehoiachin, the penultimate king of Judah, prior to the Babylonian exile. He was the last of the Davidic royal lineage entrusted with political authority by the governing powers in Persia. His work and ministry are extensively treated in the books of Ezra and Haggai.
  - type: text
    content: “
  - type: text
    content: You will not succeed
  - type: text
    content: ' by '
  - type: text
    content: military
  - type: text
    content: ' might nor by your own strength but by my Spirit,” '
  - type: note
    content: The Hebrew text is short and concise without using any verbs.
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. '
  '7':
  - type: text
    content: '“And what are you, O mighty mountain? '
  - type: note
    content: Compare to Isa. 40:4. This rhetorical question is symbolic in meaning. The mighty mountain represents the obstacles in front of Zerubbabel, including the rubble of the temple site, political problems in establishing his leadership, and rival officials.
  - type: text
    content: 'Before you, Zerubbabel, this mountain '
  - type: text
    content: of obstacles
  - type: text
    content: ' will crumble. '
  - type: note
    content: Or “become a smooth plain.”
  - type: text
    content: Then he will set the capstone in place to shouts of ‘Grace and beauty be upon it!’ ”
  - type: note
    content: The Hebrew text here, chen chen lah, amounts to a repeated shout of a term that denotes divine favor or grace as well as beauty.
  '8':
  - type: text
    content: 'Then another message from '
  - type: text
    content: Yahweh
  - type: text
    content: ' came to me: '
  '9':
  - type: text
    content: '“With his own hands, Zerubbabel has laid the foundation of this temple, '
  - type: note
    content: The foundations of the temple, under the supervision of Zerubbabel, were laid ca. 537–536 BC (see Ezra 3:8–11).
  - type: text
    content: 'and with his own hands he will finish it. '
  - type: note
    content: The temple was then completed, again under Zerubbabel’s supervision, in 516 BC (see Ezra 6:14–16).
  - type: text
    content: 'Then you will know that '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has sent me to you.'
