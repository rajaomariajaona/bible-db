        text: Zerubbabel was the “prince” or governor of Judah and grandson of Jehoiachin, the penultimate king of Judah, prior to the Babylonian exile. He was the last of the Davidic royal lineage entrusted with political authority by the governing powers in Persia. His work and ministry are extensively treated in the books of Ezra and Haggai.
