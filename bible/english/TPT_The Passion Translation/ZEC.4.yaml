      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The two “sons of oil” point to Joshua (the priest, holding spiritual authority) and Zerubbabel (the governor, holding civil authority). Both kings and priests were anointed with oil as a symbol that they were being set apart by the Holy Spirit to fulfill God’s purposes. They represent the joining of the priestly and kingly anointing. Symbolically, the sons of oil can represent the Word (truth) and the Spirit (power). See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
