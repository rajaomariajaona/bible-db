      metadata:
        usfm: REV.11.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . In a sense, every believer today should be a “son of oil,” filled, refreshed, and full of life (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
