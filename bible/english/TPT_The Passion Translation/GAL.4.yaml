document_id: GAL.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: From Slavery to Sonship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let me illustrate: As long as an heir is a minor, he’s not really much different than a servant, although he’s the master over all of them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For until the time appointed by the father, the child is under the domestic supervision of the guardians of the estate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So it is with us. When we were juveniles we were enslaved under the hostile spirits of the world. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But when the time of fulfillment had come, God sent his Son, born of a woman, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Every child has a mother; but for Jesus to be “born of a woman” meant there was no human father, no male counterpart. Jesus’ true Father is the Father of Eternity. No other child has had a virgin birth, “born of a woman,” except him. All the rest of us are born from a father and a mother.
    marker-yv: yv-n
  - type: text
    text: 'born under the law. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Yet all of this was so that he would redeem and set free those held hostage to the law so that we would receive our freedom and a full legal adoption as his children.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And so that we would know that we are his true children, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “because you are sons.”
    marker-yv: yv-n
  - type: text
    text: 'God released the Spirit of Sonship into our hearts—moving us to cry out intimately, “My Father! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: which means “my father.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was borrowed by the Greeks and is found in the Greek manuscripts as well.
    marker-yv: yv-n
  - type: text
    text: My true Father!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now we’re no longer living like slaves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: under the law
  - type: text
    text: ', but we enjoy being God’s very own sons and daughters! And because we’re his, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: we can access everything our Father has
  - type: text
    text: —for we are heirs because of what God has done!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Before we knew God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as our Father
  - type: text
    text: ', we were unwitting servants to the powers that be, which are nothing compared to God. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But now that we truly know him and are intimately known by him, why would we for a moment consider turning back to those weak and feeble principles of religion, as though we were still subject to them?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Why would we want to scrupulously observe rituals like special days, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Sabbaths.” There is no requirement for gentiles to become like Jews and observe Jewish ordinances in order to draw closer to God. Our approach to God is always on the basis of grace and faith in the blood of Jesus Christ, the Lord of the Sabbath.
    marker-yv: yv-n
  - type: text
    text: 'celebrations of the new moon, annual festivals, and sacred years? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These terms could also apply to following astrological signs.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I’m so alarmed about you that I’m beginning to wonder if my labor in ministry among you was a waste of time!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Personal Appeal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Beloved ones, I plead with you, brothers and sisters, become like me, for I became like you. You did me no wrong.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'You are well aware that the reason I stayed among you to preach the good news was because of the poor state of my health. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul’s ministry in Antioch began when he became sick and had to delay his missionary journey to other regions. He may have been afflicted with an illness, or an ophthalmic disorder that was prevalent in the region. The disorder can cause one to have a repugnant appearance. Other scholars think he was simply very ill as a result of his treatment by his enemies on his first missionary journey. Still the Galatians did not reject him; instead they welcomed him with open arms, and his gospel message with open hearts.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And yet you were so kind to me and did not despise me in my weakness, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word can also mean “sickness.”
    marker-yv: yv-n
  - type: text
    text: even though my physical condition put you through an ordeal while I was with you.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Actually, you received me and cared for me as though I were an angel from God, as you would have cared for Jesus Christ himself! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Some of you were even willing, if it were possible, to pluck out your own eyes to replace mine! Where is that kindhearted and free spirit now? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Have I really become your enemy because I tell you the truth?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Can’t you see what these false teachers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “whispering enemies.”
    marker-yv: yv-n
  - type: text
    text: 'are doing? They want to win you over so you will side with them. They want you divided from me so you will follow only them. Would you call that integrity? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Isn’t it better to seek excellence and integrity always, and not just only when I’m with you?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You are my dear children, but I agonize in spiritual “labor pains” once again, until the Anointed One will be fully formed in your hearts! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: How I wish I could be there in person and change my tone toward you, for I am truly dumbfounded over what you are doing!
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Old Testament Allegory
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-22
  - type: text
    text: Tell me, do you want to go back to living strictly by the law? Haven’t you ever listened to what the law really says? Have you forgotten that Abraham had two sons; one by the slave girl, and the other by the freewoman?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:21–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 16:15
      metadata:
        usfm: GEN.16.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 21:2
      metadata:
        usfm: GEN.21.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ishmael
  - type: text
    text: ', the son of the slave girl, was born of the natural realm. But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Isaac
  - type: text
    text: ', the son of the freewoman, was born '
  - type: usfm
    marker: it
    children:
    - type: text
      text: supernaturally by the Spirit
  - type: text
    text: '—a child of the promise of God! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These two women and their sons express an allegory and become symbols of two covenants. The first covenant was born on Mount Sinai, birthing children into slavery—children born to Hagar. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For “Hagar” represents the law given at Mount Sinai in Arabia. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: The “Hagar” metaphor
  - type: text
    text: ' corresponds to the earthly Jerusalem of today who are currently in bondage.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'In contrast, there is a heavenly Jerusalem above us, which is our true “mother.” She is the freewoman, birthing children into freedom! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is showing that the law is a system of works that brings bondage and that the promise is a system of grace that brings true freedom.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Burst forth with gladness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rejoice, O barren woman with no children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: break through with the shouts of joy and jubilee,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are about to give birth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one who was once considered desolate and barren
- type: usfm
  marker: q1
  children:
  - type: text
    text: now has more children than the one who has a husband!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 54:1
      metadata:
        usfm: ISA.54.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dear friends, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “brothers.”
    marker-yv: yv-n
  - type: text
    text: 'just like Isaac, we’re now the true children who inherit the kingdom promises. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “royal proclamation.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And just as the son of the natural world at that time harassed the son born of the power of the Holy Spirit, so it is today. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And what does the Scripture tell us to do?
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Expel the slave mother with her son!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 21:10
      metadata:
        usfm: GEN.21.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This is showing that the two “sons” are not meant to live together. You cannot mingle law and grace, for only grace is based upon the promise of new life.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The son of the slave woman will not be a true heir—
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the true heir of the promises is the son of the freewoman.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 21:10–12
      metadata:
        usfm: GEN.21.10+GEN.21.11+GEN.21.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 8:35
      metadata:
        usfm: JHN.8.35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: It’s now so obvious! We’re not the children of the slave woman; we’re the supernatural sons of the freewoman—
  - type: usfm
    marker: it
    children:
    - type: text
      text: sons of grace
  - type: text
    text: '!'
