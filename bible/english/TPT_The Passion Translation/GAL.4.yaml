document_id: GAL.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: From Slavery to Sonship
  - type: text
    content: 'Let me illustrate: As long as an heir is a minor, he’s not really much different than a servant, although he’s the master over all of them. '
  '10':
  - type: text
    content: 'Why would we want to scrupulously observe rituals like special days, '
  - type: note
    content: Or “Sabbaths.” There is no requirement for gentiles to become like Jews and observe Jewish ordinances in order to draw closer to God. Our approach to God is always on the basis of grace and faith in the blood of Jesus Christ, the Lord of the Sabbath.
  - type: text
    content: 'celebrations of the new moon, annual festivals, and sacred years? '
  - type: note
    content: These terms could also apply to following astrological signs.
  '11':
  - type: text
    content: I’m so alarmed about you that I’m beginning to wonder if my labor in ministry among you was a waste of time!
  - type: heading
    content: Paul’s Personal Appeal
  '12':
  - type: text
    content: Beloved ones, I plead with you, brothers and sisters, become like me, for I became like you. You did me no wrong.
  '13':
  - type: text
    content: 'You are well aware that the reason I stayed among you to preach the good news was because of the poor state of my health. '
  - type: note
    content: Paul’s ministry in Antioch began when he became sick and had to delay his missionary journey to other regions. He may have been afflicted with an illness, or an ophthalmic disorder that was prevalent in the region. The disorder can cause one to have a repugnant appearance. Other scholars think he was simply very ill as a result of his treatment by his enemies on his first missionary journey. Still the Galatians did not reject him; instead they welcomed him with open arms, and his gospel message with open hearts.
  '14':
  - type: text
    content: 'And yet you were so kind to me and did not despise me in my weakness, '
  - type: note
    content: The Aramaic word can also mean “sickness.”
  - type: text
    content: even though my physical condition put you through an ordeal while I was with you.
  - type: text
    content: 'Actually, you received me and cared for me as though I were an angel from God, as you would have cared for Jesus Christ himself! '
  '15':
  - type: text
    content: 'Some of you were even willing, if it were possible, to pluck out your own eyes to replace mine! Where is that kindhearted and free spirit now? '
  '16':
  - type: text
    content: Have I really become your enemy because I tell you the truth?
  '17':
  - type: text
    content: 'Can’t you see what these false teachers '
  - type: note
    content: Or “whispering enemies.”
  - type: text
    content: 'are doing? They want to win you over so you will side with them. They want you divided from me so you will follow only them. Would you call that integrity? '
  '18':
  - type: text
    content: Isn’t it better to seek excellence and integrity always, and not just only when I’m with you?
  '19':
  - type: text
    content: 'You are my dear children, but I agonize in spiritual “labor pains” once again, until the Anointed One will be fully formed in your hearts! '
  '2':
  - type: text
    content: For until the time appointed by the father, the child is under the domestic supervision of the guardians of the estate.
  '20':
  - type: text
    content: How I wish I could be there in person and change my tone toward you, for I am truly dumbfounded over what you are doing!
  - type: heading
    content: An Old Testament Allegory
  '21':
  - type: text
    content: Tell me, do you want to go back to living strictly by the law? Haven’t you ever listened to what the law really says? Have you forgotten that Abraham had two sons; one by the slave girl, and the other by the freewoman?
  - type: note
    content: See Gen. 16:15; 21:2.
  '23':
  - type: text
    content: Ishmael
  - type: text
    content: ', the son of the slave girl, was born of the natural realm. But '
  - type: text
    content: Isaac
  - type: text
    content: ', the son of the freewoman, was born '
  - type: text
    content: supernaturally by the Spirit
  - type: text
    content: '—a child of the promise of God! '
  '24':
  - type: text
    content: 'These two women and their sons express an allegory and become symbols of two covenants. The first covenant was born on Mount Sinai, birthing children into slavery—children born to Hagar. '
  '25':
  - type: text
    content: 'For “Hagar” represents the law given at Mount Sinai in Arabia. '
  - type: text
    content: The “Hagar” metaphor
  - type: text
    content: ' corresponds to the earthly Jerusalem of today who are currently in bondage.'
  '26':
  - type: text
    content: 'In contrast, there is a heavenly Jerusalem above us, which is our true “mother.” She is the freewoman, birthing children into freedom! '
  - type: note
    content: Paul is showing that the law is a system of works that brings bondage and that the promise is a system of grace that brings true freedom.
  '27':
  - type: text
    content: 'For it is written:'
  - type: text
    content: “Burst forth with gladness,
  - type: text
    content: rejoice, O barren woman with no children,
  - type: text
    content: break through with the shouts of joy and jubilee,
  - type: text
    content: for you are about to give birth!
  - type: text
    content: The one who was once considered desolate and barren
  - type: text
    content: now has more children than the one who has a husband!”
  - type: note
    content: See Isa. 54:1.
  '28':
  - type: text
    content: 'Dear friends, '
  - type: note
    content: Or “brothers.”
  - type: text
    content: 'just like Isaac, we’re now the true children who inherit the kingdom promises. '
  - type: note
    content: Or “royal proclamation.”
  '29':
  - type: text
    content: 'And just as the son of the natural world at that time harassed the son born of the power of the Holy Spirit, so it is today. '
  '3':
  - type: text
    content: 'So it is with us. When we were juveniles we were enslaved under the hostile spirits of the world. '
  '30':
  - type: text
    content: And what does the Scripture tell us to do?
  - type: text
    content: “Expel the slave mother with her son!
  - type: note
    content: See Gen. 21:10. This is showing that the two “sons” are not meant to live together. You cannot mingle law and grace, for only grace is based upon the promise of new life.
  - type: text
    content: The son of the slave woman will not be a true heir—
  - type: text
    content: for the true heir of the promises is the son of the freewoman.”
  - type: note
    content: See Gen. 21:10–12; John 8:35.
  '31':
  - type: text
    content: It’s now so obvious! We’re not the children of the slave woman; we’re the supernatural sons of the freewoman—
  - type: text
    content: sons of grace
  - type: text
    content: '!'
  '4':
  - type: text
    content: 'But when the time of fulfillment had come, God sent his Son, born of a woman, '
  - type: note
    content: Every child has a mother; but for Jesus to be “born of a woman” meant there was no human father, no male counterpart. Jesus’ true Father is the Father of Eternity. No other child has had a virgin birth, “born of a woman,” except him. All the rest of us are born from a father and a mother.
  - type: text
    content: 'born under the law. '
  '5':
  - type: text
    content: Yet all of this was so that he would redeem and set free those held hostage to the law so that we would receive our freedom and a full legal adoption as his children.
  '6':
  - type: text
    content: 'And so that we would know that we are his true children, '
  - type: note
    content: Or “because you are sons.”
  - type: text
    content: 'God released the Spirit of Sonship into our hearts—moving us to cry out intimately, “My Father! '
  - type: note
    content: This is the Aramaic word Abba which means “my father.” Abba was borrowed by the Greeks and is found in the Greek manuscripts as well.
  - type: text
    content: My true Father!”
  '7':
  - type: text
    content: 'Now we’re no longer living like slaves '
  - type: text
    content: under the law
  - type: text
    content: ', but we enjoy being God’s very own sons and daughters! And because we’re his, '
  - type: text
    content: we can access everything our Father has
  - type: text
    content: —for we are heirs because of what God has done!
  '8':
  - type: text
    content: 'Before we knew God '
  - type: text
    content: as our Father
  - type: text
    content: ', we were unwitting servants to the powers that be, which are nothing compared to God. '
  '9':
  - type: text
    content: But now that we truly know him and are intimately known by him, why would we for a moment consider turning back to those weak and feeble principles of religion, as though we were still subject to them?
