document_id: JDG.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jephthah, the Champion-Deliverer
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: raised up
  - type: text
    content: ' a brave, fearless champion from Gilead to deliver Israel. His name was Jephthah, and he was the son of a prostitute. '
  - type: text
    content: His father
  - type: text
    content: ' Gilead '
  - type: note
    content: Gilead was both a person (Num. 26:29) and is also the eponymous territory in northern Transjordan. However, some scholars believe the Hebrew text is using something of a figure of speech, “[the region of] Gilead fathered Jephthah,” meaning that no one knows who his father was since so many men had relations with the prostitute.
  '10':
  - type: text
    content: '“That’s right,” they replied. “With '
  - type: text
    content: Yahweh
  - type: text
    content: ' as our witness, '
  - type: note
    content: Or “Yahweh will be listening between us.” This implies that God would punish either party if they broke the covenant.
  - type: text
    content: 'we pledge our loyalty to you.” '
  '11':
  - type: text
    content: 'So Jephthah returned home with the leaders of Gilead, and the people made him their commander and ruler. Jephthah stated his terms '
  - type: note
    content: Or in modern terms, “his oath of office.”
  - type: text
    content: in a solemn ceremony
  - type: text
    content: ' at Mizpah in the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: Jephthah’s Diplomacy
  '12':
  - type: text
    content: Then Jephthah sent messengers to the king of Ammon to ask, “What is your quarrel with us? Why have you invaded our country?”
  '13':
  - type: text
    content: The king of Ammon answered Jephthah’s messengers, “When the Israelites came out of Egypt, they seized my land from the River Arnon to the River Jabbok, as far as the River Jordan. Now give it all back, and we’ll be at peace.”
  '14':
  - type: text
    content: 'Jephthah again sent messengers back to the king of Ammon '
  '15':
  - type: text
    content: 'with this answer: “Israel seized neither the land of Moab nor the land of Ammon. '
  '16':
  - type: text
    content: 'When the Israelites left Egypt, they passed through the desert to the Red Sea and came to Kadesh. '
  '17':
  - type: text
    content: 'They sent messengers to the king of Edom requesting permission to go through his land, but the king of Edom refused. They also asked the king of Moab, but he too would not cooperate. So the Israelites were forced to remain at Kadesh. '
  '18':
  - type: text
    content: 'Leaving from there, they traveled through the desert in order to bypass the land of Edom and the land of Moab. When they arrived at the east side of Moab, on the other side of the River Arnon, they made camp there, but they did not cross the Arnon because it was Moab’s boundary. '
  '19':
  - type: text
    content: 'Then, the Israelites dispatched messengers to Sihon, the Amorite king of Heshbon, and requested his permission to go through his country to their own land. '
  '2':
  - type: text
    content: 'had other sons by his wife, and when they grew up, they forced Jephthah to leave home. They said to him, “You will inherit nothing of our father’s wealth because you are the son of another woman.” '
  - type: note
    content: Jephthah means “he opens up.” Jephthah, the eighth deliverer, had a questionable past, like many of God’s champions today. God will include even a person with a social stigma in God’s “honor roll” of faith (see Heb. 11:32). This is God’s grace.
  '20':
  - type: text
    content: 'Because Sihon did not trust Israel, he assembled his whole army, made camp at Jahaz, and attacked Israel. '
  '21':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ', the '
  - type: text
    content: mighty
  - type: text
    content: ' God of Israel, gave the Israelites victory over Sihon and his army. So the Israelites took possession of all the territory of the Amorites who lived in that land. '
  '22':
  - type: text
    content: 'Then they occupied all the Amorite territory from the Arnon in the south to the Jabbok in the north and from the desert in the east to the Jordan in the west. '
  '23':
  - type: text
    content: 'Since it was '
  - type: text
    content: Yahweh
  - type: text
    content: ' the '
  - type: text
    content: mighty
  - type: text
    content: ' God of Israel who drove out the Amorites for his people, the Israelites, '
  '24':
  - type: text
    content: 'who do you think you are to try to take it back? You should be satisfied with whatever land your god Chemosh '
  - type: note
    content: Chemosh means “swift subduer.” A later king of Moab sacrificed his son as a burnt offering to the god Chemosh (see 2 Kings 3:27).
  - type: text
    content: 'has won for himself, but we are going to keep everything that '
  - type: text
    content: Yahweh
  - type: text
    content: ' our '
  - type: text
    content: mighty
  - type: text
    content: ' God has given us. '
  '25':
  - type: text
    content: 'Do you think you’re stronger than Moab’s king Balak son of Zippor? '
  - type: note
    content: See Num. 22:2; Deut. 23:4; Josh. 24:9.
  - type: text
    content: 'He never challenged Israel over disputed land, did he? Did he ever go to war against us? '
  '26':
  - type: text
    content: 'For three hundred years, Israel has been living here and occupying Heshbon, Aroer, and the towns around them, and all the cities on the banks of the Arnon River. Why have you waited until now to try to take them back? '
  '27':
  - type: text
    content: 'No, I have not wronged you; rather, you are doing me wrong by attacking me. Let '
  - type: text
    content: Yahweh
  - type: text
    content: ' be the judge, and let him decide today which of us is right, Israel or Ammon.”'
  '28':
  - type: text
    content: But the king of Ammon ignored Jephthah’s message.
  - type: heading
    content: Jephthah’s Foolish Vow
  '29':
  - type: text
    content: 'Then the Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' rushed upon Jephthah '
  - type: text
    content: and empowered him
  - type: text
    content: '. He '
  - type: text
    content: and his men
  - type: text
    content: ' marched through Gilead and Manasseh and returned to Mizpah in Gilead, and from there, he stalked the Ammonites. '
  '3':
  - type: text
    content: 'Jephthah fled from his half brothers and lived in the land of Tob. '
  - type: note
    content: Jewish commentators state that Tob was the name of the ruler of that land. Tob means “good.” Scholars believe that the land of Tob was southeast of Lake Galilee and could be another name for Hippos in the Decapolis.
  - type: text
    content: There he recruited a gang of lawless mercenaries who traveled around with him.
  '30':
  - type: text
    content: 'Jephthah promised '
  - type: text
    content: Yahweh
  - type: text
    content: ': “If you give me victory over the Ammonites, '
  '31':
  - type: text
    content: I will offer up to you as a burnt offering the first thing that comes out of my house to greet me when I return in victory. I will sacrifice that one as an offering to you.”
  - type: note
    content: The custom of the day was to house both livestock and family together. No doubt, Jephthah assumed it would be an animal he would offer or perhaps a servant, but not his daughter.
  '32':
  - type: text
    content: 'So Jephthah crossed the river '
  - type: text
    content: with his men
  - type: text
    content: ' to fight the Ammonites, and '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave him victory. '
  '33':
  - type: text
    content: 'He struck at them from Aroer to the area near Minnith, '
  - type: note
    content: Minnith means “distribution.” Minnith was a district east of the Jordan known for growing wheat and corn.
  - type: text
    content: 'twenty villages in all, and as far as Abel Keramim. '
  - type: note
    content: Or “meadow of the vineyards.”
  - type: text
    content: 'The Israelites brought the Ammonites down to the dust '
  - type: note
    content: Or “he humbled [humiliated] the Ammonites.”
  - type: text
    content: in a great slaughter.
  - type: heading
    content: Jephthah’s Daughter
  '34':
  - type: text
    content: 'When Jephthah arrived home at Mizpah, his daughter came hurrying out '
  - type: text
    content: of the house
  - type: text
    content: ' to welcome her father home, dancing to the rhythm of tambourines. She was his only child—his one and only. '
  '35':
  - type: text
    content: 'When he realized who had come out, he ripped his cloak and was overcome with grief. He exclaimed, “Oh no! My '
  - type: text
    content: dearest
  - type: text
    content: ' daughter, you have torn my heart to shreds! '
  - type: note
    content: Or “you have driven me to my knees.”
  - type: text
    content: 'Must it be you I offer? '
  - type: note
    content: Or “you have become a stumbling block to me.”
  - type: text
    content: 'I have made a solemn promise to '
  - type: text
    content: Yahweh
  - type: text
    content: ', and I cannot retract it!”'
  '36':
  - type: text
    content: 'She said to him, “My father, you have made a vow to '
  - type: text
    content: Yahweh
  - type: text
    content: ' and he has delivered you from your enemies, the Ammonites. Do to me what you promised him you would do. '
  '37':
  - type: text
    content: But please grant me one thing. Spare me for two months and let me go with my friends to grieve. Let me be free to wander on the hills and to lament my sad fate.”
  - type: note
    content: Or “weep over my virginity.”
  '38':
  - type: text
    content: '“Go,” he replied, and he sent her away for two months. She and her friends went into the mountains and grieved because she was going to die unmarried and childless. '
  '39':
  - type: text
    content: 'After two months, she returned to her father, and Jephthah fulfilled his vow to '
  - type: text
    content: Yahweh
  - type: text
    content: . His daughter died still a virgin.
  - type: text
    content: '(This was the origin of the custom in Israel '
  '4':
  - type: text
    content: 'Sometime later, the Ammonites waged war against Israel. '
  '40':
  - type: text
    content: that young women would go away each year to grieve and lament for the daughter of Jephthah of Gilead.)
  '5':
  - type: text
    content: 'When they attacked Israel, the leaders of Gilead went to the land of Tob to find Jephthah and to bring him back from exile. '
  '6':
  - type: text
    content: Swallowing their pride
  - type: text
    content: ', they said to him, “Come and lead us so that we can fight the Ammonites.”'
  '7':
  - type: text
    content: Jephthah answered, “You’re the very people who hated me so much that you kicked me out of my father’s house. Why are you coming to me now that you’re in trouble?”
  '8':
  - type: text
    content: 'They said to Jephthah, “We’re turning to you now because we want you to lead us in battle. Come and fight the Ammonites. '
  - type: text
    content: You’re the one we need!
  - type: text
    content: ”
  '9':
  - type: text
    content: Jephthah said to them, “
  - type: text
    content: Very well
  - type: text
    content: '. If you take me back home to fight the Ammonites and '
  - type: text
    content: Yahweh
  - type: text
    content: ' gives me victory, then you will make me your ruler. Agreed?”'
