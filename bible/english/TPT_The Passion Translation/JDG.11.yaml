document_id: JDG.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jephthah, the Champion-Deliverer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raised up
    - type: text
      text: ' a brave, fearless champion from Gilead to deliver Israel. His name was Jephthah, and he was the son of a prostitute. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His father
    - type: text
      text: ' Gilead '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gilead was both a person (
      - type: text
        text: Num. 26:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and is also the eponymous territory in northern Transjordan. However, some scholars believe the Hebrew text is using something of a figure of speech, “[the region of] Gilead fathered Jephthah,” meaning that no one knows who his father was since so many men had relations with the prostitute.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“That’s right,” they replied. “With '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' as our witness, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: will be listening between us.” This implies that God would punish either party if they broke the covenant.
      marker-yv: yv-n
    - type: text
      text: 'we pledge our loyalty to you.” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'So Jephthah returned home with the leaders of Gilead, and the people made him their commander and ruler. Jephthah stated his terms '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or in modern terms, “his oath of office.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: in a solemn ceremony
    - type: text
      text: ' at Mizpah in the presence of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jephthah’s Diplomacy
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then Jephthah sent messengers to the king of Ammon to ask, “What is your quarrel with us? Why have you invaded our country?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The king of Ammon answered Jephthah’s messengers, “When the Israelites came out of Egypt, they seized my land from the River Arnon to the River Jabbok, as far as the River Jordan. Now give it all back, and we’ll be at peace.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jephthah again sent messengers back to the king of Ammon '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'with this answer: “Israel seized neither the land of Moab nor the land of Ammon. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'When the Israelites left Egypt, they passed through the desert to the Red Sea and came to Kadesh. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'They sent messengers to the king of Edom requesting permission to go through his land, but the king of Edom refused. They also asked the king of Moab, but he too would not cooperate. So the Israelites were forced to remain at Kadesh. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Leaving from there, they traveled through the desert in order to bypass the land of Edom and the land of Moab. When they arrived at the east side of Moab, on the other side of the River Arnon, they made camp there, but they did not cross the Arnon because it was Moab’s boundary. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then, the Israelites dispatched messengers to Sihon, the Amorite king of Heshbon, and requested his permission to go through his country to their own land. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'had other sons by his wife, and when they grew up, they forced Jephthah to leave home. They said to him, “You will inherit nothing of our father’s wealth because you are the son of another woman.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jephthah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “he opens up.” Jephthah, the eighth deliverer, had a questionable past, like many of God’s champions today. God will include even a person with a social stigma in God’s “honor roll” of faith (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This is God’s grace.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Because Sihon did not trust Israel, he assembled his whole army, made camp at Jahaz, and attacked Israel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' God of Israel, gave the Israelites victory over Sihon and his army. So the Israelites took possession of all the territory of the Amorites who lived in that land. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Then they occupied all the Amorite territory from the Arnon in the south to the Jabbok in the north and from the desert in the east to the Jordan in the west. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Since it was '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' God of Israel who drove out the Amorites for his people, the Israelites, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'who do you think you are to try to take it back? You should be satisfied with whatever land your god Chemosh '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Chemosh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “swift subduer.” A later king of Moab sacrificed his son as a burnt offering to the god Chemosh (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 3:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'has won for himself, but we are going to keep everything that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' God has given us. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Do you think you’re stronger than Moab’s king Balak son of Zippor? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 22:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 23:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 24:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'He never challenged Israel over disputed land, did he? Did he ever go to war against us? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'For three hundred years, Israel has been living here and occupying Heshbon, Aroer, and the towns around them, and all the cities on the banks of the Arnon River. Why have you waited until now to try to take them back? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'No, I have not wronged you; rather, you are doing me wrong by attacking me. Let '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' be the judge, and let him decide today which of us is right, Israel or Ammon.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But the king of Ammon ignored Jephthah’s message.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jephthah’s Foolish Vow
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Then the Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' rushed upon Jephthah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and empowered him
    - type: text
      text: '. He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and his men
    - type: text
      text: ' marched through Gilead and Manasseh and returned to Mizpah in Gilead, and from there, he stalked the Ammonites. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jephthah fled from his half brothers and lived in the land of Tob. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jewish commentators state that Tob was the name of the ruler of that land.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “good.” Scholars believe that the land of Tob was southeast of Lake Galilee and could be another name for Hippos in the Decapolis.
      marker-yv: yv-n
    - type: text
      text: There he recruited a gang of lawless mercenaries who traveled around with him.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jephthah promised '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ': “If you give me victory over the Ammonites, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I will offer up to you as a burnt offering the first thing that comes out of my house to greet me when I return in victory. I will sacrifice that one as an offering to you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The custom of the day was to house both livestock and family together. No doubt, Jephthah assumed it would be an animal he would offer or perhaps a servant, but not his daughter.
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'So Jephthah crossed the river '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with his men
    - type: text
      text: ' to fight the Ammonites, and '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave him victory. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'He struck at them from Aroer to the area near Minnith, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Minnith
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “distribution.” Minnith was a district east of the Jordan known for growing wheat and corn.
      marker-yv: yv-n
    - type: text
      text: 'twenty villages in all, and as far as Abel Keramim. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “meadow of the vineyards.”
      marker-yv: yv-n
    - type: text
      text: 'The Israelites brought the Ammonites down to the dust '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he humbled [humiliated] the Ammonites.”
      marker-yv: yv-n
    - type: text
      text: in a great slaughter.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jephthah’s Daughter
    marker-yv: yv-h
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'When Jephthah arrived home at Mizpah, his daughter came hurrying out '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the house
    - type: text
      text: ' to welcome her father home, dancing to the rhythm of tambourines. She was his only child—his one and only. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When he realized who had come out, he ripped his cloak and was overcome with grief. He exclaimed, “Oh no! My '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dearest
    - type: text
      text: ' daughter, you have torn my heart to shreds! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you have driven me to my knees.”
      marker-yv: yv-n
    - type: text
      text: 'Must it be you I offer? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you have become a stumbling block to me.”
      marker-yv: yv-n
    - type: text
      text: 'I have made a solemn promise to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and I cannot retract it!”'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'She said to him, “My father, you have made a vow to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and he has delivered you from your enemies, the Ammonites. Do to me what you promised him you would do. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: But please grant me one thing. Spare me for two months and let me go with my friends to grieve. Let me be free to wander on the hills and to lament my sad fate.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “weep over my virginity.”
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '“Go,” he replied, and he sent her away for two months. She and her friends went into the mountains and grieved because she was going to die unmarried and childless. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
