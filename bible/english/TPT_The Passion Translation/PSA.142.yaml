document_id: PSA.142,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: My Only Hope
  - type: text
    content: King David’s poetic song of instruction
  - type: text
    content: A prayer when he was confined in a cave
  - type: text
    content: God, I’m crying out to you!
  - type: text
    content: I lift up my voice boldly to beg for your mercy.
  '2':
  - type: text
    content: I spill out my heart to you and tell you all my troubles.
  '3':
  - type: text
    content: For when I was desperate, overwhelmed, and about to give up,
  - type: text
    content: you were the only one there to help.
  - type: text
    content: You gave me a way of escape
  - type: text
    content: from the hidden traps of my enemies.
  '4':
  - type: text
    content: I look to my left and right to see if there is anyone who will help,
  - type: text
    content: but there’s no one who takes notice of me.
  - type: text
    content: I have no hope of escape, and no one cares whether I live or die.
  '5':
  - type: text
    content: So I cried out to you, Lord, my only hiding place.
  - type: text
    content: You’re all I have, my only hope in this life,
  - type: text
    content: my last chance for help.
  '6':
  - type: text
    content: Please listen to my heart’s cry,
  - type: text
    content: for I am low and in desperate need of you!
  - type: text
    content: Rescue me from all those who persecute me,
  - type: text
    content: for I am no match for them.
  '7':
  - type: text
    content: Bring me out of this dungeon so I can declare your praise!
  - type: text
    content: And all the righteous will celebrate
  - type: text
    content: all the wonderful things you’ve done for me!
