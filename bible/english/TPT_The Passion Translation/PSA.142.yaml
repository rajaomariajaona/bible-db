document_id: PSA.142,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: My Only Hope
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song of instruction
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer when he was confined in a cave
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God, I’m crying out to you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I lift up my voice boldly to beg for your mercy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I spill out my heart to you and tell you all my troubles.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For when I was desperate, overwhelmed, and about to give up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you were the only one there to help.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave me a way of escape
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the hidden traps of my enemies.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I look to my left and right to see if there is anyone who will help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but there’s no one who takes notice of me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have no hope of escape, and no one cares whether I live or die.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So I cried out to you, Lord, my only hiding place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re all I have, my only hope in this life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my last chance for help.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Please listen to my heart’s cry,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am low and in desperate need of you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from all those who persecute me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am no match for them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Bring me out of this dungeon so I can declare your praise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all the righteous will celebrate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the wonderful things you’ve done for me!
