document_id: 1TI.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Warning against False Teachers
  - type: text
    content: 'The Holy Spirit has explicitly revealed: '
  - type: note
    content: The Greek text could be translated “the Spirit says publicly.” This is most likely through prophetic utterance in the church. God’s Spirit still speaks to his people today through gifts of prophecy, tongues and interpretation of tongues, and in many other forms. Paul is likely quoting a prophecy.
  - type: text
    content: 'At the end of this age, many will depart from the true faith one after another, devoting themselves to spirits '
  - type: note
    content: Aramaic and Hebrew speakers would view this as an idiom for “deceiving prophecies.”
  - type: text
    content: 'of deception and following demon-inspired revelations and theories. '
  '10':
  - type: text
    content: 'For the sake of this ministry, we toil tirelessly and are criticized continually, '
  - type: note
    content: As translated from the Aramaic. In place of “criticized continually” the Greek text has “contend for the [athletic] prize.”
  - type: text
    content: 'simply because our hope is in the living God. He is the wonderful life-giver '
  - type: note
    content: As translated from the Aramaic. The Greek word is “Savior.”
  - type: text
    content: of all the children of men, and even more so to those who believe.
  '11':
  - type: text
    content: 'Instruct and teach the people all that I’ve taught you. '
  '12':
  - type: text
    content: 'And don’t be intimidated by those who are older than you; simply be the example they need to see by being faithful and true in all that you do. Speak the truth '
  - type: note
    content: As translated from the Greek.
  - type: text
    content: and live a life of purity and authentic love as you remain strong in your faith.
  '13':
  - type: text
    content: So until I come, be diligent in devouring the Word of God, be faithful in prayer, and in teaching the believers.
  '14':
  - type: text
    content: 'Don’t minimize the powerful gift that operates in your life, for it was imparted to you by the laying on of hands of the elders and was activated through the prophecy they spoke over you. '
  '15':
  - type: text
    content: 'Make all of this your constant meditation and make it real with your life so everyone can see that you are moving forward. '
  '16':
  - type: text
    content: Give careful attention to your spiritual life and every cherished truth you teach, for living what you preach will release salvation inside you and to all those who listen to you.
  '2':
  - type: text
    content: 'Hypocritical liars '
  - type: note
    content: The Aramaic can be translated “they will seduce with false appearances.”
  - type: text
    content: 'will deceive many, and their consciences won’t bother them at all! '
  '3':
  - type: text
    content: 'They will require celibacy and dietary restrictions that God doesn’t expect, for he created all foods to be received with the celebration of faith by those who fully know the truth. '
  '4':
  - type: text
    content: 'We know that all creation is beautiful to God and there is nothing to be refused if it is received with gratitude. '
  '5':
  - type: text
    content: All that we eat is made sacred by the Word of God and prayer.
  '6':
  - type: text
    content: If you will teach the believers these things, you will be known as a faithful and good minister of Jesus, the Anointed One. Nurture others in the living words of faith and in the knowledge of grace which you were taught.
  '7':
  - type: text
    content: 'Be quick to abstain from senseless traditions '
  - type: note
    content: Or “fables.”
  - type: text
    content: 'and legends, '
  - type: note
    content: Or “the fiction of old wives’ tales.”
  - type: text
    content: but instead be engaged in the training of truth that brings righteousness.
  - type: heading
    content: Conduct of God’s Servants
  '8':
  - type: text
    content: 'For athletic training only benefits you for a short season, but righteousness brings lasting benefit in everything; for righteousness contains the promise of life, for time and eternity. '
  '9':
  - type: text
    content: Faithful is the Word, and everyone should accept him!
  - type: note
    content: As translated from the Aramaic. The Greek text reads “this is a faithful saying and is worthy to be fully accepted.”
