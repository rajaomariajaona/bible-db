document_id: 1TI.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning against False Teachers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The Holy Spirit has explicitly revealed: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text could be translated “the Spirit says publicly.” This is most likely through prophetic utterance in the church. God’s Spirit still speaks to his people today through gifts of prophecy, tongues and interpretation of tongues, and in many other forms. Paul is likely quoting a prophecy.
    marker-yv: yv-n
  - type: text
    text: 'At the end of this age, many will depart from the true faith one after another, devoting themselves to spirits '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Aramaic and Hebrew speakers would view this as an idiom for “deceiving prophecies.”
    marker-yv: yv-n
  - type: text
    text: 'of deception and following demon-inspired revelations and theories. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hypocritical liars '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “they will seduce with false appearances.”
    marker-yv: yv-n
  - type: text
    text: 'will deceive many, and their consciences won’t bother them at all! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They will require celibacy and dietary restrictions that God doesn’t expect, for he created all foods to be received with the celebration of faith by those who fully know the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'We know that all creation is beautiful to God and there is nothing to be refused if it is received with gratitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: All that we eat is made sacred by the Word of God and prayer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If you will teach the believers these things, you will be known as a faithful and good minister of Jesus, the Anointed One. Nurture others in the living words of faith and in the knowledge of grace which you were taught.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Be quick to abstain from senseless traditions '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fables.”
    marker-yv: yv-n
  - type: text
    text: 'and legends, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the fiction of old wives’ tales.”
    marker-yv: yv-n
  - type: text
    text: but instead be engaged in the training of truth that brings righteousness.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conduct of God’s Servants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For athletic training only benefits you for a short season, but righteousness brings lasting benefit in everything; for righteousness contains the promise of life, for time and eternity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Faithful is the Word, and everyone should accept him!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text reads “this is a faithful saying and is worthy to be fully accepted.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'For the sake of this ministry, we toil tirelessly and are criticized continually, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. In place of “criticized continually” the Greek text has “contend for the [athletic] prize.”
    marker-yv: yv-n
  - type: text
    text: 'simply because our hope is in the living God. He is the wonderful life-giver '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek word is “Savior.”
    marker-yv: yv-n
  - type: text
    text: of all the children of men, and even more so to those who believe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Instruct and teach the people all that I’ve taught you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And don’t be intimidated by those who are older than you; simply be the example they need to see by being faithful and true in all that you do. Speak the truth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Greek.
    marker-yv: yv-n
  - type: text
    text: and live a life of purity and authentic love as you remain strong in your faith.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So until I come, be diligent in devouring the Word of God, be faithful in prayer, and in teaching the believers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Don’t minimize the powerful gift that operates in your life, for it was imparted to you by the laying on of hands of the elders and was activated through the prophecy they spoke over you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Make all of this your constant meditation and make it real with your life so everyone can see that you are moving forward. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Give careful attention to your spiritual life and every cherished truth you teach, for living what you preach will release salvation inside you and to all those who listen to you.
