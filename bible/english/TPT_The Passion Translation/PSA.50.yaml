document_id: PSA.50
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God Has Spoken
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A poetic song of Asaph, the gatherer
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Asaph’s name means “gatherer” or “fulfilled prophecy.” Like David, Asaph was anointed with the spirit of prophecy and wrote twelve psalms (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pss. 50
      metadata:
        usfm: PSA.50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 73–83
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The God of gods, the mighty Lord himself, has spoken!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shouts out over all the people of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: in every brilliant sunrise and every beautiful sunset,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: saying, “Listen to me!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God’s glory-light shines out of the Zion-realm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic text can be translated “Out of Zion God has shown a glorious crown.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: with the radiance of perfect beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: With the rumble of thunder he approaches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will not be silent, for he comes with an earsplitting sound!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All around him are furious flames of fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and preceding him is the dazzling blaze of his glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Here he comes to judge his people!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He summons his court with heaven and earth as his jury, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Gather all my devoted lovers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my godly ones whose hearts are one with me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who have entered into my holy covenant
- type: usfm
  marker: q1
  children:
  - type: text
    text: by sacrifices upon the altar.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And the heavens declare his justice:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “God himself will be their judge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will judge them with righteousness!”
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Listen to me, O my people! Listen well, for I am your God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am bringing you to trial, and here are my charges.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This summons to judgment is not against the heathen nations but against God’s people. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 4:17
      metadata:
        usfm: 1PE.4.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I do not rebuke you for your sacrifices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which you continually bring to my altar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do I need your young bulls or goats from your fields
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: as if I were hungry
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Every animal of field and forest belongs to me, the Creator.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know every movement of the birds in the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and every animal of the field is in my thoughts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The entire world and everything it contains is mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: If I were hungry, do you think I would tell you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For all that I have created, the fullness of the earth, is mine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Am I fed by your sacrifices? Of course not!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Why don’t you bring me the sacrifices I desire?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring me your true and sincere thanks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and show your gratitude by keeping your promises to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Honor me by trusting in me in your day of trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cry aloud to me, and I will be there to rescue you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And now I speak to the wicked. Listen to what I have to say to you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: What right do you have to presume to speak for me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and claim my covenant promises as yours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For you have hated my instruction and disregarded my words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: throwing them away as worthless!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You forget to condemn the thief or adulterer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are their friend, running alongside them into darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 19-20
  - type: text
    text: The sins of your mouth multiply evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have a lifestyle of lies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you are devoted to deceit as you speak against others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even slandering those of your own household!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: All this you have done and I kept silent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so you thought that I was just like you, sanctioning evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now I will bring you to my courtroom
- type: usfm
  marker: q1
  children:
  - type: text
    text: and spell out clearly my charges before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: This is your last chance, my final warning. Your time is up!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Turn away from all this evil, or '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the next time you hear from me
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: will be when
  - type: text
    text: ' I am coming to pass judgment upon you.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will snatch you away, and no one will be there
- type: usfm
  marker: q1
  children:
  - type: text
    text: to help you escape my judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The life that pleases me is a life lived in the gratitude of grace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: always choosing to walk with me in what is right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is the sacrifice I desire from you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you do this, more of my salvation will unfold for you.”
