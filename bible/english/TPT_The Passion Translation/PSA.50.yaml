document_id: PSA.50,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Has Spoken
  - type: text
    content: A poetic song of Asaph, the gatherer
  - type: note
    content: Asaph’s name means “gatherer” or “fulfilled prophecy.” Like David, Asaph was anointed with the spirit of prophecy and wrote twelve psalms (Pss. 50; 73–83).
  - type: text
    content: The God of gods, the mighty Lord himself, has spoken!
  - type: text
    content: He shouts out over all the people of the earth
  - type: text
    content: in every brilliant sunrise and every beautiful sunset,
  - type: text
    content: saying, “Listen to me!”
  '10':
  - type: text
    content: Every animal of field and forest belongs to me, the Creator.
  - type: text
    content: I know every movement of the birds in the sky,
  - type: text
    content: and every animal of the field is in my thoughts.
  - type: text
    content: The entire world and everything it contains is mine.
  '12':
  - type: text
    content: If I were hungry, do you think I would tell you?
  - type: text
    content: For all that I have created, the fullness of the earth, is mine.
  - type: text
    content: Am I fed by your sacrifices? Of course not!
  '14':
  - type: text
    content: Why don’t you bring me the sacrifices I desire?
  - type: text
    content: Bring me your true and sincere thanks,
  - type: text
    content: and show your gratitude by keeping your promises to me,
  - type: text
    content: the Most High.
  '15':
  - type: text
    content: Honor me by trusting in me in your day of trouble.
  - type: text
    content: Cry aloud to me, and I will be there to rescue you.
  '16':
  - type: text
    content: And now I speak to the wicked. Listen to what I have to say to you!
  - type: text
    content: What right do you have to presume to speak for me
  - type: text
    content: and claim my covenant promises as yours?
  '17':
  - type: text
    content: For you have hated my instruction and disregarded my words,
  - type: text
    content: throwing them away as worthless!
  '18':
  - type: text
    content: You forget to condemn the thief or adulterer.
  - type: text
    content: You are their friend, running alongside them into darkness.
  '19':
  - type: text
    content: The sins of your mouth multiply evil.
  - type: text
    content: You have a lifestyle of lies;
  - type: text
    content: you are devoted to deceit as you speak against others,
  - type: text
    content: even slandering those of your own household!
  '2':
  - type: text
    content: God’s glory-light shines out of the Zion-realm
  - type: note
    content: The Aramaic text can be translated “Out of Zion God has shown a glorious crown.”
  - type: text
    content: with the radiance of perfect beauty.
  '21':
  - type: text
    content: All this you have done and I kept silent,
  - type: text
    content: so you thought that I was just like you, sanctioning evil.
  - type: text
    content: But now I will bring you to my courtroom
  - type: text
    content: and spell out clearly my charges before you.
  '22':
  - type: text
    content: This is your last chance, my final warning. Your time is up!
  - type: text
    content: 'Turn away from all this evil, or '
  - type: text
    content: the next time you hear from me
  - type: text
    content: will be when
  - type: text
    content: ' I am coming to pass judgment upon you.'
  - type: text
    content: I will snatch you away, and no one will be there
  - type: text
    content: to help you escape my judgment.
  '23':
  - type: text
    content: The life that pleases me is a life lived in the gratitude of grace,
  - type: text
    content: always choosing to walk with me in what is right.
  - type: text
    content: This is the sacrifice I desire from you.
  - type: text
    content: If you do this, more of my salvation will unfold for you.”
  '3':
  - type: text
    content: With the rumble of thunder he approaches;
  - type: text
    content: he will not be silent, for he comes with an earsplitting sound!
  - type: text
    content: All around him are furious flames of fire,
  - type: text
    content: and preceding him is the dazzling blaze of his glory.
  '4':
  - type: text
    content: Here he comes to judge his people!
  - type: text
    content: He summons his court with heaven and earth as his jury, saying,
  '5':
  - type: text
    content: “Gather all my devoted lovers,
  - type: text
    content: my godly ones whose hearts are one with me—
  - type: text
    content: those who have entered into my holy covenant
  - type: text
    content: by sacrifices upon the altar.”
  '6':
  - type: text
    content: 'And the heavens declare his justice:'
  - type: text
    content: “God himself will be their judge,
  - type: text
    content: and he will judge them with righteousness!”
  - type: text
    content: Pause in his presence
  '7':
  - type: text
    content: “Listen to me, O my people! Listen well, for I am your God!
  - type: text
    content: I am bringing you to trial, and here are my charges.
  - type: note
    content: This summons to judgment is not against the heathen nations but against God’s people. See 1 Peter 4:17.
  '8':
  - type: text
    content: I do not rebuke you for your sacrifices,
  - type: text
    content: which you continually bring to my altar.
  '9':
  - type: text
    content: Do I need your young bulls or goats from your fields
  - type: text
    content: as if I were hungry
  - type: text
    content: '?'
