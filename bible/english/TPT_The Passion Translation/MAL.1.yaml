  - type: text
    content: ' and one of you shut the temple gates so that you would not keep lighting worthless '
  - type: note
    content: There is a subtle wordplay that is lost in translation between the Hebrew word chinnam (meaning “worthless” or “in vain”) and the root [c]hnn translated “be gracious” in v. 9.
  - type: text
