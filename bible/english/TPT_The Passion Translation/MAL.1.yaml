  - type: text
    content: ' extends even beyond our own borders.’ ”'
  - type: note
    content: 'Or “You who are beyond the borders of Israel will say: Yahweh is great!”'
  - type: heading
    content: Blemished Sacrifices
  '6':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say to you priests, ‘Sons honor their fathers, and servants '
  - type: text
    content: respect
  - type: text
    content: ' their masters. Yet if I am your father, '
  - type: note
    content: See Deut. 32:6; Isa. 63:16; 64:8; Jer. 3:4; 31:9; Matt. 6:8–9. This verse presents some of the strongest Father imagery for God before the birth of Christ.
  - type: text
    content: 'why don’t you honor me? If I am your master, why don’t you respect me? You have despised my '
  - type: text
    content: glorious
  - type: text
    content: ' name.’'
  - type: text
    content: “But you ask, ‘How have we despised your name?’
  '7':
  - type: text
    content: '“You place defiled food on my '
  - type: text
    content: sacred
  - type: text
    content: ' altar.'
  - type: text
    content: “Still you ask, ‘How have we defiled you?’
  - type: text
    content: '“By treating '
  - type: text
    content: Yahweh
  - type: text
    content: '’s table as though it deserves no respect. '
  - type: note
    content: Although it is possible that Malachi was referring to the table of the sacred bread (or the table of fellowship) in the Holy Place, it is more likely in this context that the “table” is the bronze altar where sacrifices were offered.
  '8':
  - type: text
    content: 'Is it not wrong to offer your blind, lame, and sick animals as sacrifices to me? '
  - type: note
    content: See Lev. 22:18–25; Deut. 15:19–21. It was the duty of the priests to ensure that offerings to God did not include unacceptable animals.
  - type: text
    content: 'Try offering them to your governor! Would he be pleased with you? Would he show you favor?” asks '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '9':
  - type: text
    content: '“Now try flattering '
  - type: note
    content: Or “stroke the face of God” or “seek the face of God.” This can be seen as God being sarcastic because the triliteral verbal root (Hb. [c]hlh, which means “flattering”) is the same as the word used to describe the sick animals in the previous verse.
  - type: text
    content: 'me with inappropriate sacrifices that I may be gracious to you. When you offer me such sacrifices, do you expect me to show you favor?” '
  - type: note
    content: Or “to lift up your faces?”
  - type: text
