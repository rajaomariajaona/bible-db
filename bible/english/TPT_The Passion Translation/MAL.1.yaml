  '11':
  - type: text
    content: '“From one end of the world to the other, '
  - type: note
    content: Or “from the rising of the sun to the setting of the sun”—that is, from east to west.
  - type: text
    content: 'my name will be great among the nations. In every place, incense and a pure offering will be offered to my name. '
  - type: note
    content: 'For possible alternate meanings of this verse and the problems associated with each, see Howard A. Hatton and David J. Clark, A Handbook on the Book of Malachi (New York: United Bible Societies, 2002), 389–90.'
  - type: text
    content: 'All over the world my name will receive honor,” says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '12':
  - type: text
    content: '“But your actions dishonor me. You profane my '
  - type: text
    content: name
  - type: text
    content: ' by being bored with the Lord’s table and considering it to be common. You say that what you offer me has no worth. '
  - type: note
    content: Or literally “You poke holes in it [my honor?] in saying [whispering?] that the master’s table is contaminated and that the food you place on it is worthless.” This is almost like spreading doubt in God through gossiping.
  '13':
  - type: text
    content: 'You also say, ‘We’re fed up with all this!’ And you turn up your nose in disgust,” says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: '“You offer me injured, '
  - type: note
    content: Or “stolen animals” (LXX, Vulgate).
  - type: text
    content: 'crippled, or diseased animals, but I won’t accept your sacrifices. This is '
  - type: text
    content: Yahweh
  - type: text
    content: ' speaking to you.'
  '14':
