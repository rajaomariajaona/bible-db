  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you: Were not Esau and Jacob twins? Yet I have loved Jacob '
  - type: text
    content: and his descendants
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'more than Esau '
  - type: text
    content: and his descendants
  - type: text
    content: ', whom I rejected. '
  - type: note
    content: Or “I have accepted Jacob [Israelites] and hated [rejected] Esau [Edomites].” Both of Isaac’s sons had an equal opportunity to lay claim to the covenant of God, which was their birthright. But Esau abandoned his claim to the birthright, and Jacob schemed to steal it from the firstborn, Esau (see Gen. 25:29–34). Although the Hebrew is simply, “I have loved Jacob and hated [rejected] Esau,” Jacob and Esau are to be viewed as metonyms, representing the Israelites and the Edomites (descendants of Esau). See Deut. 4:37; 7:7–8; 10:15; Rom. 9:10–13.
  - type: text
    content: And I have turned the hill country of Esau into a barren wasteland and left his land to the desert jackals.
  '4':
  - type: text
    content: “The people of Edom vow, ‘Though we have been shattered, we will rebuild the ruins.’
  - type: text
    content: '“But this is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, say: You may build, but I will demolish it again. People will call you ‘The Wicked Land’ and ‘The People under the Perpetual Anger of '
  - type: text
    content: Yahweh
  - type: text
    content: .’
