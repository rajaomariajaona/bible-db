  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day, Achsah came and charmed her father so that she could ask him for a gift. When she got down from her donkey, Caleb said to her, “What would you like '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for a wedding present
    - type: text
      text: ?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Father,” she replied, “give me a special gift. You have already given me land, but it’s in arid country. Please, also give me some springs of water.” So Caleb gave her the upper and lower springs '
    - type: usfm
