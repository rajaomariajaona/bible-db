verses:
  '1':
  - type: heading
    content: Judah’s Inheritance
  - type: text
    content: 'Here is the land allotted to the families of the tribe of Judah: Their territory extended southward to the Wilderness of Zin, which belonged to Edom. '
  '10':
  - type: text
    content: 'It then turned west from Baalah to Mount Seir and ran along the northern shoulder of Mount Jearim (that is, Kesalon), descended to '
  - type: text
    content: the city of
  - type: text
    content: ' Beth Shemesh, and crossed to '
  - type: text
    content: the city of
  - type: text
    content: ' Timnah. '
  '11':
  - type: text
    content: 'The border then went north to the ridge of '
  - type: text
    content: the city of
  - type: text
    content: ' Ekron, turned toward '
  - type: text
    content: the city of
  - type: text
    content: ' Shikkeron, crossed to Mount Baalah, and came out at '
  - type: text
    content: the city of
  - type: text
    content: ' Jamnia. '
  - type: note
    content: Or “Jabneel.”
  - type: text
    content: 'The border ended at the '
  - type: text
    content: southern end of the Dead
  - type: text
    content: ' Sea.'
  '12':
  - type: text
    content: The western boundary was the Mediterranean coastline. This was the territory that belonged to the families of the tribe of Judah.
  - type: heading
    content: Caleb Conquers Hebron and Debir
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' had commanded Joshua, “Give a share of the territory from the tribe of Judah to Caleb son of Jephunneh.” So Joshua gave him the city of Hebron which was founded by Arba, the ancestor of Anak. '
  '14':
  - type: text
    content: 'Caleb drove out three Anakim from Hebron: Sheshai, Ahiman, and Talmai—descendants of Anak. '
  - type: note
    content: The descendants of Anak were the giants in the land. Sheshai means “whitewashed”; he represents hypocrisy. Jesus called the religious scholars of his day and the Pharisees hypocrites and “tombs painted over with white paint” (Matt. 23:27). Ahiman means “brother of my right hand” or “my brother is a gift”; he represents an exaggerated spirituality. Talmai means “brave”; he represents arrogance and false confidence. If we find these giants in the “land” of our hearts, then we must cast them out.
  '15':
  - type: text
    content: From Hebron, he marched out and fought against the people of Debir, which used to be called Kiriath Sepher.
  '16':
  - type: text
    content: 'Caleb once promised, “Whoever succeeds in capturing Kiriath Sepher '
  - type: note
    content: Kiriath Sepher means “the city of the book.” Debir (v. 15) means “oracle” or “the word of God.” The one who conquers “Book City” and changes it to the “word of God” will get the daughter of Caleb. Achsah means “anklet” (beautiful feet of the evangelist, see Isa. 52:7).
  - type: text
    content: 'may marry my daughter Achsah.” '
  '17':
  - type: text
    content: 'Caleb’s nephew Othniel, the son of his brother Kenaz, '
  - type: note
    content: Kenaz was possibly Caleb’s half brother. Othniel means “lion of God”; this nephew of Caleb became the first “deliverer” or “judge.” See Judg. 3:9–11.
  - type: text
    content: took the city, so Caleb gave him the hand of his daughter Achsah in marriage.
  '18':
  - type: text
    content: 'One day, Achsah came and charmed her father so that she could ask him for a gift. When she got down from her donkey, Caleb said to her, “What would you like '
  - type: text
    content: for a wedding present
  - type: text
    content: ?”
  '19':
  - type: text
    content: '“Father,” she replied, “give me a special gift. You have already given me land, but it’s in arid country. Please, also give me some springs of water.” So Caleb gave her the upper and lower springs '
  - type: text
    content: near the city of Hebron
  - type: text
    content: .
  - type: heading
    content: The Cities of Judah
  '2':
  - type: text
    content: 'Their boundary started from the bay at the southern end of the Dead Sea, '
  '20':
  - type: text
    content: 'These are the cities given as an inheritance to the families of the tribe of Judah. '
  - type: note
    content: From here through ch. 19, Joshua gives us detailed geographical descriptions of the inheritances of the tribes of Israel. Many of the places mentioned are never referenced again in Scripture, thus making them difficult to identify. Judah is mentioned first, for it was the leader-tribe of Israel. See Num. 2:9; 1 Chron. 5:1–2.
  '21':
  - type: text
    content: 'The cities '
  - type: text
    content: of the first district
  - type: text
    content: ' in the extreme south near the border of Edom included'
  - type: text
    content: Kabzeel, Eder, Jagur,
  '22':
  - type: text
    content: Kinah, Dimonah, Adadah,
  '23':
  - type: text
    content: Kedesh, Hazor, Ithnan,
  '24':
  - type: text
    content: Ziph, Telem, Bealoth,
  '25':
  - type: text
    content: Hazor Hadattah, Kerioth Hezron (that is, Hazor),
  '26':
  - type: text
    content: Amam, Shema, Moladah,
  '27':
  - type: text
    content: Hazar Gaddah, Heshmon, Beth Pelet,
  '28':
  - type: text
    content: Hazar Shual, Beersheba, Biziothiah,
  '29':
  - type: text
    content: Baalah, Iyyim, Ezem,
  '3':
  - type: text
    content: 'crossed south of Scorpion Pass, continued to Zin, and went on south of Kadesh Barnea. Then it went past Hezron up to Addar and curved around to Karka, '
  '30':
  - type: text
    content: Eltolad, Kesil, Hormah,
  '31':
  - type: text
    content: Ziklag, Madmannah, Sansannah,
  '32':
  - type: text
    content: Lebaoth, Shilhim, Ain, and Rimmon—a total of twenty-nine towns and their villages.
  '33':
  - type: text
    content: 'The cities '
  - type: text
    content: of the second district
  - type: text
    content: ' in the western foothills included'
  - type: text
    content: Eshtaol, Zorah, Ashnah,
  '34':
  - type: text
    content: Zanoah, En Gannim, Tappuah, Enam,
  '35':
  - type: text
    content: Jarmuth, Adullam, Socoh, Azekah,
  '36':
  - type: text
    content: 'Shaaraim, Adithaim, and Gederah (or Gederothaim) '
  - type: note
    content: Or “and its sheepfolds,” which would make a total of fourteen cities.
  - type: text
    content: —fourteen towns and their villages.
  '37':
  - type: text
    content: The cities of the third district included
  - type: text
    content: Zenan, Hadashah, Migdal Gad,
  '38':
  - type: text
    content: Dilean, Mizpah, Joktheel,
  '39':
  - type: text
    content: Lachish, Bozkath, Eglon,
  '4':
  - type: text
    content: 'continued to Azmon and followed the stream on the border of Egypt in a northwesterly direction to the Mediterranean Sea. That is the southern border '
  - type: text
    content: of all the tribes of Israel
  - type: text
    content: .
  '40':
  - type: text
    content: Cabbon, Lahmas, Kitlish,
  '41':
  - type: text
    content: Gederoth, Beth Dagon, Naamah, and Makkedah—sixteen towns and their villages.
  '42':
  - type: text
    content: The cities of the fourth district included
  - type: text
    content: Libnah, Ether, Ashan,
  '43':
  - type: text
    content: Iphtah, Ashnah, Nezib,
  '44':
  - type: text
    content: Keilah, Achzib, and Mareshah—nine towns and their villages.
  '45':
  - type: text
    content: The cities of the fifth district included
  - type: text
    content: Ekron, with its surrounding settlements and villages;
  '46':
  - type: text
    content: from Ekron westward, all the towns in the vicinity of Ashdod, together with their villages;
  '47':
  - type: text
    content: Ashdod, and its surrounding settlements and villages;
  - type: text
    content: and Gaza, its settlements and villages, as far south as the Wadi of Egypt and as far west as the coastline of the Mediterranean Sea.
  '48':
  - type: text
    content: 'The cities '
  - type: text
    content: of the sixth district in
  - type: text
    content: ' the '
  - type: text
    content: Judean
  - type: text
    content: ' hills included'
  - type: text
    content: Shamir, Jattir, Socoh,
  '49':
  - type: text
    content: Dannah, Kiriath Sannah (that is, Debir),
  '5':
  - type: text
    content: 'The Dead Sea formed the eastern border '
  - type: text
    content: of Judah
  - type: text
    content: ', and its territory lay to the west '
  - type: text
    content: toward the Mediterranean Sea
  - type: text
    content: '. Their northern border began there '
  '50':
  - type: text
    content: Anab, Eshtemoh, Anim,
  - type: note
    content: 'The Septuagint adds another district at the end of verse 50, as follows: “Tekoa, Ephrath (that is, Bethlehem), Peor, Etam, Culon, Tatam, Shoresh, Cerem, Gallim, Bether, and Manach: eleven cities, along with the towns around them.” Many scholars believe that the Septuagint preserves the original text here. Some modern translations include the addition.'
  '51':
  - type: text
    content: Goshen, Holon, and Giloh—eleven towns and their villages.
  '52':
  - type: text
    content: The cities of the seventh district included
  - type: text
    content: Arab, Dumah, Eshan,
  '53':
  - type: text
    content: Janim, Beth Tappuah, Aphekah,
  '54':
  - type: text
    content: Humtah, Kiriath Arba (that is, Hebron), and Zior—nine towns and their villages.
  '55':
  - type: text
    content: The cities of the eighth district included
  - type: text
    content: Maon, Carmel, Ziph, Juttah,
  '56':
  - type: text
    content: Jezreel, Jokdeam, Zanoah,
  '57':
  - type: text
    content: Kain, Gibeah, and Timnah—ten towns and their villages.
  '58':
  - type: text
    content: The cities of the ninth district included
  - type: text
    content: Halhul, Beth Zur, Gedor,
  '59':
  - type: text
    content: Maarath, Beth Anoth, and Eltekon—six towns and their villages.
  '6':
  - type: text
    content: 'and went up to Beth Hoglah and continued north of the ridge overlooking the Jordan Valley. '
  - type: note
    content: Or “north of Beth Arabah.”
  - type: text
    content: 'From there it went up to the Stone of Bohan, '
  - type: text
    content: named after Bohan
  - type: text
    content: ', Reuben’s son. '
  '60':
  - type: text
    content: The cities of the tenth district included
  - type: text
    content: Kiriath Baal (that is, Kiriath Jearim) and Rabbah—two towns and their villages.
  '61':
  - type: text
    content: 'The desert '
  - type: text
    content: cities of the eleventh district
  - type: text
    content: ' included'
  - type: text
    content: Beth Arabah, Middin, Secacah,
  '62':
  - type: text
    content: 'Nibshan, the City of Salt, '
  - type: note
    content: The Hebrew is ‘Ir-hammelach, possibly in later times the site of the Qumran community of Essenes.
  - type: text
    content: and En Gedi—six towns and their villages.
  - type: note
    content: There are 110 cities mentioned in this chapter, one city for every year of Joshua’s life. See 24:29.
  '63':
  - type: text
    content: The people of Judah could not dislodge the Jebusites from Jerusalem, and they live among the people of Judah to this day.
  '7':
  - type: text
    content: 'The boundary then went up to Debir from the Valley of Achor '
  - type: note
    content: Or “Valley of Trouble.” Achor (Achan) means “trouble.” See 7:25–26.
  - type: text
    content: 'and turned north to Gilgal, which faces Adummim Pass south of the gorge. It continued along to the waters of En Shemesh and ended at En Rogel. '
  '8':
  - type: text
    content: 'Then the boundary ran through the Hinnom Valley along the southern slope of Jebus (now known as Jerusalem). From there it went to the top of the hill west of the Hinnom Valley at the northern end of the Valley of Rephaites. '
  - type: note
    content: Or “the Valley of the Giants.”
  '9':
  - type: text
    content: 'It continued from the top of the mountain to the spring of the waters of Nephtoah, and from there to the town of Mount Ephron and on to Baalah, which today is called Kiriath Jearim. '
