  - type: text
    text: 'and turned north to Gilgal, which faces Adummim Pass south of the gorge. It continued along to the waters of En Shemesh and ended at En Rogel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the boundary ran through the Hinnom Valley along the southern slope of Jebus (now known as Jerusalem). From there it went to the top of the hill west of the Hinnom Valley at the northern end of the Valley of Rephaites. '
  - type: usfm
    marker: f
