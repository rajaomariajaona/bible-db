  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It continued from the top of the mountain to the spring of the waters of Nephtoah, and from there to the town of Mount Ephron and on to Baalah, which today is called Kiriath Jearim. '
  - type: usfm
    marker: v
