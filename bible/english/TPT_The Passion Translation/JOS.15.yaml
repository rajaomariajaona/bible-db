  - type: text
    text: 'Here is the land allotted to the families of the tribe of Judah: Their territory extended southward to the Wilderness of Zin, which belonged to Edom. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
