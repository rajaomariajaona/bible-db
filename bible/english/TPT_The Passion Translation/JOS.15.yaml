      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had commanded Joshua, “Give a share of the territory from the tribe of Judah to Caleb son of Jephunneh.” So Joshua gave him the city of Hebron which was founded by Arba, the ancestor of Anak. '
