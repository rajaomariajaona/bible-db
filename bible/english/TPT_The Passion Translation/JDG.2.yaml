          text: could also be translated “avengers,” “punishers,” “defenders,” “deliverers,” “saviors,” or possibly “governors.” In a sense, Judges parallels the New Testament book of Galatians, for the message of Galatians leads the people of God out of error and bondage. (Similarly, Joshua parallels the book of Ephesians.) The twelve champion-deliverers have a parallel with the twelve apostles of Jesus. The book of Judges can be viewed as an apostolic manual for “last days” ministries. The judges were forerunners of the kingdom. God has promised that he will restore the era of deliverers (judges) in the last days to bring the church into complete victory. See
