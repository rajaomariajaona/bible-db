document_id: JDG.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Angel of Yahweh Rebukes Israel
  - type: text
    content: 'The Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: This verse implies that the Angel of Yahweh had appeared to the people in Gilgal and now reappeared to them. Although the Hebrew word for “angel” can mean “messenger,” the “Angel of Yahweh” was a term used to express the Lord appearing to his people in human form. In v. 1 he says, “I rescued you from Egypt,” clearly showing that the Angel of Yahweh was the Lord himself appearing to his people. He came as a representative of the heavenly court with a message for Israel. God had told his people in advance that he was sending an Angel to go before them. See Ex. 14:19; 23:20–24.
  - type: text
    content: 'went up from Gilgal to Bokim and said to the people: “I rescued you from Egypt and brought you into the land I had promised to your ancestors. I said, ‘I will never, never break my covenant with you, '
  '10':
  - type: text
    content: 'Eventually, after that entire generation died and was buried, the next generation forgot '
  - type: text
    content: Yahweh
  - type: text
    content: ' and all that he had done for Israel.'
  - type: note
    content: They forgot the wonders in the wilderness, the manna, the split-open rock that gave them water. Then later, they failed to remember the Jordan miraculously parting, the walls of Jericho falling down, the sun standing still, the empowerment of God conquering their foes, and the many miracles of Yahweh under Joshua’s leadership. How easy it is for the second generation of any movement to forget the truth and power of the first generation. We enshrine the memories of the past but fail to apply the power present today to advance in the ways of God. See 2 Tim. 3:5.
  - type: heading
    content: Israel’s Cycle of Apostasy
  '11':
  - type: text
    content: 'The Israelites did what was evil in the sight of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and worshiped the images of Baal. '
  '12':
  - type: text
    content: 'Israel deserted '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of their ancestors, who had rescued them from Egypt. They found new gods to worship—the gods of the people around them. They bowed down to them and provoked '
  - type: text
    content: Yahweh
  - type: text
    content: ' to anger. '
  '13':
  - type: text
    content: 'They completely abandoned '
  - type: text
    content: Yahweh
  - type: text
    content: ' to serve Baal '
  - type: note
    content: Baal means “lord” or “master.” He was the chief male Canaanite fertility god. The Canaanites worshiped him at altars on high places or mountain summits within the land.
  - type: text
    content: 'and the images of the goddess Astarte. '
  - type: note
    content: Ishtar, or Astarte, was the moon goddess, the chief goddess of sexuality, fertility, and war. See 1 Sam. 31:10.
  '14':
  - type: text
    content: 'They caused the anger of '
  - type: text
    content: Yahweh
  - type: text
    content: ' to be kindled '
  - type: note
    content: 'Or “caused his anger to burn hot [blaze up].” There are four things in the Bible that kindle God’s anger: (1) The oppression of widows, orphans, and strangers—see Ex. 22:21–24; (2) rebellion and idolatry—see Ex. 32:8–11; Deut. 9:19–22; (3) abandoning God and forsaking him—see Judg. 2:12; 3:7; (4) sin and wickedness—see Pss. 6:8; 38:1–5.'
  - type: text
    content: 'against Israel, and he handed them over to invaders, who plundered them. He surrendered them to their enemies on all sides, and they could no longer defend themselves. '
  '15':
  - type: text
    content: 'Every time they went into battle, '
  - type: text
    content: Yahweh
  - type: text
    content: ' raised his hand against them to their undoing, '
  - type: note
    content: Or “defeat.”
  - type: text
    content: just as he had warned them, and they were in great distress.
  '16':
  - type: text
    content: 'Nevertheless, '
  - type: text
    content: Yahweh
  - type: text
    content: ' raised up deliverers '
  - type: note
    content: Or “judges.” Shophetim could also be translated “avengers,” “punishers,” “defenders,” “deliverers,” “saviors,” or possibly “governors.” In a sense, Judges parallels the New Testament book of Galatians, for the message of Galatians leads the people of God out of error and bondage. (Similarly, Joshua parallels the book of Ephesians.) The twelve champion-deliverers have a parallel with the twelve apostles of Jesus. The book of Judges can be viewed as an apostolic manual for “last days” ministries. The judges were forerunners of the kingdom. God has promised that he will restore the era of deliverers (judges) in the last days to bring the church into complete victory. See Isa. 1:26; Obad. 21.
  - type: text
    content: 'from among them who rescued them from the marauding bands. '
  '17':
  - type: text
    content: 'Rather than listen to their deliverers, they prostituted themselves to other gods and bowed down to worship them. This new generation quickly turned from the good path and refused to be like their ancestors who actually listened to '
  - type: text
    content: Yahweh
  - type: text
    content: ’s commands.
  '18':
  - type: text
    content: 'Yet, whenever '
  - type: text
    content: Yahweh
  - type: text
    content: ' raised up a hero '
  - type: note
    content: Or “judge.”
  - type: text
    content: 'for them, his '
  - type: text
    content: presence and power
  - type: text
    content: ' were with that leader, and he would rescue the people from their enemies as long as that deliverer lived. '
  - type: text
    content: Yahweh
  - type: text
    content: ' had mercy and pitied them because of their cries of distress and groanings under the grip of their oppressors.'
  '19':
  - type: text
    content: 'But when their champion died, then the people would relapse into their former idolatry. They would worship other gods, bow down to them, and refuse to give up their evil ways. And each generation behaved worse than the one before it. '
  '2':
  - type: text
    content: 'and you are never, never to make a covenant with the inhabitants of this land. You must tear down their altars '
  - type: text
    content: to their false gods
  - type: text
    content: '!’ But you have not listened to my voice. See what you have done! '
  '20':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' became furious with Israel, saying, “Because this nation has violated the covenant that I commanded their fathers to keep, and because they no longer listen to my voice, '
  '21':
  - type: text
    content: I will no longer drive out any of the nations that remained in the land after Joshua died.”
  '22':
  - type: text
    content: 'Over and over '
  - type: text
    content: Yahweh
  - type: text
    content: ' tested Israel to see if they would faithfully walk in his ways, as their ancestors had done. '
  - type: note
    content: The Hebrew text has an infinitive verb without a subject, leaving the text ambiguous. It is therefore possible that vv. 22–23 continue the direct speech of Yahweh.
  '23':
  - type: text
    content: 'So '
  - type: text
    content: Yahweh
  - type: text
    content: ' intentionally left '
  - type: text
    content: pagan
  - type: text
    content: ' nations in the land instead of driving them all out at once, and he did not give Joshua the victory over them, '
  - type: text
    content: nor did he drive them out after Joshua’s death
  - type: text
    content: .
  '3':
  - type: text
    content: 'Therefore listen to what I’m telling you—I won’t drive them out before you. Instead, they will be '
  - type: text
    content: thorns
  - type: text
    content: ' in your sides, '
  - type: note
    content: Or “they will become adversaries to you.” See Num. 33:55.
  - type: text
    content: and their gods will become a trap for you!”
  '4':
  - type: text
    content: 'After the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' had delivered his message to all the Israelites, the people burst out with loud, bitter weeping. '
  '5':
  - type: text
    content: 'So they named that place Bokim, '
  - type: note
    content: Or “Bochim.” Bokim means “weepers.” Some scholars believe that Bokim was another name for Bethel (see LXX). The Israelites may have known it as the place near Bethel where Deborah, Rebekah’s nurse, died (see Gen. 35:8).
  - type: text
    content: 'and '
  - type: text
    content: in that place of tears
  - type: text
    content: ' they offered sacrifices to '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: The fact that they offered sacrifices at Bokim indicates that the Israelites had moved the tabernacle there from Gilgal.
  '6':
  - type: text
    content: Then Joshua released the people to go take possession of their territorial inheritance.
  - type: note
    content: The rebuke of the Angel of Yahweh had pierced their hearts. They repented, offered sacrifices to demonstrate their longing for restoration, and went out to conquer again. This account echoes the life of Joshua, during which the people did what was right under such Spirit-empowered leadership.
  - type: heading
    content: The Death of Joshua
  '7':
  - type: text
    content: 'The people '
  - type: text
    content: faithfully
  - type: text
    content: ' worshiped '
  - type: text
    content: Yahweh
  - type: text
    content: ' all the days of Joshua and through all the days of the elders who outlived him. They had all experienced the many astounding miracles '
  - type: text
    content: Yahweh
  - type: text
    content: ' had done for Israel. '
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant, Joshua '
  - type: note
    content: God designated no successor to Joshua. Among all the judges, only Caleb was called Yahweh’s servant (Num. 14:24).
  - type: text
    content: 'son of Nun, died at the age of one hundred and ten '
  '9':
  - type: text
    content: 'and the people buried him on his own parcel of land in the hill country of Ephraim at Timnath Serah, '
  - type: note
    content: Or “Timnath Heres.” Timnath Heres means “the [sacred] territory of the sun.” It is interesting that Joshua spoke to the sun to stand still (see Josh. 10:12). Timnath Serah means “an abundant inheritance.”
  - type: text
    content: 'north of Mount Gaash. '
  - type: note
    content: The Hebrew root for “Gaash” means “to quake.”
