document_id: ISA.39,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah’s Failure
  - type: text
    content: 'Shortly after '
  - type: text
    content: Hezekiah was healed of his illness
  - type: text
    content: ', the king of Babylon, Merodach-Baladan, '
  - type: note
    content: Merodach-Baladan means “god of blood and slaughter,” “god of war [Mars],” or “god of murder.”
  - type: text
    content: 'son of Baladan, '
  - type: note
    content: Baladan means “Baal is his lord.”
  - type: text
    content: 'heard that King Hezekiah had been deathly ill and had recovered. So he sent envoys carrying letters and a '
  - type: text
    content: lavish
  - type: text
    content: ' gift. '
  '2':
  - type: text
    content: Delighted by the king’s gesture, and having a desire to impress them
  - type: text
    content: ', Hezekiah welcomed the envoys from Babylon and opened the doors of the king’s storehouses of treasures and showed them to the envoys. He let them see all of his gold, silver, spices, and costly fragrant oils, as well as his entire armory. All of the king’s royal treasures, all that was in the king’s palace, and all the wealth of his whole kingdom was shown to them.'
  '3':
  - type: text
    content: Then Isaiah the prophet visited the king and said to him, “
  - type: text
    content: What have you done?
  - type: text
    content: ' What did these men say and where did they come from?”'
  - type: text
    content: Hezekiah replied, “They are envoys from distant Babylon.”
  '4':
  - type: text
    content: Then Isaiah asked, “What did they see in your palace?”
  - type: text
    content: “They have seen everything in my palace,” responded Hezekiah. “I showed them everything in my royal treasuries.”
  '5':
  - type: text
    content: 'Isaiah said to Hezekiah, “Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has to say to you: '
  '6':
  - type: text
    content: '‘The days are coming when all the treasures in your palace and all the wealth that your ancestors have stored up until this day will be carried off to Babylon; absolutely nothing will be left,’ says the Lord. '
  '7':
  - type: text
    content: ‘Some of your own sons who come after you will be deported and become high officials in the palace of the king of Babylon.’ ”
  '8':
  - type: text
    content: 'Then Hezekiah said to Isaiah, “The word '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken through you is good and right.” '
  - type: text
    content: For he thought
  - type: text
    content: ', “At least for me, there will be peace and security in my lifetime.”'
  - type: note
    content: Hezekiah, the reformer, went from being a man who was favored by God and divinely healed to one who thought only of himself. See 2 Chron. 32:25.
