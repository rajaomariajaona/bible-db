document_id: ISA.39,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Failure
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Shortly after '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hezekiah was healed of his illness
    - type: text
      text: ', the king of Babylon, Merodach-Baladan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Merodach-Baladan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “god of blood and slaughter,” “god of war [Mars],” or “god of murder.”
      marker-yv: yv-n
    - type: text
      text: 'son of Baladan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Baladan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “Baal is his lord.”
      marker-yv: yv-n
    - type: text
      text: 'heard that King Hezekiah had been deathly ill and had recovered. So he sent envoys carrying letters and a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lavish
    - type: text
      text: ' gift. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Delighted by the king’s gesture, and having a desire to impress them
    - type: text
      text: ', Hezekiah welcomed the envoys from Babylon and opened the doors of the king’s storehouses of treasures and showed them to the envoys. He let them see all of his gold, silver, spices, and costly fragrant oils, as well as his entire armory. All of the king’s royal treasures, all that was in the king’s palace, and all the wealth of his whole kingdom was shown to them.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then Isaiah the prophet visited the king and said to him, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: What have you done?
    - type: text
      text: ' What did these men say and where did they come from?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hezekiah replied, “They are envoys from distant Babylon.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then Isaiah asked, “What did they see in your palace?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “They have seen everything in my palace,” responded Hezekiah. “I showed them everything in my royal treasuries.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Isaiah said to Hezekiah, “Here is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, has to say to you: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '‘The days are coming when all the treasures in your palace and all the wealth that your ancestors have stored up until this day will be carried off to Babylon; absolutely nothing will be left,’ says the Lord. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ‘Some of your own sons who come after you will be deported and become high officials in the palace of the king of Babylon.’ ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then Hezekiah said to Isaiah, “The word '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has spoken through you is good and right.” '
    - type: usfm
      marker: it
      children:
      - type: text
        text: For he thought
    - type: text
      text: ', “At least for me, there will be peace and security in my lifetime.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 39:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hezekiah, the reformer, went from being a man who was favored by God and divinely healed to one who thought only of himself. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 32:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
