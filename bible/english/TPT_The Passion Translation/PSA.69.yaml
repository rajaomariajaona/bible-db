document_id: PSA.69,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry of Distress Psalm 69 is considered one of the most outstanding messianic psalms, with obvious prophetic references to the sufferings and cross of Jesus Christ.
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: David’s poetic song of praise To the tune of “Lilies”
  - type: text
    content: God, my God, come and save me!
  - type: text
    content: These floods of trouble have risen higher and higher.
  - type: text
    content: The water is up to my neck!
  - type: note
    content: Or “throat.”
  - type: text
    content: I’m sinking into the mud with no place to stand,
  - type: text
    content: and I’m about to drown in this storm.
  '10':
  - type: text
    content: 'When they see me seeking for more of you with weeping '
  - type: note
    content: Or “When I pour out my soul” or “When I weep soul-tears.”
  - type: text
    content: and fasting,
  - type: text
    content: they all just scoff and scorn at my passion.
  '11':
  - type: text
    content: When I humble myself with sorrow over my sin,
  - type: text
    content: it gives them a reason to mock me even more.
  '12':
  - type: text
    content: The leaders, the influential ones—how they scorn my passion for you!
  - type: text
    content: I’ve become the talk of the town, the theme of drunkards’ songs.
  '13':
  - type: text
    content: 'But I keep calling out to you, '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: I know you will bend down to listen to me,
  - type: text
    content: for now is the season of favor.
  - type: text
    content: Because of your faithful love for me,
  - type: text
    content: your answer to my prayer will be my sure salvation.
  '14':
  - type: text
    content: Pull me out of this mess! Don’t let me sink!
  - type: text
    content: Rescue me from those who hate me and from all this trouble I’m in!
  '15':
  - type: text
    content: Don’t let this flood drown me.
  - type: text
    content: Save me from these deep waters
  - type: text
    content: or I’ll go down to the pit of destruction.
  '16':
  - type: text
    content: Oh, Lord God, answer my prayers!
  - type: text
    content: I need to see your tender kindness, your grace,
  - type: text
    content: your compassion, and your constant love.
  - type: text
    content: Just let me see your face, and turn your heart toward me.
  - type: text
    content: Come running quickly to your servant.
  - type: text
    content: In this deep distress, come and answer my prayer.
  '18':
  - type: text
    content: Come closer as a friend and redeem me.
  - type: text
    content: Set me free so my enemies cannot say that you are powerless.
  '19':
  - type: text
    content: See how they dishonor me in shame and disgrace?
  - type: text
    content: You know, Lord, what I’m going through, and you see it all.
  '20':
  - type: text
    content: I’m heartsick and heartbroken by it all.
  - type: text
    content: Their contempt has crushed my soul.
  - type: text
    content: I looked for sympathy and compassion
  - type: text
    content: but found only empty stares.
  '21':
  - type: text
    content: I was hungry and they gave me bitter food.
  - type: text
    content: I was thirsty and they offered me vinegar.
  - type: note
    content: This was fulfilled with Jesus being offered vinegar on the cross. See Luke 23:36.
  '22':
  - type: text
    content: Let their “feasts” turn to ashes.
  - type: text
    content: Let their “peace and security” become their downfall.
  '23':
  - type: text
    content: Make them blind as bats, groping in the dark.
  - type: text
    content: Let them be feeble, trembling continually.
  '24':
  - type: text
    content: Pour out your fury on them all!
  - type: text
    content: Consume them with the fire of your anger!
  - type: text
    content: Burn down the walled palace where they live!
  - type: text
    content: Leave them homeless and desolate!
  '26':
  - type: text
    content: For they come against the one you yourself have struck,
  - type: text
    content: and they scorn the pain of those you’ve pierced.
  '27':
  - type: text
    content: Pile on them the guilt of their sins.
  - type: text
    content: Don’t let them ever go free.
  '28':
  - type: text
    content: Leave them out of your list of the living!
  - type: text
    content: Blot them out of your Book of Life!
  - type: text
    content: Never name them as your own!
  '29':
  - type: text
    content: I am burdened and broken by this pain.
  - type: text
    content: When your miracle rescue comes to me,
  - type: text
    content: it will lift me to the highest place.
  '3':
  - type: text
    content: I’m weary, exhausted with weeping.
  - type: text
    content: My throat is dry, my voice is gone, my eyes are swollen with sorrow,
  - type: text
    content: 'and I’m waiting for you, God, '
  - type: text
    content: to come through for me
  - type: text
    content: .
  '30':
  - type: text
    content: Then my song will be a burst of praise to you.
  - type: text
    content: My glory-shouts will make your fame even more glorious
  - type: text
    content: to all who hear my praises!
  '31':
  - type: text
    content: 'For I know, '
  - type: text
    content: Yahweh
  - type: text
    content: ', that my praises mean more to you'
  - type: text
    content: than all my gifts and sacrifices.
  '32':
  - type: text
    content: All who seek you will see God do this for them,
  - type: text
    content: and they’ll overflow with gladness.
  - type: text
    content: Let this revive your hearts, all you lovers of God!
  '33':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' does listen to the poor and needy'
  - type: text
    content: and will not abandon his prisoners of love.
  - type: note
    content: Or “those wearing shackles.”
  '34':
  - type: text
    content: Let all the universe praise him!
  - type: text
    content: The high heavens and everyone on earth, praise him!
  - type: text
    content: Let the oceans deep, with everything in them, keep it up!
  '35':
  - type: text
    content: God will come to save his Zion-people.
  - type: text
    content: God will build up his cities of Judah,
  - type: text
    content: for there his people will live in peace.
  '36':
  - type: text
    content: All their children will inherit the land,
  - type: text
    content: and the lovers of his name will live there safe and secure.
  '4':
  - type: text
    content: I can’t even count all those who hate me for no reason.
  - type: text
    content: Many influential men want me silenced,
  - type: text
    content: yet I’ve done nothing against them.
  - type: text
    content: Must I restore what I never took away?
  '5':
  - type: text
    content: God, my life is an open book to you.
  - type: text
    content: You know every sin I’ve ever done.
  - type: text
    content: For nothing within me is hidden from your sight!
  '6':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' of Angel Armies,'
  - type: text
    content: keep me from ever being a stumbling block to others,
  - type: text
    content: to those who love you.
  - type: text
    content: Lord God of Israel, don’t let what happens to me
  - type: text
    content: be the source of confusion to those who are passionate for you.
  '7':
  - type: text
    content: Because of my love for you, Lord,
  - type: text
    content: I have been mocked, cursed, and disgraced.
  '8':
  - type: text
    content: Even my own brothers, those of my family,
  - type: text
    content: act as though they don’t want anything to do with me.
  '9':
  - type: text
    content: My love for you has my heart on fire!
  - type: text
    content: My passion for your house consumes me!
  - type: text
    content: Nothing will turn me away,
  - type: text
    content: even though I endure all the insults of those who insult you.
