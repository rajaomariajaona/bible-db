document_id: PSA.69,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Cry of Distress
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psalm 69
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is considered one of the most outstanding messianic psalms, with obvious prophetic references to the sufferings and cross of Jesus Christ.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: David’s poetic song of praise To the tune of “Lilies”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: God, my God, come and save me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These floods of trouble have risen higher and higher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The water is up to my neck!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 69:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “throat.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m sinking into the mud with no place to stand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I’m about to drown in this storm.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When they see me seeking for more of you with weeping '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 69:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “When I pour out my soul” or “When I weep soul-tears.”
      marker-yv: yv-n
    - type: text
      text: and fasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they all just scoff and scorn at my passion.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When I humble myself with sorrow over my sin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it gives them a reason to mock me even more.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The leaders, the influential ones—how they scorn my passion for you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve become the talk of the town, the theme of drunkards’ songs.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But I keep calling out to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know you will bend down to listen to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for now is the season of favor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your faithful love for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your answer to my prayer will be my sure salvation.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pull me out of this mess! Don’t let me sink!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from those who hate me and from all this trouble I’m in!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Don’t let this flood drown me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from these deep waters
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or I’ll go down to the pit of destruction.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-17
    - type: text
      text: Oh, Lord God, answer my prayers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I need to see your tender kindness, your grace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your compassion, and your constant love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just let me see your face, and turn your heart toward me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come running quickly to your servant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In this deep distress, come and answer my prayer.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Come closer as a friend and redeem me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set me free so my enemies cannot say that you are powerless.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: See how they dishonor me in shame and disgrace?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know, Lord, what I’m going through, and you see it all.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I’m heartsick and heartbroken by it all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their contempt has crushed my soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked for sympathy and compassion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but found only empty stares.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I was hungry and they gave me bitter food.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was thirsty and they offered me vinegar.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 69:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was fulfilled with Jesus being offered vinegar on the cross. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 23:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Let their “feasts” turn to ashes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their “peace and security” become their downfall.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Make them blind as bats, groping in the dark.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be feeble, trembling continually.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: Pour out your fury on them all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consume them with the fire of your anger!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Burn down the walled palace where they live!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leave them homeless and desolate!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For they come against the one you yourself have struck,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they scorn the pain of those you’ve pierced.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Pile on them the guilt of their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let them ever go free.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Leave them out of your list of the living!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blot them out of your Book of Life!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Never name them as your own!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: I am burdened and broken by this pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When your miracle rescue comes to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will lift me to the highest place.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: I’m weary, exhausted with weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My throat is dry, my voice is gone, my eyes are swollen with sorrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and I’m waiting for you, God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to come through for me
    - type: text
      text: .
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Then my song will be a burst of praise to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My glory-shouts will make your fame even more glorious
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to all who hear my praises!
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'For I know, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', that my praises mean more to you'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than all my gifts and sacrifices.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: All who seek you will see God do this for them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they’ll overflow with gladness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let this revive your hearts, all you lovers of God!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' does listen to the poor and needy'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will not abandon his prisoners of love.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 69:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those wearing shackles.”
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Let all the universe praise him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The high heavens and everyone on earth, praise him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the oceans deep, with everything in them, keep it up!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: God will come to save his Zion-people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will build up his cities of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for there his people will live in peace.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: All their children will inherit the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the lovers of his name will live there safe and secure.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I can’t even count all those who hate me for no reason.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many influential men want me silenced,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet I’ve done nothing against them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Must I restore what I never took away?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: God, my life is an open book to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know every sin I’ve ever done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For nothing within me is hidden from your sight!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: keep me from ever being a stumbling block to others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to those who love you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord God of Israel, don’t let what happens to me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be the source of confusion to those who are passionate for you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Because of my love for you, Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have been mocked, cursed, and disgraced.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Even my own brothers, those of my family,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: act as though they don’t want anything to do with me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: My love for you has my heart on fire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My passion for your house consumes me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing will turn me away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even though I endure all the insults of those who insult you.
