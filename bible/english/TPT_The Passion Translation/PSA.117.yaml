document_id: PSA.117,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Glorious Praise
  - type: text
    content: A praise psalm
  - type: text
    content: 'Let everyone everywhere shine with praise to '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: note
    content: The word for “praise” is taken from the Hebrew words for “to shine.”
  - type: text
    content: Let it all out! Go ahead and praise him!
  '2':
  - type: text
    content: For he has conquered us with his great love,
  - type: text
    content: and his kindness has melted our hearts.
  - type: text
    content: His faithfulness lasts forever, and he will never fail you.
  - type: text
    content: So go ahead, let it all out!
  - type: text
    content: Praise Yah!
  - type: text
    content: O Yah!
  - type: note
    content: The name Yah is not an abbreviated form of Yahweh; it is the name of God as he displays his power. Yahweh is found 6,830 times in the Hebrew text, and Yah is found 49 times.
