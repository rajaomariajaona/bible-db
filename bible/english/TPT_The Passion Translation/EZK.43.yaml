      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he said to me, “Son of man, this is the place of my throne, the place on which I will rest my feet, where I will live among the Israelites forever. And the people of Israel and their kings will never again drag my holy name through the mud. They will never disgrace me again by their spiritual prostitution '
