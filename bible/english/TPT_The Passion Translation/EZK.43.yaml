  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Son of man, describe this temple in detail to the people of Israel so that they will be ashamed of their despicable deeds. Let them carefully study the perfect structure of the temple. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “and they will measure the perfection.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then, if they truly express sorrow over their sins, explain to them the design and plan of the temple—its exits and entrances, its shape, its arrangement, the entire design, and all its rules for operation. Sketch it out for them so that they can observe and understand the entire plan and follow all its rules.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law of the Temple
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“This is the law of the temple: the mountaintop '
    - type: usfm
      marker: it
      children:
      - type: text
        text: radiates his glory
    - type: text
      text: ', therefore, all around the Temple Mount will be a most holy area. Behold, this is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: most important
    - type: text
      text: ' law of the temple.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Description of the Altar for Burning Sacrifices
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“This is the measurement of the altar using the same unit of measurement as the rest of the temple: '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “these are the measurements of the altar by cubits, the cubit being a cubit and a handbreadth,” that is, a long cubit. A long cubit was approximately 21 inches (0.53 meters). It should be noted that there are differing views as to who is speaking in this subsection, Ezekiel or God. The translation team assumes that
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is speaking, since he is the one speaking before and after vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Additionally, there are no verbs in the Hebrew text in this subsection.
      marker-yv: yv-n
    - type: text
      text: 'The base '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “gutter” or “trench,” presumably to catch the blood from the animals sacrificed.
      marker-yv: yv-n
    - type: text
      text: 'is one cubit high and one cubit wide, with a rim of one span '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A span was a unit of measurement that was approximately 9 inches (22 centimeters).
      marker-yv: yv-n
    - type: text
      text: 'around its edge. The altar itself is to be this high: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'from the base on the ground to the lower ledge, two cubits, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 3.5 feet (1.06 meters).
      marker-yv: yv-n
    - type: text
      text: 'with a width of one cubit. And from the smaller ledge to the larger ledge, four cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 7 feet (2.13 meters). Also v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'high and one cubit wide. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The altar hearth is to be four cubits high, with four horns projecting upward from the hearth, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 27:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Septuagint states that altar horns were “one cubit high [or long].” The altar hearth was the fireplace at the top of the altar.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'and the hearth a perfect square: twelve cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 21 feet (6.4 meters).
      marker-yv: yv-n
    - type: text
      text: 'long by twelve cubits wide. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The ledge is also to be a square: fourteen cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 24.5 feet (7.46 meters).
      marker-yv: yv-n
    - type: text
      text: 'long and fourteen cubits wide on four sides with a rim around it of half a cubit, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 10.5 inches (0.27 meters).
      marker-yv: yv-n
    - type: text
      text: and its surrounding base one cubit. Its steps are on the east side of the altar.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dedication of the Altar
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me, “Son of man, here are the rules you must follow when the altar '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “altar” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ariel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and means “the mount of El.”
      marker-yv: yv-n
    - type: text
      text: 'is built to offer burnt offerings and to splash on it the blood of the animals they sacrifice. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You must give a young bull to the Levitical priests, the descendants of Zadok. They are the ones who may come before me to serve me and offer the bull as a sacrifice for sin, declares Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And behold, I saw the glory of the God of Israel storming from the east '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with a roar
    - type: text
      text: '! A thunderous sound came with him like the sound of a great waterfall. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The voice of his coming was like the sound of many waters.” The Targum translates this as “His voice was like those who praise his name.”
      marker-yv: yv-n
    - type: text
      text: 'All the ground was glowing brightly, illuminated by his glorious presence. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You must take some of its blood and smear it on the four horns, on the four corners of the ledge, and on its surrounding rim. In this way you will purify it and make atonement for it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To smear the blood on the altar would make it ritually clean and consecrated for sacred use. The Hebrew verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kipper
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to make atonement” and comes from a root meaning either “to cover” or “to wipe away.” The rest of the bull was to be burned outside the sacred area or outside the temple compound (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) or outside the camp (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:11–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then take the bull offered as the sacrifice for sin and burn its carcass in the appointed place outside the sacred area. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On the second day, you must offer an unblemished male goat as the sin offering, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the priests
    - type: text
      text: ' must purify the altar again as they did on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the first day
    - type: text
      text: ' with the bull. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'When you have finished purifying the altar, you must offer a young, unblemished bull and a young, unblemished ram. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'You must present them before me, and the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zadokite
    - type: text
      text: ' priests will sprinkle salt on them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 9:49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and offer them as burnt offerings to me. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication is that the priests were not allowed to eat any portion of it themselves.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Each day for seven days you must sacrifice to me a young male goat, a young bull, and a young ram as a sin offering. All of them must be unblemished animals. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'In this way the altar will be purified, cleansed, and consecrated for seven days. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When the seven days '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: of consecration
    - type: text
      text: ' are over, on the eighth day and each day afterward, the priest will offer burnt offerings '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Under the sacrificial system of the law, burnt offerings were very important. They were offered twice a day, in the morning and in the evening, as a sacrifice for the sins of the people.
      marker-yv: yv-n
    - type: text
      text: 'and communion sacrifices '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:27
      - type: usfm
        marker: ft
        children:
