          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “by their corpses in their death.” Some interpret the Hebrew as referring to the deaths of Israel’s kings close to the temple area.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'or by putting their threshold beside my threshold and their doorposts beside my doorposts, with only a wall between us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 43:8
      - type: usfm
        marker: ft
        children:
