          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are two ways to understand the Hebrew text. (1) The royal palace had been built right next to the southern wall of the temple compound, which meant the doorways to both buildings were shared with only a wall between the sacred compound and the living quarters of the kings. (2) “Their threshold” and “their doorposts” could refer to the entrance of shrines built in or near the temple compound to worship other gods with only a wall between what was sacred and what was blasphemous.
      marker-yv: yv-n
    - type: text
      text: 'They have defiled my holy name by their despicable practices, so in my anger I put an end to them. '
