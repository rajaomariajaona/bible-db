document_id: JOS.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua Sends Spies into Jericho
  - type: text
    content: 'Then Joshua son of Nun secretly sent out two spies '
  - type: note
    content: Joshua was one of the twelve spies sent out publicly by Moses (see Deut. 1:22–23). Some scholars believe that one of the spies could have been Salmon, who married Rahab, and whose son was Boaz. See Matt. 1:5.
  - type: text
    content: 'from their camp at Acacia. '
  - type: note
    content: Archaeologists identify the location of Acacia with Tell el-Kefrein in modern Jordan. The Hebrew word for “Acacia” is shittim, which means “piercing” or “thorny.” The acacia is a flowering hardwood tree. It was used to make the tabernacle furniture, including the ark of the covenant.
  - type: text
    content: 'He told them, “Go and explore the land of Canaan, especially Jericho.” '
  - type: note
    content: The Hebrew word for “Jericho” is Yericho, which means “moon.” Jericho was known as “The City of the Moon” because of its occult worship of the moon god/goddess. The city, with its high double walls, was a capital of Canaanite worship. They considered their king to be a divine being. So when Yahweh gave the king over to be killed by Joshua and his men (see 6:2), they were, in effect, killing a “son of god.” The earliest object of worship in the Canaanite religion was that of the male moon god Yerach. (See W. F. Albright, Archaeology and the Religion of Israel, especially pp. 83 and 92; John Gray, The Canaanites, p. 125.)
  - type: text
    content: 'They went and '
  - type: text
    content: arrived at Jericho and
  - type: text
    content: ' entered the house of Rahab the prostitute and lodged there. '
  - type: note
    content: Although Josephus mentions that Rahab was an innkeeper (Ant. 5.1.2), the book of James clearly states she was a prostitute (see James 2:25). It may be that she was both. Rahab means “overcome” or “overcomer.” The Hebrew word rahab is also found in Song. 6:5. The Shulamite has “rahab” (overcome) the heart of the Beloved. The church fathers noted that Rahab possessed the spirit of prophecy, which the Jewish historian Josephus also mentions (see Josephus Ant. Jud. 5.1.13). She had a revelation that God was giving the land to Israel (see Josh. 2:9, 12). Rabbinical tradition states that Rahab was rewarded by having prophets and kings as her descendants.
  '10':
  - type: text
    content: 'We’ve heard of '
  - type: text
    content: the miracles that accompany you
  - type: text
    content: ' and how '
  - type: text
    content: Yahweh
  - type: text
    content: ' dried up the waters of the Red Sea '
  - type: note
    content: Or “the Sea of Reeds.”
  - type: text
    content: 'for you when you left Egypt. We’ve heard how you utterly annihilated '
  - type: note
    content: This is the Hebrew word cherem, meaning “totally devoted, consumed, dedicated and given over to Yahweh.” This term plays a significant role in the stories that follow concerning Jericho, Ai, and Achan.
  - type: text
    content: 'the two Amorite kings, Sihon '
  - type: note
    content: Sihon means “to strike down.” Sihon was an Amorite king who ruled over the city-state of Heshbon. Heshbon means “intelligence”; this town represents the mind of man. In Num. 21:27–30, the ballad singers wrote songs about Heshbon and its king, which indicates how far the fame of Sihon has spread. The tribe of Gad eventually settled in the territory where Sihon once reigned. Jewish tradition states that Sihon and Og were both giants. The Jewish apocryphal book The Book of Giants, part of the Dead Sea Scrolls discovered at Qumran, states that Sihon and Og (Ogias) were brothers.
  - type: text
    content: 'and Og, '
  - type: note
    content: Og means “long-necked,” “pride,” or “intimidation.” Og was the king of Bashan. Moses had fought and conquered his kingdom, which included over sixty fortified cities (see Deut. 3:1–7, 11). He was also a Rephaite giant or “terrible one.” His iron bed was “nine cubits long and four cubits wide” (thirteen and a half feet long and six feet wide). A man needing this size of bed was at least ten or eleven feet tall. See Deut. 2:20–21. One of the cities the Israelites took from Og was Golan, which later became a Levitical city and a city of asylum (see Josh. 21:27).
  - type: text
    content: and their kingdoms
  - type: text
    content: ' who were on the other side of the Jordan. '
  - type: note
    content: See Num. 21:21–35.
  '11':
  - type: text
    content: 'As soon as we heard it, our hearts melted with fear, and we were left with no courage among us '
  - type: note
    content: Or “everyone’s spirit no longer rose up.”
  - type: text
    content: 'because of you. '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, is the true God '
  - type: text
    content: who rules
  - type: text
    content: ' in heaven above and on earth below. '
  - type: note
    content: Rahab was a pagan Canaanite woman, yet she declared her faith in Yahweh. She is commended as a woman of faith. See Heb. 11:31; James 2:25.
  '12':
  - type: text
    content: 'Please, solemnly swear to me by the name of '
  - type: text
    content: Yahweh
  - type: text
    content: ' that you will show kindness to my family because I have shown kindness to you. Give me a sure sign '
  '13':
  - type: text
    content: that you will spare the lives of my father and mother, my brothers and sisters, and all their families. Don’t let us be killed!”
  '14':
  - type: text
    content: 'The men answered, “If you don’t disclose our mission to anyone, we’ll pledge our lives for yours. Then, when '
  - type: text
    content: Yahweh
  - type: text
    content: ' gives us this land, we’ll honor our promise and treat you kindly.”'
  '15':
  - type: text
    content: 'Rahab’s house was built into the city wall, '
  - type: note
    content: That is, a section of the city wall formed the outside wall of Rahab’s house. Since this clause is not found in the Septuagint, some scholars believe it was a later scribal addition to the text.
  - type: text
    content: 'so she let them down from the window by a rope. '
  '16':
  - type: text
    content: She told them, “Head for the hill country and hide. The men chasing you won’t find you there. Hide for three days until they have returned, then you’ll be safe to go your way.”
  '17':
  - type: text
    content: But the men warned her, “
  - type: text
    content: You must do what we say, or
  - type: text
    content: ' we will not be bound to the oath you made us swear. '
  '18':
  - type: text
    content: 'When our invasion begins, bring all your family together in your house—your father and mother, your brothers and sisters, and all their families. And tie this crimson rope '
  - type: note
    content: This crimson rope can be seen in the light of the New Testament as an emblem of the blood of Jesus. Faith in Christ’s blood brings us salvation. Rahab experienced a personal “Passover” because of the blood (crimson) applied to her house. Both Passover blood and the crimson rope were described in Hebrew as oth, “a sign.” See Ex. 12:13; Josh. 2:12.
  - type: text
    content: 'in the same window through which you let us down. '
  '19':
  - type: text
    content: 'Remember, if anyone ventures outside your house, his death will be his own fault, '
  - type: note
    content: Literally “his blood will be on his own head.”
  - type: text
    content: 'not ours! But if anyone inside your house is harmed, then we will be held responsible. '
  '2':
  - type: text
    content: 'The king of Jericho was told: “Some Israelites have come into the city tonight to spy out the entire land. '
  - type: text
    content: They’re in Rahab’s house
  - type: text
    content: '.” '
  '20':
  - type: text
    content: And if you disclose our mission, we will be released from the oath you made us swear.”
  '21':
  - type: text
    content: Rahab replied in agreement, “Let it be as you say.” And she sent them away, and after they departed, she tied the crimson rope in her window.
  '22':
  - type: text
    content: The spies went straight to the hill country and hid there for three days, until the pursuers turned back. The king’s men had scoured the countryside without finding them.
  '23':
  - type: text
    content: 'Then the two men '
  - type: note
    content: The two spies represent “two witnesses” to establish and confirm their report. See Num. 13–14; Rev. 11:3–12.
  - type: text
    content: 'came down from the hills and crossed back over '
  - type: text
    content: the Jordan to their camp
  - type: text
    content: '. They reported to Joshua son of Nun all that had happened to them: '
  '24':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' has certainly handed over the entire land into our hands! All the people of the land melt in fear before us!”'
  '3':
  - type: text
    content: 'So the king sent messengers to Rahab, who said to her: “Turn over the men who entered your house. They’re here to spy out our land.” '
  '4':
  - type: text
    content: But Rahab had already hidden the two men.
  - type: text
    content: '“Yes,” she said. “The men came to me, but I had no idea where they were from. '
  '5':
  - type: text
    content: 'They left at sundown, just before the city gates were closed at night. Who knows where they went. Quick! Go after them, and maybe you can catch them!” '
  - type: note
    content: Rahab protected the spies at the risk of her own life. She was a woman of faith. See Heb. 11:31; James 2:25.
  '6':
  - type: text
    content: '(Rahab had hidden the men on her rooftop under stalks of flax '
  - type: note
    content: Flax is a plant from whose stem a fiber was made that was woven into linen cloth. The valiant and virtuous woman (representing the radiant bride of Christ) also worked with flax. See footnote on Prov. 31:13.
  - type: text
    content: 'she had spread out '
  - type: text
    content: to dry
  - type: text
    content: ' on the roof.) '
  '7':
  - type: text
    content: So the men of Jericho went out to search for the spies, and the city gates were shut behind them. They searched for them as far as where the path crosses the Jordan.
  - type: heading
    content: Rahab’s Pact with the Spies
  '8':
  - type: text
    content: 'Before the spies had gone to sleep, Rahab went up to the rooftop '
  '9':
  - type: text
    content: 'and said to them, “I know that '
  - type: text
    content: Yahweh
  - type: text
    content: ' has given you this land. Everyone is absolutely terrified, and we are all paralyzed with fear '
  - type: note
    content: Or “everyone’s heart melts with fear.”
  - type: text
    content: 'because of you. '
