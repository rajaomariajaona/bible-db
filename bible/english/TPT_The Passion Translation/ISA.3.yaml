  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the Sovereign One, Commander of Angel Armies,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: has spoken.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cleansing the Daughters of Zion
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Here is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The daughters of Zion are proud,
- type: usfm
  marker: q1
  children:
  - type: text
    text: walking about arrogantly with their noses in the air.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “with an outstretched neck.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their eyes are seductive as they skip along
- type: usfm
  marker: q1
  children:
  - type: text
    text: with jewelry jingling on their ankles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Metaphorically, these “daughters of Zion” could represent churches today that walk in pride, flirting with the world. In ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '4'
      metadata:
        usfm: ISA.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', they lay hold of one man, Jesus Christ.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So the Lord '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
