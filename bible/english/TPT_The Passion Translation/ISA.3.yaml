- type: usfm
  marker: q1
  children:
  - type: text
    text: for they publicly flaunt their sin like Sodom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: not even trying to hide it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 3:3
      metadata:
        usfm: JER.3.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Woe to their souls, for they invite
- type: usfm
  marker: q1
  children:
  - type: text
    text: disaster upon themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yet reassure the righteous; it will go well with them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will fully enjoy the reward of their deeds.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The lovers of God, even in a time of difficulty, can enjoy the sweet fruits of seeking God and serving his kingdom. They will reap the good seeds they planted, for seeds turn into fruit. The fruit of their deeds is the holy confidence that God is with them, even in a season of judgment. We can know it will go well with us, for the message of hope is this: Tell the righteous they can still be joyful and it will be well with them.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But woe to the guilty,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah used the phrase “woe to the guilty” twenty-two times. (One time he used it about himself.)
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they will get fully what they deserve!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: My people, mockers exploit you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and creditors '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “women.”
    marker-yv: yv-n
  - type: text
    text: rule over you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My people, your leaders mislead you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and confuse you with their guidance.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew appears to read “My people, his oppressors he deals with severely, and women rule over them. My people, your guides oppress you and confuse [a homonym for “swallow up”] the way of your paths.” It is difficult to understand the correct meaning of the text, and it is debated among scholars.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
