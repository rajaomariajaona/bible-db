      text: '14'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' comes to issue the guilty verdict'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'of the elders and leaders of his people, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are the ones who have ruined the nation!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the vineyard,” which is a metaphor for God’s vineyard, the nation of Israel. In the New Testament, God’s vineyard is the church, the source of joy and blessing to the nations. To be leaders in God’s kingdom means being examples of purity, avoiding every form of corruption.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your houses are full of what you’ve stolen from the poor!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: What gives you the right to crush my people
- type: usfm
  marker: q1
  children:
  - type: text
    text: by shoving the faces of the poor into the dirt?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “by grinding the faces of the poor.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 22:22–23
      metadata:
        usfm: PRO.22.22+PRO.22.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
