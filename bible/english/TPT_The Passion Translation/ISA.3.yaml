document_id: ISA.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: When God Rises to Judge
  - type: text
    content: Behold—
  - type: text
    content: Yahweh
  - type: text
    content: ', the Sovereign One,'
  - type: text
    content: the Commander of Angel Armies, is about to cut off
  - type: text
    content: from Jerusalem and Judah every source of their
  - type: text
    content: 'support and security, '
  - type: note
    content: “Support and security” is a play on words similar to “bag and baggage” or “house and home.”
  - type: text
    content: including all food supplies and water.
  '10':
  - type: text
    content: Yet reassure the righteous; it will go well with them!
  - type: text
    content: They will fully enjoy the reward of their deeds.
  - type: note
    content: 'The lovers of God, even in a time of difficulty, can enjoy the sweet fruits of seeking God and serving his kingdom. They will reap the good seeds they planted, for seeds turn into fruit. The fruit of their deeds is the holy confidence that God is with them, even in a season of judgment. We can know it will go well with us, for the message of hope is this: Tell the righteous they can still be joyful and it will be well with them.'
  '11':
  - type: text
    content: But woe to the guilty,
  - type: note
    content: Isaiah used the phrase “woe to the guilty” twenty-two times. (One time he used it about himself.)
  - type: text
    content: for they will get fully what they deserve!
  '12':
  - type: text
    content: My people, mockers exploit you
  - type: text
    content: 'and creditors '
  - type: note
    content: Or “women.”
  - type: text
    content: rule over you.
  - type: text
    content: My people, your leaders mislead you
  - type: text
    content: and confuse you with their guidance.
  - type: note
    content: As translated from the Septuagint. The Hebrew appears to read “My people, his oppressors he deals with severely, and women rule over them. My people, your guides oppress you and confuse [a homonym for “swallow up”] the way of your paths.” It is difficult to understand the correct meaning of the text, and it is debated among scholars.
  - type: heading
    content: The Judge in His Courtroom
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' is taking his rightful place in court;'
  - type: text
    content: he is rising to judge his people.
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ' comes to issue the guilty verdict'
  - type: text
    content: 'of the elders and leaders of his people, saying:'
  - type: text
    content: “You are the ones who have ruined the nation!
  - type: note
    content: Or “the vineyard,” which is a metaphor for God’s vineyard, the nation of Israel. In the New Testament, God’s vineyard is the church, the source of joy and blessing to the nations. To be leaders in God’s kingdom means being examples of purity, avoiding every form of corruption.
  - type: text
    content: Your houses are full of what you’ve stolen from the poor!
  '15':
  - type: text
    content: What gives you the right to crush my people
  - type: text
    content: by shoving the faces of the poor into the dirt?”
  - type: note
    content: Or “by grinding the faces of the poor.” See Prov. 22:22–23.
  - type: text
    content: Yahweh
  - type: text
    content: ', the Sovereign One, Commander of Angel Armies,'
  - type: text
    content: has spoken.
  - type: heading
    content: Cleansing the Daughters of Zion
  '16':
  - type: text
    content: 'Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “The daughters of Zion are proud,
  - type: text
    content: walking about arrogantly with their noses in the air.
  - type: note
    content: Or “with an outstretched neck.”
  - type: text
    content: Their eyes are seductive as they skip along
  - type: text
    content: with jewelry jingling on their ankles.
  - type: note
    content: Metaphorically, these “daughters of Zion” could represent churches today that walk in pride, flirting with the world. In ch. 4, they lay hold of one man, Jesus Christ.
  '17':
  - type: text
    content: 'So the Lord '
  - type: note
    content: The Hebrew is the name Adonai; also in v. 18.
  - type: text
    content: will afflict the foreheads
  - type: text
    content: of the daughters of Zion with scabs;
  - type: note
    content: A scab would make them unclean and unable to come before God as priests (see Lev. 13:2–6). Scabs are unhealed wounds. Our thoughts (foreheads) must be clean and healed from any past wounds.
  - type: text
    content: Yahweh
  - type: text
    content: ' will make the front of their heads bald in that day.”'
  '18':
  - type: text
    content: 'In that day, the Lord will strip away '
  - type: text
    content: their vanity
  - type: text
    content: —
  - type: text
    content: their beautiful ankle jewelry, necklaces, crescent pendants,
  - type: text
    content: earrings, bracelets, and veils of shimmering gauze.
  '2':
  - type: text
    content: He will remove
  - type: text
    content: ' their heroes and soldiers,'
  - type: text
    content: prophets and judges, their psychics and statesmen,
  '20':
  - type: text
    content: Gone will be
  - type: text
    content: ' their elaborate headdresses and ankle chains,'
  - type: text
    content: 'their sashes, sachets, '
  - type: note
    content: Or “perfume boxes” (lit. “houses of breath”).
  - type: text
    content: and charms.
  '21':
  - type: text
    content: He will snatch away
  - type: text
    content: ' their signet rings and nose rings,'
  '22':
  - type: text
    content: their stately gowns, capes, shawls, cloaks, and purses,
  '23':
  - type: text
    content: 'hand mirrors, fine linen garments '
  - type: text
    content: interwoven
  - type: text
    content: with gold and purple, turbans, and long veils.
  - type: note
    content: When we put our emphasis on what is outward and ignore purity within, we stand in danger of losing it all. God looks upon the heart, not the outward appearance (see 1 Sam. 16:7).
  '24':
  - type: text
    content: 'A stench will take the place of '
  - type: text
    content: seductive
  - type: text
    content: ' perfumes;'
  - type: text
    content: a rope will take the place of a sash,
  - type: text
    content: baldness for braided hair, rags instead of a fine robe,
  - type: text
    content: and the brand of a captive instead of beauty.
  '25':
  - type: text
    content: Your men will fall on the battlefield
  - type: text
    content: and your heroes will die in war.
  '26':
  - type: text
    content: Cries of mourning will be heard at the city gates;
  - type: text
    content: with the anguish of such great loss,
  - type: text
    content: 'she will sit down and '
  - type: text
    content: grieve
  - type: text
    content: ' in the dirt.'
  '3':
  - type: text
    content: their respected military leaders,
  - type: text
    content: pillars of the community,
  - type: note
    content: Or “the ones lifted up with respect to their faces”; that is, their respected elite.
  - type: text
    content: their counselors, skilled craftsmen,
  - type: note
    content: See 2 Kings 24:14. The Hebrew word charashim is a homonym that can be translated either “skilled craftsmen” or “magicians.”
  - type: text
    content: and those professional charmers.
  - type: note
    content: Or “eloquent orators,” “clever enchanters,” “intelligentsia” (LXX).
  '4':
  - type: text
    content: 'I will make '
  - type: text
    content: inexperienced
  - type: text
    content: ' youth their rulers,'
  - type: text
    content: 'and children '
  - type: note
    content: Or “mockers” (LXX).
  - type: text
    content: will govern them.
  '5':
  - type: text
    content: Everyone will take advantage of everyone else,
  - type: text
    content: and neighbor will struggle against neighbor.
  - type: text
    content: The youth will not respect their elders,
  - type: text
    content: and the dishonorable will sneer at those worthy of honor.
  '6':
  - type: text
    content: One man will even seize a relative
  - type: text
    content: 'right in his father’s house '
  - type: text
    content: and say
  - type: text
    content: ','
  - type: text
    content: “
  - type: text
    content: At least
  - type: text
    content: ' you own a coat; you be our leader!'
  - type: text
    content: You can oversee this heap of ruins!”
  '7':
  - type: text
    content: In that day he will cry out,
  - type: text
    content: '“I have no remedy '
  - type: text
    content: for this mess
  - type: text
    content: '!'
  - type: note
    content: Or “I will not be a healer” or “I will not be your leader” (LXX).
  - type: text
    content: I don’t have any food or clothes either,
  - type: text
    content: so don’t make me your leader!”
  - type: note
    content: Ignoring leadership is the definition of anarchy. As we ignore the one who is our true leader, we are left with those who have no remedy. The righteous King has a cloak of righteousness to give us if we will only turn to him.
  '8':
  - type: text
    content: Jerusalem has stumbled and Judah has fallen
  - type: text
    content: because their words and their works
  - type: text
    content: are defiant before the face of the Lord’s glorious presence.
  - type: note
    content: Or “provoking the glance of his glorious eyes” (see Hab. 1:13). Sin provokes the glorious eyes of God. This is the opposite of finding favor in his eyes.
  '9':
  - type: text
    content: The look on their impudent faces says it all,
  - type: text
    content: for they publicly flaunt their sin like Sodom,
  - type: text
    content: not even trying to hide it.
  - type: note
    content: See Jer. 3:3.
  - type: text
    content: Woe to their souls, for they invite
  - type: text
    content: disaster upon themselves.
