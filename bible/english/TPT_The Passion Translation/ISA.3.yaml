    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: will afflict the foreheads
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the daughters of Zion with scabs;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A scab would make them unclean and unable to come before God as priests (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 13:2–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Scabs are unhealed wounds. Our thoughts (foreheads) must be clean and healed from any past wounds.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will make the front of their heads bald in that day.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: 'In that day, the Lord will strip away '
  - type: usfm
    marker: it
    children:
    - type: text
      text: their vanity
  - type: text
    text: —
- type: usfm
  marker: q1
