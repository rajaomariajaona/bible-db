- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Everyone will take advantage of everyone else,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and neighbor will struggle against neighbor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The youth will not respect their elders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the dishonorable will sneer at those worthy of honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: One man will even seize a relative
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'right in his father’s house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and say
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: At least
  - type: text
    text: ' you own a coat; you be our leader!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can oversee this heap of ruins!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In that day he will cry out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“I have no remedy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for this mess
  - type: text
    text: '!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will not be a healer” or “I will not be your leader” (LXX).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t have any food or clothes either,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so don’t make me your leader!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ignoring leadership is the definition of anarchy. As we ignore the one who is our true leader, we are left with those who have no remedy. The righteous King has a cloak of righteousness to give us if we will only turn to him.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Jerusalem has stumbled and Judah has fallen
- type: usfm
  marker: q1
  children:
  - type: text
    text: because their words and their works
- type: usfm
  marker: q1
  children:
  - type: text
    text: are defiant before the face of the Lord’s glorious presence.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “provoking the glance of his glorious eyes” (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hab. 1:13
      metadata:
        usfm: HAB.1.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Sin provokes the glorious eyes of God. This is the opposite of finding favor in his eyes.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
