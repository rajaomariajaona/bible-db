document_id: PSA.43,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Light and Truth
  - type: text
    content: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: note
    content: Originally there was no inscription for this psalm as it was part of Ps. 42.
  - type: text
    content: A contemplative poem for instruction
  - type: text
    content: God, clear my name.
  - type: text
    content: Plead my case against the unjust charges
  - type: text
    content: of these ungodly workers of wickedness.
  - type: text
    content: Deliver me from these lying degenerates.
  '2':
  - type: text
    content: 'For you are where my strength comes from '
  - type: note
    content: Or “God of my strength.”
  - type: text
    content: and my protector,
  - type: text
    content: so why would you leave me now?
  - type: text
    content: Must I be covered with gloom
  - type: text
    content: while the enemy comes after me, gloating with glee?
  '3':
  - type: text
    content: Pour into me the brightness of your daybreak!
  - type: text
    content: Pour into me your rays of revelation-truth!
  - type: text
    content: Let them comfort and gently lead me onto the shining path,
  - type: text
    content: showing the way into your burning presence,
  - type: text
    content: into your many sanctuaries of holiness.
  '4':
  - type: text
    content: Then I will come closer to your very altar
  - type: text
    content: until I come before you, the God of my ecstatic joy!
  - type: text
    content: I will praise you with the harp that plays in my heart to you,
  - type: text
    content: my God, my magnificent God!
  '5':
  - type: text
    content: Then I will say to my soul,
  - type: text
    content: “Don’t be discouraged; don’t be disturbed,
  - type: text
    content: for I fully expect my Savior-God to break through for me.
  - type: text
    content: Then I’ll have plenty of reasons to praise him all over again.”
  - type: text
    content: Yes, he is my saving grace!
