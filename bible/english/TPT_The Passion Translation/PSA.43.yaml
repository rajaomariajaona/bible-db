- type: usfm
  marker: d
  children:
  - type: text
    text: A contemplative poem for instruction
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God, clear my name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plead my case against the unjust charges
- type: usfm
  marker: q1
  children:
  - type: text
    text: of these ungodly workers of wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Deliver me from these lying degenerates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For you are where my strength comes from '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 43:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “God of my strength.”
    marker-yv: yv-n
  - type: text
    text: and my protector,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so why would you leave me now?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Must I be covered with gloom
- type: usfm
  marker: q1
  children:
  - type: text
    text: while the enemy comes after me, gloating with glee?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pour into me the brightness of your daybreak!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour into me your rays of revelation-truth!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them comfort and gently lead me onto the shining path,
- type: usfm
  marker: q1
  children:
  - type: text
    text: showing the way into your burning presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: into your many sanctuaries of holiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Then I will come closer to your very altar
- type: usfm
  marker: q1
  children:
  - type: text
    text: until I come before you, the God of my ecstatic joy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will praise you with the harp that plays in my heart to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my God, my magnificent God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then I will say to my soul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t be discouraged; don’t be disturbed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I fully expect my Savior-God to break through for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then I’ll have plenty of reasons to praise him all over again.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, he is my saving grace!
