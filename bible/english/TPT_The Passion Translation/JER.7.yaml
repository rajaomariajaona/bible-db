document_id: JER.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Preaches in the Temple
  - type: text
    content: 'This is the message that '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave to Jeremiah. '
  '10':
  - type: text
    content: 'and then come and stand in my presence? You think you can come into this house called by my name and say, “We are safe!”—only to keep doing all these disgusting things? '
  '11':
  - type: text
    content: 'Do you really consider this house that bears my name to be a robbers’ den? '
  - type: note
    content: Or “robbers’ cave.” See Matt. 21:13; Mark 11:17; Luke 19:46.
  - type: text
    content: 'I know everything that you have been doing! I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '12':
  - type: text
    content: '“ ‘Just go to the place where my sanctuary once stood in Shiloh, '
  - type: note
    content: Shiloh was a town about eighteen miles (twenty-nine kilometers) north of Jerusalem and was the pre-Jerusalem capital of Israel throughout the period of the judges. Archaeological evidence indicates that the Philistines destroyed it around 1050 BC, following the battle mentioned in 1 Sam. 4:1–11. Most scholars conclude that the ruins of Shiloh were still visible in Jeremiah’s time. Yahweh was telling his people that if they think they are safe because they have a temple in Jerusalem, they should just go and check out what happened to Shiloh.
  - type: text
    content: 'where I first made a dwelling place for my name. '
  - type: text
    content: And when you see its rubble
  - type: text
    content: ', understand what I did in response to the wickedness of the people of Israel. '
  '13':
  - type: text
    content: 'Even while you were doing these things, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', spoke to you over and over and called to you, but you would neither listen nor answer me. '
  '14':
  - type: text
    content: 'So I will do to this temple what I did before in Shiloh. You have put your trust in this temple, which bears my name, but I will destroy this very sanctuary that I gave to you and your ancestors. '
  '15':
  - type: text
    content: And I will cast you away from my presence as I cast away all your brothers, all the descendants of Ephraim.’ ”
  - type: note
    content: Ephraim is a reference to the Northern Kingdom of Israel that was taken into exile in 722 BC.
  - type: heading
    content: Israel Continues to Disobey God
  '16':
  - type: text
    content: “
  - type: text
    content: Jeremiah
  - type: text
    content: ', do not pray for these people, do not lift up a cry or a prayer for them, and do not intercede with me, '
  - type: note
    content: The Hebrew word for “intercede” is pagaʿ and can also be translated “to fall upon,” “to encounter,” “to strike,” or “to confront.”
  - type: text
    content: 'for I will not hear you. '
  '17':
  - type: text
    content: 'Don’t you see what they’re doing in the cities of Judah and in the streets of Jerusalem? '
  '18':
  - type: text
    content: 'The children gather wood, the fathers kindle the fire, and the wives knead dough to make '
  - type: text
    content: ritual
  - type: text
    content: ' cakes '
  - type: note
    content: The cakes are thought to have been star-shaped or rectangular and were stamped with the image of the goddess (see 44:19).
  - type: text
    content: 'for '
  - type: text
    content: the goddess Ishtar
  - type: text
    content: ', '
  - type: text
    content: known as
  - type: text
    content: ' the Queen of Heaven. '
  - type: note
    content: The Queen of Heaven, the most famous of Mesopotamian goddesses, was the Canaanite fertility goddess “Ishtar” (also known as Astarte, Ashtoreth, or Asherah). She was recognized as the goddess of sexuality and war. The Targum identifies her as Venus.
  - type: text
    content: 'They also pour out drink offerings to other gods to defy me. '
  '19':
  - type: text
    content: 'Yet, I am not the one they are hurting, says '
  - type: text
    content: Yahweh
  - type: text
    content: '; they are hurting themselves to their own shame. '
  '2':
  - type: text
    content: '“Go stand at the gate of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s house and proclaim this word: ‘Hear this word from '
  - type: text
    content: Yahweh
  - type: text
    content: ', all you people of Judah who come through these gates to worship him. '
  '20':
  - type: text
    content: 'Therefore, listen to the words of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ': ‘My anger and my wrath will be poured out in this place, '
  - type: note
    content: That is, the land of Israel and the temple.
  - type: text
    content: on the people and the animals, on the trees and on the crops; my anger will burn as a fire that no one can put out.’
  '21':
  - type: text
    content: '“This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies says: ‘You might as well eat all your burnt offerings yourselves. '
  - type: note
    content: Or “Add your whole burnt offerings to your sacrifices and eat the flesh.”
  '22':
  - type: text
    content: 'For when I led your ancestors out of Egypt, I did not command them to bring me burnt offerings and sacrifices. '
  '23':
  - type: text
    content: 'Rather, I commanded them: “Listen to my voice, and I will be your God, and you will be my people. Live your lives according to what I command you that all may go well with you.” '
  '24':
  - type: text
    content: 'But they did not listen or obey. '
  - type: note
    content: Or “or bend the ear.”
  - type: text
    content: 'They followed their own stubborn plans of their evil hearts. They '
  - type: text
    content: disrespected me
  - type: text
    content: ' and went backward, not forward. '
  '25':
  - type: text
    content: 'From the day that I led your ancestors out of Egypt until now, I have persistently sent you my servants the prophets, '
  '26':
  - type: text
    content: but my people did not listen to me or obey; rather, they stubbornly did more evil than their fathers.’
  '27':
  - type: text
    content: '“And when you tell them all this, they will not hear you. You will call to them, but they won’t respond to you. '
  '28':
  - type: text
    content: 'Then you will say to them: ‘You are the nation that refused to listen to the voice of your God, '
  - type: text
    content: Yahweh
  - type: text
    content: '. Truth '
  - type: note
    content: Or “Faithfulness.”
  - type: text
    content: 'has perished and disappeared from their lips, for they did not accept '
  - type: text
    content: Yahweh
  - type: text
    content: ’s
  - type: text
    content: ' correction.’ ”'
  - type: heading
    content: Sinful Acts in the Hinnom Valley
  '29':
  - type: text
    content: “
  - type: text
    content: People of Jerusalem
  - type: text
    content: ', cut off your long hair '
  - type: note
    content: This long hair was characteristic of those who had taken the Nazirite vow of dedication to Yahweh (see Num. 6:5). The people had broken their vow to Yahweh, so they were told to cut off their hair as a symbol of mourning over what they had done.
  - type: text
    content: 'and throw it away, and raise your song of mourning on the hilltops, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has rejected and abandoned the generation of his fury. '
  '3':
  - type: text
    content: 'Here’s what the God of Israel, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says: '
  - type: note
    content: 'Jeremiah was a bold, obedient prophet. There he stood, at the gateway of the temple, telling the masses that they had embraced a phony form of worship and must repent or perish. Jeremiah’s first message was The Sin of the Nation (see 2:1–3:5), and his second was The Coming Devastation from the North (see 3:6–6:30). Now, Jeremiah confronted worshipers going into the temple with his third message: The Threat of Exile (see 7:1–10:25).'
  - type: text
    content: 'Change your ways and start living right, and I will let you dwell '
  - type: note
    content: Some early versions read “I will dwell with you in this land.”
  - type: text
    content: 'in this land. '
  '30':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: ‘The people of Judah have done what is evil before my eyes. They have defiled the house that bears my name by placing their detestable idols inside it. '
  '31':
  - type: text
    content: 'And in the Hinnom Valley, '
  - type: note
    content: The Hinnom Valley, or the Valley of Ben Hinnom, is south of Jerusalem. One section of the valley was called Topheth (also spelled Tophet), where children were offered as sacrifices to the god Molech and burned in the fire (see 2 Kings 23:10). The name Topheth is likely derived from the Hebrew word top (or toph), meaning “a drum,” because the cries of children being sacrificed were masked by the sounds of beating on drums or tambourines (see Rashi on Jer. 7:31). However, some scholars believe Topheth derives from an Aramaic word meaning “fire-stove,” “fireplace,” or “roaster.” This valley, because of its evil history, became a symbol of the abode of the wicked after death. The Greek contraction of “Ben Hinnom” is Gehenna and came to signify hell as the abode of the wicked. Jesus used this word for “hell” eleven times in his discourses.
  - type: text
    content: 'they have built shrines of Topheth to sacrifice their sons and daughters in the fire—something I never commanded, nor did it ever enter my thoughts. '
  '32':
  - type: text
    content: 'Therefore, the time is coming, says '
  - type: text
    content: Yahweh
  - type: text
    content: ', when it will not be known as Topheth or the Hinnom Valley but the Valley of Slaughter, for people will bury their dead in Topheth until no room is left. '
  '33':
  - type: text
    content: 'Their corpses will be food for the birds and wild animals with no one to frighten them away. '
  '34':
  - type: text
    content: 'I will silence the sounds of mirth and gladness from the cities of Judah and the streets of Jerusalem, '
  - type: text
    content: the happy sounds of wedding feasts
  - type: text
    content: —the voice of the bride and bridegroom, for the land will become a wasteland.’ ”
  '4':
  - type: text
    content: 'Don’t fool yourselves by trusting the deceptive words, saying: “The temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: is here
  - type: text
    content: ', the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: is here
  - type: text
    content: ', the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: is here
  - type: text
    content: ', '
  - type: note
    content: The three-fold repetition of the words “the temple of Yahweh” suggests that it was used in Jeremiah’s day for temple liturgy.
  - type: text
    content: so we are safe
  - type: text
    content: '.” '
  '5':
  - type: text
    content: 'For if you truly change your ways and start living right, if you deal justly with one another, '
  '6':
  - type: text
    content: 'if you don’t mistreat the foreigner, the orphan, and the widow, '
  - type: note
    content: The role of the prophets was to decry injustice and insist that the people reform their ways. God always starts with the heart of his people to bring reformation to a nation.
  - type: text
    content: 'if you don’t shed innocent blood in this land, if you stop your self-destructive ways of chasing after other gods, '
  '7':
  - type: text
    content: then I will let you dwell in this place, here in the land that I gave to your forefathers for all time.
  '8':
  - type: text
    content: '“ ‘Look, you keep putting your trust in worthless lies. '
  - type: note
    content: Or “in the words of The Lie [Baal].”
  '9':
  - type: text
    content: 'You think you can steal and murder, commit adultery and perjury, burn incense to Baal, and go after other gods that you have not known, '
