verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Preaches in the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the message that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave to Jeremiah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and then come and stand in my presence? You think you can come into this house called by my name and say, “We are safe!”—only to keep doing all these disgusting things? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you really consider this house that bears my name to be a robbers’ den? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “robbers’ cave.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 21:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 19:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'I know everything that you have been doing! I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Just go to the place where my sanctuary once stood in Shiloh, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shiloh was a town about eighteen miles (twenty-nine kilometers) north of Jerusalem and was the pre-Jerusalem capital of Israel throughout the period of the judges. Archaeological evidence indicates that the Philistines destroyed it around 1050 BC, following the battle mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 4:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Most scholars conclude that the ruins of Shiloh were still visible in Jeremiah’s time.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was telling his people that if they think they are safe because they have a temple in Jerusalem, they should just go and check out what happened to Shiloh.
      marker-yv: yv-n
    - type: text
      text: 'where I first made a dwelling place for my name. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: And when you see its rubble
    - type: text
      text: ', understand what I did in response to the wickedness of the people of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even while you were doing these things, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', spoke to you over and over and called to you, but you would neither listen nor answer me. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I will do to this temple what I did before in Shiloh. You have put your trust in this temple, which bears my name, but I will destroy this very sanctuary that I gave to you and your ancestors. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will cast you away from my presence as I cast away all your brothers, all the descendants of Ephraim.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ephraim is a reference to the Northern Kingdom of Israel that was taken into exile in 722 BC.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Continues to Disobey God
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah
    - type: text
      text: ', do not pray for these people, do not lift up a cry or a prayer for them, and do not intercede with me, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “intercede” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pagaʿ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and can also be translated “to fall upon,” “to encounter,” “to strike,” or “to confront.”
      marker-yv: yv-n
    - type: text
      text: 'for I will not hear you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t you see what they’re doing in the cities of Judah and in the streets of Jerusalem? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children gather wood, the fathers kindle the fire, and the wives knead dough to make '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ritual
    - type: text
      text: ' cakes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The cakes are thought to have been star-shaped or rectangular and were stamped with the image of the goddess (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 44:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the goddess Ishtar
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: known as
    - type: text
      text: ' the Queen of Heaven. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Queen of Heaven, the most famous of Mesopotamian goddesses, was the Canaanite fertility goddess “Ishtar” (also known as Astarte, Ashtoreth, or Asherah). She was recognized as the goddess of sexuality and war. The Targum identifies her as Venus.
      marker-yv: yv-n
    - type: text
      text: 'They also pour out drink offerings to other gods to defy me. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet, I am not the one they are hurting, says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '; they are hurting themselves to their own shame. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go stand at the gate of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s house and proclaim this word: ‘Hear this word from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', all you people of Judah who come through these gates to worship him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, listen to the words of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ': ‘My anger and my wrath will be poured out in this place, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the land of Israel and the temple.
      marker-yv: yv-n
    - type: text
      text: on the people and the animals, on the trees and on the crops; my anger will burn as a fire that no one can put out.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, Commander of Angel Armies says: ‘You might as well eat all your burnt offerings yourselves. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Add your whole burnt offerings to your sacrifices and eat the flesh.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when I led your ancestors out of Egypt, I did not command them to bring me burnt offerings and sacrifices. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rather, I commanded them: “Listen to my voice, and I will be your God, and you will be my people. Live your lives according to what I command you that all may go well with you.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they did not listen or obey. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “or bend the ear.”
      marker-yv: yv-n
    - type: text
      text: 'They followed their own stubborn plans of their evil hearts. They '
    - type: usfm
      marker: it
      children:
      - type: text
        text: disrespected me
    - type: text
      text: ' and went backward, not forward. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the day that I led your ancestors out of Egypt until now, I have persistently sent you my servants the prophets, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but my people did not listen to me or obey; rather, they stubbornly did more evil than their fathers.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And when you tell them all this, they will not hear you. You will call to them, but they won’t respond to you. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will say to them: ‘You are the nation that refused to listen to the voice of your God, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. Truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Faithfulness.”
      marker-yv: yv-n
    - type: text
      text: 'has perished and disappeared from their lips, for they did not accept '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’s
    - type: text
      text: ' correction.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sinful Acts in the Hinnom Valley
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: People of Jerusalem
    - type: text
      text: ', cut off your long hair '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This long hair was characteristic of those who had taken the Nazirite vow of dedication to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The people had broken their vow to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', so they were told to cut off their hair as a symbol of mourning over what they had done.'
      marker-yv: yv-n
    - type: text
      text: 'and throw it away, and raise your song of mourning on the hilltops, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has rejected and abandoned the generation of his fury. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here’s what the God of Israel, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, says: '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jeremiah was a bold, obedient prophet. There he stood, at the gateway of the temple, telling the masses that they had embraced a phony form of worship and must repent or perish. Jeremiah’s first message was The Sin of the Nation (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2:1–3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and his second was The Coming Devastation from the North (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 3:6–6:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Now, Jeremiah confronted worshipers going into the temple with his third message: The Threat of Exile (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 7:1–10:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Change your ways and start living right, and I will let you dwell '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some early versions read “I will dwell with you in this land.”
      marker-yv: yv-n
    - type: text
      text: 'in this land. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: ‘The people of Judah have done what is evil before my eyes. They have defiled the house that bears my name by placing their detestable idols inside it. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in the Hinnom Valley, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hinnom Valley, or the Valley of Ben Hinnom, is south of Jerusalem. One section of the valley was called Topheth (also spelled Tophet), where children were offered as sacrifices to the god Molech and burned in the fire (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 23:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Topheth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is likely derived from the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: top
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: toph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), meaning “a drum,” because the cries of children being sacrificed were masked by the sounds of beating on drums or tambourines (see Rashi on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 7:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). However, some scholars believe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Topheth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: derives from an Aramaic word meaning “fire-stove,” “fireplace,” or “roaster.” This valley, because of its evil history, became a symbol of the abode of the wicked after death. The Greek contraction of “Ben Hinnom” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gehenna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and came to signify hell as the abode of the wicked. Jesus used this word for “hell” eleven times in his discourses.
      marker-yv: yv-n
    - type: text
      text: 'they have built shrines of Topheth to sacrifice their sons and daughters in the fire—something I never commanded, nor did it ever enter my thoughts. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, the time is coming, says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', when it will not be known as Topheth or the Hinnom Valley but the Valley of Slaughter, for people will bury their dead in Topheth until no room is left. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their corpses will be food for the birds and wild animals with no one to frighten them away. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will silence the sounds of mirth and gladness from the cities of Judah and the streets of Jerusalem, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the happy sounds of wedding feasts
    - type: text
      text: —the voice of the bride and bridegroom, for the land will become a wasteland.’ ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t fool yourselves by trusting the deceptive words, saying: “The temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
