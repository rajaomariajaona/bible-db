verses:
  '1':
  - type: heading
    content: Prophecy against Ammon
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 25 is the tenth panel (J) in the chiastic parallel structure in Ezekiel. This section is the first of three panels that contain oracles of judgment against the nations. Chapter 25 includes divine judgments against Ammon, Moab, Edom, and Philistia, of whom the first two will be destroyed by the Babylonians (“the tribes of the eastern desert,” v. 4) and the latter two by Israel and Yahweh. This panel J constitutes the corresponding parallel with panel J1 in 28:20–32:32, which contains oracular judgments against Sidon and Egypt—the latter at the hands of the Babylonians. Chapters 25–32 detail a series of prophecies of judgment against seven nations surrounding the land of Israel. God begins with Ammon, which is due east of Israel. The Ammonites can represent the principle of mixture. They lived on the edge of the desert north of Moab. Their origin was an incestuous relationship (see Gen. 19:37–38; see also Judg. 10; 1 Sam. 11; Amos 1:13–15).
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '10':
  - type: text
    content: 'To the same eastern desert tribes that invade Ammon, I will hand over Moab so that Ammon will be forgotten forever as a nation. '
  '11':
  - type: text
    content: 'I will carry out my punishment of Moab, and then they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: Prophecy against Edom
  '12':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “The people of Edom '
  - type: note
    content: Although the Edomites were related to the Israelites as descendants of Esau (see Gen. 25:23; Deut. 23:7), they lived as enemies throughout their history. It is believed the Edomites joined Nebuchadnezzar in his attack on Jerusalem, rejoicing when the city was destroyed (see Ps. 137:7). The Edomites can represent the principle of the flesh or the natural man. Edom is a variant form of Adam.
  - type: text
    content: 'took revenge on the people of Judah and sinned greatly in doing so. '
  '13':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: ‘My hand will be against you, and I will slaughter every person and animal living among you. There will be no one left anywhere in the land, from Teman to Dedan, all the people will fall by the sword! '
  '14':
  - type: text
    content: 'I will use my people Israel to take my vengeance on Edom. My people will treat Edom as my furious anger demands, and they will realize that this is my vengeance! I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Prophecy against the Philistines
  '15':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “The Philistines '
  - type: note
    content: The Philistines lived on the coast of the Mediterranean Sea, southwest of Judah. They were a constant threat to Israel from the time of King David. They, too, came to the aid of Nebuchadnezzar when he attacked Jerusalem. The Philistines can represent the principle of the mind of man, an earthly mindset that wallows in the mud of humanity. They can also be likened to their champion Goliath, the giant who opposed God’s people from advancing. Goliath is a picture of the mind of man.
  - type: text
    content: 'took revenge on the people of Judah, with deep hatred. '
  - type: note
    content: Or “malice of soul.”
  - type: text
    content: 'They did their best to destroy them because of their long-standing hatred. '
  '16':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: My hand will be against the Philistines; I will exterminate the Cherethite tribe '
  - type: note
    content: The Cherethites were another tribe of people who lived in the southern territory occupied by the Philistines. “The Cherethites” was a general term used for the Philistines.
  - type: text
    content: 'and destroy the rest of the coastal peoples. '
  '17':
  - type: text
    content: 'I will execute frightful acts of vengeance and punish them in my wrath! And then they will realize that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', exacted my vengeance on them.”'
  '2':
  - type: text
    content: '“Son of man, turn toward the land of the Ammonites and prophesy against them. '
  '3':
  - type: text
    content: 'Say to them, ‘Hear the words of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '. He says to you: You gloated when my temple became unfit for my presence. '
  - type: text
    content: You celebrated
  - type: text
    content: ' when the land of Israel was left in ruins. And when the people of Judah were taken into captivity, you '
  - type: text
    content: shouted
  - type: text
    content: ', “Hooray!” '
  '4':
  - type: text
    content: 'Therefore, behold! I am handing you over to the tribes of the eastern desert to come and take possession of you. They will '
  - type: text
    content: take over your country and
  - type: text
    content: ' make their home in you. They will feast on the crops of your fields and drink the milk. '
  '5':
  - type: text
    content: 'I will turn '
  - type: text
    content: your great city
  - type: text
    content: ' Rabbah into a camel yard. Yes, I will turn '
  - type: text
    content: all the land of
  - type: text
    content: ' Ammon into sheepfolds. Then you will recognize that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '6':
  - type: text
    content: '“ ‘Furthermore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Since you have clapped your hands and danced for joy, full of malicious glee '
  - type: note
    content: Or literally “with all your malice in [your] soul.”
  - type: text
    content: 'at Israel’s fate, '
  '7':
  - type: text
    content: 'therefore behold! My mighty hand will be against you for this. I will hand you over to be looted by the nations, and I will obliterate you as a nation and you will perish as a country. I will reduce you to nothing, and then you will recognize that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: Prophecy against Moab and Edom
  '8':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “Moab '
  - type: note
    content: Although the Moabites were related to the Israelites (see Gen. 19:30–38), they became enemies when Israel came into the land after the Exodus (see Num. 22–25). They joined with the Babylonians in the attack on Jerusalem. The Moabites can represent the principle of passivity or the inability to change or grow.
  - type: text
    content: 'and Seir '
  - type: note
    content: Seir is a mountain in Edom, also known as Mount Hermon. Some translations and the Septuagint omit “Seir,” believing it to be a gloss since Edom has its own prophecy in vv. 12–14.
  - type: text
    content: 'have said that the people of Judah are no different from any other nation. '
  '9':
  - type: text
    content: 'Therefore, behold! I will '
  - type: text
    content: let your enemies
  - type: text
    content: ' clear out the cities that defend the border of Moab—your fine cities, jewels of your land—Beth Jeshimoth, '
  - type: note
    content: See Josh. 12:3.
  - type: text
    content: 'Baal-Meon, '
  - type: note
    content: See 1 Chron. 5:8.
  - type: text
    content: 'and Kiriathaim. '
  - type: note
    content: See Jer. 48:1.
