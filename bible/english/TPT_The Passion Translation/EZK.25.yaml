        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Cherethites were another tribe of people who lived in the southern territory occupied by the Philistines. “The Cherethites” was a general term used for the Philistines.
    marker-yv: yv-n
  - type: text
    text: 'and destroy the rest of the coastal peoples. '
  - type: usfm
