    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will use my people Israel to take my vengeance on Edom. My people will treat Edom as my furious anger demands, and they will realize that this is my vengeance! I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
