      - type: text
        text: 25:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Philistines lived on the coast of the Mediterranean Sea, southwest of Judah. They were a constant threat to Israel from the time of King David. They, too, came to the aid of Nebuchadnezzar when he attacked Jerusalem. The Philistines can represent the principle of the mind of man, an earthly mindset that wallows in the mud of humanity. They can also be likened to their champion Goliath, the giant who opposed God’s people from advancing. Goliath is a picture of the mind of man.
    marker-yv: yv-n
  - type: text
    text: 'took revenge on the people of Judah, with deep hatred. '
  - type: usfm
    marker: f
    children:
    - type: usfm
