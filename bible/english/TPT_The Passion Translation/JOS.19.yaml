document_id: JOS.19,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribal Land of Simeon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The families of the tribe of Simeon received the second assignment of land, which was located within the territory of Judah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The families of the tribe of Zebulun received the third assignment of land. Their boundary reached as far southeast as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the city of
    - type: text
      text: ' Sarid. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Going west, it ran to Maralah, touched Dabbesheth, and extended to the stream near Jokneam. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In the other direction, the boundary line went east to the border of Chisloth-Tabor, and from there to Daberath and Japhia; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'then it continued east of Gath-Hepher, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gath-Hepher (three miles northeast of Nazareth) was the birthplace of the prophet Jonah. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 14:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Eth Kazin, Rimmon, and turned toward Neah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The northern boundary of Zebulun passed Hannathon and ended at the valley of Iphtah El. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Their land encompassed twelve cities, including Kattath, Nahalal, Shimeon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Shimron.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:9–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Iralah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Idalah.”
      marker-yv: yv-n
    - type: text
      text: 'and Bethlehem. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not the famous Bethlehem south of Jerusalem. This Bethlehem was a town about seven and a half miles (twelve kilometers) west of Nazareth. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 12:8–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Zebulun’s families inherited all these towns and their villages.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribal Land of Issachar
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The families of the tribe of Issachar received the fourth assignment of land. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-21
    - type: text
      text: Their inheritance included
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jezreel, Kesulloth, Shunem, Hapharaim, Shion, Anaharath,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rabbith, Kishion, Ebez, Remeth, En Gannim, En Haddah, and Beth Pazzez.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-6
    - type: text
      text: Their inheritance included the towns of
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beersheba, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:2–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Beer Sheba” or “Sheba.” The Masoretic text inserts “Sheba” here, which may be a scribal error, for its addition makes the total number of towns fourteen rather than thirteen. Most modern translations include “Sheba.”
      marker-yv: yv-n
    - type: text
      text: Moladah, Hazar-Shual, Balah, Ezem,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eltolad, Bethul, Hormah, Ziklag, Beth Marcaboth, Hazar-Susah,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beth Lebaoth, and Sharuhen—thirteen towns with their villages.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Their border touched Tabor, Shahazumah, and Beth Shemesh, and ended at the Jordan River—sixteen towns and their villages. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Issachar’s families inherited all these cities and their towns.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribal Land of Asher
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The families of the tribe of Asher received the fifth assignment of land. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Their territory included the city of Helkath to Hali, Beten, Achshaph, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Allammelech, Amad, and Mishal. Their border touched Carmel to the west and Shihor Libnath. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'The eastern border went north from the city of Beth Dagon. It touched the territory of the tribe of Zebulun and the Valley of Iphtah El to the north, Beth Emek and Neiel, and extended to Cabul on the north. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'It went to Abdon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Ebron.”
      marker-yv: yv-n
    - type: text
      text: 'Rehob, Hammon, and Kanah, as far as Greater Sidon. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The boundary then turned back toward Ramah and went to the fortified city of Tyre, turned toward Hosah and came out at the sea in the region of Achzib, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ummah, Aphek, and Rehob—twenty-two towns and their villages. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Asher’s families inherited this entire region.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribal Land of Naphtali
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'The families of the tribe of Naphtali received the sixth assignment of land. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: northern
    - type: text
      text: ' border of its territory went from the town of Heleph to the oak near the town of Zaanannim, then continued to Adami Nekeb, Jabneel, and on to Lakkum, and ended at the Jordan River. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'It turned westward to Aznoth Tabor, extended from there to Hukok, touched Zebulun on the south, Asher on the west, and the Jordan on the east. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 35-38
    - type: text
      text: The fortified towns of Naphtali included
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ziddim, Zer, Hammath, Rakkath, Kinnereth,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Adamah, Ramah, Hazor, Kedesh, Edrei, En Hazor,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iron, Migdal El, Horem, Beth Anath, and Beth Shemesh—nineteen towns and their villages. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Naphtali’s families inherited this entire region.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribal Land of Dan
    marker-yv: yv-h
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'The families of the tribe of Dan received the seventh assignment of land. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 41-46
    - type: text
      text: Its area included the towns of
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zorah, Eshtaol, Ir Shemesh, Shaalabbin, Aijalon, Ithlah,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elon, Timnah, Ekron, Eltekeh, Gibbethon, Baalath,
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehud, Bene Berak, Gath Rimmon, Me Jarkon, and Rakkon,
  - type: usfm
    marker: p
    children:
    - type: text
      text: as well as the territory around Joppa.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'The Danites had difficulty taking possession of their territory, so they went up and attacked Leshem, took it, killed its inhabitants, and occupied it. Then they renamed the city after their ancestor Dan. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Dan’s families inherited this entire region.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Land Given to Joshua
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 49-51
    - type: text
      text: 'All the people of Israel gathered in front of the tabernacle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:49–51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tent of meeting [assembly].”
      marker-yv: yv-n
    - type: text
      text: 'at Shiloh so that Eleazar the priest, Joshua, and the leaders of the tribes could divide all the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: west of the Jordan River
    - type: text
      text: '. They used lots to find out how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' wanted them to divide the land. When they finished dividing the land into its regions, the Israelites gave '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their warrior-chief
    - type: text
      text: ', Joshua son of Nun, his inheritance. As '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had instructed, they gave him the city he requested—Timnath Serah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:49–51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Timnath Serah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “an extra portion.” It is taken from the verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', meaning “to count” or “to assign” and the noun'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: serah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', meaning “excess.” The Israelites, following God’s instructions, gave Joshua what he longed for: an extra portion. Those who minister to God’s people and serve them are worthy of double honor. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 5:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus is our heavenly Joshua who waits for the fullness of his inheritance until his people have received theirs. Receiving in us the fullness of his inheritance was the joy that was set before him (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The church, his bride, is the “city” he desired. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 21:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . He has built up this city and dwells there.
      marker-yv: yv-n
    - type: text
      text: in the Ephraimite hill country. So he built up the city and lived there.
  '7':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In addition, they received four other cities, along with the villages around them: Ain, Rimmon, Ether, and Ashan. '
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Simeon’s territory included all the cities and villages as far south as the town of Baalath Beer, which is also known as Ramah in the Negeb. '
  '9':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The families of Simeon received their inheritance from Judah’s share of land because Judah’s portion exceeded what they needed. So the inheritance of the families of Simeon was within the territory of Judah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Simeon’s portion of land was scattered throughout the territory of Judah, fulfilling Jacob’s prophecy (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 49:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Tribal Land of Zebulun
    marker-yv: yv-h
