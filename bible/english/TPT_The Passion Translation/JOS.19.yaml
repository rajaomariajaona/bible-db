document_id: JOS.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tribal Land of Simeon
  - type: text
    content: 'The families of the tribe of Simeon received the second assignment of land, which was located within the territory of Judah. '
  '10':
  - type: text
    content: 'The families of the tribe of Zebulun received the third assignment of land. Their boundary reached as far southeast as '
  - type: text
    content: the city of
  - type: text
    content: ' Sarid. '
  '11':
  - type: text
    content: 'Going west, it ran to Maralah, touched Dabbesheth, and extended to the stream near Jokneam. '
  '12':
  - type: text
    content: 'In the other direction, the boundary line went east to the border of Chisloth-Tabor, and from there to Daberath and Japhia; '
  '13':
  - type: text
    content: 'then it continued east of Gath-Hepher, '
  - type: note
    content: Gath-Hepher (three miles northeast of Nazareth) was the birthplace of the prophet Jonah. See 2 Kings 14:25.
  - type: text
    content: 'Eth Kazin, Rimmon, and turned toward Neah. '
  '14':
  - type: text
    content: 'The northern boundary of Zebulun passed Hannathon and ended at the valley of Iphtah El. '
  '15':
  - type: text
    content: 'Their land encompassed twelve cities, including Kattath, Nahalal, Shimeon, '
  - type: note
    content: Or “Shimron.” See 11:1; 12:9–24.
  - type: text
    content: 'Iralah, '
  - type: note
    content: Or “Idalah.”
  - type: text
    content: 'and Bethlehem. '
  - type: note
    content: This is not the famous Bethlehem south of Jerusalem. This Bethlehem was a town about seven and a half miles (twelve kilometers) west of Nazareth. See Judg. 12:8–10.
  '16':
  - type: text
    content: Zebulun’s families inherited all these towns and their villages.
  - type: heading
    content: The Tribal Land of Issachar
  '17':
  - type: text
    content: 'The families of the tribe of Issachar received the fourth assignment of land. '
  '18':
  - type: text
    content: Their inheritance included
  - type: text
    content: Jezreel, Kesulloth, Shunem, Hapharaim, Shion, Anaharath,
  - type: text
    content: Rabbith, Kishion, Ebez, Remeth, En Gannim, En Haddah, and Beth Pazzez.
  '2':
  - type: text
    content: Their inheritance included the towns of
  - type: text
    content: 'Beersheba, '
  - type: note
    content: Or “Beer Sheba” or “Sheba.” The Masoretic text inserts “Sheba” here, which may be a scribal error, for its addition makes the total number of towns fourteen rather than thirteen. Most modern translations include “Sheba.”
  - type: text
    content: Moladah, Hazar-Shual, Balah, Ezem,
  - type: text
    content: Eltolad, Bethul, Hormah, Ziklag, Beth Marcaboth, Hazar-Susah,
  - type: text
    content: Beth Lebaoth, and Sharuhen—thirteen towns with their villages.
  '22':
  - type: text
    content: 'Their border touched Tabor, Shahazumah, and Beth Shemesh, and ended at the Jordan River—sixteen towns and their villages. '
  '23':
  - type: text
    content: Issachar’s families inherited all these cities and their towns.
  - type: heading
    content: The Tribal Land of Asher
  '24':
  - type: text
    content: 'The families of the tribe of Asher received the fifth assignment of land. '
  '25':
  - type: text
    content: 'Their territory included the city of Helkath to Hali, Beten, Achshaph, '
  '26':
  - type: text
    content: 'Allammelech, Amad, and Mishal. Their border touched Carmel to the west and Shihor Libnath. '
  '27':
  - type: text
    content: 'The eastern border went north from the city of Beth Dagon. It touched the territory of the tribe of Zebulun and the Valley of Iphtah El to the north, Beth Emek and Neiel, and extended to Cabul on the north. '
  '28':
  - type: text
    content: 'It went to Abdon, '
  - type: note
    content: Or “Ebron.”
  - type: text
    content: 'Rehob, Hammon, and Kanah, as far as Greater Sidon. '
  '29':
  - type: text
    content: 'The boundary then turned back toward Ramah and went to the fortified city of Tyre, turned toward Hosah and came out at the sea in the region of Achzib, '
  '30':
  - type: text
    content: 'Ummah, Aphek, and Rehob—twenty-two towns and their villages. '
  '31':
  - type: text
    content: Asher’s families inherited this entire region.
  - type: heading
    content: The Tribal Land of Naphtali
  '32':
  - type: text
    content: 'The families of the tribe of Naphtali received the sixth assignment of land. '
  '33':
  - type: text
    content: 'The '
  - type: text
    content: northern
  - type: text
    content: ' border of its territory went from the town of Heleph to the oak near the town of Zaanannim, then continued to Adami Nekeb, Jabneel, and on to Lakkum, and ended at the Jordan River. '
  '34':
  - type: text
    content: 'It turned westward to Aznoth Tabor, extended from there to Hukok, touched Zebulun on the south, Asher on the west, and the Jordan on the east. '
  '35':
  - type: text
    content: The fortified towns of Naphtali included
  - type: text
    content: Ziddim, Zer, Hammath, Rakkath, Kinnereth,
  - type: text
    content: Adamah, Ramah, Hazor, Kedesh, Edrei, En Hazor,
  - type: text
    content: 'Iron, Migdal El, Horem, Beth Anath, and Beth Shemesh—nineteen towns and their villages. '
  '39':
  - type: text
    content: Naphtali’s families inherited this entire region.
  - type: heading
    content: The Tribal Land of Dan
  '40':
  - type: text
    content: 'The families of the tribe of Dan received the seventh assignment of land. '
  '41':
  - type: text
    content: Its area included the towns of
  - type: text
    content: Zorah, Eshtaol, Ir Shemesh, Shaalabbin, Aijalon, Ithlah,
  - type: text
    content: Elon, Timnah, Ekron, Eltekeh, Gibbethon, Baalath,
  - type: text
    content: Jehud, Bene Berak, Gath Rimmon, Me Jarkon, and Rakkon,
  - type: text
    content: as well as the territory around Joppa.
  '47':
  - type: text
    content: 'The Danites had difficulty taking possession of their territory, so they went up and attacked Leshem, took it, killed its inhabitants, and occupied it. Then they renamed the city after their ancestor Dan. '
  '48':
  - type: text
    content: Dan’s families inherited this entire region.
  - type: heading
    content: The Land Given to Joshua
  '49':
  - type: text
    content: 'All the people of Israel gathered in front of the tabernacle '
  - type: note
    content: Or “tent of meeting [assembly].”
  - type: text
    content: 'at Shiloh so that Eleazar the priest, Joshua, and the leaders of the tribes could divide all the land '
  - type: text
    content: west of the Jordan River
  - type: text
    content: '. They used lots to find out how '
  - type: text
    content: Yahweh
  - type: text
    content: ' wanted them to divide the land. When they finished dividing the land into its regions, the Israelites gave '
  - type: text
    content: their warrior-chief
  - type: text
    content: ', Joshua son of Nun, his inheritance. As '
  - type: text
    content: Yahweh
  - type: text
    content: ' had instructed, they gave him the city he requested—Timnath Serah '
  - type: note
    content: 'Timnath Serah means “an extra portion.” It is taken from the verb mana, meaning “to count” or “to assign” and the noun serah, meaning “excess.” The Israelites, following God’s instructions, gave Joshua what he longed for: an extra portion. Those who minister to God’s people and serve them are worthy of double honor. See 1 Tim. 5:17. Jesus is our heavenly Joshua who waits for the fullness of his inheritance until his people have received theirs. Receiving in us the fullness of his inheritance was the joy that was set before him (see Heb. 12:1–2). The church, his bride, is the “city” he desired. See Song. 6:4; Matt. 5:14; Rev. 21:2. He has built up this city and dwells there.'
  - type: text
    content: in the Ephraimite hill country. So he built up the city and lived there.
  '7':
  - type: text
    content: 'In addition, they received four other cities, along with the villages around them: Ain, Rimmon, Ether, and Ashan. '
  '8':
  - type: text
    content: 'Simeon’s territory included all the cities and villages as far south as the town of Baalath Beer, which is also known as Ramah in the Negeb. '
  '9':
  - type: text
    content: The families of Simeon received their inheritance from Judah’s share of land because Judah’s portion exceeded what they needed. So the inheritance of the families of Simeon was within the territory of Judah.
  - type: note
    content: Simeon’s portion of land was scattered throughout the territory of Judah, fulfilling Jacob’s prophecy (see Gen. 49:7). See also Judg. 1:3.
  - type: heading
    content: The Tribal Land of Zebulun
