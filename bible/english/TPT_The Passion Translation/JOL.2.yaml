    content: They are not horses nor people on horses; rather, these warriors are like horses in some way. A horse can be a metaphor or picture of the overcomer, the victorious believer who has been “harnessed” by the Lord. The faithful lover of God (Shulamite) was likewise compared to a horse (see Song. 1:9). Jesus will return with an army of his saints riding on horses (see Rev. 19:14). See Job 39:19–25; Rev. 9:7.
