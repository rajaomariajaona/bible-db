  '2':
  - type: text
    content: It will be a day of darkness and gloom,
  - type: text
    content: a black and cloudy day.
  - type: note
    content: God comes down from heaven with thick clouds of darkness, which brings dread to the hearts of people. See Ex. 19:16–20; Ps. 18:9–10; Isa. 60:1–2.
  - type: text
    content: 'As the dawning '
  - type: text
    content: light
  - type: text
    content: ' spreads across the mountains,'
  - type: note
    content: The simplest and most literal meaning is that an army is destroying whatever is in its path and leaving a wake of devastation behind. Yet Joel said that the day of Yahweh will be both a day of blackness and a day of dawning light. Joel compared a coming army to the dawn. How is their coming like the dawn? The dawn comes slowly. First the purple hues are seen in the eastern sky. Then purple gives way to red, to orange, then the full light of day breaks forth. And so it will be in the last days as God’s awakeners walk in his paths. They will emerge in a time of darkness shining like the dawn (see Prov. 4:18; Song. 6:10). The dawning light hits the top of the mountains first; then it spreads down the slope, bringing the light of a new day. So are the people of God shining in the high places and spreading out to touch the world in its darkness. The Hebrew word for “dawn” has a homonym that means “blackness.” The blackness of night is broken by the dawning of a people who arise and shine (see Isa. 60:1–3). Dawnmakers are coming. They will not wait for a new day; they will bring it (see Isa. 58:8).
