          text: Coming to God with a tender, teachable heart is the only way to advance in God’s kingdom. It is not a matter of external duties and works but of turning from sin in the innermost part of a person’s life to embrace the goodness and kindness of God that brings us to repentance. We experience repentance as God’s gracious work of kindness to welcome us back to his heart. Turning to God in repentance is by no means only an Old Testament truth. At least nine times, the New Testament teaches repentance as the way of restoring the heart of a penitent one.
