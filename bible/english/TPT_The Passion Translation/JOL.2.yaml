  - type: note
    content: This section (2:12–17) is the most significant and pivotal portion of Joel’s passionate plea for the people to return to Yahweh. They must (1) know that God will receive and restore them (see v. 13); (2) come back to God’s paths “with all your heart” (v. 12); (3) come with fasting (see v. 12); (4) come with weeping (see v. 12); (5) come with mourning over their sins (see v. 12); (6) tear open their hearts (see v. 13); (7) trust in the goodness, mercy, and forgiveness of Yahweh (see vv. 13–14); and (8) consecrate their hearts afresh to God (see vv. 15–17).
  '13':
  - type: text
    content: Tearing your clothes in sorrow is not enough—
  - type: text
