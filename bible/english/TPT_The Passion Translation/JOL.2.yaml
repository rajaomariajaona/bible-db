  - type: note
    content: The fire of God surrounds these holy awakeners. They have come out of the fire and go into the fire. Our God is the God who answers the cries for awakening with his holy fire (see 1 Kings 18:24).
  - type: text
    content: Before their eyes, the earth is like the garden of Eden,
  - type: note
    content: Or “The garden of Eden, the land before their face.” Compared to the devastation the army is leaving behind them, the unspoiled land in front of them is like the garden of Eden, a virtual paradise. But viewed allegorically, there is a people with paradise before their face. They view a restoration of all things (see Acts 3:21) ahead of them—the garden of Bliss (Eden means “bliss,” “pleasure,” “delight”). They live for the pleasure of God and have a vision of bringing heaven on earth.
