    content: 'These awakeners become like their Lord: they leap over mountaintops (see Song. 2:8). Mountains can symbolize the barriers that separate a believer from intimacy with Christ (e.g., fear, doubt, compromise). They will leap over what many stumble over. The Hebrew word for “leap” is the same word used to describe David’s dancing before the ark (see 1 Chron. 15:29).'
