  '1':
  - type: heading
    content: The Day of Yahweh Is Coming
  - type: text
    content: ' '
  - type: note
    content: Chapter 2 was written as an ambiguously poetical description of a coming army. Is it meant to be taken literally as locusts or figuratively with application to believers today? Possibly both, for all the prophets of the Old Testament have mysteries and depths to their prophecies that take us beyond the literal meaning. The traditional understanding of this chapter is that it discusses a literal advancing army of locusts, perhaps as a metaphor to describe an army coming to invade the land. However, this army is coming from the north (see v. 20), while the locusts swarmed over the land coming from the south, so this may hint that the subject is not a literal army of locusts. There were enemies to Israel’s north that could be part of the meaning of this chapter. Either way, it appears that an allegory is embedded within this chapter that the Holy Spirit wants to reveal to us. Joel’s army is the army of Yahweh (see v. 11), coming in the last days as holy awakeners. They will be those who bring the dawn of a new day. Both literal and allegorical interpretive models should be recognized as valid when considering this chapter.
  - type: text
    content: Blow the shofar in Zion,
  - type: note
    content: Although Zion has become synonymous with Israel, Zion is more than a location; it is a realm where God is enthroned (see Pss. 2:4–6; 87:5). Zion is a synonym for the people of God, the dwelling place of his Spirit (see Pss. 9:11; 74:2; 76:2; Heb. 12:22–24). The perfection of beauty is in Mount Zion, where the light of God shines (see Ps. 50:2). Perfected praise rises to the Lord in this place of perfect rest (see Ps. 65:1–2). The Mountain of Zion is where the Lord is known in his greatness (see Ps. 99:2; Isa. 12:4–6). It is the hope of all the afflicted (see Ps. 102:16–22; Isa. 14:32; 51:11). Although the precise etymology of the Hebrew word Zion is uncertain, it may be related to a verb meaning “to surround” or “to protect.” In its noun form, Zion would mean “a refuge,” a fitting description for the place where God dwells. The New Testament concept is that Zion is a designation of the church of Jesus Christ that is seated in the heavenly realm (see Eph. 2:6) and is “a city that stands on a hilltop” (Matt. 5:14).
