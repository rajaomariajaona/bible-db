  - type: text
    content: whose teaching is like the refreshing spring rains.
  - type: note
    content: 'Or “he has given you the early [spring] rain for your vindication.” Examining the homonyms of the Hebrew words used here is fascinating. The Hebrew word mowreh can be used for “early rain” or for “teacher.” Hebraic thought often refers to teaching using the symbol of rain that falls from heaven and refreshes the heart (see 1 Kings 8:36). Jerome’s Latin Vulgate, which may have incorporated readings from even earlier manuscripts of Joel, reads doctorem iustitiae, “teacher of righteousness.” Qumran manuscripts, the Targumic paraphrase, and the Masoretic Text likewise follow in translating ʾet-hammowreh lisdaqah as “teacher of righteousness,” a Messianic designation. Jewish scholars often note that “a teacher in the end time would come and answer all questions”; this “was a quite familiar conception in Rabbinic Judaism.” See Gert Jeremias, Der Lehrer der Gerechtigkeit, Studien zur Umwelt des Neuen Testaments 2 (Göttingen: Vandenhoeck & Ruprecht, 1963), 287.'
