document_id: REV.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Binding Satan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I saw a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' angel descending from the heavenly realm, holding a heavy chain and a key—the key of the deep. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “abyss.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then the devil who had deceived them was thrown into the same place with the wild beast and the false prophet—the lake of fire and sulfur—where they will be tormented day and night forever and ever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment Day
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I saw a great, dazzling-white throne and the One who sits on it. Heaven and earth fled from his presence and they were no more. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “no place was found for them.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I saw the dead, the lowly and the famous alike, standing before the throne. Books were opened, and then another book was opened: the Book of Life. The dead were judged by what they had done as recorded in the books. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'And the sea gave up the dead '
    - type: usfm
      marker: it
      children:
      - type: text
        text: souls
    - type: text
      text: ' that were in it. Then death and the underworld gave up their dead, and all were judged according to what they had done. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Then death and the realm of the dead were cast into the lake of fire, for the lake of fire is the second death. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: And anyone whose name was not recorded in the Book of Life was cast into the lake of fire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He seized the dragon, that ancient serpent known as the devil and Satan, and bound him for a thousand years. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Satan has been bound since the death and resurrection of Jesus. We now enforce the judgment that took place on Calvary. The thousand years is an obvious metaphor of the time in which we live (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). We are given the authority to “overpower the mighty man and tie him up” and plunder his goods (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 3:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 12:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 12:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The mighty angel threw him into the pit, locked it, and sealed it so that he could no longer deceive the nations until the thousand years were over. (After that he must be loosed for a brief time.)
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then I saw thrones, and those who sat on them were given the authority to judge. I also saw the souls of those who had been beheaded because of the testimony of Jesus and for the Word of God. They had refused to worship the wild beast or its image and did not have their foreheads or hands marked by the wild beast. They lived and reigned with the Christ for one thousand years. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'This is the first resurrection. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The first resurrection took place when every believer was raised together with Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '(The rest of the dead did not come to life until the thousand years were ended.) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Wonderfully blessed and holy are those who share in the first resurrection! The second death holds no power over them, but they will be priests of God and of the Christ. And they will reign as kings with him a thousand years!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Final Destruction of Satan
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'After the thousand years are over, Satan will be let loose from his prison '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'and will go out and deceive the nations of the four corners of the earth, Gog and Magog. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezek. 38–39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: He will bring them together for battle, and they will be as numerous as grains of sand on the seashore.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'They spread out over the earth and surrounded the camp of God’s holy believers and the beloved city. But fire came down from heaven and completely destroyed them. '
