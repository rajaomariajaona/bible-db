document_id: REV.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Binding Satan
  - type: text
    content: 'Then I saw a '
  - type: text
    content: mighty
  - type: text
    content: ' angel descending from the heavenly realm, holding a heavy chain and a key—the key of the deep. '
  - type: note
    content: Or “abyss.”
  '10':
  - type: text
    content: Then the devil who had deceived them was thrown into the same place with the wild beast and the false prophet—the lake of fire and sulfur—where they will be tormented day and night forever and ever.
  - type: heading
    content: Judgment Day
  '11':
  - type: text
    content: 'Then I saw a great, dazzling-white throne and the One who sits on it. Heaven and earth fled from his presence and they were no more. '
  - type: note
    content: Or “no place was found for them.”
  '12':
  - type: text
    content: 'I saw the dead, the lowly and the famous alike, standing before the throne. Books were opened, and then another book was opened: the Book of Life. The dead were judged by what they had done as recorded in the books. '
  '13':
  - type: text
    content: 'And the sea gave up the dead '
  - type: text
    content: souls
  - type: text
    content: ' that were in it. Then death and the underworld gave up their dead, and all were judged according to what they had done. '
  '14':
  - type: text
    content: 'Then death and the realm of the dead were cast into the lake of fire, for the lake of fire is the second death. '
  '15':
  - type: text
    content: And anyone whose name was not recorded in the Book of Life was cast into the lake of fire.
  '2':
  - type: text
    content: 'He seized the dragon, that ancient serpent known as the devil and Satan, and bound him for a thousand years. '
  - type: note
    content: Satan has been bound since the death and resurrection of Jesus. We now enforce the judgment that took place on Calvary. The thousand years is an obvious metaphor of the time in which we live (2 Peter 3:8). We are given the authority to “overpower the mighty man and tie him up” and plunder his goods (Mark 3:27). See also Matt. 12:29; John 12:31; Col. 2:15.
  '3':
  - type: text
    content: The mighty angel threw him into the pit, locked it, and sealed it so that he could no longer deceive the nations until the thousand years were over. (After that he must be loosed for a brief time.)
  '4':
  - type: text
    content: 'Then I saw thrones, and those who sat on them were given the authority to judge. I also saw the souls of those who had been beheaded because of the testimony of Jesus and for the Word of God. They had refused to worship the wild beast or its image and did not have their foreheads or hands marked by the wild beast. They lived and reigned with the Christ for one thousand years. '
  '5':
  - type: text
    content: 'This is the first resurrection. '
  - type: note
    content: The first resurrection took place when every believer was raised together with Christ. See Eph. 1:19; 2:6.
  - type: text
    content: '(The rest of the dead did not come to life until the thousand years were ended.) '
  '6':
  - type: text
    content: Wonderfully blessed and holy are those who share in the first resurrection! The second death holds no power over them, but they will be priests of God and of the Christ. And they will reign as kings with him a thousand years!
  - type: heading
    content: The Final Destruction of Satan
  '7':
  - type: text
    content: 'After the thousand years are over, Satan will be let loose from his prison '
  '8':
  - type: text
    content: 'and will go out and deceive the nations of the four corners of the earth, Gog and Magog. '
  - type: note
    content: See Ezek. 38–39.
  - type: text
    content: He will bring them together for battle, and they will be as numerous as grains of sand on the seashore.
  '9':
  - type: text
    content: 'They spread out over the earth and surrounded the camp of God’s holy believers and the beloved city. But fire came down from heaven and completely destroyed them. '
