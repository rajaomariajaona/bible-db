document_id: AMO.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'First Vision: Locusts'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' revealed to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in a vision
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold! Just after the hay had been cut for the king,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although this custom is not mentioned anywhere else in the Old Testament, it has generally been understood to mean that the king was to be given the first mowing of spring hay for his horses.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the new young grass started to grow again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I saw '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' forming a swarm of mature locusts.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Amos chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 7–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: include a compilation of five supernatural visions God revealed to his prophet.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then Amaziah the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chief
    - type: text
      text: ' priest of Bethel sent the following message to Jeroboam king of Israel: “Amos has conspired against you in the very heart of Israel. We cannot stand his speeches! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For Amos says, ‘Jeroboam is going to die by the sword, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Indeed, Jeroboam and his son Zechariah met with violent deaths (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 15:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: and Israel will go into captivity far from its native land.’ ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Amaziah said to Amos, “Go away, you seer. Why don’t you escape to Judah while there is time? You can always prophesy there and make your living. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But don’t stay around here and prophesy at Bethel anymore. This is the national temple, the place where the king worships.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Amos replied, “I am not a prophet, nor am I one of the sons of the prophets. I am merely a rancher, and I cultivate fig trees. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: one day
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' called me as I was managing my flocks and said to me, ‘Go and prophesy to my people Israel.’'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“So now, Amaziah, listen to what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You say: ‘Do not prophesy against Israel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and do not prophesy doom on Isaac’s descendants!’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Very well. This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Your wife will become a prostitute in the streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your sons and daughters will fall in battle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your land will be measured, divided up, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and given to others
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you yourself will die in a pagan land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Israel will go into captivity far from its own land!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amos had absolutely no fear of the leading figures of the Northern Kingdom.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I watched as they began eating all the vegetation in the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I pleaded with God, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', please forgive us, I beg you,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amos the prophet began to intercede for God’s forgiving grace. Intercession was and is one of the roles of a prophet. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 20:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 9:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 9:15–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . There are times that our intercession is meant to move God’s heart to prevent judgment from falling on a nation.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or we will not survive!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Jacob will not rise up.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jacob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a metonymy for Israel.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our nation is so helpless.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “small.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: My prayer moved God’s heart to compassion.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said: “It will not happen.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Second Vision: The Drought'
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: it
      children:
      - type: text
        text: In another vision
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' revealed this to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Behold! He was calling for punishment by fire.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, a devastating drought that would cover the land (i.e., the burning heat of the sun). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 1:19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The scorching heat dried up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the deep sources of water beneath the land
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “It had devoured the great deep [abyss].” The people of the ancient Near East believed that a great ocean lay deep beneath the ground and occasionally sprang up to the surface. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 36:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 51:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made the farmlands like dust.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So I pleaded with God, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', please don’t do this, I beg you,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or we will not survive!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our nation is so helpless.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Because of my prayer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God’s heart was '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stirred
    - type: text
      text: ' with compassion.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“This also will not happen,” said '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Third Vision: The Plumb Line'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' revealed this to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in another vision
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I saw the Lord standing by a wall built true to plumb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: holding a plumb line in his hand.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A plumb line is a cord with a lead weight used by builders to be sure that walls are straight up and down. The Lord standing with a plumb line indicates he is coming to measure his people to make sure their standards are true and pure. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 21:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 28:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lam. 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“Amos, what do you see?” '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' asked me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A plumb line,” I replied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the Lord said, “Behold, I am about to set a plumb line
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'up against my people Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to test them
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Never again will I look the other way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when they sin
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will destroy the high places
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where Isaac’s descendants worship,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The high places of Isaac may refer to the sanctuary of Beersheba. Perhaps Isaac is mentioned because he was offered to God on an altar on a mountain; in Amos’ time, Israel was worshiping false gods on mountain altars. The high places were originally simply burial mounds where people would come with worship related to dead people, but later this developed into a fertility cult. See W. F. Albright,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The High Place in Ancient Palestine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Volume du congrès Strasbourg 1956,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Supplements to Vetus Testamentum IV
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
