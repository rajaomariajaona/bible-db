document_id: AMO.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'First Vision: Locusts'
  - type: text
    content: 'This is what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed to me '
  - type: text
    content: in a vision
  - type: text
    content: ':'
  - type: text
    content: Behold! Just after the hay had been cut for the king,
  - type: note
    content: Although this custom is not mentioned anywhere else in the Old Testament, it has generally been understood to mean that the king was to be given the first mowing of spring hay for his horses.
  - type: text
    content: when the new young grass started to grow again,
  - type: text
    content: 'I saw '
  - type: text
    content: Yahweh
  - type: text
    content: ' forming a swarm of mature locusts.'
  - type: note
    content: See Joel 1:4. Amos chs. 7–9 include a compilation of five supernatural visions God revealed to his prophet.
  '10':
  - type: text
    content: 'Then Amaziah the '
  - type: text
    content: chief
  - type: text
    content: ' priest of Bethel sent the following message to Jeroboam king of Israel: “Amos has conspired against you in the very heart of Israel. We cannot stand his speeches! '
  '11':
  - type: text
    content: 'For Amos says, ‘Jeroboam is going to die by the sword, '
  - type: note
    content: Indeed, Jeroboam and his son Zechariah met with violent deaths (see 2 Kings 15:10).
  - type: text
    content: and Israel will go into captivity far from its native land.’ ”
  '12':
  - type: text
    content: 'Amaziah said to Amos, “Go away, you seer. Why don’t you escape to Judah while there is time? You can always prophesy there and make your living. '
  '13':
  - type: text
    content: But don’t stay around here and prophesy at Bethel anymore. This is the national temple, the place where the king worships.”
  '14':
  - type: text
    content: 'Amos replied, “I am not a prophet, nor am I one of the sons of the prophets. I am merely a rancher, and I cultivate fig trees. '
  '15':
  - type: text
    content: 'But '
  - type: text
    content: one day
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ' called me as I was managing my flocks and said to me, ‘Go and prophesy to my people Israel.’'
  '16':
  - type: text
    content: '“So now, Amaziah, listen to what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says.'
  - type: text
    content: 'You say: ‘Do not prophesy against Israel,'
  - type: text
    content: and do not prophesy doom on Isaac’s descendants!’
  '17':
  - type: text
    content: 'Very well. This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: ‘Your wife will become a prostitute in the streets,
  - type: text
    content: and your sons and daughters will fall in battle.
  - type: text
    content: 'Your land will be measured, divided up, '
  - type: text
    content: and given to others
  - type: text
    content: .
  - type: text
    content: And you yourself will die in a pagan land,
  - type: text
    content: and Israel will go into captivity far from its own land!’ ”
  - type: note
    content: Amos had absolutely no fear of the leading figures of the Northern Kingdom.
  '2':
  - type: text
    content: I watched as they began eating all the vegetation in the land,
  - type: text
    content: so I pleaded with God, saying,
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', please forgive us, I beg you,'
  - type: note
    content: Amos the prophet began to intercede for God’s forgiving grace. Intercession was and is one of the roles of a prophet. See Gen. 20:7; Jer. 15:1, 11; 18:20; Ezek. 9:8; Dan. 9:15–19. There are times that our intercession is meant to move God’s heart to prevent judgment from falling on a nation.
  - type: text
    content: or we will not survive!
  - type: note
    content: Or “Jacob will not rise up.” Jacob is a metonymy for Israel.
  - type: text
    content: Our nation is so helpless.”
  - type: note
    content: Or “small.”
  '3':
  - type: text
    content: My prayer moved God’s heart to compassion.
  - type: text
    content: Yahweh
  - type: text
    content: ' said: “It will not happen.”'
  - type: heading
    content: 'Second Vision: The Drought'
  '4':
  - type: text
    content: In another vision
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed this to me:'
  - type: text
    content: Behold! He was calling for punishment by fire.
  - type: note
    content: That is, a devastating drought that would cover the land (i.e., the burning heat of the sun). See Joel 1:19–20; 2:3.
  - type: text
    content: The scorching heat dried up
  - type: text
    content: the deep sources of water beneath the land
  - type: note
    content: Or “It had devoured the great deep [abyss].” The people of the ancient Near East believed that a great ocean lay deep beneath the ground and occasionally sprang up to the surface. See Gen. 2:6; 7:11; 49:25; Ps. 36:6; Isa. 51:10.
  - type: text
    content: and made the farmlands like dust.
  '5':
  - type: text
    content: So I pleaded with God, saying,
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', please don’t do this, I beg you,'
  - type: text
    content: or we will not survive!
  - type: text
    content: Our nation is so helpless.”
  '6':
  - type: text
    content: Because of my prayer,
  - type: text
    content: 'God’s heart was '
  - type: text
    content: stirred
  - type: text
    content: ' with compassion.'
  - type: text
    content: '“This also will not happen,” said '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: 'Third Vision: The Plumb Line'
  '7':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed this to me '
  - type: text
    content: in another vision
  - type: text
    content: ':'
  - type: text
    content: I saw the Lord standing by a wall built true to plumb,
  - type: text
    content: holding a plumb line in his hand.
  - type: note
    content: A plumb line is a cord with a lead weight used by builders to be sure that walls are straight up and down. The Lord standing with a plumb line indicates he is coming to measure his people to make sure their standards are true and pure. See 2 Kings 21:13; Isa. 28:17; 34:11; Lam. 2:8.
  '8':
  - type: text
    content: '“Amos, what do you see?” '
  - type: text
    content: Yahweh
  - type: text
    content: ' asked me.'
  - type: text
    content: “A plumb line,” I replied.
  - type: text
    content: Then the Lord said, “Behold, I am about to set a plumb line
  - type: text
    content: 'up against my people Israel '
  - type: text
    content: to test them
  - type: text
    content: .
  - type: text
    content: 'Never again will I look the other way '
  - type: text
    content: when they sin
  - type: text
    content: .
  '9':
  - type: text
    content: I will destroy the high places
  - type: text
    content: where Isaac’s descendants worship,
  - type: note
    content: 'The high places of Isaac may refer to the sanctuary of Beersheba. Perhaps Isaac is mentioned because he was offered to God on an altar on a mountain; in Amos’ time, Israel was worshiping false gods on mountain altars. The high places were originally simply burial mounds where people would come with worship related to dead people, but later this developed into a fertility cult. See W. F. Albright, The High Place in Ancient Palestine, Volume du congrès Strasbourg 1956, Supplements to Vetus Testamentum IV (Leiden: 1957), 242–58.'
  - type: text
    content: and I will ruin the holy places of Israel.
  - type: text
    content: With my sword in hand,
  - type: text
    content: I will attack the dynasty of Jeroboam.”
  - type: heading
    content: Amaziah Challenges Amos
