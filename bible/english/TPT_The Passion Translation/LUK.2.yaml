        text: '3'
      metadata:
        usfm: LUK.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', when Jesus went to the Jordan to be baptized by the prophet John. We knew he grew in favor with God and men. He served his earthly father in a carpenter’s shop. It is likely that Joseph, Jesus’ earthly father, died during this season of his life. This left Jesus with the responsibility as firstborn to provide for his family. Amazing mysteries surround this one who is too marvelous for words!'
    marker-yv: yv-n
