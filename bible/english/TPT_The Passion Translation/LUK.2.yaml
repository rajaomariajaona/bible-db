    children:
    - type: text
      text: 36-37
  - type: text
    text: 'A prophetess named Anna was also in the temple court that day. She was from the tribe of Asher and the daughter of Phanuel. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:36–37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Asher means “blessed.” Phanuel means “the face of God.”
    marker-yv: yv-n
  - type: text
    text: 'Anna was an aged widow who had been married only seven years before her husband passed away. After he died she chose to worship God in the temple continually. For the past eighty-four years '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:36–37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Greek manuscripts make her age to be eighty-four. But the most reliable Greek and Aramaic texts state that she had been in the temple for eighty-four years. If so, this would make her at that time to be about one hundred six. God is faithful to those who wait in faith. Both Simeon and Anna were privileged to touch the Christ before they died in faith.
    marker-yv: yv-n
  - type: text
    text: she had been serving God with night-and-day prayer and fasting.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: While Simeon was prophesying over Mary and Joseph and the baby, Anna walked up to them and burst forth with a great chorus of praise to God for the child. From that day forward she told everyone in Jerusalem who was waiting for their redemption that the anticipated Messiah had come!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text literally says that Anna told everyone “who was looking for the redemption of Jerusalem.” This is a figure of speech for the one who would come and set them free; i.e., the Messiah. What amazing prophetic words came through Simeon and Anna!
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'When Mary and Joseph had completed everything required of them by the Law of the Lord, they took Jesus and returned to their home '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Luke omits their journey to Egypt to spare Jesus from the death decree of Herod. That information is given to us by Matthew. But none of the Gospels gives all the details of this period. Luke also has nothing about the visit of the wise men (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 2:1–12
      metadata:
        usfm: MAT.2.1+MAT.2.2+MAT.2.3+MAT.2.4+MAT.2.5+MAT.2.6+MAT.2.7+MAT.2.8+MAT.2.9+MAT.2.10+MAT.2.11+MAT.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and Matthew tells nothing of the shepherds or of Simeon and Anna (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 2:8–28
      metadata:
        usfm: LUK.2.8+LUK.2.9+LUK.2.10+LUK.2.11+LUK.2.12+LUK.2.13+LUK.2.14+LUK.2.15+LUK.2.16+LUK.2.17+LUK.2.18+LUK.2.19+LUK.2.20+LUK.2.21+LUK.2.22+LUK.2.23+LUK.2.24+LUK.2.25+LUK.2.26+LUK.2.27+LUK.2.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). All four Gospels supplement one another. A long period of time likely transpired between vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
