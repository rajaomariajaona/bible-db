  marker: q1
  children:
  - type: text
    text: and now I can die content,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you have fulfilled your promise to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With my own eyes I have seen your Word,
  - type: usfm
    marker: f
