      text: '33'
  - type: text
    text: Mary and Joseph stood there, awestruck over what was being said about their baby.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Simeon then blessed them and prophesied over Mary, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
