        usfm: MIC.5.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a village in Galilee, and journeyed to their hometown in Judea, to the village of Bethlehem, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The distance from Nazareth to Bethlehem is about sixty-five miles (105 kilometers) and would have taken a number of days for them to arrive. Bethlehem, or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Byt-lehem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', means “house of bread,” the prophesied birthplace of Messiah. However, the Hebrew word'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lechem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a homonym for “fighter” or “warrior.” Jesus was born in “the house of fighters.” Bethlehem is the city of David, who was one of the greatest fighters in the entire Bible. Perhaps this is why the people of Jesus’ day expected him to fight the Romans and free their land from foreign occupation. Jesus fulfilled both aspects of the meaning of Bethlehem in Gethsemane and on the cross, where he fought the “Goliath” of our souls and won, becoming bread for the world.
    marker-yv: yv-n
  - type: text
    text: King David’s ancient home. They were required to register there, since they were both direct descendants of David. Mary was pregnant and nearly ready to give birth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'When they arrived in Bethlehem, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “While they were in Bethlehem.”
    marker-yv: yv-n
  - type: text
    text: Mary went into labor, and there she gave birth to her firstborn son. She wrapped the newborn baby in strips of cloth, and Mary and Joseph laid him in a feeding trough since there was no available space in any upper room in the village.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kataluma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This is not an “inn” but simply the upstairs level of a home where guests would stay. It means there was no guest room available in Bethlehem for Mary to give birth. Since all of Joseph’s and Mary’s family also made the journey because of the census, every home of a relative would have been full. In that day Bethlehem was far too small of a village to have an actual inn, all the
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: katalumai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: there were occupied. It is likely that Joseph and Mary had to sleep downstairs in the main room of a relative’s house. The downstairs of a village home in that day was like an all-purpose room that served as a workshop during the day, and at night it was used to shelter frail animals, while the rest of the flock was left outdoors. The
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kataluma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was not a full-fledged barn or stable, but it did contain a drinking trough or manger cut in the bedrock. This was the likely place where the baby Jesus was placed after his birth.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: An Angelic Encounter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'That night, in a field '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many scholars believe that these could be the same fields where sacrificial flocks were kept for temple worship. How fitting that these shepherds would hear the announcement of the birth of the Lamb of God. Others believe these fields could have been near the field of Boaz, or the fields where David once watched over the flocks of his father, Jesse.
    marker-yv: yv-n
  - type: text
    text: 'near Bethlehem, shepherds were watching over their flocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Suddenly, an angel of the Lord appeared in radiant splendor before them, lighting up the field with the blazing glory of God, and the shepherds were terrified! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the angel reassured them, saying, “Don’t be afraid, for I have come to bring you good news, the most joyous news the world has ever heard! And it is for everyone everywhere! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For today in Bethlehem '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text says, “the city of David.”
    marker-yv: yv-n
  - type: text
    text: 'a rescuer was born for you. He is the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the Messiah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated literally from the Aramaic text. This is one of the most amazing statements found in the Gospels declaring the deity of Jesus Christ.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You will recognize him by this miraculous sign: You will find a baby wrapped in strips of cloth and lying in the feeding trough!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A baby lying in a feeding trough where animals were kept nearby, wrapped in strips of cloths, became a sign of the Man-Savior’s life on earth. He entered the world as a lowly baby, and though he is the mighty God, he lived his life on earth in gentleness before all. The shepherds that night were possibly near Bethlehem at Migdal Eder, “the [watch] tower of the flock.” This would fulfill both the prophecies of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 5:2
      metadata:
        usfm: MIC.5.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 4:8
      metadata:
        usfm: MIC.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which say, “to you it [he] will come, your dominion [kingdom] from old will arrive.” It was at the lower floor of the watchtower (Migdal Eder) that the birthing of the Passover lambs would take place. Selected ewes that were about to give birth would be brought there. After the birth of the lambs, the priestly shepherds would wrap the lambs in cloth and lay them in a manger lined with soft hay to prevent them from hurting themselves, for Passover lambs must be unblemished with no bruise or broken bone. The miracle sign for these priestly shepherds would be a baby boy lying where the Passover lamb should be—in a manger, wrapped in strips of cloth. It was at the cradle of Jesus Christ that the kingdom from ancient times arrived on earth.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then all at once '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the night sky
  - type: text
    text: ', a vast number of glorious angels appeared, the very armies of heaven! And they all praised God, singing:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Glory to God in the highest realms of heaven!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For there is peace '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Luke’s Gospel is the Gospel of peace. The four prominent sacrifices of the Old Testament are emphasized in the four Gospels. In Matthew we see the death of Christ in the figure of the trespass offering, in Mark the sin offering, in Luke the peace offering, and in John the burnt offering. The peace God gives us is emphasized in Luke’s Gospel, which is why the angels announced peace and hope. On the day of his resurrection Jesus said, “Peace to you.”
    marker-yv: yv-n
  - type: text
    text: 'and a good hope '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “good will among people” or “good will among people with whom he is pleased.”
    marker-yv: yv-n
  - type: text
    text: given to the sons of men.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When the choir of angels disappeared and returned to heaven, the shepherds said to one another, “Let’s go! Let’s hurry and find this Word '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek is the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rhema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'who is born in Bethlehem and see for ourselves what the Lord has revealed to us.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So they hurried off and found their way to Mary and Joseph. And there was the baby, lying in a feeding trough.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Upon seeing this miraculous sign, the shepherds recounted what had just happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Everyone who heard the shepherds’ story was astonished by what they were told.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But Mary treasured all these things in her heart and often pondered what they meant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The shepherds returned to their flock, ecstatic over what had happened. They praised God and glorified him for all they had heard and seen for themselves, just like the angel had said.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Baby Jesus Dedicated in the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On the day of the baby’s circumcision ceremony, eight days after his birth, his parents gave him the name Jesus, the name prophesied by the angel before he was born. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Forty days after the birth of her son, Mary’s time of purification had completed, so she came to the temple with a sacrifice, according to the law of Moses. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This comes from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 12:1–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . When a son was born, the mother went through a forty-day period of purification, and then she was to offer a sacrifice to complete the process.
    marker-yv: yv-n
  - type: text
    text: 'So Mary and Joseph took baby Jesus to Jerusalem to be dedicated before the Lord. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ark of the covenant, signifying the presence of God, had been absent from the temple since 586 BC, when the Babylonians destroyed the temple. Herod’s temple had no ark of covenant until Jesus came into the temple that day. God returned to the temple when Mary carried her baby into its courts. What a dramatic moment! See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 3:1–2
      metadata:
        usfm: MAL.3.1+MAL.3.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For it is stated in the law of the Lord, “Every firstborn male shall be set apart for God” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 13:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '12'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and is required to offer a prescribed sacrifice, “either a pair of turtledoves or two young pigeons.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because Joseph and Mary were rather poor, not yet having received the gifts brought by the wise men, they offered a pair of doves or pigeons instead of a lamb (
    - type: text
      text: Lev. 12:6–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Mary offered a sin offering, showing her need of a Savior. Jesus would one day be offered as her true Lamb.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As they came to the temple to fulfill this requirement, an '
  - type: usfm
    marker: it
    children:
    - type: text
      text: elderly
  - type: text
    text: ' man was there waiting—a resident of Jerusalem whose name was Simeon. He was a very good man, a lover of God who kept himself pure, and the Spirit of holiness rested upon him. Simeon believed in the imminent appearing of the one called “The Refreshing of Israel.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “The Refreshing of Israel” is a name for Jesus that can also be translated “The Encourager of Israel.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For the Holy Spirit had revealed to him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Simeon’s name means “he who hears.”
    marker-yv: yv-n
  - type: text
    text: 'that he would not see death before he saw the Messiah, the Anointed One of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Keeping his promise
  - type: text
    text: ', the Holy Spirit led Simeon to be in the temple court at the very moment Jesus’ parents entered to fulfill the requirement of the sacrifice.'
