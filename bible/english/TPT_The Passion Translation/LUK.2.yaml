      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a unique Greek word used for “sword.” Literally it means “a large broadsword.”
    marker-yv: yv-n
  - type: text
    text: will one day pierce your inner being,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your child will be rejected by many in Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And the destiny of your child is this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'he will be laid down '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:34–35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word translated “appointed” actually means “to lie down.” Jesus was laid down on a cross and in a tomb for us and rose again for us.
    marker-yv: yv-n
  - type: text
    text: as a miracle sign
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for the downfall '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:34–35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word translated “falling” can also be translated “downfall” or “destruction.” Perhaps this was a prophecy of the cross of Jesus Christ, where many will rise or fall depending on what they do with Jesus’ death and resurrection. We are all destined to be joined to him in his death and resurrection (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 2:20
      metadata:
        usfm: GAL.2.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Every believer experiences both a “downfall” and a “resurrection.”
    marker-yv: yv-n
  - type: text
