  - type: text
    text: At Age Twelve Jesus Visits the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Every year Jesus’ parents went to worship at Jerusalem during the Passover festival. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'When Jesus turned twelve, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At the age of twelve, a boy was called by the Jews a “son of the law.” The number twelve is found often in the Bible and is linked to God’s perfect administration and our human alignment to it. God’s family of Israel was made up of twelve tribes, twelve sons of Jacob. Jesus chose twelve apostles, there are twelve months in the yearly cycle, and there are twenty-four elders around God’s throne (twelve times two). Jesus coming into the house of God at age twelve points to the perfect alignment he had with his Father as the Apostle of our faith. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 3:1
      metadata:
        usfm: HEB.3.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'his parents took him to Jerusalem to observe the Passover, as was their custom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'A full day after they began their journey home, Joseph and Mary realized that Jesus was missing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'They had assumed he was somewhere in their entourage, but he was nowhere to be found. After a frantic search among relatives and friends, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Mary and Joseph returned to Jerusalem to search for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'After being separated from him for three days, they finally found him in the temple, sitting among the Jewish teachers, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rabbis.”
    marker-yv: yv-n
  - type: text
    text: 'listening to them and asking probing questions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: All who heard Jesus speak were awestruck at his intelligent understanding of all that was being discussed and at his wise answers to their questions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: His parents were shocked to find him there, and Mary scolded him, saying, “Son, your father and I have searched for you everywhere! We have been worried sick over not finding you. Why would you do this to us?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why would you need to search for me? Didn’t you know that it was necessary for me to be here in my Father’s house, consumed with him?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first recorded words of Jesus, when he was only twelve, are given to us here.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Mary and Joseph didn’t fully understand what Jesus meant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Jesus went back home with them to Nazareth and was obedient to them. His mother '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mary was an amazing woman and should be honored as the mother of our Lord Jesus Christ. She was the only human being who was with Jesus all the way from his birth to his death. She is also mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 1:14
      metadata:
        usfm: ACT.1.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'treasured Jesus’ words deeply in her heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'As Jesus grew, so did his wisdom and maturity. The favor of men increased upon his life, for he was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: greatly
  - type: text
    text: ' loved by God.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:52
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We know virtually nothing about the eighteen years between ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: LUK.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
