    - type: text
      text: 1-2
  - type: text
    text: 'During those days, the Roman emperor, Caesar Augustus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is ironic that the Roman emperors viewed themselves as “gods” while the little baby born in a feeding trough was the true God incarnate.
    marker-yv: yv-n
  - type: text
    text: 'ordered that the first census be taken throughout his empire. (Quirinius was the governor of Syria at that time.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Everyone had to travel to the hometown of their family to complete the mandatory census. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'So Joseph and his wife, Mary, left Nazareth, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Nazareth” is taken from a Hebrew word for “branch” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 11:1
      metadata:
        usfm: ISA.11.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God controls all events, proven by the fulfillment of the prophecy that Jesus would be born in Bethlehem, even though his parents were living in Nazareth. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 5:2
