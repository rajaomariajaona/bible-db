      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'It was in the ninth year of Zedekiah’s reign. In the tenth month of that year, Nebuchadnezzar king of Babylon attacked Jerusalem with his entire army, laying siege to it. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jerusalem fell in July of 586 BC. Since the months of the year would have been counted from spring (March/April), the siege of Jerusalem began in January two years before.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After the city had been surrounded for two years, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “In Zedekiah’s eleventh year as king, on the ninth day of the fourth month,” which was equal to about a two-year siege of Jerusalem.
    marker-yv: yv-n
  - type: text
    text: they broke through the city walls.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Chapter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '39'
      metadata:
        usfm: JER.39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: gives a detailed account of the fall of Jerusalem. After the fall of the city (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1–3
      metadata:
        usfm: JER.39.1+JER.39.2+JER.39.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), Zedekiah was captured and punished (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4–10
      metadata:
        usfm: JER.39.4+JER.39.5+JER.39.6+JER.39.7+JER.39.8+JER.39.9+JER.39.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 25:1–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 52:4–16
      metadata:
        usfm: JER.52.4+JER.52.5+JER.52.6+JER.52.7+JER.52.8+JER.52.9+JER.52.10+JER.52.11+JER.52.12+JER.52.13+JER.52.14+JER.52.15+JER.52.16
    - type: usfm
      marker: ft
      children:
      - type: text
