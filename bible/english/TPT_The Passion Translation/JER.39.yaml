    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: When the Babylonians captured Jerusalem
  - type: text
    text: ', the king’s leading officials took their seats in the Middle Gate '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to form their military government
  - type: text
    text: ': Nergal-Sharezer, Samgar-Nebo, Sar-Sechim a high dignitary of state, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the Rab-Saris.” There is a notable difference among English versions and commentaries as to the number of officials mentioned here, the exact spelling of their names, and their titles. See F. B. Huey, Jr.,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah, Lamentations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', The New American Commentary, vol. 16 (Nashville: B&H, 1993), 341n71; and John Bright,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Anchor Yale Bible Commentary, vol. 21 (Garden City, NY: Doubleday, 1965), 243.'
    marker-yv: yv-n
  - type: text
    text: Nergal-Sharezer the king’s chief adviser, and all the other officials of the king of Babylon.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zedekiah Is Blinded
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Upon seeing them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at the Middle Gate
  - type: text
    text: ', Zedekiah and all his soldiers tried to escape the city under cover of darkness. They went by way of the king’s garden and slipped through the gate '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This gate was likely the Fountain Gate. The “king’s garden” was near the pool of Siloam. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Neh. 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 12:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'between the two city walls and headed toward the Jordan River Valley. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the Arabah.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But the Babylonians pursued them and caught up with Zedekiah in the plains of Jericho. They captured him and brought him to Nebuchadnezzar king of Babylon, who was at the town of Riblah in the territory of Hamath, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Riblah was on the Orontes River north of Israel in Syria. Hamath was an important town located on the Orontes River. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 23:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'where he passed sentence on him there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nebuchadnezzar had Zedekiah’s sons slaughtered at Riblah and forced him to watch their execution. The king of Babylon also executed all the leading men of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then, he ordered that Zedekiah be bound with chains and have his eyes gouged out. Blinded, King Zedekiah was dragged off to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: distant
  - type: text
    text: ' Babylon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Meanwhile
  - type: text
    text: ' in Jerusalem, the Babylonians demolished the city walls, and burned down the temple of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the house of the people.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 52:13
      metadata:
        usfm: JER.52.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and the king’s royal palace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nebuzaradan the field general '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the chief executioner.”
    marker-yv: yv-n
  - type: text
    text: 'held captive anyone left behind in Jerusalem and the deserters who had gone over to him and took them all away to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: distant
  - type: text
    text: ' Babylon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But he left behind some of the extremely poor people in the land of Judah. They owned nothing, so he gave them fields and vineyards to possess as their own.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Is Spared
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nebuchadnezzar king of Babylon gave orders to Nebuzaradan, the field general: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Find Jeremiah, look after him well, and don’t harm him. Do for him whatever he asks.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that Daniel used his influence with Nebuchadnezzar (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 2:49
      metadata:
        usfm: DAN.2.49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) to spare Jeremiah’s life.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nebuzaradan the field general, Nebushazban the chief palace official, and Nergal-Sharezer a high official, along with the other officers of King Nebuchadnezzar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: dispatched some men to bring me from the courtyard of the guardhouse. They entrusted me to the care of Gedaliah son of Ahikam, grandson of Shaphan, and told him to make sure I get home safely. And so, I stayed with the people who remained in Judah.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s Promise to Protect Ebed-Melech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'While I was still confined in the courtyard of the guardhouse, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Go and prophesy to Ebed-Melech the Ethiopian and tell him what I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of Israel, Commander of Angel Armies have to say: ‘I am going to do what I promised to do to this city, and it will not be good but disastrous. And you will see it come true before your eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But I will rescue you that day, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', and you will not be handed over to the people you fear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I will certainly protect you so that no one will kill you. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes
  - type: text
    text: ', your life will be your reward because you have put your trust in me, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .’ ”
