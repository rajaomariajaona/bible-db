- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fall of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: This is how Jerusalem was captured.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This sentence is missing in some modern translations, the Septuagint, the Syriac, and some Hebrew manuscripts. Some manuscripts connect this sentence to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:28
      metadata:
        usfm: JER.38.28
    - type: usfm
      marker: ft
