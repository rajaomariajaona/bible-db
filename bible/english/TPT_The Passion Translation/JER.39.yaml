document_id: JER.39,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: This is how Jerusalem was captured.
  - type: note
    content: This sentence is missing in some modern translations, the Septuagint, the Syriac, and some Hebrew manuscripts. Some manuscripts connect this sentence to 38:28.
  - type: text
    content: 'It was in the ninth year of Zedekiah’s reign. In the tenth month of that year, Nebuchadnezzar king of Babylon attacked Jerusalem with his entire army, laying siege to it. '
  - type: note
    content: Jerusalem fell in July of 586 BC. Since the months of the year would have been counted from spring (March/April), the siege of Jerusalem began in January two years before.
  '10':
  - type: text
    content: But he left behind some of the extremely poor people in the land of Judah. They owned nothing, so he gave them fields and vineyards to possess as their own.
  - type: heading
    content: Jeremiah Is Spared
  '11':
  - type: text
    content: 'Nebuchadnezzar king of Babylon gave orders to Nebuzaradan, the field general: '
  '12':
  - type: text
    content: “Find Jeremiah, look after him well, and don’t harm him. Do for him whatever he asks.”
  - type: note
    content: It is possible that Daniel used his influence with Nebuchadnezzar (see Dan. 2:49) to spare Jeremiah’s life.
  '13':
  - type: text
    content: 'Nebuzaradan the field general, Nebushazban the chief palace official, and Nergal-Sharezer a high official, along with the other officers of King Nebuchadnezzar, '
  '14':
  - type: text
    content: dispatched some men to bring me from the courtyard of the guardhouse. They entrusted me to the care of Gedaliah son of Ahikam, grandson of Shaphan, and told him to make sure I get home safely. And so, I stayed with the people who remained in Judah.
  - type: heading
    content: Yahweh’s Promise to Protect Ebed-Melech
  '15':
  - type: text
    content: 'While I was still confined in the courtyard of the guardhouse, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '16':
  - type: text
    content: '“Go and prophesy to Ebed-Melech the Ethiopian and tell him what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies have to say: ‘I am going to do what I promised to do to this city, and it will not be good but disastrous. And you will see it come true before your eyes. '
  '17':
  - type: text
    content: 'But I will rescue you that day, declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', and you will not be handed over to the people you fear. '
  '18':
  - type: text
    content: 'I will certainly protect you so that no one will kill you. '
  - type: text
    content: Yes
  - type: text
    content: ', your life will be your reward because you have put your trust in me, declares '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: 'After the city had been surrounded for two years, '
  - type: note
    content: Or “In Zedekiah’s eleventh year as king, on the ninth day of the fourth month,” which was equal to about a two-year siege of Jerusalem.
  - type: text
    content: they broke through the city walls.
  - type: note
    content: Chapter 39 gives a detailed account of the fall of Jerusalem. After the fall of the city (see vv. 1–3), Zedekiah was captured and punished (see vv. 4–10). See also 2 Kings 25:1–12; Jer. 52:4–16.
  '3':
  - type: text
    content: When the Babylonians captured Jerusalem
  - type: text
    content: ', the king’s leading officials took their seats in the Middle Gate '
  - type: text
    content: to form their military government
  - type: text
    content: ': Nergal-Sharezer, Samgar-Nebo, Sar-Sechim a high dignitary of state, '
  - type: note
    content: 'Or “the Rab-Saris.” There is a notable difference among English versions and commentaries as to the number of officials mentioned here, the exact spelling of their names, and their titles. See F. B. Huey, Jr., Jeremiah, Lamentations, The New American Commentary, vol. 16 (Nashville: B&H, 1993), 341n71; and John Bright, Jeremiah, Anchor Yale Bible Commentary, vol. 21 (Garden City, NY: Doubleday, 1965), 243.'
  - type: text
    content: Nergal-Sharezer the king’s chief adviser, and all the other officials of the king of Babylon.
  - type: heading
    content: Zedekiah Is Blinded
  '4':
  - type: text
    content: 'Upon seeing them '
  - type: text
    content: at the Middle Gate
  - type: text
    content: ', Zedekiah and all his soldiers tried to escape the city under cover of darkness. They went by way of the king’s garden and slipped through the gate '
  - type: note
    content: This gate was likely the Fountain Gate. The “king’s garden” was near the pool of Siloam. See Neh. 3:15; 12:37.
  - type: text
    content: 'between the two city walls and headed toward the Jordan River Valley. '
  - type: note
    content: Or “the Arabah.”
  '5':
  - type: text
    content: 'But the Babylonians pursued them and caught up with Zedekiah in the plains of Jericho. They captured him and brought him to Nebuchadnezzar king of Babylon, who was at the town of Riblah in the territory of Hamath, '
  - type: note
    content: Riblah was on the Orontes River north of Israel in Syria. Hamath was an important town located on the Orontes River. See 2 Kings 23:33.
  - type: text
    content: 'where he passed sentence on him there. '
  '6':
  - type: text
    content: 'Nebuchadnezzar had Zedekiah’s sons slaughtered at Riblah and forced him to watch their execution. The king of Babylon also executed all the leading men of Judah. '
  '7':
  - type: text
    content: 'Then, he ordered that Zedekiah be bound with chains and have his eyes gouged out. Blinded, King Zedekiah was dragged off to '
  - type: text
    content: distant
  - type: text
    content: ' Babylon.'
  '8':
  - type: text
    content: Meanwhile
  - type: text
    content: ' in Jerusalem, the Babylonians demolished the city walls, and burned down the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Or “the house of the people.” See 52:13.
  - type: text
    content: 'and the king’s royal palace. '
  '9':
  - type: text
    content: 'Nebuzaradan the field general '
  - type: note
    content: Or “the chief executioner.”
  - type: text
    content: 'held captive anyone left behind in Jerusalem and the deserters who had gone over to him and took them all away to '
  - type: text
    content: distant
  - type: text
    content: ' Babylon. '
