document_id: ISA.59,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Conviction of Sin
  - type: text
    content: 'Truly '
  - type: text
    content: Yahweh
  - type: text
    content: '’s arm is not too powerless to save '
  - type: text
    content: you
  - type: text
    content: nor his ear too deaf to hear.
  '10':
  - type: text
    content: We are like the blind groping along a wall,
  - type: text
    content: inching along in the dark like those who cannot see;
  - type: text
    content: we stumble around in broad daylight like it was night,
  - type: text
    content: like the walking dead.
  - type: note
    content: The meaning of this Hebrew clause is uncertain. See Eph. 2:1.
  '11':
  - type: text
    content: 'We are '
  - type: text
    content: frustrated
  - type: text
    content: ', growling like bears,'
  - type: text
    content: like doves cooing mournfully.
  - type: text
    content: We wait and wait for justice, but it never seems to come;
  - type: text
    content: for salvation, but it remains distant.
  '12':
  - type: text
    content: For our many rebellious deeds are stacked high before you;
  - type: text
    content: our sins testify against us.
  - type: text
    content: We are aware of our sins,
  - type: text
    content: and we know our evil deeds all too well.
  '13':
  - type: text
    content: 'We have rebelled and even tried to deny '
  - type: text
    content: Yahweh
  - type: text
    content: ;
  - type: text
    content: we have forsaken our God.
  - type: text
    content: Our speech stirs up oppression and revolt,
  - type: text
    content: and our hearts conceive, then confess, lies.
  - type: note
    content: See Eph. 4:25.
  '14':
  - type: text
    content: Justice is driven away
  - type: text
    content: and righteousness stands on the sidelines,
  - type: text
    content: for truth has stumbled in the public square
  - type: text
    content: and morality cannot enter.
  '15':
  - type: text
    content: Yes, truth has disappeared,
  - type: note
    content: Or “truth is hidden” (Vulg.).
  - type: text
    content: and those who turn from evil become the next victims.
  - type: text
    content: Yahweh
  - type: text
    content: ' saw this and was greatly displeased'
  - type: text
    content: that there was no justice.
  - type: heading
    content: The Lord, Our Redeemer
  '16':
  - type: text
    content: And then he was astonished to see that there was no champion,
  - type: note
    content: Or “intercessor.”
  - type: text
    content: not even one, who would rescue the oppressed.
  - type: note
    content: Or “intercede.”
  - type: text
    content: 'So then his own mighty power '
  - type: note
    content: Or “arm,” a metaphor for his mighty power.
  - type: text
    content: rescued him,
  - type: text
    content: and his own righteousness supported him.
  '17':
  - type: text
    content: He put on righteousness as his body armor,
  - type: note
    content: See Eph. 6:10–18.
  - type: text
    content: salvation for a helmet;
  - type: text
    content: a garment of warring vengeance was his uniform
  - type: text
    content: and passion, his cape.
  '18':
  - type: text
    content: He will repay wrath to his enemies
  - type: text
    content: and retribution to his foes,
  - type: text
    content: according to what they have done.
  - type: text
    content: Reckoning is coming to the islands for what is due them.
  '19':
  - type: text
    content: From the west to the lands of the rising sun,
  - type: text
    content: 'the glory and the name of '
  - type: text
    content: Yahweh
  - type: text
    content: will be held in highest reverence,
  - type: text
    content: for he will break in as a flooding, rushing river
  - type: note
    content: God broke into the human condition as a man who died on the cross. His blood, like a flood of righteousness, washes away the sins of those who believe in him.
  - type: text
    content: 'driven on by the breath of '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: note
    content: Or “When the enemy comes in, the Spirit of Yahweh, like a flood, will lift up a standard against him”; or “When the enemy comes in like a flood, the breath of Yahweh will put him to flight.”
  - type: heading
    content: God’s Covenant with Zion
  '2':
  - type: text
    content: Rather, your sinful deeds have built a barrier
  - type: text
    content: between you and your God.
  - type: text
    content: Your sins have made God turn his face from you
  - type: text
    content: 'so that he does not hear '
  - type: text
    content: your prayers
  - type: text
    content: .
  '20':
  - type: text
    content: “He will come to Zion as a Kinsman-Redeemer
  - type: text
    content: to those of Jacob’s tribes who repent of their rebellion,”
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '21':
  - type: text
    content: “And this is my covenant promise with them,”
  - type: note
    content: See Jer. 31:33; Rom. 11:26–27; Gal. 3:29; Heb. 12:22–24.
  - type: text
    content: 'says Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: '“From now on, my Holy Spirit will '
  - type: text
    content: rest on them
  - type: text
    content: and not depart from them,
  - type: text
    content: 'and my '
  - type: text
    content: prophetic
  - type: text
    content: ' words will fill their mouths'
  - type: text
    content: and will not depart from them, nor from their children,
  - type: text
    content: nor from their descendants, from now on and forever,”
  - type: text
    content: 'says Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '3':
  - type: text
    content: For your hands are stained with blood
  - type: text
    content: and your fingers are dripping with the guilt of sin.
  - type: text
    content: Lies spill from your lips
  - type: text
    content: and your tongue mutters treachery.
  '4':
  - type: text
    content: No one seeks true justice;
  - type: text
    content: no one pleads his case with honesty.
  - type: text
    content: They rely on their illusions and misleading lies;
  - type: text
    content: they conceive trouble and give birth to sin.
  '5':
  - type: text
    content: 'They hatch '
  - type: text
    content: harmful plots
  - type: text
    content: ' like snake’s eggs'
  - type: text
    content: 'and spin '
  - type: text
    content: their lies
  - type: text
    content: ' like a spider spins its web.'
  - type: text
    content: Whoever eats their “eggs” dies
  - type: text
    content: and a poisonous snake gets hatched!
  '6':
  - type: text
    content: Their “webs” cannot substitute as clothing,
  - type: text
    content: they cannot cover themselves with the lies they spin,
  - type: text
    content: nor can their works cover them adequately.
  - type: text
    content: Their actions are evil,
  - type: text
    content: and the wages of violence is in their hands.
  '7':
  - type: text
    content: Their feet eagerly run after evil,
  - type: text
    content: and they are swift to shed innocent blood.
  - type: note
    content: See Prov. 6:16–19; Rom. 3:15–16.
  - type: text
    content: Their imaginations are filled with evil;
  - type: note
    content: See Gen. 6:5.
  - type: text
    content: destruction and desolation litter their paths.
  '8':
  - type: text
    content: They know nothing of the way of peace,
  - type: note
    content: See Rom. 3:17; Eph. 2:14.
  - type: text
    content: and injustice is their way of life.
  - type: text
    content: Their paths are so crooked
  - type: text
    content: that no one who walks in them knows peace.
  - type: heading
    content: Confession of Sin
  '9':
  - type: text
    content: For this reason, justice is far from us
  - type: text
    content: and righteousness doesn’t reach us.
  - type: text
    content: We hope for light, but sadly, there is only darkness.
  - type: note
    content: See John 8:11–12.
  - type: text
    content: We wait for a bright light, but walk in darkness.
