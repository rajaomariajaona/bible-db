document_id: ISA.59,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conviction of Sin
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Truly '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s arm is not too powerless to save '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor his ear too deaf to hear.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: We are like the blind groping along a wall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inching along in the dark like those who cannot see;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we stumble around in broad daylight like it was night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the walking dead.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of this Hebrew clause is uncertain. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'We are '
    - type: usfm
      marker: it
      children:
      - type: text
        text: frustrated
    - type: text
      text: ', growling like bears,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like doves cooing mournfully.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We wait and wait for justice, but it never seems to come;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for salvation, but it remains distant.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For our many rebellious deeds are stacked high before you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: our sins testify against us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are aware of our sins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and we know our evil deeds all too well.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'We have rebelled and even tried to deny '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we have forsaken our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our speech stirs up oppression and revolt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and our hearts conceive, then confess, lies.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Justice is driven away
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and righteousness stands on the sidelines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for truth has stumbled in the public square
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and morality cannot enter.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Yes, truth has disappeared,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “truth is hidden” (Vulg.).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who turn from evil become the next victims.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' saw this and was greatly displeased'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that there was no justice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lord, Our Redeemer
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And then he was astonished to see that there was no champion,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “intercessor.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not even one, who would rescue the oppressed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “intercede.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So then his own mighty power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “arm,” a metaphor for his mighty power.
      marker-yv: yv-n
    - type: text
      text: rescued him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his own righteousness supported him.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He put on righteousness as his body armor,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:10–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: salvation for a helmet;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a garment of warring vengeance was his uniform
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and passion, his cape.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He will repay wrath to his enemies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and retribution to his foes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: according to what they have done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reckoning is coming to the islands for what is due them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: From the west to the lands of the rising sun,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the glory and the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be held in highest reverence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he will break in as a flooding, rushing river
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God broke into the human condition as a man who died on the cross. His blood, like a flood of righteousness, washes away the sins of those who believe in him.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'driven on by the breath of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “When the enemy comes in, the Spirit of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', like a flood, will lift up a standard against him”; or “When the enemy comes in like a flood, the breath of'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: will put him to flight.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Covenant with Zion
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rather, your sinful deeds have built a barrier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: between you and your God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your sins have made God turn his face from you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so that he does not hear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your prayers
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “He will come to Zion as a Kinsman-Redeemer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to those of Jacob’s tribes who repent of their rebellion,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “And this is my covenant promise with them,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 11:26–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:22–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'says Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“From now on, my Holy Spirit will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rest on them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and not depart from them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: prophetic
    - type: text
      text: ' words will fill their mouths'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will not depart from them, nor from their children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor from their descendants, from now on and forever,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'says Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For your hands are stained with blood
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your fingers are dripping with the guilt of sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lies spill from your lips
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your tongue mutters treachery.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: No one seeks true justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no one pleads his case with honesty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They rely on their illusions and misleading lies;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they conceive trouble and give birth to sin.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'They hatch '
    - type: usfm
      marker: it
      children:
      - type: text
        text: harmful plots
    - type: text
      text: ' like snake’s eggs'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and spin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their lies
    - type: text
      text: ' like a spider spins its web.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever eats their “eggs” dies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a poisonous snake gets hatched!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Their “webs” cannot substitute as clothing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they cannot cover themselves with the lies they spin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor can their works cover them adequately.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their actions are evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the wages of violence is in their hands.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Their feet eagerly run after evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they are swift to shed innocent blood.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 6:16–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 3:15–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their imaginations are filled with evil;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: destruction and desolation litter their paths.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They know nothing of the way of peace,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 59:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:14
      - type: usfm
