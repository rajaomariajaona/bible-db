          text: '76'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '84'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '87'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '122'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . These are psalms that praise Jerusalem as God’s dwelling place.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, you’re such a safe and powerful place to find refuge!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re a proven help in time of trouble—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: more than enough
    - type: text
      text: ' and always available whenever I need you.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surrender your anxiety.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Let go!” The Septuagint reads “relax.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be still and realize that I am God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am God above all the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I am exalted throughout the whole earth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here he stands!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Commander!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty Lord of Angel Armies is on our side!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of Jacob fights for us!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So we will never fear
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'even if every structure of support '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “earth itself.”
      marker-yv: yv-n
    - type: text
      text: were to crumble away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will not fear even when the earth quakes and shakes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moving mountains and casting them into the sea.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the raging roar of stormy winds and crashing waves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cannot erode our faith in you.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has a constantly flowing river whose sparkling streams
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bring joy and delight to his people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His river flows right through the city of God Most High,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into his holy dwelling places.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The plural “dwelling places” points to believers today. Each believer is now the holy dwelling place of God. God’s river flows into us and through us.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'God is in the midst of his city, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a reference to Jerusalem, but today God calls his church a “city” on a hill.
      marker-yv: yv-n
    - type: text
      text: secure and never shaken.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At daybreak his help will be seen with the appearing of the dawn.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the nations are in uproar with their tottering kingdoms,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God simply raises his voice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the earth begins to disintegrate before him.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Here he comes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Commander!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The mighty Lord of Angel Armies is on our side!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The God of Jacob fights for us!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone look!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come and see the breathtaking wonders of our God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For he brings '
    - type: usfm
      marker: it
      children:
      - type: text
        text: both
    - type: text
      text: ' ruin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and revival
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s the one who makes conflicts end
  - type: usfm
    marker: q1
    children:
    - type: text
      text: throughout the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breaking and burning every weapon of war.
