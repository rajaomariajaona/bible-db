document_id: PSA.46,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God on Our Side
  - type: text
    content: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: text
    content: A poetic song to the melody of “Hidden Things”
  - type: note
    content: As translated in the Septuagint. Other versions read “for the maidens.” Ps. 46 is known as one of the Songs of Zion. The others are Pss. 48; 76; 84; 87; 122. These are psalms that praise Jerusalem as God’s dwelling place.
  - type: text
    content: God, you’re such a safe and powerful place to find refuge!
  - type: text
    content: You’re a proven help in time of trouble—
  - type: text
    content: more than enough
  - type: text
    content: ' and always available whenever I need you.'
  '10':
  - type: text
    content: Surrender your anxiety.
  - type: note
    content: Or “Let go!” The Septuagint reads “relax.”
  - type: text
    content: Be still and realize that I am God.
  - type: text
    content: I am God above all the nations,
  - type: text
    content: and I am exalted throughout the whole earth.
  '11':
  - type: text
    content: Here he stands!
  - type: text
    content: The Commander!
  - type: text
    content: The mighty Lord of Angel Armies is on our side!
  - type: text
    content: The God of Jacob fights for us!
  - type: text
    content: Pause in his presence
  '2':
  - type: text
    content: So we will never fear
  - type: text
    content: 'even if every structure of support '
  - type: note
    content: Or “earth itself.”
  - type: text
    content: were to crumble away.
  - type: text
    content: We will not fear even when the earth quakes and shakes,
  - type: text
    content: moving mountains and casting them into the sea.
  '3':
  - type: text
    content: For the raging roar of stormy winds and crashing waves
  - type: text
    content: cannot erode our faith in you.
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: God has a constantly flowing river whose sparkling streams
  - type: text
    content: bring joy and delight to his people.
  - type: text
    content: His river flows right through the city of God Most High,
  - type: text
    content: into his holy dwelling places.
  - type: note
    content: The plural “dwelling places” points to believers today. Each believer is now the holy dwelling place of God. God’s river flows into us and through us.
  '5':
  - type: text
    content: 'God is in the midst of his city, '
  - type: note
    content: This is a reference to Jerusalem, but today God calls his church a “city” on a hill.
  - type: text
    content: secure and never shaken.
  - type: text
    content: At daybreak his help will be seen with the appearing of the dawn.
  '6':
  - type: text
    content: When the nations are in uproar with their tottering kingdoms,
  - type: text
    content: God simply raises his voice,
  - type: text
    content: and the earth begins to disintegrate before him.
  '7':
  - type: text
    content: Here he comes!
  - type: text
    content: The Commander!
  - type: text
    content: The mighty Lord of Angel Armies is on our side!
  - type: text
    content: The God of Jacob fights for us!
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: Everyone look!
  - type: text
    content: Come and see the breathtaking wonders of our God.
  - type: text
    content: 'For he brings '
  - type: text
    content: both
  - type: text
    content: ' ruin '
  - type: text
    content: and revival
  - type: text
    content: .
  - type: text
    content: He’s the one who makes conflicts end
  - type: text
    content: throughout the earth,
  - type: text
    content: breaking and burning every weapon of war.
