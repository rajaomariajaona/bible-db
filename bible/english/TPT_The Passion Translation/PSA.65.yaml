document_id: PSA.65
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: What a Savior
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s poetic song
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: O God in Zion, to you even silence is praise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who answers prayer,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 65:1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The root of the Hebrew word for “prayer” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: palal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which also means “tent peg.” Jewish tradition views'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: palal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: prayer (intercession) as a means of attaching yourself to God. In the same way a tent peg establishes a tent and fastens it securely, so
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: palal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: prayer fastens the soul to God.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Palal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: prayer is when you grab hold of God and attach yourself to him in surrender and humility. Hold on to God like a tent peg holds on to a tent.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'all of humanity comes before you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with their requests
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Though we are overcome by our many sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your sacrifice covers over them all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: How blessed is the one you choose
- type: usfm
  marker: q1
  children:
  - type: text
    text: to live near you in your courts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The beauty of your house, your holy temple, satisfies us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You answer our prayers with amazing wonders
- type: usfm
  marker: q1
  children:
  - type: text
    text: and with awe-inspiring displays of power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the righteous God who helps us like a father.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone everywhere looks to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are the confidence of all the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even to the farthest islands of the sea.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: What jaw-dropping, astounding power is yours!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the mountain maker who sets them all in place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You muzzle the roar of the mighty seas
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the rage of mobs with their noisy riots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: O God, to the farthest corners of the planet
- type: usfm
  marker: q1
  children:
  - type: text
    text: people will stand in awe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: startled and stunned by your signs and wonders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sunrise brilliance and sunset beauty
- type: usfm
  marker: q1
  children:
  - type: text
    text: both take turns singing their songs of joy to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Your visitations of glory bless the earth;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 65:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “You’ve made the earth drunk with your visitations.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: the rivers of God overflow and enrich it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You paint the wheat fields golden as you provide rich harvests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Every field is watered with the abundance of rain—
- type: usfm
  marker: q1
  children:
  - type: text
    text: showers soaking the earth and softening its clods,
- type: usfm
  marker: q1
  children:
  - type: text
    text: causing seeds to sprout throughout the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You crown the earth with the fruits of your goodness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wherever you go, the tracks of your chariot wheels drip with oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Luxuriant green pastures boast of your bounty
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you make every hillside blossom with joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The grazing meadows are covered with flocks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the fertile valleys are clothed with grain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: each one dancing and shouting for joy, creation’s celebration!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re all singing their songs of praise to you!
