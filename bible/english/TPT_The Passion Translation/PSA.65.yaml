document_id: PSA.65,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: What a Savior
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s poetic song
  - type: text
    content: O God in Zion, to you even silence is praise!
  - type: text
    content: You who answers prayer,
  - type: note
    content: The root of the Hebrew word for “prayer” is palal, which also means “tent peg.” Jewish tradition views palal prayer (intercession) as a means of attaching yourself to God. In the same way a tent peg establishes a tent and fastens it securely, so palal prayer fastens the soul to God. Palal prayer is when you grab hold of God and attach yourself to him in surrender and humility. Hold on to God like a tent peg holds on to a tent.
  - type: text
    content: 'all of humanity comes before you '
  - type: text
    content: with their requests
  - type: text
    content: .
  '10':
  - type: text
    content: Every field is watered with the abundance of rain—
  - type: text
    content: showers soaking the earth and softening its clods,
  - type: text
    content: causing seeds to sprout throughout the land.
  '11':
  - type: text
    content: You crown the earth with the fruits of your goodness.
  - type: text
    content: Wherever you go, the tracks of your chariot wheels drip with oil.
  '12':
  - type: text
    content: Luxuriant green pastures boast of your bounty
  - type: text
    content: as you make every hillside blossom with joy.
  '13':
  - type: text
    content: The grazing meadows are covered with flocks,
  - type: text
    content: and the fertile valleys are clothed with grain,
  - type: text
    content: each one dancing and shouting for joy, creation’s celebration!
  - type: text
    content: They’re all singing their songs of praise to you!
  '3':
  - type: text
    content: Though we are overcome by our many sins,
  - type: text
    content: your sacrifice covers over them all.
  '4':
  - type: text
    content: How blessed is the one you choose
  - type: text
    content: to live near you in your courts.
  - type: text
    content: The beauty of your house, your holy temple, satisfies us.
  '5':
  - type: text
    content: You answer our prayers with amazing wonders
  - type: text
    content: and with awe-inspiring displays of power.
  - type: text
    content: You are the righteous God who helps us like a father.
  - type: text
    content: Everyone everywhere looks to you,
  - type: text
    content: for you are the confidence of all the earth,
  - type: text
    content: even to the farthest islands of the sea.
  '6':
  - type: text
    content: What jaw-dropping, astounding power is yours!
  - type: text
    content: You are the mountain maker who sets them all in place.
  '7':
  - type: text
    content: You muzzle the roar of the mighty seas
  - type: text
    content: and the rage of mobs with their noisy riots.
  '8':
  - type: text
    content: O God, to the farthest corners of the planet
  - type: text
    content: people will stand in awe,
  - type: text
    content: startled and stunned by your signs and wonders.
  - type: text
    content: Sunrise brilliance and sunset beauty
  - type: text
    content: both take turns singing their songs of joy to you.
  '9':
  - type: text
    content: Your visitations of glory bless the earth;
  - type: note
    content: The Septuagint reads “You’ve made the earth drunk with your visitations.”
  - type: text
    content: the rivers of God overflow and enrich it.
  - type: text
    content: You paint the wheat fields golden as you provide rich harvests.
