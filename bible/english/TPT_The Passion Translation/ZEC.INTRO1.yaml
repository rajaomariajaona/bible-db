  - type: text
    content: About the Book of Zechariah
  - type: text
    content: Zechariah is one of the longer books of the Twelve (the Minor Prophets) and is one of the most difficult books of the Bible to translate and interpret. Hebrew, as a spoken language, was starting to die and be replaced by Aramaic, the language of the Babylonian conquerors.
  - type: text
    content: The exiles were back in Judah, their homeland, having returned from captivity in Babylon some twenty years previously (538 BC). The last sands of the seventy years of exile predicted by Jeremiah (Jer. 25:11; 29:10) had dropped through to the pile at the bottom of the hourglass.
  - type: text
    content: In this exciting season, the prophets Zechariah and Haggai were encouraging the people to rebuild the temple and restart the Israelite civilization. This revitalization of Israel would come to be known as “Second Temple Judaism” and was the era and culture in which Jesus grew up.
  - type: text
    content: 'The potent and fiery Old Testament prophetic tradition (unique to Israel) was entering its twilight years, and the season of rabbinic sages and apocalyptic visions was dawning. This fault line runs through the book of Zechariah, which, along with Daniel, expresses the birth of revelatory/apocalyptic language. The book may be divided into two distinct but related parts. The first section is chapters 1–8, which incorporate night visions along with additional revelatory “words of '
  - type: text
    content: Yahweh
  - type: text
    content: .” Together, these convey themes of hope, rebuke, restoration, and renewal. The second section is chapters 9–14, containing two prophetic oracles of distinctive apocalyptic language, conveying the primary themes of the divine destruction of the enemies of the people of God, the restoration and cleansing of the postexilic community of Judah, and the coming of the Messianic Priest-King, along with the establishment of the universal, everlasting kingdom of God.
  - type: text
    content: Zechariah’s writing is highly cinematic and visual, with the first eight chapters of his book chronicling the eight night visions he experienced. As is often the case with such visions including angels, we occasionally have trouble figuring out who is speaking to whom. This accounts for the plentiful variations among English versions of Zechariah. The literary narratives of such revelatory reveries, much like our own dreams, are distinctly nonlinear.
  - type: text
    content: 'It is a book of high hopes for an Israelite renaissance, which merges with a prophetic anticipation of the political, cultural, and social turmoil that will erupt in the postexilic community of God’s people in the centuries leading up to the dominance of the Roman Empire in the first century AD. This is highlighted, for example, in chapters 11 and 12. The anticipated pain of this future trauma is mixed with stubborn hope, sublimated into the prophetic oracles and apocalyptic visions splashing forth in the final chapters. These are oracles that also anticipate the coming of Jesus Christ, the Messianic King, and the fulfillment of the hope promised to the people of God. If '
  - type: text
    content: Yahweh
  - type: text
    content: ', whose promises always prevail, did not awaken the soul of Israel in Zechariah’s time, then he would certainly do so at some moment in the future.'
  - type: text
    content: 'Zechariah, in his very heart and soul, was compelled to process a depressing shift in Israelite society. In the former classical era of David, Solomon, and their descendants, independent Israel had a stable separation of three powers: kings, priests, and prophets. At the beginning of the book, Zechariah hoped to restore this “trinity” by naming Zerubbabel (political) and Joshua (priestly) as the heirs of Moses and Aaron. However, the prophetic voice was no longer resonating with the people, and Zerubbabel was unable to assert any real political power in the shadow of the mighty Persian Empire. Relegated to the weaker role of “county commissioner,” he faded from the scene. Of the three pillars of Israelite culture, only the priestly one survived. The prophetic and royal branches evaporated before Zechariah’s eyes. However, notwithstanding the contemporary discouragement, all eight visions granted to the prophet Zechariah (1:7–6:8) reinforce the hope provided in the divine revelation of God’s redemptive program. The civil and religious roles played out by Zerubbabel and Joshua in Zechariah’s day will be fulfilled in the crowning of the ultimate Messianic Priest-King.'
  - type: text
    content: Many scholars (Childs, LaSor, Baldwin, Klein, and most Jewish scholars) believe that the book of Zechariah is one cohesive unit. Others believe that some form of the last part of the book was added later. Given the heartrending, unified plot of the book, it makes little sense to divide it.
  - type: text
    content: Purpose
  - type: text
    content: In its final form, the book of Zechariah lays out the backstory of the failure of postexilic Israel to reclaim the glory of David, Solomon, and the original temple and reveals why that fumbled ambition had to be transposed into a new hope for a Messianic age to come. The promises of God and the faith heritage of Israel were simply too rich to abandon. The purpose of this book is much the same as that of Haggai, which was authored by Zechariah’s contemporary.
  - type: text
    content: 'Thus, Zechariah laid out a future hope for God’s people throughout his prophecy. The eight night visions and accompanying revelations, along with the prophetic oracles in the second half of the book, reveal truly encouraging details of the hope that God clearly intended his discouraged people to understand and hold on to: God’s intention to have his temple in Jerusalem rebuilt, in order to house his glorious return. His people will be fully restored to their homeland. They will be cleansed from all their sins and be granted a renewed prosperity. They will also ultimately enjoy a God-given peace, with their enemies destroyed by the hand of their Sovereign Lord. And in the end, the arrival of the Messianic, priestly Shepherd-King will terminate the succession of corrupt and wicked shepherd-rulers as he ushers in a kingdom of never-ending glory and righteousness.'
  - type: text
    content: Underlying Zechariah’s message, as his name indicates, is the foundation of the divine plan of redemption. He wanted to remind the people of God that “
  - type: text
    content: Yahweh
  - type: text
    content: ' remembers” his covenant promises. God had not forgotten his people then, and he has not forgotten us now.'
  - type: text
    content: Author and Audience
  - type: text
    content: Zechariah, like Ezekiel, was more of a priest who operated prophetically than the other way around. Hebrew names are more than just labels, and Zechariah’s name means “
  - type: text
    content: Yahweh
  - type: text
    content: ' remembers.” There are over two dozen men in the Bible with that name.'
  - type: text
    content: Most likely, this Zechariah was born among the Israelite exiles during their captivity in Babylon. After the Persians destroyed Babylon, they set these exiles free, and Zechariah returned to Jerusalem with a wave of them, eager to lay eyes on the homeland that they had never seen. These returned exiles were his audience.
  - type: text
    content: He came from a priestly family. His father, Berechiah, may have died when Zechariah was young, so it seems Zechariah was raised and adopted by his grandfather Iddo (Ezra 6:14; Zech. 1:1). Iddo was a priest (Neh. 12:1–4, 16), so Zechariah was born a priest with the heart of a prophet, much like Ezekiel and John the Baptist.
  - type: text
    content: Zechariah and Haggai were contemporaries, with Haggai likely much older than the younger Zechariah. According to Haggai 1:1, Haggai’s ministry began on the first day of the sixth month of the second year of Darius (520 BC), and Zechariah’s prophetic ministry began roughly two months later in the same year (Zech. 1:1). Zechariah dated his night visions (1:7–6:8) on the twenty-fourth day of the eleventh month of Darius’ second year.
