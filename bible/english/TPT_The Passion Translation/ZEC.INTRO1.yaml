  - type: text
    content: ) is the plural form. The extensive use of this title in the book of Zechariah underscores the predominant motif of the all-powerful Sovereign Lord of the universe as the heavenly commander of innumerable angelic warriors. Such an omnipotent force is irresistible and indestructible, and it emphasizes the reality that throughout history, the present, and the future, the enemies of God and his people will never be able to prevail against such an opponent.
  - type: text
    content: The Day of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: ' Zechariah referred to the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' over twenty times in his prophetic work. Most commonly, he referred to events that will happen “on that day,” and these references bring out two contrasting emphases, one positive and one negative.'
  - type: text
    content: 'For the enemies of God and his people, such a day portends an ominous, catastrophic destruction, for then they will face the terrible wrath of the living God. However, for the people of God, the '
  - type: text
    content: ultimate
  - type: text
    content: ' day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be one of unimaginable peace and joy, for in that day, God will be victorious over all his enemies and fulfill his plan of redemption and renewal for all eternity. But it must also be recognized that throughout the history of the Israelite people, they also suffered a day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' punishment for their sin—although such a judgment was temporary, never absolute. That terrible latter destiny is reserved for the unrepentant enemies of God.'
  - type: text
    content: 'And so, on that day, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will execute justice, destroy wickedness, vindicate the faithful remnant, and set everything right. In New Testament terms, his kingdom is coming; his will shall be done on earth as it is in heaven. Heaven is literally and inevitably invading earth. And all of that is accomplished solely on the basis of the finished work of salvation in the person and work of Jesus Christ, God’s Son, our Messianic King of kings. This theme of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is one that is consistently found throughout the Old Testament, incorporated particularly in the canonical Prophets, both Major and Minor.'
  - type: text
    content: Angelic Revelation.
  - type: text
    content: ' Throughout the Old Testament, certain concepts like angels, eschatology, and the afterlife gradually come into greater prominence and clarity over time. Revelatory angels—prominently though not exclusively found in Daniel and Zechariah—play a significant role in the increasingly frequent genre of prophetic-apocalyptic literature that began to emerge from the 500s BC onward. The book of Revelation is by far the best example of new covenant/New Testament biblical apocalyptic literature.'
  - type: text
    content: 'In Zechariah, there are two different kinds of angelic beings involved in communicating divine revelation to the prophet via the eight visions recounted in chapters 1–6. One is referred to simply as “the angel who was talking to me.” Commentators generally refer to him as “the interpreting angel,” for that is precisely his task: to explain to the prophet the meaning of the visions he is experiencing (1:9, 13–14, 19; 2:3; 4:1, 4, 11; 5:5, 10; 6:4–5). The other angel is a manifestation of God himself, designated here and elsewhere in the Old Testament as “the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: '.” He is explicitly mentioned in 1:11–12; 3:1–3, 6. Elsewhere, the single term '
  - type: text
    content: angel
  - type: text
    content: ' is likely to indicate this divine figure, as in 2:3; 3:4. Then the reference in 2:1 to “a man with a measuring line” is almost certainly to the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: '. This figure is uniformly understood throughout the Old Testament as a manifestation of God in human form, commonly referred to as a '
  - type: text
    content: theophany
  - type: text
    content: . Because mortal eyes may never view the essential being of God himself, his visible presence to individuals chosen to receive divine revelation is most often, but not always, via the manifestation of such an angelic being.
  - type: text
    content: God Communicating through Visions.
  - type: text
    content: ' It is evident in Scripture that God reveals himself and his ongoing redemptive plans to individuals in both dreams and visions. God gives dreams to those who are asleep, but visions occur while individuals are awake. In the case of Zechariah, the context suggests that he was most likely awake when he received these visions (see 4:1), apparently, all in one night.'
  - type: text
    content: 'Zechariah’s visions have themes relating to both God’s judgment on his people and his promise to redeem, renew, and restore them back in their homeland with a focus on the New Jerusalem and a dual priestly-royal leadership. There are eight visions:'
  - type: text
    content: • The horsemen (1:8–17)
  - type: text
    content: • Four chariots (6:1–8)
  - type: text
    content: • Causes of the exile
  - type: text
    content: ◦ Four horns and four craftsmen (1:18–21)
  - type: text
    content: ◦ The flying scroll (5:1–4)
  - type: text
    content: ◦ The woman in a barrel (5:5–11)
  - type: text
    content: • The New Jerusalem
  - type: text
    content: ◦ The measuring man (2:1–13)
  - type: text
    content: • Restoration of priestly-royal leadership
  - type: text
    content: ◦ Clean clothes for the high priest (3:1–10)
  - type: text
    content: ◦ The lampstand and two olive trees—Zerubbabel and Joshua (4:1–14)
  - type: text
    content: The Prophet as “Custodian” of the Covenant.
  - type: text
    content: ' Underlying the message of the prophet Zechariah throughout the book is the foundational “scaffolding” of the divine covenant. Zechariah’s language surrounding this phenomenon is proof of this. Most significant are the various references to the classic summary formulation of the covenant: “I will be your God, and you shall be my people” or variations on that wording (see Ex. 6:7; Lev. 26:12; Jer. 30:22, for example). Zechariah referenced this summary formula both explicitly (Zech. 8:8; 13:9) and implicitly (2:11; 10:6–7). In 9:11, he recorded the following words God revealed to him: “As for you, Zion, because of my covenant with you sealed with blood, I have set your captives free from the waterless pit of their prison.” The context of this revelation makes it clear that it denotes the divine rationale for God delivering his people from exile in Babylon. Then, by way of contrast, Zechariah’s sixth vision in 5:1–4 describes the application of the covenant curse to the people of God via the motif of a flying scroll. This scroll is a symbol of the covenant documents, and on each side is recorded the people’s violations of the covenant statutes, which resulted in the Judean population being sent into exile in Babylon, along with the destruction of their homeland.'
  - type: text
    content: 'It is evident that Zechariah was keenly aware of the details of the covenant that God had made with his people so many years before, an awareness that other canonical prophets also clearly demonstrated. In short, Zechariah was well acquainted with these covenant statutes and what they entailed, including punishments (or curses) for violations and blessings for faithful observance of those laws. So when the prophet related both the judgments '
  - type: text
    content: Yahweh
  - type: text
    content: ' handed down to his people and the blessings he had in store for them—as well as for the nations around them (see the discussion in the following theme)—we can be quite definite that it was the knowledge of what the divine covenant contained, what it meant for the postexilic community, and what it portended for the future that undergirded his prophetic work.'
  - type: text
    content: Thus the description of Zechariah as a “custodian” of the covenant is an apt one since it clearly indicates to his audience—both then and now—that God has never forgotten his people and that his covenant promises have always been front and center when it comes to the redemptive focus on his people.
  - type: text
    content: Promises of Restoration and Renewal—Blessing for Israel and the Nations.
  - type: text
    content: ' The long line of Davidic royalty and the heroic prophets who boldly challenged the leaders with direct words from God was coming to an end. The priests, rabbinic sages, and apocalyptic visionaries were filling the vacuum. Zechariah personally embodied a bridge between these two eras. Zechariah spoke forth some of the last words of Old Testament prophecy (“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have this to say . . .”; e.g., 8:3, 6) and no doubt watched with keen interest and comfort for the fulfillment of the promise to renew and reforge the Davidic royal line by the merging of a priestly ruler (i.e., Joshua, the high priest) with that of a civil governor in the line of David (i.e., Zerubbabel). Zechariah’s fourth and fifth visions in chapters 3 and 4 reveal this theme explicitly, and the oracle of 6:9–15 reinforces it. In other words, the line of King David would not be consummated by a traditional royal figure but by the emergence of the Messianic Priest-King, Jesus Christ—David’s greatest son. The merging of the roles of Joshua and Zerubbabel prophetically anticipated this Messianic expectation. It is also worth mentioning at this point that the prophet Haggai, Zechariah’s contemporary, reinforced the significant role Zerubbabel played in the redemptive plan of God when he likened the governor of the postexilic Judean community to the divine “signet ring” (Hag. 2:20–23), an indication that God had chosen Zerubbabel as a guarantee, or pledge, that someday the Messiah descended from David would certainly come.'
  - type: text
    content: And so, notwithstanding the significant disappointments at the time of Zechariah, God revealed to his servant, the prophet, promises of restoration and renewal that focused squarely on the covenant people of Israel as well as the surrounding nations; these promises are scattered throughout the prophecy. Casting aside the legacy of the old covenant era, Zechariah launched courageously toward the new covenant age with potent apocalyptic promises of a blessed hope and a victorious future. What do we do with deep disappointment in our lives? As people of faith, we would do well to imitate Zechariah, who picked up the pieces, trusted the promises of God, and painted a picture of a fresh future hope into which we can live.
  - type: text
    content: 'Zechariah 2:1–13 and chapter 8 show God restoring Israel not only for her own benefit but also for the benefit of the other nations, to whom she would be a blessing. In other words, not only would the Israelite people be renewed in their covenant relationship with their Sovereign Lord, but people from many lands the world over would also be drawn to the worship of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and, by clear implication, be joined to the covenant people as gentile believers. This conclusion is made abundantly clear in 2:11 and 8:20–23 and was spectacularly fulfilled in the new covenant age of the Holy Spirit, after Jesus had ascended back to the heavenly realm to rejoin God his Father on the throne of the eternal kingdom. Such a blessing will continue as the gospel is proclaimed throughout the world until Jesus returns.'
  - type: text
    content: Seeing Jesus in the Book.
  - type: text
    content: ' Despite the disappointments and frustrations experienced by the prophet and the people to whom he was ministering, Zechariah gave powerful and encouraging Messianic images that anticipated the coming of Jesus into the world. These prophecies would have greatly encouraged Zechariah’s 500s BC audience, providing they had ears to hear what God was saying. And in the first century AD, the first Christians—and all those generations that followed—would have seen in this book previews of the appearing of the Messiah. Zechariah records some of the most potent prophetic oracles and images related to the coming of Jesus, the Messianic Priest-King, in the canonical prophecies of the Old Testament and elsewhere. These are listed below:'
  - type: text
    content: • In 6:11–12, Joshua, the high priest, is about to be crowned as a priest-king, and in these verses, he is given the name of “the Branch,” a Messianic title associated with the royal lineage of King David, as indicated in Isaiah 4:2; 11:1; Jeremiah 23:5; 33:15. The New Testament makes it clear that the fulfillment of the Messianic “Branch” is none other than Jesus Christ himself. John the apostle recorded in his vision of the heavenly Jerusalem the very words of the risen Christ to that effect in Revelation 22:16, and one of the elders surrounding the heavenly throne in Revelation 5:5 also testified to this identification.
  - type: text
    content: '• This title is also found in Zechariah 3:8–9, with the added feature of “the stone before Joshua,” elsewhere referred to in the Old Testament as a “rock” or the “capstone” or “cornerstone” of the temple (Ps. 118:22; Isa. 8:14; 28:16; Dan. 2:34–35, 45). The prophet then mentioned in Zechariah 10:4 that from Judah will come the “cornerstone,” which, in the context of this chapter, points to a victorious, divine Redeemer, who will conquer all the enemies of God’s people. This symbol is an undeniable Messianic characteristic, as evidenced by the following New Testament references that identify this “cornerstone” with the person of Jesus Christ: Matthew 21:42; Ephesians 2:19–22; 1 Peter 2:6–8.'
  - type: text
    content: • In Zechariah 9:9, the prophet described the arrival of the King in the city of Jerusalem, on the back of a donkey. The New Testament Gospel writers unequivocally identify this rider as Jesus, who entered Jerusalem on a donkey in the week before his crucifixion and death. Both Matthew (Matt. 21:5) and John (John 12:15) attest to this event on the first Palm Sunday as a direct fulfillment of the Zechariah prophecy.
  - type: text
    content: '• In Zechariah 11:12–13, Zechariah made reference to thirty pieces of silver being thrown to the potter inside the Jerusalem temple. The context in chapter 11 reveals Zechariah role-playing a shepherd-leader, commanded by '
  - type: text
    content: Yahweh
  - type: text
    content: ' to pasture a flock marked for slaughter—that is, the rebellious nation of Judah. After revoking a covenant made with the rebellious “flock,” Zechariah asked to be paid, and they gave him thirty pieces of silver. The Lord then commanded the prophet to throw the money to the potter in the temple. '
  - type: note
    content: The allusion to the potter involves an incident in the life of the prophet Jeremiah, as recorded in Jeremiah 19:1–13. See Matthew 27:9–10.
  - type: text
    content: This detail refers prophetically to the “blood money” that the Pharisees paid to Jesus’ disciple Judas Iscariot for information leading to the arrest of Jesus in the garden of Gethsemane. See Matthew 26:14–15; 27:3–10.
  - type: text
    content: • In Zechariah 12:10, there is a reference to the mournfully repentant inhabitants of Jerusalem, lamenting their murderous actions and gazing on “the Pierced One” (i.e., God himself). It is a repentant response that is triggered by an outpouring of the divine Spirit of grace and supplication. This expression points, in prophetic anticipation, to the action of the Roman soldier in piercing Jesus’ side with a spear as he hung dying on the cross while the crowd gazed at him. John 19:34–37 records this incident and quotes this prophecy, although the attitude of the watchful crowd in their hearts is not indicated in the gospel record. A spirit of sorrowful repentance, however—at least in some onlookers—may be implied by the citing of Zechariah 12:10.
  - type: text
    content: '• In 13:1, in association with the prophetic anticipation of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ', we read that “a flowing fountain” will be opened up “for the family of David and the people of Jerusalem—a fountain to wash away sin and impurity.” The agent of that opening is undeniably '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself. Such a cleansing flow in the elimination of iniquity is an essential element in the prophetic outworking of the new covenant as indicated in Ezekiel 36:25. The supreme expression and fulfillment of the cleansing from sin is found in the shedding of Christ’s blood on the cross, as recorded in Hebrews 9:14.'
  - type: text
    content: '• In Zechariah 10:3 and 13:7 respectively, a contrast is drawn between '
  - type: text
    content: Yahweh
  - type: text
    content: ' punishing the wicked, godless shepherd-leaders of Israel and then allowing his own righteous “shepherd” to be struck down, followed by the scattering of his people in judgment. In 13:8–9, mention is then made of one-third of the people being refined in that punishment, resulting in their profound spiritual renewal and transformation. This reveals God’s mercy in the midst of judgment. However, the reference in 13:7 also anticipates the emergence of Jesus Christ as the “Good Shepherd,” recorded in John 10:1–21, who was struck down at the instigation of the rebellious population in Jerusalem. Jesus himself quoted Zechariah 13:7 in Matthew 26:31, with reference to the immediate consequences of Peter’s denial (Matt. 26:69–74)—namely, the abandonment of Jesus by all of his band of disciples. However, God’s redemptive grace ensured that a chosen worldwide “remnant”—past, present, and future—would be purged of their sin and redeemed by the atoning sacrifice of the Messianic Shepherd-King at Calvary.'
  - type: text
    content: '• In Zechariah 14:4–5, we read about the victorious return of Israel’s God to the Mount of Olives near Jerusalem after his all-conquering destruction of Israel’s enemies. This is an event that is directly linked to a manifestation of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: '. Significantly, this text speaks of the legion of “holy ones” who will accompany their victorious Lord and God on his return. The accompanying host may include resurrected followers of '
  - type: text
    content: Yahweh
  - type: text
    content: ' as well as angels. This scenario anticipates the final return of Jesus Christ to earth with his “holy ones” at the end of the age, ushering in the final judgment. See Matthew 25:31; 1 Thessalonians 3:13; Jude (Judah) 14; Revelation 19:14.'
  - type: text
    content: '• In Zechariah 14:8, there is another reference to a day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' event: the phenomenon of “living waters” flowing out from Jerusalem to the Dead Sea (i.e., in the east) and the Mediterranean Sea (i.e., in the west). This is an allusion to the extended vision of an identical phenomenon witnessed by the prophet Ezekiel some fifty years prior to Zechariah’s ministry (ca. 571 BC), recorded in Ezekiel 47:1–12 (and see Joel 3:18). These references to the flow of “living waters” are consummated in Revelation 22:1–2 where the river of the water of life flows from the throne of God and the Lamb down the middle of the street in the heavenly city of Jerusalem. What is also of special significance here is that such a vision is a prophetic glimpse into the identification of Jesus as the essence of “living water” in John 4:10–14: the source of eternal life.'
  - type: text
    content: '• And finally, in Zechariah 14:9, in another reference to the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ', we read that '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be King over the entire earth. There is no doubt that this is another prophecy that points forward to the universal rule of the risen Lord Jesus Christ in the eternal kingdom of the new heavens and the new earth, a reign that comes to its supreme expression in the book of Revelation, especially in chapters 4, 5, 21, and 22.'
  - type: text
    content: 'For Zechariah (see chapters 7 and 8), the coming kingdom was '
  - type: text
    content: inevitable
  - type: text
    content: ' (in terms of God’s promise) but '
  - type: text
    content: conditional
  - type: text
    content: ' (in terms of the people’s spiritual readiness to experience such a restoration). Nonetheless, the context of these two chapters makes it clear that it is by God’s gracious initiative and enabling alone that the people will be restored, redeemed, and renewed. In other words, this '
  - type: text
    content: conditionality
  - type: text
    content: ' will also become an '
  - type: text
    content: inevitability
  - type: text
    content: ', as the people’s initial unwillingness to practice justice, mercy, and compassion will be transformed—by implication—into faithful obedience to God and his covenant statutes. Chapter 8 reinforces this perspective when the Lord’s promise to bless Jerusalem will result in the people’s spiritual transformation, and the land will experience abundant joy, peace, and prosperity. These promises will find their ultimate fulfillment in the appearance of Jesus Christ, the Messiah.'
  - type: heading
    content: Zechariah
  - type: heading
    content: Affection and Union
