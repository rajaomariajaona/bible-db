document_id: 1JN.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Divine Sonship
  - type: text
    content: 'Look with wonder at the depth of the Father’s marvelous love that he has lavished on us! He has called us and made us his very own '
  - type: text
    content: beloved
  - type: text
    content: ' children. '
  - type: note
    content: As translated from the Aramaic. The Greek reads “that we should be called God’s children, and indeed we are.” See Rom. 8:14–17; Gal. 3:26–27; 4:6–7.
  - type: text
    content: 'The reason the world doesn’t recognize who we are is that they didn’t recognize him. '
  - type: note
    content: That is, Jesus, God incarnated in human form.
  '10':
  - type: text
    content: 'Here is how God’s children can be clearly distinguished from the children of the Evil One. '
  - type: note
    content: Or “children of the devil” (or “the Adversary”). This is the only place in the New Testament that refers to those who have never experienced salvation as the devil’s children. See also John 8:44.
  - type: text
    content: 'Anyone who does not demonstrate righteousness '
  - type: note
    content: Or “justice.”
  - type: text
    content: and show love to fellow believers is not living with God as his source.
  - type: note
    content: Or “is not of God.”
  - type: heading
    content: Love One Another
  '11':
  - type: text
    content: 'The beautiful message you’ve heard right from the start is that we should walk in self-sacrificing love toward one another. '
  '12':
  - type: text
    content: 'We should not be like Cain, who yielded to the Evil One and brutally murdered his own brother, '
  - type: text
    content: Abel
  - type: text
    content: '. '
  - type: note
    content: See Gen. 4:8–10.
  - type: text
    content: And why did he murder him? Because his own actions were evil and his brother’s righteous.
  '13':
  - type: text
    content: 'So don’t be shocked, beloved brothers and sisters, if you experience the world’s hatred. '
  '14':
  - type: text
    content: 'Yet we can be assured that we have been translated from '
  - type: text
    content: spiritual
  - type: text
    content: ' death into '
  - type: text
    content: spiritual
  - type: text
    content: ' life because we love the family of believers. A loveless life remains spiritually dead. '
  '15':
  - type: text
    content: 'Everyone who keeps hating a fellow believer is a murderer, '
  - type: note
    content: See Matt. 5:21–22.
  - type: text
    content: and you know that no murderer has eternal life residing in him.
  '16':
  - type: text
    content: 'This is how we have discovered love’s reality: Jesus sacrificed his life for us. '
  - type: note
    content: Or “that he [Jesus] placed his soul over us and we are constantly indebted to place our souls over our brothers and sisters.”
  - type: text
    content: 'Because of this great love, we should be willing to lay down our lives for one another. '
  '17':
  - type: text
    content: If anyone sees a fellow believer in need and has the means to help him, yet shows no pity and closes his heart against him, how is it even possible that God’s love lives in him?
  - type: note
    content: Real love is an action. Think of God’s love, which rescues, saves, and empowers. Love is more like a verb than a noun. Love is seen by actions, not just words.
  '18':
  - type: text
    content: 'Beloved children, our love can’t be an abstract theory we only talk about, but a way of life demonstrated through our loving deeds. '
  '19':
  - type: text
    content: 'We know that the truth lives within us '
  - type: note
    content: Or “that we are of [belong to] the truth.”
  - type: text
    content: 'because we demonstrate love in action, which will reassure '
  - type: note
    content: Or “tranquilize our hearts.”
  - type: text
    content: our hearts in his presence.
  - type: note
    content: The Aramaic can be translated “By this we recognize that we are of the truth and make our hearts confident [or ‘deliver our hearts’] before he comes.”
  '2':
  - type: text
    content: 'Beloved, we are God’s children right now; however, it is not yet apparent what we will become. But we do know that when it '
  - type: note
    content: The Aramaic can be translated “It has not been revealed until now what we are destined to be.” Many translations view the subject of the Greek verb phanerōthē to be Christ (“when he is revealed”), but in the immediate context, “what we will become” is the subject and makes better grammatical sense.
  - type: text
    content: 'is finally made visible, '
  - type: note
    content: The Greek word phaneroō means “to make clear, to be made visible,” and it comes from the verb phainō, which means “to shine.” John is saying we are not yet shining as we will one day. We are both children of God and reflections of God. See Dan. 12:3.
  - type: text
    content: 'we will be just like him, for we will see him as he truly is. '
  '20':
  - type: text
    content: 'Whenever our hearts make us feel guilty '
  - type: text
    content: and remind us of our failures
  - type: text
    content: ', we know that God is much greater '
  - type: text
    content: and more merciful
  - type: text
    content: ' than our conscience, and he knows everything there is to know '
  - type: text
    content: about us
  - type: text
    content: '. '
  - type: note
    content: 'There is a higher courtroom for the human heart: it is where grace is enthroned. The very worst that is in us is known by God and he still showers mercy, love, and acceptance upon us. This is the greatness of God’s grace. He sees beyond the sin of a moment and sees the holy affections of love in those who refuse to turn away from him. See John 21:17.'
  '21':
  - type: text
    content: 'My delightfully loved friends, when our hearts don’t condemn us, we have a bold freedom to speak face-to-face with God. '
  '22':
  - type: text
    content: 'And whatever we ask of him we receive, '
  - type: note
    content: See Matt. 7:7; 21:22; John 9:31; 14:13–14; 15:7.
  - type: text
    content: 'because we keep his commands. And by our beautiful intentions '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: we continue to do what brings pleasure to him.
  '23':
  - type: text
    content: 'So these are his commands: that we continually place our trust in the name of his Son, Jesus Christ, and that we keep loving one another, just as he has commanded us. '
  '24':
  - type: text
    content: For all who obey his commands find their lives joined in union with him, and he lives and flourishes in them. We know and have proof that he constantly lives and flourishes in us, by the Spirit that he has given us.
  '3':
  - type: text
    content: 'And all who focus their hope on him will always be purifying '
  - type: note
    content: The Greek word hagnizo is found only twice in the New Testament. John uses the term in John 11:55 to refer to ritually cleansing ourselves in order to be morally undefiled as we come into God’s presence.
  - type: text
    content: 'themselves, '
  - type: note
    content: There is a purifying hope that transforms us. This is more than the second coming. This is the hope of glory, that we will be revealed as fully like Christ. See Col. 1:25–27.
  - type: text
    content: just as Jesus is pure.
  - type: note
    content: Or “as that one [Jesus] is pure.” The beautiful purity of Jesus’ life is the model for our lives.
  - type: heading
    content: The Character of God’s Children
  '4':
  - type: text
    content: 'Anyone who indulges in sin '
  - type: note
    content: Or “who habitually sins.”
  - type: text
    content: 'lives in moral anarchy, for '
  - type: text
    content: the definition of
  - type: text
    content: ' sin is breaking God’s law. '
  - type: note
    content: The Aramaic can be translated “Whoever commits sin commits evil, for sin is absolutely evil.”
  '5':
  - type: text
    content: 'And you know without a doubt that Jesus was revealed to eradicate sins, and there is no sin in him. Anyone who continues to live in union with him will not sin. '
  '6':
  - type: text
    content: 'But the one who continues sinning '
  - type: note
    content: The present tense of the Greek verb throughout this section indicates a behavior that is persistent and habitual. John is not speaking of those who are yet to walk in complete victory, but those who continue sinning and find ways to excuse and justify it.
  - type: text
    content: 'hasn’t seen him '
  - type: text
    content: with discernment
  - type: text
    content: ' or known him '
  - type: text
    content: by intimate experience
  - type: text
    content: .
  '7':
  - type: text
    content: 'Delightfully loved children, don’t let anyone divert you from this truth. The person who keeps doing what is right '
  - type: text
    content: proves that he
  - type: text
    content: ' is righteous before God, even as the Messiah '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'is righteous. '
  '8':
  - type: text
    content: 'But the one who indulges in a sinful life is of the devil, '
  - type: note
    content: Or “is operating under the influence of the devil.” That is, belonging to the devil, not to Christ.
  - type: text
    content: because the devil has been sinning from the beginning. The reason the Son of God was revealed was to undo and destroy the works of the devil.
  '9':
  - type: text
    content: 'Everyone who is truly God’s child will refuse to keep sinning '
  - type: note
    content: The Aramaic can be translated “never serves sin.”
  - type: text
    content: 'because God’s seed '
  - type: note
    content: This is the Greek word sperma, “male seed.” See 2 Peter 1:4.
  - type: text
    content: 'remains within him, and he is unable to continue sinning because he has been fathered by God himself. '
  - type: note
    content: Or “born of God.” We have been fathered by God himself and we carry his DNA, his genes.
