document_id: 1JN.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divine Sonship
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look with wonder at the depth of the Father’s marvelous love that he has lavished on us! He has called us and made us his very own '
    - type: usfm
      marker: it
      children:
      - type: text
        text: beloved
    - type: text
      text: ' children. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek reads “that we should be called God’s children, and indeed we are.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:14–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:26–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'The reason the world doesn’t recognize who we are is that they didn’t recognize him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Jesus, God incarnated in human form.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is how God’s children can be clearly distinguished from the children of the Evil One. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “children of the devil” (or “the Adversary”). This is the only place in the New Testament that refers to those who have never experienced salvation as the devil’s children. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8:44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Anyone who does not demonstrate righteousness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “justice.”
      marker-yv: yv-n
    - type: text
      text: and show love to fellow believers is not living with God as his source.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “is not of God.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love One Another
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beautiful message you’ve heard right from the start is that we should walk in self-sacrificing love toward one another. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We should not be like Cain, who yielded to the Evil One and brutally murdered his own brother, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abel
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 4:8–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: And why did he murder him? Because his own actions were evil and his brother’s righteous.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So don’t be shocked, beloved brothers and sisters, if you experience the world’s hatred. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet we can be assured that we have been translated from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' death into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' life because we love the family of believers. A loveless life remains spiritually dead. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone who keeps hating a fellow believer is a murderer, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and you know that no murderer has eternal life residing in him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how we have discovered love’s reality: Jesus sacrificed his life for us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that he [Jesus] placed his soul over us and we are constantly indebted to place our souls over our brothers and sisters.”
      marker-yv: yv-n
    - type: text
      text: 'Because of this great love, we should be willing to lay down our lives for one another. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If anyone sees a fellow believer in need and has the means to help him, yet shows no pity and closes his heart against him, how is it even possible that God’s love lives in him?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Real love is an action. Think of God’s love, which rescues, saves, and empowers. Love is more like a verb than a noun. Love is seen by actions, not just words.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved children, our love can’t be an abstract theory we only talk about, but a way of life demonstrated through our loving deeds. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that the truth lives within us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that we are of [belong to] the truth.”
      marker-yv: yv-n
    - type: text
      text: 'because we demonstrate love in action, which will reassure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tranquilize our hearts.”
      marker-yv: yv-n
    - type: text
      text: our hearts in his presence.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “By this we recognize that we are of the truth and make our hearts confident [or ‘deliver our hearts’] before he comes.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved, we are God’s children right now; however, it is not yet apparent what we will become. But we do know that when it '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “It has not been revealed until now what we are destined to be.” Many translations view the subject of the Greek verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: phanerōthē
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to be Christ (“when
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: he
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is revealed”), but in the immediate context, “what we will become” is the subject and makes better grammatical sense.
      marker-yv: yv-n
    - type: text
      text: 'is finally made visible, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: phaneroō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to make clear, to be made visible,” and it comes from the verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: phainō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “to shine.” John is saying we are not yet shining as we will one day. We are both children of God and reflections of God. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'we will be just like him, for we will see him as he truly is. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever our hearts make us feel guilty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and remind us of our failures
    - type: text
      text: ', we know that God is much greater '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and more merciful
    - type: text
      text: ' than our conscience, and he knows everything there is to know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about us
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There is a higher courtroom for the human heart: it is where grace is enthroned. The very worst that is in us is known by God and he still showers mercy, love, and acceptance upon us. This is the greatness of God’s grace. He sees beyond the sin of a moment and sees the holy affections of love in those who refuse to turn away from him. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 21:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My delightfully loved friends, when our hearts don’t condemn us, we have a bold freedom to speak face-to-face with God. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And whatever we ask of him we receive, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 7:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 9:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'because we keep his commands. And by our beautiful intentions '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: we continue to do what brings pleasure to him.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So these are his commands: that we continually place our trust in the name of his Son, Jesus Christ, and that we keep loving one another, just as he has commanded us. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For all who obey his commands find their lives joined in union with him, and he lives and flourishes in them. We know and have proof that he constantly lives and flourishes in us, by the Spirit that he has given us.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And all who focus their hope on him will always be purifying '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hagnizo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is found only twice in the New Testament. John uses the term in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 11:55
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to refer to ritually cleansing ourselves in order to be morally undefiled as we come into God’s presence.
      marker-yv: yv-n
    - type: text
      text: 'themselves, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is a purifying hope that transforms us. This is more than the second coming. This is the hope of glory, that we will be revealed as fully like Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 1:25–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: just as Jesus is pure.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as that one [Jesus] is pure.” The beautiful purity of Jesus’ life is the model for our lives.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Character of God’s Children
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who indulges in sin '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who habitually sins.”
      marker-yv: yv-n
    - type: text
      text: 'lives in moral anarchy, for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the definition of
    - type: text
      text: ' sin is breaking God’s law. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “Whoever commits sin commits evil, for sin is absolutely evil.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you know without a doubt that Jesus was revealed to eradicate sins, and there is no sin in him. Anyone who continues to live in union with him will not sin. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the one who continues sinning '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The present tense of the Greek verb throughout this section indicates a behavior that is persistent and habitual. John is not speaking of those who are yet to walk in complete victory, but those who continue sinning and find ways to excuse and justify it.
      marker-yv: yv-n
    - type: text
      text: 'hasn’t seen him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with discernment
    - type: text
      text: ' or known him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by intimate experience
    - type: text
      text: .
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
