      text: '23'
  - type: text
    text: 'So these are his commands: that we continually place our trust in the name of his Son, Jesus Christ, and that we keep loving one another, just as he has commanded us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For all who obey his commands find their lives joined in union with him, and he lives and flourishes in them. We know and have proof that he constantly lives and flourishes in us, by the Spirit that he has given us.
