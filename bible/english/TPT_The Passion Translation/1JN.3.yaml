        text: .
    marker-yv: yv-n
  - type: text
    text: 'we will be just like him, for we will see him as he truly is. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And all who focus their hope on him will always be purifying '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hagnizo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is found only twice in the New Testament. John uses the term in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 11:55
      metadata:
        usfm: JHN.11.55
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: to refer to ritually cleansing ourselves in order to be morally undefiled as we come into God’s presence.
    marker-yv: yv-n
  - type: text
    text: 'themselves, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a purifying hope that transforms us. This is more than the second coming. This is the hope of glory, that we will be revealed as fully like Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 1:25–27
      metadata:
        usfm: COL.1.25+COL.1.26+COL.1.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: just as Jesus is pure.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “as that one [Jesus] is pure.” The beautiful purity of Jesus’ life is the model for our lives.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Character of God’s Children
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Anyone who indulges in sin '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who habitually sins.”
    marker-yv: yv-n
  - type: text
    text: 'lives in moral anarchy, for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the definition of
  - type: text
    text: ' sin is breaking God’s law. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Whoever commits sin commits evil, for sin is absolutely evil.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And you know without a doubt that Jesus was revealed to eradicate sins, and there is no sin in him. Anyone who continues to live in union with him will not sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But the one who continues sinning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The present tense of the Greek verb throughout this section indicates a behavior that is persistent and habitual. John is not speaking of those who are yet to walk in complete victory, but those who continue sinning and find ways to excuse and justify it.
    marker-yv: yv-n
  - type: text
    text: 'hasn’t seen him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with discernment
  - type: text
    text: ' or known him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by intimate experience
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Delightfully loved children, don’t let anyone divert you from this truth. The person who keeps doing what is right '
  - type: usfm
    marker: it
    children:
    - type: text
      text: proves that he
  - type: text
    text: ' is righteous before God, even as the Messiah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'is righteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But the one who indulges in a sinful life is of the devil, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “is operating under the influence of the devil.” That is, belonging to the devil, not to Christ.
    marker-yv: yv-n
  - type: text
    text: because the devil has been sinning from the beginning. The reason the Son of God was revealed was to undo and destroy the works of the devil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Everyone who is truly God’s child will refuse to keep sinning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “never serves sin.”
    marker-yv: yv-n
  - type: text
    text: 'because God’s seed '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sperma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', “male seed.” See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Peter 1:4
      metadata:
        usfm: 2PE.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'remains within him, and he is unable to continue sinning because he has been fathered by God himself. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “born of God.” We have been fathered by God himself and we carry his DNA, his genes.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Here is how God’s children can be clearly distinguished from the children of the Evil One. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “children of the devil” (or “the Adversary”). This is the only place in the New Testament that refers to those who have never experienced salvation as the devil’s children. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 8:44
      metadata:
        usfm: JHN.8.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Anyone who does not demonstrate righteousness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “justice.”
    marker-yv: yv-n
  - type: text
    text: and show love to fellow believers is not living with God as his source.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “is not of God.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Love One Another
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The beautiful message you’ve heard right from the start is that we should walk in self-sacrificing love toward one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'We should not be like Cain, who yielded to the Evil One and brutally murdered his own brother, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abel
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 4:8–10
      metadata:
        usfm: GEN.4.8+GEN.4.9+GEN.4.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: And why did he murder him? Because his own actions were evil and his brother’s righteous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So don’t be shocked, beloved brothers and sisters, if you experience the world’s hatred. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Yet we can be assured that we have been translated from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spiritual
  - type: text
    text: ' death into '
  - type: usfm
    marker: it
    children:
    - type: text
      text: spiritual
  - type: text
    text: ' life because we love the family of believers. A loveless life remains spiritually dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Everyone who keeps hating a fellow believer is a murderer, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 5:21–22
      metadata:
        usfm: MAT.5.21+MAT.5.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and you know that no murderer has eternal life residing in him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This is how we have discovered love’s reality: Jesus sacrificed his life for us. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that he [Jesus] placed his soul over us and we are constantly indebted to place our souls over our brothers and sisters.”
    marker-yv: yv-n
  - type: text
    text: 'Because of this great love, we should be willing to lay down our lives for one another. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: If anyone sees a fellow believer in need and has the means to help him, yet shows no pity and closes his heart against him, how is it even possible that God’s love lives in him?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Real love is an action. Think of God’s love, which rescues, saves, and empowers. Love is more like a verb than a noun. Love is seen by actions, not just words.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beloved children, our love can’t be an abstract theory we only talk about, but a way of life demonstrated through our loving deeds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'We know that the truth lives within us '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that we are of [belong to] the truth.”
    marker-yv: yv-n
  - type: text
    text: 'because we demonstrate love in action, which will reassure '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “tranquilize our hearts.”
    marker-yv: yv-n
  - type: text
    text: our hearts in his presence.
