document_id: MAT.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Wedding Feast
  - type: text
    content: 'As was his custom, Jesus continued to teach the people by using allegories. '
  '10':
  - type: text
    content: “So the servants went out into the city streets and invited everyone to come to the wedding feast, good and bad alike, until the banquet hall was crammed with people!
  - type: text
    content: ' '
  '11':
  - type: text
    content: Now, when the king entered the banquet hall, he looked with glee over all his guests. But then he noticed a guest who was not wearing the wedding robe
  - type: text
    content: ' '
  - type: text
    content: provided for him.
  - type: text
    content: ' '
  - type: note
    content: Those invited to come from the streets had no opportunity to buy wedding clothes. This wedding robe is a picture of the garment of righteousness that grace provides for us. The man without the wedding garment had one provided, but he didn’t want to change into new clothes. A change is necessary, for our King provides garments of white linen for us to wear, our wedding garments. See Isa. 52:1; Rev. 19:8.
  '12':
  - type: text
    content: So he said, ‘My friend, how is it that you’re here and you’re not wearing your wedding garment?’ But the man was speechless.
  '13':
  - type: text
    content: “Then the king turned to his servants and said, ‘Tie him up and throw him into the outer darkness,
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “the lowest hell [sheol].”
  - type: text
    content: where there will be great sorrow, with weeping and grinding of teeth.’
  - type: text
    content: ' '
  '14':
  - type: text
    content: For everyone is invited
  - type: text
    content: ' '
  - type: note
    content: Or “Many are called.” This can be understood to be a Semitic figure of speech that universalizes the invitation. See also Matt. 20:28.
  - type: text
    content: to enter in, but few respond in excellence.”
  - type: note
    content: The Greek word eklektoi can mean “chosen,” but it can also be translated “worthy,” “pure,” “choice,” “excellent.” See 2 John 1, 13.
  - type: heading
    content: The Pharisees Try to Entrap Jesus
  '15':
  - type: text
    content: 'Then the Pharisees came together to make a plan to entrap Jesus with his own words. '
  '16':
  - type: text
    content: 'So they sent some of their disciples together with some staunch supporters of Herod. '
  - type: note
    content: The Hebrew Matthew is “They took violent men from Herod.” The Aramaic is “They took men from Herod’s household.” By bringing with them loyalists to Rome (Herodians), the Pharisees were convinced that Jesus would offend either the Jews, who despised paying the “poll tax” required of every adult male, or those political followers of Herod who sided with the Roman occupation.
  - type: text
    content: 'They said to Jesus, “Teacher, we know that you’re an honest man of integrity and you teach us the truth of God’s ways. We can clearly see that you’re not one who speaks only to win the people’s favor, because you speak the truth without regard to the consequences. '
  - type: note
    content: Or “You don’t look into the faces of men [before you speak the truth].”
  '17':
  - type: text
    content: So tell us, then, what you think. Is it proper for us Jews to pay taxes to Caesar or not?”
  '18':
  - type: text
    content: 'Jesus knew the malice that was hidden behind their cunning ploy and said, '
  - type: text
    content: “Why are you testing me, you imposters who think you have all the answers?
  - type: text
    content: ' '
  '19':
  - type: text
    content: Show me one of the Roman coins.”
  - type: text
    content: ' So they brought him a silver coin used to pay the tax. '
  '2':
  - type: text
    content: 'He illustrated the reality of heaven’s kingdom realm by saying, '
  - type: text
    content: “There once was a king who arranged an extravagant wedding feast for his son.
  - type: text
    content: ' '
  - type: note
    content: See Isa. 25:6–8.
  '20':
  - type: text
    content: “Now, tell me, whose head is on this coin and whose inscription is stamped on it?”
  '21':
  - type: text
    content: “Caesar’s,” they replied.
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Precisely, for the coin bears the image of the emperor Caesar.
  - type: text
    content: ' '
  - type: note
    content: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
  - type: text
    content: Well, then, you should pay the emperor what is due to the emperor.
  - type: text
    content: ' '
  - type: text
    content: But because you bear the image of God,
  - type: text
    content: ' '
  - type: note
    content: The coin belongs to Caesar because it carries his image. We have an obligation to God because we carry his image.
  - type: text
    content: give back to God all that belongs to him.”
  '22':
  - type: text
    content: The imposters were baffled in the presence of all the people. When they realized once again that they were unable to trap Jesus, they went away stunned.
  - type: heading
    content: Marriage and the Resurrection
  '23':
  - type: text
    content: 'Some of the Sadducees, a religious group that denied there was a resurrection of the dead, '
  - type: note
    content: The Aramaic clearly states that the Sadducees said to Jesus, “There is no life after death.”
  - type: text
    content: 'came to ask Jesus this question: '
  '24':
  - type: text
    content: '“Teacher, the law of Moses teaches that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  - type: note
    content: See Deut. 25:5–10.
  '25':
  - type: text
    content: 'Now, there was a family with seven brothers. The oldest got married but soon died, leaving his widow for his brother. '
  '26':
  - type: text
    content: 'The second brother married and also died, and the third also. This was repeated down to the seventh brother, '
  '27':
  - type: text
    content: 'when finally the woman also died. So here’s our dilemma: '
  '28':
  - type: text
    content: Which of the seven brothers will be the woman’s husband when she’s resurrected from the dead, since they all were once married to her?”
  '29':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “You are deluded, because your hearts are not filled with the revelation of the Scriptures or the power of God.
  - type: text
    content: ' '
  '3':
  - type: text
    content: On the day the festivities were set to begin, he sent his servants
  - type: text
    content: ' '
  - type: note
    content: God is the king who prepares his kingdom feast for his Son, Jesus Christ. The messenger-servants are the prophets he sends to summon the people to enter into the love feast of Jesus. It is all about the wedding of the Lamb to the bride of Christ. What a glorious feast is prepared for us!
  - type: text
    content: to summon all the invited guests, but they chose not to come.
  - type: text
    content: ' '
  '30':
  - type: text
    content: For after the resurrection, men and women will not marry, just like the angels of heaven don’t marry.
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'Haven’t you read what God said:'
  - type: text
    content: ' '
  '32':
  - type: text
    content: ‘I am the Living God,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic and implied in the Greek.
  - type: text
    content: the God of Abraham, the God of Isaac, and the God of Jacob’? God is not the God of the dead, but of the living.”
  - type: note
    content: The implication Jesus is making is that Abraham, Isaac, and Jacob were all alive (in glory) when God spoke to Moses in the burning bush. See Ex. 3:6.
  '33':
  - type: text
    content: When the crowds heard this they were dazed and astonished over his teaching!
  - type: note
    content: As translated from the Hebrew Matthew. The Greek is “teaching.”
  - type: heading
    content: The Greatest Commandment
  '34':
  - type: text
    content: 'When the Pharisees heard that Jesus had silenced the Sadducees, they called a meeting to discuss how to trap Jesus. '
  '35':
  - type: text
    content: 'Then one of them, a religious scholar, posed this question to test him: '
  '36':
  - type: text
    content: “Teacher, which commandment in the law is the greatest?”
  '37':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “ ‘Love
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “worship,” also quoted as “worship” by Justin Martyr (ca. AD 165), First Apology XXI.
  - type: text
    content: the Lord your God with every passion of your heart, with all the energy of your being, and with every thought that is within you.’
  - type: text
    content: ' '
  - type: note
    content: Or “with all your mind.” See Deut. 6:5.
  '38':
  - type: text
    content: This is the great and supreme commandment.
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'And the second is like it in importance: ‘You must love your friend'
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic word kareb, which means “one who is close to you” (emotionally or by proximity). The Greek is “neighbor.”
  - type: text
    content: in the same way you love yourself.’
  - type: text
    content: ' '
  - type: note
    content: See Lev. 19:18.
  '4':
  - type: text
    content: So the king sent even more servants to inform the invited guests, saying, ‘Come, for the sumptuous feast is now ready! The oxen and fattened cattle have been killed and everything is prepared, so come! Come to the wedding feast for my son and his bride!’
  '40':
  - type: text
    content: Contained within these commandments to love you will find all the meaning of the Law and the Prophets.”
  - type: heading
    content: Jesus, Son of David—Lord of David
  '41':
  - type: text
    content: 'While all the Pharisees were gathered together, Jesus took the opportunity to pose a question of his own: '
  '42':
  - type: text
    content: “What do you think about the Anointed One? Whose son is he?”
  - type: text
    content: “The son of David,” they replied.
  '43':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: '“How is it that David, inspired by the Holy Spirit, could call his son the Lord? For didn’t he say:'
  '44':
  - type: text
    content: The Lord said to my Lord,
  - type: text
    content: ‘Sit beside me in the place of authority
  - type: text
    content: until I subdue all your enemies under your feet’?
  - type: note
    content: See Ps. 110:1, which is the Old Testament passage of Scripture most often quoted in the New Testament.
  '45':
  - type: text
    content: “So how could David call his own son ‘the Lord’?”
  - type: note
    content: As translated from the Aramaic. To those who insisted on only interpreting the Scriptures literally, Jesus was proving there was a deeper spiritual interpretation. To say the Messiah would be the Son of David means that the Anointed One would manifest the qualities and devotion that David walked in. A true “spiritual” son of David.
  '46':
  - type: text
    content: No one could come up with an answer. And from that day on none of the Pharisees had the courage to question Jesus any longer.
  '5':
  - type: text
    content: “But the invited guests were not impressed. One was preoccupied with his business; another went off to his farming enterprise.
  - type: text
    content: ' '
  '6':
  - type: text
    content: And the rest seized the king’s messengers and shamefully mistreated them, and even killed them.
  - type: text
    content: ' '
  '7':
  - type: text
    content: This infuriated the king! So he sent his soldiers to execute those murderers and had their city burned to the ground.
  - type: note
    content: This was fulfilled by the Roman prince Titus (who eventually became emperor of Rome) in the Roman war of AD 67–70.
  '8':
  - type: text
    content: “Then the king said to his servants, ‘The wedding feast is ready, yet those who had been invited to attend didn’t deserve the honor.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Now I want you to go into the streets and alleyways
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “go to the ends of the roads.”
  - type: text
    content: and invite anyone and everyone you find to come and enjoy the wedding feast in honor of my son.’
