document_id: MAT.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Wedding Feast
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As was his custom, Jesus continued to teach the people by using allegories. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He illustrated the reality of heaven’s kingdom realm by saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There once was a king who arranged an extravagant wedding feast for his son.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 25:6–8
      metadata:
        usfm: ISA.25.6+ISA.25.7+ISA.25.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: On the day the festivities were set to begin, he sent his servants
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God is the king who prepares his kingdom feast for his Son, Jesus Christ. The messenger-servants are the prophets he sends to summon the people to enter into the love feast of Jesus. It is all about the wedding of the Lamb to the bride of Christ. What a glorious feast is prepared for us!
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to summon all the invited guests, but they chose not to come.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the king sent even more servants to inform the invited guests, saying, ‘Come, for the sumptuous feast is now ready! The oxen and fattened cattle have been killed and everything is prepared, so come! Come to the wedding feast for my son and his bride!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But the invited guests were not impressed. One was preoccupied with his business; another went off to his farming enterprise.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the rest seized the king’s messengers and shamefully mistreated them, and even killed them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This infuriated the king! So he sent his soldiers to execute those murderers and had their city burned to the ground.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was fulfilled by the Roman prince Titus (who eventually became emperor of Rome) in the Roman war of AD 67–70.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the king said to his servants, ‘The wedding feast is ready, yet those who had been invited to attend didn’t deserve the honor.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now I want you to go into the streets and alleyways
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “go to the ends of the roads.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and invite anyone and everyone you find to come and enjoy the wedding feast in honor of my son.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “So the servants went out into the city streets and invited everyone to come to the wedding feast, good and bad alike, until the banquet hall was crammed with people!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now, when the king entered the banquet hall, he looked with glee over all his guests. But then he noticed a guest who was not wearing the wedding robe
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: provided for him.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Those invited to come from the streets had no opportunity to buy wedding clothes. This wedding robe is a picture of the garment of righteousness that grace provides for us. The man without the wedding garment had one provided, but he didn’t want to change into new clothes. A change is necessary, for our King provides garments of white linen for us to wear, our wedding garments. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 52:1
      metadata:
        usfm: ISA.52.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 19:8
      metadata:
        usfm: REV.19.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So he said, ‘My friend, how is it that you’re here and you’re not wearing your wedding garment?’ But the man was speechless.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the king turned to his servants and said, ‘Tie him up and throw him into the outer darkness,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “the lowest hell [
    - type: usfm
      marker: it
      children:
      - type: text
        text: sheol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '].”'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: where there will be great sorrow, with weeping and grinding of teeth.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For everyone is invited
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Many are called.” This can be understood to be a Semitic figure of speech that universalizes the invitation. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 20:28
      metadata:
        usfm: MAT.20.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to enter in, but few respond in excellence.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eklektoi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can mean “chosen,” but it can also be translated “worthy,” “pure,” “choice,” “excellent.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 John 1
      metadata:
        usfm: 2JN.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13'
      metadata:
        usfm: 2JN.1.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Pharisees Try to Entrap Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then the Pharisees came together to make a plan to entrap Jesus with his own words. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So they sent some of their disciples together with some staunch supporters of Herod. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “They took violent men from Herod.” The Aramaic is “They took men from Herod’s household.” By bringing with them loyalists to Rome (Herodians), the Pharisees were convinced that Jesus would offend either the Jews, who despised paying the “poll tax” required of every adult male, or those political followers of Herod who sided with the Roman occupation.
    marker-yv: yv-n
  - type: text
    text: 'They said to Jesus, “Teacher, we know that you’re an honest man of integrity and you teach us the truth of God’s ways. We can clearly see that you’re not one who speaks only to win the people’s favor, because you speak the truth without regard to the consequences. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You don’t look into the faces of men [before you speak the truth].”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So tell us, then, what you think. Is it proper for us Jews to pay taxes to Caesar or not?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jesus knew the malice that was hidden behind their cunning ploy and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you testing me, you imposters who think you have all the answers?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Show me one of the Roman coins.”
  - type: text
    text: ' So they brought him a silver coin used to pay the tax. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now, tell me, whose head is on this coin and whose inscription is stamped on it?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Caesar’s,” they replied.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Precisely, for the coin bears the image of the emperor Caesar.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Well, then, you should pay the emperor what is due to the emperor.
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But because you bear the image of God,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The coin belongs to Caesar because it carries his image. We have an obligation to God because we carry his image.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: give back to God all that belongs to him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The imposters were baffled in the presence of all the people. When they realized once again that they were unable to trap Jesus, they went away stunned.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marriage and the Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Some of the Sadducees, a religious group that denied there was a resurrection of the dead, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic clearly states that the Sadducees said to Jesus, “There is no life after death.”
    marker-yv: yv-n
  - type: text
    text: 'came to ask Jesus this question: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Teacher, the law of Moses teaches that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 25:5–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now, there was a family with seven brothers. The oldest got married but soon died, leaving his widow for his brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The second brother married and also died, and the third also. This was repeated down to the seventh brother, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'when finally the woman also died. So here’s our dilemma: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Which of the seven brothers will be the woman’s husband when she’s resurrected from the dead, since they all were once married to her?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are deluded, because your hearts are not filled with the revelation of the Scriptures or the power of God.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For after the resurrection, men and women will not marry, just like the angels of heaven don’t marry.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Haven’t you read what God said:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I am the Living God,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and implied in the Greek.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the God of Abraham, the God of Isaac, and the God of Jacob’? God is not the God of the dead, but of the living.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication Jesus is making is that Abraham, Isaac, and Jacob were all alive (in glory) when God spoke to Moses in the burning bush. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: When the crowds heard this they were dazed and astonished over his teaching!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew. The Greek is “teaching.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Greatest Commandment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When the Pharisees heard that Jesus had silenced the Sadducees, they called a meeting to discuss how to trap Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Then one of them, a religious scholar, posed this question to test him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
