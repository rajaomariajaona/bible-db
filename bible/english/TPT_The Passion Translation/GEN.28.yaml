          text: Bethel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “House of God.” Jacob could see in a heap of stones the House of God that would arise. This is the first mention of God’s house in the Scriptures. The House of God was filled with his presence, a gateway to heaven, a stairway with angels, and revelation. One day, the House of God would be born among us, born of a virgin. Jesus came to be an example of the House of God, the dwelling place of God and men under one roof, living in one body. Jesus is the God-Man, the House of God. As the House, he invites us to dwell as one with the Father. But Jesus was the initial fulfillment of the House of God, not the ultimate fulfillment, which would include others incorporated into Jesus. Today, the House of God, the gate to heaven, is also a description of the church. We are God’s house (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), for the Lord dwells among us as his people. And we become a gateway for others to come to God through our message of new life in Christ.
      marker-yv: yv-n
    - type: text
      text: though the city was once called Luz.
    - type: usfm
      marker: f
