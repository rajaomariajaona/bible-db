      - type: text
        text: '16'
    - type: text
      text: 'When Jacob awoke from his dream, he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was overcome with awe and
    - type: text
      text: ' said, “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is here! He is in this place and I didn’t realize it!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: How many times have we been led to an uncomfortable place in life, only to encounter the Lord? Have you said, looking back over your life, “Truly, the Lord really was in all I went through, and I didn’t even know it!” We often discover that he is where we did not think he would be. You may have a divine visitation anywhere! Ordinary places can become holy places.
      marker-yv: yv-n
  '17':
  - type: usfm
