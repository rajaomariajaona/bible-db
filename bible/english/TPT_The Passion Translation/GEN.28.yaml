      children:
      - type: text
        text: '15'
    - type: text
      text: Never forget—I am always with you and will protect you wherever you go. And one day I will bring you back to this land, for I will neither leave you nor fail to fulfill every word I have promised you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What did God tell Jacob? Did he scold him for being a crafty deceiver? Did he rebuke him for his lack of faith? Not at all. He revealed himself to Jacob as the One who would never leave or forsake him. This revelation of grace was a steady stream of assurances that washed over wayward Jacob! The Lord gave these promises to Jacob while he still was unbroken, unreliable, and a deceiver. Our God is a confident, capable God who can subdue and conquer the most difficult of men. Our future blessing and usefulness depend on God’s strength, not ours. When God brought Jacob back to Bethel twenty years later, he was changed. God will change you. Your transformation may take more than a year, even more than ten or twenty, but your God will finish the work of changing you into the image of his Son (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). You will be his look-alike. You will carry the blessings of God to the next generation!
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
