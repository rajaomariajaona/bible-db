    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Terrified and overwhelmed, he said, “How awesome is this place! I have stumbled right into the House of God! This place is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a portal
    - type: text
      text: ', the very gate of heaven!”'
