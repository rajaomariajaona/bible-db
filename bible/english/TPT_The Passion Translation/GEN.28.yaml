          text: The steps of this stairway go up into the heavenly realm where our true riches are found. Each step is a progressive revelation of God’s purpose for our lives found in Jesus Christ. The stairway goes both ways, touching heaven and touching earth. Jesus Christ can be thought of as the Stairway that reaches from earth (his human nature) to heaven (his heavenly nature). Jesus spoke to Nathanael using the same terminology (see
      - type: usfm
