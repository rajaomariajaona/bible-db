        - type: text
          text: '). Jesus is the only valid entry into the spirit-realm, the true way into the heavenly realm. By him, we ascend and leave our lower life. This Jesus-Stairway was filled with messengers ascending and descending. Who are these messengers? Note the order: they ascended first. It does not say they were descending and ascending, which would be true if they were the angels in heaven. If they ascended first, they were leaving earth to go to heaven. These messengers might have been people or divine beings. If people, they were intercessors and promise-claimers. The Hebrew word translated “angel” is'
