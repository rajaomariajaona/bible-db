      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Leave at once for the land of your grandfather Bethuel in Paddan-Aram and find one of the young women there to marry, one of your uncle Laban’s daughters. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Marriage with a cousin was acceptable in that day and continues to be common among people in the Near East today.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then Jacob committed himself to God, saying, “If you will always be with me and protect me on this long journey, and if you give me bread to eat and clothing to wear, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and if I return safely to my father’s house, then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you will be my God! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: See! I have set up this sacred stone pillar and it will be your house, God. I promise to set aside a tenth of all that you give me as my gift to you.”
