          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob built a pillar from his pillow. The church is described by Paul as the “pillar and firm foundation of the truth” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). By pouring oil on the stone, Jacob consecrated the pillar as a memorial to God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 8:10–11
      - type: usfm
        marker: ft
