    - type: text
      text: '6'
  - type: text
    text: The whirlwind of war will break down the bars of their gates
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a play on words in the Hebrew that is lost in translation. The words for “bars of their gates” can also be translated “their oracle priests.” In other words, both their city gates and their false prophet-priests would be destroyed.
    marker-yv: yv-n
- type: usfm
  marker: q1
