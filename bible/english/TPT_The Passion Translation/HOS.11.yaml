document_id: HOS.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel, God’s Wayward Son
  - type: text
    content: “I have deeply loved Israel from his very beginning.
  - type: text
    content: From Egypt, I called my son.
  - type: note
    content: It was the love of a tender Father that called Israel out of Egyptian bondage (see Ex. 4:22–23 ). God set his love upon the people of Israel and chose them to demonstrate his love for them. He loved them when they were weak and helpless. He raised up Joseph to meet their needs during a famine. He loved them when they were outcasts and in slavery. However, these words find their fulfillment in Jesus, who also was brought out of Egypt. See Matt. 2:14–15 .
  '10':
  - type: text
    content: '“When I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', roar like a lion,'
  - type: text
    content: my people will march behind me.
  - type: text
    content: Yes
  - type: text
    content: ', I will roar like a lion '
  - type: text
    content: to gather my own around me
  - type: text
    content: '!'
  - type: note
    content: The image of a male lion roaring to gather his pride around him points to God giving a summons (roar) to the exiles to gather around him and follow him once more.
  - type: text
    content: Indeed, when I roar,
  - type: text
    content: my children will come trembling from the west.
  '11':
  - type: text
    content: They will return trembling like a bird from Egypt,
  - type: text
    content: like a dove from Assyria,
  - type: text
    content: and I will settle them in their homes.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: note
    content: The Hebrew Bible renders the verse most English Bibles set as 11:12 as v. 1 of ch. 12 . See the first footnote on 11:12 .
  '2':
  - type: text
    content: 'The more the people of Israel were invited to come '
  - type: text
    content: to me
  - type: text
    content: ','
  - type: text
    content: the more they turned away from me.
  - type: text
    content: They sacrificed to the Baal-idols
  - type: text
    content: and burned incense to pagan images
  '3':
  - type: text
    content: even though I was the one who taught Israel to walk.
  - type: text
    content: I took them up in my arms and carried them,
  - type: text
    content: yet they did not acknowledge that I was their healer.
  - type: note
    content: The Hebrew word rapaʾ can also mean “prosper,” “restore [favor],” “comfort,” “impart wholeness,” and “care for,” as well as “heal.”
  '4':
  - type: text
    content: 'I '
  - type: text
    content: gently
  - type: text
    content: ' pulled them to my heart'
  - type: text
    content: with the cords of affectionate love.
  - type: note
    content: Or literally “I led them with human cords.” God was showing Israel how tenderly he had dealt with them. What a beautiful picture of God’s care as he gently taught Israel, his “son,” to take his first steps. He would pick his people up and carry them when they were weak, and he repeatedly healed and restored them. He pulled them into his heart and lovingly fed them throughout their existence. He held them to his cheek in tender embrace to affirm them and comfort them. Hasn’t God done all these same things for you?
  - type: text
    content: I stooped down to care for them and gently fed them.
  - type: text
    content: I showed them the same kind of tender love
  - type: text
    content: as one who picks up an infant and holds it to his cheek.”
  - type: note
    content: 'Or literally “I was to them like one who lifts a yoke from their jaws and gently fed them.” The imagery of this verse is not easily understood in Western culture. God compared himself to a farmer who will take the yoke from the shoulders of an ox so that it can freely eat. There is a clear wordplay in Hebrew that is lost in translation: the root word for “yoke” is the same as the root word for “infant.” The original readers of this would have understood the play on words; God was comparing himself to a caring Father and Israel to the child he loved.'
  - type: heading
    content: Israel Returned to Slavery in Egypt and Assyria
  '5':
  - type: text
    content: “Israel will return to the land of Egypt,
  - type: text
    content: and Assyria will rule over them
  - type: text
    content: because they refused to return to me.
  '6':
  - type: text
    content: The whirlwind of war will break down the bars of their gates
  - type: note
    content: There is a play on words in the Hebrew that is lost in translation. The words for “bars of their gates” can also be translated “their oracle priests.” In other words, both their city gates and their false prophet-priests would be destroyed.
  - type: text
    content: and ravage their cities
  - type: note
    content: The history of Israel is filled with warfare. It took many battles to secure the land. Afterward, the Israelites were besieged by the Assyrians and taken into captivity.
  - type: text
    content: in return for all their schemes.
  '7':
  - type: text
    content: My people are bent on turning away from me,
  - type: text
    content: and together they call upon Baal,
  - type: text
    content: who will not help them at all.”
  - type: note
    content: There are a number of difficulties to understanding the text of this verse, which is literally “And my people are hanging to turning away from me, and to a height they call to him. Altogether he will not exalt them.” The “height” (Hb. ʾel ʿal ) may be a reference to either God or to Baal or to a yoke.
  - type: heading
    content: Judgment or Mercy?
  '8':
  - type: text
    content: “Ephraim, how could I ever give up on you?
  - type: text
    content: Israel, how could I ever let you go?
  - type: text
    content: How can I treat you like Admah
  - type: text
    content: or deal with you like Zeboiim—
  - type: text
    content: cities I destroyed
  - type: text
    content: '?'
  - type: note
    content: Admah and Zeboiim were two cities near Sodom and Gomorrah that were once rescued by Abraham (see Gen. 14 ) but later destroyed for their blatant wickedness (see Gen. 19 ; Deut. 29:23 ).
  - type: text
    content: My heart beats for you,
  - type: note
    content: Or “My heart is overturned within me” or possibly “I have had a change of heart.”
  - type: text
    content: and my compassion rekindles a deep love for you within me.
  - type: note
    content: Or “all my tenderness is stirred within me.”
  '9':
  - type: text
    content: I will certainly not punish you in my burning anger,
  - type: text
    content: nor will I turn around and destroy Israel again,
  - type: text
    content: 'for I am God and not a '
  - type: text
    content: mere
  - type: text
    content: ' human being.'
  - type: text
    content: I am the Holy One in the midst of you;
  - type: text
    content: I will not come to you in my wrath.”
  - type: heading
    content: God Summons the Exiles to Return to Him
