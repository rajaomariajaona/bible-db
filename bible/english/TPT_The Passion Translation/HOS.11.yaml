    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was the love of a tender Father that called Israel out of Egyptian bondage (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 'Ex. 4:22–23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God set his love upon the people of Israel and chose them to demonstrate his love for them. He loved them when they were weak and helpless. He raised up Joseph to meet their needs during a famine. He loved them when they were outcasts and in slavery. However, these words find their fulfillment in Jesus, who also was brought out of Egypt. See
    - type: usfm
