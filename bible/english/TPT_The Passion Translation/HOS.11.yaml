    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “I led them with human cords.” God was showing Israel how tenderly he had dealt with them. What a beautiful picture of God’s care as he gently taught Israel, his “son,” to take his first steps. He would pick his people up and carry them when they were weak, and he repeatedly healed and restored them. He pulled them into his heart and lovingly fed them throughout their existence. He held them to his cheek in tender embrace to affirm them and comfort them. Hasn’t God done all these same things for you?
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I stooped down to care for them and gently fed them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I showed them the same kind of tender love
- type: usfm
  marker: q1
  children:
  - type: text
    text: as one who picks up an infant and holds it to his cheek.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or literally “I was to them like one who lifts a yoke from their jaws and gently fed them.” The imagery of this verse is not easily understood in Western culture. God compared himself to a farmer who will take the yoke from the shoulders of an ox so that it can freely eat. There is a clear wordplay in Hebrew that is lost in translation: the root word for “yoke” is the same as the root word for “infant.” The original readers of this would have understood the play on words; God was comparing himself to a caring Father and Israel to the child he loved.'
    marker-yv: yv-n
