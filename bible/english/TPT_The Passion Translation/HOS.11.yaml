    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The history of Israel is filled with warfare. It took many battles to secure the land. Afterward, the Israelites were besieged by the Assyrians and taken into captivity.
    marker-yv: yv-n
- type: usfm
  marker: q1
