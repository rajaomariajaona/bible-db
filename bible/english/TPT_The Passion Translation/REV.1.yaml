verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John’s Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the unveiling of Jesus Christ, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek noun
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apokalypsis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a compound word found eighteen times in the New Testament. It combines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (to lift) with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kaluptó
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (veil, hide, cover), and so could be translated “the lifting of the veil” or “the unveiling.” The implication could be stated as simply, “Here he is!” It is not primarily lifting the veil off coming events, but the unveiling of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'which God gave him to share with his loving servants '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: doulos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “bond servant,” a slave who willingly remains with his master even after being given his freedom.'
      marker-yv: yv-n
    - type: text
      text: 'what must occur swiftly. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This does not necessarily mean “soon” from the writer’s perspective, but that once the time comes it will quickly happen. The Greek phrase
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: en tachos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (similar to “tachometer”) means that once something starts, it will take place swiftly.
      marker-yv: yv-n
    - type: text
      text: 'He signified it '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to make known (by a miracle-sign).” The Greek uses the verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sēmainō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “to give a sign.” The noun form is'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sēmeion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and is the word used most often (seventy-seven times) in the New Testament for “miracle.” In the Septuagint of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 2:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sēmainō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used, which indicates the meaning of “to symbolize.” The Aramaic likewise can be translated “symbolized.” The book of Revelation is a book full of symbols.
      marker-yv: yv-n
    - type: text
      text: 'by sending his angel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Angels were instrumental in imparting divine revelation to Abraham, Moses, Joshua, the judges, the prophets, the kings, and the apostles of Jesus. This angel sent from Jesus was on a mission to give John insights into the meaning of the visions within the book of Revelation (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'to his loving servant John. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Notice the chain of communication: (1) God gave the revelation directly to Jesus. (2) Jesus gave it to an angel. (3) The angel explained it to John. (4) John gives it to us (v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), God’s servants. Many don’t realize that the book of Revelation came from a direct encounter with an angel sent by Jesus to give the contents to John.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I was in the spirit realm '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I came to be in [with] spirit” or “I became [in union with] the Spirit.” This was John’s “rapture,” most likely a trance. The realm of the Spirit was John’s vantage point. The same Spirit that inspired this book must interpret it, for it is what the Spirit is saying to the churches. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 32:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on the Lord’s day, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was not Sunday, nor a twenty-four-hour day, but “the Lord’s day.” Nowhere in Scripture is Sunday called “the Lord’s day.” The Aramaic can be translated “on the lordly [majestic] day.”
      marker-yv: yv-n
    - type: text
      text: 'and I heard behind '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A voice “behind” us can be that which speaks about our past—about all that God has already done for us.
      marker-yv: yv-n
    - type: text
      text: 'me a loud voice sounding like a trumpet, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “shofar.” The trumpet sound always carries a message (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 14:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The voice sounding like a trumpet blast would point us to a fresh proclamation heralding a new message to us today.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying to me:'
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Write in a book what you see and send it to the seven churches:'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The number seven is the number of God and his perfection. The seven churches make up one perfect and complete church in his eyes. These seven churches speak of completeness or fullness; just like the seven Spirits are full and complete so the church is full and complete in Christ. We are the “seven in one” bride, just as the Holy Spirit is “seven in one.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to Ephesus, to Smyrna, to Pergamum, to Thyatira, to Sardis, to Philadelphia, and to Laodicea.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I turned '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John was in the spirit. This was more than a physical turning, but an inward turning to withdraw from the natural and see into the spiritual. The same Greek word is used for “converted” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to see the voice that was speaking to me, I saw seven golden lampstands. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These seven golden lampstands represent seven churches (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The “lampstand” (or menorah) becomes a symbol of the burning presence of Christ. They are golden, for Christ has purified and made holy his church.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And walking among the lampstands, I saw someone like a son of man, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This is the ascended Christ appearing as King and High Priest. Part of the priestly duties involved tending the lampstands, filling them with fresh oil.
      marker-yv: yv-n
    - type: text
      text: 'wearing a full-length robe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the robe of the ephod” (priest’s robe).
      marker-yv: yv-n
    - type: text
      text: 'with a golden sash over his chest. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: mastos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and is used exclusively for a woman’s breasts. Over the heart of the glorified Jesus is a golden sash of compassionate love for his bride. The Aramaic can be translated “between his breasts a golden harness.” It was made of pure gold, for the divine nature holds everything together in divine order.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His head and his hair were white like wool—white as glistening snow. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The head (or headship) speaks of Christ’s authority. White speaks of the righteousness of God and an emblem of his wisdom, omniscience, justice, and leadership. This is similar to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which would equate Jesus with the Ancient of Days.'
      marker-yv: yv-n
    - type: text
      text: 'And his eyes were like flames of fire! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 10:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His feet were gleaming like bright metal, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “burnished [fine] brass.” However, the Greek is somewhat confusing with a feminine noun and genitive case. The Aramaic can be translated “the brass of Lebanon.” Lebanon was known for the quality of its fine brass. Brass is a biblical symbol of passing through judgment. Jesus went through judgment for our sins, and with feet on fire he is now kindling fires wherever he walks.
      marker-yv: yv-n
    - type: text
      text: 'as though they were glowing in a fire, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 1:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 3:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and his voice was like the roar of many rushing waters. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 29:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 1:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 43:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Waters are emblematic of “multitudes of people” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 17:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It is not simply a voice of “waters,” but the voices of many sons coming into his likeness (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 14:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his right hand he held seven stars, and out of his mouth was a sharp, double-edged sword. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The sword from his mouth is a metaphor for the Word of God (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 4:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The message of Revelation comes as a sword from the mouth of Jesus. The Aramaic can be translated “a fervent spirit came from his mouth.”
      marker-yv: yv-n
    - type: text
      text: 'And his face was shining like the brightness of the blinding sun! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 84:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
