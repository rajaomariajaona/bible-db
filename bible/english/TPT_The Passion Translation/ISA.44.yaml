        text: There is no verse in the Bible that speaks of God as our mother, but there are frequent metaphors that imply God gave us birth (and new birth), nurtured us in his love, and even formed us in his womb. The love God has for us is similar to a mother’s love. The Hebrew concept of compassion carries this thought, for the Hebrew word for “compassion” (
