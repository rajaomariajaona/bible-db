document_id: ISA.44,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh, the Only True God
  - type: text
    content: “Now, listen to me, my servant Jacob,
  - type: text
    content: Israel, my chosen one.
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', your Creator, who shaped you in '
  - type: text
    content: my
  - type: text
    content: ' womb.'
  - type: note
    content: There is no verse in the Bible that speaks of God as our mother, but there are frequent metaphors that imply God gave us birth (and new birth), nurtured us in his love, and even formed us in his womb. The love God has for us is similar to a mother’s love. The Hebrew concept of compassion carries this thought, for the Hebrew word for “compassion” (racham) is the same word as “womb.” God has a womb-love for each of us. This thought resurfaces more than once in these later chapters of Isaiah.
  - type: text
    content: 'Hear what I have to say to you:'
  - type: text
    content: ‘Don’t fear. I will help you, O Jacob my servant,
  - type: text
    content: 'Do not fear, my pleasing one, '
  - type: note
    content: Or “Jeshurun,” a symbolic name for Israel showing her unique, intimate relationship with God. It is taken from the root word yashar, “to please.” Others translate this endearing term for Israel as “upright one.” God will straighten out the crookedness of Jacob. “Jeshurun” is found only here and in Deuteronomy (see Deut. 32:15; 33:5, 26).
  - type: text
    content: Israel
  - type: text
    content: .
  '10':
  - type: text
    content: What kind of person would form an idol-god
  - type: text
    content: or cast an image with no ability to do any good?
  '11':
  - type: text
    content: No wonder
  - type: text
    content: ' those who worship them '
  - type: note
    content: Or “those who produce them.”
  - type: text
    content: will be put to shame.
  - type: text
    content: Their craftsmen are only human beings.
  - type: text
    content: Let them all come together and take their stand.
  - type: text
    content: They will all be terrified and put to shame!
  '12':
  - type: text
    content: The blacksmith takes his tongs and heats it over the coals,
  - type: text
    content: forming it with hammers, forging it with his strong arm.
  - type: text
    content: But when he gets hungry, his strength ebbs away,
  - type: text
    content: and if he doesn’t drink water, he quickly grows weary.
  '13':
  - type: text
    content: The woodworker stretches out a measuring line,
  - type: text
    content: then marks it and fashions his idol-god with his carving tools.
  - type: text
    content: Then he uses a stylus to trace it out on the wood
  - type: note
    content: Or “rounds it with his instruments.”
  - type: text
    content: and shapes it into the figure of a man,
  - type: text
    content: trying to make it look like a beautiful human
  - type: text
    content: to be displayed somewhere in a shrine.
  '14':
  - type: text
    content: He chooses a cedar or a cypress or an oak,
  - type: text
    content: but first lets it grow strong in the forest.
  - type: text
    content: He plants a pine tree, and it is nourished by the rain.
  '15':
  - type: text
    content: The wood serves man for fuel;
  - type: text
    content: some he uses to warm himself
  - type: text
    content: and with some he bakes his bread.
  - type: text
    content: But from this same wood he also makes a god to worship
  - type: text
    content: and bows down to the idol he formed.
  '16':
  - type: text
    content: Half of the wood he burns in the fire to roast his meat.
  - type: text
    content: Then he eats his fill and is satisfied.
  - type: text
    content: Part he uses to warm himself and says,
  - type: text
    content: “Ah, I’m warm and cozy sitting by the fire.”
  '17':
  - type: text
    content: With the rest of it he makes his idol-god,
  - type: text
    content: bows down to it, and worships it!
  - type: text
    content: He prays to it, saying, “Save me, for you are my god!”
  '18':
  - type: text
    content: They have no clue what they’re doing
  - type: text
    content: 'and don’t comprehend '
  - type: text
    content: how absurd it is
  - type: text
    content: '!'
  - type: text
    content: For they shut their eyes so they cannot see.
  - type: text
    content: They close their hearts so they cannot understand.
  '19':
  - type: text
    content: They have no knowledge, no understanding,
  - type: text
    content: no discernment to say,
  - type: text
    content: “Half of the wood I burned in the fire.
  - type: text
    content: I roasted meat and cooked my dinner.
  - type: text
    content: Now should I take the rest of the wood
  - type: text
    content: and make it into an abomination?
  - type: text
    content: Should I bow down and worship a block of wood?”
  '20':
  - type: text
    content: 'He feeds '
  - type: text
    content: his spirit
  - type: text
    content: ' on ashes!'
  - type: note
    content: Or “the shepherd of ashes.”
  - type: text
    content: His deluded heart leads him astray.
  - type: text
    content: He can’t even ask himself,
  - type: text
    content: “Is this thing I’m holding in my right hand a fraud?”
  - type: heading
    content: God Never Forgets Israel
  '21':
  - type: text
    content: “Remember these things, O Jacob’s tribes,
  - type: text
    content: and Israel, you are my servant.
  - type: text
    content: I created you to be my servant, and I will never forget you!
  '22':
  - type: text
    content: I have swept away your sins like a thick cloud.
  - type: note
    content: This “thick cloud” of our sins was a barrier between God and man. Grace has swept it away so that we can freely come before him.
  - type: text
    content: I have made your guilt vanish
  - type: text
    content: like mist disappearing into thin air.
  - type: text
    content: Now come back, come back to me,
  - type: text
    content: for I have paid the price for you.”
  - type: note
    content: See Gal. 3:13–14.
  '23':
  - type: text
    content: Sing! Starry sky above, break loose with singing,
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has finished it!'
  - type: text
    content: Shout! Earth deep below, give up your shout!
  - type: text
    content: Mountains high, break out with joyous songs of praise!
  - type: text
    content: Let the forest choirs join in, with every tree singing its notes!
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has paid the ransom price for Jacob’s tribes,'
  - type: text
    content: and he will be glorified in Israel!
  - type: heading
    content: God Is in Control
  '24':
  - type: text
    content: 'Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'your Kinsman-Redeemer, who formed you in '
  - type: text
    content: his
  - type: text
    content: ' womb, has to say:'
  - type: text
    content: '“I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', Creator of all.'
  - type: text
    content: I alone stretched out the canvas of the cosmos.
  - type: text
    content: I who shaped the earth needed no one’s help.
  '25':
  - type: text
    content: Now I make fools of fortune-tellers
  - type: text
    content: and frustrate astrologers’ predictions.
  - type: text
    content: I confuse the wise, who think they know it all,
  - type: text
    content: and make their ‘knowledge’ into foolishness.
  '26':
  - type: text
    content: I confirm the word of my servants
  - type: text
    content: and fulfill the prophecies of my messengers.
  - type: text
    content: I say to Jerusalem, ‘Many people will live in you again,’
  - type: text
    content: and to the cities of Judah, ‘I will raise up your ruins; you will be rebuilt!’
  '27':
  - type: text
    content: I say to deep waters, ‘Dry up!’ and to rivers, ‘Become dry!’
  - type: note
    content: This actually happened at the taking of Babylon by Cyrus. See Jer. 50:38; 51:31–36.
  '28':
  - type: text
    content: 'I say concerning Cyrus, '
  - type: note
    content: Cyrus, king of Persia, reigned from 559–529 BC. He permitted the Jews to return from captivity to Jerusalem and issued a decree to authorize the temple to be rebuilt (2 Chron. 36:22–23; Ezra 1:1–4). Even though Isaiah prophesied 175 years before Cyrus became king, he called him by name. This is one of the greatest proofs of God’s omniscience and sovereignty as well as the supernatural aspect of prophecy.
  - type: text
    content: ‘He is my shepherd,
  - type: text
    content: and he will carry out all the purposes I have for him,’
  - type: text
    content: 'saying to Jerusalem, ‘You will be rebuilt '
  - type: text
    content: and flourish again
  - type: text
    content: '!’'
  - type: text
    content: saying to the temple, ‘You will be reconstructed!’ ”
  - type: note
    content: Josephus, the Jewish historian, wrote that “when Cyrus read this [Isaiah’s prophecy], and admired the Divine Power, an earnest desire and ambition seized upon him to fulfill what was so written.” These verses in chs. 44–45 convinced Cyrus to issue the decree to rebuild the temple. See Josephus, Ant. 11.1.2 and Ezra 5:13.
  '3':
  - type: text
    content: I will pour refreshing water on the thirsty
  - type: text
    content: and streams on the dry ground.
  - type: text
    content: I will pour out my Spirit on your children,
  - type: note
    content: See Acts 2:12–17.
  - type: text
    content: my blessing upon your descendants.
  '4':
  - type: text
    content: They will spring up like grass blanketing a meadow,
  - type: note
    content: Or “like a binu-tree” (Dead Sea scroll 1QIsaa).
  - type: text
    content: like poplars growing by gushing streams.
  '5':
  - type: text
    content: 'One will say, “I belong to '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: text
    content: Another will be called Jacob.
  - type: text
    content: 'Yet another will write on his hand '
  - type: note
    content: Or “with his own hand.”
  - type: text
    content: '“Property of '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: text
    content: Another will adopt the name Israel.’ ”
  '6':
  - type: text
    content: 'The words of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'Israel’s true King '
  - type: note
    content: See Matt. 27:42; Mark 15:32; John 1:49; 12:13.
  - type: text
    content: and Kinsman-Redeemer,
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says:'
  - type: text
    content: “I am the Beginning and I am the Ending,
  - type: note
    content: Or “I am the First, and I am the Last.”
  - type: text
    content: and I am the only God there is.
  '7':
  - type: text
    content: Who is like me? Go ahead, stand and speak up.
  - type: text
    content: I’ll wait for him to
  - type: text
    content: ' announce it and explain it all to me!'
  - type: text
    content: 'Who else has announced from everlasting '
  - type: note
    content: 'The Hebrew word for “everlasting” is ʿolam, and there are nine more everlasting things found in Isaiah: (1) everlasting God (Isa. 40:28), (2) everlasting covenant (Isa. 55:3; 61:8), (3) everlasting kindness (Isa. 54:8), (4) everlasting salvation (Isa. 45:17), (5) everlasting majesty of God’s people (Isa. 60:15), (6) everlasting joy (Isa. 51:11), (7) everlasting favor (Isa. 56:5), (8) everlasting light (Isa. 60:19–20), and (9) everlasting signs (Isa. 55:13).'
  - type: text
    content: what is to come?
  - type: note
    content: Or “from my placing an eternal people and things to come.” The meaning of the Hebrew is uncertain.
  - type: text
    content: Let him prophesy what is yet to be.
  '8':
  - type: text
    content: Do not fear nor be shaken!
  - type: text
    content: Haven’t I foretold it, announcing it to you ahead of time?
  - type: text
    content: 'You are my witnesses, '
  - type: text
    content: so tell me
  - type: text
    content: ', is there any god besides me?'
  - type: text
    content: 'There is no other Rock '
  - type: text
    content: of shelter
  - type: text
    content: ; I know not one.”
  '9':
  - type: text
    content: Idol-makers amount to nothing,
  - type: text
    content: and the things they treasure can do no one any good.
  - type: text
    content: They are witnesses with blind eyes who know nothing;
  - type: text
    content: they will be disgraced.
