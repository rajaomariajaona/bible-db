        text: ', Gr. 3816.) The Aramaic is clearly “son.” Notice how many times in the book of Acts that the followers of Christ preached the resurrection. The power and virtue of the cross can never be diminished; however, it is the resurrection of Christ that became the apostolic center of their preaching in the book of Acts.'
