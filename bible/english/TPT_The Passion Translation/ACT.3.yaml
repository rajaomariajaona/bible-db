    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “cooling breeze,” which occurs only here in the New Testament. This hints of the time when God walked with Adam in the cooling breeze of the day. The work of the cross begins the restoration of Paradise within the hearts of Christ’s followers.
    marker-yv: yv-n
  - type: text
