      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shuv
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Every Jew would know what that means: “Come back to God!” Repentance and return is more than a passive changing of one’s mind.'
    marker-yv: yv-n
  - type: text
