    marker-yv: yv-n
  - type: text
    text: 'Jesus, the one you denied to Pilate’s face when he decided to release him—and you insisted that he be crucified. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'You rejected '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “denied.” It is amazing how complete was the healing of Peter’s life. Just fifty days previously, it was Peter who denied he knew Jesus three times. Now he says to his fellow Jews, “You denied the holy and righteous One!”
    marker-yv: yv-n
  - type: text
    text: 'the one who is holy and righteous, and instead begged for a murderer to be released. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You killed the Prince of Life! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Originator of Life.”
    marker-yv: yv-n
  - type: text
    text: 'But God raised him from the dead, and we stand here as witnesses to that fact. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Faith in Jesus’ name has healed this man standing before you. It is the faith that comes through believing in Jesus’ name that has made the crippled man walk right in front of your eyes!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“My fellow Jews, I realize that neither you nor your leaders realize the grave mistake you made. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But in spite of what you’ve done, God has fulfilled what he foretold through the prophets long ago about the sufferings of his Anointed One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
