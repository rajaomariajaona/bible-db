        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (“turn back to God,” “be converted”). We need to not only repent but to return home to God’s grace and truth. This is a Hebraic thought of returning to the Lord God (the Hebrew word
    - type: usfm
