document_id: ACT.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Healing at the Beautiful Gate
  - type: text
    content: 'One afternoon Peter and John went to the temple for the three o’clock prayer. '
  - type: note
    content: Daily sacrifices were made in the temple at sunrise and about three o’clock every afternoon.
  '10':
  - type: text
    content: they realized it was the crippled beggar they had passed by in front of the Beautiful Gate. Astonishment swept over the crowd, for they were amazed over what had happened to him.
  - type: heading
    content: Peter Preaches to the Crowd
  '11':
  - type: text
    content: Dumbfounded over what they were witnessing, the crowd ran over to Peter and John, who were standing under the covered walkway called Solomon’s Porch. Standing there also was the healed beggar, clinging to Peter and John.
  - type: note
    content: What an amazing picture this makes. This scene transpired at Solomon’s Porch. Lessons of wisdom, greater than the wisdom of Solomon, were uncovered by this miracle to those who had hearts of understanding.
  '12':
  - type: text
    content: 'With the crowd surrounding him, Peter said to them all, “People of Israel, '
  - type: note
    content: The Aramaic could be translated “protectors of Israel.”
  - type: text
    content: 'listen to me! Why are you so amazed by this healing? Why do you stare at us? We didn’t make this crippled man walk by our own power or authority. '
  - type: note
    content: As translated from the Aramaic. The Greek is “piety.”
  '13':
  - type: text
    content: 'The God of our ancestors, the God of Abraham, Isaac, and Jacob, '
  - type: note
    content: See Ex. 3:6.
  - type: text
    content: has done this
  - type: text
    content: '. For he has glorified his Servant '
  - type: note
    content: See Isa. 52:13.
  - type: text
    content: 'Jesus, the one you denied to Pilate’s face when he decided to release him—and you insisted that he be crucified. '
  '14':
  - type: text
    content: 'You rejected '
  - type: note
    content: Or “denied.” It is amazing how complete was the healing of Peter’s life. Just fifty days previously, it was Peter who denied he knew Jesus three times. Now he says to his fellow Jews, “You denied the holy and righteous One!”
  - type: text
    content: 'the one who is holy and righteous, and instead begged for a murderer to be released. '
  '15':
  - type: text
    content: 'You killed the Prince of Life! '
  - type: note
    content: Or “Originator of Life.”
  - type: text
    content: 'But God raised him from the dead, and we stand here as witnesses to that fact. '
  '16':
  - type: text
    content: Faith in Jesus’ name has healed this man standing before you. It is the faith that comes through believing in Jesus’ name that has made the crippled man walk right in front of your eyes!
  '17':
  - type: text
    content: '“My fellow Jews, I realize that neither you nor your leaders realize the grave mistake you made. '
  '18':
  - type: text
    content: 'But in spite of what you’ve done, God has fulfilled what he foretold through the prophets long ago about the sufferings of his Anointed One. '
  '19':
  - type: text
    content: 'And now you must repent and turn back '
  - type: note
    content: 'Peter uses the Greek word epistrepho (“turn back to God,” “be converted”). We need to not only repent but to return home to God’s grace and truth. This is a Hebraic thought of returning to the Lord God (the Hebrew word shuv). Every Jew would know what that means: “Come back to God!” Repentance and return is more than a passive changing of one’s mind.'
  - type: text
    content: 'to God so that your sins will be removed, '
  - type: note
    content: The Greek word used here, exaleipho, means “obliterated” or “canceled.”
  - type: text
    content: 'and so that times of refreshing '
  - type: note
    content: Or “cooling breeze,” which occurs only here in the New Testament. This hints of the time when God walked with Adam in the cooling breeze of the day. The work of the cross begins the restoration of Paradise within the hearts of Christ’s followers.
  - type: text
    content: 'will stream from the Lord’s presence. '
  '2':
  - type: text
    content: 'As they came to the entrance called the Beautiful Gate, '
  - type: note
    content: Or “the gate called Wonderful” in Aramaic. It is difficult to ascertain which of the many gates of the temple this might have been, and there is varying speculation with no certain conclusion. However, this Beautiful Gate points to Jesus Christ, who is the gate or entrance into the sheepfold of God. Furthermore, it hints of Ezekiel’s temple (Ezek. 47), which has a river flowing out from the threshold through the gateway of the temple. This river was first measured to be ankle deep. This man, lame in his ankles, was healed by the spiritual “river” that flowed out the “Beautiful Gate” of Christ. The gateway opened up and the river poured out of Peter and John, bringing healing to the lame.
  - type: text
    content: 'they were captured by the sight of a man crippled from birth being carried and placed at the entrance to the temple. He was often brought there to beg for money from those going in to worship. '
  '20':
  - type: text
    content: 'And he will send you Jesus, the Messiah, the appointed one. '
  - type: note
    content: The Aramaic can be translated “He will send you all that has been already prepared for you through Jesus, the Anointed One.”
  '21':
  - type: text
    content: 'For he must remain in heaven until the restoration of all things '
  - type: note
    content: Or “until the time for the universal restoration.”
  - type: text
    content: 'has taken place, '
  - type: note
    content: Or “This one the heavens must receive until the times of universal restoration.” The word restoration in Greek is apokatastasis, which infers the restoration of creation to the state of existence before the fall, but also Davidic covenant being restored. Luke’s choice of the Greek word found only here in the New Testament is noteworthy. It is a medical term that means “restoration of perfect health.”
  - type: text
    content: fulfilling everything that God said
  - type: text
    content: ' long ago through his holy prophets. '
  '22':
  - type: text
    content: 'For has not Moses told us:'
  - type: note
    content: See Lev. 23:29; Deut. 18:15, 19.
  - type: text
    content: ‘The Lord your God will raise up
  - type: text
    content: a prophet from among you who is like me.
  - type: text
    content: Listen to him and follow everything he tells you.
  '23':
  - type: text
    content: Every person who disobeys that prophet
  - type: text
    content: will be cut off and completely destroyed.’
  '24':
  - type: text
    content: '“In fact, every prophet from the time of Samuel onward has prophesied of these very days! '
  '25':
  - type: text
    content: 'And you are heirs of their prophecies '
  - type: note
    content: Or “sons of the prophets.”
  - type: text
    content: 'and of the covenants God made with your fathers when he promised Abraham, '
  - type: note
    content: See Gen. 22:18; 26:4.
  - type: text
    content: '‘Your descendant '
  - type: note
    content: Or “seed” (descendants).
  - type: text
    content: will bring blessing to all the people on the earth.’
  '26':
  - type: text
    content: '“Now that God raised up his Son, '
  - type: note
    content: The Greek word pais can mean either “servant” or “son.” (See Strong’s Concordance, Gr. 3816.) The Aramaic is clearly “son.” Notice how many times in the book of Acts that the followers of Christ preached the resurrection. The power and virtue of the cross can never be diminished; however, it is the resurrection of Christ that became the apostolic center of their preaching in the book of Acts.
  - type: text
    content: 'he has chosen to send him first to you that he might bless you by turning each one of you '
  - type: note
    content: The Aramaic uses the conditional clause “if you turn and repent from your evils.”
  - type: text
    content: from your wickedness.”
  - type: note
    content: The Greek is plural, “wickednesses” or “evil ways.”
  '3':
  - type: text
    content: When he noticed Peter and John going into the temple, he begged them for money.
  '4':
  - type: text
    content: 'Peter and John, looking straight into the eyes of the crippled man, said, “Look at us!” '
  '5':
  - type: text
    content: 'Expecting a gift, he readily gave them his attention. '
  '6':
  - type: text
    content: Then Peter said, “I don’t have money, but I’ll give you this—by the power of the name of Jesus Christ of Nazareth, stand up and walk!”
  '7':
  - type: text
    content: 'Peter held out his right hand to the crippled man. As he pulled the man to his feet, suddenly power surged into his crippled feet and ankles. The man jumped up, stood '
  - type: text
    content: there for a moment stunned
  - type: text
    content: ', and then began to walk around! As he went into the temple courts with Peter and John, he leapt for joy and shouted praises to God.'
  '9':
  - type: text
    content: 'When all the people saw him jumping up and down and heard him glorifying God, '
