document_id: ACT.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Healing at the Beautiful Gate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One afternoon Peter and John went to the temple for the three o’clock prayer. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Daily sacrifices were made in the temple at sunrise and about three o’clock every afternoon.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As they came to the entrance called the Beautiful Gate, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the gate called Wonderful” in Aramaic. It is difficult to ascertain which of the many gates of the temple this might have been, and there is varying speculation with no certain conclusion. However, this Beautiful Gate points to Jesus Christ, who is the gate or entrance into the sheepfold of God. Furthermore, it hints of Ezekiel’s temple (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 47
      metadata:
        usfm: EZK.47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), which has a river flowing out from the threshold through the gateway of the temple. This river was first measured to be ankle deep. This man, lame in his ankles, was healed by the spiritual “river” that flowed out the “Beautiful Gate” of Christ. The gateway opened up and the river poured out of Peter and John, bringing healing to the lame.
    marker-yv: yv-n
  - type: text
    text: 'they were captured by the sight of a man crippled from birth being carried and placed at the entrance to the temple. He was often brought there to beg for money from those going in to worship. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When he noticed Peter and John going into the temple, he begged them for money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Peter and John, looking straight into the eyes of the crippled man, said, “Look at us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Expecting a gift, he readily gave them his attention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then Peter said, “I don’t have money, but I’ll give you this—by the power of the name of Jesus Christ of Nazareth, stand up and walk!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: 'Peter held out his right hand to the crippled man. As he pulled the man to his feet, suddenly power surged into his crippled feet and ankles. The man jumped up, stood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: there for a moment stunned
  - type: text
    text: ', and then began to walk around! As he went into the temple courts with Peter and John, he leapt for joy and shouted praises to God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When all the people saw him jumping up and down and heard him glorifying God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: they realized it was the crippled beggar they had passed by in front of the Beautiful Gate. Astonishment swept over the crowd, for they were amazed over what had happened to him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Preaches to the Crowd
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dumbfounded over what they were witnessing, the crowd ran over to Peter and John, who were standing under the covered walkway called Solomon’s Porch. Standing there also was the healed beggar, clinging to Peter and John.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What an amazing picture this makes. This scene transpired at Solomon’s Porch. Lessons of wisdom, greater than the wisdom of Solomon, were uncovered by this miracle to those who had hearts of understanding.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'With the crowd surrounding him, Peter said to them all, “People of Israel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic could be translated “protectors of Israel.”
    marker-yv: yv-n
  - type: text
    text: 'listen to me! Why are you so amazed by this healing? Why do you stare at us? We didn’t make this crippled man walk by our own power or authority. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “piety.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The God of our ancestors, the God of Abraham, Isaac, and Jacob, '
