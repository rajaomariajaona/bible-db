document_id: PSA.79,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prayer in a Time of National Disaster
  - type: text
    content: Asaph’s poetic song
  - type: text
    content: God, won’t you do something?
  - type: text
    content: Barbarians have invaded your inheritance.
  - type: text
    content: Your temple of holiness has been violated,
  - type: text
    content: and Jerusalem has been left in ruins.
  '10':
  - type: text
    content: Why should all the nations sneer at us, saying,
  - type: text
    content: “Where is this God of yours?”
  - type: text
    content: Now is the time, Lord.
  - type: text
    content: Show your people and all the world that
  - type: text
    content: you will avenge this slaughter and bloodshed once and for all!
  '11':
  - type: text
    content: Listen, Lord! Hear the sighing of all the prisoners of war,
  - type: text
    content: all those doomed to die. Demonstrate your glory-power,
  - type: text
    content: and come and rescue your condemned children!
  '12':
  - type: text
    content: Lord God, take what these mocking masses have done to us
  - type: text
    content: and pay it all back to them seven times over.
  '13':
  - type: text
    content: Then we, your devoted lovers, will forever thank you,
  - type: text
    content: praising your name from generation to generation!
  '2':
  - type: text
    content: The corpses of your loving people are lying in the open—
  - type: text
    content: food for the beasts and the birds.
  '3':
  - type: text
    content: The shed blood of your servants has soaked the city,
  - type: text
    content: with no one left to bury the dead.
  '4':
  - type: text
    content: Now the nearby nations heap their scorn upon us,
  - type: text
    content: scoffing, mocking us incessantly.
  '5':
  - type: text
    content: 'How much longer, O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', must we endure this?'
  - type: text
    content: Does your anger have no end?
  - type: text
    content: Will your jealousy burn like a raging fire?
  '6':
  - type: text
    content: If you’re going to pour out your anger,
  - type: text
    content: pour it out on all these nations around us, not on us!
  - type: text
    content: They’re the ones who do not love you like we do!
  '7':
  - type: text
    content: See how they’ve attacked us, consuming the land,
  - type: text
    content: leaving it desolate.
  '8':
  - type: text
    content: Please, God, don’t hold the sins of our fathers against us.
  - type: text
    content: Don’t make us pay for their sins.
  - type: text
    content: Hurry to our side, and let your tenderhearted mercy
  - type: text
    content: meet us in our need, for we are devastated beyond belief.
  '9':
  - type: text
    content: Our hero, come and rescue us!
  - type: text
    content: O God of the breakthrough, for the glory of your name,
  - type: text
    content: come and help us!
  - type: text
    content: Forgive and restore us; heal us and cover us in your love.
