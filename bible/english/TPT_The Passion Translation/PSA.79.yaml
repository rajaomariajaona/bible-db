document_id: PSA.79,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Prayer in a Time of National Disaster
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Asaph’s poetic song
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, won’t you do something?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Barbarians have invaded your inheritance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your temple of holiness has been violated,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Jerusalem has been left in ruins.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should all the nations sneer at us, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where is this God of yours?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now is the time, Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Show your people and all the world that
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will avenge this slaughter and bloodshed once and for all!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, Lord! Hear the sighing of all the prisoners of war,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all those doomed to die. Demonstrate your glory-power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and come and rescue your condemned children!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord God, take what these mocking masses have done to us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and pay it all back to them seven times over.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we, your devoted lovers, will forever thank you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: praising your name from generation to generation!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The corpses of your loving people are lying in the open—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: food for the beasts and the birds.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The shed blood of your servants has soaked the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with no one left to bury the dead.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now the nearby nations heap their scorn upon us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: scoffing, mocking us incessantly.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How much longer, O  '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', must we endure this?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does your anger have no end?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will your jealousy burn like a raging fire?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you’re going to pour out your anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour it out on all these nations around us, not on us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re the ones who do not love you like we do!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how they’ve attacked us, consuming the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving it desolate.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please, God, don’t hold the sins of our fathers against us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t make us pay for their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hurry to our side, and let your tenderhearted mercy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: meet us in our need, for we are devastated beyond belief.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our hero, come and rescue us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God of the breakthrough, for the glory of your name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come and help us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forgive and restore us; heal us and cover us in your love.
