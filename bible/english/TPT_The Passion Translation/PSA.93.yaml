document_id: PSA.93,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Majesty of God
  - type: text
    content: A Friday song composed by King David after being resettled in the land
  - type: note
    content: This inscription is found in the Septuagint. Jews called this psalm “The Friday psalm.” The Talmud indicates that this psalm was sung every Friday in the temple by the Levites.
  - type: text
    content: 'Look! '
  - type: text
    content: Yahweh
  - type: text
    content: ' now reigns as King!'
  - type: text
    content: He has covered himself with majesty and strength,
  - type: text
    content: wearing them as his splendor-garments.
  - type: text
    content: Regal power surrounds him as he sits securely on his throne.
  - type: text
    content: He’s in charge of it all, the entire world,
  - type: text
    content: and he knows what he’s doing!
  '2':
  - type: text
    content: Lord, you have reigned as King from the very beginning of time.
  - type: text
    content: Eternity is your home.
  '3':
  - type: text
    content: Chaos once challenged you.
  - type: text
    content: The raging waves lifted themselves over and over,
  - type: text
    content: high above the ocean’s depths, letting out their mighty roar!
  - type: text
    content: Yet at the sound of your voice they were all stilled by your might.
  - type: text
    content: What a majestic King, filled with power!
  '5':
  - type: text
    content: Nothing could ever change your royal decrees;
  - type: text
    content: they will last forever!
  - type: text
    content: Holiness is the beauty that fills your house;
  - type: note
    content: Believers are now God’s house, made holy by the blood of Jesus. See 1 Cor. 3:16 and Heb. 3:6.
  - type: text
    content: you are the one who abides forevermore!
