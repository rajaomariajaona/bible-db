document_id: PSA.93,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Majesty of God
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Friday song composed by King David after being resettled in the land
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '93'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This inscription is found in the Septuagint. Jews called this psalm “The Friday psalm.” The Talmud indicates that this psalm was sung every Friday in the temple by the Levites.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Look! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' now reigns as King!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has covered himself with majesty and strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wearing them as his splendor-garments.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regal power surrounds him as he sits securely on his throne.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s in charge of it all, the entire world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he knows what he’s doing!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lord, you have reigned as King from the very beginning of time.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternity is your home.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: Chaos once challenged you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The raging waves lifted themselves over and over,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: high above the ocean’s depths, letting out their mighty roar!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet at the sound of your voice they were all stilled by your might.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a majestic King, filled with power!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Nothing could ever change your royal decrees;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will last forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Holiness is the beauty that fills your house;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 93:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Believers are now God’s house, made holy by the blood of Jesus. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you are the one who abides forevermore!
