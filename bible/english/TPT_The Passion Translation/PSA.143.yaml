document_id: PSA.143
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: My Humble Prayer
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s poetic song when he was chased by Absalom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '143'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, you must hear my prayer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are faithful to your promises.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Answer my cry, O righteous God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Don’t bring me into your courtroom for judgment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for there is no one who is righteous before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: My enemies have chased and caught me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and crushed my life into dust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I’m living in the darkness of death’s shadow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My inner being is in depression
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my heart is heavy, dazed with despair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I remember the glorious miracles of days gone by,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I often think of all the wonders of old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Now I’m reaching out to you, thirsting for you
- type: usfm
  marker: q1
  children:
  - type: text
    text: like the dry, cracked ground thirsts for rain.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lord, come quickly and answer me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for my depression deepens and I’m about to give up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t leave me now or I’ll die!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let the dawning day bring me revelation
- type: usfm
  marker: q1
  children:
  - type: text
    text: of your tender, unfailing love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me light for my path and teach me, for I trust in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Save me from all my enemies, for I hide myself in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I just want to obey all you ask of me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So teach me, Lord, for you are my God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your gracious Spirit is all I need, so lead me on good paths
- type: usfm
  marker: q1
  children:
  - type: text
    text: that are pleasing to you, my one and only God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lord, if you rescue me, it will bring you more glory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are true to your promises.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring me out of these troubles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Since I am your loving servant, destroy all those
- type: usfm
  marker: q1
  children:
  - type: text
    text: who are trying to harm me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And because you are so loving and kind to me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: silence all of my enemies!
