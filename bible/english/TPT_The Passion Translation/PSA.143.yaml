document_id: PSA.143,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: My Humble Prayer
  - type: text
    content: King David’s poetic song when he was chased by Absalom
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: Lord, you must hear my prayer,
  - type: text
    content: for you are faithful to your promises.
  - type: text
    content: Answer my cry, O righteous God!
  '10':
  - type: text
    content: I just want to obey all you ask of me.
  - type: text
    content: So teach me, Lord, for you are my God.
  - type: text
    content: Your gracious Spirit is all I need, so lead me on good paths
  - type: text
    content: that are pleasing to you, my one and only God!
  '11':
  - type: text
    content: Lord, if you rescue me, it will bring you more glory,
  - type: text
    content: for you are true to your promises.
  - type: text
    content: Bring me out of these troubles!
  '12':
  - type: text
    content: Since I am your loving servant, destroy all those
  - type: text
    content: who are trying to harm me.
  - type: text
    content: And because you are so loving and kind to me,
  - type: text
    content: silence all of my enemies!
  '2':
  - type: text
    content: Don’t bring me into your courtroom for judgment,
  - type: text
    content: for there is no one who is righteous before you.
  '3':
  - type: text
    content: My enemies have chased and caught me
  - type: text
    content: and crushed my life into dust.
  - type: text
    content: Now I’m living in the darkness of death’s shadow.
  '4':
  - type: text
    content: My inner being is in depression
  - type: text
    content: and my heart is heavy, dazed with despair.
  '5':
  - type: text
    content: I remember the glorious miracles of days gone by,
  - type: text
    content: and I often think of all the wonders of old.
  '6':
  - type: text
    content: Now I’m reaching out to you, thirsting for you
  - type: text
    content: like the dry, cracked ground thirsts for rain.
  - type: text
    content: Pause in his presence
  '7':
  - type: text
    content: Lord, come quickly and answer me,
  - type: text
    content: for my depression deepens and I’m about to give up.
  - type: text
    content: Don’t leave me now or I’ll die!
  '8':
  - type: text
    content: Let the dawning day bring me revelation
  - type: text
    content: of your tender, unfailing love.
  - type: text
    content: Give me light for my path and teach me, for I trust in you.
  '9':
  - type: text
    content: Save me from all my enemies, for I hide myself in you.
