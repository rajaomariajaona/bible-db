document_id: SNG.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How beautiful on the mountains
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: are the sandaled feet of this one bringing such good news.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are truly royalty!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The way you walk so gracefully in my ways
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: displays such dignity.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are truly the poetry of God—his very handiwork.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Now I know that I am for my beloved
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Shulamite now knows that she was created for her beloved, to complete him. She is his soul mate. The Hebrew word for “beloved” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: yadiyad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is formed from the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “hand.”'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yadiyad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “beloved” or “hand in hand.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all his desires are fulfilled in me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Come away, my lover.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come with me to the faraway fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will run away together to the forgotten places
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and show them redeeming love.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Let us arise and run to the vineyards '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “villages.” The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kefarim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: has a homonym that means “atonement” and another that means “henna.” Combined, the three words are “the henna villages of atonement.”
      marker-yv: yv-n
    - type: text
      text: of your people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and see if the budding vines of love are now in full bloom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will discover if their passion is awakened.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pomegranates are equated to human passion and emotions. When opened, they are a blushing fruit and speak powerfully of our hearts of passion opened to our Lover.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There I will display my love for you.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The love apples are in bloom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sending forth their fragrance of spring.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rarest of fruits are found at our doors—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the new as well as the old.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have stored them for you, my lover-friend!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Out of your innermost being
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is flowing the fullness of my Spirit—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: never failing to satisfy.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Within your womb there is a birthing of harvest wheat;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: they are the sons and daughters
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: nurtured by the purity you impart.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How gracious you have become!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your life stands tall as a tower, like a shining light on a hill.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your revelation eyes are pure, like pools of refreshing
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the pools of Heshbon,” which means “fertile thoughts.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: —
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: sparkling light for a multitude.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Such discernment surrounds you,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: protecting you from the enemy’s advance.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Redeeming love crowns you as royalty.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your thoughts are full of life, wisdom, and virtue.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even a king is held captive by your beauty.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How delicious is your fair beauty;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: it cannot be described
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as I count the delights you bring to me.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Love has become the greatest.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You stand in victory above the rest,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: stately and secure as you share with me
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your vineyard of love.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now I decree, I will ascend my palm tree.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will take hold of you with my power,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: possessing every part of my fruitful bride.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your love I will drink as wine,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and your words will be mine.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For your kisses of love are exhilarating,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: more than any delight I’ve known before.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Your kisses of love awaken even the lips of sleeping ones.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shulamite Bride
    marker-yv: yv-h
