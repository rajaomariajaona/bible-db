document_id: SNG.7,1849
type_code: eng
verses:
  '1':
  - type: text
    content: How beautiful on the mountains
  - type: text
    content: are the sandaled feet of this one bringing such good news.
  - type: text
    content: You are truly royalty!
  - type: text
    content: The way you walk so gracefully in my ways
  - type: text
    content: displays such dignity.
  - type: text
    content: You are truly the poetry of God—his very handiwork.
  '10':
  - type: text
    content: Now I know that I am for my beloved
  - type: note
    content: The Shulamite now knows that she was created for her beloved, to complete him. She is his soul mate. The Hebrew word for “beloved” (yadiyad) is formed from the word yad, which means “hand.” Yadiyad means “beloved” or “hand in hand.”
  - type: text
    content: and all his desires are fulfilled in me.
  '11':
  - type: text
    content: Come away, my lover.
  - type: text
    content: Come with me to the faraway fields.
  - type: text
    content: We will run away together to the forgotten places
  - type: text
    content: and show them redeeming love.
  '12':
  - type: text
    content: 'Let us arise and run to the vineyards '
  - type: note
    content: Or “villages.” The Hebrew word kefarim has a homonym that means “atonement” and another that means “henna.” Combined, the three words are “the henna villages of atonement.”
  - type: text
    content: of your people
  - type: text
    content: and see if the budding vines of love are now in full bloom.
  - type: text
    content: We will discover if their passion is awakened.
  - type: note
    content: Pomegranates are equated to human passion and emotions. When opened, they are a blushing fruit and speak powerfully of our hearts of passion opened to our Lover.
  - type: text
    content: There I will display my love for you.
  '13':
  - type: text
    content: The love apples are in bloom,
  - type: text
    content: sending forth their fragrance of spring.
  - type: text
    content: The rarest of fruits are found at our doors—
  - type: text
    content: the new as well as the old.
  - type: text
    content: I have stored them for you, my lover-friend!
  '2':
  - type: text
    content: Out of your innermost being
  - type: text
    content: is flowing the fullness of my Spirit—
  - type: text
    content: never failing to satisfy.
  - type: text
    content: Within your womb there is a birthing of harvest wheat;
  - type: text
    content: they are the sons and daughters
  - type: text
    content: nurtured by the purity you impart.
  - type: text
    content: How gracious you have become!
  '4':
  - type: text
    content: Your life stands tall as a tower, like a shining light on a hill.
  - type: text
    content: Your revelation eyes are pure, like pools of refreshing
  - type: text
    content: ' '
  - type: note
    content: Or “the pools of Heshbon,” which means “fertile thoughts.”
  - type: text
    content: —
  - type: text
    content: sparkling light for a multitude.
  - type: text
    content: Such discernment surrounds you,
  - type: text
    content: protecting you from the enemy’s advance.
  '5':
  - type: text
    content: Redeeming love crowns you as royalty.
  - type: text
    content: Your thoughts are full of life, wisdom, and virtue.
  - type: text
    content: Even a king is held captive by your beauty.
  '6':
  - type: text
    content: How delicious is your fair beauty;
  - type: text
    content: it cannot be described
  - type: text
    content: as I count the delights you bring to me.
  - type: text
    content: Love has become the greatest.
  '7':
  - type: text
    content: You stand in victory above the rest,
  - type: text
    content: stately and secure as you share with me
  - type: text
    content: your vineyard of love.
  '8':
  - type: text
    content: Now I decree, I will ascend my palm tree.
  - type: text
    content: I will take hold of you with my power,
  - type: text
    content: possessing every part of my fruitful bride.
  - type: text
    content: Your love I will drink as wine,
  - type: text
    content: and your words will be mine.
  '9':
  - type: text
    content: For your kisses of love are exhilarating,
  - type: text
    content: more than any delight I’ve known before.
  - type: text
    content: Your kisses of love awaken even the lips of sleeping ones.
  - type: heading
    content: The Shulamite Bride
