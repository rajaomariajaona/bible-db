    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “sanctuary” is taken from a root word for “shining place.” This psalm gives us David’s equivalent to Jesus’ Sermon on the Hillside. If we will dwell in the Holy Place, there must first be a holy place in our spirits where God dwells. God’s guests must submit to the holiness that lives there. There is etiquette for God’s house revealed in this psalm.
