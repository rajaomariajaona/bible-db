document_id: PSA.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living in the Shining Place The first line in Hebrew reads “Yahweh, who may abide [as a guest] in your tent [tabernacle]?” Perhaps David’s prophetic musicians sang this song of instruction as they laid the ark to rest in David’s tent. It is a song that reveals who will dwell in God’s holy presence and who will live with him in heaven’s glory. It actually is a description of Zion’s perfect Man, Christ Jesus, and all those who are transformed into his image (Rom. 8:29).
  - type: text
    content: A poetic song by David
  - type: heading
    content: A Question Posed
  - type: text
    content: Yahweh
  - type: text
    content: ', who dares to dwell with you?'
  - type: text
    content: Who presumes the privilege of being close to you,
  - type: text
    content: 'living next to you in your shining place '
  - type: note
    content: The Hebrew word for “sanctuary” is taken from a root word for “shining place.” This psalm gives us David’s equivalent to Jesus’ Sermon on the Hillside. If we will dwell in the Holy Place, there must first be a holy place in our spirits where God dwells. God’s guests must submit to the holiness that lives there. There is etiquette for God’s house revealed in this psalm.
  - type: text
    content: of glory?
  - type: heading
    content: The Answer Provided
  '2':
  - type: text
    content: They are passionate and wholehearted,
  - type: text
    content: always sincere and always speaking the truth—
  - type: text
    content: for their hearts are trustworthy.
  '3':
  - type: text
    content: 'They refuse to slander '
  - type: note
    content: The Hebrew word for “slander,” ragal, means to spy on someone and look for evil to use against that person.
  - type: text
    content: or insult others;
  - type: text
    content: they’ll never listen to gossip or rumors,
  - type: text
    content: nor would they ever harm a friend with their words.
  '4':
  - type: text
    content: They will despise evil and evil workers
  - type: text
    content: while commending the faithful ones who follow after the truth.
  - type: text
    content: They make firm commitments and follow through,
  - type: text
    content: even at great cost.
  '5':
  - type: text
    content: They never crush others with exploitation
  - type: text
    content: and they would never be bought with a bribe
  - type: text
    content: against the innocent.
  - type: text
    content: Those who do these things will never be shaken;
  - type: text
    content: they will stand firm forever.
