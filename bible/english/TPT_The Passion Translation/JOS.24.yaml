    - type: text
      text: '1'
  - type: text
    text: 'Joshua assembled all Israel’s tribes at Shechem. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Three locations in the promised land were of vital interest to Israel: Gilgal, Shiloh, and Shechem. Gilgal was their military headquarters during the invasion. For the believer today, Gilgal represents our beginning, our resurrection into new life, and our responsibilities and battles that come with it (see'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Josh. 10:43–11:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 6:12
      metadata:
        usfm: EPH.6.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Gilgal was also a place of recovery and renewal, for the reproach of Egypt was rolled away at Gilgal. Shiloh was the pre-Jerusalem capitol and worship center for Israel, the spiritual pivot of national life. That is where God had manifested his grace, guidance, and power. It represents the holy realm of worship and devotion to God, where we receive divine revelation. Shechem was the political cradle of the nation due to its importance in the lives of the patriarchs. Shechem was not only the geographic center of Canaan but also the moral heart of the nation. At this city Abraham built the first altar to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: within the land, and here God appeared to him and promised that Abraham’s seed would inherit the promises (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 12:7
      metadata:
        usfm: GEN.12.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It is the place of building altars, renewing our covenant-love of God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 35:1–4
      metadata:
        usfm: GEN.35.1+GEN.35.2+GEN.35.3+GEN.35.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and receiving our spiritual inheritance as sons and daughters of God.
    marker-yv: yv-n
  - type: text
    text: 'He summoned all the leaders—elders, judges, and officials of Israel—and they all stood in the presence of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Joshua said to them all: “This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' the God of Israel has to say to you: ‘Long ago, your forefathers—Terah, father of Abraham and father of Nahor—lived beyond the Euphrates and worshiped other gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I took your father Abraham from that land and led him through all the land of Canaan. I gave him a son, Isaac, and through Isaac I multiplied his descendants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I gave Isaac two sons, Jacob and Esau. To Esau and his descendants I gave the hill country of Edom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Seir.”
    marker-yv: yv-n
  - type: text
    text: 'as their inheritance, while Jacob and his family went down to Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: When the time of their captivity was complete
  - type: text
    text: ', I sent Moses and Aaron to Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to deliver them
  - type: text
    text: '. I struck the land with great plagues, and afterward I led you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5–7
      metadata:
        usfm: JOS.24.5+JOS.24.6+JOS.24.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: the author alternates between using “your forefathers [ancestors]” and “you [plural]” as a way of reminding the people of that generation that they were included in the redemptive history of their people.
    marker-yv: yv-n
  - type: text
    text: 'out from there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I freed your forefathers from Egypt and brought you to the Red Sea, but the Egyptians pursued them with chariots and horsemen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then our people cried out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' for help, and he put a thick, dark cloud between you and the Egyptians. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: When the Egyptians attempted to follow them
  - type: text
    text: ', I caused the sea to roll over them and drown them. You saw with your own eyes what I did to the Egyptians. Then you lived in the desert for many years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I brought you to the land of the Amorites, who lived east of the Jordan. When they fought against you, I gave them into your hands. As you advanced, I gave you victory over them, and you took possession of their land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '‘Later, when Balak son of Zippor, king of Moab, opposed Israel, he sent for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the prophet
  - type: text
    text: ' Balaam son of Beor to come and curse you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But I refused to listen to Balaam. Instead he had to prophesy my blessings over you! I rescued you from his power.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from his hand.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '‘Later, after you crossed the Jordan miraculously, you faced '
  - type: usfm
    marker: it
    children:
    - type: text
      text: another impossibility
  - type: text
    text: '—Jericho! The lords of Jericho, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “The lords of Jericho” may be a reference to the spiritual powers (principalities) that held Jericho and the other city-states in their grip. Joshua battled not only against flesh and blood but also against principalities and powers (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 6:10–18
      metadata:
        usfm: EPH.6.10+EPH.6.11+EPH.6.12+EPH.6.13+EPH.6.14+EPH.6.15+EPH.6.16+EPH.6.17+EPH.6.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'as well as the Amorites, Perizzites, Canaanites, Hittites, Girgashites, Hivites, and Jebusites, fought with you, but I gave you victory over them all! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I sent the hornet '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 23:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 7:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The hornet is likely an idiomatic expression for being thrown into a panic. One can get a picture of a man thrashing at a swarm of hornets trying to sting him. That is the word picture here. As God’s presence invaded the land, it brought panic into the hearts of God’s enemies.
    marker-yv: yv-n
  - type: text
    text: 'ahead of you to run off the two Amorite kings. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Og and Sihon. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 12:2–13:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Your weapons and strength had nothing to do with it! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I gave you land on which you had not labored and cities that you had not built. You are now living in the land I gave you. You are eating grapes from vines that others planted and olives from trees planted by the people who lived there before you.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Choose Whom You Will Serve
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“Now therefore, worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' with holy awe '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fear” or “reverential honor.”
    marker-yv: yv-n
  - type: text
    text: 'and serve him in authentic love and loyalty. Remove '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from your hearts
  - type: text
    text: ' every false god to whom your fathers bowed down beyond the Euphrates and in Egypt and serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If it seems wrong in your eyes to serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', then make your decision today which gods you will worship—the gods which your ancestors worshiped in Mesopotamia or the gods which the Amorites worship in the land where you are now living—but I and my family, we will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: give our lives to
  - type: text
    text: ' worship and serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint adds the clause “for he is holy!”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The people responded '
  - type: usfm
    marker: it
    children:
    - type: text
      text: enthusiastically
  - type: text
    text: ': “Far be it from us to abandon '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and serve other gods! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Our God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', set us and our fathers free from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: slavery in
  - type: text
    text: ' the land of Egypt, the house of bondage. He performed these many great signs '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and wonders
  - type: text
    text: ' before our eyes. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: supernaturally
  - type: text
    text: ' protected us throughout our entire journey as we passed through the territory of other nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And as we advanced, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' powerfully drove out from before us all the people, including the Amorites who inhabited the country. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes, Joshua!
  - type: text
    text: ' We, too, will worship and serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', for he alone is our God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joshua warned the people, “Don’t be so quick to say, ‘We will worship and serve '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ',’ '
  - type: usfm
