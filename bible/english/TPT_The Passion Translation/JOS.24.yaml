    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the book of the law of God.” It is difficult to identify this as any particular book included in the Old Testament.
    marker-yv: yv-n
