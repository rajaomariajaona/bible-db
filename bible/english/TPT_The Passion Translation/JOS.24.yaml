type_code: eng
verses:
  '1':
  - type: heading
    content: Renewal of the Covenant at Shechem
  - type: text
    content: 'Joshua assembled all Israel’s tribes at Shechem. '
  - type: note
    content: 'Three locations in the promised land were of vital interest to Israel: Gilgal, Shiloh, and Shechem. Gilgal was their military headquarters during the invasion. For the believer today, Gilgal represents our beginning, our resurrection into new life, and our responsibilities and battles that come with it (see Josh. 10:43–11:23; Eph. 6:12). Gilgal was also a place of recovery and renewal, for the reproach of Egypt was rolled away at Gilgal. Shiloh was the pre-Jerusalem capitol and worship center for Israel, the spiritual pivot of national life. That is where God had manifested his grace, guidance, and power. It represents the holy realm of worship and devotion to God, where we receive divine revelation. Shechem was the political cradle of the nation due to its importance in the lives of the patriarchs. Shechem was not only the geographic center of Canaan but also the moral heart of the nation. At this city Abraham built the first altar to Yahweh within the land, and here God appeared to him and promised that Abraham’s seed would inherit the promises (see Gen. 12:7). It is the place of building altars, renewing our covenant-love of God (see Gen. 35:1–4), and receiving our spiritual inheritance as sons and daughters of God.'
  - type: text
    content: 'He summoned all the leaders—elders, judges, and officials of Israel—and they all stood in the presence of God. '
  '10':
  - type: text
    content: But I refused to listen to Balaam. Instead he had to prophesy my blessings over you! I rescued you from his power.
  - type: note
    content: Or “from his hand.”
  '11':
  - type: text
    content: '‘Later, after you crossed the Jordan miraculously, you faced '
  - type: text
    content: another impossibility
  - type: text
    content: '—Jericho! The lords of Jericho, '
  - type: note
    content: “The lords of Jericho” may be a reference to the spiritual powers (principalities) that held Jericho and the other city-states in their grip. Joshua battled not only against flesh and blood but also against principalities and powers (Eph. 6:10–18).
  - type: text
    content: 'as well as the Amorites, Perizzites, Canaanites, Hittites, Girgashites, Hivites, and Jebusites, fought with you, but I gave you victory over them all! '
  '12':
  - type: text
    content: 'I sent the hornet '
  - type: note
    content: See Ex. 23:28; Deut. 7:20. The hornet is likely an idiomatic expression for being thrown into a panic. One can get a picture of a man thrashing at a swarm of hornets trying to sting him. That is the word picture here. As God’s presence invaded the land, it brought panic into the hearts of God’s enemies.
  - type: text
    content: 'ahead of you to run off the two Amorite kings. '
  - type: note
    content: That is, Og and Sihon. See 12:2–13:11.
  - type: text
    content: 'Your weapons and strength had nothing to do with it! '
  '13':
  - type: text
    content: I gave you land on which you had not labored and cities that you had not built. You are now living in the land I gave you. You are eating grapes from vines that others planted and olives from trees planted by the people who lived there before you.’
  - type: heading
    content: Choose Whom You Will Serve
  '14':
  - type: text
    content: '“Now therefore, worship '
  - type: text
    content: Yahweh
  - type: text
    content: ' with holy awe '
  - type: note
    content: Or “fear” or “reverential honor.”
  - type: text
    content: 'and serve him in authentic love and loyalty. Remove '
  - type: text
    content: from your hearts
  - type: text
    content: ' every false god to whom your fathers bowed down beyond the Euphrates and in Egypt and serve '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'If it seems wrong in your eyes to serve '
  - type: text
    content: Yahweh
  - type: text
    content: ', then make your decision today which gods you will worship—the gods which your ancestors worshiped in Mesopotamia or the gods which the Amorites worship in the land where you are now living—but I and my family, we will '
  - type: text
    content: give our lives to
  - type: text
    content: ' worship and serve '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  - type: note
    content: The Septuagint adds the clause “for he is holy!”
  '16':
  - type: text
    content: 'The people responded '
  - type: text
    content: enthusiastically
  - type: text
    content: ': “Far be it from us to abandon '
  - type: text
    content: Yahweh
  - type: text
    content: ' and serve other gods! '
  '17':
  - type: text
    content: 'Our God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', set us and our fathers free from '
  - type: text
    content: slavery in
  - type: text
    content: ' the land of Egypt, the house of bondage. He performed these many great signs '
  - type: text
    content: and wonders
  - type: text
    content: ' before our eyes. '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: supernaturally
  - type: text
    content: ' protected us throughout our entire journey as we passed through the territory of other nations. '
  '18':
  - type: text
    content: 'And as we advanced, '
  - type: text
    content: Yahweh
  - type: text
    content: ' powerfully drove out from before us all the people, including the Amorites who inhabited the country. '
  - type: text
    content: Yes, Joshua!
  - type: text
    content: ' We, too, will worship and serve '
  - type: text
    content: Yahweh
  - type: text
    content: ', for he alone is our God.”'
  '19':
  - type: text
    content: 'Joshua warned the people, “Don’t be so quick to say, ‘We will worship and serve '
  - type: text
    content: Yahweh
  - type: text
    content: ',’ '
  - type: note
    content: Or “You will not be able to serve Yahweh.”
  - type: text
    content: 'for he is a holy God. And he will tolerate no rivals. '
  - type: note
    content: Or “He is El, the Jealous.” See Ex. 20:5; Deut. 4:24; 5:9.
  - type: text
    content: 'God will not forgive the sin of unfaithfulness to him. '
  - type: note
    content: Or “He will not forgive your transgressions and your sins.” Joshua possibly knew that they were secretly practicing idolatry.
  '2':
  - type: text
    content: 'Then Joshua said to them all: “This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' the God of Israel has to say to you: ‘Long ago, your forefathers—Terah, father of Abraham and father of Nahor—lived beyond the Euphrates and worshiped other gods. '
  '20':
  - type: text
    content: 'If after '
  - type: text
    content: Yahweh
  - type: text
    content: ' has been gracious to you, you turn and forsake him to worship other gods, then he will turn and deal harshly with you and totally consume you!”'
  '21':
  - type: text
    content: '“No, no!” the people responded. “We promise to worship and serve '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  '22':
  - type: text
    content: 'Then Joshua said to them, “You are witnesses against yourselves that you have chosen to serve '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: text
    content: “Yes, we are witnesses,” they responded.
  '23':
  - type: text
    content: '“Now then,” said Joshua, “throw away these foreign gods that are among you, and yield your hearts fully to '
  - type: text
    content: Yahweh
  - type: text
    content: ' the God of Israel!”'
  '24':
  - type: text
    content: 'And the people promised Joshua, “We really will worship and serve our God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', and listen to his voice.”'
  '25':
  - type: text
    content: 'On that day when the people were gathered at Shechem, Joshua made a covenant between them and '
  - type: text
    content: Yahweh
  - type: text
    content: ', which contained laws the people were to obey. '
  '26':
  - type: text
    content: 'Joshua recorded all this in a book of divine instruction. '
  - type: note
    content: Or “the book of the law of God.” It is difficult to identify this as any particular book included in the Old Testament.
  - type: text
    content: 'Then he set up a large stone memorial at the tent pole '
  - type: note
    content: Or “oak tree [terebinth].” This is a hapax legomenon that Rabbinical Judaism interprets as “pole.” (See A. Cohen, American Journal of Semitic Languages, xl, pp. 160ff).
  - type: text
    content: 'near the holy place of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Joshua said to all the people, “Look at this stone! It will serve as a witness, for it heard all the words that '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to us; '
  - type: note
    content: The stones (inanimate objects) can hear our words.
  - type: text
    content: 'it will be a witness against you if you rebel against our God.” '
  '28':
  - type: text
    content: Joshua then dismissed the people, each to their own inheritance.
  - type: heading
    content: Joshua and Eleazar Buried in the Promised Land
  '29':
  - type: text
    content: 'Some time later, Joshua son of Nun, the servant of '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: Finally upon his death Joshua was called “the servant of Yahweh,” a title that had been used exclusively for Moses up to this point in the book of Joshua.
  - type: text
    content: 'died at the age of one hundred and ten. '
  '3':
  - type: text
    content: 'I took your father Abraham from that land and led him through all the land of Canaan. I gave him a son, Isaac, and through Isaac I multiplied his descendants. '
  '30':
  - type: text
    content: 'They buried him on his own property, at Timnath Serah '
  - type: note
    content: Or “Timnath Heres.” See Judg. 2:9 and first footnote.
  - type: text
    content: 'in the hill country of Ephraim, north of Mount Gaash. '
  - type: note
    content: Gaash means “shaking” or “commotion.”
  '31':
  - type: text
    content: 'Israel was faithful to serve '
  - type: text
    content: Yahweh
  - type: text
    content: ' during the lifetime of Joshua and the lifetime of the elders who lived on after Joshua, those who had experienced all the miracles that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had done for Israel.'
  - type: note
    content: See Judg. 2:7, 10.
  '32':
  - type: text
    content: 'They buried Joseph’s bones, which the Israelites had brought up from Egypt, at Shechem, in the tract of land that Jacob bought for a hundred pieces of silver '
  - type: note
    content: Or “for a hundred qesitah,” an unknown unit of money.
  - type: text
    content: 'from the children of Hamor, Shechem’s father. '
  - type: note
    content: See Gen. 50:24–25. The Septuagint adds “There they deposited in his grave the flint knives used to circumcise the children of Israel at Gilgal, as the Lord commanded them when he brought them out of Egypt.”
  - type: text
    content: 'So '
  - type: text
    content: the land
  - type: text
    content: ' became the inheritance of Joseph’s descendants. '
  '33':
  - type: text
    content: 'The '
  - type: text
    content: chief priest
  - type: text
    content: ' '
  - type: note
    content: The words “chief priest” are found in some Syriac manuscripts and the Septuagint.
  - type: text
    content: 'Eleazar son of Aaron also died. They buried him on the hill '
  - type: note
    content: Or “Gibeah.” Gibeah is the common Hebrew word for “hill.”
  - type: text
    content: of his son Phineas, which had been assigned to him in Ephraim.
  - type: note
    content: The Septuagint adds, “At that time, the children of Israel took up the ark of God and carried it about among them.”
  '4':
  - type: text
    content: 'I gave Isaac two sons, Jacob and Esau. To Esau and his descendants I gave the hill country of Edom '
  - type: note
    content: Or “Seir.”
  - type: text
    content: 'as their inheritance, while Jacob and his family went down to Egypt. '
  '5':
  - type: text
    content: When the time of their captivity was complete
  - type: text
    content: ', I sent Moses and Aaron to Egypt '
  - type: text
    content: to deliver them
  - type: text
    content: '. I struck the land with great plagues, and afterward I led you '
  - type: note
    content: In vv. 5–7 the author alternates between using “your forefathers [ancestors]” and “you [plural]” as a way of reminding the people of that generation that they were included in the redemptive history of their people.
  - type: text
    content: 'out from there. '
  '6':
  - type: text
    content: 'I freed your forefathers from Egypt and brought you to the Red Sea, but the Egyptians pursued them with chariots and horsemen. '
  '7':
  - type: text
    content: 'Then our people cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ' for help, and he put a thick, dark cloud between you and the Egyptians. '
  - type: text
    content: When the Egyptians attempted to follow them
  - type: text
    content: ', I caused the sea to roll over them and drown them. You saw with your own eyes what I did to the Egyptians. Then you lived in the desert for many years. '
  '8':
  - type: text
    content: I brought you to the land of the Amorites, who lived east of the Jordan. When they fought against you, I gave them into your hands. As you advanced, I gave you victory over them, and you took possession of their land.
  '9':
  - type: text
    content: '‘Later, when Balak son of Zippor, king of Moab, opposed Israel, he sent for '
  - type: text
    content: the prophet
  - type: text
    content: ' Balaam son of Beor to come and curse you. '
