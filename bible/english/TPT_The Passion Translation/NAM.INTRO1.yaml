  - type: text
    content: IV. The siege of Nineveh — 2:1–13
  - type: text
    content: V. Nineveh’s total destruction — 3:1–19
  - type: text
    content: a. Nineveh’s sins and military aggression are the reason for her fall and utter ruin — 3:1–11
  - type: text
