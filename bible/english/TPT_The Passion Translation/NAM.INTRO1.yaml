  - type: text
    content: 'a. '
  - type: text
    content: Yahweh
  - type: text
    content: ' is a jealous and avenging God, just, slow to anger, and supremely powerful — 1:2–8'
  - type: text
    content: 'b. Plotting against '
  - type: text
    content: Yahweh
  - type: text
    content: ' can never succeed — 1:9–14'
  - type: text
    content: 'III. '
  - type: text
