  - type: text
    content: About the Book of Nahum
  - type: text
    content: 'The Northern Kingdom, with its ten tribes, had been destroyed by Assyria (722 BC) about a century before the writing of Nahum. Judah, with its capital at Jerusalem, home of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s temple, stood alone against Assyria, the “evil empire” of that era. The situation seemed hopeless, but Nahum rebuked Assyria in no uncertain terms and claimed that God’s people would outlive their potent enemy.
  - type: text
    content: 'At the heart of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s condemnation of the Assyrian Kingdom is the gross idolatry practiced by the city of Nineveh. (Note: The terms '
  - type: text
    content: Assyria
  - type: text
    content: ' [nation] and '
  - type: text
    content: Nineveh
  - type: text
    content: ' [capital of Assyria] are often used interchangeably.) It was in response to this stance of profound disdain for the one true and living God that '
  - type: text
    content: Yahweh
  - type: text
    content: ' poured out his anger and judgment on the Assyrians (Nah. 3:5–7).'
  - type: text
    content: Poetically, the little book of Nahum is one of the finest in the Old Testament. Calvin wrote about Nahum in superlative terms. Its descriptions are vivid and distinct. The poetry glows with passionate joy as it contemplates the ruin of cruel and victorious Assyria. Nahum’s writing is full of descriptive power and expressive turns of phrase that the reader can easily understand. In Nahum, Nineveh is an object lesson to the world of God’s sovereign power to judge nations that oppose his vision for how we are to live together; he can and will remove oppressive despots who attempt to bypass his eternal plan for his creation.
  - type: text
    content: 'Nahum and Jonah were the two prophets assigned to speak God’s truth about and to Nineveh. When Jonah prophesied, the people repented, and God spared them from judgment. Nahum came on the scene about one hundred fifty years later at a time when Nineveh had reverted to its old ways and had grown even more oppressive than before, during the apex of Assyrian power. These are Nahum’s spoken prophecies; they could have been collected in written form by him or by a later editor. Some propose that they were collected to celebrate Babylon’s eventual victory over Assyria (612 BC), affirming, after the fact, what Nahum had predicted beforehand: that '
  - type: text
    content: Yahweh
  - type: text
    content: ' would be faithful in bringing Nineveh down. Listed below are some important dates on a timeline that will help readers orient themselves:'
  - type: text
    content: • 722 BC — The fall of the Northern Kingdom of Israel, which thereafter became known as the “ten lost tribes.” Assyrian troops obliterated the nation.
  - type: text
    content: • 701 BC — The Assyrians’ failed attempt to besiege Jerusalem during the reign of Hezekiah (2 Kings 18:13–19:37).
  - type: text
    content: • Between 663 and 661 BC — The battle between Assyria and Thebes in Egypt mentioned in Nahum 3:8–19. The book of Nahum must have been written after this date.
  - type: text
    content: • 640–609 BC — The reign of the reformer King Josiah in Jerusalem.
  - type: text
    content: • Sometime between 661 and 612 BC — The Lord spoke through Nahum.
  - type: text
    content: • 612 BC — The fall of Assyria. Babylonians, Medes, and Persians besieged and razed Nineveh.
  - type: text
    content: • 586 BC — The fall of the Southern Kingdom of Judah. Babylon destroyed Jerusalem and the temple.
  - type: text
    content: Purpose
  - type: text
    content: 'Nahum’s purpose was to encourage the people of Judah to stand firm against their seemingly omnipotent enemy, the Assyrian Empire. '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave Nahum the words that formed a spiritual shield for the people. It is a classic David (Judah) and Goliath (Assyria) rematch. And '
  - type: text
    content: Yahweh
  - type: text
    content: ' is never on the side of the oppressor.'
  - type: text
    content: Then, as a supplement to this overriding purpose, it may be noted that the words and written message of the prophet Nahum were designed to instill into his hearers and readers the certainty that the promises of God will always come to pass. The prophecy also serves as undeniable proof that God will have victory over his enemies, such as the Assyrians. And finally, the prophecy serves as a reminder that God’s characteristics never change, neither those that facilitate blessings nor those that deliver judgment.
  - type: text
    content: Author and Audience
  - type: text
    content: We know nothing about Nahum except that he was from Elkosh. Nahum’s name means “to sigh” (in a positive sense) or “to comfort others.” He was an enthusiastic, optimistic Israelite with strong patriotic tendencies. Nahum was obsessed with rooting out discouragement and defeatism in Jerusalem. Unlike Jeremiah, who took the baton of prophecy from Nahum and dealt with the next generation of issues, Nahum did not look at the internal sins of God’s people but rather only condemned Assyria, outside of Israel.
  - type: text
    content: Nahum understood that courageous, well-spoken words are more powerful than chariots or weapons of iron. Truth spoken forth boldly can rally a nation regardless of terrible odds. Every nation can have its finest hour in the face of a powerful enemy.
  - type: text
    content: 'Nahum was a contemporary of the prophets Joel and Habakkuk, '
  - type: note
    content: See Seder Olam Rabbah 20.
  - type: text
    content: and his life possibly overlapped with Jeremiah’s.
  - type: text
    content: 'Elkosh was perhaps the birthplace, main residence, or burial city of the prophet. There are three or more proposals for the location of Elkosh: in Mesopotamia near present-day Mosul, in Galilee (Capernaum, the Village of Nahum), or perhaps near Eleutheropolis (Semitic: Beth Gabra of Judah), or somewhere else in Judah. There is no scholarly consensus, just educated guesses as to where Elkosh was. Nahum may have been one of the captives of the Assyrians who later died somewhere on the banks of the Tigris River near Nineveh (modern Mosul). Some claim that his tomb is there.'
  - type: note
    content: According to tradition, the synagogue in the town of Alqosh in Iraq houses the tomb of Nahum. This structure is not sound and was temporarily stabilized in 2018. Alqosh is a possible location for Elkosh, the home of the prophet, and lies near modern Mosul.
  - type: text
    content: The audiences for the book of Nahum can be separated into five categories, starting with the people of Judah before the fall of Nineveh. These prophecies were intended to encourage them that their adversary would not always oppress them.
  - type: text
    content: Second, the people of Nineveh. It would be hard to believe that no one in Nineveh knew about the fiery warnings that Nahum spoke against them.
  - type: text
    content: 'Third, the people of Judah after the fall of Nineveh. The words of Nahum could be read aloud at celebrations marking Assyria’s demise, confirming that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had kept his promises.'
  - type: text
    content: 'Fourth, oppressors anytime, anywhere. The example of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s righteous wrath and judgment on the violent, idolatrous, and cruel Assyrians provides a strong warning to anyone who trusts in the militarism of coercive empires. Such cultures should not be lulled to arrogant security because God’s judgment does not immediately punish them. Although '
  - type: text
    content: Yahweh
  - type: text
    content: ' is slow to anger, his just vengeance is inevitable and inescapable.'
  - type: text
    content: The final audience is anyone facing a “Nineveh.” Nahum provides hope for all little nations facing a Nineveh and any David facing a Goliath. We all encounter malevolent forces during the span of our lives, and the words of Nahum remind us that God will always restore his faithful people. Looking at history, the faithful remnant, against staggering odds, has always inherited God’s promises and found creative ways to thrive, flourish, and move forward into new situations. The faithful remnant has never been wiped from the face of the earth—and they never will be.
  - type: text
    content: Major Themes
  - type: text
    content: Divine Judgment Is Inevitable for All Who Oppose
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: ' The continuous human cycle of empire building, overreach, corruption, internal rot, and eventual collapse has repeated countless times in history. Emperors attempt to build a systemic human pyramid of coercion, ignoring the fact that while they can, indeed, physically control people, they cannot control human thought. God is certainly capable of controlling people’s actions, and although he is theoretically able to control human thought, he chooses to allow humankind a freedom of moral decision-making. However, should any people choose to oppose and rebel against him and refuse to change their stance, they will '
  - type: text
    content: inevitably
  - type: text
    content: ' be subject to divine judgment. Human effort and strategies may play a part in preventing despots from “ruling the world,” but only God has the power and authority to thwart such autocratic activity in an absolute sense. While oppressive cultures and empires may persist for a generation or even centuries, God will eventually empower agents of his will to bring about their destruction.'
  - type: text
    content: 'This is true of any human civilization—past, present, or future—and the Assyrians, as represented by the population of Nineveh in Nahum’s day, were no exception. As Jesus said, “All those who embrace violence will die by violence” (Matt. 26:52). The Assyrian Empire was built on naked force and aggression, their violence swallowing up neighbors one at a time. They truly believed they were invincible. God gave to Nahum the prophetic opportunity and mandate to denounce the wicked and idolatrous culture of Assyria and the Ninevites and to threaten divine destruction of that godless empire. Then God brought it to pass. The Assyrian Empire came to a catastrophic, irrevocable, and brutal end. Such will be the fate of all who imagine they can win any struggle against the one true and living God. The language of Nahum’s prophecy is the language of the certainty that God’s judgment would undoubtedly prevail, and nothing the Ninevites did would ever be able to prevent it. '
  - type: text
    content: Yahweh
  - type: text
    content: ' is sovereignly powerful over all his enemies. He cannot be beaten. Nineveh, and all that it represents, will (always) fail.'
  - type: text
    content: Yahweh
  - type: text
    content: ’s Plan of Salvation Is Inevitable.
  - type: text
    content: ' While the book of Nahum is primarily a record of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s plan to pour out a terrifying and devastating judgment upon evildoers, equally important are the few but powerful expressions of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s redemptive grace and promises of deliverance directed toward his people. There are three occasions in the book where this emphasis carries a dramatically powerful impact.
  - type: text
    content: 'In the first instance, Nahum 1:7, after the initial prophetic salvo describing the terrifying impact of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s righteous anger and avenging judgment on his enemies in verses 1–6, the prophet affirmed that '
  - type: text
    content: Yahweh
  - type: text
    content: ' is good, a refuge in times of trouble, and that he cares for those who trust in him. Then Nahum 1:15 contains the iconic prophetic declaration of the coming Messianic Ruler and Deliverer, who comes down from the mountains proclaiming peace and bringing “good news.” The action of “coming . . . to announce good news and to proclaim peace” is an anticipation of the gospel of redemption. Nahum directed this prophecy of hope and salvation explicitly toward the people of Judah, exhorting them to celebrate their festivals and fulfill their vows. They could do so because the destruction of their enemies was a certainty. And finally, Nahum 2:2 records the prophecy that '
  - type: text
    content: Yahweh
  - type: text
    content: ' will “restore the majesty” of the entire Israelite nation.'
  - type: text
    content: Never miss an opportunity to encourage someone with the promises of God’s Word when he or she is going through a rough time. Nahum’s courageous declarations brought hope to a people who felt they had very little reason for any hope at all. Think of the times when someone’s uplifting words to you changed the course of your life. You can be that person for others, over and over. The more difficult the circumstances, the more your words of encouragement have the power to heal and revitalize the weary among us with the reminder that God’s plan of promised forgiveness and redemption for his chosen people will always succeed.
  - type: text
    content: Yahweh
  - type: text
    content: ’s Preservation of His Faithful Remnant Is Inevitable.
  - type: text
    content: ' Why should a tiny, faithful remnant in Jerusalem have any hope against the power of Assyria?'
  - type: text
    content: Nineveh was once the greatest city of the ancient Near East, being one and a half times larger than its rival Babylon and about twice as large as Rome at its greatest extent. It was the great King Sennacherib (705–681 BC) who turned Nineveh into the capital city of Assyria and made it more glorious than any city of his era. His son, Ashurbanipal (669–626 BC), became the last great king of Assyria. He left an extensive library, which archaeologists discovered at Nineveh, to carefully detail the history of Nineveh.
  - type: note
    content: 'See Michael Roaf, Cultural Atlas of Mesopotamia and the Ancient Near East (New York: Facts on File, 1990), 186–91.'
  - type: text
    content: In any age, it might seem like the current trends will continue forever. But that is not true. The path of history can take radical and sudden turns. Just because Assyria may be on top today does not mean that this will always be the case. The one quality that all people of all times have shared with their Creator, which stands out here in opposition to “trends,” is creativity. We are made in God’s image and will always find, with his help, a way out from under attempts at human oppression.
  - type: text
    content: Nahum’s certainty about this deep truth underlies everything he wrote in his magnificent, Spirit-infused rebuke of abusive political and military power.
  - type: text
    content: Seeing Jesus in the Book.
  - type: text
    content: ' There are two explicit prophecies in the book of Nahum that point forward to the climax of God’s redemptive program in the coming of the Messiah, Jesus Christ, God’s Son. These prophecies have already been noted in the previous theme discussions. The following observations supplement that commentary.'
  - type: text
    content: 'In the first instance, Nahum 1:15 makes an unambiguous reference to the coming Messianic Redeemer. He brings good news on his journey through the mountains of Jerusalem and Judah, and he proclaims peace. This prophecy is partially repeated in Isaiah 40:9, in the context of the promise that '
  - type: text
    content: Yahweh
  - type: text
    content: ' will deliver that good news along with his supreme power and authority. He will both exercise his sovereign power and gather his flock like a protective shepherd does, offering his people peace and security wherever they go. Similarly, Isaiah 52:7–10 repeats the Nahum prophecy but this time almost verbatim. And the accompanying context, as in Isaiah 40, likewise promises that '
  - type: text
    content: Yahweh
  - type: text
    content: ' will return to Jerusalem, victorious over his enemies, and bring comfort to his people. Then the nations of the earth will bear witness to the salvation he brings to those who belong to him.'
  - type: text
    content: Romans 10:15 confirms beyond any doubt that the prophecies of Nahum 1:15 and Isaiah 40:9 and 52:7–10 find their ultimate fulfillment in Jesus Christ. Here, the apostle Paul cited the essence of these Old Testament prophecies and explicitly linked them with the gospel ministry of Jesus during his time on earth. Our Lord’s message of salvation was then taken up by his apostolic messengers who proclaimed the gospel—the “good news”—to the world at large. The “precious feet of the messenger coming over the mountains to announce good news” began with the old covenant prophets, who prophetically anticipated the arrival of the climactic stage of God’s plan of redemption. That plan was consummated in the person and work of Jesus Christ and then proclaimed to the whole world by those who obeyed Jesus’ command to take the gospel to the ends of the earth.
  - type: text
    content: In the second instance, Nahum 2:2 provides another specific promise of salvation that is linked to the person of Jesus. This verse predicts the restoration of the entire land of Israel—a prophecy that finds fulfillment in two stages. We see the first of these in the literal, historical return of the people of Judah from their exile in Babylon in 538 BC, around one hundred years after the time of Nahum’s prophetic ministry. While it is true that the reunification and establishment of God’s people were only experienced in an earthly political and cultural sense by the Southern Kingdom of Judah, the second and final stage of the fulfillment of this prophecy began to take place only after Jesus had completed his earthly mission. There is no doubt that the New Testament interprets the manifestation of the worldwide community of the Christian church as the spiritual fulfillment of the nation of Israel in the Old Testament. The church of Jesus Christ—the gathered community of God’s people in the new covenant age—has been initiated, enabled, and empowered by the indwelling Spirit of God in the lives of his people as an ongoing, never-ending spiritual kingdom.
