    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “lord of severity”; that is, the king of Assyria.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: a brutal king will rule over them,” says the sovereign God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
