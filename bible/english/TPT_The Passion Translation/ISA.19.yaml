    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The waters of the sea.” Waters could be viewed as an emblem of life-giving ministries.
    marker-yv: yv-n
  - type: text
    text: will dry up
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the riverbed will become parched and dry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Its canals will become stagnant and stink with rotting reeds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the streams of Egypt will dry up, from a trickle to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
