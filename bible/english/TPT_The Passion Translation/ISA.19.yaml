    - type: text
      text: civil strife
- type: usfm
  marker: q1
  children:
  - type: text
    text: and cause the Egyptians to fight against one another—
- type: usfm
  marker: q1
  children:
  - type: text
    text: one against the other, neighbor against neighbor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: city against city, kingdom against kingdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The spirit of the Egyptians will be in panic,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and I will confuse '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “swallow.” The Hebrew homonym can mean either “confuse” or “swallow.”
    marker-yv: yv-n
  - type: text
    text: their strategies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will seek guidance from their idols
- type: usfm
  marker: q1
  children:
  - type: text
    text: and by the spirits of the dead
- type: usfm
  marker: q1
  children:
  - type: text
    text: and consult with mediums and wizards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
