  - type: text
    text: are nothing but fools,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the wisest of Pharaoh’s counselors gives foolish advice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How in the world can you say to Pharaoh,
- type: usfm
  marker: q1
  children:
  - type: text
