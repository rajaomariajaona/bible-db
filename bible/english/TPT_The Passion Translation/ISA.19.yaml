    text: 'All that is planted '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “All that is planted” could point to the teaching of the Word, sown as seeds into hearts. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
