document_id: ISA.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy concerning Egypt
  - type: text
    content: 'A prophecy concerning Egypt:'
  - type: note
    content: Egypt is a recognized symbol of the world and its temptations and snares.
  - type: text
    content: 'Behold! The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' is riding on a swift-soaring cloud!'
  - type: note
    content: See Deut. 33:26; Pss. 18:9–11; 68:34; 104:3; Isa. 60:8. Clouds can be a metaphor for God’s sons and daughters in glory.
  - type: text
    content: He is on his way to Egypt!
  - type: text
    content: The god-idols of Egypt will tremble at his presence,
  - type: note
    content: See Heb. 12:26–29.
  - type: text
    content: and the hearts of the Egyptians will melt within them!
  '10':
  - type: text
    content: The pillars of Egypt’s foundations will be shattered
  - type: note
    content: The foundations of worldliness (Egypt) will be broken off of our lives. See Ps. 11:3.
  - type: text
    content: and every worker grieved.
  - type: heading
    content: The Wisdom of Egypt Is Foolishness to God
  '11':
  - type: text
    content: 'The elite of Zoan '
  - type: note
    content: That is, her leaders. Zoan, one of the oldest cities in the world, is in lower Egypt, known by the Greeks as Tunis. Zoan means “the place of departure” or “depressed, low region.” (See also v. 13.) In the fields of Zoan Moses worked miracles to prove to Pharaoh that God had sent him to demand the release of the Hebrews from their slavery.
  - type: text
    content: are nothing but fools,
  - type: text
    content: and the wisest of Pharaoh’s counselors gives foolish advice.
  - type: text
    content: How in the world can you say to Pharaoh,
  - type: text
    content: “I am a brilliant sage and a descendant of the ancient kings”?
  - type: note
    content: Or “I am a son of a wise man and a descendent of the [wise] Kedemite kings.”
  '12':
  - type: text
    content: Where, oh where, are all your sages?
  - type: note
    content: See 1 Cor. 1:18–31.
  - type: text
    content: If they’re so wise
  - type: text
    content: ', let them discover and tell you'
  - type: text
    content: 'what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: has planned for Egypt.
  '13':
  - type: text
    content: Zoan’s elite have become utter fools;
  - type: text
    content: the nobles of Memphis are utterly deceived,
  - type: text
    content: and Egypt has been led astray by her tribal chiefs.
  - type: note
    content: Or “cornerstones,” a metaphor for Egypt’s rulers. Egypt was known for its wisdom, but the wisdom of this world (Egypt) has been found empty and vain. Christ is our wisdom (see 1 Cor. 1:30).
  '14':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has mixed up their minds'
  - type: text
    content: and poured into them a distorted spirit
  - type: text
    content: that will make Egypt dizzy and act like a drunk
  - type: text
    content: who staggers around in his own vomit.
  '15':
  - type: text
    content: There is nothing anyone in Egypt can do—
  - type: text
    content: 'neither head nor tail, '
  - type: note
    content: The head represents leaders; the tail, lying prophets. See Isa. 9:14–15.
  - type: text
    content: nor anyone of high or low position.
  - type: note
    content: Or “palm branch or reed,” a metaphor for the “strong or the weak, high or low.”
  '16':
  - type: text
    content: 'In that day, the Egyptians will become like women who tremble in fear '
  - type: note
    content: See Heb. 12:26–29.
  - type: text
    content: 'because the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, shakes his fist '
  - type: note
    content: Or “hand.” The hand with its five fingers can be a metaphor for the five ministries of the Spirit (see Eph. 4:11).
  - type: text
    content: 'at them. '
  '17':
  - type: text
    content: 'The land of Judah will become the dread of the Egyptians. They will quake whenever anybody even mentions it to them, because of what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has in store for them!'
  - type: heading
    content: Divine Grace for Egypt
  '18':
  - type: text
    content: 'In that day, there will be five '
  - type: note
    content: Possibly a figurative number (i.e., the five senses).
  - type: text
    content: 'Egyptian cities that speak the language of Canaan '
  - type: note
    content: That is, they will speak the language (Hb. “lip”) of the people of God—a language of hope, not despair; of love, not hatred; a spiritual language of all that is sacred and holy. See Isa. 50:4; Zeph. 3:9. The Hebrew word for “Canaan” means “to be humbled” or “to bend the knee.” The language of Canaan would be the language of humility.
  - type: text
    content: 'and swear their allegiance to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, and one '
  - type: note
    content: Or “each one.”
  - type: text
    content: will be called the City of the Sun.
  - type: note
    content: Most Hebrew manuscripts have “the City of Destruction,” but the Dead Sea scroll 1QIsaa and a few medieval Hebrew manuscripts, along with the Targum and Vulgate, have “the City of the Sun” (Hierapolis). The other four Egyptian cities could be Leontopolis, Daphne, Migdol, and Memphis.
  '19':
  - type: text
    content: 'In that day, there will be an altar to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' in the middle of Egypt and a sacred monument to honor him on her border. '
  - type: note
    content: There has been conjecture that this “monument” (or “memorial”) may be the Great Pyramid in Egypt and might have been built by Job (Egyptian name Cheops). Job was a grandson of Jacob and a nephew of Joseph, who went into Egypt with the Israelites. He is mentioned in Gen. 46:13 and 1 Chron. 7:1 as Jashub or, in the Masoretic text, Job. Others view this as a future monument built to glorify God.
  '2':
  - type: text
    content: '“I will stir up '
  - type: text
    content: civil strife
  - type: text
    content: and cause the Egyptians to fight against one another—
  - type: text
    content: one against the other, neighbor against neighbor,
  - type: text
    content: city against city, kingdom against kingdom.
  '20':
  - type: text
    content: 'It will be a sign and a visible reminder in the land of Egypt of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. And they will cry out to him when they are oppressed, and he will send a mighty deliverer '
  - type: note
    content: Or “savior.”
  - type: text
    content: and champion to their rescue!
  - type: note
    content: If God responds to the prayers of the “Egyptians” (worldly people), how much more will he rescue his own people? See 2 Chron. 6:32–33; James 4:10.
  '21':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will reveal to them who he really is, and the Egyptians will know him '
  - type: text
    content: intimately
  - type: text
    content: '. They will worship him with sacrifices and burnt offerings. They will make vows to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', and they will keep them.'
  - type: note
    content: In response to the plagues (see Ex. 7–10), Pharaoh promised to let the children of Israel go but then took back that promise. Isaiah proclaims that this spirit of broken promises will be removed from Egypt.
  '22':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will wound the Egyptians, but '
  - type: text
    content: when they turn back to him
  - type: text
    content: ', he will heal them. '
  - type: text
    content: Yes
  - type: text
    content: ', the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will listen to their hearts’ cry, and he will heal and restore them.'
  '23':
  - type: text
    content: 'In that day there will be a highway all the way from Egypt to Assyria. '
  - type: note
    content: The ancient Assyrian empire would include parts of northern Iraq, northwestern Iran, and southeastern Turkey.
  - type: text
    content: Like long-lost brothers
  - type: text
    content: ', the Egyptians and the Assyrians will be joined together and they will worship and serve the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '! And in that day, Israel will become the third partner with Egypt and Assyria as a blessing to all the earth. For the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, will bless them, saying, “Blessed be Egypt, my people! Blessed be Assyria, my handiwork! And blessed be Israel, my inheritance!”'
  '3':
  - type: text
    content: The spirit of the Egyptians will be in panic,
  - type: text
    content: 'and I will confuse '
  - type: note
    content: Or “swallow.” The Hebrew homonym can mean either “confuse” or “swallow.”
  - type: text
    content: their strategies.
  - type: text
    content: They will seek guidance from their idols
  - type: text
    content: and by the spirits of the dead
  - type: text
    content: and consult with mediums and wizards.
  '4':
  - type: text
    content: I will give over the Egyptians into the hands of a cruel master;
  - type: note
    content: Or “lord of severity”; that is, the king of Assyria.
  - type: text
    content: a brutal king will rule over them,” says the sovereign God,
  - type: text
    content: 'the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '5':
  - type: text
    content: 'The Nile delta '
  - type: note
    content: Or “The waters of the sea.” Waters could be viewed as an emblem of life-giving ministries.
  - type: text
    content: will dry up
  - type: text
    content: and the riverbed will become parched and dry.
  '6':
  - type: text
    content: Its canals will become stagnant and stink with rotting reeds,
  - type: text
    content: and the streams of Egypt will dry up, from a trickle to nothing.
  '7':
  - type: text
    content: 'All that is planted '
  - type: note
    content: “All that is planted” could point to the teaching of the Word, sown as seeds into hearts. See Matt. 13:19–23.
  - type: text
    content: by the mouth of the river will dry up,
  - type: text
    content: and the fields along the brooks will wither
  - type: text
    content: and turn to dust blown away by the wind.
  - type: note
    content: See Ps. 1:4.
  '8':
  - type: text
    content: 'Fishermen '
  - type: note
    content: Fishermen can be seen as evangelists. See Matt. 4:18–19.
  - type: text
    content: will mourn. All who cast a fishhook into the river
  - type: text
    content: and those who cast their nets will catch nothing.
  '9':
  - type: text
    content: 'Those who make clothing from combed flax '
  - type: note
    content: Flax was arduously combed to produce linen.
  - type: text
    content: will despair,
  - type: text
    content: and the weavers of linen will be distressed.
  - type: note
    content: Or “become pale [white].” See Isa. 38:12.
