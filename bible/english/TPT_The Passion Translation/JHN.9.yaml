document_id: JHN.9,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Healed a Man Born Blind
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Afterward, as Jesus walked down the street, he noticed a man blind from birth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Finally, they asked him, “What has happened to you?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He replied, “I met the man named Jesus! He rubbed clay on my eyes and said, ‘Go to the pool named Siloam and wash.’ So I went and while I was washing the clay from my eyes I began to see '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for the very first time ever
    - type: text
      text: '!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: So the people of the neighborhood inquired, “Where is this man?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I have no idea.” the man replied.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So the people marched him over to the Pharisees to speak with them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They were concerned because the miracle Jesus performed by making clay with his saliva and anointing the man’s eyes happened on a Sabbath day, a day that no one was allowed to “work.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Then the Pharisees asked the man, “How did you have your sight restored?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “A man anointed my eyes with clay, then I washed, and now I can see for the first time in my life!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Then an argument broke out among the Pharisees over the healing of the blind man on the Sabbath. Some said, “This man who performed this healing is clearly not from God! He doesn’t even observe the Sabbath!” Others said, “If Jesus is just an ordinary sinner, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a sinning man.”
      marker-yv: yv-n
    - type: text
      text: how could he perform a miracle like that?”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: This prompted them to turn on the man healed of blindness, putting him on the spot in front of them all, demanding an answer. They asked, “Who do you say he is—this man who opened your blind eyes?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “He’s a prophet of God!” the man replied.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Still refusing to believe that the man had been healed and was truly blind from birth, the Jewish leaders called for the man’s parents to be brought to them.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: So they asked his parents, “Is this your son?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” they answered.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Was he really born blind?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, he was,” they replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they pressed his parents to answer, “Then how is it that he’s now seeing?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: His disciples asked him, “Teacher, whose sin caused this guy’s blindness, his own, or the sin of his parents?”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“We have no idea,” they answered. “We don’t know what happened to our son. Ask him, he’s a mature adult. He can speak for himself.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '(Now the parents were obviously intimidated by the Jewish religious leaders, for they had already announced to the people that if anyone publicly confessed Jesus as the Messiah, they would be excommunicated. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: That’s why they told them, “Ask him, he’s a mature adult. He can speak for himself.”)
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So once again they summoned the man who was healed of blindness and said to him, “Swear to God to tell us the truth! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Give glory to God.” This has been interpreted by some as an idiomatic saying, which would put the man under oath to testify to the truth.
      marker-yv: yv-n
    - type: text
      text: We know the man who healed you is a sinful man! Do you agree?”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The healed man replied, “I have no idea what kind of man he is. All I know is that I was blind and now I can see for the first time in my life!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “But what did he do to you?” they asked. “How did he heal you?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The man responded, “I told you once and you didn’t listen to me. Why do you make me repeat it? Are you wanting to be his followers too?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'This angered the Jewish leaders. They heaped insults on him, “We can tell you are one of his followers—now we know it! We are true followers of Moses, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: for we know that God spoke to Moses directly. But as for this one, we don’t know where he’s coming from!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Neither. It happened to him so that you could watch him experience God’s miracle.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“Well, what a surprise this is!” the man said. “You don’t even know where he comes from, but he healed my eyes and now I can see! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'We know that God doesn’t listen to sinners, but only to godly people who do his will. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Yet who has ever heard of a man born blind that was healed and given his eyesight for the very first time? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: I tell you, if this man isn’t from God, he wouldn’t be able to heal me like he has!”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Some of the Jewish leaders were enraged and said, “Just who do you think you are to lecture us! You were born a blind, filthy sinner!” So they threw the man out in the street.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'When Jesus learned they had thrown him out, he went to find him and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you believe in the Son of God?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a common title of the Lord Jesus in the book of John. Although there are many reliable Greek manuscripts that have “the Son of Man,” the Aramaic and a few early Greek manuscripts have “the Son of Elohim [God].”
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: The man whose blind eyes were healed answered, “Who is he, Master? Tell me so that I can place all my faith in him.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You’re looking right at him. He’s speaking with you. It’s me, the one in front of you now.”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Then the man threw himself at his feet and worshiped Jesus and said, “Lord, I believe in you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although this man had never been able to read the Scriptures, he had faith in Jesus. Traditions and superficial knowledge of the Bible can actually blind our hearts if we do not believe in Jesus above all other religious dogmas. Many of those who knew the Scriptures refused to believe. The miracle of blind eyes opening is proof that God had come to us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 35:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'And Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have come to judge those who think they see and make them blind. And for those who are blind, I have come to make them see.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: While I am with you, it is daytime and we must do the works of God who sent me while the light shines.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A possible translation of vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be, “Jesus answered, ‘This man didn’t sin, nor did his parents; but, that the works of God might be revealed in him. I must work the works of him who sent me while it is day. The night is coming, when no man can work’ ” (WEB translation).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For there is coming a dark night when no one will be able to work.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “The One who sent me is the day, and we must do his works. But the night (of mankind) will follow when no work can be accomplished.”
      marker-yv: yv-n
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Some of the Pharisees were standing nearby and overheard these words. They interrupted Jesus and said, “You mean to tell us that we are blind?”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jesus told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you would acknowledge your blindness, then your sin would be removed. But now that you claim to see, your sin remains with you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your sin stands” (rises up).
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As long as I am with you my life is the light that pierces the world’s darkness.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then Jesus spat on the ground and made some clay with his saliva. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: John has left us a book of pictures. The picture here is the mingling of spit and clay, a picture of the Christ who is God and man. The saliva comes from the mouth, the spoken Word, God incarnate. The clay is always a picture of man, for our human vessel is a jar of clay. No doubt, the blind man had heard people spit as they walked by him, as a sign of disgust, for in that day they believed blindness was caused by a curse (
      - type: text
        text: Deut. 28:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). But this day, as he heard Jesus spit on the ground, it was for his healing.
      marker-yv: yv-n
    - type: text
      text: 'Then he anointed the blind man’s eyes with the clay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And he said to the blind man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now go and wash the clay from your eyes in the ritual pool of Siloam.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the pool of apostleship.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Siloam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a Hebrew word that means “to be sent” or “to be commissioned”—the Greek word for “apostle” or “apostleship” is the closest meaning. The apostle of our faith is the Lord Jesus Christ who was sent from the Father. To wash in the Pool of Apostleship is to recognize the healing that flows from the One who was sent from heaven.
      marker-yv: yv-n
    - type: text
      text: So he went and washed his face and as he came back, he could see for the first time in his life!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the context of Jesus’ teaching on the light of the world and mankind being in the dark, this miracle of giving sight to the blind man is a powerful proof of Jesus’ words. Christ, in his birth, became a man of clay. When he applies this clay over our eyes and we wash in the water of his Word, our spiritual sight is restored.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'This caused quite a stir among the people of the neighborhood, for they noticed the blind beggar was now seeing! They began to say to one another, “Isn’t this the blind man who once sat and begged?” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Some said, “No, it can’t be him!” Others said, “But it looks just like him—it has to be him!” All the while the man kept insisting, “I’m the man who was blind!”
