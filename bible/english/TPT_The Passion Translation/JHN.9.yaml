document_id: JHN.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Healed a Man Born Blind
  - type: text
    content: 'Afterward, as Jesus walked down the street, he noticed a man blind from birth. '
  '10':
  - type: text
    content: Finally, they asked him, “What has happened to you?”
  '11':
  - type: text
    content: 'He replied, “I met the man named Jesus! He rubbed clay on my eyes and said, ‘Go to the pool named Siloam and wash.’ So I went and while I was washing the clay from my eyes I began to see '
  - type: text
    content: for the very first time ever
  - type: text
    content: '!”'
  - type: note
    content: See also vv. 7, 16.
  '12':
  - type: text
    content: So the people of the neighborhood inquired, “Where is this man?”
  - type: text
    content: “I have no idea.” the man replied.
  '13':
  - type: text
    content: 'So the people marched him over to the Pharisees to speak with them. '
  '14':
  - type: text
    content: They were concerned because the miracle Jesus performed by making clay with his saliva and anointing the man’s eyes happened on a Sabbath day, a day that no one was allowed to “work.”
  '15':
  - type: text
    content: Then the Pharisees asked the man, “How did you have your sight restored?”
  - type: text
    content: He replied, “A man anointed my eyes with clay, then I washed, and now I can see for the first time in my life!”
  '16':
  - type: text
    content: 'Then an argument broke out among the Pharisees over the healing of the blind man on the Sabbath. Some said, “This man who performed this healing is clearly not from God! He doesn’t even observe the Sabbath!” Others said, “If Jesus is just an ordinary sinner, '
  - type: note
    content: Or “a sinning man.”
  - type: text
    content: how could he perform a miracle like that?”
  '17':
  - type: text
    content: This prompted them to turn on the man healed of blindness, putting him on the spot in front of them all, demanding an answer. They asked, “Who do you say he is—this man who opened your blind eyes?”
  - type: text
    content: “He’s a prophet of God!” the man replied.
  '18':
  - type: text
    content: Still refusing to believe that the man had been healed and was truly blind from birth, the Jewish leaders called for the man’s parents to be brought to them.
  '19':
  - type: text
    content: So they asked his parents, “Is this your son?”
  - type: text
    content: “Yes,” they answered.
  - type: text
    content: “Was he really born blind?”
  - type: text
    content: “Yes, he was,” they replied.
  - type: text
    content: So they pressed his parents to answer, “Then how is it that he’s now seeing?”
  '2':
  - type: text
    content: His disciples asked him, “Teacher, whose sin caused this guy’s blindness, his own, or the sin of his parents?”
  '21':
  - type: text
    content: '“We have no idea,” they answered. “We don’t know what happened to our son. Ask him, he’s a mature adult. He can speak for himself.” '
  '22':
  - type: text
    content: '(Now the parents were obviously intimidated by the Jewish religious leaders, for they had already announced to the people that if anyone publicly confessed Jesus as the Messiah, they would be excommunicated. '
  '23':
  - type: text
    content: That’s why they told them, “Ask him, he’s a mature adult. He can speak for himself.”)
  '24':
  - type: text
    content: 'So once again they summoned the man who was healed of blindness and said to him, “Swear to God to tell us the truth! '
  - type: note
    content: Or “Give glory to God.” This has been interpreted by some as an idiomatic saying, which would put the man under oath to testify to the truth.
  - type: text
    content: We know the man who healed you is a sinful man! Do you agree?”
  '25':
  - type: text
    content: The healed man replied, “I have no idea what kind of man he is. All I know is that I was blind and now I can see for the first time in my life!”
  '26':
  - type: text
    content: “But what did he do to you?” they asked. “How did he heal you?”
  '27':
  - type: text
    content: The man responded, “I told you once and you didn’t listen to me. Why do you make me repeat it? Are you wanting to be his followers too?”
  '28':
  - type: text
    content: 'This angered the Jewish leaders. They heaped insults on him, “We can tell you are one of his followers—now we know it! We are true followers of Moses, '
  '29':
  - type: text
    content: for we know that God spoke to Moses directly. But as for this one, we don’t know where he’s coming from!”
  '3':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Neither. It happened to him so that you could watch him experience God’s miracle.
  - type: text
    content: ' '
  '30':
  - type: text
    content: '“Well, what a surprise this is!” the man said. “You don’t even know where he comes from, but he healed my eyes and now I can see! '
  '31':
  - type: text
    content: 'We know that God doesn’t listen to sinners, but only to godly people who do his will. '
  '32':
  - type: text
    content: 'Yet who has ever heard of a man born blind that was healed and given his eyesight for the very first time? '
  '33':
  - type: text
    content: I tell you, if this man isn’t from God, he wouldn’t be able to heal me like he has!”
  '34':
  - type: text
    content: Some of the Jewish leaders were enraged and said, “Just who do you think you are to lecture us! You were born a blind, filthy sinner!” So they threw the man out in the street.
  '35':
  - type: text
    content: 'When Jesus learned they had thrown him out, he went to find him and said to him, '
  - type: text
    content: “Do you believe in the Son of God?”
  - type: note
    content: This is a common title of the Lord Jesus in the book of John. Although there are many reliable Greek manuscripts that have “the Son of Man,” the Aramaic and a few early Greek manuscripts have “the Son of Elohim [God].”
  '36':
  - type: text
    content: The man whose blind eyes were healed answered, “Who is he, Master? Tell me so that I can place all my faith in him.”
  '37':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You’re looking right at him. He’s speaking with you. It’s me, the one in front of you now.”
  '38':
  - type: text
    content: Then the man threw himself at his feet and worshiped Jesus and said, “Lord, I believe in you!”
  - type: note
    content: Although this man had never been able to read the Scriptures, he had faith in Jesus. Traditions and superficial knowledge of the Bible can actually blind our hearts if we do not believe in Jesus above all other religious dogmas. Many of those who knew the Scriptures refused to believe. The miracle of blind eyes opening is proof that God had come to us. See Isa. 35:4–5.
  '39':
  - type: text
    content: 'And Jesus said, '
  - type: text
    content: “I have come to judge those who think they see and make them blind. And for those who are blind, I have come to make them see.”
  '4':
  - type: text
    content: While I am with you, it is daytime and we must do the works of God who sent me while the light shines.
  - type: text
    content: ' '
  - type: note
    content: A possible translation of vv. 4–5 can be, “Jesus answered, ‘This man didn’t sin, nor did his parents; but, that the works of God might be revealed in him. I must work the works of him who sent me while it is day. The night is coming, when no man can work’ ” (WEB translation).
  - type: text
    content: For there is coming a dark night when no one will be able to work.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can be translated “The One who sent me is the day, and we must do his works. But the night (of mankind) will follow when no work can be accomplished.”
  '40':
  - type: text
    content: Some of the Pharisees were standing nearby and overheard these words. They interrupted Jesus and said, “You mean to tell us that we are blind?”
  '41':
  - type: text
    content: 'Jesus told them, '
  - type: text
    content: “If you would acknowledge your blindness, then your sin would be removed. But now that you claim to see, your sin remains with you!”
  - type: note
    content: Or “your sin stands” (rises up).
  '5':
  - type: text
    content: As long as I am with you my life is the light that pierces the world’s darkness.”
  '6':
  - type: text
    content: 'Then Jesus spat on the ground and made some clay with his saliva. '
  - type: note
    content: John has left us a book of pictures. The picture here is the mingling of spit and clay, a picture of the Christ who is God and man. The saliva comes from the mouth, the spoken Word, God incarnate. The clay is always a picture of man, for our human vessel is a jar of clay. No doubt, the blind man had heard people spit as they walked by him, as a sign of disgust, for in that day they believed blindness was caused by a curse (Deut. 28:28). But this day, as he heard Jesus spit on the ground, it was for his healing.
  - type: text
    content: 'Then he anointed the blind man’s eyes with the clay. '
  '7':
  - type: text
    content: 'And he said to the blind man, '
  - type: text
    content: “Now go and wash the clay from your eyes in the ritual pool of Siloam.”
  - type: text
    content: ' '
  - type: note
    content: Or “the pool of apostleship.” Siloam is a Hebrew word that means “to be sent” or “to be commissioned”—the Greek word for “apostle” or “apostleship” is the closest meaning. The apostle of our faith is the Lord Jesus Christ who was sent from the Father. To wash in the Pool of Apostleship is to recognize the healing that flows from the One who was sent from heaven.
  - type: text
    content: So he went and washed his face and as he came back, he could see for the first time in his life!
  - type: note
    content: In the context of Jesus’ teaching on the light of the world and mankind being in the dark, this miracle of giving sight to the blind man is a powerful proof of Jesus’ words. Christ, in his birth, became a man of clay. When he applies this clay over our eyes and we wash in the water of his Word, our spiritual sight is restored.
  '8':
  - type: text
    content: 'This caused quite a stir among the people of the neighborhood, for they noticed the blind beggar was now seeing! They began to say to one another, “Isn’t this the blind man who once sat and begged?” '
  '9':
  - type: text
    content: Some said, “No, it can’t be him!” Others said, “But it looks just like him—it has to be him!” All the while the man kept insisting, “I’m the man who was blind!”
