  - type: text
    content: About 2 Corinthians
  - type: text
    content: You are about to read a book written by a man who suffered for the cause of Christ, a man who knew trouble and how to overcome in victory. In 2 Corinthians you’ll find a letter written by an apostle to a church that he planted—a church that needed a father’s advice. In many ways, this letter serves as an apostolic manual for the body of Christ, replete with supernatural encounters, glory, love, and truth. This book is full of spiritual encouragement and revelation!
  - type: text
    content: The church of Corinth had already received at least one prior letter from Paul. What we have in our New Testament as 1 Corinthians was Paul’s second letter, making 2 Corinthians his third. The church had received Paul’s rebuke in his prior letters, and now they were tender, open, and ready to receive all that their spiritual father had to impart. Although influenced by those who had claimed to be “super-apostles,” their hearts were bound in love to Paul and the grace of God that was upon him.
  - type: text
    content: How the church today needs the truth and love from this anointed apostle! As you read, picture yourself in the congregation in Corinth, hearing the letter read publicly. Let its truth penetrate your heart and stir you, as a new creation, to a greater passion to follow Jesus. Here you will find the wonderful secrets Paul learned about how to turn troubles into triumph. May you find more than you expected as you read through 2 Corinthians. Enjoy!
  - type: text
    content: Purpose
  - type: text
    content: Paul’s letter to the church of Corinth is one of his most personal letters. In it, he wrote to defend his apostleship in the face of rival “super-apostles,” as he called them, who were threatening the spiritual ground Paul had so carefully, paternally tilled. In defending his ministry Paul wrote to address a deeper issue with the Corinthian believers. He clarified how the gospel should impact every ounce of their lives, encouraging them to stay faithful to the truth and love that had been deposited in their hearts.
  - type: text
    content: One truth the Corinthians had not yet grasped, which informed the purpose behind this letter, was their inability to fully embrace the scandal of the cross. The glory of the cross is the glory of the one who was crucified upon it. They had neglected to appreciate the self-suffering nature of the cross-centered life. So Paul passionately pointed to the glory that lies ahead, especially in the midst of weakness and suffering, stirring them to keep their eyes on the prize. What wonderful insights fill the pages of this letter, magnifying the majesty of Christ, which shatters the darkness, reconciles the lost, and recreates us anew!
  - type: text
    content: Author and Audience
  - type: text
    content: 'Paul wrote this letter to a needy congregation in the Roman city of Corinth to bring them comfort, wisdom, and insight. Many believe that this letter is actually a compilation of two: a so-called “tearful” letter that makes up the ending (chs. 10–13), which was possibly sent before the main “reconciliation” letter (chs. 1–9). Apparently, a number of people had infiltrated the church of Corinth and challenged Paul’s apostolic credentials and the gospel he preached, which had bearing on what they believed.'
  - type: text
    content: In this letter, we get a glimpse into Paul’s own trials and the path of continual triumph that he discovered. He opens his heart to us in this book, sharing his deep emotions, perhaps more here than in any of his other writings. We learn of the magnitude of his sufferings as he informs us of the trials he experienced, which informed his understanding of the gospel. As a minister of reconciliation, Paul brings tremendous energy to the church through his letters. He is a true hero of the faith!
  - type: text
    content: Major Themes
  - type: text
    content: The Incarnation and Crucifixion of Christ.
  - type: text
    content: ' One of the major themes of this letter is the incarnate presence of Christ on earth. As Paul wrote, “Although he was infinitely rich, he impoverished himself for our sake” (8:9). Christ’s coming and condescension to our lives reveals his “gentleness and self-forgetfulness” (10:1), but Christ is also clearly God (1:2). Christ’s incarnation wasn’t meaningless; there was a purpose to his impoverishment.'
  - type: text
    content: 'The Son of God came to earth “so that by his poverty, we could become rich beyond measure” (8:9). Jesus, who knew no sin, became sin for us, “so that we '
  - type: text
    content: who did not know righteousness
  - type: text
    content: ' might become the righteousness of God through our union with him” (5:21). He was “crucified as a ‘weakling,’ ” (13:4) yet he “now lives again” (5:15). Because he was, and because he does, “All that is related to the old order has vanished. Behold, everything is fresh and new” (5:17).'
  - type: text
    content: The Call of the Gospel.
  - type: text
    content: ' One of the clearest descriptions of the gospel’s call on our lives is found in 5:18, “God has made all things new, and reconciled us to himself.” Paul opens up the mystery of our being made right with God through the finished work of Christ on the cross. This call has gone out from God into the hearts of all his lovers: “Turn back to God and be reconciled to him.” (5:20).'
  - type: text
    content: This gospel call is also heard in and through the ministry that God has entrusted to us, “the ministry of opening the door of reconciliation to God” (5:19). Amazingly, we are all “ambassadors of the Anointed One who carry the message of Christ to the world” (5:20). Through our words and deeds, it’s “as though God were tenderly pleading with them directly through our lips” (5:20). Our motivation is to honor God and love Christ, while petitioning people on Christ’s behalf to turn back to God and be made new.
  - type: text
    content: Christian Ministry.
  - type: text
    content: ' This letter is one of Paul’s most personal, because in it he exhibits the characteristics of a spiritual father who has been entrusted by God as a caretaker of his children. From the beginning he roots the compassion and comfort he passes along to others in God himself (1:3). His generosity as a laborer on behalf of the Corinthians flows from God’s own generous hand (chs. 8–9). Paul is paternally devoted to his children, so much so that he feels their weaknesses and burns with zeal for their restoration (11:29). Like all parents, Paul’s affection was clear: he was willing to “gladly spend all that I have and all that I am for you” (12:15). In many ways Paul outlines a theology of pastoral service that should be modeled and adopted by all ministers of the gospel.'
  - type: text
    content: The Christian Life.
  - type: text
    content: ' At the center of Paul’s letter is a strong call to live a life of holiness; the Christian life is a holy life. He tells us not to “team up with unbelievers in mismatched alliances” (6:14). Which doesn’t mean that we are to avoid befriending the world, but to avoid living like the world. We are to “come out from among them and be separate” (6:17). Holy living is deliberate living, for as Christians, we are called to “remove everything from our lives that contaminates body and spirit” and develop holiness within us (7:1).'
  - type: text
    content: Another aspect of the Christian life Paul addresses is the paradox of our Christian existence. We are comforted, yet afflicted; we are secure, yet we suffer; we are both strong and weak; we experience joy and sorrow; we die yet live. God “comes alongside us to comfort us in every suffering” (1:4). When we are at our weakest, we “sense more deeply the mighty power of Christ living in me” (12:9). And though “we continually share in the death of Jesus,” his “resurrection life . . . will be revealed through our humanity” (4:10).
  - type: text
    content: Christian Generosity.
  - type: text
    content: ' One aspect of Christian living that Paul highlighted is that of generosity. During his apostolic ministry, Paul spent a good amount of energy over the course of five years collecting resources for “the poor among the holy believers in Jerusalem” (Rom. 15:26). In this letter Paul made one more appeal to the church of Corinth. He attempted to stir them to greater love by issuing a challenge of generous giving. He compared Christian generosity to the “extravagant grace of our Lord Jesus Christ” (8:9). It is an “act of worship” (8:11) and maintains “a fair balance” (8:14) between believers. Christian generosity should “flow from your heart, not from a sense of religious duty” (9:7) and should be marked by enthusiasm and “joy,” because “God loves hilarious generosity” (9:7).'
