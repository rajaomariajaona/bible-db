document_id: EZK.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Feeds Ezekiel a Scroll
  - type: text
    content: 'He said to me, “Son of man, eat what you see in front of you; eat this scroll, then go and speak to the people of Israel.” '
  '10':
  - type: text
    content: 'Then he said, “Son of man, listen carefully and take to heart everything I say to you, '
  '11':
  - type: text
    content: 'then go to the Jews in exile and say to them, ‘Listen to what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says,’ whether they listen or not.”'
  - type: heading
    content: Ezekiel’s Second Vision of the Glory of God
  '12':
  - type: text
    content: 'Then the Spirit lifted me up, and behind me '
  - type: note
    content: See Isa. 30:21; Rev. 1:10.
  - type: text
    content: 'I heard a loud, thunderous voice: '
  - type: note
    content: Or “sound.” It is possible that the expression of praise for the glory of God was the sound of the voices of the living creatures in the vision—a declaration that may be understood here as an interpretive insertion of heavenly praise as the prophet is in the process of a Spirit-enabled transport. Verse 13 would then begin as a continuation of the experience of this remarkable sound of the living creatures’ wings.
  - type: text
    content: '“Blessed be the glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ' in his sanctuary!” '
  - type: note
    content: Or “from his place.”
  '13':
  - type: text
    content: I heard
  - type: text
    content: ' the sound of the living creatures as their wings kissed each other and the sound of the rumbling wheels beside them, like the sound of a great earthquake. '
  '14':
  - type: text
    content: 'The Spirit lifted me up and took me away. '
  - type: note
    content: Ezekiel became the embodiment of the chariot. As the Spirit directed the chariot, so now he directed Ezekiel. Ezekiel flew as did the chariot. As the chariot appeared at the River Chebar, so now Ezekiel appeared before the exiles at Tel Abib (see v. 15; not to be confused with modern Tel Aviv).
  - type: text
    content: 'I went in the heat of my spirit, '
  - type: note
    content: Or “I went bitterly in the anger of my spirit” or “in bitterness and the anger of my spirit.” Some commentators say that Ezekiel was angry over the message he was given to preach, others state that he was annoyed because he was being taken forcefully by the hand of God, and yet others believe he was angry with the righteous anger of God because of the sins of his people.
  - type: text
    content: 'and the hand of '
  - type: text
    content: Yahweh
  - type: text
    content: ' rested powerfully upon me. '
  '15':
  - type: text
    content: 'The '
  - type: text
    content: Spirit
  - type: text
    content: ' took me to Tel Abib, the very place where the Jewish exiles were living beside the River Chebar. I remained there with them for a week, '
  - type: note
    content: This was a part of the ordination of Ezekiel. After a priest received his ordination, he was to withdraw from the public and stand watch at the doorway of the tabernacle for seven days as a test. Afterward, the priest would receive his ministry instruction and be assigned to his tasks. See Lev. 8:34–35. This same pattern is seen with Ezekiel, as he first received his ordination (1:1–3:11), and then God told him the essence of his task (3:16–7:27).
  - type: text
    content: dumbfounded
  - type: text
    content: ' and overwhelmed '
  - type: note
    content: Ezekiel was devastated by the vision of glory he witnessed. The word overwhelmed is used in a physical sense of the destruction and devastation of a city. Clearly, Ezekiel was in a state of shock or in a stupor.
  - type: text
    content: by what I had seen and heard
  - type: text
    content: .
  - type: heading
    content: Ezekiel Appointed as a Watchman
  '16':
  - type: text
    content: 'Afterward, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke the following words to me: '
  '17':
  - type: text
    content: '“Son of man, I am appointing you as a watchman '
  - type: note
    content: Or “a lookout,” which in the Hebrew means “one who leans forward to peer into the distance.” The primary purpose of the watchman was to look for the dawning day, not the dark night.
  - type: text
    content: 'for the people of Israel. When you hear me speak to you, give them my warning. '
  - type: note
    content: The Hebrew word for “warning” means “to gleam,” “to shine upon,” or “to enlighten [by caution].”
  '18':
  - type: text
    content: 'If I say to wicked people, ‘You are headed toward certain death,’ and you fail to give them warning by not speaking up to warn the evil ones against their evil courses so as to keep them alive, then the wicked ones will die for their sinful deeds. But I will hold you responsible for their deaths. '
  - type: note
    content: Or “the blood I will require at your hand,” a figure of speech denoting responsibility for the person’s death. See v. 20; 18:13; 33:6–8; 34:10; Acts 18:6; 20:26.
  '19':
  - type: text
    content: 'But if you do warn the wicked and they keep sinning anyway, they’ll most certainly die for their sin, but you won’t die. You’ll have saved your life. '
  '2':
  - type: text
    content: 'So I opened my mouth, and he fed me the scroll, '
  '20':
  - type: text
    content: 'And if righteous people turn away from righteous living and pursue a life of sin, '
  - type: note
    content: Or “commit iniquity [injustice].”
  - type: text
    content: 'I will set calamities '
  - type: note
    content: Although the Hebrew is “stumbling blocks,” its meaning is better conveyed as “calamities.” God does not set stumbling blocks in order to lead one into sin but calamities that will cause a person’s downfall. Calamity expresses the meaning more accurately in the context of Jer. 6:21 as well. God will put the sinner in a dangerous situation to cause them to repent.
  - type: text
    content: 'before them, and they will die. Because you did not give them warning, they will die for their sinful deeds, and all the righteous deeds done earlier in life will not be remembered. But I will hold you responsible for their deaths. '
  '21':
  - type: text
    content: If, however, you do warn a righteous person not to sin and he responds to your warning, that person will live, and you will have also saved your life.”
  - type: heading
    content: Ezekiel’s Third Vision of Yahweh’s Glory
  '22':
  - type: text
    content: 'While I was there, '
  - type: text
    content: Yahweh
  - type: text
    content: ' seized me with his power, '
  - type: note
    content: Or “the hand of Yahweh came upon me.” Yahweh’s power completely took control of Ezekiel. God’s hand can be a symbol for God’s powerful presence, authority, or supernatural influence. Ezekiel uses this symbolic language seven times in association with God speaking with him or giving Ezekiel a vision. See 1:1–3; 3:14; 8:1; 33:22; 37:1; 40:1.
  - type: text
    content: 'and he said to me, “Stand up, go out into the valley, and I will speak with you there.” '
  '23':
  - type: text
    content: 'So I got up and went down into the valley and behold, the '
  - type: text
    content: awesome
  - type: text
    content: ' glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ' manifested '
  - type: text
    content: in front of me
  - type: text
    content: '! It was like the vision of glory I had seen by the River Chebar, and I fell facedown. '
  '24':
  - type: text
    content: 'Then the Spirit '
  - type: note
    content: That is, “the Spirit of prophecy.”
  - type: text
    content: 'flowed into me and set me on my feet. And I heard him say to me: “Go home and shut the door behind you. '
  '25':
  - type: text
    content: 'Behold! Son of man, you are about to be tied up with ropes '
  - type: note
    content: The early Aramaic translation, the Targum, understood this as a metaphor, “I impose my word upon you, as restraining as a prisoner’s chains.” However, scholarly opinion is divided on whether Ezekiel’s binding here is literal or figurative. It is very significant to note that in chs. 4–5, Ezekiel is given a number of vivid, graphic actions to perform in public, with a powerful spiritual message accompanying them. Given this context, it is much more likely than not that Ezekiel’s binding with ropes toward the end of ch. 3 was a literal experience.
  - type: text
    content: 'and confined to your house and unable to mingle among the people. '
  '26':
  - type: text
    content: 'And I am going to make your tongue stick to the roof of your mouth; '
  - type: note
    content: That is, God was going to bind Ezekiel’s tongue. Once again, Ezekiel became a prophetic sign to his people. The only message he could give would be the message God gave him.
  - type: text
    content: 'you will be mute and unable to speak to rebuke '
  - type: note
    content: Or “unable to be a reprover [a man of reproof].”
  - type: text
    content: 'this rebellious people. '
  '27':
  - type: text
    content: 'But whenever I want to speak through you, I will give you back the power of speech. And then you will say to them, ‘This is what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: If you have '
  - type: text
    content: a heart
  - type: text
    content: ' to hear, then hear! If you refuse to listen, then so be it!’—for they are a tribe of rebels.”'
  '3':
  - type: text
    content: 'saying, “Son of man, eat this scroll I am giving to you and fill your belly with it.” '
  - type: note
    content: By eating the scroll, Ezekiel was accepting, absorbing, and digesting its contents as God’s message for the people. This was a symbolic way of placing Yahweh’s message inside his prophet (see Jer. 15:16; Rev. 10:9). Eating the scroll would mean Ezekiel would become the message, not just deliver it. Isaiah’s lips were touched with the burning coal (see Isa. 6:6–7), God’s hand placed his words in Jeremiah’s mouth (see Jer. 1:9), and Ezekiel ate the revelation-scroll. The prophets were to embody the message they preached.
  - type: text
    content: So I began to chew it, and it tasted as sweet as honey.
  - type: note
    content: See Pss. 19:10; 119:103.
  '4':
  - type: text
    content: 'Then he said, “Son of man, now go to the people of Israel and speak my words '
  - type: note
    content: Or literally “speak with my words,” that is, “speak my words with my authority.”
  - type: text
    content: 'to them. '
  '5':
  - type: text
    content: I am not sending you to a nation that speaks a difficult foreign language but to the people of Israel—
  '6':
  - type: text
    content: 'not to nations whose complex languages you could not understand and who speak words you cannot even pronounce. Surely, if I sent you to them, they would listen to you, '
  '7':
  - type: text
    content: 'but the people of Israel will refuse to listen to you because they refuse to listen to me. The whole family of Israel has a hard heart and is stubbornly defiant. '
  '8':
  - type: text
    content: 'But now, I will make you as stubborn and defiant as they are! '
  - type: note
    content: Or “I will make your face hard against their faces.”
  '9':
  - type: text
    content: 'I will make your resolve '
  - type: note
    content: Or “your forehead.”
  - type: text
    content: as hard as the hardest stone, even harder than flint. So do not fear them or be afraid because of their angry stares, for they are a tribe of rebels.”
