        - type: text
          text: Or “I went bitterly in the anger of my spirit” or “in bitterness and the anger of my spirit.” Some commentators say that Ezekiel was angry over the message he was given to preach, others state that he was annoyed because he was being taken forcefully by the hand of God, and yet others believe he was angry with the righteous anger of God because of the sins of his people.
      marker-yv: yv-n
    - type: text
