          text: The early Aramaic translation, the Targum, understood this as a metaphor, “I impose my word upon you, as restraining as a prisoner’s chains.” However, scholarly opinion is divided on whether Ezekiel’s binding here is literal or figurative. It is very significant to note that in chs.
