        - type: text
          text: Or “a lookout,” which in the Hebrew means “one who leans forward to peer into the distance.” The primary purpose of the watchman was to look for the dawning day, not the dark night.
      marker-yv: yv-n
    - type: text
      text: 'for the people of Israel. When you hear me speak to you, give them my warning. '
    - type: usfm
