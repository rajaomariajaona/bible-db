          text: Ezekiel became the embodiment of the chariot. As the Spirit directed the chariot, so now he directed Ezekiel. Ezekiel flew as did the chariot. As the chariot appeared at the River Chebar, so now Ezekiel appeared before the exiles at Tel Abib (see v.
      - type: usfm
