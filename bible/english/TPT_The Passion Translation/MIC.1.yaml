document_id: MIC.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Impending Judgment
  - type: text
    content: 'This is the prophetic message '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed to Micah of Moresheth. He delivered these prophecies during the reigns of Jotham, Ahaz, and Hezekiah, kings of Judah. These are his supernatural visions '
  - type: note
    content: The Lord used some spiritual experiences to show Micah what he wanted Micah to say. The Hebrew expresses it as “to see a word.”
  - type: text
    content: concerning Samaria and Jerusalem.
  - type: note
    content: These two cities were the capitals of the Northern Kingdom of Israel and the Southern Kingdom of Judah respectively. They are mentioned as representing the two kingdoms.
  '10':
  - type: text
    content: 'Show no tears in '
  - type: text
    content: Showtown
  - type: text
    content: ' (Gath).'
  - type: note
    content: The Hebrew contains a wordplay lost in translation. The Hebrew word for “show” is nearly identical to Gath. The play on words blends the Hebrew plosive consonants d and th. This translation of vv. 10–16 will attempt to convey the hidden wordplays of the Hebrew.
  - type: text
    content: 'People of '
  - type: text
    content: Dusty House
  - type: text
    content: ' (Beth Leaphrah),'
  - type: note
    content: See Jer. 6:26. The Hebrew contains another wordplay lost in translation. The Hebrew word for “dust” is ʿaphar, which sounds like the last part of Leʿaphrah. The name Beth Leaphrah means “house of [to] dust.”
  - type: text
    content: 'wallow in the dust '
  - type: text
    content: of your despair
  - type: text
    content: '!'
  '11':
  - type: text
    content: 'You’ll take a different path, '
  - type: text
    content: Glamour-Girl-Town
  - type: text
    content: ' (Shaphir);'
  - type: note
    content: Shaphir is the Hebrew word for “pleasant,” “beauty,” or “glamour.”
  - type: text
    content: you’ll go into exile naked and ashamed.
  - type: text
    content: 'You citizens of '
  - type: text
    content: Outbound City
  - type: text
    content: ' (Zaanan)'
  - type: note
    content: The Hebrew contains a wordplay lost in translation. The words for “come out/outbound” and “Zaanan” sound similar in Hebrew. Zaanan may be a variant spelling of the Zenan mentioned in Josh. 15:37.
  - type: text
    content: are stuck at home.
  - type: text
    content: 'Your '
  - type: text
    content: next-door neighbor
  - type: text
    content: ' (Beth Ezel) is in mourning'
  - type: text
    content: and will no longer be able to help you.
  - type: note
    content: Or “The wailing of Beth Ezel [“house of proximity” or “neighbor”] will take away from you its standing place” or “He takes from you what he desires.” The meaning and interpretation of this sentence are uncertain.
  '12':
  - type: text
    content: 'The women of '
  - type: text
    content: Bitterville
  - type: text
    content: ' (Maroth)'
  - type: note
    content: Maroth is perhaps the Maarath mentioned in Josh. 15:59. The name means “bitterness” (see Ruth 1:20 and the first footnote). There may be a wordplay here since bitterness is unpleasant and gives no encouragement to wait for anything good.
  - type: text
    content: writhed in labor pains, hoping for good to come.
  - type: text
    content: 'Instead, '
  - type: text
    content: Yahweh
  - type: text
    content: ' sent down disaster'
  - type: text
    content: all the way to the gates of Jerusalem itself.
  '13':
  - type: text
    content: Start up your chariots,
  - type: text
    content: 'you people of '
  - type: text
    content: Ponytown
  - type: text
    content: ' (Lachish),'
  - type: note
    content: The Hebrew contains a wordplay between Lachish and “start up your chariots” (lit. “harness the chariots to the horses”; larekesh means “to/for [a team of] horses”).
  - type: text
    content: for the sin of the daughter of Zion
  - type: text
    content: can be traced back to you, where Israel’s sin began.
  - type: note
    content: Lachish was the first town in Judah that imitated the sins of the Northern Kingdom of Israel.
  '14':
  - type: text
    content: People of Judah
  - type: text
    content: ', give gifts '
  - type: note
    content: Or “a dowry.” Micah saw a similarity between parents saying goodbye to a daughter when she married and the people of Judah saying goodbye to Moresheth. The sobering, implicit contrast is that in saying farewell to Moresheth Gath, the prophet recognized that this town would soon be wedded in a sense to a godless gentile husband who would act brutally toward her.
  - type: text
    content: to Moresheth Gath,
  - type: note
    content: The name Moresheth is nearly identical to the Hebrew word for “fiancée.” Moresheth was Micah’s home village (see 1:1). Micah implied that his hometown would fall into enemy hands and no longer be part of Judah. No doubt, this was a painful prophecy for Micah to deliver.
  - type: text
    content: as you would to a daughter
  - type: text
    content: ' who is leaving home '
  - type: text
    content: to be married
  - type: text
    content: .
  - type: text
    content: 'The '
  - type: text
    content: Domiciles of Deception
  - type: text
    content: ' (Beth Achzib)'
  - type: note
    content: There is a wordplay in the Hebrew that is lost in translation. The town name Achzib is nearly identical with the Hebrew word ʾakzab, which means “deceitful” (see Jer. 15:18). Achzib is also mentioned in Josh. 15:44.
  - type: text
    content: will deceive the kings of Israel.
  '15':
  - type: text
    content: 'People of Mareshah, '
  - type: note
    content: The name Mareshah and the Hebrew word yoresh—meaning “conqueror” or “prince”—sound similar. Although it is possible that Mareshah is an alternative form of Moresheth, it is more likely another village in Micah’s home area (see Josh. 15:44).
  - type: text
    content: Yahweh
  - type: text
    content: ' will again bring a conqueror against you,'
  - type: text
    content: and the glory of Israel
  - type: text
    content: 'will flee to '
  - type: text
    content: the cave of
  - type: text
    content: ' Adullam.'
  - type: note
    content: Adullam was a cave in which David took refuge when he was fleeing both from King Saul and from Achish, the Philistine king of Gath (see 1 Sam. 22:1). It thus became a symbol for the last hope in a desperate situation. Micah was saying, in effect, that the leaders of Israel (“the glory of Israel” is likely a metaphor for Israel’s princes) would go and hide in the cave at Adullam because of their hopeless, desperate situation, just as David did.
  '16':
  - type: text
    content: Cut off your hair and make yourselves bald,
  - type: note
    content: Or literally “Enlarge the cutting off of your hair, just like the vulture.” The action represented here constitutes a total tonsure of the head—that is, full baldness, just like a griffon vulture. In the context here, this action denotes extreme anguish, as in a state of desperate mourning.
  - type: text
    content: 'for your delightful children '
  - type: text
    content: are taken away
  - type: text
    content: .
  - type: note
    content: Their “delightful children” may also be a metaphor for the people of the surrounding villages and towns in Judah.
  - type: text
    content: Make yourselves as bald as a vulture,
  - type: text
    content: for your children have been taken away from you into exile.
  - type: note
    content: The Hebrew verb galu is in the form of the Qal Preterit and can be translated as either an English future or perfect tense. In this context, such an expression is known as a “prophetic perfect.” In other words, while the populations of these towns have not yet experienced the trauma of being dragged off into captivity, it is certain that they soon will be. Therefore, their fate is expressed as if it has already taken place.
  '2':
  - type: text
    content: Listen, you peoples—all of you!
  - type: text
    content: 'Earth, pay attention '
  - type: note
    content: The Hiphil imperative verb form of qashab employed here carries a significantly stronger meaning than simply “listening.” It denotes “to give attention to.” This sentence indicates that Yahweh regards this divine communication as critically important.
  - type: text
    content: —and everyone on it.
  - type: text
    content: From his holy temple,
  - type: text
    content: 'the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself'
  - type: text
    content: will testify against you.
  '3':
  - type: text
    content: 'For behold, '
  - type: text
    content: Yahweh
  - type: text
    content: ' is leaving his dwelling place.'
  - type: text
    content: Here he comes to tread upon the high places of the land.
  - type: note
    content: See v. 5; Deut. 32:13. The high places were locales of idol worship.
  '4':
  - type: text
    content: Mountains melt beneath his feet,
  - type: text
    content: 'like wax melting near a '
  - type: text
    content: raging
  - type: text
    content: ' fire.'
  - type: text
    content: Valleys are split wide open,
  - type: text
    content: like water pouring down a steep slope.
  '5':
  - type: text
    content: 'All of this is because of the rebellion of Jacob’s '
  - type: text
    content: tribes
  - type: text
    content: ','
  - type: text
    content: the sin of the people of Israel.
  - type: text
    content: So who is to blame for the rebellion of Jacob?
  - type: text
    content: 'Is it not '
  - type: text
    content: the people of
  - type: text
    content: ' Samaria?'
  - type: note
    content: Historically, due to the influence of Queen Jezebel (during King Ahab’s reign in 874–853 BC), Samaria became a center for the worship of the fertility gods Baal and Asherah. Samaria thus was a major source of religious corruption throughout Israel. See 1 Kings 16:29–33.
  - type: text
    content: 'Who is to blame for '
  - type: text
    content: the idolatry of
  - type: text
    content: ' the high places '
  - type: note
    content: Or “sin” (LXX, Targum).
  - type: text
    content: of Judah?
  - type: text
    content: 'Is it not '
  - type: text
    content: the people of
  - type: text
    content: ' Jerusalem?'
  - type: note
    content: Or literally “What is the high place of Judah? Is it not Jerusalem?” The nominating of the people of Jerusalem as the ones responsible for constructing this idolatrous place of worship in the sacred city is a paraphrase that is clearly implied by this expression.
  '6':
  - type: text
    content: “So I will wrestle Samaria to the ground,
  - type: text
    content: and she will become nothing more than an open field for planting vines.
  - type: text
    content: 'I will roll the stones of her '
  - type: text
    content: buildings
  - type: text
    content: ' down into the valley'
  - type: text
    content: until I have laid bare her foundations.
  '7':
  - type: text
    content: I will hammer to pieces all her gilded pagan idols,
  - type: text
    content: 'all the gifts given to her '
  - type: text
    content: sacred
  - type: text
    content: ' prostitutes '
  - type: note
    content: The Hebrew noun ʾetnan denotes the hire, or wages, of a prostitute. The context here clearly indicates shrine prostitutes. The exact nature of these hires or fees is not specified, but the context makes it clear that they will be destroyed by fire. See Deut. 23:18; Hos. 4:14.
  - type: text
    content: will be scorched by fire.
  - type: text
    content: I will turn all her precious idols into a pile of rubble.
  - type: text
    content: For she—Samaria—gathered her treasured idols
  - type: text
    content: as a prostitute collects her fees,
  - type: text
    content: and now these idols will become a prostitute’s wages again.”
  - type: note
    content: That is, the idols on which Samaria had spent its wealth will be taken away by its invaders to be used for temple prostitutes elsewhere.
  - type: heading
    content: Micah’s Lament for Jerusalem and Surrounding Villages
  '8':
  - type: text
    content: I will mourn and wail because of this.
  - type: note
    content: Verses 8–16 contain prophecies of coming disaster to twelve towns in Judah and Philistia. The prophecies are likely a reference to Sennacherib’s invasion of the land in 701 BC.
  - type: text
    content: 'I will walk around barefoot and bare '
  - type: note
    content: That is, naked.
  - type: text
    content: to show my sorrow
  - type: text
    content: .
  - type: text
    content: I will howl like a jackal
  - type: text
    content: and mourn like an owl.
  - type: note
    content: Or “ostrich.” The ways in which Micah showed his sorrow may seem strange to us today, but they were in his day common expressions of deep sorrow and grief.
  '9':
  - type: text
    content: For her wound is incurable,
  - type: text
    content: 'and '
  - type: text
    content: her infection
  - type: text
    content: ' is spreading to Judah.'
  - type: text
    content: It has even reached the gateway of my people,
  - type: text
    content: to Jerusalem itself.
