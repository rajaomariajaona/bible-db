document_id: PSA.110,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Messiah, King, and Priest This psalm is applied to Christ in the New Testament, where it is quoted more often than any other Old Testament passage.
  - type: text
    content: King David’s psalm
  - type: text
    content: Yahweh
  - type: text
    content: ' said to my Lord, the Messiah:'
  - type: text
    content: “Sit with me as enthroned ruler
  - type: note
    content: Or “at my right hand.” The right hand is the position of authority and honor.
  - type: text
    content: while I subdue your every enemy.
  - type: text
    content: They will bow low before you
  - type: text
    content: as I make them a footstool for your feet.”
  - type: note
    content: A footstool symbolizes what is subdued. It is taken from the Hebrew root word “to subdue.”
  '2':
  - type: text
    content: Messiah, I know God himself will establish your kingdom
  - type: text
    content: as you reign in Zion-glory.
  - type: text
    content: For he says to you, “Rule in the midst of your enemies!”
  '3':
  - type: text
    content: Your people will be your love offerings.
  - type: text
    content: In the day of your mighty power you will be exalted,
  - type: text
    content: and in the brightness of your holy ones you will shine
  - type: text
    content: as an army arising from the womb of the dawn,
  - type: text
    content: anointed with the dew of your youth!
  - type: note
    content: Or “like dew, your youth will come to you.”
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ' has taken a solemn oath'
  - type: text
    content: and will never back away from it, saying,
  - type: text
    content: “You are a priest for eternity, after the manner of Melchizedek!”
  - type: note
    content: Melchizedek was the name of a Canaanite king and priest over the Jebusite kingdom that later became Jerusalem. The name Melchizedek means “my king of righteousness.”
  '5':
  - type: text
    content: 'The Lord stands in full authority '
  - type: note
    content: The Hebrew word used here for “Lord” is Adonai or Adonay. It is the plural form of Adhon. Jesus is called Lord of lords, and we are the lords that he is Lord over. We are seated at his right hand (Benjamin) to rule with him.
  - type: text
    content: to shatter to pieces
  - type: text
    content: the kings who stand against you
  - type: text
    content: on the day he displays his terrible wrath.
  '6':
  - type: text
    content: He will judge every rebellious nation,
  - type: text
    content: filling their battlefields with corpses,
  - type: text
    content: and will shatter the strongholds of ruling powers.
  '7':
  - type: text
    content: Yet he himself will drink from his inheritance
  - type: text
    content: as from a flowing brook;
  - type: text
    content: refreshed by love he will stand victorious!
