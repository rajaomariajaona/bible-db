segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Messiah, King, and Priest
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '110'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is applied to Christ in the New Testament, where it is quoted more often than any other Old Testament passage.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s psalm
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to my Lord, the Messiah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Sit with me as enthroned ruler
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 110:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “at my right hand.” The right hand is the position of authority and honor.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: while I subdue your every enemy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will bow low before you
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I make them a footstool for your feet.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 110:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A footstool symbolizes what is subdued. It is taken from the Hebrew root word “to subdue.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Messiah, I know God himself will establish your kingdom
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you reign in Zion-glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he says to you, “Rule in the midst of your enemies!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your people will be your love offerings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the day of your mighty power you will be exalted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and in the brightness of your holy ones you will shine
- type: usfm
  marker: q1
  children:
  - type: text
    text: as an army arising from the womb of the dawn,
- type: usfm
  marker: q1
  children:
  - type: text
    text: anointed with the dew of your youth!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 110:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “like dew, your youth will come to you.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has taken a solemn oath'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will never back away from it, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are a priest for eternity, after the manner of Melchizedek!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 110:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Melchizedek was the name of a Canaanite king and priest over the Jebusite kingdom that later became Jerusalem. The name Melchizedek means “my king of righteousness.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Lord stands in full authority '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 110:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here for “Lord” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adonai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adonay
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is the plural form of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Adhon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus is called Lord of lords, and we are the lords that he is Lord over. We are seated at his right hand (Benjamin) to rule with him.
    marker-yv: yv-n
  - type: text
    text: to shatter to pieces
- type: usfm
  marker: q1
  children:
  - type: text
    text: the kings who stand against you
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the day he displays his terrible wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He will judge every rebellious nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: filling their battlefields with corpses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will shatter the strongholds of ruling powers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yet he himself will drink from his inheritance
- type: usfm
  marker: q1
  children:
  - type: text
    text: as from a flowing brook;
- type: usfm
  marker: q1
  children:
  - type: text
    text: refreshed by love he will stand victorious!
