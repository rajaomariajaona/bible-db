      - type: text
        text: '10'
    - type: text
      text: '“ ‘You said: “Let’s take possession of these two countries, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judah and Israel
    - type: text
      text: '. They are ours for the taking,” even though the land belongs to me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “even though
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was there!”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Therefore, as surely as I live—declares the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '—I will treat you with the same anger and jealousy as you treated them in your hatred. I will show '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Israelites
    - type: text
      text: ' who I really am when I punish you severely. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And you will know that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have heard all the vile insults that you have uttered against the mountains of Israel, saying, “Look! They have been ruined and left desolate. Let’s wipe them out!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they are given us [as food] to devour.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'I’ve heard all your boasting, arrogant words. Your many speeches that opposed me relentlessly, I have heard them all. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: I will destroy you and leave your land empty as everyone applauds your downfall. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Just as you rejoiced when the heritage of the land of Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the house of Israel.”
      marker-yv: yv-n
    - type: text
      text: 'had been laid waste, so I will do to you, Mount Seir. You will become an empty desert, along with all the land of Edom. And then '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Israelites
    - type: text
      text: ' will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, set your face toward Mount Seir '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the land of Edom.
      marker-yv: yv-n
    - type: text
      text: 'and prophesy against it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tell the people what I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to them: ‘Behold! I am against you, Mount Seir! I will punish you severely. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will stretch out my hand against you.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'I will level your cities and make your land an empty desert. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: There will be no one left in your land
    - type: text
      text: '. And then you will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'You have been an enemy of Israel for a very long time. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Edom’s (Seir’s) hatred of Israel dates back to Jacob stealing his brother Esau’s birthright. The Edomites were descendants of Esau and viewed the Israelites as illegitimate usurpers who took over the land. The Edomites frequently sought revenge against Israel and hated the Israelites. Isaiah, Jeremiah, and Obadiah likewise denounced Edom. Symbolically, Edom represents the old nature of Adam that must be removed, crucified with Christ, before the glories of the new covenant can be manifested. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:44–49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 2:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'You '
    - type: usfm
      marker: it
      children:
      - type: text
        text: betrayed
    - type: text
      text: ' the Israelites and gave them over to be slaughtered at the time of their calamity, the crucial moment of their final punishment. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Therefore, as surely as I live—declares Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: —I will let you be murdered. Murder will chase you down. Because you did not despise bloodshed, bloodshed will hunt you down!
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“ ‘I will make Mount Seir a desolate waste, and I will kill anyone who travels through it. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I will cover its mountains with the corpses of those who die in war. Yes, the bodies of those killed in battle will lie scattered over all your hills, valleys, and ravines. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Your entire land will lie in ruins; your towns will never be inhabited again. And then you will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
