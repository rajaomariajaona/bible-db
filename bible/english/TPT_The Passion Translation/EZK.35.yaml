type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment of Edom
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 35 constitutes panel G1 in the chiastic structure of the book. It deals with the theme of judgment against Edom for their attacks against Israel and for their rejoicing over the destruction of Jerusalem at the hands of the Babylonians. This chapter serves as a contrasting parallel with ch. 21 (panel G), an oracle identifying Babylon as the instrument of Yahweh’s judgment against Israel.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '10':
  - type: text
    content: '“ ‘You said: “Let’s take possession of these two countries, '
  - type: text
    content: Judah and Israel
  - type: text
    content: '. They are ours for the taking,” even though the land belongs to me, '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: Or “even though Yahweh was there!”
  '11':
  - type: text
    content: 'Therefore, as surely as I live—declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '—I will treat you with the same anger and jealousy as you treated them in your hatred. I will show '
  - type: text
    content: the Israelites
  - type: text
    content: ' who I really am when I punish you severely. '
  '12':
  - type: text
    content: 'And you will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have heard all the vile insults that you have uttered against the mountains of Israel, saying, “Look! They have been ruined and left desolate. Let’s wipe them out!” '
  - type: note
    content: Or “they are given us [as food] to devour.”
  '13':
  - type: text
    content: 'I’ve heard all your boasting, arrogant words. Your many speeches that opposed me relentlessly, I have heard them all. '
  '14':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: I will destroy you and leave your land empty as everyone applauds your downfall. '
  '15':
  - type: text
    content: 'Just as you rejoiced when the heritage of the land of Israel '
  - type: note
    content: Or “the house of Israel.”
  - type: text
    content: 'had been laid waste, so I will do to you, Mount Seir. You will become an empty desert, along with all the land of Edom. And then '
  - type: text
    content: the Israelites
  - type: text
    content: ' will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: '“Son of man, set your face toward Mount Seir '
  - type: note
    content: That is, the land of Edom.
  - type: text
    content: 'and prophesy against it. '
  '3':
  - type: text
    content: 'Tell the people what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to them: ‘Behold! I am against you, Mount Seir! I will punish you severely. '
  - type: note
    content: Or “I will stretch out my hand against you.”
  '4':
  - type: text
    content: 'I will level your cities and make your land an empty desert. '
  - type: text
    content: There will be no one left in your land
  - type: text
    content: '. And then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'You have been an enemy of Israel for a very long time. '
  - type: note
    content: Edom’s (Seir’s) hatred of Israel dates back to Jacob stealing his brother Esau’s birthright. The Edomites were descendants of Esau and viewed the Israelites as illegitimate usurpers who took over the land. The Edomites frequently sought revenge against Israel and hated the Israelites. Isaiah, Jeremiah, and Obadiah likewise denounced Edom. Symbolically, Edom represents the old nature of Adam that must be removed, crucified with Christ, before the glories of the new covenant can be manifested. See 1 Cor. 15:44–49; Gal. 2:20.
  - type: text
    content: 'You '
  - type: text
    content: betrayed
  - type: text
    content: ' the Israelites and gave them over to be slaughtered at the time of their calamity, the crucial moment of their final punishment. '
  '6':
  - type: text
    content: 'Therefore, as surely as I live—declares Lord '
  - type: text
    content: Yahweh
  - type: text
    content: —I will let you be murdered. Murder will chase you down. Because you did not despise bloodshed, bloodshed will hunt you down!
  '7':
  - type: text
    content: '“ ‘I will make Mount Seir a desolate waste, and I will kill anyone who travels through it. '
  '8':
  - type: text
    content: 'I will cover its mountains with the corpses of those who die in war. Yes, the bodies of those killed in battle will lie scattered over all your hills, valleys, and ravines. '
  '9':
  - type: text
    content: 'Your entire land will lie in ruins; your towns will never be inhabited again. And then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .
