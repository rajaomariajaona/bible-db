document_id: PSA.124,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Victory
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway by King David
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: What if God had not been on our side? Let all Israel admit this!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: What if God had not been there for us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our enemies, in their violent anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would have swallowed us up alive!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 4-5
    - type: text
      text: The nations, with their flood of rage, would have swept us away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and we would have drowned
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and perished beneath their torrent of terror!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: We can praise God over and over that he never left us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God wouldn’t allow the terror of our enemies to defeat us.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: We are free from the hunter’s trap;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their snare is broken and we have escaped!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: For the same God who made everything,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: our Creator and our mighty maker,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he himself is our helper and defender!
