document_id: PSA.124,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Victory
  - type: text
    content: A song of the stairway by King David
  - type: text
    content: What if God had not been on our side? Let all Israel admit this!
  '2':
  - type: text
    content: What if God had not been there for us?
  - type: text
    content: Our enemies, in their violent anger,
  - type: text
    content: would have swallowed us up alive!
  '4':
  - type: text
    content: The nations, with their flood of rage, would have swept us away,
  - type: text
    content: and we would have drowned
  - type: text
    content: and perished beneath their torrent of terror!
  '6':
  - type: text
    content: We can praise God over and over that he never left us!
  - type: text
    content: God wouldn’t allow the terror of our enemies to defeat us.
  '7':
  - type: text
    content: We are free from the hunter’s trap;
  - type: text
    content: their snare is broken and we have escaped!
  '8':
  - type: text
    content: For the same God who made everything,
  - type: text
    content: our Creator and our mighty maker,
  - type: text
    content: he himself is our helper and defender!
