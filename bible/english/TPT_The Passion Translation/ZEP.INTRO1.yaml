  - type: text
    text: About the Book of Zephaniah
- type: usfm
  marker: ip
  children:
  - type: text
    text: The scene depicted in the book of Zephaniah stands in stark contrast to how the authors of Kings and Chronicles portrayed Josiah’s reign. Those writers called Josiah the last “good king” in David’s royal line. This tension shows that there are at least two ways of looking at every complex situation, depending on one’s perspective. During times of rapid social decline, a polarization of opinions tends to emerge. Granted, Zephaniah did not call Josiah out by name, but he painted a much bleaker, more critical picture of the era than the composers of Kings and Chronicles. The Bible expresses many such tensions, and Scripture is full of paradox. This gritty authenticity rings truer than some artificially sanitized history of God’s people.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Zephaniah started at home, speaking truth to the powers that be in Judah. He then broadened his warnings to the surrounding nations. He closed, as prophets often do, with a message of hope. Later readers (after the destruction of Judah and the rebuilding of the Second Temple) could see fulfillment in both Zephaniah’s scathing critique and his prospect of promise, fulfilled as the remnant returned from exile to rebuild the nation.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'It is hard to find explicit New Testament references to Zephaniah, except perhaps in Matthew 13:40–52. Matthew 13:44 could be an allusion to the Hebrew meaning of Zephaniah’s name: “the Lord hides” or “the Lord treasures.”'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Zephaniah wrote totally in poetry. Zephaniah’s poetic style is characterized by the use of staccato exclamations, rapid changes of vantage point and voice, discourse, rhetorical questions, and frequent wordplay and metaphors.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Zephaniah’s language was graphic, potent, and pointed. Perhaps no other prophet has painted the picture of Jerusalem’s decline more realistically. He described a time of terrible gloom with inevitable cataclysmic judgments on the horizon, coupled with a glorious promise of hope and salvation for his people. With burning eloquence, he alternated his prophecies between stern warnings and soothing comforts.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Purpose
- type: usfm
  marker: ip
  children:
  - type: text
    text: We cannot limit the book of Zephaniah to any single interpretation. Much like any gifted writer, Zephaniah cloaked his words in just enough mystery to fit broader applications of universal truth. The prophet Zephaniah may have been the greatest master of creating word art of such unlimited relevance; his message often applies to today’s situations as well as it did millennia ago, even when totally detached from the context that brought it forth. As an example, Zephaniah’s enemy from the North could fit various invaders, from Scythians (who raided the area during this time) to the superpowers of Babylon and Persia.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'However, what '
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' clear is that the multifaceted applications of Zephaniah’s prophecy are fully consistent with the dominant, overarching theme of the book: the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. This phenomenon is one of the richest and most complex of all scriptural prophetic motifs. Hence, it follows that the prophecies of blessings of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' contain multiple levels of fulfillment. The first iterations of fulfillment occurred comparatively shortly after the prophecies were given, in the return of God’s people from exile to their land. Then a more climactic fulfillment appeared in the person and work of Jesus Christ. What has yet to follow is its absolute consummation at the end of time, when Jesus will return to usher in the new heavens and the new earth in the eternal heavenly kingdom.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Zephaniah held law and gospel (in Christian theological terms) in balance. God speaks his no. God speaks his yes. We are to take both with utter sobriety and seriousness. The promise of yes prevails in the end but is born out of that uncomfortable tension between law and gospel, the paradox in which we live our daily lives. And God’s greatest promise did not come to us without a cost: it required the crucifixion of Jesus. Like a good surgeon, Zephaniah didn’t pretend that healing would come without the use of a sharp scalpel. He reminded us that healing means blood will be shed, as it was in Jesus’ sacrifice.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Zephaniah wrote to reveal God’s passion for righteousness, justice, and virtue among his people. If these prophecies took place '
  - type: usfm
    marker: it
    children:
    - type: text
      text: before
  - type: text
    text: ' Josiah’s reform, they may well have catalyzed that renewal. Because of Zephaniah’s universalizing writing style, it stands to reason that he intended his words to help warn people at any time and in any place and give them hope in all kinds of situations.'
- type: usfm
  marker: is1
  children:
  - type: text
    text: Author and Audience
- type: usfm
  marker: ip
  children:
  - type: text
    text: The book gives us few clues about Zephaniah himself. We see him as a man of passion and integrity, a man of joyful song (Zeph. 3:14), who possessed great courage and boldness as a prophet (1:8).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The introduction in 1:1 seems to imply that he was descended from King Hezekiah. Some scholars think that this could be any Hezekiah, but that would require a qualifier, especially with another king (Josiah) being mentioned in a parallel manner. Likely he was very comfortable among the ruling class and not some radical outsider like Amos. Critique from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: inside
  - type: text
    text: ' the system can be especially effective. He and Josiah may even have been cousins.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See R. B. Dillard and T. Longman III,
