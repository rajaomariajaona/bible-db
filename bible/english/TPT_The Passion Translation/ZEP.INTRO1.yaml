- type: usfm
  marker: ip
  children:
  - type: text
    text: As is most often the case with prophetic oracles that anticipate the coming of Jesus to earth, such predictions can have multiple, partial levels of fulfillment embedded in the historical experiences of the people of Israel and Judah. And in each of these progressive stages, the history of God’s people points to the consummate stage of fulfillment in the Messianic gospel age.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'In Zephaniah 3:9–20, God promised, first of all, to purify corrupted worship, including that of the nation of Judah (3:9–11). It was Jesus who restored true worship of God at the Jerusalem Temple. Then, in 3:13, God promised to renew the speech of his people so that they would always speak the truth. It was one of Jesus’ primary characteristics that he spoke the truth—in the name of God his Father—at all times. He never feared the consequences that his truth-speaking might provoke. Then in 3:14–15, the prophet exhorted the remnant of Judah to rejoice because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' removed their punishment and turned back their enemy. He also promised to bring them back to their homeland (3:19–20). At the same time, God promised to be with them, to save them, and to take great delight in them with love and rejoicing (3:17).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The climactic fulfillment of these promises of renewal, restoration, and redemption all take place in the atoning sacrifice of Jesus Christ on the cross. It is Jesus’ death and resurrection that offer a guarantee that all those who put their faith and trust in him will be wholly renewed, restored, and redeemed—for all eternity. The restoration of the earthly kingdom of Judah was only a partial fulfillment of these promises. When Jesus rose from the dead and ascended to heaven, he returned to God, his Father, and claimed the throne of an everlasting kingdom that would never be defeated. This is the absolute, consummate blessing of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' that is yet to come, and it offers a stark, contrasting parallel to the consummate destruction of all the enemies of God and his people.'
