    marker-yv: yv-n
- type: usfm
  marker: ip
  children:
  - type: text
    text: Zephaniah was a contemporary of Nahum, Jeremiah, and Huldah the prophetess. His name means “the Lord hides” or “the Lord treasures.” Both Zephaniah and you are treasured by the Lord and hidden in his heart (Col. 3:2–3).
- type: usfm
  marker: is1
  children:
  - type: text
    text: Major Themes
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Day of
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: .
  - type: text
    text: ' The theme of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is an overarching one and pervades the entire book. Each of the following major themes listed in this section illustrates an element of either the judgment or blessing of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' in the multifaceted manifestations of that complex day.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The hearers of Zephaniah’s message did not receive the warning of this ominous day as good news. Back then, as well as today, evildoers often appear to go through life with as much favor as good people. But God will balance the cosmic checkbook. A holy God cannot tolerate evil. Justice must be served. However, it is also equally true that the grace and mercy of God can never be extinguished. His promised plan of eternal redemption and renewal for humankind—accomplished via the supreme sacrifice of his Messianic Son and King, Jesus Christ—is as certain as the doom of Satan and the total destruction of sin and death. These two phenomena constitute the ultimate fulfillment of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Indictment against Judah’s Idolatry.
  - type: text
    text: ' The people of Israel have struggled to maintain an intimate relationship with God since the day they created the golden calf, an inert, artificial barrier between them and their Creator. An idol can be measured and weighed. It has no life and no mystery to it. The worshiper can carry it around or discard it. People use idols to avoid the vulnerability they must risk in any intimate relationship, with others or with God. Thus, idols are a form of spiritual “pornography,” which keeps us from the real God. God was not angry because Israel was breaking some arbitrary idol rule but because she was avoiding a deep relationship with him and settling for a false substitute.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Arguably, the sin of idolatry was the most egregious act of rebellion against God that Israel (and Judah) had ever committed. First and foremost, it was both a denial and a betrayal of his unparalleled uniqueness. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' was Israel’s supreme covenant Lord, the one true and living God who had delivered them single-handedly out of their four-hundred-year captivity in Egypt. And in return, God demanded an exclusive, wholehearted devotion from his people as a mandatory response of gratitude for the love and mercy he showed to them. God encapsulated this exclusive worship in the first and greatest of the Ten Commandments, wherein God commanded the people to have no other gods except God himself (Deut. 5:7); in fact, this command lay at the heart of the entire covenant with Israel. Violation of this stipulation would result in the direst consequences for the people of God, and sadly, the history of Israel reveals an all-too-tragic willingness on their part to ignore that solemn requirement. It is, therefore, no surprise that Zephaniah recorded the terrifying denunciation of the people of Judah in the opening chapter of his prophecy, showing that their worship of pagan idols would result in catastrophic punishment at the hands of their God. And, to reinforce the severity of this judgment, God described it as an outworking of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' against them.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: In conclusion, a profound contrast is notable here. In that deep, exposed relationship between two mysteries, the complex depths of our souls and the boundless power of God, true love and grace (
  - type: usfm
    marker: it
    children:
    - type: text
      text: chesed
  - type: text
    text: ' in Hebrew) are generated. This also provides us with what we need to love others graciously. However, if ever we choose to turn our backs on this wonderfully unique relationship with our God—when we turn to idolatry—we do so at our peril, just like Israel and Judah of old.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: ’s Avenging Anger.
  - type: text
    text: ' Several Hebrew terms denote the anger, or wrath, of God in Zephaniah (Zeph. 1:18; 2:2–3; 3:8). In every instance—as is the case throughout the whole of Scripture—this divine anger is a holy, righteous wrath. It is always triggered by the sinful, rebellious actions of humankind—in particular, when God’s own people rebel against him. We should never equate '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s anger with sinful, human passions. His anger is always a just and righteous reaction to any affront to his moral perfections or to violations of his sacred commands and statutes. This is the case regardless of whoever is guilty of such transgressions—pagan nations or his own people.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'One particular term is worthy of special note here—namely, the noun '
  - type: usfm
    marker: it
    children:
    - type: text
      text: qinʾah
  - type: text
    text: ', which is often translated “jealousy” or “anger.” However, the English word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: jealousy
  - type: text
    text: ' has connotations inappropriate for a holy God, as if he were insecure in his relationship with us. Some translations use '
  - type: usfm
    marker: it
    children:
    - type: text
      text: zeal
  - type: text
    text: ', but that doesn’t convey the righteous anger to which '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has every right. “Avenging anger” is perhaps the best translation of this Hebrew term, as it reflects the solemn severity of such a terrifying divine response, especially as it characterizes a fearful outworking of a day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s judgment.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Catastrophic Divine Judgments against the Nations.
  - type: text
    text: ' One significant element of this particular manifestation of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is that the account of the devastating punishments God will hand down to the nations of Philistia, Moab, Ammon, Cush, and Assyria is bracketed by the terrible indictments directed against the “shameless people” of Judah (2:1–3) and Jerusalem, “the filthy and foul city—the city of oppression!” (3:1–8). These judgments include a call for the people of Judah to repent of their unrighteousness if they are to avoid bearing the full brunt of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s wrath (2:3). There is also condemnation for Jerusalem’s refusal to repent of her social, economic, moral, and spiritual corruption (see further discussion under the following theme), including her profaning of the sanctuary (3:1–8). In light of these covenant violations, God deemed it appropriate to include Judah and Jerusalem in the list of nations that were to be on the receiving end of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s wrath. However, it is important to recognize the ray of hope in the midst of these judgments. In 2:6–7, God declared that the once-populous cities of the Philistines would return to pastureland. And it is here that the remnant of Judah would eventually return. This is a brief but shining anticipation of the redemptive climax of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' for the people of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' in the second part of chapter 3.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Inevitable Punishment for Corruption in Jerusalem.
  - type: text
    text: ' By taking on responsibilities and getting things done, some people will inevitably rise to positions of authority. They will then have enhanced access to resources that are unavailable to others. At this point the great temptation always arises to use that authority to one’s own benefit at the expense of those who have less authority. We call this corruption, and virtually all the prophets rage against it. Most nations do not fall because of enemies from without but rather from the rot of corruption from within. Once at the “top,” leaders often use force and coercion to rig the game in their favor, making upward mobility hard or even impossible for others. Zephaniah, in no uncertain terms, came down on this (3:1–5).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'What made Jerusalem’s corrupt activities more heinous in the sight of God was the corruption of civic leadership in the city. The common characteristic of the ruling classes in Jerusalem was their arrogant shamelessness, which they showed in their blatant oppression and extortion of others and their utter scorning of the worship of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. It is no wonder that God condemned the officials, rulers, priests, and prophets of Jerusalem at the outset of the indictment in 3:1 as a corporate gathering of rebels, oppressors, and those who profane the sacred worship of their Lord. Therefore, the rationale for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' pouring out his righteous anger on both the godless nations and Jerusalem was essentially the same.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Promised Hope for the Future.
  - type: text
    text: ' As is the case with the majority of the canonical prophets, oracles of divine judgment and wrath—directed at the godless nations neighboring Israel and Judah as well as the people of God themselves—precede the promises of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s grace and mercy. Such promises focus on the renewal, restoration, redemption, and forgiveness of his people and, for the most part, come at the conclusion of the books of prophecy. Zephaniah fits into this pattern.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'There is no doubt that the prophet primarily expressed the various manifestations of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' to both Judah and the godless nations around her as retribution for rebellion against, and violations of, the divine covenant. However, at the conclusion of Zephaniah (3:9–20), there is a glorious and dramatic reversal in the outworking of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' for both the nations and the faithful remnant of Israel. There is always hope for the faithful remnant. God’s promises of salvation routinely follow his avenging anger with regard, initially, to his chosen people. Most certainly, this is also a word for us today.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Zephaniah expresses this final manifestation of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' as a powerful and comforting hope. Not only will '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' completely remove punishments for all sins his people committed in the past (3:15), but he also will totally renew the remnant of Israel so that they will no longer utter lies and speak deceitfully (3:13). And they will experience the love of God and his rejoicing over them in a manner they never experienced before (3:17). Such redemption and renewal will include a joyful restoration—a return to their homeland. Such a return will precipitate an expression of honor and praise from all the nations of the world.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'One must also not overlook the promise of renewal given to the peoples of the earth in 3:9. Here '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' promised to purify the lips of the peoples so that they would call on his name.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'This wonderful and joyful conclusion to the book of Zephaniah is nothing less than an anticipation of the glorious, positive climax of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: —one that points forward to the coming of the Messiah, Jesus Christ.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Seeing Jesus in the Book.
  - type: text
    text: ' The key to understanding how Zephaniah anticipates the coming of the Messiah, Jesus Christ, lies in the final section of the prophecy in 3:9–20. It is in this concluding oracle of hope, outlining the future renewal, restoration, and redemption of the people of '
  - type: usfm
    marker: nd
    children:
