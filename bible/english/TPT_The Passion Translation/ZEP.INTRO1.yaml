  - type: text
    content: About the Book of Zephaniah
  - type: text
    content: The scene depicted in the book of Zephaniah stands in stark contrast to how the authors of Kings and Chronicles portrayed Josiah’s reign. Those writers called Josiah the last “good king” in David’s royal line. This tension shows that there are at least two ways of looking at every complex situation, depending on one’s perspective. During times of rapid social decline, a polarization of opinions tends to emerge. Granted, Zephaniah did not call Josiah out by name, but he painted a much bleaker, more critical picture of the era than the composers of Kings and Chronicles. The Bible expresses many such tensions, and Scripture is full of paradox. This gritty authenticity rings truer than some artificially sanitized history of God’s people.
  - type: text
    content: Zephaniah started at home, speaking truth to the powers that be in Judah. He then broadened his warnings to the surrounding nations. He closed, as prophets often do, with a message of hope. Later readers (after the destruction of Judah and the rebuilding of the Second Temple) could see fulfillment in both Zephaniah’s scathing critique and his prospect of promise, fulfilled as the remnant returned from exile to rebuild the nation.
  - type: text
    content: 'It is hard to find explicit New Testament references to Zephaniah, except perhaps in Matthew 13:40–52. Matthew 13:44 could be an allusion to the Hebrew meaning of Zephaniah’s name: “the Lord hides” or “the Lord treasures.”'
  - type: text
    content: Zephaniah wrote totally in poetry. Zephaniah’s poetic style is characterized by the use of staccato exclamations, rapid changes of vantage point and voice, discourse, rhetorical questions, and frequent wordplay and metaphors.
  - type: text
    content: Zephaniah’s language was graphic, potent, and pointed. Perhaps no other prophet has painted the picture of Jerusalem’s decline more realistically. He described a time of terrible gloom with inevitable cataclysmic judgments on the horizon, coupled with a glorious promise of hope and salvation for his people. With burning eloquence, he alternated his prophecies between stern warnings and soothing comforts.
  - type: text
    content: Purpose
  - type: text
    content: We cannot limit the book of Zephaniah to any single interpretation. Much like any gifted writer, Zephaniah cloaked his words in just enough mystery to fit broader applications of universal truth. The prophet Zephaniah may have been the greatest master of creating word art of such unlimited relevance; his message often applies to today’s situations as well as it did millennia ago, even when totally detached from the context that brought it forth. As an example, Zephaniah’s enemy from the North could fit various invaders, from Scythians (who raided the area during this time) to the superpowers of Babylon and Persia.
  - type: text
    content: 'However, what '
  - type: text
    content: is
  - type: text
    content: ' clear is that the multifaceted applications of Zephaniah’s prophecy are fully consistent with the dominant, overarching theme of the book: the day of '
  - type: text
    content: Yahweh
  - type: text
    content: '. This phenomenon is one of the richest and most complex of all scriptural prophetic motifs. Hence, it follows that the prophecies of blessings of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' contain multiple levels of fulfillment. The first iterations of fulfillment occurred comparatively shortly after the prophecies were given, in the return of God’s people from exile to their land. Then a more climactic fulfillment appeared in the person and work of Jesus Christ. What has yet to follow is its absolute consummation at the end of time, when Jesus will return to usher in the new heavens and the new earth in the eternal heavenly kingdom.'
  - type: text
    content: 'Zephaniah held law and gospel (in Christian theological terms) in balance. God speaks his no. God speaks his yes. We are to take both with utter sobriety and seriousness. The promise of yes prevails in the end but is born out of that uncomfortable tension between law and gospel, the paradox in which we live our daily lives. And God’s greatest promise did not come to us without a cost: it required the crucifixion of Jesus. Like a good surgeon, Zephaniah didn’t pretend that healing would come without the use of a sharp scalpel. He reminded us that healing means blood will be shed, as it was in Jesus’ sacrifice.'
  - type: text
    content: 'Zephaniah wrote to reveal God’s passion for righteousness, justice, and virtue among his people. If these prophecies took place '
  - type: text
    content: before
  - type: text
    content: ' Josiah’s reform, they may well have catalyzed that renewal. Because of Zephaniah’s universalizing writing style, it stands to reason that he intended his words to help warn people at any time and in any place and give them hope in all kinds of situations.'
  - type: text
    content: Author and Audience
  - type: text
    content: The book gives us few clues about Zephaniah himself. We see him as a man of passion and integrity, a man of joyful song (Zeph. 3:14), who possessed great courage and boldness as a prophet (1:8).
  - type: text
    content: 'The introduction in 1:1 seems to imply that he was descended from King Hezekiah. Some scholars think that this could be any Hezekiah, but that would require a qualifier, especially with another king (Josiah) being mentioned in a parallel manner. Likely he was very comfortable among the ruling class and not some radical outsider like Amos. Critique from '
  - type: text
    content: inside
  - type: text
    content: ' the system can be especially effective. He and Josiah may even have been cousins.'
  - type: note
    content: 'See R. B. Dillard and T. Longman III, An Introduction to the Old Testament (Grand Rapids, MI: Zondervan, 1994), 415; R. K. Harrison, Introduction to the Old Testament (Grand Rapids, MI: Eerdmans, 1969), 939.'
  - type: text
    content: Zephaniah was a contemporary of Nahum, Jeremiah, and Huldah the prophetess. His name means “the Lord hides” or “the Lord treasures.” Both Zephaniah and you are treasured by the Lord and hidden in his heart (Col. 3:2–3).
  - type: text
    content: Major Themes
  - type: text
    content: The Day of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: ' The theme of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is an overarching one and pervades the entire book. Each of the following major themes listed in this section illustrates an element of either the judgment or blessing of '
  - type: text
    content: Yahweh
  - type: text
    content: ' in the multifaceted manifestations of that complex day.'
  - type: text
    content: 'The hearers of Zephaniah’s message did not receive the warning of this ominous day as good news. Back then, as well as today, evildoers often appear to go through life with as much favor as good people. But God will balance the cosmic checkbook. A holy God cannot tolerate evil. Justice must be served. However, it is also equally true that the grace and mercy of God can never be extinguished. His promised plan of eternal redemption and renewal for humankind—accomplished via the supreme sacrifice of his Messianic Son and King, Jesus Christ—is as certain as the doom of Satan and the total destruction of sin and death. These two phenomena constitute the ultimate fulfillment of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: The Indictment against Judah’s Idolatry.
  - type: text
    content: ' The people of Israel have struggled to maintain an intimate relationship with God since the day they created the golden calf, an inert, artificial barrier between them and their Creator. An idol can be measured and weighed. It has no life and no mystery to it. The worshiper can carry it around or discard it. People use idols to avoid the vulnerability they must risk in any intimate relationship, with others or with God. Thus, idols are a form of spiritual “pornography,” which keeps us from the real God. God was not angry because Israel was breaking some arbitrary idol rule but because she was avoiding a deep relationship with him and settling for a false substitute.'
  - type: text
    content: 'Arguably, the sin of idolatry was the most egregious act of rebellion against God that Israel (and Judah) had ever committed. First and foremost, it was both a denial and a betrayal of his unparalleled uniqueness. '
  - type: text
    content: Yahweh
  - type: text
    content: ' was Israel’s supreme covenant Lord, the one true and living God who had delivered them single-handedly out of their four-hundred-year captivity in Egypt. And in return, God demanded an exclusive, wholehearted devotion from his people as a mandatory response of gratitude for the love and mercy he showed to them. God encapsulated this exclusive worship in the first and greatest of the Ten Commandments, wherein God commanded the people to have no other gods except God himself (Deut. 5:7); in fact, this command lay at the heart of the entire covenant with Israel. Violation of this stipulation would result in the direst consequences for the people of God, and sadly, the history of Israel reveals an all-too-tragic willingness on their part to ignore that solemn requirement. It is, therefore, no surprise that Zephaniah recorded the terrifying denunciation of the people of Judah in the opening chapter of his prophecy, showing that their worship of pagan idols would result in catastrophic punishment at the hands of their God. And, to reinforce the severity of this judgment, God described it as an outworking of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' against them.'
  - type: text
    content: In conclusion, a profound contrast is notable here. In that deep, exposed relationship between two mysteries, the complex depths of our souls and the boundless power of God, true love and grace (
  - type: text
    content: chesed
  - type: text
    content: ' in Hebrew) are generated. This also provides us with what we need to love others graciously. However, if ever we choose to turn our backs on this wonderfully unique relationship with our God—when we turn to idolatry—we do so at our peril, just like Israel and Judah of old.'
  - type: text
    content: Yahweh
  - type: text
    content: ’s Avenging Anger.
  - type: text
    content: ' Several Hebrew terms denote the anger, or wrath, of God in Zephaniah (Zeph. 1:18; 2:2–3; 3:8). In every instance—as is the case throughout the whole of Scripture—this divine anger is a holy, righteous wrath. It is always triggered by the sinful, rebellious actions of humankind—in particular, when God’s own people rebel against him. We should never equate '
  - type: text
    content: Yahweh
  - type: text
    content: ’s anger with sinful, human passions. His anger is always a just and righteous reaction to any affront to his moral perfections or to violations of his sacred commands and statutes. This is the case regardless of whoever is guilty of such transgressions—pagan nations or his own people.
  - type: text
    content: 'One particular term is worthy of special note here—namely, the noun '
  - type: text
    content: qinʾah
  - type: text
    content: ', which is often translated “jealousy” or “anger.” However, the English word '
  - type: text
    content: jealousy
  - type: text
    content: ' has connotations inappropriate for a holy God, as if he were insecure in his relationship with us. Some translations use '
  - type: text
    content: zeal
  - type: text
    content: ', but that doesn’t convey the righteous anger to which '
  - type: text
    content: Yahweh
  - type: text
    content: ' has every right. “Avenging anger” is perhaps the best translation of this Hebrew term, as it reflects the solemn severity of such a terrifying divine response, especially as it characterizes a fearful outworking of a day of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s judgment.
  - type: text
    content: Catastrophic Divine Judgments against the Nations.
  - type: text
    content: ' One significant element of this particular manifestation of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is that the account of the devastating punishments God will hand down to the nations of Philistia, Moab, Ammon, Cush, and Assyria is bracketed by the terrible indictments directed against the “shameless people” of Judah (2:1–3) and Jerusalem, “the filthy and foul city—the city of oppression!” (3:1–8). These judgments include a call for the people of Judah to repent of their unrighteousness if they are to avoid bearing the full brunt of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s wrath (2:3). There is also condemnation for Jerusalem’s refusal to repent of her social, economic, moral, and spiritual corruption (see further discussion under the following theme), including her profaning of the sanctuary (3:1–8). In light of these covenant violations, God deemed it appropriate to include Judah and Jerusalem in the list of nations that were to be on the receiving end of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s wrath. However, it is important to recognize the ray of hope in the midst of these judgments. In 2:6–7, God declared that the once-populous cities of the Philistines would return to pastureland. And it is here that the remnant of Judah would eventually return. This is a brief but shining anticipation of the redemptive climax of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' for the people of '
  - type: text
    content: Yahweh
  - type: text
    content: ' in the second part of chapter 3.'
  - type: text
    content: Inevitable Punishment for Corruption in Jerusalem.
  - type: text
    content: ' By taking on responsibilities and getting things done, some people will inevitably rise to positions of authority. They will then have enhanced access to resources that are unavailable to others. At this point the great temptation always arises to use that authority to one’s own benefit at the expense of those who have less authority. We call this corruption, and virtually all the prophets rage against it. Most nations do not fall because of enemies from without but rather from the rot of corruption from within. Once at the “top,” leaders often use force and coercion to rig the game in their favor, making upward mobility hard or even impossible for others. Zephaniah, in no uncertain terms, came down on this (3:1–5).'
  - type: text
    content: 'What made Jerusalem’s corrupt activities more heinous in the sight of God was the corruption of civic leadership in the city. The common characteristic of the ruling classes in Jerusalem was their arrogant shamelessness, which they showed in their blatant oppression and extortion of others and their utter scorning of the worship of '
  - type: text
    content: Yahweh
  - type: text
    content: '. It is no wonder that God condemned the officials, rulers, priests, and prophets of Jerusalem at the outset of the indictment in 3:1 as a corporate gathering of rebels, oppressors, and those who profane the sacred worship of their Lord. Therefore, the rationale for '
  - type: text
    content: Yahweh
  - type: text
    content: ' pouring out his righteous anger on both the godless nations and Jerusalem was essentially the same.'
  - type: text
    content: Promised Hope for the Future.
  - type: text
    content: ' As is the case with the majority of the canonical prophets, oracles of divine judgment and wrath—directed at the godless nations neighboring Israel and Judah as well as the people of God themselves—precede the promises of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s grace and mercy. Such promises focus on the renewal, restoration, redemption, and forgiveness of his people and, for the most part, come at the conclusion of the books of prophecy. Zephaniah fits into this pattern.
  - type: text
    content: 'There is no doubt that the prophet primarily expressed the various manifestations of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' to both Judah and the godless nations around her as retribution for rebellion against, and violations of, the divine covenant. However, at the conclusion of Zephaniah (3:9–20), there is a glorious and dramatic reversal in the outworking of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' for both the nations and the faithful remnant of Israel. There is always hope for the faithful remnant. God’s promises of salvation routinely follow his avenging anger with regard, initially, to his chosen people. Most certainly, this is also a word for us today.'
  - type: text
    content: 'Zephaniah expresses this final manifestation of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' as a powerful and comforting hope. Not only will '
  - type: text
    content: Yahweh
  - type: text
    content: ' completely remove punishments for all sins his people committed in the past (3:15), but he also will totally renew the remnant of Israel so that they will no longer utter lies and speak deceitfully (3:13). And they will experience the love of God and his rejoicing over them in a manner they never experienced before (3:17). Such redemption and renewal will include a joyful restoration—a return to their homeland. Such a return will precipitate an expression of honor and praise from all the nations of the world.'
  - type: text
    content: 'One must also not overlook the promise of renewal given to the peoples of the earth in 3:9. Here '
  - type: text
    content: Yahweh
  - type: text
    content: ' promised to purify the lips of the peoples so that they would call on his name.'
  - type: text
    content: 'This wonderful and joyful conclusion to the book of Zephaniah is nothing less than an anticipation of the glorious, positive climax of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: —one that points forward to the coming of the Messiah, Jesus Christ.
  - type: text
    content: Seeing Jesus in the Book.
  - type: text
    content: ' The key to understanding how Zephaniah anticipates the coming of the Messiah, Jesus Christ, lies in the final section of the prophecy in 3:9–20. It is in this concluding oracle of hope, outlining the future renewal, restoration, and redemption of the people of '
  - type: text
    content: Yahweh
  - type: text
    content: ', where the prophet revealed the glorious climax of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: As is most often the case with prophetic oracles that anticipate the coming of Jesus to earth, such predictions can have multiple, partial levels of fulfillment embedded in the historical experiences of the people of Israel and Judah. And in each of these progressive stages, the history of God’s people points to the consummate stage of fulfillment in the Messianic gospel age.
  - type: text
    content: 'In Zephaniah 3:9–20, God promised, first of all, to purify corrupted worship, including that of the nation of Judah (3:9–11). It was Jesus who restored true worship of God at the Jerusalem Temple. Then, in 3:13, God promised to renew the speech of his people so that they would always speak the truth. It was one of Jesus’ primary characteristics that he spoke the truth—in the name of God his Father—at all times. He never feared the consequences that his truth-speaking might provoke. Then in 3:14–15, the prophet exhorted the remnant of Judah to rejoice because '
  - type: text
    content: Yahweh
  - type: text
    content: ' removed their punishment and turned back their enemy. He also promised to bring them back to their homeland (3:19–20). At the same time, God promised to be with them, to save them, and to take great delight in them with love and rejoicing (3:17).'
  - type: text
    content: 'The climactic fulfillment of these promises of renewal, restoration, and redemption all take place in the atoning sacrifice of Jesus Christ on the cross. It is Jesus’ death and resurrection that offer a guarantee that all those who put their faith and trust in him will be wholly renewed, restored, and redeemed—for all eternity. The restoration of the earthly kingdom of Judah was only a partial fulfillment of these promises. When Jesus rose from the dead and ascended to heaven, he returned to God, his Father, and claimed the throne of an everlasting kingdom that would never be defeated. This is the absolute, consummate blessing of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' that is yet to come, and it offers a stark, contrasting parallel to the consummate destruction of all the enemies of God and his people.'
  - type: heading
    content: Zephaniah
  - type: heading
    content: The Day of Yahweh
