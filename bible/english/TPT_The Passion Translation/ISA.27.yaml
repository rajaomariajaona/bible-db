    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' the guilt of Jacob will be forgiven.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “atoned for.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet the full proof of their forgiveness will be
- type: usfm
  marker: q1
  children:
  - type: text
    text: when they crush all the altars to false gods
- type: usfm
  marker: q1
  children:
  - type: text
    text: and make them into chalkstones, crushed to pieces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with neither cultic poles nor incense altars still standing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The fortified city lies in ruins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: forsaken and deserted like a wilderness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cattle graze there and lie down,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chewing on twigs and branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The trees are withered and stripped bare,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their women gather dead branches for firewood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because they are a people of no understanding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That is why their Maker will show them no compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he who formed them will show them no favor.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'In that day, from the Egyptian border to the Euphrates, the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will gather one by one the people of Israel, as one sifts wheat from the chaff. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When that day comes, a great trumpet will sound, and those lost in the land of Assyria and Egypt—
  - type: usfm
    marker: it
    children:
    - type: text
      text: all the exiles
  - type: text
    text: '—will come and bow down before the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' in Jerusalem and worship him on the holy mountain!'
