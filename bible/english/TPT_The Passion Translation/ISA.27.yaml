document_id: ISA.27,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Redemption
  - type: text
    content: 'In that day, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: will mercilessly wield his massive, mighty sword
  - type: text
    content: and punish Leviathan, the swift, slithering serpent.
  - type: text
    content: 'He will slay the dragon of the sea '
  - type: note
    content: See Job 41:1–10; Ps. 74:13–14; Isa. 51:9; Ezek. 29:3.
  - type: text
    content: —
  - type: text
    content: Leviathan, the twisting serpent.
  - type: note
    content: Or “the crooked serpent” or “the serpent of confusion.” Satan always attempts to twist and distort the words of God to deceive humanity (see 2 Cor. 11:3). The sword of the Lord is merciless to the enemies of Christ (see Rev. 19:15). The massive, mighty sword of the Lord is the message of the cross (see 1 Cor. 1:18–25). It is mighty to save and will thwart every principality and power (see Col. 2:14–15; Heb. 2:14–15). Leviathan means “coiled” or “contorted.”
  '10':
  - type: text
    content: The fortified city lies in ruins,
  - type: text
    content: forsaken and deserted like a wilderness.
  - type: text
    content: Cattle graze there and lie down,
  - type: text
    content: chewing on twigs and branches.
  '11':
  - type: text
    content: The trees are withered and stripped bare,
  - type: text
    content: and their women gather dead branches for firewood,
  - type: text
    content: because they are a people of no understanding.
  - type: text
    content: That is why their Maker will show them no compassion,
  - type: text
    content: and he who formed them will show them no favor.
  '12':
  - type: text
    content: 'In that day, from the Egyptian border to the Euphrates, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will gather one by one the people of Israel, as one sifts wheat from the chaff. '
  '13':
  - type: text
    content: When that day comes, a great trumpet will sound, and those lost in the land of Assyria and Egypt—
  - type: text
    content: all the exiles
  - type: text
    content: '—will come and bow down before the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' in Jerusalem and worship him on the holy mountain!'
  '2':
  - type: text
    content: In that day, they will sing the song “The Vineyard of Delight.”
  '3':
  - type: text
    content: “I, the Lord, watch over my vineyard of delight.
  - type: text
    content: 'Moment by moment, I water it '
  - type: text
    content: in love
  - type: text
    content: and protect it day and night.
  '4':
  - type: text
    content: There is no anger in me,
  - type: text
    content: for if I found briars and thorns
  - type: text
    content: I would burn them up and march to battle against them.
  '5':
  - type: text
    content: So let the branches cling to my protection
  - type: note
    content: See John 15:5.
  - type: text
    content: when they make true peace with me.
  - type: text
    content: Yes, let them make me their friend.”
  - type: note
    content: Or “make true peace with me.”
  - type: heading
    content: Cleansing, Not Destruction
  '6':
  - type: text
    content: 'The coming ones '
  - type: note
    content: Although most translations read “In days to come,” the literal Hebrew is “Those to come.”
  - type: text
    content: of Jacob’s tribes will take root.
  - type: text
    content: Israel’s branches will bud and blossom,
  - type: text
    content: and her beautiful fruit will cover the face of the earth.
  '7':
  - type: text
    content: 'Has '
  - type: text
    content: Yahweh
  - type: text
    content: ' struck Israel'
  - type: text
    content: as other nations have struck her?
  - type: note
    content: Commentators and linguists agree that this is one of the more difficult verses to translate in Isaiah (as is the section to follow). A literal rendering is “Like the striking down of the one striking him down, does he strike him down?” A possible meaning of this verse could be “Israel has not been punished by the Lord as he has punished Israel’s enemies.”
  - type: text
    content: Has Israel been killed like her enemies have been killed?
  '8':
  - type: text
    content: No, but with measured justice
  - type: text
    content: he exiled them and contended with them.
  - type: note
    content: The meaning of this line is uncertain.
  - type: text
    content: 'He removed them '
  - type: text
    content: from the land
  - type: text
    content: ' with his severe blast'
  - type: text
    content: on the day his searing east wind blew.
  '9':
  - type: text
    content: 'By '
  - type: text
    content: the mercy of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' the guilt of Jacob will be forgiven.'
  - type: note
    content: Or “atoned for.”
  - type: text
    content: Yet the full proof of their forgiveness will be
  - type: text
    content: when they crush all the altars to false gods
  - type: text
    content: and make them into chalkstones, crushed to pieces,
  - type: text
    content: with neither cultic poles nor incense altars still standing.
