  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I, the Lord, watch over my vineyard of delight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Moment by moment, I water it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in love
- type: usfm
  marker: q1
  children:
  - type: text
    text: and protect it day and night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: There is no anger in me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for if I found briars and thorns
- type: usfm
  marker: q1
  children:
  - type: text
    text: I would burn them up and march to battle against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
