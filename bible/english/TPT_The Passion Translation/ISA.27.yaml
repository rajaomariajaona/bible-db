verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Redemption
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In that day, the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will mercilessly wield his massive, mighty sword
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and punish Leviathan, the swift, slithering serpent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will slay the dragon of the sea '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 41:1–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 74:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 51:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 29:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leviathan, the twisting serpent.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the crooked serpent” or “the serpent of confusion.” Satan always attempts to twist and distort the words of God to deceive humanity (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The sword of the Lord is merciless to the enemies of Christ (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The massive, mighty sword of the Lord is the message of the cross (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1:18–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). It is mighty to save and will thwart every principality and power (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 2:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Leviathan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “coiled” or “contorted.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The fortified city lies in ruins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: forsaken and deserted like a wilderness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cattle graze there and lie down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chewing on twigs and branches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The trees are withered and stripped bare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their women gather dead branches for firewood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they are a people of no understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why their Maker will show them no compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he who formed them will show them no favor.
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'In that day, from the Egyptian border to the Euphrates, the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will gather one by one the people of Israel, as one sifts wheat from the chaff. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When that day comes, a great trumpet will sound, and those lost in the land of Assyria and Egypt—
    - type: usfm
      marker: it
      children:
      - type: text
        text: all the exiles
    - type: text
      text: '—will come and bow down before the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' in Jerusalem and worship him on the holy mountain!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: In that day, they will sing the song “The Vineyard of Delight.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “I, the Lord, watch over my vineyard of delight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Moment by moment, I water it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in love
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and protect it day and night.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: There is no anger in me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for if I found briars and thorns
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would burn them up and march to battle against them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So let the branches cling to my protection
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 15:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they make true peace with me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, let them make me their friend.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “make true peace with me.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cleansing, Not Destruction
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The coming ones '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although most translations read “In days to come,” the literal Hebrew is “Those to come.”
      marker-yv: yv-n
    - type: text
      text: of Jacob’s tribes will take root.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israel’s branches will bud and blossom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her beautiful fruit will cover the face of the earth.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Has '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' struck Israel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as other nations have struck her?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Commentators and linguists agree that this is one of the more difficult verses to translate in Isaiah (as is the section to follow). A literal rendering is “Like the striking down of the one striking him down, does he strike him down?” A possible meaning of this verse could be “Israel has not been punished by the Lord as he has punished Israel’s enemies.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has Israel been killed like her enemies have been killed?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: No, but with measured justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he exiled them and contended with them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of this line is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He removed them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from the land
    - type: text
      text: ' with his severe blast'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on the day his searing east wind blew.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'By '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the mercy of
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' the guilt of Jacob will be forgiven.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 27:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “atoned for.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet the full proof of their forgiveness will be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they crush all the altars to false gods
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make them into chalkstones, crushed to pieces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with neither cultic poles nor incense altars still standing.
