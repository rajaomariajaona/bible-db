  - type: text
    text: 'The coming ones '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although most translations read “In days to come,” the literal Hebrew is “Those to come.”
    marker-yv: yv-n
  - type: text
    text: of Jacob’s tribes will take root.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel’s branches will bud and blossom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and her beautiful fruit will cover the face of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Has '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' struck Israel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: as other nations have struck her?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Commentators and linguists agree that this is one of the more difficult verses to translate in Isaiah (as is the section to follow). A literal rendering is “Like the striking down of the one striking him down, does he strike him down?” A possible meaning of this verse could be “Israel has not been punished by the Lord as he has punished Israel’s enemies.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has Israel been killed like her enemies have been killed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: No, but with measured justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: he exiled them and contended with them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this line is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He removed them '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from the land
  - type: text
    text: ' with his severe blast'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the day his searing east wind blew.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
