      text: Yahweh
  - type: text
    text: '. So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had made an oath that they would not see the land he had promised to give their ancestors, a fertile land. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
