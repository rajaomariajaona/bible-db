document_id: JOS.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s People at Gilgal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the Amorite kings west of the Jordan and all the Canaanite kings along the coast of the Mediterranean Sea became terrified of the Israelites. For when they heard how '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' miraculously dried up the Jordan so that the Israelites could cross over, all their courage melted away.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While encamped at Gilgal, not far from Jericho, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the plains of Jericho.”
      marker-yv: yv-n
    - type: text
      text: 'the Israelites celebrated the Feast of Passover '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Feast of Passover commemorated their deliverance from slavery in Egypt. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 12:1–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in the evening of the fourteenth day of the month '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Abib
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abib was the first month of the Jewish ecclesiastical calendar and was later changed to Nisan after the Babylonian captivity. It is roughly April in the Gregorian calendar.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The very next day, they ate for the first time food grown in Canaan—roasted grain and flatbread made without yeast. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day, when they ate the produce of the land, the manna '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Manna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “what is it?” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 16:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '31'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . For forty years, God supernaturally fed his people in the wilderness (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 16:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Manna is also called “angels’ food” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 78:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'stopped falling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from heaven
    - type: text
      text: . The Israelites never ate manna again, but that year they enjoyed the fruit of the land of Canaan.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Commander of the Armies of Heaven
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joshua was near Jericho, he looked up and saw standing in front of him a man holding a drawn sword. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is nothing in the text to indicate that this was a vision. Joshua physically saw this tangible man before him.
      marker-yv: yv-n
    - type: text
      text: Joshua approached him and said, “Are you on our side or on our enemies’?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Neither,” he replied. “I have not come '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to take sides but
    - type: text
      text: ' to take charge. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This encounter was not a matter of Joshua gaining the allegiance of the Lord but of the Lord gaining the allegiance of Joshua.
      marker-yv: yv-n
    - type: text
      text: 'I am the Commander of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s armies.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: No doubt, the imposing walls of Jericho that stood before Israel intimidated Joshua. Suddenly the Commander came to take over the leadership of his armies. Also, these armies were not only earthly but also the greater armies of the angelic host that stood ready to follow their heavenly Commander into battle. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 6:15–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . He was about to give Joshua a supernatural and illogical strategy for taking the city of Jericho.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: At once
    - type: text
      text: ', Joshua threw himself facedown to the ground and worshiped, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joshua worshiped this “Commander,” showing that he was neither an angel nor a human messenger but Jesus. This was a Christophany (a pre-incarnate appearing of Christ). Furthermore, the Commander called the ground Joshua was upon “holy” because of the presence of the Holy One. Compare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 16:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 32:24–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:12–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13:3–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and he said to him, “I will do whatever you command, my Lord.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Commander of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s armies said to Joshua, “Remove your sandals, for you are standing on holy ground!” And Joshua obeyed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This chapter teaches us many principles to prepare us to enter our own spiritual “promised land” to claim our endless spiritual blessings (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). First, we cross over into a new day, burying our old identity in Jordan’s flood. Second, we submit our hearts to Jesus (Joshua), cutting off flesh, experiencing the circumcision of the heart. Third, we enjoy a Passover Feast, receiving full deliverance from sin and victory over our enemies (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 5:6–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Fourth, we get a new diet for conquerors (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Heb. 5:11–6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Manna (the life of Christ while he was on earth) has ceased, and the new roasted grain has become our feast. Jesus passed through the fires of God’s judgment for our sins and has now become the grain of wheat who fell into the ground (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 12:24–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Now he is raised with many grains of wheat (our co-resurrection with Christ, see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). We eat the unleavened bread of single-hearted devotion and purity in the love feast we enjoy in Christ (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Fifth, we encounter the Commander of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s armies, knowing that he will lead us forward in “endless triumph” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 2:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). These principles prepare us to enter into our spiritual promised land and into a new dimension of spiritual warfare (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' commanded Joshua, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and Joshua were friends. How wonderful to know that God will converse with his servants.
      marker-yv: yv-n
    - type: text
      text: '“Make knives of flint and circumcise '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Circumcision, the cutting off of the foreskin from the penis, was the sign of the covenant that God made with Abraham (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:9–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The reason for doing this is given in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 5:4–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The male children born while Israel was wandering in the wilderness for forty years had not been circumcised. This would leave Israel vulnerable for a number of days as the men healed.
      marker-yv: yv-n
    - type: text
      text: 'the men of Israel again.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the second time.” All male Israelites had been circumcised before their exodus from Egypt (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 12:44–51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), so this would be the nation’s second time.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua made stone knives and circumcised all the men at '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a place they named
    - type: text
      text: ' Circumcision Hill.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Gibeath Haaraloth.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gibeath Haaraloth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “Hill of Foreskins.” There could have been more than a half million men who were circumcised at that time. The Hebrew word for “circumcision” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: muwl
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “to cut short,” “to blunt,” “to destroy,” or “to cut in pieces.” The principle of circumcision is that the flesh (human nature apart from divine influence) must be cut off and removed if God’s people are to enter into the fullness of their spiritual inheritance (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:10–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Circumcision was performed on the eighth day after birth (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Eight is the number of a new beginning. The circumcision of the heart (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 30:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 2:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) frees us to hear from God, to live in the Spirit of God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and to enter into the fullness of God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 6:1–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua had to circumcise all the men and boys—all the fighting men. Although they had been circumcised before leaving Egypt, the male children born during the forty years they spent in the wilderness had not been circumcised. Also, by the end of that forty years, all the fighting men who had come out of Egypt had died because they had not listened to the voice of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. So '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had made an oath that they would not see the land he had promised to give their ancestors, a fertile land. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he raised up their sons in their place, and Joshua circumcised them because they had not been circumcised on the way.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the circumcision was completed, the whole nation waited in the camp until their wounds had healed. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to Joshua, “Today, I have rolled away your disgrace from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: being slaves in
    - type: text
      text: ' Egypt.” For that reason, the place is named Gilgal '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gilgal
      - type: usfm
        marker: ft
