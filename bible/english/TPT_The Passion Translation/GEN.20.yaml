document_id: GEN.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Sarah Taken into the King’s Harem
  - type: text
    content: 'Abraham journeyed from '
  - type: text
    content: the oaks of Mamre
  - type: text
    content: ' to the southern region of Canaan '
  - type: note
    content: Or “the land of the Negev.”
  - type: text
    content: 'and settled between Kadesh and Shur, to live as a temporary resident in Gerar. '
  - type: note
    content: This would have been an arduous journey as Abraham was a very wealthy man with hundreds of servants and many flocks and herds of livestock. Gerar means “lodging place” and was a Philistine city-kingdom south of Gaza.
  '10':
  - type: text
    content: Then Abimelech asked, “What is your purpose in doing this?”
  '11':
  - type: text
    content: 'Abraham answered, “Because I thought, ‘There’s no one here that fears God. They will kill me to get to my wife.’ '
  - type: note
    content: Or “over the matter of my wife.”
  '12':
  - type: text
    content: 'Besides, she really is my half sister. She’s my father’s daughter, but not my mother’s, so I married her. '
  '13':
  - type: text
    content: When God sent me out to wander from my father’s house, I said to her, ‘Here is how you can show your love for me. Everywhere we go, you must say about me, “He’s my brother.” ’ ”
  '14':
  - type: text
    content: 'Then Abimelech gave Abraham’s wife Sarah back to him. In addition, he gave him sheep, cattle, and both male and female servants. '
  '15':
  - type: text
    content: 'Abimelech told him, “Look, my land is now before you; feel free to settle wherever you please.” '
  '16':
  - type: text
    content: 'Then he turned to Sarah and said, “I am giving your brother a thousand pieces of silver '
  - type: note
    content: Or “a thousand shekels,” which would amount to about twenty-five pounds of silver.
  - type: text
    content: 'as compensation to settle any claim against me, to exonerate you in the eyes of all who are with you, '
  - type: note
    content: Or “a covering of eyes.” The Hebrew is uncertain.
  - type: text
    content: and to clear your reputation.”
  '17':
  - type: text
    content: 'Then Abraham prayed to God; and God healed Abimelech! He also healed Abimelech’s wife and female servants '
  - type: text
    content: of their infertility
  - type: text
    content: ' and they began to have babies again. '
  - type: note
    content: Considering that Abraham’s wife had never given him a child, it was an amazing miracle for Abraham to pray for someone else to give birth! The very first healing in the Bible was through the prayer of a childless man, Abraham. He had no confidence in himself as he prayed this prayer of faith. However, he could pray in total confidence that it had to be God doing the miracle. He prayed for the very thing he had not yet received. When the last two verses of Gen. 20 are read together with the first two verses of Gen. 21, we see that Isaac’s conception occurred as a result of Abraham’s prayer for another person with an identical need.
  '18':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' had shut all the wombs of the women of Abimelech’s household because he took Sarah, Abraham’s wife.'
  '2':
  - type: text
    content: 'Now Abraham had said about his wife Sarah, “She’s my sister.” So Abimelech, '
  - type: note
    content: 'Abimelech has two possible meanings: “Melech [Molech] is my father” or “my father is king.”'
  - type: text
    content: 'king of Gerar, sent for her and took her '
  - type: text
    content: into his harem
  - type: text
    content: '. '
  - type: note
    content: 'Sarah was ninety years old. God had supernaturally rejuvenated her and made her attractive to a king. According to Jewish tradition, “her flesh was rejuvenated, her wrinkles smoothed out, and her original beauty was restored” (Bava Metzi’a 87a). The Dead Sea Scrolls likewise comment on Sarah’s miraculous restoration due to her faith in the promise of God with these words: “Fair indeed are her eyes . . . and all the radiance of her face . . . and her hands how perfect. Her legs how beautiful and without blemish her thighs . . . And when the king heard the words of [his three officials], he desired her exceedingly, and he sent [them] at once to bring her to him, and he looked upon her and marveled at all her loveliness . . . and he [God] sought to slay me.” See The Message of the Dead Sea Scrolls, Simon & Schuster, 1957.'
  '3':
  - type: text
    content: 'One night, God appeared to Abimelech in a dream '
  - type: note
    content: We see from this not only that God speaks in dreams to the righteous, but that he will also come to the lost and share his heart with them (see Prov. 21:1). Dreams are powerful avenues into the human spirit. God may speak to you in dreams, if you will listen.
  - type: text
    content: 'and said to him, “You’re as good as dead, for you have taken '
  - type: text
    content: into your harem
  - type: text
    content: ' a married woman!”'
  '4':
  - type: text
    content: 'Now Abimelech had not touched Sarah, so he said to the Lord, “Would you really destroy people who are innocent? '
  - type: note
    content: Or “Would you really slaughter an innocent nation?”
  '5':
  - type: text
    content: Didn’t the man tell me, ‘She is my sister’? And didn’t she agree and say, ‘Yes, he’s my brother’? I’ve done this with clean hands and a clear conscience.”
  '6':
  - type: text
    content: 'Then God answered him in the dream, “Yes, I know you did this with a clear conscience. Furthermore, it was I who kept you from sinning and kept you from touching her. '
  '7':
  - type: text
    content: 'Now return the man’s wife, and because he is a prophet, '
  - type: note
    content: This is the first time the word “prophet” is found in the Bible. The Hebrew word navi’ means “to bubble up,” referring to the stirring of the Holy Spirit that bubbles up through the prophet with divine utterance. Navi’ is the most common word used for “prophet” and can also be translated “to declare” or “one who declares.” However, some etymologists connect it with Akkadian word nabû, “to call.” Assyrian kings had the title of “the one called,” that is, called by the gods. The form navi’ in Hebrew could also signify “one who receives the [divine] call.”
  - type: text
    content: he will intercede on your behalf that you may live. But if you don’t give her back—you will certainly die, you and your entire household.”
  - type: note
    content: See Ps. 105:15.
  '8':
  - type: text
    content: 'So Abimelech rose early in the morning and gathered all his servants. When he told them about his dream, they were terrified! '
  '9':
  - type: text
    content: 'Abimelech summoned Abraham and asked him, “What is this trick you have played on us? I did nothing wrong to you. Why would you bring such great guilt upon me and my kingdom? You have done to me what no one should ever do to another.” '
