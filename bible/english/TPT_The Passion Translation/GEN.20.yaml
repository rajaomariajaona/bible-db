document_id: GEN.20,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sarah Taken into the King’s Harem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham journeyed from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the oaks of Mamre
    - type: text
      text: ' to the southern region of Canaan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the land of the Negev.”
      marker-yv: yv-n
    - type: text
      text: 'and settled between Kadesh and Shur, to live as a temporary resident in Gerar. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would have been an arduous journey as Abraham was a very wealthy man with hundreds of servants and many flocks and herds of livestock.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gerar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “lodging place” and was a Philistine city-kingdom south of Gaza.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abimelech asked, “What is your purpose in doing this?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham answered, “Because I thought, ‘There’s no one here that fears God. They will kill me to get to my wife.’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “over the matter of my wife.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Besides, she really is my half sister. She’s my father’s daughter, but not my mother’s, so I married her. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When God sent me out to wander from my father’s house, I said to her, ‘Here is how you can show your love for me. Everywhere we go, you must say about me, “He’s my brother.” ’ ”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abimelech gave Abraham’s wife Sarah back to him. In addition, he gave him sheep, cattle, and both male and female servants. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimelech told him, “Look, my land is now before you; feel free to settle wherever you please.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he turned to Sarah and said, “I am giving your brother a thousand pieces of silver '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a thousand shekels,” which would amount to about twenty-five pounds of silver.
      marker-yv: yv-n
    - type: text
      text: 'as compensation to settle any claim against me, to exonerate you in the eyes of all who are with you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a covering of eyes.” The Hebrew is uncertain.
      marker-yv: yv-n
    - type: text
      text: and to clear your reputation.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abraham prayed to God; and God healed Abimelech! He also healed Abimelech’s wife and female servants '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of their infertility
    - type: text
      text: ' and they began to have babies again. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Considering that Abraham’s wife had never given him a child, it was an amazing miracle for Abraham to pray for someone else to give birth! The very first healing in the Bible was through the prayer of a childless man, Abraham. He had no confidence in himself as he prayed this prayer of faith. However, he could pray in total confidence that it had to be God doing the miracle. He prayed for the very thing he had not yet received. When the last two verses of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are read together with the first two verses of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', we see that Isaac’s conception occurred as a result of Abraham’s prayer for another person with an identical need.'
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had shut all the wombs of the women of Abimelech’s household because he took Sarah, Abraham’s wife.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abraham had said about his wife Sarah, “She’s my sister.” So Abimelech, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abimelech
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'has two possible meanings: “Melech [Molech] is my father” or “my father is king.”'
      marker-yv: yv-n
    - type: text
      text: 'king of Gerar, sent for her and took her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into his harem
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sarah was ninety years old. God had supernaturally rejuvenated her and made her attractive to a king. According to Jewish tradition, “her flesh was rejuvenated, her wrinkles smoothed out, and her original beauty was restored” (Bava Metzi’a 87a). The Dead Sea Scrolls likewise comment on Sarah’s miraculous restoration due to her faith in the promise of God with these words: “Fair indeed are her eyes . . . and all the radiance of her face . . . and her hands how perfect. Her legs how beautiful and without blemish her thighs . . . And when the king heard the words of [his three officials], he desired her exceedingly, and he sent [them] at once to bring her to him, and he looked upon her and marveled at all her loveliness . . . and he [God] sought to slay me.” See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Message of the Dead Sea Scrolls
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Simon & Schuster, 1957.'
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One night, God appeared to Abimelech in a dream '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We see from this not only that God speaks in dreams to the righteous, but that he will also come to the lost and share his heart with them (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Dreams are powerful avenues into the human spirit. God may speak to you in dreams, if you will listen.
      marker-yv: yv-n
    - type: text
      text: 'and said to him, “You’re as good as dead, for you have taken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into your harem
    - type: text
      text: ' a married woman!”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abimelech had not touched Sarah, so he said to the Lord, “Would you really destroy people who are innocent? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Would you really slaughter an innocent nation?”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Didn’t the man tell me, ‘She is my sister’? And didn’t she agree and say, ‘Yes, he’s my brother’? I’ve done this with clean hands and a clear conscience.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God answered him in the dream, “Yes, I know you did this with a clear conscience. Furthermore, it was I who kept you from sinning and kept you from touching her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now return the man’s wife, and because he is a prophet, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the first time the word “prophet” is found in the Bible. The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: navi’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to bubble up,” referring to the stirring of the Holy Spirit that bubbles up through the prophet with divine utterance.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Navi’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the most common word used for “prophet” and can also be translated “to declare” or “one who declares.” However, some etymologists connect it with Akkadian word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: nabû
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', “to call.” Assyrian kings had the title of “the one called,” that is, called by the gods. The form'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: navi’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Hebrew could also signify “one who receives the [divine] call.”
      marker-yv: yv-n
    - type: text
      text: he will intercede on your behalf that you may live. But if you don’t give her back—you will certainly die, you and your entire household.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 20:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 105:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abimelech rose early in the morning and gathered all his servants. When he told them about his dream, they were terrified! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimelech summoned Abraham and asked him, “What is this trick you have played on us? I did nothing wrong to you. Why would you bring such great guilt upon me and my kingdom? You have done to me what no one should ever do to another.” '
