document_id: PSA.60,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Has God Forgotten Us?
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'King David’s poem for instruction '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '60'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “According to Shushan Eduth. A Mikhtam of David, to teach.” There is no scholarly consensus about what
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shushan Eduth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means. Some have concluded it refers to a specific tune or possibly an instrument, but it remains a mystery.
      marker-yv: yv-n
    - type: text
      text: composed when he fought against the Syrians with the outcome still uncertain and Joab turned back to kill twelve thousand descendants of Esau in the Valley of Salt
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “Lily of the Covenant”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God, it seems like you walked off and left us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have you turned against us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been angry with us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O Lord, we plead, come back and help us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a father
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Have you really rejected us, refusing to fight our battles?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Give us a father’s help when we face our enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For to trust in any man is an empty hope.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: With God’s help we will fight like heroes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he will trample down our every foe!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The earth quivers and quakes before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: splitting open and breaking apart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now come and heal it, for it is shaken to its depths.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You have taught us hard lessons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made us drink the wine of bewilderment.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: You have given miraculous signs to those who love you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As we follow you, we fly the flag of truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all who love the truth will rally to it.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Come to your beloved ones and gently draw us out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Lord, you save those whom you love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come with your might and strength!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: Then I heard the Lord speak in his holy splendor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From his sanctuary I heard the Lord promise:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “In my triumph I will be the one to measure out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the portion of my inheritance to my people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will secure the land as I promised you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shechem, Succoth, Gilead, Manasseh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they are all still mine!” he says.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Judah will continue to produce kings and lawgivers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Ephraim will produce great warriors.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Moab will become my lowly servant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Edom will likewise serve my purposes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lift up a shout of victory over the land of Philistia!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But who will bring my triumph into the strong city?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who will lead me into Edom’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 60:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Edom is a variant form of the name Adam.
      marker-yv: yv-n
    - type: text
      text: fortresses?”
