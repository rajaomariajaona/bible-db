document_id: PSA.60,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Has God Forgotten Us?
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: 'King David’s poem for instruction '
  - type: note
    content: Or “According to Shushan Eduth. A Mikhtam of David, to teach.” There is no scholarly consensus about what Shushan Eduth means. Some have concluded it refers to a specific tune or possibly an instrument, but it remains a mystery.
  - type: text
    content: composed when he fought against the Syrians with the outcome still uncertain and Joab turned back to kill twelve thousand descendants of Esau in the Valley of Salt
  - type: text
    content: To the tune of “Lily of the Covenant”
  - type: text
    content: God, it seems like you walked off and left us!
  - type: text
    content: Why have you turned against us?
  - type: text
    content: You have been angry with us.
  - type: text
    content: 'O Lord, we plead, come back and help us '
  - type: text
    content: as a father
  - type: text
    content: .
  '10':
  - type: text
    content: Have you really rejected us, refusing to fight our battles?
  '11':
  - type: text
    content: Give us a father’s help when we face our enemies.
  - type: text
    content: For to trust in any man is an empty hope.
  '12':
  - type: text
    content: With God’s help we will fight like heroes,
  - type: text
    content: and he will trample down our every foe!
  '2':
  - type: text
    content: The earth quivers and quakes before you,
  - type: text
    content: splitting open and breaking apart.
  - type: text
    content: Now come and heal it, for it is shaken to its depths.
  '3':
  - type: text
    content: You have taught us hard lessons
  - type: text
    content: and made us drink the wine of bewilderment.
  '4':
  - type: text
    content: You have given miraculous signs to those who love you.
  - type: text
    content: As we follow you, we fly the flag of truth,
  - type: text
    content: and all who love the truth will rally to it.
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: Come to your beloved ones and gently draw us out.
  - type: text
    content: For Lord, you save those whom you love.
  - type: text
    content: Come with your might and strength!
  '6':
  - type: text
    content: Then I heard the Lord speak in his holy splendor.
  - type: text
    content: 'From his sanctuary I heard the Lord promise:'
  - type: text
    content: “In my triumph I will be the one to measure out
  - type: text
    content: the portion of my inheritance to my people,
  - type: text
    content: and I will secure the land as I promised you.
  - type: text
    content: Shechem, Succoth, Gilead, Manasseh,
  - type: text
    content: they are all still mine!” he says.
  - type: text
    content: “Judah will continue to produce kings and lawgivers,
  - type: text
    content: and Ephraim will produce great warriors.
  '8':
  - type: text
    content: Moab will become my lowly servant.
  - type: text
    content: Edom will likewise serve my purposes.
  - type: text
    content: I will lift up a shout of victory over the land of Philistia!
  '9':
  - type: text
    content: But who will bring my triumph into the strong city?
  - type: text
    content: 'Who will lead me into Edom’s '
  - type: note
    content: Edom is a variant form of the name Adam.
  - type: text
    content: fortresses?”
