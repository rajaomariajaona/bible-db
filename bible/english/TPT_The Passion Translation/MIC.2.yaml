document_id: MIC.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Will Punish Those Who Oppress the Poor
  - type: text
    content: Disaster is ahead for those who plot evil. They’re as good as dead!
  - type: text
    content: Disaster is ahead for those who scheme as they lie on their bed.
  - type: text
    content: No sooner is it dawn than they act on their plan
  - type: text
    content: just because they can.
  '10':
  - type: text
    content: Get up and get out!
  - type: text
    content: This is no longer your resting place.
  - type: text
    content: Because of this defilement, I will completely destroy you,
  - type: text
    content: and your destruction will be severe beyond measure.
  '11':
  - type: text
    content: If a lying windbag comes to deceive you, saying,
  - type: text
    content: '‘I prophesy wine and liquor '
  - type: note
    content: Or “beer.” The Hebrew term shekar denotes any strong, intoxicating drink.
  - type: text
    content: will flow for you,’
  - type: text
    content: he would be the ideal prophet for a people like this.”
  - type: heading
    content: Yahweh’s Promise of Restoration
  '12':
  - type: text
    content: “I will regather the tribes of Jacob.
  - type: text
    content: Yes
  - type: text
    content: ', I will regather the remnant of Israel.'
  - type: text
    content: I will bring you together like sheep in a fold,
  - type: text
    content: like a flock within their pasture,
  - type: text
    content: a noisy, excited multitude.
  '13':
  - type: text
    content: '“The Barrier-Breaker will lead them out '
  - type: text
    content: into freedom
  - type: text
    content: .
  - type: note
    content: Or “A breaker will ascend before them.” The same one who punished them for their rebellion and allowed Israel to go into exile will be the one who rescues them and leads them back to their own land. Jesus, the Messiah, is the one who broke through the gates of death, passed through the torn veil, and ascended to the Father. Our Shepherd-King leads the charge, and those who follow him likewise pass through every barrier. He breaks out ready to conquer (see Rev. 6:2). Jesus is the Barrier-Breaker who lives in us.
  - type: text
    content: They will all break out,
  - type: text
    content: 'passing through the '
  - type: text
    content: enemy’s
  - type: text
    content: ' gates.'
  - type: text
    content: Their king will advance before their eyes
  - type: text
    content: 'with '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself leading the way!”'
  - type: note
    content: Or “Yahweh at their head.”
  '2':
  - type: text
    content: They covet someone’s field and seize it for themselves,
  - type: text
    content: and they take over his house as well.
  - type: text
    content: They defraud a man of his home
  - type: note
    content: Or “household.” This may be a reference to people being forced to sell themselves into slavery to pay their debts.
  - type: text
    content: and another man of his inheritance.
  '3':
  - type: text
    content: 'So here’s what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has to say about that:'
  - type: text
    content: “Now I am the one plotting a disaster
  - type: text
    content: for those who plot to defraud others,
  - type: text
    content: a disaster from which you cannot escape.
  - type: note
    content: Or “which you cannot remove from your neck.” The Hebrew hints of a metaphor of an ox yoke that will be put on the rich, which they will not be able to remove.
  - type: text
    content: You will no longer walk with heads held high,
  - type: text
    content: for a catastrophe will bring you low.
  '4':
  - type: text
    content: And when that time comes,
  - type: text
    content: people will adopt a taunting proverb about you
  - type: text
    content: 'and sing this mournful song to mock your sad experience:'
  - type: text
    content: ‘We have lost everything!
  - type: text
    content: God has divided up our people’s lands
  - type: text
    content: with no one left to restore it to our hands.
  - type: note
    content: Or “How could God take them [lands] from me?”
  - type: text
    content: Our property has been seized
  - type: text
    content: and given to our captors—the traitors.’ ”
  - type: note
    content: Or “Our property has been assigned to infidels [Babylonians/Assyrians].”
  '5':
  - type: text
    content: 'Because of this, when '
  - type: text
    content: Yahweh
  - type: text
    content: ' restores the land to his people,'
  - type: text
    content: 'those '
  - type: text
    content: corrupt leaders
  - type: text
    content: ' will have no stake in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s assembly
  - type: text
    content: nor have any part in the distribution of land.
  - type: note
    content: That is, the rapacious, wealthy landowners will have no part in any future redistribution of the land.
  - type: heading
    content: Hostility to Micah’s Message
  '6':
  - type: text
    content: They berate me continually. “Don’t prophesy,” they say to me.
  - type: text
    content: “Don’t keep prophesying on and on about these things!
  - type: text
    content: Disgrace will not overtake us.”
  '7':
  - type: text
    content: Should Jacob’s descendants even be asking,
  - type: text
    content: '“Is the Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' really so short-tempered'
  - type: text
    content: 'that he would do such things '
  - type: text
    content: to us
  - type: text
    content: ?”
  - type: note
    content: In this context, the rich who oppressed the poor were distorting the truth of God’s patience, mercy, and tolerance (see Ex. 34:6) to give themselves an excuse for continuing their evil conduct. They could not believe that the Lord would really lose his patience and bring back their evil upon their own heads. But God is not mocked. We will reap what we sow. See Gal. 6:7–8.
  - type: heading
    content: Yahweh Responds
  - type: text
    content: “When I speak, don’t my words produce good
  - type: text
    content: within the one who obeys them?
  '8':
  - type: text
    content: 'But you '
  - type: text
    content: wealthy oppressors of the poor
  - type: text
    content: have become like enemies attacking my people.
  - type: note
    content: Or “Lately, my people have risen up like enemies.”
  - type: text
    content: When men return home from war
  - type: text
    content: and think they are finally safe at home,
  - type: text
    content: there you are, ready to snatch the coats off their backs
  - type: text
    content: as security for the money they owe you
  - type: text
    content: .
  - type: note
    content: See Ex. 22:26–27. The Hebrew text of this verse contains a number of difficulties, and a literal translation of it is almost unintelligible without some emendation.
  '9':
  - type: text
    content: You wrongly evict the women of my people
  - type: note
    content: These women were most likely widows.
  - type: text
    content: from the very homes they love,
  - type: text
    content: forever depriving their children
  - type: text
    content: of the honor of their inheritance.
  - type: note
    content: Or “from their children you take my glory forever.”
