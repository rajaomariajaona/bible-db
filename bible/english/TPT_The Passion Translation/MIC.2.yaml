document_id: MIC.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Will Punish Those Who Oppress the Poor
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Disaster is ahead for those who plot evil. They’re as good as dead!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disaster is ahead for those who scheme as they lie on their bed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No sooner is it dawn than they act on their plan
- type: usfm
  marker: q1
  children:
  - type: text
    text: just because they can.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They covet someone’s field and seize it for themselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they take over his house as well.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They defraud a man of his home
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “household.” This may be a reference to people being forced to sell themselves into slavery to pay their debts.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and another man of his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So here’s what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has to say about that:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now I am the one plotting a disaster
- type: usfm
  marker: q1
  children:
  - type: text
    text: for those who plot to defraud others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a disaster from which you cannot escape.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “which you cannot remove from your neck.” The Hebrew hints of a metaphor of an ox yoke that will be put on the rich, which they will not be able to remove.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will no longer walk with heads held high,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for a catastrophe will bring you low.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And when that time comes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: people will adopt a taunting proverb about you
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and sing this mournful song to mock your sad experience:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘We have lost everything!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God has divided up our people’s lands
- type: usfm
  marker: q1
  children:
  - type: text
    text: with no one left to restore it to our hands.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “How could God take them [lands] from me?”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our property has been seized
- type: usfm
  marker: q1
  children:
  - type: text
    text: and given to our captors—the traitors.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Our property has been assigned to infidels [Babylonians/Assyrians].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Because of this, when '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' restores the land to his people,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'those '
  - type: usfm
    marker: it
    children:
    - type: text
      text: corrupt leaders
  - type: text
    text: ' will have no stake in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s assembly
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor have any part in the distribution of land.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the rapacious, wealthy landowners will have no part in any future redistribution of the land.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hostility to Micah’s Message
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They berate me continually. “Don’t prophesy,” they say to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Don’t keep prophesying on and on about these things!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Disgrace will not overtake us.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Should Jacob’s descendants even be asking,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Is the Spirit of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' really so short-tempered'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that he would do such things '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to us
  - type: text
    text: ?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In this context, the rich who oppressed the poor were distorting the truth of God’s patience, mercy, and tolerance (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) to give themselves an excuse for continuing their evil conduct. They could not believe that the Lord would really lose his patience and bring back their evil upon their own heads. But God is not mocked. We will reap what we sow. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 6:7–8
      metadata:
        usfm: GAL.6.7+GAL.6.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' Responds'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: “When I speak, don’t my words produce good
- type: usfm
  marker: q1
  children:
  - type: text
    text: within the one who obeys them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wealthy oppressors of the poor
- type: usfm
  marker: q1
  children:
  - type: text
    text: have become like enemies attacking my people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Lately, my people have risen up like enemies.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: When men return home from war
- type: usfm
  marker: q1
  children:
  - type: text
    text: and think they are finally safe at home,
- type: usfm
  marker: q1
  children:
  - type: text
    text: there you are, ready to snatch the coats off their backs
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: as security for the money they owe you
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 22:26–27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Hebrew text of this verse contains a number of difficulties, and a literal translation of it is almost unintelligible without some emendation.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You wrongly evict the women of my people
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These women were most likely widows.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the very homes they love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: forever depriving their children
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the honor of their inheritance.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from their children you take my glory forever.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Get up and get out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is no longer your resting place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of this defilement, I will completely destroy you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your destruction will be severe beyond measure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: If a lying windbag comes to deceive you, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘I prophesy wine and liquor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “beer.” The Hebrew term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shekar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: denotes any strong, intoxicating drink.
    marker-yv: yv-n
  - type: text
    text: will flow for you,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: he would be the ideal prophet for a people like this.”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s Promise of Restoration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I will regather the tribes of Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes
  - type: text
    text: ', I will regather the remnant of Israel.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring you together like sheep in a fold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a flock within their pasture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a noisy, excited multitude.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“The Barrier-Breaker will lead them out '
  - type: usfm
    marker: it
    children:
    - type: text
      text: into freedom
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A breaker will ascend before them.” The same one who punished them for their rebellion and allowed Israel to go into exile will be the one who rescues them and leads them back to their own land. Jesus, the Messiah, is the one who broke through the gates of death, passed through the torn veil, and ascended to the Father. Our Shepherd-King leads the charge, and those who follow him likewise pass through every barrier. He breaks out ready to conquer (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 6:2
      metadata:
        usfm: REV.6.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Jesus is the Barrier-Breaker who lives in us.
    marker-yv: yv-n
