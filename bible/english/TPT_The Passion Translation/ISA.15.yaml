document_id: ISA.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Judgment of Moab
  - type: text
    content: 'Here is a prophecy concerning Moab:'
  - type: note
    content: Moab (“seed of the father”) was a descendant of Lot conceived out of incest with Lot’s daughter (see Gen. 19:31–37). The Moabites settled in a region east of the Dead Sea. This chapter shows the heart of the prophet Isaiah as he is painfully grieved over the sorrows coming to Moab. Ruth, a Moabite, had a role in forming the house of David, for she was his great-grandmother (see Ruth 4:17–21).
  - type: text
    content: 'The '
  - type: text
    content: city of
  - type: text
    content: ' Ar '
  - type: note
    content: See Num. 21:28.
  - type: text
    content: was devastated, destroyed in the night.
  - type: text
    content: 'The '
  - type: text
    content: city of
  - type: text
    content: ' Kir '
  - type: note
    content: Present-day Al-Kerak, Jordan.
  - type: text
    content: was devastated, destroyed in the night.
  '2':
  - type: text
    content: 'The people of Dibon '
  - type: note
    content: Dibon means “wasting.” Dibon is present-day Dhiban, Jordan.
  - type: text
    content: went to their temple to weep;
  - type: text
    content: they went up to their high places to lament.
  - type: text
    content: Moab wails with sorrow over what happened
  - type: text
    content: 'to Mount Nebo '
  - type: note
    content: Nebo means “prophet” or “scribe [interpreter].”
  - type: text
    content: and Mount Medeba.
  - type: note
    content: Medeba means “waters of peace [gently flowing].” Medeba is present-day Madaba, Jordan.
  - type: text
    content: Humiliated
  - type: text
    content: ', every head is shaved bald and every beard cut off.'
  '3':
  - type: text
    content: 'They '
  - type: text
    content: pour into the streets
  - type: text
    content: ' wearing sackcloth.'
  - type: text
    content: 'In public and in private, '
  - type: note
    content: Or “On their roofs and in their town squares.”
  - type: text
    content: they fall down sobbing.
  '4':
  - type: text
    content: 'The cities of Heshbon '
  - type: note
    content: Heshbon means “intelligence” or “human reasoning.”
  - type: text
    content: 'and Elealah '
  - type: note
    content: Elealeh means “ascent of God” or “God has ascended.”
  - type: text
    content: cry out;
  - type: text
    content: their voices are heard as far away as Jahaz;
  - type: note
    content: Jahaz means “trampled on.”
  - type: text
    content: 'even the bravest warriors '
  - type: note
    content: Or “prepared ones.”
  - type: text
    content: of Moab are shaken to the core.
  '5':
  - type: text
    content: My heart cries out for the people of Moab,
  - type: text
    content: 'for her fugitives who flee to Zoar '
  - type: note
    content: Zoar means “small” or “reduced.” See Gen. 19:23.
  - type: text
    content: and to Eglath-shelishiyah.
  - type: note
    content: Eglath-shelishiyah means “a three-year-old heifer.”
  - type: text
    content: Weeping, they climb the upward road to Luhith.
  - type: note
    content: Luhith means “polished” or “made of planks.”
  - type: text
    content: Their loud cries of anguish are heard
  - type: text
    content: all along the way to Horonaim.
  - type: note
    content: Horonaim means “double caves” or “two hollows.”
  '6':
  - type: text
    content: 'The River Nimrim '
  - type: note
    content: Nimrim means “clear waters.” Possibly present-day Wadi Numeira.
  - type: text
    content: has dried up; the grass has withered;
  - type: text
    content: new growth has failed, and vegetation has vanished.
  '7':
  - type: text
    content: Therefore, the refugees take with them
  - type: text
    content: over the Wadi of the Willows
  - type: text
    content: their possessions and the wealth they have acquired.
  '8':
  - type: text
    content: From one end of the land to the other, Moab is weeping;
  - type: text
    content: 'her wailing reaches to Eglaim '
  - type: note
    content: Eglaim means “double reservoir.”
  - type: text
    content: and Beer-Elim.
  - type: note
    content: Beer-Elim means “the well of God” or “the well of the mighty ones.”
  '9':
  - type: text
    content: 'For the waters of Dimon '
  - type: note
    content: Some manuscripts have “Dibon.” Dimon means “consumed.”
  - type: text
    content: are full of blood,
  - type: text
    content: 'but I have something even worse in store for them:'
  - type: text
    content: 'lions '
  - type: note
    content: Or “Arabians” (LXX).
  - type: text
    content: for the fugitives of Moab
  - type: text
    content: and upon the remnant of the land!
  - type: note
    content: Or “the remnant of Admah” (LXX).
