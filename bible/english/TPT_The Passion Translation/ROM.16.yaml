        children:
        - type: text
          text: means “incomparable.” The Orthodox Church recognizes him as an apostle. He became the bishop of the church of Hyracania (Turkey). In this verse Paul joins five men together. They could have represented the five-fold ministry of
      - type: usfm
        marker: ft
        children:
        - type: text
