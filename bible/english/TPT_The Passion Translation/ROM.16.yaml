      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “deaconess” or “servant,” which would imply she may have held an office in the church. The name Phoebe means “shining,” “radiant,” “bright,” “prophetic.” It is likely that the church in Cenchrea was a house church.
      marker-yv: yv-n
    - type: text
      text: 'of the church in Cenchrea. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or modern-day Kenchreai, which in the days of Paul was a large port city about four miles (seven kilometers) southeast of Corinth in Greece. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
