    children:
    - type: text
      text: Paul Sends His Loving Greetings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, let me introduce to you our dear and beloved sister in the faith, Phoebe, a shining minister '
