        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those of Aristobolos”; by implication, those connected to Aristobolos, or, his “house church.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: household
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
