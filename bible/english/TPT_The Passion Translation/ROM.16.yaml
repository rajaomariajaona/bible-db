        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fatherly” (paternal). He likewise was one of the seventy sent by Jesus and later became the bishop of Neapolis (Naples).
      marker-yv: yv-n
    - type: text
      text: 'Hermas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Hermas was one of the seventy and later became the bishop of Philipopoulis (Bulgaria). There are interesting traditions surrounding Hermas. It is said that he was a very wealthy man but fell into poverty because of his sins. He was visited by an “angel of repentance,” who accompanied him for the rest of his life until he was martyred. There are writings known as “The Shepherd of Hermas” that some scholars attribute to him.
      marker-yv: yv-n
    - type: text
      text: and all the brothers and sisters who meet with them.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give my regards to Philologus, Julia, Nereus and his sister, and also Olympas '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Philologus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “talkative.” He was recognized by the Orthodox Church as an apostle of Christ. It is likely that Julia was his wife and Nereus and his sister were their children. Olympas means “heavenly.” The Orthodox Church recognizes Olympas as an apostle who was mentored by Peter and was beheaded the same day Peter was martyred in Rome. Philologus and Olympas apparently had a measure of influence over a number of “holy believers” in the faith. The majority of the people named in this chapter were not Jewish, and many of their names indicate that they were former slaves. God can bless and anoint anyone who turns to him in faith.
      marker-yv: yv-n
    - type: text
      text: and all the holy believers who meet with them.
  '16':
  - type: usfm
