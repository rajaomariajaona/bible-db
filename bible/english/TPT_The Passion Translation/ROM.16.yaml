      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “preacher of the deity.” He was considered to be one of the seventy sent out by Jesus and later became the bishop of Dalmatia.
      marker-yv: yv-n
    - type: text
      text: 'Patrobas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
