      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “best counselor.” Traditionally he is known as one of the seventy disciples Jesus sent out, and he brought the gospel to Britain.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give my love to my relative Herodion, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Herodion’s name means “heroic.” He was traditionally considered as one of Jesus’ seventy disciples. He later became the bishop of Neoparthia (Iraq), where he was beaten to death by the Jews but was resurrected and continued to preach the gospel. It is believed that he was eventually beheaded in Rome on the same day Peter was martyred.
      marker-yv: yv-n
    - type: text
      text: 'and also to all those of the house church of Narcissus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those of Narcissus.” Although nearly every translation adds the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: household
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', it is not found in the text. By implication, this would be those meeting as a church in his house. Narcissus’ name means “astonished” (or “stupefied”). Some have identified him as a close friend of Emperor Claudius.'
      marker-yv: yv-n
    - type: text
      text: for they too are joined into the Lord.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Please greet Tryphena '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tryphena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “living luxuriously.” Some have identified her as Antonia Tryphaena (10 BC—AD 55), the princess of the Bosporan kingdom of eastern Crimea, and connected to the queen of Thrace. This would mean that she was royal and wealthy.
      marker-yv: yv-n
    - type: text
      text: 'and Tryphosa, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tryphosa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also mean “living luxuriously” or “triple [three-fold] shining.” Some scholars believe that Tryphena and Tryphosa were twin sisters born into royalty.
      marker-yv: yv-n
    - type: text
      text: for they are women who have diligently served the Lord.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Persis, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Persis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to take by storm.” She was a woman from Persia (Iranian background) who was a godly servant and passionate follower of Jesus.
      marker-yv: yv-n
    - type: text
      text: who is much loved and faithful in her ministry for the Lord, I send my greetings.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Rufus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
