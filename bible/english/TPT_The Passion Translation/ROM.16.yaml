    - type: text
      text: Paul’s Final Instructions
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, dear brothers and sisters, I’d like to give one final word of caution: Watch out for those who cause divisions and offenses among you. When they antagonize you by speaking of things that are contrary to the teachings that you’ve received, don’t be caught in their snare! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For people like this are not truly serving the Lord, our Messiah, but are being driven by their own desires for a following. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they are slaves of their bellies.” The metaphor used here is that they are driven by their desires to pull others into their group and thus divide the church.
      marker-yv: yv-n
    - type: text
      text: Utilizing their smooth words and well-rehearsed blessings, they seek to deceive the hearts of innocent ones.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I’m so happy when I think of you, because everyone knows the testimony of your deep commitment of faith. So I want you to become scholars of all that is good and beautiful, and stay pure and innocent '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “unmixed.”
      marker-yv: yv-n
    - type: text
      text: 'when it comes to evil. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I am sending her with this letter and ask that you shower her with your hospitality when she arrives. Embrace her with honor, as is fitting for one who belongs to the Lord and is set apart for him. So provide her whatever she may need, for she’s been a great leader and champion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: prostatis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the one who goes first,” “a leading officer presiding over many,” “a protecting patroness who oversees the affairs of others,” “a champion defender.” It is clear that Phoebe was considered a leader, a champion, a heroic woman who was most likely quite wealthy and brought blessings to others. The term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: prostatis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: implies a great status (as used in classical Greek) and denotes a high position in the church. Paul honors a total of thirty-seven people in this last chapter of Romans. Their names have gone down in church history as wonderful servants of Jesus. Their names are recorded for eternity here in God’s eternal Word. Church tradition states that most of those named here were martyred for their faith. Imagine dear sister Phoebe carrying with her a letter to Rome that contained the greatest wealth of Christian theology. A copy of that letter she carried is the letter you are now reading!
      marker-yv: yv-n
    - type: text
      text: for many—I know, for she’s been that for even me!
