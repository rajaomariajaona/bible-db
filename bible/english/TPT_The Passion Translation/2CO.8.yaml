document_id: 2CO.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Generosity of the Churches
  - type: text
    content: 'Beloved ones, we must tell you about the grace God poured out upon the churches of Macedonia. '
  '10':
  - type: text
    content: 'So here are my thoughts concerning this matter, and it’s in your best interests. Since you made such a good start last year, both in the grace of giving and in your longing to give, '
  '11':
  - type: text
    content: 'you should finish what you started. '
  - type: note
    content: Or “Get on with it and finish the job!”
  - type: text
    content: 'You were so eager in your intentions to give, so go do it. Finish this act of worship according to your ability to give. '
  '12':
  - type: text
    content: 'For if the intention and desire are there, '
  - type: text
    content: the size of the gift doesn’t matter
  - type: text
    content: '. Your gift is fully acceptable to God according to what you have, not what you don’t have. '
  '13':
  - type: text
    content: 'I’m not saying this in order to ease someone else’s load by overloading you, but as a matter of fair balance. '
  '14':
  - type: text
    content: 'Your surplus could meet their need, and their abundance may one day meet your need. This equal sharing of abundance will mean a fair balance. '
  - type: note
    content: 'Apparently, the Corinthian church was not poor. They had intended, a year prior to receiving this letter, to make a generous offering to the believers in Jerusalem living in poverty. Paul encourages them to now follow through with their pledge. Note the principles of giving Paul teaches them in vv. 10–15: (1) A willing, cheerful offering is more important than the amount. (2) Financial commitments of giving are to be taken seriously. (3) We are to share our substance with those in need, because the time may come when we may need their gifts. (4) Our giving reflects our devotion to Christ. (5) We are to give what we are able and not stress about what we cannot give. We are to give in proportion to our income.'
  '15':
  - type: text
    content: 'As it is written:'
  - type: text
    content: The one who gathered much didn’t have too much,
  - type: text
    content: and the one who gathered little didn’t have too little.
  - type: note
    content: See Ex. 16:18.
  - type: heading
    content: Titus Sent to Corinth
  '16':
  - type: text
    content: 'We give thanks to God for putting the same devotion I have for you into the heart of Titus. '
  '17':
  - type: text
    content: 'Of course, he enthusiastically accepted our request to go to Corinth, but because he carries you in his heart, he’d already planned on coming. '
  '18':
  - type: text
    content: 'So we’re sending with him the brother '
  - type: note
    content: This brother and the one mentioned in v. 22 were identified as apostles. Many have tried unsuccessfully to identify whom they might have been. Some of the names considered include Timothy, Luke, Barnabas, Apollos, Mark, Erastus, Silas, Sopater, Aristarchus, Secundus, Gaius, Tychicus, and Trophimus. Regardless of these apostles’ identities, we know that Titus was the leader of this delegation and that all three were apostles of the church. See Eph. 4:11.
  - type: text
    content: 'who is greatly honored and respected in all the churches for his work of evangelism. '
  '19':
  - type: text
    content: 'Not only that, he has been appointed by the churches to be our traveling companion as we carry and dispense this generous gift that glorifies the Lord and shows how eager we are to help. '
  '2':
  - type: text
    content: 'For even during a season of severe difficulty, tremendous suffering, and extreme poverty, their super-abundant joy overflowed into an act of extravagant generosity. '
  '20':
  - type: text
    content: We are sending a team
  - type: text
    content: ' in order to avoid any criticism over how we handle this wonderfully generous gift, '
  '21':
  - type: text
    content: 'for we intend to do what is right and we are totally open both to the Lord’s inspection and to man’s. '
  '22':
  - type: text
    content: So we’re sending with them another brother who is faithful and proven to be a man of integrity. He is passionate to help you now more than ever, for he believes in you.
  '23':
  - type: text
    content: 'Concerning the credentials of Titus, he’s my partner and coworker in ministry for you. As for the brothers coming with him, they are apostles of the churches, which are the glory of the Anointed One. '
  - type: note
    content: Although ambiguous in the Greek text, the clause “which are the glory of the Anointed One” most likely refers to the churches. God’s church is his glorious bride on the earth, which brings him glory through all the ages. If referring to Titus and his delegation, this verse would mean that the apostles are the glory of the Anointed One.
  '24':
  - type: text
    content: So demonstrate to them how much you love, and prove that our boasting of you is justified.
  '3':
  - type: text
    content: 'For I can verify that they spontaneously gave, not only according to their means but far beyond what they could afford. '
  '4':
  - type: text
    content: 'They '
  - type: text
    content: actually
  - type: text
    content: ' begged us for the privilege of sharing in this ministry of giving to God’s holy people '
  - type: text
    content: who are living in poverty
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'They exceeded our expectations by first dedicating themselves fully to the Lord and then to us, according to God’s pleasure. '
  - type: note
    content: Under persecution and desperately poor, the churches of Macedonia (Philippi, Thessalonica, and Berea) gave more than just an extravagant offering. They fully surrendered themselves to the Lord and gave out of a longing to fulfill God’s pleasure. This is the key to generous giving. First we dedicate our hearts to God, which includes our finances, then we give to God’s work as he directs us. Throughout 2 Corinthians, giving is described as a “grace” that God places on our lives, which empowers our generosity.
  '6':
  - type: text
    content: 'That is why we appealed to Titus, since he was the one who got you started and encouraged you to give, so he could help you complete this generous undertaking on your behalf. '
  '7':
  - type: text
    content: You do well and excel in every respect—in unstoppable faith, in powerful preaching, in revelation knowledge, in your passionate devotion, and in sharing the love we have shown to you. So make sure that you also excel in grace-filled generosity.
  - type: note
    content: 'Notice the features of godliness in this verse that should be seen in our lives and ministries: (1) We excel in everything. (2) We have unstoppable faith. (3) We have an anointing of grace to speak the Word. (4) We have revelation knowledge. (5) We have passionate devotion. (6) We show love. (7) We are generous.'
  '8':
  - type: text
    content: 'I’m not saying this as though I were issuing an order but to stir you to greater love by mentioning the enthusiasm '
  - type: text
    content: of the Macedonians
  - type: text
    content: ' as a challenge to you. '
  - type: note
    content: Or “to test your love by the eagerness of others.”
  '9':
  - type: text
    content: 'For you have experienced the extravagant grace of our Lord Jesus Christ, that although he was infinitely rich, he impoverished himself for our sake, so that by his poverty, we become rich '
  - type: text
    content: beyond measure
  - type: text
    content: .
