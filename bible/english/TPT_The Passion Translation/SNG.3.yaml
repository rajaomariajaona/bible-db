document_id: SNG.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Night after night I’m tossing and turning on my bed of travail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why did I let him go from me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How my heart now aches for him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he is nowhere to be found!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pillars of smoke, like silver mist—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: a canopy of golden glory dwells above it.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The place where they sit together
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is sprinkled with crimson.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Love and mercy cover this carriage,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: blanketing his tabernacle throne.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The king himself has made it
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for those who will become his bride.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Rise up, Zion maidens, brides-to-be!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Come and feast your eyes on this king
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as he passes in procession on his way to his wedding.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the day filled with overwhelming joy—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the day of his great gladness.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I must rise in search of him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: looking throughout the city,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The city is a picture of the local church, a place with government, order, and overseers. She goes from church to church, looking for the one she loves.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seeking until I find him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if I have to roam through every street,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nothing will keep me from my search.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is he—my soul’s true love?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is nowhere to be found.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I encountered the overseers as they encircled the city.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I asked them, “Have you found him—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my heart’s true love?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just as I moved past them, I encountered him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I found the one I adore!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I caught him and fastened myself to him,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: refusing to be feeble in my heart again
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I hugged him and sank down
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: into his arms
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I’ll bring him back to the temple within
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where I was given new birth—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into my innermost parts, the place of my conceiving.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Shepherd-King
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Promise me, O Jerusalem maidens,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: by the gentle gazelles and delicate deer,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that you’ll not disturb my love until she is ready to arise.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Voice of the Lord
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Who is this one ascending from the wilderness
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in the pillar of the glory cloud?
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He is fragrant with the anointing oils
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of myrrh and frankincense
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These spices are found in the Bible as ingredients of the sacred anointing oil. Myrrh points to the suffering and death of Christ, while frankincense reveals the fragrance of his perfect life and ministry.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: —
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: more fragrant than all the spices of the merchant.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Look! It is the king’s marriage carriage—
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the love seat surrounded by sixty champions, the mightiest of Israel’s host,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: are like pillars of protection.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They stand ready with swords
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to defend the king and his fiancée
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: from every terror of the night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The king made this mercy seat for himself
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: out of the finest wood that will not decay.
