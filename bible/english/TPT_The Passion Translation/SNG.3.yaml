document_id: SNG.3,1849
type_code: eng
verses:
  '1':
  - type: text
    content: Night after night I’m tossing and turning on my bed of travail.
  - type: text
    content: Why did I let him go from me?
  - type: text
    content: How my heart now aches for him,
  - type: text
    content: but he is nowhere to be found!
  '10':
  - type: text
    content: Pillars of smoke, like silver mist—
  - type: text
    content: a canopy of golden glory dwells above it.
  - type: text
    content: The place where they sit together
  - type: text
    content: is sprinkled with crimson.
  - type: text
    content: Love and mercy cover this carriage,
  - type: text
    content: blanketing his tabernacle throne.
  - type: text
    content: The king himself has made it
  - type: text
    content: for those who will become his bride.
  '11':
  - type: text
    content: Rise up, Zion maidens, brides-to-be!
  - type: text
    content: Come and feast your eyes on this king
  - type: text
    content: as he passes in procession on his way to his wedding.
  - type: text
    content: This is the day filled with overwhelming joy—
  - type: text
    content: the day of his great gladness.
  '2':
  - type: text
    content: So I must rise in search of him,
  - type: text
    content: looking throughout the city,
  - type: note
    content: The city is a picture of the local church, a place with government, order, and overseers. She goes from church to church, looking for the one she loves.
  - type: text
    content: seeking until I find him.
  - type: text
    content: Even if I have to roam through every street,
  - type: text
    content: nothing will keep me from my search.
  - type: text
    content: Where is he—my soul’s true love?
  - type: text
    content: He is nowhere to be found.
  '3':
  - type: text
    content: Then I encountered the overseers as they encircled the city.
  - type: text
    content: So I asked them, “Have you found him—
  - type: text
    content: my heart’s true love?”
  '4':
  - type: text
    content: Just as I moved past them, I encountered him.
  - type: text
    content: I found the one I adore!
  - type: text
    content: I caught him and fastened myself to him,
  - type: text
    content: refusing to be feeble in my heart again
  - type: text
    content: .
  - type: note
    content: Or “I hugged him and sank down into his arms.”
  - type: text
    content: Now I’ll bring him back to the temple within
  - type: text
    content: where I was given new birth—
  - type: text
    content: into my innermost parts, the place of my conceiving.
  - type: heading
    content: The Shepherd-King
  '5':
  - type: text
    content: Promise me, O Jerusalem maidens,
  - type: text
    content: by the gentle gazelles and delicate deer,
  - type: text
    content: that you’ll not disturb my love until she is ready to arise.
  - type: heading
    content: The Voice of the Lord
  '6':
  - type: text
    content: Who is this one ascending from the wilderness
  - type: text
    content: in the pillar of the glory cloud?
  - type: text
    content: He is fragrant with the anointing oils
  - type: text
    content: of myrrh and frankincense
  - type: text
    content: ' '
  - type: note
    content: These spices are found in the Bible as ingredients of the sacred anointing oil. Myrrh points to the suffering and death of Christ, while frankincense reveals the fragrance of his perfect life and ministry.
  - type: text
    content: —
  - type: text
    content: more fragrant than all the spices of the merchant.
  '7':
  - type: text
    content: Look! It is the king’s marriage carriage—
  - type: text
    content: the love seat surrounded by sixty champions, the mightiest of Israel’s host,
  - type: text
    content: are like pillars of protection.
  '8':
  - type: text
    content: They stand ready with swords
  - type: text
    content: to defend the king and his fiancée
  - type: text
    content: from every terror of the night.
  '9':
  - type: text
    content: The king made this mercy seat for himself
  - type: text
    content: out of the finest wood that will not decay.
