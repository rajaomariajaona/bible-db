  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: That silenced the devil’s harassment for the time being. So he retreated until an opportune time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
