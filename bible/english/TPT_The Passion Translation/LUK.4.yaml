  - type: text
    text: Jesus Tested in the Wilderness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'From the moment of his baptism, Jesus overflowed with the Holy Spirit. He was taken by the Spirit from the Jordan into the wilderness of Judea '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Holy Spirit’s leading is not always into comfort and ease. The Spirit may lead us, as he did Jesus, into places where we will be proven, tested, and strengthened for our future ministry. After Jesus’ greatest affirmation from heaven came a great time of testing.
    marker-yv: yv-n
  - type: text
    text: 'to experience for forty days the ordeal of testing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word here means “to test with a sinister motive.” This test was more than proving that Jesus could overcome this ordeal. It proved that Satan was defeated by Christ’s appearing.
    marker-yv: yv-n
  - type: text
    text: 'by the accuser. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1–2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The words
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: accuser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: devil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: are used interchangeably in this translation. Jesus’ baptism and the forty days of wilderness temptations that followed evoke parallels with the historical narrative of the Hebrew exodus through the Red Sea and the forty years of wilderness testing.
    marker-yv: yv-n
  - type: text
    text: 'He ate no food during this time and ended his forty-day fast very hungry. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It was then the devil said to him, “If you are really the Son of God, command this stone to turn into a loaf of bread for you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I will not!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although Jesus refused to turn stones to bread, today he transforms the stony hearts of human beings and converts us into living bread to give to the nations.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For it is written in the Scriptures,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus, the living Word, is quoting from the written Word (
    - type: text
      text: Deut. 8:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). If the living Word used the written Word against the enemy’s temptations, how much more do we need the revelation of what has been written so that we can stand against all his snares? See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
