      marker: fr
      children:
      - type: text
        text: 4:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Synagogues were the meeting places for the Jewish people. Every village that had at least ten families would erect a meeting house where they would come and hear visiting teachers expound the Scriptures.
    marker-yv: yv-n
  - type: text
    text: and they glorified him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
