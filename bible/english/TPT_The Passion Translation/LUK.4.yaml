    - type: text
      text: 10:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Next, the devil took Jesus to Jerusalem, set him on the highest point of the temple, and tempted him, saying, “If you really are the Son of God, jump down in front of all the people. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: For it is written in the Scriptures, ‘God has given his angels instructions to protect you from harm. For angels’ hands will hold you up and keep you from hurting even one foot on a stone.’ ”
  - type: usfm
