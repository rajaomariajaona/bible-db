    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied, for the Greek text simply says, “took him up,” without telling us where.
    marker-yv: yv-n
  - type: text
    text: 'and in a flash showed him all the kingdoms and regions of the world. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: The devil then said to Jesus, “All of this, with all its power, authority, and splendor, is mine to give to whomever I wish. Just do one thing, and you will have it all. Simply bow down to worship me, and it will be yours! You will possess everything!”
