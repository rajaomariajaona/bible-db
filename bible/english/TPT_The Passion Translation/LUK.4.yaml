      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was the custom of the day to read the Scriptures in Hebrew and then paraphrase it into Aramaic, the common language of that day.
    marker-yv: yv-n
  - type: text
