  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Jesus, armed with the Holy Spirit’s power, returned to Galilee, and his fame spread throughout the region. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He taught in the synagogues '
  - type: usfm
