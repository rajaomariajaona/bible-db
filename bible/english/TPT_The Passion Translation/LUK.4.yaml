      metadata:
        usfm: 2TI.2.24+2TI.2.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Life does not come only from eating bread but from God. Life flows from every revelation from his mouth.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is implied by both the Greek and Aramaic texts. Although this last clause is missing in some Greek manuscripts, it is included in the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: p
