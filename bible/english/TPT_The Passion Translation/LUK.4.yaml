    - type: text
      text: who grew up here in Nazareth
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I suppose you’ll quote me the proverb, ‘Doctor, go and heal yourself before you try to heal others.’ And you’ll say, ‘Work the miracles here in your hometown that we heard you did in Capernaum.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But let me tell you, no prophet is welcomed or honored in his own hometown.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Isn’t it true that many widows lived in the land of Israel during the days of the prophet Elijah when he locked up the heavens for three and a half years and brought a devastating famine over all the land?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But he wasn’t sent to any of the widows living in that region. Instead, he was sent to a foreign place, to a widow in Zarephath of Sidon.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zarephath means “the place of refining.” Sidon means “fishery” and was a Phoenician seaport city.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or have you not considered that the prophet Elisha healed only Naaman,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both the Aramaic and Greek texts have “Naaman the Aramean” or “descendant of Aram.” The Arameans inhabited what is now Syria. Naaman means “pleasantness.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the Syrian, rather than one of the many Jewish lepers living in the land?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'When everyone present heard Jesus’ words, they erupted with furious rage. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus’ listeners got the point of his sermon. His statements implied that he would take his miracle ministry to non-Jewish people. Jubilee had come, not only for them, but for those they hated. This infuriated them enough to want to kill Jesus.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They mobbed Jesus and threw him out of the city, dragging him to the edge of the cliff on the hill on which the city had been built, ready to hurl him off. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But he walked right through the crowd, leaving them all stunned.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text clearly implies it was a supernatural event. After hearing Jesus’ first sermon, they wanted to throw him off a cliff!
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Confronts a Demonized Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesus went to Capernaum '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Capernaum means “the village of Nahum” and Nahum means “comforted.” Jesus did many miracles and made his Galilean base of ministry in “the village of the comforted.”
    marker-yv: yv-n
  - type: text
    text: 'in Galilee and taught the people on the Sabbath day. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'His teaching stunned and dazed '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekplesso
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', is a strong verb that means “struck with amazement,” “astonished,” “panic stricken,” “shocked” or “something that takes your breath away” (like being hit with a blow), or “to expel,” “to drive out.” Jesus spoke with such glory and power emanating from him that his words were like thunderbolts into their hearts. May we hear his words today in the same way.'
    marker-yv: yv-n
  - type: text
    text: them, for he spoke with penetrating words and great authority.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'In the congregation, there was a demonized man, who screamed out with a loud voice, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Go away and leave us alone. We know who you are. You’re Jesus of Nazareth, God’s Holy One. What do you want with us? Have you come to destroy us already?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is an assertive statement made by the demon to Jesus.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Immediately the demon hurled the man down on the floor in front of them. But Jesus rebuked the demon, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be quiet and come out of him!”
  - type: text
    text: ' And without causing him any harm, the demon came out of him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Great astonishment swept over the people, and they said among themselves, “What kind of man is this who has such power and authority? With a mere word, he commands demons to come out, and they obey him!” '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Reports about Jesus spread like wildfire throughout every community in the surrounding region.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Many
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'After leaving the synagogue, Jesus went into Simon’s house, where Simon’s mother-in-law was sick with a high fever. The disciples begged Jesus to help her. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jesus stood over her and rebuked the fever, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Five times in this chapter, Jesus corrects and rebukes various things and persons. He rebuked Satan (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: LUK.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and the unbelieving people in his hometown (vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 23–27
      metadata:
        usfm: LUK.4.23+LUK.4.24+LUK.4.25+LUK.4.26+LUK.4.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Twice he rebuked demons (vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: LUK.4.35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '41'
      metadata:
        usfm: LUK.4.41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). And in this verse, he rebukes fever.
    marker-yv: yv-n
  - type: text
    text: and she was healed instantly. Then she got up and began to serve them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'At sunset, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: People came before dark. The Sabbath, which was to be a day of rest for every Jew, began at sunset on Friday and ended at sunset on Saturday.
    marker-yv: yv-n
  - type: text
    text: the people brought all those who were sick to Jesus to be healed. Jesus laid his hands on them one by one, and he healed them all of different illnesses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Demons also came out of many of them. Knowing that Jesus was the Anointed One, the demons shouted while coming out, “You are the Messiah, the Son of El Shaddai!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Son of God.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: El Shaddai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is used to emphasize the Hebraic word for God Almighty. See footnote on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 91:1
      metadata:
        usfm: PSA.91.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: But Jesus rebuked them and commanded them to be silent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'At daybreak the next morning, the crowds came and searched everywhere for him, but Jesus had already left to go to a secluded place. When they finally found him, they held him tightly, begging him to stay with them in Capernaum. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'But Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t you know there are other places I must go and offer the hope of God’s kingdom?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The gospel includes the hope of an eternal kingdom. Conversion is more than believing a historical event but is found in the revelation of God’s kingdom realm that changes our hearts.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is what I have been sent to do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Jesus continued to travel and preach in the synagogues throughout the land.
