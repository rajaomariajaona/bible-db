document_id: PSA.98,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Sing a New Song
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: David’s poetic praise
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '98'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint has David as the author. The Hebrew reads simply “A psalm.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Go ahead—sing your brand-new song to the Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is famous for his miracles and marvels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he is victorious through his mighty power and holy strength.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Everyone knows how God has saved us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he has displayed his justice throughout history.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He never forgets to show us his love and faithfulness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How kind he has been to Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the nations know how he stands behind his people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and how he saves his own.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So go ahead, everyone, and shout out your praises with joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Break out of the box and let loose
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the most joyous sound of praise!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Sing your melody of praise to the Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make music like never before!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 98:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “accompanied by a harp and the sound of music.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Blow those trumpets and shofars!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout with joyous triumph before King '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let the ocean’s waves join in the chorus with their roaring praise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until everyone everywhere shouts out in unison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Glory to the Lord!”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Let the rivers and streams clap with applause
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as the mountains rise in a standing ovation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to join the mighty choir of exaltation.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Look! Here he comes! The Lord and judge of all the earth!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s coming to make things right and to do it fair and square.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And everyone will see that he does all things well!
