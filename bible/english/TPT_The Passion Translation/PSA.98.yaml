document_id: PSA.98,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Sing a New Song
  - type: text
    content: David’s poetic praise
  - type: note
    content: The Septuagint has David as the author. The Hebrew reads simply “A psalm.”
  - type: text
    content: Go ahead—sing your brand-new song to the Lord!
  - type: text
    content: He is famous for his miracles and marvels,
  - type: text
    content: for he is victorious through his mighty power and holy strength.
  '2':
  - type: text
    content: Everyone knows how God has saved us,
  - type: text
    content: for he has displayed his justice throughout history.
  '3':
  - type: text
    content: He never forgets to show us his love and faithfulness.
  - type: text
    content: How kind he has been to Israel!
  - type: text
    content: All the nations know how he stands behind his people
  - type: text
    content: and how he saves his own.
  '4':
  - type: text
    content: So go ahead, everyone, and shout out your praises with joy!
  - type: text
    content: Break out of the box and let loose
  - type: text
    content: with the most joyous sound of praise!
  '5':
  - type: text
    content: Sing your melody of praise to the Lord
  - type: text
    content: and make music like never before!
  - type: note
    content: Or “accompanied by a harp and the sound of music.”
  '6':
  - type: text
    content: Blow those trumpets and shofars!
  - type: text
    content: 'Shout with joyous triumph before King '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '7':
  - type: text
    content: Let the ocean’s waves join in the chorus with their roaring praise
  - type: text
    content: until everyone everywhere shouts out in unison,
  - type: text
    content: “Glory to the Lord!”
  '8':
  - type: text
    content: Let the rivers and streams clap with applause
  - type: text
    content: as the mountains rise in a standing ovation
  - type: text
    content: to join the mighty choir of exaltation.
  '9':
  - type: text
    content: Look! Here he comes! The Lord and judge of all the earth!
  - type: text
    content: He’s coming to make things right and to do it fair and square.
  - type: text
    content: And everyone will see that he does all things well!
