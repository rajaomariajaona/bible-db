document_id: PSA.67,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: It’s Time to Praise Him
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A poetic song of praise for guitar
  - type: text
    content: God, keep us near your mercy-fountain and bless us!
  - type: text
    content: And when you look down on us, may your face beam with joy!
  - type: note
    content: Or “May he cause his face to shine with us” or “May he smile on us.”
  - type: text
    content: Pause in his presence
  '2':
  - type: text
    content: Send us out all over the world so that everyone everywhere
  - type: text
    content: will discover your ways and know who you are
  - type: text
    content: and see your power to save.
  '3':
  - type: text
    content: Let all the nations burst forth with praise;
  - type: text
    content: let everyone everywhere love and enjoy you!
  '4':
  - type: text
    content: Then how glad the nations will be when you are their King.
  - type: text
    content: They will sing, they will shout, for you give true justice to the people.
  - type: text
    content: Yes! You, Lord, are the shepherd of the nations!
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: No wonder the peoples praise you!
  - type: text
    content: Let all the people praise you more!
  - type: note
    content: The Septuagint reads “Let all the people come to know you.”
  '6':
  - type: text
    content: The harvest of the earth is here!
  - type: text
    content: God, the very God we worship,
  - type: text
    content: keeps us satisfied at his banquet of blessings.
  '7':
  - type: text
    content: And the blessings keep coming!
  - type: text
    content: All the ends of the earth will give him
  - type: text
    content: the honor he deserves and be in awe of him!
