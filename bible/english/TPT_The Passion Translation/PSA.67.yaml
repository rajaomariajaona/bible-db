document_id: PSA.67,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: It’s Time to Praise Him
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poetic song of praise for guitar
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, keep us near your mercy-fountain and bless us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when you look down on us, may your face beam with joy!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 67:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “May he cause his face to shine with us” or “May he smile on us.”
      marker-yv: yv-n
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Send us out all over the world so that everyone everywhere
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will discover your ways and know who you are
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and see your power to save.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the nations burst forth with praise;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let everyone everywhere love and enjoy you!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then how glad the nations will be when you are their King.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will sing, they will shout, for you give true justice to the people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes! You, Lord, are the shepherd of the nations!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No wonder the peoples praise you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the people praise you more!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 67:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “Let all the people come to know you.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The harvest of the earth is here!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, the very God we worship,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: keeps us satisfied at his banquet of blessings.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the blessings keep coming!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the ends of the earth will give him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the honor he deserves and be in awe of him!
