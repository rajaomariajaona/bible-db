document_id: ISA.50,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord, the Faithful Husband
  - type: text
    content: Yahweh
  - type: text
    content: ' asks,'
  - type: text
    content: “Have I abandoned you?
  - type: text
    content: Can you show me your mother’s divorce papers
  - type: text
    content: that prove I sent her away?
  - type: text
    content: Do you think I sold you into slavery to pay off a debt?
  - type: text
    content: 'No, you sold '
  - type: text
    content: yourselves into slavery
  - type: text
    content: ' because of your sins,'
  - type: text
    content: and because of your rebellion I sent your mother away!
  - type: note
    content: Or “divorced your mother [Israel].”
  '10':
  - type: text
    content: 'Who among you has true fear and reverence of '
  - type: text
    content: Yahweh
  - type: text
    content: '?'
  - type: text
    content: Who of you listens to the voice of his servant?
  - type: text
    content: Are any of you groping in the dark without light?
  - type: text
    content: 'Trust in the faithful name of '
  - type: text
    content: Yahweh
  - type: text
    content: and rely on your God.
  '11':
  - type: text
    content: But if you presume to light your own torch,
  - type: text
    content: you are playing with fire.
  - type: text
    content: So go ahead, walk in the light of your own fires
  - type: text
    content: and the sparks you have kindled.
  - type: text
    content: 'But I can promise you this:'
  - type: text
    content: it will take you down into torment!
  '2':
  - type: text
    content: When I came to you, why was no one there?
  - type: text
    content: When I called, why did no one answer?
  - type: text
    content: 'Am I powerless '
  - type: note
    content: Or “Is my arm too short?”
  - type: text
    content: to rescue you or too weak to deliver you?
  - type: text
    content: With only a threat I can evaporate the sea
  - type: text
    content: and dry up the rivers as a desert,
  - type: text
    content: leaving the fish to rot and die of thirst.
  '3':
  - type: text
    content: I dress the sky with darkness and shroud it with sackcloth.”
  - type: heading
    content: The Servant, Our Teacher
  '4':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has equipped me'
  - type: text
    content: 'with the anointed, skillful tongue of a teacher '
  - type: note
    content: See Ps. 45:1.
  - type: text
    content: —
  - type: text
    content: to know how to speak a timely word to the weary.
  - type: text
    content: 'Morning by morning, he awakens '
  - type: text
    content: my heart
  - type: text
    content: .
  - type: text
    content: 'He opens my ears '
  - type: note
    content: Or “He arouses for me an ear.”
  - type: text
    content: 'to hear '
  - type: text
    content: his voice
  - type: text
    content: ', to be trained to teach.'
  - type: note
    content: Seven times Jesus stated that he spoke only what the Father gave (or taught) him to say. See John 7:16; 8:28, 47; 12:49; 14:10, 24; 17:8.
  - type: heading
    content: The Servant’s Surrender to the Cross
  '5':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has opened my ear,'
  - type: note
    content: A pierced ear was the mark of a willing slave. See Deut. 15:12–17; Ps. 40:6.
  - type: text
    content: and I did not resist; I did not rebel.
  '6':
  - type: text
    content: I offered my back to those who flogged me
  - type: text
    content: and my cheek to those who tore out my beard.
  - type: text
    content: I never hid my face from demeaning insults
  - type: text
    content: or from those who spit on me.
  '7':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' empowers me, so I am not humiliated.'
  - type: text
    content: For that reason, with holy determination,
  - type: note
    content: Or “I have set my face like flint.”
  - type: text
    content: I will do his will
  - type: text
    content: ' and not be ashamed.'
  '8':
  - type: text
    content: The One who makes me righteous is close to me.
  - type: text
    content: Who would dare challenge me now?
  - type: text
    content: Who would be my opponent?
  - type: text
    content: Let him stand before me!
  - type: text
    content: Who is my accuser?
  - type: text
    content: Let him confront me!
  '9':
  - type: text
    content: 'It is the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' who empowers me;'
  - type: text
    content: who would condemn me?
  - type: note
    content: See Rom. 8:31–39.
  - type: text
    content: My accusers will all fade away
  - type: text
    content: like worn-out, moth-eaten clothes.
  - type: note
    content: These old clothes represent the old concepts of an old covenant. See Matt. 6:19–21; Heb. 1:11–12.
  - type: heading
    content: The Fear of God
