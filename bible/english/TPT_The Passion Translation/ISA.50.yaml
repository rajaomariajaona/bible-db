        text: 17:8
      metadata:
        usfm: JHN.17.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Servant’s Surrender to the Cross
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has opened my ear,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A pierced ear was the mark of a willing slave. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 15:12–17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 40:6
      metadata:
        usfm: PSA.40.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I did not resist; I did not rebel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I offered my back to those who flogged me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my cheek to those who tore out my beard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I never hid my face from demeaning insults
- type: usfm
  marker: q1
  children:
  - type: text
    text: or from those who spit on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' empowers me, so I am not humiliated.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: For that reason, with holy determination,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I have set my face like flint.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I will do his will
  - type: text
    text: ' and not be ashamed.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The One who makes me righteous is close to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who would dare challenge me now?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who would be my opponent?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him stand before me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is my accuser?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him confront me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It is the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' who empowers me;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: who would condemn me?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 8:31–39
      metadata:
        usfm: ROM.8.31+ROM.8.32+ROM.8.33+ROM.8.34+ROM.8.35+ROM.8.36+ROM.8.37+ROM.8.38+ROM.8.39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: My accusers will all fade away
- type: usfm
  marker: q1
  children:
  - type: text
    text: like worn-out, moth-eaten clothes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These old clothes represent the old concepts of an old covenant. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 6:19–21
      metadata:
        usfm: MAT.6.19+MAT.6.20+MAT.6.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 1:11–12
      metadata:
        usfm: HEB.1.11+HEB.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fear of God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Who among you has true fear and reverence of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who of you listens to the voice of his servant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Are any of you groping in the dark without light?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Trust in the faithful name of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
- type: usfm
  marker: q1
  children:
  - type: text
    text: and rely on your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But if you presume to light your own torch,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you are playing with fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So go ahead, walk in the light of your own fires
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the sparks you have kindled.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I can promise you this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will take you down into torment!
