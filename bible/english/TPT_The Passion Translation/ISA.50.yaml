document_id: ISA.50
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lord, the Faithful Husband
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' asks,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Have I abandoned you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can you show me your mother’s divorce papers
- type: usfm
  marker: q1
  children:
  - type: text
    text: that prove I sent her away?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think I sold you into slavery to pay off a debt?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No, you sold '
  - type: usfm
    marker: it
    children:
    - type: text
      text: yourselves into slavery
  - type: text
    text: ' because of your sins,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and because of your rebellion I sent your mother away!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “divorced your mother [Israel].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When I came to you, why was no one there?
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I called, why did no one answer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Am I powerless '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Is my arm too short?”
    marker-yv: yv-n
  - type: text
    text: to rescue you or too weak to deliver you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: With only a threat I can evaporate the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: and dry up the rivers as a desert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leaving the fish to rot and die of thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I dress the sky with darkness and shroud it with sackcloth.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Servant, Our Teacher
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has equipped me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'with the anointed, skillful tongue of a teacher '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 45:1
      metadata:
        usfm: PSA.45.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: to know how to speak a timely word to the weary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Morning by morning, he awakens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my heart
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He opens my ears '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He arouses for me an ear.”
    marker-yv: yv-n
  - type: text
    text: 'to hear '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his voice
  - type: text
    text: ', to be trained to teach.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Seven times Jesus stated that he spoke only what the Father gave (or taught) him to say. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 7:16
      metadata:
        usfm: JHN.7.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
