  - type: text
    content: and the heavens will respond to the earth,
  '22':
  - type: text
    content: and the earth will respond to the grain, the wine, and the olive oil,
  - type: text
    content: and they will respond to Israel.
  - type: note
    content: Or “Jezreel,” a poetic and complicated metaphor. Jezreel means “God sows [seed].” It also sounds like the word Israel , and in this context, Jezreel becomes a poetic term for the people of Israel.
  '23':
  - type: text
    content: I will sow her in the land as my very own.
  - type: text
    content: I will show my tender mercy to No-Tender-Mercy.
  - type: text
    content: 'I will declare to Not-My-People my words of endearment:'
  - type: text
    content: ‘You are my people,’
  - type: text
    content: 'and they will say to me, ‘You are my '
  - type: text
    content: One-and-Only
  - type: text
    content: ' God.’ ”'
  '3':
  - type: text
    content: If not, I will strip her naked and humiliate her
  - type: text
    content: and expose her nakedness as on the day she was born.
  - type: note
    content: See Ezek. 16:39 .
  - type: text
    content: I will make her as bare as the desert,
  - type: text
    content: turn her into a barren land,
  - type: text
    content: and let her die of thirst.
  - type: note
    content: A thriving nation is rich in children. But in this prophecy, Israel would become depopulated and less fruitful. The commandment to be fruitful and multiply (God’s first command and one he repeated many times) involves both productivity and procreation. Hosea was evoking both here.
  '4':
  - type: text
    content: I will feel no pity for her children,
  - type: text
    content: since they are the children of her shameless prostitution.
  '5':
  - type: text
    content: Yes, their mother has prostituted herself,
  - type: text
    content: the one who conceived them has disgraced herself.
  - type: text
    content: For she said, ‘I will chase after my lovers;
  - type: note
    content: In this allegory, Israel’s lovers would be the pagan gods she worshiped and alliances with Egypt, Syria, or Mesopotamia (whoever happened to be in charge there, the Assyrians, Babylonians, Persians, or Greeks).
  - type: text
    content: 'they will provide all I need:'
  - type: text
    content: 'my robe, my clothing, '
  - type: note
    content: Or “my wool, my flax.” Robes were often made of wool, and flax is used to make linen clothing.
  - type: text
    content: my oil, and my wine.’
  '6':
  - type: text
    content: Behold! I will block her way with thorns
  - type: text
    content: and build up a wall against her to stop her in her tracks.
  '7':
  - type: text
    content: Then when she tries to chase her lovers,
  - type: text
    content: she will not be able to catch them.
  - type: text
    content: When she looks for them, she will not find them.
  - type: text
    content: Eventually, she’ll say, ‘I must go back to my own husband.
  - type: note
    content: Or “to my man, the first.”
  - type: text
    content: I was much better off then than I am now!’
  - type: note
    content: 'Israel may have chased other gods, but there is only One who loved her: Yahweh . Gomer may have had many lovers, but Hosea was the first who genuinely loved her. Jesus first loved us, and that’s why we love him. For the believer, it is futile to chase after anyone other than Jesus. For you will discover in the end that you were better off with Jesus alone.'
  '8':
  - type: text
    content: Yet, she never understood
  - type: text
    content: that I was the one who was giving her
  - type: text
    content: the grain, sweet wine, and olive oil.
  - type: note
    content: The irony is clear. The “fertility” gods she chased after couldn’t provide her with what she needed. God was providing for her even as she wandered from him.
  - type: text
    content: I lavished upon her an abundance of silver and gold,
  - type: text
    content: 'which she '
  - type: note
    content: Or “they.”
  - type: text
    content: took and made into idols of Baal.
  '9':
