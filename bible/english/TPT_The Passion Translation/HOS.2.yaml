  - type: heading
    content: God’s Amazing Love for His People
  '14':
  - type: text
    content: '“Behold, I am going to romance '
  - type: note
    content: Or “allure” or “seduce.” The Hebrew word patah most definitely carries the connotation of romance.
  - type: text
    content: her
  - type: text
    content: and draw her into the wilderness;
  - type: note
    content: The wilderness, the desert of Mount Sinai, was where God “married” Israel in the covenant he made with them. Symbolically, God was drawing his people back to the place where they first trusted him to care and provide for them.
  - type: text
    content: 'I will speak '
  - type: note
    content: There is a wonderful wordplay that is lost in English. The word for “wilderness” (Hb. midbar ) is taken from the root word for “to speak.” The wilderness is the place where God speaks. He draws his people there and speaks to them in their wilderness. It is often in our difficult wilderness, a place we would never choose, that we hear most clearly the words of God’s tender love that pierce our hearts.
  - type: text
    content: tenderly to her there with words of love
  - type: text
    content: and win her heart back to me
  - type: text
    content: .
  '15':
  - type: text
    content: There I will give her back her vineyards,
  - type: note
    content: The vineyard can represent abundance, new wine, overflowing joy, and supernatural life. We can find restoration even in the wilderness.
  - type: text
    content: 'and make the Valley of Trouble '
  - type: note
    content: Or “the Valley of Achor.” Achor is a variant form of the name Achan. Achan means “trouble” or “misery.” See Josh. 7:24–26 .
  - type: text
    content: an open door to hope.
  - type: note
    content: In every troublesome valley of your life (see previous footnote), God will open a door to hope. The poetic nature of the Hebrew text can be easily lost in translation. God promises to transform the place of deepest trouble into a doorway of hope. It would be akin to saying a “weeping willow tree laughs.” There is an opportunity of hope hidden in our trouble. God will open a door to hope so that we can see his glory where we once were devastated. Like the rainbow that filled the sky after the flood (see Gen. 9:12–17 ), God’s promise of hope and restoration remains forever. Look up and find your door to hope today.
  - type: text
    content: 'There she will '
  - type: text
    content: respond to me
  - type: text
    content: ' and sing '
  - type: note
    content: Or “answer.” Both “sing” and “respond” are possible meanings of the Hebrew word ʿanah . To sing praises to God in your “Valley of Trouble” is proof that you trust him. Nothing is more pleasing to God than a human heart that still worships him while surrounded by disappointment.
  - type: text
    content: as when she was young,
  - type: text
    content: as on the day when she came up from Egypt.
  '16':
  - type: text
    content: '“And I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that when that day comes,'
  - type: text
    content: you will call me ‘My Husband’
  - type: text
    content: and no longer call me ‘My Master.’
  - type: note
    content: 'Or “my Baal [master].” “To know God as our loving Master is good. But to know him as our Beloved Bridegroom is better. One is a relationship of boss/servant. The other is a relationship of love/union. . . . The wilderness forces us to be intimate with Jesus. It’s in the wilderness that our Bridegroom transforms us into the bride, for our difficulties were designed to bring us into his heart. In the desert our garden becomes his garden, and he takes possession of our soul” (Brian and Candice Simmons, The Wilderness—Where Miracles Are Born [Savage, MN: BroadStreet Publishing, 2016], 15).'
  '17':
  - type: text
    content: I will banish the names of the Baals from her lips,
  - type: text
    content: and she will never mention their names again.
  '18':
  - type: text
    content: When that day comes, I will make a covenant for you, my people,
  - type: text
    content: with all the birds and wild animals
  - type: text
    content: and creatures that creep upon the ground.
  - type: note
    content: That is, God promised a time when the wild animals will lose their ferocity and will no longer be harmful to humanity. See Job 5:22 ; Isa. 11:6 .
  - type: text
    content: I will break the bow and the sword
  - type: text
    content: and remove the weapons of war from the land,
  - type: text
    content: and I will let you live in peace and safety.
  '19':
  - type: text
    content: I will take you to myself as my wife forever.
  - type: text
    content: I will make you mine in righteousness and justice,
  - type: text
    content: with unfailing love and tender affection.
  '2':
  - type: text
    content: Go to court. Take legal action against your mother
  - type: note
    content: Or “Plead with your mother” or “Accuse [indict] your mother.” The Hebrew word for “plead” is rib or riyb and is frequently used for filing a legal complaint and is associated with taking someone to court. Implied in the text is that Yahweh was taking Israel to court but her children (the remnant of Israel) must file a complaint for the court case.
  - type: text
    content: and put her on trial.
  - type: text
    content: For she is no longer my wife,
  - type: text
    content: and I am no longer her husband.
  - type: note
    content: This statement is usually seen as a formal divorce decree. The covenant between Yahweh and Israel had been broken by Israel’s unfaithfulness.
  - type: text
    content: 'She must remove '
  - type: text
    content: the symbols
  - type: text
    content: ' '
  - type: note
    content: This is likely a reference to cosmetics, jewelry, or symbols on her forehead that would identify her as a prostitute.
  - type: text
    content: of prostitution from her face
  - type: text
    content: 'and the '
  - type: text
    content: seductive charms
  - type: text
    content: ' of her adulteries from between her breasts.'
  '20':
  - type: text
    content: Yes, I will commit myself to you in faithfulness.
  - type: note
    content: 'Yahweh promised to take his people as his bride, and as the bride-price, he promised five things in vv. 19–20 : righteousness, justice, unfailing love, tender affection, and faithfulness.'
  - type: text
