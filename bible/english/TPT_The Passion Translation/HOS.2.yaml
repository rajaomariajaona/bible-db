        text: In every troublesome valley of your life (see previous footnote), God will open a door to hope. The poetic nature of the Hebrew text can be easily lost in translation. God promises to transform the place of deepest trouble into a doorway of hope. It would be akin to saying a “weeping willow tree laughs.” There is an opportunity of hope hidden in our trouble. God will open a door to hope so that we can see his glory where we once were devastated. Like the rainbow that filled the sky after the flood (see
    - type: usfm
