document_id: PSA.87
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Fountains of Delight
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A prophetic song composed by the prophetic singers of Korah’s clan
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: High upon his hills of holiness stands God’s city.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “His foundations are in his holy mountains.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: How God loves the gates of Zion, his favorite place on earth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The Lord loves Zion’s gates more than all the dwelling places of Jacob.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So many glorious things have been proclaimed
- type: usfm
  marker: q1
  children:
  - type: text
    text: over Zion, God’s holy city!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For the Lord says, “Here are the nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'who will acknowledge me as God:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is in anticipation of the nations of the earth coming to know Christ as the eternal King. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 86:9
      metadata:
        usfm: PSA.86.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Egypt, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the proud one,” which is a title given to Egypt.
    marker-yv: yv-n
  - type: text
    text: 'Iraq, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Babylon,” which means “gate of God.”
    marker-yv: yv-n
  - type: text
    text: 'Palestine, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Philistia,” which means “land of sojourners.”
    marker-yv: yv-n
  - type: text
    text: and the Mediterranean people,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Tyre,” which means “a rock.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: even distant Ethiopia.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will all boast, ‘I was born in Zion!’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But over Zion it will be said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The mighty Man was born there, and he will establish it.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Hebrew reads “Each one is born in Zion, and the Most High makes her secure.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the God Most High will truly bless Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And when he counts her citizens, recording them in his registry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'he will write by their names: “This one was born again here!”'
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the princes of God’s feasts will sing and dance, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 87:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: singing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Every fountain of delight springs up from your life within me!”
