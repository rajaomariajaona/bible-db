document_id: PSA.87,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Fountains of Delight
  - type: text
    content: A prophetic song composed by the prophetic singers of Korah’s clan
  - type: text
    content: High upon his hills of holiness stands God’s city.
  - type: note
    content: The Aramaic reads “His foundations are in his holy mountains.”
  '2':
  - type: text
    content: How God loves the gates of Zion, his favorite place on earth.
  - type: note
    content: Or “The Lord loves Zion’s gates more than all the dwelling places of Jacob.”
  '3':
  - type: text
    content: So many glorious things have been proclaimed
  - type: text
    content: over Zion, God’s holy city!
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: For the Lord says, “Here are the nations
  - type: text
    content: 'who will acknowledge me as God:'
  - type: note
    content: This is in anticipation of the nations of the earth coming to know Christ as the eternal King. See Ps. 86:9.
  - type: text
    content: 'Egypt, '
  - type: note
    content: Or “the proud one,” which is a title given to Egypt.
  - type: text
    content: 'Iraq, '
  - type: note
    content: Or “Babylon,” which means “gate of God.”
  - type: text
    content: 'Palestine, '
  - type: note
    content: Or “Philistia,” which means “land of sojourners.”
  - type: text
    content: and the Mediterranean people,
  - type: note
    content: Or “Tyre,” which means “a rock.”
  - type: text
    content: even distant Ethiopia.
  - type: text
    content: They will all boast, ‘I was born in Zion!’ ”
  '5':
  - type: text
    content: But over Zion it will be said,
  - type: text
    content: “The mighty Man was born there, and he will establish it.”
  - type: note
    content: As translated from the Aramaic. The Hebrew reads “Each one is born in Zion, and the Most High makes her secure.”
  - type: text
    content: For the God Most High will truly bless Jerusalem.
  '6':
  - type: text
    content: And when he counts her citizens, recording them in his registry,
  - type: text
    content: 'he will write by their names: “This one was born again here!”'
  - type: text
    content: Pause in his presence
  '7':
  - type: text
    content: 'And the princes of God’s feasts will sing and dance, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: singing,
  - type: text
    content: “Every fountain of delight springs up from your life within me!”
