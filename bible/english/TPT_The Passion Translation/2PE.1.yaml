      children:
      - type: text
        text: It is possible to view this passage like an unfolding of faith. “Out of your faith will emerge goodness, and out of goodness will emerge understanding (of God), and out of understanding (of God) will emerge inner strength (self-control), and out of inner strength will emerge patient endurance, and out of patient endurance will emerge godliness, and out of godliness will emerge mercy toward your brothers and sisters, and out of mercy will emerge love.” It is also possible to view this passage as a mathematical equation. Faith + goodness = understanding. Goodness + understanding = inner strength. Understanding + inner strength = patience. Inner strength + patience = godliness. Patience + godliness = mercy. And godliness + mercy = love.
    marker-yv: yv-n
