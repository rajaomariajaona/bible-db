  - type: text
    text: rises in your hearts.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not simply a far-off future event of Christ’s coming but the internal promise of his light and power subduing our hearts, as Christ rises within us like the dawning of the new day and like the morning star. The dawn conquers the night, and the morning star promises the new day appearing.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You must understand this at the outset: Interpretation of scriptural prophecy '
  - type: usfm
    marker: it
    children:
    - type: text
      text: requires the Holy Spirit
  - type: text
    text: ', for it does not originate from someone’s own imagination. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek text is somewhat ambiguous and can be translated in three ways: (1) No prophecy can be interpreted by the prophet’s own imagination; that is, they didn’t make things up. (2) No prophecy can be interpreted by itself, for other Scriptures are needed to understand and interpret biblical prophecy. (3) No prophecy can be interpreted by one’s own imagination, for the help of the Holy Spirit, who inspired it, is needed to interpret it. The Aramaic can be translated “No prophecy is ever fulfilled as soon as it is written.”'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'No true prophecy comes from human initiative but is inspired by the moving of the Holy Spirit upon those '
