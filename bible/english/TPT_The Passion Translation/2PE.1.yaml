document_id: 2PE.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction and Greeting
  - type: text
    content: This letter is from
  - type: text
    content: ' Simeon '
  - type: note
    content: Or “Simon,” the Greek form of the Hebrew-Aramaic name Simeon. Simeon means “he who hears.” Peter (the Rock) was the nickname given to him by Jesus; Simeon was his real name.
  - type: text
    content: 'Peter, a '
  - type: text
    content: loving
  - type: text
    content: ' servant '
  - type: note
    content: Or “bond-servant.” From a Hebraic mind-set, this would imply a choice of remaining a servant even when freedom was offered. Thus, “a loving servant.”
  - type: text
    content: 'and an apostle of Jesus Christ. I am writing to those who have been given a faith '
  - type: note
    content: Even our faith has been given to us from a loving Father. Because our faith is equally precious as that of the apostles, we share an equal standing in the privileges and blessings of the kingdom realm of God.
  - type: text
    content: 'as equally precious as ours through the righteousness of our God and Savior, Jesus Christ. '
  - type: note
    content: In his opening verse, Peter points us to the deity of Jesus Christ—“God and Savior, Jesus Christ”—referring to one person. Some have described Peter’s words to be the most clear and direct testimony to the truth of Christ’s equality with God.
  '10':
  - type: text
    content: 'For this reason, beloved ones, '
  - type: note
    content: Or “brothers [and sisters].”
  - type: text
    content: 'be eager to confirm and validate '
  - type: note
    content: The Aramaic adds the phrase “by your good deeds.” The implication is that by developing the virtues Peter has spoken of in vv. 3–7, we validate God’s calling and choice of us.
  - type: text
    content: 'that God has invited you '
  - type: text
    content: to salvation
  - type: text
    content: ' '
  - type: note
    content: We have a confident assurance that we have been chosen and called to salvation by God himself. This is a firm foundation on which to build our lives. We can grow in that confidence as we see the work of the Spirit bearing spiritual fruit through our lives. See Gal. 5:22–23; 2 Tim. 2:19; 1 John 3:10, 14. The Greek for “invited you” is klēsis, which means “to invite [summon] to a feast.”
  - type: text
    content: 'and claimed you '
  - type: note
    content: The Greek word for “claimed as his own” is eklogē (from his logos word). God spoke and you were his. You are meant to be a “chosen word” from his mouth, and you will not return to him void, but you will accomplish what he has destined for you to do.
  - type: text
    content: 'as his own. If you do these things, you will never stumble. '
  '11':
  - type: text
    content: 'As a result, the kingdom’s gates will open wide to you as God choreographs '
  - type: note
    content: This is the Greek word epichorēgeo, which can mean “richly provide” (for the choir) or “choreograph.” The Lord of the dance will richly welcome you into his eternal kingdom. See Zeph. 3:17.
  - type: text
    content: your triumphant entrance into the eternal kingdom of our Lord and Savior, Jesus the Messiah.
  - type: heading
    content: Divine Revelation
  '12':
  - type: text
    content: 'I won’t hesitate to continually remind you of these truths, even though you are aware of them and are well established in the present measure of truth you have already embraced. '
  - type: note
    content: Or “in the measure of truth that has reached you.” The implication is that there is yet more truth for every follower of Jesus to learn and embrace.
  '13':
  - type: text
    content: 'And as long as I live '
  - type: note
    content: Or “as long as I am in this tent.”
  - type: text
    content: 'I will continue to awaken you with this reminder, '
  '14':
  - type: text
    content: 'since our Lord Jesus, the Anointed One, has clearly revealed that my departure is near. '
  - type: note
    content: Or “that the removal of my tent is soon,” a euphemism for Peter’s death. See John 21:18–19. The apostle Peter knew that death was coming soon for him. Indeed, in AD 68 he was crucified upside down in Rome, at his own request, so as not to die in the same manner as Jesus.
  '15':
  - type: text
    content: 'Indeed, I’m passionate '
  - type: note
    content: Or “make every effort.”
  - type: text
    content: to share these things with you so that you will always remember them after my exodus from this life.
  - type: heading
    content: Jesus’ Transfiguration
  '16':
  - type: text
    content: 'We were not retelling some masterfully crafted legend when we informed you of the power and appearing of our Lord Jesus Christ, '
  - type: note
    content: A possible hendiadys, “the powerful coming of our Lord Jesus Christ in power” or “the appearing of our powerful Lord Jesus Christ.” The Aramaic can be translated “the power and comingness of our Master, Jesus Christ.”
  - type: text
    content: 'for we saw his magnificence and splendor '
  - type: text
    content: unveiled
  - type: text
    content: ' before our very eyes. '
  - type: note
    content: See Matt. 17:1–8; Mark 9:1–7; Luke 9:27–36.
  '17':
  - type: text
    content: 'Yes, Father God lavished upon him radiant glory and honor when his distinct voice spoke out of the realm of majestic glory, '
  - type: note
    content: A possible periphrastic reference to God, “the transcendent glory.”
  - type: text
    content: 'endorsing him with these words: This is my cherished Son, marked by my love. All my delight is found in him! '
  - type: note
    content: Or “On him my favor rests.” The Aramaic can be translated “in whom I am fulfilled.”
  '18':
  - type: text
    content: And we ourselves heard that voice resound from the heavens while we were with him on the holy mountain.
  - type: heading
    content: Prophecy
  '19':
  - type: text
    content: 'And so we have been given the prophetic word—the '
  - type: text
    content: written
  - type: text
    content: ' '
  - type: note
    content: 'The phrase prophetic word, or “word of prophecy,” when found in Christian writing through the second century is used only for Old Testament Scriptures. See Peter Davids, The Letters of 2 Peter and Jude (Grand Rapids, MI: Eerdmans, 2006), 207; Gene Green, Jude and 2 Peter (Grand Rapids, MI: Baker Academic, 2008), 227; David Walls and Max Anders, The Holman New Testament Commentary: 1 and 2 Peter; 1, 2 and 3 John and Jude (Nashville, TN: B&H Publishing, 1999), 113. See also Isa. 8:20; Luke 24:25; John 6:45.'
  - type: text
    content: 'message of the prophets, made more reliable and fully validated '
  - type: text
    content: by the confirming voice of God on the Mount of Transfiguration
  - type: text
    content: '. '
  - type: note
    content: 'The comparative adjective bebaioteron (more reliable) serves as a predicate adjective. “And we have the prophetic word as more certain,” meaning that the transfiguration confirmed (made more certain) the witness of the Old Testament Scriptures to Jesus as Messiah, the Son of God, who brought his eternal kingdom on earth (2 Peter 1:11). The witness of God’s Spirit through the transfiguration complements the witness of the Old Testament Scriptures in 2 Peter 1:19—both confirm that Jesus is the Messiah, God’s Son, who will return to rule on earth. See Peter Davids, The Letters of 2 Peter and Jude (Grand Rapids, MI: Eerdmans, 2006), 207. What is said to be made more certain or reliable is “the written message of the prophets.” This has bothered some commentators in that it places experience ahead of the prophetic word, so they argue that the prophetic word makes the transfiguration more certain, citing later Jewish opinion that even a voice (bat qol) from heaven could not overrule a Scripture. That, however, is not what the grammar of the text indicates. Instead, we see that “the written message of the prophets” is what is made more certain/reliable. See also M. Zerwick and M. Grosvenor, A Grammatical Analysis of the Greek New Testament, 3rd rev. edition (Rome: Editrice Pontificio Istituto Biblico, 1988), 719; Lewis R. Donelson, 1 and 2 Peter and Jude (Louisville, KY: Westminster John Knox, 2010), 234: “This means that the account of the transfiguration makes OT prophecy more reliable. . . . The giving of honor and glory to Jesus at the transfiguration reinforces the credibility of OT prophecies about the messiah”; D. P. Senior and D. J. Harrington, 1 Peter, Jude and 2 Peter (Collegeville, MN: Liturgical Press, 2008), 257: “The idea seems to be that the transfiguration and all that pertains to Jesus fulfills and thus confirms what the prophets said and so makes them even ‘all the more reliable’ ”; the same view was also held by the well-known Greek scholar of the early twentieth century; A. T. Robertson, Word Pictures of the New Testament, vol. 6 (Nashville, TN: Broadman Press, 1931), p. 157.'
  - type: text
    content: 'And you will continue to do well if you stay focused on it. '
  - type: text
    content: For this prophetic message
  - type: text
    content: ' is like a piercing light '
  - type: note
    content: Or “lamp.” See Ps. 119:105.
  - type: text
    content: 'shining in a gloomy place '
  - type: note
    content: This dismal or dark/murky place can be both the world in which we live and the human heart bathed in the light of truth, displacing gloom and darkness. See Isa. 9:1.
  - type: text
    content: 'until the dawning of a new day, '
  - type: note
    content: See Luke 1:78.
  - type: text
    content: 'when the Morning Star '
  - type: note
    content: Or “Light Bearer.” The Aramaic can be translated “until the sun rises in your hearts.” See Rev. 22:16.
  - type: text
    content: rises in your hearts.
  - type: note
    content: This is not simply a far-off future event of Christ’s coming but the internal promise of his light and power subduing our hearts, as Christ rises within us like the dawning of the new day and like the morning star. The dawn conquers the night, and the morning star promises the new day appearing.
  '2':
  - type: text
    content: 'May grace and perfect peace cascade over you '
  - type: note
    content: Or “May grace and peace be multiplied to you.”
  - type: text
    content: 'as you '
  - type: text
    content: live
  - type: text
    content: ' in the rich knowledge of God and of Jesus our Lord.'
  - type: heading
    content: God’s Generous Grace
  '20':
  - type: text
    content: 'You must understand this at the outset: Interpretation of scriptural prophecy '
  - type: text
    content: requires the Holy Spirit
  - type: text
    content: ', for it does not originate from someone’s own imagination. '
  - type: note
    content: 'The Greek text is somewhat ambiguous and can be translated in three ways: (1) No prophecy can be interpreted by the prophet’s own imagination; that is, they didn’t make things up. (2) No prophecy can be interpreted by itself, for other Scriptures are needed to understand and interpret biblical prophecy. (3) No prophecy can be interpreted by one’s own imagination, for the help of the Holy Spirit, who inspired it, is needed to interpret it. The Aramaic can be translated “No prophecy is ever fulfilled as soon as it is written.”'
  '21':
  - type: text
    content: 'No true prophecy comes from human initiative but is inspired by the moving of the Holy Spirit upon those '
  - type: note
    content: Some Greek manuscripts have “holy men” (and women).
  - type: text
    content: who spoke the message that came from God.
  - type: note
    content: This is a clear reference to the doctrine of the inspiration of the Scriptures. It is God’s words spoken (prophecy) and written, as given by the Holy Spirit. God speaks through people his inspired and trustworthy words. See also 2 Tim. 3:16–17.
  '3':
  - type: text
    content: 'Everything we could ever need for life and godliness '
  - type: note
    content: It is possible that this is a hendiadys, which would then mean “a life of godliness” (complete devotion). Everything we need to reflect God’s true nature has already been given to us. See Eph. 1:3.
  - type: text
    content: 'has already been deposited in us by his divine power. '
  - type: text
    content: For all this was lavished upon us
  - type: text
    content: ' through the rich experience of knowing him who has called us by name and invited us to come to him through a glorious manifestation of his goodness. '
  - type: note
    content: Or “called us by his glory and goodness.”
  '4':
  - type: text
    content: 'As a result of this, he has given you '
  - type: note
    content: As translated from the Aramaic. The Greek is plural, “us.”
  - type: text
    content: 'magnificent promises '
  - type: note
    content: The Greek sentence that extends from vv. 3–5 is somewhat ambiguous. It could also be read as “Through a glorious manifestation of his goodness he has imparted to us his magnificent promises.”
  - type: text
    content: 'that are beyond all price, so that through '
  - type: text
    content: the power of
  - type: text
    content: ' these tremendous promises '
  - type: note
    content: That is, by claiming these tremendous promises as our very own. Faith always releases the power of the Word of God.
  - type: text
    content: 'we can experience partnership '
  - type: note
    content: The Greek word koinonos means “to participate as a partner, to partake of, to be a companion with, to have fellowship with” the divine nature. This is one of the great mysteries of our faith, that God shares his nature with us. We are given birth by the Holy Spirit to be God’s true sons and daughters, and every father imparts his DNA and his “nature” to his children. The Greek word physis (nature) is taken from the word phyō, which means “to give birth, produce, bring forth, or to grow up.” Christ lives in us and transforms us into his very own likeness. In Christ we share with him the divine nature. We will all bear the image of the man from heaven, Jesus Christ. See Rom. 8:9–25; 1 Cor. 15:12–57.
  - type: text
    content: 'with the divine nature, by which you have escaped '
  - type: note
    content: The Greek word apopheugō also carries the connotation of being “acquitted.”
  - type: text
    content: the corrupt desires that are of the world.
  - type: heading
    content: Faith’s Ladder of Virtue
  '5':
  - type: text
    content: 'So devote yourselves '
  - type: note
    content: Or “by having added your intense effort.” The Aramaic can be translated “by being under the weight of all these gifts.”
  - type: text
    content: 'to lavishly supplementing '
  - type: note
    content: The Greek word epichorēgeo means “to fully support the chorus” or “to completely choreograph.”
  - type: text
    content: your faith with goodness,
  - type: note
    content: Or “integrity, virtues of courage, nobleness, and moral valor.”
  - type: text
    content: and to goodness add understanding,
  '6':
  - type: text
    content: and to understanding add the strength of self-control,
  - type: text
    content: and to self-control add patient endurance,
  - type: text
    content: and to patient endurance add godliness,
  - type: note
    content: Or “reverence.”
  '7':
  - type: text
    content: and to godliness add mercy toward your brothers and sisters,
  - type: note
    content: As translated from the Aramaic and implied in the Greek. This mercy would include forgiveness and forbearance to those who fail.
  - type: text
    content: and to mercy toward others add unending love.
  - type: note
    content: It is possible to view this passage like an unfolding of faith. “Out of your faith will emerge goodness, and out of goodness will emerge understanding (of God), and out of understanding (of God) will emerge inner strength (self-control), and out of inner strength will emerge patient endurance, and out of patient endurance will emerge godliness, and out of godliness will emerge mercy toward your brothers and sisters, and out of mercy will emerge love.” It is also possible to view this passage as a mathematical equation. Faith + goodness = understanding. Goodness + understanding = inner strength. Understanding + inner strength = patience. Inner strength + patience = godliness. Patience + godliness = mercy. And godliness + mercy = love.
  '8':
  - type: text
    content: 'Since these virtues are already '
  - type: text
    content: planted
  - type: text
    content: ' deep within, '
  - type: note
    content: The Greek word hyparchō means to “begin below” (or “within,” like a plant growing beneath the ground).
  - type: text
    content: 'and you possess them in abundant supply, '
  - type: note
    content: Or “abounding” (repeatedly being more than enough).
  - type: text
    content: 'they will keep you from being inactive or fruitless in your pursuit of knowing Jesus Christ more intimately. '
  '9':
  - type: text
    content: 'But if anyone lacks these things, he is blind, constantly closing his eyes to the mysteries of our faith, '
  - type: note
    content: Although the Greek word myōpazō can mean “nearsighted,” it is a compound word taken from the base word mystērion (mystery), and optonomai (to look upon, to behold). The implication is that when the virtues of the divine nature are not flourishing in believers, it is because they are “closing [their] eyes” to the mysteries of our faith, i.e., Christ in us, the hope of glory. See Col. 1:27.
  - type: text
    content: 'and forgetting '
  - type: text
    content: his innocence
  - type: text
    content: —for his past sins have been washed away.
  - type: note
    content: The Aramaic can be translated “he is still searching for the purification of his original sins.”
