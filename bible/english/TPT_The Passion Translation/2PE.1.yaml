        text: '(Grand Rapids, MI: Eerdmans, 2006), 207. What is said to be made more certain or reliable is “the written message of the prophets.” This has bothered some commentators in that it places experience ahead of the prophetic word, so they argue that the prophetic word makes the transfiguration more certain, citing later Jewish opinion that even a voice ('
