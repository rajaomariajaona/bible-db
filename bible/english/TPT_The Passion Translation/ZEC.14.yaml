document_id: ZEC.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Final Battle and the Coming of Yahweh
  - type: text
    content: 'Behold, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will have his day! And '
  - type: text
    content: Jerusalem
  - type: text
    content: ', when that day comes, your plunder will be divided in your midst. '
  '10':
  - type: text
    content: 'The entire land of Judah will be transformed into a fertile plain, from Geba '
  - type: text
    content: in the north
  - type: text
    content: ' to Rimmon south of Jerusalem. But Jerusalem will remain standing high above the plain from the Benjamin Gate to the site of the first gate, to the Corner Gate, and from the Tower of Hananel to the king’s winepresses. '
  '11':
  - type: text
    content: 'People will live there '
  - type: text
    content: securely
  - type: text
    content: ', for the city will never again be doomed to destruction. Jerusalem will be safe to live in.'
  '12':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' will bring a devastating plague upon all the nations who have fought against Jerusalem. Their flesh will rot while they stand on their feet. Their eyes will rot in their sockets, and their tongues will rot in their mouths. '
  '13':
  - type: text
    content: 'And on that day, '
  - type: text
    content: Yahweh
  - type: text
    content: ' will cause their hearts to panic. Each one will seize his neighbor and strike him. Fighting will break out one against another '
  '14':
  - type: text
    content: 'until even the people of Judah will fight against '
  - type: note
    content: Or “in [at] Jerusalem.”
  - type: text
    content: 'the people of Jerusalem. The people of Jerusalem will gather all the riches of the surrounding nations: vast amounts of gold, silver, and clothing. '
  '15':
  - type: text
    content: And a similar plague will afflict the horses, mules, camels, donkeys, and all the other animals in the camp of their enemies.
  '16':
  - type: text
    content: 'Afterward, the survivors of all the nations that have attacked the city will return to Jerusalem each year to worship the King '
  - type: text
    content: of the world
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, and to celebrate the Feast of Tabernacles. '
  - type: note
    content: See Lev. 23:33–36. That is, Sukkot, a major theme for the rest of the book of Zechariah. The seven days of rejoicing commemorates the seven days of instruction Moses gave to Aaron and his sons before the people waited on the Shekinah to descend on the new dwelling place (or “tabernacle”; Hb. mishkan). It was days of dancing (circles) and (required) joy. Especially for the leaders of the people who were always concerned with their dignity (priests, princes, etc.), they, too, were required to dance and rejoice with abandon. They once danced around the golden calf, and now they were to dance with holy abandon in the joyful worship of God.
  '17':
  - type: text
    content: 'And if any of the people groups of the world do not go up to Jerusalem to worship the King '
  - type: text
    content: of the world
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, no rain will fall upon their land. '
  '18':
  - type: text
    content: 'And if the Egyptian people do not make this pilgrimage, then '
  - type: text
    content: Yahweh
  - type: text
    content: ' will '
  - type: note
    content: Although the Hebrew is “will not send the plague,” the context supports the reading of the Greek, which is followed here by nearly every modern translation.
  - type: text
    content: 'send the same plague he sent the other nations that did not celebrate the Feast of Tabernacles. '
  '19':
  - type: text
    content: This will be the punishment for Egypt and the punishment for all the nations that fail to come up to keep the Feast of Tabernacles.
  '2':
  - type: text
    content: 'For I will gather all the nations to Jerusalem for battle. '
  - type: note
    content: See Ezek. 38.
  - type: text
    content: 'The city will be captured, the houses ransacked, and the women raped. Half the people will go into exile, but the rest will be allowed to remain in the city. '
  - type: note
    content: Or literally “will not be cut off from the city.”
  '20':
  - type: text
    content: 'When that day comes, the very bells on the horses will have inscribed on them, “Holy to '
  - type: text
    content: Yahweh
  - type: text
    content: '.” '
  - type: note
    content: This same inscription, “Holy to Yahweh,” was also on the gold plate attached to the turban of the high priest (Ex. 28:36; 39:30). The sense of this passage is to teach that even the mundane, natural things can be holy to God when believers dedicate them and set them apart for heaven’s purposes. The difference between secular and sacred is meant to disappear. For the believer today, all of life is set apart for God (see Rom. 12:1–2).
  - type: text
    content: 'Even the cooking pots of the house of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be as sacred as the '
  - type: text
    content: sprinkling
  - type: text
    content: ' bowls set before the altar. '
  '21':
  - type: text
    content: Yes
  - type: text
    content: ', every cooking pot in Jerusalem and in Judah will be holy to '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, and acceptable to use for anyone who comes to offer a sacrifice. And at that time there will be no merchant '
  - type: note
    content: Or “Canaanite.”
  - type: text
    content: 'in the house of '
  - type: text
    content: Yahweh
  - type: text
    content: ', who commands the armies of heaven.'
  '3':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' will intervene and fight against those nations as when he fights on a day of battle. '
  '4':
  - type: text
    content: 'On that day, his feet will stand on the Mount of Olives, east of Jerusalem. Then the Mount of Olives will be divided down the middle, forming a wide valley that runs from east to west. So half the Mount will move backward to the north and the other half to the south. '
  '5':
  - type: text
    content: 'When this happens, you will escape by way of my newly formed valley, which will extend as far as Azal. '
  - type: note
    content: Azal or “Azel” may be the place referenced in Mic. 1:11, “Beth Ezel.”
  - type: text
    content: 'You will flee as your ancestors fled from the earthquake in the days of Uzziah king of Judah. '
  - type: note
    content: King Uzziah reigned from 792 BC to 740 BC. This massive earthquake is mentioned by the Jewish historian Flavius Josephus, in Amos 1:1, and possibly in Isa. 6:4.
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God will come and all the holy ones with him.'
  - type: note
    content: Or “Then the Lord my God will come and all his holy ones with me” (Hebrew). See Jude (Judah) 14.
  '6':
  - type: text
    content: 'On that day, there will be no light, neither cold nor frost. '
  - type: note
    content: As translated from the Septuagint, Syriac, Vulgate, and Targum. The Hebrew is uncertain.
  '7':
  - type: text
    content: 'It will be a unique day, a day known only to '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: See Matt. 24:36. For Zechariah, the promises of God were inevitable—they would be fulfilled. What is conditional is the timing. The promises will be fulfilled when we are ready to receive them. God is like a pilot who wants to “land” his promises. We just have to clear the runway so he can land them.
  - type: text
    content: There will be no more day and night, and even at evening, it will remain light.
  '8':
  - type: text
    content: 'On that day, living waters will flow from Jerusalem, half toward the Dead Sea, half toward the Mediterranean Sea. '
  - type: note
    content: Or “the eastern sea . . . the western sea.”
  - type: text
    content: 'And they will flow in the summer and winter. '
  '9':
  - type: text
    content: 'Then King '
  - type: text
    content: Yahweh
  - type: text
    content: ' will rule over the whole world. When that day comes, '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be the one and only God, and everyone will acknowledge him by one single name. '
  - type: note
    content: That is, the holy name of Yahweh. See Deut. 6:4–5; Mal. 1:11.
