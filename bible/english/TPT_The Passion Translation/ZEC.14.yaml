        text: Rom. 12:1–2
      metadata:
        usfm: ROM.12.1+ROM.12.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Even the cooking pots of the house of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will be as sacred as the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sprinkling
  - type: text
    text: ' bowls set before the altar. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Yes
  - type: text
    text: ', every cooking pot in Jerusalem and in Judah will be holy to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, and acceptable to use for anyone who comes to offer a sacrifice. And at that time there will be no merchant '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Canaanite.”
    marker-yv: yv-n
  - type: text
    text: 'in the house of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', who commands the armies of heaven.'
