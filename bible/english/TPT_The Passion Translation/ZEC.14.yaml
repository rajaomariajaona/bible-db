- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Final Battle and the Coming of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Behold, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', will have his day! And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jerusalem
  - type: text
    text: ', when that day comes, your plunder will be divided in your midst. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For I will gather all the nations to Jerusalem for battle. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 38
      metadata:
        usfm: EZK.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'The city will be captured, the houses ransacked, and the women raped. Half the people will go into exile, but the rest will be allowed to remain in the city. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “will not be cut off from the city.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will intervene and fight against those nations as when he fights on a day of battle. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On that day, his feet will stand on the Mount of Olives, east of Jerusalem. Then the Mount of Olives will be divided down the middle, forming a wide valley that runs from east to west. So half the Mount will move backward to the north and the other half to the south. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When this happens, you will escape by way of my newly formed valley, which will extend as far as Azal. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Azal or “Azel” may be the place referenced in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 1:11
      metadata:
        usfm: MIC.1.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', “Beth Ezel.”'
    marker-yv: yv-n
  - type: text
    text: 'You will flee as your ancestors fled from the earthquake in the days of Uzziah king of Judah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: King Uzziah reigned from 792 BC to 740 BC. This massive earthquake is mentioned by the Jewish historian Flavius Josephus, in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 1:1
      metadata:
        usfm: AMO.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and possibly in'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 6:4
      metadata:
        usfm: ISA.6.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' your God will come and all the holy ones with him.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Then the Lord my God will come and all his holy ones with me” (Hebrew). See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jude (Judah) 14
      metadata:
        usfm: JUD.1.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On that day, there will be no light, neither cold nor frost. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint, Syriac, Vulgate, and Targum. The Hebrew is uncertain.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It will be a unique day, a day known only to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 24:36
      metadata:
        usfm: MAT.24.36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . For Zechariah, the promises of God were inevitable—they would be fulfilled. What is conditional is the timing. The promises will be fulfilled when we are ready to receive them. God is like a pilot who wants to “land” his promises. We just have to clear the runway so he can land them.
    marker-yv: yv-n
  - type: text
    text: There will be no more day and night, and even at evening, it will remain light.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On that day, living waters will flow from Jerusalem, half toward the Dead Sea, half toward the Mediterranean Sea. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the eastern sea . . . the western sea.”
    marker-yv: yv-n
  - type: text
    text: 'And they will flow in the summer and winter. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then King '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will rule over the whole world. When that day comes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will be the one and only God, and everyone will acknowledge him by one single name. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the holy name of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 6:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 1:11
      metadata:
        usfm: MAL.1.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The entire land of Judah will be transformed into a fertile plain, from Geba '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the north
  - type: text
    text: ' to Rimmon south of Jerusalem. But Jerusalem will remain standing high above the plain from the Benjamin Gate to the site of the first gate, to the Corner Gate, and from the Tower of Hananel to the king’s winepresses. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'People will live there '
  - type: usfm
    marker: it
    children:
    - type: text
      text: securely
  - type: text
    text: ', for the city will never again be doomed to destruction. Jerusalem will be safe to live in.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will bring a devastating plague upon all the nations who have fought against Jerusalem. Their flesh will rot while they stand on their feet. Their eyes will rot in their sockets, and their tongues will rot in their mouths. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And on that day, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will cause their hearts to panic. Each one will seize his neighbor and strike him. Fighting will break out one against another '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'until even the people of Judah will fight against '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in [at] Jerusalem.”
    marker-yv: yv-n
  - type: text
    text: 'the people of Jerusalem. The people of Jerusalem will gather all the riches of the surrounding nations: vast amounts of gold, silver, and clothing. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And a similar plague will afflict the horses, mules, camels, donkeys, and all the other animals in the camp of their enemies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Afterward, the survivors of all the nations that have attacked the city will return to Jerusalem each year to worship the King '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the world
  - type: text
    text: ', '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, and to celebrate the Feast of Tabernacles. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 23:33–36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . That is, Sukkot, a major theme for the rest of the book of Zechariah. The seven days of rejoicing commemorates the seven days of instruction Moses gave to Aaron and his sons before the people waited on the Shekinah to descend on the new dwelling place (or “tabernacle”; Hb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mishkan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It was days of dancing (circles) and (required) joy. Especially for the leaders of the people who were always concerned with their dignity (priests, princes, etc.), they, too, were required to dance and rejoice with abandon. They once danced around the golden calf, and now they were to dance with holy abandon in the joyful worship of God.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And if any of the people groups of the world do not go up to Jerusalem to worship the King '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the world
  - type: text
    text: ', '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, no rain will fall upon their land. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And if the Egyptian people do not make this pilgrimage, then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the Hebrew is “will not send the plague,” the context supports the reading of the Greek, which is followed here by nearly every modern translation.
    marker-yv: yv-n
  - type: text
    text: 'send the same plague he sent the other nations that did not celebrate the Feast of Tabernacles. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: This will be the punishment for Egypt and the punishment for all the nations that fail to come up to keep the Feast of Tabernacles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
