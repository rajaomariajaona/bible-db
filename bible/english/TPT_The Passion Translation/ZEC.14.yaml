    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The sense of this passage is to teach that even the mundane, natural things can be holy to God when believers dedicate them and set them apart for heaven’s purposes. The difference between secular and sacred is meant to disappear. For the believer today, all of life is set apart for God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
