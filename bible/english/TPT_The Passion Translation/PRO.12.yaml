document_id: PRO.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: It’s Right to Live for God
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: To learn the truth you must long to be teachable,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are times when even the wise need correction, but they will appreciate its value.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: or you can despise correction and remain ignorant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: If your heart is right, favor flows from the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a devious heart invites his condemnation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You can’t expect success by doing what’s wrong.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the lives of his lovers are deeply rooted and firmly planted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The integrity and strength of a virtuous wife
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an amazing Hebrew word used here. It is more commonly used to describe warriors, champions, and mighty ones. Many translations read “an excellent wife.” But the meaning of the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chayil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is better translated “an army that is wealthy,” “strong,” “mighty,” “powerful,” “with substance,” “valiant,” “virtuous,” or “worthy.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: transforms her husband into an honored king.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “An excellent wife is the crown of her husband.” By implication, her dignity makes him a king.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the wife who disgraces her husband
- type: usfm
  marker: q1
  children:
  - type: text
    text: weakens the strength of his identity.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “she is like cancer in his bones.” Bones are a metaphor for inner strength, our inner being, or identity.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The lovers of God are filled with good ideas
- type: usfm
  marker: q1
  children:
  - type: text
    text: that are noble and pure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the schemes of the sinner
- type: usfm
  marker: q1
  children:
  - type: text
    text: are crammed with nothing but lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The wicked use their words to ambush and accuse,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “lie in wait for blood.” This is a figure of speech for accusation.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the lovers of God speak to defend and protect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The wicked are taken out, gone for good,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the godly families shall live on.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Everyone admires a man of principles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the one with a corrupt heart is despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Just be who you are and work hard for a living,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for that’s better than pretending to be important
- type: usfm
  marker: q1
  children:
  - type: text
    text: and starving to death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A good man takes care of the needs of his pets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: while even the kindest acts of a wicked man are still cruel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Work hard at your job and you’ll have what you need.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Following a get-rich-quick scheme is nothing but a fantasy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The cravings of the wicked are only for what is evil,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “Thieves crave the loot of other thieves.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but righteousness is the core motivation for the lovers of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and it keeps them content and flourishing.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew text of v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: PRO.12.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Means Being Teachable
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The wicked will get trapped by their words
- type: usfm
  marker: q1
  children:
  - type: text
    text: of gossip, slander, and lies.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is simply “sinful words,” which implies gossip, slander, and lies.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: But for the righteous, honesty is its own defense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For there is great satisfaction in speaking the truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and hard work brings blessings back to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: A fool is in love with his own opinion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but wisdom means being teachable.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Learning to Speak Wisely
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: If you shrug off an insult and refuse to take offense,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you demonstrate discretion indeed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A shrewd man conceals his shame.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the fool has a short fuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will immediately let you know when he’s offended.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Truthfulness marks the righteous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the habitual liar can never be trusted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Reckless words are like the thrusts of a sword,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cutting remarks meant to stab and to hurt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the words of the wise soothe and heal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Truthful words will stand the test of time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but one day every lie will be seen for what it is.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Deception fills the hearts of those who plot harm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but those who plan for peace '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “counselors of peace.”
    marker-yv: yv-n
  - type: text
    text: are filled with joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Calamity is not allowed to overwhelm the righteous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but there’s nothing but trouble waiting for the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Live in the truth and keep your promises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the Lord will keep delighting in you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but he detests a liar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Those who possess wisdom don’t feel the need
- type: usfm
  marker: q1
  children:
  - type: text
    text: to impress others with what they know,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but foolish ones make sure their ignorance is on display.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: If you want to reign in life,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “reign” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: mashal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') is the title of the book: Proverbs. See introduction and the footnote on'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 1:1
      metadata:
        usfm: PRO.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: don’t sit on your hands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead, work hard at doing what’s right,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the slacker will end up working to make someone else succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Anxious fear brings depression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a life-giving word of encouragement
- type: usfm
  marker: q1
  children:
  - type: text
    text: can do wonders to restore joy to the heart.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This insightful proverb can also be translated “Stop worrying! Think instead of what brings you gladness.” Our focus must never be on what we can’t change but on the everlasting joy we have in Christ. Sometimes we have to find the life-giving word of encouragement rising up in our own hearts. This is the secret of finding perpetual encouragement by the Word that lives in us.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lovers of God give good advice to their friends,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from older Aramaic manuscripts. The Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the counsel of the wicked will lead them astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A passive person won’t even complete a project,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a passionate person makes good use
- type: usfm
  marker: q1
  children:
  - type: text
    text: of his time, wealth, and energy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the text, paraphrased from an uncertain Hebrew phrase. An alternate translation would be “A lazy person won’t get to roast the game he caught, but the wealth of a diligent person is precious.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Abundant life is discovered by walking in righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but holding on to your anger leads to death.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint and the Aramaic. The Hebrew is uncertain.
    marker-yv: yv-n
