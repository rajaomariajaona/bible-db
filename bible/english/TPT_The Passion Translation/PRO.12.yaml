document_id: PRO.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: It’s Right to Live for God
  - type: text
    content: To learn the truth you must long to be teachable,
  - type: note
    content: There are times when even the wise need correction, but they will appreciate its value.
  - type: text
    content: or you can despise correction and remain ignorant.
  '10':
  - type: text
    content: A good man takes care of the needs of his pets,
  - type: text
    content: while even the kindest acts of a wicked man are still cruel.
  '11':
  - type: text
    content: Work hard at your job and you’ll have what you need.
  - type: text
    content: Following a get-rich-quick scheme is nothing but a fantasy.
  '12':
  - type: text
    content: The cravings of the wicked are only for what is evil,
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Thieves crave the loot of other thieves.”
  - type: text
    content: but righteousness is the core motivation for the lovers of God,
  - type: text
    content: and it keeps them content and flourishing.
  - type: note
    content: The meaning of the Hebrew text of v. 12 is uncertain.
  - type: heading
    content: Wisdom Means Being Teachable
  '13':
  - type: text
    content: The wicked will get trapped by their words
  - type: text
    content: of gossip, slander, and lies.
  - type: note
    content: The Hebrew is simply “sinful words,” which implies gossip, slander, and lies.
  - type: text
    content: But for the righteous, honesty is its own defense.
  '14':
  - type: text
    content: For there is great satisfaction in speaking the truth,
  - type: text
    content: and hard work brings blessings back to you.
  '15':
  - type: text
    content: A fool is in love with his own opinion,
  - type: text
    content: but wisdom means being teachable.
  - type: heading
    content: Learning to Speak Wisely
  '16':
  - type: text
    content: If you shrug off an insult and refuse to take offense,
  - type: text
    content: you demonstrate discretion indeed.
  - type: note
    content: Or “A shrewd man conceals his shame.”
  - type: text
    content: But the fool has a short fuse
  - type: text
    content: and will immediately let you know when he’s offended.
  '17':
  - type: text
    content: Truthfulness marks the righteous,
  - type: text
    content: but the habitual liar can never be trusted.
  '18':
  - type: text
    content: Reckless words are like the thrusts of a sword,
  - type: text
    content: cutting remarks meant to stab and to hurt.
  - type: text
    content: But the words of the wise soothe and heal.
  '19':
  - type: text
    content: Truthful words will stand the test of time,
  - type: text
    content: but one day every lie will be seen for what it is.
  '2':
  - type: text
    content: If your heart is right, favor flows from the Lord,
  - type: text
    content: but a devious heart invites his condemnation.
  '20':
  - type: text
    content: Deception fills the hearts of those who plot harm,
  - type: text
    content: 'but those who plan for peace '
  - type: note
    content: Or “counselors of peace.”
  - type: text
    content: are filled with joy.
  '21':
  - type: text
    content: Calamity is not allowed to overwhelm the righteous,
  - type: text
    content: but there’s nothing but trouble waiting for the wicked.
  '22':
  - type: text
    content: Live in the truth and keep your promises,
  - type: text
    content: and the Lord will keep delighting in you,
  - type: text
    content: but he detests a liar.
  '23':
  - type: text
    content: Those who possess wisdom don’t feel the need
  - type: text
    content: to impress others with what they know,
  - type: text
    content: but foolish ones make sure their ignorance is on display.
  '24':
  - type: text
    content: If you want to reign in life,
  - type: note
    content: 'The Hebrew word for “reign” (mashal) is the title of the book: Proverbs. See introduction and the footnote on Prov. 1:1.'
  - type: text
    content: don’t sit on your hands.
  - type: text
    content: Instead, work hard at doing what’s right,
  - type: text
    content: for the slacker will end up working to make someone else succeed.
  '25':
  - type: text
    content: Anxious fear brings depression,
  - type: text
    content: but a life-giving word of encouragement
  - type: text
    content: can do wonders to restore joy to the heart.
  - type: note
    content: This insightful proverb can also be translated “Stop worrying! Think instead of what brings you gladness.” Our focus must never be on what we can’t change but on the everlasting joy we have in Christ. Sometimes we have to find the life-giving word of encouragement rising up in our own hearts. This is the secret of finding perpetual encouragement by the Word that lives in us.
  '26':
  - type: text
    content: Lovers of God give good advice to their friends,
  - type: note
    content: As translated from older Aramaic manuscripts. The Hebrew is uncertain.
  - type: text
    content: but the counsel of the wicked will lead them astray.
  '27':
  - type: text
    content: A passive person won’t even complete a project,
  - type: text
    content: but a passionate person makes good use
  - type: text
    content: of his time, wealth, and energy.
  - type: note
    content: Implied in the text, paraphrased from an uncertain Hebrew phrase. An alternate translation would be “A lazy person won’t get to roast the game he caught, but the wealth of a diligent person is precious.”
  '28':
  - type: text
    content: Abundant life is discovered by walking in righteousness,
  - type: text
    content: but holding on to your anger leads to death.
  - type: note
    content: As translated from the Septuagint and the Aramaic. The Hebrew is uncertain.
  '3':
  - type: text
    content: You can’t expect success by doing what’s wrong.
  - type: text
    content: But the lives of his lovers are deeply rooted and firmly planted.
  '4':
  - type: text
    content: The integrity and strength of a virtuous wife
  - type: note
    content: There is an amazing Hebrew word used here. It is more commonly used to describe warriors, champions, and mighty ones. Many translations read “an excellent wife.” But the meaning of the Hebrew word chayil is better translated “an army that is wealthy,” “strong,” “mighty,” “powerful,” “with substance,” “valiant,” “virtuous,” or “worthy.”
  - type: text
    content: transforms her husband into an honored king.
  - type: note
    content: Or “An excellent wife is the crown of her husband.” By implication, her dignity makes him a king.
  - type: text
    content: But the wife who disgraces her husband
  - type: text
    content: weakens the strength of his identity.
  - type: note
    content: Or “she is like cancer in his bones.” Bones are a metaphor for inner strength, our inner being, or identity.
  '5':
  - type: text
    content: The lovers of God are filled with good ideas
  - type: text
    content: that are noble and pure,
  - type: text
    content: but the schemes of the sinner
  - type: text
    content: are crammed with nothing but lies.
  '6':
  - type: text
    content: The wicked use their words to ambush and accuse,
  - type: note
    content: Or “lie in wait for blood.” This is a figure of speech for accusation.
  - type: text
    content: but the lovers of God speak to defend and protect.
  '7':
  - type: text
    content: The wicked are taken out, gone for good,
  - type: text
    content: but the godly families shall live on.
  '8':
  - type: text
    content: Everyone admires a man of principles,
  - type: text
    content: but the one with a corrupt heart is despised.
  '9':
  - type: text
    content: Just be who you are and work hard for a living,
  - type: text
    content: for that’s better than pretending to be important
  - type: text
    content: and starving to death.
