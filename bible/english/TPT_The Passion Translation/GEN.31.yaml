document_id: GEN.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Escapes from Laban
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Jacob heard that the sons of Laban were complaining, “Everything Jacob owns he has taken from our father! He gained all his wealth from what our father owned.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And Jacob saw that Laban no longer viewed him favorably as he once did. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to Jacob, “Return to the land of your ancestors where you were born; and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: remember
  - type: text
    text: ', I will be with you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So Jacob sent a message for Leah and Rachel to meet him in the field where his flocks were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grazing
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When they arrived, he said to them, “I can see that your father’s attitude toward me has changed, but the God of my father has been with me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'You both know I have worked for your father as hard as I could, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'although he has cheated me and reduced '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “changed.” The implication is that Laban did not give him raises, but reduced his salary literally in the Hebrew “ten times” (a term not meant to define how many times, but a figure of speech for “many, many times”).
    marker-yv: yv-n
  - type: text
    text: 'my wages over and over. Yet God has not allowed him to harm me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If he said, ‘The speckled ones will be your wages,’ then all the flock bore speckled. If he said, ‘The striped ones will be your wages,’ then all the flock bore striped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Because of these '
  - type: usfm
    marker: it
    children:
    - type: text
      text: miracles
  - type: text
    text: ', God has taken away your father’s livestock and given them to me!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob continued
  - type: text
    text: ', “Once during the breeding season, I had a dream. I saw that the male goats who were mating were all speckled, streaked, or spotted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In the dream, the angel of God called me by my name, ‘Jacob.’ ”
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘I am here,’ I answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“Then he said, ‘Observe and note that all the male goats that are mating are speckled, streaked, or spotted, for I have seen all that Laban is doing to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I am the God who appeared to you at Bethel, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint and ancient Targums. The Hebrew is “I am the God of Bethel.”
    marker-yv: yv-n
  - type: text
    text: where you anointed a pillar and made a vow to me. Now leave this land at once and return to the land of your birth.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Rachel and Leah answered him, “Our father doesn’t want us to inherit a portion from his estate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hasn’t he treated us as outsiders '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and not as members of his family
  - type: text
    text: '? Not only did he sell us '
  - type: usfm
    marker: it
    children:
    - type: text
      text: like property
  - type: text
    text: ', but he has also spent our purchase price! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Our father’s wealth that God has given you was legally ours and our children to begin with! So, go ahead and do whatever God has told you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jacob immediately put his wives and children on camels '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: and took with him all the livestock and everything he had amassed in Paddan-Aram. He set out to return to his father Isaac in the land of Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'One day, when Laban had gone '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to his fields
  - type: text
    text: ' to shear his sheep, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Sheep shearing was done in the spring, and it was a time of celebration and festivities that could have lasted a week (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 25:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '8'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '11'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 13:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Laban was preoccupied with the festivities and didn’t realize that his household gods had been stolen and that Jacob was secretly taking off with his daughters.
    marker-yv: yv-n
  - type: text
    text: 'Rachel stole her father’s household idols. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teraphim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; they can be described as small, carved figurines passed down within the family or clan.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Teraphim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is taken from an Aramaic root word meaning “to inquire.” Apparently, Laban used these images for guidance by divination. Rachel’s taking her father’s gods meant she took his ability to discover where they had gone (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 17:5
      metadata:
        usfm: JDG.17.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 19:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 21:21
      metadata:
        usfm: EZK.21.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Other scholars believe that the teraphim guaranteed the right of inheritance to whoever possessed them. According to ancient Akkadian writings, the possession of these family idols (gods) could verify legal title to the family estate. This was perhaps the reason for Laban’s angry accusation of Jacob (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30'
      metadata:
        usfm: GEN.31.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jacob had outwitted Laban the Aramean by secretly departing without telling him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He fled with all that he had, and after crossing the Euphrates, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Euphrates was known to the Hebrews simply as “the River.” It was about fifty miles from Laban’s home to the Euphrates.
    marker-yv: yv-n
  - type: text
    text: 'he headed for the hill country of Gilead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And it wasn’t until three days later that Laban discovered Jacob had left.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Laban Pursues Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Laban, along with some of his relatives, took off in pursuit and chased after Jacob for seven days. He had almost caught up with him in the hill country of Gilead, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'when God appeared to Laban the Aramean in a dream and warned him, “Be careful that you neither '
  - type: usfm
    marker: it
    children:
    - type: text
      text: harm nor
  - type: text
    text: ' threaten Jacob.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that you speak not to Jacob a word either good or evil.” This is a merism, for God was not telling Laban to remain silent, but rather to neither harm nor threaten Jacob with his words.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now Jacob had set up his camp with his flocks on a hill, and Laban had him in his sights. Laban and his companions set up their camp nearby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Laban '
  - type: usfm
    marker: it
    children:
    - type: text
      text: approached
  - type: text
    text: ' Jacob and said, “'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Nephew
  - type: text
    text: ', what have you done? You’ve deceived me and carried away my daughters like captives on a battlefield. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Why did you trick me and run away in secret without telling me? I would have sent you off joyously, celebrating with singing and dancing to the tambourine and stringed instruments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And why did you not even let me kiss my daughters and grandchildren goodbye? What you have done is foolish! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'I could harm you, but the God of your father spoke to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in a dream
  - type: text
    text: ' last night, saying, ‘Be careful that you neither '
  - type: usfm
    marker: it
    children:
    - type: text
      text: harm nor
  - type: text
    text: ' threaten Jacob.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Now I realize you ran away because you desperately long to return to your father’s house, but why did you steal my gods?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: I left in a hurry
  - type: text
    text: ' because I was afraid,” Jacob answered, “and I thought you would take your daughters from me by force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Whoever has taken your gods will be put to death! So here, in the presence of our relatives, if you can find among our possessions anything that is yours, take it.” Now Jacob had no clue that Rachel had stolen the gods.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Laban went immediately into Jacob’s tent to search. Then he went into the tents of Zilpah and Bilhah but found nothing. After searching Leah’s tent, he went into Rachel’s. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Now Rachel had taken the family gods and put them in her camel’s cushion and sat on them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'She said to her father, “Please my father, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my lord.”
    marker-yv: yv-n
  - type: text
    text: don’t be angry if I don’t rise before you, for I’m having my period.” When he rummaged through her tent, he did not find them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then Jacob became angry and complained to Laban, “What have I done wrong? What sin have I committed that you would hotly pursue me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as if you were chasing a criminal
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: You have rummaged through all my things, and did you find anything of your own property? If you did, set them here in front of your relatives and mine. Let them decide between the two of us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jacob continued
  - type: text
    text: ', “For the last twenty years I have served you, and the whole time your sheep and goats did not miscarry, nor did I feast on any of your rams. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'If one from your flock was mauled by a wild beast, I didn’t bring it to you; I absorbed the loss myself. And you always made me pay for any missing animal, whether snatched by day or by night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Many times, scorching heat consumed me by day and hard frost by night; I endured sleepless nights. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'For these twenty years that I’ve lived among you, I slaved away fourteen years for your two daughters, and six years for your flocks. And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: besides all that
  - type: text
    text: ', you’ve reduced my wages over and over. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'If the God of my father, the God of Abraham, and the Awesome One of Isaac '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the One whom Isaac worships” or “the Fear of Isaac.” The Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: ', had not been on my side, you certainly would have sent me away empty-handed! But God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in his mercy
  - type: text
    text: ' took notice of how much I’ve suffered and how hard I’ve worked—and that’s why he rebuked you last night '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in your dream
  - type: text
    text: '!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Laban and Jacob Make a Covenant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Laban replied to Jacob, “These women are my daughters, these children are my grandchildren; and the flocks are mine. In fact, everything you see belongs to me. But from today I will not be able to do anything more for my daughters and grandchildren. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “What can I do today about these daughters of mine and these children they have borne?”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Come now, let’s form a covenant between you and me. Let it endure as a witness between us.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This covenant (treaty), memorialized by the heap of stones and their covenant meal, was an agreement to never harm each other.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'So Jacob took a stone, set it up as a pillar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'and in the presence of his relatives, he said to them, “Everyone gather stones, and place them here in a pile.” And they did so, and afterward, they ate together next to the heap of stones. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Laban and Jacob named the place '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in both languages, Aramaic
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Jegar Sahadutha,” Aramaic for “Heap of Witness.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: and Hebrew
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
