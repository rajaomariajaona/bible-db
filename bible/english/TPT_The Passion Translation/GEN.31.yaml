document_id: GEN.31,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Escapes from Laban
  - type: text
    content: 'Now Jacob heard that the sons of Laban were complaining, “Everything Jacob owns he has taken from our father! He gained all his wealth from what our father owned.” '
  '10':
  - type: text
    content: Jacob continued
  - type: text
    content: ', “Once during the breeding season, I had a dream. I saw that the male goats who were mating were all speckled, streaked, or spotted. '
  '11':
  - type: text
    content: In the dream, the angel of God called me by my name, ‘Jacob.’ ”
  - type: text
    content: “ ‘I am here,’ I answered.
  '12':
  - type: text
    content: '“Then he said, ‘Observe and note that all the male goats that are mating are speckled, streaked, or spotted, for I have seen all that Laban is doing to you. '
  '13':
  - type: text
    content: 'I am the God who appeared to you at Bethel, '
  - type: note
    content: As translated from the Septuagint and ancient Targums. The Hebrew is “I am the God of Bethel.”
  - type: text
    content: where you anointed a pillar and made a vow to me. Now leave this land at once and return to the land of your birth.’ ”
  '14':
  - type: text
    content: 'Then Rachel and Leah answered him, “Our father doesn’t want us to inherit a portion from his estate. '
  '15':
  - type: text
    content: 'Hasn’t he treated us as outsiders '
  - type: text
    content: and not as members of his family
  - type: text
    content: '? Not only did he sell us '
  - type: text
    content: like property
  - type: text
    content: ', but he has also spent our purchase price! '
  '16':
  - type: text
    content: Our father’s wealth that God has given you was legally ours and our children to begin with! So, go ahead and do whatever God has told you.”
  '17':
  - type: text
    content: 'Jacob immediately put his wives and children on camels '
  '18':
  - type: text
    content: and took with him all the livestock and everything he had amassed in Paddan-Aram. He set out to return to his father Isaac in the land of Canaan.
  '19':
  - type: text
    content: 'One day, when Laban had gone '
  - type: text
    content: to his fields
  - type: text
    content: ' to shear his sheep, '
  - type: note
    content: Sheep shearing was done in the spring, and it was a time of celebration and festivities that could have lasted a week (see 1 Sam. 25:2, 8, 11; 2 Sam. 13:23). Laban was preoccupied with the festivities and didn’t realize that his household gods had been stolen and that Jacob was secretly taking off with his daughters.
  - type: text
    content: 'Rachel stole her father’s household idols. '
  - type: note
    content: This is the Hebrew word teraphim; they can be described as small, carved figurines passed down within the family or clan. Teraphim is taken from an Aramaic root word meaning “to inquire.” Apparently, Laban used these images for guidance by divination. Rachel’s taking her father’s gods meant she took his ability to discover where they had gone (see Judg. 17:5; 1 Sam. 19:13; Ezek. 21:21). Other scholars believe that the teraphim guaranteed the right of inheritance to whoever possessed them. According to ancient Akkadian writings, the possession of these family idols (gods) could verify legal title to the family estate. This was perhaps the reason for Laban’s angry accusation of Jacob (v. 30).
  '2':
  - type: text
    content: 'And Jacob saw that Laban no longer viewed him favorably as he once did. '
  '20':
  - type: text
    content: 'Jacob had outwitted Laban the Aramean by secretly departing without telling him. '
  '21':
  - type: text
    content: 'He fled with all that he had, and after crossing the Euphrates, '
  - type: note
    content: The Euphrates was known to the Hebrews simply as “the River.” It was about fifty miles from Laban’s home to the Euphrates.
  - type: text
    content: 'he headed for the hill country of Gilead. '
  '22':
  - type: text
    content: And it wasn’t until three days later that Laban discovered Jacob had left.
  - type: heading
    content: Laban Pursues Jacob
  '23':
  - type: text
    content: 'Laban, along with some of his relatives, took off in pursuit and chased after Jacob for seven days. He had almost caught up with him in the hill country of Gilead, '
  '24':
  - type: text
    content: 'when God appeared to Laban the Aramean in a dream and warned him, “Be careful that you neither '
  - type: text
    content: harm nor
  - type: text
    content: ' threaten Jacob.”'
  - type: note
    content: Or “that you speak not to Jacob a word either good or evil.” This is a merism, for God was not telling Laban to remain silent, but rather to neither harm nor threaten Jacob with his words.
  '25':
  - type: text
    content: 'Now Jacob had set up his camp with his flocks on a hill, and Laban had him in his sights. Laban and his companions set up their camp nearby. '
  '26':
  - type: text
    content: 'Laban '
  - type: text
    content: approached
  - type: text
    content: ' Jacob and said, “'
  - type: text
    content: Nephew
  - type: text
    content: ', what have you done? You’ve deceived me and carried away my daughters like captives on a battlefield. '
  '27':
  - type: text
    content: 'Why did you trick me and run away in secret without telling me? I would have sent you off joyously, celebrating with singing and dancing to the tambourine and stringed instruments. '
  '28':
  - type: text
    content: 'And why did you not even let me kiss my daughters and grandchildren goodbye? What you have done is foolish! '
  '29':
  - type: text
    content: 'I could harm you, but the God of your father spoke to me '
  - type: text
    content: in a dream
  - type: text
    content: ' last night, saying, ‘Be careful that you neither '
  - type: text
    content: harm nor
  - type: text
    content: ' threaten Jacob.’ '
  '3':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Jacob, “Return to the land of your ancestors where you were born; and '
  - type: text
    content: remember
  - type: text
    content: ', I will be with you.” '
  '30':
  - type: text
    content: Now I realize you ran away because you desperately long to return to your father’s house, but why did you steal my gods?”
  '31':
  - type: text
    content: “
  - type: text
    content: I left in a hurry
  - type: text
    content: ' because I was afraid,” Jacob answered, “and I thought you would take your daughters from me by force. '
  '32':
  - type: text
    content: Whoever has taken your gods will be put to death! So here, in the presence of our relatives, if you can find among our possessions anything that is yours, take it.” Now Jacob had no clue that Rachel had stolen the gods.
  '33':
  - type: text
    content: 'Laban went immediately into Jacob’s tent to search. Then he went into the tents of Zilpah and Bilhah but found nothing. After searching Leah’s tent, he went into Rachel’s. '
  '34':
  - type: text
    content: 'Now Rachel had taken the family gods and put them in her camel’s cushion and sat on them. '
  '35':
  - type: text
    content: 'She said to her father, “Please my father, '
  - type: note
    content: Or “my lord.”
  - type: text
    content: don’t be angry if I don’t rise before you, for I’m having my period.” When he rummaged through her tent, he did not find them.
  '36':
  - type: text
    content: 'Then Jacob became angry and complained to Laban, “What have I done wrong? What sin have I committed that you would hotly pursue me '
  - type: text
    content: as if you were chasing a criminal
  - type: text
    content: '? '
  '37':
  - type: text
    content: You have rummaged through all my things, and did you find anything of your own property? If you did, set them here in front of your relatives and mine. Let them decide between the two of us.”
  '38':
  - type: text
    content: Jacob continued
  - type: text
    content: ', “For the last twenty years I have served you, and the whole time your sheep and goats did not miscarry, nor did I feast on any of your rams. '
  '39':
  - type: text
    content: 'If one from your flock was mauled by a wild beast, I didn’t bring it to you; I absorbed the loss myself. And you always made me pay for any missing animal, whether snatched by day or by night. '
  '4':
  - type: text
    content: 'So Jacob sent a message for Leah and Rachel to meet him in the field where his flocks were '
  - type: text
    content: grazing
  - type: text
    content: '. '
  '40':
  - type: text
    content: 'Many times, scorching heat consumed me by day and hard frost by night; I endured sleepless nights. '
  '41':
  - type: text
    content: 'For these twenty years that I’ve lived among you, I slaved away fourteen years for your two daughters, and six years for your flocks. And '
  - type: text
    content: besides all that
  - type: text
    content: ', you’ve reduced my wages over and over. '
  '42':
  - type: text
    content: 'If the God of my father, the God of Abraham, and the Awesome One of Isaac '
  - type: note
    content: Or “the One whom Isaac worships” or “the Fear of Isaac.” The Hebrew is uncertain.
  - type: text
    content: ', had not been on my side, you certainly would have sent me away empty-handed! But God '
  - type: text
    content: in his mercy
  - type: text
    content: ' took notice of how much I’ve suffered and how hard I’ve worked—and that’s why he rebuked you last night '
  - type: text
    content: in your dream
  - type: text
    content: '!”'
  - type: heading
    content: Laban and Jacob Make a Covenant
  '43':
  - type: text
    content: 'Laban replied to Jacob, “These women are my daughters, these children are my grandchildren; and the flocks are mine. In fact, everything you see belongs to me. But from today I will not be able to do anything more for my daughters and grandchildren. '
  - type: note
    content: Or “What can I do today about these daughters of mine and these children they have borne?”
  '44':
  - type: text
    content: 'Come now, let’s form a covenant between you and me. Let it endure as a witness between us.” '
  - type: note
    content: This covenant (treaty), memorialized by the heap of stones and their covenant meal, was an agreement to never harm each other.
  '45':
  - type: text
    content: 'So Jacob took a stone, set it up as a pillar, '
  '46':
  - type: text
    content: 'and in the presence of his relatives, he said to them, “Everyone gather stones, and place them here in a pile.” And they did so, and afterward, they ate together next to the heap of stones. '
  '47':
  - type: text
    content: 'Laban and Jacob named the place '
  - type: text
    content: in both languages, Aramaic
  - type: text
    content: ' '
  - type: note
    content: Or “Jegar Sahadutha,” Aramaic for “Heap of Witness.”
  - type: text
    content: and Hebrew
  - type: text
    content: ', '
  - type: note
    content: Or “Galeed,” Hebrew for “Heap of Witness.”
  - type: text
    content: 'calling it Witness Heap. '
  '48':
  - type: text
    content: 'And Laban said, “Today, this heap of stones will be a witness between you and me '
  - type: text
    content: of our enduring friendship
  - type: text
    content: '.” He called it Witness Heap '
  '49':
  - type: text
    content: 'and Watchpost, '
  - type: note
    content: Or “Mizpah,” which means “Watchpost [Lookout].” Jesus is our Mizpah. Eph. 2:14 states that Jesus made the Jew and the gentile one, breaking down the middle wall between them. Jacob, the father of the Israelites, and Laban, a gentile, found peace at Mizpah.
  - type: text
    content: 'for Laban declared, “May '
  - type: text
    content: Yahweh
  - type: text
    content: ' keep his eyes on us when we are absent from each other. '
  '5':
  - type: text
    content: 'When they arrived, he said to them, “I can see that your father’s attitude toward me has changed, but the God of my father has been with me. '
  '50':
  - type: text
    content: 'If you mistreat my daughters or marry other women besides my daughters, remember that even though no one else is with us, God is watching us. '
  '51':
  - type: text
    content: 'Here is the heap of stones and here is the memorial pillar that stands between us. '
  - type: note
    content: Or “that I have set up between us.”
  '52':
  - type: text
    content: 'This heap and this pillar stand as witnesses that I will never pass beyond them to harm you and that you will never pass beyond them to harm me. '
  '53':
  - type: text
    content: Now may the God of Abraham and the god of Nahor judge between us!”
  - type: note
    content: As translated from some Hebrew manuscripts and the Septuagint. Other Hebrew manuscripts add “the gods of their fathers.” Yahweh, the God of Abraham, was not the god of Nahor. Yahweh called Abraham out of Haran (see Gen. 12:4) and away from idol worship (see Josh. 24:2).
  - type: text
    content: 'Jacob made his vow by the Awesome One of his father Isaac. '
  - type: note
    content: Or “by [in the name of] the Fear of Isaac [the One whom Isaac feared].”
  '54':
  - type: text
    content: Then Jacob offered a sacrifice on the mountain and called everyone together for a meal, and they remained there all night on the mountain.
  '55':
  - type: text
    content: Early the next morning, Laban kissed his daughters and grandchildren, blessed them, and then he returned home.
  '6':
  - type: text
    content: 'You both know I have worked for your father as hard as I could, '
  '7':
  - type: text
    content: 'although he has cheated me and reduced '
  - type: note
    content: Or “changed.” The implication is that Laban did not give him raises, but reduced his salary literally in the Hebrew “ten times” (a term not meant to define how many times, but a figure of speech for “many, many times”).
  - type: text
    content: 'my wages over and over. Yet God has not allowed him to harm me. '
  '8':
  - type: text
    content: 'If he said, ‘The speckled ones will be your wages,’ then all the flock bore speckled. If he said, ‘The striped ones will be your wages,’ then all the flock bore striped. '
  '9':
  - type: text
    content: 'Because of these '
  - type: text
    content: miracles
  - type: text
    content: ', God has taken away your father’s livestock and given them to me!”'
