  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then Judah said to his daughter-in-law Tamar, “Live as a widow in your father’s house until my youngest son Shelah grows up.” So Tamar went home to her parents, but Judah worried that Shelah would end up dead like his brothers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In other words, since Judah lost two of his sons already, he had no intention of ever giving Shelah to Tamar, fearing he would lose him too.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
