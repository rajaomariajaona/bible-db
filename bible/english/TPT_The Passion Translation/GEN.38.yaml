  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: When Judah saw her, she was wearing a veil over her face, so he thought she was a prostitute. He had no clue that she was his own daughter-in-law. So he approached her and said, “Come sleep with me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “What will you give me if I do?” she answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He responded, “I will send you a young goat from the flock.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “What guarantee can you give me that you will really send it?” she asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: “Well, what pledge do you want?” Judah asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tamar answered, “Give me your necklace with your personal signet '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:18–19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This “signet” refers to an engraved cylinder seal. “The center was hollowed out and a cord passed through so that the seal could be worn around the neck. When the cylinder was rolled over soft clay, the resultant impression served as a means of identifying personal possessions and of sealing and legitimating clay documents. It was a highly personal object that performed the function of the signature in modern society” (JPS Torah Commentary:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Genesis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Nahum M. Sarna).'
    marker-yv: yv-n
  - type: text
    text: 'and the staff '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:18–19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “[tribal] scepter.” The leaders of the twelve tribes of Israel each had scepters (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 24:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: you’re holding.” So, he gave them to her, and he went and slept with her. When she got up and went home, she removed her veil and put her widow’s garment back on. Later, she discovered she was pregnant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Soon afterward, Judah sent the young goat by his friend '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Hirah
  - type: text
    text: ' the Adullamite to recover his items from the prostitute, but she was nowhere to be found. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So he asked the townspeople, “Where is the temple prostitute that sits by the crossroads?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They answered, “No prostitute has been there.” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So he returned to Judah and informed him, “I couldn’t find her, and besides that, the townspeople said that no prostitute has been there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Judah replied, “Let her keep my pledge. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: If we try to go get it now
  - type: text
    text: ', we’ll become a laughingstock. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “we’ll appear contemptible [dishonest].”
    marker-yv: yv-n
  - type: text
    text: After all, I did send you with the payment I promised her, and you couldn’t find her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'About three months later, Judah was told, “Your daughter-in-law Tamar has been promiscuous, and now she is pregnant!” Indignant, Judah said, “Bring her out, and let her be burned!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 21:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As she was being brought out, she sent word to her father-in-law, “Look, the one who owns these things got me pregnant! See, whose signet and staff are these?” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Judah recognized them as his and said, “She is more righteous than I, for I never gave my son Shelah to marry her.” And '
  - type: usfm
    marker: it
    children:
    - type: text
      text: he let her go free
  - type: text
    text: ' and never slept with her again.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he did not know her again.” “To know her” is a Hebrew figure of speech for having sex with her. In chs.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
