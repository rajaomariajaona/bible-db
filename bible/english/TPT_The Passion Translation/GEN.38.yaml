      children:
      - type: text
        text: 38:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Since Onan’s brother Er, the firstborn, died, Onan stood in line to receive a great inheritance from his father Judah. But if he fathered a child with Er’s widow, that inheritance would be greatly diminished.
    marker-yv: yv-n
  - type: text
    text: 'so whenever he and Tamar had intercourse, he purposely spilled his semen onto the ground to keep her from getting pregnant and having a child that would belong to his dead brother. '
  - type: usfm
