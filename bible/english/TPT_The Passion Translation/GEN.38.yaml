    - type: text
      text: 13-14
  - type: text
    text: 'Meanwhile, Tamar had learned that Shelah had grown up, but Judah had still not given him to her to father a child '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for her deceased husband
  - type: text
    text: '. So, when Tamar found out her father-in-law was coming to Timnah for the sheep-shearing, she removed her widow’s clothes and covered herself with a veil to disguise herself. And she sat waiting at the crossroads '
  - type: usfm
