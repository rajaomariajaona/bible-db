document_id: PSA.55,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Betrayed
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: King David’s song of derision for instruction
  - type: text
    content: God, listen to my prayer!
  - type: text
    content: Don’t hide your heart from me when I cry out to you!
  '10':
  - type: text
    content: Though they patrol the walls night and day against invaders,
  - type: text
    content: the real danger is within the city—
  - type: text
    content: the misery and strife in the hearts of its people.
  '11':
  - type: text
    content: Murder is in their midst.
  - type: text
    content: Wherever you turn, you find trouble and ruin.
  '12':
  - type: text
    content: It wasn’t an enemy who taunted me.
  - type: text
    content: If it was my enemy, filled with pride and hatred,
  - type: text
    content: then I could have endured it. I would have just run away.
  '13':
  - type: text
    content: But it was you, my intimate friend—one like a brother to me.
  - type: text
    content: 'It was you, my adviser, '
  - type: note
    content: The Greek word in the Septuagint can be translated as “a seer [prophet].”
  - type: text
    content: the companion
  - type: text
    content: I walked with and worked with!
  '14':
  - type: text
    content: We once had sweet fellowship with each other.
  - type: text
    content: We worshiped in unity as one,
  - type: text
    content: celebrating together with God’s people.
  - type: note
    content: David was speaking of Ahithophel, who had once been his friend and adviser, only to betray him. This is foreshadowing of what would happen between Jesus and Judas.
  '15':
  - type: text
    content: Now desolation and darkness has come upon you.
  - type: text
    content: May you and all those like you descend into the pit of destruction!
  - type: text
    content: Since evil has been your home, may evil now bury you alive!
  '16':
  - type: text
    content: But as for me, I will call upon the Lord to save me, and I know he will!
  '17':
  - type: text
    content: Every evening I will explain my need to him.
  - type: text
    content: Every morning I will move my soul toward him.
  - type: text
    content: Every waking hour I will worship only him,
  - type: text
    content: and he will hear and respond to my cry.
  '18':
  - type: text
    content: Though many wish to fight and the tide of battle turns against me,
  - type: text
    content: by your power I will be safe and secure;
  - type: text
    content: peace will be my portion.
  '19':
  - type: text
    content: God himself will hear me!
  - type: text
    content: God-Enthroned through everlasting ages,
  - type: text
    content: the God of unchanging faithfulness—
  - type: text
    content: he will put them in their place,
  - type: text
    content: all those who refuse to love and revere him!
  - type: text
    content: Pause in his presence
  '2':
  - type: text
    content: Come close to me and give me your answer.
  - type: text
    content: Here I am, moaning and restless.
  - type: text
    content: I’m preoccupied with the threats of my enemies
  - type: text
    content: and crushed by the pressure of their opposition.
  - type: text
    content: They surround me with trouble and terror.
  - type: text
    content: In their fury they rise up against me in an angry uproar.
  '20':
  - type: text
    content: I was betrayed by my friend, though I lived in peace with him.
  - type: text
    content: While he was stretching out his hand of friendship,
  - type: text
    content: he was secretly breaking every promise he had ever made to me!
  '21':
  - type: text
    content: His words were smooth and charming.
  - type: text
    content: Yet his heart was disloyal and full of hatred—
  - type: text
    content: his words soft as silk while all the time scheming my demise.
  '22':
  - type: text
    content: 'So here’s what I’ve learned through it all:'
  - type: text
    content: Leave all your cares and anxieties at the feet of the Lord,
  - type: text
    content: and measureless grace will strengthen you.
  '23':
  - type: text
    content: He will watch over his devoted lovers,
  - type: text
    content: never letting them slip or be overthrown.
  - type: text
    content: He will send all my enemies to the pit of destruction.
  - type: text
    content: Murderers, liars, and betrayers will face an untimely death.
  - type: text
    content: My life’s hope and trust is in you, and you’ll never fail to rescue me!
  '4':
  - type: text
    content: My heart is trembling inside my chest
  - type: text
    content: as the terror of death seizes me.
  '5':
  - type: text
    content: Fear and dread overwhelm me. I shudder before the horror I face.
  '6':
  - type: text
    content: I say to myself, “If only I could fly away from all of this!
  - type: text
    content: If only I could run away to the place of rest and peace.
  '7':
  - type: text
    content: I would run far away where no one could find me,
  - type: text
    content: escaping to a wilderness retreat.”
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: I will hurry off to hide in the higher place,
  - type: text
    content: into my shelter, safe from this raging storm and tempest.
  '9':
  - type: text
    content: God, confuse them until they quarrel with themselves.
  - type: text
    content: Destroy them with their own violent strife and slander.
  - type: text
    content: They have divided the city with their discord.
