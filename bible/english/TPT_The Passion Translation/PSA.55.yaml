document_id: PSA.55
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Betrayed
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: To the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s song of derision for instruction
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God, listen to my prayer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t hide your heart from me when I cry out to you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Come close to me and give me your answer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Here I am, moaning and restless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m preoccupied with the threats of my enemies
- type: usfm
  marker: q1
  children:
  - type: text
    text: and crushed by the pressure of their opposition.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They surround me with trouble and terror.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In their fury they rise up against me in an angry uproar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My heart is trembling inside my chest
- type: usfm
  marker: q1
  children:
  - type: text
    text: as the terror of death seizes me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fear and dread overwhelm me. I shudder before the horror I face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I say to myself, “If only I could fly away from all of this!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If only I could run away to the place of rest and peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I would run far away where no one could find me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: escaping to a wilderness retreat.”
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will hurry off to hide in the higher place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: into my shelter, safe from this raging storm and tempest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God, confuse them until they quarrel with themselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destroy them with their own violent strife and slander.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have divided the city with their discord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Though they patrol the walls night and day against invaders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the real danger is within the city—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the misery and strife in the hearts of its people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Murder is in their midst.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wherever you turn, you find trouble and ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It wasn’t an enemy who taunted me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If it was my enemy, filled with pride and hatred,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then I could have endured it. I would have just run away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But it was you, my intimate friend—one like a brother to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'It was you, my adviser, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 55:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word in the Septuagint can be translated as “a seer [prophet].”
    marker-yv: yv-n
  - type: text
    text: the companion
- type: usfm
  marker: q1
  children:
  - type: text
    text: I walked with and worked with!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: We once had sweet fellowship with each other.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We worshiped in unity as one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celebrating together with God’s people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 55:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David was speaking of Ahithophel, who had once been his friend and adviser, only to betray him. This is foreshadowing of what would happen between Jesus and Judas.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Now desolation and darkness has come upon you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May you and all those like you descend into the pit of destruction!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since evil has been your home, may evil now bury you alive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But as for me, I will call upon the Lord to save me, and I know he will!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Every evening I will explain my need to him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every morning I will move my soul toward him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every waking hour I will worship only him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will hear and respond to my cry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Though many wish to fight and the tide of battle turns against me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: by your power I will be safe and secure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: peace will be my portion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God himself will hear me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: God-Enthroned through everlasting ages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the God of unchanging faithfulness—
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will put them in their place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: all those who refuse to love and revere him!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I was betrayed by my friend, though I lived in peace with him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: While he was stretching out his hand of friendship,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he was secretly breaking every promise he had ever made to me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: His words were smooth and charming.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet his heart was disloyal and full of hatred—
- type: usfm
  marker: q1
  children:
  - type: text
    text: his words soft as silk while all the time scheming my demise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So here’s what I’ve learned through it all:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leave all your cares and anxieties at the feet of the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and measureless grace will strengthen you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He will watch over his devoted lovers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: never letting them slip or be overthrown.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will send all my enemies to the pit of destruction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Murderers, liars, and betrayers will face an untimely death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My life’s hope and trust is in you, and you’ll never fail to rescue me!
