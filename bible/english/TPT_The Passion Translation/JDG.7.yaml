    - type: text
      text: 'So Gideon and his servant Purah went down and approached the outposts of the enemy camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Midianites, the Amalekites, and the desert tribesmen were spread out in the valley like a swarm of locusts. They had as many camels as there were grains of sand on the seashore.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As soon as Gideon arrived, he heard an enemy soldier telling a friend about a dream. He was saying, “Well, I had a dream of this huge commotion in our camp. I dreamed a round loaf of barley bread came whirling into our camp and leveled a tent. It hit the tent so hard it turned it upside down, and the tent collapsed on the ground.”
    - type: usfm
