      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 4:6–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'They held their torches in their left hands, the shofars in their right, and shouted '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a thunderous battle cry
    - type: text
      text: ', “A sword '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In effect, the “sword” was their shout and the shining torch. Without even a sword, Israel won a great victory by trusting in God’s power, not their own. Their shouting and shofars would have stampeded the camels of the Midianites and caused havoc in their camp. This is perhaps the first instance of psychological warfare in history. (See M.A. Linebarger,
