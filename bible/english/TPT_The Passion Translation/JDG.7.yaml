      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is fascinating that Gideon overheard the Midianite dream interpreter speaking his name and the name of his father. Not only does God know your name, but so does the enemy, for you are a son or daughter of God! Gideon used this fear tactic when he instructed his three hundred men to shout both the name of
      - type: usfm
