  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gideon called to arms men from the tribes of Naphtali, Asher, and both parts of Manasseh, and they rallied and pursued the Midianites. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Gideon sent messengers through the entire hill country of Ephraim, saying, “Join us in the fight against the Midianites. Deny them access to the River Jordan and the streams as far as Beth Barah, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and prevent them from crossing over
    - type: text
      text: '.” The men of Ephraim came together, and they held the River Jordan and the streams as far as Beth Barah. '
    - type: usfm
