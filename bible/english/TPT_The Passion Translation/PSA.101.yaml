document_id: PSA.101
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Integrity
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: David’s poetic praise
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, I will sing about your faithful love for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My song of praise will have your justice as its theme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I’m trying my best to walk in the way of integrity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: especially in my own home.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But I need your help!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m wondering, Lord, when will you appear?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I refuse to gaze on that which is vulgar.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I despise works of evil people
- type: usfm
  marker: q1
  children:
  - type: text
    text: and anything that moves my heart away from you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not let evil hold me in its grip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Every perverse and crooked way I have put away from my heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I will have nothing to do with the deeds of darkness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 101:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “evil people.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will silence those who secretly want to slander my friends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will not tolerate the proud and arrogant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'My innermost circle '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 101:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The faithful of the land.”
    marker-yv: yv-n
  - type: text
    text: will only be those
- type: usfm
  marker: q1
  children:
  - type: text
    text: who I know are pure and godly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be the only ones I allow to minister to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: There’s no room in my home for hypocrites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I can’t stand chronic liars who flatter and deceive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: At each and every sunrise I will awake to do what’s right
- type: usfm
  marker: q1
  children:
  - type: text
    text: and put to silence those who love wickedness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'freeing God’s people '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 101:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the city of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .”
    marker-yv: yv-n
  - type: text
    text: from their evil grip.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: I will do all of this because of my great love for you!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 101:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This phrase, implied in the Hebrew text, brings conclusion to the psalm.
    marker-yv: yv-n
