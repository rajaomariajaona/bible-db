document_id: PSA.101,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Integrity
  - type: text
    content: David’s poetic praise
  - type: text
    content: Lord, I will sing about your faithful love for me.
  - type: text
    content: My song of praise will have your justice as its theme.
  '2':
  - type: text
    content: I’m trying my best to walk in the way of integrity,
  - type: text
    content: especially in my own home.
  - type: text
    content: But I need your help!
  - type: text
    content: I’m wondering, Lord, when will you appear?
  '3':
  - type: text
    content: I refuse to gaze on that which is vulgar.
  - type: text
    content: I despise works of evil people
  - type: text
    content: and anything that moves my heart away from you.
  - type: text
    content: I will not let evil hold me in its grip.
  '4':
  - type: text
    content: Every perverse and crooked way I have put away from my heart,
  - type: text
    content: for I will have nothing to do with the deeds of darkness.
  - type: note
    content: Or “evil people.”
  '5':
  - type: text
    content: I will silence those who secretly want to slander my friends,
  - type: text
    content: and I will not tolerate the proud and arrogant.
  '6':
  - type: text
    content: 'My innermost circle '
  - type: note
    content: Or “The faithful of the land.”
  - type: text
    content: will only be those
  - type: text
    content: who I know are pure and godly.
  - type: text
    content: They will be the only ones I allow to minister to me.
  '7':
  - type: text
    content: There’s no room in my home for hypocrites,
  - type: text
    content: for I can’t stand chronic liars who flatter and deceive.
  '8':
  - type: text
    content: At each and every sunrise I will awake to do what’s right
  - type: text
    content: and put to silence those who love wickedness,
  - type: text
    content: 'freeing God’s people '
  - type: note
    content: Or “the city of Yahweh.”
  - type: text
    content: from their evil grip.
  - type: text
    content: I will do all of this because of my great love for you!
  - type: note
    content: This phrase, implied in the Hebrew text, brings conclusion to the psalm.
