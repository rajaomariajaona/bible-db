document_id: HAB.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Habakkuk Waits for God’s Answer
  - type: text
    content: I will wait at my watchpost
  - type: note
    content: See Isa. 21:8.
  - type: text
    content: and station myself on the tower.
  - type: text
    content: I’ll keep watching to see what he’ll say to me
  - type: note
    content: Or “I will lean forward and see what he’ll say in me.” See Ps. 85:8; Prov. 8:34.
  - type: text
    content: and consider the reply
  - type: text
    content: when he answers my argument.
  - type: note
    content: Or literally “concerning my correction.”
  - type: heading
    content: Yahweh’s Answer
  '10':
  - type: text
    content: Your schemes to ruin the lives and homes of others
  - type: text
    content: bring shame upon your own house.
  - type: text
    content: You are as good as dead for doing this.
  - type: note
    content: Or “You bring shame upon your own house [kingdom] by destroying many other peoples and thus forfeiting your own lives.”
  '11':
  - type: text
    content: The stones of the wall will cry out to accuse you,
  - type: text
    content: and your wooden rafters will echo it.
  '12':
  - type: text
    content: “You are doomed, you who build a city with bloodshed
  - type: text
    content: and establish it upon evil!
  '13':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have decreed:'
  - type: text
    content: The efforts of the nations are nothing but fuel for the fire,
  - type: text
    content: for all they have built will go up in smoke.
  - type: note
    content: The words of Habakkuk (and Jer. 51:58) were possibly a proverb or popular saying among the people.
  '14':
  - type: text
    content: Yet the entire earth is being filled
  - type: note
    content: 'The Hebrew imperfect in poetry denotes imperfective aspect (ongoing action) and therefore can be translated with present tense. See Bruce Waltke and M. O’Connor, An Introduction to Biblical Hebrew Syntax (Winona Lake, IN: Eisenbrauns, 1990), 559–60; R. B. Chisholm, A Workbook for Intermediate Hebrew: Grammar, Exegesis, and Commentary on Jonah and Ruth (Grand Rapids, MI: Kregel, 2006), 275.'
  - type: text
    content: 'with the revelation of the glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: The context shows that the nations strive in vain for their plans to be fulfilled, yet God’s plan is to fill the earth (and its people) with a glorious understanding of who he truly is.
  - type: text
    content: just as waters fill the sea.
  '15':
  - type: text
    content: “You are doomed, you who delight to mix drinks for neighbors,
  - type: text
    content: 'pouring wine from pitchers '
  - type: note
    content: Or “you pour out your wrath” (MT). The neighbors getting drunk is a reference to the neighboring nations who were conquered by the Babylonians.
  - type: text
    content: until they are dead drunk
  - type: text
    content: just so that you can gaze on their naked bodies!
  '16':
  - type: text
    content: Now you will be drunk with shame instead of honor.
  - type: text
    content: Now it is your turn! Drink your fill
  - type: text
    content: and let your nakedness be exposed.
  - type: note
    content: 'As translated from the Masoretic Text. The Dead Sea Scrolls (1QpHab), the Septuagint, and other versions read: “Drink your fill and stagger.” See Jer. 25:16; Lam. 4:21; Nah. 3:5–6. The true pagan nature of the Babylonians is also emphasized here, in that the Hebrew verb form heʿaral literally denotes “exposing your uncircumcision.”'
  - type: text
    content: 'The cup '
  - type: text
    content: of punishment
  - type: text
    content: ' that '
  - type: text
    content: Yahweh
  - type: text
    content: ' holds in his right hand'
  - type: note
    content: The “cup” in Yahweh’s right hand is a common symbol of divine retribution (see Isa. 51:17, 22; Jer. 25:15–17; Lam. 4:21; Rev. 14:10; 16:19; in all these references, the divine right hand is assumed).
  - type: text
    content: is now coming around to you.
  - type: text
    content: 'Your '
  - type: text
    content: former
  - type: text
    content: ' glory will be covered with your vomit of disgrace.'
  '17':
  - type: text
    content: 'Your violent acts against Lebanon will '
  - type: text
    content: violently
  - type: text
    content: ' overwhelm you.'
  - type: text
    content: Since you killed its animals, animals will terrify you.
  - type: text
    content: For you have killed many people
  - type: text
    content: and acted violently against lands and cities and everyone in them.
  '18':
  - type: text
    content: “You are doomed, you who say to a piece of dead wood, ‘Come to life!’
  - type: text
    content: Or to lifeless stone, ‘Get up!’
  - type: text
    content: Can something dead give revelation?
  - type: text
    content: Even though it is covered with gold and silver,
  - type: text
    content: there is no breath in it.
  - type: text
    content: Of what use is an idol carved by a craftsman?
  - type: text
    content: Or a metal image that gives misleading oracles?
  - type: note
    content: Or “a teacher of lies.”
  - type: text
    content: For the one who makes it trusts the work of human hands;
  - type: text
    content: a god that cannot even talk.”
  '2':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' replied:'
  - type: text
    content: “Write down the revelation;
  - type: note
    content: We, too, are told to write down the revelation of God—on our hearts. God is looking for something to write on. See 2 Cor. 3:2–8.
  - type: text
    content: write it legibly on clay tablets
  - type: text
    content: so that whoever reads it
  - type: text
    content: may run and explain it to others.
  - type: note
    content: 'Or “so that it can be read on the run.” This second clause may also be read as “so that a herald may run with it [and explain it to others].” The implication here is that a herald would routinely take up such a record of divine revelation and would then run with it to various audiences for a public reading. Verses 1–2 give us seven wise principles: (1) Be sure you know and keep your assignment as an intercessor. (2) Be watchful at all times. (3) Believe that God will be faithful to speak to you. (4) Be prepared to hear words of correction. (5) Write down and preserve what God has spoken to you. (6) Be ready to apply his words appropriately. (7) Share what he says so that it may bless others also.'
  '20':
  - type: text
    content: Yahweh
  - type: text
    content: ' is in his holy temple;'
  - type: text
    content: let everyone on earth be silent before him.
  - type: note
    content: 'See Ps. 11:4. We silence our hearts before God to listen to what he will say to us (see Mic. 1:2–3; Zech. 2:13). In this chapter, Habakkuk saw three absolutes, three life-altering things: (1) The righteous will live by faith (see v. 4). (2) The whole world will be filled with the knowledge of God’s glory (see v. 14). (3) God is in his holy temple, ready to solve the issues of life (see v. 20).'
  '3':
  - type: text
    content: 'The vision still '
  - type: text
    content: awaits
  - type: text
    content: ' an appointed time;'
  - type: text
    content: it speaks of the end and will not prove to be false.
  - type: text
    content: When the appointed time comes,
  - type: text
    content: it will happen with breathless haste.
  - type: note
    content: “Breathless haste” is taken from a Hebrew word that means “to puff or pant.” To know God’s will (plan) doesn’t mean that we know his timing. God’s plan and God’s timing are like a wheel inside a wheel.
  - type: text
    content: Although it may seem slow, just be patient and wait.
  - type: text
    content: 'For it '
  - type: note
    content: Or “he.” See Heb. 10:37 where this verse is quoted as “the coming one.”
  - type: text
    content: will surely come right on time.
  '4':
  - type: text
    content: “Look at the proud, puffed up with pride!
  - type: text
    content: They are crooked to the core.
  - type: note
    content: Or “his soul is not right.” The Hebrew of this sentence is uncertain.
  - type: text
    content: But the righteous will live by his faith.”
  - type: note
    content: Or “live by his faithfulness.” It is possible that “his” refers to God; that is, the righteous will live by God’s faith. See Rom. 1:17; Gal. 3:11; Heb. 10:38. To live by faith is to live with unbreakable loyalty to God, obeying his Word even when outward circumstances make it difficult. Both the Hebrew and Greek words for “faith” mean something “certain.” Even surrounded with questions that go unanswered, we live by faith, not by knowledge.
  - type: heading
    content: God Will Punish the Wicked
  '5':
  - type: text
    content: “Wealth is deceitful.
  - type: note
    content: Or “Wealth is treacherous,” as translated from the Dead Sea Scrolls. Instead of “wealth,” the Masoretic Text reads “wine.”
  - type: text
    content: The proud are full of themselves but have empty souls.
  - type: text
    content: They are as greedy as the grave.
  - type: text
    content: And just like death itself, they are never satisfied.
  - type: text
    content: 'They gather and grasp for themselves all '
  - type: text
    content: the wealth of
  - type: text
    content: ' the nations'
  - type: text
    content: and take all the people captive.
  - type: note
    content: 'Or literally from the Masoretic Text: “When the enemy [Babylon] crosses the line with wine, he sees himself as a mighty hero and no longer tends to his own home but rather inflates his hungry soul, just like insatiable death and Sheol, and collects for himself entire nations and peoples.”'
  '6':
  - type: text
    content: '“All these '
  - type: text
    content: conquered
  - type: text
    content: ' nations will one day taunt them, saying,'
  - type: text
    content: '‘You are doomed, '
  - type: note
    content: Or “Woe to him!” The Hebrew term hoy is traditionally translated “woe” and serves as a descriptor title for oracles of divine judgment in the Old Testament, especially in the canonical prophets. Here, in 2:6–20, there are five of these “woe-oracles,” found in vv. 6, 9, 12, 15, 18–19. The term woe is a classic denotation of divine judgment and condemnation, although the word itself is rarely found in contemporary, everyday English usage. Outside of the biblical context, woe refers generally to painful human experience and emotions such as anguish, grief, and affliction.
  - type: text
    content: you who pile up stolen goods!
  - type: text
    content: How long will you amass wealth by extortion?’
  - type: note
    content: Or “Will you weigh them down with the burden of heavy debt?”
  '7':
  - type: text
    content: 'Will not your creditors '
  - type: note
    content: The Hebrew word for “creditor” is noshek and means “one who bites.”
  - type: text
    content: suddenly arise?
  - type: text
    content: Will they not wake up and terrify you?
  - type: text
    content: Before you know it, you will become their prey.
  '8':
  - type: text
    content: Since you have plundered many nations,
  - type: text
    content: the peoples who are left will plunder you.
  - type: note
    content: See Isa. 33:1. This verse was fulfilled about twenty-five years later after Nebuchadnezzar died. The Persian king, Cyrus, rose up and plundered Babylon and made it part of his empire.
  - type: text
    content: For you have killed many people;
  - type: text
    content: you have acted violently against lands and cities
  - type: text
    content: and everyone within them.
  '9':
  - type: text
    content: “You are doomed, you who enrich your family by cheating others!
  - type: text
    content: 'You build your '
  - type: text
    content: luxurious
  - type: text
    content: ' home on high'
  - type: text
    content: thinking you’ll be safe from harm’s reach.
