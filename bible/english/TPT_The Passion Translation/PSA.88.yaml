document_id: PSA.88,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Save Me from This Sorrow
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm has traditionally been used by Christians for reading on Good Friday. Many insights can be found here of the crucifixion of Jesus Christ.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A song, a psalm '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psalm 88
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is both a song and a psalm. The Hebrew for “song” can also mean “wall.” There are times that our purest music will come when we feel like we are up against a “wall.”
      marker-yv: yv-n
    - type: text
      text: by the prophetic singers of Korah’s clan
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “Pierced,” for instruction by Heman the Ezrahite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '88'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Heman the Ezrahite was considered comparable to Solomon in his wisdom (
      - type: text
        text: 1 Kings 4:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jewish literature states that he was also a gifted musician and vocalist. But it also teaches that Heman was a leper, an outcast from society who lived in poverty, was shunned by all, and could not sing in the temple because of his disease. Read
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 88
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: with this background in mind.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: To the tune of “Pierced”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also be translated “He has been humbled more than any man.” The Hebrew word for “instruction” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: maschil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) comes from a word that means “to prosper” or “to understand.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is the God who continually saves me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I weep before you night and day.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can those who are cut off from your care
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even know that you are there?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do departed spirits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 88:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Rephaites.” The Rephaites were giants that inhabited the region of Bashan east of the Jordan. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 12:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: rise up to praise you?
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who can give thanks for your love in the graveyard?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who preaches your faithfulness in the place of destruction?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does death’s darkness declare your miracles?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How can anyone who’s in the grave, where all is forgotten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: remember how you keep your promises?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, you know my prayer before I even whisper it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 88:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At each and every sunrise you will
  - type: usfm
    marker: q1
    children:
    - type: text
      text: continue to hear my cry until you answer.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, why have you thrown my life away?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you keep turning the other way every time I call out to you?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve had to live in poverty and trouble all my life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 88:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Greek reads “close to death all my life.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I’m humiliated, broken, and helpless before your terrors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I can’t take it anymore.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m overwhelmed by your burning anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve taken the worst you could give me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I’m speechless before you.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m drowning beneath the waves of this sorrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cut off with no one to help.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my loved ones and friends keep far away from me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving me all alone with only darkness as my friend.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please bend down and listen to my sobbing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my life is riddled with troubles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and death is just around the corner!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone sees my life ebbing out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They consider me a hopeless case and see me as a dead man.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ve all left me here to die, helpless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like one who is doomed for death.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re convinced you’ve forsaken me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: certain that you’ve forgotten me completely—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abandoned, pierced, with nothing to look forward to but death.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have discarded me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 88:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew reads “You have discarded me.”
      marker-yv: yv-n
    - type: text
      text: and thrown me down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into the deepest darkness as into a bottomless pit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I feel your wrath, and it’s a heavy weight upon me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: drowning me beneath a sea of sorrow.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why did you turn all my friends against me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve made me like a cursed man in their eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one wants to be with me now.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve caught me in a trap with no way out.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every day I beg for your help. Can’t you see my tears?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes are swollen with weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My arms are wide, longing for mercy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 88:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Greek reads “My hands are stretched out to you.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you’re nowhere to be found.
