document_id: PSA.88,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Save Me from This Sorrow This psalm has traditionally been used by Christians for reading on Good Friday. Many insights can be found here of the crucifixion of Jesus Christ.
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: 'A song, a psalm '
  - type: note
    content: Psalm 88 is both a song and a psalm. The Hebrew for “song” can also mean “wall.” There are times that our purest music will come when we feel like we are up against a “wall.”
  - type: text
    content: by the prophetic singers of Korah’s clan
  - type: text
    content: To the tune of “Pierced,” for instruction by Heman the Ezrahite
  - type: note
    content: Heman the Ezrahite was considered comparable to Solomon in his wisdom (1 Kings 4:31). Jewish literature states that he was also a gifted musician and vocalist. But it also teaches that Heman was a leper, an outcast from society who lived in poverty, was shunned by all, and could not sing in the temple because of his disease. Read Ps. 88 with this background in mind. To the tune of “Pierced” can also be translated “He has been humbled more than any man.” The Hebrew word for “instruction” (maschil) comes from a word that means “to prosper” or “to understand.”
  - type: text
    content: Yahweh
  - type: text
    content: ' is the God who continually saves me.'
  - type: text
    content: I weep before you night and day.
  '10':
  - type: text
    content: How can those who are cut off from your care
  - type: text
    content: even know that you are there?
  - type: text
    content: 'Do departed spirits '
  - type: note
    content: Or “Rephaites.” The Rephaites were giants that inhabited the region of Bashan east of the Jordan. See Deut. 2:11; 3:11; Josh. 12:4–5.
  - type: text
    content: rise up to praise you?
  - type: text
    content: Pause in his presence
  '11':
  - type: text
    content: Who can give thanks for your love in the graveyard?
  - type: text
    content: Who preaches your faithfulness in the place of destruction?
  '12':
  - type: text
    content: Does death’s darkness declare your miracles?
  - type: text
    content: How can anyone who’s in the grave, where all is forgotten,
  - type: text
    content: remember how you keep your promises?
  '13':
  - type: text
    content: Lord, you know my prayer before I even whisper it.
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: At each and every sunrise you will
  - type: text
    content: continue to hear my cry until you answer.
  '14':
  - type: text
    content: O Lord, why have you thrown my life away?
  - type: text
    content: Will you keep turning the other way every time I call out to you?
  '15':
  - type: text
    content: I’ve had to live in poverty and trouble all my life.
  - type: note
    content: As translated from the Septuagint. The Greek reads “close to death all my life.”
  - type: text
    content: Now I’m humiliated, broken, and helpless before your terrors
  - type: text
    content: and I can’t take it anymore.
  '16':
  - type: text
    content: I’m overwhelmed by your burning anger.
  - type: text
    content: I’ve taken the worst you could give me,
  - type: text
    content: and I’m speechless before you.
  '17':
  - type: text
    content: I’m drowning beneath the waves of this sorrow,
  - type: text
    content: cut off with no one to help.
  '18':
  - type: text
    content: All my loved ones and friends keep far away from me,
  - type: text
    content: leaving me all alone with only darkness as my friend.
  '2':
  - type: text
    content: Please bend down and listen to my sobbing,
  - type: text
    content: for my life is riddled with troubles
  - type: text
    content: and death is just around the corner!
  '3':
  - type: text
    content: Everyone sees my life ebbing out.
  - type: text
    content: They consider me a hopeless case and see me as a dead man.
  '4':
  - type: text
    content: They’ve all left me here to die, helpless,
  - type: text
    content: like one who is doomed for death.
  '5':
  - type: text
    content: They’re convinced you’ve forsaken me,
  - type: text
    content: certain that you’ve forgotten me completely—
  - type: text
    content: abandoned, pierced, with nothing to look forward to but death.
  '6':
  - type: text
    content: 'They have discarded me '
  - type: note
    content: As translated from the Septuagint. The Hebrew reads “You have discarded me.”
  - type: text
    content: and thrown me down
  - type: text
    content: into the deepest darkness as into a bottomless pit.
  '7':
  - type: text
    content: I feel your wrath, and it’s a heavy weight upon me,
  - type: text
    content: drowning me beneath a sea of sorrow.
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: Why did you turn all my friends against me?
  - type: text
    content: You’ve made me like a cursed man in their eyes.
  - type: text
    content: No one wants to be with me now.
  - type: text
    content: You’ve caught me in a trap with no way out.
  '9':
  - type: text
    content: Every day I beg for your help. Can’t you see my tears?
  - type: text
    content: My eyes are swollen with weeping.
  - type: text
    content: My arms are wide, longing for mercy,
  - type: note
    content: As translated from the Septuagint. The Greek reads “My hands are stretched out to you.”
  - type: text
    content: but you’re nowhere to be found.
