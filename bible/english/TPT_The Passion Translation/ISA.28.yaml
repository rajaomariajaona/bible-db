document_id: ISA.28,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ephraim’s False Hope
  - type: text
    content: 'Woe to the pride of Israel’s '
  - type: note
    content: Or “Ephraim,” a likely metonymy for the northern kingdom of Israel (Samaria). Read through this chapter to see the vivid contrast between the fading glory of mankind and the greater glory of God.
  - type: text
    content: drunkards,
  - type: text
    content: worn like a garland on their heads!
  - type: text
    content: Their glory is but wilted flowers,
  - type: text
    content: worn like a crown on the heads of those
  - type: text
    content: bloated with rich food and overcome by wine.
  '10':
  - type: text
    content: Do, do this, and do, do that,
  - type: text
    content: a rule about this and a rule about that,
  - type: text
    content: here a little, there a little.”
  - type: note
    content: The meaning of the Hebrew text of this verse is uncertain. The Septuagint reads “You expect trouble upon trouble, hope upon hope; yet a little and yet a little.”
  '11':
  - type: text
    content: Since they won’t listen to me,
  - type: text
    content: 'God '
  - type: note
    content: Or “he.”
  - type: text
    content: 'will use another '
  - type: text
    content: mouthpiece
  - type: text
    content: ' to speak to them.'
  - type: text
    content: With stammering lips
  - type: text
    content: 'and in a foreign language, '
  - type: note
    content: That is, the foreign language of the Assyrians, which was Aramaic. See Deut. 28:49; 1 Cor. 14:21–22.
  - type: text
    content: he will speak to this people.
  '12':
  - type: text
    content: For he has said to them,
  - type: text
    content: “This is your rest, so let the weary rest;
  - type: note
    content: See Matt. 11:28–30; Heb. 4:9.
  - type: text
    content: this is your comfort”—but they would not listen.
  '13':
  - type: text
    content: 'Therefore, the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be to them'
  - type: text
    content: “Do, do this, and do, do that,
  - type: text
    content: a rule about this and a rule about that,
  - type: text
    content: here a little, there a little,”
  - type: note
    content: The meaning of the Hebrew text of this verse is uncertain. The Septuagint reads “You expect trouble upon trouble, hope upon hope; yet a little and yet a little.”
  - type: text
    content: in order that they will stumble backward
  - type: text
    content: and be broken and captured.
  - type: heading
    content: A False Covenant with Death
  '14':
  - type: text
    content: 'Therefore, listen to the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: you scornful jesters—rulers of Jerusalem.
  - type: note
    content: Starting with this verse and going through Isa. 31:9, Isaiah spoke warnings to Judah and Jerusalem.
  '15':
  - type: text
    content: For you have said,
  - type: text
    content: “We have made a covenant with death
  - type: text
    content: and a pact with the underworld,
  - type: note
    content: Or “Sheol.” Some scholars conclude that death and the underworld are metaphors for an alliance with Egypt and its false gods. However, it is more likely that they had made an actual pact with evil spirits, such as Death (Mot) and the Underworld (Resheph), to protect them from the plague. Christ has broken the covenant with death, for we are crucified with him (see Gal. 2:20). Now death “belongs” to the believer, for we have been given a life that triumphs over man’s covenant with death (see Rom. 8:38–39; 1 Cor. 3:21–22).
  - type: text
    content: so when the overwhelming scourge sweeps over us,
  - type: text
    content: it will not harm us.
  - type: text
    content: For we have made lies our refuge
  - type: note
    content: Many today still hide behind lies, refusing to come to the truth in Christ.
  - type: text
    content: and found our shelter in falsehood.”
  - type: note
    content: Or “false gods.”
  - type: heading
    content: Zion’s Foundation Stone
  '16':
  - type: text
    content: 'Here’s what the Lord God says:'
  - type: text
    content: “Behold, I set in place in Zion a Foundation Stone,
  - type: note
    content: The “Foundation Stone” is Christ, set in place in the councils of eternity. The Hebrew word for “stone” is taken from the root word for “son” (ben). God’s Foundation Stone is his Son, Jesus Christ. See Rom. 9:33. Now the Son/Stone has become many (see 1 Peter 2:5–7). From these stones/sons, the Father is building us into his holy temple.
  - type: text
    content: fully tested and proven to be faithful and secure.
  - type: note
    content: The promised one, Jesus Christ, is the chief cornerstone on which we rest our faith, because we are those who dwell in the Zion-realm (see Heb. 12:22). Believers throughout all time have proven that he is faithful. See Ps. 118:22; Acts 4:11; Eph. 2:20; Rev. 21:19–20.
  - type: text
    content: And written upon
  - type: text
    content: ' this precious cornerstone is this:'
  - type: text
    content: '‘Those who trust '
  - type: text
    content: in him
  - type: text
    content: ' will not act in haste.’'
  - type: note
    content: Or “will never run away [in fear].” Faith, firmly set upon Christ, is patient and never rushes, for faith leaves the timing of all things in God’s hands. Peter quotes this verse, saying, “Whoever believes in him will certainly not be disappointed” (1 Peter 2:6).
  '17':
  - type: text
    content: I will set justice as the true measurement
  - type: text
    content: and integrity as its plumb line.
  - type: text
    content: 'My hailstorm '
  - type: note
    content: Hail is a biblical metaphor for divine judgment. See v. 2; Ex. 9:13–35; Josh. 10:11; Pss. 18:12–13; 148:8; Isa. 32:19; Rev. 8:7; 11:19; 16:21.
  - type: text
    content: will sweep away your refuge of lies,
  - type: text
    content: 'and '
  - type: text
    content: my
  - type: text
    content: ' floodwaters will overwhelm your hiding place.'
  '18':
  - type: text
    content: Then your covenant with death will be annulled
  - type: text
    content: and your pact with the underworld will not stand.
  - type: text
    content: And when the overwhelming scourge sweeps over you,
  - type: text
    content: it will sweep you away!
  - type: note
    content: Or “it will trample you down.”
  '19':
  - type: text
    content: 'As often as '
  - type: text
    content: disaster
  - type: text
    content: ' passes by, it will carry you away;'
  - type: text
    content: morning by morning, day after day, it will sweep you away!”
  - type: text
    content: When you fully understand this message,
  - type: text
    content: it will bring nothing but terror to you!
  '2':
  - type: text
    content: Behold! The Lord has one who is strong and mighty,
  - type: text
    content: and he will come like a hailstorm and like a destroying wind!
  - type: text
    content: With a storm of massive, flooding waters,
  - type: text
    content: his mighty power will knock it to the ground.
  - type: note
    content: 'There are three fulfillments to this prophecy: (1) The immediate fulfillment of this was the Assyrian army beginning to invade the northern kingdom of Israel in 740 BC (see 1 Chron. 5:26). The tribes located east of the Jordan River were the first ones conquered by Assyria. (2) The distant fulfillment was the advent of Jesus, the Mighty One, whom the Father sent with the sword of truth to demolish the lies and pride of man. (3) The future fulfillment will be the appearing of the overcomers (see Rev. 2–3) who follow the Lamb as dread champions and who overturn the tables of religion and the arrogance of man.'
  '20':
  - type: text
    content: Your bed is too short to stretch yourself out on,
  - type: text
    content: and your covering is too narrow to wrap yourself in.
  - type: note
    content: The bed is a metaphor for their confidence in lies—resting in illusions, not the truth. Those who trust in lies will not be comfortable. The covering being too narrow means their nakedness will still be exposed (like Adam’s and Eve’s hiding behind fig leaves). They will be too cramped and too cold. Every resting place and shelter will fail them.
  '21':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will suddenly arise'
  - type: text
    content: 'as on Mount Perazim '
  - type: note
    content: This mountain is also called Baal-Perazim (“lord of the breakthrough”), the place where the Lord broke through, enabling David to conquer the Philistines. See 2 Sam. 5:20.
  - type: text
    content: and in the valley of Gibeon.
  - type: note
    content: In this valley, Yahweh rained down hailstones on the Amorites. See Josh. 10:8–14.
  - type: text
    content: He arises to accomplish his strange work—peculiar as it is—
  - type: text
    content: 'his strange work '
  - type: text
    content: of judgment
  - type: text
    content: .
  - type: note
    content: The prophet described God’s work of judgment as strange or foreign to what he delights in doing. God is love and longs to pour out his love upon his people, those he has chosen and established as his own. Yet God is holy, and although in mercy he may delay judgment, he will judge his people. To see God’s work of judgment as strange (alien) is to understand that heaven’s default is always mercy. See James 2:13.
  '22':
  - type: text
    content: So do not mock, or your bonds will grow tighter.
  - type: text
    content: 'For I have heard the decree from my Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: Commander of Angel Armies.
  - type: text
    content: He spoke a decree of destruction against the whole land.
  - type: heading
    content: The Wonderful Ways of God
  '23':
  - type: text
    content: Hear my voice, listen to my words,
  - type: text
    content: and pay close attention to my parable.
  - type: note
    content: Or “to my speech.” Isaiah used the parable of a farmer preparing his field to sow seed as a description of God’s ways within us. He begins by essentially saying, “If your ears are opened by my Spirit, then hear what I have to say.”
  '24':
  - type: text
    content: Does a farmer plow continually at planting time
  - type: text
    content: and never plant a crop?
  - type: note
    content: The sharp teeth and cutting edge of God’s Word as it plows through the soil of our hearts will result in his planting the life and glory of Jesus within us. God knows the purpose of his painful plowing in our hearts is to prepare them for the beautiful Jesus to come forth from within. The outward shell, the hardened clods of soil, must be broken open so that Christ may be our true life. See Hos. 10:12.
  - type: text
    content: Does he continually break open the clods of the ground
  - type: note
    content: “The clods of the ground” are an apt metaphor for human nature, for we have been taken from the dust of the ground.
  - type: text
    content: and never sow his seed?
  '25':
  - type: text
    content: Once he has leveled its surface, does he not sow dill and cumin,
  - type: text
    content: planting his wheat in rows, his barley in its proper place,
  - type: text
    content: and his rye in a patch?
  '26':
  - type: text
    content: Yes, his God has instructed him
  - type: text
    content: 'and taught him the right way '
  - type: text
    content: of farming the land
  - type: text
    content: .
  '27':
  - type: text
    content: Dill, a small seed, is not threshed with a threshing sledge,
  - type: text
    content: nor is a wagon wheel rolled over cumin.
  - type: note
    content: God knows how fragile we are as “seeds” of the kingdom. He will thresh us, but only according to what is needed to lay bare our hearts and cause the seed to grow. See 1 Cor. 10:13.
  - type: text
    content: Dill is beaten with a rod and cumin with a stick.
  '28':
  - type: text
    content: 'Grain is crushed '
  - type: note
    content: God does not crush the grain but only frees it from the chaff.
  - type: text
    content: and milled for bread,
  - type: text
    content: but it is not threshed endlessly.
  - type: text
    content: One drives the wagon’s wheels over it,
  - type: text
    content: but his horses’ hooves do not pulverize it.
  '29':
  - type: text
    content: 'This counsel also comes from Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: Commander of Angel Armies.
  - type: text
    content: For his guidance is unfathomable,
  - type: text
    content: 'and the '
  - type: text
    content: heavenly
  - type: text
    content: ' wisdom he imparts is magnificent.'
  - type: note
    content: Or “He makes counsel wonderful; he makes wisdom great.” See Rom. 11:33.
  '3':
  - type: text
    content: That proud crown of the drunkards of Ephraim
  - type: text
    content: will be trampled underfoot,
  '4':
  - type: text
    content: and the glory of these proud leaders will fade and disappear
  - type: text
    content: like the first figs of the season, which are picked and eaten
  - type: text
    content: as soon as they are ripe.
  '5':
  - type: text
    content: 'In that day, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'will be a crown of glory '
  - type: note
    content: God himself is to be our “crown,” not human pride. See Heb. 2:9.
  - type: text
    content: and a diadem of beauty
  - type: text
    content: for the remnant of his people.
  '6':
  - type: text
    content: He will be a Spirit of justice
  - type: text
    content: for judges to render right decisions.
  - type: text
    content: 'And he will be strength '
  - type: text
    content: and bravery
  - type: text
    content: for those who turn back the battle at the gate.
  - type: heading
    content: Judah’s Drunken Prophets
  '7':
  - type: text
    content: Moreover, the prophets and priests are drunk.
  - type: text
    content: They stagger because of wine
  - type: text
    content: and stumble around because of strong drink.
  - type: text
    content: They are confused with wine,
  - type: note
    content: This is a play on words, for the word bala’ is a homophone for “confused” and “to swallow [wine].” It could be translated “The wine they swallow swallows them.”
  - type: text
    content: stumbling because of strong drink.
  - type: text
    content: They’re too drunk to understand their prophetic visions.
  - type: text
    content: They’re too drunk to render right decisions in judgment.
  '8':
  - type: text
    content: 'All of their '
  - type: text
    content: banqueting
  - type: text
    content: ' tables are covered with filthy vomit;'
  - type: text
    content: vomit is everywhere!
  '9':
  - type: text
    content: They say,
  - type: text
    content: '“Who does this prophet '
  - type: note
    content: Or “he.”
  - type: text
    content: think he is to try to teach us?
  - type: text
    content: Who really cares about his message?
  - type: text
    content: It’s only good for babies just learning to talk.
  - type: note
    content: Or “babies just weaned.”
