      - type: usfm
        marker: ft
        children:
        - type: text
          text: The sharp teeth and cutting edge of God’s Word as it plows through the soil of our hearts will result in his planting the life and glory of Jesus within us. God knows the purpose of his painful plowing in our hearts is to prepare them for the beautiful Jesus to come forth from within. The outward shell, the hardened clods of soil, must be broken open so that Christ may be our true life. See
      - type: usfm
        marker: ft
        children:
