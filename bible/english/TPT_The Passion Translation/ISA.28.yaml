          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The bed is a metaphor for their confidence in lies—resting in illusions, not the truth. Those who trust in lies will not be comfortable. The covering being too narrow means their nakedness will still be exposed (like Adam’s and Eve’s hiding behind fig leaves). They will be too cramped and too cold. Every resting place and shelter will fail them.
