          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There are three fulfillments to this prophecy: (1) The immediate fulfillment of this was the Assyrian army beginning to invade the northern kingdom of Israel in 740 BC (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Chron. 5:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The tribes located east of the Jordan River were the first ones conquered by Assyria. (2) The distant fulfillment was the advent of Jesus, the Mighty One, whom the Father sent with the sword of truth to demolish the lies and pride of man. (3) The future fulfillment will be the appearing of the overcomers (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 2–3
      - type: usfm
        marker: ft
        children:
        - type: text
