document_id: JER.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Plan for Jeremiah’s Life
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me again and said: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“And when you prophesy all these words to that people, and they ask you, ‘Why has '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' decreed all this great evil against us? What is the wrong and the sin that we have committed against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God?’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Answer them, ‘Because your ancestors walked away from me, declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and followed other gods and served and worshiped them. They abandoned me and failed to keep my instruction. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Yet you have acted even worse than your ancestors. Each of you follow the stubborn desires of your evil hearts and refuse to listen to me. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Therefore, I will fling you out of this land to a land that neither you nor your fathers have known. And there you will serve other gods, day and night '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to your heart’s content
    - type: text
      text: ', for I will have no pity for you.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exile Will Not Be Forever
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '“Listen, a time is coming,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', “when it will no more be said, ‘As surely as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' lives, who brought the Israelites out of the land of Egypt,’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'but rather, ‘As surely as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' lives, who brought the Israelites back from the land of the north and from all the lands to which he had banished them.’ For I will restore them to their homeland, which I gave to their ancestors.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Behold, I will summon many fishermen,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “and they will fish them out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After that, I will summon many hunters,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they will hunt them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: out of every mountain and hill
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and chase them out of their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hiding places
    - type: text
      text: ' in the rocks.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For I see everything they do.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are not hidden from my presence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor does their guilt escape my gaze.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: First, I will pay them back in full—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even double for their evil and their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have defiled my land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and made it unfit for me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of their dead, detestable idols
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and have filled the land I have chosen for my own
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with their abominations.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah’s Confidence in God
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you are my strength and my stronghold,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my sanctuary in a time of trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations will stream toward you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'from the ends of the earth and say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The gods of our ancestors are nothing but frauds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: worthless idols that could do nothing for them.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“You are not to marry or have children in this land. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Can anyone make his own gods?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If so, how could they be real gods?”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: says
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse should properly be the first verse of ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', since the speaker changed from Jeremiah to'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Surely, I will teach these people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Once and for all, I will cause them to experience
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my powerful hand and my might,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will cause them to understand [the full force of] my power and might.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and they will learn that my name is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God wants us to know his hand (outer court), his might (Holy Place), and his name (Holy of Holies or Most Holy Place).
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For this is what I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have to say concerning any children that may be born in this place and concerning their mothers and fathers in this land: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will die of deadly diseases. No one will mourn for them or bury them; their bodies will lie like dung on the ground. They will be consumed by the sword and by food shortages, and the birds and beasts will feast on their corpses.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: “You are not to enter a house of mourning or go there to lament and to console them. For I have lifted my favor off that people,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. “I will no longer show them my kindness and compassion. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The least and the greatest alike will die in this land. They will not be buried. No one will mourn for them, cut themselves, or shave their heads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to show their grief
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'No one is to offer food to people in mourning, to comfort them in their loss. Even if it is their fathers or mothers who have died, do not give them a cup of consolation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nor are you to go into a house where people are feasting, to enjoy their festivities. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For here is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, the God of Israel, says: I will silence in this land the joyful shout of bride and bridegroom, the sounds of gladness and laughter. It will happen in your lifetime, before your very eyes.'
