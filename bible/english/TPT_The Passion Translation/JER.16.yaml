document_id: JER.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh’s Plan for Jeremiah’s Life
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again and said: '
  '10':
  - type: text
    content: '“And when you prophesy all these words to that people, and they ask you, ‘Why has '
  - type: text
    content: Yahweh
  - type: text
    content: ' decreed all this great evil against us? What is the wrong and the sin that we have committed against '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God?’ '
  '11':
  - type: text
    content: 'Answer them, ‘Because your ancestors walked away from me, declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', and followed other gods and served and worshiped them. They abandoned me and failed to keep my instruction. '
  '12':
  - type: text
    content: 'Yet you have acted even worse than your ancestors. Each of you follow the stubborn desires of your evil hearts and refuse to listen to me. '
  '13':
  - type: text
    content: 'Therefore, I will fling you out of this land to a land that neither you nor your fathers have known. And there you will serve other gods, day and night '
  - type: text
    content: to your heart’s content
  - type: text
    content: ', for I will have no pity for you.’ ”'
  - type: heading
    content: Exile Will Not Be Forever
  '14':
  - type: text
    content: '“Listen, a time is coming,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', “when it will no more be said, ‘As surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ' lives, who brought the Israelites out of the land of Egypt,’ '
  '15':
  - type: text
    content: 'but rather, ‘As surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ' lives, who brought the Israelites back from the land of the north and from all the lands to which he had banished them.’ For I will restore them to their homeland, which I gave to their ancestors.'
  '16':
  - type: text
    content: “Behold, I will summon many fishermen,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “and they will fish them out.
  - type: text
    content: After that, I will summon many hunters,
  - type: text
    content: and they will hunt them
  - type: text
    content: out of every mountain and hill
  - type: text
    content: 'and chase them out of their '
  - type: text
    content: hiding places
  - type: text
    content: ' in the rocks.'
  '17':
  - type: text
    content: For I see everything they do.
  - type: text
    content: They are not hidden from my presence,
  - type: text
    content: nor does their guilt escape my gaze.
  '18':
  - type: text
    content: First, I will pay them back in full—
  - type: text
    content: even double for their evil and their sins.
  - type: text
    content: 'They have defiled my land '
  - type: text
    content: and made it unfit for me
  - type: text
    content: because of their dead, detestable idols
  - type: text
    content: and have filled the land I have chosen for my own
  - type: text
    content: with their abominations.”
  - type: heading
    content: Jeremiah’s Confidence in God
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ', you are my strength and my stronghold,'
  - type: text
    content: my sanctuary in a time of trouble.
  - type: text
    content: Nations will stream toward you
  - type: text
    content: 'from the ends of the earth and say:'
  - type: text
    content: “The gods of our ancestors are nothing but frauds,
  - type: text
    content: worthless idols that could do nothing for them.
  '2':
  - type: text
    content: '“You are not to marry or have children in this land. '
  '20':
  - type: text
    content: Can anyone make his own gods?
  - type: text
    content: If so, how could they be real gods?”
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ','
  - type: note
    content: This verse should properly be the first verse of ch. 17, since the speaker changed from Jeremiah to Yahweh.
  - type: text
    content: “Surely, I will teach these people.
  - type: text
    content: Once and for all, I will cause them to experience
  - type: text
    content: my powerful hand and my might,
  - type: note
    content: Or “I will cause them to understand [the full force of] my power and might.”
  - type: text
    content: 'and they will learn that my name is '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  - type: note
    content: God wants us to know his hand (outer court), his might (Holy Place), and his name (Holy of Holies or Most Holy Place).
  '3':
  - type: text
    content: 'For this is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have to say concerning any children that may be born in this place and concerning their mothers and fathers in this land: '
  '4':
  - type: text
    content: They will die of deadly diseases. No one will mourn for them or bury them; their bodies will lie like dung on the ground. They will be consumed by the sword and by food shortages, and the birds and beasts will feast on their corpses.”
  '5':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “You are not to enter a house of mourning or go there to lament and to console them. For I have lifted my favor off that people,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. “I will no longer show them my kindness and compassion. '
  '6':
  - type: text
    content: 'The least and the greatest alike will die in this land. They will not be buried. No one will mourn for them, cut themselves, or shave their heads '
  - type: text
    content: to show their grief
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'No one is to offer food to people in mourning, to comfort them in their loss. Even if it is their fathers or mothers who have died, do not give them a cup of consolation. '
  '8':
  - type: text
    content: 'Nor are you to go into a house where people are feasting, to enjoy their festivities. '
  '9':
  - type: text
    content: 'For here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, the God of Israel, says: I will silence in this land the joyful shout of bride and bridegroom, the sounds of gladness and laughter. It will happen in your lifetime, before your very eyes.'
