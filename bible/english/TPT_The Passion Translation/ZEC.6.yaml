    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The teaching of the Branch of the Lord is a concept taught throughout the Bible, from the Tree of Life to the seven branches of the lampstand to Jesus the Vine calling us his branches. Jesus is a scion, a branch that can be transplanted and grafted into a human life. Another variant form of this amazing word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: netser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “keeper,” “watchman,” “one who keeps secrets,” “guardian,” or “one who keeps watch.” All these words are true of Jesus, the Branch, who was raised in the village of the Branch (Nazareth). Additionally, the Aramaic word for
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
