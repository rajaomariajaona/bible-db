document_id: ZEC.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Eighth Vision: Four Chariots'
  - type: text
    content: 'Then I looked once more and had another vision. I saw four chariots '
  - type: note
    content: These four (the number of completion) chariots signify the four winds (see vv. 4–8) from the four corners of the earth (see Rev. 7:1–3). These four chariot-winds implement God’s administration worldwide. God uses them to carry out his judgment not only on people but also on nations, governments, and kingdoms.
  - type: text
    content: 'coming out between two mountains of bronze. '
  - type: note
    content: 'The two mountains likely represent the gateway of heaven. There were two bronze pillars on either side of the entrance to the temple (see 1 Kings 7:13–22). To access God’s presence, one had to pass through the gateway with pillars of bronze on each side. These pillars are now mountains, signifying access in and out of God’s heavenly dwelling. Bronze or brass are biblical symbols of judgment. The Hebrew verb for “coming out/going out” in its participial form is the word for “sunrise,” thus the shining color bronze on the mountains. You can find God coming from between two mountains: Sinai and Zion. Additionally, some of the imagery of these verses points us to Ezekiel’s vision of the four living creatures transporting the chariot of God (see Ezek. 1).'
  '10':
  - type: text
    content: '“Go at once to the home of Josiah the son of Zephaniah. There you will receive '
  - type: text
    content: gifts
  - type: text
    content: ' from Heldai, Tobijah, and Jedaiah, who have just arrived among the exiles in Babylon. '
  '11':
  - type: text
    content: 'Accept their gifts of gold and silver and make a crown to place on the head of the high priest Joshua son of Jehozadak. '
  - type: note
    content: The crowning of a high priest, representing him becoming a king, had never been done before. Priests had their duties, and kings had their offices, but Joshua (typifying Christ in his priesthood) received the privilege of holding the two offices, the priesthood and the kingship, in peace on his throne (see vv. 9–13). Prior to the time of Zechariah, no one had held both offices, for the priesthood was of the tribe of Levi and of the family of Aaron, and the kingship was of the tribe of Judah and of the family of David. So Jesus (our Joshua) is crowned as King of Eternity and a High Priest after the order of Melchizedek.
  '12':
  - type: text
    content: 'And say this to him, ‘This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says: “Behold the man whose name is the Branch! '
  - type: note
    content: See Matt. 2:23, where this verse is quoted, fulfilling the prophecy that Jesus would be raised in “Branchtown” (Nazareth). See also Zech. 3:8. The Hebrew Scriptures give us a wonderful truth about the Branch (Sprout) of the Lord that would come and establish righteousness. The Hebrew word for “branch” or “sprout” is netser, the root word for Nazareth and Nazarene. The teaching of the Branch of the Lord is a concept taught throughout the Bible, from the Tree of Life to the seven branches of the lampstand to Jesus the Vine calling us his branches. Jesus is a scion, a branch that can be transplanted and grafted into a human life. Another variant form of this amazing word netser can be translated “keeper,” “watchman,” “one who keeps secrets,” “guardian,” or “one who keeps watch.” All these words are true of Jesus, the Branch, who was raised in the village of the Branch (Nazareth). Additionally, the Aramaic word for Nazareth means “heir of a powerful family [scion].” See Isa. 11:1; 60:21; Dan. 11:7. See also Isa. 4:2; Jer. 23:5. Here in Zech. 6:12, the Hebrew is tsemach, a synonym for branch.
  - type: text
    content: 'He will branch out and flourish from his place, '
  - type: note
    content: Or “the shoot will shoot up from beneath.” Jesus branched out with heavenly life from his manger in Bethlehem to now dwell in us. His place is now within us, Yahweh’s sanctuary. Jesus branches out through us to reveal his glory, his works, and his love. He is the true Vine, and we are his fruitful branches (see John 15; Gal. 5:22–23).
  - type: text
    content: 'and he will build '
  - type: text
    content: Yahweh
  - type: text
    content: '’s sanctuary. '
  '13':
  - type: text
    content: 'Yes, he will build '
  - type: text
    content: Yahweh
  - type: text
    content: '’s sanctuary and will be clothed with majesty. He will sit on his throne and rule. He will be a priest ruling on his throne. These two '
  - type: text
    content: offices
  - type: text
    content: ' will flow together with perfect harmony. '
  '14':
  - type: text
    content: 'Joshua’s crown will be placed in my temple as a memorial to '
  - type: text
    content: the donors
  - type: text
    content: ' Heldai, Tobijah, Jedaiah, and '
  - type: text
    content: in recognition of
  - type: text
    content: ' the generosity of Josiah the son of Zephaniah. '
  '15':
  - type: text
    content: 'And those in distant lands will come to assist the building of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s sanctuary.”
  - type: text
    content: '“ ‘When this happens, you will know for certain that '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has sent me to you. This will happen if you faithfully obey the voice of '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God.’ ”'
  '2':
  - type: text
    content: 'The first chariot was pulled by reddish-brown horses, the second by black horses, '
  '3':
  - type: text
    content: 'the third by white horses, and the fourth by dappled horses—all of them mighty. '
  '4':
  - type: text
    content: I asked the angel who was talking to me, “What do these represent, my lord?”
  '5':
  - type: text
    content: 'The angel explained, “These are the four winds of heaven. They are being dispatched after standing before the Lord of all the earth. '
  '6':
  - type: text
    content: 'The black horses are leaving for the land of the north, '
  - type: note
    content: The word for “north” (Hb. tsapon) was often associated with darkness, and it was from the north that Judah’s enemies would attack.
  - type: text
    content: 'the white ones for the west, and the dappled for the land of the south.” '
  - type: note
    content: The chariot with horses signifies the quick movement of God’s judgment. From our point of view, God’s judgment may be slow in coming. However, according to God’s view, his judgment comes swiftly with a quick movement. This passage identifies the horses by only three colors and going in three directions. The reddish-brown horses and the direction of the east are deliberately absent.
  '7':
  - type: text
    content: 'The strong horses came out eager to patrol the world. He said, “Go and patrol the earth,” and off they went. '
  '8':
  - type: text
    content: Then he called to me and said, “Watch, the ones going to the land of the north are going to make my Spirit descend upon that region.”
  - type: note
    content: Or “give my Spirit rest in the land of the north.”
  - type: heading
    content: Joshua, a King-Priest
  '9':
  - type: text
    content: 'Then another message from '
  - type: text
    content: Yahweh
  - type: text
    content: ' came to me: '
