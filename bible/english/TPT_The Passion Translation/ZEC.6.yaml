    - type: text
      text: '9'
  - type: text
    text: 'Then another message from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Go at once to the home of Josiah the son of Zephaniah. There you will receive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gifts
  - type: text
    text: ' from Heldai, Tobijah, and Jedaiah, who have just arrived among the exiles in Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Accept their gifts of gold and silver and make a crown to place on the head of the high priest Joshua son of Jehozadak. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The crowning of a high priest, representing him becoming a king, had never been done before. Priests had their duties, and kings had their offices, but Joshua (typifying Christ in his priesthood) received the privilege of holding the two offices, the priesthood and the kingship, in peace on his throne (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9–13
      metadata:
        usfm: ZEC.6.9+ZEC.6.10+ZEC.6.11+ZEC.6.12+ZEC.6.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Prior to the time of Zechariah, no one had held both offices, for the priesthood was of the tribe of Levi and of the family of Aaron, and the kingship was of the tribe of Judah and of the family of David. So Jesus (our Joshua) is crowned as King of Eternity and a High Priest after the order of Melchizedek.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And say this to him, ‘This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, says: “Behold the man whose name is the Branch! '
  - type: usfm
