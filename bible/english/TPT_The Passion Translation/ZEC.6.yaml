      - type: text
        text: 6:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the shoot will shoot up from beneath.” Jesus branched out with heavenly life from his manger in Bethlehem to now dwell in us. His place is now within us,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
