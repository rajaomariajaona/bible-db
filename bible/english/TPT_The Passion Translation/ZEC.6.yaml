  - type: text
    text: 'Eighth Vision: Four Chariots'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then I looked once more and had another vision. I saw four chariots '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These four (the number of completion) chariots signify the four winds (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4–8
      metadata:
        usfm: ZEC.6.4+ZEC.6.5+ZEC.6.6+ZEC.6.7+ZEC.6.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) from the four corners of the earth (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 7:1–3
      metadata:
        usfm: REV.7.1+REV.7.2+REV.7.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). These four chariot-winds implement God’s administration worldwide. God uses them to carry out his judgment not only on people but also on nations, governments, and kingdoms.
    marker-yv: yv-n
  - type: text
    text: 'coming out between two mountains of bronze. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The two mountains likely represent the gateway of heaven. There were two bronze pillars on either side of the entrance to the temple (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 7:13–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). To access God’s presence, one had to pass through the gateway with pillars of bronze on each side. These pillars are now mountains, signifying access in and out of God’s heavenly dwelling. Bronze or brass are biblical symbols of judgment. The Hebrew verb for “coming out/going out” in its participial form is the word for “sunrise,” thus the shining color bronze on the mountains. You can find God coming from between two mountains: Sinai and Zion. Additionally, some of the imagery of these verses points us to Ezekiel’s vision of the four living creatures transporting the chariot of God (see'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 1
      metadata:
        usfm: EZK.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The first chariot was pulled by reddish-brown horses, the second by black horses, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'the third by white horses, and the fourth by dappled horses—all of them mighty. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I asked the angel who was talking to me, “What do these represent, my lord?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The angel explained, “These are the four winds of heaven. They are being dispatched after standing before the Lord of all the earth. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The black horses are leaving for the land of the north, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word for “north” (Hb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tsapon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) was often associated with darkness, and it was from the north that Judah’s enemies would attack.
    marker-yv: yv-n
  - type: text
    text: 'the white ones for the west, and the dappled for the land of the south.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The chariot with horses signifies the quick movement of God’s judgment. From our point of view, God’s judgment may be slow in coming. However, according to God’s view, his judgment comes swiftly with a quick movement. This passage identifies the horses by only three colors and going in three directions. The reddish-brown horses and the direction of the east are deliberately absent.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The strong horses came out eager to patrol the world. He said, “Go and patrol the earth,” and off they went. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then he called to me and said, “Watch, the ones going to the land of the north are going to make my Spirit descend upon that region.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 6:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “give my Spirit rest in the land of the north.”
    marker-yv: yv-n
- type: usfm
  marker: s1
