    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'he invited a thousand of his nobles to a state banquet, where the wine flowed freely among all his guests. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'While Belshazzar was drinking his wine, he gave orders to bring in the gold and silver vessels that his predecessor Nebuchadnezzar had taken from the temple of Jerusalem. He was wanting to drink from them along with all his guests—his nobles, his wives, and his concubines. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or possibly “singing women [entertainers].”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So they brought in the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sacred
  - type: text
    text: ' gold vessels that were seized from the house of God in Jerusalem, and the king, his nobles, his wives, and his concubines all drank from them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'As they all drank their wine, they praised their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: man-made
  - type: text
    text: ' gods of gold and silver, bronze and iron, wood and stone.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Historians tell us that in September–October of 539 BC, King Cyrus of Persia marched on Babylon and defeated Nabonidus, who fled, leaving his son Belshazzar as ruler of the city. This banquet was likely a religious feast meant to rally the city under Belshazzar’s leadership. It is not credible to suggest it was simply a party since the enemies of Babylon were approaching the city. They were celebrating their gods and, in effect, calling on them for aid. (For more on the setting of Belshazzar’s feast, see William H. Shea, “Nabonidus, Belshazzar, and the Book of Daniel: An Update,”'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Andrews University Seminary Studies
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 20, no. 2 [1982], 133–49.)
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then all at once, a human hand appeared '
  - type: usfm
    marker: it
    children:
    - type: text
      text: out of thin air
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the fingers of a man came out.” The words “came out” are the same used in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: DAN.5.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: DAN.5.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: for taking out (seizing) the sacred vessels from the temple.
    marker-yv: yv-n
  - type: text
    text: 'and its finger began writing on the white-washed wall of the palace, illuminated by the lampstand '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nebrashta’
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which corresponds to the lampstand in the temple. There can be little question that this “lampstand” was the menorah taken as part of the spoils from Solomon’s Temple when it was conquered by the Babylonians. (See Ludwig Koehler and Walter Baumgartner,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hebrew and Aramaic Lexicon of the Old Testament
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', vol. 5, trans. M. E. J. Richardson [Boston: Brill, 2000], 1925.)'
    marker-yv: yv-n
  - type: text
    text: 'nearby. When the king witnessed this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: strange
  - type: text
    text: ' hand '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic means literally “the hand of the hand.” In Aramaic there are two different words used for the hand, and they are found together here. It could mean the back of the hand as it wrote or a hand detached from the body.
    marker-yv: yv-n
  - type: text
    text: 'as it was writing, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: terror gripped him! The color drained from his face, his knees began to knock together, and he wet himself.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or literally “the knots [or joints] of his loins were loosened.” In other words, euphemistically, he wet himself or dirtied his trousers or both. (See Al Wolters, “Untying the King’s Knots: Physiology and Wordplay in Daniel 5,”'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Journal of Biblical Literature
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 110, no. 1 [1991], 117–22.) See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 45:1
      metadata:
        usfm: ISA.45.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and fourth footnote. However, this physiological response may refer to the weakening of his joints—likely the hips—with the result that he would be unable to stand up. This second option is more preferable, if “joints” is read as the meaning of the Aramaic term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: qiterey
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The king shouted out, “Bring in the astrologers, wise men, and enchanters.” And when they came before him, he said to all the wise ones of Babylon, “I will make '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rich and famous
  - type: text
    text: ' anyone who can read this handwriting on the wall and tell me its interpretation. He will wear the purple robes of royalty and wear a golden collar '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a torque [necklace].” See v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: DAN.5.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: on his neck, and I will make him the third highest ruler in my kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All the king’s wise men came forward '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to examine the wall
  - type: text
    text: ', but not one could read the writing or tell the king what it meant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: King Belshazzar grew more and more terrified, his face turned ashen, and all his nobles were dumbfounded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When the queen '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mother
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is likely that the queen is Belshazzar’s mother, the wife of Nabonidus, and that she was the daughter of Nebuchadnezzar, which meant Belshazzar was Nebuchadnezzar’s grandson.
    marker-yv: yv-n
  - type: text
    text: 'heard the uproar among the king and his nobles, she entered the banquet hall and said, “Long live the king! Do not be so alarmed. Why are you so pale? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'There is a mighty man in your kingdom who has the spirit of the holy gods in him. During your predecessor’s reign, he was found to have light, brilliant insight, and godlike wisdom. It was, in fact, your predecessor King Nebuchadnezzar, who made him chief of the wise men, enchanters, astrologers, and diviners. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This man Daniel, whom the king named Belteshazzar, has an extraordinary spirit and is full of revelation and understanding. He possesses a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rare
  - type: text
    text: ' ability to interpret dreams, unravel mysteries, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “dark sentences.”
    marker-yv: yv-n
  - type: text
    text: 'and find solutions to impossible problems. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “untying of knots.”
    marker-yv: yv-n
  - type: text
    text: 'So send for Daniel, and he will reveal to you what this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: handwriting
  - type: text
    text: ' means.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel Explains the Handwriting on the Wall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Daniel was brought into the presence of King Belshazzar, and the king asked him, “So, you are the Daniel of the Jewish exiles my predecessor brought here from Judah? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so much
  - type: text
    text: ' about you. I’ve been told that you have the Spirit of God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the spirit of the gods.”
    marker-yv: yv-n
  - type: text
    text: 'and that you possess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: divine
  - type: text
    text: ' illumination, brilliant insight, and extraordinary wisdom. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Now, I have already brought in my wise men and astrologers before me, that they might read this inscription and give me its interpretation, but they were unable to show me what the words mean. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'However, I have heard that you are able to interpret dreams and that you have solutions for impossible problems. If you, then, can read the handwriting and tell me what it means, you will wear purple robes '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of royalty
  - type: text
    text: ' and a golden collar on your neck, and you will become the third most powerful ruler in the kingdom.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Daniel answered the king, “You may keep your rewards or give your gifts to someone else. But I will clear up for you the mystery of this handwriting '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on the wall
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As for you, O king, the Most High God gave your predecessor Nebuchadnezzar kingship, greatness, honor, and majesty. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' made him so great that people everywhere—people from every nation, tribe, and language group—trembled with fear and dread of him. He killed or spared whomever he pleased, and he exalted or humbled whomever he wished. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But when his heart was inflated with pride '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 8:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and his spirit hardened into stubbornness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God
  - type: text
    text: ' deposed him from his royal throne and stripped him of his glory. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: He was driven away from civilization, for his mind became like that of a beast. He lived with the wild donkeys and ate grass like an ox. His body was bathed with the dew of heaven until finally he acknowledged that the Most High God has dominion over the kingdoms of men and sets over them anyone he wishes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Yet you, his successor Belshazzar, you have not humbled your heart even though you knew all this. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Instead, you lifted yourself up above the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sovereign
  - type: text
    text: ' Lord of the heavens. And you brought into your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: banquet hall
  - type: text
    text: ' the vessels of his temple '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “his house.”
    marker-yv: yv-n
  - type: text
    text: 'so that you and your nobles, your wives, and your concubines might drink wine from them. You lifted praises to your gods of gold and silver, of bronze and iron, of wood and stone, who do not see or hear or know anything; but the God who controls your very life breath and every move you make '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
