    - type: usfm
      marker: ft
      children:
      - type: text
        text: Belshazzar was the son of King Nabonidus (556–539 BC). He served as the regent of the kingdom (person acting as king) during the absence of his father. If Belshazzar was serving his father as second-in-command, it would explain why the interpreter of the handwriting on the wall would be made third-in-command in the kingdom (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: DAN.5.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The events of ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: DAN.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: happened many years after the events of ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
