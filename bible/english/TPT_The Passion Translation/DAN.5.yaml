        text: Cyropaedia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 7.5.17–29). The Greek historian Herodotus, who wrote of the fall of Babylon about a hundred years after it happened, described the unusual way that Cyrus’ army captured the city. Part of the army went north of Babylon and dug a trench from the Euphrates River to a nearby marsh. When the army connected the trench to the Euphrates River, much of the water in the river flowed toward the marsh while only a little water continued to flow toward Babylon. While the Babylonians were confidently celebrating at Belshazzar’s feast, the strong river and moat protecting the city became extremely shallow, and the Medes and Persians were able to march right into the city without a battle. (See'
