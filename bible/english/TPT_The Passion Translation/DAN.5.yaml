      - type: text
        text: 'Babylon fell to the Persians on the night of October 11, 539 BC, which is the fifteenth day of the month of Tishri, the seventh month. According to the Jewish calendar, this was during the Feast of Tabernacles. According to Xenophon of Athens (ca. 430–354 BC), who was a pupil of Socrates, Cyrus launched a nighttime attack that conquered the city of Babylon. He states that Cyrus told his troops: “Tonight we go against them when some are asleep and some are drunk, and all are unprepared” ('
    - type: usfm
