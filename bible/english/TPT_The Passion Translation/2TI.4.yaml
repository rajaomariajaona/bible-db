document_id: 2TI.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Farewell Message
  - type: text
    content: 'Timothy, in the presence '
  - type: note
    content: Or “before the eyes of God.” The Greek word is enopion, which could be translated “within eyesight of.” Imagine looking into heaven and seeing the eyes of God gazing at you. This is the strength of Paul’s charge to Timothy.
  - type: text
    content: 'of our great God and our Lord Jesus Christ, the One who is destined to judge both the living and the dead by the revelation of his kingdom—I solemnly instruct you to '
  '10':
  - type: text
    content: 'since Demas deserted me and has left to go to Thessalonica, for he loves his own life. '
  - type: note
    content: Or “he loves the world.”
  - type: text
    content: 'Crescens has gone to Galatia, and Titus has gone to Dalmatia. '
  '11':
  - type: text
    content: That leaves only Luke with me, so find Mark and bring him with you, for he is a tremendous help for me in my ministry.
  '12':
  - type: text
    content: 'I have also dispatched Tychicus to Ephesus to minister there. '
  '13':
  - type: text
    content: 'When you come, please bring the leather book bag '
  - type: note
    content: The Aramaic can be translated “carrying case.” This would have been a bag made of leather or woolen cloth. The Greek text reads “bring the cloak.” The Aramaic words for “book” and “cloak” are nearly identical, which would explain the Greek mistranslation using “cloak.” It is fascinating that the aged Paul, nearing death, found his heart attached to the manuscripts and books that undoubtedly expounded on the Old Testament writings. He knew Jesus intimately, yet longed for more revelation of the written Word until his death.
  - type: text
    content: along with the books I left in Troas with Carpus—especially the parchment scrolls.
  '14':
  - type: text
    content: 'You need to know that Alexander, '
  - type: note
    content: Alexander means “protector of men” or “man-pleaser.”
  - type: text
    content: 'the jeweler, '
  - type: note
    content: The word used here can also be “silversmith,” “blacksmith” or “coppersmith.”
  - type: text
    content: 'has done me great harm. May our Lord give him what he deserves for all he has done. '
  '15':
  - type: text
    content: Be careful of him, for he arrogantly opposes our ministry.
  '16':
  - type: text
    content: 'At first there was no one I could count on to faithfully stand with me—they all ran off and abandoned me—but don’t hold this against them. '
  '17':
  - type: text
    content: For in spite of this
  - type: text
    content: ', my Lord himself stood with me, empowering me to complete my ministry of preaching to all the non-Jewish nations so they all could hear the message and be delivered from the mouth of the lion! '
  - type: note
    content: Or “that they will hear that I have been delivered from the mouth of the lion.” By implication, the lion is a metaphor for the devil.
  '18':
  - type: text
    content: And my Lord will continue to deliver me from every form of evil and give me life in his heavenly kingdom. May all the glory go to him alone for all the ages of eternity!
  '19':
  - type: text
    content: 'Please give my warm regards '
  - type: note
    content: The Aramaic can be translated “give peace.”
  - type: text
    content: 'to Prisca and to Aquila '
  - type: note
    content: Prisca is a diminutive form of Priscilla (“long life”). She and her husband, Aquila (“eagle”), were tentmakers like Paul. They were not only business partners with Paul, but also partners with him in ministry. See Acts 18:2, 18, 26; Rom. 16:3; 1 Cor. 16:19.
  - type: text
    content: and to Onesiphorus and his family.
  '2':
  - type: text
    content: 'proclaim the Word of God '
  - type: text
    content: and stand upon it no matter what
  - type: text
    content: '! Rise to the occasion and preach when it is convenient and when it is not. Preach in the full expression of the Holy Spirit '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: —with wisdom and patience as you instruct and teach the people.
  '20':
  - type: text
    content: Erastus has remained in Corinth, but Trophimus I had to leave in Miletus due to his illness.
  - type: note
    content: The Greek word used here can refer to physical or spiritual ailments.
  '21':
  - type: text
    content: Do your best to come before winter.
  - type: text
    content: 'Eubulus sends his greetings, along with Pudens, Linus, '
  - type: note
    content: In church history it was widely accepted and stated by Irenaeus that Linus was a disciple of Peter and became the bishop of Rome.
  - type: text
    content: and Claudia, and all those in prison with me.
  '22':
  - type: text
    content: The Lord is within your spirit and his grace overflows to you!
  - type: text
    content: Love in Christ
  - type: text
    content: ','
  - type: text
    content: Paul
  '3':
  - type: text
    content: 'For the time is coming when they will no longer listen and respond to the healing words of truth '
  - type: text
    content: because they will become selfish and proud
  - type: text
    content: '. They will seek out teachers with soothing words that line up with their desires, saying just what they want to hear. '
  '4':
  - type: text
    content: 'They will close their ears to the truth and believe nothing but fables and myths. '
  - type: note
    content: The Aramaic can be translated “ritualistic ceremonies.”
  '5':
  - type: text
    content: 'So be alert to all these things and overcome every form of evil. Carry in your heart the passion of your calling as '
  - type: text
    content: a church planter
  - type: text
    content: ' '
  - type: note
    content: Implied in the concept of being a New Testament evangelist. Apostolic missionaries sent out to evangelize were to plant churches wherever they ministered. Our contemporary concept of an evangelist is quite different than in Paul’s day.
  - type: text
    content: and evangelist, and fulfill your ministry calling.
  - type: note
    content: Or “being confident in your ministry.”
  '6':
  - type: text
    content: 'And now the time is fast approaching for my release from this life and I am ready to be offered as a sacrifice. '
  - type: note
    content: Or “poured out as a drink offering.”
  '7':
  - type: text
    content: 'I have fought an excellent fight. I have finished my full course '
  - type: text
    content: with all my might
  - type: text
    content: ' and I’ve kept my heart full of faith. '
  '8':
  - type: text
    content: There’s a crown of righteousness waiting in heaven for me, and I know that my Lord will reward me on his day of righteous judgment. And this crown is not only waiting for me, but for all who love and long for his unveiling.
  - type: note
    content: Or “sudden appearance.”
  '9':
  - type: text
    content: 'Please come as soon as you can '
