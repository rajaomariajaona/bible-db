document_id: 2TI.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Farewell Message
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Timothy, in the presence '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “before the eyes of God.” The Greek word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: enopion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which could be translated “within eyesight of.” Imagine looking into heaven and seeing the eyes of God gazing at you. This is the strength of Paul’s charge to Timothy.'
      marker-yv: yv-n
    - type: text
      text: 'of our great God and our Lord Jesus Christ, the One who is destined to judge both the living and the dead by the revelation of his kingdom—I solemnly instruct you to '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'since Demas deserted me and has left to go to Thessalonica, for he loves his own life. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he loves the world.”
      marker-yv: yv-n
    - type: text
      text: 'Crescens has gone to Galatia, and Titus has gone to Dalmatia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: That leaves only Luke with me, so find Mark and bring him with you, for he is a tremendous help for me in my ministry.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I have also dispatched Tychicus to Ephesus to minister there. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When you come, please bring the leather book bag '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “carrying case.” This would have been a bag made of leather or woolen cloth. The Greek text reads “bring the cloak.” The Aramaic words for “book” and “cloak” are nearly identical, which would explain the Greek mistranslation using “cloak.” It is fascinating that the aged Paul, nearing death, found his heart attached to the manuscripts and books that undoubtedly expounded on the Old Testament writings. He knew Jesus intimately, yet longed for more revelation of the written Word until his death.
      marker-yv: yv-n
    - type: text
      text: along with the books I left in Troas with Carpus—especially the parchment scrolls.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'You need to know that Alexander, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Alexander
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “protector of men” or “man-pleaser.”
      marker-yv: yv-n
    - type: text
      text: 'the jeweler, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used here can also be “silversmith,” “blacksmith” or “coppersmith.”
      marker-yv: yv-n
    - type: text
      text: 'has done me great harm. May our Lord give him what he deserves for all he has done. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Be careful of him, for he arrogantly opposes our ministry.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'At first there was no one I could count on to faithfully stand with me—they all ran off and abandoned me—but don’t hold this against them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: it
      children:
      - type: text
        text: For in spite of this
    - type: text
      text: ', my Lord himself stood with me, empowering me to complete my ministry of preaching to all the non-Jewish nations so they all could hear the message and be delivered from the mouth of the lion! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that they will hear that I have been delivered from the mouth of the lion.” By implication, the lion is a metaphor for the devil.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And my Lord will continue to deliver me from every form of evil and give me life in his heavenly kingdom. May all the glory go to him alone for all the ages of eternity!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Please give my warm regards '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “give peace.”
      marker-yv: yv-n
    - type: text
      text: 'to Prisca and to Aquila '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Prisca
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a diminutive form of Priscilla (“long life”). She and her husband, Aquila (“eagle”), were tentmakers like Paul. They were not only business partners with Paul, but also partners with him in ministry. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 18:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 16:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and to Onesiphorus and his family.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'proclaim the Word of God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and stand upon it no matter what
    - type: text
      text: '! Rise to the occasion and preach when it is convenient and when it is not. Preach in the full expression of the Holy Spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: —with wisdom and patience as you instruct and teach the people.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Erastus has remained in Corinth, but Trophimus I had to leave in Miletus due to his illness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here can refer to physical or spiritual ailments.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Do your best to come before winter.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eubulus sends his greetings, along with Pudens, Linus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In church history it was widely accepted and stated by Irenaeus that Linus was a disciple of Peter and became the bishop of Rome.
      marker-yv: yv-n
    - type: text
      text: and Claudia, and all those in prison with me.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The Lord is within your spirit and his grace overflows to you!
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Love in Christ
    - type: text
      text: ','
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For the time is coming when they will no longer listen and respond to the healing words of truth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because they will become selfish and proud
    - type: text
      text: '. They will seek out teachers with soothing words that line up with their desires, saying just what they want to hear. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They will close their ears to the truth and believe nothing but fables and myths. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “ritualistic ceremonies.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So be alert to all these things and overcome every form of evil. Carry in your heart the passion of your calling as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a church planter
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the concept of being a New Testament evangelist. Apostolic missionaries sent out to evangelize were to plant churches wherever they ministered. Our contemporary concept of an evangelist is quite different than in Paul’s day.
      marker-yv: yv-n
    - type: text
      text: and evangelist, and fulfill your ministry calling.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “being confident in your ministry.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And now the time is fast approaching for my release from this life and I am ready to be offered as a sacrifice. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “poured out as a drink offering.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'I have fought an excellent fight. I have finished my full course '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with all my might
    - type: text
      text: ' and I’ve kept my heart full of faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: There’s a crown of righteousness waiting in heaven for me, and I know that my Lord will reward me on his day of righteous judgment. And this crown is not only waiting for me, but for all who love and long for his unveiling.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sudden appearance.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Please come as soon as you can '
