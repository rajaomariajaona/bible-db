document_id: PSA.118,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Glorious Thanksgiving
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A praise psalm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '118'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the psalm or hymn that Jesus likely sang after the Passover supper with his disciples, before making his way to Gethsemane and Calvary.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Keep on giving your thanks to God, for he is so good!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His constant, tender love lasts forever!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Once I was hemmed in and surrounded by those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who don’t love you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s supernatural power I overcame them all!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: Yes, they surrounded me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a swarm of killer bees swirling around me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was trapped like one trapped by a raging fire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was surrounded with no way out and at the point of collapse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s supernatural power, I overcame them all!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They pushed me right up to the edge, and I was ready to fall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you helped me to triumph, and together we overcame them all.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Lord, you are my true strength and my glory-song,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my champion, my Savior!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The joyful songs I now sing will be sung again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the hearts and homes of all your devoted lovers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My loud shouts of victory will echo throughout the land.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 118:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the tents of the righteous.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s right hand conquers valiantly!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The right hand of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' exalts!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The right hand of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will never fail.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You will not let them kill me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I will live to tell the world what the Lord has done for me.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Yes, the Lord punished me as I deserved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he’ll never give me over to death.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Swing wide, you gates of righteousness, and let me pass through,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will enter into God’s presence to worship only him.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let all his princely people sing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His constant, tender love lasts forever!”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I have found the gateway to God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the pathway to his presence for all his devoted lovers.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I will offer all my loving praise to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I thank you so much for answering my prayer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bringing me salvation!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The very stone the masons rejected as flawed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has turned out to be the most important capstone of the arch,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 118:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The words “capstone of the arch” can also be translated “head of the corner.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: holding up the very house of God.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: The Lord himself is the one who has done this,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and it’s so amazing, so marvelous to see!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: This is the very day of the Lord that brings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gladness and joy, filling our hearts with glee.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: O God, please come and save us again;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bring us your breakthrough-victory!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Blessed is this one who comes to us, the sent one of the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And from within the temple we cry, “We bless you!”
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 27-28
    - type: text
      text: For the Lord our God has brought us his glory-light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I offer him my life in joyous sacrifice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tied tightly to your altar, I will bring you praise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are the God of my life and I lift you high,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: exalting you to the highest place.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: So let’s keep on giving our thanks to God, for he is so good!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His constant, tender love lasts forever!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Let all his holy priests sing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His constant, tender love lasts forever!”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Let all his lovers who bow low before him sing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His constant, tender love lasts forever!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Out of my deep anguish and pain I prayed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and God, you helped me as a father.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You came to my rescue and broke open the way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into a beautiful and broad place.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Now I know, Lord, that you are for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will never fear what man can do to me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: For you stand beside me as my hero who rescues me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve seen with my own eyes the defeat of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve triumphed over them all!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Lord, it is so much better to trust in you to save me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to put my confidence in someone else.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Yes, it is so much better to trust in the Lord to save me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to put my confidence in celebrities.
