document_id: PSA.118,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Glorious Thanksgiving
  - type: text
    content: A praise psalm
  - type: note
    content: This is the psalm or hymn that Jesus likely sang after the Passover supper with his disciples, before making his way to Gethsemane and Calvary.
  - type: text
    content: Keep on giving your thanks to God, for he is so good!
  - type: text
    content: His constant, tender love lasts forever!
  '10':
  - type: text
    content: Once I was hemmed in and surrounded by those
  - type: text
    content: who don’t love you.
  - type: text
    content: 'But by '
  - type: text
    content: Yahweh
  - type: text
    content: ’s supernatural power I overcame them all!
  '11':
  - type: text
    content: Yes, they surrounded me,
  - type: text
    content: like a swarm of killer bees swirling around me.
  - type: text
    content: I was trapped like one trapped by a raging fire;
  - type: text
    content: I was surrounded with no way out and at the point of collapse.
  - type: text
    content: 'But by '
  - type: text
    content: Yahweh
  - type: text
    content: ’s supernatural power, I overcame them all!
  '13':
  - type: text
    content: They pushed me right up to the edge, and I was ready to fall,
  - type: text
    content: but you helped me to triumph, and together we overcame them all.
  '14':
  - type: text
    content: Lord, you are my true strength and my glory-song,
  - type: text
    content: my champion, my Savior!
  '15':
  - type: text
    content: The joyful songs I now sing will be sung again
  - type: text
    content: in the hearts and homes of all your devoted lovers.
  - type: text
    content: My loud shouts of victory will echo throughout the land.
  - type: note
    content: Or “in the tents of the righteous.”
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ’s right hand conquers valiantly!
  '16':
  - type: text
    content: 'The right hand of '
  - type: text
    content: Yahweh
  - type: text
    content: ' exalts!'
  - type: text
    content: 'The right hand of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will never fail.'
  '17':
  - type: text
    content: You will not let them kill me,
  - type: text
    content: but I will live to tell the world what the Lord has done for me.
  '18':
  - type: text
    content: Yes, the Lord punished me as I deserved,
  - type: text
    content: but he’ll never give me over to death.
  '19':
  - type: text
    content: Swing wide, you gates of righteousness, and let me pass through,
  - type: text
    content: and I will enter into God’s presence to worship only him.
  '2':
  - type: text
    content: Let all his princely people sing,
  - type: text
    content: “His constant, tender love lasts forever!”
  '20':
  - type: text
    content: I have found the gateway to God,
  - type: text
    content: the pathway to his presence for all his devoted lovers.
  '21':
  - type: text
    content: I will offer all my loving praise to you,
  - type: text
    content: and I thank you so much for answering my prayer
  - type: text
    content: and bringing me salvation!
  '22':
  - type: text
    content: The very stone the masons rejected as flawed
  - type: text
    content: has turned out to be the most important capstone of the arch,
  - type: note
    content: The words “capstone of the arch” can also be translated “head of the corner.”
  - type: text
    content: holding up the very house of God.
  '23':
  - type: text
    content: The Lord himself is the one who has done this,
  - type: text
    content: and it’s so amazing, so marvelous to see!
  '24':
  - type: text
    content: This is the very day of the Lord that brings
  - type: text
    content: gladness and joy, filling our hearts with glee.
  '25':
  - type: text
    content: O God, please come and save us again;
  - type: text
    content: bring us your breakthrough-victory!
  '26':
  - type: text
    content: Blessed is this one who comes to us, the sent one of the Lord.
  - type: text
    content: And from within the temple we cry, “We bless you!”
  '27':
  - type: text
    content: For the Lord our God has brought us his glory-light.
  - type: text
    content: I offer him my life in joyous sacrifice.
  - type: text
    content: Tied tightly to your altar, I will bring you praise.
  - type: text
    content: For you are the God of my life and I lift you high,
  - type: text
    content: exalting you to the highest place.
  '29':
  - type: text
    content: So let’s keep on giving our thanks to God, for he is so good!
  - type: text
    content: His constant, tender love lasts forever!
  '3':
  - type: text
    content: Let all his holy priests sing,
  - type: text
    content: “His constant, tender love lasts forever!”
  '4':
  - type: text
    content: Let all his lovers who bow low before him sing,
  - type: text
    content: “His constant, tender love lasts forever!”
  '5':
  - type: text
    content: Out of my deep anguish and pain I prayed,
  - type: text
    content: and God, you helped me as a father.
  - type: text
    content: You came to my rescue and broke open the way
  - type: text
    content: into a beautiful and broad place.
  '6':
  - type: text
    content: Now I know, Lord, that you are for me,
  - type: text
    content: and I will never fear what man can do to me.
  '7':
  - type: text
    content: For you stand beside me as my hero who rescues me.
  - type: text
    content: I’ve seen with my own eyes the defeat of my enemies.
  - type: text
    content: I’ve triumphed over them all!
  '8':
  - type: text
    content: Lord, it is so much better to trust in you to save me
  - type: text
    content: than to put my confidence in someone else.
  '9':
  - type: text
    content: Yes, it is so much better to trust in the Lord to save me
  - type: text
    content: than to put my confidence in celebrities.
