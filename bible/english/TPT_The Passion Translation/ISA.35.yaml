  '8':
  - type: text
    content: There will be a highway of holiness called the Sacred Way.
  - type: text
    content: The impure will not be permitted on this road,
  - type: text
    content: but it will be accessible to God’s people.
  - type: note
    content: Or “it is for those who walk the walk.”
  - type: text
    content: And not even fools will lose their way.
  - type: note
    content: Or “fools will not trespass on it.”
  '9':
  - type: text
    content: 'The lion '
  - type: note
    content: The lion is a frequent metaphor for Satan. See 1 Peter 5:8.
  - type: text
    content: will not be found there;
  - type: text
    content: no wild beast will travel on it—
  - type: text
    content: they will not be found there.
  - type: text
    content: But the redeemed will find a pathway on it.
