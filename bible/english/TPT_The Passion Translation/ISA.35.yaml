          text: This chapter is recognized as a Hebrew poem of rare and superb beauty, one of the most glorious chapters in the Bible. It is a picture of the last-days church rising up out of the wilderness to shine in all the radiance of its glory. It is a picture of Eden restored as the kingdom-realm of God brings hope to the weak and struggling. “The Sacred Way” is the way of life in Christ as we live in heaven’s power and virtue.
      marker-yv: yv-n
    - type: text
      text: The wilderness and dry land will be joyously glad!
  - type: usfm
    marker: q1
