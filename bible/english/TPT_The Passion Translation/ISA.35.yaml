verses:
  '1':
  - type: heading
    content: The Redeemed Return to Zion
  - type: text
    content: ' '
  - type: note
    content: Chapters 35–39 form the conclusion of the first part of the book of Isaiah. They contain the accounts of three historical events, each surrounding the influence of the prophet Isaiah during the reign of Israel’s King Hezekiah. This section of Isaiah is frequently called “the Volume of Hezekiah” since he is mentioned thirty-five times in these four chapters. Chapters 35–37 detail the unsuccessful efforts of Sennacherib, king of Assyria, to take possession of Jerusalem by threats and intimidation. Chapter 38 details Hezekiah’s sickness and miracle of divine healing. Chapter 39 gives us the account of Hezekiah’s sin of pride in showing all his wealth to the Babylonian emissaries.
  - type: note
    content: This chapter is recognized as a Hebrew poem of rare and superb beauty, one of the most glorious chapters in the Bible. It is a picture of the last-days church rising up out of the wilderness to shine in all the radiance of its glory. It is a picture of Eden restored as the kingdom-realm of God brings hope to the weak and struggling. “The Sacred Way” is the way of life in Christ as we live in heaven’s power and virtue.
  - type: text
    content: The wilderness and dry land will be joyously glad!
  - type: text
    content: The desert will blossom like a rose and rejoice!
  '10':
  - type: text
    content: Yahweh
  - type: text
    content: ’s ransomed ones will return with glee to Zion.
  - type: text
    content: They will enter with a song of rejoicing
  - type: text
    content: and be crowned with everlasting joy.
  - type: text
    content: Ecstatic joy will overwhelm them;
  - type: text
    content: weariness and grief will disappear!
  '2':
  - type: text
    content: Every dry and barren place will burst forth with abundant blossoms,
  - type: note
    content: Or “Blossoming it will blossom.” The Hebrew word parach implies breaking forth and blooming. It can also mean to “spread [the wings] and fly.” This is what will happen to God’s people in the last days. Once confined in the wilderness, they will break forth and blossom with beauty and glory as saints of the Most High.
  - type: text
    content: dancing and spinning with delight!
  - type: note
    content: The Hebrew word giyl implies spinning with delight and dancing. See Ps. 149:3; Jer. 31:13; Zeph. 3:17.
  - type: text
    content: Lebanon’s lush splendor covers it,
  - type: text
    content: 'the magnificent beauty of Carmel '
  - type: note
    content: Carmel is a mountain range near Israel’s Mediterranean coast. Carmel means “fruitful,” “plentiful,” “orchard,” “garden,” or “vineyard.” See Song. 4:11–15; 7:5.
  - type: text
    content: and Sharon.
  - type: note
    content: Sharon is a coastal plain in Israel. Sharon means “an open, sweeping plain,” “straight,” “upright,” “pleasant,” or “prosperous.”
  - type: text
    content: 'My people '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “They.”
  - type: text
    content: 'will see the awesome glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the beautiful grandeur of our God.
  '3':
  - type: text
    content: Strengthen those who are discouraged.
  - type: note
    content: Or “strengthen the weak hands.” See Heb. 12:12–13.
  - type: text
    content: Energize those who feel defeated.
  - type: note
    content: Or “Make firm those with feeble knees.”
  '4':
  - type: text
    content: Say to the anxious and fearful,
  - type: text
    content: “Be strong and never afraid.
  - type: text
    content: Look, here comes your God!
  - type: text
    content: He is breaking through to give you victory!
  - type: text
    content: He comes to avenge your enemies.
  - type: text
    content: With divine retribution he comes to save you!”
  - type: note
    content: See Ps. 149:4, 7.
  '5':
  - type: text
    content: Then blind eyes will open and deaf ears will hear.
  '6':
  - type: text
    content: 'Then the lame will leap '
  - type: note
    content: See Acts 3:7–8.
  - type: text
    content: 'like '
  - type: text
    content: playful
  - type: text
    content: ' deer'
  - type: text
    content: and the tongue-tied will sing songs of triumph.
  - type: text
    content: Gushing water will spring up in the wilderness
  - type: text
    content: and streams will flow through the desert.
  - type: note
    content: See Judg. 15:18–19; Ps. 110:7.
  '7':
  - type: text
    content: 'The burning sand will become a '
  - type: text
    content: refreshing
  - type: text
    content: ' oasis,'
  - type: text
    content: the parched ground bubbling springs,
  - type: text
    content: 'and the dragon’s '
  - type: note
    content: Or “serpent,” “monster,” or “jackal.”
  - type: text
    content: lair a meadow
  - type: text
