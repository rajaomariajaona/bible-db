          text: form the conclusion of the first part of the book of Isaiah. They contain the accounts of three historical events, each surrounding the influence of the prophet Isaiah during the reign of Israel’s King Hezekiah. This section of Isaiah is frequently called “the Volume of Hezekiah” since he is mentioned thirty-five times in these four chapters. Chapters
