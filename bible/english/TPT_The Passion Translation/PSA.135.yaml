document_id: PSA.135,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: His Wonderful Works
  - type: text
    content: A song of the stairway
  - type: text
    content: Shout hallelujah and praise the greatness of God!
  - type: text
    content: All his righteous ones, praise him!
  '10':
  - type: text
    content: He conquered many nations and killed their mighty kings,
  '11':
  - type: text
    content: like Sihon, king of the Amorites, and Og, king of Bashan,
  - type: text
    content: and kings from every kingdom in Canaan.
  '12':
  - type: text
    content: He gave their land to Israel as an inheritance for his people.
  '13':
  - type: text
    content: 'O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', your name endures forever!'
  - type: text
    content: Your fame is known in every generation.
  '14':
  - type: text
    content: For you will vindicate your persecuted people,
  - type: text
    content: showing your tender love to all your servants.
  '15':
  - type: text
    content: The unbelieving nations worship what they make.
  - type: text
    content: They worship their wealth and their work.
  - type: text
    content: They idolize what they own and what they do.
  '16':
  - type: text
    content: Their possessions will never satisfy.
  - type: text
    content: Their lifeless and futile works cannot bring life to them!
  - type: text
    content: Their things can’t talk to them or answer their prayers.
  - type: text
    content: Blind men can only create blind things.
  - type: text
    content: Those deaf to God can only make a deaf image.
  - type: note
    content: Referring to the idols, the Hebrew could be translated “with mouths, but they cannot speak; with eyes, but they cannot see; with ears, but they cannot hear.”
  - type: text
    content: Dead men can only create dead idols.
  - type: text
    content: And everyone who trusts in these powerless, dead things
  - type: text
    content: will be just like what they worship—powerless and dead!
  '19':
  - type: text
    content: 'Praise Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', all the families of Israel!'
  - type: text
    content: 'Praise Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you family of Aaron!'
  - type: note
    content: The name Aaron means “light-bringer” or “light-bearer.”
  '2':
  - type: text
    content: All you worshiping priests on duty in the temple,
  '20':
  - type: text
    content: 'Let all the priests '
  - type: note
    content: Or “all the family of Levi.” Levi represents the holy priesthood.
  - type: text
    content: 'bless Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: Let all his lovers who bow low before him
  - type: note
    content: Or “those who fear him.”
  - type: text
    content: 'praise the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'So bless the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' who lives in Jerusalem'
  - type: text
    content: and dwells in Zion’s glory!
  - type: text
    content: Hallelujah and praise the Lord!
  '3':
  - type: text
    content: praise him, for he is beautiful!
  - type: text
    content: Sing loving praises to his lovely name.
  '4':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has chosen Jacob for his own purpose,'
  - type: text
    content: and Israel is his special treasure.
  '5':
  - type: text
    content: Next to every other god, the greatness of our God is unequaled.
  - type: text
    content: For our God is incomparable!
  '6':
  - type: text
    content: He does what he pleases with unlimited power and authority,
  - type: text
    content: extending his greatness throughout the entire universe!
  '7':
  - type: text
    content: He forms the misty clouds and creates thunder and lightning,
  - type: text
    content: bringing the wind and rain out of his heavenly storehouse.
  '8':
  - type: text
    content: He struck down the eldest child in each Egyptian home;
  - type: text
    content: both man and beast perished that night.
  '9':
  - type: text
    content: He did great miracles—mighty signs and wonders throughout the land
  - type: text
    content: before Pharaoh and all his subjects.
