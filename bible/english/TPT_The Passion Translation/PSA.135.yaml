document_id: PSA.135,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: His Wonderful Works
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Shout hallelujah and praise the greatness of God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All his righteous ones, praise him!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He conquered many nations and killed their mighty kings,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: like Sihon, king of the Amorites, and Og, king of Bashan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and kings from every kingdom in Canaan.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He gave their land to Israel as an inheritance for his people.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'O  '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your name endures forever!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your fame is known in every generation.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For you will vindicate your persecuted people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: showing your tender love to all your servants.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The unbelieving nations worship what they make.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They worship their wealth and their work.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They idolize what they own and what they do.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 16-18
    - type: text
      text: Their possessions will never satisfy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their lifeless and futile works cannot bring life to them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their things can’t talk to them or answer their prayers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blind men can only create blind things.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those deaf to God can only make a deaf image.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 135:16–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Referring to the idols, the Hebrew could be translated “with mouths, but they cannot speak; with eyes, but they cannot see; with ears, but they cannot hear.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dead men can only create dead idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And everyone who trusts in these powerless, dead things
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be just like what they worship—powerless and dead!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Praise Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', all the families of Israel!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you family of Aaron!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 135:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Aaron means “light-bringer” or “light-bearer.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: All you worshiping priests on duty in the temple,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Let all the priests '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 135:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “all the family of Levi.” Levi represents the holy priesthood.
      marker-yv: yv-n
    - type: text
      text: 'bless Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all his lovers who bow low before him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 135:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those who fear him.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'praise the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'So bless the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' who lives in Jerusalem'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and dwells in Zion’s glory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hallelujah and praise the Lord!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: praise him, for he is beautiful!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing loving praises to his lovely name.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has chosen Jacob for his own purpose,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Israel is his special treasure.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Next to every other god, the greatness of our God is unequaled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For our God is incomparable!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: He does what he pleases with unlimited power and authority,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: extending his greatness throughout the entire universe!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He forms the misty clouds and creates thunder and lightning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bringing the wind and rain out of his heavenly storehouse.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He struck down the eldest child in each Egyptian home;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both man and beast perished that night.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He did great miracles—mighty signs and wonders throughout the land
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before Pharaoh and all his subjects.
