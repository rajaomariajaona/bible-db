  '1':
  - type: heading
    content: Amos’ Song of Mourning over Israel
  - type: text
    content: Listen to this funeral song
  - type: text
    content: 'that I sing over you, people of Israel:'
  '10':
  - type: text
    content: 'They '
  - type: note
    content: Although the text is ambiguous, “They” may refer to corrupt judges/attorneys.
  - type: text
    content: hate the one who challenges injustice
  - type: text
    content: and despise the one who declares the whole truth in court.
  - type: note
    content: Or “at the city gate,” the place where civic court was held and decisions were rendered.
  '11':
  - type: text
    content: For I know how outrageous are your many sins
  - type: text
    content: and how many crimes you have committed.
  - type: text
    content: You persecute the righteous,
  - type: text
    content: 'trample '
  - type: note
    content: Or “strike with the fist.”
  - type: text
    content: 'on '
  - type: text
    content: the rights of
  - type: text
    content: ' the poor,'
  - type: text
    content: and seize their grain through extortion.
  - type: note
    content: That is, taxation.
  - type: text
    content: By taking bribes, you prevent them
  - type: text
    content: from getting justice in the courts.
  - type: note
    content: Or “in the [city] gates.”
  - type: text
    content: This is why you will not live
  - type: text
    content: in the fine stone houses you build
  - type: text
    content: or enjoy the fruits of your luxury
  - type: text
    content: .
  - type: text
    content: You will not drink wine
  - type: text
    content: from the lush vineyards you plant,
  - type: text
    content: for your judgment is imminent
  - type: text
    content: .
  '13':
  - type: text
    content: Yes, the smartest thing for the prudent
  - type: text
    content: is to remain silent in such an evil time as this.
  - type: note
    content: The implication is that those who understand God’s ways will not criticize God’s actions when he rises to judge wickedness.
  - type: heading
    content: Amos’ Exhortation
  '14':
  - type: text
    content: Devote yourself to what is good, not evil,
  - type: text
    content: so that you may live.
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Angel Armies,'
  - type: text
    content: will really be with you,
  - type: text
    content: just as you claim he is.
  '15':
  - type: text
    content: Hate what is evil, love what is right,
  - type: text
    content: and let justice prevail in the courts.
  - type: text
    content: 'It may be that '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Angel Armies,'
  - type: text
    content: will show mercy to the remnant of Israel.
  - type: note
    content: Or “Joseph.”
  - type: heading
    content: Israel’s Impending Punishment
  '16':
  - type: text
    content: Because of Israel’s sins
  - type: text
    content: ','
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Angel Armies, says this:'
  - type: text
    content: “Wailing and sorrow everywhere!
  - type: note
    content: Or “in every public square.”
  - type: text
    content: In every street they will mourn the dead.
  - type: note
    content: Or “they will say, ‘Ah! Ah!’ ” This is the Hebrew word ho, which is a variant form of hoy, a word used to express sorrow and mourning for the dead. See 1 Kings 13:30; Jer. 22:18; 34:5.
  - type: text
    content: Those who work in the fields will be expected to mourn
  - type: text
    content: along with the professional mourners.
  '17':
  - type: text
    content: There will be wailing in all the vineyards,
  - type: text
    content: 'for I will pass through your midst '
  - type: text
    content: to punish you
  - type: text
    content: ',”'
  - type: note
    content: As God did to the Egyptians (see Ex. 12:12) in passing through their midst, so he will do to his rebellious people.
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: False Sense of Security
  '18':
  - type: text
    content: 'Woe to you who long for the day of '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: 'Why do you long for the day of '
  - type: text
    content: Yahweh
  - type: text
    content: '?'
  - type: text
    content: Its arrival will mean darkness, not light.
  '19':
  - type: text
    content: You will be seized like someone who runs from a lion
  - type: text
    content: and a bear charges at him.
  - type: text
    content: Then he hides indoors and leans his hand against the wall
  - type: text
    content: only to have a venomous snake bite him.
  '2':
  - type: text
    content: '“Virgin Israel '
  - type: note
    content: Israel is poetically portrayed as a virgin maiden who was carried off in death in her youth before she could marry and have a family.
  - type: text
    content: has fallen, never to rise again.
  - type: text
    content: There she lies, abandoned on her own soil,
  - type: text
    content: with no one to lift her up.”
  '20':
  - type: text
    content: 'Will not the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' bring darkness, not light—'
  - type: text
    content: a day of gloom without a ray of light?
  - type: heading
    content: Yahweh’s Rebuke of Religious Formalism
  '21':
  - type: text
    content: “I hate your religious festivals;
  - type: note
    content: The truth of this verse is repeated frequently by the prophets. Part of the role of prophetic ministry is to call the church away from dead formalism into a loving, obedient relationship with God. See 1 Sam. 15:22; Pss. 40:6–8; 50:5–15; 51:16–17; Isa. 1:10–16; 29:13–14; 58:1–8; Jer. 6:20; Hos. 6:6; Joel 2:13; Mic. 6:5–8; Zech. 7:4–6.
  - type: text
    content: I absolutely despise them!
  - type: text
    content: Your pious gatherings make me sick!
  - type: note
    content: Or “I cannot smell your solemn assemblies.” The implication is that God cannot tolerate pretentiousness and longs for us to meet with him heart-to-heart.
  '22':
  - type: text
    content: Even though you offer me
  - type: text
    content: your burnt offerings and grain offerings,
  - type: text
    content: I will not accept them.
  - type: note
    content: Or “I take no pleasure in them.”
  - type: text
    content: And though you bring me choice peace offerings of fattened animals,
  - type: text
    content: I won’t even look at them.
  '23':
  - type: text
    content: 'Spare me '
  - type: note
    content: Or “Away with.”
  - type: text
    content: 'the monotonous melodies '
  - type: note
    content: Or “noise.” God finds the whole worship presentation intolerable.
  - type: text
    content: of your ‘worship.’
  - type: text
    content: 'I don’t want to hear your strumming guitars '
  - type: note
    content: Or “music of your harps [stringed instruments].”
  - type: text
    content: anymore.
  - type: text
    content: It’s just noise to me.
  '24':
  - type: text
    content: However
  - type: text
    content: ', '
  - type: text
    content: I delight in
  - type: text
    content: a land where justice flows like a river
  - type: text
    content: and where true righteousness rolls like a steady flowing stream.
  '25':
  - type: text
    content: Listen, people of Israel!
  - type: text
    content: Didn’t you worship me with your offerings and sacrifices
  - type: text
    content: during those forty years in the wilderness?
  '26':
  - type: text
    content: 'Now you carry around '
  - type: note
    content: Or “you used to carry around.” There is some ambiguity here as to whether these idolatrous practices occurred in Israel’s more distant past or closer to the time of Amos (mid-700s BC) or perhaps both.
  - type: text
    content: the pagan idols
  - type: text
    content: that you made to worship your phony king, Sakkuth,
  - type: note
    content: 'An alternative reading here results from translating the Hebrew term sikkut as “shrine”: “You have lifted up the shrine of your pagan king.”'
  - type: text
    content: and your very own star-god, Kaiwan.
  - type: note
    content: 'Sakkuth and Kaiwan are most likely Babylonian or Assyrian gods. Kaiwan (or Chiun) was another name for the Roman god Saturn. When God’s people wander away from him, they quickly turn to false gods and vain idols (see 2 Kings 17:29–31; Jer. 2:13 and the footnotes). Additionally, there is a possible alternative reading, based on the translation of the Hebrew term kiyyun as “pedestal”: “. . . and the pedestal of your idols—your star-god.”'
  '27':
  - type: text
    content: Therefore, you can carry them all the way beyond Damascus,
  - type: note
    content: That is, to Assyria.
  - type: text
    content: where I am about to drive you into captivity,”
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: God of Angel Armies is his name!
  '3':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this:'
  - type: text
    content: “The city that deployed a thousand soldiers
  - type: text
    content: will only have a hundred come back,
  - type: text
    content: and the city that deployed a hundred soldiers
  - type: text
    content: 'will only have ten '
  - type: text
    content: survivors
  - type: text
    content: .”
  - type: note
    content: Or “the house of Israel.” This phrase is in v. 4 as well.
  - type: heading
    content: No Salvation without Repentance
  '4':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this to the people of Israel:'
  - type: text
    content: “
  - type: text
    content: Come
  - type: text
    content: ', seek me, and you will live.'
  '5':
  - type: text
    content: But don’t go down to seek me at Beersheba.
  - type: text
    content: Don’t try to find me at Bethel’s shrines
  - type: text
    content: or at the altars at Gilgal.
  - type: text
    content: For Gilgal will be taken into exile,
  - type: note
    content: The Hebrew text (haggilgal galoh yigleh) employs a repeating sequence of gl four times, and each word begins or ends with h. Gilgal can be viewed as a poetic metaphor for the conquest of Israel under Joshua.
  - type: text
    content: and Bethel will be brought to nothing.”
  '6':
  - type: text
    content: 'Come back to '
  - type: text
    content: Yahweh
  - type: text
    content: ' and live,'
  - type: text
    content: or he will sweep down like fire upon the people of Israel.
  - type: note
    content: Or “the house of Joseph.” See v. 15 and footnote. Ephraim and Manasseh were the sons of Joseph and the two main tribes of the Northern Kingdom.
  - type: text
    content: The fire will burn at Bethel
  - type: text
    content: with no one there to put out the flames.
  '7':
  - type: text
    content: 'They turn justice into a bitter '
  - type: text
    content: pill to swallow
  - type: note
    content: Or “They [Israelites] turn justice into wormwood [bitterness].” Instead of “turning” to God, they turned justice into something bitter.
  - type: text
    content: and trample righteousness into the mud.
  - type: heading
    content: Creator and Destroyer
  '8':
  - type: text
    content: Creator of Constellations—Maker of the Pleiades and Orion,
  - type: note
    content: See Gen. 1:14–15; Job 9:9; 38:31–33; Ps. 19:1. It is important to remember that God is the Creator of the stars and the one who set the constellations in the heavens. According to Josephus, the constellations were designated by Adam, Seth, and Enoch (see Ant. 1.2.12–13). God has set his glory in the heavens, which would include the zodiac. Although the modern meaning of the twelve signs of the zodiac (astrology) has no significance for today’s believer (see Deut. 18:10), the word for “zodiac” (Hb. mazzarot), found in Job 38:32, makes it clear that God is the one who controls the movement of the stars.
  - type: text
    content: you turn the deepest darkness into dawn
  - type: text
    content: and daylight into the darkest night.
  - type: text
    content: 'You draw up '
  - type: note
    content: Or “summon” or “gather.”
  - type: text
    content: 'drops of water '
  - type: text
    content: distilled
  - type: text
    content: ' from the sea'
  - type: text
    content: to drench the earth with pouring rain.
  - type: text
    content: Yahweh
  - type: text
    content: ' is your name.'
  '9':
  - type: text
    content: You destroy the mighty with a blinding flash
  - type: text
    content: and overwhelm their strongholds with certain destruction.
  - type: note
    content: See Mic. 5:11. The precise meaning of the Hebrew text of v. 9 is uncertain.
