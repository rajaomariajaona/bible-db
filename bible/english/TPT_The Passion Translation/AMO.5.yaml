verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amos’ Song of Mourning over Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Listen to this funeral song
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that I sing over you, people of Israel:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the text is ambiguous, “They” may refer to corrupt judges/attorneys.
      marker-yv: yv-n
    - type: text
      text: hate the one who challenges injustice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and despise the one who declares the whole truth in court.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “at the city gate,” the place where civic court was held and decisions were rendered.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 11-12
    - type: text
      text: For I know how outrageous are your many sins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and how many crimes you have committed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You persecute the righteous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'trample '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “strike with the fist.”
      marker-yv: yv-n
    - type: text
      text: 'on '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the rights of
    - type: text
      text: ' the poor,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and seize their grain through extortion.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, taxation.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By taking bribes, you prevent them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from getting justice in the courts.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the [city] gates.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is why you will not live
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the fine stone houses you build
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: or enjoy the fruits of your luxury
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will not drink wine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the lush vineyards you plant,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: for your judgment is imminent
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Yes, the smartest thing for the prudent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is to remain silent in such an evil time as this.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication is that those who understand God’s ways will not criticize God’s actions when he rises to judge wickedness.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amos’ Exhortation
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Devote yourself to what is good, not evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that you may live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will really be with you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just as you claim he is.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hate what is evil, love what is right,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and let justice prevail in the courts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It may be that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will show mercy to the remnant of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Joseph.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Impending Punishment
    marker-yv: yv-h
