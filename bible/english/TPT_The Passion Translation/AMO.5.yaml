    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Virgin Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Israel is poetically portrayed as a virgin maiden who was carried off in death in her youth before she could marry and have a family.
      marker-yv: yv-n
    - type: text
      text: has fallen, never to rise again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There she lies, abandoned on her own soil,
  - type: usfm
    marker: q1
    children:
    - type: text
