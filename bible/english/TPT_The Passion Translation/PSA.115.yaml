document_id: PSA.115,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Only True Hero
  - type: text
    content: God, glorify your name!
  - type: text
    content: Yes, your name alone be glorified, not ours.
  - type: text
    content: For you are the one who loves us passionately,
  - type: text
    content: and you are faithful and true.
  '10':
  - type: text
    content: You, his priests, trust in the Lord.
  - type: text
    content: For he is the only true hero,
  - type: text
    content: God-wrapped-around-us as our shield.
  '11':
  - type: text
    content: Yes, all his lovers who bow before him, trust in the Lord.
  - type: text
    content: For he is our only true hero,
  - type: text
    content: God-wrapped-around-us as our shield.
  '12':
  - type: text
    content: The Lord will never forget us in our need; he will bless us indeed!
  - type: text
    content: He will bless the house of Israel;
  - type: text
    content: he will bless the house of Aaron, his priest.
  '13':
  - type: text
    content: Yes! He will bless his devoted lovers who bow before him,
  - type: text
    content: no matter who they are.
  '14':
  - type: text
    content: God himself will fill you with more.
  - type: text
    content: Blessings upon blessings will be heaped upon you
  - type: text
    content: and upon your children from the maker of heaven and earth,
  - type: text
    content: the very God who made you!
  '16':
  - type: text
    content: The heavens belong to our God; they are his alone,
  - type: text
    content: 'but he has given us '
  - type: note
    content: Or “Adam’s sons.”
  - type: text
    content: the earth and put us in charge.
  '17':
  - type: text
    content: Dead people cannot praise the Lord, but we can!
  - type: text
    content: Those who sink to the silence of the grave
  - type: text
    content: can no longer give glory to God, but we can!
  - type: text
    content: So let’s praise the Lord and let it go on forever.
  - type: text
    content: Hallelujah, and praise the Lord!
  '2':
  - type: text
    content: Why should the unbelievers mock us, saying,
  - type: text
    content: “Where is this God of yours?”
  '3':
  - type: text
    content: But we know our God rules from the heavens,
  - type: text
    content: and he takes delight in all that he does.
  '4':
  - type: text
    content: The unbelievers worship what they make—
  - type: text
    content: their wealth and their work.
  '5':
  - type: text
    content: They idolize what they own
  - type: text
    content: and what they make with their hands,
  - type: text
    content: but their things can’t talk to them or answer their prayers.
  - type: text
    content: Their possessions will never satisfy.
  - type: text
    content: Their futile faith in dead idols and dead works
  - type: text
    content: can never bring life or meaning to their souls.
  - type: text
    content: Blind men can only create blind things.
  - type: text
    content: Those deaf to God can only make a deaf image.
  - type: note
    content: Referring to the idols, the literal Hebrew could be translated “With mouths, but they cannot speak; with eyes, but they cannot see; with ears, but they cannot hear; with noses, but they cannot smell; with hands, but they cannot feel; with feet, but they cannot walk. Those who make them will become like them and everyone who trusts in them.”
  - type: text
    content: Dead men can only create dead idols.
  - type: text
    content: And everyone who trusts in these powerless, dead things
  - type: text
    content: will be just like what they worship—powerless and dead.
  '9':
  - type: text
    content: So trust in the Lord, all his people.
  - type: text
    content: For he is the only true hero,
  - type: text
    content: the wraparound God who is our shield!
