document_id: PSA.115
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Only True Hero
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God, glorify your name!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, your name alone be glorified, not ours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you are the one who loves us passionately,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you are faithful and true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Why should the unbelievers mock us, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Where is this God of yours?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But we know our God rules from the heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he takes delight in all that he does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The unbelievers worship what they make—
- type: usfm
  marker: q1
  children:
  - type: text
    text: their wealth and their work.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-8
  - type: text
    text: They idolize what they own
- type: usfm
  marker: q1
  children:
  - type: text
    text: and what they make with their hands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but their things can’t talk to them or answer their prayers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their possessions will never satisfy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their futile faith in dead idols and dead works
- type: usfm
  marker: q1
  children:
  - type: text
    text: can never bring life or meaning to their souls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blind men can only create blind things.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those deaf to God can only make a deaf image.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 115:5–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Referring to the idols, the literal Hebrew could be translated “With mouths, but they cannot speak; with eyes, but they cannot see; with ears, but they cannot hear; with noses, but they cannot smell; with hands, but they cannot feel; with feet, but they cannot walk. Those who make them will become like them and everyone who trusts in them.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dead men can only create dead idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And everyone who trusts in these powerless, dead things
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be just like what they worship—powerless and dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So trust in the Lord, all his people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he is the only true hero,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the wraparound God who is our shield!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You, his priests, trust in the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he is the only true hero,
- type: usfm
  marker: q1
  children:
  - type: text
    text: God-wrapped-around-us as our shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Yes, all his lovers who bow before him, trust in the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he is our only true hero,
- type: usfm
  marker: q1
  children:
  - type: text
    text: God-wrapped-around-us as our shield.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The Lord will never forget us in our need; he will bless us indeed!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will bless the house of Israel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will bless the house of Aaron, his priest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yes! He will bless his devoted lovers who bow before him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter who they are.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 14-15
  - type: text
    text: God himself will fill you with more.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blessings upon blessings will be heaped upon you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and upon your children from the maker of heaven and earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the very God who made you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The heavens belong to our God; they are his alone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but he has given us '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 115:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Adam’s sons.”
    marker-yv: yv-n
  - type: text
    text: the earth and put us in charge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: Dead people cannot praise the Lord, but we can!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who sink to the silence of the grave
- type: usfm
  marker: q1
  children:
  - type: text
    text: can no longer give glory to God, but we can!
- type: usfm
  marker: q1
  children:
  - type: text
    text: So let’s praise the Lord and let it go on forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah, and praise the Lord!
