document_id: DAN.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Man in White Linen Appears to Daniel
  - type: text
    content: ' '
  - type: note
    content: Chapters 10–12 may be considered the final vision of Daniel and the fascinating conclusion to his book. These chapters should be viewed as a unit. Chapter 10 gives us Daniel’s trance-like vision; chs. 11–12 give us heaven’s interpretation of his vision of the future. It is best to read these three chapters (seventy-nine verses) in one sitting, many times over, just to begin to understand the depth of the vision and its interpretation.
  - type: text
    content: 'In the third year of Cyrus king of Persia, '
  - type: text
    content: I
  - type: text
    content: ', Daniel, known as Belteshazzar, received a profound word—a true revelation, '
  - type: note
    content: Or “received a word, and the word was sealed.”
  - type: text
    content: 'but I struggled to understand it. '
  - type: note
    content: The Hebrew is obscure and uncertain. It is literally “a true revelation—and a great army [host]” or possibly “a true revelation—a great service [hardship].” The two Hebrew words, wesabaʾ gadol, are unclear. Some have taken them as a description of the war waged by the angels in vv. 13–21. The words have been interpreted as a “great war” or “conflict.” However, it is more plausible that the two words refer to the struggle Daniel experienced in understanding the meaning of the message.
  - type: text
    content: Finally, its interpretation was disclosed to me in a vision, and I began to understand the word.
  - type: note
    content: Or literally “and understanding was to him in the revelation.”
  '10':
  - type: text
    content: 'Then I felt a '
  - type: text
    content: powerful
  - type: text
    content: ' hand grip me and help me to my hands and knees. I was trembling '
  - type: text
    content: with fear
  - type: text
    content: '!'
  '11':
  - type: text
    content: 'He said, “Daniel, you are greatly loved and a precious treasure to God. '
  - type: note
    content: Or literally “a man of preciousness.” See 9:23.
  - type: text
    content: Now, stand up and understand the words that I am about to say, for God has sent me to you.”
  - type: text
    content: 'So, I rose to my feet, still shaking '
  - type: text
    content: like a leaf
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'He '
  - type: text
    content: reassured
  - type: text
    content: ' me by saying, “Daniel, don’t be afraid, for I have come to bring to you the answer to your prayer. '
  - type: note
    content: Or “I have come because of your words.”
  - type: text
    content: 'From the first day you sought to understand the revelation and humbled yourself '
  - type: note
    content: Or “afflicted yourself,” a reference to his fasting (see v. 3).
  - type: text
    content: 'before God, your words were heard '
  - type: text
    content: in heaven
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'However, for the past twenty-one days, the principality over the kingdom of Persia stood to oppose and resist me. '
  - type: note
    content: One of the reasons for a delayed response to our prayers can be demonic interference in obtaining the answer. This is why we should never stop praying or lose hope (see Luke 18:1).
  - type: text
    content: 'Then Michael, '
  - type: note
    content: Michael the archangel is recognized in both Judaism and Christianity as the prince of the heavenly host who has the special charge of watching God’s people. In the New Testament he is mentioned twice, as a leader of the armies of heaven (see Rev. 12:1–7) and as the one who disputed with the devil over the body of Moses (see Judah [Jude] 9), which could be a metaphor for the people of Moses (the Jews), much like believers today are the body of Christ.
  - type: text
    content: 'one of the chief princes '
  - type: note
    content: That is, one of the archangels.
  - type: text
    content: of heaven
  - type: text
    content: ', came to my assistance. I was left there, '
  - type: note
    content: As translated from the Septuagint and Theodotion’s translation, which has amended the Hebrew, which reads, “and I was left.” The meaning is uncertain.
  - type: text
    content: 'confronting the king of Persia. '
  '14':
  - type: text
    content: Now I have come to help you comprehend what will happen to your people in the final days, for the vision pertains to a time still to come.”
  - type: note
    content: Or “for it is a new vision about those days.” See Hab. 2:3.
  '15':
  - type: text
    content: 'Upon hearing these words, I bowed facedown and was left speechless. '
  '16':
  - type: text
    content: 'Then suddenly, one who looked like a man '
  - type: note
    content: We are not sure if this is the same angel (man robed in white linen) or perhaps another heavenly being. At least one Hebrew manuscript, the Septuagint, and the Dead Sea Scrolls read “something that looked like a man’s hand.”
  - type: text
    content: 'touched my lips, '
  - type: note
    content: See Isa. 6:7; Jer. 1:9.
  - type: text
    content: 'and I was finally able to speak. So, I said to the one standing in front of me, “My lord, this vision has left me overcome, undone, and overwhelmed. '
  - type: note
    content: Or literally “my pangs [as those of a woman in childbirth] have overpowered me.”
  - type: text
    content: 'I feel totally weak and helpless. '
  '17':
  - type: text
    content: My lord, how can I, your servant, even talk to you? I have no strength, and I can barely catch my breath!”
  - type: note
    content: Or as an idiom “I am as good as dead.” The Hebrew word nephesh can be translated “breath,” “life,” or “soul.”
  '18':
  - type: text
    content: 'Once again, the one who looked like a man gripped me and imparted strength to me. '
  '19':
  - type: text
    content: 'He said to me, “Be strong! Be very, very strong! Do not be afraid, for you are greatly loved and a precious treasure to God. '
  - type: text
    content: God’s
  - type: text
    content: ' peace is yours.” As he spoke those words, I felt strength pour into me, and I said, “Now, I’m ready to listen to you, my lord, for you have given me strength.”'
  '2':
  - type: text
    content: 'At that time, '
  - type: note
    content: Jewish scholars believe this was during the time when Samaritans were trying to halt the rebuilding of the temple (see Ezra 4:4–5) or that Daniel was in mourning over the delay of the Jews remaining in their captivity.
  - type: text
    content: 'I was in a period of mourning '
  - type: note
    content: Mourning rituals were practiced by the Jews, not only at the death of a relative, but also during times of national crisis. The purpose was to demonstrate the severity of a national crisis, the need for repentance over the nation’s sins (see Dan. 9:3), and spiritual preparation to receive guidance and revelation from God (see Ex. 34:28).
  - type: text
    content: 'for three weeks. '
  - type: note
    content: Or literally “three weeks of days.”
  '20':
  - type: text
    content: 'He then said, “Don’t you know why I have come to you? '
  '21':
  - type: text
    content: 'I will unveil to you what is written in the Book of Truth: '
  - type: note
    content: It is staggering to know that one of the books in heaven is a “Book [writing] of Truth.” The angel who appeared to Daniel could read that book and its specific details about the coming kings and rulers and their descendants hundreds, and even thousands, of years before events would even happen! According to an ancient Jewish tradition, God wrote in advance about the destiny of individuals and of nations. With stunning accuracy Gabriel tells Daniel in 533 BC of “three more kings” who would reign over Persia during the next one hundred years and that a fourth is coming who will exceed them all. Truly, God is all-knowing, he is sovereign, and he does what he pleases with the earth and everyone who has ever lived. See Pss. 115:3; 139:1–18; Dan. 4:35; 9:2; Col. 1:16; Rev. 4:11.
  - type: text
    content: but first, I want you to know that
  - type: text
    content: ' there is none who fights alongside me against these '
  - type: text
    content: forces of darkness
  - type: text
    content: ' except Michael, your '
  - type: text
    content: people’s
  - type: text
    content: ' '
  - type: note
    content: The Hebrew pronoun is plural, thus “your people’s prince.”
  - type: text
    content: 'prince. '
  - type: text
    content: '11:1 '
  - type: text
    content: 'In the first year that Darius the Mede was king, I stood up to support '
  - type: text
    content: Michael
  - type: text
    content: ' and fought with him against the prince of Persia. '
  - type: note
    content: This is one of the most difficult and confusing chapter divisions in all the Bible. In this translation, 11:1 is placed here at the end of ch. 10 for clarity of the English narrative. Every scholar and translator consulted recognizes the difficulties of where this verse belongs. Some consider it an addition to the text and place it in brackets or a footnote.
  - type: text
    content: '10:20b '
  - type: text
    content: 'Now, I am about to go back and fight the principality with him. Once we have defeated him, the principality over Greece '
  - type: note
    content: Or “the prince of Javan,” another term for Greece.
  - type: text
    content: will come next.”
  '3':
  - type: text
    content: 'During the entire three weeks, I ate no delicacies '
  - type: note
    content: Or literally “bread of delightfulness.”
  - type: text
    content: '—no meat and no sweets. I drank no wine, nor did I groom myself. '
  '4':
  - type: text
    content: 'On the twenty-fourth day of the first month, '
  - type: text
    content: I had a vision
  - type: text
    content: ' while I was standing on the bank of the great Tigris River. '
  '5':
  - type: text
    content: 'I opened my eyes to look about me, and I saw a man approaching '
  - type: note
    content: This “man” was hovering or flying above the Tigris River (see 12:6). Ezekiel saw Yahweh in his chariot-throne at the Kebar River; Daniel saw the true High Priest in his sacred garments (see Ex. 28:39–43) over the waters of the Tigris. The disciples saw Jesus walking (hovering) over the waters of Galilee.
  - type: text
    content: 'who was robed in '
  - type: text
    content: white
  - type: text
    content: ' linen '
  - type: note
    content: Linen was the prescribed garment of priests (see Lev. 6:10; Ezek. 9:2).
  - type: text
    content: 'and wearing a belt of pure '
  - type: note
    content: The Hebrew word is uncertain. Some translations have “gold from Uphaz.” Some scholars suggest that Uphaz could be a scribal error, misspelling the Hebrew word for “refine,” which is muphaz. See 1 Kings 10:18; Song. 5:11.
  - type: text
    content: 'gold. '
  '6':
  - type: text
    content: 'His body was like a glowing gemstone, '
  - type: note
    content: Or “beryl” or “topaz” or “turquoise.” See Ex. 28:20; Rev. 21:20.
  - type: text
    content: his face shining as bright as lightning. His eyes were blazing like fiery torches; his arms and legs were gleaming like polished bronze; and the sound of his voice was thunderous, like the roar of a multitude.
  - type: note
    content: In comparing vv. 5–6 with Rev. 1:12–16, the one robed in white linen who appeared to Daniel could be the same person who appeared to John—the Lord Jesus (the angel of Yahweh). However, there are differences between Daniel’s vision and John’s. Jesus’ robe went to his feet, but the man in linen had his arms, legs, and torso visible; he also had a belt of gold, but Jesus wore a “sash” of gold over his chest. For this reason, many believe that it was Gabriel or an unnamed angel that appeared to Daniel.
  '7':
  - type: text
    content: 'Although others were present, I was the only one who experienced this open vision. Yet, '
  - type: text
    content: it was so real
  - type: text
    content: ' that it terrified '
  - type: note
    content: Or “a great trembling fell upon them.”
  - type: text
    content: 'those who were with me, and they ran away to hide. '
  - type: note
    content: Compare Acts 9:5–7.
  '8':
  - type: text
    content: 'I found myself alone, gazing on this '
  - type: text
    content: astounding
  - type: text
    content: ' vision; I was left stunned and powerless. '
  - type: note
    content: Or “I had nothing left in me.”
  - type: text
    content: 'My appearance was altered beyond recognition, '
  - type: note
    content: Or literally “my splendor was changed to ruin [disfigured].” Some translate this as “my face turned as pale as death.” Indeed, the Hebrew expression implies the idea of passing from life to death. It was as though Daniel slipped into a coma. The Hebrew here is identical to that used for Adam going into a deep sleep for Eve to be formed. What profound effect this encounter with the man in white linen had upon him!
  - type: text
    content: and what little strength I had deserted me.
  - type: heading
    content: Daniel’s Dialogue with an Angel
  '9':
  - type: text
    content: 'As soon as the angel began to speak to me, I fell unconscious with my face to the ground, as in a coma. '
