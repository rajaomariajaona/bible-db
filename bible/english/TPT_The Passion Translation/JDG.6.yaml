document_id: JDG.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Midianite Oppression
  - type: text
    content: 'Once again the Israelites did evil in the sight of '
  - type: text
    content: Yahweh
  - type: text
    content: ', so '
  - type: text
    content: Yahweh
  - type: text
    content: ' handed them over to the Midianites '
  - type: note
    content: The nomadic Midianites were descendants of Abraham’s concubine, Keturah (see Gen. 25:1). Midian means “strife” or “contending.” Moses married the daughter of Jethro, a Midianite (see Ex. 2:15–21; 18:1–27). The Midianites lived in Arabia and eventually were incorporated into the Arabian tribes. Symbolically, Midian is an illustration of compromise with the world and the strife that results (see James 4:4; 1 John 2:15–17). Midian and Moab had attempted to persuade Balaam to curse Israel (see Num. 22:4; Rev. 2:14), and it was the Midianite and Moabite women who seduced Israel (see Num. 25:1–18; 31:15–16).
  - type: text
    content: 'for seven years. '
  '10':
  - type: text
    content: 'I told you that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God, and that you must not worship the '
  - type: text
    content: 'false'
  - type: text
    content: ' gods of the Amorites, in whose land you dwell. But you did not listen to my voice.’ ”'
  - type: heading
    content: Gideon, the Champion-Deliverer
  '11':
  - type: text
    content: 'The Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' came to the village of Ophrah '
  - type: note
    content: Ophrah means “dusty.” It was a city of Manasseh.
  - type: text
    content: 'and sat down under the oak tree '
  - type: note
    content: Apparently, the Angel of Yahweh was invisible to Gideon. He may have been sitting there watching Gideon for some time before he revealed himself.
  - type: text
    content: 'that belonged to Joash, '
  - type: note
    content: Joash means “Yahweh is strong.” It is a shortened version of Jehoash.
  - type: text
    content: 'a man of the clan of Abiezer. '
  - type: note
    content: Abiezer means “my father of help.”
  - type: text
    content: 'His son Gideon '
  - type: note
    content: Gideon means “warrior,” “one who cuts down [trees],” “to cut in two,” or “destroyer.” God embedded his destiny as a champion-deliverer within his name. He is named in Heb. 11, the faith chapter (see Heb. 11:32), and also referred to in Isa. 9:3–4. A variant form of his name is used repeatedly for cutting down idols (see Deut. 7:5; 2 Chron. 14:3; 31:1; 34:4, 7; Ezek. 6:6).
  - type: text
    content: 'was secretly threshing some wheat in a winepress so that the Midianites would not see him. '
  - type: note
    content: Wheat was not threshed in a winepress but on an open, elevated place where the wind could blow the chaff away. Jewish and Christian traditions hold that Gideon was a timid, somewhat cowardly man who made excuses concerning himself and his family (see v. 15). God was going to do in Gideon what Gideon was doing with wheat—thresh his heart, and remove the chaff of unbelief from his true identity. God called Gideon to be a hero who would deliver Israel. God rescued a nation by first rescuing a man from his unbelief. Many believers today can draw strength and revelation from the wonderful story of Gideon.
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ’s Angel suddenly appeared to Gideon and said, “
  - type: text
    content: Yahweh
  - type: text
    content: ’s presence goes with you, man of fearless courage!”
  - type: note
    content: God prophesied destiny over Gideon. He would become a fearless warrior. God often speaks things that are not visible and brings them into reality (see Rom. 4:17; Heb. 11:1). God called Abraham a father of a multitude before he even had a child. God called Gideon a brave warrior before he even went into battle.
  '13':
  - type: text
    content: “Me?”
  - type: text
    content: ' Gideon replied. “But sir, if '
  - type: text
    content: Yahweh
  - type: text
    content: ' is truly with us, why have all these troubles come to us? Where are all his miracle-wonders that our fathers told us about when they said, ‘Did not '
  - type: text
    content: Yahweh
  - type: text
    content: ' deliver us out of Egypt?’ But now '
  - type: text
    content: Yahweh
  - type: text
    content: ' has abandoned us and put us under the power of the Midianites.”'
  '14':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: The Angel of Yahweh unveiled himself as Yahweh! This divine encounter empowered Gideon to face overwhelming odds and defeat the Midianite armies. He went out in the strength of this encounter, clothed with the power of the Holy Spirit (see v. 34). Gideon found the power that he needed in the commission and authority God imparted to him that day.
  - type: text
    content: 'himself faced Gideon directly and said, “Am I not sending you? '
  - type: text
    content: With my presence you have all you need
  - type: text
    content: '. Go in the strength that you now have '
  - type: note
    content: Perhaps at that moment God infused a surge of his mighty power into Gideon.
  - type: text
    content: and rescue Israel from Midian’s power!”
  '15':
  - type: text
    content: 'Gideon said to him, “But Lord, how could I ever rescue Israel? '
  - type: text
    content: Of all the thousands
  - type: text
    content: ' in Manasseh, my clan is the weakest, and I’m the least qualified in my family.”'
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' replied, “'
  - type: text
    content: My presence and my power
  - type: text
    content: ' will be with you. '
  - type: note
    content: These are the same reassuring words God spoke to Moses when he sent him to deliver the Israelites from Egypt (see Ex. 3:12).
  - type: text
    content: Believe me, Gideon
  - type: text
    content: ', '
  - type: note
    content: 'The Hebrew is emphatic: “I absolutely will be with you.”'
  - type: text
    content: you will crush the Midianites as easily as if they were only one man!”
  '17':
  - type: text
    content: 'Then Gideon said, “If it’s really true '
  - type: text
    content: that you will go with me and
  - type: text
    content: ' that I have found grace before your eyes, then show me a miracle-sign to prove that you are really '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Or “you.”
  - type: text
    content: 'speaking with me. '
  '18':
  - type: text
    content: Don’t leave until I return with my offering to you.”
  - type: text
    content: And he answered, “I’ll wait until you return.”
  '19':
  - type: text
    content: 'So Gideon went and cooked a young goat and many loaves '
  - type: note
    content: Or “with an ephah of flour he made bread.” An ephah was about twenty liters or three-fifths of a bushel. Gideon presented a significant offering, for it was a time of scarcity.
  - type: text
    content: of unleavened bread. He placed the meat in a basket and the broth in a pot and took his offering and presented it to him under the oak tree.
  '2':
  - type: text
    content: 'The crushing power of the Midianites overwhelmed Israel, forcing the Israelites to make hiding places for themselves in caves and mountain strongholds. '
  '20':
  - type: text
    content: 'God’s Angel said to Gideon, “Place the meat and the bread on that rock and pour the broth over them.” And Gideon did so. '
  '21':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: '’s Angel reached out the staff he was holding and touched the meat and the bread. All at once, '
  - type: text
    content: supernatural
  - type: text
    content: ' fire sprang up from the rock and burned up the meat and the bread. '
  - type: note
    content: Gideon’s offering prefigures the sacrifice of Christ, whose body was laid upon a rock.
  - type: text
    content: 'Then the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' vanished from his sight.'
  '22':
  - type: text
    content: 'Immediately, Gideon realized that he had seen the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  - type: text
    content: Terror stricken
  - type: text
    content: ', he said, “Oh, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  - type: note
    content: Or “Adonai-Yahweh.”
  - type: text
    content: 'I have seen the Angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' face-to-face!”'
  '23':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to him and said, “Be at peace. Don’t be afraid. You will not die.” '
  '24':
  - type: text
    content: 'So Gideon built an altar to '
  - type: text
    content: Yahweh
  - type: text
    content: ' there and named it “In '
  - type: text
    content: Yahweh
  - type: text
    content: ' there is Peace.” '
  - type: note
    content: Or “Yahweh-Shalom.” See Eph. 2:14.
  - type: text
    content: (The altar is still standing at Ophrah, which belongs to the clan of Abiezer.)
  '25':
  - type: text
    content: 'That night, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke '
  - type: note
    content: God possibly spoke to Gideon in a dream. See Job 33:14–15.
  - type: text
    content: 'to Gideon and said, “Take your father’s bull and the second bull that is seven years old, '
  - type: note
    content: The bull was seven years old, the same age as Israel’s oppression (see v. 1). Some Jewish scholars believe that Gideon’s father had raised the bull to be sacrificed to Baal.
  - type: text
    content: 'and go and demolish your father’s altar to Baal. '
  - type: note
    content: Gideon’s commission began at home. Gideon first tore down the altar to Baal. He broke the stronghold of his family before he could break the stronghold of his nation. The church must first tear down the false altars in our hearts before we can deliver a nation.
  - type: text
    content: 'And cut down the tree of the goddess Asherah, which is beside it. '
  '26':
  - type: text
    content: 'And in their place, on top of the stronghold, '
  - type: note
    content: Some Jewish scholars (Rashi, Kimchi) believe this was the same place (rock) where Gideon placed his offering to Yahweh.
  - type: text
    content: 'build a well-constructed altar to '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God. Use the Asherah tree you have cut down for firewood. Then take the second bull and burn it whole as an offering.” '
  - type: note
    content: See Lev. 4:13–21.
  '27':
  - type: text
    content: 'So Gideon took ten of his servants and did what '
  - type: text
    content: Yahweh
  - type: text
    content: ' had told him. Because he feared both his family and the men of the town he did it at night rather than in the daytime.'
  '28':
  - type: text
    content: 'When the people of the town got up early the next morning, they found the altar to Baal and the symbol of Asherah cut down, and the second bull burned on the new altar that Gideon had built there. '
  '29':
  - type: text
    content: 'They asked each other, “Who did this?” After investigating thoroughly, they concluded that it was the work of Gideon son of Joash. '
  '3':
  - type: text
    content: 'Whenever the Israelites planted any crops, '
  - type: text
    content: and before they could reap the harvest
  - type: text
    content: ', the Midianites would come with the Amalekites and other desert tribes '
  - type: note
    content: Or “sons of the east [desert tribes].”
  - type: text
    content: 'and invade the land. '
  '30':
  - type: text
    content: 'Enraged, they demanded of Joash, “Bring your son out here and we will kill him! '
  - type: note
    content: 'The Hebrew is the jussive form: “and let him die.”'
  - type: text
    content: He tore down the altar to Baal and chopped down the Asherah tree beside it.”
  '31':
  - type: text
    content: 'But Joash said to all those who confronted him, “Does Baal need you to fight his battles? Are you really going to rescue him? I will kill anyone who stands up for Baal before morning. If Baal is a god, let him fight his own battles and defend his own altar!” '
  '32':
  - type: text
    content: 'From then on, Gideon’s nickname was “Jerubbaal,” '
  - type: note
    content: Or “Baal-Fighter.”
  - type: text
    content: that is to say, “Let Baal contend against him,” because he broke down his altar.
  '33':
  - type: text
    content: 'Now all the Midianites, the Amalekites, and the people of the East formed an army. They crossed the Jordan and camped in the Valley of Jezreel '
  - type: text
    content: to fight against Israel
  - type: text
    content: '. '
  '34':
  - type: text
    content: 'Then the Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' clothed himself in Gideon '
  - type: text
    content: and enveloped him
  - type: text
    content: '! '
  - type: note
    content: Gideon became a powerful warrior, for the Holy Spirit wore Gideon like clothing! Compare 1 Chron. 12:17–18.
  - type: text
    content: 'Gideon sounded a blast of the shofar to call the men of the clan of Abiezer to follow him. '
  '35':
  - type: text
    content: He sent messengers throughout the territory of both parts of Manasseh, and throughout the territory of Asher, Zebulun, and Naphtali—to call them to follow Gideon into battle. And they all came to join him.
  - type: heading
    content: Gideon at the Threshing Floor
  '36':
  - type: text
    content: 'Gideon said to God, “If you have really chosen me to rescue Israel, as you said, '
  '37':
  - type: text
    content: then give me proof
  - type: text
    content: '. Here—I am placing a wool fleece on the threshing floor. If in the morning the dew is only on the wool but not on the ground around it, then I will know for sure that I’m the one you have chosen to rescue Israel, as you said.” '
  - type: note
    content: God had “sheared” both Israel and Gideon (Ezek. 44:17–18) on God’s “threshing floor” of chastening. Dew is consistently a biblical symbol of God’s favor and the anointing of the Holy Spirit (see Deut. 33:28; Pss. 110:3; 133:1–3; Prov. 19:12; Hos. 14:5).
  '38':
  - type: text
    content: And that is exactly what happened. When Gideon got up early the next morning, he squeezed the fleece and wrung out enough dew to fill a bowl.
  - type: note
    content: We are common jars (bowls) of clay (see 2 Cor. 4:7). Gideon was a bowl full of God’s favor.
  '39':
  - type: text
    content: 'Then Gideon said to God, “Don’t be angry with me; let me speak just once more. Please let me ask you for one more sign. This time let the fleece be dry, and the ground wet.” '
  '4':
  - type: text
    content: 'They would camp in their fields and destroy their crops as far as Gaza. They would seize all their sheep, cattle, and donkeys. They left nothing for the Israelites to live on. '
  '40':
  - type: text
    content: That night God did what Gideon had asked. The next morning the fleece was dry, but dew covered the ground around it.
  - type: note
    content: Gideon wanted not only the assurance that God’s favor was upon him but also the assurance that God’s favor was on the men (ground) around him as well. God does often give a confirming sign that he is with those he calls. See Ex. 3:12; 4:1–9; 1 Sam. 10:7. The two signs Gideon asked for would demonstrate Yahweh as sovereign over the land instead of Baal, who was believed to be the father of morning rain and dew among the Canaanites (as found in the texts of The Baal Cycle at Ras Shamra). Yahweh showed his power over the things the people believed were under Baal’s control.
  '5':
  - type: text
    content: 'When they invaded the land with their livestock and camels and tents, they were as numerous as locusts, '
  - type: note
    content: The Hebrew word for “locusts” is taken from a root word meaning “to multiply” or “a multitude.”
  - type: text
    content: 'leaving the land desolate. '
  '6':
  - type: text
    content: 'Israel was impoverished and helpless against them. Then the Israelites, '
  - type: text
    content: with shattered hearts
  - type: text
    content: ', cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: for mercy
  - type: text
    content: .
  - type: heading
    content: A Prophet Rebukes Israel
  '7':
  - type: text
    content: 'When the Israelites, '
  - type: text
    content: with shattered hearts
  - type: text
    content: ', cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ' because of the Midianite oppression, '
  '8':
  - type: text
    content: 'he sent them a prophet '
  - type: note
    content: The Hebrew text utilizes an obscure title, literally “a prophet-man.” Although unnamed, Jewish tradition states that the prophet was Phineas son of Eleazar. (See Seder Olam Rabba, ch. 20, p. 53.) God had fulfilled his ancient promises to them, but they had failed to keep their promises to God, so the prophet rebuked Israel.
  - type: text
    content: 'with this message: “Listen to the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel: ‘I delivered you from Egypt and from a life of slavery. '
  - type: note
    content: Or literally “from the slave barracks.”
  '9':
  - type: text
    content: 'I snatched you from the brutality of the Egyptians. I rescued you from the people who invaded this land and fought against you. I drove them out as you advanced, and I gave '
  - type: note
    content: The series of verbs in the Hebrew text more forcefully expresses the action than an English translation can. It is describing energetic acts, as the verbs are in the cohortative form. Perhaps the sense could be conveyed as “I handed this land over to you, so now what are you going to do about all this?”
  - type: text
    content: 'their land to you. '
