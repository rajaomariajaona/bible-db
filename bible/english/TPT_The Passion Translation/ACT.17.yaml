document_id: ACT.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Riot Breaks Out in Thessalonica
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After passing through the cities of Amphipolis and Apollonia, Paul and Silas arrived at Thessalonica. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Known today as Salonica or Thessaloniki, it was the ancient capital of Macedonia.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As they customarily did, they went to the synagogue to speak to the Jews from the Torah scrolls. For three weeks '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Paul challenged them by explaining the truth and proving to them the reality of the gospel—that the Messiah had to suffer and die, then rise again from among the dead. He made it clear to them, saying, “I come to announce to you that Jesus is the Anointed One, the Messiah!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Some of the Jews were convinced that their message was true, so they joined Paul and Silas, along with quite a few prominent women and a large number of Greeks who worshiped God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is probable that this is when Timothy arrived in Thessalonica with gifts of money and food from the church of Philippi. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 4:16
      metadata:
        usfm: PHP.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Thess. 1:1
      metadata:
        usfm: 1TH.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Thess. 1:1
      metadata:
        usfm: 2TH.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But many of the Jews were motivated by bitter jealousy and formed a large mob out of the troublemakers, unsavory characters, and street gangs to incite a riot. They set out to attack Jason’s house, for he had welcomed the apostles into his home. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This information is borrowed from v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: ACT.17.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and inserted here for the sake of English narrative.
    marker-yv: yv-n
  - type: text
    text: 'The mob was after Paul and Silas and sought to take them by force and bring them out to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When they couldn’t find them, they took Jason instead, along with some of the brothers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in his house church
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although not much about Jason is given here, he is known in church history as Jason of Tarsus, who was one of the seventy apostles Jesus sent out and is named as one of Paul’s ministry companions. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 10:1–11
      metadata:
        usfm: LUK.10.1+LUK.10.2+LUK.10.3+LUK.10.4+LUK.10.5+LUK.10.6+LUK.10.7+LUK.10.8+LUK.10.9+LUK.10.10+LUK.10.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 16:21
      metadata:
        usfm: ROM.16.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and dragged them before the city council. Along the way they screamed out, “Those troublemakers who have turned the world upside down have come here to our city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And now Jason and these men have welcomed them as guests. They’re traitors to Caesar, teaching that there is another king named Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Their angry shouts stirred up the crowds and troubled the city and all its officials. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: it
    children:
    - type: text
      text: So when Paul and Silas came before the leaders of the city
  - type: text
    text: ', they refused to let them go until Jason and his men posted bail.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gospel Received in Berea
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'That night the believers sent Paul and Silas off to the city of Berea, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Berea (modern-day Veria) was a city in Macedonia about forty-five miles (seventy-five kilometers) from Thessalonica.
    marker-yv: yv-n
  - type: text
    text: 'where they once again went into the synagogue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'They found that the Jews of Berea were of more noble character and much more open minded than those of Thessalonica. They were hungry to learn and eagerly received the word. Every day they opened the scrolls of Scripture to search and examine them, to verify that what Paul taught them was true. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: it
    children:
    - type: text
      text: A large number of Jews became believers in Jesus
  - type: text
    text: ', along with quite a few influential '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: euschemon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: also implies “women of high standing,” “wealthy,” “honorable,” “elegant,” and “respected.” (See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Strong’s Concordance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Gr. 2158.)'
    marker-yv: yv-n
  - type: text
    text: Greek women and men.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When the news reached the Jews in Thessalonica that Paul was now in Berea, preaching the word of God, the troublemakers went there too and they agitated and stirred up the crowds against him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The fellow believers helped Paul slip away to the coast of the Aegean Sea, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is simply “the sea.”
    marker-yv: yv-n
  - type: text
    text: while Silas and Timothy remained in Berea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Those who accompanied Paul sailed with him as far as Athens. Then Paul sent them back to Berea with instructions '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic makes it clear that this message was written as a letter.
    marker-yv: yv-n
  - type: text
    text: for Silas and Timothy to hurry and join him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Apostle Paul in Athens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'While Paul was waiting for them in Athens, his spirit was deeply troubled '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “deeply pained” or “irritated.”
    marker-yv: yv-n
  - type: text
    text: 'when he realized that the entire city was full of idols. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: it
    children:
    - type: text
      text: He argued the claims of the gospel
  - type: text
    text: ' with the Jews in their synagogue, and with those who were worshipers of God, and every day he preached in the public square to whomever would listen.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Philosophers of the teachings of Epicurus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Epicurus was a Greek philosopher (341–270 BC) who espoused a radical materialism that claimed people should live for pleasure and materialistic gain. He denied an afterlife and asserted that the gods had little interest in or concern for humanity.
    marker-yv: yv-n
  - type: text
    text: 'and others called Stoics, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Stoicism, in contrast to Epicureanism, is a passive determinism of emotional indifference that elevates the virtue of self-control. By mastering human passions and emotions, one could realize peace within himself. The Greek Stoics believed that humans can only reach their full potential when they live by sheer reason and divine principle, or the spark of divinity, which they called
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: logos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'debated '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “word wrestled.”
    marker-yv: yv-n
  - type: text
    text: 'with Paul. When they heard him speak about Jesus and his resurrection, they said, “What strange ideas is this babbler trying to present?” Others said, “He’s peddling some kind of foreign religion.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So they brought him for a public dialogue before the leadership council of Athens, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Areopagus was a governing body of intellectuals who were the overseers of Athens. It was equivalent to the board of education, the city council, the ethics committee, the council of foreign relations, and leaders of the religious and philosophical community all rolled into one. The Areopagus, also known as Mars Hill (Mars, or Ares, was the Greek god of war), was not simply a location but a gathering of a council of people overseeing the spiritual atmosphere of Athens. It could best be described as the Greek temple of human thought. The Aramaic here uses the phrase “house of religion.”
    marker-yv: yv-n
  - type: text
    text: known as the Areopagus.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Tell us,” they said, “about this new teaching that you’re bringing to our city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You’re presenting strange and astonishing things to our ears, and we want to know what it all means.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Now, it was the favorite pastime of the Athenians and visitors to Athens to discuss the newest ideas and philosophies.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Speaks to the Leaders of Athens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So Paul stood in the middle of the leadership council and said, “Respected leaders of Athens, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or simply, “Athenians.”
    marker-yv: yv-n
  - type: text
    text: 'it is clear to me how extravagant you are in your worship of idols. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic, which can also be translated “You excel in the worship of demons” (or “idols”). The Greek is “How very superstitious you are (i.e., extraordinarily religious).”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For as I walked through your city, I was captivated by the many shrines and objects of your worship. I even found an inscription on one altar that read, ‘To the Unknown God.’ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “To the Hidden God.”
    marker-yv: yv-n
  - type: text
    text: I have come to introduce to you this God whom you worship without even knowing anything about him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“The true God is the Creator of all things. He is the owner and Lord of the heavenly realm and the earthly realm, and he doesn’t live in man-made temples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He supplies life and breath and all things to every living being. He doesn’t lack a thing that we mortals could supply for him, for he has all things and everything he needs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'From one man, Adam, he made every man and woman and every race of humanity, and he spread us over all the earth. He sets the boundaries of people and nations, determining their appointed times in history. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Aramaic adds an interesting nuance: “He commands the separation of the seasons and sets the lifespan of every person.”'
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'He has done this so that every person would long for God, feel their way to him, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “investigating him in his creation.”
    marker-yv: yv-n
  - type: text
    text: 'and find him—for he is the God who is easy to discover! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the God who is not far from each one of us.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'It is through him that we live and function and have our identity; just as your own poets have said, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul is quoting two classical Greek writers (ca. 270 BC): Aratus ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: Phaenomena
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 5) and Cleanthes ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hymn to Zeus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 5).'
    marker-yv: yv-n
  - type: text
    text: ‘Our lineage comes from him.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Our nature comes from him,” as translated from the Aramaic. The Greek is “We are his offspring.” The Greek word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: genos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “kindred” or “family” (taken from his genes).'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “Since our lineage can be traced back to God, how could we even think that the divine image could be compared to something made of gold, silver, or stone, sculpted by man’s artwork and clever imagination?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
