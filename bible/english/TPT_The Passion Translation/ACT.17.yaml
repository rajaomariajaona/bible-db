document_id: ACT.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Riot Breaks Out in Thessalonica
  - type: text
    content: 'After passing through the cities of Amphipolis and Apollonia, Paul and Silas arrived at Thessalonica. '
  - type: note
    content: Known today as Salonica or Thessaloniki, it was the ancient capital of Macedonia.
  '10':
  - type: text
    content: 'That night the believers sent Paul and Silas off to the city of Berea, '
  - type: note
    content: Berea (modern-day Veria) was a city in Macedonia about forty-five miles (seventy-five kilometers) from Thessalonica.
  - type: text
    content: 'where they once again went into the synagogue. '
  '11':
  - type: text
    content: 'They found that the Jews of Berea were of more noble character and much more open minded than those of Thessalonica. They were hungry to learn and eagerly received the word. Every day they opened the scrolls of Scripture to search and examine them, to verify that what Paul taught them was true. '
  '12':
  - type: text
    content: A large number of Jews became believers in Jesus
  - type: text
    content: ', along with quite a few influential '
  - type: note
    content: The Greek word euschemon also implies “women of high standing,” “wealthy,” “honorable,” “elegant,” and “respected.” (See Strong’s Concordance, Gr. 2158.)
  - type: text
    content: Greek women and men.
  '13':
  - type: text
    content: 'When the news reached the Jews in Thessalonica that Paul was now in Berea, preaching the word of God, the troublemakers went there too and they agitated and stirred up the crowds against him. '
  '14':
  - type: text
    content: 'The fellow believers helped Paul slip away to the coast of the Aegean Sea, '
  - type: note
    content: The Greek text is simply “the sea.”
  - type: text
    content: while Silas and Timothy remained in Berea.
  '15':
  - type: text
    content: 'Those who accompanied Paul sailed with him as far as Athens. Then Paul sent them back to Berea with instructions '
  - type: note
    content: The Aramaic makes it clear that this message was written as a letter.
  - type: text
    content: for Silas and Timothy to hurry and join him.
  - type: heading
    content: The Apostle Paul in Athens
  '16':
  - type: text
    content: 'While Paul was waiting for them in Athens, his spirit was deeply troubled '
  - type: note
    content: Or “deeply pained” or “irritated.”
  - type: text
    content: 'when he realized that the entire city was full of idols. '
  '17':
  - type: text
    content: He argued the claims of the gospel
  - type: text
    content: ' with the Jews in their synagogue, and with those who were worshipers of God, and every day he preached in the public square to whomever would listen.'
  '18':
  - type: text
    content: 'Philosophers of the teachings of Epicurus, '
  - type: note
    content: Epicurus was a Greek philosopher (341–270 BC) who espoused a radical materialism that claimed people should live for pleasure and materialistic gain. He denied an afterlife and asserted that the gods had little interest in or concern for humanity.
  - type: text
    content: 'and others called Stoics, '
  - type: note
    content: Stoicism, in contrast to Epicureanism, is a passive determinism of emotional indifference that elevates the virtue of self-control. By mastering human passions and emotions, one could realize peace within himself. The Greek Stoics believed that humans can only reach their full potential when they live by sheer reason and divine principle, or the spark of divinity, which they called logos.
  - type: text
    content: 'debated '
  - type: note
    content: The Aramaic is “word wrestled.”
  - type: text
    content: 'with Paul. When they heard him speak about Jesus and his resurrection, they said, “What strange ideas is this babbler trying to present?” Others said, “He’s peddling some kind of foreign religion.” '
  '19':
  - type: text
    content: 'So they brought him for a public dialogue before the leadership council of Athens, '
  - type: note
    content: The Areopagus was a governing body of intellectuals who were the overseers of Athens. It was equivalent to the board of education, the city council, the ethics committee, the council of foreign relations, and leaders of the religious and philosophical community all rolled into one. The Areopagus, also known as Mars Hill (Mars, or Ares, was the Greek god of war), was not simply a location but a gathering of a council of people overseeing the spiritual atmosphere of Athens. It could best be described as the Greek temple of human thought. The Aramaic here uses the phrase “house of religion.”
  - type: text
    content: known as the Areopagus.
  - type: text
    content: '“Tell us,” they said, “about this new teaching that you’re bringing to our city. '
  '2':
  - type: text
    content: 'As they customarily did, they went to the synagogue to speak to the Jews from the Torah scrolls. For three weeks '
  '20':
  - type: text
    content: 'You’re presenting strange and astonishing things to our ears, and we want to know what it all means.” '
  '21':
  - type: text
    content: Now, it was the favorite pastime of the Athenians and visitors to Athens to discuss the newest ideas and philosophies.
  - type: heading
    content: Paul Speaks to the Leaders of Athens
  '22':
  - type: text
    content: 'So Paul stood in the middle of the leadership council and said, “Respected leaders of Athens, '
  - type: note
    content: Or simply, “Athenians.”
  - type: text
    content: 'it is clear to me how extravagant you are in your worship of idols. '
  - type: note
    content: As translated from the Aramaic, which can also be translated “You excel in the worship of demons” (or “idols”). The Greek is “How very superstitious you are (i.e., extraordinarily religious).”
  '23':
  - type: text
    content: 'For as I walked through your city, I was captivated by the many shrines and objects of your worship. I even found an inscription on one altar that read, ‘To the Unknown God.’ '
  - type: note
    content: The Aramaic can be translated “To the Hidden God.”
  - type: text
    content: I have come to introduce to you this God whom you worship without even knowing anything about him.
  '24':
  - type: text
    content: '“The true God is the Creator of all things. He is the owner and Lord of the heavenly realm and the earthly realm, and he doesn’t live in man-made temples. '
  '25':
  - type: text
    content: 'He supplies life and breath and all things to every living being. He doesn’t lack a thing that we mortals could supply for him, for he has all things and everything he needs. '
  '26':
  - type: text
    content: 'From one man, Adam, he made every man and woman and every race of humanity, and he spread us over all the earth. He sets the boundaries of people and nations, determining their appointed times in history. '
  - type: note
    content: 'The Aramaic adds an interesting nuance: “He commands the separation of the seasons and sets the lifespan of every person.”'
  '27':
  - type: text
    content: 'He has done this so that every person would long for God, feel their way to him, '
  - type: note
    content: The Aramaic is “investigating him in his creation.”
  - type: text
    content: 'and find him—for he is the God who is easy to discover! '
  - type: note
    content: Or “the God who is not far from each one of us.”
  '28':
  - type: text
    content: 'It is through him that we live and function and have our identity; just as your own poets have said, '
  - type: note
    content: 'Paul is quoting two classical Greek writers (ca. 270 BC): Aratus (Phaenomena, 5) and Cleanthes (Hymn to Zeus, 5).'
  - type: text
    content: ‘Our lineage comes from him.’
  - type: note
    content: Or “Our nature comes from him,” as translated from the Aramaic. The Greek is “We are his offspring.” The Greek word is genos, which means “kindred” or “family” (taken from his genes).
  '29':
  - type: text
    content: “Since our lineage can be traced back to God, how could we even think that the divine image could be compared to something made of gold, silver, or stone, sculpted by man’s artwork and clever imagination?
  '3':
  - type: text
    content: Paul challenged them by explaining the truth and proving to them the reality of the gospel—that the Messiah had to suffer and die, then rise again from among the dead. He made it clear to them, saying, “I come to announce to you that Jesus is the Anointed One, the Messiah!”
  '30':
  - type: text
    content: '“In the past God tolerated '
  - type: note
    content: Or “deliberately paid no attention to.”
  - type: text
    content: 'our ignorance of these things, but now the time of deception has passed away. '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'He commands us all to repent and turn to God. '
  - type: note
    content: That is, to turn away from idolatry and worship the true God.
  '31':
  - type: text
    content: 'For the appointed day has risen, in which he is going to judge the world in righteousness by the man he has designated. And the proof given to the world that God has chosen this man is this: he resurrected him from among the dead!”'
  - type: note
    content: The Aramaic is “God turns the hearts of men to faith in him [Jesus] and raises them from among the dead.”
  '32':
  - type: text
    content: 'The moment they heard Paul bring up the topic of resurrection, some of them ridiculed him, '
  - type: text
    content: then got up and left
  - type: text
    content: '. But others said, “We want to hear you again later about these things.” '
  '33':
  - type: text
    content: 'So Paul left the meeting. '
  '34':
  - type: text
    content: 'But there were some who believed the message and joined him from that day forward. Among them were Dionysius, a judge on the leadership council, '
  - type: note
    content: 'As translated from the Aramaic. According to the church historian Eusebius, Dionysius later became the Bishop of Athens (Eusebius, Historia Ecclesiae III: iv).'
  - type: text
    content: and a woman named Damaris.
  - type: note
    content: The Greek word can also mean “wife,” indicating she was possibly the wife of Dionysius. Regardless, she must have been a woman of high social standing to be included in the meeting of the leadership council.
  '4':
  - type: text
    content: 'Some of the Jews were convinced that their message was true, so they joined Paul and Silas, along with quite a few prominent women and a large number of Greeks who worshiped God. '
  - type: note
    content: It is probable that this is when Timothy arrived in Thessalonica with gifts of money and food from the church of Philippi. See Phil. 4:16; 1 Thess. 1:1; 2 Thess. 1:1.
  '5':
  - type: text
    content: 'But many of the Jews were motivated by bitter jealousy and formed a large mob out of the troublemakers, unsavory characters, and street gangs to incite a riot. They set out to attack Jason’s house, for he had welcomed the apostles into his home. '
  - type: note
    content: This information is borrowed from v. 7 and inserted here for the sake of English narrative.
  - type: text
    content: 'The mob was after Paul and Silas and sought to take them by force and bring them out to the people. '
  '6':
  - type: text
    content: 'When they couldn’t find them, they took Jason instead, along with some of the brothers '
  - type: text
    content: in his house church
  - type: text
    content: ', '
  - type: note
    content: Although not much about Jason is given here, he is known in church history as Jason of Tarsus, who was one of the seventy apostles Jesus sent out and is named as one of Paul’s ministry companions. See Luke 10:1–11; Rom. 16:21.
  - type: text
    content: 'and dragged them before the city council. Along the way they screamed out, “Those troublemakers who have turned the world upside down have come here to our city. '
  '7':
  - type: text
    content: And now Jason and these men have welcomed them as guests. They’re traitors to Caesar, teaching that there is another king named Jesus.”
  '8':
  - type: text
    content: 'Their angry shouts stirred up the crowds and troubled the city and all its officials. '
  '9':
  - type: text
    content: So when Paul and Silas came before the leaders of the city
  - type: text
    content: ', they refused to let them go until Jason and his men posted bail.'
  - type: heading
    content: The Gospel Received in Berea
