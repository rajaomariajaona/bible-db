document_id: ISA.57,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Idolatry
  - type: text
    content: The godly perish,
  - type: text
    content: but no one seems to notice.
  - type: text
    content: The faithful ones are taken away,
  - type: text
    content: and no one understands.
  - type: text
    content: It is because of evil
  - type: text
    content: that they are preserved from calamity,
  '10':
  - type: text
    content: Though all your wanderings wearied you,
  - type: text
    content: you never said, ‘I give up.’
  - type: text
    content: Your strength was renewed
  - type: text
    content: so that you did not faint.
  '11':
  - type: text
    content: “Why were you so afraid of them that you told lies
  - type: text
    content: and did not remember me or even care what I thought?
  - type: text
    content: Is it because I have been patient and long silent
  - type: text
    content: that you no longer fear me?
  '12':
  - type: text
    content: I will denounce your presumed ‘righteousness’
  - type: text
    content: and your ‘good works,’
  - type: text
    content: so don’t trust in your idols to help you.
  '13':
  - type: text
    content: Let’s see if your pantheon of idols can save you when you cry out!
  - type: text
    content: They will be blown away by the wind;
  - type: note
    content: Or “spirit.”
  - type: text
    content: merely a breath will carry them off!
  - type: text
    content: But whoever makes me a hiding place
  - type: text
    content: will possess the land and inherit my holy mountain.”
  - type: note
    content: That is, Mount Zion. The believer today inherits the kingdom of God, the Zion-realm. See Ps. 37:9, 11; 69:35–36; Isa. 49:8; Matt. 5:5; Heb. 12:22.
  - type: heading
    content: A Promise of Revival and Healing
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “'
  - type: text
    content: Let the people return to me
  - type: text
    content: .
  - type: text
    content: Build! Build up the road, clear the way, and get it ready!
  - type: text
    content: Remove every obstacle from their path.”
  '15':
  - type: text
    content: For this is what the high and majestic one says,
  - type: text
    content: the one who fills the eternal realm with glory,
  - type: note
    content: The Hebrew word shakan (related to shekinah) means “to dwell or settle.” The implication is that God inhabits eternity, filling it with his glory.
  - type: text
    content: 'whose name is Holy:'
  - type: text
    content: “I dwell in high and holy places
  - type: text
    content: but also with the bruised and lowly in spirit,
  - type: text
    content: those who are humble and quick to repent.
  - type: text
    content: I dwell with them
  - type: text
    content: ' to revive the spirit of the humble,'
  - type: text
    content: to revive the heart of those who are broken over their sin.
  '16':
  - type: text
    content: You will not find me continually accusing them
  - type: note
    content: Or “continually striving with them.”
  - type: text
    content: or holding anger against them,
  - type: text
    content: 'lest they '
  - type: text
    content: feel defeated
  - type: text
    content: ' and lose heart before me.'
  - type: text
    content: For I am the One who gave the breath of life to my people.
  '17':
  - type: text
    content: It was their sin and greed that made me angry,
  - type: text
    content: so I struck them and hid my face from them.
  - type: text
    content: But they continued in rebellion, following their own desires.
  '18':
  - type: text
    content: Even though I’ve seen their ways, I will heal them.
  - type: note
    content: This is the same Hebrew word found in Isa. 53:5. See Hos. 6:1–3.
  - type: text
    content: 'I will guide them '
  - type: text
    content: forward
  - type: text
    content: ' and repay them with comfort,'
  - type: text
    content: giving mourners the language of praise.
  - type: note
    content: It is possible to see in this verse the progression of the worshiper from the outer court (healing), forward into the Holy Place, until he is drenched with God’s comforting presence in the Holy of Holies, where he releases his language of praise.
  '19':
  - type: text
    content: 'I offer peace to those who are far '
  - type: text
    content: from me
  - type: text
    content: ','
  - type: text
    content: and I offer peace to those who are near,
  - type: note
    content: See Eph. 2:11–22.
  - type: text
    content: 'and I will heal '
  - type: text
    content: their deepest wounds
  - type: text
    content: ',” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '2':
  - type: text
    content: and the godly ones enter into peace,
  - type: text
    content: resting serenely upon their death beds.
  '20':
  - type: text
    content: “But the wicked are like the storm-tossed sea,
  - type: text
    content: whose restless waves are never still,
  - type: text
    content: stirring up mud and mire.
  '21':
  - type: text
    content: 'There is no peace '
  - type: note
    content: Or “well-being” or “prosperity.”
  - type: text
    content: for the wicked,” says my God.
  '3':
  - type: text
    content: “But you—come here, you son of a sorceress!
  - type: text
    content: You’re nothing but an offspring
  - type: text
    content: of an adulteress and a prostitute.
  - type: note
    content: This is a vivid picture of those who practice idolatry. See James 4:4.
  '4':
  - type: text
    content: Who do you think you’re mocking?
  - type: text
    content: At whom do you sneer and stick out your tongue?
  - type: text
    content: Why, you’re a rebellious child, the offspring of liars!
  '5':
  - type: text
    content: 'You burn with lust '
  - type: text
    content: for other gods
  - type: text
    content: among the oak groves and under every green tree.
  - type: text
    content: You sacrifice your own children in the caves
  - type: note
    content: See 2 Chron. 28:3; 33:6.
  - type: text
    content: near the bed of a stream.
  '6':
  - type: text
    content: From there you take smooth stones
  - type: text
    content: and worship them as idols.
  - type: text
    content: Yes, they become your idols!
  - type: text
    content: You bring them grain offerings
  - type: text
    content: and pour out wine as drink offerings.
  - type: text
    content: Do you think I will not seek vengeance for this?
  '7':
  - type: text
    content: On a high hill, you practice ritual sex
  - type: note
    content: Or “On high you set up your bed.”
  - type: text
    content: and go up to the lofty place to offer sacrifice.
  '8':
  - type: text
    content: Hidden inside your front doors
  - type: text
    content: you have set up your obscene idols.
  - type: note
    content: Or “[phallic] symbols.”
  - type: text
    content: Forsaking me, you went up
  - type: text
    content: and uncovered yourself
  - type: text
    content: and climbed into your wide bed.
  - type: text
    content: You made covenant with them for yourselves,
  - type: text
    content: you slept with them, and you gazed upon their nakedness.
  '9':
  - type: text
    content: 'You journeyed to the king '
  - type: note
    content: Or “to [the Canaanite god] Molech.”
  - type: text
    content: with oil
  - type: text
    content: along with many perfumes.
  - type: text
    content: You sent your envoys to exotic lands,
  - type: text
    content: even down to the underworld.
  - type: note
    content: Or “to Sheol.”
