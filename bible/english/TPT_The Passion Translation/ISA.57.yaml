- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Idolatry
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The godly perish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but no one seems to notice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The faithful ones are taken away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and no one understands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is because of evil
- type: usfm
  marker: q1
  children:
  - type: text
    text: that they are preserved from calamity,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: and the godly ones enter into peace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: resting serenely upon their death beds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “But you—come here, you son of a sorceress!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re nothing but an offspring
- type: usfm
  marker: q1
  children:
  - type: text
    text: of an adulteress and a prostitute.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a vivid picture of those who practice idolatry. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: James 4:4
      metadata:
        usfm: JAS.4.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who do you think you’re mocking?
- type: usfm
  marker: q1
  children:
  - type: text
    text: At whom do you sneer and stick out your tongue?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why, you’re a rebellious child, the offspring of liars!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'You burn with lust '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for other gods
- type: usfm
  marker: q1
  children:
  - type: text
    text: among the oak groves and under every green tree.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You sacrifice your own children in the caves
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
