    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: near the bed of a stream.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: From there you take smooth stones
- type: usfm
  marker: q1
  children:
  - type: text
    text: and worship them as idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, they become your idols!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You bring them grain offerings
- type: usfm
  marker: q1
  children:
  - type: text
    text: and pour out wine as drink offerings.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you think I will not seek vengeance for this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On a high hill, you practice ritual sex
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “On high you set up your bed.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and go up to the lofty place to offer sacrifice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hidden inside your front doors
- type: usfm
  marker: q1
  children:
  - type: text
    text: you have set up your obscene idols.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “[phallic] symbols.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Forsaking me, you went up
- type: usfm
  marker: q1
  children:
  - type: text
    text: and uncovered yourself
- type: usfm
  marker: q1
  children:
  - type: text
    text: and climbed into your wide bed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You made covenant with them for yourselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you slept with them, and you gazed upon their nakedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You journeyed to the king '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to [the Canaanite god] Molech.”
    marker-yv: yv-n
  - type: text
    text: with oil
- type: usfm
  marker: q1
  children:
  - type: text
    text: along with many perfumes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You sent your envoys to exotic lands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even down to the underworld.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to Sheol.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Though all your wanderings wearied you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you never said, ‘I give up.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your strength was renewed
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that you did not faint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Why were you so afraid of them that you told lies
- type: usfm
  marker: q1
  children:
  - type: text
    text: and did not remember me or even care what I thought?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is it because I have been patient and long silent
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you no longer fear me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I will denounce your presumed ‘righteousness’
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your ‘good works,’
- type: usfm
  marker: q1
  children:
  - type: text
    text: so don’t trust in your idols to help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Let’s see if your pantheon of idols can save you when you cry out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will be blown away by the wind;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “spirit.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: merely a breath will carry them off!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But whoever makes me a hiding place
- type: usfm
  marker: q1
  children:
  - type: text
    text: will possess the land and inherit my holy mountain.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 57:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Mount Zion. The believer today inherits the kingdom of God, the Zion-realm. See
