      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It was their sin and greed that made me angry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so I struck them and hid my face from them.
- type: usfm
  marker: q1
  children:
  - type: text
