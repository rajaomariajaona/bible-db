document_id: JOS.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Cities of the Levites
  - type: text
    content: While the people of Israel camped at Shiloh in the land of Canaan, the ancestral heads of the Levites went to Eleazar the priest, to Joshua son of Nun, and to the heads of the families of all of the tribes of Israel and said, “
  - type: text
    content: Yahweh
  - type: text
    content: ' instructed through Moses for you to give us cities to live in and pasturelands around the cities for our livestock.” '
  '11':
  - type: text
    content: They received the city of Hebron, which was also a city of asylum. It lay in the hill country of Judah and was named Kiriath Arba, after Arba the father of Anak. The fields and towns around it had already been given to Caleb, but the city and its pasturelands were now given to the descendants of Aaron. They also received the cities and pasturelands of Libnah, Jattir, Eshtemoa, Holon, Debir, Ain, Juttah, and Beth Shemesh; nine cities from these two tribes.
  '17':
  - type: text
    content: 'They received four cities from the territory of Benjamin: Gibeon, Geba, Anathoth, and Almon, along with the pastureland of each. '
  '19':
  - type: text
    content: The priests, the descendants of Aaron, received thirteen cities in all, with their pasturelands.
  '20':
  - type: text
    content: The rest of the Kohathite clans of Levi received four cities with their pasturelands in the territory of Ephraim. One of these cities was Shechem, located in the hill country and one of the cities of asylum. The other three cities were Gezer, Kibzaim, and Beth Horon.
  '23':
  - type: text
    content: 'The Levites also received four cities from the territory of Dan: Eltekeh, Gibbethon, Aijalon, and Gath Rimmon, along with the pastureland of each.'
  '25':
  - type: text
    content: 'They also received two cities from the half-tribe of Manasseh: Taanach and Gath Rimmon, along with the pastureland of each. '
  '26':
  - type: text
    content: The rest of the Kohathite clans received ten towns and their pasturelands.
  '27':
  - type: text
    content: 'The Levite clans of the Gershonites received two towns from the half-tribe of Manasseh: Golan in Bashan (a city of asylum for one who committed manslaughter) and Beeshterah, together with their pasturelands.'
  '28':
  - type: text
    content: They received
  - type: text
    content: ' four towns from the tribe of Issachar: Kishion, Daberath, Jarmuth, and En Gannim, together with their pasturelands.'
  '3':
  - type: text
    content: 'So the people of Israel obeyed '
  - type: text
    content: Yahweh
  - type: text
    content: ’s command and gave the Levites some of their cities and pasturelands from their inheritance.
  '30':
  - type: text
    content: They received
  - type: text
    content: ' four towns from the tribe of Asher: Mishal, Abdon, Helkath, and Rehob, together with their pasturelands.'
  '32':
  - type: text
    content: They received
  - type: text
    content: ' three towns from the tribe of Naphtali: Kedesh in Galilee (a city of asylum for one who committed manslaughter), Hammoth Dor, and Kartan, together with their pasturelands. '
  '33':
  - type: text
    content: All the Gershonite clans received thirteen towns, together with their pasturelands.
  '34':
  - type: text
    content: 'The remaining Levites of the Merarite clans received four cities from the tribe of Zebulun: Jokneam, Kartah, Dimnah, and Nahalal, along with the pastureland of each.'
  '36':
  - type: text
    content: They received
  - type: text
    content: ' four cities from the tribe of Reuben: Bezer, Jahaz, Kedemoth, and Mephaath, along with the pastureland of each.'
  '38':
  - type: text
    content: They received
  - type: text
    content: ' four cities from the tribe of Gad: Ramoth in Gilead (a city of asylum for one who committed manslaughter), Mahanaim, Heshbon, and Jazer, along with the pastureland of each. '
  '4':
  - type: text
    content: 'Each clan of the Levites received its cities by drawing lots. First, the people of Israel gave to the descendants of Aaron the priest from the clan of Kohath '
  - type: note
    content: The first lot fell to the descendants of Aaron. They were classified as priests (see v. 19), while the other descendants of Levi were not.
  - type: text
    content: thirteen cities from the territories of Judah, Simeon, and Benjamin. They allotted to the rest of the clan of Kohath’s descendants ten towns from the clans of the tribes of Ephraim, Dan, and half of Manasseh.
  '40':
  - type: text
    content: Merarite clans of the remaining Levites received twelve cities in all.
  '41':
  - type: text
    content: The Levites received from the other tribes of Israel a total of forty-eight cities, each with the pasturelands around them.
  - type: heading
    content: Israel Takes Possession of the Land
  '43':
  - type: text
    content: 'So '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave Israel all the land he had promised their ancestors. They took possession of the land and settled there. '
  '44':
  - type: text
    content: Yahweh
  - type: text
    content: ' kept his promise and gave them peace in the land '
  - type: note
    content: Or “Yahweh gave them rest on every side.” See Deut. 12:10.
  - type: text
    content: 'just as he had promised to their forefathers. Not one of their enemies could stand against them. '
  '45':
  - type: text
    content: Yahweh
  - type: text
    content: ' didn’t break a single promise that he made to the people of Israel. He faithfully kept every promise he made to them.'
  '6':
  - type: text
    content: By lot, the descendants of Gershon received thirteen cities from the tribe of Issachar, from the tribe of Asher, from the tribe of Naphtali, and from the half-tribe of Manasseh in Bashan.
  '7':
  - type: text
    content: 'Clan by clan, the descendants of Merari received twelve cities from the tribe of Reuben, the tribe of Gad, and the tribe of Zebulun. '
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' had commanded through Moses to draw lots to see what cities the Levites would receive. So they drew lots, and the people of Israel gave them these cities together with the pasturelands around them.'
  '9':
  - type: text
    content: 'The members of the clan of Kohath, the descendants of Aaron, received '
  - type: text
    content: nine
  - type: text
    content: ' cities from the tribes of Judah and Simeon. '
