document_id: JOS.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cities of the Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: While the people of Israel camped at Shiloh in the land of Canaan, the ancestral heads of the Levites went to Eleazar the priest, to Joshua son of Nun, and to the heads of the families of all of the tribes of Israel and said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' instructed through Moses for you to give us cities to live in and pasturelands around the cities for our livestock.” '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So the people of Israel obeyed '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s command and gave the Levites some of their cities and pasturelands from their inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: 'Each clan of the Levites received its cities by drawing lots. First, the people of Israel gave to the descendants of Aaron the priest from the clan of Kohath '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first lot fell to the descendants of Aaron. They were classified as priests (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: JOS.21.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), while the other descendants of Levi were not.
    marker-yv: yv-n
  - type: text
    text: thirteen cities from the territories of Judah, Simeon, and Benjamin. They allotted to the rest of the clan of Kohath’s descendants ten towns from the clans of the tribes of Ephraim, Dan, and half of Manasseh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: By lot, the descendants of Gershon received thirteen cities from the tribe of Issachar, from the tribe of Asher, from the tribe of Naphtali, and from the half-tribe of Manasseh in Bashan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Clan by clan, the descendants of Merari received twelve cities from the tribe of Reuben, the tribe of Gad, and the tribe of Zebulun. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had commanded through Moses to draw lots to see what cities the Levites would receive. So they drew lots, and the people of Israel gave them these cities together with the pasturelands around them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'The members of the clan of Kohath, the descendants of Aaron, received '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nine
  - type: text
    text: ' cities from the tribes of Judah and Simeon. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-16
  - type: text
    text: They received the city of Hebron, which was also a city of asylum. It lay in the hill country of Judah and was named Kiriath Arba, after Arba the father of Anak. The fields and towns around it had already been given to Caleb, but the city and its pasturelands were now given to the descendants of Aaron. They also received the cities and pasturelands of Libnah, Jattir, Eshtemoa, Holon, Debir, Ain, Juttah, and Beth Shemesh; nine cities from these two tribes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'They received four cities from the territory of Benjamin: Gibeon, Geba, Anathoth, and Almon, along with the pastureland of each. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The priests, the descendants of Aaron, received thirteen cities in all, with their pasturelands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-22
  - type: text
    text: The rest of the Kohathite clans of Levi received four cities with their pasturelands in the territory of Ephraim. One of these cities was Shechem, located in the hill country and one of the cities of asylum. The other three cities were Gezer, Kibzaim, and Beth Horon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 23-24
  - type: text
    text: 'The Levites also received four cities from the territory of Dan: Eltekeh, Gibbethon, Aijalon, and Gath Rimmon, along with the pastureland of each.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They also received two cities from the half-tribe of Manasseh: Taanach and Gath Rimmon, along with the pastureland of each. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The rest of the Kohathite clans received ten towns and their pasturelands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The Levite clans of the Gershonites received two towns from the half-tribe of Manasseh: Golan in Bashan (a city of asylum for one who committed manslaughter) and Beeshterah, together with their pasturelands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: usfm
    marker: it
    children:
    - type: text
      text: They received
  - type: text
    text: ' four towns from the tribe of Issachar: Kishion, Daberath, Jarmuth, and En Gannim, together with their pasturelands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 30-31
  - type: usfm
    marker: it
    children:
    - type: text
      text: They received
  - type: text
    text: ' four towns from the tribe of Asher: Mishal, Abdon, Helkath, and Rehob, together with their pasturelands.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: it
    children:
    - type: text
      text: They received
  - type: text
    text: ' three towns from the tribe of Naphtali: Kedesh in Galilee (a city of asylum for one who committed manslaughter), Hammoth Dor, and Kartan, together with their pasturelands. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: All the Gershonite clans received thirteen towns, together with their pasturelands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: 'The remaining Levites of the Merarite clans received four cities from the tribe of Zebulun: Jokneam, Kartah, Dimnah, and Nahalal, along with the pastureland of each.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 36-37
  - type: usfm
    marker: it
    children:
    - type: text
      text: They received
  - type: text
    text: ' four cities from the tribe of Reuben: Bezer, Jahaz, Kedemoth, and Mephaath, along with the pastureland of each.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 38-39
  - type: usfm
    marker: it
    children:
    - type: text
      text: They received
  - type: text
    text: ' four cities from the tribe of Gad: Ramoth in Gilead (a city of asylum for one who committed manslaughter), Mahanaim, Heshbon, and Jazer, along with the pastureland of each. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Merarite clans of the remaining Levites received twelve cities in all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 41-42
  - type: text
    text: The Levites received from the other tribes of Israel a total of forty-eight cities, each with the pasturelands around them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Takes Possession of the Land
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' gave Israel all the land he had promised their ancestors. They took possession of the land and settled there. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' kept his promise and gave them peace in the land '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: gave them rest on every side.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'just as he had promised to their forefathers. Not one of their enemies could stand against them. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' didn’t break a single promise that he made to the people of Israel. He faithfully kept every promise he made to them.'
