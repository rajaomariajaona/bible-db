      marker-yv: yv-n
    - type: text
      text: 'And then you will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: O land of Israel, I will again settle my people on you. They will possess you as their inheritance, and never again will you deprive them of their children.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘This is what I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say: People say about you, “You devour people and have robbed your nation of its children.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you will devour people no longer nor make your nation childless again, '
    - type: usfm
