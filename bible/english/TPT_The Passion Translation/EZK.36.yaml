    children:
    - type: text
      text: '8'
  - type: text
    text: '“ ‘Mountains of Israel, your trees will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: once again
  - type: text
    text: ' grow branches and bear fruit for my people the Israelites. For they will soon return home. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Yes, I am for you and on your side; I will turn '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my heart
  - type: text
    text: ' toward you. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Farmers
  - type: text
    text: ' will plow your ground and plant their seeds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Israel, I will make the population of all your tribes to increase, yes, throughout the land. Your ruined cities will be rebuilt and people will live in them again. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I will increase your population, both human and animal, and they will increase and prosper. I will bring people to settle on you as in the past, and I will bless you more than ever before. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will do more good to you than ever before.”
    marker-yv: yv-n
  - type: text
    text: 'And then you will know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O land of Israel, I will again settle my people on you. They will possess you as their inheritance, and never again will you deprive them of their children.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“ ‘This is what I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say: People say about you, “You devour people and have robbed your nation of its children.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'But you will devour people no longer nor make your nation childless again, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
