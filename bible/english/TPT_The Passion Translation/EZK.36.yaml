    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will silence the insults of the nations. You will never again have to hear the mocking of the peoples, and you will never again cause your nation to stumble. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
