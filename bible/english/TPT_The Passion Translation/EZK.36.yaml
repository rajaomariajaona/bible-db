  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you: Your enemies have gloated over you by saying: “At last! Now we own these ancient high places!” ’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“So prophesy to them what I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have to say: ‘Your enemies have attacked you from all directions and turned your land into an empty ruin. This enabled other nations to take possession of your land. You also became the subject of people’s malicious talk and evil slander. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Therefore, hear the word of Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you Mountains of Israel! Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has a message for the mountains and hills, the ravines and valleys, the devastated ruins and abandoned cities that have been ransacked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by your enemies
  - type: text
    text: ' and ridiculed by all the nations around you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you: Truly, I speak in my jealous anger against the rest of the nations and to the entire land of Edom. You gleefully and maliciously took possession of my land so that you could plunder its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fertile
  - type: text
    text: ' pasturelands.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Therefore '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ezekiel
  - type: text
    text: ', prophesy over the land of Israel, its mountains and hills, its ravines and valleys. Prophesy to them what I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have to say: ‘Behold, I speak in my fiery passion because you have endured the vile insults of the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Therefore, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: I raise my hand and solemnly swear that the nations all around you will have their own insults to bear!’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Heart for Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
