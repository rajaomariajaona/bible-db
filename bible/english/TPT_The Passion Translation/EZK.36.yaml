  - type: text
    text: 'I will call for the grain of the field to become plentiful and not allow famine to afflict you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'I will increase the produce of fruit and field so that you will never again bear the disgrace of famine among the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then you will remember your evil ways and the wrongs you have done. Your guilt and evil deeds will cause you to be disgusted with yourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'People of Israel, I assure you that it is not because you are good '
  - type: usfm
