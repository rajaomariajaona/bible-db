    marker-yv: yv-n
  - type: text
    text: 'says Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I will silence the insults of the nations. You will never again have to hear the mocking of the peoples, and you will never again cause your nation to stumble. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.’ ”'
- type: usfm
  marker: s1
