document_id: EZK.36,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Restoration of Israel
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 36 constitutes panel F1 in the chiastic structure of the book. It deals with the themes of both judgment against Israel and the promise of new covenant blessing. This chapter serves as a direct parallel with ch. 20 (panel F), which also deals with Yahweh’s judgment against Israel, followed by the promise of new covenant blessing and restoration.
  - type: text
    content: '“Son of man, prophesy to the mountains of Israel '
  - type: note
    content: A theme of Ezek. 36 is the restoration of the land of Israel. The sins of the people had so polluted the land (see chs. 6–7) that it had to be cleansed before God could bring the people back to the land.
  - type: text
    content: 'and tell them, ‘Mountains of Israel, hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Israel, I will make the population of all your tribes to increase, yes, throughout the land. Your ruined cities will be rebuilt and people will live in them again. '
  '11':
  - type: text
    content: 'I will increase your population, both human and animal, and they will increase and prosper. I will bring people to settle on you as in the past, and I will bless you more than ever before. '
  - type: note
    content: Or “I will do more good to you than ever before.”
  - type: text
    content: 'And then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '12':
  - type: text
    content: O land of Israel, I will again settle my people on you. They will possess you as their inheritance, and never again will you deprive them of their children.
  '13':
  - type: text
    content: '“ ‘This is what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say: People say about you, “You devour people and have robbed your nation of its children.” '
  '14':
  - type: text
    content: 'But you will devour people no longer nor make your nation childless again, '
  - type: note
    content: Or “cause your people [nation] to stumble.”
  - type: text
    content: 'says Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'I will silence the insults of the nations. You will never again have to hear the mocking of the peoples, and you will never again cause your nation to stumble. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: Restoring the People
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me this message: '
  '17':
  - type: text
    content: '“Son of man, the Israelites defiled their own land when they lived there. In my eyes, their conduct was as unclean as a woman’s menstruation. '
  '18':
  - type: text
    content: 'So I vented my fury on them because of the violence and murders they had committed in the land and because of their worship of idols, which defiled the land. '
  '19':
  - type: text
    content: 'I dispersed them among the nations, and they were scattered throughout different countries. I judged them as their actions and conduct deserved. '
  '2':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Your enemies have gloated over you by saying: “At last! Now we own these ancient high places!” ’'
  '20':
  - type: text
    content: When my people were scattered to other lands, they dishonored my holy name in front of those nations. The people said of them, ‘
  - type: text
    content: Look!
  - type: text
    content: ' These are the people of '
  - type: text
    content: Yahweh
  - type: text
    content: ' who have been forced out of his land.’ '
  '21':
  - type: text
    content: 'But I have been greatly concerned about my holy name, which the people of Israel have dishonored among the nations where they have gone. '
  '22':
  - type: text
    content: 'Therefore, say to the people of Israel what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say: ‘I will not take action for your sake, people of Israel, but for the sake of the honor of my holy name, which you have caused to be slandered among the nations wherever you have gone. '
  '23':
  - type: text
    content: 'I am going to magnify the holiness of my great name, which you have greatly dishonored before the eyes of foreign nations. And when I magnify my holiness in you before their eyes, the nations will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: A New Heart for a New Day
  '24':
  - type: text
    content: '“ ‘I will take you from every nation and country and bring you back home to your own land. '
  '25':
  - type: text
    content: 'I will sprinkle purifying water over you, and you will be cleansed '
  - type: note
    content: See Num. 19:13, 20.
  - type: text
    content: 'from all the filth '
  - type: text
    content: of your past
  - type: text
    content: '. I will wash you clean from the defilement of worshiping false gods. '
  '26':
  - type: text
    content: 'I will '
  - type: text
    content: graciously
  - type: text
    content: ' give you a new, '
  - type: text
    content: tender
  - type: text
    content: ' heart and put a new, '
  - type: text
    content: willing
  - type: text
    content: ' spirit '
  - type: note
    content: This is more than a “good attitude.” God promises to give us a new spirit, his own Spirit, placed within us so we can take part in God’s gracious new covenant. See v. 27. See also Ps. 143:10; 1 Cor. 6:17.
  - type: text
    content: 'inside you. I will remove your '
  - type: text
    content: hard
  - type: text
    content: ' heart of stone and give you an '
  - type: text
    content: obedient
  - type: text
    content: ', responsive heart instead. '
  '27':
  - type: text
    content: 'I will put my '
  - type: text
    content: Holy
  - type: text
    content: ' Spirit in you to empower you to keep my laws and to live by them. '
  '28':
  - type: text
    content: 'You will live in the land that I gave your ancestors. You will be my people, and I will be your God. '
  - type: note
    content: Verses 24–28 describe the new covenant the Lord Jesus has established with us. See Jer. 31; Heb. 8.
  '29':
  - type: text
    content: 'I will save you from everything impure '
  - type: text
    content: within you
  - type: text
    content: '. '
  - type: note
    content: See Ps. 39:8; Phil. 3:21.
  - type: text
    content: 'I will call for the grain of the field to become plentiful and not allow famine to afflict you. '
  '3':
  - type: text
    content: '“So prophesy to them what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have to say: ‘Your enemies have attacked you from all directions and turned your land into an empty ruin. This enabled other nations to take possession of your land. You also became the subject of people’s malicious talk and evil slander. '
  '30':
  - type: text
    content: 'I will increase the produce of fruit and field so that you will never again bear the disgrace of famine among the nations. '
  '31':
  - type: text
    content: 'Then you will remember your evil ways and the wrongs you have done. Your guilt and evil deeds will cause you to be disgusted with yourselves. '
  '32':
  - type: text
    content: 'People of Israel, I assure you that it is not because you are good '
  - type: note
    content: Or “for your [goodness] sake.”
  - type: text
    content: 'that I am going to do all this. You should be utterly ashamed over your conduct! I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’'
  '33':
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: ‘When I cleanse you from all your guilt '
  - type: text
    content: and shame
  - type: text
    content: ', I will cause your ruined cities to be rebuilt and repopulated again. '
  '34':
  - type: text
    content: 'You will once more farm your barren land. It will not be abandoned anymore, and everyone who passes by will notice it. '
  '35':
  - type: text
    content: 'And they will say: “Look how this once barren land is now like the garden of Eden! All those empty, abandoned cities left in ruins are now strongholds, restored cities with people living in them.” '
  '36':
  - type: text
    content: 'And the nations around you will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have rebuilt the ruined places and replanted what was once desolate. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', make this promise and will do it.’'
  '37':
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: ‘People of Israel, '
  - type: text
    content: as a sign of my favor
  - type: text
    content: ', I will once again answer your prayers. '
  - type: note
    content: Or “I will once more allow myself to be approached by you in prayer, house of Israel, to do this for you.”
  - type: text
    content: 'I will cause your population to increase until you are like a large flock '
  - type: text
    content: of sheep
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'You will be as numerous as the huge flock of sacrificial animals '
  - type: note
    content: Or “flock of holy things [animals].” God is giving Ezekiel the image of the vast numbers of returning exiles becoming as numerous as the large flocks of sheep brought into Jerusalem for the feast days. During the solemn feast days, as many as 37,600 sheep and goats were sacrificed, as well as 3,800 bulls (see 2 Chron. 35:7–9).
  - type: text
    content: 'in Jerusalem during her solemn feasts. Your cities that were once filled with rubble will be filled with flocks of people. And then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: note
    content: 'This sentence (and variations) is repeated over sixty times in Ezekiel: “And they [you] will know that I am Yahweh.”'
  '4':
  - type: text
    content: 'Therefore, hear the word of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you Mountains of Israel! Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has a message for the mountains and hills, the ravines and valleys, the devastated ruins and abandoned cities that have been ransacked '
  - type: text
    content: by your enemies
  - type: text
    content: ' and ridiculed by all the nations around you. '
  '5':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Truly, I speak in my jealous anger against the rest of the nations and to the entire land of Edom. You gleefully and maliciously took possession of my land so that you could plunder its '
  - type: text
    content: fertile
  - type: text
    content: ' pasturelands.’'
  '6':
  - type: text
    content: '“Therefore '
  - type: text
    content: Ezekiel
  - type: text
    content: ', prophesy over the land of Israel, its mountains and hills, its ravines and valleys. Prophesy to them what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have to say: ‘Behold, I speak in my fiery passion because you have endured the vile insults of the nations. '
  '7':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: I raise my hand and solemnly swear that the nations all around you will have their own insults to bear!’ ”'
  - type: heading
    content: God’s Heart for Israel
  '8':
  - type: text
    content: '“ ‘Mountains of Israel, your trees will '
  - type: text
    content: once again
  - type: text
    content: ' grow branches and bear fruit for my people the Israelites. For they will soon return home. '
  '9':
  - type: text
    content: 'Yes, I am for you and on your side; I will turn '
  - type: text
    content: my heart
  - type: text
    content: ' toward you. '
  - type: text
    content: Farmers
  - type: text
    content: ' will plow your ground and plant their seeds. '
