    - type: text
      text: '16'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me this message: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Son of man, the Israelites defiled their own land when they lived there. In my eyes, their conduct was as unclean as a woman’s menstruation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'So I vented my fury on them because of the violence and murders they had committed in the land and because of their worship of idols, which defiled the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'I dispersed them among the nations, and they were scattered throughout different countries. I judged them as their actions and conduct deserved. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When my people were scattered to other lands, they dishonored my holy name in front of those nations. The people said of them, ‘
  - type: usfm
    marker: it
    children:
    - type: text
      text: Look!
  - type: text
    text: ' These are the people of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' who have been forced out of his land.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But I have been greatly concerned about my holy name, which the people of Israel have dishonored among the nations where they have gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Therefore, say to the people of Israel what I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say: ‘I will not take action for your sake, people of Israel, but for the sake of the honor of my holy name, which you have caused to be slandered among the nations wherever you have gone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I am going to magnify the holiness of my great name, which you have greatly dishonored before the eyes of foreign nations. And when I magnify my holiness in you before their eyes, the nations will know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.’ ”'
