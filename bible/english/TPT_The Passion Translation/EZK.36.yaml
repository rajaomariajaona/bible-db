      marker-yv: yv-n
    - type: text
      text: 'I will call for the grain of the field to become plentiful and not allow famine to afflict you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So prophesy to them what I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have to say: ‘Your enemies have attacked you from all directions and turned your land into an empty ruin. This enabled other nations to take possession of your land. You also became the subject of people’s malicious talk and evil slander. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will increase the produce of fruit and field so that you will never again bear the disgrace of famine among the nations. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will remember your evil ways and the wrongs you have done. Your guilt and evil deeds will cause you to be disgusted with yourselves. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People of Israel, I assure you that it is not because you are good '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for your [goodness] sake.”
      marker-yv: yv-n
    - type: text
      text: 'that I am going to do all this. You should be utterly ashamed over your conduct! I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: ‘When I cleanse you from all your guilt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and shame
    - type: text
      text: ', I will cause your ruined cities to be rebuilt and repopulated again. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will once more farm your barren land. It will not be abandoned anymore, and everyone who passes by will notice it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they will say: “Look how this once barren land is now like the garden of Eden! All those empty, abandoned cities left in ruins are now strongholds, restored cities with people living in them.” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the nations around you will know that I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have rebuilt the ruined places and replanted what was once desolate. I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', make this promise and will do it.’'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: ‘People of Israel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a sign of my favor
    - type: text
      text: ', I will once again answer your prayers. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will once more allow myself to be approached by you in prayer, house of Israel, to do this for you.”
      marker-yv: yv-n
    - type: text
      text: 'I will cause your population to increase until you are like a large flock '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of sheep
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You will be as numerous as the huge flock of sacrificial animals '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “flock of holy things [animals].” God is giving Ezekiel the image of the vast numbers of returning exiles becoming as numerous as the large flocks of sheep brought into Jerusalem for the feast days. During the solemn feast days, as many as 37,600 sheep and goats were sacrificed, as well as 3,800 bulls (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 35:7–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'in Jerusalem during her solemn feasts. Your cities that were once filled with rubble will be filled with flocks of people. And then you will know that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 36:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This sentence (and variations) is repeated over sixty times in Ezekiel: “And they [you] will know that I am'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, hear the word of Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you Mountains of Israel! Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has a message for the mountains and hills, the ravines and valleys, the devastated ruins and abandoned cities that have been ransacked '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by your enemies
    - type: text
      text: ' and ridiculed by all the nations around you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: Truly, I speak in my jealous anger against the rest of the nations and to the entire land of Edom. You gleefully and maliciously took possession of my land so that you could plunder its '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fertile
    - type: text
      text: ' pasturelands.’'
  '6':
