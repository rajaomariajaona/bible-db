document_id: EZK.42,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sacred Rooms for the Priests
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' man brought me northward into the outer court and brought me to the rooms opposite the temple courtyard and opposite the outer wall on the north side. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These south side rooms were like those rooms on the north side, with the same entry and exit doors and the same dimensions. There was also an entrance to the rooms at the beginning of the walkway—the walkway before the corresponding wall that faced east.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' man said to me, “The northern and southern rooms facing the courtyard are holy chambers, the place where the priests who approach '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will eat the most holy offerings. Because this is a holy place, the most holy offerings will be stored there: the grain offering, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 2:1–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 6:14–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the sacrifice for sin, and the guilt offering. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the priests have served inside the temple, they must first take off their priestly garments and leave them in the rooms before going out into the courtyard. Their priestly garments are holy, so they must change their clothes before going near other people.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “before going near the places reserved for the common people.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Measurements of the Temple Compound
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shining
    - type: text
      text: ' man had finished measuring the inner temple area, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “the inner house.” The Hebrew term used here is one sometimes used for the Holy of Holies (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 6:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'he took me out through the east gate and measured the outside wall of the temple compound. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Using his measuring rod, he measured all the east side as five hundred cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 875 feet (265 meters). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'total. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He measured all the north side as five hundred cubits by the measuring rod. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He measured all the south side as five hundred cubits by the measuring rod. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he turned to the west side and measured it as five hundred cubits by the measuring rod. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Along the front, the building was one hundred cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 175 feet (53 meters). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'long on the north side and fifty cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 87.5 feet (26.5 meters). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'wide. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And so he measured the temple compound on all four sides. The wall of the temple compound was five hundred cubits square, to mark the boundary between what was holy and what was common.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On one side of the building was the twenty-cubit-wide '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 35 feet (10.6 meters).
      marker-yv: yv-n
    - type: text
      text: 'plaza of the inner courtyard. On the other side was the paved walkway of the outer courtyard. The building itself was three stories high and had balconies. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in front of the rooms was an inner passageway, ten cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 17.5 feet (5.3 meters).
      marker-yv: yv-n
    - type: text
      text: 'wide and one hundred cubits long, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: According to the Septuagint and Syriac. However, the Hebrew text reads “by way of a cubit.”
      marker-yv: yv-n
    - type: text
      text: 'and all their doors faced north. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The top-floor rooms were narrower than those on the middle and bottom stories of the building because the balconies took up some of the space of the lower stories. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The rooms on the third floor had no columns like the pillars of the outer courtyard. That is why the top story was narrower than the middle and bottom stories. The rooms became smaller the higher they went.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was a wall in the outer courtyard, parallel to the rooms, that was fifty cubits long. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The wall was like this because the row of rooms along the outer courtyard was fifty cubits long, while the row of rooms that faced the temple was one hundred cubits long. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Beneath the rooms there was an entrance facing east so that a person could enter them from the outer court.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the south side '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “in the direction toward the east,” which is believed to be a scribal error.
      marker-yv: yv-n
    - type: text
      text: 'of the temple, along the broad wall of the outer court, adjoining the temple courtyard, facing the outer wall there was a building containing rooms, with a passageway in front of them. '
