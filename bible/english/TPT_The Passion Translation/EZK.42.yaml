document_id: EZK.42,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sacred Rooms for the Priests
  - type: text
    content: 'Then the '
  - type: text
    content: shining
  - type: text
    content: ' man brought me northward into the outer court and brought me to the rooms opposite the temple courtyard and opposite the outer wall on the north side. '
  '11':
  - type: text
    content: These south side rooms were like those rooms on the north side, with the same entry and exit doors and the same dimensions. There was also an entrance to the rooms at the beginning of the walkway—the walkway before the corresponding wall that faced east.
  '13':
  - type: text
    content: 'The '
  - type: text
    content: shining
  - type: text
    content: ' man said to me, “The northern and southern rooms facing the courtyard are holy chambers, the place where the priests who approach '
  - type: text
    content: Yahweh
  - type: text
    content: ' will eat the most holy offerings. Because this is a holy place, the most holy offerings will be stored there: the grain offering, '
  - type: note
    content: See Lev. 2:1–16; 6:14–23.
  - type: text
    content: 'the sacrifice for sin, and the guilt offering. '
  '14':
  - type: text
    content: When the priests have served inside the temple, they must first take off their priestly garments and leave them in the rooms before going out into the courtyard. Their priestly garments are holy, so they must change their clothes before going near other people.”
  - type: note
    content: Or “before going near the places reserved for the common people.”
  - type: heading
    content: Measurements of the Temple Compound
  '15':
  - type: text
    content: 'When the '
  - type: text
    content: shining
  - type: text
    content: ' man had finished measuring the inner temple area, '
  - type: note
    content: Or literally “the inner house.” The Hebrew term used here is one sometimes used for the Holy of Holies (see 1 Kings 6:27).
  - type: text
    content: 'he took me out through the east gate and measured the outside wall of the temple compound. '
  '16':
  - type: text
    content: 'Using his measuring rod, he measured all the east side as five hundred cubits '
  - type: note
    content: About 875 feet (265 meters). Also vv. 17, 18, 19, 20.
  - type: text
    content: 'total. '
  '17':
  - type: text
    content: 'He measured all the north side as five hundred cubits by the measuring rod. '
  '18':
  - type: text
    content: 'He measured all the south side as five hundred cubits by the measuring rod. '
  '19':
  - type: text
    content: 'Then he turned to the west side and measured it as five hundred cubits by the measuring rod. '
  '2':
  - type: text
    content: 'Along the front, the building was one hundred cubits '
  - type: note
    content: About 175 feet (53 meters). Also vv. 4, 8.
  - type: text
    content: 'long on the north side and fifty cubits '
  - type: note
    content: About 87.5 feet (26.5 meters). Also vv. 7, 8.
  - type: text
    content: 'wide. '
  '20':
  - type: text
    content: And so he measured the temple compound on all four sides. The wall of the temple compound was five hundred cubits square, to mark the boundary between what was holy and what was common.
  '3':
  - type: text
    content: 'On one side of the building was the twenty-cubit-wide '
  - type: note
    content: About 35 feet (10.6 meters).
  - type: text
    content: 'plaza of the inner courtyard. On the other side was the paved walkway of the outer courtyard. The building itself was three stories high and had balconies. '
  '4':
  - type: text
    content: 'And in front of the rooms was an inner passageway, ten cubits '
  - type: note
    content: About 17.5 feet (5.3 meters).
  - type: text
    content: 'wide and one hundred cubits long, '
  - type: note
    content: According to the Septuagint and Syriac. However, the Hebrew text reads “by way of a cubit.”
  - type: text
    content: 'and all their doors faced north. '
  '5':
  - type: text
    content: 'The top-floor rooms were narrower than those on the middle and bottom stories of the building because the balconies took up some of the space of the lower stories. '
  '6':
  - type: text
    content: The rooms on the third floor had no columns like the pillars of the outer courtyard. That is why the top story was narrower than the middle and bottom stories. The rooms became smaller the higher they went.
  '7':
  - type: text
    content: 'There was a wall in the outer courtyard, parallel to the rooms, that was fifty cubits long. '
  '8':
  - type: text
    content: 'The wall was like this because the row of rooms along the outer courtyard was fifty cubits long, while the row of rooms that faced the temple was one hundred cubits long. '
  '9':
  - type: text
    content: Beneath the rooms there was an entrance facing east so that a person could enter them from the outer court.
  - type: text
    content: 'On the south side '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “in the direction toward the east,” which is believed to be a scribal error.
  - type: text
    content: 'of the temple, along the broad wall of the outer court, adjoining the temple courtyard, facing the outer wall there was a building containing rooms, with a passageway in front of them. '
