        text: There is no definite article before clouds. It is literally “in clouds.” Where the identifying article is missing, it often speaks of quality, or it is used as a descriptive term. The Greek word for “cloud” is often used in the Greek classics of a large body of individuals, and it is so used in this symbolic way in
