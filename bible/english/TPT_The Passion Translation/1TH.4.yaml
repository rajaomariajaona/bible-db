        text: is used as a figure of speech in Greek literature during the time Paul wrote this letter. The book of Enoch and the Dead Sea Scrolls use the same Greek word and imagery to describe spiritual victory, not a “rapture.” The word can describe being caught up in the victory of Christ’s unveiling. Also, there are Jewish apocalyptic texts that use the same phrasing as Paul’s writings but have nothing to do with a physical rapture.
    marker-yv: yv-n
  - type: text
