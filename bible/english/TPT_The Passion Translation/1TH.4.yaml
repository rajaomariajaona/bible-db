segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Holiness and Love
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And now, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beloved
  - type: text
    text: ' brothers and sisters, since you have been mentored by us with respect to living for God and pleasing him, I appeal to you in the name of the Lord Jesus with this request: keep faithfully growing through our teachings even more and more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For you already know the instructions we’ve shared with you through the Lord Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'God’s will is for you to be set apart for him in holiness and that you keep yourselves '
  - type: usfm
    marker: it
    children:
    - type: text
      text: unpolluted
  - type: text
    text: ' from sexual defilement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Yes, each of you must guard your sexual purity '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Each of you must possess your vessel equipment.” Some see the “equipment” as a wife, but in the context it is sexual purity, not marriage, that is in view. The “vessel” is our body, including sexual urges that must be kept pure and holy with self-respect.
    marker-yv: yv-n
  - type: text
    text: 'with holiness and dignity, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'not yielding to lustful passions like those who don’t know God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Never take selfish advantage '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although technically Paul uses a term for a business transaction, it is more likely, due to the context, a warning about cheating others by enticing them to sexual immorality.
    marker-yv: yv-n
  - type: text
    text: 'of a brother or sister in this matter, for we’ve already told you and solemnly warned you that the Lord is the avenger in all these things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For God’s call on our lives is not to a life of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: compromise and
  - type: text
    text: ' perversion but to a life surrounded in holiness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore, whoever rejects this instruction isn’t rejecting human authority but God himself, who gives '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is in the present tense.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: us his precious gift
  - type: text
    text: —his Spirit of holiness.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loving Others
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'There’s no need for anyone to say much to you about loving your fellow believers, for God is continually teaching you to unselfishly love one another. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “God-teaching” (Gr.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: theodidaktos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) of divine love came to us through Christ. God taught us to love by his example of giving us his Son.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Indeed, your love is what you’re known for throughout Macedonia. We urge you, beloved ones, to let this unselfish love increase '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and flow through you
  - type: text
    text: ' more and more. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aspire '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Make it your driving ambition.”
    marker-yv: yv-n
  - type: text
    text: 'to lead a calm and peaceful life as you mind your own business '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Keep your covenants” (promises).
    marker-yv: yv-n
  - type: text
    text: 'and earn your living, just as we’ve taught you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: By doing this you will live an honorable life, influencing others and commanding respect of even the unbelievers. Then you’ll be in need of nothing and not dependent upon others.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, self-supporting (financially).
    marker-yv: yv-n
