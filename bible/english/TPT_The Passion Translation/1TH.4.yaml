        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “about those who have fallen asleep.” Paul uses sleep as a euphemism for death.
    marker-yv: yv-n
  - type: text
    text: 'so that you won’t be overwhelmed with grief like many others who have no hope. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if we believe that Jesus died and rose again, we also believe that God will bring with Jesus those who died while believing in him. '
  - type: usfm
