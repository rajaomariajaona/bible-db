  '17':
  - type: text
    content: “I will replace your copper with gold,
  - type: text
    content: your iron with silver,
  - type: note
    content: These items are seen elsewhere in Scripture as symbols. Copper (brass) is a frequent symbol of judgment and gold a common symbol of the divine nature. God replaces our guilt with godliness. Unyielding iron can be seen as a symbol of stubbornness and silver is a common symbol of redemption.
  - type: text
