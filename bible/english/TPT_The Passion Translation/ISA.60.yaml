    content: The Glorious New Day
  - type: text
    content: '“Rise up in splendor and be radiant, '
  - type: note
    content: Or “break forth with the light of [a new] day.” See Eph. 5:27. Applying vv. 1–2 to the church, we see both Jesus as the Light that shines upon us (see John 8:12; 2 Cor. 4:6) and the church as the light shining upon the nations (see Matt. 5:14–16).
  - type: text
    content: for your light has dawned,
  - type: text
    content: 'and '
  - type: text
    content: Yahweh
  - type: text
    content: '’s glory '
  - type: note
    content: 'Here Isaiah begins a new section in his masterpiece. The theme of these last seven chapters is “The Glorious New Day,” corresponding to the Feast of Tabernacles. The Hebrew word for “glory” appears twenty-three times in chs. 60–66. A possible outline of these chapters is as follows: A New Day (ch. 60), A New Priesthood (ch. 61), A New Wedding (ch. 62), A New Mercy (ch. 63), A New Prayer (ch. 64), A New Heaven and a New Earth (ch. 65), and A New Jerusalem (ch. 66).'
  - type: text
    content: now streams from you!
  - type: note
    content: Or “is risen like a sunrise upon you.”
