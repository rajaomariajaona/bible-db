  '3':
  - type: text
    content: Nations will be attracted to your radiant light
  - type: note
    content: Or “Nations will walk by your light.” Light is often seen as a biblical metaphor for understanding and revelation. See Eph. 1:18.
  - type: text
    content: and kings to the sunrise-glory of your new day.
  - type: note
    content: Or “to the brightness of your sunrise.” The sunrise of our new day came at the resurrection of Jesus Christ.
  '4':
