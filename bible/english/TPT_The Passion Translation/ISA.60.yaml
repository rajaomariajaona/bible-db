  - type: text
    content: and your daughters are being tenderly carried home.
  - type: text
    content: Watch as they all gather together, eager to come back to you!”
  - type: heading
    content: Zion’s Wealth
  '5':
  - type: text
    content: “Then you will see with understanding and be radiant.
  - type: note
    content: Or “As you understand you will sparkle.” The Hebrew word nahar can also be translated “flow together.” So this verse could also read “As you understand, you will flow together.”
  - type: text
    content: Your heart will be thrilled and swell with joy.
  - type: text
    content: The fullness of the sea will flow to you
  - type: note
    content: This is not simply fish, but the fullness of the nations, the sea of humanity. See Rom. 11:25.
  - type: text
    content: 'and the wealth '
  - type: note
    content: Or “forces [armies],” “virtues,” “strength,” “might,” “power,” “riches,” or “goods.”
  - type: text
    content: of the nations will be transferred to you!
  '6':
