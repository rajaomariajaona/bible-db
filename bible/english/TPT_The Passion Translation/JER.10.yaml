        text: 'The Hebrew is uncertain and difficult to translate. Possible meanings include: (1) “I will cause them to suffer greatly until they really are in pain.” (2) “I will inflict great pain on them, which they will really feel.” Or, more literally, (3) “I will bring distress that they find [meet with].” Or, if with a passive verb (see LXX, Vulg.), (4) “they will be found [captured].” Or, if the Hebrew vowels are emended, (5) “they will be squeezed out [drained] from the land.” See G. R. Driver, “Linguistic and Textual Problems: Jeremiah,”'
