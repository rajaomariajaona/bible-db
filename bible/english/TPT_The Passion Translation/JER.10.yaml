document_id: JER.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Has No Rivals
  - type: text
    content: ' '
  - type: note
    content: 'Chapter 10 concludes Jeremiah’s temple message: The Threat of Exile (see 7:1–10:25), reminding Judah that Yahweh is the true God and that the idols of the nations are nothing. The chapter ends with the prophet Jeremiah praying for his people.'
  - type: text
    content: 'Israel! Hear the word '
  - type: text
    content: Yahweh
  - type: text
    content: ' speaks to you.'
  '10':
  - type: text
    content: Only
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ' is the true and living God,'
  - type: text
    content: the King of all ages!
  - type: note
    content: This means much more than a king ruling forever as it also conveys the idea of being the ruler over time and history, forever.
  - type: text
    content: At his fury the earth trembles,
  - type: text
    content: and nations crumble before his wrath.
  - type: note
    content: See Joel 2:11.
  '11':
  - type: text
    content: '“Say to them:'
  - type: note
    content: 'This verse is in Aramaic, suggesting it may have been the text from a letter sent by Jeremiah to Jehoiachin and the exiles in Babylon. “The Aramaic language was widely used in diplomacy and commerce during the years of the Assyrian Empire, i.e., 1100–605 BC (Overholt 1965: 5; cf. 2 Kgs 18:26), and even more during the years of the Babylonian Empire” (Jack R. Lundbom, Jeremiah 1–20, Anchor Yale Bible Commentary, vol. 21A [New Haven, CT: Yale University Press, 1999]).'
  - type: text
    content: “ ‘The gods who did not create the heavens and the earth
  - type: text
    content: will be destroyed from the earth and from under the heavens.’ ”
  - type: heading
    content: A Song of Praise
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ' made the earth by his '
  - type: text
    content: glorious
  - type: text
    content: ' power'
  - type: text
    content: 'and firmly established it by his '
  - type: text
    content: great
  - type: text
    content: ' wisdom.'
  - type: text
    content: By his skill he stretched out the sky.
  '13':
  - type: text
    content: When he speaks, the heavenly ocean roars!
  - type: text
    content: He makes the clouds rise from the distant horizon.
  - type: text
    content: He launches his lightning in the midst of the rain
  - type: text
    content: and unleashes his stormy winds from heaven’s storehouses.
  - type: note
    content: Enoch described these “storehouses” (1 Enoch 17–18).
  - type: text
    content: Out of his treasuries of rain, lightning bolts, and stormy winds,
  - type: text
    content: he launches them forth.
  '14':
  - type: text
    content: Everyone is ignorant, knowing nothing.
  - type: text
    content: Every craftsman is shamed by the idols they make
  - type: text
    content: since their idols are nothing but lifeless lies.
  '15':
  - type: text
    content: What they make is worthless—nothing but a joke!
  - type: text
    content: 'When '
  - type: text
    content: Yahweh
  - type: text
    content: ' comes to punish them, they will perish.'
  '16':
  - type: text
    content: 'You idols are nothing like '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the true Treasure of Jacob.
  - type: text
    content: For he created the universe
  - type: text
    content: and has chosen Israel to be his inheritance.
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, is his name.'
  - type: heading
    content: The Coming Exile
  '17':
  - type: text
    content: Jerusalem
  - type: text
    content: ', you besieged city, pack up your belongings'
  - type: text
    content: and get ready to leave the land
  - type: text
    content: .
  '18':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Look! I am throwing you off the land,
  - type: text
    content: and I will bring you distress until you are captured.”
  - type: note
    content: 'The Hebrew is uncertain and difficult to translate. Possible meanings include: (1) “I will cause them to suffer greatly until they really are in pain.” (2) “I will inflict great pain on them, which they will really feel.” Or, more literally, (3) “I will bring distress that they find [meet with].” Or, if with a passive verb (see LXX, Vulg.), (4) “they will be found [captured].” Or, if the Hebrew vowels are emended, (5) “they will be squeezed out [drained] from the land.” See G. R. Driver, “Linguistic and Textual Problems: Jeremiah,” The Jewish Quarterly Review 28, no. 2 (1937): 107.'
  - type: heading
    content: Jeremiah Brokenhearted
  '19':
  - type: text
    content: 'Woe is me '
  - type: note
    content: 'The majority opinion of scholars is that the one crying out is Jeremiah; however, because of a few plural pronouns, some conclude that it is the people of Jerusalem (or Jerusalem personified) who are crying out. See William McKane, A Critical and Exegetical Commentary on the Book of Jeremiah, The International Critical Commentary, vol. 1 (Edinburgh: T & T Clark, 1986), 230–35.'
  - type: text
    content: —my brokenness!
  - type: text
    content: My wound is incurable.
  - type: text
    content: 'I once said:'
  - type: text
    content: “Oh, I must bear this suffering,”
  - type: text
    content: and I assumed I could endure it.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Do not adopt the ways of other nations
  - type: note
    content: This refers to the religious customs and ungodly practices of foreign nations (see vv. 3–5).
  - type: text
    content: 'or be terrified by '
  - type: text
    content: unusual
  - type: text
    content: ' signs in the heavens'
  - type: note
    content: See Deut. 18:10. These signs refer to such things as comets, meteors, eclipses, blood moons, alignment of planets and stars, and so on. The Babylonians and other religious systems saw them as portents of evil. However, God can use a heavenly sign to point to something good coming to the earth (e.g., the star of Bethlehem).
  - type: text
    content: 'even though the '
  - type: text
    content: unbelieving
  - type: text
    content: ' nations are in awe of them.'
  '20':
  - type: text
    content: 'But my tent '
  - type: note
    content: 'The land was being described by Jeremiah as a land that has already been overthrown. Some scholars view the “tent” as a reference to the temple and its curtains. See F. Kenro Kumaki, “A New Look at Jer. 4:19–22 and 10:19–21,” Annual of the Japanese Biblical Institute 8 (1982): 114.'
  - type: text
    content: has been torn down,
  - type: text
    content: and all my cords are severed.
  - type: text
    content: I’ll never see my children again, for they have left me.
  - type: note
    content: See Lam. 1:5.
  - type: text
    content: There is no one left to stretch out my tent
  - type: text
    content: and no one who can hang my curtains.
  '21':
  - type: text
    content: 'For the leaders '
  - type: note
    content: Or “shepherds.”
  - type: text
    content: of the nation
  - type: text
    content: ' are foolish,'
  - type: text
    content: 'and they refuse '
  - type: text
    content: Yahweh
  - type: text
    content: ’s guidance.
  - type: text
    content: 'Therefore, '
  - type: text
    content: without insight
  - type: text
    content: ', they have not prospered,'
  - type: text
    content: and all their flocks are scattered.
  '22':
  - type: text
    content: Look, there is news to report!
  - type: text
    content: 'There’s a roar and a rumble '
  - type: note
    content: Or possibly “a rushing [of chariots].”
  - type: text
    content: coming from the north,
  - type: note
    content: That is, Babylon.
  - type: text
    content: coming to make the cities of Judah a rubble
  - type: text
    content: and turn it into a den of jackals.
  '23':
  - type: text
    content: 'Now, I know, O  '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: that our destinies are not our own to choose,
  - type: text
    content: and it is not in our power to direct our own steps.
  '24':
  - type: text
    content: 'Correct us, '
  - type: text
    content: Yahweh
  - type: text
    content: ', according to what is right,'
  - type: text
    content: but go easy on us
  - type: text
    content: —
  - type: text
    content: don’t correct us in your anger,
  - type: text
    content: or there would be nothing left of us.
  '25':
  - type: text
    content: Vent your anger and pour it out
  - type: text
    content: on all these nations around us.
  - type: text
    content: They’re the ones who do not worship you.
  - type: text
    content: See how they’ve attacked the people of Jacob,
  - type: text
    content: consuming the land and leaving it desolate.
  - type: note
    content: See Ps. 79:6. Although the Babylonian captivity had not yet happened, Jeremiah spoke of it as a settled fact.
  '3':
  - type: text
    content: For the religious practices of the nations are delusions.
  - type: note
    content: Or “nothings.”
  - type: text
    content: They cut down a tree from the forest,
  - type: text
    content: then a craftsman fashions it with his hands.
  '4':
  - type: text
    content: 'He adorns his '
  - type: text
    content: idol
  - type: text
    content: ' with silver and gold'
  - type: text
    content: and takes hammer and nails to secure it
  - type: text
    content: so it won’t wobble.
  '5':
  - type: text
    content: 'Their '
  - type: text
    content: idols
  - type: text
    content: ' are like speechless scarecrows standing in a field;'
  - type: text
    content: someone must carry them around because they can’t even take a step.
  - type: text
    content: 'So don’t fear them '
  - type: text
    content: in any way
  - type: text
    content: ','
  - type: text
    content: for they are incapable of doing good or evil.”
  - type: heading
    content: King of the Nations
  '6':
  - type: text
    content: Yahweh
  - type: text
    content: ', there is no God like you;'
  - type: note
    content: See Ex. 15:11.
  - type: text
    content: you are unrivaled in your greatness and might!
  - type: text
    content: The power of your name is so great!
  '7':
  - type: text
    content: King of the nations,
  - type: text
    content: who would not fear you?
  - type: note
    content: See Rev. 15:3–4.
  - type: text
    content: Yes, it is proper to reverence you.
  - type: text
    content: Among all the wise ones of the nations
  - type: text
    content: and among all their royal ones,
  - type: text
    content: 'there is still no one as '
  - type: text
    content: magnificent as
  - type: text
    content: ' you.'
  '8':
  - type: text
    content: What wisdom could they glean from a block of wood?
  - type: text
    content: They are foolish blockheads, one and all.
  '9':
  - type: text
    content: They cover their idols with beaten, refined silver
  - type: note
    content: 'Or “silver from Tarshish.” Tarshish possibly means “refinery,” thus, refined silver. See John A. Thompson, The Book of Jeremiah, The New International Commentary on the Old Testament (Grand Rapids, MI: Eerdmans, 1980), 329.'
  - type: text
    content: and gold, even fine gold.
  - type: note
    content: Or “gold from Uphaz.” The Targum, Syriac, and some ancient versions have “the gold of Ophir,” which was renowned for its quality. See Dan. 10:5 and the third footnote.
  - type: text
    content: The hammer of a craftsman
  - type: text
    content: 'and the hands of a goldsmith '
  - type: text
    content: craft their image
  - type: text
    content: ','
  - type: text
    content: robing them in garments of violet and purple.
  - type: text
    content: They are nothing but the work of human hands.
