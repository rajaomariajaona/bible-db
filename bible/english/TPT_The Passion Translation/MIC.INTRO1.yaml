    - type: text
      text: ', 7:18, 20) and grace of God, who promised to pardon his people for their sin, renew them in his love, and remain faithful to his covenant promises given to the patriarchs of the nation, Abraham, Isaac (implied), and Jacob, along with their descendants. That, of course, is an immutable guarantee of the fulfillment of the redemptive promises of God that came to ultimate fruition in the gospel, the person and work of Jesus Christ.'
