      - type: text
        text: ’s Covenant Faithfulness.
    - type: text
      text: ' The concluding three verses of the book of Micah (7:18–20) serve as a fitting climax to the powerful contrasting themes of the prophecy. The sole foundation of Israel and Judah’s hope of deliverance from the wrath of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', along with the prospect of their forgiveness and spiritual renewal, lies in the faithful promises of their covenant Lord and God. And it is not a vain hope but an absolute certainty, a hope that is grounded in the promised anticipation of the coming Messianic King (5:1–5a), which constitutes the final major theme of the book of Micah.'
