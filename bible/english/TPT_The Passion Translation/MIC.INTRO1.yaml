      - type: text
        text: Seeing Jesus in the Book.
    - type: text
      text: ' There is no doubt that the climactic prophetic oracle of the book of Micah is in the opening five verses of chapter 5. The whole focus of this Messianic prophecy is to guarantee the people of Israel and Judah that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', their covenant God, will provide them with a royal leader who will guarantee their everlasting peace, joy, and—in the context of the prophecy as a whole—their forgiveness. The pinpoint accuracy of this prophetic oracle can be fully appreciated when one considers that there are, in fact, two towns of Bethlehem within Israel and Judah. One is located in the northern region of Galilee near the town of Nazareth, where Jesus spent his boyhood; the other is Bethlehem in Judea (i.e., Ephrathah), not far from Jerusalem, the place to which Mary and Joseph were directed to go for the census of Caesar Augustus and, of course, where Jesus was born. The Micah prophecy is quite explicit in naming the latter location as the birthplace of the future Messianic King of the Jews, and the Gospel accounts of Jesus’ birth (Matt. 2:6; Luke 2:4–5) make Micah’s prophetic reference to Bethlehem in Judea undeniably accurate. In addition to the prophecy of Micah 5, there is another likely Messianic prophecy to be found in Micah 4:8, where '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares that “His kingship will come to you, Daughter Jerusalem,” and the Messianic age is hinted at in 2:13; 4:1–9; 5:2–8; 7:1–7.'
