      - type: text
        text: Visions of Hope and Renewal.
    - type: text
      text: ' Visions of hope and renewal constitute the powerful contrasts to the oracles of judgment and catastrophe in the book of Micah. They are set in juxtaposition with those oracles of doom. These hopeful visions are found in 2:12–13; 4:1–13; 5:5–15; 7:7–17. They carry not only the divine promises of physical restoration of the land of Israel and Judah and socio-economic renewal but also guarantees of pardon for the people of God and the spiritual renewal of the nation’s relationship with her covenant Lord.'
