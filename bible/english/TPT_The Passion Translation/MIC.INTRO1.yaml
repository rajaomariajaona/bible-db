    - type: text
      text: '’s wrathful judgment against his people for their sins (2:4; 7:4) and the extending of his rich blessings toward them: deliverance from their enemies—Assyria and Babylon—as well as their promised spiritual renewal (4:1, 6; 5:10; 7:11–12).'
