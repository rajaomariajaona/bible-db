    - type: text
      text: About the Book of Micah
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'The books of the twelve Minor Prophets are some of the least studied by Christians today, but they contain some of the great themes of Scripture, such as God’s mercy and judgment, his covenant with Israel, the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and the coming of the Messiah.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: As with the book of Hosea, the original Hebrew text of Micah is in rough shape. Some parts are very challenging to translate. You will notice many divergent renderings when comparing different English translations of Micah. We are all searching for a faithful transmission of Micah’s unique voice.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'While Micah was living in the Southern Kingdom of Judah, the Northern Kingdom (Israel) was destroyed by the Assyrians (722 BC), and the “ten lost tribes” have never been restored in a reorganized manner. Judah, with its capital in Jerusalem, carried the covenant forward alone from this point on. We get the English word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jew
    - type: text
      text: ' from the Hebrew word for the people of Judah.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Micah was active between the mid-700s BC and the early 600s BC. Judah was coming off the prosperous reign of Uzziah (Azariah), who suffered from leprosy. Thus, Micah was prophesying during a period of relative decline from a national high point.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Micah’s lifetime included the reigns of the following kings of Judah (the Southern Kingdom):'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: • Jotham (742–735 BC). He was coregent during the rule of Uzziah, who had leprosy, then king in his own right. Jotham maintained some degree of prosperity. There were some military victories. His reign was a season of much building and construction.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: • Ahaz (735–715 BC). The great enemy Assyria emerged on the northeast horizon. Syria (732 BC) and then Samaria of the Northern Kingdom of Israel (722 BC) fell to the Assyrians. Ahaz was a weak king; in some ways Judah became a vassal state of Assyria during his reign.
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: • Hezekiah (715–687 BC). Around the year 701 BC, the Assyrians invaded Judah and surrounded Jerusalem, but they were ultimately unsuccessful. Hezekiah attained more freedom from Assyria. He purified the worship culture in Jerusalem (see Jer. 26:17–19, which mentions how Hezekiah listened to Micah).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: For more about historical events occurring as the backdrop to Micah’s life and work, see 2 Kings 15:32–20:21, 2 Chronicles 27–32, and Isaiah 7, 20, and 36–39.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Micah is used in several Jewish liturgies, especially 7:18–20 with its emphasis on the hurling of our sins into the depths of the sea.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Some key verses in Micah are 5:2, which foretells the Messiah to be born in Bethlehem, and 6:8, which proclaims what God wants from us and is one of the most quoted verses in the Bible.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Purpose
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Micah’s period in history was a very uncertain time. The new superpower to the northeast, Assyria, was picking off smaller nations one by one and inching closer and closer to Jerusalem. Looking ahead, the book also mentions Babylon, which would, a century later, follow Assyria with a second wave of invasions into the Holy Land. Micah brought small-town bluntness and commonsense wisdom to address the perils, both internal and external, of his time.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The internal challenge manifested itself primarily in corruption and bad leadership. Also, worship had become a sham, and people had neglected the heart of their faith (Mic. 6:6–8).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Externally, the threat was from Assyria, a massive and expanding empire centered in Nineveh (see the book of Jonah). This threat increased markedly from the mid-700s onward. Like dominoes, Syria, the Northern Kingdom of Israel, and then even Jerusalem came under siege as the Assyrians marched southward.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Thus, Micah saw himself as promoting hope and God’s unchanging and faithful love in a politically and militarily hopeless situation in which both internal and external threats demanded an urgent response. Unwilling to simplistically put all the blame on the people of Judah or on the Assyrians, Micah threaded the needle in a sophisticated and balanced way, showing that there was enough blame to go around and that something needed to be done—immediately. He called the people back to the foundation of what made them Israel in the first place: their divine call “to promote justice, to love kindness, and to walk humbly with your God” (6:8).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: In the face of impossible odds confronting Judah, Micah crafted a great hope that would “stick” even if the Assyrians and/or Babylonians won the day and Jerusalem was eventually destroyed (something he never lived to see). A new royal leader, a Messiah (Hebrew for “Anointed One”), would be called forth from Bethlehem to gather, shepherd, and protect the people. The dynasty of David would be restored. And people of all the nations would flow toward Jerusalem’s abundance.
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Author and Audience
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Micah’s name means “Who is like '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' [in question or statement form]” (see Ex. 15:11; Ps. 89:5–6; Mic. 7:18). Micah was a rough-edged country genius, not a sophisticated urbanite from Jerusalem. This folksy powerhouse emerged out of Moresheth, a small town in the southwest lowlands (Shephelah) on the edge of Judah’s territory. Since he was not classically educated, his potent, pithy, and colloquial language must have sounded almost vulgar to the elites in Jerusalem. He undoubtedly had a country accent. Yet the decadent rulers, prophets, and priests of the big city did not intimidate him in the least. Micah would stand his ground and speak his mind. However, his unvarnished style makes some passages in the book among the hardest in the Old Testament to translate.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Much like Amos, Micah is considered one of the rustic prophets who did not come out of the educated insider intelligentsia. He was a contemporary of Isaiah, whose soaring rhetoric (e.g., “The Wonderful One, the Extraordinary Strategist, the Mighty God, the Father of Eternity, the Prince of Peace!” from Isa. 9:6) was the polar opposite of the rough-barbed warnings of our rustic from Moresheth. A historical parallel would be the AD 1511 trip of (an equally earthy and forthright) Martin Luther to Rome, which produced parallel outbursts of indignation on his part. Amos trained his megaphone on the Northern Kingdom while Micah did the same against Jerusalem, Judah, and their enemies.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Micah was a master of paronomasia, or sophisticated and potent wordplay (Mic. 1:10–16 and elsewhere). This is a skill common among contemporary rappers today. Most English translations do not bring this across well, and The Passion Translation makes a humble attempt to correct that.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Micah’s communication style can be described in the following way:'
  - type: usfm
    marker: imq
    children:
    - type: text
      text: Vividness and emphasis, lightning flashes of indignation at social wrongs, rapid transitions from threatening to mercy, vehement emotion and sympathetic tenderness, rhetorical force, cadence and rhythm at times elevated and sublime,—these are among the prophet’s outstanding literary characteristics.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: George Livingston Robinson,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Twelve Minor Prophets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(New York: Harper and Brothers Publishers, 1926), 104.'
      marker-yv: yv-n
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Micah focused his wrath like a laser beam on Jerusalem, but his prophecies break outward like ripples in a pond to all Israel and her enemies, skipping out into the New Testament era and even into our present day, with restorative Messianic and kingdom passages, hopes which continue to anchor our souls.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'The direct targets of his prophecy, however, were the leaders of the tribe of Judah, including kings, prophets, priests, and all insiders (especially in chapters 3, 6, and 7). As only an outsider can, Micah called these leaders to account for their corruption. It’s a good thing when capable people rise to the top in any system, but it’s all too common that they bend the rules to benefit themselves when they get there. Those of us who are financially and socially secure must ask ourselves, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Now that I have some political and/or economic power, am I misusing this strength to keep others from upward mobility?
    - type: text
      text: ' Corruption has always and will always tempt those with access to the levers of influence.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: But Micah was not all about condemnation. As is common in other prophetic books, these pages express a mixed message of both threat and promise. “Micah, like other contemporary prophets, alternates oracles of doom and denunciation with oracles of hope and salvation.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Juan I. Alfaro,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Justice and Loyalty: A Commentary on the Book of Micah'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ITC (Grand Rapids, MI: Eerdmans, 1989), 8.'
      marker-yv: yv-n
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Major Themes
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Corruption and Failures of Leadership.
    - type: text
      text: ' The spiritual, economic, and moral corruption of Israel’s and Judah’s leaders is one of the dominant features of the book of Micah, highlighted particularly in 1:3–2:11; 3:1–12; 6:1–16; 7:1–6. Although the general population of Israel and Judah were included in this indictment, the prophet laid key responsibility for the corruption squarely at the feet of the nation’s civil and spiritual leaders. Micah denounced the nation’s prophets and condemned them for their false teaching, lying, and deception (2:6–11; 3:5–7). Then he condemned the civil leaders for their cruel exploitation of the people, reducing them to poverty, denying them justice in the courts, and generally making their lives miserable (3:1–4, 8–12).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Micah also explicitly indicted the priests, alongside civil leaders and prophets, for demanding money from the general population in return for their services. Not only did they disdain and shirk their obligations under the law, but on top of that they brazenly claimed that they were immune from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s displeasure and judgment (3:11–12).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Those in authority have the responsibility to act justly (6:8) and to do the right thing even when it is to their disadvantage. And there is much at stake here. Why should God protect a corrupt society against a foreign invader? Many of you reading this may be in positions of leadership, everything from leading a family or a Bible study group to running a large corporation or sitting in a national legislature. Those of us who are leaders should read Micah with extra care, seeking to walk humbly under God’s authority as we exercise authority ourselves. The indisputable guilt of the population in general for their spiritual, economic, and moral corruption is also emphasized in 6:9–16.
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: ’s Legal Indictment against Israel.
    - type: text
      text: ' Micah calls for intelligent, differentiated justice. This is a constant biblical theme. Human beings often tend toward selfishness. The principal Hebrew word for “justice” ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: mishpat
    - type: text
      text: ) also carries a sense of discernment and wisdom, not just equality for equality’s sake.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'In the book of Micah, however, a certain component of the divine administration of justice is particularly significant. It is bound up in the concept of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rib
    - type: text
      text: '. This Hebrew term can have several meanings, the most common of which are “dispute,” “quarrel,” and “charge” or “case [at law].” It is the last of these denotations that is especially relevant for Micah: where a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rib
    - type: text
      text: ' (case at law) of God’s is concerned, it usually includes a legal, divine indictment that takes place in the heavenly courtroom. This concept is especially significant in the Hebrew canonical prophets, such as, for example, Jeremiah 25:31, Hosea 4:1 and 12:2. And likewise, here in Micah 6:2, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declared—twice—that he was taking his people to court. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' affirmed through the prophet, “. . . for I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have an indictment ['
    - type: usfm
      marker: it
      children:
      - type: text
        text: rib
    - type: text
      text: '] against my people, and I will prosecute my case ['
    - type: usfm
      marker: it
      children:
      - type: text
        text: rib
    - type: text
      text: '] against Israel.” Conversely, there is also a “positive” use of this term in Micah 7:9, where the prophet declared, “I must endure '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s anger for a while because I have sinned against him. Yet he will still defend my cause [
    - type: usfm
      marker: it
      children:
      - type: text
        text: rib
    - type: text
      text: '].” The basis of this positive, divine defense of Micah and his people is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s steadfast faithfulness to his covenant promise to never ultimately abandon his people.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'It may be observed at this stage that these first two themes emerging in the book of Micah are closely related. The very reason for the injustice and corruption in Judah that constituted '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rib
    - type: text
      text: ' was the leadership’s failures (see notes on this theme in previous section).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: The Coming Royal Messiah.
    - type: text
      text: ' Micah was not just a prophet of doom, calling everyone to account for their sins. He was also a prophet of hope. The Assyrian army was bearing down on Judah. The Babylonians were right behind them. Nevertheless, even if Judah failed to turn around in renewal and restoration, even if the royal line were cut off, even if Jerusalem were destroyed, God would find a way to forgive their sins (7:18–20) and restore “anointed” (literally, “Messianic”) rule to the faithful remnant.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'We get the word '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Christ
    - type: text
      text: ' from the verb meaning “christen” or “anoint with oil.” Micah found himself living through a difficult chapter of God’s story with his people, but this rustic prophet never lost hope that God would end the story on his victorious terms through his Anointed One (see Ps. 110:1, the Old Testament verse that is most quoted in the New Testament). And this Messiah was not some vague concept; he would emerge as a flesh-and-blood baby in Bethlehem (Mic. 5:1–5a), born to be the heavenly King of kings over the people of God—past, present, and for all eternity. This would take place some seven hundred years from the time of Micah’s prophecy (2:13; 4:1–9; 5:2–8; 7:1–7).'
