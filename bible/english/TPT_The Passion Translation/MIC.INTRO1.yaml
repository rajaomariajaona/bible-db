      text: ' is found only three times in the book of Micah (6:8; 7:18, 20), its meaning pervades the entire spectrum of God’s promises of mercy and grace found in the prophecy. In particular, it leads off the central “memory verse” of the prophecy: Micah 6:8, where Micah called the leaders to mirror, to those over whom they had authority, the love that '
    - type: usfm
