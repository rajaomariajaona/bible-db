document_id: JDG.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ephraim’s Envy
  - type: text
    content: Jephthah’s actions grievously offended
  - type: text
    content: ' the men of Ephraim. They assembled their forces and crossed the Jordan River to Zaphon '
  - type: note
    content: Zaphon is the word for “north.” A possible translation is that “[they] crossed the Jordan River and went north.”
  - type: text
    content: to confront Jephthah
  - type: text
    content: . They said to him, “Why did you cross the border to fight the Ammonites without inviting us to join you? We’re going to burn your house down over your head!”
  '10':
  - type: text
    content: When he died, they buried him at Bethlehem.
  '11':
  - type: text
    content: 'After Ibzan, '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: raised up
  - type: text
    content: ' Elon, '
  - type: note
    content: Elon can be translated as “strong tree,” “oak,” “pillar,” “post,” “[political] chief,” “mighty man,” “powerful,” or “stability.”
  - type: text
    content: a champion-deliverer
  - type: text
    content: ' from Zebulun, who ruled Israel for ten years. '
  '12':
  - type: text
    content: When he died, they buried him at Aijalon in the territory of Zebulun.
  '13':
  - type: text
    content: 'After Elon, '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: raised up
  - type: text
    content: ' Abdon '
  - type: note
    content: Abdon, of the tribe of Ephraim, was the eleventh champion-deliverer. Abdon can be translated “lowly servant,” “worker,” “laborer,” “minister,” or “service.”
  - type: text
    content: 'son of Hillel, '
  - type: note
    content: 'Abdon’s father was Hillel. The name Hillel means “high praise,” “rejoice,” “celebrate,” “shout,” or “shine forth.” One could say from the meanings of Abdon and Hillel: High praises produce a servant spirit (cf. Isa. 57:15).'
  - type: text
    content: 'a champion-deliverer from Pirathon, '
  - type: note
    content: Pirathon means “leader,” “prince,” “chief,” “surpassing,” “peak,” or “highest.”
  - type: text
    content: 'to rule Israel. '
  '14':
  - type: text
    content: 'He had forty sons and thirty grandsons, who rode on seventy donkeys. '
  - type: note
    content: Each one of Abdon’s sons and grandsons owned his own donkey, a symbol of his prestige and prosperity. Today, we would say something like, “they each owned their own home,” to denote their affluence. The number seventy is used sixty-one times in the Bible. It can represent God’s people in motion, God’s people expanding into their purpose, and perfect spiritual order carried out with power. During the wilderness journeys of Israel, they stopped at Elim, which had seventy palm trees (see Ex. 15:27). Jesus dispatched seventy apostles to heal, preach, and deliver (see Luke 10:1–12).
  - type: text
    content: 'Abdon led Israel for eight years. '
  '15':
  - type: text
    content: When he died, they buried him at Pirathon in the territory of Ephraim in the hill country of the Amalekites.
  '2':
  - type: text
    content: 'Jephthah replied, “I and my people were in the middle of a serious conflict with the Ammonites. I summoned you, but you ignored me. '
  '3':
  - type: text
    content: 'When I realized that you were not coming to help us, I risked my own life to cross the border to fight them. '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: empowered
  - type: text
    content: ' me to be victorious over them. So why are you coming to fight with me now?” '
  '4':
  - type: text
    content: Then Jephthah gathered all the men of Gilead and fought the men of Ephraim. The men of Gilead defeated them, for the Ephraimites insulted them, saying, “You men of Gilead are nothing but renegades from Ephraim and Manasseh!”
  '5':
  - type: text
    content: 'In order to keep the Ephraimites from escaping, the men of Gilead captured the places where they could cross the Jordan. When any Ephraimite tried to escape and asked permission to cross the river, the men of Gilead would ask, “Are you an Ephraimite?” If he said, “No,” '
  '6':
  - type: text
    content: 'they would tell him to say “Shibboleth.” But if he could not pronounce it correctly and said “Sibboleth,” '
  - type: note
    content: Because of their accent, the men of Ephraim were unable to pronounce Shibboleth; they pronounced it as “Sibboleth.” It would be equal in English to the difference between “shin” and “sin.” Shibboleth means “stream,” “branch,” or “torrent.” Sibboleth means “ear of corn.” The men of Ephraim were betrayed by their speech. Believers today can likewise reveal who we are by our words (see Matt. 12:36–37). Since our words have power to release life or death, we must use them wisely (see Eph. 4:29).
  - type: text
    content: 'the men of Gilead would seize him and kill him there at the crossing place of the Jordan. At that time, they killed forty-two thousand '
  - type: note
    content: Or possibly “2,040.”
  - type: text
    content: Ephraimites.
  '7':
  - type: text
    content: Jephthah ruled Israel for six years. When he died, they buried him in his hometown in Gilead.
  - type: heading
    content: 'Champion-Deliverers: Ibzan, Elon, and Abdon'
  '8':
  - type: text
    content: 'After Jephthah, '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: raised up
  - type: text
    content: ' Ibzan, '
  - type: note
    content: Ibzan, the ninth champion-deliverer, was from the tribe of Zebulun (see Josh. 19:10, 15). Ibzan can be translated as “famous,” “splendid,” “brilliant,” or “shining.” Ibzan multiplied his family and influence by marrying his sons and daughters into the other tribes of Israel. Jewish tradition holds that Ibzan was another name for Boaz, the husband of Ruth and the ancestor of David. The Talmud asserts that Ibzan (Boaz) consummated his marriage with Ruth on the last night of his life. (See Bava Batra 91a.)
  - type: text
    content: a champion-deliverer
  - type: text
    content: ' from Bethlehem who ruled Israel. '
  '9':
  - type: text
    content: 'He had thirty sons and thirty daughters. He gave his thirty daughters in marriage outside his tribe and brought thirty women from outside the tribe as wives for his sons. Ibzan ruled Israel for seven years. '
