    - type: usfm
      marker: it
      children:
      - type: text
        text: Jephthah’s actions grievously offended
    - type: text
      text: ' the men of Ephraim. They assembled their forces and crossed the Jordan River to Zaphon '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
