      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abdon, of the tribe of Ephraim, was the eleventh champion-deliverer.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abdon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “lowly servant,” “worker,” “laborer,” “minister,” or “service.”
      marker-yv: yv-n
    - type: text
      text: 'son of Hillel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Abdon’s father was Hillel. The name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hillel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means “high praise,” “rejoice,” “celebrate,” “shout,” or “shine forth.” One could say from the meanings of Abdon and Hillel: High praises produce a servant spirit (cf.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 57:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'a champion-deliverer from Pirathon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pirathon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “leader,” “prince,” “chief,” “surpassing,” “peak,” or “highest.”
      marker-yv: yv-n
    - type: text
      text: 'to rule Israel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He had forty sons and thirty grandsons, who rode on seventy donkeys. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Each one of Abdon’s sons and grandsons owned his own donkey, a symbol of his prestige and prosperity. Today, we would say something like, “they each owned their own home,” to denote their affluence. The number seventy is used sixty-one times in the Bible. It can represent God’s people in motion, God’s people expanding into their purpose, and perfect spiritual order carried out with power. During the wilderness journeys of Israel, they stopped at Elim, which had seventy palm trees (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 15:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jesus dispatched seventy apostles to heal, preach, and deliver (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 10:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Abdon led Israel for eight years. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When he died, they buried him at Pirathon in the territory of Ephraim in the hill country of the Amalekites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jephthah replied, “I and my people were in the middle of a serious conflict with the Ammonites. I summoned you, but you ignored me. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'When I realized that you were not coming to help us, I risked my own life to cross the border to fight them. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: empowered
    - type: text
      text: ' me to be victorious over them. So why are you coming to fight with me now?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Then Jephthah gathered all the men of Gilead and fought the men of Ephraim. The men of Gilead defeated them, for the Ephraimites insulted them, saying, “You men of Gilead are nothing but renegades from Ephraim and Manasseh!”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'In order to keep the Ephraimites from escaping, the men of Gilead captured the places where they could cross the Jordan. When any Ephraimite tried to escape and asked permission to cross the river, the men of Gilead would ask, “Are you an Ephraimite?” If he said, “No,” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'they would tell him to say “Shibboleth.” But if he could not pronounce it correctly and said “Sibboleth,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because of their accent, the men of Ephraim were unable to pronounce Shibboleth; they pronounced it as “Sibboleth.” It would be equal in English to the difference between “shin” and “sin.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shibboleth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “stream,” “branch,” or “torrent.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sibboleth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “ear of corn.” The men of Ephraim were betrayed by their speech. Believers today can likewise reveal who we are by our words (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 12:36–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Since our words have power to release life or death, we must use them wisely (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'the men of Gilead would seize him and kill him there at the crossing place of the Jordan. At that time, they killed forty-two thousand '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or possibly “2,040.”
      marker-yv: yv-n
    - type: text
      text: Ephraimites.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jephthah ruled Israel for six years. When he died, they buried him in his hometown in Gilead.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Champion-Deliverers: Ibzan, Elon, and Abdon'
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'After Jephthah, '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raised up
    - type: text
      text: ' Ibzan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ibzan, the ninth champion-deliverer, was from the tribe of Zebulun (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ibzan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated as “famous,” “splendid,” “brilliant,” or “shining.” Ibzan multiplied his family and influence by marrying his sons and daughters into the other tribes of Israel. Jewish tradition holds that Ibzan was another name for Boaz, the husband of Ruth and the ancestor of David. The Talmud asserts that Ibzan (Boaz) consummated his marriage with Ruth on the last night of his life. (See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bava Batra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 91a.)
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: a champion-deliverer
    - type: text
      text: ' from Bethlehem who ruled Israel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He had thirty sons and thirty daughters. He gave his thirty daughters in marriage outside his tribe and brought thirty women from outside the tribe as wives for his sons. Ibzan ruled Israel for seven years. '
