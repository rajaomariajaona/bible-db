        - type: text
          text: Zaphon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the word for “north.” A possible translation is that “[they] crossed the Jordan River and went north.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: to confront Jephthah
    - type: text
      text: . They said to him, “Why did you cross the border to fight the Ammonites without inviting us to join you? We’re going to burn your house down over your head!”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
