document_id: GEN.35,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Returns to Bethel
  - type: text
    content: God said to Jacob, “Arise, go at once to Bethel, and settle there. Build an altar there to God, who appeared to you when you were fleeing from your brother Esau.”
  - type: note
    content: Jacob fulfilled the vow he had made to God thirty years previously. See Gen. 28:20–22.
  '10':
  - type: text
    content: 'saying, “Your name was once Jacob, but no longer. Your new name is Israel!” '
  - type: note
    content: See Gen. 32:28.
  - type: text
    content: 'God named him Israel '
  '11':
  - type: text
    content: 'and said to him, “I am the God who is more than enough. '
  - type: note
    content: 'Or “El Shaddai.” Some translate El Shaddai as “Almighty God” or “Sovereign God.” However, in this context, God blessed Jacob and gave him the power of life and multiplication. See Gen. 17:1–4; 28:3. See also T. N. D. Mettinger, In Search of God, 69–72; R. Gordis, “The Biblical Root sdy-sd,” Journal of Biblical Studies, 54 (1935): 173–210.'
  - type: text
    content: 'Go and have many children, and they will multiply. A nation and a '
  - type: text
    content: gathering of
  - type: text
    content: ' many nations will come from you; and you will be the ancestor of kings. '
  '12':
  - type: text
    content: I will give you the land which I gave to Abraham and to Isaac, and after you are gone, to your descendants.”
  '13':
  - type: text
    content: 'Then God ascended '
  - type: note
    content: Or “Elohim ascended from upon him.”
  - type: text
    content: into heaven
  - type: text
    content: ' from the place where he had spoken to him. '
  '14':
  - type: text
    content: 'Jacob set up a stone pillar '
  - type: text
    content: to memorialize
  - type: text
    content: ' the place where he had met '
  - type: note
    content: Or “where God had spoken to him [Jacob].”
  - type: text
    content: 'with God. He poured over it a drink offering '
  - type: note
    content: Literally “he poured a pouring.” One may assume that it was a drink offering of wine. Jacob poured an offering once again over the pillar at Bethel, the House of God, as he had in Gen. 28. See Ex. 29:40–41; Num. 6:17; 15:1–5; 28:7–10; 2 Sam. 23:16. The drink offering was a unique offering that was offered by a priest in gratitude for the firstfruits of harvest (see Lev. 23:10–13). Often, it was poured out upon other offerings. Jacob himself was the drink offering that was poured out to God. The pillar becomes a picture of the victorious life (see Rev. 3:12).
  - type: text
    content: 'and anointed the pillar with oil. '
  '15':
  - type: text
    content: Jacob called the place where God had spoken with him Bethel.
  - type: heading
    content: Rachel Dies in Childbirth
  '16':
  - type: text
    content: 'From Bethel, they journeyed on, and as they were approaching Ephrath, Rachel went into very hard and painful labor. '
  '17':
  - type: text
    content: 'As she was having great difficulty in giving birth, the midwife said to her, “Don’t be afraid, for you’re having another son!” '
  '18':
  - type: text
    content: 'With her dying breath, Rachel said, “His name is Son of My Sorrow,” '
  - type: note
    content: Or, in Hebrew, “Ben-oni,” which means “son of my sorrow” or possibly “son of my strength.”
  - type: text
    content: 'but his father called him Son of My Right Hand. '
  - type: note
    content: 'Or, in Hebrew, “Ben-yamin” [Benjamin], which means “son of my right hand” or possibly “son of the south.” In the entire universe, there is only one Son that is both the “Son of Sorrow” and the “Son of the Right Hand”! Jesus is his name! Christ is a wonderful person with these two aspects to his name. Isa. 53:3 describes him as the “man of deep sorrows,” and Acts 2:33 tells us that “God exalted him to his right hand.” His mother Mary, like Rachel, experienced pain as Simeon prophesied: “a painful sword will one day pierce your inner being” (Luke 2:34–35). When her Son was raised from the dead, he rose to be at God’s right hand (see Eph. 1:20).'
  '19':
  - type: text
    content: 'Rachel died and was buried on the road to Ephrath (now Bethlehem). '
  - type: note
    content: See Gen. 48:7.
  '2':
  - type: text
    content: 'So Jacob said to his household and to all who were with him, '
  - type: note
    content: Those “with him” included the captives he took at Shechem.
  - type: text
    content: '“Get rid of every foreign god you have, purify yourselves, and change your clothes. '
  - type: note
    content: Our old clothes symbolize the old life that must be laid aside as we put on Christ (see Isa. 64:6; Rev. 3:18). To change our garments is to change our manner of life and put on a new man (see Rom. 13:14).
  '20':
  - type: text
    content: 'Jacob set up a pillar to mark her burial site, and it is known as The Marker of Rachel’s Tomb to this day. '
  - type: note
    content: This was the fourth pillar Jacob set up. The first was at Bethel to symbolize the end of his fleshly self-confidence, which was replaced with a new revelation of God and his faithfulness (see Gen. 28:5, 10–22). The second was a pillar at Mizpah to symbolize that God was watching over Jacob and could be trusted (see Gen. 31:49). The third was at Bethel as a pillar of his confidence in the Living God (see Gen. 35:1–15).
  '21':
  - type: text
    content: 'Israel journeyed on and pitched his tent beyond Migdal Eder. '
  - type: note
    content: Or “Watchtower of the Flock.” This was the place where shepherds watched over the sacred flocks meant for temple sacrifice and where the Passover lamb was selected. Migdal Eder is mentioned in Mic. 4:8 as the possible birthplace of Jesus, Israel’s Messiah. See also Mic. 5:2.
  '22':
  - type: text
    content: 'While Israel was living in that land, Reuben went and slept with Bilhah, '
  - type: note
    content: Why would Reuben have slept with Rachel’s servant girl, his father’s concubine? Since Rachel had been Jacob’s favorite wife before her death, Reuben hoped that by having sex with Bilhah, he would prevent her from taking Rachel’s place. Reuben wanted his mother Leah to be the favored wife of Jacob and take over the leadership of his clan. That this episode happened immediately following Rachel’s death seems to imply that this was at least part of Reuben’s motivation for lying with Bilhah.
  - type: text
    content: his father’s concubine, and Israel found out.
  - type: text
    content: Jacob had twelve sons.
  '23':
  - type: text
    content: Leah’s sons were Reuben (Jacob’s firstborn), Simeon, Levi, Judah, Issachar, and Zebulun.
  '24':
  - type: text
    content: Rachel’s sons were Joseph and Benjamin.
  '25':
  - type: text
    content: The sons of Rachel’s maidservant Bilhah were Dan and Naphtali.
  '26':
  - type: text
    content: The sons of Leah’s maidservant Zilpah were Gad and Asher.
  - type: text
    content: These were the sons of Jacob born to him in Paddan-Aram.
  - type: heading
    content: The Death of Isaac
  '27':
  - type: text
    content: 'Jacob came home to his father Isaac in Mamre, near Kiriath Arba (that is, Hebron), where Abraham and Isaac had lived as foreigners. '
  '28':
  - type: text
    content: 'Isaac was one hundred and eighty when he breathed his last and died. '
  - type: note
    content: Isaac died years after Joseph was sold into Egypt as a slave. Isaac lived the longest of all the patriarchs.
  '29':
  - type: text
    content: He died an old man and had lived a full life when he joined his ancestors. And his sons Esau and Jacob buried him there.
  '3':
  - type: text
    content: 'Then come with me; let us go up to Bethel. I will build an altar there to God who answered my prayer when I was in distress '
  - type: note
    content: See Ps. 20:1.
  - type: text
    content: 'and whose presence has been with me wherever I have gone.” '
  '4':
  - type: text
    content: 'Then they surrendered all the foreign gods they had as well as their earrings. '
  - type: note
    content: Most scholars consider these earrings to have been religious objects, perhaps amulets or magical charms.
  - type: text
    content: Jacob buried them under the oak tree near Shechem.
  '5':
  - type: text
    content: 'As they made their way '
  - type: text
    content: to Bethel
  - type: text
    content: ', a tremendous fear of God fell upon all the cities around them, and no one dared pursue them. '
  '6':
  - type: text
    content: 'Jacob and all the people who were with him arrived in the land of Canaan at Luz, '
  - type: note
    content: Luz means “departure” or “almond tree.”
  - type: text
    content: 'now known as Bethel. '
  '7':
  - type: text
    content: 'He built an altar there and named it El-Bethel, '
  - type: note
    content: That is, “God of the House of God.”
  - type: text
    content: 'because it was the place that God had unveiled himself when Jacob was running from his brother. '
  '8':
  - type: text
    content: 'During that time, Rebekah’s nurse Deborah died. They buried her under an oak tree near '
  - type: note
    content: Or “below.”
  - type: text
    content: Bethel, and they named the place Weeping Oak.
  - type: note
    content: Or “Allon-Bacuth.”
  '9':
  - type: text
    content: 'After Jacob returned from Paddan-Aram, God appeared to him once again '
  - type: note
    content: “Once again” may refer to either Jacob’s earlier encounter with God at Mahanaim (see Gen. 32:1–2) or the one at Penuel (see Gen. 32:29–30), but more likely it refers to a new experience. God revealed himself many times to Abraham, Isaac, and Jacob, and he will reveal himself to this generation also.
  - type: text
    content: 'and blessed him, '
