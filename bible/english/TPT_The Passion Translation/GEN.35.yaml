verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Returns to Bethel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God said to Jacob, “Arise, go at once to Bethel, and settle there. Build an altar there to God, who appeared to you when you were fleeing from your brother Esau.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob fulfilled the vow he had made to God thirty years previously. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 28:20–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'saying, “Your name was once Jacob, but no longer. Your new name is Israel!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 32:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'God named him Israel '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'and said to him, “I am the God who is more than enough. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “El Shaddai.” Some translate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El Shaddai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as “Almighty God” or “Sovereign God.” However, in this context, God blessed Jacob and gave him the power of life and multiplication. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . See also T. N. D. Mettinger,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: In Search of God
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 69–72; R. Gordis, “The Biblical Root'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sdy-sd
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ',”'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Journal of Biblical Studies
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 54 (1935): 173–210.'
      marker-yv: yv-n
    - type: text
      text: 'Go and have many children, and they will multiply. A nation and a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gathering of
    - type: text
      text: ' many nations will come from you; and you will be the ancestor of kings. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will give you the land which I gave to Abraham and to Isaac, and after you are gone, to your descendants.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then God ascended '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Elohim ascended from upon him.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: into heaven
    - type: text
      text: ' from the place where he had spoken to him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jacob set up a stone pillar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to memorialize
    - type: text
      text: ' the place where he had met '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “where God had spoken to him [Jacob].”
      marker-yv: yv-n
    - type: text
      text: 'with God. He poured over it a drink offering '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “he poured a pouring.” One may assume that it was a drink offering of wine. Jacob poured an offering once again over the pillar at Bethel, the House of God, as he had in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 29:40–41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 15:1–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 28:7–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 23:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The drink offering was a unique offering that was offered by a priest in gratitude for the firstfruits of harvest (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 23:10–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Often, it was poured out upon other offerings. Jacob himself was the drink offering that was poured out to God. The pillar becomes a picture of the victorious life (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'and anointed the pillar with oil. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Jacob called the place where God had spoken with him Bethel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rachel Dies in Childbirth
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'From Bethel, they journeyed on, and as they were approaching Ephrath, Rachel went into very hard and painful labor. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'As she was having great difficulty in giving birth, the midwife said to her, “Don’t be afraid, for you’re having another son!” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'With her dying breath, Rachel said, “His name is Son of My Sorrow,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or, in Hebrew, “Ben-oni,” which means “son of my sorrow” or possibly “son of my strength.”
      marker-yv: yv-n
    - type: text
      text: 'but his father called him Son of My Right Hand. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or, in Hebrew, “Ben-yamin” [Benjamin], which means “son of my right hand” or possibly “son of the south.” In the entire universe, there is only one Son that is both the “Son of Sorrow” and the “Son of the Right Hand”! Jesus is his name! Christ is a wonderful person with these two aspects to his name.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 53:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: describes him as the “man of deep sorrows,” and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'tells us that “God exalted him to his right hand.” His mother Mary, like Rachel, experienced pain as Simeon prophesied: “a painful sword will one day pierce your inner being” ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:34–35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). When her Son was raised from the dead, he rose to be at God’s right hand (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Rachel died and was buried on the road to Ephrath (now Bethlehem). '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 48:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Jacob said to his household and to all who were with him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Those “with him” included the captives he took at Shechem.
      marker-yv: yv-n
    - type: text
      text: '“Get rid of every foreign god you have, purify yourselves, and change your clothes. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Our old clothes symbolize the old life that must be laid aside as we put on Christ (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 64:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). To change our garments is to change our manner of life and put on a new man (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Jacob set up a pillar to mark her burial site, and it is known as The Marker of Rachel’s Tomb to this day. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the fourth pillar Jacob set up. The first was at Bethel to symbolize the end of his fleshly self-confidence, which was replaced with a new revelation of God and his faithfulness (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 28:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The second was a pillar at Mizpah to symbolize that God was watching over Jacob and could be trusted (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 31:49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The third was at Bethel as a pillar of his confidence in the Living God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 35:1–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Israel journeyed on and pitched his tent beyond Migdal Eder. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Watchtower of the Flock.” This was the place where shepherds watched over the sacred flocks meant for temple sacrifice and where the Passover lamb was selected. Migdal Eder is mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as the possible birthplace of Jesus, Israel’s Messiah. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'While Israel was living in that land, Reuben went and slept with Bilhah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Why would Reuben have slept with Rachel’s servant girl, his father’s concubine? Since Rachel had been Jacob’s favorite wife before her death, Reuben hoped that by having sex with Bilhah, he would prevent her from taking Rachel’s place. Reuben wanted his mother Leah to be the favored wife of Jacob and take over the leadership of his clan. That this episode happened immediately following Rachel’s death seems to imply that this was at least part of Reuben’s motivation for lying with Bilhah.
      marker-yv: yv-n
    - type: text
      text: his father’s concubine, and Israel found out.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob had twelve sons.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Leah’s sons were Reuben (Jacob’s firstborn), Simeon, Levi, Judah, Issachar, and Zebulun.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Rachel’s sons were Joseph and Benjamin.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The sons of Rachel’s maidservant Bilhah were Dan and Naphtali.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The sons of Leah’s maidservant Zilpah were Gad and Asher.
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were the sons of Jacob born to him in Paddan-Aram.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Death of Isaac
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Jacob came home to his father Isaac in Mamre, near Kiriath Arba (that is, Hebron), where Abraham and Isaac had lived as foreigners. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Isaac was one hundred and eighty when he breathed his last and died. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 35:28
