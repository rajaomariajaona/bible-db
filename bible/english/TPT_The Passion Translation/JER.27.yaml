document_id: JER.27,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah’s Conflict with False Prophets
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to Jeremiah at the beginning of the reign of Zedekiah '
  - type: note
    content: The Masoretic Text has “Jehoiakim.” This was possibly a scribal error due to a miscopy of 26:1.
  - type: text
    content: 'son of Josiah, king of Judah. '
  - type: note
    content: The time frame of this prophecy is about 594 BC. The Babylonians had taken the first captives from Jerusalem and established Zedekiah as their puppet king. Jeremiah prophesied that the only hope of the people was to submit themselves to the “yoke” of Babylonian rule. The seventy years of captivity points ahead to the seventy weeks of Daniel’s prophecy (see Dan. 9:24–27).
  '10':
  - type: text
    content: 'They are prophesying lies to you; do not believe them! They open the door for your enemies to take you away. I will drive you out of your land, and you will perish. '
  '11':
  - type: text
    content: 'But the nation that harnesses herself to the yoke of the king of Babylon and serves him, I will allow her to live and farm her land,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  '12':
  - type: text
    content: 'I, '
  - type: text
    content: Jeremiah
  - type: text
    content: ', also delivered a similar message to King Zedekiah of Judah: “You must harness yourself to the yoke of the king of Babylon; serve him and his people, and you will live. '
  '13':
  - type: text
    content: 'Otherwise you will die together with your people by sword, food shortages, and pestilence, as '
  - type: text
    content: Yahweh
  - type: text
    content: ' has threatened any nation that does not serve the king of Babylon. '
  '14':
  - type: text
    content: 'Pay no attention to the words of the prophets who say to you, ‘Do not serve the king of Babylon,’ for they prophesy lies to you. '
  '15':
  - type: text
    content: '‘I have not sent them,’ declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. ‘They lie when they affirm that they are speaking in my name. '
  - type: text
    content: If you listen to them
  - type: text
    content: ', I will drive you out. You will be destroyed—you and the prophets who are lying to you.’ ”'
  '16':
  - type: text
    content: 'And to the priests and to all the people I said: “Do not listen to the words of the prophets who lie to you, saying, ‘The holy vessels plundered from '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple are going to be brought back to you soon from Babylon,’ for they prophesy falsely to you, declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Do not listen to them! Serve the king of Babylon and live '
  - type: text
    content: a long life
  - type: text
    content: '. Why should Jerusalem be destroyed? '
  '18':
  - type: text
    content: 'If they are true prophets and the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is in them, let them intercede with '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies, so that the furnishings that are still left in '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple, in the king’s palace, and in Jerusalem may not be carried off to Babylon. '
  '19':
  - type: text
    content: 'That’s because '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, has already spoken about the temple furnishings that remain in the city—the '
  - type: text
    content: bronze
  - type: text
    content: ' pillars, '
  - type: note
    content: See 1 Kings 7:15–39.
  - type: text
    content: 'the large bronze basin, the stands, and all the other bowls and chalices. '
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: “Make a harness, attach it to the '
  - type: text
    content: wooden
  - type: text
    content: ' bars of a yoke, and put them on your neck. '
  - type: note
    content: Jeremiah was the “ox” of the Lord who was patient, submissive, a burden bearer, and an intercessor, and who was willing to be the sacrifice of Yahweh. Jeremiah had already bent his “neck [will]” to the harness and yoke of the Lord.
  '20':
  - type: text
    content: 'Nebuchadnezzar king of Babylon didn’t take them away when he took captive Jeconiah son of Jehoiakim to Babylon along with all the leaders of Judah and Jerusalem. '
  '21':
  - type: text
    content: 'For the God of Israel, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, said that the furnishings left behind in '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple, in the royal palace, and in Jerusalem '
  '22':
  - type: text
    content: 'will be carried off to Babylon, '
  - type: note
    content: See 2 Kings 24:10–17.
  - type: text
    content: 'and ‘they will stay there until the day that I restore them and bring them back where they belong,’ declares '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '3':
  - type: text
    content: 'The ambassadors of the kings of Edom, Moab, Ammon, Tyre, and Sidon are in Jerusalem to see Zedekiah king of Judah. Tell them, '
  '4':
  - type: text
    content: '‘Here is a message for your kings. The Commander of Angel Armies, the God of Israel, commands you to deliver this message to them:'
  '5':
  - type: text
    content: '“ ‘ “I am the one who made the earth, every person, and every animal in the world by my great strength '
  - type: note
    content: Or “by my outstretched arm [a symbol of strength].”
  - type: text
    content: 'and by my mighty power, and I can give it to whomever I please. '
  '6':
  - type: text
    content: 'Now I have given all your countries to my servant, King Nebuchadnezzar of Babylon. '
  - type: note
    content: Nebuchadnezzar was the “golden head” mentioned in Dan. 2:31–45.
  - type: text
    content: 'I have even given him the wild animals to serve him. '
  '7':
  - type: text
    content: 'All nations will serve him, his son, and his grandson '
  - type: note
    content: The grandson of Nebuchadnezzar was King Belshazzar, the last Babylonian king to rule before the Persians conquered their kingdom.
  - type: text
    content: '—until the time of the fall of his own kingdom comes, when other nations and great kings will make him their servant. '
  '8':
  - type: text
    content: 'The nation or kingdom that refuses to submit to King Nebuchadnezzar of Babylon and does not put its neck into the harness of the yoke to serve the king, I will punish,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. “I will punish it with the sword, food shortages, and pestilence until I have let '
  - type: text
    content: Nebuchadnezzar
  - type: text
    content: ' completely destroy it.'
  '9':
  - type: text
    content: '“ ‘ “Do not listen to your prophets; they are false. Do not listen to your fortune tellers, dream interpreters, mediums, sorcerers, and magicians who say to you, ‘The king of Babylon will not conquer you.’ '
