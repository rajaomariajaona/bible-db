document_id: HEB.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Great Cloud of Witnesses
  - type: text
    content: 'As for us, we have all of these great witnesses '
  - type: note
    content: Or “martyrs.”
  - type: text
    content: 'who encircle '
  - type: note
    content: Or “clothe us like clouds.”
  - type: text
    content: 'us like clouds. So we must let go of every wound that has pierced us '
  - type: note
    content: Or “get rid of every arrow tip in us.” The implication is carrying an arrow tip inside, a wound that weighs us down and keeps us from running our race with freedom.
  - type: text
    content: 'and the sin we so easily fall into. '
  - type: note
    content: Or “the sin that so cleverly entangles us.” The Aramaic can be translated “the sin that is ready [and waiting] for us.” If this is speaking of one sin, the context would point to the sin of unbelief and doubting God’s promises.
  - type: text
    content: 'Then we will be able to run life’s marathon race '
  - type: note
    content: Or “obstacle course.” The Greek word agona means agony or conflict. The assumption is this race will not be easy, but the proper path to run has been set before us.
  - type: text
    content: with passion and determination, for the path has been already marked out before us.
  - type: note
    content: The Aramaic can be translated “the race [personally] appointed to us.” God has a destiny for each of us that we are to give ourselves fully to reach.
  '10':
  - type: text
    content: 'Our parents corrected us for the short time of our childhood as it seemed good to them. But God corrects us throughout our lives for our own good, giving us an invitation to share his holiness. '
  '11':
  - type: text
    content: 'Now all discipline '
  - type: note
    content: Throughout this passage the word discipline can also be translated “correction,” “instruction,” and “training.”
  - type: text
    content: 'seems to be painful at the time, yet later it will produce a transformation of character, bringing a harvest of righteousness and peace '
  - type: note
    content: See James 3:18.
  - type: text
    content: to those who yield to it.
  - type: note
    content: Or “those who have endured its [gymnastic] training.”
  '12':
  - type: text
    content: 'So be made strong even in your weakness by lifting up your tired hands '
  - type: text
    content: in prayer and worship
  - type: text
    content: '. And strengthen your weak knees, '
  - type: note
    content: The Greek word used here can also mean “paralyzed knees.”
  '13':
  - type: text
    content: 'for as you keep walking forward on God’s paths '
  - type: note
    content: See Isa. 35:3; Prov. 4:26.
  - type: text
    content: all your stumbling ways will be divinely healed!
  '14':
  - type: text
    content: 'In every relationship be swift to choose peace over competition, '
  - type: note
    content: See Ps. 34:14.
  - type: text
    content: 'and run swiftly toward holiness, for those who are not holy will not see the Lord. '
  - type: note
    content: The Aramaic can be translated “no man will see into the Lord.”
  '15':
  - type: text
    content: 'Watch over each other to make sure that no one misses the revelation of God’s grace. And make sure no one lives with a root of bitterness '
  - type: note
    content: Or “resentment.”
  - type: text
    content: sprouting within them which will only cause trouble and poison the hearts of many.
  '16':
  - type: text
    content: 'Be careful that no one among you lives in immorality, becoming careless about God’s blessings, like Esau who traded away his rights as the firstborn for a simple meal. '
  '17':
  - type: text
    content: And we know that later on when he wanted to inherit his father’s blessing, he was turned away, even though he begged for it with bitter tears, for it was too late then to repent.
  - type: note
    content: The Aramaic can be translated “he found no place of restoration.”
  - type: heading
    content: Entering into God’s Presence
  '18':
  - type: text
    content: 'For we are not coming, '
  - type: text
    content: as Moses did
  - type: text
    content: ', to a physical mountain with its burning fire, thick clouds of darkness and gloom, and with a raging whirlwind. '
  - type: note
    content: See Ex. 19; Deut. 4:11 (LXX); Amos 5:20.
  '19':
  - type: text
    content: 'We are not those who are being warned by the jarring blast of a trumpet and the thundering voice; '
  - type: note
    content: Or “the sound of words.”
  - type: text
    content: 'the fearful voice that they begged to be silenced. '
  '2':
  - type: text
    content: 'We look away from the natural realm and we focus our attention '
  - type: text
    content: and expectation
  - type: text
    content: ' '
  - type: note
    content: Implied by the Aramaic word chor, which implies a gaze upon Jesus full of expectations that he is enough.
  - type: text
    content: 'onto Jesus who birthed faith within us and who leads us forward into faith’s perfection. '
  - type: note
    content: Or “He is the pioneer and perfecter of faith.”
  - type: text
    content: 'His example is this: Because his heart was focused on the joy of knowing that you would be his, '
  - type: note
    content: Or “instead of the joy set before him.” This was the joy of our salvation. He placed before his eyes the bliss we would forever share together with him, which empowered him to go through his agony. Instead of remaining in heaven’s glory with the Father and all the angels, he chose you as the joy set before him. He desires you to the point of laying down his life and being God for all eternity to be with you. He pursued you, not seeing your weakness and failures but what you will be. He can see what we will be in the end from the beginning. This was the joy that prompted him to become a man.
  - type: text
    content: 'he endured the agony of the cross and conquered its humiliation, '
  - type: note
    content: As translated from the Aramaic. The Greek is “thinking nothing of its shame.”
  - type: text
    content: and now sits exalted at the right hand of the throne of God!
  '20':
  - type: text
    content: They couldn’t handle God’s command that said,
  - type: text
    content: “If so much as an animal approaches the mountain it is to be stoned to death!”
  '21':
  - type: text
    content: The astounding phenomena Moses witnessed caused him to shudder with fear and he could only say, “I am trembling in terror!”
  - type: note
    content: See Deut. 9:19.
  '22':
  - type: text
    content: 'By contrast, we have already come '
  - type: note
    content: The Greek verb is in the perfect tense indicating that the fullness of our salvation and our entrance into God’s heavenly realm has already taken place. See also Rom. 8:29; Eph. 2:6; Col. 3:1–4.
  - type: text
    content: 'near to God in a totally different realm, the Zion-realm, '
  - type: note
    content: Or “Mount Zion,” which is not a literal mountain but an obvious metaphor for the realm of God’s manifest presence. Mount Zion was once a Jebusite stronghold conquered by David (2 Sam. 5:6–9) who made it the capital for his kingdom. This is inside the walls of present-day Jerusalem. Zion is used in both the Old and New Testaments as more than a location. Zion is referred to as the place of God’s dwelling (Pss. 9:11; 48:1–2; 74:2; Isa. 8:18). God’s people are called “Zion maidens” (Song. 3:11; Zech. 9:9) or “people of Zion” (John 12:15). Zion is the heavenly realm where God is manifest (Pss. 84:7; 102:16; 110:1–2; Rev. 14:1).
  - type: text
    content: 'for we have entered the city of the Living God, which is the New Jerusalem in heaven! '
  - type: note
    content: This is the fulfillment of Abraham’s vision (Heb. 11:10) and what Israel’s ancestors had seen from afar (Heb. 11:13). The New Jerusalem is not only a place, but a people who dwell with God in their midst. It is a city that is a bride or a bridal-city coming out of heaven to the earth (Rev. 21:9–14). We are not going to the New Jerusalem; we are going to be the New Jerusalem! The breastplate worn by the high priest over his heart with its precious stones was a miniature scale model of the New Jerusalem. The New Jerusalem is the amplification of that breastplate, a metaphor of transformed sons with their names engraved upon the precious stones. See Rev. 21:2–4. The Aramaic can be translated “You have already received communion on Mount Zion.”
  - type: text
    content: 'We have joined the festal gathering of myriads of angels '
  - type: note
    content: See Deut. 33:2; Dan. 7:10; Judah (Jude) 14; Rev. 5:11.
  - type: text
    content: in their joyous celebration!
  - type: note
    content: This is much more than an assembly of angels. The Greek word panēgyris was used in classic Greek literature for civic festivals and celebrations which drew people from all parts of the empire and included all the various social classes. These were times of great joy and festivities with people wearing white robes and with garlands on their heads. (See Philo, Gaius 12; Isocrates, Panegyricus 43, 46.) This verse teaches that we have already entered into the festival of angelic bliss through Jesus Christ.
  '23':
  - type: text
    content: 'And as members of the church '
  - type: note
    content: This is the Greek word ekklēsia, which is commonly used for church. However, ekklēsia means more than a church meeting, for it signified in Greek culture the governing assembly which had the authority to make decisions for the entire city. See Matt. 16:18.
  - type: text
    content: 'of the Firstborn '
  - type: note
    content: This is Jesus who is God’s uniquely Firstborn (Heb. 1:6). In Christ we are all the firstborn and have all the rights and blessings that Jesus has.
  - type: text
    content: 'all our names have been legally registered '
  - type: note
    content: Or “whose names are written in heaven.” There are many books in heaven. See Ex. 32:32; Pss. 69:28; 87:6; Dan. 12:1; Luke 10:20; Phil. 4:3; Rev. 3:5; 13:8; 17:8; 20:12, 15; 21:27.
  - type: text
    content: as citizens of heaven! And we have come before God who judges all, and who lives among the spirits of the righteous who have been made perfect in his eyes!
  - type: note
    content: The Aramaic can be translated “and to the Spirit who has perfected the righteous ones.”
  '24':
  - type: text
    content: And we have come to Jesus who established a new covenant with his blood sprinkled upon the mercy seat; blood that continues to speak from heaven, “forgiveness,” a better message than Abel’s blood that cries from the earth, “justice.”
  - type: note
    content: See Gen. 4:10.
  '25':
  - type: text
    content: 'Make very sure that you never refuse to listen to God when he speaks! '
  - type: note
    content: Or “don’t turn your back on the speaker.”
  - type: text
    content: 'For the God who spoke on earth from Sinai is the same God who now speaks from heaven. Those who heard him '
  - type: note
    content: The Greek is somewhat ambiguous with the possibility that it is Moses or even Christ who is speaking. The context seems to imply however that it is God himself who speaks both from Sinai and from heaven.
  - type: text
    content: speak his living Word on earth found nowhere to hide, so what chance is there for us to escape if we turn our backs on God and refuse to hear his warnings as he speaks from heaven?
  '26':
  - type: text
    content: The earth was rocked at the sound of his voice from the mountain, but now he has promised,
  - type: text
    content: “Once and for all I will not only shake the systems of the world,
  - type: note
    content: Or “earth.” Although earthquakes are prophesied to come (Matt. 24:7; Mark 13:8; Luke 21:11; Rev. 8:5; 11:13, 19; 16:18) the prophet is most likely using a metaphoric term for the world’s systems (finance, military, governments, religious, etc.). The message of the gospel has shaken the world’s foundations as it includes an unshakable kingdom rising on the earth. Kings of the earth have placed their crowns down before the cross of a man who was crucified as a common criminal. The power of the gospel is still shaking the world.
  - type: text
    content: but also the unseen powers in the heavenly realm!”
  - type: note
    content: It is not God’s power or throne being shaken, but invisible forces of darkness in the heavenly realm. See Hag. 2:6; Eph. 6:12.
  '27':
  - type: text
    content: 'Now this phrase “once and for all” clearly indicates the final removal of things that are shaking, that is, the old order, '
  - type: note
    content: Or “things that have been made.”
  - type: text
    content: 'so only what is unshakable will remain. '
  '28':
  - type: text
    content: 'Since we are receiving '
  - type: text
    content: our rights
  - type: text
    content: ' '
  - type: note
    content: The Greek word paralambano is often used in classical Greek literature for heirs who have the “rights of succession” (to a throne). (See Aristotle, Pol. 3.14.12; Herodotus, 2.120.)
  - type: text
    content: to
  - type: text
    content: ' an unshakable kingdom '
  - type: note
    content: See Dan. 7:18.
  - type: text
    content: 'we should be extremely thankful and offer God the purest worship that delights his heart '
  - type: note
    content: Or “offer pleasing service to God.”
  - type: text
    content: 'as we lay down our lives in absolute surrender, filled with awe. '
  - type: note
    content: The Aramaic can be translated “We have received grace to serve and we please God in awe and tender devotion” (submission).
  '29':
  - type: text
    content: For our God is a holy, devouring fire!
  - type: note
    content: The Aramaic can be translated “consuming light.” See also Deut. 4:24; 9:3.
  '3':
  - type: text
    content: 'So consider carefully how Jesus faced such intense opposition from sinners who opposed their own souls, '
  - type: note
    content: Or “those who were their own stumbling block.” As translated from the Aramaic.
  - type: text
    content: 'so that you won’t become worn down and cave in under life’s pressures. '
  '4':
  - type: text
    content: 'After all, you have not yet reached the point of sweating blood '
  - type: note
    content: Or “resisting until blood.”
  - type: text
    content: 'in your opposition to sin. '
  '5':
  - type: text
    content: And have you forgotten his encouraging words spoken to you as his children? He said,
  - type: text
    content: “My child, don’t underestimate the value
  - type: text
    content: of the discipline and training of the Lord God,
  - type: text
    content: or get depressed when he has to correct you.
  - type: note
    content: Or “when he puts you under scrutiny.” The Aramaic can be translated “Don’t let your soul tremble [with dread] when your loyalty strays from him.”
  '6':
  - type: text
    content: For the Lord’s training of your life
  - type: text
    content: is the evidence of his faithful love.
  - type: note
    content: The Aramaic word used here means nurturing love, a mother’s love. This passage shows both the strength of a father’s love in how God disciplines us and the nurturing care of a mother’s love. The Aramaic could be translated, “The Lord shows his nurturing love [mercy] to those he is sanctifying.”
  - type: text
    content: And when he draws you to himself,
  - type: text
    content: it proves you are his delightful child.”
  - type: note
    content: The Aramaic word for “draws you to himself” is nagad, which can mean “scourge” (severely punish) or “to attract,” “to draw,” or “tug the heart.” The Greek is “The Lord scourges [chastises] every son he receives.” See also Prov. 3:11–12.
  '7':
  - type: text
    content: 'Fully embrace God’s correction as part of your training, '
  - type: note
    content: Or “What you endure is meant to educate you.”
  - type: text
    content: 'for he is doing what any loving father does for his children. For who has ever heard of a child who never had to be corrected? '
  - type: note
    content: The Aramaic can be translated “Who has ever heard of a child not approved by a father?”
  '8':
  - type: text
    content: 'We all should welcome God’s discipline as the validation of authentic sonship. For if we have never once endured his correction it only proves we are strangers '
  - type: note
    content: As translated from the Aramaic. The Greek is “illegitimate.”
  - type: text
    content: and not sons.
  '9':
  - type: text
    content: 'And isn’t it true that we respect our earthly fathers even though they corrected and disciplined us? Then we should demonstrate an even greater respect for God, our spiritual Father, as we submit to his life-giving discipline. '
  - type: note
    content: See Prov. 6:23.
