document_id: HEB.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Cloud of Witnesses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As for us, we have all of these great witnesses '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “martyrs.”
    marker-yv: yv-n
  - type: text
    text: 'who encircle '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “clothe us like clouds.”
    marker-yv: yv-n
  - type: text
    text: 'us like clouds. So we must let go of every wound that has pierced us '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “get rid of every arrow tip in us.” The implication is carrying an arrow tip inside, a wound that weighs us down and keeps us from running our race with freedom.
    marker-yv: yv-n
  - type: text
    text: 'and the sin we so easily fall into. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the sin that so cleverly entangles us.” The Aramaic can be translated “the sin that is ready [and waiting] for us.” If this is speaking of one sin, the context would point to the sin of unbelief and doubting God’s promises.
    marker-yv: yv-n
  - type: text
    text: 'Then we will be able to run life’s marathon race '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “obstacle course.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: agona
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means agony or conflict. The assumption is this race will not be easy, but the proper path to run has been set before us.
    marker-yv: yv-n
  - type: text
    text: with passion and determination, for the path has been already marked out before us.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the race [personally] appointed to us.” God has a destiny for each of us that we are to give ourselves fully to reach.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'We look away from the natural realm and we focus our attention '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and expectation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied by the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which implies a gaze upon Jesus full of expectations that he is enough.'
    marker-yv: yv-n
  - type: text
    text: 'onto Jesus who birthed faith within us and who leads us forward into faith’s perfection. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He is the pioneer and perfecter of faith.”
    marker-yv: yv-n
  - type: text
    text: 'His example is this: Because his heart was focused on the joy of knowing that you would be his, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “instead of the joy set before him.” This was the joy of our salvation. He placed before his eyes the bliss we would forever share together with him, which empowered him to go through his agony. Instead of remaining in heaven’s glory with the Father and all the angels, he chose you as the joy set before him. He desires you to the point of laying down his life and being God for all eternity to be with you. He pursued you, not seeing your weakness and failures but what you will be. He can see what we will be in the end from the beginning. This was the joy that prompted him to become a man.
    marker-yv: yv-n
  - type: text
    text: 'he endured the agony of the cross and conquered its humiliation, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “thinking nothing of its shame.”
    marker-yv: yv-n
  - type: text
    text: and now sits exalted at the right hand of the throne of God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So consider carefully how Jesus faced such intense opposition from sinners who opposed their own souls, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “those who were their own stumbling block.” As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'so that you won’t become worn down and cave in under life’s pressures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'After all, you have not yet reached the point of sweating blood '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “resisting until blood.”
    marker-yv: yv-n
  - type: text
    text: 'in your opposition to sin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And have you forgotten his encouraging words spoken to you as his children? He said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My child, don’t underestimate the value
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the discipline and training of the Lord God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or get depressed when he has to correct you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “when he puts you under scrutiny.” The Aramaic can be translated “Don’t let your soul tremble [with dread] when your loyalty strays from him.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For the Lord’s training of your life
- type: usfm
  marker: q1
  children:
  - type: text
    text: is the evidence of his faithful love.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word used here means nurturing love, a mother’s love. This passage shows both the strength of a father’s love in how God disciplines us and the nurturing care of a mother’s love. The Aramaic could be translated, “The Lord shows his nurturing love [mercy] to those he is sanctifying.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: And when he draws you to himself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it proves you are his delightful child.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word for “draws you to himself” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nagad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which can mean “scourge” (severely punish) or “to attract,” “to draw,” or “tug the heart.” The Greek is “The Lord scourges [chastises] every son he receives.” See also'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 3:11–12
      metadata:
        usfm: PRO.3.11+PRO.3.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fully embrace God’s correction as part of your training, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “What you endure is meant to educate you.”
    marker-yv: yv-n
  - type: text
    text: 'for he is doing what any loving father does for his children. For who has ever heard of a child who never had to be corrected? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Who has ever heard of a child not approved by a father?”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'We all should welcome God’s discipline as the validation of authentic sonship. For if we have never once endured his correction it only proves we are strangers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “illegitimate.”
    marker-yv: yv-n
  - type: text
    text: and not sons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And isn’t it true that we respect our earthly fathers even though they corrected and disciplined us? Then we should demonstrate an even greater respect for God, our spiritual Father, as we submit to his life-giving discipline. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 6:23
      metadata:
        usfm: PRO.6.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Our parents corrected us for the short time of our childhood as it seemed good to them. But God corrects us throughout our lives for our own good, giving us an invitation to share his holiness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now all discipline '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Throughout this passage the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: discipline
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can also be translated “correction,” “instruction,” and “training.”
    marker-yv: yv-n
  - type: text
    text: 'seems to be painful at the time, yet later it will produce a transformation of character, bringing a harvest of righteousness and peace '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: James 3:18
      metadata:
        usfm: JAS.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: to those who yield to it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “those who have endured its [gymnastic] training.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So be made strong even in your weakness by lifting up your tired hands '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in prayer and worship
  - type: text
    text: '. And strengthen your weak knees, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here can also mean “paralyzed knees.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'for as you keep walking forward on God’s paths '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 35:3
      metadata:
        usfm: ISA.35.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 4:26
      metadata:
        usfm: PRO.4.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: all your stumbling ways will be divinely healed!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In every relationship be swift to choose peace over competition, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 34:14
      metadata:
        usfm: PSA.34.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and run swiftly toward holiness, for those who are not holy will not see the Lord. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “no man will see into the Lord.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Watch over each other to make sure that no one misses the revelation of God’s grace. And make sure no one lives with a root of bitterness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “resentment.”
    marker-yv: yv-n
  - type: text
    text: sprouting within them which will only cause trouble and poison the hearts of many.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Be careful that no one among you lives in immorality, becoming careless about God’s blessings, like Esau who traded away his rights as the firstborn for a simple meal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And we know that later on when he wanted to inherit his father’s blessing, he was turned away, even though he begged for it with bitter tears, for it was too late then to repent.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “he found no place of restoration.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Entering into God’s Presence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For we are not coming, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as Moses did
  - type: text
    text: ', to a physical mountain with its burning fire, thick clouds of darkness and gloom, and with a raging whirlwind. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
