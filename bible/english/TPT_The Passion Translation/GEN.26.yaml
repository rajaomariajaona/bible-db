      - type: text
        text: Or “Shibah,” which means “oath” or “seven.” The triliteral Hebrew root can also be interpreted as “abundance” and is translated in this way by Syriac, Vulgate, Aquila, and Symmachus. The preferred translation is “oath” (LXX) or “vow.”
    marker-yv: yv-n
  - type: text
