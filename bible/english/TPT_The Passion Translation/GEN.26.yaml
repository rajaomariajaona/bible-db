document_id: GEN.26,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Adventures of Isaac in Gerar
  - type: text
    content: 'Now, another famine struck the land, like the one in Abraham’s time. Isaac traveled to Gerar '
  - type: note
    content: Gerar means “lodging place” and was directly on the route to Egypt. Isaac and Rebekah were apparently on their way down to Egypt.
  - type: text
    content: 'where Abimelech was the Philistine king. '
  '10':
  - type: text
    content: '“Don’t you realize what you’ve done to us?” Abimelech asked. “One of our men might have slept with your wife, and you would have brought guilt '
  - type: text
    content: and punishment
  - type: text
    content: ' upon us!” '
  '11':
  - type: text
    content: So Abimelech issued a stern warning to all the people, saying, “Whoever lays a hand on this man or his wife shall be put to death!”
  - type: heading
    content: Isaac Becomes Very Wealthy
  '12':
  - type: text
    content: 'Isaac planted crops in that land, and in the same year '
  - type: note
    content: Isaac did not hoard his seed in a time of famine but sowed it in the enemy’s land and reaped great blessing. See Deut. 28:1–14.
  - type: text
    content: 'reaped a hundred-fold harvest, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' greatly blessed him! '
  - type: note
    content: God transformed a land of famine into a land of abundant harvest. If you sow your seed in the day of famine, watch God multiply it into an abundant harvest. See 2 Cor. 8:1–5; 9:6–11.
  '13':
  - type: text
    content: 'Isaac grew richer and richer '
  - type: note
    content: Or “greater and greater.”
  - type: text
    content: 'until he was extremely wealthy. '
  '14':
  - type: text
    content: 'He acquired so many flocks and herds and so many servants that the Philistines grew jealous, '
  '15':
  - type: text
    content: 'so the Philistines stopped up all of Isaac’s wells and filled them with dirt—the same wells his father’s servants had dug in the time of Abraham. '
  - type: note
    content: In the culture of the day, to dig a well on unclaimed land was a proof of title to the land. To stop the wells of someone else was considered an act of war. Isaac refused to war against the people and chose instead to move away.
  '16':
  - type: text
    content: Eventually Abimelech’s jealousy got the better of him
  - type: text
    content: ', and he said to Isaac, “You must leave us! You have become too rich and powerful for us!” '
  '17':
  - type: text
    content: So Isaac departed from Abimelech’s domain and camped near the Wadi of Gerar, where he settled.
  - type: heading
    content: Isaac Digs New Wells
  '18':
  - type: text
    content: Isaac reopened and restored the wells his father Abraham had originally dug—the wells the Philistines had stopped up after Abraham’s death. And Isaac gave these wells the same names that his father had given them.
  '19':
  - type: text
    content: 'One day, when Isaac’s servants dug in the valley, they uncovered a spring-fed well. '
  - type: note
    content: Or “living water,” that is, an unfailing spring of water flowing beneath the surface. Isaac not only reopened ancient wells but also went on to open his own. God’s spiritual “Isaacs” will always be those who not only respect the wisdom of the elders but also go on to dig their own wells.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' appeared before Isaac and said, “Do not go down to Egypt. Stay in the land that I will reveal to you. '
  '20':
  - type: text
    content: 'But the herdsmen of Gerar picked a fight '
  - type: note
    content: There is an implication of physical violence over the well, for the same Hebrew word is found in Ex. 21:18 concerning a fistfight.
  - type: text
    content: 'with Isaac’s herdsmen, saying, “That’s our well!” So Isaac named the well Argument '
  - type: note
    content: Or “Esek,” which means “contention,” “dispute,” “quarrel,” or “argument.”
  - type: text
    content: 'because of the sharp contention. '
  '21':
  - type: text
    content: 'They dug a second well, and it also caused a quarrel, so Isaac named that well Hostility. '
  - type: note
    content: Or “Sitnah,” which means “accusation,” “hostility,” or “enmity.”
  '22':
  - type: text
    content: 'Then he pulled up stakes from there and dug a third well, but this one was dug without any quarreling, so Isaac named it Spacious, '
  - type: note
    content: Or “Rehoboth,” which means “broad places,” “room [roomy],” or “spacious places.” This place was later known as Wadi Ruhebe and is located about twenty miles (thirty kilometers) southwest of Beersheba.
  - type: text
    content: 'saying, “Finally, '
  - type: text
    content: Yahweh
  - type: text
    content: ' has made ample room for us and we will become prosperous '
  - type: note
    content: Or “fruitful.”
  - type: text
    content: in the land!”
  '23':
  - type: text
    content: 'From there, Isaac moved his camp to Beersheba. '
  '24':
  - type: text
    content: 'That very night, '
  - type: text
    content: Yahweh
  - type: text
    content: ' appeared before him '
  - type: note
    content: In Beersheba, God dug a well in Isaac. The strife with others had taken its toll on Isaac, leaving him hungry for a fresh encounter with God. When others were jealous, continually harassing him, faithful Isaac was visited by God.
  - type: text
    content: 'and said:'
  - type: text
    content: “I am the God of Abraham your father.
  - type: text
    content: You will never need to fear a thing for I am with you
  - type: text
    content: and I will greatly bless you.
  - type: text
    content: Your children will flourish and succeed
  - type: text
    content: 'because '
  - type: text
    content: of the promises I gave
  - type: text
    content: ' my servant Abraham.”'
  '25':
  - type: text
    content: 'So Isaac built an altar, '
  - type: note
    content: That Isaac built an altar implies that he offered sacrifices upon this altar, remembering the altar he once was placed upon by his father (see Gen. 22).
  - type: text
    content: 'prayed, and worshiped '
  - type: text
    content: Yahweh
  - type: text
    content: ' there. He pitched his tent there, and his servants started digging another well.'
  - type: note
    content: 'The altar, the tent, and the well—each one points to an aspect of the lives of the patriarchs: the altar of worship, the tent of temporary sojourn, and the deep well of satisfaction in God.'
  '26':
  - type: text
    content: 'Then King Abimelech came to Isaac from Gerar with his adviser '
  - type: note
    content: Although the Hebrew word can be translated “friend,” Ahuzzah was a counselor who had the ear of the king. The names Abimelech and Abraham are both found seven times in this chapter.
  - type: text
    content: 'Ahuzzath and his army commander Phicol. '
  '27':
  - type: text
    content: Isaac asked them, “Why have you come to me now, since you hated me and sent me away?”
  '28':
  - type: text
    content: 'They answered, “We have witnessed firsthand how '
  - type: text
    content: powerfully
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: '’s favor has been with you, so we say, let there be a peace treaty among us. Let us make a covenant '
  '29':
  - type: text
    content: 'to do each other no harm. Swear to us that you will not trouble us, just as we have not troubled you and have always treated you well and sent you away in peace. Now look at how '
  - type: text
    content: Yahweh
  - type: text
    content: ' has blessed you!” '
  '3':
  - type: text
    content: 'Live there as a foreigner, and my presence will be with you. I promise to bless you, '
  - type: note
    content: God blessed Isaac even in a time of famine. See vv. 12–14.
  - type: text
    content: 'for I will give all these lands to you and your descendants. I will fulfill the oath I swore to your father Abraham. '
  '30':
  - type: text
    content: 'So Isaac prepared a '
  - type: text
    content: wonderful
  - type: text
    content: ' feast for them, and they all ate and drank together. '
  '31':
  - type: text
    content: Then the next morning, they got up early and exchanged oaths. Isaac said goodbye to them, and they left Isaac in peace.
  '32':
  - type: text
    content: 'Later that same day, Isaac’s servants came with wonderful news about the well they had dug, saying, “We’ve just found water!” '
  - type: note
    content: Yahweh truly smiled on what Isaac had done in forgiving and feeding his enemies, for on the same day he made this covenant with Abimelech, his servants brought him the news of a fresh well of water they found. Since Isaac had remained silent over the offense of losing wells, God honored him with a new one.
  '33':
  - type: text
    content: 'So he named it Oath. '
  - type: note
    content: Or “Shibah,” which means “oath” or “seven.” The triliteral Hebrew root can also be interpreted as “abundance” and is translated in this way by Syriac, Vulgate, Aquila, and Symmachus. The preferred translation is “oath” (LXX) or “vow.”
  - type: text
    content: 'This is why the city where they dug the well is called Beersheba '
  - type: note
    content: Or “Well of the Oath.” Isaac’s name is associated with wells seven times in Genesis.
  - type: text
    content: to this day.
  - type: heading
    content: The Hittite Wives of Esau
  '34':
  - type: text
    content: 'When Esau was forty, he married two Hittite women, Judith '
  - type: note
    content: Judith means “praised.”
  - type: text
    content: 'the daughter of Beeri '
  - type: note
    content: Beeri means “my well.”
  - type: text
    content: 'and Basemath '
  - type: note
    content: Basemath means “fragrance” or “spice.”
  - type: text
    content: 'the daughter of Elon. '
  '35':
  - type: text
    content: They made life miserable for Isaac and Rebekah.
  - type: note
    content: Isaac failed to deal with Esau concerning his Hittite wives. Remember how much care Abraham gave to finding a wife for Isaac (see Gen. 24)? Why didn’t Isaac now give great attention to finding the proper wife for his son? The Targums say that Esau and his wives rebelled against Isaac and Rebekah’s instruction.
  '4':
  - type: text
    content: 'I will make your descendants as numerous as the stars of heaven, and I will '
  - type: text
    content: one day
  - type: text
    content: ' give them all these lands. I will bless all the nations of the earth through your offspring '
  '5':
  - type: text
    content: because Abraham was faithful to me. He listened to my voice and yielded his heart to follow my direction. He kept my commandments, my instructions, and my teachings.”
  - type: note
    content: Or “my laws.” The laws of Moses for Israel had not yet been given. Abraham had no Bible; therefore, he depended on hearing Yahweh’s voice and followed his revelation in all its forms. Yahweh commends Abraham for his faithfulness. The Hebrew word for “teachings” is a plural form of torah. Many years later, Yahweh revealed the Torah to Moses, who set it down in the books we know as Genesis, Exodus, Leviticus, Numbers, and Deuteronomy (see Ex. 34:27). The universe of meaning for the Hebrew word torah includes direction, instruction, rules, etc.
  '6':
  - type: text
    content: 'So Isaac settled in Gerar. '
  '7':
  - type: text
    content: 'The men of the land '
  - type: text
    content: noticed Rebekah’s beauty
  - type: text
    content: ' and asked Isaac about her. “Oh, she’s just my sister,” he replied. Rebekah was indeed very beautiful, and he was afraid to tell them, “She’s my wife,” for he thought that the men of the land would kill him and take his wife.'
  '8':
  - type: text
    content: 'One day, after Isaac had lived there awhile, the Philistine king Abimelech looked out his window and saw Isaac affectionately caressing '
  - type: note
    content: Or “fondling.” Perhaps we would say, “They were making out.” This Hebrew word in its consonantal form is a play on words with the name Isaac.
  - type: text
    content: 'his wife Rebekah. '
  '9':
  - type: text
    content: So Abimelech summoned Isaac and said, “So, this woman is your wife! Why did you say that she was your sister?”
  - type: text
    content: '“Because I thought the men of the land would kill me '
  - type: text
    content: and take her
  - type: text
    content: ',” Isaac said.'
