  - type: text
    text: 'I will make your descendants as numerous as the stars of heaven, and I will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: one day
  - type: text
    text: ' give them all these lands. I will bless all the nations of the earth through your offspring '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: because Abraham was faithful to me. He listened to my voice and yielded his heart to follow my direction. He kept my commandments, my instructions, and my teachings.”
  - type: usfm
