        text: .
    marker-yv: yv-n
  - type: text
    text: 'reaped a hundred-fold harvest, for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' greatly blessed him! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God transformed a land of famine into a land of abundant harvest. If you sow your seed in the day of famine, watch God multiply it into an abundant harvest. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 8:1–5
