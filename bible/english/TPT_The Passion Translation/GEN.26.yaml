      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Isaac grew richer and richer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “greater and greater.”
    marker-yv: yv-n
  - type: text
    text: 'until he was extremely wealthy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He acquired so many flocks and herds and so many servants that the Philistines grew jealous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'so the Philistines stopped up all of Isaac’s wells and filled them with dirt—the same wells his father’s servants had dug in the time of Abraham. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the culture of the day, to dig a well on unclaimed land was a proof of title to the land. To stop the wells of someone else was considered an act of war. Isaac refused to war against the people and chose instead to move away.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Eventually Abimelech’s jealousy got the better of him
  - type: text
    text: ', and he said to Isaac, “You must leave us! You have become too rich and powerful for us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: So Isaac departed from Abimelech’s domain and camped near the Wadi of Gerar, where he settled.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaac Digs New Wells
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Isaac reopened and restored the wells his father Abraham had originally dug—the wells the Philistines had stopped up after Abraham’s death. And Isaac gave these wells the same names that his father had given them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'One day, when Isaac’s servants dug in the valley, they uncovered a spring-fed well. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “living water,” that is, an unfailing spring of water flowing beneath the surface. Isaac not only reopened ancient wells but also went on to open his own. God’s spiritual “Isaacs” will always be those who not only respect the wisdom of the elders but also go on to dig their own wells.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the herdsmen of Gerar picked a fight '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an implication of physical violence over the well, for the same Hebrew word is found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 21:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: concerning a fistfight.
    marker-yv: yv-n
  - type: text
    text: 'with Isaac’s herdsmen, saying, “That’s our well!” So Isaac named the well Argument '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Esek,” which means “contention,” “dispute,” “quarrel,” or “argument.”
    marker-yv: yv-n
  - type: text
    text: 'because of the sharp contention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They dug a second well, and it also caused a quarrel, so Isaac named that well Hostility. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Sitnah,” which means “accusation,” “hostility,” or “enmity.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then he pulled up stakes from there and dug a third well, but this one was dug without any quarreling, so Isaac named it Spacious, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Rehoboth,” which means “broad places,” “room [roomy],” or “spacious places.” This place was later known as Wadi Ruhebe and is located about twenty miles (thirty kilometers) southwest of Beersheba.
    marker-yv: yv-n
  - type: text
    text: 'saying, “Finally, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has made ample room for us and we will become prosperous '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fruitful.”
    marker-yv: yv-n
  - type: text
    text: in the land!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'From there, Isaac moved his camp to Beersheba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'That very night, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' appeared before him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Beersheba, God dug a well in Isaac. The strife with others had taken its toll on Isaac, leaving him hungry for a fresh encounter with God. When others were jealous, continually harassing him, faithful Isaac was visited by God.
    marker-yv: yv-n
  - type: text
    text: 'and said:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am the God of Abraham your father.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will never need to fear a thing for I am with you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will greatly bless you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your children will flourish and succeed
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the promises I gave
  - type: text
    text: ' my servant Abraham.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So Isaac built an altar, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That Isaac built an altar implies that he offered sacrifices upon this altar, remembering the altar he once was placed upon by his father (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 22
      metadata:
        usfm: GEN.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'prayed, and worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' there. He pitched his tent there, and his servants started digging another well.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The altar, the tent, and the well—each one points to an aspect of the lives of the patriarchs: the altar of worship, the tent of temporary sojourn, and the deep well of satisfaction in God.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then King Abimelech came to Isaac from Gerar with his adviser '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the Hebrew word can be translated “friend,” Ahuzzah was a counselor who had the ear of the king. The names Abimelech and Abraham are both found seven times in this chapter.
    marker-yv: yv-n
  - type: text
    text: 'Ahuzzath and his army commander Phicol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Isaac asked them, “Why have you come to me now, since you hated me and sent me away?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'They answered, “We have witnessed firsthand how '
  - type: usfm
    marker: it
    children:
    - type: text
      text: powerfully
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s favor has been with you, so we say, let there be a peace treaty among us. Let us make a covenant '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'to do each other no harm. Swear to us that you will not trouble us, just as we have not troubled you and have always treated you well and sent you away in peace. Now look at how '
