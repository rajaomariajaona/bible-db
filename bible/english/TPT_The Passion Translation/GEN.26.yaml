      text: '6'
  - type: text
    text: 'So Isaac settled in Gerar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The men of the land '
  - type: usfm
    marker: it
    children:
    - type: text
      text: noticed Rebekah’s beauty
  - type: text
    text: ' and asked Isaac about her. “Oh, she’s just my sister,” he replied. Rebekah was indeed very beautiful, and he was afraid to tell them, “She’s my wife,” for he thought that the men of the land would kill him and take his wife.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'One day, after Isaac had lived there awhile, the Philistine king Abimelech looked out his window and saw Isaac affectionately caressing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fondling.” Perhaps we would say, “They were making out.” This Hebrew word in its consonantal form is a play on words with the name Isaac.
    marker-yv: yv-n
  - type: text
    text: 'his wife Rebekah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So Abimelech summoned Isaac and said, “So, this woman is your wife! Why did you say that she was your sister?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Because I thought the men of the land would kill me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and take her
  - type: text
    text: ',” Isaac said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Don’t you realize what you’ve done to us?” Abimelech asked. “One of our men might have slept with your wife, and you would have brought guilt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and punishment
  - type: text
    text: ' upon us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Abimelech issued a stern warning to all the people, saying, “Whoever lays a hand on this man or his wife shall be put to death!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaac Becomes Very Wealthy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Isaac planted crops in that land, and in the same year '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaac did not hoard his seed in a time of famine but sowed it in the enemy’s land and reaped great blessing. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 28:1–14
    - type: usfm
      marker: ft
      children:
