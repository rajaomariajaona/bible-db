          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hil. Melachim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1:3, 3:8;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hil. Sanhedrin
      - type: usfm
