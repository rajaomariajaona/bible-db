    - type: text
      text: About the Book of Joshua
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A new beginning stretches out before us! When we read the book of Joshua, we learn the ways of God: how he moves us forward, how we triumph over our enemies, and how we do the impossible. Joshua, a former slave in Egypt, became the leader of God’s people after the death of Moses. A generational transfer took place as a younger generation rose with fresh vision, a bold faith, and renewed passion to possess all that God had given them. All this and more is contained in the sacred book you have in your hand, the book of Joshua.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Joshua is the hinge of Israel’s history. The wilderness wandering was now over as the promised land was before them. The manna ceased, the Jordan was behind them, a new leader rose, and a new beginning opened up for the people of God. Walled cities and fierce enemies are no match for the living God. But it would still require a faith-filled people to move in and possess what God had given to them.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: As the sixth book of the Bible, Joshua begins the section of Israel’s history. Bundled together, Joshua through Esther make up the biblical, inspired history of the Jewish people. Our Jewish friends call this section of the Bible (Joshua, Judges, Samuel, Kings) the “Former Prophets.” Since this section of the Bible can be considered prophecy, Joshua prophesies to the church today (see 1 Cor. 10:11), giving us instruction for how to live before God. The truths of Joshua are as much for today as the teachings of Paul or Peter. These Former Prophets lay out in front of us the secrets of victory.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'The title Former Prophets demonstrates the prophetic nature of God’s dealing with his people and also the nations. It is the story of God’s redemption by the power of his mighty hand and empowering Spirit, giving revelations, performing signs and wonders, and testifying to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s faithfulness in all things.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The book of Joshua shows us that we can go into the promised land of what God wants us to be. We can become the delight of God. The book of Joshua is the Ephesians of the Old Testament. Joshua was blessed with every earthly blessing in the land of Canaan. We are blessed with every heavenly blessing in Christ (see Eph. 1:3). Joshua lays out a road map to victory for us so that we can advance into our destiny; and our true destiny is for the better Joshua, Jesus, to lead us into his kingdom (see Eph. 1:13–14).
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Purpose
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The book of Joshua contains an important and fascinating part of Israel’s history. It describes the transition of God’s chosen people from wilderness wanderers to courageous conquerors. Joshua is written as more than history. It is a “sermon” meant to activate believers today. We have an inheritance that we must fight for in faith. We have every blessing heaven contains (see Eph. 1:3), but we must claim and implement those blessings.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The church today needs the courage to conquer. Many modern believers act more like prisoners of war instead of passionate conquerors. Followers of Jesus must see themselves as soldiers in a disciplined army prepared to fight spiritual battles. The book of Joshua is a book of conquest, emboldening the church to move from passivity to passion. Like Joshua, our battles are spiritual battles, for we fight not against flesh and blood but against forces of darkness (see footnote on Josh. 24:11).
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Author and Audience
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Joshua was one of the twelve spies who first went into the land of Canaan. Along with Caleb, Joshua was the only one to give a good report. Indeed, Israel recognized Joshua as their prophet and something similar to a “king,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Rashi,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yoma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 73b; Rambam,
      - type: usfm
        marker: ft
        children:
