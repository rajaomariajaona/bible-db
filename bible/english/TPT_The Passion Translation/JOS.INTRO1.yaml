      text: 'God’s character is further unfolded through the many conflicts that arise. We discover, along with Israel, that God not only initiates covenant relationships, but he also punishes disobedient people. He also gives his people victory over their enemies on their way toward possessing the land and nationhood. This God is a God who fights for his people, standing with them in the midst of their oppression and suffering, raising them up to the plateau of victory, and assuring them they have no reason to “yield to fear nor be discouraged, for I am '
