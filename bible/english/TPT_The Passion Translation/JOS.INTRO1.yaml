      marker-yv: yv-n
    - type: text
      text: although they had not yet come into possession of their kingdom. According to the Jewish historian Josephus, Joshua succeeded Moses when he was eighty-five. He was a military commander who conquered seven nations (kingdoms) in seven years. He died at the age of one hundred and ten and was buried in Timnath Serah.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Joshua’s original name was Hoshea, but Moses changed it to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yehoshua
    - type: text
      text: ' (see Num. 13:8, 16), which can be translated as “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is salvation” or “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' save.” In fact, the name Yehoshua is nearly the Hebrew equivalent of the name Jesus (Yeshua). The Greek word for Jesus is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Iesous
    - type: text
      text: ' and means the same as the name Joshua. One could almost say there is a book in the Bible named '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jesus
    - type: text
      text: . That’s one book I would want to read, wouldn’t you?
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Although certain portions were added after Joshua’s death, translators believe the author was Joshua himself for several reasons: Certain episodes of the book bear the mark of an eyewitness, such as where the author states “we” passed through the waters on dry ground in chapter three; Joshua’s description of Canaanite wickedness parallels the well-known Ras Shamra tablets, written in Joshua’s time; Joshua’s list of boundaries for the twelve tribes (see Josh. 13–19) accurately reflect the known situation of Canaan prior to the Jewish monarchy; descriptions of certain cities, such as Jerusalem still being a Jebusite city (see 15:63) and Gezer still being a Canaanite city (see 16:10), imply the author was living in the time of Joshua; and the author seems to write about things that happened in his lifetime, not about anything happening previously.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'For the people of Israel, the book of Joshua was an important “hinge book” between the Torah and Prophecy. This conquering military hero who ushered in the salvation of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' wrote this book to a people wrestling with establishing the nation in the land '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' provided, understanding God’s divine revelation-word of promise, and waiting for the fullness of his provision and promises to be realized. Similarly, we, too, wait for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s promises to be fully realized, awaiting the day of his promised-land rest!
  - type: usfm
    marker: is1
    children:
    - type: text
      text: Major Themes
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: The Land of Promise.
    - type: text
      text: ' The book of Joshua is the book of the land. It is this long-ago-promised gift of a specific land by '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' that is the central animating theme. The verses offered just after Israel takes possession of the land could be a fair summary of the entire book: “So '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave Israel all the land he had promised their ancestors. They took possession of the land and settled there. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' kept his promise and gave them peace in the land. . . . Not one of their enemies could stand against them. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' didn’t break a single promise that he made to the people of Israel” (21:43–45).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'This central theological theme in Joshua is intimately connected with Israel’s national and ethnic identities and to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s fulfillment of his promises to the patriarchs Abraham, Isaac, and Jacob to gift their generations such a land of promise. We find six aspects of this gift throughout the book of Joshua: (1) God promised the land-gift to the forefathers; (2) God gave the gift to Israel; (3) Joshua divided it as an inheritance for the people; (4) this gift was closely connected to the land on the east side of the Jordan River; (5) it would not be difficult to take from those still living there because God had caused its inhabitants to tremble with fear; and (6) the land-gift was filled with other gods who tempted Israel.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'The promised land wasn’t just '
    - type: usfm
      marker: it
      children:
      - type: text
        text: land
    - type: text
      text: '; it was a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gift
    - type: text
      text: . A gift a good Father (
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ') gave to his beloved children (Israel). God promised this gift from the day he called out the man (Abraham) who would birth the nation, and he ultimately fulfilled that promise in this wonderful book. But God also extends this gift to committed hearts and obedient hands today. The book illustrates the tragedy of neglecting this gift, offering a foreshadowing of Israel’s wandering ways that would ultimately lead to exile from the land and separation from the gift of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Covenant and Obedience.
    - type: text
      text: ' The promised land given to the children of Israel as a promised gift is at the heart of a covenant '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' made with them generations ago. Genesis 17:7–9 outlines the terms of this covenant:'
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: “I will be your children’s God, just as I am your God.
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: I will give to you and your seed
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: the land to which you have migrated.
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: The entire land of Canaan will be yours and your descendants’
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: as an everlasting possession.
  - type: usfm
    marker: iq1
    children:
    - type: text
      text: And I will be their God forever!”
  - type: usfm
    marker: imq
    children:
    - type: text
      text: God explained to Abraham, “Your part of the covenant is to obey its terms, you and your descendants throughout the ages.”
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Throughout the book of Joshua, the ark of the covenant went before the people as a constant reminder of this relationship, symbolizing '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s mercy, power, and holiness. At every juncture of Israel’s journey in this book—from the floodwaters of the Jordan to the gates of Jericho and to the covenant’s renewal at Mount Ebal—they were to march in a new manner, with their eyes on the ark and their hearts set on '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Obedience was at the core of this covenantal relationship, realized and renewed in Joshua. The people who still lived in the land, with their pagan gods and pagan ways, constantly challenged the obedience of God’s people. Israel was to worship and obey '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' alone, practices which Joshua outlined in several ways: they were to meditate on the Torah day and night, learn the commands of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', practice circumcision, keep the Passover, worship at the place of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s choosing, and obey the written laws of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Perhaps the climax of the covenant in the book comes at the end, just before Joshua’s death was reported. He led the people in renewing their relationship with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' at Shechem and put into the starkest terms possible Israel’s need to fully embrace their covenantal relationship with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and obey him completely: “Make your decision today which gods you will worship—the gods which your ancestors worshiped in Mesopotamia or the gods which the Amorites worship in the land where you are now living—but I and my family, we will give our lives to worship and serve '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ” (Josh. 24:15).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'The ark not only beautifully illustrates God’s covenant with Israel, it is also a wonderful picture of Jesus Christ, who “is the catalyst of a better covenant which contains far more wonderful promises” (Heb. 8:6). The power of Christ within us enables us to pass over into our full inheritance. Jesus, our forerunner, leads us in, and we are to join with the same obedient voices as those of Israel, declaring “We, too, will worship and serve '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', for he alone is our God” (Josh. 24:18).'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: The Typology of Jesus.
    - type: text
      text: ' To read the book of Joshua and not see Jesus would be unfortunate. Joshua is a clear type of Jesus, for he took the Israelites into a realm that the law (Moses) was unable to experience. The church father Eusebius offers this connection between the name Joshua and the name Jesus:'
  - type: usfm
    marker: imq
    children:
    - type: text
      text: Moses was inspired by the divine Spirit to foresee clearly the name of Jesus; and he deemed this name of special honor. Till it was made known to Moses, it had never been on man’s lips before. He bestowed the name of Jesus on him first of all, and only on him, who he knew would succeed, in type and symbol, after his death. His successor had not previously been called Jesus, but his parents had called him Hoshea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hist. Eccles.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: I 3.
      marker-yv: yv-n
  - type: usfm
    marker: ip
    children:
    - type: text
      text: For the believer, the typology of Joshua is apparent. First, the name Joshua is wonderfully similar to Jesus (Yeshua). Secondly, the promised land for the follower of Christ becomes a picture of the untold blessings that are ours in Christ (see Eph. 1:3). Canaan was a fertile land. It symbolizes the abundant life of the victorious believer. Canaan had to be conquered, and so our promises and blessings must be claimed by faith. The law of Moses did not attain Canaan but only the grace of God did. Heathen hordes inhabited Canaan, and God’s people had to purge the land of the powers of darkness and idolatry, just as we must purge our hearts (see Eph. 6:12; Heb. 9:23).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The miracle-crossing of the Jordan River typifies crossing over into a life of abundance and union with Jesus Christ. Our Savior was the One who descended into judgment for our sins. The Jordan was miraculously rolled back all the way to a town called Adam; Jesus rolled back the waters of judgment all the way back to the sin of Adam. The rending of the Jordan corresponds to the rending of the veil in the Holy of Holies when Jesus was crucified (see 2 Cor. 3:1–18; Heb. 10:20). We are now those who cross over into union and intimacy with God.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Additionally, the pushing back of the waters (as the dividing of the Red Sea previously) displayed the power of Israel’s God over all other gods, including those of the seas and rivers (that were believed to be untamable in the ancient world). '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' showed his power to destroy every other power and authority in carrying out his victory of life for a people he had made his own. This is what caused fear to enter the hearts of the inhabitants of the land who had previously heard of the strong and mighty outstretched arm of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' that split the Red Sea in two and now divided the river. No god can stand before this God! This is even more significant when gods are associated with particular territories or spheres of influence. This God travels and has power over all territories and powers.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Aside from the clear name association, we can see Jesus in the book of Joshua in a number of ways:'
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Heavenly Joshua (Heb. 4:8)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Pioneer of Our Salvation (Heb. 2:10)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Crimson Rope (Josh. 2:18)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Ark of the Covenant of the Lord of All the Earth (Josh. 3:11)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Memorial of Twelve Stones (Josh. 4:19–24)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Passover Lamb (Josh. 5:10–12; 1 Cor. 5:7–8)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Altar (Josh. 8:30–35; Heb. 13:10)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: 'The Commander of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Armies (Josh. 5:13–15; Eph. 6:12–18)
  - type: usfm
    marker: ili1
    children:
    - type: text
      text: The Heavenly Refuge (Josh. 20:1–9; Heb. 6:19–20)
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Conquest and God’s Character.
    - type: text
      text: ' The book of Joshua is a road map, a manual for conquest. It contains the secrets of conquest with its amazing, jaw-dropping victories and sadly disappointing defeats. And yet, many point to the book of Joshua as an example of God behaving badly because of this theme of conquest, which seems to touch a raw nerve. Some view these battles as morally dubious, filled with nationalistic violence and terror. However, note several things about the context of the time in which this history of Israel’s conquests unfolds.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'First, war was a normal fact of life; it still is. The Bible reminds us there is a time for war (see Eccl. 3:8) and a justifiable war (see Gen. 14), which the book of Joshua illustrates. However, the modern military cannot claim the right to destructive warfare based on Israelite wars, for they served a divine purpose in unfolding '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s plans. Also the sort of holy war we find in Joshua was not invented by Israel nor limited to the nation. Further, the Canaanites were by no means innocent, for their sexual perversion, child sacrifice, and pagan idolatry could not go unpunished by a righteous God.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Finally, the theme of conquest reveals the character of God. In the book of Joshua, we see God’s mercy unfold, such as in his sparing of Rahab and her family. Also, consider the fact that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' mercifully waited hundreds of years before commencing the conquest, giving the inhabitants of the land ample time to repent (see 2 Pet. 3:9). God waited until their cup of iniquity was filled. No doubt this aspect of Joshua can be troubling. However, in this way the conquest shows us God’s anger, justice, and wrath—important elements of his character.'
  - type: usfm
    marker: ip
