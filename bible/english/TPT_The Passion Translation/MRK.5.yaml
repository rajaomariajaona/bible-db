document_id: MRK.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Demonized Man Set Free
  - type: text
    content: 'They arrived at the other side of the lake, at the region of the Gerasenes. '
  - type: note
    content: This was a region of non-Jewish people who were raising swine, which was considered unclean by Jewish dietary laws. Gerasenes (or Gadarenes) were people who lived in a region opposite Galilee, on the southeastern side of Lake Galilee. See Matt. 8:28–34.
  '10':
  - type: text
    content: He begged Jesus repeatedly not to expel them out of the region.
  '11':
  - type: text
    content: 'Nearby there was a large herd of pigs feeding on the hillside. '
  '12':
  - type: text
    content: The demons begged him, “Send us into the pigs. Let us enter them!”
  '13':
  - type: text
    content: So Jesus gave them permission, and the demon horde immediately came out of the man and went into the pigs! This caused the herd to rush madly down the steep slope and fall into the lake, drowning about two thousand pigs!
  - type: note
    content: Depending on weight, the cost of two thousand live pigs today could be as much as $250,000. The economic cost to the community over the loss of this herd was significant.
  '14':
  - type: text
    content: 'At this, the herdsmen ran to the nearby villages, telling everyone along the way what had happened, and the people came out to see for themselves. '
  '15':
  - type: text
    content: 'When they found Jesus, they saw the demonized man sitting there, properly clothed and in his right mind. Seeing what had happened to the man possessed by many demons, the people became afraid. '
  '16':
  - type: text
    content: 'Those who had witnessed '
  - type: text
    content: this miracle
  - type: text
    content: ' reported the news to the people and included what had happened to the pigs. '
  '17':
  - type: text
    content: Then they asked Jesus to leave their region.
  - type: note
    content: The people preferred swine to the Son of God. There is no indication that Jesus ever went back to their land.
  '18':
  - type: text
    content: 'And as Jesus began to get into the boat to depart, the man who had been set free from demons asked him, “Could I go with you?” '
  '19':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “No,”
  - type: text
    content: ' but said to him, '
  - type: text
    content: “Go back to your home and to your family and tell them what the Lord has done for you. Tell them how he had mercy on you.”
  '2':
  - type: text
    content: 'As Jesus stepped ashore, a demon-possessed madman came out of the graveyard and confronted him. '
  '20':
  - type: text
    content: 'So the man left and went into the region of Jordan and parts of Syria '
  - type: note
    content: Or “Decapolis,” which means “Ten Cities.” The region of these ten cities was Jordan and parts of Syria, including Damascus. These cities were Greek and Roman cultural centers of that day. It is a wonder of grace that Jesus used a man who once had thousands of demons to bring God’s truth to thousands of people. After he was set free, he became a missionary evangelist, telling others what Jesus Christ had done for him. No wonder the people marveled when they heard his story!
  - type: text
    content: to tell everyone he met about what Jesus had done for him, and all the people marveled!
  - type: heading
    content: Two Miracles—Healing and Resurrection
  '21':
  - type: text
    content: 'After Jesus returned from across the lake, a huge crowd of people quickly gathered around him on the shoreline. '
  '22':
  - type: text
    content: 'Just then, a man saw that it was Jesus, so he pushed through the crowd and threw himself down at his feet. His name was Jairus, '
  - type: note
    content: Jairus (taken from the Hebrew name Jair) means “he enlightens” or “he shines the light.”
  - type: text
    content: 'a Jewish official who was in charge of the synagogue. '
  '23':
  - type: text
    content: 'He pleaded with Jesus, saying over and over, “Please come with me! My little daughter is at the point of death, '
  - type: text
    content: and she’s only twelve years old
  - type: text
    content: '! '
  - type: note
    content: This is taken from v. 42 and is brought in at this sequence of the narrative for the sake of clarity and in contrast with the woman who suffered for twelve years (v. 25).
  - type: text
    content: Come and lay your hands on her and heal her and she will live!”
  '24':
  - type: text
    content: Immediately Jesus went with him, and the huge crowd followed, pressing in on him from all sides.
  '25':
  - type: text
    content: 'Now, in the crowd that day was a woman who had suffered horribly from continual bleeding for twelve years. '
  - type: note
    content: The daughter of Jairus was twelve years old; this woman had suffered for twelve years. Jesus touched the girl; the woman touched Jesus. In the Jewish culture, this would have defiled Jesus and left him ceremonially unclean. But in fact, people were healed by that touch. Life is greater than law. He bore our uncleanness and left us healed. The two intertwining miracles in this chapter speak of Jesus healing the gentiles and raising Israel back to life (Jairus’ Jewish daughter). On his way to raise the Jewish girl, he stopped to heal the gentile woman. This is what is happening today with Jews and non-Jews.
  '26':
  - type: text
    content: 'She had endured a great deal under the care of various doctors, yet in spite of spending all she had on their treatments, she was getting worse instead of better. '
  '27':
  - type: text
    content: 'When she heard about Jesus’ '
  - type: text
    content: healing power
  - type: text
    content: ', she pushed through the crowd and came up from behind him and touched his prayer shawl. '
  - type: note
    content: Or “cloak” (or “outer garment”). As a Jewish man, Jesus would have had over his shoulders a prayer shawl (“tallit”). The blue tassel on the corner of the prayer shawl was said to symbolize all the commandments and promises of God. See Num. 15:38–40. The Hebrew word for “fringe” or “border” (of a garment) can also mean “wing.” Some have interpreted Mal. 4:2 (“healing in his wings”) as a reference to the tassels of the prayer shawl.
  '28':
  - type: text
    content: 'For she kept saying to herself, “If I could touch even his clothes, I know I will be healed.” '
  - type: note
    content: The Greek word is sozo and has many possible meanings, including “safe and sound,” “healed,” “delivered,” “made whole,” “rescued,” “restored,” and “saved.” This is what Jesus does for us today. See Heb. 13:8.
  '29':
  - type: text
    content: As soon as her hand touched him, her bleeding immediately stopped! She knew it, for she could feel her body instantly being healed of her disease!
  '3':
  - type: text
    content: 'The man had been living there among the tombs, and no one was able to restrain him, not even with chains. '
  '30':
  - type: text
    content: 'Jesus knew at once that someone had touched him, for he felt the power that always surged around him '
  - type: note
    content: This is a literal reading of a unique phrase in Greek construction. It could be translated “the power that keeps going out of him went out from him.” The Aramaic uses the word chayel that can be translated “dancing, twirling [movement]” or “vibrations.” There was a glorious power that kept going out around Jesus Christ, drawing others to him and healing those he touched, and in this case, healing a woman who touched him in faith. Jesus knew that the power of God was always emanating around him, yet it had flowed through him to someone in the crowd. This same miracle was repeated with Peter in Acts 5:15.
  - type: text
    content: 'had passed through him for someone to be healed. He turned and spoke to the crowd, saying, '
  - type: text
    content: “Who touched my clothes?”
  - type: note
    content: Jesus already knew the answer to his question. He wanted the woman to come forward and acknowledge her healing. There were crowds around Jesus, the living Word. Many today crowd around the written Word. But only those who “touch” the Scriptures in faith receive its promises, just like the sick woman who received her healing.
  '31':
  - type: text
    content: 'His disciples answered, “What do you mean, who touched you? Look at this huge crowd—they’re all pressing up against you.” '
  '32':
  - type: text
    content: But Jesus’ eyes swept across the crowd, looking for the one who had touched him for healing.
  '33':
  - type: text
    content: 'When the woman who experienced this miracle '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'realized what had happened to her, she came before him, trembling with fear, and threw herself down at his feet, '
  - type: text
    content: saying, “I was the one who touched you.”
  - type: text
    content: ' And she told him her story of what had just happened.'
  '34':
  - type: text
    content: 'Then Jesus said to her, '
  - type: text
    content: “Daughter, because you dared to believe, your faith has healed you. Go with peace in your heart, and be free from your suffering!”
  '35':
  - type: text
    content: 'And before he had finished speaking, people arrived from Jairus’ house '
  - type: text
    content: and pushed through the crowd
  - type: text
    content: ' to give Jairus the news: “There’s no need to trouble the master any longer—your daughter has died.” '
  '36':
  - type: text
    content: 'But Jesus refused to listen to what they were told '
  - type: note
    content: At times there must be a holy “deafness” to the words of others, words that would distract us from the purposes of God. See Isa. 42:19–20.
  - type: text
    content: 'and said to the Jewish official, '
  - type: text
    content: “Don’t yield to fear. All you need to do is to keep on believing.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: So they left for his home
  - type: text
    content: ', but Jesus didn’t allow anyone to go with them except Peter and the two brothers, Jacob and John.'
  '38':
  - type: text
    content: 'When they arrived at the home of the synagogue ruler, they encountered a noisy uproar among the people, for they were all weeping and wailing. '
  '39':
  - type: text
    content: 'Upon entering the home, Jesus said to them, '
  - type: text
    content: “Why all this grief and weeping? Don’t you know the girl is not dead but merely asleep?”
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'For every time they attempted to chain his hands and feet with shackles, he would snap the chains and break the shackles in pieces. He was so strong that no one had the power to subdue him. '
  '40':
  - type: text
    content: 'Then everyone began to ridicule and make fun of him. But he threw '
  - type: note
    content: The Greek word ekballo is often used for driving out demons. It implies a forceful action of authority.
  - type: text
    content: them all outside.
  - type: text
    content: 'Then he took the child’s father and mother and his three disciples and went into the room where the girl was lying. '
  '41':
  - type: text
    content: 'He tenderly clasped the child’s hand in his and said to her in Aramaic, '
  - type: text
    content: “Talitha koum,”
  - type: text
    content: ' '
  - type: note
    content: One of the many references in the New Testament proving that the language of Jesus was Aramaic.
  - type: text
    content: 'which means, “Little girl, '
  - type: note
    content: The Aramaic word talitha can also mean “little lamb.” The Greek word used here is korasion, which may be a hypocorism, similar to “sweetheart.” The tenderness of this moment is obvious in the text. However, some Hebrew scholars find in the word talitha a Hebrew root that could point to the tallit, or prayer cloak of Jesus, which he may have placed over the girl. This would make his words to mean, “Little girl under the prayer cloak, arise.” This fringed tallit had already been touched by a woman who received her healing previously in this chapter. (See Klein and Spears, Lost in Translation Vol. 1, p. 18, 2007.)
  - type: text
    content: 'wake up from the sleep of death.” '
  '42':
  - type: text
    content: 'Instantly the twelve-year-old girl sat up, stood to her feet, and started walking around the room! Everyone was overcome with astonishment in seeing this miracle! '
  '43':
  - type: text
    content: Jesus had them bring her something to eat. And he cautioned them repeatedly that they were to tell no one about what had happened.
  - type: note
    content: There was nothing secretive about this resurrection miracle of the twelve-year-old girl. It would be hard to keep hidden from the people. Jesus was cautioning them because of the reaction of certain religious authorities who were convinced that Jesus was working wonders by the power of Satan. Later on, the miracle of Lazarus being raised from the dead was what triggered the arrest of Jesus.
  '5':
  - type: text
    content: Day and night he could be found lurking in the cemetery or in the vicinity, shrieking and cutting himself with stones!
  '6':
  - type: text
    content: 'When he saw Jesus from a distance, he ran to him and threw himself down before him, '
  '7':
  - type: text
    content: 'shouting at the top of his lungs, “Leave me alone, Jesus, Son of the Most High God! Swear in God’s name that you won’t torture me!” '
  '8':
  - type: text
    content: '(For Jesus had already said to him, '
  - type: text
    content: “Come out of that man, you demon spirit!”
  - type: text
    content: )
  '9':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “What is your name?”
  - type: text
    content: '“Mob,” '
  - type: note
    content: Or “Legion” (a Roman military unit of more than six thousand men). Mark gives twelve accounts of Jesus defeating demon spirits. The demons always recognized Jesus as God’s Son.
  - type: text
    content: 'he answered. “They call me Mob because there are thousands of us in his body!” '
