document_id: MRK.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Demonized Man Set Free
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'They arrived at the other side of the lake, at the region of the Gerasenes. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a region of non-Jewish people who were raising swine, which was considered unclean by Jewish dietary laws. Gerasenes (or Gadarenes) were people who lived in a region opposite Galilee, on the southeastern side of Lake Galilee. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 8:28–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He begged Jesus repeatedly not to expel them out of the region.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nearby there was a large herd of pigs feeding on the hillside. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The demons begged him, “Send us into the pigs. Let us enter them!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: So Jesus gave them permission, and the demon horde immediately came out of the man and went into the pigs! This caused the herd to rush madly down the steep slope and fall into the lake, drowning about two thousand pigs!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Depending on weight, the cost of two thousand live pigs today could be as much as $250,000. The economic cost to the community over the loss of this herd was significant.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'At this, the herdsmen ran to the nearby villages, telling everyone along the way what had happened, and the people came out to see for themselves. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When they found Jesus, they saw the demonized man sitting there, properly clothed and in his right mind. Seeing what had happened to the man possessed by many demons, the people became afraid. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Those who had witnessed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: this miracle
    - type: text
      text: ' reported the news to the people and included what had happened to the pigs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then they asked Jesus to leave their region.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The people preferred swine to the Son of God. There is no indication that Jesus ever went back to their land.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And as Jesus began to get into the boat to depart, the man who had been set free from demons asked him, “Could I go with you?” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No,”
    - type: text
      text: ' but said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go back to your home and to your family and tell them what the Lord has done for you. Tell them how he had mercy on you.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'As Jesus stepped ashore, a demon-possessed madman came out of the graveyard and confronted him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So the man left and went into the region of Jordan and parts of Syria '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Decapolis,” which means “Ten Cities.” The region of these ten cities was Jordan and parts of Syria, including Damascus. These cities were Greek and Roman cultural centers of that day. It is a wonder of grace that Jesus used a man who once had thousands of demons to bring God’s truth to thousands of people. After he was set free, he became a missionary evangelist, telling others what Jesus Christ had done for him. No wonder the people marveled when they heard his story!
      marker-yv: yv-n
    - type: text
      text: to tell everyone he met about what Jesus had done for him, and all the people marveled!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Miracles—Healing and Resurrection
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'After Jesus returned from across the lake, a huge crowd of people quickly gathered around him on the shoreline. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Just then, a man saw that it was Jesus, so he pushed through the crowd and threw himself down at his feet. His name was Jairus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jairus (taken from the Hebrew name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) means “he enlightens” or “he shines the light.”
      marker-yv: yv-n
    - type: text
      text: 'a Jewish official who was in charge of the synagogue. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He pleaded with Jesus, saying over and over, “Please come with me! My little daughter is at the point of death, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and she’s only twelve years old
    - type: text
      text: '! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is taken from v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and is brought in at this sequence of the narrative for the sake of clarity and in contrast with the woman who suffered for twelve years (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Come and lay your hands on her and heal her and she will live!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Immediately Jesus went with him, and the huge crowd followed, pressing in on him from all sides.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Now, in the crowd that day was a woman who had suffered horribly from continual bleeding for twelve years. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The daughter of Jairus was twelve years old; this woman had suffered for twelve years. Jesus touched the girl; the woman touched Jesus. In the Jewish culture, this would have defiled Jesus and left him ceremonially unclean. But in fact, people were healed by that touch. Life is greater than law. He bore our uncleanness and left us healed. The two intertwining miracles in this chapter speak of Jesus healing the gentiles and raising Israel back to life (Jairus’ Jewish daughter). On his way to raise the Jewish girl, he stopped to heal the gentile woman. This is what is happening today with Jews and non-Jews.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'She had endured a great deal under the care of various doctors, yet in spite of spending all she had on their treatments, she was getting worse instead of better. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'When she heard about Jesus’ '
    - type: usfm
      marker: it
      children:
      - type: text
        text: healing power
    - type: text
      text: ', she pushed through the crowd and came up from behind him and touched his prayer shawl. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cloak” (or “outer garment”). As a Jewish man, Jesus would have had over his shoulders a prayer shawl (“tallit”). The blue tassel on the corner of the prayer shawl was said to symbolize all the commandments and promises of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 15:38–40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Hebrew word for “fringe” or “border” (of a garment) can also mean “wing.” Some have interpreted
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“healing in his wings”) as a reference to the tassels of the prayer shawl.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'For she kept saying to herself, “If I could touch even his clothes, I know I will be healed.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sozo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and has many possible meanings, including “safe and sound,” “healed,” “delivered,” “made whole,” “rescued,” “restored,” and “saved.” This is what Jesus does for us today. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: As soon as her hand touched him, her bleeding immediately stopped! She knew it, for she could feel her body instantly being healed of her disease!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The man had been living there among the tombs, and no one was able to restrain him, not even with chains. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jesus knew at once that someone had touched him, for he felt the power that always surged around him '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a literal reading of a unique phrase in Greek construction. It could be translated “the power that keeps going out of him went out from him.” The Aramaic uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: chayel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: that can be translated “dancing, twirling [movement]” or “vibrations.” There was a glorious power that kept going out around Jesus Christ, drawing others to him and healing those he touched, and in this case, healing a woman who touched him in faith. Jesus knew that the power of God was always emanating around him, yet it had flowed through him to someone in the crowd. This same miracle was repeated with Peter in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 5:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'had passed through him for someone to be healed. He turned and spoke to the crowd, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who touched my clothes?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus already knew the answer to his question. He wanted the woman to come forward and acknowledge her healing. There were crowds around Jesus, the living Word. Many today crowd around the written Word. But only those who “touch” the Scriptures in faith receive its promises, just like the sick woman who received her healing.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'His disciples answered, “What do you mean, who touched you? Look at this huge crowd—they’re all pressing up against you.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But Jesus’ eyes swept across the crowd, looking for the one who had touched him for healing.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'When the woman who experienced this miracle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'realized what had happened to her, she came before him, trembling with fear, and threw herself down at his feet, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying, “I was the one who touched you.”
    - type: text
      text: ' And she told him her story of what had just happened.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Then Jesus said to her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Daughter, because you dared to believe, your faith has healed you. Go with peace in your heart, and be free from your suffering!”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'And before he had finished speaking, people arrived from Jairus’ house '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and pushed through the crowd
    - type: text
      text: ' to give Jairus the news: “There’s no need to trouble the master any longer—your daughter has died.” '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'But Jesus refused to listen to what they were told '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At times there must be a holy “deafness” to the words of others, words that would distract us from the purposes of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 42:19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and said to the Jewish official, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t yield to fear. All you need to do is to keep on believing.”
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: it
      children:
      - type: text
        text: So they left for his home
    - type: text
      text: ', but Jesus didn’t allow anyone to go with them except Peter and the two brothers, Jacob and John.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'When they arrived at the home of the synagogue ruler, they encountered a noisy uproar among the people, for they were all weeping and wailing. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Upon entering the home, Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why all this grief and weeping? Don’t you know the girl is not dead but merely asleep?”
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For every time they attempted to chain his hands and feet with shackles, he would snap the chains and break the shackles in pieces. He was so strong that no one had the power to subdue him. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Then everyone began to ridicule and make fun of him. But he threw '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
