  '1':
  - type: heading
    content: Living Holy Lives
  - type: text
    content: 'Beloved ones, with promises like these, and because of our deepest respect and worship of God, we must remove everything from our lives '
  - type: note
    content: Or “purify ourselves.” Believers today must take an active and disciplined approach to spiritual maturity and living holy lives. Grace never removes our responsibility to be faithful to God. Grace empowers us to do what pleases God (Phil. 2:13).
  - type: text
    content: that contaminates body and spirit, and continue to complete the development of holiness within us.
  '10':
  - type: text
    content: 'God designed us to feel remorse over sin in order to produce repentance that leads to victory. '
  - type: note
    content: Or “deliverance (salvation).”
  - type: text
    content: This leaves us with no regrets. But the sorrow of the world works death.
  '11':
  - type: text
    content: 'Can’t you see the good fruit that has come, as God intended, because of your remorse over sin? '
  - type: note
    content: Both the Hebraic and Greek concepts of repentance are literally “to turn from sin and come back to God”; that is, “to have a change of mind/direction.” This involves the “sorrow” or “remorse” of our hearts before God. Repentance is not a sterile, feeling-less act of changing direction. Paul makes it clear that godly remorse is a “God-intended” feeling that moves the heart back to God. Our repentance is not a work of the flesh but the result of God’s Spirit stirring our conscience. Peter’s godly remorse over his denial of Christ eventually led him to experience a complete inner healing, while Judas’ remorse led him to suicide.
  - type: text
    content: 'Now you are eager to do what is right! Look at the indignation you experienced over what happened and how alarmed you became. What holy longing it awakened, what passion '
  - type: text
    content: for God
  - type: text
    content: ', and how ready you were to bring justice to the offender. Your response has proved that you are free of blame in this matter.'
  '12':
  - type: text
    content: 'So I wrote you not simply to correct the one who did the wrong or on the behalf of the one who was wronged, but to help you realize in God’s sight how loyal you are to us. '
  '13':
  - type: text
    content: 'Your response leaves us so encouraged! You’ve made us even more joyful upon hearing of how you refreshed Titus, for his mind was set at ease by all of you. '
  '14':
  - type: text
    content: 'I have not been embarrassed by you, for the things I bragged about you to Titus were not proven false. Just as everything we said to you was true, so our boasting to Titus about you has proven to be true as well. '
  '15':
  - type: text
    content: 'His affection toward you has grown as he remembers your obedience and how warmly you welcomed him with fear and trembling. '
  '16':
  - type: text
    content: I’m beside myself with joy! I am so confident in you!
  '2':
  - type: text
    content: 'Again, I urge you, make room for us in your hearts, for we have wronged '
  - type: note
    content: The Aramaic can be translated “We have hated no one.”
  - type: text
    content: 'no one, corrupted '
  - type: note
    content: That is, they had not led people astray from right doctrine. They corrupted no one’s faith.
  - type: text
    content: 'no one, and taken advantage '
  - type: note
    content: 'Or “We have cheated no one” (for financial gain). These are the three goals every minister should set for his or her calling: (1) to do no wrong to another nor to “hate” anyone, (2) to not corrupt or lead anyone astray, and (3) to never use his or her authority to take advantage of anyone by cheating for personal gain. Paul had a blameless history in ministry.'
  - type: text
    content: 'of no one. '
  '3':
  - type: text
    content: 'I’m not saying this to condemn you, for I already told you that we carry you permanently in our hearts—and you’ll stay there throughout our lives, for we will live together and die together. '
  '4':
  - type: text
    content: 'With an open heart let me freely say how very proud I am of you and how often I boast about you. In fact, '
  - type: text
    content: when I think of you
  - type: text
    content: ' my heart is greatly encouraged and overwhelmed with joy, despite our many troubles.'
  - type: heading
    content: Paul in Macedonia
  '5':
  - type: text
    content: 'Even after we came into the province of Macedonia, '
  - type: note
    content: This was after Paul left Troas and where he wrote his severe letter to the Corinthians (2 Cor. 2:12–13).
  - type: text
    content: 'we found no relief. We were restless and exhausted; troubles met us at every turn. Outwardly I faced conflicts and inwardly emotional turmoil. '
  - type: note
    content: Or “fears.” The Aramaic can be translated “on the outside battles and on the inside surrendering.” With great honesty, Paul discloses his feelings while in Macedonia. He was beset with adversaries who opposed him, problems and arguments within the church, and persecution at every turn. Paul was emotionally torn by all the conflicts among the believers and feared for Titus’ safety. He was worried about how the Corinthians would receive his severe letter, plus there is a hint in his words that his concern was wearing him down both physically and emotionally. Being honest about our emotions is the first step in finding comfort and peace. Paul’s example of a leader opening his heart to his people should not be missed by this generation.
  '6':
  - type: text
    content: 'But God, who always knows how to encourage the depressed, encouraged us greatly by the arrival of Titus. '
  '7':
  - type: text
    content: We were relieved not only to see him but because of the report he brought us of how you refreshed his heart. He told us of your affection toward me, your deep remorse, and how concerned you were for me. This truly made my heart leap for joy!
  - type: heading
    content: Godly Remorse over Sin
  '8':
  - type: text
    content: 'Even if my letter made you sorrowful, I don’t regret sending it (even though I felt awful for a moment when I heard how it grieved you). '
  '9':
  - type: text
    content: 'Now I’m overjoyed—not because I made you sad, but because your grief led you to a deep repentance. You experienced godly sorrow, and as God intended, it brought about gain for you, not loss, so that no harm has been done by us. '
