document_id: MIC.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micah Prophesies against Judah’s Leaders
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then I said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen, you leaders of the tribes of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you princes among the people of Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is it not your duty to see that justice prevails?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Indeed, you build up Zion and Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but upon an '
    - type: usfm
      marker: it
      children:
      - type: text
        text: immoral foundation
    - type: text
      text: ' of murder and malice.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Her judges render verdicts for the highest bidder,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: her priests preach for a price,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'her prophets prophesy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tell fortunes.”
      marker-yv: yv-n
    - type: text
      text: for a fee,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and yet they pretend to depend upon '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Isn’t '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' on our side?” they say.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “How could any disaster come upon us?”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: That is why, thanks to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Zion will return to farmland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jerusalem to a pile of rubble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and the Temple Mount will be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: deserted
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: overgrown with thickets.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Micah was the first of the prophets to prophesy the overthrow of Israel and destruction of Jerusalem. During the reign of Hezekiah, the king heeded Micah’s words and carried out religious reforms (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 18:1–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 29–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Yet you hate what is good and love what is evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You skin my people alive, pulling the flesh off their bones.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Like butchers
    - type: text
      text: ', you tear the skin off my people.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You break their bones and chop them up
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like stew meat for the pot.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Like wild animals
    - type: text
      text: ', you rip the flesh off their bones'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and devour my people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 14:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Then you will cry out to him, but he will not answer '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your prayers
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will hide his face from you rulers'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because you have totally misused your power.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Micah Prophesies against False Prophets
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Here is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says against the prophets'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who lead my people so far from the truth:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So long as they pay you, you prophesy peace.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if they don’t, you threaten war.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “When you have something to eat [literally “when you bite with your teeth”], you promise peace, but if they don’t put food in your mouth, you declare war against them.” In the time of Micah, prophets were paid not only with cash payments but also with food. In the final clause—“you threaten war”—the Hebrew verb used is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: qadash
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which has the predominant sense of “sanctify” or “consecrate.” The underlying sense here is that war conducted by God’s people against their pagan enemies was routinely preceded by certain sacred ritual ceremonies (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 13:8–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: So, darkness will close in around you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you will receive no prophetic visions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A shroud of darkness will bring your predictions to an end.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sun will set for the prophets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the daylight will go dark for them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Then shame will silence the seers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confusion will cover those who predict the future.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Humiliated, they will all put their hands over their mouths
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they will all cover their lips/mouths/lower part of their faces.” This action was associated with classic mourning in ancient Israelite culture, indicating profound grief, shame, or humiliation—or all three (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 24:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Of course, the reason for this was that, as a judgment from God for their wickedness, they had lost their ability to predict the future. They were confronted with a profound divine silence.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because there is no word from God.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Not so with me, for I am full of power!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s breath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s Spirit.”
      marker-yv: yv-n
    - type: text
      text: fills me with a sense of justice
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and courage
    - type: text
      text: ' to expose the rebellion of Jacob’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tribes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the sin of the people of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s prophets have heaven’s strength, the breath (Spirit) of God, a passion for justice, and boldness to speak truth to power.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now hear this, you leaders of the tribes of Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you princes of the people of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hate justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and distort right into wrong.
