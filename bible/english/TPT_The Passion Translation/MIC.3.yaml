  '1':
  - type: heading
    content: Micah Prophesies against Judah’s Leaders
  - type: text
    content: Then I said,
  - type: text
    content: “Listen, you leaders of the tribes of Jacob,
  - type: text
    content: you princes among the people of Israel.
  - type: text
    content: Is it not your duty to see that justice prevails?
  '10':
  - type: text
    content: Indeed, you build up Zion and Jerusalem
  - type: text
    content: 'but upon an '
  - type: text
    content: immoral foundation
  - type: text
    content: ' of murder and malice.'
  '11':
  - type: text
    content: Her judges render verdicts for the highest bidder,
  - type: text
    content: her priests preach for a price,
  - type: text
    content: 'her prophets prophesy '
  - type: note
    content: Or “tell fortunes.”
  - type: text
    content: for a fee,
  - type: text
    content: 'and yet they pretend to depend upon '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: '“Isn’t '
  - type: text
    content: Yahweh
  - type: text
    content: ' on our side?” they say.'
  - type: text
    content: “How could any disaster come upon us?”
  '12':
  - type: text
    content: That is why, thanks to you,
  - type: text
    content: Zion will return to farmland,
  - type: text
    content: Jerusalem to a pile of rubble,
  - type: text
    content: 'and the Temple Mount will be '
  - type: text
    content: deserted
  - type: text
    content: —
  - type: text
    content: overgrown with thickets.
  - type: note
    content: Micah was the first of the prophets to prophesy the overthrow of Israel and destruction of Jerusalem. During the reign of Hezekiah, the king heeded Micah’s words and carried out religious reforms (see 2 Kings 18:1–8; 2 Chron. 29–31).
  '2':
  - type: text
    content: Yet you hate what is good and love what is evil.
  - type: text
    content: You skin my people alive, pulling the flesh off their bones.
  '3':
  - type: text
    content: Like butchers
  - type: text
    content: ', you tear the skin off my people.'
  - type: text
    content: You break their bones and chop them up
  - type: text
    content: like stew meat for the pot.
  - type: text
    content: Like wild animals
  - type: text
    content: ', you rip the flesh off their bones'
  - type: text
    content: and devour my people.
  - type: note
    content: See Ps. 14:4.
  '4':
  - type: text
    content: 'Then you will cry out to him, but he will not answer '
  - type: text
    content: your prayers
  - type: text
    content: .
  - type: text
    content: Yahweh
  - type: text
    content: ' will hide his face from you rulers'
  - type: text
    content: because you have totally misused your power.”
  - type: heading
    content: Micah Prophesies against False Prophets
  '5':
  - type: text
    content: 'Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says against the prophets'
  - type: text
    content: 'who lead my people so far from the truth:'
  - type: text
    content: “So long as they pay you, you prophesy peace.
  - type: text
    content: But if they don’t, you threaten war.
  - type: note
    content: Or “When you have something to eat [literally “when you bite with your teeth”], you promise peace, but if they don’t put food in your mouth, you declare war against them.” In the time of Micah, prophets were paid not only with cash payments but also with food. In the final clause—“you threaten war”—the Hebrew verb used is qadash, which has the predominant sense of “sanctify” or “consecrate.” The underlying sense here is that war conducted by God’s people against their pagan enemies was routinely preceded by certain sacred ritual ceremonies (see Josh. 3:5; 1 Sam. 13:8–12).
  '6':
  - type: text
    content: So, darkness will close in around you,
  - type: text
    content: and you will receive no prophetic visions.
  - type: text
    content: A shroud of darkness will bring your predictions to an end.
  - type: text
    content: The sun will set for the prophets,
  - type: text
    content: and the daylight will go dark for them.
  '7':
  - type: text
    content: Then shame will silence the seers.
  - type: text
    content: Confusion will cover those who predict the future.
  - type: text
    content: Humiliated, they will all put their hands over their mouths
  - type: note
    content: Or “they will all cover their lips/mouths/lower part of their faces.” This action was associated with classic mourning in ancient Israelite culture, indicating profound grief, shame, or humiliation—or all three (see Ezek. 24:17). Of course, the reason for this was that, as a judgment from God for their wickedness, they had lost their ability to predict the future. They were confronted with a profound divine silence.
  - type: text
    content: because there is no word from God.”
  '8':
  - type: text
    content: Not so with me, for I am full of power!
  - type: text
    content: Yahweh
  - type: text
    content: '’s breath '
  - type: note
    content: Or “Yahweh’s Spirit.”
  - type: text
    content: fills me with a sense of justice
  - type: text
    content: and courage
  - type: text
    content: ' to expose the rebellion of Jacob’s '
  - type: text
    content: tribes
  - type: text
    content: and the sin of the people of Israel.
  - type: note
    content: God’s prophets have heaven’s strength, the breath (Spirit) of God, a passion for justice, and boldness to speak truth to power.
  '9':
  - type: text
    content: Now hear this, you leaders of the tribes of Jacob,
  - type: text
    content: 'you princes of the people of Israel:'
  - type: text
    content: You hate justice
  - type: text
    content: and distort right into wrong.
