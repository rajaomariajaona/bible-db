verses:
  '1':
  - type: heading
    content: Hezekiah’s Illness
  - type: text
    content: 'Now, Hezekiah became sick and was at the point of death. The prophet Isaiah, son of Amoz, came and prophesied to him, saying, “This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has to say to you: Set your affairs in order, for you will not recover from this illness. You are going to die.” '
  '10':
  - type: text
    content: I was dying in the prime of life.
  - type: text
    content: I thought, “Must I leave this world now?
  - type: text
    content: Must I go through the gates of death
  - type: text
    content: and miss out on the rest of my years?”
  '11':
  - type: text
    content: 'I thought, “I won’t get to see '
  - type: note
    content: Or “appear before [in the temple].”
  - type: text
    content: Yah again
  - type: text
    content: in the land of the living.
  - type: text
    content: No longer will I see my friends or family
  - type: text
    content: nor enjoy the company of anyone living on earth.
  '12':
  - type: text
    content: My body is being folded up and taken from me,
  - type: text
    content: taken down like a shepherd’s tent.
  - type: text
    content: He cuts my life short,
  - type: text
    content: as a weaver cuts his cloth from the loom and rolls it up.
  - type: text
    content: From day to night, you bring my life to an end.
  '13':
  - type: text
    content: I felt as though a lion were crushing all my bones
  - type: text
    content: as I cried out for help until morning.
  - type: text
    content: From day to night, you bring my life to an end.
  '14':
  - type: text
    content: 'I '
  - type: text
    content: could only
  - type: text
    content: ' chirp like a swallow or small bird;'
  - type: text
    content: I could only moan like a dove.
  - type: text
    content: My eyes are weary from looking up into heaven.
  - type: text
    content: Yahweh
  - type: text
    content: ', I am so depressed. Come and be my strength.'
  - type: note
    content: Or “stability.”
  '15':
  - type: text
    content: But what can I say?
  - type: text
    content: For he has spoken to me and told me
  - type: text
    content: that he is the one who has done this.
  - type: note
    content: This is almost the same as saying, “It is finished.”
  - type: text
    content: 'I can’t sleep a wink '
  - type: note
    content: Or “All my sleep has fled” or “I walk slowly all my years.” The Hebrew is uncertain.
  - type: text
    content: because I’m overwhelmed with grief.
  - type: note
    content: Or “because of the bitterness of my soul.”
  '16':
  - type: text
    content: 'Lord, it is because of your kindness '
  - type: note
    content: Or “because of these things” (kindness, mercy, acts of love, goodness of God).
  - type: text
    content: that life is given.
  - type: text
    content: It is in you that my spirit lives.
  - type: note
    content: The meaning of this Hebrew sentence is uncertain.
  - type: text
    content: 'Now restore my health and give me life '
  - type: text
    content: again
  - type: text
    content: '!'
  '17':
  - type: text
    content: Truly, it was for my own good
  - type: text
    content: that I had this bitter experience.
  - type: text
    content: For you loved my soul out of the pit of oblivion.
  - type: text
    content: You cast all my sins behind your back.
  '18':
  - type: text
    content: The grave and those buried there cannot praise you.
  - type: text
    content: Neither the realm of death nor those who enter it
  - type: text
    content: can give you thanks or hope for your faithfulness.
  '19':
  - type: text
    content: It’s the living who thank you as I do today.
  - type: text
    content: One generation makes your faithfulness known to the next.
  '2':
  - type: text
    content: 'Then Hezekiah '
  - type: text
    content: broke down and wept
  - type: text
    content: ', turned his face to the wall, and prayed, “O please, '
  - type: text
    content: Yahweh
  - type: text
    content: ', please. I beg you, '
  - type: text
    content: let me live
  - type: text
    content: '. '
  '20':
  - type: text
    content: Yahweh
  - type: text
    content: ' is pleased to '
  - type: text
    content: heal me and
  - type: text
    content: ' save me!'
  - type: text
    content: We will sing to the music of stringed instruments
  - type: text
    content: 'every day of our lives in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s house.”
  '21':
  - type: text
    content: 'Now, Isaiah had said to Hezekiah, “Have the '
  - type: text
    content: physicians
  - type: text
    content: ' apply a poultice of cakes of dried figs to your boil, and you will recover.”'
  '22':
  - type: text
    content: 'And Hezekiah had said, “What will be the sign from God that I will be healed and go up again to worship in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s house?”
  - type: note
    content: Because this verse seems so out of place, many contemporary translations place it between v. 6 and v. 7. See also 2 Kings 20:7–8. Hezekiah was not afraid of asking for a sign, not wanting to make the mistake of his father, Ahaz (see Isa. 7:11–13).
  '3':
  - type: text
    content: Remember how I have walked faithfully before your face. With all my heart, I have sought to do only what is good in your eyes.” Bitter tears streamed down his face.
  '4':
  - type: text
    content: 'Then Isaiah received another prophetic word for Hezekiah. '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to him, '
  '5':
  - type: text
    content: '“Go deliver this message to Hezekiah: ‘This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of your ancestor David, has to say to you: I have heard your '
  - type: text
    content: heartfelt
  - type: text
    content: ' prayer and I have seen you cry tear after bitter tear. I will give you another fifteen years. '
  '6':
  - type: text
    content: 'I will defend Jerusalem, and I will deliver you and this city from the hand of the king of Assyria. '
  '7':
  - type: text
    content: 'This will be a sign to you from '
  - type: text
    content: Yahweh
  - type: text
    content: ' as a confirmation that I will do for you what I have promised. '
  '8':
  - type: text
    content: I will cause the sun’s shadow to retreat ten steps on the stairway of Ahaz.’ ”
  - type: text
    content: Then the sunlight went back up the ten steps it had gone down.
  - type: note
    content: It is possible that these steps functioned as some type of a sundial. See Hebrew and Aramaic Lexicon of the Old Testament, 614, s.v.
  - type: heading
    content: Hezekiah’s Psalm of Praise
  '9':
  - type: text
    content: 'Here is the poem of Hezekiah, king of Judah, which he wrote when he was healed from his illness:'
