document_id: ISA.38
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah’s Illness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now, Hezekiah became sick and was at the point of death. The prophet Isaiah, son of Amoz, came and prophesied to him, saying, “This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has to say to you: Set your affairs in order, for you will not recover from this illness. You are going to die.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then Hezekiah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: broke down and wept
  - type: text
    text: ', turned his face to the wall, and prayed, “O please, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', please. I beg you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: let me live
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Remember how I have walked faithfully before your face. With all my heart, I have sought to do only what is good in your eyes.” Bitter tears streamed down his face.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Isaiah received another prophetic word for Hezekiah. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to him, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“Go deliver this message to Hezekiah: ‘This is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of your ancestor David, has to say to you: I have heard your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heartfelt
  - type: text
    text: ' prayer and I have seen you cry tear after bitter tear. I will give you another fifteen years. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I will defend Jerusalem, and I will deliver you and this city from the hand of the king of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'This will be a sign to you from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' as a confirmation that I will do for you what I have promised. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will cause the sun’s shadow to retreat ten steps on the stairway of Ahaz.’ ”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then the sunlight went back up the ten steps it had gone down.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that these steps functioned as some type of a sundial. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hebrew and Aramaic Lexicon of the Old Testament
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 614, s.v.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah’s Psalm of Praise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Here is the poem of Hezekiah, king of Judah, which he wrote when he was healed from his illness:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I was dying in the prime of life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I thought, “Must I leave this world now?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Must I go through the gates of death
- type: usfm
  marker: q1
  children:
  - type: text
    text: and miss out on the rest of my years?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I thought, “I won’t get to see '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “appear before [in the temple].”
    marker-yv: yv-n
  - type: text
    text: Yah again
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the land of the living.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No longer will I see my friends or family
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor enjoy the company of anyone living on earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: My body is being folded up and taken from me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: taken down like a shepherd’s tent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He cuts my life short,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as a weaver cuts his cloth from the loom and rolls it up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From day to night, you bring my life to an end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I felt as though a lion were crushing all my bones
- type: usfm
  marker: q1
  children:
  - type: text
    text: as I cried out for help until morning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From day to night, you bring my life to an end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I '
  - type: usfm
    marker: it
    children:
    - type: text
      text: could only
  - type: text
    text: ' chirp like a swallow or small bird;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I could only moan like a dove.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My eyes are weary from looking up into heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', I am so depressed. Come and be my strength.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “stability.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But what can I say?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he has spoken to me and told me
- type: usfm
  marker: q1
  children:
  - type: text
    text: that he is the one who has done this.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is almost the same as saying, “It is finished.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I can’t sleep a wink '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “All my sleep has fled” or “I walk slowly all my years.” The Hebrew is uncertain.
    marker-yv: yv-n
  - type: text
    text: because I’m overwhelmed with grief.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “because of the bitterness of my soul.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lord, it is because of your kindness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “because of these things” (kindness, mercy, acts of love, goodness of God).
    marker-yv: yv-n
  - type: text
    text: that life is given.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It is in you that my spirit lives.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this Hebrew sentence is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Now restore my health and give me life '
  - type: usfm
    marker: it
    children:
    - type: text
      text: again
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Truly, it was for my own good
- type: usfm
  marker: q1
  children:
  - type: text
    text: that I had this bitter experience.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you loved my soul out of the pit of oblivion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You cast all my sins behind your back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The grave and those buried there cannot praise you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Neither the realm of death nor those who enter it
- type: usfm
  marker: q1
  children:
  - type: text
    text: can give you thanks or hope for your faithfulness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: It’s the living who thank you as I do today.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One generation makes your faithfulness known to the next.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is pleased to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: heal me and
  - type: text
    text: ' save me!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: We will sing to the music of stringed instruments
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'every day of our lives in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s house.”
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now, Isaiah had said to Hezekiah, “Have the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: physicians
  - type: text
    text: ' apply a poultice of cakes of dried figs to your boil, and you will recover.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And Hezekiah had said, “What will be the sign from God that I will be healed and go up again to worship in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s house?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 38:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Because this verse seems so out of place, many contemporary translations place it between v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: ISA.38.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: ISA.38.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 20:7–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Hezekiah was not afraid of asking for a sign, not wanting to make the mistake of his father, Ahaz (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
