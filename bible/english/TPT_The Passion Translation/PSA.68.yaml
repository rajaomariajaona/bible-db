document_id: PSA.68,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Triumph
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: David’s poetic song of praise
  - type: text
    content: God! Arise with awesome power,
  - type: text
    content: and every one of your enemies will scatter in fear!
  '10':
  - type: text
    content: So there your people settled.
  - type: note
    content: Or “For you live among them [in community].” The Hebrew is uncertain.
  - type: text
    content: 'And in your kindness you provided '
  - type: note
    content: Or “sustain.” God anticipates our needs and has gone before us to provide for and sustain us in our journey.
  - type: text
    content: the poor with abundance.
  '11':
  - type: text
    content: God Almighty declares the word of the gospel with power,
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'and the warring women of Zion deliver its message:'
  - type: note
    content: As translated from the Masoretic Text.
  '12':
  - type: text
    content: “The conquering legions have themselves been conquered.
  - type: text
    content: Look at them flee!”
  - type: text
    content: Now Zion’s women are left to gather the spoils.
  '13':
  - type: text
    content: When you sleep between sharpened stakes,
  - type: note
    content: The Aramaic word shaphya can be translated “sharpened stakes” or “thorns.” This is an obvious prophecy of the cross and our union with Christ as he was crucified.
  - type: text
    content: I see you sparkling like silver and glistening like gold,
  - type: text
    content: covered by the beautiful wings of a dove!
  - type: note
    content: As translated from the Aramaic text, this verse contains prophetic hints of Calvary, where Jesus “slept” the sleep of death between the “sharpened stakes” of the cross. The word you is plural and points us to our co-crucifixion with Christ.
  '14':
  - type: text
    content: When the Almighty found a king for himself,
  - type: text
    content: it became white as snow in his shade.
  - type: note
    content: Every scholar consulted concludes that this verse is difficult, if not impossible, to interpret properly and translate accurately. The last words are literally “Snow fell in Zalmon.” Zalmon (or Salmon) was a wooded area and means “shady.”
  '15':
  - type: text
    content: O huge, magnificent mountain,
  - type: text
    content: you are the mighty kingdom of God!
  - type: note
    content: The Septuagint reads “mountain of provision.”
  - type: text
    content: All the other peaks, though impressive and imposing,
  - type: text
    content: look with envy on you, Mount Zion!
  - type: text
    content: For Zion is the mountain where God has chosen to live forever.
  '17':
  - type: text
    content: Look! The mighty chariots of God!
  - type: text
    content: Ten thousands upon ten thousands,
  - type: text
    content: more than anyone could ever number.
  - type: text
    content: God is at the front,
  - type: text
    content: leading them all from Mount Sinai into his sanctuary
  - type: text
    content: with the radiance of holiness upon him.
  - type: note
    content: The Septuagint reads “The Lord sends his provisions from his Holy Place on Mount Sinai.”
  '18':
  - type: text
    content: He ascends into the heavenly heights,
  - type: text
    content: taking his many captured ones with him,
  - type: text
    content: leading them in triumphal procession.
  - type: text
    content: And gifts were given to men, even the once rebellious,
  - type: text
    content: so that they may dwell with Yah.
  '19':
  - type: text
    content: What a glorious God!
  - type: note
    content: The Aramaic is Maryah, the Aramaic form of YHWH or Lord Yahweh.
  - type: text
    content: He gives us salvation over and over,
  - type: note
    content: Salvation is in the plural form in the Hebrew text (“salvations”).
  - type: text
    content: then daily he carries our burdens!
  - type: note
    content: Or “daily loads us with benefits.”
  - type: text
    content: Pause in his presence
  '2':
  - type: text
    content: Chase them away—all these God-haters.
  - type: text
    content: Blow them away as a puff of smoke.
  - type: text
    content: Melt them away like wax in the fire.
  - type: text
    content: One good look at you and the wicked vanish.
  '20':
  - type: text
    content: Our God is a mighty God who saves us over and over!
  - type: text
    content: 'For the Lord, '
  - type: text
    content: Yahweh
  - type: text
    content: ', rescues us'
  - type: text
    content: from the ways of death many times.
  '21':
  - type: text
    content: But he will crush every enemy, shattering their strength.
  - type: text
    content: He will make heads roll
  - type: text
    content: for they refuse to repent of their stubborn, sinful ways.
  '22':
  - type: text
    content: I hear the Lord God saying to all the enemies of his people,
  - type: text
    content: “You’d better come out of your hiding places,
  - type: text
    content: all of you who are doing your best to stay far away from me.
  - type: note
    content: The Hebrew text makes reference to Bashan (a high mountain) and to the depths of the sea. In other words, there’s no place to hide.
  - type: text
    content: Don’t you know there’s no place to hide?
  '23':
  - type: text
    content: For my people will be the conquerors;
  - type: text
    content: they will soon have you under their feet.
  - type: text
    content: They will crush you until there is nothing left!”
  - type: note
    content: The Hebrew text is literally “Your enemies will be food for the dogs.”
  '24':
  - type: text
    content: O God, my King, your triumphal processions
  - type: text
    content: keep moving onward in holiness;
  - type: text
    content: you’re moving onward toward the Holy Place!
  '25':
  - type: text
    content: 'Leaders in front, '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Singers in front.”
  - type: text
    content: then musicians,
  - type: text
    content: with young maidens in between, striking their tambourines.
  '26':
  - type: text
    content: And they sing, “Let all God’s princely people rejoice!
  - type: text
    content: Let all the congregations bring their blessing to God, saying,
  - type: text
    content: ‘The Lord of the fountain! The Lord of the fountain of life!
  - type: text
    content: The Lord of the fountain of Israel!’ ”
  '27':
  - type: text
    content: 'Astonishingly, it’s the favored youth leading the way:'
  - type: note
    content: The Hebrew includes the names of four sons of Jacob, representing four tribes. Benjamin, the youngest son, means “son of my right hand” or “the favored one.” Judah means “praise.” Zebulon’s name is the word for “exalted.” Naphtali means “obtained by wrestling.” Each name speaks of a princely group and is used here poetically not only for Israel but for all of God’s “princely people” in this holy procession of worship.
  - type: text
    content: princes of praise in their royal robes
  - type: text
    content: and exalted princes are among them,
  - type: text
    content: along with princes who have wrestled with God.
  '28':
  - type: text
    content: Display your strength, God, and we’ll be strong!
  - type: note
    content: The Great Bible translated by Miles Coverdale (1488–1569) translates this as “Your God has sent forth strength for you.”
  - type: text
    content: For your miracles have made us who we are.
  - type: text
    content: Lord, do it again
  - type: text
    content: and parade from your temple your mighty power.
  - type: text
    content: By your command even kings will bring gifts to you.
  '3':
  - type: text
    content: But let all the righteous be glad!
  - type: text
    content: Yes, let them all rejoice in your presence
  - type: text
    content: and be carried away with gladness.
  - type: note
    content: As translated from the Septuagint. The Aramaic is “they rejoice in his sweetness.”
  - type: text
    content: Let them laugh and be radiant with joy!
  '30':
  - type: text
    content: God, rebuke the beast-life that hides within us!
  - type: note
    content: Literal Hebrew is “rebuke the beasts in the reeds.”
  - type: text
    content: Rebuke those who claim to be “strong ones,”
  - type: note
    content: This verse has puzzled scholars, and many conclude that the Hebrew text is nearly incomprehensible, with tremendous variations in the translation.
  - type: text
    content: who lurk within the congregation
  - type: text
    content: and abuse the people out of their love for money.
  - type: text
    content: God scatters the people who are spoiling for a fight.
  '31':
  - type: text
    content: Africa will send her noble envoys to you, O God.
  - type: text
    content: They will come running, stretching out their hands in love to you.
  '32':
  - type: text
    content: Let all the nations of the earth sing songs of praise to Almighty God!
  - type: text
    content: Go ahead, all you nations—sing your praise to the Lord!
  - type: text
    content: Pause in his presence
  '33':
  - type: text
    content: Make music for the one who strides the ancient skies.
  - type: text
    content: Listen to his thunderous voice of might split open the heavens.
  '34':
  - type: text
    content: Give it up for God, for he alone has all the strength and power!
  - type: text
    content: Proclaim his majesty! For his glory shines down on Israel.
  - type: text
    content: His mighty strength soars in the clouds of glory.
  '35':
  - type: text
    content: God, we are consumed with awe, trembling before you
  - type: text
    content: as your glory streams from your Holy Place.
  - type: text
    content: The God of power shares his mighty strength with Israel
  - type: text
    content: and with all his people.
  - type: text
    content: God, we give our highest praise to you!
  '4':
  - type: text
    content: Let them sing their celebration-songs
  - type: text
    content: for the coming of the cloud rider whose name is Yah!
  - type: note
    content: More than an abbreviation, the name Yah is associated with the God of heaven, the God of highest glory and power.
  '5':
  - type: text
    content: To the fatherless he is a father.
  - type: text
    content: To the widow he is a champion friend.
  - type: text
    content: The lonely he makes part of a family.
  - type: text
    content: 'The prisoners '
  - type: note
    content: The Septuagint reads “the bitter ones.”
  - type: text
    content: he leads into prosperity until they sing for joy.
  - type: text
    content: This is our Holy God in his Holy Place!
  - type: text
    content: But for the rebels there is heartache and despair.
  - type: note
    content: Or “they will live in a sun-scorched land.”
  '7':
  - type: text
    content: O Lord, it was you who marched in front of your people,
  - type: text
    content: leading them through the wasteland.
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: The earth shook beneath your feet; the heavens filled with clouds
  - type: text
    content: before the presence of the God of Sinai.
  - type: text
    content: The sacred mountain shook at the sight of the face of Israel’s God.
  '9':
  - type: text
    content: You, O God, sent the reviving rain upon your weary inheritance,
  - type: text
    content: showers of blessing to refresh it.
