document_id: PSA.68
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Song of Triumph
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: David’s poetic song of praise
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God! Arise with awesome power,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and every one of your enemies will scatter in fear!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chase them away—all these God-haters.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blow them away as a puff of smoke.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Melt them away like wax in the fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One good look at you and the wicked vanish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But let all the righteous be glad!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, let them all rejoice in your presence
- type: usfm
  marker: q1
  children:
  - type: text
    text: and be carried away with gladness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Aramaic is “they rejoice in his sweetness.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them laugh and be radiant with joy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let them sing their celebration-songs
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the coming of the cloud rider whose name is Yah!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: More than an abbreviation, the name Yah is associated with the God of heaven, the God of highest glory and power.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 5-6
  - type: text
    text: To the fatherless he is a father.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the widow he is a champion friend.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lonely he makes part of a family.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The prisoners '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “the bitter ones.”
    marker-yv: yv-n
  - type: text
    text: he leads into prosperity until they sing for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is our Holy God in his Holy Place!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But for the rebels there is heartache and despair.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “they will live in a sun-scorched land.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O Lord, it was you who marched in front of your people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leading them through the wasteland.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The earth shook beneath your feet; the heavens filled with clouds
- type: usfm
  marker: q1
  children:
  - type: text
    text: before the presence of the God of Sinai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sacred mountain shook at the sight of the face of Israel’s God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You, O God, sent the reviving rain upon your weary inheritance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: showers of blessing to refresh it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So there your people settled.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “For you live among them [in community].” The Hebrew is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And in your kindness you provided '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sustain.” God anticipates our needs and has gone before us to provide for and sustain us in our journey.
    marker-yv: yv-n
  - type: text
    text: the poor with abundance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: God Almighty declares the word of the gospel with power,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and the warring women of Zion deliver its message:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Masoretic Text.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “The conquering legions have themselves been conquered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at them flee!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now Zion’s women are left to gather the spoils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When you sleep between sharpened stakes,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shaphya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “sharpened stakes” or “thorns.” This is an obvious prophecy of the cross and our union with Christ as he was crucified.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I see you sparkling like silver and glistening like gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: covered by the beautiful wings of a dove!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic text, this verse contains prophetic hints of Calvary, where Jesus “slept” the sleep of death between the “sharpened stakes” of the cross. The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is plural and points us to our co-crucifixion with Christ.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When the Almighty found a king for himself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it became white as snow in his shade.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Every scholar consulted concludes that this verse is difficult, if not impossible, to interpret properly and translate accurately. The last words are literally “Snow fell in Zalmon.” Zalmon (or Salmon) was a wooded area and means “shady.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: O huge, magnificent mountain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you are the mighty kingdom of God!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:15–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “mountain of provision.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the other peaks, though impressive and imposing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: look with envy on you, Mount Zion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For Zion is the mountain where God has chosen to live forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Look! The mighty chariots of God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ten thousands upon ten thousands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: more than anyone could ever number.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God is at the front,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leading them all from Mount Sinai into his sanctuary
- type: usfm
  marker: q1
  children:
  - type: text
    text: with the radiance of holiness upon him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “The Lord sends his provisions from his Holy Place on Mount Sinai.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He ascends into the heavenly heights,
- type: usfm
  marker: q1
  children:
  - type: text
    text: taking his many captured ones with him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leading them in triumphal procession.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And gifts were given to men, even the once rebellious,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that they may dwell with Yah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: What a glorious God!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Maryah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the Aramaic form of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: or Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He gives us salvation over and over,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Salvation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is in the plural form in the Hebrew text (“salvations”).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: then daily he carries our burdens!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “daily loads us with benefits.”
    marker-yv: yv-n
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Our God is a mighty God who saves us over and over!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the Lord, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', rescues us'
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the ways of death many times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: But he will crush every enemy, shattering their strength.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will make heads roll
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they refuse to repent of their stubborn, sinful ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I hear the Lord God saying to all the enemies of his people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You’d better come out of your hiding places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: all of you who are doing your best to stay far away from me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text makes reference to Bashan (a high mountain) and to the depths of the sea. In other words, there’s no place to hide.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t you know there’s no place to hide?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For my people will be the conquerors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will soon have you under their feet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will crush you until there is nothing left!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text is literally “Your enemies will be food for the dogs.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: O God, my King, your triumphal processions
- type: usfm
  marker: q1
  children:
  - type: text
    text: keep moving onward in holiness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’re moving onward toward the Holy Place!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Leaders in front, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “Singers in front.”
    marker-yv: yv-n
  - type: text
    text: then musicians,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with young maidens in between, striking their tambourines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And they sing, “Let all God’s princely people rejoice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all the congregations bring their blessing to God, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘The Lord of the fountain! The Lord of the fountain of life!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Lord of the fountain of Israel!’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Astonishingly, it’s the favored youth leading the way:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew includes the names of four sons of Jacob, representing four tribes. Benjamin, the youngest son, means “son of my right hand” or “the favored one.” Judah means “praise.” Zebulon’s name is the word for “exalted.” Naphtali means “obtained by wrestling.” Each name speaks of a princely group and is used here poetically not only for Israel but for all of God’s “princely people” in this holy procession of worship.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: princes of praise in their royal robes
- type: usfm
  marker: q1
  children:
  - type: text
    text: and exalted princes are among them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: along with princes who have wrestled with God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 28-29
  - type: text
    text: Display your strength, God, and we’ll be strong!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:28–29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Great Bible translated by Miles Coverdale (1488–1569) translates this as “Your God has sent forth strength for you.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your miracles have made us who we are.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord, do it again
- type: usfm
  marker: q1
  children:
  - type: text
    text: and parade from your temple your mighty power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By your command even kings will bring gifts to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: God, rebuke the beast-life that hides within us!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literal Hebrew is “rebuke the beasts in the reeds.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rebuke those who claim to be “strong ones,”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 68:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This verse has puzzled scholars, and many conclude that the Hebrew text is nearly incomprehensible, with tremendous variations in the translation.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: who lurk within the congregation
- type: usfm
  marker: q1
  children:
  - type: text
    text: and abuse the people out of their love for money.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God scatters the people who are spoiling for a fight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Africa will send her noble envoys to you, O God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will come running, stretching out their hands in love to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Let all the nations of the earth sing songs of praise to Almighty God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go ahead, all you nations—sing your praise to the Lord!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Make music for the one who strides the ancient skies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen to his thunderous voice of might split open the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Give it up for God, for he alone has all the strength and power!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Proclaim his majesty! For his glory shines down on Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His mighty strength soars in the clouds of glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: God, we are consumed with awe, trembling before you
- type: usfm
  marker: q1
  children:
  - type: text
    text: as your glory streams from your Holy Place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The God of power shares his mighty strength with Israel
- type: usfm
  marker: q1
  children:
  - type: text
    text: and with all his people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God, we give our highest praise to you!
