document_id: MAT.15,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Breaks Religious Traditions
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the Pharisees and religious scholars '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scribes,” considered to be experts in interpreting Jewish laws.
      marker-yv: yv-n
    - type: text
      text: 'came from Jerusalem and asked Jesus this question: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus turned to the crowd and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come, listen and open your heart to understand.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: What truly contaminates a person is not what he puts into his mouth but what comes out of his mouth. That’s what makes people defiled.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then his disciples approached him and said, “Don’t you know that what you just said offended the Pharisees?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Every plant that my heavenly Father didn’t plant is destined to be uprooted.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Stay away from them,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Let them remain blind! For they are nothing more than blind leaders of the blind.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for they’re nothing more than blind guides. Do you know what happens when a blind man pretends to guide another blind man? They both stumble into a ditch!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter spoke up and said, “Will you explain to us what you mean by your parable?”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Even after all that I’ve taught you, you still remain clueless?
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Is it hard to understand that whatever you eat enters the stomach only to pass out into the sewer?
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But what comes out of your mouth reveals the core of your heart. Words can pollute, not food.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will find living within an impure heart evil ideas, murderous thoughts, adultery, sexual immorality, theft, lies, and slander.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “blasphemies.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Why do your disciples ignore the traditions of our elders? For example, they don’t ceremonially wash their hands before they eat bread.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: That’s what pollutes a person. Eating with unwashed hands doesn’t defile anyone.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lebanese Woman’s Faith
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus left and went north into the non-Jewish region of Lebanon. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Tyre and Sidon,” both cities of Lebanon.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He encountered there a Canaanite woman '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew Matthew is “a Canaanite merchant woman.” Canaan included the region of modern-day Lebanon. Canaanite refers to a non-Jewish person who lived in that region. It was in this very region that an Old Testament woman named Jezebel established Baal worship. Now Jesus heals a woman and brings her into the true worship of God.
      marker-yv: yv-n
    - type: text
      text: 'who shouted out to him, “Lord, Son of David, show mercy to me! My daughter is horribly afflicted by a demon that torments her.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jesus never answered her. So his disciples said to him, “Why do you ignore this woman who is crying out to us?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from Hebrew Matthew. The Greek is “The disciples kept begging Jesus to send her away.”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I’ve only been sent to the lost sheep of Israel.”
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But she came and bowed down before him and said, “Lord, help me!”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It’s not right for a man to take bread from his children and throw it out to the dogs.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus uses a figure of speech and describes the people of Israel as “children” who view the non-Jewish people as “dogs.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You’re right, Lord,” she replied. “But even puppies get to eat the crumbs that fall from the prince’s table.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus answered her, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Dear woman, your faith is strong! What you desire will be done for you.”
    - type: text
      text: ' And at that very moment, her daughter was instantly set free from demonic torment.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Many Others
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After leaving Lebanon, Jesus went to Lake Galilee and climbed a hill nearby and sat down. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And why do you ignore the commandment of God because of your traditions?
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then huge crowds of people streamed up the hill, bringing with them the lame, blind, deformed, mute, and many others in need of healing. They laid them at Jesus’ feet and he healed them all.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the crowds marveled with amazement, astounded over the things they were witnessing with their own eyes! The lame were walking, the mute were speaking, the crippled were made well, and the blind could see. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: For three days
    - type: text
      text: ' everyone celebrated the miracles as they exalted and praised the God of Israel!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Thousands
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus called his disciples to himself and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I care deeply about all these people, for they’ve already been with me for three days without food. I don’t want to send them away fasting or else they may be overcome by weakness on their journey home.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples said to him, “Where in the world are we going to find enough food in this desolate place to feed this crowd?”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How many barley loaves do you have?”
    - type: text
      text: ' Jesus asked.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Seven,” they replied, “and a few small fish.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he gave the order, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have the people sit down on the grass.”
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he took the seven loaves and the fish and gave thanks to God. He broke the bread and gave it to his disciples, who then distributed the food to the crowds. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When everyone was full and satisfied, they gathered up the leftovers. And from what was once seven loaves and a few fish, they filled seven baskets! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here implies a very large basket, possibly the size of a person.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There were four thousand men who ate the food Jesus multiplied, and even more including the women and children!
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After dismissing the crowd, Jesus got into the boat and crossed over to the region of Magdala.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Magadan.” This was a place where fish were salted and preserved. Magdala means “tower.” Magdala was the town that Mary Magdalene came from. Perhaps during this visit is when they first met.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For didn’t God say, ‘Honor your father and mother,’ and, ‘Whoever abuses or insults his father or mother must be put to death?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 20:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 21:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 20:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But you teach that it’s permissible to say to your parents when they are in financial need, ‘Whatever gift you would have received from me I can keep for myself, since I dedicated it as an offering to God.’
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This doesn’t honor your father or mother. And you have elevated your tradition above the words of God.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Frauds and hypocrites! Isaiah described you perfectly when he said:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These people honor me only with their words,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for their hearts are so very distant from me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They pretend to worship me,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but their worship is nothing more
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: than the empty traditions of men.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 29:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
