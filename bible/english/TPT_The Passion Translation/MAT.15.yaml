document_id: MAT.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Breaks Religious Traditions
  - type: text
    content: 'Then the Pharisees and religious scholars '
  - type: note
    content: Or “scribes,” considered to be experts in interpreting Jewish laws.
  - type: text
    content: 'came from Jerusalem and asked Jesus this question: '
  '10':
  - type: text
    content: 'Then Jesus turned to the crowd and said, '
  - type: text
    content: “Come, listen and open your heart to understand.
  - type: text
    content: ' '
  '11':
  - type: text
    content: What truly contaminates a person is not what he puts into his mouth but what comes out of his mouth. That’s what makes people defiled.”
  '12':
  - type: text
    content: Then his disciples approached him and said, “Don’t you know that what you just said offended the Pharisees?”
  '13':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Every plant that my heavenly Father didn’t plant is destined to be uprooted.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Stay away from them,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “Let them remain blind! For they are nothing more than blind leaders of the blind.”
  - type: text
    content: for they’re nothing more than blind guides. Do you know what happens when a blind man pretends to guide another blind man? They both stumble into a ditch!”
  '15':
  - type: text
    content: Peter spoke up and said, “Will you explain to us what you mean by your parable?”
  '16':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Even after all that I’ve taught you, you still remain clueless?
  - type: text
    content: ' '
  '17':
  - type: text
    content: Is it hard to understand that whatever you eat enters the stomach only to pass out into the sewer?
  - type: text
    content: ' '
  '18':
  - type: text
    content: But what comes out of your mouth reveals the core of your heart. Words can pollute, not food.
  - type: text
    content: ' '
  '19':
  - type: text
    content: You will find living within an impure heart evil ideas, murderous thoughts, adultery, sexual immorality, theft, lies, and slander.
  - type: text
    content: ' '
  - type: note
    content: Or “blasphemies.”
  '2':
  - type: text
    content: “Why do your disciples ignore the traditions of our elders? For example, they don’t ceremonially wash their hands before they eat bread.”
  '20':
  - type: text
    content: That’s what pollutes a person. Eating with unwashed hands doesn’t defile anyone.”
  - type: heading
    content: A Lebanese Woman’s Faith
  '21':
  - type: text
    content: 'Then Jesus left and went north into the non-Jewish region of Lebanon. '
  - type: note
    content: Or “Tyre and Sidon,” both cities of Lebanon.
  '22':
  - type: text
    content: 'He encountered there a Canaanite woman '
  - type: note
    content: The Hebrew Matthew is “a Canaanite merchant woman.” Canaan included the region of modern-day Lebanon. Canaanite refers to a non-Jewish person who lived in that region. It was in this very region that an Old Testament woman named Jezebel established Baal worship. Now Jesus heals a woman and brings her into the true worship of God.
  - type: text
    content: 'who shouted out to him, “Lord, Son of David, show mercy to me! My daughter is horribly afflicted by a demon that torments her.” '
  '23':
  - type: text
    content: But Jesus never answered her. So his disciples said to him, “Why do you ignore this woman who is crying out to us?”
  - type: note
    content: As translated from Hebrew Matthew. The Greek is “The disciples kept begging Jesus to send her away.”
  '24':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “I’ve only been sent to the lost sheep of Israel.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: But she came and bowed down before him and said, “Lord, help me!”
  '26':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “It’s not right for a man to take bread from his children and throw it out to the dogs.”
  - type: note
    content: Jesus uses a figure of speech and describes the people of Israel as “children” who view the non-Jewish people as “dogs.”
  '27':
  - type: text
    content: “You’re right, Lord,” she replied. “But even puppies get to eat the crumbs that fall from the prince’s table.”
  '28':
  - type: text
    content: 'Then Jesus answered her, '
  - type: text
    content: “Dear woman, your faith is strong! What you desire will be done for you.”
  - type: text
    content: ' And at that very moment, her daughter was instantly set free from demonic torment.'
  - type: heading
    content: Jesus Heals Many Others
  '29':
  - type: text
    content: 'After leaving Lebanon, Jesus went to Lake Galilee and climbed a hill nearby and sat down. '
  '3':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “And why do you ignore the commandment of God because of your traditions?
  - type: text
    content: ' '
  '30':
  - type: text
    content: Then huge crowds of people streamed up the hill, bringing with them the lame, blind, deformed, mute, and many others in need of healing. They laid them at Jesus’ feet and he healed them all.
  '31':
  - type: text
    content: 'And the crowds marveled with amazement, astounded over the things they were witnessing with their own eyes! The lame were walking, the mute were speaking, the crippled were made well, and the blind could see. '
  - type: text
    content: For three days
  - type: text
    content: ' everyone celebrated the miracles as they exalted and praised the God of Israel!'
  - type: heading
    content: Jesus Feeds Thousands
  '32':
  - type: text
    content: 'Jesus called his disciples to himself and said, '
  - type: text
    content: “I care deeply about all these people, for they’ve already been with me for three days without food. I don’t want to send them away fasting or else they may be overcome by weakness on their journey home.”
  '33':
  - type: text
    content: The disciples said to him, “Where in the world are we going to find enough food in this desolate place to feed this crowd?”
  '34':
  - type: text
    content: “How many barley loaves do you have?”
  - type: text
    content: ' Jesus asked.'
  - type: text
    content: “Seven,” they replied, “and a few small fish.”
  '35':
  - type: text
    content: 'So he gave the order, '
  - type: text
    content: “Have the people sit down on the grass.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Then he took the seven loaves and the fish and gave thanks to God. He broke the bread and gave it to his disciples, who then distributed the food to the crowds. '
  '37':
  - type: text
    content: 'When everyone was full and satisfied, they gathered up the leftovers. And from what was once seven loaves and a few fish, they filled seven baskets! '
  - type: note
    content: The Greek word used here implies a very large basket, possibly the size of a person.
  '38':
  - type: text
    content: There were four thousand men who ate the food Jesus multiplied, and even more including the women and children!
  '39':
  - type: text
    content: After dismissing the crowd, Jesus got into the boat and crossed over to the region of Magdala.
  - type: note
    content: Or “Magadan.” This was a place where fish were salted and preserved. Magdala means “tower.” Magdala was the town that Mary Magdalene came from. Perhaps during this visit is when they first met.
  '4':
  - type: text
    content: For didn’t God say, ‘Honor your father and mother,’ and, ‘Whoever abuses or insults his father or mother must be put to death?’
  - type: note
    content: See Ex. 20:12; 21:17; Lev. 20:9.
  '5':
  - type: text
    content: “But you teach that it’s permissible to say to your parents when they are in financial need, ‘Whatever gift you would have received from me I can keep for myself, since I dedicated it as an offering to God.’
  - type: text
    content: ' '
  '6':
  - type: text
    content: This doesn’t honor your father or mother. And you have elevated your tradition above the words of God.
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'Frauds and hypocrites! Isaiah described you perfectly when he said:'
  '8':
  - type: text
    content: These people honor me only with their words,
  - type: text
    content: for their hearts are so very distant from me.
  '9':
  - type: text
    content: They pretend to worship me,
  - type: text
    content: but their worship is nothing more
  - type: text
    content: than the empty traditions of men.”
  - type: note
    content: See Isa. 29:13.
