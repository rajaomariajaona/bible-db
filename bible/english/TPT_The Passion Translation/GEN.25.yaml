- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Abraham gave all that he possessed to Isaac, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'but to his sons by his concubines he gave gifts while he was still living. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These gifts may have included jewels, precious metals, animals, slaves, or combinations of these. It is unlikely that he gave them land, for he wanted these sons to have a legal settlement that would enable them to begin life on their own, away from Isaac.
    marker-yv: yv-n
  - type: text
    text: 'He sent them all away eastward, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: separating them
  - type: text
    text: ' from his son Isaac.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Abraham lived a total of one hundred and seventy-five years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abraham took his final breath, dying at a good old age. After having lived a full, content life, he joined his ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'His sons, Isaac and Ishmael, buried him in the cave of Machpelah, in the field which had belonged to Ephron, the son of Zohar the Hittite, east of Mamre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'They buried him next to his wife Sarah, in the same field that Abraham purchased from the Hittites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: After Abraham had passed, God greatly blessed his son Isaac, and Isaac settled near the well named the Well of the Living One Who Watches Over Me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaac was a man of the well (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 26:18–25
      metadata:
        usfm: GEN.26.18+GEN.26.19+GEN.26.20+GEN.26.21+GEN.26.22+GEN.26.23+GEN.26.24+GEN.26.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Isaac lived near Beer-Lahai-Roi, which means “The Well of the Living One Who Watches Over Me.” This is where Hagar once cried out for deliverance and God heard her. In a time of desperation Ishmael drank from this well of grace. It is the place where God sees our problems and provides a well of mercy and satisfaction. Isaac did not visit there; he lived there, making the all-seeing God his source of supply. He saw a realm where the Living One sees all things. It was a well of perpetual revelation and grace.
    marker-yv: yv-n
- type: usfm
  marker: s1
