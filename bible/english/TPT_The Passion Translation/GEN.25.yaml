    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Abraham became the father of Isaac.” The redundancy of Abraham in this verse is a literary device for showing the promise given to Abraham was passed on to his son.
    marker-yv: yv-n
  - type: usfm
