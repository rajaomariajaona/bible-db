      - type: text
        text: The birthright refers to the right of the firstborn to inherit from the father a double portion—twice as much as the younger siblings inherit. Jacob now rightfully possessed the rights and blessings of the firstborn, which included authority, headship, a double portion of the inheritance, and the right to be the priest of the family. God identifies himself as the “God of Abraham, Isaac, and Jacob” (
    - type: text
      text: Ex. 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The God of Abraham is God of Promises Fulfilled. The God of Isaac is the God of Inheritance and Miracles. The God of Jacob is the God of Transformation, for Jacob would become Israel, a prince with God. God gives us the promise, but the promise requires a miracle to perform it. This miracle-promise releases true transformation within the heart of man. This is the revelation of the God of Abraham, Isaac, and Jacob.
    marker-yv: yv-n
