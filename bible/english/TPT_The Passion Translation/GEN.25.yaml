  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The names of Ishmael’s sons in their birth order are: Nebaioth the firstborn; and Kedar, Adbeel, Mibsam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mishma, Dumah, Massa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'These twelve sons of Ishmael became princes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “tribal chieftains.”
    marker-yv: yv-n
  - type: text
    text: 'of twelve tribes that were named after them, listed by the places they settled and camped. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'They occupied the land from Havilah to Shur, which is east of Egypt, in the direction of Assyria. And Ishmael lived in hostility toward all of his people. At the age of one hundred and thirty-seven, Ishmael breathed his last and died '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
