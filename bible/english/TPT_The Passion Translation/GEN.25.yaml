  - type: text
    text: Abraham and Keturah’s Descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now Abraham had taken another wife, whose name was Keturah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is not clear when Abraham took Keturah to be his wife. It is possible this happened after the death of Sarah. This would mean that he married her when he was more than one hundred and thirty-seven years old. (Sarah died at age one hundred and twenty-seven, and Abraham was ten years older than Sarah.) The six sons would have been born when Abraham was between the ages of one hundred and thirty-seven and one hundred and seventy-five. Another possibility is that Abraham had taken Keturah while Sarah was still living. The name Keturah may be a variant of a word referring to the smoke from a sacrifice or from incense (“sweet smelling smoke” or “sweet incense”). Jewish tradition states that Keturah was actually Hagar who returned from her exile and married Abraham, who changed her name to Keturah.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'She and Abraham had sons named Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jokshan was the father of Sheba and Dedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dedan’s sons were the Ashurites, the Letushites, and the Leummites. Midian’s sons were Ephah, Epher, Hanoch, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Enoch.”
    marker-yv: yv-n
  - type: text
    text: Abida, and Eldaah. All these were the descendants of Keturah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
