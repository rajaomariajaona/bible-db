    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now, Rebekah was unable to have children, but Isaac pleaded with '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' on behalf of his wife because she was barren—and she did get pregnant, for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' responded to Isaac’s prayer. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: During their twenty-year wait for children, there is no mention that Isaac fathered children with his handmaiden, as his father Abraham did. Isaac loved Rebekah and was patient and prayerful until the miracle happened.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: it
    children:
    - type: text
      text: During her pregnancy
  - type: text
    text: ', Rebekah could feel twins thrashing and struggling '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is literally “they crushed each other.” It was an intense struggle going on inside of Rebekah.
    marker-yv: yv-n
  - type: text
    text: 'with each other inside her womb. So she went to inquire of '
  - type: usfm
    marker: nd
