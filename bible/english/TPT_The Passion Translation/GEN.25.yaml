document_id: GEN.25,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham and Keturah’s Descendants
  - type: text
    content: 'Now Abraham had taken another wife, whose name was Keturah. '
  - type: note
    content: It is not clear when Abraham took Keturah to be his wife. It is possible this happened after the death of Sarah. This would mean that he married her when he was more than one hundred and thirty-seven years old. (Sarah died at age one hundred and twenty-seven, and Abraham was ten years older than Sarah.) The six sons would have been born when Abraham was between the ages of one hundred and thirty-seven and one hundred and seventy-five. Another possibility is that Abraham had taken Keturah while Sarah was still living. The name Keturah may be a variant of a word referring to the smoke from a sacrifice or from incense (“sweet smelling smoke” or “sweet incense”). Jewish tradition states that Keturah was actually Hagar who returned from her exile and married Abraham, who changed her name to Keturah.
  '10':
  - type: text
    content: 'They buried him next to his wife Sarah, in the same field that Abraham purchased from the Hittites. '
  '11':
  - type: text
    content: After Abraham had passed, God greatly blessed his son Isaac, and Isaac settled near the well named the Well of the Living One Who Watches Over Me.
  - type: note
    content: Isaac was a man of the well (see Gen. 26:18–25). Isaac lived near Beer-Lahai-Roi, which means “The Well of the Living One Who Watches Over Me.” This is where Hagar once cried out for deliverance and God heard her. In a time of desperation Ishmael drank from this well of grace. It is the place where God sees our problems and provides a well of mercy and satisfaction. Isaac did not visit there; he lived there, making the all-seeing God his source of supply. He saw a realm where the Living One sees all things. It was a well of perpetual revelation and grace.
  - type: heading
    content: The Descendants of Ishmael
  '12':
  - type: text
    content: 'This is the account of the descendants of Abraham’s son Ishmael, '
  - type: note
    content: See 1 Chron. 1:29–31.
  - type: text
    content: whom Sarah’s servant, Hagar the Egyptian, bore to Abraham.
  '13':
  - type: text
    content: 'The names of Ishmael’s sons in their birth order are: Nebaioth the firstborn; and Kedar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Dumah, Massa, '
  '15':
  - type: text
    content: 'Hadad, Tema, Jetur, Naphish, and Kedemah. '
  '16':
  - type: text
    content: 'These twelve sons of Ishmael became princes '
  - type: note
    content: Or “tribal chieftains.”
  - type: text
    content: 'of twelve tribes that were named after them, listed by the places they settled and camped. '
  '17':
  - type: text
    content: 'They occupied the land from Havilah to Shur, which is east of Egypt, in the direction of Assyria. And Ishmael lived in hostility toward all of his people. At the age of one hundred and thirty-seven, Ishmael breathed his last and died '
  - type: note
    content: The Hebrew word for “died” is gava‘, the word commonly used for the death of a righteous person. The Semitic origin of the word gava‘ is “to hunger,” “to be empty,” or “to have a longing to be filled with something.” The famed Jewish sage, Rashi, translated this as “Ishmael died [as a righteous man] still hungering for righteousness.”
  - type: text
    content: and was joined to his ancestors.
  - type: heading
    content: The Birth of Jacob and Esau
  '19':
  - type: text
    content: 'This is how the story of Isaac begins. He was the '
  - type: text
    content: beloved
  - type: text
    content: ' son of Abraham '
  - type: note
    content: Or “Abraham became the father of Isaac.” The redundancy of Abraham in this verse is a literary device for showing the promise given to Abraham was passed on to his son.
  - type: text
    content: and the successor of Abraham’s blessing
  - type: text
    content: .
  '2':
  - type: text
    content: 'She and Abraham had sons named Zimran, Jokshan, Medan, Midian, Ishbak, and Shuah. '
  '20':
  - type: text
    content: 'When he was forty, he married Rebekah. She was the daughter of Bethuel and the sister of Laban. Both her father and brother were Arameans from Paddan-Aram. '
  - type: note
    content: Paddan-Aram is also called “Aram Naharaim,” which means “Aram of the two rivers” (see Gen. 24:10). It is another name for Mesopotamia, the area between the Tigris and Euphrates Rivers in modern Iraq.
  '21':
  - type: text
    content: 'Now, Rebekah was unable to have children, but Isaac pleaded with '
  - type: text
    content: Yahweh
  - type: text
    content: ' on behalf of his wife because she was barren—and she did get pregnant, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' responded to Isaac’s prayer. '
  - type: note
    content: During their twenty-year wait for children, there is no mention that Isaac fathered children with his handmaiden, as his father Abraham did. Isaac loved Rebekah and was patient and prayerful until the miracle happened.
  '22':
  - type: text
    content: During her pregnancy
  - type: text
    content: ', Rebekah could feel twins thrashing and struggling '
  - type: note
    content: The Hebrew is literally “they crushed each other.” It was an intense struggle going on inside of Rebekah.
  - type: text
    content: 'with each other inside her womb. So she went to inquire of '
  - type: text
    content: Yahweh
  - type: text
    content: ', saying, “Why do I have to live with this?” '
  '23':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' answered her, '
  - type: note
    content: We do not know how God answered her. It could have been by an audible voice or in a dream.
  - type: text
    content: saying,
  - type: text
    content: “The two sons in your womb will become two nations,
  - type: text
    content: and the two peoples within you will become rivals.
  - type: note
    content: Or “divided,” a Hebrew word used for a river dividing into branches (see Gen. 2:10).
  - type: text
    content: One people will become stronger than the other,
  - type: text
    content: and the older will serve the younger.”
  '24':
  - type: text
    content: 'And when the time came for Rebekah to give birth, sure enough, she had twins! '
  '25':
  - type: text
    content: 'The first one came out reddish and covered with hair like a hairy garment; '
  - type: note
    content: Or “a mantle.”
  - type: text
    content: 'so they named him Esau. '
  - type: note
    content: Esau is a wordplay on the Hebrew word se‘ar meaning “hairy.”
  '26':
  - type: text
    content: 'And his brother came out with his hand grasping Esau’s heel; so, they named him Jacob. '
  - type: note
    content: The Hebrew word for “Jacob” sounds like the words for “heel” and “cheat” (see Gen. 27:36). Jacob can be translated “heel grabber” or “supplanter.” Even in the womb, Jacob was jostling for the right of the firstborn.
  - type: text
    content: Isaac was sixty when the twins were born.
  - type: note
    content: Isaac waited twenty years for God to fulfill the promise of a child. God’s promises are worth waiting for.
  - type: heading
    content: Esau Sells His Birthright
  '27':
  - type: text
    content: 'When the boys grew up, Esau became a rugged outdoorsman and a hardy hunter, but Jacob was more contemplative, '
  - type: note
    content: Although the Hebrew word tam can mean “blameless” (see Job 1:1), it is better translated “meditative,” “tranquil,” “quiet,” or “contemplative.”
  - type: text
    content: 'content to stay close to home. '
  '28':
  - type: text
    content: 'Isaac loved Esau because he was fond of eating wild game, but Rebekah '
  - type: text
    content: dearly
  - type: text
    content: ' loved Jacob.'
  '29':
  - type: text
    content: 'One day, when Jacob was cooking a stew, '
  - type: note
    content: Jewish sages state that Abraham, Jacob and Esau’s grandfather, had just died, and the stew Jacob was cooking was fulfilling a cultural obligation to cook and was related to the prescribed season of mourning. See Bava Basra 16b.
  - type: text
    content: 'Esau returned from hunting, '
  - type: note
    content: Or “from the field.”
  - type: text
    content: 'and he was famished. '
  '3':
  - type: text
    content: 'Jokshan was the father of Sheba and Dedan. '
  '30':
  - type: text
    content: Smelling the aroma of food
  - type: text
    content: ', Esau said to Jacob, “I’m starving! Let me eat some of that red stuff you’re cooking.” (This is why he is also called Edom.)'
  - type: note
    content: Edom sounds like the Hebrew word for “red.”
  '31':
  - type: text
    content: '“Yes, but first you must trade me your birthright,” '
  - type: note
    content: The birthright refers to the right of the firstborn to inherit from the father a double portion—twice as much as the younger siblings inherit. Jacob now rightfully possessed the rights and blessings of the firstborn, which included authority, headship, a double portion of the inheritance, and the right to be the priest of the family. God identifies himself as the “God of Abraham, Isaac, and Jacob” (Ex. 3:6). The God of Abraham is God of Promises Fulfilled. The God of Isaac is the God of Inheritance and Miracles. The God of Jacob is the God of Transformation, for Jacob would become Israel, a prince with God. God gives us the promise, but the promise requires a miracle to perform it. This miracle-promise releases true transformation within the heart of man. This is the revelation of the God of Abraham, Isaac, and Jacob.
  - type: text
    content: Jacob replied.
  '32':
  - type: text
    content: “Can’t you see I’m dying of hunger?” Esau said. “What good is the birthright if I’m dead?”
  '33':
  - type: text
    content: But Jacob insisted, “First, swear to me that you’ll give it to me.” So, Esau swore an oath and surrendered his birthright to Jacob.
  '34':
  - type: text
    content: Then Jacob gave Esau some lentil stew and bread. When Esau had finished eating and drinking, he just got up and walked away. Esau cared nothing about his own birthright.
  - type: note
    content: See Heb. 12:16.
  '4':
  - type: text
    content: 'Dedan’s sons were the Ashurites, the Letushites, and the Leummites. Midian’s sons were Ephah, Epher, Hanoch, '
  - type: note
    content: Or “Enoch.”
  - type: text
    content: Abida, and Eldaah. All these were the descendants of Keturah.
  - type: note
    content: See 1 Chron. 1:32–33.
  '5':
  - type: text
    content: 'Abraham gave all that he possessed to Isaac, '
  '6':
  - type: text
    content: 'but to his sons by his concubines he gave gifts while he was still living. '
  - type: note
    content: These gifts may have included jewels, precious metals, animals, slaves, or combinations of these. It is unlikely that he gave them land, for he wanted these sons to have a legal settlement that would enable them to begin life on their own, away from Isaac.
  - type: text
    content: 'He sent them all away eastward, '
  - type: text
    content: separating them
  - type: text
    content: ' from his son Isaac.'
  - type: heading
    content: The Death of Abraham
  '7':
  - type: text
    content: 'Abraham lived a total of one hundred and seventy-five years. '
  '8':
  - type: text
    content: 'Abraham took his final breath, dying at a good old age. After having lived a full, content life, he joined his ancestors. '
  '9':
  - type: text
    content: 'His sons, Isaac and Ishmael, buried him in the cave of Machpelah, in the field which had belonged to Ephron, the son of Zohar the Hittite, east of Mamre. '
