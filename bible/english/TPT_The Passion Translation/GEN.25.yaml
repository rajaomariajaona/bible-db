    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “died” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gava‘
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the word commonly used for the death of a righteous person. The Semitic origin of the word'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gava‘
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is “to hunger,” “to be empty,” or “to have a longing to be filled with something.” The famed Jewish sage, Rashi, translated this as “Ishmael died [as a righteous man] still hungering for righteousness.”
    marker-yv: yv-n
  - type: text
    text: and was joined to his ancestors.
- type: usfm
  marker: s1
  children:
