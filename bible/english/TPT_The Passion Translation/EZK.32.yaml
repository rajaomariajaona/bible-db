document_id: EZK.32,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Sea Monster
  - type: text
    content: 'In the twelfth year of our captivity, on the first day of the twelfth month, '
  - type: note
    content: This was probably March 3, 585 BC; however, there are some Hebrew manuscripts and ancient translations that read “in the eleventh year.”
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '10':
  - type: text
    content: What I do to you will stun many nations. When I brandish my sword before them all, their kings will shudder with horror at your fate. On the day they see you fall, each will tremble in terror, fearing your fate might become theirs!
  '11':
  - type: text
    content: '“ ‘For Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says '
  - type: text
    content: to Egypt
  - type: text
    content: ': The king of Babylon is coming to attack you! '
  '12':
  - type: text
    content: 'I will cause your great army to fall by the swords of mighty warriors. They are the most barbaric of nations. They will slice the pride of Egypt into pieces, and all your people will be destroyed. '
  '13':
  - type: text
    content: 'I will also slaughter your livestock grazing beside the plentiful waters. No person or animal will muddy the water in the watering places with their feet and hooves. '
  '14':
  - type: text
    content: 'Then I will settle their waters and make their rivers flow as smoothly as oil. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '15':
  - type: text
    content: '“ ‘When I reduce Egypt to a desolate wasteland and strip the land of all it contains, when I annihilate all who live there, then they will acknowledge that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '16':
  - type: text
    content: '“ ‘This is the funeral song that people will sing in mourning for Egypt. Women of other nations will sing in lament for it. They will utter a lamentation for the land of Egypt and all its many people. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', decree it!’ ”'
  - type: heading
    content: Another Funeral Song for Egypt
  '17':
  - type: text
    content: 'In the twelfth year '
  - type: text
    content: of our captivity
  - type: text
    content: ', on the fifteenth day of '
  - type: text
    content: the twelfth month
  - type: text
    content: ', '
  - type: note
    content: The words “the twelfth month” are missing from the Hebrew text. One ancient translation and the Greek Septuagint read “the first month,” but that is unlikely since that would mean this prophecy came before the previous one (see v. 1).
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '18':
  - type: text
    content: “Son of man, weep and mourn for the vast population of Egypt, and for the other mighty nations. For I will send them down to the world below with all who sink into the pit.
  - type: note
    content: Or “Son of man, weep and mourn for the people of Egypt and send them, her and the daughter of majestic nations, to the underworld.”
  '19':
  - type: text
    content: “
  - type: text
    content: Tell them
  - type: text
    content: ', ‘Egypt, are you more favored than the other nations? Down with you! Go down and make your bed with the uncircumcised dead, '
  '2':
  - type: text
    content: '“Son of man, give a solemn warning '
  - type: note
    content: Or “a lamentation” or “a doom-song” without pity.
  - type: text
    content: 'to Pharaoh king of Egypt. Say to him:'
  - type: text
    content: “ ‘You are like a young lion prowling among the nations,
  - type: text
    content: or like a sea monster lurking in your lagoons!
  - type: note
    content: See Ezek. 29:3 and footnote.
  - type: text
    content: You churn up the water with your trampling
  - type: text
    content: and muddy their streams.
  '20':
  - type: text
    content: 'with those who have been slaughtered by the sword! I will hand you and all your people over to the sword, and they will drag you away. '
  '21':
  - type: text
    content: 'From the depths of Sheol, '
  - type: note
    content: That is, the underworld. See Ezek. 31:15 and first footnote.
  - type: text
    content: 'the mightiest heroes, '
  - type: note
    content: Or “the rams, the mighty ones,” a likely figure of speech for the kings of powerful nations who are welcoming Pharaoh to the underworld.
  - type: text
    content: your allies, will shout to you, “Now they have come down. They have joined us among the uncircumcised dead, slaughtered by the sword.”
  '22':
  - type: text
    content: '“ ‘Assyria is there with all her hordes, with the graves of her soldiers all around her. They fell on the battlefield, slaughtered by the sword. '
  '23':
  - type: text
    content: 'They made their graves in the deepest part of the pit. Her hordes surround her grave; they were all slaughtered! Those who once spread their terror throughout the world of the living now '
  - type: text
    content: lie silent
  - type: text
    content: ', slaughtered by the sword.'
  '24':
  - type: text
    content: '“ ‘Elam '
  - type: note
    content: Elam existed as a nation as early as 3000 BC. The territory the Elamites occupied was east of the Tigris River and is now part of Iran. The capital city was Susa, which is where the story of Esther took place. The nation was destroyed in 640 BC when the Assyrians captured Susa, which ended the Elamite kingdom. See Jer. 49:34–39.
  - type: text
    content: 'is there, along with the graves of all her hordes. They were slaughtered—fallen by the sword. Those who once spread their terror throughout the land of the living have now joined the uncircumcised dead in the depths of the underworld. They have been disgraced and ashamed with those who sink into the pit. '
  '25':
  - type: text
    content: They have made a grave for her among her slaughtered multitudes, surrounded by all their tombs, all of them uncircumcised, slaughtered by the sword for having spread terror throughout the land of the living. They have carried their shame with them, with all those who sink into the pit. They have been placed among the slaughtered.
  '26':
  - type: text
    content: '“ ‘Meshech and Tubal '
  - type: note
    content: See Gen. 10:2 and footnotes.
  - type: text
    content: 'are in the graveyard with their hordes all around their graves. They are all the uncircumcised dead, slaughtered by the sword for having spread their terror throughout the land of the living. '
  '27':
  - type: text
    content: 'They were not buried with the great warriors of ancient times. When the mighty warriors died, they went into Sheol wearing all their armor. When people buried them, they placed their swords under their heads and their shields '
  - type: note
    content: 'The Hebrew (Masoretic) text has ‘awonotam, meaning “their iniquities,” which makes little or no sense in this context. There is a proposed conjectural emendation: sinnatam, meaning “their shields,” which makes much better sense in that an item of military armor is expected to follow the mention of “their swords under their heads.”'
  - type: text
    content: 'on top of their bodies because these valiant heroes once terrorized the land of the living. '
  '28':
  - type: text
    content: 'And you, '
  - type: text
    content: Pharaoh
  - type: text
    content: ', will be broken and lie among the uncircumcised, with those slaughtered by the sword.'
  '29':
  - type: text
    content: “ ‘Edom is there, her kings and all her rulers, who, despite their might, have been buried with those slaughtered by the sword. They lie with the uncircumcised, with those who sink into the pit.
  '3':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: I will throw my net over you using a large group of nations.
  - type: text
    content: They will drag you to shore in my net,
  - type: text
    content: and I will leave you high and dry.
  '30':
  - type: text
    content: '“ ‘All the princes of the north '
  - type: note
    content: The “princes [rulers] of the north” likely refers to the leaders of the Phoenician city-states to the north of Israel.
  - type: text
    content: and all the Sidonians are there. They have gone down in disgrace with the slaughtered because their powerful armies once terrified their enemies. They lie among the uncircumcised dead, those slaughtered by the sword who bear their shame with those who sink into the pit.
  '31':
  - type: text
    content: '“ ‘When Pharaoh and all his army see them, it will bring him some consolation at the sight of all his hordes killed by the sword. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', decree it! '
  '32':
  - type: text
    content: 'Although I made him spread terror throughout the land of the living, '
  - type: note
    content: The Hebrew text makes God, not Pharaoh, the ultimate cause of the terror.
  - type: text
    content: 'he and all his hordes will be buried with the uncircumcised dead who were slaughtered by the sword. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  '4':
  - type: text
    content: I will fling you onto the open field and abandon you on the ground.
  - type: text
    content: 'I will gather all the birds of the air to '
  - type: text
    content: feast on your flesh
  - type: text
    content: ','
  - type: text
    content: and all the beasts of the earth will gorge themselves on you.
  '5':
  - type: text
    content: I will scatter bits and pieces of your flesh on the hills
  - type: text
    content: and fill the valleys with your rotting corpse.
  '6':
  - type: text
    content: I will drench the land with your oozing blood
  - type: text
    content: until it fills the ravines
  - type: text
    content: and spreads to the base of the mountains.
  '7':
  - type: text
    content: When I snuff you out, I will hide the skies
  - type: text
    content: and darken the stars.
  - type: text
    content: I will cover the sun with clouds
  - type: text
    content: and turn off the moonlight.
  '8':
  - type: text
    content: Heaven’s bright lights above you I will darken
  - type: text
    content: and shroud your land in darkness.
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '9':
  - type: text
    content: '“ ‘I will trouble the hearts of many peoples when I spread the news of your destruction to nations and lands unknown to you. '
