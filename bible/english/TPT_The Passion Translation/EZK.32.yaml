      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was probably March 3, 585 BC; however, there are some Hebrew manuscripts and ancient translations that read “in the eleventh year.”
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, give a solemn warning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a lamentation” or “a doom-song” without pity.
    marker-yv: yv-n
  - type: text
    text: 'to Pharaoh king of Egypt. Say to him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘You are like a young lion prowling among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or like a sea monster lurking in your lagoons!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 29:3
      metadata:
        usfm: EZK.29.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You churn up the water with your trampling
- type: usfm
  marker: q1
  children:
  - type: text
    text: and muddy their streams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will throw my net over you using a large group of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will drag you to shore in my net,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will leave you high and dry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will fling you onto the open field and abandon you on the ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will gather all the birds of the air to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: feast on your flesh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all the beasts of the earth will gorge themselves on you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will scatter bits and pieces of your flesh on the hills
- type: usfm
  marker: q1
  children:
  - type: text
    text: and fill the valleys with your rotting corpse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will drench the land with your oozing blood
- type: usfm
  marker: q1
  children:
  - type: text
    text: until it fills the ravines
- type: usfm
  marker: q1
  children:
  - type: text
    text: and spreads to the base of the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When I snuff you out, I will hide the skies
- type: usfm
  marker: q1
  children:
  - type: text
    text: and darken the stars.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will cover the sun with clouds
- type: usfm
  marker: q1
  children:
  - type: text
    text: and turn off the moonlight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Heaven’s bright lights above you I will darken
- type: usfm
  marker: q1
  children:
  - type: text
    text: and shroud your land in darkness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“ ‘I will trouble the hearts of many peoples when I spread the news of your destruction to nations and lands unknown to you. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: What I do to you will stun many nations. When I brandish my sword before them all, their kings will shudder with horror at your fate. On the day they see you fall, each will tremble in terror, fearing your fate might become theirs!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“ ‘For Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Egypt
  - type: text
    text: ': The king of Babylon is coming to attack you! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I will cause your great army to fall by the swords of mighty warriors. They are the most barbaric of nations. They will slice the pride of Egypt into pieces, and all your people will be destroyed. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I will also slaughter your livestock grazing beside the plentiful waters. No person or animal will muddy the water in the watering places with their feet and hooves. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then I will settle their waters and make their rivers flow as smoothly as oil. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“ ‘When I reduce Egypt to a desolate wasteland and strip the land of all it contains, when I annihilate all who live there, then they will acknowledge that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“ ‘This is the funeral song that people will sing in mourning for Egypt. Women of other nations will sing in lament for it. They will utter a lamentation for the land of Egypt and all its many people. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', decree it!’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Another Funeral Song for Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'In the twelfth year '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of our captivity
  - type: text
    text: ', on the fifteenth day of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the twelfth month
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The words “the twelfth month” are missing from the Hebrew text. One ancient translation and the Greek Septuagint read “the first month,” but that is unlikely since that would mean this prophecy came before the previous one (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1'
      metadata:
        usfm: EZK.32.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Son of man, weep and mourn for the vast population of Egypt, and for the other mighty nations. For I will send them down to the world below with all who sink into the pit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Son of man, weep and mourn for the people of Egypt and send them, her and the daughter of majestic nations, to the underworld.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tell them
  - type: text
    text: ', ‘Egypt, are you more favored than the other nations? Down with you! Go down and make your bed with the uncircumcised dead, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'with those who have been slaughtered by the sword! I will hand you and all your people over to the sword, and they will drag you away. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'From the depths of Sheol, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the underworld. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 31:15
      metadata:
        usfm: EZK.31.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and first footnote.
    marker-yv: yv-n
  - type: text
    text: 'the mightiest heroes, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the rams, the mighty ones,” a likely figure of speech for the kings of powerful nations who are welcoming Pharaoh to the underworld.
    marker-yv: yv-n
  - type: text
    text: your allies, will shout to you, “Now they have come down. They have joined us among the uncircumcised dead, slaughtered by the sword.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“ ‘Assyria is there with all her hordes, with the graves of her soldiers all around her. They fell on the battlefield, slaughtered by the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They made their graves in the deepest part of the pit. Her hordes surround her grave; they were all slaughtered! Those who once spread their terror throughout the world of the living now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: lie silent
  - type: text
    text: ', slaughtered by the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“ ‘Elam '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Elam existed as a nation as early as 3000 BC. The territory the Elamites occupied was east of the Tigris River and is now part of Iran. The capital city was Susa, which is where the story of Esther took place. The nation was destroyed in 640 BC when the Assyrians captured Susa, which ended the Elamite kingdom. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 49:34–39
      metadata:
        usfm: JER.49.34+JER.49.35+JER.49.36+JER.49.37+JER.49.38+JER.49.39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'is there, along with the graves of all her hordes. They were slaughtered—fallen by the sword. Those who once spread their terror throughout the land of the living have now joined the uncircumcised dead in the depths of the underworld. They have been disgraced and ashamed with those who sink into the pit. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: They have made a grave for her among her slaughtered multitudes, surrounded by all their tombs, all of them uncircumcised, slaughtered by the sword for having spread terror throughout the land of the living. They have carried their shame with them, with all those who sink into the pit. They have been placed among the slaughtered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“ ‘Meshech and Tubal '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 10:2
      metadata:
        usfm: GEN.10.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnotes.
    marker-yv: yv-n
  - type: text
    text: 'are in the graveyard with their hordes all around their graves. They are all the uncircumcised dead, slaughtered by the sword for having spread their terror throughout the land of the living. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They were not buried with the great warriors of ancient times. When the mighty warriors died, they went into Sheol wearing all their armor. When people buried them, they placed their swords under their heads and their shields '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew (Masoretic) text has
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘awonotam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', meaning “their iniquities,” which makes little or no sense in this context. There is a proposed conjectural emendation:'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sinnatam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', meaning “their shields,” which makes much better sense in that an item of military armor is expected to follow the mention of “their swords under their heads.”'
    marker-yv: yv-n
  - type: text
    text: 'on top of their bodies because these valiant heroes once terrorized the land of the living. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pharaoh
  - type: text
    text: ', will be broken and lie among the uncircumcised, with those slaughtered by the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “ ‘Edom is there, her kings and all her rulers, who, despite their might, have been buried with those slaughtered by the sword. They lie with the uncircumcised, with those who sink into the pit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“ ‘All the princes of the north '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “princes [rulers] of the north” likely refers to the leaders of the Phoenician city-states to the north of Israel.
    marker-yv: yv-n
  - type: text
    text: and all the Sidonians are there. They have gone down in disgrace with the slaughtered because their powerful armies once terrified their enemies. They lie among the uncircumcised dead, those slaughtered by the sword who bear their shame with those who sink into the pit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“ ‘When Pharaoh and all his army see them, it will bring him some consolation at the sight of all his hordes killed by the sword. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
