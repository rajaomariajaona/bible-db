    - type: text
      text: '1'
  - type: text
    text: 'In the twelfth year of our captivity, on the first day of the twelfth month, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 32:1
    - type: usfm
      marker: ft
