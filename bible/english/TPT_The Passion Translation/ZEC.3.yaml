document_id: ZEC.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Fourth Vision: Clean Clothes for the High Priest'
  - type: text
    content: 'Then I was shown another vision. '
  - type: note
    content: Although the text does not state who revealed this vision to Zechariah, according to some manuscripts of both the ancient Greek and Latin versions, it was Yahweh. The prophet received a vision of what was happening in the heavenly court.
  - type: text
    content: 'I saw Joshua the high priest standing before the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' dressed in filthy '
  - type: note
    content: The Hebrew word tsoʾim is frequently used for excrement. See Isa. 4:4.
  - type: text
    content: 'clothes. On Joshua’s right was the accuser, '
  - type: note
    content: Literally “the satan.” Satan means “the accuser.” Satan traffics in accusation (see 1 Chron. 21:1; Job 1–2; Rev. 12:10). Regarding him being on Joshua’s “right,” see Ps. 109:6–7. Note that the accuser is silenced even before he can bring his accusation.
  - type: text
    content: 'standing there ready to prosecute him. The angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Or “Yahweh.” There is considerable debate over who is speaking, Yahweh himself or “the angel of Yahweh.”
  - type: text
    content: said to Satan, “
  - type: text
    content: Yahweh
  - type: text
    content: ' rebukes you, Satan! '
  - type: text
    content: Yes
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ' rebukes you, for he has chosen Jerusalem. And he has rescued Joshua, like a stick snatched out of the fire.”'
  - type: note
    content: See Amos 4:11. Joshua became a representative of the exiles who had returned to Jerusalem (see Ezra 2:1–2). They are likened to a half-burnt log that was rescued from the fire of their captivity. Joshua coming back as the high priest to Jerusalem after years of Babylonian captivity was a miracle. According to the Talmud, this statement of Joshua being like a stick snatched out of the fire literally happened. In Jer. 29:21–23, it was prophesied that Nebuchadnezzar would have two false, adulterous prophets thrown into the fire. In the account of this prophecy’s fulfillment given by the Talmud, the false prophets pleaded to have one more join them, imitating Daniel’s three friends who were spared in the fire. So Joshua the high priest was chosen to join them in the flames, with the hopes that this would guarantee their deliverance. However, the two false prophets were roasted alive while Joshua was miraculously spared, like a stick snatched out of the fire. See Sanhedrin 93a.
  '10':
  - type: text
    content: 'And at that time, everyone will invite his friends to come '
  - type: text
    content: and have fellowship
  - type: text
    content: ' under their own vine and their own fig tree. '
  - type: note
    content: The vine and the fig tree were frequently used as symbols of the peace, prosperity, and security that the Messiah would bring. See 1 Kings 4:25; 2 Kings 18:31; Mic. 4:4.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  '4':
  - type: text
    content: 'Then the angel said to those '
  - type: text
    content: heavenly council members
  - type: text
    content: ' who were standing before him, '
  - type: note
    content: That is, attendants assembled in the courtroom of heaven.
  - type: text
    content: '“Remove Joshua’s filthy clothes.” Then he said to Joshua, “Behold, I have taken your guilt away, and I will clothe you with splendid robes.” '
  - type: note
    content: Or “festive robes.”
  '5':
  - type: text
    content: 'And I spoke up and requested, “Let them also put a clean turban on his head.” So they dressed him in clean clothes and put on his head a clean turban while the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' stood nearby.'
  '6':
  - type: text
    content: 'So the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' solemnly assured Joshua with these words: '
  '7':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declares to you, ‘If you walk in my ways and live in obedience to me, you will preside over my temple and keep watch over my courts. And I will let you come and go in the same way as '
  - type: text
    content: your fellow council members
  - type: text
    content: ' standing here.’ ”'
  - type: heading
    content: The Coming of the Branch
  '8':
  - type: text
    content: '“ ‘So listen, high priest Joshua, you and your fellow priests seated here are '
  - type: text
    content: beautiful
  - type: text
    content: ' symbols '
  - type: note
    content: Or “signs” or “wonders.” See Isa. 8:18.
  - type: text
    content: of what is to come
  - type: text
    content: '. Behold, I will reveal my servant, the Branch! '
  - type: note
    content: This is a Messianic term for Christ, who fulfills the prophecies concerning the Branch. Indeed, he told his disciples that he is the Vine (Branch). See Isa. 4:2; 11:1; Jer. 23:5; 33:15; John 15:1–8. The Septuagint reads “Rising Sun” in place of “Branch” (see Luke 1:78).
  '9':
  - type: text
    content: 'And behold, I have laid a stone before Joshua, a '
  - type: text
    content: precious
  - type: text
    content: ', unique stone '
  - type: note
    content: We are living stones made into a temple. See 1 Peter 2:5.
  - type: text
    content: 'with seven eyes. '
  - type: note
    content: See Zech. 4:10; Rev. 5:6. A stone with seven eyes would be a living stone. In the Bible, the number seven means completion intensified. Not only is this stone living, but its life is also intensified sevenfold. In one day, our living Stone removed sin (see John 1:29). This stone is the Lamb of God. Another verse that proves that this stone is the Lamb of God is Rev. 5:6. This verse says, “Then I saw a young Lamb standing before the throne. . . . He had . . . seven eyes, which are the seven Spirits of God.” The Lamb with seven eyes and the Stone with seven eyes are the same person. The Lamb is Christ, and the Stone is Christ. Christ is our living, redeeming Stone with seven eyes, who has made us living stones (see 1 Peter 2:4–5). Interestingly, the Hebrew word for “eyes” (ʿayin) has a homonym that can be translated “fountains”—a stone with seven fountains.
  - type: text
    content: 'And I will engrave a '
  - type: text
    content: special
  - type: text
    content: ' inscription on it,’ '
  - type: note
    content: We are not given the words of the inscription. Perhaps, like the stones of the breastplate of the high priest, the names of the twelve tribes were engraved (see Ex. 28:9–11). Some scholars suggest that it was the name of the Messiah inscribed upon the stone. Still others believe it may have been the motto “Holy to Yahweh,” which was engraved on the gold plate attached to Aaron’s turban (see Ex. 28:36; 39:30; Zech. 14:20). The words “Holy to Yahweh” are seven Hebrew letters, which fits the context of seven eyes. With a slight emendation of the text, the words “I . . . will engrave” are translated in the Septuagint as “I will reveal its meaning to you.”
  - type: text
    content: 'says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: '“ ‘And in a single day, I will remove the sin '
  - type: text
    content: of the people
  - type: text
    content: ' of this land. '
