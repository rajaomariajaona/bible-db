        text: ). They are likened to a half-burnt log that was rescued from the fire of their captivity. Joshua coming back as the high priest to Jerusalem after years of Babylonian captivity was a miracle. According to the Talmud, this statement of Joshua being like a stick snatched out of the fire literally happened. In
