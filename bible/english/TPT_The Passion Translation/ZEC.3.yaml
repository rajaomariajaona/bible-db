      - type: text
        text: ', it was prophesied that Nebuchadnezzar would have two false, adulterous prophets thrown into the fire. In the account of this prophecy’s fulfillment given by the Talmud, the false prophets pleaded to have one more join them, imitating Daniel’s three friends who were spared in the fire. So Joshua the high priest was chosen to join them in the flames, with the hopes that this would guarantee their deliverance. However, the two false prophets were roasted alive while Joshua was miraculously spared, like a stick snatched out of the fire. See Sanhedrin 93a.'
