document_id: HOS.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Indictment of Israel
  - type: text
    content: 'Israelites, hear the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ', for he has charges to bring against the citizens of the country!'
  - type: text
    content: “There is no faithfulness in the land,
  - type: text
    content: no tenderness and love—
  - type: text
    content: no knowledge and understanding of God.
  '10':
  - type: text
    content: They will eat but never be satisfied;
  - type: text
    content: they will have sex but will remain infertile
  - type: note
    content: That is, they will worship the fertility gods and have sex with the temple prostitutes but will remain infertile.
  - type: text
    content: 'since they are unfaithful to me, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and are devoted to other gods instead.
  '11':
  - type: text
    content: 'Here is what robs their ability to understand:'
  - type: note
    content: Or “what takes away the heart.”
  - type: text
    content: giving themselves to prostitution
  - type: text
    content: and to old and new wine.”
  - type: heading
    content: 'The Core Issue: Israel’s Idolatry'
  '12':
  - type: text
    content: “My people seek revelation from a block of wood
  - type: text
    content: and ask a stick what they should do.
  - type: note
    content: Or “their staff gives them oracles.” This is known as rhabdomancy. See Ezek. 21:21 .
  - type: text
    content: They have left me and are led astray by their spiritual adultery.
  - type: note
    content: Or “a spirit of adultery has led them astray” or “the wind of harlotry has blown them astray.”
  - type: text
    content: They have deserted their God
  '13':
  - type: text
    content: to offer sacrifice on the mountains.
  - type: text
    content: They burn incense on the hills,
  - type: text
    content: under oaks, and every tall sacred tree,
  - type: note
    content: Or “poplar and terebinth.” See Deut. 12:1–9 .
  - type: text
    content: worshiping false gods
  - type: text
    content: ' in their pleasant shade.'
  - type: text
    content: This is why your daughters became cultic prostitutes
  - type: text
    content: and your daughters-in-law commit adultery.
  '14':
  - type: text
    content: I will not punish your daughters for their prostitution
  - type: text
    content: nor your daughters-in-law for their adultery
  - type: text
    content: 'because it is you men '
  - type: note
    content: In the context, the “men” seems to refer to the priests. Pagan shrines were built in Israel’s high places where it was believed that sex with cultic prostitutes (lit. “holy women”) would ensure the fertility of their fields, of their herds, and of the women.
  - type: text
    content: who are wandering off with whores
  - type: text
    content: and offering sacrifice with cultic prostitutes.
  - type: note
    content: Due to the wicked example of their fathers and husbands, the women’s guilt is viewed as less severe.
  - type: text
    content: 'So '
  - type: text
    content: the saying is true
  - type: text
    content: ':'
  - type: text
    content: ‘A people without understanding will come to ruin.’ ”
  - type: heading
    content: God Warns Judah and Israel
  '15':
  - type: text
    content: “Although you, Israel, are unfaithful to me,
  - type: text
    content: there is no need for Judah to sin by following your example.
  - type: text
    content: Do not go for worship at Gilgal
  - type: note
    content: Gilgal was the first base for Israel after crossing the Jordan (see Josh. 4:19 ). They had erected a stone pillar there to honor God, but that “worship” was now defiled by their mixing of pagan practices with the worship of Yahweh .
  - type: text
    content: or go up to the wicked Bethel.
  - type: note
    content: Or “Beth Aven,” which means “house of evil.” This is likely a term of derision for Bethel ( Bethel means “house of God”), where the dwelling place of God (or tabernacle) once rested (see Judg. 20:26–27 ). Hosea was telling the people that the house of God had been perverted and defiled by pagan worship. Gilgal and Bethel became centers of idolatrous worship during the days of Jeroboam (see Amos 4:4 ).
  - type: text
    content: 'Do not swear oaths any longer, saying, ‘As surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ' lives,’'
  - type: note
    content: See Amos 8:14 .
  '16':
  - type: text
    content: for Israel is as stubborn as a mule.
  - type: note
    content: Or “a cow with calf,” which, for most English speakers, does not convey the intended meaning of the idiom. As a stubborn mule is tied up to keep it from wandering away, so Israel will be brought into captivity.
  - type: text
    content: 'So do they really think that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', am going to pasture them'
  - type: text
    content: 'like an '
  - type: text
    content: obedient
  - type: text
    content: ' lamb in a broad meadow?'
  - type: note
    content: 'The difficult syntax of this verse can be understood as a declaration: “ Yahweh cannot feed them like lambs in a meadow.” However, the simile in this verse is more likely a rhetorical question that implies that God is not going to protect and provide for his straying people.'
  '17':
  - type: text
    content: Ephraim is under the spell of idols—leave him alone!
  - type: note
    content: Or “Ephraim is wedded to idols. Let him do as he wishes!” Ephraim is a metonymy for the Northern Kingdom of Israel.
  '18':
  - type: text
    content: Their drunken orgy over,
  - type: text
    content: the people delight in their prostitution,
  - type: text
    content: preferring shame to honor.
  - type: note
    content: The Hebrew of this verse is uncertain. The second half reads literally “they have loved they love the shame of her shields [gifts].” Another possible translation is “You have barely recovered from your hangover, yet you rush to the harlots. You are fond of the disgrace of their gifts.”
  '19':
  - type: text
    content: They will be swept away on the wings of the wind,
  - type: note
    content: Or “The wind has wrapped her in its wings.”
  - type: text
    content: and their pagan sacrifices will bring them
  - type: text
    content: nothing but disgrace.”
  '2':
  - type: text
    content: 'Your crimes are these:'
  - type: text
    content: cursing others, lying, breaking your promises,
  - type: text
    content: murdering, stealing, and committing adultery.
  - type: text
    content: You have no moral decency,
  - type: note
    content: Or “break all bounds [boundaries].” This is a metaphor for breaking down the figurative walls of a moral society.
  - type: text
    content: and bloodshed is the order of the day.
  - type: note
    content: Or “blood touches blood.”
  '3':
  - type: text
    content: This is why the land withers away,
  - type: text
    content: and all who live in it waste away—
  - type: text
    content: the wild animals, the birds, even the fish disappear.”
  - type: heading
    content: God’s Indictment of the Priests and Prophets
  '4':
  - type: text
    content: “But let no one accuse or blame others,
  - type: text
    content: for my contention is with you, the priests.
  - type: note
    content: The meaning of the Hebrew text is uncertain.
  '5':
  - type: text
    content: 'So, you '
  - type: text
    content: priests
  - type: text
    content: ' will stumble '
  - type: text
    content: on the road to ruin
  - type: text
    content: ' in broad daylight,'
  - type: text
    content: and the prophet will stumble with you in the dark.
  - type: text
    content: 'I will destroy '
  - type: text
    content: Israel
  - type: text
    content: ', who gave you birth.'
  - type: note
    content: Or “You have destroyed your own people.” The Hebrew is literally “I will destroy your mother.” Mother , in this context, is figurative and refers to the nation of Israel.
  '6':
  - type: text
    content: My people are destroyed because they do not know who I am.
  - type: note
    content: Or “My people are destroyed for worn-out [old] ways of knowing me.” That is, the priests had failed to teach the people to acknowledge God and give them fresh understanding of who Yahweh truly is.
  - type: text
    content: Since you have refused to let them know who I am,
  - type: text
    content: I will refuse you as my priests.
  - type: text
    content: Since you have ignored the teaching of your God,
  - type: note
    content: See Mal. 2:7–9 .
  - type: text
    content: I will ignore your children.”
  - type: heading
    content: Yahweh’s Warning
  '7':
  - type: text
    content: '“The more you '
  - type: text
    content: priests
  - type: text
    content: ' increase in number,'
  - type: text
    content: the more of your sins against me I have counted.
  - type: text
    content: You have exchanged me, your glorious God,
  - type: text
    content: for something shameful.
  - type: note
    content: As translated from the Syriac and the Targum. That is, the priests and people had exchanged the God of glory for a vile idol. God is the glory of his people. The shameful things are the idols and false gods they worshiped. The Hebrew is “I will change their glory into shame.” There is a powerful pun in the text that is lost in translation. The word for “glory” can also mean “weighty,” and the word for “shame” can also be translated “lightness [something lightly esteemed or disregarded].”
  '8':
  - type: text
    content: 'The '
  - type: text
    content: priests
  - type: text
    content: ' lead my people into sin'
  - type: text
    content: so they can eat more of their sin offerings.
  - type: note
    content: The priest often charged fees to offer a sacrifice for the penitent worshiper and was then allowed to eat the meat offered in sacrifices (see Lev. 6:24–29 ; 7:7 ). The priests benefited from the sins of the people. A hungry and greedy priesthood took advantage of the people’s sins (see 1 Sam. 2:12–17 ). Clericalism cultivates a constant sense of guilt and shame among its followers in order for clerics to benefit from the insecurity of the people.
  - type: text
    content: They want the people to sin more and more.
  '9':
  - type: text
    content: The people get the priests they deserve!
  - type: note
    content: This verse is likely a proverb of that day quoted by Hosea. It can be translated “Like people, like priest”—that is, one is as bad as the other.
  - type: text
    content: I will punish them both for their conduct;
  - type: text
    content: their evil deeds will cling to them.
