        - type: text
          text: In the context, the “men” seems to refer to the priests. Pagan shrines were built in Israel’s high places where it was believed that sex with cultic prostitutes (lit. “holy women”) would ensure the fertility of their fields, of their herds, and of the women.
      marker-yv: yv-n
    - type: text
