        - type: text
          text: As translated from the Syriac and the Targum. That is, the priests and people had exchanged the God of glory for a vile idol. God is the glory of his people. The shameful things are the idols and false gods they worshiped. The Hebrew is “I will change their glory into shame.” There is a powerful pun in the text that is lost in translation. The word for “glory” can also mean “weighty,” and the word for “shame” can also be translated “lightness [something lightly esteemed or disregarded].”
      marker-yv: yv-n
