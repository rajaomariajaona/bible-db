      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 20:26–27
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Hosea was telling the people that the house of God had been perverted and defiled by pagan worship. Gilgal and Bethel became centers of idolatrous worship during the days of Jeroboam (see
      - type: usfm
