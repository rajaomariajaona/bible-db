document_id: GEN.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Noah Leaves the Ark
  - type: text
    content: 'God’s heart '
  - type: text
    content: was moved with compassion as he
  - type: text
    content: ' remembered '
  - type: note
    content: God had not forgotten and then suddenly remembered them; his heart of compassion focused on Noah and all that survived in the ark. Mercy triumphs over judgment (see James 2:13).
  - type: text
    content: 'Noah and all the animals, large and small, '
  - type: note
    content: Or “wild and domesticated animals.”
  - type: text
    content: 'that were with him in the ark. '
  - type: note
    content: Being in the ark assured their salvation. Being in Christ likewise assures our salvation.
  - type: text
    content: 'And God caused a wind '
  - type: note
    content: Or “[his] Spirit” or “breath.” See Ps. 148:8.
  - type: text
    content: 'to sweep across the earth '
  - type: text
    content: again
  - type: text
    content: ' '
  - type: note
    content: God repeated what he did at creation; his Spirit hovered over the face of the waters. And it happened again thousands of years later, as God’s Spirit hovered over and filled 120 believers at Pentecost, giving them new creation life.
  - type: text
    content: 'and the waters subsided. '
  '10':
  - type: text
    content: 'He waited another seven days and released the dove from the ark again. '
  '11':
  - type: text
    content: 'Before evening, the dove came back to him—and there in its beak was a freshly plucked olive leaf! '
  - type: note
    content: The contrast of the raven and the dove is an allegory. The raven symbolizes the law, which was sent out first, but gave no assurance that waters of judgment had lifted. The dove, returning with an olive branch, a symbol of peace, symbolizes the gospel of grace given to us by the Holy Spirit. The gospel of our Lord Jesus Christ brings a better hope to the believer—judgment has retreated. Every time the “Dove” of God comes, he brings a fresh olive branch—fresh oil for the sons and daughters of the Most High.
  - type: text
    content: So Noah realized that the waters had finally subsided from the earth.
  '12':
  - type: text
    content: Then he waited another seven days and sent the dove out again, but this time it did not return to him in the ark.
  - type: note
    content: The Dove (Holy Spirit) cannot rest where there is corruption and death. For generations, the Dove, seeking a place to rest, flew over Abraham, Moses, the prophets, and the kings unable to find a resting place. Until at last, at the river Jordan, the Dove came from the open heavens and rested on the perfect man, Jesus, the Son of God (see Matt. 3:16). Has the gentle Dove found a nest in your heart? In order to have the gifts (see Gal. 5:22–23) and power of the Dove, you must seek first the nature of the Lamb.
  '13':
  - type: text
    content: 'In Noah’s six hundred and first year, on the first day of the first month, the waters were dried up from the earth. Noah lifted the hatch, looked out, and saw the dry ground. '
  '14':
  - type: text
    content: 'On the twenty-seventh day of the second month, the earth was dry. '
  '15':
  - type: text
    content: 'Then God said '
  - type: note
    content: Noah was obedient to God, refusing to move until he heard the Word of the Lord. Just as he waited for the command to enter, he waited for the command to disembark.
  - type: text
    content: 'to Noah, '
  '16':
  - type: text
    content: '“Come out of the ark, you and your wife, your sons, and their wives. '
  - type: note
    content: Noah waited over six weeks in the ark on top of Ararat for the waters to completely recede, and for the ground to dry. This took great discipline, for no one likes to wait. But God’s timing is always perfect. Noah was in the ark for a total of one year and seventeen days.
  '17':
  - type: text
    content: 'Release all the animals with you and set them free—birds, animals large and small—every living thing. And they will multiply and abound and flourish on the earth '
  - type: text
    content: and in the sky
  - type: text
    content: '.” '
  '18':
  - type: text
    content: 'So Noah and his family left the ark; '
  '19':
  - type: text
    content: and every animal large and small, every bird and crawling thing came out of the ark by families.
  - type: note
    content: That is, by species. Noah and his family would never forget the moment they pushed open the door of the ark and walked out into a new world. Eight human beings found a new beginning with God. Like a new Adam and a new Eve, they began all over again. What a spine-tingling moment it was! The bright sunlight, the fresh air, the gentle breeze—God had seen them through!
  - type: heading
    content: God’s Promise to Noah
  '2':
  - type: text
    content: 'He closed the subterranean fountains and the floodgates of heaven and held back the rain. '
  '20':
  - type: text
    content: 'Noah erected an altar dedicated to '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: The first thing Noah did when he got out of the ark was worship Yahweh. Noah realized the great love of God that was upon his life and offered himself to God. The kindness of God is also seen in Jesus. God is always ready to renew a relationship with people when they turn to him.
  - type: text
    content: 'Then he selected ritually clean animals and birds of every species and offered them as burnt sacrifices on the altar. '
  '21':
  - type: text
    content: 'And when '
  - type: text
    content: Yahweh
  - type: text
    content: ' smelled the sweet fragrance of Noah’s offerings, '
  - type: text
    content: his heart was stirred
  - type: text
    content: ', '
  - type: note
    content: Or “he said to his heart.”
  - type: text
    content: 'and he said, “Never again will I curse the earth because of people, even though the imagination of their hearts are evil from their childhood; nor will I ever again destroy every living creature as I have done. '
  - type: text
    content: I promise this
  - type: text
    content: ':'
  '22':
  - type: text
    content: “As long as earth exists
  - type: text
    content: 'there will always be '
  - type: text
    content: seasons
  - type: text
    content: of
  - type: text
    content: ' planting and harvest,'
  - type: text
    content: cold and heat,
  - type: text
    content: summer and winter,
  - type: text
    content: day and night.”
  '3':
  - type: text
    content: 'After 150 days, the floodwaters gradually receded from the earth and the waters began to subside. '
  '4':
  - type: text
    content: 'And on the seventeenth day of the seventh month, '
  - type: note
    content: At the institution of the Feast of Passover, the Lord made the seventh month into the first month, the month of great importance for Israel (see Ex. 12:2). Passover was the fourteenth day of the month. Three days later would be the seventeenth day of the month; the very day Jesus rose from the dead. The final resting place of our ark of salvation was the top of the mountain. Jesus was raised on high, seated at the right hand of the Most High. What inspiration lies within the Bible!
  - type: text
    content: 'the ark came to rest '
  - type: note
    content: This is a play on words, for Noah’s name means “rest.” God’s covenant of peace with Noah would remain (see Ps. 32:6; Isa. 54:10).
  - type: text
    content: 'on the highest peak in Ararat. '
  - type: note
    content: Mt. Ararat is believed to be on the border of Turkey, Armenia, and Iran, known as Urartu in Assyrian inscriptions. See 2 Kings 19:37; Isa. 37:38; Jer. 51:27. Ararat means “the curse is reversed” or “high and holy land.” The resting place of God’s sons and daughters is where “the curse is reversed” (the cross and empty tomb), in the “high and holy land” of being seated with Christ in the heavenly realm (see Eph. 2:6).
  '5':
  - type: text
    content: The waters continued to recede until the tenth month. And on the first day of the tenth month, all the mountaintops appeared.
  - type: note
    content: The mountaintops became visible seventy-three days after the ark rested. This new age now begins with eight people. Eight is the biblical number of a new beginning.
  '6':
  - type: text
    content: 'After forty more days Noah opened the window he had made in the ark '
  '7':
  - type: text
    content: 'and released a raven. It flew back and forth '
  - type: text
    content: from the ark
  - type: text
    content: ' until the earth was dry.'
  - type: note
    content: In other words, the unclean raven apparently did not return to the ark.
  '8':
  - type: text
    content: 'Then he sent out a dove '
  - type: note
    content: Or “sent out a dove from him,” an awkward construction in English. The next verse shows that Noah took the dove back into the ark with his hand to see if there was any clay or mud on its feet.
  - type: text
    content: 'to see if the waters had receded from the surface of the ground. '
  '9':
  - type: text
    content: 'But the dove found no place to rest, so it returned to Noah in the ark because the waters still covered the face of the earth. Noah put out his hand and grasped the dove and put it back into the ark. '
