document_id: GEN.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noah Leaves the Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'God’s heart '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was moved with compassion as he
    - type: text
      text: ' remembered '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God had not forgotten and then suddenly remembered them; his heart of compassion focused on Noah and all that survived in the ark. Mercy triumphs over judgment (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Noah and all the animals, large and small, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wild and domesticated animals.”
      marker-yv: yv-n
    - type: text
      text: 'that were with him in the ark. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Being in the ark assured their salvation. Being in Christ likewise assures our salvation.
      marker-yv: yv-n
    - type: text
      text: 'And God caused a wind '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[his] Spirit” or “breath.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 148:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to sweep across the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God repeated what he did at creation; his Spirit hovered over the face of the waters. And it happened again thousands of years later, as God’s Spirit hovered over and filled 120 believers at Pentecost, giving them new creation life.
      marker-yv: yv-n
    - type: text
      text: 'and the waters subsided. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He waited another seven days and released the dove from the ark again. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Before evening, the dove came back to him—and there in its beak was a freshly plucked olive leaf! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The contrast of the raven and the dove is an allegory. The raven symbolizes the law, which was sent out first, but gave no assurance that waters of judgment had lifted. The dove, returning with an olive branch, a symbol of peace, symbolizes the gospel of grace given to us by the Holy Spirit. The gospel of our Lord Jesus Christ brings a better hope to the believer—judgment has retreated. Every time the “Dove” of God comes, he brings a fresh olive branch—fresh oil for the sons and daughters of the Most High.
      marker-yv: yv-n
    - type: text
      text: So Noah realized that the waters had finally subsided from the earth.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then he waited another seven days and sent the dove out again, but this time it did not return to him in the ark.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Dove (Holy Spirit) cannot rest where there is corruption and death. For generations, the Dove, seeking a place to rest, flew over Abraham, Moses, the prophets, and the kings unable to find a resting place. Until at last, at the river Jordan, the Dove came from the open heavens and rested on the perfect man, Jesus, the Son of God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Has the gentle Dove found a nest in your heart? In order to have the gifts (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and power of the Dove, you must seek first the nature of the Lamb.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'In Noah’s six hundred and first year, on the first day of the first month, the waters were dried up from the earth. Noah lifted the hatch, looked out, and saw the dry ground. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'On the twenty-seventh day of the second month, the earth was dry. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then God said '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Noah was obedient to God, refusing to move until he heard the Word of the Lord. Just as he waited for the command to enter, he waited for the command to disembark.
      marker-yv: yv-n
    - type: text
      text: 'to Noah, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“Come out of the ark, you and your wife, your sons, and their wives. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Noah waited over six weeks in the ark on top of Ararat for the waters to completely recede, and for the ground to dry. This took great discipline, for no one likes to wait. But God’s timing is always perfect. Noah was in the ark for a total of one year and seventeen days.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Release all the animals with you and set them free—birds, animals large and small—every living thing. And they will multiply and abound and flourish on the earth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and in the sky
    - type: text
      text: '.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'So Noah and his family left the ark; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: and every animal large and small, every bird and crawling thing came out of the ark by families.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, by species. Noah and his family would never forget the moment they pushed open the door of the ark and walked out into a new world. Eight human beings found a new beginning with God. Like a new Adam and a new Eve, they began all over again. What a spine-tingling moment it was! The bright sunlight, the fresh air, the gentle breeze—God had seen them through!
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Promise to Noah
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He closed the subterranean fountains and the floodgates of heaven and held back the rain. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Noah erected an altar dedicated to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The first thing Noah did when he got out of the ark was worship
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Noah realized the great love of God that was upon his life and offered himself to God. The kindness of God is also seen in Jesus. God is always ready to renew a relationship with people when they turn to him.
      marker-yv: yv-n
    - type: text
      text: 'Then he selected ritually clean animals and birds of every species and offered them as burnt sacrifices on the altar. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' smelled the sweet fragrance of Noah’s offerings, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his heart was stirred
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he said to his heart.”
      marker-yv: yv-n
    - type: text
      text: 'and he said, “Never again will I curse the earth because of people, even though the imagination of their hearts are evil from their childhood; nor will I ever again destroy every living creature as I have done. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I promise this
    - type: text
      text: ':'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “As long as earth exists
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'there will always be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seasons
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: of
    - type: text
      text: ' planting and harvest,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cold and heat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: summer and winter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: day and night.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'After 150 days, the floodwaters gradually receded from the earth and the waters began to subside. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And on the seventeenth day of the seventh month, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At the institution of the Feast of Passover, the Lord made the seventh month into the first month, the month of great importance for Israel (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Passover was the fourteenth day of the month. Three days later would be the seventeenth day of the month; the very day Jesus rose from the dead. The final resting place of our ark of salvation was the top of the mountain. Jesus was raised on high, seated at the right hand of the Most High. What inspiration lies within the Bible!
      marker-yv: yv-n
    - type: text
      text: 'the ark came to rest '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a play on words, for Noah’s name means “rest.” God’s covenant of peace with Noah would remain (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 32:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 54:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'on the highest peak in Ararat. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt. Ararat is believed to be on the border of Turkey, Armenia, and Iran, known as Urartu in Assyrian inscriptions. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 19:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 37:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 51:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ararat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the curse is reversed” or “high and holy land.” The resting place of God’s sons and daughters is where “the curse is reversed” (the cross and empty tomb), in the “high and holy land” of being seated with Christ in the heavenly realm (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The waters continued to recede until the tenth month. And on the first day of the tenth month, all the mountaintops appeared.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The mountaintops became visible seventy-three days after the ark rested. This new age now begins with eight people. Eight is the biblical number of a new beginning.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'After forty more days Noah opened the window he had made in the ark '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'and released a raven. It flew back and forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from the ark
    - type: text
      text: ' until the earth was dry.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In other words, the unclean raven apparently did not return to the ark.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Then he sent out a dove '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sent out a dove from him,” an awkward construction in English. The next verse shows that Noah took the dove back into the ark with his hand to see if there was any clay or mud on its feet.
      marker-yv: yv-n
    - type: text
      text: 'to see if the waters had receded from the surface of the ground. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But the dove found no place to rest, so it returned to Noah in the ark because the waters still covered the face of the earth. Noah put out his hand and grasped the dove and put it back into the ark. '
