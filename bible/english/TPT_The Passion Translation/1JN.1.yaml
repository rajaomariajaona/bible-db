      children:
      - type: text
        text: That is, God and the believer enjoy fellowship on the basis of walking in the light of God. Fellowship is maintained with God as we continue walking in the light he reveals to us. To walk in the light also involves being open, transparent, and honest, acknowledging any darkness the Lord might reveal in us. The blood of Jesus will cleanse us from all known sin, and if we continue to be open to God’s pure light his blood will cleanse us from all unknown sin as well, enabling imperfect believers to walk in fellowship with a holy God. Freedom from sin (which is mentioned seventeen times in 1 John) is equated to walking in the pure light of God—not simply a fleshly struggle but a desire to walk in fellowship with God in his light.
    marker-yv: yv-n
  - type: text
    text: and the blood of Jesus, his Son, continually cleanses us from all sin.
- type: usfm
