        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We can only confess what God has revealed to us in his light. But when he shows that a thought or life pattern is sinful, we must agree with him in order to be restored. We cannot hide or conceal our sin, but confess our failure to him and move forward in faith. This is like a “rebound” for a missed shot.
    marker-yv: yv-n
  - type: text
    text: we make him a liar and his word is not in us.
