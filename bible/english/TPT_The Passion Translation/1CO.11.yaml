      children:
      - type: text
        text: (authority), which is used for the authority of God, kings, and rulers, and can be translated “might” or “right.” It never occurs as a metaphor speaking of a piece of apparel. This is not a symbol of authority, but true authority on “the” (not her) head under which she ministers. Before Pentecost, the woman was not seen as anyone with authority, but at Pentecost the Holy Spirit fell upon men and women, giving each person the authority to take the gospel with power to the ends of the earth and prophesy under the direction of the Holy Spirit. The Gospels both begin and end with a visitation of angels to women. The angel Gabriel came to Mary and the angels of God greeted the women at the empty tomb. However, the Aramaic word used here is a homonym that can mean both “power” and “covering/veil.” This may explain the variation of the Greek texts.
    marker-yv: yv-n
