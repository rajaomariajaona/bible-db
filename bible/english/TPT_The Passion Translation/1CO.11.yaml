  - type: text
    content: .
  '13':
  - type: text
    content: 'So then you can decide for yourselves—is it proper for a woman to pray to God with her hair unbound? '
  - type: note
    content: As translated from the Aramaic. The Greek is “with her head uncovered.”
  '14':
  - type: text
    content: 'Doesn’t our long-established cultural tradition teach us that if a man has long hair that is '
  - type: text
    content: ornamentally arranged
  - type: text
    content: ' it invites disgrace, but if a woman has long hair that is '
  - type: text
    content: ornamentally arranged
  - type: text
    content: ' it is her glory? '
  '15':
  - type: text
    content: This is because long hair is the endowment that God has given her as a head covering.
  - type: note
    content: Or “prayer shawl.” The Greek word peribolaion is translated in the Deut. 22:12 (LXX) as “prayer shawl.”
  '16':
  - type: text
    content: 'If someone wants to quarrel about this, I want you to know that we have no intention '
  - type: note
    content: Or “custom.”
  - type: text
    content: to start an argument, neither I nor the congregations of God.
  - type: heading
    content: The Lord’s Table
  '17':
  - type: text
    content: 'Now, on this next matter, I wish I could commend you, but I cannot, because when you meet together as a church family it is doing more harm than good! '
  '18':
  - type: text
    content: 'I’ve been told many times that when you meet as a congregation, divisions and cliques emerge—and to some extent, this doesn’t surprise me. '
  '19':
  - type: text
    content: Differences of opinion are unavoidable, yet they will reveal which ones among you truly have God’s approval.
  - type: note
    content: Differences of opinion between believers expose our hearts. Mature ones will overlook offenses and faults in order to maintain the precious unity of the body of Christ. Immature ones will cause splits, divisions, and cliques around their respective opinions. The ones whom God approves are those whose hearts remain pure in spite of petty differences.
  '2':
  - type: text
    content: 'And I give you full credit for always keeping me in mind as you follow carefully the substance of my instructions '
  - type: note
    content: Or “traditions” or “guidelines.” It is likely that the instructions Paul refers to here are regarding their public worship. This would include cultural customs about church order and not necessarily doctrinal matters.
  - type: text
    content: 'that I’ve taught you. '
  '20':
  - type: text
    content: 'When all of '
  - type: text
    content: your house churches
  - type: text
    content: ' '
  - type: note
    content: Implied both in the text and by the cultural context of the day.
  - type: text
    content: 'gather as one church family, you are not really properly celebrating the Lord’s Supper. '
  - type: note
    content: Paul is implying that it is the Lord’s Supper, not merely a meal for favored ones. Jesus is hosting the meal for the benefit of all every time we gather for communion.
  '21':
  - type: text
    content: 'For when it comes time to eat, some gobble down their food before anything is given to others—one is left hungry while others become drunk! '
  - type: note
    content: Apparently, the church of Corinth was divided between the “haves” and the “have nots.” Those who were wealthy would feast and become drunk, while those who had very little went hungry. The precious unity of the church was spoiled by this behavior. These shared meals were called “love feasts” (Judah [Jude] 12).
  '22':
  - type: text
    content: Don’t you all have homes where you can eat and drink? Don’t you realize that you’re showing a superior attitude by humiliating those who have nothing? Are you trying to show contempt for God’s beloved church? How should I address this appropriately? If you’re looking for my approval, you won’t find it!
  '23':
  - type: text
    content: 'I have handed down to you what came to me by direct revelation from the Lord himself. The same night in which he was handed over, '
  - type: note
    content: Or “betrayed.” Paul is using a play on words in the Greek text. He “handed down” to us the instructions for the Lord’s Table, but the Lord was “handed over” to his accusers.
  - type: text
    content: 'he took bread '
  '24':
  - type: text
    content: 'and gave thanks. Then he distributed it to the disciples and said, '
  - type: text
    content: “Take it and eat your fill.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, which means “Eat and be satisfied.”
  - type: text
    content: It is my body, which is given for you. Do this to remember me.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'He did the same with the cup '
  - type: text
    content: of wine
  - type: text
    content: ' after supper and said, '
  - type: text
    content: “This cup seals the new covenant with my blood. Drink it—and whenever you drink this, do it to remember me.”
  '26':
  - type: text
    content: 'Whenever you eat this bread and drink this cup, you are retelling the story, proclaiming our Lord’s death until he comes. '
  '27':
  - type: text
    content: 'For this reason, whoever eats the bread or drinks the cup of the Lord in the wrong spirit will be guilty of dishonoring the body and blood of the Lord. '
  '28':
  - type: text
    content: 'So let each individual first evaluate his own attitude and only then eat the bread and drink the cup. '
  '29':
  - type: text
    content: 'For continually eating and drinking with a wrong spirit '
  - type: note
    content: Or “unworthily” or “irreverently.”
  - type: text
    content: 'will bring judgment upon yourself by not recognizing the body. '
  - type: note
    content: Some manuscripts have “the Lord’s body.” This can be understood in at least two ways. It may refer to not recognizing the bread as Christ’s body given in sacrifice, or not recognizing Christ’s body on earth, the church. To properly discern the Lord’s body, which was beaten and bruised for our healing, would mean we would not be weak or sick or die prematurely.
  '3':
  - type: text
    content: 'But I want you to understand that Christ is the head '
  - type: note
    content: Or “source.” Although the Greek word kephale, found three times in this verse, can be “head,” it is used figuratively. It is not used in Greek literature or Scripture as “head over,” “chief,” or “ruler.” To say that Christ is the head of every man means that he is the source of our life and faith as the head of the body of Christ. Christ is the “head” as in the head of a river. See also vv. 8–9, which support this. The source of the woman is man, for Eve was taken from Adam. The source of the Messiah is God, for he provided a virgin birth for Christ and formed his body and fulfilled the prophecies God spoke about him. Another possible translation of v. 3 is “Christ has responsibility over all men, as the husband has responsibility for his wife, and God the Father has responsibility over Christ.”
  - type: text
    content: 'of every person, and Adam was the head of Eve, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: and God is the head of the Messiah.
  '30':
  - type: text
    content: 'This insensitivity is why many of you are weak, chronically ill, and some even dying. '
  - type: note
    content: Or “asleep,” a metaphor for death.
  '31':
  - type: text
    content: 'If we have examined ourselves, we should not be judged. '
  '32':
  - type: text
    content: But when we are judged, it is the Lord’s training so that we will not be condemned along with the world.
  '33':
  - type: text
    content: 'So then, my fellow believers, when you assemble as one to share a meal, show respect for one another and wait for all to be served. '
  - type: note
    content: The Aramaic can be translated “strengthen [encourage] one another.”
  '34':
  - type: text
    content: If you are that hungry, eat at home first, so that when you gather together you will not bring judgment upon yourself.
  - type: text
    content: 'When I come to you, I will answer the other questions you asked me '
  - type: text
    content: in your letter
  - type: text
    content: .
  '4':
  - type: text
    content: 'Any man '
  - type: text
    content: who leads public worship
  - type: text
    content: ', '
  - type: note
    content: Implied in both the Aramaic and the Greek, as also in v. 5. This section (vv. 3–16) is not focused on marriage or the role of women in the church, but on proper attitudes of reverence and conduct in public worship. Paul’s discussion here would have made obvious sense within the cultural standards of the Corinthians. It is a continuation of Paul’s teaching that if our conduct offends and divides the church, we are to change our ways in order to promote unity among the believers. See 1 Cor. 10:27–33.
  - type: text
    content: 'and prays or prophesies with a shawl hanging down over his head, shows disrespect to his head, '
  - type: text
    content: which is Christ
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'And if any woman '
  - type: text
    content: in a place of leadership
  - type: text
    content: ' within the church prays or prophesies '
  - type: text
    content: in public
  - type: text
    content: ' with her long hair disheveled, '
  - type: note
    content: Or “unbound,” as translated from the Aramaic. The Greek is “with her head uncovered.” The Greek word akatakalyptos is commonly translated as “unveiled” or “uncovered.” However, the Greek Septuagint of Lev. 13:45 uses the word akatakalyptos in saying that a person who has “leprosy” signals to the world his disease by staying dirty and keeping his hair “disheveled.” Notice also that Paul affirms the right of women to pray and prophesy in public worship services.
  - type: text
    content: 'she shows disrespect to her head, '
  - type: text
    content: which is her husband
  - type: text
    content: ', for this would be the same as having her head shaved. '
  '6':
  - type: text
    content: 'If a woman who wants to be in leadership will not conform to the customs of what is proper for women, '
  - type: note
    content: Or “So, if a women will not wear a head covering, . . .”
  - type: text
    content: 'she might as well cut off her hair. But if it’s disgraceful for her to have her hair cut off '
  - type: note
    content: That is, “having her hair cut off [like a prostitute],” which was the common practice in Corinth. For the public worship of that era, a woman would have her long hair braided and covered up so she would not be mistaken as a cult priestess of Isis or Dionysus.
  - type: text
    content: or her head shaved, let her cover her head.
  '7':
  - type: text
    content: 'A man '
  - type: text
    content: in leadership
  - type: text
    content: ' is under no obligation to have his head covered '
  - type: text
    content: in the public gatherings
  - type: text
    content: ', because he is the portrait of God and reflects his glory. The woman, on the other hand, reflects the glory of her husband, '
  '8':
  - type: text
    content: 'for man was not created from woman but woman from man. '
  - type: note
    content: See Gen. 2:21–23; 1 Tim. 2:13.
  '9':
  - type: text
    content: 'By the same token, the man was not created because the woman needed him; the woman was created because the man needed her. '
  - type: note
    content: See Gen. 2:18. In Christ, there is no fundamental difference between man and woman, as both were created by God with different roles and personalities. Although the first woman, Eve, came from Adam, every other man came from a woman (mother). To use Gen. 2:18 to say that women are inferior to men is equal to saying that all men are inferior to their mothers.
