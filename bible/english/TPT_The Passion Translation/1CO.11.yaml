        text: Implied both in the text and by the cultural context of the day.
    marker-yv: yv-n
  - type: text
    text: 'gather as one church family, you are not really properly celebrating the Lord’s Supper. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is implying that it is the Lord’s Supper, not merely a meal for favored ones. Jesus is hosting the meal for the benefit of all every time we gather for communion.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For when it comes time to eat, some gobble down their food before anything is given to others—one is left hungry while others become drunk! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently, the church of Corinth was divided between the “haves” and the “have nots.” Those who were wealthy would feast and become drunk, while those who had very little went hungry. The precious unity of the church was spoiled by this behavior. These shared meals were called “love feasts” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judah [Jude] 12
      metadata:
        usfm: JUD.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t you all have homes where you can eat and drink? Don’t you realize that you’re showing a superior attitude by humiliating those who have nothing? Are you trying to show contempt for God’s beloved church? How should I address this appropriately? If you’re looking for my approval, you won’t find it!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I have handed down to you what came to me by direct revelation from the Lord himself. The same night in which he was handed over, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “betrayed.” Paul is using a play on words in the Greek text. He “handed down” to us the instructions for the Lord’s Table, but the Lord was “handed over” to his accusers.
    marker-yv: yv-n
  - type: text
    text: 'he took bread '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'and gave thanks. Then he distributed it to the disciples and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take it and eat your fill.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic, which means “Eat and be satisfied.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It is my body, which is given for you. Do this to remember me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He did the same with the cup '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of wine
  - type: text
    text: ' after supper and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This cup seals the new covenant with my blood. Drink it—and whenever you drink this, do it to remember me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Whenever you eat this bread and drink this cup, you are retelling the story, proclaiming our Lord’s death until he comes. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For this reason, whoever eats the bread or drinks the cup of the Lord in the wrong spirit will be guilty of dishonoring the body and blood of the Lord. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So let each individual first evaluate his own attitude and only then eat the bread and drink the cup. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'For continually eating and drinking with a wrong spirit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “unworthily” or “irreverently.”
    marker-yv: yv-n
  - type: text
    text: 'will bring judgment upon yourself by not recognizing the body. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts have “the Lord’s body.” This can be understood in at least two ways. It may refer to not recognizing the bread as Christ’s body given in sacrifice, or not recognizing Christ’s body on earth, the church. To properly discern the Lord’s body, which was beaten and bruised for our healing, would mean we would not be weak or sick or die prematurely.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'This insensitivity is why many of you are weak, chronically ill, and some even dying. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “asleep,” a metaphor for death.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'If we have examined ourselves, we should not be judged. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: But when we are judged, it is the Lord’s training so that we will not be condemned along with the world.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'So then, my fellow believers, when you assemble as one to share a meal, show respect for one another and wait for all to be served. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “strengthen [encourage] one another.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: If you are that hungry, eat at home first, so that when you gather together you will not bring judgment upon yourself.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When I come to you, I will answer the other questions you asked me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in your letter
  - type: text
