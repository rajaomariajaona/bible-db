        - type: text
          text: Jacob’s well was “a spring-fed well.” This well becomes a picture of the “spring” of the Jacob-life inside of every one of us. Fed by Adam’s fall, this spring has flowed through all of humanity. But Jesus sat as a “lid” to Jacob’s well, sealing its polluted stream. In Christ, Jacob’s clever striving has ended. A living well became a lid to Jacob’s well as Jesus sat there ready to give his living water to all who would come and drink. A well sat upon a well.
