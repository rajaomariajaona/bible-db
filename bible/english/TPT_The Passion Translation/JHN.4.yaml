        children:
        - type: text
          text: Although unnamed in the biblical account, church tradition identifies the Samaritan woman to be Photini. An internet search of her name will yield many interesting stories about her post-conversion ministry, including her being named as an “apostle” of Jesus and her eventual martyrdom. Regardless of the validity of the extrabiblical references, history records her as the first New Testament evangelist to win a city to Christ. God is faithful to use anyone to reach others when we are honest to tell others that Jesus knows everything we’ve ever done and still loves us.
      marker-yv: yv-n
