      - type: usfm
        marker: ft
        children:
        - type: text
          text: Since the Jews despised the Samaritans, they often traveled east of the Jordan River to avoid Samaria while traveling between Judaea and Galilee. The Jews wanted nothing to do with the Samaritans because they had mixed Jewish and gentile blood and centered their worship at Mount Gerizim instead of Jerusalem. The Lord Jesus needed to pass through Samaria because there were needy souls who needed a Savior.
      marker-yv: yv-n
