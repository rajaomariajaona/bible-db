    - type: text
      text: ': A definitive date is not possible here. The likely period of Malachi’s ministry and the recording of his prophecy lies between the building of the Second Temple and the period of the Ezra-Nehemiah reforms—that is, between 515 BC and 430 BC. Given the similarity between Malachi’s concerns and those of Nehemiah, the latter end of the range is the more likely date.'
