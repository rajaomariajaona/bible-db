    - type: text
      text: ' confidently affirm is that the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' came to its first climactic fulfillment in the earthly ministry of Jesus the Messiah. The final words of Malachi’s prophecy (4:1–6) anticipated this fulfillment when God announced via his prophet that he would send “the prophet Elijah” to prepare the way for his coming. The second, and absolute, fulfillment of this day is still to come: the consummation of divine judgment in the manifestation of the new heavens and the new earth at the end of time, when Jesus returns. Meanwhile, the whole idea is that we live our lives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: today
    - type: text
      text: ', trusting that God’s justice will be done and that he will keep his promises to his faithful followers. In Malachi’s time, this trust was eroding, and the survival of what was left of Israel was hanging in the balance because of it.'
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Seeing Jesus in the Book.
    - type: text
      text: ' The key to understanding where the prophetic anticipation of the coming of Jesus the Messiah lies in the book of Malachi is in the motif of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. This has already been mentioned in the preceding discussion of that theme. The complexity of this motif has also been noted. There is no doubt that the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' reached a climactic fulfillment in the death and resurrection of Jesus Christ. His death on the cross signaled the final doom of Satan and his followers, when sin and death were destroyed in principle. In addition, Jesus’ atoning sacrifice, along with his resurrection from the dead, accomplished the total forgiveness of sin and the eternal salvation of all those who put their faith and trust in him as their Savior and Lord. And there is still the consummate climax of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' to come, the ushering in of the eternal kingdom of heaven with God on the throne, the risen Lamb of God beside him, and all wrongs righted.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: All this is implicit not only in the final chapter of Malachi’s prophecy (4:1–6) but also in those passages that speak of the coming renewal and restoration of the people of God, after they have been purified and refined through God’s fiery judgment (see 1:11; 3:1–4, 10–12, 16–18).
