      text: '), and it always reflects a manifestation of divine judgment and blessing. It is a prophetic motif with many levels of fulfillment throughout the prophetic canon of Scripture. This warning announces bad news for the bad people, when the cosmic checkbook will be balanced and justice will be done. On the other hand, such a day is '
    - type: usfm
