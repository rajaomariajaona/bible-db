document_id: PSA.48
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Beautiful Zion
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A poetic song by the prophetic singers of Korah’s clan
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: There are so many reasons to describe God as wonderful!
- type: usfm
  marker: q1
  children:
  - type: text
    text: So many reasons to praise him with unlimited praise!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 48:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm was written to commemorate the defeat of the Assyrian army in the days of King Hezekiah.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Zion-City is his home; he lives on his holy mountain—
- type: usfm
  marker: q1
  children:
  - type: text
    text: high and glorious, joy-filled and favored.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zion-Mountain looms in the farthest reaches of the north,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 48:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the sides of the north,” a metaphor to describe God’s heavenly home. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 14:13
      metadata:
        usfm: ISA.14.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: the city of our incomparable King!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: This is his divine abode, an impenetrable citadel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he is known to dwell in the highest place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-6
  - type: text
    text: See how the mighty kings united to come against Zion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: yet when they saw God manifest in front of their eyes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they were stunned.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trembling, they all fled away, gripped with fear.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 48:4–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This no doubt refers to the night the angel of the Lord descended into the ranks of the Assyrians and killed 185,000 men. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 37:36
      metadata:
        usfm: ISA.37.36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seized with panic, they doubled up in frightful anguish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a woman in the labor pains of childbirth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Like a hurricane blowing and breaking the invading ships,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 48:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “ships of Tarshish.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: God blows upon them and breaks them to pieces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: We have heard about these wonders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and then we saw them with our own eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For this is the city of the Commander of Angel Armies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the city of our God, safe and secure forever!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lord, as we worship you in your temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: we recall over and over your kindness to us
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your unending love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The fame of your name echoes throughout the entire world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: accompanied with praises.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your right hand is full of victory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So let the people of Zion rejoice with gladness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'let the daughters of praise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 48:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the daughters of Judah.”
    marker-yv: yv-n
  - type: text
    text: leap for joy!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For God will see to it that you are judged fairly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: Circle Zion; count her towers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Consider her walls, climb her palaces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and then go and tell the coming generation
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the care and compassion of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Yes, this is our God, our great God forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will lead us onward until the end,
- type: usfm
  marker: q1
  children:
  - type: text
    text: through all time, beyond death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and into eternity!
