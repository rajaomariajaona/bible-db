document_id: PSA.48,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Beautiful Zion
  - type: text
    content: A poetic song by the prophetic singers of Korah’s clan
  - type: text
    content: There are so many reasons to describe God as wonderful!
  - type: text
    content: So many reasons to praise him with unlimited praise!
  - type: note
    content: This psalm was written to commemorate the defeat of the Assyrian army in the days of King Hezekiah.
  '10':
  - type: text
    content: The fame of your name echoes throughout the entire world,
  - type: text
    content: accompanied with praises.
  - type: text
    content: Your right hand is full of victory.
  '11':
  - type: text
    content: So let the people of Zion rejoice with gladness;
  - type: text
    content: 'let the daughters of praise '
  - type: note
    content: Or “the daughters of Judah.”
  - type: text
    content: leap for joy!
  - type: text
    content: For God will see to it that you are judged fairly.
  '12':
  - type: text
    content: Circle Zion; count her towers.
  - type: text
    content: Consider her walls, climb her palaces,
  - type: text
    content: and then go and tell the coming generation
  - type: text
    content: of the care and compassion of our God.
  '14':
  - type: text
    content: Yes, this is our God, our great God forever.
  - type: text
    content: He will lead us onward until the end,
  - type: text
    content: through all time, beyond death,
  - type: text
    content: and into eternity!
  '2':
  - type: text
    content: Zion-City is his home; he lives on his holy mountain—
  - type: text
    content: high and glorious, joy-filled and favored.
  - type: text
    content: Zion-Mountain looms in the farthest reaches of the north,
  - type: note
    content: Or “the sides of the north,” a metaphor to describe God’s heavenly home. See Isa. 14:13.
  - type: text
    content: the city of our incomparable King!
  '3':
  - type: text
    content: This is his divine abode, an impenetrable citadel,
  - type: text
    content: for he is known to dwell in the highest place.
  '4':
  - type: text
    content: See how the mighty kings united to come against Zion,
  - type: text
    content: yet when they saw God manifest in front of their eyes,
  - type: text
    content: they were stunned.
  - type: text
    content: Trembling, they all fled away, gripped with fear.
  - type: note
    content: This no doubt refers to the night the angel of the Lord descended into the ranks of the Assyrians and killed 185,000 men. See Isa. 37:36.
  - type: text
    content: Seized with panic, they doubled up in frightful anguish,
  - type: text
    content: like a woman in the labor pains of childbirth.
  '7':
  - type: text
    content: Like a hurricane blowing and breaking the invading ships,
  - type: note
    content: Or “ships of Tarshish.”
  - type: text
    content: God blows upon them and breaks them to pieces.
  '8':
  - type: text
    content: We have heard about these wonders,
  - type: text
    content: and then we saw them with our own eyes.
  - type: text
    content: For this is the city of the Commander of Angel Armies,
  - type: text
    content: the city of our God, safe and secure forever!
  - type: text
    content: Pause in his presence
  '9':
  - type: text
    content: Lord, as we worship you in your temple,
  - type: text
    content: we recall over and over your kindness to us
  - type: text
    content: and your unending love.
