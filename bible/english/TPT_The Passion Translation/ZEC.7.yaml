  - type: text
    text: ' speak these things to you through the prophets in the past? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Have you forgotten what he told you
  - type: text
    text: ' when Jerusalem and the surrounding towns were prosperous and secure and when the southland and western foothills were inhabited?’ ”'
