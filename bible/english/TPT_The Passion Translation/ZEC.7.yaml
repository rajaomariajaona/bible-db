  - type: text
    text: '“Ask all the priests and the people of the land: ‘For nearly seventy years, you have been fasting and mourning in the fifth and seventh months. Have you truly been doing this to honor me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'And when you ate and drank, were you not doing it for your own pleasure? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Did not '
  - type: usfm
    marker: nd
    children:
    - type: text
