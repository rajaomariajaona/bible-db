        text: . The Jews mourned its destruction each year afterward by observing a fast in the month of July (ninth of Av). Now with the rebuilding of the temple underway, fasting seemed unnecessary. So the delegation from Bethel put this question to the spiritual leaders in Jerusalem. The Lord did not supply their answer until
