  - type: text
    text: 'But they would not listen; they turned their backs on him, and they stopped up their ears rather than stopping to hear. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Their hearts became as hard as a rock. They refused to listen to the teaching of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies. And they would not hear the words he spoke by his Spirit through the earlier prophets. So '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, became very angry.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, says, “Even when I called for them, they would not listen. Therefore, I would not listen when they prayed to me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for help
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Like a whirlwind, I swept them away to live in distant lands as foreigners.” After they were scattered, the country was left so desolate that it became impassable. What once was a land of delights they turned into a desert of desolation.
