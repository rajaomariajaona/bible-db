document_id: ZEC.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Question about Fasting
  - type: text
    content: 'In the fourth year of Emperor Darius, on the seventh of December, '
  - type: note
    content: Or “on the fourth day of Kislev, the ninth month,” which in modern terms was December 7, 518 BC, almost two years after the eight visions of Zechariah in chapters 1–6.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke again to Zechariah. '
  '10':
  - type: text
    content: “Never oppress the widow and the fatherless, the foreigner and the poor.
  - type: text
    content: “And do not secretly plot to harm someone.”
  - type: note
    content: See Mic. 2:1.
  '11':
  - type: text
    content: 'But they would not listen; they turned their backs on him, and they stopped up their ears rather than stopping to hear. '
  '12':
  - type: text
    content: 'Their hearts became as hard as a rock. They refused to listen to the teaching of '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. And they would not hear the words he spoke by his Spirit through the earlier prophets. So '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, became very angry.'
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says, “Even when I called for them, they would not listen. Therefore, I would not listen when they prayed to me '
  - type: text
    content: for help
  - type: text
    content: '. '
  '14':
  - type: text
    content: Like a whirlwind, I swept them away to live in distant lands as foreigners.” After they were scattered, the country was left so desolate that it became impassable. What once was a land of delights they turned into a desert of desolation.
  '2':
  - type: text
    content: 'Now '
  - type: text
    content: the people of
  - type: text
    content: ' Bethel had sent Sharezer and Regem-Melech with a delegation '
  - type: text
    content: to Jerusalem
  - type: text
    content: ' to pray for the favor of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'So they went to the prophets and priests who were at the Temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and asked them: “For many years, each July '
  - type: note
    content: Or “the fifth month.” The Babylonians had destroyed Solomon’s Temple on the seventh day of the fifth month (June–July) in 586 BC. See 2 Kings 25:8. The Jews mourned its destruction each year afterward by observing a fast in the month of July (ninth of Av). Now with the rebuilding of the temple underway, fasting seemed unnecessary. So the delegation from Bethel put this question to the spiritual leaders in Jerusalem. The Lord did not supply their answer until Zech. 8:18–19.
  - type: text
    content: 'we have mourned and fasted. '
  - type: note
    content: The twin practices of mourning and fasting were very frequently combined throughout the era of the law in Israel. The Hebrew verb for “fasting” is nazar and means literally “to consecrate [oneself].” In this context, the means of such a consecration is by fasting.
  - type: text
    content: Should we continue to do this?”
  - type: heading
    content: Insincere Fasting Is Wrong
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke this message to me: '
  '5':
  - type: text
    content: '“Ask all the priests and the people of the land: ‘For nearly seventy years, you have been fasting and mourning in the fifth and seventh months. Have you truly been doing this to honor me? '
  '6':
  - type: text
    content: 'And when you ate and drank, were you not doing it for your own pleasure? '
  '7':
  - type: text
    content: 'Did not '
  - type: text
    content: Yahweh
  - type: text
    content: ' speak these things to you through the prophets in the past? '
  - type: text
    content: Have you forgotten what he told you
  - type: text
    content: ' when Jerusalem and the surrounding towns were prosperous and secure and when the southland and western foothills were inhabited?’ ”'
  - type: heading
    content: The Reasons for Their Exile
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke again to Zechariah, saying, '
  '9':
  - type: text
    content: '“Here is the message of '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies:'
  - type: text
    content: “Apply the law fairly.
  - type: note
    content: See Isa. 1:17; Jer. 21:12; 22:3; Amos 5:14–15, 24.
  - type: text
    content: '“Demonstrate tender love '
  - type: note
    content: Or “loyal [covenant] love.” The Hebrew word chesed is connected to a love based on covenant relationships. Since the Jews had a covenant relationship with God’s loyal love, they were expected to demonstrate this virtue in their attitudes toward each other.
  - type: text
    content: and compassion toward all.
