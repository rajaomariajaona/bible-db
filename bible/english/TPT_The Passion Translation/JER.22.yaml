document_id: JER.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh’s Message to King Zedekiah
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to Jeremiah: “Go to the palace of the king of Judah and give him my word. '
  '10':
  - type: text
    content: 'Do not weep for '
  - type: text
    content: King Josiah
  - type: text
    content: ', who died,'
  - type: text
    content: and do not mourn for him;
  - type: text
    content: 'rather, weep bitterly for '
  - type: text
    content: King Jehoahaz
  - type: text
    content: ','
  - type: text
    content: who is carried away as a captive,
  - type: text
    content: for he will never return to see the land of his birth.
  '11':
  - type: text
    content: 'For this is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has said concerning Shallum '
  - type: note
    content: Shallum was another name for King Jehoahaz; it was possibly his name before he ascended to the throne. Shallum means “retribution.” Shallum reigned for three months after the death of his father, Josiah (609 BC), then was taken by Pharaoh Neco to Egypt, where he died (see 2 Kings 23:31–34; 2 Chron. 36:2–4).
  - type: text
    content: 'son of King Josiah of Judah, who succeeded his father Josiah as king but was led away from here: “He will never return. '
  '12':
  - type: text
    content: He will die in the land of his exile, and he will never see his homeland again.”
  - type: heading
    content: Prophecy against King Jehoiakim
  '13':
  - type: text
    content: “Doomed is the one who builds his house with unrighteousness,
  - type: text
    content: 'and the upper chambers '
  - type: text
    content: of his palace
  - type: text
    content: ' with injustice,'
  - type: note
    content: The role of a king and every leader with authority is to promote righteousness and justice in society. King Jehoiakim did not follow that principle and used his authority to build his own palace at the expense of others.
  - type: text
    content: who compels his fellow man to work for nothing
  - type: text
    content: 'and pays him no wages '
  - type: text
    content: for his hard labor
  - type: text
    content: .
  '14':
  - type: text
    content: Doomed is the one
  - type: text
    content: ' who says,'
  - type: text
    content: ‘I’ll build a vast palace for myself
  - type: text
    content: with spacious upper chambers and large windows.
  - type: text
    content: I’ll panel it with cedar and paint it red.’
  '15':
  - type: text
    content: Does it make you a king just because you build
  - type: text
    content: a finer house of cedar than others?
  - type: text
    content: Your father lived a satisfying life,
  - type: note
    content: Or “Did not your father eat and drink?” This rhetorical question meant that his father, King Josiah, enjoyed the things of life.
  - type: text
    content: yet he dispensed justice and righteousness—
  - type: text
    content: and because of this, all went well with him.
  '16':
  - type: text
    content: He upheld the rights of the poor and needy—
  - type: text
    content: and look how well he did.
  - type: text
    content: Whoever lives this way shows that he knows me,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '17':
  - type: text
    content: “But your eyes and heart are only interested
  - type: text
    content: in what brings you unjust profit,
  - type: text
    content: in violently oppressing your people
  - type: text
    content: even if it means shedding innocent blood.”
  '18':
  - type: text
    content: 'Therefore, '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you, Jehoiakim son of Josiah, king of Judah:'
  - type: text
    content: “No one will cry at your funeral or say,
  - type: text
    content: ‘How terrible! How sad!’
  - type: text
    content: No one will weep for you or say,
  - type: text
    content: ‘How sad! Why did his majesty have to die?’
  - type: note
    content: Or “Ah, my brother! Ah, my sister! Ah, lord! Ah, his majesty.” This was likely a common refrain people used at funerals of that day to console one another.
  '19':
  - type: text
    content: He will have a donkey’s burial.
  - type: text
    content: He will be dragged outside the gates of Jerusalem
  - type: text
    content: and left on the ground to rot
  - type: text
    content: .”
  - type: heading
    content: Prophecy against Jerusalem
  '2':
  - type: text
    content: 'Say: ‘Listen to the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ', king of Judah, who occupies the throne of David, your officials, and people who enter these gates! '
  '20':
  - type: text
    content: '“Go up to the peaks of Lebanon, '
  - type: text
    content: you people of Jerusalem
  - type: text
    content: ', and cry out.'
  - type: text
    content: 'Raise your voice in '
  - type: text
    content: the heights of
  - type: text
    content: ' Bashan,'
  - type: text
    content: 'cry out from '
  - type: text
    content: the mountains of
  - type: text
    content: ' Moab,'
  - type: note
    content: Or “Abarim,” the mountainous region of Moab, of which Mount Nebo was the highest peak.
  - type: text
    content: 'for all your lovers, '
  - type: text
    content: the nations you trusted in
  - type: text
    content: ', are crushed.'
  '21':
  - type: text
    content: I warned you in your prosperous times,
  - type: text
    content: but you said, ‘I don’t want to hear it.’
  - type: text
    content: You have treated me like that ever since your youth,
  - type: text
    content: refusing to listen to me.
  '22':
  - type: text
    content: Now you will be disgraced and humiliated
  - type: text
    content: because of all your evil.
  - type: text
    content: Your leaders will be swept away
  - type: text
    content: like dust in the wind,
  - type: note
    content: Or “The wind will shepherd your shepherds [leaders].”
  - type: text
    content: 'and your lovers, '
  - type: text
    content: the nations you trusted in
  - type: text
    content: ','
  - type: text
    content: will be captured and dragged into captivity.
  '23':
  - type: text
    content: 'You, O  '
  - type: text
    content: king
  - type: text
    content: ', '
  - type: note
    content: That is, King Jehoiakim of Judah (vv. 13–19).
  - type: text
    content: although you feel safely nested there
  - type: text
    content: 'in your palace of cedar '
  - type: text
    content: pillars
  - type: text
    content: ' from Lebanon,'
  - type: text
    content: you will be in pain and will groan like a woman giving birth!”
  - type: heading
    content: Prophecy against King Jehoiachin
  '24':
  - type: text
    content: Yahweh
  - type: text
    content: ' declares, “As surely as I am the living God, listen, O King Jehoiachin '
  - type: note
    content: King Jehoiachin became king of Judah in December 598 BC. His rule only lasted three months, after which he was deported to Babylon and held as a royal hostage (see 37:1).
  - type: text
    content: 'son of Jehoiakim, king of Judah. Even if you were the royal signet ring I wear on my right hand, '
  - type: note
    content: Both the signet ring (see Hag. 2:23) and the right hand were symbols of power and authority.
  - type: text
    content: 'I would still pull you from my finger. '
  '25':
  - type: text
    content: 'I will hand you over to the power of those who seek your life, into the hands of those you dread—King Nebuchadnezzar of Babylon and the Babylonians. '
  - type: note
    content: Or “Chaldeans.”
  '26':
  - type: text
    content: 'I will hurl you and the mother who bore you into a foreign land, where neither of you were born and where both of you will die. '
  '27':
  - type: text
    content: Your people will be in exile
  - type: text
    content: ' and will not return to the land to which they yearn to come back.'
  - type: note
    content: Or “they lift up their souls to come back to.”
  '28':
  - type: text
    content: '“Is this man Coniah '
  - type: note
    content: Coniah and Jeconiah are variant forms of Jehoiachin.
  - type: text
    content: now thrown away
  - type: text
    content: like a worthless, broken pot that no one wants?
  - type: text
    content: Why are he and his offspring hurled out
  - type: text
    content: and taken away to a land they knew not?
  '29':
  - type: text
    content: 'Land '
  - type: text
    content: of Judah
  - type: text
    content: '! My land! My land!'
  - type: note
    content: The three-fold repetition of “land” indicates that God is emphatically calling the land itself to bear witness to what he decrees.
  - type: text
    content: 'Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Be concerned for justice and righteousness. Rescue the one who is robbed from his oppressor. Do not exploit or mistreat the stranger, the fatherless, and the widow. Stop the violence and do not shed the blood of the innocent in this place. '
  '30':
  - type: text
    content: Yahweh
  - type: text
    content: ' decrees:'
  - type: text
    content: “List this man as ‘Childless,’
  - type: text
    content: one who will never succeed in his lifetime,
  - type: text
    content: for none of his offspring will be accepted
  - type: text
    content: to sit on the throne of David and rule in Judah again.”
  '4':
  - type: text
    content: 'For if you fulfill this command, then there will be kings of David’s lineage to pass through the city’s gates. The kings and their officials will be riding in chariots or riding horses and will be accompanied by the people. '
  '5':
  - type: text
    content: 'But I swear by myself '
  - type: text
    content: as a witness
  - type: text
    content: ', if you do not obey these commands, then this palace shall become a ruin, declares '
  - type: text
    content: Yahweh
  - type: text
    content: '!’ ”'
  '6':
  - type: text
    content: 'Yes, listen to what '
  - type: text
    content: Yahweh
  - type: text
    content: ' thinks about Judah’s royal palace:'
  - type: text
    content: '“You are as '
  - type: text
    content: glorious as
  - type: text
    content: ' Gilead to me,'
  - type: text
    content: 'as '
  - type: text
    content: beautiful as
  - type: text
    content: ' the summit of Lebanon;'
  - type: text
    content: 'but I swear that I will make you '
  - type: text
    content: as empty
  - type: text
    content: ' as a desert—'
  - type: text
    content: like a ghost town.
  '7':
  - type: text
    content: 'I will appoint '
  - type: note
    content: Or “sanctify.”
  - type: text
    content: a wrecking crew to destroy you,
  - type: text
    content: each member with his weapons and tools.
  - type: text
    content: 'They will cut down your '
  - type: text
    content: pillars of
  - type: text
    content: ' choice cedar'
  - type: text
    content: and set them on fire.
  '8':
  - type: text
    content: '“When many foreigners pass by this city and each one asks another, ‘Why did '
  - type: text
    content: Yahweh
  - type: text
    content: ' do this to such a great city?’ '
  '9':
  - type: text
    content: 'the reply will be, ‘Because they forsook the covenant with '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God and worshiped and served other gods.’ ”'
  - type: heading
    content: Prophecy against King Jehoahaz
