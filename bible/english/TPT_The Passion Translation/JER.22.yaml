document_id: JER.22,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Message to King Zedekiah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke these words to Jeremiah: “Go to the palace of the king of Judah and give him my word. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Do not weep for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: King Josiah
    - type: text
      text: ', who died,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and do not mourn for him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'rather, weep bitterly for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: King Jehoahaz
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who is carried away as a captive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he will never return to see the land of his birth.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For this is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has said concerning Shallum '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shallum was another name for King Jehoahaz; it was possibly his name before he ascended to the throne.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shallum
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “retribution.” Shallum reigned for three months after the death of his father, Josiah (609 BC), then was taken by Pharaoh Neco to Egypt, where he died (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 23:31–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 36:2–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'son of King Josiah of Judah, who succeeded his father Josiah as king but was led away from here: “He will never return. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will die in the land of his exile, and he will never see his homeland again.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against King Jehoiakim
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Doomed is the one who builds his house with unrighteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and the upper chambers '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of his palace
    - type: text
      text: ' with injustice,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The role of a king and every leader with authority is to promote righteousness and justice in society. King Jehoiakim did not follow that principle and used his authority to build his own palace at the expense of others.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who compels his fellow man to work for nothing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and pays him no wages '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for his hard labor
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Doomed is the one
    - type: text
      text: ' who says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I’ll build a vast palace for myself
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with spacious upper chambers and large windows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll panel it with cedar and paint it red.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does it make you a king just because you build
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a finer house of cedar than others?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your father lived a satisfying life,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Did not your father eat and drink?” This rhetorical question meant that his father, King Josiah, enjoyed the things of life.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet he dispensed justice and righteousness—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and because of this, all went well with him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He upheld the rights of the poor and needy—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and look how well he did.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever lives this way shows that he knows me,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “But your eyes and heart are only interested
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in what brings you unjust profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in violently oppressing your people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even if it means shedding innocent blood.”
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you, Jehoiakim son of Josiah, king of Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “No one will cry at your funeral or say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘How terrible! How sad!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one will weep for you or say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘How sad! Why did his majesty have to die?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Ah, my brother! Ah, my sister! Ah, lord! Ah, his majesty.” This was likely a common refrain people used at funerals of that day to console one another.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will have a donkey’s burial.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be dragged outside the gates of Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and left on the ground to rot
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Jerusalem
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Say: ‘Listen to the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', king of Judah, who occupies the throne of David, your officials, and people who enter these gates! '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Go up to the peaks of Lebanon, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you people of Jerusalem
    - type: text
      text: ', and cry out.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Raise your voice in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the heights of
    - type: text
      text: ' Bashan,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'cry out from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the mountains of
    - type: text
      text: ' Moab,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Abarim,” the mountainous region of Moab, of which Mount Nebo was the highest peak.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for all your lovers, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the nations you trusted in
    - type: text
      text: ', are crushed.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I warned you in your prosperous times,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you said, ‘I don’t want to hear it.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have treated me like that ever since your youth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: refusing to listen to me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now you will be disgraced and humiliated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of all your evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your leaders will be swept away
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like dust in the wind,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The wind will shepherd your shepherds [leaders].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and your lovers, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the nations you trusted in
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be captured and dragged into captivity.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You, O  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: king
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, King Jehoiakim of Judah (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 13–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: although you feel safely nested there
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'in your palace of cedar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pillars
    - type: text
      text: ' from Lebanon,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be in pain and will groan like a woman giving birth!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against King Jehoiachin
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares, “As surely as I am the living God, listen, O King Jehoiachin '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: King Jehoiachin became king of Judah in December 598 BC. His rule only lasted three months, after which he was deported to Babylon and held as a royal hostage (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 37:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'son of Jehoiakim, king of Judah. Even if you were the royal signet ring I wear on my right hand, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both the signet ring (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hag. 2:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and the right hand were symbols of power and authority.
      marker-yv: yv-n
    - type: text
      text: 'I would still pull you from my finger. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will hand you over to the power of those who seek your life, into the hands of those you dread—King Nebuchadnezzar of Babylon and the Babylonians. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Chaldeans.”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will hurl you and the mother who bore you into a foreign land, where neither of you were born and where both of you will die. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Your people will be in exile
    - type: text
      text: ' and will not return to the land to which they yearn to come back.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “they lift up their souls to come back to.”
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Is this man Coniah '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Coniah and Jeconiah are variant forms of Jehoiachin.
      marker-yv: yv-n
    - type: text
      text: now thrown away
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a worthless, broken pot that no one wants?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why are he and his offspring hurled out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and taken away to a land they knew not?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Judah
    - type: text
      text: '! My land! My land!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The three-fold repetition of “land” indicates that God is emphatically calling the land itself to bear witness to what he decrees.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: Be concerned for justice and righteousness. Rescue the one who is robbed from his oppressor. Do not exploit or mistreat the stranger, the fatherless, and the widow. Stop the violence and do not shed the blood of the innocent in this place. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' decrees:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “List this man as ‘Childless,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: one who will never succeed in his lifetime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for none of his offspring will be accepted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to sit on the throne of David and rule in Judah again.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if you fulfill this command, then there will be kings of David’s lineage to pass through the city’s gates. The kings and their officials will be riding in chariots or riding horses and will be accompanied by the people. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I swear by myself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a witness
    - type: text
      text: ', if you do not obey these commands, then this palace shall become a ruin, declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!’ ”'
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Yes, listen to what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' thinks about Judah’s royal palace:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“You are as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glorious as
    - type: text
      text: ' Gilead to me,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'as '
    - type: usfm
      marker: it
      children:
      - type: text
        text: beautiful as
    - type: text
      text: ' the summit of Lebanon;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but I swear that I will make you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as empty
    - type: text
      text: ' as a desert—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a ghost town.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will appoint '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sanctify.”
