document_id: PSA.122,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway by King David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David wrote this song for the people to sing for the feasts. It was sung when the worshipers entered the gates of Jerusalem.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I was overjoyed when they said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let’s go up to the house of the Lord.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: And now at last we stand here, inside the very gates of Jerusalem!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: O Jerusalem, you were built as a city of praise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where God and man mingle together.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 122:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase “a city bound together” is taken from a root word that means “joined, united, coupled.” By inference in the context, it is the city where God dwells and man worships.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'This is where all the tribes of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' are required'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to come and worship him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: This is where the thrones of kings have been established
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to rule in righteousness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even King David ruled from here.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Pray '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and seek
    - type: text
      text: ' for Jerusalem’s peace,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for all who love her will prosper!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: O Jerusalem, may there be peace for those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who dwell inside your walls
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and prosperity in your every palace.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I intercede for the sake of my family and friends
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who dwell there, that they may all live in peace.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For the sake of your house, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will seek the welfare and prosperity of Jerusalem.
