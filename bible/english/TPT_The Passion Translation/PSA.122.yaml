document_id: PSA.122,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem
  - type: text
    content: A song of the stairway by King David
  - type: note
    content: David wrote this song for the people to sing for the feasts. It was sung when the worshipers entered the gates of Jerusalem.
  - type: text
    content: I was overjoyed when they said,
  - type: text
    content: “Let’s go up to the house of the Lord.”
  '2':
  - type: text
    content: And now at last we stand here, inside the very gates of Jerusalem!
  '3':
  - type: text
    content: O Jerusalem, you were built as a city of praise,
  - type: text
    content: where God and man mingle together.
  - type: note
    content: The Hebrew phrase “a city bound together” is taken from a root word that means “joined, united, coupled.” By inference in the context, it is the city where God dwells and man worships.
  '4':
  - type: text
    content: 'This is where all the tribes of '
  - type: text
    content: Yahweh
  - type: text
    content: ' are required'
  - type: text
    content: to come and worship him.
  '5':
  - type: text
    content: This is where the thrones of kings have been established
  - type: text
    content: to rule in righteousness;
  - type: text
    content: even King David ruled from here.
  '6':
  - type: text
    content: 'Pray '
  - type: text
    content: and seek
  - type: text
    content: ' for Jerusalem’s peace,'
  - type: text
    content: for all who love her will prosper!
  '7':
  - type: text
    content: O Jerusalem, may there be peace for those
  - type: text
    content: who dwell inside your walls
  - type: text
    content: and prosperity in your every palace.
  '8':
  - type: text
    content: I intercede for the sake of my family and friends
  - type: text
    content: who dwell there, that they may all live in peace.
  '9':
  - type: text
    content: 'For the sake of your house, '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God,'
  - type: text
    content: I will seek the welfare and prosperity of Jerusalem.
