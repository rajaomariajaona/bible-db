document_id: PSA.131
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: My Heart Is Meek
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of the stairway by King David
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, my heart is meek before you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I don’t consider myself better than others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m content to not pursue matters that are over my head—
- type: usfm
  marker: q1
  children:
  - type: text
    text: such as your complex mysteries and wonders—
- type: usfm
  marker: q1
  children:
  - type: text
    text: that I’m not yet ready to understand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I am humbled and quieted in your presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a contented child who rests on its mother’s lap,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 131:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Like a contented child” is literally “Like a weaned child.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m your resting child and my soul is content in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'O people of God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 131:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “O Israel.”
    marker-yv: yv-n
  - type: text
    text: your time has come to quietly trust,
- type: usfm
  marker: q1
  children:
  - type: text
    text: waiting upon the Lord now and forever.
