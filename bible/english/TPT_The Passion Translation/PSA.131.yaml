document_id: PSA.131,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: My Heart Is Meek
  - type: text
    content: A song of the stairway by King David
  - type: text
    content: Lord, my heart is meek before you.
  - type: text
    content: I don’t consider myself better than others.
  - type: text
    content: I’m content to not pursue matters that are over my head—
  - type: text
    content: such as your complex mysteries and wonders—
  - type: text
    content: that I’m not yet ready to understand.
  '2':
  - type: text
    content: I am humbled and quieted in your presence.
  - type: text
    content: Like a contented child who rests on its mother’s lap,
  - type: note
    content: “Like a contented child” is literally “Like a weaned child.”
  - type: text
    content: I’m your resting child and my soul is content in you.
  '3':
  - type: text
    content: 'O people of God, '
  - type: note
    content: Or “O Israel.”
  - type: text
    content: your time has come to quietly trust,
  - type: text
    content: waiting upon the Lord now and forever.
