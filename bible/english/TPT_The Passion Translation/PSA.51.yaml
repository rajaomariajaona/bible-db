document_id: PSA.51,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Pardon and Purity
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer of confession when the prophet Nathan exposed King David’s adultery with Bathsheba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is based on the incident that is recorded in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This is a psalm of confession that has been sung for ages. Imagine composing a song about your failure and making it public for all time. David was not so much concerned about what the people thought but about what God thought. He wanted to be clean before God.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Confession
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, give me mercy from your fountain of forgiveness!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know your abundant love is enough to wash away my guilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because your compassion is so great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: take away this shameful guilt of sin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forgive the full extent of my rebellious ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and erase this deep stain on my conscience.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wash me.” David used the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kabas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which was used for washing clothes, not for bathing. David was asking for his royal robes to be cleansed from the stains of his actions and publicly restored.'
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep creating in me a clean heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used for “create” takes us back to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and it means to create from nothing. David knew he had no goodness without God placing it within him. David wanted a new creation heart, not just the old one changed.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fill me with pure thoughts and holy desires, ready to please you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Renew a reliable spirit in my inner being.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you never reject me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you never take from me your sacred Spirit!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Consecration
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my passion for life be restored,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tasting joy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word for “joy” comes from two Hebrew roots: one means “bright” and the other means “lily [whiteness].” David wanted to taste a joy that was bright, pure, and as beautiful as a lily.'
      marker-yv: yv-n
    - type: text
      text: in every breakthrough you bring to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hold me close to you with a willing spirit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that obeys whatever you say.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I can show other guilty ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how loving and merciful you are.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will find their way back home to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: knowing that you will forgive them.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, my saving God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deliver me fully from every sin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even the sin that brought bloodguilt.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or simply “blood.” David could have been asking God to spare his life from death (that is, deliverance from death because of his sin).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then my heart will once again be thrilled to sing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the passionate songs of joy and deliverance!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord God, unlock my heart, unlock my lips,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will overcome with my joyous praise!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the source of your pleasure is not in my performance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or the sacrifices I might offer to you.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fountain of your pleasure is found
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the sacrifice of my shattered heart before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will not despise my tenderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I bow down humbly at your feet.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because you favor Zion, do what is good for her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be the protecting wall around Jerusalem.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And when we are fully restored,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will rejoice and take delight
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in every offering of our lives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as we bring our sacrifices of righteousness before you in love!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “then they will offer up bulls on your altar.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I’m so ashamed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I feel such pain and anguish within me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can’t get away from the sting of my sin against you, Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything I did, I did right in front of you, for you saw it all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Against you, and you above all, have I sinned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything you say to me is infallibly true
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your judgment conquers me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, I have been a sinner from birth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the moment my mother conceived me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know that you delight to set your truth deep in my spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bat-ţuchâh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', although difficult to translate, can mean “something that is covered over, hidden, or concealed.” This could be paraphrased as “you desire light in my darkness” or “you want truth to expose my secrets.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So come into the hidden places of my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and teach me wisdom.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Cleansing
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Purify my conscience! Make this leper clean again!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text contains the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hyssop
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This was a bushy plant used for sprinkling blood on a healed leper to ceremonially cleanse him for the worship of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 14:3–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wash me in your love until I am pure in heart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Wash me with the snow from above so I can be whitened.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satisfy me in your sweetness, and my song of joy will return.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The places you have crushed within me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will rejoice in your healing touch.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this beautiful verse, the broken places (“places you have crushed”) are literally “broken bones.” Our bones speak allegorically of our inner being, our emotional strength.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hide my sins from your face;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David was ashamed not just of what others would think but also that he had been seen by God. A truly remorseful person has no thought for reputation but only for righteousness.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: erase all my guilt by your saving grace.
