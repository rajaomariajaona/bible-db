document_id: PSA.51,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Pardon and Purity
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A prayer of confession when the prophet Nathan exposed King David’s adultery with Bathsheba
  - type: note
    content: This psalm is based on the incident that is recorded in 2 Sam. 12–13. This is a psalm of confession that has been sung for ages. Imagine composing a song about your failure and making it public for all time. David was not so much concerned about what the people thought but about what God thought. He wanted to be clean before God.
  - type: heading
    content: David’s Confession
  - type: text
    content: God, give me mercy from your fountain of forgiveness!
  - type: text
    content: I know your abundant love is enough to wash away my guilt.
  - type: text
    content: Because your compassion is so great,
  - type: text
    content: take away this shameful guilt of sin.
  - type: text
    content: Forgive the full extent of my rebellious ways,
  - type: text
    content: and erase this deep stain on my conscience.
  - type: note
    content: Or “wash me.” David used the Hebrew word kabas, which was used for washing clothes, not for bathing. David was asking for his royal robes to be cleansed from the stains of his actions and publicly restored.
  '10':
  - type: text
    content: Keep creating in me a clean heart.
  - type: note
    content: The word used for “create” takes us back to Gen. 1, and it means to create from nothing. David knew he had no goodness without God placing it within him. David wanted a new creation heart, not just the old one changed.
  - type: text
    content: Fill me with pure thoughts and holy desires, ready to please you.
  - type: note
    content: Or “Renew a reliable spirit in my inner being.”
  '11':
  - type: text
    content: May you never reject me!
  - type: text
    content: May you never take from me your sacred Spirit!
  - type: heading
    content: David’s Consecration
  '12':
  - type: text
    content: Let my passion for life be restored,
  - type: text
    content: 'tasting joy '
  - type: note
    content: 'The Hebrew word for “joy” comes from two Hebrew roots: one means “bright” and the other means “lily [whiteness].” David wanted to taste a joy that was bright, pure, and as beautiful as a lily.'
  - type: text
    content: in every breakthrough you bring to me.
  - type: text
    content: Hold me close to you with a willing spirit
  - type: text
    content: that obeys whatever you say.
  '13':
  - type: text
    content: Then I can show other guilty ones
  - type: text
    content: how loving and merciful you are.
  - type: text
    content: They will find their way back home to you,
  - type: text
    content: knowing that you will forgive them.
  '14':
  - type: text
    content: O God, my saving God,
  - type: text
    content: deliver me fully from every sin,
  - type: text
    content: even the sin that brought bloodguilt.
  - type: note
    content: Or simply “blood.” David could have been asking God to spare his life from death (that is, deliverance from death because of his sin).
  - type: text
    content: Then my heart will once again be thrilled to sing
  - type: text
    content: the passionate songs of joy and deliverance!
  '15':
  - type: text
    content: Lord God, unlock my heart, unlock my lips,
  - type: text
    content: and I will overcome with my joyous praise!
  '16':
  - type: text
    content: For the source of your pleasure is not in my performance
  - type: text
    content: or the sacrifices I might offer to you.
  '17':
  - type: text
    content: The fountain of your pleasure is found
  - type: text
    content: in the sacrifice of my shattered heart before you.
  - type: text
    content: You will not despise my tenderness
  - type: text
    content: as I bow down humbly at your feet.
  '18':
  - type: text
    content: Because you favor Zion, do what is good for her.
  - type: text
    content: Be the protecting wall around Jerusalem.
  '19':
  - type: text
    content: And when we are fully restored,
  - type: text
    content: you will rejoice and take delight
  - type: text
    content: in every offering of our lives
  - type: text
    content: as we bring our sacrifices of righteousness before you in love!
  - type: note
    content: Or “then they will offer up bulls on your altar.”
  '3':
  - type: text
    content: For I’m so ashamed.
  - type: text
    content: I feel such pain and anguish within me.
  - type: text
    content: I can’t get away from the sting of my sin against you, Lord!
  - type: text
    content: Everything I did, I did right in front of you, for you saw it all.
  - type: text
    content: Against you, and you above all, have I sinned.
  - type: text
    content: Everything you say to me is infallibly true
  - type: text
    content: and your judgment conquers me.
  '5':
  - type: text
    content: Lord, I have been a sinner from birth,
  - type: text
    content: from the moment my mother conceived me.
  '6':
  - type: text
    content: I know that you delight to set your truth deep in my spirit.
  - type: note
    content: The Hebrew word bat-ţuchâh, although difficult to translate, can mean “something that is covered over, hidden, or concealed.” This could be paraphrased as “you desire light in my darkness” or “you want truth to expose my secrets.”
  - type: text
    content: So come into the hidden places of my heart
  - type: text
    content: and teach me wisdom.
  - type: heading
    content: David’s Cleansing
  '7':
  - type: text
    content: Purify my conscience! Make this leper clean again!
  - type: note
    content: The Hebrew text contains the word hyssop. This was a bushy plant used for sprinkling blood on a healed leper to ceremonially cleanse him for the worship of God. See Lev. 14:3–7; Num. 19.
  - type: text
    content: Wash me in your love until I am pure in heart.
  - type: note
    content: Or “Wash me with the snow from above so I can be whitened.”
  '8':
  - type: text
    content: Satisfy me in your sweetness, and my song of joy will return.
  - type: text
    content: The places you have crushed within me
  - type: text
    content: will rejoice in your healing touch.
  - type: note
    content: In this beautiful verse, the broken places (“places you have crushed”) are literally “broken bones.” Our bones speak allegorically of our inner being, our emotional strength.
  '9':
  - type: text
    content: Hide my sins from your face;
  - type: note
    content: David was ashamed not just of what others would think but also that he had been seen by God. A truly remorseful person has no thought for reputation but only for righteousness.
  - type: text
    content: erase all my guilt by your saving grace.
