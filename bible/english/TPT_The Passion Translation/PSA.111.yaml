document_id: PSA.111,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Celebrate God’s Greatness
  - type: text
    content: 'Shout hallelujah to '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: May every one of his devoted lovers hear my passionate praise to him,
  - type: text
    content: even among the council of the holy ones.
  '10':
  - type: text
    content: Where can wisdom be found? It is born in the fear of God.
  - type: text
    content: Everyone who follows his ways
  - type: text
    content: will never lack his living-understanding.
  - type: text
    content: And the adoration of God will abide throughout eternity!
  '2':
  - type: text
    content: For God’s mighty miracles astound me!
  - type: text
    content: His wonders are so delightfully mysterious
  - type: text
    content: that they leave all who seek them astonished.
  '3':
  - type: text
    content: Everything he does is full of splendor and beauty!
  - type: text
    content: Each miracle demonstrates his eternal perfection.
  '4':
  - type: text
    content: His unforgettable works of surpassing wonder
  - type: text
    content: reveal his grace and tender mercy.
  '5':
  - type: text
    content: He satisfies all who love and trust him,
  - type: text
    content: and he keeps every promise he makes.
  '6':
  - type: text
    content: He reveals mighty power and marvels to his people
  - type: text
    content: by handing them nations as a gift.
  '7':
  - type: text
    content: All God accomplishes is flawless, faithful, and fair,
  - type: text
    content: and his every word proves trustworthy and true.
  '8':
  - type: text
    content: They are steadfast forever and ever,
  - type: text
    content: formed from truth and righteousness.
  '9':
  - type: text
    content: His forever-love paid a full ransom for his people
  - type: text
    content: 'so that now we’re free to come before '
  - type: text
    content: Yahweh
  - type: text
    content: to worship his holy and awesome name!
