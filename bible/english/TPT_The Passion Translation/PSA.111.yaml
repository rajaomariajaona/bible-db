document_id: PSA.111,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Celebrate God’s Greatness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Shout hallelujah to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May every one of his devoted lovers hear my passionate praise to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even among the council of the holy ones.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where can wisdom be found? It is born in the fear of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone who follows his ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will never lack his living-understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the adoration of God will abide throughout eternity!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God’s mighty miracles astound me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His wonders are so delightfully mysterious
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that they leave all who seek them astonished.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything he does is full of splendor and beauty!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each miracle demonstrates his eternal perfection.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His unforgettable works of surpassing wonder
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reveal his grace and tender mercy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He satisfies all who love and trust him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he keeps every promise he makes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He reveals mighty power and marvels to his people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by handing them nations as a gift.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All God accomplishes is flawless, faithful, and fair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his every word proves trustworthy and true.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are steadfast forever and ever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: formed from truth and righteousness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His forever-love paid a full ransom for his people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so that now we’re free to come before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to worship his holy and awesome name!
