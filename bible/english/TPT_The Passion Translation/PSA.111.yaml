document_id: PSA.111
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Celebrate God’s Greatness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Shout hallelujah to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: May every one of his devoted lovers hear my passionate praise to him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even among the council of the holy ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For God’s mighty miracles astound me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His wonders are so delightfully mysterious
- type: usfm
  marker: q1
  children:
  - type: text
    text: that they leave all who seek them astonished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Everything he does is full of splendor and beauty!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each miracle demonstrates his eternal perfection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: His unforgettable works of surpassing wonder
- type: usfm
  marker: q1
  children:
  - type: text
    text: reveal his grace and tender mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He satisfies all who love and trust him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he keeps every promise he makes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He reveals mighty power and marvels to his people
- type: usfm
  marker: q1
  children:
  - type: text
    text: by handing them nations as a gift.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All God accomplishes is flawless, faithful, and fair,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and his every word proves trustworthy and true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are steadfast forever and ever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: formed from truth and righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: His forever-love paid a full ransom for his people
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'so that now we’re free to come before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
- type: usfm
  marker: q1
  children:
  - type: text
    text: to worship his holy and awesome name!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Where can wisdom be found? It is born in the fear of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who follows his ways
- type: usfm
  marker: q1
  children:
  - type: text
    text: will never lack his living-understanding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And the adoration of God will abide throughout eternity!
