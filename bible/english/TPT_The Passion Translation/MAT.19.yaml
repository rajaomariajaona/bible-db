      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For some are born to celibacy; others have been made eunuchs by others. And there are some who have chosen to live in celibacy for the sacred purpose of heaven’s kingdom realm.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Three types of “celibates” are mentioned. First, there are those who from birth have grace to remain celibate. Second, sometimes a male was castrated, usually before puberty, which would greatly affect the hormonal changes of a boy becoming an adult. In biblical times, these eunuchs were chosen to be male servants of a king, having been castrated in order to ensure they don’t have sex with the king’s harem. Third, this is a metaphorical class of people (male and female) who are like “spiritual eunuchs,” having been chosen to never use the bride of Christ for their own purposes. Jesus gives us a parable of God’s servants who will lead the church but never harm or use the bride of Christ for their own desires. They will always point the bride to her Bridegroom, Jesus Christ. They have made themselves “eunuchs” and are determined to extend God’s kingdom, not their own. The rare Greek verb for “make themselves eunuchs” can also refer to being “always watchful, sleepless, diligent.” To become a “spiritual eunuch” has nothing to do with sex, but with always watching out for the interests of our King, and not taking for ourselves what only belongs to him in order to serve our own desires.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let those who can, accept this truth for themselves.”
