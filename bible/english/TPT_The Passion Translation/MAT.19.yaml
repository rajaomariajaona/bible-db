document_id: MAT.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Questions about Divorce
  - type: text
    content: 'After Jesus finished teaching them, he left Galilee and made his way toward the district of Judea, east of the Jordan River. '
  '10':
  - type: text
    content: His disciples spoke up and said, “If this is the standard, then it seems better to never get married.”
  '11':
  - type: text
    content: “Not everyone is meant to remain single—only those whom God gives grace to be unmarried.
  - type: text
    content: ' '
  - type: note
    content: Or “This doesn’t apply to everyone, but only to those to whom it [grace for singleness]has been given.”
  '12':
  - type: text
    content: For some are born to celibacy; others have been made eunuchs by others. And there are some who have chosen to live in celibacy for the sacred purpose of heaven’s kingdom realm.
  - type: text
    content: ' '
  - type: note
    content: Three types of “celibates” are mentioned. First, there are those who from birth have grace to remain celibate. Second, sometimes a male was castrated, usually before puberty, which would greatly affect the hormonal changes of a boy becoming an adult. In biblical times, these eunuchs were chosen to be male servants of a king, having been castrated in order to ensure they don’t have sex with the king’s harem. Third, this is a metaphorical class of people (male and female) who are like “spiritual eunuchs,” having been chosen to never use the bride of Christ for their own purposes. Jesus gives us a parable of God’s servants who will lead the church but never harm or use the bride of Christ for their own desires. They will always point the bride to her Bridegroom, Jesus Christ. They have made themselves “eunuchs” and are determined to extend God’s kingdom, not their own. The rare Greek verb for “make themselves eunuchs” can also refer to being “always watchful, sleepless, diligent.” To become a “spiritual eunuch” has nothing to do with sex, but with always watching out for the interests of our King, and not taking for ourselves what only belongs to him in order to serve our own desires.
  - type: text
    content: Let those who can, accept this truth for themselves.”
  - type: heading
    content: Jesus and Little Children
  '13':
  - type: text
    content: 'Then they brought little children to Jesus so that he would lay his hands on them, bless them, and pray for them. '
  - type: note
    content: See Gen. 48:14.
  - type: text
    content: But the disciples scolded those who brought the children, saying, “Don’t bother him with this now!”
  '14':
  - type: text
    content: 'Jesus overheard them and said, '
  - type: text
    content: “I want little children to come to me, so never interfere with them when they want to come, for heaven’s kingdom realm is composed of beloved ones
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, which uses the word for “beloved,” found only twice in the New Testament. The Greek is “little children.” God receives little children into his kingdom.
  - type: text
    content: 'like these! Listen to this truth: No one will enter the kingdom realm of heaven unless he becomes like one of these!”'
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew. This last sentence is missing in the Greek text.
  '15':
  - type: text
    content: Then he laid his hands on each of them and went on his way.
  - type: heading
    content: A Rich Young Man Questions Jesus
  '16':
  - type: text
    content: 'Then a young man approached Jesus and bowed before him, '
  - type: note
    content: As translated from the Hebrew Matthew. This is missing from the Majority Text.
  - type: text
    content: 'saying, “Wonderful teacher '
  - type: note
    content: As translated from the Aramaic, which uses the word tawa, meaning “wonderful, good, gifted.” Some Greek manuscripts have only “teacher” (rabbi).
  - type: text
    content: —is there a good work I have to do to obtain eternal life?”
  '17':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Why would you call me wonderful? God alone is wonderful.
  - type: text
    content: ' '
  - type: note
    content: At least one of the earliest Greek manuscripts reads “There is no one good but my Father in the heavens.”
  - type: text
    content: And why would you ask what good work you need to do? Keep the commandments and you’ll enter into the life of God.”
  '18':
  - type: text
    content: “Which ones?” he asked.
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Don’t murder, don’t commit adultery, don’t steal, don’t lie,
  - type: text
    content: ' '
  '19':
  - type: text
    content: honor your father and mother, and love those around you as you love yourself.”
  - type: note
    content: See Ex. 20:12–17; Lev. 19:18. Notice that Jesus left out the commandment “Don’t covet.” He addresses this with the young man in v. 21 and exposes the need to abandon all to follow Jesus.
  '2':
  - type: text
    content: 'Massive crowds followed him and he healed all who were sick. '
  - type: note
    content: As translated from the Hebrew Matthew.
  '20':
  - type: text
    content: “But I’ve always obeyed every one of them without fail,” the young man replied. “What else do I lack?”
  '21':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “If you really want to be perfect,
  - type: text
    content: ' '
  - type: note
    content: Or “fully developed morally,” “mature.”
  - type: text
    content: go now and sell everything you own. Give your money to the poor and your treasure will be transferred into heaven. Then come back and follow me for the rest of your life.”
  '22':
  - type: text
    content: 'When the young man heard these words, he walked away sad, '
  - type: note
    content: The Hebrew Matthew reads “angry.”
  - type: text
    content: for he had great wealth.
  '23':
  - type: text
    content: 'Then Jesus turned to his disciples and said, '
  - type: text
    content: “Listen. Do you understand how difficult it is for the rich to enter into heaven’s kingdom realm?
  - type: text
    content: ' '
  '24':
  - type: text
    content: In fact, it’s easier to stuff a heavy rope
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “to stuff a camel through the eye of a needle.” The Aramaic word for both “rope” and “camel” is the homonym gamla. This could be an instance of the Aramaic text being misread by the Greek translators as “camel” instead of “rope.” Regardless, this becomes a metaphor for something impossible. It would be like saying, “It’s as hard as making pigs fly!” See also Luke 18:25.
  - type: text
    content: through the eye of a needle than it is for the wealthy to enter into God’s kingdom realm!”
  '25':
  - type: text
    content: Stunned and bewildered, his disciples asked, “Then who in the world can possibly be saved?”
  '26':
  - type: text
    content: 'Looking into their eyes, Jesus replied, '
  - type: text
    content: “Humanly speaking, no one,
  - type: text
    content: ' '
  - type: text
    content: because no one can save himself
  - type: text
    content: . But what seems impossible to you is never impossible to God!”
  '27':
  - type: text
    content: Then Peter blurted out, “Here we are. We’ve given up everything to follow you. What reward will there be for us?”
  '28':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: '“Listen to the truth: In the age of the restoration of all things,'
  - type: text
    content: ' '
  - type: note
    content: Or “in the second birth” (Hebrew Matthew) or “in the new realm” (Aramaic). The Greek word palingenesia is only used one other time in the New Testament (Titus 3:5) and refers to our rebirth. See also Acts 3:21; 2 Cor. 5:17; Rev. 3:21.
  - type: text
    content: when the Son of Man sits on his glorious throne, you who have followed me will have twelve thrones of your own, and you will govern
  - type: text
    content: ' '
  - type: note
    content: Or “judge.”
  - type: text
    content: the twelve tribes of Israel.
  - type: text
    content: ' '
  '29':
  - type: text
    content: For anyone who has left behind their home and property,
  - type: text
    content: ' '
  - type: note
    content: Or “fields.”
  - type: text
    content: leaving family—brothers or sisters, mothers or fathers,
  - type: text
    content: ' '
  - type: note
    content: The Aramaic and a few Greek manuscripts include “or wife.” The majority of reliable Greek manuscripts do not include it.
  - type: text
    content: or children—for my sake, they will be repaid a hundred times over and will inherit eternal life.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'The Pharisees were intent on putting Jesus to the test with difficult questions, so they approached him and asked, “Is it lawful for a man to divorce '
  - type: note
    content: The Greek word used for divorce (apolyo) here and in this chapter can also mean “to loose,” “to dismiss,” “to send away.”
  - type: text
    content: his wife for any reason?”
  - type: note
    content: This a clever test by the Pharisees. Jesus was now in Judea and under the jurisdiction of Herod Antipas, the one who had John beheaded over challenging his divorce. They were hoping Jesus would say something that could get him arrested and killed by Herod. Their question was based on Deut. 24:1. Jewish divorce law had a “for any reason” clause that made divorce legal. They were pressing Jesus for his interpretation of this “for any reason” law.
  '30':
  - type: text
    content: But many who push themselves to be first will find themselves last. And those who are willing to be last will find themselves to be first.”
  - type: note
    content: Or “Many of the first ones will be last and many of the last ones will be first.”
  '4':
  - type: text
    content: “Haven’t you read the Scriptures about creation?”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “The Creator made us male and female from the very beginning,
  - type: text
    content: ' '
  - type: note
    content: See Gen. 1:27; 5:2. Notice that Jesus highlights gender difference in the context of marriage.
  '5':
  - type: text
    content: and ‘For this reason a man will leave his father and mother and live with his wife.
  - type: text
    content: ' '
  - type: note
    content: Or “cling to his wife.”
  - type: text
    content: And the two will become one flesh.’
  - type: text
    content: ' '
  - type: note
    content: See Gen. 2:24.
  '6':
  - type: text
    content: From then on, they are no longer two, but united as one. So what God unites let no one divide!”
  '7':
  - type: text
    content: They responded, “So then why did Moses command us to give a certificate of divorce and it would be lawful?”
  '8':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Moses permitted you to divorce because your hearts are so hard and stubborn,
  - type: text
    content: ' '
  - type: note
    content: That is, in a fallen world with frail human beings, God allowed divorce to accommodate broken humanity. Jesus restates divorce as being permitted only in the case of immorality. Adultery breaks the bond of marriage and requires God’s healing grace. Those testing Jesus were attempting to trap him by getting him to say something against Moses, their venerated historical leader.
  - type: text
    content: but originally there was no such thing.
  - type: text
    content: ' '
  '9':
  - type: text
    content: But I say to you, whoever leaves his wife for any reason other than immorality, then takes another wife is living in adultery. And whoever takes a divorced woman in marriage is also living in adultery.”
  - type: note
    content: As translated from the Hebrew Matthew, Aramaic, and some Greek manuscripts. The majority of Greek manuscripts do not include the last sentence.
