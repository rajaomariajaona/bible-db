document_id: PRO.29
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Be Stubborn
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Stubborn people who repeatedly refuse to accept correction
- type: usfm
  marker: q1
  children:
  - type: text
    text: will suddenly be broken and never recover.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Everyone rejoices when the lovers of God flourish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the people groan when the wicked rise to power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When you love wisdom, your father is overjoyed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when you associate with prostitutes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you waste your wealth in exchange for disgrace.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 15:11–24
      metadata:
        usfm: LUK.15.11+LUK.15.12+LUK.15.13+LUK.15.14+LUK.15.15+LUK.15.16+LUK.15.17+LUK.15.18+LUK.15.19+LUK.15.20+LUK.15.21+LUK.15.22+LUK.15.23+LUK.15.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A godly leader who values justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: is a great strength and example to the people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the one who sells his influence for money
- type: usfm
  marker: q1
  children:
  - type: text
    text: tears down what is right.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Tim. 6:10
      metadata:
        usfm: 1TI.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Flattery can often be used as a trap to hide ulterior motives
- type: usfm
  marker: q1
  children:
  - type: text
    text: and take advantage of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The wicked always have a trap laid for others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the lovers of God escape as they sing and shout
- type: usfm
  marker: q1
  children:
  - type: text
    text: in joyous triumph!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: God’s righteous people will pour themselves out for the poor,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text implies standing up for the legal rights of the poor.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the ungodly make no attempt to understand or help the needy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: You Can’t Argue with a Fool
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Arrogant cynics love to pick fights,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the humble and wise love to pursue peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: There’s no use arguing with a fool,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew implies an argument in a court of law.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for his ranting and raving prevent you from making a case
- type: usfm
  marker: q1
  children:
  - type: text
    text: and settling the argument in a calm way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Violent men hate those with integrity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the lovers of God esteem those who are holy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You can recognize fools by the way
- type: usfm
  marker: q1
  children:
  - type: text
    text: they give full vent to their rage
- type: usfm
  marker: q1
  children:
  - type: text
    text: and let their words fly!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the wise bite their tongues and hold back all they could say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When leaders listen to false accusations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: their associates become scoundrels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Poor people and their oppressors
- type: usfm
  marker: q1
  children:
  - type: text
    text: have only one thing in common—
- type: usfm
  marker: q1
  children:
  - type: text
    text: God made them both.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A figure of speech in Hebrew that can literally be translated “God gave them both the gift of eyesight.” The Septuagint is “The contracts between lenders and debtors are observed by the Lord.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The best insurance for a leader’s longevity
- type: usfm
  marker: q1
  children:
  - type: text
    text: is to demonstrate justice for the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Experiencing many corrections and rebukes will make you wise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But if left to your own ways, you’ll bring disgrace to your parents.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “your mother.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When the wicked are in power, lawlessness abounds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the patient lovers of God will one day watch in triumph
- type: usfm
  marker: q1
  children:
  - type: text
    text: as their stronghold topples!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Correct your child and one day you’ll find he has changed
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will bring you great delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When there is no clear prophetic vision,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here can refer to a “vision of the night,” “dream,” “oracle,” or “revelation.” The Septuagint reads “where there is no prophetic seer [or interpreter].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: people quickly wander astray.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “let loose,” “strip,” or “made themselves naked.” The Septuagint reads “the people become lawless.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when you follow the revelation of the Word,
- type: usfm
  marker: q1
  children:
  - type: text
    text: heaven’s bliss fills your soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A stubborn servant can’t be corrected by words alone.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For even if he understands, he pays no attention to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'There’s only one kind of person who is worse than a fool:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: the impetuous one who speaks without thinking first.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If you pamper your servants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: don’t be surprised when they expect to be treated as sons.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If you pamper your servant when he is young, he’ll become a weakling in the end.” The Septuagint reads “If you live in luxury as a child, you’ll become a domestic [servant] and at last will be grieved with yourself.” The Aramaic states, “You’ll be uprooted in the end.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The source of strife is found in an angry heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for sin surrounds the life of a furious man.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word translated as “a furious man” can also mean “lord of fury” or “Baal of wrath.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lift yourself up with pride and you will soon be brought low,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to depression.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a meek and humble spirit will add to your honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You are your own worst enemy when you partner with a thief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for a curse of guilt will come upon you
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you fail to report a crime.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 29:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “when under oath to testify but you do not talk.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fear and intimidation is a trap that holds you back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when you place your confidence in the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will be seated in the high place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Everyone curries favor with leaders.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But God is the judge, and justice comes from him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The wicked hate those who live a godly life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the righteous hate injustice wherever it’s found.
