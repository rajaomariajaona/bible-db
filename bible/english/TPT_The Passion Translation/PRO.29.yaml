document_id: PRO.29,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Be Stubborn
  - type: text
    content: Stubborn people who repeatedly refuse to accept correction
  - type: text
    content: will suddenly be broken and never recover.
  '10':
  - type: text
    content: Violent men hate those with integrity,
  - type: text
    content: but the lovers of God esteem those who are holy.
  - type: note
    content: As translated from the Septuagint.
  '11':
  - type: text
    content: You can recognize fools by the way
  - type: text
    content: they give full vent to their rage
  - type: text
    content: and let their words fly!
  - type: text
    content: But the wise bite their tongues and hold back all they could say.
  '12':
  - type: text
    content: When leaders listen to false accusations,
  - type: text
    content: their associates become scoundrels.
  '13':
  - type: text
    content: Poor people and their oppressors
  - type: text
    content: have only one thing in common—
  - type: text
    content: God made them both.
  - type: note
    content: A figure of speech in Hebrew that can literally be translated “God gave them both the gift of eyesight.” The Septuagint is “The contracts between lenders and debtors are observed by the Lord.”
  '14':
  - type: text
    content: The best insurance for a leader’s longevity
  - type: text
    content: is to demonstrate justice for the poor.
  '15':
  - type: text
    content: Experiencing many corrections and rebukes will make you wise.
  - type: text
    content: But if left to your own ways, you’ll bring disgrace to your parents.
  - type: note
    content: As translated from the Septuagint. The Hebrew is “your mother.”
  '16':
  - type: text
    content: When the wicked are in power, lawlessness abounds.
  - type: text
    content: But the patient lovers of God will one day watch in triumph
  - type: text
    content: as their stronghold topples!
  '17':
  - type: text
    content: Correct your child and one day you’ll find he has changed
  - type: text
    content: and will bring you great delight.
  '18':
  - type: text
    content: When there is no clear prophetic vision,
  - type: note
    content: The Hebrew word used here can refer to a “vision of the night,” “dream,” “oracle,” or “revelation.” The Septuagint reads “where there is no prophetic seer [or interpreter].”
  - type: text
    content: people quickly wander astray.
  - type: note
    content: Or “let loose,” “strip,” or “made themselves naked.” The Septuagint reads “the people become lawless.”
  - type: text
    content: But when you follow the revelation of the Word,
  - type: text
    content: heaven’s bliss fills your soul.
  '19':
  - type: text
    content: A stubborn servant can’t be corrected by words alone.
  - type: text
    content: For even if he understands, he pays no attention to you.
  '2':
  - type: text
    content: Everyone rejoices when the lovers of God flourish,
  - type: text
    content: but the people groan when the wicked rise to power.
  '20':
  - type: text
    content: 'There’s only one kind of person who is worse than a fool:'
  - type: text
    content: the impetuous one who speaks without thinking first.
  '21':
  - type: text
    content: If you pamper your servants,
  - type: text
    content: don’t be surprised when they expect to be treated as sons.
  - type: note
    content: Or “If you pamper your servant when he is young, he’ll become a weakling in the end.” The Septuagint reads “If you live in luxury as a child, you’ll become a domestic [servant] and at last will be grieved with yourself.” The Aramaic states, “You’ll be uprooted in the end.”
  '22':
  - type: text
    content: The source of strife is found in an angry heart,
  - type: text
    content: for sin surrounds the life of a furious man.
  - type: note
    content: The Hebrew word translated as “a furious man” can also mean “lord of fury” or “Baal of wrath.”
  '23':
  - type: text
    content: Lift yourself up with pride and you will soon be brought low,
  - type: note
    content: Or “to depression.”
  - type: text
    content: but a meek and humble spirit will add to your honor.
  '24':
  - type: text
    content: You are your own worst enemy when you partner with a thief,
  - type: text
    content: for a curse of guilt will come upon you
  - type: text
    content: when you fail to report a crime.
  - type: note
    content: Or “when under oath to testify but you do not talk.”
  '25':
  - type: text
    content: Fear and intimidation is a trap that holds you back.
  - type: text
    content: But when you place your confidence in the Lord,
  - type: text
    content: you will be seated in the high place.
  '26':
  - type: text
    content: Everyone curries favor with leaders.
  - type: text
    content: But God is the judge, and justice comes from him.
  '27':
  - type: text
    content: The wicked hate those who live a godly life,
  - type: text
    content: but the righteous hate injustice wherever it’s found.
  '3':
  - type: text
    content: When you love wisdom, your father is overjoyed.
  - type: text
    content: But when you associate with prostitutes,
  - type: text
    content: you waste your wealth in exchange for disgrace.
  - type: note
    content: See Luke 15:11–24.
  '4':
  - type: text
    content: A godly leader who values justice
  - type: text
    content: is a great strength and example to the people.
  - type: text
    content: But the one who sells his influence for money
  - type: text
    content: tears down what is right.
  - type: note
    content: See 1 Tim. 6:10.
  '5':
  - type: text
    content: Flattery can often be used as a trap to hide ulterior motives
  - type: text
    content: and take advantage of you.
  '6':
  - type: text
    content: The wicked always have a trap laid for others,
  - type: text
    content: but the lovers of God escape as they sing and shout
  - type: text
    content: in joyous triumph!
  '7':
  - type: text
    content: God’s righteous people will pour themselves out for the poor,
  - type: note
    content: The Hebrew text implies standing up for the legal rights of the poor.
  - type: text
    content: but the ungodly make no attempt to understand or help the needy.
  - type: heading
    content: You Can’t Argue with a Fool
  '8':
  - type: text
    content: Arrogant cynics love to pick fights,
  - type: text
    content: but the humble and wise love to pursue peace.
  '9':
  - type: text
    content: There’s no use arguing with a fool,
  - type: note
    content: The Hebrew implies an argument in a court of law.
  - type: text
    content: for his ranting and raving prevent you from making a case
  - type: text
    content: and settling the argument in a calm way.
