        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jonah means “dove.” Or “son of John.” Simeon means “he who hears.” Peter heard the Father’s whisper within that Jesus was the Christ. Simeon was his formal Hebrew name. Peter became his identity as Jesus gave him the nickname of “pebble.” He is also referred to as “Simon Peter.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you didn’t discover this on your own, but my Father in heaven has supernaturally revealed it to you.
    - type: text
      text: ' '
