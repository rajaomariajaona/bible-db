      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For even if you were to gain all the wealth and power of this world—at the cost of your own life—what good would that be? And what could be more valuable to you than your own soul?
    - type: text
      text: ' '
    - type: usfm
