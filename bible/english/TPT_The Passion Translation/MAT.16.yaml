verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Demand for a Sign from Heaven
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day some of the Pharisees and those of the Jewish sect known as the Sadducees '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Of the three major sects of Judaism of that day (Pharisees, Essenes, and Sadducees), the Sadducees were a small but influential group that philosophically denied the supernatural and gravitated instead toward political control of the people.
      marker-yv: yv-n
    - type: text
      text: approached Jesus, insisting that he prove to them that he was the Messiah. “Show us a supernatural sign from heaven,” they demanded.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And how seven loaves of bread fed four thousand families with baskets left over?
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Don’t you understand? I’m not talking about bread, but I’m warning you to avoid the yeast of the Pharisees and the Sadducees.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Then finally they realized he wasn’t talking about yeast found in bread, but the error of the teachings of the Pharisees '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Pharisees” means “separated ones” (separatists). It is believed that during the time of Jesus there were approximately six thousand Pharisees in Israel. They refused to have dealings with common people because they were separated unto God. Jesus described them as religious frauds who loved money and wanted to be the final authority on all the doctrines that were taught to the people. They were not all priests, but zealous law keepers who wanted their interpretation of the Scriptures to be the standard in Israel.
      marker-yv: yv-n
    - type: text
      text: and the Sadducees.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Sadducees (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tzedukim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) were wealthy aristocrats with political connections to Rome. They did not believe in the afterlife or angels or demons, and they denied the miraculous. It is believed that among them were Jewish converts from the Edomites who were forced to convert to Judaism in 129 BC by John Hyrcanus, the Hasmonean leader of the second century BC. The Sadducees loved Greek (Hellenistic) culture and basically rejected the oral law of the Pharisees. The Herodians would also be considered to be of the Sadducees. You can imagine how Jesus upset both the Pharisees and the Sadducees. Jesus had no difficulty breaking the traditions, taboos, religious teachings, and political loyalties of both Pharisees and Sadducees in order to please his heavenly Father.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Revelation of Christ
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When Jesus came to Caesarea Philippi, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a beautiful area north of Lake Galilee and near Tel-Dan. Located at the foothills of Mount Hermon, it was an ancient Roman city rebuilt by Herod Philip in honor of Tiberius Caesar.
      marker-yv: yv-n
    - type: text
      text: 'he asked his disciples this question: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What are the people saying about me, the Son of Man? Who do they believe I am?”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They answered, “Some are convinced you are John the Baptizer, others say you are Elijah reincarnated, or Jeremiah, or one of the prophets.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But you—who do you say that I am?”
    - type: text
      text: ' Jesus asked.'
  '16':
