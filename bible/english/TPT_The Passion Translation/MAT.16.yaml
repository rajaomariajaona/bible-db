  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I promise you, there are some standing here now who won’t experience death until they have witnessed the coming of the Son of Man in the presence and the power of the kingdom realm of God!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “when they see the Son of Man appearing to inaugurate his regal reign.” This was a prophecy of what was about to take place with Peter, Jacob, and John on the Mountain of Transforming Glory. This promise would be fulfilled as they experienced the power of the kingdom of God and the cloud of glory. Christ’s appearing is equated to the power manifested in the cloud that overshadowed Jesus on the Mount of Transfiguration.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And, ‘Red sky in the morning, sailors take warning.’ You’re so adept at forecasting the weather by looking at the sky, but you’re absolutely clueless in reading the obvious signs of the times.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: A wicked and wayward generation always asks for signs, but the only sign I provide for you will be the sign of Jonah the prophet.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “sign of Jonah” points to Jesus in many ways. Jonah being thrown into the sea points to Christ’s death. Being swallowed by the fish for three days points to Christ’s burial. And being expelled from the fish speaks of Christ’s resurrection and triumph over death, which is the greatest “sign” God could ever give. The resurrected Jesus is the eternal sign that our sins are forgiven.
      marker-yv: yv-n
    - type: text
      text: Then he turned away and left them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Hypocrisy of the Pharisees and Sadducees
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Later, as Jesus and his disciples crossed over to the other side of Lake Galilee, the disciples realized they had forgotten to bring any loaves of bread. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jesus spoke up and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Watch out for the yeast of the Pharisees and the Sadducees.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Thinking Jesus was scolding them over not bringing bread, they began to discuss it among themselves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Knowing their thoughts, Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have such little faith! Why are you arguing with one another about having no bread?
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Are you so slow to understand? Have you forgotten the miracle of feeding the five thousand families and how each of you ended up with a basket full of fragments?
    - type: text
      text: ' '
