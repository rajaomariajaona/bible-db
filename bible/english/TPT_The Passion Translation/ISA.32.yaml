document_id: ISA.32,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A King and His Princes
  - type: text
    content: Look—a new era begins!
  - type: text
    content: A king will reign with righteousness,
  - type: text
    content: 'and his princes '
  - type: note
    content: Although some scholars believe Hezekiah is the king mentioned here, we see Jesus. He is the King of Righteousness, and his princes are the sons and daughters who make up his kingdom. See Rom. 8:14, 29; Heb. 2:6–13.
  - type: text
    content: according to justice!
  '10':
  - type: text
    content: Although you are carefree now,
  - type: text
    content: you will tremble for many days and years,
  - type: note
    content: Or “days upon a year.” This phrase is obscure and not easy to define. It could be a figure of speech for “days and years [of trouble]” or “in a year or more.”
  - type: text
    content: for your grape harvest will fail
  - type: text
    content: and your fruit harvest will not come!
  '11':
  - type: text
    content: Tremble, you careless ones.
  - type: text
    content: 'Take off your '
  - type: text
    content: fine
  - type: text
    content: ' garments and expose yourselves.'
  - type: text
    content: Shake with fear and put on sackcloth.
  - type: note
    content: The five imperative Hebrew verbs, though seemingly addressed to women, are all in the masculine form.
  '12':
  - type: text
    content: 'Beat your breasts '
  - type: text
    content: in sorrow
  - type: text
    content: for your pleasant fields and fruitful vines.
  '13':
  - type: text
    content: Mourn for the soil of my people,
  - type: text
    content: for it will grow nothing but thorns and briars.
  - type: note
    content: See Matt. 13:3–9, 18–23.
  - type: text
    content: Yes, mourn for all the houses of joy in the joyous city,
  '14':
  - type: text
    content: for the bustling city with its mansions will be deserted.
  - type: text
    content: The high ground and watchtower will be empty,
  - type: text
    content: becoming the joy of wild donkeys and a grazing ground for flocks.
  - type: heading
    content: The Outpouring
  '15':
  - type: text
    content: The desolation will not end
  - type: text
    content: 'until '
  - type: note
    content: See Acts 3:19–21; Eph. 4:13.
  - type: text
    content: 'the Spirit is poured out '
  - type: note
    content: Or “emptied out.” See Ezek. 36:25–27; Joel 2:28.
  - type: text
    content: upon us from heaven!
  - type: note
    content: Or “from on high.”
  - type: text
    content: Then the wilderness will blossom into a fruitful orchard
  - type: text
    content: and the trees of the orchard will grow into a forest!
  '16':
  - type: text
    content: Then justice will reside in the wilderness
  - type: text
    content: and righteousness will dwell in the fruitful orchard.
  '17':
  - type: text
    content: The work of righteousness is peace,
  - type: note
    content: That is, peace comes from righteousness, not simply the works of man. See Isa. 26:12; Matt. 5:9.
  - type: text
    content: and the result of righteousness
  - type: text
    content: is quietness and confidence forever.
  '18':
  - type: text
    content: My people will live free from worry
  - type: text
    content: in secure homes and quiet resting places.
  - type: note
    content: Jesus is the quiet resting place for every lover of God.
  '19':
  - type: text
    content: No matter if hail destroys the forest and the city is leveled,
  '2':
  - type: text
    content: A man will be a hiding place from the stormy wind
  - type: text
    content: and a secret shelter from the tempest.
  - type: note
    content: Who is this man? It is the Lord of Glory, Jesus Christ. In him we are sheltered and safe from the storm of the law’s condemnation, as well as from the assaults of Satan. Spiritual leaders, like our Lord Jesus, are to be a source of protection and refreshing for God’s people. See John 10:10–11.
  - type: text
    content: Life will flow from each one
  - type: text
    content: ', like streams of water '
  - type: note
    content: See Ezek. 47:1–12; John 7:37–39.
  - type: text
    content: in the desert,
  - type: text
    content: like the refreshing shade of a massive rock
  - type: text
    content: in a weary, thirsty land.
  '20':
  - type: text
    content: you will be happy and blessed
  - type: text
    content: as you sow your seed beside every stream
  - type: text
    content: and loose your ox and donkey to graze freely.
  '3':
  - type: text
    content: Then at last, eyes that are ready to see
  - type: text
    content: will finally be opened!
  - type: note
    content: See John 3:1–8; Eph. 1:18.
  - type: text
    content: Ears that are ready to hear
  - type: text
    content: will finally be opened!
  - type: note
    content: See Rev. 3:13, 20–22.
  '4':
  - type: text
    content: 'The hearts of those who were once hasty '
  - type: text
    content: to form opinions
  - type: text
    content: will finally understand and know.
  - type: text
    content: And those with stammering tongues
  - type: text
    content: will speak dazzling truths!
  - type: note
    content: See 1 Cor. 14:2.
  '5':
  - type: text
    content: 'The fool '
  - type: note
    content: The Hebrew word for “fool,” nabal, is one of the strongest negative terms used in the Old Testament to describe a person who is “worthless” or “godless.” See 1 Sam. 25:25.
  - type: text
    content: will no longer be called Your Honor,
  - type: text
    content: 'nor the scoundrel '
  - type: note
    content: Or “miserly,” “one who withholds,” “stingy,” or “covetous.”
  - type: text
    content: highly respected,
  '6':
  - type: text
    content: for the fool is recognized by his foolish words.
  - type: text
    content: Their minds plot treachery, they excel in ungodliness,
  - type: text
    content: 'and they say misleading things about '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: They refuse to feed the hungry or give drink to the thirsty.
  '7':
  - type: text
    content: 'The deceiver’s schemes '
  - type: note
    content: Or “weapons.”
  - type: text
    content: and plans are evil.
  - type: text
    content: He schemes of cheating the poor,
  - type: text
    content: even when their plea is just.
  '8':
  - type: text
    content: But a person of honor has honorable plans,
  - type: text
    content: 'and his integrity '
  - type: note
    content: The Hebrew word nadiyb is used three times in this verse and can be translated “honor,” “noble,” “integrity,” “willing,” or “princely.”
  - type: text
    content: gives him security.
  - type: heading
    content: A Warning of Disaster
  '9':
  - type: text
    content: You careless women,
  - type: text
    content: it is time to get up and hear my voice.
  - type: text
    content: You complacent daughters, pay attention to what I say.
