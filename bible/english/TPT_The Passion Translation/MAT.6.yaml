    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you fast, don’t look gloomy and pretend to be spiritual. They want everyone to know they’re fasting, so they appear in public looking miserable and disheveled.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “disfigure their faces.” Some of them would put saffron on their faces to make them appear a sickly yellow color in order to be seen as though they had been fasting.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Believe me, they’ve already received their reward.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
