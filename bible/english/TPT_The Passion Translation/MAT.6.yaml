      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Give us bread [or life] today for the coming day.” Bread becomes a metaphor of our needs (physically, spiritually, and emotionally). Jesus is teaching us to acknowledge Father God as our Provider of all we need each day. Both the Greek and Hebrew Matthew can be translated “Give us this day our bread for tomorrow” (or “our continual bread”).
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Forgive us the wrongs we have done
    - type: text
      text: ' '
