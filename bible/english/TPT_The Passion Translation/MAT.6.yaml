document_id: MAT.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Giving with Pure Motives
  - type: text
    content: “Examine your motives to make sure you’re not showing off when you do your good deeds, only to be admired by others; otherwise, you will lose the reward of your heavenly Father.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Manifest your kingdom realm,
  - type: note
    content: Or “Come and begin your kingdom reign.”
  - type: text
    content: and cause your every purpose to be fulfilled on earth,
  - type: text
    content: just as it is in heaven.
  '11':
  - type: text
    content: We acknowledge you as our Provider
  - type: text
    content: of all we need each day.
  - type: note
    content: Or “Give us bread [or life] today for the coming day.” Bread becomes a metaphor of our needs (physically, spiritually, and emotionally). Jesus is teaching us to acknowledge Father God as our Provider of all we need each day. Both the Greek and Hebrew Matthew can be translated “Give us this day our bread for tomorrow” (or “our continual bread”).
  '12':
  - type: text
    content: Forgive us the wrongs we have done
  - type: text
    content: ' '
  - type: note
    content: Or “Send away the results of our debts (shortcomings),” used as a metaphor for our sins. The Aramaic can be translated “Give us serenity as we also allow others serenity.”
  - type: text
    content: as we ourselves
  - type: text
    content: release forgiveness to those who have wronged us.
  '13':
  - type: text
    content: Rescue us every time we face tribulation
  - type: note
    content: Or “Do not let us be put into the ordeal of testing.” God never tempts man. See James 1:13–14.
  - type: text
    content: and set us free from evil.
  - type: note
    content: Or “the Evil One.”
  - type: text
    content: For you are the King who rules
  - type: text
    content: with power and glory forever. Amen.’
  - type: note
    content: As translated from the Aramaic, Hebrew Matthew, and most Greek manuscripts. The Aramaic word for “forever” means “until the end of all the universes.”
  '14':
  - type: text
    content: “
  - type: text
    content: And when you pray
  - type: text
    content: ', make sure you forgive the faults of others so that your Father in heaven will also forgive you.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: But if you withhold forgiveness from others, your Father withholds forgiveness from you.”
  - type: heading
    content: Fasting
  '16':
  - type: text
    content: “When you fast, don’t look gloomy and pretend to be spiritual. They want everyone to know they’re fasting, so they appear in public looking miserable and disheveled.
  - type: text
    content: ' '
  - type: note
    content: Or “disfigure their faces.” Some of them would put saffron on their faces to make them appear a sickly yellow color in order to be seen as though they had been fasting.
  - type: text
    content: Believe me, they’ve already received their reward.
  - type: text
    content: ' '
  '17':
  - type: text
    content: When you fast, don’t let it be obvious, but instead, wash your face
  - type: text
    content: ' '
  - type: note
    content: Or “put oil on your head.”
  - type: text
    content: and groom yourself and realize that your Father in the secret place is the one who is watching all that you do in secret and will continue to reward you.”
  - type: heading
    content: Treasures in Heaven
  '19':
  - type: text
    content: “Don’t keep hoarding for yourselves earthly treasures that can be stolen by thieves. Material wealth eventually rusts, decays, and loses its value.
  - type: text
    content: ' '
  - type: note
    content: Or “where rust and moth destroy.”
  '2':
  - type: text
    content: So when you give to the poor, don’t announce it and make a show of it just to be seen by people,
  - type: text
    content: ' '
  - type: note
    content: Or “blow your own horn.”
  - type: text
    content: like the hypocrites
  - type: text
    content: ' '
  - type: note
    content: The Greek word hupokrites is not only used for people with double standards, it actually means “overcritical,” “nitpicking,” “splitting hairs over religious issues.”
  - type: text
    content: in the streets and in the marketplace.
  - type: text
    content: ' '
  - type: note
    content: As translated from Aramaic and Hebrew Matthew. The Greek is “synagogues.”
  - type: text
    content: They’ve already received their reward!
  - type: text
    content: ' '
  '20':
  - type: text
    content: Instead, stockpile heavenly treasures
  - type: text
    content: ' '
  - type: note
    content: Heavenly treasures are eternal realities, such as loving others and doing good, revealing truth, and bringing Christ’s light to the lost. None of these “treasures” can be stolen or ever lose their value.
  - type: text
    content: for yourselves that cannot be stolen and will never rust, decay, or lose their value.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For your heart will always pursue what you esteem as your treasure.
  - type: note
    content: Or “For your thoughts [heart] will always be focused on your treasure.”
  '22':
  - type: text
    content: “The eyes of your spirit allow revelation-light
  - type: text
    content: ' '
  - type: note
    content: Or “Your eye is like a lamp for your body.” The teachings of Jesus are the “revelation-light” referred to here. Some scholars see “healthy eyes” as a Semitic figure of speech for generosity, due to the context of giving and money in the verses before and after.
  - type: text
    content: to enter into your being. If your heart is unclouded, the light floods in!
  - type: text
    content: ' '
  '23':
  - type: text
    content: But if your eyes are focused on money,
  - type: text
    content: ' '
  - type: note
    content: An “evil” eye can also be associated with being stingy and greedy.
  - type: text
    content: the light cannot penetrate and darkness takes its place.
  - type: text
    content: ' '
  - type: note
    content: Or “If your eye is healthy [focused], your whole body is full of light; but if it is sick (evil), your body is full of darkness.” The “eye” becomes a metaphor for spiritual perception. The “body” is our spirit. The “light” is Jesus’ teachings. The “darkness” is formed by the lies and opinions that blind us. These obvious metaphors have been made explicit in this translation.
  - type: text
    content: How profound will be the darkness within you
  - type: text
    content: ' '
  - type: note
    content: Hebrew Matthew is “All your ways are dark.”
  - type: text
    content: if the light of truth cannot enter!
  '24':
  - type: text
    content: “How could you worship two gods at the same time? You will have to hate one and love the other, or be devoted to one and despise the other. You can’t worship the true God while enslaved to the god of money!”
  - type: note
    content: Or “God and mammon.” Mammon is an Aramaic term for money. See 1 Tim. 6:6–10. There is found after v. 24 a part of the agrapha that reads, “If you do not fast from the world, you will never discover the kingdom of God” (Oxyrhyncus Papyrus 655, pOxy 1:4–11).
  - type: heading
    content: Don’t Worry
  '25':
  - type: text
    content: “This is why I tell you to never be worried about your life, for all that you need will be provided, such as food, water, clothing—everything your body needs. Isn’t there more to your life than a meal? Isn’t your body more than clothing?
  '26':
  - type: text
    content: “Consider the birds—do you think they worry about their existence? They don’t plant or reap or store up food, yet your heavenly Father provides them each with food. Aren’t you much more valuable to your Father than they?
  - type: text
    content: ' '
  '27':
  - type: text
    content: So, which one of you by worrying could add anything to your life?
  - type: note
    content: The Aramaic and Hebrew Matthew is “add a cubit to your height.” The Greek is “add one hour to your lifespan.”
  '28':
  - type: text
    content: “And why would you worry about your clothing? Look at all the beautiful flowers of the field. They don’t work or toil,
  - type: text
    content: ' '
  '29':
  - type: text
    content: and yet not even Solomon in all his splendor was robed in beauty like one of these!
  - type: text
    content: ' '
  '3':
  - type: text
    content: But when you demonstrate generosity, do it with pure motives and without drawing attention to yourself.
  - type: text
    content: ' '
  - type: note
    content: Or “Don’t let your left hand know what your right hand is doing.” This is a figure of speech for giving with pure motives, not to be seen and applauded by others.
  '30':
  - type: text
    content: So if God has clothed the meadow with hay, which is here for such a short time and then dried up and burned, won’t he provide for you the clothes you need—you of little faith?
  '31':
  - type: text
    content: “So then, forsake your worries! Why would you say, ‘What will we eat?’ or ‘What will we drink?’ or ‘What will we wear?’
  - type: text
    content: ' '
  '32':
  - type: text
    content: For that is what the unbelievers
  - type: text
    content: ' '
  - type: note
    content: Or “Gentiles.”
  - type: text
    content: chase after. Doesn’t your heavenly Father already know the things your bodies require?
  - type: note
    content: 'There is a part of the agrapha inserted here, which is confirmed by a number of church fathers who had access to more ancient manuscripts, that reads “So if you ask for the great things, God will add to you the little things.” This is most likely from a variation of the Hebrew Matthew. (Clement of Alexandria, Stromateis 1.24.158; Origen, Commentary on the Pss. 4.4; De Oratione 2.2; 14.1; Eusebius, Commentary on the Pss. 16.2. See also Craig A. Evans, Fabricating Jesus: How Modern Scholars Distort the Gospels [IVP Press, 2006], 236–238.)'
  '33':
  - type: text
    content: “So above all, constantly seek God’s kingdom
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “Above all, pray for the kingdom realm of God.”
  - type: text
    content: and his righteousness, then all these less important things will be given to you abundantly.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  '34':
  - type: text
    content: Refuse to worry about tomorrow, but deal with each challenge that comes your way, one day at a time.
  - type: text
    content: ' '
  - type: note
    content: Or “One day’s trouble is enough for one day.”
  - type: text
    content: Tomorrow will take care of itself.”
  '4':
  - type: text
    content: Give secretly and your Father, who sees all you do, will reward you openly.”
  - type: note
    content: As translated from the Aramaic and Hebrew Matthew. Most Greek manuscripts do not include the word openly.
  - type: heading
    content: Prayer
  '5':
  - type: text
    content: “Whenever you pray, be sincere and not like the pretenders who love the attention they receive while praying before others in the meetings and on street corners. Believe me, they’ve already received their reward.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But whenever you pray, go into your innermost chamber and be alone with Father God,
  - type: text
    content: ' '
  - type: note
    content: Or “Go into your inner room [storehouse], close the door, and pray.” This “inner room” can also be a metaphor for praying from the heart, from our innermost being, our storehouse.
  - type: text
    content: praying to him in secret. And your Father, who sees all you do, will reward you openly.
  - type: text
    content: ' '
  '7':
  - type: text
    content: When you pray, there is no need to repeat empty phrases, praying like the Gentiles do, for they expect God to hear them because of their many words.
  - type: text
    content: ' '
  '8':
  - type: text
    content: There is no need to imitate them, since your Father already knows what you need before you ask him.
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Pray like this:'
  - type: text
    content: ‘Our Beloved Father,
  - type: text
    content: ' '
  - type: note
    content: Jesus invites us into the same relationship with the Father, as His Abba.
  - type: text
    content: dwelling in the heavenly realms,
  - type: text
    content: may the glory of your name
  - type: text
    content: be the center on which our lives turn.
  - type: note
    content: An alternate reading of the Aramaic text. The Aramaic word for “name” is shema (the Hebrew word, shem), a word with multiple meanings. It can also be translated “light,” “sound,” or “atmosphere.” Placing a light, like a lantern, in an enclosed space magnifies that light. This is the meaning here of God’s name being made sacred and magnified as we focus our lives on him. The Greek is “treated as holy.”
