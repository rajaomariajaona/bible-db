          text: Or “If your eye is healthy [focused], your whole body is full of light; but if it is sick (evil), your body is full of darkness.” The “eye” becomes a metaphor for spiritual perception. The “body” is our spirit. The “light” is Jesus’ teachings. The “darkness” is formed by the lies and opinions that blind us. These obvious metaphors have been made explicit in this translation.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How profound will be the darkness within you
    - type: text
