    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This is why I tell you to never be worried about your life, for all that you need will be provided, such as food, water, clothing—everything your body needs. Isn’t there more to your life than a meal? Isn’t your body more than clothing?
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Consider the birds—do you think they worry about their existence? They don’t plant or reap or store up food, yet your heavenly Father provides them each with food. Aren’t you much more valuable to your Father than they?
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So, which one of you by worrying could add anything to your life?
    - type: usfm
