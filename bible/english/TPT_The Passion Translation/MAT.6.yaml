          text: Or “Your eye is like a lamp for your body.” The teachings of Jesus are the “revelation-light” referred to here. Some scholars see “healthy eyes” as a Semitic figure of speech for generosity, due to the context of giving and money in the verses before and after.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
