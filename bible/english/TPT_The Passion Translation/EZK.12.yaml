document_id: EZK.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel Acts Like a Refugee
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 12:1–14:11 is the third panel (C) in the chiastic parallel structure in Ezekiel. This section contains indictments of the corruption of Israel’s leaders, their condemnation, and their judgment. There is also the implied destruction and desecration of the temple in Jerusalem, along with the promised destruction of all the cities and towns in the land (see 12:20). This section—panel C—constitutes the contrasting parallel with panel C1 in chs. 40–42, containing the visionary plans for the “ideal” Jerusalem temple. These “plans” contain details of the ideal environment for Israel’s godly leaders in the new covenant age, who will lead the nation in a renewed spirit of true worship.
  - type: text
    content: 'The word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' was revealed to me: '
  '10':
  - type: text
    content: 'Answer them with these words: ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you that this prophetic oracle from God concerns the ruler '
  - type: note
    content: Or “prince,” that is, King Zedekiah.
  - type: text
    content: in Jerusalem and all the people who live there.’
  '11':
  - type: text
    content: '“Tell them, ‘I am a sign '
  - type: note
    content: Or “miracle,” from a root word that means “bright” or “beautiful.”
  - type: text
    content: 'for you, for what I did is what is going to happen to them.’ They will be deported into exile. '
  '12':
  - type: text
    content: 'Their ruler will shoulder his pack, and they will dig a hole in the wall to let him out at night. He will cover his face so that he cannot see the land he is leaving. '
  '13':
  - type: text
    content: 'I will throw my net over him and trap him in it. '
  - type: note
    content: God’s “net” was the Babylonian army.
  - type: text
    content: 'I will take him to Babylon, to the land of the Chaldeans, where he will die without having seen it. '
  - type: note
    content: They blinded King Zedekiah (see 2 Kings 25:7) so that he was unable to see the land where they took him. Josephus writes that Ezekiel sent a copy of this prophecy to King Zedekiah, but the king rejected the word as false (see Ant. 10.100.7).
  '14':
  - type: text
    content: 'And I will scatter in every direction all his attendants, officials, and his armies, and I will chase after them with the sword. '
  '15':
  - type: text
    content: 'When I scatter them among different nations and peoples, they will recognize that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'But I will let a few of them escape the sword, plague, and food shortages. I will let them live so that they can describe all their terrible actions to the people in the lands where they will go. And they will recognize that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: Eating and Drinking with Fear
  '17':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying: '
  '18':
  - type: text
    content: '“Son of man, eat your food with quaking and trembling. Shudder with fear as you drink your water. '
  '19':
  - type: text
    content: 'Tell the people, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this to the inhabitants of Jerusalem who remain in the land of Israel. They will tremble as they eat their food, and shake with fear when they drink their water because their enemies will strip the land bare on account of the violence of those who live there. '
  '2':
  - type: text
    content: '“Son of man, you are living among a rebellious people. They have eyes, but they will not see; they have ears, but they will not hear '
  - type: note
    content: They had eyes but could not see the goodness of God and his care for their lives. They had ears but could not hear his words of warning.
  - type: text
    content: 'because they are bent on rebellion. '
  '20':
  - type: text
    content: 'When your populous cities have been destroyed and the countryside has been deserted, then you will recognize that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: The Visions Will Come True
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '22':
  - type: text
    content: '“Son of man, what do you understand of the proverb you say among yourselves in the land of Israel, ‘Time goes by, and these visions never happen’? '
  '23':
  - type: text
    content: 'Very well, tell them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: I will put an end to this proverb, and it will never be repeated in Israel again.’ Tell them instead: ‘The time has arrived for every vision to come true, '
  '24':
  - type: text
    content: 'for there will be no more false visions or deceptive prophecy among the people of Israel. '
  '25':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will speak the word, and what I say will come true without delay. For what I speak, I will accomplish in your own lifetime, you tribe of rebels. For I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken!’ ”'
  '26':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '27':
  - type: text
    content: '“Son of man, behold, the people of Israel are saying that your visions and prophecies are about the distant future, '
  - type: text
    content: not today
  - type: text
    content: '. They say, ‘He is prophesying of times in the distant future.’ '
  '28':
  - type: text
    content: 'So tell them, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: There will be no more delay. My words will be fulfilled now! What I have prophesied will be done. Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken!’ ”'
  '3':
  - type: text
    content: 'Therefore, son of man, pack a small bundle of your belongings and leave your home before nightfall. Let everyone see you go into exile. And go somewhere else, like you are a prisoner of war, while they watch you depart. Then perhaps they will understand that they are a rebellious people. '
  '4':
  - type: text
    content: 'While everyone is watching, pack your things like a refugee’s bundle, by daylight, and leave like an exile at sunset. '
  - type: note
    content: People in hot and arid climates would only begin their journey in the evening when the heat subsided.
  '5':
  - type: text
    content: 'Dig through the wall of your house and crawl out, carrying the bag with you. '
  - type: note
    content: The walls of the homes in Babylon were made of dried mud bricks that could easily be broken through. Ezekiel’s actions became a parable of the broken-down walls of Jerusalem through which the Jews went when the Babylonians took them as prisoners of war.
  - type: text
    content: 'Make sure everyone is watching. '
  '6':
  - type: text
    content: 'Let them watch as you shoulder your pack and go out into the dusk. And cover your face so that you cannot see the land you are leaving since I have made you a walking parable—a sign '
  - type: text
    content: to warn
  - type: text
    content: ' the people of Israel.”'
  '7':
  - type: text
    content: So, I did as I had been told. I packed my bag like an exile’s bundle, by daylight. And that evening, I dug a hole through the wall with my hands. Then while everyone watched, I shouldered my pack and went out into the dark.
  '8':
  - type: text
    content: 'The next morning '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '9':
  - type: text
    content: '“Son of man, did not the rebellious Israelites ask you, ‘What are you doing?’ '
