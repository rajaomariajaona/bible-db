document_id: EZK.12,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezekiel Acts Like a Refugee
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezekiel 12:1–14:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the third panel (C) in the chiastic parallel structure in Ezekiel. This section contains indictments of the corruption of Israel’s leaders, their condemnation, and their judgment. There is also the implied destruction and desecration of the temple in Jerusalem, along with the promised destruction of all the cities and towns in the land (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This section—panel C—constitutes the contrasting parallel with panel C
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 40–42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', containing the visionary plans for the “ideal” Jerusalem temple. These “plans” contain details of the ideal environment for Israel’s godly leaders in the new covenant age, who will lead the nation in a renewed spirit of true worship.'
      marker-yv: yv-n
    - type: text
      text: 'The word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' was revealed to me: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Answer them with these words: ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you that this prophetic oracle from God concerns the ruler '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “prince,” that is, King Zedekiah.
      marker-yv: yv-n
    - type: text
      text: in Jerusalem and all the people who live there.’
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Tell them, ‘I am a sign '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “miracle,” from a root word that means “bright” or “beautiful.”
      marker-yv: yv-n
    - type: text
      text: 'for you, for what I did is what is going to happen to them.’ They will be deported into exile. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their ruler will shoulder his pack, and they will dig a hole in the wall to let him out at night. He will cover his face so that he cannot see the land he is leaving. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will throw my net over him and trap him in it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s “net” was the Babylonian army.
      marker-yv: yv-n
    - type: text
      text: 'I will take him to Babylon, to the land of the Chaldeans, where he will die without having seen it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They blinded King Zedekiah (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 25:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) so that he was unable to see the land where they took him. Josephus writes that Ezekiel sent a copy of this prophecy to King Zedekiah, but the king rejected the word as false (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ant.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.100.7).
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I will scatter in every direction all his attendants, officials, and his armies, and I will chase after them with the sword. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I scatter them among different nations and peoples, they will recognize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I will let a few of them escape the sword, plague, and food shortages. I will let them live so that they can describe all their terrible actions to the people in the lands where they will go. And they will recognize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eating and Drinking with Fear
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, eat your food with quaking and trembling. Shudder with fear as you drink your water. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tell the people, ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says this to the inhabitants of Jerusalem who remain in the land of Israel. They will tremble as they eat their food, and shake with fear when they drink their water because their enemies will strip the land bare on account of the violence of those who live there. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, you are living among a rebellious people. They have eyes, but they will not see; they have ears, but they will not hear '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They had eyes but could not see the goodness of God and his care for their lives. They had ears but could not hear his words of warning.
      marker-yv: yv-n
    - type: text
      text: 'because they are bent on rebellion. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When your populous cities have been destroyed and the countryside has been deserted, then you will recognize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Visions Will Come True
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, what do you understand of the proverb you say among yourselves in the land of Israel, ‘Time goes by, and these visions never happen’? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Very well, tell them, ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says this: I will put an end to this proverb, and it will never be repeated in Israel again.’ Tell them instead: ‘The time has arrived for every vision to come true, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for there will be no more false visions or deceptive prophecy among the people of Israel. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', will speak the word, and what I say will come true without delay. For what I speak, I will accomplish in your own lifetime, you tribe of rebels. For I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken!’ ”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me again, saying, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, behold, the people of Israel are saying that your visions and prophecies are about the distant future, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: not today
    - type: text
      text: '. They say, ‘He is prophesying of times in the distant future.’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So tell them, ‘Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: There will be no more delay. My words will be fulfilled now! What I have prophesied will be done. Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has spoken!’ ”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, son of man, pack a small bundle of your belongings and leave your home before nightfall. Let everyone see you go into exile. And go somewhere else, like you are a prisoner of war, while they watch you depart. Then perhaps they will understand that they are a rebellious people. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While everyone is watching, pack your things like a refugee’s bundle, by daylight, and leave like an exile at sunset. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: People in hot and arid climates would only begin their journey in the evening when the heat subsided.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dig through the wall of your house and crawl out, carrying the bag with you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The walls of the homes in Babylon were made of dried mud bricks that could easily be broken through. Ezekiel’s actions became a parable of the broken-down walls of Jerusalem through which the Jews went when the Babylonians took them as prisoners of war.
      marker-yv: yv-n
    - type: text
      text: 'Make sure everyone is watching. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let them watch as you shoulder your pack and go out into the dusk. And cover your face so that you cannot see the land you are leaving since I have made you a walking parable—a sign '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to warn
    - type: text
      text: ' the people of Israel.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So, I did as I had been told. I packed my bag like an exile’s bundle, by daylight. And that evening, I dug a hole through the wall with my hands. Then while everyone watched, I shouldered my pack and went out into the dark.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next morning '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me, saying, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, did not the rebellious Israelites ask you, ‘What are you doing?’ '
