    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “confesses that Jesus Christ is come in the flesh.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Everyone who does not acknowledge that Jesus is from God has the spirit of antichrist, which you heard was coming and is already active in the world.
