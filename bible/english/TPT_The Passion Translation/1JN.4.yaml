        text: The Aramaic can be translated “we will have open faces on the day of judgment.” For the true believer filled with God’s love, the day of judgment is not to be feared but looked forward to, for perfect love will have made us completely like Christ. Love provides us with no reason to fear the future or to fear punishment from God. See
