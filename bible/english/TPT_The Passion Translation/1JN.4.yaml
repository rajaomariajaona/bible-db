        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the devil. We have the Word of God, the Holy Spirit, the favor of God, and Jesus Christ. Within us is more than enough power to overcome the evil in this world. John uses the word
    - type: usfm
