    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) more than any other New Testament writer (104 times) to convey the concept of this world system or world order. One could describe it as “the culture of the world.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They belong to this world and they articulate the spirit of this world, and the world listens to them. '
  - type: usfm
