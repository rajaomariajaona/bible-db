    - type: text
      text: '20'
  - type: text
    text: 'Anyone can say, “I love God,” yet have hatred toward another believer. This makes him a phony, because if you don’t love a brother or sister, whom you can see, how can you truly love God, whom you can’t see? '
  - type: usfm
