      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although “what they say” is implied, it is clear that John is speaking of those who prophesy, and it is made explicit by the mention of “false prophets.”
    marker-yv: yv-n
  - type: text
    text: 'to determine if they are of God, because many false prophets have mingled into the world. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Here’s the test for those with the genuine Spirit of God: they will confess Jesus as the Christ who has come in the flesh. '
