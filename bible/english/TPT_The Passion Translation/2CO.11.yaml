document_id: 2CO.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Virgin Bride of Christ
  - type: text
    content: Now, please bear with some of my “craziness” for a moment. Yes, please be patient with me.
  '10':
  - type: text
    content: 'As the reality of Christ lives within me, my glad boast '
  - type: text
    content: of offering the gospel free of charge
  - type: text
    content: ' will not be silenced throughout the region of Achaia. '
  - type: note
    content: That is, the region where Corinth was located.
  '11':
  - type: text
    content: 'Why? Is it because I have no love for you? God knows how much I love you! '
  '12':
  - type: text
    content: 'But in order to eliminate the opportunity for those “super-apostles” to boast that their ministry is on the same level as ours I will continue this practice. '
  '13':
  - type: text
    content: 'For they are not true apostles but deceitful '
  - type: note
    content: Or “dishonest.”
  - type: text
    content: 'ministers who masquerade as “special apostles” '
  - type: note
    content: Or “who change their form into super-apostles.”
  - type: text
    content: 'of the Anointed One. '
  '14':
  - type: text
    content: 'That doesn’t surprise us, for even Satan transforms himself to appear as an angel of light! '
  - type: note
    content: In the Jewish pseudepigraphical book, Apocalypse of Moses, the temptation of Eve is given, and it includes Satan masquerading himself as an angel of light. In the same way, these false apostles were claiming to be sent from Christ but were peddling another gospel.
  '15':
  - type: text
    content: So it’s no wonder his servants also go about pretending to be ministers of righteousness. But in the end they will be exposed and get exactly what they deserve.
  - type: heading
    content: Paul Speaks as a “Fool”
  '16':
  - type: text
    content: 'So I repeat. Let no one think that I’m a fool. But if you do, at least show me the patience you would show a fool, so that I too may boast a little. '
  '17':
  - type: text
    content: 'Of course, what I’m about to tell you is not with the Lord’s authority, but as a “fool.” '
  '18':
  - type: text
    content: 'For since many love to boast about their worldly achievements, '
  - type: note
    content: Or “after the flesh” (according to earthly distinctions).
  - type: text
    content: 'allow me the opportunity to join them. '
  '19':
  - type: text
    content: 'And since you are so smart and so wise to gladly put up with the foolishness of others, '
  - type: text
    content: now put up with mine
  - type: text
    content: '. '
  '2':
  - type: text
    content: You need to know that
  - type: text
    content: ' God’s passion '
  - type: note
    content: Or “godly jealousy.”
  - type: text
    content: 'is burning inside me for you, because, like a loving father, I have pledged your hand in marriage to Christ, your true bridegroom. I’ve also promised that I would present his fiancée to him as a pure virgin bride. '
  - type: note
    content: Paul uses the imagery of a bride and bridegroom to describe our relationship to Christ. See Hos. 2:19–20; John 3:29–30; Eph. 5:25–27; Rev. 19:6–8; 21.
  '20':
  - type: text
    content: 'You actually allow these imposters to put you into bondage, take complete advantage of you, and rob you blind! How easily you endure those who, in their arrogance, destroy your dignity or even slap you in the face. '
  '21':
  - type: text
    content: I must admit, to our shame that we were too “weak” to relate to you the way they do. But now let me dare to boast like a “fool.”
  - type: heading
    content: Paul Boasts in His Sufferings for Christ
  '22':
  - type: text
    content: 'Are these “super-apostles” of yours Hebrews? I am too. Are they Israelites? So am I. Are they descendants of Abraham? Me too! '
  '23':
  - type: text
    content: Are they servants of the Anointed One? I’m beside myself when I speak this way, but I am much more of a servant than they. I have worked much harder for God, taken more beatings, and been dragged to more prisons than they. I’ve been flogged excessively, multiple times, even to the point of death.
  - type: note
    content: See 1 Cor. 15:31; 2 Cor. 4:11.
  '24':
  - type: text
    content: 'Five times I’ve received thirty-nine lashes from the Jewish leaders. '
  - type: note
    content: Or “forty lashes minus one.” Paul received a total of 195 lashings in his lifetime. It was the custom that if anyone was sentenced to lashings, the punishers must ensure that they did not exceed forty, so they only struck the victim thirty-nine times. See Deut. 25:3.
  '25':
  - type: text
    content: 'Three times I experienced being beaten with rods. '
  - type: note
    content: See Acts 16:22–23.
  - type: text
    content: 'Once they stoned me. '
  - type: note
    content: See Acts 14:19.
  - type: text
    content: 'Three times I’ve been shipwrecked; '
  - type: note
    content: Since the shipwreck mentioned in Acts 27:39–44 happened after Paul wrote to the Corinthians, his total shipwrecks were four. Apparently the three he mentions here took place during his earlier missionary journeys. Some have calculated that Paul had made eight or nine voyages at the time of this writing.
  - type: text
    content: 'for an entire night and a day I was adrift in the open sea. '
  '26':
  - type: text
    content: 'In my difficult travels I’ve faced many dangerous situations: perilous rivers, robbers, foreigners, and even my own people. I’ve survived deadly peril in the city, in the wilderness, with storms at sea, and with spies posing as believers. '
  '27':
  - type: text
    content: I’ve toiled to the point of exhaustion and gone through many sleepless nights. I’ve frequently been deprived of food and water, left hungry and shivering out in the cold, lacking proper clothing.
  - type: note
    content: In vv. 23–27 Paul uses his experiences of enduring suffering and hardships as the validation of his apostolic ministry. He would one day sacrifice his life for the gospel while in Rome. In ch. 12 Paul will use visions and spiritual encounters from God to further validate his role as an apostle of Christ.
  '28':
  - type: text
    content: 'And besides these painful circumstances, I have the daily pressure of my responsibility for all the churches, with a deep concern weighing heavily on my heart for their welfare. '
  '29':
  - type: text
    content: I am not aloof
  - type: text
    content: ', for who is '
  - type: text
    content: desperate and
  - type: text
    content: ' weak and I do not feel their weakness? Who is led astray into sin and I do not burn with zeal '
  - type: text
    content: to restore him
  - type: text
    content: '?'
  - type: note
    content: Or “ablaze with anger.”
  '3':
  - type: text
    content: 'But now I’m afraid that just as Eve was deceived by the serpent’s clever lies, your thoughts may be corrupted and you may lose your single-hearted devotion and pure love for Christ. '
  '30':
  - type: text
    content: 'If boasting is necessary, I will boast about examples of my weakness. '
  '31':
  - type: text
    content: 'The God and Father of the Lord Jesus, who is eternally praised, knows that I am speaking the truth. '
  '32':
  - type: text
    content: 'Once, when I was in Damascus, the governor '
  - type: note
    content: Or “ethnarch,” a politically appointed leader over a specific ethnic group, who represents the king.
  - type: text
    content: 'under King Aretas '
  - type: note
    content: He was the father-in-law of Herod Antipas.
  - type: text
    content: 'had his troops searching for me to have me arrested, '
  '33':
  - type: text
    content: 'but I was stuffed in a basket '
  - type: note
    content: This was a large, braided wicker basket. Humiliated by this ordeal, one could say that Paul was a “basket case.”
  - type: text
    content: and lowered down through a window and managed to escape.
  '4':
  - type: text
    content: 'For you seem to gladly tolerate anyone '
  - type: note
    content: Or possibly a reference to “the serpent.”
  - type: text
    content: who comes to you preaching a pseudo-Jesus, not the Jesus we have preached. You have accepted a spirit and gospel that is false, rather than the Spirit and gospel you once embraced. How tolerant you have become of these imposters!
  - type: heading
    content: Super-Apostles?
  '5':
  - type: text
    content: 'Now, I believe that I am not inferior in any way to these special “super-apostles” '
  - type: note
    content: Or “hyper-apostles.”
  - type: text
    content: 'you are attracted to. '
  '6':
  - type: text
    content: For although I may not be a polished or eloquent speaker, I’m certainly not an amateur in revelation knowledge. Indeed, we have demonstrated this to you time and again.
  '7':
  - type: text
    content: 'Have I committed a sin by degrading myself to dignify you? Was I wrong to preach the gospel of God to you free of charge? '
  - type: note
    content: Paul received financial support for preaching the gospel and could have asked the Corinthians to support him (Matt. 10:10). But while among them, he refused to receive their gifts and relied on other churches to support him. He did this to set himself apart from the “super-apostles” in Corinth and to demonstrate that his ministry would not be bought.
  '8':
  - type: text
    content: 'I received ample financial support from other churches just so that I could '
  - type: text
    content: freely
  - type: text
    content: ' serve you. '
  '9':
  - type: text
    content: 'Remember, when I was with you I didn’t bother anyone when I needed money, for my needs were always supplied by my Macedonian friends. '
  - type: note
    content: Or “the brothers.” This was most likely from the church of Philippi. See Phil. 4:15–16.
  - type: text
    content: So I was careful, and will continue to be careful, that I never become a burden to you in any way.
