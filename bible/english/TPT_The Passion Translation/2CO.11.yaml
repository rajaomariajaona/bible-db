document_id: 2CO.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Virgin Bride of Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Now, please bear with some of my “craziness” for a moment. Yes, please be patient with me.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'As the reality of Christ lives within me, my glad boast '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of offering the gospel free of charge
    - type: text
      text: ' will not be silenced throughout the region of Achaia. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the region where Corinth was located.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Why? Is it because I have no love for you? God knows how much I love you! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'But in order to eliminate the opportunity for those “super-apostles” to boast that their ministry is on the same level as ours I will continue this practice. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For they are not true apostles but deceitful '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dishonest.”
      marker-yv: yv-n
    - type: text
      text: 'ministers who masquerade as “special apostles” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who change their form into super-apostles.”
      marker-yv: yv-n
    - type: text
      text: 'of the Anointed One. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'That doesn’t surprise us, for even Satan transforms himself to appear as an angel of light! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Jewish pseudepigraphical book,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Apocalypse of Moses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the temptation of Eve is given, and it includes Satan masquerading himself as an angel of light. In the same way, these false apostles were claiming to be sent from Christ but were peddling another gospel.'
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: So it’s no wonder his servants also go about pretending to be ministers of righteousness. But in the end they will be exposed and get exactly what they deserve.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Speaks as a “Fool”
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So I repeat. Let no one think that I’m a fool. But if you do, at least show me the patience you would show a fool, so that I too may boast a little. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Of course, what I’m about to tell you is not with the Lord’s authority, but as a “fool.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For since many love to boast about their worldly achievements, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “after the flesh” (according to earthly distinctions).
      marker-yv: yv-n
    - type: text
      text: 'allow me the opportunity to join them. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And since you are so smart and so wise to gladly put up with the foolishness of others, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: now put up with mine
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: it
      children:
      - type: text
        text: You need to know that
    - type: text
      text: ' God’s passion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “godly jealousy.”
      marker-yv: yv-n
    - type: text
      text: 'is burning inside me for you, because, like a loving father, I have pledged your hand in marriage to Christ, your true bridegroom. I’ve also promised that I would present his fiancée to him as a pure virgin bride. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses the imagery of a bride and bridegroom to describe our relationship to Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 2:19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:29–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:25–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 19:6–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'You actually allow these imposters to put you into bondage, take complete advantage of you, and rob you blind! How easily you endure those who, in their arrogance, destroy your dignity or even slap you in the face. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I must admit, to our shame that we were too “weak” to relate to you the way they do. But now let me dare to boast like a “fool.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Boasts in His Sufferings for Christ
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Are these “super-apostles” of yours Hebrews? I am too. Are they Israelites? So am I. Are they descendants of Abraham? Me too! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Are they servants of the Anointed One? I’m beside myself when I speak this way, but I am much more of a servant than they. I have worked much harder for God, taken more beatings, and been dragged to more prisons than they. I’ve been flogged excessively, multiple times, even to the point of death.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Five times I’ve received thirty-nine lashes from the Jewish leaders. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “forty lashes minus one.” Paul received a total of 195 lashings in his lifetime. It was the custom that if anyone was sentenced to lashings, the punishers must ensure that they did not exceed forty, so they only struck the victim thirty-nine times. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 25:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Three times I experienced being beaten with rods. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 16:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Once they stoned me. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 14:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Three times I’ve been shipwrecked; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Since the shipwreck mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 27:39–44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: happened after Paul wrote to the Corinthians, his total shipwrecks were four. Apparently the three he mentions here took place during his earlier missionary journeys. Some have calculated that Paul had made eight or nine voyages at the time of this writing.
      marker-yv: yv-n
    - type: text
      text: 'for an entire night and a day I was adrift in the open sea. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'In my difficult travels I’ve faced many dangerous situations: perilous rivers, robbers, foreigners, and even my own people. I’ve survived deadly peril in the city, in the wilderness, with storms at sea, and with spies posing as believers. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: I’ve toiled to the point of exhaustion and gone through many sleepless nights. I’ve frequently been deprived of food and water, left hungry and shivering out in the cold, lacking proper clothing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses his experiences of enduring suffering and hardships as the validation of his apostolic ministry. He would one day sacrifice his life for the gospel while in Rome. In ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul will use visions and spiritual encounters from God to further validate his role as an apostle of Christ.
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'And besides these painful circumstances, I have the daily pressure of my responsibility for all the churches, with a deep concern weighing heavily on my heart for their welfare. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I am not aloof
    - type: text
      text: ', for who is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: desperate and
    - type: text
      text: ' weak and I do not feel their weakness? Who is led astray into sin and I do not burn with zeal '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to restore him
    - type: text
      text: '?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ablaze with anger.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'But now I’m afraid that just as Eve was deceived by the serpent’s clever lies, your thoughts may be corrupted and you may lose your single-hearted devotion and pure love for Christ. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'If boasting is necessary, I will boast about examples of my weakness. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The God and Father of the Lord Jesus, who is eternally praised, knows that I am speaking the truth. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Once, when I was in Damascus, the governor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ethnarch,” a politically appointed leader over a specific ethnic group, who represents the king.
      marker-yv: yv-n
    - type: text
      text: 'under King Aretas '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: He was the father-in-law of Herod Antipas.
      marker-yv: yv-n
    - type: text
      text: 'had his troops searching for me to have me arrested, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'but I was stuffed in a basket '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a large, braided wicker basket. Humiliated by this ordeal, one could say that Paul was a “basket case.”
      marker-yv: yv-n
    - type: text
      text: and lowered down through a window and managed to escape.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For you seem to gladly tolerate anyone '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or possibly a reference to “the serpent.”
      marker-yv: yv-n
    - type: text
      text: who comes to you preaching a pseudo-Jesus, not the Jesus we have preached. You have accepted a spirit and gospel that is false, rather than the Spirit and gospel you once embraced. How tolerant you have become of these imposters!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Super-Apostles?
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now, I believe that I am not inferior in any way to these special “super-apostles” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hyper-apostles.”
      marker-yv: yv-n
    - type: text
      text: 'you are attracted to. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For although I may not be a polished or eloquent speaker, I’m certainly not an amateur in revelation knowledge. Indeed, we have demonstrated this to you time and again.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Have I committed a sin by degrading myself to dignify you? Was I wrong to preach the gospel of God to you free of charge? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul received financial support for preaching the gospel and could have asked the Corinthians to support him (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). But while among them, he refused to receive their gifts and relied on other churches to support him. He did this to set himself apart from the “super-apostles” in Corinth and to demonstrate that his ministry would not be bought.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'I received ample financial support from other churches just so that I could '
    - type: usfm
      marker: it
      children:
      - type: text
        text: freely
    - type: text
      text: ' serve you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Remember, when I was with you I didn’t bother anyone when I needed money, for my needs were always supplied by my Macedonian friends. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the brothers.” This was most likely from the church of Philippi. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 4:15–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: So I was careful, and will continue to be careful, that I never become a burden to you in any way.
