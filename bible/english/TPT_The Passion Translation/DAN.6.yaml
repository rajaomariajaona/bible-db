    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an Aramaic play on words in this verse that is missing from most translations. It is literally “Those who chewed up the pieces of Daniel [slandered him] . . . were chewed up [had their bones crunched] by the lions!” The Jewish midrash states that Daniel’s accusers were suggesting to the king that the lions were not hungry. Darius replied, “If so, go down and spend the night with them to see if they are not hungry!” (See Shocher Tov 64.)
    marker-yv: yv-n
