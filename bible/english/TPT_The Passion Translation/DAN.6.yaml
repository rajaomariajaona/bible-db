    text: 'All the officials of your kingdom—your high officials, administrators, advisers, and governors—we are all agreed that by royal decree the following prohibition should be enforced strictly: for thirty days, no one is to pray to any god or man except to you, O king; otherwise, he must be thrown into the lions’ den. '
