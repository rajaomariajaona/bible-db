    - type: usfm
      marker: ft
      children:
      - type: text
        text: This moment shows Daniel clearly as a type of the one who is greater than himself, Jesus Christ. Like Daniel, Jesus was blameless, a righteous man who was destined to rule. Daniel and Jesus were men of prayer. As with Daniel, the “officials” who sought to eliminate Jesus could find no cause or basis for their accusation. Both Jesus and Daniel were placed into sealed tombs. Yet both men “rose” again and were given favor and rulership. The life of Daniel is a powerful testimony that one can remain faithful to God with integrity before others, even in a difficult environment.
    marker-yv: yv-n
