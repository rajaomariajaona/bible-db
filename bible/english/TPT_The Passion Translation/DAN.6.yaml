        text: carries the implication that Daniel’s rescue is because of love and affection. King Darius recognized that Daniel’s God loved him so much that he would not let Daniel be killed by the lions. Additionally, the Aramaic has a Piel imperfect form that serves as a reflexive. The king may have been saying, in effect, “The God who loves you so much will deliver you to protect himself.”
    marker-yv: yv-n
