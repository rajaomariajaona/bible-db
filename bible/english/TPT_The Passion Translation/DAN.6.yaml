        text: One of the ways Aramaic and Hebrew embed a word play in the text is the repetition of words. For example, the word “seek” is found seven times in this chapter in the Aramaic text, and the word “found [find]” occurs eight times. The irony is that they were seeking to entrap Daniel, but Daniel was seeking the face of God. They wanted to find fault in him, but God found him faultless. (For more on this Aramaic wordplay, see Bill T. Arnold, “Wordplay and Narrative Techniques in Daniel 5 and 6,”
