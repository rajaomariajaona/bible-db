      children:
      - type: text
        text: The lion was an ancient symbol of kingdoms, including Persia. The Persian goddess Anahita was pictured as riding on the back of a lion. The lions’ den was a symbolic execution for anyone who placed another god above Anahita. If anyone blasphemed their goddess, they would have to face the wrath of the lions. For one to survive being thrown to the lions was a powerful spiritual sign to the king and the people of the land. Daniel’s divine rescue was a significant lesson not lost on the king. He saw Daniel’s God conquer their goddess Anahita. There were likely quite a number of lions kept in the den, for the politicians and their families could have numbered two or three hundred, and they all were devoured before they hit the ground (see v.
