        text: The subject of the verb here is not indicated in Aramaic, so grammatically it may be either God or his angel that shut the lions’ mouths. Regardless, God indeed was the agent behind this miracle.
    marker-yv: yv-n
  - type: text
    text: 'I am unharmed and '
