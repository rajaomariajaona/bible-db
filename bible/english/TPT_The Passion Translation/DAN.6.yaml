        text: pictures Babylon as a lion. The entire Jewish captivity in Babylon was a type of captivity in a “lions’ den.” Daniel being thrown into that lions’ den was emblematic of the entire preceding seventy years. His miraculous rescue becomes a prophecy of the exodus of the Jews from Babylon that was soon to happen. The “mouths” (v.
