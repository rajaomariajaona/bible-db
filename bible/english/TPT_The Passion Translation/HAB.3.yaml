  '13':
  - type: text
    content: You came to save your people,
  - type: note
    content: The Hebrew for “save” is quite similar to the name Yeshua. See Matt. 1:21 and the first footnote.
  - type: text
    content: to win the victory with your Messiah.
  - type: note
    content: Or “to deliver your anointed one.”
  - type: text
    content: You crushed the head of the house of wickedness
  - type: text
    content: and stripped him from head to toe.
  - type: note
    content: See Gen. 3:15; Col. 2:15. At the cross, God struck down the leader of the land of wickedness (Satan) and stripped him of his weapons.
  - type: text
