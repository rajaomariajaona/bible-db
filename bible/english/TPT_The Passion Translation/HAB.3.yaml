  - type: note
    content: Or “spears.” The Hebrew term matteh may carry the underlying meaning “shafts,” which could refer to either arrows or spears.
  - type: text
    content: when his warriors stormed out to scatter us,
  - type: text
    content: gloating as they slaughtered their wretched victims in hiding.
  '15':
  - type: text
