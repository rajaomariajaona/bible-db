  - type: text
    content: ','
  - type: text
    content: for I have a Savior-God!
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ' is the Lord of my strength;'
  - type: text
    content: he makes my feet sure-footed as a deer
  - type: text
    content: bounding upon the high places.
  - type: note
    content: See Song. 8:14.
  - type: text
    content: These are the lyrics
  - type: text
    content: ' for the conductor '
  - type: note
    content: Or “musical director” (Hb. menatseach), which comes from a Hebrew root that means “to conquer.” This is how we fight our battles—with joy in our Savior-God, who always leads us in triumph (see 2 Cor. 2:14). The Greek Septuagint sees no line break between the last two lines of this verse. It reads “He will cause me to ride upon the high places so that I might conquer with his song.”
  - type: text
    content: of my string ensemble.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', I know the things that have made you famous.'
  - type: text
    content: I am stunned when I consider your miracles.
  - type: note
    content: Or “in awe [fear] of what you accomplished.”
  - type: text
