  - type: text
    content: ','
  - type: text
    content: 'and I will rejoice '
  - type: note
    content: The Hebrew word for “rejoice” is ʿalaz, which can also be translated “triumph.” There is a joy full of glory that triumphs over loss.
  - type: text
    content: in him.
  - type: text
    content: Yes
  - type: text
    content: ', I will dance with joy '
  - type: note
    content: The Hebrew word for “dance with joy” is gil, which means “to spin in a circle with joy.” It could be expressed by being so powerfully overtaken with joy that one sings, shouts, and spins, crying out with joyous shrieks. There is an ecstatic joy that can be found in our love relationship with God, for even if all our creature comforts are taken from us, he will never leave us.
  - type: text
