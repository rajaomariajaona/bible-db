  - type: text
    content: Yahweh
  - type: text
    content: ', show us your mercy'
  - type: text
    content: even in this time of turmoil.
  - type: heading
    content: 'A Theophany: The Manifestation of God'
  '3':
  - type: text
    content: God came from Teman,
  - type: text
    content: the Holy One from Mount Paran.
  - type: text
    content: Pause in his presence
  - type: note
    content: 'Or “Selah.” This Hebrew term cannot be translated with any certainty, and there is no scholarly consensus as to its meaning. It is found frequently in the Psalms (thirty-nine times) and may be a liturgical notation denoting a pause. In relation to this context, the word Teman means “the south.” Teman was both a person (the grandson of Esau) and a city of Edom (Adam). Teman was the home of Eliphaz, the friend of Job (see Job 2:11). Paran is a barren and mountainous region in the Sinai peninsula. The verse describes God coming up from Teman and Paran—that is, from the area where he made himself known to his people in the wilderness and where he gave them the Torah (see Ps. 68:7–8). See J. L. Mihelic, “Paran,” Interpreter’s Dictionary of the Bible, vol. 3, ed. G. A. Buttrick (Nashville, TN: 1962), 657. The word Paran is taken from a root word for “to beautify” or “to glorify.” Mount Paran can also be a metaphor of the holy realm of beauty and glory that transforms the human heart. God is the Holy One (see Isa. 1:4; 6:3; 40:25); “holy” is the Hebrew word qadosh. This may be a hint of a third location, Qadesh Barnea. Truly, there is much in the Hebrew text that would cause one to “pause in his presence.”'
  - type: text
    content: 'The heavens '
  - type: note
    content: The Hebrew word for “heavens” is shamayim, which more literally means the “sparkles on the water.” It is a metaphor used to describe the heavenly realm, the source of everything.
  - type: text
    content: blazed with the brightness of his glory
  - type: text
    content: while the earth echoed his praises.
  - type: note
    content: Or “His glory covers the skies, and the earth is filled with his praises.”
  '4':
  - type: text
    content: The brilliance of his glory is bright as the sun;
  - type: note
    content: Or “blinding as lightning.” See Pss. 4:6; 44:3; 89:17; Prov. 4:18; Isa. 60:3; Heb. 1:3.
  - type: text
    content: 'twin bolts of lightning flash from his hand '
  - type: note
    content: See Deut. 33:2–5; Ps. 18:12, 28; Ezek. 1:4, 28; 10:4. God is radically and dangerously transcendent. The Hebrew for “twin bolts of lightning” can also be translated “two horns.” The Hebrew root in its verbal form is used to describe Moses’ face shining in Ex. 34:29–30. Most modern translations render it similar to “rays of light [stream from his hand].”
  - type: text
    content: —
  - type: text
    content: there is the hiding place of his power.
  - type: note
    content: God hides his power in the palms of his hands. To experience God’s power in your life is to take the hand of God in yours. In his sunlit splendor resides his triumphant power. God’s glory both reveals his transcendence and conceals his power. Moses found the hiding place of God’s glory (see Ex. 33:18–20). Jesus’ hands took our nails. The crucified hand of Christ is the hiding place of his power.
  '5':
  - type: text
    content: A plague marched in front of him;
  - type: note
    content: This occurred in Egypt as a plague came over the land (see Ex. 7:2–4). For references of God using a plague to combat his enemies, see Ex. 5:3; 9:15; Lev. 26:25; Num. 14:12; Deut. 28:21; 2 Sam. 24:15; Jer. 14:12.
  - type: text
    content: a consuming pestilence followed at his heels.
  - type: note
    content: 'The army of Sennacherib experienced this (see 2 Kings 19:32–35). The Hebrew for “pestilence” can also mean “a darting flame” and can be used for arrows and lightning (see Ps. 78:48). See E. R. Clendenen, “Religious Background of the Old Testament,” in Foundations for Biblical Interpretation, ed. D. S. Dockery et al. (Nashville, TN: Broadman & Holman, 1994), 297.'
  '6':
  - type: text
    content: When he stood up, the earth shook.
  - type: note
    content: Or “he measured the earth.”
  - type: text
    content: At his glance, nations trembled, mountains crumbled,
  - type: text
    content: and age-old hills collapsed,
  - type: note
    content: See Pss. 97:4–6; 104:32.
  - type: text
    content: but his paths are everlasting.
  '7':
  - type: text
    content: In my vision
  - type: text
    content: ', I saw the tents of Cushan trembling in distress'
  - type: note
    content: 'Cushan was likely a Midianite nomadic tribe (clan) that lived in southern Transjordan. See O. Palmer Robertson, Nahum, Habakkuk, Zephaniah, New International Commentary on the Old Testament (Grand Rapids, MI: Wm. B. Eerdmans, 1990), 228; D. W. Baker, “Cushan,” Anchor Bible Dictionary, vol. 1 (New York: Doubleday, 1992), 1219–20.'
  - type: text
    content: and the tent curtains of the Midianites shaking in anguish.
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ', was it the rivers that made you angry'
  - type: text
    content: or stirred up your rage?
  - type: text
    content: Was it the sea that made you furious
  - type: text
    content: when you rode your horses
  - type: text
    content: and chariots of salvation?
  - type: note
    content: Horses may represent the Lord as he comes riding upon clouds bringing deliverance and victory. See Deut. 33:26; Pss. 18:9–11; 68:33; 104:3–4; Isa. 19:1. God’s chariot can be a picture of the ark of the covenant as it marched through the wilderness. The Shulamite bride of Christ rides with him in his chariot of salvation (see Song. 3:6–11).
  '9':
  - type: text
    content: Your bow is strung and ready for action,
  - type: note
    content: Or literally “nakedness your bow is laid bare.” The bow is a picture of God’s might and power in warfare.
  - type: text
    content: and with a word, you commission your arrows
  - type: text
    content: to hit their mark
  - type: text
    content: .
  - type: note
    content: 'Or “sworn in are the arrow-shafts with a word.” This line is difficult to translate. For a thorough discussion of the problems in translation, see B. Margulis, “The Psalm of Habakkuk: A Reconstruction and Interpretation,” Zeitschrift für die alttestamentliche Wissenschaft 82 (1970): 409–20.'
  - type: text
    content: Pause in his presence
  - type: text
    content: You carved open the earth with rivers.
