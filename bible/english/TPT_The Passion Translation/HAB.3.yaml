  - type: text
    content: 'This is the passionate '
  - type: note
    content: Or “upon shiggaion.” Although the meaning of shiggaion is uncertain, the most likely meaning is “a loud cry,” taken from a Hebrew root word that means “roar.” See Ps. 7. Habakkuk’s psalm is wild and passionate. Have you ever been under such pressure that you felt like roaring? That is a “shiggaion.” Other scholars believe the central thought of the word is that of wandering. It may also indicate the style of music to which the song was to be sung.
  - type: text
    content: prayer of Habakkuk the prophet.
