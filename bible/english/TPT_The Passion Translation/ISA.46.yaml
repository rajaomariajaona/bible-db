document_id: ISA.46,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Overthrow of Babylon
  - type: text
    content: The gods of Babylon
  - type: text
    content: ', Bel '
  - type: note
    content: Bel means “lord,” a title that was associated with the god Enlil, known in Babylon as the chief of the gods. The Greeks called him Zeus, and the Romans, Jupiter. Eventually, the title Bel was transferred to Marduk. See Jer. 50:2.
  - type: text
    content: and Nebo,
  - type: note
    content: Or “Nabu” or “Celestial Scribe,” known as the god of intellectualism (literacy, wisdom). The Greeks called him Hermes; the Romans, Mercury; the Egyptians, Anubis.
  - type: text
    content: are bowed down and lowered to the ground.
  - type: text
    content: 'They haul away on ox carts their '
  - type: text
    content: wobbling
  - type: text
    content: ' idols.'
  - type: note
    content: Or “Their idols are beasts and cattle.”
  '10':
  - type: text
    content: I declare from the beginning how it will end
  - type: text
    content: and foretell from the start what has not yet happened.
  - type: text
    content: I decree that my purpose will stand,
  - type: text
    content: and I will fulfill my every plan.
  '11':
  - type: text
    content: 'I called that eagle '
  - type: text
    content: Cyrus
  - type: text
    content: ', '
  - type: note
    content: See Isa. 41:2–3; 44:28–45:1.
  - type: text
    content: swooping in from the east;
  - type: text
    content: from a distant land he came, the man of my purpose.
  - type: text
    content: I have spoken, and yes, I will bring it to pass.
  - type: text
    content: I have formed my plan, and yes, I will do it.
  '12':
  - type: text
    content: “Listen to me, you stubborn ones
  - type: text
    content: who are far from righteousness.
  '13':
  - type: text
    content: I am bringing my righteousness closer to you;
  - type: text
    content: it is not far off.
  - type: text
    content: My deliverance will not be delayed,
  - type: text
    content: for I will set my salvation in Zion
  - type: text
    content: for Israel my glory!”
  '2':
  - type: text
    content: They both stoop and bow down,
  - type: text
    content: and they are powerless to rescue their own images.
  - type: text
    content: 'There they '
  - type: note
    content: Or “their souls.”
  - type: text
    content: go—carried off into captivity!
  - type: note
    content: These false gods and their idols are like captives carried off by their conquerors.
  '3':
  - type: text
    content: “Listen to me, O Jacob’s tribes, all the remnant of Israel.
  - type: text
    content: You never had to carry me
  - type: text
    content: ', but I have carried you from birth.'
  - type: text
    content: I supported you from the moment you left the womb.
  - type: note
    content: See Ex. 19:4; Deut. 1:31; 32:11; Ps. 28:9.
  '4':
  - type: text
    content: Even as you grow old and your hair turns gray,
  - type: text
    content: I’ll keep carrying you!
  - type: text
    content: I am your Maker and your Caregiver.
  - type: text
    content: I will carry you and be your Savior.
  '5':
  - type: text
    content: To whom can you compare me, the incomparable God?
  - type: text
    content: Have you found someone else like me?
  '6':
  - type: text
    content: The wealthy pour out their gold,
  - type: note
    content: Or “Those who pour out gold from their purses.”
  - type: text
    content: weigh out their silver in the scales,
  - type: text
    content: and hire a goldsmith who crafts it into a ‘god.’
  - type: text
    content: Then they bow down before it to worship it.
  '7':
  - type: text
    content: They lift it up to their shoulders and have to carry it.
  - type: text
    content: They set it on a stand, and there it sits,
  - type: text
    content: unable to move from its place.
  - type: text
    content: When someone cries out to it,
  - type: text
    content: it never answers nor saves anyone from trouble.
  '8':
  - type: text
    content: Keep this in mind and don’t forget it!
  - type: text
    content: Take this to heart, you rebels!
  '9':
  - type: text
    content: 'Remember '
  - type: text
    content: the miracles
  - type: text
    content: ' of long ago.'
  - type: text
    content: Acknowledge that
  - type: text
    content: ' I am God, and there is no other.'
  - type: text
    content: I am God, and there is none like me.
