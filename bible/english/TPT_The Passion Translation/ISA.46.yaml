document_id: ISA.46,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Overthrow of Babylon
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The gods of Babylon
    - type: text
      text: ', Bel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Bel means “lord,” a title that was associated with the god Enlil, known in Babylon as the chief of the gods. The Greeks called him Zeus, and the Romans, Jupiter. Eventually, the title Bel was transferred to Marduk. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 50:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and Nebo,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Nabu” or “Celestial Scribe,” known as the god of intellectualism (literacy, wisdom). The Greeks called him Hermes; the Romans, Mercury; the Egyptians, Anubis.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are bowed down and lowered to the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They haul away on ox carts their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wobbling
    - type: text
      text: ' idols.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Their idols are beasts and cattle.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I declare from the beginning how it will end
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and foretell from the start what has not yet happened.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I decree that my purpose will stand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will fulfill my every plan.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I called that eagle '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cyrus
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 41:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 44:28–45:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: swooping in from the east;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from a distant land he came, the man of my purpose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have spoken, and yes, I will bring it to pass.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have formed my plan, and yes, I will do it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, you stubborn ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who are far from righteousness.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am bringing my righteousness closer to you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it is not far off.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My deliverance will not be delayed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I will set my salvation in Zion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for Israel my glory!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They both stoop and bow down,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they are powerless to rescue their own images.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There they '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “their souls.”
      marker-yv: yv-n
    - type: text
      text: go—carried off into captivity!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These false gods and their idols are like captives carried off by their conquerors.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, O Jacob’s tribes, all the remnant of Israel.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You never had to carry me
    - type: text
      text: ', but I have carried you from birth.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I supported you from the moment you left the womb.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 19:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 1:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 32:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 28:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even as you grow old and your hair turns gray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll keep carrying you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am your Maker and your Caregiver.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will carry you and be your Savior.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To whom can you compare me, the incomparable God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have you found someone else like me?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wealthy pour out their gold,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 46:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Those who pour out gold from their purses.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: weigh out their silver in the scales,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and hire a goldsmith who crafts it into a ‘god.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they bow down before it to worship it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lift it up to their shoulders and have to carry it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They set it on a stand, and there it sits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: unable to move from its place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When someone cries out to it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it never answers nor saves anyone from trouble.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep this in mind and don’t forget it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take this to heart, you rebels!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the miracles
    - type: text
      text: ' of long ago.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Acknowledge that
    - type: text
      text: ' I am God, and there is no other.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am God, and there is none like me.
