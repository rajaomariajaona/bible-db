document_id: PSA.22,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Prophetic Portrait of the Cross
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Thirty-three prophecies from this psalm were fulfilled when Jesus was on the cross.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: David’s song of anguish
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “The Deer at the Dawning of the Day”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could be an amazing picture of Christ giving birth at the cross to a generation of his seed. They are like children of God born in the dawning of that resurrection morning.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cross
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, my God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you abandon me now?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'When Jesus quoted these words while dying on the cross, he was identifying himself as the one David wrote about in this psalm. It is a breathtaking portrayal of what Jesus endured through his suffering for us. The psalm ends with another quotation of Jesus on the cross: “It is finished!”'
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Since the day I was born, I’ve been placed in your custody.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve cradled me throughout my days,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you’ve always been my God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t leave me now, for trouble is all around me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and there’s no one to help me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m surrounded by many violent foes like bulls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: forces of evil encircle me like the strong bulls of Bashan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The root word for “bull” means “to break or destroy.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bashan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', although known as a fertile land northeast of Lake Galilee, is also a word for “serpent.” These represent the many demonic spirits who came against the Son of God as he was being crucified.'
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like ravenous, roaring lions tearing their prey,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they pour curses from their mouths.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I’m completely exhausted.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I’m poured out like water.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every joint of my body has been pulled apart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My courage has melted away.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m so thirsty and parched.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My tongue sticks to the roof of my mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And now you lay me in the dust of death.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have pierced my hands and my feet.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from some Hebrew manuscripts, Septuagint and Syriac; other Hebrew manuscripts read “Like the lion my hands and my feet.” This is a powerful prophecy of crucifixion, given by David many centuries before crucifixion was invented by the Romans.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a pack of wild dogs they tear at me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: swirling around me with their hatred.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A band of evil men surrounds me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can count all my bones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at how they gloat over me and stare!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a toss of the dice they divide my clothes among themselves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gambling for my garments!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', please don’t stay far away.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My strength, come quickly to my rescue.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you remain distant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'refusing to answer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David used poetic nuance here, for the word “answer” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: ‘anah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is also a Hebrew homonym for “affliction.”
      marker-yv: yv-n
    - type: text
      text: my tearful cries in the day
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my desperate cries for your help in the night?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I can’t stop sobbing.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where are you, my God?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me back my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from this violent death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save my precious one and only
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “unique” or “darling.” Each of us is that “one and only” child or “unique darling” mentioned here in this psalm. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . On the cross, Jesus—like a deer giving birth at the dawning light (see inscription of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )—cared less that his body was being torn apart and more about our protection and salvation. He prayed for us as he faced death on the cross.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the power of these dogs!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “dogs” are metaphors for evil spirits who were bent on destroying Jesus on the cross. The Hebrew word for “dog” is taken from a root word meaning “to attack.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from all the power of the enemy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from this roaring lion raging against me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the power of his dark horde.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Resurrection
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will declare your name before all my brothers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and praise you in the midst of the congregation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Between v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: the glorious resurrection of Jesus takes place. The music is elevated to a higher key as victory is sounded forth. “My people gather” is a reference to the church that was birthed through his resurrection glory. (See also v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those who fear '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', praise him!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the seed of Jacob glorify him with your praises.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stand in awe of him, all you offspring of Israel!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he has not despised my cries of deep despair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s my first responder to my sufferings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and when I was in pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he was there all the time and heard the cries of the afflicted.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re the reason for my praise; it comes from you and goes to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will keep my promise to praise you before all who fear you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: among the congregation of your people.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all the poor and broken eat until satisfied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bring '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' praise and you will find him.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your hearts overflow with life forever!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the four corners of the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the peoples of the world will remember and return to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every nation will come and worship him.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is King of all, who takes charge of all the nations.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wealthy of this world will feast in fellowship with him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: right alongside the humble of heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bowing down to the dust, forsaking their own souls.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will all come and worship this worthy King!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I know that you are most holy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are God-Enthroned, the praise of Israel.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'His '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' seed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus, our crucified Savior, had no natural offspring. These are the sons and daughters who were birthed by the work of the cross.
      marker-yv: yv-n
    - type: text
      text: shall serve him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Future generations will hear from us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: about the wonders of the Victorious Lord.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His generation yet to be born will glorify him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will all declare, “It is finished!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He has done it!” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 19:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our fathers’ faith was in you—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: through the generations they trusted in you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you came through.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every time they cried out to you in their despair,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you were faithful to deliver them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you didn’t disappoint them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I am like a worm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: crushed and bleeding crimson,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 22:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “worm” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tola
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is also the word for “crimson” or “scarlet.”'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tola
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a certain worm in the ancient Near East that, when crushed, bled a crimson color so strong it was used as a dye for garments. Jesus was not saying he was a despised worm, but that he will bleed as he is crushed for our sins.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: treated as less than human.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve been despised and scorned by everyone!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mocked by their jeers, despised with their sneers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as all the people poke fun at me, spitting their insults,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saying, “Is this the one who trusted in God?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now let’s see if '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will come to your rescue!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s see how much he delights in him!”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, you delivered me safely from my mother’s womb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the one who cared for me ever since I was a baby.
