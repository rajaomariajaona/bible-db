document_id: PSA.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophetic Portrait of the Cross Thirty-three prophecies from this psalm were fulfilled when Jesus was on the cross.
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: David’s song of anguish
  - type: text
    content: To the tune of “The Deer at the Dawning of the Day”
  - type: note
    content: This could be an amazing picture of Christ giving birth at the cross to a generation of his seed. They are like children of God born in the dawning of that resurrection morning.
  - type: heading
    content: The Cross
  - type: text
    content: God, my God!
  - type: text
    content: Why would you abandon me now?
  - type: note
    content: 'When Jesus quoted these words while dying on the cross, he was identifying himself as the one David wrote about in this psalm. It is a breathtaking portrayal of what Jesus endured through his suffering for us. The psalm ends with another quotation of Jesus on the cross: “It is finished!”'
  '10':
  - type: text
    content: Since the day I was born, I’ve been placed in your custody.
  - type: text
    content: You’ve cradled me throughout my days,
  - type: text
    content: and you’ve always been my God.
  '11':
  - type: text
    content: So don’t leave me now, for trouble is all around me,
  - type: text
    content: and there’s no one to help me.
  '12':
  - type: text
    content: I’m surrounded by many violent foes like bulls;
  - type: text
    content: forces of evil encircle me like the strong bulls of Bashan.
  - type: note
    content: The root word for “bull” means “to break or destroy.” The word Bashan, although known as a fertile land northeast of Lake Galilee, is also a word for “serpent.” These represent the many demonic spirits who came against the Son of God as he was being crucified.
  '13':
  - type: text
    content: Like ravenous, roaring lions tearing their prey,
  - type: text
    content: they pour curses from their mouths.
  '14':
  - type: text
    content: Now I’m completely exhausted.
  - type: note
    content: Or “I’m poured out like water.”
  - type: text
    content: Every joint of my body has been pulled apart.
  - type: text
    content: My courage has melted away.
  '15':
  - type: text
    content: I’m so thirsty and parched.
  - type: text
    content: My tongue sticks to the roof of my mouth.
  - type: text
    content: And now you lay me in the dust of death.
  '16':
  - type: text
    content: They have pierced my hands and my feet.
  - type: note
    content: As translated from some Hebrew manuscripts, Septuagint and Syriac; other Hebrew manuscripts read “Like the lion my hands and my feet.” This is a powerful prophecy of crucifixion, given by David many centuries before crucifixion was invented by the Romans.
  - type: text
    content: Like a pack of wild dogs they tear at me,
  - type: text
    content: swirling around me with their hatred.
  - type: text
    content: A band of evil men surrounds me.
  '17':
  - type: text
    content: I can count all my bones.
  - type: text
    content: Look at how they gloat over me and stare!
  '18':
  - type: text
    content: With a toss of the dice they divide my clothes among themselves,
  - type: text
    content: gambling for my garments!
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ', please don’t stay far away.'
  - type: text
    content: My strength, come quickly to my rescue.
  '2':
  - type: text
    content: Why do you remain distant,
  - type: text
    content: 'refusing to answer '
  - type: note
    content: David used poetic nuance here, for the word “answer” (‘anah) is also a Hebrew homonym for “affliction.”
  - type: text
    content: my tearful cries in the day
  - type: text
    content: and my desperate cries for your help in the night?
  - type: text
    content: I can’t stop sobbing.
  - type: text
    content: Where are you, my God?
  '20':
  - type: text
    content: Give me back my life.
  - type: text
    content: Save me from this violent death.
  - type: text
    content: Save my precious one and only
  - type: note
    content: Or “unique” or “darling.” Each of us is that “one and only” child or “unique darling” mentioned here in this psalm. See Song. 6:9. On the cross, Jesus—like a deer giving birth at the dawning light (see inscription of Ps. 22)—cared less that his body was being torn apart and more about our protection and salvation. He prayed for us as he faced death on the cross.
  - type: text
    content: from the power of these dogs!
  - type: note
    content: The “dogs” are metaphors for evil spirits who were bent on destroying Jesus on the cross. The Hebrew word for “dog” is taken from a root word meaning “to attack.”
  '21':
  - type: text
    content: Save me from all the power of the enemy,
  - type: text
    content: from this roaring lion raging against me
  - type: text
    content: and the power of his dark horde.
  - type: heading
    content: The Resurrection
  '22':
  - type: text
    content: I will declare your name before all my brothers
  - type: text
    content: and praise you in the midst of the congregation.
  - type: note
    content: Between v. 21 and v. 22 the glorious resurrection of Jesus takes place. The music is elevated to a higher key as victory is sounded forth. “My people gather” is a reference to the church that was birthed through his resurrection glory. (See also v. 25.)
  '23':
  - type: text
    content: 'Those who fear '
  - type: text
    content: Yahweh
  - type: text
    content: ', praise him!'
  - type: text
    content: Let all the seed of Jacob glorify him with your praises.
  - type: text
    content: Stand in awe of him, all you offspring of Israel!
  '24':
  - type: text
    content: For he has not despised my cries of deep despair.
  - type: text
    content: He’s my first responder to my sufferings,
  - type: text
    content: and when I was in pain,
  - type: text
    content: he was there all the time and heard the cries of the afflicted.
  '25':
  - type: text
    content: You’re the reason for my praise; it comes from you and goes to you.
  - type: text
    content: I will keep my promise to praise you before all who fear you
  - type: text
    content: among the congregation of your people.
  '26':
  - type: text
    content: Let all the poor and broken eat until satisfied.
  - type: text
    content: 'Bring '
  - type: text
    content: Yahweh
  - type: text
    content: ' praise and you will find him.'
  - type: text
    content: May your hearts overflow with life forever!
  '27':
  - type: text
    content: From the four corners of the earth,
  - type: text
    content: 'the peoples of the world will remember and return to '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: Every nation will come and worship him.
  '28':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is King of all, who takes charge of all the nations.'
  '29':
  - type: text
    content: The wealthy of this world will feast in fellowship with him
  - type: text
    content: right alongside the humble of heart,
  - type: text
    content: bowing down to the dust, forsaking their own souls.
  - type: text
    content: They will all come and worship this worthy King!
  '3':
  - type: text
    content: Yet I know that you are most holy.
  - type: text
    content: You are God-Enthroned, the praise of Israel.
  '30':
  - type: text
    content: 'His '
  - type: text
    content: spiritual
  - type: text
    content: ' seed '
  - type: note
    content: Jesus, our crucified Savior, had no natural offspring. These are the sons and daughters who were birthed by the work of the cross.
  - type: text
    content: shall serve him.
  - type: text
    content: Future generations will hear from us
  - type: text
    content: about the wonders of the Victorious Lord.
  '31':
  - type: text
    content: His generation yet to be born will glorify him.
  - type: text
    content: And they will all declare, “It is finished!”
  - type: note
    content: Or “He has done it!” See John 19:30.
  '4':
  - type: text
    content: Our fathers’ faith was in you—
  - type: text
    content: through the generations they trusted in you
  - type: text
    content: and you came through.
  '5':
  - type: text
    content: Every time they cried out to you in their despair,
  - type: text
    content: you were faithful to deliver them;
  - type: text
    content: you didn’t disappoint them.
  '6':
  - type: text
    content: But I am like a worm,
  - type: text
    content: crushed and bleeding crimson,
  - type: note
    content: The Hebrew word for “worm” is tola, which is also the word for “crimson” or “scarlet.” Tola was a certain worm in the ancient Near East that, when crushed, bled a crimson color so strong it was used as a dye for garments. Jesus was not saying he was a despised worm, but that he will bleed as he is crushed for our sins.
  - type: text
    content: treated as less than human.
  - type: text
    content: I’ve been despised and scorned by everyone!
  '7':
  - type: text
    content: Mocked by their jeers, despised with their sneers,
  - type: text
    content: as all the people poke fun at me, spitting their insults,
  '8':
  - type: text
    content: saying, “Is this the one who trusted in God?
  - type: text
    content: 'Now let’s see if '
  - type: text
    content: Yahweh
  - type: text
    content: ' will come to your rescue!'
  - type: text
    content: Let’s see how much he delights in him!”
  '9':
  - type: text
    content: Lord, you delivered me safely from my mother’s womb.
  - type: text
    content: You are the one who cared for me ever since I was a baby.
