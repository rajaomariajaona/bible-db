document_id: PSA.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prayer Turns Depression into Delight Some believe David composed this psalm shortly after being anointed to be the king of Israel. David knew greatness was his destiny, but he struggled with the persecution and challenges that came before his exaltation. In the wilderness David trusted and prayed his way out.
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A Psalm of David
  - type: heading
    content: Depression
  - type: text
    content: I’m hurting
  - type: text
    content: ', Lord—will you forget me forever?'
  - type: note
    content: This is the psalm that describes the journey from self to God, from despair to delight, from feeling abandoned to feeling affirmed. It begins with pain and ends with praise. Moaning gives way to music. We each can take comfort in what David experienced.
  - type: text
    content: How much longer, Lord?
  - type: text
    content: Will you look the other way when I’m in need?
  - type: note
    content: David felt as though God was hiding his face from his cries. David was left alone to wrestle with his doubts, feeling as though his patience could hold on no longer. Have you ever been there?
  '2':
  - type: text
    content: How much longer must I cling to this constant grief?
  - type: text
    content: I’ve endured this shaking of my soul.
  - type: text
    content: So how much longer will my enemy have the upper hand?
  - type: heading
    content: Intercession
  '3':
  - type: text
    content: 'Take a good look at me, '
  - type: text
    content: Yahweh
  - type: text
    content: ', my God, and answer me!'
  - type: text
    content: Breathe your life into my spirit.
  - type: text
    content: Bring light to my eyes in this pitch-black darkness
  - type: text
    content: or I will sleep the sleep of death.
  '4':
  - type: text
    content: Don’t let my enemy proclaim, “I’ve prevailed over him.”
  - type: text
    content: For all my adversaries will celebrate when I fall.
  '5':
  - type: text
    content: 'I have always trusted in your kindness, '
  - type: text
    content: so answer me
  - type: text
    content: .
  - type: text
    content: I will spin in a circle of joy
  - type: text
    content: 'when your salvation '
  - type: note
    content: The term for “salvation” is yeshu’sh, which is nearly identical to “Jesus, our Salvation.” Our Savior plans blessings and hope for each of us as we trust in him.
  - type: text
    content: lifts me up.
  '6':
  - type: text
    content: 'I will sing my song of joy to you, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: for in all of this you have strengthened my soul.
  - type: text
    content: My enemies say that I have no Savior,
  - type: text
    content: but I know that I have one in you!
