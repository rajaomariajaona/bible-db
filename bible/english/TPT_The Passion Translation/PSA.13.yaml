document_id: PSA.13,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Prayer Turns Depression into Delight
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some believe David composed this psalm shortly after being anointed to be the king of Israel. David knew greatness was his destiny, but he struggled with the persecution and challenges that came before his exaltation. In the wilderness David trusted and prayed his way out.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Depression
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I’m hurting
    - type: text
      text: ', Lord—will you forget me forever?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the psalm that describes the journey from self to God, from despair to delight, from feeling abandoned to feeling affirmed. It begins with pain and ends with praise. Moaning gives way to music. We each can take comfort in what David experienced.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much longer, Lord?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you look the other way when I’m in need?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David felt as though God was hiding his face from his cries. David was left alone to wrestle with his doubts, feeling as though his patience could hold on no longer. Have you ever been there?
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How much longer must I cling to this constant grief?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ve endured this shaking of my soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how much longer will my enemy have the upper hand?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intercession
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Take a good look at me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', my God, and answer me!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Breathe your life into my spirit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring light to my eyes in this pitch-black darkness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or I will sleep the sleep of death.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let my enemy proclaim, “I’ve prevailed over him.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all my adversaries will celebrate when I fall.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I have always trusted in your kindness, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: so answer me
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will spin in a circle of joy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'when your salvation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The term for “salvation” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yeshu’sh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is nearly identical to “Jesus, our Salvation.” Our Savior plans blessings and hope for each of us as we trust in him.'
      marker-yv: yv-n
    - type: text
      text: lifts me up.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing my song of joy to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for in all of this you have strengthened my soul.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies say that I have no Savior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I know that I have one in you!
