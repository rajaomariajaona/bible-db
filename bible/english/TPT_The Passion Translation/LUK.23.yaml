document_id: LUK.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus before Pilate
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The entire council stood at once and took Jesus to Pilate, the Roman governor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They accused him of false testimony, saying, “This man tells us not to pay our taxes to Caesar. And he proclaims himself to be Christ the King and Messiah. He’s a deceiver of our nation.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pilate asked Jesus, “Is this true? Are you their king and Messiah?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is true.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pilate turned to the high priests and to the gathered crowd and said, “This man has committed no crime. I find nothing wrong with him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But they yelled and demanded that Pilate do something, saying, “He has stirred up our nation, misleading people from the moment he began teaching in Galilee until he has come here to Jerusalem!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus before Herod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'When Pilate heard the word Galilee, he asked if Jesus was a Galilean, and when they told him “yes,” Pilate saw a way out of his problem. He knew that Antipas, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Antipas” is a nickname for Herod Antipater, son of Herod the Great. The Greek text reads simply “Herod.”
    marker-yv: yv-n
  - type: text
    text: son of Herod, ruled over Galilee, and he happened to be in Jerusalem at that time, so Pilate sent Jesus to Antipas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When he saw Jesus, he was elated, for he had heard a great deal about his ministry and wanted Jesus to perform a miracle in front of him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Antipas questioned him at length, but Jesus wouldn’t even answer him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: 'All the while the high priests and religious leaders stood by, accusing Jesus of wrongdoing, so that Antipas and his soldiers treated him with scorn and mocking. Antipas put an elegant purple robe on Jesus and sent him back to Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: That day, Antipas and Pilate healed their long-standing feud and they became good friends.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Sentenced to Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Pilate gathered together the people, the high priests, and all the religious leaders of the nation. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This group of religious leaders was known as the Jewish council of the Sanhedrin.
    marker-yv: yv-n
  - type: text
    text: 'He told them, “You have presented this man to me and charged him with stirring a rebellion among the people. I have examined him here in your presence and have put him on trial. My verdict is that none of your charges against him are true. I find no fault in him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The phrase “I find no fault in him” is found in the Aramaic text.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'Then I sent him to Antipas, son of Herod, who questioned him and found him not guilty. Since he has done nothing deserving of death, I have decided to punish him with a severe flogging and release him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For it was Pilate’s custom to honor the Jewish holiday by releasing a prisoner.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although many Greek manuscripts do not have this verse in the text, it is found in the Aramaic text.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When the crowd heard this, they went wild. Erupting with anger, they cried out, “No! Take this one away and release Barabbas!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There were two men, two sons. Barabbas means “son of a father.” Jesus was the Son of our heavenly Father. One was a son of Adam; the other was the Son of God.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'For Barabbas had been thrown in prison for robbery '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Most Greek manuscripts have “for insurrection.” The Aramaic states “for robbery.”
    marker-yv: yv-n
  - type: text
    text: and murder.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate, wanting to release Jesus, tried to convince them it was best to let Jesus go, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: but they screamed out over and over, “Crucify him! Crucify him!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Crucifixion was the cruelest form of execution, reserved for only the worst of criminals.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A third time, Pilate asked the crowd, “What evil crime has this man committed that I should have him crucified? I haven’t found one thing that warrants a death sentence! I will have him flogged severely and then release him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But the people and the high priests, shouting like a mob, screamed out at the top of their lungs, “No! Crucify him! Crucify him!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Finally their shouts and screams succeeded. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pilate caved in to the crowd and ordered that the will of the people be done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then he released the guilty murderer Barabbas, as they had insisted, and handed Jesus over to be crucified.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Crucifixion of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'As the guards led Jesus to be crucified, there was '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an African man
  - type: text
    text: ' in the crowd named Simon, from Libya. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from Cyrene,” which is present-day Tripoli, Libya.
    marker-yv: yv-n
  - type: text
    text: 'He had just arrived from a rural village '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to keep the Feast of the Passover
  - type: text
    text: '. The guards laid Jesus’ cross on Simon’s shoulders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By this time Jesus had been severely beaten and flogged, had gone days without sleep, and was carrying a heavy load.
    marker-yv: yv-n
  - type: text
    text: and forced him to walk behind Jesus, carrying his cross.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Massive crowds gathered to follow Jesus, including a number of women, who were wailing with sorrow over him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jesus turned to them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Daughters of Jerusalem, do not weep for me. You should be weeping for yourselves and your children.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The day is coming when it will not be the women with children who are blessed but those who are childless. Then you will say, ‘The barren women are the most fortunate! Those who have never given birth and never nursed a child—
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: they are more fortunate than we, for they will never see their children put to death
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '!’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And the people will cry out for the mountains and hills to fall on top of them to hide them from all that is to come.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 10:8
      metadata:
        usfm: HOS.10.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For if this is what they do to the living Branch, what will they do with the dead ones?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The guards led away two criminals with Jesus, to execute all three at the same time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When they came to the place that is known as The Skull, the guards crucified Jesus, nailing him on the center cross between the two criminals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'While they were nailing Jesus to the cross, he prayed over and over, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he prayed intensely.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, forgive them,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text implies a repetitive action. He did not pray, “forgive me,” but “forgive them.” As the centurion crushed him to the ground and tied his arms to the crossbeam, Jesus prayed, “Father, forgive them.” When the spikes tore through each quivering palm, he prayed again, “Father, forgive them.” And when the soldiers parted his garments and gambled for the seamless robe, again Jesus prayed, “Father, forgive them.” Only heaven knows how many times he uttered that prayer. Many reliable Greek manuscripts omit this verse; however, it does fit with the Lukan theology of forgiveness (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 6:27–36
      metadata:
        usfm: LUK.6.27+LUK.6.28+LUK.6.29+LUK.6.30+LUK.6.31+LUK.6.32+LUK.6.33+LUK.6.34+LUK.6.35+LUK.6.36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and the parallel passage in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 7:60
      metadata:
        usfm: ACT.7.60
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for they don’t know what they’re doing.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The soldiers, after they crucified him, gambled over his clothing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: A great crowd gathered to watch what was happening. The religious leaders sneered at Jesus and mocked him, saying, “Look at this man! What kind of ‘chosen Messiah’ is this? He pretended to save others, but he can’t even save himself!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The soldiers joined in the mockery, offering Jesus a drink of vinegar.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 69:21
      metadata:
        usfm: PSA.69.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It was likely Jesus had had nothing to drink since the night before.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 37-38
  - type: text
    text: 'Over Jesus’ head on the cross was written an inscription in Greek, Latin, and Aramaic: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:37–38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Many Greek texts omit the mention of these three languages.
    marker-yv: yv-n
  - type: text
    text: “This man is the king of all the Jews.” And all the soldiers laughed and scoffed at him, saying, “Hey! If you’re the king of Jews, why don’t you save yourself?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: One of the criminals hanging on the cross next to Jesus kept ridiculing him, saying, “What kind of Messiah are you? Save yourself and save us from this death!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'The criminal hanging on the other cross rebuked the man, saying, “Don’t you fear God? You’re about to die! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: We deserve to be condemned. We’re just being repaid for what we’ve done. But this man—he’s done nothing wrong!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Then he said, “I beg of you, Jesus, show me grace and take me with you into your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: everlasting
  - type: text
    text: ' kingdom!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I promise you—this very day you will enter paradise with me.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Death of the Savior
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'It was now only midday, yet the whole world became dark for three hours as the light of the sun faded away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The darkening of the sun indicated that the “day of the Lord” had now come. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joel 2:10
      metadata:
        usfm: JOL.2.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 8:9
      metadata:
        usfm: AMO.8.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'And suddenly in the temple the thick veil hanging in the Holy Place was ripped in two! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Then Jesus cried out with a loud voice, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Father, I surrender my Spirit into your hands.”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 31:5
      metadata:
        usfm: PSA.31.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: And he took his last breath and died.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: When the Roman captain overseeing the crucifixion witnessed all that took place, he was awestruck and glorified God. Acknowledging what they had done, he said, “I have no doubt; we just killed the righteous one.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “innocent man.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'The crowds that had gathered to observe this spectacle went back to their homes, overcome with deep sorrow '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:48
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “beating their breasts,” which is a figure of speech for deep sorrow.
    marker-yv: yv-n
  - type: text
    text: 'and devastated by what they had witnessed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: But standing off at a distance were some who truly knew Jesus, and the women who had followed him all the way from Galilee were keeping vigil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 50-51
  - type: text
    text: 'There was also a member of the Jewish council named Joseph, from the village of Ramah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:50–51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. Ramah (formerly Ramathaim Zophim) was the village of Samuel, only a few miles from Jerusalem. The Greek is, “Joseph of Arimathea.”
    marker-yv: yv-n
  - type: text
    text: 'a good-hearted, honorable man who was eager for God’s kingdom to appear. He had strongly disagreed with the decision of the council to crucify Jesus. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:50–51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One ancient Syriac manuscript adds here, “This man was one who did not take part with the mind of the devil.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'He came before Pilate and asked permission to take the body of Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for a proper burial, and Pilate granted his request
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'So he took the body from the cross, wrapped it in a winding sheet of linen, and placed it in a new, unused tomb chiseled out of solid rock. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: It was Preparation Day, and the Sabbath was fast approaching.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'The women who had been companions of Jesus from the beginning saw all this take place and carefully contemplated how the body was laid in the tomb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Afterward they returned home and prepared fragrant spices and ointments and were planning to anoint his body after the Sabbath was completed, according to the commandments of the law.
