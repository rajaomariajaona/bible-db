document_id: LUK.23,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus before Pilate
  - type: text
    content: 'The entire council stood at once and took Jesus to Pilate, the Roman governor. '
  '10':
  - type: text
    content: 'All the while the high priests and religious leaders stood by, accusing Jesus of wrongdoing, so that Antipas and his soldiers treated him with scorn and mocking. Antipas put an elegant purple robe on Jesus and sent him back to Pilate. '
  '12':
  - type: text
    content: That day, Antipas and Pilate healed their long-standing feud and they became good friends.
  - type: heading
    content: Jesus Sentenced to Death
  '13':
  - type: text
    content: 'Pilate gathered together the people, the high priests, and all the religious leaders of the nation. '
  - type: note
    content: This group of religious leaders was known as the Jewish council of the Sanhedrin.
  - type: text
    content: 'He told them, “You have presented this man to me and charged him with stirring a rebellion among the people. I have examined him here in your presence and have put him on trial. My verdict is that none of your charges against him are true. I find no fault in him. '
  - type: note
    content: The phrase “I find no fault in him” is found in the Aramaic text.
  '15':
  - type: text
    content: 'Then I sent him to Antipas, son of Herod, who questioned him and found him not guilty. Since he has done nothing deserving of death, I have decided to punish him with a severe flogging and release him.” '
  '17':
  - type: text
    content: For it was Pilate’s custom to honor the Jewish holiday by releasing a prisoner.
  - type: note
    content: Although many Greek manuscripts do not have this verse in the text, it is found in the Aramaic text.
  '18':
  - type: text
    content: 'When the crowd heard this, they went wild. Erupting with anger, they cried out, “No! Take this one away and release Barabbas!” '
  - type: note
    content: There were two men, two sons. Barabbas means “son of a father.” Jesus was the Son of our heavenly Father. One was a son of Adam; the other was the Son of God.
  '19':
  - type: text
    content: 'For Barabbas had been thrown in prison for robbery '
  - type: note
    content: Most Greek manuscripts have “for insurrection.” The Aramaic states “for robbery.”
  - type: text
    content: and murder.
  '2':
  - type: text
    content: They accused him of false testimony, saying, “This man tells us not to pay our taxes to Caesar. And he proclaims himself to be Christ the King and Messiah. He’s a deceiver of our nation.”
  '20':
  - type: text
    content: 'Pilate, wanting to release Jesus, tried to convince them it was best to let Jesus go, '
  '21':
  - type: text
    content: but they screamed out over and over, “Crucify him! Crucify him!”
  - type: note
    content: Crucifixion was the cruelest form of execution, reserved for only the worst of criminals.
  '22':
  - type: text
    content: A third time, Pilate asked the crowd, “What evil crime has this man committed that I should have him crucified? I haven’t found one thing that warrants a death sentence! I will have him flogged severely and then release him.”
  '23':
  - type: text
    content: But the people and the high priests, shouting like a mob, screamed out at the top of their lungs, “No! Crucify him! Crucify him!”
  - type: text
    content: 'Finally their shouts and screams succeeded. '
  '24':
  - type: text
    content: 'Pilate caved in to the crowd and ordered that the will of the people be done. '
  '25':
  - type: text
    content: Then he released the guilty murderer Barabbas, as they had insisted, and handed Jesus over to be crucified.
  - type: heading
    content: The Crucifixion of Jesus
  '26':
  - type: text
    content: 'As the guards led Jesus to be crucified, there was '
  - type: text
    content: an African man
  - type: text
    content: ' in the crowd named Simon, from Libya. '
  - type: note
    content: Or “from Cyrene,” which is present-day Tripoli, Libya.
  - type: text
    content: 'He had just arrived from a rural village '
  - type: text
    content: to keep the Feast of the Passover
  - type: text
    content: '. The guards laid Jesus’ cross on Simon’s shoulders '
  - type: note
    content: By this time Jesus had been severely beaten and flogged, had gone days without sleep, and was carrying a heavy load.
  - type: text
    content: and forced him to walk behind Jesus, carrying his cross.
  '27':
  - type: text
    content: 'Massive crowds gathered to follow Jesus, including a number of women, who were wailing with sorrow over him. '
  '28':
  - type: text
    content: 'Jesus turned to them and said, '
  - type: text
    content: “Daughters of Jerusalem, do not weep for me. You should be weeping for yourselves and your children.
  - type: text
    content: ' '
  '29':
  - type: text
    content: The day is coming when it will not be the women with children who are blessed but those who are childless. Then you will say, ‘The barren women are the most fortunate! Those who have never given birth and never nursed a child—
  - type: text
    content: they are more fortunate than we, for they will never see their children put to death
  - type: text
    content: '!’'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Pilate asked Jesus, “Is this true? Are you their king and Messiah?”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “It is true.”
  '30':
  - type: text
    content: And the people will cry out for the mountains and hills to fall on top of them to hide them from all that is to come.
  - type: text
    content: ' '
  - type: note
    content: See Hos. 10:8.
  '31':
  - type: text
    content: For if this is what they do to the living Branch, what will they do with the dead ones?”
  '32':
  - type: text
    content: 'The guards led away two criminals with Jesus, to execute all three at the same time. '
  '33':
  - type: text
    content: 'When they came to the place that is known as The Skull, the guards crucified Jesus, nailing him on the center cross between the two criminals. '
  '34':
  - type: text
    content: 'While they were nailing Jesus to the cross, he prayed over and over, '
  - type: note
    content: Or “he prayed intensely.”
  - type: text
    content: “Father, forgive them,
  - type: text
    content: ' '
  - type: note
    content: The Greek text implies a repetitive action. He did not pray, “forgive me,” but “forgive them.” As the centurion crushed him to the ground and tied his arms to the crossbeam, Jesus prayed, “Father, forgive them.” When the spikes tore through each quivering palm, he prayed again, “Father, forgive them.” And when the soldiers parted his garments and gambled for the seamless robe, again Jesus prayed, “Father, forgive them.” Only heaven knows how many times he uttered that prayer. Many reliable Greek manuscripts omit this verse; however, it does fit with the Lukan theology of forgiveness (Luke 6:27–36) and the parallel passage in Acts 7:60.
  - type: text
    content: for they don’t know what they’re doing.”
  - type: text
    content: The soldiers, after they crucified him, gambled over his clothing.
  '35':
  - type: text
    content: A great crowd gathered to watch what was happening. The religious leaders sneered at Jesus and mocked him, saying, “Look at this man! What kind of ‘chosen Messiah’ is this? He pretended to save others, but he can’t even save himself!”
  '36':
  - type: text
    content: The soldiers joined in the mockery, offering Jesus a drink of vinegar.
  - type: note
    content: See Ps. 69:21. It was likely Jesus had had nothing to drink since the night before.
  '37':
  - type: text
    content: 'Over Jesus’ head on the cross was written an inscription in Greek, Latin, and Aramaic: '
  - type: note
    content: Many Greek texts omit the mention of these three languages.
  - type: text
    content: “This man is the king of all the Jews.” And all the soldiers laughed and scoffed at him, saying, “Hey! If you’re the king of Jews, why don’t you save yourself?”
  '39':
  - type: text
    content: One of the criminals hanging on the cross next to Jesus kept ridiculing him, saying, “What kind of Messiah are you? Save yourself and save us from this death!”
  '4':
  - type: text
    content: Pilate turned to the high priests and to the gathered crowd and said, “This man has committed no crime. I find nothing wrong with him.”
  '40':
  - type: text
    content: 'The criminal hanging on the other cross rebuked the man, saying, “Don’t you fear God? You’re about to die! '
  '41':
  - type: text
    content: We deserve to be condemned. We’re just being repaid for what we’ve done. But this man—he’s done nothing wrong!”
  '42':
  - type: text
    content: 'Then he said, “I beg of you, Jesus, show me grace and take me with you into your '
  - type: text
    content: everlasting
  - type: text
    content: ' kingdom!”'
  '43':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “I promise you—this very day you will enter paradise with me.”
  - type: heading
    content: The Death of the Savior
  '44':
  - type: text
    content: 'It was now only midday, yet the whole world became dark for three hours as the light of the sun faded away. '
  - type: note
    content: The darkening of the sun indicated that the “day of the Lord” had now come. See Joel 2:10; Amos 8:9.
  '45':
  - type: text
    content: 'And suddenly in the temple the thick veil hanging in the Holy Place was ripped in two! '
  '46':
  - type: text
    content: 'Then Jesus cried out with a loud voice, '
  - type: text
    content: “Father, I surrender my Spirit into your hands.”
  - type: text
    content: ' '
  - type: note
    content: See Ps. 31:5.
  - type: text
    content: And he took his last breath and died.
  '47':
  - type: text
    content: When the Roman captain overseeing the crucifixion witnessed all that took place, he was awestruck and glorified God. Acknowledging what they had done, he said, “I have no doubt; we just killed the righteous one.”
  - type: note
    content: As translated from the Aramaic. The Greek is “innocent man.”
  '48':
  - type: text
    content: 'The crowds that had gathered to observe this spectacle went back to their homes, overcome with deep sorrow '
  - type: note
    content: Literally “beating their breasts,” which is a figure of speech for deep sorrow.
  - type: text
    content: 'and devastated by what they had witnessed. '
  '49':
  - type: text
    content: But standing off at a distance were some who truly knew Jesus, and the women who had followed him all the way from Galilee were keeping vigil.
  '5':
  - type: text
    content: But they yelled and demanded that Pilate do something, saying, “He has stirred up our nation, misleading people from the moment he began teaching in Galilee until he has come here to Jerusalem!”
  - type: heading
    content: Jesus before Herod
  '50':
  - type: text
    content: 'There was also a member of the Jewish council named Joseph, from the village of Ramah, '
  - type: note
    content: As translated from the Aramaic. Ramah (formerly Ramathaim Zophim) was the village of Samuel, only a few miles from Jerusalem. The Greek is, “Joseph of Arimathea.”
  - type: text
    content: 'a good-hearted, honorable man who was eager for God’s kingdom to appear. He had strongly disagreed with the decision of the council to crucify Jesus. '
  - type: note
    content: One ancient Syriac manuscript adds here, “This man was one who did not take part with the mind of the devil.”
  '52':
  - type: text
    content: 'He came before Pilate and asked permission to take the body of Jesus '
  - type: text
    content: for a proper burial, and Pilate granted his request
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'So he took the body from the cross, wrapped it in a winding sheet of linen, and placed it in a new, unused tomb chiseled out of solid rock. '
  '54':
  - type: text
    content: It was Preparation Day, and the Sabbath was fast approaching.
  '55':
  - type: text
    content: 'The women who had been companions of Jesus from the beginning saw all this take place and carefully contemplated how the body was laid in the tomb. '
  '56':
  - type: text
    content: Afterward they returned home and prepared fragrant spices and ointments and were planning to anoint his body after the Sabbath was completed, according to the commandments of the law.
  '6':
  - type: text
    content: 'When Pilate heard the word Galilee, he asked if Jesus was a Galilean, and when they told him “yes,” Pilate saw a way out of his problem. He knew that Antipas, '
  - type: note
    content: “Antipas” is a nickname for Herod Antipater, son of Herod the Great. The Greek text reads simply “Herod.”
  - type: text
    content: son of Herod, ruled over Galilee, and he happened to be in Jerusalem at that time, so Pilate sent Jesus to Antipas.
  '8':
  - type: text
    content: 'When he saw Jesus, he was elated, for he had heard a great deal about his ministry and wanted Jesus to perform a miracle in front of him. '
  '9':
  - type: text
    content: Antipas questioned him at length, but Jesus wouldn’t even answer him.
