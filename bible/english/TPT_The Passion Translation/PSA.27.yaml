document_id: PSA.27,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Fearless Faith
  - type: text
    content: David’s poetic praise to God before he was anointed king
  - type: note
    content: Inscription from the Septuagint. Most Bible scholars agree this psalm was written during the time of a devastating war where David witnessed the cruelty, savagery, and horrors of war.
  - type: text
    content: Yahweh
  - type: text
    content: ' is my revelation-light'
  - type: note
    content: See John 1:5, 9; 1 John 1:5.
  - type: text
    content: and the source of my salvation.
  - type: text
    content: I fear no one!
  - type: text
    content: 'I’ll never turn back and run, for you, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: surround and protect me.
  '10':
  - type: text
    content: My father and mother abandoned me.
  - type: text
    content: 'But you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', took me in and made me yours.'
  - type: note
    content: 'Every child needs four things: acceptance, focused attention, guidance, and protection. All four of these emotional needs are met by God (vv. 7–14). See Isa. 40:11; Rom. 8:15–16.'
  '11':
  - type: text
    content: 'Now teach me, '
  - type: text
    content: Yahweh
  - type: text
    content: ', all about your ways and tell me what to do.'
  - type: text
    content: Make it clear for me to understand,
  - type: text
    content: 'for I am surrounded by '
  - type: text
    content: waiting
  - type: text
    content: ' enemies.'
  '12':
  - type: text
    content: Don’t let them defeat me, Lord.
  - type: text
    content: You can’t let me fall into their clutches!
  - type: text
    content: They keep accusing me of things I’ve never done,
  - type: text
    content: breathing out violence against me.
  '13':
  - type: text
    content: Yet I believe with all my heart
  - type: text
    content: 'that I will see again your goodness, '
  - type: text
    content: Yahweh
  - type: text
    content: ', in the land of life eternal!'
  '14':
  - type: text
    content: 'Here’s what I’ve learned through it all:'
  - type: text
    content: Don’t give up
  - type: text
    content: ; don’t be impatient;
  - type: text
    content: be entwined as one with the Lord.
  - type: note
    content: Or “wait upon the Lord.” See footnote on Ps. 25:5.
  - type: text
    content: Be brave and courageous, and never lose hope.
  - type: text
    content: Yes, keep on waiting—
  - type: text
    content: for he will never disappoint you
  - type: text
    content: '!'
  '2':
  - type: text
    content: When evil ones come to destroy me,
  - type: text
    content: they will be the ones who turn back.
  '3':
  - type: text
    content: My heart will not fear even if an army rises to attack.
  - type: text
    content: I will not be shaken, even if war is imminent.
  '4':
  - type: text
    content: 'Here’s the one thing I crave from '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'the one thing I seek above all else:'
  - type: text
    content: I want to live with him every moment in his house,
  - type: note
    content: A temple had not yet been built when David wrote this psalm. He was saying that he longs to be surrounded with God’s presence, enclosed and encircled with holiness.
  - type: text
    content: 'beholding the marvelous beauty '
  - type: note
    content: The meaning of the Hebrew word for “beauty” (no’am) is not easily conveyed by one English word. It can also be translated “sweetness,” “pleasantness,” “friendliness,” “graciousness,” “goodness,” “loveliness,” “splendor,” or “delightfulness.” Take each of these terms and read the verse again, inserting the possible alternatives. We must be captured by the awesomeness of God each time we come before him and rejoice in his friendship.
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: filled with awe, delighting in his glory and grace.
  - type: text
    content: 'I want to contemplate '
  - type: note
    content: The Hebrew verb baqar can also mean “inquire,” “meditate,” “take pleasure in,” and, in a general sense, “worship,” “pray,” or “seek [guidance].” However, baqar comes from a root word that means “to arise at dawn.” Perhaps David was saying that he would arise every dawn to take pleasure in God.
  - type: text
    content: in his temple.
  '5':
  - type: text
    content: 'In the day of trouble, he will treasure '
  - type: note
    content: Or “hide,” “save,” “store,” “esteem.”
  - type: text
    content: me in his shelter,
  - type: text
    content: under the cover of his tent.
  - type: text
    content: He will lift me high upon a rock,
  - type: text
    content: out of reach from all my enemies who surround me.
  - type: text
    content: Triumphant now, I’ll bring him my offerings of praise,
  - type: text
    content: singing and shouting with ecstatic joy!
  - type: text
    content: 'Yes, I will sing praises to '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '7':
  - type: text
    content: Hear my cry. Show me mercy, and send the help I need!
  '8':
  - type: text
    content: 'I heard '
  - type: text
    content: your voice
  - type: text
    content: ' in my heart say, “Come, seek my face;”'
  - type: text
    content: my inner being responded,
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', I’m seeking your face with all my heart.”'
  '9':
  - type: text
    content: So don’t turn your face away from me.
  - type: note
    content: The Septuagint is “Don’t overlook me.”
  - type: text
    content: You’re the God of my salvation;
  - type: text
    content: how can you reject your servant in anger?
  - type: text
    content: You’ve been my only hope,
  - type: text
    content: so don’t forsake me now when I need you!
