document_id: COL.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Employers, treat your workers with equality and justice as you know that you also have a Lord and Master in heaven '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who is watching you
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Life of Prayer
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: Aristarchus, a fellow prisoner here with me, sends you his love. And Joshua (who is also called Justus) along with Mark, the cousin of Barnabas, also send you their loving greetings. You have already been informed that if Mark comes to you, receive him warmly. These three men are the only ones of the circumcision who have aided me here in the work of the kingdom of God, and they have been a great blessing to me.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: Epaphras, who is also from Colossae, sends his loving greetings. I can tell you that he is a true servant of Christ, who always labors and intercedes for you. His prayers are filled with requests to God that you would grow and mature, standing complete and perfect in the beauty of God’s plan for your lives. Epaphras has such great zeal and passion for you and for those who are from Laodicea and from Hierapolis.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And Luke, the beloved physician, sends his warm greetings to you, and Demas also. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Give my greetings to all the believers in Laodicea. And pray for dear Nymphas and the church that gathers in her '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is some debate about the gender of Nymphas. It may be that many of those who translated this in the early church had difficulty with a church being led by a woman. There are some manuscripts in Greek that have “the church that meets in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: her
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: house.”
      marker-yv: yv-n
    - type: text
      text: home.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Once you’ve read this letter publicly to the church, please send it on to the church of the Laodiceans, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As stated in the introduction to Ephesians, it is most likely that this missing letter to the Laodiceans is, in fact, the letter to the Ephesian church. However, the tradition of the Eastern Church is that the letter to the Laodiceans was actually 1 and 2 Thessalonians.
      marker-yv: yv-n
    - type: text
      text: 'and make sure you read the letter that I wrote to them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Be sure you give Archippus this message: “Be faithful to complete the ministry you received from our Lord Jesus!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is believed that Archippus was a spiritual leader in the region of Colossae, perhaps the bishop of Laodicea; he is also mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Philem. 2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . We can only speculate why Paul wanted this exhortation to be made to him. Some believe he was a minister of Christ who was discouraged and needed to be exhorted to not abandon his calling.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Now finally, I, Paul, write this with my own handwriting, and I send my loving greetings to you! Remember me in my imprisonment. May the blessings of God’s grace overwhelm you!
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Love in Christ
    - type: text
      text: ','
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Be faithful to pray as intercessors who are fully alert and giving thanks '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to God
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And please pray for me, that God will open a door of opportunity for us to preach the revelation of the mystery of Christ, for whose sake I am imprisoned. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Pray that I would unfold and reveal fully this mystery, for that is my delightful assignment.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as I should.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Walk in the wisdom of God as you live before the unbelievers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic could be translated “as you live in the wilderness.”
      marker-yv: yv-n
    - type: text
      text: 'and make it your duty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “sell your last crust of bread,” which is a metaphor for making a full commitment (i.e., giving all you’ve got).
      marker-yv: yv-n
    - type: text
      text: 'to make him known. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Let every word you speak be drenched with grace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word could also be translated “compassion.”
      marker-yv: yv-n
    - type: text
      text: 'and tempered with truth and clarity. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “seasoned with salt.” This is an idiom that means “friendly, clear, and making people thirsty for truth.”
      marker-yv: yv-n
    - type: text
      text: For then you will be prepared to give a respectful answer to anyone who asks about your faith.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Coworkers
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'Tychicus will tell you about what is happening with me. I have sent him to you so that he could find out how you are doing in your journey of faith, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that I may know your affairs.”
      marker-yv: yv-n
    - type: text
      text: 'and bring comfort and encouragement to your hearts. For he is a beloved brother in Christ, a faithful servant of the gospel and my ministry partner in our Master '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Again, the Aramaic title for Jesus is Lord (Master)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; this is the clearest title that could be stated to prove the deity of Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: work.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I have also sent Onesimus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the slave who ran away from his master, Philemon, who was a friend to the apostle Paul. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Philem. 10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'who is from your city, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he is one of you.”
      marker-yv: yv-n
    - type: text
      text: and is also a beloved and faithful brother who will inform you of all that we’re enduring.
