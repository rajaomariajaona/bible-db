      - type: text
        text: This was similar to rolling dice. Casting lots is not mentioned again in the New Testament after the Holy Spirit was poured out. The Aramaic reads “They raised up a shaking-free and elevated Matthias,” which indicates they shook free from Judas’ claim to apostleship and appointed Matthias.
