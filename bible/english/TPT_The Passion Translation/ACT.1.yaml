document_id: ACT.1,1849
type_code: eng
verses:
  '1':
  - type: text
    content: 'To Theophilus, '
  - type: note
    content: Some scholars believe that Theophilus could be a symbolic name and not necessarily one individual. This is most likely not written to one individual. When the meaning of his name is translated, the sentence reads, “I wrote to you before, O lover of God.” Both Luke and Acts were written to every lover of God.
  - type: text
    content: the lover of God.
  - type: text
    content: 'I write to you again, my dear friend, '
  - type: text
    content: to give you further details
  - type: text
    content: ' '
  - type: note
    content: This account was written by Luke, the human author of the Gospel of Luke. The title Lord Jesus is found only in the Aramaic. The Greek is simply “Jesus.”
  - type: text
    content: about the life of our Lord Jesus and all the things that he did and taught.
  - type: note
    content: Although Jesus’ work of redemption has been completed for us, there is still the unfinished work of preparing and beautifying his eternal partner, the bride of Christ. With gifts of power Jesus’ church is continuing what he began to do and teach through evangelism and discipleship. See Matt. 28:19–20; John 21:25; Eph. 4:11–13.
  '10':
  - type: text
    content: 'As they stared into the sky, watching Jesus ascend, two men in white robes suddenly appeared beside them. '
  '11':
  - type: text
    content: They told the startled disciples, “Galileans, why are you staring up into the sky? Jesus has been taken from you into heaven, but he will come back in the same way that you saw him ascend.”
  - type: heading
    content: A New Apostle Is Chosen
  '12':
  - type: text
    content: 'The disciples left the Mount of Olives and returned to Jerusalem, which was less than a mile away. '
  - type: note
    content: 'The Aramaic is “seven stadia” (furlongs). A furlong is about one-eighth of a mile. The Greek uses a phrase not found in the Septuagint or elsewhere in the Greek New Testament or in any Greek literature: “of a Sabbath having away.” It is rendered in most modern translations “a Sabbath’s journey.”'
  '13':
  - type: text
    content: 'Arriving there, they went into a large second-floor room '
  - type: text
    content: to pray
  - type: text
    content: '. '
  - type: note
    content: The Greek uses the definite article “the upstairs room.” This was where they had met before to have the Last Supper with Jesus. In Mark’s Gospel, after the disciples returned from witnessing the ascension, they preached, for Mark is the Gospel of ministry. In Luke, after Jesus’ ascension, they praised, and here in Acts they prayed.
  - type: text
    content: 'Those present were Peter, John, Jacob, Andrew, Philip, Thomas, Bartholomew, Matthew, Jacob (the son of Alpheus), Simon (the zealot), Judas (the son of Jacob), and a number of women, including Mary, Jesus’ mother. His brothers '
  - type: note
    content: Or “siblings.” Jesus’ four brothers are named in Matt. 13:55 and Mark 6:3 as Jacob, Joses (or Joseph), Simon, and Judah. Even though John 7:5 records that early in Jesus’ ministry his own brothers did not believe in him, they obviously later repented and received the revelation of the resurrected Christ, their own brother, and believed in him.
  - type: text
    content: 'were there as well. All of them were united in prayer, gripped with one passion, '
  - type: note
    content: The Aramaic is “They prayed with one soul.”
  - type: text
    content: interceding night and day.
  '15':
  - type: text
    content: 'During this time Peter stood up among the 120 believers who were gathered and said, '
  '16':
  - type: text
    content: '“Fellow believers, '
  - type: note
    content: Or “brothers.”
  - type: text
    content: 'the Scripture David prophesied by the Holy Spirit concerning Judas had to be fulfilled. '
  - type: note
    content: That is, replacing Judas with another to complete the Twelve. See v. 20.
  - type: text
    content: 'Judas betrayed our Lord Jesus and led the mob to the garden to arrest him. '
  '17':
  - type: text
    content: 'He was one of us, and he was chosen to be an apostle just as we were. '
  - type: note
    content: As translated from the Aramaic.
  '18':
  - type: text
    content: 'He earned the wages of his sin, '
  - type: note
    content: As translated from the Aramaic. The Greek is “He acquired a field with the reward of his wickedness.” Judas would have had no time between his betrayal and his suicide to purchase land. This plot of land was likely purchased by the Jewish authorities. They could not use the returned blood money for temple purposes, so instead they purchased a small burial plot for Judas.
  - type: text
    content: 'for he fell headfirst, and his belly split open, spilling his intestines on the ground. '
  '19':
  - type: text
    content: 'Everyone in Jerusalem knows what happened to him. That’s why the field where he died is called in Aramaic '
  - type: note
    content: Or “in the language of the region.” The Greek text is clear that the Jews of Jesus’ day spoke Aramaic, the language that Jesus and his apostles taught in. The Greek text transliterates the name of the field into a Greek equivalent for a Greek audience.
  - type: text
    content: '‘Haqel Dama,’ that is, ‘The Bloody Field.’ '
  '2':
  - type: text
    content: 'Just before he ascended into heaven, Jesus left instructions '
  - type: note
    content: Or “commands.”
  - type: text
    content: 'through the Holy Spirit for the apostles he had chosen. '
  '20':
  - type: text
    content: 'For it is written in the Psalms:'
  - type: text
    content: ‘Let his house be deserted and become a wasteland.
  - type: text
    content: No one will live there.’
  - type: note
    content: See Ps. 69:25.
  - type: text
    content: 'And also:'
  - type: text
    content: ‘Let another take his ministry.’
  - type: note
    content: See Ps. 109:8.
  '21':
  - type: text
    content: '“So then, we must choose his replacement from among those who have been with us from the very beginning, '
  - type: note
    content: Or “that our Lord Jesus went in and out among us.”
  '22':
  - type: text
    content: from John’s baptism until Jesus’ ascension. And, like us, he must be a witness of his resurrection.”
  '23':
  - type: text
    content: 'They proposed two candidates: Joseph, who is also called Barsabbas the Just, and Matthias. '
  - type: note
    content: Barsabbas means “son of promise.” Matthias means “gift of YHWH.”
  '24':
  - type: text
    content: 'They all prayed, “Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: As translated from the Aramaic. The Greek is simply “Lord.”
  - type: text
    content: 'you know the heart of every man. '
  - type: note
    content: The Greek is “Lord, you are the heart knower of all.”
  - type: text
    content: 'Please give us clear revelation to know which of these two men you have chosen '
  '25':
  - type: text
    content: 'to be an apostle and take Judas’ place because he renounced his apostleship to go where he belonged.” '
  - type: note
    content: The Aramaic is “go to his place.” The Greek is “departed from this life,” a euphemism for death.
  '26':
  - type: text
    content: 'They cast lots '
  - type: note
    content: This was similar to rolling dice. Casting lots is not mentioned again in the New Testament after the Holy Spirit was poured out. The Aramaic reads “They raised up a shaking-free and elevated Matthias,” which indicates they shook free from Judas’ claim to apostleship and appointed Matthias.
  - type: text
    content: and determined that Matthias was the Lord’s choice, so he was added to the eleven apostles.
  '3':
  - type: text
    content: 'After the sufferings of his cross, Jesus appeared alive '
  - type: text
    content: many times
  - type: text
    content: ' '
  - type: note
    content: Jesus appeared to his followers at least eleven times and taught them the mysteries of God’s kingdom realm. See also Matt. 13:11.
  - type: text
    content: 'to these same apostles over a forty-day period, '
  - type: note
    content: The number forty is significant, for it speaks of transformation and completeness through testing. Jesus was tempted for forty days, the deluge during Noah’s day lasted forty days and nights, Moses met with God for forty days on Sinai, Israel wandered for forty years, and Elijah fasted for forty days. Jesus spent forty days appearing to his disciples to teach them that a day of completeness and transformation had arrived. It took them forty days to comprehend that Christ’s kingdom was spiritual, not political.
  - type: text
    content: 'proving to them with many convincing signs that he had been resurrected. '
  - type: note
    content: The world is still waiting to see “many convincing signs” from our lives signifying that we too have been raised from the dead. Spiritual fruit and spiritual power provide these signs.
  - type: text
    content: During these encounters, he taught them the truths of God’s kingdom.
  - type: note
    content: The Aramaic adds, “and shared meals with them.”
  '4':
  - type: text
    content: 'Jesus instructed them, '
  - type: text
    content: “Don’t leave Jerusalem, but wait here until you receive the gift I told you about, the gift the Father has promised.
  - type: text
    content: ' '
  '5':
  - type: text
    content: For John baptized you in water, but in a few days from now you will be baptized in the Holy Spirit!”
  - type: note
    content: 'The Aramaic implies that they would be the ones who would do the baptizing: “John baptized you in water, but you will baptize [others] in the Holy Spirit.”'
  '6':
  - type: text
    content: Every time they were gathered together, they asked Jesus, “Lord, is it now the time for you to free Israel and restore our kingdom?”
  '7':
  - type: text
    content: 'He answered, '
  - type: text
    content: “The Father is the one who sets the fixed dates and the times of their fulfillment. You are not permitted to know the timing of all that he has prepared by his own authority.
  - type: text
    content: ' '
  '8':
  - type: text
    content: But I promise you this—the Holy Spirit will come upon you, and you will be seized with power.
  - type: text
    content: ' '
  - type: note
    content: Or “You will seize power.”
  - type: text
    content: You will be my messengers
  - type: text
    content: ' '
  - type: note
    content: Or “witnesses.” The Greek word can also be translated “martyrs.”
  - type: text
    content: to Jerusalem, throughout Judea, the distant provinces
  - type: text
    content: ' '
  - type: note
    content: Or “Samaria,” a term used for a distant province populated by another people group.
  - type: text
    content: —even to the remotest places on earth!”
  - type: note
    content: See Matt. 24:14.
  '9':
  - type: text
    content: 'Right after Jesus spoke those words, the disciples saw him being lifted into the sky, and disappearing into a cloud! '
  - type: note
    content: Or “A cloud came under him and took him up from their sight.” The Aramaic is “A cloud accepted him and covered him from their eyes.” He did not start from a cloud and ascend to outer space. He started from their visible presence, and disappeared from view in a cloud, ascending by that means into heaven. And when he returns, it will be in reverse order. We will see him appearing from out of a cloud, then descending back into our visible presence where we can see him and be forever with him.
