type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'To Theophilus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some scholars believe that Theophilus could be a symbolic name and not necessarily one individual. This is most likely not written to one individual. When the meaning of his name is translated, the sentence reads, “I wrote to you before, O lover of God.” Both Luke and Acts were written to every lover of God.
    marker-yv: yv-n
  - type: text
    text: the lover of God.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I write to you again, my dear friend, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to give you further details
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This account was written by Luke, the human author of the Gospel of Luke. The title Lord Jesus is found only in the Aramaic. The Greek is simply “Jesus.”
    marker-yv: yv-n
  - type: text
    text: about the life of our Lord Jesus and all the things that he did and taught.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although Jesus’ work of redemption has been completed for us, there is still the unfinished work of preparing and beautifying his eternal partner, the bride of Christ. With gifts of power Jesus’ church is continuing what he began to do and teach through evangelism and discipleship. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 28:19–20
      metadata:
        usfm: MAT.28.19+MAT.28.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 21:25
      metadata:
        usfm: JHN.21.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 4:11–13
      metadata:
        usfm: EPH.4.11+EPH.4.12+EPH.4.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Just before he ascended into heaven, Jesus left instructions '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “commands.”
    marker-yv: yv-n
  - type: text
    text: 'through the Holy Spirit for the apostles he had chosen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'After the sufferings of his cross, Jesus appeared alive '
  - type: usfm
    marker: it
    children:
    - type: text
      text: many times
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus appeared to his followers at least eleven times and taught them the mysteries of God’s kingdom realm. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:11
      metadata:
        usfm: MAT.13.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to these same apostles over a forty-day period, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The number forty is significant, for it speaks of transformation and completeness through testing. Jesus was tempted for forty days, the deluge during Noah’s day lasted forty days and nights, Moses met with God for forty days on Sinai, Israel wandered for forty years, and Elijah fasted for forty days. Jesus spent forty days appearing to his disciples to teach them that a day of completeness and transformation had arrived. It took them forty days to comprehend that Christ’s kingdom was spiritual, not political.
    marker-yv: yv-n
  - type: text
    text: 'proving to them with many convincing signs that he had been resurrected. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The world is still waiting to see “many convincing signs” from our lives signifying that we too have been raised from the dead. Spiritual fruit and spiritual power provide these signs.
    marker-yv: yv-n
  - type: text
    text: During these encounters, he taught them the truths of God’s kingdom.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic adds, “and shared meals with them.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus instructed them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t leave Jerusalem, but wait here until you receive the gift I told you about, the gift the Father has promised.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For John baptized you in water, but in a few days from now you will be baptized in the Holy Spirit!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Aramaic implies that they would be the ones who would do the baptizing: “John baptized you in water, but you will baptize [others] in the Holy Spirit.”'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Every time they were gathered together, they asked Jesus, “Lord, is it now the time for you to free Israel and restore our kingdom?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Father is the one who sets the fixed dates and the times of their fulfillment. You are not permitted to know the timing of all that he has prepared by his own authority.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I promise you this—the Holy Spirit will come upon you, and you will be seized with power.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You will seize power.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will be my messengers
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “witnesses.” The Greek word can also be translated “martyrs.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to Jerusalem, throughout Judea, the distant provinces
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Samaria,” a term used for a distant province populated by another people group.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: —even to the remotest places on earth!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 24:14
      metadata:
        usfm: MAT.24.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Right after Jesus spoke those words, the disciples saw him being lifted into the sky, and disappearing into a cloud! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A cloud came under him and took him up from their sight.” The Aramaic is “A cloud accepted him and covered him from their eyes.” He did not start from a cloud and ascend to outer space. He started from their visible presence, and disappeared from view in a cloud, ascending by that means into heaven. And when he returns, it will be in reverse order. We will see him appearing from out of a cloud, then descending back into our visible presence where we can see him and be forever with him.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'As they stared into the sky, watching Jesus ascend, two men in white robes suddenly appeared beside them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They told the startled disciples, “Galileans, why are you staring up into the sky? Jesus has been taken from you into heaven, but he will come back in the same way that you saw him ascend.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A New Apostle Is Chosen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The disciples left the Mount of Olives and returned to Jerusalem, which was less than a mile away. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Aramaic is “seven stadia” (furlongs). A furlong is about one-eighth of a mile. The Greek uses a phrase not found in the Septuagint or elsewhere in the Greek New Testament or in any Greek literature: “of a Sabbath having away.” It is rendered in most modern translations “a Sabbath’s journey.”'
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Arriving there, they went into a large second-floor room '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to pray
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek uses the definite article “the upstairs room.” This was where they had met before to have the Last Supper with Jesus. In Mark’s Gospel, after the disciples returned from witnessing the ascension, they preached, for Mark is the Gospel of ministry. In Luke, after Jesus’ ascension, they praised, and here in Acts they prayed.
    marker-yv: yv-n
  - type: text
    text: 'Those present were Peter, John, Jacob, Andrew, Philip, Thomas, Bartholomew, Matthew, Jacob (the son of Alpheus), Simon (the zealot), Judas (the son of Jacob), and a number of women, including Mary, Jesus’ mother. His brothers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “siblings.” Jesus’ four brothers are named in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:55
      metadata:
        usfm: MAT.13.55
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 6:3
      metadata:
        usfm: MRK.6.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: as Jacob, Joses (or Joseph), Simon, and Judah. Even though
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 7:5
      metadata:
        usfm: JHN.7.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: records that early in Jesus’ ministry his own brothers did not believe in him, they obviously later repented and received the revelation of the resurrected Christ, their own brother, and believed in him.
    marker-yv: yv-n
  - type: text
    text: 'were there as well. All of them were united in prayer, gripped with one passion, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “They prayed with one soul.”
    marker-yv: yv-n
  - type: text
    text: interceding night and day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'During this time Peter stood up among the 120 believers who were gathered and said, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Fellow believers, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “brothers.”
    marker-yv: yv-n
  - type: text
    text: 'the Scripture David prophesied by the Holy Spirit concerning Judas had to be fulfilled. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, replacing Judas with another to complete the Twelve. See v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '20'
      metadata:
        usfm: ACT.1.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Judas betrayed our Lord Jesus and led the mob to the garden to arrest him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He was one of us, and he was chosen to be an apostle just as we were. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He earned the wages of his sin, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “He acquired a field with the reward of his wickedness.” Judas would have had no time between his betrayal and his suicide to purchase land. This plot of land was likely purchased by the Jewish authorities. They could not use the returned blood money for temple purposes, so instead they purchased a small burial plot for Judas.
    marker-yv: yv-n
  - type: text
    text: 'for he fell headfirst, and his belly split open, spilling his intestines on the ground. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Everyone in Jerusalem knows what happened to him. That’s why the field where he died is called in Aramaic '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the language of the region.” The Greek text is clear that the Jews of Jesus’ day spoke Aramaic, the language that Jesus and his apostles taught in. The Greek text transliterates the name of the field into a Greek equivalent for a Greek audience.
    marker-yv: yv-n
  - type: text
    text: '‘Haqel Dama,’ that is, ‘The Bloody Field.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For it is written in the Psalms:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Let his house be deserted and become a wasteland.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one will live there.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 69:25
      metadata:
        usfm: PSA.69.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: text
    text: 'And also:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: ‘Let another take his ministry.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 109:8
      metadata:
        usfm: PSA.109.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
