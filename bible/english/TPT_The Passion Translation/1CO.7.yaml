document_id: 1CO.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sex and Marriage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now for my response concerning the issues you’ve asked me to address. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: You wrote saying
    - type: text
      text: ', “It is proper for a man to live in celibacy.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “not to marry.” The Aramaic can be translated “It is proper for a husband not to have intimacy with his wife at times.” Paul now responds to a series of questions posed by the church of Corinth.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to those who are married, I give this charge—which is not mine, but the Lord’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is not stating that there is an opposition between what he says, in his teaching as an apostle, and what the Lord says. He is taking our Lord’s own teaching from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 10:5–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and bringing it to the people.
      marker-yv: yv-n
    - type: text
      text: '—that the wife should not depart from her husband. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if she does, then she should either remain unmarried or reconcile with her husband. And a husband must not divorce his wife. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the rest I say, which is not a saying of the Lord, if a brother has an unbelieving wife and she is content to live with him, he should not divorce her. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if a woman has a husband who is not a believer and he is content to live with her, she should not divorce him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the unbelieving husband has been made holy by his believing wife. And the unbelieving wife has been made holy by her believing husband '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by virtue of his or her sacred union to a believer
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The unbelieving husband is made holy because of the wife, and the unbelieving wife because of her husband.” By implication, Paul is making the point that in marriages where one is a believer and one an unbeliever, the spouses should remain together, for the righteous faith of a believer makes the marriage holy. Apparently, because of their desire to serve Christ, some of the Corinthians who had pagan spouses thought it would be best to divorce their spouses and find believing ones. Paul corrects that error and affirms the marriage covenant.
      marker-yv: yv-n
    - type: text
      text: 'Otherwise, the children from this union would be unclean, but in fact, they are holy. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the concepts of the Old Testament, the entire family is in covenant with God. Therefore, the children of even one believing parent are set apart for God.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if the unbelieving spouse wants a divorce, then let it be so. In this situation the believing spouse is not bound '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “enslaved.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: to the marriage
    - type: text
      text: ', for God has called us to live in peace.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And wives, for all you know you could one day lead your husband to salvation. Or husbands, how do you know for sure that you could not one day lead your wife to salvation?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translators are almost equally divided over making this an optimistic possibility versus a pessimistic one. If the pessimistic choice of grammar is chosen, the verse could be translated “Wife, how do you know that you will save your husband? And husband, how do you know that you will save your wife?” Which would infer “It’s no use hanging on to a marriage with no hope of converting the unbelieving spouse, for how do you know it would ever happen?” Though both are possible, this translation has chosen the optimistic possibility.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living the Life God Has Assigned
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May all believers continue to live the wonderful lives God has called them to live, according to what he assigns for each person, for this is what I teach to believers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in all the churches.”
      marker-yv: yv-n
    - type: text
      text: 'everywhere. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If when you were called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to follow Jesus
    - type: text
      text: ' you were circumcised, it would be futile to try to undo the circumcision. And if you were called while yet uncircumcised, there is no need to be circumcised. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Your identity '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before God
    - type: text
      text: ' has nothing to do with circumcision or uncircumcision. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Circumcision is nothing and uncircumcision is nothing.” No doubt this statement was a tremendous shock to the Corinthians. To the Jews it would be earthshaking, for circumcision was the outward sign of God’s covenant with Abraham and his descendants. Paul, as elsewhere, places the emphasis not on outer things but on an inward transformation that longs to please God.
      marker-yv: yv-n
    - type: text
      text: 'What really matters is following God’s commandments. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Perhaps. But because of the danger of immorality, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “because of immoralities” or “because of prostitutions.”
      marker-yv: yv-n
    - type: text
      text: 'each husband should have sexual intimacy with his wife and each wife should have sexual intimacy with her husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So everyone should continue to live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faithful
    - type: text
      text: ' in the situation of life in which they were called '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to follow Jesus
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is teaching that no matter what a person’s situation is in life, the real change needed is not just in circumstances, but in a heart that is willing to be faithful to God in all things. We often wish we could be in different circumstances instead of looking for opportunities to serve God where we are.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Were you a slave when you heard the call '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to follow Jesus
    - type: text
      text: '? Don’t let that concern you. Even if you can gain your freedom, make the most of the opportunity. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For truly, if you are called to a life-union with the Lord, you are already a free man! And those who were called to follow Jesus when they were free are now the Messiah’s slaves. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since a great price was paid for your redemption, stop having the mind-set of a slave. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Brothers and sisters, we must remain in close communion with God, no matter what our situation was when we were first called to follow Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions to the Single and Widowed
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now let me address the issue of singleness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “virgins.”
      marker-yv: yv-n
    - type: text
      text: 'I must confess, I have no command to give you that comes directly from the Lord. But let me share my thoughts on the matter, as coming from one who has experienced the mercy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “one who has been mercied.”
      marker-yv: yv-n
    - type: text
      text: 'of the Lord to keep me faithful to him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of the severe pressure we are in, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “impending crisis.” Some scholars believe this severe pressure could refer to the great famine of AD 51, while others view it as imminent persecution.
      marker-yv: yv-n
    - type: text
      text: 'I recommend you remain as you are. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you are married, stay in the marriage. If you are single, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “If you are divorced, don’t seek marriage.”
      marker-yv: yv-n
    - type: text
      text: 'don’t rush into marriage. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you do get married, you haven’t sinned. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “If you [men] do get married it is not sin, and if a [female] virgin marries, she hasn’t sinned.” This translation combines both statements with brothers and sisters.
      marker-yv: yv-n
    - type: text
      text: It’s just that I would want to spare you the problems you’ll face with the extra challenges of being married.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My friends, what I mean is this. The urgency of our times mean that from now on, those who have wives should live as though without them. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A husband has the responsibility of meeting the sexual needs of his wife, and likewise a wife to her husband. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic (and a few of the oldest Greek manuscripts) can be translated “The husband should pay back the love he owes to his wife and the wife to her husband.”
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And those who weep should forget their tears. And those who rejoice will have no time to celebrate. And those who purchase items will have no time to enjoy them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We are to live as those who live in the world but are not absorbed by it, for the world as we know it is quickly passing away. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because of this, we need to live as free from anxiety as possible.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For a single man is focused on the things of the Lord and how he may please him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a married man is pulled in two directions, for he is concerned about both the things of God and the things of the world in order to please '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “to beautify.”
      marker-yv: yv-n
    - type: text
      text: 'his wife. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the single woman is focused on the things of the Lord so she can be holy both in body and spirit. But a married woman is concerned about the things of the world and how she may please her husband. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I am trying to help you and make things easier for you and not make things difficult, but so that you would have undistracted devotion, serving the Lord constantly with an undivided heart.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, if a man has decided to serve God as a single person, yet changes his mind and finds himself in love with a woman, although he never intended to marry, let him go ahead and marry her; it is not a sin to do so. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is arguably one of the most difficult verses to translate in all the New Testament. You will find many possible translations and interpretations of this passage, which is loaded with cultural implications for the first-century church. Consulting a variety of translations is recommended.
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the other hand, if a man stands firm in his heart to remain single, and is under no compulsion to get married but has control over his passions and is determined to remain celibate, he has chosen well. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, the one who marries his fiancée does well and the one who chooses not to marry her does better.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Remarriage
    marker-yv: yv-h
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A wife is bound '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by the marriage covenant
    - type: text
      text: ' as long as her husband is living. But if the husband dies, she is free to marry again as she desires—but, of course, he should be a believer in the Lord. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither the husband nor the wife have exclusive rights to their own bodies, but those rights are to be surrendered to the other. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: However, in my opinion (and I think that I too have the Spirit of God), she would be happier if she remained single.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So don’t continue to refuse your spouse those rights, except perhaps by mutual agreement for a specified time so that you can both be devoted to prayer. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some later manuscripts add “and fasting.”
      marker-yv: yv-n
    - type: text
      text: 'And then you should resume your physical pleasure so that the Adversary cannot take advantage of you because of the desires of your body. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[lack of] self-control.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I’m not giving you a divine command, but my godly advice. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “concession.” There are at least two ways this could be interpreted: (1) Paul is saying that to be married is advisable but not commanded. This seems the most likely because of v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (2) Paul is referring to the preceding paragraph, especially regarding the advice of abstinence during seasons of prayer.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I would wish that all of you could live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unmarried
    - type: text
      text: ', just as I do. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “I wish that all humanity lived in purity as I do.” It is possible that Paul was once married and became a widower. Some suggest he had to have been married at the time he persecuted the early church, since only married men could be part of the Sanhedrin and cast a vote. However, there is evidence that some Jewish leaders during his time were committed to celibacy. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 26:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Yet I understand that we are all decidedly different, with each having a special grace for one thing or another.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both being single and being married require a special grace from God.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So let me say to the unmarried and those who have lost their spouses, it is fine for you to remain single as I am. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you have no power over your passions, then you should go ahead and marry, for marriage is far better than a continual battle with lust.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “better than to have a fire ever smoldering within them.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
