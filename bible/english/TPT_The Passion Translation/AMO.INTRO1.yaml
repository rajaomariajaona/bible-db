  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Samaria.
  - type: text
    text: ' Likewise, Amos focused on Samaria, the political capital of the Northern Kingdom, when lambasting the leaders for neglecting righteousness and justice. Relevant references are found in 3:9, 12; 4:1; 6:1.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Seeing Jesus in the Book.
  - type: text
    text: ' The majority of the book of Amos focuses on the indictment of the faithless nation of Israel and her inevitable downfall that will follow as a manifestation of the judgment of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. However, there is also the inescapable and glorious climax of the coming blessing of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' (9:11–15). It is here that the Christological focus of the prophecy may be found. The climactic blessing of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is bound up with the consummation of redemption, expressed in the ultimate pardon, renewal, restoration, and manifestation of the everlasting kingdom of God. Such a kingdom embodies both an initial earthly fulfillment and then a heavenly one, expressed via the metaphor of the new heavens and the new earth.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'After the hard-hitting and very specific indictment of Israel throughout Amos for her sins and the description of her resulting downfall, why this shockingly sudden turn to blessing and renewal? How can Israel, who has oppressed the poor and harbored injustice, experience the blessing side of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '? For that matter, how can any of us? The key to this final manifestation of the blessing of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' lies in the coming of the Messianic King, Jesus Christ, the Son of God and Redeemer of the world. In other words, Jesus Christ unlocks the doorway to the climactic and eternal fulfillment of the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '—if we understand the good news of Jesus, we will understand why and how the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will be fulfilled.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'At the heart of the gospel is the redemptive, atoning sacrifice of Jesus on the cross: a personal substitutionary offering that covered and atoned for the sins of the world, for all those who believe in him, confess their sins, and trust in his redemptive self-sacrifice to obtain that forgiveness, once and for all. No matter how great and iniquitous our sins—both individual and corporate—the blood of Christ cleanses us, and we remain ever pure. Only through Jesus’ redemption of his people can the good promises tied to the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' be given to the Israelites in spite of their sins.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: The final verses of Amos 9 express this hope in its earthly fulfillment for the people of God—namely, in the promise that God will repair the damage done to the house and lineage of David and restore that kingdom to the people of Israel (v. 11), including those nations over whom David had formerly ruled (v. 12). The promised prosperity, in line with the language of the old covenant associated with literal, economic, and material blessing, guarantees the future of Israel as one of unparalleled affluence (vv. 13–14). The final verse (v. 15) makes explicit the promise that the Israelites will never again be uprooted from the land that God had given to them. Now, the ultimate fulfillment of this promised kingdom renewal is not literal and physical but spiritual and otherworldly. The conclusive expression of the kingdom of God will not be found on this earth but in the glorious environment of the new heavens and the new earth.
