- type: usfm
  marker: is1
  children:
  - type: text
    text: About the Book of Amos
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos is arguably the most strident and outspoken of the prophetic books. It is classified as a “minor” prophet but only because of the book’s brevity, not as a reflection of the power and timelessness of its message.
- type: usfm
  marker: ip
  children:
  - type: text
    text: This book has eternal significance because every civilization that achieves prosperity runs the risk of losing touch with its foundational principles, ensuring its eventual downfall. As it turns out, Amos was correct in his warnings. A generation after his prophecies, the “ten lost tribes of Israel” were wiped out by the Assyrians, never to be heard from again.
- type: usfm
  marker: ip
  children:
  - type: text
    text: A nation can only endure if it continues to cultivate the values of justice and righteousness, without which its religious activity is a sham.
- type: usfm
  marker: iq1
  children:
  - type: text
    text: Spare me the monotonous melodies of your “worship.”
- type: usfm
  marker: iq1
  children:
  - type: text
    text: I don’t want to hear your strumming guitars anymore.
- type: usfm
  marker: iq1
  children:
  - type: text
    text: It’s just noise to me.
- type: usfm
  marker: iq1
  children:
  - type: text
    text: However, I delight in
- type: usfm
  marker: iq1
  children:
  - type: text
    text: a land where justice flows like a river
- type: usfm
  marker: iq1
  children:
  - type: text
    text: and where true righteousness rolls like a steady flowing stream. (Amos 5:23–24)
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos would have no respect for those of us religious insiders who perhaps insist that our faith has no place in the public square or the marketplace. It was his very faith that drove him to confront the corrupt leaders of both.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Purpose
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos saw his vocation as agricultural, not religious, but he felt compelled by God to call the leaders of the Northern Kingdom of Israel to account even though he was from the Southern Kingdom of Judah. What emerged is powerful preaching of righteousness and justice in the face of corruption and decadence—both political and spiritual. Peering over the border to the north at Israel, Amos observed a wealthy nation that was overripe and slipping into decadence, losing touch with its own covenant identity, and he intended to do something about it. He left his hometown of Tekoa and embarked on a scorching speaking tour of his neighbor to the north, sending leaders running for cover and asking him to go back home and prophesy there instead.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The initial oracles given to Amos by God concern the surrounding pagan nations as well as Israel and Judah (1:3–2:16), and they effectively enhance the impact of Amos’ central purpose: calling the rebellious nation of Israel to account. This opening passage contains eight powerful indictments and accompanying catastrophic judgments against a succession of godless nations, the final two of which are Judah and Israel. What is significant here is the ethnic, religious, and cultural identity of these nations, considered sequentially, along with the consistently repeated and ominous refrain throughout: “For the three terrible crimes of . . . no, make that four” (1:3, 6, 9, 11, 13; 2:1, 4, 6).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: The first three indictments are leveled against Aram (and her city Damascus), Philistia (and her city Gaza), and Phoenicia (and her city Tyre). These nations were all culturally, ethnically, and religiously pagan, three of the many gentile territories in the geographic vicinity of the covenant people of Israel.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'However, the next three nations Amos condemned were Edom, Ammon, and Moab, which may be designated as “family nations” related to Israel. These all originated from the wider family of the patriarchs who received the covenant of promise from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' himself: Edom was founded by the descendants of Esau, the twin brother of Jacob, father of the twelve sons who formed the tribal nucleus of the nation of Israel (Gen. 25:19–34; 27; 32–33). The nations of Ammon and Moab were founded, respectively, by the descendants of the two sons of Lot, the nephew of the patriarch Abraham. Ammon (also known as Ben-Ammi) and Moab were born to the two daughters of Lot as the result of an incestuous union with their father (Gen. 19:30–38). The final two nations to be indicted were Judah and Israel. And the most detailed condemnation by far was reserved for Israel (Amos 2:6–16).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: The ordering of the successive condemnation of all these nations is significant. Amos’ original audience would have been well aware that the condemnation began with rank “outsiders,” the pagan gentile nations of Aram, Philistia, and Phoenicia. Then, as the indictments of Edom, Ammon, and Moab followed, the Israelite audience would have begun to feel uncomfortable since these nations had “blood connections” with the covenant people of God. Then the final manifestation of divine judgment fell upon them—first of all Judah, then Israel. It is hard to see how this approach could have been the result of anything other than deliberate intent or purpose.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'What follows in the prophecy, right up until almost the very end, is a devastating series of judgment oracles designed to expose the very core of Israel’s rebellion against their covenant God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', resulting in a terrifying sequence of punishments that functioned essentially as covenant curses. It is, in fact, only right at the end of Amos’ prophecy (9:11–15) that God reveals his ultimate promise of forgiveness, renewal, and restoration for his wayward people.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Amos highlights '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s goodness as a God of righteousness and justice alongside his resultant judgment—judgment that has no favorites. He does not pass over those who think they are safe as religious “insiders” and yet persist in practicing oppression and injustice.
- type: usfm
  marker: ip
  children:
  - type: text
    text: The Lion still roars from Zion (1:2), but that “roar” will ultimately be replaced by a gentle yet powerful expression of divine compassion, mercy, and forgiveness directed toward the people of God. Eventually, the undying, eternal fulfillment of God’s covenant promises will be realized.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Author and Audience
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos called himself a sheep breeder and fig dresser from the town of Tekoa, near the border between Judah (south) and Israel (north). Obviously not a peasant farmer, Amos spoke with great confidence, potency, and authority, as someone used to giving, not receiving, orders. He clearly saw himself as a peer with the leadership of Israel and had no fear of them (7:12–17).
- type: usfm
  marker: ip
  children:
  - type: text
    text: It is important for the modern reader to understand the geography and history of the time of Amos. The united kingdom of Israel of Saul, David, and Solomon had split in two some two hundred years earlier. The Northern Kingdom (ruled from Samaria) retained the name Israel, and the Southern Kingdom (ruled from Jerusalem) went by the name of its most powerful tribe, Judah. Sometimes the prophets referred to both nations together, collectively, as Israel/Jacob, and sometimes the same label meant only the Northern Kingdom. Amos was from the south and prophesied in the north.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The apocryphal (not considered Scripture by Jews or Christians) book '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Lives of the Prophets
  - type: text
    text: ' suggests that Amos may have been murdered by Northern Kingdom priests and buried in Tekoa. But we are unable to know this with any certainty.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos’ command of language is on par with any biblical author, as he expressed himself with exceptionally bold clarity. This suggests not only a high level of education but also the pragmatic wisdom of someone accustomed to leadership and public speaking. No one who heard him could have any doubt about what he was trying to say. Amos wastes no time going for the throat. It is unclear whether Amos spoke these things and others wrote them down or if he both wrote and spoke these words.
- type: usfm
  marker: ip
  children:
  - type: text
    text: The original audience was without a doubt the people and leaders of the Northern Kingdom of Israel. Later, during the Babylonian captivity, the rabbis saw the eternal value of the book and included it with other prophetic books, which became known as the Twelve.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Amos is one of the most chillingly relevant books in the Bible. Just because the stock market may be doing well does not mean that our civilization is safe from collapse from within. May your reading of Amos spur you to speak out boldly against injustice and corruption wherever you find them, even if you find them within yourself.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Major Themes
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Righteousness.
  - type: text
    text: ' The Hebrew root for “righteousness” is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tsaddiq
  - type: text
    text: . It is all about uprightness and integrity, living one’s life above reproach both privately and publicly, literally “walking tall.” It is an especially important quality for those who lead a society, whether in religion, politics, or the marketplace. When people lose trust in the leadership of a nation, destruction is around the corner. The lust for power without righteousness leads to the disintegration of the very foundation on which a nation is built.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Justice.
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Shapat
  - type: text
    text: ', the Hebrew root for “justice,” is all about judging and discerning with an unusually stubborn pursuit of pure truth, totally free of bias and spin. Amos had an innate gift for sensing when this essential insight was missing. He came down hard on those who perverted justice (5:9–12).'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Economic Oppression of the Poor.
  - type: text
    text: ' One powerful expression of the lack of righteousness and justice in Israel in the mid-700s BC was that of economic oppression and exploitation of the poor in the land. The book shows several instances of this throughout: 2:6–7; 3:9; 4:1; 5:11–12; 8:4–6. One specific illustration of this abuse was the practice of making debt-slaves of the poor (2:6). When corruption follows prosperity, the poor are the ones who suffer most. Usury, the practice of charging high interest on financial loans, has been a demon lurking under banking and lending tables since the dawn of time. Our word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mortgage
  - type: text
    text: ' (think '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mortality
  - type: text
    text: ) comes from the French for “death pledge” or “a pledge until you die.”
- type: usfm
  marker: ip
  children:
  - type: text
    text: Corruption is also a powerful subset of the practice of economic oppression. The marketplace was rigged (8:4–6). The currency was manipulated. Diminishing the buying power of the public through dishonest weights and measures or debasing/inflating the currency is a trick that has been played by those “regulating” the exchange of goods and services since the first marketplaces were established deep in our human past. It has become more sophisticated in our day, but clearly, it is still going on.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: True and False Prophecy.
  - type: text
    text: ' “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says this” is a common phrase in Amos (and much of prophetic literature). The prophets saw themselves as a pipe through which the living water of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s word would flow out to the people. In modern usage, the word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prophet
  - type: text
    text: ' has deteriorated into “fortune teller.” The original Hebrew word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nabiʾ
  - type: text
    text: ', in contrast, suggests a fountain through which the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' springs forth. The prophet spoke a message for his own present time, often with eternal and future implications. Biblical prophets saw themselves, literally, as mouthpieces for the Almighty, speaking to the issues of the day.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'However, Amos’ prophecy has clear instances where God condemned the Israelites for the emergence of false prophets—impostors—who claimed to be the mouthpieces of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' but, in fact, were not. They were only concerned with their fabricated messages that reflected their own selfish agendas (2:11–12). A particularly powerful divine indictment and subsequent punishment were leveled against the false prophet and priest Amaziah, who challenged and then dismissed Amos as a voice that could not be taken seriously (7:10–17). In the end, God promised to withdraw his word entirely from his people via a famine of the word of God; that is, there would be no more genuine prophets of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' available to convey divine revelation to his people (8:11–12).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Biblical Hebrew does not have the same past-present-future verbal system used in English. Rather, the two main tenses are complete (perfect) and incomplete (imperfect). The people of ancient Israel did not think of things in terms of a timeline progression, as English speakers do, but rather in terms of being either finished or in process. The beautiful linguistic dance between complete and incomplete was the playing field of the prophets, brought to its highest apex in the book of Isaiah, and sheds light on the words of Jesus, who on the cross spoke forth, “It is finished” (John 19:30).
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Religious Blending (Syncretism).
  - type: text
    text: ' Israel had recently conquered neighboring peoples and had tolerated or even incorporated the worship of their gods. The technical term for such religious duplicity is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: syncretism
  - type: text
    text: ', and Amos contains several references to such idolatrous worship by both Judah and Israel (Amos 2:4; 5:25–26; 8:13–14). There is only one creation and thus one Creator (4:13; 9:5–6), and any diffusion or fragmentation of worship among many gods and their images (idols) leads to cultural confusion, incoherence, decline, and eventual erosion of any society’s foundational principles. These principles were embodied in Israel’s unifying covenant relationship and its high standards, with the one Creator-God, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', who cannot be represented by any graven image.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Responsibility of Leaders.
  - type: text
    text: ' With great authority comes great responsibility to care for all people, including the poor. Israel also had a special calling from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', who brought her out of slavery in Egypt (2:10). With this empowering calling, responsibility increased even more. Neglect of such responsibility, thus, had crushing consequences. It was about these gathering storm clouds of consequence that Amos was warning the people, much as his words warn us today. Examples of flawed and corrupt leadership in Amos include 3:9–10; 4:4–5; 5:7–10, 15; 6:1–8; 7:10–17.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Day of
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: .
  - type: text
    text: ' Most of us who believe in God think, to this day, that the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' (5:18) will be a good day for us and perhaps a bad day for people we don’t like. This is what the people of Amos’ day believed, but the prophet issued an alarming woe-oracle against those Israelites who longed for such a day. The Israelites were not as blameless as they thought; the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' might not be as good for them as they self-righteously assumed.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'However, notwithstanding these observations, this final major section of the book (5:18–9:15) makes it very clear that the day of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has two distinctive and contrasting sides: it will be a day of judgment and a day of blessing. To be sure, the negative element of judgment—textually speaking—predominates from 5:18 right through 9:10. Then the final verses of the prophecy (9:11–15) constitute the glorious climactic manifestation of that day, where the positive element shines through—namely, the realization and fulfillment of God’s covenant blessing to pardon, renew, and restore the wayward people of Israel to their land. It is a promise that will never fail because such a restoration, initially fulfilled in a literal return to the promised land after exile, will find its ultimate consummation in the eternal kingdom of God. See the final section of the introduction, Seeing Jesus in the Book, for further comments on this theme.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Reading Amos forces us to be watchful for corruption and dishonesty in our own lives and to ask ourselves if we are perpetuating or benefitting from rigged systems of economic or political injustice. If you hire people, are you taking good care of your employees or just getting the most you can out of them while paying them the least you can get away with? Do you market your goods or services to people who can’t afford them, forcing them into a cycle of debt? Do your votes saddle future generations with government debt? Amos was very clear that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will be balancing the books, and “that day” of reckoning is always just around the corner.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Bethel.
  - type: text
    text: ' Amos focused on Bethel, the symbol of everything that was wrong with the Northern Kingdom spiritually, throughout the book. Bethel was the location of a temple that was a rival counterpart to the one in Jerusalem (Southern Kingdom) and where King Jeroboam II worshiped (7:13). References to the religious blight associated with Bethel are found in 3:14; 4:4; 5:5–6; 7:10–13.'
- type: usfm
  marker: ip
