  - type: text
    content: ', their eyes were opened, and they realized they were naked, '
  - type: text
    content: vulnerable, and ashamed
  - type: text
    content: '; so they sewed fig leaves '
  - type: note
    content: The fig tree was the only thing Jesus cursed while on earth (see Matt. 21:19). Fig leaves are a picture for whatever we hide behind to cover our spiritual shame. This is the first attempt of man to cover his nakedness. Our works are never enough to cover our sinfulness. The robe of righteousness that Jesus clothes us in is perfect. See 2 Cor. 5:21.
