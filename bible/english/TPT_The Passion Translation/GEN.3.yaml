  '1':
  - type: heading
    content: The Fall
  - type: text
    content: 'Now the snake '
  - type: note
    content: The Hebrew word for “snake” (serpent) is nachash, a very elastic term in Hebrew. It can function as a noun, a verb, or even as an adjective. When nachash functions as a noun, it means “snake”; when nachash serves as a verb, it means “to practice divination [deception].” When nachash has the definite article attached to it (as in this verse—“the snake”) it can be translated “the diviner [deceiver].” When nachash serves as an adjective, its meaning is “shining” or “polished” (i.e., “shiny”). By adding the definite article to the word, ha nachash can then be rightly translated “the shining one.” Angelic or divine beings are described elsewhere in the Bible as “shining” or “luminous,” at times with this very word, nachash. “The shining one” is the literal meaning of Lucifer. See Isa. 14:12.
