  - type: text
    content: He will crush your head
  - type: text
    content: as you crush his heel.”
  - type: note
    content: Or “He will batter your head, and you will batter his heel.” However, the structure of the sentence (subject before the verb) implies a synchronic action, making the second clause concessive. This is the Protoevangelium, God’s first announcement of a Savior, and presents a preview of Jesus Christ, who would be wounded by the snake/sin on his heel but bring a death blow to Satan by the power of his cross and resurrection. See Isa. 53:10; Col. 2:14.
  '16':
  - type: text
    content: Then God said to the woman,
  - type: text
    content: “I will cause your labor pains in childbirth to be intensified;
  - type: note
    content: Or “I will multiply your pain and your pregnancies,” a likely hendiadys.
  - type: text
    content: 'with pain '
  - type: note
    content: The Hebrew word for “pain” (’etsev) is a homophone that can also mean “creativity.” God will use our painful situations to birth and express his beautiful creativity through us. Many works of art, compositions of music, and powerful acts of kindness have been birthed through the “labor pains” of our sometimes-troubled past. Pain can be the incubator of creativity and beauty.
  - type: text
    content: you will give birth to children.
  - type: text
    content: 'You will desire '
  - type: note
    content: Or “your craving” (noun). There is no verb in this clause; it is borrowed from the next.
  - type: text
    content: to dominate
  - type: text
    content: ' your husband,'
  - type: text
    content: 'but he will '
  - type: text
    content: want to
  - type: text
    content: ' dominate you.”'
  - type: note
    content: 'Sin brought a painful conflict and power struggle into the home. This clause is not a statement of God’s ideal (that either husband or wife dominate) but a result of the fall of humanity (arguing over who will be first place in the home). Husband and wife are both meant to reign and take dominion, for they are one. The thematic context is that of pain/conflict: conflict between the seed of the woman and the seed of the snake, conflict (pain) in childbirth and child rearing, and conflict in marriage. God’s ideal for marriage is a mutual submission, deference, and sacrificial love that places the other above ourselves. See Eph. 4:32–5:2, 18–33. See also Susan T. Foh, “What is the Woman’s Desire?” Westminster Theological Journal 37 (1975): 376–83; Irvin Busenitz, “Woman’s Desire for Man: Genesis 3:16 Reconsidered.” Grace Theological Journal 7.2 (1986) 203–12.'
