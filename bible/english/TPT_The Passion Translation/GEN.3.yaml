        text: ). When God clothed Adam and his wife, he did more than cover their nakedness. Moved by love, he clothed them to cover their shame. The role of Adam and Eve as rulers on the earth was not erased by their fall. They were still commissioned as a priest and priestess by God himself. God’s love shines through this episode, for he was the One who, as an act of grace, caringly provided adequate covering for their bodies. For God to use bloodstained animal skins as royal robes to clothe his beloved Adam and Eve meant that animals had to be sacrificed to provide their covering. See
