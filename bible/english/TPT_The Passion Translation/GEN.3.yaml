  '20':
  - type: text
    content: The man named his wife Eve—
  - type: text
    content: “Life-Giver,”
  - type: text
    content: ' '
  - type: note
    content: Adam changed her name from “Woman” to “Eve,” the first of many name changes in the Bible. The Hebrew contains a pun, or paronomasia, with the name Eve, for her name Havvah is very similar to the word for “life” (khayah, or “living one”). God gave the woman the ability to not only have babies but to also release life in a variety of expressions. Eve brought life into the structure of Adam’s world. What does the Scripture tell us about the woman? First, she is God’s chosen ’ezer (see Gen. 2:18), a protector, a provider, and a source of strength for a man. Second, she was taken from man, equally a partner under the Lord and perfectly matched for reunion as one. Third, she is the carrier of life for all humanity. A woman enfolds all three roles in one person.
  - type: text
    content: because she would become the mother of every human being.
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: '-God made garments '
  - type: note
    content: This could also be translated “coats,” “robes,” or “tunics.”
  - type: text
    content: 'from animal skins '
  - type: note
    content: Their first sight of death was an innocent sacrifice, killed for them.
  - type: text
    content: 'to clothe '
  - type: note
    content: Father God did what any good father will do when a child fails. He wrapped his love around them and did not degrade them. This verb (“to clothe”) is mostly used for kings who clothe others with robes (see Gen. 41:42), or for priests who are clothed with sacred garments (see Ex. 28:41; 29:8; 40:14). When God clothed Adam and his wife, he did more than cover their nakedness. Moved by love, he clothed them to cover their shame. The role of Adam and Eve as rulers on the earth was not erased by their fall. They were still commissioned as a priest and priestess by God himself. God’s love shines through this episode, for he was the One who, as an act of grace, caringly provided adequate covering for their bodies. For God to use bloodstained animal skins as royal robes to clothe his beloved Adam and Eve meant that animals had to be sacrificed to provide their covering. See Ezek. 16:8.
  - type: text
    content: 'Adam and Eve. '
