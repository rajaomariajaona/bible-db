  '18':
  - type: text
    content: It will sprout weeds and thorns,
  - type: note
    content: Thorns are part of the curse brought about by the sin of man. Jesus wore a crown of thorns (see John 19:2) because he took our curse and set us free. For the topic of thorns, see also the footnote on Song. 2:2; Matt. 13:3–9, 18–23; 2 Cor. 12:7; Heb. 6:4–8.
  - type: text
