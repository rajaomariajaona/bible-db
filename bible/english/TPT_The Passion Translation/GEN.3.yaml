  '15':
  - type: text
    content: 'And I will place '
  - type: text
    content: great
  - type: text
    content: ' hostility between you and the woman,'
  - type: text
    content: 'and between her seed '
  - type: note
    content: Or “offspring.” The seed of the woman is Jesus Christ. The male carries the seed, but Jesus Christ is the seed of the woman, for there was no human father to conceive him. See Rom. 16:20; Gal. 4:4; Heb. 2:14; Rev. 12:1–5. Christ has sown himself as the seed into our hearts. We have been born again, not by a corrupting seed, but by an Incorruptible Seed, the living and abiding Word of God (see 1 Peter 1:23).
  - type: text
