  '9':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: -God called Adam’s name and asked, “Where are you?”
  - type: note
    content: 'When Adam first sinned, he should have gone immediately to God to beg for mercy and forgiveness. Instead he did just what millions are doing today: he ran and hid from God so that God had to come and look for him. God knew where he was hiding but wanted Adam to admit his sin. The first question God asked in the Bible—“Where are you?”—shows that we belong to God. He longs for each of us to examine our own lives, be honest with him, and come out of hiding. The first question of the New Testament is “Where is the child who is born king of the Jewish people?” (Matt. 2:2). And the first question Jesus asked was “What do you want?” (John 1:38–39). Our answers to these three questions hold the keys to understanding the need of our hearts, our life’s passion, and God’s plan for our lives. See Matt. 6:33.'
