  '23':
  - type: text
    content: 'Therefore, '
  - type: text
    content: Yahweh
  - type: text
    content: '-God expelled him from Eden’s paradise to till the ground from which he was taken. '
  - type: note
    content: Taken from the earth, the man was now given the earth to till. Turning over the soil is a picture of how man must guard his heart, his life. We must become those who have been loosened and opened to the rain of God. The Tree of Life must be planted in the soil of the human heart. When God charged man to till the ground, it meant that the soil of his heart must be broken up and prepared for this beautiful Tree to come into him and branch out through him. See John 15.
  '24':
  - type: text
    content: 'He drove them out of the garden, and placed '
  - type: note
    content: This is the Hebrew word from which we get “shekinah.”
  - type: text
    content: fearsome
  - type: text
    content: ' angelic sentries '
  - type: note
    content: Or “cherubim,” from the masculine word kerub, translated “one who intercedes” or “one with knowledge,” borrowed from the Assyrian language from a root word meaning “to be near.” See 1 Sam. 4:4; 2 Sam. 6:2; 2 Kings 19:15; 1 Chron. 13:6; Pss. 18:9–10; 80:1; 99:1; Isa. 37:16; Ezek. 10:1–22.
  - type: text
    content: 'east of the garden of Eden, with a turning fiery sword '
  - type: note
    content: This is the first reference to the sword in the Bible. In Heb. 4:12 and Eph. 6:17–18, the sword is a metaphor of God’s Word as it judges the intentions of the heart. We still must pass through the ministry of the flaming sword to return to the place where God desires us to dwell. This sword was “awakened” (see Zech. 13:7) against the Lord Jesus Christ as he paid the full price to redeem us to God. The cherubim embroidered into the fabric of the veil of the Holy of Holies were like sentries, guarding the way to the Life within. When the veil was torn in two from the top to the bottom, it was as though the cherubim parted and granted access within the veil for every believer to come and feast upon the Tree of Life, Jesus Christ. See Ex. 26:31–35; Mark 15:37–38; Heb. 10:19–23.
  - type: text
    content: to guard the way to the Tree of Life.
  - type: note
    content: The way to the Tree of Life is Jesus Christ. See John 14:6; Heb. 10:20.
