  - type: note
    content: The irony of the narrative is hard to miss. Because they ate what was forbidden, pain enters the world. The man will produce food to eat through “painful toil,” and the woman will experience “pains in childbirth.” Additionally, the ground (and all creation) now labors with painful contractions waiting for the unveiling of God’s sons and daughters (see Rom. 8:19–21).
