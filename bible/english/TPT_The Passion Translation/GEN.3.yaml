  '19':
  - type: text
    content: 'You will painfully toil '
  - type: note
    content: This is the same word used for the woman having “pain” in childbirth. The cause of pain in our human experience is sin.
  - type: text
    content: and sweat
  - type: text
    content: to produce food to eat,
  - type: note
    content: Or “eat your bread.” Work is not a part of the curse, for Adam was given responsibility for working and tending the garden before the fall (see Gen. 2:15). The punishment of the woman touches her identity as a wife and mother; the punishment of man touches his identity in his activity of work and being a provider.
  - type: text
    content: until your body—taken from the ground—returns to the ground.
  - type: text
    content: For you are from dust,
  - type: text
    content: and to dust you will return.”
  - type: note
    content: See Job 10:9; 34:15; Ps. 103:14; Eccl. 12:7. Jesus experienced all the effects of the curse. He sweat and labored in prayer and in carrying the cross; he was crowned with thorns and left in the dust “for dead” (Ps. 22:15). It is true that our bodies will return to dust, but we have been lifted out of the dust and have been seated in the heavenly realm (see Eph. 2:1–6). Death no longer has victory over us because the resurrection of Christ is also our resurrection (see Rom. 6:5).
