  - type: heading
    content: God Manifests in the Garden
  '8':
  - type: text
    content: 'Then Adam and his wife heard the sound '
  - type: note
    content: Or “voice.”
  - type: text
    content: 'of '
  - type: text
    content: Yahweh
  - type: text
    content: '-God passing through '
  - type: note
    content: Or “going [walking] back and forth repeatedly.” That is, the sound or voice of God was heard from all directions. It was the voice that “walked” back and forth, back and forth, repeating the sound over and over. God has no feet, nor a body. His voice came into the garden as if it were everywhere at once. The Hebrew text could also be translated “God caused his voice to travel through the garden.”
  - type: text
    content: 'the garden in the breeze of the day. '
  - type: note
    content: Or “walking in the spirit of the day” or “moving in the breeze [breezy time] of the day.” The implication is that God had been doing this daily, wanting friendship and intimacy with his newly created couple.
