        text: 'When Adam first sinned, he should have gone immediately to God to beg for mercy and forgiveness. Instead he did just what millions are doing today: he ran and hid from God so that God had to come and look for him. God knew where he was hiding but wanted Adam to admit his sin. The first question God asked in the Bible—“Where are you?”—shows that we belong to God. He longs for each of us to examine our own lives, be honest with him, and come out of hiding. The first question of the New Testament is “Where is the child who is born king of the Jewish people?” ('
