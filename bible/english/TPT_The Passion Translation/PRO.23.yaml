document_id: PRO.23,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Will Protect You
  - type: text
    content: When you’ve been invited to dine with a very important leader,
  - type: text
    content: consider your manners and keep in mind whom you’re with.
  '10':
  - type: text
    content: Never move a long-standing boundary line
  - type: text
    content: or attempt to take land that belongs to the fatherless.
  '11':
  - type: text
    content: For they have a mighty protector,
  - type: text
    content: 'a loving redeemer, '
  - type: note
    content: The Hebrew word here is goel, which means “kinsman-redeemer.” The Aramaic word means “Savior.” This shows powerfully how God will take up the grievances of the oppressed.
  - type: text
    content: who watches over them,
  - type: text
    content: and he will stand up for their cause.
  '12':
  - type: text
    content: Pay close attention to the teaching that corrects you,
  - type: text
    content: and open your heart to every word of instruction.
  '13':
  - type: text
    content: Don’t withhold appropriate discipline from your child.
  - type: text
    content: Go ahead and punish him when he needs it.
  - type: note
    content: The Hebrew is “strike them with the rod.”
  - type: text
    content: Don’t worry—it won’t kill him!
  '14':
  - type: text
    content: A good spanking could be the very thing
  - type: text
    content: that teaches him a lifelong lesson!
  - type: note
    content: Or “rescues him from death.” The Hebrew word is Sheol.
  '15':
  - type: text
    content: My beloved child, when your heart is full of wisdom,
  - type: text
    content: my heart is full of gladness.
  '16':
  - type: text
    content: And when you speak anointed words,
  - type: note
    content: Or “speak what is right.”
  - type: text
    content: we are speaking mouth to mouth!
  - type: note
    content: This is taken from the Septuagint, and it literally means “Your lips shall speak with my lips.” The Hebrew is “My kidneys [soul] will rejoice.” See Num. 12:6–8, which reveals that God spoke with Moses “mouth to mouth” (literal Hebrew).
  '17':
  - type: text
    content: Don’t allow the actions of evil men
  - type: text
    content: to cause you to burn with anger.
  - type: note
    content: The Hebrew word used here describes an emotion of intense passion. Many translate it “envy” (“Do not envy the sinner”), but that does not describe it fully. Another possible translation would be “zeal.”
  - type: text
    content: Instead, burn with unrelenting passion
  - type: text
    content: as you worship God in holy awe.
  '18':
  - type: text
    content: Your future is bright and filled with a living hope
  - type: text
    content: that will never fade away.
  '19':
  - type: text
    content: As you listen to me, my beloved child,
  - type: text
    content: you will grow in wisdom and your heart
  - type: text
    content: will be drawn into understanding,
  - type: text
    content: which will empower you to make right decisions.
  - type: note
    content: The Aramaic is “set up my doctrines in your heart.”
  '2':
  - type: text
    content: Be careful to curb your appetite and catch yourself
  - type: text
    content: before you fall into the trap of wanting all you see.
  - type: note
    content: Or “put a knife to your throat.” When you spend time with an important person, think about his needs, not your own, and favor will come on your life.
  '20':
  - type: text
    content: Don’t live in the excesses of drunkenness or gluttony,
  - type: text
    content: or waste your life away by partying all the time,
  - type: note
    content: Translated from the Aramaic and the Septuagint.
  '21':
  - type: text
    content: because drunkards and gluttons sleep their lives away
  - type: text
    content: and end up broke!
  '22':
  - type: text
    content: Give respect to your father and mother,
  - type: text
    content: for without them you wouldn’t even be here.
  - type: text
    content: And don’t neglect them when they grow old.
  '23':
  - type: text
    content: 'Embrace the truth '
  - type: note
    content: The Hebrew word here literally means “create the truth” or “give birth to truth” or “possess the truth.” This Hebrew word is also used for God as the Creator. See Gen. 14:19, 22.
  - type: text
    content: and hold it close.
  - type: text
    content: Don’t let go of wisdom, instruction, and life-giving understanding.
  '24':
  - type: text
    content: When a father observes his child living in godliness,
  - type: text
    content: he is ecstatic with joy—nothing makes him prouder!
  '25':
  - type: text
    content: So may your father’s heart burst with joy
  - type: text
    content: and your mother’s soul be filled with gladness because of you.
  '26':
  - type: text
    content: My son, give me your heart
  - type: text
    content: and embrace fully what I’m about to tell you.
  '27':
  - type: text
    content: Stay far away from prostitutes
  - type: text
    content: and you’ll stay far away from the pit of destruction.
  - type: text
    content: For sleeping with a promiscuous woman is like falling into a trap
  - type: text
    content: that you’ll never be able to escape!
  '28':
  - type: text
    content: Like a robber hiding in the shadows
  - type: text
    content: she’s waiting to claim another victim—
  - type: text
    content: another husband unfaithful to his wife.
  '29':
  - type: text
    content: Who has anguish? Who has bitter sorrow?
  - type: text
    content: Who constantly complains and argues?
  - type: text
    content: Who stumbles and falls and hurts himself?
  - type: text
    content: Who’s the one with bloodshot eyes?
  '3':
  - type: text
    content: Don’t crave their delicacies,
  - type: text
    content: for they may have another motive in having you sit at their table.
  '30':
  - type: text
    content: It’s the one who drinks too much
  - type: text
    content: and is always looking for a brew.
  - type: text
    content: Make sure it’s never you!
  '31':
  - type: text
    content: And don’t be drunk with wine
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: but be known as one who enjoys the company
  - type: text
    content: of the lovers of God,
  - type: note
    content: 'As translated from the Septuagint and a marginal reading of the Hebrew. The Aramaic is “Meditate on righteousness.” The Septuagint adds a line not found in Hebrew or Aramaic that describes the unflattering life of a drunk: “You will walk around naked as a pestle!”'
  '32':
  - type: text
    content: for drunkenness brings the sting of a serpent,
  - type: text
    content: 'like the fangs of a viper '
  - type: note
    content: Or “horned serpent” or “dragon.” This is an emblem of the poison of demonic power that can cause addictions and rule over the soul.
  - type: text
    content: spreading poison into your soul.
  '33':
  - type: text
    content: It will make you hallucinate, mumble,
  - type: text
    content: and speak words that are perverse.
  '34':
  - type: text
    content: You’ll be like a seasick sailor being tossed to and fro,
  - type: text
    content: dizzy and out of your mind.
  '35':
  - type: text
    content: You’ll awake only to say, “What hit me?
  - type: text
    content: I feel like I’ve been run over by a truck!”
  - type: text
    content: Yet off you’ll go, looking for another drink!
  '4':
  - type: text
    content: Don’t compare yourself to the rich.
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: Surrender your selfish ambition and evaluate them properly.
  '5':
  - type: text
    content: For no sooner do you start counting your wealth
  - type: text
    content: than it sprouts wings and flies away like an eagle in the sky—
  - type: text
    content: here today, gone tomorrow!
  '6':
  - type: text
    content: Be sensible when you dine with a stingy man
  - type: note
    content: The Hebrew here literally means “an evil eye,” which is a metaphor for a stingy man.
  - type: text
    content: and don’t eat more than you should.
  - type: note
    content: Or “don’t crave his delicacies.”
  '7':
  - type: text
    content: For as he thinks within himself, so is he.
  - type: note
    content: The Aramaic, the Septuagint, and a few Hebrew manuscripts read “Eating with him is like eating with someone with a hair in his throat—his mind is not with you!”
  - type: text
    content: He will grudgingly say, “Go ahead and eat all you want,”
  - type: text
    content: but in his heart he resents the fact that he has to pay for your meal.
  '8':
  - type: text
    content: You’ll be sorry you ate anything at all,
  - type: note
    content: Or “You’ll vomit up the little you’ve eaten.”
  - type: text
    content: and all your compliments will be wasted.
  '9':
  - type: text
    content: A rebellious fool will despise your wise advice,
  - type: text
    content: so don’t even waste your time—save your breath!
