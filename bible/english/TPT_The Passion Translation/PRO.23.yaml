document_id: PRO.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Will Protect You
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When you’ve been invited to dine with a very important leader,
- type: usfm
  marker: q1
  children:
  - type: text
    text: consider your manners and keep in mind whom you’re with.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Be careful to curb your appetite and catch yourself
- type: usfm
  marker: q1
  children:
  - type: text
    text: before you fall into the trap of wanting all you see.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “put a knife to your throat.” When you spend time with an important person, think about his needs, not your own, and favor will come on your life.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Don’t crave their delicacies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they may have another motive in having you sit at their table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t compare yourself to the rich.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Surrender your selfish ambition and evaluate them properly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For no sooner do you start counting your wealth
- type: usfm
  marker: q1
  children:
  - type: text
    text: than it sprouts wings and flies away like an eagle in the sky—
- type: usfm
  marker: q1
  children:
  - type: text
    text: here today, gone tomorrow!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Be sensible when you dine with a stingy man
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew here literally means “an evil eye,” which is a metaphor for a stingy man.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and don’t eat more than you should.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “don’t crave his delicacies.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For as he thinks within himself, so is he.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic, the Septuagint, and a few Hebrew manuscripts read “Eating with him is like eating with someone with a hair in his throat—his mind is not with you!”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will grudgingly say, “Go ahead and eat all you want,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: but in his heart he resents the fact that he has to pay for your meal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You’ll be sorry you ate anything at all,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You’ll vomit up the little you’ve eaten.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all your compliments will be wasted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A rebellious fool will despise your wise advice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so don’t even waste your time—save your breath!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Never move a long-standing boundary line
- type: usfm
  marker: q1
  children:
  - type: text
    text: or attempt to take land that belongs to the fatherless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For they have a mighty protector,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'a loving redeemer, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word here is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: goel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “kinsman-redeemer.” The Aramaic word means “Savior.” This shows powerfully how God will take up the grievances of the oppressed.'
    marker-yv: yv-n
  - type: text
    text: who watches over them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will stand up for their cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pay close attention to the teaching that corrects you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and open your heart to every word of instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Don’t withhold appropriate discipline from your child.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go ahead and punish him when he needs it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is “strike them with the rod.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t worry—it won’t kill him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A good spanking could be the very thing
- type: usfm
  marker: q1
  children:
  - type: text
    text: that teaches him a lifelong lesson!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rescues him from death.” The Hebrew word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sheol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My beloved child, when your heart is full of wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my heart is full of gladness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: And when you speak anointed words,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “speak what is right.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: we are speaking mouth to mouth!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is taken from the Septuagint, and it literally means “Your lips shall speak with my lips.” The Hebrew is “My kidneys [soul] will rejoice.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 12:6–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which reveals that God spoke with Moses “mouth to mouth” (literal Hebrew).'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Don’t allow the actions of evil men
- type: usfm
  marker: q1
  children:
  - type: text
    text: to cause you to burn with anger.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here describes an emotion of intense passion. Many translate it “envy” (“Do not envy the sinner”), but that does not describe it fully. Another possible translation would be “zeal.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instead, burn with unrelenting passion
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you worship God in holy awe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Your future is bright and filled with a living hope
- type: usfm
  marker: q1
  children:
  - type: text
    text: that will never fade away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: As you listen to me, my beloved child,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will grow in wisdom and your heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be drawn into understanding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which will empower you to make right decisions.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “set up my doctrines in your heart.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Don’t live in the excesses of drunkenness or gluttony,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or waste your life away by partying all the time,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic and the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: because drunkards and gluttons sleep their lives away
- type: usfm
  marker: q1
  children:
  - type: text
    text: and end up broke!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Give respect to your father and mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for without them you wouldn’t even be here.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And don’t neglect them when they grow old.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Embrace the truth '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word here literally means “create the truth” or “give birth to truth” or “possess the truth.” This Hebrew word is also used for God as the Creator. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 14:19
      metadata:
        usfm: GEN.14.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22'
      metadata:
        usfm: GEN.14.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and hold it close.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let go of wisdom, instruction, and life-giving understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When a father observes his child living in godliness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he is ecstatic with joy—nothing makes him prouder!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So may your father’s heart burst with joy
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your mother’s soul be filled with gladness because of you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: My son, give me your heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: and embrace fully what I’m about to tell you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Stay far away from prostitutes
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you’ll stay far away from the pit of destruction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For sleeping with a promiscuous woman is like falling into a trap
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you’ll never be able to escape!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Like a robber hiding in the shadows
- type: usfm
  marker: q1
  children:
  - type: text
    text: she’s waiting to claim another victim—
- type: usfm
  marker: q1
  children:
  - type: text
    text: another husband unfaithful to his wife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Who has anguish? Who has bitter sorrow?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who constantly complains and argues?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who stumbles and falls and hurts himself?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who’s the one with bloodshot eyes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: It’s the one who drinks too much
- type: usfm
  marker: q1
  children:
  - type: text
    text: and is always looking for a brew.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make sure it’s never you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: And don’t be drunk with wine
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but be known as one who enjoys the company
- type: usfm
  marker: q1
  children:
