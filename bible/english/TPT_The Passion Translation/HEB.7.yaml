document_id: HEB.7,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Melchizedek Priesthood
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'Melchizedek’s name means “king of righteousness.” He was the King of Peace, because the name of the city he ruled as king was Salem, which means “peace.” And he was also a priest of the Most High God. Now when Abraham was returning from defeating many kings in battle, Melchizedek went out to meet him and blessed him. Then Abraham took a tenth of everything he had won in battle and gave it to Melchizedek. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 14:17–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For although Levi was yet unborn, the seed from which Levi came was present in Abraham '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Levi was in the loins of his father Abraham.” In effect, Abraham submitted all his sons to the priesthood of Melchizedek.
      marker-yv: yv-n
    - type: text
      text: when he paid his tithe to Melchizedek.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– '
  '11':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If any of the Levitical priests who served under the law had the power to bring us into perfection, then why did God send Christ as Priest after the likeness of Melchizedek? He should have said, “After the likeness of Aaron.”
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– '
  '12':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: And furthermore, for God to send a new and different rank of priest, meant a new law would have had to be instituted even to allow it!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and the Priesthood of Melchizedek
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Yet the One these things all point to, was from a different tribe and no one from that tribe ever officiated at God’s altar, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'for we all know that our Lord didn’t descend from the tribe of Levi, but shined from the tribe of Judah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: And Moses himself never said anything of a priest in connection with Judah’s tribe.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And all this is made even clearer if there was another King-Priest raised up with the rank of Melchizedek. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This King-Priest did not arise because of a genealogical right under the law to be a priest, but by the power of an indestructible, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: resurrection
    - type: text
      text: ' life!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: indestructible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comes from a word that means, “tied together in unity,” that is, “a united life” (or “union with God”). Resurrection life is implied, for the priestly ministry of Jesus began after he was raised from the dead. The Aramaic can be translated “He has life-giving power that has no beginning.” Jesus’ ministry of Prophet, Priest, and King flows from his unlimited life of resurrection power!
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For it says in the Psalms,
  - type: usfm
    marker: mi
    children:
    - type: text
      text: You are like Melchizedek, a King-Priest forever!
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The old '
    - type: usfm
      marker: it
      children:
      - type: text
        text: order of priesthood
    - type: text
      text: ' has been set aside as weak and powerless. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “useless.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'For the law '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or in Aramaic “Torah.”
      marker-yv: yv-n
    - type: text
      text: 'has never made anyone perfect, but in its place is a far better hope which gives us confidence to experience intimacy with God! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And he confirmed it to us with his solemn vow. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “Since this was not done without a solemn oath, for the others became priests without a sworn oath.”
      marker-yv: yv-n
    - type: text
      text: 'For the former priests took their office without an oath, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: but with Jesus, God affirmed his royal-priesthood with his promise, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has made a solemn oath
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will never change his mind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are a King-Priest forever!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 110:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So all of this magnifies the truth that we have a superior covenant with God than what they experienced, for Jesus himself is its guarantor! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “through which we gained Jesus.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'As additional proof, we know there were many priests under the old system, for they eventually died and their office had to be filled by another. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But Jesus permanently holds his priestly office, since he lives forever and will never have a successor!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and implied in the Greek.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'So he is able to save fully from now throughout eternity, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is somewhat ambiguous, an alternative translation could be “He is able to save for all time” or “He is able, now and always, to completely [fully] save,” or “He is able to save into the always.”
      marker-yv: yv-n
    - type: text
      text: 'everyone who comes to God through him, because he lives to pray continually for them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'He is the High Priest who perfectly fits our need—holy, without a trace of evil, without the ability to deceive, incapable of sin, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “separate from sinners.”
      marker-yv: yv-n
    - type: text
      text: and exalted beyond the heavens!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Unlike the former high priests, he is not compelled to offer daily sacrifices. They had to bring a sacrifice first for their own sins, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 16:6–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'then for the sins of the people, but he finished the sacrificial system, once and for all, when he offered himself. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The law appointed flawed men as high priests, but God’s promise, sealed with his oath, which succeeded the law, appoints a perfect Son who is complete forever!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This Melchizedek has no father or mother, and no record of any of his ancestors. He was never born and he never died, but his life is like a picture '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “made to resemble.”
      marker-yv: yv-n
    - type: text
      text: 'of the Son of God, a King-Priest forever! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now let me show you proof of how great this Melchizedek is:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– Even though Abraham was the most honored and favored patriarch of all God’s chosen ones, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text with the comparison made explicit.
      marker-yv: yv-n
    - type: text
      text: 'he gave a tithe of the spoils of battle to Melchizedek. '
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'It would be understandable if Melchizedek had been a Jewish priest, for later on God’s people were required by law to support their priests financially, because the priests were their relatives and Abraham’s descendants. '
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But Melchizedek was not Abraham’s Jewish relative, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “does not share their ancestry.”
      marker-yv: yv-n
    - type: text
      text: and yet Abraham still paid him a tithe.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– Melchizedek imparted a blessing on mighty Abraham, who had received the promises of God. '
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: And no one could deny the fact that the one who has the power to impart a blessing is superior to the one who receives it.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– '
  '8':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Although the Jewish priests received tithes, they all died—they were mortal. But Melchizedek lives on!
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '– '
  '9':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'It could even be said that Levi, the ancestor of every Jewish priest who received tithes, actually paid tithes to Melchizedek through Abraham. '
