document_id: HEB.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Melchizedek Priesthood
  - type: text
    content: 'Melchizedek’s name means “king of righteousness.” He was the King of Peace, because the name of the city he ruled as king was Salem, which means “peace.” And he was also a priest of the Most High God. Now when Abraham was returning from defeating many kings in battle, Melchizedek went out to meet him and blessed him. Then Abraham took a tenth of everything he had won in battle and gave it to Melchizedek. '
  - type: note
    content: See Gen. 14:17–20.
  '10':
  - type: text
    content: 'For although Levi was yet unborn, the seed from which Levi came was present in Abraham '
  - type: note
    content: Or “Levi was in the loins of his father Abraham.” In effect, Abraham submitted all his sons to the priesthood of Melchizedek.
  - type: text
    content: when he paid his tithe to Melchizedek.
  - type: text
    content: '– '
  '11':
  - type: text
    content: If any of the Levitical priests who served under the law had the power to bring us into perfection, then why did God send Christ as Priest after the likeness of Melchizedek? He should have said, “After the likeness of Aaron.”
  - type: text
    content: '– '
  '12':
  - type: text
    content: And furthermore, for God to send a new and different rank of priest, meant a new law would have had to be instituted even to allow it!
  - type: heading
    content: Jesus and the Priesthood of Melchizedek
  '13':
  - type: text
    content: 'Yet the One these things all point to, was from a different tribe and no one from that tribe ever officiated at God’s altar, '
  '14':
  - type: text
    content: 'for we all know that our Lord didn’t descend from the tribe of Levi, but shined from the tribe of Judah. '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: And Moses himself never said anything of a priest in connection with Judah’s tribe.
  '15':
  - type: text
    content: 'And all this is made even clearer if there was another King-Priest raised up with the rank of Melchizedek. '
  '16':
  - type: text
    content: 'This King-Priest did not arise because of a genealogical right under the law to be a priest, but by the power of an indestructible, '
  - type: text
    content: resurrection
  - type: text
    content: ' life!'
  - type: note
    content: The word indestructible comes from a word that means, “tied together in unity,” that is, “a united life” (or “union with God”). Resurrection life is implied, for the priestly ministry of Jesus began after he was raised from the dead. The Aramaic can be translated “He has life-giving power that has no beginning.” Jesus’ ministry of Prophet, Priest, and King flows from his unlimited life of resurrection power!
  '17':
  - type: text
    content: For it says in the Psalms,
  - type: text
    content: You are like Melchizedek, a King-Priest forever!
  '18':
  - type: text
    content: 'The old '
  - type: text
    content: order of priesthood
  - type: text
    content: ' has been set aside as weak and powerless. '
  - type: note
    content: Or “useless.”
  '19':
  - type: text
    content: 'For the law '
  - type: note
    content: Or in Aramaic “Torah.”
  - type: text
    content: 'has never made anyone perfect, but in its place is a far better hope which gives us confidence to experience intimacy with God! '
  '20':
  - type: text
    content: 'And he confirmed it to us with his solemn vow. '
  - type: note
    content: As translated from the Aramaic. The Greek is “Since this was not done without a solemn oath, for the others became priests without a sworn oath.”
  - type: text
    content: 'For the former priests took their office without an oath, '
  '21':
  - type: text
    content: but with Jesus, God affirmed his royal-priesthood with his promise, saying,
  - type: text
    content: The Lord has made a solemn oath
  - type: text
    content: and will never change his mind,
  - type: text
    content: “You are a King-Priest forever!”
  - type: note
    content: See Ps. 110:4; Heb. 5:6; 6:20; 7:17.
  '22':
  - type: text
    content: 'So all of this magnifies the truth that we have a superior covenant with God than what they experienced, for Jesus himself is its guarantor! '
  - type: note
    content: The Aramaic can be translated “through which we gained Jesus.”
  '23':
  - type: text
    content: 'As additional proof, we know there were many priests under the old system, for they eventually died and their office had to be filled by another. '
  '24':
  - type: text
    content: But Jesus permanently holds his priestly office, since he lives forever and will never have a successor!
  - type: note
    content: As translated from the Aramaic and implied in the Greek.
  '25':
  - type: text
    content: 'So he is able to save fully from now throughout eternity, '
  - type: note
    content: The Greek text is somewhat ambiguous, an alternative translation could be “He is able to save for all time” or “He is able, now and always, to completely [fully] save,” or “He is able to save into the always.”
  - type: text
    content: 'everyone who comes to God through him, because he lives to pray continually for them. '
  '26':
  - type: text
    content: 'He is the High Priest who perfectly fits our need—holy, without a trace of evil, without the ability to deceive, incapable of sin, '
  - type: note
    content: As translated from the Aramaic. The Greek is “separate from sinners.”
  - type: text
    content: and exalted beyond the heavens!
  '27':
  - type: text
    content: 'Unlike the former high priests, he is not compelled to offer daily sacrifices. They had to bring a sacrifice first for their own sins, '
  - type: note
    content: See Lev. 16:6–16.
  - type: text
    content: 'then for the sins of the people, but he finished the sacrificial system, once and for all, when he offered himself. '
  '28':
  - type: text
    content: The law appointed flawed men as high priests, but God’s promise, sealed with his oath, which succeeded the law, appoints a perfect Son who is complete forever!
  '3':
  - type: text
    content: 'This Melchizedek has no father or mother, and no record of any of his ancestors. He was never born and he never died, but his life is like a picture '
  - type: note
    content: Or “made to resemble.”
  - type: text
    content: 'of the Son of God, a King-Priest forever! '
  '4':
  - type: text
    content: 'Now let me show you proof of how great this Melchizedek is:'
  - type: text
    content: '– Even though Abraham was the most honored and favored patriarch of all God’s chosen ones, '
  - type: note
    content: Implied in the text with the comparison made explicit.
  - type: text
    content: 'he gave a tithe of the spoils of battle to Melchizedek. '
  '5':
  - type: text
    content: 'It would be understandable if Melchizedek had been a Jewish priest, for later on God’s people were required by law to support their priests financially, because the priests were their relatives and Abraham’s descendants. '
  '6':
  - type: text
    content: 'But Melchizedek was not Abraham’s Jewish relative, '
  - type: note
    content: Or “does not share their ancestry.”
  - type: text
    content: and yet Abraham still paid him a tithe.
  - type: text
    content: '– Melchizedek imparted a blessing on mighty Abraham, who had received the promises of God. '
  '7':
  - type: text
    content: And no one could deny the fact that the one who has the power to impart a blessing is superior to the one who receives it.
  - type: text
    content: '– '
  '8':
  - type: text
    content: Although the Jewish priests received tithes, they all died—they were mortal. But Melchizedek lives on!
  - type: text
    content: '– '
  '9':
  - type: text
    content: 'It could even be said that Levi, the ancestor of every Jewish priest who received tithes, actually paid tithes to Melchizedek through Abraham. '
