document_id: PSA.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Song for the New Day
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A song of smiting, sung for the new day by King David
  - type: note
    content: The events surrounding this psalm could be the killing of the priests by Saul in 1 Sam. 22:17–19. Saul ordered the death of “eighty-five men who wore the linen ephod.” The killing rampage continued until an entire community of priests had been slaughtered with their women and children. This great evil marked David from that day forward. The inscription found in the Septuagint is “The Eighth Psalm of David.”
  - type: heading
    content: Intercession
  - type: text
    content: Help, Lord! Save us! For godly ones are disappearing.
  - type: text
    content: Where are the dependable, principled ones?
  - type: text
    content: They’re a vanishing breed!
  '2':
  - type: text
    content: Everyone lies, everyone flatters, and everyone deceives.
  - type: text
    content: Nothing but empty talk, smooth talk, and double-talk.
  '3':
  - type: text
    content: You will destroy every proud liar who says, “We lie all we want.
  - type: text
    content: Our words are our weapons, and we won’t be held accountable.
  - type: text
    content: Who can stop us?”
  - type: text
    content: 'May '
  - type: text
    content: Yahweh
  - type: text
    content: ' cut off their twisted tongues'
  - type: text
    content: and seal their lying lips.
  - type: text
    content: May they all be silenced—those who boast and brag with their
  - type: text
    content: high-minded talk.
  - type: heading
    content: Intervention
  '5':
  - type: text
    content: But the Lord says, “Now I will arise!
  - type: text
    content: I will defend the poor,
  - type: text
    content: those who were plundered, the oppressed,
  - type: text
    content: and the needy who groan for help.
  - type: text
    content: I will spring into action to rescue and protect them!”
  '6':
  - type: text
    content: 'For every word '
  - type: text
    content: Yahweh
  - type: text
    content: ' speaks is sure and reliable.'
  - type: text
    content: His truth is tested, found to be flawless, and ever faithful.
  - type: text
    content: It’s as pure as silver refined seven times in a crucible of clay.
  - type: note
    content: The clay furnace (“crucible”) is the heart of man. We are the earthen vessels inside which God has placed his flawless words. His words test us, they try us, and they refine us, seven times over, until they are purified and assimilated into our spirits. The fire of testing purifies us as vessels to carry the Word within our hearts.
  - type: heading
    content: Inspiration
  '7':
  - type: text
    content: Lord, you will keep us safe,
  - type: text
    content: out of the reach of the wicked.
  - type: text
    content: Even though they strut and prowl,
  - type: text
    content: tolerating and celebrating what is worthless and vile,
  - type: text
    content: you will still lift up those who are yours
  - type: text
    content: '!'
