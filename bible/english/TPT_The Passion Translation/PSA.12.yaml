  - type: text
    text: Song for the New Day
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of smiting, sung for the new day by King David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The events surrounding this psalm could be the killing of the priests by Saul in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 22:17–19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Saul ordered the death of “eighty-five men who wore the linen ephod.” The killing rampage continued until an entire community of priests had been slaughtered with their women and children. This great evil marked David from that day forward. The inscription found in the Septuagint is “The Eighth Psalm of David.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intercession
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Help, Lord! Save us! For godly ones are disappearing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Where are the dependable, principled ones?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re a vanishing breed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Everyone lies, everyone flatters, and everyone deceives.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing but empty talk, smooth talk, and double-talk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: You will destroy every proud liar who says, “We lie all we want.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our words are our weapons, and we won’t be held accountable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who can stop us?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' cut off their twisted tongues'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and seal their lying lips.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May they all be silenced—those who boast and brag with their
- type: usfm
  marker: q1
  children:
  - type: text
    text: high-minded talk.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But the Lord says, “Now I will arise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will defend the poor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who were plundered, the oppressed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the needy who groan for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will spring into action to rescue and protect them!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For every word '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' speaks is sure and reliable.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His truth is tested, found to be flawless, and ever faithful.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s as pure as silver refined seven times in a crucible of clay.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The clay furnace (“crucible”) is the heart of man. We are the earthen vessels inside which God has placed his flawless words. His words test us, they try us, and they refine us, seven times over, until they are purified and assimilated into our spirits. The fire of testing purifies us as vessels to carry the Word within our hearts.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Inspiration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 7-8
  - type: text
    text: Lord, you will keep us safe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: out of the reach of the wicked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though they strut and prowl,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tolerating and celebrating what is worthless and vile,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: you will still lift up those who are yours
  - type: text
    text: '!'
