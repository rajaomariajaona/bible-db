document_id: ISA.30,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Woe to the Rebellious
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Woe to the rebellious children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who carry out their own plans but not mine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and who sign treaties without consulting my Spirit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: piling one sin upon another.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They say to the seers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop seeing your visions.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They say to the prophets:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the beholders.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stop prophesying to us about what is right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophesy only pleasant things to us, even if they’re illusions!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Leave this narrow way; turn aside from this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: harsh
    - type: text
      text: ' path.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t confront us anymore with the Holy One of Israel!”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Therefore, this is what the Holy One of Israel has to say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because you have despised this message,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and trust in your own clever abilities to deceive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rely upon oppression,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: your own sin will become like a high, bulging wall
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that is cracked and about to collapse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In an instant, it will all fall down.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: It will break into pieces like shattered pottery,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: smashed so ruthlessly that not even a fragment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: big enough to pick up a hot coal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or to scoop water from a cistern will be found!”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the Holy One of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come back to me! By returning and resting in me you will be saved.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In quietness and trust you will be made strong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you refused.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And though you boast, ‘No! We will flee on horses,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will indeed flee for your lives!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You say, ‘We will ride on swift horses,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but your pursuers will be swift to chase you!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: A thousand will flee at the threat of one,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 28:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all will flee at the threat of five,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until nothing will be left of you—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a lonely flagstaff on the top of a hill,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or like a signpost on a barren mountain!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Promise to His People
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'For this reason the Lord is still waiting '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “waits until the last moment.”
      marker-yv: yv-n
    - type: text
      text: to show his favor to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so he can show you his marvelous love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He waits to be gracious to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sits on his throne ready to show mercy to you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 29:11–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is the Lord of justice,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faithful to keep his promises.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Overwhelmed with bliss are all
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who will entwine their hearts in him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'waiting for him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to help them
    - type: text
      text: .
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Yes, the people of Zion who live in Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will weep no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How compassionate he will be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when he hears your cries for help!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will answer you when he hears your voice!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'You travel down to Egypt '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to find help
  - type: usfm
    marker: q1
    children:
    - type: text
      text: without being guided by the words of my mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead you put your trust in Pharaoh’s protection,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seeking shelter in the shadow of Egypt.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Even though the Lord may allow you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to go through a season of hardship and difficulty,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “though the Lord gives you the bread of adversity and the water of affliction.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he himself will be there with you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not hide himself from you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your eyes will constantly see him as your Teacher.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “teacher” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: mowreh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is a homonym for “rain.” The gift of a teacher is to water our hearts with the rain of the Spirit and the rain of Truth. When God teaches our hearts, it is like spring rain falling, refreshing and renewing our spirits. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: When you turn to the right or turn to the left,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you will hear his voice behind you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to guide you
    - type: text
      text: ', saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is the right path; follow it.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'This verse and the preceding verse teach us several lessons: (1) God will be with us in our troubles. (2) God will not hide himself from us when we pass through hard times. (3) God himself will teach us lessons in our trials. (4) We can set our eyes on him no matter what is happening around us. (5) His voice will lead us into making good decisions. (6) We have his promise of constant guidance as we listen to his voice. The voice of the Lord and the Word of God are our faithful guides throughout our lives.'
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Then you will see your idols as they are—unclean!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your silver-overlaid idols and gold-plated images are defiled.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will discard them like a filthy menstrual cloth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saying to them, “Good riddance!”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Then God will supply you with abundant rain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the seeds you sow.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will bless you with an incredible, plentiful harvest.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Bread and the produce of the ground will be rich and plentiful.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And in that day he will give you lush, broad pastures for your cattle.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Even your oxen and donkeys that work the soil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will feed on good grain, separated from its chaff.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The oxen and donkey that till the ground will feed on silage that has been winnowed with pitchfork and shovel.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: On the day of great slaughter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when all their towers tumble,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: God will bless you
    - type: text
      text: ' with sparkling streams and bubbling brooks'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: flowing down every high hill and every lofty mountain.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Moonlight will shine as bright as sunlight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the sun’s glare will become seven times brighter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like the light of seven days rolled into one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'That will be the day when the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heals the bruises and wounds that he has inflicted.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Will Judge the Nations
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Look! Here comes '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' with his mighty power and glory!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The name of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comes from far away.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He comes in his awesome splendor with thick clouds!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Consumed with anger, his lips are filled with fury,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and his words '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “his tongue.”
      marker-yv: yv-n
    - type: text
      text: are a devouring fire!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: His breath is as overwhelming as a flooding river
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reaching up to the neck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sifts the nations in his sieve of destruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and places a bridle in their jaws that causes them to wander.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: But you will have a joyous song throughout the night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as one celebrating a holy, consecrated feast.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will have gladness of heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as one celebrating to the sound of a flute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and dancing up the mountain of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Rock who shelters Israel!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Therefore, Pharaoh’s protection will become your shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the shelter of Egypt’s shadow will end in disaster!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'And '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will cause everyone'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to hear his awe-inspiring, majestic voice.
