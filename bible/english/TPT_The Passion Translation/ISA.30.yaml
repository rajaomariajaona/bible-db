document_id: ISA.30,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to the Rebellious
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Woe to the rebellious children,
  - type: text
    content: who carry out their own plans but not mine,
  - type: text
    content: and who sign treaties without consulting my Spirit,
  - type: text
    content: piling one sin upon another.
  '10':
  - type: text
    content: 'They say to the seers:'
  - type: text
    content: “Stop seeing your visions.”
  - type: text
    content: 'They say to the prophets:'
  - type: note
    content: Or “the beholders.”
  - type: text
    content: “Stop prophesying to us about what is right.
  - type: text
    content: Prophesy only pleasant things to us, even if they’re illusions!
  '11':
  - type: text
    content: 'Leave this narrow way; turn aside from this '
  - type: text
    content: harsh
  - type: text
    content: ' path.'
  - type: text
    content: Don’t confront us anymore with the Holy One of Israel!”
  '12':
  - type: text
    content: 'Therefore, this is what the Holy One of Israel has to say:'
  - type: text
    content: “Because you have despised this message,
  - type: text
    content: and trust in your own clever abilities to deceive,
  - type: text
    content: and rely upon oppression,
  '13':
  - type: text
    content: your own sin will become like a high, bulging wall
  - type: text
    content: that is cracked and about to collapse.
  - type: text
    content: In an instant, it will all fall down.
  '14':
  - type: text
    content: It will break into pieces like shattered pottery,
  - type: text
    content: smashed so ruthlessly that not even a fragment
  - type: text
    content: big enough to pick up a hot coal
  - type: text
    content: or to scoop water from a cistern will be found!”
  '15':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Holy One of Israel, says:'
  - type: text
    content: “Come back to me! By returning and resting in me you will be saved.
  - type: text
    content: In quietness and trust you will be made strong.
  - type: text
    content: But you refused.
  '16':
  - type: text
    content: And though you boast, ‘No! We will flee on horses,’
  - type: text
    content: you will indeed flee for your lives!
  - type: text
    content: You say, ‘We will ride on swift horses,’
  - type: text
    content: but your pursuers will be swift to chase you!
  '17':
  - type: text
    content: A thousand will flee at the threat of one,
  - type: note
    content: See Deut. 28:25.
  - type: text
    content: and all will flee at the threat of five,
  - type: text
    content: until nothing will be left of you—
  - type: text
    content: like a lonely flagstaff on the top of a hill,
  - type: text
    content: or like a signpost on a barren mountain!”
  - type: heading
    content: God’s Promise to His People
  '18':
  - type: text
    content: 'For this reason the Lord is still waiting '
  - type: note
    content: Or “waits until the last moment.”
  - type: text
    content: to show his favor to you
  - type: text
    content: so he can show you his marvelous love.
  - type: text
    content: He waits to be gracious to you.
  - type: text
    content: He sits on his throne ready to show mercy to you.
  - type: note
    content: See Jer. 29:11–13; Heb. 4:16.
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is the Lord of justice,'
  - type: text
    content: faithful to keep his promises.
  - type: text
    content: Overwhelmed with bliss are all
  - type: text
    content: who will entwine their hearts in him,
  - type: text
    content: 'waiting for him '
  - type: text
    content: to help them
  - type: text
    content: .
  '19':
  - type: text
    content: Yes, the people of Zion who live in Jerusalem
  - type: text
    content: will weep no more.
  - type: text
    content: How compassionate he will be
  - type: text
    content: when he hears your cries for help!
  - type: text
    content: He will answer you when he hears your voice!
  '2':
  - type: text
    content: 'You travel down to Egypt '
  - type: text
    content: to find help
  - type: text
    content: without being guided by the words of my mouth.
  - type: text
    content: Instead you put your trust in Pharaoh’s protection,
  - type: text
    content: seeking shelter in the shadow of Egypt.
  '20':
  - type: text
    content: Even though the Lord may allow you
  - type: text
    content: to go through a season of hardship and difficulty,
  - type: note
    content: Or “though the Lord gives you the bread of adversity and the water of affliction.”
  - type: text
    content: he himself will be there with you.
  - type: text
    content: He will not hide himself from you,
  - type: text
    content: for your eyes will constantly see him as your Teacher.
  - type: note
    content: The Hebrew word for “teacher” (mowreh) is a homonym for “rain.” The gift of a teacher is to water our hearts with the rain of the Spirit and the rain of Truth. When God teaches our hearts, it is like spring rain falling, refreshing and renewing our spirits. See 1 Cor. 3:6.
  '21':
  - type: text
    content: When you turn to the right or turn to the left,
  - type: text
    content: 'you will hear his voice behind you '
  - type: text
    content: to guide you
  - type: text
    content: ', saying,'
  - type: text
    content: “This is the right path; follow it.”
  - type: note
    content: 'This verse and the preceding verse teach us several lessons: (1) God will be with us in our troubles. (2) God will not hide himself from us when we pass through hard times. (3) God himself will teach us lessons in our trials. (4) We can set our eyes on him no matter what is happening around us. (5) His voice will lead us into making good decisions. (6) We have his promise of constant guidance as we listen to his voice. The voice of the Lord and the Word of God are our faithful guides throughout our lives.'
  '22':
  - type: text
    content: Then you will see your idols as they are—unclean!
  - type: text
    content: Your silver-overlaid idols and gold-plated images are defiled.
  - type: text
    content: You will discard them like a filthy menstrual cloth,
  - type: text
    content: saying to them, “Good riddance!”
  '23':
  - type: text
    content: Then God will supply you with abundant rain
  - type: text
    content: for the seeds you sow.
  - type: text
    content: He will bless you with an incredible, plentiful harvest.
  - type: note
    content: Or “Bread and the produce of the ground will be rich and plentiful.”
  - type: text
    content: And in that day he will give you lush, broad pastures for your cattle.
  '24':
  - type: text
    content: Even your oxen and donkeys that work the soil
  - type: text
    content: will feed on good grain, separated from its chaff.
  - type: note
    content: Or “The oxen and donkey that till the ground will feed on silage that has been winnowed with pitchfork and shovel.”
  '25':
  - type: text
    content: On the day of great slaughter,
  - type: text
    content: when all their towers tumble,
  - type: text
    content: God will bless you
  - type: text
    content: ' with sparkling streams and bubbling brooks'
  - type: text
    content: flowing down every high hill and every lofty mountain.
  '26':
  - type: text
    content: Moonlight will shine as bright as sunlight,
  - type: text
    content: and the sun’s glare will become seven times brighter,
  - type: text
    content: like the light of seven days rolled into one.
  - type: text
    content: 'That will be the day when the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: heals the bruises and wounds that he has inflicted.
  - type: heading
    content: God Will Judge the Nations
  '27':
  - type: text
    content: 'Look! Here comes '
  - type: text
    content: Yahweh
  - type: text
    content: ' with his mighty power and glory!'
  - type: note
    content: Or “The name of Yahweh comes from far away.”
  - type: text
    content: He comes in his awesome splendor with thick clouds!
  - type: text
    content: Consumed with anger, his lips are filled with fury,
  - type: text
    content: 'and his words '
  - type: note
    content: Or “his tongue.”
  - type: text
    content: are a devouring fire!
  '28':
  - type: text
    content: His breath is as overwhelming as a flooding river
  - type: text
    content: reaching up to the neck.
  - type: text
    content: He sifts the nations in his sieve of destruction
  - type: text
    content: and places a bridle in their jaws that causes them to wander.
  '29':
  - type: text
    content: But you will have a joyous song throughout the night,
  - type: text
    content: as one celebrating a holy, consecrated feast.
  - type: text
    content: You will have gladness of heart,
  - type: text
    content: as one celebrating to the sound of a flute
  - type: text
    content: 'and dancing up the mountain of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the Rock who shelters Israel!
  '3':
  - type: text
    content: Therefore, Pharaoh’s protection will become your shame,
  - type: text
    content: and the shelter of Egypt’s shadow will end in disaster!
  '30':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' will cause everyone'
  - type: text
    content: to hear his awe-inspiring, majestic voice.
  - type: note
    content: See Ps. 29.
  - type: text
    content: He will open their eyes to see his mighty power
  - type: note
    content: Or “arm,” a metaphor for his power.
  - type: text
    content: coming down with raging anger and consuming fire!
  - type: text
    content: His power will descend
  - type: text
    content: ' in cloudburst, thunderstorm, and hail.'
  '31':
  - type: text
    content: And when his rod strikes the Assyrians,
  - type: text
    content: 'they will be terror-stricken by the mighty voice of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '32':
  - type: text
    content: 'Every stroke of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s punishing rod
  - type: note
    content: Or “established [destined for punishment] rod.”
  - type: text
    content: will be to the sound of cymbals and strumming harps.
  - type: text
    content: God himself fights them in battle with dancing!
  - type: note
    content: As translated by some scholars. The Hebrew word uvémilkhamot (“with battles of”) is emended by some to read uvimkholot (“with dancing”). The majority view of the Hebrew text is “battles of brandishing [uplifted weapons/arms].” This “punishing rod” will fall on the spiritual forces of darkness as we celebrate and dance in the victory of the risen Christ.
  '33':
  - type: text
    content: From long ago, the king’s fiery burial place has been prepared,
  - type: text
    content: stacked high with plenty of firewood to fuel the flame.
  - type: note
    content: Although the Hebrew of this verse is uncertain, the implication is that the king of Assyria will be thrown into fire. There is also the hint of our eternal foe, Satan, the king of darkness, being cast into the lake of fire. See Rev. 20:10.
  - type: text
    content: Yahweh
  - type: text
    content: ’s breath, like a stream of sulfur, kindles it.
  '4':
  - type: text
    content: 'Though '
  - type: text
    content: your
  - type: text
    content: ' officials arrive at Zoan'
  - type: text
    content: 'and '
  - type: text
    content: your
  - type: text
    content: ' ambassadors reach as far away as Hanes,'
  '5':
  - type: text
    content: all will be put to shame because of such unreliable people.
  - type: text
    content: They can offer you no help, only shame and disgrace!”
  '6':
  - type: text
    content: 'This is a prophecy of the desert animals:'
  - type: text
    content: The burden of the caravan is to
  - type: text
    content: 'traverse a desert land '
  - type: note
    content: 'Or possibly a title: “A burden [oracle] of the animals of the Negev.” The caravan, with its beasts of burden, was likely carrying the resources to pay for Egypt’s aid. God had once led them through that desert, bringing them into the promised land. Now they trekked the other direction in the desert, looking for help but not from Father God. See Deut. 8:15; Jer. 2:6.'
  - type: text
    content: of distress and trouble,
  - type: text
    content: a land of the lion and lioness, the snake and the fiery flying one!
  - type: note
    content: Or “seraph.”
  - type: text
    content: They carry their riches on the donkey’s back
  - type: text
    content: and their treasures on the camel’s hump
  - type: text
    content: to a nation that will give them nothing in return!
  '7':
  - type: text
    content: Egypt’s help is utterly worthless;
  - type: text
    content: that’s why I nicknamed her
  - type: text
    content: Rahab, the Do-Nothing Dragon.
  - type: note
    content: Rahab is used as a poetic term both for a mythical sea monster and for Egypt. See Pss. 87:4; 89:10; Isa. 51:9.
  - type: heading
    content: A Message to God’s Stubborn Children
  '8':
  - type: text
    content: God told me
  - type: text
    content: ' to write down in a book'
  - type: text
    content: words meant for the coming generation as an eternal witness.
  '9':
  - type: text
    content: For they are stubborn rebels, children always telling lies,
  - type: text
    content: 'who refuse to listen to '
  - type: text
    content: Yahweh
  - type: text
    content: ’s instruction.
