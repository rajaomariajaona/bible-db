  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s the one who pushed back oceans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who established it upon the ocean currents.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to let the dry ground appear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: planting firm foundations for the earth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Who Comes before the King?
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who, then, is allowed to ascend the mountain of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And who has the privilege of entering into God’s Holy Place?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who are clean—whose works and ways are pure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose hearts are true and sealed by the truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who never deceive, whose words are sure.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will receive '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s blessing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and righteousness given by the Savior-God.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will stand before God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they seek the pleasure of God’s face, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is plural (“faces”).
      marker-yv: yv-n
    - type: text
      text: the God of Jacob.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King is Coming!
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So wake up, you living gateways!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your heads, you doorways of eternity!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God’s people are identified as living gates and doorways. When God opens the doors of eternity within us, no one is able to shut them. To “lift up” our heads is a figure of speech for a bold confidence that brings rejoicing and hope.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Welcome the King of Glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he is about to come through you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You ask, “Who is this King of Glory?”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', armed and ready for battle,'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', invincible in every way!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So wake up, you living gateways, and rejoice!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fling wide, you eternal doors!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here he comes; the King of Glory is ready to come in.
