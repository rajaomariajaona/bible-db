document_id: PSA.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The King of Glory
  - type: text
    content: David’s poetic praise to God
  - type: note
    content: 'The Septuagint adds “for the Sabbath.” Ps. 24 celebrates God as the Warrior-King, ruling over a kingdom of purity and holiness. Pss. 22–24 form a trilogy. Ps. 22 speaks of the Savior’s cross, Ps. 23 speaks of the Shepherd’s staff, and Ps. 24 speaks of the Sovereign King. We see three viewpoints of Jesus’ love for us: Ps. 22—the Good Shepherd (John 10:11), Ps. 23—the Great Shepherd (Heb. 13:20), and Ps. 24—the Chief Shepherd (1 Peter 5:4).'
  - type: heading
    content: Creation’s King
  - type: text
    content: Yahweh
  - type: text
    content: ' claims the world as his.'
  - type: text
    content: Everything and everyone belong to him!
  '10':
  - type: text
    content: You ask, “Who is this King of Glory?”
  - type: text
    content: 'He is '
  - type: text
    content: Yahweh
  - type: text
    content: ', armed and ready for battle,'
  - type: text
    content: the Mighty One, the invincible commander of heaven’s hosts!
  - type: note
    content: Or “Yahweh Tseva’ot.” The word tseva’ot is the plural of the word tsava, a feminine noun meaning “force.” When these two Hebrew nouns are placed together, they would be translated as “Yahweh of the forces.”
  - type: text
    content: Yes, he is the King of Glory!
  - type: text
    content: Pause in his presence
  '2':
  - type: text
    content: He’s the one who pushed back oceans
  - type: note
    content: Or “who established it upon the ocean currents.”
  - type: text
    content: to let the dry ground appear,
  - type: text
    content: planting firm foundations for the earth.
  - type: heading
    content: Who Comes before the King?
  '3':
  - type: text
    content: 'Who, then, is allowed to ascend the mountain of '
  - type: text
    content: Yahweh
  - type: text
    content: '?'
  - type: text
    content: And who has the privilege of entering into God’s Holy Place?
  '4':
  - type: text
    content: Those who are clean—whose works and ways are pure,
  - type: text
    content: whose hearts are true and sealed by the truth,
  - type: text
    content: those who never deceive, whose words are sure.
  '5':
  - type: text
    content: 'They will receive '
  - type: text
    content: Yahweh
  - type: text
    content: ’s blessing
  - type: text
    content: and righteousness given by the Savior-God.
  '6':
  - type: text
    content: They will stand before God,
  - type: text
    content: 'for they seek the pleasure of God’s face, '
  - type: note
    content: The Hebrew is plural (“faces”).
  - type: text
    content: the God of Jacob.
  - type: text
    content: Pause in his presence
  - type: heading
    content: The King is Coming!
  '7':
  - type: text
    content: So wake up, you living gateways!
  - type: text
    content: Lift up your heads, you doorways of eternity!
  - type: note
    content: God’s people are identified as living gates and doorways. When God opens the doors of eternity within us, no one is able to shut them. To “lift up” our heads is a figure of speech for a bold confidence that brings rejoicing and hope.
  - type: text
    content: Welcome the King of Glory,
  - type: text
    content: for he is about to come through you.
  '8':
  - type: text
    content: You ask, “Who is this King of Glory?”
  - type: text
    content: Yahweh
  - type: text
    content: ', armed and ready for battle,'
  - type: text
    content: Yahweh
  - type: text
    content: ', invincible in every way!'
  '9':
  - type: text
    content: So wake up, you living gateways, and rejoice!
  - type: text
    content: Fling wide, you eternal doors!
  - type: text
    content: Here he comes; the King of Glory is ready to come in.
