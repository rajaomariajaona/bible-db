  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You ask, “Who is this King of Glory?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', armed and ready for battle,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Mighty One, the invincible commander of heaven’s hosts!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tseva’ot.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tseva’ot
      - type: usfm
