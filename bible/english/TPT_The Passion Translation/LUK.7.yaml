  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After Jesus finished giving revelation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “teaching.” The Greek word used here is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rhema
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to the people on the hillside, he went on to Capernaum. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'A Roman military captain there had a beloved servant whom he valued highly, and who was sick to the point of death. When the captain heard that Jesus was in the city, he sent some respected Jewish elders to plead with him to come and heal his dying servant. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So they came to Jesus and told him, “The Roman captain is a wonderful man. If anyone deserves a visit from you, it is him. Won’t you please come to his home and heal his servant? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For he loves the Jewish people, and he even built our meeting hall for us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Jesus started off with them, but on his way there, friends of the captain stopped him and delivered this message: “Master, don’t bother to come to me in person, for I am not good enough for you to enter my home. I’m not worthy enough to even come out to meet one like you. But if you would just speak the word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of healing
  - type: text
    text: ' from right where you are, I know that my servant will be healed.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I am an ordinary man. Yet I understand the power of authority, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and I see that authority operating through you
  - type: text
    text: . I have soldiers under me who obey everything I command. I also have authorities over me whom I likewise obey. So Master, just speak the word and healing will flow.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus marveled at this. He turned around and said to the crowd who had followed him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen, everyone! Never have I found among the people of God a man like this who believes so strongly in me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus then spoke the healing word from a distance. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implicit in the miracle was that Jesus released the word of healing for the servant.
    marker-yv: yv-n
  - type: text
    text: When the man’s friends returned to the home, they found the servant completely healed and doing fine.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Raises the Dead
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Shortly afterward, Jesus left on a journey to the village of Nain, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “pleasant.” The Prince of Life was about to enter the gate of the city when death came out. There at the gates where life and death meet, life wins and death is defeated. Just outside of Jerusalem one day, death and life met again, and life won forevermore.
    marker-yv: yv-n
  - type: text
    text: 'with a massive crowd of people following him, and his disciples. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'As he approached the village, he met a multitude of people in a funeral procession, who were mourning as they carried the body of a young man to the cemetery. The boy was his mother’s only son, and she was a widow. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When the Lord saw the grieving mother, his heart broke for her. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: splanchnizomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: denotes the deepest level of compassion. There is no greater word in the Greek language to describe the depth of emotion Jesus felt for this widow over the loss of her son.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Splanchnizomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is actually the word for “intestines.” Jesus’ emotions fully identified with her grief and he carried her sorrow.
    marker-yv: yv-n
  - type: text
    text: 'With great tenderness he said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Please don’t cry.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he stepped up to the coffin and touched it. When the pallbearers came to a halt, Jesus spoke '
  - type: usfm
    marker: it
    children:
    - type: text
      text: directly
  - type: text
    text: ' to the corpse, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Young man, I say to you, arise and live!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Immediately, the young man moved, sat up, and spoke to those nearby. Jesus presented the son to his mother, alive! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A tremendous sense of holy mystery swept over the crowd. They shouted praises to God, saying, “God himself has blessed us by visiting his people! A great prophet has appeared among us!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The news of Jesus and this miracle raced throughout Judea and the entire surrounding region.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Prophet John’s Question
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'John’s disciples reported to him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in prison
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
