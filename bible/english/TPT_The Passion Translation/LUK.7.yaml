document_id: LUK.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals
  - type: text
    content: 'After Jesus finished giving revelation '
  - type: note
    content: Or “teaching.” The Greek word used here is rhema.
  - type: text
    content: 'to the people on the hillside, he went on to Capernaum. '
  '10':
  - type: text
    content: 'Jesus then spoke the healing word from a distance. '
  - type: note
    content: Implicit in the miracle was that Jesus released the word of healing for the servant.
  - type: text
    content: When the man’s friends returned to the home, they found the servant completely healed and doing fine.
  - type: heading
    content: Jesus Raises the Dead
  '11':
  - type: text
    content: 'Shortly afterward, Jesus left on a journey to the village of Nain, '
  - type: note
    content: Nain means “pleasant.” The Prince of Life was about to enter the gate of the city when death came out. There at the gates where life and death meet, life wins and death is defeated. Just outside of Jerusalem one day, death and life met again, and life won forevermore.
  - type: text
    content: 'with a massive crowd of people following him, and his disciples. '
  '12':
  - type: text
    content: 'As he approached the village, he met a multitude of people in a funeral procession, who were mourning as they carried the body of a young man to the cemetery. The boy was his mother’s only son, and she was a widow. '
  '13':
  - type: text
    content: 'When the Lord saw the grieving mother, his heart broke for her. '
  - type: note
    content: The Greek word splanchnizomai denotes the deepest level of compassion. There is no greater word in the Greek language to describe the depth of emotion Jesus felt for this widow over the loss of her son. Splanchnizomai is actually the word for “intestines.” Jesus’ emotions fully identified with her grief and he carried her sorrow.
  - type: text
    content: 'With great tenderness he said to her, '
  - type: text
    content: “Please don’t cry.”
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Then he stepped up to the coffin and touched it. When the pallbearers came to a halt, Jesus spoke '
  - type: text
    content: directly
  - type: text
    content: ' to the corpse, '
  - type: text
    content: “Young man, I say to you, arise and live!”
  '15':
  - type: text
    content: 'Immediately, the young man moved, sat up, and spoke to those nearby. Jesus presented the son to his mother, alive! '
  '16':
  - type: text
    content: A tremendous sense of holy mystery swept over the crowd. They shouted praises to God, saying, “God himself has blessed us by visiting his people! A great prophet has appeared among us!”
  '17':
  - type: text
    content: The news of Jesus and this miracle raced throughout Judea and the entire surrounding region.
  - type: heading
    content: The Prophet John’s Question
  '18':
  - type: text
    content: 'John’s disciples reported to him '
  - type: text
    content: in prison
  - type: text
    content: ' '
  - type: note
    content: See also Matt. 11:2–19; Luke 3:20.
  - type: text
    content: 'about all the wonderful miracles and the works Jesus was doing. '
  '19':
  - type: text
    content: 'So John dispatched two of his disciples to go and inquire of Jesus. '
  '2':
  - type: text
    content: 'A Roman military captain there had a beloved servant whom he valued highly, and who was sick to the point of death. When the captain heard that Jesus was in the city, he sent some respected Jewish elders to plead with him to come and heal his dying servant. '
  '20':
  - type: text
    content: When they came before the Master, they asked him, “Are you the coming Messiah we’ve been expecting, or are we to continue to look for someone else? John the prophet has sent us to you to seek your answer.”
  '21':
  - type: text
    content: 'Without answering, '
  - type: note
    content: Or “at that time.”
  - type: text
    content: Jesus turned to the crowd and healed many of their incurable diseases. His miracle power freed many from their suffering. He restored the gift of sight to the blind, and he drove out demonic spirits from those who were tormented.
  '22':
  - type: text
    content: 'Only then did Jesus answer the question posed by John’s disciples. '
  - type: text
    content: “Now go back and tell John what you have just seen and heard here today. The blind are now seeing. The crippled are now walking. Those who were lepers are now cured. Those who were deaf are now hearing. Those who were dead are now brought back to life. The poor and broken
  - type: text
    content: ' '
  - type: note
    content: This fulfills many Old Testament references to the coming of the Messiah, including Isa. 29:18–19; 35:5–6; 61:1.
  - type: text
    content: are given the hope of salvation.
  - type: text
    content: ' '
  - type: note
    content: Jesus is assuring John that the message he brings is life and salvation, not judgment and wrath.
  '23':
  - type: text
    content: 'And tell John these words: ‘The blessing of heaven comes upon those who never lose their faith'
  - type: text
    content: ' '
  - type: note
    content: The Greek text is literally “Blessed are those who are not offended over me.”
  - type: text
    content: in me, no matter what happens.’ ”
  '24':
  - type: text
    content: 'After John’s messengers departed, Jesus spoke about John to the audience crowded around him, saying, '
  - type: text
    content: “What kind of man did you expect to see out in the wilderness? Did you expect to see a man who would be easily influenced and shaken by the shifting opinions of others?
  - type: text
    content: ' '
  '25':
  - type: text
    content: Who did you go there to see? Did you expect to see a man decked out in the splendid fashion of the day
  - type: text
    content: ' '
  - type: note
    content: See Matt. 3:4.
  - type: text
    content: living in the lap of luxury?
  - type: text
    content: ' '
  '26':
  - type: text
    content: Or did you discover a true prophet out in the lonely wilderness? Yes, John was a legitimate prophet. Even more than that,
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'he was the fulfillment of this Scripture:'
  - type: text
    content: ‘See, I am sending my prophetic messenger
  - type: note
    content: Or “angel.”
  - type: text
    content: who will go ahead of me
  - type: text
    content: to prepare hearts to receive me.’
  - type: note
    content: This is quoted from Mal. 3:1.
  '28':
  - type: text
    content: “Throughout history there was never found a man as great as John. Yet those who now walk in God’s kingdom realm, though they appear to be insignificant, will become even greater than he.”
  '29':
  - type: text
    content: 'When the common and disreputable people among the audience heard Jesus say this, they acknowledged that it was the truth, for they had already experienced John’s baptism. '
  '30':
  - type: text
    content: But the hearts of the Jewish religious leaders and experts of the law had rejected the clear purpose of God by refusing to be baptized by John.
  '31':
  - type: text
    content: 'Jesus continued, saying, '
  - type: text
    content: “How could I describe the people of this generation? Can’t you see?
  - type: text
    content: ' '
  '32':
  - type: text
    content: You’re like children playing games on the playground, complaining to friends, ‘You don’t like it when we want to play Wedding. And you don’t like it when we want to play Funeral. Why will you neither dance nor mourn?’
  - type: note
    content: Both Christ and John the Baptist offered people the “wedding,” but the Pharisees didn’t want to dance. Both offered a funeral to the old, dead ways of religion, but the Pharisees refused to attend. Grace offered them salvation, but they rejected it.
  '33':
  - type: text
    content: “When the prophet John came fasting and refused to drink wine, you said, ‘He’s crazy! There’s a demon in him.’
  - type: text
    content: ' '
  '34':
  - type: text
    content: Yet when the Son of Man came feasting and drinking, you said, ‘Look at this man! He is nothing but a glutton and a drunkard. He spends all his time with tax collectors and other notorious sinners.’
  '35':
  - type: text
    content: “Nevertheless, the wisdom of God
  - type: text
    content: ' '
  - type: note
    content: Or “Wisdom is vindicated by all her children.” The Aramaic word used here is a homonym that means either “children” or “good works” (expressions of godliness). This may explain why there is such a variation of the Greek texts.
  - type: text
    content: will be proven true by the expressions of godliness in everyone who follows me.”
  - type: heading
    content: Extravagant Worship
  '36':
  - type: text
    content: 'Afterward Simeon, '
  - type: note
    content: The name Simeon is supplied from v. 40.
  - type: text
    content: a Jewish religious leader, asked Jesus to his home for dinner. Jesus accepted the invitation. When he went to Simeon’s home, he took his place at the table.
  '37':
  - type: text
    content: 'In the neighborhood there was an immoral woman of the streets, known to all to be a prostitute. When she heard that Jesus was at Simeon’s house, she took an exquisite flask made from alabaster, '
  - type: note
    content: This is a soft, cream-colored stone often used for jars and vases.
  - type: text
    content: 'filled it with the most expensive perfume, went right into the home of the Jewish religious leader, and in front of all the guests, she knelt at the feet of Jesus. '
  '38':
  - type: text
    content: 'Broken and weeping, she covered his feet with the tears that fell from her face. She kept crying and drying his feet with her long hair. Over and over she kissed Jesus’ feet. Then, as an act of worship, she opened her flask and anointed his feet '
  - type: note
    content: 'Six times in Luke we find someone at Jesus’ feet (described as “beautiful” in Isa. 52:7): (1) the sinful woman mentioned in this verse who poured out her worship and tears at Jesus’ feet; (2) the demonized man who worshiped at Jesus’ feet (8:35); (3) Jairus, who fell at his feet pleading for a miracle for his daughter (8:41); (4) Mary, who sat at his feet and received his word (10:39); (5) the healed leper who fell at his feet in deep gratitude (17:15–16); (6) those who worshiped Jesus at his resurrection when he showed them his hands and his feet (24:39–40).'
  - type: text
    content: with her costly perfume.
  '39':
  - type: text
    content: When Simeon saw what was happening, he thought, “This man can’t be a true prophet. If he were really a prophet, he would know what kind of sinful woman is touching him.”
  - type: note
    content: Simeon thought Jesus should have known the sinfulness of the woman, but Simeon should have known the love of the one next to him, who was ready to forgive and restore. Religion focuses on the sinfulness of a person, but faith sees the glory of the one who forgives and heals.
  '4':
  - type: text
    content: 'So they came to Jesus and told him, “The Roman captain is a wonderful man. If anyone deserves a visit from you, it is him. Won’t you please come to his home and heal his servant? '
  '40':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Simeon, I have a word for you.”
  - type: text
    content: “Go ahead, Teacher. I want to hear it,” he answered.
  '41':
  - type: text
    content: “It’s a story about two men who were deeply in debt. One owed the bank one hundred thousand dollars,
  - type: text
    content: ' '
  - type: note
    content: The Greek text uses the monetary term denarius. The point is that one person owed more than a year’s wages, the other much less.
  - type: text
    content: and the other only owed ten thousand dollars.
  - type: text
    content: ' '
  '42':
  - type: text
    content: When it was obvious that neither of them would be able to repay their debts, the kind banker graciously wrote off the debts and forgave them all that they owed. Tell me, Simeon, which of the two debtors would be more thankful? Which one would love the banker most?”
  '43':
  - type: text
    content: Simeon answered, “I suppose it would be the one with the greater debt forgiven.”
  - type: text
    content: “You’re right,”
  - type: text
    content: ' Jesus agreed. '
  '44':
  - type: text
    content: Then he spoke to Simeon about the woman still weeping at his feet.
  - type: text
    content: “Do you see this woman kneeling here? She is doing for me what you didn’t bother to do. When I entered your home as your guest, you didn’t think about offering me water to wash the dust off my feet. Yet she came into your home and washed my feet with her many tears and then dried my feet with her hair.
  - type: text
    content: ' '
  '45':
  - type: text
    content: You didn’t even welcome me into your home with the customary kiss of greeting, but from the moment I came in she has not stopped kissing my feet.
  - type: text
    content: ' '
  '46':
  - type: text
    content: You didn’t take the time to anoint my head with fragrant oil, but she anointed my head and feet with the finest perfume.
  - type: text
    content: ' '
  '47':
  - type: text
    content: She has been forgiven of all her many sins. This is why she has shown me such extravagant love. But those who assume they have very little to be forgiven will love me very little.”
  '48':
  - type: text
    content: 'Then Jesus said to the woman at his feet, '
  - type: text
    content: “
  - type: text
    content: All
  - type: text
    content: ' '
  - type: text
    content: your sins are forgiven.”
  - type: note
    content: Twice in Luke’s Gospel we hear Jesus say, “All your sins are forgiven.” Once he says it to a man (Luke 5:20) and here to a woman. The proof of her sins being forgiven is her love; with the healed man it was his life, for he took up his bed and walked.
  '49':
  - type: text
    content: All the dinner guests said among themselves, “Who is the one who can even forgive sins?”
  '5':
  - type: text
    content: For he loves the Jewish people, and he even built our meeting hall for us.”
  '50':
  - type: text
    content: 'Then Jesus said to the woman, '
  - type: text
    content: “Your faith in me has given you life. Now you may leave and walk in the ways of peace.”
  '6':
  - type: text
    content: 'Jesus started off with them, but on his way there, friends of the captain stopped him and delivered this message: “Master, don’t bother to come to me in person, for I am not good enough for you to enter my home. I’m not worthy enough to even come out to meet one like you. But if you would just speak the word '
  - type: text
    content: of healing
  - type: text
    content: ' from right where you are, I know that my servant will be healed.'
  '8':
  - type: text
    content: 'I am an ordinary man. Yet I understand the power of authority, '
  - type: text
    content: and I see that authority operating through you
  - type: text
    content: . I have soldiers under me who obey everything I command. I also have authorities over me whom I likewise obey. So Master, just speak the word and healing will flow.”
  '9':
  - type: text
    content: 'Jesus marveled at this. He turned around and said to the crowd who had followed him, '
  - type: text
    content: “Listen, everyone! Never have I found among the people of God a man like this who believes so strongly in me.”
  - type: text
    content: ' '
