document_id: PSA.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Song of the Clouded Dawn
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: 'For her who receives the inheritance, '
  - type: note
    content: The Hebrew word used here is neliloth or “flutes.” It can also be translated “inheritances.” The early church father Augustine translated this as “For her who receives the inheritance,” meaning the church of Jesus Christ. The Father told the Son in Ps. 2 to ask for his inheritance; here we see it is the church that receives what Jesus asks for. We receive our inheritance of eternal life through the death and resurrection of the Son of God. The Septuagint reads “For the end,” also found in numerous inscriptions of the Psalms.
  - type: text
    content: by King David
  - type: heading
    content: Morning Watch
  - type: text
    content: 'Listen, '
  - type: text
    content: Yahweh
  - type: text
    content: ', to my passionate prayer!'
  - type: note
    content: Or “My words—give them a hearing, Lord!”
  - type: text
    content: Can’t you hear my groaning?
  '10':
  - type: text
    content: Declare them guilty, O God!
  - type: text
    content: Let their own schemes be their downfall!
  - type: text
    content: Let the guilt of their sins collapse on top of them,
  - type: text
    content: for they rebel against you.
  - type: heading
    content: Multitude of Blessings
  '11':
  - type: text
    content: But let them all be glad,
  - type: text
    content: those who turn aside to hide themselves in you.
  - type: text
    content: May they keep shouting for joy forever!
  - type: text
    content: Overshadow them in your presence as they sing and rejoice.
  - type: text
    content: Then every lover of your name will burst forth with endless joy.
  '12':
  - type: text
    content: Lord, how wonderfully you bless the righteous.
  - type: text
    content: Your favor wraps around each one and covers them
  - type: text
    content: under your canopy of kindness and joy.
  '2':
  - type: text
    content: Don’t you hear how I’m crying out to you?
  - type: text
    content: My King and my God, consider my every word,
  - type: text
    content: for I am calling out to you.
  '3':
  - type: text
    content: At each and every sunrise you will hear my voice
  - type: text
    content: 'as I prepare '
  - type: note
    content: The Hebrew word for “prepare” is ‘arak, a priestly term for lighting the altar fire, preparing a sacrifice, and laying it out in order upon the altar to be consumed.
  - type: text
    content: 'my '
  - type: text
    content: sacrifice of
  - type: text
    content: ' prayer to you.'
  - type: text
    content: Every morning I lay out the pieces of my life on the altar
  - type: text
    content: 'and wait '
  - type: text
    content: for your fire to fall upon my heart
  - type: text
    content: .
  - type: note
    content: Implied in the concept of preparing the morning sacrifice. The Aramaic text states, “At dawn I shall be ready and shall appear before you.” The Hebrew can also be translated “I’ll be on the watchtower [for the answer to come].” See Pss. 59:16; 88:13; Hab. 2:1.
  - type: heading
    content: Making It Right
  '4':
  - type: text
    content: I know that you, God, are never pleased with lawlessness,
  - type: text
    content: and evil ones will never be invited into your house.
  '5':
  - type: text
    content: Boasters collapse, unable to survive your scrutiny,
  - type: text
    content: for your hatred of evildoers is clear.
  '6':
  - type: text
    content: You will make an end of all those who lie.
  - type: text
    content: How you hate their hypocrisy and despise all who love violence!
  - type: heading
    content: Multitude of Mercy
  '7':
  - type: text
    content: But I know that you will welcome me into your house,
  - type: text
    content: for I am covered by your covenant of mercy and love.
  - type: text
    content: 'So I come to your sanctuary '
  - type: note
    content: Or “I come to the temple of your holiness.”
  - type: text
    content: with deepest awe
  - type: text
    content: to bow in worship and adore you.
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ', lead me in the pathways of your pleasure'
  - type: text
    content: just like you promised me you would,
  - type: text
    content: or else my enemies will conquer me.
  - type: text
    content: Smooth out your road in front of me,
  - type: text
    content: straight and level, so that I will know where to walk.
  - type: heading
    content: Multitude of Sins
  '9':
  - type: text
    content: Their words are unreliable.
  - type: text
    content: Destruction is in their hearts,
  - type: text
    content: drawing people into their darkness with their speeches.
  - type: note
    content: Or “their throat is an open grave.”
  - type: text
    content: They are smooth-tongued deceivers, flattering with their words.
