document_id: PSA.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Song of the Clouded Dawn
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For her who receives the inheritance, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: neliloth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: or “flutes.” It can also be translated “inheritances.” The early church father Augustine translated this as “For her who receives the inheritance,” meaning the church of Jesus Christ. The Father told the Son in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to ask for his inheritance; here we see it is the church that receives what Jesus asks for. We receive our inheritance of eternal life through the death and resurrection of the Son of God. The Septuagint reads “For the end,” also found in numerous inscriptions of the Psalms.
      marker-yv: yv-n
    - type: text
      text: by King David
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Morning Watch
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Listen, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', to my passionate prayer!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “My words—give them a hearing, Lord!”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can’t you hear my groaning?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Declare them guilty, O God!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let their own schemes be their downfall!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the guilt of their sins collapse on top of them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they rebel against you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multitude of Blessings
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But let them all be glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who turn aside to hide themselves in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they keep shouting for joy forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Overshadow them in your presence as they sing and rejoice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then every lover of your name will burst forth with endless joy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Lord, how wonderfully you bless the righteous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your favor wraps around each one and covers them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: under your canopy of kindness and joy.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Don’t you hear how I’m crying out to you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My King and my God, consider my every word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am calling out to you.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: At each and every sunrise you will hear my voice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'as I prepare '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “prepare” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ‘arak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a priestly term for lighting the altar fire, preparing a sacrifice, and laying it out in order upon the altar to be consumed.'
      marker-yv: yv-n
    - type: text
      text: 'my '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sacrifice of
    - type: text
      text: ' prayer to you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every morning I lay out the pieces of my life on the altar
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and wait '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for your fire to fall upon my heart
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the concept of preparing the morning sacrifice. The Aramaic text states, “At dawn I shall be ready and shall appear before you.” The Hebrew can also be translated “I’ll be on the watchtower [for the answer to come].” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 59:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 88:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hab. 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Making It Right
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I know that you, God, are never pleased with lawlessness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and evil ones will never be invited into your house.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Boasters collapse, unable to survive your scrutiny,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your hatred of evildoers is clear.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You will make an end of all those who lie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How you hate their hypocrisy and despise all who love violence!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multitude of Mercy
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But I know that you will welcome me into your house,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am covered by your covenant of mercy and love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So I come to your sanctuary '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I come to the temple of your holiness.”
      marker-yv: yv-n
    - type: text
      text: with deepest awe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to bow in worship and adore you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', lead me in the pathways of your pleasure'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just like you promised me you would,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or else my enemies will conquer me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smooth out your road in front of me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: straight and level, so that I will know where to walk.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multitude of Sins
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Their words are unreliable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Destruction is in their hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: drawing people into their darkness with their speeches.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “their throat is an open grave.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are smooth-tongued deceivers, flattering with their words.
