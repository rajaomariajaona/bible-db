      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As found in Hebrew Matthew.
    marker-yv: yv-n
  - type: text
    text: 'to eat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'But when some of the Pharisees saw what was happening, they said to him, “Look! Your disciples shouldn’t be harvesting grain '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
