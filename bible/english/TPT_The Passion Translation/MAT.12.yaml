      text: '25'
  - type: text
    text: 'Jesus supernaturally perceived their thoughts and motives, so he told them this parable:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Any kingdom that fights against itself is reduced to ruins. And any family or community splintered by strife will fall apart.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if Satan casts out Satan, he is making war on himself. How then could his kingdom stand?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if Satan empowers me to cast out demons, who empowers your exorcists
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “your sons,” and by implication, “your followers” (who are exorcists).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to cast them out? Go ask them, let them be your judges.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In other words, to condemn Jesus as working by Satan’s power would be to condemn their own exorcists.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But, if I drive out demons by the power of the Spirit of God, then the end of Satan’s kingdom has come!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from Hebrew Matthew and implied in the Greek. The Greek text, somewhat ambiguously, reads, “then the kingdom of God has approached.” The Hebrew Matthew cohesively fits Jesus’ parable in making the conclusion that the end of Satan’s kingdom has arrived for he has bound the mighty one (Satan) and ransacked his house (kingdom). Regardless, one indeed implies the other.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who would dare enter the house of a mighty man and steal his property? First he must be overpowered and tied up by one who is stronger than he. Then his entire house can be plundered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: So join with me,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus is saying, “This is a war with no neutrality. Join my side or you will miss the spoils of victory and be forever scattered.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for if you’re not on my side you are against me. And if you refuse to help me gather the spoils,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: you are making things worse.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “He who does not join me denies me.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is why I warn you. God will forgive people for every sin and blasphemy except one. There is no forgiveness for the sin of blasphemy against the Holy Spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If anyone speaks evil of me, the Son of Man, he can be forgiven; but if anyone speaks against the Holy Spirit, it will never be forgiven, now or ever!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Only Good Trees Bear Good Fruit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You must determine if a tree is good or rotten. You can recognize good trees by their delicious fruit. But if you find rotten fruit, you can be certain that the tree is rotten. The fruit defines the tree.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But you who are known as the Pharisees are rotten to the core like venomous snakes.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You are the sons of snakes”; that is, their inner identity was like a striking, venomous viper.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How can your words be good if you are rotten within? For what has been stored up in your hearts will be heard in the overflow of your words!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew reads, “Truly the heart awakens and the mouth speaks.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When virtue is stored within, the hearts of good, upright people will produce good fruit. But when evil is hidden within, those who are evil will produce evil fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You can be sure of this: when the day of judgment comes, everyone will be held accountable for every careless word'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “worthless word.” The Aramaic is “every untrue word.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he has spoken.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The agrapha includes a sentence here, also quoted by Justin Martyr: “In the words I find you saying, in those I will judge you.” See Justin Martyr,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dialogue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 47:5.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your very words will be used as evidence, and your words will declare you either innocent or guilty.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sign of Jonah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then a few Jewish scholars and Pharisees spoke up and said, “Teacher, why don’t you perform a miraculous sign for us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Only evil people who are unfaithful to God would demand a sign.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: After experiencing the many miracles of Jesus’ love and power, and hearing his words of grace, for them to demand a further sign is what distinguished that generation as “evil.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: There will be no sign given to you except the sign of the prophet Jonah.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For as Jonah was in the belly of the huge sea creature for three days and three nights, so the Son of Man will be in the heart of the earth for three days and three nights.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The people of Nineveh will also rise up on the day of judgment to condemn this generation.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “tribe.” The Ninevites (modern-day Mosul, Iraq) were pagans, yet through the preaching of one prophet they converted. The people of Israel had many prophets throughout their history, and the greatest Prophet of all was now preaching to them, yet they refused to listen.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For they all repented when they heard the preaching of Jonah. And there is one greater than Jonah here
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: preaching to you today
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '!'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Even the Queen of Sheba
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “the queen of the south.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 10:1–13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Sheba is modern-day Yemen.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will rise up on the day of judgment to condemn this generation for its unbelief! She journeyed from a far and distant land just to hear the wisdom of King Solomon. Yet now there is one greater than Solomon speaking to you today.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Demons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When a demon is cast out of a person, it roams around a dry region, looking for a place to rest, but never finds it.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then it says, ‘I’ll return to the house I moved out of,’ and so it goes back, only to find that the house is vacant, warm, and ready for it to move back in.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “swept clean and put in order.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So it goes looking for seven other demons more evil than itself, and they all enter together to live there. Then the person’s condition becomes much worse than it was in the beginning. This describes what will also happen to the people of this evil generation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ True Family
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'While Jesus was still speaking to the crowds, his mother and brothers came and stood outside, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: asking for him to come out and speak with them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Then someone said, “Look, your mother and brothers are standing outside, wanting to have a word with you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'But Jesus just looked at him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let me introduce you to my true mother and brothers.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Then '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gesturing to the disciples gathered around him
  - type: text
    text: ', he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Look closely, for this is my true family.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When you obey my heavenly Father, that makes you a part of my true family.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Our true identity is dependent upon our obedience to our Father in heaven.
    marker-yv: yv-n
