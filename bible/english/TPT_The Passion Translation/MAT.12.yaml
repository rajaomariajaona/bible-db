    - type: text
      text: '22'
  - type: text
    text: 'Then a man was brought before Jesus who had a demon spirit that made him both blind and mute. Jesus healed him instantly, and he could see and talk again! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The crowds went wild with amazement as they witnessed this miracle. And they kept saying to one another, “Could this man be the Messiah?”
  - type: usfm
