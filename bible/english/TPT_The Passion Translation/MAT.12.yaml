    children:
    - type: text
      text: '10'
  - type: text
    text: 'he encountered a man who had an atrophied, paralyzed hand. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'There is a reading given by Jerome which inserts here these words, possibly from an older manuscript of Hebrew Matthew: “I was a stonemason working with my hands. Jesus, I beg you to heal me so that I don’t have to shamefully beg for food.” See Jerome,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
