      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus made three startling statements that stunned those who heard him. First he said that he was greater than the temple (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: MAT.12.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), then that God didn’t want sacrifices but mercy (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: MAT.12.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and finally that he, the Messiah, was the Lord of the Sabbath. Don’t be surprised when Jesus shocks you with truth that is outside your understanding.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
