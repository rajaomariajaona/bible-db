- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And haven’t you read in the Torah that the priests violated the rules of the Sabbath by carrying out their duties in the temple on a Saturday, and yet they are without blame?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I say to you, there is one here who is even greater than the temple.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We must always remember that Jesus is greater than the Sabbath and greater than the Temple. We have him in our hearts, and the Sabbath can never take his place. Since the Holy of Holies is now living within us, there is no need for another temple.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If only you could learn the meaning of the words ‘I want compassion more than a sacrifice,’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 6:6
      metadata:
        usfm: HOS.6.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Mercy is greater than ritual.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you wouldn’t be condemning my innocent disciples.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of Man exercises his lordship over the Sabbath.”
  - type: usfm
    marker: f
    children:
