      marker: ft
      children:
      - type: text
        text: xii:13 (de Santos 23).
    marker-yv: yv-n
  - type: text
    text: The fault-finding Pharisees asked Jesus, “Is it permissible to perform a work of healing on the Sabbath?” They only asked him this question because they hoped to accuse him of breaking the Jewish laws.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “They were like pests who wanted to devour him.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If any of you had a lamb that fell into a ditch on the Sabbath, wouldn’t you reach out your hand and lift it out?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Isn’t a man much more valuable than a lamb? So of course, it’s always proper to do miracles,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “to do (morally) good.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: even on the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
