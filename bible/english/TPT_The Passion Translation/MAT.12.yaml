document_id: MAT.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, Lord over the Sabbath
  - type: text
    content: 'One Saturday, on the day of rest, '
  - type: note
    content: The Hebrew word for Sabbath comes from shavat, which is the verb “to rest.” What was designed to be a day of rest and intimacy with God and family was now complicated by a host of rules and traditions.
  - type: text
    content: 'Jesus and his disciples were walking through a field of wheat. The disciples were hungry, so they plucked off some heads of grain and rubbed them in their hands '
  - type: note
    content: As found in Hebrew Matthew.
  - type: text
    content: 'to eat. '
  '10':
  - type: text
    content: 'he encountered a man who had an atrophied, paralyzed hand. '
  - type: note
    content: 'There is a reading given by Jerome which inserts here these words, possibly from an older manuscript of Hebrew Matthew: “I was a stonemason working with my hands. Jesus, I beg you to heal me so that I don’t have to shamefully beg for food.” See Jerome, Commentary in Matthew xii:13 (de Santos 23).'
  - type: text
    content: The fault-finding Pharisees asked Jesus, “Is it permissible to perform a work of healing on the Sabbath?” They only asked him this question because they hoped to accuse him of breaking the Jewish laws.
  - type: note
    content: The Aramaic is “They were like pests who wanted to devour him.”
  '11':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “If any of you had a lamb that fell into a ditch on the Sabbath, wouldn’t you reach out your hand and lift it out?
  - type: text
    content: ' '
  '12':
  - type: text
    content: Isn’t a man much more valuable than a lamb? So of course, it’s always proper to do miracles,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “to do (morally) good.”
  - type: text
    content: even on the Sabbath.”
  '13':
  - type: text
    content: Then he turned to the man and said, “Hold out your hand!” And as he stretched it out, it was restored, exactly like the other.
  - type: note
    content: This is the first of seven miracles Jesus performed on the Sabbath. See Mark 1:21–6, 29–31; Luke 13:10–13; 14:1–4; John 5:1–9; 9:13–16.
  '14':
  - type: text
    content: 'Immediately the Pharisees went out and started to scheme about how they would destroy him. '
  '15':
  - type: text
    content: 'Jesus knew what they were thinking, so he left by another way. Massive crowds followed him from there, and he healed all who were sick. '
  '16':
  - type: text
    content: 'However, he sternly warned them not to tell others or disclose his real identity, '
  '17':
  - type: text
    content: 'in order to fulfill the prophecy of Isaiah:'
  - type: note
    content: See Isa. 42:1–4.
  '18':
  - type: text
    content: 'Take a careful look at my servant, '
  - type: note
    content: Or “Here is my son.”
  - type: text
    content: my chosen one.
  - type: text
    content: I love him dearly
  - type: text
    content: and I find all my delight in him.
  - type: note
    content: The Aramaic is literally “He has sun-shined my being.”
  - type: text
    content: I will breathe my Spirit upon him
  - type: text
    content: 'and he will decree justice '
  - type: note
    content: Or “judgment.”
  - type: text
    content: to the nations.
  '19':
  - type: text
    content: He will not quarrel or raise his voice in public.
  '2':
  - type: text
    content: 'But when some of the Pharisees saw what was happening, they said to him, “Look! Your disciples shouldn’t be harvesting grain '
  - type: note
    content: Or “doing what is unlawful.”
  - type: text
    content: on the Sabbath!”
  '20':
  - type: text
    content: He won’t brush aside the bruised and broken.
  - type: text
    content: He will be gentle with the weak and feeble,
  - type: note
    content: 'Or “A bruised reed he will not break and a smoldering wick he will not extinguish.” The Hebrew Matthew adds a phrase here that corresponds to Isa. 42: “He will not fail or be discouraged.”'
  - type: text
    content: until his victory releases justice.
  '21':
  - type: text
    content: And the fame of his name
  - type: text
    content: will birth hope among the people.
  - type: note
    content: Hebrew Matthew is “The islands will wait for his teachings.”
  - type: heading
    content: Jesus Frees a Demonized Man
  '22':
  - type: text
    content: 'Then a man was brought before Jesus who had a demon spirit that made him both blind and mute. Jesus healed him instantly, and he could see and talk again! '
  '23':
  - type: text
    content: The crowds went wild with amazement as they witnessed this miracle. And they kept saying to one another, “Could this man be the Messiah?”
  - type: note
    content: Or “Could he be the Son of David,” a title used for the Messiah.
  '24':
  - type: text
    content: 'But when the Pharisees overheard what the people were saying, they said, “He casts out demons by the power of Satan, '
  - type: note
    content: Or “Beelzebub” (Baal-zebub), a title used for Satan. See footnote on Matt. 10:25.
  - type: text
    content: the prince of demons!”
  '25':
  - type: text
    content: 'Jesus supernaturally perceived their thoughts and motives, so he told them this parable:'
  - type: text
    content: “Any kingdom that fights against itself is reduced to ruins. And any family or community splintered by strife will fall apart.
  - type: text
    content: ' '
  '26':
  - type: text
    content: So if Satan casts out Satan, he is making war on himself. How then could his kingdom stand?
  - type: text
    content: ' '
  '27':
  - type: text
    content: So if Satan empowers me to cast out demons, who empowers your exorcists
  - type: text
    content: ' '
  - type: note
    content: Or “your sons,” and by implication, “your followers” (who are exorcists).
  - type: text
    content: to cast them out? Go ask them, let them be your judges.
  - type: text
    content: ' '
  - type: note
    content: In other words, to condemn Jesus as working by Satan’s power would be to condemn their own exorcists.
  '28':
  - type: text
    content: But, if I drive out demons by the power of the Spirit of God, then the end of Satan’s kingdom has come!
  - type: text
    content: ' '
  - type: note
    content: As translated from Hebrew Matthew and implied in the Greek. The Greek text, somewhat ambiguously, reads, “then the kingdom of God has approached.” The Hebrew Matthew cohesively fits Jesus’ parable in making the conclusion that the end of Satan’s kingdom has arrived for he has bound the mighty one (Satan) and ransacked his house (kingdom). Regardless, one indeed implies the other.
  '29':
  - type: text
    content: Who would dare enter the house of a mighty man and steal his property? First he must be overpowered and tied up by one who is stronger than he. Then his entire house can be plundered.
  '3':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Haven’t you ever read what King David and his men did when they were hungry?
  - type: text
    content: ' '
  '30':
  - type: text
    content: “
  - type: text
    content: So join with me,
  - type: text
    content: ' '
  - type: note
    content: Jesus is saying, “This is a war with no neutrality. Join my side or you will miss the spoils of victory and be forever scattered.”
  - type: text
    content: for if you’re not on my side you are against me. And if you refuse to help me gather the spoils,
  - type: text
    content: ' '
  - type: text
    content: you are making things worse.
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “He who does not join me denies me.”
  '31':
  - type: text
    content: This is why I warn you. God will forgive people for every sin and blasphemy except one. There is no forgiveness for the sin of blasphemy against the Holy Spirit.
  - type: text
    content: ' '
  '32':
  - type: text
    content: If anyone speaks evil of me, the Son of Man, he can be forgiven; but if anyone speaks against the Holy Spirit, it will never be forgiven, now or ever!”
  - type: heading
    content: Only Good Trees Bear Good Fruit
  '33':
  - type: text
    content: “You must determine if a tree is good or rotten. You can recognize good trees by their delicious fruit. But if you find rotten fruit, you can be certain that the tree is rotten. The fruit defines the tree.
  - type: text
    content: ' '
  '34':
  - type: text
    content: But you who are known as the Pharisees are rotten to the core like venomous snakes.
  - type: text
    content: ' '
  - type: note
    content: Or “You are the sons of snakes”; that is, their inner identity was like a striking, venomous viper.
  - type: text
    content: How can your words be good if you are rotten within? For what has been stored up in your hearts will be heard in the overflow of your words!
  - type: note
    content: The Hebrew Matthew reads, “Truly the heart awakens and the mouth speaks.”
  '35':
  - type: text
    content: “When virtue is stored within, the hearts of good, upright people will produce good fruit. But when evil is hidden within, those who are evil will produce evil fruit.
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'You can be sure of this: when the day of judgment comes, everyone will be held accountable for every careless word'
  - type: text
    content: ' '
  - type: note
    content: Or “worthless word.” The Aramaic is “every untrue word.”
  - type: text
    content: he has spoken.
  - type: text
    content: ' '
  - type: note
    content: 'The agrapha includes a sentence here, also quoted by Justin Martyr: “In the words I find you saying, in those I will judge you.” See Justin Martyr, Dialogue 47:5.'
  '37':
  - type: text
    content: Your very words will be used as evidence, and your words will declare you either innocent or guilty.”
  - type: heading
    content: The Sign of Jonah
  '38':
  - type: text
    content: Then a few Jewish scholars and Pharisees spoke up and said, “Teacher, why don’t you perform a miraculous sign for us.”
  '39':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Only evil people who are unfaithful to God would demand a sign.
  - type: text
    content: ' '
  - type: note
    content: After experiencing the many miracles of Jesus’ love and power, and hearing his words of grace, for them to demand a further sign is what distinguished that generation as “evil.”
  - type: text
    content: There will be no sign given to you except the sign of the prophet Jonah.
  - type: text
    content: ' '
  '4':
  - type: text
    content: They entered the house of God
  - type: text
    content: ' '
  - type: note
    content: That is, the tabernacle. See 1 Sam. 21:1–6. Ancient Jewish tradition states that David did this on a Sabbath day. See also Lev. 24:5–9.
  - type: text
    content: and ate the sacred bread of God’s presence,
  - type: text
    content: ' '
  - type: note
    content: Or “loaves of presentation.” See Ezek. 44:15–16.
  - type: text
    content: violating the law by eating bread that only the priests were allowed to eat.
  '40':
  - type: text
    content: For as Jonah was in the belly of the huge sea creature for three days and three nights, so the Son of Man will be in the heart of the earth for three days and three nights.
  - type: text
    content: ' '
  '41':
  - type: text
    content: The people of Nineveh will also rise up on the day of judgment to condemn this generation.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “tribe.” The Ninevites (modern-day Mosul, Iraq) were pagans, yet through the preaching of one prophet they converted. The people of Israel had many prophets throughout their history, and the greatest Prophet of all was now preaching to them, yet they refused to listen.
  - type: text
    content: For they all repented when they heard the preaching of Jonah. And there is one greater than Jonah here
  - type: text
    content: ' '
  - type: text
    content: preaching to you today
  - type: text
    content: '!'
  - type: text
    content: ' '
  '42':
  - type: text
    content: Even the Queen of Sheba
  - type: text
    content: ' '
  - type: note
    content: Literally “the queen of the south.” See 1 Kings 10:1–13. Sheba is modern-day Yemen.
  - type: text
    content: will rise up on the day of judgment to condemn this generation for its unbelief! She journeyed from a far and distant land just to hear the wisdom of King Solomon. Yet now there is one greater than Solomon speaking to you today.”
  - type: heading
    content: Demons
  '43':
  - type: text
    content: “When a demon is cast out of a person, it roams around a dry region, looking for a place to rest, but never finds it.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Then it says, ‘I’ll return to the house I moved out of,’ and so it goes back, only to find that the house is vacant, warm, and ready for it to move back in.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “swept clean and put in order.”
  '45':
  - type: text
    content: So it goes looking for seven other demons more evil than itself, and they all enter together to live there. Then the person’s condition becomes much worse than it was in the beginning. This describes what will also happen to the people of this evil generation.”
  - type: heading
    content: Jesus’ True Family
  '46':
  - type: text
    content: 'While Jesus was still speaking to the crowds, his mother and brothers came and stood outside, '
  - type: text
    content: asking for him to come out and speak with them
  - type: text
    content: '. '
  '47':
  - type: text
    content: 'Then someone said, “Look, your mother and brothers are standing outside, wanting to have a word with you.” '
  '48':
  - type: text
    content: 'But Jesus just looked at him and said, '
  - type: text
    content: “Let me introduce you to my true mother and brothers.”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Then '
  - type: text
    content: gesturing to the disciples gathered around him
  - type: text
    content: ', he said, '
  - type: text
    content: “Look closely, for this is my true family.
  - type: text
    content: ' '
  '5':
  - type: text
    content: “And haven’t you read in the Torah that the priests violated the rules of the Sabbath by carrying out their duties in the temple on a Saturday, and yet they are without blame?
  - type: text
    content: ' '
  '50':
  - type: text
    content: When you obey my heavenly Father, that makes you a part of my true family.”
  - type: note
    content: Our true identity is dependent upon our obedience to our Father in heaven.
  '6':
  - type: text
    content: But I say to you, there is one here who is even greater than the temple.
  - type: text
    content: ' '
  - type: note
    content: We must always remember that Jesus is greater than the Sabbath and greater than the Temple. We have him in our hearts, and the Sabbath can never take his place. Since the Holy of Holies is now living within us, there is no need for another temple.
  '7':
  - type: text
    content: If only you could learn the meaning of the words ‘I want compassion more than a sacrifice,’
  - type: text
    content: ' '
  - type: note
    content: See Hos. 6:6. Mercy is greater than ritual.
  - type: text
    content: you wouldn’t be condemning my innocent disciples.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For the Son of Man exercises his lordship over the Sabbath.”
  - type: note
    content: Jesus made three startling statements that stunned those who heard him. First he said that he was greater than the temple (v. 6), then that God didn’t want sacrifices but mercy (v. 7), and finally that he, the Messiah, was the Lord of the Sabbath. Don’t be surprised when Jesus shocks you with truth that is outside your understanding.
  '9':
  - type: text
    content: 'Then Jesus left them and went into the synagogue where '
