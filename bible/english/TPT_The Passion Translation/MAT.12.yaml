      - type: text
        text: ', which is the verb “to rest.” What was designed to be a day of rest and intimacy with God and family was now complicated by a host of rules and traditions.'
    marker-yv: yv-n
  - type: text
    text: 'Jesus and his disciples were walking through a field of wheat. The disciples were hungry, so they plucked off some heads of grain and rubbed them in their hands '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
