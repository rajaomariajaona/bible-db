        text: ', which can also be translated “treachery” or “deceit.” This is a play on words, for Jacob used Esau’s clothes to deceive. The Midrash Rabbah teaches that Esau ambushed Nimrod in the field, killed him, and took his garments. Jacob wore Nimrod’s garments and deceived his father. According to the apocryphal Book of Jasher, the clothing that God robed Adam with was passed down to Noah, who gave it to his son Ham, and was eventually acquired by Nimrod.'
