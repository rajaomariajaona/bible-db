        text: ', saying, “The power of faith prompted Isaac to impart a blessing to his sons, Jacob and Esau, concerning their prophetic destinies.” At first glance, it does not appear to be an act of faith but rather a blunder for Isaac to bless Jacob instead of Esau. But God called it faith. All of this was contrary to Isaac’s natural inclination. Instead of doubt or unbelief, he acted by faith. It is the nature of faith to give priority to God’s will rather than our own. This is what Abraham had to do in giving up his son Isaac. Now Isaac had to give up Esau and his opinion of how God was to accomplish his purposes.'
