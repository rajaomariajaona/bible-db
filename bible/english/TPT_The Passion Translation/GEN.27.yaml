    - type: text
      text: '37'
  - type: text
    text: Isaac replied, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: You don’t understand
  - type: text
    text: '. My blessing will empower him to be master over you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This demonstrates the power of a father’s prophetic blessing. It can shape the futures of his children. The words we speak over our children can make them or mar them. Be sure to speak life and blessing over your children!
    marker-yv: yv-n
  - type: text
    text: I have already given him all his brothers and relatives as servants. My blessing will richly provide him with grain and new wine. What more is left for me to do for you, my son?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Esau pleaded with his father, “Is that the only blessing you have to give? Bless me too, my father!” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:38
    - type: usfm
