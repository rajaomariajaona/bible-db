        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob’s name comes from the Hebrew word for “heel” and can be translated “trickster,” “heel grabber,” or “cheater.”
    marker-yv: yv-n
  - type: text
    text: —the name fits him perfectly! Now he has tricked me twice! He stole my birthright, and now he’s robbed me of my blessing!” Then he asked, “
  - type: usfm
