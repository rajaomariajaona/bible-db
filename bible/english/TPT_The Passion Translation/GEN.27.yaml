  - type: text
    text: You will live by the sword and serve your brother;
- type: usfm
  marker: q1
  children:
  - type: text
    text: but when you grow restless,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will break free from his control.”
  - type: usfm
