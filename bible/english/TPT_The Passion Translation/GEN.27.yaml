    - type: usfm
      marker: ft
      children:
      - type: text
        text: Esau would be given all the provisions he would need in life. Notice that Isaac reverses the order of the blessing. The fatness of the earth was given first because Esau would be a man with his heart attached to the world. He would live by the sword-principle, always retaliating and unable to forgive. How many believers today have enough of God to get by but live with unresolved anger and unforgiveness like Esau? Hebrews describes Esau as careless about God’s blessing (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 12:16–17
      metadata:
        usfm: HEB.12.16+HEB.12.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The descendants of Esau were known as Edomites. They were a violent people who raided caravans and pillaged cities. During David’s reign, the united monarchy dominated the Edomites, but they later revolted under the reign of Jehoram (849–842 BC).
    marker-yv: yv-n
