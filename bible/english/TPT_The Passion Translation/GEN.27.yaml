  '2':
  - type: text
    content: '“As you can see, I am now an old man,” Isaac said. “And I may die any day now. '
  '20':
  - type: text
    content: Isaac asked his son, “How in the world did you find game so quickly, my son?”
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, caused it to come right to me,” he replied.'
  '21':
  - type: text
    content: 'Then Isaac said to Jacob, “Please, please, come closer that I may touch you, my son. I need to really know for certain that you are Esau.” '
  '22':
  - type: text
    content: 'So Jacob inched closer to his father Isaac, who felt his skin and said, “You sound like Jacob, but your hands are Esau’s.” '
  '23':
  - type: text
    content: 'Because his hands were hairy like his brother Esau’s, Isaac was '
  - type: text
    content: tricked and
  - type: text
    content: ' did not recognize that it was really Jacob. As he was about to give him his blessing, '
  '24':
  - type: text
    content: Isaac asked him again, “Are you really my son Esau?”
  - type: text
    content: Jacob answered, “I am.”
  '25':
  - type: text
    content: '“Then bring the food to me,” Isaac said, “and let me eat my son’s game. Then I will give you my blessing.” So, Jacob gave his father the food and he ate it. He brought him wine and he drank it. '
  '26':
  - type: text
    content: 'Then Isaac said to him, “My son, come near and kiss me.” '
  '27':
  - type: text
    content: So he came near and kissed him. Isaac recognized the smell of his son’s clothes and blessed him, saying,
  - type: text
    content: “Ah, the smell of my son
  - type: text
    content: 'is like the smell of a lush field that '
  - type: text
    content: Yahweh
  - type: text
    content: ' has blessed!'
  '28':
  - type: text
    content: May God give you heaven’s dew,
  - type: note
    content: Dew is a frequent biblical metaphor for God’s anointing, favor, abundance, revelation-truth, renewal, and unity. In Judg. 6:36–40, Gideon’s fleece, saturated with dew, was a sign to him that God was with him. He wrung out a bowl full of dew. We are bowls, vessels of honor, full of heaven’s dew. See Num. 11:9; Deut. 33:13; Pss. 110:3; 133:3; Zech. 8:12.
  - type: text
    content: the fatness of earth,
  - type: note
    content: The fatness of the earth means not only its finest produce (grain and wine) but also abundant prosperity. The earth’s finest blessings were promised to Jacob and his seed.
  - type: text
    content: and an abundance of grain and new wine!
  '29':
  - type: text
    content: Let peoples serve you
  - type: text
    content: and nations bow down to you!
  - type: text
    content: 'May you be master '
  - type: note
    content: The Hebrew word for “master” is gebir, used for the first time in Genesis here. The word is closely related to gibbor, which means “strong,” “mighty,” “valiant,” or “one who does acts of bravery.”
  - type: text
    content: over your brothers
  - type: text
    content: and may your mother’s sons bow down to you!
  - type: text
    content: Those who curse you will be cursed
  - type: text
    content: and those who bless you will be blessed!”
  - type: note
    content: The Hall of Faith (see Heb. 11) reveals a remarkable insight into this account. God commended Isaac in Heb. 11:20, saying, “The power of faith prompted Isaac to impart a blessing to his sons, Jacob and Esau, concerning their prophetic destinies.” At first glance, it does not appear to be an act of faith but rather a blunder for Isaac to bless Jacob instead of Esau. But God called it faith. All of this was contrary to Isaac’s natural inclination. Instead of doubt or unbelief, he acted by faith. It is the nature of faith to give priority to God’s will rather than our own. This is what Abraham had to do in giving up his son Isaac. Now Isaac had to give up Esau and his opinion of how God was to accomplish his purposes.
  - type: heading
    content: Esau’s Lost Blessing
  '3':
  - type: text
    content: 'So please take your hunting gear—your bow and arrows—and go out into the field and hunt some wild game for me. '
  '30':
  - type: text
    content: 'No sooner had Jacob left from receiving the blessing of his father Isaac, than his brother Esau arrived home from hunting. '
  '31':
  - type: text
    content: He too prepared a savory meal for his father and took it to him. He said to Isaac, “Sit up my father; eat some of your son’s wild game so that you can give me your innermost blessing.”
  - type: note
    content: Or “that your soul may bless me.”
  '32':
  - type: text
    content: His father Isaac asked him, “Who are you?”
  - type: text
    content: “I’m Esau, your firstborn son,” he answered.
  '33':
  - type: text
    content: 'When Isaac '
  - type: text
    content: realized what had happened
  - type: text
    content: ', he began to tremble and shake violently. He asked, “Who was it then that hunted wild game and brought it to me? I’ve already eaten it all before you came, and I gave him the blessing—yes, and he will be blessed indeed!”'
  '34':
  - type: text
    content: When Esau heard his father’s words, he burst into bitter weeping and uncontrollable sobbing. He said to his father, “
  - type: text
    content: Bless me!
  - type: text
    content: ' Bless me too, father!”'
  '35':
  - type: text
    content: Isaac answered, “Your brother was here and deceived me. He has taken away your blessing.”
  '36':
  - type: text
    content: 'Esau exclaimed, “Jacob, '
  - type: text
    content: that heel grabber
  - type: text
    content: ' '
  - type: note
    content: Jacob’s name comes from the Hebrew word for “heel” and can be translated “trickster,” “heel grabber,” or “cheater.”
  - type: text
    content: —the name fits him perfectly! Now he has tricked me twice! He stole my birthright, and now he’s robbed me of my blessing!” Then he asked, “
  - type: text
    content: Father
  - type: text
    content: ', haven’t you reserved a blessing for me?”'
  '37':
  - type: text
    content: Isaac replied, “
  - type: text
    content: You don’t understand
  - type: text
    content: '. My blessing will empower him to be master over you. '
  - type: note
    content: This demonstrates the power of a father’s prophetic blessing. It can shape the futures of his children. The words we speak over our children can make them or mar them. Be sure to speak life and blessing over your children!
  - type: text
    content: I have already given him all his brothers and relatives as servants. My blessing will richly provide him with grain and new wine. What more is left for me to do for you, my son?”
  '38':
  - type: text
    content: 'Esau pleaded with his father, “Is that the only blessing you have to give? Bless me too, my father!” '
  - type: note
    content: The Septuagint adds, “But Isaac remained silent.”
  - type: text
    content: 'Esau could not hold back his tears and he wept loudly. '
  '39':
  - type: text
    content: 'Then Isaac his father spoke these words:'
  - type: text
    content: “You will live far from earth’s bounty
  - type: text
    content: and far from heaven’s dew on high.
  '4':
  - type: text
    content: Then prepare me a savory meal, the food I love, and bring it to me. After I eat it, I will bless you from my innermost being before I die.”
  - type: note
    content: Or “After I eat, my soul will bless you before I die.” The repeated mention of this meal (vv. 19, 25, 31, 33) implies that it was a ceremonial meal closely connected with the act of blessing.
  '40':
  - type: text
    content: You will live by the sword and serve your brother;
  - type: text
    content: but when you grow restless,
  - type: text
    content: you will break free from his control.”
  - type: note
    content: Esau would be given all the provisions he would need in life. Notice that Isaac reverses the order of the blessing. The fatness of the earth was given first because Esau would be a man with his heart attached to the world. He would live by the sword-principle, always retaliating and unable to forgive. How many believers today have enough of God to get by but live with unresolved anger and unforgiveness like Esau? Hebrews describes Esau as careless about God’s blessing (see Heb. 12:16–17). The descendants of Esau were known as Edomites. They were a violent people who raided caravans and pillaged cities. During David’s reign, the united monarchy dominated the Edomites, but they later revolted under the reign of Jehoram (849–842 BC).
  '41':
  - type: text
    content: Esau hated Jacob because he stole his blessing. He said to himself, “In a short time my father will be gone. After the time for mourning his death has passed, I will kill my brother Jacob!”
  - type: note
    content: Isaac sealed Jacob’s blessing with a kiss but not Esau’s. All of this caused Esau to hate his brother. Following in the way of Cain, Esau made an inner vow to murder his brother as soon as his father died. His jealousy turned to hatred and hatred to murder, all because his younger brother received a blessing that he did not.
  '42':
  - type: text
    content: 'But when Rebekah found out about her older son Esau’s plan, she quickly sent for her younger son Jacob, '
  - type: note
    content: Jacob may have been in hiding for fear of Esau.
  - type: text
    content: 'and said to him, “Listen, your brother Esau is planning to exact revenge by killing you. '
  - type: note
    content: Or “is consoling himself [over what you did to him] by planning to kill you.”
  '43':
  - type: text
    content: 'My son, you must do what I say. Run away at once to my brother Laban in Haran. '
  '44':
  - type: text
    content: 'You can live with him for a while until your brother calms down. '
  '45':
  - type: text
    content: After your brother’s anger has died down and he has forgotten what you’ve done to him, I will send a messenger to bring you back from there. Why should I lose both my sons in one day?”
  - type: note
    content: This would be the last time Rebekah saw her son before she died.
  '46':
  - type: text
    content: Later, Rebekah said to Isaac, “I’m so disgusted with our Hittite daughters-in-law. I’d rather die than see Jacob marry one of these local girls—these Hittite women!”
  '5':
