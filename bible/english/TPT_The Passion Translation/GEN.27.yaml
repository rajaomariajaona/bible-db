    content: Jacob Defrauds Esau
  - type: text
    content: When Isaac was very old and blind, he called for his oldest son, Esau, and asked him, “My son?”
  - type: text
    content: “
  - type: text
    content: I am here, father
  - type: text
    content: ',” Esau answered.'
  '10':
  - type: text
    content: Then, you take it to him to eat and your father will bless you before he dies.”
  - type: note
    content: Rebekah thought she was pursuing the best course, for she remembered Yahweh’s promise of the older son serving the younger. She could not stand to see Esau, who had broken her heart by taking foreign wives (see Gen. 26:34), receive Isaac’s blessing. This entire episode attests to the conniving nature of man and the overriding purposes of God that cannot be thwarted by our sin.
  '11':
  - type: text
    content: 'Jacob objected, “But my brother Esau is covered with hair, and I’m smooth skinned. '
  '12':
  - type: text
    content: 'If my father feels my hairless skin, '
  - type: text
    content: he’ll know I’m not Esau
  - type: text
    content: . He’ll think I’m a trickster, and I’ll end up bringing a curse upon myself rather than a blessing!”
  '13':
  - type: text
    content: “My son,” his mother said, “let any curse against you fall on me alone! Just do what I say and go and get the goats for me.”
  '14':
  - type: text
    content: 'So he went and got the goats and brought them to his mother. She prepared a delicious meal, just the way his father loved it. '
  '15':
  - type: text
    content: 'Then Rebekah picked out the best clothes '
  - type: note
    content: These were probably Esau’s dress-up clothes reserved for celebrating feasts or ceremonial occasions. The Hebrew word for “clothes” is beged, which can also be translated “treachery” or “deceit.” This is a play on words, for Jacob used Esau’s clothes to deceive. The Midrash Rabbah teaches that Esau ambushed Nimrod in the field, killed him, and took his garments. Jacob wore Nimrod’s garments and deceived his father. According to the apocryphal Book of Jasher, the clothing that God robed Adam with was passed down to Noah, who gave it to his son Ham, and was eventually acquired by Nimrod.
  - type: text
    content: 'of her older son Esau and put them on her younger son Jacob. '
  - type: note
    content: Jacob was about to pull the wool over his father’s eyes. Jacob would do anything just to get his father’s blessing!
  '16':
  - type: text
    content: 'She covered Jacob’s hands and the soft part of his neck with goatskins. '
  '17':
  - type: text
    content: 'Then she handed Jacob the tasty dish and the bread that she had prepared '
