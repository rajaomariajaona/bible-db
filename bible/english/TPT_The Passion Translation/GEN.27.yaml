      text: '41'
  - type: text
    text: Esau hated Jacob because he stole his blessing. He said to himself, “In a short time my father will be gone. After the time for mourning his death has passed, I will kill my brother Jacob!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaac sealed Jacob’s blessing with a kiss but not Esau’s. All of this caused Esau to hate his brother. Following in the way of Cain, Esau made an inner vow to murder his brother as soon as his father died. His jealousy turned to hatred and hatred to murder, all because his younger brother received a blessing that he did not.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
