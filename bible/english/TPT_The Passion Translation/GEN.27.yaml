      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint adds, “But Isaac remained silent.”
    marker-yv: yv-n
  - type: text
    text: 'Esau could not hold back his tears and he wept loudly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Then Isaac his father spoke these words:'
- type: usfm
