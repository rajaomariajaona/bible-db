document_id: PSA.57,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Triumphant Faith
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: King David’s golden song of instruction composed when he hid from Saul in a cave
  - type: note
    content: This incident is recorded in 1 Sam. 24.
  - type: text
    content: To the tune of “Do Not Destroy”
  - type: text
    content: Please, God, show me mercy!
  - type: text
    content: Open your grace-fountain for me,
  - type: text
    content: for you are my soul’s true shelter.
  - type: text
    content: I will hide beneath the shadow of your embrace,
  - type: text
    content: under the wings of your cherubim,
  - type: text
    content: until this terrible trouble is past.
  '10':
  - type: text
    content: Your love is so extravagant it reaches to the heavens;
  - type: text
    content: your faithfulness so astonishing it stretches to the sky!
  '11':
  - type: text
    content: Lord God, be exalted as you soar throughout the heavens.
  - type: text
    content: May your shining glory be shown in the skies!
  - type: text
    content: Let it be seen high above all the earth!
  '2':
  - type: text
    content: I will cry out to you, the God of the highest heaven,
  - type: text
    content: the mighty God, who performs all these wonders for me.
  '3':
  - type: text
    content: 'From heaven he will '
  - type: text
    content: send a father’s help to
  - type: text
    content: ' save me.'
  - type: text
    content: He will trample down those who trample me.
  - type: text
    content: Pause in his presence
  - type: text
    content: He will always show me love
  - type: text
    content: by his gracious and constant care.
  '4':
  - type: text
    content: I am surrounded by these fierce and brutal men.
  - type: text
    content: They are like lions just wanting to tear me to shreds.
  - type: text
    content: Why must I continue to live among these seething terrorists,
  - type: text
    content: breathing out their angry threats and insults against me?
  '5':
  - type: text
    content: Lord God, be exalted as you soar throughout the heavens.
  - type: text
    content: May your shining glory be seen in the skies!
  - type: text
    content: Let it be seen high above over all the earth!
  '6':
  - type: text
    content: For they have set a trap for me.
  - type: note
    content: The Septuagint reads “They have dug a cesspool in front of me.”
  - type: text
    content: Frantic fear has me overwhelmed.
  - type: text
    content: But look! The very trap they set for me
  - type: text
    content: has sprung shut upon themselves instead of me!
  - type: text
    content: Pause in his presence
  '7':
  - type: text
    content: My heart, O God, is quiet and confident.
  - type: text
    content: Now I can sing with passion your wonderful praises!
  '8':
  - type: text
    content: Awake, O my soul, with the music of his splendor-song!
  - type: text
    content: Arise, my soul, and sing his praises!
  - type: text
    content: My worship will awaken the dawn,
  - type: text
    content: 'greeting the daybreak with my songs '
  - type: text
    content: of praise
  - type: text
    content: '!'
  '9':
  - type: text
    content: Wherever I go, I will thank you, my God.
  - type: text
    content: Among all the nations they will hear my praise songs to you.
