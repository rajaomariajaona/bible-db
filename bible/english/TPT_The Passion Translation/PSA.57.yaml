document_id: PSA.57,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Triumphant Faith
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s golden song of instruction composed when he hid from Saul in a cave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '57'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This incident is recorded in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “Do Not Destroy”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Please, God, show me mercy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open your grace-fountain for me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are my soul’s true shelter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will hide beneath the shadow of your embrace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: under the wings of your cherubim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until this terrible trouble is past.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your love is so extravagant it reaches to the heavens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your faithfulness so astonishing it stretches to the sky!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord God, be exalted as you soar throughout the heavens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your shining glory be shown in the skies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let it be seen high above all the earth!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cry out to you, the God of the highest heaven,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the mighty God, who performs all these wonders for me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From heaven he will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: send a father’s help to
    - type: text
      text: ' save me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will trample down those who trample me.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will always show me love
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by his gracious and constant care.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am surrounded by these fierce and brutal men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like lions just wanting to tear me to shreds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why must I continue to live among these seething terrorists,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breathing out their angry threats and insults against me?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord God, be exalted as you soar throughout the heavens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your shining glory be seen in the skies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let it be seen high above over all the earth!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they have set a trap for me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 57:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “They have dug a cesspool in front of me.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frantic fear has me overwhelmed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But look! The very trap they set for me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has sprung shut upon themselves instead of me!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart, O God, is quiet and confident.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now I can sing with passion your wonderful praises!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awake, O my soul, with the music of his splendor-song!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, my soul, and sing his praises!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My worship will awaken the dawn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'greeting the daybreak with my songs '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of praise
    - type: text
      text: '!'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wherever I go, I will thank you, my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among all the nations they will hear my praise songs to you.
