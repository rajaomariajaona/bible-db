document_id: PRO.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Exalted
  - type: text
    content: It’s better to be honest, even if it leads to poverty,
  - type: text
    content: than to live as a dishonest fool.
  '10':
  - type: text
    content: It doesn’t seem right when you see a fool
  - type: text
    content: living in the lap of luxury
  - type: text
    content: or a prideful servant ruling over princes.
  '11':
  - type: text
    content: An understanding person demonstrates patience,
  - type: text
    content: 'for mercy '
  - type: note
    content: The word translated “mercy” (merciful) here is found only in the Septuagint.
  - type: text
    content: means holding your tongue.
  - type: text
    content: When you are insulted,
  - type: text
    content: be quick to forgive and forget it,
  - type: text
    content: for you are virtuous when you overlook an offense.
  '12':
  - type: text
    content: The rage of a king is like the roar of a lion,
  - type: text
    content: but his sweet favor is like a gentle, refreshing rain.
  '13':
  - type: text
    content: A rebellious son breaks a father’s heart,
  - type: text
    content: and a nagging wife can drive you crazy!
  '14':
  - type: text
    content: You can inherit houses and land from your parents,
  - type: text
    content: 'but a good '
  - type: note
    content: Literally “prudent” or “understanding” wife.
  - type: text
    content: wife only comes as a gracious gift from God!
  '15':
  - type: text
    content: Go ahead—be lazy and passive.
  - type: text
    content: But you’ll go hungry if you live that way.
  '16':
  - type: text
    content: Honor God’s holy instructions
  - type: text
    content: and life will go well for you.
  - type: text
    content: But if you despise his ways and choose your own plans,
  - type: text
    content: you will die.
  '17':
  - type: text
    content: Every time you give to the poor you make a loan to the Lord.
  - type: text
    content: Don’t worry—you’ll be repaid in full for all the good you’ve done.
  '18':
  - type: text
    content: Don’t be afraid to discipline your children
  - type: text
    content: while they’re still young enough to learn.
  - type: text
    content: Don’t indulge your children or be swayed by their protests.
  '19':
  - type: text
    content: A hot-tempered man has to pay the price for his anger.
  - type: text
    content: If you bail him out once,
  - type: text
    content: you’ll do it a dozen times.
  - type: note
    content: There is an implication in the Hebrew that he will get into legal trouble. An alternate translation of this verse could be “An evil-minded man will be injured; if you rescue him, his anger will only intensify.”
  '2':
  - type: text
    content: The best way to live is with revelation-knowledge,
  - type: text
    content: for without it, you’ll grow impatient and run right into error.
  - type: note
    content: Or “sin.”
  '20':
  - type: text
    content: Listen well to wise counsel
  - type: text
    content: and be willing to learn from correction
  - type: text
    content: so that by the end of your life
  - type: text
    content: you’ll be known for your wisdom.
  '21':
  - type: text
    content: A person may have many ideas concerning God’s plan for his life,
  - type: text
    content: but only the designs of God’s purpose will succeed in the end.
  '22':
  - type: text
    content: A man is charming when he displays tender mercies to others.
  - type: text
    content: And a lover of God who is poor and promises nothing
  - type: text
    content: is better than a rich liar who never keeps his promises.
  '23':
  - type: text
    content: When you live a life of abandoned love,
  - type: text
    content: surrendered before the awe of God,
  - type: text
    content: 'here’s what you’ll experience:'
  - type: text
    content: Abundant life. Continual protection.
  - type: note
    content: Or “You will not be remembered for evil.”
  - type: text
    content: And complete satisfaction!
  '24':
  - type: text
    content: There are some people who pretend they’re hurt—
  - type: text
    content: deadbeats who won’t even work to feed themselves.
  - type: note
    content: Or “the lazy man buries his fork in his plate and won’t even lift it to his mouth.”
  '25':
  - type: text
    content: If you punish the insolent who don’t know any better,
  - type: text
    content: they will learn not to mock.
  - type: text
    content: But if you correct a wise man,
  - type: text
    content: he will grow even wiser.
  '26':
  - type: text
    content: Children who mistreat their parents
  - type: text
    content: are an embarrassment to their family and a public disgrace.
  '27':
  - type: text
    content: So listen, my child.
  - type: text
    content: Don’t reject correction
  - type: text
    content: or you will certainly wander from the ways of truth.
  - type: note
    content: Or “Stop listening to instruction that contradicts what you know is truth.”
  '28':
  - type: text
    content: A corrupt witness makes a mockery of justice,
  - type: text
    content: for the wicked never play by the rules.
  - type: note
    content: Or “the heart of the wicked feeds on evil.”
  '29':
  - type: text
    content: Judgment is waiting for those who mock the truth,
  - type: text
    content: and foolish living invites a beating.
  '3':
  - type: text
    content: There are some people who ruin their own lives
  - type: text
    content: and then blame it all on God.
  '4':
  - type: text
    content: Being wealthy means having lots of “friends,”
  - type: text
    content: but the poor can’t keep the ones they have.
  '5':
  - type: text
    content: Perjury won’t go unpunished,
  - type: text
    content: and liars will get all that they deserve.
  '6':
  - type: text
    content: Everyone wants to be close to the rich and famous,
  - type: text
    content: but a generous person has all the friends he wants!
  '7':
  - type: text
    content: When a man is poor, even his family has no use for him.
  - type: text
    content: How much more will his “friends” avoid him—
  - type: text
    content: for though he begs for help, they won’t respond.
  - type: note
    content: 'The Aramaic and the Septuagint add a sentence not found in the Hebrew: “The one who is malicious with his words is not to be trusted.”'
  '8':
  - type: text
    content: Do yourself a favor and love wisdom.
  - type: text
    content: Learn all you can,
  - type: text
    content: then watch your life flourish and prosper!
  '9':
  - type: text
    content: Tell lies and you’re going to get caught,
  - type: text
    content: and the habitual liar is doomed.
