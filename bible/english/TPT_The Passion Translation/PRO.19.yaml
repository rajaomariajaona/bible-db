document_id: PRO.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Exalted
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: It’s better to be honest, even if it leads to poverty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to live as a dishonest fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The best way to live is with revelation-knowledge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for without it, you’ll grow impatient and run right into error.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sin.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: There are some people who ruin their own lives
- type: usfm
  marker: q1
  children:
  - type: text
    text: and then blame it all on God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Being wealthy means having lots of “friends,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the poor can’t keep the ones they have.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Perjury won’t go unpunished,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and liars will get all that they deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Everyone wants to be close to the rich and famous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a generous person has all the friends he wants!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When a man is poor, even his family has no use for him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How much more will his “friends” avoid him—
- type: usfm
  marker: q1
  children:
  - type: text
    text: for though he begs for help, they won’t respond.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Aramaic and the Septuagint add a sentence not found in the Hebrew: “The one who is malicious with his words is not to be trusted.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do yourself a favor and love wisdom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Learn all you can,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then watch your life flourish and prosper!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tell lies and you’re going to get caught,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the habitual liar is doomed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: It doesn’t seem right when you see a fool
- type: usfm
  marker: q1
  children:
  - type: text
    text: living in the lap of luxury
- type: usfm
  marker: q1
  children:
  - type: text
    text: or a prideful servant ruling over princes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: An understanding person demonstrates patience,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for mercy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word translated “mercy” (merciful) here is found only in the Septuagint.
    marker-yv: yv-n
  - type: text
    text: means holding your tongue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you are insulted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: be quick to forgive and forget it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are virtuous when you overlook an offense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The rage of a king is like the roar of a lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but his sweet favor is like a gentle, refreshing rain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A rebellious son breaks a father’s heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and a nagging wife can drive you crazy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You can inherit houses and land from your parents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but a good '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “prudent” or “understanding” wife.
    marker-yv: yv-n
  - type: text
    text: wife only comes as a gracious gift from God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Go ahead—be lazy and passive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you’ll go hungry if you live that way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Honor God’s holy instructions
- type: usfm
  marker: q1
  children:
  - type: text
    text: and life will go well for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But if you despise his ways and choose your own plans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Every time you give to the poor you make a loan to the Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t worry—you’ll be repaid in full for all the good you’ve done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Don’t be afraid to discipline your children
- type: usfm
  marker: q1
  children:
  - type: text
    text: while they’re still young enough to learn.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t indulge your children or be swayed by their protests.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A hot-tempered man has to pay the price for his anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you bail him out once,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ll do it a dozen times.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an implication in the Hebrew that he will get into legal trouble. An alternate translation of this verse could be “An evil-minded man will be injured; if you rescue him, his anger will only intensify.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Listen well to wise counsel
- type: usfm
  marker: q1
  children:
  - type: text
    text: and be willing to learn from correction
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that by the end of your life
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ll be known for your wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A person may have many ideas concerning God’s plan for his life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but only the designs of God’s purpose will succeed in the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A man is charming when he displays tender mercies to others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And a lover of God who is poor and promises nothing
- type: usfm
  marker: q1
  children:
  - type: text
    text: is better than a rich liar who never keeps his promises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When you live a life of abandoned love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: surrendered before the awe of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'here’s what you’ll experience:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Abundant life. Continual protection.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You will not be remembered for evil.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: And complete satisfaction!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: There are some people who pretend they’re hurt—
- type: usfm
  marker: q1
  children:
  - type: text
    text: deadbeats who won’t even work to feed themselves.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the lazy man buries his fork in his plate and won’t even lift it to his mouth.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: If you punish the insolent who don’t know any better,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will learn not to mock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But if you correct a wise man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will grow even wiser.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Children who mistreat their parents
- type: usfm
  marker: q1
  children:
  - type: text
    text: are an embarrassment to their family and a public disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: So listen, my child.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t reject correction
- type: usfm
  marker: q1
  children:
  - type: text
    text: or you will certainly wander from the ways of truth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Stop listening to instruction that contradicts what you know is truth.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A corrupt witness makes a mockery of justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the wicked never play by the rules.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the heart of the wicked feeds on evil.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Judgment is waiting for those who mock the truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and foolish living invites a beating.
