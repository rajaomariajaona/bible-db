document_id: JHN.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Warns His Disciples
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have told you this so that you would not surrender to confusion or doubt.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “so that you won’t have a trap laid for you.” The Aramaic is translated “so that you will not be crushed.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “God’s ‘righteousness,’ because I’m going back to join the Father and you’ll see me no longer.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “And ‘judgment’ because the ruler of this dark world has already received his sentence.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In essence, “sin . . . righteousness . . . and judgment are related to three persons.” Sin is related to Adam, for it was through Adam that sin entered humanity (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Righteousness is related to Christ, because it comes through him, and he has become our righteousness (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Judgment is related to Satan, for the pure works of Christ bring judgment to the works of Satan. If we do not embrace Christ’s righteousness, we will share Satan’s judgment.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “There is so much more I would like to say to you, but it’s more than you can grasp at this moment.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when the truth-giving Spirit comes, he will unveil the reality of every truth
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “truth” is “reality,” not “doctrine.” It is the application of truth that matters, not just a superficial knowledge.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: within you. He won’t speak on his own, but only what he hears from the Father, and he will reveal
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: prophetically
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to you what is to come.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will glorify me on the earth, for he will receive from me what is mine
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. Or “he plants what is mine and shows it to you.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and reveal it to you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Everything that belongs to the Father belongs to me—that’s why I say that the Divine Encourager will receive what is mine and reveal it to you.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Soon you won’t see me any longer, but then, after a little while, you will see me
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: in a new way
    - type: usfm
      marker: wj
      children:
      - type: text
        text: .”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus used two different Greek words for “see” in this verse. The Aramaic adds “because I go to my Father.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the disciples asked each other, “What does he mean, ‘Soon you won’t see me,’ and, ‘A little while after that and you will see me in a new way’? And what does he mean, ‘Because I’m going to my Father’?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they kept on repeating, “What’s the meaning of ‘a little while’? We have no clue what he’s talking about!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus knew what they were thinking, and it was obvious that they were anxious to ask him what he had meant, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Are you asking each other what I meant when I told you, ‘A little while and you will see me no more, and then after a little while you will see me’?”
      marker-yv: yv-n
    - type: text
      text: 'so he spoke up and said, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you will be excommunicated from the synagogues, and a time is coming when you will be put to death by misguided ones who will presume to be doing God a great service by putting you to death.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “those who kill you will think they are presenting a holy offering to God.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Let me make it quite clear: You will weep and be overcome with grief'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: over what happens to me
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . The unbelieving world will be happy, while you will be filled with sorrow. But know this, your sadness will turn into joy
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: when you see me again!
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Just like a woman giving birth experiences intense labor pains in delivering her baby,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “because her time [for delivery] has come.” It is fascinating that Jesus spoke of the disciples in the terms of giving birth. Christ is being formed within us (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The church continues in “labor” today so that Jesus can be seen again through us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 12:1–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: yet after the child is born she quickly forgets what she went through because of the overwhelming joy of knowing that a new baby has been born into the world.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So will you also pass through a time of intense sorrow
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: when I am taken from you
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', but you will see me again! And then your hearts will burst with joy, with no one being able to take it from you!'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus was referring to the prophecy of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 66:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'For here is eternal truth: When that time comes you won’t need to ask me for anything, but instead you will go directly to the Father and ask him for anything you desire and he will give it to you, because of your relationship with me.'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he will give it to you in my name.”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Until now you’ve not been bold enough to ask the Father for a single thing in my name,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To ask in Jesus’ name is to ask in the name of “I AM.” We take all the fullness of Jesus (his name, his glory, his virtue) as the “I AM” of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: —because of our relationship with him.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but now you can ask, and keep on asking him! And you can be sure that you’ll receive what you ask for, and your joy will have no limits!
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have spoken to you using figurative language,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: paroimiais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which can mean obscure “figurative speech,” “analogies,” “parables,” “proverbs,” “metaphors,” or “allegory.” These were all utilized as Jesus’ preferred teaching method while on earth. See v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '29'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 13:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the time is coming when I will no longer teach you with veiled speech, but I will teach you about the Father with your eyes unveiled.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And I will not need to ask the Father on your behalf, for you’ll ask him directly because of your new relationship with me.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in my name.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the Father tenderly loves you, because you love me and believe that I’ve come from God.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I came to you sent from the Father’s presence, and I entered into the created world, and now I will leave this world and return to the Father’s side.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His disciples said, “At last you’re speaking to us clearly and not using veiled speech and metaphors! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And they will do these things because they don’t know anything about the Father or me.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now we understand that you know everything there is to know, and we don’t need to question you further. And everything you’ve taught us convinces us that you have come directly from God!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now you finally believe in me.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And the time has come when you will all be scattered, and each one of you will go your own way, leaving me alone!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This will fulfill the prophecy of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet I am never alone, for the Father is always with me.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And everything I’ve taught you is so that the peace which is in me will be in you and will give you great confidence as you rest in me. For in this unbelieving world you will experience trouble and sorrows, but you must be courageous,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cheer up!”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I have conquered the world!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus has taken away the power this world has to defeat us and has conquered it for us. Peace is resting in his victory.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I’m telling you this now so that when their time comes you will remember that I foretold it. I didn’t tell you this in the beginning because I was still with you.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But now that I’m about to leave you and go back to join the One who sent me, you need to be told. Yet, not one of you are asking me where I’m going.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Instead your hearts are filled with sadness because I’ve told you these things.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But here’s the truth: It’s to your advantage that I go away, for if I don’t go away the Divine Encourager'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Redeemer of the curse.” See the second footnote on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 14:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will not be released to you. But after I depart, I will send him to you.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And when he comes, he will expose sin and prove that the world is wrong about God’s righteousness and his judgments.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘Sin,’ because they refuse to believe in who I am.
