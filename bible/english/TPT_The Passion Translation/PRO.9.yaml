        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a fascinating word play in the Hebrew text. The verb meaning “to build” and the word translated “son” come from the same root. “Build” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: banah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and “son” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ben
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The house Wisdom is building is a son. You and I are sons of God who are being built into a spiritual house. There is also a verb in the Hebrew for “hewn” (as in stones). We are living stones raised up to be God’s temple. See
    - type: usfm
