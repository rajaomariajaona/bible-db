- type: usfm
  marker: q1
  children:
  - type: text
    text: upon seven pillars to keep it secure.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The seven pillars of wisdom (plural, “wisdoms”) point us to the seven days of creation, the seven spirits of God, and the seven components of heavenly wisdom given in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: James 3:17–18
      metadata:
        usfm: JAS.3.17+JAS.3.18
