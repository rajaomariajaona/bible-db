- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: She has made ready a banquet feast
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the sacrifice has been killed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The sacrifice points us to Calvary. Wisdom’s pillar is a cross. The Hebrew phrase here literally means “she has prepared her meat.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: She has mingled her wine, and the table’s all set.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Wisdom’s feast will teach us the ways of God. We feed our hearts on revelation-truth that transforms us; then we implement with wise strategies the understanding we have learned at the feasting table.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: She has sent out her maidens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: crying out from the high place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: inviting everyone to come
- type: usfm
  marker: q1
  children:
  - type: text
    text: and eat until they’re full.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Whoever wants to know me and receive my wisdom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: come and dine at my table and drink of my wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lay aside your simple thoughts and leave your paths behind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Agree with my ways, live in my truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you will find righteousness.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If you try to correct an arrogant cynic,
- type: usfm
  marker: q1
  children:
  - type: text
    text: expect an angry insult in return.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And if you try to confront an evil man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: don’t be surprised if all you get is a slap in the face!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So don’t even bother to correct a mocker,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he’ll only hate you for it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But go ahead and correct the wise;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they’ll love you even more.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 141:5
      metadata:
        usfm: PSA.141.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Teach a wise man what is right
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he’ll grow even wiser.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Instruct the lovers of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they’ll learn even more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The starting point for acquiring wisdom
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'is to be consumed with awe as you worship '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: To receive the revelation of the Holy One,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “holy ones.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: you must come to the one who has living-understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Wisdom will extend your life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: making every year more fruitful than the one before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So it is to your advantage to be wise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But to ignore the counsel of wisdom
- type: usfm
  marker: q1
  children:
  - type: text
    text: is to invite trouble into your life.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic adds here “The liar feeds on the wind and chases fantasies, for he has forsaken what is true to travel in a barren wilderness; forgetting the right paths, he leaves his own vineyard to walk with thirst and gather nothing.” The Septuagint adds here “If you forsake folly you will reign forever. Seek discretion and your understanding will bring you knowledge.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Spirit Named Foolish
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: There is a spirit named Foolish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who is boisterous and brash;
- type: usfm
  marker: q1
  children:
  - type: text
    text: she’s seductive and restless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And there she sits at the gateway to the high places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on her throne overlooking the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: She preaches to all who walk by her
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'who are clueless as to what is happening:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who are walking straight ahead on their paths.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “Come home with me.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: She invites those who are easily led astray, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Illicit sex is the best sex of all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our secret affair will be sweeter than all others.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew phrase here literally means “Stolen waters are sweet, and bread eaten in secret is pleasant.” This is an obvious metaphor of finding sexual pleasure with someone other than your spouse and trying to get away with it. Finding pleasure in your relationship with your spouse is like drinking from a pure, clean fountain. But stolen water from someone else’s fountain is yielding to foolishness. Adultery is always sin.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Little do they know when they answer her call
- type: usfm
  marker: q1
  children:
  - type: text
    text: that she dwells among the spirits of the dead,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all her guests soon become citizens of hell!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Older Aramaic and Septuagint manuscripts add a verse here not found in the Hebrew: “But turn away; linger not in the place or even look at her. Don’t drink from a strange fountain. Abstain and drink not from an alien fountain, so that you will enjoy a long life.”'
    marker-yv: yv-n
