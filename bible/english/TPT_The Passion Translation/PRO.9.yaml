document_id: PRO.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom’s Feast
  - type: text
    content: 'Wisdom '
  - type: note
    content: Lady Wisdom is a poetic personification representing Christ, the Wisdom of God (1 Cor. 1:30). This is a classic form of a synecdoche. The Hebrew word chokmah (“wisdom”) can also mean “sacred sense.” It is the understanding and insight given only by God.
  - type: text
    content: has built herself a palace
  - type: note
    content: There is a fascinating word play in the Hebrew text. The verb meaning “to build” and the word translated “son” come from the same root. “Build” is banah and “son” is ben. The house Wisdom is building is a son. You and I are sons of God who are being built into a spiritual house. There is also a verb in the Hebrew for “hewn” (as in stones). We are living stones raised up to be God’s temple. See Ps. 127:1; Matt. 7:24–27; 16:18; Heb. 3:5–6.
  - type: text
    content: upon seven pillars to keep it secure.
  - type: note
    content: The seven pillars of wisdom (plural, “wisdoms”) point us to the seven days of creation, the seven spirits of God, and the seven components of heavenly wisdom given in James 3:17–18.
  '10':
  - type: text
    content: The starting point for acquiring wisdom
  - type: text
    content: 'is to be consumed with awe as you worship '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: To receive the revelation of the Holy One,
  - type: note
    content: Literally “holy ones.”
  - type: text
    content: you must come to the one who has living-understanding.
  '11':
  - type: text
    content: Wisdom will extend your life,
  - type: text
    content: making every year more fruitful than the one before.
  '12':
  - type: text
    content: So it is to your advantage to be wise.
  - type: text
    content: But to ignore the counsel of wisdom
  - type: text
    content: is to invite trouble into your life.
  - type: note
    content: The Aramaic adds here “The liar feeds on the wind and chases fantasies, for he has forsaken what is true to travel in a barren wilderness; forgetting the right paths, he leaves his own vineyard to walk with thirst and gather nothing.” The Septuagint adds here “If you forsake folly you will reign forever. Seek discretion and your understanding will bring you knowledge.”
  - type: heading
    content: A Spirit Named Foolish
  '13':
  - type: text
    content: There is a spirit named Foolish,
  - type: text
    content: who is boisterous and brash;
  - type: text
    content: she’s seductive and restless.
  '14':
  - type: text
    content: And there she sits at the gateway to the high places,
  - type: text
    content: on her throne overlooking the city.
  '15':
  - type: text
    content: She preaches to all who walk by her
  - type: text
    content: 'who are clueless as to what is happening:'
  - type: note
    content: Or “who are walking straight ahead on their paths.”
  '16':
  - type: text
    content: “Come home with me.”
  - type: text
    content: She invites those who are easily led astray, saying,
  '17':
  - type: text
    content: “Illicit sex is the best sex of all.
  - type: text
    content: Our secret affair will be sweeter than all others.”
  - type: note
    content: The Hebrew phrase here literally means “Stolen waters are sweet, and bread eaten in secret is pleasant.” This is an obvious metaphor of finding sexual pleasure with someone other than your spouse and trying to get away with it. Finding pleasure in your relationship with your spouse is like drinking from a pure, clean fountain. But stolen water from someone else’s fountain is yielding to foolishness. Adultery is always sin.
  '18':
  - type: text
    content: Little do they know when they answer her call
  - type: text
    content: that she dwells among the spirits of the dead,
  - type: text
    content: and all her guests soon become citizens of hell!
  - type: note
    content: 'Older Aramaic and Septuagint manuscripts add a verse here not found in the Hebrew: “But turn away; linger not in the place or even look at her. Don’t drink from a strange fountain. Abstain and drink not from an alien fountain, so that you will enjoy a long life.”'
  '2':
  - type: text
    content: She has made ready a banquet feast
  - type: text
    content: and the sacrifice has been killed.
  - type: note
    content: As translated from the Aramaic. The sacrifice points us to Calvary. Wisdom’s pillar is a cross. The Hebrew phrase here literally means “she has prepared her meat.”
  - type: text
    content: She has mingled her wine, and the table’s all set.
  - type: note
    content: Wisdom’s feast will teach us the ways of God. We feed our hearts on revelation-truth that transforms us; then we implement with wise strategies the understanding we have learned at the feasting table.
  '3':
  - type: text
    content: She has sent out her maidens,
  - type: text
    content: crying out from the high place,
  - type: text
    content: inviting everyone to come
  - type: text
    content: and eat until they’re full.
  '4':
  - type: text
    content: “Whoever wants to know me and receive my wisdom,
  '5':
  - type: text
    content: come and dine at my table and drink of my wine.
  '6':
  - type: text
    content: Lay aside your simple thoughts and leave your paths behind.
  - type: text
    content: Agree with my ways, live in my truth,
  - type: text
    content: and you will find righteousness.”
  '7':
  - type: text
    content: If you try to correct an arrogant cynic,
  - type: text
    content: expect an angry insult in return.
  - type: text
    content: And if you try to confront an evil man,
  - type: text
    content: don’t be surprised if all you get is a slap in the face!
  '8':
  - type: text
    content: So don’t even bother to correct a mocker,
  - type: text
    content: for he’ll only hate you for it.
  - type: text
    content: But go ahead and correct the wise;
  - type: text
    content: they’ll love you even more.
  - type: note
    content: See Ps. 141:5.
  '9':
  - type: text
    content: Teach a wise man what is right
  - type: text
    content: and he’ll grow even wiser.
  - type: text
    content: Instruct the lovers of God
  - type: text
    content: and they’ll learn even more.
