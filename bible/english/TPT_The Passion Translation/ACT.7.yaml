document_id: ACT.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Stephen’s Sermon
  - type: text
    content: The high priest asked, “Are these accusations true?”
  '10':
  - type: text
    content: God rescued him from all his oppression and granted him extraordinary favor before Pharaoh, the king of Egypt. Pharaoh appointed him as the overseer of his nation and even of his own palace.
  - type: note
    content: See Gen. 41:37–44.
  '11':
  - type: text
    content: '“Then a devastating famine came over all of Egypt and Canaan, bringing great misery to the people, including our ancestors, who couldn’t find food. '
  - type: note
    content: See Gen. 41:54; 42:5.
  '12':
  - type: text
    content: 'But when Jacob learned that there was food in Egypt, he sent his sons, our ancestors, on their first trip to purchase grain for their family. '
  '13':
  - type: text
    content: 'On their second trip to Egypt, Joseph revealed his identity to his brothers, '
  - type: note
    content: See Gen. 45:1.
  - type: text
    content: and because of this, Pharaoh learned about Joseph’s family and where he came from.
  '14':
  - type: text
    content: '“Joseph sent for his father, Jacob, and his entire family, a total of seventy-five people, to come and reside in Egypt. '
  '15':
  - type: text
    content: 'Eventually, Jacob died there, along with all of his sons, our forefathers. '
  '16':
  - type: text
    content: 'Their bones '
  - type: note
    content: The Aramaic is “his [Jacob’s] bones,” while every Greek manuscript is “their bones.” Jacob was buried in Abraham’s tomb according to Gen. 50:1–14. Joseph was buried in a plot purchased in Shechem for one hundred pieces of silver (Gen. 33:18–20; Josh. 24:32).
  - type: text
    content: were later carried back to the promised land and buried in Shechem, in the tomb Abraham had purchased for a sum of money from the sons of Hamor.
  '17':
  - type: text
    content: “The time drew near for God to fulfill the prophetic promise he had made to Abraham. Our Jewish people had increased greatly in number, multiplying many times over while in Egypt.
  '18':
  - type: text
    content: '“Another '
  - type: note
    content: The Greek is “another of a different kind [or ‘character’].”
  - type: text
    content: 'king, '
  - type: text
    content: who had forgotten how Joseph had made their nation great
  - type: text
    content: ', arose to rule over Egypt. '
  - type: note
    content: See Ex. 1:7–8.
  '19':
  - type: text
    content: He was an abusive king who exploited our people with his smooth talk. With cruelty he forced our ancestors to give up their little boys as he committed infanticide!
  - type: note
    content: The Aramaic can also be translated “forced them to abort their children.”
  '2':
  - type: text
    content: 'Stephen replied, “My fellow Jews and fathers, listen to me. The God of glory appeared '
  - type: note
    content: The entire Hebrew family, and consequently the life of believers today, all began with a divine encounter as the God of glory appeared before Abraham. It is this same glory that calls people to faith in Christ. We, like Abraham, have been captured by the God of glory. See 2 Peter 1:3.
  - type: text
    content: 'to our ancestor Abraham while he was living in Iraq '
  - type: note
    content: Or “Mesopotamia,” or “the land between two rivers” (Euphrates and Tigris).
  - type: text
    content: 'and before he moved to Haran '
  - type: note
    content: This is the city to which Abraham migrated on his way to the promised land. Haran was also the son of Caleb who claimed a mountain. Haran means “mountain climber.”
  - type: text
    content: 'in Syria. '
  '20':
  - type: text
    content: '“Then Moses came on the scene—a child of divine beauty. '
  - type: note
    content: Or “beautiful [well pleasing] in the eyes of God.” The Aramaic is “He was loved by God.” Ancient Hebrew scholars believed Moses may have had a shining of glory on his countenance when he was born, distinguishing him as a special servant of the Lord God. This shining face would later mark him as one who dwelt in the presence of the Lord (Ex. 34:29). Moses was a type or picture of the Lord Jesus Christ. No one was fairer than he; but no one was more extraordinary than our Lord. We learn from Ex. 6:20 that Moses’ father was Amram and his mother was Jochebed. Amram means “family of the lofty One” and Jochebed means “Yah makes great.” The sister of Moses was Miriam (the Hebrew name for Mary), which comes from the root word for “myrrh,” meaning “aromatic,” “fragrant,” or “bitter.” The name Moses means “rescued out of the water.”
  - type: text
    content: 'His parents hid him from Pharaoh as long as they could to spare his life. '
  - type: note
    content: See Heb. 11:23.
  - type: text
    content: 'After three months they could conceal him no longer, '
  '21':
  - type: text
    content: 'so they had to abandon him to his fate. But God arranged that Pharaoh’s daughter would find him, take him home, and raise him as her own son. '
  '22':
  - type: text
    content: So Moses was fully trained in the royal courts and educated in the highest wisdom Egypt had to offer, until he arose as a powerful prince and an eloquent orator.
  - type: note
    content: Jewish tradition is that Pharaoh’s daughter had no child of her own and she herself was an only child. Moses stood in line to receive the throne of Egypt, the great world power. God was going to prepare a servant who would do his pleasure. All the education and culture of this world dynasty with its unlimited resources was placed before Moses. See Ps. 113:7–8.
  '23':
  - type: text
    content: '“When Moses turned forty, his heart was stirred for his people, the Israelites. '
  '24':
  - type: text
    content: 'One day he saw one of our people being violently mistreated, so he came to his rescue, and with his own hands Moses murdered the abusive Egyptian. '
  '25':
  - type: text
    content: 'Moses hoped that when the people realized how he had rescued one of their own, they would recognize him as their deliverer. How wrong he was! '
  '26':
  - type: text
    content: The next day he came upon two of our people engaged in a fist fight, and he tried to break it up by saying, ‘Men, you are brothers! Why would you want to hurt each other?’
  '27':
  - type: text
    content: '“But the perpetrator pushed Moses aside and said, ‘Who do you think you are? Who appointed you to be our ruler and judge? '
  '28':
  - type: text
    content: Are you going to kill me like you did the Egyptian yesterday?’
  - type: note
    content: See Ex. 2:14. Moses missed God’s timing. To know God’s will doesn’t mean you know God’s timing. God made Moses a ruler and a judge, but it took forty years to prepare him. Moses wanted the position forty years before he was ready. No one can make himself ruler and judge—only God has authority to set leaders in place. We cannot raise ourselves up with ministry responsibilities until God releases us. See also Prov. 8:16.
  '29':
  - type: text
    content: '“Shaken by this, Moses fled Egypt '
  - type: note
    content: See Heb. 11:24–27.
  - type: text
    content: 'and lived as an exile in the land of Midian, where he became the father of two sons. '
  '3':
  - type: text
    content: God said to him, ‘Go! Leave behind your country and your relatives. Begin your journey and come to the land that I will show you.’
  - type: note
    content: See Gen. 12:1.
  '30':
  - type: text
    content: 'After forty years had passed, while he was in the desert near Mount Sinai, the Messenger of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'appeared to him in the midst of a flaming thorn bush. '
  - type: note
    content: See Ex. 3:2.
  '31':
  - type: text
    content: 'Moses was astonished and stunned by what he was seeing, so he drew closer to observe this marvel. Then the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to him out of the flames:'
  '32':
  - type: text
    content: '‘I am the living God, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: the God of your ancestors.
  - type: text
    content: I am the God of Abraham, Isaac, and Jacob.’
  - type: text
    content: “Trembling in God’s presence and overwhelmed with awe, Moses didn’t even dare to look into the fire.
  '33':
  - type: text
    content: '“Out of the flames the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to him:'
  - type: text
    content: ‘Take the sandals off your feet,
  - type: note
    content: Removing one’s shoes indicated the highest reverence. It is symbolic of removing earthly matters from our minds and hearts in readiness to accept spiritual realities.
  - type: text
    content: for you are standing in the realm of holiness.
  - type: note
    content: Or “you are standing on ground that is set apart” (sacred).
  '34':
  - type: text
    content: I have watched and seen how my people
  - type: text
    content: 'have been mistreated '
  - type: note
    content: The Aramaic is “I have seen their torment.”
  - type: text
    content: in Egypt.
  - type: text
    content: I have heard their painful groaning,
  - type: text
    content: and now I have come down to set them free.
  - type: text
    content: So come to me, Moses,
  - type: text
    content: for I am sending you to Egypt to represent me.’
  - type: note
    content: See Ex. 3:6–10.
  '35':
  - type: text
    content: '“So God sent back to Egypt the man our people rejected and refused to recognize by saying, ‘Who appointed you to be our ruler and judge?’ God sent this man back to be their ruler and deliverer, commissioned with the power of the messenger who appeared to him in the flaming thorn bush. '
  '36':
  - type: text
    content: 'This man brought the people out from their Egyptian bondage with many astonishing wonders and miracle signs—miracles in Egypt, miracles at the Red Sea, and miracles during their forty-year journey through the wilderness. '
  '37':
  - type: text
    content: 'This is the same Moses who said to our ancestors, ‘The Lord God '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: will raise up one from among you who will be a prophet to you, like I have been. Listen to everything he will say!’
  - type: note
    content: As translated from the Aramaic. See Deut. 18:15.
  '38':
  - type: text
    content: '“Moses led the congregation in the wilderness '
  - type: note
    content: Or “Moses is the one who was in the assembly in the wilderness.”
  - type: text
    content: 'and '
  - type: text
    content: he spoke face-to-face
  - type: text
    content: ' with the angel who spoke with him on the top of Mount Sinai. Along with our ancestors, he received the living oracles of God that were passed down to us. '
  '39':
  - type: text
    content: But our forefathers refused to obey. They pushed him away, and their hearts longed to return to Egypt.
  '4':
  - type: text
    content: '“So Abraham left southeastern Iraq '
  - type: note
    content: Or “the land of Chaldeans.”
  - type: text
    content: 'and began his journey. He settled in Haran and stayed there until his father passed away. Then God had him move to the land of Israel with only a promise. '
  '40':
  - type: text
    content: “While Moses was on the mountain, our forefathers said to Aaron, ‘Make us gods to lead us, because we don’t know what has become of this Moses who brought us out of Egypt.’
  - type: note
    content: The Aramaic is “We don’t know who this Moses is.” See Ex. 32:1, 23.
  '41':
  - type: text
    content: “So they made a god, an idol in the form of a bull calf. They offered sacrifices to it and celebrated with delight what their own hands had made.
  - type: note
    content: Or “They had a party in honor of what their own hands had made.”
  '42':
  - type: text
    content: '“When God saw what they had done, he turned away from them and handed them over to the worship of the stars of heaven, '
  - type: note
    content: This was in violation of Deut. 4:19; 17:2–5.
  - type: text
    content: 'as recorded in the prophetic writings:'
  - type: note
    content: See Amos 5:25–27.
  - type: text
    content: ‘People of Israel, you failed to worship me
  - type: text
    content: when you offered animal sacrifices
  - type: text
    content: for forty years in the wilderness.
  '43':
  - type: text
    content: Instead you worshiped the god Moloch,
  - type: note
    content: This was the Canaanite god of the sun and sky.
  - type: text
    content: and you carried his tabernacle, not mine.
  - type: text
    content: You worshiped your star-god, Rephan.
  - type: note
    content: Or “Derphan,” or “Remphan.” This is the Assyrian deity also referred to as Saturn.
  - type: text
    content: You made idols with your hands
  - type: text
    content: and worshiped them instead of me.
  - type: text
    content: So now I will cast you into exile beyond Babylon.’
  '44':
  - type: text
    content: '“God gave Moses the revelation of the pattern of the tabernacle of the testimony. By God’s command, he made it exactly according to the specifications given to him for our ancestors in the wilderness. '
  '45':
  - type: text
    content: 'The next generation received possession of it, and under Joshua’s '
  - type: note
    content: 'In Aramaic-Hebrew, the spelling of Joshua and Jesus is the same: Yeshua.'
  - type: text
    content: 'leadership they took possession of the land of the nations, which God drove out in front of them. The tabernacle was carried about until '
  '46':
  - type: text
    content: 'David found loving favor with God and prayed for a dwelling place for the God of Jacob, '
  '47':
  - type: text
    content: but it was Solomon who built him a house.
  - type: note
    content: See 2 Chron. 5.
  '48':
  - type: text
    content: '“However, the Most High God does not live in temples made by human hands, as the prophet said:'
  - type: note
    content: See Isa. 66:1–2.
  '49':
  - type: text
    content: ‘Heaven is my throne room and the earth
  - type: text
    content: is but a footstool for my feet.
  - type: text
    content: How could you possibly build a house
  - type: text
    content: 'that could contain me?’ says the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: ‘And where could you find a place where I could live?
  '5':
  - type: text
    content: 'Although God gave him no parcel of land he could call his own, not even a footprint, '
  - type: note
    content: See Deut. 2:5.
  - type: text
    content: 'yet he promised Abraham that he and his descendants would one day have it all. And even though as yet Abraham had no child, '
  '50':
  - type: text
    content: Don’t you know that it is my hands
  - type: text
    content: 'that have built my house, '
  - type: note
    content: Or “all these things.”
  - type: text
    content: not yours?’
  '51':
  - type: text
    content: '“Why would you be so stubborn as to close your hearts and your ears to me? You are always opposing the Holy Spirit, just like your forefathers! '
  '52':
  - type: text
    content: 'Which prophet was not persecuted and murdered by your ancestors? Name just one! They killed them all—even the ones who prophesied long ago of the coming of the Righteous One! Now you follow in their steps and have become his betrayers and murderers. '
  '53':
  - type: text
    content: 'You have been given the law by the visitation '
  - type: note
    content: As translated from the Aramaic. The Greek is “by angelic decrees.”
  - type: text
    content: of angels, but you have not obeyed it.”
  - type: heading
    content: Stephen Is Stoned to Death
  '54':
  - type: text
    content: 'When they heard these things, they were overtaken with violent rage filling their souls, and they gnashed their teeth at him. '
  '55':
  - type: text
    content: 'But Stephen, overtaken with great faith, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: was full of the Holy Spirit. He fixed his gaze into the heavenly realm and saw the glory and splendor of God—and Jesus, who stood up at the right hand of God.
  '56':
  - type: text
    content: '“Look!” Stephen said. “I can see the heavens opening and the Son of Man standing at the right hand of God '
  - type: text
    content: to welcome me home
  - type: text
    content: '!”'
  - type: note
    content: Jesus sits at the right hand of God, but when he saw Stephen give his last breath for the gospel, he stood to welcome his martyr into his eternal reward.
  '57':
  - type: text
    content: 'His accusers covered their ears with their hands and screamed at the top of their lungs to drown out his voice. '
  '58':
  - type: text
    content: Then they pounced on him and threw him outside the city walls to stone him. His accusers, one by one, placed their outer garments at the feet of a young man named Saul of Tarsus.
  - type: note
    content: That is, Saul, who would be converted and become Paul the apostle. Stephen’s graduation was Paul’s initiation.
  '59':
  - type: text
    content: 'As they hurled stone after stone at him, Stephen prayed, “Our Lord Jesus, accept my spirit into your presence.” '
  '6':
  - type: text
    content: 'God spoke with him and gave him this promise:'
  - type: text
    content: ‘Your descendants will live in a foreign land with a people
  - type: text
    content: who will make slaves of them
  - type: text
    content: and oppress them for four hundred years.
  - type: note
    content: See Gen. 15:13–14; Ex. 2:22; 12:40.
  '60':
  - type: text
    content: 'He crumpled to his knees and shouted in a loud voice, “Our Lord, don’t hold this sin against them.” '
  - type: note
    content: See Luke 23:34, 46.
  - type: text
    content: And then he died.
  '7':
  - type: text
    content: But I will judge the nation that enslaves them,
  - type: text
    content: and your descendants will be set free
  - type: text
    content: to return to this land to serve and worship me.’
  - type: note
    content: See Ex. 3:12.
  '8':
  - type: text
    content: “Then God entered into covenant with Abraham, which included the requirement of circumcision. So when he became the father of Isaac, he circumcised him eight days after his birth.
  '9':
  - type: text
    content: '“Isaac then became the father of Jacob, who was the father of our twelve patriarchs. Jacob’s sons became jealous of their brother Joseph and sold him to be a slave in Egypt. But God’s favor and blessing rested upon Joseph, and in time, '
