document_id: COL.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: One with Christ in Glory
  - type: text
    content: 'Christ’s resurrection is your resurrection too. This is why we are to yearn for all that is above, for that’s where Christ sits enthroned at the place of all power, honor, and authority! '
  - type: note
    content: The “right hand of God,” is an obvious metaphor for the place of power, authority, honor, and glory.
  '10':
  - type: text
    content: 'For you have acquired new creation life which is continually being renewed into the likeness of the One who created you; giving you the full revelation of God. '
  '11':
  - type: text
    content: In this new creation life, your nationality makes no difference, nor your ethnicity, education, nor economic status—
  - type: text
    content: they matter nothing
  - type: text
    content: . For it is Christ that means everything as he lives in every one of us!
  - type: note
    content: Or “there is neither Jew or Scythians, circumcision or uncircumcision, neither Greek nor barbarian, neither slave nor free, but the Messiah is all and in all.”
  - type: heading
    content: Love One Another
  '12':
  - type: text
    content: 'You are always and dearly loved by God! So robe yourself '
  - type: text
    content: with virtues of God
  - type: text
    content: ', since you have been divinely chosen to be holy. Be merciful as you endeavor to understand others, and be compassionate, showing kindness toward all. Be gentle and humble, unoffendable in your patience with others. '
  '13':
  - type: text
    content: 'Tolerate the weaknesses of those in the family of faith, forgiving one another in the same way you have been graciously forgiven by Jesus Christ. If you find fault with someone, release this same gift of forgiveness to them. '
  '14':
  - type: text
    content: 'For love is supreme and must flow through each of these virtues. Love becomes the mark '
  - type: note
    content: The Aramaic can be translated “the girdle of maturity.”
  - type: text
    content: of true maturity.
  - type: note
    content: Or “perfection.”
  '15':
  - type: text
    content: 'Let your heart be always guided '
  - type: note
    content: The Greek literally means “let peace be the umpire of your minds.”
  - type: text
    content: by the peace of the Anointed One, who called you to peace as part of his one body. And always be thankful.
  '16':
  - type: text
    content: 'Let the word of Christ live '
  - type: note
    content: Or “grow.”
  - type: text
    content: 'in you richly, flooding you with all wisdom. '
  - type: text
    content: Apply the Scriptures
  - type: text
    content: ' as you teach and instruct one another with the Psalms, and with festive praises, '
  - type: note
    content: Or “hymns.”
  - type: text
    content: and with prophetic songs given to you spontaneously by the Spirit, so sing to God with all your hearts!
  '17':
  - type: text
    content: 'Let every activity '
  - type: note
    content: The Aramaic can be translated “commitment.”
  - type: text
    content: 'of your lives and every word '
  - type: note
    content: The Aramaic can be translated “oath.”
  - type: text
    content: 'that comes from your lips be drenched with the beauty of our Lord Jesus, the Anointed One. And bring your constant praise to God the Father '
  - type: text
    content: because of what Christ has done for you
  - type: text
    content: '!'
  - type: heading
    content: Loving Relationships
  '18':
  - type: text
    content: 'Let every wife be supportive and tenderly devoted '
  - type: note
    content: The Greek word, hupotasso, can be translated “submitted,” “attached,” or “supportive.”
  - type: text
    content: 'to her husband, '
  - type: text
    content: for this is a beautiful illustration
  - type: text
    content: ' of our devotion to Christ. '
  '19':
  - type: text
    content: 'Let every husband be filled with cherishing love for his wife and never be insensitive '
  - type: note
    content: Or “bitter.”
  - type: text
    content: toward her.
  '2':
  - type: text
    content: 'Yes, '
  - type: text
    content: feast on all the treasures of the heavenly realm
  - type: text
    content: ' and fill your thoughts with heavenly realities, and not with the distractions of the natural realm.'
  '20':
  - type: text
    content: 'Let the children respect and pay attention to their parents in everything for this pleases our Lord Jesus. '
  '21':
  - type: text
    content: 'And fathers, don’t have unrealistic expectations '
  - type: note
    content: Or “exasperate your children.”
  - type: text
    content: for your children or else they may become discouraged.
  '22':
  - type: text
    content: Let every employee listen well and follow the instructions of their employer, not just when their employers are watching, and not in pretense, but faithful in all things. For we are to live our lives with pure hearts in the constant awe and wonder of our Lord God.
  '23':
  - type: text
    content: Put your heart and soul into every activity you do, as though you are doing it for the Lord himself and not merely for others.
  '24':
  - type: text
    content: 'For we know that we will receive a reward, an inheritance from the Lord, as we serve the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: Although absent in the Greek manuscripts, the Aramaic text makes it abundantly clear that it is Jesus Christ who is the Lord God (Yahweh). See also Luke 2:11.
  - type: text
    content: 'the Anointed One! '
  '25':
  - type: text
    content: 'A disciple will be repaid for what he has learned and followed, '
  - type: note
    content: This clause is translated from the Aramaic. The Greek text reads “He who does wrong will receive the consequences for what he has done.”
  - type: text
    content: for God pays no attention to the titles or prestige of men.
  '3':
  - type: text
    content: 'Your crucifixion '
  - type: note
    content: The Aramaic could be translated “Your death and your life are both hidden with the Messiah in God.”
  - type: text
    content: 'with Christ has severed the tie to this life, and now your true life is hidden away in God in Christ. '
  '4':
  - type: text
    content: And as Christ himself is seen for who he really is, who you really are will also be revealed, for you are now one with him in his glory!
  - type: heading
    content: New Creation Life
  '5':
  - type: text
    content: 'Live as one who has died to every form of sexual sin and impurity. Live as one who has died to the desires for forbidden things, '
  - type: note
    content: The Aramaic word implies “magic.”
  - type: text
    content: 'including the desire for wealth, which is the essence of idol worship. '
  '6':
  - type: text
    content: When you live in these vices you ignite the anger of God against these acts of disobedience.
  - type: note
    content: As translated from the Aramaic. The Greek states “the sons of disobedience,” but it is actually the “deeds” which are punished as seen in verses 7–9. The Aramaic word used here is a homonym that can mean either “sons” or “deeds,” which may explain the variation within Greek manuscripts.
  '7':
  - type: text
    content: 'That’s how you once behaved, characterized by your evil deeds. But now it’s time to eliminate them from your lives once and for all—anger, fits of rage, all forms of hatred, '
  - type: note
    content: Including self-hatred.
  - type: text
    content: 'cursing, '
  - type: note
    content: As translated from the Aramaic. The Greek means “slander.”
  - type: text
    content: 'filthy speech, '
  '9':
  - type: text
    content: 'and lying. '
  - type: note
    content: Or “living a lie.”
  - type: text
    content: 'Lay aside '
  - type: note
    content: As translated from the Greek. The Aramaic has a command, “take off the old life.”
  - type: text
    content: your old Adam-self with its masquerade and disguise.
