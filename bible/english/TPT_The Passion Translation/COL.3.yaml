document_id: COL.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: One with Christ in Glory
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Christ’s resurrection is your resurrection too. This is why we are to yearn for all that is above, for that’s where Christ sits enthroned at the place of all power, honor, and authority! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “right hand of God,” is an obvious metaphor for the place of power, authority, honor, and glory.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For you have acquired new creation life which is continually being renewed into the likeness of the One who created you; giving you the full revelation of God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: In this new creation life, your nationality makes no difference, nor your ethnicity, education, nor economic status—
    - type: usfm
      marker: it
      children:
      - type: text
        text: they matter nothing
    - type: text
      text: . For it is Christ that means everything as he lives in every one of us!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “there is neither Jew or Scythians, circumcision or uncircumcision, neither Greek nor barbarian, neither slave nor free, but the Messiah is all and in all.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love One Another
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'You are always and dearly loved by God! So robe yourself '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with virtues of God
    - type: text
      text: ', since you have been divinely chosen to be holy. Be merciful as you endeavor to understand others, and be compassionate, showing kindness toward all. Be gentle and humble, unoffendable in your patience with others. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tolerate the weaknesses of those in the family of faith, forgiving one another in the same way you have been graciously forgiven by Jesus Christ. If you find fault with someone, release this same gift of forgiveness to them. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For love is supreme and must flow through each of these virtues. Love becomes the mark '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the girdle of maturity.”
      marker-yv: yv-n
    - type: text
      text: of true maturity.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “perfection.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Let your heart be always guided '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek literally means “let peace be the umpire of your minds.”
      marker-yv: yv-n
    - type: text
      text: by the peace of the Anointed One, who called you to peace as part of his one body. And always be thankful.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Let the word of Christ live '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “grow.”
      marker-yv: yv-n
    - type: text
      text: 'in you richly, flooding you with all wisdom. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Apply the Scriptures
    - type: text
      text: ' as you teach and instruct one another with the Psalms, and with festive praises, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hymns.”
      marker-yv: yv-n
    - type: text
      text: and with prophetic songs given to you spontaneously by the Spirit, so sing to God with all your hearts!
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Let every activity '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “commitment.”
      marker-yv: yv-n
    - type: text
      text: 'of your lives and every word '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “oath.”
      marker-yv: yv-n
    - type: text
      text: 'that comes from your lips be drenched with the beauty of our Lord Jesus, the Anointed One. And bring your constant praise to God the Father '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because of what Christ has done for you
    - type: text
      text: '!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loving Relationships
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Let every wife be supportive and tenderly devoted '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hupotasso
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', can be translated “submitted,” “attached,” or “supportive.”'
      marker-yv: yv-n
    - type: text
      text: 'to her husband, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for this is a beautiful illustration
    - type: text
      text: ' of our devotion to Christ. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Let every husband be filled with cherishing love for his wife and never be insensitive '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bitter.”
      marker-yv: yv-n
    - type: text
      text: toward her.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: feast on all the treasures of the heavenly realm
    - type: text
      text: ' and fill your thoughts with heavenly realities, and not with the distractions of the natural realm.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Let the children respect and pay attention to their parents in everything for this pleases our Lord Jesus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'And fathers, don’t have unrealistic expectations '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “exasperate your children.”
      marker-yv: yv-n
    - type: text
      text: for your children or else they may become discouraged.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Let every employee listen well and follow the instructions of their employer, not just when their employers are watching, and not in pretense, but faithful in all things. For we are to live our lives with pure hearts in the constant awe and wonder of our Lord God.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Put your heart and soul into every activity you do, as though you are doing it for the Lord himself and not merely for others.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'For we know that we will receive a reward, an inheritance from the Lord, as we serve the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although absent in the Greek manuscripts, the Aramaic text makes it abundantly clear that it is Jesus Christ who is the Lord God (
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the Anointed One! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'A disciple will be repaid for what he has learned and followed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This clause is translated from the Aramaic. The Greek text reads “He who does wrong will receive the consequences for what he has done.”
      marker-yv: yv-n
    - type: text
      text: for God pays no attention to the titles or prestige of men.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Your crucifixion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic could be translated “Your death and your life are both hidden with the Messiah in God.”
      marker-yv: yv-n
    - type: text
      text: 'with Christ has severed the tie to this life, and now your true life is hidden away in God in Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: And as Christ himself is seen for who he really is, who you really are will also be revealed, for you are now one with him in his glory!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: New Creation Life
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Live as one who has died to every form of sexual sin and impurity. Live as one who has died to the desires for forbidden things, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word implies “magic.”
      marker-yv: yv-n
    - type: text
      text: 'including the desire for wealth, which is the essence of idol worship. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When you live in these vices you ignite the anger of God against these acts of disobedience.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek states “the sons of disobedience,” but it is actually the “deeds” which are punished as seen in verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Aramaic word used here is a homonym that can mean either “sons” or “deeds,” which may explain the variation within Greek manuscripts.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'That’s how you once behaved, characterized by your evil deeds. But now it’s time to eliminate them from your lives once and for all—anger, fits of rage, all forms of hatred, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Including self-hatred.
      marker-yv: yv-n
    - type: text
      text: 'cursing, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek means “slander.”
      marker-yv: yv-n
    - type: text
      text: 'filthy speech, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'and lying. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “living a lie.”
      marker-yv: yv-n
    - type: text
      text: 'Lay aside '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Greek. The Aramaic has a command, “take off the old life.”
      marker-yv: yv-n
    - type: text
      text: your old Adam-self with its masquerade and disguise.
