document_id: PSA.45,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Wedding Song
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: usfm
    marker: d
    children:
    - type: text
      text: A contemplative song of instruction for the Loved One
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the melody of “Lilies”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lilies in the Bible are metaphors of God’s precious people. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 2:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 14:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 12:27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Many believe this was the wedding song composed for Solomon as he married the princess of Egypt. But the language is so lofty and glorious that we see One greater than Solomon in its verses. This is a song of the wedding of Jesus and his bride, the church.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is on fire, boiling over with passion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bubbling up within me are these beautiful lyrics
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a lovely poem to be sung for the King.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a river bursting its banks, I’m overflowing with words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: spilling out into this sacred story.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is literally “My tongue is the pen of a skillful [inspired] scribe.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: His Royal Majesty
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now listen, daughter, pay attention, and forget about your past.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put behind you every attachment to the familiar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even those who once were close to you!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your royal Bridegroom is ravished by your beautiful brightness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bow in reverence before him, for he is your Lord!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wedding presents pour in from those of great wealth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text is literally “the daughter of Tyre.” This was symbolic of the merchants of the earth, those possessing great wealth.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The royal friends of the Bridegroom shower you with gifts.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the princess-bride enters the palace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how glorious she appears within the holy chamber,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: robed with a wedding dress embroidered with pure gold!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lovely and stunning, she leads the procession with all her bridesmaids
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “virgins.” (See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 14:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; cf.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they come before you, her Bridegroom-King.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What a grand, majestic entrance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A joyful, glad procession as they enter the palace gates!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your many sons will one day be kings, just like their Father.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will sit on royal thrones all around the world.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make sure the fame of your name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is honored in every generation, as all the people praise you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: giving you thanks forever and ever!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beautiful! Beautiful! Beyond the sons of men!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You are the most wonderful and winsome of all men.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elegant grace pours out through every word you speak.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 6:68
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Truly God has anointed you, his favored one, for eternity!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now strap your lightning-sword of judgment upon your side,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O mighty warrior, so majestic!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are full of beauty and splendor as you go out to war!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your glory and grandeur go forth in victory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through your faithfulness and meekness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the cause of truth and justice will stand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Awe-inspiring miracles are accomplished by your power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leaving everyone dazed and astonished!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wounding leaves men’s hearts defeated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they fall before you broken.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your glory-kingdom, O God, endures forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are enthroned to rule with a justice-scepter in your hand!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are passionate for righteousness, and you hate lawlessness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is why God, your God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: crowns you with bliss above your fellow kings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has anointed you, more than any other,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with his oil of fervent joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the very fragrance of heaven’s gladness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your royal robes release the scent of suffering love '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: myrrh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is taken from a root word that means “suffering.” Jewish rabbis refer to myrrh as “tears from a tree,” a symbol of suffering love.
      marker-yv: yv-n
    - type: text
      text: for your bride;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the odor of aromatic incense '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text reads “aloes and cassia.” Both are equated with the anointing spice, the incense burned in the Holy Place.
      marker-yv: yv-n
    - type: text
      text: is upon you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'From the pure and shining place, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from the ivory palaces.” This is an obvious reference to the Holy Place, as our High Priest comes from the chamber of glory to be with us. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ivory
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is taken from a Hebrew word for “white and glistening.”
      marker-yv: yv-n
    - type: text
      text: lovely music
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that makes you glad is played for your pleasure.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Her Royal Majesty
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The daughters of kings, women of honor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are maidens in your courts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And standing beside you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: glistening in your pure and golden glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is the beautiful bride-to-be!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 45:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “queen.”
      marker-yv: yv-n
