document_id: PSA.45,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wedding Song
  - type: text
    content: For the Pure and Shining One by the prophetic singers of Korah’s clan
  - type: text
    content: A contemplative song of instruction for the Loved One
  - type: text
    content: To the melody of “Lilies”
  - type: note
    content: Lilies in the Bible are metaphors of God’s precious people. See Song. 2:1–2; Hos. 14:5; Luke 12:27–28. Many believe this was the wedding song composed for Solomon as he married the princess of Egypt. But the language is so lofty and glorious that we see One greater than Solomon in its verses. This is a song of the wedding of Jesus and his bride, the church.
  - type: text
    content: My heart is on fire, boiling over with passion.
  - type: text
    content: Bubbling up within me are these beautiful lyrics
  - type: text
    content: as a lovely poem to be sung for the King.
  - type: text
    content: Like a river bursting its banks, I’m overflowing with words,
  - type: text
    content: spilling out into this sacred story.
  - type: note
    content: The Hebrew is literally “My tongue is the pen of a skillful [inspired] scribe.”
  - type: heading
    content: His Royal Majesty
  '10':
  - type: text
    content: Now listen, daughter, pay attention, and forget about your past.
  - type: text
    content: Put behind you every attachment to the familiar,
  - type: text
    content: even those who once were close to you!
  '11':
  - type: text
    content: For your royal Bridegroom is ravished by your beautiful brightness.
  - type: text
    content: Bow in reverence before him, for he is your Lord!
  '12':
  - type: text
    content: Wedding presents pour in from those of great wealth.
  - type: note
    content: The Hebrew text is literally “the daughter of Tyre.” This was symbolic of the merchants of the earth, those possessing great wealth.
  - type: text
    content: The royal friends of the Bridegroom shower you with gifts.
  '13':
  - type: text
    content: As the princess-bride enters the palace,
  - type: text
    content: how glorious she appears within the holy chamber,
  - type: text
    content: robed with a wedding dress embroidered with pure gold!
  '14':
  - type: text
    content: Lovely and stunning, she leads the procession with all her bridesmaids
  - type: note
    content: Or “virgins.” (See Rev. 14:1–4; cf. 2 Cor. 11:2.)
  - type: text
    content: as they come before you, her Bridegroom-King.
  '15':
  - type: text
    content: What a grand, majestic entrance!
  - type: text
    content: A joyful, glad procession as they enter the palace gates!
  '16':
  - type: text
    content: Your many sons will one day be kings, just like their Father.
  - type: text
    content: They will sit on royal thrones all around the world.
  '17':
  - type: text
    content: I will make sure the fame of your name
  - type: text
    content: is honored in every generation, as all the people praise you,
  - type: text
    content: giving you thanks forever and ever!
  '2':
  - type: text
    content: Beautiful! Beautiful! Beyond the sons of men!
  - type: note
    content: Or “You are the most wonderful and winsome of all men.”
  - type: text
    content: Elegant grace pours out through every word you speak.
  - type: note
    content: See John 6:68; 7:46.
  - type: text
    content: Truly God has anointed you, his favored one, for eternity!
  '3':
  - type: text
    content: Now strap your lightning-sword of judgment upon your side,
  - type: text
    content: O mighty warrior, so majestic!
  - type: text
    content: You are full of beauty and splendor as you go out to war!
  '4':
  - type: text
    content: In your glory and grandeur go forth in victory!
  - type: text
    content: Through your faithfulness and meekness
  - type: text
    content: the cause of truth and justice will stand.
  - type: text
    content: Awe-inspiring miracles are accomplished by your power,
  - type: text
    content: leaving everyone dazed and astonished!
  '5':
  - type: text
    content: Your wounding leaves men’s hearts defeated
  - type: text
    content: as they fall before you broken.
  '6':
  - type: text
    content: Your glory-kingdom, O God, endures forever,
  - type: text
    content: for you are enthroned to rule with a justice-scepter in your hand!
  '7':
  - type: text
    content: You are passionate for righteousness, and you hate lawlessness.
  - type: text
    content: This is why God, your God,
  - type: text
    content: crowns you with bliss above your fellow kings.
  - type: text
    content: He has anointed you, more than any other,
  - type: text
    content: with his oil of fervent joy,
  - type: text
    content: the very fragrance of heaven’s gladness.
  '8':
  - type: text
    content: 'Your royal robes release the scent of suffering love '
  - type: note
    content: The Hebrew word myrrh is taken from a root word that means “suffering.” Jewish rabbis refer to myrrh as “tears from a tree,” a symbol of suffering love.
  - type: text
    content: for your bride;
  - type: text
    content: 'the odor of aromatic incense '
  - type: note
    content: The Hebrew text reads “aloes and cassia.” Both are equated with the anointing spice, the incense burned in the Holy Place.
  - type: text
    content: is upon you.
  - type: text
    content: 'From the pure and shining place, '
  - type: note
    content: Or “from the ivory palaces.” This is an obvious reference to the Holy Place, as our High Priest comes from the chamber of glory to be with us. The word ivory is taken from a Hebrew word for “white and glistening.”
  - type: text
    content: lovely music
  - type: text
    content: that makes you glad is played for your pleasure.
  - type: heading
    content: Her Royal Majesty
  '9':
  - type: text
    content: The daughters of kings, women of honor,
  - type: text
    content: are maidens in your courts.
  - type: text
    content: And standing beside you,
  - type: text
    content: glistening in your pure and golden glory,
  - type: text
    content: is the beautiful bride-to-be!
  - type: note
    content: Or “queen.”
