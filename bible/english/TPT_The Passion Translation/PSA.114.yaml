document_id: PSA.114,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song for Passover
  - type: text
    content: Many years ago the Jewish people escaped Egypt’s tyranny,
  '2':
  - type: text
    content: so that Israel, God’s people of praise,
  - type: note
    content: Or Judah, which means “praise.”
  - type: text
    content: would become his holy sanctuary,
  - type: text
    content: his kingdom on the earth.
  '3':
  - type: text
    content: The Red Sea waters saw them coming and ran the other way!
  - type: text
    content: Then later, the Jordan River too
  - type: text
    content: moved aside so that they could all pass through.
  '4':
  - type: text
    content: The land shuddered with fear.
  - type: text
    content: Mountains and hills shook with dread.
  - type: note
    content: The literal Hebrew reads “Mountains skipped like rams, the hills like lambs.” This does not mean they skipped with joy, but that they shook with fear, as the context reveals.
  '5':
  - type: text
    content: O sea, what happened to you to make you flee?
  - type: text
    content: O Jordan, what was it that made you turn and run?
  '6':
  - type: text
    content: O mountains, what frightened you so?
  - type: text
    content: And you hills, what made you shiver?
  '7':
  - type: text
    content: Tremble, O earth, for you are in the presence of the Lord,
  - type: text
    content: the presence of the God of Jacob.
  '8':
  - type: text
    content: He splits open boulders and brings up bubbling water.
  - type: text
    content: 'Gushing streams burst forth '
  - type: text
    content: when he is near
  - type: text
    content: '!'
