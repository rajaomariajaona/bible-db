document_id: PSA.114,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Song for Passover
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Many years ago the Jewish people escaped Egypt’s tyranny,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: so that Israel, God’s people of praise,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 114:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Judah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “praise.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would become his holy sanctuary,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his kingdom on the earth.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The Red Sea waters saw them coming and ran the other way!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then later, the Jordan River too
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moved aside so that they could all pass through.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The land shuddered with fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mountains and hills shook with dread.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 114:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The literal Hebrew reads “Mountains skipped like rams, the hills like lambs.” This does not mean they skipped with joy, but that they shook with fear, as the context reveals.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: O sea, what happened to you to make you flee?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Jordan, what was it that made you turn and run?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: O mountains, what frightened you so?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you hills, what made you shiver?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tremble, O earth, for you are in the presence of the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the presence of the God of Jacob.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He splits open boulders and brings up bubbling water.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Gushing streams burst forth '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when he is near
    - type: text
      text: '!'
