document_id: PSA.75,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Cup in God’s Hand
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: Asaph’s poetic song To the tune of “Do Not Destroy”
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God, our hearts spill over with praise to you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We overflow with thanks, for your name is the “Near One.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All we want to talk about is your wonderful works!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'And we hear your reply:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My praises will break the powers of wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the righteous will be promoted and become powerful!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “When the time is ripe I will arise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will judge the world with perfect righteousness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Though I have set the earth firmly on its pillars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will shake it until it totters, and everyone’s hearts will tremble.”
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: God warns the proud, “Stop your arrogant boasting!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he warns the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t think for a moment you can resist me!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Why would you speak with such stubborn pride?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you dare raise your fist against me!”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 6-7
    - type: text
      text: 'This I know:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the favor that brings promotion and power
  - type: usfm
    marker: q1
    children:
    - type: text
      text: doesn’t come from anywhere on earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for no one exalts a person but God, the true judge of all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He alone determines where favor rests.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He anoints one for greatness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and brings another down to his knees.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A foaming cup filled with judgment mixed with fury
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'is in the hands of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: full to the brim and ready to run over.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He filled it up for the wicked, and they will drink it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: down to the very last drop!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But I will proclaim the victory of the God of Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My melodies of praise will make him known.
