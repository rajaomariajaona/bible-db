document_id: PSA.75,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cup in God’s Hand
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: Asaph’s poetic song To the tune of “Do Not Destroy”
  - type: text
    content: God, our hearts spill over with praise to you!
  - type: text
    content: We overflow with thanks, for your name is the “Near One.”
  - type: text
    content: All we want to talk about is your wonderful works!
  - type: text
    content: 'And we hear your reply:'
  '10':
  - type: text
    content: My praises will break the powers of wickedness,
  - type: text
    content: while the righteous will be promoted and become powerful!
  '2':
  - type: text
    content: “When the time is ripe I will arise,
  - type: text
    content: and I will judge the world with perfect righteousness.
  '3':
  - type: text
    content: Though I have set the earth firmly on its pillars,
  - type: text
    content: I will shake it until it totters, and everyone’s hearts will tremble.”
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: God warns the proud, “Stop your arrogant boasting!”
  - type: text
    content: And he warns the wicked,
  - type: text
    content: “Don’t think for a moment you can resist me!
  '5':
  - type: text
    content: Why would you speak with such stubborn pride?
  - type: text
    content: Don’t you dare raise your fist against me!”
  '6':
  - type: text
    content: 'This I know:'
  - type: text
    content: the favor that brings promotion and power
  - type: text
    content: doesn’t come from anywhere on earth,
  - type: text
    content: for no one exalts a person but God, the true judge of all.
  - type: text
    content: He alone determines where favor rests.
  - type: text
    content: He anoints one for greatness
  - type: text
    content: and brings another down to his knees.
  '8':
  - type: text
    content: A foaming cup filled with judgment mixed with fury
  - type: text
    content: 'is in the hands of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: full to the brim and ready to run over.
  - type: text
    content: He filled it up for the wicked, and they will drink it
  - type: text
    content: down to the very last drop!
  '9':
  - type: text
    content: But I will proclaim the victory of the God of Jacob.
  - type: text
    content: My melodies of praise will make him known.
