document_id: PSA.144,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Rescue Me
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song as he stood before Goliath
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '144'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. Put yourself in David’s place as he faced a giant named Goliath. Imagine how he felt as you read through this psalm.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is only one strong, safe, and secure place for me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it’s in God alone who gives me strength for the battle.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing of you, the one who gives victory to kings—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the one who rescues David, your loving servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the fatal sword.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver me and save me from these dark powers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who speak nothing but lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their words are pure deceit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you can’t trust anything they say.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deliver us! Then our homes will be happy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our sons will grow up as strong, sturdy men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and our daughters with graceful beauty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: royally fashioned as for a palace.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our barns will be filled to the brim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: overflowing with the fruits of our harvest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our fields will be full of sheep and cattle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: too many to count,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and our livestock will not miscarry their young.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our enemies will not invade our land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and there’ll be no breach in our walls.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What bliss we experience when these blessings fall!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people who love and serve our God will be happy indeed!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s my shelter of love and my fortress of faith,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who wraps himself around me as a secure shield.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hide myself in this one who subdues enemies before me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, what is it about us that you would even notice us?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you even bother with us?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For man is nothing but a faint whisper, a mere breath.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We spend our days like nothing more than a passing shadow.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Step down from heaven, Lord, and come down!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make the mountains melt at your touch.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Loose your fiery lightning flashes and scatter your enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Overthrow them with your terrifying judgments.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reach down from your heavens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rescue me from this hell
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and deliver me from these dark powers.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They speak nothing but lies; their words are pure deceit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing they say can ever be trusted.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God, I will sing you a brand-new song!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The harp inside my heart will make music to you!
