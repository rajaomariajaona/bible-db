document_id: PSA.144,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Rescue Me
  - type: text
    content: King David’s poetic song as he stood before Goliath
  - type: note
    content: As translated from the Septuagint. Put yourself in David’s place as he faced a giant named Goliath. Imagine how he felt as you read through this psalm.
  - type: text
    content: There is only one strong, safe, and secure place for me;
  - type: text
    content: it’s in God alone who gives me strength for the battle.
  '10':
  - type: text
    content: I will sing of you, the one who gives victory to kings—
  - type: text
    content: the one who rescues David, your loving servant,
  - type: text
    content: from the fatal sword.
  '11':
  - type: text
    content: Deliver me and save me from these dark powers
  - type: text
    content: who speak nothing but lies.
  - type: text
    content: Their words are pure deceit,
  - type: text
    content: and you can’t trust anything they say.
  '12':
  - type: text
    content: Deliver us! Then our homes will be happy.
  - type: text
    content: Our sons will grow up as strong, sturdy men
  - type: text
    content: and our daughters with graceful beauty,
  - type: text
    content: royally fashioned as for a palace.
  '13':
  - type: text
    content: Our barns will be filled to the brim,
  - type: text
    content: overflowing with the fruits of our harvest.
  - type: text
    content: Our fields will be full of sheep and cattle,
  - type: text
    content: too many to count,
  - type: text
    content: and our livestock will not miscarry their young.
  - type: text
    content: Our enemies will not invade our land,
  - type: text
    content: and there’ll be no breach in our walls.
  '15':
  - type: text
    content: What bliss we experience when these blessings fall!
  - type: text
    content: The people who love and serve our God will be happy indeed!
  '2':
  - type: text
    content: He’s my shelter of love and my fortress of faith,
  - type: text
    content: who wraps himself around me as a secure shield.
  - type: text
    content: I hide myself in this one who subdues enemies before me.
  '3':
  - type: text
    content: Lord, what is it about us that you would even notice us?
  - type: text
    content: Why do you even bother with us?
  '4':
  - type: text
    content: For man is nothing but a faint whisper, a mere breath.
  - type: text
    content: We spend our days like nothing more than a passing shadow.
  '5':
  - type: text
    content: Step down from heaven, Lord, and come down!
  - type: text
    content: Make the mountains melt at your touch.
  '6':
  - type: text
    content: Loose your fiery lightning flashes and scatter your enemies.
  - type: text
    content: Overthrow them with your terrifying judgments.
  '7':
  - type: text
    content: Reach down from your heavens
  - type: text
    content: and rescue me from this hell
  - type: text
    content: and deliver me from these dark powers.
  '8':
  - type: text
    content: They speak nothing but lies; their words are pure deceit.
  - type: text
    content: Nothing they say can ever be trusted.
  '9':
  - type: text
    content: My God, I will sing you a brand-new song!
  - type: text
    content: The harp inside my heart will make music to you!
