          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 3:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
