        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Jebusites had their stronghold at Jerusalem (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:25–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Perizzites are related to the Rephaites (“giants,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). The Girgashites were a branch of the Hivites and lived in the western region of the land. These seven tribes could also represent seven strongholds that must be conquered in the life of a believer: (1) The Hebrew word for “Canaanites” means “those who traffic in materialism,” “merchants,” or “pirates”; they represent the love of money. (2) The Hebrew word for “Hittites” means “those broken in pieces,” “terror,” or “dread”; they represent anger and violence. (3) The Hebrew word for “Hivites” means “life born of effort” or “beastly life”; they represent human effort and reliance upon self. (4) The Hebrew word for “Perizzites” means “rustic,” “country dwellers,” or “backwoods”; they represent lack of vision and initiative. (5) The Hebrew word for “Girgashites” means “dense, condensed marshy ground”; they represent ignorance, unwillingness to learn. (6) The Hebrew word for “Amorites” means “those who live on high” or “summit dwellers”; they represent pride and arrogance. (7) The Hebrew word for “Jebusites” means “trampled down under foot”; they represent fear and anxiety that cripple spiritual growth. Jesus, our heavenly Joshua, is more than enough to empower us to overcome these inner strongholds.'
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look! The ark of the covenant of the Lord of all the earth will go before you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and prepare a way for you
    - type: text
      text: ' through the Jordan. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joshua was expressing to Israel that if God can roll back the waters of a raging river, he can repel the attacking armies of Canaan. This miracle reminded these children of the Israelites who saw the waters of the Red Sea rolled back that they could experience the same wonder-working God moving on their behalf. Further, it signaled to the inhabitants of the land that the God of Israel was supreme over the gods of the waters (gods which were untamable and uncontrollable to the Canaanites). As
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: had overthrown the gods of Egypt, so he would overcome the gods of Canaan.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
