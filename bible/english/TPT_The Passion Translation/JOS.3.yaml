  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the water coming downstream toward them stopped flowing and piled up in a solid wall as far upstream as Adam, a place near Zarethan. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Adam is seventeen miles north of the place of the miracle-crossing, and Zarethan is another twenty miles north. The waters were held back and formed a lake that would have extended for almost forty miles. Notice the name “Adam.” The Jordan represents the death of Jesus on the cross and the price he paid to save us. The word for “Jordan” is a compound word joining the words for “to descend” and “judging” (judgment; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 30:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and footnote). Jesus, pictured as the ark, descended into judgment for our sins and rolled the river of guilt, shame, and judgment all the way back to Adam! The root word for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Zarethan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a verb that means “piercing” or “bleeding of the veins.” Judgment was abated to Adam by the one who was “pierced” for our rebellious deeds. It was both the ark and the people who crossed over. Our old Adam-life was buried figuratively at the crossing, and we were “resurrected” with him to possess our inheritance as a people set free (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 6:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' completely cut off the flow of the river so that it drained downstream toward the Desert Sea (the Dead Sea). '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Sea of Arabah (Salt Sea).” A very wide path opened for the people to cross over on dry ground. The “waters of death and judgment” stopped flowing when Jesus our Savior was crucified. Now, when we believe, the fountain of living waters opens within us.
      marker-yv: yv-n
    - type: text
