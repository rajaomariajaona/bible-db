        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a journey of about eight or nine miles, a day’s walk with a crowd of a million people.
      marker-yv: yv-n
    - type: text
      text: 'There they set up camp and waited until they crossed over. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how you will know for sure that the Living God is among you. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: As you advance into the land
    - type: text
      text: ', he will drive out before you the Canaanites, Hittites, Hivites, Perizzites, Girgashites, Amorites, and Jebusites. '
