          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On the discourse level, this verse is somewhat out of place. The twelve men are not Levitical priests but representatives of the tribes. Further details of their duties are given in the next chapter (see
      - type: usfm
