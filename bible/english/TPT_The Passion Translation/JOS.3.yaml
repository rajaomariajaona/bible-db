          text: ). (9) Both the waters of the Red Sea and of the Jordan were restored to their places. (10) Both miracles became a hinge of history, marking a new beginning. (11) Both miracles revealed God’s tremendous power to defeat his enemies. (12) Both miracles resulted in songs of praise (see
      - type: usfm
