        children:
        - type: text
          text: The miracle-crossing of the Jordan bore many similarities to the parting of the Red Sea. (1) Both involved water. (2) Both were witnessed by the entire nation of Israel. (3) Both involved an act of a servant of God—Moses stretched out his rod over the water, and Joshua commanded the priests and the people. (4) Both removed a barrier to the forward advance of God’s people. (5) Both miracles vindicated God’s leader (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
