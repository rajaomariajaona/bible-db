    - type: text
      text: The Miracle-Crossing of the Jordan
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua was up bright and early the next morning. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What an exciting day this was for Joshua and the people. They left their days of wandering in the wilderness behind. A new beginning was now before them. All but two men were under forty years old and had been born in the desert; now they would cross over into a fertile land. Anticipation was in the air! After three days of waiting before a flooding river, they were about to see a miracle! (For more examples of rising early, see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
