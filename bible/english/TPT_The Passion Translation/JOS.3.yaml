        - type: text
          text: .)
      marker-yv: yv-n
    - type: text
      text: 'They broke camp, and Joshua led the Israelites from Acacia to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the eastern bank of
    - type: text
      text: ' the Jordan. '
    - type: usfm
      marker: f
