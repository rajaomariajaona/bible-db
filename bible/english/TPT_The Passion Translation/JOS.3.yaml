        text: '). The Girgashites were a branch of the Hivites and lived in the western region of the land. These seven tribes could also represent seven strongholds that must be conquered in the life of a believer: (1) The Hebrew word for “Canaanites” means “those who traffic in materialism,” “merchants,” or “pirates”; they represent the love of money. (2) The Hebrew word for “Hittites” means “those broken in pieces,” “terror,” or “dread”; they represent anger and violence. (3) The Hebrew word for “Hivites” means “life born of effort” or “beastly life”; they represent human effort and reliance upon self. (4) The Hebrew word for “Perizzites” means “rustic,” “country dwellers,” or “backwoods”; they represent lack of vision and initiative. (5) The Hebrew word for “Girgashites” means “dense, condensed marshy ground”; they represent ignorance, unwillingness to learn. (6) The Hebrew word for “Amorites” means “those who live on high” or “summit dwellers”; they represent pride and arrogance. (7) The Hebrew word for “Jebusites” means “trampled down under foot”; they represent fear and anxiety that cripple spiritual growth. Jesus, our heavenly Joshua, is more than enough to empower us to overcome these inner strongholds.'
