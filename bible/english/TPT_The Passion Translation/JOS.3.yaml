          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The tributaries of the Jordan, swollen with the spring snowmelt from Mount Hermon, flooded the river valley. The width of the flooding river could have been up to a mile at the time of the miracle-crossing. (See
      - type: usfm
        marker: ft
