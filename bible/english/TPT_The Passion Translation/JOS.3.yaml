        - type: text
          text: ' '
      - type: text
        text: Num. 13:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Hittites lived in the northernmost parts of the land (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Hivites were associated with Shechem and Gibeon (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 34:2
      - type: usfm
        marker: ft
