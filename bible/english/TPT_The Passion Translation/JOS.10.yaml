    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The exact site of Azekah is unknown, but it is believed to be in or near the Valley of Elah. David famously fought Goliath in the Valley of Elah, about fifteen miles southwest of Bethlehem, probably modern Wadi es-Sant.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: and the city of Makkedah
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The exact location of Makkedah is unknown, but it is believed to be el-Mughar, twenty-five miles from Gibeon.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Makkedah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
