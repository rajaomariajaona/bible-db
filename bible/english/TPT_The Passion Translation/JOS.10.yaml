  - type: text
    text: 'The five Amorite kings joined forces—the kings of Jerusalem, Hebron, Jarmuth, Lachish, and Eglon. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The combined forces of these five city-states would have been quite intimidating, to say the least. However, it was in fact God’s plan to bring them together and to defeat them in one epic battle. This chapter describes the miraculous way in which their coalition was defeated and how the God of Israel gave victory to Joshua.
    marker-yv: yv-n
  - type: text
    text: Their combined armies surrounded Gibeon and attacked it.
