          text: Beth Horon was two towns. Upper Beth Horon was about five miles northwest of Gibeon. There was a mountain pass that descended to lower Beth Horon.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: and they slaughtered the kings’ armies all the way to Azekah
    - type: text
