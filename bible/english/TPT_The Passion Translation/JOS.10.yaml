    text: 'Then Joshua ordered, “Open up the cave and bring the five kings out to me.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: So Joshua’s men removed the five kings from the cave, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon, and brought them before Joshua.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joshua summoned all of Israel and ordered his army officers, “Place your feet on the necks of these kings.” So they placed their feet upon their necks! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then Joshua said to his officers, “Never be afraid of your enemies or let them discourage you. Be strong and filled with courage! '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is going to do to all your enemies what he’s done to these kings!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then Joshua had the kings executed and hanged on five trees, and he left them there until evening. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: At sunset, Joshua ordered them taken down from the trees and thrown into the cave where they had been hiding. He had large stones rolled over the mouth of the cave, and they remain there to this day.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joshua had imprisoned the five Amorite kings and set men as guardians over the cave until he had defeated their armies. Then his men opened the cave and brought out the kings, and he invited the men of war to put their feet on the necks of these enemies as a symbol of total victory. Joshua executed the five kings, hanging them on five trees. Without revelation, our five natural senses rule and limit us. A mind set on the five senses (metaphorically represented by the five kings) is like a cave and tomb of darkness. In the same way Joshua shut the mouth of the cave with stones, Jesus (our Joshua) set guardians over the church (see
    - type: usfm
