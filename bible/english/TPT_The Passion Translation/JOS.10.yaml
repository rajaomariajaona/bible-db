    - type: text
      text: 'heard how Joshua had totally destroyed the kings and cities of Ai and Jericho and that the people of Gibeon had made a peace treaty with Israel and were living alongside them. The city of Gibeon was larger than Ai, as large as any of the cities that were ruled by a king, and all its men were known as great warriors. '
  '10':
