      marker-yv: yv-n
    - type: text
      text: 'over its enemies—as it is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: also
    - type: text
      text: ' recorded in the Scroll of the Upright One. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Jashar.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jashar is from the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
