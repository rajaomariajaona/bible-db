document_id: JOS.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: When the Sun Stood Still
  - type: text
    content: 'Adoni-zedek, '
  - type: note
    content: The high-sounding names of the five kings mentioned in this chapter all speak of human pride, self-righteousness, and the natural life with its five senses. Adoni-zedek means “lord of righteousness.” There is only one Lord of Righteousness, and it wasn’t he.
  - type: text
    content: 'the king of Jerusalem, '
  - type: note
    content: This is the first mention of Jerusalem in the Bible. Jerusalem means “foundation of peace” or “city of peace.” The city was originally known as the stronghold of Jebus or Jerus. Later, in about 1010 BC, David captured the stronghold of the Jebusites and established Jerusalem as the capital of his united kingdom. See 1 Chron. 11:4–7.
  - type: text
    content: 'was struck with fear when he '
  - type: note
    content: Or “they.” This was not only the people of Jerusalem but the four other kings as well (see v. 3). The kings of that land were struck with fear because of God’s miracles that accompanied Israel. See Ex. 23:27; Deut. 11:25.
  - type: text
    content: 'heard how Joshua had totally destroyed the kings and cities of Ai and Jericho and that the people of Gibeon had made a peace treaty with Israel and were living alongside them. The city of Gibeon was larger than Ai, as large as any of the cities that were ruled by a king, and all its men were known as great warriors. '
  '10':
  - type: text
    content: 'Joshua inflicted a crushing defeat on them at Gibeon, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' threw the Amorites into a panic at the sudden sight of Israel’s army! '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: empowered Joshua
  - type: text
    content: ' '
  - type: note
    content: The Hebrew text indicates that Yahweh is still the subject in vv. 10–11. Yahweh empowered the army, after an all-night march, to fight victoriously over the coalition of the Amorites. Yahweh also empowered them to run for many miles when Israel’s fighting force turned south from Beth Horon all the way to Azekah and Makkedah. This was a supernatural event not accomplished by the might of Israel’s army alone. They were given supernatural strength by faith (see Heb. 11:33–35).
  - type: text
    content: and his army
  - type: text
    content: ' to chase them in the direction of the Beth Horon ascent, '
  - type: note
    content: Beth Horon was two towns. Upper Beth Horon was about five miles northwest of Gibeon. There was a mountain pass that descended to lower Beth Horon.
  - type: text
    content: and they slaughtered the kings’ armies all the way to Azekah
  - type: text
    content: ' '
  - type: note
    content: The exact site of Azekah is unknown, but it is believed to be in or near the Valley of Elah. David famously fought Goliath in the Valley of Elah, about fifteen miles southwest of Bethlehem, probably modern Wadi es-Sant.
  - type: text
    content: and the city of Makkedah
  - type: text
    content: '. '
  - type: note
    content: The exact location of Makkedah is unknown, but it is believed to be el-Mughar, twenty-five miles from Gibeon. Makkedah means “shepherd’s field.”
  '11':
  - type: text
    content: 'As the Amorites raced down the hill to Beth Horon, '
  - type: text
    content: Yahweh
  - type: text
    content: ' hurled large hailstones on them from the sky! '
  - type: note
    content: God supernaturally directed the hailstones to hit the Amorites, but not the Israelites (see Ps. 91:7). There have been reports in human history of record hailstones weighing over 120 pounds. The largest hailstone in recent history fell in South Dakota, US, and was nearly the size of a volleyball. Hail is a biblical symbol of God’s truth and justice that destroy the refuge (web) of lies. See Ex. 9:18–35; Isa. 28:17; Rev. 11:19.
  - type: text
    content: 'The hail continued to fall all the way to Azekah; in fact, more men died from '
  - type: text
    content: Yahweh
  - type: text
    content: ’s
  - type: text
    content: ' hailstones than by the swords of the Israelites.'
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ' gave the men of Israel victory over the Amorites that day, the day when Joshua stood before the people and prayed to '
  - type: text
    content: Yahweh
  - type: text
    content: ':'
  - type: text
    content: '“Sun, stand still '
  - type: note
    content: Or “Sun, wait silently.”
  - type: text
    content: over Gibeon!
  - type: text
    content: Moon, stay where you are over the valley of Aijalon!”
  - type: note
    content: Aijalon means “field of deer” or “a strong place.” The fiery passion of the Lord (see Isa. 9:7; 37:32) consumed Joshua as he spoke to the sun and moon so he could finish the fight. What faith we see in his decree! Imagine if that zeal came upon you.
  '13':
  - type: text
    content: 'And so the sun stood still in the middle of the sky and was in no hurry to set until one day '
  - type: text
    content: became two
  - type: text
    content: '. And the moon halted while the nation triumphed '
  - type: note
    content: Or “exacted vengeance.” This chapter contains perhaps the most amazing miracle recorded in Israel’s history. By the decree of a mortal, the entire cosmos paused as Yahweh himself fought for his people! God will go to any length to see you win your battles as you live in faith and obedience to him. God is the engineer of the universe and holds its controls in his hands. He can accelerate or slow down the created order he set in place. See Job 9:7; Isa. 38:7–8; Hab. 3:11.
  - type: text
    content: 'over its enemies—as it is '
  - type: text
    content: also
  - type: text
    content: ' recorded in the Scroll of the Upright One. '
  - type: note
    content: Or “Jashar.” See 2 Sam. 1:18. Jashar is from the Hebrew word yashar, which means “upright,” “correct,” or “pleasing.” The scroll’s name can also be translated “the Song of Heroes” or “the True Record.” The Scroll of the Upright One was a book likely containing war songs, prayers, and exploits of Israel. The Jewish sage Rashi believed “Jashar” was a symbolic name for the Torah. Others believe it is the same as the book of the wars of the Lord (see Num. 21:14). There has been no manuscript found containing the Scroll of the Upright One. There are other books by that name, but they are not the same as the one mentioned here.
  '14':
  - type: text
    content: 'It was the day '
  - type: text
    content: Yahweh
  - type: text
    content: ' himself fought for Israel! There has never been a day like it before or since—a day when '
  - type: text
    content: Yahweh
  - type: text
    content: ' obeyed the voice of a man!'
  '15':
  - type: text
    content: After their victory
  - type: text
    content: ', '
  - type: note
    content: Scholars debate whether or not this is a scribal error, mistakenly copied from v. 42 and placed here. Regardless, the narrative doesn’t end yet, for the battle continued as they captured the kings of the opposing forces and executed them.
  - type: text
    content: Joshua and his fighting men returned to their camp at Gilgal.
  - type: heading
    content: Joshua Captures the Five Amorite Kings
  '16':
  - type: text
    content: 'Meanwhile, the five Amorite kings fled and hid in a cave at Makkedah. '
  '17':
  - type: text
    content: 'When Joshua was told that the five kings had been found hiding in a cave at Makkedah, '
  '18':
  - type: text
    content: 'Joshua ordered his men, “Seal up the mouth of the cave with large stones and post guards in front of it. '
  '19':
  - type: text
    content: 'But don’t stop! Pursue your enemies! Cut off their retreat and don’t let them reach their cities, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God has given them into your hand!”'
  '20':
  - type: text
    content: 'So Joshua and the Israelites nearly killed them all—almost to a man—although a few escaped into the fortified cities. '
  '21':
  - type: text
    content: The whole army returned safely to Joshua at the camp in Makkedah. No one dared speak against the Israelites.
  - type: note
    content: Or “no one so much as snarled [or ‘sharpened their tongue’] at the Israelites.”
  '22':
  - type: text
    content: 'Then Joshua ordered, “Open up the cave and bring the five kings out to me.” '
  '23':
  - type: text
    content: So Joshua’s men removed the five kings from the cave, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon, and brought them before Joshua.
  '24':
  - type: text
    content: 'Joshua summoned all of Israel and ordered his army officers, “Place your feet on the necks of these kings.” So they placed their feet upon their necks! '
  '25':
  - type: text
    content: 'Then Joshua said to his officers, “Never be afraid of your enemies or let them discourage you. Be strong and filled with courage! '
  - type: text
    content: Yahweh
  - type: text
    content: ' is going to do to all your enemies what he’s done to these kings!”'
  '26':
  - type: text
    content: 'Then Joshua had the kings executed and hanged on five trees, and he left them there until evening. '
  '27':
  - type: text
    content: At sunset, Joshua ordered them taken down from the trees and thrown into the cave where they had been hiding. He had large stones rolled over the mouth of the cave, and they remain there to this day.
  - type: note
    content: Joshua had imprisoned the five Amorite kings and set men as guardians over the cave until he had defeated their armies. Then his men opened the cave and brought out the kings, and he invited the men of war to put their feet on the necks of these enemies as a symbol of total victory. Joshua executed the five kings, hanging them on five trees. Without revelation, our five natural senses rule and limit us. A mind set on the five senses (metaphorically represented by the five kings) is like a cave and tomb of darkness. In the same way Joshua shut the mouth of the cave with stones, Jesus (our Joshua) set guardians over the church (see 1 Cor. 12:28; Eph. 4:11). Jesus pounds our enemies to a pulp under our feet (see Rom. 16:20; Heb. 10:12–13), a total victory. In the same way Joshua executed the five kings, Jesus has silenced all the voices accusing and condemning us (see Rom. 8:1–6) and has set us free from the curse of legalistic self-effort (see Gal. 3:13). He crucified our old identities, and they are dead and buried. We no longer live submitted to sin’s power because Jesus gives us new life and new identities, empowered by his faith (see Rom. 6:6; Gal. 2:20).
  - type: heading
    content: The Capture of the Cities of the South
  '28':
  - type: text
    content: That day, Joshua captured Makkedah, annihilated the inhabitants, and put its king to the sword, leaving no survivors. And he did to its king what had been done to the king of Jericho.
  '29':
  - type: text
    content: 'From Makkedah, Joshua and his army marched '
  - type: text
    content: southwest
  - type: text
    content: ' to the city of Libnah '
  - type: note
    content: Libnah means “pavement” or “whiteness.” Libnah lies about seven miles southwest of Makkedah.
  - type: text
    content: 'and attacked it. '
  '3':
  - type: text
    content: 'So King Adoni-zedek of Jerusalem sent messages to King Hoham '
  - type: note
    content: Hoham means “driven [forced]” or “he crushed.” He ruled as king of Hebron, twenty miles south of Jerusalem. Hebron means “alliance.”
  - type: text
    content: 'of Hebron, King Piram of Jarmuth, '
  - type: note
    content: Piram means “wild donkey” or “fierce.” Piram ruled as king of Jarmuth (modern Khirbet el-Yarmuk), which is eighteen miles southwest of Jerusalem. Jarmuth means “high place.” These high places could also include “every arrogant attitude that is raised up in defiance of the true knowledge of God” (2 Cor. 10:5).
  - type: text
    content: 'King Japhia of Lachish, '
  - type: note
    content: Japhia means “one who enlightens” or “elevated.” Japhia ruled as king of Lachish, fifteen miles west of Hebron. Lachish means “invincible.” Archeologists believe that Tell el-Hesy is ancient Lachish.
  - type: text
    content: 'and King Debir of Eglon: '
  - type: note
    content: Debir means “speaker” or “oracle.” Debir was the king of Eglon, ten miles west of Hebron. Eglon means “young bull.”
  '30':
  - type: text
    content: By the power of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', the city and its king were handed over to the Israelites. They annihilated all the inhabitants with the sword, leaving no survivors. And they did to its king what they had done to the king of Jericho.'
  '31':
  - type: text
    content: 'From Libnah, Joshua and his army marched south to '
  - type: text
    content: the city of
  - type: text
    content: ' Lachish and attacked it. '
  '32':
  - type: text
    content: By the power of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', the city was handed over to Joshua on the second day of the battle. They annihilated all the inhabitants of the city, just as they had done to Libnah. '
  '33':
  - type: text
    content: 'Meanwhile, Horam, '
  - type: note
    content: Horam means “exalted.”
  - type: text
    content: 'king of Gezer, '
  - type: note
    content: Gezer means “steep”; it is about twenty-two miles north of Lachish.
  - type: text
    content: had marched out to help Lachish, but Joshua defeated him and his army, leaving no survivors.
  '34':
  - type: text
    content: 'Then Joshua and all the Israelite army marched on from Lachish to attack '
  - type: text
    content: the city of
  - type: text
    content: ' Eglon. '
  - type: note
    content: Eglon means “bull-like”; it is about ten miles west of Lachish.
  '35':
  - type: text
    content: By the power of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', they captured the city in one day and destroyed its inhabitants, just as they had done to Lachish.'
  '36':
  - type: text
    content: 'Then Joshua and all the Israelite army marched from Eglon and attacked Hebron. '
  - type: note
    content: Hebron means “alliance”; it is in the highlands about twenty-two miles from Eglon.
  '37':
  - type: text
    content: By the power of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', they captured the city, the king, and nearby villages, and totally wiped out all the inhabitants, leaving no survivors, just as they had done to Eglon.'
  '38':
  - type: text
    content: 'Lastly, Joshua and all the Israelite army turned around and attacked Debir. '
  '39':
  - type: text
    content: By the power of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', they captured the city, the king, and nearby villages, and totally wiped out all the inhabitants, leaving no survivors. They did to Debir and its king as they had done to Libnah and its king and to Hebron.'
  '4':
  - type: text
    content: “The people of Gibeon have made peace with Joshua and the Israelites. Come and help me attack them.”
  '40':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: empowered
  - type: text
    content: ' Joshua to conquer the whole region, '
  - type: note
    content: These seven victories (including the defeat of Horam’s army) established the Israelites in the land and made the name of Yahweh famous.
  - type: text
    content: 'including the hill country, the southern desert, '
  - type: note
    content: Or “Negeb.”
  - type: text
    content: 'the western foothills, and the mountain slopes. He conquered all the kings of the land and left no survivors. Everything that breathed was slaughtered—as '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, had commanded. '
  - type: note
    content: The utter destruction of the cities and people of the land God gave to Israel reflects our need to identify and destroy absolutely everything in our lives that hinders God’s grace from subduing and conquering our hearts. No doubt it was not a pleasant task for Israel, nor is it a pleasant task for a believer today. Nevertheless, we must set apart the “promised land” of our hearts for God alone, with neither compromise nor hidden sin. It is our responsibility to seek out and destroy anything in our lives that might corrupt a single-hearted devotion and pure love for a holy God (see Matt. 5:29–30; 2 Cor. 11:3). With God’s divine grace, nothing is impossible (see Matt. 19:26; Luke 1:37). We will share the likeness of Jesus and become the radiant, look-alike partners to the Son of God (see Rev. 19:7–8).
  '41':
  - type: text
    content: 'Joshua’s conquest stretched from Kadesh Barnea to Gaza, and from Goshen to Gibeon. '
  '42':
  - type: text
    content: 'Joshua conquered all their kings and their lands in a single campaign, for '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, fought for his people. '
  '43':
  - type: text
    content: Finally, Joshua and all the Israelite army returned to their base camp in Gilgal.
  '5':
  - type: text
    content: 'The five Amorite kings joined forces—the kings of Jerusalem, Hebron, Jarmuth, Lachish, and Eglon. '
  - type: note
    content: The combined forces of these five city-states would have been quite intimidating, to say the least. However, it was in fact God’s plan to bring them together and to defeat them in one epic battle. This chapter describes the miraculous way in which their coalition was defeated and how the God of Israel gave victory to Joshua.
  - type: text
    content: Their combined armies surrounded Gibeon and attacked it.
  '6':
  - type: text
    content: 'The Gibeonites sent out a call for help to Joshua '
  - type: note
    content: Even though the men of Gibeon were “great warriors,” they didn’t trust in their own strength but called for help to Joshua (Jesus). See Isa. 31:1; 2 Cor. 12:10.
  - type: text
    content: 'at the camp in Gilgal: “Don’t abandon us, for we are your servants! Come quickly and save us! Help us, for the Amorite kings of the hill country have surrounded us!” '
  - type: note
    content: The five kings occupied the high ground, standing above everyone else. Their elevated position is a picture of pride in a perceived higher status. Many believers today look down on others who are not like themselves. See Isa. 40:4; Phil. 2:5–10; 3 John 9–10.
  '7':
  - type: text
    content: 'So Joshua and all his fighting men, all the mighty warriors of Israel, left Gilgal '
  - type: text
    content: to aid the Gibeonites
  - type: text
    content: .
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Joshua: '
  - type: note
    content: Once again, Yahweh spoke to his servant, Joshua. We need leaders today who hear the voice of our Champion-God and help others to hear God’s voice for themselves. See 1 Sam. 3:1–21; John 10:27.
  - type: text
    content: “Do not fear the Amorite kings and their armies, for I have decreed your victory over them; not one will withstand you!”
  '9':
  - type: text
    content: 'Joshua and his fighting force marched all night long from Gilgal '
  - type: text
    content: to Gibeon
  - type: text
    content: ' '
  - type: note
    content: This march, over rough, uphill country, took about nine hours to complete.
  - type: text
    content: 'and took them all by surprise! '
