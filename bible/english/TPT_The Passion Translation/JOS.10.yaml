        marker: it
        children:
        - type: text
          text: yashar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “upright,” “correct,” or “pleasing.” The scroll’s name can also be translated “the Song of Heroes” or “the True Record.” The'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Scroll of the Upright One
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was a book likely containing war songs, prayers, and exploits of Israel. The Jewish sage Rashi believed “Jashar” was a symbolic name for the Torah. Others believe it is the same as the book of the wars of the Lord (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 21:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There has been no manuscript found containing the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Scroll of the Upright One
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . There are other books by that name, but they are not the same as the one mentioned here.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was the day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' himself fought for Israel! There has never been a day like it before or since—a day when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' obeyed the voice of a man!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: After their victory
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Scholars debate whether or not this is a scribal error, mistakenly copied from v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '42'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and placed here. Regardless, the narrative doesn’t end yet, for the battle continued as they captured the kings of the opposing forces and executed them.
      marker-yv: yv-n
    - type: text
      text: Joshua and his fighting men returned to their camp at Gilgal.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua Captures the Five Amorite Kings
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, the five Amorite kings fled and hid in a cave at Makkedah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joshua was told that the five kings had been found hiding in a cave at Makkedah, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua ordered his men, “Seal up the mouth of the cave with large stones and post guards in front of it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But don’t stop! Pursue your enemies! Cut off their retreat and don’t let them reach their cities, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' your God has given them into your hand!”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua and the Israelites nearly killed them all—almost to a man—although a few escaped into the fortified cities. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole army returned safely to Joshua at the camp in Makkedah. No one dared speak against the Israelites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “no one so much as snarled [or ‘sharpened their tongue’] at the Israelites.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua ordered, “Open up the cave and bring the five kings out to me.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Joshua’s men removed the five kings from the cave, the king of Jerusalem, the king of Hebron, the king of Jarmuth, the king of Lachish, and the king of Eglon, and brought them before Joshua.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua summoned all of Israel and ordered his army officers, “Place your feet on the necks of these kings.” So they placed their feet upon their necks! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua said to his officers, “Never be afraid of your enemies or let them discourage you. Be strong and filled with courage! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is going to do to all your enemies what he’s done to these kings!”'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua had the kings executed and hanged on five trees, and he left them there until evening. '
