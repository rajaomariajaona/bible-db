    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave the men of Israel victory over the Amorites that day, the day when Joshua stood before the people and prayed to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ':'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Sun, stand still '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
