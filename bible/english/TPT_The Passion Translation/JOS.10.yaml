      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the Amorites raced down the hill to Beth Horon, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' hurled large hailstones on them from the sky! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God supernaturally directed the hailstones to hit the Amorites, but not the Israelites (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 91:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There have been reports in human history of record hailstones weighing over 120 pounds. The largest hailstone in recent history fell in South Dakota, US, and was nearly the size of a volleyball. Hail is a biblical symbol of God’s truth and justice that destroy the refuge (web) of lies. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 9:18–35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
