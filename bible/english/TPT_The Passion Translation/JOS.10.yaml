      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so the sun stood still in the middle of the sky and was in no hurry to set until one day '
    - type: usfm
      marker: it
      children:
      - type: text
        text: became two
    - type: text
      text: '. And the moon halted while the nation triumphed '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “exacted vengeance.” This chapter contains perhaps the most amazing miracle recorded in Israel’s history. By the decree of a mortal, the entire cosmos paused as
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: himself fought for his people! God will go to any length to see you win your battles as you live in faith and obedience to him. God is the engineer of the universe and holds its controls in his hands. He can accelerate or slow down the created order he set in place. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 9:7
      - type: usfm
        marker: ft
        children:
