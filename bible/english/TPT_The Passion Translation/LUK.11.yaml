document_id: LUK.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Teaches about Prayer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day, as Jesus was in prayer, one of his disciples came over to him as he finished and said, “Would you teach us a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: model prayer
    - type: text
      text: ' that we can pray, just as John did for his disciples?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Let me ask you this: Do you know of any father who would give his son a snake on a plate when he asked for a serving of fish?'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts substitute the word “fish” with “loaf” (bread) and the word “snake” with “a stone.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Of course not!
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do you know of any father who would give his daughter a spider when she had asked for an egg? Of course not!
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If imperfect parents know how to lovingly take care of their children and give them what they need, how much more will the perfect heavenly Father give the Holy Spirit’s fullness when his children ask him.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Responds to Controversy
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'One day a crowd gathered around Jesus, and among them was a man who was mute. Jesus drove out of the man the spirit that made him unable to speak. When the demon left him, the mute man’s tongue was loosed and immediately he was able to speak. The stunned crowd saw it all and marveled in amazement over this miracle! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But there were some in the crowd who protested, saying, “He casts out demons by the power of Satan, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word used here is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Beelzelbul
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which was an Aramaic word for “the prince of devils,” whom the Philistines worshiped. In Hebrew'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Beelzebub
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “lord of the flies.”
      marker-yv: yv-n
    - type: text
      text: 'the demon king.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Others were skeptical and tried to persuade Jesus to perform a spectacular display of power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to prove that he was the Messiah
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jesus, well aware of their every thought, said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Every kingdom that is split against itself is doomed to fail and will eventually collapse.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If it is true that Satan casts out his own demons through me, how could his kingdom remain intact?
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If Satan gives me the power to cast out his demons, who is it that gives your exorcists
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “your sons,” which is a figure of speech for their followers.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: their power? Let them become your judges! Go, ask them, and they will tell you.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So Jesus taught them this prayer: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Our heavenly Father,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Greek manuscripts read simply “Father.” The Aramaic is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: may the glory of your name be the center on which our life turns.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An alternate reading of the Aramaic text. The Aramaic word for “name” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shema
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (or the Hebrew word,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: shem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), a word with multiple meanings. It can also be translated as “light,” “sound,” or “atmosphere.” Placing a light in an enclosed space, like a lantern, magnifies that light. This is the meaning here of God’s name being made sacred and magnified as we focus our lives on him.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: May your Holy Spirit come upon us and cleanse us.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from some of the earliest Greek manuscripts.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Manifest your kingdom on earth.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if I am casting out demons by God’s mighty power,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text literally states “in the finger of God,” a Hebrew phrase denoting God’s power. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 31:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: God’s kingdom is now released upon you—
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: but you still reject it
    - type: text
      text: '!'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When a strong man, with many weapons, guards his palace, his possessions are safe.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when one stronger than he comes to attack and overpower him, the stronger one will empty the arsenal in which he trusted. The conqueror will ransack his kingdom and distribute all the spoils of victory.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever is not on my side is against me, and whoever does not gather the spoils with me will be forever scattered.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When a demon is cast out of a person, it goes to wander in a waterless realm, searching for rest. But finding no place to rest, it says, ‘I will go back and reoccupy the body I left.’
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When it returns, it finds the person like a house swept clean and made tidy,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: but empty.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text is the truth that if a person is delivered from a demon but does not receive Christ and become filled with him, that individual’s condition can become even worse. True conversion fills a life with Christ and his Spirit.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Then it goes and enlists seven demons more evil than itself, and they all enter and possess the person, leaving that one in a much worse state than before.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Christ’s power is still available for all. Even Mary Magdalene had seven demons cast out of her. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: While he was saying all this, a woman shouted from the crowd, “God bless the one who gave you birth and nursed you as a child!”
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Yes,”
    - type: text
      text: ' said Jesus, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “but God will bless all who listen to the word of God and carefully obey everything they hear.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Miracle Sign of Jonah the Prophet
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'As the crowds continued to swell, Jesus went on to say, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “How evil is this generation! When you demand a mighty display of power simply to prove who I am,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: you demonstrate your unbelief
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . The only sign you will see will be a repeat of the miracle of Jonah.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And give us our needed bread for the coming day.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is more than asking for food, for Jesus has taught us not to worry about the needs of our body. It is the request for tomorrow’s living bread to come and feed us today.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In the same way Jonah became a sign to the people of Nineveh, so the Son of Man will be a sign to this generation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “tribe.” See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '31'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Ninevites were a different Semitic tribe from the Jews.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Queen of Sheba
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “the queen of the south.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 10:1–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Sheba is modern-day Yemen.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will rise up on the day of judgment to accuse and condemn this generation
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: for its unbelief
    - type: usfm
      marker: wj
      children:
      - type: text
        text: . She journeyed from a far and distant land just to listen to the wisdom of King Solomon. One greater than Solomon speaks with you today,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: but you refuse to listen.
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yes, the people of Nineveh will also rise up on the day of judgment to accuse and condemn this generation.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “tribe.” The Ninevites were of Semitic origin, and although they were pagans, after the preaching of one prophet they converted. The people of Israel had many prophets throughout their history, and the greatest prophet of all was now preaching to them, yet they refused to listen.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For they all repented when they heard the preaching of Jonah, but you refuse to repent. Yet there is one greater than Jonah who is preaching to you today.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revelation-Light
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one would think of lighting a lamp and then hiding it in the basement where no one would benefit. A lamp belongs on a lampstand, where all who enter may see its light.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The eyes of your spirit allow revelation-light
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The teachings of Jesus are the “revelation-light” referred to here.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to enter into your being. When your heart is open the light floods in.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The eye is like a lamp to your body.” The literal Greek text reads “Your eye is the lamp of your body. If your eye is healthy, your whole body is full of light; but if it is sick, your body is full of darkness.” The eye becomes a metaphor for spiritual perception. The body is our spirit. The lamp is Jesus’ teachings. The darkness is formed by the lies and opinions that blind us. These metaphors have been made explicit.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when your heart is hard and closed, the light cannot penetrate and darkness takes its place.
    - type: text
      text: ' '
