document_id: LUK.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Teaches about Prayer
  - type: text
    content: 'One day, as Jesus was in prayer, one of his disciples came over to him as he finished and said, “Would you teach us a '
  - type: text
    content: model prayer
  - type: text
    content: ' that we can pray, just as John did for his disciples?”'
  '11':
  - type: text
    content: '“Let me ask you this: Do you know of any father who would give his son a snake on a plate when he asked for a serving of fish?'
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts substitute the word “fish” with “loaf” (bread) and the word “snake” with “a stone.”
  - type: text
    content: Of course not!
  - type: text
    content: ' '
  '12':
  - type: text
    content: Do you know of any father who would give his daughter a spider when she had asked for an egg? Of course not!
  - type: text
    content: ' '
  '13':
  - type: text
    content: If imperfect parents know how to lovingly take care of their children and give them what they need, how much more will the perfect heavenly Father give the Holy Spirit’s fullness when his children ask him.”
  - type: heading
    content: Jesus Responds to Controversy
  '14':
  - type: text
    content: 'One day a crowd gathered around Jesus, and among them was a man who was mute. Jesus drove out of the man the spirit that made him unable to speak. When the demon left him, the mute man’s tongue was loosed and immediately he was able to speak. The stunned crowd saw it all and marveled in amazement over this miracle! '
  '15':
  - type: text
    content: 'But there were some in the crowd who protested, saying, “He casts out demons by the power of Satan, '
  - type: note
    content: The word used here is Beelzelbul, which was an Aramaic word for “the prince of devils,” whom the Philistines worshiped. In Hebrew Beelzebub means “lord of the flies.”
  - type: text
    content: 'the demon king.” '
  '16':
  - type: text
    content: 'Others were skeptical and tried to persuade Jesus to perform a spectacular display of power '
  - type: text
    content: to prove that he was the Messiah
  - type: text
    content: .
  '17':
  - type: text
    content: 'Jesus, well aware of their every thought, said to them, '
  - type: text
    content: “Every kingdom that is split against itself is doomed to fail and will eventually collapse.
  - type: text
    content: ' '
  '18':
  - type: text
    content: If it is true that Satan casts out his own demons through me, how could his kingdom remain intact?
  - type: text
    content: ' '
  '19':
  - type: text
    content: If Satan gives me the power to cast out his demons, who is it that gives your exorcists
  - type: text
    content: ' '
  - type: note
    content: Literally “your sons,” which is a figure of speech for their followers.
  - type: text
    content: their power? Let them become your judges! Go, ask them, and they will tell you.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'So Jesus taught them this prayer: '
  - type: text
    content: “Our heavenly Father,
  - type: text
    content: ' '
  - type: note
    content: Some Greek manuscripts read simply “Father.” The Aramaic is Abba.
  - type: text
    content: may the glory of your name be the center on which our life turns.
  - type: text
    content: ' '
  - type: note
    content: An alternate reading of the Aramaic text. The Aramaic word for “name” is shema (or the Hebrew word, shem), a word with multiple meanings. It can also be translated as “light,” “sound,” or “atmosphere.” Placing a light in an enclosed space, like a lantern, magnifies that light. This is the meaning here of God’s name being made sacred and magnified as we focus our lives on him.
  - type: text
    content: May your Holy Spirit come upon us and cleanse us.
  - type: text
    content: ' '
  - type: note
    content: Translated from some of the earliest Greek manuscripts.
  - type: text
    content: Manifest your kingdom on earth.
  - type: text
    content: ' '
  '20':
  - type: text
    content: But if I am casting out demons by God’s mighty power,
  - type: text
    content: ' '
  - type: note
    content: The text literally states “in the finger of God,” a Hebrew phrase denoting God’s power. See Ex. 8:19; 31:18.
  - type: text
    content: God’s kingdom is now released upon you—
  - type: text
    content: but you still reject it
  - type: text
    content: '!'
  '21':
  - type: text
    content: “When a strong man, with many weapons, guards his palace, his possessions are safe.
  - type: text
    content: ' '
  '22':
  - type: text
    content: But when one stronger than he comes to attack and overpower him, the stronger one will empty the arsenal in which he trusted. The conqueror will ransack his kingdom and distribute all the spoils of victory.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Whoever is not on my side is against me, and whoever does not gather the spoils with me will be forever scattered.
  '24':
  - type: text
    content: “When a demon is cast out of a person, it goes to wander in a waterless realm, searching for rest. But finding no place to rest, it says, ‘I will go back and reoccupy the body I left.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: When it returns, it finds the person like a house swept clean and made tidy,
  - type: text
    content: ' '
  - type: text
    content: but empty.
  - type: text
    content: ' '
  - type: note
    content: Implied in the text is the truth that if a person is delivered from a demon but does not receive Christ and become filled with him, that individual’s condition can become even worse. True conversion fills a life with Christ and his Spirit.
  '26':
  - type: text
    content: Then it goes and enlists seven demons more evil than itself, and they all enter and possess the person, leaving that one in a much worse state than before.”
  - type: note
    content: Christ’s power is still available for all. Even Mary Magdalene had seven demons cast out of her. See Luke 8:2.
  '27':
  - type: text
    content: While he was saying all this, a woman shouted from the crowd, “God bless the one who gave you birth and nursed you as a child!”
  '28':
  - type: text
    content: “Yes,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “but God will bless all who listen to the word of God and carefully obey everything they hear.”
  - type: heading
    content: The Miracle Sign of Jonah the Prophet
  '29':
  - type: text
    content: 'As the crowds continued to swell, Jesus went on to say, '
  - type: text
    content: “How evil is this generation! When you demand a mighty display of power simply to prove who I am,
  - type: text
    content: ' '
  - type: text
    content: you demonstrate your unbelief
  - type: text
    content: . The only sign you will see will be a repeat of the miracle of Jonah.
  - type: text
    content: ' '
  '3':
  - type: text
    content: And give us our needed bread for the coming day.
  - type: text
    content: ' '
  - type: note
    content: This is more than asking for food, for Jesus has taught us not to worry about the needs of our body. It is the request for tomorrow’s living bread to come and feed us today.
  '30':
  - type: text
    content: In the same way Jonah became a sign to the people of Nineveh, so the Son of Man will be a sign to this generation.
  - type: note
    content: The Aramaic is “tribe.” See v. 31. The Ninevites were a different Semitic tribe from the Jews.
  '31':
  - type: text
    content: “The Queen of Sheba
  - type: text
    content: ' '
  - type: note
    content: Literally “the queen of the south.” See 1 Kings 10:1–13. Sheba is modern-day Yemen.
  - type: text
    content: will rise up on the day of judgment to accuse and condemn this generation
  - type: text
    content: ' '
  - type: text
    content: for its unbelief
  - type: text
    content: . She journeyed from a far and distant land just to listen to the wisdom of King Solomon. One greater than Solomon speaks with you today,
  - type: text
    content: ' '
  - type: text
    content: but you refuse to listen.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Yes, the people of Nineveh will also rise up on the day of judgment to accuse and condemn this generation.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “tribe.” The Ninevites were of Semitic origin, and although they were pagans, after the preaching of one prophet they converted. The people of Israel had many prophets throughout their history, and the greatest prophet of all was now preaching to them, yet they refused to listen.
  - type: text
    content: For they all repented when they heard the preaching of Jonah, but you refuse to repent. Yet there is one greater than Jonah who is preaching to you today.”
  - type: heading
    content: Revelation-Light
  '33':
  - type: text
    content: “No one would think of lighting a lamp and then hiding it in the basement where no one would benefit. A lamp belongs on a lampstand, where all who enter may see its light.
  - type: text
    content: ' '
  '34':
  - type: text
    content: The eyes of your spirit allow revelation-light
  - type: text
    content: ' '
  - type: note
    content: The teachings of Jesus are the “revelation-light” referred to here.
  - type: text
    content: to enter into your being. When your heart is open the light floods in.
  - type: text
    content: ' '
  - type: note
    content: Or “The eye is like a lamp to your body.” The literal Greek text reads “Your eye is the lamp of your body. If your eye is healthy, your whole body is full of light; but if it is sick, your body is full of darkness.” The eye becomes a metaphor for spiritual perception. The body is our spirit. The lamp is Jesus’ teachings. The darkness is formed by the lies and opinions that blind us. These metaphors have been made explicit.
  - type: text
    content: But when your heart is hard and closed, the light cannot penetrate and darkness takes its place.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Open your heart and consider my words. Watch out that you do not mistake your opinions for revelation-light!
  - type: text
    content: ' '
  '36':
  - type: text
    content: If your spirit burns with light, fully illuminated with no trace of darkness, you will be a shining lamp, reflecting rays of truth by the way you live.”
  - type: heading
    content: Jesus Warns Hypocrites
  '37':
  - type: text
    content: 'After Jesus finished saying these things, a Pharisee asked him to come for a meal at his home. When everyone had been seated at the table, the religious leader noticed that Jesus had not performed the cleansing ritual '
  - type: note
    content: This was not required by the law of Moses, but was a rule imposed by the Pharisees.
  - type: text
    content: before he began eating. He was shocked.
  '39':
  - type: text
    content: 'The Lord said, '
  - type: text
    content: “You Pharisees are like those who will wipe clean only the outside of a cup or bowl,
  - type: text
    content: ' '
  - type: text
    content: leaving the inside filthy.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Forgive our sins as we ourselves release forgiveness to those who have wronged us. And rescue us every time we face tribulations.”
  - type: note
    content: Or “Do not let us enter into ordeals.”
  '40':
  - type: text
    content: You are foolish to ignore the greed and wickedness within you! Shouldn’t the one who cleans the outside also clean the inside?
  - type: text
    content: ' '
  - type: note
    content: Translated from the Aramaic text.
  '41':
  - type: text
    content: If you free your heart of greed, show compassion and true generosity to the poor, you will have more than clean hands; you will be clean within.
  '42':
  - type: text
    content: “You Pharisees are hypocrites!
  - type: text
    content: ' '
  - type: text
    content: For you are obsessed with peripheral issues
  - type: text
    content: ', like paying meticulous tithes on the smallest herbs that grow in your gardens.'
  - type: text
    content: ' '
  - type: note
    content: Literally “You pay tithes even on mint and dill and every other garden herb.”
  - type: text
    content: 'Of course, these matters you should do, but when you unjustly cheat others, you ignore the most important duty of all: to walk in the love of God.'
  - type: text
    content: ' '
  - type: note
    content: See Micah 6:8.
  - type: text
    content: Readjust
  - type: text
    content: ' '
  - type: text
    content: your values and place first things first.
  '43':
  - type: text
    content: “You Pharisees are hypocrites! You love to be honored before others with titles of respect, seeking public recognition,
  - type: text
    content: ' '
  - type: note
    content: Literally “greeted with respect in the marketplaces.”
  - type: text
    content: aspiring to seem more important than others.
  - type: note
    content: The Aramaic text states, “You aspire to leadership of the synagogues.”
  '44':
  - type: text
    content: “You Pharisees, what hypocrites! Your true character is hidden, like an unmarked grave that hides the corruption inside, defiling all who come in contact with you.”
  - type: note
    content: A strictly religious Jew was forbidden to touch a dead body or walk over a grave. It was common to whitewash the grave so no one would walk on it and be ceremonially defiled. Jesus taught that people who followed the example of the Pharisees would become morally unclean.
  '45':
  - type: text
    content: Just then a specialist in interpreting religious law blurted out, “Teacher, don’t you realize that your words insult us?!”
  '46':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “You are also hypocrites, you experts of the law! You crush people beneath the burden of obeying impossible religious regulations, yet you would never even think of doing them yourselves.
  - type: text
    content: ' '
  - type: note
    content: The Greek text is literally “You compel men to carry burdens that you yourselves do not touch.”
  '47':
  - type: text
    content: What hypocrites! You build monuments to honor the prophets of old, yet it was your murdering ancestors who killed them.
  - type: text
    content: ' '
  - type: text
    content: The only prophet you’ll honor is a dead one!
  - type: text
    content: ' '
  '48':
  - type: text
    content: In fact, by erecting monuments to the prophets your ancestors killed, you demonstrate your agreement with those murderers and bear witness to their deeds.
  - type: text
    content: ' '
  - type: text
    content: You’re no better than they!
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'That is why God’s wisdom is proclaiming: ‘I will send to them apostles and prophets though some they will murder and others they will persecute.’'
  '5':
  - type: text
    content: 'Then Jesus gave this illustration: '
  - type: text
    content: “Imagine what would happen if you were to go to one of your friends in the middle of the night, pound on his door, and shout, ‘Please! Do you have some food you can spare?
  - type: text
    content: ' '
  '50':
  - type: text
    content: “God will hold this generation accountable for every drop of blood of every murdered prophet shed from the beginning of time until now,
  - type: text
    content: ' '
  '51':
  - type: text
    content: from the blood of Abel, who was killed by his brother, to the blood of Zechariah,
  - type: text
    content: ' '
  - type: note
    content: See 2 Chron. 24:21–22. Second Chronicles is the last book in the Hebrew order of the Old Testament. So the implied time frame is from Genesis throughout the period of the Old Testament.
  - type: text
    content: who was murdered in the middle of the temple court. Yes, I tell you, you will be responsible for it all.
  '52':
  - type: text
    content: “You are nothing but hypocrites, you experts of religion! You take away from others the key that opens the door to the house of knowledge. Not only do you lock the door and refuse to enter, but you also do your best to keep others from the truth.”
  '53':
  - type: text
    content: All that Jesus said enraged the religious leaders and experts of the law and they began to oppose him furiously. They harassed Jesus all the way out the door, spewing out their hostility, arguing over everything he said—wanting nothing more than to find a reason to entrap him with his own words.
  '6':
  - type: text
    content: A friend just arrived at my house unexpectedly and I have nothing to serve him.’
  - type: text
    content: ' '
  - type: note
    content: In the culture of the day, it was important to honor every guest and provide a meal when they arrived.
  '7':
  - type: text
    content: But your friend says, ‘Why are you bothering me? The door is locked and my family and I are all in bed. Do you expect me to get up and give you our food?’
  - type: text
    content: ' '
  '8':
  - type: text
    content: I tell you—because of your shameless persistence, even though it’s the middle of the night, your friend will get up out of his bed and give you all that you need.
  - type: text
    content: ' '
  '9':
  - type: text
    content: So it is with your prayers. Ask and you’ll receive. Seek and you’ll discover. Knock on heaven’s door, and it will one day open for you. Every persistent person will receive what he asks for. Every persistent seeker will discover what he needs. And everyone who knocks persistently will one day find an open door.
