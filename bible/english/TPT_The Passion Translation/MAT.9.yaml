document_id: MAT.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Forgiveness and Healing
  - type: text
    content: 'Jesus got into the boat and returned to what was considered his hometown, '
  - type: text
    content: Capernaum
  - type: text
    content: '. '
  - type: note
    content: Jesus had moved from Nazareth to Capernaum, a village of about 1200–1500 people. See Matt. 4:13; Mark 2:1.
  '10':
  - type: text
    content: Jesus went to Matthew’s house and made himself at home. Many other tax collectors and outcasts of society were invited to eat with Jesus and his disciples.
  '11':
  - type: text
    content: When those known as the Pharisees saw what was happening, they were indignant, and they kept asking Jesus’ disciples, “Why would your Master dine with such lowlifes?”
  - type: note
    content: Or “tax collectors and sinners.”
  '12':
  - type: text
    content: 'When Jesus overheard this, he spoke up and said, '
  - type: text
    content: “Healthy people don’t need to see a doctor, but the sick
  - type: text
    content: ' '
  - type: note
    content: The Hebrew word for “sick” can also mean “evil.”
  - type: text
    content: will go for treatment.”
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Then he added, '
  - type: text
    content: '“Now you should go and study the meaning of the verse:'
  - type: text
    content: I want you to show mercy, not just offer me a sacrifice.
  - type: note
    content: See Hos. 6:6; Matt. 23:23; Mark 12:33. To “offer a sacrifice” would be a metaphor for placing strict obedience to the law over the triumph of mercy’s kiss in our dealings with others. Sadly, many religious people today read this as “I desire religious exactness, not mercy.” Transforming ministry shows unmerited mercy to the “sick.”
  - type: text
    content: For I have come to invite the outcasts of society and sinners, not those who think they are already on the right path.”
  - type: note
    content: The obvious implication Jesus is making is that all are sinners who need to come to him for salvation. See 1 Tim. 1:15.
  - type: heading
    content: Jesus Brings a New Reality
  '14':
  - type: text
    content: 'The disciples of John the Baptizer approached Jesus with this question: “Why is it that we and the Pharisees fast regularly, but not your disciples?”'
  '15':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “How can the sons of the bridal chamber
  - type: text
    content: ' '
  - type: note
    content: See Song. 1:4. These sons of the bridal chamber are “Shulamites,” lovers of God.
  - type: text
    content: grieve when the Bridegroom is next to them? But the days of fasting will come when the Bridegroom is taken away from them.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And who would mend worn-out clothing with new fabric? When the new cloth shrinks it will rip, making the hole worse than before.
  - type: text
    content: ' '
  '17':
  - type: text
    content: And who would pour fresh, new wine into an old wineskin? Eventually the wine will ferment
  - type: text
    content: ' '
  - type: note
    content: The teaching of Jesus was the new wine. It was something fresh—a sign that the old was passing away. It could not be mixed with the old religion but involved the inauguration and birth of the kingdom of God.
  - type: text
    content: and make the wineskin burst, losing everything—the wine is spilled and the wineskin ruined. Instead, new wine is always poured into a new wineskin so that both are preserved.”
  - type: note
    content: The teaching of Jesus is the new wine and the new cloth. What Jesus taught cannot patch up the old religious system, nor can it be contained in a wineskin of worn-out traditions. It is new, exhilarating, and powerful. It must be poured into a heart made new. The new and the old are not meant to be together. Jesus makes all things new. He didn’t come to reform Judaism, but to form a twice-born company of people.
  - type: heading
    content: Jesus Heals and Raises the Dead
  '18':
  - type: text
    content: 'While Jesus was still speaking, an influential Jewish leader '
  - type: note
    content: This was Jairus, who was the leader of the Jewish synagogue and possibly even a member of the Sanhedrin. See Mark 5:21–23; Luke 8:40–42. The interwoven miracles of the daughter being raised from the dead and the woman being healed symbolize Israel and the church. Israel is the “dead daughter” that Jesus will soon raise to new life. On his way to raise her from the dead, he encountered a woman and healed her. The church is the healed woman. The girl, according to Jesus, was only “sleeping.” He will come back to Israel, but on his way, he will heal the woman who touched him by faith. Jesus touched the girl, and the woman touched Jesus. The girl lived twelve years, then died. The woman had been dying twelve years, and then she lived.
  - type: text
    content: 'approached and knelt before him, saying, “Help me! My daughter has just died. Please come and place your hand upon her so that she will live again.” '
  '19':
  - type: text
    content: So Jesus and his disciples got up and went with him.
  '2':
  - type: text
    content: 'Just then some people brought a paraplegic man to him, lying on a sleeping mat. When Jesus perceived the strong faith within their hearts, he said to the paralyzed man, '
  - type: text
    content: “My son, be encouraged, for your sins have been forgiven.”
  - type: note
    content: The Hebrew Matthew reads, “By the faith of the Mighty One your sins are forgiven.” See also Ps. 103:3.
  '20':
  - type: text
    content: 'Suddenly, a woman came from behind Jesus and touched the tassel of his prayer shawl '
  - type: text
    content: for healing
  - type: text
    content: '. '
  - type: note
    content: Or “for salvation.” The blue tassel on the corner of the prayer shawl was said to symbolize all commandments and promises of God. See Num. 15:38–40. The Hebrew word for “fringe” or “border” (of a garment) can also mean “wing.” Some have interpreted Mal. 4:2 (“healing in his wings”) as a reference to the tassels of the prayer shawl.
  - type: text
    content: 'She had been suffering from continual bleeding for twelve years, '
  - type: text
    content: but had faith that Jesus could heal her
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'For she kept saying to herself, “If I could only touch his prayer shawl '
  - type: note
    content: Or “the fringe of his garment.” See Num. 15:38, 39; Deut. 22:12; Matt. 14:36; 23:5.
  - type: text
    content: I would be healed.”
  '22':
  - type: text
    content: 'Just then Jesus turned around and looked at her and said, '
  - type: text
    content: “My daughter, be encouraged. Your faith has healed you.”
  - type: text
    content: ' '
  - type: note
    content: Or “saved you.”
  - type: text
    content: And instantly she was healed!
  '23':
  - type: text
    content: 'When Jesus finally entered the home of the Jewish leader, he saw a noisy crowd of mourners, wailing and playing a funeral dirge on their flutes. '
  '24':
  - type: text
    content: 'He told them, '
  - type: text
    content: “You must leave, for the little girl is not dead; she’s only asleep.”
  - type: text
    content: ' Then everyone began to ridicule him.'
  '25':
  - type: text
    content: 'After he made the crowd go outside, he went into the girl’s room and gently took hold of her hand. She immediately stood to her feet! '
  '26':
  - type: text
    content: And the news of this incredible miracle spread everywhere.
  - type: heading
    content: Jesus Opens Blind Eyes
  '27':
  - type: text
    content: 'As Jesus left the house, two blind men began following him, shouting out over and over, “Son of David, '
  - type: note
    content: This phrase is an obvious messianic term. The blind men are hoping that Jesus is the Messiah who will come and restore sight to the blind. See Isa. 29:18; 35:5–6; 42:7. Other than the wise men at Jesus’ birth, these two blind men were the first to recognize Jesus as King.
  - type: text
    content: 'show us mercy and heal us!” '
  '28':
  - type: text
    content: 'And they followed him right into the house where Jesus was staying. '
  - type: note
    content: This was most likely in Capernaum.
  - type: text
    content: 'So Jesus asked them, '
  - type: text
    content: “Do you believe that I have the power to restore sight to your eyes?”
  - type: text
    content: They replied, “Yes Lord, we believe!”
  '29':
  - type: text
    content: 'Then Jesus put his hands over their eyes and said, '
  - type: text
    content: “You will have what your faith expects!”
  - type: text
    content: ' '
  '3':
  - type: text
    content: These words prompted some of the religious scholars to think, “Why, that’s nothing but blasphemy!”
  '30':
  - type: text
    content: 'And instantly their eyes opened—they could see! Then Jesus warned them sternly, '
  - type: text
    content: “Make sure that you tell no one what just happened!”
  - type: text
    content: ' '
  '31':
  - type: text
    content: But unable to contain themselves, they went out and spread the news everywhere!
  - type: heading
    content: Jesus Heals the Mute
  '32':
  - type: text
    content: 'While they were leaving, some people brought before Jesus a demonized man who couldn’t speak. '
  '33':
  - type: text
    content: 'Jesus cast the demon out of him, and immediately the man began to speak '
  - type: text
    content: plainly
  - type: text
    content: '. The crowds marveled in astonishment, saying, “We’ve never seen miracles like this in Israel!” '
  - type: note
    content: Matt. 8 and 9 give us ten miracles that Jesus performed as signs to prove that he is the Messiah. Five are found in each chapter. In ch. 8 we find the leper healed, the military captain’s son healed, Simon’s mother-in-law healed, the raging storm stilled, and two demon-possessed men set free. In ch. 9 we find the paraplegic man healed, the woman with constant bleeding healed, Jairus’ daughter raised from the dead, two blind men given sight, and the demonized mute man set free and healed. These signs demonstrated Jesus’ authority and power over sickness, storms, Satan, and death.
  '34':
  - type: text
    content: But the Pharisees kept saying, “The chief of demons is helping him drive out demons.”
  - type: heading
    content: Workers for the Harvest
  '35':
  - type: text
    content: 'Jesus walked throughout the region '
  - type: note
    content: Or “in all the towns and villages.”
  - type: text
    content: with the joyful message of God’s kingdom realm. He taught in their meeting houses, and wherever he went he demonstrated God’s power by healing every kind of disease and illness.
  '36':
  - type: text
    content: 'When he saw the vast crowds of people, Jesus’ heart was deeply moved with compassion, because they seemed weary and helpless, like wandering sheep without a shepherd. '
  '37':
  - type: text
    content: 'He turned to his disciples and said, '
  - type: text
    content: “The harvest is huge and ripe! But there are not enough harvesters to bring it all in.
  - type: text
    content: ' '
  '38':
  - type: text
    content: As you go, plead with the Owner of the Harvest to thrust out
  - type: text
    content: ' '
  - type: note
    content: The Greek word ekballo is used many times in the Gospels for driving out or casting out demons. The Lord of the Harvest must cast the laborers out into the harvest fields.
  - type: text
    content: many more reapers to harvest his grain!”
  '4':
  - type: text
    content: 'Jesus supernaturally perceived their thoughts, and said to them, '
  - type: text
    content: “Why do you carry such evil in your hearts?
  - type: text
    content: ' '
  '5':
  - type: text
    content: Which is easier to say, ‘Your sins are forgiven,’ or, ‘Stand up and walk!’?
  - type: text
    content: ' '
  - type: note
    content: It is easy for anyone to say, “Your sins are forgiven,” for that cannot be proven. But if someone were to tell a paralyzed man to stand up, and he didn’t stand up, that would prove the person is a fraud. Jesus didn’t do the “easy thing” without accomplishing the hard thing, the miracle of healing. Forgiveness and healing both flow from Jesus Christ.
  '6':
  - type: text
    content: But now, to convince you that the Son of Man has been given authority to forgive sins, I say to this man, ‘Stand up, pick up your mat, and walk home.’ ”
  - type: text
    content: ' '
  '7':
  - type: text
    content: Immediately the man sprang to his feet and left for home.
  '8':
  - type: text
    content: 'When the crowds witnessed this miracle, they were awestruck. '
  - type: note
    content: The Aramaic word used here can mean either “awestruck/marveled,” or “seized with fear.” This may explain the variation within Greek manuscripts.
  - type: text
    content: They shouted praises to God because he had given such authority to human beings.
  - type: note
    content: See Mark 2:3–12; Luke 5:18–26.
  - type: heading
    content: Jesus Calls Matthew to Follow Him
  '9':
  - type: text
    content: As Jesus left Capernaum he came upon a tax-collecting station, where a Jewish man named Matthew was collecting taxes for the Romans.
  - type: note
    content: Or “sitting at his tax-collecting booth.” Matthew means “gift of God.” He was also known as Levi, which means “joined.” It is possible that he took the name Matthew after becoming a believer.
  - type: text
    content: “Come, follow me,”
  - type: text
    content: ' Jesus said to him. Immediately Matthew jumped up and began to follow Jesus.'
