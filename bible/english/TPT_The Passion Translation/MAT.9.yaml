  - type: text
    text: Forgiveness and Healing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus got into the boat and returned to what was considered his hometown, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Capernaum
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus had moved from Nazareth to Capernaum, a village of about 1200–1500 people. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 4:13
      metadata:
        usfm: MAT.4.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 2:1
      metadata:
        usfm: MRK.2.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Just then some people brought a paraplegic man to him, lying on a sleeping mat. When Jesus perceived the strong faith within their hearts, he said to the paralyzed man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My son, be encouraged, for your sins have been forgiven.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew reads, “By the faith of the Mighty One your sins are forgiven.” See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 103:3
      metadata:
        usfm: PSA.103.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: These words prompted some of the religious scholars to think, “Why, that’s nothing but blasphemy!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus supernaturally perceived their thoughts, and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why do you carry such evil in your hearts?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Which is easier to say, ‘Your sins are forgiven,’ or, ‘Stand up and walk!’?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is easy for anyone to say, “Your sins are forgiven,” for that cannot be proven. But if someone were to tell a paralyzed man to stand up, and he didn’t stand up, that would prove the person is a fraud. Jesus didn’t do the “easy thing” without accomplishing the hard thing, the miracle of healing. Forgiveness and healing both flow from Jesus Christ.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But now, to convince you that the Son of Man has been given authority to forgive sins, I say to this man, ‘Stand up, pick up your mat, and walk home.’ ”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Immediately the man sprang to his feet and left for home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When the crowds witnessed this miracle, they were awestruck. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word used here can mean either “awestruck/marveled,” or “seized with fear.” This may explain the variation within Greek manuscripts.
    marker-yv: yv-n
  - type: text
    text: They shouted praises to God because he had given such authority to human beings.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 2:3–12
      metadata:
        usfm: MRK.2.3+MRK.2.4+MRK.2.5+MRK.2.6+MRK.2.7+MRK.2.8+MRK.2.9+MRK.2.10+MRK.2.11+MRK.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 5:18–26
      metadata:
        usfm: LUK.5.18+LUK.5.19+LUK.5.20+LUK.5.21+LUK.5.22+LUK.5.23+LUK.5.24+LUK.5.25+LUK.5.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Matthew to Follow Him
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: As Jesus left Capernaum he came upon a tax-collecting station, where a Jewish man named Matthew was collecting taxes for the Romans.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sitting at his tax-collecting booth.” Matthew means “gift of God.” He was also known as Levi, which means “joined.” It is possible that he took the name Matthew after becoming a believer.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come, follow me,”
  - type: text
    text: ' Jesus said to him. Immediately Matthew jumped up and began to follow Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jesus went to Matthew’s house and made himself at home. Many other tax collectors and outcasts of society were invited to eat with Jesus and his disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: When those known as the Pharisees saw what was happening, they were indignant, and they kept asking Jesus’ disciples, “Why would your Master dine with such lowlifes?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “tax collectors and sinners.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Jesus overheard this, he spoke up and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Healthy people don’t need to see a doctor, but the sick
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “sick” can also mean “evil.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will go for treatment.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he added, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Now you should go and study the meaning of the verse:'
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I want you to show mercy, not just offer me a sacrifice.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 6:6
      metadata:
        usfm: HOS.6.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 23:23
      metadata:
        usfm: MAT.23.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 12:33
      metadata:
        usfm: MRK.12.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . To “offer a sacrifice” would be a metaphor for placing strict obedience to the law over the triumph of mercy’s kiss in our dealings with others. Sadly, many religious people today read this as “I desire religious exactness, not mercy.” Transforming ministry shows unmerited mercy to the “sick.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For I have come to invite the outcasts of society and sinners, not those who think they are already on the right path.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The obvious implication Jesus is making is that all are sinners who need to come to him for salvation. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Tim. 1:15
      metadata:
        usfm: 1TI.1.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Brings a New Reality
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The disciples of John the Baptizer approached Jesus with this question: “Why is it that we and the Pharisees fast regularly, but not your disciples?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can the sons of the bridal chamber
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 1:4
      metadata:
        usfm: SNG.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . These sons of the bridal chamber are “Shulamites,” lovers of God.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: grieve when the Bridegroom is next to them? But the days of fasting will come when the Bridegroom is taken away from them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And who would mend worn-out clothing with new fabric? When the new cloth shrinks it will rip, making the hole worse than before.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And who would pour fresh, new wine into an old wineskin? Eventually the wine will ferment
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The teaching of Jesus was the new wine. It was something fresh—a sign that the old was passing away. It could not be mixed with the old religion but involved the inauguration and birth of the kingdom of God.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and make the wineskin burst, losing everything—the wine is spilled and the wineskin ruined. Instead, new wine is always poured into a new wineskin so that both are preserved.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The teaching of Jesus is the new wine and the new cloth. What Jesus taught cannot patch up the old religious system, nor can it be contained in a wineskin of worn-out traditions. It is new, exhilarating, and powerful. It must be poured into a heart made new. The new and the old are not meant to be together. Jesus makes all things new. He didn’t come to reform Judaism, but to form a twice-born company of people.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals and Raises the Dead
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'While Jesus was still speaking, an influential Jewish leader '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was Jairus, who was the leader of the Jewish synagogue and possibly even a member of the Sanhedrin. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 5:21–23
      metadata:
        usfm: MRK.5.21+MRK.5.22+MRK.5.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 8:40–42
      metadata:
        usfm: LUK.8.40+LUK.8.41+LUK.8.42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The interwoven miracles of the daughter being raised from the dead and the woman being healed symbolize Israel and the church. Israel is the “dead daughter” that Jesus will soon raise to new life. On his way to raise her from the dead, he encountered a woman and healed her. The church is the healed woman. The girl, according to Jesus, was only “sleeping.” He will come back to Israel, but on his way, he will heal the woman who touched him by faith. Jesus touched the girl, and the woman touched Jesus. The girl lived twelve years, then died. The woman had been dying twelve years, and then she lived.
    marker-yv: yv-n
  - type: text
    text: 'approached and knelt before him, saying, “Help me! My daughter has just died. Please come and place your hand upon her so that she will live again.” '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So Jesus and his disciples got up and went with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Suddenly, a woman came from behind Jesus and touched the tassel of his prayer shawl '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for healing
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “for salvation.” The blue tassel on the corner of the prayer shawl was said to symbolize all commandments and promises of God. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 15:38–40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Hebrew word for “fringe” or “border” (of a garment) can also mean “wing.” Some have interpreted
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 4:2
      metadata:
        usfm: MAL.4.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (“healing in his wings”) as a reference to the tassels of the prayer shawl.
    marker-yv: yv-n
  - type: text
    text: 'She had been suffering from continual bleeding for twelve years, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but had faith that Jesus could heal her
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For she kept saying to herself, “If I could only touch his prayer shawl '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the fringe of his garment.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
