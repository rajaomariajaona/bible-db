document_id: GEN.36,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Descendants of Esau
  - type: text
    content: 'Here are the descendants of Esau, also known as Edom:'
  '10':
  - type: text
    content: 'Esau’s wife Adah bore him one son Eliphaz, and Eliphaz had five sons: Teman, Omar, Zepho, Gatam, and Kenaz. Eliphaz also had a son with his concubine Timna, named Amelek.'
  - type: text
    content: 'Esau’s wife Basemath bore him one son Reuel, and Reuel had four sons: Nahath, Zerah, Shammah, and Mizzah.'
  '14':
  - type: text
    content: 'Esau’s wife Oholibamah, the daughter of Anah and granddaughter of Zibeon, bore Esau three sons: Jeush, Jalam, and Korah.'
  '15':
  - type: text
    content: 'These are the tribes '
  - type: note
    content: Or “clans” or “chiefs,” a Hebrew word related to “thousand.”
  - type: text
    content: 'descended from Esau’s firstborn son Eliphaz whom Adah bore, and who lived in Edom: Teman, Omar, Zepho, Kenaz, Korah, Gatam, and Amalek.'
  '17':
  - type: text
    content: 'These are the tribes descended from Esau and Basemath’s son Reuel, who lived in Edom: Nahath, Zerah, Shammah, and Mizzah.'
  '18':
  - type: text
    content: 'These are the tribes descended from Esau’s wife Oholibamah, the daughter of Anah: Jeush, Jalam, and Korah. '
  '19':
  - type: text
    content: This concludes the list of the descendants of Esau (also known as Edom) and their respective tribes.
  - type: heading
    content: The Descendants of Seir
  '2':
  - type: text
    content: 'Esau chose three wives from among Canaanite women: Adah (daughter of Elon the Hittite), Oholibamah '
  - type: note
    content: Oholibamah means “a [cultic] tent-shrine.”
  - type: text
    content: '(daughter of Anah son of Zibeon the Hivite '
  - type: note
    content: Or “Horite” (see vv. 20–21).
  - type: text
    content: ), and Basemath (Ishmael’s daughter, sister of Nebaioth).
  '20':
  - type: text
    content: 'These are the tribes descended from Seir the Horite, of the original inhabitants of Edom: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan. All of these were the descendants of Seir.'
  '22':
  - type: text
    content: Lotan’s sons were Hori and Heman, and Lotan’s sister was Timna.
  '23':
  - type: text
    content: Shobal’s sons were Alvan, Manahath, Ebal, Shepho, and Onam.
  '24':
  - type: text
    content: Zibeon’s sons were Aiah and Anah. This is the Anah who discovered the springs in the wilderness while he was grazing the donkeys of his father Zibeon.
  '25':
  - type: text
    content: Anah’s son was Dishon, and Anah’s daughter was Oholibamah.
  '26':
  - type: text
    content: Dishon’s sons were Hemdan, Eshban, Ithran, and Keran.
  '27':
  - type: text
    content: Ezer’s sons were Bilhan, Zaavan, and Akan.
  '28':
  - type: text
    content: 'Dishan’s sons were Uz and Aran. '
  '29':
  - type: text
    content: 'This concludes the list of the Horite tribes in the land of Seir: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan.'
  - type: heading
    content: The Kings of Edom
  '31':
  - type: text
    content: 'Long before the Israelites had kings, there were '
  - type: text
    content: eight
  - type: text
    content: ' kings who reigned in Edom, '
  '32':
  - type: text
    content: 'beginning with Bela '
  - type: note
    content: Some etymologists link Bela to Balaam, whose father was Beor. Bela means “swallowing up” or “gluttony.”
  - type: text
    content: 'son of Beor '
  - type: note
    content: Beor means “stupid,” “dull-hearted,” “unreceptive,” “cruel,” “inhuman,” or “barbarous.”
  - type: text
    content: 'from the city of Dinhabah. '
  - type: note
    content: Dinhabah means “given over to judgment.”
  '33':
  - type: text
    content: 'When Bela died, Jobab '
  - type: note
    content: There is an ancient Jewish tradition that equates Jobab with the biblical figure of Job.
  - type: text
    content: 'son of Zerah from '
  - type: text
    content: the city of
  - type: text
    content: ' Bozrah '
  - type: note
    content: Bozrah is identified as modern Buseirah. See Isa. 63:1; Amos 1:12.
  - type: text
    content: succeeded.
  '34':
  - type: text
    content: When Jobab died, Husham from the land of Teman succeeded him.
  '35':
  - type: text
    content: When Husham died, Hadad from the city of Avith, who was the son of Bedad, succeeded him. Hadad defeated the Midianites in the land of Moab.
  '36':
  - type: text
    content: When Hadad died, Samlah of Masrekah succeeded him.
  '37':
  - type: text
    content: 'When Samlah died, Shaul of Rehoboth-on-the-River '
  - type: note
    content: This river is possibly Wadi el-Hesa, which formed the boundary of Edom and Moab, or possibly the Euphrates.
  - type: text
    content: succeeded him.
  '38':
  - type: text
    content: When Shaul died, Baal-Hanan son of Achbor succeeded him.
  '39':
  - type: text
    content: 'When Baal-Hanan son of Achbor died, Hadar '
  - type: note
    content: Or “Hadad.”
  - type: text
    content: from the city of Pau succeeded him. (His wife was Mehetabel the daughter of Matred, Me-Zahab’s granddaughter.)
  '4':
  - type: text
    content: 'Adah bore Eliphaz to Esau; Basemath bore Reuel; '
  '40':
  - type: text
    content: 'These are the tribes of Esau according to their clans and regions: Timna, Alvah, Jetheth, Oholibamah, Elah, Pinon, Kenaz, Teman, Mibzar, '
  '43':
  - type: text
    content: Magdiel, and Iram. This concludes the list of the Edomite tribes who settled and possessed land in different regions of their country. All the Edomites descended from Esau.
  '5':
  - type: text
    content: and Oholibamah bore Jeush, Jalam, and Korah. These are the sons who were born to Esau in the land of Canaan.
  '6':
  - type: text
    content: 'Esau took his wives, his sons, his daughters, and his entire household, and the cattle, livestock, and possessions he had acquired in the land of Canaan, and migrated to the land of Seir '
  - type: note
    content: As translated from the Syriac and explicitly stated in v. 8. The Hebrew is “to a land.” The Septuagint is “from the land of Canaan.” See Deut. 2:5; Josh. 24:4.
  - type: text
    content: 'some distance from his brother Jacob. '
  '7':
  - type: text
    content: 'Since the land where Jacob was living could not support their combined possessions and livestock, '
  '8':
  - type: text
    content: Esau (also known as Edom), settled in the hill country of Seir.
  '9':
  - type: text
    content: 'This is the account of Esau, ancestor of the Edomites in the hill country of Seir:'
