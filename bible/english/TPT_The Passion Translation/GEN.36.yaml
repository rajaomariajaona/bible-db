document_id: GEN.36
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Descendants of Esau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Here are the descendants of Esau, also known as Edom:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: 'Esau chose three wives from among Canaanite women: Adah (daughter of Elon the Hittite), Oholibamah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:2–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Oholibamah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “a [cultic] tent-shrine.”
    marker-yv: yv-n
  - type: text
    text: '(daughter of Anah son of Zibeon the Hivite '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:2–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Horite” (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20–21
      metadata:
        usfm: GEN.36.20+GEN.36.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ), and Basemath (Ishmael’s daughter, sister of Nebaioth).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Adah bore Eliphaz to Esau; Basemath bore Reuel; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: and Oholibamah bore Jeush, Jalam, and Korah. These are the sons who were born to Esau in the land of Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esau took his wives, his sons, his daughters, and his entire household, and the cattle, livestock, and possessions he had acquired in the land of Canaan, and migrated to the land of Seir '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Syriac and explicitly stated in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: GEN.36.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Hebrew is “to a land.” The Septuagint is “from the land of Canaan.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 24:4
      metadata:
        usfm: JOS.24.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'some distance from his brother Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Since the land where Jacob was living could not support their combined possessions and livestock, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Esau (also known as Edom), settled in the hill country of Seir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'This is the account of Esau, ancestor of the Edomites in the hill country of Seir:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-13
  - type: text
    text: 'Esau’s wife Adah bore him one son Eliphaz, and Eliphaz had five sons: Teman, Omar, Zepho, Gatam, and Kenaz. Eliphaz also had a son with his concubine Timna, named Amelek.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Esau’s wife Basemath bore him one son Reuel, and Reuel had four sons: Nahath, Zerah, Shammah, and Mizzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Esau’s wife Oholibamah, the daughter of Anah and granddaughter of Zibeon, bore Esau three sons: Jeush, Jalam, and Korah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'These are the tribes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:15–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “clans” or “chiefs,” a Hebrew word related to “thousand.”
    marker-yv: yv-n
  - type: text
    text: 'descended from Esau’s firstborn son Eliphaz whom Adah bore, and who lived in Edom: Teman, Omar, Zepho, Kenaz, Korah, Gatam, and Amalek.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'These are the tribes descended from Esau and Basemath’s son Reuel, who lived in Edom: Nahath, Zerah, Shammah, and Mizzah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'These are the tribes descended from Esau’s wife Oholibamah, the daughter of Anah: Jeush, Jalam, and Korah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: This concludes the list of the descendants of Esau (also known as Edom) and their respective tribes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Descendants of Seir
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'These are the tribes descended from Seir the Horite, of the original inhabitants of Edom: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan. All of these were the descendants of Seir.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Lotan’s sons were Hori and Heman, and Lotan’s sister was Timna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Shobal’s sons were Alvan, Manahath, Ebal, Shepho, and Onam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Zibeon’s sons were Aiah and Anah. This is the Anah who discovered the springs in the wilderness while he was grazing the donkeys of his father Zibeon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Anah’s son was Dishon, and Anah’s daughter was Oholibamah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dishon’s sons were Hemdan, Eshban, Ithran, and Keran.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ezer’s sons were Bilhan, Zaavan, and Akan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dishan’s sons were Uz and Aran. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'This concludes the list of the Horite tribes in the land of Seir: Lotan, Shobal, Zibeon, Anah, Dishon, Ezer, and Dishan.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Kings of Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Long before the Israelites had kings, there were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: eight
  - type: text
    text: ' kings who reigned in Edom, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'beginning with Bela '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some etymologists link Bela to Balaam, whose father was Beor.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Bela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “swallowing up” or “gluttony.”
    marker-yv: yv-n
  - type: text
    text: 'son of Beor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Beor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “stupid,” “dull-hearted,” “unreceptive,” “cruel,” “inhuman,” or “barbarous.”
    marker-yv: yv-n
  - type: text
    text: 'from the city of Dinhabah. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dinhabah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “given over to judgment.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When Bela died, Jobab '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an ancient Jewish tradition that equates Jobab with the biblical figure of Job.
    marker-yv: yv-n
  - type: text
    text: 'son of Zerah from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the city of
  - type: text
    text: ' Bozrah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Bozrah is identified as modern Buseirah. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 63:1
      metadata:
        usfm: ISA.63.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 1:12
      metadata:
        usfm: AMO.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: succeeded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: When Jobab died, Husham from the land of Teman succeeded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: When Husham died, Hadad from the city of Avith, who was the son of Bedad, succeeded him. Hadad defeated the Midianites in the land of Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When Hadad died, Samlah of Masrekah succeeded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'When Samlah died, Shaul of Rehoboth-on-the-River '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This river is possibly Wadi el-Hesa, which formed the boundary of Edom and Moab, or possibly the Euphrates.
    marker-yv: yv-n
  - type: text
    text: succeeded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: When Shaul died, Baal-Hanan son of Achbor succeeded him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'When Baal-Hanan son of Achbor died, Hadar '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 36:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Hadad.”
    marker-yv: yv-n
  - type: text
    text: from the city of Pau succeeded him. (His wife was Mehetabel the daughter of Matred, Me-Zahab’s granddaughter.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 40-42
  - type: text
    text: 'These are the tribes of Esau according to their clans and regions: Timna, Alvah, Jetheth, Oholibamah, Elah, Pinon, Kenaz, Teman, Mibzar, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Magdiel, and Iram. This concludes the list of the Edomite tribes who settled and possessed land in different regions of their country. All the Edomites descended from Esau.
