document_id: 1TI.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instruct every employee '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those under the yoke of performance” (servitude or slavery). The Greek text clearly refers to slaves and masters, but the Aramaic is somewhat ambiguous and could still be referring to the topic of ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . “Those” would refer to the leadership of the church instead—pastors, deacons, and deaconesses.
      marker-yv: yv-n
    - type: text
      text: 'to respect and honor their employers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “masters,” also in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'for this attitude presents to them a clear testimony of God’s truth and renown. Tell them to never provide them with a reason to discredit God’s name because of their actions. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Loving money '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “insatiable greed for money.”
      marker-yv: yv-n
    - type: text
      text: is a root of all evils. Some people run after it so much that they have given up their faith. Craving more money pushes them away from the faith into error, compounding misery in their lives!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Final Exhortation to Timothy
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Timothy, you are God’s man, so run from all these errors. Instead, chase after true holiness, justice, faithfulness, love, hope, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “patience.”
      marker-yv: yv-n
    - type: text
      text: 'and tender humility. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So fight with faith for the winner’s prize! Lay your hands upon eternal life, to which you were called and about which you made the good confession before the multitude of witnesses!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now, I instruct you before the God of resurrection life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the God who resurrects all.”
      marker-yv: yv-n
    - type: text
      text: 'and before Jesus, the Anointed One, who demonstrated a beautiful testimony even before Pontius Pilate, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'that you follow this commission faithfully with a clear conscience '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “without defilement.”
      marker-yv: yv-n
    - type: text
      text: and without blemish until the appearing of our Lord Jesus Christ.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yes, God will make his appearing in his own divine timing, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By implication, the second coming of Jesus.
      marker-yv: yv-n
    - type: text
      text: 'for he is the exalted God, the only powerful One, the King over every king, and the Lord of power! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He alone is the immortal God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “incorruptible God.”
      marker-yv: yv-n
    - type: text
      text: living in the unapproachable light of divine glory! No one has ever seen his fullness, nor can they, for all the glory and endless authority of the universe belongs to him, forever and ever. Amen!
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To all the rich of this world, I command you not to be wrapped in thoughts of pride over your prosperity, or rely on your wealth, for your riches are unreliable and nothing compared to the living God. Trust instead in the one who lavishes upon us all good things, fulfilling our every need.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “pleasure.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remind the wealthy to be rich in remarkable works of extravagant generosity, willing to share with others. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These spiritual investments will provide a beautiful foundation for their lives and secure for them a great future, as they lay their hands upon the meaning of true life.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Especially honor and respect employers who are believers and don’t despise them, but serve them even more, for they are fellow believers. They should be at peace with them as beloved members of God’s family. Be faithful to teach them these things as their sacred obligation.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Teachers and True Riches
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, my son Timothy, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses an endearing variation of Timothy’s name; it could almost be read “Oh Timmy.” This translation includes the words,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: my son
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', to make this explicit.'
      marker-yv: yv-n
    - type: text
      text: 'don’t forget all that has been deposited within you. Escape from the empty echoes of men '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an Aramaic figure of speech that means literally “daughters of the voice [echoes] of vanity.” The Greek text reads “profane and vain babblings.”
      marker-yv: yv-n
    - type: text
      text: 'and the perversion of twisted reasoning. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic, which also means, “false doctrines.” The Greek is “false [so-called] science.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For those who claim to possess this so-called knowledge have already wandered from the true faith.
  - type: usfm
    marker: p
    children:
    - type: text
      text: May God’s grace empower you always!
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Love in Christ
    - type: text
      text: ','
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if anyone spreads false teaching that does not agree with the healthy instruction of our Lord Jesus, teaching others that holy awe of God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic here and in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: literally means “the doctrine of the fear of God.” The fear of God is one of the seven spirits of God, the spirit of the fear of God (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). To teach there is no fear of God would be leading people away from the Holy Spirit. The fear of God is more than simply loving and respecting God. There are over one hundred references in both the Old and New Testaments that speak of “the fear of God.”
      marker-yv: yv-n
    - type: text
      text: 'is not important, then they prove they know nothing at all! It’s obvious they don’t value or hold dear the healing words of our Lord Jesus Christ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are covered with the clouds of conceit. They are loaded '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “sick with controversy.”
      marker-yv: yv-n
    - type: text
      text: with controversy, and they love to argue their opinions and split hairs. The fruit of their ministry is contention, competition, and evil suspicions.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They add misery to many lives by corrupting their minds and cheating them of the truth. They equate the worship of God with making great sums of money.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to be godly is the way to get rich.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We have a “profit” that is greater than theirs—our holy awe of God! To have merely our necessities is to have enough.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isn’t it true that our hands were empty when we came into the world, and when we leave this world our hands will be empty again?
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because of this, food and clothing is enough to make us content.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But those who crave the wealth of this world slip into spiritual snares. They become trapped by the troubles that come through their foolish and harmful desires, driven by greed and drowning in their own sinful pleasures. And they take others down with them into their corruption and eventual destruction.
