document_id: 1TI.6,1849
type_code: eng
verses:
  '1':
  - type: text
    content: 'Instruct every employee '
  - type: note
    content: Or “those under the yoke of performance” (servitude or slavery). The Greek text clearly refers to slaves and masters, but the Aramaic is somewhat ambiguous and could still be referring to the topic of ch. 5. “Those” would refer to the leadership of the church instead—pastors, deacons, and deaconesses.
  - type: text
    content: 'to respect and honor their employers, '
  - type: note
    content: Or “masters,” also in v. 2.
  - type: text
    content: 'for this attitude presents to them a clear testimony of God’s truth and renown. Tell them to never provide them with a reason to discredit God’s name because of their actions. '
  '10':
  - type: text
    content: 'Loving money '
  - type: note
    content: Or “insatiable greed for money.”
  - type: text
    content: is a root of all evils. Some people run after it so much that they have given up their faith. Craving more money pushes them away from the faith into error, compounding misery in their lives!
  - type: heading
    content: Paul’s Final Exhortation to Timothy
  '11':
  - type: text
    content: 'Timothy, you are God’s man, so run from all these errors. Instead, chase after true holiness, justice, faithfulness, love, hope, '
  - type: note
    content: Or “patience.”
  - type: text
    content: 'and tender humility. '
  '12':
  - type: text
    content: So fight with faith for the winner’s prize! Lay your hands upon eternal life, to which you were called and about which you made the good confession before the multitude of witnesses!
  - type: note
    content: As translated from the Aramaic.
  '13':
  - type: text
    content: 'So now, I instruct you before the God of resurrection life '
  - type: note
    content: Or “the God who resurrects all.”
  - type: text
    content: 'and before Jesus, the Anointed One, who demonstrated a beautiful testimony even before Pontius Pilate, '
  '14':
  - type: text
    content: 'that you follow this commission faithfully with a clear conscience '
  - type: note
    content: Or “without defilement.”
  - type: text
    content: and without blemish until the appearing of our Lord Jesus Christ.
  '15':
  - type: text
    content: 'Yes, God will make his appearing in his own divine timing, '
  - type: note
    content: By implication, the second coming of Jesus.
  - type: text
    content: 'for he is the exalted God, the only powerful One, the King over every king, and the Lord of power! '
  '16':
  - type: text
    content: 'He alone is the immortal God, '
  - type: note
    content: Or “incorruptible God.”
  - type: text
    content: living in the unapproachable light of divine glory! No one has ever seen his fullness, nor can they, for all the glory and endless authority of the universe belongs to him, forever and ever. Amen!
  '17':
  - type: text
    content: To all the rich of this world, I command you not to be wrapped in thoughts of pride over your prosperity, or rely on your wealth, for your riches are unreliable and nothing compared to the living God. Trust instead in the one who lavishes upon us all good things, fulfilling our every need.
  - type: note
    content: Or “pleasure.”
  '18':
  - type: text
    content: 'Remind the wealthy to be rich in remarkable works of extravagant generosity, willing to share with others. '
  '19':
  - type: text
    content: These spiritual investments will provide a beautiful foundation for their lives and secure for them a great future, as they lay their hands upon the meaning of true life.
  '2':
  - type: text
    content: Especially honor and respect employers who are believers and don’t despise them, but serve them even more, for they are fellow believers. They should be at peace with them as beloved members of God’s family. Be faithful to teach them these things as their sacred obligation.
  - type: heading
    content: False Teachers and True Riches
  '20':
  - type: text
    content: 'So, my son Timothy, '
  - type: note
    content: Paul uses an endearing variation of Timothy’s name; it could almost be read “Oh Timmy.” This translation includes the words, my son, to make this explicit.
  - type: text
    content: 'don’t forget all that has been deposited within you. Escape from the empty echoes of men '
  - type: note
    content: This is an Aramaic figure of speech that means literally “daughters of the voice [echoes] of vanity.” The Greek text reads “profane and vain babblings.”
  - type: text
    content: 'and the perversion of twisted reasoning. '
  - type: note
    content: As translated from the Aramaic, which also means, “false doctrines.” The Greek is “false [so-called] science.”
  '21':
  - type: text
    content: For those who claim to possess this so-called knowledge have already wandered from the true faith.
  - type: text
    content: May God’s grace empower you always!
  - type: text
    content: Love in Christ
  - type: text
    content: ','
  - type: text
    content: Paul
  '3':
  - type: text
    content: 'But if anyone spreads false teaching that does not agree with the healthy instruction of our Lord Jesus, teaching others that holy awe of God '
  - type: note
    content: The Aramaic here and in v. 6 literally means “the doctrine of the fear of God.” The fear of God is one of the seven spirits of God, the spirit of the fear of God (Isa. 11:2–3). To teach there is no fear of God would be leading people away from the Holy Spirit. The fear of God is more than simply loving and respecting God. There are over one hundred references in both the Old and New Testaments that speak of “the fear of God.”
  - type: text
    content: 'is not important, then they prove they know nothing at all! It’s obvious they don’t value or hold dear the healing words of our Lord Jesus Christ. '
  '4':
  - type: text
    content: 'They are covered with the clouds of conceit. They are loaded '
  - type: note
    content: The Aramaic can be translated “sick with controversy.”
  - type: text
    content: with controversy, and they love to argue their opinions and split hairs. The fruit of their ministry is contention, competition, and evil suspicions.
  '5':
  - type: text
    content: They add misery to many lives by corrupting their minds and cheating them of the truth. They equate the worship of God with making great sums of money.
  - type: note
    content: Or “to be godly is the way to get rich.”
  '6':
  - type: text
    content: We have a “profit” that is greater than theirs—our holy awe of God! To have merely our necessities is to have enough.
  '7':
  - type: text
    content: Isn’t it true that our hands were empty when we came into the world, and when we leave this world our hands will be empty again?
  '8':
  - type: text
    content: Because of this, food and clothing is enough to make us content.
  '9':
  - type: text
    content: But those who crave the wealth of this world slip into spiritual snares. They become trapped by the troubles that come through their foolish and harmful desires, driven by greed and drowning in their own sinful pleasures. And they take others down with them into their corruption and eventual destruction.
