document_id: PRO.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Father’s Instruction
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my correction, my sons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I speak to you as your father.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Read and study this entire chapter as though it were Jesus Christ speaking to you. He is the Father of Eternity, and we are called his sons. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 9:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 21:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let discernment enter your heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you will grow wise with the understanding I impart.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My son, if you will take the time to stop and listen to me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and embrace what I say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will live a long and happy life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: full of understanding in every way.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have taken you by the hand in wisdom’s ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pointing you to the path of integrity.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your progress will have no limits when you come along with me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you will never stumble as you walk along the way.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So receive my correction '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Wisdom will correct us and adjust our hearts to discipline. We must embrace the corrections of wisdom in order to mature spiritually.
      marker-yv: yv-n
    - type: text
      text: no matter how hard it is to swallow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for wisdom will snap you back into place—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: her words will be invigorating life to you.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not detour into darkness or even set foot on that path.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stay away from it; don’t even go there!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For troublemakers are restless if they are not involved in evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are not satisfied until they have brought someone harm.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They feed on darkness and drink
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until they’re drunk on the wine of wickedness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “violence.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the lovers of God walk on the highway of light,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the glow of sunlight.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their way shines brighter and brighter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until the perfect day.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked walk in thick darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like those who travel in fog,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and yet don’t have a clue why they keep stumbling!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Healing Words
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My revelation-truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “Torah.”
      marker-yv: yv-n
    - type: text
      text: is a gift to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so remain faithful to my instruction.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen carefully, my dear child, to everything that I teach you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and pay attention to all that I have to say.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fill your thoughts with my words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until they penetrate deep into your spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, as you unwrap my words,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “discover my words.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will impart true life and radiant health
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into the very core of your being.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So above all, guard the affections of your heart,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: levav
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the most common word for “heart.” It includes our thoughts, our wills, our discernment, and our affections.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they affect all that you are.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay attention to the welfare of your innermost being,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for from there flows the wellspring '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although most translations have “the issues of life,” the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yasa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is actually “seasons,” especially springtime. Out of your heart flow the seasons of life. It is our hearts, not our ages or circumstances, that shape the seasons of our lives. If our hearts are tender to God, we can live in perpetual springtime.
      marker-yv: yv-n
    - type: text
      text: of life.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avoid dishonest speech and pretentious words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be free from using perverse words no matter what!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Watch Where You’re Going
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Set your gaze on the path before you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With fixed purpose, looking straight ahead,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: ignore life’s distractions
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Watch where you’re going!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stick to the path of truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the road will be safe and smooth before you.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t allow yourself to be sidetracked for even a moment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or take the detour that leads to darkness.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I, too, was once the delight of my father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 17:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and cherished by my mother—their beloved '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “unique.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Luke 1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: child.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then my father taught me, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Never forget my words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you do everything that I teach you, you will reign in life.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The lessons of wisdom are meant to be passed on from parents to children.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So make wisdom your quest—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: search for the revelation of life’s meaning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let what I say go in one ear and out the other.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Stick with wisdom and she will stick to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protecting you throughout your days.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will rescue all those who passionately listen to her voice.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is not enough to acquire wisdom; we must love her and listen wholeheartedly to her instruction.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom is the most valuable commodity—so buy it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revelation-knowledge is what you need—so invest in it!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom will exalt you when you exalt her truth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint says, “Build a fort for wisdom and she will lift you high.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will lead you to honor and favor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you live your life by her insights.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be adorned with beauty and grace,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “She will place a garland of grace on your head and a crown of beauty upon you.” A garland and a crown are metaphors for what is awarded a victor in a race. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 9:24–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wisdom’s glory will wrap itself around you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wisdom’s laurel of glory shielding you.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making you victorious in the race.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Pathways
    marker-yv: yv-h
