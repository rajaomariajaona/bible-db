document_id: PRO.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Father’s Instruction
  - type: text
    content: Listen to my correction, my sons,
  - type: text
    content: for I speak to you as your father.
  - type: note
    content: Read and study this entire chapter as though it were Jesus Christ speaking to you. He is the Father of Eternity, and we are called his sons. See Isa. 9:6–7 and Rev. 21:6–7.
  - type: text
    content: Let discernment enter your heart
  - type: text
    content: and you will grow wise with the understanding I impart.
  '10':
  - type: text
    content: My son, if you will take the time to stop and listen to me
  - type: text
    content: and embrace what I say,
  - type: text
    content: you will live a long and happy life
  - type: text
    content: full of understanding in every way.
  '11':
  - type: text
    content: I have taken you by the hand in wisdom’s ways,
  - type: text
    content: pointing you to the path of integrity.
  '12':
  - type: text
    content: Your progress will have no limits when you come along with me,
  - type: text
    content: and you will never stumble as you walk along the way.
  '13':
  - type: text
    content: 'So receive my correction '
  - type: note
    content: Wisdom will correct us and adjust our hearts to discipline. We must embrace the corrections of wisdom in order to mature spiritually.
  - type: text
    content: no matter how hard it is to swallow,
  - type: text
    content: for wisdom will snap you back into place—
  - type: text
    content: her words will be invigorating life to you.
  '14':
  - type: text
    content: Do not detour into darkness or even set foot on that path.
  '15':
  - type: text
    content: Stay away from it; don’t even go there!
  '16':
  - type: text
    content: For troublemakers are restless if they are not involved in evil.
  - type: text
    content: They are not satisfied until they have brought someone harm.
  '17':
  - type: text
    content: They feed on darkness and drink
  - type: text
    content: until they’re drunk on the wine of wickedness.
  - type: note
    content: Or “violence.”
  '18':
  - type: text
    content: But the lovers of God walk on the highway of light,
  - type: note
    content: Or “the glow of sunlight.”
  - type: text
    content: and their way shines brighter and brighter
  - type: text
    content: until the perfect day.
  '19':
  - type: text
    content: But the wicked walk in thick darkness,
  - type: text
    content: like those who travel in fog,
  - type: text
    content: and yet don’t have a clue why they keep stumbling!
  - type: heading
    content: Healing Words
  '2':
  - type: text
    content: 'My revelation-truth '
  - type: note
    content: Literally “Torah.”
  - type: text
    content: is a gift to you,
  - type: text
    content: so remain faithful to my instruction.
  '20':
  - type: text
    content: Listen carefully, my dear child, to everything that I teach you,
  - type: text
    content: and pay attention to all that I have to say.
  '21':
  - type: text
    content: Fill your thoughts with my words
  - type: text
    content: until they penetrate deep into your spirit.
  - type: note
    content: See Col. 3:16.
  '22':
  - type: text
    content: Then, as you unwrap my words,
  - type: note
    content: Or “discover my words.”
  - type: text
    content: they will impart true life and radiant health
  - type: text
    content: into the very core of your being.
  '23':
  - type: text
    content: So above all, guard the affections of your heart,
  - type: note
    content: The Hebrew word levav is the most common word for “heart.” It includes our thoughts, our wills, our discernment, and our affections.
  - type: text
    content: for they affect all that you are.
  - type: text
    content: Pay attention to the welfare of your innermost being,
  - type: text
    content: 'for from there flows the wellspring '
  - type: note
    content: Although most translations have “the issues of life,” the Hebrew word yasa is actually “seasons,” especially springtime. Out of your heart flow the seasons of life. It is our hearts, not our ages or circumstances, that shape the seasons of our lives. If our hearts are tender to God, we can live in perpetual springtime.
  - type: text
    content: of life.
  '24':
  - type: text
    content: Avoid dishonest speech and pretentious words.
  - type: text
    content: Be free from using perverse words no matter what!
  - type: heading
    content: Watch Where You’re Going
  '25':
  - type: text
    content: Set your gaze on the path before you.
  - type: text
    content: With fixed purpose, looking straight ahead,
  - type: text
    content: ignore life’s distractions
  - type: text
    content: .
  - type: note
    content: Implied in the text. See Heb. 12:1–2.
  '26':
  - type: text
    content: Watch where you’re going!
  - type: text
    content: Stick to the path of truth,
  - type: text
    content: and the road will be safe and smooth before you.
  '27':
  - type: text
    content: Don’t allow yourself to be sidetracked for even a moment
  - type: text
    content: or take the detour that leads to darkness.
  '3':
  - type: text
    content: For I, too, was once the delight of my father
  - type: note
    content: See Matt. 17:5 and John 3:35.
  - type: text
    content: 'and cherished by my mother—their beloved '
  - type: note
    content: Or “unique.” See Luke 1–2.
  - type: text
    content: child.
  '4':
  - type: text
    content: Then my father taught me, saying,
  - type: text
    content: “Never forget my words.
  - type: text
    content: If you do everything that I teach you, you will reign in life.”
  - type: note
    content: The lessons of wisdom are meant to be passed on from parents to children.
  '5':
  - type: text
    content: So make wisdom your quest—
  - type: text
    content: search for the revelation of life’s meaning.
  - type: text
    content: Don’t let what I say go in one ear and out the other.
  '6':
  - type: text
    content: Stick with wisdom and she will stick to you,
  - type: text
    content: protecting you throughout your days.
  - type: text
    content: She will rescue all those who passionately listen to her voice.
  - type: note
    content: It is not enough to acquire wisdom; we must love her and listen wholeheartedly to her instruction.
  '7':
  - type: text
    content: Wisdom is the most valuable commodity—so buy it!
  - type: text
    content: Revelation-knowledge is what you need—so invest in it!
  '8':
  - type: text
    content: Wisdom will exalt you when you exalt her truth.
  - type: note
    content: The Septuagint says, “Build a fort for wisdom and she will lift you high.”
  - type: text
    content: She will lead you to honor and favor
  - type: text
    content: when you live your life by her insights.
  '9':
  - type: text
    content: You will be adorned with beauty and grace,
  - type: note
    content: Literally “She will place a garland of grace on your head and a crown of beauty upon you.” A garland and a crown are metaphors for what is awarded a victor in a race. See 1 Cor. 9:24–25.
  - type: text
    content: and wisdom’s glory will wrap itself around you,
  - type: note
    content: Or “wisdom’s laurel of glory shielding you.”
  - type: text
    content: making you victorious in the race.
  - type: heading
    content: Two Pathways
