document_id: NAM.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh’s Judgment of Nineveh
  - type: text
    content: 'This is the book of the vision of Nahum who was from '
  - type: text
    content: the village of
  - type: text
    content: ' Elkosh. '
  - type: note
    content: Nahum means “full of comfort.” Elkosh means “God is my bow.” Nahum had a vision in which he saw the events that he described in these three chapters. He may have received his message while in a trance or some similar state.
  - type: text
    content: 'A prophecy concerning Nineveh:'
  '10':
  - type: text
    content: They will be like drunkards from their carousing—
  - type: text
    content: like entangled thorns, they will be consumed as dry stubble.
  - type: note
    content: 'This verse is recognized as the most difficult verse in Nahum to translate. Some view it as the most difficult verse in the Bible. Some modern translations omit the words “like drunkards from their carousing.” See J. M. Powis Smith, A Critical and Exegetical Commentary on Micah, Zephaniah, Nahum, Habakkuk, Obadiah and Joel (New York: Charles Scribner’s Sons, 1911), 294.'
  '11':
  - type: text
    content: 'From you, '
  - type: text
    content: Nineveh
  - type: text
    content: ', came one'
  - type: text
    content: 'who plotted evil against '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: a wicked, worthless strategist.
  - type: note
    content: This is likely a reference to King Sennacherib, who ruled over Assyria from 705 to 681 BC and who besieged Jerusalem in 701 during the reign of Hezekiah, king of Judah (see 2 Kings 18:13–19:37).
  - type: heading
    content: Prophecy concerning Judah
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ' says,'
  - type: text
    content: “Although your enemies are many and secure in their alliances,
  - type: text
    content: they will nonetheless be mowed down and pass away.
  - type: text
    content: 'Though I have afflicted you, '
  - type: text
    content: my people
  - type: text
    content: ','
  - type: text
    content: I will not do it again.
  '13':
  - type: text
    content: 'And now I will break his yoke of bondage from '
  - type: text
    content: your neck
  - type: text
    content: 'and tear away your shackles of '
  - type: text
    content: Assyrian
  - type: text
    content: ' oppression.”'
  - type: heading
    content: Prophecy concerning the King of Nineveh
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ' has decreed against you, Nineveh:'
  - type: text
    content: “Your dynasty is over!
  - type: note
    content: Or literally “it will not be sown from your name anymore.” The culture of that time regarded the lack of descendants and loss of the family name as a serious matter (see Deut. 7:24; 29:20; 1 Sam. 24:21).
  - type: text
    content: Every idol in the temple of your gods I will destroy,
  - type: text
    content: your carved and engraved idols.
  - type: text
    content: I will dig your grave, for you are nothing to me.”
  - type: heading
    content: Prophecy concerning Judah
  '15':
  - type: text
    content: 'What a '
  - type: text
    content: beautiful
  - type: text
    content: ' sight to behold—'
  - type: text
    content: 'the '
  - type: text
    content: precious
  - type: text
    content: ' feet of the messenger'
  - type: text
    content: coming over the mountains to announce good news
  - type: text
    content: and to proclaim peace!
  - type: text
    content: People of Judah, celebrate your feasts,
  - type: text
    content: 'keep your solemn promises '
  - type: text
    content: to God
  - type: text
    content: ','
  - type: note
    content: See Pss. 22:25; 66:13. Verse 15 is 2:1 in the Hebrew Bible.
  - type: text
    content: 'for the wicked one '
  - type: note
    content: Or “Belial.” Belial means “the wicked one” or “the worthless one.” This is a reference to both the demonic power coming against God’s people and the king of Assyria, who will never invade the land again.
  - type: text
    content: will never pass through you again;
  - type: text
    content: he is completely cut off.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' is a God who tolerates no rivals.'
  - type: note
    content: Or “Yahweh is a jealous God.” The English word jealous most often carries a negative connotation of being envious of what someone else has. This is not the full sense of the Hebrew word qannoʾ, which is best understood as God’s burning passion to fully possess what is his. God is jealous over those whom he loves and wants them to be fully his. And God is vengeful toward anyone who would harm those who belong to him. See Ex. 20:5; 34:14; Deut. 32:21; James (Jacob) 4:5.
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will take vengeance on '
  - type: text
    content: his foes
  - type: text
    content: .
  - type: text
    content: He punishes his adversaries
  - type: text
    content: and keeps wrath for his enemies.
  - type: note
    content: Verses 2–8 are in the form of an alphabetic poem, known as an acrostic. An acrostic poem begins each line in Hebrew with a different letter of the Hebrew alphabet in alphabetical order. In this case, the poem goes only halfway through the alphabet, up to the eleventh of the twenty-two letters. This type of poem is found in several places in the Old Testament (see Pss. 25; 34; 37; 111; 112; 119; 145; Prov. 31:10–31; Lam. 1–4).
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' is very slow to anger '
  - type: note
    content: Or literally “Yahweh is long of nostril,” a figure of speech for “Yahweh does not easily become angry.” See Ex. 34:6; Num. 14:18.
  - type: text
    content: but so great in power;
  - type: text
    content: Yahweh
  - type: text
    content: ' will not let the guilty go unpunished.'
  - type: text
    content: He marches out in the whirlwind and storm,
  - type: note
    content: Or “His way is in the whirlwind and storm.” That is, where the Lord walks, great storms begin to blow. God will use the storms of our lives to reveal himself and his ways to us.
  - type: text
    content: and the clouds are the dust of his feet.
  '4':
  - type: text
    content: He rebukes the sea and dries it up
  - type: text
    content: and makes all the rivers run dry.
  - type: note
    content: The Jewish reader would immediately see the reference to the miracle-crossings of the Red Sea (see Ex. 14; Ps. 106:9) and the river Jordan (see Josh. 3:16–17; 4:23).
  - type: text
    content: 'At his rebuke, '
  - type: text
    content: the lush meadows
  - type: text
    content: ' of Bashan and Carmel wither;'
  - type: text
    content: the flowering fields of Lebanon fade.
  - type: note
    content: Bashan, Carmel, and Lebanon represent the most fertile parts of the land (see Isa. 33:9; 35:2).
  '5':
  - type: text
    content: In his presence, the mountains quake
  - type: text
    content: and the hills melt away.
  - type: note
    content: See Judg. 5:4–5; Mic. 1:4; Hab. 3:6.
  - type: text
    content: When he appears, the earth heaves,
  - type: text
    content: 'and the world and all who dwell in it '
  - type: text
    content: are laid waste
  - type: text
    content: .
  '6':
  - type: text
    content: Who can stand before an angry God?
  - type: text
    content: Who can face his fiery fury?
  - type: note
    content: See Jer. 7:20; 42:18; 44:6.
  - type: text
    content: When his wrath erupts, it pours out like lava,
  - type: text
    content: and boulders are broken to bits as he approaches.
  - type: heading
    content: God, Our Hiding Place
  '7':
  - type: text
    content: 'The goodness of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is '
  - type: text
    content: beyond belief
  - type: text
    content: '!'
  - type: text
    content: 'For when trouble comes, we run into '
  - type: text
    content: his heart
  - type: text
    content: ' and hide.'
  - type: text
    content: 'He always cares for those '
  - type: note
    content: Or “he knows those.” This knowledge (Hb. yadaʿ) is more than understanding us. It is also caring and protecting us. He knows us fully and protects us when we turn to him, for we are one with him in Christ. We best see God’s goodness in times of trouble.
  - type: text
    content: who seek refuge in him.
  '8':
  - type: text
    content: But with an overwhelming flood,
  - type: note
    content: 'Linguists are divided over where this phrase connects. Some connect it to the previous line: “He cares for those who seek refuge in him in [the time of] an overwhelming flood.” Others to what follows: “With an overwhelming flood, he will make an end of Nineveh.” Perhaps this ambiguity is intentional, and the phrase connects to both. See D. T. Tsumura, “Janus Parallelism in Nah 1:8,” Journal of Biblical Literature 102 (1983): 109–11.'
  - type: text
    content: 'he will make a complete end of '
  - type: text
    content: Nineveh
  - type: text
    content: ','
  - type: note
    content: Or “her place.”
  - type: text
    content: and darkness will overtake his enemies.
  - type: note
    content: This “darkness” may be a metaphor of calamity or even destruction (see Job 18:18).
  - type: heading
    content: Prophecy concerning Assyria
  '9':
  - type: text
    content: 'Whatever evil plot you hatch against '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: he will so completely thwart
  - type: text
    content: that it will not rise up a second time.
