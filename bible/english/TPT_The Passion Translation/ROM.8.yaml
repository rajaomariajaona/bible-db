document_id: ROM.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living by the Power of the Holy Spirit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: it
      children:
      - type: text
        text: So now the case is closed
    - type: text
      text: '. There remains no accusing voice of condemnation against those who are joined in life-union with Jesus, the Anointed One. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Those who are in Christ Jesus cannot be condemned.” Although there are some manuscripts that add to this verse, “for those who do not walk according to the flesh but according to the Spirit,” the addition is not supported by the oldest and most reliable Greek manuscripts.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now Christ lives his life in you! And even though your body may be dead because of the effects of sin, his life-giving Spirit imparts life to you because you are fully accepted by God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “for the cause of righteousness.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Yes, God raised Jesus to life! And since God’s Spirit of Resurrection lives in you, he will also raise your dying body to life by the same Spirit that breathes life into you!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'So then, beloved ones, the flesh has no claims on us at all, and we have no further obligation to live in obedience to it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: For when you live controlled by the flesh, you are about to die. But if the life of the Spirit puts to death the corrupt ways of the flesh, we then taste his abundant life.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sons and Daughters Destined for Glory
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The mature children of God are those '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek is quite emphatic: “those and only those.”'
      marker-yv: yv-n
    - type: text
      text: 'who are moved by the impulses of the Holy Spirit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And you did not receive the “spirit of religious duty,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spirit of slavery.”
      marker-yv: yv-n
    - type: text
      text: 'leading you back into the fear '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of never being good enough
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in both the text and the greater context of finding our true life in the “Spirit of full acceptance.” It can also refer to the fear of judgment that has been removed from us through Christ.
      marker-yv: yv-n
    - type: text
      text: 'But you have received the “Spirit of full acceptance,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spirit of adult [complete] sonship.” The Aramaic can be translated “the spirit of consecrated children.”
      marker-yv: yv-n
    - type: text
      text: 'enfolding you into the family of God. And you will never feel orphaned, for as he rises up within us, our spirits join him in saying the words of tender affection, “Beloved Father!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is not a Greek word, but an Aramaic word transliterated into Greek letters.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the Aramaic word for “father.” It is also found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 14:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is also a word used for devotion, a term of endearment. This is why some have concluded that
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: could be translated as “Daddy” or “Papa.” It is hard to imagine a closer relationship to have with God than to call him “
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', our Beloved Father.”'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: For the Holy Spirit makes God’s fatherhood real to us as he whispers into our innermost being, “You are God’s beloved child!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And since we are his true children, we qualify to share all his treasures, for indeed, we are heirs of God himself. And since we are joined to Christ, we also inherit all that he is and all that he has. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “we are joint-heirs with Christ.” Nothing in the Bible could be more amazing than this. Grace has made former rebels into princes and princesses, royal ones that share in the inheritance of Christ.
      marker-yv: yv-n
    - type: text
      text: 'We will experience being co-glorified with him provided that we accept his sufferings '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “accept his feelings” (of pain), or “things” (he experiences). By implication, “sufferings.”
      marker-yv: yv-n
    - type: text
      text: as our own.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “if we suffer jointly we will enjoy glory jointly.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Glorious Destiny
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I am convinced that any suffering we endure is less than nothing compared to the magnitude of glory '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: doxa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also be translated “radiant beauty,” “splendor,” “perfection.”
      marker-yv: yv-n
    - type: text
      text: 'that is about to be unveiled within us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “with the glory which is to be perfected in us.” The Greek participle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: eis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “into us,” “upon us,” or “to us.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'The entire universe is standing on tiptoe, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here means “intense anticipation,” or “anxiously anticipating what is about to happen” (with an outstretched neck).
      marker-yv: yv-n
    - type: text
      text: 'yearning to see the unveiling of God’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glorious
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the manifestation of the sons of God.” Interestingly, the Greek word used for “unveiling” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: apokalypsis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is the same word for the full title of the last book of the Bible, “The Revelation [Unveiling] of Jesus Christ.” The created universe is but the backdrop for the dramatic appearing of God’s sons and daughters unveiled with the glory of Jesus Christ upon them. The verb tense in the Greek text is clear that this “unveiling” is imminent, soon to happen, and destined to take place. Christ’s glory will come to us, enter us, fill us, envelop us, and then be revealed through us as partakers of the glory. Although God will not share his glory with any other, we are no longer “another,” for we are one with the Father, Son, and Holy Spirit through faith in Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 17:21–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'sons and daughters! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For the “law” of the Spirit of life flowing through the anointing of Jesus has liberated us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Greek manuscripts have “sets me free” or “sets you [singular] free.”
      marker-yv: yv-n
    - type: text
      text: 'from the “law” of sin and death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'For against its will the universe itself has had to endure the empty futility '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the purposelessness” or “the frustration” (or “chaos”).
      marker-yv: yv-n
    - type: text
      text: 'resulting from the consequences of human sin. But now, with eager expectation, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'all creation longs for freedom from its slavery to decay and to experience with us the wonderful freedom coming to God’s children. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'To this day we are aware of the universal agony and groaning of creation, as if it were in the contractions of labor for childbirth. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'And it’s not just creation. We who have already experienced the firstfruits of the Spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “firstfruits of the Spirit” would include his indwelling presence, his gifts, his wisdom, and his transforming power. Imagine what the full harvest of the Spirit will bring to us! The Aramaic can be translated “the awakening of the Spirit.”
      marker-yv: yv-n
    - type: text
      text: 'also inwardly groan as we passionately long to experience our full status as God’s sons and daughters—including our physical bodies being transformed. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: For this is the hope of our salvation.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But hope means that we must trust and wait for what is still unseen. For why would we need to hope for something we already have? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: So because our hope is set on what is yet to be seen, we patiently keep on waiting for its fulfillment.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'And in a similar way, the Holy Spirit takes hold of us in our human frailty to empower us in our weakness. For example, at times we don’t even know how to pray, or know the best things to ask for. But the Holy Spirit rises up within us to super-intercede '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hupererentugkhano
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is best translated “super [or hyper]-intercede for us.” We can only imagine how many blessings have poured into our lives because of the hyper-intercession of the Holy Spirit for us!
      marker-yv: yv-n
    - type: text
      text: 'on our behalf, pleading to God with emotional sighs '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “groanings.” We find three groanings in this chapter. Creation groans for the glorious freedom of God’s children (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), we groan to experience the fullness of our status as God’s children (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and the Holy Spirit groans for our complete destiny to be fulfilled (here).
      marker-yv: yv-n
    - type: text
      text: too deep for words.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'God, the searcher of the heart, knows fully our longings, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God, the heart-searcher.” God searches our hearts not just to uncover what is wrong, but to fulfill the true desire of our hearts to be fully his. Grace triumphs over judgment.
      marker-yv: yv-n
    - type: text
      text: yet he also understands the desires of the Spirit, because the Holy Spirit passionately pleads before God for us, his holy ones, in perfect harmony with God’s plan and our destiny.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'So we are convinced that every detail of our lives is continually woven together for good, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “harmony.” God works all things together harmoniously.
      marker-yv: yv-n
    - type: text
      text: 'for we are his lovers who have been called to fulfill his designed purpose. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'For he knew all about us before we were born and he destined us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “sealed us” (with God’s mark upon us). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: from the beginning to share the likeness of his Son. This means the Son is the oldest among a vast family of brothers and sisters who will become just like him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For God achieved what the law was unable to accomplish, because the law was limited by the weakness of human nature.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “weakness of the flesh.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet God sent us his Son in human form to identify with human weakness. Clothed with humanity, God’s Son gave his body to be the sin-offering so that God could once and for all condemn the guilt and power of sin. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Having determined our destiny ahead of time, he called us to himself and transferred his perfect righteousness to everyone he called. And those who possess his perfect righteousness he co-glorified with his Son!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Notice that all the verbs are past tense. The same faith that justifies us is the faith that glorifies us. This verse gives us four golden links in the chain of our salvation: (1) predestination, (2) vocation, (3) justification, and (4) glorification.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Triumph of God’s Love
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'So, what does all this mean? If God has determined to stand with us, tell me, who then could ever stand against us? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'For God has proved his love by giving us his greatest treasure, the gift of his Son. And since God freely offered him up as the sacrifice for us all, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an intentional echo of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Although God spared Abraham’s son, Isaac, he would not spare his own Son, Jesus Christ.
      marker-yv: yv-n
    - type: text
      text: he certainly won’t withhold from us anything else he has to give.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Who then would dare to accuse those whom God has chosen in love to be his? God himself is the judge who has issued his final verdict over them—“Not guilty!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 50:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Who then is left to condemn us? Certainly not Jesus, the Anointed One! For he gave his life for us, and even more than that, he has conquered death and is now risen, exalted, and enthroned by God at his right hand. So how could he possibly condemn us since he is continually praying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for our triumph
    - type: text
      text: '?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Not only does the Holy Spirit pray for us, so does Jesus Christ. Two divine intercessors are praying for you each day. Two-thirds of the Trinity are actively engaged in intercession for us. This is typified by the incident of Moses interceding on the mountain for Israel’s victory with one hand held high by Aaron (the high priest, a type of Jesus, our High Priest) and Hur (or “light,” a metaphor for the Holy Spirit, who prays with divine illumination for our good). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 17:9–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Who could ever divorce us from the endless love of God’s Anointed One? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Absolutely no one!
    - type: text
      text: ' For nothing in the universe has the power to diminish his love toward us. Troubles, pressures, and problems are unable to come between us and heaven’s love. What about persecutions, deprivations, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hunger and nakedness.”
      marker-yv: yv-n
    - type: text
      text: 'dangers, and death threats? No, for they are all impotent to hinder omnipotent love, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'even though it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day long we face death threats for your sake, God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are considered to be nothing more
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than sheep to be slaughtered!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 44:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Yet even in the midst of all these things, we triumph over them all, for God has made us to be more than conquerors, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Love has made us more than conquerors in four ways: (1) No situation in life can defeat us or dilute God’s love. (2) We know that divine love and power work for us to triumph over all things. (3) We share in the victory spoils of every enemy we face ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 53:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (4) We have conquered the Conqueror with merely a glance of our worshiping eyes. We have won his heart (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: and his demonstrated love is our glorious victory over everything!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Clearly implied in the text with the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hupernikao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The love of God gives us “a glorious hyper-victory,” more than can be described or contained in one word. God’s love and grace has made us hyper-conquerors, empowered to be unrivaled, more than a match for any foe!
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'So now I live with the confidence that there is nothing in the universe with the power to separate us from God’s love. I’m convinced that his love will triumph over death, life’s troubles, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “life”; by implication, the troubles and pressures life may bring.
      marker-yv: yv-n
    - type: text
      text: 'fallen angels, or dark rulers in the heavens. There is nothing in our present or future circumstances that can weaken his love. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: There is no power above us or beneath us—no power that could ever be found in the universe that can distance us from God’s passionate love, which is lavished upon us through our Lord Jesus, the Anointed One!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: So now every righteous requirement of the law can be fulfilled through the Anointed One living his life in us. And we are free to live, not according to our flesh, but by the dynamic power of the Holy Spirit!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What joyous truths are found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '! All that God requires of us has been satisfied by the sacrifice of Jesus Christ. The life of Jesus in us is enough to satisfy God. The power of our new life is not the works of our weak humanity, but the dynamic power of the Holy Spirit released in us.'
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Those who are motivated by the flesh only pursue what benefits themselves. But those who live by the impulses of the Holy Spirit are motivated to pursue spiritual realities. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the things of the [Holy] Spirit”; that is, doing what pleases God. The Aramaic can be translated “Those who are in the flesh see him only in the flesh, but those who are in the Spirit see him in the Spirit.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For the sense and reason of the flesh is death, but the mind-set controlled by the Spirit finds life and peace.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In fact, the mind-set focused on the flesh fights God’s plan and refuses to submit to his direction, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “refuses to submit to his law.”
      marker-yv: yv-n
    - type: text
      text: 'because it cannot! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For no matter how hard they try, God finds no pleasure with those who are controlled by the flesh. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But when the Spirit of Christ empowers your life, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “makes his home in you.”
      marker-yv: yv-n
    - type: text
      text: you are not dominated by the flesh but by the Spirit. And if you are not joined to the Spirit of the Anointed One, you are not of him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is an unusual Greek clause that can be translated “If anyone is not joined to the Spirit of Christ, he cannot be himself.” A similar construction is used in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 15:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': “The prodigal son came to himself.”'
      marker-yv: yv-n
