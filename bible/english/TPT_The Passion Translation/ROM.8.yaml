document_id: ROM.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living by the Power of the Holy Spirit
  - type: text
    content: So now the case is closed
  - type: text
    content: '. There remains no accusing voice of condemnation against those who are joined in life-union with Jesus, the Anointed One. '
  - type: note
    content: Or “Those who are in Christ Jesus cannot be condemned.” Although there are some manuscripts that add to this verse, “for those who do not walk according to the flesh but according to the Spirit,” the addition is not supported by the oldest and most reliable Greek manuscripts.
  '10':
  - type: text
    content: 'Now Christ lives his life in you! And even though your body may be dead because of the effects of sin, his life-giving Spirit imparts life to you because you are fully accepted by God. '
  - type: note
    content: The Aramaic can be translated “for the cause of righteousness.”
  '11':
  - type: text
    content: Yes, God raised Jesus to life! And since God’s Spirit of Resurrection lives in you, he will also raise your dying body to life by the same Spirit that breathes life into you!
  '12':
  - type: text
    content: 'So then, beloved ones, the flesh has no claims on us at all, and we have no further obligation to live in obedience to it. '
  '13':
  - type: text
    content: For when you live controlled by the flesh, you are about to die. But if the life of the Spirit puts to death the corrupt ways of the flesh, we then taste his abundant life.
  - type: heading
    content: Sons and Daughters Destined for Glory
  '14':
  - type: text
    content: 'The mature children of God are those '
  - type: note
    content: 'The Greek is quite emphatic: “those and only those.”'
  - type: text
    content: 'who are moved by the impulses of the Holy Spirit. '
  '15':
  - type: text
    content: 'And you did not receive the “spirit of religious duty,” '
  - type: note
    content: Or “spirit of slavery.”
  - type: text
    content: 'leading you back into the fear '
  - type: text
    content: of never being good enough
  - type: text
    content: '. '
  - type: note
    content: Implied in both the text and the greater context of finding our true life in the “Spirit of full acceptance.” It can also refer to the fear of judgment that has been removed from us through Christ.
  - type: text
    content: 'But you have received the “Spirit of full acceptance,” '
  - type: note
    content: Or “spirit of adult [complete] sonship.” The Aramaic can be translated “the spirit of consecrated children.”
  - type: text
    content: 'enfolding you into the family of God. And you will never feel orphaned, for as he rises up within us, our spirits join him in saying the words of tender affection, “Beloved Father!” '
  - type: note
    content: Abba is not a Greek word, but an Aramaic word transliterated into Greek letters. Abba is the Aramaic word for “father.” It is also found in Mark 14:36 and Gal. 4:6. Abba is also a word used for devotion, a term of endearment. This is why some have concluded that Abba could be translated as “Daddy” or “Papa.” It is hard to imagine a closer relationship to have with God than to call him “Abba, our Beloved Father.”
  '16':
  - type: text
    content: For the Holy Spirit makes God’s fatherhood real to us as he whispers into our innermost being, “You are God’s beloved child!”
  '17':
  - type: text
    content: 'And since we are his true children, we qualify to share all his treasures, for indeed, we are heirs of God himself. And since we are joined to Christ, we also inherit all that he is and all that he has. '
  - type: note
    content: Or “we are joint-heirs with Christ.” Nothing in the Bible could be more amazing than this. Grace has made former rebels into princes and princesses, royal ones that share in the inheritance of Christ.
  - type: text
    content: 'We will experience being co-glorified with him provided that we accept his sufferings '
  - type: note
    content: Or “accept his feelings” (of pain), or “things” (he experiences). By implication, “sufferings.”
  - type: text
    content: as our own.
  - type: note
    content: Or “if we suffer jointly we will enjoy glory jointly.”
  - type: heading
    content: A Glorious Destiny
  '18':
  - type: text
    content: 'I am convinced that any suffering we endure is less than nothing compared to the magnitude of glory '
  - type: note
    content: The Greek word doxa can also be translated “radiant beauty,” “splendor,” “perfection.”
  - type: text
    content: 'that is about to be unveiled within us. '
  - type: note
    content: The Aramaic can be translated “with the glory which is to be perfected in us.” The Greek participle eis can be translated “into us,” “upon us,” or “to us.”
  '19':
  - type: text
    content: 'The entire universe is standing on tiptoe, '
  - type: note
    content: The Greek word used here means “intense anticipation,” or “anxiously anticipating what is about to happen” (with an outstretched neck).
  - type: text
    content: 'yearning to see the unveiling of God’s '
  - type: text
    content: glorious
  - type: text
    content: ' '
  - type: note
    content: Or “the manifestation of the sons of God.” Interestingly, the Greek word used for “unveiling” (apokalypsis) is the same word for the full title of the last book of the Bible, “The Revelation [Unveiling] of Jesus Christ.” The created universe is but the backdrop for the dramatic appearing of God’s sons and daughters unveiled with the glory of Jesus Christ upon them. The verb tense in the Greek text is clear that this “unveiling” is imminent, soon to happen, and destined to take place. Christ’s glory will come to us, enter us, fill us, envelop us, and then be revealed through us as partakers of the glory. Although God will not share his glory with any other, we are no longer “another,” for we are one with the Father, Son, and Holy Spirit through faith in Christ. See John 17:21–23.
  - type: text
    content: 'sons and daughters! '
  '2':
  - type: text
    content: 'For the “law” of the Spirit of life flowing through the anointing of Jesus has liberated us '
  - type: note
    content: Some Greek manuscripts have “sets me free” or “sets you [singular] free.”
  - type: text
    content: 'from the “law” of sin and death. '
  '20':
  - type: text
    content: 'For against its will the universe itself has had to endure the empty futility '
  - type: note
    content: Or “the purposelessness” or “the frustration” (or “chaos”).
  - type: text
    content: 'resulting from the consequences of human sin. But now, with eager expectation, '
  '21':
  - type: text
    content: 'all creation longs for freedom from its slavery to decay and to experience with us the wonderful freedom coming to God’s children. '
  '22':
  - type: text
    content: 'To this day we are aware of the universal agony and groaning of creation, as if it were in the contractions of labor for childbirth. '
  '23':
  - type: text
    content: 'And it’s not just creation. We who have already experienced the firstfruits of the Spirit '
  - type: note
    content: The “firstfruits of the Spirit” would include his indwelling presence, his gifts, his wisdom, and his transforming power. Imagine what the full harvest of the Spirit will bring to us! The Aramaic can be translated “the awakening of the Spirit.”
  - type: text
    content: 'also inwardly groan as we passionately long to experience our full status as God’s sons and daughters—including our physical bodies being transformed. '
  '24':
  - type: text
    content: For this is the hope of our salvation.
  - type: text
    content: 'But hope means that we must trust and wait for what is still unseen. For why would we need to hope for something we already have? '
  '25':
  - type: text
    content: So because our hope is set on what is yet to be seen, we patiently keep on waiting for its fulfillment.
  '26':
  - type: text
    content: 'And in a similar way, the Holy Spirit takes hold of us in our human frailty to empower us in our weakness. For example, at times we don’t even know how to pray, or know the best things to ask for. But the Holy Spirit rises up within us to super-intercede '
  - type: note
    content: The Greek word hupererentugkhano is best translated “super [or hyper]-intercede for us.” We can only imagine how many blessings have poured into our lives because of the hyper-intercession of the Holy Spirit for us!
  - type: text
    content: 'on our behalf, pleading to God with emotional sighs '
  - type: note
    content: Or “groanings.” We find three groanings in this chapter. Creation groans for the glorious freedom of God’s children (v. 22), we groan to experience the fullness of our status as God’s children (v. 23), and the Holy Spirit groans for our complete destiny to be fulfilled (here).
  - type: text
    content: too deep for words.
  '27':
  - type: text
    content: 'God, the searcher of the heart, knows fully our longings, '
  - type: note
    content: Or “God, the heart-searcher.” God searches our hearts not just to uncover what is wrong, but to fulfill the true desire of our hearts to be fully his. Grace triumphs over judgment.
  - type: text
    content: yet he also understands the desires of the Spirit, because the Holy Spirit passionately pleads before God for us, his holy ones, in perfect harmony with God’s plan and our destiny.
  '28':
  - type: text
    content: 'So we are convinced that every detail of our lives is continually woven together for good, '
  - type: note
    content: The Aramaic is “harmony.” God works all things together harmoniously.
  - type: text
    content: 'for we are his lovers who have been called to fulfill his designed purpose. '
  '29':
  - type: text
    content: 'For he knew all about us before we were born and he destined us '
  - type: note
    content: The Aramaic can be translated “sealed us” (with God’s mark upon us). See also Col. 3:4; Heb. 2:11.
  - type: text
    content: from the beginning to share the likeness of his Son. This means the Son is the oldest among a vast family of brothers and sisters who will become just like him.
  '3':
  - type: text
    content: For God achieved what the law was unable to accomplish, because the law was limited by the weakness of human nature.
  - type: note
    content: Or “weakness of the flesh.”
  - type: text
    content: 'Yet God sent us his Son in human form to identify with human weakness. Clothed with humanity, God’s Son gave his body to be the sin-offering so that God could once and for all condemn the guilt and power of sin. '
  '30':
  - type: text
    content: Having determined our destiny ahead of time, he called us to himself and transferred his perfect righteousness to everyone he called. And those who possess his perfect righteousness he co-glorified with his Son!
  - type: note
    content: 'Notice that all the verbs are past tense. The same faith that justifies us is the faith that glorifies us. This verse gives us four golden links in the chain of our salvation: (1) predestination, (2) vocation, (3) justification, and (4) glorification.'
  - type: heading
    content: The Triumph of God’s Love
  '31':
  - type: text
    content: 'So, what does all this mean? If God has determined to stand with us, tell me, who then could ever stand against us? '
  '32':
  - type: text
    content: 'For God has proved his love by giving us his greatest treasure, the gift of his Son. And since God freely offered him up as the sacrifice for us all, '
  - type: note
    content: This is an intentional echo of Gen. 22:16. Although God spared Abraham’s son, Isaac, he would not spare his own Son, Jesus Christ.
  - type: text
    content: he certainly won’t withhold from us anything else he has to give.
  '33':
  - type: text
    content: Who then would dare to accuse those whom God has chosen in love to be his? God himself is the judge who has issued his final verdict over them—“Not guilty!”
  - type: note
    content: See Isa. 50:8.
  '34':
  - type: text
    content: 'Who then is left to condemn us? Certainly not Jesus, the Anointed One! For he gave his life for us, and even more than that, he has conquered death and is now risen, exalted, and enthroned by God at his right hand. So how could he possibly condemn us since he is continually praying '
  - type: text
    content: for our triumph
  - type: text
    content: '?'
  - type: note
    content: Not only does the Holy Spirit pray for us, so does Jesus Christ. Two divine intercessors are praying for you each day. Two-thirds of the Trinity are actively engaged in intercession for us. This is typified by the incident of Moses interceding on the mountain for Israel’s victory with one hand held high by Aaron (the high priest, a type of Jesus, our High Priest) and Hur (or “light,” a metaphor for the Holy Spirit, who prays with divine illumination for our good). See Ex. 17:9–13; Heb. 7:25; 9:24.
  '35':
  - type: text
    content: 'Who could ever divorce us from the endless love of God’s Anointed One? '
  - type: text
    content: Absolutely no one!
  - type: text
    content: ' For nothing in the universe has the power to diminish his love toward us. Troubles, pressures, and problems are unable to come between us and heaven’s love. What about persecutions, deprivations, '
  - type: note
    content: Or “hunger and nakedness.”
  - type: text
    content: 'dangers, and death threats? No, for they are all impotent to hinder omnipotent love, '
  '36':
  - type: text
    content: 'even though it is written:'
  - type: text
    content: All day long we face death threats for your sake, God.
  - type: text
    content: We are considered to be nothing more
  - type: text
    content: than sheep to be slaughtered!
  - type: note
    content: See Ps. 44:22.
  '37':
  - type: text
    content: 'Yet even in the midst of all these things, we triumph over them all, for God has made us to be more than conquerors, '
  - type: note
    content: 'Love has made us more than conquerors in four ways: (1) No situation in life can defeat us or dilute God’s love. (2) We know that divine love and power work for us to triumph over all things. (3) We share in the victory spoils of every enemy we face (Isa. 53:12). (4) We have conquered the Conqueror with merely a glance of our worshiping eyes. We have won his heart (Song. 4:9; 6:5).'
  - type: text
    content: and his demonstrated love is our glorious victory over everything!
  - type: note
    content: Clearly implied in the text with the Greek word hupernikao. The love of God gives us “a glorious hyper-victory,” more than can be described or contained in one word. God’s love and grace has made us hyper-conquerors, empowered to be unrivaled, more than a match for any foe!
  '38':
  - type: text
    content: 'So now I live with the confidence that there is nothing in the universe with the power to separate us from God’s love. I’m convinced that his love will triumph over death, life’s troubles, '
  - type: note
    content: Or “life”; by implication, the troubles and pressures life may bring.
  - type: text
    content: 'fallen angels, or dark rulers in the heavens. There is nothing in our present or future circumstances that can weaken his love. '
  '39':
  - type: text
    content: There is no power above us or beneath us—no power that could ever be found in the universe that can distance us from God’s passionate love, which is lavished upon us through our Lord Jesus, the Anointed One!
  '4':
  - type: text
    content: So now every righteous requirement of the law can be fulfilled through the Anointed One living his life in us. And we are free to live, not according to our flesh, but by the dynamic power of the Holy Spirit!
  - type: note
    content: What joyous truths are found in Rom. 8! All that God requires of us has been satisfied by the sacrifice of Jesus Christ. The life of Jesus in us is enough to satisfy God. The power of our new life is not the works of our weak humanity, but the dynamic power of the Holy Spirit released in us.
  '5':
  - type: text
    content: 'Those who are motivated by the flesh only pursue what benefits themselves. But those who live by the impulses of the Holy Spirit are motivated to pursue spiritual realities. '
  - type: note
    content: Or “the things of the [Holy] Spirit”; that is, doing what pleases God. The Aramaic can be translated “Those who are in the flesh see him only in the flesh, but those who are in the Spirit see him in the Spirit.”
  '6':
  - type: text
    content: For the sense and reason of the flesh is death, but the mind-set controlled by the Spirit finds life and peace.
  '7':
  - type: text
    content: 'In fact, the mind-set focused on the flesh fights God’s plan and refuses to submit to his direction, '
  - type: note
    content: Or “refuses to submit to his law.”
  - type: text
    content: 'because it cannot! '
  '8':
  - type: text
    content: 'For no matter how hard they try, God finds no pleasure with those who are controlled by the flesh. '
  '9':
  - type: text
    content: 'But when the Spirit of Christ empowers your life, '
  - type: note
    content: Or “makes his home in you.”
  - type: text
    content: you are not dominated by the flesh but by the Spirit. And if you are not joined to the Spirit of the Anointed One, you are not of him.
  - type: note
    content: 'This is an unusual Greek clause that can be translated “If anyone is not joined to the Spirit of Christ, he cannot be himself.” A similar construction is used in Luke 15:17: “The prodigal son came to himself.”'
