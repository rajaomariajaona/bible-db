document_id: PHP.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joined Together in Perfect Unity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Look at how much encouragement '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: paraklesis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can also mean “exhortation” or “comfort.”
    marker-yv: yv-n
  - type: text
    text: you’ve found in your relationship with the Anointed One! You are filled to overflowing with his comforting love. You have experienced a deepening friendship with the Holy Spirit and have felt his tender affection and mercy.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sympathies.” The Aramaic can be translated “your heart flutters with his compassion.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So I’m asking you, my friends, that you be joined together in perfect unity—with one heart, one passion, and united in one love. Walk together '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Be like-minded.”
    marker-yv: yv-n
  - type: text
    text: with one harmonious purpose and you will fill my heart with unbounded joy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Be free from pride-filled opinions, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for they will only harm your cherished unity
  - type: text
    text: '. Don’t allow self-promotion to hide in your hearts, but in authentic humility put others first and view others as more important than yourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abandon every display of selfishness. Possess a greater concern for what matters to others instead of your own interests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And consider the example that Jesus, the Anointed One, has set before us. Let his mindset become your motivation.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Example of Jesus Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He existed in the form of God, yet he gave no thought to seizing equality with God as his supreme prize. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “as something to be exploited.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Instead he emptied himself of his outward glory by reducing himself to the form of a lowly servant. He became human! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He humbled himself and became vulnerable, choosing to be revealed as a man and was obedient. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 5:19
      metadata:
        usfm: JHN.5.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: He was a perfect example
  - type: text
    text: ', even in his death—a criminal’s death by crucifixion!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Notice the seven steps Christ took from the throne to the cross in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7–8
      metadata:
        usfm: PHP.2.7+PHP.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': (1) He emptied himself. (2) He became a servant. (3) He became human. (4) He humbled himself. (5) He became vulnerable and was revealed as a man. (6) He was obedient until his death. (7) He died a criminal’s death on the cross.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Because of that obedience, God exalted him and multiplied his greatness! He has now been given the greatest of all names!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The authority of the name of Jesus causes every knee to bow in reverence! Everything and everyone will one day submit to this name—in the heavenly realm, in the earthly realm, and in the demonic realm. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “heaven, earth, and under the earth.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And every tongue will proclaim in every language: “Jesus Christ is Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ',” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kurios
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which is not the highest name for God.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Hebrew) or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jehovah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Latin) is the highest name.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Kurios
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a title also used for false gods, land owners, merchants, and nobles. The Greek language has no equal to the sacred name (the tetragrammaton—
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ),
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Only Hebrew and Aramaic have that equivalent. This verse makes it clear that the name given to Jesus at his exaltation was “Lord Jehovah” or “Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .” The Hebrew name for Jesus is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yeshua
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (lit. “God is a Saving-Cry”), which bears and reveals the name
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus carries the name and reputation of his Father,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', within him. See'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 17:11
      metadata:
        usfm: JHN.17.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: bringing glory and honor to God, his Father!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Note the seven steps of exaltation that God gave Jesus after the cross: (1) God exalted him and multiplied his greatness. (2) He possesses the greatest name of all. (3) His sovereign authority will cause every knee to bow. (4) God decreed that everyone in heaven will bow in worship of the God-Man. (5) God decreed that every demonic being will bow to the God-Man. (6) God decreed that every tongue will proclaim that Jesus Christ is Lord'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '! (7) God received the glory and honor of sharing his throne with the God-Man.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Believers Shine Like Lights in the World
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'My beloved ones, just like you’ve always listened to everything I’ve taught you in the past, I’m asking you now to keep following my instructions as though I were right there with you. Now you must continue to make this new life fully manifested as you live '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “push through the service of your life” or “work the work of your life.”
    marker-yv: yv-n
  - type: text
    text: 'in the holy awe of God—which brings you trembling into his presence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: God will continually revitalize you, implanting within you the passion to do what pleases him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “to accomplish the good things you desire to do.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Live a cheerful life, without complaining or division among yourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For then you will be seen as innocent, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “mature.”
    marker-yv: yv-n
  - type: text
    text: 'faultless, and pure children of God, even though you live in the midst of a brutal and perverse culture. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 32:5–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'For you will appear among them as shining lights '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the enlightened ones.”
    marker-yv: yv-n
  - type: text
    text: 'in the universe, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'holding out '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “holding fast to the words of eternal life.”
    marker-yv: yv-n
  - type: text
    text: 'the words of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: eternal
  - type: text
    text: ' life.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “you stand in the place of life to them.” The Greek text means “holding out to them the word of life.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I haven’t labored among you for nothing, for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your lives are the fruit of my ministry
  - type: text
    text: ' and will be my glorious boast at the unveiling '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “day.”
    marker-yv: yv-n
  - type: text
    text: of Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But I will rejoice even if my life is poured out like a liquid offering to God over your sacrificial and surrendered lives of faith. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The interpretation of this verse is difficult; it is speaking about Paul’s willingness to be a love offering for the Philippians if that’s what God desired. There is a powerful figure of speech contained in the Aramaic, literally translated as “though I imbibe the wine poured over the offering.” This is a metaphor of Paul shedding his blood one day because of his love for the Philippians. Indeed, Paul was later martyred for his faith.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: And so no matter what happens to me, you should rejoice in ecstatic celebration with me!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Example of Timothy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet I’m trusting in our Lord Jesus that I may send Timothy to you soon, so I can be refreshed when I find out how you’re doing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Timothy is like no other. He carries the same passion for your welfare that I carry in my heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For it seems as though everyone else is busy seeking what is best for themselves instead of the things that are most important to our Lord Jesus Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You already know about his excellent reputation, since he has served alongside me as a loyal son in the work of ministry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After I see what transpires with me he’s the one I will send to you to bless you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: And I’m trusting in my Lord to return to you in due time.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But for now, I feel a stirring in my heart to send Epaphroditus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: His name means “charming.”
    marker-yv: yv-n
  - type: text
    text: 'back to you immediately. He’s a friend to me and a wonderful brother and fellow soldier who has worked with me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as we serve as ministers of the gospel
  - type: text
    text: '. And you sent him as your apostle to minister to me in my need. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But now he is grieved to know that you found out he had been sick, so he longs to return and comfort you in this.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'It’s true he almost died, but God showed him mercy and healed him. And I’m so thankful to God for his healing, as I was spared from having the sorrow of losing him on top of all my other troubles! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So you can see why I’m delighted to send him to you now. I know that you’re anxious to see him and rejoice in his healing, and it encourages me to know how happy you’ll be to have him back.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'So warmly welcome him home in the Lord, '
