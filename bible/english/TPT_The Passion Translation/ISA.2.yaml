document_id: ISA.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Mountain of Yahweh’s Temple
  - type: text
    content: 'This is the word revealed to Isaiah, son of Amoz, concerning Judah and Jerusalem:'
  '10':
  - type: text
    content: Enter into the rock and hide in the dust
  - type: text
    content: 'from the dreadful presence of '
  - type: text
    content: Yahweh
  - type: text
    content: and from his majestic glory.
  - type: note
    content: Everyone on earth will seek to hide in a rock. Those who love the Lord will find shelter in the Rock of Salvation. Those who deny the Lord will make the rocks and caves their hiding places from the face of God (lit. “hide in the dust from the face of the terror of the Lord”).
  '11':
  - type: text
    content: 'The arrogant '
  - type: note
    content: Or “The eyes of the haughty.”
  - type: text
    content: will be humbled
  - type: text
    content: and the pride of man brought low.
  - type: text
    content: 'Only one will be exalted in that day: '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '12':
  - type: text
    content: The Lord of Angel Armies
  - type: note
    content: Or “Jehovah-Sabaoth,” the Lord of Angel Armies.
  - type: text
    content: has a day of humiliation in store for all the high and mighty,
  - type: text
    content: for all who are proud and self-exalting.
  - type: text
    content: They will be brought low.
  - type: note
    content: See Zeph. 2:3; Mal. 4:1.
  '13':
  - type: text
    content: His judgment is coming
  - type: text
    content: 'against all the lofty cedars of Lebanon '
  - type: note
    content: Isaiah used the metaphor of trees to symbolize humanity. Lebanon is used metaphorically as a symbol of beauty in the Scriptures. The tall and lofty cedars of Lebanon are a picture of the cultural elite, those of high standing in society. Men are like trees who stand tall and upright, only to be cut down in death. Jesus stands as the fairest of all the trees, like an apple tree in the forest of humanity (see Song. 2:3).
  - type: text
    content: and all the oaks of Bashan,
  - type: note
    content: These oaks were known for making oars (see Ezek. 27:6). They speak of the military captains and soldiers surrounding Jesus on the cross, who were like the savage bulls of Bashan (see footnote on Ps. 22:12). The word Bashan, although it refers to the area known as a fertile land northeast of Lake Galilee, is also the word for “serpent.” “Oaks of Bashan” may also represent great global leaders empowered by demonic spirits.
  '14':
  - type: text
    content: against all the high mountains and all the lofty hills,
  - type: note
    content: Governments and kingdoms of this earth are like hills and mountains. Even the highest of men’s governmental authorities will bow to the one called the Lord Almighty.
  '15':
  - type: text
    content: 'against every high tower '
  - type: note
    content: “High towers” could also represent godless academia that towers intellectually above others.
  - type: text
    content: and every fortress wall,
  - type: note
    content: This could refer to the strongholds in the mind of man, thoughts of self-importance that exalt themselves against the knowledge of God (see 2 Cor. 10:3–6). Towers and walls served as a refuge during an attack. Rebels against God built a tower in Babylon (see Gen. 11:1–9), seeking to be independent of God.
  '16':
  - type: text
    content: 'against all the '
  - type: text
    content: trading
  - type: text
    content: ' ships of Tarshish'
  - type: note
    content: The ships of Tarshish were the largest of ships, able to take the longest voyages and the greatest cargoes. They typify the great commercial empires built by man (see Ezek. 27:12). The economic system, the commerce of earth, will be brought to the feet of Jesus as he establishes an eternal kingdom where righteousness and justice rule.
  - type: text
    content: and all the impressive sailing vessels.
  - type: note
    content: The last clause is difficult to translate with accuracy. Some scholars believe the Hebrew word śāḵâ may be an Egyptian loan word for something like “yacht” or some impressive sailing vessel or “ship of pleasure.” Others translate it as “splendid palaces,” “works of art,” “pleasant pictures,” or “images of desire.”
  '17':
  - type: text
    content: People’s arrogance will be conquered and brought low,
  - type: note
    content: Isaiah taught that those who bowed low before idols (v. 9) would one day bow low before the true God.
  - type: text
    content: and those proud of heart will be humiliated.
  - type: text
    content: 'Only one will be exalted in that day: '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '18':
  - type: text
    content: Every worthless idol will utterly pass away.
  - type: note
    content: 'The Hebrew has only three words: “Nothings to nothingness!” See 1 Cor. 8:4.'
  - type: heading
    content: The Coming Dread of God
  '19':
  - type: text
    content: People will hide in caves and holes in the ground
  - type: text
    content: 'from the dreadful presence of '
  - type: text
    content: Yahweh
  - type: text
    content: and from his majestic glory when he rises
  - type: text
    content: to mightily shake the earth.
  '2':
  - type: text
    content: 'In the last days, '
  - type: note
    content: This phrase, often used by the prophets of the Old Testament, speaks of our current time in human history between Pentecost and the coming again of Christ. See Heb. 1:2; 1 John 2:18.
  - type: text
    content: 'the mountain of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s temple
  - type: text
    content: 'will be raised up '
  - type: note
    content: Or “prepared.” See Eph. 1:21–22.
  - type: text
    content: as the head of the mountains,
  - type: text
    content: towering over all the hills.
  - type: note
    content: This is a contrast between ch. 1 and ch. 2 of Isaiah. No matter how despicable our past, God’s grace will fully establish his people as the mountain rising above every other mountain. Mountains in the Bible are often used metaphorically for kingdoms. Kingdoms and governments are like mountains and hills on the landscape of history. The mountain-kingdom of God is in view here. It will be the chief of all mountains, the highest of all hills. The secular world sees Christ’s kingdom as irrelevant and powerless. But one day the kingdoms of the earth will be leveled and the King’s mountain will be high and exalted. With no rival, Jesus will sit enthroned. This prophetic outlook is the backdrop for all that Isaiah preaches. See Isa. 25:6–8; Mic. 4:1–5.
  - type: text
    content: A sparkling stream of every nation will flow into it.
  - type: note
    content: Or “All the nations will flow as a river to it.” The Hebrew word nahar can be translated “stream [river],” “to sparkle,” or “to be cheerful.” In Isa. 60:5 it is translated “radiant.” A cheerful, sparkling stream of people will come into divine radiance as they come up the mountain of the Lord. This speaks of the uphill flow of the river of God—a supernatural magnetism bringing the nations into the kingdom of Christ. This is the reversal of the dispersion of the people at Babel (see Gen. 11).
  '20':
  - type: text
    content: 'In that day, '
  - type: note
    content: The phrase “in that day” is used fifty times by Isaiah.
  - type: text
    content: people will throw away the worthless idols
  - type: text
    content: their hands have made from gold and silver.
  - type: text
    content: They will fling their treasures to the rodents and bats
  '21':
  - type: text
    content: 'as they crawl into the clefts of the rock '
  - type: text
    content: to hide
  - type: text
    content: ' from the'
  - type: text
    content: 'dreadful presence of '
  - type: text
    content: Yahweh
  - type: text
    content: and from the majesty of his glory
  - type: text
    content: when he rises to shake the earth mightily!
  - type: note
    content: See Heb. 12:25–29; Rev. 6:15–17.
  '22':
  - type: text
    content: 'So '
  - type: text
    content: once and for all
  - type: text
    content: ', stop trusting in man,'
  - type: text
    content: 'who is but one breath '
  - type: text
    content: from death
  - type: text
    content: —frail and puny man!
  - type: note
    content: Or “who has but breath in his nostrils—of what account is he?” Man’s life is fragile and temporary. His breath is in his nostrils, ready to stop at any moment. With all our boastings and with all our ingenuity and marvelous inventions, man is but a poor, vain creature. In all our littleness and helplessness we must turn away from the answers of men and ask for the breath of God.
  '3':
  - type: text
    content: Many peoples will come and say,
  - type: text
    content: '“Everyone, come! Let’s go up higher to '
  - type: text
    content: Yahweh
  - type: text
    content: ’s mountain,
  - type: text
    content: to the house of Jacob’s God; then he can teach us his ways
  - type: text
    content: and we can walk in his paths!”
  - type: text
    content: 'Zion '
  - type: note
    content: Zion is more than a location; it is the realm where God is enthroned (Pss. 2:4–6; 87:5). Zion is a synonym for the people of God, the dwelling place of his Spirit (Pss. 9:11; 74:2; 76:2; Heb. 12:22–24). The perfection of beauty is in Mount Zion, where the light of God shines (Ps. 50:2). Perfected praise rises to the Lord in this place of perfect rest (Ps. 65:1–2). The Mountain of Zion is where the Lord is known in his greatness (Ps. 99:2; Isa. 12:4–6). It is the hope of all the afflicted (Ps. 102:16–22; Isa. 14:32; 51:11).
  - type: text
    content: will be the center of instruction,
  - type: note
    content: Although the Hebrew word torah is used here, it means more than “the law.” It also can be translated “instruction” or “teaching.” This is not the law of Moses, for that came from Sinai. This is the revelation of the gospel and the instruction of God out of the Zion-realm that overcomes every work of darkness within us and around us. From Jerusalem the gospel light and the twelve mighty apostles went forth to change the world.
  - type: text
    content: 'and the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will go out from Jerusalem.'
  '4':
  - type: text
    content: He will judge fairly between the nations
  - type: text
    content: and settle disputes among many peoples.
  - type: note
    content: The wisdom of the Lord will resolve ethnic conflicts and international disputes.
  - type: text
    content: 'They will beat the swords they used '
  - type: text
    content: against each other
  - type: text
    content: into plowshares and their spears into pruning hooks.
  - type: note
    content: Or “sickles” (LXX). Weapons that were turned on one another will now be used for the harvest.
  - type: text
    content: No nation will take up weapons against another,
  - type: text
    content: nor will they prepare for war anymore.
  '5':
  - type: text
    content: O house of Jacob, come let us walk
  - type: text
    content: 'in the '
  - type: text
    content: wonderful
  - type: text
    content: ' light of '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: note
    content: The Hebrew concept of the light of the Lord includes his ways, favor, presence, blessings, and revelation.
  - type: heading
    content: The Judge of the Nations
  '6':
  - type: text
    content: Lord
  - type: text
    content: ', you have abandoned your people, the house of Jacob,'
  - type: text
    content: for they are full of occultic secrets from the east,
  - type: text
    content: like the land of the Philistines, with sorcerers everywhere;
  - type: text
    content: they are pleased with what is false and foreign.
  - type: note
    content: That is, since they don’t seek the true light of the Lord and his true prophetic word, they end up with Eastern mysticism, the “false” and the “foreign.” Arguably, this is one of the more difficult verses to translate in Isaiah, since there are multiple possibilities. The last clause can be rendered “they clasp hands with foreigners [unholy alliances]” or “they are with the children of foreigners.”
  '7':
  - type: text
    content: Their land overflows with gold and silver;
  - type: text
    content: they are wealthy beyond measure.
  - type: text
    content: Their land is filled with horses and innumerable chariots!
  '8':
  - type: text
    content: Worthless idols are everywhere, and they worship
  - type: text
    content: the work of their own hands, what their fingers have made.
  - type: note
    content: 'Isaiah condemned what the people were trusting in: their broadminded tolerance, financial security, military might (horses and chariots), and the idols they themselves had crafted. See Deut. 17:14–17.'
  '9':
  - type: text
    content: 'The people bow down low '
  - type: text
    content: before the “no-gods,”
  - type: text
    content: 'and the leaders lie down flat before them '
  - type: text
    content: in worship
  - type: text
    content: ','
  - type: text
    content: so do not spare them!
  - type: note
    content: Or “do not raise them up again.”
