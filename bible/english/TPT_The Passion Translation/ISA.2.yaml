          text: of Isaiah. No matter how despicable our past, God’s grace will fully establish his people as the mountain rising above every other mountain. Mountains in the Bible are often used metaphorically for kingdoms. Kingdoms and governments are like mountains and hills on the landscape of history. The mountain-kingdom of God is in view here. It will be the chief of all mountains, the highest of all hills. The secular world sees Christ’s kingdom as irrelevant and powerless. But one day the kingdoms of the earth will be leveled and the King’s mountain will be high and exalted. With no rival, Jesus will sit enthroned. This prophetic outlook is the backdrop for all that Isaiah preaches. See
