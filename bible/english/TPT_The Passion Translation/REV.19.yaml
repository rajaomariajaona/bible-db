document_id: REV.19,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Heaven Rejoices
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'After this I heard what seemed to be the roar of a great multitude of voices, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salvation and glory and power to our God!
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: At this I fell facedown at the angel’s feet to worship him, but he stopped me and said, “Don’t do this! For I am only a fellow servant with you and one of your brothers who clings to what Jesus testifies. Worship God. The testimony of Jesus is the spirit of prophecy.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the essence of prophecy.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Bridegroom-King on the White Horse
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I saw heaven opened, and suddenly a white horse appeared. The name of the one riding it was Faithful and True, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and with pure righteousness he judges and rides to battle. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'He wore many regal crowns, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus has absolute sovereignty over every nation and every heart.
      marker-yv: yv-n
    - type: text
      text: 'and his eyes were flashing like flames of fire. He had a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: secret
    - type: text
      text: ' name inscribed on him that’s known only to himself. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He wore a robe dipped in blood, and his title is called the Word of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Following him on white horses were the armies of heaven, wearing white fine linen, pure and bright. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'A sharp sword came from his mouth with which to conquer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to strike down.”
      marker-yv: yv-n
    - type: text
      text: 'the nations, and he will shepherd them with an iron scepter. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 2:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and the first footnote;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'He will trample out the wine in the winepress of the wrath '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “strong passion.”
      marker-yv: yv-n
    - type: text
      text: 'of God. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'On his robe and on his thigh he had inscribed a name: King of kings and Lord of lords.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Wild Beast Defeated
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then I saw an angel standing in the sun, shouting to all the flying birds of the sky, “Come and gather for God’s great supper! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Come and devour the flesh of the kings, generals, and soldiers, the flesh of horses and their riders, the flesh of all people, slave or free, lowly or famous.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then I saw the wild beast and the kings of the earth with their armies gathered to wage war against the rider on the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: white
    - type: text
      text: ' horse and against his armies. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: All his judgments are right and true,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he has judged the great prostitute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who corrupted the earth with her sexual immorality.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He has avenged on her the blood of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loving
    - type: text
      text: ' servants.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The wild beast was captured, as was the false prophet who had performed miracle-signs in his presence. (It was by these miracle-signs that he had deceived those with the mark of the wild beast and those who worshiped its image.) The wild beast and the false prophet were both thrown alive into the lake of fire burning with sulfur, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'and their armies were killed by the sharp sword that came from the mouth of the rider on the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: white
    - type: text
      text: ' horse. And all the birds gorged themselves with their flesh.'
  '3':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And again they shouted:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The smoke from her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: destruction
    - type: text
      text: ' goes up'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: forever and ever!”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The twenty-four elders and the four living creatures fell facedown and worshiped God, who sits on the throne, saying in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: agreement
    - type: text
      text: ':'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “Amen! Hallelujah!”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then a voice came from the throne, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise our God, all you his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loving
    - type: text
      text: ' servants'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all who reverence and honor him—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who are lowly and those who are great!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then I heard what seemed to be the thunderous voice of a great multitude, like the sound of a massive waterfall and mighty peals of thunder, crying out:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hallelujah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the Lord our God, the Almighty, reigns!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic adds a clause that is missing in the Greek: “the One and Only for all.”'
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Let us rejoice and exalt him and give him glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because the wedding celebration of the Lamb has come.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The imagery of the wedding celebration of the Lamb reinforces and expresses the beautiful intimacy that Jesus shares with his beloved bride. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 2:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:26–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This wedding feast is more than a future event; it is an experience we taste of now as we live as one with the Bridegroom (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And his bride has made herself ready.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “And his bride loves him!”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fine linen, shining bright and clear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has been given to her to wear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the fine linen represents
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the righteous deeds of his holy believers.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “and the fine linens are the blessings of the holy ones.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the angel said to me, “Write these words: Wonderfully blessed are those who are invited to feast at the wedding celebration of the Lamb!” And then he said to me, “These are the true words of God.”'
