document_id: REV.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Heaven Rejoices
  - type: text
    content: 'After this I heard what seemed to be the roar of a great multitude of voices, saying:'
  - type: text
    content: “Hallelujah!
  - type: text
    content: Salvation and glory and power to our God!
  '10':
  - type: text
    content: At this I fell facedown at the angel’s feet to worship him, but he stopped me and said, “Don’t do this! For I am only a fellow servant with you and one of your brothers who clings to what Jesus testifies. Worship God. The testimony of Jesus is the spirit of prophecy.”
  - type: note
    content: That is, the essence of prophecy.
  - type: heading
    content: The Bridegroom-King on the White Horse
  '11':
  - type: text
    content: 'Then I saw heaven opened, and suddenly a white horse appeared. The name of the one riding it was Faithful and True, '
  - type: note
    content: See Rev. 1:5; 3:14.
  - type: text
    content: 'and with pure righteousness he judges and rides to battle. '
  '12':
  - type: text
    content: 'He wore many regal crowns, '
  - type: note
    content: Jesus has absolute sovereignty over every nation and every heart.
  - type: text
    content: 'and his eyes were flashing like flames of fire. He had a '
  - type: text
    content: secret
  - type: text
    content: ' name inscribed on him that’s known only to himself. '
  - type: note
    content: See Rev. 3:12.
  '13':
  - type: text
    content: 'He wore a robe dipped in blood, and his title is called the Word of God. '
  '14':
  - type: text
    content: 'Following him on white horses were the armies of heaven, wearing white fine linen, pure and bright. '
  '15':
  - type: text
    content: 'A sharp sword came from his mouth with which to conquer '
  - type: note
    content: Or “to strike down.”
  - type: text
    content: 'the nations, and he will shepherd them with an iron scepter. '
  - type: note
    content: See Ps. 2:9; Rev. 2:27 and the first footnote; 12:5.
  - type: text
    content: 'He will trample out the wine in the winepress of the wrath '
  - type: note
    content: Or “strong passion.”
  - type: text
    content: 'of God. '
  '16':
  - type: text
    content: 'On his robe and on his thigh he had inscribed a name: King of kings and Lord of lords.'
  - type: heading
    content: The Wild Beast Defeated
  '17':
  - type: text
    content: 'Then I saw an angel standing in the sun, shouting to all the flying birds of the sky, “Come and gather for God’s great supper! '
  '18':
  - type: text
    content: Come and devour the flesh of the kings, generals, and soldiers, the flesh of horses and their riders, the flesh of all people, slave or free, lowly or famous.”
  '19':
  - type: text
    content: 'Then I saw the wild beast and the kings of the earth with their armies gathered to wage war against the rider on the '
  - type: text
    content: white
  - type: text
    content: ' horse and against his armies. '
  '2':
  - type: text
    content: All his judgments are right and true,
  - type: text
    content: For he has judged the great prostitute
  - type: text
    content: who corrupted the earth with her sexual immorality.
  - type: text
    content: 'He has avenged on her the blood of his '
  - type: text
    content: loving
  - type: text
    content: ' servants.”'
  '20':
  - type: text
    content: 'The wild beast was captured, as was the false prophet who had performed miracle-signs in his presence. (It was by these miracle-signs that he had deceived those with the mark of the wild beast and those who worshiped its image.) The wild beast and the false prophet were both thrown alive into the lake of fire burning with sulfur, '
  '21':
  - type: text
    content: 'and their armies were killed by the sharp sword that came from the mouth of the rider on the '
  - type: text
    content: white
  - type: text
    content: ' horse. And all the birds gorged themselves with their flesh.'
  '3':
  - type: text
    content: 'And again they shouted:'
  - type: text
    content: “Hallelujah!
  - type: text
    content: 'The smoke from her '
  - type: text
    content: destruction
  - type: text
    content: ' goes up'
  - type: text
    content: forever and ever!”
  '4':
  - type: text
    content: 'The twenty-four elders and the four living creatures fell facedown and worshiped God, who sits on the throne, saying in '
  - type: text
    content: agreement
  - type: text
    content: ':'
  - type: text
    content: “Amen! Hallelujah!”
  '5':
  - type: text
    content: 'Then a voice came from the throne, saying:'
  - type: text
    content: '“Praise our God, all you his '
  - type: text
    content: loving
  - type: text
    content: ' servants'
  - type: text
    content: and all who reverence and honor him—
  - type: text
    content: those who are lowly and those who are great!”
  '6':
  - type: text
    content: 'Then I heard what seemed to be the thunderous voice of a great multitude, like the sound of a massive waterfall and mighty peals of thunder, crying out:'
  - type: text
    content: “Hallelujah!
  - type: text
    content: For the Lord our God, the Almighty, reigns!
  - type: note
    content: 'The Aramaic adds a clause that is missing in the Greek: “the One and Only for all.”'
  '7':
  - type: text
    content: Let us rejoice and exalt him and give him glory,
  - type: text
    content: because the wedding celebration of the Lamb has come.
  - type: note
    content: The imagery of the wedding celebration of the Lamb reinforces and expresses the beautiful intimacy that Jesus shares with his beloved bride. See Hos. 2:19; Eph. 5:26–27. This wedding feast is more than a future event; it is an experience we taste of now as we live as one with the Bridegroom (1 Cor. 6:17; 2 Tim. 4:22).
  - type: text
    content: And his bride has made herself ready.
  - type: note
    content: The Aramaic can be translated “And his bride loves him!”
  '8':
  - type: text
    content: Fine linen, shining bright and clear,
  - type: text
    content: has been given to her to wear,
  - type: text
    content: and the fine linen represents
  - type: text
    content: the righteous deeds of his holy believers.”
  - type: note
    content: The Aramaic can be translated “and the fine linens are the blessings of the holy ones.”
  '9':
  - type: text
    content: 'Then the angel said to me, “Write these words: Wonderfully blessed are those who are invited to feast at the wedding celebration of the Lamb!” And then he said to me, “These are the true words of God.”'
