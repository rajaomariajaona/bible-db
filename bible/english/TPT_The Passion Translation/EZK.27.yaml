  marker: q1
  children:
  - type: text
    text: '“I am the most beautiful city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the world
  - type: text
    text: '!”'
- type: usfm
  marker: q1
  children:
  - type: usfm
