        usfm: EZK.27.5+EZK.27.6+EZK.27.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God uses the metaphor of a ship to describe Tyre. The Grecian juniper tree is known to grow to a height of over sixty feet (eighteen meters).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all your boards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: tall
  - type: text
    text: ' cedar from Lebanon'
- type: usfm
  marker: q1
  children:
  - type: text
    text: to make a mast to stand above you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They made your oars
- type: usfm
  marker: q1
  children:
  - type: text
    text: from oaks of Bashan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and made you a fine deck with pines
- type: usfm
  marker: q1
  children:
  - type: text
    text: they took from the coasts of Cyprus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they decorated it with ivory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your sails and banners were of colorful
- type: usfm
  marker: q1
  children:
  - type: text
    text: embroidered linen from Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your deck awnings were made from
- type: usfm
  marker: q1
  children:
  - type: text
    text: the finest purple and scarlet cloth from Cyprus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the coasts of Elishah,” a city on the island of Cyprus.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Your oarsmen were '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rulers
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. In vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8–11
      metadata:
        usfm: EZK.27.8+EZK.27.9+EZK.27.10+EZK.27.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', God lists those who worked on the “ship” of Tyre and describes the crew and those who repaired it.'
    marker-yv: yv-n
  - type: text
    text: from the cities of Sidon and Arvad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your own seasoned men were your sailors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The elders and craftsmen of Byblos
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Gebal,” better known as Byblos, a town about 90 miles (144 kilometers) north of Tyre.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: were those who caulked your seams.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“ ‘Ships and sailors the world over came to trade with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Your army was composed of warriors from Persia, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first mention of Persia in the Bible. The ancient Persian people lived in the land known today as Iran.
    marker-yv: yv-n
  - type: text
    text: 'Lud, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Lydia,” the western part of modern-day Turkey.
    marker-yv: yv-n
  - type: text
    text: 'and Libya. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Put,” identified as modern-day Libya.
    marker-yv: yv-n
  - type: text
    text: 'By hanging their weapons on your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: deck
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Soldiers who traveled by ship in that day would hang their helmets and shields on the sides of the ship. In the sunlight the dozens of shiny shields and helmets would have looked impressive.
    marker-yv: yv-n
  - type: text
    text: 'they displayed your splendor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Soldiers from Arvad '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Arvad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “den of thieves.” Arvad was an island renowned for its seamen.
    marker-yv: yv-n
  - type: text
    text: 'and Helech manned your walls all around. Brave warriors '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “men of Gamad.” Although many scholars see this as a reference to a town in Syria, the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gamad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “brave warrior.”
    marker-yv: yv-n
  - type: text
    text: manned your watchtowers, hanging their shields all around your walls to make your beauty complete.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tyre’s Former Influence
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“ ‘The people of Tarshish '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tarshish was a trading colony on the west coast of Spain. The influence of Tyre was great, for Tarshish was almost twenty-five hundred miles (four thousand kilometers) from Tyre. Tarshish at that time was considered at the edge of the known world (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jonah 1:3
      metadata:
        usfm: JON.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). There are about twenty countries and lands mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 27:12–25
      metadata:
        usfm: EZK.27.12+EZK.27.13+EZK.27.14+EZK.27.15+EZK.27.16+EZK.27.17+EZK.27.18+EZK.27.19+EZK.27.20+EZK.27.21+EZK.27.22+EZK.27.23+EZK.27.24+EZK.27.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that traded with Tyre. The countries range from the western end of the Mediterranean Sea to the northern tip of Mesopotamia and the southern tip of the Arabian Peninsula. This impressive list demonstrates how important and influential Tyre and her worldwide trade were.
    marker-yv: yv-n
  - type: text
    text: 'traded with you because of your abundant resources of every kind. They imported your products and exported silver, iron, tin, and lead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The Greeks '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Javan,” the word for “Ionia” or “Greece.” It is the ancestral branch of the Greek people.
    marker-yv: yv-n
  - type: text
    text: 'along with nations of Tubal '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tubal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “brought forth.” In contemporary scholarship Tubal is considered to be Tabal, an Anatolian state and region north of the Black Sea, identified in Assyrian sources. There is a city in Russia named “Tubolsk.”
    marker-yv: yv-n
  - type: text
    text: 'and Meshech '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Meshech
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “drawing out.” Meshech was the ancestor of a people identified by Assyrian records as the “Muscu” and by Josephus as the Cappadocian “Mosocheni” (or “Mushki,” possibly Moscow).
    marker-yv: yv-n
  - type: text
    text: 'traded with you. They sold you slaves '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “They traded with the soul of man.” They were human traffickers.
    marker-yv: yv-n
  - type: text
    text: 'and metal utensils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The people of Beth Togarmah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Beth Togarmah likely refers to the people of Turkey, although some scholars identify Beth Togarmah with Armenia, which is known for horse breeding.
    marker-yv: yv-n
  - type: text
    text: 'traded for your goods, your war horses and work horses and mules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The people of Rhodes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Dedan,” an oasis in the Arabian desert. Rhodes is a Greek island and more easily fits as a sea trading partner with Tyre. The Septuagint is “Rhodes.”
    marker-yv: yv-n
  - type: text
    text: 'traded with you; many coastal lands were your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: special
  - type: text
    text: ' customers and paid you in ivory tusks and ebony wood. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Targum and the Jewish sage Rashi interpret the Hebrew word used here as “peacocks.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Edom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Aram [Syria].”
    marker-yv: yv-n
  - type: text
    text: 'traded with you emeralds, purple cloth, embroidered work and fine linen, coral and rubies for your many fine manufactured goods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Judah and the land of Israel also paid for your goods with the finest millet, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “wheat from Minnith,” a region in Ammon recognized for its strain of wheat. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 11:33
      metadata:
        usfm: JDG.11.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'spices, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of this Hebrew term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: panag
    - type: usfm
      marker: ft
      children:
      - type: text
        text: —a hapax legomenon—is unknown. But the context suggests it is some kind of food, possibly a general term for “spices.”
    marker-yv: yv-n
  - type: text
    text: 'honey, olive oil, and balm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Damascus traded with you, for quantities of your abundant resources of every kind, furnishing you with wine from Helbon '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Helbon is a Syrian town (present day Chalbum) located about ten miles (sixteen kilometers) north of Damascus, famous for high-quality wine.
    marker-yv: yv-n
  - type: text
    text: 'and unbleached wool, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
