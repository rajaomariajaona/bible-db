      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Juniper [fir tree] from Senir.” Senir is the Amorite name for Mount Hermon (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 3:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). In
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
