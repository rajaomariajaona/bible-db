document_id: EZK.27,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Funeral Song for Tyre
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '10':
  - type: text
    content: 'Your army was composed of warriors from Persia, '
  - type: note
    content: This is the first mention of Persia in the Bible. The ancient Persian people lived in the land known today as Iran.
  - type: text
    content: 'Lud, '
  - type: note
    content: Or “Lydia,” the western part of modern-day Turkey.
  - type: text
    content: 'and Libya. '
  - type: note
    content: Or “Put,” identified as modern-day Libya.
  - type: text
    content: 'By hanging their weapons on your '
  - type: text
    content: deck
  - type: text
    content: ', '
  - type: note
    content: Soldiers who traveled by ship in that day would hang their helmets and shields on the sides of the ship. In the sunlight the dozens of shiny shields and helmets would have looked impressive.
  - type: text
    content: 'they displayed your splendor. '
  '11':
  - type: text
    content: 'Soldiers from Arvad '
  - type: note
    content: Arvad means “den of thieves.” Arvad was an island renowned for its seamen.
  - type: text
    content: 'and Helech manned your walls all around. Brave warriors '
  - type: note
    content: Or “men of Gamad.” Although many scholars see this as a reference to a town in Syria, the Hebrew word gamad means “brave warrior.”
  - type: text
    content: manned your watchtowers, hanging their shields all around your walls to make your beauty complete.’ ”
  - type: heading
    content: Tyre’s Former Influence
  '12':
  - type: text
    content: '“ ‘The people of Tarshish '
  - type: note
    content: Tarshish was a trading colony on the west coast of Spain. The influence of Tyre was great, for Tarshish was almost twenty-five hundred miles (four thousand kilometers) from Tyre. Tarshish at that time was considered at the edge of the known world (see Jonah 1:3). There are about twenty countries and lands mentioned in Ezek. 27:12–25 that traded with Tyre. The countries range from the western end of the Mediterranean Sea to the northern tip of Mesopotamia and the southern tip of the Arabian Peninsula. This impressive list demonstrates how important and influential Tyre and her worldwide trade were.
  - type: text
    content: 'traded with you because of your abundant resources of every kind. They imported your products and exported silver, iron, tin, and lead. '
  '13':
  - type: text
    content: 'The Greeks '
  - type: note
    content: Or “Javan,” the word for “Ionia” or “Greece.” It is the ancestral branch of the Greek people.
  - type: text
    content: 'along with nations of Tubal '
  - type: note
    content: Tubal means “brought forth.” In contemporary scholarship Tubal is considered to be Tabal, an Anatolian state and region north of the Black Sea, identified in Assyrian sources. There is a city in Russia named “Tubolsk.”
  - type: text
    content: 'and Meshech '
  - type: note
    content: Meshech means “drawing out.” Meshech was the ancestor of a people identified by Assyrian records as the “Muscu” and by Josephus as the Cappadocian “Mosocheni” (or “Mushki,” possibly Moscow).
  - type: text
    content: 'traded with you. They sold you slaves '
  - type: note
    content: Or “They traded with the soul of man.” They were human traffickers.
  - type: text
    content: 'and metal utensils. '
  '14':
  - type: text
    content: 'The people of Beth Togarmah '
  - type: note
    content: Beth Togarmah likely refers to the people of Turkey, although some scholars identify Beth Togarmah with Armenia, which is known for horse breeding.
  - type: text
    content: 'traded for your goods, your war horses and work horses and mules. '
  '15':
  - type: text
    content: 'The people of Rhodes '
  - type: note
    content: Or “Dedan,” an oasis in the Arabian desert. Rhodes is a Greek island and more easily fits as a sea trading partner with Tyre. The Septuagint is “Rhodes.”
  - type: text
    content: 'traded with you; many coastal lands were your '
  - type: text
    content: special
  - type: text
    content: ' customers and paid you in ivory tusks and ebony wood. '
  - type: note
    content: The Targum and the Jewish sage Rashi interpret the Hebrew word used here as “peacocks.”
  '16':
  - type: text
    content: 'Edom '
  - type: note
    content: Or “Aram [Syria].”
  - type: text
    content: 'traded with you emeralds, purple cloth, embroidered work and fine linen, coral and rubies for your many fine manufactured goods. '
  '17':
  - type: text
    content: 'Judah and the land of Israel also paid for your goods with the finest millet, '
  - type: note
    content: Or “wheat from Minnith,” a region in Ammon recognized for its strain of wheat. See also Judg. 11:33.
  - type: text
    content: 'spices, '
  - type: note
    content: The meaning of this Hebrew term panag—a hapax legomenon—is unknown. But the context suggests it is some kind of food, possibly a general term for “spices.”
  - type: text
    content: 'honey, olive oil, and balm. '
  '18':
  - type: text
    content: 'Damascus traded with you, for quantities of your abundant resources of every kind, furnishing you with wine from Helbon '
  - type: note
    content: Helbon is a Syrian town (present day Chalbum) located about ten miles (sixteen kilometers) north of Damascus, famous for high-quality wine.
  - type: text
    content: 'and unbleached wool, '
  - type: note
    content: Or “wool from Zahar.” Since the location of Zahar is unknown, some etymologists believe it is a reference to the color of light yellow, thus “unbleached wool.”
  '19':
  - type: text
    content: 'casks of wine from Izalla, '
  - type: note
    content: The Hebrew text is uncertain. It reads literally “Vedan [or Dan] and Javan from Uzal.” It is somewhat strange to link Dan in northern Israel and Javan (Greece) with Uzal, a region in southern Arabia. The Hebrew word vedan is related to an Akkadian word for “barrel” or “cask” for storing wine. Izalla is a city in northeast Syria, near the upper Tigris River.
  - type: text
    content: 'polished iron, cassia and calamus '
  - type: note
    content: Cassia and calamus (or “cane”) are spice plants found in northern India and China.
  - type: text
    content: 'in exchange for your goods. '
  '2':
  - type: text
    content: '“Son of man, sing a funeral song for Tyre. '
  '20':
  - type: text
    content: 'Dedan '
  - type: note
    content: Dedan may be identified as the modern-day oasis of Al-’Ula in northern Arabia or possibly Kuwait.
  - type: text
    content: 'traded with you in saddle blankets. '
  - type: note
    content: Or literally “clothes of freedom.”
  '21':
  - type: text
    content: 'Arabia and all the sheikhs of Kedar '
  - type: note
    content: Kedar was one of the sons of Ishmael (see Gen. 25:13), whose descendants lived as nomadic tribes in the northern Arabian Desert.
  - type: text
    content: 'were your clients, '
  - type: note
    content: Or literally “traders of your hand,” a possible phrase to describe them as Tyre’s agents who acted on their behalf.
  - type: text
    content: 'selling sheep and goats to you. '
  '22':
  - type: text
    content: 'Businessmen of Sheba '
  - type: note
    content: Sheba was a kingdom in the southwestern part of the Arabian Peninsula. See 1 Kings 10:1.
  - type: text
    content: 'and Raamah '
  - type: note
    content: Raamah was possibly the capital city of Sheba.
  - type: text
    content: 'traded with you the finest spices, precious stones, and gold. '
  '23':
  - type: text
    content: 'Haran, '
  - type: note
    content: Haran was an Assyrian city about 310 miles (498 kilometers) from Tyre. Haran was the place from which Abraham migrated to Canaan (see Gen. 12:4).
  - type: text
    content: 'Canneh, '
  - type: note
    content: Canneh was an Assyrian trade center of uncertain location.
  - type: text
    content: 'and Eden, '
  - type: note
    content: This is not the “garden of Eden” but a Syrian city-state called Beth Eden located west of Haran.
  - type: text
    content: 'the merchants of Sheba, Asshur, '
  - type: note
    content: Asshur was the capital city of Assyria on the Tigris River almost five hundred miles (over eight hundred kilometers) from Tyre.
  - type: text
    content: 'and Chilmad '
  - type: note
    content: Chilmad was an Assyrian city of unknown location. This chapter lists thirty-six nations or people groups that traded with Tyre.
  - type: text
    content: 'were your trading partners. '
  '24':
  - type: text
    content: In your marketplace they sold you gorgeous embroidered clothing, purple cloaks, multi-colored carpets, and well-made cords for your merchandise.’ ”
  - type: heading
    content: Tyre, the Mistress of the Mediterranean
  '25':
  - type: text
    content: “ ‘Heavily loaded Spanish ships
  - type: note
    content: Or “Ships of Tarshish [from Spain],” a phrase that came to mean large, seagoing cargo vessels.
  - type: text
    content: carried your wares in the heart of the seas.
  '26':
  - type: text
    content: Your oarsmen rowed you
  - type: text
    content: out to the open sea.
  - type: text
    content: Stormy east winds wrecked you
  - type: text
    content: and sent you to the bottom of the sea.
  '27':
  - type: text
    content: On the day of your shipwreck,
  - type: text
    content: your riches, your goods, your cargo,
  - type: text
    content: your seamen, your sailors,
  - type: text
    content: your caulkers, your dealers,
  - type: text
    content: all the warriors you carry,
  - type: text
    content: and all the passengers who are aboard
  - type: text
    content: will sink into the heart of the sea!
  '28':
  - type: text
    content: 'When they hear the shouts of your '
  - type: text
    content: drowning
  - type: text
    content: ' sailors,'
  - type: text
    content: the people on shore will tremble with fear.
  - type: note
    content: Or “the waves will surge.” The Hebrew is uncertain.
  '29':
  - type: text
    content: All the oarsmen will abandon ship;
  - type: text
    content: the seamen and sailors will come ashore.
  '3':
  - type: text
    content: 'Say to Tyre, the city with ports on the Mediterranean Sea, merchant city for many peoples and many islands:'
  - type: text
    content: '“ ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: 'Tyre, you have boasted:'
  - type: note
    content: See Prov. 16:18; 1 Cor. 10:12.
  - type: text
    content: '“I am the most beautiful city '
  - type: text
    content: in the world
  - type: text
    content: '!”'
  '30':
  - type: text
    content: They will wail aloud over you
  - type: text
    content: and weep bitterly.
  - type: text
    content: 'They will throw dust on their heads '
  - type: text
    content: in mourning
  - type: text
    content: and lie in ashes.
  '31':
  - type: text
    content: 'They will shave their heads '
  - type: text
    content: in sorrow
  - type: text
    content: ' for you'
  - type: text
    content: and dress themselves in sackcloth.
  - type: text
    content: 'They will weep bitterly for you, '
  - type: text
    content: Tyre
  - type: text
    content: ','
  - type: text
    content: 'with heartfelt sorrow over your '
  - type: text
    content: fall
  - type: text
    content: .
  '32':
  - type: text
    content: Grieving, they will chant a funeral song for you,
  - type: text
    content: 'and wail with lament over you, saying:'
  - type: text
    content: “Who is like Tyre,
  - type: text
    content: like a tower surrounded by the sea?”
  - type: note
    content: Or “now silent in the midst of the sea.” The Hebrew is uncertain.
  '33':
  - type: text
    content: When you exported your goods
  - type: text
    content: to satisfy so many peoples
  - type: text
    content: with the abundance of your wealth and wares
  - type: text
    content: you enriched the kings of the earth.
  '34':
  - type: text
    content: Now you are broken to pieces by the waves;
  - type: text
    content: you lie at the bottom of the sea.
  - type: text
    content: Your cargo and all your crew
  - type: text
    content: have foundered with you.
  '35':
  - type: text
    content: Those who dwell on the coast and the islands
  - type: text
    content: are stunned at your fate.
  - type: text
    content: Horror is written on the faces of their kings,
  - type: text
    content: and their hair stands on end.
  '36':
  - type: text
    content: Your trading partners hiss at you in scorn,
  - type: text
    content: for you have come to a dreadful end.
  - type: text
    content: You are gone forever, never to return!’ ”
  - type: note
    content: The kingdom of Tyre can be compared to Babylon, the harlot of Rev. 17–18. Tyre enriched the kingdoms of the world with her wealth and merchandise (see Ezek. 27:33). Those who traded with her bought and sold, exemplifying the ones who will receive the mark of the beast (see Rev. 13:13–18) and reminding us of Jesus, who cleansed God’s temple, throwing out all those who bought and sold.
  '4':
  - type: text
    content: Your frontiers were on the high sea,
  - type: text
    content: and those who built you
  - type: text
    content: made you perfect in beauty.
  '5':
  - type: text
    content: As if they were building a ship
  - type: text
    content: they used cypress from Mount Hermon
  - type: note
    content: Or “Juniper [fir tree] from Senir.” Senir is the Amorite name for Mount Hermon (see Deut. 3:9). In Ezek. 27:5–7 God uses the metaphor of a ship to describe Tyre. The Grecian juniper tree is known to grow to a height of over sixty feet (eighteen meters).
  - type: text
    content: for all your boards,
  - type: text
    content: 'and a '
  - type: text
    content: tall
  - type: text
    content: ' cedar from Lebanon'
  - type: text
    content: to make a mast to stand above you.
  '6':
  - type: text
    content: They made your oars
  - type: text
    content: from oaks of Bashan,
  - type: text
    content: and made you a fine deck with pines
  - type: text
    content: they took from the coasts of Cyprus,
  - type: text
    content: and they decorated it with ivory.
  '7':
  - type: text
    content: Your sails and banners were of colorful
  - type: text
    content: embroidered linen from Egypt.
  - type: text
    content: Your deck awnings were made from
  - type: text
    content: the finest purple and scarlet cloth from Cyprus.
  - type: note
    content: Or “the coasts of Elishah,” a city on the island of Cyprus.
  '8':
  - type: text
    content: 'Your oarsmen were '
  - type: text
    content: rulers
  - type: text
    content: ' '
  - type: note
    content: As translated from the Septuagint. In vv. 8–11, God lists those who worked on the “ship” of Tyre and describes the crew and those who repaired it.
  - type: text
    content: from the cities of Sidon and Arvad,
  - type: text
    content: and your own seasoned men were your sailors.
  '9':
  - type: text
    content: The elders and craftsmen of Byblos
  - type: note
    content: Or “Gebal,” better known as Byblos, a town about 90 miles (144 kilometers) north of Tyre.
  - type: text
    content: were those who caulked your seams.
  - type: text
    content: '“ ‘Ships and sailors the world over came to trade with you. '
