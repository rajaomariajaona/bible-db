          text: 7:37–38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The name of the star is Bitterness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wormwood” or “poisonwood,” a bitter herb (absinthe) known for its medicinal value in killing intestinal worms.
      marker-yv: yv-n
    - type: text
      text: A third of the waters became so bitter that many people died.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fourth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was on the fourth day of creation that the moon, sun, and stars were set in place. They were meant to “rule,” so they speak of governmental authority. It was to the fourth church that Jesus promised the overcomers that they will be given the Morning Star. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'angel sounded his trumpet and a third of the sun was struck, and a third of the moon, and a third of the stars, so that a third of their light was darkened, and there was no light for a third of the day and likewise the night. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The old order is dimming and passing away as all things become new and a new “exodus” is upon us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 10:21–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I saw and heard an eagle flying overhead, crying out with a loud voice, “Woe, woe, woe, to the people of the earth, because of the next three trumpets about to be sounded by the other three angels!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And then I saw the seven angels who stand before God, and each was given a trumpet.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These may be a special class of angelic beings (archangels) named in Jewish tradition and given in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 1 Enoch
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as Raphael, Uriel, Michael, Raguel, Sariel, Gabriel, and Remiel. A trumpet represents sounding out a specific and clear word from the Lord, bringing revelation to the hearts of his people.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the eighth angel with a golden incense burner came and took his place at the incense altar. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This eighth (or “another”) messenger taking his place at the golden altar is Christ, our Great High Priest, and the great quantity of incense is his intercession, which he mingles with ours. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 141:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . No angel is ever seen doing the work of the high priest as in this chapter.
      marker-yv: yv-n
    - type: text
      text: 'He was given a great quantity of incense to offer up, consisting of the prayers of God’s holy people, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to offer up incense, which is the prayers of God’s holy ones.”
      marker-yv: yv-n
    - type: text
      text: 'upon the golden altar that is before the throne. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the smoke of the incense with the prayers of the holy ones billowed up before God from the hand of the angel. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are six specific items found in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and they are all related to a heavenly, priestly ministry: an angel (messenger), an altar, a golden incense burner, incense, prayers, and smoke. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 16:11–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel filled the golden incense burner with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: coals of
    - type: text
      text: ' fire from the altar and hurled it onto the earth, releasing great peals of thunder, voices, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sounds.”
      marker-yv: yv-n
    - type: text
      text: lightning flashes, and an earthquake.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As our prayers, mixed with the intercession of our High Priest, Jesus, ascend in the Spirit, the very coals of fire from the altar are cast into the earth, which releases mighty power. The voices carry the word of the Lord. The thunder manifests God’s power (
      - type: text
        text: Job 26:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 29:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The lightning strikes illuminate divine truth (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 97:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) as a great earthquake shakes the kingdoms of men to their foundations. These are not just acts of judgment, but purification (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 6:6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 12:49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Trumpets
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the seven angels prepared to sound their trumpets. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the first angel sounded his trumpet, there came forth hail and fire mixed with blood, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “mixed with water.”
      marker-yv: yv-n
    - type: text
      text: 'and it was hurled to the earth. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This corresponds to the plague sent upon Egypt (a type of the world system; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 9:23–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Hail may be a picture of the word of God that destroys the hiding place of lies and false doctrines (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 28:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'A third of the earth was burned up, destroying a third of the trees '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Trees may speak of what is deeply rooted in human nature that will be destroyed by “blood mixed with fire.” Christ’s blood and Spirit-fire will purify our lives.
      marker-yv: yv-n
    - type: text
      text: and all green grass.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Grass is consistently used in Scripture as a picture of our flesh (nature). Grass is a surface covering and can be a mask that hides what is beneath.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the second angel sounded his trumpet, something like a huge mountain burning with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: flames of
    - type: text
      text: ' fire was thrown into the sea, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:8
      - type: usfm
        marker: ft
