document_id: REV.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lamb Breaks Open the Seventh Seal
  - type: text
    content: 'When the Lamb broke open the seventh seal, heaven fell silent for about half an hour. '
  - type: note
    content: When the first seal was broken open, it released thunder, but when the seventh seal was opened, it released the silence of the awe of God. The period of silence is because of the enormity and revelation that will be released through the last seal, bringing fullness to God’s work. Silence also points to perfect peace. The opening of the seventh seal will bring heaven’s peace into the created realm, for there is no time (half an hour, a compound Greek word taken from half and kairos, or a fixed, appointed time) in the eternal realm.
  '10':
  - type: text
    content: 'The third angel sounded his trumpet, and a megastar, '
  - type: note
    content: The great or megastar is identified in Rev. 22:16 as Jesus. See also Num. 24:17–19.
  - type: text
    content: 'blazing like a torch, '
  - type: note
    content: Or “lamp.” See Ps. 119:105. The burning torch is the burning Word of God.
  - type: text
    content: 'descended from heaven upon a third of the rivers and fountains. '
  - type: note
    content: Rivers and fountains are also within the believer (Ps. 36:7–9; John 4:14; 7:37–38.)
  '11':
  - type: text
    content: 'The name of the star is Bitterness. '
  - type: note
    content: Or “wormwood” or “poisonwood,” a bitter herb (absinthe) known for its medicinal value in killing intestinal worms.
  - type: text
    content: A third of the waters became so bitter that many people died.
  '12':
  - type: text
    content: 'The fourth '
  - type: note
    content: It was on the fourth day of creation that the moon, sun, and stars were set in place. They were meant to “rule,” so they speak of governmental authority. It was to the fourth church that Jesus promised the overcomers that they will be given the Morning Star. See Dan. 12:3; Mal. 4:2.
  - type: text
    content: 'angel sounded his trumpet and a third of the sun was struck, and a third of the moon, and a third of the stars, so that a third of their light was darkened, and there was no light for a third of the day and likewise the night. '
  - type: note
    content: The old order is dimming and passing away as all things become new and a new “exodus” is upon us. See Ex. 10:21–23.
  '13':
  - type: text
    content: Then I saw and heard an eagle flying overhead, crying out with a loud voice, “Woe, woe, woe, to the people of the earth, because of the next three trumpets about to be sounded by the other three angels!”
  '2':
  - type: text
    content: And then I saw the seven angels who stand before God, and each was given a trumpet.
  - type: note
    content: These may be a special class of angelic beings (archangels) named in Jewish tradition and given in 1 Enoch as Raphael, Uriel, Michael, Raguel, Sariel, Gabriel, and Remiel. A trumpet represents sounding out a specific and clear word from the Lord, bringing revelation to the hearts of his people.
  '3':
  - type: text
    content: 'Then the eighth angel with a golden incense burner came and took his place at the incense altar. '
  - type: note
    content: This eighth (or “another”) messenger taking his place at the golden altar is Christ, our Great High Priest, and the great quantity of incense is his intercession, which he mingles with ours. See Ps. 141:2; Heb. 3:1; 7:25; 8:1–2; 9:11. No angel is ever seen doing the work of the high priest as in this chapter.
  - type: text
    content: 'He was given a great quantity of incense to offer up, consisting of the prayers of God’s holy people, '
  - type: note
    content: Or “to offer up incense, which is the prayers of God’s holy ones.”
  - type: text
    content: 'upon the golden altar that is before the throne. '
  '4':
  - type: text
    content: 'And the smoke of the incense with the prayers of the holy ones billowed up before God from the hand of the angel. '
  - type: note
    content: 'There are six specific items found in vv. 3–4, and they are all related to a heavenly, priestly ministry: an angel (messenger), an altar, a golden incense burner, incense, prayers, and smoke. See Lev. 16:11–14.'
  '5':
  - type: text
    content: 'Then the angel filled the golden incense burner with '
  - type: text
    content: coals of
  - type: text
    content: ' fire from the altar and hurled it onto the earth, releasing great peals of thunder, voices, '
  - type: note
    content: Or “sounds.”
  - type: text
    content: lightning flashes, and an earthquake.
  - type: note
    content: As our prayers, mixed with the intercession of our High Priest, Jesus, ascend in the Spirit, the very coals of fire from the altar are cast into the earth, which releases mighty power. The voices carry the word of the Lord. The thunder manifests God’s power (Job 26:14; Ps. 29:3–4). The lightning strikes illuminate divine truth (Ps. 97:4) as a great earthquake shakes the kingdoms of men to their foundations. These are not just acts of judgment, but purification (Isa. 6:6–7; Luke 12:49).
  - type: heading
    content: The Trumpets
  '6':
  - type: text
    content: 'Then the seven angels prepared to sound their trumpets. '
  '7':
  - type: text
    content: 'When the first angel sounded his trumpet, there came forth hail and fire mixed with blood, '
  - type: note
    content: The Aramaic can be translated “mixed with water.”
  - type: text
    content: 'and it was hurled to the earth. '
  - type: note
    content: This corresponds to the plague sent upon Egypt (a type of the world system; see Ex. 9:23–25). Hail may be a picture of the word of God that destroys the hiding place of lies and false doctrines (Isa. 28:17).
  - type: text
    content: 'A third of the earth was burned up, destroying a third of the trees '
  - type: note
    content: Trees may speak of what is deeply rooted in human nature that will be destroyed by “blood mixed with fire.” Christ’s blood and Spirit-fire will purify our lives.
  - type: text
    content: and all green grass.
  - type: note
    content: Grass is consistently used in Scripture as a picture of our flesh (nature). Grass is a surface covering and can be a mask that hides what is beneath.
  '8':
  - type: text
    content: 'When the second angel sounded his trumpet, something like a huge mountain burning with '
  - type: text
    content: flames of
  - type: text
    content: ' fire was thrown into the sea, '
  - type: note
    content: See Matt. 17:20. The kingdom of God is like a mountain (Isa. 2:1–3). The sea is a frequent metaphor for humanity (the sea of humanity). This is the mountain kingdom of God and his Spirit-fire cast into the sea of our lives. The sea creatures being destroyed (v. 9) can refer to the ungodly desires and activities of the flesh that live in the depths of our hearts. What once was life to us becomes undrinkable. See also Ex. 15:22–26; Jer. 23:13–15.
  - type: text
    content: 'destroying a third of the ships. '
  - type: note
    content: See Rev. 18:9–10, 17–19. The ships are all part of the activities of the system of Babylon.
  '9':
  - type: text
    content: A third of the sea turned into blood, destroying a third of all sea creatures.
