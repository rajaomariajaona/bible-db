document_id: REV.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lamb Breaks Open the Seventh Seal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Lamb broke open the seventh seal, heaven fell silent for about half an hour. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When the first seal was broken open, it released thunder, but when the seventh seal was opened, it released the silence of the awe of God. The period of silence is because of the enormity and revelation that will be released through the last seal, bringing fullness to God’s work.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Silence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: also points to perfect peace. The opening of the seventh seal will bring heaven’s peace into the created realm, for there is no time (half an hour, a compound Greek word taken from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: half
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kairos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', or a fixed, appointed time) in the eternal realm.'
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The third angel sounded his trumpet, and a megastar, '
