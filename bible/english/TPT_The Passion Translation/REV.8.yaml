      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 17:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The kingdom of God is like a mountain (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 2:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The sea is a frequent metaphor for humanity (the sea of humanity). This is the mountain kingdom of God and his Spirit-fire cast into the sea of our lives. The sea creatures being destroyed (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) can refer to the ungodly desires and activities of the flesh that live in the depths of our hearts. What once was life to us becomes undrinkable. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 15:22–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
