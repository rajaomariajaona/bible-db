document_id: PSA.56,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Trusting in God
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s golden song of instruction composed when the Philistines captured him in Gath To the tune of “The Oppression of the Princes to Come”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '56'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the distant dove of silence.” David was no more than twenty-two years old when he composed this psalm.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, show me your kindness and mercy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for these men oppose and oppress me all day long.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I trust in the Lord. And I praise him!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I trust in the Word of God. And I praise him!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What harm could man do to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With God on my side, I will not be afraid of what comes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart overflows with praise to God and for his promises.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will always trust in him.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I’m thanking you with all my heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with gratitude for all you’ve done.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will do everything I’ve promised you, Lord.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have saved my soul from death
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my feet from stumbling
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that I can walk before the Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bathed in his life-giving light.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in his fields of life.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a day goes by without somebody harassing me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So many in their pride trample me under their feet.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “They war with me in the high places.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in the day that I’m afraid, I lay all my fears before you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and trust in you with all my heart.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What harm could a man bring to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With God on my side, I will not be afraid of what comes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The roaring praises of God fill my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I trust his promises.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day after day cruel critics distort my words;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: constantly they plot my collapse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They lurk in the dark, waiting, spying on my movements in secret
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to take me by surprise, ready to take my life.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They don’t deserve to get away with this!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at their wickedness, their injustice, Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your fierce anger cast them down to defeat.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve kept track of all my wandering and my weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’ve stored my many tears in your bottle—not one will be lost.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are all recorded in your book of remembrance.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 56:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The very moment I call to you for '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a father’s
    - type: text
      text: ' help'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the tide of battle turns and my enemies flee.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This one thing I know: God is on my side!'
