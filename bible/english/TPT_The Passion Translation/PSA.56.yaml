document_id: PSA.56,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Trusting in God
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s golden song of instruction composed when the Philistines captured him in Gath To the tune of “The Oppression of the Princes to Come”
  - type: note
    content: Or “the distant dove of silence.” David was no more than twenty-two years old when he composed this psalm.
  - type: text
    content: Lord, show me your kindness and mercy,
  - type: text
    content: for these men oppose and oppress me all day long.
  '10':
  - type: text
    content: I trust in the Lord. And I praise him!
  - type: text
    content: I trust in the Word of God. And I praise him!
  '11':
  - type: text
    content: What harm could man do to me?
  - type: text
    content: With God on my side, I will not be afraid of what comes.
  - type: text
    content: My heart overflows with praise to God and for his promises.
  - type: text
    content: I will always trust in him.
  '12':
  - type: text
    content: So I’m thanking you with all my heart,
  - type: text
    content: with gratitude for all you’ve done.
  - type: text
    content: I will do everything I’ve promised you, Lord.
  '13':
  - type: text
    content: For you have saved my soul from death
  - type: text
    content: and my feet from stumbling
  - type: text
    content: so that I can walk before the Lord
  - type: text
    content: bathed in his life-giving light.
  - type: note
    content: Or “in his fields of life.”
  '2':
  - type: text
    content: Not a day goes by without somebody harassing me.
  - type: text
    content: So many in their pride trample me under their feet.
  - type: note
    content: The Septuagint reads “They war with me in the high places.”
  '3':
  - type: text
    content: But in the day that I’m afraid, I lay all my fears before you
  - type: text
    content: and trust in you with all my heart.
  '4':
  - type: text
    content: What harm could a man bring to me?
  - type: text
    content: With God on my side, I will not be afraid of what comes.
  - type: text
    content: The roaring praises of God fill my heart
  - type: text
    content: as I trust his promises.
  '5':
  - type: text
    content: Day after day cruel critics distort my words;
  - type: text
    content: constantly they plot my collapse.
  '6':
  - type: text
    content: They lurk in the dark, waiting, spying on my movements in secret
  - type: text
    content: to take me by surprise, ready to take my life.
  '7':
  - type: text
    content: They don’t deserve to get away with this!
  - type: text
    content: Look at their wickedness, their injustice, Lord.
  - type: text
    content: In your fierce anger cast them down to defeat.
  '8':
  - type: text
    content: You’ve kept track of all my wandering and my weeping.
  - type: text
    content: You’ve stored my many tears in your bottle—not one will be lost.
  - type: text
    content: For they are all recorded in your book of remembrance.
  - type: note
    content: See Mal. 3:16.
  '9':
  - type: text
    content: 'The very moment I call to you for '
  - type: text
    content: a father’s
  - type: text
    content: ' help'
  - type: text
    content: the tide of battle turns and my enemies flee.
  - type: text
    content: 'This one thing I know: God is on my side!'
