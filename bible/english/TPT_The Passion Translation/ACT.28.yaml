document_id: ACT.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul on the Island of Malta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After we had safely reached land, we discovered that the island we were on was Malta. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The people who lived there showed us extraordinary kindness, for they welcomed us around the fire they had built because it was cold and rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When Paul had gathered an armful of brushwood and was setting it on the fire, a venomous snake was driven out by the heat and latched onto Paul’s hand with its fangs. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the islanders saw the snake dangling from Paul’s hand, they said to one another, “No doubt about it, this guy is a murderer. Even though he escaped death at sea, Justice '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication in the Greek text is that they were referring to a “goddess of justice,” perhaps a local deity.
    marker-yv: yv-n
  - type: text
    text: has now caught up with him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Paul shook the snake off, flung it into the fire, and suffered no harm at all. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Everyone watched him, expecting him to swell up or suddenly drop dead. After observing him for a long time and seeing that nothing unusual happened, they changed their minds and said, “He must be a god!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The Roman governor of the island, named Publius, had his estate nearby. He graciously welcomed us as his houseguests and showed us hospitality for the three days that we stayed with him. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'His father lay sick in bed, suffering from fits of high fever and dysentery. So Paul went into his room, and after praying, placed his hands on him. He was instantly healed. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the people of the island heard about this miracle, they brought all the sick to Paul, and they were also healed. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although Paul was technically a prisoner, he was the one setting everyone free. No doubt he preached the gospel with signs and wonders, leaving the island healed in more ways than one.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The islanders honored us greatly, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “They honored us with many honors.”
    marker-yv: yv-n
  - type: text
    text: and when we were preparing to set sail again, they gave us all the supplies we needed for our journey.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Reaches Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: After three months we put out to sea on an Egyptian ship from Alexandria that had wintered at the island. The ship had carved on its prow as its emblem the “Heavenly Twins.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were the twin sons of Zeus, Castor and Pollux. The Aramaic is “flying the flag of Gemini.” This was a widespread cult in Egypt in that era.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When we landed at Syracuse, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the city on the eastern coast of Sicily.
    marker-yv: yv-n
  - type: text
    text: 'we stayed there for three days. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'From there we set sail for the Italian city of Rhegium. The day after we landed, a south wind sprang up that enabled us to reach Puteoli '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was on the western coast of Italy, with a road leading to Rome, about 145 miles to the north.
    marker-yv: yv-n
  - type: text
    text: 'in two days. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: There we found some believers, who begged us to stay with them for a week. Afterward, we made our way to Rome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When the believers were alerted we were coming, they came out to meet us at the Forum of Appius '
  - type: usfm
    marker: it
    children:
    - type: text
      text: while we were still a great distance from Rome
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Forum of Appius was about forty-three miles away from Rome.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Another group met us
  - type: text
    text: ' at the Three Taverns. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Three Taverns was about thirty-three miles from Rome.
    marker-yv: yv-n
  - type: text
    text: When Paul saw the believers, his heart was greatly encouraged and he thanked God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When we finally entered Rome, Paul was turned over to the authorities and was allowed to live where he pleased, with one soldier assigned to guard him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Speaks to Prominent Jews of Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'After three days Paul called together all the prominent members of the Jewish community of Rome. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some believe there could have been as many as fifty thousand Jews living in Rome at the time of Paul’s visit.
    marker-yv: yv-n
  - type: text
    text: 'When they had all assembled, Paul said to them, “My fellow Jews, while I was in Jerusalem, I was handed over as a prisoner of the Romans for prosecution, even though I had done nothing against any of our people or our Jewish customs. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'After hearing my case, the Roman authorities wanted to release me since they found nothing that deserved a death sentence. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'When the Jews objected to this, I felt it necessary, with no malice against them, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “not that I had any feud against my own nation.”
    marker-yv: yv-n
  - type: text
    text: 'to appeal to Caesar. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: This, then, is the reason I’ve asked to speak with you, so that I could explain these things. It is only because I believe in the Hope of Israel that I am in chains before you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They replied, “We haven’t received any letters from the Jews of Judea, nor has anyone come to us with a bad report about you. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But we are anxious to hear you present your views regarding this Christian sect we’ve been hearing about, for people everywhere are speaking against it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So they set a time to meet with Paul. On that day an even greater crowd gathered where he was staying. From morning until evening Paul taught them, opening up the truths of God’s kingdom. With convincing arguments from both the Law and the Prophets, he tried to persuade them about Jesus. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about the purpose of Jesus’ coming, which would include his life, ministry, death for our sins, and glorious resurrection.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Some were converted, but others refused to believe. They argued back and forth, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'still unable to agree among themselves. They were about to leave when Paul made one last statement to them: “The Holy Spirit stated it well when he spoke to your ancestors through the prophet Isaiah:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “The Holy Spirit spoke beautifully through the mouth of Isaiah the prophet.”
    marker-yv: yv-n
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 6:9–10
      metadata:
        usfm: ISA.6.9+ISA.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '‘I send you to this people to say to them, “You will keep learning, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “listening.”
    marker-yv: yv-n
  - type: text
    text: 'but not understanding. You will keep staring at truth but not perceiving it. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For your hearts are hard and insensitive to me—you must be hard of hearing! For you’ve closed your eyes so that you won’t be troubled by the truth, and you’ve covered your ears so that you won’t have to listen and be pierced by what I say. For then you would have to respond and repent, so that I could heal your hearts.” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “So listen well. This wonderful salvation given by God is now being presented to the non-Jewish nations, and they will believe and receive it!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: ACT.28.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is not included in the oldest and most reliable Greek manuscript, and it is omitted from almost every modern translation, including the Aramaic. Verse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '29'
      metadata:
        usfm: ACT.28.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', if included, would read “After hearing this, the Jews left with a heated argument among themselves.”'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Paul lived two more years in Rome, in his own rented quarters, welcoming all who came to visit. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He continued to proclaim to all the truths of God’s kingdom realm, teaching them about the Lord Jesus, the Anointed One, speaking triumphantly and without any restriction.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 28:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tradition says that Paul was eventually released from house arrest and traveled to Spain. But the inspired account ends here, with Paul ministering to all who came to him. This completes the Acts of the Holy Spirit as recorded by Luke. Although the book of Acts is finished, the acts of God continue to be accomplished through his apostolic company of surrendered lovers. Every believer has the same Holy Spirit and can do the works of Jesus on the earth today.
    marker-yv: yv-n
