  - type: heading
    content: Idols of the Heart
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 14–19 contains a series of prophecies of God’s coming judgment, meant to show that God was right to punish the people using invading enemies to capture Jerusalem.
  - type: text
    content: 'One day, some leaders of Israel came to me to consult '
  - type: text
    content: about what God was saying
  - type: text
    content: '. While they were sitting there with me, '
  '10':
  - type: text
    content: 'Both the prophet and the one who consults him will be equally punished for their guilt. '
  '11':
  - type: text
    content: I will do this
  - type: text
    content: ' so that they will never stray from me again or defile themselves with their rebellion. Then they will be my '
  - type: text
    content: faithful
  - type: text
    content: ' people, and I will be their '
  - type: text
    content: faithful
  - type: text
    content: ' God. For I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  - type: heading
    content: God’s Justice
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 14:12–17:24 is the fourth panel (D) in the chiastic parallel structure in Ezekiel. This section contains allegorical judgments against Israel, as well as the foretelling of new covenant blessing for the people of God. This section—panel D—constitutes the parallel with panel D1 in chs. 38–39, containing the Gog and Magog prophecies—symbolic judgment against the nations. There is likewise the promise of renewal and new covenant blessing for Israel.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying: '
  '13':
  - type: text
    content: '“Son of man, suppose all the people living in a certain country wander from me in pursuit of their sin, then I decide to come against them. I would punish them by destroying their food supply, inflicting famine on them, and causing people and animals to starve to death. '
  '14':
  - type: text
    content: 'Even if the three '
  - type: text
    content: godly
  - type: text
    content: ' men, Noah, Daniel, and Job, '
  - type: note
    content: These three godly men, Noah, Daniel (although Ezekiel uses a slightly different Hebrew spelling, “Danel”), and Job, were heroes in the Jewish faith and known for their virtue and exceptional integrity. Daniel was a contemporary of Ezekiel, and the Jews in captivity would have known who he was.
  - type: text
    content: 'all lived there, their righteous lives could only save themselves—no one else. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '15':
  - type: text
    content: '“Or suppose I unleash wild animals on that country to roam through the land killing its people, '
  - type: note
    content: Or “and [the animals] make it [the land] childless.”
  - type: text
    content: 'making the land so dangerous that no one would dare pass through it. '
  '16':
  - type: text
    content: 'Even if these three '
  - type: text
    content: godly
  - type: text
    content: ' men lived there, as surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', am the living God, they would not be able to save even their own children. They alone would be spared, and the country would become a desert.'
  '17':
  - type: text
    content: '“Or suppose I were to bring war upon that country, sending enemies with swords to devastate the land and wipe out both people and animals. '
  '18':
  - type: text
    content: 'Even if these three '
  - type: text
    content: godly
  - type: text
    content: ' men lived there, as surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', am the living God, they would not be able to save either son or daughter; they alone would be saved.'
  '19':
  - type: text
    content: '“Or suppose I were to send a pandemic on that country and pour out my wrath upon the people with a bloody death and wipe out both people and animals. '
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '20':
  - type: text
    content: 'Even if Noah, Daniel, and Job lived there, as surely as I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', am the living God—their righteousness would only be able to save themselves and not even their own children.”'
  - type: heading
    content: Destruction of Jerusalem
  '21':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, “How much worse it will be for Jerusalem when I send my four dreadful scourges—sword, famine, wild animals, and pandemic—to destroy both people and animals. '
  '22':
  - type: text
    content: 'Even so, there will be a remnant left, a few who survive. '
  - type: text
    content: Enemy soldiers
  - type: text
    content: ' will bring your wicked sons and daughters out of the city, and they will be brought '
  - type: text
    content: here to Babylon
  - type: text
    content: '. '
  - type: note
    content: Or “and when they come out to you [in Babylon].”
  - type: text
    content: 'When you see them and realize how '
  - type: text
    content: sinful
  - type: text
    content: ' are their ways and deeds, then you will not feel so sad when you understand that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', brought all these disasters upon Jerusalem. '
  '23':
  - type: text
    content: 'You will feel better when you see their '
  - type: text
    content: evil
  - type: text
    content: ' way of life and actions, for then you will realize that I had a good reason to do what I did. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '3':
  - type: text
    content: '“Son of man, these men have set up idols deep within their hearts. And they have set idols '
  - type: note
    content: Or “the stumbling block of iniquity,” that is, idolatry. The implied meaning is that these leaders had idols set up both in their hearts and in their homes.
  - type: text
    content: 'before their eyes, so why should I let them ask me anything? '
  - type: note
    content: Clearly, these men were hypocrites who wanted to hear a word from God while hiding idolatry in their hearts. They had no intention of forsaking their sins; they merely wanted to have a prophet give them a word they wanted to hear.
  '4':
  - type: text
    content: 'So tell them this, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: If any Israelite comes to consult with the prophet despite a heart that worships idols and eyes looking on that which leads into wickedness, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will answer that person directly. I will give the answer that is deserved because of the great extent of the idolatry. '
  '5':
  - type: text
    content: And in this way I hope to capture the hearts of the people of Israel who have all been estranged because of all their idols.’
  '6':
  - type: text
    content: '“Therefore, prophesy to the people of Israel, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Repent! Come back '
  - type: text
    content: to me
  - type: text
    content: ' and forsake your idols. Once and for all, turn your backs on all your detestable practices. '
  '7':
  - type: text
    content: 'If any Israelite or a foreigner living among you rejects me with idolatry of the heart and has intentionally gazed on that which leads into wickedness, yet goes to consult with a prophet, then, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will answer that person myself. '
  '8':
  - type: text
    content: 'I will oppose that person! '
  - type: note
    content: Or “I will set my face against that person.”
  - type: text
    content: 'I will cut the idolator off from my people as an example and a warning '
  - type: note
    content: Or “a proverb.”
  - type: text
    content: 'to others. And then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And if the prophet is tricked into speaking a prophetic word, it is I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', who allowed this to happen, '
  - type: note
    content: Or “enticed that prophet.”
  - type: text
    content: 'for I have decided to punish him with death. '
