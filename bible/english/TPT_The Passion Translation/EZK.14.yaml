document_id: EZK.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idols of the Heart
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ezekiel 14–19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: contains a series of prophecies of God’s coming judgment, meant to show that God was right to punish the people using invading enemies to capture Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'One day, some leaders of Israel came to me to consult '
  - type: usfm
    marker: it
    children:
    - type: text
      text: about what God was saying
  - type: text
    text: '. While they were sitting there with me, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Son of man, these men have set up idols deep within their hearts. And they have set idols '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the stumbling block of iniquity,” that is, idolatry. The implied meaning is that these leaders had idols set up both in their hearts and in their homes.
    marker-yv: yv-n
  - type: text
    text: 'before their eyes, so why should I let them ask me anything? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Clearly, these men were hypocrites who wanted to hear a word from God while hiding idolatry in their hearts. They had no intention of forsaking their sins; they merely wanted to have a prophet give them a word they wanted to hear.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So tell them this, ‘Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: If any Israelite comes to consult with the prophet despite a heart that worships idols and eyes looking on that which leads into wickedness, I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', will answer that person directly. I will give the answer that is deserved because of the great extent of the idolatry. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And in this way I hope to capture the hearts of the people of Israel who have all been estranged because of all their idols.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Therefore, prophesy to the people of Israel, ‘Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you: Repent! Come back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to me
  - type: text
    text: ' and forsake your idols. Once and for all, turn your backs on all your detestable practices. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If any Israelite or a foreigner living among you rejects me with idolatry of the heart and has intentionally gazed on that which leads into wickedness, yet goes to consult with a prophet, then, I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', will answer that person myself. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'I will oppose that person! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will set my face against that person.”
    marker-yv: yv-n
  - type: text
    text: 'I will cut the idolator off from my people as an example and a warning '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a proverb.”
    marker-yv: yv-n
  - type: text
    text: 'to others. And then you will know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And if the prophet is tricked into speaking a prophetic word, it is I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', who allowed this to happen, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “enticed that prophet.”
    marker-yv: yv-n
  - type: text
    text: 'for I have decided to punish him with death. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Both the prophet and the one who consults him will be equally punished for their guilt. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: I will do this
  - type: text
    text: ' so that they will never stray from me again or defile themselves with their rebellion. Then they will be my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: faithful
  - type: text
    text: ' people, and I will be their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: faithful
  - type: text
    text: ' God. For I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.’ ”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Justice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ezekiel 14:12–17:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the fourth panel (D) in the chiastic parallel structure in Ezekiel. This section contains allegorical judgments against Israel, as well as the foretelling of new covenant blessing for the people of God. This section—panel D—constitutes the parallel with panel D
    - type: usfm
      marker: ord
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: in chs.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 38–39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', containing the Gog and Magog prophecies—symbolic judgment against the nations. There is likewise the promise of renewal and new covenant blessing for Israel.'
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Son of man, suppose all the people living in a certain country wander from me in pursuit of their sin, then I decide to come against them. I would punish them by destroying their food supply, inflicting famine on them, and causing people and animals to starve to death. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Even if the three '
  - type: usfm
    marker: it
    children:
    - type: text
      text: godly
  - type: text
    text: ' men, Noah, Daniel, and Job, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These three godly men, Noah, Daniel (although Ezekiel uses a slightly different Hebrew spelling, “Danel”), and Job, were heroes in the Jewish faith and known for their virtue and exceptional integrity. Daniel was a contemporary of Ezekiel, and the Jews in captivity would have known who he was.
    marker-yv: yv-n
  - type: text
    text: 'all lived there, their righteous lives could only save themselves—no one else. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Or suppose I unleash wild animals on that country to roam through the land killing its people, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “and [the animals] make it [the land] childless.”
    marker-yv: yv-n
  - type: text
    text: 'making the land so dangerous that no one would dare pass through it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Even if these three '
  - type: usfm
    marker: it
    children:
    - type: text
      text: godly
  - type: text
    text: ' men lived there, as surely as I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', am the living God, they would not be able to save even their own children. They alone would be spared, and the country would become a desert.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Or suppose I were to bring war upon that country, sending enemies with swords to devastate the land and wipe out both people and animals. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Even if these three '
  - type: usfm
    marker: it
    children:
    - type: text
      text: godly
  - type: text
    text: ' men lived there, as surely as I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', am the living God, they would not be able to save either son or daughter; they alone would be saved.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Or suppose I were to send a pandemic on that country and pour out my wrath upon the people with a bloody death and wipe out both people and animals. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Even if Noah, Daniel, and Job lived there, as surely as I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', am the living God—their righteousness would only be able to save themselves and not even their own children.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destruction of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying, “How much worse it will be for Jerusalem when I send my four dreadful scourges—sword, famine, wild animals, and pandemic—to destroy both people and animals. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Even so, there will be a remnant left, a few who survive. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Enemy soldiers
  - type: text
    text: ' will bring your wicked sons and daughters out of the city, and they will be brought '
  - type: usfm
    marker: it
    children:
    - type: text
      text: here to Babylon
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “and when they come out to you [in Babylon].”
    marker-yv: yv-n
  - type: text
    text: 'When you see them and realize how '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sinful
  - type: text
    text: ' are their ways and deeds, then you will not feel so sad when you understand that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', brought all these disasters upon Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You will feel better when you see their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: evil
  - type: text
    text: ' way of life and actions, for then you will realize that I had a good reason to do what I did. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
