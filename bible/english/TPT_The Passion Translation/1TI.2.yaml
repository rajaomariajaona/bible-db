  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Let the women '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who are new converts
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
