    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “kings.”
    marker-yv: yv-n
  - type: text
    text: 'and representative, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
