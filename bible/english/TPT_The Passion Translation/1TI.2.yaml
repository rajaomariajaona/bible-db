document_id: 1TI.2,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instruction on Prayer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Most of all, I’m writing to encourage you to pray with gratitude to God. Pray for all men with all forms of prayers and requests as you intercede with intense passion. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: it
      children:
      - type: text
        text: they should be recognized
    - type: text
      text: ' instead by their beautiful deeds of kindness, suitable as one who worships God.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the women '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are new converts
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied and understood by the cultural context of that day.
      marker-yv: yv-n
    - type: text
      text: 'be willing to learn with all submission to their leaders and not speak out of turn. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “quietly.” In the context of that day, it referred to women arguing with their male congregational leaders. In the temple worship of Diana, the goddess of the Ephesian people, it was most common to have female leadership. For the women who converted to Christ, their only cultural context of worship was that the women were the leaders. In the church, however, it was the men who more commonly made up the leadership of the congregations. Paul telling the women to “be willing to learn” means he was instructing them to take a respectful posture of a disciple in this new way of worshiping the true God. When Paul instructs them not to be teachers, he was apparently referring to their old religious system where it was the women who were the temple leaders and teachers of their goddess religion in Ephesus. This entire passage from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 2:9–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is arguably one of the more difficult texts to translate in Paul’s writings, and has a number of plausible translations and interpretations. However, this translation has chosen to make clear what was implicitly understood by the early Christians in Ephesus, making it explicit for those of us from another culture and another era.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I don’t advocate that the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: newly converted
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied and understood by the cultural context of that day.
      marker-yv: yv-n
    - type: text
      text: 'women be the teachers in the church, assuming authority over the men, but to live in peace. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God formed Adam first, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One of the prevailing Gnostic heresies of that era was that Eve was formed first, then Adam. Paul puts that debate to rest with this verse.
      marker-yv: yv-n
    - type: text
      text: 'then Eve. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adam did not mislead Eve, but Eve misled him and violated the command of God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek says “Adam was not deceived but the woman was beguiled and has come into transgression.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet salvation will come through a child born by a woman, and women will be saved by that “child” if they continue in faith with love, holiness, and self-control.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some have interpreted the Greek text to imply that it was Mary who gave birth to Jesus and that he is the Child that saves us all and redeems womanhood. This Messianic interpretation can be found in some modern (Ellicott, Lock, Oden, von Soden, Wohlenberg) as well as ancient commentators (Ignatius, Eph., 19; Irenaeus, Haer., III.22, V.19; Justin, Dial., 100; Tertullian, De Car., XLCI, 17). See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And pray for every political leader '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “kings.”
      marker-yv: yv-n
    - type: text
      text: 'and representative, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “magistrates.”
      marker-yv: yv-n
    - type: text
      text: 'so that we would be able to live tranquil, undisturbed lives, as we worship the awe-inspiring God with pure hearts. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is pleasing to our Savior-God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to pray for them
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He longs for everyone to embrace his life and return to the full knowledge of the truth.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God is one, and there is one Mediator between God and the sons of men—the true man, Jesus, the Anointed One. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gave himself as ransom-payment for everyone. Now is the proper time for God to give the world this witness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I have been divinely called as an apostle to preach this revelation, which is the truth. God has called me to be a trustworthy teacher to the nations.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, I encourage the men to pray on every occasion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wherever you pray.”
      marker-yv: yv-n
    - type: text
      text: with hands lifted to God in worship with clean hearts, free from frustration or strife.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “anger or scheming.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conduct of Women
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that the women '
    - type: usfm
      marker: it
      children:
      - type: text
        text: would also pray
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prayer is implied, but made explicit from the context of v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with clean hearts, dressed appropriately and adorned modestly and sensibly, not flaunting their wealth. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “not with braids of gold, or with pearls, or gorgeous robes.”
      marker-yv: yv-n
