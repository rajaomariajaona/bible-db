document_id: 1TI.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Instruction on Prayer
  - type: text
    content: 'Most of all, I’m writing to encourage you to pray with gratitude to God. Pray for all men with all forms of prayers and requests as you intercede with intense passion. '
  '10':
  - type: text
    content: 'But '
  - type: text
    content: they should be recognized
  - type: text
    content: ' instead by their beautiful deeds of kindness, suitable as one who worships God.'
  '11':
  - type: text
    content: 'Let the women '
  - type: text
    content: who are new converts
  - type: text
    content: ' '
  - type: note
    content: Implied and understood by the cultural context of that day.
  - type: text
    content: 'be willing to learn with all submission to their leaders and not speak out of turn. '
  - type: note
    content: Literally “quietly.” In the context of that day, it referred to women arguing with their male congregational leaders. In the temple worship of Diana, the goddess of the Ephesian people, it was most common to have female leadership. For the women who converted to Christ, their only cultural context of worship was that the women were the leaders. In the church, however, it was the men who more commonly made up the leadership of the congregations. Paul telling the women to “be willing to learn” means he was instructing them to take a respectful posture of a disciple in this new way of worshiping the true God. When Paul instructs them not to be teachers, he was apparently referring to their old religious system where it was the women who were the temple leaders and teachers of their goddess religion in Ephesus. This entire passage from 1 Tim. 2:9–15 is arguably one of the more difficult texts to translate in Paul’s writings, and has a number of plausible translations and interpretations. However, this translation has chosen to make clear what was implicitly understood by the early Christians in Ephesus, making it explicit for those of us from another culture and another era.
  '12':
  - type: text
    content: 'I don’t advocate that the '
  - type: text
    content: newly converted
  - type: text
    content: ' '
  - type: note
    content: Implied and understood by the cultural context of that day.
  - type: text
    content: 'women be the teachers in the church, assuming authority over the men, but to live in peace. '
  '13':
  - type: text
    content: 'For God formed Adam first, '
  - type: note
    content: One of the prevailing Gnostic heresies of that era was that Eve was formed first, then Adam. Paul puts that debate to rest with this verse.
  - type: text
    content: 'then Eve. '
  '14':
  - type: text
    content: 'Adam did not mislead Eve, but Eve misled him and violated the command of God. '
  - type: note
    content: As translated from the Aramaic. The Greek says “Adam was not deceived but the woman was beguiled and has come into transgression.”
  '15':
  - type: text
    content: Yet salvation will come through a child born by a woman, and women will be saved by that “child” if they continue in faith with love, holiness, and self-control.
  - type: note
    content: Some have interpreted the Greek text to imply that it was Mary who gave birth to Jesus and that he is the Child that saves us all and redeems womanhood. This Messianic interpretation can be found in some modern (Ellicott, Lock, Oden, von Soden, Wohlenberg) as well as ancient commentators (Ignatius, Eph., 19; Irenaeus, Haer., III.22, V.19; Justin, Dial., 100; Tertullian, De Car., XLCI, 17). See also Gen. 3:15; Gal. 4:4.
  '2':
  - type: text
    content: 'And pray for every political leader '
  - type: note
    content: Or “kings.”
  - type: text
    content: 'and representative, '
  - type: note
    content: Or “magistrates.”
  - type: text
    content: 'so that we would be able to live tranquil, undisturbed lives, as we worship the awe-inspiring God with pure hearts. '
  '3':
  - type: text
    content: 'It is pleasing to our Savior-God '
  - type: text
    content: to pray for them
  - type: text
    content: '. '
  '4':
  - type: text
    content: He longs for everyone to embrace his life and return to the full knowledge of the truth.
  '5':
  - type: text
    content: 'For God is one, and there is one Mediator between God and the sons of men—the true man, Jesus, the Anointed One. '
  '6':
  - type: text
    content: 'He gave himself as ransom-payment for everyone. Now is the proper time for God to give the world this witness. '
  '7':
  - type: text
    content: I have been divinely called as an apostle to preach this revelation, which is the truth. God has called me to be a trustworthy teacher to the nations.
  '8':
  - type: text
    content: 'Therefore, I encourage the men to pray on every occasion '
  - type: note
    content: Or “wherever you pray.”
  - type: text
    content: with hands lifted to God in worship with clean hearts, free from frustration or strife.
  - type: note
    content: Or “anger or scheming.”
  - type: heading
    content: Conduct of Women
  '9':
  - type: text
    content: 'And that the women '
  - type: text
    content: would also pray
  - type: text
    content: ' '
  - type: note
    content: Prayer is implied, but made explicit from the context of v. 8.
  - type: text
    content: 'with clean hearts, dressed appropriately and adorned modestly and sensibly, not flaunting their wealth. '
  - type: note
    content: Literally “not with braids of gold, or with pearls, or gorgeous robes.”
