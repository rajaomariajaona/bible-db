    marker-yv: yv-n
  - type: text
    text: 'women be the teachers in the church, assuming authority over the men, but to live in peace. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For God formed Adam first, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One of the prevailing Gnostic heresies of that era was that Eve was formed first, then Adam. Paul puts that debate to rest with this verse.
    marker-yv: yv-n
  - type: text
    text: 'then Eve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Adam did not mislead Eve, but Eve misled him and violated the command of God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek says “Adam was not deceived but the woman was beguiled and has come into transgression.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Yet salvation will come through a child born by a woman, and women will be saved by that “child” if they continue in faith with love, holiness, and self-control.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some have interpreted the Greek text to imply that it was Mary who gave birth to Jesus and that he is the Child that saves us all and redeems womanhood. This Messianic interpretation can be found in some modern (Ellicott, Lock, Oden, von Soden, Wohlenberg) as well as ancient commentators (Ignatius, Eph., 19; Irenaeus, Haer., III.22, V.19; Justin, Dial., 100; Tertullian, De Car., XLCI, 17). See also
