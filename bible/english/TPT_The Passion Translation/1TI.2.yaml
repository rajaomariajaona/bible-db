    - type: text
      text: '1'
  - type: text
    text: 'Most of all, I’m writing to encourage you to pray with gratitude to God. Pray for all men with all forms of prayers and requests as you intercede with intense passion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And pray for every political leader '
