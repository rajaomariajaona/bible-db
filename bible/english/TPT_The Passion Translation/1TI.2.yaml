        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “magistrates.”
    marker-yv: yv-n
  - type: text
    text: 'so that we would be able to live tranquil, undisturbed lives, as we worship the awe-inspiring God with pure hearts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'It is pleasing to our Savior-God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to pray for them
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He longs for everyone to embrace his life and return to the full knowledge of the truth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For God is one, and there is one Mediator between God and the sons of men—the true man, Jesus, the Anointed One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He gave himself as ransom-payment for everyone. Now is the proper time for God to give the world this witness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I have been divinely called as an apostle to preach this revelation, which is the truth. God has called me to be a trustworthy teacher to the nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Therefore, I encourage the men to pray on every occasion '
