      children:
      - type: text
        text: Implied and understood by the cultural context of that day.
    marker-yv: yv-n
  - type: text
    text: 'be willing to learn with all submission to their leaders and not speak out of turn. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “quietly.” In the context of that day, it referred to women arguing with their male congregational leaders. In the temple worship of Diana, the goddess of the Ephesian people, it was most common to have female leadership. For the women who converted to Christ, their only cultural context of worship was that the women were the leaders. In the church, however, it was the men who more commonly made up the leadership of the congregations. Paul telling the women to “be willing to learn” means he was instructing them to take a respectful posture of a disciple in this new way of worshiping the true God. When Paul instructs them not to be teachers, he was apparently referring to their old religious system where it was the women who were the temple leaders and teachers of their goddess religion in Ephesus. This entire passage from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Tim. 2:9–15
      metadata:
        usfm: 1TI.2.9+1TI.2.10+1TI.2.11+1TI.2.12+1TI.2.13+1TI.2.14+1TI.2.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is arguably one of the more difficult texts to translate in Paul’s writings, and has a number of plausible translations and interpretations. However, this translation has chosen to make clear what was implicitly understood by the early Christians in Ephesus, making it explicit for those of us from another culture and another era.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I don’t advocate that the '
