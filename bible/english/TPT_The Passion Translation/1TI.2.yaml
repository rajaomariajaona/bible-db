    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “wherever you pray.”
    marker-yv: yv-n
  - type: text
    text: with hands lifted to God in worship with clean hearts, free from frustration or strife.
  - type: usfm
    marker: f
    children:
