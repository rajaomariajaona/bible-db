    marker-yv: yv-n
  - type: text
    text: 'with clean hearts, dressed appropriately and adorned modestly and sensibly, not flaunting their wealth. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “not with braids of gold, or with pearls, or gorgeous robes.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: they should be recognized
  - type: text
    text: ' instead by their beautiful deeds of kindness, suitable as one who worships God.'
- type: usfm
