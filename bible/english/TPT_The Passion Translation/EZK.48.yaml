document_id: EZK.48,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Distribution of the Land
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is the list of the tribes and the land they are to receive. The border follows the Hethlon road to the boundary between Damascus and Hamath. The territory for each tribe will extend all the way across the country from east to west. Starting from the north, the tribes are:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dan
  - type: usfm
    marker: p
    children:
    - type: text
      text: Asher
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naphtali
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manasseh
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ephraim
  - type: usfm
    marker: p
    children:
    - type: text
      text: Reuben
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judah.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Special Land at the Center of the Country
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Here is how you will divide the sacred section of land. You will give the priests a portion of land that is 25,000 cubits in length and 10,000 cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 3.31 miles (5.3 kilometers). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in width. The temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will stand inside this area in the center. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This will be for the sons of Zadok, the consecrated priests who faithfully served me. They did not join with the straying Israelites, as did the other Levites who went astray. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It will be a special gift to them from the sacred portion of the land, a most holy portion on the border of the Levites.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Alongside the border of the priests, the Levites’ portion will be 25,000 cubits in length and 10,000 cubits in width. The whole length will be 25,000 cubits and 10,000 cubits in width. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is forbidden for them to sell or exchange any part of it. They are not to allow anyone else to own this special land, since it is consecrated to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The City of Jerusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The rest of the special area is 25,000 cubits long and 5,000 cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 1.66 miles (2.65 kilometers).
      marker-yv: yv-n
    - type: text
      text: 'wide. This must be for the common use of the city, for houses and pastures. In the middle will be the city '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Jerusalem
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The dimensions of the city will form a square with 4,500 cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 1.49 miles (2.39 kilometers). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'on each side. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There will be an open space of 250 cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 437.5 feet (132.5 meters).
      marker-yv: yv-n
    - type: text
      text: around the perimeter of the city.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“There will remain one strip of land along the sacred portion left over that will extend 10,000 cubits to the east of the city and 10,000 cubits to the west of the city. This portion will be used to grow food for the people who work in the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the city workers, drawn from all the tribes of Israel, will farm it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The entire portion of land you must set apart will have a total area of 25,000 cubits square, that is, the sacred portion of land for the temple together with the area for the city.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This 25,000-cubit square will contain the holy portion of the priests, the Levites’ land, and the land where the city will be. It will be in the middle of the prince’s land, and he will have any land remaining on either side of the sacred portion and of the property of the city. The prince will have two sections, one stretching from the edge of this area to the eastern border of the country, the other stretching from the other edge of this area to the western border. These two sections of land belonging to the prince will run alongside the borders of the territories of Judah and Benjamin. It will lie between those two territories '
    - type: usfm
      marker: it
      children:
      - type: text
        text: south of Judah and north of Benjamin
    - type: text
      text: .”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Land for the Other Five Tribes
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“As regards the remaining tribes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: south of this sacred section
    - type: text
      text: ', each tribe is to receive one portion of land that extends from the eastern boundary west to the Mediterranean Sea:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Benjamin
  - type: usfm
    marker: p
    children:
    - type: text
      text: Simeon
  - type: usfm
    marker: p
    children:
    - type: text
      text: Issachar
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zebulun
  - type: usfm
    marker: p
    children:
    - type: text
      text: Gad.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And adjoining the territory of Gad, on the south side, the border will run from Tamar to the waters of Meribah-Kadesh, following the dry riverbed to the Mediterranean Sea. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how you must distribute the land to the tribes of Israel as their inheritance. These are to be their portions. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Gates of Jerusalem
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Here are the twelve exits from the city. Each gate is to be named after a tribe of Israel. Each of the four walls of the city will extend for 4,500 cubits and has three gates in it. The three gates on the north side are to be named Reuben, Judah, and Levi. The three gates on the east side are to be named Joseph, Benjamin, and Dan. The three gates on the south side are to be named Simeon, Issachar, and Zebulun. The three gates on the west side are to be named Gad, Asher, and Naphtali. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total perimeter of the city is to be 18,000 cubits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 5.97 miles (9.60 kilometers). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 21:12–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . There is a great similarity to this chapter and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . However, the New Jerusalem does not have a temple, for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and the Lamb are the temple (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“From that time on the city will be called '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: -Lives-There!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: -Shammah,” a name of God that emphasizes his love, care, and compassion toward his people.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“South of Judah, from the eastern limit to the western limit, is the special portion of holy land that you must set aside. The temple complex will stand in the center. That land will be 25,000 cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: About 8.29 miles (13.25 kilometers). Also vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'wide and the same length as one of the tribal portions from the east side to the west. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The portion that you must set aside for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' must be 25,000 cubits long and 20,000 cubits '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. This is about 6.63 miles (10.6 kilometers). Compare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 45:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Although the Hebrew is “10,000 cubits” (3.31 miles; 5.3 kilometers), this is considered a scribal error by many. See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: wide.
