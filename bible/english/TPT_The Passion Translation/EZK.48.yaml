document_id: EZK.48,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Distribution of the Land
  - type: text
    content: '“This is the list of the tribes and the land they are to receive. The border follows the Hethlon road to the boundary between Damascus and Hamath. The territory for each tribe will extend all the way across the country from east to west. Starting from the north, the tribes are:'
  - type: text
    content: Dan
  - type: text
    content: Asher
  - type: text
    content: Naphtali
  - type: text
    content: Manasseh
  - type: text
    content: Ephraim
  - type: text
    content: Reuben
  - type: text
    content: Judah.”
  - type: heading
    content: Special Land at the Center of the Country
  '10':
  - type: text
    content: '“Here is how you will divide the sacred section of land. You will give the priests a portion of land that is 25,000 cubits in length and 10,000 cubits '
  - type: note
    content: About 3.31 miles (5.3 kilometers). Also vv. 13, 18.
  - type: text
    content: 'in width. The temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' will stand inside this area in the center. '
  '11':
  - type: text
    content: 'This will be for the sons of Zadok, the consecrated priests who faithfully served me. They did not join with the straying Israelites, as did the other Levites who went astray. '
  '12':
  - type: text
    content: It will be a special gift to them from the sacred portion of the land, a most holy portion on the border of the Levites.
  '13':
  - type: text
    content: '“Alongside the border of the priests, the Levites’ portion will be 25,000 cubits in length and 10,000 cubits in width. The whole length will be 25,000 cubits and 10,000 cubits in width. '
  '14':
  - type: text
    content: 'It is forbidden for them to sell or exchange any part of it. They are not to allow anyone else to own this special land, since it is consecrated to '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: heading
    content: The City of Jerusalem
  '15':
  - type: text
    content: '“The rest of the special area is 25,000 cubits long and 5,000 cubits '
  - type: note
    content: About 1.66 miles (2.65 kilometers).
  - type: text
    content: 'wide. This must be for the common use of the city, for houses and pastures. In the middle will be the city '
  - type: text
    content: of Jerusalem
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'The dimensions of the city will form a square with 4,500 cubits '
  - type: note
    content: About 1.49 miles (2.39 kilometers). Also vv. 30–34.
  - type: text
    content: 'on each side. '
  '17':
  - type: text
    content: 'There will be an open space of 250 cubits '
  - type: note
    content: About 437.5 feet (132.5 meters).
  - type: text
    content: around the perimeter of the city.
  '18':
  - type: text
    content: '“There will remain one strip of land along the sacred portion left over that will extend 10,000 cubits to the east of the city and 10,000 cubits to the west of the city. This portion will be used to grow food for the people who work in the city. '
  '19':
  - type: text
    content: 'And the city workers, drawn from all the tribes of Israel, will farm it. '
  '20':
  - type: text
    content: The entire portion of land you must set apart will have a total area of 25,000 cubits square, that is, the sacred portion of land for the temple together with the area for the city.
  '21':
  - type: text
    content: '“This 25,000-cubit square will contain the holy portion of the priests, the Levites’ land, and the land where the city will be. It will be in the middle of the prince’s land, and he will have any land remaining on either side of the sacred portion and of the property of the city. The prince will have two sections, one stretching from the edge of this area to the eastern border of the country, the other stretching from the other edge of this area to the western border. These two sections of land belonging to the prince will run alongside the borders of the territories of Judah and Benjamin. It will lie between those two territories '
  - type: text
    content: south of Judah and north of Benjamin
  - type: text
    content: .”
  - type: heading
    content: Land for the Other Five Tribes
  '23':
  - type: text
    content: '“As regards the remaining tribes '
  - type: text
    content: south of this sacred section
  - type: text
    content: ', each tribe is to receive one portion of land that extends from the eastern boundary west to the Mediterranean Sea:'
  - type: text
    content: Benjamin
  - type: text
    content: Simeon
  - type: text
    content: Issachar
  - type: text
    content: Zebulun
  - type: text
    content: Gad.
  '28':
  - type: text
    content: '“And adjoining the territory of Gad, on the south side, the border will run from Tamar to the waters of Meribah-Kadesh, following the dry riverbed to the Mediterranean Sea. '
  '29':
  - type: text
    content: 'This is how you must distribute the land to the tribes of Israel as their inheritance. These are to be their portions. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: The Gates of Jerusalem
  '30':
  - type: text
    content: '“Here are the twelve exits from the city. Each gate is to be named after a tribe of Israel. Each of the four walls of the city will extend for 4,500 cubits and has three gates in it. The three gates on the north side are to be named Reuben, Judah, and Levi. The three gates on the east side are to be named Joseph, Benjamin, and Dan. The three gates on the south side are to be named Simeon, Issachar, and Zebulun. The three gates on the west side are to be named Gad, Asher, and Naphtali. '
  '35':
  - type: text
    content: The total perimeter of the city is to be 18,000 cubits.
  - type: note
    content: About 5.97 miles (9.60 kilometers). See Rev. 21:12–22. There is a great similarity to this chapter and Rev. 21–22. However, the New Jerusalem does not have a temple, for Yahweh and the Lamb are the temple (see Rev. 21:22).
  - type: text
    content: '“From that time on the city will be called '
  - type: text
    content: Yahweh
  - type: text
    content: -Lives-There!”
  - type: note
    content: Or “Yahweh-Shammah,” a name of God that emphasizes his love, care, and compassion toward his people.
  '8':
  - type: text
    content: '“South of Judah, from the eastern limit to the western limit, is the special portion of holy land that you must set aside. The temple complex will stand in the center. That land will be 25,000 cubits '
  - type: note
    content: About 8.29 miles (13.25 kilometers). Also vv. 9, 10, 13, 15, 20, 21–22.
  - type: text
    content: 'wide and the same length as one of the tribal portions from the east side to the west. '
  '9':
  - type: text
    content: 'The portion that you must set aside for '
  - type: text
    content: Yahweh
  - type: text
    content: ' must be 25,000 cubits long and 20,000 cubits '
  - type: note
    content: As translated from the Septuagint. This is about 6.63 miles (10.6 kilometers). Compare Ezek. 45:1. Although the Hebrew is “10,000 cubits” (3.31 miles; 5.3 kilometers), this is considered a scribal error by many. See v. 13.
  - type: text
    content: wide.
