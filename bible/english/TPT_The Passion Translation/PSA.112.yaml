document_id: PSA.112,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Triumph of Faith
  - type: text
    content: Shout in celebration of praise to the Lord!
  - type: text
    content: Everyone who loves the Lord and delights in him
  - type: text
    content: will cherish his words and be blessed beyond expectation.
  '10':
  - type: text
    content: But the wicked take one look at a life lived like this
  - type: text
    content: and they grit their teeth in anger, not understanding their bliss.
  - type: text
    content: The wicked slink away speechless in the darkness that falls,
  - type: text
    content: where hope dies and all their dreams fade away to nothing,
  - type: text
    content: nothing at all!
  '2':
  - type: text
    content: Their descendants will be prosperous and influential.
  - type: text
    content: Every generation of the righteous will experience his favor.
  '3':
  - type: text
    content: 'Great blessing and wealth fills the house '
  - type: text
    content: of the wise
  - type: text
    content: ','
  - type: text
    content: for their integrity endures forever.
  '4':
  - type: text
    content: Even if darkness overtakes them,
  - type: text
    content: sunrise-brilliance will come bursting through
  - type: text
    content: because they are gracious to others, so tender and true.
  '5':
  - type: text
    content: Life is good for the one who is generous and charitable,
  - type: text
    content: conducting affairs with honesty and truth.
  '6':
  - type: text
    content: Their circumstances will never shake them
  - type: text
    content: and others will never forget their example.
  '7':
  - type: text
    content: They will not live in fear or dread of what may come,
  - type: text
    content: for their hearts are firm, ever secure in their faith.
  '8':
  - type: text
    content: Steady and strong, they will not be afraid,
  - type: text
    content: but will calmly face their every foe
  - type: text
    content: until they all go down in defeat.
  '9':
  - type: text
    content: Never stingy and always generous to those in need,
  - type: text
    content: they lived lives of influence and honor that will never be forgotten,
  - type: text
    content: for they were full of good deeds.
