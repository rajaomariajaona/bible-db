document_id: PSA.112
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Triumph of Faith
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Shout in celebration of praise to the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everyone who loves the Lord and delights in him
- type: usfm
  marker: q1
  children:
  - type: text
    text: will cherish his words and be blessed beyond expectation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Their descendants will be prosperous and influential.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every generation of the righteous will experience his favor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Great blessing and wealth fills the house '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the wise
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their integrity endures forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Even if darkness overtakes them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sunrise-brilliance will come bursting through
- type: usfm
  marker: q1
  children:
  - type: text
    text: because they are gracious to others, so tender and true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Life is good for the one who is generous and charitable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conducting affairs with honesty and truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Their circumstances will never shake them
- type: usfm
  marker: q1
  children:
  - type: text
    text: and others will never forget their example.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They will not live in fear or dread of what may come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their hearts are firm, ever secure in their faith.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Steady and strong, they will not be afraid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but will calmly face their every foe
- type: usfm
  marker: q1
  children:
  - type: text
    text: until they all go down in defeat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Never stingy and always generous to those in need,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they lived lives of influence and honor that will never be forgotten,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they were full of good deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But the wicked take one look at a life lived like this
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they grit their teeth in anger, not understanding their bliss.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The wicked slink away speechless in the darkness that falls,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where hope dies and all their dreams fade away to nothing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nothing at all!
