document_id: PSA.86
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Prayer of Faith
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s prayer
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, bend down to listen to my prayer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am in deep trouble. I’m broken and humbled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I desperately need your help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Guard my life, for I’m your faithful friend, your loyal servant for life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I turn to you in faith, my God, my hero; come and rescue me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lord God, hear my constant cry for help;
- type: usfm
  marker: q1
  children:
  - type: text
    text: show me your favor and bring me to your fountain of grace!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Restore joy to your loving servant once again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all I am is yours, O God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lord, you are so good to me, so kind in every way
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 86:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “You’re my provider.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and ready to forgive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your grace-fountain keeps overflowing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: drenching all your devoted lovers who pray to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: God, won’t you pay attention to this urgent cry?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord, bend down to listen to my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Whenever trouble strikes, I will keep crying out to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I know your help is on the way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: God, there’s no one like you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: there’s no other god as famous as you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You outshine all others, and your miracles make it easy to know you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lord Almighty, you are the one who created all the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look at them—they’re all on their way!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, the day will come when they all will worship you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and put your glory on display.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You are the one and only God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What miracles! What wonders! What greatness belongs to you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Teach me more about you, how you work and how you move,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that I can walk onward in your truth
- type: usfm
  marker: q1
  children:
  - type: text
    text: until everything within me brings honor to your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: With all my heart and passion I will thank you, my God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give glory to your name, always and forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You love me so much, and you have placed your greatness upon me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 86:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You rescued me from the deepest place of darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you have delivered me from a certain death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: God, look at how these arrogant ones have defied me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a vicious band of violent men, they have tried to kill me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They wouldn’t worry for a moment that they were sinning against you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But Lord, your nurturing love is tender and gentle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are slow to get angry yet so swift to show your faithful love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are full of abounding grace and truth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 86:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Bring me to your grace-fountain
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that your strength becomes mine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be my hero and come rescue your servant once again!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Send me a miraculous sign to show me how much you love me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that those who hate me will see it and be ashamed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t they know that you, Lord, are my comforter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the one who comes to help me?
