document_id: PSA.86,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer of Faith
  - type: text
    content: King David’s prayer
  - type: text
    content: Lord, bend down to listen to my prayer.
  - type: text
    content: I am in deep trouble. I’m broken and humbled,
  - type: text
    content: and I desperately need your help.
  '10':
  - type: text
    content: You are the one and only God.
  - type: text
    content: What miracles! What wonders! What greatness belongs to you!
  '11':
  - type: text
    content: Teach me more about you, how you work and how you move,
  - type: text
    content: so that I can walk onward in your truth
  - type: text
    content: until everything within me brings honor to your name.
  '12':
  - type: text
    content: With all my heart and passion I will thank you, my God!
  - type: text
    content: I will give glory to your name, always and forever!
  '13':
  - type: text
    content: You love me so much, and you have placed your greatness upon me.
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: You rescued me from the deepest place of darkness,
  - type: text
    content: and you have delivered me from a certain death.
  '14':
  - type: text
    content: God, look at how these arrogant ones have defied me.
  - type: text
    content: Like a vicious band of violent men, they have tried to kill me.
  - type: text
    content: They wouldn’t worry for a moment that they were sinning against you!
  '15':
  - type: text
    content: But Lord, your nurturing love is tender and gentle.
  - type: text
    content: You are slow to get angry yet so swift to show your faithful love.
  - type: text
    content: You are full of abounding grace and truth.
  - type: note
    content: As translated from the Aramaic and the Septuagint.
  '16':
  - type: text
    content: Bring me to your grace-fountain
  - type: text
    content: so that your strength becomes mine.
  - type: text
    content: Be my hero and come rescue your servant once again!
  '17':
  - type: text
    content: Send me a miraculous sign to show me how much you love me,
  - type: text
    content: so that those who hate me will see it and be ashamed.
  - type: text
    content: Don’t they know that you, Lord, are my comforter,
  - type: text
    content: the one who comes to help me?
  '2':
  - type: text
    content: Guard my life, for I’m your faithful friend, your loyal servant for life.
  - type: text
    content: I turn to you in faith, my God, my hero; come and rescue me!
  '3':
  - type: text
    content: Lord God, hear my constant cry for help;
  - type: text
    content: show me your favor and bring me to your fountain of grace!
  '4':
  - type: text
    content: Restore joy to your loving servant once again,
  - type: text
    content: for all I am is yours, O God.
  '5':
  - type: text
    content: Lord, you are so good to me, so kind in every way
  - type: note
    content: The Septuagint reads “You’re my provider.”
  - type: text
    content: and ready to forgive,
  - type: text
    content: for your grace-fountain keeps overflowing,
  - type: text
    content: drenching all your devoted lovers who pray to you.
  '6':
  - type: text
    content: God, won’t you pay attention to this urgent cry?
  - type: text
    content: Lord, bend down to listen to my prayer.
  '7':
  - type: text
    content: Whenever trouble strikes, I will keep crying out to you,
  - type: text
    content: for I know your help is on the way.
  '8':
  - type: text
    content: God, there’s no one like you;
  - type: text
    content: there’s no other god as famous as you.
  - type: text
    content: You outshine all others, and your miracles make it easy to know you.
  '9':
  - type: text
    content: Lord Almighty, you are the one who created all the nations.
  - type: text
    content: Look at them—they’re all on their way!
  - type: text
    content: Yes, the day will come when they all will worship you
  - type: text
    content: and put your glory on display.
