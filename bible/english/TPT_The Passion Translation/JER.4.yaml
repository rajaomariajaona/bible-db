document_id: JER.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Repentance
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to Israel:'
  - type: text
    content: “Listen, if you turn to come back to me,
  - type: text
    content: then return to me with all your heart.
  - type: text
    content: 'If you remove your disgusting '
  - type: text
    content: idols
  - type: text
    content: ' from before my face,'
  - type: text
    content: then come home
  - type: text
    content: ' and never stray from my presence again.'
  '10':
  - type: text
    content: 'In response to all this I said: “O Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you have completely deceived Jerusalem and these people! '
  - type: note
    content: God never deceives his people because God cannot lie (see Num. 23:19; Titus 1:2). It perplexed Jeremiah that God would even allow false prophets to deliver their deceptive messages and lead his people into a false sense of security that would be their undoing. Jeremiah seemed to blame God for not preventing false prophets from deceiving the people. See Jer. 14:13–16; 23:16–17. If people reject the truth and accept lies, they will be held accountable (see 2 Thess. 2:9–12).
  - type: text
    content: You promised peace, yet even now, the blade of the sword threatens our lives.”
  - type: note
    content: Or “the sword has reached their throats.”
  '11':
  - type: text
    content: 'At that time it will be said to the people and to Jerusalem: “A blazing '
  - type: note
    content: Although most translations render the Hebrew word tsach as “hot” or “scorching,” its meaning spans “dazzling,” “shimmering,” “glistening,” “glowing,” and “smooth.” Meteorologically, this “blazing” wind is the phenomena known as the sirocco, and this verse uses it as a metaphor for the coming judgment that will sweep over the land.
  - type: text
    content: 'wind from the barren desert heights will blow upon my dear people, '
  - type: note
    content: Or “daughter of my people.”
  - type: text
    content: not a gentle wind to winnow or sift out—
  '12':
  - type: text
    content: I am sending a wind much stronger than that. Now, I will bring charges against them.”
  '13':
  - type: text
    content: 'Look, as a storm cloud in the sky, he '
  - type: note
    content: Although it is possible that “he” refers to Yahweh (see Isa. 66:15), “he” more likely refers to the king of Babylon, who was about to invade the land.
  - type: text
    content: arises,
  - type: text
    content: 'and his war chariots '
  - type: text
    content: kick up dust
  - type: text
    content: ' like a whirlwind.'
  - type: text
    content: His horses are swifter than eagles.
  - type: text
    content: 'We’re done for! '
  - type: note
    content: Or “Woe to us,” a funerary term, used often by prophets to signal a coming death. See v. 31.
  - type: text
    content: It’s over for us!
  - type: heading
    content: The Cause of the Judgment
  '14':
  - type: text
    content: Jerusalem, wash the evil from your heart
  - type: text
    content: so that you may be rescued.
  - type: text
    content: How long will evil thoughts and harmful schemes
  - type: text
    content: find a resting place in you?
  '15':
  - type: text
    content: 'I hear '
  - type: text
    content: a shout warning
  - type: text
    content: ' of disaster from the territory of Dan'
  - type: note
    content: The northern boundary of Dan formed the northernmost boundary of Israel. Because of its strategic location, the tribe of Dan would be the first to warn of an invasion from the north.
  - type: text
    content: and another from the hills of Ephraim.
  - type: note
    content: The hills of Ephraim lie north of Jerusalem. A warning from the hills of Ephraim would indicate the invading armies were approaching the city.
  '16':
  - type: text
    content: “Warn the nations of what is coming!
  - type: text
    content: 'Announce to Jerusalem:'
  - type: text
    content: '‘Watchers '
  - type: note
    content: Or “Enemies” (LXX).
  - type: text
    content: are coming from a distant land,
  - type: text
    content: 'shouting '
  - type: text
    content: a battle cry
  - type: text
    content: ' against Judah’s cities!'
  '17':
  - type: text
    content: The enemies surround Judah and Jerusalem
  - type: text
    content: like men who are guarding a field,
  - type: text
    content: for Judah has rebelled against me,’ ”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '18':
  - type: text
    content: “You have brought this on yourself by your deeds and your lifestyle.
  - type: text
    content: Your evil and your bitterness have reached your heart.
  - type: text
    content: This is your doom!”
  - type: heading
    content: The Cry of the Prophet
  '19':
  - type: text
    content: With gut-wrenching pain deep in my soul,
  - type: text
    content: 'I writhe '
  - type: text
    content: on the ground in anguish
  - type: text
    content: .
  - type: note
    content: The Hebrew is “My bowels, my bowels, let me writhe.” Jeremiah, like no other Old Testament prophet, gave us a glimpse into his heart, emotions, and thoughts. He revealed his heavy burdens and sorrow as something unbearable (see 6:24; 9:10; 10:19–20). Jeremiah was in anguish and pain as he considered the national tragedy that Judah could have averted if they had repented. He was a prophet brokenhearted before God.
  - type: text
    content: My heart is pounding within me.
  - type: note
    content: Or “My heart is roaring within me.”
  - type: text
    content: I cannot keep silent,
  - type: text
    content: for I hear the shofar blast.
  - type: text
    content: I say to
  - type: text
    content: ' my soul, I hear the cry of war!'
  '2':
  - type: text
    content: If you make a promise in my name,
  - type: text
    content: 'saying, ‘As surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ' lives’'
  - type: text
    content: with truth, honesty, and integrity,
  - type: note
    content: 'Yahweh set three conditions for Israel’s return to God: Israel must (1) renounce every idol, (2) never stray from God’s presence, and (3) live lives of integrity.'
  - type: text
    content: then all other nations will desire his blessing and prosperity.
  - type: text
    content: They will shine and make their boast in me.”
  '20':
  - type: text
    content: A chain of disasters, one after another.
  - type: text
    content: The entire land is in ruins!
  - type: text
    content: Suddenly, and in an instant, our tent
  - type: text
    content: and its curtains are destroyed.
  - type: note
    content: The “tent and its curtains” may refer to the temple’s destruction by the Babylonian invaders.
  '21':
  - type: text
    content: How long must I see their battle flags
  - type: text
    content: and hear their shofars blaring for battle?
  '22':
  - type: text
    content: “My people are foolish
  - type: text
    content: because they don’t know who I really am.
  - type: note
    content: Or “their princes do not know me” (LXX).
  - type: text
    content: They are reckless, senseless children.
  - type: text
    content: They think they are wise,
  - type: text
    content: but they are cunning in sinfulness
  - type: text
    content: and clueless in righteousness.”
  - type: heading
    content: Chaos in the Land
  '23':
  - type: text
    content: I looked at the earth,
  - type: text
    content: 'and it was '
  - type: text
    content: completely
  - type: text
    content: ' empty and formless,'
  - type: note
    content: See Gen. 1:2.
  - type: text
    content: the heavens hid its light.
  '24':
  - type: text
    content: I looked at the mountains and saw them trembling,
  - type: text
    content: and all the hills were shaking to and fro.
  '25':
  - type: text
    content: I looked for a human,
  - type: text
    content: but not one was to be found.
  - type: text
    content: Every bird had flown away.
  '26':
  - type: text
    content: I looked at the once fruitful land,
  - type: text
    content: now nothing but a desert,
  - type: text
    content: all its cities left in ruins
  - type: text
    content: 'before '
  - type: text
    content: Yahweh
  - type: text
    content: ’s burning anger.
  '27':
  - type: text
    content: '“For I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken:'
  - type: text
    content: ‘The whole land will remain desolate;
  - type: text
    content: 'however, the end '
  - type: text
    content: of the world
  - type: text
    content: ' is not yet.'
  - type: note
    content: Or “yet I will not make a full end.” See Lev. 26:44; Jer. 5:10–11, 18; 30:11; 46:28; Ezek. 20:17; Amos 9:8.
  '28':
  - type: text
    content: This is why the earth will mourn,
  - type: text
    content: and the heavens will veil their light—
  - type: text
    content: because I have spoken.
  - type: text
    content: 'I will neither relent nor turn away '
  - type: text
    content: from my plans
  - type: text
    content: .’ ”
  - type: heading
    content: Confusion of the People
  '29':
  - type: text
    content: When they hear the approach of the horsemen and archers,
  - type: text
    content: the whole city flees in terror.
  - type: text
    content: Some run into the forest to hide,
  - type: text
    content: and others climb up into the rocks.
  - type: text
    content: Every city is deserted,
  - type: text
    content: and no one lives there anymore.
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' says to the people of Judah and Jerusalem:'
  - type: text
    content: “As a plow breaks open untilled ground,
  - type: text
    content: break open your hard hearts
  - type: text
    content: .
  - type: note
    content: See Hos. 10:12.
  - type: text
    content: 'Do not sow '
  - type: text
    content: good
  - type: text
    content: ' seed among thorns.'
  - type: note
    content: Before planting, a farmer will remove everything that might hinder the growth of the crops; we, too, must remove what hinders the fruit of love and truth from growing in our hearts. See Matt. 13:4–9. To “sow good seed” was more than an agricultural project; rather, God was instructing his people how to restore their hearts before him.
  '30':
  - type: text
    content: 'And you, desolate '
  - type: text
    content: Zion
  - type: text
    content: ','
  - type: text
    content: what are you doing dressing up in scarlet,
  - type: text
    content: adorning yourself in ornaments of gold
  - type: text
    content: and putting on eye shadow?
  - type: text
    content: You’re making yourself beautiful for nothing.
  - type: text
    content: Your lovers don’t want you anymore.
  - type: text
    content: In fact
  - type: text
    content: ', they seek your life!'
  '31':
  - type: text
    content: I heard a cry of a woman gasping in labor pains;
  - type: text
    content: I saw her writhing in distress
  - type: text
    content: as one giving birth to her first child.
  - type: text
    content: It is the daughter of Zion, gasping
  - type: text
    content: 'and stretching out her hands '
  - type: text
    content: for help
  - type: text
    content: ', '
  - type: note
    content: See Lam. 1:17.
  - type: text
    content: 'saying:'
  - type: text
    content: “I’m staring at death! I’m fainting before my murderers!”
  '4':
  - type: text
    content: Listen, people of Judah and Jerusalem.
  - type: text
    content: Circumcise your hearts and become vulnerable to me.
  - type: note
    content: See Deut. 10:16.
  - type: text
    content: If you do not, my anger will blaze up
  - type: text
    content: like unquenchable fire on account of your evil deeds.”
  - type: note
    content: The people of Judah could have escaped captivity by returning to God through repentance and by breaking open their hearts to God. The Lord always gives his people time to repent before judgment falls.
  - type: heading
    content: The Coming Invader
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ':'
  - type: text
    content: “Blow the trumpet in Jerusalem,
  - type: text
    content: and sound the alarm
  - type: text
    content: ' throughout the land of Judah!'
  - type: text
    content: Cry out! Shout it out, and say,
  - type: text
    content: ‘Gather together and let us run into the fortified cities!’
  '6':
  - type: text
    content: Set up a signal to run to Zion.
  - type: text
    content: Don’t just stand there; run for cover!
  - type: text
    content: I am bringing disaster from the north,
  - type: text
    content: terrible destruction is on the way.”
  '7':
  - type: text
    content: 'A nation-wrecker '
  - type: note
    content: This “nation-wrecker” was the king of Babylon.
  - type: text
    content: is on the prowl
  - type: text
    content: like a lion coming up from his lair.
  - type: text
    content: He is roused from his den to ransack your land.
  - type: text
    content: Your cities will be ruined and left without inhabitant.
  '8':
  - type: text
    content: Therefore, put on sackcloth, lament, and wail,
  - type: text
    content: 'for the burning anger of '
  - type: text
    content: Yahweh
  - type: text
    content: has not turned away from us.
  - type: heading
    content: Chariots of Judgment
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ' has declared, “In that day, the courage of the king will melt away. The hearts of his officials will tremble. The priests will be overcome with fear, and the prophets horrified.”'
