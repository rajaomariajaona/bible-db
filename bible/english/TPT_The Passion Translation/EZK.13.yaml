        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'When the false build a “wall '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of words
    - type: text
      text: '” they cover it with the whitewash of their lies. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The prophets were guilty of plastering over the hypocrisy and evil of the people to give the impression that all was solid and secure. The term for “whitewash” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: taphel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) refers to plaster that is cosmetic only without providing any structural support.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Prophesy to those who do so that their wall will fall! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
