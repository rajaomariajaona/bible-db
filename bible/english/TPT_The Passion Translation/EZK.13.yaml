        children:
        - type: text
          text: would protect Jerusalem and his temple and they were secure. Cooper notes that the term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hayis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: denotes an unstable wall made of stones that are simply stacked together without a cement binding (see LaMar Eugene Cooper,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'The New American Commentary, Vol. 17: Ezekiel'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '[United States: Broadman & Holman Publishers, 1994], 156). The “whitewash” (see v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is the false, self-inspired prophecies of the prophets who remained in Jerusalem telling the people that everything would be fine and that God wouldn’t bring judgment on the city. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 22:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Hebrew contains a notable word play, for the word for “plaster” or “whitewash” can also mean “useless.”
      marker-yv: yv-n
    - type: text
      text: 'For I will send a stormy wind that will break loose with a deluge of rain and great hailstones. '
