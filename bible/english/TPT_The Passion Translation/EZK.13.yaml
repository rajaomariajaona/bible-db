      - type: text
        text: '13'
    - type: text
      text: '“ ‘Therefore this is what I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you: My anger will break forth as a windstorm and my wrath will break loose like a torrential rain, and I will send great hailstones to destroy '
    - type: usfm
