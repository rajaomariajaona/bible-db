  - type: text
    content: 'I will punish '
  - type: note
    content: Or “my hand [power] will be against.” The irony is clear. Instead of speaking true words by the power of Yahweh, the false prophets will experience the power of his punishment.
  - type: text
    content: 'the false prophets who see false visions and speak lies about what they see coming in the future. They will no longer belong to my council of elders, '
  - type: note
    content: Or “the council of my people.” See Pss. 107:32; 111:1.
  - type: text
    content: 'nor will their names be inscribed in the register of the people of Israel, '
  - type: note
    content: At least forty prophets are named in the Old Testament, but not one false prophet’s name is recorded.
