          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 30:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God’s last-days awakeners will demolish the flimsy “wall” of bondage and lies that hold the church back from total victory (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 31:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and lay bare the crooked foundations of the religious systems of the earth (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 1:18–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:1–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Just as God sends human armies to execute his judgment on nations, so he also sends his spiritual armies to demolish strongholds and expose darkness (see
