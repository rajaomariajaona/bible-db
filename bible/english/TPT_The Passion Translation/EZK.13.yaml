    content: 'They have not denounced the people’s sin or warned them of trouble coming '
  - type: note
    content: Or “You did not enter the breaches and repair the walls for the house of Israel,” which is symbolic of their refusal to help the people and the city by warning them of the disaster ahead.
  - type: text
