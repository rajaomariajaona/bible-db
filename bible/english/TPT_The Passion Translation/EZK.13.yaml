  - type: text
    content: ' has a message for you.'
  - type: text
    content: '“ ‘Disaster is in store for the wicked '
  - type: note
    content: The Hebrew word nabal here carries the connotation of “wicked” or “ungodly” as well as “foolish.” The context indicates that the problem with these false prophets was not merely their folly but also their underlying impiety and godlessness.
  - type: text
    content: 'prophets who make up their own visions, '
  - type: note
    content: Or “who follow their own spirit.”
  - type: text
    content: 'but they have seen and heard nothing! '
  '4':
  - type: text
    content: 'Israel, your prophets have been like scavengers '
  - type: note
    content: Or “jackals” or “foxes.” The prophets that remained in Jerusalem were like scavengers, and the people of Israel left behind were their prey.
  - type: text
