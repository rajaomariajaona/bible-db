  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes
    - type: text
      text: ', I will level this plastered wall to the ground and lay bare its '
    - type: usfm
      marker: it
      children:
      - type: text
        text: flimsy
    - type: text
      text: ' foundation. And when it crumbles, you, too, will crumble and perish. And then you will realize that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“ ‘For then my wrath will be spent against the wall and upon those who have smeared it with plaster. And I will say to you, “The wall is gone, and so are those who smeared plaster over it. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Those prophets of Israel who prophesied that Jerusalem would be fine, when devastation was near, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: will be no more
    - type: text
      text: '!” For I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Prophetesses Condemned
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“As for you, son of man, prophesy against the women of your people, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “set your face against the daughters of your people.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: who are witches masquerading as prophets
    - type: text
      text: '. For they prophesy out of their own imagination. Prophesy against them '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'and say, ‘Hear what Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to you: You women are doomed who sew magic bands on their wrists and make veils of varying sizes for their heads in order to ensnare the lives of people, young and old. Do you think you can get away with entrapping the lives of my people and still preserve your own lives? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'You have dishonored my name among my people for a few handfuls of barley and a few pieces of bread. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars believe the “handfuls of barley” and “pieces of bread” may have been used for divination. By scattering them on the ground and seeing how they fell, they could determine if a person were to live or die. It is more likely that these seeds and scraps of bread were used as payment for their (false) prophecies.
      marker-yv: yv-n
    - type: text
      text: You put to death people who should not have died and kept alive people who should not have lived, because you lied to my people, and they listened to your lies!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, prophesy against the prophets of Israel '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who claim to speak for me
    - type: text
      text: ' but are prophesying out of their own imagination. Say to them: ‘Listen, you lying prophets, to the words of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“ ‘Therefore I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you: I am against your wristbands with which you ensnare people’s souls. I will tear them from your arms! And I will let your victims go free, those whom you hunt down like birds. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will rip off your scarves and deliver my people from your hands. They will no longer be trapped by your power, and then you will know for sure that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'By your lies you have made righteous people greatly discouraged (although I have not discouraged them). And by your lies you have encouraged the wicked not to repent from their wicked ways and save their lives. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Therefore you will no longer conjure up false visions or practice witchcraft. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ezekiel gives us eleven characteristics of false prophets: (1) They spoke out of their own imagination, not God’s will (see vv.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (2) They used and manipulated people rather than serving and ministering to others to help them (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (3) They were like scavengers looking for bruised and ruined lives to manipulate for personal gain (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (4) They did not strengthen or warn the people about what was coming; instead, they only had lying words (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (5) They claimed God was speaking to them, but their prophecies were meant to deceive their followers (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (6) They refused to expose sin (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and prophesied delusions. (7) They preached a message of peace and protection when, in fact, disastrous judgment was imminent (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (8) Their lies provoked God’s anger and brought judgment upon them (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
