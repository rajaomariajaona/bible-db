document_id: PRO.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Words of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My son, if you cosign a loan for an acquaintance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and guarantee his debt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll be sorry that you ever did it!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: If you keep nodding off and thinking, “I’ll do it later,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or say to yourself, “I’ll just sit back awhile and take it easy,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just watch how the future unfolds!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: By making excuses you’ll learn what it means to go without.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poverty will pounce on you like a bandit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “vagabond.” The Hebrew phrase here is literally translated “one who walks (away).”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and move in as your roommate for life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The life lesson from Solomon’s parable is this: the ant only lives six months yet stores more food than it will ever consume. We should learn the wisdom of preparing for the future and frugality in the present. Don’t put off for the future the preparations you should make today. Now is always better than later. Today is the day to choose what’s right and serve the Lord.'
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: Here’s another life lesson to learn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from observing wayward and wicked men.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “wayward and wicked man” is actually “a man of Belial.” This is a metaphor for a worthless man who worships other gods. The name Belial is found in numerous Dead Sea scrolls as a term for Satan.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can tell they are lawless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re constant liars, proud deceivers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: full of clever ploys and convincing plots.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew gives a picture of those who “wink their eyes, shuffle their feet, and point their fingers.” This is a figure of speech for the devious ways of the wicked.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Their twisted thoughts are perverse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they are always scheming to stir up trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sowing strife with every step they take.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But when calamity comes knocking on their door,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: suddenly and without warning they’re undone—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: broken to bits, shattered, with no hope of healing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The life lesson here is this: the clever and devious may look like they’re getting ahead in life, but their path guarantees destruction, with no one to help them out of it.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seven Things God Hates
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: There are six evils God truly hates
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and a seventh '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The number seven is the number of fullness and completion. The poetic form here is stating that evil in its fullness is an abomination to God. The seven things are a description of the sin of man that stands in the temple of our bodies attempting to usurp God.
      marker-yv: yv-n
    - type: text
      text: 'that is an abomination to him:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Putting others down while considering yourself superior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: spreading lies and rumors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: spilling the blood of the innocent,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: plotting evil in your heart toward another,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gloating over doing what’s plainly wrong,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: spouting lies in false testimony,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and stirring up strife '
    - type: usfm
      marker: it
      children:
      - type: text
        text: between friends
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “deception among brothers.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are entirely despicable to God!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You’ll be trapped by your promise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and legally bound by the agreement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So listen carefully to my advice:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: My son, obey your father’s godly instruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and follow your mother’s life-giving teaching.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For the New Testament believer, our mother is the church, who nurtures us and feeds us life-giving words. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:21–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fill your heart with their advice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and let your life be shaped by what they’ve taught you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Bind their words on your heart and tie them around your neck.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Their wisdom will guide you wherever you go
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and keep you from bringing harm to yourself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their instruction will whisper to you at every sunrise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and direct you through a brand-new day.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Torah.”
      marker-yv: yv-n
    - type: text
      text: is a bright beam of light
  - type: usfm
    marker: q1
    children:
    - type: text
      text: shining into every area of your life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: instructing and correcting you to discover the ways to godly living.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Truth or Consequences
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 24-25
    - type: text
      text: Truth will protect you from immorality
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and from the promiscuity of another man’s wife.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your heart won’t be enticed by her flatteries
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:24–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Don’t let her captivate you with her fluttering eyelids.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or lust over her beauty—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will her suggestive ways conquer you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Prostitutes reduce a man to poverty,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to beg for a loaf of bread.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the adulteress steals your soul—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she may even cost you your life!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase here is literally translated “she hunts for your precious soul.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: For how can a man light his pants on fire and not be burned?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Can he walk over hot coals of fire '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A picture of the lusts of the flesh.
      marker-yv: yv-n
    - type: text
      text: and not blister his feet?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: What makes you think that you can sleep with another man’s wife
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and not get caught?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you really think you’ll get away with it?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you know it will ruin your life?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Quickly get out of it if you possibly can!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Swallow your pride, get over your embarrassment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and go tell your “friend” you want your name '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is an implication in the Hebrew that the one whose loan was cosigned for is no longer a friend. The Hebrew word can also be translated “apostate.”
      marker-yv: yv-n
    - type: text
      text: off that contract.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: You can almost excuse a thief if he steals to feed his own family.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: But if he’s caught, he still has to pay back what he stole sevenfold;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his punishment and fine will cost him greatly.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Don’t be so stupid as to think
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you can get away with your adultery.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It will destroy your life, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The destroyer of your soul will do this.”
      marker-yv: yv-n
    - type: text
      text: and you’ll pay the price
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the rest of your days.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: You’ll discover what humiliation, shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and disgrace are all about,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for no one will ever let you forget what you’ve done.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: A husband’s jealousy makes a man furious;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he won’t spare you when he comes to take revenge.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Try all you want to talk your way out of it—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: offer him a bribe and see if you can manipulate him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with your money.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing will turn him aside
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when he comes to you with vengeance in his eyes!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Don’t put it off, and don’t rest until you get it done.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Rescue yourself from future pain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word means “trap.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and be free from it once and for all.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You’ll be so relieved that you did!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The life lesson to learn is that even when considering something that seems to be good, there may be unexpected consequences that should be considered before obligating yourself.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Life Lessons
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When you’re feeling lazy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come and learn a lesson from this tale of the tiny ant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, all you lazybones, come learn
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the example of the ant and enter into wisdom.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The ants have no chief, no boss, no manager—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no one has to tell them what to do.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You’ll see them working and toiling all summer long,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stockpiling their food in preparation for winter.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: So wake up, sleepyhead. How long will you lie there?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When will you wake up and get out of bed?
