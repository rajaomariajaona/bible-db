document_id: PRO.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Words of Wisdom
  - type: text
    content: My son, if you cosign a loan for an acquaintance
  - type: text
    content: and guarantee his debt,
  - type: text
    content: you’ll be sorry that you ever did it!
  '10':
  - type: text
    content: If you keep nodding off and thinking, “I’ll do it later,”
  - type: text
    content: or say to yourself, “I’ll just sit back awhile and take it easy,”
  - type: text
    content: just watch how the future unfolds!
  '11':
  - type: text
    content: By making excuses you’ll learn what it means to go without.
  - type: text
    content: Poverty will pounce on you like a bandit
  - type: note
    content: Or “vagabond.” The Hebrew phrase here is literally translated “one who walks (away).”
  - type: text
    content: and move in as your roommate for life.
  - type: note
    content: 'The life lesson from Solomon’s parable is this: the ant only lives six months yet stores more food than it will ever consume. We should learn the wisdom of preparing for the future and frugality in the present. Don’t put off for the future the preparations you should make today. Now is always better than later. Today is the day to choose what’s right and serve the Lord.'
  '12':
  - type: text
    content: Here’s another life lesson to learn
  - type: text
    content: from observing wayward and wicked men.
  - type: note
    content: The Hebrew word translated “wayward and wicked man” is actually “a man of Belial.” This is a metaphor for a worthless man who worships other gods. The name Belial is found in numerous Dead Sea scrolls as a term for Satan.
  - type: text
    content: You can tell they are lawless.
  - type: text
    content: They’re constant liars, proud deceivers,
  - type: text
    content: full of clever ploys and convincing plots.
  - type: note
    content: The Hebrew gives a picture of those who “wink their eyes, shuffle their feet, and point their fingers.” This is a figure of speech for the devious ways of the wicked.
  '14':
  - type: text
    content: Their twisted thoughts are perverse,
  - type: text
    content: and they are always scheming to stir up trouble,
  - type: text
    content: and sowing strife with every step they take.
  '15':
  - type: text
    content: But when calamity comes knocking on their door,
  - type: text
    content: suddenly and without warning they’re undone—
  - type: text
    content: broken to bits, shattered, with no hope of healing.
  - type: note
    content: 'The life lesson here is this: the clever and devious may look like they’re getting ahead in life, but their path guarantees destruction, with no one to help them out of it.'
  - type: heading
    content: Seven Things God Hates
  '16':
  - type: text
    content: There are six evils God truly hates
  - type: text
    content: 'and a seventh '
  - type: note
    content: The number seven is the number of fullness and completion. The poetic form here is stating that evil in its fullness is an abomination to God. The seven things are a description of the sin of man that stands in the temple of our bodies attempting to usurp God.
  - type: text
    content: 'that is an abomination to him:'
  '17':
  - type: text
    content: Putting others down while considering yourself superior,
  - type: text
    content: spreading lies and rumors,
  - type: text
    content: spilling the blood of the innocent,
  '18':
  - type: text
    content: plotting evil in your heart toward another,
  - type: text
    content: gloating over doing what’s plainly wrong,
  '19':
  - type: text
    content: spouting lies in false testimony,
  - type: text
    content: 'and stirring up strife '
  - type: text
    content: between friends
  - type: text
    content: .
  - type: note
    content: The Aramaic is “deception among brothers.”
  - type: text
    content: These are entirely despicable to God!
  '2':
  - type: text
    content: You’ll be trapped by your promise
  - type: text
    content: and legally bound by the agreement.
  - type: text
    content: 'So listen carefully to my advice:'
  '20':
  - type: text
    content: My son, obey your father’s godly instruction
  - type: text
    content: and follow your mother’s life-giving teaching.
  - type: note
    content: For the New Testament believer, our mother is the church, who nurtures us and feeds us life-giving words. See Gal. 4:21–31.
  '21':
  - type: text
    content: Fill your heart with their advice
  - type: text
    content: and let your life be shaped by what they’ve taught you.
  - type: note
    content: Or “Bind their words on your heart and tie them around your neck.”
  '22':
  - type: text
    content: Their wisdom will guide you wherever you go
  - type: text
    content: and keep you from bringing harm to yourself.
  - type: text
    content: Their instruction will whisper to you at every sunrise
  - type: text
    content: and direct you through a brand-new day.
  '23':
  - type: text
    content: 'For truth '
  - type: note
    content: Or “Torah.”
  - type: text
    content: is a bright beam of light
  - type: text
    content: shining into every area of your life,
  - type: text
    content: instructing and correcting you to discover the ways to godly living.
  - type: heading
    content: Truth or Consequences
  '24':
  - type: text
    content: Truth will protect you from immorality
  - type: text
    content: and from the promiscuity of another man’s wife.
  - type: text
    content: Your heart won’t be enticed by her flatteries
  - type: note
    content: Or “Don’t let her captivate you with her fluttering eyelids.”
  - type: text
    content: or lust over her beauty—
  - type: text
    content: nor will her suggestive ways conquer you.
  '26':
  - type: text
    content: Prostitutes reduce a man to poverty,
  - type: note
    content: Or “to beg for a loaf of bread.”
  - type: text
    content: and the adulteress steals your soul—
  - type: text
    content: she may even cost you your life!
  - type: note
    content: The Hebrew phrase here is literally translated “she hunts for your precious soul.”
  '27':
  - type: text
    content: For how can a man light his pants on fire and not be burned?
  '28':
  - type: text
    content: 'Can he walk over hot coals of fire '
  - type: note
    content: A picture of the lusts of the flesh.
  - type: text
    content: and not blister his feet?
  '29':
  - type: text
    content: What makes you think that you can sleep with another man’s wife
  - type: text
    content: and not get caught?
  - type: text
    content: Do you really think you’ll get away with it?
  - type: text
    content: Don’t you know it will ruin your life?
  '3':
  - type: text
    content: Quickly get out of it if you possibly can!
  - type: text
    content: Swallow your pride, get over your embarrassment,
  - type: text
    content: 'and go tell your “friend” you want your name '
  - type: note
    content: There is an implication in the Hebrew that the one whose loan was cosigned for is no longer a friend. The Hebrew word can also be translated “apostate.”
  - type: text
    content: off that contract.
  '30':
  - type: text
    content: You can almost excuse a thief if he steals to feed his own family.
  '31':
  - type: text
    content: But if he’s caught, he still has to pay back what he stole sevenfold;
  - type: text
    content: his punishment and fine will cost him greatly.
  '32':
  - type: text
    content: Don’t be so stupid as to think
  - type: text
    content: you can get away with your adultery.
  - type: text
    content: 'It will destroy your life, '
  - type: note
    content: Or “The destroyer of your soul will do this.”
  - type: text
    content: and you’ll pay the price
  - type: text
    content: for the rest of your days.
  '33':
  - type: text
    content: You’ll discover what humiliation, shame,
  - type: text
    content: and disgrace are all about,
  - type: text
    content: for no one will ever let you forget what you’ve done.
  '34':
  - type: text
    content: A husband’s jealousy makes a man furious;
  - type: text
    content: he won’t spare you when he comes to take revenge.
  '35':
  - type: text
    content: Try all you want to talk your way out of it—
  - type: text
    content: offer him a bribe and see if you can manipulate him
  - type: text
    content: with your money.
  - type: text
    content: Nothing will turn him aside
  - type: text
    content: when he comes to you with vengeance in his eyes!
  '4':
  - type: text
    content: Don’t put it off, and don’t rest until you get it done.
  '5':
  - type: text
    content: Rescue yourself from future pain
  - type: note
    content: The Hebrew word means “trap.”
  - type: text
    content: and be free from it once and for all.
  - type: text
    content: You’ll be so relieved that you did!
  - type: note
    content: The life lesson to learn is that even when considering something that seems to be good, there may be unexpected consequences that should be considered before obligating yourself.
  - type: heading
    content: Life Lessons
  '6':
  - type: text
    content: When you’re feeling lazy,
  - type: text
    content: come and learn a lesson from this tale of the tiny ant.
  - type: text
    content: Yes, all you lazybones, come learn
  - type: text
    content: from the example of the ant and enter into wisdom.
  '7':
  - type: text
    content: The ants have no chief, no boss, no manager—
  - type: text
    content: no one has to tell them what to do.
  '8':
  - type: text
    content: You’ll see them working and toiling all summer long,
  - type: text
    content: stockpiling their food in preparation for winter.
  '9':
  - type: text
    content: So wake up, sleepyhead. How long will you lie there?
  - type: text
    content: When will you wake up and get out of bed?
