document_id: EPH.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Divine Calling
  - type: text
    content: 'As a prisoner of the Lord, '
  - type: note
    content: Paul wrote this letter while a prisoner in Rome because of his faith in Christ. See Song. 8:6.
  - type: text
    content: 'I plead with you to walk holy, in a way that is suitable to your high rank, given to you in your divine calling. '
  '10':
  - type: text
    content: 'The same one who descended is also the one who ascended above the heights of heaven, in order to begin the restoration and fulfillment '
  - type: note
    content: As translated from the Aramaic. The Greek text says “that he might fill all things.”
  - type: text
    content: of all things.
  '11':
  - type: text
    content: 'And he has appointed some '
  - type: text
    content: with grace
  - type: text
    content: ' to be apostles, and some '
  - type: text
    content: with grace
  - type: text
    content: ' to be prophets, and some '
  - type: text
    content: with grace
  - type: text
    content: ' to be evangelists, '
  - type: note
    content: The Aramaic can be translated “preachers.”
  - type: text
    content: 'and some '
  - type: text
    content: with grace
  - type: text
    content: ' to be pastors, '
  - type: note
    content: Or “shepherds.”
  - type: text
    content: 'and some '
  - type: text
    content: with grace
  - type: text
    content: ' to be teachers. '
  - type: note
    content: The Aramaic can be translated “wise orators.”
  '12':
  - type: text
    content: 'And their calling is to nurture and prepare all the holy believers to do their own works of ministry, and as they do this they will enlarge and build up the body of Christ. '
  '13':
  - type: text
    content: These grace ministries will function
  - type: text
    content: ' until we all attain oneness into the faith, until we all experience the fullness of what it means to know the Son of God, '
  - type: note
    content: The Greek literally means “until we have the full knowledge of the Son of God.”
  - type: text
    content: 'and finally we become one into a perfect man '
  - type: note
    content: The Hebrew and Aramaic word for “perfect” is gamar, and the word implies that perfection cannot come to the body of Christ without the example and teaching of these five ministries—apostles, prophets, evangelists, pastors, and teachers. To ignore these five ministry gifts of the ascended Christ for today is to despise the gifts that God has given to the church.
  - type: text
    content: with the full dimensions of spiritual maturity and fully developed into the abundance of Christ.
  '14':
  - type: text
    content: 'And then our immaturity will end! And we will not be easily shaken by trouble, nor led astray by novel teachings or by the false doctrines of deceivers '
  - type: note
    content: The Greek literally means “dice-playing gamblers.”
  - type: text
    content: 'who teach clever lies. '
  '15':
  - type: text
    content: 'But instead we will remain strong and always sincere in our love as we express the truth. '
  - type: text
    content: All our direction and ministries will flow
  - type: text
    content: ' from Christ and lead us deeper into him, the anointed Head of his body, the church.'
  '16':
  - type: text
    content: 'For his “body” '
  - type: text
    content: has been formed in his image
  - type: text
    content: ' and is closely joined together and constantly connected as one. And every member '
  - type: text
    content: has been given divine gifts
  - type: text
    content: ' to contribute to the growth of all; and as '
  - type: text
    content: these gifts
  - type: text
    content: ' operate effectively throughout the whole body, we are built up and made perfect in love.'
  - type: heading
    content: Our New Life in Christ
  '17':
  - type: text
    content: 'So with the wisdom given to me from the Lord I say: You should not live like the unbelievers around you who walk in their empty delusions. '
  - type: note
    content: Or “opinions.”
  '18':
  - type: text
    content: 'Their corrupted logic has been clouded because their hearts are so far from God—their blinded understanding and deep-seated moral darkness keeps them from the true knowledge of God. '
  '19':
  - type: text
    content: Because of spiritual apathy, they surrender their lives to lewdness, impurity, and sexual obsession.
  '2':
  - type: text
    content: 'With tender humility and quiet patience, always demonstrate gentleness and generous '
  - type: note
    content: The Aramaic word literally means “stretching.”
  - type: text
    content: 'love toward one another, especially toward those who may try your patience. '
  '20':
  - type: text
    content: 'But this is not the way of life that Christ has unfolded within you. '
  '21':
  - type: text
    content: 'If you have really experienced the Anointed One, and heard his truth, '
  - type: text
    content: it will be seen in your life
  - type: text
    content: '; for we know that the ultimate reality '
  - type: note
    content: Or “ultimate learning.”
  - type: text
    content: is embodied in Jesus!
  '22':
  - type: text
    content: 'And he has taught you to let go of the lifestyle of the ancient man, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'the old self-life, which was corrupted by sinful and deceitful desires that spring from delusions. '
  '23':
  - type: text
    content: 'Now it’s time to be made new by every revelation that’s been given to you. '
  - type: note
    content: Or “in the spirit of your revelation.”
  '24':
  - type: text
    content: 'And to be transformed as you embrace the glorious Christ-within as your new life and live in union with him! For God has re-created you all over again in his perfect righteousness, and you now belong to him in the realm of true holiness. '
  '25':
  - type: text
    content: 'So discard every form of dishonesty and lying '
  - type: text
    content: so that you will be known as one
  - type: text
    content: ' who always speaks the truth, for we all belong to one another.'
  '26':
  - type: text
    content: 'But don’t let the passion of your emotions '
  - type: note
    content: The Aramaic word ragza means “to shake” or “to tremble.” It is a word used for any strong emotion, but usually refers to anger.
  - type: text
    content: 'lead you to sin! Don’t let anger control you '
  - type: text
    content: or be fuel for revenge
  - type: text
    content: ', not for even a day. '
  '27':
  - type: text
    content: 'Don’t give the slanderous accuser, the Devil, an opportunity to manipulate you! '
  '28':
  - type: text
    content: If any one of you has stolen from someone else, never do it again. Instead, be industrious, earning an honest living, and then you’ll have enough to bless those in need.
  '29':
  - type: text
    content: 'And never let ugly or hateful words come from your mouth, but instead let your words become beautiful gifts '
  - type: note
    content: Or “constructive.”
  - type: text
    content: that encourage others; do this by speaking words of grace to help them.
  '3':
  - type: text
    content: 'Be faithful to guard the sweet harmony of the Holy Spirit among you in the bonds of peace, '
  '30':
  - type: text
    content: 'The Holy Spirit of God has sealed you in Jesus Christ until you experience your full salvation. So never grieve the Spirit of God or take for granted his holy influence in your life. '
  - type: note
    content: The Greek manuscripts have “do not grieve,” while the Aramaic text reads “do not limit his scope.” This translation includes both concepts.
  '31':
  - type: text
    content: 'Lay aside bitter words, temper tantrums, revenge, profanity, and insults. '
  '32':
  - type: text
    content: 'But instead be kind '
  - type: note
    content: The Aramaic word for “kind” can also be translated “sweet.”
  - type: text
    content: and affectionate toward one another. Has God graciously forgiven you? Then graciously forgive one another in the depths of Christ’s love.
  '4':
  - type: text
    content: 'being one body and one spirit, as you were all called into the same glorious hope '
  - type: text
    content: of divine destiny
  - type: text
    content: .
  '5':
  - type: text
    content: 'For the Lord God is one, '
  - type: text
    content: and so are we
  - type: text
    content: ', for we share in one faith, one baptism, and one Father. '
  '6':
  - type: text
    content: And he is the perfect Father who leads us all, works through us all, and lives in us all!
  - type: heading
    content: The Grace-Gifts of Christ
  '7':
  - type: text
    content: 'And he has generously given each one of us supernatural grace, according to the size of the gift of Christ. '
  '8':
  - type: text
    content: 'This is why he says:'
  - type: text
    content: “He ascends into the heavenly heights
  - type: text
    content: taking his many captured ones with him,
  - type: note
    content: Or “he captured captivity.”
  - type: text
    content: and gifts were given to men.”
  - type: note
    content: Or “men were given as gifts.” See Ps. 68:18.
  '9':
  - type: text
    content: 'He “ascended” means that he returned to heaven, after he had first descended from the heights of heaven, even to the lower regions, namely, the earth. '
