document_id: EPH.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our Divine Calling
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As a prisoner of the Lord, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul wrote this letter while a prisoner in Rome because of his faith in Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 8:6
      metadata:
        usfm: SNG.8.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'I plead with you to walk holy, in a way that is suitable to your high rank, given to you in your divine calling. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'With tender humility and quiet patience, always demonstrate gentleness and generous '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word literally means “stretching.”
    marker-yv: yv-n
  - type: text
    text: 'love toward one another, especially toward those who may try your patience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Be faithful to guard the sweet harmony of the Holy Spirit among you in the bonds of peace, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'being one body and one spirit, as you were all called into the same glorious hope '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of divine destiny
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the Lord God is one, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and so are we
  - type: text
    text: ', for we share in one faith, one baptism, and one Father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And he is the perfect Father who leads us all, works through us all, and lives in us all!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Grace-Gifts of Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And he has generously given each one of us supernatural grace, according to the size of the gift of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'This is why he says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He ascends into the heavenly heights
- type: usfm
  marker: q1
  children:
  - type: text
    text: taking his many captured ones with him,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he captured captivity.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and gifts were given to men.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “men were given as gifts.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 68:18
      metadata:
        usfm: PSA.68.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He “ascended” means that he returned to heaven, after he had first descended from the heights of heaven, even to the lower regions, namely, the earth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The same one who descended is also the one who ascended above the heights of heaven, in order to begin the restoration and fulfillment '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek text says “that he might fill all things.”
    marker-yv: yv-n
  - type: text
    text: of all things.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And he has appointed some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with grace
  - type: text
    text: ' to be apostles, and some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with grace
  - type: text
    text: ' to be prophets, and some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with grace
  - type: text
    text: ' to be evangelists, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “preachers.”
    marker-yv: yv-n
  - type: text
    text: 'and some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with grace
  - type: text
    text: ' to be pastors, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “shepherds.”
    marker-yv: yv-n
  - type: text
    text: 'and some '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with grace
  - type: text
    text: ' to be teachers. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “wise orators.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'And their calling is to nurture and prepare all the holy believers to do their own works of ministry, and as they do this they will enlarge and build up the body of Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: it
    children:
    - type: text
      text: These grace ministries will function
  - type: text
    text: ' until we all attain oneness into the faith, until we all experience the fullness of what it means to know the Son of God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek literally means “until we have the full knowledge of the Son of God.”
    marker-yv: yv-n
  - type: text
    text: 'and finally we become one into a perfect man '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew and Aramaic word for “perfect” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gamar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and the word implies that perfection cannot come to the body of Christ without the example and teaching of these five ministries—apostles, prophets, evangelists, pastors, and teachers. To ignore these five ministry gifts of the ascended Christ for today is to despise the gifts that God has given to the church.'
    marker-yv: yv-n
  - type: text
    text: with the full dimensions of spiritual maturity and fully developed into the abundance of Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And then our immaturity will end! And we will not be easily shaken by trouble, nor led astray by novel teachings or by the false doctrines of deceivers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek literally means “dice-playing gamblers.”
    marker-yv: yv-n
  - type: text
    text: 'who teach clever lies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But instead we will remain strong and always sincere in our love as we express the truth. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: All our direction and ministries will flow
  - type: text
    text: ' from Christ and lead us deeper into him, the anointed Head of his body, the church.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For his “body” '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has been formed in his image
  - type: text
    text: ' and is closely joined together and constantly connected as one. And every member '
  - type: usfm
    marker: it
    children:
    - type: text
      text: has been given divine gifts
  - type: text
    text: ' to contribute to the growth of all; and as '
  - type: usfm
    marker: it
    children:
    - type: text
      text: these gifts
  - type: text
    text: ' operate effectively throughout the whole body, we are built up and made perfect in love.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our New Life in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So with the wisdom given to me from the Lord I say: You should not live like the unbelievers around you who walk in their empty delusions. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “opinions.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Their corrupted logic has been clouded because their hearts are so far from God—their blinded understanding and deep-seated moral darkness keeps them from the true knowledge of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Because of spiritual apathy, they surrender their lives to lewdness, impurity, and sexual obsession.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But this is not the way of life that Christ has unfolded within you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'If you have really experienced the Anointed One, and heard his truth, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: it will be seen in your life
  - type: text
    text: '; for we know that the ultimate reality '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “ultimate learning.”
    marker-yv: yv-n
  - type: text
    text: is embodied in Jesus!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And he has taught you to let go of the lifestyle of the ancient man, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'the old self-life, which was corrupted by sinful and deceitful desires that spring from delusions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now it’s time to be made new by every revelation that’s been given to you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the spirit of your revelation.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And to be transformed as you embrace the glorious Christ-within as your new life and live in union with him! For God has re-created you all over again in his perfect righteousness, and you now belong to him in the realm of true holiness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'So discard every form of dishonesty and lying '
  - type: usfm
    marker: it
    children:
    - type: text
      text: so that you will be known as one
  - type: text
    text: ' who always speaks the truth, for we all belong to one another.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But don’t let the passion of your emotions '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ragza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to shake” or “to tremble.” It is a word used for any strong emotion, but usually refers to anger.
    marker-yv: yv-n
  - type: text
    text: 'lead you to sin! Don’t let anger control you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: or be fuel for revenge
  - type: text
    text: ', not for even a day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Don’t give the slanderous accuser, the Devil, an opportunity to manipulate you! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: If any one of you has stolen from someone else, never do it again. Instead, be industrious, earning an honest living, and then you’ll have enough to bless those in need.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And never let ugly or hateful words come from your mouth, but instead let your words become beautiful gifts '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “constructive.”
    marker-yv: yv-n
  - type: text
    text: that encourage others; do this by speaking words of grace to help them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The Holy Spirit of God has sealed you in Jesus Christ until you experience your full salvation. So never grieve the Spirit of God or take for granted his holy influence in your life. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek manuscripts have “do not grieve,” while the Aramaic text reads “do not limit his scope.” This translation includes both concepts.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Lay aside bitter words, temper tantrums, revenge, profanity, and insults. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'But instead be kind '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word for “kind” can also be translated “sweet.”
    marker-yv: yv-n
  - type: text
    text: and affectionate toward one another. Has God graciously forgiven you? Then graciously forgive one another in the depths of Christ’s love.
