document_id: 2TH.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Requests Their Prayers
  - type: text
    content: 'Finally, dear brothers and sisters, pray for us that the Lord’s message will continue to spread rapidly and its glory be recognized everywhere, just as it was with you. '
  '10':
  - type: text
    content: 'For when we were with you we instructed you with these words: “Anyone who does not want to work for a living should go hungry.”'
  '11':
  - type: text
    content: 'Now, we hear rumors that some of you are being lazy '
  - type: note
    content: Or “not showing up for the war” (battle).
  - type: text
    content: 'and neglecting to work—that these people are not busy but busybodies! '
  '12':
  - type: text
    content: 'So with the authority of the Lord Jesus Christ, we order them to go back to work in an orderly fashion and exhort them to earn their own living. '
  - type: note
    content: Or “eat their own bread.”
  '13':
  - type: text
    content: Brothers and sisters, don’t ever grow weary in doing what is right.
  - type: note
    content: Doing right in this context is not growing tired of honest work. The Hebrew word for “work” (avodah) is the same Hebrew word (a homonym) for worship. Our work can be a form of worship. Our lives are to be a seamless expression of offering to God all of our activities as things we do with all our might for the glory of God.
  '14':
  - type: text
    content: 'Take special note of anyone who won’t obey what we have written and stay away from them, so that they would be ashamed and get turned around. '
  - type: note
    content: The passive Greek verb entropē means “to be turned” (around); that is, to be changed. This was not punishment but an attempt to draw wayward individuals into repentance and bring them back into restored fellowship with the church.
  '15':
  - type: text
    content: Yet don’t regard them as enemies, but caution them as fellow believers.
  - type: heading
    content: Conclusion
  '16':
  - type: text
    content: 'Now, may the Lord himself, the Lord of peace, pour into you his peace in every circumstance and in every possible way. The Lord’s '
  - type: text
    content: tangible
  - type: text
    content: ' presence be with you all.'
  - type: note
    content: Paul is longing for the guidance, influence, and power that comes from God’s presence to be real to them.
  '17':
  - type: text
    content: 'So now, in my own handwriting, I add these words:'
  - type: text
    content: Loving greetings to each of you. And may the grace of our Lord Jesus Christ be with you all.
  - type: text
    content: Paul
  - type: text
    content: The above is my signature and the token of authenticity in every letter I write.
  - type: note
    content: See 1 Cor. 16:21; Gal. 6:11; Col. 4:18; Philem. 19. The Aramaic ends with “The end of Paul’s second letter to the Thessalonians, written from Laodicea [Pisidian].”
  '2':
  - type: text
    content: 'And pray that God will rescue us from wicked '
  - type: note
    content: The Greek word atopos can also be translated “weird,” “irrational,” “absurd,” “disgusting.”
  - type: text
    content: 'and evil people, for not everyone believes '
  - type: text
    content: the message
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'But the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'is always faithful '
  - type: note
    content: Twelve times in the Bible the Lord is described as faithful. (See Deut. 7:9; Isa. 49:7; 1 Cor. 1:9; 10:13; 2 Thess. 3:3; Heb. 10:23; 11:11; 1 Peter 4:19; 1 John 1:9; Rev. 1:5; 3:14; 19:11.)
  - type: text
    content: 'to place you on a firm foundation and guard you from the Evil One. '
  - type: note
    content: Or “guard you from evil” (the unproductive and sinful ways of the past).
  '4':
  - type: text
    content: 'We have complete confidence in the Lord concerning you '
  - type: note
    content: Or “The Lord gives us confidence in you.”
  - type: text
    content: and we are sure that you are doing and will continue to do what we have told you.
  '5':
  - type: text
    content: 'Now may the Lord move your hearts into '
  - type: text
    content: a greater understanding of
  - type: text
    content: ' God’s pure love for you and into Christ’s steadfast endurance.'
  - type: note
    content: Or “the faithful endurance of [all things] for Christ.” Either translation is grammatically possible as a subjective genitive or an objective genitive. The Aramaic can be translated “the hope of the Messiah.”
  - type: heading
    content: A Warning about Laziness and Disunity
  '6':
  - type: text
    content: 'Beloved brothers and sisters, we instruct you, in the name of our Lord Jesus Christ, to stay away from believers who are unruly '
  - type: note
    content: Or “undisciplined” or “lazy” or “not in battle order” or “not in your duty station.” There is an implication that there were believers who refused to work for a living. Paul is implying that the church should not financially support those who refuse to work. Personal responsibility is a common theme in Paul’s teachings.
  - type: text
    content: 'and who stray from all that we have taught you. '
  - type: note
    content: Or “don’t live according to the traditions they received from us.”
  '7':
  - type: text
    content: 'For you know very well that you should order your lives after our example, because we were not undisciplined when we were with you. '
  '8':
  - type: text
    content: 'We didn’t sponge off of you, but we worked hard night and day to provide our own food and lodging and not be a burden to any of you. '
  '9':
  - type: text
    content: 'It wasn’t because we don’t have the right to be supported, '
  - type: note
    content: Those who preach the gospel have the right to be supported financially and deserve their wages (1 Cor. 9:6–18). However, it seems that Paul’s custom was to earn his own way when he went into a city for the first time to show the truth of the gospel without mixed motives. His ministry in Thessalonica was somewhat of an anomaly. Because there were believers who were lazy and not working for a living, Paul gave up his right to have financial support from them and chose to work “night and day” (v. 8) to be an example to them.
  - type: text
    content: 'but we wanted to provide you an example to follow. '
