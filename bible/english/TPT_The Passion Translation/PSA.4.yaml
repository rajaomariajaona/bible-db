document_id: PSA.4
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: An Evening Prayer for Help
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here, found in the inscription of fifty-four Psalms, is usually rendered as “choirmaster” or “chief director of music.” It is taken from the root word for “shining” or “brilliant” (i.e., purity, holiness). Another way to translate “choirmaster” is “the shining one” or “the one who glitters from afar.” Jesus Christ is the chief musician of all eternity who sings in the midst of his people (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 2:12
      metadata:
        usfm: HEB.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the end, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “stringed instruments” or “smiting.”
    marker-yv: yv-n
  - type: text
    text: a melody by King David
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God, you are my righteousness, my Champion Defender.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Answer me when I cry for help!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whenever I was in distress, you enlarged me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you created room for me.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m being squeezed again—I need your kindness right away!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Grant me your grace, hear my prayer, and set me free!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Listen to me, you elite among men:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you defame my honor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my glorious one.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and drag it down into shame?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will you ever stop insulting me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long will you set your heart on shadows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chasing your lies and delusions?
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'May we never forget that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' works wonders'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is considerable variation in possible translations from different manuscripts. Some manuscripts read “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sets apart a faithful one for himself.” Another possible translation is “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: has revealed to me his marvelous love.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: for every one of his devoted lovers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And this is how I know that he will answer my every prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tremble in awe before the Lord, and do not sin against him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Be still upon your bed and search your heart before him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Meditate on your bed and repent [lament].” It is always wise at the end of every day to cleanse our hearts in God’s grace and mercy.
    marker-yv: yv-n
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Bring to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' the sacrifice of righteousness and put your trust in him.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lord, prove them wrong when they say, “God can’t help you!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the light of your radiant face
- type: usfm
  marker: q1
  children:
  - type: text
    text: break through and shine upon us!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The intense pleasure you give me
- type: usfm
  marker: q1
  children:
  - type: text
    text: surpasses the gladness of harvest time,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even more than when the harvesters
- type: usfm
  marker: q1
  children:
  - type: text
    text: gaze upon their ripened grain
- type: usfm
  marker: q1
  children:
  - type: text
    text: and when their new wine overflows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Now, because of you, Lord, I will lie down in peace and sleep comes at once,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for no matter what happens, I will live unafraid!
