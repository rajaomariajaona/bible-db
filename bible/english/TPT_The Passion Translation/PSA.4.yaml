document_id: PSA.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: An Evening Prayer for Help
  - type: text
    content: For the Pure and Shining One
  - type: note
    content: The Hebrew word used here, found in the inscription of fifty-four Psalms, is usually rendered as “choirmaster” or “chief director of music.” It is taken from the root word for “shining” or “brilliant” (i.e., purity, holiness). Another way to translate “choirmaster” is “the shining one” or “the one who glitters from afar.” Jesus Christ is the chief musician of all eternity who sings in the midst of his people (Heb. 2:12).
  - type: text
    content: 'For the end, '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “stringed instruments” or “smiting.”
  - type: text
    content: a melody by King David
  - type: text
    content: God, you are my righteousness, my Champion Defender.
  - type: text
    content: Answer me when I cry for help!
  - type: text
    content: Whenever I was in distress, you enlarged me.
  - type: note
    content: Or “you created room for me.”
  - type: text
    content: I’m being squeezed again—I need your kindness right away!
  - type: text
    content: Grant me your grace, hear my prayer, and set me free!
  '2':
  - type: text
    content: 'Listen to me, you elite among men:'
  - type: text
    content: How long will you defame my honor
  - type: note
    content: Or “my glorious one.”
  - type: text
    content: and drag it down into shame?
  - type: text
    content: Will you ever stop insulting me?
  - type: text
    content: How long will you set your heart on shadows,
  - type: text
    content: chasing your lies and delusions?
  - type: text
    content: Pause in his presence
  '3':
  - type: text
    content: 'May we never forget that '
  - type: text
    content: Yahweh
  - type: text
    content: ' works wonders'
  - type: note
    content: There is considerable variation in possible translations from different manuscripts. Some manuscripts read “Yahweh sets apart a faithful one for himself.” Another possible translation is “Yahweh has revealed to me his marvelous love.”
  - type: text
    content: for every one of his devoted lovers.
  - type: text
    content: And this is how I know that he will answer my every prayer.
  '4':
  - type: text
    content: Tremble in awe before the Lord, and do not sin against him.
  - type: text
    content: Be still upon your bed and search your heart before him.
  - type: note
    content: Or “Meditate on your bed and repent [lament].” It is always wise at the end of every day to cleanse our hearts in God’s grace and mercy.
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: 'Bring to '
  - type: text
    content: Yahweh
  - type: text
    content: ' the sacrifice of righteousness and put your trust in him.'
  '6':
  - type: text
    content: Lord, prove them wrong when they say, “God can’t help you!”
  - type: text
    content: Let the light of your radiant face
  - type: text
    content: break through and shine upon us!
  '7':
  - type: text
    content: The intense pleasure you give me
  - type: text
    content: surpasses the gladness of harvest time,
  - type: text
    content: even more than when the harvesters
  - type: text
    content: gaze upon their ripened grain
  - type: text
    content: and when their new wine overflows.
  '8':
  - type: text
    content: Now, because of you, Lord, I will lie down in peace and sleep comes at once,
  - type: text
    content: for no matter what happens, I will live unafraid!
