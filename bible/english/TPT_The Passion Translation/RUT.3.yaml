    - type: usfm
      marker: ft
      children:
      - type: text
        text: Symbolically, we too uncover (reveal) his feet, his walk of holiness and love. We appropriate his grace to walk in his ways when we take our place resting with him in his finished work. We are a company of lovers resting at his feet—“a feet company” who will walk like him. All we have to do is listen and obey him, for he will tell us what to do (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
