  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ruth stayed near Boaz’s feet that night. She awoke before it was light enough for anyone to recognize her. Boaz thought, “No one must know that a woman visited me at the threshing floor.” '
  '15':
  - type: usfm
    marker: p
