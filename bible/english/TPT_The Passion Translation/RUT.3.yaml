      children:
      - type: text
        text: As Ruth was about to leave
    - type: text
      text: ', Boaz said to her, “Here, bring me the cloak you’re wearing and hold it open.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As she held it open, Boaz poured six measures '
    - type: usfm
