document_id: RUT.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ruth and Boaz at the Threshing Floor
  - type: text
    content: 'One day, Naomi said to Ruth: “I want to see you marry so that you’ll be happy and secure. '
  - type: note
    content: The Hebrew text is literally “Should I not seek rest [a home] for you so it may go well with you?”
  '10':
  - type: text
    content: 'Boaz said: “Dear woman, may '
  - type: text
    content: Yahweh
  - type: text
    content: ' bless you, for this act of kindness you are showing me exceeds the kindness you have shown '
  - type: text
    content: to Naomi
  - type: text
    content: '. You didn’t search for a young man to marry, either rich or poor. '
  '11':
  - type: text
    content: 'My daughter, don’t worry. I promise to do everything you ask, because everyone knows '
  - type: note
    content: Ruth, the bride, could not hide her true character. See Matt. 5:13–16; cf. Acts 26:26.
  - type: text
    content: 'you’re a brave woman of noble character. '
  - type: note
    content: Or “virtuous woman.” This is the Hebrew word chayil, which is often used in connection with military prowess and moral excellence. See the first footnote on 2:1. We can see Ruth as a metaphor for the “last-days” church, the virtuous, overcoming bride of Jesus Christ. See Eph. 5:25–27.
  '12':
  - type: text
    content: 'It’s true that I am a kinsman-redeemer, but you have a closer kinsman-redeemer than I. '
  '13':
  - type: text
    content: 'Stay here tonight, '
  - type: note
    content: Ruth rested at Boaz’s feet through the dark night until morning. See Ps. 23:2; Song. 1:16; Matt. 11:28; Heb. 4:1; 6:13–20.
  - type: text
    content: and I will protect you
  - type: text
    content: '. In the morning, we’ll see if he’s willing to redeem you. '
  - type: note
    content: That is, “we will see if he chooses to marry you.”
  - type: text
    content: 'If he does, good; let him. But if he refuses to redeem you, then I promise, as surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ' lives, I will. Sleep here until morning.”'
  '14':
  - type: text
    content: 'So Ruth stayed near Boaz’s feet that night. She awoke before it was light enough for anyone to recognize her. Boaz thought, “No one must know that a woman visited me at the threshing floor.” '
  '15':
  - type: text
    content: As Ruth was about to leave
  - type: text
    content: ', Boaz said to her, “Here, bring me the cloak you’re wearing and hold it open.”'
  - type: text
    content: 'As she held it open, Boaz poured six measures '
  - type: note
    content: The Hebrew text does not state what measure is involved, but it had to be an amount that a woman could carry on her head or shoulder. The majority of modern scholars conclude that the amount of barley could have exceeded fifty pounds. If so, this impressive amount of barley was designed to impress both Ruth and Naomi with Boaz’s generosity and his determination to help them.
  - type: text
    content: of barley into it. He then helped place it on her head to carry, and she went back to Bethlehem.
  '16':
  - type: text
    content: 'When Ruth returned to her mother-in-law, Naomi asked her, “How did it go, my dear daughter? '
  - type: text
    content: How did Boaz receive you?
  - type: text
    content: ”
  - type: text
    content: 'Ruth told Naomi everything that he did for her. '
  '17':
  - type: text
    content: She added, “Boaz gave me all this barley, saying, ‘You must not go home empty-handed without a gift for your mother-in-law.’ ”
  '18':
  - type: text
    content: 'Naomi answered, “My daughter, wait here until you see what happens. Boaz will not rest until he has finished '
  - type: note
    content: Jesus has “finished” all he needed to do to redeem us fully. We rest from our own labors in his finished work. The Hebrew word for “finished” is kallah, which is a homonym of the word for “bride.” See John 19:30.
  - type: text
    content: doing what he promised he would do today.”
  '2':
  - type: text
    content: 'Now listen, a man named Boaz is our relative. '
  - type: note
    content: Boaz is a picture of our Lord Jesus Christ. Jesus is our Kinsman-Redeemer. He is a kinsman, for he took upon himself flesh and blood to take away our curse (see Gal. 3:13; Heb. 2:11) and our slavery to sin. He is the appointed heir of all things (see Heb. 1:1–3). He has perpetuated the nature, character, and kingdom of God upon the earth. He has perpetuated God’s name (see Eph. 1:20–23; Phil. 2:6–11).
  - type: text
    content: 'You worked with his servant girls in his fields. This evening, he’ll be winnowing barley on the threshing floor. '
  - type: note
    content: Likewise, in the “evening” of this age, our heavenly Boaz is at his threshing floor separating the chaff from the grain (see Amos 9:9; Mal. 3:1–3; Matt. 13:1–58; Luke 3:16–17).
  '3':
  - type: text
    content: 'Now, take a bath and put on some nice perfume. '
  - type: note
    content: Or “anoint yourself.” In this final season of harvest, we too are to wash ourselves by the Word of God (see John 15:3; Eph. 5:25–27), and we also will receive the anointing of the Holy Spirit through prayer and devotion before the Lord.
  - type: text
    content: 'Dress in your best clothes '
  - type: note
    content: The believer today wears their “best clothes” when putting on Christ (cf. Rom. 13:11–14). We are clothed in his perfect righteousness. Then we go down humbly to meet our Beloved at his threshing floor.
  - type: text
    content: 'and go to the threshing floor, but don’t let him know you’re there until he’s had plenty to eat and drink. '
  '4':
  - type: text
    content: 'Watch closely to see where he lies down. '
  - type: note
    content: We need to note the place where our Boaz lay down (the cross and empty tomb). He lay down to rest in his finished work (see John 19:30; Heb. 4:10).
  - type: text
    content: 'Then go, uncover his feet, and lie down there. '
  - type: note
    content: Symbolically, we too uncover (reveal) his feet, his walk of holiness and love. We appropriate his grace to walk in his ways when we take our place resting with him in his finished work. We are a company of lovers resting at his feet—“a feet company” who will walk like him. All we have to do is listen and obey him, for he will tell us what to do (see John 7:17). Jesus will have a loving bride worshiping at his feet at midnight.
  - type: text
    content: He will tell you what to do.”
  '5':
  - type: text
    content: Ruth answered, “I’ll do everything you’ve told me.”
  - type: note
    content: Like Mary, the mother of Jesus, Ruth accepted what the Lord had for her. “May everything you have told me come to pass” (Luke 1:38).
  '6':
  - type: text
    content: 'That evening, Ruth went down to the threshing floor and did all her mother-in-law had told her to do. '
  '7':
  - type: text
    content: 'After his evening meal, Boaz was in a good mood. He went to lie down at the far end of the grain pile '
  - type: note
    content: At the end of this age there will be a great harvest, a “pile of grain” brought to our Lord Jesus Christ.
  - type: text
    content: and fell fast asleep. Ruth quietly tiptoed over to him, uncovered his feet, and lay down.
  '8':
  - type: text
    content: 'Around midnight, Boaz was startled, and he awoke. He was surprised to find a woman lying at his feet. '
  '9':
  - type: text
    content: “Who are you?” Boaz asked.
  - type: text
    content: '“I am Ruth, your servant girl,” she answered. “Spread the corner '
  - type: note
    content: The garments of faithful Israelites included a tassel at each of the four corners according to Num. 15:38; Deut. 22:12. This was an outward sign of covenant faithfulness, which Ruth seemed to acknowledge when she asked Boaz to cover her with the “corner” of his garment. She knew him to be faithful to Yahweh in other ways, and in this fashion, she trusted he would be faithful to the covenant toward her and Naomi. Boaz would redeem what Yahweh sought to be redeemed, and Ruth was seeking the fulfillment of the promise to be “under the wing” of Yahweh’s faithfulness. This same “corner” is the one that the woman with the issue of blood took hold of on Jesus’ garment in Matt. 9:20. While the teachers of the law in Jesus’ day wore their tassels extra long, as if they were extra faithful to Yahweh, the tassels at the edge of Jesus’ garments conveyed the blessing of healing, in testimony to the faithfulness of Yahweh himself.
  - type: text
    content: 'of your garment over me '
  - type: note
    content: Or “spread your wing [or wings] over me.” This was likely a figure of speech for “Please marry me.” Ruth’s actions were symbolic of a marriage proposal. Jesus spreads his wings over us and heals us (see Mal. 4:2; Luke 8:44). His mantle (cloak) of anointing covers us.
  - type: text
    content: because you are a close relative by marriage, one who is my kinsman-redeemer.”
  - type: note
    content: That is, “one who has the right to marry me.” Ruth knew who she was. She boldly requested grace from Boaz. We too come boldly to the throne of grace. Ruth had no false humility; she was sincere and confident as she spoke to Boaz. She called herself his “servant.” For the word “servant,” the Greek Septuagint uses the word doulos, which means “a bondservant unto death.”
