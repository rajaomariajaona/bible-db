        - type: text
          text: The Hebrew text does not state what measure is involved, but it had to be an amount that a woman could carry on her head or shoulder. The majority of modern scholars conclude that the amount of barley could have exceeded fifty pounds. If so, this impressive amount of barley was designed to impress both Ruth and Naomi with Boaz’s generosity and his determination to help them.
      marker-yv: yv-n
    - type: text
      text: of barley into it. He then helped place it on her head to carry, and she went back to Bethlehem.
  '16':
  - type: usfm
