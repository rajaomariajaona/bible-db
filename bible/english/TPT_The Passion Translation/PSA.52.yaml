document_id: PSA.52,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Fate of Cynics
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A song of instruction by King David composed when Doeg the Edomite betrayed David to Saul, saying, “David has come to the house of Ahimilech!”
  - type: note
    content: For this episode in David’s life, see 1 Sam. 21:1–9; 22:9–23. The Edomites, although close relatives to the Hebrews, were bitter enemies to God’s people. In spite of Doeg’s lineage, he became a high-ranking official in Saul’s kingdom. Herod the Great, who slaughtered the babies of Bethlehem, was an Edomite. At the time David wrote this psalm, Saul had already attempted to kill him sixteen times. Ahimilech, the caretaker of the sword of Goliath, was a descendant of Eli.
  - type: text
    content: You call yourself a mighty man, a big shot?
  - type: text
    content: Why do you boast in the evil you have done?
  - type: text
    content: Yet God’s loyal love will protect me and carry the day!
  '2':
  - type: text
    content: 'Listen, O deceiver, trickster of others:'
  - type: text
    content: Your words are wicked, harming and hurting all who hear them.
  '3':
  - type: text
    content: You love evil and hate what is good and right.
  - type: text
    content: You would rather lie than tell the truth.
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: You love to distort, devour, and deceive,
  - type: text
    content: using your sly tongue to spin the truth.
  '5':
  - type: text
    content: But the Almighty will strike you down forever!
  - type: text
    content: He will pull you up by your roots
  - type: text
    content: and drag you away to the darkness of death.
  - type: text
    content: Pause in his presence
  '6':
  - type: text
    content: The godly will see all this and will be awestruck.
  - type: text
    content: Then they will laugh at the wicked, saying,
  '7':
  - type: text
    content: “See what happens to those great in their own eyes
  - type: text
    content: who don’t trust in the Most High to save them!
  - type: text
    content: Look how they trusted only in their wealth
  - type: text
    content: and made their living from wickedness.”
  - type: note
    content: Or “and [was] strong in [his] destruction.”
  '8':
  - type: text
    content: 'But I am like a flourishing olive tree, '
  - type: text
    content: anointed
  - type: text
    content: ' in the house of God.'
  - type: note
    content: The olive tree was the source of the sacred anointing oil.
  - type: text
    content: I trust in the unending love of God;
  - type: text
    content: his passion toward me is forever and ever.
  '9':
  - type: text
    content: Because it is finished,
  - type: note
    content: Or “You have acted [finished it].” The words “It is finished” were the last words of Jesus on the cross.
  - type: text
    content: I will praise you forever and give you thanks.
  - type: text
    content: Before all your godly lovers I will proclaim your beautiful name!
