document_id: PSA.52,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Fate of Cynics
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of instruction by King David composed when Doeg the Edomite betrayed David to Saul, saying, “David has come to the house of Ahimilech!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For this episode in David’s life, see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 21:1–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 22:9–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Edomites, although close relatives to the Hebrews, were bitter enemies to God’s people. In spite of Doeg’s lineage, he became a high-ranking official in Saul’s kingdom. Herod the Great, who slaughtered the babies of Bethlehem, was an Edomite. At the time David wrote this psalm, Saul had already attempted to kill him sixteen times. Ahimilech, the caretaker of the sword of Goliath, was a descendant of Eli.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You call yourself a mighty man, a big shot?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why do you boast in the evil you have done?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet God’s loyal love will protect me and carry the day!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen, O deceiver, trickster of others:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your words are wicked, harming and hurting all who hear them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love evil and hate what is good and right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You would rather lie than tell the truth.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You love to distort, devour, and deceive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: using your sly tongue to spin the truth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the Almighty will strike you down forever!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will pull you up by your roots
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and drag you away to the darkness of death.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The godly will see all this and will be awestruck.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then they will laugh at the wicked, saying,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See what happens to those great in their own eyes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who don’t trust in the Most High to save them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look how they trusted only in their wealth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made their living from wickedness.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “and [was] strong in [his] destruction.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I am like a flourishing olive tree, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: anointed
    - type: text
      text: ' in the house of God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The olive tree was the source of the sacred anointing oil.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I trust in the unending love of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his passion toward me is forever and ever.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because it is finished,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 52:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You have acted [finished it].” The words “It is finished” were the last words of Jesus on the cross.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise you forever and give you thanks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before all your godly lovers I will proclaim your beautiful name!
