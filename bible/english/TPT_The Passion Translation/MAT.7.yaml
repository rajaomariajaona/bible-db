        children:
        - type: text
          text: Or “scribes” (experts of the Law). Jesus taught from an inner knowledge of God and his Word, for his teaching emphasized obedience to God from the heart, not just outwardly keeping laws.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why would you focus on the flaw in someone else’s life and fail to notice the glaring flaws of your own?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Why do you see a speck in your brother’s eye but fail to see the beam of wood sticking out of your own eye?”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How could you say to your friend, ‘Let me show you where you’re wrong,’ when you’re guilty of even more?
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You’re being hypercritical and a hypocrite! First acknowledge and deal with your own ‘blind spots,’ and then you’ll be capable of dealing with the ‘blind spot’ of your friend.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You hypocrite, why don’t you first remove the beam sticking out of your own eye? Then you can see clearly to remove the small speck out of your brother’s eye.” Jesus is clearly teaching that our blind spots prevent us from accurately evaluating the needs of others.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who would hang earrings on a dog’s ear or throw pearls
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “Don’t let the dogs have consecrated [holy] meat.” The Aramaic word for “earrings” is almost identical to the word for “holy.” Earrings and pearls are symbols of spiritual truths given to us by God. They give us beautiful “ears” to hear his voice and impart lovely pearls of wisdom, which are not to be regarded lightly or shared with those who have their hearts closed. The Aramaic word for “throw” is almost identical to the word for “to instruct” or “to teach.” The value of wisdom is not appreciated by those who have no ears to hear it.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in front of wild pigs? They’ll only trample them under their feet and then turn around and tear you to pieces!
