  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “In everything you do, be careful to treat others in the same way you’d want them to treat you,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
