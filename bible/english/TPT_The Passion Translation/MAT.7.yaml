document_id: MAT.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Do Not Judge
  - type: text
    content: “Refuse to be a critic full of bias toward others, and you will not be judged.
  - type: text
    content: ' '
  - type: note
    content: It is God’s judgment that is being implied by the passive verbs.
  '10':
  - type: text
    content: Or when asked for a piece of fish, what parent would offer his child a snake instead?
  - type: text
    content: ' '
  '11':
  - type: text
    content: If you, imperfect as you are,
  - type: text
    content: ' '
  - type: note
    content: Or “although you are evil.”
  - type: text
    content: know how to lovingly take care of your children and give them what’s best, how much more ready is your heavenly Father to give wonderful gifts
  - type: text
    content: ' '
  - type: note
    content: Hebrew Matthew is “give his good Spirit,” a reference to asking for the Holy Spirit. See also Luke 11:13.
  - type: text
    content: to those who ask him?”
  - type: heading
    content: The Golden Rule
  '12':
  - type: text
    content: “In everything you do, be careful to treat others in the same way you’d want them to treat you,
  - type: text
    content: ' '
  - type: note
    content: This is known as the “Golden Rule,” which is the ethic of treating others the same way that we want to be treated. It is the essence of love that fulfills all the expectations of the Law.
  - type: text
    content: for that is the essence of all the teachings of the Law and the Prophets.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Enter through the narrow gate
  - type: text
    content: ' '
  - type: note
    content: In context, Jesus connects the narrow gate to the “Golden Rule.” Love is the true gateway that leads to life, for God is love.
  - type: text
    content: because the wide gate and broad path is the way that leads to destruction—nearly everyone chooses that crowded road!
  - type: text
    content: ' '
  '14':
  - type: text
    content: The narrow gate and the difficult way leads to eternal life—so few even find it!”
  - type: heading
    content: False Prophets
  '15':
  - type: text
    content: “Constantly be on your guard against phony prophets. They come disguised as lambs, appearing to be genuine, but on the inside they are like wild, ravenous wolves!
  - type: text
    content: ' '
  - type: note
    content: Hebrew Matthew adds a phrase, “They are full of deceit as wild, ravenous wolves.” See Ezek. 22:27; Acts 20:29; Mic. 3:5; John 10:12. There is at least a hint here of the Benjamite prophecy found in Gen. 49:27.
  '16':
  - type: text
    content: You can spot them by their actions, for the fruits of their character will be obvious. You won’t find sweet grapes hanging on a thorn bush, and you’ll never pick good fruit from a tumbleweed.
  - type: text
    content: ' '
  '17':
  - type: text
    content: So if the tree is good, it will produce good fruit; but if the tree is bad, it will bear only rotten fruit and deserves to be cut down and burned.
  - type: text
    content: ' '
  '2':
  - type: text
    content: For you’ll be judged by the same standard that you’ve used to judge others. The measurement you use on them will be used on you.
  - type: text
    content: ' '
  - type: note
    content: See Rom. 2:1.
  '20':
  - type: text
    content: You’ll know them by the obvious fruit of their lives and ministries.”
  - type: heading
    content: Jesus Warns of Pretenders
  '21':
  - type: text
    content: “Not everyone who says to me, ‘Lord, Lord,’ will enter into heaven’s kingdom. It is only those who persist in doing the will of my heavenly Father.
  - type: text
    content: ' '
  '22':
  - type: text
    content: On the day of judgment many will say to me, ‘Lord, Lord, don’t you remember us? Didn’t we prophesy
  - type: text
    content: ' '
  - type: note
    content: Or “preach in your name.”
  - type: text
    content: in your name? Didn’t we cast out demons and do many miracles in your name?’
  - type: text
    content: ' '
  '23':
  - type: text
    content: But I will have to say to them, ‘Go away from me, you lawless rebels! I’ve never been joined to you!’
  - type: note
    content: The Aramaic can be translated “From everlasting I have not known you.”
  '24':
  - type: text
    content: “Everyone who hears my teaching and applies it to his life can be compared to a wise man who built his house on an unshakable foundation.
  - type: text
    content: ' '
  '25':
  - type: text
    content: When the rains fell and the flood
  - type: text
    content: ' '
  - type: note
    content: Or “rivers.” See also Song. 8:7.
  - type: text
    content: came, with fierce winds beating upon his house, it stood firm because of its strong foundation.
  '26':
  - type: text
    content: “But everyone who hears my teaching and does not apply it to his life can be compared to a foolish man who built his house on sand.
  - type: text
    content: ' '
  '27':
  - type: text
    content: When it rained and rained and the flood came, with wind and waves beating upon his house, it collapsed and was swept away.”
  - type: note
    content: Or “and great was its fall!”
  '28':
  - type: text
    content: 'By the time Jesus finished speaking, the crowds were awestruck '
  - type: note
    content: The Greek word used here, ekplesso, is a strong verb that means “awestruck, filled with amazement, astonished, panic stricken, something that takes your breath away (being hit with a blow), to be shocked, to expel, to drive out.” Clearly, Jesus spoke with such glory and power emanating from him that his words were like thunderbolts in their hearts. May we hear his words in the same way today.
  - type: text
    content: 'by his teaching, '
  '29':
  - type: text
    content: because his words carried such great authority, quite unlike the religious scholars.
  - type: note
    content: Or “scribes” (experts of the Law). Jesus taught from an inner knowledge of God and his Word, for his teaching emphasized obedience to God from the heart, not just outwardly keeping laws.
  '3':
  - type: text
    content: Why would you focus on the flaw in someone else’s life and fail to notice the glaring flaws of your own?
  - type: text
    content: ' '
  - type: note
    content: Or “Why do you see a speck in your brother’s eye but fail to see the beam of wood sticking out of your own eye?”
  '4':
  - type: text
    content: How could you say to your friend, ‘Let me show you where you’re wrong,’ when you’re guilty of even more?
  - type: text
    content: ' '
  '5':
  - type: text
    content: You’re being hypercritical and a hypocrite! First acknowledge and deal with your own ‘blind spots,’ and then you’ll be capable of dealing with the ‘blind spot’ of your friend.
  - type: note
    content: Or “You hypocrite, why don’t you first remove the beam sticking out of your own eye? Then you can see clearly to remove the small speck out of your brother’s eye.” Jesus is clearly teaching that our blind spots prevent us from accurately evaluating the needs of others.
  '6':
  - type: text
    content: “Who would hang earrings on a dog’s ear or throw pearls
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “Don’t let the dogs have consecrated [holy] meat.” The Aramaic word for “earrings” is almost identical to the word for “holy.” Earrings and pearls are symbols of spiritual truths given to us by God. They give us beautiful “ears” to hear his voice and impart lovely pearls of wisdom, which are not to be regarded lightly or shared with those who have their hearts closed. The Aramaic word for “throw” is almost identical to the word for “to instruct” or “to teach.” The value of wisdom is not appreciated by those who have no ears to hear it.
  - type: text
    content: in front of wild pigs? They’ll only trample them under their feet and then turn around and tear you to pieces!
  '7':
  - type: text
    content: “Ask, and the gift is yours. Seek, and you’ll discover. Knock, and the door will be opened for you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For every persistent one will get what he asks for. Every persistent seeker will discover what he longs for. And everyone who knocks persistently will one day find an open door.
  - type: note
    content: 'Clement of Alexandria attributes an additional saying to Jesus and states that it is from the Hebrew Matthew: “The one who seeks should not cease until he finds, and in finding he shall marvel, and having marveled he shall reign, and having reigned he shall rest.” Miscellanies 2.9 (de Santos 3; Lagrange 9) and Miscellanies 5.14 (de Santos 4; Lagrange 10).'
  '9':
  - type: text
    content: “Do you know of any parent who would give his hungry child, who asked for food, a plate of rocks instead?
  - type: text
    content: ' '
