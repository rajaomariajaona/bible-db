        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is known as the “Golden Rule,” which is the ethic of treating others the same way that we want to be treated. It is the essence of love that fulfills all the expectations of the Law.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for that is the essence of all the teachings of the Law and the Prophets.
    - type: text
      text: ' '
  '13':
  - type: usfm
