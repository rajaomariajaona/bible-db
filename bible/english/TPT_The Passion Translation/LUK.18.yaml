document_id: LUK.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Gives a Parable about Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day Jesus taught the apostles to keep praying and never stop or lose hope. He shared with them this illustration:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “In a certain town there was a judge, a thick-skinned and godless man who had no fear of others’ opinions.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And in the same town there was a poor widow who kept pleading with the judge, ‘Grant me justice and protect me from my oppressor!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “He ignored her pleas for quite some time, but she kept asking. Eventually he said to himself, ‘This widow keeps annoying me, demanding her rights, and I’m tired of listening to her. Even though I’m not a religious man, and I don’t care about the opinions of others, I’ll get her off my back by answering her claims for justice and I’ll rule in her favor. Then she’ll leave me alone.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jesus continued, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Did you hear what the godless judge said—that he would answer her persistent request?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t you know that God, the true judge, will grant justice to all his chosen ones who cry out to him night and day? He will pour out his Spirit upon them.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic text. The Greek text has an unusual verb that means “ever tapping,” signifying one who keeps knocking on the door of heaven until he receives what he came for.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will not delay to answer you and give you what you ask for.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: God will give swift justice to those who don’t give up. So be ever praying, ever expecting, in the same way as the widow. Even so, when the Son of Man comes back, will he find this kind of undying faith on earth?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Humility in Prayer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jesus taught this parable to those who were convinced they were morally upright and to those who trusted in their own virtue yet looked down on others with disgust:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Two men who went into the temple to pray. One was a proud religious leader, the other a despised tax collector.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The religious leader stood apart from the others and prayed, ‘How I thank you, O God, that I’m not wicked like everyone else. They’re cheaters, swindlers, and crooks—like that tax collector over there. God, you know that I never cheat or commit adultery; I fast from food twice a week and I give you a tenth of all I earn.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The tax collector stood alone in a corner,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: away from the Holy Place
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', and covered his face in his hands, feeling that he was unworthy even to look up to God. Beating his breast,'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: typto
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', means “to strike,” or “to strike dead.” It is a violent term also used of the scourging of Jesus.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: he sobbed with brokenness and tears saying, ‘God, please, in your mercy
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: and because of the blood sacrifice, forgive me,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text uses a word that implies he was saying to God, “Look at me as you look at the blood-sprinkled mercy seat.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I am nothing but the most miserable of all sinners!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Which one of them left for home that day reconciled to God? The humble tax collector, not the religious leader! For everyone who praises himself will one day be publicly humiliated, and everyone who humbles himself will one day be publicly honored and lifted up.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Blesses Children
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The people brought their babies and small children '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a hint in the Greek text that these children may have been sick. Jesus loves and heals children.
    marker-yv: yv-n
  - type: text
    text: 'to Jesus so that he might lay his hands on them to bless them. When the disciples saw this, they scolded the parents and told them to stop troubling the Master. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Seeing what was happening, Jesus called for the parents, the children, and his disciples to come and listen to him. Then he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Never hinder a child from coming to me but let them all come, for God’s kingdom belongs to them as much as it does to anyone else.
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: These children demonstrate to you what faith is all about.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Learn this well: unless you receive the revelation of the kingdom the same way a little child receives it, you will never be able to enter in.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Speaks with a Young, Wealthy Official
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'One day a wealthy Jewish nobleman of high standing posed this question to Jesus: “Wonderful Teacher, what must I do to receive eternal life?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why would you call me wonderful when there is only one who is wonderful—and that is God alone?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus is implying that if we call him “wonderful,” we are calling him “God.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'You already know what is right and what the commandments teach: ‘Do not commit adultery, do not murder, do not steal, do not lie, and honor your father and your mother.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The wealthy leader replied, “These are the very things I’ve been doing for as long as I can remember.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Ah,”
  - type: text
    text: ' Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “there’s still one thing you’re missing in your life.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “What is that?” asked the man.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You must go and sell everything you own and give all the proceeds to the poor so you will have eternal treasures. Then come and follow me.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was not teaching that salvation can be earned by giving away our possessions to the poor. Jesus was showing the young, wealthy man that he couldn’t truly be a disciple until there was no competition in his heart to following Jesus.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: These words devastated the rich leader, for he was extremely wealthy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jesus saw his disappointment, and looking right at him said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is next to impossible for those who have everything to enter into God’s kingdom.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Nothing could be harder! You could compare it to trying to stuff a rope through the eye of a needle.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “to stuff a camel through the eye of a needle.” The Aramaic word for “rope” and for “camel” is the homonym
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gamla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This could be an instance of the Aramaic text being misread by the Greek translators as “camel” instead of “rope.” Regardless, Jesus used a metaphor for something impossible. It would be like saying, “It’s as hard as making pigs fly!”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Those who heard this said, “Then who can be saved?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What appears humanly impossible is more than possible with God. For God can do what man cannot.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Peter said, “Master, see how we’ve left all that we have, our houses and our careers, to follow you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Listen to my words: anyone who leaves his home behind and chooses God’s kingdom over wife, children, parents, and family, it will come back to him many more times in this lifetime.'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:29–30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mark’s Gospel adds, “and with persecutions.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 10:30
      metadata:
        usfm: MRK.10.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And in the age to come, he will inherit even more than that—he will inherit eternal life!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prophesies His Death and Resurrection
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesus took the Twelve aside and told them in private, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “We are going to Jerusalem so that everything prophesied about the Son of Man will be fulfilled.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They will betray him and hand him over to the people, and they will mock him, insult him, and spit in his face.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And after they have abused
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word translated “abused” is powerful. It occurs in the Greek text in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '32'
      metadata:
        usfm: LUK.18.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: but in the Aramaic text in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '33'
      metadata:
        usfm: LUK.18.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and flogged the Son of Man, they will kill him. But in three days he will rise again.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The disciples had no clue what he was saying, for his words were a mystery that was hidden from them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Blind Beggar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'As Jesus and his followers arrived at Jericho, a blind beggar was sitting by the roadside. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When he heard the crowd approaching, he asked, “What’s all this commotion about?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: “It’s Jesus!” they said. “Jesus the Nazarene is passing by.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The blind beggar shouted, “Jesus, Son of David, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
