document_id: LUK.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Gives a Parable about Prayer
  - type: text
    content: 'One day Jesus taught the apostles to keep praying and never stop or lose hope. He shared with them this illustration:'
  '10':
  - type: text
    content: “Two men who went into the temple to pray. One was a proud religious leader, the other a despised tax collector.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The religious leader stood apart from the others and prayed, ‘How I thank you, O God, that I’m not wicked like everyone else. They’re cheaters, swindlers, and crooks—like that tax collector over there. God, you know that I never cheat or commit adultery; I fast from food twice a week and I give you a tenth of all I earn.’
  '13':
  - type: text
    content: “The tax collector stood alone in a corner,
  - type: text
    content: ' '
  - type: text
    content: away from the Holy Place
  - type: text
    content: ', and covered his face in his hands, feeling that he was unworthy even to look up to God. Beating his breast,'
  - type: text
    content: ' '
  - type: note
    content: The Greek verb typto, means “to strike,” or “to strike dead.” It is a violent term also used of the scourging of Jesus.
  - type: text
    content: he sobbed with brokenness and tears saying, ‘God, please, in your mercy
  - type: text
    content: ' '
  - type: text
    content: and because of the blood sacrifice, forgive me,
  - type: text
    content: ' '
  - type: note
    content: The Greek text uses a word that implies he was saying to God, “Look at me as you look at the blood-sprinkled mercy seat.”
  - type: text
    content: for I am nothing but the most miserable of all sinners!’
  '14':
  - type: text
    content: “Which one of them left for home that day reconciled to God? The humble tax collector, not the religious leader! For everyone who praises himself will one day be publicly humiliated, and everyone who humbles himself will one day be publicly honored and lifted up.”
  - type: heading
    content: Jesus Blesses Children
  '15':
  - type: text
    content: 'The people brought their babies and small children '
  - type: note
    content: There is a hint in the Greek text that these children may have been sick. Jesus loves and heals children.
  - type: text
    content: 'to Jesus so that he might lay his hands on them to bless them. When the disciples saw this, they scolded the parents and told them to stop troubling the Master. '
  '16':
  - type: text
    content: 'Seeing what was happening, Jesus called for the parents, the children, and his disciples to come and listen to him. Then he told them, '
  - type: text
    content: “Never hinder a child from coming to me but let them all come, for God’s kingdom belongs to them as much as it does to anyone else.
  - type: text
    content: ' '
  - type: text
    content: These children demonstrate to you what faith is all about.
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Learn this well: unless you receive the revelation of the kingdom the same way a little child receives it, you will never be able to enter in.”'
  - type: heading
    content: Jesus Speaks with a Young, Wealthy Official
  '18':
  - type: text
    content: 'One day a wealthy Jewish nobleman of high standing posed this question to Jesus: “Wonderful Teacher, what must I do to receive eternal life?”'
  '19':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Why would you call me wonderful when there is only one who is wonderful—and that is God alone?
  - type: text
    content: ' '
  - type: note
    content: Jesus is implying that if we call him “wonderful,” we are calling him “God.”
  '2':
  - type: text
    content: “In a certain town there was a judge, a thick-skinned and godless man who had no fear of others’ opinions.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'You already know what is right and what the commandments teach: ‘Do not commit adultery, do not murder, do not steal, do not lie, and honor your father and your mother.’ ”'
  '21':
  - type: text
    content: The wealthy leader replied, “These are the very things I’ve been doing for as long as I can remember.”
  '22':
  - type: text
    content: “Ah,”
  - type: text
    content: ' Jesus said, '
  - type: text
    content: “there’s still one thing you’re missing in your life.”
  - type: text
    content: “What is that?” asked the man.
  - type: text
    content: “You must go and sell everything you own and give all the proceeds to the poor so you will have eternal treasures. Then come and follow me.”
  - type: note
    content: Jesus was not teaching that salvation can be earned by giving away our possessions to the poor. Jesus was showing the young, wealthy man that he couldn’t truly be a disciple until there was no competition in his heart to following Jesus.
  '23':
  - type: text
    content: These words devastated the rich leader, for he was extremely wealthy.
  '24':
  - type: text
    content: 'Jesus saw his disappointment, and looking right at him said, '
  - type: text
    content: “It is next to impossible for those who have everything to enter into God’s kingdom.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Nothing could be harder! You could compare it to trying to stuff a rope through the eye of a needle.”
  - type: note
    content: As translated from the Aramaic. The Greek is “to stuff a camel through the eye of a needle.” The Aramaic word for “rope” and for “camel” is the homonym gamla. This could be an instance of the Aramaic text being misread by the Greek translators as “camel” instead of “rope.” Regardless, Jesus used a metaphor for something impossible. It would be like saying, “It’s as hard as making pigs fly!”
  '26':
  - type: text
    content: Those who heard this said, “Then who can be saved?”
  '27':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “What appears humanly impossible is more than possible with God. For God can do what man cannot.”
  '28':
  - type: text
    content: Peter said, “Master, see how we’ve left all that we have, our houses and our careers, to follow you.”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: '“Listen to my words: anyone who leaves his home behind and chooses God’s kingdom over wife, children, parents, and family, it will come back to him many more times in this lifetime.'
  - type: text
    content: ' '
  - type: note
    content: Mark’s Gospel adds, “and with persecutions.” See Mark 10:30.
  - type: text
    content: And in the age to come, he will inherit even more than that—he will inherit eternal life!”
  - type: heading
    content: Jesus Prophesies His Death and Resurrection
  '3':
  - type: text
    content: And in the same town there was a poor widow who kept pleading with the judge, ‘Grant me justice and protect me from my oppressor!’
  '31':
  - type: text
    content: 'Jesus took the Twelve aside and told them in private, '
  - type: text
    content: “We are going to Jerusalem so that everything prophesied about the Son of Man will be fulfilled.
  - type: text
    content: ' '
  '32':
  - type: text
    content: They will betray him and hand him over to the people, and they will mock him, insult him, and spit in his face.
  - type: text
    content: ' '
  '33':
  - type: text
    content: And after they have abused
  - type: text
    content: ' '
  - type: note
    content: The word translated “abused” is powerful. It occurs in the Greek text in v. 32 but in the Aramaic text in v. 33.
  - type: text
    content: and flogged the Son of Man, they will kill him. But in three days he will rise again.”
  '34':
  - type: text
    content: The disciples had no clue what he was saying, for his words were a mystery that was hidden from them.
  - type: heading
    content: Jesus Heals a Blind Beggar
  '35':
  - type: text
    content: 'As Jesus and his followers arrived at Jericho, a blind beggar was sitting by the roadside. '
  '36':
  - type: text
    content: When he heard the crowd approaching, he asked, “What’s all this commotion about?”
  '37':
  - type: text
    content: “It’s Jesus!” they said. “Jesus the Nazarene is passing by.”
  '38':
  - type: text
    content: 'The blind beggar shouted, “Jesus, Son of David, '
  - type: note
    content: The term Son of David was used for the Messiah. The blind man believed Jesus was the Messiah.
  - type: text
    content: have pity and show me mercy!”
  '39':
  - type: text
    content: Those in the front of the crowd scolded him and warned him to be quiet, but the blind beggar screamed out even louder, “Jesus, Son of David, show me mercy!”
  '4':
  - type: text
    content: “He ignored her pleas for quite some time, but she kept asking. Eventually he said to himself, ‘This widow keeps annoying me, demanding her rights, and I’m tired of listening to her. Even though I’m not a religious man, and I don’t care about the opinions of others, I’ll get her off my back by answering her claims for justice and I’ll rule in her favor. Then she’ll leave me alone.’ ”
  '40':
  - type: text
    content: 'Suddenly Jesus stopped and directed those nearby, '
  - type: text
    content: “Bring the man over to me.”
  - type: text
    content: ' When they brought him before Jesus, he asked the man, '
  '41':
  - type: text
    content: “What do you want me to do for you?”
  - type: text
    content: “Master,” he said, “please, I want to see.”
  '42':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Now you will see. Receive your sight this moment, for your faith in me has given you sight and new life.”
  - type: note
    content: Translated from the Aramaic. The Greek word signifies both healing and salvation.
  '43':
  - type: text
    content: 'Instantly he could see again. His eyes popped open, and he saw Jesus '
  - type: text
    content: standing in front of him
  - type: text
    content: '! He shouted loud praises to God and he followed Jesus. And when the crowd saw what happened, they too erupted with shouts of praise to God.'
  '6':
  - type: text
    content: 'Jesus continued, '
  - type: text
    content: “Did you hear what the godless judge said—that he would answer her persistent request?
  - type: text
    content: ' '
  '7':
  - type: text
    content: Don’t you know that God, the true judge, will grant justice to all his chosen ones who cry out to him night and day? He will pour out his Spirit upon them.
  - type: text
    content: ' '
  - type: note
    content: Translated from the Aramaic text. The Greek text has an unusual verb that means “ever tapping,” signifying one who keeps knocking on the door of heaven until he receives what he came for.
  - type: text
    content: He will not delay to answer you and give you what you ask for.
  - type: text
    content: ' '
  '8':
  - type: text
    content: God will give swift justice to those who don’t give up. So be ever praying, ever expecting, in the same way as the widow. Even so, when the Son of Man comes back, will he find this kind of undying faith on earth?”
  - type: heading
    content: Humility in Prayer
  '9':
  - type: text
    content: 'Jesus taught this parable to those who were convinced they were morally upright and to those who trusted in their own virtue yet looked down on others with disgust:'
