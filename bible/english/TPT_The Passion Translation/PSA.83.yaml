document_id: PSA.83,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God, Don’t Be Silent The historical background to this psalm may be found in 2 Chron. 20:14–36.
  - type: text
    content: Asaph’s poetic song
  - type: text
    content: 'God, you have to do something! '
  - type: note
    content: 'Both the Aramaic and the Septuagint add a line in verse 1: “God, who is like you?”'
  - type: text
    content: Don’t be silent and just sit idly by.
  '10':
  - type: text
    content: Do to your enemies what you did at Endor,
  - type: text
    content: whose rotting corpses fertilized the land.
  '11':
  - type: text
    content: Repeat history, God! Make all their “noble ones”
  - type: text
    content: die like Oreb, Zebah, and Zalmunna, who said in their pride,
  - type: text
    content: “We will seize God’s people along with all their pleasant lands!”
  '13':
  - type: text
    content: Blow them away, God, like straw in the wind,
  - type: text
    content: like a tumbleweed in the wilderness!
  '14':
  - type: text
    content: Burn them up like a raging fire roaring down the mountainside;
  - type: text
    content: consume them all until only charred sticks remain!
  '15':
  - type: text
    content: Chase them away like before a mighty storm and terrifying tempest.
  '16':
  - type: text
    content: O Lord, disgrace them until their faces fill with shame,
  - type: text
    content: and make them acknowledge the glory of your name.
  '17':
  - type: text
    content: Make them utter failures in everything they do
  - type: text
    content: until they perish in total disgrace and humiliation,
  '18':
  - type: text
    content: so they will know that you, and you alone,
  - type: text
    content: 'are '
  - type: text
    content: Yahweh
  - type: text
    content: ', the only Most High God exalted over all the earth!'
  '2':
  - type: text
    content: Can’t you see what they’re doing?
  - type: text
    content: All your enemies are stirred up in an uproar!
  - type: text
    content: They despise you, Lord.
  - type: text
    content: In their defiant arrogance they rise up
  - type: text
    content: to host their secret council against your people.
  - type: text
    content: They conspire together to come and harm
  - type: text
    content: your cherished ones—your hidden ones.
  '4':
  - type: text
    content: Our enemies keep saying,
  - type: text
    content: “Now is the time to wipe Israel off the map.
  - type: text
    content: We’ll destroy even the memory of her existence!”
  '5':
  - type: text
    content: They’ve made their pact, consulting and conspiring,
  - type: text
    content: aligning together in their covenant against God.
  '6':
  - type: text
    content: All the sons of Ishmael, the desert sheiks and the nomadic tribes, Amalekites, Canaanites, Moabites,
  - type: text
    content: and all the nations that surround us,
  - type: text
    content: Philistines, Phoenicians, Gadarenes, and Samaritans;
  - type: note
    content: As translated from the Aramaic. The Greek is “It includes the tents of Edom and Ishmael [Palestinians and those of southern Jordan], Moab [Palestinians and those of central Jordan] and Hagrites [Egyptians or possibly northern Jordanians], Gebal [Byblos and northern Lebanon], Ammon [Palestinians and northern Jordanians] and Amalek [Arabs of the Sinai Peninsula], Philistia [Gaza], and the inhabitants of Tyre [southern Lebanese]. Even Assyria [Syrians and northern Iraqis] has become their ally as an arm [military might] for the sons of Lot.” This comprises virtually every neighbor surrounding Israel.
  - type: text
    content: allied together they’re ready to attack!
  - type: text
    content: Pause in his presence
  '9':
  - type: text
    content: Do to them all what you did to the Midianites
  - type: text
    content: who were defeated by Gideon.
  - type: text
    content: Or what you did to Sisera and Jabin
  - type: text
    content: when Deborah and Barak defeated them by the Kishon River.
