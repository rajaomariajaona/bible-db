document_id: PSA.83
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God, Don’t Be Silent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The historical background to this psalm may be found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 20:14–36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Asaph’s poetic song
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'God, you have to do something! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 83:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both the Aramaic and the Septuagint add a line in verse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1'
      metadata:
        usfm: PSA.83.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': “God, who is like you?”'
    marker-yv: yv-n
  - type: text
    text: Don’t be silent and just sit idly by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: Can’t you see what they’re doing?
- type: usfm
  marker: q1
  children:
  - type: text
    text: All your enemies are stirred up in an uproar!
- type: usfm
  marker: q1
  children:
  - type: text
    text: They despise you, Lord.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In their defiant arrogance they rise up
- type: usfm
  marker: q1
  children:
  - type: text
    text: to host their secret council against your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They conspire together to come and harm
- type: usfm
  marker: q1
  children:
  - type: text
    text: your cherished ones—your hidden ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Our enemies keep saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Now is the time to wipe Israel off the map.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ll destroy even the memory of her existence!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They’ve made their pact, consulting and conspiring,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aligning together in their covenant against God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-8
  - type: text
    text: All the sons of Ishmael, the desert sheiks and the nomadic tribes, Amalekites, Canaanites, Moabites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all the nations that surround us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Philistines, Phoenicians, Gadarenes, and Samaritans;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 83:6–8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “It includes the tents of Edom and Ishmael [Palestinians and those of southern Jordan], Moab [Palestinians and those of central Jordan] and Hagrites [Egyptians or possibly northern Jordanians], Gebal [Byblos and northern Lebanon], Ammon [Palestinians and northern Jordanians] and Amalek [Arabs of the Sinai Peninsula], Philistia [Gaza], and the inhabitants of Tyre [southern Lebanese]. Even Assyria [Syrians and northern Iraqis] has become their ally as an arm [military might] for the sons of Lot.” This comprises virtually every neighbor surrounding Israel.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: allied together they’re ready to attack!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do to them all what you did to the Midianites
- type: usfm
  marker: q1
  children:
  - type: text
    text: who were defeated by Gideon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or what you did to Sisera and Jabin
- type: usfm
  marker: q1
  children:
  - type: text
    text: when Deborah and Barak defeated them by the Kishon River.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Do to your enemies what you did at Endor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose rotting corpses fertilized the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 11-12
  - type: text
    text: Repeat history, God! Make all their “noble ones”
- type: usfm
  marker: q1
  children:
  - type: text
    text: die like Oreb, Zebah, and Zalmunna, who said in their pride,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We will seize God’s people along with all their pleasant lands!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Blow them away, God, like straw in the wind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a tumbleweed in the wilderness!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Burn them up like a raging fire roaring down the mountainside;
- type: usfm
  marker: q1
  children:
  - type: text
    text: consume them all until only charred sticks remain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Chase them away like before a mighty storm and terrifying tempest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: O Lord, disgrace them until their faces fill with shame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and make them acknowledge the glory of your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Make them utter failures in everything they do
- type: usfm
  marker: q1
  children:
  - type: text
    text: until they perish in total disgrace and humiliation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: so they will know that you, and you alone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'are '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the only Most High God exalted over all the earth!'
