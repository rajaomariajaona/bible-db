        children:
        - type: text
          text: ', there is an account of Philemon and Baucis from Lystra, who took in two strangers (Zeus and Hermes) and welcomed them into their home. But the rest of the village rejected them, and for that the village was destroyed—only Philemon and Baucis survived. That story was no doubt in the minds of the people when they welcomed Barnabas and Paul. They did not want to make the same mistake as their ancestors. (See Ovid,'
      - type: usfm
        marker: ft
        children:
