        - type: text
          text: This would have been AD 47–48, when Paul wrote his letter to the Galatians, the region they had visited during their first missionary journey. Antioch of Syria is here seen as the center of the missionary enterprise as the church hosts the anointed apostles Paul and Barnabas, who taught the church during their time there. For many centuries Antioch of Syria was considered a major Christian center. Into the fourth century, it was noted as having schools of theology and institutions of learning.
      marker-yv: yv-n
