      text: Miracles and Revival in Iconium
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Paul and Barnabas arrived at Iconium, the same thing happened there. They went, as they always did, to the synagogue and preached to the people with such power that a large crowd of both Jews and non-Jews believed.
