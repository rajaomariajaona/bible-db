      marker-yv: yv-n
    - type: text
      text: because he was the spokesman.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, outside of the city stood the temple of Zeus. The priest of the temple, in order to honor Paul and Barnabas, brought bulls with wreaths of flowers draped on them to the gates of the courtyard where they were staying. '
    - type: usfm
      marker: f
      children:
      - type: usfm
