document_id: ACT.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Miracles and Revival in Iconium
  - type: text
    content: When Paul and Barnabas arrived at Iconium, the same thing happened there. They went, as they always did, to the synagogue and preached to the people with such power that a large crowd of both Jews and non-Jews believed.
  '10':
  - type: text
    content: 'So he shouted, “You! In the name of our Lord Jesus, '
  - type: note
    content: As translated from the Aramaic. This clause is absent in the Greek.
  - type: text
    content: stand up on your feet!” The man instantly jumped to his feet, stood for the first time in his life, and walked!
  '11':
  - type: text
    content: 'When the crowds saw the miracle Paul had done, they shouted in their own language, '
  - type: note
    content: That is, the Lyconian language.
  - type: text
    content: '“The gods have come down to us as men!” '
  '12':
  - type: text
    content: 'They addressed Barnabas as “Zeus” '
  - type: note
    content: The Aramaic is “the master of deities,” and the Latin is “Jupiter.” Also found in v. 13.
  - type: text
    content: 'and Paul as “Hermes,” '
  - type: note
    content: Hermes was considered to be the messenger god, whom the Romans called Mercury. In Ovid’s famous story Metamorphoses, there is an account of Philemon and Baucis from Lystra, who took in two strangers (Zeus and Hermes) and welcomed them into their home. But the rest of the village rejected them, and for that the village was destroyed—only Philemon and Baucis survived. That story was no doubt in the minds of the people when they welcomed Barnabas and Paul. They did not want to make the same mistake as their ancestors. (See Ovid, Metamorphoses 8.611–725.) Archeologists have found a stone altar near Lystra with an inscription dedicating it to Zeus and Hermes.
  - type: text
    content: because he was the spokesman.
  '13':
  - type: text
    content: 'Now, outside of the city stood the temple of Zeus. The priest of the temple, in order to honor Paul and Barnabas, brought bulls with wreaths of flowers draped on them to the gates of the courtyard where they were staying. '
  - type: note
    content: As translated from the Aramaic. The Greek is ambiguous and could be “the gates of the temple” or “the gates of the city.”
  - type: text
    content: The crowds clamored to offer them as sacrifices to the apostles. He even brought flower wreaths as crowns to place on their heads.
  '14':
  - type: text
    content: 'When the apostles '
  - type: note
    content: The book of Acts clearly states that there were more than twelve apostles who were recognized by the church. Barnabas is described multiple times as an apostle. Ephesians 4:11–13 says that apostles and prophets will minister and equip the body of Christ until we are complete and restored into Christ’s fullness.
  - type: text
    content: 'understood what was happening, they were mortified and tore their clothes as a sign of dismay. They rushed into the crowd and shouted, '
  '15':
  - type: text
    content: '“People, what are you doing? We’re only weak human beings like everyone else. This is why we’ve come to tell you the good news, so that you would turn away from these worthless '
  - type: text
    content: myths
  - type: text
    content: ' '
  - type: note
    content: Implied in the text, which is simply “things.”
  - type: text
    content: 'and turn to the living God. He is the Creator of all things: the earth, the heavens, the sea, and everything they contain. '
  '16':
  - type: text
    content: 'In previous generations he allowed the nations to pursue their own ways, '
  '17':
  - type: text
    content: 'yet he has never left himself without clear evidence of his goodness. For he blesses us with rain from heaven and seasons of fruitful harvests, and he nourishes us with food to meet our needs. He satisfies our lives, and euphoria '
  - type: note
    content: See footnote on Acts 2:28.
  - type: text
    content: fills our hearts.”
  '18':
  - type: text
    content: Even after saying these things, they were barely able to restrain the people from offering sacrifices to them.
  '19':
  - type: text
    content: Some of the Jews who had opposed Paul and Barnabas in Antioch and Iconium arrived and stirred up the crowd against them. They stoned Paul and dragged his body outside the city and left him for dead.
  '2':
  - type: text
    content: 'Some of the Jews refused to believe, and they began to poison the minds '
  - type: note
    content: Or “embittered their souls.”
  - type: text
    content: 'of the non-Jews to discredit the believers. '
  '20':
  - type: text
    content: 'When the believers encircled Paul’s body, he miraculously stood up! '
  - type: note
    content: The Greek word used here, anistemi, is used twenty-seven times in the New Testament for people being raised from the dead.
  - type: text
    content: Paul stood and immediately went back into the city. The next day he left with Barnabas for Derbe.
  '21':
  - type: text
    content: 'After preaching the wonderful news of the gospel there and winning a large number of followers to Jesus, they retraced their steps and revisited Lystra, Iconium, and Antioch. '
  '22':
  - type: text
    content: 'At each place they went, they strengthened the lives of the believers '
  - type: note
    content: The Aramaic is “they confirmed their spirit of discipleship.”
  - type: text
    content: and encouraged them to go deeper in their faith. And they taught them, “It is necessary for us to enter into the realm of God’s kingdom, because that’s the only way we will endure our many trials and persecutions.”
  - type: note
    content: That is, the only way to avoid the oppression of the age is to enter deeper into God’s kingdom realm. An alternate translation would be “Through great tribulation we enter into God’s kingdom realm.” Neither translation of this sentence implies a future kingdom, but a kingdom realm that is presently accessible.
  '23':
  - type: text
    content: 'Paul and Barnabas ordained leaders, known as elders, from among the congregations in every church they visited. '
  - type: note
    content: The appointment of elders among the people dates back to the days of Moses in the wilderness. See Ex. 18:21, where the word used to describe these leaders is khayil, or “mighty men of valor.” The word khayil is also used for the radiant church (commonly known as the “virtuous woman” found in Prov. 31). These elders were the pastors and leaders of the churches, ordained by the apostles. See also Heb. 13:17; 1 Tim. 3; Titus 1.
  - type: text
    content: After prayer and fasting, they publicly committed them into the care and protection of the Lord of their faith.
  '24':
  - type: text
    content: 'After passing through different regions of central Turkey, '
  - type: note
    content: Or “After they had passed through Pisidia, they went into Pamphylia.”
  '25':
  - type: text
    content: 'they went to the city of Perga, preaching the life-giving message of the Lord. '
  - type: note
    content: Or “the manifestation of Lord Yahweh,” as translated from the Aramaic. The Greek is “the word of the Lord.”
  - type: text
    content: 'Afterward they journeyed down to the coast at Antalya, '
  - type: note
    content: Or “Attalia.” Antalya is a city on the southwestern coast of Turkey.
  '26':
  - type: text
    content: and from there they sailed back to Antioch.
  - type: text
    content: 'With their mission complete, they returned to the church where they had originally been sent out as missionaries, for it was in Antioch where they had been handed over to God’s powerful grace. '
  '27':
  - type: text
    content: 'When they arrived in Antioch, they gathered the church together and shared with them all of the wonderful works God had done through them and how God had opened the door of faith for the non-Jews to enter in. '
  '28':
  - type: text
    content: Afterward, Paul and Barnabas stayed there for a long time in fellowship with the believers.
  - type: note
    content: This would have been AD 47–48, when Paul wrote his letter to the Galatians, the region they had visited during their first missionary journey. Antioch of Syria is here seen as the center of the missionary enterprise as the church hosts the anointed apostles Paul and Barnabas, who taught the church during their time there. For many centuries Antioch of Syria was considered a major Christian center. Into the fourth century, it was noted as having schools of theology and institutions of learning.
  '3':
  - type: text
    content: 'Yet Paul and Barnabas stayed there for a long time, preaching boldly and fearlessly about the Lord. '
  - type: note
    content: The Aramaic uses the phrase “the Lord Yahweh,” referring to Jesus Christ.
  - type: text
    content: 'Many trusted in the Lord, for he backed up his message '
  - type: note
    content: The Aramaic is “manifestation of grace.”
  - type: text
    content: 'of grace '
  - type: note
    content: The Greek word for grace, charis, means “that which brings delight, joy, pleasure, and sweetness.” (See Strong’s Concordance, Gr. 5485.)
  - type: text
    content: with miracles, signs, and wonders performed by the apostles.
  '4':
  - type: text
    content: 'The people of the city were split over the issue. Some sided with the apostles, and others with the Jews '
  - type: text
    content: who refused to believe
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Eventually, all the opposition factions came together, with their leaders devising a plot '
  - type: note
    content: The Aramaic is “They issued a decree” (death sentence).
  - type: text
    content: 'to harm Paul and Barnabas and stone them to death. '
  '6':
  - type: text
    content: 'When the apostles learned about this, '
  - type: note
    content: Although not clearly stated, it is possible that it was by supernatural revelation that Paul and Barnabas learned of the plot to kill them.
  - type: text
    content: 'they escaped to the region of Lyconia, '
  - type: note
    content: Lyconia means “land of the wolf.”
  - type: text
    content: 'to the cities of Lystra '
  - type: note
    content: Lystra means “ransomed” or “set free.”
  - type: text
    content: 'and Derbe '
  - type: note
    content: Derbe means “tanner” or “one who covers with skins.” The journey from Iconium to these cities would have been about twenty-two miles (thirty-five kilometers).
  - type: text
    content: 'and the nearby villages. '
  '7':
  - type: text
    content: And they continued to preach the hope of the gospel.
  - type: note
    content: As translated from the Aramaic. The Greek is “the good news.”
  - type: heading
    content: Paul and Barnabas Preach at Lystra
  '8':
  - type: text
    content: 'In Lystra, Paul and Barnabas encountered a man who from birth had never walked, for he was crippled in his feet. '
  '9':
  - type: text
    content: 'He listened carefully to Paul as he preached. All of a sudden, '
  - type: note
    content: There is an implication in the Greek that Paul was watching this man and waited until he saw faith rise in the man’s heart for his healing.
  - type: text
    content: 'Paul discerned that this man had faith in his heart to be healed. '
  - type: note
    content: The same phrase, “to be healed,” is consistently translated elsewhere in the New Testament as “to be saved.” To be saved and to be healed are synonymous.
