        text: The prophecy in the following verses details the judgment of the king of Tyre, who, according to Phoenician annals and the Jewish historian Josephus, was Ithobalus II. Ezekiel prophesied his judgment as though it had already happened. Although Ezekiel was giving a prophecy over a literal king, he was dealing with the spiritual principality of Tyre, not simply a man. This chapter can be interpreted figuratively since it does not entirely apply to a human king. This is recognized as a difficult text that inspired diverse interpretations. According to rabbinic tradition, the prophecy speaks of the fall of the first man, Adam, while the church fathers found in the same text a description of the fall of Lucifer. The first half of Ezekiel’s prophecy (vv.
