  '10':
  - type: text
    content: You will die like an outcast,
  - type: note
    content: Or “die the death of the uncircumcised,” that is, the death of an outcast, cut off from others. The term “uncircumcised” (‘arelim) is a universal descriptor in Scripture to describe those who have been excluded from the community of God’s people, primarily because of their rejection of God’s unique character as the one true and living God. The physical mark of circumcision was, of course, the badge of Yahweh’s ownership of his covenant people in the old covenant era.
  - type: text
    content: a shameful death at the hand of foreigners.
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed it!’ ”'
  - type: heading
    content: The King of Tyre Is Dead
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '12':
  - type: text
    content: '“Son of man, mourn for the king of Tyre. Say to him, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: “ ‘You were once the consummate model of perfection.
  - type: note
    content: Or “a seal of perfection” (LXX). The Hebrew is uncertain.
  - type: text
    content: 'You were full of '
  - type: text
    content: great
  - type: text
    content: ' wisdom,'
  - type: text
    content: and your beauty seemed perfect.
  '13':
  - type: text
    content: You lived in Eden, in the very garden of God.
  - type: text
    content: Every precious jewel formed your mantle.
  - type: text
    content: You were dressed in splendor with diamonds,
  - type: text
    content: carnelian, topaz, chrysolite, beryl,
  - type: text
    content: onyx, sapphire, turquoise, and emeralds;
  - type: note
    content: The nine precious stones listed in this verse are nearly impossible to identify with any certainty, as a comparison of other translations reveals. Although the high priest’s breastplate had twelve stones, the three missing stones in this list are included in the Septuagint. See Ex. 28:17–20; 39:10–13; Rev. 4:3; 21:19–20.
  - type: text
    content: each gem engraved in settings of gold.
  - type: note
    content: The Hebrew of this clause is uncertain.
  - type: text
    content: I
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', made them for you on the day I created you.'
  '14':
  - type: text
    content: I placed you with an anointed guardian cherub.
  - type: note
    content: The meaning of this Hebrew sentence is uncertain.
  - type: text
    content: You were on the holy mountain of God
  - type: note
    content: The mountain of God is the dwelling place of Yahweh (see Isa. 2:2). The garden of Eden is likely a metaphor for this mountain, for the elevated location of the garden of Eden is indicated by the fact that a single river flows out of it, then divides into four rivers (see Gen. 2:10–14). The mountain of God is also the location of the New Jerusalem (see Rev. 21:10).
  - type: text
    content: where you walked among the fiery stones.
  - type: note
    content: Or “you came to be in the midst of the firestones.” These firestones were possibly the hedge surrounding the manifestation of God’s glory (see Zech. 2:5).
  '15':
  - type: text
    content: Your ways were blameless from the day I created you,
  - type: text
    content: until wickedness first appeared in you.
  '16':
  - type: text
    content: Your vast wealth filled you with violence and sin.
  - type: text
    content: So, I have cast you down in disgrace
  - type: text
    content: from the mountain of God.
  - type: text
    content: I banished you, O guardian cherub,
  - type: text
    content: from among the stones of fire.
  '17':
  - type: text
    content: Your heart became swollen with pride because of your beauty;
  - type: text
    content: your thirst for glory corrupted your wisdom.
  - type: text
    content: So, I hurled you down to the earth,
  - type: text
    content: and displayed you as a warning to other kings.
  '18':
  - type: text
    content: So great was your sin—
  - type: text
    content: the injustice of your buying and selling.
  - type: text
    content: You defiled your sanctuaries.
  - type: text
    content: So, I set a fire inside of you,
  - type: text
    content: and it consumed you entirely!
  - type: text
    content: I reduced you to ashes on the ground
  - type: text
    content: before the eyes of all who saw you.
  '19':
  - type: text
    content: All who once knew you
  - type: text
    content: are stunned at your fate.
  - type: text
    content: You have come to a terrible, dreadful end,
  - type: text
    content: and will be no more!’ ”
  - type: heading
    content: Prophecy against Sidon
  '2':
  - type: text
    content: '“Son of man, say to the prince of Tyre, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: note
    content: 'The prophecy in the following verses details the judgment of the king of Tyre, who, according to Phoenician annals and the Jewish historian Josephus, was Ithobalus II. Ezekiel prophesied his judgment as though it had already happened. Although Ezekiel was giving a prophecy over a literal king, he was dealing with the spiritual principality of Tyre, not simply a man. This chapter can be interpreted figuratively since it does not entirely apply to a human king. This is recognized as a difficult text that inspired diverse interpretations. According to rabbinic tradition, the prophecy speaks of the fall of the first man, Adam, while the church fathers found in the same text a description of the fall of Lucifer. The first half of Ezekiel’s prophecy (vv. 1–10) seems to refer to a human (Adam) while the second half (vv. 11–19) seems to refer to Satan (Lucifer). Verses 1–10 are addressed to the “prince of Tyre” while verses 11–19 are addressed to the “king of Tyre.” For a detailed study of this chapter, see Hector M. Patmore, Adam, Satan, and the King of Tyre (Leiden: Brill Academic Publishers, Inc., 2012).'
  - type: text
    content: “ ‘Because your heart is swollen with pride, you have said,
  - type: text
    content: “I am a god. I sit in the seat of a god,
  - type: text
    content: enthroned in the heart of the sea.”
  - type: text
    content: You think you are as wise as a god,
  - type: text
    content: 'but you’re nothing but a man, '
  - type: note
    content: Or “you are Adam [man].”
  - type: text
    content: not a god at all
  - type: text
    content: '!'
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 28:20–32:32 constitutes panel J1 in the chiastic structure of the book. These chapters deal with the divine judgment on Sidon and Egypt—the latter at the hands of the Babylonians. This section serves as the first panel of the “descending” arm of the chiasmus. It parallels the group of oracles against other pagan nations in ch. 25 (i.e., panel J).
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said, '
  '21':
  - type: text
    content: '“Son of man, turn toward Sidon '
  - type: note
    content: Sidon is a port city on the eastern coast of the Mediterranean Sea about twenty-five miles (forty kilometers) north of Tyre. The city was founded by Canaan’s firstborn son (see Gen. 10:15). The king of Sidon rebelled against the Babylonians in 594 BC and was conquered by Nebuchadnezzar during the same campaign that destroyed Jerusalem. Sidon is the seventh of the enemies surrounding Israel that are dealt with in Ezek. 25–32. Sidon is now known as Saida, a small seaport in Lebanon. See Judg. 10:6, 12; 1 Kings 11:33; Mark 3:8 (and second footnote); 7:24 (and footnote); Luke 10:13–14.
  - type: text
    content: 'and prophesy against her '
  '22':
  - type: text
    content: 'with these words: ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: “ ‘Behold, I am against you, Sidon;
  - type: text
    content: I will manifest my glory in you
  - type: text
    content: when I bring my judgment upon you!
  - type: text
    content: Everyone will see my display of holiness
  - type: text
    content: 'and they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '23':
  - type: text
    content: For I will send a plague,
  - type: text
    content: and there will be blood in her streets.
  - type: text
    content: Enemies will attack her on all sides
  - type: text
    content: by the sword raised up against her,
  - type: text
    content: 'and the dead will fall in heaps '
  - type: note
    content: The Pilel form of the verb stem niphlal likely denotes intensity, thus, “fall in heaps.”
  - type: text
    content: within the city.
  - type: text
    content: 'Then they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: Israel Delivered and Restored
  '24':
  - type: text
    content: '“As for the people of Israel, there will no longer be any hostile nation surrounding them like thorns or briars that would hurt or pierce them. Then people will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '25':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “When I regather the people of Israel from every place where they have been scattered, I will display my holiness among them for all the nations to see. They will live in the land that I gave to my servant Jacob. '
  '26':
  - type: text
    content: 'And they will live there securely, building houses and planting vineyards. When I execute judgment on all the mocking, hostile nations surrounding them, they will live in safety, and they will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God they worship.”'
  '3':
  - type: text
    content: So, you really think you are wiser than Daniel,
  - type: note
    content: See Dan. 1:17–20; 4:6–8.
  - type: text
    content: and no mystery baffles you?
  - type: note
    content: Or literally “no secret is dark from you.”
  '4':
  - type: text
    content: 'By your wisdom and '
  - type: text
    content: vast
  - type: text
    content: ' understanding'
  - type: text
    content: you have amassed a great fortune!
  - type: text
    content: You have accumulated gold and silver
  - type: text
