  - type: text
    content: '’s '
  - type: text
    content: heart
  - type: text
    content: .
  - type: note
    content: Repentance is a returning to God and reorienting our lives so that he can fill us again with his love and righteousness. Repentance raises the soul next to God, where his love and righteousness can fill us again.
