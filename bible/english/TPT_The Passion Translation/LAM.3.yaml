  - type: text
    content: 'when I remember this:'
  '22':
  - type: text
    content: Yahweh
  - type: text
    content: '’s tender mercies '
  - type: note
    content: Or “womb-love.” God’s mercy and compassion keep us attached to his heart even as an embryo is attached to a mother’s womb.
  - type: text
    content: have no end,
  - type: text
    content: and the kindness of his endless love is never exhausted.
  - type: note
    content: Or “We have not come to the end of Yahweh’s steadfast love.” Jesus loved his disciples (and us) even unto the end (see John 13:1).
  '23':
  - type: text
    content: New, fresh mercies greet me with every sunrise.
  - type: note
    content: Each new day begins with mercy. You can connect with the mercy of God, a renewable resource, as you start your day. The Hebrew word for “morning” comes from a triliteral root word (bqr) that has a homonym that means “to seek [inquire].” Every morning we can seek for more of him and discover fresh mercy. Mercy’s fresh arrival each day is a testament to God’s faithfulness.
  - type: text
    content: 'So '
  - type: text
    content: wonderfully
  - type: text
    content: ' great is your faithfulness!'
