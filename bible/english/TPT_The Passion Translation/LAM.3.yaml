  '1':
  - type: heading
    content: The Suffering of Man
  - type: text
    content: ' '
  - type: note
    content: Chapter 3 is a triple acrostic, the third alphabet poem contained in Lamentations. The extreme structure of a triple acrostic creates a lot of narrative turbulence, shifting frantically from topic to topic.
  - type: text
    content: 'I am the man '
  - type: note
    content: The numerical value of the Hebrew words “I am the man” (271) equals that for the name Jeremiah.
  - type: text
    content: acquainted with misery
  - type: text
    content: by the rod of his anger.
  - type: note
    content: The language of ch. 3 is allegorical of a sheep and its shepherd and reminds readers of Ps. 23. One paints the picture of God as the Good Shepherd and the other as the antithesis. This chapter mentions the rod, guiding his sheep, finding pasture, good water, and leading one through the twisting paths of life.
  '10':
  - type: text
    content: He has become to me like a bear ready to pounce
  - type: text
    content: or a lion lying in wait.
  - type: note
    content: When God’s people consistently resist the ways of God and the work of his Holy Spirit, God himself will become their enemy and fight against them (see Isa. 63:10).
  '11':
  - type: text
    content: He dragged me away, tore me to pieces,
  - type: text
    content: and then left me stunned and helpless.
  '12':
  - type: text
    content: He has drawn back his bowstring
  - type: text
    content: and used me as a target for his arrows.
  '13':
  - type: text
    content: He shot his arrows deep into my heart,
  - type: note
    content: Or “into my kidneys.” See Job 16:13.
  - type: text
    content: sons from his quiver.
  - type: note
    content: At times, God’s arrows of truth that pierce our hearts are “sons from his [God’s] quiver.” His sharpened arrows are his sons and daughters.
  '14':
  - type: text
    content: Everyone has made me an object of ridicule;
  - type: note
    content: See Deut. 28:37.
  - type: text
    content: they mock me all day long with their songs.
  '15':
  - type: text
