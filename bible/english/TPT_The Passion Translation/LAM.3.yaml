  - type: text
    content: and made me drunk with wormwood.
  '16':
  - type: text
    content: He has ground my teeth with gravel
  - type: text
    content: and crushed me down to the dust.
  - type: note
    content: Or “fed me with ashes.” The Hebrew verb often translated “cower [to crouch down from fear]” is changed by some scholars to mean “feed someone” and so “fed on ashes.” However, a more accurate translation would be “He laid me in the dust.” Both expressions in this verse may be taken to mean that the man was humiliated, degraded, and rejected.
