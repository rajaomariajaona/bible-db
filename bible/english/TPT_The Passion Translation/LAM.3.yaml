  '4':
  - type: text
    content: He has made my skin and my flesh waste away;
  - type: text
    content: he has broken my bones.
  - type: note
    content: Bones are a frequent biblical metaphor of one’s inner being. See Ps. 6:2 and footnote; Prov. 3:8 and footnote; Jer. 20:9; 23:9.
  '40':
  - type: text
    content: Let us examine our path, ponder our ways,
  - type: text
    content: 'and return to '
  - type: text
