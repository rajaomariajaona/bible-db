document_id: ACT.12,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Miraculous Escape from Prison
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During this period King Herod '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “King Herod Agrippa.”
      marker-yv: yv-n
    - type: text
      text: 'incited persecution against the church, causing great harm to the believers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They walked unseen past the first guard post and then the second before coming to the iron gate that leads to the city—and the gate swung open all by itself right in front of them!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They went out into the city and were walking down a narrow street when all of a sudden the angel disappeared. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That’s when Peter realized that he wasn’t having a dream! He said to himself, “This is really happening! The Lord sent his angel to rescue me from the clutches of Herod and from what the Jewish leaders planned to do to me.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he realized this, he decided to go to the home of Mary '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This Mary was a relative of Barnabas. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and her son John Mark. The house was filled with people praying. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he knocked on the door to the courtyard, a young servant girl named Rose '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Rhoda.”
      marker-yv: yv-n
    - type: text
      text: 'got up to see who it was. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When she recognized Peter’s voice, she was so excited that she forgot to open the door, but ran back inside the house to announce, “Peter is standing outside!”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Are you crazy?” they said to her. But when she kept insisting, they answered, “Well, it must be his angel.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Peter was still outside, knocking on the door. When they finally opened it, they were shocked to find Peter standing there.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He signaled for them to be quiet as he shared with them the miraculous way the Lord brought him out of prison. Before he left he said, “Make sure you let Jacob '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was Jacob (James), the brother of Jesus.
      marker-yv: yv-n
    - type: text
      text: and all of the other believers know what has happened.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the first sign of daylight, the prison guards were in a tremendous uproar because of Peter’s disappearance. Herod ordered a thorough search for him, but no one could find him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After he interrogated the guards, he ordered them executed. Then Herod left the province of Judea for Caesarea and stayed there for a period of time.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He even had the apostle Jacob, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “James.” Both Greek and Aramaic leave the Hebrew name as it is, Jacob. According to the Gospels, Jacob (James) and John were the first two disciples of Jesus, and Jacob was the first apostle to be martyred.
      marker-yv: yv-n
    - type: text
      text: 'John’s brother, beheaded. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “executed by the sword.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, during those days, Herod was engaged in a violent dispute with the people of Tyre and Sidon. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tyre and Sidon are coastal cities in Lebanon, north of Israel.
      marker-yv: yv-n
    - type: text
      text: 'So they sent a united delegation to Caesarea to appeal to him and reconcile their differences '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can also be translated “They wanted cultivated land,” which makes sense if their food supply was running out.
      marker-yv: yv-n
    - type: text
      text: with the king, for Herod controlled their food supply. First they enlisted the support of his trusted personal assistant, Blastus, who secured them an appointment with the king.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the chosen day, Herod came before them, arrayed in his regal robes. Sitting on his elevated throne, he delivered a stirring public address to the people. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At its conclusion the people gave him a round of applause. The crowd shouted, “These are the words of a god, not a man!”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Immediately, an angel of the Lord struck Herod with a sickness, an infestation of worms, because he accepted the people’s worship and didn’t give the glory to God, and he died. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the hope of God’s kingdom '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the word.”
      marker-yv: yv-n
    - type: text
      text: kept spreading and multiplying everywhere!
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Barnabas and Saul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had delivered the charitable offering for relief
    - type: text
      text: ', they left Jerusalem, bringing with them a disciple named Mark (who was also known as John).'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Mark who wrote the second Gospel included in our New Testament. John (or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yochanan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) was his Jewish name; Marcus was his Roman name. Because he once abandoned Paul during a missionary journey, Paul refused to take him with him again. But later, Mark and Paul were fully restored in their ministry together. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Herod realized how much this pleased the Jewish leaders, he had Peter arrested and thrown into prison during the Feast of Passover. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These events most likely took place in AD 42 or 43.
      marker-yv: yv-n
    - type: text
      text: 'Sixteen soldiers were assigned to guard him until Herod could bring him to public trial, immediately after the Passover celebrations were over. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The church went into a season of intense intercession, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek phrase used here for “intense intercession” means “to stretch tightly in prayer.”
      marker-yv: yv-n
    - type: text
      text: asking God to free him.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The night before Herod planned to bring him to trial, he made sure that Peter was securely bound with two chains. Peter was sound asleep between two soldiers, with additional guards stationed outside his cell door, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when all at once an angel of the Lord appeared, filling his prison cell with a brilliant light. The angel struck Peter on the side '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word translated “struck” is the same Greek word used for Jesus being “struck” for our sins (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 26:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jesus was pierced in his side to awaken hearts to God. Peter was awakened from his sleep by an angel who struck him on his side.
      marker-yv: yv-n
    - type: text
      text: 'to awaken him and said, “Hurry up! Let’s go!” Instantly the chains fell off his wrists. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel told him, “Get dressed. Put on your sandals, bring your cloak, and follow me.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peter quickly left the cell and followed the angel, even though he thought it was only a dream or a vision, for it seemed unreal—he couldn’t believe it was really happening! '
