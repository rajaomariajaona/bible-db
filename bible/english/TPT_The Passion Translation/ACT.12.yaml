document_id: ACT.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter’s Miraculous Escape from Prison
  - type: text
    content: 'During this period King Herod '
  - type: note
    content: Or “King Herod Agrippa.”
  - type: text
    content: 'incited persecution against the church, causing great harm to the believers. '
  '10':
  - type: text
    content: They walked unseen past the first guard post and then the second before coming to the iron gate that leads to the city—and the gate swung open all by itself right in front of them!
  - type: text
    content: 'They went out into the city and were walking down a narrow street when all of a sudden the angel disappeared. '
  '11':
  - type: text
    content: That’s when Peter realized that he wasn’t having a dream! He said to himself, “This is really happening! The Lord sent his angel to rescue me from the clutches of Herod and from what the Jewish leaders planned to do to me.”
  '12':
  - type: text
    content: 'When he realized this, he decided to go to the home of Mary '
  - type: note
    content: This Mary was a relative of Barnabas. See Col. 4:10.
  - type: text
    content: 'and her son John Mark. The house was filled with people praying. '
  '13':
  - type: text
    content: 'When he knocked on the door to the courtyard, a young servant girl named Rose '
  - type: note
    content: Or “Rhoda.”
  - type: text
    content: 'got up to see who it was. '
  '14':
  - type: text
    content: When she recognized Peter’s voice, she was so excited that she forgot to open the door, but ran back inside the house to announce, “Peter is standing outside!”
  '15':
  - type: text
    content: “Are you crazy?” they said to her. But when she kept insisting, they answered, “Well, it must be his angel.”
  '16':
  - type: text
    content: Meanwhile, Peter was still outside, knocking on the door. When they finally opened it, they were shocked to find Peter standing there.
  '17':
  - type: text
    content: 'He signaled for them to be quiet as he shared with them the miraculous way the Lord brought him out of prison. Before he left he said, “Make sure you let Jacob '
  - type: note
    content: This was Jacob (James), the brother of Jesus.
  - type: text
    content: and all of the other believers know what has happened.”
  '18':
  - type: text
    content: 'At the first sign of daylight, the prison guards were in a tremendous uproar because of Peter’s disappearance. Herod ordered a thorough search for him, but no one could find him. '
  '19':
  - type: text
    content: After he interrogated the guards, he ordered them executed. Then Herod left the province of Judea for Caesarea and stayed there for a period of time.
  '2':
  - type: text
    content: 'He even had the apostle Jacob, '
  - type: note
    content: Or “James.” Both Greek and Aramaic leave the Hebrew name as it is, Jacob. According to the Gospels, Jacob (James) and John were the first two disciples of Jesus, and Jacob was the first apostle to be martyred.
  - type: text
    content: 'John’s brother, beheaded. '
  - type: note
    content: Or “executed by the sword.”
  '20':
  - type: text
    content: 'Now, during those days, Herod was engaged in a violent dispute with the people of Tyre and Sidon. '
  - type: note
    content: Tyre and Sidon are coastal cities in Lebanon, north of Israel.
  - type: text
    content: 'So they sent a united delegation to Caesarea to appeal to him and reconcile their differences '
  - type: note
    content: The Aramaic can also be translated “They wanted cultivated land,” which makes sense if their food supply was running out.
  - type: text
    content: with the king, for Herod controlled their food supply. First they enlisted the support of his trusted personal assistant, Blastus, who secured them an appointment with the king.
  '21':
  - type: text
    content: 'On the chosen day, Herod came before them, arrayed in his regal robes. Sitting on his elevated throne, he delivered a stirring public address to the people. '
  '22':
  - type: text
    content: At its conclusion the people gave him a round of applause. The crowd shouted, “These are the words of a god, not a man!”
  '23':
  - type: text
    content: 'Immediately, an angel of the Lord struck Herod with a sickness, an infestation of worms, because he accepted the people’s worship and didn’t give the glory to God, and he died. '
  '24':
  - type: text
    content: 'But the hope of God’s kingdom '
  - type: note
    content: As translated from the Aramaic. The Greek is “the word.”
  - type: text
    content: kept spreading and multiplying everywhere!
  '25':
  - type: text
    content: 'After Barnabas and Saul '
  - type: text
    content: had delivered the charitable offering for relief
  - type: text
    content: ', they left Jerusalem, bringing with them a disciple named Mark (who was also known as John).'
  - type: note
    content: This is the Mark who wrote the second Gospel included in our New Testament. John (or Yochanan) was his Jewish name; Marcus was his Roman name. Because he once abandoned Paul during a missionary journey, Paul refused to take him with him again. But later, Mark and Paul were fully restored in their ministry together. See 2 Tim. 4:11.
  '3':
  - type: text
    content: 'When Herod realized how much this pleased the Jewish leaders, he had Peter arrested and thrown into prison during the Feast of Passover. '
  - type: note
    content: These events most likely took place in AD 42 or 43.
  - type: text
    content: 'Sixteen soldiers were assigned to guard him until Herod could bring him to public trial, immediately after the Passover celebrations were over. '
  '5':
  - type: text
    content: 'The church went into a season of intense intercession, '
  - type: note
    content: The Greek phrase used here for “intense intercession” means “to stretch tightly in prayer.”
  - type: text
    content: asking God to free him.
  '6':
  - type: text
    content: 'The night before Herod planned to bring him to trial, he made sure that Peter was securely bound with two chains. Peter was sound asleep between two soldiers, with additional guards stationed outside his cell door, '
  '7':
  - type: text
    content: 'when all at once an angel of the Lord appeared, filling his prison cell with a brilliant light. The angel struck Peter on the side '
  - type: note
    content: The word translated “struck” is the same Greek word used for Jesus being “struck” for our sins (Matt. 26:31). Jesus was pierced in his side to awaken hearts to God. Peter was awakened from his sleep by an angel who struck him on his side.
  - type: text
    content: 'to awaken him and said, “Hurry up! Let’s go!” Instantly the chains fell off his wrists. '
  '8':
  - type: text
    content: The angel told him, “Get dressed. Put on your sandals, bring your cloak, and follow me.”
  '9':
  - type: text
    content: 'Peter quickly left the cell and followed the angel, even though he thought it was only a dream or a vision, for it seemed unreal—he couldn’t believe it was really happening! '
