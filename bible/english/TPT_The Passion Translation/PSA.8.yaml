  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have built a stronghold by the songs of children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strength rises up with the chorus of infants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This kind of praise has power to shut Satan’s mouth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Childlike worship will silence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “muzzle.” There may be a vast difference between the glory of the heavens and the little mouths of children and babies, yet by both the majestic name of the Lord is revealed. It is amazing that perfected praises do not rise to God from the cherubim or seraphim, but from children and babies, the weakest of humanity.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the madness of those who oppose you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Human Dignity
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at the splendor of your skies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your creative genius glowing in the heavens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I gaze at your moon and your stars,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: mounted like jewels
    - type: text
      text: ' in their settings,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know you are the fascinating artist who fashioned it all!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I have to ask this question:'
