  '1':
  - type: heading
    content: God’s Splendor
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: 'Set to the melody of “For the Feast of Harvest” '
  - type: note
    content: Or “For the director of music, according to gittith.” Gittith could mean “winepress,” or refer to a musical instrument common to the Gittites, making it a Philistine lute (2 Sam. 6:10–11; 15:18). The Moffat translation reads “Set to a vintage melody.” This inscription in the Septuagint is “To the director over the wine vats.”
  - type: text
    content: by King David
  - type: heading
    content: God’s Majesty
  - type: text
    content: Yahweh
  - type: text
    content: ', our Sovereign God,'
  - type: text
    content: your glory streams from the heavens above,
  - type: text
    content: filling the earth with the majesty of your name!
  - type: text
    content: People everywhere see your splendor
  - type: text
    content: .
  '2':
  - type: text
    content: You have built a stronghold by the songs of children.
  - type: text
    content: Strength rises up with the chorus of infants.
  - type: text
    content: This kind of praise has power to shut Satan’s mouth.
  - type: text
    content: Childlike worship will silence
  - type: note
    content: Or “muzzle.” There may be a vast difference between the glory of the heavens and the little mouths of children and babies, yet by both the majestic name of the Lord is revealed. It is amazing that perfected praises do not rise to God from the cherubim or seraphim, but from children and babies, the weakest of humanity.
  - type: text
    content: the madness of those who oppose you.
  - type: heading
    content: Human Dignity
  '3':
  - type: text
    content: Look at the splendor of your skies,
  - type: text
    content: your creative genius glowing in the heavens.
  - type: text
    content: When I gaze at your moon and your stars,
  - type: text
    content: mounted like jewels
  - type: text
    content: ' in their settings,'
  - type: text
    content: I know you are the fascinating artist who fashioned it all!
  - type: text
    content: 'But I have to ask this question:'
  '4':
  - type: text
    content: Why would you bother with puny, mortal man
  - type: text
    content: or care about human beings?
  - type: note
    content: See Job 7:17–21; 25:2–6; Ps. 144:3.
  '5':
  - type: text
    content: Yet what honor you have given to men,
  - type: text
    content: created only a little lower than Elohim,
  - type: note
    content: This is the same Hebrew word used for the Creator-God in Gen. 1:1.
  - type: text
    content: 'crowned '
  - type: note
    content: Or “surrounded.”
  - type: text
    content: with glory and magnificence.
  '6':
  - type: text
    content: You have delegated to them
  - type: text
    content: rulership over all you have made,
  - type: text
    content: with everything under their authority,
  - type: text
    content: 'placing earth itself under the feet '
  - type: text
    content: of your image-bearers
  - type: text
    content: .
  - type: note
    content: The Septuagint translation of Ps. 8:5–7 is quoted in Heb. 2:6–8. Today, all things are not yet under our feet. Even mosquitoes still come to defeat us. But there will be a time of restoration because of Christ’s redemption, when everything will rest beneath our authority. See Isa. 11:6–9; 65:25; Matt. 19:28; Rev. 20:4–6.
  '7':
  - type: text
    content: All the created order and every living thing
  - type: text
    content: of the earth, sky, and sea—
  - type: text
    content: 'the wildest beasts and all that move in the paths of the sea '
  - type: note
    content: The “paths of the sea” speaks of God’s way of deliverance (Isa. 11:15–16), for Jesus was the One who walked on the water (Job 9:8; Ps. 77:19).
  - type: text
    content: —
  - type: text
    content: 'everything '
  - type: note
    content: Or “sheep and oxen, beasts of the field, birds of the air, fish of the sea, and everything that moves in the paths of the sea.”
  - type: text
