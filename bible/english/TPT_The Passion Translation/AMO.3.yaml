        children:
        - type: text
          text: In the context, the secret that God reveals is within the calamity that passes through his hands. When he is behind the calamity, he has a secret that he reveals to his prophets, and at times, that secret is a warning of impending disaster. The Hebrew verb meaning “reveal” is the word
      - type: usfm
