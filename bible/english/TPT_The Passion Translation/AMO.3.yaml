          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Within the universe of meaning encompassed by the Hebrew word for “known” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: yadaʿ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is found several important components. It includes the meanings of choice, favor, affection, personal knowledge, sexual intimacy, intimate knowledge, and care, all of which can be wrapped into the context of God’s love for his people. This accounts for the expanded rendering of this single verb form in this verse. This is held in tension with “I think as much of the Ethiopians as I do of you; you’re all the same to me” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There are many tensions and paradoxes in Scripture, which is another proof of the Bible’s authenticity. Real life is full of tension and paradox.
      marker-yv: yv-n
    - type: text
      text: That is why I will punish you for all your wrongdoings.”
