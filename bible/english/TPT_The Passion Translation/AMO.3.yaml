        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is a word used for “exile,” “captivity,” or “uncovering.” When God sends people into exile, it is because their sins were uncovered, revealed. Thus, God will not allow calamity to come without first uncovering the reason for the calamity and revealing to his servants the prophets the sin that has broken his heart.'
      marker-yv: yv-n
