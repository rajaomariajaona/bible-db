document_id: AMO.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Punishment
  - type: text
    content: 'Israelites, listen to this prophecy that '
  - type: text
    content: Yahweh
  - type: text
    content: ' pronounces against you, against all the people I rescued from Egypt. '
  '10':
  - type: text
    content: “They don’t even know how to do right,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: “They hoard in their palaces
  - type: text
    content: the spoils of their violence and extortion.
  '11':
  - type: text
    content: 'Therefore, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say:'
  - type: text
    content: 'an enemy '
  - type: note
    content: Thirty years after this prophecy, Assyria besieged Samaria and looted the city (see 2 Kings 17:5–6).
  - type: text
    content: will soon overrun the land.
  - type: text
    content: He will topple your strongholds
  - type: text
    content: and plunder your palaces.”
  '12':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “As a shepherd can only rescue two leg bones or a piece of an ear
  - type: text
    content: out of the jaws of a lion,
  - type: note
    content: A shepherd was responsible for trying to rescue his sheep from a lion. If he presented bones or pieces of the lamb, the owner of the flock considered him an honest and brave shepherd (see Ex. 22:9–12; 1 Sam. 17:34–35; see also par. 266 of the Code of Hammurabi). In this instance, the shepherd is Yahweh, with his prophet Amos.
  - type: text
    content: so the Israelites who live in Samaria
  - type: text
    content: will only be able to salvage one leg of a bed
  - type: text
    content: 'and a piece of a headboard '
  - type: text
    content: from their ravaged city
  - type: text
    content: .”
  - type: note
    content: The Hebrew of this verse is uncertain.
  - type: heading
    content: Israel Will Likewise Be Punished
  '13':
  - type: text
    content: '“I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Mighty God of Angel Armies, say:'
  - type: text
    content: Listen! Warn Jacob’s descendants.
  - type: note
    content: Or “Testify against the house of Jacob.”
  '14':
  - type: text
    content: On the day when I punish Israel for her crimes,
  - type: text
    content: I will also destroy the altars of Bethel.
  - type: note
    content: Bethel, once a place of true worship, had degenerated into a center of cultic worship.
  - type: text
    content: The horns of the altar will be hacked off
  - type: note
    content: Removing the blood-sprinkled horns of the altar was a powerful statement for the Hebrews. It meant there would no longer be a place where a fugitive could secure himself from arrest or violence by catching hold of altar-horns (see Ex. 21:14; 1 Kings 1:50; 2:28). The concept of a “horn” in Hebrew often carries the sense of strength and power, which is missing in English.
  - type: text
    content: and fall to the ground.
  '15':
  - type: text
    content: 'I will tear down the winter house '
  - type: text
    content: of the wealthy
  - type: text
    content: along with your summer house.
  - type: note
    content: The wealthy would often have a home they lived in during the cooler winter months and a second home for the summer months.
  - type: text
    content: Your luxury homes decorated with ivory
  - type: note
    content: See 1 Kings 22:39.
  - type: text
    content: 'and your '
  - type: text
    content: lovely
  - type: text
    content: ' mansions will likewise be destroyed.'
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '2':
  - type: text
    content: '“Of all the nations of the earth, you are the only one I have intimately known '
  - type: text
    content: and have always cared for
  - type: text
    content: '. '
  - type: note
    content: Within the universe of meaning encompassed by the Hebrew word for “known” (yadaʿ) is found several important components. It includes the meanings of choice, favor, affection, personal knowledge, sexual intimacy, intimate knowledge, and care, all of which can be wrapped into the context of God’s love for his people. This accounts for the expanded rendering of this single verb form in this verse. This is held in tension with “I think as much of the Ethiopians as I do of you; you’re all the same to me” (9:7). There are many tensions and paradoxes in Scripture, which is another proof of the Bible’s authenticity. Real life is full of tension and paradox.
  - type: text
    content: That is why I will punish you for all your wrongdoings.”
  - type: heading
    content: Prophetic Riddles
  '3':
  - type: text
    content: Do two walk together
  - type: note
    content: For two to walk together means they share a common purpose and goal. This Hebrew phrase is nearly identical to Abraham and Isaac walking together up Mount Moriah (see Gen. 22:6, 8). For believers today to walk with God, we must walk in the light and agree with the exposure that light brings (see 1 John 1:6–7).
  - type: text
    content: unless they have agreed to do so?
  - type: note
    content: Or “agreed to meet” or “without knowing each other” (LXX). These seven riddles of vv. 3–8 are linked together like the links of a chain.
  '4':
  - type: text
    content: Does the lion roar in the bush
  - type: text
    content: if it has no prey?
  - type: note
    content: See Ps. 104:21. Scripture frequently presents Yahweh as a lion roaring (see Hos. 5:14; Amos 1:2). In this riddle, the lion’s prey are those he has captured in their sins, and he is ready to judge them for their evil.
  - type: text
    content: Does the lion growl in his lair
  - type: text
    content: if it has seized nothing?
  '5':
  - type: text
    content: Does a bird alight on a trap on the ground
  - type: text
    content: if there is no bait inside?
  - type: text
    content: Does the net spring up from the ground
  - type: text
    content: if it has caught nothing?
  '6':
  - type: text
    content: Does the war trumpet sound in the city
  - type: text
    content: without the people being frightened?
  - type: note
    content: See Jer. 6:1; Ezek. 33:3. The shofar or trumpet is a biblical metaphor for the message or the messenger. This verse speaks of the prophetic word in the symbolism of the shofar blast. See Isa. 58:1; 1 Cor. 14:8; Rev. 1:10. When the war trumpets warn of impending conflict, the people must prepare. Yet Israel did nothing when God sounded his warnings through his prophets.
  - type: text
    content: Does calamity come to a city
  - type: text
    content: 'if it has not passed through '
  - type: text
    content: Yahweh
  - type: text
    content: ’s hands?
  - type: note
    content: Or “has the Lord not acted?” Some of the many meanings of the Hebrew word ʿasah include “to manufacture,” “to frame,” “to make,” “to touch,” and “to caress.”
  '7':
  - type: text
    content: 'Indeed, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' does nothing'
  - type: text
    content: without revealing his secrets to his servants the prophets.
  - type: note
    content: In the context, the secret that God reveals is within the calamity that passes through his hands. When he is behind the calamity, he has a secret that he reveals to his prophets, and at times, that secret is a warning of impending disaster. The Hebrew verb meaning “reveal” is the word gala, which is a word used for “exile,” “captivity,” or “uncovering.” When God sends people into exile, it is because their sins were uncovered, revealed. Thus, God will not allow calamity to come without first uncovering the reason for the calamity and revealing to his servants the prophets the sin that has broken his heart.
  '8':
  - type: text
    content: 'The lion has roared! '
  - type: note
    content: Yahweh is the lion who has roared out his message of judgment on the wicked.
  - type: text
    content: Who is not afraid?
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken! Who will not prophesy?'
  - type: heading
    content: Samaria’s Doom
  '9':
  - type: text
    content: 'Proclaim to the strongholds of Assyria '
  - type: note
    content: As translated from the Septuagint. The Masoretic Text has “Ashdod.”
  - type: text
    content: and Egypt,
  - type: text
    content: and say to them,
  - type: text
    content: “Gather on the hills around Samaria;
  - type: text
    content: 'take a good, hard look at the rampant disorder '
  - type: note
    content: The Hebrew word mehumah means “trouble,” “chaos,” “disorder,” “turmoil,” and “confusion.” The opposite of this term would be shalom, which means “peace.”
  - type: text
    content: within the city
  - type: text
    content: and see how oppressed the people are.”
