        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 31:37
      metadata:
        usfm: JER.31.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then I turned my heart to the Lord God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I gave my face to Adonai Elohim.”
    marker-yv: yv-n
  - type: text
    text: seeking an answer from him, pleading for mercy with fasting, wearing sackcloth, and sitting among ashes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel Intercedes for His People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', my God, and made this confession: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The same Hebrew word for “confession” is also found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 26:40–45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '“My Lord, you are the great and awesome God who faithfully keeps your covenant of love '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “unwavering, endless love” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hesed
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', one of the more difficult single Hebrew words to translate. It carries the idea of sustained loyalty and love at the same time. Other meanings include “loving-kindness,” “constant, unchanging love,” or “trustworthy love.” This term is used twenty-six times in'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psalm 136
      metadata:
        usfm: PSA.136
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: alone (once in each verse). The Psalms can be described as “David’s pursuit of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hesed
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hesed
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comes from a root word that means “eager, ardent desire.” It is the fiery, faithful, passionate love of God, who is committed to love you until the end.
    marker-yv: yv-n
  - type: text
    text: 'with those who love you and keep your commands. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 7:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '21'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Neh. 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Yet we have sinned, acted wickedly, and done evil; we have rebelled and turned aside from your laws and commands. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'We have not listened to your servants the prophets, who prophesied in your name to our kings, our leaders, our fathers, and all the people of the land. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: DAN.9.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: DAN.9.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: are quoted in the Jewish synagogues on Rosh Hashanah (New Year’s Day) and Yom Kippur (the Day of Atonement).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Righteousness belongs to you, Lord, but we are all covered with shame even to this day—the people of Judah, the residents of Jerusalem, and all Israel, near and far. You have scattered us to many lands because of our treachery against you. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “in their [our] treachery, they [we] dealt treacherously.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', we are all clothed with shame—our kings, our princes, and our fathers, because we have sinned against you. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In spite of all that, Lord, our God, you are '
  - type: usfm
    marker: it
    children:
    - type: text
      text: filled with
  - type: text
    text: ' compassion '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “mercies.” This is the Hebrew homonym (
    - type: usfm
      marker: it
      children:
      - type: text
        text: raham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) that can also be translated “womb.” God’s mercy toward us is like a mother’s compassion for the baby that came from her womb. Perhaps one could translate
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: as “womb-love.”
    marker-yv: yv-n
  - type: text
    text: 'and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: overflow with
  - type: text
    text: ' forgiveness, even though we have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: openly
  - type: text
    text: ' rebelled against you.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', we have not listened to your voice, our God, nor kept your instructions that you gave us through your servants the prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'All the people of Israel have ignored your voice; we have defied your instructions and gone astray. Now, the solemn curses confirmed by your promises of punishment in the law of your servant Moses have been poured out upon us because we sinned against you. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'You have fulfilled the words that you spoke against us and against the rulers over us '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the judges who judged us.”
    marker-yv: yv-n
  - type: text
    text: 'by bringing upon us such a great calamity. Your severe punishment of Jerusalem has never been equaled under all heaven! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'As the law of Moses warns, this calamity came upon us in full measure. And even now, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', we have not sought to please you, our God, by turning away from our wickedness and following your ways of truth. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you have waited for the right moment '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 31:28
      metadata:
        usfm: JER.31.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 44:27
      metadata:
        usfm: JER.44.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'to unleash this calamity upon us. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', our God, you are just and right in all that you have done, for we defiantly ignored your voice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“And now, Lord our God, you delivered your people out of the land of Egypt with mighty power. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “powerful hand.” God’s “hand” is a metaphor for his power and might.
    marker-yv: yv-n
  - type: text
    text: 'You have won fame and gained renown for yourself even to this day. But we acknowledge our sin and wicked ways. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lord, you have always demonstrated your faithfulness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “righteousness.”
    marker-yv: yv-n
  - type: text
    text: 'to Israel, so now please turn your fierce anger '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “your anger and your rage,” a hendiadys.
    marker-yv: yv-n
  - type: text
    text: 'away from Jerusalem. It belongs to you and sits on the hill where sacrifice is made. All the other nations who live around us despise your city and your people because of the sins of our ancestors and because of our sins also. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And now, our God, I am your servant and I beg you, please—answer my prayers. Make your face to shine '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 6:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'upon your ruined temple so that everyone will know that you are Lord. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “for your sake.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Turn your heart to hear my prayer, O my God. Listen to my cry and please look carefully and see our despair and the devastated city, which bears your name. We bring our requests to you and ask for your mercy, not because we deserve it but because of your extravagant, infinite love. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 9:9
      metadata:
        usfm: DAN.9.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Lord, hear us and forgive us. Lord, please be attentive and act for us! Do not delay in answering us for your own sake, my God, and for your city and your people who bear your name.”
- type: usfm
  marker: s1
