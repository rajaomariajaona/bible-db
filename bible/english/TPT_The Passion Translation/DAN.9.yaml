      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ezra 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
