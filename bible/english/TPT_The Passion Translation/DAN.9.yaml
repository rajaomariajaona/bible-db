        text: Jer. 25:12
      metadata:
        usfm: JER.25.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Daniel realized from Jeremiah’s prophecies that the seventy years of their captivity in Babylon was completed, yet the people of God had not returned to their homeland, thus, his prayer in this chapter. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
