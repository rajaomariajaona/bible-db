document_id: DAN.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Daniel Considers Jeremiah’s Prophecy
  - type: text
    content: 'These things happened during the first year Darius '
  - type: note
    content: It is possible that Darius was a title, and the name of the Persian king was Cyrus.
  - type: text
    content: 'son of Xerxes '
  - type: note
    content: Or “Ahasuerus,” the Hebrew equivalent of the better recognized Greek name “Xerxes.”
  - type: text
    content: 'was king over Babylon. He was a descendant of the Medes. '
  '10':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', we have not listened to your voice, our God, nor kept your instructions that you gave us through your servants the prophets. '
  '11':
  - type: text
    content: 'All the people of Israel have ignored your voice; we have defied your instructions and gone astray. Now, the solemn curses confirmed by your promises of punishment in the law of your servant Moses have been poured out upon us because we sinned against you. '
  '12':
  - type: text
    content: 'You have fulfilled the words that you spoke against us and against the rulers over us '
  - type: note
    content: Or “the judges who judged us.”
  - type: text
    content: 'by bringing upon us such a great calamity. Your severe punishment of Jerusalem has never been equaled under all heaven! '
  '13':
  - type: text
    content: 'As the law of Moses warns, this calamity came upon us in full measure. And even now, '
  - type: text
    content: Yahweh
  - type: text
    content: ', we have not sought to please you, our God, by turning away from our wickedness and following your ways of truth. '
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ', you have waited for the right moment '
  - type: note
    content: See Jer. 31:28; 44:27.
  - type: text
    content: 'to unleash this calamity upon us. '
  - type: text
    content: Yahweh
  - type: text
    content: ', our God, you are just and right in all that you have done, for we defiantly ignored your voice.'
  '15':
  - type: text
    content: '“And now, Lord our God, you delivered your people out of the land of Egypt with mighty power. '
  - type: note
    content: Or “powerful hand.” God’s “hand” is a metaphor for his power and might.
  - type: text
    content: 'You have won fame and gained renown for yourself even to this day. But we acknowledge our sin and wicked ways. '
  '16':
  - type: text
    content: 'Lord, you have always demonstrated your faithfulness '
  - type: note
    content: Or “righteousness.”
  - type: text
    content: 'to Israel, so now please turn your fierce anger '
  - type: note
    content: Or “your anger and your rage,” a hendiadys.
  - type: text
    content: 'away from Jerusalem. It belongs to you and sits on the hill where sacrifice is made. All the other nations who live around us despise your city and your people because of the sins of our ancestors and because of our sins also. '
  '17':
  - type: text
    content: 'And now, our God, I am your servant and I beg you, please—answer my prayers. Make your face to shine '
  - type: note
    content: See Num. 6:25.
  - type: text
    content: 'upon your ruined temple so that everyone will know that you are Lord. '
  - type: note
    content: Or “for your sake.”
  '18':
  - type: text
    content: 'Turn your heart to hear my prayer, O my God. Listen to my cry and please look carefully and see our despair and the devastated city, which bears your name. We bring our requests to you and ask for your mercy, not because we deserve it but because of your extravagant, infinite love. '
  - type: note
    content: See 9:9 and footnote.
  '19':
  - type: text
    content: Lord, hear us and forgive us. Lord, please be attentive and act for us! Do not delay in answering us for your own sake, my God, and for your city and your people who bear your name.”
  - type: heading
    content: Gabriel Explains the Seventy Sevens
  '2':
  - type: text
    content: 'During his first year of rule, I, Daniel, was studying the Scriptures and noticed that according to the word '
  - type: text
    content: Yahweh
  - type: text
    content: ' had revealed to the prophet Jeremiah, '
  - type: note
    content: One of the very few times an Old Testament book mentions another Old Testament book.
  - type: text
    content: 'seventy years must pass while Jerusalem lay in ruins. '
  - type: note
    content: See Ezra 1:1; Jer. 25:12. Daniel realized from Jeremiah’s prophecies that the seventy years of their captivity in Babylon was completed, yet the people of God had not returned to their homeland, thus, his prayer in this chapter. See Jer. 30:18; 31:37.
  '20':
  - type: text
    content: 'While I was absorbed in prayer, confessing my sins and the sins of my people Israel and presenting my request before '
  - type: text
    content: Yahweh
  - type: text
    content: ', my God, on behalf of '
  - type: text
    content: Jerusalem
  - type: text
    content: ', his holy hill—'
  '21':
  - type: text
    content: 'Gabriel, whom I had seen in a vision previously, came flying '
  - type: note
    content: Or literally “wearied in weariness.” This could indicate Gabriel coming to Daniel during a time when Daniel was extremely weary (see 8:27). However, most modern translators and expositors believe it refers to how swiftly Gabriel was flying to Daniel.
  - type: text
    content: 'down from heaven. He touched me at the time of the evening sacrifice. '
  '22':
  - type: text
    content: 'He gave me understanding and said to me, “Daniel, I have come '
  - type: text
    content: from heaven
  - type: text
    content: ' to impart insight and understanding concerning '
  - type: text
    content: this prophecy
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'As soon as you began to pray, God gave you an answer, '
  - type: note
    content: Or “a word went forth.”
  - type: text
    content: 'for you are a precious treasure '
  - type: text
    content: to God
  - type: text
    content: '! '
  - type: note
    content: Or “you are preciousness” or “loveliness, delights.”
  - type: text
    content: Now, carefully consider the message and understand the revelation of the vision.
  '24':
  - type: text
    content: '“God has decreed for your people and for the holy city a period of seventy times seven '
  - type: note
    content: Or “seventy sevens [weeks].” When Gabriel speaks of seventy weeks, he is not suggesting periods of seven days but seven years per week, or 490 years. A biblical “week” represents “a week of years.” See Gen. 29:27–28; Ex. 34:22; Lev. 12:5; Num. 28:26; Deut. 16:9–10; 2 Chron. 8:13; Jer. 5:24; Dan. 10:2–3.
  - type: text
    content: 'for these reasons: to finish '
  - type: note
    content: The Hebrew word for “finished” is kalah. The last word Jesus spoke on the cross was not in Greek, for his heart language was Hebrew. The last word our Jewish Jesus spoke as he made an end of sin would have been the word kalah. This Scripture is one of the clearest prophetic signposts of the Messiah, Jesus, who would come and put an end to sin. The death of Jesus was the last of the sacrifices for sin. His once-for-all sacrifice did not cover sin; it eliminated it.
  - type: text
    content: 'transgression, to put an end to sin, to cancel guilt, '
  - type: note
    content: Or “to cover [atone for] deserved punishment.”
  - type: text
    content: 'to bring in everlasting righteousness, '
  - type: note
    content: Or “to bring in justice of long ages.”
  - type: text
    content: to confirm the prophetic vision, and to anoint the Most Holy One.
  - type: note
    content: 'There are three possible translations for the phrase qodesh qadashim: “the Most Holy,” “the Most Holy Place,” or “the Most Holy One.” Jews interpret this as the Holy of Holies being rededicated (Hanukkah). The ancient Syriac is “until the Messiah, the Holy of Holies.” This interpretation of 9:24 as a prophecy of the Messiah is confirmed by at least one church father from the early third century AD, Hippolytus of Rome, who wrote the earliest Christian commentary on Daniel. Gabriel states that six things will take place: (1) transgression will be finished, (2) sin will end, (3) guilt will be canceled, (4) everlasting righteousness (justice) will be established, (5) the prophetic vision will be confirmed or sealed up, (6) the Most Holy One will be anointed. All of these six prophecies were fulfilled in Christ.'
  '25':
  - type: text
    content: “
  - type: text
    content: You must
  - type: text
    content: ' know and understand this: From the issuing of '
  - type: text
    content: God’s
  - type: text
    content: ' decree to restore and rebuild Jerusalem '
  - type: note
    content: This is a possible reference to Jeremiah’s prophecy in Jer. 29:10.
  - type: text
    content: 'until the Anointed Ruler '
  - type: note
    content: 'Or “Messiah the Ruler.” The word translated “Anointed One” is the origin of our term “Messiah.” The theologian Gleason Archer is quite definitive in his assessment: “We therefore conclude that ‘Messiah the Ruler’ was the meaning intended by the author.” (See Frank E. Gaebelein et al., Daniel and the Minor Prophets, The Expositor’s Bible Commentary, vol. 7 [Grand Rapids, MI: Zondervan, 1985] and Septuagint.) However, some scholars have identified this “Anointed One” with Cyrus the Great, who is, in fact, called “his [the Lord’s] anointed one” in Isa. 45:1 and who did permit the first Jews to go back to Jerusalem. Others think that it is Zerubbabel, who is referred to by messianic titles in Hag. 2 and Zech. 4. And still others see the most likely candidate as Jeshua (or Joshua in Hag. 1:1; Zech. 6:11), the son of Jehozadak, the high priest during this period (see Ezra 2:2, 36; Neh. 7:7, 39).'
  - type: text
    content: 'comes, there will be seven ‘sevens,’ '
  - type: note
    content: Or “seven weeks,” that is, seven periods of seven years each, or forty-nine years (the time of Ezra–Nehemiah).
  - type: text
    content: 'and sixty-two ‘sevens.’ Jerusalem will be rebuilt with '
  - type: text
    content: broad
  - type: text
    content: ' streets '
  - type: note
    content: Some interpret the “broad streets” to be simply a plaza or a space just inside the city gate used for deciding court cases.
  - type: text
    content: and a trench, but during times of great distress.
  '26':
  - type: text
    content: '“After those sixty-two weeks, '
  - type: note
    content: That is, sixty-two times seven years or four hundred and thirty-four years.
  - type: text
    content: 'the Anointed One will be cut off '
  - type: note
    content: 'Although there are various interpretations of Jewish and Christian scholars as to whom was “cut off,” many conservative scholars see this as a clear prophecy to the cross of Jesus Christ, who was “cut off” (excommunicated) as the Living Holy Temple. He was also “cut off [pierced]” as our Redeemer. (See Leon J. Wood, A Commentary on Daniel [Grand Rapids, MI: Zondervan, 1973], 255; Jacques R. Doukhan, “The Seventy Weeks of Dan 9: An Exegetical Study,” Andrews University Seminary Studies 17, no. 1 [1979]: 18–21.)'
  - type: text
    content: 'and left with nothing. '
  - type: note
    content: 'Or “cut off but not for himself.” The Septuagint is “though there is no crime in him.” Theodotion translates this as “there is no judgment against him.” (See J. A. Montgomery, A Critical and Exegetical Commentary on the Book of Daniel, The International Critical Commentary [Edinburgh: T & T Clark, 1927], 381; Norman Porteous, Daniel: A Commentary, The Old Testament Library [Louisville, KY: Westminster John Knox Press, 2016], 142.)'
  - type: text
    content: 'The people of the commander '
  - type: note
    content: The majority of scholars view this invading leader as Antiochus IV Epiphanes and his Roman armies. Some, however, view “the people of the commander” as the Jewish people; still others see them as the saints of God. The phrase may be intentionally ambiguous.
  - type: text
    content: 'will destroy both the city and the sanctuary. Then its end '
  - type: note
    content: Or “his end.” The Hebrew allows for either translation. If “its end,” then it refers to the temple (sanctuary); if “his end,” then it refers to the leader who destroyed the temple.
  - type: text
    content: 'will come like an '
  - type: text
    content: overwhelming
  - type: text
    content: ' flood, and until '
  - type: text
    content: those sixty-two weeks
  - type: text
    content: ' end, there will be war. The decree of desolation has been issued!'
  '27':
  - type: text
    content: '“For one week '
  - type: note
    content: That is, for seven years.
  - type: text
    content: 'he '
  - type: note
    content: This is likely a reference to the Lord Jesus who was cut off after three and a half years of ministry (forty-two months) and ended forever the sacrificial system of the Old Testament. Jesus has confirmed a New Covenant with us who believe. See Isa. 59:21.
  - type: text
    content: 'will confirm a covenant '
  - type: note
    content: This is likely a reference to the alliance made between Antiochus IV Epiphanes and the renegade Jews who favored Hellenistic culture. See 1 Macc. 1:11–14.
  - type: text
    content: 'with many '
  - type: text
    content: people
  - type: text
    content: ', but in the middle of that week, '
  - type: note
    content: That is, three and a half years. The Maccabean revolt lasted that amount of time.
  - type: text
    content: he will abolish sacrifices and offerings.
  - type: text
    content: '“On the wing '
  - type: note
    content: 'Or “At the temple” (LXX, Theodotion). This could be a reference to the “wing,” or corner, of the temple or, more likely, the corner of the altar of sacrifice. (See M. Delcor, Le Livre de Daniel [Paris: J. Gabalda et Cie Editeurs, 1971], 204; André Lacocque, The Book of Daniel, trans. David Pellauer [Eugene, OR: Cascade Books, 2018], 199.) Others view the “wing” not as the altar where a statue was placed but as the polluted garments of God’s people, who wore tassels on the corners of their clothing. The corner of the garment was also referred to as a “wing.” See Num. 15:37–41; Ruth 3:9; Hag. 2:12–14.'
  - type: text
    content: of the temple
  - type: text
    content: ', an appalling abomination will be erected. '
  - type: note
    content: Historically, Antiochus IV Epiphanes set up on the altar of sacrifice the statue of the Greek god Zeus. Antiochus then renamed the Jerusalem temple in honor of Zeus. This statue was called the “appalling abomination” or the “abomination that brings desolation” (11:31) or the “awful horror” (see the third footnote on 8:11). See 1 Macc. 1:54–59; 2 Macc. 6:1–2; see also Josephus Ant. 12.5.4 §253.
  - type: text
    content: And the abomination will remain there until God does away with the one who placed it there, just as God has determined.”
  - type: note
    content: Or “until the end that God has decreed will be poured out on the one responsible for the desecration of the temple.” The Hebrew text of vv. 26–27 is in several places obscure, uncertain, and difficult, both to translate and to interpret. It is recommended to compare these verses with multiple translations. For example, a variety of corrections of the text have been proposed for the end of v. 27. A literal rendering of the Hebrew text is something like “on the wing abominations desolations until the end and what was decreed is poured on the desolator.” Many have viewed the prophecy given in these two verses as the most difficult to interpret in the Bible.
  '3':
  - type: text
    content: 'Then I turned my heart to the Lord God, '
  - type: note
    content: Or “I gave my face to Adonai Elohim.”
  - type: text
    content: seeking an answer from him, pleading for mercy with fasting, wearing sackcloth, and sitting among ashes.
  - type: heading
    content: Daniel Intercedes for His People
  '4':
  - type: text
    content: 'I prayed to '
  - type: text
    content: Yahweh
  - type: text
    content: ', my God, and made this confession: '
  - type: note
    content: The same Hebrew word for “confession” is also found in Lev. 26:40–45.
  - type: text
    content: '“My Lord, you are the great and awesome God who faithfully keeps your covenant of love '
  - type: note
    content: The Hebrew word for “unwavering, endless love” is hesed, one of the more difficult single Hebrew words to translate. It carries the idea of sustained loyalty and love at the same time. Other meanings include “loving-kindness,” “constant, unchanging love,” or “trustworthy love.” This term is used twenty-six times in Psalm 136 alone (once in each verse). The Psalms can be described as “David’s pursuit of hesed.” Hesed comes from a root word that means “eager, ardent desire.” It is the fiery, faithful, passionate love of God, who is committed to love you until the end.
  - type: text
    content: 'with those who love you and keep your commands. '
  - type: note
    content: See Deut. 7:9, 21; Neh. 1:5.
  '5':
  - type: text
    content: 'Yet we have sinned, acted wickedly, and done evil; we have rebelled and turned aside from your laws and commands. '
  '6':
  - type: text
    content: 'We have not listened to your servants the prophets, who prophesied in your name to our kings, our leaders, our fathers, and all the people of the land. '
  - type: note
    content: Verses 5 and 6 are quoted in the Jewish synagogues on Rosh Hashanah (New Year’s Day) and Yom Kippur (the Day of Atonement).
  '7':
  - type: text
    content: 'Righteousness belongs to you, Lord, but we are all covered with shame even to this day—the people of Judah, the residents of Jerusalem, and all Israel, near and far. You have scattered us to many lands because of our treachery against you. '
  - type: note
    content: Or literally “in their [our] treachery, they [we] dealt treacherously.”
  '8':
  - type: text
    content: 'Yes, '
  - type: text
    content: Yahweh
  - type: text
    content: ', we are all clothed with shame—our kings, our princes, and our fathers, because we have sinned against you. '
  '9':
  - type: text
    content: 'In spite of all that, Lord, our God, you are '
  - type: text
    content: filled with
  - type: text
    content: ' compassion '
  - type: note
    content: Or “mercies.” This is the Hebrew homonym (raham) that can also be translated “womb.” God’s mercy toward us is like a mother’s compassion for the baby that came from her womb. Perhaps one could translate raham as “womb-love.”
  - type: text
    content: 'and '
  - type: text
    content: overflow with
  - type: text
    content: ' forgiveness, even though we have '
  - type: text
    content: openly
  - type: text
    content: ' rebelled against you.'
