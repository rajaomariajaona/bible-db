    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These things happened during the first year Darius '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is possible that Darius was a title, and the name of the Persian king was Cyrus.
    marker-yv: yv-n
  - type: text
    text: 'son of Xerxes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Ahasuerus,” the Hebrew equivalent of the better recognized Greek name “Xerxes.”
    marker-yv: yv-n
  - type: text
    text: 'was king over Babylon. He was a descendant of the Medes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'During his first year of rule, I, Daniel, was studying the Scriptures and noticed that according to the word '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had revealed to the prophet Jeremiah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One of the very few times an Old Testament book mentions another Old Testament book.
    marker-yv: yv-n
  - type: text
    text: 'seventy years must pass while Jerusalem lay in ruins. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
