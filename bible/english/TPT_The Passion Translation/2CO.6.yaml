document_id: 2CO.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Ministry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, since we are God’s coworkers, we beg you not to take God’s marvelous grace for granted, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: allowing it to have no effect on your lives
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “not to receive God’s grace in vain.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We may suffer, yet in every season '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated by the Aramaic.
      marker-yv: yv-n
    - type: text
      text: we are always found rejoicing. We may be poor, yet we bestow great riches on many. We seem to have nothing, yet in reality we possess all things.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What an amazing list of characteristics of true apostolic ministry. These are the virtues that endeared Paul and his ministry companions to the churches and validated his authority as an example to them of God’s true servant.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My friends at Corinth, our hearts are wide open to you and we speak freely, holding nothing back from you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If there is a block in our relationship, it is not with us, for we carry you in our hearts with great love, yet you still withhold your affections '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tender mercies.” Second Corinthians is Paul’s most intimate and descriptive letter. He writes of his inner feelings here more than in any other letter.
      marker-yv: yv-n
    - type: text
      text: 'from us. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I speak to you as our children. Make room in your hearts for us as we have done for you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple of the Living God
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t continue to team up with unbelievers in mismatched alliances, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul’s teaching here includes marital, business, and personal relationships. We never abandon our responsibility to reach the world (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 5:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), but we must steer clear of relationships that will divide our loyalty to Christ.
      marker-yv: yv-n
    - type: text
      text: 'for what partnership is there between righteousness and rebellion? Who could mingle light with darkness? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What harmony can there be between Christ and Satan? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Belial” (the worthless one), a term for Satan.
      marker-yv: yv-n
    - type: text
      text: 'Or what does a believer have in common with an unbeliever? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What friendship does God’s temple '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The temple in Jerusalem was still standing when Paul wrote this.
      marker-yv: yv-n
    - type: text
      text: 'have with demons? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “idols.”
      marker-yv: yv-n
    - type: text
      text: 'For indeed, we are the temple of the living God, just as God has said:'
  - type: usfm
    marker: q1
    children:
    - type: text
