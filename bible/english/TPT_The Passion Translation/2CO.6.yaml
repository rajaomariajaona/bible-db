document_id: 2CO.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Ministry
  - type: text
    content: 'Now, since we are God’s coworkers, we beg you not to take God’s marvelous grace for granted, '
  - type: text
    content: allowing it to have no effect on your lives
  - type: text
    content: '. '
  - type: note
    content: Or “not to receive God’s grace in vain.”
  '10':
  - type: text
    content: 'We may suffer, yet in every season '
  - type: note
    content: As translated by the Aramaic.
  - type: text
    content: we are always found rejoicing. We may be poor, yet we bestow great riches on many. We seem to have nothing, yet in reality we possess all things.
  - type: note
    content: What an amazing list of characteristics of true apostolic ministry. These are the virtues that endeared Paul and his ministry companions to the churches and validated his authority as an example to them of God’s true servant.
  '11':
  - type: text
    content: 'My friends at Corinth, our hearts are wide open to you and we speak freely, holding nothing back from you. '
  '12':
  - type: text
    content: 'If there is a block in our relationship, it is not with us, for we carry you in our hearts with great love, yet you still withhold your affections '
  - type: note
    content: Or “tender mercies.” Second Corinthians is Paul’s most intimate and descriptive letter. He writes of his inner feelings here more than in any other letter.
  - type: text
    content: 'from us. '
  '13':
  - type: text
    content: So I speak to you as our children. Make room in your hearts for us as we have done for you.
  - type: heading
    content: The Temple of the Living God
  '14':
  - type: text
    content: 'Don’t continue to team up with unbelievers in mismatched alliances, '
  - type: note
    content: Paul’s teaching here includes marital, business, and personal relationships. We never abandon our responsibility to reach the world (1 Cor. 5:9–10), but we must steer clear of relationships that will divide our loyalty to Christ.
  - type: text
    content: 'for what partnership is there between righteousness and rebellion? Who could mingle light with darkness? '
  '15':
  - type: text
    content: 'What harmony can there be between Christ and Satan? '
  - type: note
    content: Or “Belial” (the worthless one), a term for Satan.
  - type: text
    content: 'Or what does a believer have in common with an unbeliever? '
  '16':
  - type: text
    content: 'What friendship does God’s temple '
  - type: note
    content: The temple in Jerusalem was still standing when Paul wrote this.
  - type: text
    content: 'have with demons? '
  - type: note
    content: As translated from the Aramaic. The Greek is “idols.”
  - type: text
    content: 'For indeed, we are the temple of the living God, just as God has said:'
  - type: text
    content: I will make my home in them and walk among them.
  - type: text
    content: I will be their God, and they will be my people.
  - type: note
    content: See Lev. 26:12; Jer. 32:38; Ezek. 37:27.
  '17':
  - type: text
    content: For this reason,
  - type: text
    content: “Come out from among them and be separate,” says the Lord.
  - type: text
    content: “Touch nothing that is unclean, and I will embrace you.
  - type: note
    content: Or “I will welcome you” (within). See Isa. 52:11; Ezek. 20:41.
  '18':
  - type: text
    content: I will be a true Father to you,
  - type: note
    content: God himself will assume the role of caring for us and meeting our needs, giving himself eternally to us. See Ps. 103:18; Mal. 1:6.
  - type: text
    content: and you will be my beloved sons and daughters,”
  - type: text
    content: 'says the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' Almighty.'
  - type: note
    content: As translated from the Aramaic. See 2 Sam. 7:14; Isa. 43:6. Paul is paraphrasing Old Testament texts, changing phrases and combining them to make his point. Jesus likewise often paraphrased Old Testament verses as he taught the people.
  '2':
  - type: text
    content: For he says,
  - type: text
    content: I listened to you at the time of my favor.
  - type: text
    content: And the day when you needed salvation,
  - type: text
    content: I came to your aid.
  - type: note
    content: See Isa. 49:8.
  - type: text
    content: 'So can’t you see? Now is the time to respond to his favor! Now is the day of salvation! '
  '3':
  - type: text
    content: 'We will not place obstacles '
  - type: note
    content: Or “scandals that cause people to stumble.”
  - type: text
    content: 'in anyone’s way that hinder them '
  - type: text
    content: from coming to salvation
  - type: text
    content: ' so that our ministry will not be discredited. '
  '4':
  - type: text
    content: 'Yet, as God’s servants, we prove ourselves authentic '
  - type: note
    content: The Aramaic can be translated “reveals our inner souls.”
  - type: text
    content: 'in every way. '
  - type: text
    content: For example
  - type: text
    content: ':'
  - type: text
    content: 'We have great endurance '
  - type: note
    content: The Aramaic can be translated “profound hope.”
  - type: text
    content: 'in hardships and in persecutions. '
  - type: text
    content: We don’t lose courage
  - type: text
    content: ' in a time of stress and calamity.'
  '5':
  - type: text
    content: 'We’ve been beaten many times, imprisoned, and '
  - type: text
    content: found ourselves
  - type: text
    content: ' in the midst of riots. We’ve endured many troubles, '
  - type: note
    content: Or “labors.” The Aramaic can be translated “tortures.”
  - type: text
    content: had sleepless nights, and gone hungry.
  - type: note
    content: Or “fastings.”
  '6':
  - type: text
    content: We have proved ourselves
  - type: text
    content: ' by our lifestyles of purity, by our spiritual insights, by our patience, and by showing kindness, by the Spirit of holiness and by our uncritical love for you.'
  - type: note
    content: The Aramaic can be translated “love without scheming.”
  '7':
  - type: text
    content: We commend ourselves to you
  - type: text
    content: ' by our truthful teachings, '
  - type: note
    content: Or “the word of truth [Gr. logos].”
  - type: text
    content: 'by the power of God '
  - type: text
    content: working through us
  - type: text
    content: ', and with the mighty weapons '
  - type: note
    content: Or “armor.”
  - type: text
    content: of righteousness—
  - type: text
    content: a sword
  - type: text
    content: ' in one hand and '
  - type: text
    content: a shield
  - type: text
    content: ' in the other.'
  - type: note
    content: Or “weapons of righteousness for the right hand and for the left.” By implication, this would mean a shield and a sword—every warrior’s weapons.
  '8':
  - type: text
    content: 'Amid honor or dishonor, '
  - type: note
    content: The Aramaic can be translated “cursed” (by others).
  - type: text
    content: slander or praise—
  - type: text
    content: even when we are treated
  - type: text
    content: ' as deceivers and imposters—'
  - type: text
    content: we remain steadfast and true
  - type: text
    content: .
  '9':
  - type: text
    content: We are unknown nobodies whom everyone knows. We are frequently at death’s door, yet here we are, still alive! We have been severely punished yet not executed.
