      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I listened to you at the time of my favor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And the day when you needed salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I came to your aid.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 49:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So can’t you see? Now is the time to respond to his favor! Now is the day of salvation! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We will not place obstacles '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scandals that cause people to stumble.”
      marker-yv: yv-n
    - type: text
      text: 'in anyone’s way that hinder them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from coming to salvation
    - type: text
      text: ' so that our ministry will not be discredited. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet, as God’s servants, we prove ourselves authentic '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “reveals our inner souls.”
      marker-yv: yv-n
    - type: text
      text: 'in every way. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: For example
    - type: text
      text: ':'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We have great endurance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “profound hope.”
      marker-yv: yv-n
    - type: text
      text: 'in hardships and in persecutions. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: We don’t lose courage
    - type: text
      text: ' in a time of stress and calamity.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We’ve been beaten many times, imprisoned, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: found ourselves
    - type: text
      text: ' in the midst of riots. We’ve endured many troubles, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “labors.” The Aramaic can be translated “tortures.”
      marker-yv: yv-n
    - type: text
      text: had sleepless nights, and gone hungry.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “fastings.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: We have proved ourselves
    - type: text
      text: ' by our lifestyles of purity, by our spiritual insights, by our patience, and by showing kindness, by the Spirit of holiness and by our uncritical love for you.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
