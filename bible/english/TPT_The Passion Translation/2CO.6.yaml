      marker-yv: yv-n
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For this reason,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Come out from among them and be separate,” says the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Touch nothing that is unclean, and I will embrace you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
