document_id: JAS.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Royal Law of Love Excludes Prejudice
  - type: text
    content: 'My dear brothers and sisters, fellow believers in our glorious Lord Jesus Christ—how could we say that we have faith in him and yet we favor one group of people above another? '
  - type: note
    content: The Aramaic can be translated “Don’t be taken in by the face mask of people, but hold to the faith in the glory of our Lord Jesus the Messiah.”
  '10':
  - type: text
    content: 'For the one who attempts to keep all of the law of Moses but fails in just one point has become guilty of breaking the law in every respect! '
  '11':
  - type: text
    content: 'For the same One who tells us, “Do not commit adultery,” also said, “Do not murder.” '
  - type: note
    content: See Ex. 20:13–14.
  - type: text
    content: 'Now if you don’t commit adultery but do commit murder, you are still guilty as a law-breaker. '
  '12':
  - type: text
    content: 'So we must both speak and act in every respect like those who are destined to be tried by the perfect law of liberty, '
  '13':
  - type: text
    content: and remember that judgment is merciless for the one who judges others without mercy. So by showing mercy, you take dominion over judgment!
  - type: note
    content: As translated from the Aramaic. The Greek is “Mercy triumphs over judgment.”
  - type: heading
    content: Faith Works
  '14':
  - type: text
    content: 'My dear brothers and sisters, what good is it if someone claims to have faith but demonstrates no good works to prove it? How could this kind of faith save anyone? '
  '15':
  - type: text
    content: 'For example, if a brother or sister in the faith is poorly clothed and hungry '
  '16':
  - type: text
    content: 'and you leave them saying, “Good-bye. I hope you stay warm and have plenty to eat,” but you don’t provide them with a coat or even a cup of soup, what good is your faith? '
  '17':
  - type: text
    content: So then faith that doesn’t involve action is phony.
  - type: note
    content: Or “dead (fruitless).” See also v. 20.
  '18':
  - type: text
    content: 'But someone might object and say, “One person has faith and another person has works.” '
  - type: note
    content: Many scholars conclude that the ambiguity of the Greek text makes this the most difficult verse in all of James and perhaps in all of the New Testament to translate.
  - type: text
    content: 'Go ahead then and prove to me that you have faith without works and I will show you faith by my works as proof that I believe. '
  '19':
  - type: text
    content: 'You can believe all you want that there is one true God, '
  - type: note
    content: Or “that God is one,” which is the Jewish Shema (see Deut. 6:4).
  - type: text
    content: 'that’s wonderful! But even the demons know this and tremble with fear before him, '
  - type: note
    content: The Aramaic can be translated “they writhe on their bellies in the dirt!”
  - type: text
    content: yet they’re unchanged—
  - type: text
    content: they remain demons
  - type: text
    content: .
  '2':
  - type: text
    content: 'Suppose an influential man comes into your worship meeting wearing gold rings and expensive clothing, and also a homeless man in shabby clothes comes in. '
  '20':
  - type: text
    content: 'O feeble sons of Adam, '
  - type: note
    content: As translated from the Aramaic. The Greek is “O empty man.”
  - type: text
    content: 'do you need further evidence that faith divorced from good works is phony? '
  '21':
  - type: text
    content: 'Wasn’t our ancestor Abraham found righteous before God because of his works when he offered his son Isaac on the altar? '
  '22':
  - type: text
    content: 'Can’t you see how his action cooperated with his faith and by his action faith found its full expression? '
  '23':
  - type: text
    content: 'So in this way the Scripture was fulfilled:'
  - type: text
    content: Because Abraham believed God, his faith was exchanged for God’s righteousness.
  - type: note
    content: Or “Abraham’s faith was credited to his account for righteousness.” See Gen. 15:6.
  - type: text
    content: 'So he became known as the lover of God! '
  - type: note
    content: Or “the one whom God loved,” as translated from the Aramaic. Although the Greek text is most often translated “friend of God,” the Greek word philos can also be used as the love that bonds friends together. See also 2 Chron. 20:7; Isa. 41:18; Dan. 3:35 (LXX).
  '24':
  - type: text
    content: So now it’s clear that a person is seen as righteous in God’s eyes not merely by faith alone, but by his works.
  '25':
  - type: text
    content: 'And the same is true of the prostitute named Rahab who was found righteous in God’s eyes by her works, for she received the spies into her home and helped them escape from the city by another route. '
  - type: note
    content: See Josh. 2.
  '26':
  - type: text
    content: For just as a human body without the spirit is a dead corpse, so faith without the expression of good works is dead!
  '3':
  - type: text
    content: 'If you show special attention to the rich man in expensive clothes and say, “Here’s a seat of honor for you right up front!” but you turn and say to the poor beggar dressed in rags, “You can stand over here,” or “Sit over there on the floor in the back,” '
  - type: note
    content: The Aramaic can be translated “Sit on the floor before our footstool.”
  '4':
  - type: text
    content: then you’ve demonstrated gross prejudice among yourselves and used evil standards of judgment!
  '5':
  - type: text
    content: 'So listen carefully, my dear brothers and sisters, hasn’t God chosen '
  - type: note
    content: The Greek word for “chosen” is eklegomai, which is a form of lego (speak).
  - type: text
    content: 'the poor in the world’s eyes to be those who are rich in faith? '
  - type: note
    content: See 1 Cor. 1:27–28.
  - type: text
    content: 'And won’t they be the heirs of the kingdom-realm he promised to those who love him? '
  '6':
  - type: text
    content: 'But yet you insult and shun the poor '
  - type: text
    content: in your efforts to impress the rich
  - type: text
    content: '! '
  - type: note
    content: See also 1 Cor. 11:22.
  - type: text
    content: 'Isn’t it the wealthy who exploit you and drag you into court? '
  '7':
  - type: text
    content: Aren’t they the very ones who blaspheme the beautiful name of the One you now belong to?
  - type: note
    content: Or “the worthy name which was invoked over you (at your baptism).”
  '8':
  - type: text
    content: 'Your calling is to fulfill the royal law of love '
  - type: note
    content: It is a royal law because it is given by our King, but since he has made us kings and priests, it becomes the royal law of love given to his royal sons and daughters who are heirs with him.
  - type: text
    content: 'as given to us in this Scripture: “You must love and value your neighbor as you love and value yourself!”'
  - type: note
    content: See Lev. 19:18; Matt. 19:19; 22:39; Mark 12:31; Luke 10:27; Rom. 13:9; Gal. 5:14.
  - type: text
    content: 'For keeping this law is the noble way to live. '
  '9':
  - type: text
    content: But when you show prejudice you commit sin and you violate this royal law of love!
