document_id: PSA.42,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Cry for Revival
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psalms 42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: were originally composed as one psalm and later made into two.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A contemplative poem for instruction by the prophetic singers of Korah’s clan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Korah was the great-grandson of Levi. The sons of Korah (translated here as the “prophetic singers of Korah’s clan”) were Levitical singers. David chose them to preside over the music of the tabernacle-tent on Mount Zion.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I long to drink of you, O God,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: to drink deeply from the streams of pleasure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: flowing from your presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My longings overwhelm me for more of you!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The literal Hebrew is “as the deer pants for the riverbank [water’s edge].” This translation takes the metaphor of a hunted deer and puts it into terms that transfer the meaning into today’s context. David was describing the passion and longing he had that was yet unfulfilled.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their wounding words pierce my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: over and over while they say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where is this God of yours?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I say to my soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Don’t be discouraged. Don’t be disturbed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I know my God will break through for me.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I’ll have plenty of reasons to praise him all over again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, he is my saving grace!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul thirsts, pants, and longs for the living God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I want to come and see the face of God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day and night my tears keep falling
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my heart keeps crying for your help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while my enemies mock me over and over, saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Where is this God of yours? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Why doesn’t he help you?
    - type: text
      text: ”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I speak over my heartbroken soul,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Take courage. Remember when you used to be
  - type: usfm
    marker: q1
    children:
    - type: text
      text: right out front leading the procession of praise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the great crowd of worshipers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gathered to go into the presence of the Lord?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shouted with joy as the sound of passionate celebration
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filled the air and the joyous multitude of lovers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: honored the feast of the Lord!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So then, my soul, why would you be depressed?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why would you sink into despair?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just keep hoping and waiting on God, your Savior.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For no matter what, I will still sing with praise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are my saving grace!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here I am depressed and downcast.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet I will still remember you as I ponder the place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where your glory streams down from the mighty mountaintops, lofty and majestic—
    - type: usfm
      marker: it
      children:
      - type: text
        text: the mountains of your awesome presence
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text contains “Mount Hermon” and “Mount Mizar,” considered to be sacred mountains in the Hebrew culture.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hermon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “lofty and majestic.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mizar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “littleness.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My deep need calls out to the deep kindness of your love.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your waterfall of weeping sent waves of sorrow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: over my soul, carrying me away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cascading over me like a thundering cataract.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All through the day '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has commanded his endless love to pour over me.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Through the night I sing his songs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and my praises '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “my prayer.”
      marker-yv: yv-n
    - type: text
      text: to the living God.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will say to God, “You are my mountain of strength;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how could you forget me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why must I suffer this vile oppression of my enemies—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: these heartless tormentors who are out to kill me?”
