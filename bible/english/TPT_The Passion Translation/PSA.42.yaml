document_id: PSA.42,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry for Revival Psalms 42 and 43 were originally composed as one psalm and later made into two.
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A contemplative poem for instruction by the prophetic singers of Korah’s clan
  - type: note
    content: Korah was the great-grandson of Levi. The sons of Korah (translated here as the “prophetic singers of Korah’s clan”) were Levitical singers. David chose them to preside over the music of the tabernacle-tent on Mount Zion.
  - type: text
    content: I long to drink of you, O God,
  - type: text
    content: to drink deeply from the streams of pleasure
  - type: text
    content: flowing from your presence.
  - type: text
    content: My longings overwhelm me for more of you!
  - type: note
    content: The literal Hebrew is “as the deer pants for the riverbank [water’s edge].” This translation takes the metaphor of a hunted deer and puts it into terms that transfer the meaning into today’s context. David was describing the passion and longing he had that was yet unfulfilled.
  '10':
  - type: text
    content: Their wounding words pierce my heart
  - type: text
    content: over and over while they say,
  - type: text
    content: “Where is this God of yours?”
  '11':
  - type: text
    content: So I say to my soul,
  - type: text
    content: “Don’t be discouraged. Don’t be disturbed.
  - type: text
    content: For I know my God will break through for me.”
  - type: text
    content: Then I’ll have plenty of reasons to praise him all over again.
  - type: text
    content: Yes, he is my saving grace!
  '2':
  - type: text
    content: My soul thirsts, pants, and longs for the living God.
  - type: text
    content: I want to come and see the face of God.
  '3':
  - type: text
    content: Day and night my tears keep falling
  - type: text
    content: and my heart keeps crying for your help,
  - type: text
    content: while my enemies mock me over and over, saying,
  - type: text
    content: '“Where is this God of yours? '
  - type: text
    content: Why doesn’t he help you?
  - type: text
    content: ”
  '4':
  - type: text
    content: So I speak over my heartbroken soul,
  - type: text
    content: “Take courage. Remember when you used to be
  - type: text
    content: right out front leading the procession of praise
  - type: text
    content: when the great crowd of worshipers
  - type: text
    content: gathered to go into the presence of the Lord?
  - type: text
    content: You shouted with joy as the sound of passionate celebration
  - type: text
    content: filled the air and the joyous multitude of lovers
  - type: text
    content: honored the feast of the Lord!”
  '5':
  - type: text
    content: So then, my soul, why would you be depressed?
  - type: text
    content: Why would you sink into despair?
  - type: text
    content: Just keep hoping and waiting on God, your Savior.
  - type: text
    content: For no matter what, I will still sing with praise,
  - type: text
    content: for you are my saving grace!
  '6':
  - type: text
    content: Here I am depressed and downcast.
  - type: text
    content: Yet I will still remember you as I ponder the place
  - type: text
    content: where your glory streams down from the mighty mountaintops, lofty and majestic—
  - type: text
    content: the mountains of your awesome presence
  - type: text
    content: .
  - type: note
    content: The Hebrew text contains “Mount Hermon” and “Mount Mizar,” considered to be sacred mountains in the Hebrew culture. Hermon means “lofty and majestic.” Mizar means “littleness.”
  '7':
  - type: text
    content: My deep need calls out to the deep kindness of your love.
  - type: text
    content: Your waterfall of weeping sent waves of sorrow
  - type: text
    content: over my soul, carrying me away,
  - type: text
    content: cascading over me like a thundering cataract.
  '8':
  - type: text
    content: 'All through the day '
  - type: text
    content: Yahweh
  - type: text
    content: ' has commanded his endless love to pour over me.'
  - type: text
    content: Through the night I sing his songs
  - type: text
    content: 'and my praises '
  - type: note
    content: Or “my prayer.”
  - type: text
    content: to the living God.
  '9':
  - type: text
    content: I will say to God, “You are my mountain of strength;
  - type: text
    content: how could you forget me?
  - type: text
    content: Why must I suffer this vile oppression of my enemies—
  - type: text
    content: these heartless tormentors who are out to kill me?”
