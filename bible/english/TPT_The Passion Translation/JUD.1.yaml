        text: . This episode is referring to angels who abandoned the heavenly realm to come to earth to have intercourse with women in order to corrupt the godly lineage of Seth. Cain had already gone into the darkness of sin, but the godly line of Seth would one day bring forth Noah, and from his seed (Shem) Jesus would eventually be born. The rebellious rank of angels mentioned here had sex with women who then gave birth to the Nephilim (mighty giants). Ancient references to this can be found in the writings of early Jewish writers, including Josephus and Philo of Alexandria, as well as early church fathers, such as Justin Martyr, Irenaeus, Clement of Alexandria, Ambrose of Milan, Athenagoras, Tertullian, Eusebius, Lactantius, Jerome, Augustine of Hippo, and Sulpicius Severus. All of them, along with the Septuagint, identified these sons of God as the offspring of angels. See also
    - type: usfm
