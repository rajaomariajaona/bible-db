    - type: text
      text: '23'
  - type: text
    text: and snatch others out of the fire to save them. Be merciful over and over to them, but always couple your mercy with the fear of God. Be extremely careful to keep yourselves free from the pollutions of the flesh.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or “hating even the garment [‘snake skin’ or ‘coating’] of the pollution of the flesh [the natural realm].” In other words, we do all we can to bring others to Christ, but not at the expense of becoming like them in ignoring sin. Judah, in closing, gives us seven commands: (1) Keep building up your inner life on the foundation of faith. (2) Pray in the Holy Spirit. (3) Fasten your life to the love of God. (4) Receive more mercy from our Lord Jesus Christ. (5) Have compassion on the wavering. (6) Share the gospel with those who are lost. (7) Hate any compromise that will stain our lives.'
    marker-yv: yv-n
