document_id: JUD.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Truth Worth Fighting For
  - type: text
    content: 'From Judah, '
  - type: note
    content: Or Jude. The Greek is Judas. This was a common Hebrew/Aramaic name during the time of Jesus, and there were two of the Twelve who had this name.
  - type: text
    content: 'a loving servant '
  - type: note
    content: The Greek word doulos implies a close and lasting relationship to a master; love is implied.
  - type: text
    content: 'of Jesus, the Anointed One, and brother of Jacob. '
  - type: note
    content: This Jacob was the brother of our Lord Jesus. Judah’s not asserting his family ties to Jesus but to Jacob, as a sign of his humility. Instead of introducing himself as the half brother of Jesus, he chose to describe himself simply as a “loving servant of Jesus . . . and brother of James.” Judah is not boasting of a physical commonality with Jesus but a spiritual relationship he has with the risen Christ. See Matt. 13:55, where he is named as a (half) brother of Jesus.
  - type: text
    content: I’m writing
  - type: text
    content: ' to the chosen ones who are wrapped in the love of Father God—kept and guarded for '
  - type: note
    content: Or “by.”
  - type: text
    content: 'Jesus, the Messiah. '
  '10':
  - type: text
    content: 'These people insult anything they don’t understand. They behave like irrational beasts by doing whatever they feel like doing. '
  - type: note
    content: There is an implication that they are like animals in heat, following their natural instincts.
  - type: text
    content: 'Because they live by their animal instincts, they corrupt themselves and bring about their own destruction. '
  '11':
  - type: text
    content: 'How terrible it is for them! '
  - type: note
    content: Or “A curse is on them.”
  - type: text
    content: 'For they have followed in the steps of Cain. '
  - type: note
    content: See Gen. 4:3–8. The way of Cain was to reject the blood sacrifice that God desired and instead offer the fruit of his own labors (works). False teachers will insist on adding something to the gospel, polluting it with human works.
  - type: text
    content: 'They have abandoned '
  - type: note
    content: Or “poured out” (themselves).
  - type: text
    content: 'themselves to Balaam’s error because of their greedy pursuit of financial gain. '
  - type: note
    content: Balaam’s error was an abuse of the prophetic gift for financial gain. See Num. 22–24; 31:16.
  - type: text
    content: And since they have rebelled like Korah rebelled
  - type: text
    content: ', they will experience the same fate of Korah and likewise perish.'
  - type: note
    content: 'See Num. 16. Korah led 250 men in rebellions against the leadership of Moses. The earth opened up and swallowed Korah alive. In a similar way, the “things of this earth” enticed these false teachers and they would be “swallowed up” by their greed for what this world can offer. Judah gives us three illustrations of wicked men who did as they pleased and suffered greatly: Cain, Balaam, and Korah.'
  '12':
  - type: text
    content: 'These false teachers are like dangerous hidden reefs at your love feasts, '
  - type: note
    content: “Love feasts”! What a beautiful description of what our church gatherings are meant to be. We celebrate the love of Christ through our communion, worship, teaching, prophesying, and fellowship together in our love for one another.
  - type: text
    content: lying in wait to shipwreck the immature
  - type: text
    content: '. They feast among you without reverence, '
  - type: note
    content: See 1 Cor. 11:17–22.
  - type: text
    content: 'having no shepherd but themselves. '
  - type: note
    content: Or “shepherds who care for only themselves.” The Aramaic can be translated “they submit their souls to no one.”
  - type: text
    content: 'They are clouds with no rain, '
  - type: note
    content: Rain in the Bible is often a symbol of revelatory teaching (Deut. 32:2).
  - type: text
    content: 'swept along by the winds. '
  - type: note
    content: Both in Hebrew and in Aramaic, the word used for “winds” is spirits—“swept along by the spirits.”
  - type: text
    content: 'Like fruitless late-autumn trees '
  - type: note
    content: Autumn trees are often quite stunning in beauty, but these false teachers are bearing no fruit. They have the appearance of being true, but there is no fruit connected to their lives and ministries.
  - type: text
    content: '—twice dead, '
  - type: note
    content: They are dead in appearance and dead in reality—dead through and through.
  - type: text
    content: 'barren, and plucked up by the roots! '
  '13':
  - type: text
    content: 'They are wild waves of the sea, flinging out the foam of their shame and disgrace. '
  - type: note
    content: The Aramaic can be translated “They manifest their confusion.”
  - type: text
    content: 'They are '
  - type: text
    content: misleading
  - type: text
    content: ' like wandering stars, '
  - type: note
    content: Stars were seen as navigational tools for seamen. But these false teachers could not be depended on and would give disastrous guidance. The word misleading is found in the Aramaic.
  - type: text
    content: for whom the complete darkness of eternal gloom has been reserved.
  - type: note
    content: This is an Hebraic expression that is meant to convey the place of future eternal punishment, the farthest away from God that anyone could ever be.
  - type: heading
    content: Enoch’s Prophecy
  '14':
  - type: text
    content: 'Enoch, the seventh direct descendant from Adam, '
  - type: note
    content: That would be Adam, Seth, Enosh, Kenan, Mahalalel, Jared, and Enoch.
  - type: text
    content: 'prophesied of their doom '
  - type: note
    content: Or “prophesied against them.”
  - type: text
    content: 'when he said, “Look! Here comes the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek can also be translated “The Lord has come” (proleptic [or futuristic] aorist).
  - type: text
    content: 'in his myriads of holy ones. '
  - type: note
    content: Or “in holy myriads of himself.” He comes through a people who are like him. Most translations read, “The Lord is coming with ten thousands” but the Greek word en is translated “in” over 1,870 times in the New Testament. En means “in.”
  '15':
  - type: text
    content: He comes
  - type: text
    content: ' to execute judgment against them all and to convict each one of them for their ungodly deeds and for all the terrible words that ungodly sinners have spoken against him.”'
  - type: note
    content: See 1 Enoch 1:9.
  '16':
  - type: text
    content: 'These people are always complaining and never satisfied—finding fault with everyone. They follow their own evil desires and their mouths speak scandalous things. They '
  - type: text
    content: enjoy
  - type: text
    content: ' using seductive flattery to manipulate others.'
  - type: note
    content: Or “admiring faces [of the rich] for their own [financial] gain.”
  - type: heading
    content: A Call to Remain Faithful
  '17':
  - type: text
    content: 'But you, '
  - type: text
    content: my
  - type: text
    content: ' delightfully loved friends, remember the prophecies of the apostles of our Lord Jesus, the Anointed One. '
  '18':
  - type: text
    content: 'They taught you, “In the last days '
  - type: note
    content: The last days began at Pentecost and have continued for more than two thousand years. We have been living in the last days since the Holy Spirit was poured out. See Acts 2:17; Heb. 1:2.
  - type: text
    content: 'there will always be mockers, motivated by their own ungodly desires.” '
  - type: note
    content: See Acts 20:29; 1 Tim. 4:1; 2 Tim. 3:1–5; 2 Peter 3:2–3; 2 John 7.
  '19':
  - type: text
    content: 'These people cause divisions and are followers of their own natural instincts, devoid of '
  - type: text
    content: the life of
  - type: text
    content: ' the Spirit.'
  '2':
  - type: text
    content: 'May God’s mercy, peace, and love '
  - type: note
    content: Judah adds the word love to the typical greeting of mercy and peace.
  - type: text
    content: cascade over you!
  - type: note
    content: Or “be multiplied in you.”
  '20':
  - type: text
    content: 'But you, '
  - type: text
    content: my
  - type: text
    content: ' delightfully loved friends, constantly and progressively build yourselves up on the foundation of your most holy faith '
  - type: note
    content: Or “faithfulness.”
  - type: text
    content: 'by praying every moment in the Spirit. '
  - type: note
    content: Paul uses this phrase “praying . . . in the Spirit” to refer to praying in tongues. See Rom. 8:26; 1 Cor. 14:15; Eph. 6:18. It can also mean “pray as led by the Spirit,” “pray in the Spirit’s realm,” or “pray by means of/power of the Spirit.”
  '21':
  - type: text
    content: Fasten your hearts to the love of God and receive the mercy of our Lord Jesus Christ, who gives us eternal life.
  - type: note
    content: Or “By constantly and progressively building each other up on the foundation of your most holy faith, and by praying every moment in the Spirit’s power, you will keep yourselves in the love of God, awaiting the mercy of our Lord Jesus, who gives eternal life.”
  '22':
  - type: text
    content: 'Keep being compassionate to those who still have doubts, '
  - type: note
    content: Or “Show mercy to those who are still undecided.”
  '23':
  - type: text
    content: and snatch others out of the fire to save them. Be merciful over and over to them, but always couple your mercy with the fear of God. Be extremely careful to keep yourselves free from the pollutions of the flesh.
  - type: note
    content: 'Or “hating even the garment [‘snake skin’ or ‘coating’] of the pollution of the flesh [the natural realm].” In other words, we do all we can to bring others to Christ, but not at the expense of becoming like them in ignoring sin. Judah, in closing, gives us seven commands: (1) Keep building up your inner life on the foundation of faith. (2) Pray in the Holy Spirit. (3) Fasten your life to the love of God. (4) Receive more mercy from our Lord Jesus Christ. (5) Have compassion on the wavering. (6) Share the gospel with those who are lost. (7) Hate any compromise that will stain our lives.'
  '24':
  - type: text
    content: 'Now, to the one with enough power to prevent you from stumbling '
  - type: text
    content: into sin
  - type: text
    content: ' '
  - type: note
    content: The Greek word aptaistos, a hapax legomenon, is translated in classical Greek as “to keep from harm.”
  - type: text
    content: 'and bring you faultless before his glorious presence to stand before him with ecstatic delight, '
  '25':
  - type: text
    content: 'to the only God our Savior, through our Lord Jesus Christ, be '
  - type: text
    content: endless
  - type: text
    content: ' glory and majesty, great power and authority—from before he created time, now, and throughout all the ages of eternity. Amen!'
  - type: note
    content: The Aramaic adds “The end of the letter of the apostle Judah, the brother of Jacob and Joseph.”
  '3':
  - type: text
    content: 'Dearly loved friend, I was fully intending to write to you about our '
  - type: text
    content: amazing
  - type: text
    content: ' salvation we all participate in, but felt the need instead to challenge you to vigorously defend and contend for '
  - type: note
    content: Or “keep adding to the contest” or “repeatedly participate fully in the race course.”
  - type: text
    content: 'the beliefs that we cherish. '
  - type: note
    content: Although the Greek here is “the faith” or “on behalf of the faith,” it is clear that Judah is not speaking of faith as simply believing in God. The Christian faith encompasses the body of truth we receive from the inspired Word of God. It is possible that Judah wrote his letter after the death of Peter and was referring to 1 and 2 Peter, a few of Paul’s early letters, or even Mark’s Gospel.
  - type: text
    content: 'For God, '
  - type: text
    content: through the apostles
  - type: text
    content: ', has once for all entrusted these truths to his holy believers.'
  - type: heading
    content: Warning against False Teachers
  '4':
  - type: text
    content: 'There have been some who have sneaked in among you unnoticed. '
  - type: note
    content: See Acts 20:29–30; 2 Peter 2:1.
  - type: text
    content: 'They are depraved people whose judgment was prophesied in Scripture '
  - type: note
    content: Or “written.” It is possible that Judah is referring not only to Old Testament prophecies but also to the New Testament book of 2 Peter.
  - type: text
    content: 'a long time ago. They have perverted '
  - type: text
    content: the message of
  - type: text
    content: ' God’s grace into a license to commit immorality '
  - type: note
    content: Or “debauchery.” See Rom. 6:1; Titus 2:11–14. The gospel of grace is beautiful to our ears. God’s grace empowers and equips us to live an ascended life so that we are not distracted or detoured by our former life of sin.
  - type: text
    content: 'and turn against '
  - type: note
    content: Or “deny.”
  - type: text
    content: 'our only absolute Master, '
  - type: note
    content: Or “Sovereign” (God). They deny the authority, glory, and sovereignty of our Master (God) and our Lord Jesus Christ.
  - type: text
    content: our Lord Jesus Christ.
  '5':
  - type: text
    content: 'I need to remind you, even though you are familiar with it all, that '
  - type: text
    content: the Lord
  - type: text
    content: ' Jesus '
  - type: note
    content: Some reliable manuscripts have “the Lord,” while other very reliable early manuscripts have “Jesus.” This translation, for the sake of clarity, includes both Lord and Jesus. This is an incredible reference of the preincarnate Jesus, who powerfully delivered the Hebrew people before he was even born.
  - type: text
    content: saved his people out of Egypt but subsequently destroyed those who were guilty of unbelief.
  '6':
  - type: text
    content: 'In the same way, there were heavenly messengers '
  - type: text
    content: in rebellion
  - type: text
    content: ' who went outside their rightful domain of authority '
  - type: note
    content: Or “their own principality” or “their native state.”
  - type: text
    content: 'and abandoned their appointed realms. '
  - type: note
    content: See Gen. 6:1–4; 2 Peter 2:4–8. This episode is referring to angels who abandoned the heavenly realm to come to earth to have intercourse with women in order to corrupt the godly lineage of Seth. Cain had already gone into the darkness of sin, but the godly line of Seth would one day bring forth Noah, and from his seed (Shem) Jesus would eventually be born. The rebellious rank of angels mentioned here had sex with women who then gave birth to the Nephilim (mighty giants). Ancient references to this can be found in the writings of early Jewish writers, including Josephus and Philo of Alexandria, as well as early church fathers, such as Justin Martyr, Irenaeus, Clement of Alexandria, Ambrose of Milan, Athenagoras, Tertullian, Eusebius, Lactantius, Jerome, Augustine of Hippo, and Sulpicius Severus. All of them, along with the Septuagint, identified these sons of God as the offspring of angels. See also 1 Enoch 10. This sin was one of the significant causes for the flood.
  - type: text
    content: 'God bound them in everlasting chains and is keeping them in the dark abyss of the '
  - type: text
    content: netherworld
  - type: text
    content: ' until the judgment of the great day.'
  '7':
  - type: text
    content: 'In a similar way, the cities of Sodom and Gomorrah and nearby towns '
  - type: note
    content: This would include Admah and Zeboyim (Deut. 29:23).
  - type: text
    content: 'gave themselves to sexual immorality and the unnatural desire of different flesh. '
  - type: note
    content: Or “strange flesh.” This is homosexuality, but it includes any sexual deviation or immorality. In the pseudepigraphal book The Testament of Naphtali, 3.3.4–5 refers to sexual relations between the women of Sodom and these fallen angels, called “Watchers.” The Book of Jubilees makes mention of holy angels sent by God to punish the “Watchers.” Second Enoch describes the people of Sodom as committing abominations such as pedophilia, sorcery, magic enchantments, and the worship of many gods. First Enoch 6–10 indicates there were two hundred of these “Watchers” who came to earth, lusting after the women of Sodom who had offspring (Nephilim) from their sexual relations with them. Both humanity and angels violated the boundaries God had set in place.
  - type: text
    content: Now they all serve as examples of those who experience the punishment of eternal fire.
  - type: note
    content: Judah gives us three examples from ancient history in vv. 5–7, pointing to those who experienced wonderful privileges from God but terribly abused God’s grace and so were punished. Sodom and Gomorrah was described as fertile, fruitful, “like the garden of the Lord” (Gen. 13:10). Each example cited (Israel’s exodus, angels that sinned, and the cities of sexual perversion) serves as an example and a warning that God judges sin. There is an eternal punishment of fire awaiting all who refuse to hide themselves in the love and grace of God, which is expressed through Christ toward us.
  - type: heading
    content: The Fate of Apostates
  '8':
  - type: text
    content: 'In the same way, these sensual “dreamers” corrupt and pollute the natural realm, while on the other hand they reject the '
  - type: text
    content: spiritual
  - type: text
    content: ' realms of governmental power and repeatedly scoff at heavenly glories. '
  - type: note
    content: Or “blaspheming reputations”; that is, angelic beings.
  '9':
  - type: text
    content: 'Even the archangel Michael, '
  - type: note
    content: See Dan. 10:13, 21; 12:1; Rev. 12:7. Michael is one of the highest angelic messengers, who is seen as leading the angelic host in war against the devil and his angels.
  - type: text
    content: 'when he was disputing with the devil over the body of Moses, '
  - type: note
    content: Moses’ death is mentioned in Deut. 34:5–6.
  - type: text
    content: 'dared not insult or slander him, but simply said, “The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: rebuke you!”
  - type: note
    content: See 2 Peter 2:10–12. It is obvious here that Michael the archangel had a measure of respect for spiritual powers, even toward the devil. A possible translation of the Greek word epitimao is “to hold in high regard” or “to respect.” Most scholars believe that Judah is quoting from the book of The Assumption of Moses, as cited also by some church fathers (Clement of Alexandria and Origen).
