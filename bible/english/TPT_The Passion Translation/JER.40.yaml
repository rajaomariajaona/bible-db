document_id: JER.40,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Stays with Gedaliah
  - type: text
    content: 'The word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' that came to Jeremiah.'
  - type: note
    content: The first part of this verse is best viewed as an inscription and summary for the content of chs. 40–42, which cover the events after the fall of Jerusalem. The background of this chapter can be found in 2 Kings 25:22–26.
  - type: text
    content: 'I was bound with chains and led away along with all the other people from Jerusalem and Judah that the Babylonians were taking as prisoners to Babylon. When we got to Ramah, Nebuzaradan, the captain of the guard, '
  - type: text
    content: realized what had happened to me
  - type: text
    content: ' and released me. '
  '10':
  - type: text
    content: I will stay here at Mizpah and represent you to the Babylonians on their official visits. Meanwhile, you can harvest the wine, the summer crops, and olive oil. Go ahead and store up the harvest and settle in the towns you have taken over.”
  '11':
  - type: text
    content: 'Many people from Judah had fled to Moab, Ammon, Edom, or other countries. But when they learned that the Babylonian king had allowed the rest of the people in Judah to return and had named Gedaliah governor, '
  '12':
  - type: text
    content: they also returned to Judah from all the places where they had been scattered and reported to Gedaliah in Mizpah. The people harvested large amounts of wine and fruit.
  '13':
  - type: text
    content: 'One day Johanan son of Kareah and all the military leaders still in the field came to Mizpah to meet with Gedaliah. '
  '14':
  - type: text
    content: 'They said to him, “We came to warn you that Baalis '
  - type: note
    content: Baalis means “proud boasting.” The name Baalis has also been identified with Baʿal-yashaʿ, which means “Baal saves.”
  - type: text
    content: 'king of the Ammonites has sent Ishmael '
  - type: note
    content: Ishmael, one of the captains of the remaining forces in Judah (see v. 8), was possibly jealous of being passed over as governor and, for this reason, was more than willing to follow King Baalis’ wishes.
  - type: text
    content: 'son of Nethaniah to assassinate you.” But Gedaliah would not believe them. '
  '15':
  - type: text
    content: 'So Johanan went privately and approached Gedaliah, saying, “Please let me go and kill Ishmael son of Nethaniah, and no one will know '
  - type: text
    content: who did it
  - type: text
    content: '. Why should he assassinate you and scatter all the Israelites who have rallied around you? Why should the remnant of Judah perish?” '
  '16':
  - type: text
    content: But Gedaliah replied to Johanan, “This is an order; don’t do it! For what you say about Ishmael is not true.”
  '2':
  - type: text
    content: 'He took me aside and said to me, “Your God, '
  - type: text
    content: Yahweh
  - type: text
    content: ', prophesied disaster for your country, '
  '3':
  - type: text
    content: 'and now he has brought it to pass. He has done what he threatened to do because your people sinned against '
  - type: text
    content: Yahweh
  - type: text
    content: ' and would not listen to his voice. So all this has happened to you. '
  '4':
  - type: text
    content: Today I release you from your chains. If you would like to come with me to Babylon, then come. I will make sure you are cared for. If you do not want to come to Babylon with me, then stay here. See, you have the whole land before you, so go wherever you think it best.”
  '5':
  - type: text
    content: 'However, before I turned to leave, Nebuzaradan added, “Have you thought about staying with Gedaliah son of Ahikam, '
  - type: note
    content: 'It is believed that Gedaliah came from a prominent family of high Judean officials who were friendly toward Jeremiah (Ahikam is most likely the same person who had saved Jeremiah’s life earlier; see 26:24). Gedaliah means “Yah is great.” In 1935 during excavations in the city of Lachish, a clay seal was found in a layer of ashes left behind from Nebuchadnezzar’s fire. The seal had written upon it: “Belonging to Gedaliah, who is over the House.” Contemporary Judaism observes the Fast of Gedaliah (Hb. Tzom Gedalya) as a minor fast day to commemorate the end of Jewish autonomy in the land. The Fast of Gedaliah usually takes place on Tishri 3, just a day after the second day of Rosh Hashanah.'
  - type: text
    content: 'grandson of Shaphan, whom the king of Babylon has appointed governor over the towns of Judah? You could stay with him among the people or go anywhere else you think best.” With that, Nebuzaradan gave me a gift and ample provisions for my journey and let me go. '
  '6':
  - type: text
    content: 'I decided to stay with '
  - type: text
    content: my
  - type: text
    content: ' people in the land of Judah, so I went to live near Gedaliah in Mizpah.'
  - type: note
    content: Archaeologists identify Mizpah with modern Tell en-Nasbah, about seven miles (eleven kilometers) northwest of Jerusalem. See Judg. 20:1; 1 Sam. 7:5; 10:17.
  - type: heading
    content: A Plot to Assassinate Gedaliah, the Governor of Judah
  '7':
  - type: text
    content: 'There were still some Judean forces in the open country. Their captains heard that the king of Babylon had appointed Gedaliah son of Ahikam as governor of Judah and made him responsible for everyone, including the poor, who had not been deported to Babylon. '
  '8':
  - type: text
    content: 'Those who came to Gedaliah at Mizpah included Ishmael son of Nethaniah, Johanan and Jonathan the sons of Kareah, Seraiah son of Tanhumeth, the sons of Ephai the Netophathite, Jezaniah son of the Maacathite, they and their men. '
  '9':
  - type: text
    content: 'Gedaliah the son of Ahikam, grandson of Shaphan, reassured them and gave them his word that they need not be afraid to serve the Babylonians. “Stay in the land,” he said. “Serve the king of Babylon, and everything will be fine. '
