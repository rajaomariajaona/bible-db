      marker-yv: yv-n
    - type: text
      text: 'son of Nethaniah to assassinate you.” But Gedaliah would not believe them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Johanan went privately and approached Gedaliah, saying, “Please let me go and kill Ishmael son of Nethaniah, and no one will know '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who did it
    - type: text
      text: '. Why should he assassinate you and scatter all the Israelites who have rallied around you? Why should the remnant of Judah perish?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Gedaliah replied to Johanan, “This is an order; don’t do it! For what you say about Ishmael is not true.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took me aside and said to me, “Your God, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', prophesied disaster for your country, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and now he has brought it to pass. He has done what he threatened to do because your people sinned against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and would not listen to his voice. So all this has happened to you. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Today I release you from your chains. If you would like to come with me to Babylon, then come. I will make sure you are cared for. If you do not want to come to Babylon with me, then stay here. See, you have the whole land before you, so go wherever you think it best.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, before I turned to leave, Nebuzaradan added, “Have you thought about staying with Gedaliah son of Ahikam, '
