    - type: text
      text: 'I was bound with chains and led away along with all the other people from Jerusalem and Judah that the Babylonians were taking as prisoners to Babylon. When we got to Ramah, Nebuzaradan, the captain of the guard, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: realized what had happened to me
    - type: text
      text: ' and released me. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will stay here at Mizpah and represent you to the Babylonians on their official visits. Meanwhile, you can harvest the wine, the summer crops, and olive oil. Go ahead and store up the harvest and settle in the towns you have taken over.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many people from Judah had fled to Moab, Ammon, Edom, or other countries. But when they learned that the Babylonian king had allowed the rest of the people in Judah to return and had named Gedaliah governor, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: they also returned to Judah from all the places where they had been scattered and reported to Gedaliah in Mizpah. The people harvested large amounts of wine and fruit.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day Johanan son of Kareah and all the military leaders still in the field came to Mizpah to meet with Gedaliah. '
