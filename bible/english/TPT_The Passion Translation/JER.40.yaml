      text: A Plot to Assassinate Gedaliah, the Governor of Judah
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were still some Judean forces in the open country. Their captains heard that the king of Babylon had appointed Gedaliah son of Ahikam as governor of Judah and made him responsible for everyone, including the poor, who had not been deported to Babylon. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who came to Gedaliah at Mizpah included Ishmael son of Nethaniah, Johanan and Jonathan the sons of Kareah, Seraiah son of Tanhumeth, the sons of Ephai the Netophathite, Jezaniah son of the Maacathite, they and their men. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gedaliah the son of Ahikam, grandson of Shaphan, reassured them and gave them his word that they need not be afraid to serve the Babylonians. “Stay in the land,” he said. “Serve the king of Babylon, and everything will be fine. '
