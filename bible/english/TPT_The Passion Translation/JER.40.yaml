          text: 'is great.” In 1935 during excavations in the city of Lachish, a clay seal was found in a layer of ashes left behind from Nebuchadnezzar’s fire. The seal had written upon it: “Belonging to Gedaliah, who is over the House.” Contemporary Judaism observes the Fast of Gedaliah (Hb.'
