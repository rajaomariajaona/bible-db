      marker-yv: yv-n
    - type: text
      text: 'grandson of Shaphan, whom the king of Babylon has appointed governor over the towns of Judah? You could stay with him among the people or go anywhere else you think best.” With that, Nebuzaradan gave me a gift and ample provisions for my journey and let me go. '
