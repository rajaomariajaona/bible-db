document_id: PSA.121
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God Protects Us
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of the stairway
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: I look up to the mountains and hills, longing for God’s help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But then I realize that our true help and protection
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: is
  - type: text
    text: ' only from the Lord,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: our Creator who made the heavens and the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He will guard and guide me, never letting me stumble or fall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God is my keeper; he will never forget nor ignore me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He will never slumber nor sleep;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he is the Guardian-God for his people, Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' himself will watch over you;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he’s always at your side to shelter you safely in his presence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He’s protecting you from all danger both day and night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He will keep you from every form of evil or calamity
- type: usfm
  marker: q1
  children:
  - type: text
    text: as he continuously watches over you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You will be guarded by God himself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be safe when you leave your home,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and safely you will return.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will protect you now,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he’ll protect you forevermore!
