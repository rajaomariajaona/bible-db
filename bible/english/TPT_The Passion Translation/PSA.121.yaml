document_id: PSA.121,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Protects Us
  - type: text
    content: A song of the stairway
  - type: text
    content: I look up to the mountains and hills, longing for God’s help.
  - type: text
    content: But then I realize that our true help and protection
  - type: text
    content: is
  - type: text
    content: ' only from the Lord,'
  - type: text
    content: our Creator who made the heavens and the earth.
  '3':
  - type: text
    content: He will guard and guide me, never letting me stumble or fall.
  - type: text
    content: God is my keeper; he will never forget nor ignore me.
  '4':
  - type: text
    content: He will never slumber nor sleep;
  - type: text
    content: he is the Guardian-God for his people, Israel.
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' himself will watch over you;'
  - type: text
    content: he’s always at your side to shelter you safely in his presence.
  '6':
  - type: text
    content: He’s protecting you from all danger both day and night.
  '7':
  - type: text
    content: He will keep you from every form of evil or calamity
  - type: text
    content: as he continuously watches over you.
  '8':
  - type: text
    content: You will be guarded by God himself.
  - type: text
    content: You will be safe when you leave your home,
  - type: text
    content: and safely you will return.
  - type: text
    content: He will protect you now,
  - type: text
    content: and he’ll protect you forevermore!
