document_id: PRO.30,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Mysterious Sayings of Agur
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'These are the collected sayings of the prophet Agur, Jakeh’s son '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This section of Proverbs is attributed to Agur, who gave these oracles to his protégés Ithiel and Ukal. Agur means “to gather a harvest.” He was the son of Jakeh, which means “blameless” or “obedient.” Jakeh could be another name for David, Solomon’s father. Many Jewish expositors believe that Agur was a pseudonym for Solomon. Nothing more is mentioned about Agur in the Bible than what we have here, which is typical for other prophets mentioned in the Scriptures. Some believe he could be the “master of the collection of sayings” referred to in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Eccl. 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the amazing revelation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “mighty prophecy.”
      marker-yv: yv-n
    - type: text
      text: he imparted to Ithiel and Ukal.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Ithiel can mean “God is with me” or “God has arrived.” This was fulfilled by Christ, for his birth was the advent, the arrival of God to the earth in human form. Ukal means “I am able” or “I am strong and mighty.” When placed together, the meaning of these Hebrew names could read “Gather a harvest of sons who are blameless and obedient. They will have God with them, and they will be strong and mighty.” This chapter contains some of the most mystical and mysterious sayings found in Proverbs, with hints of revelation from the book of Job.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Never defame a servant before his master,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you will be the guilty one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a curse will come upon you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: There is a generation rising that curses their fathers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and speaks evil of their mothers.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: There is a generation rising that considers themselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to be pure in their own eyes,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 21:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'yet they are morally filthy, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: excrement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: unwashed, and unclean.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: There is a generation rising that is so filled with pride,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they think they are superior and look down on others.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: There is a generation rising that uses their words like swords
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to cut and slash those who are different.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They would devour the poor, the needy, and the afflicted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from off the face of the earth!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'There are three words to describe the greedy:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Give me more!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are some things that are never satisfied.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Forever craving more, they’re unable to say, “That’s enough!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Here are four:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: the grave, yawning for another victim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the barren womb, ever wanting a child,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: thirsty soil, ever longing for rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a raging fire, devouring its fuel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’re all insatiable.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The eye that mocks his father and dishonors his elderly mother
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deserves to be plucked out by the ravens of the valley
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and fed to the young vultures!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a figure of speech for demonic powers that will remove their vision. Ravens and vultures are unclean birds associated with demonic powers in Hebrew poetry.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Four Mysteries
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: There are four marvelous mysteries
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that are too amazing to unravel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew uses a poetic style of saying there are three mysteries, then saying there are four in order to emphasize their great importance. There could be within this poetic device a pointing to the fourth as the key, or the most important.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who could fully explain them?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Notice that each of these four examples have to do with movement and mystery.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The way an eagle flies in the sky,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a picture of the overcoming life that soars above its problems and limitations with the wings of an eagle. It could also be a hint of the prophetic revelation that comes to God’s servants mysteriously and supernaturally. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 40:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 2:9–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the way a snake glides on a boulder,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The snake becomes a picture of our sin that was placed on the Rock, Jesus Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 21:6–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 5:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the path of a ship as it passes through the sea,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a picture of the way our lives, like a ship, sail on the high seas of mystery until we reach our destiny. Our lives contain mysteries, such as where God decided that we were to be born, how we were raised, and the companions who join us until we reach our desired haven. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 107:23–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the way a bridegroom falls in love with his bride.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “bride” can also mean “virgin,” pointing to a wedding, thus implying the use of “bridegroom” instead of “man.” (Consider Ruth and Boaz.) More important, this is a beautiful metaphor for the mystery of the love of our heavenly Bridegroom (Jesus), who romances his bride and sweeps us off our feet. Love is a mystery. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: God, I’m so weary and worn out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I feel more like a beast than a man.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: I was made in your image
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text, which is extraordinarily difficult to translate with certainty.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I lack understanding.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Here is the deceptive way of the adulterous woman:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The adulterous woman of Proverbs is a metaphor for the corrupt religious system. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she takes what she wants and then says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I’ve done nothing wrong.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Four Intolerable Things
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: There are four intolerable events
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See the first footnote for v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . These four events each depict a promotion undeserved, a displacing of one who is virtuous with one who is corrupt. Each promotion indicates that they will carry their corruption with them. The unfaithful servant will likely become a tyrant. The fool who becomes wealthy will squander his wealth. The unfaithful woman (or “hated woman”) will continue her immorality even after she’s married. The girlfriend who replaced the faithful wife will likely find another man one day.
      marker-yv: yv-n
    - type: text
      text: 'are simply unbearable to observe:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: when an unfaithful servant becomes a ruler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when a scoundrel comes into great wealth,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: when an unfaithful woman marries a good man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and when a mistress replaces a faithful wife.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Four Creatures Small and Wise
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The earth has four creatures that are very small but very wise:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They are the epitome of wisdom.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The feeble ant has little strength,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet look how it diligently gathers its food in the summer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to last throughout the winter.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To prepare for the future is a mark of true wisdom.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The delicate rock-badger isn’t all that strong,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet look how it makes a secure home, nestled in the rocks.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This becomes a picture of the believer. Though feeling weakness at times, we can make our home in the high place, inside the cleft of the Rock. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 14:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
