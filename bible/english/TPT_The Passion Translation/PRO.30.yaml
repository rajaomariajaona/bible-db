document_id: PRO.30,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Mysterious Sayings of Agur
  - type: text
    content: 'These are the collected sayings of the prophet Agur, Jakeh’s son '
  - type: note
    content: This section of Proverbs is attributed to Agur, who gave these oracles to his protégés Ithiel and Ukal. Agur means “to gather a harvest.” He was the son of Jakeh, which means “blameless” or “obedient.” Jakeh could be another name for David, Solomon’s father. Many Jewish expositors believe that Agur was a pseudonym for Solomon. Nothing more is mentioned about Agur in the Bible than what we have here, which is typical for other prophets mentioned in the Scriptures. Some believe he could be the “master of the collection of sayings” referred to in Eccl. 12:11.
  - type: text
    content: —
  - type: text
    content: 'the amazing revelation '
  - type: note
    content: Or “mighty prophecy.”
  - type: text
    content: he imparted to Ithiel and Ukal.
  - type: note
    content: The name Ithiel can mean “God is with me” or “God has arrived.” This was fulfilled by Christ, for his birth was the advent, the arrival of God to the earth in human form. Ukal means “I am able” or “I am strong and mighty.” When placed together, the meaning of these Hebrew names could read “Gather a harvest of sons who are blameless and obedient. They will have God with them, and they will be strong and mighty.” This chapter contains some of the most mystical and mysterious sayings found in Proverbs, with hints of revelation from the book of Job.
  '10':
  - type: text
    content: Never defame a servant before his master,
  - type: text
    content: for you will be the guilty one
  - type: text
    content: and a curse will come upon you.
  '11':
  - type: text
    content: There is a generation rising that curses their fathers
  - type: text
    content: and speaks evil of their mothers.
  '12':
  - type: text
    content: There is a generation rising that considers themselves
  - type: text
    content: to be pure in their own eyes,
  - type: note
    content: See Judg. 21:25.
  - type: text
    content: 'yet they are morally filthy, '
  - type: note
    content: The Hebrew uses the word excrement.
  - type: text
    content: unwashed, and unclean.
  '13':
  - type: text
    content: There is a generation rising that is so filled with pride,
  - type: text
    content: they think they are superior and look down on others.
  '14':
  - type: text
    content: There is a generation rising that uses their words like swords
  - type: text
    content: to cut and slash those who are different.
  - type: text
    content: They would devour the poor, the needy, and the afflicted
  - type: text
    content: from off the face of the earth!
  '15':
  - type: text
    content: 'There are three words to describe the greedy:'
  - type: text
    content: “Give me more!”
  - type: text
    content: There are some things that are never satisfied.
  - type: text
    content: Forever craving more, they’re unable to say, “That’s enough!”
  - type: text
    content: 'Here are four:'
  '16':
  - type: text
    content: the grave, yawning for another victim,
  - type: text
    content: the barren womb, ever wanting a child,
  - type: text
    content: thirsty soil, ever longing for rain,
  - type: text
    content: and a raging fire, devouring its fuel.
  - type: text
    content: They’re all insatiable.
  '17':
  - type: text
    content: The eye that mocks his father and dishonors his elderly mother
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: deserves to be plucked out by the ravens of the valley
  - type: text
    content: and fed to the young vultures!
  - type: note
    content: This is a figure of speech for demonic powers that will remove their vision. Ravens and vultures are unclean birds associated with demonic powers in Hebrew poetry.
  - type: heading
    content: Four Mysteries
  '18':
  - type: text
    content: There are four marvelous mysteries
  - type: text
    content: 'that are too amazing to unravel '
  - type: note
    content: The Hebrew uses a poetic style of saying there are three mysteries, then saying there are four in order to emphasize their great importance. There could be within this poetic device a pointing to the fourth as the key, or the most important.
  - type: text
    content: —
  - type: text
    content: who could fully explain them?
  - type: note
    content: Notice that each of these four examples have to do with movement and mystery.
  '19':
  - type: text
    content: The way an eagle flies in the sky,
  - type: note
    content: This is a picture of the overcoming life that soars above its problems and limitations with the wings of an eagle. It could also be a hint of the prophetic revelation that comes to God’s servants mysteriously and supernaturally. See Isa. 40:31 and 1 Cor. 2:9–13.
  - type: text
    content: the way a snake glides on a boulder,
  - type: note
    content: The snake becomes a picture of our sin that was placed on the Rock, Jesus Christ. See Num. 21:6–9; John 3:14–15; 2 Cor. 5:21.
  - type: text
    content: the path of a ship as it passes through the sea,
  - type: note
    content: This is a picture of the way our lives, like a ship, sail on the high seas of mystery until we reach our destiny. Our lives contain mysteries, such as where God decided that we were to be born, how we were raised, and the companions who join us until we reach our desired haven. See Ps. 107:23–30.
  - type: text
    content: and the way a bridegroom falls in love with his bride.
  - type: note
    content: The Hebrew word translated “bride” can also mean “virgin,” pointing to a wedding, thus implying the use of “bridegroom” instead of “man.” (Consider Ruth and Boaz.) More important, this is a beautiful metaphor for the mystery of the love of our heavenly Bridegroom (Jesus), who romances his bride and sweeps us off our feet. Love is a mystery. See also 2 Cor. 11:2 and Eph. 5:32.
  '2':
  - type: text
    content: God, I’m so weary and worn out,
  - type: text
    content: I feel more like a beast than a man.
  - type: text
    content: I was made in your image
  - type: text
    content: ','
  - type: note
    content: Implied in the text, which is extraordinarily difficult to translate with certainty.
  - type: text
    content: but I lack understanding.
  '20':
  - type: text
    content: 'Here is the deceptive way of the adulterous woman:'
  - type: note
    content: The adulterous woman of Proverbs is a metaphor for the corrupt religious system. See Rev. 17–18.
  - type: text
    content: she takes what she wants and then says,
  - type: text
    content: “I’ve done nothing wrong.”
  - type: heading
    content: Four Intolerable Things
  '21':
  - type: text
    content: There are four intolerable events
  - type: text
    content: 'that '
  - type: note
    content: See the first footnote for v. 18. These four events each depict a promotion undeserved, a displacing of one who is virtuous with one who is corrupt. Each promotion indicates that they will carry their corruption with them. The unfaithful servant will likely become a tyrant. The fool who becomes wealthy will squander his wealth. The unfaithful woman (or “hated woman”) will continue her immorality even after she’s married. The girlfriend who replaced the faithful wife will likely find another man one day.
  - type: text
    content: 'are simply unbearable to observe:'
  '22':
  - type: text
    content: when an unfaithful servant becomes a ruler,
  - type: text
    content: when a scoundrel comes into great wealth,
  '23':
  - type: text
    content: when an unfaithful woman marries a good man,
  - type: text
    content: and when a mistress replaces a faithful wife.
  - type: heading
    content: Four Creatures Small and Wise
  '24':
  - type: text
    content: 'The earth has four creatures that are very small but very wise:'
  - type: note
    content: Or “They are the epitome of wisdom.”
  '25':
  - type: text
    content: The feeble ant has little strength,
  - type: text
    content: yet look how it diligently gathers its food in the summer
  - type: text
    content: to last throughout the winter.
  - type: note
    content: To prepare for the future is a mark of true wisdom.
  '26':
  - type: text
    content: The delicate rock-badger isn’t all that strong,
  - type: text
    content: yet look how it makes a secure home, nestled in the rocks.
  - type: note
    content: This becomes a picture of the believer. Though feeling weakness at times, we can make our home in the high place, inside the cleft of the Rock. See John 14:1–3.
  '27':
  - type: text
    content: The locusts have no king to lead them,
  - type: text
    content: yet they cooperate as they move forward by bands.
  - type: note
    content: The locust army points us to Joel 1–2. There is an awakening army coming to devour the works of the enemy. Their King, though invisible, guides them from on high as one army.
  '28':
  - type: text
    content: 'And the small lizard '
  - type: note
    content: Or “spider.”
  - type: text
    content: is easy to catch
  - type: text
    content: as it clings to the walls with its hands,
  - type: text
    content: yet it can be found inside a king’s palace.
  - type: note
    content: Though we may see ourselves as insignificant (like the small lizard), God can place us in significant places where we can be used for him.
  - type: heading
    content: Four Stately Things
  '29':
  - type: text
    content: There are four stately monarchs
  - type: note
    content: See the first footnote on v. 18.
  - type: text
    content: 'who are impressive to watch as they go forth:'
  '3':
  - type: text
    content: I’ve yet to learn the wisdom
  - type: text
    content: that comes from the full and intimate knowledge of you,
  - type: text
    content: the Holy One.
  - type: heading
    content: Six Questions
  '30':
  - type: text
    content: the lion, the king of the jungle, who is afraid of no one,
  '31':
  - type: text
    content: the rooster strutting boldly among the hens,
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: the male goat out in front leading the herd,
  - type: text
    content: and a king leading his regal procession.
  - type: note
    content: Or “a king surrounded by his band of soldiers.” The Hebrew text is abstruse.
  '32':
  - type: text
    content: If you’ve acted foolishly by drawing attention to yourself,
  - type: text
    content: or if you’ve thought about saying something stupid,
  - type: text
    content: you’d better shut your mouth.
  '33':
  - type: text
    content: For such stupidity may give you a bloody nose!
  - type: text
    content: Stirring up an argument only leads to an angry confrontation.
  - type: note
    content: Or “Churning milk makes butter, and punching the nose brings blood, so stirring up anger produces quarrels.” The Hebrew contains a word play with the word anger, which is almost identical to the word for “nose.”
  '4':
  - type: text
    content: Who is it that travels back and forth
  - type: text
    content: from the heavenly realm to the earth?
  - type: note
    content: Jesus solves this riddle in John 3:13. Only Jesus Christ is the master of heavenly knowledge and wisdom. See also Eph. 4:7–10.
  - type: text
    content: 'Who controls the wind '
  - type: note
    content: The Hebrew word ruach (wind) is also the term used for the Holy Spirit.
  - type: text
    content: as it blows and holds it in his fists?
  - type: text
    content: Who tucks the rain into the cloak of his clouds?
  - type: text
    content: Who stretches out the skyline from one vista to the other?
  - type: text
    content: What is his name?
  - type: text
    content: And what is the name of his Son?
  - type: text
    content: Who can tell me?
  - type: heading
    content: A Pure Heart Is Filled with God’s Word
  '5':
  - type: text
    content: Every promise from the faithful God
  - type: text
    content: is pure and proves to be true.
  - type: text
    content: He is a wraparound shield of protection for all his lovers
  - type: text
    content: who run to hide in him.
  '6':
  - type: text
    content: Never add to his words,
  - type: text
    content: or he will have to rebuke you and prove that you’re a liar.
  '7':
  - type: text
    content: 'God, there are two things I’m asking you for before I die, only two:'
  '8':
  - type: text
    content: Empty out of my heart everything that is false—
  - type: text
    content: every lie, and every crooked thing.
  - type: text
    content: And give me neither undue poverty nor undue wealth—
  - type: text
    content: but rather, feed my soul with the measure of prosperity
  - type: text
    content: that pleases you.
  '9':
  - type: text
    content: May my satisfaction be found in you.
  - type: text
    content: Don’t let me be so rich that I don’t need you
  - type: text
    content: or so poor that I have to resort to dishonesty
  - type: text
    content: just to make ends meet.
  - type: text
    content: Then my life will never detract from bringing glory to your name.
