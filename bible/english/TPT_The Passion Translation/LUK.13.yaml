document_id: LUK.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Need for True Repentance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Some of those in the crowd informed Jesus that Pilate had slaughtered some Galilean Jews '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is likely that Pilate viewed these Jews as rebellious to his rule. This was indeed an atrocious act by Pilate.
    marker-yv: yv-n
  - type: text
    text: while they were offering sacrifices at the temple, mixing their blood with the sacrifices they were offering.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jesus turned and asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you believe that the slaughtered Galileans were the worst sinners of all the Galileans?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No, they weren’t! So listen to me, unless you all repent,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek term for repentance means “to change your mind and amend your ways.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you will perish as they did.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What about the eighteen who perished when the tower of Siloam
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Siloam was the name of a pool or reservoir for the city of Jerusalem near the junction of the south and east walls of the city.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: fell upon them? Do you really think that they were more guilty than all of the others in Jerusalem?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: No, they weren’t, and unless you repent, you too will all eternally perish, just as they did.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of the Barren Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Jesus told them this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There was a man who planted a fig tree in his orchard. But every time he came to gather fruit from his tree he found none, for it was barren.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So he said to his gardener, ‘For the last three years I’ve come to gather figs from my tree but it remains fruitless. What a waste! Go ahead and cut it down!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But the gardener protested, ‘Sir, we should leave it one more year. Let me fertilize and cultivate it, then let’s see if it will produce fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If it doesn’t bear figs by next year, we’ll cut it down.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This parable was an obvious picture of the nation of Israel. The owner was the Father and the gardener was Jesus, who had come to them and for three years had longed to have true spiritual fruit from his spiritual vine (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 5:1–7
      metadata:
        usfm: ISA.5.1+ISA.5.2+ISA.5.3+ISA.5.4+ISA.5.5+ISA.5.6+ISA.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The warning is that Israel would be cut down if the people did not repent and prove it by a changed life. The purpose of the parable was to warn people that they were in their last year of God’s grace toward them.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals on the Sabbath Day
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'One Sabbath day, while Jesus was teaching in the synagogue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'he encountered a seriously handicapped woman. She was crippled and had been doubled over for eighteen years. Her condition was caused by a demonic spirit of bondage '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “spirit of weakness.”
    marker-yv: yv-n
  - type: text
    text: that had left her unable to stand up straight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: 'When Jesus saw her condition, he called her to him and gently laid his hands on her. Then he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Dear woman, you are free. I release you forever from this crippling spirit.”
  - type: text
    text: ' Instantly she stood straight and tall and overflowed with glorious praise to God!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The Jewish leader who was in charge of the synagogue was infuriated over Jesus healing on the Sabbath day. “Six days you are to work,” he shouted angrily to the crowd. “On those days you should come here for healing, but not on the seventh day!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The Lord replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You hypocrites! Don’t you care for your animals on the Sabbath, untying your ox or donkey from the stall and leading it away to water?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you do this for your animals, what’s wrong with allowing this beloved daughter of Abraham,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Jews spoke frequently about the sons of Abraham or an individual being a son of Abraham, but Jesus was the first to use this phrase “daughter of Abraham,” giving women equal value.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: who has been bound by Satan for eighteen long years, to be untied and set free on a Sabbath day?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: When they heard this, his critics were completely humiliated. But the crowds shouted with joy over the glorious things Jesus was doing among them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parables of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jesus taught them this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can I describe God’s kingdom?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: God’s kingdom is like the smallest seed that one might plant in a garden. When it grows, it becomes a huge tree, with so many spreading branches that various birds make nests there.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 17:23
      metadata:
        usfm: EZK.17.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The obvious meaning of this parable is that God’s kingdom will begin small but it will expand, grow, and mature. People from every nation will come and make a “nest” in the kingdom of God.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jesus taught them another parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can I describe God’s kingdom?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: God’s kingdom is like something as small as yeast that a woman kneads into a large amount of dough. It works unseen until it permeates
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This parable teaches that something small can impact and penetrate something great. It highlights the pervading influence of virtue and truth. A transformation takes place when the hidden yet pervasive kingdom impacts every part of culture and society around us.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the entire batch and the loaf rises high.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Way of the Kingdom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus ministered from village to village, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus now visits the places where his disciples had already been. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 10:1–11
      metadata:
        usfm: LUK.10.1+LUK.10.2+LUK.10.3+LUK.10.4+LUK.10.5+LUK.10.6+LUK.10.7+LUK.10.8+LUK.10.9+LUK.10.10+LUK.10.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'making his way to Jerusalem and teaching the people as he went. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A bystander asked him, “Lord, will only a few have eternal life?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said to the crowd, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There is a great cost
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here is actually “agonize.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for anyone to enter through the narrow doorway into God’s kingdom. I tell you, many will want to enter but won’t be able to.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Once the head of the house has shut and locked the door, it will be too late. Even if you stand outside knocking, begging to enter, and saying, ‘Lord, Lord, open the door for us,’ he will say to you, ‘I don’t know who you are.
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: You are not a part of my family
  - type: usfm
    marker: wj
    children:
    - type: text
      text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then you will reply, ‘But Lord, we dined with you and walked with you as you taught us.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And he will reply, ‘Don’t you understand? I don’t know who you are, for you are not a part of my family. I will not let you in. Now, go away from me! For you are all disloyal to me and do evil.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is quoted from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 6:8
      metadata:
        usfm: PSA.6.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Though they were acquaintances, they had not responded to his message with repentance. The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: disloyal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is taken from the Aramaic. The question to ask is not simply, “Will the saved be few?” (v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '23'
      metadata:
        usfm: LUK.13.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) but rather, “Will it be you?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You will experience great weeping and great anguish when you see Abraham, Isaac, and Jacob, along with all the prophets of Israel, enjoying God’s kingdom while you yourselves are barred from entering.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will see people streaming from the four corners of the earth, accepting the invitation to feast in God’s kingdom realm,
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: while you are outside looking in.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And take note of this: Some are despised and viewed as the least important now, but one day the master will place them at the head of the line. And some whom you view as ‘elite’ today will become the least important then.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Sorrow for Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Just then some Jewish religious leaders came to Jesus to urge him to flee from that place because Herod was out to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go and tell that deceiver
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fox.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: that I will continue to cast out demons and heal the sick today and tomorrow, and on the third day I will bring my work to perfection.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For everyone knows I am safe until I come to Jerusalem, for that is where all the prophets have been killed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: O City of Jerusalem, you are the city who murders your prophets! You are the city who pelts to death with stones the very messengers
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “apostles.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: sent to deliver you! So many times I have longed to gather your wayward children together around me, as a hen gathers her chicks under her wings—but you were too stubborn to let me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now it is too late, since your house will be left in ruins.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 12:7
      metadata:
        usfm: JER.12.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will not see me again until you are able to say, ‘We welcome the one who comes to us sent in the name of the Lord.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
