  - type: heading
    content: Shaped by Love
  '26':
  - type: text
    content: 'Then God said, “Let us '
  - type: note
    content: The plural form of the verb indicates there were more beings than Father God in the activities of creation. When taken as a whole, the Bible also points to the Holy Spirit and God the Son as participators in the glory of creation. See John 1:1–3; Heb. 1:1–3.
  - type: text
    content: 'make a man and a woman '
  - type: note
    content: 'That is, humanity. The Hebrew word is simply ’adam, which can be translated “man,” but without a definite article it is used here as a collective term for man and woman. The definite article the does not occur before the word man until after God made woman, and together, they are ’adam. According to the Talmud, the three Hebrew letters of Adam’s name represent the initials of three men: Adam, David, and Messiah. The Hebrew word ’adam means “to show [blood] red,” and adamu means “to make.” The statement to “make [adamu] Adam [ruddy] from [red] soil [adamah]” is full of Hebrew puns that are lost in translation.'
  - type: text
    content: 'in our image '
  - type: note
    content: Or “as our image.” “Image” can also be translated “representation” or “resemblance.” God created someone like himself to reflect who he is into all his creation. He created trees after their kind, birds after their kind, fish after their kind, and animals after their kind, but now he creates a God-kind of being. Christ is the image of God; man and woman will resemble him and bring his image into the created order (see Rom. 8:29; 1 Cor. 11:7; 2 Cor. 3:18; 4:4; Col. 1:15; 3:10; Heb. 1:3). The first man, Adam, was a type or figure of the Last Adam, Christ. See Rom. 5:14; 1 Cor. 15:40–58.
  - type: text
    content: 'to be like us. '
  - type: note
    content: Or “according to our likeness,” or “to be like us [comparable to us].” God is neither male nor female (see John 4:23–24), but he has both male and female dimensions to his nature. What is this image given to each of us? It includes personality, the capacity for worship, the ability to make moral decisions (our conscience), and the ability to reflect God. Created as his image-bearers, all human beings bear the expression or image of God. As “photographs” of God, our characteristics are copies of his. Because he desired to give himself for you and to you, he took his own nature and likeness and fashioned a creature just like him—one he could love with unlimited passion.
  - type: text
    content: 'Let them reign over the fish of the sea, the birds of the air, the livestock, over the creatures that creep along the ground, '
  - type: note
    content: Man was meant to rule over all the things that creep along the ground, including the serpent and scorpion, which represent the powers of darkness (see Luke 10:18–20; James 3:7–8).
  - type: text
    content: and over the wild animals.”
