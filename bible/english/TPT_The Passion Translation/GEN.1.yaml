  '28':
  - type: text
    content: 'And God blessed them '
  - type: text
    content: in his love
  - type: text
    content: ', '
  - type: note
    content: God’s blessing upon the human family implies love. God blesses both men and women, empowering them to live on this planet, infusing them with power and favor to succeed in life.
  - type: text
    content: 'saying, “Reproduce and be fruitful! Populate the earth and subdue it! '
  - type: note
    content: The word subdue means “to take dominion” or “to control.” This would imply harnessing natural resources in an appropriate fashion, caring for the earth, cultivating and harvesting its fields, mining its resources, and releasing its potential to benefit God’s highest creation, humankind. See Ps. 8:6–8.
  - type: text
    content: Reign over the fish of the sea, the birds of the air, and every creature that lives on earth.”
  - type: note
    content: Man and woman were both given the command to care for the earth and subdue all things. Man and woman are blessed by their Creator with authority to rule with him as co-regents. God’s image is reflected in both men and women, and so is rulership.
  '29':
  - type: text
    content: 'And God said, “I give you every seed-bearing plant growing throughout the earth, vegetables, and every fruit-bearing tree with its seed within itself. They will be your food. '
  - type: note
    content: After the fall of Adam and Eve, meat was likely included in their diet. See Gen. 9:3; 1 Tim. 4:4–5.
  '3':
  - type: text
    content: 'And then God announced, '
  - type: note
    content: This is the Hebrew word ’amar, which is most often translated “said,” but it can also mean “to think,” “to imagine,” or “to speak inside your heart.” God imagined light and there was light. God spoke and shattered the cosmic silence to give birth to creation. God spoke ten times in the creation account—the Ten Commandments of creation. See Ps. 33:9; John 1:1–3. God’s thoughts had already imagined and shaped the largest galaxy and the smallest atom before he created them. With exquisite skill and creativity, God shaped all things by his word and spoke them into being with intricate detail and skill (see Heb. 11:3). A dimension separate from the being of God was birthed. No detail was too small for God as he prepared to unveil his masterpiece of wisdom, his dream come true. God spoke order and goodness into his creation.
  - type: text
    content: “Let there be light,” and light burst forth!
  - type: note
    content: 'Or “and there was light.” God created light but did not create the sun until the fourth day. God himself filled the universe with the light of his presence and glory. The Hebrew verbs used with the phrases “Let there be” and “and there was” are both related to the holy name Yahweh: yehi (“let there be”) and wayhi (“and there was”). As he released this word of power, the universe began to expand and has been expanding ever since (see Heb. 1:3). God’s kingdom operates according to the principle of endless increase (see Isa. 9:6–7), not of power that diminishes over time.'
  '30':
  - type: text
    content: 'They will also be food for every animal and bird, and every creature that moves on the ground—every creature with the breath of life.” '
  - type: note
    content: A day will come when the carnivorous animals will become herbivorous again. See Isa. 11:7; 65:25.
  - type: text
    content: And so it happened.
  '31':
  - type: text
    content: God surveyed all he had made and said, “I love it!” For it pleased him greatly. Evening gave way to morning—day six.
  - type: note
    content: Because God created man on the sixth day, the number six is the biblical number of man.
  '4':
  - type: text
    content: 'And God saw the light as pleasing and beautiful; '
  - type: note
    content: The Hebrew word tov can be translated “pleasing” or “good [beautiful]” and is used seven times in this chapter (vv. 4, 10, 12, 18, 21, 25, 31). God is mentioned 35 times (7 × 5) and the earth 21 times (7 × 3) in the creation account. God’s goodness was his intention in creation, and he embedded beauty within all he made.
  - type: text
    content: 'he used the light to dispel the darkness. '
  '5':
  - type: text
    content: God called the light “Day,” and the darkness “Night.” And so, evening gave way to morning—the first day.
  - type: note
    content: God begins in darkness and brings forth a new day. Chaos never hinders God from bringing forth light and order. It is not difficult for God to work where there is darkness, chaos, and confusion. See Ps. 139:12.
  '6':
  - type: text
    content: 'And God said, “Let there be a dome '
  - type: note
    content: Or “vault” or “expanse [atmosphere].” See Ezek. 1:22.
  - type: text
    content: 'between the waters to separate the water '
  - type: text
    content: above
  - type: text
    content: ' from the water '
  - type: text
    content: below
  - type: text
    content: '.” '
  '7':
  - type: text
    content: He made the dome and called it “Sky,” and separated the water above the dome from the water below the dome. Evening gave way to morning—day two.
  '9':
  - type: text
    content: 'And God said, “Let the water beneath the sky be gathered into one place, and let the dry ground appear.” '
  - type: note
    content: 'On the third day, the dry ground was raised up out of the waters (see Ps. 104:6–9), then God clothed it with vegetation. This can be compared to the new birth that comes to a believer, who is raised up and then clothed with the virtues of Christ. See Rom. 6:1–11; Eph. 2:1–10. The progress of creation moves from the lower to the higher, from the darker to the brighter, from the evening to the morning. The Word of God put light into darkness, land in the midst of sea, air in the midst of water, and life in the midst of the uninhabited earth. In creation, God started with form and filled it with fullness. In nature, the seed sprouts: first the bud, then the blossom, and then the fruit. In human life the baby is first, then the child, and then the mature adult. So it is also in grace.'
  - type: text
    content: 'And so it happened. '
