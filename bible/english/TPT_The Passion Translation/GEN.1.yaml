  '1':
  - type: heading
    content: In the Beginning
  - type: text
    content: 'When '
  - type: note
    content: Although most translations view v. 1 as an independent sentence serving as a general heading, it is likely that the first phrase serves as a subordinate time clause, such as “At the beginning [of time], God created” or “When God began the creation of heaven and the earth.” The first word in Hebrew is re’shiyth and means “first,” “chief,” or “firstfruits.” Genesis gives us the firstfruits of God’s creation. The New Testament takes us into the new creation life of Christ until all things are made new.
  - type: text
    content: 'God '
  - type: note
    content: 'This is the word Elohim, the commonly used Hebrew term for God. It stresses his sovereignty and power and could be translated “Mighty God.” Elohim is the plural of Eloah and occurs nearly 2,600 times in the Bible. Eloah is derived from the word ahlah, which means “to worship” or “to adore,” and presents God as the one worthy of worship and adoration. After the word Elohim, there is an untranslatable marking, which most scholars believe is a direct object marker with the first and last letters of the Hebrew alphabet. However, it is seen by some as the word known as Aleph-Tav, which occurs over seven thousand times in the Hebrew text of the Old Testament. Some believe that this could be pointing to Jesus Christ who declared himself to be “the Aleph and the Tav,” or “the Beginning and the End” (Rev. 1:8, 17; 2:8; 22:13). The first verse of the Bible shouts out: “God is all powerful!”'
  - type: text
    content: 'created '
  - type: note
    content: This is the word bara’, which is used in the Old Testament exclusively for God’s creativity, things that only God can do. Creating is an integral part of God’s nature.
  - type: text
    content: 'the heavens and the earth, '
  - type: note
    content: Or “the sky and the land.” This is a merism (a figure of speech using two contrasting words to refer to an entirety) for the entire universe. See Ps. 33:6, 9. The Hebrew word for “heaven” appears seven times in this chapter (vv. 1, 8, 9, 14, 15, 17, 20).
  '10':
  - type: text
    content: 'God called the dry ground “Land,” and the gathered waters he called “Seas.” And God saw '
