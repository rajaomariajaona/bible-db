  - type: text
    content: '. Let them serve as signs '
  - type: note
    content: The heavens contain the embedded codes of God’s glory, and are full of symbolic signs that testify to his greatness and wisdom. They are like huge billboards and advertisements in the sky telling people how good and great our Creator is. See Ps. 19:1–6; Rom. 10:18.
  - type: text
    content: 'to separate the day from night, and signify the days, seasons, '
  - type: note
    content: Or “appointed times [feasts].” See Lev. 23:4. The stars are for signs, signals, and seasons.
  - type: text
    content: 'and years.” And so it happened. '
  '16':
  - type: text
    content: 'God made two great lights: the brighter light to rule the day and the lesser light to rule the night. He also spread '
  - type: text
    content: the tapestry of
  - type: text
    content: ' shining stars '
  - type: note
    content: Scripture often uses stars as a picture of believers or ministries who shine with supernatural light (see Dan. 12:3; 1 Cor. 15:40–41; Phil. 2:15). We see from Ps. 147:4 that just as God named the “sun” and the “moon,” he also gave names to each of the stars. It is noted by numerous scholars that Gen. 1 never uses the names for sun (shemesh) or moon (yareach) that were also Canaanite names of deities. This served a polemical purpose against the stories of the gods and other creation narratives in the ancient Near East.
