  - type: text
    content: ' formless and empty, with nothing but darkness '
  - type: note
    content: See Jer. 4:23–27. Darkness is a frequent biblical metaphor for evil, misfortune, and death. It appears here as something more than an absence of light—it is a distinct entity. See Isa. 45:7.
  - type: text
    content: 'draped over the deep. God’s Spirit hovered '
  - type: note
    content: Or “God’s Spirit gently vibrated.” The Syriac cognate word can mean “to incubate” or “to brood.” The Hebrew verb rachaph means “to flutter,” “to gently move,” “to hover over with gentle wavering,” or “to be relaxed [grow soft]” and describes the utmost care and affection of a mother eagle caring for her young (see Deut. 32:11). This word is also used for a bridegroom hovering over his bride. This same Holy Spirit overshadowed (brooded over) a virgin named Mary to bring the perfect man into the world (see Luke 1:35). God’s Spirit danced over the waters on creation’s morning.
  - type: text
