  '11':
  - type: text
    content: 'Then God said, “Let the land burst forth with growth: plants that bear seeds of their own kind, and every variety of fruit tree, each with power to multiply '
  - type: note
    content: 'Or “with seed within itself” or “seeding seed.” The work of God at creation involved three separations: (1) God separated the light from darkness (v. 4). (2) God separated the waters above from the waters beneath (vv. 6–8). (3) God separated the water from the land (v. 9). Out of this separated, resurrected land, God brought a variety of life.'
  - type: text
    content: 'from its own seed.” '
  - type: note
    content: Everything with life produces life after its own kind. Each species is able to reproduce itself. The Lord Jesus was the firstfruit of a new species of humanity. See Matt. 7:16–19; John 3:6; 2 Cor. 5:17; James 1:18; 1 Peter 1:23; 2 Peter 1:4.
  - type: text
    content: 'And so it happened. '
  '12':
  - type: text
    content: 'The land flourished with grasses, every variety of seed-bearing plant, and trees bearing fruit with their seeds in them. And God loved what he saw, '
  - type: text
