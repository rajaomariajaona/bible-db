  '24':
  - type: text
    content: 'God said, “Let the earth produce every class and kind of living creature: livestock, crawling things, wild animals, each after its kind.” And so it happened. '
  '25':
  - type: text
    content: 'God made the wild animals according to their species, livestock according to their species, '
  - type: note
    content: God had a lamb before he had a man. Metaphorically, Jesus (God’s Lamb) was slain before the foundation of the world (see Rev. 13:8). The print of the nails was upon him even as his hands formed the world. As the Creator shaped Adam from dust, redeeming mercy was stamped upon him.
  - type: text
