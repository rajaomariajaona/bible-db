  - type: text
    content: ': Primarily, this was a discussion between Habakkuk and God. Habakkuk then wrote these prophetic conversations down and shared them with the people of Jerusalem.'
  - type: text
    content: Date
  - type: text
    content: ': Sometime between 612 BC and 586 BC. The action of the book occurs after the Babylonians came to full power in the region around 612 BC but before Babylon captured Jerusalem and exiled the Jews in 586 BC.'
  - type: text
    content: Type of Literature
  - type: text
    content: ': Prophecy'
  - type: text
    content: Major Themes
  - type: text
    content: ': The problem of evil; the cycles of coercion and empire; things are not as they should be—how are the righteous to live in such conditions?; triumphant faith; seeing Jesus in the book'
