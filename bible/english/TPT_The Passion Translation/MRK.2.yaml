document_id: MRK.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Paralyzed Man
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Several days later, Jesus returned to Capernaum, and the news quickly spread that he was back in town. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Soon there were so many people crowded inside the house to hear him that there was no more room, even outside the door.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'While Jesus was preaching the word of God, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'four men arrived, carrying a paralyzed man. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But when they realized that they couldn’t even get near him because of the crowd, they went up on top of the house and tore away the roof above Jesus’ head. And when they had broken through, they lowered the paralyzed man on a stretcher '
  - type: usfm
    marker: it
    children:
    - type: text
      text: right down in front of him
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Jesus saw the extent of their faith, he said to the paralyzed man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My son, your sins are now forgiven.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This offended some of the religious scholars who were present, and they reasoned among themselves, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Who does he think he is to speak this way? This is blasphemy for sure! Only God himself can forgive sins!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus supernaturally perceived their thoughts and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you being so skeptical?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Which is easier, to say to this paralyzed man, ‘Your sins are now forgiven,’ or, ‘Stand up and walk!’?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The answer to Jesus’ question is obvious. It is easy for anyone to say, “Your sins are forgiven,” for that cannot be proven. But if someone were to tell a paralyzed man to stand up, and he didn’t stand up, that would prove the person is a fraud. Jesus didn’t do the “easy thing” without accomplishing the hard thing, the miracle of healing. Forgiveness and healing both flow from Jesus Christ.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But to convince you that the Son of Man has been given authority to forgive sins,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I say to this man, ‘Stand up, pick up your stretcher, and walk home.’ ”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Immediately the man was healed and sprang to his feet in front of everyone and left for home.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'When the crowd witnessed this miracle, they were awestruck. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here can also mean “shocked into wonderment” or “to be out of their minds” (with amazement). This event teaches us that salvation not only involves the forgiveness of our sins, but gives us the power to rise up and walk.
    marker-yv: yv-n
  - type: text
    text: They shouted praises to God and said, “We’ve never seen anything like this before!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Levi (Matthew) to Follow Him
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jesus went out to walk near Lake Galilee, and a massive crowd gathered, so he taught them. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'As he walked along, he found Levi, the son of Alphaeus, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Levi means “joined,” “united,” and Levi is the same person as Matthew, who wrote the Gospel bearing his name. Alphaeus means “changing.” It is obvious that Matthew’s allegiance is changing from being a servant of Rome to being joined to Jesus as his future apostle.
    marker-yv: yv-n
  - type: text
    text: 'sitting at a tax booth, collecting taxes. He approached him and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Come follow me.”
  - type: text
    text: ' Immediately he got up from his booth and began to follow Jesus.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Later, Jesus and his disciples went to have a meal with Levi. Among the guests in Levi’s home were many tax collectors and notable sinners sharing a meal with Jesus, for there were many kinds of people who followed him. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'But when the religious scholars and the Pharisees '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pharisees
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “separated ones.”
    marker-yv: yv-n
  - type: text
    text: 'found out that Jesus was keeping company and dining with sinners and tax collectors, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These were Jews who worked for the Roman empire to collect taxes and were empowered by Rome to profit greatly by what they collected.
    marker-yv: yv-n
  - type: text
    text: 'they were indignant. So they approached Jesus’ disciples and said to them, “Why is it that someone like Jesus '
  - type: usfm
    marker: it
    children:
    - type: text
      text: defiles himself
  - type: text
    text: ' by eating with sinners and tax collectors?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'But when Jesus overheard their complaint, he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who goes to the doctor for a cure? Those who are well or those who are sick? I have not come to call the ‘righteous,’ but those who are sinners and bring them to repentance.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Questioned about Fasting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: One time, the disciples of John the Baptizer and the Pharisees were fasting. So they came to Jesus and asked, “Why is it that John’s disciples and disciples of the Pharisees are fasting but your disciples are not?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How can the sons of the bridal chamber fast when the bridegroom is next to them? As long as the bridegroom is with them they won’t,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but the days of fasting will come when the Bridegroom is taken from them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And who would mend worn-out clothing with new fabric? When the new cloth shrinks, it will rip, making the tear worse than before.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And who would pour new wine into an old wineskin? Eventually the wine will ferment and make the wineskin burst, losing everything—the wine will be spilled and the wineskin ruined. Instead, new wine is always poured into new wineskins.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus, Lord of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'One Sabbath, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sabbath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comes from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shavat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which is the verb “to rest.” What was designed to be a day of rest and intimacy with God and family was now complicated by a host of rules and traditions.'
    marker-yv: yv-n
  - type: text
    text: 'Jesus and his disciples were walking through a field of wheat. The disciples were hungry, so they plucked off some heads of grain to eat. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But when some of the Pharisees saw what was happening, they said to him, “Look! Your disciples shouldn’t be harvesting grain on the Sabbath!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Haven’t you ever read what King David and his men did when they were hungry?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They entered the house of God
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the tabernacle. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 21:1–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ancient Jewish tradition states that David did this on a Sabbath day. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 24:5–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: when Abiathar was high priest and ate the sacred bread of God’s presence.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “loaves of presentation.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 44:15–16
      metadata:
        usfm: EZK.44.15+EZK.44.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They violated the law by eating bread that only the priests were allowed to eat. But there is one here who is even greater than the temple.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Sabbath was made for the sake of people, and not people for the Sabbath.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For this reason the Son of Man exercises his lordship over the Sabbath.”
