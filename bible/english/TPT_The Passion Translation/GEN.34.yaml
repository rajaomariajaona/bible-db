document_id: GEN.34,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dinah Raped by Shechem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day, Jacob and Leah’s daughter, Dinah, went out to visit the neighborhood girls. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps the local women introduced her to Shechem, the prince of the city named for him. Dinah was likely fifteen or sixteen years old.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You may settle here among us, live anywhere you wish, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The land is before your faces.” This could be an idiom meaning “Make yourselves at home here.”
      marker-yv: yv-n
    - type: text
      text: 'move about '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “trade” (LXX, Vulgate, Targums).
      marker-yv: yv-n
    - type: text
      text: freely, and acquire property.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The basic meaning of the Hebrew verb used here is “take possession of land.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Shechem spoke up and said to Dinah’s family, “Please, let me find favor in your eyes. Whatever you require of me, I’ll pay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Set the bride-price as high as you wish, no matter how expensive it is; I’ll pay whatever you ask. Only give me the young woman to be my wife.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob’s Sons Exact Revenge
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The sons of Jacob concocted a devious plan
    - type: text
      text: '. Because of the rape of their sister Dinah, they answered Shechem and Hamor deceitfully, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'saying, “Our culture will not allow us to consent to our sister Dinah marrying someone who is uncircumcised, for that would be a disgrace to us. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We would only approve of the marriage on one condition: you must circumcise every male among you and become as we are. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then we will allow our daughters to marry your sons and your daughters to marry our sons. And we will live among you and become one people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if you refuse to be circumcised, then we will take our sister '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “daughter.”
      marker-yv: yv-n
    - type: text
      text: 'and be gone.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The offer pleased Hamor and his son Shechem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the young man lost no time in doing what they asked, because Shechem really wanted to marry Jacob’s daughter!
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Shechem was the most honored '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or, possibly, “the most important.”
      marker-yv: yv-n
    - type: text
      text: 'in all his family, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Hamor, the tribal chief of the Hivites, had a son named Shechem, who was the prince. When he saw '
    - type: usfm
      marker: it
      children:
      - type: text
        text: how attractive Dinah was
    - type: text
      text: ', he seized her and sexually assaulted her. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so Hamor and his son went to the gate of the city and spoke to the men, saying, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“These people are our friends. Let them settle in our land and make themselves at home; there’s plenty of room in the country for them. And, let’s agree to exchange our daughters in marriage to them and to unite us as one people. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They only have one condition in order to live among us and to unite with us as one people: every male among us must be circumcised as they are circumcised. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Won’t all of their livestock and property become ours? Let us agree to their request, so they will live among us.” '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So all the townsmen agreed with Hamor and his son Shechem, and every male of the city was circumcised.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Three days later, while all the men were still suffering in pain, two of Jacob’s sons, Simeon and Levi, Dinah’s brothers, took their swords and attacked the unsuspecting city. They slaughtered every male of the city. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They even killed Hamor and his son Shechem, and took Dinah from Shechem’s house, and left. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, Jacob’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: other
    - type: text
      text: ' sons came upon the dead bodies, and they looted the city as retribution for the violation of their sister. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They seized the flocks, herds, and donkeys, and all that was in the city and in the field. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They plundered all their wealth and their household goods and took their wives and children as captives.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His heart was drawn to Dinah, Jacob’s daughter, so he sought to win her affection and spoke tenderly to her. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jacob found out, he said to Simeon and Levi, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: What have you done?
    - type: text
      text: ' You have ruined my name, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You have muddied the waters” or “You have made a stink.” That is, they had brought trouble upon Jacob.
      marker-yv: yv-n
    - type: text
      text: and now the Canaanites and Perizzites and all the people of this land will hate me! My men are so few that if they unite against me and attack, I and all my household will be destroyed!”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they answered him, “Why should they treat our sister like a whore?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shechem went to his father Hamor and said, “Get me this girl to be my wife.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jacob heard that Shechem had violated his daughter Dinah; but his sons were in the fields with his livestock, so he waited to act until his sons returned home. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shechem’s father Hamor '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brought his son
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: we learn that Shechem was present during this conversation.
      marker-yv: yv-n
    - type: text
      text: 'to speak with Jacob '
    - type: usfm
      marker: it
      children:
      - type: text
        text: about marriage arrangements
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During their conversation, Jacob’s sons came in from the field, and they heard the report of what Shechem had done to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their sister
    - type: text
      text: ' Dinah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Apparently, Dinah was still being held in Hamor’s house within the city (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'They were shocked and furious over the shameful act Shechem committed against Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in Israel.”
      marker-yv: yv-n
    - type: text
      text: —a criminal act of sexual assault that never should have happened.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Hamor tried to defuse the situation, saying, “Listen, my son Shechem is in love with your daughter. Please, give her to him in marriage. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let’s allow our people to intermarry. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 34:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “partner [with us],” that is, become our brothers-in-law.
      marker-yv: yv-n
    - type: text
      text: 'Let your daughters marry our sons, and we will let our daughters marry your sons. '
