document_id: GEN.34,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Dinah Raped by Shechem
  - type: text
    content: 'One day, Jacob and Leah’s daughter, Dinah, went out to visit the neighborhood girls. '
  - type: note
    content: Perhaps the local women introduced her to Shechem, the prince of the city named for him. Dinah was likely fifteen or sixteen years old.
  '10':
  - type: text
    content: 'You may settle here among us, live anywhere you wish, '
  - type: note
    content: Or “The land is before your faces.” This could be an idiom meaning “Make yourselves at home here.”
  - type: text
    content: 'move about '
  - type: note
    content: Or “trade” (LXX, Vulgate, Targums).
  - type: text
    content: freely, and acquire property.”
  - type: note
    content: The basic meaning of the Hebrew verb used here is “take possession of land.”
  '11':
  - type: text
    content: 'Then Shechem spoke up and said to Dinah’s family, “Please, let me find favor in your eyes. Whatever you require of me, I’ll pay. '
  '12':
  - type: text
    content: Set the bride-price as high as you wish, no matter how expensive it is; I’ll pay whatever you ask. Only give me the young woman to be my wife.”
  - type: heading
    content: Jacob’s Sons Exact Revenge
  '13':
  - type: text
    content: The sons of Jacob concocted a devious plan
  - type: text
    content: '. Because of the rape of their sister Dinah, they answered Shechem and Hamor deceitfully, '
  '14':
  - type: text
    content: 'saying, “Our culture will not allow us to consent to our sister Dinah marrying someone who is uncircumcised, for that would be a disgrace to us. '
  '15':
  - type: text
    content: 'We would only approve of the marriage on one condition: you must circumcise every male among you and become as we are. '
  '16':
  - type: text
    content: 'Then we will allow our daughters to marry your sons and your daughters to marry our sons. And we will live among you and become one people. '
  '17':
  - type: text
    content: 'But if you refuse to be circumcised, then we will take our sister '
  - type: note
    content: Or “daughter.”
  - type: text
    content: 'and be gone.” '
  '18':
  - type: text
    content: 'The offer pleased Hamor and his son Shechem. '
  '19':
  - type: text
    content: And the young man lost no time in doing what they asked, because Shechem really wanted to marry Jacob’s daughter!
  - type: text
    content: 'Now Shechem was the most honored '
  - type: note
    content: Or, possibly, “the most important.”
  - type: text
    content: 'in all his family, '
  '2':
  - type: text
    content: 'Now Hamor, the tribal chief of the Hivites, had a son named Shechem, who was the prince. When he saw '
  - type: text
    content: how attractive Dinah was
  - type: text
    content: ', he seized her and sexually assaulted her. '
  '20':
  - type: text
    content: 'so Hamor and his son went to the gate of the city and spoke to the men, saying, '
  '21':
  - type: text
    content: '“These people are our friends. Let them settle in our land and make themselves at home; there’s plenty of room in the country for them. And, let’s agree to exchange our daughters in marriage to them and to unite us as one people. '
  '22':
  - type: text
    content: 'They only have one condition in order to live among us and to unite with us as one people: every male among us must be circumcised as they are circumcised. '
  '23':
  - type: text
    content: 'Won’t all of their livestock and property become ours? Let us agree to their request, so they will live among us.” '
  '24':
  - type: text
    content: So all the townsmen agreed with Hamor and his son Shechem, and every male of the city was circumcised.
  '25':
  - type: text
    content: 'Three days later, while all the men were still suffering in pain, two of Jacob’s sons, Simeon and Levi, Dinah’s brothers, took their swords and attacked the unsuspecting city. They slaughtered every male of the city. '
  '26':
  - type: text
    content: 'They even killed Hamor and his son Shechem, and took Dinah from Shechem’s house, and left. '
  '27':
  - type: text
    content: 'Later, Jacob’s '
  - type: text
    content: other
  - type: text
    content: ' sons came upon the dead bodies, and they looted the city as retribution for the violation of their sister. '
  '28':
  - type: text
    content: 'They seized the flocks, herds, and donkeys, and all that was in the city and in the field. '
  '29':
  - type: text
    content: They plundered all their wealth and their household goods and took their wives and children as captives.
  '3':
  - type: text
    content: 'His heart was drawn to Dinah, Jacob’s daughter, so he sought to win her affection and spoke tenderly to her. '
  '30':
  - type: text
    content: When Jacob found out, he said to Simeon and Levi, “
  - type: text
    content: What have you done?
  - type: text
    content: ' You have ruined my name, '
  - type: note
    content: Or “You have muddied the waters” or “You have made a stink.” That is, they had brought trouble upon Jacob.
  - type: text
    content: and now the Canaanites and Perizzites and all the people of this land will hate me! My men are so few that if they unite against me and attack, I and all my household will be destroyed!”
  '31':
  - type: text
    content: But they answered him, “Why should they treat our sister like a whore?”
  '4':
  - type: text
    content: Shechem went to his father Hamor and said, “Get me this girl to be my wife.”
  '5':
  - type: text
    content: 'Now Jacob heard that Shechem had violated his daughter Dinah; but his sons were in the fields with his livestock, so he waited to act until his sons returned home. '
  '6':
  - type: text
    content: 'Shechem’s father Hamor '
  - type: text
    content: brought his son
  - type: text
    content: ' '
  - type: note
    content: From v. 11 we learn that Shechem was present during this conversation.
  - type: text
    content: 'to speak with Jacob '
  - type: text
    content: about marriage arrangements
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'During their conversation, Jacob’s sons came in from the field, and they heard the report of what Shechem had done to '
  - type: text
    content: their sister
  - type: text
    content: ' Dinah. '
  - type: note
    content: Apparently, Dinah was still being held in Hamor’s house within the city (see vv. 17, 26).
  - type: text
    content: 'They were shocked and furious over the shameful act Shechem committed against Israel '
  - type: note
    content: Or “in Israel.”
  - type: text
    content: —a criminal act of sexual assault that never should have happened.
  '8':
  - type: text
    content: 'But Hamor tried to defuse the situation, saying, “Listen, my son Shechem is in love with your daughter. Please, give her to him in marriage. '
  '9':
  - type: text
    content: 'Let’s allow our people to intermarry. '
  - type: note
    content: Or “partner [with us],” that is, become our brothers-in-law.
  - type: text
    content: 'Let your daughters marry our sons, and we will let our daughters marry your sons. '
