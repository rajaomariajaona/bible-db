document_id: JDG.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Three Hundred Foxes
  - type: text
    content: 'Later, during the wheat harvest, Samson went to visit his wife and took a young goat as a gift '
  - type: note
    content: Taking her a young goat as a gift, in that culture, would be the ancient counterpart to giving her chocolate and roses.
  - type: text
    content: 'for her. He said '
  - type: text
    content: to her father
  - type: text
    content: ', “I’m going into my wife’s bedroom to sleep with her.” But her father wouldn’t let him enter. He said to Samson, '
  '10':
  - type: text
    content: The men of Judah asked the Philistines, “Why are you coming against us?”
  - type: text
    content: The Philistines replied, “We’ve come to capture Samson and repay him for what he did to us.”
  '11':
  - type: text
    content: So three thousand men of Judah went to Samson’s cave in the cliff of Etam, and they said to him, “What are you trying to do to us? Don’t you realize the Philistines rule over us?”
  - type: text
    content: Samson replied, “I only did to them what they did to me.”
  '12':
  - type: text
    content: The men of Judah told him, “We’ve come to take you prisoner and hand you over to the Philistines.”
  - type: text
    content: “All right,” Samson said, “but promise me that you won’t kill me.”
  '13':
  - type: text
    content: '“We promise not to kill you,” they replied. “We’ll only tie you up and hand you over to the Philistines.” They bound him with two brand new ropes and led him from '
  - type: text
    content: the cave
  - type: text
    content: ' near the cliff '
  - type: text
    content: of Etam to Lehi
  - type: text
    content: .
  - type: note
    content: Lehi means “jawbone.”
  '14':
  - type: text
    content: 'When the Philistines saw Samson coming, they raised a shout of triumph. Immediately, '
  - type: text
    content: the mighty
  - type: text
    content: ' Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' came rushing upon Samson! He snapped the ropes off his arms as if they were strings catching fire, and they fell from his wrists. '
  '15':
  - type: text
    content: 'He spotted a raw jawbone of a donkey lying there on the ground and picked it up. He began to '
  - type: text
    content: swing it wildly
  - type: text
    content: ' and used it to kill '
  - type: text
    content: a thousand Philistines
  - type: text
    content: ' that day.'
  - type: heading
    content: The Song of Samson
  '16':
  - type: text
    content: Samson then said,
  - type: text
    content: “With only a donkey’s jawbone,
  - type: text
    content: 'I made heaps '
  - type: text
    content: of donkeys
  - type: text
    content: ' out of them!'
  - type: note
    content: The Hebrew word for “donkey” and the word for “heaps” are homonyms. The wordplay is lost in English translations. If God can use the jawbone of a donkey, he can use you and your words (jawbone) to win a victory over the enemy.
  - type: text
    content: With only a donkey’s jawbone,
  - type: text
    content: a thousand men lie slain!”
  '17':
  - type: text
    content: When he finished boasting, he threw the jawbone to the ground. That’s how the place got its name—Jawbone Hill.
  - type: note
    content: Or “Ramath Lehi.”
  '18':
  - type: text
    content: 'Afterward, Samson was terribly thirsty and cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ', “I was strengthened by your great power to win this awesome victory. Will you now leave me here dying of thirst—and let me fall into the hands of these pagans?” '
  - type: note
    content: Or “uncircumcised.”
  '19':
  - type: text
    content: 'So God '
  - type: text
    content: answered Samson’s prayer
  - type: text
    content: ' and split open the rock basin '
  - type: text
    content: under Lehi
  - type: text
    content: ', and water gushed out! Samson drank and his spirit was revived. He named that place “The Spring for the One Who Cried,” '
  - type: note
    content: Or “En Hakkore [crier’s fountain].” There is a hidden spring called En Hakkore. God has a hidden spring reserved for those who cry. If tears have streaked your face and grief has torn your heart, there is a spring of restoration that God has for you. Drink of this living spring of water and he will comfort you and restore you.
  - type: text
    content: and it is still there in Lehi to this day.
  '2':
  - type: text
    content: '“I thought you really despised her and had divorced her, '
  - type: note
    content: Or “in hating, you hated her,” a figure of speech to say that he divorced her.
  - type: text
    content: so I gave her to your best man. Look, her younger sister is even more beautiful than she. Take her instead.”
  '20':
  - type: text
    content: Samson led Israel as its champion-deliverer for twenty years during the period of Philistine oppression.
  '3':
  - type: text
    content: 'Samson said, “That does it! This time I’ll settle my score with you Philistines for good!” '
  '4':
  - type: text
    content: 'Samson went out and caught three hundred foxes, '
  - type: note
    content: Or “jackals.”
  - type: text
    content: 'tied their tails together in pairs, and lashed a torch between each pair of tails. '
  '5':
  - type: text
    content: He lit the torches and set the foxes loose in the grain fields of the Philistines, burning all their grain to the ground, including the sheaves and the standing grain, as well as their vineyards and olive groves.
  '6':
  - type: text
    content: “Who did this?” the Philistines demanded.
  - type: text
    content: “Samson,” someone told them, “because his father-in-law from Timnah gave Samson’s bride to his best man.” So the Philistines went and burned both the woman and her father to death.
  '7':
  - type: text
    content: '“Because you did this despicable act,” Samson vowed, “I won’t rest until I get even with you!” '
  '8':
  - type: text
    content: 'He was so furious that he launched a vicious attack on the Philistines and '
  - type: text
    content: single handedly
  - type: text
    content: ' slaughtered many of them. Afterward, he went and hid in a cave in the cliff of Etam.'
  - type: note
    content: Etam means “lair of ravenous beasts.”
  - type: heading
    content: Samson versus the Philistines
  '9':
  - type: text
    content: 'The Philistines retaliated by setting up camp in Judah and deploying their men near the town of Lehi. '
