document_id: JDG.15,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Three Hundred Foxes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, during the wheat harvest, Samson went to visit his wife and took a young goat as a gift '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Taking her a young goat as a gift, in that culture, would be the ancient counterpart to giving her chocolate and roses.
      marker-yv: yv-n
    - type: text
      text: 'for her. He said '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to her father
    - type: text
      text: ', “I’m going into my wife’s bedroom to sleep with her.” But her father wouldn’t let him enter. He said to Samson, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Judah asked the Philistines, “Why are you coming against us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Philistines replied, “We’ve come to capture Samson and repay him for what he did to us.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So three thousand men of Judah went to Samson’s cave in the cliff of Etam, and they said to him, “What are you trying to do to us? Don’t you realize the Philistines rule over us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samson replied, “I only did to them what they did to me.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Judah told him, “We’ve come to take you prisoner and hand you over to the Philistines.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “All right,” Samson said, “but promise me that you won’t kill me.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“We promise not to kill you,” they replied. “We’ll only tie you up and hand you over to the Philistines.” They bound him with two brand new ropes and led him from '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the cave
    - type: text
      text: ' near the cliff '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Etam to Lehi
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Lehi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “jawbone.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines saw Samson coming, they raised a shout of triumph. Immediately, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the mighty
    - type: text
      text: ' Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' came rushing upon Samson! He snapped the ropes off his arms as if they were strings catching fire, and they fell from his wrists. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spotted a raw jawbone of a donkey lying there on the ground and picked it up. He began to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: swing it wildly
    - type: text
      text: ' and used it to kill '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a thousand Philistines
    - type: text
      text: ' that day.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Samson
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samson then said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “With only a donkey’s jawbone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I made heaps '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of donkeys
    - type: text
      text: ' out of them!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “donkey” and the word for “heaps” are homonyms. The wordplay is lost in English translations. If God can use the jawbone of a donkey, he can use you and your words (jawbone) to win a victory over the enemy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With only a donkey’s jawbone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a thousand men lie slain!”
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: When he finished boasting, he threw the jawbone to the ground. That’s how the place got its name—Jawbone Hill.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Ramath Lehi.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward, Samson was terribly thirsty and cried out to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', “I was strengthened by your great power to win this awesome victory. Will you now leave me here dying of thirst—and let me fall into the hands of these pagans?” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “uncircumcised.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: answered Samson’s prayer
    - type: text
      text: ' and split open the rock basin '
    - type: usfm
      marker: it
      children:
      - type: text
        text: under Lehi
    - type: text
      text: ', and water gushed out! Samson drank and his spirit was revived. He named that place “The Spring for the One Who Cried,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “En Hakkore [crier’s fountain].” There is a hidden spring called En Hakkore. God has a hidden spring reserved for those who cry. If tears have streaked your face and grief has torn your heart, there is a spring of restoration that God has for you. Drink of this living spring of water and he will comfort you and restore you.
      marker-yv: yv-n
    - type: text
      text: and it is still there in Lehi to this day.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I thought you really despised her and had divorced her, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in hating, you hated her,” a figure of speech to say that he divorced her.
      marker-yv: yv-n
    - type: text
      text: so I gave her to your best man. Look, her younger sister is even more beautiful than she. Take her instead.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samson led Israel as its champion-deliverer for twenty years during the period of Philistine oppression.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samson said, “That does it! This time I’ll settle my score with you Philistines for good!” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samson went out and caught three hundred foxes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “jackals.”
      marker-yv: yv-n
    - type: text
      text: 'tied their tails together in pairs, and lashed a torch between each pair of tails. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He lit the torches and set the foxes loose in the grain fields of the Philistines, burning all their grain to the ground, including the sheaves and the standing grain, as well as their vineyards and olive groves.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Who did this?” the Philistines demanded.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Samson,” someone told them, “because his father-in-law from Timnah gave Samson’s bride to his best man.” So the Philistines went and burned both the woman and her father to death.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Because you did this despicable act,” Samson vowed, “I won’t rest until I get even with you!” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was so furious that he launched a vicious attack on the Philistines and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: single handedly
    - type: text
      text: ' slaughtered many of them. Afterward, he went and hid in a cave in the cliff of Etam.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Etam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “lair of ravenous beasts.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson versus the Philistines
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Philistines retaliated by setting up camp in Judah and deploying their men near the town of Lehi. '
