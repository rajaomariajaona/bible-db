document_id: GEN.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Birth of Isaac
  - type: text
    content: Yahweh
  - type: text
    content: ' visited Sarah, '
  - type: note
    content: We are not told if the Lord appeared to Sarah or visited her in a dream, but it is clear that Yahweh came to her to confirm his promise.
  - type: text
    content: 'just as he said he would, and fulfilled his promise to her. '
  '10':
  - type: text
    content: So she said to Abraham, “Get rid of this slave woman and her son. Banish them, for the son of that slave woman must not become a coheir with my son Isaac!”
  '11':
  - type: text
    content: 'Abraham was very upset over Sarah’s demand, for Ishmael was his son too. '
  '12':
  - type: text
    content: 'God spoke to Abraham, '
  - type: note
    content: Perhaps God spoke to Abraham in a night vision or dream. God still speaks to his prophets today, as he spoke to Abraham.
  - type: text
    content: '“Don’t be distressed over the slave woman and her son. Listen to every word Sarah says to you, and do it, for it will be through Isaac your promise of descendants will be fulfilled. '
  - type: note
    content: Or “through Isaac your seed will be counted.” See Rom. 9:7; Gal. 3:16; Heb. 11:18.
  '13':
  - type: text
    content: Rest assured, I will make the son of your slave woman into a nation too, because he is your son.”
  '14':
  - type: text
    content: Abraham rose up early the next morning, bundled up some food and a skin of water, and strapped them to Hagar’s shoulders. Then he gave her his son and sent them away. So, Hagar and her son Ishmael departed and wandered off into the wilderness of Beersheba.
  '15':
  - type: text
    content: 'When the water was gone, she grew desperate, so she left her son '
  - type: note
    content: Ishmael was not an infant, for he had been circumcised at thirteen (see Gen. 17:25), and Isaac was born a year afterwards. It was common to wean children at the age of four or five, so Ishmael was at least a teenager when Hagar was sent away.
  - type: text
    content: 'under a bush. '
  '16':
  - type: text
    content: Then she walked about the distance of a bowshot and sat down, for she thought, “I can’t bear to watch my son die.” As she sat nearby, she broke into tears and sobbed uncontrollably.
  '17':
  - type: text
    content: 'And God heard the voice of the boy. The angel of God called out to Hagar from the heavenly realm '
  - type: note
    content: Both Ishmael and Isaac were saved by a voice from heaven (see Gen. 22:11).
  - type: text
    content: 'and said, “What’s the matter, Hagar? Don’t be afraid, for God has heard the voice of your son crying as he lies there. '
  '18':
  - type: text
    content: 'Get up! Help the boy up and hold him by the hand, for I will make him into a great nation.” '
  '19':
  - type: text
    content: 'Then God opened her eyes to reveal a well of water. She went over to the well and filled the skin with water and gave the boy a '
  - type: text
    content: long, cool
  - type: text
    content: ' drink.'
  '2':
  - type: text
    content: 'And Sarah conceived and bore Abraham a son in his old age, at the exact time God had promised them. '
  '20':
  - type: text
    content: 'God was with Ishmael as he grew up in the wilderness of Paran. He became an expert archer, '
  '21':
  - type: text
    content: and his mother, Hagar, arranged a marriage for him with an Egyptian woman.
  - type: heading
    content: Abraham’s Oath to Abimelech
  '22':
  - type: text
    content: 'At that time, King Abimelech and Phicol, '
  - type: note
    content: Phicol means “strong.”
  - type: text
    content: his army commander, came to Abraham and said, “
  - type: text
    content: It is obvious that
  - type: text
    content: ' God is with you '
  - type: text
    content: and blesses
  - type: text
    content: ' everything you do. '
  - type: note
    content: It was not simply the wealth of Abraham that impressed them; it was also the supernatural healings that took place when Abraham prayed.
  '23':
  - type: text
    content: Now swear to me here before God that you will not deceive me, my children, or my descendants, but as I have shown you loyal friendship, so you will treat me—and the land in which you live as a foreigner—with loyal friendship.”
  '24':
  - type: text
    content: “I give you my oath,” Abraham answered.
  '25':
  - type: text
    content: 'But Abraham voiced a complaint about a well of water which Abimelech’s servants had seized by force. '
  '26':
  - type: text
    content: 'Abimelech responded, “This is the first time I’ve heard about this; you never told me before now. I don’t know who has done this.” '
  '27':
  - type: text
    content: So Abraham took sheep and cattle, gave them to Abimelech, and the two men made a covenant.
  '28':
  - type: text
    content: 'Then Abraham set apart from his flock seven ewe lambs, '
  '29':
  - type: text
    content: and Abimelech asked him, “What are you doing with these seven ewe lambs you have set apart?”
  '3':
  - type: text
    content: 'Abraham named his son Isaac, the '
  - type: text
    content: miracle
  - type: text
    content: ' son, whom Sarah bore him. '
  '30':
  - type: text
    content: He replied, “
  - type: text
    content: I am giving them to you
  - type: text
    content: ', and by accepting these seven ewe lambs, you acknowledge the proof that I dug this well '
  - type: text
    content: and it belongs to me
  - type: text
    content: '.” '
  '31':
  - type: text
    content: 'That place was called Beersheba, '
  - type: note
    content: Beersheba can be translated either “well of seven [lambs]” or “well of the oath.”
  - type: text
    content: because it was there that both men swore an oath to one another.
  '32':
  - type: text
    content: 'After completing their pact at Beersheba, King Abimelech and Phicol, his army commander, departed and returned to Philistine country. '
  '33':
  - type: text
    content: 'Abraham planted a tamarisk tree '
  - type: note
    content: A tamarisk tree is a type of evergreen that can grow up to fifty feet. Abraham did not plant the tamarisk tree for landscaping; it was a statement proclaiming his faith. Planting the tree revealed Abraham’s faith and endurance until the time of fruitfulness (see Isa. 65:21–22).
  - type: text
    content: 'in Beersheba, and there he worshiped '
  - type: text
    content: Yahweh
  - type: text
    content: ', the everlasting God. '
  - type: note
    content: Or “El Olam,” which means “God Eternal,” “the Hidden God,” or “the Always God” (see Ps. 90:2). This name proclaims that God is God over Eternity and God over eternal things. Abraham’s heart and focus were turning to the God of Eternity. The things of the earth were growing meaningless to him (see 1 John 2:15–17). El Olam was preparing Abraham to yield his greatest treasure, his son. Only one whose heart is fixed on eternity can ever make sacrifices pleasing to God (see Rom. 12:1; Heb. 13:16). When we see the Eternal One, we can let go of temporary things. Abraham touched eternal life as he dwelt by the tamarisk tree and the well. This was his true preparation for giving up Isaac.
  '34':
  - type: text
    content: 'And Abraham lived many years '
  - type: text
    content: in peace
  - type: text
    content: ' as a foreigner in Philistine country.'
  '4':
  - type: text
    content: 'When Isaac was eight days old, Abraham circumcised him, as God had commanded him. '
  '5':
  - type: text
    content: 'Abraham was one hundred years old when his son Isaac was born. '
  '6':
  - type: text
    content: 'Sarah said, “God has brought me laughter, and everyone who hears about this will laugh '
  - type: note
    content: 'This verse contains a double allusion to the name Isaac, which means “he laughed.” Every time Abraham and Sarah spoke Isaac’s name, they acknowledged the miracle of God. The name Yitzhak (Isaac) is the word for “laughter” but in the past tense. It could be translated “delayed laughter.” If you had a baby after turning one hundred, you might laugh too! Notice the details of Isaac’s birth and how they foreshadow the birth of our Lord Jesus: (1) Both sons were the promised seed—Gen. 17:6; Isa. 7:14. (2) Both were long awaited—Gen. 12:5–6; 21:1–3; Gal. 4:4. (3) Both had mothers who asked questions—Gen. 18:13–14; Luke 1:34–37. (4) Both had names given before birth—Gen. 17:19; Matt. 1:21. (5) Both births were miraculous—Gen. 21:2; Matt. 1:18. (6) Both sons were a delight to their father—Gen. 22:2; Matt. 3:17.'
  - type: text
    content: 'with me.” '
  '7':
  - type: text
    content: And she added,
  - type: text
    content: “Who would ever have told Abraham
  - type: text
    content: that Sarah would one day nurse children!
  - type: text
    content: Even though Abraham is an old man,
  - type: text
    content: look—I have given him a son!”
  - type: heading
    content: Hagar and Ishmael Sent Away
  '8':
  - type: text
    content: 'Isaac grew and was weaned; and on the day Sarah weaned him, Abraham prepared a great feast. '
  '9':
  - type: text
    content: 'But Sarah noticed the son of Hagar, the Egyptian, was mocking '
  - type: note
    content: The Hebrew word used here is built on the root stem from the name Isaac. It is possible to translate it “jesting,” “playing,” or “making fun of [Isaac].” Regardless, Sarah saw it as a threat to her son. See Gal. 4:21–31.
  - type: text
    content: her son Isaac
  - type: text
    content: '. '
  - type: note
    content: The italicized words are found in both the Septuagint and the Latin Vulgate.
