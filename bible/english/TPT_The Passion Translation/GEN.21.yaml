    children:
    - type: text
      text: '29'
  - type: text
    text: and Abimelech asked him, “What are you doing with these seven ewe lambs you have set apart?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: He replied, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: I am giving them to you
  - type: text
    text: ', and by accepting these seven ewe lambs, you acknowledge the proof that I dug this well '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and it belongs to me
  - type: text
    text: '.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'That place was called Beersheba, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Beersheba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated either “well of seven [lambs]” or “well of the oath.”
    marker-yv: yv-n
  - type: text
    text: because it was there that both men swore an oath to one another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'After completing their pact at Beersheba, King Abimelech and Phicol, his army commander, departed and returned to Philistine country. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Abraham planted a tamarisk tree '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A tamarisk tree is a type of evergreen that can grow up to fifty feet. Abraham did not plant the tamarisk tree for landscaping; it was a statement proclaiming his faith. Planting the tree revealed Abraham’s faith and endurance until the time of fruitfulness (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 65:21–22
      metadata:
        usfm: ISA.65.21+ISA.65.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'in Beersheba, and there he worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the everlasting God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “El Olam,” which means “God Eternal,” “the Hidden God,” or “the Always God” (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 90:2
      metadata:
        usfm: PSA.90.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). This name proclaims that God is God over Eternity and God over eternal things. Abraham’s heart and focus were turning to the God of Eternity. The things of the earth were growing meaningless to him (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 John 2:15–17
      metadata:
        usfm: 1JN.2.15+1JN.2.16+1JN.2.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). El Olam was preparing Abraham to yield his greatest treasure, his son. Only one whose heart is fixed on eternity can ever make sacrifices pleasing to God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 12:1
      metadata:
        usfm: ROM.12.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 13:16
      metadata:
        usfm: HEB.13.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). When we see the Eternal One, we can let go of temporary things. Abraham touched eternal life as he dwelt by the tamarisk tree and the well. This was his true preparation for giving up Isaac.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'And Abraham lived many years '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in peace
  - type: text
    text: ' as a foreigner in Philistine country.'
