        marker: fr
        children:
        - type: text
          text: 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We are not told if the Lord appeared to Sarah or visited her in a dream, but it is clear that
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: came to her to confirm his promise.
      marker-yv: yv-n
    - type: text
      text: 'just as he said he would, and fulfilled his promise to her. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So she said to Abraham, “Get rid of this slave woman and her son. Banish them, for the son of that slave woman must not become a coheir with my son Isaac!”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham was very upset over Sarah’s demand, for Ishmael was his son too. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God spoke to Abraham, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Perhaps God spoke to Abraham in a night vision or dream. God still speaks to his prophets today, as he spoke to Abraham.
      marker-yv: yv-n
    - type: text
      text: '“Don’t be distressed over the slave woman and her son. Listen to every word Sarah says to you, and do it, for it will be through Isaac your promise of descendants will be fulfilled. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “through Isaac your seed will be counted.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rest assured, I will make the son of your slave woman into a nation too, because he is your son.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abraham rose up early the next morning, bundled up some food and a skin of water, and strapped them to Hagar’s shoulders. Then he gave her his son and sent them away. So, Hagar and her son Ishmael departed and wandered off into the wilderness of Beersheba.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the water was gone, she grew desperate, so she left her son '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ishmael was not an infant, for he had been circumcised at thirteen (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and Isaac was born a year afterwards. It was common to wean children at the age of four or five, so Ishmael was at least a teenager when Hagar was sent away.
      marker-yv: yv-n
    - type: text
      text: 'under a bush. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then she walked about the distance of a bowshot and sat down, for she thought, “I can’t bear to watch my son die.” As she sat nearby, she broke into tears and sobbed uncontrollably.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God heard the voice of the boy. The angel of God called out to Hagar from the heavenly realm '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both Ishmael and Isaac were saved by a voice from heaven (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'and said, “What’s the matter, Hagar? Don’t be afraid, for God has heard the voice of your son crying as he lies there. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Get up! Help the boy up and hold him by the hand, for I will make him into a great nation.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God opened her eyes to reveal a well of water. She went over to the well and filled the skin with water and gave the boy a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: long, cool
    - type: text
      text: ' drink.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Sarah conceived and bore Abraham a son in his old age, at the exact time God had promised them. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God was with Ishmael as he grew up in the wilderness of Paran. He became an expert archer, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and his mother, Hagar, arranged a marriage for him with an Egyptian woman.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham’s Oath to Abimelech
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time, King Abimelech and Phicol, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Phicol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “strong.”
      marker-yv: yv-n
    - type: text
      text: his army commander, came to Abraham and said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It is obvious that
    - type: text
      text: ' God is with you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and blesses
    - type: text
      text: ' everything you do. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It was not simply the wealth of Abraham that impressed them; it was also the supernatural healings that took place when Abraham prayed.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now swear to me here before God that you will not deceive me, my children, or my descendants, but as I have shown you loyal friendship, so you will treat me—and the land in which you live as a foreigner—with loyal friendship.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I give you my oath,” Abraham answered.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Abraham voiced a complaint about a well of water which Abimelech’s servants had seized by force. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimelech responded, “This is the first time I’ve heard about this; you never told me before now. I don’t know who has done this.” '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Abraham took sheep and cattle, gave them to Abimelech, and the two men made a covenant.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abraham set apart from his flock seven ewe lambs, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Abimelech asked him, “What are you doing with these seven ewe lambs you have set apart?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham named his son Isaac, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: miracle
    - type: text
      text: ' son, whom Sarah bore him. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: I am giving them to you
    - type: text
      text: ', and by accepting these seven ewe lambs, you acknowledge the proof that I dug this well '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and it belongs to me
    - type: text
      text: '.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That place was called Beersheba, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Beersheba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated either “well of seven [lambs]” or “well of the oath.”
      marker-yv: yv-n
    - type: text
      text: because it was there that both men swore an oath to one another.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After completing their pact at Beersheba, King Abimelech and Phicol, his army commander, departed and returned to Philistine country. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham planted a tamarisk tree '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A tamarisk tree is a type of evergreen that can grow up to fifty feet. Abraham did not plant the tamarisk tree for landscaping; it was a statement proclaiming his faith. Planting the tree revealed Abraham’s faith and endurance until the time of fruitfulness (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 65:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'in Beersheba, and there he worshiped '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the everlasting God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “El Olam,” which means “God Eternal,” “the Hidden God,” or “the Always God” (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 90:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This name proclaims that God is God over Eternity and God over eternal things. Abraham’s heart and focus were turning to the God of Eternity. The things of the earth were growing meaningless to him (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 John 2:15–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). El Olam was preparing Abraham to yield his greatest treasure, his son. Only one whose heart is fixed on eternity can ever make sacrifices pleasing to God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). When we see the Eternal One, we can let go of temporary things. Abraham touched eternal life as he dwelt by the tamarisk tree and the well. This was his true preparation for giving up Isaac.
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Abraham lived many years '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in peace
    - type: text
      text: ' as a foreigner in Philistine country.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Isaac was eight days old, Abraham circumcised him, as God had commanded him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham was one hundred years old when his son Isaac was born. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sarah said, “God has brought me laughter, and everyone who hears about this will laugh '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse contains a double allusion to the name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Isaac
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “he laughed.” Every time Abraham and Sarah spoke Isaac’s name, they acknowledged the miracle of God. The name'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yitzhak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Isaac) is the word for “laughter” but in the past tense. It could be translated “delayed laughter.” If you had a baby after turning one hundred, you might laugh too! Notice the details of Isaac’s birth and how they foreshadow the birth of our Lord Jesus: (1) Both sons were the promised seed—'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (2) Both were long awaited—
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 12:5–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 21:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (3) Both had mothers who asked questions—
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 18:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 1:34–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (4) Both had names given before birth—
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (5) Both births were miraculous—
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 21:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (6) Both sons were a delight to their father—
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'with me.” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And she added,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who would ever have told Abraham
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that Sarah would one day nurse children!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though Abraham is an old man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: look—I have given him a son!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hagar and Ishmael Sent Away
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Isaac grew and was weaned; and on the day Sarah weaned him, Abraham prepared a great feast. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Sarah noticed the son of Hagar, the Egyptian, was mocking '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used here is built on the root stem from the name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Isaac
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is possible to translate it “jesting,” “playing,” or “making fun of [Isaac].” Regardless, Sarah saw it as a threat to her son. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 4:21–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: her son Isaac
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:9
      - type: usfm
        marker: ft
        children:
