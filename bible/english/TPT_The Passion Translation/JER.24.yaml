  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'I will give them a willing heart to know that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. They will be my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: beloved
  - type: text
    text: ' people, and I will be their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loving
  - type: text
    text: ' God, for they will return to me with every passion of their heart.'
  - type: usfm
