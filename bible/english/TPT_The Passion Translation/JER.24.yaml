document_id: JER.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Vision of Two Baskets of Figs
  - type: text
    content: Yahweh
  - type: text
    content: ' opened my eyes to see a supernatural vision. It happened after King Nebuchadnezzar of Babylon had taken into captivity Jehoiakim’s son King Jeconiah, his officials, and all artisans and skilled workers '
  - type: note
    content: Or “blacksmiths and metalworkers.” The Septuagint has “prisoners and the wealthy.”
  - type: text
    content: 'and brought them to Babylon. '
  - type: note
    content: See Jer. 29:1–2; 2 Kings 24:12, 14.
  - type: text
    content: 'In this vision, I saw two baskets of figs placed in front of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple. '
  '10':
  - type: text
    content: I will send the sword, food shortages, and plague against them until they have vanished from the land I gave to them and their ancestors.’ ”
  - type: note
    content: 'This chapter gives an allegorical vision of the two baskets of figs: one good, one rotten. The good figs represent the people who are taken into Babylonian captivity, including Ezekiel and Daniel. The rotten figs represent those who remained in Jerusalem (including Zedekiah), who were mockers of Jeremiah and his prophecies of the coming exile (see 2 Chron. 36:14–16). God would show grace and watch over those in captivity, while severely punishing those who remained behind in Judah.'
  '2':
  - type: text
    content: 'One basket was full of excellent figs that ripened early, '
  - type: note
    content: First-ripe figs, usually appearing in June, are a delicacy. See Isa. 28:4; Hos. 9:10.
  - type: text
    content: and the other was full of rotten figs that were not fit to eat.
  '3':
  - type: text
    content: '“Jeremiah,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' asked, “what do you see?”'
  - type: text
    content: “Figs,” I said. “Some are very good, but the others are very bad, too rotten to eat.”
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' replied, '
  '5':
  - type: text
    content: '“This is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, say to you: ‘The good figs are the people of Judah whom I sent away in exile to Babylon. '
  - type: note
    content: Or “the land of the Chaldeans.”
  '6':
  - type: text
    content: 'My eyes will '
  - type: text
    content: compassionately
  - type: text
    content: ' watch over them for their good, '
  - type: note
    content: See Gen. 50:20.
  - type: text
    content: 'to bring them back to this land, to build them up and not to tear them down, to plant them and not to uproot them. '
  - type: note
    content: See Jer. 1:10; Ezek. 11:14–21.
  '7':
  - type: text
    content: 'I will give them a willing heart to know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. They will be my '
  - type: text
    content: beloved
  - type: text
    content: ' people, and I will be their '
  - type: text
    content: loving
  - type: text
    content: ' God, for they will return to me with every passion of their heart.'
  - type: note
    content: See Jer. 31:31–34; 32:39.
  '8':
  - type: text
    content: '“ ‘As for the bad figs that were too rotten to eat, they represent King Zedekiah of Judah, his officials, and all the others left in Jerusalem who were not taken away to Babylon, whether they stayed here in Judah or went to live in Egypt. '
  '9':
  - type: text
    content: 'I will punish them with such a disaster that everyone on earth will tremble in horror when they hear about it. I will force the people of Judah to go to foreign countries, where they will be an object of scorn, cursing, and insult. '
  - type: note
    content: See Deut. 28:37.
