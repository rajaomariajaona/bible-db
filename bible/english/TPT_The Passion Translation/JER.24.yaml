- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“ ‘As for the bad figs that were too rotten to eat, they represent King Zedekiah of Judah, his officials, and all the others left in Jerusalem who were not taken away to Babylon, whether they stayed here in Judah or went to live in Egypt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'I will punish them with such a disaster that everyone on earth will tremble in horror when they hear about it. I will force the people of Judah to go to foreign countries, where they will be an object of scorn, cursing, and insult. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 28:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I will send the sword, food shortages, and plague against them until they have vanished from the land I gave to them and their ancestors.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This chapter gives an allegorical vision of the two baskets of figs: one good, one rotten. The good figs represent the people who are taken into Babylonian captivity, including Ezekiel and Daniel. The rotten figs represent those who remained in Jerusalem (including Zedekiah), who were mockers of Jeremiah and his prophecies of the coming exile (see'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 36:14–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God would show grace and watch over those in captivity, while severely punishing those who remained behind in Judah.
    marker-yv: yv-n
