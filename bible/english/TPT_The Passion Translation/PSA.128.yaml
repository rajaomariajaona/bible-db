document_id: PSA.128,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Blessings of the Lord
  - type: text
    content: A song of the stairway
  - type: text
    content: How joyous are those who love the Lord and bow low before God,
  - type: text
    content: ready to obey him!
  '2':
  - type: text
    content: Your reward will be prosperity, happiness, and well-being.
  '3':
  - type: text
    content: Your wife will bless your heart and home.
  - type: text
    content: Your children will bring you joy as they gather around your table.
  '4':
  - type: text
    content: Yes, this is God’s generous reward for those who love him.
  '5':
  - type: text
    content: May the Lord bless you out of his Zion-glory!
  - type: text
    content: May you see the prosperity of Jerusalem
  - type: text
    content: throughout your lifetime.
  '6':
  - type: text
    content: And may you be surrounded by your grandchildren.
  - type: text
    content: Happiness to you! And happiness to Israel!
