document_id: PSA.128,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Blessings of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How joyous are those who love the Lord and bow low before God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to obey him!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your reward will be prosperity, happiness, and well-being.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wife will bless your heart and home.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your children will bring you joy as they gather around your table.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, this is God’s generous reward for those who love him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the Lord bless you out of his Zion-glory!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May you see the prosperity of Jerusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: throughout your lifetime.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And may you be surrounded by your grandchildren.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Happiness to you! And happiness to Israel!
