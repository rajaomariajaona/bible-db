document_id: PSA.128
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Blessings of the Lord
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of the stairway
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: How joyous are those who love the Lord and bow low before God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ready to obey him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Your reward will be prosperity, happiness, and well-being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your wife will bless your heart and home.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your children will bring you joy as they gather around your table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Yes, this is God’s generous reward for those who love him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May the Lord bless you out of his Zion-glory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: May you see the prosperity of Jerusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: throughout your lifetime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And may you be surrounded by your grandchildren.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Happiness to you! And happiness to Israel!
