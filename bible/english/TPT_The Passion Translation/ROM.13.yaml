document_id: ROM.13
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Our Relationship to Civil Authorities
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Every person must submit to and support the authorities over him. For there can be no authority in the universe except by God’s appointment, which means that every authority that exists has been instituted by God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So to resist authority is to resist the divine order of God, which results in severe consequences. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For civil authorities don’t intimidate those who are doing good, but those who are doing evil. So do what is right and you’ll never need to fear those in authority. They will commend you for your good citizenship.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Those in authority are God’s servants for the good of society. But if you break the law, you have reason to be alarmed, for they are God’s agents of punishment to bring criminals to justice. Why do you think they carry weapons? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You are compelled to obey them, not just to avoid punishment, but because you want to live with a clean conscience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This is also the reason you pay your taxes, for governmental authorities are God’s officials who oversee these things. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So it is your duty to pay all the taxes and fees that they require and to respect those who are worthy of respect, honoring them accordingly.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was often maligned for being “the friend of tax-collectors” (publicans).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Don’t owe anything to anyone, except your outstanding debt to continually love one another, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a pronounced play on words in the Aramaic. The Aramaic word for “owe” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: khob
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and the word for “love” is'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: khab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'for the one who learns to love has fulfilled every requirement of the law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For the commandments, “Do not commit adultery, do not murder, do not steal, do not covet,” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 20:13–17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and every other commandment can be summed up in these words:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Love and value others the same way you love and value yourself.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 19:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 13:4–6
      metadata:
        usfm: 1CO.13.4+1CO.13.5+1CO.13.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 5:6
      metadata:
        usfm: GAL.5.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Love makes it impossible to harm another, so love fulfills all that the law requires.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Living in the Light
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'To live like this is all the more urgent, for time is running out and you know it is a strategic hour in human history. It is time for us to wake up! For our full salvation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “perfect wholeness.” There is a full salvation ready to be unveiled and unfolded in the last days. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 1:5
      metadata:
        usfm: 1PE.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: is nearer now than when we first believed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Night’s darkness is dissolving away as a new day of destiny dawns. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 John 2:8
      metadata:
        usfm: 1JN.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'So we must once and for all strip away what is done in the shadows of darkness, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: removing it like filthy clothes
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the text and supplied to show the contrast of “clothe ourselves” in the next sentence.
    marker-yv: yv-n
  - type: text
    text: 'And once and for all we clothe ourselves with the radiance of light as our weapon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'We must live honorably, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “We walk with the Designer.”
    marker-yv: yv-n
  - type: text
    text: 'surrounded by the light of this new day, not in the darkness of drunkenness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This word includes intoxication by any substance.
    marker-yv: yv-n
  - type: text
    text: 'and debauchery, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “festive processions” (often to celebrate false deities), “orgies,” “revelries,” “carousings.”
    marker-yv: yv-n
  - type: text
    text: 'not in promiscuity and sensuality, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “outrageous behavior,” “loose conduct,” “indecencies.”
    marker-yv: yv-n
  - type: text
    text: not being argumentative or jealous of others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Instead fully immerse yourselves into '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fully clothed with.”
    marker-yv: yv-n
  - type: text
    text: the Lord Jesus, the Anointed One, and don’t waste even a moment’s thought on your former identity to awaken its selfish desires.
