document_id: ROM.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our Relationship to Civil Authorities
  - type: text
    content: 'Every person must submit to and support the authorities over him. For there can be no authority in the universe except by God’s appointment, which means that every authority that exists has been instituted by God. '
  '10':
  - type: text
    content: Love makes it impossible to harm another, so love fulfills all that the law requires.
  - type: heading
    content: Living in the Light
  '11':
  - type: text
    content: 'To live like this is all the more urgent, for time is running out and you know it is a strategic hour in human history. It is time for us to wake up! For our full salvation '
  - type: note
    content: Or “perfect wholeness.” There is a full salvation ready to be unveiled and unfolded in the last days. See 1 Peter 1:5.
  - type: text
    content: is nearer now than when we first believed.
  '12':
  - type: text
    content: 'Night’s darkness is dissolving away as a new day of destiny dawns. '
  - type: note
    content: See 1 John 2:8.
  - type: text
    content: 'So we must once and for all strip away what is done in the shadows of darkness, '
  - type: text
    content: removing it like filthy clothes
  - type: text
    content: '. '
  - type: note
    content: Implied in the text and supplied to show the contrast of “clothe ourselves” in the next sentence.
  - type: text
    content: 'And once and for all we clothe ourselves with the radiance of light as our weapon. '
  '13':
  - type: text
    content: 'We must live honorably, '
  - type: note
    content: The Aramaic can be translated “We walk with the Designer.”
  - type: text
    content: 'surrounded by the light of this new day, not in the darkness of drunkenness '
  - type: note
    content: This word includes intoxication by any substance.
  - type: text
    content: 'and debauchery, '
  - type: note
    content: Or “festive processions” (often to celebrate false deities), “orgies,” “revelries,” “carousings.”
  - type: text
    content: 'not in promiscuity and sensuality, '
  - type: note
    content: Or “outrageous behavior,” “loose conduct,” “indecencies.”
  - type: text
    content: not being argumentative or jealous of others.
  '14':
  - type: text
    content: 'Instead fully immerse yourselves into '
  - type: note
    content: Or “fully clothed with.”
  - type: text
    content: the Lord Jesus, the Anointed One, and don’t waste even a moment’s thought on your former identity to awaken its selfish desires.
  '2':
  - type: text
    content: 'So to resist authority is to resist the divine order of God, which results in severe consequences. '
  '3':
  - type: text
    content: For civil authorities don’t intimidate those who are doing good, but those who are doing evil. So do what is right and you’ll never need to fear those in authority. They will commend you for your good citizenship.
  '4':
  - type: text
    content: 'Those in authority are God’s servants for the good of society. But if you break the law, you have reason to be alarmed, for they are God’s agents of punishment to bring criminals to justice. Why do you think they carry weapons? '
  '5':
  - type: text
    content: You are compelled to obey them, not just to avoid punishment, but because you want to live with a clean conscience.
  '6':
  - type: text
    content: 'This is also the reason you pay your taxes, for governmental authorities are God’s officials who oversee these things. '
  '7':
  - type: text
    content: So it is your duty to pay all the taxes and fees that they require and to respect those who are worthy of respect, honoring them accordingly.
  - type: note
    content: Jesus was often maligned for being “the friend of tax-collectors” (publicans).
  '8':
  - type: text
    content: 'Don’t owe anything to anyone, except your outstanding debt to continually love one another, '
  - type: note
    content: There is a pronounced play on words in the Aramaic. The Aramaic word for “owe” is khob, and the word for “love” is khab.
  - type: text
    content: 'for the one who learns to love has fulfilled every requirement of the law. '
  '9':
  - type: text
    content: 'For the commandments, “Do not commit adultery, do not murder, do not steal, do not covet,” '
  - type: note
    content: See Ex. 20:13–17.
  - type: text
    content: 'and every other commandment can be summed up in these words:'
  - type: text
    content: “Love and value others the same way you love and value yourself.”
  - type: note
    content: See Lev. 19:18; 1 Cor. 13:4–6; Gal. 5:6.
