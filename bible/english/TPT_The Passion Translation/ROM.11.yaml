document_id: ROM.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Will Not Forget His Promises to Israel
  - type: text
    content: 'So then I ask you this question: did God really push aside and reject his people? '
  - type: note
    content: See 1 Sam. 12:22; Ps. 94:14.
  - type: text
    content: 'Absolutely not! For I myself am a Jew, a descendant of Abraham, from the tribe of Benjamin. '
  - type: note
    content: Benjamin was the only son of Jacob born in the promised land, and his was the first tribe to give Israel a king in Saul. And his was the only tribe to remain with Judah in the restored nation after the exile. Paul is saying that he is about as Jewish as anyone could ever be. See Phil. 3:5.
  '10':
  - type: text
    content: Blindfold their eyes and don’t let them see.
  - type: text
    content: Let them be stooped over continually.
  - type: note
    content: This could also be a metaphor of asking God to punish them. See Ps. 69:22–23 (LXX).
  - type: heading
    content: The Restoration of Israel
  '11':
  - type: text
    content: 'So, am I saying that Israel stumbled so badly that they will never get back up? Certainly not! Rather, it was because of their stumble that salvation now extends to all the non-Jewish people, in order to make Israel jealous and desire the very things that God has freely given them. '
  '12':
  - type: text
    content: 'So if all the world is being greatly enriched through their failure, and through their fall great spiritual wealth is given to the non-Jewish people, imagine how much more will Israel’s awakening '
  - type: note
    content: Or “fullness” (of restoration), or “full inclusion,” or “full number.” An ellipsis in the Greek text allows for different translations of this verse.
  - type: text
    content: bring to us all!
  '13':
  - type: text
    content: 'Now, I speak to you who are not Jewish, since I am an apostle to reach the non-Jewish people. And I draw attention to this ministry as much as I can when I am among the Jews, '
  '14':
  - type: text
    content: hoping to make them jealous of what God has given to those who are not Jews, winning some of my people to salvation.
  '15':
  - type: text
    content: 'For if their '
  - type: text
    content: temporary
  - type: text
    content: ' rejection released the reconciling power of grace into the world, what will happen when Israel is reinstated and reconciled to God? It will unleash resurrection power throughout the whole earth!'
  - type: heading
    content: A Warning to Non-Jewish Believers
  '16':
  - type: text
    content: 'Since Abraham and the patriarchs are consecrated and set apart for God, so also will their descendants be set apart. '
  - type: note
    content: Paul uses a metaphor that is better understood when made explicit. The Greek is literally “If the first portion of the dough [Abraham and the patriarchs] is consecrated, so too is the entire batch of dough [those descended from Abraham and the patriarchs].” The principle is that if the first portion is dedicated to God, the rest belongs to him too and is also considered consecrated for God’s use. The Aramaic can be translated “If the crust is holy, so also is the dough.”
  - type: text
    content: If the roots of a tree are holy and set apart for God, so too will be the branches.
  '17':
  - type: text
    content: 'However, some of the branches have been pruned away. And you, '
  - type: note
    content: Every time “you” is used in vv. 17–24 it is singular. God has lovingly and personally grafted you in as a branch in his tree of life. See John 15:1–17.
  - type: text
    content: 'who were once nothing more than a wild olive branch, God has grafted in—inserting you among the remaining branches as a joint partner to share in the wonderful richness of the cultivated olive stem. '
  '18':
  - type: text
    content: So don’t be so arrogant as to believe that you are superior to the natural branches. There’s no reason to boast, for the new branches don’t support the root, but you owe your life to the root that supports you!
  '19':
  - type: text
    content: 'You might begin to think that some branches were pruned or broken off just to make room for you. '
  '2':
  - type: text
    content: 'God has not rejected his chosen, destined people! '
  - type: note
    content: Or “his people whom he foreknew.”
  - type: text
    content: Haven’t you heard Elijah’s testimony in the Scriptures, and how he prays to God, agonizing over Israel?
  '20':
  - type: text
    content: 'Yes, that’s true. '
  - type: note
    content: The Aramaic can be translated “Yes, it’s beautiful!” Non-Jewish believers are to be grateful for the Jewish roots of our faith. Our Messiah is Jewish and the Scriptures we read were given to the beloved Jewish people. We feast on the new-covenant riches that have been handed down to us through the “olive tree” of Judaism.
  - type: text
    content: 'They were removed because of their unbelief. But remember this: you are only attached by your faith. So don’t be presumptuous, but stand in awe and reverence. '
  '21':
  - type: text
    content: Since God didn’t spare the natural branches that fell into unbelief, perhaps he won’t spare you either!
  '22':
  - type: text
    content: 'So fix your gaze on the simultaneous kindness '
  - type: note
    content: The Aramaic word for “kindness” can also be translated “sweetness.”
  - type: text
    content: 'and strict justice '
  - type: note
    content: The Greek word apotomia is used only here in the New Testament. It is a play on words, for apotomia is a homonym that can mean “strict justice” or “cut off.”
  - type: text
    content: of God. How severely he treated those who fell into unbelief! Yet how tender and kind is his relationship with you. So keep on trusting in his kindness; otherwise, you also will be cut off.
  '23':
  - type: text
    content: 'God is more than ready to graft back in the natural branches when they turn from clinging to their unbelief to embracing faith. '
  '24':
  - type: text
    content: For if God grafted you in, even though you were taken from what is by nature a wild olive tree, how much more can he reconnect the natural branches by inserting them back into their own cultivated olive tree!
  - type: heading
    content: The Mystery of Israel’s Restoration
  '25':
  - type: text
    content: 'My beloved brothers and sisters, I want to share with you '
  - type: note
    content: 'The Greek text contains a litotes, a double negative: “I don’t want you to not know.”'
  - type: text
    content: 'a mystery '
  - type: note
    content: The Greek word for mystery, mystērion, is found twenty-eight times in the New Testament. It means a sacred secret, something that God has hidden from ancient times and that can only be revealed by God. Jesus teaches us that these mysteries are meant for us to perceive as part of our kingdom birthright. See Matt. 13:11. The mystery Paul unfolds for us here is the partial insensitivity of Israel, as well as her future salvation as part of God’s eternal plan for the nations.
  - type: text
    content: concerning Israel’s future. For understanding this mystery will keep you from thinking you already know everything.
  - type: text
    content: 'A partial and temporary hardening '
  - type: note
    content: The Greek word for hardening, porosis, can also mean stubbornness, an unwillingness to learn something new.
  - type: text
    content: 'to the gospel has come over Israel, which will last until the full number of non-Jews has come into God’s family. '
  '26':
  - type: text
    content: 'And then God will bring all of Israel to salvation! The prophecy will be fulfilled that says:'
  - type: text
    content: “Coming from Zion will be the Savior,
  - type: text
    content: and he will turn Jacob away from evil.
  - type: note
    content: The Aramaic can also mean “the evil one.” See Isa. 59:20–21.
  '27':
  - type: text
    content: For this is my covenant promise with them
  - type: text
    content: when I forgive their sins.”
  - type: note
    content: See Isa. 27:9.
  '28':
  - type: text
    content: 'Now, many of the Jews are opposed to the gospel, but their opposition has opened the door of the gospel to you who are not Jewish. Yet they are still greatly loved by God because their ancestors were divinely chosen to be his. '
  '29':
  - type: text
    content: And when God chooses someone and graciously imparts gifts to him, they are never rescinded.
  - type: note
    content: Or “the grace-gifts and calling of God are void of regret and without change in purpose.” See Isa. 27:9; Jer. 31:33–34.
  '3':
  - type: text
    content: “Lord, they’ve murdered your prophets; they’ve demolished your altars. Now I’m the only one left and they want to kill me!”
  - type: note
    content: See 1 Kings 19:10–14.
  '30':
  - type: text
    content: 'You who are not Jews were once rebels against God, but now, because of their disobedience, you have experienced God’s tender mercies. '
  '31':
  - type: text
    content: And now they are the rebels, and because of God’s tender mercies to you, you can open the door to them to share in and enjoy what God has given to us!
  '32':
  - type: text
    content: Actually, God considers all of humanity to be prisoners of their unbelief, so that he can unlock our hearts and show his tender mercies to all who come to him.
  '33':
  - type: text
    content: 'Who could ever wrap their minds around the riches of God, the depth of his wisdom, and the marvel of his perfect knowledge? Who could ever explain the wonder of his decisions '
  - type: note
    content: Or “judgments,” which does not necessarily imply something negative.
  - type: text
    content: or search out the mysterious way he carries out his plans?
  '34':
  - type: text
    content: For who has discovered how the Lord thinks
  - type: text
    content: or is wise enough to be the one
  - type: text
    content: to advise him in his plans?
  - type: note
    content: See Isa. 40:13.
  '35':
  - type: text
    content: 'Or:'
  - type: text
    content: “Who has ever first given something to God
  - type: text
    content: that obligates God to owe him something in return?”
  - type: note
    content: See Job 41:11.
  '36':
  - type: text
    content: For out of him, the sustainer of everything, came everything, and now everything finds fulfillment in him. May all praise and honor be given to him forever! Amen!
  '4':
  - type: text
    content: 'But what was the revelation '
  - type: note
    content: Or “divine utterance.” This is the only place in the New Testament this Greek word appears. It could imply the audible voice of God that spoke to Elijah.
  - type: text
    content: God spoke to him in response?
  - type: text
    content: “
  - type: text
    content: You are not alone
  - type: text
    content: . For I have preserved a remnant for myself—seven thousand others who are faithful and have refused to worship Baal.”
  - type: note
    content: See 1 Kings 19:18.
  '5':
  - type: text
    content: 'And that is but one example of what God is doing in this age of fulfillment, for God’s grace empowers his chosen remnant. '
  '6':
  - type: text
    content: And since it is by God’s grace, it can’t be a matter of their good works; otherwise, it wouldn’t be a gift of grace, but earned by human effort.
  '7':
  - type: text
    content: 'So then, Israel failed to achieve what it had strived for, but the divinely chosen remnant receives it by grace, while the rest were hardened '
  - type: text
    content: and unable to receive the truth
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Just as it is written:'
  - type: text
    content: God granted them a spirit of deep slumber.
  - type: note
    content: The Aramaic can be translated “a spirit of frustration.”
  - type: text
    content: He closed their eyes to the truth
  - type: text
    content: and prevented their ears from hearing
  - type: note
    content: Or “He gave them eyes that could not see and ears that could not hear.” See Deut. 29:4; Isa. 6:10; 29:10–13.
  - type: text
    content: up to this very day.
  '9':
  - type: text
    content: 'And King David also prophesied this:'
  - type: text
    content: 'May their table '
  - type: note
    content: This could also be a metaphor for their false security, being in a place of well-being and favor. King David’s son Absalom held a banquet as a pretense to murder his brother Amnon. See 2 Sam. 13:23–31.
  - type: text
    content: prove to be a snare
  - type: text
    content: and a trap to cause their ruin.
  - type: text
    content: Bring them the retribution they deserve.
