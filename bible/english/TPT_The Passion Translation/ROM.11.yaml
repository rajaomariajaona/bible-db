document_id: ROM.11
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Will Not Forget His Promises to Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So then I ask you this question: did God really push aside and reject his people? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 12:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 94:14
      metadata:
        usfm: PSA.94.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Absolutely not! For I myself am a Jew, a descendant of Abraham, from the tribe of Benjamin. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Benjamin was the only son of Jacob born in the promised land, and his was the first tribe to give Israel a king in Saul. And his was the only tribe to remain with Judah in the restored nation after the exile. Paul is saying that he is about as Jewish as anyone could ever be. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 3:5
      metadata:
        usfm: PHP.3.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'God has not rejected his chosen, destined people! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “his people whom he foreknew.”
    marker-yv: yv-n
  - type: text
    text: Haven’t you heard Elijah’s testimony in the Scriptures, and how he prays to God, agonizing over Israel?
- type: usfm
  marker: mi
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Lord, they’ve murdered your prophets; they’ve demolished your altars. Now I’m the only one left and they want to kill me!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 19:10–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But what was the revelation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “divine utterance.” This is the only place in the New Testament this Greek word appears. It could imply the audible voice of God that spoke to Elijah.
    marker-yv: yv-n
  - type: text
    text: God spoke to him in response?
- type: usfm
  marker: mi
  children:
  - type: text
    text: “
  - type: usfm
    marker: it
    children:
    - type: text
      text: You are not alone
  - type: text
    text: . For I have preserved a remnant for myself—seven thousand others who are faithful and have refused to worship Baal.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 19:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And that is but one example of what God is doing in this age of fulfillment, for God’s grace empowers his chosen remnant. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And since it is by God’s grace, it can’t be a matter of their good works; otherwise, it wouldn’t be a gift of grace, but earned by human effort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So then, Israel failed to achieve what it had strived for, but the divinely chosen remnant receives it by grace, while the rest were hardened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and unable to receive the truth
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Just as it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God granted them a spirit of deep slumber.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “a spirit of frustration.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He closed their eyes to the truth
- type: usfm
  marker: q1
  children:
  - type: text
    text: and prevented their ears from hearing
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He gave them eyes that could not see and ears that could not hear.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 29:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 6:10
      metadata:
        usfm: ISA.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 29:10–13
      metadata:
        usfm: ISA.29.10+ISA.29.11+ISA.29.12+ISA.29.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: up to this very day.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And King David also prophesied this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'May their table '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This could also be a metaphor for their false security, being in a place of well-being and favor. King David’s son Absalom held a banquet as a pretense to murder his brother Amnon. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 13:23–31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: prove to be a snare
- type: usfm
  marker: q1
  children:
  - type: text
    text: and a trap to cause their ruin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring them the retribution they deserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Blindfold their eyes and don’t let them see.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be stooped over continually.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This could also be a metaphor of asking God to punish them. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 69:22–23
      metadata:
        usfm: PSA.69.22+PSA.69.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (LXX).
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Restoration of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So, am I saying that Israel stumbled so badly that they will never get back up? Certainly not! Rather, it was because of their stumble that salvation now extends to all the non-Jewish people, in order to make Israel jealous and desire the very things that God has freely given them. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'So if all the world is being greatly enriched through their failure, and through their fall great spiritual wealth is given to the non-Jewish people, imagine how much more will Israel’s awakening '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fullness” (of restoration), or “full inclusion,” or “full number.” An ellipsis in the Greek text allows for different translations of this verse.
    marker-yv: yv-n
  - type: text
    text: bring to us all!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Now, I speak to you who are not Jewish, since I am an apostle to reach the non-Jewish people. And I draw attention to this ministry as much as I can when I am among the Jews, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: hoping to make them jealous of what God has given to those who are not Jews, winning some of my people to salvation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For if their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: temporary
  - type: text
    text: ' rejection released the reconciling power of grace into the world, what will happen when Israel is reinstated and reconciled to God? It will unleash resurrection power throughout the whole earth!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Warning to Non-Jewish Believers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Since Abraham and the patriarchs are consecrated and set apart for God, so also will their descendants be set apart. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul uses a metaphor that is better understood when made explicit. The Greek is literally “If the first portion of the dough [Abraham and the patriarchs] is consecrated, so too is the entire batch of dough [those descended from Abraham and the patriarchs].” The principle is that if the first portion is dedicated to God, the rest belongs to him too and is also considered consecrated for God’s use. The Aramaic can be translated “If the crust is holy, so also is the dough.”
    marker-yv: yv-n
  - type: text
    text: If the roots of a tree are holy and set apart for God, so too will be the branches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'However, some of the branches have been pruned away. And you, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Every time “you” is used in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17–24
      metadata:
        usfm: ROM.11.17+ROM.11.18+ROM.11.19+ROM.11.20+ROM.11.21+ROM.11.22+ROM.11.23+ROM.11.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: it is singular. God has lovingly and personally grafted you in as a branch in his tree of life. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 15:1–17
      metadata:
        usfm: JHN.15.1+JHN.15.2+JHN.15.3+JHN.15.4+JHN.15.5+JHN.15.6+JHN.15.7+JHN.15.8+JHN.15.9+JHN.15.10+JHN.15.11+JHN.15.12+JHN.15.13+JHN.15.14+JHN.15.15+JHN.15.16+JHN.15.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'who were once nothing more than a wild olive branch, God has grafted in—inserting you among the remaining branches as a joint partner to share in the wonderful richness of the cultivated olive stem. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So don’t be so arrogant as to believe that you are superior to the natural branches. There’s no reason to boast, for the new branches don’t support the root, but you owe your life to the root that supports you!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You might begin to think that some branches were pruned or broken off just to make room for you. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Yes, that’s true. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Yes, it’s beautiful!” Non-Jewish believers are to be grateful for the Jewish roots of our faith. Our Messiah is Jewish and the Scriptures we read were given to the beloved Jewish people. We feast on the new-covenant riches that have been handed down to us through the “olive tree” of Judaism.
    marker-yv: yv-n
  - type: text
    text: 'They were removed because of their unbelief. But remember this: you are only attached by your faith. So don’t be presumptuous, but stand in awe and reverence. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Since God didn’t spare the natural branches that fell into unbelief, perhaps he won’t spare you either!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So fix your gaze on the simultaneous kindness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word for “kindness” can also be translated “sweetness.”
    marker-yv: yv-n
  - type: text
    text: 'and strict justice '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 11:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apotomia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is used only here in the New Testament. It is a play on words, for
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: apotomia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a homonym that can mean “strict justice” or “cut off.”
    marker-yv: yv-n
  - type: text
    text: of God. How severely he treated those who fell into unbelief! Yet how tender and kind is his relationship with you. So keep on trusting in his kindness; otherwise, you also will be cut off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'God is more than ready to graft back in the natural branches when they turn from clinging to their unbelief to embracing faith. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For if God grafted you in, even though you were taken from what is by nature a wild olive tree, how much more can he reconnect the natural branches by inserting them back into their own cultivated olive tree!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Mystery of Israel’s Restoration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
