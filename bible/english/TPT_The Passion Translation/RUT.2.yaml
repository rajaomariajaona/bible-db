verses:
  '1':
  - type: heading
    content: Ruth Gathers Grain in the Field of Boaz
  - type: text
    content: 'Naomi’s '
  - type: text
    content: deceased
  - type: text
    content: ' husband, Elimelech, had a very wealthy relative, an honorable and prominent man '
  - type: note
    content: The description “honorable and prominent” comes from the Hebrew word chayil. Chayil can also mean “victorious,” “powerful,” “like an army,” or “full of substance.” Thus Boaz was a “mighty man of valor” or “valiant warrior.” (We might say, “a knight in shining armor.”)
  - type: text
    content: 'in Bethlehem named Boaz. '
  - type: note
    content: Boaz means “strength.” He is a prophetic figure of Jesus Christ, our older Brother (see Rom. 8:29; Heb. 2:6–13) and Kinsman-Redeemer (see 1 Pet. 1:18–19). “Boaz” was also the name of the left pillar of Solomon’s Temple (2 Chron. 3:17). Boaz was a wealthy nobleman. Similarly, Jesus Christ is indeed the One who has made us “rich beyond measure” (2 Cor. 8:9; see Eph. 1:3).
  '10':
  - type: text
    content: Astounded
  - type: text
    content: ', Ruth bowed low with her face to the ground, and said to him, “I’m a foreigner. Why have you been so kind and taken notice of me?”'
  '11':
  - type: text
    content: 'Boaz answered, “I’ve heard all about what you’ve done for your mother-in-law since the death of your husband. I know your story—how you left your father and mother and your native land and came to a people and a culture that must seem strange to you. '
  '12':
  - type: text
    content: 'May '
  - type: text
    content: Yahweh
  - type: text
    content: ' reward you for your sacrifices, and because of what you’ve done, may you have a full and rich reward from '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, under whose wings you have come to find shelter!”'
  '13':
  - type: text
    content: 'Ruth replied, “May I continue to find favor in your sight, kind sir. You have spoken to my heart kind and reassuring words that comfort me, even though I am not '
  - type: text
    content: as worthy as
  - type: text
    content: ' one of your servant girls.”'
  '14':
  - type: text
    content: 'At mealtime, Boaz said to her, “Come here '
  - type: note
    content: Or “draw near.”
  - type: text
    content: 'and eat with us. Here is bread, and wine to dip it in.” '
  - type: note
    content: Read this sentence again and picture Jesus, your heavenly Boaz, inviting you to have communion (bread and wine) with him.
  - type: text
    content: Ruth immediately sat down with the workers. Boaz handed her some roasted grain, and she ate all she wanted until she was satisfied—she even had some left over.
  '15':
  - type: text
    content: 'After she had returned to gather grain, Boaz instructed his young men, “Let her glean even among the standing sheaves, and don’t disgrace her. '
  '16':
  - type: text
    content: 'Pull out from the bundles some handfuls of grain and drop them on purpose '
  - type: note
    content: These “handfuls of grain” dropped “on purpose” can signify the many extra blessings that fall upon us each day. We gather truths from Scripture for our needs each day, like Ruth gathered grain (see Matt. 13:1–23). Jesus, our heavenly Boaz, drops handfuls of revelation on purpose for us to gather an abundant supply. He wants us to know that he will provide all we need to meet the challenges of life. See 1 Kings 8:56; Ps. 103:5; Eph. 1:3; 3:20–21; Phil. 4:19.
  - type: text
    content: for her to gather, and don’t bother her.”
  '17':
  - type: text
    content: 'So Ruth gathered grain in Boaz’s field until evening. When she threshed out what she had gathered, it came to more than half a bushel of barley. '
  - type: note
    content: Or “an ephah of barley.” An ephah would weigh about thirty pounds.
  '18':
  - type: text
    content: She carried it back to town and showed her mother-in-law how much she had gleaned. Then Ruth also took out the roasted grain she had saved from mealtime and shared it with Naomi.
  '19':
  - type: text
    content: 'Her mother-in-law asked Ruth, “Where did you gather '
  - type: text
    content: all this from
  - type: text
    content: '? In whose field did you work? May '
  - type: text
    content: Yahweh
  - type: text
    content: ' bless the man who showed you special attention.”'
  - type: text
    content: She told her mother-in-law about all that happened that day, and said, “The man in whose field I gathered grain today is Boaz.”
  '2':
  - type: text
    content: 'One day Ruth the Moabite said to Naomi, “Let me go to the fields and pick up the leftover grain. Maybe someone will be kind enough '
  - type: note
    content: Or “Maybe I will find grace with someone.” See Gen. 6:8.
  - type: text
    content: to let me gather the grain he leaves behind.”
  - type: text
    content: 'Naomi said to her, “Go, my daughter.” '
  '20':
  - type: text
    content: Naomi said to Ruth, “
  - type: text
    content: Yahweh
  - type: text
    content: '’s loving-kindness has not left us either through life or through death! Boaz is closely related to us. He is a kinsman-redeemer '
  - type: note
    content: The Hebrew term ga’al means “kinsman-redeemer.” This term is used in various forms ten times throughout chs. 3–4. Ga’al signifies a legal function performed by a near relative. If a widow was childless, a close male relative was empowered to “redeem” her through marriage and buy back her property (see Lev. 25:25). This kinsman-redeemer ensured that the widow would not lose her inheritance rights and provided her with offspring. In the case of Naomi, she had other near relatives living in Bethlehem who would qualify to be her kinsman-redeemers, meaning that Boaz was perhaps one of several candidates.
  - type: text
    content: 'of our family. May '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: greatly
  - type: text
    content: ' bless '
  - type: text
    content: Boaz
  - type: text
    content: '!”'
  - type: note
    content: 'The Hebrew is somewhat ambiguous: “May he [Boaz] be blessed by Yahweh, whose loyal love has not forsaken the living or the dead.”'
  '21':
  - type: text
    content: Ruth the Moabite responded, “He even said to me, ‘Stay close by my servants until they have finished all my harvest.’ ”
  '22':
  - type: text
    content: 'Naomi replied, “It is best, my daughter, that you stay near his young women, otherwise you’ll '
  - type: text
    content: be alone
  - type: text
    content: ' and might be bothered in someone else’s field.” '
  '23':
  - type: text
    content: So Ruth worked alongside the young women who served Boaz. She lived with her mother-in-law and gleaned in Boaz’s fields until the end of the barley and wheat harvests.
  '3':
  - type: text
    content: 'So Ruth went to the fields to gather the grain the reapers left behind. '
  - type: note
    content: That there was grain left behind for the poor to pick up speaks to the covenant faithfulness of Boaz, who had instructed his workers to keep the commandment to care for the poor according to Deut. 24:19–22. God commanded this also to remind Israel that they were once slaves in Egypt who depended upon the generosity of Yahweh to feed them.
  - type: text
    content: 'It just so happened '
  - type: note
    content: The Hebrew reads “her chance” or “chanced.”
  - type: text
    content: 'that she found herself working at the edges of a field belonging to Boaz '
  - type: note
    content: The fields of Boaz may have included the shepherd’s field where the angels of glory announced Jesus’ birth. See Luke 2:8–14.
  - type: text
    content: 'of the family of Elimelech. '
  '4':
  - type: text
    content: 'At that moment, Boaz came from Bethlehem '
  - type: text
    content: to survey his harvest
  - type: text
    content: '. He greeted the harvesters, “May '
  - type: text
    content: Yahweh
  - type: text
    content: ' be with you.” '
  - type: note
    content: Jesus, too, came from Bethlehem to bless his harvesters. Today’s “harvesters” are the evangelists who go to the nations of the earth to preach the gospel of Jesus Christ. May Yahweh’s blessing indeed be upon them as they seek a global harvest of souls.
  - type: text
    content: 'They replied, “May '
  - type: text
    content: Yahweh
  - type: text
    content: ' bless you.” '
  '5':
  - type: text
    content: Noticing Ruth
  - type: text
    content: ', Boaz asked his foreman in charge of the harvesters, '
  - type: note
    content: The Holy Spirit is the Lord of the Harvest who equips and places each believer in the harvest fields where we will be the most effective. See Matt. 9:38.
  - type: text
    content: “Who is that young woman over there?”
  - type: note
    content: Or “To whom does that young woman belong?” Ruth could have been between twenty-four and twenty-nine years old at this time. Boaz may have been in his forties.
  '6':
  - type: text
    content: 'The foreman answered, “She’s a Moabite girl who came back with Naomi from the country of Moab. '
  '7':
  - type: text
    content: She asked for permission to gather the grain left behind by the reapers. Except for one short break, she’s been on her feet working in the field since early this morning.”
  '8':
  - type: text
    content: 'Boaz walked over to Ruth and said, “Listen, my daughter, don’t leave this field to glean somewhere else. Stay here in my field and follow the young women who work for me. '
  '9':
  - type: text
    content: Watch my harvesters to see into which fields they go to cut grain, and follow them. When you’re thirsty, go and drink from the water jugs that the young men have filled. I’ve warned the young men not to bother you.”
