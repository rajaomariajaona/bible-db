      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew reads “her chance” or “chanced.”
      marker-yv: yv-n
    - type: text
