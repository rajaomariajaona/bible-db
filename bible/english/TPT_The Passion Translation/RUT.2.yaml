      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That there was grain left behind for the poor to pick up speaks to the covenant faithfulness of Boaz, who had instructed his workers to keep the commandment to care for the poor according to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 24:19–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . God commanded this also to remind Israel that they were once slaves in Egypt who depended upon the generosity of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
