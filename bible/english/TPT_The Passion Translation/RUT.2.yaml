      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'of the family of Elimelech. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that moment, Boaz came from Bethlehem '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to survey his harvest
    - type: text
      text: '. He greeted the harvesters, “May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' be with you.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus, too, came from Bethlehem to bless his harvesters. Today’s “harvesters” are the evangelists who go to the nations of the earth to preach the gospel of Jesus Christ. May
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
