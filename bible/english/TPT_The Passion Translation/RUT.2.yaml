        text: .
    marker-yv: yv-n
  - type: text
    text: to let me gather the grain he leaves behind.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Naomi said to her, “Go, my daughter.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Ruth went to the fields to gather the grain the reapers left behind. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That there was grain left behind for the poor to pick up speaks to the covenant faithfulness of Boaz, who had instructed his workers to keep the commandment to care for the poor according to
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 24:19–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . God commanded this also to remind Israel that they were once slaves in Egypt who depended upon the generosity of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: to feed them.
    marker-yv: yv-n
  - type: text
    text: 'It just so happened '
  - type: usfm
