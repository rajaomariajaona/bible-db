      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ruth the Moabite responded, “He even said to me, ‘Stay close by my servants until they have finished all my harvest.’ ”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi replied, “It is best, my daughter, that you stay near his young women, otherwise you’ll '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be alone
    - type: text
      text: ' and might be bothered in someone else’s field.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ruth worked alongside the young women who served Boaz. She lived with her mother-in-law and gleaned in Boaz’s fields until the end of the barley and wheat harvests.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ruth went to the fields to gather the grain the reapers left behind. '
