    - type: text
      text: '4'
  - type: text
    text: 'At that moment, Boaz came from Bethlehem '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to survey his harvest
  - type: text
    text: '. He greeted the harvesters, “May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' be with you.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus, too, came from Bethlehem to bless his harvesters. Today’s “harvesters” are the evangelists who go to the nations of the earth to preach the gospel of Jesus Christ. May
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ’s blessing indeed be upon them as they seek a global harvest of souls.
    marker-yv: yv-n
  - type: text
    text: 'They replied, “May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' bless you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Noticing Ruth
  - type: text
    text: ', Boaz asked his foreman in charge of the harvesters, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Holy Spirit is the Lord of the Harvest who equips and places each believer in the harvest fields where we will be the most effective. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
