  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'So Ruth gathered grain in Boaz’s field until evening. When she threshed out what she had gathered, it came to more than half a bushel of barley. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “an ephah of barley.” An ephah would weigh about thirty pounds.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: She carried it back to town and showed her mother-in-law how much she had gleaned. Then Ruth also took out the roasted grain she had saved from mealtime and shared it with Naomi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Her mother-in-law asked Ruth, “Where did you gather '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all this from
  - type: text
    text: '? In whose field did you work? May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' bless the man who showed you special attention.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: She told her mother-in-law about all that happened that day, and said, “The man in whose field I gathered grain today is Boaz.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Naomi said to Ruth, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s loving-kindness has not left us either through life or through death! Boaz is closely related to us. He is a kinsman-redeemer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ga’al
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “kinsman-redeemer.” This term is used in various forms ten times throughout chs.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 3–4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ga’al
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: signifies a legal function performed by a near relative. If a widow was childless, a close male relative was empowered to “redeem” her through marriage and buy back her property (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 25:25
    - type: usfm
      marker: ft
