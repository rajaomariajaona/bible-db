  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ruth gathered grain in Boaz’s field until evening. When she threshed out what she had gathered, it came to more than half a bushel of barley. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
