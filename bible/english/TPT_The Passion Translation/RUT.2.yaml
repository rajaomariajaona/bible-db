    marker-yv: yv-n
  - type: text
    text: “Who is that young woman over there?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “To whom does that young woman belong?” Ruth could have been between twenty-four and twenty-nine years old at this time. Boaz may have been in his forties.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The foreman answered, “She’s a Moabite girl who came back with Naomi from the country of Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: She asked for permission to gather the grain left behind by the reapers. Except for one short break, she’s been on her feet working in the field since early this morning.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Boaz walked over to Ruth and said, “Listen, my daughter, don’t leave this field to glean somewhere else. Stay here in my field and follow the young women who work for me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Watch my harvesters to see into which fields they go to cut grain, and follow them. When you’re thirsty, go and drink from the water jugs that the young men have filled. I’ve warned the young men not to bother you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Astounded
  - type: text
    text: ', Ruth bowed low with her face to the ground, and said to him, “I’m a foreigner. Why have you been so kind and taken notice of me?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Boaz answered, “I’ve heard all about what you’ve done for your mother-in-law since the death of your husband. I know your story—how you left your father and mother and your native land and came to a people and a culture that must seem strange to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' reward you for your sacrifices, and because of what you’ve done, may you have a full and rich reward from '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, under whose wings you have come to find shelter!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ruth replied, “May I continue to find favor in your sight, kind sir. You have spoken to my heart kind and reassuring words that comfort me, even though I am not '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as worthy as
  - type: text
    text: ' one of your servant girls.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'At mealtime, Boaz said to her, “Come here '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “draw near.”
    marker-yv: yv-n
  - type: text
    text: 'and eat with us. Here is bread, and wine to dip it in.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Read this sentence again and picture Jesus, your heavenly Boaz, inviting you to have communion (bread and wine) with him.
    marker-yv: yv-n
  - type: text
    text: Ruth immediately sat down with the workers. Boaz handed her some roasted grain, and she ate all she wanted until she was satisfied—she even had some left over.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'After she had returned to gather grain, Boaz instructed his young men, “Let her glean even among the standing sheaves, and don’t disgrace her. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Pull out from the bundles some handfuls of grain and drop them on purpose '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These “handfuls of grain” dropped “on purpose” can signify the many extra blessings that fall upon us each day. We gather truths from Scripture for our needs each day, like Ruth gathered grain (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:1–23
      metadata:
        usfm: MAT.13.1+MAT.13.2+MAT.13.3+MAT.13.4+MAT.13.5+MAT.13.6+MAT.13.7+MAT.13.8+MAT.13.9+MAT.13.10+MAT.13.11+MAT.13.12+MAT.13.13+MAT.13.14+MAT.13.15+MAT.13.16+MAT.13.17+MAT.13.18+MAT.13.19+MAT.13.20+MAT.13.21+MAT.13.22+MAT.13.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Jesus, our heavenly Boaz, drops handfuls of revelation on purpose for us to gather an abundant supply. He wants us to know that he will provide all we need to meet the challenges of life. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 8:56
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
