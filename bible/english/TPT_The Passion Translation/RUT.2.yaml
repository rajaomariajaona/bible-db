      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This kinsman-redeemer ensured that the widow would not lose her inheritance rights and provided her with offspring. In the case of Naomi, she had other near relatives living in Bethlehem who would qualify to be her kinsman-redeemers, meaning that Boaz was perhaps one of several candidates.
      marker-yv: yv-n
