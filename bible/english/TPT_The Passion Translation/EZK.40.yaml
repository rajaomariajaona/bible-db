  '14':
  - type: text
    content: 'He calculated the height of the porch, which led out to a courtyard, as sixty cubits high. '
  - type: note
    content: About 105 feet (32 meters). There are details here that may suggest an internal linear measurement, rather than a height dimension. However, these details are difficult to translate with precision, and there is common agreement that the Hebrew text of this verse is uncertain.
  '15':
  - type: text
    content: From the outside wall of the gate to the far side of the porch, he measured as fifty cubits.
  - type: note
