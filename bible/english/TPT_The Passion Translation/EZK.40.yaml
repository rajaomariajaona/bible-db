  '2':
  - type: text
    content: 'In an ecstatic vision from God, he carried me away to the land of Israel and put me down on a very high mountain. As I looked toward the south, there was a group of buildings that seemed to be a city. '
  '20':
  - type: text
    content: 'Behold, there was a gate in the outer courtyard that faced to the north. He measured its length and width. '
  '21':
  - type: text
    content: 'The length of the gateway was fifty cubits, and its width was twenty-five cubits. Its pillars and porch were of the same size as those of the first gate. It also had three guardrooms on each side. '
  '22':
  - type: text
    content: 'Its windows, its porch, and its palm trees were of the same measurement as those of the east gate. There were also seven steps leading up to it, '
  - type: note
    content: These seven steps leading up into the outer courtyard point to a progressive ascent into God’s presence. Additionally, there were eight more steps going from the outer courtyard up to the inner courtyard (see v. 31). The total of fifteen steps to ascend into God’s presence is seen in the Songs of Ascent (see Pss. 120–134 and first footnote on Ps. 120).
  - type: text
    content: 'and its porch was at the end facing the courtyard. '
  '23':
  - type: text
    content: In the inner court across from the north gate there was another gateway leading into the inner courtyard, just as there was opposite the east gate. He measured the distance from one gate to the other, and it was one hundred cubits.
