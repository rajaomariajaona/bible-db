  '47':
  - type: text
    content: Then he measured the inner courtyard. It was one hundred cubits long and one hundred cubits wide, a square with the altar standing in front of the temple.
  '48':
  - type: text
    content: 'Then he brought me to the entrance porch of the temple building, and he measured the gateposts of the porch. They were five cubits thick on either side, and the width of the gate was fourteen cubits. '
  - type: note
    content: About 24.5 feet (7.42 meters). The Hebrew (MT) omits the words “the width of the gate was fourteen cubits,” most likely by the occurrence of homoeoteleuton—a scribal error (homoeoteleuton occurs when two separate phrases or lines have identical endings, and the eye of the scribe slips from one to the other and omits the words in between). This reading is preserved in the Septuagint (LXX).
  - type: text
