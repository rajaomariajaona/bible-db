  '28':
  - type: text
    content: 'He then took me into the inner court by the south gate. He measured the south gate, and its dimensions were the same as the others. '
  '29':
  - type: text
    content: 'Its guardrooms, pillars, and porch were also the same size as the others. '
  '3':
  - type: text
    content: 'And when he brought me closer to the buildings, behold, I saw a man standing in the gateway. His appearance was shining and glistening like polished bronze. He held a linen cord and a measuring rod in his hand. '
  - type: note
    content: This was possibly a Christophany, a pre-incarnate appearing of the Lord Jesus Christ. He is the Measuring Man, who brings all into the full dimensions of his likeness (see Eph. 4:13). Bronze is a frequent biblical symbol for judgment, while linen (flax) is a symbol of righteousness. Jesus is coming to measure his temple. The measurements of his temple are exact (to show that the promise is certain), equal (to denote unity and harmony), and vast (to speak of majesty and grandeur).
  '30':
  - type: text
    content: 'There were porches '
  - type: note
    content: Or “vestibules,” which are narrow verandas or covered walkways on the inside of the wall of the inner courtyard.
  - type: text
    content: 'all around the gateway and each porch was fifty cubits long and five cubits wide. '
  - type: note
    content: A number of translations omit this verse as it is not found in the Septuagint and some Hebrew manuscripts.
  '31':
  - type: text
    content: The porches all faced the outer court with eight steps leading up to them. And palm trees were carved on the pillars of the corridor.
