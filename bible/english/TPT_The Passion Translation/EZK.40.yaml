  '1':
  - type: heading
    content: The Shining Measuring Man
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 40–42 constitutes panel C1 in the chiastic structure of the book. These chapters contain the visionary plans for the ideal temple, providing the perfect environment for Israel’s godly leaders in the new covenant age. These chapters then serve as a striking contrasting parallel with chs. 12–14 (panel C—specifically, 12:1–14:11), which deal with the corruption of Israel’s leaders and their condemnation and judgment. There is also here the implied desecration and destruction of the Jerusalem temple, along with the promised destruction of all cities and towns in the land (see 12:20). The final nine chapters are truly the culmination of the entire book. They detail the final restoration of Israel and the restored temple that brings blessing and life to the nations. To read Ezekiel without these last chapters is to miss the overarching message of hope, not judgment. Chapters 40–42 give us the details of the new temple and its courtyards. Chapter 43 shows God returning to dwell within his new temple, in the same way he left the old temple in ch. 11. Ezekiel begins and ends with a vision of God’s glory. For more on Ezekiel’s Temple, see “Interpreting Ezekiel’s Temple” in the introduction.
  - type: text
    content: 'In the first month of the twenty-fifth year of our captivity, on the tenth day of the month, and nearly fourteen years after the Babylonians captured Jerusalem, '
  - type: note
    content: The date of this chapter is probably September–October 573 BC. Some Jewish scholars believe that this was a Jubilee year (see Lev. 25), when the enslaved were given freedom and debts were canceled. Perhaps as it was “the tenth day of the month” this was also the Day of Atonement (see Lev. 16).
