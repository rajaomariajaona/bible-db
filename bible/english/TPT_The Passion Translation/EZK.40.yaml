  '16':
  - type: text
    content: 'On all the inside walls of the gateway were windows with narrow recesses all around. The walls of the guardrooms, the walls between them, and the walls of the porch likewise had windows all around. And there were palm trees '
  - type: note
    content: The palm tree is a symbol of praise and victory. They waved palm branches before King Jesus as he entered Jerusalem (see Matt. 21:1–11), and the overcoming saints in glory also celebrate with palm branches (see Rev. 7:9–17).
  - type: text
