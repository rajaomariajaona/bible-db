  '5':
  - type: text
    content: 'Behold, '
  - type: text
    content: I saw
  - type: text
    content: ' an outer wall surrounding the whole area where the temple stood. And the '
  - type: text
    content: shining
  - type: text
    content: ' man was holding a measuring reed, and its length was six long cubits, each cubit a forearm and a handbreadth. '
  - type: note
    content: The word cubit finds its origin in the Latin word cubitus, the word for the lower arm. A long cubit begins at the elbow and extends to the tip of the longest finger. The Hebrew word for cubit is ’ammah and literally means “mother of the arm.” These closing chapters of Ezekiel pose numerous difficulties including discrepancies and contradictions to the law found in the Pentateuch. The Rabbis of the Talmud (Menahot 45a) have stated that only Elijah himself would be able to decipher these difficulties when he comes. Additionally, it is difficult to be precise in the length of a cubit. Generally, a standard cubit is believed to be about 17.5 inches or 0.44 meters. A long cubit was a cubit plus a handbreadth (3.5 inches or 90 millimeters); in total about 21 inches or 0.53 meters. Unless otherwise noted, conversions from cubits to modern units in this translation will be calculated using the long cubit measurement. Based on this, the length of the measuring reed would be about 10.5 feet (3.2 meters).
  - type: text
    content: He measured the wall with the reed, and it was one reed high and one reed thick.
