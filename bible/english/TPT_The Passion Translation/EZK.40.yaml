  '46':
  - type: text
    content: 'And the chamber facing north is for the priests responsible for the sacrifices of the altar. These are the sons of Zadok, '
  - type: note
    content: Zadok was the faithful priest of David (see 2 Sam. 8:16–18), who separated himself from King Saul (a picture of the traditions of an old order that God has left) and was the high priest when Solomon’s Temple was built (see 1 Kings 1:38–39; 2:35). Zadok means “righteous” or “justified.” The name Zadok can also be found in the name Melchizedek (Melchizedek means “king of righteousness”). His lineage can be traced back to Phineas, a descendant of Eleazar, the son of Aaron (see 1 Chron. 24:3). God entered into a covenant with Phineas and promised him that he would have an everlasting priesthood (see Num. 25:13). All the priests had a ministry, but only the Zadokite priesthood could enter the Holy Place. Zadok’s descendants were the high priests in Jerusalem until the Babylonians destroyed the city and the temple during the days of Ezekiel.
  - type: text
    content: 'for only the sons of Levi are permitted to go into '
  - type: text
