document_id: PSA.30,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: He Healed Me
  - type: text
    content: King David’s poetic praise to God
  - type: text
    content: A song for the Feast of Dedication of the dwelling place
  - type: text
    content: Lord, I will exalt you and lift you high,
  - type: text
    content: for you have lifted me up on high!
  - type: text
    content: Over all my boasting, gloating enemies,
  - type: text
    content: you made me to triumph.
  '10':
  - type: text
    content: So hear me now, Lord; show me your famous mercy.
  - type: text
    content: O God, be my Savior and rescue me!
  '11':
  - type: text
    content: Then he broke through and transformed all my wailing
  - type: text
    content: into a whirling dance of ecstatic praise!
  - type: text
    content: He has torn the veil and lifted from me
  - type: text
    content: the sad heaviness of mourning.
  - type: text
    content: He wrapped me in the glory-garments of gladness.
  '12':
  - type: text
    content: How could I be silent when it’s time to praise you?
  - type: text
    content: Now my heart sings out, bursting with joy—
  - type: text
    content: a bliss inside that keeps me singing,
  - type: text
    content: “I can never thank you enough!”
  '2':
  - type: text
    content: O Lord, my healing God,
  - type: text
    content: I cried out for a miracle and you healed me!
  '3':
  - type: text
    content: You brought me back from the brink of death,
  - type: text
    content: from the depths below.
  - type: text
    content: Now here I am, alive and well, fully restored!
  '4':
  - type: text
    content: O sing and make melody, you steadfast lovers of God.
  - type: text
    content: Give thanks to him every time you reflect on his holiness!
  '5':
  - type: text
    content: I’ve learned that his anger lasts for a moment,
  - type: text
    content: but his loving favor lasts a lifetime!
  - type: note
    content: The Septuagint reads “There is wrath in his anger but life in his will [promise].”
  - type: text
    content: We may weep through the night,
  - type: text
    content: but at daybreak it will turn into shouts of ecstatic joy.
  '6':
  - type: text
    content: I remember boasting, “I’ve got it made!
  - type: text
    content: Nothing can stop me now!
  - type: text
    content: I’m God’s favored one; he’s made me steady as a mountain!”
  - type: text
    content: But then suddenly, you hid your face from me.
  - type: text
    content: I was panic-stricken and became depressed.
  '8':
  - type: text
    content: Still I cried out to you, Lord God. I shouted out for mercy, saying,
  '9':
  - type: text
    content: “What would you gain in my death,
  - type: text
    content: if I were to go down to the depths of darkness?
  - type: text
    content: Will a grave sing your song?
  - type: text
    content: How could death’s dust declare your faithfulness?”
