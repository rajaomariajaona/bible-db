document_id: PSA.30
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: He Healed Me
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s poetic praise to God
- type: usfm
  marker: d
  children:
  - type: text
    text: A song for the Feast of Dedication of the dwelling place
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, I will exalt you and lift you high,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you have lifted me up on high!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Over all my boasting, gloating enemies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you made me to triumph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Lord, my healing God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I cried out for a miracle and you healed me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You brought me back from the brink of death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the depths below.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now here I am, alive and well, fully restored!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O sing and make melody, you steadfast lovers of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give thanks to him every time you reflect on his holiness!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I’ve learned that his anger lasts for a moment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but his loving favor lasts a lifetime!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 30:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “There is wrath in his anger but life in his will [promise].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: We may weep through the night,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but at daybreak it will turn into shouts of ecstatic joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: I remember boasting, “I’ve got it made!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing can stop me now!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m God’s favored one; he’s made me steady as a mountain!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: But then suddenly, you hid your face from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I was panic-stricken and became depressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Still I cried out to you, Lord God. I shouted out for mercy, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “What would you gain in my death,
- type: usfm
  marker: q1
  children:
  - type: text
    text: if I were to go down to the depths of darkness?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Will a grave sing your song?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How could death’s dust declare your faithfulness?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So hear me now, Lord; show me your famous mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O God, be my Savior and rescue me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then he broke through and transformed all my wailing
- type: usfm
  marker: q1
  children:
  - type: text
    text: into a whirling dance of ecstatic praise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has torn the veil and lifted from me
- type: usfm
  marker: q1
  children:
  - type: text
    text: the sad heaviness of mourning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He wrapped me in the glory-garments of gladness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: How could I be silent when it’s time to praise you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now my heart sings out, bursting with joy—
- type: usfm
  marker: q1
  children:
  - type: text
    text: a bliss inside that keeps me singing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I can never thank you enough!”
