      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to deceive people into thinking they are genuine prophets. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, they will admit, ‘I am not a prophet. I have been living off the land '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I was bought as a slave.”
      marker-yv: yv-n
    - type: text
      text: 'as a farmer ever since my youth.’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if anyone asks him, ‘What are those scars on your back?’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “between your hands.”
      marker-yv: yv-n
    - type: text
      text: he will reply, ‘I was wounded in the house of my dear friends.’ ”
  - type: usfm
