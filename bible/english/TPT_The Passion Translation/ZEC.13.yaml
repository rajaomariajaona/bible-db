verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Cleansing Fountain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In that day, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ' will tear open a flowing fountain '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a spring.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 36:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 47:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This fountain will cleanse the leaders and people both morally and ritually. Although difficult to express in English, the verb “open” is not a simple verb form but a form of the verb “to be” plus a participle. This Hebrew verb construction implies that it is not a single act of opening a fountain but rather a continuous state in which, after the fountain is opened, it remains so constantly. Thus, a forever flowing fountain of grace and cleansing is available for us today. Your sin will not close that fountain once grace has opened it.
      marker-yv: yv-n
    - type: text
      text: for the family of David and the people of Jerusalem—a fountain to wash away sin and impurity.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Idolatry Removed from God’s People
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, declare: In that day, I will eliminate idolatry from the land, and no one will remember the names of idols anymore. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 2:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'I will also rid the land of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'false'
    - type: text
      text: ' prophets and unclean spirits. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: If the Hebrew clause is considered to be a hendiadys, it could be translated, “the false prophets moved by an unclean spirit.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, if anyone continues prophesying '
    - type: usfm
      marker: it
      children:
      - type: text
        text: falsely
    - type: text
      text: ', his parents who gave him life will say to him, ‘You must forfeit your life since you speak lies in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s name.’ And even while he is prophesying, his parents who gave him life will pierce him through.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In this context, the false prophets are those who turn God’s people to idolatry and who operate under the influence of a demonic (unclean) spirit. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 13:6–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The verb for “pierce” is a form of the same Hebrew verb as that used in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The implication is that the “Pierced One” of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was, in fact, a true prophet who had wrongly been killed because he was considered to be a false prophet.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In that day, every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'false'
    - type: text
      text: ' prophet will be ashamed to prophesy and share their so-called visions. No longer will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'false'
    - type: text
      text: ' prophets wear the coarse robe '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This coarse robe was apparently the garment typically worn by prophets of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 19:19
      - type: usfm
        marker: ft
