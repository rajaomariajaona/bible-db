document_id: ZEC.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cleansing Fountain
  - type: text
    content: '“In that day, '
  - type: text
    content: I
  - type: text
    content: ' will tear open a flowing fountain '
  - type: note
    content: Or “a spring.” See Isa. 12:3; Ezek. 36:25; 47:1. This fountain will cleanse the leaders and people both morally and ritually. Although difficult to express in English, the verb “open” is not a simple verb form but a form of the verb “to be” plus a participle. This Hebrew verb construction implies that it is not a single act of opening a fountain but rather a continuous state in which, after the fountain is opened, it remains so constantly. Thus, a forever flowing fountain of grace and cleansing is available for us today. Your sin will not close that fountain once grace has opened it.
  - type: text
    content: for the family of David and the people of Jerusalem—a fountain to wash away sin and impurity.”
  - type: heading
    content: Idolatry Removed from God’s People
  '2':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, declare: In that day, I will eliminate idolatry from the land, and no one will remember the names of idols anymore. '
  - type: note
    content: See Hos. 2:17.
  - type: text
    content: 'I will also rid the land of '
  - type: text
    content: 'false'
  - type: text
    content: ' prophets and unclean spirits. '
  - type: note
    content: If the Hebrew clause is considered to be a hendiadys, it could be translated, “the false prophets moved by an unclean spirit.”
  '3':
  - type: text
    content: 'Therefore, if anyone continues prophesying '
  - type: text
    content: falsely
  - type: text
    content: ', his parents who gave him life will say to him, ‘You must forfeit your life since you speak lies in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s name.’ And even while he is prophesying, his parents who gave him life will pierce him through.
  - type: note
    content: In this context, the false prophets are those who turn God’s people to idolatry and who operate under the influence of a demonic (unclean) spirit. See Deut. 13:6–10. The verb for “pierce” is a form of the same Hebrew verb as that used in Zech. 12:10. The implication is that the “Pierced One” of 12:10 was, in fact, a true prophet who had wrongly been killed because he was considered to be a false prophet.
  '4':
  - type: text
    content: '“In that day, every '
  - type: text
    content: 'false'
  - type: text
    content: ' prophet will be ashamed to prophesy and share their so-called visions. No longer will '
  - type: text
    content: 'false'
  - type: text
    content: ' prophets wear the coarse robe '
  - type: note
    content: This coarse robe was apparently the garment typically worn by prophets of God. See 1 Kings 19:19; 2 Kings 1:8; 2:12–13; Matt. 3:4.
  - type: text
    content: 'to deceive people into thinking they are genuine prophets. '
  '5':
  - type: text
    content: 'Instead, they will admit, ‘I am not a prophet. I have been living off the land '
  - type: note
    content: Or “I was bought as a slave.”
  - type: text
    content: 'as a farmer ever since my youth.’ '
  '6':
  - type: text
    content: 'And if anyone asks him, ‘What are those scars on your back?’ '
  - type: note
    content: Or “between your hands.”
  - type: text
    content: he will reply, ‘I was wounded in the house of my dear friends.’ ”
  - type: heading
    content: The Shepherd and His Sheep
  '7':
  - type: text
    content: “Awake my sword! Strike my shepherd!
  - type: text
    content: Strike the man who stands close to me,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: “If you strike the shepherd, the sheep will scatter.
  - type: note
    content: Jesus applied this prophecy to himself. See Matt. 26:31; Mark 14:27.
  - type: text
    content: I will even set myself against the young ones.
  - type: note
    content: “Young ones” may refer to the scattered flock, but more likely, it refers to young shepherd boys.
  '8':
  - type: text
    content: “So it will be, throughout the land,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: '“Two-thirds '
  - type: note
    content: The phrase “two-thirds” is literally “mouth of two,” an idiom for “two parts [two-thirds]” or “a double portion.” See Deut. 21:17; 2 Kings 2:9; Ezek. 5:1–4, 12.
  - type: text
    content: of the people will be struck down,
  - type: text
    content: and the other third will remain.
  '9':
  - type: text
    content: I will cause the remaining third to pass through the fire,
  - type: text
    content: to refine them as silver is refined.
  - type: text
    content: And I will test them as gold is tested.
  - type: note
    content: God will use the “fire” of testing to purify our lives and make us holy. See Ps. 66:10; Prov. 17:3; Isa. 1:25; 48:10; Jer. 9:7; Ezek. 22:17–22; Mal. 3:3; 1 Peter 1:7.
  - type: text
    content: They will call on my name,
  - type: text
    content: and I will answer them;
  - type: text
    content: I will say to them, ‘You are my people,’
  - type: text
    content: and they will say, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' is our God!’ ”'
