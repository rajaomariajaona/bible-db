document_id: GEN.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Hagar and Ishmael
  - type: text
    content: 'Now Sarai had borne no children for Abram. She had an Egyptian slave girl named Hagar, '
  - type: note
    content: There is a Jewish tradition that Hagar was the daughter of Pharaoh, who after seeing the miracles that accompanied Abram and Sarai, gave the Egyptian princess to be Abram’s servant (Midrash by Rashi). Hagar can be translated “ensnaring.” It is also related to the word for “stranger.” In Arabic, it could mean “fugitive.”
  '10':
  - type: text
    content: The angel added, “I will greatly multiply your descendants until no one can count them.”
  - type: note
    content: Only God could multiply Hagar’s descendants. We see the kindness of God revealed by his promise to Hagar. God is the guardian of the weak and the suffering. See Rom. 2:4; Heb. 4:15.
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: '’s angel continued, “You are now pregnant, and soon you will give birth to a son. You will name him Ishmael, '
  - type: note
    content: Ishmael means “God hears” or “May God hear!”
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has heard your cries of distress. '
  '12':
  - type: text
    content: 'Your son will have a wild nature that no one can tame. '
  - type: note
    content: Or “He will be a wild donkey of a man.” This was not necessarily a crude insult, but a figure of speech indicating that Ishmael would live a solitary existence. Like a wild donkey left in the desert, he would be wild and untamed. This is the “beastly” nature of fallen man, the wild Adam, the flesh.
  - type: text
    content: He will be hostile toward everyone, and everyone will be hostile toward him; and he will live at odds with all his kinsmen.”
  '13':
  - type: text
    content: 'After her encounter with '
  - type: text
    content: Yahweh
  - type: text
    content: ', Hagar called him by a special name, “You are the God of My Seeing,” '
  - type: note
    content: Or “You are the God who sees me” or “You are the God whom I See.” This encounter at the well reminds us of a later time when Jesus would journey to a well to meet a woman who had a history of running from God. At this well of Jacob, the Living One again saw into the heart of a woman and spoke mercy to her. At Jesus’ encounter with the woman at Jacob’s well, God saw into her heart, and she saw into God’s. See John 4:1–30.
  - type: text
    content: 'for she said, “Oh my, did I just see God and live to talk about it?” '
  - type: note
    content: Or “Have I not gone on seeing after he saw me?” The exact meaning of the Hebrew is uncertain.
  '14':
  - type: text
    content: 'That is why the well is called Spring of the Living One Who Watches Over Me. '
  - type: note
    content: Or “Beer-Lahai-Roi.” The Hebrew word for “spring” has a homophone that can be translated “eye.”
  - type: text
    content: 'The well is still there, between Kadesh and Bered. '
  - type: note
    content: Kadesh means “sacred”; Bered means “hail.” A place known as “Little Petra” appears on maps today as Siq al-Barid. It lies about four miles north of Petra and is situated in a short canyon. About halfway between Ein Kadesh (also known as Ein Musa) and Siq al-Barid are the ruins of a small Turkish village named Chai, and its spring is called Ein el-Chai. This site seems to match the description of Beer-Lahai-Roi with its spring-fed well.
  '15':
  - type: text
    content: 'Hagar '
  - type: text
    content: returned and
  - type: text
    content: ' bore Abram a son, whom Abram named Ishmael. '
  '16':
  - type: text
    content: Abram was eighty-six years old when Hagar gave birth to Ishmael.
  '2':
  - type: text
    content: 'so Sarai said to Abram, “Please listen. Since '
  - type: text
    content: Yahweh
  - type: text
    content: ' has kept me childless, go sleep with my maidservant. Perhaps through her I can build '
  - type: note
    content: That is, give Abram a son. This is an obvious wordplay in Hebrew. The words for “build” (baneh) and “son” (ben) are quite similar.
  - type: text
    content: you a family.” Abram listened and did what Sarai asked.
  '3':
  - type: text
    content: 'Abram had already lived ten years in the land of Canaan when his wife Sarai took her Egyptian slave girl Hagar and gave her to Abram to be his '
  - type: text
    content: second
  - type: text
    content: ' wife. '
  '4':
  - type: text
    content: 'He slept with Hagar, and she conceived. Once Hagar realized she was pregnant, she belittled Sarai and despised her. '
  '5':
  - type: text
    content: So Sarai went to Abram and said, “
  - type: text
    content: It’s totally your fault that Hagar despises me—and you’re not standing up for me!
  - type: text
    content: ' '
  - type: note
    content: In the honor/shame culture of the ancient Near East, barrenness was a disgrace. The shame that Hagar heaped on Sarai was culturally and emotionally more than she could bear.
  - type: text
    content: 'I gave my slave girl to your embrace, and when she found out she was pregnant, she despised me. May '
  - type: text
    content: Yahweh
  - type: text
    content: ' judge between us '
  - type: text
    content: who is in the right
  - type: text
    content: '!”'
  '6':
  - type: text
    content: Abram responded, “She’s your slave girl under your authority, so do with her whatever you think best.” Then Sarai cruelly mistreated Hagar, who then ran away from her.
  '7':
  - type: text
    content: 'The angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: This is likely a preincarnate appearance of Christ (called a Christophany), for the angel is called “Yahweh” in v. 13. “The angel of Yahweh” refers to an appearance of Yahweh in human form. This is the first mention of an angel in Scripture.
  - type: text
    content: 'encountered Hagar by a spring in the wilderness, the spring on the way to Shur. '
  - type: note
    content: Shur means “wall” and is identified with a wilderness near the Egyptian-Israeli border.
  '8':
  - type: text
    content: He asked her, “Hagar, servant of Sarai, where have you come from and what are you doing here?”
  - type: text
    content: She replied, “I’m running away from Sarai, my mistress.”
  '9':
  - type: text
    content: 'The angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' told her, “You have to go back to your mistress and humbly submit to her.” '
