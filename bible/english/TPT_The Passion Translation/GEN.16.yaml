document_id: GEN.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hagar and Ishmael
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now Sarai had borne no children for Abram. She had an Egyptian slave girl named Hagar, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is a Jewish tradition that Hagar was the daughter of Pharaoh, who after seeing the miracles that accompanied Abram and Sarai, gave the Egyptian princess to be Abram’s servant (Midrash by Rashi).
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hagar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “ensnaring.” It is also related to the word for “stranger.” In Arabic, it could mean “fugitive.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The angel added, “I will greatly multiply your descendants until no one can count them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Only God could multiply Hagar’s descendants. We see the kindness of God revealed by his promise to Hagar. God is the guardian of the weak and the suffering. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s angel continued, “You are now pregnant, and soon you will give birth to a son. You will name him Ishmael, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ishmael
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “God hears” or “May God hear!”
      marker-yv: yv-n
    - type: text
      text: 'for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has heard your cries of distress. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Your son will have a wild nature that no one can tame. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He will be a wild donkey of a man.” This was not necessarily a crude insult, but a figure of speech indicating that Ishmael would live a solitary existence. Like a wild donkey left in the desert, he would be wild and untamed. This is the “beastly” nature of fallen man, the wild Adam, the flesh.
      marker-yv: yv-n
    - type: text
      text: He will be hostile toward everyone, and everyone will be hostile toward him; and he will live at odds with all his kinsmen.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'After her encounter with '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Hagar called him by a special name, “You are the God of My Seeing,” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You are the God who sees me” or “You are the God whom I See.” This encounter at the well reminds us of a later time when Jesus would journey to a well to meet a woman who had a history of running from God. At this well of Jacob, the Living One again saw into the heart of a woman and spoke mercy to her. At Jesus’ encounter with the woman at Jacob’s well, God saw into her heart, and she saw into God’s. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4:1–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'for she said, “Oh my, did I just see God and live to talk about it?” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Have I not gone on seeing after he saw me?” The exact meaning of the Hebrew is uncertain.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'That is why the well is called Spring of the Living One Who Watches Over Me. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Beer-Lahai-Roi.” The Hebrew word for “spring” has a homophone that can be translated “eye.”
      marker-yv: yv-n
    - type: text
      text: 'The well is still there, between Kadesh and Bered. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kadesh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “sacred”;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Bered
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “hail.” A place known as “Little Petra” appears on maps today as Siq al-Barid. It lies about four miles north of Petra and is situated in a short canyon. About halfway between Ein Kadesh (also known as Ein Musa) and Siq al-Barid are the ruins of a small Turkish village named Chai, and its spring is called Ein el-Chai. This site seems to match the description of Beer-Lahai-Roi with its spring-fed well.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hagar '
    - type: usfm
      marker: it
      children:
      - type: text
        text: returned and
    - type: text
      text: ' bore Abram a son, whom Abram named Ishmael. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Abram was eighty-six years old when Hagar gave birth to Ishmael.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'so Sarai said to Abram, “Please listen. Since '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has kept me childless, go sleep with my maidservant. Perhaps through her I can build '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, give Abram a son. This is an obvious wordplay in Hebrew. The words for “build” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: baneh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and “son” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: ben
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) are quite similar.
      marker-yv: yv-n
    - type: text
      text: you a family.” Abram listened and did what Sarai asked.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Abram had already lived ten years in the land of Canaan when his wife Sarai took her Egyptian slave girl Hagar and gave her to Abram to be his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: second
    - type: text
      text: ' wife. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He slept with Hagar, and she conceived. Once Hagar realized she was pregnant, she belittled Sarai and despised her. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: So Sarai went to Abram and said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: It’s totally your fault that Hagar despises me—and you’re not standing up for me!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the honor/shame culture of the ancient Near East, barrenness was a disgrace. The shame that Hagar heaped on Sarai was culturally and emotionally more than she could bear.
      marker-yv: yv-n
    - type: text
      text: 'I gave my slave girl to your embrace, and when she found out she was pregnant, she despised me. May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' judge between us '
    - type: usfm
      marker: it
      children:
      - type: text
        text: who is in the right
    - type: text
      text: '!”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Abram responded, “She’s your slave girl under your authority, so do with her whatever you think best.” Then Sarai cruelly mistreated Hagar, who then ran away from her.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is likely a preincarnate appearance of Christ (called a Christophany), for the angel is called “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ” in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . “The angel of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ” refers to an appearance of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in human form. This is the first mention of an angel in Scripture.
      marker-yv: yv-n
    - type: text
      text: 'encountered Hagar by a spring in the wilderness, the spring on the way to Shur. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “wall” and is identified with a wilderness near the Egyptian-Israeli border.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He asked her, “Hagar, servant of Sarai, where have you come from and what are you doing here?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: She replied, “I’m running away from Sarai, my mistress.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The angel of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' told her, “You have to go back to your mistress and humbly submit to her.” '
