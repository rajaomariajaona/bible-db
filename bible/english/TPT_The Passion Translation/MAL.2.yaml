document_id: MAL.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Unfaithful Priests
  - type: text
    content: '“And now, this is my warning for you priests: '
  '10':
  - type: text
    content: Have we not all one Father, the one God who created us? So why do we cheat one another and violate the covenant that God made with our ancestors?
  '11':
  - type: text
    content: 'The people of Judah have been unfaithful. A horrible atrocity has been committed throughout the land and even in Jerusalem. They have married foreign women who worship their strange gods '
  - type: note
    content: See Deut. 7:3–6. It is possible that married men were taking second wives who were gentiles.
  - type: text
    content: 'and in this way have defiled '
  - type: text
    content: Yahweh
  - type: text
    content: '’s temple, which he loves. '
  '12':
  - type: text
    content: 'May '
  - type: text
    content: Yahweh
  - type: text
    content: ' punish the one who has done such a despicable thing, whoever he may be, '
  - type: note
    content: There are two Hebrew words in the text that pose a real difficulty for understanding. They are ʿer weʿoneh, connected with those whom God condemns for idolatrous marriages with gentile women. The literal reading is “one who is awake and one who answers,” which is possibly a figure of speech for anyone who is alive or “whoever he may be.”
  - type: text
    content: 'even though he brings offerings to the Lord Almighty. May '
  - type: text
    content: Yahweh
  - type: text
    content: ' banish his entire family from the community of Israel!'
  - type: note
    content: Or “May Yahweh cut him off from the tents of Jacob.”
  '13':
  - type: text
    content: 'Another thing you do: You drown '
  - type: text
    content: Yahweh
  - type: text
    content: ’s altar with tears. You weep and wail because he no longer values your offerings or accepts with pleasure what you bring him.
  '14':
  - type: text
    content: “Why not?” you ask.
  - type: text
    content: 'It is because you promised before '
  - type: text
    content: Yahweh
  - type: text
    content: ' to be faithful to the wife you chose in your youth. She is your partner, and you are bound to her by covenant, yet you have betrayed her. '
  '15':
  - type: text
    content: 'Has God not made them one with a shared Spirit in their union? '
  - type: note
    content: 'Or literally “And not one has made and a residue of spirit to him.” Some possible translations include “Didn’t the one [God] make us and preserve our [life] breath?” or “Didn’t the one [God] make her, both flesh and spirit?” or “No one with even a [small] portion of the Spirit in him will do this.” Some Jewish scholars (such as Cashdan) see a reference here to Abraham as “the one” who did not divorce his wife Sarah even when she was apparently too old to bear children. With this understanding, this verse could be translated, “But you say, ‘Didn’t our one ancestor Abraham do this? Surely there was a spirit of loyalty in him?’ ” However, most Christian scholars interpret this as God making Adam and Eve “one flesh” (Gen. 2:24). Because the Hebrew is uncertain and, in a measure, unintelligible, there are many varying viewpoints as to its meaning. For an extensive review of these interpretations, see Pieter Verhoef, The Books of Haggai and Malachi (Grand Rapids, MI: William B. Eerdmans Publishing, 1987), 275–77.'
  - type: text
    content: And what does he desire but godly children from your union? So guard your spirit and do not be disloyal to the wife of your youth.
  '16':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, say to you: ‘He who does not love his wife but hates her and divorces her '
  - type: note
    content: As translated from the Septuagint, Latin Vulgate, Luther, Dead Sea Scroll 4QXIIa. Most translations change the vowels of the traditional Hebrew “he [one] hates” to make it read “I hate [divorce].” In spite of textual variation, the sense of God’s hatred of divorce is clear throughout the Bible. See Deut. 24:1–4; Matt. 5:31–32; 19:4–9. Clearly, God is the enemy of divorce because it hurts the people he loves.
  - type: text
    content: 'overwhelms her with cruelty. '
  - type: note
    content: Or “covers his garment with violence.” Some see the word garment as a symbol for the wife because spreading a garment over a woman was symbolic of a marriage proposal (see Ruth 3:9; Ezek. 16:8). See also Deut. 24:1–4. An alternate translation of the first sentence of v. 16 could be “Yahweh, God of Israel, says, ‘Let anyone who hates his wife divorce her.’ Yet such a person covers himself with violence [acts like a robber].”
  - type: text
    content: 'So guard your spirit and do not abandon her.’ This is '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, speaking to you.”'
  - type: heading
    content: Calling Evil Good
  '17':
  - type: text
    content: 'You weary '
  - type: text
    content: Yahweh
  - type: text
    content: ' with your words.'
  - type: text
    content: Yet you ask, “How have we wearied him?”
  - type: text
    content: 'By saying, “Evildoers are good in the eyes of '
  - type: text
    content: Yahweh
  - type: text
    content: ', and he is pleased with them.”'
  - type: text
    content: And you ask, “Where is the God of justice?”
  '2':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, am speaking to you. If you do not listen and '
  - type: text
    content: fervently
  - type: text
    content: ' devote your heart to honor my name, then I will send the curse '
  - type: note
    content: For the curse, see 3:9.
  - type: text
    content: upon you and convert your blessings into curses. Yes, I have already done so since you have not dedicated your heart to honor me.
  '3':
  - type: text
    content: '“Behold! I will rebuke your descendants. I will smear feces on your faces—the dung from your festival sacrifices—and you '
  - type: text
    content: priests
  - type: text
    content: ' will be tossed away with the animal waste. '
  '4':
  - type: text
    content: 'And then you will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, have sent you this commandment so that my covenant with Levi may endure. '
  '5':
  - type: text
    content: 'My covenant with his tribe was a covenant to give them a full, peaceful life. All this I gave to him so that he would revere me, and indeed, he honored me and stood in awe of my name. '
  '6':
  - type: text
    content: 'He gave '
  - type: text
    content: the people
  - type: text
    content: ' solid instruction and spoke nothing false. '
  - type: note
    content: Or “True instruction was in his mouth, and nothing false was found on his lips.”
  - type: text
    content: He walked with me in peace and integrity and turned many from evil.
  '7':
  - type: text
    content: '“Listen, you priests, '
  - type: text
    content: descendants of Levi
  - type: text
    content: '. Your lips should be a gateway to sacred truths when people come to you for instruction because you are the messengers of '
  - type: text
    content: Yahweh
  - type: text
    content: ', who rules over all. '
  '8':
  - type: text
    content: 'But you have turned from '
  - type: text
    content: my
  - type: text
    content: ' path, and your teachings have caused many to stumble. You have corrupted the covenant with Levi. So I have caused you to be despised and humiliated before all the people. For you have not followed my ways but have shown partiality in matters of the law. '
  - type: note
    content: Or “lifting up faces in the law,” a Hebrew idiom for showing partiality to the rich and depriving the poor of justice (see Mic. 3:11). However, an alternate interpretation could be, “You have failed to bring people blessing [lifting up faces] by your teaching.”
  - type: text
    content: 'This is '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, speaking to you.”'
  - type: heading
    content: Malachi Rebukes Unfaithful Israel
