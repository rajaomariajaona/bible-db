      text: '17'
  - type: text
    text: 'You weary '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' with your words.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Yet you ask, “How have we wearied him?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'By saying, “Evildoers are good in the eyes of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', and he is pleased with them.”'
- type: usfm
  marker: p
  children:
  - type: text
    text: And you ask, “Where is the God of justice?”
