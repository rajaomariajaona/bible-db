  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel, say to you: ‘He who does not love his wife but hates her and divorces her '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
