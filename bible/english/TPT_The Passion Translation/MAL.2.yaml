      children:
      - type: text
        text: 19:4–9
      metadata:
        usfm: MAT.19.4+MAT.19.5+MAT.19.6+MAT.19.7+MAT.19.8+MAT.19.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Clearly, God is the enemy of divorce because it hurts the people he loves.
    marker-yv: yv-n
