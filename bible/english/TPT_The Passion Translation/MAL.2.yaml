    children:
    - type: text
      text: '1'
  - type: text
    text: '“And now, this is my warning for you priests: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, am speaking to you. If you do not listen and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fervently
  - type: text
    text: ' devote your heart to honor my name, then I will send the curse '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For the curse, see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:9
      metadata:
        usfm: MAL.3.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: upon you and convert your blessings into curses. Yes, I have already done so since you have not dedicated your heart to honor me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Behold! I will rebuke your descendants. I will smear feces on your faces—the dung from your festival sacrifices—and you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: priests
  - type: text
    text: ' will be tossed away with the animal waste. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And then you will know that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, have sent you this commandment so that my covenant with Levi may endure. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'My covenant with his tribe was a covenant to give them a full, peaceful life. All this I gave to him so that he would revere me, and indeed, he honored me and stood in awe of my name. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the people
  - type: text
    text: ' solid instruction and spoke nothing false. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “True instruction was in his mouth, and nothing false was found on his lips.”
    marker-yv: yv-n
  - type: text
    text: He walked with me in peace and integrity and turned many from evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“Listen, you priests, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: descendants of Levi
  - type: text
    text: '. Your lips should be a gateway to sacred truths when people come to you for instruction because you are the messengers of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', who rules over all. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: 'But you have turned from '
  - type: usfm
    marker: it
    children:
    - type: text
      text: my
  - type: text
    text: ' path, and your teachings have caused many to stumble. You have corrupted the covenant with Levi. So I have caused you to be despised and humiliated before all the people. For you have not followed my ways but have shown partiality in matters of the law. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “lifting up faces in the law,” a Hebrew idiom for showing partiality to the rich and depriving the poor of justice (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 3:11
      metadata:
        usfm: MIC.3.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). However, an alternate interpretation could be, “You have failed to bring people blessing [lifting up faces] by your teaching.”
    marker-yv: yv-n
  - type: text
    text: 'This is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', Commander of Angel Armies, speaking to you.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malachi Rebukes Unfaithful Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Have we not all one Father, the one God who created us? So why do we cheat one another and violate the covenant that God made with our ancestors?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The people of Judah have been unfaithful. A horrible atrocity has been committed throughout the land and even in Jerusalem. They have married foreign women who worship their strange gods '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 7:3–6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It is possible that married men were taking second wives who were gentiles.
    marker-yv: yv-n
  - type: text
    text: 'and in this way have defiled '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s temple, which he loves. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' punish the one who has done such a despicable thing, whoever he may be, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are two Hebrew words in the text that pose a real difficulty for understanding. They are
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ʿer weʿoneh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', connected with those whom God condemns for idolatrous marriages with gentile women. The literal reading is “one who is awake and one who answers,” which is possibly a figure of speech for anyone who is alive or “whoever he may be.”'
    marker-yv: yv-n
  - type: text
    text: 'even though he brings offerings to the Lord Almighty. May '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' banish his entire family from the community of Israel!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “May
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cut him off from the tents of Jacob.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Another thing you do: You drown '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s altar with tears. You weep and wail because he no longer values your offerings or accepts with pleasure what you bring him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Why not?” you ask.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'It is because you promised before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' to be faithful to the wife you chose in your youth. She is your partner, and you are bound to her by covenant, yet you have betrayed her. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Has God not made them one with a shared Spirit in their union? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “And not one has made and a residue of spirit to him.” Some possible translations include “Didn’t the one [God] make us and preserve our [life] breath?” or “Didn’t the one [God] make her, both flesh and spirit?” or “No one with even a [small] portion of the Spirit in him will do this.” Some Jewish scholars (such as Cashdan) see a reference here to Abraham as “the one” who did not divorce his wife Sarah even when she was apparently too old to bear children. With this understanding, this verse could be translated, “But you say, ‘Didn’t our one ancestor Abraham do this? Surely there was a spirit of loyalty in him?’ ” However, most Christian scholars interpret this as God making Adam and Eve “one flesh” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:24
      metadata:
        usfm: GEN.2.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Because the Hebrew is uncertain and, in a measure, unintelligible, there are many varying viewpoints as to its meaning. For an extensive review of these interpretations, see Pieter Verhoef,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Books of Haggai and Malachi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Grand Rapids, MI: William B. Eerdmans Publishing, 1987), 275–77.'
    marker-yv: yv-n
  - type: text
    text: And what does he desire but godly children from your union? So guard your spirit and do not be disloyal to the wife of your youth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
