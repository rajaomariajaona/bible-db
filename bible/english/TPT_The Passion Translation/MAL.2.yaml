      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint, Latin Vulgate, Luther, Dead Sea Scroll 4QXII
    - type: usfm
      marker: ord
      children:
      - type: text
        text: a
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Most translations change the vowels of the traditional Hebrew “he [one] hates” to make it read “I hate [divorce].” In spite of textual variation, the sense of God’s hatred of divorce is clear throughout the Bible. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
