document_id: JER.9,1849
type_code: eng
verses:
  '1':
  - type: text
    content: How I wish my head were a reservoir
  - type: text
    content: that could weep a fountain of tears.
  - type: text
    content: I would weep day and night
  - type: text
    content: for my beloved ones who have been slain!
  - type: note
    content: Although the Hebrew has this verse in ch. 8, most modern translations have made it the first verse in ch. 9. The chapter break here is unfortunate, and this whole section of 8:18–9:2 should be read together.
  '10':
  - type: text
    content: I will weep and wail for the mountains
  - type: text
    content: and sing mournful songs for the pasturelands,
  - type: note
    content: Jeremiah is mourning over what has happened to his land as one would mourn over the death of a loved one.
  - type: text
    content: for they are burned, with no one passing through.
  - type: text
    content: No one hears the lowing of cattle;
  - type: text
    content: birds and beasts of the field have fled—they are gone.
  '11':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will turn Jerusalem into rubble,'
  - type: text
    content: a den of jackals.
  - type: text
    content: And I will turn the cities of Judah into ghost towns where no one lives.”
  '12':
  - type: text
    content: 'Why is the land burned and destroyed, left like an uninhabited wilderness? Who is wise enough to understand this? '
  - type: note
    content: See Ps. 107:43; Eccl. 8:1; Hos. 14:9; 1 Cor. 1:20; James 3:13.
  - type: text
    content: 'Who is the prophet with a word from '
  - type: text
    content: Yahweh
  - type: text
    content: ' to explain it?'
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' himself supplies the answer: “Because they have rejected my laws, which I gave them, '
  - type: note
    content: Or “my law I put before their faces.”
  - type: text
    content: 'they refused to live as I told them, and they have not listened to my voice. '
  '14':
  - type: text
    content: 'Instead, they stubbornly followed their hearts’ desires and chased after the Baals, just like their ancestors taught them. '
  - type: note
    content: See Ex. 20:5.
  '15':
  - type: text
    content: 'Therefore I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel and Commander of Angel Armies, say to you:'
  - type: text
    content: “Look! I will feed them bitter wormwood,
  - type: text
    content: and give them poisonous water to drink.
  - type: note
    content: “Bitter wormwood” and “poisonous water [water of gall]” are likely metaphors for bitter sufferings, afflictions, and pain they will bring upon themselves by their disobedience (see Jer. 2:19; Lam. 3:15, 19; Rev. 8:10–11).
  '16':
  - type: text
    content: I will also scatter them among the nations.
  - type: text
    content: They will live as exiles among people they and their fathers have never known.
  - type: text
    content: I will send the sword after them
  - type: text
    content: until I have made an end of them.”
  - type: heading
    content: Jerusalem Cries Out for Help
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says:'
  - type: note
    content: 'A few translations have not included this line, with some commentators in agreement, because they view Jeremiah as the speaker in vv. 16–18 instead of Yahweh. Others see three speakers in this passage: Yahweh in v. 16, Jeremiah in v. 17, and the people of Jerusalem in v. 18.'
  - type: text
    content: “Look around you and discern. Summon the wailing women.
  - type: text
    content: 'Call for those most skilled '
  - type: text
    content: at mourning
  - type: text
    content: .
  - type: note
    content: In the culture of that day, professional mourning women were paid to come to the side of grief-stricken families to mourn and chant their lament.
  '18':
  - type: text
    content: Let them hurry and wail over us
  - type: text
    content: that our eyes may overflow with tears
  - type: text
    content: and our eyelids gush with water.
  '19':
  - type: text
    content: 'For the voice of wailing is heard from Zion:'
  - type: text
    content: ‘We are so ruined and shamed!
  - type: text
    content: We have had to leave our land
  - type: text
    content: because enemies have demolished our homes.’ ”
  '2':
  - type: text
    content: If only I had a shelter in the wilderness,
  - type: text
    content: a place for weary travelers to spend the night.
  - type: text
    content: Then I could leave my people
  - type: text
    content: and go away from them
  - type: text
    content: 'because they’re all unfaithful to God '
  - type: note
    content: Or “they’re all [spiritual] adulterers.” Chapter 9 is the chapter of the brokenhearted prophet. Jeremiah went throughout the land, begging, preaching, pleading, and weeping over his people, imploring them to turn away from their sin and return to God, but to no avail.
  - type: text
    content: —
  - type: text
    content: a company of corrupters.
  - type: heading
    content: Corruption
  '20':
  - type: text
    content: 'Women, listen to the word of '
  - type: text
    content: Yahweh
  - type: text
    content: and take to heart the word he speaks.
  - type: text
    content: Teach your daughters to mourn;
  - type: text
    content: teach your neighbor a funeral song.
  '21':
  - type: text
    content: 'For Death '
  - type: note
    content: Death is personified in this verse. See Job 18:13; 28:22; Ps. 49:14; Hos. 13:14; Hab. 2:5; Rev. 6:8; 20:13–14.
  - type: text
    content: 'has crept in '
  - type: note
    content: Or “come up.” Usually, death is seen as taking one down to the underworld; here it is coming up.
  - type: text
    content: through our windows,
  - type: text
    content: forcing its way past our fortified defenses,
  - type: note
    content: Some commentators view this as an epidemic, sickness, or plague due to the siege of Jerusalem.
  - type: text
    content: cutting down the child playing outside
  - type: text
    content: and the young men in the streets.
  '22':
  - type: text
    content: 'Tell everyone: “This is the prophecy of '
  - type: text
    content: Yahweh
  - type: text
    content: ':'
  - type: text
    content: '‘Corpses will lie '
  - type: text
    content: unburied
  - type: text
    content: ' like dung on the open field,'
  - type: note
    content: See Ps. 79:3.
  - type: text
    content: like stalks of grain after the reaper,
  - type: text
    content: with no one to gather them up.’ ”
  - type: heading
    content: Our Only Boast
  '23':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: '“The wise must not boast '
  - type: note
    content: Or “shine” or “praise.”
  - type: text
    content: in their wisdom,
  - type: note
    content: See 1 Cor. 1:18–31.
  - type: text
    content: the mighty must not boast in their power,
  - type: note
    content: See Zech. 4:6.
  - type: text
    content: and the wealthy must not boast in their riches.
  - type: note
    content: See Luke 12:15.
  '24':
  - type: text
    content: 'If you’re going to boast, then boast about this:'
  - type: text
    content: that you understand my ways and know my heart,
  - type: note
    content: See Pss. 34:2; 105:3; Isa. 41:16; 2 Cor. 10:17.
  - type: text
    content: 'and you know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: Let the wise boast in knowing
  - type: text
    content: ' how I demonstrate'
  - type: note
    content: Or “create.”
  - type: text
    content: 'infinite love, '
  - type: note
    content: Or “loving-kindness,” “mercy,” “unfailing loyalty,” “grace,” or “favor.”
  - type: text
    content: true justice, and righteousness,
  - type: note
    content: See Ps. 85:8–13; Hos. 4:1, 6; 5:4; 6:6.
  - type: text
    content: for these are the things that delight my heart,”
  - type: note
    content: See Mic. 6:8.
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '25':
  - type: text
    content: '“Look,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “the day is coming when I will punish all who are circumcised in the flesh only: '
  '26':
  - type: text
    content: the Egyptians, the people of Judah, the Edomites, the Ammonites, the Moabites, and the tribes in the desert who shave their heads bald. The men in all those lands are uncircumcised. And the Israelites are just like them because their hearts are uncircumcised.”
  - type: note
    content: That is, they were disobedient to God and had broken the covenant that circumcision symbolized. See Rom. 2:25–29; 1 Cor. 7:19; Gal. 5:6; Phil. 3:2–3; Col. 2:11–12; 3:11.
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “They shoot out lies with their tongues,
  - type: text
    content: 'just as an archer uses a bow '
  - type: text
    content: to shoot arrows
  - type: text
    content: .
  - type: text
    content: Their lies have prevailed in the land,
  - type: text
    content: 'but they are not faithful to '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: My people go from one evil thing to another
  - type: text
    content: 'because they do not know '
  - type: text
    content: my heart
  - type: text
    content: .
  '4':
  - type: text
    content: Beware of your neighbor
  - type: text
    content: and do not even trust your brother,
  - type: note
    content: See Matt. 10:36.
  - type: text
    content: for every brother is a cheater,
  - type: note
    content: The Hebrew word for “cheater [deceiver]” is similar to that for “Jacob.” Jacob’s people are all like Jacob.
  - type: text
    content: and every friend is a slanderer.
  '5':
  - type: text
    content: They all are professional liars who lie to their neighbors.
  - type: text
    content: They are completely dishonest,
  - type: text
    content: and have trained their tongues to lie.
  - type: text
    content: They weary themselves doing wrong.
  - type: note
    content: Or “and they will not quit sinning.”
  '6':
  - type: text
    content: Jeremiah
  - type: text
    content: ', you live surrounded by oppression,'
  - type: text
    content: deceit heaped upon deceit,
  - type: text
    content: 'and the people refuse to '
  - type: text
    content: intimately
  - type: text
    content: ' know me,” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '7':
  - type: text
    content: 'Therefore, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says:'
  - type: text
    content: '“Listen! I will refine my dear people '
  - type: text
    content: by fire
  - type: text
    content: ' and test them'
  - type: text
    content: because of what they have done.
  - type: text
    content: I have no other choice.
  '8':
  - type: text
    content: Their words are deadly arrows poisoned with deceit.
  - type: text
    content: Each one greets his neighbor with ‘Shalom,’
  - type: text
    content: but deep in his heart, he secretly sets a trap for him.
  '9':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will hold them accountable for these things.'
  - type: text
    content: And I will take vengeance to punish a nation such as this.”
  - type: heading
    content: Lament over Judah and Jerusalem
