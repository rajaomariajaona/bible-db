  - type: text
    content: ' has anointed me,'
  - type: note
    content: 'The title of Messiah is taken from the Hebrew verb “to anoint.” Messiah means “the Anointed One” in both Hebrew (mashiach) and Greek (Christos). Our Lord Jesus quoted this passage in Nazareth (see Luke 4:16–21) and introduced his “jubilee” ministry to Israel (see Lev. 25). The first three verses of this chapter describe the twofold mission of Jesus: (1) to open the door of the day of grace to the world; (2) to proclaim the coming day of vengeance on sin, darkness, sickness, and eventually, the “goat” nations. As a prophet, he came to preach the new season of grace; as a priest, he came to heal; and as a king, he came to decree and herald peace and freedom to the captives. See Luke 3:21–22; Acts 10:38.'
