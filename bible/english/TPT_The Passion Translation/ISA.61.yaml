  - type: text
    content: 'to give them a beautiful bouquet '
  - type: note
    content: Or “beauty for ashes” or “a garland [of flowers] or headdress.” There is an interesting wordplay in the Hebrew text. The word for “beauty” is phe’er, and the word for “ashes” is epher—simply the moving of one letter. God has the power to change and move things around in our lives to make them into something beautiful. See Rom. 8:28.
  - type: text
