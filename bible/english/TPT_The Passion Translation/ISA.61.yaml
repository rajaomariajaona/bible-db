  - type: text
    content: ','
  - type: note
    content: It has been the desire of God to make all his people priests (see Ex. 19:1–6; 1 Peter 2:1–10; Rev. 5:9–10). This far surpasses the priestly ministry of the Old Covenant (see Heb. 8:6). Under the law of Moses, only the Levites were allowed to be priests, but in the New Covenant reality we are all believer-priests. Once we were covered in ashes, but now we are robed in his beauty as priests.
  - type: text
