  - type: text
    content: ' Oaks '
  - type: note
    content: The oak, a hardwood tree, was used to make yokes for oxen and symbolizes strength, might (or mighty men), stability, conviction, uprightness, and resoluteness. This could be the Quercus calliprinos, also known as the Palestine oak. There is a Palestine oak not far from Hebron that has been estimated to be 850 years old. “Oaks of Righteousness” points to a godly, spiritually mature people who will know the righteousness of God and walk in it. Jesus, the Tree of Life, multiplies himself in us so we become trees of righteousness. A Tree became a forest. See Ps. 1:3.
