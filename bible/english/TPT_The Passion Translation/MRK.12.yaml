    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: in the same way you love yourself.’ You will never find a greater commandment than these.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The religious scholar replied, “Yes, that’s true, Teacher. You spoke beautifully when you said that God is one, and there is no one else besides him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 4:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'And there is something more important to God than all the sacrifices and burnt offerings: it’s the commandment to constantly love God with every passion of your heart, with your every thought, and with all your strength—and to love your neighbor in the same way as you love yourself.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'When Jesus noticed how thoughtfully and sincerely the man answered, he said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You’re not far from the reality of God’s kingdom.”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus tells the man that God’s kingdom is within reach. It is a present reality, not just a far-off concept. In
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Mark 11–12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the religious scholars (scribes) are mentioned a number of times. It was a religious scholar who questioned Jesus’ authority ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11:27–28
      metadata:
        usfm: MRK.11.27+MRK.11.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and it was a religious scholar who questioned his interpretation of Scripture (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 12:28
      metadata:
        usfm: MRK.12.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Now, in the verses that follow, Jesus shows that they had taught a theology without knowing the reality of Christ, the Messiah. Every teaching needs to be weighed by the reality of Christ, not the traditions of men.
    marker-yv: yv-n
  - type: text
    text: After that, no one dared to question him again.
- type: usfm
  marker: s1
