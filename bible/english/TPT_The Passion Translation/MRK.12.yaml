      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are to love the Lord
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', your God, with a passionate heart, from the depths of your soul, with your every thought, and with all your strength. This is the great and supreme commandment.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'And the second is this: ‘You must love your neighbor'
  - type: text
    text: ' '
