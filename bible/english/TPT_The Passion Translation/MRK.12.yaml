      marker: fr
      children:
      - type: text
        text: 12:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “the best seats [reserved for respected leaders] in the synagogues.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they push their way to the head table at banquets.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For appearance’s sake, they will pray long religious prayers at the homes of widows for an offering, cheating them out of their very livelihood.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic, which is literally “They eat of the household with the ladle of their tender prayers.” The implication is that the religious leaders would go and pray at the homes of widows, then intimidate them by asking for offerings.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Beware of them all, for they will one day be stripped of honor, and the judgment they receive will be severe.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Widow’s Offering
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then he sat down near the offering box, watching all the people dropping in their coins. Many of the rich would put in very large sums, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'but a destitute widow walked up and dropped in two small copper coins, worth less than a penny. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jesus called his disciples to gather around and then said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, this poor widow has given a larger offering than any of the wealthy.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the rich only gave out of their surplus, but she sacrificed out of her poverty and gave to God all that she had to live on, which was everything she had.”
