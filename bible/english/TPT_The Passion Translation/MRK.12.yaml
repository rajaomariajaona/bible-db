document_id: MRK.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Tenants
  - type: text
    content: 'Then Jesus began to speak to them in parables: '
  - type: text
    content: “There once was a man who planted a vineyard
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can be translated “He planted a vineyard by a stream.”
  - type: text
    content: and put a secure fence around it.
  - type: text
    content: ' '
  - type: note
    content: See Isa. 5:1–7. The vineyard is a metaphor for the promises of life and glory for Israel. The leaders of the nation were but tenants who were to tend the vineyard. The fence was God’s protection and favor that surrounded them. The winepress was the Holy Spirit, who gave them the inspired revelation of Scripture. The watchtower could speak of the ministry of the prophets, who were like watchmen on the walls for God’s people.
  - type: text
    content: He dug a pit for its winepress and erected a watch tower. Then he leased it to tenant-farmers and traveled abroad.
  - type: text
    content: ' '
  '10':
  - type: text
    content: Haven’t you read what the psalmist said?
  - type: text
    content: The stone the builders examined and rejected
  - type: text
    content: has become the cornerstone,
  - type: text
    content: the most important stone of all?
  - type: note
    content: See Ps. 118:22–23; Isa. 8:14–15; 28:16.
  '11':
  - type: text
    content: This was the Lord’s plan—
  - type: text
    content: and he
  - type: text
    content: ' '
  - type: note
    content: Or “it.”
  - type: text
    content: is wonderful for our eyes to behold!”
  - type: note
    content: The Aramaic reads “This came from the presence of Lord Yahweh and is a marvel in our eyes.”
  '12':
  - type: text
    content: Now, the chief priests, religious scholars, and leaders realized that Jesus’ parable was aimed at them. They had hoped to arrest him then and there, but they feared the reaction of the crowd, so they left him alone and went away.
  - type: heading
    content: Paying Taxes to Caesar
  '13':
  - type: text
    content: 'Then they sent a delegation of Pharisees, together with some staunch supporters of Herod, to entrap Jesus with his own words. '
  '14':
  - type: text
    content: 'So they approached him and said, “Teacher, we know that you’re an honest man of integrity and you teach us the truth of God’s ways. We can clearly see that you’re not one who speaks only to win the people’s favor, because you speak the truth without regard to the consequences. '
  - type: note
    content: Or “You don’t look into the faces of men” (before you speak the truth).
  - type: text
    content: So tell us, then, what you think. Is it proper for us to pay taxes to Caesar or not?”
  '15':
  - type: text
    content: 'Jesus saw through their hypocrisy and said to them, '
  - type: text
    content: “Why are you testing me? Show me one of the Roman coins.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: They brought him a silver coin used to pay the tax.
  - type: text
    content: “Now, tell me,”
  - type: text
    content: ' Jesus said, '
  - type: text
    content: “whose head is on this coin and whose inscription is stamped on it?”
  - type: text
    content: “Caesar’s,” they replied.
  - type: note
    content: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
  '17':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “
  - type: text
    content: Precisely. The coin bears the image of the emperor Caesar
  - type: text
    content: ', so you should pay the emperor his portion.'
  - type: text
    content: ' '
  - type: text
    content: But because you bear the image of God,
  - type: text
    content: ' '
  - type: note
    content: Implied in the text. The coin belongs to Caesar because it carries his image. We have an obligation to God because we carry his image.
  - type: text
    content: you must give to God all that belongs to him.”
  - type: text
    content: ' And they were utterly stunned by Jesus’ words.'
  - type: heading
    content: A Question about Marriage
  '18':
  - type: text
    content: 'Some of the Sadducees, a religious group that denied there was a resurrection of the dead, came to ask Jesus this question: '
  '19':
  - type: text
    content: '“Teacher, the law of Moses teaches '
  - type: note
    content: See Deut. 25:5–10.
  - type: text
    content: 'that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  '2':
  - type: text
    content: When the time of harvest came, he sent one of his servants
  - type: text
    content: ' '
  - type: note
    content: These servants represent the prophets whom God commissioned to take his word to the people, but they were rejected and persecuted.
  - type: text
    content: to the tenants to collect the landowners’ share of the harvest.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now, there was a family with seven brothers. The oldest got married but soon died, and he had no children. '
  '21':
  - type: text
    content: 'The second brother married his oldest brother’s widow, and he also died without any children, and the third also. '
  '22':
  - type: text
    content: 'This repeated down to the seventh brother, none of whom had children. Finally, the woman died. '
  '23':
  - type: text
    content: 'So here’s our dilemma: Which of the seven brothers will be the woman’s husband when she’s resurrected from the dead, since they all were once married to her?”'
  '24':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “You are mistaken
  - type: text
    content: ' '
  - type: note
    content: Or “You wander off the path” (of truth).
  - type: text
    content: because your hearts are not filled with the revelation of the Scriptures or the power of God.
  - type: text
    content: ' '
  '25':
  - type: text
    content: For when they rise from the dead, men and women will not marry, just like the angels of heaven don’t marry.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Now, concerning the resurrection, haven’t you read in the Torah
  - type: text
    content: ' '
  - type: note
    content: Or “in the book of Moses.”
  - type: text
    content: what God said to Moses at the burning bush? ‘I AM the living God, the God of Abraham, the God of Isaac, and the God of Jacob’?
  - type: text
    content: ' '
  - type: note
    content: See Ex. 3:6. The implication Jesus is making is that Abraham, Isaac, and Jacob were all alive (in glory) when God spoke to Moses in the burning bush.
  '27':
  - type: text
    content: God is not God of the dead, but of the living, and you are all badly mistaken!”
  - type: note
    content: Or “you wander off the path” (of truth).
  - type: heading
    content: The Greatest Commandment
  '28':
  - type: text
    content: Now a certain religious scholar overheard them debating. When he saw how beautifully Jesus answered all their questions, he posed one of his own, and asked him, “Teacher, which commandment is the greatest of all?”
  '29':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: '“The most important of all the commandments is this: ‘The Lord'
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', our God, is one!’'
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  '3':
  - type: text
    content: But the tenants seized him and beat him and sent him back empty-handed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: You are to love the Lord
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, with a passionate heart, from the depths of your soul, with your every thought, and with all your strength. This is the great and supreme commandment.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'And the second is this: ‘You must love your neighbor'
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is literally “your nearest,” which is a figure of speech for “your friend.”
  - type: text
    content: in the same way you love yourself.’ You will never find a greater commandment than these.”
  '32':
  - type: text
    content: 'The religious scholar replied, “Yes, that’s true, Teacher. You spoke beautifully when you said that God is one, and there is no one else besides him. '
  - type: note
    content: See Deut. 4:35.
  '33':
  - type: text
    content: 'And there is something more important to God than all the sacrifices and burnt offerings: it’s the commandment to constantly love God with every passion of your heart, with your every thought, and with all your strength—and to love your neighbor in the same way as you love yourself.”'
  '34':
  - type: text
    content: 'When Jesus noticed how thoughtfully and sincerely the man answered, he said to him, '
  - type: text
    content: “You’re not far from the reality of God’s kingdom.”
  - type: text
    content: ' '
  - type: note
    content: Jesus tells the man that God’s kingdom is within reach. It is a present reality, not just a far-off concept. In Mark 11–12, the religious scholars (scribes) are mentioned a number of times. It was a religious scholar who questioned Jesus’ authority (11:27–28), and it was a religious scholar who questioned his interpretation of Scripture (12:28). Now, in the verses that follow, Jesus shows that they had taught a theology without knowing the reality of Christ, the Messiah. Every teaching needs to be weighed by the reality of Christ, not the traditions of men.
  - type: text
    content: After that, no one dared to question him again.
  - type: heading
    content: Jesus, Son of David—Lord of David
  '35':
  - type: text
    content: 'While Jesus was teaching in the courts of the temple, he posed a question to those listening: '
  - type: text
    content: “Why do the religious scholars say that the Messiah is David’s son?
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Yet it was David, inspired by the Holy Spirit, who sang:'
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: said to my Lord,
  - type: text
    content: ‘Sit near me in the place of authority
  - type: text
    content: until I subdue all your enemies under Your feet.’
  - type: note
    content: See Ps. 110:1, the most quoted Old Testament verse in the New Testament. Jesus is challenging them to consider that the Christ will be both God and man (David’s son and David’s Lord).
  '37':
  - type: text
    content: Since David calls him Lord, how can he be his son?”
  - type: text
    content: The large crowd listened to him with delight.
  - type: heading
    content: Jesus Warns Against the Religious Scholars
  '38':
  - type: text
    content: 'Jesus also taught the people, '
  - type: text
    content: “Beware of the religious scholars.
  - type: text
    content: ' '
  - type: note
    content: The implied meaning of Jesus’ teaching is that we should choose carefully those we follow. The religious scholars are not rebuked for their plans to crucify Jesus, but for their flawed character.
  - type: text
    content: They love to parade around in their clergy robes and be greeted with respect on the street.
  - type: text
    content: ' '
  - type: note
    content: Or “marketplaces.”
  '39':
  - type: text
    content: They crave to be made the leaders of synagogue councils,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “the best seats [reserved for respected leaders] in the synagogues.”
  - type: text
    content: and they push their way to the head table at banquets.
  - type: text
    content: ' '
  '4':
  - type: text
    content: So the owner sent another servant to them. And that one they shamefully humiliated and beat over the head.
  - type: text
    content: ' '
  - type: note
    content: Some Greek manuscripts and the Aramaic read “and stoned him.”
  '40':
  - type: text
    content: For appearance’s sake, they will pray long religious prayers at the homes of widows for an offering, cheating them out of their very livelihood.
  - type: text
    content: ' '
  - type: note
    content: Translated from the Aramaic, which is literally “They eat of the household with the ladle of their tender prayers.” The implication is that the religious leaders would go and pray at the homes of widows, then intimidate them by asking for offerings.
  - type: text
    content: Beware of them all, for they will one day be stripped of honor, and the judgment they receive will be severe.”
  - type: heading
    content: The Widow’s Offering
  '41':
  - type: text
    content: 'Then he sat down near the offering box, watching all the people dropping in their coins. Many of the rich would put in very large sums, '
  '42':
  - type: text
    content: 'but a destitute widow walked up and dropped in two small copper coins, worth less than a penny. '
  '43':
  - type: text
    content: 'Jesus called his disciples to gather around and then said to them, '
  - type: text
    content: “I tell you the truth, this poor widow has given a larger offering than any of the wealthy.
  - type: text
    content: ' '
  '44':
  - type: text
    content: For the rich only gave out of their surplus, but she sacrificed out of her poverty and gave to God all that she had to live on, which was everything she had.”
  '5':
  - type: text
    content: So he sent another servant, and they brutally killed him. Many more servants were sent, and they were all severely beaten or killed.
  - type: text
    content: ' '
  '6':
  - type: text
    content: The owner had only one person left to send—his only son, whom he dearly loved. So he sent him to them, saying, ‘Surely they will restrain themselves
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “They’ll be ashamed of what they’ve done.”
  - type: text
    content: and respect my son.’
  - type: text
    content: ' '
  '7':
  - type: text
    content: But the tenants
  - type: text
    content: ' '
  - type: text
    content: saw their chance
  - type: text
    content: ' '
  - type: text
    content: and said to one another, ‘This is the heir. Come! Let’s kill him, and then we’ll inherit it all!’
  - type: text
    content: ' '
  '8':
  - type: text
    content: So they violently seized him, killed him, and threw his body over the fence!
  - type: text
    content: ' '
  - type: note
    content: Jesus was the true Heir, who was crucified outside the walls of the city. See Heb. 13:12.
  '9':
  - type: text
    content: So what do you think the owner of the vineyard will do? He will come and put to death those tenants and give his vineyard to others.
  - type: text
    content: ' '
  - type: note
    content: The “others” is a hint of the gentiles who would receive the new covenant promises of God. See also John 15:1–2; Eph. 2:11–22.
