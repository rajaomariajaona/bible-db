    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jesus also taught the people, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Beware of the religious scholars.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implied meaning of Jesus’ teaching is that we should choose carefully those we follow. The religious scholars are not rebuked for their plans to crucify Jesus, but for their flawed character.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They love to parade around in their clergy robes and be greeted with respect on the street.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “marketplaces.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They crave to be made the leaders of synagogue councils,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
