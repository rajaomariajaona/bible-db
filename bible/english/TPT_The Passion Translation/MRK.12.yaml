  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Now a certain religious scholar overheard them debating. When he saw how beautifully Jesus answered all their questions, he posed one of his own, and asked him, “Teacher, which commandment is the greatest of all?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“The most important of all the commandments is this: ‘The Lord'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yahweh
  - type: usfm
    marker: wj
    children:
    - type: text
