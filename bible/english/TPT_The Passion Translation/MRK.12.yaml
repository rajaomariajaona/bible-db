      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, the chief priests, religious scholars, and leaders realized that Jesus’ parable was aimed at them. They had hoped to arrest him then and there, but they feared the reaction of the crowd, so they left him alone and went away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paying Taxes to Caesar
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they sent a delegation of Pharisees, together with some staunch supporters of Herod, to entrap Jesus with his own words. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they approached him and said, “Teacher, we know that you’re an honest man of integrity and you teach us the truth of God’s ways. We can clearly see that you’re not one who speaks only to win the people’s favor, because you speak the truth without regard to the consequences. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You don’t look into the faces of men” (before you speak the truth).
      marker-yv: yv-n
    - type: text
      text: So tell us, then, what you think. Is it proper for us to pay taxes to Caesar or not?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus saw through their hypocrisy and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you testing me? Show me one of the Roman coins.”
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They brought him a silver coin used to pay the tax.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now, tell me,”
    - type: text
      text: ' Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “whose head is on this coin and whose inscription is stamped on it?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Caesar’s,” they replied.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Precisely. The coin bears the image of the emperor Caesar
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', so you should pay the emperor his portion.'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: But because you bear the image of God,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the text. The coin belongs to Caesar because it carries his image. We have an obligation to God because we carry his image.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: you must give to God all that belongs to him.”
    - type: text
      text: ' And they were utterly stunned by Jesus’ words.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Question about Marriage
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some of the Sadducees, a religious group that denied there was a resurrection of the dead, came to ask Jesus this question: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Teacher, the law of Moses teaches '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 25:5–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When the time of harvest came, he sent one of his servants
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These servants represent the prophets whom God commissioned to take his word to the people, but they were rejected and persecuted.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to the tenants to collect the landowners’ share of the harvest.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, there was a family with seven brothers. The oldest got married but soon died, and he had no children. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The second brother married his oldest brother’s widow, and he also died without any children, and the third also. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This repeated down to the seventh brother, none of whom had children. Finally, the woman died. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So here’s our dilemma: Which of the seven brothers will be the woman’s husband when she’s resurrected from the dead, since they all were once married to her?”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are mistaken
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You wander off the path” (of truth).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because your hearts are not filled with the revelation of the Scriptures or the power of God.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For when they rise from the dead, men and women will not marry, just like the angels of heaven don’t marry.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now, concerning the resurrection, haven’t you read in the Torah
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the book of Moses.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: what God said to Moses at the burning bush? ‘I AM the living God, the God of Abraham, the God of Isaac, and the God of Jacob’?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The implication Jesus is making is that Abraham, Isaac, and Jacob were all alive (in glory) when God spoke to Moses in the burning bush.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: God is not God of the dead, but of the living, and you are all badly mistaken!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you wander off the path” (of truth).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Greatest Commandment
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now a certain religious scholar overheard them debating. When he saw how beautifully Jesus answered all their questions, he posed one of his own, and asked him, “Teacher, which commandment is the greatest of all?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“The most important of all the commandments is this: ‘The Lord'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', our God, is one!’'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But the tenants seized him and beat him and sent him back empty-handed.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You are to love the Lord
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ', your God, with a passionate heart, from the depths of your soul, with your every thought, and with all your strength. This is the great and supreme commandment.'
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'And the second is this: ‘You must love your neighbor'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is literally “your nearest,” which is a figure of speech for “your friend.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in the same way you love yourself.’ You will never find a greater commandment than these.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The religious scholar replied, “Yes, that’s true, Teacher. You spoke beautifully when you said that God is one, and there is no one else besides him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 4:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And there is something more important to God than all the sacrifices and burnt offerings: it’s the commandment to constantly love God with every passion of your heart, with your every thought, and with all your strength—and to love your neighbor in the same way as you love yourself.”'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jesus noticed how thoughtfully and sincerely the man answered, he said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You’re not far from the reality of God’s kingdom.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus tells the man that God’s kingdom is within reach. It is a present reality, not just a far-off concept. In
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Mark 11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the religious scholars (scribes) are mentioned a number of times. It was a religious scholar who questioned Jesus’ authority ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 11:27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and it was a religious scholar who questioned his interpretation of Scripture (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Now, in the verses that follow, Jesus shows that they had taught a theology without knowing the reality of Christ, the Messiah. Every teaching needs to be weighed by the reality of Christ, not the traditions of men.
      marker-yv: yv-n
    - type: text
      text: After that, no one dared to question him again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, Son of David—Lord of David
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Jesus was teaching in the courts of the temple, he posed a question to those listening: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do the religious scholars say that the Messiah is David’s son?
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Yet it was David, inspired by the Holy Spirit, who sang:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: wj
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: said to my Lord,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Sit near me in the place of authority
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
