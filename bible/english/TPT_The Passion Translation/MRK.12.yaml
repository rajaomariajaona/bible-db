document_id: MRK.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of the Tenants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Jesus began to speak to them in parables: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There once was a man who planted a vineyard
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “He planted a vineyard by a stream.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and put a secure fence around it.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 5:1–7
      metadata:
        usfm: ISA.5.1+ISA.5.2+ISA.5.3+ISA.5.4+ISA.5.5+ISA.5.6+ISA.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The vineyard is a metaphor for the promises of life and glory for Israel. The leaders of the nation were but tenants who were to tend the vineyard. The fence was God’s protection and favor that surrounded them. The winepress was the Holy Spirit, who gave them the inspired revelation of Scripture. The watchtower could speak of the ministry of the prophets, who were like watchmen on the walls for God’s people.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He dug a pit for its winepress and erected a watch tower. Then he leased it to tenant-farmers and traveled abroad.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the time of harvest came, he sent one of his servants
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These servants represent the prophets whom God commissioned to take his word to the people, but they were rejected and persecuted.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to the tenants to collect the landowners’ share of the harvest.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the tenants seized him and beat him and sent him back empty-handed.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So the owner sent another servant to them. And that one they shamefully humiliated and beat over the head.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Greek manuscripts and the Aramaic read “and stoned him.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So he sent another servant, and they brutally killed him. Many more servants were sent, and they were all severely beaten or killed.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The owner had only one person left to send—his only son, whom he dearly loved. So he sent him to them, saying, ‘Surely they will restrain themselves
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “They’ll be ashamed of what they’ve done.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and respect my son.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the tenants
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: saw their chance
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and said to one another, ‘This is the heir. Come! Let’s kill him, and then we’ll inherit it all!’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they violently seized him, killed him, and threw his body over the fence!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was the true Heir, who was crucified outside the walls of the city. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 13:12
      metadata:
        usfm: HEB.13.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So what do you think the owner of the vineyard will do? He will come and put to death those tenants and give his vineyard to others.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “others” is a hint of the gentiles who would receive the new covenant promises of God. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 15:1–2
      metadata:
        usfm: JHN.15.1+JHN.15.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 2:11–22
      metadata:
        usfm: EPH.2.11+EPH.2.12+EPH.2.13+EPH.2.14+EPH.2.15+EPH.2.16+EPH.2.17+EPH.2.18+EPH.2.19+EPH.2.20+EPH.2.21+EPH.2.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Haven’t you read what the psalmist said?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The stone the builders examined and rejected
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has become the cornerstone,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the most important stone of all?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 118:22–23
      metadata:
        usfm: PSA.118.22+PSA.118.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 8:14–15
      metadata:
        usfm: ISA.8.14+ISA.8.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 28:16
      metadata:
        usfm: ISA.28.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This was the Lord’s plan—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and he
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “it.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is wonderful for our eyes to behold!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “This came from the presence of Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and is a marvel in our eyes.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now, the chief priests, religious scholars, and leaders realized that Jesus’ parable was aimed at them. They had hoped to arrest him then and there, but they feared the reaction of the crowd, so they left him alone and went away.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paying Taxes to Caesar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then they sent a delegation of Pharisees, together with some staunch supporters of Herod, to entrap Jesus with his own words. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So they approached him and said, “Teacher, we know that you’re an honest man of integrity and you teach us the truth of God’s ways. We can clearly see that you’re not one who speaks only to win the people’s favor, because you speak the truth without regard to the consequences. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You don’t look into the faces of men” (before you speak the truth).
    marker-yv: yv-n
  - type: text
    text: So tell us, then, what you think. Is it proper for us to pay taxes to Caesar or not?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jesus saw through their hypocrisy and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you testing me? Show me one of the Roman coins.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They brought him a silver coin used to pay the tax.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now, tell me,”
  - type: text
    text: ' Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “whose head is on this coin and whose inscription is stamped on it?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Caesar’s,” they replied.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Actual coins from that era have been found with the emperor’s image and a superscription saying, “Tiberius Caesar Augustus, son of the divine Augustus.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Precisely. The coin bears the image of the emperor Caesar
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', so you should pay the emperor his portion.'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: But because you bear the image of God,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the text. The coin belongs to Caesar because it carries his image. We have an obligation to God because we carry his image.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you must give to God all that belongs to him.”
  - type: text
    text: ' And they were utterly stunned by Jesus’ words.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Question about Marriage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Some of the Sadducees, a religious group that denied there was a resurrection of the dead, came to ask Jesus this question: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Teacher, the law of Moses teaches '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 25:5–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'that if a man dies before he has children, his brother should marry the widow and raise up children for his brother’s family line. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Now, there was a family with seven brothers. The oldest got married but soon died, and he had no children. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The second brother married his oldest brother’s widow, and he also died without any children, and the third also. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This repeated down to the seventh brother, none of whom had children. Finally, the woman died. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So here’s our dilemma: Which of the seven brothers will be the woman’s husband when she’s resurrected from the dead, since they all were once married to her?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are mistaken
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You wander off the path” (of truth).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because your hearts are not filled with the revelation of the Scriptures or the power of God.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For when they rise from the dead, men and women will not marry, just like the angels of heaven don’t marry.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now, concerning the resurrection, haven’t you read in the Torah
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 12:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
