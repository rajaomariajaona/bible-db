  - type: text
    text: 'While Jesus was teaching in the courts of the temple, he posed a question to those listening: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why do the religious scholars say that the Messiah is David’s son?
  - type: text
    text: ' '
  - type: usfm
    marker: v
