document_id: EPH.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Divine Mystery
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Beloved friends, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because of my love for Jesus Christ
    - type: text
      text: ', I am now his prisoner for the sake of all of you who are not Jews, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The purpose of this was to unveil before every throne and rank of angelic orders in the heavenly realm God’s full and diverse wisdom revealed through the church. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The church is the “university of the angels” and every believer is a “professor” teaching the heavenly realm the mysteries and wonders of the grace of God. The angels investigate through our lives the treasures of grace, like the cherubim who gaze upon the mercy seat. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'This perfectly wise plan was destined from eternal ages and fulfilled completely in our Lord Jesus Christ, so that now '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'we have boldness through him, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek words used here can be translated, “freedom of speech to say whatever you want with boldness.”
      marker-yv: yv-n
    - type: text
      text: 'and free access as kings '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic text can be translated “we have kingship.”
      marker-yv: yv-n
    - type: text
      text: before the Father because of our complete confidence in Christ’s faithfulness.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: My dear friends, I pray that you will remain strong and not be discouraged or ashamed by all that I suffer on your behalf, for it is for your glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Prays for Love to Overflow
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So I kneel humbly in awe before the Father of our Lord Jesus, the Messiah, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'the perfect Father of every father and child '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic. It could also be translated “the perfect Father of every people group.” The Greek word for “father” and the word for “family” are quite similar, which indicates that every family finds its source in the Father.
      marker-yv: yv-n
    - type: text
      text: 'in heaven and on the earth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And I pray that he would unveil within you the unlimited riches of his glory and favor until supernatural strength floods your innermost being with his divine might and explosive power.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then, by constantly using your faith, the life of Christ will be released deep inside you, and the resting place of his love will become the very source and root of your life.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 18-19
    - type: text
      text: 'Then you will be empowered to discover what every holy one experiences—the great magnitude '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “excellence.”
      marker-yv: yv-n
    - type: text
      text: of the astonishing love of Christ in all its dimensions. How deeply intimate and far-reaching is his love! How enduring and inclusive it is! Endless love beyond measurement that transcends our understanding—this extravagant love pours into you until you are filled to overflowing with the fullness of God!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'so that you will hear the gospel that God has entrusted to me to share with you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Never doubt
    - type: text
      text: ' God’s mighty power to work in you and accomplish all this. He will achieve infinitely more than your greatest request, your most unbelievable dream, and exceed your wildest imagination! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 10:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: He will outdo them all, for his miraculous power constantly energizes you.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Now we offer up to God all the glorious praise that rises from every church in every generation through Jesus Christ—and all that will yet be manifest through time and eternity. Amen!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For this wonderful mystery, which I briefly described, was given to me by divine revelation, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: so that whenever you read it you will be able to understand my revelation and insight into the secret mystery of the Messiah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'There has never been a generation that has been given the detailed understanding of this glorious and divine mystery until now. He kept it a secret until this generation. God is revealing it only now to his sacred apostles and prophets by the Holy Spirit. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Here’s the secret: The gospel of grace has made you, non-Jewish believers, into coheirs of his promise through your union with him. And you have now become members of his body—one with the Anointed One!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 7-8
    - type: text
      text: 'I have been made a messenger of this wonderful news by the gift of grace that works through me. Even though I am the least significant of all his holy believers, this grace-gift was imparted when the manifestation of his power came upon me. Grace alone empowers me so that I can boldly preach this wonderful message to non-Jewish people, sharing with them the unfading, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: unfading
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comes from an Aramaic word which can also be translated “unquestionable” or “without fault.” The Greek uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: unsearchable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: inexhaustible riches of Christ, which are beyond comprehension.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'My passion is to enlighten every person to this divine mystery. It was hidden for ages past until now, and kept a secret in the heart of God, the Creator of all. '
