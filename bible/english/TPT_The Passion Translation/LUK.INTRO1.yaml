  - type: text
    content: About Luke
  - type: text
    content: You are about to read the biography of the wonderful man Jesus Christ. This glorious Gospel was penned by one of his early followers, a physician named Luke. All four Gospels in our New Testament are inspired by God, but Luke’s is unique. I believe that this could be described as the loveliest book ever written.
  - type: text
    content: 'Luke’s pen was anointed by the Holy Spirit and his book is still read today by the lovers of God, because it is the mercy Gospel. It is a book for everybody, for we all need mercy. Luke writes clearly of the humanity of Jesus—as the servant of all and the sacrifice for all. Every barrier is broken down in Luke’s Gospel: between Jew and gentile, men and women, rich and poor. In Luke we see Jesus as the Savior of all who come to him.'
  - type: text
    content: Luke, being a physician, learned the need to exhibit compassion and mercy toward others. It comes through in every chapter. Luke’s Gospel is perhaps the most compassionate and love-filled account of Jesus’ life ever written.
  - type: text
    content: Luke shares Jesus’ teachings on prayer, forgiveness, and our obligation to demonstrate mercy and grace in dealings with others. Luke provides us with rich details of Jesus’ love of children and the forsaken. Luke writes about Jesus’ ministry to women twenty-four times. This was somewhat controversial in the culture of his day. In fact, Luke uses an alternating narrative of one story about a man and the next story about a woman. Luke begins with the story of Zechariah, then moves to Mary. A focus on Simeon, then on Anna. The Roman centurion, then the widow of Nain. The good Samaritan, then Mary and Martha. This pattern continues throughout his Gospel.
  - type: text
    content: A large amount of Luke’s Gospel is not found in any other Gospel narrative. If we did not have the book of Luke, we wouldn’t know about the stories of the prodigal son, the good Samaritan, the wedding banquet, and other amazing teachings. Only in the book of Luke do we find the stories of the shepherds at Bethlehem, the ten lepers who were healed, the young man from Nain who was raised from the dead, and the dying thief on the cross next to Jesus. How thankful I am for the Gospel of Luke!
  - type: text
    content: My heart overflows with the joy of seeing the Word of God being translated with all its passion and fire into contemporary English. Unveiled before your eyes will be the glorious man, Jesus Christ, and the revelation of his undying love for you.
  - type: text
    content: Purpose
  - type: text
    content: This world is a far better place because of the revelation Luke shares with us in his Gospel. He gives us a full picture of Jesus’ life and ministry, applying scrupulous accuracy to all he wrote to ensure that what we read is factual. In fact, Luke uses the Greek word for “autopsy” (1:2) for investigating with firsthand knowledge those who had seen what Jesus did and heard what Jesus taught.
  - type: text
    content: Dr. Luke performed an “autopsy” on the facts of Jesus’ life, death, and resurrection, tracing them all back to their source to make sure what he compiled was of the highest degree of accuracy. He takes “Theophilus” through Jesus’ entire ministry career to reveal how God worked to show Jesus to be true and the hope of the world. He also shows how God has been faithful to Israel and the promises he’s given her, while inviting the nations to the table of Christ’s love and hope.
  - type: text
    content: Author and Audience
  - type: text
    content: We know little about Luke, the human author of this Gospel. He was a companion of the apostle Paul for some of his missionary journeys and was possibly one of Paul’s early converts. Luke was a literary genius and writes with powerful prose. Some believe Luke was possibly the only non-Jewish writer of the New Testament. Others believe that he was a Syrian Jew who took upon himself a gentile name. It is obvious that he knew firsthand many of the early followers of Jesus, even the apostles who were chosen to preach his name throughout the nations. Near the end of the apostle Paul’s life, when he was facing martyrdom, Paul wrote of his trusted friend, “only Luke [is] with me” (2 Tim. 4:11). Luke was mentored by the apostle Paul. This can be seen by Luke’s vocabulary in his gospel. There are two hundred expressions or phrases that are similar in Paul’s and Luke’s writings.
  - type: text
    content: The opening line of the Gospel indicates Luke wrote to the “most excellent Theophilus” (see the first footnote on Luke 1:1–4). The name Theophilus means “friend of God” or “lover of God.” The Greek word means “most honorable” or “mightiest.” Some scholars suggest there was no individual named Theophilus mentioned in Luke’s writings. Regardless, Luke’s Gospel is a greeting to all the lovers of God. He especially wrote it to non-Jewish lovers of God who may have felt out of place in the originally Jewish movement.
  - type: text
    content: Major Themes
  - type: text
    content: The Person and Work of Jesus.
  - type: text
    content: ' As you can imagine, a historical biography of Jesus will feature him and his work, front and center! In Luke’s Gospel, he is the sent one who is both Lord and Messiah. He is uniquely and intimately connected to God, transcending any portrait of him as simply a human figure and agent. He is also the one who acts, as the promised Messiah anointed by the Spirit to bring in the new era—God’s heavenly kingdom realm to earth. His ultimate act was on behalf of every person on the planet, bearing the sins of the world as he hung on the Roman cross. And in the end, this Lord Messiah was vindicated by the Father through the resurrection and exalted to his right hand through the ascension.'
  - type: text
    content: The Promised Kingdom Realm.
  - type: text
    content: ' In Jesus Christ, all of God’s promises are fulfilled. Chief among them is God’s promised kingdom realm. God’s kingdom realm is both present and coming. Jesus commands his disciples to proclaim that it has “come near” and is within peoples’ reach in the present. The promises of the last days have started to be fulfilled, and yet those promises haven’t been ultimately fulfilled. The full manifestation of the kingdom realm is still anticipated, when all the hoped-for prophecies of restoration will be realized.'
  - type: text
    content: Women and the Poor.
  - type: text
    content: ' Women are a crucial part of Jesus’ story—now and then. In Luke’s Gospel they provide examples of deep piety and devotion. They are both of humble means and wealthy. At every turn women are part of Jesus’ ministry: Elizabeth, Anna, and of course Mary play important roles in his infancy; women are healed, comforted, and forgiven in Galilee; on the way to Jerusalem, we meet Mary and Martha; and during Christ’s most desperate hours, women weep at his feet, stand with him faithfully; finally, they receive the first revelation of Jesus’ resurrection. Then there are the poor. Throughout Luke, the poor receive special attention too, showing that God deliberately reaches out to those whom society casts away. He makes clear the good news of Jesus and his love is for people like them, which means the gospel truly is for everybody!'
  - type: text
    content: The Holy Spirit.
  - type: text
    content: ' The Holy Spirit plays a major role in Luke’s Gospel, where he is referenced nearly twenty times. The Spirit is the driving force in the picture Luke paints of God’s coming salvation. He is the architect, the maestro guiding and energizing the events that transpire throughout the life of Jesus. We find him present from the very beginning with his conception and birth on to Christ’s baptism in the Spirit and through to his powerful miracle ministry. One of the most important texts in all the Gospels is Luke 3:15–16, where John says one “mightier” than he would come baptizing with “the Spirit of holiness and . . . fire.” This Spirit of fire is the sign and seal of the new era of the Messiah, come to rescue and re-create the world!'
