document_id: 2CO.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Previous Letter
  - type: text
    content: 'So '
  - type: text
    content: until these issues were settled
  - type: text
    content: ', '
  - type: note
    content: See 2 Cor. 2:4–11.
  - type: text
    content: 'I decided against paying you another painful visit. '
  - type: note
    content: Paul implies that he had already paid them one painful visit (1:15–17).
  '10':
  - type: text
    content: 'If you freely forgive anyone for anything, then I also forgive him. And if I have forgiven anything, I did so for you before the face of Christ, '
  '11':
  - type: text
    content: 'so that we would not be exploited '
  - type: note
    content: The Aramaic can be translated “so that Satan will not overtake us.”
  - type: text
    content: by the adversary, Satan, for we know his clever schemes.
  '12':
  - type: text
    content: 'When I arrived at Troas, bringing the wonderful news of Christ, the Lord opened a great door of opportunity to minister there. '
  '13':
  - type: text
    content: 'Still, I had no peace of mind, because I couldn’t find my dear brother Titus '
  - type: note
    content: Titus was a spiritual son to Paul whom he greatly loved. This is the Titus Paul wrote his letter to (book of Titus). He was responsible to collect and distribute an offering for the church in Jerusalem (2 Cor. 8:6). It is possible that Titus was the one who carried the painful letter to Corinth. After finding Titus in Macedonia, Paul sent him back to Corinth to deliver this letter.
  - type: text
    content: anywhere. So after saying goodbye to the believers, I set out for Macedonia to look for him.
  - type: heading
    content: Apostolic Ministry
  '14':
  - type: text
    content: 'God always makes his grace visible '
  - type: note
    content: As translated from the Aramaic. The Greek is “Thanks be to God.”
  - type: text
    content: 'in Christ, who includes us as partners of his endless triumph. '
  - type: note
    content: Or “who always leads us as captives in his triumphant procession.” This difficult-to-translate passage may be an allusion to the Roman victory procession in celebration of their military triumphs. See also Col. 2:15.
  - type: text
    content: 'Through our yielded lives he spreads '
  - type: note
    content: Or “manifests.”
  - type: text
    content: 'the fragrance of the knowledge of God everywhere we go. '
  '15':
  - type: text
    content: 'We '
  - type: note
    content: Although this is true of every believer, Paul, throughout this section, uses “we” in reference to apostles.
  - type: text
    content: 'have become the unmistakable aroma '
  - type: text
    content: of the victory
  - type: text
    content: ' of the Anointed One to God '
  - type: note
    content: Or “We are Christ’s sweet fragrance [of sacrifice] that ascends to God.”
  - type: text
    content: '—a perfume of life to those being saved and the odor of death '
  - type: note
    content: That is, a sacrifice ready to be offered.
  - type: text
    content: 'to those who are perishing. '
  '16':
  - type: text
    content: 'The unbelievers smell a deadly stench that leads to death, but believers smell the life-giving aroma that leads to abundant life. And who of us can rise to this challenge? '
  - type: note
    content: As challenging as our ministry may be, God empowers us to overcome by his Holy Spirit. He empowers everyone he calls.
  '17':
  - type: text
    content: 'For unlike so many, we are not peddlers '
  - type: note
    content: The Greek word kapēleuō (a hapax legomenon) means “retailer,” but in classical Greek it comes with a negative connotation (“one who sells at an illegitimate profit”). The adverbial form of the noun is “cheating” or “deceitful.”
  - type: text
    content: 'of God’s Word who water down the message. We are those sent from God with pure motives, who speak in the sight of God '
  - type: note
    content: Paul states that his ministry of teaching and preaching happened while he was in the presence of God. His eyes were set on God, not on the people’s response.
  - type: text
    content: from our union with Christ.
  '2':
  - type: text
    content: 'For if I brought you pain, you would be unable to bring me joy. '
  '3':
  - type: text
    content: 'And this was the very point I made in my letter, for I didn’t want to come and find sadness filling the very ones who should give me cheer. But I’m confident '
  - type: text
    content: that you will do what’s right
  - type: text
    content: ' so that my joyous delight will be yours.'
  '4':
  - type: text
    content: 'I wrote you previously sobbing and with a broken heart. '
  - type: note
    content: Paul is referring here (and in v. 3) not to 1 Corinthians but to a letter he had written them after they received 1 Corinthians and failed to properly respond to what he wrote. This painful letter (see also 7:8) was a reprimand that powerfully impacted them. God has sovereignly chosen that we would not have this painful letter included in the New Testament, but its impact on the Corinthians is noteworthy. See also Prov. 27:6.
  - type: text
    content: 'I was filled with anguish and deep distress. I had no intention of causing you pain but to convey the overwhelming measure of my love for you. '
  '5':
  - type: text
    content: 'For the one who has caused me grief has not only grieved me but, to some extent, has caused you all grief as well. '
  '6':
  - type: text
    content: 'I believe that your united rebuke '
  - type: note
    content: The Aramaic can be translated “Your triple rebuke is enough punishment.”
  - type: text
    content: 'has been punishment enough for him. '
  '7':
  - type: text
    content: 'Instead of more punishment, what he needs most is your encouragement through your gracious display of forgiveness. '
  '8':
  - type: text
    content: I beg you to reaffirm your deep love for him.
  '9':
  - type: text
    content: 'You see, I wrote previously in order to see if your hearts would pass the test and if you were willing to follow my counsel in everything. '
