document_id: 2CO.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Previous Letter
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'So '
  - type: usfm
    marker: it
    children:
    - type: text
      text: until these issues were settled
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 2:4–11
      metadata:
        usfm: 2CO.2.4+2CO.2.5+2CO.2.6+2CO.2.7+2CO.2.8+2CO.2.9+2CO.2.10+2CO.2.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'I decided against paying you another painful visit. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul implies that he had already paid them one painful visit (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:15–17
      metadata:
        usfm: 2CO.1.15+2CO.1.16+2CO.1.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For if I brought you pain, you would be unable to bring me joy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And this was the very point I made in my letter, for I didn’t want to come and find sadness filling the very ones who should give me cheer. But I’m confident '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that you will do what’s right
  - type: text
    text: ' so that my joyous delight will be yours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I wrote you previously sobbing and with a broken heart. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is referring here (and in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3'
      metadata:
        usfm: 2CO.2.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) not to 1 Corinthians but to a letter he had written them after they received 1 Corinthians and failed to properly respond to what he wrote. This painful letter (see also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7:8
      metadata:
        usfm: 2CO.7.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) was a reprimand that powerfully impacted them. God has sovereignly chosen that we would not have this painful letter included in the New Testament, but its impact on the Corinthians is noteworthy. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 27:6
      metadata:
        usfm: PRO.27.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'I was filled with anguish and deep distress. I had no intention of causing you pain but to convey the overwhelming measure of my love for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For the one who has caused me grief has not only grieved me but, to some extent, has caused you all grief as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I believe that your united rebuke '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Your triple rebuke is enough punishment.”
    marker-yv: yv-n
  - type: text
    text: 'has been punishment enough for him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Instead of more punishment, what he needs most is your encouragement through your gracious display of forgiveness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I beg you to reaffirm your deep love for him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'You see, I wrote previously in order to see if your hearts would pass the test and if you were willing to follow my counsel in everything. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'If you freely forgive anyone for anything, then I also forgive him. And if I have forgiven anything, I did so for you before the face of Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'so that we would not be exploited '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “so that Satan will not overtake us.”
    marker-yv: yv-n
  - type: text
    text: by the adversary, Satan, for we know his clever schemes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When I arrived at Troas, bringing the wonderful news of Christ, the Lord opened a great door of opportunity to minister there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Still, I had no peace of mind, because I couldn’t find my dear brother Titus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Titus was a spiritual son to Paul whom he greatly loved. This is the Titus Paul wrote his letter to (book of Titus). He was responsible to collect and distribute an offering for the church in Jerusalem (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 8:6
      metadata:
        usfm: 2CO.8.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It is possible that Titus was the one who carried the painful letter to Corinth. After finding Titus in Macedonia, Paul sent him back to Corinth to deliver this letter.
    marker-yv: yv-n
  - type: text
    text: anywhere. So after saying goodbye to the believers, I set out for Macedonia to look for him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apostolic Ministry
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'God always makes his grace visible '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “Thanks be to God.”
    marker-yv: yv-n
  - type: text
    text: 'in Christ, who includes us as partners of his endless triumph. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who always leads us as captives in his triumphant procession.” This difficult-to-translate passage may be an allusion to the Roman victory procession in celebration of their military triumphs. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Col. 2:15
      metadata:
        usfm: COL.2.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Through our yielded lives he spreads '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “manifests.”
    marker-yv: yv-n
  - type: text
    text: 'the fragrance of the knowledge of God everywhere we go. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'We '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although this is true of every believer, Paul, throughout this section, uses “we” in reference to apostles.
    marker-yv: yv-n
  - type: text
    text: 'have become the unmistakable aroma '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the victory
  - type: text
    text: ' of the Anointed One to God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “We are Christ’s sweet fragrance [of sacrifice] that ascends to God.”
    marker-yv: yv-n
  - type: text
    text: '—a perfume of life to those being saved and the odor of death '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, a sacrifice ready to be offered.
    marker-yv: yv-n
  - type: text
    text: 'to those who are perishing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The unbelievers smell a deadly stench that leads to death, but believers smell the life-giving aroma that leads to abundant life. And who of us can rise to this challenge? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As challenging as our ministry may be, God empowers us to overcome by his Holy Spirit. He empowers everyone he calls.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For unlike so many, we are not peddlers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: kapēleuō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a hapax legomenon) means “retailer,” but in classical Greek it comes with a negative connotation (“one who sells at an illegitimate profit”). The adverbial form of the noun is “cheating” or “deceitful.”
    marker-yv: yv-n
  - type: text
    text: 'of God’s Word who water down the message. We are those sent from God with pure motives, who speak in the sight of God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul states that his ministry of teaching and preaching happened while he was in the presence of God. His eyes were set on God, not on the people’s response.
    marker-yv: yv-n
  - type: text
    text: from our union with Christ.
