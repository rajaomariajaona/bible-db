document_id: MAT.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Who Is the Greatest in the Kingdom Realm?
  - type: text
    content: At that time the disciples came to ask Jesus, “Who is considered to be the greatest in heaven’s kingdom realm?”
  - type: note
    content: The Aramaic is “Who will reign in the kingdom realm of heaven?”
  '10':
  - type: text
    content: “Be careful that you not corrupt
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, which uses a figure of speech (“to bring down”) that is best translated “to corrupt” or “degrade.” The Greek is “despise,” or “look down upon.”
  - type: text
    content: one of these little ones. For I can assure you that in heaven each of their guardian angels
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is simply “angels.”
  - type: text
    content: always sees the face of my heavenly Father.”
  - type: heading
    content: A Parable of the Lost Lamb
  '11':
  - type: text
    content: “The Son of Man has come to give life to all who are lost.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew, the Aramaic, and a few Greek texts. Many reliable Greek manuscripts do not have this verse, and it is missing in many modern translations. See Ezek. 34:16.
  '12':
  - type: text
    content: 'Think of it this way: If a man owns a hundred sheep and one lamb wanders away and is lost, won’t he leave the ninety-nine grazing the hillside and thoroughly search for the one lost lamb?'
  - type: text
    content: ' '
  '13':
  - type: text
    content: And if he finds his lost lamb, he rejoices over it, more than over the ninety-nine that never went astray.
  - type: text
    content: ' '
  '14':
  - type: text
    content: Now you should understand that it is never the desire of your heavenly Father that a single one of these little ones should be lost.”
  - type: heading
    content: Restoring Broken Relationships
  '15':
  - type: text
    content: “If your fellow believer sins against you,
  - type: text
    content: ' '
  - type: note
    content: 'Although the words “against you,” are not found in the most reliable Greek manuscripts, they are included in the Hebrew Matthew and Aramaic, along with a number of Greek texts. The Hebrew Matthew indicates that Jesus addressed these words to Peter directly: “At that time Jesus said to Simon, called Keefa . . .”'
  - type: text
    content: you must go to that one privately and attempt to resolve the matter. If he responds, your relationship is restored.
  - type: text
    content: ' '
  - type: note
    content: See Lev. 19:17.
  '16':
  - type: text
    content: But if his heart is closed to you, then go to him again, taking one or two others with you. You’ll be fulfilling what the Scripture teaches when it says, ‘Every word may be verified by the testimony of two or three witnesses.’
  - type: text
    content: ' '
  - type: note
    content: See Deut. 19:16.
  '17':
  - type: text
    content: And if he refuses to listen, then share the issue with the congregation
  - type: text
    content: ' '
  - type: text
    content: in hopes of restoration
  - type: text
    content: . If he still refuses to respond, even to the church, then you must disregard him as though he were an outsider, on the same level as an unrepentant sinner.
  - type: note
    content: Or “a pagan or a tax collector.” Again, this is in hope of ultimate restoration. For even pagans and tax collectors can be saved. God is able to turn the wandering one back, as Jesus taught in the parable of the lost lamb (see vv. 11–14).
  '18':
  - type: text
    content: '“Receive this truth: Whatever you forbid on earth will be considered to be forbidden in heaven,'
  - type: text
    content: ' '
  - type: note
    content: Or “Whatever you bind [Aramaic ‘harness’] on earth will have been bound in heaven.” See Matt. 16:19 and footnote.
  - type: text
    content: and whatever you release on earth will be considered to be released in heaven.
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Again, I give you an eternal truth: If two of you agree to ask God for something in a symphony of prayer,'
  - type: text
    content: ' '
  - type: note
    content: The Greek word used here is sumphoneo, from which we get our English word “symphony.” The Aramaic is “if you are deserving of what you pray for.” The implication is that God will not give you what you are not yet ready for, just as an earthly father would not give his eight-year-old a car to drive.
  - type: text
    content: my heavenly Father will do it for you.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus called a little one '
  - type: note
    content: Or “toddler.” The Greek word is paidion, either a boy or a girl.
  - type: text
    content: 'to his side and said to them, '
  '20':
  - type: text
    content: For wherever two or three come together in honor of my name,
  - type: text
    content: ' '
  - type: note
    content: Or “in my name.”
  - type: text
    content: I am right there with them!”
  - type: heading
    content: Unlimited Forgiveness
  '21':
  - type: text
    content: Later Peter approached Jesus and said, “How many times do I have to forgive my fellow believer who keeps offending me? Seven times?”
  - type: note
    content: The Hebrew Matthew is “Seven times in one day?”
  '22':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Not seven times, Peter, but seventy times seven times!
  - type: text
    content: ' '
  - type: note
    content: Or “seventy-seven times.” This is a metaphor for an attitude of forgiveness that is limitless.
  '23':
  - type: text
    content: 'The lessons of forgiveness in heaven’s kingdom realm can be illustrated like this:'
  - type: text
    content: “There once was a king who had servants who had borrowed money from the royal treasury. He decided to settle accounts with each of them.
  - type: text
    content: ' '
  '24':
  - type: text
    content: As he began the process, it came to his attention that one of his servants
  - type: text
    content: ' '
  - type: note
    content: Although the Greek uses the word for “servant,” it means someone who ruled under the king, perhaps one of his magistrates or cabinet members who had authority over finances.
  - type: text
    content: owed him one billion dollars.
  - type: text
    content: ' '
  - type: note
    content: Or “ten thousand talents,” an unbelievable amount of money. A talent could be compared to the wages earned over decades. The number ten thousand is a Hebrew metaphor for “myriad.” The point is, the servant owed a huge amount of money that he was simply unable to repay.
  - type: text
    content: So he summoned the servant before him and said to him, ‘Pay me what you owe me.’
  - type: text
    content: ' '
  '25':
  - type: text
    content: When his servant was unable to repay his debt, the king ordered that he be sold as a slave along with his wife and children and every possession they owned as payment toward his debt.
  - type: text
    content: ' '
  '26':
  - type: text
    content: The servant threw himself facedown at his master’s feet and begged for mercy. ‘Please be patient with me. Just give me more time and I will repay you all that I owe.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: Upon hearing his pleas, the king had compassion on his servant, and released him, and forgave his entire debt.
  '28':
  - type: text
    content: “No sooner had the servant left when he met one of his fellow servants, who owed him twenty thousand dollars
  - type: text
    content: ' '
  - type: note
    content: Or “one hundred silver coins.” This would be a denarii, which is about a day’s wages. So the servant owed his friend about three months’ wages.
  - type: text
    content: He seized him by the throat and began to choke him, saying, ‘You’d better pay me right now everything you owe me!’
  - type: text
    content: ' '
  '29':
  - type: text
    content: His fellow servant threw himself facedown at his feet and begged, ‘Please be patient with me. If you’ll just give me time, I will repay you all that is owed.’
  - type: text
    content: ' '
  '3':
  - type: text
    content: '“Learn this well: Unless you dramatically change your way of thinking and become teachable like a little child'
  - type: text
    content: ' '
  - type: note
    content: 'The word Jesus used in Aramaic is talitha, which comes from the word for “wounded lamb.” Those hearing Jesus would have heard both meanings: “a little child” and “a wounded lamb.”'
  - type: text
    content: ', you will never be able to enter in.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: But the one who had his debt forgiven stubbornly refused to forgive what was owed him. He had his fellow servant thrown into prison and demanded he remain there until he repaid the debt in full.
  '31':
  - type: text
    content: “When his associates saw what was going on, they were outraged and went to the king and told him the whole story.
  - type: text
    content: ' '
  '32':
  - type: text
    content: The king said to him, ‘You scoundrel!
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “You servant of Belial!”
  - type: text
    content: Is this the way you respond to my mercy? Because you begged me, I forgave you the massive debt that you owed me.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Why didn’t you show the same mercy to your fellow servant that I showed to you?’
  - type: text
    content: ' '
  '34':
  - type: text
    content: In a fury of anger, the king turned him over to the prison guards to be tortured until all his debt was repaid.
  - type: text
    content: ' '
  '35':
  - type: text
    content: In this same way, my heavenly Father will deal with any of you if you do not release forgiveness from your heart
  - type: text
    content: ' '
  - type: note
    content: The Hebrew Matthew is “with a perfect heart.”
  - type: text
    content: toward your fellow believer.”
  '4':
  - type: text
    content: Whoever continually humbles himself
  - type: text
    content: ' '
  - type: note
    content: This means “to see yourself as unimportant in your own eyes.”
  - type: text
    content: to become like this little child is the greatest one in heaven’s kingdom realm.
  - type: text
    content: ' '
  '5':
  - type: text
    content: And if you tenderly care for this little one
  - type: text
    content: ' '
  - type: note
    content: The Greek uses the word for hospitality. The “little child” becomes a representative of unimportant people in general. Treating the least with care and respect makes us truly great.
  - type: text
    content: on my behalf, you are tenderly caring for me.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But if anyone abuses
  - type: text
    content: ' '
  - type: note
    content: The Greek word is skandalizō and can also mean “to scandalize,” “to put a stumbling block before them,” “to offend,” or “to cause to sin.”
  - type: text
    content: one of these little ones who believes in me, it would be better for him to have a heavy boulder tied around his neck and be hurled into the deepest sea
  - type: text
    content: ' '
  - type: text
    content: than to face the punishment he deserves!
  - type: note
    content: The Hebrew Matthew adds, “It would be better for him to never have been born!”
  '7':
  - type: text
    content: “Misery will come to the one who lures people away into sin. Troubles and obstacles to your faith are inevitable, but great devastation will come to the one guilty of causing others to stumble!
  - type: text
    content: ' '
  '8':
  - type: text
    content: If your hand clings to sin, cut it off and throw it away. If your foot continually steps onto sin’s path, cut it off and throw it away. For it is better for you to enter into heaven crippled and maimed than to have both hands and both feet and be thrown into the eternal fire.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And if your eye is always focusing on sin, pluck it out and throw it away. For it is better for you to enter into heaven with one eye than to be thrown into hell fire with two.
  - type: note
    content: Although the language Jesus uses is hyperbolic, the drastic measures he instructs us to take in order to stay pure remain valid. The last phrase is literally “into the Gehenna of fire!”
