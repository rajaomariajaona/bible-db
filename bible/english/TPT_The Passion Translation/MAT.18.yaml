  - type: text
    text: Who Is the Greatest in the Kingdom Realm?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: At that time the disciples came to ask Jesus, “Who is considered to be the greatest in heaven’s kingdom realm?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “Who will reign in the kingdom realm of heaven?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jesus called a little one '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “toddler.” The Greek word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: paidion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', either a boy or a girl.'
    marker-yv: yv-n
  - type: text
    text: 'to his side and said to them, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Learn this well: Unless you dramatically change your way of thinking and become teachable like a little child'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word Jesus used in Aramaic is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: talitha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which comes from the word for “wounded lamb.” Those hearing Jesus would have heard both meanings: “a little child” and “a wounded lamb.”'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', you will never be able to enter in.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whoever continually humbles himself
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This means “to see yourself as unimportant in your own eyes.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to become like this little child is the greatest one in heaven’s kingdom realm.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if you tenderly care for this little one
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek uses the word for hospitality. The “little child” becomes a representative of unimportant people in general. Treating the least with care and respect makes us truly great.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: on my behalf, you are tenderly caring for me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if anyone abuses
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: skandalizō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and can also mean “to scandalize,” “to put a stumbling block before them,” “to offend,” or “to cause to sin.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: one of these little ones who believes in me, it would be better for him to have a heavy boulder tied around his neck and be hurled into the deepest sea
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: than to face the punishment he deserves!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew adds, “It would be better for him to never have been born!”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Misery will come to the one who lures people away into sin. Troubles and obstacles to your faith are inevitable, but great devastation will come to the one guilty of causing others to stumble!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If your hand clings to sin, cut it off and throw it away. If your foot continually steps onto sin’s path, cut it off and throw it away. For it is better for you to enter into heaven crippled and maimed than to have both hands and both feet and be thrown into the eternal fire.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if your eye is always focusing on sin, pluck it out and throw it away. For it is better for you to enter into heaven with one eye than to be thrown into hell fire with two.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the language Jesus uses is hyperbolic, the drastic measures he instructs us to take in order to stay pure remain valid. The last phrase is literally “into the Gehenna of fire!”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be careful that you not corrupt
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic, which uses a figure of speech (“to bring down”) that is best translated “to corrupt” or “degrade.” The Greek is “despise,” or “look down upon.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: one of these little ones. For I can assure you that in heaven each of their guardian angels
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is simply “angels.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: always sees the face of my heavenly Father.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Parable of the Lost Lamb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Son of Man has come to give life to all who are lost.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew, the Aramaic, and a few Greek texts. Many reliable Greek manuscripts do not have this verse, and it is missing in many modern translations. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 34:16
      metadata:
        usfm: EZK.34.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Think of it this way: If a man owns a hundred sheep and one lamb wanders away and is lost, won’t he leave the ninety-nine grazing the hillside and thoroughly search for the one lost lamb?'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if he finds his lost lamb, he rejoices over it, more than over the ninety-nine that never went astray.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now you should understand that it is never the desire of your heavenly Father that a single one of these little ones should be lost.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Restoring Broken Relationships
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If your fellow believer sins against you,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Although the words “against you,” are not found in the most reliable Greek manuscripts, they are included in the Hebrew Matthew and Aramaic, along with a number of Greek texts. The Hebrew Matthew indicates that Jesus addressed these words to Peter directly: “At that time Jesus said to Simon, called Keefa . . .”'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you must go to that one privately and attempt to resolve the matter. If he responds, your relationship is restored.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 19:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if his heart is closed to you, then go to him again, taking one or two others with you. You’ll be fulfilling what the Scripture teaches when it says, ‘Every word may be verified by the testimony of two or three witnesses.’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 19:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if he refuses to listen, then share the issue with the congregation
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: in hopes of restoration
  - type: usfm
    marker: wj
    children:
    - type: text
      text: . If he still refuses to respond, even to the church, then you must disregard him as though he were an outsider, on the same level as an unrepentant sinner.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a pagan or a tax collector.” Again, this is in hope of ultimate restoration. For even pagans and tax collectors can be saved. God is able to turn the wandering one back, as Jesus taught in the parable of the lost lamb (see vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11–14
      metadata:
        usfm: MAT.18.11+MAT.18.12+MAT.18.13+MAT.18.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Receive this truth: Whatever you forbid on earth will be considered to be forbidden in heaven,'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Whatever you bind [Aramaic ‘harness’] on earth will have been bound in heaven.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 16:19
      metadata:
        usfm: MAT.16.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and footnote.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and whatever you release on earth will be considered to be released in heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Again, I give you an eternal truth: If two of you agree to ask God for something in a symphony of prayer,'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sumphoneo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', from which we get our English word “symphony.” The Aramaic is “if you are deserving of what you pray for.” The implication is that God will not give you what you are not yet ready for, just as an earthly father would not give his eight-year-old a car to drive.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: my heavenly Father will do it for you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For wherever two or three come together in honor of my name,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in my name.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am right there with them!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Unlimited Forgiveness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Later Peter approached Jesus and said, “How many times do I have to forgive my fellow believer who keeps offending me? Seven times?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “Seven times in one day?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Not seven times, Peter, but seventy times seven times!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “seventy-seven times.” This is a metaphor for an attitude of forgiveness that is limitless.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'The lessons of forgiveness in heaven’s kingdom realm can be illustrated like this:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There once was a king who had servants who had borrowed money from the royal treasury. He decided to settle accounts with each of them.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As he began the process, it came to his attention that one of his servants
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although the Greek uses the word for “servant,” it means someone who ruled under the king, perhaps one of his magistrates or cabinet members who had authority over finances.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: owed him one billion dollars.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “ten thousand talents,” an unbelievable amount of money. A talent could be compared to the wages earned over decades. The number ten thousand is a Hebrew metaphor for “myriad.” The point is, the servant owed a huge amount of money that he was simply unable to repay.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So he summoned the servant before him and said to him, ‘Pay me what you owe me.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When his servant was unable to repay his debt, the king ordered that he be sold as a slave along with his wife and children and every possession they owned as payment toward his debt.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The servant threw himself facedown at his master’s feet and begged for mercy. ‘Please be patient with me. Just give me more time and I will repay you all that I owe.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Upon hearing his pleas, the king had compassion on his servant, and released him, and forgave his entire debt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No sooner had the servant left when he met one of his fellow servants, who owed him twenty thousand dollars
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “one hundred silver coins.” This would be a denarii, which is about a day’s wages. So the servant owed his friend about three months’ wages.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He seized him by the throat and began to choke him, saying, ‘You’d better pay me right now everything you owe me!’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: His fellow servant threw himself facedown at his feet and begged, ‘Please be patient with me. If you’ll just give me time, I will repay you all that is owed.’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the one who had his debt forgiven stubbornly refused to forgive what was owed him. He had his fellow servant thrown into prison and demanded he remain there until he repaid the debt in full.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When his associates saw what was going on, they were outraged and went to the king and told him the whole story.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The king said to him, ‘You scoundrel!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “You servant of Belial!”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Is this the way you respond to my mercy? Because you begged me, I forgave you the massive debt that you owed me.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why didn’t you show the same mercy to your fellow servant that I showed to you?’
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In a fury of anger, the king turned him over to the prison guards to be tortured until all his debt was repaid.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In this same way, my heavenly Father will deal with any of you if you do not release forgiveness from your heart
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “with a perfect heart.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: toward your fellow believer.”
