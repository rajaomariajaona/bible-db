document_id: 2CO.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Weakness and God’s Power
  - type: text
    content: 'This will be my third trip to you. And I will make sure that by the testimony of two or three witnesses every matter will be confirmed. '
  - type: note
    content: See Deut. 19:15; Matt. 18:16; 1 Tim. 5:19.
  '10':
  - type: text
    content: I’m writing my honest feelings to you from afar so that when I arrive I won’t have to correct you by using the authority the Lord has given me, for I want to build you up and not tear you down.
  '11':
  - type: text
    content: 'Finally, beloved friends, '
  - type: note
    content: Or “brothers (and sisters).”
  - type: text
    content: 'be cheerful! Repair whatever is broken among you, as your hearts are being knit together in perfect unity. Live continually in peace, and God, the source of love and peace, will mingle with you. '
  '12':
  - type: text
    content: 'Greet and embrace one another with the sacred kiss. '
  - type: note
    content: What makes a kiss holy or sacred is that it comes from the love of God. See Song. 1:2; Rom. 16:16.
  '13':
  - type: text
    content: All of God’s holy people send their greetings.
  '14':
  - type: text
    content: Now, may the grace and joyous favor of the Lord Jesus Christ, the unambiguous love of God, and the precious communion that we share in the Holy Spirit be yours continually. Amen!
  - type: note
    content: 'The Aramaic ends with this concluding statement: “The end of the second letter to the Corinthians that was written from Philippi of Macedonia and sent by the hand of Titus.”'
  '2':
  - type: text
    content: 'Since you are demanding proof that the Anointed One is speaking through me, '
  - type: text
    content: I will give you proof by exercising discipline among you
  - type: text
    content: '. For just as I told you the last time I was there—and now, though absent, I say it again—that when I come I will not go easy on those whom I’ve already warned and those who continue to persist in their sin. Christ is not weak or feeble in his dealings with you but mighty and powerful within you. '
  '4':
  - type: text
    content: 'For although he was crucified as a “weakling,” now he lives '
  - type: text
    content: robed
  - type: text
    content: ' with God’s power. And we also are “weak ones” '
  - type: text
    content: in our co-crucifixion
  - type: text
    content: ' with him, but now we live in God’s triumphant power together with him, which is demonstrated on your behalf.'
  '5':
  - type: text
    content: 'Now your souls will be strengthened and healed if you hold steadfast to your faith. '
  - type: note
    content: As translated from the Aramaic. The Greek is “Examine yourselves to see if you are indeed in the faith.”
  - type: text
    content: 'Haven’t you already experienced Jesus Christ himself living in you? If not, you are deficient. '
  - type: note
    content: As translated from the Aramaic. The Greek is “unless you are disqualified.”
  '6':
  - type: text
    content: 'I hope you understand that we cannot be devalued. '
  - type: note
    content: As translated from the Aramaic. The Greek is “You know that we are not disqualified.”
  '7':
  - type: text
    content: 'But we pray to God that you will be flawless, '
  - type: note
    content: See Song. 4:7.
  - type: text
    content: 'not to validate our ministry among you but so that you may continue on the path of righteousness even if we are denigrated. '
  - type: note
    content: As translated from the Aramaic. The Greek is “even if we appear as disapproved.”
  '8':
  - type: text
    content: 'For in reality, the power we have is used in support of the truth, not against it. '
  '9':
  - type: text
    content: 'And we claim before God '
  - type: note
    content: The Greek word eukhomai (accusative and infinitive construction) means more than prayer; it is to make a claim before God in prayer. The verb is eukhe, which means a votive obligation and is translated “make a vow” in Acts 18:18.
  - type: text
    content: that you will be fully equipped and mature, for it brings us great joy when you are strong, even if we seem weak and denigrated.
  - type: heading
    content: Paul’s Farewell
