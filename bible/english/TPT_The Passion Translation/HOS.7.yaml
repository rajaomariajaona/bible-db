  '11':
  - type: text
    content: “Ephraim is like a dove, silly and senseless,
  - type: note
    content: Or “without wisdom and without a heart.”
  - type: text
    content: 'first calling on Egypt '
  - type: text
    content: for help
  - type: text
    content: then turning to Assyria.
  - type: note
    content: The two superpowers then continued to clash in chariot battles back and forth across Israel and the Fertile Crescent. Assyria, Babylon, and Persia took turns ruling Mesopotamia (modern Iraq), which had great wealth because of irrigation from the Tigris and Euphrates Rivers. The same was true of Egypt and the Nile. Israel had no such river system to ensure harvests and was often a political football between the two super-regions, having done time as slaves in Egypt and exiles in Babylon/Persia.
  '12':
  - type: text
    content: Wherever they turn,
  - type: text
    content: I will spread out my net and catch them.
  - type: text
    content: I will bring them down like the birds from the air.
  - type: text
    content: I will punish them for the evil they have done.”
  - type: note
    content: Or “according to the report to their congregation.”
  - type: heading
    content: Debauchery and Drunkenness
  '13':
