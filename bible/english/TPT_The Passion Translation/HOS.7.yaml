  - type: text
    content: says
  - type: text
    content: ', “They deceive the king with their wickedness'
  - type: note
    content: The Hebrew is ambiguous. It could also be translated “People make the king happy with the wickedness.”
  - type: text
    content: and the rulers with their lies.
  - type: note
    content: This section speaks of the assassination plots against the kings of Israel. Four kings from the Northern Kingdom of Israel were assassinated between 743 and 732 BC (Zechariah, Shallum, Pekahiah, and Pekah).
  '4':
  - type: text
    content: They are all unfaithful to the king.
  - type: text
    content: 'Their '
  - type: text
    content: anger
  - type: text
    content: ' is like an overheated oven.'
  - type: note
    content: Mutiny was common in the Northern Kingdom during this era, and many of its kings were assassinated.
  - type: text
    content: 'Their oven burns so hot that the baker could knead his bread '
  - type: text
    content: at night
  - type: text
    content: 'until it rises '
  - type: text
    content: in the morning
  - type: text
