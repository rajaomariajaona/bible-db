    - type: text
      text: '1'
  - type: text
    text: whenever I desire to heal Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am confronted by Ephraim’s guilt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all I can see is Samaria’s sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they all practice deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: No place is secure.
  - type: text
    text: ' They break into homes and steal.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gangs raid in the open.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But it never occurs to them
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “They do not speak to their hearts.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that I, '
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
  - type: text
    text: ', remember all their evil deeds.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are all prisoners of their own wickedness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their sin stares me in the face.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conspiracy in the King’s Court
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: says
  - type: text
    text: ', “They deceive the king with their wickedness'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is ambiguous. It could also be translated “People make the king happy with the wickedness.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the rulers with their lies.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This section speaks of the assassination plots against the kings of Israel. Four kings from the Northern Kingdom of Israel were assassinated between 743 and 732 BC (Zechariah, Shallum, Pekahiah, and Pekah).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They are all unfaithful to the king.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: anger
  - type: text
    text: ' is like an overheated oven.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mutiny was common in the Northern Kingdom during this era, and many of its kings were assassinated.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Their oven burns so hot that the baker could knead his bread '
  - type: usfm
    marker: it
    children:
    - type: text
      text: at night
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'until it rises '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the morning
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he still wouldn’t need to stoke the fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On the king’s day '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of celebration
  - type: text
    text: ' ,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: his officials are drunk with wine,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “his officials became sick from the poison in the wine.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the king trusted the traitors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Their hearts are like an oven that burns with treachery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All night long, their anger '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “all night long their baker smolders.” The Hebrew words for “anger” and “baker” are homonyms. It is possible that the palace baker was the central figure in the plot.
    marker-yv: yv-n
  - type: text
    text: smolders;
- type: usfm
  marker: q1
  children:
  - type: text
    text: then in the morning, it bursts into flame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Yes, they are all as hot as an oven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ready to consume their rulers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: All their kings have fallen in this way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: yet not one of them has ever called on me.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Israel Fails to Ask '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' for Help'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says, “Ephraim mixes with the nations.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8–16
      metadata:
        usfm: HOS.7.8+HOS.7.9+HOS.7.10+HOS.7.11+HOS.7.12+HOS.7.13+HOS.7.14+HOS.7.15+HOS.7.16
    - type: text
      text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'condemned Israel for three reasons: (1) seeking help from other nations (Egypt, Assyria) instead of turning to God, (2) worshiping pagan gods, and (3) turning away from'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: to adopt a powerless pagan god. Verses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8–10
      metadata:
        usfm: HOS.7.8+HOS.7.9+HOS.7.10
    - type: text
      text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: show Israel as feeble, like an old man. Verses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11–12
      metadata:
        usfm: HOS.7.11+HOS.7.12
    - type: text
      text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: show Israel as nervous and flighty, like a foolish dove. And in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13–16
      metadata:
        usfm: HOS.7.13+HOS.7.14+HOS.7.15+HOS.7.16
    - type: text
      text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pronounced doom on those who rebel against him.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: My people are like half-done flatbread,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: burnt on one side and raw dough on the other
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ephraim does not realize alliances with foreigners
- type: usfm
  marker: q1
  children:
  - type: text
    text: devoured his strength;
- type: usfm
  marker: q1
  children:
  - type: text
    text: even his hair has turned gray,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but he has no clue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Israel’s arrogance has become his own accuser.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet in spite of all these troubles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'they do not seek me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' their God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor come back to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Ephraim is like a dove, silly and senseless,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “without wisdom and without a heart.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'first calling on Egypt '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for help
- type: usfm
  marker: q1
  children:
  - type: text
    text: then turning to Assyria.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The two superpowers then continued to clash in chariot battles back and forth across Israel and the Fertile Crescent. Assyria, Babylon, and Persia took turns ruling Mesopotamia (modern Iraq), which had great wealth because of irrigation from the Tigris and Euphrates Rivers. The same was true of Egypt and the Nile. Israel had no such river system to ensure harvests and was often a political football between the two super-regions, having done time as slaves in Egypt and exiles in Babylon/Persia.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Wherever they turn,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will spread out my net and catch them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring them down like the birds from the air.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will punish them for the evil they have done.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “according to the report to their congregation.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Debauchery and Drunkenness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “They are doomed for having fled from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destruction will seize them for having rebelled against me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I longed to pay their ransom time and time again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but they have '
  - type: usfm
    marker: it
    children:
    - type: text
      text: believed and
  - type: text
    text: ' spoken lies about me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Their cries to me are not with a sincere heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they wail like heathens on their beds.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Their beds” may be a reference to cultic prostitution.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they ritually mutilate themselves
- type: usfm
  marker: q1
  children:
  - type: text
    text: to cause their grain and grapes to grow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they know they are rebelling against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Though I held them up, giving strength to their arms,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they plotted evil against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They turned in the wrong direction
- type: usfm
  marker: q1
  children:
  - type: text
    text: to a god who is no god at all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They are like a warped bow '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that can’t shoot straight
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their leaders will be killed in war
- type: usfm
  marker: q1
  children:
  - type: text
    text: because of all their arrogant, defiant words.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oh, how the Egyptians will mock them!”
