  - type: text
    content: Their hearts are like an oven that burns with treachery.
  - type: text
    content: 'All night long, their anger '
  - type: note
    content: Or “all night long their baker smolders.” The Hebrew words for “anger” and “baker” are homonyms. It is possible that the palace baker was the central figure in the plot.
  - type: text
