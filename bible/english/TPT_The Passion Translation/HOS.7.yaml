  '7':
  - type: text
    content: Yes, they are all as hot as an oven,
  - type: text
    content: ready to consume their rulers.
  - type: text
    content: All their kings have fallen in this way,
  - type: text
    content: yet not one of them has ever called on me.”
  - type: heading
    content: Israel Fails to Ask Yahweh for Help
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “Ephraim mixes with the nations.'
  - type: note
    content: 'In vv. 8–16 , Yahweh condemned Israel for three reasons: (1) seeking help from other nations (Egypt, Assyria) instead of turning to God, (2) worshiping pagan gods, and (3) turning away from Yahweh to adopt a powerless pagan god. Verses 8–10 show Israel as feeble, like an old man. Verses 11–12 show Israel as nervous and flighty, like a foolish dove. And in vv. 13–16 , Yahweh pronounced doom on those who rebel against him.'
  - type: text
    content: My people are like half-done flatbread,
  - type: text
    content: burnt on one side and raw dough on the other
  - type: text
    content: .
  '9':
  - type: text
    content: Ephraim does not realize alliances with foreigners
  - type: text
    content: devoured his strength;
  - type: text
    content: even his hair has turned gray,
  - type: text
    content: but he has no clue.
