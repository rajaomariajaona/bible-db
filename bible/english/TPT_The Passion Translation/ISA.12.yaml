document_id: ISA.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Song of Praise for the Redeemed
  - type: text
    content: In that day you will sing,
  - type: note
    content: 'Isaiah contains nine songs: the Song of Zion (Isa. 1–4), the Song of the Lover and His Vineyard (Isa. 5), the Song of Praise for the Redeemed (Isa. 12), the Song of the Strong City (Isa. 26:1–4), the Joyful Song of the Redeemed (Isa. 35), the New Song to the Lord (Isa. 42:10–12), the Song of Joy in Creation (Isa. 44:23), the Song of Salvation (Isa. 52:7–12), and the Song of the Suffering Servant (Isa. 52:13–53:12).'
  - type: text
    content: '“I praise you, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: for even though you were angry with me,
  - type: text
    content: your anger turned away,
  - type: text
    content: and now you tenderly comfort me.
  - type: note
    content: Or, as a jussive (expression of desire), “May your anger be turned away and may you comfort me” (Masoretic Text).
  '2':
  - type: text
    content: Behold—God is my salvation!
  - type: note
    content: 'Or “the God who gives me triumph.” The Hebrew word for “salvation,” yĕshuw’ah, is found in Isaiah twenty-eight times and is very similar to the Hebrew name of Jesus: Yeshua. Redemption is God’s last word, not judgment. To know Jesus is to know the God of salvation.'
  - type: text
    content: 'I am confident, unafraid, and I will trust '
  - type: text
    content: in you
  - type: text
    content: .”
  - type: text
    content: Yes!
  - type: text
    content: ' The Lord Yah is my might and my melody;'
  - type: text
    content: he has become my salvation!
  - type: note
    content: See Ex. 15:2; Ps. 118:14.
  '3':
  - type: text
    content: 'With '
  - type: text
    content: triumphant
  - type: text
    content: ' joy you will drink deeply'
  - type: text
    content: 'from the wells '
  - type: note
    content: Or “fountains,” “springs,” or “streams” (LXX). The streams of salvation represent Jesus’ life in us. See Isa. 41:17–18; Jer. 2:13; 17:13; John 4:13–14; 7:37–39; Rev. 7:17. Through Christ, God’s sons and daughters are living wells of salvation, containers bringing the water of life to others.
  - type: text
    content: of salvation.
  - type: note
    content: Or “the savior” (yĕshuw’ah).
  '4':
  - type: text
    content: 'In that '
  - type: text
    content: glorious
  - type: text
    content: ' day, you will say to one another,'
  - type: text
    content: “Give thanks to the Lord and ask him for more!
  - type: note
    content: Or “call upon his name”; that is, invoke his name for help.
  - type: text
    content: Tell the world about all that he does!
  - type: text
    content: Let them know how magnificent he is!”
  - type: note
    content: Or “Proclaim that his name is exalted.”
  '5':
  - type: text
    content: Sing praises to the Lord, for he has done marvelous wonders,
  - type: text
    content: and let his fame be known throughout the earth!
  '6':
  - type: text
    content: Give out a shout of cheer;
  - type: text
    content: 'sing for joy, '
  - type: note
    content: See Pss. 47:1; 148–150.
  - type: text
    content: O people of Zion,
  - type: text
    content: for great and mighty is the Holy One of Israel
  - type: text
    content: who lives among you!
