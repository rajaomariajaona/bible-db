document_id: ISA.51,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Zion’s Restoration
  - type: text
    content: “Listen to me, you who chase after righteousness,
  - type: note
    content: See Deut. 16:20; Prov. 15:9; 21:21.
  - type: text
    content: 'you who '
  - type: text
    content: passionately
  - type: text
    content: ' pursue the Lord.'
  - type: text
    content: 'Look back to '
  - type: text
    content: Abraham
  - type: text
    content: ', the rock from which you were cut,'
  - type: text
    content: 'to '
  - type: text
    content: Sarah
  - type: text
    content: ', the quarry from which you were dug,'
  - type: text
    content: and remember what I did for them.
  '10':
  - type: text
    content: 'Wasn’t it you who dried up the '
  - type: text
    content: Red
  - type: text
    content: ' Sea with its deep waters'
  - type: text
    content: 'and made a path through the sea to rescue '
  - type: note
    content: Or “to cross over.”
  - type: text
    content: your redeemed?
  '11':
  - type: text
    content: Do it again!
  - type: text
    content: 'Those '
  - type: text
    content: Yahweh
  - type: text
    content: ' has set free'
  - type: text
    content: will return to Zion and come celebrating with songs of joy!
  - type: text
    content: They will be crowned with never-ending joy!
  - type: text
    content: Gladness and joy will overwhelm them;
  - type: text
    content: despair and depression will disappear!
  '12':
  - type: text
    content: “I, yes I, am the one who comforts you.
  - type: text
    content: All the sons of men will be cut down and fade like grass.
  - type: text
    content: Why then would you be afraid of a mere human being?
  '13':
  - type: text
    content: 'You have forgotten that '
  - type: text
    content: Yahweh
  - type: text
    content: ', your Maker,'
  - type: text
    content: stretched out the skies and laid earth’s firm foundation.
  - type: text
    content: But you live each day constantly worrying,
  - type: note
    content: Or “trembling.”
  - type: text
    content: living in fear of your angry oppressor
  - type: text
    content: who is bent on your destruction.
  - type: text
    content: But their fury cannot touch you!
  '14':
  - type: text
    content: Those who are suffering will soon be released.
  - type: text
    content: 'They will not die in their '
  - type: text
    content: dark
  - type: text
    content: ' dungeon,'
  - type: text
    content: nor will they go hungry.
  '15':
  - type: text
    content: 'For I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', your '
  - type: text
    content: faithful
  - type: text
    content: ' God,'
  - type: text
    content: who split the sea with its roaring waves.
  - type: note
    content: See Ps. 74:13; Jer. 31:35.
  - type: text
    content: 'My name is Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies!”'
  - type: heading
    content: Hidden in the Hollow of His Hand
  '16':
  - type: text
    content: “I have placed my words in your mouth
  - type: note
    content: Jesus Christ is the true Prophet who has the words of God in his mouth.
  - type: text
    content: 'and have hidden you in the hollow '
  - type: note
    content: Or “shadow.”
  - type: text
    content: of my hand
  - type: text
    content: to establish the heavens and make the earth rock solid.
  - type: text
    content: You will say to Zion, ‘You are my people!’ ”
  - type: heading
    content: Wake Up, Zion
  '17':
  - type: text
    content: 'Wake up! Wake up! '
  - type: note
    content: In v. 9, the people were crying out to God to awaken and arise, but here God was telling the people they were the ones who must wake up and arise.
  - type: text
    content: Get up, Jerusalem!
  - type: text
    content: 'You have drunk enough from the cup '
  - type: text
    content: Yahweh
  - type: text
    content: ' handed you.'
  - type: text
    content: It was the cup of his anger, and you’ve drained it dry—
  - type: text
    content: the intoxicating bowl that makes men stagger!
  '18':
  - type: text
    content: There are none of Zion’s children left,
  - type: text
    content: 'none to guide '
  - type: text
    content: her home
  - type: text
    content: ' '
  - type: note
    content: The image here is that Zion has been intoxicated by drinking the cup of God’s anger (see Jer. 49:12) and there is no one there to take her home in that condition. In the culture of that day, it was the responsibility of children to guide a drunken parent home.
  - type: text
    content: and take her by the hand,
  - type: text
    content: none among all the children she has raised.
  '19':
  - type: text
    content: Twin calamities have come upon you,
  - type: text
    content: but who will feel sorry for you?
  - type: text
    content: Disaster and devastation, famine and war,
  - type: note
    content: Although there are four listed, this double calamity is seen in two couplets (disaster and devastation, famine and war).
  - type: text
    content: but who will comfort you?
  '2':
  - type: text
    content: Yes, look to Abraham your father and to Sarah, who bore you.
  - type: text
    content: For when I called Abraham, he was but one person,
  - type: text
    content: 'but I blessed him '
  - type: text
    content: greatly
  - type: text
    content: ' so that one became many.”'
  - type: note
    content: Part of the Abrahamic blessing was the power to procreate, even when Sarah was barren.
  '20':
  - type: text
    content: Your children have fainted and lie fallen in the streets,
  - type: text
    content: like a gazelle caught in a net.
  - type: text
    content: Yahweh
  - type: text
    content: ’s anger,
  - type: text
    content: the rebuke of your God, has overwhelmed them.
  '21':
  - type: text
    content: So listen, you who are weak and wounded,
  - type: text
    content: 'who are intoxicated not with wine '
  - type: text
    content: but with God’s anger
  - type: text
    content: .
  '22':
  - type: text
    content: This is what your sovereign ruler,
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God,'
  - type: text
    content: 'the Mighty Defender of his people, says:'
  - type: text
    content: “Look! I have removed from your hand
  - type: text
    content: the intoxicating cup that made you stagger.
  - type: text
    content: You will no longer drink from the bowl of my anger.
  '23':
  - type: text
    content: Instead, I will put that bowl
  - type: text
    content: in the hands of your tormentors who said to you,
  - type: text
    content: ‘Lie down so we can walk all over you!’
  - type: text
    content: For your back became like the ground they trample on,
  - type: text
    content: like a street for them to walk on.”
  '3':
  - type: text
    content: 'Indeed, '
  - type: text
    content: Yahweh
  - type: text
    content: ' will comfort Zion, '
  - type: text
    content: restore her
  - type: text
    content: ','
  - type: text
    content: and comfort all her broken places.
  - type: text
    content: 'He will transform her wilderness into '
  - type: text
    content: the garden of
  - type: text
    content: ' Bliss,'
  - type: note
    content: Or “the garden of Eden.” See Joel 2:3.
  - type: text
    content: 'her desert into the garden of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: Joy and laughter will fill the air
  - type: note
    content: Or “will abide in her.”
  - type: text
    content: with thanksgiving and joyous melodies.
  '4':
  - type: text
    content: “Listen to me, my people;
  - type: text
    content: pay attention to me, my nation.
  - type: text
    content: For I release my teaching to the nations,
  - type: text
    content: and I will cause the light of justice to rest on them.
  - type: note
    content: Or “I will make my justice a light for the nations.” See John 8:12.
  '5':
  - type: text
    content: My righteousness is coming closer,
  - type: note
    content: 'See Mark 1:14–15. Isa. 51:5 gives us three pictures of Jesus Christ: God’s righteousness, God’s salvation, and God’s mighty arms.'
  - type: text
    content: and my salvation has gone out.
  - type: text
    content: 'My '
  - type: text
    content: mighty
  - type: text
    content: ' arms will govern the people.'
  - type: text
    content: The islands will trust in me
  - type: text
    content: and put their hope in the unveiling of my might.
  - type: note
    content: Or “hope in my arm [of power].”
  '6':
  - type: text
    content: Lift up your eyes to the heavenly realm
  - type: text
    content: and look at the earth far below.
  - type: text
    content: Though the heavens disappear like smoke,
  - type: text
    content: though the earth wears out like a garment,
  - type: text
    content: and though all the people die like gnats,
  - type: text
    content: my salvation will endure forever
  - type: text
    content: and my righteousness will never end!
  '7':
  - type: text
    content: So listen to me, you who care for what is right,
  - type: text
    content: 'who treasure my teaching in your hearts:'
  - type: text
    content: Do not fear the insults of others;
  - type: text
    content: do not be troubled when they revile you.
  '8':
  - type: text
    content: They are nothing for you to fear,
  - type: text
    content: for the moth will eat them up like a shirt
  - type: text
    content: and the worm will consume them like wool,
  - type: text
    content: but my righteousness will last forever
  - type: text
    content: and my salvation from generation to generation.”
  - type: heading
    content: Cry Out to God
  '9':
  - type: text
    content: Awake, God, awake!
  - type: text
    content: 'Arm of '
  - type: text
    content: Yahweh
  - type: text
    content: ', put on your robe of strength!'
  - type: text
    content: 'Awake '
  - type: text
    content: and do the works of power
  - type: text
    content: ' as in ancient days,'
  - type: text
    content: as in generations past!
  - type: text
    content: 'Wasn’t it you who smashed the sea monster '
  - type: note
    content: This is the Hebrew word rahav (Rahab), likely a metaphor for Egypt.
  - type: text
    content: to pieces,
  - type: text
    content: 'who pierced the dragon '
  - type: note
    content: See Ps. 74:13–14; Ezek. 29:3.
  - type: text
    content: in generations long ago?
