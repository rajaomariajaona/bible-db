  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: passionately
    - type: text
      text: ' pursue the Lord.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Look back to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abraham
    - type: text
      text: ', the rock from which you were cut,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sarah
    - type: text
      text: ', the quarry from which you were dug,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and remember what I did for them.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wasn’t it you who dried up the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Red
    - type: text
      text: ' Sea with its deep waters'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and made a path through the sea to rescue '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to cross over.”
      marker-yv: yv-n
    - type: text
      text: your redeemed?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do it again!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Those '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has set free'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will return to Zion and come celebrating with songs of joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be crowned with never-ending joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gladness and joy will overwhelm them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: despair and depression will disappear!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I, yes I, am the one who comforts you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the sons of men will be cut down and fade like grass.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why then would you be afraid of a mere human being?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have forgotten that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your Maker,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stretched out the skies and laid earth’s firm foundation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you live each day constantly worrying,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “trembling.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: living in fear of your angry oppressor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who is bent on your destruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their fury cannot touch you!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who are suffering will soon be released.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will not die in their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dark
    - type: text
      text: ' dungeon,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will they go hungry.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: faithful
    - type: text
      text: ' God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who split the sea with its roaring waves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 74:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My name is Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hidden in the Hollow of His Hand
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have placed my words in your mouth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus Christ is the true Prophet who has the words of God in his mouth.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and have hidden you in the hollow '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “shadow.”
      marker-yv: yv-n
    - type: text
      text: of my hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to establish the heavens and make the earth rock solid.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will say to Zion, ‘You are my people!’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wake Up, Zion
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wake up! Wake up! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the people were crying out to God to awaken and arise, but here God was telling the people they were the ones who must wake up and arise.'
      marker-yv: yv-n
    - type: text
      text: Get up, Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You have drunk enough from the cup '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' handed you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It was the cup of his anger, and you’ve drained it dry—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the intoxicating bowl that makes men stagger!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are none of Zion’s children left,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'none to guide '
    - type: usfm
      marker: it
      children:
      - type: text
        text: her home
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The image here is that Zion has been intoxicated by drinking the cup of God’s anger (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 49:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and there is no one there to take her home in that condition. In the culture of that day, it was the responsibility of children to guide a drunken parent home.
      marker-yv: yv-n
    - type: text
      text: and take her by the hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: none among all the children she has raised.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Twin calamities have come upon you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but who will feel sorry for you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disaster and devastation, famine and war,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although there are four listed, this double calamity is seen in two couplets (disaster and devastation, famine and war).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but who will comfort you?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, look to Abraham your father and to Sarah, who bore you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when I called Abraham, he was but one person,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but I blessed him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: greatly
    - type: text
      text: ' so that one became many.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Part of the Abrahamic blessing was the power to procreate, even when Sarah was barren.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your children have fainted and lie fallen in the streets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a gazelle caught in a net.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the rebuke of your God, has overwhelmed them.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So listen, you who are weak and wounded,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who are intoxicated not with wine '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but with God’s anger
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is what your sovereign ruler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the Mighty Defender of his people, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! I have removed from your hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the intoxicating cup that made you stagger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will no longer drink from the bowl of my anger.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instead, I will put that bowl
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the hands of your tormentors who said to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Lie down so we can walk all over you!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For your back became like the ground they trample on,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a street for them to walk on.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Indeed, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will comfort Zion, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: restore her
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and comfort all her broken places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will transform her wilderness into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the garden of
    - type: text
      text: ' Bliss,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the garden of Eden.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'her desert into the garden of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joy and laughter will fill the air
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “will abide in her.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with thanksgiving and joyous melodies.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Listen to me, my people;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pay attention to me, my nation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I release my teaching to the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will cause the light of justice to rest on them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will make my justice a light for the nations.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My righteousness is coming closer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 1:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 51:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'gives us three pictures of Jesus Christ: God’s righteousness, God’s salvation, and God’s mighty arms.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my salvation has gone out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' arms will govern the people.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The islands will trust in me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and put their hope in the unveiling of my might.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 51:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hope in my arm [of power].”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your eyes to the heavenly realm
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and look at the earth far below.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though the heavens disappear like smoke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though the earth wears out like a garment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and though all the people die like gnats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my salvation will endure forever
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my righteousness will never end!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
