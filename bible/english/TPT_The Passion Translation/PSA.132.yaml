document_id: PSA.132,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: David’s Dynasty
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, please don’t forget all the hardships
  - type: usfm
    marker: q1
    children:
    - type: text
      text: David had to pass through.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t forsake your anointed king now,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but honor your servant David.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you gave your word and promised David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in an unbreakable oath that one of his sons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would be sitting on the throne to succeed him as king.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You also promised that if David’s sons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: would be faithful to keep their promise to follow you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: obeying the words you spoke to them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then David’s dynasty would never end.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, you have chosen Zion as your dwelling place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your pleasure is fulfilled in making it your home.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hear you say, “I will make this place my eternal dwelling,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have loved and desired it as my very own!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make Zion prosper and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satisfy her poor with my provision.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cover my priests with salvation’s power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all my righteous ones will shout for joy!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will increase the anointing that was upon David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and my glistening '
    - type: usfm
      marker: it
      children:
      - type: text
        text: glory
    - type: text
      text: ' will rest upon my anointed one.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will clothe his enemies with shame,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but holiness will bloom on my anointed one.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 132:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew reads “his crown will sparkle and gleam.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And how he promised you, Jacob’s mighty God, saying,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will not cross the threshold of my own home
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to sleep in my own bed.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will not sleep or slumber,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor even take time to close my eyes in rest,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until I find a place for you to dwell, O mighty God of Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I devote myself to finding a resting place for you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 132:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Historically, this refers to David wanting to bring the ark of glory back to Jerusalem.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: First we heard that the ark was at Bethlehem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we found it in the forest of Kiriath-Jearim.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 132:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Hebrew text does not have the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ark
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: but simply
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: it
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', this translation supplies the word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ark
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: from its reference in verse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . For the sake of understanding the text, this translation substitutes “Bethlehem” for “Ephrathah” (Ephrathah was the ancient name for Bethlehem) and “Kiriath-Jearim” for “Jaar” (“the fields of Jaar” was a variant form of Kiriath-Jearim, which means “the city of forests”).
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s go into God’s dwelling place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and bow down and worship before him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, O Lord, and enter your resting place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both you and the ark of your glorious strength!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your priests wear the robes of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and let all your godly lovers sing for joy!
