document_id: PSA.132,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Dynasty
  - type: text
    content: A song of the stairway
  - type: text
    content: Lord, please don’t forget all the hardships
  - type: text
    content: David had to pass through.
  '10':
  - type: text
    content: Don’t forsake your anointed king now,
  - type: text
    content: but honor your servant David.
  '11':
  - type: text
    content: For you gave your word and promised David
  - type: text
    content: in an unbreakable oath that one of his sons
  - type: text
    content: would be sitting on the throne to succeed him as king.
  '12':
  - type: text
    content: You also promised that if David’s sons
  - type: text
    content: would be faithful to keep their promise to follow you,
  - type: text
    content: obeying the words you spoke to them,
  - type: text
    content: then David’s dynasty would never end.
  '13':
  - type: text
    content: Lord, you have chosen Zion as your dwelling place,
  - type: text
    content: for your pleasure is fulfilled in making it your home.
  '14':
  - type: text
    content: I hear you say, “I will make this place my eternal dwelling,
  - type: text
    content: for I have loved and desired it as my very own!
  '15':
  - type: text
    content: I will make Zion prosper and
  - type: text
    content: satisfy her poor with my provision.
  '16':
  - type: text
    content: I will cover my priests with salvation’s power,
  - type: text
    content: and all my righteous ones will shout for joy!
  '17':
  - type: text
    content: I will increase the anointing that was upon David,
  - type: text
    content: 'and my glistening '
  - type: text
    content: glory
  - type: text
    content: ' will rest upon my anointed one.'
  '18':
  - type: text
    content: I will clothe his enemies with shame,
  - type: text
    content: but holiness will bloom on my anointed one.”
  - type: note
    content: As translated from the Septuagint. The Hebrew reads “his crown will sparkle and gleam.”
  '2':
  - type: text
    content: And how he promised you, Jacob’s mighty God, saying,
  '3':
  - type: text
    content: “I will not cross the threshold of my own home
  - type: text
    content: to sleep in my own bed.
  '4':
  - type: text
    content: I will not sleep or slumber,
  - type: text
    content: nor even take time to close my eyes in rest,
  '5':
  - type: text
    content: until I find a place for you to dwell, O mighty God of Jacob.
  - type: text
    content: I devote myself to finding a resting place for you!”
  - type: note
    content: Historically, this refers to David wanting to bring the ark of glory back to Jerusalem.
  '6':
  - type: text
    content: First we heard that the ark was at Bethlehem.
  - type: text
    content: Then we found it in the forest of Kiriath-Jearim.
  - type: note
    content: Although the Hebrew text does not have the word ark but simply it, this translation supplies the word ark from its reference in verse 8. For the sake of understanding the text, this translation substitutes “Bethlehem” for “Ephrathah” (Ephrathah was the ancient name for Bethlehem) and “Kiriath-Jearim” for “Jaar” (“the fields of Jaar” was a variant form of Kiriath-Jearim, which means “the city of forests”).
  '7':
  - type: text
    content: Let’s go into God’s dwelling place
  - type: text
    content: and bow down and worship before him.
  '8':
  - type: text
    content: Arise, O Lord, and enter your resting place,
  - type: text
    content: both you and the ark of your glorious strength!
  '9':
  - type: text
    content: May your priests wear the robes of righteousness,
  - type: text
    content: and let all your godly lovers sing for joy!
