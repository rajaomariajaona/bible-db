  '1':
  - type: heading
    content: Promise of Restoration
  - type: text
    content: 'Now, this is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “
  - type: text
    content: Listen
  - type: text
    content: ', Jacob, to the One who created you,'
  - type: text
    content: Israel, to the one who shaped who you are.
  - type: note
    content: Jacob was created, but Israel was formed. God forms (transforms) Jacob into Israel. God is seen here as the one who changes the nature of man. See Gen. 32:28.
  - type: text
    content: Do not fear,
  - type: text
    content: for I, your Kinsman-Redeemer, will rescue you.
  - type: text
    content: I have called you by name, and you are mine.
  '10':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “You are my witnesses, my chosen servants.'
  - type: text
    content: 'I chose you in order that you would know me '
  - type: text
    content: intimately
  - type: text
    content: ','
  - type: text
    content: believe me always, and fully understand that I am the only God.
  - type: text
    content: There was no god before me,
  - type: text
    content: and there will be no other god after me.
  '11':
  - type: text
    content: 'I, only I, am '
  - type: text
    content: Yahweh
  - type: text
    content: ', and there is no Savior-God but me.'
  '12':
  - type: text
    content: I am the only one who revealed this to you.
  - type: text
    content: 'I saved you, foretold '
