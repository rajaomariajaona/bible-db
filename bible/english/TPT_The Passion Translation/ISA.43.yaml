    content: Or “proclaimed,” a word often used for proclaiming what is to come (see v. 9).
  - type: text
    content: 'the future, '
  - type: text
    content: and brought it to pass
  - type: text
    content: .
  - type: text
    content: It was not some foreign god who did this!
  - type: text
    content: 'You are my witnesses that I am God,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '13':
  - type: text
    content: “From the very beginning, I am the only God!
  - type: note
    content: Or “Ever since day was, I am he.”
  - type: text
    content: No one can be snatched from my hand.
  - type: note
    content: See John 10:28–29.
  - type: text
    content: 'When I '
  - type: text
    content: choose to
  - type: text
    content: ' act, who can reverse it?”'
  - type: heading
    content: God, Israel’s Protector
  '14':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'your Kinsman-Redeemer, '
  - type: note
    content: It is a beautiful thought that the Holy One, who must punish evil, is also our Kinsman-Redeemer. He loves us so much that he became the sacrifice to return us to God. See Lev. 25:25; Ruth 3:9; 4:14; Isa. 44:24.
  - type: text
    content: 'the Holy One of Israel, says:'
  - type: text
    content: “For your good, I will send for the Babylonians;
  - type: text
    content: I will bring them all as fugitives
  - type: text
    content: and turn the shouting of the Chaldeans into mourning.
  - type: note
    content: Or “in ships their joyful shout.” The Hebrew of this clause is uncertain.
  '15':
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', your Holy One and your King,'
  - type: text
    content: the Creator of Israel.”
  - type: heading
    content: God Will Do a New Thing
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' is the one who makes a way in the sea,'
  - type: text
    content: a pathway in the mighty waters.
  - type: note
    content: Jesus, walking on the water, made a way (or journey) in the sea. See Ps. 77:19.
  '17':
  - type: text
    content: 'He destroyed '
  - type: note
    content: Or “led out [to destruction].”
  - type: text
    content: chariots and horses
  - type: note
    content: Chariots and horses are frequent biblical metaphors for the strength of the flesh.
  - type: text
    content: and all their mighty warriors.
  - type: text
    content: They fell, never to rise again—
  - type: text
    content: 'gone forever, snuffed out like a wick. This is what he says:'
  '18':
  - type: text
    content: “Stop dwelling on the past.
  - type: text
    content: Don’t even remember these former things.
  '19':
  - type: text
    content: 'I am doing something brand new, '
  - type: text
    content: something unheard of
  - type: text
    content: .
  - type: text
    content: Even now it sprouts and grows and matures.
  - type: text
    content: Don’t you perceive it?
  - type: note
    content: See Amos 3:7.
  - type: text
    content: I will make a way in the wilderness
  - type: text
    content: 'and open up flowing streams '
  - type: note
    content: Or “paths” (Dead Sea scroll 1QIsaa). See John 7:37–39.
  - type: text
    content: in the desert.
  '2':
  - type: text
    content: 'When you pass through '
  - type: note
    content: God’s method of deliverance is often not “out of” but “through.” His presence as we go through difficulties becomes our deliverance. See Ps. 23:4.
  - type: text
    content: 'the '
  - type: text
    content: deep, stormy
  - type: text
    content: ' sea,'
  - type: text
    content: you can count on me to be there with you.
  - type: text
    content: 'When you pass through '
  - type: text
    content: raging
  - type: text
    content: ' rivers,'
  - type: text
    content: you will not drown.
  - type: text
    content: 'When you walk through '
  - type: text
    content: persecution like
  - type: text
    content: ' fiery flames,'
  - type: text
    content: you will not be burned;
  - type: text
    content: the flames will not harm you,
  '20':
  - type: text
    content: 'Wild beasts, '
  - type: note
    content: The beast is a common biblical metaphor for human nature. See Ps. 73:22.
  - type: text
    content: jackals, and owls will glorify me.
  - type: note
    content: The Hebrew word for “jackals” (tannim) can also be translated “dragon.”
  - type: text
    content: For I supply streams of water in the desert
  - type: text
    content: and rivers in the wilderness
  - type: text
    content: to satisfy the thirst of my people, my chosen ones,
  '21':
  - type: text
    content: so that you, whom I have shaped and formed for myself,
  - type: text
    content: will proclaim my praise.
  - type: note
    content: See 1 Peter 2:9–10.
  '22':
  - type: text
    content: Yet you did not call out to me, O Jacob.
  - type: text
    content: 'Are you so weary '
  - type: note
    content: Or “weary yourself [with longing].”
  - type: text
    content: of me, O Israel?
  '23':
  - type: text
    content: You have not brought me your sheep for burnt offerings
  - type: text
    content: or honored me with your sacrifices.
  - type: text
    content: 'I have not burdened you by requiring '
  - type: text
    content: many
  - type: text
    content: ' grain offerings'
  - type: text
    content: or wearied you with demands for frankincense.
  '24':
  - type: text
    content: You did not buy me fragrant calamus reeds
  - type: text
    content: or lavish me with the fat of your sacrifices.
  - type: note
    content: See Heb. 13:15.
  - type: text
    content: Instead, you have burdened me with your many sins
  - type: text
    content: and wearied me with your evil deeds.
  '25':
  - type: text
    content: I, yes I, am the One and Only,
  - type: note
    content: This is doubly emphatic in the Hebrew. God refers to himself with fifteen emphatic personal pronouns in this chapter.
  - type: text
    content: 'who completely erases your sins, '
  - type: text
    content: never to be seen again
  - type: text
    content: .
  - type: text
    content: I will not remember them again.
  - type: text
    content: Freely I do this
  - type: text
    content: ' because of who I am!'
  - type: note
    content: Or “for my own sake.”
  '26':
  - type: text
    content: 'Help me remember '
  - type: text
    content: the past
  - type: text
    content: . Let’s debate!
  - type: text
    content: Bring me your version to prove your innocence.
  '27':
  - type: text
    content: 'Your earliest ancestor '
  - type: note
    content: Some believe this to be a reference to Abraham, Jacob, or Adam.
  - type: text
    content: sinned,
  - type: text
    content: 'and your spokesmen '
  - type: note
    content: This is most likely the teaching priests.
  - type: text
    content: rebelled against me.
  '28':
  - type: text
    content: So I brought disgrace on the holy priests
  - type: text
    content: of the holy sanctuary
  - type: note
    content: One ancient manuscript reads “Your rulers [priests] profaned my holy sanctuary.”
  - type: text
    content: and brought destruction to Jacob,
  - type: text
    content: humiliation and scorn to Israel.
  '3':
  - type: text
    content: 'for I am your Savior, '
  - type: text
    content: Yahweh
  - type: text
    content: ', your mighty God,'
  - type: text
    content: the Holy One of Israel!
  - type: text
    content: I give up Egypt as the price to set you free,
  - type: text
    content: 'Cush and Seba in exchange to '
  - type: text
    content: bring you back
  - type: text
    content: .
  - type: note
    content: Seba was an African nation that bordered Egypt. God was saying that there is no price too high for him to pay to set his people free. In the days of Isaiah, these nations (Egypt, Cush, and Seba) were united as one dynasty. They were given in exchange, as it were, to Persia for Israel’s future deliverance through the successors of Cyrus.
  '4':
  - type: text
    content: 'Since you are '
  - type: text
    content: cherished and
  - type: text
    content: ' precious '
  - type: note
    content: Or “dear,” “costly,” or “of great price.”
  - type: text
    content: in my eyes,
  - type: text
    content: 'and because I love you '
  - type: text
    content: dearly
  - type: text
    content: ' and '
  - type: text
    content: want
  - type: text
    content: ' to honor '
  - type: note
    content: This is the Hebrew word for “glory” (kabod).
  - type: text
    content: you,
  - type: text
    content: I willingly give up nations in exchange for you—
  - type: text
    content: 'a man '
  - type: note
    content: Or “people” (Hb. adam). God gave up a Man (the last “Adam,” 1 Cor. 15:45) for those who are precious to him.
  - type: text
    content: to save your life.
  '5':
  - type: text
    content: 'I am with you now, '
  - type: text
    content: even close to you
  - type: text
    content: ','
  - type: text
    content: so never yield to fear.
  - type: text
    content: 'I will bring your children '
  - type: note
    content: Or “your seed.”
  - type: text
    content: from the east;
  - type: text
    content: from the west I will gather you.
  '6':
  - type: text
    content: I will say to the north, ‘Hand them over!’
  - type: text
    content: and to the south, ‘Don’t hold them back!’
  - type: text
    content: Bring me my sons from far away,
  - type: text
    content: my daughters from the ends of the earth!
  '7':
  - type: text
    content: Bring me
  - type: text
    content: ' everyone who is called by my name,'
  - type: note
    content: Isaiah was prophesying Israel’s restoration and foretelling a great worldwide harvest among the nations as a fulfillment of the Feast of Ingathering (Harvest), also known as the Feast of Tabernacles.
  - type: text
    content: the ones I created to experience my glory.
  - type: note
    content: Or “for my glory.”
  - type: text
    content: 'I myself formed them to be '
  - type: text
