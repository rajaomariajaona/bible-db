  - type: text
    content: 'and made them '
  - type: text
    content: for my glory
  - type: text
    content: .”
  - type: note
    content: We were created both to bring God glory and to experience his glory. See Rom. 8:30; Rev. 4:11.
  - type: heading
    content: God’s Witness
  '8':
  - type: text
    content: Lead out those who have eyes but are blind,
  - type: text
    content: those who have ears but are deaf.
  '9':
  - type: text
    content: Let all the nations gather together and the people assemble.
  - type: text
    content: 'Which of their '
  - type: text
    content: gods
  - type: text
    content: ' '
  - type: note
    content: Or “Who of them.”
  - type: text
    content: prophesied this?
  - type: text
    content: Which of them foretold what is about to happen?
  - type: text
