document_id: JER.48,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Moab
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: usfm
      marker: it
      children:
      - type: text
        text: ’s message
    - type: text
      text: ' for the land of Moab. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moab was a country east of the Dead Sea. Moab was a descendant of Lot, conceived out of incest with his daughter (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “seed of the father” or “from my father”; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 19:30–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Moab helped Nebuchadnezzar against Judah, but Nebuchadnezzar eventually turned against Moab, devastating and subduing them. Years before Jeremiah’s ministry, Ruth, a Moabite, had a role in forming the house of David, for she was his great-grandmother (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ruth 4:17–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). For other prophecies against Moab, see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Isa. 15:1–16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 25:8–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 2:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zeph. 2:8–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, Commander of Angel Armies, says to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Woe to the people of Nebo, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The city of Nebo was near Mount Nebo, about twelve miles (nineteen kilometers) east of the northern end of the Dead Sea. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 32:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The name
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nebo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Nabu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) means “Celestial Scribe.” Nabu was known as the god of intellectualism (literacy, wisdom, education). The Greeks called him Hermes, the Romans, Mercury, and the Egyptians, Anubis.
      marker-yv: yv-n
    - type: text
      text: for their city is destroyed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Kiriathaim '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Kiriathaim was one of the cities of the Moabite plateau. Both Nebo and Kiriathaim were cities assigned to Nebo but were reclaimed by Moab as described in the Mesha Stele.
      marker-yv: yv-n
    - type: text
      text: is captured and totally humiliated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have torn down her proud fortress and put it to shame.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Cursed be the one who does the work of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' halfheartedly,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and cursed be the one who withholds his sword from blood.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Obviously, in this case, killing the people of Moab was a task of summary judgment given by
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab has always lived securely
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and has never been taken into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab is like wine left to settle undisturbed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and never poured from jar to jar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It still has a good flavor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and its taste has never changed.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares, “The days are coming when I will send enemies who will pour her out like wine. They will empty her wine jar and smash it to pieces. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moab will be ashamed of their god Chemosh just as the house of Israel was ashamed of Bethel, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the god who was once
    - type: text
      text: ' their confidence.'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“How, then, can you say, ‘We are heroes '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and mighty men of war’?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The destroyer has attacked the cities and destroyed Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the best of her young men have gone down to the slaughter,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'declares King '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The fall of Moab is at hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and soon she will be destroyed.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grieve for her, all you neighboring countries
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all you who know her fame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How shattered is its rule, that mighty rod,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that splendid scepter!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who live in Fair Dibon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come down from your prideful place and sit in the dust.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the destroyer of Moab has come up against you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and has destroyed your fortresses.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who live in Aroer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: stand at the side of the road and wait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ask the fleeing men and women:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘What has happened?’
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fame of Moab is no more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In Heshbon, the enemy plotted Moab’s doom:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Come, let’s wipe her off the map.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For indeed, my sword will leave only silence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in your town named Silent.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[the city named] Madmen,” which sounds like the Hebrew word for “silent.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They answer, ‘Moab is humiliated.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Weep and cry for Moab, for she has been defeated!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Announce the news beside the Arnon River:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Moab is devastated.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has judged the cities of the plateau and has punished them. Those cities include Holon, Jahzah, Mephaath, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dibon, Nebo, Beth Diblathaim, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kiriathaim, Beth Gamul, Beth Meon, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kerioth, and Bozrah. He has punished all the cities of Moab, far and near.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares: “All the strength '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “horn,” a metaphor in Hebrew for strength and authority.
      marker-yv: yv-n
    - type: text
      text: 'of Moab is cut off, and her power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “arm,” a metaphor in Hebrew for power and might.
      marker-yv: yv-n
    - type: text
      text: is broken.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moab Will Be Humbled
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Make Moab '
    - type: usfm
      marker: it
      children:
      - type: text
        text: drink from this cup until
    - type: text
      text: ' drunk because she exalted herself against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Drunken
    - type: text
      text: ' Moab will wallow in her own vomit until she makes the world laugh at her. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And they will say
    - type: text
      text: ', ‘Didn’t you make fun of Israel in the past? Didn’t you say Israel was nothing but crooks? Whenever you spoke of her, didn’t you shake your head '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in disgust
    - type: text
      text: ?’
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “People of Moab, flee your cities and hide in the rocks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be like doves that make their nests among the cliffs.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “outside the mouth of a cave.”
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone knows about the pride of Moab.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have heard about how very proud, arrogant, and lofty she is.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How highly she thinks of herself!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen, the people of Horonaim cry out:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Destruction and violence!’
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', know of her insolent defiance.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her boasts are empty and accomplish nothing.”
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I wail for Moab;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The godly prophet Jeremiah mourned for the lost. He cried out on behalf of Moab.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I cry out for the whole country,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I mourn for the people of Kir Hareseth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Kir Hares.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Kir Hareseth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “city of pottery”; the city was the ancient capital of Moab. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 3:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 16:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will weep for you more than I wept for Jazer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jazer was an Ammonite city east of the Jordan, once occupied by the tribe of Gad (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 21:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 32:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O vine of Sibmah!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your branches passed over the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dead
    - type: text
      text: ' Sea'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and spread to the sea of Jazer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 16:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An enemy has destroyed your figs and your grapes.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' Removes Moab’s Joy'
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people no longer experience joy and gladness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the fruitful land of Moab;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have stopped the people from making wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are no longer shouting happily as they tread the grapes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for no wine is coming out of the wine presses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People are indeed shouting but not for joy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The loud cries of Heshbon are heard as far as Elealeh and Jahaz. Cries from Zoar are heard in Horonaim and Eglath Shelishiyah. The brook of Nimrim has dried up. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will eliminate Moab’s idolaters, those who offer sacrifices in the high place and make offerings to their god,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah Mourns for Moab
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my heart sobs for Moab like a mournful flute. My heart moans '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a sad funeral song played
    - type: text
      text: ' on a flute for the people of Kir Hareseth. All the wealth they accumulated has disappeared. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every head is shaved, and every beard is cut off '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a sign of mourning
    - type: text
      text: '. And around the waist is sackcloth, on all the hands are gashes. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“On all the housetops of Moab and in the streets, people are mourning because I have broken Moab like a discarded vessel for which no one cares,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: How it is broken! How they wail! How Moab has turned her back in disgrace! All the surrounding nations find Moab a laughingstock and a thing of horror.
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Judgment of Moab
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab is shattered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her little ones cry out in distress.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look, an enemy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Nebuchadnezzar and the Babylonian armies.
      marker-yv: yv-n
    - type: text
      text: will swoop down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and attack Moab with no warning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like an eagle diving from the sky.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The enemy will capture the cities and the fortresses of Kerioth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On that day, Moab’s warriors will be as frightened
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a woman in her birth pains.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab will be destroyed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wiped from the earth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was fulfilled. After being taken into exile, the Moabites virtually disappeared as a people.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'because she exalted herself against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Terror, pit, and a snare
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are waiting for you, people of Moab!
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who flees from the terror
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will fall into the pit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the one who climbs out of the pit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be caught in the snare.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will bring upon Moab
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the year of her punishment.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In Heshbon’s shelter, exhausted refugees are helpless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for fire came out from Heshbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a flame from the house of Sihon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sihon was the king of the Amorites and once ruled his kingdom from Heshbon (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 2:24–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It has burned everything from the frontiers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the mountain heights of those war-loving people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Moabites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for fire has gone forth from Heshbon and a flame from the city of Sihon; it devours Moab’s forehead and the crown of the sons of tumult.” Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 45–47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are missing in the Septuagint.
      marker-yv: yv-n
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you, O Moab!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people who worshiped Chemosh are gone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your sons have been taken captive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your daughters into exile.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet in the days to come,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bring Moab’s captives home,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: m
    children:
    - type: text
      text: This ends Jeremiah’s prophecy concerning Moab.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, they are weeping all the way up to Luhith.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, all the way down from Horonaim they hear
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a distressful, painful cry.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Moab shout, ‘Flee for your lives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and be like a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: lonely
    - type: text
      text: ' shrub in the desert.’'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moab
    - type: text
      text: ', you put your faith in your works and your wealth.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why you, too, will be conquered.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your god Chemosh '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Chemosh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “subduer [conqueror]” or “incubus [dark star].” Chemosh was a god associated with the Semitic mother-goddess Ishtar (or Astarte). See George Aaron Barton,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Jewish Encyclopedia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', “Chemosh.” The Moabites were called the people of Chemosh (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 21:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 48:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: will go into captivity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: along with his priests and officials.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The destroyer will attack every city;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not one will escape.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This enemy will ruin both the valleys and the plains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has said.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give Moab wings so she can fly away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her cities will be empty and desolate
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with no one living in them.
