document_id: JER.48,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Moab
  - type: text
    content: Yahweh
  - type: text
    content: ’s message
  - type: text
    content: ' for the land of Moab. '
  - type: note
    content: Moab was a country east of the Dead Sea. Moab was a descendant of Lot, conceived out of incest with his daughter (Moab means “seed of the father” or “from my father”; see Gen. 19:30–37). Moab helped Nebuchadnezzar against Judah, but Nebuchadnezzar eventually turned against Moab, devastating and subduing them. Years before Jeremiah’s ministry, Ruth, a Moabite, had a role in forming the house of David, for she was his great-grandmother (see Ruth 4:17–22). For other prophecies against Moab, see Isa. 15:1–16:14; 25:10–12; Ezek. 25:8–11; Amos 2:1–3; Zeph. 2:8–11.
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, says to you:'
  - type: text
    content: '“Woe to the people of Nebo, '
  - type: note
    content: The city of Nebo was near Mount Nebo, about twelve miles (nineteen kilometers) east of the northern end of the Dead Sea. See Num. 32:38. The name Nebo (or Nabu) means “Celestial Scribe.” Nabu was known as the god of intellectualism (literacy, wisdom, education). The Greeks called him Hermes, the Romans, Mercury, and the Egyptians, Anubis.
  - type: text
    content: for their city is destroyed!
  - type: text
    content: 'Kiriathaim '
  - type: note
    content: Kiriathaim was one of the cities of the Moabite plateau. Both Nebo and Kiriathaim were cities assigned to Nebo but were reclaimed by Moab as described in the Mesha Stele.
  - type: text
    content: is captured and totally humiliated.
  - type: text
    content: They have torn down her proud fortress and put it to shame.
  '10':
  - type: text
    content: '“Cursed be the one who does the work of '
  - type: text
    content: Yahweh
  - type: text
    content: ' halfheartedly,'
  - type: text
    content: and cursed be the one who withholds his sword from blood.
  - type: note
    content: Obviously, in this case, killing the people of Moab was a task of summary judgment given by Yahweh.
  '11':
  - type: text
    content: Moab has always lived securely
  - type: text
    content: and has never been taken into exile.
  - type: text
    content: Moab is like wine left to settle undisturbed,
  - type: text
    content: and never poured from jar to jar.
  - type: text
    content: It still has a good flavor,
  - type: text
    content: and its taste has never changed.”
  '12':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares, “The days are coming when I will send enemies who will pour her out like wine. They will empty her wine jar and smash it to pieces. '
  '13':
  - type: text
    content: 'Then Moab will be ashamed of their god Chemosh just as the house of Israel was ashamed of Bethel, '
  - type: text
    content: the god who was once
  - type: text
    content: ' their confidence.'
  '14':
  - type: text
    content: '“How, then, can you say, ‘We are heroes '
  - type: text
    content: of Moab
  - type: text
    content: and mighty men of war’?
  '15':
  - type: text
    content: The destroyer has attacked the cities and destroyed Moab,
  - type: text
    content: and the best of her young men have gone down to the slaughter,”
  - type: text
    content: 'declares King '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '16':
  - type: text
    content: “The fall of Moab is at hand,
  - type: text
    content: and soon she will be destroyed.
  '17':
  - type: text
    content: Grieve for her, all you neighboring countries
  - type: text
    content: and all you who know her fame.
  - type: text
    content: How shattered is its rule, that mighty rod,
  - type: text
    content: that splendid scepter!
  '18':
  - type: text
    content: You who live in Fair Dibon,
  - type: text
    content: come down from your prideful place and sit in the dust.
  - type: text
    content: For the destroyer of Moab has come up against you
  - type: text
    content: and has destroyed your fortresses.
  '19':
  - type: text
    content: You who live in Aroer,
  - type: text
    content: stand at the side of the road and wait.
  - type: text
    content: 'Ask the fleeing men and women:'
  - type: text
    content: ‘What has happened?’
  '2':
  - type: text
    content: The fame of Moab is no more.
  - type: text
    content: 'In Heshbon, the enemy plotted Moab’s doom:'
  - type: text
    content: ‘Come, let’s wipe her off the map.’
  - type: text
    content: For indeed, my sword will leave only silence
  - type: text
    content: in your town named Silent.
  - type: note
    content: Or “[the city named] Madmen,” which sounds like the Hebrew word for “silent.”
  '20':
  - type: text
    content: They answer, ‘Moab is humiliated.
  - type: text
    content: Weep and cry for Moab, for she has been defeated!’
  - type: text
    content: 'Announce the news beside the Arnon River:'
  - type: text
    content: ‘Moab is devastated.’
  '21':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' has judged the cities of the plateau and has punished them. Those cities include Holon, Jahzah, Mephaath, '
  '22':
  - type: text
    content: 'Dibon, Nebo, Beth Diblathaim, '
  '23':
  - type: text
    content: 'Kiriathaim, Beth Gamul, Beth Meon, '
  '24':
  - type: text
    content: 'Kerioth, and Bozrah. He has punished all the cities of Moab, far and near.” '
  '25':
  - type: text
    content: Yahweh
  - type: text
    content: ' declares: “All the strength '
  - type: note
    content: Or “horn,” a metaphor in Hebrew for strength and authority.
  - type: text
    content: 'of Moab is cut off, and her power '
  - type: note
    content: Or “arm,” a metaphor in Hebrew for power and might.
  - type: text
    content: is broken.”
  - type: heading
    content: Moab Will Be Humbled
  '26':
  - type: text
    content: '“Make Moab '
  - type: text
    content: drink from this cup until
  - type: text
    content: ' drunk because she exalted herself against '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: text
    content: Drunken
  - type: text
    content: ' Moab will wallow in her own vomit until she makes the world laugh at her. '
  '27':
  - type: text
    content: And they will say
  - type: text
    content: ', ‘Didn’t you make fun of Israel in the past? Didn’t you say Israel was nothing but crooks? Whenever you spoke of her, didn’t you shake your head '
  - type: text
    content: in disgust
  - type: text
    content: ?’
  '28':
  - type: text
    content: “People of Moab, flee your cities and hide in the rocks.
  - type: text
    content: Be like doves that make their nests among the cliffs.
  - type: note
    content: Or “outside the mouth of a cave.”
  '29':
  - type: text
    content: Everyone knows about the pride of Moab.
  - type: text
    content: I have heard about how very proud, arrogant, and lofty she is.
  - type: text
    content: How highly she thinks of herself!
  '3':
  - type: text
    content: 'Listen, the people of Horonaim cry out:'
  - type: text
    content: ‘Destruction and violence!’
  '30':
  - type: text
    content: 'But I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', know of her insolent defiance.'
  - type: text
    content: Her boasts are empty and accomplish nothing.”
  '31':
  - type: text
    content: Therefore I wail for Moab;
  - type: note
    content: The godly prophet Jeremiah mourned for the lost. He cried out on behalf of Moab.
  - type: text
    content: I cry out for the whole country,
  - type: text
    content: and I mourn for the people of Kir Hareseth.
  - type: note
    content: Or “Kir Hares.” Kir Hareseth means “city of pottery”; the city was the ancient capital of Moab. See 2 Kings 3:25; Isa. 16:7.
  '32':
  - type: text
    content: I will weep for you more than I wept for Jazer,
  - type: note
    content: Jazer was an Ammonite city east of the Jordan, once occupied by the tribe of Gad (see Num. 21:32; 32:35).
  - type: text
    content: O vine of Sibmah!
  - type: text
    content: 'Your branches passed over the '
  - type: text
    content: Dead
  - type: text
    content: ' Sea'
  - type: text
    content: and spread to the sea of Jazer.
  - type: note
    content: See Isa. 16:8.
  - type: text
    content: An enemy has destroyed your figs and your grapes.
  - type: heading
    content: Yahweh Removes Moab’s Joy
  '33':
  - type: text
    content: “The people no longer experience joy and gladness
  - type: text
    content: in the fruitful land of Moab;
  - type: text
    content: for I have stopped the people from making wine.
  - type: text
    content: They are no longer shouting happily as they tread the grapes,
  - type: text
    content: for no wine is coming out of the wine presses.
  - type: text
    content: People are indeed shouting but not for joy.
  '34':
  - type: text
    content: '“The loud cries of Heshbon are heard as far as Elealeh and Jahaz. Cries from Zoar are heard in Horonaim and Eglath Shelishiyah. The brook of Nimrim has dried up. '
  '35':
  - type: text
    content: 'I will eliminate Moab’s idolaters, those who offer sacrifices in the high place and make offerings to their god,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: Jeremiah Mourns for Moab
  '36':
  - type: text
    content: 'Therefore, my heart sobs for Moab like a mournful flute. My heart moans '
  - type: text
    content: as a sad funeral song played
  - type: text
    content: ' on a flute for the people of Kir Hareseth. All the wealth they accumulated has disappeared. '
  '37':
  - type: text
    content: 'Every head is shaved, and every beard is cut off '
  - type: text
    content: as a sign of mourning
  - type: text
    content: '. And around the waist is sackcloth, on all the hands are gashes. '
  '38':
  - type: text
    content: '“On all the housetops of Moab and in the streets, people are mourning because I have broken Moab like a discarded vessel for which no one cares,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '39':
  - type: text
    content: How it is broken! How they wail! How Moab has turned her back in disgrace! All the surrounding nations find Moab a laughingstock and a thing of horror.
  - type: heading
    content: Yahweh’s Judgment of Moab
  '4':
  - type: text
    content: Moab is shattered,
  - type: text
    content: and her little ones cry out in distress.
  '40':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: '“Look, an enemy '
  - type: note
    content: That is, Nebuchadnezzar and the Babylonian armies.
  - type: text
    content: will swoop down
  - type: text
    content: and attack Moab with no warning,
  - type: text
    content: like an eagle diving from the sky.
  '41':
  - type: text
    content: The enemy will capture the cities and the fortresses of Kerioth.
  - type: text
    content: On that day, Moab’s warriors will be as frightened
  - type: text
    content: as a woman in her birth pains.
  '42':
  - type: text
    content: Moab will be destroyed,
  - type: text
    content: wiped from the earth,
  - type: note
    content: This prophecy was fulfilled. After being taken into exile, the Moabites virtually disappeared as a people.
  - type: text
    content: 'because she exalted herself against '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '43':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares,'
  - type: text
    content: “Terror, pit, and a snare
  - type: text
    content: are waiting for you, people of Moab!
  '44':
  - type: text
    content: The one who flees from the terror
  - type: text
    content: will fall into the pit,
  - type: text
    content: and the one who climbs out of the pit
  - type: text
    content: will be caught in the snare.”
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares,'
  - type: text
    content: “I will bring upon Moab
  - type: text
    content: the year of her punishment.
  '45':
  - type: text
    content: In Heshbon’s shelter, exhausted refugees are helpless,
  - type: text
    content: for fire came out from Heshbon,
  - type: text
    content: a flame from the house of Sihon.
  - type: note
    content: Sihon was the king of the Amorites and once ruled his kingdom from Heshbon (see Deut. 2:24–30).
  - type: text
    content: It has burned everything from the frontiers
  - type: text
    content: to the mountain heights of those war-loving people,
  - type: text
    content: the Moabites.
  - type: note
    content: Or “for fire has gone forth from Heshbon and a flame from the city of Sihon; it devours Moab’s forehead and the crown of the sons of tumult.” Verses 45–47 are missing in the Septuagint.
  '46':
  - type: text
    content: Woe to you, O Moab!
  - type: text
    content: The people who worshiped Chemosh are gone,
  - type: text
    content: for your sons have been taken captive
  - type: text
    content: and your daughters into exile.
  '47':
  - type: text
    content: Yet in the days to come,
  - type: text
    content: I will bring Moab’s captives home,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: This ends Jeremiah’s prophecy concerning Moab.
  '5':
  - type: text
    content: Yes, they are weeping all the way up to Luhith.
  - type: text
    content: Yes, all the way down from Horonaim they hear
  - type: text
    content: a distressful, painful cry.
  '6':
  - type: text
    content: The people of Moab shout, ‘Flee for your lives
  - type: text
    content: 'and be like a '
  - type: text
    content: lonely
  - type: text
    content: ' shrub in the desert.’'
  '7':
  - type: text
    content: Moab
  - type: text
    content: ', you put your faith in your works and your wealth.'
  - type: text
    content: That is why you, too, will be conquered.
  - type: text
    content: 'Your god Chemosh '
  - type: note
    content: Chemosh means “subduer [conqueror]” or “incubus [dark star].” Chemosh was a god associated with the Semitic mother-goddess Ishtar (or Astarte). See George Aaron Barton, The Jewish Encyclopedia, “Chemosh.” The Moabites were called the people of Chemosh (see Num. 21:29; Jer. 48:46).
  - type: text
    content: will go into captivity,
  - type: text
    content: along with his priests and officials.
  '8':
  - type: text
    content: The destroyer will attack every city;
  - type: text
    content: not one will escape.
  - type: text
    content: This enemy will ruin both the valleys and the plains,
  - type: text
    content: 'just as '
  - type: text
    content: Yahweh
  - type: text
    content: ' has said.'
  '9':
  - type: text
    content: Give Moab wings so she can fly away.
  - type: text
    content: Her cities will be empty and desolate
  - type: text
    content: with no one living in them.
