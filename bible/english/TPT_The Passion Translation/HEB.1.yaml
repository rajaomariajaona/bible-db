    - type: text
      text: Jesus, the Language of God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Throughout our history God has spoken to our ancestors by his prophets in many different ways. The revelation he gave them was only a fragment at a time, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: building one truth upon another
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is “God spoke in different times in different parts.” That is, he reveals one piece and then another, like pieces of a puzzle, with one piece complementing the other. The Aramaic can be translated “God spoke to our ancestors by all methods and at any price” or “in every way, shape, and form.” That is, by sample and by example God reveals his ways progressively, building on previous understandings, leading us into Christ’s fullness.
      marker-yv: yv-n
