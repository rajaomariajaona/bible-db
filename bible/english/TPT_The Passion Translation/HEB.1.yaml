document_id: HEB.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, the Language of God
  - type: text
    content: 'Throughout our history God has spoken to our ancestors by his prophets in many different ways. The revelation he gave them was only a fragment at a time, '
  - type: text
    content: building one truth upon another
  - type: text
    content: '. '
  - type: note
    content: The Greek is “God spoke in different times in different parts.” That is, he reveals one piece and then another, like pieces of a puzzle, with one piece complementing the other. The Aramaic can be translated “God spoke to our ancestors by all methods and at any price” or “in every way, shape, and form.” That is, by sample and by example God reveals his ways progressively, building on previous understandings, leading us into Christ’s fullness.
  '10':
  - type: text
    content: 'And he called him Lord, '
  - type: note
    content: Clearly implied in the text and made explicit.
  - type: text
    content: saying,
  - type: text
    content: “Lord, you formed the earth in the beginning
  - type: note
    content: See Ps. 102:25–27.
  - type: text
    content: and with your own hands you crafted the cosmos.
  - type: note
    content: See Ps. 8:1–3.
  '11':
  - type: text
    content: They will both one day disappear,
  - type: text
    content: but you will remain forever!
  - type: text
    content: They will all fade like a worn-out garment,
  '12':
  - type: text
    content: And they will be changed like clothes,
  - type: text
    content: and you will fold them up and put them away.
  - type: text
    content: But you are ‘I AM.’
  - type: note
    content: As translated from the Aramaic, which is literally “you are as you are.” This is a variation of the name of God revealed to Moses in Ex. 3:14, “I AM who I AM.” There is an obvious connection here to that incident and endorses the truth that the preincarnate Christ was the One who appeared in the burning bush.
  - type: text
    content: You never change, years without end!”
  - type: note
    content: The Aramaic can be translated “the years will not age you.”
  '13':
  - type: text
    content: 'And God has never said this to any of his angels:'
  - type: text
    content: “Take your seat next to me at my right hand
  - type: text
    content: until I force your whispering enemies
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: to be a rug under your feet.”
  - type: note
    content: Or “a footstool for your feet.” See Ps. 110:1. Placing the feet on a defeated enemy was a gesture of triumph. See Josh. 10:24; 1 Kings 5:3.
  '14':
  - type: text
    content: What role then, do the angels have? The angels are spirit-messengers sent by God to serve those who are going to be saved.
  - type: note
    content: The Aramaic can be translated “The angels are spirit-winds-of-ministry sent to minister to those destined to receive salvation.” The angels are glad to minister to us, for they see us “in Christ.”
  '2':
  - type: text
    content: 'But to us living in these last days, '
  - type: note
    content: This phrase, often used by the prophets of the Old Testament, speaks of our current time in human history between Acts 2 (Pentecost) and the coming again of Christ.
  - type: text
    content: 'God now speaks to us openly in the language of a Son, '
  - type: note
    content: Or “he has spoken through a Son.” We speak in English; God speaks in “Son,” for Jesus is the language of God. The Sonship of Jesus is the language he now uses to speak to us.
  - type: text
    content: the appointed Heir of everything, for through him God created the panorama of all things and all time.
  - type: note
    content: Or “the complete period of all existence.” The Aramaic can be translated “universes.” Both the concept of “all things,” and “all time” (the ages), are implied in the text.
  '3':
  - type: text
    content: 'The Son is the dazzling radiance of God’s splendor, '
  - type: note
    content: Or “the out-shining [effulgence] of God’s glory.” The Aramaic can be translated “He is the Sprout of God, the image of his glory.”
  - type: text
    content: 'the exact expression of God’s true nature—his mirror image! '
  - type: note
    content: Or “the Son is God’s mirror image and exact expression” (the reflection of God).
  - type: text
    content: 'He holds the universe '
  - type: note
    content: The Aramaic can be translated “He is almighty.”
  - type: text
    content: 'together and expands it '
  - type: note
    content: The Greek word phero, has as its primary meaning “to carry along” or “to move [something] forward.” Forward motion is implied. (See Strong’s Concordance, Gr. 5342.)
  - type: text
    content: 'by the mighty power of his spoken word. '
  - type: note
    content: This is the Greek word rhema, which is the sayings of the Son, or “his spoken word.”
  - type: text
    content: 'He accomplished for us the complete cleansing of sins, '
  - type: note
    content: Or “Because he had accomplished our purification from sins” (atonement).
  - type: text
    content: 'and then took his seat on the highest throne at the right hand '
  - type: note
    content: That is, the place of highest honor and authority. See Ps. 110:1. Some have proposed that v. 3 is an ancient Christian hymn that summarizes our faith.
  - type: text
    content: of the majestic One.
  - type: note
    content: Or “the Majesty,” a periphrasis for God.
  - type: heading
    content: Jesus, Greater than Angels
  '4':
  - type: text
    content: 'He is infinitely greater than angels, for he inherited a rank and a Name '
  - type: note
    content: This is Ha-Shem, in the Aramaic, the common title for God. This elevates the meaning of the passage much clearer than Greek, for Jesus is now given the “Name,” that is, he has the title of God (Ha-Shem, the Name).
  - type: text
    content: 'far greater than theirs. '
  '5':
  - type: text
    content: 'For God has never said to any angel what he said to Jesus:'
  - type: text
    content: “You are my favored Son, today I have fathered you.”
  - type: note
    content: The Aramaic can be translated “Every day I beget you.” See Ps. 2:7, 12.
  - type: text
    content: 'And this:'
  - type: text
    content: “I will be the Father to him, and he will be the Son to me.”
  - type: note
    content: See 2 Sam. 7:14; 1 Chron. 17:13.
  '6':
  - type: text
    content: 'And again, when he brought his firstborn Son into the world:'
  - type: text
    content: “Let all my angels bow down before him
  - type: text
    content: and kiss him in worship.”
  - type: note
    content: 'See Ps. 97:7. The Greek word used for worship, proskuneo, includes three concepts: “to bow,” “to kiss,” and “to pay homage (worship).” All three are included here. This seems to be referring to Christ’s birth, however, some interpret this to be when Jesus was exalted and ascended into heaven.'
  '7':
  - type: text
    content: And about his angels he says,
  - type: text
    content: “I make my angels swift winds,
  - type: text
    content: 'and my ministers '
  - type: note
    content: The Greek word leitourgos means “those who read the liturgy” or “priests.”
  - type: text
    content: fiery flames.”
  - type: note
    content: See Ps. 104:4.
  '8':
  - type: text
    content: 'But about his Son, he called him “God,” '
  - type: note
    content: Clearly implied in the text and made explicit.
  - type: text
    content: saying,
  - type: text
    content: “Your throne, O God, endures forever and ever
  - type: text
    content: and you will rule your kingdom
  - type: text
    content: with justice and righteousness,
  - type: note
    content: The Greek used here can mean either justice or righteousness; this translation includes both. The text is literally “the righteous scepter is the scepter of your kingdom.”
  '9':
  - type: text
    content: For you have cherished righteousness
  - type: text
    content: and detested lawlessness.
  - type: text
    content: For this reason, God, your God, has anointed you
  - type: note
    content: The word Messiah means “Anointed One.” There is a clear and unmistakable poetic play on words by reading the Aramaic (Mashkhakh Alaha Alahakh Meshka, almost a complete reversing of the sounds of the first into the second), that is lost in the Greek.
  - type: text
    content: and poured out the oil of bliss on you
  - type: note
    content: Or “the oil of rejoicing.” See Ps. 45:6–7.
  - type: text
    content: more than on any of your friends.”
