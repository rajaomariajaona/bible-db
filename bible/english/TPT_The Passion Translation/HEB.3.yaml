verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus, Greater than Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so, dear brothers and sisters, you are now made holy, and each of you is invited to the feast '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sharers of the feast.”
      marker-yv: yv-n
    - type: text
      text: 'of your heavenly calling. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you participate as partners in the heavenly calling.” The Greek phrase, “heavenly calling” implies an invitation to a celestial feast. It could also be translated “you are called to share the life of heaven.” This calling originates in heaven and draws us into heaven. However, in the Aramaic this phrase can be translated “called with a calling [from heaven],” which is the Aramaic title of the third book of the Torah, Leviticus, and refers to the calling of the Levites as priests.
      marker-yv: yv-n
    - type: text
      text: 'So fasten your thoughts fully onto Jesus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you have discovered this Jesus.” The Aramaic can be translated “Jesus, the Messiah.”
      marker-yv: yv-n
    - type: text
      text: 'whom we embrace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with whom is our legally binding agreement.”
      marker-yv: yv-n
    - type: text
      text: 'as our Apostle and King-Priest. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God joins the apostolic and priestly ministries together in Christ. An apostle will always release God’s people into their priestly calling of entering into the holy of holies without going through a system, a church or a person. The word “King-Priest” is from the Aramaic, which uses a word for a priest not of the Levitical order. Jesus could not be a “High Priest” for he was not born in the tribe of Levi, or a descendant of Aaron, but was of the tribe of Judah. So the word here for priest is not
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: cohen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', but the Aramaic word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kumrea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the word used for Jethro and Melchizedek. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 14:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 2:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 18:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This ignited my anger with that generation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I said about them, ‘They wander in their hearts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just like they do with their feet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they refuse to learn my ways.’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart grieved '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
