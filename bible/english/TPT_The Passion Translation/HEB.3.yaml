        children:
        - type: text
          text: . The Septuagint, instead of transliterating those names, translates their meanings and includes them here in the text. A Hebrew reader would have no difficulty in understanding the obvious inference of the rebellion that took place in the desert.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'even though they saw my miracles '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “works,” however, these works are miracles, when considering the plagues of Egypt, the Passover miracle, the parting of the Red Sea, the manna falling from the sky, water from the rock, etc.
      marker-yv: yv-n
    - type: text
      text: for forty years
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: they still doubted me
    - type: text
      text: '!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is taken from the Septuagint and is literally “There they tested me by trial.” That is, they continually doubted God’s faithfulness to them. We must never doubt God, even in a season of difficulty.
      marker-yv: yv-n
