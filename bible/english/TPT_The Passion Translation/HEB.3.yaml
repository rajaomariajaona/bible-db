        - type: text
          text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: orge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used for any emotion of extreme passion, usually anger.
      marker-yv: yv-n
    - type: text
      text: 'over them so I decreed:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘They will not enter into my rest!’ ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So search your hearts every day, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “Take care.”
      marker-yv: yv-n
    - type: text
      text: 'my brothers and sisters, and make sure that none of you has evil or unbelief hiding within you. For it will lead you astray, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “rebel against.”
      marker-yv: yv-n
    - type: text
      text: 'and make you unresponsive to the living God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the time to encourage '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “warn.”
      marker-yv: yv-n
    - type: text
      text: 'each other to never be stubborn or hardened by sin’s deceitfulness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the sin of the deceiver.” The deceiver could be referring to the devil, or to our own ability to be self-deceived.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we are mingled with the Messiah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “We are all business partners of Christ.” The Aramaic can be translated “We are all sewn [together] with Christ.”
      marker-yv: yv-n
    - type: text
      text: 'if we will continue unshaken in this confident assurance '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “we are joined [leavened] in the resurrection through him.”
      marker-yv: yv-n
    - type: text
      text: from the beginning until the end.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For again, the Scriptures say,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 95:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only today you would listen to his voice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Don’t make him angry '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: by hardening your hearts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you did in the wilderness rebellion.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The same people who were delivered from bondage and brought out of Egypt by Moses, were the ones who heard and still rebelled. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They grieved God for forty years '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 14:33–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'by sinning in their unbelief, until they dropped dead in the desert. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So God swore an oath that they would never enter into his calming place of rest all because they disobeyed him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is clear that they could not enter '
    - type: usfm
      marker: it
      children:
      - type: text
        text: into their inheritance
    - type: text
      text: ' because they wrapped their hearts in unbelief.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he was faithful to the Father who appointed him, in the same way that Moses was a model of faithfulness in what was entrusted to him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “who was faithful in all his house.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus is worthy to receive a much greater glory than Moses, for the one who builds a house deserves to be honored more than the house he builds. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every house is built by someone, but God is the Designer and Builder of all things.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed, Moses served God faithfully in all he gave him to do. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in all God’s house.”
      marker-yv: yv-n
    - type: text
      text: 'His work prophetically illustrates '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to testify.” The Aramaic can be translated “he believed all the evidence in the house” (or “tabernacle”). That is, Moses saw and believed that the tabernacle and all its furnishings were an illustration of something greater that God would unveil later on.
      marker-yv: yv-n
    - type: text
      text: 'things that would later be spoken and fulfilled. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to give testimony to things that would be spoken.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Christ is more than a Servant, he was faithful as the Son in charge of God’s house. And now we are part of his house if we continue courageously to hold firmly to our bold confidence and our victorious hope.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the pride [rejoicing] of our hope.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Secrets from Psalm 95
    marker-yv: yv-h
