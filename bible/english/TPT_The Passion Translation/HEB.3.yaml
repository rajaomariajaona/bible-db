document_id: HEB.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus, Greater than Moses
  - type: text
    content: 'And so, dear brothers and sisters, you are now made holy, and each of you is invited to the feast '
  - type: note
    content: Or “sharers of the feast.”
  - type: text
    content: 'of your heavenly calling. '
  - type: note
    content: Or “you participate as partners in the heavenly calling.” The Greek phrase, “heavenly calling” implies an invitation to a celestial feast. It could also be translated “you are called to share the life of heaven.” This calling originates in heaven and draws us into heaven. However, in the Aramaic this phrase can be translated “called with a calling [from heaven],” which is the Aramaic title of the third book of the Torah, Leviticus, and refers to the calling of the Levites as priests.
  - type: text
    content: 'So fasten your thoughts fully onto Jesus, '
  - type: note
    content: Or “you have discovered this Jesus.” The Aramaic can be translated “Jesus, the Messiah.”
  - type: text
    content: 'whom we embrace '
  - type: note
    content: Or “with whom is our legally binding agreement.”
  - type: text
    content: 'as our Apostle and King-Priest. '
  - type: note
    content: God joins the apostolic and priestly ministries together in Christ. An apostle will always release God’s people into their priestly calling of entering into the holy of holies without going through a system, a church or a person. The word “King-Priest” is from the Aramaic, which uses a word for a priest not of the Levitical order. Jesus could not be a “High Priest” for he was not born in the tribe of Levi, or a descendant of Aaron, but was of the tribe of Judah. So the word here for priest is not cohen, but the Aramaic word kumrea, the word used for Jethro and Melchizedek. See Gen. 14:18; Ex. 2:16; 3:1; 18:1.
  '10':
  - type: text
    content: This ignited my anger with that generation
  - type: text
    content: and I said about them, ‘They wander in their hearts
  - type: text
    content: just like they do with their feet,
  - type: text
    content: and they refuse to learn my ways.’
  '11':
  - type: text
    content: 'My heart grieved '
  - type: note
    content: The Greek word orge is used for any emotion of extreme passion, usually anger.
  - type: text
    content: 'over them so I decreed:'
  - type: text
    content: ‘They will not enter into my rest!’ ”
  '12':
  - type: text
    content: 'So search your hearts every day, '
  - type: note
    content: As translated from the Aramaic. The Greek is “Take care.”
  - type: text
    content: 'my brothers and sisters, and make sure that none of you has evil or unbelief hiding within you. For it will lead you astray, '
  - type: note
    content: Or “rebel against.”
  - type: text
    content: 'and make you unresponsive to the living God. '
  '13':
  - type: text
    content: 'This is the time to encourage '
  - type: note
    content: Or “warn.”
  - type: text
    content: 'each other to never be stubborn or hardened by sin’s deceitfulness. '
  - type: note
    content: The Aramaic can be translated “the sin of the deceiver.” The deceiver could be referring to the devil, or to our own ability to be self-deceived.
  '14':
  - type: text
    content: 'For we are mingled with the Messiah, '
  - type: note
    content: Or “We are all business partners of Christ.” The Aramaic can be translated “We are all sewn [together] with Christ.”
  - type: text
    content: 'if we will continue unshaken in this confident assurance '
  - type: note
    content: The Aramaic can be translated “we are joined [leavened] in the resurrection through him.”
  - type: text
    content: from the beginning until the end.
  '15':
  - type: text
    content: For again, the Scriptures say,
  - type: note
    content: See Ps. 95:7–8.
  - type: text
    content: If only today you would listen to his voice.
  - type: text
    content: 'Don’t make him angry '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: by hardening your hearts,
  - type: text
    content: as you did in the wilderness rebellion.
  '16':
  - type: text
    content: 'The same people who were delivered from bondage and brought out of Egypt by Moses, were the ones who heard and still rebelled. '
  '17':
  - type: text
    content: 'They grieved God for forty years '
  - type: note
    content: See Num. 14:33–34.
  - type: text
    content: 'by sinning in their unbelief, until they dropped dead in the desert. '
  '18':
  - type: text
    content: 'So God swore an oath that they would never enter into his calming place of rest all because they disobeyed him. '
  '19':
  - type: text
    content: 'It is clear that they could not enter '
  - type: text
    content: into their inheritance
  - type: text
    content: ' because they wrapped their hearts in unbelief.'
  '2':
  - type: text
    content: 'For he was faithful to the Father who appointed him, in the same way that Moses was a model of faithfulness in what was entrusted to him. '
  - type: note
    content: Or “who was faithful in all his house.” See Num. 12:7.
  '3':
  - type: text
    content: 'But Jesus is worthy to receive a much greater glory than Moses, for the one who builds a house deserves to be honored more than the house he builds. '
  '4':
  - type: text
    content: Every house is built by someone, but God is the Designer and Builder of all things.
  '5':
  - type: text
    content: 'Indeed, Moses served God faithfully in all he gave him to do. '
  - type: note
    content: Or “in all God’s house.”
  - type: text
    content: 'His work prophetically illustrates '
  - type: note
    content: Or “to testify.” The Aramaic can be translated “he believed all the evidence in the house” (or “tabernacle”). That is, Moses saw and believed that the tabernacle and all its furnishings were an illustration of something greater that God would unveil later on.
  - type: text
    content: 'things that would later be spoken and fulfilled. '
  - type: note
    content: Or “to give testimony to things that would be spoken.”
  '6':
  - type: text
    content: But Christ is more than a Servant, he was faithful as the Son in charge of God’s house. And now we are part of his house if we continue courageously to hold firmly to our bold confidence and our victorious hope.
  - type: note
    content: As translated from the Aramaic. The Greek is “the pride [rejoicing] of our hope.”
  - type: heading
    content: Secrets from Psalm 95
  '7':
  - type: text
    content: This is why the Holy Spirit says,
  - type: note
    content: See Ps. 95:7–11. Notice the truth that the Bible is the Holy Spirit of God speaking to us.
  - type: text
    content: “If only you would listen to his voice this day!
  - type: note
    content: The Aramaic can be translated “the echo of his voice.” See also v. 15.
  '8':
  - type: text
    content: 'Don’t make him '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: angry by hardening your hearts,
  - type: text
    content: like your ancestors did during the days of their rebellion,
  - type: note
    content: The Aramaic could be translated “just like the bitterness at Marah.”
  - type: text
    content: when they were tested in the wilderness.
  '9':
  - type: text
    content: There your fathers tested me and tried my patience
  - type: note
    content: This refers to incidents that took place at Massah [testing] and Meribah [strife]. See Ex. 17:7; Num. 20:13. The Septuagint, instead of transliterating those names, translates their meanings and includes them here in the text. A Hebrew reader would have no difficulty in understanding the obvious inference of the rebellion that took place in the desert.
  - type: text
    content: 'even though they saw my miracles '
  - type: note
    content: Or “works,” however, these works are miracles, when considering the plagues of Egypt, the Passover miracle, the parting of the Red Sea, the manna falling from the sky, water from the rock, etc.
  - type: text
    content: for forty years
  - type: text
    content: they still doubted me
  - type: text
    content: '!'
  - type: note
    content: The Greek is taken from the Septuagint and is literally “There they tested me by trial.” That is, they continually doubted God’s faithfulness to them. We must never doubt God, even in a season of difficulty.
