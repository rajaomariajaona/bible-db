document_id: 1TH.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Gives Thanks for the Thessalonians
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From Paul, Silas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Silvanus,” whom most scholars believe is the Silas mentioned as a prophet in the Jerusalem church and Paul’s coworker in Macedonia (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 15:22–40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16:19–40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:1–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The name Silas is the Aramaic form of the Hebrew name Saul. Both Silas and Timothy had been with Paul when he first visited Thessalonica (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 17:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There are only four of Paul’s letters in the New Testament in which he does not call himself an apostle (1 and 2 Thessalonians, Philippians, and Philemon), most likely because of the deep relationship he already had with them.
      marker-yv: yv-n
    - type: text
      text: 'and Timothy. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ministry requires teamwork. Paul saw himself as part of a church-planting team made up of three men with wonderful giftings: Paul, Silas, and Timothy.'
      marker-yv: yv-n
    - type: text
      text: 'We send our greetings to you, the congregation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ekklēsia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is best translated in this context as “congregation.” It means “called-out ones.” In Greek culture the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ekklēsia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: were members of society who were given the duties of legislating on behalf of a city, similar to a city council. They were both “called out” and “called together” to function as those who have the responsibilities of shaping societal norms and the morality of culture.
      marker-yv: yv-n
    - type: text
      text: 'of believers in Thessalonica, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Thessalonica was the largest city in Macedonia and may have had a population of 200,000 when Paul wrote this letter.
      marker-yv: yv-n
    - type: text
      text: 'which is in God the Father and the Lord Jesus Christ. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The church is both “in” God the Father and “in” Jesus Christ. The Trinity is making room for the bride.
      marker-yv: yv-n
    - type: text
      text: 'May God’s delightful grace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The usage of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: charis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (grace) in ancient classical Greek carries the connotation of something that awakens joy and pleasure. The Greek concept of grace imparts delight, often attached to a strong emotional element. Paul uses the term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: grace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as a joyous delight that rests upon the people of God (Thomas F. Torrance,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Doctrine of Grace in the Apostolic Fathers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 1–2).'
      marker-yv: yv-n
    - type: text
      text: and peace rest upon you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts add “from God our Father and the Lord Jesus Christ.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And now you eagerly expect his Son from heaven—Jesus, the deliverer, whom he raised from the dead and who rescues us from the coming wrath.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The gospel of power will change lives. The Thessalonians had renounced the worship of false gods and turned wholeheartedly to the true God and become faithful servants. Every time true conversion (repentance) takes place, a life is changed. The Thessalonians were famous for these four things: (1) They turned wholeheartedly to God. (2) They abandoned worshiping false gods (idols). (3) They became passionate servants of Christ. (4) They were eagerly anticipating the heavenly Son, Jesus.'
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'We are grateful to God for your lives '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Starting with v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul begins one long and complicated Greek sentence that ends with v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and we always pray for you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For we remember before our God and Father how you put your faith into practice, how your love motivates you to serve others, and how unrelenting is your hope-filled patience in our Lord Jesus Christ.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul mentions the three invaluable qualities of a believer’s life: faith, love, and hope. The Thessalonians put their faith into practice by turning away from all that was false (v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). They demonstrated their motive of love by serving God and others (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). And they lived with undying hope that was centered upon the future appearing of Christ (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dear brothers and sisters, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek uses the term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: brothers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: it
        children:
        - type: text
          text: adelphoi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), it is intended to express the group identity of those who follow Christ and not meant to be gender exclusive. Paul uses the term eighteen times in five chapters. First Thessalonians could be called Paul’s friendliest letter. He describes himself as a “father” and “mother” to them (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and calls them his “joy” and “trophy” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'you are dearly loved by God and we know that he has chosen you to be his very own. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The perfect tense of the verb implies that God loved them in the past and continues to love them in the same way.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For our gospel came to you not merely in the form of words but in mighty power infused with the Holy Spirit and deep conviction. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: True gospel ministry will be expressed by the word of God and characterized by mighty power, releasing the unmistakable presence of the Holy Spirit, and through sincere conviction of truth will be found in those who present it.
      marker-yv: yv-n
    - type: text
      text: Surely you remember how we lived our lives transparently before you to encourage you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for your sakes” (benefit).
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And you became followers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “imitators.”
      marker-yv: yv-n
    - type: text
      text: 'of my example and the Lord’s when you received the word with the joy of the Holy Spirit, even though it resulted in tremendous trials and persecution. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: True conversion delivers us from many things, but is not an assurance that we will never face painful trials or persecution for our faith.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Now you have become an example for all the believers to follow throughout the provinces of Greece.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “Macedonia and Achaia.” Greece was divided into two provinces: the northern region known as Macedonia and the southern one, Achaia. Thessalonica was located in Macedonia, and Corinth, where Paul wrote this letter, was the leading city of Achaia. Although the believers of Thessalonica were novices, their testimony had spread throughout the region.'
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The message of the Lord has sounded out from you not only in Greece, but its echo has been heard in every place where people are hearing about your strong faith. We don’t need to brag on you, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'for everyone tells the story of the kind of welcome you showed us when we first came to you. And everyone knows how wonderfully you turned to God from idols to serve the true and living God. '
