  - type: text
    content: 'The '
  - type: text
    content: sword
  - type: text
    content: ' despises every such stick.'
  - type: note
    content: 'The last sentence of this verse is so unintelligible in the Hebrew text that a few translations omit it entirely. It could be understood in three ways: (1) It refers to the way Judah despised all the warnings of God. (2) It refers to the sword of God that takes no account of the status of the one it punishes. (3) It refers to the way King Zedekiah despised Nebuchadnezzar and disregarded the threats of the Babylonians. There is no doubt that in this chapter the “sword” refers to Yahweh’s divine instrument of judgment (viz., the Babylonian army) against his people for their willful violation of his covenant over hundreds of years. And the statement that the “sword despises every such stick [or “wooden rod,” i.e., the scepter of royal authority]” means that the power of the invading Babylonian forces was unstoppable and inevitable. For under the permissive will of God, Nebuchadnezzar’s army was granted leave to arrogantly trample on the Judean kingdom, without having any respect whatever for the legitimacy of her governing authority.'
