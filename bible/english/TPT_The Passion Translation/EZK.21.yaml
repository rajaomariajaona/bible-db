  - type: text
    text: 'Ammonites: ‘A sword, a sword is drawn and ready for slaughter! It is a sharp, polished sword to flash like lightning and to destroy. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “sword” becomes a metonymy for the armies of the king of Babylon.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The visions you had are false. When you consulted your gods about what would happen, their answers were lies. Your day of judgment has come! It’s high time for your punishment to reach its climax. The sword is going to cut off your heads!
- type: usfm
  marker: p
  children:
