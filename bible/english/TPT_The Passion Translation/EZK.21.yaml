  '1':
  - type: heading
    content: Yahweh’s Sword
  - type: text
    content: ' '
  - type: note
    content: No other chapter in the Bible speaks more of Yahweh’s sword. Ezekiel 21 has been called the Song of the Sword. The Hebrew word for sword is used fourteen times in this chapter. Fourteen is the biblical number of salvation and deliverance. For the believer today, the “sword” is a metaphor for the Word of God. See Eph. 6:17–18; Heb. 4:12. Just as Jesus is the Word of God with a sword coming from his mouth (see Rev. 19:15), we who follow him will be the “sword company,” who are conformed to his image and speak his words from our mouths. The words of his mouth are our cutting edge. Ezekiel 21 is the seventh panel (G) in the chiastic parallel structure in Ezekiel. This section contains an oracle dealing with Babylon as the instrument of Yahweh’s judgment against Israel. This panel G constitutes the corresponding parallel with panel G1 in ch. 35, which contains an oracle of judgment against Edom for attacks against Israel and for their rejoicing over the destruction of Jerusalem at the hands of the Babylonians.
