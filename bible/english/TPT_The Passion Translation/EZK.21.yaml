- type: usfm
  marker: s1
  children:
  - type: text
    text: The King of Babylon Comes to Destroy Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said to me: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Son of man, mark out two roads for the king of Babylon to come with his sword; both should originate from the same land. Then put up a signpost at the place where the road branches off to the city. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The signpost will indicate the city where each road leads. God was telling Ezekiel to make it easy for the King of Babylon to choose which city he wanted to attack.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mark out the routes for the sword to come to Rabbah-of-the-Ammonites, and to Judah, and its fortress of Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For the king of Babylon is already at the place where the two roads begin. He is consulting his gods to decide which way to go by shuffling arrows and throwing them on the ground '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to see where they point
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the ancient practice of belomancy, tossing arrows with the names of enemies written upon them.
    marker-yv: yv-n
  - type: text
    text: 'He asks his favorite idols '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:21
    - type: usfm
