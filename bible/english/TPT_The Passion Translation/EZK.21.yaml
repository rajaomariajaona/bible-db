  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“ ‘Put the sword back in its scabbard. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 30–32
      metadata:
        usfm: EZK.21.30+EZK.21.31+EZK.21.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', God is speaking of the punishment coming to Nebuchadnezzar and Babylon for what they did to Jerusalem. God is going to punish the very “sword” he used to destroy the city. God will punish Nebuchadnezzar and his people in their homeland—that is, Nebuchadnezzar will die in Babylon.'
    marker-yv: yv-n
  - type: text
    text: 'I will punish you in the land where you were born, the land of your origin. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I will vent my fury on you, blow the fire of my rage against you, and hand you over to brutal men whose skill is destruction. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'You will be fuel for the fire. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Babylonian
  - type: text
    text: ' blood will flow in your homeland, and no one will remember anything about you. I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.’ ”'
