    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “scepter,” a symbol of kingly authority. The historical context leaves us without doubt that this oracle refers to the impending demise of the Judean kingdom at the hands of the Babylonian army under King Nebuchadnezzar.
    marker-yv: yv-n
  - type: text
    text: 'of my son, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Judah
  - type: text
    text: '? No!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sword
  - type: text
    text: ' despises every such stick.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The last sentence of this verse is so unintelligible in the Hebrew text that a few translations omit it entirely. It could be understood in three ways: (1) It refers to the way Judah despised all the warnings of God. (2) It refers to the sword of God that takes no account of the status of the one it punishes. (3) It refers to the way King Zedekiah despised Nebuchadnezzar and disregarded the threats of the Babylonians. There is no doubt that in this chapter the “sword” refers to'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ’s divine instrument of judgment (viz., the Babylonian army) against his people for their willful violation of his covenant over hundreds of years. And the statement that the “sword despises every such stick [or “wooden rod,” i.e., the scepter of royal authority]” means that the power of the invading Babylonian forces was unstoppable and inevitable. For under the permissive will of God, Nebuchadnezzar’s army was granted leave to arrogantly trample on the Judean kingdom, without having any respect whatever for the legitimacy of her governing authority.
    marker-yv: yv-n
