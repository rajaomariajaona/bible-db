  - type: heading
    content: The King of Babylon Comes to Destroy Jerusalem
  '18':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: '
  '19':
  - type: text
    content: '“Son of man, mark out two roads for the king of Babylon to come with his sword; both should originate from the same land. Then put up a signpost at the place where the road branches off to the city. '
  - type: note
    content: The signpost will indicate the city where each road leads. God was telling Ezekiel to make it easy for the King of Babylon to choose which city he wanted to attack.
  '2':
  - type: text
    content: '“Son of man, turn toward Jerusalem '
  - type: note
    content: Or “set your face toward Jerusalem.”
  - type: text
    content: 'and denounce her place of worship. '
  - type: note
    content: Or “sanctuaries.”
  - type: text
    content: 'Prophesy against the land of Israel '
  '20':
  - type: text
    content: 'Mark out the routes for the sword to come to Rabbah-of-the-Ammonites, and to Judah, and its fortress of Jerusalem. '
  '21':
  - type: text
    content: 'For the king of Babylon is already at the place where the two roads begin. He is consulting his gods to decide which way to go by shuffling arrows and throwing them on the ground '
  - type: text
    content: to see where they point
  - type: text
    content: '. '
  - type: note
    content: This was the ancient practice of belomancy, tossing arrows with the names of enemies written upon them.
  - type: text
    content: 'He asks his favorite idols '
  - type: note
    content: The Hebrew word teraphim means “household gods [figurines].”
  - type: text
    content: 'for advice, and he examines the liver of a sacrificed animal. '
  - type: note
    content: This is the only instance in the Bible of a person seeking omens through studying the liver of an animal, a practice known as hepatoscopy.
  '22':
  - type: text
    content: 'It tells him to take the road on the right leading to Jerusalem, '
  - type: text
    content: so the king decides to go there
  - type: text
    content: . His plan is to ready the battering rams to be prepared when he gives the order for slaughter. His army will shout the battle cry and set up the battering rams against the gates. They will make siege ramps and construct siege towers.
  '23':
  - type: text
    content: '“The people of Jerusalem will believe that these omens are false, for they have made sworn treaties '
  - type: text
    content: and think they are safe
  - type: text
    content: '. But Nebuchadnezzar’s decision to attack will remind them of their sins against God, and as a result, they will be captured. '
  '24':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, ‘You have uncovered your waywardness by parading all your evil deeds. You flaunt your sins in everything you do. Because of this, your enemies will capture you by force!'
  '25':
  - type: text
    content: '“ ‘As for you, wicked and unholy prince of Israel, '
  - type: note
    content: That is, King Zedekiah.
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has a message for you. Your doom is approaching. Your time is up, and I will put an end to your crimes. Take off your '
  - type: text
    content: royal
  - type: text
    content: ' turban and remove your crown. Everything is about to be turned upside down. Lowly ones will be raised up, and those who seem important now will become nobodies. '
  - type: note
    content: See Matt. 20:16; 1 Cor. 1:26–29.
  '27':
  - type: text
    content: 'A ruin, a ruin, I will make this city a ruin '
  - type: note
    content: The three-fold use of the word “ruin” stresses how terrible will be the destruction of Jerusalem. The Hebrew word for “ruin” (’awwah) is a play on the word for “guilt” or “punishment” (’awon) in vv. 23–25.
  - type: text
    content: '—until the one arrives, the rightful ruler. '
  - type: note
    content: Who is this “rightful ruler”? Some believe the rightful ruler was Jehoiachin, previously dethroned. Some see it as a reference to Nebuchadnezzar, whom God was using to punish Jerusalem, or as perhaps a cryptic reference to the future Messiah, our Lord Jesus. See Gen. 49:10.
  - type: text
    content: 'Then I will hand him the '
  - type: text
    content: crown
  - type: text
    content: ' to rule.’ ”'
  - type: note
    content: Jesus Christ is the one who has the right to wear the “turban” of vv. 25–26 (as our High Priest) and the “crown” (as the King). He is the one who initiated the King-Priest ministry after the order of Melchizedek. And he has made us part of his King-Priest ministry on earth. See 1 Peter 2:9; Rev. 1:6; 5:10.
  - type: heading
    content: Yahweh’s Punishment of the Ammonites
  '28':
  - type: text
    content: '“Son of man, prophesy and announce what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to the mocking '
  - type: note
    content: The term herpatam has the literal meaning of “their reproaches” or “their expressions of contempt.” However, in this context it is clear that these meanings also contain an element of mocking or taunting directed toward the people of Israel, as is made abundantly clear in Ezek. 25:3, 6; compare 36:15.
  - type: text
    content: 'Ammonites: ‘A sword, a sword is drawn and ready for slaughter! It is a sharp, polished sword to flash like lightning and to destroy. '
  - type: note
    content: The “sword” becomes a metonymy for the armies of the king of Babylon.
  '29':
  - type: text
    content: The visions you had are false. When you consulted your gods about what would happen, their answers were lies. Your day of judgment has come! It’s high time for your punishment to reach its climax. The sword is going to cut off your heads!
  '3':
  - type: text
    content: and say to the people, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: I am your enemy, and I am about to draw my sword and destroy the good and evil alike. '
  '30':
  - type: text
    content: '“ ‘Put the sword back in its scabbard. '
  - type: note
    content: In vv. 30–32, God is speaking of the punishment coming to Nebuchadnezzar and Babylon for what they did to Jerusalem. God is going to punish the very “sword” he used to destroy the city. God will punish Nebuchadnezzar and his people in their homeland—that is, Nebuchadnezzar will die in Babylon.
  - type: text
    content: 'I will punish you in the land where you were born, the land of your origin. '
  '31':
  - type: text
    content: 'I will vent my fury on you, blow the fire of my rage against you, and hand you over to brutal men whose skill is destruction. '
  '32':
  - type: text
    content: 'You will be fuel for the fire. '
  - type: text
    content: Babylonian
  - type: text
    content: ' blood will flow in your homeland, and no one will remember anything about you. I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.’ ”'
  '4':
  - type: text
    content: 'I am going to use my drawn sword to cut off the upright and wicked alike, everyone alive from the south to the north. '
  '5':
  - type: text
    content: 'Then everyone will know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', am the one who has unsheathed my sword, and I will not put it back again!’'
  '6':
  - type: text
    content: '“Son of man, groan with bitter grief before their eyes. Groan as though your heart is breaking with sorrow. '
  '7':
  - type: text
    content: 'And when they ask, ‘Why these groans?’ reply, ‘Because of what I’ve heard is about to happen. Every heart will melt with fear, and every hand grow limp. Everyone will faint with fright and wet themselves. '
  - type: note
    content: The Hebrew reads literally “and every knee will run with water,” an image consistent with the classic depiction of visceral fear that gives rise to incontinence.
  - type: text
    content: 'Behold, it is coming now! It is here!’ I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
