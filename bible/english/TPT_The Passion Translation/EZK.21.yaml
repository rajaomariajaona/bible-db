  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Son of man, groan with bitter grief before their eyes. Groan as though your heart is breaking with sorrow. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And when they ask, ‘Why these groans?’ reply, ‘Because of what I’ve heard is about to happen. Every heart will melt with fear, and every hand grow limp. Everyone will faint with fright and wet themselves. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew reads literally “and every knee will run with water,” an image consistent with the classic depiction of visceral fear that gives rise to incontinence.
    marker-yv: yv-n
  - type: text
