document_id: JOS.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Capture of Jericho
  - type: text
    content: Now the gates of Jericho were bolted and barred because of the Israelites; no one could get in or out.
  '10':
  - type: text
    content: 'Now Joshua had commanded the rest of the people, “Do not shout! Remain silent! Don’t make a sound until the moment I command you to shout. Then lift up a shout '
  - type: text
    content: with all your might
  - type: text
    content: '!” '
  '11':
  - type: text
    content: 'So the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: ' circled the city once, then they all came back to the camp '
  - type: text
    content: in Gilgal
  - type: text
    content: ' and spent the night.'
  '12':
  - type: text
    content: 'Joshua rose bright and early the next morning, and the priests took up the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'The armed men and the seven priests carrying the seven shofars marched in front of the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: ' blowing their shofars continually, and the rear guard followed the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: ', while the trumpets kept sounding. '
  '14':
  - type: text
    content: 'On the second day, they circled the city once and again returned to the camp. They repeated this '
  - type: text
    content: pattern
  - type: text
    content: ' for six days.'
  '15':
  - type: text
    content: 'On the seventh day, everyone rose at daybreak, and they marched around the city in the same manner seven times. '
  '16':
  - type: text
    content: 'After their seventh time around, when the priests were about to blow the shofars, Joshua commanded the people: “Shout a shout '
  - type: text
    content: of joy
  - type: text
    content: '! '
  - type: text
    content: Yahweh
  - type: text
    content: ' has given you the city! '
  '17':
  - type: text
    content: 'Jericho and everything in it are to be a devoted offering to '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: The Hebrew term for “devoted offering” is cherem and implies things or persons who were entirely and irrevocably consecrated to God, often by total destruction. See Lev. 27:28–29.
  - type: text
    content: 'But spare Rahab the prostitute and everyone in her house because she hid our spies. '
  '18':
  - type: text
    content: 'You must not take for yourselves '
  - type: note
    content: Or “keep away from.”
  - type: text
    content: 'anything that is dedicated to '
  - type: text
    content: Yahweh
  - type: text
    content: ' or you will bring trouble and destruction to the entire Israelite camp! '
  - type: note
    content: See Deut. 7:25–26.
  '19':
  - type: text
    content: 'Everything made of silver, gold, bronze, and iron is sacred and devoted to '
  - type: text
    content: Yahweh
  - type: text
    content: '; place all of it in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s treasury!”
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ' commanded Joshua, '
  - type: note
    content: If we see v. 1 as parenthetical, then Joshua was still in the presence of the Commander of Yahweh’s armies, identified here as Yahweh.
  - type: text
    content: '“See, I have given Jericho, its king and mighty warriors into your hands. '
  - type: note
    content: Faith will see “what is still unseen” (Heb. 11:1). God gave Joshua a promise upon which to rest his faith.
  '20':
  - type: text
    content: 'The people were ready to shout with a great shout when they heard the shofars. As soon as they heard the blast of the shofars, they raised a massive shout of jubilee '
  - type: text
    content: like a thunderclap
  - type: text
    content: ', and all at once the '
  - type: text
    content: thick
  - type: text
    content: ' walls of Jericho collapsed! Everyone rushed straight ahead '
  - type: note
    content: 'Or “everyone ascended.” By comparing v. 20 with 1 Thess. 4:16–17, we see that both events have the Lord himself (see Josh. 6:8), a shout, a trumpet blast, and the people ascending. There are a number of “sevens” in this chapter: seven priests, seven shofars, seven days circling the city, seven times the city was to be encompassed on the seventh day. Seven represents completion, fullness, and perfection.'
  - type: text
    content: 'and captured the city. '
  '21':
  - type: text
    content: They utterly destroyed all that was in Jericho, men and women, young and old, livestock and donkeys—everything was destroyed with the sword.
  - type: note
    content: Or “by the mouth of the sword.” See Heb. 4:12.
  - type: heading
    content: Rahab and Her Family Are Spared
  '22':
  - type: text
    content: 'Joshua told the two spies who had entered Jericho, “Go to the prostitute’s house and rescue her and everyone in her house, just as you promised her.” '
  '23':
  - type: text
    content: So the two spies brought out Rahab, her father, mother, brothers and sisters, and all who belonged to her, and gave them refuge outside the camp of Israel.
  '24':
  - type: text
    content: 'Then they burned Jericho to the ground and all that was within it. Only the silver and gold, brass, and iron were placed into the treasury of '
  - type: text
    content: Yahweh
  - type: text
    content: '’s house. '
  '25':
  - type: text
    content: 'Yet Joshua spared Rahab the prostitute, her father’s family, and all that belonged to her. She lives among the Israelites to this day '
  - type: note
    content: This shows that the book of Joshua was written not long after the events of the book.
  - type: text
    content: because she hid the two men Joshua sent to spy out Jericho.
  '26':
  - type: text
    content: 'Afterward, Joshua pronounced this solemn oath:'
  - type: text
    content: '“May '
  - type: text
    content: Yahweh
  - type: text
    content: ' curse anyone'
  - type: text
    content: who attempts to rebuild this city, Jericho!
  - type: text
    content: He will pay for laying its foundation
  - type: text
    content: with the life of his oldest son,
  - type: text
    content: and for setting up its gates with his youngest son!”
  - type: note
    content: This curse was fulfilled 550 years later in the time of Ahab by Hiel the Bethelite (see 1 Kings 16:34). In contrast, our heavenly Father laid the foundation of the church (see 1 Cor. 3:10–11) with the death of his Firstborn (see Rom. 8:29). The younger son is the overcomer, the many sons brought to glory, we who will also lay down our lives to rebuild the gates of Zion.
  '27':
  - type: text
    content: Yahweh
  - type: text
    content: ’s presence was with Joshua, and he became famous throughout the land.
  '3':
  - type: text
    content: 'March around the city with all your men of war once a day for six days. '
  '4':
  - type: text
    content: 'Have seven priests carry shofars in front of the ark. On the seventh day, march around the city seven times, with the priests blowing the shofars. '
  '5':
  - type: text
    content: 'When you hear the blare of the shofars, have all the people shout with a mighty shout of joy! '
  - type: note
    content: The Hebrew word for “shout” is teruw‘ah and can be either a war cry or a shout of joy.
  - type: text
    content: 'Then the walls '
  - type: note
    content: The walled city of Jericho could represent the stronghold of the natural mind and every high thought that exalts itself against the knowledge of the true God (see 2 Cor. 10:3–5). Walls represent our inner “walls” and arguments we erect against learning something new. The mind of man is opposed to the ways of God (see Isa. 55:8; Rom. 8:7). The door to truth is not the intellect but rather the spirit yielded to God. Daniel saw the writing on the wall, and knew the walls of Babylon would fall (see Dan. 5:4–9, 25–31). Ezekiel dug through the “wall” to uncover the abominations that were hidden (Ezek. 8:7–18). The prophet Joel saw an army that would run upon and climb up the “walls” (Joel 2:1–9). David was a champion who leapt over the “wall” (2 Sam. 22:30; see Ps. 18:29). And similarly, Joshua was a prophetic leader who shouted so that the “walls” could topple (Josh. 6:1–20).
  - type: text
    content: 'of the city will collapse '
  - type: text
    content: before your eyes
  - type: text
    content: ', and your whole army must charge straight in!”'
  - type: note
    content: The perimeter of Jericho was about four miles. God designed this unorthodox military strategy to demonstrate his power (see Ps. 80:1–2), to discourage all forms of self-reliance, and to bring all the glory to himself (see Ps. 115:1). The thick, impenetrable walls (see Num. 13:28; Deut. 1:28–30) were nothing against the power of God!
  '6':
  - type: text
    content: 'So Joshua son of Nun summoned the priests and instructed them: “Take up the ark of the covenant, and have seven priests carry seven shofars in front of the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '7':
  - type: text
    content: 'And to the people he said, “Forward! March around the city and set an advance guard of armed men to march ahead of the ark of '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '8':
  - type: text
    content: 'At Joshua’s order, the seven priests carrying seven shofars advanced before '
  - type: text
    content: Yahweh
  - type: text
    content: '. The ark of the covenant of '
  - type: text
    content: Yahweh
  - type: text
    content: ' followed them as they made long blasts on their shofars. '
  '9':
  - type: text
    content: 'The advance guard marched in front of the priests who were blowing the shofars, the rear guard marched behind the ark, and the shofars blared the whole time! '
