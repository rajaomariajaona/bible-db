document_id: JOS.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Capture of Jericho
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the gates of Jericho were bolted and barred because of the Israelites; no one could get in or out.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joshua had commanded the rest of the people, “Do not shout! Remain silent! Don’t make a sound until the moment I command you to shout. Then lift up a shout '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with all your might
    - type: text
      text: '!” '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the ark of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' circled the city once, then they all came back to the camp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in Gilgal
    - type: text
      text: ' and spent the night.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua rose bright and early the next morning, and the priests took up the ark of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The armed men and the seven priests carrying the seven shofars marched in front of the ark of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' blowing their shofars continually, and the rear guard followed the ark of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', while the trumpets kept sounding. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the second day, they circled the city once and again returned to the camp. They repeated this '
    - type: usfm
      marker: it
      children:
      - type: text
        text: pattern
    - type: text
      text: ' for six days.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the seventh day, everyone rose at daybreak, and they marched around the city in the same manner seven times. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After their seventh time around, when the priests were about to blow the shofars, Joshua commanded the people: “Shout a shout '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of joy
    - type: text
      text: '! '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has given you the city! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jericho and everything in it are to be a devoted offering to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew term for “devoted offering” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: cherem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and implies things or persons who were entirely and irrevocably consecrated to God, often by total destruction. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 27:28–29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'But spare Rahab the prostitute and everyone in her house because she hid our spies. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must not take for yourselves '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “keep away from.”
      marker-yv: yv-n
    - type: text
      text: 'anything that is dedicated to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' or you will bring trouble and destruction to the entire Israelite camp! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 7:25–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everything made of silver, gold, bronze, and iron is sacred and devoted to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '; place all of it in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s treasury!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' commanded Joshua, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: If we see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as parenthetical, then Joshua was still in the presence of the Commander of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s armies, identified here as
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '“See, I have given Jericho, its king and mighty warriors into your hands. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Faith will see “what is still unseen” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God gave Joshua a promise upon which to rest his faith.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people were ready to shout with a great shout when they heard the shofars. As soon as they heard the blast of the shofars, they raised a massive shout of jubilee '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like a thunderclap
    - type: text
      text: ', and all at once the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: thick
    - type: text
      text: ' walls of Jericho collapsed! Everyone rushed straight ahead '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “everyone ascended.” By comparing v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 4:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', we see that both events have the Lord himself (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 6:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), a shout, a trumpet blast, and the people ascending. There are a number of “sevens” in this chapter: seven priests, seven shofars, seven days circling the city, seven times the city was to be encompassed on the seventh day. Seven represents completion, fullness, and perfection.'
      marker-yv: yv-n
    - type: text
      text: 'and captured the city. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They utterly destroyed all that was in Jericho, men and women, young and old, livestock and donkeys—everything was destroyed with the sword.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “by the mouth of the sword.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 4:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rahab and Her Family Are Spared
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua told the two spies who had entered Jericho, “Go to the prostitute’s house and rescue her and everyone in her house, just as you promised her.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the two spies brought out Rahab, her father, mother, brothers and sisters, and all who belonged to her, and gave them refuge outside the camp of Israel.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they burned Jericho to the ground and all that was within it. Only the silver and gold, brass, and iron were placed into the treasury of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s house. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet Joshua spared Rahab the prostitute, her father’s family, and all that belonged to her. She lives among the Israelites to this day '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This shows that the book of Joshua was written not long after the events of the book.
      marker-yv: yv-n
    - type: text
      text: because she hid the two men Joshua sent to spy out Jericho.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward, Joshua pronounced this solemn oath:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' curse anyone'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who attempts to rebuild this city, Jericho!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will pay for laying its foundation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the life of his oldest son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for setting up its gates with his youngest son!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This curse was fulfilled 550 years later in the time of Ahab by Hiel the Bethelite (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 16:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). In contrast, our heavenly Father laid the foundation of the church (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:10–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) with the death of his Firstborn (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The younger son is the overcomer, the many sons brought to glory, we who will also lay down our lives to rebuild the gates of Zion.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s presence was with Joshua, and he became famous throughout the land.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'March around the city with all your men of war once a day for six days. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have seven priests carry shofars in front of the ark. On the seventh day, march around the city seven times, with the priests blowing the shofars. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you hear the blare of the shofars, have all the people shout with a mighty shout of joy! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “shout” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: teruw‘ah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and can be either a war cry or a shout of joy.
      marker-yv: yv-n
    - type: text
      text: 'Then the walls '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The walled city of Jericho could represent the stronghold of the natural mind and every high thought that exalts itself against the knowledge of the true God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 10:3–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Walls represent our inner “walls” and arguments we erect against learning something new. The mind of man is opposed to the ways of God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 55:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The door to truth is not the intellect but rather the spirit yielded to God. Daniel saw the writing on the wall, and knew the walls of Babylon would fall (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 5:4–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 25–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Ezekiel dug through the “wall” to uncover the abominations that were hidden (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 8:7–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The prophet Joel saw an army that would run upon and climb up the “walls” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:1–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). David was a champion who leapt over the “wall” (
      - type: text
        text: 2 Sam. 22:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 18:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). And similarly, Joshua was a prophetic leader who shouted so that the “walls” could topple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 6:1–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'of the city will collapse '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before your eyes
    - type: text
      text: ', and your whole army must charge straight in!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The perimeter of Jericho was about four miles. God designed this unorthodox military strategy to demonstrate his power (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 80:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), to discourage all forms of self-reliance, and to bring all the glory to himself (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 115:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The thick, impenetrable walls (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 13:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 1:28–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) were nothing against the power of God!
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua son of Nun summoned the priests and instructed them: “Take up the ark of the covenant, and have seven priests carry seven shofars in front of the ark of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And to the people he said, “Forward! March around the city and set an advance guard of armed men to march ahead of the ark of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At Joshua’s order, the seven priests carrying seven shofars advanced before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
