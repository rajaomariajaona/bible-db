      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:78
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some believe this is a quote from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus the Savior is the dawning light of a new day to this dark world. This “sunrise” is the appearing of Jesus, our Dayspring.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is about to break upon us in holy visitation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all because the merciful heart of our God is so very tender.
  '79':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '79'
    - type: text
      text: The word from heaven will come to us
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:79
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “manifestation from heaven” as translated from the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with dazzling light to shine upon those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who live in darkness, near death’s dark shadow.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:79
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zechariah is quoting from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
