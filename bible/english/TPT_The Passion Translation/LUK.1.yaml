      children:
      - type: text
        text: 1-4
    - type: text
      text: 'I am writing for you, mighty lover of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1–4
      - type: usfm
