        children:
        - type: text
          text: 1:55
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mary understood by revelation that the Christ child would fulfill the promises of mercy that God gave to Abraham. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 22:16–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to his descendants forever.”
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Before going home, Mary stayed with Elizabeth for about three months.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The cultural practice of the Hebrews was for the mother to do nothing but rest during the first three months of pregnancy.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Birth of the Prophet John
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'When Elizabeth’s pregnancy was full term, she gave birth to a son. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: All her family, friends, and neighbors heard about it, and they too were overjoyed, for they realized that the Lord had showered his wonderful mercy upon her.
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'When the baby was eight days old, according to their custom, all the family and friends came together for the circumcision ceremony. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:59
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This ceremony was an important time of celebration in Jewish culture, for another child was born under the covenant of God with Israel. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 17:4–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 12:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Everyone assumed that the parents would name the baby Zechariah, after his father, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They were both righteous before God, living virtuously and following the commandments of the Lord blamelessly. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: but Elizabeth spoke up and said, “No, his name is John!”
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: “What?” they exclaimed. “No one in your family line has that name!”
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'So they gestured to the baby’s father to ask what to name the child. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: He motioned for a writing tablet, and to the amazement of all, he wrote, “His name is John.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:63
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name John means “God’s gift” or “God is gracious.”
      marker-yv: yv-n
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Instantly Zechariah could speak again. And his first words were praises to the Lord.
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'The fear of God fell on the people of their village, and the news of this astounding event traveled throughout the hill country of Judea. Everyone was in awe over it! '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: All who heard this news were astonished and wondered, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Since a miracle brought his birth
    - type: text
      text: ', what on earth will this child become? Clearly, God’s presence is upon this child in a powerful way!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zechariah’s Prophecy
    marker-yv: yv-h
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'Then Zechariah was filled to overflowing with the Holy Spirit and he prophesied, saying:'
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: “Praise be to the exalted Lord God of Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he has seen us through eyes of grace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he comes as our Hero-God to set us free!
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: He appears to us as a mighty Savior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'a trumpet of redemption '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:69
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literal translation of the Aramaic. The Hebrew is “a horn of salvation,” which signifies strength and fighting power.
      marker-yv: yv-n
    - type: text
      text: from the house of David, his servant,
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
