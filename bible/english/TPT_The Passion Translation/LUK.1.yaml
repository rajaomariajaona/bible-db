      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he will illuminate the path that leads to the way of peace.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 8-9
    - type: text
      text: 'One day, Zechariah’s priestly order was on duty and he was serving as priest. He was chosen by the casting of lots (according to the custom of the priesthood) so the honor fell upon Zechariah to enter the Holy Place '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:8–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some have said there were twenty thousand priests in Christ’s time, so that no priest would ever offer incense more than once. This was a once-in-a-lifetime moment for Zechariah. The burning of incense before the Lord was done twice daily, once in the morning and once in the afternoon (
      - type: text
        text: Ex. 30:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'and burn incense before the Lord. '
  '80':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '80'
    - type: text
      text: 'Afterward, their son grew up and was strengthened by the Holy Spirit '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:80
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both of John’s parents were full of the Holy Spirit (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '41'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '67'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). John was raised in a Spirit-filled home.
      marker-yv: yv-n
    - type: text
      text: and he grew in his love for God. John chose to live in the lonely wilderness until the day of his public appearance to Israel.
