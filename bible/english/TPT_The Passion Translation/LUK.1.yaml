      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:26–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many translations have the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: virgin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is a possible translation of the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
