      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literal translation of the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
