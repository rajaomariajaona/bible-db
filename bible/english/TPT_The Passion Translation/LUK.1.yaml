        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text can be translated “most excellent Theophilus.” The name Theophilus means “friend of God” or “lover of God.” The Greek word means “most honorable” or “mightiest.” Some scholars believe there was no individual named Theophilus mentioned in Luke’s writings. This becomes instead a greeting to you and all the lovers of God.
      marker-yv: yv-n
    - type: text
      text: 'an orderly account of what Jesus accomplished and fulfilled among us. Several eyewitness biographies have already been written, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is likely that Matthew and Mark are two of the Gospel accounts Luke refers to here.
      marker-yv: yv-n
    - type: text
      text: 'using as their source material the good news preached among us by his early disciples, who were from the beginning loving servants of the Living Expression. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated literally from the Aramaic text. The Greek word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: logos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Some have translated this rich term as “Word.” It could also be translated “Message” or “Blueprint.” Jesus Christ is the eternal Word, the creative Word, and the Word made visible. He is the divine self-expression of all that God is, contains, and reveals in his humanity. Just as we express ourselves in words, God has expressed himself in Christ.
      marker-yv: yv-n
    - type: text
      text: 'Now I am passing on to you this accurate compilation of my own meticulous investigation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here is actually “to see with the eye” or “autopsy.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Autopsy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a relevant word, since we know that Luke was a physician. Also, note that Luke’s sources would have included all he heard from Paul and others on their missionary journeys. And, he likely had the opportunity to interview Mary, Jesus’ mother.
      marker-yv: yv-n
    - type: text
      text: 'based on numerous eyewitness interviews. It is appropriate for me to write this, for he also appeared to me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated literally from the Aramaic text. The Greek text uses the same term for “coming from above” found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Luke is revealing that the Lord Jesus appeared to him and authorized him to compile his inspired Gospel. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:3–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', regarding the direct revelation Paul similarly received and would have passed on to Luke.'
      marker-yv: yv-n
    - type: text
      text: so that I would reassure you beyond any shadow of a doubt the reliability of all you have been taught of him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Angelic Prophecy of the Prophet John’s Birth
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'A large crowd of worshipers had gathered to pray outside the temple at the hour when incense was being offered. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: All at once an angel of the Lord appeared to him, standing just to the right of the altar of incense.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The angel appeared on the south side of the Holy Place, between the altar of incense and the golden lampstand.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Zechariah was startled and overwhelmed with fear. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But the angel reassured him, saying, “Don’t be afraid, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Luke uses this phrase, “Don’t be afraid,” seven times in his gospel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:50
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Zechariah! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God is showing grace to you
    - type: text
      text: '. For I have come to tell you that your prayer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek verb allows for a possible translation of “prayer you don’t even pray anymore.”
      marker-yv: yv-n
    - type: text
      text: 'for a child has been answered. Your wife, Elizabeth, will bear you a son and you are to name him John. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'His birth will bring you much joy and gladness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Luke is the gospel of joy! There are nine reasons for joy in this book: (1) The joy of Christ’s life,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (2) The greatness of Jesus,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (3) The joy of heaven over the birth of Christ,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (4) The joy of God’s Word in our hearts,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (5) The joys of a ministry of power and our names written in heaven,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 10:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (6) The heavenly joys of salvation,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (7) The joys of condescending love,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (8) The joys of overwhelming mysteries,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . (9) The resurrection and the blessings that are ours in Christ,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Many will rejoice because of him, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'and he will be one of the great ones in the sight of God. He will drink no wine or strong drink, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most likely, John was to be a Nazarite from birth, one totally set apart for God and who would fulfill the Nazarite vow found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 6:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'but he will be filled with the Holy Spirit even while still in his mother’s womb. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he will persuade many in Israel to convert and turn back to the Lord their God. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'He will go before the Lord as a forerunner, with the same power and anointing '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spirit.”
      marker-yv: yv-n
    - type: text
      text: 'as Elijah the prophet. He will be instrumental in turning the hearts of the fathers in tenderness back to their children and the hearts of the disobedient back to the wisdom of their righteous fathers. And he will prepare a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: united people
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The words “united people” are found in the Aramaic text.
      marker-yv: yv-n
    - type: text
      text: who are ready for the Lord’s appearing.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Zechariah asked the angel, “How do you expect me to believe this? I’m an old man and my wife is too old to give me a child. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: What sign can you give me to prove this will happen?
    - type: text
      text: ”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then the angel said, “I am Gabriel. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Gabriel means “God’s hero” or “God’s mighty one.”
      marker-yv: yv-n
    - type: text
      text: 'I stand beside God himself. He has sent me to announce to you this good news. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'But now, since you did not believe my words, you will be stricken silent and unable to speak '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Since Zechariah asked for a sign rather than believe the word of the Lord, he was given the sign of silence. Unbelief keeps a priest from speaking until faith arises.
      marker-yv: yv-n
    - type: text
      text: until the day my words have been fulfilled at their appointed time and a child is born to you. That will be your sign!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the first spoken message from heaven in more than four hundred years. The last person before Zechariah to receive a message given by angels was also named Zechariah. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Meanwhile, the crowds outside kept expecting him to come out. They were amazed over Zechariah’s delay, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They were waiting outside for the priest to come out and speak over them the customary Aaronic blessing found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 6:24–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'wondering what could have happened inside the sanctuary. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'When he finally did come out, he tried to talk, but he couldn’t speak a word, and they realized from his gestures that he had seen a vision while in the Holy Place. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He remained mute as he finished his days of priestly ministry in the temple and then went back to his own home. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Soon afterward his wife, Elizabeth, became pregnant and went into seclusion for the next five months. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'With joy she exclaimed, “See how kind it is of God to gaze upon me '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This phrase is translated from the Aramaic text.
      marker-yv: yv-n
    - type: text
      text: and take away the disgrace of my barrenness!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Angelic Prophecy of Jesus’ Birth
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
