document_id: LUK.1,1849
type_code: eng
verses:
  '1':
  - type: text
    content: 'I am writing for you, mighty lover of God, '
  - type: note
    content: The Greek text can be translated “most excellent Theophilus.” The name Theophilus means “friend of God” or “lover of God.” The Greek word means “most honorable” or “mightiest.” Some scholars believe there was no individual named Theophilus mentioned in Luke’s writings. This becomes instead a greeting to you and all the lovers of God.
  - type: text
    content: 'an orderly account of what Jesus accomplished and fulfilled among us. Several eyewitness biographies have already been written, '
  - type: note
    content: It is likely that Matthew and Mark are two of the Gospel accounts Luke refers to here.
  - type: text
    content: 'using as their source material the good news preached among us by his early disciples, who were from the beginning loving servants of the Living Expression. '
  - type: note
    content: Translated literally from the Aramaic text. The Greek word is logos. Some have translated this rich term as “Word.” It could also be translated “Message” or “Blueprint.” Jesus Christ is the eternal Word, the creative Word, and the Word made visible. He is the divine self-expression of all that God is, contains, and reveals in his humanity. Just as we express ourselves in words, God has expressed himself in Christ.
  - type: text
    content: 'Now I am passing on to you this accurate compilation of my own meticulous investigation '
  - type: note
    content: The Greek word used here is actually “to see with the eye” or “autopsy.” Autopsy is a relevant word, since we know that Luke was a physician. Also, note that Luke’s sources would have included all he heard from Paul and others on their missionary journeys. And, he likely had the opportunity to interview Mary, Jesus’ mother.
  - type: text
    content: 'based on numerous eyewitness interviews. It is appropriate for me to write this, for he also appeared to me '
  - type: note
    content: Translated literally from the Aramaic text. The Greek text uses the same term for “coming from above” found in John 3:31 and 19:11. Luke is revealing that the Lord Jesus appeared to him and authorized him to compile his inspired Gospel. See 1 Cor. 15:3–5, regarding the direct revelation Paul similarly received and would have passed on to Luke.
  - type: text
    content: so that I would reassure you beyond any shadow of a doubt the reliability of all you have been taught of him.
  - type: heading
    content: Angelic Prophecy of the Prophet John’s Birth
  '10':
  - type: text
    content: 'A large crowd of worshipers had gathered to pray outside the temple at the hour when incense was being offered. '
  '11':
  - type: text
    content: All at once an angel of the Lord appeared to him, standing just to the right of the altar of incense.
  - type: note
    content: The angel appeared on the south side of the Holy Place, between the altar of incense and the golden lampstand.
  '12':
  - type: text
    content: 'Zechariah was startled and overwhelmed with fear. '
  '13':
  - type: text
    content: 'But the angel reassured him, saying, “Don’t be afraid, '
  - type: note
    content: Luke uses this phrase, “Don’t be afraid,” seven times in his gospel (1:30, 2:10, 5:10, 8:50, 12:7, 12:32).
  - type: text
    content: 'Zechariah! '
  - type: text
    content: God is showing grace to you
  - type: text
    content: '. For I have come to tell you that your prayer '
  - type: note
    content: The Greek verb allows for a possible translation of “prayer you don’t even pray anymore.”
  - type: text
    content: 'for a child has been answered. Your wife, Elizabeth, will bear you a son and you are to name him John. '
  '14':
  - type: text
    content: 'His birth will bring you much joy and gladness. '
  - type: note
    content: 'Luke is the gospel of joy! There are nine reasons for joy in this book: (1) The joy of Christ’s life, 1:14. (2) The greatness of Jesus, 1:41. (3) The joy of heaven over the birth of Christ, 2:10. (4) The joy of God’s Word in our hearts, 8:13. (5) The joys of a ministry of power and our names written in heaven, 10:17, 20. (6) The heavenly joys of salvation, 15:7, 10. (7) The joys of condescending love, 19:6. (8) The joys of overwhelming mysteries, 24:41. (9) The resurrection and the blessings that are ours in Christ, 24:52.'
  - type: text
    content: 'Many will rejoice because of him, '
  '15':
  - type: text
    content: 'and he will be one of the great ones in the sight of God. He will drink no wine or strong drink, '
  - type: note
    content: Most likely, John was to be a Nazarite from birth, one totally set apart for God and who would fulfill the Nazarite vow found in Num. 6:1–12.
  - type: text
    content: 'but he will be filled with the Holy Spirit even while still in his mother’s womb. '
  '16':
  - type: text
    content: 'And he will persuade many in Israel to convert and turn back to the Lord their God. '
  '17':
  - type: text
    content: 'He will go before the Lord as a forerunner, with the same power and anointing '
  - type: note
    content: Or “spirit.”
  - type: text
    content: 'as Elijah the prophet. He will be instrumental in turning the hearts of the fathers in tenderness back to their children and the hearts of the disobedient back to the wisdom of their righteous fathers. And he will prepare a '
  - type: text
    content: united people
  - type: text
    content: ' '
  - type: note
    content: The words “united people” are found in the Aramaic text.
  - type: text
    content: who are ready for the Lord’s appearing.”
  '18':
  - type: text
    content: 'Zechariah asked the angel, “How do you expect me to believe this? I’m an old man and my wife is too old to give me a child. '
  - type: text
    content: What sign can you give me to prove this will happen?
  - type: text
    content: ”
  '19':
  - type: text
    content: 'Then the angel said, “I am Gabriel. '
  - type: note
    content: The name Gabriel means “God’s hero” or “God’s mighty one.”
  - type: text
    content: 'I stand beside God himself. He has sent me to announce to you this good news. '
  '20':
  - type: text
    content: 'But now, since you did not believe my words, you will be stricken silent and unable to speak '
  - type: note
    content: Since Zechariah asked for a sign rather than believe the word of the Lord, he was given the sign of silence. Unbelief keeps a priest from speaking until faith arises.
  - type: text
    content: until the day my words have been fulfilled at their appointed time and a child is born to you. That will be your sign!”
  - type: note
    content: This is the first spoken message from heaven in more than four hundred years. The last person before Zechariah to receive a message given by angels was also named Zechariah. See Zech. 1:6.
  '21':
  - type: text
    content: 'Meanwhile, the crowds outside kept expecting him to come out. They were amazed over Zechariah’s delay, '
  - type: note
    content: They were waiting outside for the priest to come out and speak over them the customary Aaronic blessing found in Num. 6:24–26.
  - type: text
    content: 'wondering what could have happened inside the sanctuary. '
  '22':
  - type: text
    content: 'When he finally did come out, he tried to talk, but he couldn’t speak a word, and they realized from his gestures that he had seen a vision while in the Holy Place. '
  '23':
  - type: text
    content: 'He remained mute as he finished his days of priestly ministry in the temple and then went back to his own home. '
  '24':
  - type: text
    content: 'Soon afterward his wife, Elizabeth, became pregnant and went into seclusion for the next five months. '
  '25':
  - type: text
    content: 'With joy she exclaimed, “See how kind it is of God to gaze upon me '
  - type: note
    content: This phrase is translated from the Aramaic text.
  - type: text
    content: and take away the disgrace of my barrenness!”
  - type: heading
    content: Angelic Prophecy of Jesus’ Birth
  '26':
  - type: text
    content: 'During the sixth month of Elizabeth’s pregnancy, the angel Gabriel was sent from God’s presence to an unmarried girl '
  - type: note
    content: Many translations have the word virgin. It is a possible translation of the Greek word parthenos, but its most common usage implies “a girl of marriageable age.” It is made explicit in Matt. 1:25 and Luke 1:34 that Mary was indeed a virgin.
  - type: text
    content: 'named Mary, living in Nazareth, a village in Galilee. '
  - type: note
    content: The Aramaic word translated “Galilee” here means “revealed.” It is only fitting that God would first be “revealed” in a village in Galilee. Nazareth means “branch.” Jesus grew up as the “Branch” of the Lord in the city of the “branch.”
  - type: text
    content: 'She was engaged '
  - type: note
    content: This betrothal period usually lasted one year, and unfaithfulness on the part of the bride during the engagement would have been punishable by death.
  - type: text
    content: 'to a man named Joseph, a true descendant of King David. '
  '28':
  - type: text
    content: 'Gabriel appeared to her and said, “Rejoice, beloved young woman, for the Lord is with you '
  - type: note
    content: For Gabriel to say, “the Lord is with you,” could mean that Jesus, our Master, had been conceived in her womb. This was what bewildered Mary.
  - type: text
    content: 'and you are '
  - type: text
    content: anointed
  - type: text
    content: ' with great favor.”'
  '29':
  - type: text
    content: 'Mary was deeply troubled over the words of the angel and bewildered over what this may mean for her. '
  '30':
  - type: text
    content: 'But the angel reassured her, saying, “Do not yield to your fear, Mary, for the Lord has found delight in you and has chosen to surprise you with a wonderful gift. '
  '31':
  - type: text
    content: 'You will become pregnant with a baby boy, and you are to name him Jesus. '
  '32':
  - type: text
    content: 'He will be supreme '
  - type: note
    content: As translated from the Aramaic text.
  - type: text
    content: 'and will be known as the Son of the Highest. And the Lord God will enthrone him as King on the throne of his ancestor David. '
  '33':
  - type: text
    content: 'He will reign as King of Israel '
  - type: note
    content: Or “House of Jacob.”
  - type: text
    content: forever, and his reign will have no limit.”
  '34':
  - type: text
    content: Mary said, “But how could this happen? I am still a virgin!”
  '35':
  - type: text
    content: 'Gabriel answered, “The Spirit of Holiness will fall upon you and almighty God will spread his shadow of power over you in a cloud of glory! '
  - type: note
    content: The Greek word used as a metaphor, “spread his shadow over you,” is also the word used at Jesus’ transfiguration when the cloud of glory overshadowed Jesus on the mountain (Mark 9:7).
  - type: text
    content: 'This is why the child born to you will be holy, '
  - type: note
    content: Jesus Christ is holy, born without sin in his bloodline, for his Father was God Almighty. He would become the only perfect sacrifice to take away our sin and remove its power and penalty from us.
  - type: text
    content: 'and he will be called the Son of God. '
  '36':
  - type: text
    content: 'What’s more, your aged aunt, '
  - type: note
    content: The Greek word is “relative.” Many scholars believe Elizabeth was Mary’s maternal aunt.
  - type: text
    content: 'Elizabeth, has also become pregnant with a son. The ‘barren one’ is now in her sixth month. '
  '37':
  - type: text
    content: Not one promise from God is empty of power. Nothing is impossible with God!”
  - type: note
    content: 'This verse can be translated in two different ways: “There is nothing impossible with God” or “The word of God will never fail.” This translation has chosen to include both for this verse.'
  '38':
  - type: text
    content: Then Mary responded, saying, “
  - type: text
    content: Yes!
  - type: text
    content: ' I will be a mother for the Lord! '
  - type: note
    content: As translated from the Aramaic text.
  - type: text
    content: As his servant, I accept whatever he has for me. May everything you have told me come to pass.” And the angel left her.
  - type: heading
    content: Elizabeth’s Prophecy to Mary
  '39':
  - type: text
    content: 'Afterward, Mary arose and hurried off to the hill country of Judea, to the village where Zechariah and Elizabeth lived. '
  '40':
  - type: text
    content: 'Arriving at their home, Mary entered the house and greeted Elizabeth. '
  '41':
  - type: text
    content: 'At the moment her aunt heard Mary’s voice, the baby '
  - type: note
    content: The Bible calls Elizabeth’s yet-to-be-born son, John, a “baby.”
  - type: text
    content: 'within Elizabeth’s womb jumped and kicked. And suddenly, Elizabeth was filled to overflowing with the Holy Spirit! '
  '42':
  - type: text
    content: 'With a loud voice she '
  - type: text
    content: prophesied with power
  - type: text
    content: ':'
  - type: text
    content: “Mary! You are a woman given the highest favor
  - type: text
    content: and privilege above all others,
  - type: text
    content: 'for your child '
  - type: note
    content: Or “the fruit of your womb.” This is the same word used for the “fruit” of the tree of life in Rev. 22:2. Jesus is “fruit” for us to take in as our life supply.
  - type: text
    content: is destined to bring God great delight.
  '43':
  - type: text
    content: How did I deserve such a remarkable honor
  - type: text
    content: 'to have the mother of my Lord '
  - type: note
    content: An obvious prophetic revelation was given to Elizabeth from the Holy Spirit about what had happened with Mary.
  - type: text
    content: come and visit me?
  '44':
  - type: text
    content: The moment you came in the door and greeted me,
  - type: text
    content: my baby danced inside me with joy!
  '45':
  - type: text
    content: Great favor rests upon you, for you have believed
  - type: text
    content: every word spoken to you from the Lord.”
  - type: heading
    content: Mary’s Prophetic Song
  '46':
  - type: text
    content: 'And Mary sang this song:'
  - type: text
    content: “My soul is ecstatic, overflowing with praises to God!
  '47':
  - type: text
    content: My spirit bursts with joy over my life-giving God!
  - type: note
    content: Or “Savior.” The first recorded person to call Jesus Savior was his mother, Mary. She rejoices in God not simply as her Creator, but as Life Giver and Savior.
  '48':
  - type: text
    content: For he set his tender gaze upon me, his lowly servant girl.
  - type: note
    content: The Aramaic text is “He set his gaze upon the willingness of his mother.”
  - type: text
    content: And from here on, everyone will know
  - type: text
    content: that I have been favored and blessed.
  '49':
  - type: text
    content: The Mighty One has worked a mighty miracle for me;
  - type: text
    content: holy is his name!
  '5':
  - type: text
    content: 'During the reign of King Herod the Great of Judea, '
  - type: note
    content: Herod the Great ruled in Israel under the Emperor of Rome, the first of a succession of Herodian “kings.”
  - type: text
    content: 'there was a Jewish priest named Zechariah '
  - type: note
    content: Zechariah means “God has remembered.” Elizabeth means “oath” or “covenant of God.” The gospel of Luke opens and closes with the story of a priest. It begins with Zechariah, the fallible human priest after the order of Aaron, and ends with our perfect High Priest after the order of Melchizedek, Jesus Christ.
  - type: text
    content: 'who served in the temple as part of the priestly order of Abijah. '
  - type: note
    content: King David organized the priests into twenty-four divisions, and Abijah was the head of one of the priestly families. See Neh. 12:12, 17; 1 Chron. 24:6–10.
  - type: text
    content: 'His wife, Elizabeth, was also from a family of priests, and was a descendant of Aaron. '
  '50':
  - type: text
    content: Mercy kisses all who fear him,
  - type: text
    content: from one generation to the next.
  - type: note
    content: Mary is quoting Pss. 103:17 and 111:9.
  '51':
  - type: text
    content: Mighty power flows from him
  - type: text
    content: to scatter all those who walk in pride.
  '52':
  - type: text
    content: Powerful princes he tears from their thrones
  - type: text
    content: 'and he lifts up the lowly '
  - type: text
    content: to take their place
  - type: text
    content: .
  '53':
  - type: text
    content: Those who hunger for him will always be filled,
  - type: note
    content: Mary is quoting Ps. 107:9.
  - type: text
    content: but the smug and self-satisfied he will send away empty.
  '54':
  - type: text
    content: Because he can never forget to show mercy,
  - type: text
    content: he has helped his chosen servant, Israel,
  '55':
  - type: text
    content: keeping his promises to Abraham
  - type: note
    content: Mary understood by revelation that the Christ child would fulfill the promises of mercy that God gave to Abraham. See Gen. 22:16–18.
  - type: text
    content: and to his descendants forever.”
  '56':
  - type: text
    content: Before going home, Mary stayed with Elizabeth for about three months.
  - type: note
    content: The cultural practice of the Hebrews was for the mother to do nothing but rest during the first three months of pregnancy.
  - type: heading
    content: The Birth of the Prophet John
  '57':
  - type: text
    content: 'When Elizabeth’s pregnancy was full term, she gave birth to a son. '
  '58':
  - type: text
    content: All her family, friends, and neighbors heard about it, and they too were overjoyed, for they realized that the Lord had showered his wonderful mercy upon her.
  '59':
  - type: text
    content: 'When the baby was eight days old, according to their custom, all the family and friends came together for the circumcision ceremony. '
  - type: note
    content: This ceremony was an important time of celebration in Jewish culture, for another child was born under the covenant of God with Israel. See Gen. 17:4–14; Lev. 12:1–3.
  - type: text
    content: 'Everyone assumed that the parents would name the baby Zechariah, after his father, '
  '6':
  - type: text
    content: 'They were both righteous before God, living virtuously and following the commandments of the Lord blamelessly. '
  '60':
  - type: text
    content: but Elizabeth spoke up and said, “No, his name is John!”
  '61':
  - type: text
    content: “What?” they exclaimed. “No one in your family line has that name!”
  '62':
  - type: text
    content: 'So they gestured to the baby’s father to ask what to name the child. '
  '63':
  - type: text
    content: He motioned for a writing tablet, and to the amazement of all, he wrote, “His name is John.”
  - type: note
    content: The name John means “God’s gift” or “God is gracious.”
  '64':
  - type: text
    content: Instantly Zechariah could speak again. And his first words were praises to the Lord.
  '65':
  - type: text
    content: 'The fear of God fell on the people of their village, and the news of this astounding event traveled throughout the hill country of Judea. Everyone was in awe over it! '
  '66':
  - type: text
    content: All who heard this news were astonished and wondered, “
  - type: text
    content: Since a miracle brought his birth
  - type: text
    content: ', what on earth will this child become? Clearly, God’s presence is upon this child in a powerful way!”'
  - type: heading
    content: Zechariah’s Prophecy
  '67':
  - type: text
    content: 'Then Zechariah was filled to overflowing with the Holy Spirit and he prophesied, saying:'
  '68':
  - type: text
    content: “Praise be to the exalted Lord God of Israel,
  - type: text
    content: for he has seen us through eyes of grace,
  - type: text
    content: and he comes as our Hero-God to set us free!
  '69':
  - type: text
    content: He appears to us as a mighty Savior,
  - type: text
    content: 'a trumpet of redemption '
  - type: note
    content: Literal translation of the Aramaic. The Hebrew is “a horn of salvation,” which signifies strength and fighting power.
  - type: text
    content: from the house of David, his servant,
  '7':
  - type: text
    content: But they were childless since Elizabeth was barren, and now they both were quite old.
  '70':
  - type: text
    content: just as he promised long ago
  - type: text
    content: by the words of his holy prophets.
  '71':
  - type: text
    content: They prophesied he would come one day and save us
  - type: text
    content: from every one of our enemies
  - type: text
    content: and from the power of those who hate us.
  - type: note
    content: Zechariah is quoting from Ps. 106:10.
  '72':
  - type: text
    content: Now he has shown us the mercy promised to our ancestors,
  - type: text
    content: for he has remembered his holy covenant.
  - type: note
    content: There is amazing Hebrew poetry contained in this passage. The names of John, Zechariah, and Elizabeth are all found in this verse. “He has shown us mercy” or “God’s gracious gift” is found in the name John. “He has remembered” is the name Zechariah. “His holy covenant” is the name Elizabeth.
  '73':
  - type: text
    content: He has rescued us from the power of our enemies,
  - type: text
    content: fulfilling the sacred oath he made with our father Abraham.
  - type: text
    content: 'Now we can boldly worship '
  - type: note
    content: Or “serve.”
  - type: text
    content: God with holy lives,
  - type: text
    content: 'living in purity as priests '
  - type: note
    content: The word translated as “purity” here is a Hebraic homonym for “priesthood.”
  - type: text
    content: in his presence every day!
  '76':
  - type: text
    content: And to you I prophesy, my little son,
  - type: text
    content: you will be known as the prophet of the Most High.
  - type: text
    content: You will be a forerunner,
  - type: text
    content: 'going before the face of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: Literal translation of the Aramaic.
  - type: text
    content: to prepare hearts to embrace his ways.
  - type: note
    content: Zechariah quotes from Mal. 3:1.
  '77':
  - type: text
    content: You will preach to his people the revelation of salvation,
  - type: text
    content: 'the cancellation of all our sins, '
  - type: text
    content: to bring us back to God
  - type: text
    content: .
  '78':
  - type: text
    content: The splendor-light of heaven’s glorious sunrise
  - type: note
    content: Some believe this is a quote from Mal. 4:2. Jesus the Savior is the dawning light of a new day to this dark world. This “sunrise” is the appearing of Jesus, our Dayspring.
  - type: text
    content: is about to break upon us in holy visitation,
  - type: text
    content: all because the merciful heart of our God is so very tender.
  '79':
  - type: text
    content: The word from heaven will come to us
  - type: note
    content: Or “manifestation from heaven” as translated from the Aramaic.
  - type: text
    content: with dazzling light to shine upon those
  - type: text
    content: who live in darkness, near death’s dark shadow.
  - type: note
    content: Zechariah is quoting from Isa. 9:2 and 59:8.
  - type: text
    content: And he will illuminate the path that leads to the way of peace.”
  '8':
  - type: text
    content: 'One day, Zechariah’s priestly order was on duty and he was serving as priest. He was chosen by the casting of lots (according to the custom of the priesthood) so the honor fell upon Zechariah to enter the Holy Place '
  - type: note
    content: Some have said there were twenty thousand priests in Christ’s time, so that no priest would ever offer incense more than once. This was a once-in-a-lifetime moment for Zechariah. The burning of incense before the Lord was done twice daily, once in the morning and once in the afternoon (Ex. 30:7–8).
  - type: text
    content: 'and burn incense before the Lord. '
  '80':
  - type: text
    content: 'Afterward, their son grew up and was strengthened by the Holy Spirit '
  - type: note
    content: Both of John’s parents were full of the Holy Spirit (vv. 41, 67). John was raised in a Spirit-filled home.
  - type: text
    content: and he grew in his love for God. John chose to live in the lonely wilderness until the day of his public appearance to Israel.
