      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '72':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: Now he has shown us the mercy promised to our ancestors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he has remembered his holy covenant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:72
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is amazing Hebrew poetry contained in this passage. The names of John, Zechariah, and Elizabeth are all found in this verse. “He has shown us mercy” or “God’s gracious gift” is found in the name John. “He has remembered” is the name Zechariah. “His holy covenant” is the name Elizabeth.
      marker-yv: yv-n
  '73':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 73-75
    - type: text
      text: He has rescued us from the power of our enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fulfilling the sacred oath he made with our father Abraham.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Now we can boldly worship '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:73–75
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “serve.”
      marker-yv: yv-n
    - type: text
      text: God with holy lives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'living in purity as priests '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
