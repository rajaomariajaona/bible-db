    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:76
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Zechariah quotes from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mal. 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '77':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '77'
    - type: text
      text: You will preach to his people the revelation of salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the cancellation of all our sins, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to bring us back to God
    - type: text
      text: .
  '78':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '78'
    - type: text
      text: The splendor-light of heaven’s glorious sunrise
    - type: usfm
