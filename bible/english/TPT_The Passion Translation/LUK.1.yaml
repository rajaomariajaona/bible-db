      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word translated as “purity” here is a Hebraic homonym for “priesthood.”
      marker-yv: yv-n
    - type: text
      text: in his presence every day!
  '76':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '76'
    - type: text
      text: And to you I prophesy, my little son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be known as the prophet of the Most High.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be a forerunner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'going before the face of Lord '
    - type: usfm
      marker: nd
