document_id: PSA.66,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Thank You, Lord
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A song of awakening
  - type: note
    content: As translated from the inscription found in the Septuagint.
  - type: text
    content: Everyone everywhere, lift up your joyful shout to God!
  '10':
  - type: text
    content: O Lord, we have passed through your fire;
  - type: text
    content: like precious metal made pure,
  - type: text
    content: you’ve proved us, perfected us, and made us holy.
  '11':
  - type: text
    content: You’ve captured us, ensnared us in your net.
  - type: text
    content: 'Then, like prisoners, you '
  - type: text
    content: placed chains around our necks
  - type: text
    content: .
  - type: note
    content: Or “you attached suffering to our hips.”
  '12':
  - type: text
    content: You’ve allowed our enemies to prevail against us.
  - type: text
    content: We’ve passed through fire and flood,
  - type: text
    content: yet in the end you always bring us out better than we were before,
  - type: text
    content: saturated with your goodness.
  - type: note
    content: Or “you brought us out into a wide-open space [a place of rest].”
  '13':
  - type: text
    content: I come before your presence with my sacrifice.
  - type: text
    content: I’ll give you all that I’ve promised, everything I have.
  '14':
  - type: text
    content: When I was overcome in my anguish,
  - type: text
    content: I promised to give you my sacrifice.
  - type: text
    content: Here it is! All that I said I would offer you is yours.
  '15':
  - type: text
    content: I’ll throw it all—the best I have to bring—into the fire
  - type: text
    content: as the fragrance of my sacrifice ascends unto you.
  - type: note
    content: The literal Hebrew describes the sacrifice as “burnt offerings of fat beasts and the smoke of rams, bulls, and male goats.”
  - type: text
    content: Pause in his presence
  '16':
  - type: text
    content: All you lovers of God who want to please him,
  - type: text
    content: come and listen, and I’ll tell you what he did for me.
  '17':
  - type: text
    content: I cried aloud to him with all my heart, and he answered me!
  - type: text
    content: Now my mouth overflows with the highest praise.
  '18':
  - type: text
    content: Yet if I had closed my eyes to my sin,
  - type: note
    content: Or “If I had cherished iniquity in my heart.”
  - type: text
    content: the Lord God would have closed his ears to my prayer.
  '19':
  - type: text
    content: But praises rise to God,
  - type: text
    content: for he paid attention to my prayer and answered my cry to him!
  '2':
  - type: text
    content: Sing your songs tuned to his glory!
  - type: text
    content: Tell the world how wonderful he is.
  '20':
  - type: text
    content: I will forever praise this God who didn’t close his heart when I prayed
  - type: text
    content: and never said no when I asked him for help.
  - type: text
    content: He never once refused to show me his tender love.
  '3':
  - type: text
    content: For he’s the awe-inspiring God, great and glorious in power!
  - type: text
    content: We’ve never seen anything like him!
  - type: text
    content: Mighty in miracles, you cause your enemies to tremble.
  - type: text
    content: No wonder they all surrender and bow before you!
  '4':
  - type: text
    content: All the earth will bow down to worship;
  - type: text
    content: all the earth will sing your glories forever!
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: Everyone will say, “Come and see the incredible things God has done;
  - type: text
    content: it will take your breath away!
  - type: text
    content: He multiplies miracles for his people!”
  - type: note
    content: The Septuagint reads “His works are more to be feared than the decisions of men.”
  '6':
  - type: text
    content: He made a highway going right through the Red Sea
  - type: text
    content: as the Hebrews passed through on dry ground,
  - type: text
    content: exploding with joyous excitement over the miracles of God.
  '7':
  - type: text
    content: In his great and mighty power he rules forever,
  - type: text
    content: watching over every movement of every nation.
  - type: text
    content: So beware, rebel lands; he knows how to humble you!
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: Praise God, all you peoples.
  - type: text
    content: Praise him everywhere and let everyone know you love him!
  '9':
  - type: text
    content: 'There’s no doubt about it: God holds our lives safely in his hands.'
  - type: text
    content: He’s the one who keeps us faithfully following him.
