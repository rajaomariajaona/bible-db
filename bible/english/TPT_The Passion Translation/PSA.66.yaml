document_id: PSA.66
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Thank You, Lord
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of awakening
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '66'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the inscription found in the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Everyone everywhere, lift up your joyful shout to God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sing your songs tuned to his glory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell the world how wonderful he is.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For he’s the awe-inspiring God, great and glorious in power!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: We’ve never seen anything like him!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mighty in miracles, you cause your enemies to tremble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No wonder they all surrender and bow before you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All the earth will bow down to worship;
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the earth will sing your glories forever!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Everyone will say, “Come and see the incredible things God has done;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will take your breath away!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He multiplies miracles for his people!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 66:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint reads “His works are more to be feared than the decisions of men.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He made a highway going right through the Red Sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: as the Hebrews passed through on dry ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: exploding with joyous excitement over the miracles of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In his great and mighty power he rules forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: watching over every movement of every nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So beware, rebel lands; he knows how to humble you!
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Praise God, all you peoples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise him everywhere and let everyone know you love him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'There’s no doubt about it: God holds our lives safely in his hands.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’s the one who keeps us faithfully following him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: O Lord, we have passed through your fire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: like precious metal made pure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ve proved us, perfected us, and made us holy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: You’ve captured us, ensnared us in your net.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Then, like prisoners, you '
  - type: usfm
    marker: it
    children:
    - type: text
      text: placed chains around our necks
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 66:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you attached suffering to our hips.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You’ve allowed our enemies to prevail against us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’ve passed through fire and flood,
- type: usfm
  marker: q1
  children:
  - type: text
    text: yet in the end you always bring us out better than we were before,
- type: usfm
  marker: q1
  children:
  - type: text
    text: saturated with your goodness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 66:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you brought us out into a wide-open space [a place of rest].”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I come before your presence with my sacrifice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll give you all that I’ve promised, everything I have.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When I was overcome in my anguish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I promised to give you my sacrifice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Here it is! All that I said I would offer you is yours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I’ll throw it all—the best I have to bring—into the fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: as the fragrance of my sacrifice ascends unto you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 66:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The literal Hebrew describes the sacrifice as “burnt offerings of fat beasts and the smoke of rams, bulls, and male goats.”
    marker-yv: yv-n
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: All you lovers of God who want to please him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: come and listen, and I’ll tell you what he did for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I cried aloud to him with all my heart, and he answered me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now my mouth overflows with the highest praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Yet if I had closed my eyes to my sin,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 66:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If I had cherished iniquity in my heart.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: the Lord God would have closed his ears to my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But praises rise to God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he paid attention to my prayer and answered my cry to him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: I will forever praise this God who didn’t close his heart when I prayed
- type: usfm
  marker: q1
  children:
  - type: text
    text: and never said no when I asked him for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He never once refused to show me his tender love.
