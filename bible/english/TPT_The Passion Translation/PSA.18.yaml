    - type: usfm
      marker: ft
      children:
      - type: text
        text: This magnificent poem is so important to the Holy Spirit that it appears twice in the Bible. You will also find it in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 22
    - type: usfm
      marker: ft
      children:
      - type: text
