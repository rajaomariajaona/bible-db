document_id: PSA.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: This magnificent poem is so important to the Holy Spirit that it appears twice in the Bible. You will also find it in 2 Sam. 22.I Love You, Lord
  - type: text
    content: 'A song '
  - type: note
    content: There are fifty psalms that are described as “a song” in the inscription, and each one is a power song of victory and breakthrough.
  - type: text
    content: 'to the Pure and Shining One by King David, his servant, composed when the Lord rescued David from all his many enemies, including from the brutality of Saul. '
  - type: note
    content: Or “the paw of Saul.” Saul was like a beast that chased David until his death.
  - type: text
    content: 'He said:'
  - type: text
    content: 'I love you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', and I’m bonded to you,'
  - type: note
    content: David didn’t employ the common Hebrew word for “love,” ‘ahav, but instead used the Hebrew word for “pity” or “mercy.” How could David have mercy for God? The word he used, racham, is the word for a mother who loves and pities her child so much it manifests with a deep love and emotional bond. This concept, although difficult to convey in English, carries the thought of embrace and touch. It could actually be translated “Lord, I want to hug you.” Haven’t you ever felt like that?
  - type: text
    content: my strength!
  '11':
  - type: text
    content: Wrapped in the thick-cloud darkness,
  - type: text
    content: his thunder-tabernacle surrounded him.
  - type: text
    content: He hid himself in mystery-darkness;
  - type: text
    content: the dense rain clouds were his garments.
  '12':
  - type: text
    content: Suddenly the brilliance of his presence broke through
  - type: text
    content: with lightning bolts and hail—
  - type: text
    content: a tempest dropping coals of fire.
  '13':
  - type: text
    content: The Lord thundered; the great God above every god
  - type: text
    content: spoke with his thunder-voice from the sky.
  - type: text
    content: The Most High uttered his voice!
  '14':
  - type: text
    content: He released his lightning-arrows, and routed my foes.
  - type: text
    content: See how they ran and scattered in fear!
  '15':
  - type: text
    content: Then with his mighty roar he laid bare the foundations of the earth,
  - type: text
    content: uncovering the secret source of the sea.
  - type: text
    content: The hidden depths of land and sea were exposed
  - type: text
    content: by the blast of his hot breath.
  '16':
  - type: text
    content: He rescued me from the mighty waters
  - type: text
    content: and drew me to himself!
  '17':
  - type: text
    content: Even though I was helpless in the hands
  - type: text
    content: of my hateful, strong enemy,
  - type: note
    content: Death is our strong enemy. Only through Christ are we delivered from its grip.
  - type: text
    content: you were good to deliver me.
  '18':
  - type: text
    content: 'When I was at my weakest, '
  - type: note
    content: Or “In the day of my calamity.”
  - type: text
    content: my enemies attacked—
  - type: text
    content: but the Lord held on to me.
  '19':
  - type: text
    content: His love broke open the way,
  - type: text
    content: and he brought me into a beautiful, broad place.
  - type: note
    content: This could be the throne room of heaven.
  - type: text
    content: He rescued me—because his delight is in me!
  - type: note
    content: Here in verses 16–19 you can see the glorious resurrection of Christ as the Father reached down and kissed the Son with life and love. Read it again and think of Christ in the tomb being raised by the Father.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', you’re the bedrock beneath my feet,'
  - type: text
    content: 'my faith-fortress, my '
  - type: text
    content: wonderful
  - type: text
    content: ' deliverer,'
  - type: text
    content: 'my God, my rock of rescue '
  - type: text
    content: where none can reach me
  - type: text
    content: .
  - type: text
    content: You’re the shield around me,
  - type: text
    content: 'the mighty power '
  - type: note
    content: Or “horn” (i.e., horn of my salvation), which comes from a root word meaning “ray of brightness.”
  - type: text
    content: that saves me,
  - type: text
    content: and my high place.
  '20':
  - type: text
    content: He rewarded me for doing what’s right and staying pure.
  '21':
  - type: text
    content: I will follow his commands and
  - type: text
    content: I’ll not sin by ceasing to follow him, no matter what.
  '22':
  - type: text
    content: For I’ve kept my eyes focused on his righteous words,
  - type: text
    content: and I’ve obeyed everything that he’s told me to do.
  '23':
  - type: text
    content: I’ve been blameless before him and followed all his ways,
  - type: text
    content: keeping my heart pure.
  '24':
  - type: text
    content: 'And so '
  - type: text
    content: Yahweh
  - type: text
    content: ' has rewarded me according to my righteousness,'
  - type: text
    content: because I kept my heart clean before his eyes.
  '25':
  - type: text
    content: Good people will taste your goodness
  - type: text
    content: .
  - type: text
    content: And to those who are loyal to you,
  - type: text
    content: you love to prove that you are loyal and true.
  '26':
  - type: text
    content: And for those who are purified, they find you always pure.
  - type: text
    content: But you’ll outwit the crooked and cunning with your craftiness.
  '27':
  - type: text
    content: To the humble you bring heaven’s deliverance,
  - type: text
    content: but the proud and haughty you disregard.
  '28':
  - type: text
    content: God, all at once you turned on a floodlight for me!
  - type: text
    content: You are the revelation-light in my darkness,
  - type: text
    content: and in your brightness I can see the path ahead.
  '29':
  - type: text
    content: With you as my strength I can crush an enemy horde,
  - type: text
    content: advancing through every stronghold that stands in front of me.
  - type: note
    content: Or “by my God I can jump over a wall.”
  '3':
  - type: text
    content: All I need to do is to call on you,
  - type: text
    content: Yahweh
  - type: text
    content: ', the praiseworthy God.'
  - type: text
    content: When I do, I’m safe and sound in you—
  - type: text
    content: delivered from my foes!
  '30':
  - type: text
    content: Yahweh
  - type: text
    content: ', what a perfect God you are!'
  - type: text
    content: 'All '
  - type: text
    content: Yahweh
  - type: text
    content: ’s promises have proven true.
  - type: text
    content: What a secure shelter for all those
  - type: text
    content: who turn to hide themselves in you,
  - type: text
    content: the wraparound God.
  - type: note
    content: The Hebrew word used here (often translated “shield”) means “to wrap around in protection.” God himself is our shield of grace.
  '31':
  - type: text
    content: 'Could there be any other god like '
  - type: text
    content: Yahweh
  - type: text
    content: '?'
  - type: text
    content: 'For there is not a more secure foundation '
  - type: note
    content: Or “rocky cliff.”
  - type: text
    content: than you.
  '32':
  - type: text
    content: God, you have wrapped me in power
  - type: text
    content: and made my way perfect.
  '33':
  - type: text
    content: Through you I ascend to the highest peaks
  - type: text
    content: to stand strong and secure in you.
  - type: note
    content: Or “You make my legs like a deer to stand firm on the heights.”
  '34':
  - type: text
    content: You’ve trained me with the weapons of warfare-worship;
  - type: text
    content: my arms can bend a bow of bronze.
  '35':
  - type: text
    content: You empower me for victory with your wraparound presence.
  - type: text
    content: Your power within makes me strong to subdue.
  - type: text
    content: By stooping down in gentleness,
  - type: text
    content: you made me great!
  '36':
  - type: text
    content: You’ve set me free, and now I’m standing complete,
  - type: text
    content: ready to fight some more
  - type: text
    content: '!'
  '37':
  - type: text
    content: I caught up with my enemies and conquered them
  - type: text
    content: and didn’t turn back until the war was won!
  '38':
  - type: text
    content: I smashed them to pieces and
  - type: text
    content: I finished them once and for all; they’re as good as dead.
  '39':
  - type: text
    content: You’ve placed your armor upon me
  - type: text
    content: and made my enemies bow low at my feet.
  '4':
  - type: text
    content: For when the cords of death wrapped around me
  - type: text
    content: and torrents of destruction overwhelmed me,
  - type: note
    content: Or “waves of Sheol [death] engulfed me.” See 2 Sam. 22:5.
  - type: text
    content: taking me to death’s door,
  '40':
  - type: text
    content: You’ve made them all turn tail and run,
  - type: text
    content: for through you I’ve destroyed them all!
  '41':
  - type: text
    content: They shouted for help, but no one dared to rescue them.
  - type: text
    content: 'They cried out to '
  - type: text
    content: Yahweh
  - type: text
    content: ', but he refused to answer them.'
  '42':
  - type: text
    content: So I pulverized them to powder and cast them to the wind.
  - type: text
    content: I swept them away like dirt on the floor.
  '43':
  - type: text
    content: You gave me victory on every side,
  - type: text
    content: for you make me a leader of nations.
  - type: text
    content: Even those I’ve never heard of come and bow at my feet.
  '44':
  - type: text
    content: As soon as they heard of me they submitted to me.
  - type: text
    content: Even the rebel foreigners obey my every word.
  '45':
  - type: text
    content: Their rebellion fades away as they come near;
  - type: text
    content: trembling in their strongholds,
  - type: text
    content: they come crawling out of their hideouts,
  - type: text
    content: cringing in fear before me.
  '46':
  - type: text
    content: Yahweh
  - type: text
    content: ' lives!'
  - type: text
    content: Praise is lifted high to the unshakable God!
  - type: text
    content: Towering over all, my Savior-God is worthy to be praised!
  '47':
  - type: text
    content: Look how he pays back harm to all who harm me,
  - type: text
    content: subduing all who come against me.
  '48':
  - type: text
    content: He rescues me from my enemies;
  - type: text
    content: he lifts me up high and keeps me out of reach,
  - type: text
    content: far from the grasp of my violent foe.
  '49':
  - type: text
    content: 'So I thank you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', with my praises!'
  - type: text
    content: I will sing my song to the highest God,
  - type: text
    content: so all among the nations will hear me.
  - type: note
    content: Paul quoted this verse as one of four prophecies to show that Christ came for all people, not just the Jews. See Rom. 15:9.
  '50':
  - type: text
    content: You have given me, your king, great victories.
  - type: text
    content: You’ve always been tender and kind to me, your anointed one,
  - type: text
    content: your loving servant, David, and to all my descendants!
  '6':
  - type: text
    content: in my distress I cried out to you, the delivering God,
  - type: text
    content: and from your temple-throne you heard my troubled cry,
  - type: text
    content: and my sobs went right into your heart.
  - type: note
    content: This scene is not only a poetic portrayal of how God answered David’s prayer, but also a picture of the sufferings of a greater Son of David, Jesus, who hung on the cross with cries of agony. God heard him and shook the planet as thick clouds covered the sun.
  '7':
  - type: text
    content: The earth itself shivered and shook.
  - type: text
    content: It reeled and rocked before him.
  - type: text
    content: As the mountains trembled, they melted away,
  - type: text
    content: for his anger was kindled on my behalf!
  '8':
  - type: text
    content: Fierce flames leapt from his mouth,
  - type: note
    content: Or “nostrils.”
  - type: text
    content: erupting with blazing, burning coals as smoke
  - type: text
    content: and fire encircled him.
  '9':
  - type: text
    content: He stretched heaven’s curtain open and came to my defense.
  - type: text
    content: Swiftly he rode to earth as the stormy sky was lowered.
  - type: text
    content: He rode a chariot of thunderclouds amidst thick darkness;
  - type: text
    content: his steed was a cherub,
  - type: text
    content: soaring on outstretched wings of Spirit-Wind.
