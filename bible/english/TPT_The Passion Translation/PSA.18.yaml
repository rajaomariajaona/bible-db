    marker-yv: yv-n
  - type: text
    text: I Love You, Lord
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A song '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There are fifty psalms that are described as “a song” in the inscription, and each one is a power song of victory and breakthrough.
    marker-yv: yv-n
  - type: text
    text: 'to the Pure and Shining One by King David, his servant, composed when the Lord rescued David from all his many enemies, including from the brutality of Saul. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the paw of Saul.” Saul was like a beast that chased David until his death.
    marker-yv: yv-n
  - type: text
    text: 'He said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I love you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', and I’m bonded to you,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: David didn’t employ the common Hebrew word for “love,”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘ahav
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', but instead used the Hebrew word for “pity” or “mercy.” How could David have mercy for God? The word he used,'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: racham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', is the word for a mother who loves and pities her child so much it manifests with a deep love and emotional bond. This concept, although difficult to convey in English, carries the thought of embrace and touch. It could actually be translated “Lord, I want to hug you.” Haven’t you ever felt like that?'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: my strength!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you’re the bedrock beneath my feet,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'my faith-fortress, my '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wonderful
  - type: text
    text: ' deliverer,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'my God, my rock of rescue '
  - type: usfm
    marker: it
    children:
    - type: text
      text: where none can reach me
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’re the shield around me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the mighty power '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “horn” (i.e., horn of my salvation), which comes from a root word meaning “ray of brightness.”
    marker-yv: yv-n
  - type: text
    text: that saves me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my high place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All I need to do is to call on you,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the praiseworthy God.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: When I do, I’m safe and sound in you—
- type: usfm
  marker: q1
  children:
  - type: text
    text: delivered from my foes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: For when the cords of death wrapped around me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and torrents of destruction overwhelmed me,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “waves of Sheol [death] engulfed me.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 22:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: taking me to death’s door,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: in my distress I cried out to you, the delivering God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and from your temple-throne you heard my troubled cry,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my sobs went right into your heart.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This scene is not only a poetic portrayal of how God answered David’s prayer, but also a picture of the sufferings of a greater Son of David, Jesus, who hung on the cross with cries of agony. God heard him and shook the planet as thick clouds covered the sun.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The earth itself shivered and shook.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It reeled and rocked before him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As the mountains trembled, they melted away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for his anger was kindled on my behalf!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fierce flames leapt from his mouth,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “nostrils.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: erupting with blazing, burning coals as smoke
- type: usfm
  marker: q1
  children:
  - type: text
    text: and fire encircled him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: He stretched heaven’s curtain open and came to my defense.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Swiftly he rode to earth as the stormy sky was lowered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rode a chariot of thunderclouds amidst thick darkness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his steed was a cherub,
- type: usfm
  marker: q1
  children:
  - type: text
    text: soaring on outstretched wings of Spirit-Wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Wrapped in the thick-cloud darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: his thunder-tabernacle surrounded him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hid himself in mystery-darkness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the dense rain clouds were his garments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Suddenly the brilliance of his presence broke through
- type: usfm
  marker: q1
  children:
  - type: text
    text: with lightning bolts and hail—
- type: usfm
  marker: q1
  children:
  - type: text
    text: a tempest dropping coals of fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The Lord thundered; the great God above every god
- type: usfm
  marker: q1
  children:
  - type: text
    text: spoke with his thunder-voice from the sky.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Most High uttered his voice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He released his lightning-arrows, and routed my foes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: See how they ran and scattered in fear!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then with his mighty roar he laid bare the foundations of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: uncovering the secret source of the sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The hidden depths of land and sea were exposed
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the blast of his hot breath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He rescued me from the mighty waters
- type: usfm
  marker: q1
  children:
  - type: text
    text: and drew me to himself!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Even though I was helpless in the hands
- type: usfm
  marker: q1
  children:
  - type: text
    text: of my hateful, strong enemy,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Death is our strong enemy. Only through Christ are we delivered from its grip.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: you were good to deliver me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When I was at my weakest, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “In the day of my calamity.”
    marker-yv: yv-n
  - type: text
    text: my enemies attacked—
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the Lord held on to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: His love broke open the way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he brought me into a beautiful, broad place.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This could be the throne room of heaven.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rescued me—because his delight is in me!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Here in verses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16–19
      metadata:
        usfm: PSA.18.16+PSA.18.17+PSA.18.18+PSA.18.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: you can see the glorious resurrection of Christ as the Father reached down and kissed the Son with life and love. Read it again and think of Christ in the tomb being raised by the Father.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He rewarded me for doing what’s right and staying pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will follow his commands and
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll not sin by ceasing to follow him, no matter what.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For I’ve kept my eyes focused on his righteous words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I’ve obeyed everything that he’s told me to do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I’ve been blameless before him and followed all his ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: keeping my heart pure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'And so '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has rewarded me according to my righteousness,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: because I kept my heart clean before his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Good people will taste your goodness
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: And to those who are loyal to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you love to prove that you are loyal and true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: And for those who are purified, they find you always pure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you’ll outwit the crooked and cunning with your craftiness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: To the humble you bring heaven’s deliverance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the proud and haughty you disregard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: God, all at once you turned on a floodlight for me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the revelation-light in my darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and in your brightness I can see the path ahead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: With you as my strength I can crush an enemy horde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: advancing through every stronghold that stands in front of me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “by my God I can jump over a wall.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', what a perfect God you are!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'All '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s promises have proven true.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What a secure shelter for all those
- type: usfm
  marker: q1
  children:
  - type: text
    text: who turn to hide themselves in you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the wraparound God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here (often translated “shield”) means “to wrap around in protection.” God himself is our shield of grace.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Could there be any other god like '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For there is not a more secure foundation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rocky cliff.”
    marker-yv: yv-n
  - type: text
    text: than you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: God, you have wrapped me in power
- type: usfm
  marker: q1
  children:
  - type: text
    text: and made my way perfect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Through you I ascend to the highest peaks
- type: usfm
  marker: q1
  children:
  - type: text
    text: to stand strong and secure in you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You make my legs like a deer to stand firm on the heights.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: You’ve trained me with the weapons of warfare-worship;
- type: usfm
  marker: q1
  children:
  - type: text
    text: my arms can bend a bow of bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: You empower me for victory with your wraparound presence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your power within makes me strong to subdue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By stooping down in gentleness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you made me great!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: You’ve set me free, and now I’m standing complete,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: ready to fight some more
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: I caught up with my enemies and conquered them
- type: usfm
  marker: q1
  children:
  - type: text
    text: and didn’t turn back until the war was won!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: I smashed them to pieces and
- type: usfm
  marker: q1
  children:
  - type: text
    text: I finished them once and for all; they’re as good as dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: You’ve placed your armor upon me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and made my enemies bow low at my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: You’ve made them all turn tail and run,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for through you I’ve destroyed them all!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: They shouted for help, but no one dared to rescue them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'They cried out to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', but he refused to answer them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: So I pulverized them to powder and cast them to the wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I swept them away like dirt on the floor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: You gave me victory on every side,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you make me a leader of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even those I’ve never heard of come and bow at my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: As soon as they heard of me they submitted to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even the rebel foreigners obey my every word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Their rebellion fades away as they come near;
- type: usfm
  marker: q1
  children:
  - type: text
    text: trembling in their strongholds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they come crawling out of their hideouts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cringing in fear before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' lives!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise is lifted high to the unshakable God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Towering over all, my Savior-God is worthy to be praised!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Look how he pays back harm to all who harm me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: subduing all who come against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: He rescues me from my enemies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he lifts me up high and keeps me out of reach,
- type: usfm
  marker: q1
  children:
  - type: text
    text: far from the grasp of my violent foe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'So I thank you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', with my praises!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sing my song to the highest God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so all among the nations will hear me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul quoted this verse as one of four prophecies to show that Christ came for all people, not just the Jews. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 15:9
      metadata:
        usfm: ROM.15.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: You have given me, your king, great victories.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve always been tender and kind to me, your anointed one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your loving servant, David, and to all my descendants!
