      - type: text
        text: were originally one acrostic psalm. Eight Hebrew manuscripts unite them as well as the Aramaic, Septuagint, and the Latin Vulgate.
    marker-yv: yv-n
  - type: text
    text: The Cry of the Oppressed
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lord is Concealed
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, why do you seem so far away when evil is near?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why have you hidden yourself when I need you the most?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “when trouble is near.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The arrogant in their elitist pride persecute the poor and helpless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May you pour out upon them
- type: usfm
  marker: q1
  children:
  - type: text
    text: the very evil they’ve dreamed up against others!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: How they brag and boast of their cravings, exalting the greedy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They congratulate themselves as they despise you—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: these arrogant ones, so smug and secure!
- type: usfm
  marker: q1
  children:
  - type: text
    text: In their delusion the wicked boast, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “God doesn’t care about what we do.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There’s nothing to worry about!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So successful are they in their schemes
- type: usfm
  marker: q1
  children:
  - type: text
    text: and prosperous in all their plans!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your laws are far from them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they scoff at their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They boast that neither God nor men will bring them down.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sneer at all their enemies, saying in their hearts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “We’ll have success in all we do
- type: usfm
  marker: q1
  children:
  - type: text
    text: and never have to face trouble.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their mouths spew out cursing, lies, and threats.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Only trouble and turmoil come from all their plans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: Like beasts lurking in the shadows of the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they crouch silently in ambush, waiting for the innocent to pass by.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pouncing on the poor, they catch them in their snare
- type: usfm
  marker: q1
  children:
  - type: text
    text: to murder their prey in secret
- type: usfm
  marker: q1
  children:
  - type: text
    text: as they plunder their helpless victims.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They crush the lowly as they fall beneath their brutal blows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: watching their victims collapse in defeat!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then they say to themselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“The Lofty One '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Hebrew name for God
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: El
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the “Lofty [Exalted] God.”'
    marker-yv: yv-n
  - type: text
    text: is not watching while we do this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He doesn’t even care! We can get away with it!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lord is Concerned
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now arise, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: -God! Crush them once and for all!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t forget the helpless and oppressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: How dare the wicked think they’ll reject God and escape judgment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They say to themselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “God won’t hold me accountable.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lord, I know you see all that they’re doing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noting their each and every deed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You know the trouble and turmoil they’ve caused.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now punish them thoroughly for all that they’ve done!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The poor and helpless ones trust in you, Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are famous for being the helper of the fatherless.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know you won’t let them down.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Break the power of the wicked and all their strong-arm tactics.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Search them out and destroy them
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the evil things they’ve done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', are King forever and ever!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: All the nations will perish from your land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you have heard the desires of the humble'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: and seen their hopes
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 10:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The tenderhearted, compassionate God is able to hear our unspoken desires. What moves our hearts moves his heart. How kind is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '!'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will hear their cries and encourage their hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The orphans and the oppressed will be terrified no longer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you will bring them justice, and no earth-dweller will trouble them again.
