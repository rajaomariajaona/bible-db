document_id: PSA.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: It is likely that Pss. 9 and 10 were originally one acrostic psalm. Eight Hebrew manuscripts unite them as well as the Aramaic, Septuagint, and the Latin Vulgate.The Cry of the Oppressed
  - type: heading
    content: The Lord is Concealed
  - type: text
    content: Lord, why do you seem so far away when evil is near?
  - type: text
    content: Why have you hidden yourself when I need you the most?
  - type: note
    content: Or “when trouble is near.”
  '10':
  - type: text
    content: They crush the lowly as they fall beneath their brutal blows,
  - type: text
    content: watching their victims collapse in defeat!
  '11':
  - type: text
    content: Then they say to themselves,
  - type: text
    content: '“The Lofty One '
  - type: note
    content: This is the Hebrew name for God El, the “Lofty [Exalted] God.”
  - type: text
    content: is not watching while we do this.
  - type: text
    content: He doesn’t even care! We can get away with it!”
  - type: heading
    content: The Lord is Concerned
  '12':
  - type: text
    content: 'Now arise, '
  - type: text
    content: Yahweh
  - type: text
    content: -God! Crush them once and for all!
  - type: text
    content: Don’t forget the helpless and oppressed.
  '13':
  - type: text
    content: How dare the wicked think they’ll reject God and escape judgment.
  - type: text
    content: They say to themselves,
  - type: text
    content: “God won’t hold me accountable.”
  '14':
  - type: text
    content: Lord, I know you see all that they’re doing,
  - type: text
    content: noting their each and every deed.
  - type: text
    content: You know the trouble and turmoil they’ve caused.
  - type: text
    content: Now punish them thoroughly for all that they’ve done!
  - type: text
    content: The poor and helpless ones trust in you, Lord,
  - type: text
    content: for you are famous for being the helper of the fatherless.
  - type: text
    content: I know you won’t let them down.
  '15':
  - type: text
    content: Break the power of the wicked and all their strong-arm tactics.
  - type: text
    content: Search them out and destroy them
  - type: text
    content: for the evil things they’ve done.
  '16':
  - type: text
    content: 'You, '
  - type: text
    content: Yahweh
  - type: text
    content: ', are King forever and ever!'
  - type: text
    content: All the nations will perish from your land.
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ', you have heard the desires of the humble'
  - type: text
    content: and seen their hopes
  - type: text
    content: .
  - type: note
    content: The tenderhearted, compassionate God is able to hear our unspoken desires. What moves our hearts moves his heart. How kind is Yahweh!
  - type: text
    content: You will hear their cries and encourage their hearts.
  '18':
  - type: text
    content: The orphans and the oppressed will be terrified no longer,
  - type: text
    content: for you will bring them justice, and no earth-dweller will trouble them again.
  '2':
  - type: text
    content: The arrogant in their elitist pride persecute the poor and helpless.
  - type: text
    content: May you pour out upon them
  - type: text
    content: the very evil they’ve dreamed up against others!
  '3':
  - type: text
    content: How they brag and boast of their cravings, exalting the greedy.
  - type: text
    content: They congratulate themselves as they despise you—
  '4':
  - type: text
    content: these arrogant ones, so smug and secure!
  - type: text
    content: In their delusion the wicked boast, saying,
  - type: text
    content: “God doesn’t care about what we do.
  - type: text
    content: There’s nothing to worry about!”
  '5':
  - type: text
    content: So successful are they in their schemes
  - type: text
    content: and prosperous in all their plans!
  - type: text
    content: Your laws are far from them;
  - type: text
    content: they scoff at their enemies.
  '6':
  - type: text
    content: They boast that neither God nor men will bring them down.
  - type: text
    content: They sneer at all their enemies, saying in their hearts,
  - type: text
    content: “We’ll have success in all we do
  - type: text
    content: and never have to face trouble.”
  '7':
  - type: text
    content: Their mouths spew out cursing, lies, and threats.
  - type: text
    content: Only trouble and turmoil come from all their plans.
  '8':
  - type: text
    content: Like beasts lurking in the shadows of the city,
  - type: text
    content: they crouch silently in ambush, waiting for the innocent to pass by.
  - type: text
    content: Pouncing on the poor, they catch them in their snare
  - type: text
    content: to murder their prey in secret
  - type: text
    content: as they plunder their helpless victims.
