document_id: JDG.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Migration of the Tribe of Dan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In those days there was no king in Israel, and the tribe of Dan sought a territory to settle in. They still had no place to call their own among the tribes of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So the Danites sent out from Zorah and from Eshtaol five of their valiant men '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “prosperous men.”
    marker-yv: yv-n
  - type: text
    text: 'to spy out the land, telling them, “Go, explore the land.” When they advanced to the hill country of Ephraim, they got as far as Micah’s house and camped near there. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When they approached Micah’s house, they recognized the voice '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, his dialect. From his accent, they recognized he was from their district in Judah.
    marker-yv: yv-n
  - type: text
    text: of the young Levite, so they went over to him and asked, “Why are you here? Who brought you here? What are you doing in this place?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He replied, “Micah helped me. He hired me, and I’ve become his priest.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then they said to him, “Good! Please pray to God for us and find out if our mission will succeed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The priest replied, “You have nothing to worry about. The eyes of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' are watching over your mission. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ’s eyes [go] before you.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: You will succeed
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the five spies went '
  - type: usfm
    marker: it
    children:
    - type: text
      text: northward
  - type: text
    text: ' and came to Laish. They observed that the people were wealthy and living in security, after the manner of the Sidonians. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Phoenicians.
    marker-yv: yv-n
  - type: text
    text: Their quiet and carefree community lacked nothing. Furthermore, they lived far from the Sidonians and had no dealings with anyone, leaving them defenseless.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When the spies returned to Zorah and Eshtaol from their expedition, they were asked, “What’s your report?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Come on, let’s do this!” they replied. “Listen, we’ve seen the land, and it’s very good. Don’t just sit here '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wasting time
  - type: text
    text: '; let’s go quickly and invade the land to conquer and possess it. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When we arrive, we will encounter an unsuspecting people. The land is wide open and fruitful. God has indeed given it into your hand!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'So six hundred Danites, fully armed for war, set out from Zorah and Eshtaol. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They went up and camped west of Kiriath Jearim in Judah. (To this day that place is called The Camp of Dan.) '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: From there they passed through the hill country of Ephraim until they arrived at the house of Micah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then the five men who had explored the region of Laish remarked to their comrades, “Did you know there’s an ephod somewhere in these houses, and other idols and an idol overlaid with silver? So decide what you’ll do about it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So they stopped there and came to Micah’s house where the young Levite lived, and they greeted him. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'While the six hundred fully armed Danites stationed themselves by the entrance of the gate, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'the five spies proceeded to enter and take the idol overlaid with silver, the ephod, and the other idols. Now the priest was standing with the six hundred fully armed men at the entrance of the gate. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When he saw the men going into Micah’s house to take the idol overlaid with silver, the ephod, and the other idols, the priest said to them, “What are you doing?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They said to him, “Be quiet! Don’t say a word, just come with us and be our priest and a father '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to us all
  - type: text
    text: '. Isn’t it better for you to be a priest representing an entire tribe of Israel rather than the house of only one man?” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The offer pleased the priest and he accepted. He took all the idols and the ephod and joined the Danites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They resumed their journey with their children, their livestock, and their possessions going in front of them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: They did this to defend themselves from an attack from the rear.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'When they had traveled a considerable distance from Micah’s home, Micah and his neighbors gathered and chased the Danites until they caught up with them. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They shouted at the Danites, who turned around and answered Micah, “What’s your problem? Why have you come '
  - type: usfm
    marker: it
    children:
    - type: text
      text: against us
  - type: text
    text: ' with such a company?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He replied, “Why did you take the gods that I made, kidnap my priest, and march off? What’s left for me now? How dare you ask me, ‘What’s my problem?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The Danites retorted, “We don’t want to hear any more of your complaints lest some of our hot-tempered men here attack and kill you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your friends
  - type: text
    text: ', and your household.” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: So the Danites went their way. When Micah realized that he was outnumbered, he turned around and went back home.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Danites Conquer Laish
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The Danites, Micah’s priest, and all that Micah had made, came to Laish, a city of quiet and unsuspecting people. They slaughtered them and burned down their city. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'No one came to their rescue, because Laish was far from Sidon and they had no dealings with Aram. Laish was in the valley that belonged to Beth Rehob. The Danites rebuilt the city and lived in it. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Although the city used to be called Laish, they named the city Dan after their ancestor Dan the Israelite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The Danites erected their own idol '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to worship
  - type: text
    text: '. Jonathan son of Gershom, son of Moses, and his sons served as priests to the tribe of the Danites until the time the nation went into captivity. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Either the captivity of Israel under Tiglath-pileser in 734 BC (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 15:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), or the exile after the fall of Samaria in 722 BC (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 17:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So they enshrined the idol Micah had made, and they made it their own even though the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: proper
  - type: text
    text: ' house of God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the tabernacle Moses had made during their days in the wilderness.
    marker-yv: yv-n
  - type: text
    text: stood at Shiloh.
