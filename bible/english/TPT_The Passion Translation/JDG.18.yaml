document_id: JDG.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Migration of the Tribe of Dan
  - type: text
    content: 'In those days there was no king in Israel, and the tribe of Dan sought a territory to settle in. They still had no place to call their own among the tribes of Israel. '
  '10':
  - type: text
    content: When we arrive, we will encounter an unsuspecting people. The land is wide open and fruitful. God has indeed given it into your hand!”
  '11':
  - type: text
    content: 'So six hundred Danites, fully armed for war, set out from Zorah and Eshtaol. '
  '12':
  - type: text
    content: 'They went up and camped west of Kiriath Jearim in Judah. (To this day that place is called The Camp of Dan.) '
  '13':
  - type: text
    content: From there they passed through the hill country of Ephraim until they arrived at the house of Micah.
  '14':
  - type: text
    content: Then the five men who had explored the region of Laish remarked to their comrades, “Did you know there’s an ephod somewhere in these houses, and other idols and an idol overlaid with silver? So decide what you’ll do about it.”
  '15':
  - type: text
    content: 'So they stopped there and came to Micah’s house where the young Levite lived, and they greeted him. '
  '16':
  - type: text
    content: 'While the six hundred fully armed Danites stationed themselves by the entrance of the gate, '
  '17':
  - type: text
    content: 'the five spies proceeded to enter and take the idol overlaid with silver, the ephod, and the other idols. Now the priest was standing with the six hundred fully armed men at the entrance of the gate. '
  '18':
  - type: text
    content: When he saw the men going into Micah’s house to take the idol overlaid with silver, the ephod, and the other idols, the priest said to them, “What are you doing?”
  '19':
  - type: text
    content: 'They said to him, “Be quiet! Don’t say a word, just come with us and be our priest and a father '
  - type: text
    content: to us all
  - type: text
    content: '. Isn’t it better for you to be a priest representing an entire tribe of Israel rather than the house of only one man?” '
  '2':
  - type: text
    content: 'So the Danites sent out from Zorah and from Eshtaol five of their valiant men '
  - type: note
    content: Or “prosperous men.”
  - type: text
    content: 'to spy out the land, telling them, “Go, explore the land.” When they advanced to the hill country of Ephraim, they got as far as Micah’s house and camped near there. '
  '20':
  - type: text
    content: The offer pleased the priest and he accepted. He took all the idols and the ephod and joined the Danites.
  '21':
  - type: text
    content: 'They resumed their journey with their children, their livestock, and their possessions going in front of them. '
  - type: note
    content: They did this to defend themselves from an attack from the rear.
  '22':
  - type: text
    content: 'When they had traveled a considerable distance from Micah’s home, Micah and his neighbors gathered and chased the Danites until they caught up with them. '
  '23':
  - type: text
    content: 'They shouted at the Danites, who turned around and answered Micah, “What’s your problem? Why have you come '
  - type: text
    content: against us
  - type: text
    content: ' with such a company?”'
  '24':
  - type: text
    content: He replied, “Why did you take the gods that I made, kidnap my priest, and march off? What’s left for me now? How dare you ask me, ‘What’s my problem?’ ”
  '25':
  - type: text
    content: 'The Danites retorted, “We don’t want to hear any more of your complaints lest some of our hot-tempered men here attack and kill you, '
  - type: text
    content: your friends
  - type: text
    content: ', and your household.” '
  '26':
  - type: text
    content: So the Danites went their way. When Micah realized that he was outnumbered, he turned around and went back home.
  - type: heading
    content: The Danites Conquer Laish
  '27':
  - type: text
    content: 'The Danites, Micah’s priest, and all that Micah had made, came to Laish, a city of quiet and unsuspecting people. They slaughtered them and burned down their city. '
  '28':
  - type: text
    content: 'No one came to their rescue, because Laish was far from Sidon and they had no dealings with Aram. Laish was in the valley that belonged to Beth Rehob. The Danites rebuilt the city and lived in it. '
  '29':
  - type: text
    content: Although the city used to be called Laish, they named the city Dan after their ancestor Dan the Israelite.
  '3':
  - type: text
    content: 'When they approached Micah’s house, they recognized the voice '
  - type: note
    content: That is, his dialect. From his accent, they recognized he was from their district in Judah.
  - type: text
    content: of the young Levite, so they went over to him and asked, “Why are you here? Who brought you here? What are you doing in this place?”
  '30':
  - type: text
    content: 'The Danites erected their own idol '
  - type: text
    content: to worship
  - type: text
    content: '. Jonathan son of Gershom, son of Moses, and his sons served as priests to the tribe of the Danites until the time the nation went into captivity. '
  - type: note
    content: Either the captivity of Israel under Tiglath-pileser in 734 BC (see 2 Kings 15:29), or the exile after the fall of Samaria in 722 BC (see 2 Kings 17:6).
  '31':
  - type: text
    content: 'So they enshrined the idol Micah had made, and they made it their own even though the '
  - type: text
    content: proper
  - type: text
    content: ' house of God '
  - type: note
    content: That is, the tabernacle Moses had made during their days in the wilderness.
  - type: text
    content: stood at Shiloh.
  '4':
  - type: text
    content: He replied, “Micah helped me. He hired me, and I’ve become his priest.”
  '5':
  - type: text
    content: Then they said to him, “Good! Please pray to God for us and find out if our mission will succeed.”
  '6':
  - type: text
    content: 'The priest replied, “You have nothing to worry about. The eyes of '
  - type: text
    content: Yahweh
  - type: text
    content: ' are watching over your mission. '
  - type: note
    content: Or “Yahweh’s eyes [go] before you.”
  - type: text
    content: You will succeed
  - type: text
    content: .”
  '7':
  - type: text
    content: 'So the five spies went '
  - type: text
    content: northward
  - type: text
    content: ' and came to Laish. They observed that the people were wealthy and living in security, after the manner of the Sidonians. '
  - type: note
    content: That is, the Phoenicians.
  - type: text
    content: Their quiet and carefree community lacked nothing. Furthermore, they lived far from the Sidonians and had no dealings with anyone, leaving them defenseless.
  '8':
  - type: text
    content: When the spies returned to Zorah and Eshtaol from their expedition, they were asked, “What’s your report?”
  '9':
  - type: text
    content: '“Come on, let’s do this!” they replied. “Listen, we’ve seen the land, and it’s very good. Don’t just sit here '
  - type: text
    content: wasting time
  - type: text
    content: '; let’s go quickly and invade the land to conquer and possess it. '
