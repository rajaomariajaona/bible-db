verses:
  '1':
  - type: heading
    content: Attack by Gog
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 38–39 constitutes panel D1 in the chiastic structure of the book. These chapters deal, first of all, with the allegorical judgment against Gog and Magog—a symbolic judgment against all godless nations. And second, they also contain the promise of renewal and new covenant blessing for Israel. These chapters then serve as a parallel with chs. 14–17 (panel D—specifically, 14:12–17:24), which deal with allegorical judgments against Israel and the foretelling of new covenant blessing. Chapters 38–39 constitute one prophecy against Gog. If interpreted literally, the chapters speak of the confederacy of nations around the Black and Caspian Seas, with Persia (Iran) and North Africa, who will invade Israel after her restoration to the land.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '10':
  - type: text
    content: '“This is what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says '
  - type: text
    content: to Gog
  - type: text
    content: ': ‘On that day, an idea will occur to you, and you will devise a sinister plan. '
  '11':
  - type: text
    content: 'You will say: I am going to attack this undefended country and march on the peaceful people who fear no danger. They are all living in unwalled towns without bars or gates. '
  '12':
  - type: text
    content: 'I will attack those living among their once ruined cities. I will turn my might against these people gathered from the nations, who acquired livestock and goods, who live in the strategic center of the land. '
  - type: note
    content: Or “the center [crossroads] of the world.”
  - type: text
    content: 'I will plunder them and carry off the spoils. '
  '13':
  - type: text
    content: 'The people of Sheba and Dedan, the merchants and all the tycoons '
  - type: note
    content: Or “young lions,” likely a metaphor for wealthy merchant tycoons. The Hebrew word kephir may also yield the meanings “young warriors” or even “villages.”
  - type: text
    content: 'of Tarshish will ask you: Have you come for plunder? Are you massing your troops to seize spoil? Have you come to carry off gold and silver, cattle and goods, and seize unlimited spoil?’'
  '14':
  - type: text
    content: '“Therefore, son of man, prophesy, and say to Gog, ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Sometime in the future, when my people the Israelites are living safe and secure, will you not take notice of it? '
  '15':
  - type: text
    content: 'You will leave your home country in the distant north, you and many nations with you, and with an enormous, mighty army of countless troops on horseback. '
  '16':
  - type: text
    content: You will invade Israel, my people, like a cloud covering the countryside. In the latter days, I will bring you against my land so that the nations will know who I am when, through you, Gog, I display my holiness to them.’ ”
  - type: heading
    content: God Will Punish Gog
  '17':
  - type: text
    content: 'This is what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to Gog: “Are you not the one I spoke about in days gone by through my servants the prophets of Israel? They prophesied for years of your invasion. '
  '18':
  - type: text
    content: 'But I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that on the day when you, Gog, attack the land of Israel, my furious wrath will boil over! '
  '19':
  - type: text
    content: 'For in my passion '
  - type: note
    content: Or “jealousy.”
  - type: text
    content: 'for my people, in the heat of my anger, I have decreed that on that day, there will be a massive earthquake in the land of Israel! '
  '2':
  - type: text
    content: '“Son of man, turn toward Gog, '
  - type: note
    content: We know little about Gog, the ruler of Magog. He is only mentioned here in the Old Testament (the Gog of 1 Chron. 5:4 is a different person) and only once in the New Testament (see Rev. 20:8). Gog means “[flat] mountain.” Various theories have been proposed over the identity of Gog. Some identify him with Gyges, king of Lydia in Asia Minor from 690 to 657 BC. Others view Gog as a symbol for the Babylonian monarch, whose destruction was foretold. Still others presume him to be Alexander the Great. But Gog more likely represents every force of spiritual darkness that opposes God. The traditional view is that a confederation of nations including Russia and Iran and Turkey will invade Israel on horseback sometime during the “tribulation.” See Zech. 12:1–4; 14:1–9; Matt. 24:14–30; Rev. 14:14–20; 19:17–21. Gog would then be the leader of this coalition of invaders. Many forget that the text shows that it is God who brings Gog into the land to destroy him. There is little agreement among scholars that the Gog and Magog of Ezekiel 38–39 are the same Gog and Magog of Rev. 20 that come up against the camp of the saints. However, there is also another “supreme prince” (Ezek. 38:2), known as “the dark ruler [prince] of the earthly realm who fills the atmosphere with his authority, and works diligently in the hearts of those who are disobedient to the truth of God” (Eph. 2:2).
  - type: text
    content: 'of the land of Magog, '
  - type: note
    content: Magog means “land of Gog.” Magog is also the name of the son of Japheth and grandson of Noah. See Gen. 10:2; 1 Chron. 1:5.
  - type: text
    content: 'and prophesy against him. Yes, set your face against Gog, that supreme prince of '
  - type: text
    content: the lands
  - type: text
    content: ' of Meshech and Tubal, '
  - type: note
    content: Meshech and Tubal were countries in Asia Minor (see Isa. 66:19 and fourth and fifth footnotes there; second and third footnotes on Ezek. 27:13).
  - type: text
    content: 'in the land of Magog. '
  '20':
  - type: text
    content: 'The fish in the sea and the birds of heaven, animals large and small, '
  - type: note
    content: Or “wild beasts and creeping things [reptiles].”
  - type: text
    content: 'and all people on earth will be terrified and tremble at my presence. Mountains will tumble, cliffs crumble, and all the walls will collapse. '
  '21':
  - type: text
    content: 'I will bring the sword against you, Gog, in the mountains of Israel, declares Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '. Your troops will turn their swords against one another. '
  '22':
  - type: text
    content: 'I will punish him '
  - type: note
    content: Or “I will enter into judgment against him.”
  - type: text
    content: 'and his hordes and his many allies with plague and bloodshed and pour down torrential rain, hailstones, fire, and brimstone. '
  '23':
  - type: text
    content: 'In this way I will display my greatness and holiness and make myself known before many nations. Then they will acknowledge that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Prophesy: ‘Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you, Gog, supreme prince of Meshech and Tubal: Beware, I am against you! '
  '4':
  - type: text
    content: 'I will insert hooks in your jaws and turn you around. I will drag you and all your army out '
  - type: text
    content: of your land
  - type: text
    content: '—all your horses and horsemen, all perfectly equipped, many warriors armed with shields large and small, and all carrying swords. '
  '5':
  - type: text
    content: Allied armies
  - type: text
    content: ' from Persia, Cush, and Put are with them, all with shield and helmet. '
  '6':
  - type: text
    content: Gomer and all its troops, Beth Togarmah in the distant north and all its troops—
  - type: text
    content: armies of
  - type: text
    content: ' many nations are part of your coalition. '
  '7':
  - type: text
    content: 'Get ready, '
  - type: text
    content: Gog
  - type: text
    content: '! Be well prepared, you and all your armies and those assembled with you, and take command of them.'
  '8':
  - type: text
    content: '“ ‘A long time from now I will gather you together '
  - type: text
    content: to fight
  - type: text
    content: '. In the latter years, you will invade this country that has recovered from war. A land where the people had been brought together from other nations to live on the mountains of Israel. Although the land was deserted for a long time, I led its people out from other nations, and now they all live safe and secure. '
  '9':
  - type: text
    content: You and your vast armies and those allied with you will invade the land like a great storm and advance throughout the country and cover it like a cloud.’
