  '1':
  - type: heading
    content: The End of the Age
  - type: text
    content: '“At that time, '
  - type: note
    content: That is, the time of the king’s invasion of Israel and his ensuing death. This is the “time of the end” (11:40) that is also mentioned by Jesus in Matt. 24:21. Yet we see in this chapter that Michael and heaven itself will fight on behalf of God’s people. Divine intervention is always the hope of the believer in every trouble we face.
  - type: text
    content: 'the great angel-prince, '
  - type: note
    content: Or “great prince.” In Judah (Jude) 9 he is called ho archangelos, “the archangel.”
  - type: text
    content: 'Michael, protector of your people, will take his stand. It will be a time of great distress, the worst trouble '
  - type: text
    content: your
  - type: text
    content: ' nation has ever known. '
  - type: note
    content: See Jer. 30:7; Joel 1:15–18; Zeph. 1:14–18; Mark 13:19.
  - type: text
    content: 'When that time comes, your own people will be spared—all those '
  - type: text
    content: whose names are
  - type: text
    content: ' found written in the Book '
  - type: text
    content: of Life
  - type: text
    content: .
  - type: note
    content: See Ex. 32:32–33; Ps. 69:28; Rev. 3:5.
  '10':
  - type: text
    content: God
  - type: text
    content: ' will purify many people and make them clean and spotless, while the wicked will continue doing what is wicked. This '
  - type: text
    content: revelation
  - type: text
    content: ' will remain a riddle to the wicked, but those who are wise will have '
  - type: text
    content: profound
  - type: text
    content: ' understanding.'
  '11':
  - type: text
    content: “Between the end of the continual burnt offering and the abomination that brings destruction will be 1,290 days.
  - type: note
    content: That is, 3.5 years; 1,290 days is 430 times 3.
  '12':
  - type: text
    content: '“Blessed are those who wait and faithfully endure to the end of the 1,335 days. '
  '13':
  - type: text
    content: As for you, be at peace and rest; and you will rise for your reward at the end of the age.”
  - type: note
    content: The Roman Catholic Bible and the Septuagint include two additional chapters, considered by Protestants to be apocryphal. Daniel 13 is the story of Susanna, who was rescued by Daniel from being killed for adultery. Daniel 14 contains the story of Bel and the dragon.
  '2':
  - type: text
    content: '“Multitudes of those who are sleeping in the Land of Dust '
  - type: note
    content: This expression refers to the world of the dead, the Sheol of the ancients (see Isa. 26:19; Pss. 22:15; 30:9).
  - type: text
    content: 'will awaken, '
  - type: note
    content: That is, they will be resurrected. To raise the dead is as easy to God as waking a sleeping person.
  - type: text
    content: 'some to everlasting life, some to shame and everlasting disgrace. '
  - type: note
    content: This verse is unique in the Old Testament in that virtually every scholar agrees that this is a reference to a resurrection. The doctrine of resurrection from the dead is always traced back to Dan. 12:1–2. See Isa. 26:19.
  '3':
  - type: text
    content: 'Those who are wise will shine radiantly as the sky at midday. And those who turn many to the way of righteousness '
  - type: note
    content: Or “those who have made [people] upright.”
  - type: text
    content: will shine brightly as stars for all eternity.
  '4':
  - type: text
    content: '“And you, Daniel, must guard these words and keep the scroll sealed until the time of the end. '
  - type: note
    content: This is in contrast with Rev. 22:10, where the revelation was not to be sealed but remain accessible to all. Daniel sealed the scroll; John ate the scroll.
  - type: text
    content: Many will go here and there, and knowledge will continue to increase.”
  - type: note
    content: Or “people will learn more and more.”
  - type: heading
    content: The Two Angels by the River
  '5':
  - type: text
    content: 'I, Daniel, then looked and saw two others standing, one on each bank of the river. '
  '6':
  - type: text
    content: 'One of them said to the man dressed in linen who was '
  - type: text
    content: hovering
  - type: text
    content: ' above the river, “How long until these wonders take place?” '
  '7':
  - type: text
    content: 'I heard the man answer who was dressed in linen, '
  - type: text
    content: hovering
  - type: text
    content: ' above the river. He raised his hands to heaven and swore by him who lives forever, “A time, and two times, and half a time. '
  - type: note
    content: If the “time” is equal to a year, then this would be three and a half years.
  - type: text
    content: All this persecution will not end until the opposition of God’s holy people is completely crushed.”
  - type: note
    content: Or “until the hand [power] of the one who crushes the holy people has been exhausted.”
  - type: heading
    content: Angelic Revelation Explained
  '8':
  - type: text
    content: I heard his answer, but it was like a riddle to me. So, I asked him, “Sir, how will all of this transpire?”
  '9':
  - type: text
    content: '“You may go in peace, Daniel,” he replied. “The '
  - type: text
    content: understanding of this
  - type: text
    content: ' message is to remain secret and sealed until the time of the end. '
