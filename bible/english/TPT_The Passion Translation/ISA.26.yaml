  '1':
  - type: heading
    content: Song of Judah’s Triumph
  - type: text
    content: 'A day is coming when this song will be sung in the land of Judah:'
  - type: text
    content: “The city is a stronghold for us!
  - type: text
    content: 'The Lord’s salvation, '
  - type: note
    content: “The Lord’s salvation” is the Hebrew word yĕshuwʿah, almost identical to Yeshua. Jesus is our salvation that saves us and delivers us inside and out.
  - type: text
    content: like inner and outer walls,
  - type: text
    content: makes it secure.
  '10':
  - type: text
    content: But when mercy is shown to scoundrels,
  - type: text
    content: they still aren’t able to learn righteousness.
  - type: text
    content: Even in a land of integrity, they still do wrong,
  - type: text
    content: 'for they ignore the great majesty of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '11':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you lift your mighty hand,'
  - type: text
    content: but they do not see it.
  - type: text
    content: Let them witness how much you love your people
  - type: text
    content: and be ashamed.
  - type: text
    content: Let the fire reserved for your enemies consume them.
  '12':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you will establish peace and prosperity for us,'
  - type: text
    content: for all we have accomplished is the result
  - type: text
    content: of what you work through us.
  '13':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', our God, other lords have ruled over us,'
  - type: text
    content: but we praise your name alone.
  '14':
  - type: text
    content: Their dead don’t come back to life; their ghosts do not rise.
  - type: text
    content: For you have punished and destroyed them,
  - type: text
    content: wiping out even the memory of them.
  '15':
  - type: text
    content: You have made our nation grow!
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', you have made our nation grow;'
  - type: text
    content: you have revealed your glory,
  - type: text
    content: and you have extended all the borders of the land.
  '16':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', in their distress, they reached out to you.'
  - type: text
    content: When you chastened them, they poured out prayer to you.
  '17':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: we were like a pregnant woman going into labor pains—
  - type: text
    content: writhing, screaming, and ready to deliver, all because of you.
  '18':
  - type: text
    content: We were full term.
  - type: text
    content: We pushed and strained, but we gave birth only to wind!
  - type: text
    content: We accomplished nothing
  - type: text
    content: 'and have not brought deliverance '
  - type: note
    content: Or “salvation” or “victory.”
  - type: text
    content: into the world,
  - type: note
    content: See Rom. 8:19–21.
  - type: text
    content: nor its inhabitants new life.
  - type: note
    content: Or “its inhabitants have not fallen out,” an idiom for birthing or bringing to life.
  '19':
  - type: text
    content: But your dead will live again!
  - type: text
    content: Their bodies will rise from the dead!
  - type: text
    content: It’s time to awaken and sing for joy, you dwellers in the dust!
  - type: text
    content: As the glistening, radiant dew refreshes the earth,
  - type: note
    content: See Ps. 110:3.
  - type: text
    content: so the Lord will awaken those dwelling among the dead.
  '2':
  - type: text
    content: Open the gates and let a righteous,
  - type: text
    content: faith-filled people enter in.
  '20':
  - type: text
    content: Go, my people, into your inner chambers
  - type: text
    content: and close the doors behind you.
  - type: text
    content: 'Hide for a little while, until his indignation '
  - type: note
    content: Or “curse.”
  - type: text
    content: is over.
  '21':
  - type: text
    content: 'For the Lord is coming out from his '
  - type: text
    content: heavenly
  - type: text
    content: ' place'
  - type: text
    content: to punish people for their sins.
  - type: text
    content: The earth itself will expose the blood spilled upon it,
  - type: text
    content: and the ground will no longer hide its slain.
  '3':
  - type: text
    content: 'Perfect, absolute peace surrounds '
  - type: note
    content: Or “watches over.”
  - type: text
    content: those
  - type: text
    content: 'whose imaginations '
  - type: note
    content: Or “steadfast minds.” The Hebrew is yêtser. According to the Brown-Driver-Briggs Hebrew Lexicon, the Hebrew word yêtser means “imagination” that forms and frames up. Imagination frames up one’s reality. It is unfortunate that many today have rejected the God-created imagination that each of us possesses. Our imagination must be set apart for God and continually made holy. The imagination, both good and evil, is a frequently addressed concept in the Bible. The Hebrew word yêtser is found nine times in the Old Testament (Gen. 6:5; 8:21; Deut. 31:21; 1 Chron. 28:9; 29:18; Ps. 103:14; Isa. 26:3; 29:16; Hab. 2:18).
  - type: text
    content: are consumed with you;
  - type: text
    content: they confidently trust in you.
  '4':
  - type: text
    content: 'Yes, trust in the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' forever and ever!'
  - type: text
    content: For Yah, the Lord God, is your Rock of Ages!
  - type: note
    content: The concept of God being our Rock speaks of the enduring protection, safety, and security we have in him. We plant our feet on the Rock and find boldness and confidence. Throughout every age and season of our lives, God remains our faithful Rock of all Ages.
  '5':
  - type: text
    content: He knocks down the high and mighty,
  - type: text
    content: and the lofty city he humbles and levels down to the dust,
  '6':
  - type: text
    content: to be trampled down by the feet of the poor and exploited.”
  '7':
  - type: text
    content: The path of the righteous is smooth and level;
  - type: text
    content: God, the Just One, you make a clear path for them.
  '8':
  - type: text
    content: 'Yes, we will follow your ways, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and entwine our hearts with yours,
  - type: note
    content: The Hebrew word qavah (the root word for “rope”) means “to wait” or “to entwine.” Waiting on God means binding and connecting our hearts to who God is and to his promises. The Hebrew concept of waiting on the Lord is never a passive thing but an active one, full of hope and expectation.
  - type: text
    content: for the fame of your name is all that we desire.
  '9':
  - type: text
    content: At night I yearn for you with all my heart;
  - type: text
    content: in the morning my spirit reaches out to you.
  - type: text
    content: When you display your judgments on the earth,
  - type: text
    content: 'people learn '
  - type: text
    content: the ways of
  - type: text
    content: ' righteousness.'
