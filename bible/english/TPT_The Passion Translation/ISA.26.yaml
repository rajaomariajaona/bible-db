  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Song of Judah’s Triumph
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A day is coming when this song will be sung in the land of Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The city is a stronghold for us!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Lord’s salvation, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “The Lord’s salvation” is the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yĕshuwʿah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', almost identical to Yeshua. Jesus is our salvation that saves us and delivers us inside and out.'
      marker-yv: yv-n
    - type: text
      text: like inner and outer walls,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: makes it secure.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: But when mercy is shown to scoundrels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they still aren’t able to learn righteousness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even in a land of integrity, they still do wrong,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they ignore the great majesty of the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you lift your mighty hand,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they do not see it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them witness how much you love your people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and be ashamed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the fire reserved for your enemies consume them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you will establish peace and prosperity for us,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for all we have accomplished is the result
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of what you work through us.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', our God, other lords have ruled over us,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but we praise your name alone.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Their dead don’t come back to life; their ghosts do not rise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have punished and destroyed them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: wiping out even the memory of them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You have made our nation grow!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', you have made our nation grow;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have revealed your glory,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you have extended all the borders of the land.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', in their distress, they reached out to you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you chastened them, they poured out prayer to you.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we were like a pregnant woman going into labor pains—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: writhing, screaming, and ready to deliver, all because of you.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: We were full term.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We pushed and strained, but we gave birth only to wind!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We accomplished nothing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and have not brought deliverance '
