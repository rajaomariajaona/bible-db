document_id: PSA.81,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: For the Feast of Harvest
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: Asaph’s poetic song set to the melody of “For the Feast of Harvest”
  - type: text
    content: Lord, just singing about you makes me strong!
  - type: text
    content: So I’ll keep shouting for joy to Jacob’s God, my champion.
  '10':
  - type: text
    content: I am your only God, the living God.
  - type: text
    content: Wasn’t I the one who broke the strongholds over you
  - type: text
    content: and raised you up out of bondage?
  - type: text
    content: Open your mouth with a mighty decree;
  - type: text
    content: I will fulfill it now, you’ll see!
  - type: text
    content: The words that you speak, so shall it be!
  '11':
  - type: text
    content: But my people still wouldn’t listen;
  - type: text
    content: my princely people would not yield to me.
  '12':
  - type: text
    content: So I lifted my grace from off of their lives, and I surrendered them
  - type: text
    content: to the stubbornness of their hearts.
  - type: text
    content: For they were living according to their own selfish fantasies.
  '13':
  - type: text
    content: O that my people would once and for all listen to me
  - type: text
    content: and walk faithfully in my footsteps, following my ways.
  '14':
  - type: text
    content: Then and only then will I conquer your every foe
  - type: text
    content: and tell every one of them, ‘You must go!’
  '15':
  - type: text
    content: Those who hate my ways will cringe before me
  - type: text
    content: and their punishment will be eternal.
  '16':
  - type: text
    content: But I will feed you with my spiritual bread.
  - type: text
    content: You will feast and be satisfied with me,
  - type: text
    content: feeding on my revelation-truth like honey
  - type: text
    content: dripping from the cliffs of the high place.”
  '2':
  - type: text
    content: Let the celebration begin!
  - type: text
    content: I will sing with drum accompaniment and with the sweet sound
  - type: text
    content: of the harp and guitar strumming.
  '3':
  - type: text
    content: Go ahead! Blow the jubilee trumpet to begin the feast!
  - type: text
    content: Blow it before every joyous celebration and festival.
  - type: note
    content: Or “on the day of the new moon and the day of the full moon.”
  '4':
  - type: text
    content: For God has given us these seasons of joy,
  - type: text
    content: days that the God of Jacob decreed for us to celebrate and rejoice.
  '5':
  - type: text
    content: He has given these feasts to remind us of his triumph over Egypt,
  - type: text
    content: when he went out to wage war against them.
  - type: text
    content: I heard the message in an unknown tongue as he said to me,
  '6':
  - type: text
    content: “I have removed your backbreaking burdens
  - type: text
    content: and have freed your hands from the hard labor and toil.
  - type: note
    content: Or “from holding the baskets,” which alludes to the Hebrews carrying basket loads of burdens for their Egyptian masters.
  '7':
  - type: text
    content: You called out to me in your time of trouble, and I rescued you.
  - type: text
    content: I came down from the realm of the secret place of thunder,
  - type: text
    content: where mysteries hide.
  - type: text
    content: I came down to save you.
  - type: text
    content: I tested your hearts at the place where there was no water to drink,
  - type: text
    content: the place of your bitter argument with me.”
  - type: note
    content: The Hebrew includes the word Meribah, which means “the place of strife and contention.”
  - type: text
    content: Pause in his presence
  '8':
  - type: text
    content: “Listen to me, my dear people.
  - type: text
    content: For I’m warning you, and you’d better listen well!
  - type: text
    content: For I hold something against you.
  '9':
  - type: text
    content: Don’t ever be guilty of worshiping any other god but me.
