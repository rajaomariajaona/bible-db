document_id: PSA.81
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: For the Feast of Harvest
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: Asaph’s poetic song set to the melody of “For the Feast of Harvest”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, just singing about you makes me strong!
- type: usfm
  marker: q1
  children:
  - type: text
    text: So I’ll keep shouting for joy to Jacob’s God, my champion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let the celebration begin!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will sing with drum accompaniment and with the sweet sound
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the harp and guitar strumming.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Go ahead! Blow the jubilee trumpet to begin the feast!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Blow it before every joyous celebration and festival.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 81:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “on the day of the new moon and the day of the full moon.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: For God has given us these seasons of joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: days that the God of Jacob decreed for us to celebrate and rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He has given these feasts to remind us of his triumph over Egypt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: when he went out to wage war against them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I heard the message in an unknown tongue as he said to me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “I have removed your backbreaking burdens
- type: usfm
  marker: q1
  children:
  - type: text
    text: and have freed your hands from the hard labor and toil.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 81:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from holding the baskets,” which alludes to the Hebrews carrying basket loads of burdens for their Egyptian masters.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You called out to me in your time of trouble, and I rescued you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I came down from the realm of the secret place of thunder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where mysteries hide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I came down to save you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I tested your hearts at the place where there was no water to drink,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the place of your bitter argument with me.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 81:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew includes the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Meribah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means “the place of strife and contention.”'
    marker-yv: yv-n
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Listen to me, my dear people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I’m warning you, and you’d better listen well!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For I hold something against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Don’t ever be guilty of worshiping any other god but me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I am your only God, the living God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wasn’t I the one who broke the strongholds over you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and raised you up out of bondage?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Open your mouth with a mighty decree;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will fulfill it now, you’ll see!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The words that you speak, so shall it be!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But my people still wouldn’t listen;
- type: usfm
  marker: q1
  children:
  - type: text
    text: my princely people would not yield to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So I lifted my grace from off of their lives, and I surrendered them
- type: usfm
  marker: q1
  children:
  - type: text
    text: to the stubbornness of their hearts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For they were living according to their own selfish fantasies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: O that my people would once and for all listen to me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and walk faithfully in my footsteps, following my ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then and only then will I conquer your every foe
- type: usfm
  marker: q1
  children:
  - type: text
    text: and tell every one of them, ‘You must go!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Those who hate my ways will cringe before me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their punishment will be eternal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But I will feed you with my spiritual bread.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will feast and be satisfied with me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: feeding on my revelation-truth like honey
- type: usfm
  marker: q1
  children:
  - type: text
    text: dripping from the cliffs of the high place.”
