verses:
  '1':
  - type: heading
    content: God Will Judge the Nations
  - type: text
    content: ' '
  - type: note
    content: Starting with v. 1, this begins ch. 4 of Joel in the Hebrew Bible.
  - type: text
    content: “Behold! In those days,
  - type: text
    content: 'when I restore the fortunes '
  - type: note
    content: Or “when I turn the turning” or “bring back the captives.”
  - type: text
    content: of Judah and Jerusalem,
  '10':
  - type: text
    content: Hammer your plowshares into swords
  - type: text
    content: and your pruning hooks into spears.
  - type: note
    content: This is the reversal of the commands in Isa. 2:4 and Mic. 4:3.
  - type: text
    content: Let the weakling say, “I am a champion!”
  - type: note
    content: Or “I am a mighty warrior!” See Zech. 12:8.
  '11':
  - type: text
    content: 'Hurry '
  - type: note
    content: The Hebrew word is a hapax legomenon, which some have translated as “Gather” or “Rally [to help].”
  - type: text
    content: 'and '
  - type: text
    content: join the battle
  - type: text
    content: ','
  - type: text
    content: all you surrounding nations.
  - type: text
    content: Come and assemble there.
  - type: text
    content: Yahweh
  - type: text
    content: ', send down your champions, your warring '
  - type: text
    content: angels
  - type: text
    content: '!'
  - type: heading
    content: Yahweh’s Valley of Judgment
  '12':
  - type: text
    content: “Let the nations stir themselves up
  - type: text
    content: 'and march to the Valley of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s Judgment.
  - type: note
    content: Or “the Valley of Jehoshaphat.” See v. 2 and the first note there.
  - type: text
    content: There I will sit in judgment
  - type: text
    content: on all the surrounding nations.
  - type: note
    content: Although the nations gather to attack Judah, God’s purpose is to bring them to judgment and destruction.
  '13':
  - type: text
    content: “Swing the sickle,
  - type: text
    content: 'for the harvest is ripe '
  - type: text
    content: for judgment
  - type: text
    content: .
  - type: text
    content: 'Come and tread '
  - type: text
    content: the grapes of wrath
  - type: text
    content: .
  - type: text
    content: The winepress is full
  - type: text
    content: and the vats are overflowing
  - type: note
    content: Or “Go in, tread [the grapes], for the winepress is full. Cause the vats to overflow” (LXX). Both the winepress and the sickle are biblical metaphors for God’s judgment (punishment) of the nations. See Isa. 17:5; 63:1–3; Matt. 13:39; Rev. 14:14–20.
  - type: text
    content: for their wickedness is so great!”
  '14':
  - type: text
    content: 'Multitudes! '
  - type: text
    content: So many
  - type: text
    content: ' multitudes'
  - type: text
    content: in the Valley of Decision!
  - type: text
    content: 'For the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is near'
  - type: text
    content: in the Valley of the Verdict.
  - type: heading
    content: The Day of Yahweh
  '15':
  - type: text
    content: The sun and moon grow dark,
  - type: text
    content: and the stars no longer shine.
  - type: note
    content: See Joel 2:10.
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' roars from Zion,'
  - type: text
    content: and his voice thunders from Jerusalem;
  - type: text
    content: heaven and earth tremble.
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' will be a shelter for his people,'
  - type: text
    content: 'a '
  - type: text
    content: faithful
  - type: text
    content: ' fortress for Israel.'
  - type: heading
    content: The Glorious Future of Israel
  '17':
  - type: text
    content: '“Then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God,'
  - type: text
    content: who dwells in Zion, my holy mountain.
  - type: text
    content: Jerusalem will be a sanctuary,
  - type: text
    content: and foreigners will never conquer it again.
  '18':
  - type: text
    content: A time is coming when the mountains
  - type: text
    content: will drip with new wine
  - type: text
    content: and the hills will flow with milk,
  - type: note
    content: That is, the mountains will be covered with freshly planted vineyards, which will produce grapes for new wine, and the hills will graze many flocks and cattle, which will supply the people with an abundance of milk. See Amos 9:13.
  - type: text
    content: 'and all the '
  - type: text
    content: arid
  - type: text
    content: ' streambeds of Judah'
  - type: text
    content: 'will run with water '
  - type: text
    content: year-round
  - type: text
    content: .
  - type: text
    content: 'A fountain will spring from '
  - type: text
    content: Yahweh
  - type: text
    content: ’s temple
  - type: text
    content: and descend to the valley of acacia trees.
  - type: note
    content: The valley mentioned here is Acacia or Shittim (shittim means “acacia bushes”). This was the location of the last camp Israel made before crossing the Jordan River and entering the promised land (see Josh. 2:1 and second footnote; 3:1). Joel was prophesying an outpouring of water from the Temple Mount that will flow into the Jordan Valley and beyond, watering even the desert (see Ezek. 47:1–12).
  '19':
  - type: text
    content: “Egypt will become a desert
  - type: text
    content: and Edom a desolate wilderness
  - type: text
    content: 'because of the '
  - type: text
    content: atrocious
  - type: text
    content: ' acts of violence'
  - type: text
    content: they committed against the people of Judah,
  - type: text
    content: whose innocent blood they shed in their land.
  '2':
  - type: text
    content: I will gather all the nations together.
  - type: text
    content: 'I will bring them to the Valley of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s Judgment.
  - type: note
    content: Or “the Valley of Jehoshaphat.” Jehoshaphat means “Yahweh judges.” This is the symbolic name for the valley where Yahweh judges the nations. It is also called the “Valley of Decision.” Tradition locates the Valley of Jehoshaphat near Jerusalem, between the temple and the Mount of Olives. It’s known today as the Kidron Valley.
  - type: text
    content: I will take them to court there
  - type: text
    content: for all they have done against Israel—
  - type: text
    content: my people and my inheritance.
  - type: text
    content: I will execute judgment upon them
  - type: text
    content: because they have scattered my people among the nations
  - type: note
    content: This is likely a reference to the deportations of 597 and 586 BC. See Ezek. 21:23–27; Obad. 11–14; Nah. 3:10.
  - type: text
    content: and divided my land among themselves.
  '20':
  - type: text
    content: I will avenge their blood and not spare the guilty,
  - type: text
    content: but Judah will be inhabited forever,
  - type: text
    content: Jerusalem from generation to generation,
  - type: text
    content: 'and '
  - type: text
    content: Yahweh
  - type: text
    content: ' will dwell in Zion.”'
  '3':
  - type: text
    content: They cast lots for my people
  - type: text
    content: and sold them into slavery.
  - type: text
    content: They traded a boy to pay for a prostitute
  - type: text
    content: and trafficked a girl for a drink of wine.
  - type: note
    content: This pathetic situation reveals the cheapening of human life.
  '4':
  - type: text
    content: And what have you done to me, Tyre and Sidon
  - type: text
    content: and all you regions of Philistia?
  - type: note
    content: Tyre, Sidon, and Philistia were neighboring coastal lands of Israel and Judah.
  - type: text
    content: Are you trying to take revenge on me?
  - type: text
    content: If you are, I will swiftly and speedily pay you back
  - type: text
    content: and return your revenge so that it lands squarely on your own heads.
  '5':
  - type: text
    content: For you have stolen my silver and gold
  - type: text
    content: and carried off my valuable treasures into your temples.
  - type: note
    content: Or “for your palaces.” See 1 Sam. 5:2; 31:10.
  '6':
  - type: text
    content: You have sold the people of Judah and Jerusalem to the Greeks
  - type: note
    content: Or “the Ionians,” the ancient name of the Greeks, descendants of Javan (see Gen. 10:2 and the fourth footnote). See also Amos 1:9.
  - type: text
    content: 'to be taken '
  - type: text
    content: as slaves
  - type: text
    content: ' far from their homeland.'
  '7':
  - type: text
    content: Behold! I will rouse them to return
  - type: text
    content: and come back from the places
  - type: text
    content: to which you have sold them.
  - type: text
    content: I will do to you
  - type: text
    content: the very thing that you have done to them.
  '8':
  - type: text
    content: 'Your sons and daughters will be sold '
  - type: text
    content: as slaves
  - type: text
    content: to the sons of Judah,
  - type: text
    content: who in turn will sell them to the Sabaeans,
  - type: note
    content: The Sabaeans were Arab traders from Sheba in southwest Arabia. See 1 Kings 10:1; Job 6:19; Jer. 6:20; Luke 11:31.
  - type: text
    content: who live in a distant land.
  - type: text
    content: I
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken!”'
  - type: heading
    content: A Time for War
  '9':
  - type: text
    content: 'Proclaim this message among the nations:'
  - type: text
    content: “Prepare for war!”
  - type: note
    content: Or “Sanctify war!” There is a time for war (see Eccl. 3:8). God was summoning the nations to their destruction as his judgment for how they had treated his people, Israel.
  - type: text
    content: Awaken the champions!
  - type: text
    content: Let all you soldiers gather, advance, and march.
