      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the chapter of the broken covenant. This begins a section of thirteen chapters (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 11–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) filled with warnings and rebukes. It is possible that Jeremiah gave this sermon before his sermon in the temple starting in ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . However, others date the message Jeremiah gave in this chapter as coming after Hilkiah discovered the book of the law during the reign of King Josiah.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke these words to Jeremiah: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They have turned back to commit again the same sins of their ancestors, who ignored my words. They, too, have chased after foreign gods to serve them. The people of Israel and the people of Judah have broken my covenant that I made with their ancestors.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Therefore, I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say: Behold! I am bringing calamity upon them from which they will not be able to escape. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 29:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 9:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'And they will cry to me, but I will pay no attention. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The cities of Judah and the inhabitants of Jerusalem will go and cry to the gods to whom they burn incense, but those false gods certainly will not be able to save them when calamity comes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The people of Judah worship as many gods as they have cities. They have as many altars to burn incense to that shameful one, Baal, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 21:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 3:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: as they have streets in Jerusalem.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jeremiah
    - type: text
      text: ', do not pray for these people nor cry out nor intercede on their behalf, for when trouble strikes and they cry out to me, I will pay no attention.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '“My dearly beloved ones have done so much evil that they no longer have a right to come into my temple. Can the flesh of their many sacrifices avert their doom? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: When I send calamity
    - type: text
      text: ', they will have nothing to be joyful about. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Scholars are virtually in agreement that the Hebrew text of v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is uncertain and extremely difficult to translate.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', once called you a green olive tree, full of leaves and bearing beautiful fruit. But with the sound of a great roar, I will set fire and consume its branches. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, planted you and have decreed disaster against you because of the evil of the people of Israel and the people of Judah. You have provoked me to anger by burning incense to Baal.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Plot against Jeremiah’s Life
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: I knew about the evil some people were doing;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'it was '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' who revealed it to me.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: I was like a trusting lamb led to the slaughter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I had no idea they were speaking about me when they said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let’s destroy the tree while it’s in full bloom.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A comparable saying in English would be, “Let’s cut him off in his prime.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We’ll kill him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Let’s cut him off from the land of the living.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that no one will remember him anymore.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Hear the terms of this covenant and repeat them to the men of Judah and the people of Jerusalem. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Then I prayed
    - type: text
      text: ', “'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you always judge fairly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and you test '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “test [try]” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: bochen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which can also be translated “watchtower.”'
      marker-yv: yv-n
    - type: text
      text: the most secret thoughts and desires of the heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have placed my cause before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so let me live long enough
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to see you take revenge on them.”
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' responded with a word for the men of Anathoth who wanted to take my life and who said to me, “You must no longer prophesy in the name of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', or we will certainly kill you.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'So '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies, said, “Listen, I will punish them. The young men will die in battle, their sons and their daughters will die by food shortages, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: and none will survive. For I will bring disaster upon the men of Anathoth when I come to punish them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ’s judgment upon those of Jeremiah’s birthplace, Anathoth, was indeed severe. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Preach to them, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, says to you: A curse will rest on whoever disobeys the terms of this covenant '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'that I made with your ancestors when I freed them from the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fiery
    - type: text
      text: ', iron furnace of their suffering in Egypt. Now, listen to my voice and do all that I commanded you, and you will be a '
    - type: usfm
      marker: it
      children:
      - type: text
        text: beloved
    - type: text
      text: ' people to me, and I, I will be your God, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'so that I may keep the promise that I gave to your fathers to give them a beautiful land flowing with milk and honey, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A “land flowing with milk and honey” is a figure of speech for a lush, fertile land that would bring them prosperity.
      marker-yv: yv-n
    - type: text
      text: the land which is yours today.’ ”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I answered him, and said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', amen.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to me: “Preach this message in the cities of Judah and in the streets of Jerusalem: ‘Hear the words of this covenant and do them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'For I warned your fathers repeatedly, when I freed them from the land of Egypt until now, to listen to my voice. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But they refused to listen or change their ways. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bend their ears.”
      marker-yv: yv-n
    - type: text
      text: 'They lived in the stubbornness of their evil hearts, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The stubbornness of the hearts of God’s people was a constant refrain in Jeremiah’s preaching. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
