document_id: JER.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah’s Unfaithfulness to the Covenant
  - type: text
    content: ' '
  - type: note
    content: This is the chapter of the broken covenant. This begins a section of thirteen chapters (chs. 11–23) filled with warnings and rebukes. It is possible that Jeremiah gave this sermon before his sermon in the temple starting in ch. 7. However, others date the message Jeremiah gave in this chapter as coming after Hilkiah discovered the book of the law during the reign of King Josiah.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to Jeremiah: '
  '10':
  - type: text
    content: They have turned back to commit again the same sins of their ancestors, who ignored my words. They, too, have chased after foreign gods to serve them. The people of Israel and the people of Judah have broken my covenant that I made with their ancestors.
  '11':
  - type: text
    content: '“Therefore, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say: Behold! I am bringing calamity upon them from which they will not be able to escape. '
  - type: note
    content: See Prov. 29:1; Jer. 15:2; Amos 9:1–4.
  - type: text
    content: 'And they will cry to me, but I will pay no attention. '
  '12':
  - type: text
    content: 'The cities of Judah and the inhabitants of Jerusalem will go and cry to the gods to whom they burn incense, but those false gods certainly will not be able to save them when calamity comes. '
  '13':
  - type: text
    content: 'The people of Judah worship as many gods as they have cities. They have as many altars to burn incense to that shameful one, Baal, '
  - type: note
    content: See 2 Kings 21:3; Jer. 3:24.
  - type: text
    content: as they have streets in Jerusalem.
  '14':
  - type: text
    content: “
  - type: text
    content: Jeremiah
  - type: text
    content: ', do not pray for these people nor cry out nor intercede on their behalf, for when trouble strikes and they cry out to me, I will pay no attention.'
  '15':
  - type: text
    content: '“My dearly beloved ones have done so much evil that they no longer have a right to come into my temple. Can the flesh of their many sacrifices avert their doom? '
  - type: text
    content: When I send calamity
  - type: text
    content: ', they will have nothing to be joyful about. '
  - type: note
    content: Scholars are virtually in agreement that the Hebrew text of v. 15 is uncertain and extremely difficult to translate.
  '16':
  - type: text
    content: I
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', once called you a green olive tree, full of leaves and bearing beautiful fruit. But with the sound of a great roar, I will set fire and consume its branches. '
  '17':
  - type: text
    content: 'For '
  - type: text
    content: I
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, planted you and have decreed disaster against you because of the evil of the people of Israel and the people of Judah. You have provoked me to anger by burning incense to Baal.”'
  - type: heading
    content: A Plot against Jeremiah’s Life
  '18':
  - type: text
    content: I knew about the evil some people were doing;
  - type: text
    content: 'it was '
  - type: text
    content: Yahweh
  - type: text
    content: ' who revealed it to me.'
  '19':
  - type: text
    content: I was like a trusting lamb led to the slaughter.
  - type: text
    content: I had no idea they were speaking about me when they said,
  - type: text
    content: “Let’s destroy the tree while it’s in full bloom.
  - type: note
    content: A comparable saying in English would be, “Let’s cut him off in his prime.”
  - type: text
    content: We’ll kill him
  - type: note
    content: Or “Let’s cut him off from the land of the living.”
  - type: text
    content: so that no one will remember him anymore.”
  '2':
  - type: text
    content: '“Hear the terms of this covenant and repeat them to the men of Judah and the people of Jerusalem. '
  '20':
  - type: text
    content: Then I prayed
  - type: text
    content: ', “'
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: you always judge fairly,
  - type: text
    content: 'and you test '
  - type: note
    content: The Hebrew word for “test [try]” is bochen, which can also be translated “watchtower.”
  - type: text
    content: the most secret thoughts and desires of the heart.
  - type: text
    content: I have placed my cause before you,
  - type: text
    content: so let me live long enough
  - type: text
    content: to see you take revenge on them.”
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: ' responded with a word for the men of Anathoth who wanted to take my life and who said to me, “You must no longer prophesy in the name of '
  - type: text
    content: Yahweh
  - type: text
    content: ', or we will certainly kill you.”'
  '22':
  - type: text
    content: 'So '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, said, “Listen, I will punish them. The young men will die in battle, their sons and their daughters will die by food shortages, '
  '23':
  - type: text
    content: and none will survive. For I will bring disaster upon the men of Anathoth when I come to punish them.”
  - type: note
    content: Yahweh’s judgment upon those of Jeremiah’s birthplace, Anathoth, was indeed severe. See Mark 6:4.
  '3':
  - type: text
    content: Preach to them, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, says to you: A curse will rest on whoever disobeys the terms of this covenant '
  '4':
  - type: text
    content: 'that I made with your ancestors when I freed them from the '
  - type: text
    content: fiery
  - type: text
    content: ', iron furnace of their suffering in Egypt. Now, listen to my voice and do all that I commanded you, and you will be a '
  - type: text
    content: beloved
  - type: text
    content: ' people to me, and I, I will be your God, '
  '5':
  - type: text
    content: 'so that I may keep the promise that I gave to your fathers to give them a beautiful land flowing with milk and honey, '
  - type: note
    content: A “land flowing with milk and honey” is a figure of speech for a lush, fertile land that would bring them prosperity.
  - type: text
    content: the land which is yours today.’ ”
  - type: text
    content: And I answered him, and said, “
  - type: text
    content: Yes
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', amen.”'
  '6':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: “Preach this message in the cities of Judah and in the streets of Jerusalem: ‘Hear the words of this covenant and do them. '
  '7':
  - type: text
    content: 'For I warned your fathers repeatedly, when I freed them from the land of Egypt until now, to listen to my voice. '
  '8':
  - type: text
    content: 'But they refused to listen or change their ways. '
  - type: note
    content: Or “bend their ears.”
  - type: text
    content: 'They lived in the stubbornness of their evil hearts, '
  - type: note
    content: The stubbornness of the hearts of God’s people was a constant refrain in Jeremiah’s preaching. See 3:17; 7:24, 26; 9:14; 13:10; 16:12; 18:12; 23:17.
  - type: text
    content: so I finally enforced the penalties of disobeying this covenant and its terms which I commanded them to keep.’ ”
  - type: heading
    content: The Broken Covenant
  '9':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me: “The people of Judah and Jerusalem conspire against me. '
