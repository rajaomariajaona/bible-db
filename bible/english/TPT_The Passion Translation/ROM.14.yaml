document_id: ROM.14,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Unity in the Midst of Diversity
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Offer an open hand of fellowship to welcome every true believer, even though their faith may be weak and immature. And refuse to engage in debates with them concerning nothing more than opinions.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Why would you judge your brothers or sisters because of their diet, despising them for what they eat or don’t eat? For we each will have our turn to stand before God’s judgment seat. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “We are all destined to stand before the podium of the Messiah.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Just as it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“As surely as I am the Living God, I tell you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Every knee will bow before me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every tongue will confess the truth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “will fully agree” (or “speak from the same source”).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and glorify me!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 45:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 2:10–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Therefore, each one must answer for himself and give a personal account of his own life before God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Walking in Love
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'So stop being critical and condemning of other believers, but instead determine to never deliberately cause a brother or sister to stumble '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “set before them an obstacle or trap to make them stumble.”
      marker-yv: yv-n
    - type: text
      text: and fall because of your actions.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'I know and am convinced by personal revelation from the Lord Jesus that there is nothing wrong with eating any food. But to the one who considers it to be unclean, it is unacceptable. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'If your brother or sister is offended because you insist on eating what you want, it is no longer love that rules your conduct. Why would you wound someone for whom the Messiah gave his life, just so you can eat what you want? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So don’t give people the opportunity to slander what you know to be good. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Even today in many cultures of the world, there are two things that cause division and spark debates among religious people. The observance of “special days” (fasts, feasts, Sabbaths, days of prayer, etc.) and dietary restrictions (kosher versus non-kosher). Paul addresses both of these cultural issues as examples of things that can divide us. In every culture there are religious traditions that are observed in varying degrees. As believers, our one tradition must be to love and not offend by deliberate actions that demonstrate insensitivity to others. The overarching message Paul brings in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is that we are obligated to walk in love and not put our preferences above love’s calling to honor others. These principles are to be applied in every cultural distinction in the body of Christ.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'For the kingdom of God is not a matter of rules about food and drink, but is in the realm of the Holy Spirit, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The kingdom of God is entered into by the Holy Spirit, and not by observing feasts and ritual meals. We must be born of the Spirit in order to enter into God’s kingdom realm. To have the Holy Spirit is to have the realities of God’s kingdom.
      marker-yv: yv-n
    - type: text
      text: 'filled with righteousness, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Righteousness
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means, both in the context and in the Hebraic mind-set, kindness in our relationships. Paul is speaking of putting others first and expressing goodness in having right relationships with others as well as right living.
      marker-yv: yv-n
    - type: text
      text: 'peace, and joy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Serving the Anointed One by walking in these kingdom realities pleases God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “beautiful to God.”
      marker-yv: yv-n
    - type: text
      text: and earns the respect of others.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So then, make it your top priority to live a life of peace with harmony in your relationships, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 34:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 12:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'eagerly seeking to strengthen and encourage one another. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For example, one believer has no problem with eating all kinds of food, but another with weaker faith will eat only vegetables. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is possible that the one with “weaker faith” refused to eat meat because it was offered to idols or was considered unclean.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Stop ruining the work of God by insisting on your own opinions about food. You can eat anything you want, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “All [food] is [ceremonially] clean [acceptable to eat].”
      marker-yv: yv-n
    - type: text
      text: 'but it is wrong to deliberately cause someone to be offended over what you eat. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Consider it an act of love
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the context of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rom. 14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', and is meant to clarify the motivation to limit our liberties among believers.'
      marker-yv: yv-n
    - type: text
      text: 'to refrain from eating meat or drinking wine or doing anything else that would cause a fellow believer to be offended or tempted to be weakened in his faith. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A few manuscripts do not have the last phrase, or “to be weakened in his faith.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Keep the convictions you have about these matters between yourself and God, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and don’t impose them upon others
    - type: text
      text: '. You’ll be happy when you don’t judge yourself in doing what your conscience approves. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: But the one who has misgivings feels miserable if he eats meat, because he doubts and doesn’t eat in faith. For anything we do that doesn’t spring from faith is, by definition, sinful.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The one who eats freely shouldn’t judge and look down on the one who eats only vegetables. And the vegetarian must not judge and look down on the one who eats everything. Remember, God has welcomed him and taken him as his partner.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Who do you think you are to sit in judgment of someone else’s household servant? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We are all “household servants” in the body of Christ, for we each belong to him. When believers begin to judge other believers over our opinions or preferences, we are taking the role that belongs only to Jesus.
      marker-yv: yv-n
    - type: text
      text: 'His own master is the one to evaluate whether he succeeds or fails. And God’s servants will succeed, for God’s power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Greek manuscripts have “the Lord.”
      marker-yv: yv-n
    - type: text
      text: supports them and enables them to stand.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'In the same way, one person regards a certain day as more sacred than another, and another person regards them all alike. There is nothing wrong with having different personal convictions about such matters. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Each one must be fully convinced in his own mind.” The Aramaic can be translated “Every human being justifies himself through his own perspective.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For the person who observes one day as especially sacred does it to honor the Lord. And the same is true regarding what a person eats. The one who eats everything eats to honor the Lord, because he gives thanks to God, and the one who has a special diet does it to honor the Lord, and he also gives thanks to God.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'No one lives to himself and no one dies to himself. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'While we live, we must live for our Master, and in death we must bring honor to him. So dead or alive we belong to our Master. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic twice uses “our Master” (Lord), while the Greek is “the Lord.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For this very reason the Anointed One died and was brought back to life again, so that he would become the Lord God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ” (Aramaic). The Greek is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kurios
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (“Lord”).
      marker-yv: yv-n
    - type: text
      text: over both the dead and the living.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'That is, he exercises lordship over all believers: those living in faith and those who die in faith.'
      marker-yv: yv-n
