document_id: GAL.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith Brings Freedom
  - type: text
    content: 'What has happened to you foolish Galatians? Who has put you under an evil spell? '
  - type: note
    content: The Greek word used here means “to cast a spell using the evil eye.” Paul uses a pun here in the Greek text. He goes on to say, “Didn’t God open your eyes?”
  - type: text
    content: Did God not open your eyes to see the meaning of Jesus’ crucifixion? Was he not revealed to you as the crucified one?
  - type: note
    content: The great revelation of the cross had been supernaturally given to them; but they were diluting the glorious work of the cross by adding to it the works of religion.
  '10':
  - type: text
    content: 'But if you rely on works of keeping the law '
  - type: text
    content: for salvation
  - type: text
    content: ', you live under the law’s curse. For it is clearly written:'
  - type: text
    content: “Utterly cursed is everyone who fails to practice every detail and requirement that is written in this law!”
  - type: note
    content: See Deut. 27:26.
  '11':
  - type: text
    content: 'It is obvious that no one achieves the righteousness of God by attempting to keep the law, for it is written:'
  - type: text
    content: “The one who is in a right relationship with God will live by faith!”
  - type: note
    content: See Hab. 2:4.
  '12':
  - type: text
    content: 'But keeping the law does not require faith, '
  - type: text
    content: but self-effort
  - type: text
    content: . For the law teaches,
  - type: text
    content: “If you practice the principles of law, you must follow all of them.”
  - type: note
    content: See Lev. 18:5.
  '13':
  - type: text
    content: 'Yet, Christ paid the full price to set us free from the curse of the law. He absorbed the curse completely as he became a curse in our place. For it is written:'
  - type: text
    content: “Everyone who is hung upon a tree is cursed.”
  - type: note
    content: See Deut. 21:23.
  '14':
  - type: text
    content: 'Jesus Christ dissolved the curse from our lives, so that in him all the blessings of Abraham can be poured out upon gentiles. And now through faith we receive the promised Holy Spirit '
  - type: text
    content: who lives in us
  - type: text
    content: .
  - type: heading
    content: The Law versus God’s Promises
  '15':
  - type: text
    content: Beloved friends, let me use an illustration that we can all understand. Technically, when a contract is signed, it can’t be changed after it has been put into effect; it’s too late to alter the agreement.
  - type: note
    content: The most ancient Aramaic manuscript has a different meaning for this verse. It could also be translated, “The covenant of the Son of Man that I reference should never be denigrated or changed in any way by men.”
  '16':
  - type: text
    content: 'Remember the royal proclamation '
  - type: note
    content: As translated literally from the Greek. It can also mean “covenant.”
  - type: text
    content: 'God spoke over Abraham and to Abraham’s child? God said that his promises were made to pass on to Abraham’s “Child,” '
  - type: note
    content: Or “seed.”
  - type: text
    content: 'not children. And who is this “Child?” It’s '
  - type: text
    content: the Son of promise
  - type: text
    content: ', Christ himself!'
  '17':
  - type: text
    content: 'This means that the covenant between God and Abraham was fulfilled in Messiah and cannot be altered. Yet the written law was not even given to Moses until 430 years after God had “signed” his contract with Abraham! The law, then, doesn’t supersede the promise '
  - type: note
    content: The concept of the “promise” is that all we need is faith to believe it. This is the revelation of grace that saves us, for the “promise” is enough.
  - type: text
    content: since the royal proclamation was given before the law.
  - type: note
    content: This last sentence is the implied conclusion of Paul’s logic.
  - type: text
    content: If that were the case, it would have nullified what God said to Abraham. We receive all the promises because of the Promised One—not because we keep the law!
  '19':
  - type: text
    content: 'Why then was the law given at all? It was given alongside the promise to show people their sins. But the law was designed to last only until the coming of the “Seed,” the child who was promised. When God gave the law, he gave it first to angels; they gave it to '
  - type: text
    content: Moses
  - type: text
    content: ', his mediator, who then gave it to the people. '
  '2':
  - type: text
    content: 'So answer me this: Did the Holy Spirit come to you as a reward for keeping '
  - type: text
    content: Jewish laws
  - type: text
    content: '? No, you received him as a gift because you believed in the Messiah. '
  '20':
  - type: text
    content: Now, a mediator does not represent just one party alone, but God fulfilled it all by himself!
  - type: note
    content: Or “but God is one.”
  '21':
  - type: text
    content: 'Since that’s true, should we consider the written law to be contrary to the promise of new life? How absurd! '
  - type: note
    content: The law and the promise (grace) each have a distinct function. The law brings conviction of sin, which unveils grace as the way to salvation. The law moves us, even compels us, to reach for grace. And grace will cause one to soar even higher than the demands of the law.
  - type: text
    content: 'Truly, if there was a law that we could keep which would give us new life, then our salvation would have come by law-keeping. '
  '22':
  - type: text
    content: But the Scriptures make it clear that the whole world is imprisoned by sin! This was so the promise would be given through faith to people who believe in Jesus Christ.
  - type: heading
    content: God’s Sons Inherit the Promises
  '23':
  - type: text
    content: 'So until the revelation of faith for salvation was released, the law was a jailer, holding us as prisoners under lock and key until the “faith,” which was destined to be revealed, '
  - type: text
    content: would set us free
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'The law was our guardian until Christ came so that we would be saved by faith. '
  '25':
  - type: text
    content: 'But now that faith has come '
  - type: note
    content: Or “But now that Faith has come,” a title for the Lord Jesus (Faith).
  - type: text
    content: 'we are no longer under the guardian '
  - type: text
    content: of the law
  - type: text
    content: .
  '26':
  - type: text
    content: 'You have all become true children of God by faith in Jesus Christ! '
  '27':
  - type: text
    content: 'Faith immersed you into Christ, and now you are covered and clothed with his life. '
  '28':
  - type: text
    content: 'And we no longer see each other '
  - type: text
    content: in our former state
  - type: text
    content: '—Jew or non-Jew, rich or poor, '
  - type: note
    content: Or “enslaved or free.”
  - type: text
    content: male or female—because we’re all one through our union with Jesus Christ.
  '29':
  - type: text
    content: 'And if you belong to Christ, then you are now Abraham’s “child” and a true heir of all his blessings because of the promise '
  - type: text
    content: God made to Abraham
  - type: text
    content: '!'
  '3':
  - type: text
    content: Your new life began when the Holy Spirit gave you a new birth. Why then would you so foolishly turn from living in the Spirit by trying to finish by your own works?
  - type: note
    content: As translated from the Aramaic.
  '4':
  - type: text
    content: Have you endured so many trials and persecutions for nothing?
  '5':
  - type: text
    content: 'Let me ask you again: What does the lavish supply of the Holy Spirit in your life and the miracles of God’s tremendous power have to do with you keeping religious laws? The Holy Spirit is poured out upon us through the revelation and power of faith!'
  '6':
  - type: text
    content: 'Abraham, '
  - type: text
    content: our father of faith
  - type: text
    content: ', believed God, and the substance of his faith released God’s righteousness to him. '
  - type: note
    content: See Gen. 15:6.
  '7':
  - type: text
    content: 'So the true children of Abraham have the same faith as their father! '
  '8':
  - type: text
    content: 'And the Scripture prophesied that on the basis of faith God would declare gentiles to be righteous. God announced the good news ahead of time to Abraham:'
  - type: text
    content: “Through your example of faith, all the nations will be blessed!”
  - type: note
    content: See Gen. 12:3; 18:18; 22:18.
  '9':
  - type: text
    content: 'And so the blessing of Abraham’s faith is now our blessing too! '
