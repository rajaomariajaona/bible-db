document_id: GAL.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faith Brings Freedom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'What has happened to you foolish Galatians? Who has put you under an evil spell? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here means “to cast a spell using the evil eye.” Paul uses a pun here in the Greek text. He goes on to say, “Didn’t God
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: open
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: your
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: eyes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ?”
    marker-yv: yv-n
  - type: text
    text: Did God not open your eyes to see the meaning of Jesus’ crucifixion? Was he not revealed to you as the crucified one?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The great revelation of the cross had been supernaturally given to them; but they were diluting the glorious work of the cross by adding to it the works of religion.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So answer me this: Did the Holy Spirit come to you as a reward for keeping '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jewish laws
  - type: text
    text: '? No, you received him as a gift because you believed in the Messiah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Your new life began when the Holy Spirit gave you a new birth. Why then would you so foolishly turn from living in the Spirit by trying to finish by your own works?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Have you endured so many trials and persecutions for nothing?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Let me ask you again: What does the lavish supply of the Holy Spirit in your life and the miracles of God’s tremendous power have to do with you keeping religious laws? The Holy Spirit is poured out upon us through the revelation and power of faith!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abraham, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our father of faith
  - type: text
    text: ', believed God, and the substance of his faith released God’s righteousness to him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:6
      metadata:
        usfm: GEN.15.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So the true children of Abraham have the same faith as their father! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And the Scripture prophesied that on the basis of faith God would declare gentiles to be righteous. God announced the good news ahead of time to Abraham:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Through your example of faith, all the nations will be blessed!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 12:3
      metadata:
        usfm: GEN.12.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 18:18
      metadata:
        usfm: GEN.18.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 22:18
      metadata:
        usfm: GEN.22.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'And so the blessing of Abraham’s faith is now our blessing too! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But if you rely on works of keeping the law '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for salvation
  - type: text
    text: ', you live under the law’s curse. For it is clearly written:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Utterly cursed is everyone who fails to practice every detail and requirement that is written in this law!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 27:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It is obvious that no one achieves the righteousness of God by attempting to keep the law, for it is written:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “The one who is in a right relationship with God will live by faith!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hab. 2:4
      metadata:
        usfm: HAB.2.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But keeping the law does not require faith, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but self-effort
  - type: text
    text: . For the law teaches,
- type: usfm
  marker: mi
  children:
  - type: text
    text: “If you practice the principles of law, you must follow all of them.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Yet, Christ paid the full price to set us free from the curse of the law. He absorbed the curse completely as he became a curse in our place. For it is written:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “Everyone who is hung upon a tree is cursed.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 21:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jesus Christ dissolved the curse from our lives, so that in him all the blessings of Abraham can be poured out upon gentiles. And now through faith we receive the promised Holy Spirit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who lives in us
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Law versus God’s Promises
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Beloved friends, let me use an illustration that we can all understand. Technically, when a contract is signed, it can’t be changed after it has been put into effect; it’s too late to alter the agreement.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The most ancient Aramaic manuscript has a different meaning for this verse. It could also be translated, “The covenant of the Son of Man that I reference should never be denigrated or changed in any way by men.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Remember the royal proclamation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated literally from the Greek. It can also mean “covenant.”
    marker-yv: yv-n
  - type: text
    text: 'God spoke over Abraham and to Abraham’s child? God said that his promises were made to pass on to Abraham’s “Child,” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “seed.”
    marker-yv: yv-n
  - type: text
    text: 'not children. And who is this “Child?” It’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the Son of promise
  - type: text
    text: ', Christ himself!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 17-18
  - type: text
    text: 'This means that the covenant between God and Abraham was fulfilled in Messiah and cannot be altered. Yet the written law was not even given to Moses until 430 years after God had “signed” his contract with Abraham! The law, then, doesn’t supersede the promise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17–18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The concept of the “promise” is that all we need is faith to believe it. This is the revelation of grace that saves us, for the “promise” is enough.
    marker-yv: yv-n
  - type: text
    text: since the royal proclamation was given before the law.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:17–18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This last sentence is the implied conclusion of Paul’s logic.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: If that were the case, it would have nullified what God said to Abraham. We receive all the promises because of the Promised One—not because we keep the law!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Why then was the law given at all? It was given alongside the promise to show people their sins. But the law was designed to last only until the coming of the “Seed,” the child who was promised. When God gave the law, he gave it first to angels; they gave it to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moses
  - type: text
    text: ', his mediator, who then gave it to the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Now, a mediator does not represent just one party alone, but God fulfilled it all by himself!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “but God is one.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Since that’s true, should we consider the written law to be contrary to the promise of new life? How absurd! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The law and the promise (grace) each have a distinct function. The law brings conviction of sin, which unveils grace as the way to salvation. The law moves us, even compels us, to reach for grace. And grace will cause one to soar even higher than the demands of the law.
    marker-yv: yv-n
  - type: text
    text: 'Truly, if there was a law that we could keep which would give us new life, then our salvation would have come by law-keeping. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But the Scriptures make it clear that the whole world is imprisoned by sin! This was so the promise would be given through faith to people who believe in Jesus Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Sons Inherit the Promises
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So until the revelation of faith for salvation was released, the law was a jailer, holding us as prisoners under lock and key until the “faith,” which was destined to be revealed, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: would set us free
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The law was our guardian until Christ came so that we would be saved by faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But now that faith has come '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “But now that Faith has come,” a title for the Lord Jesus (Faith).
    marker-yv: yv-n
  - type: text
    text: 'we are no longer under the guardian '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of the law
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'You have all become true children of God by faith in Jesus Christ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Faith immersed you into Christ, and now you are covered and clothed with his life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'And we no longer see each other '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in our former state
  - type: text
    text: '—Jew or non-Jew, rich or poor, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “enslaved or free.”
    marker-yv: yv-n
  - type: text
    text: male or female—because we’re all one through our union with Jesus Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And if you belong to Christ, then you are now Abraham’s “child” and a true heir of all his blessings because of the promise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: God made to Abraham
  - type: text
    text: '!'
