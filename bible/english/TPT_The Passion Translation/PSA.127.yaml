document_id: PSA.127,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God and His Gifts
  - type: text
    content: A song of the stairway by King Solomon
  - type: text
    content: If God’s grace doesn’t help the builders,
  - type: text
    content: they will labor in vain to build a house.
  - type: text
    content: If God’s mercy doesn’t protect the city,
  - type: text
    content: all the sentries will circle it in vain.
  '2':
  - type: text
    content: It really is senseless to work so hard
  - type: text
    content: from early morning till late at night,
  - type: text
    content: toiling to make a living for fear of not having enough.
  - type: text
    content: God can provide for his devoted lovers even while they sleep!
  '3':
  - type: text
    content: Children are God’s love-gift; they are heaven’s generous reward.
  '4':
  - type: text
    content: Children born to a young couple will one day rise to protect
  - type: text
    content: and provide for their parents.
  - type: note
    content: The Hebrew text refers to children as “arrows in the hands of a warrior.” Our children will be our future protection and provision. So the more the merrier!
  '5':
  - type: text
    content: Happy will be the couple who has many of them!
  - type: text
    content: A household full of children will not bring shame on your name
  - type: text
    content: but victory when you face your enemies,
  - type: text
    content: for your offspring will have influence and honor
  - type: note
    content: The Hebrew includes a reference to “speaking with your enemies at the gate.” This is in the context of children being God’s way of blessing parents in their old age.
  - type: text
    content: to prevail on your behalf!
