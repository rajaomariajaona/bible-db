document_id: PSA.127,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God and His Gifts
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of the stairway by King Solomon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If God’s grace doesn’t help the builders,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will labor in vain to build a house.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If God’s mercy doesn’t protect the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the sentries will circle it in vain.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It really is senseless to work so hard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from early morning till late at night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toiling to make a living for fear of not having enough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God can provide for his devoted lovers even while they sleep!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Children are God’s love-gift; they are heaven’s generous reward.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Children born to a young couple will one day rise to protect
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and provide for their parents.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 127:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text refers to children as “arrows in the hands of a warrior.” Our children will be our future protection and provision. So the more the merrier!
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Happy will be the couple who has many of them!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A household full of children will not bring shame on your name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but victory when you face your enemies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your offspring will have influence and honor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 127:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew includes a reference to “speaking with your enemies at the gate.” This is in the context of children being God’s way of blessing parents in their old age.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to prevail on your behalf!
