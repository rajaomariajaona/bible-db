document_id: ACT.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Jerusalem Council of Apostles
  - type: text
    content: 'While Paul and Barnabas were in Antioch, '
  - type: text
    content: some false teachers
  - type: text
    content: ' came from Judea to trouble the believers. They taught, “Unless you are circumcised, as the law of Moses requires, you cannot be saved.” '
  '10':
  - type: text
    content: 'So why on earth would you now '
  - type: text
    content: limit God’s grace
  - type: text
    content: ' '
  - type: note
    content: The text is “testing [provoking] God”; e.g., by limiting his grace among the gentiles.
  - type: text
    content: 'by placing a yoke of religious duties on the shoulders of the believers that neither we nor our ancestors have been able to bear? '
  '11':
  - type: text
    content: Don’t you believe that we are introduced to eternal life through the grace of our Lord Jesus—the same grace that has brought these people new life?”
  '12':
  - type: text
    content: Everyone became silent and listened carefully as Paul and Barnabas shared with the council at length about the signs and wonders and miracles God had worked through them while ministering to the non-Jewish people.
  '13':
  - type: text
    content: 'When they had finished, Jacob took the floor and said, “Ladies and gentlemen, listen. '
  '14':
  - type: text
    content: 'Peter has explained thoroughly that God has determined to win a people for himself from among the non-Jewish nations. '
  '15':
  - type: text
    content: 'And the prophet’s words are fulfilled:'
  '16':
  - type: text
    content: ‘After these things I will return to you
  - type: text
    content: and raise up the tabernacle of David
  - type: text
    content: that has fallen into ruin.
  - type: text
    content: I will restore and rebuild what David experienced
  '17':
  - type: text
    content: so that all of humanity will be able to encounter the Lord
  - type: text
    content: including the gentiles whom I have called
  - type: text
    content: to be my very own,’ says the Lord.
  '18':
  - type: text
    content: ‘For I have made known my works from eternity!’
  - type: note
    content: As translated from the Aramaic. This prophecy (vv. 16–18) is found in Amos 9:11–12.
  '19':
  - type: text
    content: '“So, in my judgment, we should not add any unnecessary burden upon the non-Jewish converts who are turning to God. '
  '2':
  - type: text
    content: 'This sparked a fierce argument between the false teachers and Paul and Barnabas. So the church appointed a delegation of believers, including Paul and Barnabas, to go to Jerusalem to meet with the apostles and elders of the church and resolve this issue. '
  '20':
  - type: text
    content: 'We will go to them as apostles '
  - type: note
    content: Or “We will be apostles [sent ones] to them.” As translated from the Aramaic. The Greek is “to send a message” (letter).
  - type: text
    content: 'and teach them to be set free from offering sacrifices to idols, sexual immorality, and eating anything strangled or with any blood. '
  - type: note
    content: See Lev. 17:12–16.
  '21':
  - type: text
    content: For many generations these words of Moses have been proclaimed every Sabbath day in the synagogues.”
  - type: heading
    content: The Apostles’ Letter to the Non-Jewish People
  '22':
  - type: text
    content: 'The apostles and elders and the church of Jerusalem chose delegates to go to Antioch in Syria. They chose Judas, called Barsabbas, and Silas, both leaders in the church, to accompany Paul and Barnabas. '
  '23':
  - type: text
    content: 'They sent with them this letter:'
  - type: text
    content: “Greetings from the apostles and pastors, and from your fellow believers—to our non-Jewish brothers and sisters living in Antioch in Syria and the nearby regions.
  - type: note
    content: Or “Cilicia,” which is the southwestern region of coastal Turkey that borders Syria.
  '24':
  - type: text
    content: '“We are aware that some have come to you from the church of Jerusalem. These men were not sent by us, but came with false teachings that have brought confusion and division, telling you to keep the law and be circumcised—things we never commanded them to teach. '
  - type: note
    content: As translated from the Aramaic and implied in the Greek. The Greek does not make explicit the false teaching, but says simply, “They have upset and unsettled you.”
  '25':
  - type: text
    content: 'So after deliberation, we’re sending you our beloved brothers Paul and Barnabas, who have risked their lives '
  - type: note
    content: The Aramaic is “they have devoted their souls.”
  - type: text
    content: for the glory of the name of our Lord Jesus, the Anointed One. They are accompanied by Judas and Silas, whom we have unanimously chosen to send as our representatives to you. They will validate all that we’re wanting to share with you.
  - type: note
    content: Significant changes in the order of the clauses in these three verses have been made for the sake of clarity of the English narrative.
  '28':
  - type: text
    content: '“For it pleases the Holy Spirit and us '
  - type: note
    content: Or “the Holy Spirit and we have determined” (decided).
  - type: text
    content: 'that we not place any unnecessary burden on you, except for the following restrictions: '
  '29':
  - type: text
    content: 'Stay away from anything sacrificed to a pagan idol, from eating what is strangled or with any blood, and from any form of sexual immorality. You will be beautiful believers '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: if you keep your souls from these things, and you will be true and faithful to our Lord Jesus. May God bless you!”
  '3':
  - type: text
    content: So the church sent them on their way.
  - type: text
    content: 'As they passed through Lebanon '
  - type: note
    content: Or “Phoenicia.”
  - type: text
    content: 'and Samaria, they stopped to share with the believers how God was converting many from among the non-Jewish people. '
  - type: note
    content: The Aramaic is “the reconciliation of the gentiles.”
  - type: text
    content: Hearing this report brought great joy to all the churches.
  '30':
  - type: text
    content: 'They sent the four men off for Antioch, and after gathering the regional church together, they delivered the letter. '
  '31':
  - type: text
    content: 'When the people heard the letter read out loud, they were overjoyed and delighted by its encouraging message. '
  '32':
  - type: text
    content: 'Then Judas and Silas, who were both prophets, spoke to them affirming words '
  - type: note
    content: The Aramaic is “an abundant word” or “a rich word.”
  - type: text
    content: that strengthened the believers.
  - type: note
    content: The ministry of the New Testament prophet is to strengthen the church.
  '33':
  - type: text
    content: 'After the four men spent some time there, the church sent them off in peace to return to the apostles in Jerusalem. '
  - type: note
    content: Or “sent them with peace back to those who sent them.”
  '34':
  - type: text
    content: 'However, only Judas departed; '
  - type: note
    content: The most reliable Greek manuscripts do not mention Silas remaining in Antioch. However, many manuscripts include this information, such as the Aramaic, codices D and C, the Harklean Syriac Version of AD 616, the Sahidic Version of the second to third centuries, and the St. Ephraim of Syria version of the fourth century. Regardless, v. 40 indicates that Silas did remain behind. An argument could be made that copyists inserted the data in v. 34 to explain the presence of Silas from v. 40.
  - type: text
    content: Paul, Barnabas, and Silas stayed in Antioch, where they and many others preached and taught the wonderful message of the word of God.
  - type: heading
    content: Paul and Barnabas Disagree
  '36':
  - type: text
    content: After some days, Paul said to Barnabas, “Let’s travel to the regions where we’ve preached the word of God and see how the believers are getting along.”
  '37':
  - type: text
    content: 'Barnabas wished to take Mark (also known as John) along with them, '
  '38':
  - type: text
    content: 'but Paul disagreed. He didn’t think it was proper to take the one who had deserted them in south-central Turkey, '
  - type: note
    content: Or “Pamphylia.”
  - type: text
    content: 'leaving them to do their missionary work without him. '
  '39':
  - type: text
    content: 'It became a heated argument between them, a disagreement so sharp that they parted from each other. Barnabas took Mark and sailed to Cyprus. '
  '4':
  - type: text
    content: 'When they finally arrived in Jerusalem, Paul and Barnabas were welcomed by the church, the apostles, and the elders. They explained to them everything God had done among them. '
  '40':
  - type: text
    content: 'And Paul chose Silas '
  - type: note
    content: The apostle Silas was acknowledged in church history as one of the seventy apostles whom Jesus sent out. See Luke 10:1–11. After his missionary journey with Paul, he remained in Corinth and ministered there until his death.
  - type: text
    content: as his partner.
  - type: text
    content: 'After the believers prayed for them, asking for the Lord’s favor on their ministry, they left '
  '41':
  - type: text
    content: 'for Syria and southeast Turkey. '
  - type: note
    content: Or “Cilicia.”
  - type: text
    content: Every place they went, they left the church stronger and more encouraged than before.
  '5':
  - type: text
    content: 'But some of the believers who were of the religious group called “separated ones” '
  - type: note
    content: Or “Pharisees.” The legalism of the Pharisees continued even among some believers, who were still bound in the expressions of external religion.
  - type: text
    content: 'were insistent, saying, “We must continue the custom of circumcision and require that the people keep '
  - type: note
    content: The Aramaic is “to put a fence around the Torah”; that is, to guard the Torah and keep it as a sacred duty to man. The apostolic council of Acts 15 makes it clear that gentile believers had no obligation to keep that “fence” around the Torah (observing the Mosaic laws).
  - type: text
    content: the law of Moses.”
  '6':
  - type: text
    content: 'So the apostles and elders met privately to discuss the matter further. '
  '7':
  - type: text
    content: 'After a lengthy debate, Peter rose to his feet and said to them, “Brothers, you know how God has chosen me '
  - type: note
    content: The wording of the Aramaic text is different, stating, “God chose the gentiles from the beginning to hear the manifestation of the gospel from my mouth and to believe.”
  - type: text
    content: 'from the beginning to preach the wonderful news of the gospel to the non-Jewish nations. '
  '8':
  - type: text
    content: 'God, who knows the hearts of every person, confirmed this when he gave them the Holy Spirit, just like he has given the Spirit to us. '
  - type: note
    content: This is in reference to the events of Acts 10–11.
  '9':
  - type: text
    content: 'So now, not one thing separates us as Jews and gentiles, for when they believe he makes their hearts pure. '
