document_id: ACT.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jerusalem Council of Apostles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'While Paul and Barnabas were in Antioch, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: some false teachers
  - type: text
    text: ' came from Judea to trouble the believers. They taught, “Unless you are circumcised, as the law of Moses requires, you cannot be saved.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This sparked a fierce argument between the false teachers and Paul and Barnabas. So the church appointed a delegation of believers, including Paul and Barnabas, to go to Jerusalem to meet with the apostles and elders of the church and resolve this issue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So the church sent them on their way.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'As they passed through Lebanon '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Phoenicia.”
    marker-yv: yv-n
  - type: text
    text: 'and Samaria, they stopped to share with the believers how God was converting many from among the non-Jewish people. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “the reconciliation of the gentiles.”
    marker-yv: yv-n
  - type: text
    text: Hearing this report brought great joy to all the churches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When they finally arrived in Jerusalem, Paul and Barnabas were welcomed by the church, the apostles, and the elders. They explained to them everything God had done among them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But some of the believers who were of the religious group called “separated ones” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Pharisees.” The legalism of the Pharisees continued even among some believers, who were still bound in the expressions of external religion.
    marker-yv: yv-n
  - type: text
    text: 'were insistent, saying, “We must continue the custom of circumcision and require that the people keep '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “to put a fence around the Torah”; that is, to guard the Torah and keep it as a sacred duty to man. The apostolic council of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 15
      metadata:
        usfm: ACT.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: makes it clear that gentile believers had no obligation to keep that “fence” around the Torah (observing the Mosaic laws).
    marker-yv: yv-n
  - type: text
    text: the law of Moses.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So the apostles and elders met privately to discuss the matter further. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'After a lengthy debate, Peter rose to his feet and said to them, “Brothers, you know how God has chosen me '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The wording of the Aramaic text is different, stating, “God chose the gentiles from the beginning to hear the manifestation of the gospel from my mouth and to believe.”
    marker-yv: yv-n
  - type: text
    text: 'from the beginning to preach the wonderful news of the gospel to the non-Jewish nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'God, who knows the hearts of every person, confirmed this when he gave them the Holy Spirit, just like he has given the Spirit to us. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is in reference to the events of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Acts 10–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So now, not one thing separates us as Jews and gentiles, for when they believe he makes their hearts pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So why on earth would you now '
  - type: usfm
    marker: it
    children:
    - type: text
      text: limit God’s grace
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The text is “testing [provoking] God”; e.g., by limiting his grace among the gentiles.
    marker-yv: yv-n
  - type: text
    text: 'by placing a yoke of religious duties on the shoulders of the believers that neither we nor our ancestors have been able to bear? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Don’t you believe that we are introduced to eternal life through the grace of our Lord Jesus—the same grace that has brought these people new life?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Everyone became silent and listened carefully as Paul and Barnabas shared with the council at length about the signs and wonders and miracles God had worked through them while ministering to the non-Jewish people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When they had finished, Jacob took the floor and said, “Ladies and gentlemen, listen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Peter has explained thoroughly that God has determined to win a people for himself from among the non-Jewish nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And the prophet’s words are fulfilled:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ‘After these things I will return to you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and raise up the tabernacle of David
- type: usfm
  marker: q1
  children:
  - type: text
    text: that has fallen into ruin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will restore and rebuild what David experienced
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: so that all of humanity will be able to encounter the Lord
- type: usfm
  marker: q1
  children:
  - type: text
    text: including the gentiles whom I have called
- type: usfm
  marker: q1
  children:
  - type: text
    text: to be my very own,’ says the Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ‘For I have made known my works from eternity!’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. This prophecy (vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16–18
      metadata:
        usfm: ACT.15.16+ACT.15.17+ACT.15.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) is found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 9:11–12
      metadata:
        usfm: AMO.9.11+AMO.9.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“So, in my judgment, we should not add any unnecessary burden upon the non-Jewish converts who are turning to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'We will go to them as apostles '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “We will be apostles [sent ones] to them.” As translated from the Aramaic. The Greek is “to send a message” (letter).
    marker-yv: yv-n
  - type: text
    text: 'and teach them to be set free from offering sacrifices to idols, sexual immorality, and eating anything strangled or with any blood. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 17:12–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: For many generations these words of Moses have been proclaimed every Sabbath day in the synagogues.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Apostles’ Letter to the Non-Jewish People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The apostles and elders and the church of Jerusalem chose delegates to go to Antioch in Syria. They chose Judas, called Barsabbas, and Silas, both leaders in the church, to accompany Paul and Barnabas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They sent with them this letter:'
- type: usfm
  marker: pm
  children:
  - type: text
    text: “Greetings from the apostles and pastors, and from your fellow believers—to our non-Jewish brothers and sisters living in Antioch in Syria and the nearby regions.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Cilicia,” which is the southwestern region of coastal Turkey that borders Syria.
    marker-yv: yv-n
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“We are aware that some have come to you from the church of Jerusalem. These men were not sent by us, but came with false teachings that have brought confusion and division, telling you to keep the law and be circumcised—things we never commanded them to teach. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and implied in the Greek. The Greek does not make explicit the false teaching, but says simply, “They have upset and unsettled you.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: 'So after deliberation, we’re sending you our beloved brothers Paul and Barnabas, who have risked their lives '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:25–27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “they have devoted their souls.”
    marker-yv: yv-n
  - type: text
    text: for the glory of the name of our Lord Jesus, the Anointed One. They are accompanied by Judas and Silas, whom we have unanimously chosen to send as our representatives to you. They will validate all that we’re wanting to share with you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:25–27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Significant changes in the order of the clauses in these three verses have been made for the sake of clarity of the English narrative.
    marker-yv: yv-n
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“For it pleases the Holy Spirit and us '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the Holy Spirit and we have determined” (decided).
    marker-yv: yv-n
  - type: text
    text: 'that we not place any unnecessary burden on you, except for the following restrictions: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Stay away from anything sacrificed to a pagan idol, from eating what is strangled or with any blood, and from any form of sexual immorality. You will be beautiful believers '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: if you keep your souls from these things, and you will be true and faithful to our Lord Jesus. May God bless you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They sent the four men off for Antioch, and after gathering the regional church together, they delivered the letter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'When the people heard the letter read out loud, they were overjoyed and delighted by its encouraging message. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Then Judas and Silas, who were both prophets, spoke to them affirming words '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “an abundant word” or “a rich word.”
    marker-yv: yv-n
  - type: text
    text: that strengthened the believers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ministry of the New Testament prophet is to strengthen the church.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'After the four men spent some time there, the church sent them off in peace to return to the apostles in Jerusalem. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sent them with peace back to those who sent them.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 34-35
  - type: text
    text: 'However, only Judas departed; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:34–35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The most reliable Greek manuscripts do not mention Silas remaining in Antioch. However, many manuscripts include this information, such as the Aramaic, codices D and C, the Harklean Syriac Version of AD 616, the Sahidic Version of the second to third centuries, and the St. Ephraim of Syria version of the fourth century. Regardless, v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: ACT.15.40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: indicates that Silas did remain behind. An argument could be made that copyists inserted the data in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: ACT.15.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: to explain the presence of Silas from v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '40'
      metadata:
        usfm: ACT.15.40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Paul, Barnabas, and Silas stayed in Antioch, where they and many others preached and taught the wonderful message of the word of God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul and Barnabas Disagree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: After some days, Paul said to Barnabas, “Let’s travel to the regions where we’ve preached the word of God and see how the believers are getting along.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Barnabas wished to take Mark (also known as John) along with them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'but Paul disagreed. He didn’t think it was proper to take the one who had deserted them in south-central Turkey, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Pamphylia.”
    marker-yv: yv-n
  - type: text
    text: 'leaving them to do their missionary work without him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'It became a heated argument between them, a disagreement so sharp that they parted from each other. Barnabas took Mark and sailed to Cyprus. '
  - type: usfm
    marker: vlbl
    children:
