      - type: text
        text: '5'
      metadata:
        usfm: ROM.13.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Anyone who does evil can expect tribulation and distress—to the Jew first and also to the non-Jew. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But when we do what pleases God, we can expect unfading glory, true honor, and a continual peace—to the Jew first and also to the non-Jew, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: for God sees us all without partiality.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When people who have never been exposed to the laws of Moses commit sin, they will still perish for what they do. And those who are under the law of Moses and fail to obey it are condemned by the law. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For it’s not merely knowing the law '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Every Sabbath day the Mosaic law, the Torah, was read in the Jewish meeting house.
    marker-yv: yv-n
  - type: text
    text: that makes you right with God, but doing all that the law says that will cause God to pronounce you innocent.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “righteous.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . No one keeps the law in every part; this is why Yeshua (Jesus) came to redeem and save us. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 3:20
      metadata:
        usfm: ROM.3.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Judgment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For example, whenever people who don’t possess the law '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Torah” (the first five books of Moses).
    marker-yv: yv-n
  - type: text
    text: 'as their birthright commit sin, it still confirms that a “law” is present in their conscience. For when they instinctively do what the law requires, that becomes a “law” to govern them, even though they don’t have Mosaic law. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'It demonstrates that the requirements of the law are woven into their hearts. They know what is right and wrong, for their conscience validates this “law” in their heart. Their thoughts correct '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “accuse.”
    marker-yv: yv-n
  - type: text
    text: 'them in one instance and commend them in another. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So this judgment will be revealed on the day when God, through Jesus the Messiah, judges the hidden secrets of people’s hearts. And their response to my gospel will be the standard of judgment used in that day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Jewish Religion Will Not Save You
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Now, you claim to be a Jew because you lean upon your trust in the law '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “you take comfort from the law.”
    marker-yv: yv-n
  - type: text
    text: 'and boast in your relationship with God. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And you claim to know the will of God, and to have the moral high ground because you’ve been taught the law of Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'You are also confident that you are a qualified guide to those who are “blind,” a shining light to those who live in darkness. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You are confident that you are a true teacher of the foolish and immature, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “little children,” a metaphor for the untutored or the immature.
    marker-yv: yv-n
  - type: text
    text: 'all because you have the treasury of truth and knowledge in the law of Moses. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So let me ask you this: Why don’t you practice what you preach? You preach, “Don’t steal!” but are you a thief? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'You are swift to tell others, “Don’t commit adultery!” but are you guilty of adultery? You say, “I hate idolatry and false gods!” but do you withhold from the true God what is due him? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “do you rob temples?” The Aramaic can be translated “you plunder the Holy Place.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Even though you boast in the law, you dishonor God, the Lawgiver, when you break it! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'For your actions seem to fulfill what is written:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “God’s precious name is cursed among the nations because of you.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 52:5
      metadata:
        usfm: ISA.52.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
