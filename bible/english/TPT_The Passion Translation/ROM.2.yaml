      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You trust in the covenant sign of circumcision
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied by the immediate context and by the use of the conjunction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: yet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This form of ellipsis needs to be supplied for the sake of clarity.
    marker-yv: yv-n
  - type: text
    text: 'yet circumcision only has value if you faithfully keep the teachings of the law. But if you violate the law, you have invalidated your circumcision. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “your circumcision has become uncircumcision.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'And if the uncircumcised one faithfully keeps the law, won’t his obedience make him more “Jewish” than the actual rite of circumcision? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And won’t the one who has never had the knife cut his foreskin be your judge when you break the law? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You are not a Jew if it’s only superficial—for it’s more than the surgical cut of a knife that makes you Jewish. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'But you are Jewish because of the inward act of spiritual circumcision—a radical change that lays bare your heart. It’s not by the principle of the written code, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “by the letter.”
    marker-yv: yv-n
  - type: text
    text: but by power of the Holy Spirit. For then your praise will not come from people, but from God himself!
