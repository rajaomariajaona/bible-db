      metadata:
        usfm: JHN.6.28+JHN.6.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 11:6
      metadata:
        usfm: HEB.11.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'seeking an unfading glory and honor and imperishable virtue, will experience eternal life. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But those governed by selfishness and self-promotion, whose hearts are unresponsive to God’s truth and would rather embrace unrighteousness, will experience the fullness of wrath.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God’s wrath is mentioned twelve times in Romans (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1:18
      metadata:
        usfm: ROM.1.18
    - type: usfm
