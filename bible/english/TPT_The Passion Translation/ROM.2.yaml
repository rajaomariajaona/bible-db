document_id: ROM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Judges Sin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'No matter who you are, before you judge the wickedness of others, you had better remember this: you are also without excuse, for you too are guilty of the same kind of things! When you judge others, and then do the same things they do, you condemn yourself. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Because of this, O human, the Spirit is not speaking through you as you judge another, for against what you judge, you will also revert.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'We know that God’s judgment falls upon those who practice these things. God is always right, because he has all the facts. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “It [judgment] is based on truth.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And no matter who you think you are, when you judge others who do these things and then do the same things yourself, what makes you think that you will escape God’s judgment?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Do the riches of his extraordinary kindness make you take him for granted and despise him? Haven’t you experienced how kind and understanding he has been to you? Don’t mistake his tolerance for acceptance. Do you realize that all the wealth of his extravagant kindness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word for kindness can be translated “sweetness.”
    marker-yv: yv-n
  - type: text
    text: 'is meant to melt your heart and lead you into repentance? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Do you not know that it is the fulfillment of God to bring you blessings?”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But because of your calloused heart and refusal to change direction, you are piling up wrath for yourself in the day of wrath, when God’s righteous judgment is revealed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: He will give to each one in return for what he has done.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
