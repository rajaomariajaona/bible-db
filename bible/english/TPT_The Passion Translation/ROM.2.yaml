document_id: ROM.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Judges Sin
  - type: text
    content: 'No matter who you are, before you judge the wickedness of others, you had better remember this: you are also without excuse, for you too are guilty of the same kind of things! When you judge others, and then do the same things they do, you condemn yourself. '
  - type: note
    content: The Aramaic can be translated “Because of this, O human, the Spirit is not speaking through you as you judge another, for against what you judge, you will also revert.”
  '10':
  - type: text
    content: 'But when we do what pleases God, we can expect unfading glory, true honor, and a continual peace—to the Jew first and also to the non-Jew, '
  '11':
  - type: text
    content: for God sees us all without partiality.
  '12':
  - type: text
    content: 'When people who have never been exposed to the laws of Moses commit sin, they will still perish for what they do. And those who are under the law of Moses and fail to obey it are condemned by the law. '
  '13':
  - type: text
    content: 'For it’s not merely knowing the law '
  - type: note
    content: Every Sabbath day the Mosaic law, the Torah, was read in the Jewish meeting house.
  - type: text
    content: that makes you right with God, but doing all that the law says that will cause God to pronounce you innocent.
  - type: note
    content: Or “righteous.” See Deut. 18:5. No one keeps the law in every part; this is why Yeshua (Jesus) came to redeem and save us. See also Rom. 3:20.
  - type: heading
    content: God’s Judgment
  '14':
  - type: text
    content: 'For example, whenever people who don’t possess the law '
  - type: note
    content: Or “Torah” (the first five books of Moses).
  - type: text
    content: 'as their birthright commit sin, it still confirms that a “law” is present in their conscience. For when they instinctively do what the law requires, that becomes a “law” to govern them, even though they don’t have Mosaic law. '
  '15':
  - type: text
    content: 'It demonstrates that the requirements of the law are woven into their hearts. They know what is right and wrong, for their conscience validates this “law” in their heart. Their thoughts correct '
  - type: note
    content: Or “accuse.”
  - type: text
    content: 'them in one instance and commend them in another. '
  '16':
  - type: text
    content: So this judgment will be revealed on the day when God, through Jesus the Messiah, judges the hidden secrets of people’s hearts. And their response to my gospel will be the standard of judgment used in that day.
  - type: heading
    content: The Jewish Religion Will Not Save You
  '17':
  - type: text
    content: 'Now, you claim to be a Jew because you lean upon your trust in the law '
  - type: note
    content: The Aramaic can be translated “you take comfort from the law.”
  - type: text
    content: 'and boast in your relationship with God. '
  '18':
  - type: text
    content: 'And you claim to know the will of God, and to have the moral high ground because you’ve been taught the law of Moses. '
  '19':
  - type: text
    content: 'You are also confident that you are a qualified guide to those who are “blind,” a shining light to those who live in darkness. '
  '2':
  - type: text
    content: 'We know that God’s judgment falls upon those who practice these things. God is always right, because he has all the facts. '
  - type: note
    content: Or “It [judgment] is based on truth.”
  '20':
  - type: text
    content: 'You are confident that you are a true teacher of the foolish and immature, '
  - type: note
    content: Or “little children,” a metaphor for the untutored or the immature.
  - type: text
    content: 'all because you have the treasury of truth and knowledge in the law of Moses. '
  '21':
  - type: text
    content: 'So let me ask you this: Why don’t you practice what you preach? You preach, “Don’t steal!” but are you a thief? '
  '22':
  - type: text
    content: 'You are swift to tell others, “Don’t commit adultery!” but are you guilty of adultery? You say, “I hate idolatry and false gods!” but do you withhold from the true God what is due him? '
  - type: note
    content: Or “do you rob temples?” The Aramaic can be translated “you plunder the Holy Place.”
  '23':
  - type: text
    content: 'Even though you boast in the law, you dishonor God, the Lawgiver, when you break it! '
  '24':
  - type: text
    content: 'For your actions seem to fulfill what is written:'
  - type: text
    content: “God’s precious name is cursed among the nations because of you.”
  - type: note
    content: See Isa. 52:5 (LXX); Ezek. 36:20.
  '25':
  - type: text
    content: You trust in the covenant sign of circumcision
  - type: text
    content: ', '
  - type: note
    content: Implied by the immediate context and by the use of the conjunction yet. This form of ellipsis needs to be supplied for the sake of clarity.
  - type: text
    content: 'yet circumcision only has value if you faithfully keep the teachings of the law. But if you violate the law, you have invalidated your circumcision. '
  - type: note
    content: Or “your circumcision has become uncircumcision.”
  '26':
  - type: text
    content: 'And if the uncircumcised one faithfully keeps the law, won’t his obedience make him more “Jewish” than the actual rite of circumcision? '
  '27':
  - type: text
    content: 'And won’t the one who has never had the knife cut his foreskin be your judge when you break the law? '
  '28':
  - type: text
    content: 'You are not a Jew if it’s only superficial—for it’s more than the surgical cut of a knife that makes you Jewish. '
  '29':
  - type: text
    content: 'But you are Jewish because of the inward act of spiritual circumcision—a radical change that lays bare your heart. It’s not by the principle of the written code, '
  - type: note
    content: Or “by the letter.”
  - type: text
    content: but by power of the Holy Spirit. For then your praise will not come from people, but from God himself!
  '3':
  - type: text
    content: And no matter who you think you are, when you judge others who do these things and then do the same things yourself, what makes you think that you will escape God’s judgment?
  '4':
  - type: text
    content: 'Do the riches of his extraordinary kindness make you take him for granted and despise him? Haven’t you experienced how kind and understanding he has been to you? Don’t mistake his tolerance for acceptance. Do you realize that all the wealth of his extravagant kindness '
  - type: note
    content: The Aramaic word for kindness can be translated “sweetness.”
  - type: text
    content: 'is meant to melt your heart and lead you into repentance? '
  - type: note
    content: The Aramaic can be translated “Do you not know that it is the fulfillment of God to bring you blessings?”
  '5':
  - type: text
    content: But because of your calloused heart and refusal to change direction, you are piling up wrath for yourself in the day of wrath, when God’s righteous judgment is revealed.
  '6':
  - type: text
    content: 'For:'
  - type: text
    content: He will give to each one in return for what he has done.
  - type: note
    content: See Ps. 62:12; Prov. 24:12; Matt. 16:27.
  '7':
  - type: text
    content: 'For those living in constant goodness and doing what pleases him, '
  - type: note
    content: Doing what pleases God comes from faith. We must first believe in Jesus, the Anointed One. Then our life and works will bring honor to him. See also v. 10; John 6:28–29; Heb. 11:6.
  - type: text
    content: 'seeking an unfading glory and honor and imperishable virtue, will experience eternal life. '
  '8':
  - type: text
    content: But those governed by selfishness and self-promotion, whose hearts are unresponsive to God’s truth and would rather embrace unrighteousness, will experience the fullness of wrath.
  - type: note
    content: God’s wrath is mentioned twelve times in Romans (1:18; 2:5, 8; 3:5; 4:15; 5:9; 9:22; 12:19; 13:4, 5).
  '9':
  - type: text
    content: 'Anyone who does evil can expect tribulation and distress—to the Jew first and also to the non-Jew. '
