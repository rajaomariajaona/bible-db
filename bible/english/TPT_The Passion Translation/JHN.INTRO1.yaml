- type: usfm
  marker: is1
  children:
  - type: text
    text: About John
- type: usfm
  marker: ip
  children:
  - type: text
    text: How God longs for us to know him! We discover him as we read and study his living Word. But the “Word” is not just dead letters; it’s the Living Expression of God, Jesus Christ. The Word came with skin on as the perfect Man—the One who is the divine self-expression and fullness of God’s glory; he is God in the flesh!
- type: usfm
  marker: ip
  children:
  - type: text
    text: The New Testament, at its beginning, presents four biographies to portray the four primary aspects of this all-glorious Christ. The Gospel of Matthew testifies that he is the King, the Christ of God according to the prophecies of the Old Testament, the One who brings the kingdom of the heavens to earth. The Gospel of Mark presents him as the Love-Slave of God, the perfect servant who labors faithfully for God. Mark’s account is the most simple, for a servant doesn’t need a detailed record. The Gospel of Luke presents a full picture of Christ as the true Man and the compassionate Savior of everyone who comes to him. And the Gospel of John unveils him as the Son of God, the very God himself, to be life to God’s people.
- type: usfm
  marker: ip
  children:
  - type: text
    text: We find miracles everywhere in the Gospel of John! Water became wine. Blind eyes were blessed with sight. Even the dead rose to walk again when Jesus lived among men. Every miracle was a sign to make us wonder about who this man truly is. The Gospel of John brings us a heavenly perspective filled with wonderful revelations in every verse. Nothing in the Bible compares to the writings of John. He was a prophet, a seer, a lover, an evangelist, an author, an apostle, and a son of thunder.
- type: usfm
  marker: ip
  children:
  - type: text
    text: The other three gospels give us the history of Christ, but John writes to unveil the mystery of Christ. Jesus is seen as the sacrificial Lamb of God, the Good Shepherd, the Kind Forgiver, the Tender Healer, the Compassionate Intercessor, and the great I AM. Who can resist this man when he tugs on your heart to come to him? To read John’s Gospel is to encounter Jesus. Make this your goal as you read.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'There are three things that are important to remember about John, the author of this Gospel: First, John passionately followed Jesus Christ. He saw the miracles of Jesus firsthand and heard the anointed words he taught. He followed Jesus wholeheartedly, and became one of Christ’s apostolic servants.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Secondly, John described himself as “the disciple whom Jesus loved” (John 21:7, 20). This does not mean that Jesus loved John more than the others; but rather, John saw himself as one that Jesus loved. You could also say about yourself, “I am the disciple whom Jesus loves!” Every single believer can echo John’s description of himself, for these words must become the true definition of our identity.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Love unlocks mysteries. As we love Jesus, our hearts are unlocked to see more of his beauty and glory. When we stop defining ourselves by our failures, but rather as the one whom Jesus loves, then our hearts begin to open to the breathtaking discovery of the wonder of Jesus Christ. Jesus does not see us in the darkness of our pasts but in the light of our destinies!
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'And thirdly, it’s important to keep in mind that John did not include everything that Jesus did and taught. In fact, if you put all the data of all four Gospels together and condensed it, we would have information covering merely a few months of Jesus’ life and ministry! We are only given snapshots, portions of what Jesus taught, and accounts of a few of the miracles he performed. From his birth to the age of twelve, we know virtually nothing about his life; and from the age of twelve until he began his public ministry at thirty, we again have almost no information given to us about him in any of the Gospels. John summarizes his incomplete account in the last verse of his Gospel:'
- type: usfm
  marker: imq
  children:
  - type: text
    text: Jesus did countless things that I haven’t included here. And if every one of his works were written down and described one by one, I suppose that the world itself wouldn’t have enough room to contain the books that would have to be written! —
  - type: usfm
    marker: rq
    children:
    - type: text
      text: John 21:25
- type: usfm
  marker: ip
  children:
  - type: text
    text: John gives us the fourth Gospel, which corresponds to the fourth living creature mentioned in the book of Revelation—the flying eagle. This eagle brings before our hearts Christ as the One who came from heaven and reveals heaven’s reality to those who love him. In Dan. 3:25, it was the fourth man walking in the fire who was in the form of the Son of God. This fourth man revealed in the fourth Gospel is the One who on the fourth day put the sun into the sky (Gen. 1:14–16).
- type: usfm
  marker: ip
  children:
  - type: text
    text: According to Tertullian, one of the church fathers, John was plunged in burning oil in front of a massive crowd that had filled the Roman Coliseum in order to silence his ministry. But God was not yet finished with his aged apostle. Tertullian reported that John came out of the burning caldron alive and unharmed! This miracle resulted in the mass conversion to Christ of nearly all who witnessed it. John was later banished to the island of Patmos where he wrote the book of the Revelation of Jesus Christ.
- type: usfm
  marker: ip
  children:
  - type: text
    text: The translators dedicate The Passion Translation of John to every faithful evangelist and preacher of the gospel. You are a gift to the world and through your ministry, you have helped to bring millions of souls into the kingdom of God. We are forever grateful to God for your lives and your message.
- type: usfm
  marker: ip
  children:
  - type: text
    text: You can trust every word you read from John, for he speaks the truth. His Gospel will take you into a higher glory where Jesus now sits exalted at the right hand of God. As John’s Gospel unveils Jesus before your eyes, enter into the great magnificence of his presence and sit enthroned with him. Your life will never be the same after absorbing the glory presented to you in the book of John.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Purpose
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The Gospel of John is all about the beautiful Christ. John tells us why he wrote this amazing book:'
- type: usfm
  marker: imq
  children:
  - type: text
    text: Jesus went on to do many more miraculous signs in the presence of his disciples, which are not even included in this book. But all that is recorded here is so that you will fully believe that Jesus is the Anointed One, the Son of God, and that through your faith in him you will experience eternal life by the power of his name! —
  - type: usfm
    marker: rq
    children:
    - type: text
      text: John 20:30–31
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'John wrote with a twofold purpose: he’s writing to nonbelievers, mostly Jews but also gentiles, to believe that Jesus is the One through whom they will find and experience eternal life; he’s also writing to believers that they would more fully believe the same, to experience the fullness of that life by Jesus’ powerful name.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'The word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: believe
  - type: text
    text: ' is found nearly one hundred times in John. It is the Gospel of believing! We believe that Jesus Christ is the Living Expression of God and the Light of the World. He is the Savior, the King, the true Anointed One, the Living Bread, and the Loving Shepherd. This is why we continue to teach and preach from this magnificent, authoritative book: that people might have faith and grow in their faith. The Gospel of John reveals these living truths to us.'
- type: usfm
  marker: is1
  children:
  - type: text
    text: Author and Audience
- type: usfm
  marker: ip
  children:
  - type: text
    text: Many believe that John penned this Gospel about AD 80–85. However, the Dead Sea Scrolls hint at an earlier date as early as AD 50–55, since some of the verses found in the Dead Sea Scrolls are nearly identical to verses found in John’s Gospel. The earlier date, though contested by some, seems to be more likely. Why would John wait to write and share the good news of Jesus? It seems likely that John wrote his Gospel prior to AD 66 when the Roman war with Jews began, for he mentions the Temple as still standing and the pool, which “has” (not “had”) five porticos. The Roman army destroyed all of these during the Roman war of AD 67–70.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Jesus called John to follow him while John was mending a net, which seems to point to the focus of his ministry. John’s message “mends” the hearts of men and brings healing to the body of Christ through the revelation he brings us.
- type: usfm
  marker: ip
  children:
  - type: text
    text: There is an interesting possibility that both Jacob (James) and John (sons of Zebedee) were actually cousins of Jesus. By comparing Matt. 27:56 to Mark 15:40–41, we learn that Zebedee’s wife was Salome. And Salome was believed to be the younger sister of Mary, the mother of our Lord Jesus, which would make her sons, Jacob and John, cousins of Jesus.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Major Themes
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Person of Jesus as God.
  - type: text
    text: ' Of all the major themes in John’s gospel, the question of “Who is Jesus?” lies at its heart, especially when it comes to distinguishing it from the other three Gospels. For John, Jesus is the Son of God. He does only the things that God the Father tells and shows him to say and do (5:19). Jesus is God’s unique Messenger, who claims to be God and yet submits to God. Through Jesus’ obedience and dependence upon the Father, he becomes the center for disclosing the very words and deeds of God himself. Thus, the Gospel of John is as much about God as it is about Jesus!'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Work of Jesus in Salvation.
  - type: text
    text: ' John makes it clear that God the Father is the one who alone initiates human salvation. The one who bears the Father’s salvation is the Son. Jesus is the Lamb of God, come to take away the sins of the world—which means we need him to save us from those sins. He is the Good Shepherd who lays down his life for his sheep. He is also the Bread of Life, the Light of the World, the Way, the Truth, and the Life—all names that point to the salvation found in Jesus.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Faith features prominently in John’s gospel, calling people to make a decision and confirm it by walking in the truth. More importantly, John teaches that such a decision merely reveals what God himself is doing in those who will eventually become his children—saving them through Jesus!
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The Holy Spirit.
  - type: text
    text: ' The Spirit of God fills the pages of John in the way he fills the other gospels: the Spirit is given to Jesus at baptism; Jesus will baptize his people in this Spirit; Jesus is uniquely endowed with the Spirit; as the only one who has and gives the Spirit, Jesus shows us the characteristics of him. Above all, in this Gospel John connects the gift of the Holy Spirit to the people of God with the death and exaltation of the Son. We have come to know the precious doctrine of the Trinity in and through much of John!'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: The People of God.
  - type: text
    text: ' One of the major themes of John’s gospel actually draws on the Old Testament: the formation of a people, a community that will embody and carry forth Jesus’ mission. The community of God’s people we call the disciples begins with a sort of commissioning, where Jesus breathes upon them, marking them as his new creation people. The act of breathing upon them recalls the original creation of the first human when God blew his breath into Adam. And like Moses’ farewell address in Deuteronomy, Jesus addresses his followers (see chs. 13–17) to fulfill his redemptive purposes.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Believing in Jesus.
  - type: text
    text: ' The fact of the glorious life of Jesus Christ must lead us to faith in him. The word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: faith
  - type: text
    text: ' is found about forty times in Matthew, Mark, and Luke, but not once in John. Instead John uses “believe,” a verb. He prefers to describe an action, not a state of mind or thinking. It is the Greek word '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pisteuo
  - type: text
    text: '—believe! The claims of Christ on our lives require that we believe in who he is and what he has done. John speaks of this “believing” ninety-two times. For John, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pisteuo
  - type: text
    text: ' means embracing Jesus and laying our lives on the words and deeds given to us by the Jewish Messiah. It means doing what he says.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Eternal Life Now and Later.
  - type: text
    text: ' As with the other gospels, John oriented his around the life, death, and resurrection of Jesus—the purpose of which is that humanity might have life—eternal life in the age to come, while experiencing a taste of it right now. Everlasting, unending life in this ultimate age is a gift God gives freely to people who believe in the redemption of Christ; the alternative is judgment. But this reality isn’t merely for later, it’s also for now; eternal life is both already and not yet. John emphasizes the present enjoyment of this eternal life and its blessings. But he also makes it plain Jesus will return to gather to himself his own to the dwelling he’s prepared for them (14:2–3).'
