      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is difficult to be precise regarding the length of a cubit. Generally, a standard cubit is believed to be about 17.5 inches or 0.44 meters. A long cubit was a cubit plus a handbreadth (3.5 inches or 90 millimeters); in total about 21 inches or 0.53 meters. Unless otherwise noted, conversions from cubits to modern units in this translation will be calculated using the long cubit measurement. This massive statue was nearly 105 feet (32 meters) high and 11 feet (3 meters) wide.
      marker-yv: yv-n
    - type: text
      text: 'wide. He erected the statue on the plain of Dura '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “walled plain.” See Edward M. Cook, “ ‘In the Plain of the Wall’ (Daniel 3:1),”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Journal of Biblical Literature
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '108, no. 1 (1989): 115–16. Possibly Tura Dula, a river that flows into the Euphrates about six miles (ten kilometers) south of Babylon.'
      marker-yv: yv-n
    - type: text
      text: 'in the province of Babylon. '
