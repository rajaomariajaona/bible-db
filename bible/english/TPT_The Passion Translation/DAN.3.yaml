      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Is it deliberate?”
      marker-yv: yv-n
    - type: text
      text: 'Shadrach, Meshach, and Abednego, that you do not serve my gods or worship the golden statue that I erected? '
