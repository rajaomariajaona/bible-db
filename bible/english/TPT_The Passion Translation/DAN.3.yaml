  - type: text
    content: ' statue I have made. But if you refuse to worship it, you will be thrown immediately into a white-hot fiery furnace. So now, who is the god that can save you from my power?”'
  - type: note
    content: Or “from my hands.”
  '16':
  - type: text
    content: 'Shadrach, Meshach, and Abednego answered King Nebuchadnezzar: “We have no need to offer you a defense in this matter. '
  '17':
  - type: text
    content: 'If the God we serve truly exists, then he will save us from death at your hand, O king. '
  - type: note
    content: These three Jewish young men knew the truth of Deut. 4:20 and Isa. 43:2. God had once delivered his people from the iron furnace of Egyptian bondage, and they were confident that he would do it again.
  - type: text
    content: 'So, if you throw us into the fiery furnace, our God is able to save us. '
  '18':
  - type: text
    content: But even if he does not save us, you can be sure, O king, that we would not serve your gods or worship the golden statue you have erected.”
  - type: heading
    content: Daniel’s Three Friends Are Sentenced to Death
  '19':
  - type: text
    content: 'Upon hearing this, Nebuchadnezzar was filled with anger, and his face was distorted with rage against Shadrach, Meshach, and Abednego. He ordered '
  - type: text
    content: his men
  - type: text
    content: ' to heat the fiery furnace seven times hotter than it usually was. '
  - type: note
    content: The number seven could be seen more figuratively than literally since there was no thermometer to measure the heat accurately.
  '2':
  - type: text
    content: 'He then ordered an assembly of his princes, '
  - type: note
    content: Or “satraps,” a Persian loanword that means “overseer [protector] of the province.” They were appointed by the king for a lifetime appointment. They usually were princes or were related to the royal family. They had authority to tax the people of their province and to have a provincial army. Apparently, not all the people of Babylon were assembled at this dedication; it was only the nation’s elite. See v. 27; 6:1.
  - type: text
    content: 'magistrates, and governors, as well as the counselors, treasurers, judges, sheriffs, and all the other provincial authorities, that they should be present at the dedication of the statue he had erected. '
  '20':
  - type: text
    content: 'He also commanded some of his mighty men to bind Shadrach, Meshach, and Abednego and throw them into the white-hot furnace. '
  '21':
  - type: text
    content: 'Immediately, they tied up the three men while they still had on all their clothes—their trousers, shirts, and turbans—and then threw them into the white-hot furnace. '
  '22':
  - type: text
    content: 'But because the king’s command was so urgent and the furnace so overheated, the raging flames burned up the men who carried Shadrach, Meshach, and Abednego into the fire. '
  - type: note
    content: The Greek versions state that the flames jumped out from the furnace “forty-nine cubits,” which is over eighty-six feet (twenty-six meters)! Additionally, according to b. Sanhedrin 92b–93a, Nebuchadnezzar himself was half-burned. (See Louis Ginzberg, The Legends of the Jews [The Jewish Publication Society], 4.329, 6.416.)
  '23':
  - type: text
    content: And the three men, Shadrach, Meshach, and Abednego, tied and bound, fell inside the blazing, white-hot furnace.
  - type: note
    content: 'Following the end of v. 23, the Greek (Theodotion and LXX) and Syriac versions of Daniel include sixty-six verses not found in the Aramaic. These verses include the passages commonly referred to as “The Song [Prayer] of Azariah” and “The Song of the Three Young Men,” which are considered inspired Scripture by the Roman Catholic tradition. The first three verses of the sixty-eight verses of “The Song [Prayer] of Azariah” read: “They [the three young Hebrews] walked around in the midst of the flames, singing hymns to God and blessing the Lord. Then Azariah stood still in the fire and prayed aloud: ‘Blessed are you, O Lord, God of our ancestors, and worthy of praise; and glorious is your name forever’ ” (Dan. 3:24–26, NRSVCE).'
  '24':
  - type: text
    content: 'Suddenly King Nebuchadnezzar jumped up in amazement and asked his officials, '
  - type: note
    content: Or “companions.”
  - type: text
    content: “Didn’t we throw three men, bound in fetters, into the fire?”
  - type: text
    content: “That is correct, Your Majesty,” they answered him.
  '25':
  - type: text
    content: '“But look,” he '
  - type: text
    content: shouted
  - type: text
    content: ', “I see four men walking about freely in the fire. They’re all unharmed! And the fourth man has the appearance of a son of the gods!”'
  - type: note
    content: Or “like a son of god” or “like a divine being.” In Jewish writings the expression “sons of God” refers to members of the divine council around the Lord (see 1 Kings 22:19; Job 1:6; Ps. 148:2). Most Christian expositors see the fourth man in the fire as a Christophany, an appearance of our Lord in the midst of the fiery flames.
  '26':
  - type: text
    content: 'Then Nebuchadnezzar '
  - type: text
    content: cautiously
  - type: text
    content: ' approached the opening of the white-hot blazing furnace and '
  - type: text
    content: shouted
  - type: text
    content: ', “Shadrach, Meshach, and Abednego, servants of the Great God, '
  - type: note
    content: Or “the Most High God.”
  - type: text
    content: 'come out here now!” So out of the midst of the fire walked Shadrach, Meshach, and Abednego '
  - type: text
    content: completely unharmed
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'When all the kings’ officials had assembled, along with the princes, '
  - type: note
    content: Or “satraps.” See the footnote on v. 2.
  - type: text
    content: magistrates, and governors, they discovered that the fire had not harmed these three men. Their hair was not singed, their clothes were not scorched, and they didn’t even smell like smoke.
  '28':
  - type: text
    content: 'King Nebuchadnezzar said, “Praise be to the God of Shadrach, Meshach, and Abednego! For he sent his divine messenger '
  - type: note
    content: Or “his angel.”
  - type: text
    content: 'to rescue his servants who trusted in him. They disobeyed my orders and laid their lives on the line rather than serve or worship any god but their own. '
  '29':
  - type: text
    content: 'So I hereby make this decree: Any person from any nation or language who says anything against the God of Shadrach, Meshach, and Abednego will be torn limb from limb, and his house will be destroyed, because there is no other god who is able to rescue '
  - type: text
    content: so miraculously
  - type: text
    content: '!” '
  '3':
  - type: text
    content: 'So all these officials '
  - type: note
    content: Or “princes, magistrates, and governors, as well as the counselors, treasurers, judges, sheriffs, and all the other provincial authorities.” This repetition of attendees is condensed for the sake of English narrative.
  - type: text
    content: 'gathered in front of the '
  - type: text
    content: golden
  - type: text
    content: ' statue that the king had made.'
  '30':
  - type: text
    content: 'Then the king promoted '
  - type: note
    content: Or “caused to prosper.”
  - type: text
    content: Shadrach, Meshach, and Abednego in the province of Babylon.
  '4':
  - type: text
    content: 'Then a herald made the loud proclamation: “'
  - type: text
    content: Attention everyone!
  - type: text
    content: ' Listen to what the king commands of you—you of every nation and language. '
  '5':
  - type: text
    content: 'When you hear the '
  - type: text
    content: ram’s
  - type: text
    content: ' horn, and the music of the flute, '
  - type: note
    content: Or “pipe.” The Hebrew is literally “hiss,” the onomatopoeic sound of a shepherd’s pipe (see Judg. 5:16).
  - type: text
    content: 'the lyre, '
  - type: note
    content: Or possibly “zither.”
  - type: text
    content: 'the '
  - type: text
    content: ten-stringed
  - type: text
    content: ' harp, the triangular harp, the drums, '
  - type: note
    content: 'Or “pipes”; some scholars believe it may have been the dulcimer. The Aramaic word is sumponyah and is related to the Greek symphonia. For this reason, some translators render this as “accompanying sound.” (For more precise information regarding these instruments, see Charles H. Dyer, “The Musical Instruments in Daniel 3,” Bibliotheca Sacra 147 [1990]: 426–36.)'
  - type: text
    content: 'and all the other instruments, you will bow down to the ground and worship the golden statue that King Nebuchadnezzar has made. '
  '6':
  - type: text
    content: Whoever does not bow down to worship it will immediately be thrown into a white-hot fiery furnace.”
  '7':
  - type: text
    content: 'Therefore, at the set time, as soon as they heard the musical instruments, '
  - type: note
    content: Or “the ram’s horn, and the music of the flute, the lyre, the ten-stringed harp, the triangular harp, the drums, and all the other instruments.” This repetition of instruments is condensed for the sake of the English narrative.
  - type: text
    content: those present from all nations and languages bowed down and worshiped the golden image that King Nebuchadnezzar had set up.
  - type: note
    content: In a sense, Nebuchadnezzar was setting up a counterfeit, open-air temple complex, complete with worshipers (musicians, see 2 Chron. 29:25–28). Instead of a brazen altar, it was a fiery furnace. Instead of a golden ark of glory, it was an idolatrous golden statue. The king was going to sacrifice the three Jews in the fire as his offering to his false god (statue).
  - type: heading
    content: The Condemnation of the Young Jewish Men
  '8':
  - type: text
    content: 'At that point, certain Babylonian '
  - type: text
    content: astrologers
  - type: text
    content: ' '
  - type: note
    content: Or “Chaldeans,” which may have its derived meaning of “fortune tellers [astrologers].”
  - type: text
    content: 'approached the king and maliciously denounced '
  - type: note
    content: Or literally “ate [or chewed up] the pieces of.” This idiomatic expression seems to carry the idea of spiteful slander as well as accusation.
  - type: text
    content: 'the Jews. '
  '9':
  - type: text
    content: 'They said to King Nebuchadnezzar: “O king, live forever! '
