  - type: note
    content: Or “pipe.” See the first footnote on v. 5.
  - type: text
    content: 'the lyre, '
  - type: note
    content: Or possibly “zither.”
  - type: text
    content: 'the '
  - type: text
    content: ten-stringed
  - type: text
    content: ' harp, the triangular harp, the drums, '
  - type: note
    content: Or “pipes.” See the third footnote on v. 5.
  - type: text
