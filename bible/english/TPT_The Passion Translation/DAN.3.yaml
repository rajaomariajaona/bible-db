      children:
      - type: text
        text: '16'
    - type: text
      text: 'Shadrach, Meshach, and Abednego answered King Nebuchadnezzar: “We have no need to offer you a defense in this matter. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'If the God we serve truly exists, then he will save us from death at your hand, O king. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These three Jewish young men knew the truth of
      - type: usfm
