  '1':
  - type: heading
    content: Nebuchadnezzar’s Statue
  - type: text
    content: 'King Nebuchadnezzar '
  - type: note
    content: 'Two Greek versions add: “in the eighteenth year [of Nebuchadnezzar’s reign].” The Septuagint further adds “having subdued towns and provinces and all the inhabitants of the world from India to Ethiopia.”'
  - type: text
    content: 'had a golden statue made that was sixty cubits high and six cubits '
  - type: note
    content: It is difficult to be precise regarding the length of a cubit. Generally, a standard cubit is believed to be about 17.5 inches or 0.44 meters. A long cubit was a cubit plus a handbreadth (3.5 inches or 90 millimeters); in total about 21 inches or 0.53 meters. Unless otherwise noted, conversions from cubits to modern units in this translation will be calculated using the long cubit measurement. This massive statue was nearly 105 feet (32 meters) high and 11 feet (3 meters) wide.
  - type: text
    content: 'wide. He erected the statue on the plain of Dura '
  - type: note
    content: 'Or “walled plain.” See Edward M. Cook, “ ‘In the Plain of the Wall’ (Daniel 3:1),” Journal of Biblical Literature 108, no. 1 (1989): 115–16. Possibly Tura Dula, a river that flows into the Euphrates about six miles (ten kilometers) south of Babylon.'
  - type: text
    content: 'in the province of Babylon. '
  '10':
  - type: text
    content: 'You issued a '
  - type: text
    content: royal
  - type: text
    content: ' decree, O king, that when everyone hears the ram’s horn and the music '
  - type: note
    content: Or “the music of the flute, the lyre, the ten-stringed harp, the triangular harp, the drums, and all the other instruments.” See v. 5.
  - type: text
    content: 'begins they must bow down to the ground and worship the golden image. '
  '11':
  - type: text
    content: 'And whoever does not bow down and worship it will be thrown inside a white-hot fiery furnace. '
  '12':
  - type: text
    content: 'Yet, the prominent Jews, whom you have appointed administrators of the province of Babylon, have greatly disrespected you, Your Majesty. Their names are Shadrach, Meshach, and Abednego. They do not serve your gods '
  - type: note
    content: Or “your god” (i.e., the statue he erected). According to the traditional reading of the synagogue, as marked in the margin of the text, the reader was instructed to read a singular “your god” at this point. This would then be a direct reference to the god represented by the golden statue. See v. 14.
  - type: text
    content: nor worship the golden image you have set up.”
  '13':
  - type: text
    content: 'Upon hearing this, King Nebuchadnezzar flew into a furious rage and ordered Shadrach, Meshach, and Abednego to be brought before him. When these men came before the king, '
  '14':
  - type: text
    content: 'he asked them, “Is it true, '
  - type: note
    content: Or “Is it deliberate?”
  - type: text
    content: 'Shadrach, Meshach, and Abednego, that you do not serve my gods or worship the golden statue that I erected? '
  '15':
  - type: text
    content: I now give you one more chance
  - type: text
    content: '. '
  - type: note
    content: The Aramaic sentence is an incomplete conditional phrase, “If now . . . you will fall down.”
  - type: text
    content: 'When you hear the '
  - type: text
    content: ram’s
  - type: text
