        children:
        - type: text
          text: ', the Greek (Theodotion and LXX) and Syriac versions of Daniel include sixty-six verses not found in the Aramaic. These verses include the passages commonly referred to as “The Song [Prayer] of Azariah” and “The Song of the Three Young Men,” which are considered inspired Scripture by the Roman Catholic tradition. The first three verses of the sixty-eight verses of “The Song [Prayer] of Azariah” read: “They [the three young Hebrews] walked around in the midst of the flames, singing hymns to God and blessing the Lord. Then Azariah stood still in the fire and prayed aloud: ‘Blessed are you, O Lord, God of our ancestors, and worthy of praise; and glorious is your name forever’ ” ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 3:24–26
      - type: usfm
        marker: ft
        children:
        - type: text
