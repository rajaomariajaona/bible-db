      children:
      - type: text
        text: '11'
    - type: text
      text: 'And whoever does not bow down and worship it will be thrown inside a white-hot fiery furnace. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Yet, the prominent Jews, whom you have appointed administrators of the province of Babylon, have greatly disrespected you, Your Majesty. Their names are Shadrach, Meshach, and Abednego. They do not serve your gods '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your god” (i.e., the statue he erected). According to the traditional reading of the synagogue, as marked in the margin of the text, the reader was instructed to read a singular “your god” at this point. This would then be a direct reference to the god represented by the golden statue. See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: nor worship the golden image you have set up.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Upon hearing this, King Nebuchadnezzar flew into a furious rage and ordered Shadrach, Meshach, and Abednego to be brought before him. When these men came before the king, '
