    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But even if he does not save us, you can be sure, O king, that we would not serve your gods or worship the golden statue you have erected.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel’s Three Friends Are Sentenced to Death
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Upon hearing this, Nebuchadnezzar was filled with anger, and his face was distorted with rage against Shadrach, Meshach, and Abednego. He ordered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his men
    - type: text
      text: ' to heat the fiery furnace seven times hotter than it usually was. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The number seven could be seen more figuratively than literally since there was no thermometer to measure the heat accurately.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He then ordered an assembly of his princes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “satraps,” a Persian loanword that means “overseer [protector] of the province.” They were appointed by the king for a lifetime appointment. They usually were princes or were related to the royal family. They had authority to tax the people of their province and to have a provincial army. Apparently, not all the people of Babylon were assembled at this dedication; it was only the nation’s elite. See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '27'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'magistrates, and governors, as well as the counselors, treasurers, judges, sheriffs, and all the other provincial authorities, that they should be present at the dedication of the statue he had erected. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'He also commanded some of his mighty men to bind Shadrach, Meshach, and Abednego and throw them into the white-hot furnace. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Immediately, they tied up the three men while they still had on all their clothes—their trousers, shirts, and turbans—and then threw them into the white-hot furnace. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'But because the king’s command was so urgent and the furnace so overheated, the raging flames burned up the men who carried Shadrach, Meshach, and Abednego into the fire. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek versions state that the flames jumped out from the furnace “forty-nine cubits,” which is over eighty-six feet (twenty-six meters)! Additionally, according to b. Sanhedrin 92b–93a, Nebuchadnezzar himself was half-burned. (See Louis Ginzberg,
      - type: usfm
        marker: ft
        children:
