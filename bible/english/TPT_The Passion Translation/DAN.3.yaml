        children:
        - type: text
          text: 'Two Greek versions add: “in the eighteenth year [of Nebuchadnezzar’s reign].” The Septuagint further adds “having subdued towns and provinces and all the inhabitants of the world from India to Ethiopia.”'
      marker-yv: yv-n
    - type: text
      text: 'had a golden statue made that was sixty cubits high and six cubits '
    - type: usfm
      marker: f
