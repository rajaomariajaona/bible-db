      - type: usfm
        marker: ft
        children:
        - type: text
          text: . God had once delivered his people from the iron furnace of Egyptian bondage, and they were confident that he would do it again.
      marker-yv: yv-n
    - type: text
      text: 'So, if you throw us into the fiery furnace, our God is able to save us. '
  '18':
  - type: usfm
