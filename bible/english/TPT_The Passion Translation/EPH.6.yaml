document_id: EPH.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Love in Our Families and Workplaces
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Children, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if you want to be wise
    - type: text
      text: ', listen to your parents and do what they tell you, and the Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “through our Lord.”
      marker-yv: yv-n
    - type: text
      text: will help you.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Now my beloved ones, I have saved these most important truths for last: Be supernaturally infused with strength through your life-union with the Lord Jesus. Stand victorious with the force '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “weapons.”
      marker-yv: yv-n
    - type: text
      text: of his explosive power flowing in and through you.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Put on God’s complete set of armor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 59:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'provided for us, so that you will be protected as you fight against the evil strategies of the accuser! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the devil.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Your hand-to-hand combat is not with human beings, but with the highest principalities and authorities operating in rebellion under the heavenly realms. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “under heaven.”
      marker-yv: yv-n
    - type: text
      text: 'For they are a powerful class of demon-gods '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The classical Greek word used here is often used to refer to conjuring up pagan deities—supreme powers of darkness mentioned in occult rituals.
      marker-yv: yv-n
    - type: text
      text: 'and evil spirits that hold '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “possessors of this dark world.”
      marker-yv: yv-n
    - type: text
      text: 'this dark world in bondage. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Because of this, you must wear all the armor that God provides so you’re protected as you confront the slanderer, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “devil.”
      marker-yv: yv-n
    - type: text
      text: 'for you are destined for all things '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek text can be translated “after you have conquered, you can stand in victory.”
      marker-yv: yv-n
    - type: text
      text: and will rise victorious.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Put on truth as a belt to strengthen you to stand in triumph. Put on holiness as the protective armor that covers your heart. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Stand on your feet alert, then you’ll always be ready to share the blessings of peace.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'In every battle, take faith as your wrap-around shield, for it is able to extinguish the blazing arrows coming at you from the evil one! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The poetic language Paul uses here is likely a reference to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 91:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 17-18
    - type: text
      text: 'Embrace the power of salvation’s full deliverance, like a helmet '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to protect your thoughts from lies
    - type: text
      text: '. And take the mighty razor-sharp Spirit-sword '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: machaira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which was a razor-sharp Roman sword used in close combat.'
      marker-yv: yv-n
    - type: text
      text: of the spoken word of God.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pray passionately '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “all desires.”
      marker-yv: yv-n
    - type: text
      text: 'in the Spirit, as you constantly intercede with every form of prayer at all times. Pray the blessings of God upon all his believers. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'And pray also that God’s revelation would be released through me every time I preach the wonderful mystery of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hope-filled
    - type: text
      text: ' gospel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For the commandment, “Honor your father and your mother,” was the first of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ten Commandments
    - type: text
      text: ' with a promise attached: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Yes, pray that I may preach the wonderful news of God’s kingdom with bold freedom at every opportunity. Even though I am chained as a prisoner, I am his ambassador.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Messenger, Tychicus
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 21-22
    - type: text
      text: 'I am sending you a dear friend, Tychicus. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Tychicus, whose name means “child of fortune,” is believed to be an Ephesian who took this letter, as Paul’s representative, to the churches throughout Turkey. He is mentioned four other times in the New Testament. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 20:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Titus 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'He is a beloved brother and trustworthy minister in our Lord Jesus. He will share with you all the concerns that I have for your welfare and will inform you of how I am getting along. And he will also prophesy over you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from the Aramaic. Prophecy in the local church will always encourage, edify, and enlighten. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 14:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'to encourage your hearts. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So may God shower his peace upon you, my beloved friends. And may the blessings of faith and love fill your hearts from God the Father and from our Lord Jesus, the Messiah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Abundant grace will be with you all as each of you love our Lord Jesus Christ without corruption. Amen!
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Love in Christ
    - type: text
      text: ','
  - type: usfm
    marker: cls
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Paul
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“You will prosper '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “it will go beautifully for you.”
      marker-yv: yv-n
    - type: text
      text: 'and live a long, full life '
    - type: usfm
      marker: it
      children:
      - type: text
        text: if you honor your parents
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fathers, don’t exasperate your children, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In other words, fathers should show consideration for the different levels of understanding and experience that children possess, dealing with them at their level, or risk causing them loads of heartache.
      marker-yv: yv-n
    - type: text
      text: but raise them up with loving discipline and counsel that brings the revelation of our Lord.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Those who are employed should listen to their employers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “servants should obey their caretakers.”
      marker-yv: yv-n
    - type: text
      text: 'and obey their instructions with great respect and honor. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with trembling.”
      marker-yv: yv-n
    - type: text
      text: Serve them with humility in your hearts as though you were working for the Master.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Messiah.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Always do what is right and not only when others are watching, so that you may please Christ as his servants by doing his will. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Serve '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “minister to them.”
      marker-yv: yv-n
    - type: text
      text: 'your employers wholeheartedly and with love, as though you were serving Christ and not men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Be assured that anything you do that is beautiful and excellent will be repaid by our Lord, whether you are an employee or an employer.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And to the caretakers of the flock '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated literally from the Aramaic. The “caretakers of the flock” can refer to both leadership in the church and in the workplace. The Greek text states “masters, do the same things to them, and give up threatening.”
      marker-yv: yv-n
    - type: text
      text: I say, do what is right with your people by forgiving them when they offend you, for you know there is a Master in heaven that shows no favoritism.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spiritual Warfare
    marker-yv: yv-h
