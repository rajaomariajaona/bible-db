document_id: EPH.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Love in Our Families and Workplaces
  - type: text
    content: 'Children, '
  - type: text
    content: if you want to be wise
  - type: text
    content: ', listen to your parents and do what they tell you, and the Lord '
  - type: note
    content: Or “through our Lord.”
  - type: text
    content: will help you.
  '10':
  - type: text
    content: 'Now my beloved ones, I have saved these most important truths for last: Be supernaturally infused with strength through your life-union with the Lord Jesus. Stand victorious with the force '
  - type: note
    content: Or “weapons.”
  - type: text
    content: of his explosive power flowing in and through you.
  '11':
  - type: text
    content: 'Put on God’s complete set of armor '
  - type: note
    content: See Isa. 59:17.
  - type: text
    content: 'provided for us, so that you will be protected as you fight against the evil strategies of the accuser! '
  - type: note
    content: Or “the devil.”
  '12':
  - type: text
    content: 'Your hand-to-hand combat is not with human beings, but with the highest principalities and authorities operating in rebellion under the heavenly realms. '
  - type: note
    content: Or literally “under heaven.”
  - type: text
    content: 'For they are a powerful class of demon-gods '
  - type: note
    content: The classical Greek word used here is often used to refer to conjuring up pagan deities—supreme powers of darkness mentioned in occult rituals.
  - type: text
    content: 'and evil spirits that hold '
  - type: note
    content: Or “possessors of this dark world.”
  - type: text
    content: 'this dark world in bondage. '
  '13':
  - type: text
    content: 'Because of this, you must wear all the armor that God provides so you’re protected as you confront the slanderer, '
  - type: note
    content: Or “devil.”
  - type: text
    content: 'for you are destined for all things '
  - type: note
    content: As translated from the Aramaic. The Greek text can be translated “after you have conquered, you can stand in victory.”
  - type: text
    content: and will rise victorious.
  '14':
  - type: text
    content: 'Put on truth as a belt to strengthen you to stand in triumph. Put on holiness as the protective armor that covers your heart. '
  '15':
  - type: text
    content: Stand on your feet alert, then you’ll always be ready to share the blessings of peace.
  '16':
  - type: text
    content: 'In every battle, take faith as your wrap-around shield, for it is able to extinguish the blazing arrows coming at you from the evil one! '
  - type: note
    content: The poetic language Paul uses here is likely a reference to Ps. 91:4–5.
  '17':
  - type: text
    content: 'Embrace the power of salvation’s full deliverance, like a helmet '
  - type: text
    content: to protect your thoughts from lies
  - type: text
    content: '. And take the mighty razor-sharp Spirit-sword '
  - type: note
    content: This is the Greek word machaira, which was a razor-sharp Roman sword used in close combat.
  - type: text
    content: of the spoken word of God.
  - type: text
    content: 'Pray passionately '
  - type: note
    content: Or “all desires.”
  - type: text
    content: 'in the Spirit, as you constantly intercede with every form of prayer at all times. Pray the blessings of God upon all his believers. '
  '19':
  - type: text
    content: 'And pray also that God’s revelation would be released through me every time I preach the wonderful mystery of the '
  - type: text
    content: hope-filled
  - type: text
    content: ' gospel. '
  '2':
  - type: text
    content: 'For the commandment, “Honor your father and your mother,” was the first of the '
  - type: text
    content: Ten Commandments
  - type: text
    content: ' with a promise attached: '
  '20':
  - type: text
    content: Yes, pray that I may preach the wonderful news of God’s kingdom with bold freedom at every opportunity. Even though I am chained as a prisoner, I am his ambassador.
  - type: heading
    content: The Messenger, Tychicus
  '21':
  - type: text
    content: 'I am sending you a dear friend, Tychicus. '
  - type: note
    content: Tychicus, whose name means “child of fortune,” is believed to be an Ephesian who took this letter, as Paul’s representative, to the churches throughout Turkey. He is mentioned four other times in the New Testament. See Acts 20:4; Col. 4:7; 2 Tim. 4:12; and Titus 3:12.
  - type: text
    content: 'He is a beloved brother and trustworthy minister in our Lord Jesus. He will share with you all the concerns that I have for your welfare and will inform you of how I am getting along. And he will also prophesy over you '
  - type: note
    content: Translated from the Aramaic. Prophecy in the local church will always encourage, edify, and enlighten. See 1 Cor. 14:3.
  - type: text
    content: 'to encourage your hearts. '
  '23':
  - type: text
    content: 'So may God shower his peace upon you, my beloved friends. And may the blessings of faith and love fill your hearts from God the Father and from our Lord Jesus, the Messiah. '
  '24':
  - type: text
    content: Abundant grace will be with you all as each of you love our Lord Jesus Christ without corruption. Amen!
  - type: text
    content: Love in Christ
  - type: text
    content: ','
  - type: text
    content: Paul
  '3':
  - type: text
    content: '“You will prosper '
  - type: note
    content: Or “it will go beautifully for you.”
  - type: text
    content: 'and live a long, full life '
  - type: text
    content: if you honor your parents
  - type: text
    content: .”
  '4':
  - type: text
    content: 'Fathers, don’t exasperate your children, '
  - type: note
    content: In other words, fathers should show consideration for the different levels of understanding and experience that children possess, dealing with them at their level, or risk causing them loads of heartache.
  - type: text
    content: but raise them up with loving discipline and counsel that brings the revelation of our Lord.
  '5':
  - type: text
    content: 'Those who are employed should listen to their employers '
  - type: note
    content: Literally “servants should obey their caretakers.”
  - type: text
    content: 'and obey their instructions with great respect and honor. '
  - type: note
    content: Or “with trembling.”
  - type: text
    content: Serve them with humility in your hearts as though you were working for the Master.
  - type: note
    content: Or “the Messiah.”
  '6':
  - type: text
    content: 'Always do what is right and not only when others are watching, so that you may please Christ as his servants by doing his will. '
  '7':
  - type: text
    content: 'Serve '
  - type: note
    content: Or “minister to them.”
  - type: text
    content: 'your employers wholeheartedly and with love, as though you were serving Christ and not men. '
  '8':
  - type: text
    content: Be assured that anything you do that is beautiful and excellent will be repaid by our Lord, whether you are an employee or an employer.
  '9':
  - type: text
    content: 'And to the caretakers of the flock '
  - type: note
    content: As translated literally from the Aramaic. The “caretakers of the flock” can refer to both leadership in the church and in the workplace. The Greek text states “masters, do the same things to them, and give up threatening.”
  - type: text
    content: I say, do what is right with your people by forgiving them when they offend you, for you know there is a Master in heaven that shows no favoritism.
  - type: heading
    content: Spiritual Warfare
