document_id: COL.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Love for the Colossians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I wish you could know how much I have struggled '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: agon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (from which we get “agony”) means an intense conflict and struggle. This could imply Paul’s apostolic intercession for them.
    marker-yv: yv-n
  - type: text
    text: 'for you and for the church in Laodicea, and for the many other friends I’ve yet to meet. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I am contending for you that your hearts will be wrapped in the comfort of heaven and woven together into love’s fabric. This will give you access '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or in the Aramaic “approach.”
    marker-yv: yv-n
  - type: text
    text: to all the riches of God as you experience the revelation of God’s great mystery—Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For our spiritual wealth is in him, like hidden treasure waiting to be discovered—heaven’s wisdom and endless riches of revelation knowledge.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I want you to know this so that no one will come and lead you into error '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By implication, this “error” would be the teaching that Jesus is not enough, adding something to the all-sufficient Christ.
    marker-yv: yv-n
  - type: text
    text: 'through their persuasive arguments and clever words. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Even though I’m separated from you geographically, my spirit is present there with you. And I’m overjoyed to see how disciplined '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text literally means “unbroken battle formation.” The Aramaic can be translated “organized” or “principled.”
    marker-yv: yv-n
  - type: text
    text: and deeply committed you are because you have such a solid faith in Christ, the Anointed One.
- type: usfm
  marker: s1
  children:
  - type: text
    text: New Life in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In the same way you received Jesus our Lord and Messiah by faith, continue your journey of faith, progressing further into your union with him! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Your spiritual roots go deeply into his life as you are continually infused with strength, encouraged in every way. For you are established in the faith you have absorbed and enriched by your devotion to him!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek states “overflowing with gratitude.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Beware that no one distracts you or intimidates you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “strips you naked.” The Greek states “takes you captive.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: in their attempt to lead you away from Christ’s fullness
  - type: text
    text: ' by pretending to be full of wisdom when they’re filled with endless arguments of human logic. For they operate with humanistic and clouded judgments based on the mindset of this world system, and not the anointed truths of the Anointed One.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For he is the complete fullness of deity living in human form. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And our own completeness is now found in him. We are completely filled '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with God
  - type: text
    text: ' as Christ’s fullness overflows within us. He is the Head '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Source.”
    marker-yv: yv-n
  - type: text
    text: of every kingdom and authority in the universe!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Through our union with him we have experienced circumcision of heart. All of the guilt and power of sin '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “flesh of sin.” The Greek means “body of the natural realm.”
    marker-yv: yv-n
  - type: text
    text: has been cut away and is now extinct because of what Christ, the Anointed One, has accomplished for us.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For we’ve been buried with him into his death. Our “baptism into death” also means we were raised with him when we believed in God’s resurrection power, the power that raised him from death’s realm. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'This “realm of death” describes our former state, for we were held in sin’s grasp. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “the uncircumcision of your flesh.”
    marker-yv: yv-n
  - type: text
    text: But now, we’ve been resurrected out of that “realm of death” never to return, for we are forever alive and forgiven of all our sins!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He canceled out every legal violation we had on our record and the old arrest warrant that stood to indict us. He erased it all—our sins, our stained '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “stained soul” has been erased of its filth. The word “erased” explicitly holds the concept of removal of stains. This would mean the nature of Adam has been erased and the nature of Christ has been embedded into us. We are totally set free from every trace of sin by the power of the blood of Jesus Christ.
    marker-yv: yv-n
  - type: text
    text: 'soul—he deleted it all '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and they cannot be retrieved
  - type: text
    text: '! Everything we once were in Adam '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “from our midst.” This would refer to all that was within us—the core of our past life and its memories of failure and disobedience. A new DNA has been embedded now within us through the cross and resurrection life of Christ.
    marker-yv: yv-n
  - type: text
    text: has been placed onto his cross and nailed permanently there as a public display of cancellation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then Jesus made a public spectacle of all the powers and principalities of darkness, stripping away from them every weapon and all their spiritual authority and power '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “governments and authorities.”
    marker-yv: yv-n
  - type: text
    text: 'to accuse us. And by the power of the cross, Jesus led them around as prisoners in a procession of triumph. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He was not their prisoner; they were his!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied by the obvious irony in the Greek. The Aramaic text has a phrase that is not found in Greek manuscripts. The Aramaic can be translated “having
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: put off his body
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', he stripped principalities and powers and shamed them openly.” This implies that between the day of crucifixion and the day of resurrection while in the spirit-realm, Jesus destroyed death, the powers of darkness, and every work of the enemy through the blood of his cross. All the enemy’s weapons have been stripped away from him and now the church has authority in Christ to enforce this triumph upon the dethroned rulers of this world. However, an alternate translation of the Aramaic could be “after'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sending out his body
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '[apostles, prophets, evangelists, pastors, teachers, believers], they enforced his triumph to all the thrones and authorities, putting them all to public shame by the manifestation of himself [in them].”'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liberty in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'So why would you allow anyone '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic text implies “any unbeliever.”
    marker-yv: yv-n
  - type: text
    text: 'to judge you because of what you eat or drink, or insist that you keep the feasts, observe new moon celebrations, or the Sabbath? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'All of these were but a prophetic shadow and the evidence of what would be fulfilled, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The revelation of the Old Testament is so rich when we understand that its shadow is displaced by the body of Christ, the full revelation of who he is. The shadow only reflects the substance of what has now been fulfilled.
    marker-yv: yv-n
  - type: text
    text: 'for the body '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “substance.”
    marker-yv: yv-n
  - type: text
    text: is now Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Don’t let anyone disqualify you from your prize! Don’t let their pretended sincerity fool you as they deliberately lead you into their initiation of angel worship. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In the first century AD, there was a mystical Jewish religion called Merkabah Mysticism, or Chariot Mysticism, in which the initiate would seek to go into the palace of God through meditation and enter into his chariot-throne. His was the innermost palace of seven concentric heavenly palaces surrounding his chariot-throne. At each “palace” or level there would be a fierce protecting angel, acting as a mediator who had to be placated by angel worship, which would enable the worshiper to enter the next level. There were also ancient polytheistic folk religions that worshiped and invoked angels. These were entirely forbidden paths for believers in Jesus, and Paul warned them of that in this letter.
    marker-yv: yv-n
  - type: text
    text: 'For they take pleasure in pretending to be experts of something they know nothing about. Their reasoning is meaningless and comes only from their own opinions. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They refuse to take hold of the true source.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: But we receive directly from him
  - type: text
    text: ', and his life supplies '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: epichoregeo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which interestingly can be translated as “to lead the chorus,” or “choir director.” It was used to denote a person who paid for the expenses of a Greek drama, and who supplied all their needs throughout its production. Similarly, Jesus tunes us up to heaven’s notes, and draws out of us the melody of his divine symphony. He supplies the music to us, and imparts the wisdom for us to play it under his direction. This is the artful picture of how Jesus orchestrates his body with its many members.'
    marker-yv: yv-n
  - type: text
    text: 'vitality into every part of his body through the joining ligaments connecting us all as one. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: He is the divine Head who guides his body
  - type: text
    text: ' and causes it to grow by the supernatural power of God.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “makes it grow with the discipline from God.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For you were included in the death of Christ and have died with him to the religious system and powers of this world. Don’t retreat back to being bullied by the standards and opinions of religion—
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: it
    children:
    - type: text
      text: for example, their strict requirements
  - type: text
    text: ', “You can’t associate with that person!” or, “Don’t eat that!” or, “You can’t touch that!” '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These are the doctrines of men and corrupt customs that are worthless to help you spiritually. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For though they may appear to possess the promise of wisdom in their submission to God through the deprivation of their physical bodies, it is actually nothing more than empty rules rooted in religious rituals!
