document_id: 2CO.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Greeting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: From Paul to God’s called ones, his church in Corinth.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I have been chosen by Jesus Christ to be his apostle according to God’s perfect plan. Our brother Timothy joins me in writing to you and all the holy believers throughout the Roman province of Achaia. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although this letter was addressed primarily to the Corinthians, it was intended to be read by the churches in southern Greece (Achaia).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May undeserved favor and endless peace be yours continually from our Father God and from our Lord Jesus, the Anointed One!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'All praises belong to the God and Father of our Lord Jesus Christ. For he is the Father of tender mercy and the God of endless comfort. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Unlike Paul’s other letters, he skips over making his customary pleasant greeting to the Corinthians and begins this letter bursting with exuberant praise to God, who had delivered him from all of his painful ordeals. Tender mercy and compassion originate with God. As a kind father has compassion on his children, so God tenderly cares for each one of us. When suffering greets us, the God of mercy sustains us. His comfort is permanent and endless. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 7:18–19
      metadata:
        usfm: MIC.7.18+MIC.7.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He always comes alongside us to comfort us in every suffering so that we can come alongside those who are in any painful trial. We can bring them this same comfort that God has poured out upon us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And just as we experience the abundance of Christ’s own sufferings, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, “the sufferings we endure because of faithfully following Christ.”
    marker-yv: yv-n
  - type: text
    text: even more of God’s comfort will cascade upon us through our union with Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'If troubles weigh us down, that just means that we will receive even more comfort to pass on to you for your deliverance! For the comfort pouring into us empowers us to bring comfort to you. And with this comfort upholding you, you can endure '
  - type: usfm
    marker: it
    children:
    - type: text
      text: victoriously
  - type: text
    text: ' the same suffering that we experience. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Now our hope for you is unshakable, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “firmly guaranteed.”
    marker-yv: yv-n
  - type: text
    text: because we know that just as you share in our sufferings you will also share in God’s comforting strength.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Brothers and sisters, you need to know about the severe trials we experienced while we were in western Turkey. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Asia.” This was not the continent of Asia known today, but the Roman province of Asia comprised of western Turkey.
    marker-yv: yv-n
  - type: text
    text: 'All of the hardships we passed through crushed us beyond our ability to endure, and we were so completely overwhelmed that we were about to give up entirely. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We are not told exactly what overwhelming suffering Paul endured that caused him to write these words with such honest emotion. Some believe he had escaped an assassination attempt or perhaps a mob who had gathered to kill him. Regardless, the sufferings Paul endured were many. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 11:23–33
      metadata:
        usfm: 2CO.11.23+2CO.11.24+2CO.11.25+2CO.11.26+2CO.11.27+2CO.11.28+2CO.11.29+2CO.11.30+2CO.11.31+2CO.11.32+2CO.11.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'It felt like we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek text is extremely emphatic: “It felt like we ourselves, within our very beings, had received the verdict of death!”'
    marker-yv: yv-n
  - type: text
    text: 'had a death sentence written upon our hearts, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and we still feel it to this day
  - type: text
    text: '. It has taught us to lose all faith in ourselves and to place all of our trust in the God who raises the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'He has rescued us from terrifying encounters with death. And now we fasten our hopes on him to continue to deliver us from death yet again, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'as you labor together with us through prayer. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “as you lift up your faces to God in prayer.” Paul knew that intercessory prayer has the power to change the future.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Because there are so many interceding for us
  - type: text
    text: ', our deliverance will cause even more people to give thanks to God. What a gracious gift of mercy surrounds us because of your prayers!'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apostolic Integrity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'We rejoice in saying with complete honesty and a clear conscience '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “indeed, our boasting and the testimony of our conscience.”
    marker-yv: yv-n
  - type: text
    text: 'that God has empowered us to conduct ourselves '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul regularly uses “we” and “our” in 2 Corinthians to refer to apostles and apostolic ministry.
    marker-yv: yv-n
  - type: text
    text: 'in a holy manner and with no hidden agenda. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “We have behaved in the world with holiness and godly sincerity” (Aramaic, “purity”). Our boast and joy in ministry is not what we have done or how many followers we have, but that our conscience is clean and our motives unmixed. Paul is not taking credit for himself but stating clearly that God’s grace was his source of strength and purity.
    marker-yv: yv-n
  - type: text
    text: 'God’s marvelous grace enables us to minister to everyone with pure motives, not in the clever wisdom of the world. This is especially true in all of our dealings with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'We write to you with words that are clearly understood, and there is no need for you to try to read between the lines of what we write in hopes that you can completely and accurately understand '
  - type: usfm
    marker: it
    children:
    - type: text
      text: our hearts
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'We know you have already understood us in a measure and that you will eventually come to understand us fully. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to the end.”
    marker-yv: yv-n
  - type: text
    text: Then you’ll be able to boast of us even as we will boast of you in the day of our Lord Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Explains His Changed Plans
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 15-16
  - type: text
    text: 'With this confidence, I’m wanting to visit you before and after my trip '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Macedonia
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied and made explicit from v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: 2CO.1.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'so that you enjoy a second experience of grace. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a second pleasure.” It is possible Paul is using a figure of speech for his second trip to visit them.
    marker-yv: yv-n
  - type: text
    text: 'Afterward, I’m hoping you will be able to aid me on my journey to Israel. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Judea.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When I revised my itinerary, was I vacillating? Or do I make my plans with unprincipled motives, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “according to the [ways of the] flesh.”
    marker-yv: yv-n
  - type: text
    text: 'ready to flip-flop with a “yes” and a “no” in the same breath? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Of course not!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The change of Paul’s plans was used by his detractors as a sign of him being untrustworthy. But Paul explains that his itinerary change was not an indication of a lack of concern for them, but because he didn’t want to come and have to rebuke them. He wanted to give the Holy Spirit time in their lives to help work out their issues. His longing was to come with joy and to impart his joy to them, rather than causing more pain. This is why he wrote an emotional letter to them pleading with them to change their ways.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For as God is true to his word, my promise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my message.”
    marker-yv: yv-n
  - type: text
    text: 'to you was not a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fickle
  - type: text
    text: ' “yes” when I meant “no.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus Christ is the Son of God, and he is the one whom Timothy, Silas, and I have preached to you—and he has never been both a “yes” and a “no.” He has always been and always will be for us a resounding “YES!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'For all of God’s promises find their “yes” of fulfillment in him. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “All of the kingdoms of God are in him.”
    marker-yv: yv-n
  - type: text
    text: 'And as his “yes” and our “amen” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word for “amen” means “That’s right!”
    marker-yv: yv-n
  - type: text
    text: ascend to God, we bring him glory!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This elliptical sentence could imply the following: (1) It is through Christ that we hear and believe God’s promises and say the declaration of our faith, “Amen,” or (2) it is Christ who speaks through us the “Amen” (of faith).'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Now, it is God himself who has anointed us. And he is constantly strengthening both you and us in union with Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: it
    children:
    - type: text
      text: He knows we are his
  - type: text
    text: ' since he has also stamped his seal of love '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for seal is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sphragizō
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. God has sealed believers with a seven-fold seal: (1) a seal of security, sealed tightly and kept secure in God’s love ('
