document_id: JER.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Right to Judge
  - type: text
    content: “Roam the streets of Jerusalem;
  - type: text
    content: search her streets and public squares,
  - type: text
    content: and note what you see.
  - type: text
    content: See if you can find even one person who pursues justice.
  - type: text
    content: If you find even one acting with integrity,
  - type: text
    content: I will surely spare Jerusalem.
  - type: note
    content: Jeremiah 5 unveils the total depravity of Jerusalem and Judah. One righteous person could not be found. They stubbornly refused to repent (see v. 3); practiced inhuman sexual perversion (see vv. 7–8); rejected the prophet’s warning (see vv. 12–13); and were given over to deceit, oppression, and extortion (see vv. 26–28). The government was rotten, and the people loved it that way (see vv. 30–31). People only wanted false prophecy (see 23:9–40).
  '10':
  - type: text
    content: '“Here is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed:'
  - type: text
    content: ‘I will send your enemies to cut the branches from your vines,
  - type: text
    content: but they won’t destroy them completely.
  - type: text
    content: I will tell them to strip away your branches.
  - type: text
    content: The people of Judah and Israel
  - type: text
    content: have been utterly unfaithful to me
  - type: text
    content: and are no longer mine.’ ”
  '12':
  - type: text
    content: 'They have lied about '
  - type: text
    content: Yahweh
  - type: text
    content: ', saying,'
  - type: text
    content: “No disaster is coming.
  - type: text
    content: We won’t experience sword or famine.
  - type: text
    content: He won’t let anything happen to us.
  '13':
  - type: text
    content: The prophets are full of hot air,
  - type: text
    content: 'and they do not have the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' in them.'
  - type: text
    content: May their threats backfire upon themselves!”
  '14':
  - type: text
    content: Therefore, because the people have spoken these lies,
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Angel Armies, said to me:'
  - type: text
    content: “See! The words I put in your mouth will be as a fire.
  - type: text
    content: My words will consume these people like kindling.
  '15':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to the people of Israel:'
  - type: text
    content: ‘I am stirring up a distant nation,
  - type: text
    content: an ancient, warring nation to attack you.
  - type: text
    content: Her people will speak a language you do not know,
  - type: text
    content: a language you won’t understand.
  - type: note
    content: See Deut. 28:49–52; Isa. 5:26–29; Hab. 1:6–11.
  '16':
  - type: text
    content: The quivers of her mighty warriors
  - type: text
    content: are like a welcoming tomb,
  - type: text
    content: inviting death and destruction,
  - type: text
    content: for all her warriors are proven in battle.
  '17':
  - type: text
    content: They will devour your harvest and your food.
  - type: text
    content: They will devour your sons and your daughters.
  - type: text
    content: They will devour your flocks and your herds,
  - type: text
    content: and devour your vines and your fig trees.
  - type: text
    content: You put your trust in your fortified cities, but they will ransack them
  - type: text
    content: and slaughter the inhabitants.’ ”
  - type: heading
    content: Refusal to Worship Yahweh
  '18':
  - type: text
    content: '“Yet even then,” '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “I will not completely eliminate you. '
  '19':
  - type: text
    content: 'And when people ask you, ‘Why did '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God bring this tragedy upon us?’ You will answer, ‘As you have forsaken '
  - type: text
    content: Yahweh
  - type: text
    content: ' and served foreign gods in your land, so you will serve strangers in a foreign land.’'
  '2':
  - type: text
    content: 'Though they '
  - type: text
    content: take an oath
  - type: text
    content: ', saying,'
  - type: text
    content: '‘As surely as '
  - type: text
    content: Yahweh
  - type: text
    content: ' lives,’'
  - type: text
    content: Yet they are taking my name in vain.”
  '20':
  - type: text
    content: '“Declare this to the descendants of Jacob and spread it throughout Judah:'
  '21':
  - type: text
    content: ‘Pay attention, you foolish and senseless people.
  - type: note
    content: Or “[people] without heart.”
  - type: text
    content: They have eyes but refuse to see.
  - type: text
    content: They have ears but refuse to hear.
  - type: note
    content: See Ps. 115:4–8; Prov. 20:12; Isa. 6:10; Ezek. 12:2; Mark 8:18; Rom. 11:8. The idea is that people become like what they worship. Psalm 115 makes it clear that when people worship idols, they become like them (neither seeing nor hearing). Jeremiah here was echoing this language and reminding the people of this judgment.
  '22':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', am speaking to you.'
  - type: text
    content: Do you not fear?
  - type: text
    content: Do you not tremble in awe in my presence?
  - type: text
    content: I made the sand as a border for the sea,
  - type: text
    content: an ancient barrier that it does not pass.
  - type: text
    content: Though the waves roar and beat against it,
  - type: text
    content: they can neither go beyond it nor break through it.
  - type: note
    content: God was saying to his rebellious people that, just as waves can’t prevail against the shore, they, too, will not succeed in defying him.
  '23':
  - type: text
    content: But these people have stubborn, rebellious hearts.
  - type: text
    content: They all turn aside and go their own way.
  '24':
  - type: text
    content: They never say in their heart,
  - type: text
    content: '“Let us now give reverence to '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God'
  - type: text
    content: 'who gives us showers '
  - type: text
    content: at the time of his favor
  - type: text
    content: ','
  - type: text
    content: the early and latter rain in its season,
  - type: text
    content: 'and '
  - type: text
    content: graciously
  - type: text
    content: ' gives us a harvest each year.”'
  - type: note
    content: Or “the appointed weeks of harvest.”
  '25':
  - type: text
    content: The guilt of your sins has upset nature’s order
  - type: text
    content: 'and withheld my blessings '
  - type: note
    content: Or “withheld the good from you.”
  - type: text
    content: from you.
  - type: text
    content: Your sins have kept these good things from you!’ ”
  - type: heading
    content: The People’s Sins against Others
  '26':
  - type: text
    content: “Lurking among my people are wicked criminals.
  - type: text
    content: They are like hunters hiding to catch birds in their nets,
  - type: note
    content: See Ps. 91:3; Prov. 6:5; Hos. 9:8.
  - type: text
    content: setting their traps to catch people.
  '27':
  - type: text
    content: Like cages full of captured birds,
  - type: text
    content: they fill their houses with lies and deceit.
  - type: note
    content: See Jer. 8:5; 9:6.
  - type: text
    content: This is how they have become rich and powerful,
  '28':
  - type: text
    content: fat and prosperous.
  - type: text
    content: Indeed, their wickedness knows no bounds.
  - type: text
    content: 'There is no '
  - type: text
    content: 'true'
  - type: text
    content: ' justice in their judgments—'
  - type: text
    content: they neither stand up for the rights of the orphans,
  - type: text
    content: nor help the needy receive their fair portion.
  - type: note
    content: God says the poor have rights, and he commands that they receive fair treatment. Every seven years, the poor were to be forgiven their loans (see Deut. 15:1–4). God will come to the help of the righteous poor when there is no one else to defend their rights (see 1 Sam. 2:8; Job 5:15; Ps. 132:15).
  '29':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', promise to hold them accountable for these things.'
  - type: text
    content: I will be justified to punish a nation such as this.
  '3':
  - type: text
    content: Yahweh
  - type: text
    content: ', your eyes search for truth.'
  - type: text
    content: You struck them down,
  - type: text
    content: but they felt no pain.
  - type: text
    content: 'You '
  - type: text
    content: nearly
  - type: text
    content: ' destroyed them,'
  - type: text
    content: but they still refused to accept correction.
  - type: text
    content: 'Their '
  - type: text
    content: stubborn
  - type: text
    content: ' faces hardened like rock;'
  - type: text
    content: they defiantly refused to repent.
  '30':
  - type: text
    content: “A shocking and horrible thing has happened in the land.
  '31':
  - type: text
    content: The prophets prophesy lies,
  - type: note
    content: Or “The prophets prophesy in the name of The Lie [Baal].”
  - type: text
    content: and the priests lead out of their own self-interest.
  - type: text
    content: And my people love it that way.
  - type: text
    content: But what will they do when judgment comes?”
  '4':
  - type: text
    content: I thought, “These poor people are senseless,
  - type: text
    content: for they know neither God’s ways
  - type: text
    content: 'nor the justice of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '5':
  - type: text
    content: Let me go to the people in power,
  - type: text
    content: and let me speak to them.
  - type: text
    content: 'Surely, they must know what '
  - type: text
    content: Yahweh
  - type: text
    content: ' demands'
  - type: text
    content: and what God requires of them.”
  - type: text
    content: Yet they, too, have renounced obedience to God
  - type: text
    content: and have torn themselves away from him.
  - type: note
    content: Or “They have broken the yoke and torn off the yoke straps.” The yoke likely refers to the covenant between God and Israel. They were unwilling to be in covenant with God any longer and refused to follow his ways.
  '6':
  - type: text
    content: Therefore, a lion from the forest will attack them,
  - type: text
    content: and a desert wolf will ravage them.
  - type: text
    content: 'A leopard '
  - type: note
    content: One can interpret these verses, like many others, literally and figuratively. The lion, desert wolf, and leopard are likely metaphors for the coming invaders.
  - type: text
    content: is prowling around their cities,
  - type: text
    content: waiting to tear those apart who venture out.
  - type: text
    content: For the people are rebellious;
  - type: text
    content: they’ve sinned repeatedly.
  '7':
  - type: text
    content: “On what basis can I forgive you?
  - type: text
    content: Your children have forsaken me
  - type: text
    content: and sworn by gods that are not real.
  - type: text
    content: Even though I satisfied my people to the full,
  - type: text
    content: they committed adultery, beating a path to a whorehouse.
  '8':
  - type: text
    content: They’re like well-fed stallions lusting for mares;
  - type: text
    content: each man ‘neighs’ with lust after his neighbor’s wife.
  '9':
  - type: text
    content: Because of these things,
  - type: text
    content: will I not hold my people accountable?
  - type: text
    content: Am I not justified to punish a nation such as this?
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: Rejection of the Message
