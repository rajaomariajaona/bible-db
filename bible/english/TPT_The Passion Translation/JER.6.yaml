document_id: JER.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem Surrounded
  - type: text
    content: “People of Benjamin, flee for your lives!
  - type: note
    content: Jerusalem lies within the original allotment of land assigned to the tribe of Benjamin. In Jer. 4:5–6, Jeremiah told the people to flee to Jerusalem for safety—now even Jerusalem was no longer a safe haven.
  - type: text
    content: Leave Jerusalem!
  - type: text
    content: Blow the shofar to warn the city of Tekoa!
  - type: note
    content: Tekoa, the city of the prophet Amos (see Amos 1:1), lies twelve miles (nineteen kilometers) south of Jerusalem.
  - type: text
    content: 'Send up a smoke signal '
  - type: note
    content: See Judg. 20:38–40.
  - type: text
    content: at Beth Hakkerem!
  - type: note
    content: Or “house of the vineyard.” Some identify Beth Hakkerem with Ein Kerem, while others place it south of Jerusalem, at Ramat Rachel, where ancient cairns were discovered on the ridge that may have served as beacons of old.
  - type: text
    content: For disaster looms out of the north,
  - type: text
    content: 'a great destruction '
  - type: text
    content: threatens you
  - type: text
    content: .
  '10':
  - type: text
    content: 'If I speak to warn '
  - type: text
    content: the remnant of Israel
  - type: text
    content: ', no one will listen.'
  - type: text
    content: Their ears are blocked,
  - type: note
    content: Or “their ears are uncircumcised.”
  - type: text
    content: and they are incapable of hearing.
  - type: text
    content: 'The word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' has become an object of scorn;'
  - type: text
    content: it’s no longer a pleasure for them.
  '11':
  - type: text
    content: 'The fury of '
  - type: text
    content: Yahweh
  - type: text
    content: ' has filled me,'
  - type: text
    content: and I am weary of trying to hold it in.
  - type: text
    content: '“Pour it out on every child '
  - type: text
    content: playing
  - type: text
    content: ' in the street,'
  - type: text
    content: on the young men gathered there.
  - type: text
    content: Women and men alike will be taken captive,
  - type: text
    content: both
  - type: text
    content: ' the middle aged and those advanced in years.'
  '12':
  - type: text
    content: Strangers will seize their homes,
  - type: text
    content: their fields, and their wives.
  - type: text
    content: For I will stretch out my hand
  - type: text
    content: against the inhabitants of the land.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: No Peace
  '13':
  - type: text
    content: “From the smallest to the greatest,
  - type: text
    content: they are greedy for corrupt profits;
  - type: note
    content: Or “they all shave off a profit [take their cut].”
  - type: text
    content: prophet and priest alike, they all practice deceit.
  '14':
  - type: text
    content: 'They '
  - type: note
    content: “They” refers to the prophets and priests in v. 13.
  - type: text
    content: treat the wounds of my people
  - type: text
    content: as though they were scratches.
  - type: text
    content: They say, ‘Peace, everything is well,’
  - type: text
    content: when there is no peace, and nothing is well.
  '15':
  - type: text
    content: Although they have acted shamefully
  - type: text
    content: and committed abhorrent acts,
  - type: text
    content: they feel no shame;
  - type: text
    content: they don’t even know how to blush.
  - type: text
    content: They will fall among the fallen
  - type: text
    content: and stumble in their time of reckoning,
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: Find a Resting Place
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' said to his people:'
  - type: text
    content: “Stand at the crossroads.
  - type: text
    content: 'Now, consider '
  - type: text
    content: your ways
  - type: text
    content: and ask for the ancient paths.
  - type: note
    content: “The ancient [everlasting] paths” are paths of wisdom. Embrace God’s ways of wisdom! See Prov. 8:1–35. We are to ask for, inquire after, and walk in the good paths of faith and holiness prescribed in God’s Word. When everyone is seeking the “newest” thing, God reminds us to ask for the ancient paths that lead us to God. Jesus, in a New Testament sense, is the personification of that ancient, everlasting path.
  - type: text
    content: Which is God’s way?
  - type: note
    content: One can translate the Hebrew phrase derek hattob as “the way of the Good One” or “the good way.” The Hebrew word for “good” (tob) means “happy,” “joyful,” “cheery,” “pleasant,” “desirable,” “agreeable,” “sweet,” and “giving pleasure or happiness.” All these possible translations describe what choosing wisdom will impart to us. The Good Way is Jesus Christ (see John 14:6).
  - type: text
    content: Walk on his path, and you’ll enjoy a resting place for yourselves.
  - type: note
    content: Following the way of the Good One will bring you to the resting place of his love. See Ps. 23:2; Matt. 11:28–29 (Jesus quoted part of Jer. 6:16).
  - type: text
    content: 'But they said, ‘We will not. '
  - type: text
    content: That’s not the path we want.
  - type: text
    content: ’ ”
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: said
  - type: text
    content: ','
  - type: text
    content: '“I raised up prophetic watchmen '
  - type: note
    content: See Ezek. 3:17–21; 33:7; Hos. 9:8. The elders of the city posted watchmen on the city wall to warn when an enemy approached. If the city was in danger of attack, the watchmen would command the blowing of the shofar to warn the people. In this context, the “watchmen” are the numerous prophets God had sent to Israel over the years.
  - type: text
    content: 'to warn you:'
  - type: text
    content: ‘Pay attention to the sound of the shofar!’
  - type: text
    content: Still, they replied, ‘We will not.’
  '18':
  - type: text
    content: Hear well then, O nations,
  - type: text
    content: and observe as witnesses what’s in store for them.
  - type: note
    content: Or “take note, all you who witness it, of what is among people.” This verse is one of the most problematic in Jeremiah to translate.
  '19':
  - type: text
    content: Hear, O earth! I am bringing a catastrophe to these people,
  - type: text
    content: the fruit of their own evil schemes.
  - type: note
    content: Or “it is the consequence of their own plans.” See Prov. 1:31; Isa. 3:10; Jer. 17:10; 21:14; 32:19.
  - type: text
    content: For they refused to listen to my words,
  - type: text
    content: 'and threw all my instructions '
  - type: note
    content: Or “Torah.” God also specifically gave his words to Jeremiah (see 1:9; 5:14). The people rejected the words God spoke through his prophet.
  - type: text
    content: and warnings to the wind.”
  - type: heading
    content: Obedience Greater than Sacrifice
  '2':
  - type: text
    content: 'Daughter Zion, '
  - type: note
    content: That is, Jerusalem.
  - type: text
    content: you are so lovely and delicate,
  - type: text
    content: 'but I will destroy '
  - type: note
    content: The Hebrew verb for “destroy” may also mean “be like” or “resemble.”
  - type: text
    content: you.
  '20':
  - type: text
    content: “What use to me is all this frankincense
  - type: note
    content: 'Frankincense comes from a resin from Boswellia trees native to northeastern Africa and the Arabian Peninsula (see Michael Zohary, Plants of the Bible [Cambridge: Cambridge University Press, 1982], 197; Philip J. King, Jeremiah: An Archaeological Companion [Louisville: Westminster John Knox Press, 1993], 112–13; The Committee on Translations of the United Bible Societies, Fauna and Flora of the Bible [New York: United Bible Societies, 1980], 121–22). See also Ex. 30:34; Isa. 60:6; Matt. 2:11.'
  - type: text
    content: that you’ve imported from Sheba
  - type: note
    content: Sheba, or Saba, is in southwest Arabia (modern Yemen) and was known for its perfume traders.
  - type: text
    content: and all these exotic spices from distant lands?
  - type: note
    content: Or “sweet cane [calamus].” Both frankincense and calamus were rare and costly spices that were ingredients for the sacred anointing oil (see Ex. 30:23–25). Many believe with Jerome that “distant lands” refers to India (see Commentary on Jeremiah). See also Fauna and Flora of the Bible, 171–74.
  - type: text
    content: I will not accept your burnt offerings;
  - type: note
    content: See 1 Sam. 15:22; Isa. 1:11; Hos. 6:6; 8:13; 9:4; Amos 4:4; 5:22.
  - type: text
    content: the aroma of
  - type: text
    content: ' your sacrifices is no longer sweet to me.”'
  '21':
  - type: text
    content: 'So this is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has said:'
  - type: text
    content: “I will put obstacles before these people,
  - type: text
    content: and they will stumble and fall over them.
  - type: note
    content: Perhaps the obstacles were of their own making (their own apostasies); or he was just referring to the invaders who were threatening them from the north.
  - type: text
    content: Fathers and children,
  - type: text
    content: neighbors and friends,
  - type: text
    content: all will die.”
  - type: heading
    content: Invasion from the North
  '22':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' has said:'
  - type: text
    content: “Look! They’re coming! Warriors approach from the north.
  - type: note
    content: That is, from the land of Babylon. See Hab. 1:6–8.
  - type: text
    content: From the remote parts of the earth,
  - type: text
    content: a great nation is preparing for war.
  '23':
  - type: text
    content: Armed with bows and spears,
  - type: note
    content: Or “scimitars.”
  - type: text
    content: they are merciless and cruel.
  - type: text
    content: The sound of their armies riding their horses
  - type: text
    content: is like the roaring sea.
  - type: text
    content: The cavalry is formed for battle
  - type: text
    content: and ready to attack you, O Fair Zion!”
  - type: note
    content: Or “O, Daughter of Zion.” See v. 2.
  '24':
  - type: text
    content: The people say
  - type: text
    content: ': “We have heard the news, and our strength fails.'
  - type: text
    content: Like a woman in childbirth, we are in agony,
  - type: text
    content: seized with pain.
  '25':
  - type: text
    content: Don’t go out into the field;
  - type: text
    content: stay off the streets!
  - type: text
    content: For our enemies are armed,
  - type: text
    content: and there is terror on every side.”
  '26':
  - type: text
    content: 'My dear people, '
  - type: text
    content: it’s time to mourn
  - type: text
    content: .
  - type: text
    content: Put on sackcloth
  - type: text
    content: and sprinkle ashes on yourselves.
  - type: text
    content: Mourn as you would for an only child.
  - type: text
    content: Wail bitterly,
  - type: text
    content: 'for suddenly the destroyer '
  - type: note
    content: Or “misery” (LXX).
  - type: text
    content: will be upon us.
  '27':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: said to me
  - type: text
    content: ':'
  - type: text
    content: “I have made you as one who tests metals among my people.
  - type: text
    content: In the same way a person tests metal
  - type: text
    content: ','
  - type: text
    content: you will perceive and test their ways.
  '28':
  - type: text
    content: They are the most stubborn of rebels.
  - type: text
    content: Each one spreads slander and practices dishonesty.
  - type: text
    content: They are as hard as bronze and iron.
  '29':
  - type: text
    content: Though the bellows blow fiercely,
  - type: text
    content: yet the smelter smelts to no avail.
  - type: text
    content: Fire melts and burns away the lead,
  - type: text
    content: 'but '
  - type: text
    content: my refining fire
  - type: text
    content: ' fails to separate'
  - type: text
    content: the dross of their wickedness.
  '3':
  - type: text
    content: As shepherds pasture many flocks all around a city,
  - type: text
    content: 'so the camps of '
  - type: text
    content: enemy
  - type: text
    content: ' soldiers encircle you,'
  - type: text
    content: like many flocks of grazing sheep.
  '30':
  - type: text
    content: They are called ‘rejected silver,’
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has rejected them.”'
  '4':
  - type: text
    content: In the morning, the soldiers will say
  - type: text
    content: ','
  - type: text
    content: ‘Come on, prepare for war!
  - type: text
    content: We attack Jerusalem at noon!’
  - type: text
    content: But later, as the sun grows hot, they will complain,
  - type: text
    content: ‘Woe to us, for the day is fading,
  - type: text
    content: and the shadows of evening grow long.
  '5':
  - type: text
    content: 'Arise, let us go up '
  - type: note
    content: There is sarcasm here. The phrase “Arise, let us go up” is normally used by those making a pilgrimage to Jerusalem. Israel’s enemies now use it. They are coming not to worship but to destroy.
  - type: text
    content: and attack tonight,
  - type: text
    content: then we will easily destroy her strongholds.’ ”
  '6':
  - type: text
    content: 'Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says:'
  - type: text
    content: “Cut down the trees
  - type: text
    content: and set up a siege ramp against Jerusalem.
  - type: note
    content: God gave the opposing armies his strategy for how to conquer Jerusalem.
  - type: text
    content: This is a city ripe for punishment
  - type: text
    content: because she is riddled with brutal oppression.
  '7':
  - type: text
    content: As a spring pours out its fresh water,
  - type: text
    content: so she pours out her fresh evil.
  - type: text
    content: All I see are the sick and wounded;
  - type: text
    content: 'the violence and destruction '
  - type: note
    content: See Hab. 1:3.
  - type: text
    content: within her cry out.
  '8':
  - type: text
    content: Learn your lesson, Jerusalem,
  - type: text
    content: lest I turn my back on you in disgust
  - type: text
    content: and make the whole land desolate,
  - type: text
    content: a land where no one lives!”
  - type: heading
    content: Rebellious Israel
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies, says:'
  - type: text
    content: '“As one gleans '
  - type: text
    content: the grapes that remain
  - type: text
    content: ' in a vineyard,'
  - type: text
    content: those who remain of Israel will be gleaned.
  - type: text
    content: As the hand of the grape gatherer goes through the vines one last time,
  - type: text
    content: the Babylonians
  - type: text
    content: ' will glean what '
  - type: text
    content: the Assyrians
  - type: text
    content: ' leave behind.”'
  - type: note
    content: Or “so, pass your hand over its branches [possibly “baskets”].” Yahweh told Israel that the Babylonians would be coming twice. First, to glean the remnant that survives the Assyrian invasion (harvest) of the Northern Kingdom of Israel in 722 BC and the second time, to reap its harvest of Judah twenty years later, in the overwhelming campaign of Sennacherib (see 50:17).
