document_id: JHN.2,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Comes to a Wedding
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now on the third day, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a Tuesday as counted by the Hebrew week beginning on Sunday. The “third day” was chosen as the wedding day in ancient Judaism because it is only on the third day of creation that God said “It was good” twice (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Thus, the Jews considered the day twice blessed. Tuesdays were ideal for Jewish weddings, for that gave the guests time to get there after the Sabbath and remain for the multiple days of the wedding feast. The third day is also a picture of the day of resurrection glory, the day Jesus rose from the dead. This miracle is a revelation of moving from death to resurrection life, water to wine.
      marker-yv: yv-n
    - type: text
      text: 'Jesus’ mother went to a wedding feast in the Galilean village of Cana. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cana means “land of reeds,” which points to the weak and fragile nature of man. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 42:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and said to him, “Every host serves his best wine first, until everyone has had a cup or two, then he serves the cheaper wine. But you, my friend, you’ve reserved the most exquisite wine until now!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jesus delights in your joy more than you know. He does not withhold joy from his people. He created between 120 and 150 gallons of the very best wine for a wedding feast! This was one of five miracles that are unique to John’s Gospel. The other four are: healing the rich man’s son ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), healing the crippled man at Bethesda (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), healing the blind man (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and raising Lazarus from the dead (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'This miracle in Cana was the first of the many extraordinary miracles Jesus performed in Galilee that revealed his glory, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Chapters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: could rightly be called “The Book of Signs,” and chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 13–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “The Book of Glories.”
      marker-yv: yv-n
    - type: text
      text: and his disciples believed in him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The disciples made known his glory and believed in him.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus at the Temple
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'After the wedding, Jesus, his mother and brothers, and his disciples traveled to Capernaum '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Capernaum means “the village of Nahum” which in turn means “the village of the comforted.” Jesus did many miracles and made his Galilean base of ministry in “the village of the comforted.”
      marker-yv: yv-n
    - type: text
      text: 'and stayed there for a few days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'When the time was close for the Jewish Passover to begin, Jesus walked to Jerusalem. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From Capernaum to Jerusalem was a journey of nearly one hundred miles.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'As he went into the temple courtyard, he noticed it was filled with merchants selling oxen, lambs, and doves '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for exorbitant prices
    - type: text
      text: ', while others were overcharging as they exchanged currency '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These money changers would exchange Roman currency into Jewish currency to pay the temple tax. The leadership of the temple considered the Roman currency to be unclean, so the money changers had a captive audience.
      marker-yv: yv-n
    - type: text
      text: 'behind their counters. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So Jesus found some cords and made them into a whip. Then he drove out every one of them and their animals from the courtyard of the temple, and he kicked over their tables filled with money, scattering it everywhere! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus came to sacrifice his life, which would end animal sacrifices and the financial tyranny of religion.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And he told the merchants, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the dove dealers.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get these things out of here! Don’t you dare commercialize my Father’s house!”
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'That’s when his disciples remembered the Scripture: “I am consumed with a fiery passion to keep your house pure!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 69:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Then the Jewish religious leaders challenged Jesus, “What authority do you have to do this sort of thing and what '
    - type: usfm
      marker: it
      children:
      - type: text
        text: supernatural
    - type: text
      text: ' sign will you show us to prove it?”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Destroy this temple,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sanctuary.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and I will raise it up again in three days.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 2-3
    - type: text
      text: 'Jesus and his disciples were all invited to the banquet, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This wedding likely involved someone of Jesus’ family since Mary and all his disciples were also in attendance. A Near Eastern wedding would often last between three and seven days.
      marker-yv: yv-n
    - type: text
      text: 'but with so many guests, they ran out of wine. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Interpreting Mary’s words for today we could say, “Religion has failed, it has run out of wine.” The traditions of religion cannot gladden the heart, but Jesus can (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 104:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Moses (the law) turned water into blood, but Jesus (grace) turned water into wine.
      marker-yv: yv-n
    - type: text
      text: 'And when Mary realized it, she came to Jesus and asked, “They have no wine; '
    - type: usfm
      marker: it
      children:
      - type: text
        text: can’t you do something about it
    - type: text
      text: ?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a dilemma that Mary is hoping Jesus will solve by performing a miracle. Mary had no doubt about the power and anointing of her Son. Running out of wine is a picture of how the joy of this world runs out and fades away.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Then the Jewish leaders sneered at Jesus’ answer, “This temple took forty-six years '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Our bodies (temples) have forty-six chromosomes in every cell.
      marker-yv: yv-n
    - type: text
      text: 'to build, and you mean to tell us that you will raise it up in three days?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: it
      children:
      - type: text
        text: But they failed to understand that
    - type: text
      text: ' Jesus was speaking of the “temple” of his body. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Resurrection power would be the sign of his supreme authority. Jesus’ death and resurrection effectively dismantled the need for the temple, for now his powerful gospel of the kingdom realm has built us into a holy temple not made with hands. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 14:58
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 6:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus’ symbolic form of speaking was so different than the teachings of the Pharisees, as it is to the understanding of many Christians today. The God who was once worshiped by animal sacrifices is now to be worshiped in spirit and truth, and every believer serves as a priest.
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The disciples remembered his prophecy after Jesus rose from the dead, and believed both the Scripture and what Jesus had said.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'While Jesus was at the Passover Feast, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the number of his followers began to grow
    - type: text
      text: ', and many gave their allegiance to him because of all the miraculous signs they had seen him doing! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But Jesus did not yet entrust himself to them, because he knew how fickle human hearts can be. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: He needed no one to tell him about human nature, for he fully understood what man was capable of doing.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My dear one, don’t you understand that if I do this, it will change nothing for you, but it will change everything for me!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “Woman, what is that for you and for me?” This is an Aramaic idiom meaning, “What do we have in common if I do this?” For Mary, it would change very little, but for Jesus, this would be his first public miracle and would dramatically change his ministry from that moment on because the crowds would see the power that he possessed. Jesus knew his miracle ministry would “come out of hiding” by performing a miracle. Yet with Mary’s encouragement, Jesus proceeded to do just that.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My hour
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: of unveiling my power
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has not yet come.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mary then went to the servers and told them, “Whatever Jesus tells you, do it!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nearby stood six stone water pots '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Six is the number for man, for man was made on the sixth day. These six stone jars could represent man’s method of helping others. It is nothing but water. But Jesus changes the water of the Word of God into the wine of the Spirit. True spiritual life can fill our vessel as we bring joy to the world. The fruit of the Spirit includes joy, and there is no limit to the joy available for the child of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 5:22–23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'meant to be used for the Jewish washing rituals. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was an outward purification (baptism) for worshipers coming into a synagogue.
      marker-yv: yv-n
    - type: text
      text: 'Each one could hold about twenty gallons or more. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jesus came to the servers and instructed them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Fill the
    - type: text
      text: ' '
    - type: usfm
