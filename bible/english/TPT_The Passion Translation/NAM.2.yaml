document_id: NAM.2,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Siege of Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nineveh, an attacker '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the scatterer.”
      marker-yv: yv-n
    - type: text
      text: is poised to advance against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Place your guards along the top of the walls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: set lookouts on the road.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Go ahead
    - type: text
      text: ', get ready for battle;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'gather all your forces, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “make strength exceedingly firm.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: but it will be in vain
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Desolation! Devastation! Destruction!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hearts melting, knees knocking,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'stomachs churning, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “all the loins are shaking.”
      marker-yv: yv-n
    - type: text
      text: faces turning pale.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: What has happened now to the lions’ den
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The lion was a common emblem of Assyrian culture; thus the city of Nineveh is described metaphorically as a lions’ den.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'where the fierce lions '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “young lions,” a metaphor for the Assyrian soldiers.
      marker-yv: yv-n
    - type: text
      text: were fed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where the lion and lioness once lived,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “where the lion brought his prey.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where the cubs frolicked, cozy and fearless?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Like a lion, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Assyria
    - type: text
      text: ' once killed his prey'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and tore it to pieces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filling his cave with meat
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for his mate and her cubs.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Behold, I am your enemy,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will burn your chariots to ashes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the sword will slaughter your young lions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No longer will you prey upon the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and your messengers will announce no more '
    - type: usfm
      marker: it
      children:
      - type: text
        text: victories
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is about to restore the majesty of Jacob'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Israel her glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have plundered everything
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and ruined their vineyards.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The ten northern tribes were the victims of scorched-earth warfare by the Assyrians, who were ruling the remaining peasants with a rod of iron. This judgment is God avenging the destruction of the Northern Kingdom (Jacob/Israel) in 722 BC.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: it
      children:
      - type: text
        text: invading
    - type: text
      text: ' soldiers’ shields are scarlet,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each warrior robed in red.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Medes and Babylonians who captured Nineveh were noted for wearing red uniforms (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 23:14–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The metal of the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Babylonian
    - type: text
      text: ' chariots gleams like fire'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'on the day they are made ready '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for battle
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and the wooden spears are brandished '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in anticipation
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “their horses quiver with excitement” (LXX).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'The chariots race madly through the streets '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of Nineveh
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they dash wildly through the public squares,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gleaming like torches, darting like lightning.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: it
      children:
      - type: text
        text: The king of Assyria
    - type: text
      text: ' summons his elite commanders,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they stumble while attempting to advance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The attackers run swiftly to the city wall;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the protective canopy for the battering ram is set up.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The floodgates are opened;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Archaeologists have discovered sluice gates and dams around Nineveh to control the river waters that flowed through the city. See R. C. Thompson and R. W. Hutchinson,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: A Century of Exploration at Nineveh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(London: Luzac, 1929), 120–32.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the royal palace is inundated '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by the surging torrent
    - type: text
      text: ' and collapses.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nineveh
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Its mistress,” a hapax legomenon. This is the Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hutsab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which may be the name of the queen of Nineveh or a name for the goddess Ishtar worshiped in Assyria. There is no scholarly consensus on its actual meaning.'
      marker-yv: yv-n
    - type: text
      text: is stripped, taken captive, and carried into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her maidservants moan like doves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and beat their breasts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in sorrow
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: has several translation difficulties with a number of possible emendations.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: it
      children:
      - type: text
        text: The people rush out of
    - type: text
      text: ' Nineveh'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like water pours out of a broken dam.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Nineveh is like a pool, and its waters are draining away.” However, this clause, in the context of the imminent destruction of the city, is most likely a metaphorical expression for the terror-stricken Ninevites fleeing the city as fast as they can.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The officers shout
    - type: text
      text: ', “Stop! Stop!”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but no one turns back.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Plunder the silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plunder the gold!
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Look!
    - type: text
      text: ' There is no end of the treasure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “store,” denoting the hoarding of a vast quantity of treasure.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heaps of every precious thing.
