document_id: NAM.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Siege of Nineveh
  - type: text
    content: 'Nineveh, an attacker '
  - type: note
    content: Or “the scatterer.”
  - type: text
    content: is poised to advance against you.
  - type: text
    content: Place your guards along the top of the walls;
  - type: text
    content: set lookouts on the road.
  - type: text
    content: Go ahead
  - type: text
    content: ', get ready for battle;'
  - type: text
    content: 'gather all your forces, '
  - type: note
    content: Or “make strength exceedingly firm.”
  - type: text
    content: but it will be in vain
  - type: text
    content: .
  '10':
  - type: text
    content: Desolation! Devastation! Destruction!
  - type: text
    content: Hearts melting, knees knocking,
  - type: text
    content: 'stomachs churning, '
  - type: note
    content: Or “all the loins are shaking.”
  - type: text
    content: faces turning pale.
  '11':
  - type: text
    content: What has happened now to the lions’ den
  - type: note
    content: The lion was a common emblem of Assyrian culture; thus the city of Nineveh is described metaphorically as a lions’ den.
  - type: text
    content: 'where the fierce lions '
  - type: note
    content: Or “young lions,” a metaphor for the Assyrian soldiers.
  - type: text
    content: were fed,
  - type: text
    content: where the lion and lioness once lived,
  - type: note
    content: Or “where the lion brought his prey.”
  - type: text
    content: where the cubs frolicked, cozy and fearless?
  '12':
  - type: text
    content: 'Like a lion, '
  - type: text
    content: Assyria
  - type: text
    content: ' once killed his prey'
  - type: text
    content: and tore it to pieces,
  - type: text
    content: filling his cave with meat
  - type: text
    content: for his mate and her cubs.
  '13':
  - type: text
    content: '“Behold, I am your enemy,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: “I will burn your chariots to ashes,
  - type: text
    content: and the sword will slaughter your young lions.
  - type: text
    content: No longer will you prey upon the land,
  - type: text
    content: 'and your messengers will announce no more '
  - type: text
    content: victories
  - type: text
    content: .”
  '2':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is about to restore the majesty of Jacob'
  - type: text
    content: and Israel her glory.
  - type: text
    content: For you have plundered everything
  - type: text
    content: and ruined their vineyards.
  - type: note
    content: The ten northern tribes were the victims of scorched-earth warfare by the Assyrians, who were ruling the remaining peasants with a rod of iron. This judgment is God avenging the destruction of the Northern Kingdom (Jacob/Israel) in 722 BC.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: invading
  - type: text
    content: ' soldiers’ shields are scarlet,'
  - type: text
    content: each warrior robed in red.
  - type: note
    content: The Medes and Babylonians who captured Nineveh were noted for wearing red uniforms (see Ezek. 23:14–15).
  - type: text
    content: 'The metal of the '
  - type: text
    content: Babylonian
  - type: text
    content: ' chariots gleams like fire'
  - type: text
    content: 'on the day they are made ready '
  - type: text
    content: for battle
  - type: text
    content: ','
  - type: text
    content: 'and the wooden spears are brandished '
  - type: text
    content: in anticipation
  - type: text
    content: .
  - type: note
    content: Or “their horses quiver with excitement” (LXX).
  '4':
  - type: text
    content: 'The chariots race madly through the streets '
  - type: text
    content: of Nineveh
  - type: text
    content: ;
  - type: text
    content: they dash wildly through the public squares,
  - type: text
    content: gleaming like torches, darting like lightning.
  '5':
  - type: text
    content: The king of Assyria
  - type: text
    content: ' summons his elite commanders,'
  - type: text
    content: but they stumble while attempting to advance.
  - type: text
    content: The attackers run swiftly to the city wall;
  - type: text
    content: the protective canopy for the battering ram is set up.
  '6':
  - type: text
    content: The floodgates are opened;
  - type: note
    content: 'Archaeologists have discovered sluice gates and dams around Nineveh to control the river waters that flowed through the city. See R. C. Thompson and R. W. Hutchinson, A Century of Exploration at Nineveh (London: Luzac, 1929), 120–32.'
  - type: text
    content: 'the royal palace is inundated '
  - type: text
    content: by the surging torrent
  - type: text
    content: ' and collapses.'
  '7':
  - type: text
    content: Nineveh
  - type: text
    content: ' '
  - type: note
    content: Or “Its mistress,” a hapax legomenon. This is the Hebrew word hutsab, which may be the name of the queen of Nineveh or a name for the goddess Ishtar worshiped in Assyria. There is no scholarly consensus on its actual meaning.
  - type: text
    content: is stripped, taken captive, and carried into exile.
  - type: text
    content: Her maidservants moan like doves
  - type: text
    content: 'and beat their breasts '
  - type: text
    content: in sorrow
  - type: text
    content: .
  - type: note
    content: Verse 7 has several translation difficulties with a number of possible emendations.
  '8':
  - type: text
    content: The people rush out of
  - type: text
    content: ' Nineveh'
  - type: text
    content: like water pours out of a broken dam.
  - type: note
    content: Or “Nineveh is like a pool, and its waters are draining away.” However, this clause, in the context of the imminent destruction of the city, is most likely a metaphorical expression for the terror-stricken Ninevites fleeing the city as fast as they can.
  - type: text
    content: The officers shout
  - type: text
    content: ', “Stop! Stop!”'
  - type: text
    content: but no one turns back.
  '9':
  - type: text
    content: Plunder the silver,
  - type: text
    content: plunder the gold!
  - type: text
    content: Look!
  - type: text
    content: ' There is no end of the treasure '
  - type: note
    content: Or literally “store,” denoting the hoarding of a vast quantity of treasure.
  - type: text
    content: —
  - type: text
    content: heaps of every precious thing.
