  - type: heading
    content: God’s Mercy Greater than Man’s
  '6':
  - type: text
    content: 'Seek '
  - type: note
    content: “Seek” (Hb. daresh) has the idea of visiting frequently more than trying to find something.
  - type: text
    content: 'the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' when he makes himself approachable;'
  - type: note
    content: 'Or “while he lets himself be found.” See 1 Tim. 6:16: “the immortal God, living in the unapproachable light of divine glory!” In Jesus, the Anointed One, God makes himself approachable (see 1 Tim. 2:5). This is the Hebrew word ehimase’u, a Niphal infinitive. It has the idea of obtaining or finding knowledge. The infinitive form would suggest an overwhelming amount or an abundance of knowledge can be found.'
  - type: text
    content: 'call '
  - type: note
    content: The Hebrew word for “call” is qara’, which has two meanings. One is “to call or shout,” the other is “to fall into.” So this could be read “Fall into him while he is near.”
  - type: text
    content: 'upon him when '
  - type: text
    content: you sense
  - type: text
    content: ' he is near.'
  '7':
  - type: text
    content: The wicked need to abandon their ways,
  - type: text
    content: and sinful ones need to banish every evil thought.
  - type: note
    content: See 2 Cor. 10:3–6.
  - type: text
    content: 'Let them return to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and they will experience his compassionate mercy.
  - type: text
    content: Yes, let them return to God,
  - type: text
    content: for he will lavish forgiveness upon them.
  '8':
  - type: text
    content: '“For my thoughts '
  - type: text
    content: about mercy
  - type: text
    content: ' '
  - type: note
    content: In the context, the thoughts of God refer to his compassion, mercy, and forgiveness. Man’s thoughts of mercy are not God’s. Man’s mercy runs out, but God’s mercy is higher than the heavens. God’s mercy and forgiveness are generous and abundant.
  - type: text
    content: are not like your thoughts,
  - type: text
    content: and my ways are different from yours.
  '9':
  - type: text
    content: As high as the heavens are above the earth,
  - type: text
    content: so my ways and my thoughts are higher than yours.
