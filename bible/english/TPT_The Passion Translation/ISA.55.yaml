  '10':
  - type: text
    content: “As the snow and rain that fall from heaven
  - type: note
    content: 'In the language of biblical metaphor, snow is a picture of mercy blanketing the earth. Rain is a frequent symbol of revelation-teaching that soaks the heart (soil) and makes us fruitful. Note the six terms for God’s Word in vv. 8–10: thoughts, ways, snow, rain, seed, bread. These same terms can be used to describe the Lord Jesus. He is the seed of the woman, living Bread, the Way and the Life that sprouts in us. He is the Word that was sent (as our Apostle; see Heb. 3:1), and he will not return to heaven without accomplishing all God’s pleasure.'
  - type: text
    content: do not return until they have accomplished their purpose,
  - type: text
    content: soaking the earth and causing it to sprout with new life,
  - type: text
    content: providing seed to sow and bread to eat.
  '11':
  - type: text
    content: 'So also will be the word '
  - type: note
    content: In the context, God’s word is his promise to show love, compassion, and forgiveness to all who turn to him.
  - type: text
    content: that I speak;
  - type: text
    content: it does not return to me unfulfilled.
  - type: note
    content: Or “empty.”
  - type: text
    content: My word performs my purpose
  - type: text
    content: and fulfills the mission I sent it out to accomplish.”
  - type: note
    content: 'The Septuagint adds a phrase not found in the Hebrew: “And I will make your way prosperous.”'
  '12':
  - type: text
    content: 'For you will leave '
  - type: text
    content: your exile
  - type: text
