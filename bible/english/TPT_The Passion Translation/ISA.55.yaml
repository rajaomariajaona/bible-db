      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the language of biblical metaphor, snow is a picture of mercy blanketing the earth. Rain is a frequent symbol of revelation-teaching that soaks the heart (soil) and makes us fruitful. Note the six terms for God’s Word in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ': thoughts, ways, snow, rain, seed, bread. These same terms can be used to describe the Lord Jesus. He is the seed of the woman, living Bread, the Way and the Life that sprouts in us. He is the Word that was sent (as our Apostle; see'
