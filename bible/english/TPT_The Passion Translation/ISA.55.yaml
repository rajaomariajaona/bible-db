  - type: text
    content: ' in peace.'
  - type: text
    content: The mountains and hills in front of you will burst into singing
  - type: text
    content: and the trees of the field will applaud!
  - type: note
    content: Isaiah was a master poet. With beautiful metaphors he described the return of God’s people out of captivity. What once limited God’s people as a barrier (mountains and hills) now celebrates with singing as the redeemed leave their captivity and come into God’s full purpose for them. See Rom. 8:19–21.
  '13':
  - type: text
    content: Cypress trees will flourish where there were only thorns
  - type: note
    content: Thorns are a symbol of the curse of sin. See Gen. 3:18; Matt. 27:29; Gal. 3:13–14.
  - type: text
    content: and myrtle trees instead of briars.
  - type: note
    content: There is a hint of the Lord Jesus in these trees. Jesus is the blessed man who is like a tree (see Ps. 1); he replaces the briars and thorns of our flesh with the flourishing Tree of Life in us.
  - type: text
    content: 'These will stand as a testimony to '
  - type: text
    content: Yahweh
  - type: text
    content: ’s renown,
  - type: text
    content: 'everlasting signs '
  - type: note
    content: Or “a memorial [as a reminder].”
  - type: text
    content: that will not be cut off.
