    - type: text
      text: '8'
  - type: text
    text: 'So Abram said to Lot, “Let’s not quarrel with each other, or between our herdsmen, since we are relatives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Look at the vast land that is in front of you! Let’s settle in different regions. If you choose the land on the left, then I’ll go right, and if you want land on the right, then I’ll go left.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lot lifted his eyes and carefully surveyed the land around him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 13:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Lot lifted up his eyes.” When Abram offered the choice to Lot, he should have said, “Uncle, I choose you. God is with you. My choice is your choice.” Every young person likes to be separated from the older generation. Lot missed the will of God by separating from the called one, Abram. There is protection, covering, and anointing when we walk with those who walk with God. Our flesh would rather “do it on our own,” but God’s way is to walk in fellowship with called ones. The meaning of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Lot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is “covert,” “secret,” or “concealed.” Everything about Lot was hidden away in his heart. Compromise was a way of life for him. The secret tug of the world drew him away from the place of blessing. He had never really left Ur; he was still an idolater at heart. When he chose the rich plains, he was looking for the closest thing that resembled Egypt. He chose what would please him without considering the consequences. Lot’s possessions were eventually burned in the fires of judgment, and he ended up living in a cave.
    marker-yv: yv-n
