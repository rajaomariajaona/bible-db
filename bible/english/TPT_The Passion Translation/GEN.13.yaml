      - type: text
        text: 13:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The implication is that grazing rights were in dispute between all four parties (Abraham, Lot, the Canaanites, and the Perizzites).
    marker-yv: yv-n
- type: usfm
