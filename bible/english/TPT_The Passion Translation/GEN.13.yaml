    - type: text
      text: 6-7
  - type: text
    text: Arguments erupted between Abram’s herdsmen and Lot’s herdsmen because the land could not support both living together, for their animals and possessions were too numerous. At that time, Canaanites and Perizzites were also in the land.
  - type: usfm
    marker: f
