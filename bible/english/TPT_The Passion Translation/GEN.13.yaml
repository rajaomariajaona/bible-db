document_id: GEN.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Had a Lot to Lose
  - type: text
    content: Abram took his wife and all that he owned, and left Egypt. They returned to the southern desert region, and Lot went with them.
  '10':
  - type: text
    content: 'Lot lifted his eyes and carefully surveyed the land around him '
  - type: note
    content: Or “Lot lifted up his eyes.” When Abram offered the choice to Lot, he should have said, “Uncle, I choose you. God is with you. My choice is your choice.” Every young person likes to be separated from the older generation. Lot missed the will of God by separating from the called one, Abram. There is protection, covering, and anointing when we walk with those who walk with God. Our flesh would rather “do it on our own,” but God’s way is to walk in fellowship with called ones. The meaning of Lot is “covert,” “secret,” or “concealed.” Everything about Lot was hidden away in his heart. Compromise was a way of life for him. The secret tug of the world drew him away from the place of blessing. He had never really left Ur; he was still an idolater at heart. When he chose the rich plains, he was looking for the closest thing that resembled Egypt. He chose what would please him without considering the consequences. Lot’s possessions were eventually burned in the fires of judgment, and he ended up living in a cave.
  - type: text
    content: 'all the way to Zoar. He noticed that the Jordan Valley was fertile and well-watered (this was before '
  - type: text
    content: Yahweh
  - type: text
    content: ' had destroyed Sodom and Gomorrah). It looked '
  - type: text
    content: beautiful
  - type: text
    content: ', like the garden of '
  - type: text
    content: Yahweh
  - type: text
    content: ', or like Egypt. '
  '11':
  - type: text
    content: 'So Lot chose to settle in the Jordan Valley. He departed toward the east, and the family split up and separated from each other. '
  '12':
  - type: text
    content: 'Abram settled in the land of Canaan while Lot settled in the cities of the lowlands, at a place '
  - type: note
    content: Or “pitched his tent.”
  - type: text
    content: 'near Sodom. '
  '13':
  - type: text
    content: 'Now, the people of Sodom were extremely wicked and rebelled against '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: God Speaks Promises to Abram
  '14':
  - type: text
    content: 'After Lot separated from him, '
  - type: note
    content: Although the New Testament describes Lot as “righteous” (2 Peter 2:7–8), Scripture portrays him as an object lesson of one who compromised his faith by wanting both to follow Yahweh and to love this present world. See Luke 17:28–32. It appears that God waited until Abram and Lot finally separated before giving Abram further blessings. Through the life of Abram, we learn that separation brings revelation. Abram separated from (1) his country, (2) his relatives, (3) Egypt, (4) Lot, (5) his desire to get wealth (see Gen. 14), (6) Ishmael (see Gen. 21), and (7) from his beloved son, Isaac (see Gen. 22). These seven separations brought revelation, encounters, blessings, miracles, and inheritance.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Abram, “Lift up your eyes and look around you to the north, the south, the east, and the west. '
  '15':
  - type: text
    content: 'As far as you can see in every direction is the land that I will give to you forever—to you and your seed. '
  '16':
  - type: text
    content: 'I will multiply them until they are as numerous as the specks of dust on the earth. If anyone could count the dust of the earth, then your offspring could also be counted. '
  '17':
  - type: text
    content: 'Now, get up and walk through the land—its length and its breadth. '
  - type: text
    content: All the land you walk upon
  - type: text
    content: ' will be my gift to you!”'
  - type: note
    content: See Josh. 24:3–4.
  '18':
  - type: text
    content: 'Abram moved his camp and settled by the oaks of Mamre, '
  - type: note
    content: Mamre means “fatness.” It is a picture of the strength of God’s anointing and the weighty glory of the Lord. Mamre was located about three miles north of Hebron. It was the site of a pagan shrine, but Abram reclaimed it for Yahweh and erected an altar there to the true God.
  - type: text
    content: 'which are at Hebron, '
  - type: note
    content: Hebron means “to unite [in fellowship].” The modern Arabic name for Hebron is al-Halil er-Rahman, meaning “friend of the Merciful One,” a reference to Abraham, the friend of God.
  - type: text
    content: 'and there he built another altar to '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '2':
  - type: text
    content: 'Now Abram had become very rich '
  - type: note
    content: Or “weighty” or “heavy.”
  - type: text
    content: 'in livestock, silver, and gold. '
  '3':
  - type: text
    content: 'And he journeyed on from place to place as far as '
  - type: text
    content: the hill country region of
  - type: text
    content: ' Bethel. He returned to the place between Bethel and Ai where he had pitched his tent at the beginning. '
  '4':
  - type: text
    content: 'This was the place he had first built an altar to pray and worship '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: note
    content: Or “he called on the name of Yahweh.” Abram went back to the first altar he had built to commune with this God who had made promises to him. There are times we, too, need to go back to our beginnings in order to recapture our “first love” for Jesus before we can move forward. See Rev. 2:3–4.
  '5':
  - type: text
    content: 'Now Lot, who accompanied Abram, '
  - type: text
    content: was also rich and
  - type: text
    content: ' had accumulated flocks, herds, family, and servants. '
  - type: note
    content: Or, literally, “tents,” meaning those who camped with Lot.
  '6':
  - type: text
    content: Arguments erupted between Abram’s herdsmen and Lot’s herdsmen because the land could not support both living together, for their animals and possessions were too numerous. At that time, Canaanites and Perizzites were also in the land.
  - type: note
    content: The implication is that grazing rights were in dispute between all four parties (Abraham, Lot, the Canaanites, and the Perizzites).
  '8':
  - type: text
    content: 'So Abram said to Lot, “Let’s not quarrel with each other, or between our herdsmen, since we are relatives. '
  '9':
  - type: text
    content: Look at the vast land that is in front of you! Let’s settle in different regions. If you choose the land on the left, then I’ll go right, and if you want land on the right, then I’ll go left.”
