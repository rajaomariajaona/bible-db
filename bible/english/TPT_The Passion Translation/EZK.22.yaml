document_id: EZK.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem’s Sins
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 22–23 is the eighth panel (H) in the chiastic parallel structure in Ezekiel. This section contains an oracle condemning the perversity of Israel’s leaders—the two adulterous sisters. Panel H constitutes the corresponding parallel with panel H1 in ch. 34, which also contains a parallel oracle of judgment focusing on “shepherds” and “sheep” (34:2)—condemning the immoral and idolatrous leaders of Israel.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again and said, '
  '10':
  - type: text
    content: 'Your men have sex with their father’s wives. '
  - type: note
    content: Or “[in your city are] men who uncover their father’s nakedness.” Although this seems to imply incestuous acts, it is more likely a euphemism for a stepmother—another woman in his father’s harem besides his own mother.
  - type: text
    content: 'They force themselves on women who are having their periods and are ceremonially unclean. '
  '11':
  - type: text
    content: 'In your city a man commits adultery with his neighbor’s wife, and another man seduces his daughter-in-law or sister, his own father’s daughter. '
  '12':
  - type: text
    content: 'Some of your people will murder for pay. Some extort their neighbors '
  - type: text
    content: with threats of violence
  - type: text
    content: ', charging them exorbitant interest for obscene profits, yet they have entirely forgotten about me! I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '13':
  - type: text
    content: '“ ‘Now I will bring my fists down '
  - type: note
    content: Or “I will strike my hands together [in anger].”
  - type: text
    content: 'on your acts of robbery and murder in your midst! '
  '14':
  - type: text
    content: 'Do you think your courage will endure when I am through with you? Do you think your hands will remain steady on your day of reckoning? I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken, and I will do it!'
  '15':
  - type: text
    content: '“ ‘I will scatter you among the nations and send you into exile to foreign countries. I will put an end to the uncleanness within you. '
  '16':
  - type: text
    content: 'Because of your own actions, you will be grossly defiled in the sight of the nations, and then you will understand and realize that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: The Refining Furnace
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '18':
  - type: text
    content: '“Son of man, for me, the people of Israel have become worthless dross. They all have become like the useless byproduct of refined silver, bronze, tin, iron, lead, all mixed up together and left in the smelter; they are dross. '
  '19':
  - type: text
    content: 'Therefore, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to the '
  - type: text
    content: people of Jerusalem
  - type: text
    content: ', ‘Since you have all become worthless dross, leftover metal, I will collect you inside Jerusalem. '
  - type: note
    content: It is likely that this prophecy of Ezekiel was fulfilled shortly before the siege of 589–587 BC, when the people of Judah were crowding into Jerusalem to take refuge.
  '2':
  - type: text
    content: '“Son of man, are you ready to judge the city of murderers? '
  - type: note
    content: Or literally “city of bloods.”
  - type: text
    content: 'You must confront her with all the disgusting things she has done! '
  '20':
  - type: text
    content: 'Just as the metalsmith collects silver, bronze, iron, lead, and tin in the furnace, and the fire is fanned underneath to melt them down, so I will collect you there and melt you down in my furious anger. '
  '21':
  - type: text
    content: 'I will put you all in the furnace and fan the fire of my rage to burn against you. I will melt you there in the middle of the furnace. '
  - type: note
    content: See Mal. 3:2–4.
  '22':
  - type: text
    content: 'As silver is refined in the smelter, so you will be melted down inside the city, and you will understand and recognize that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have vented my fury against you.’ ”'
  - type: heading
    content: Yahweh Punishes the Leaders
  '23':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again and said: '
  '24':
  - type: text
    content: '“Son of man, say to '
  - type: text
    content: Israel
  - type: text
    content: ', ‘You are a land that has had no shower nor cleansing rain on the day of my anger. '
  '25':
  - type: text
    content: 'Your prophets '
  - type: note
    content: Or “Your princes” (LXX).
  - type: text
    content: 'plot conspiracies as lions stalk their prey. They have devoured the people, enriched themselves by seizing their wealth and jewels, and left behind many widows. '
  '26':
  - type: text
    content: 'Her priests have violated my law and have no respect for what is holy. They have made no distinction between what is holy and what is common. They have not taught people the difference between clean and unclean; they ignore my Sabbaths, and I have been defiled among them. '
  '27':
  - type: text
    content: 'Within the land are leaders who are like a pack of wolves who rip apart their prey, shed blood, and kill people to get money dishonestly. '
  '28':
  - type: text
    content: 'Her '
  - type: text
    content: 'false'
  - type: text
    content: ' prophets have plastered over these things with their empty visions and false prophecies, saying: “'
  - type: text
    content: Yahweh
  - type: text
    content: ' says this,” even though I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have not spoken. '
  '29':
  - type: text
    content: The people of the land have practiced extortion and robbery! They have oppressed the poor and needy and mistreated the foreigner among them who have no way of getting justice.’ ”
  - type: heading
    content: No One to Stand in the Gap
  '3':
  - type: text
    content: 'Prophesy to the city what I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to them: ‘Jerusalem, you bring doom upon yourselves because you have shed the blood of so many. You are defiled by your man-made gods. '
  '30':
  - type: text
    content: '“I searched for someone who would repair the wall, '
  - type: note
    content: There is a play on words with “repair” (Hb. gadar) and “wall” (Hb. geder). God was wanting someone to become the healing of the gap and become the wall. The healing of our cities (walls) requires someone to stand as a healer and redeemer. Isaiah writes that the wall will be named “Salvation” (Isa. 60:18). Jesus is the one who fulfills God’s longing. He is the Savior, the Magnificent Intercessor, the Reconciler, and the Overcomer.
  - type: text
    content: 'one who fills the gap, '
  - type: text
    content: an intercessor to cry out for mercy
  - type: text
    content: ', but I found no one. There was no one found who would keep my justice from destroying the nation. '
  - type: note
    content: Compare Ps. 106:23; Amos 7:1–6.
  '31':
  - type: text
    content: 'So I will pour out my fury on them, and like a fire I will destroy them. I will punish them for the evil they have done. '
  - type: note
    content: Literally “I will set their ways upon their heads.”
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '4':
  - type: text
    content: 'You have become guilty by the blood you have shed and defiled by your hand-made gods. Your time is up! '
  - type: note
    content: Or literally “you have come to your years,” that is, your time has run out.
  - type: text
    content: 'Your day of reckoning is on the way. Therefore, I have made you an object of scorn and a laughingstock to all the nations. '
  '5':
  - type: text
    content: 'Nations near and far will taunt you, O infamous '
  - type: note
    content: Or literally “unclean of name.”
  - type: text
    content: city, full of turmoil.
  '6':
  - type: text
    content: '“ ‘Behold! The leaders of Israel within your walls, one and all, have selfishly abused their power to shed blood. '
  '7':
  - type: text
    content: 'They have despised their fathers and mothers, cheated the foreigners who live within your walls, and mistreated the widow and orphan. '
  '8':
  - type: text
    content: 'All that I call holy, you have treated with contempt. You have dishonored my Sabbaths. '
  '9':
  - type: text
    content: 'In your city are those who slander in order to have someone murdered. Living among you are those who eat food sacrificed to false gods in mountain shrines and commit obscene acts. '
