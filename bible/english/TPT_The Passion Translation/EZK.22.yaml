document_id: EZK.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerusalem’s Sins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ezekiel 22–23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is the eighth panel (H) in the chiastic parallel structure in Ezekiel. This section contains an oracle condemning the perversity of Israel’s leaders—the two adulterous sisters. Panel H constitutes the corresponding parallel with panel H
    - type: usfm
      marker: ord
      children:
      - type: text
        text: '1'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: in ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: EZK.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which also contains a parallel oracle of judgment focusing on “shepherds” and “sheep” ('
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:2
      metadata:
        usfm: EZK.34.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )—condemning the immoral and idolatrous leaders of Israel.
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me again and said, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, are you ready to judge the city of murderers? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “city of bloods.”
    marker-yv: yv-n
  - type: text
    text: 'You must confront her with all the disgusting things she has done! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Prophesy to the city what I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say to them: ‘Jerusalem, you bring doom upon yourselves because you have shed the blood of so many. You are defiled by your man-made gods. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'You have become guilty by the blood you have shed and defiled by your hand-made gods. Your time is up! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “you have come to your years,” that is, your time has run out.
    marker-yv: yv-n
  - type: text
    text: 'Your day of reckoning is on the way. Therefore, I have made you an object of scorn and a laughingstock to all the nations. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nations near and far will taunt you, O infamous '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “unclean of name.”
    marker-yv: yv-n
  - type: text
    text: city, full of turmoil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“ ‘Behold! The leaders of Israel within your walls, one and all, have selfishly abused their power to shed blood. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They have despised their fathers and mothers, cheated the foreigners who live within your walls, and mistreated the widow and orphan. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All that I call holy, you have treated with contempt. You have dishonored my Sabbaths. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In your city are those who slander in order to have someone murdered. Living among you are those who eat food sacrificed to false gods in mountain shrines and commit obscene acts. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Your men have sex with their father’s wives. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “[in your city are] men who uncover their father’s nakedness.” Although this seems to imply incestuous acts, it is more likely a euphemism for a stepmother—another woman in his father’s harem besides his own mother.
    marker-yv: yv-n
  - type: text
    text: 'They force themselves on women who are having their periods and are ceremonially unclean. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'In your city a man commits adultery with his neighbor’s wife, and another man seduces his daughter-in-law or sister, his own father’s daughter. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Some of your people will murder for pay. Some extort their neighbors '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with threats of violence
  - type: text
    text: ', charging them exorbitant interest for obscene profits, yet they have entirely forgotten about me! I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“ ‘Now I will bring my fists down '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will strike my hands together [in anger].”
    marker-yv: yv-n
  - type: text
    text: 'on your acts of robbery and murder in your midst! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Do you think your courage will endure when I am through with you? Do you think your hands will remain steady on your day of reckoning? I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken, and I will do it!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“ ‘I will scatter you among the nations and send you into exile to foreign countries. I will put an end to the uncleanness within you. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Because of your own actions, you will be grossly defiled in the sight of the nations, and then you will understand and realize that I am '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Refining Furnace
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Son of man, for me, the people of Israel have become worthless dross. They all have become like the useless byproduct of refined silver, bronze, tin, iron, lead, all mixed up together and left in the smelter; they are dross. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Therefore, I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say to the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: people of Jerusalem
  - type: text
    text: ', ‘Since you have all become worthless dross, leftover metal, I will collect you inside Jerusalem. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is likely that this prophecy of Ezekiel was fulfilled shortly before the siege of 589–587 BC, when the people of Judah were crowding into Jerusalem to take refuge.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Just as the metalsmith collects silver, bronze, iron, lead, and tin in the furnace, and the fire is fanned underneath to melt them down, so I will collect you there and melt you down in my furious anger. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'I will put you all in the furnace and fan the fire of my rage to burn against you. I will melt you there in the middle of the furnace. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 3:2–4
      metadata:
        usfm: MAL.3.2+MAL.3.3+MAL.3.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'As silver is refined in the smelter, so you will be melted down inside the city, and you will understand and recognize that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have vented my fury against you.’ ”'
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' Punishes the Leaders'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me again and said: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '“Son of man, say to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Israel
  - type: text
    text: ', ‘You are a land that has had no shower nor cleansing rain on the day of my anger. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Your prophets '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Your princes” (LXX).
    marker-yv: yv-n
  - type: text
    text: 'plot conspiracies as lions stalk their prey. They have devoured the people, enriched themselves by seizing their wealth and jewels, and left behind many widows. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Her priests have violated my law and have no respect for what is holy. They have made no distinction between what is holy and what is common. They have not taught people the difference between clean and unclean; they ignore my Sabbaths, and I have been defiled among them. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Within the land are leaders who are like a pack of wolves who rip apart their prey, shed blood, and kill people to get money dishonestly. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Her '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'false'
  - type: text
    text: ' prophets have plastered over these things with their empty visions and false prophecies, saying: “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says this,” even though I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have not spoken. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The people of the land have practiced extortion and robbery! They have oppressed the poor and needy and mistreated the foreigner among them who have no way of getting justice.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: No One to Stand in the Gap
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“I searched for someone who would repair the wall, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is a play on words with “repair” (Hb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gadar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and “wall” (Hb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: geder
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God was wanting someone to become the healing of the gap and become the wall. The healing of our cities (walls) requires someone to stand as a healer and redeemer. Isaiah writes that the wall will be named “Salvation” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 60:18
      metadata:
        usfm: ISA.60.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Jesus is the one who fulfills God’s longing. He is the Savior, the Magnificent Intercessor, the Reconciler, and the Overcomer.
    marker-yv: yv-n
  - type: text
    text: 'one who fills the gap, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an intercessor to cry out for mercy
  - type: text
    text: ', but I found no one. There was no one found who would keep my justice from destroying the nation. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Compare
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 106:23
      metadata:
        usfm: PSA.106.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 7:1–6
      metadata:
        usfm: AMO.7.1+AMO.7.2+AMO.7.3+AMO.7.4+AMO.7.5+AMO.7.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'So I will pour out my fury on them, and like a fire I will destroy them. I will punish them for the evil they have done. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Literally “I will set their ways upon their heads.”
    marker-yv: yv-n
  - type: text
    text: 'I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
