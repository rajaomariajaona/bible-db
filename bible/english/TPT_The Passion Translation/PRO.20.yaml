document_id: PRO.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Are You Living Wisely?
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A drunkard is obnoxious, loud, and argumentative;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’re a fool to get intoxicated with strong drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The rage of a king is like the roar of a lion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do you really want to go and make him angry?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A person of honor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “It is the glory of a man.” It’s better to keep a friend than to win a fight.
    marker-yv: yv-n
  - type: text
    text: will put an argument to rest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Only the stupid want to pick a fight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If you’re too lazy to plant seed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it’s too bad when you have no harvest on which to feed.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic and the Septuagint read “Rebuke a lazy man and he still has no shame, yet watch him go beg at harvest time.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A man of deep understanding will give good advice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: drawing it out from the well within.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Many will tell you they’re your loyal friends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but who can find one who is truly trustworthy?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A compassionate man is hard to find, but it’s even harder to find one who is faithful.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The lovers of God will walk in integrity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their children are fortunate
- type: usfm
  marker: q1
  children:
  - type: text
    text: to have godly parents as their examples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A righteous king sits on his judgment seat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He scatters evil away from his kingdom
- type: usfm
  marker: q1
  children:
  - type: text
    text: by his wise discernment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Which one of us can truly say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am free from sin in my life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for my heart is clean and pure”?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word translated “clean” can also mean “perfect” or “holy.” The word translated “pure” can also mean “clear,” “bright,” “shining,” or “unmixed.” Through God’s grace, by the blood of Jesus, believers have been purified, made holy, and set free from our sins.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mark it down:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God hates it when you demonstrate a double standard—
- type: usfm
  marker: q1
  children:
  - type: text
    text: one for “them” and one for “you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: All children show what they’re really like by how they act.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You can discern their character,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whether they are pure or perverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lovers of God have been given eyes to see
- type: usfm
  marker: q1
  children:
  - type: text
    text: and ears to hear from God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If you spend all your time sleeping, you’ll grow poor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So wake up, sleepyhead! Don’t sleep on the job.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And then there will be plenty of food on your table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The buyer says, as he haggles over the price,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “That’s junk. It’s worthless!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then he goes out and brags,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look at the great bargain I got!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You may have an abundance of wealth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: piles of gold and jewels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but there is something of far greater worth:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: speaking revelation-words of knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Anyone stupid enough to guarantee a loan for a stranger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts have “a promiscuous woman.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: deserves to have his property held as security.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: What you obtain dishonestly may seem sweet at first,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but sooner or later you’ll live to regret it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The bread of falsehood may taste sweet at first, but afterward you’ll have a mouth full of gravel.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: If you solicit good advice, then your plans will succeed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So don’t charge into battle without wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for wars are won by skillful strategy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A blabbermouth will reveal your secrets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so stay away from people who can’t keep their mouths shut.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Aramaic adds a line: “One who is faithful in spirit hides a matter.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: If you despise your father or mother,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your life will flicker out like a lamp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: extinguished into the deepest darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If an inheritance is gained too early in life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will not be blessed in the end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Don’t ever say, “I’m going to get even with them
- type: usfm
  marker: q1
  children:
  - type: text
    text: if it’s the last thing I do!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wrap God’s grace around your heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will be the one to vindicate you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The Lord hates double standards—
- type: usfm
  marker: q1
  children:
  - type: text
    text: that’s hypocrisy at its worst!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The Lord hates differing weights, and dishonest scales are wicked.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: It is the Lord who directs your life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for each step you take is ordained by God
- type: usfm
  marker: q1
  children:
  - type: text
    text: to bring you closer to your destiny.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So much of your life, then, remains a mystery!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “So what man is capable of ordering his way?”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Be careful in making a rash promise before God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or you may be trapped by your vow and live to regret it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: A wise king is able to discern corruption
- type: usfm
  marker: q1
  children:
  - type: text
    text: and remove wickedness from his kingdom.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A wise king winnows the wicked and turns his chariot wheel over them.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The spirit God breathed into man '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied by the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nishmat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', also used in'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:7
      metadata:
        usfm: GEN.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: is like a living lamp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a shining light
- type: usfm
  marker: q1
  children:
  - type: text
    text: searching into the innermost chamber of our being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Good leadership '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A king’s throne.”
    marker-yv: yv-n
  - type: text
    text: is built on love and truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for kindness and integrity
- type: usfm
  marker: q1
  children:
  - type: text
    text: are what keep leaders in their position of trust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: We admire the young for their strength and beauty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the dignity of the old is their wisdom.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “their gray hair.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: When you are punished severely, you learn your lesson well—
- type: usfm
  marker: q1
  children:
  - type: text
    text: for painful experiences do wonders to change your life.
