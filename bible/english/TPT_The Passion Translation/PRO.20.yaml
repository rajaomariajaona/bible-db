document_id: PRO.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Are You Living Wisely?
  - type: text
    content: A drunkard is obnoxious, loud, and argumentative;
  - type: text
    content: you’re a fool to get intoxicated with strong drink.
  '10':
  - type: text
    content: 'Mark it down:'
  - type: text
    content: God hates it when you demonstrate a double standard—
  - type: text
    content: one for “them” and one for “you.”
  '11':
  - type: text
    content: All children show what they’re really like by how they act.
  - type: text
    content: You can discern their character,
  - type: text
    content: whether they are pure or perverse.
  '12':
  - type: text
    content: Lovers of God have been given eyes to see
  - type: text
    content: and ears to hear from God.
  '13':
  - type: text
    content: If you spend all your time sleeping, you’ll grow poor.
  - type: text
    content: So wake up, sleepyhead! Don’t sleep on the job.
  - type: text
    content: And then there will be plenty of food on your table.
  '14':
  - type: text
    content: The buyer says, as he haggles over the price,
  - type: text
    content: “That’s junk. It’s worthless!”
  - type: text
    content: Then he goes out and brags,
  - type: text
    content: “Look at the great bargain I got!”
  '15':
  - type: text
    content: You may have an abundance of wealth,
  - type: text
    content: piles of gold and jewels,
  - type: text
    content: 'but there is something of far greater worth:'
  - type: text
    content: speaking revelation-words of knowledge.
  '16':
  - type: text
    content: Anyone stupid enough to guarantee a loan for a stranger
  - type: note
    content: Some manuscripts have “a promiscuous woman.”
  - type: text
    content: deserves to have his property held as security.
  '17':
  - type: text
    content: What you obtain dishonestly may seem sweet at first,
  - type: text
    content: but sooner or later you’ll live to regret it.
  - type: note
    content: Or “The bread of falsehood may taste sweet at first, but afterward you’ll have a mouth full of gravel.”
  '18':
  - type: text
    content: If you solicit good advice, then your plans will succeed.
  - type: text
    content: So don’t charge into battle without wisdom,
  - type: text
    content: for wars are won by skillful strategy.
  '19':
  - type: text
    content: A blabbermouth will reveal your secrets,
  - type: text
    content: so stay away from people who can’t keep their mouths shut.
  - type: note
    content: 'The Aramaic adds a line: “One who is faithful in spirit hides a matter.”'
  '2':
  - type: text
    content: The rage of a king is like the roar of a lion.
  - type: text
    content: Do you really want to go and make him angry?
  '20':
  - type: text
    content: If you despise your father or mother,
  - type: text
    content: your life will flicker out like a lamp,
  - type: text
    content: extinguished into the deepest darkness.
  '21':
  - type: text
    content: If an inheritance is gained too early in life,
  - type: text
    content: it will not be blessed in the end.
  '22':
  - type: text
    content: Don’t ever say, “I’m going to get even with them
  - type: text
    content: if it’s the last thing I do!”
  - type: text
    content: Wrap God’s grace around your heart
  - type: text
    content: and he will be the one to vindicate you.
  '23':
  - type: text
    content: The Lord hates double standards—
  - type: text
    content: that’s hypocrisy at its worst!
  - type: note
    content: Or “The Lord hates differing weights, and dishonest scales are wicked.”
  '24':
  - type: text
    content: It is the Lord who directs your life,
  - type: text
    content: for each step you take is ordained by God
  - type: text
    content: to bring you closer to your destiny.
  - type: text
    content: So much of your life, then, remains a mystery!
  - type: note
    content: The Aramaic reads “So what man is capable of ordering his way?”
  '25':
  - type: text
    content: Be careful in making a rash promise before God,
  - type: text
    content: or you may be trapped by your vow and live to regret it.
  '26':
  - type: text
    content: A wise king is able to discern corruption
  - type: text
    content: and remove wickedness from his kingdom.
  - type: note
    content: Or “A wise king winnows the wicked and turns his chariot wheel over them.”
  '27':
  - type: text
    content: 'The spirit God breathed into man '
  - type: note
    content: Implied by the Hebrew word nishmat, also used in Gen. 2:7.
  - type: text
    content: is like a living lamp,
  - type: text
    content: a shining light
  - type: text
    content: searching into the innermost chamber of our being.
  '28':
  - type: text
    content: 'Good leadership '
  - type: note
    content: Or “A king’s throne.”
  - type: text
    content: is built on love and truth,
  - type: text
    content: for kindness and integrity
  - type: text
    content: are what keep leaders in their position of trust.
  '29':
  - type: text
    content: We admire the young for their strength and beauty,
  - type: text
    content: but the dignity of the old is their wisdom.
  - type: note
    content: Or “their gray hair.”
  '3':
  - type: text
    content: 'A person of honor '
  - type: note
    content: Or “It is the glory of a man.” It’s better to keep a friend than to win a fight.
  - type: text
    content: will put an argument to rest.
  - type: text
    content: Only the stupid want to pick a fight.
  '30':
  - type: text
    content: When you are punished severely, you learn your lesson well—
  - type: text
    content: for painful experiences do wonders to change your life.
  '4':
  - type: text
    content: If you’re too lazy to plant seed,
  - type: text
    content: it’s too bad when you have no harvest on which to feed.
  - type: note
    content: The Aramaic and the Septuagint read “Rebuke a lazy man and he still has no shame, yet watch him go beg at harvest time.”
  '5':
  - type: text
    content: A man of deep understanding will give good advice,
  - type: text
    content: drawing it out from the well within.
  '6':
  - type: text
    content: Many will tell you they’re your loyal friends,
  - type: text
    content: but who can find one who is truly trustworthy?
  - type: note
    content: Or “A compassionate man is hard to find, but it’s even harder to find one who is faithful.”
  '7':
  - type: text
    content: The lovers of God will walk in integrity,
  - type: text
    content: and their children are fortunate
  - type: text
    content: to have godly parents as their examples.
  '8':
  - type: text
    content: A righteous king sits on his judgment seat.
  - type: text
    content: He scatters evil away from his kingdom
  - type: text
    content: by his wise discernment.
  '9':
  - type: text
    content: Which one of us can truly say,
  - type: text
    content: “I am free from sin in my life,
  - type: text
    content: for my heart is clean and pure”?
  - type: note
    content: The Hebrew word translated “clean” can also mean “perfect” or “holy.” The word translated “pure” can also mean “clear,” “bright,” “shining,” or “unmixed.” Through God’s grace, by the blood of Jesus, believers have been purified, made holy, and set free from our sins.
