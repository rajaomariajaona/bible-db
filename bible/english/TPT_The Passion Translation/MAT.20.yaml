document_id: MAT.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Parable of Workers in the Vineyard
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This will help you understand the way heaven’s kingdom operates:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “There once was a wealthy landowner who went out at daybreak to hire all the laborers he could find to work in his vineyard.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: After agreeing to pay them the standard day’s wage, he put them to work.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then at nine o’clock, as he was passing through the town square, he found others standing around without work.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He told them, ‘Come and work for me in my vineyard and I’ll pay you a fair wage.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So off they went to join the others. He did the same thing at noon and again at three o’clock, making the same arrangement as he did with the others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Hoping to finish his harvest that day, he went to the town square again at five o’clock
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “in the eleventh hour” (about five o’clock).
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and found more who were idle. So he said to them, ‘Why have you been here all day without work?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘Because no one hired us,’ they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “So he said to them, ‘Then go and join my crew and work in my vineyard.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When evening came, the owner of the vineyard went to his foreman and said, ‘Call in all the laborers, line them up, and pay them the same wages, starting with the most recent ones I hired and finishing with the ones who worked all day.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When those hired late in the day came to be paid, they were given a full day’s wage.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And when those who had been hired first came to be paid, they were convinced that they would receive more. But everyone was paid the standard wage.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When they realized what had happened, they were offended and complained to the landowner, saying,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘You’re treating us unfairly! They’ve only worked for one hour while we’ve labored and sweated all day under the scorching sun. You’ve made them equal to us!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The landowner replied, ‘Friends, I’m not being unfair—I’m doing exactly what I said. Didn’t you agree to work for the standard wage?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If I want to give those who only worked for an hour equal pay, what does that matter to you?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Don’t I have the right to do what I want with what is mine? Why should my generosity make you jealous of them?’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Is your eye evil because I am good?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Now you can understand what I meant when I said that
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the first will end up last and the last will end up being first. Everyone is invited, but few are the chosen.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew, Aramaic, and a few later Greek manuscripts. This logion is not included in the majority of the Greek manuscripts but is found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 22:14
      metadata:
        usfm: MAT.22.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Again Prophesies His Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus was about to go to Jerusalem, so he took his twelve disciples aside privately and said to them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Listen to me. We’re on our way to Jerusalem, and I need to remind you that the Son of Man will be handed over to the religious leaders and scholars, and they will sentence him to be executed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And they will hand him over to the Romans
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “gentiles.” By implication, the Romans.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to be mocked, tortured, and crucified. Yet three days later he will be raised to life again.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ambition of Jacob and John
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The wife of Zebedee approached Jesus with her sons, Jacob and John. She knelt before him and asked him for a favor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'He said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What is it that you want?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'She answered, “Make the decree '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Give the order.”
    marker-yv: yv-n
  - type: text
    text: that these, my sons, will rule with you in your kingdom—one sitting on your right hand, one on your left.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You don’t know what you are asking.”
  - type: text
    text: ' Then, looking in the eyes of Jacob and John, Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are you prepared to drink from the cup of suffering that I am about to drink? And are you able to endure the baptism into death that I am about to endure?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Are you able to drink from the cup I am about to drink?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: They answered him, “Yes, we are able.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The naïveté of Jacob (James) and John is glaring. Their ambition is emphasized by having their mother come to ask this favor. This event is included immediately after Jesus prophesied for the third time his coming crucifixion. Their hearts were set on their own advancement rather than intercession for their Master.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You will indeed drink the cup of my suffering and be immersed into my death,”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and the Hebrew Matthew.
    marker-yv: yv-n
  - type: text
    text: 'Jesus told them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But to be the ones who sit at the place of highest honor is not mine to decide. My Father is the one who chooses them and prepares them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The other ten disciples were listening to all of this, and a jealous anger arose among them against the two brothers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus, knowing their thoughts, called them to his side and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Kings and those with great authority in this world rule oppressively over their subjects, like tyrants.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But this is not your calling. You will lead by a completely different model. The greatest one among you will live as the one who is called to serve others,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: because the greatest honor and authority is reserved for the one with the heart of a servant.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For even the Son of Man did not come expecting to be served but to serve and give his life in exchange for the salvation of many.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “a ransom paid for many.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Two Blind Men Healed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'As Jesus left Jericho a huge crowd gathered and followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And there were two blind men sitting on the roadside. When they heard that it was Jesus passing by, they shouted, “Son of David, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Son of David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was used for the Messiah. The blind men believed Jesus was the Messiah.
    marker-yv: yv-n
  - type: text
    text: 'show us mercy, Lord!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Those in the crowd scolded them and told them to be quiet. But the blind men shouted even louder, “Jesus, Son of David, show us mercy, Lord!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'So Jesus stopped and had them brought to him. He asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you want me to do for you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: They said, “Lord, we want to see! Heal us!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus was deeply moved with compassion '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “Jesus had nurturing love toward them.”
    marker-yv: yv-n
  - type: text
    text: 'toward them. So he touched their eyes, and instantly they could see! Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Your faith has healed you.”
  - type: text
    text: ' And all the people praised God because of this miracle. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This and the previous sentence, “Your faith has healed you,” are translated from the Hebrew Matthew. They are missing from the Greek text.
    marker-yv: yv-n
  - type: text
    text: And the two men became his followers from that day onward.
