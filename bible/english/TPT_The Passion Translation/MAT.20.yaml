document_id: MAT.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Parable of Workers in the Vineyard
  - type: text
    content: '“This will help you understand the way heaven’s kingdom operates:'
  - type: text
    content: “There once was a wealthy landowner who went out at daybreak to hire all the laborers he could find to work in his vineyard.
  - type: text
    content: ' '
  '10':
  - type: text
    content: And when those who had been hired first came to be paid, they were convinced that they would receive more. But everyone was paid the standard wage.
  - type: text
    content: ' '
  '11':
  - type: text
    content: When they realized what had happened, they were offended and complained to the landowner, saying,
  - type: text
    content: ' '
  '12':
  - type: text
    content: ‘You’re treating us unfairly! They’ve only worked for one hour while we’ve labored and sweated all day under the scorching sun. You’ve made them equal to us!’
  '13':
  - type: text
    content: “The landowner replied, ‘Friends, I’m not being unfair—I’m doing exactly what I said. Didn’t you agree to work for the standard wage?
  - type: text
    content: ' '
  '14':
  - type: text
    content: If I want to give those who only worked for an hour equal pay, what does that matter to you?
  - type: text
    content: ' '
  '15':
  - type: text
    content: Don’t I have the right to do what I want with what is mine? Why should my generosity make you jealous of them?’
  - type: note
    content: Or “Is your eye evil because I am good?”
  '16':
  - type: text
    content: “
  - type: text
    content: Now you can understand what I meant when I said that
  - type: text
    content: ' '
  - type: text
    content: the first will end up last and the last will end up being first. Everyone is invited, but few are the chosen.”
  - type: note
    content: As translated from the Hebrew Matthew, Aramaic, and a few later Greek manuscripts. This logion is not included in the majority of the Greek manuscripts but is found in Matt. 22:14.
  - type: heading
    content: Jesus Again Prophesies His Death
  '17':
  - type: text
    content: 'Jesus was about to go to Jerusalem, so he took his twelve disciples aside privately and said to them, '
  '18':
  - type: text
    content: “Listen to me. We’re on our way to Jerusalem, and I need to remind you that the Son of Man will be handed over to the religious leaders and scholars, and they will sentence him to be executed.
  - type: text
    content: ' '
  '19':
  - type: text
    content: And they will hand him over to the Romans
  - type: text
    content: ' '
  - type: note
    content: Or “gentiles.” By implication, the Romans.
  - type: text
    content: to be mocked, tortured, and crucified. Yet three days later he will be raised to life again.”
  - type: heading
    content: The Ambition of Jacob and John
  '2':
  - type: text
    content: After agreeing to pay them the standard day’s wage, he put them to work.
  - type: text
    content: ' '
  '20':
  - type: text
    content: The wife of Zebedee approached Jesus with her sons, Jacob and John. She knelt before him and asked him for a favor.
  '21':
  - type: text
    content: 'He said to her, '
  - type: text
    content: “What is it that you want?”
  - type: text
    content: 'She answered, “Make the decree '
  - type: note
    content: Or “Give the order.”
  - type: text
    content: that these, my sons, will rule with you in your kingdom—one sitting on your right hand, one on your left.”
  '22':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “You don’t know what you are asking.”
  - type: text
    content: ' Then, looking in the eyes of Jacob and John, Jesus said, '
  - type: text
    content: “Are you prepared to drink from the cup of suffering that I am about to drink? And are you able to endure the baptism into death that I am about to endure?”
  - type: note
    content: Or “Are you able to drink from the cup I am about to drink?”
  - type: text
    content: They answered him, “Yes, we are able.”
  - type: note
    content: The naïveté of Jacob (James) and John is glaring. Their ambition is emphasized by having their mother come to ask this favor. This event is included immediately after Jesus prophesied for the third time his coming crucifixion. Their hearts were set on their own advancement rather than intercession for their Master.
  '23':
  - type: text
    content: “You will indeed drink the cup of my suffering and be immersed into my death,”
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic and the Hebrew Matthew.
  - type: text
    content: 'Jesus told them. '
  - type: text
    content: “But to be the ones who sit at the place of highest honor is not mine to decide. My Father is the one who chooses them and prepares them.”
  '24':
  - type: text
    content: 'The other ten disciples were listening to all of this, and a jealous anger arose among them against the two brothers. '
  '25':
  - type: text
    content: 'Jesus, knowing their thoughts, called them to his side and said, '
  - type: text
    content: “Kings and those with great authority in this world rule oppressively over their subjects, like tyrants.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But this is not your calling. You will lead by a completely different model. The greatest one among you will live as the one who is called to serve others,
  - type: text
    content: ' '
  '27':
  - type: text
    content: because the greatest honor and authority is reserved for the one with the heart of a servant.
  - type: text
    content: ' '
  '28':
  - type: text
    content: For even the Son of Man did not come expecting to be served but to serve and give his life in exchange for the salvation of many.”
  - type: note
    content: As translated from the Aramaic. The Greek is “a ransom paid for many.”
  - type: heading
    content: Two Blind Men Healed
  '29':
  - type: text
    content: 'As Jesus left Jericho a huge crowd gathered and followed him. '
  '3':
  - type: text
    content: Then at nine o’clock, as he was passing through the town square, he found others standing around without work.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'And there were two blind men sitting on the roadside. When they heard that it was Jesus passing by, they shouted, “Son of David, '
  - type: note
    content: The term Son of David was used for the Messiah. The blind men believed Jesus was the Messiah.
  - type: text
    content: 'show us mercy, Lord!” '
  '31':
  - type: text
    content: Those in the crowd scolded them and told them to be quiet. But the blind men shouted even louder, “Jesus, Son of David, show us mercy, Lord!”
  '32':
  - type: text
    content: 'So Jesus stopped and had them brought to him. He asked them, '
  - type: text
    content: “What do you want me to do for you?”
  '33':
  - type: text
    content: They said, “Lord, we want to see! Heal us!”
  '34':
  - type: text
    content: 'Jesus was deeply moved with compassion '
  - type: note
    content: The Aramaic is “Jesus had nurturing love toward them.”
  - type: text
    content: 'toward them. So he touched their eyes, and instantly they could see! Jesus said to them, '
  - type: text
    content: “Your faith has healed you.”
  - type: text
    content: ' And all the people praised God because of this miracle. '
  - type: note
    content: This and the previous sentence, “Your faith has healed you,” are translated from the Hebrew Matthew. They are missing from the Greek text.
  - type: text
    content: And the two men became his followers from that day onward.
  '4':
  - type: text
    content: He told them, ‘Come and work for me in my vineyard and I’ll pay you a fair wage.’
  - type: text
    content: ' '
  '5':
  - type: text
    content: So off they went to join the others. He did the same thing at noon and again at three o’clock, making the same arrangement as he did with the others.
  '6':
  - type: text
    content: “Hoping to finish his harvest that day, he went to the town square again at five o’clock
  - type: text
    content: ' '
  - type: note
    content: Or “in the eleventh hour” (about five o’clock).
  - type: text
    content: and found more who were idle. So he said to them, ‘Why have you been here all day without work?’
  '7':
  - type: text
    content: “ ‘Because no one hired us,’ they answered.
  - type: text
    content: “So he said to them, ‘Then go and join my crew and work in my vineyard.’
  '8':
  - type: text
    content: “When evening came, the owner of the vineyard went to his foreman and said, ‘Call in all the laborers, line them up, and pay them the same wages, starting with the most recent ones I hired and finishing with the ones who worked all day.’
  '9':
  - type: text
    content: “When those hired late in the day came to be paid, they were given a full day’s wage.
  - type: text
    content: ' '
