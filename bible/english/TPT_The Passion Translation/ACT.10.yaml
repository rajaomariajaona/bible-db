document_id: ACT.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: An Angel Comes to Cornelius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'At that time there was a Roman military officer, Cornelius, who was in charge of one hundred men stationed in Caesarea. He was the captain of the Italian regiment, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cornelius was a centurion who was in charge of a sixth of a cohort of six hundred men. It seems likely that Cornelius was a gentile who had converted to Judaism.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'He was hungry and wanted to eat, but while lunch was being prepared he fell into a trance and entered into another realm. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “trance” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: ekstasis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', from which we get the word'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ecstasy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) literally means “to be taken to another place” (state or realm). (See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Strong’s Concordance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gr. 1611.) He was actually taken into another realm as a trance came over him.'
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'As the heavenly realm opened up, he saw something resembling a large linen tablecloth that descended from above, being let down to the earth by its four corners. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: As it floated down he saw that it held many kinds of four-footed animals, reptiles, and wild birds.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A voice said to him, “Peter, go and prepare them to be eaten.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Peter replied, “There’s no way I could do that, Lord, for I’ve never eaten anything forbidden or impure '
    - type: usfm
      marker: it
      children:
      - type: text
        text: according to our Jewish laws
    - type: text
      text: .”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The voice spoke again. “Nothing is unclean if God declares it to be clean.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “purified.” The meaning of this spiritual vision is this: God has declared every human being to be of special worth and dignity. The entire world needs the gospel. The four corners of the large tablecloth represent the four corners of the earth. The clean animals represent God’s people, the Jews, and the unclean speak of the non-Jewish nations. This encounter helped Peter understand that God was about to send him off with the men who were at the door of the house, even though their religion had been labeled “unclean.”'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The vision was repeated three times. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter’s history contains a number of threes. Peter denied he knew Jesus three times, the Lord restored Peter by challenging his love three times, and here we have the vision repeated three times.
      marker-yv: yv-n
    - type: text
      text: Then suddenly the linen sheet was snatched back up into heaven.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Peter was so stunned by the vision that he couldn’t stop wondering about what all it meant.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Cornelius’ men had learned where Peter was staying and at that same moment were standing outside the gate.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'They called out to those in the house, “Is this where Simon, the Rock, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Peter.”
      marker-yv: yv-n
    - type: text
      text: is staying?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: 'As Peter was in deep thought, trying to interpret the vision, the Spirit said to him, “Go downstairs now, for three men are looking for you. Don’t hesitate to go with them, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Don’t let prejudice keep you from going with them.” The Aramaic is literally “Don’t be divided” (in your soul).
      marker-yv: yv-n
    - type: text
      text: because I have sent them.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: a devout man of extraordinary character who worshiped God and prayed regularly, together with all his family. He also had a heart for the poor and gave generously to help them.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Peter went downstairs to the men and said, “I believe I’m the one you’re looking for. What brings you here?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'They answered, “We serve Cornelius, a Roman military captain, who sent us to find you. He is a devout man of the highest integrity who worships '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “fears God.”
      marker-yv: yv-n
    - type: text
      text: God and is respected throughout the Jewish community. He was divinely instructed through the appearance of an angel to summon you to his home and to listen to the message that you would bring him.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Peter invited them to stay for the night as his guests. The next morning they departed, accompanied by some of the believers from Joppa.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The next day they arrived in Caesarea, where Cornelius was waiting anxiously for them and had gathered together all of his relatives and close friends. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The moment Peter walked in the door, Cornelius fell at his feet to worship him. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: But Peter pulled him to his feet and said, “Stand up, for I’m only a man and no different from you.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They talked together and then went inside, where Peter found a large gathering '
    - type: usfm
      marker: it
      children:
      - type: text
        text: waiting to hear his words
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Peter said to them, “You all know that it is against the Jewish laws for me to associate with or even visit the home of one who is not a Jew. Yet God has shown me that I should never view anyone as inferior '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “forbidden.”
      marker-yv: yv-n
    - type: text
      text: 'or ritually unclean. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'So when you sent for me, I came without objection. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “I was destined to come to you.”
      marker-yv: yv-n
    - type: text
      text: Now, may I ask why you sent for me?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: One afternoon about three o’clock, he had an open vision and saw the angel of God appear right in front of him, calling out his name, “Cornelius!”
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Cornelius replied, “Four days ago I was fasting '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek has no mention of Cornelius fasting.
      marker-yv: yv-n
    - type: text
      text: 'and praying here in my home at this very hour, three o’clock in the afternoon, when a man in glistening clothing suddenly appeared in front of my eyes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'He said, ‘Cornelius, God has heard your prayers. Your generosity to the poor has been recorded and remembered in God’s presence. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Your acts of righteousness are offerings before God.”
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'However, you must send for a man named Simon, the Rock, who is staying in Joppa as a guest of Simon the tanner, who lives by the sea.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So I immediately sent my men to bring you here—and you were kind enough to come. And now, here we are, all of us in God’s presence, anxious to hear the message that God has put into your heart to share with us.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Peter said, “Now I know for certain that God doesn’t show favoritism with people '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “God is not the God of hypocrites.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: but treats everyone on the same basis
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek is “God is not one who receives masks (faces).” God doesn’t treat us according to externalities but according to what is in our hearts.
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'It makes no difference what race of people one belongs to. If they show deep reverence for God, and are committed to doing what’s right, they are acceptable before him. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'God sent his word to the Jewish people first, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “For the Living Expression was the inheritance of the Jewish people.”
      marker-yv: yv-n
    - type: text
      text: 'announcing the wonderful news of hope and peace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or by inference, “peace with God through Jesus Christ.” Only the Aramaic has “hope and peace.”
      marker-yv: yv-n
    - type: text
      text: 'through Jesus, the Anointed One, the Lord of all. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “who is Master
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: of all.” That is, Jesus is Lord, not just for the Jewish people but for all people groups. The Aramaic is “who is Master
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: of all.”
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: You are well aware of all that began in Galilee and spread throughout the land of Israel immediately after John preached his message of baptism.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '“Jesus of Nazareth was anointed by God with the Holy Spirit and with great power. He did wonderful things for others and divinely healed all who were under the tyranny of the devil, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “devil” can also be translated “slanderer-liar.”
      marker-yv: yv-n
    - type: text
      text: 'for God had anointed him. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'We apostles were eyewitnesses to all the miracles '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “things.” By inference, the miracles of healing and deliverance.
      marker-yv: yv-n
    - type: text
      text: 'that he performed throughout the land of Israel. Finally, in Jerusalem, he was crucified on a cross, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hung him on a tree and killed him.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 21:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Startled, he was overcome with fear by the sight of the angel. He asked, “What do you want, Lord?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel said, “All of your prayers and your generosity to the poor have ascended before God as an eternal offering. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as an offering that he remembers.”
      marker-yv: yv-n
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'but God raised him from the dead three days later, allowing him to be seen openly. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'He didn’t appear to everyone, but he appeared to us, his chosen witnesses. He actually ate and drank with us '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
