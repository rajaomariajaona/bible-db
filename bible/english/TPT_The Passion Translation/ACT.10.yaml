document_id: ACT.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: An Angel Comes to Cornelius
  - type: text
    content: 'At that time there was a Roman military officer, Cornelius, who was in charge of one hundred men stationed in Caesarea. He was the captain of the Italian regiment, '
  - type: note
    content: Cornelius was a centurion who was in charge of a sixth of a cohort of six hundred men. It seems likely that Cornelius was a gentile who had converted to Judaism.
  '10':
  - type: text
    content: 'He was hungry and wanted to eat, but while lunch was being prepared he fell into a trance and entered into another realm. '
  - type: note
    content: The Greek word for “trance” (ekstasis, from which we get the word ecstasy) literally means “to be taken to another place” (state or realm). (See Strong’s Concordance, Gr. 1611.) He was actually taken into another realm as a trance came over him.
  '11':
  - type: text
    content: 'As the heavenly realm opened up, he saw something resembling a large linen tablecloth that descended from above, being let down to the earth by its four corners. '
  '12':
  - type: text
    content: As it floated down he saw that it held many kinds of four-footed animals, reptiles, and wild birds.
  '13':
  - type: text
    content: A voice said to him, “Peter, go and prepare them to be eaten.”
  '14':
  - type: text
    content: 'Peter replied, “There’s no way I could do that, Lord, for I’ve never eaten anything forbidden or impure '
  - type: text
    content: according to our Jewish laws
  - type: text
    content: .”
  '15':
  - type: text
    content: The voice spoke again. “Nothing is unclean if God declares it to be clean.”
  - type: note
    content: 'Or “purified.” The meaning of this spiritual vision is this: God has declared every human being to be of special worth and dignity. The entire world needs the gospel. The four corners of the large tablecloth represent the four corners of the earth. The clean animals represent God’s people, the Jews, and the unclean speak of the non-Jewish nations. This encounter helped Peter understand that God was about to send him off with the men who were at the door of the house, even though their religion had been labeled “unclean.”'
  '16':
  - type: text
    content: 'The vision was repeated three times. '
  - type: note
    content: Peter’s history contains a number of threes. Peter denied he knew Jesus three times, the Lord restored Peter by challenging his love three times, and here we have the vision repeated three times.
  - type: text
    content: Then suddenly the linen sheet was snatched back up into heaven.
  '17':
  - type: text
    content: Peter was so stunned by the vision that he couldn’t stop wondering about what all it meant.
  - type: text
    content: Meanwhile, Cornelius’ men had learned where Peter was staying and at that same moment were standing outside the gate.
  '18':
  - type: text
    content: 'They called out to those in the house, “Is this where Simon, the Rock, '
  - type: note
    content: Or “Peter.”
  - type: text
    content: is staying?”
  '19':
  - type: text
    content: 'As Peter was in deep thought, trying to interpret the vision, the Spirit said to him, “Go downstairs now, for three men are looking for you. Don’t hesitate to go with them, '
  - type: note
    content: Or “Don’t let prejudice keep you from going with them.” The Aramaic is literally “Don’t be divided” (in your soul).
  - type: text
    content: because I have sent them.”
  '2':
  - type: text
    content: a devout man of extraordinary character who worshiped God and prayed regularly, together with all his family. He also had a heart for the poor and gave generously to help them.
  '21':
  - type: text
    content: Peter went downstairs to the men and said, “I believe I’m the one you’re looking for. What brings you here?”
  '22':
  - type: text
    content: 'They answered, “We serve Cornelius, a Roman military captain, who sent us to find you. He is a devout man of the highest integrity who worships '
  - type: note
    content: Or “fears God.”
  - type: text
    content: God and is respected throughout the Jewish community. He was divinely instructed through the appearance of an angel to summon you to his home and to listen to the message that you would bring him.”
  '23':
  - type: text
    content: Peter invited them to stay for the night as his guests. The next morning they departed, accompanied by some of the believers from Joppa.
  '24':
  - type: text
    content: 'The next day they arrived in Caesarea, where Cornelius was waiting anxiously for them and had gathered together all of his relatives and close friends. '
  '25':
  - type: text
    content: 'The moment Peter walked in the door, Cornelius fell at his feet to worship him. '
  '26':
  - type: text
    content: But Peter pulled him to his feet and said, “Stand up, for I’m only a man and no different from you.”
  '27':
  - type: text
    content: 'They talked together and then went inside, where Peter found a large gathering '
  - type: text
    content: waiting to hear his words
  - type: text
    content: .
  '28':
  - type: text
    content: 'Peter said to them, “You all know that it is against the Jewish laws for me to associate with or even visit the home of one who is not a Jew. Yet God has shown me that I should never view anyone as inferior '
  - type: note
    content: Or “forbidden.”
  - type: text
    content: 'or ritually unclean. '
  '29':
  - type: text
    content: 'So when you sent for me, I came without objection. '
  - type: note
    content: The Aramaic is “I was destined to come to you.”
  - type: text
    content: Now, may I ask why you sent for me?”
  '3':
  - type: text
    content: One afternoon about three o’clock, he had an open vision and saw the angel of God appear right in front of him, calling out his name, “Cornelius!”
  '30':
  - type: text
    content: 'Cornelius replied, “Four days ago I was fasting '
  - type: note
    content: As translated from the Aramaic. The Greek has no mention of Cornelius fasting.
  - type: text
    content: 'and praying here in my home at this very hour, three o’clock in the afternoon, when a man in glistening clothing suddenly appeared in front of my eyes. '
  '31':
  - type: text
    content: 'He said, ‘Cornelius, God has heard your prayers. Your generosity to the poor has been recorded and remembered in God’s presence. '
  - type: note
    content: The Aramaic is “Your acts of righteousness are offerings before God.”
  '32':
  - type: text
    content: 'However, you must send for a man named Simon, the Rock, who is staying in Joppa as a guest of Simon the tanner, who lives by the sea.’ '
  '33':
  - type: text
    content: So I immediately sent my men to bring you here—and you were kind enough to come. And now, here we are, all of us in God’s presence, anxious to hear the message that God has put into your heart to share with us.”
  '34':
  - type: text
    content: 'Peter said, “Now I know for certain that God doesn’t show favoritism with people '
  - type: note
    content: The Aramaic is “God is not the God of hypocrites.”
  - type: text
    content: but treats everyone on the same basis
  - type: text
    content: '. '
  - type: note
    content: The Greek is “God is not one who receives masks (faces).” God doesn’t treat us according to externalities but according to what is in our hearts.
  '35':
  - type: text
    content: 'It makes no difference what race of people one belongs to. If they show deep reverence for God, and are committed to doing what’s right, they are acceptable before him. '
  '36':
  - type: text
    content: 'God sent his word to the Jewish people first, '
  - type: note
    content: The Aramaic is “For the Living Expression was the inheritance of the Jewish people.”
  - type: text
    content: 'announcing the wonderful news of hope and peace '
  - type: note
    content: Or by inference, “peace with God through Jesus Christ.” Only the Aramaic has “hope and peace.”
  - type: text
    content: 'through Jesus, the Anointed One, the Lord of all. '
  - type: note
    content: The Aramaic is “who is Master Yahweh of all.” That is, Jesus is Lord, not just for the Jewish people but for all people groups. The Aramaic is “who is Master Yahweh of all.”
  '37':
  - type: text
    content: You are well aware of all that began in Galilee and spread throughout the land of Israel immediately after John preached his message of baptism.
  '38':
  - type: text
    content: '“Jesus of Nazareth was anointed by God with the Holy Spirit and with great power. He did wonderful things for others and divinely healed all who were under the tyranny of the devil, '
  - type: note
    content: The Greek word for “devil” can also be translated “slanderer-liar.”
  - type: text
    content: 'for God had anointed him. '
  '39':
  - type: text
    content: 'We apostles were eyewitnesses to all the miracles '
  - type: note
    content: Or “things.” By inference, the miracles of healing and deliverance.
  - type: text
    content: 'that he performed throughout the land of Israel. Finally, in Jerusalem, he was crucified on a cross, '
  - type: note
    content: Or “hung him on a tree and killed him.” See Deut. 21:23.
  '4':
  - type: text
    content: Startled, he was overcome with fear by the sight of the angel. He asked, “What do you want, Lord?”
  - type: text
    content: 'The angel said, “All of your prayers and your generosity to the poor have ascended before God as an eternal offering. '
  - type: note
    content: Or “as an offering that he remembers.”
  '40':
  - type: text
    content: 'but God raised him from the dead three days later, allowing him to be seen openly. '
  - type: note
    content: As translated from the Aramaic.
  '41':
  - type: text
    content: 'He didn’t appear to everyone, but he appeared to us, his chosen witnesses. He actually ate and drank with us '
  - type: note
    content: The word sumpino means “to drink together.” It is used only here in the New Testament and refers to being refreshed by drinking the after-dinner wine together. Jesus celebrated with his disciples after his resurrection. He still longs to celebrate with us today.
  - type: text
    content: after he rose from the dead!
  - type: note
    content: See Luke 24:35–49.
  '42':
  - type: text
    content: '“Jesus ordered us to preach and warn the people '
  - type: note
    content: Or “He commanded us to tell everyone the command.”
  - type: text
    content: 'that God had appointed him to be the judge of the living and the dead. '
  '43':
  - type: text
    content: And not only us
  - type: text
    content: ', but all of the prophets agree in their writings that everyone who believes in him receives complete forgiveness '
  - type: note
    content: Or “cancellation.”
  - type: text
    content: of sins through the power of his name.”
  - type: heading
    content: The Holy Spirit Falls
  '44':
  - type: text
    content: 'While Peter was speaking, the Holy Spirit cascaded over all those listening to his message. '
  '45':
  - type: text
    content: 'The Jewish brothers who had accompanied Peter were astounded that the gift of the Holy Spirit was poured out on people who weren’t Jews, '
  '46':
  - type: text
    content: for they heard them speaking in supernaturally given languages and passionately praising God.
  - type: note
    content: This is the gentile Pentecost as the Holy Spirit fell on gentile believers for the first time, imparting to them the gift of tongues.
  '47':
  - type: text
    content: 'Peter said, “How could anyone object to these people being baptized? For they have received the Holy Spirit just as we have.” '
  '48':
  - type: text
    content: So he instructed them to be baptized in the power of the name of Jesus, the Anointed One.
  - type: text
    content: After their baptism, they asked Peter to stay with them for a few more days.
  - type: note
    content: 'At last the gospel broke through and penetrated into the non-Jewish cultures and people groups. The Holy Spirit was now uniting Jewish believers and non-Jewish believers into one mystical body of Christ on the earth. Because of this, there would no longer be a distinction between Jew and non-Jew, but one family of believers formed by faith in Jesus Christ. See Gal. 3:26–29. The three conversions of the Ethiopian dignitary in ch. 8, Saul of Tarsus in ch. 9, and the Roman officer Cornelius in ch. 10 prove the power of the gospel of God. One could view these three represent all of the sons of Noah: Ham (Ethiopian), Shem (Saul), and Japheth (the Roman Cornelius). A black man, a Jew, and a gentile were converted!'
  '5':
  - type: text
    content: 'Now, send some men to Joppa at once. Have them find a man named Simon the Rock, '
  - type: note
    content: Or “Simon, who is also called Peter” (Rock).
  '6':
  - type: text
    content: who is staying as a guest in the home of Simon the tanner, whose house is by the sea.”
  '7':
  - type: text
    content: 'After the angel left, Cornelius called for two of his servants and a trusted, godly soldier who was his personal attaché. '
  '8':
  - type: text
    content: He explained to them everything that had just happened and sent them off to Joppa.
  - type: heading
    content: Peter’s Trance
  '9':
  - type: text
    content: 'The next day around noon, as Cornelius’ men were approaching Joppa, Peter went up to the flat roof '
  - type: note
    content: This was common when the house was filled with smoke from the cooking fires.
  - type: text
    content: 'of the house to pray. '
