document_id: PSA.39
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Cry for Help
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of praising by King David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew inscription includes the name Jeduthun, which can be translated “praising.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: 'Here’s my life motto, the truth I live by:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will guard my ways for all my days.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will speak only what is right, guarding what I speak.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a watchman guards against an attack of the enemy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll guard and muzzle my mouth
- type: usfm
  marker: q1
  children:
  - type: text
    text: when the wicked are around me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will remain silent and will not grumble
- type: usfm
  marker: q1
  children:
  - type: text
    text: or speak out of my disappointment.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the longer I’m silent, the more my pain grows worse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: My heart burned with a fire within me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my thoughts eventually boiled over
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'until they finally came rolling out of my mouth:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Lord, help me to know how fleeting my time on earth is.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Help me to know how limited is my life
- type: usfm
  marker: q1
  children:
  - type: text
    text: and that I’m only here but for a moment more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'What a brief '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Interestingly, the Hebrew word for “brief” in this verse is “a handbreadth,” or the span of a man’s hand. Our life’s duration is compared to a mere six-inch span!
    marker-yv: yv-n
  - type: text
    text: time you’ve given me to live!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Compared to you my lifetime is nothing at all!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing more than a puff of air—I’m gone so swiftly.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So too are the grandest of men;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are nothing but a fleeting shadow!”
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We live our lives like those living in shadows.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “like phantoms going to and fro.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: All our activities and energies are spent for things that pass away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We gather, we hoard, we cling to our things,
- type: usfm
  marker: q1
  children:
  - type: text
    text: only to leave them all behind for who knows who.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And now, God, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 39:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Maryah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the Aramaic form of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: or Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'I’m left with one conclusion:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: my only hope is to hope in you alone!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Save me from being overpowered by my sin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: don’t make me a disgrace before the degenerate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lord, I’m left speechless and I have no excuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so I’ll not complain any longer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now I know you’re the one who is behind it all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But I can’t take it much longer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Spare me these blows from your discipline-rod.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For if you are against me, I will waste away to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: No one endures when you rebuke and discipline us for our sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a cobweb is swept away with a wave of the hand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you sweep away all that we once called dear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How fleeting and frail our lives!
- type: usfm
  marker: q1
  children:
  - type: text
    text: We’re nothing more than a puff of air.
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Lord, listen to all my tender cries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Read my every tear, like liquid words that plead for your help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I feel all alone at times, like a stranger to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: passing through this life just like all those before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Don’t let me die without restoring
- type: usfm
  marker: q1
  children:
  - type: text
    text: joy and gladness to my soul.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May your frown over my failure
- type: usfm
  marker: q1
  children:
  - type: text
    text: become a smile over my success.
