document_id: PSA.39,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry for Help
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A song of praising by King David
  - type: note
    content: The Hebrew inscription includes the name Jeduthun, which can be translated “praising.”
  - type: text
    content: 'Here’s my life motto, the truth I live by:'
  - type: text
    content: I will guard my ways for all my days.
  - type: text
    content: I will speak only what is right, guarding what I speak.
  - type: text
    content: Like a watchman guards against an attack of the enemy,
  - type: text
    content: I’ll guard and muzzle my mouth
  - type: text
    content: when the wicked are around me.
  - type: text
    content: I will remain silent and will not grumble
  - type: text
    content: or speak out of my disappointment.
  - type: text
    content: But the longer I’m silent, the more my pain grows worse!
  '10':
  - type: text
    content: But I can’t take it much longer.
  - type: text
    content: Spare me these blows from your discipline-rod.
  - type: text
    content: For if you are against me, I will waste away to nothing.
  '11':
  - type: text
    content: No one endures when you rebuke and discipline us for our sins.
  - type: text
    content: Like a cobweb is swept away with a wave of the hand,
  - type: text
    content: you sweep away all that we once called dear.
  - type: text
    content: How fleeting and frail our lives!
  - type: text
    content: We’re nothing more than a puff of air.
  - type: text
    content: Pause in his presence
  '12':
  - type: text
    content: Lord, listen to all my tender cries.
  - type: text
    content: Read my every tear, like liquid words that plead for your help.
  - type: text
    content: I feel all alone at times, like a stranger to you,
  - type: text
    content: passing through this life just like all those before me.
  '13':
  - type: text
    content: Don’t let me die without restoring
  - type: text
    content: joy and gladness to my soul.
  - type: text
    content: May your frown over my failure
  - type: text
    content: become a smile over my success.
  '3':
  - type: text
    content: My heart burned with a fire within me,
  - type: text
    content: and my thoughts eventually boiled over
  - type: text
    content: 'until they finally came rolling out of my mouth:'
  - type: text
    content: “Lord, help me to know how fleeting my time on earth is.
  - type: text
    content: Help me to know how limited is my life
  - type: text
    content: and that I’m only here but for a moment more.
  '5':
  - type: text
    content: 'What a brief '
  - type: note
    content: Interestingly, the Hebrew word for “brief” in this verse is “a handbreadth,” or the span of a man’s hand. Our life’s duration is compared to a mere six-inch span!
  - type: text
    content: time you’ve given me to live!
  - type: text
    content: Compared to you my lifetime is nothing at all!
  - type: text
    content: Nothing more than a puff of air—I’m gone so swiftly.
  - type: text
    content: So too are the grandest of men;
  - type: text
    content: they are nothing but a fleeting shadow!”
  - type: text
    content: Pause in his presence
  '6':
  - type: text
    content: We live our lives like those living in shadows.
  - type: note
    content: Or “like phantoms going to and fro.”
  - type: text
    content: All our activities and energies are spent for things that pass away.
  - type: text
    content: We gather, we hoard, we cling to our things,
  - type: text
    content: only to leave them all behind for who knows who.
  '7':
  - type: text
    content: 'And now, God, '
  - type: note
    content: The Aramaic is Maryah, the Aramaic form of YHWH or Lord Yahweh.
  - type: text
    content: 'I’m left with one conclusion:'
  - type: text
    content: my only hope is to hope in you alone!
  '8':
  - type: text
    content: Save me from being overpowered by my sin;
  - type: text
    content: don’t make me a disgrace before the degenerate.
  '9':
  - type: text
    content: Lord, I’m left speechless and I have no excuse,
  - type: text
    content: so I’ll not complain any longer.
  - type: text
    content: Now I know you’re the one who is behind it all.
