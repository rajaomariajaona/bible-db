document_id: 2PE.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming of the Lord
  - type: text
    content: 'Beloved friends, this is now the second letter I have written to you '
  - type: note
    content: This would indicate that Peter is writing to the same people as his first letter (Galatia, Cappadocia, and the Roman province of Asia).
  - type: text
    content: 'in which I’ve attempted to stir you up and awaken you to a proper mind-set. '
  - type: note
    content: Or “a pure mind” or “sincere intention.” The Aramaic can be translated “awaken your beautiful memories.”
  '10':
  - type: text
    content: 'The day of the Lord will come and take everyone by surprise—as unexpected as a home invasion. The atmosphere will be set on fire and vanish with a horrific roar, and the heavenly bodies '
  - type: note
    content: Or “elements.”
  - type: text
    content: 'will melt away as in a tremendous blaze. The earth and every activity of man will be laid bare. '
  - type: note
    content: The Aramaic can be translated “The earth and its works will be refined.”
  '11':
  - type: text
    content: 'Since all these things are on the verge of being dismantled, don’t you see how vital it is to live a holy life? We must be consumed with godliness '
  '12':
  - type: text
    content: 'while we anticipate and help to speed up the coming of the day of God, '
  - type: note
    content: Peter is teaching us that the church has the ability to speed up (and, by implication, slow down) the coming of the day of God. The closer we get to Christ, the closer will be his coming. “The day of God” is an equivalent phrase to the “day of the Lord.”
  - type: text
    content: 'when the atmosphere will be set on fire and the heavenly bodies consumed in a blaze. '
  '13':
  - type: text
    content: 'But as we wait, we trust in God’s royal proclamation to be fulfilled. There are coming '
  - type: note
    content: As translated from the Aramaic. The Aramaic word for promise is best translated “royal proclamation.”
  - type: text
    content: heavens new in quality, and an earth new in quality, where righteousness will be fully at home.
  - type: note
    content: See Isa. 65:17; 66:22. There is coming a day when all will live according to God’s perfect will for their lives and righteousness will be at home on earth and in every heart. This will be the day when justice reigns on earth. The Aramaic can be translated “We expect from his promise a new sky and a new earth in which the virtuous people will dwell.”
  - type: heading
    content: Preparation for the Coming of the Lord
  '14':
  - type: text
    content: 'So, my beloved friends, with all that you have to look forward to, may you be eager to be found living pure lives '
  - type: text
    content: when you come into his presence
  - type: text
    content: ', '
  - type: note
    content: Although this is clearly implied, it is based on the dative pronoun autō, which does not indicate agency (by him), but in his presence (before him).
  - type: text
    content: 'without blemish and filled with peace. '
  '15':
  - type: text
    content: 'And keep in mind that our Lord’s extraordinary patience simply means '
  - type: text
    content: more opportunity for
  - type: text
    content: ' salvation, '
  - type: note
    content: See 2 Peter 3:9. The Aramaic can be translated “Consider the Lord’s outpouring of [his] Spirit as salvation.”
  - type: text
    content: 'just as our dear brother Paul wrote to you with the wisdom that God gave him. '
  '16':
  - type: text
    content: 'He consistently speaks of these things in all of his letters, even though he writes some concepts that are overwhelming to our understanding, which the unlearned and unstable love to twist to their '
  - type: text
    content: spiritual
  - type: text
    content: ' ruin, as they do to other Scriptures.'
  - type: note
    content: This is not meant to imply that we cannot understand the Bible, but that there are certain concepts that are difficult to understand. The Bible is the only book whose Author is present every time it is read. The Holy One is the Divine Author of Scripture (2 Tim. 3:16) and is the one who can open our hearts to understand truth. It is when we twist the Scriptures to fit our understanding that we are distorting its truth. Note also that Peter places Paul’s letters in the same category as the “other [inspired] Scriptures.”
  - type: heading
    content: Grow in God’s Grace
  '17':
  - type: text
    content: 'As for you, divinely loved ones, since you are forewarned of these things, be careful that you are not led astray by the error of the lawless and lose your firm grip '
  - type: text
    content: on the truth
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'But continue to grow and increase in God’s grace and intimacy with our Lord and Savior, Jesus Christ. '
  - type: note
    content: 'The Aramaic does not use the imperative but makes it more of a decree: “You continue to be nourished in grace and in the intimate knowledge of our Lord and Savior, Jesus the Messiah, and of God the Father.” Spiritual growth is yielding to the grace of God and having passion to know Jesus Christ intimately. In time, we grow into his beautiful image.'
  - type: text
    content: May he receive all the glory both now and until the day eternity begins. Amen!
  '2':
  - type: text
    content: 'So never forget both the prophecies spoken by the holy prophets of old and the teaching '
  - type: note
    content: Or “commandment.”
  - type: text
    content: of our Lord and Savior spoken by your apostles.
  - type: note
    content: Peter places “your apostles” on the same level as the Old Testament prophets as to their trustworthiness and in setting the standard for living a life of purity for God.
  '3':
  - type: text
    content: 'Above all, you must understand that in the last days mockers '
  - type: note
    content: Or “deceivers.”
  - type: text
    content: 'will multiply, chasing after their evil desires. '
  '4':
  - type: text
    content: 'They will say, “So what about this promise of his coming? '
  - type: note
    content: This is the Greek word parousia, which can also mean “presence” or “arrival” or “visitation.” The Aramaic can be translated “Where is the kingdom that he brought?”
  - type: text
    content: Our ancestors are dead and buried, yet everything is still the same as it was since from the beginning of time until now.”
  '5':
  - type: text
    content: 'But they conveniently overlook that from the beginning, the heavens and earth were created by God’s word. '
  - type: text
    content: He spoke
  - type: text
    content: ' and the dry ground separated from the waters. '
  '6':
  - type: text
    content: 'Then long afterward he destroyed the world with a tremendous flood by those very waters. '
  - type: note
    content: Verses 5–6 are translated from the Aramaic. The Greek could be translated “The word of the Lord formed the heavens and the earth out of water and by means of water. And it was destroyed by the submerging of the world of that day—destroyed by water.”
  '7':
  - type: text
    content: 'And now, by the same '
  - type: text
    content: powerful
  - type: text
    content: ' word, the heavens and the earth are reserved for fire, '
  - type: note
    content: The Aramaic can be translated “the earth is being kept as a hayloft (or pile of hay) for the fire.”
  - type: text
    content: being kept for judgment day, when all the ungodly will perish.
  '8':
  - type: text
    content: 'So, dear friends, don’t let this one thing escape your notice: a single day counts like a thousand years to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'and a thousand years counts as one day. '
  - type: note
    content: Peter gives us an incredible interpretive key to understand time from the Lord’s perspective. A day and a thousand years can both be symbolic. See also Ps. 90:4.
  '9':
  - type: text
    content: 'This means that, '
  - type: text
    content: contrary to man’s perspective
  - type: text
    content: ', the Lord is not late with his promise '
  - type: text
    content: to return
  - type: text
    content: ', as some measure lateness. But rather, his “delay” simply reveals his loving patience toward you, because he does not want any to perish but all to come to repentance.'
  - type: note
    content: The Aramaic is quite different and can be translated “The Lord does not treat his kingdom like a dutiful chore, as some people consider it, like the treatment of a temporary laborer. But he pours out his Spirit on your behalf, since he does not wish that anyone should perish but that everyone should come into grace.”
