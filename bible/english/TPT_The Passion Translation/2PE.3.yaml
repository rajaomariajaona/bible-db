document_id: 2PE.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Coming of the Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved friends, this is now the second letter I have written to you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would indicate that Peter is writing to the same people as his first letter (Galatia, Cappadocia, and the Roman province of Asia).
      marker-yv: yv-n
    - type: text
      text: 'in which I’ve attempted to stir you up and awaken you to a proper mind-set. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a pure mind” or “sincere intention.” The Aramaic can be translated “awaken your beautiful memories.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The day of the Lord will come and take everyone by surprise—as unexpected as a home invasion. The atmosphere will be set on fire and vanish with a horrific roar, and the heavenly bodies '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “elements.”
      marker-yv: yv-n
    - type: text
      text: 'will melt away as in a tremendous blaze. The earth and every activity of man will be laid bare. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “The earth and its works will be refined.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since all these things are on the verge of being dismantled, don’t you see how vital it is to live a holy life? We must be consumed with godliness '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while we anticipate and help to speed up the coming of the day of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter is teaching us that the church has the ability to speed up (and, by implication, slow down) the coming of the day of God. The closer we get to Christ, the closer will be his coming. “The day of God” is an equivalent phrase to the “day of the Lord.”
      marker-yv: yv-n
    - type: text
      text: 'when the atmosphere will be set on fire and the heavenly bodies consumed in a blaze. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as we wait, we trust in God’s royal proclamation to be fulfilled. There are coming '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Aramaic word for promise is best translated “royal proclamation.”
      marker-yv: yv-n
    - type: text
      text: heavens new in quality, and an earth new in quality, where righteousness will be fully at home.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 65:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 66:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . There is coming a day when all will live according to God’s perfect will for their lives and righteousness will be at home on earth and in every heart. This will be the day when justice reigns on earth. The Aramaic can be translated “We expect from his promise a new sky and a new earth in which the virtuous people will dwell.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preparation for the Coming of the Lord
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, my beloved friends, with all that you have to look forward to, may you be eager to be found living pure lives '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when you come into his presence
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although this is clearly implied, it is based on the dative pronoun
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: autō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which does not indicate agency (by him), but in his presence (before him).'
      marker-yv: yv-n
    - type: text
      text: 'without blemish and filled with peace. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And keep in mind that our Lord’s extraordinary patience simply means '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more opportunity for
    - type: text
      text: ' salvation, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Aramaic can be translated “Consider the Lord’s outpouring of [his] Spirit as salvation.”
      marker-yv: yv-n
    - type: text
      text: 'just as our dear brother Paul wrote to you with the wisdom that God gave him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He consistently speaks of these things in all of his letters, even though he writes some concepts that are overwhelming to our understanding, which the unlearned and unstable love to twist to their '
    - type: usfm
      marker: it
      children:
      - type: text
        text: spiritual
    - type: text
      text: ' ruin, as they do to other Scriptures.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not meant to imply that we cannot understand the Bible, but that there are certain concepts that are difficult to understand. The Bible is the only book whose Author is present every time it is read. The Holy One is the Divine Author of Scripture (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and is the one who can open our hearts to understand truth. It is when we twist the Scriptures to fit our understanding that we are distorting its truth. Note also that Peter places Paul’s letters in the same category as the “other [inspired] Scriptures.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Grow in God’s Grace
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for you, divinely loved ones, since you are forewarned of these things, be careful that you are not led astray by the error of the lawless and lose your firm grip '
    - type: usfm
      marker: it
      children:
      - type: text
        text: on the truth
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But continue to grow and increase in God’s grace and intimacy with our Lord and Savior, Jesus Christ. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic does not use the imperative but makes it more of a decree: “You continue to be nourished in grace and in the intimate knowledge of our Lord and Savior, Jesus the Messiah, and of God the Father.” Spiritual growth is yielding to the grace of God and having passion to know Jesus Christ intimately. In time, we grow into his beautiful image.'
      marker-yv: yv-n
    - type: text
      text: May he receive all the glory both now and until the day eternity begins. Amen!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So never forget both the prophecies spoken by the holy prophets of old and the teaching '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “commandment.”
      marker-yv: yv-n
    - type: text
      text: of our Lord and Savior spoken by your apostles.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter places “your apostles” on the same level as the Old Testament prophets as to their trustworthiness and in setting the standard for living a life of purity for God.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Above all, you must understand that in the last days mockers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “deceivers.”
      marker-yv: yv-n
    - type: text
      text: 'will multiply, chasing after their evil desires. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They will say, “So what about this promise of his coming? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: parousia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which can also mean “presence” or “arrival” or “visitation.” The Aramaic can be translated “Where is the kingdom that he brought?”'
      marker-yv: yv-n
    - type: text
      text: Our ancestors are dead and buried, yet everything is still the same as it was since from the beginning of time until now.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they conveniently overlook that from the beginning, the heavens and earth were created by God’s word. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: He spoke
    - type: text
      text: ' and the dry ground separated from the waters. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then long afterward he destroyed the world with a tremendous flood by those very waters. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are translated from the Aramaic. The Greek could be translated “The word of the Lord formed the heavens and the earth out of water and by means of water. And it was destroyed by the submerging of the world of that day—destroyed by water.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now, by the same '
    - type: usfm
      marker: it
      children:
      - type: text
        text: powerful
    - type: text
      text: ' word, the heavens and the earth are reserved for fire, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “the earth is being kept as a hayloft (or pile of hay) for the fire.”
      marker-yv: yv-n
    - type: text
      text: being kept for judgment day, when all the ungodly will perish.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, dear friends, don’t let this one thing escape your notice: a single day counts like a thousand years to the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'and a thousand years counts as one day. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter gives us an incredible interpretive key to understand time from the Lord’s perspective. A day and a thousand years can both be symbolic. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 90:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This means that, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: contrary to man’s perspective
    - type: text
      text: ', the Lord is not late with his promise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to return
    - type: text
      text: ', as some measure lateness. But rather, his “delay” simply reveals his loving patience toward you, because he does not want any to perish but all to come to repentance.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is quite different and can be translated “The Lord does not treat his kingdom like a dutiful chore, as some people consider it, like the treatment of a temporary laborer. But he pours out his Spirit on your behalf, since he does not wish that anyone should perish but that everyone should come into grace.”
      marker-yv: yv-n
