document_id: SNG.8,1849
type_code: eng
verses:
  '1':
  - type: text
    content: If only I could show everyone
  - type: text
    content: this passionate desire I have for you.
  - type: text
    content: If only I could express it fully,
  - type: text
    content: no matter who was watching me,
  - type: text
    content: without shame or embarrassment.
  '11':
  - type: text
    content: 'My bridegroom-king has a vineyard '
  - type: text
    content: of love
  - type: text
    content: made from a multitude of followers.
  - type: note
    content: The Hebrew text literally means “Solomon had a vineyard at Baal-hamon.” The king’s vineyard is a picture of the church, the called-out multitude of those who follow Jesus (Dan. 7:9–10; Rev. 7:9). Baal-hamon can be translated “lord of a multitude,” “lord of an uproar,” or “lord of wealth.”
  - type: text
    content: His caretakers of this vineyard
  - type: text
    content: have given my beloved their best.
  '12':
  - type: text
    content: But as for my own vineyard of love,
  - type: text
    content: I give all the glory to you.
  - type: note
    content: Or “you may have the thousand (shekels), O Solomon.” The number one thousand is a biblical symbol for the glory of God. The prize of mature sonship is a truth that defies description, and all the glory of the vineyard belongs to our King, one greater than Solomon.
  - type: text
    content: And I will give double honor
  - type: note
    content: Or “the two hundred.” This is two times one hundred. The number one hundred represents the children of the promise. Abraham was one hundred when Isaac, the promised seed, was born (Gen. 21:5). Isaac was a type of the children of promise, the spiritual seed (Rom. 9:7–8; Gal. 4:28). The number one hundred is also connected to Isaac’s sowing and reaping, and the blessing of God (Gen. 26:12). The Lord will receive the hundred-fold fruit of his life in us (Matt. 13:8–9). Jesus has one hundred sheep in his fold (Matt. 18:11–12). The number two is the symbol of witness. Two hundred reveals the witness of God’s sons coming forth (Rom. 8:19–21).
  - type: text
    content: to those who serve my beloved
  - type: text
    content: and have watched over my soul.
  '13':
  - type: text
    content: My beloved, one with me in my garden,
  - type: text
    content: how marvelous that my friends, the brides-to-be,
  - type: text
    content: now hear your voice and song.
  - type: text
    content: Let me now hear it again.
  - type: heading
    content: The Bridegroom and the Bride in Divine Duet
  '14':
  - type: text
    content: Arise, my darling!
  - type: text
    content: Come quickly, my beloved.
  - type: text
    content: Come and be the graceful gazelle with me.
  - type: text
    content: Come be like a young stag with me.
  - type: text
    content: We will dance in the high place of the sky,
  - type: text
    content: yes, on the mountains of fragrant spice.
  - type: text
    content: Forever we shall be united as one!
  '2':
  - type: text
    content: I long to bring you to my innermost chamber—
  - type: text
    content: this holy sanctuary you have formed within me.
  - type: text
    content: O that I might carry you within me!
  - type: text
    content: I would give you the spiced wine of my love,
  - type: text
    content: this full cup of bliss that we share.
  - type: text
    content: We would drink our fill until . . .
  '3':
  - type: text
    content: His left hand cradles my head
  - type: text
    content: while his right hand holds me close.
  - type: text
    content: We are at rest in this love.
  '4':
  - type: text
    content: Promise me, brides-to-be,
  - type: text
    content: by the gentle gazelles and delicate deer,
  - type: text
    content: that you’ll not disturb my love until he is ready to arise.
  - type: heading
    content: The Bridegroom-King
  '5':
  - type: text
    content: Who is this one?
  - type: text
    content: She arises out of her desert, clinging to her beloved.
  - type: text
    content: When I awakened you under the apple tree,
  - type: text
    content: as you were feasting upon me,
  - type: text
    content: I awakened your innermost being with the travail of birth
  - type: text
    content: as you longed for more of me.
  '6':
  - type: text
    content: Fasten me upon your heart as a seal of fire forevermore.
  - type: text
    content: This living, consuming flame
  - type: text
    content: will seal you as my prisoner of love.
  - type: note
    content: The ancient Hebrew word for “seal” can also be translated “prison cell.” He longs for his bride to be his love prisoner, in the prison cell of his eternal love.
  - type: text
    content: My passion
  - type: text
    content: ' '
  - type: note
    content: Or “jealousy.”
  - type: text
    content: is stronger
  - type: text
    content: than the chains of death and the grave,
  - type: text
    content: all consuming as the very flashes of fire
  - type: text
    content: from the burning heart of God.
  - type: note
    content: The phrase in Hebrew is “a most vehement flame” and is actually two Hebrew words. The first means “a mighty flash of fire,” and the second is “Yah,” which is the sacred name of God himself. The Hebrew shalhebet-yah could be translated “The mighty flame of the Lord most passionate!”
  - type: text
    content: Place this fierce, unrelenting fire over your entire being.
  '7':
  - type: text
    content: Rivers of pain and persecution
  - type: text
    content: will never extinguish this flame.
  - type: text
    content: Endless floods will be unable
  - type: text
    content: to quench this raging fire that burns within you.
  - type: text
    content: Everything will be consumed.
  - type: text
    content: It will stop at nothing
  - type: text
    content: as you yield everything to this furious fire
  - type: text
    content: until it won’t even seem to you like a sacrifice anymore.
  - type: heading
    content: The Shulamite Bride
  '8':
  - type: text
    content: My brothers said to me when I was young,
  - type: text
    content: “Our sister is so immature
  - type: text
    content: .
  - type: text
    content: What will we do to guard her for her wedding day?”
  - type: heading
    content: The Bridegroom-King
  - type: text
    content: We will build a tower of redemption to protect her.
  - type: text
    content: Since she is vulnerable,
  - type: text
    content: we will enclose her with a wall of cedar boards.
  - type: heading
    content: The Shulamite Bride
  - type: text
    content: But now I have grown and become a bride,
  - type: text
    content: and my love for him has made me
  - type: text
    content: a tower of passion and contentment for my beloved.
  - type: text
    content: I am now a firm wall of protection for others,
  - type: text
    content: guarding them from harm.
  - type: text
    content: This is how he sees me—I am the one who brings him bliss,
  - type: text
    content: finding favor in his eyes.
