document_id: SNG.8
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: If only I could show everyone
- type: usfm
  marker: q1
  children:
  - type: text
    text: this passionate desire I have for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If only I could express it fully,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter who was watching me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: without shame or embarrassment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I long to bring you to my innermost chamber—
- type: usfm
  marker: q1
  children:
  - type: text
    text: this holy sanctuary you have formed within me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O that I might carry you within me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I would give you the spiced wine of my love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: this full cup of bliss that we share.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We would drink our fill until . . .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: His left hand cradles my head
- type: usfm
  marker: q1
  children:
  - type: text
    text: while his right hand holds me close.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We are at rest in this love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Promise me, brides-to-be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: by the gentle gazelles and delicate deer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you’ll not disturb my love until he is ready to arise.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom-King
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Who is this one?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: She arises out of her desert, clinging to her beloved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When I awakened you under the apple tree,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as you were feasting upon me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I awakened your innermost being with the travail of birth
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as you longed for more of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Fasten me upon your heart as a seal of fire forevermore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This living, consuming flame
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will seal you as my prisoner of love.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The ancient Hebrew word for “seal” can also be translated “prison cell.” He longs for his bride to be his love prisoner, in the prison cell of his eternal love.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: My passion
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “jealousy.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is stronger
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: than the chains of death and the grave,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: all consuming as the very flashes of fire
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: from the burning heart of God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The phrase in Hebrew is “a most vehement flame” and is actually two Hebrew words. The first means “a mighty flash of fire,” and the second is “Yah,” which is the sacred name of God himself. The Hebrew
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: shalhebet-yah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: could be translated “The mighty flame of the Lord most passionate!”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Place this fierce, unrelenting fire over your entire being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rivers of pain and persecution
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: will never extinguish this flame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Endless floods will be unable
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: to quench this raging fire that burns within you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Everything will be consumed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It will stop at nothing
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as you yield everything to this furious fire
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until it won’t even seem to you like a sacrifice anymore.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-10
  - type: text
    text: My brothers said to me when I was young,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: “Our sister is so immature
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: What will we do to guard her for her wedding day?”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom-King
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: We will build a tower of redemption to protect her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Since she is vulnerable,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: we will enclose her with a wall of cedar boards.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Shulamite Bride
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: But now I have grown and become a bride,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my love for him has made me
- type: usfm
  marker: q1
  children:
  - type: text
    text: a tower of passion and contentment for my beloved.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am now a firm wall of protection for others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: guarding them from harm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is how he sees me—I am the one who brings him bliss,
- type: usfm
  marker: q1
  children:
  - type: text
    text: finding favor in his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'My bridegroom-king has a vineyard '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of love
- type: usfm
  marker: q1
  children:
  - type: text
    text: made from a multitude of followers.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text literally means “Solomon had a vineyard at Baal-hamon.” The king’s vineyard is a picture of the church, the called-out multitude of those who follow Jesus (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 7:9–10
      metadata:
        usfm: DAN.7.9+DAN.7.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 7:9
      metadata:
        usfm: REV.7.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Baal-hamon can be translated “lord of a multitude,” “lord of an uproar,” or “lord of wealth.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: His caretakers of this vineyard
- type: usfm
  marker: q1
  children:
  - type: text
    text: have given my beloved their best.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But as for my own vineyard of love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I give all the glory to you.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you may have the thousand (shekels), O Solomon.” The number one thousand is a biblical symbol for the glory of God. The prize of mature sonship is a truth that defies description, and all the glory of the vineyard belongs to our King, one greater than Solomon.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will give double honor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the two hundred.” This is two times one hundred. The number one hundred represents the children of the promise. Abraham was one hundred when Isaac, the promised seed, was born (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 21:5
      metadata:
        usfm: GEN.21.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Isaac was a type of the children of promise, the spiritual seed (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 9:7–8
      metadata:
        usfm: ROM.9.7+ROM.9.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 4:28
      metadata:
        usfm: GAL.4.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The number one hundred is also connected to Isaac’s sowing and reaping, and the blessing of God (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 26:12
      metadata:
        usfm: GEN.26.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The Lord will receive the hundred-fold fruit of his life in us (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 13:8–9
      metadata:
        usfm: MAT.13.8+MAT.13.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Jesus has one hundred sheep in his fold (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 18:11–12
      metadata:
        usfm: MAT.18.11+MAT.18.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The number two is the symbol of witness. Two hundred reveals the witness of God’s sons coming forth (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 8:19–21
      metadata:
        usfm: ROM.8.19+ROM.8.20+ROM.8.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: to those who serve my beloved
- type: usfm
  marker: q1
  children:
  - type: text
    text: and have watched over my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: My beloved, one with me in my garden,
- type: usfm
  marker: q1
  children:
  - type: text
    text: how marvelous that my friends, the brides-to-be,
- type: usfm
  marker: q1
  children:
  - type: text
    text: now hear your voice and song.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let me now hear it again.
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Bridegroom and the Bride in Divine Duet
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Arise, my darling!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come quickly, my beloved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Come and be the graceful gazelle with me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come be like a young stag with me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: We will dance in the high place of the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: yes, on the mountains of fragrant spice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Forever we shall be united as one!
