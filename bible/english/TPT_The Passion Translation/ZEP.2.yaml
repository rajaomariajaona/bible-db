  - type: heading
    content: The Doom of Israel’s Enemies
  '4':
  - type: text
    content: “For Gaza will be deserted,
  - type: text
    content: and Ashkelon devastated.
  - type: text
    content: Ashdod will be driven out in broad daylight,
  - type: text
    content: and Ekron left desolate.
  - type: note
    content: Four of the five major cities of the Philistines are mentioned here. Gath had already been destroyed by the Assyrian king Sargon II in 711 BC.
  '5':
  - type: text
    content: Doom to you who live on the seacoast,
  - type: text
    content: to the nation of Cherethites!
  - type: note
    content: The Cherethites were originally from Crete and settled along the southern coast of Israel with the Philistines. See Ezek. 25:16.
  - type: text
    content: And Canaan, land of the Philistines,
  - type: text
    content: 'the word of '
  - type: text
