  - type: text
    content: I will destroy and annihilate you.
  '6':
  - type: text
    content: Your coastal lands will be reduced to pastureland,
  - type: text
    content: 'to grazing grounds '
  - type: note
    content: Or “hand-dug shelters [caves] for shepherds.”
  - type: text
