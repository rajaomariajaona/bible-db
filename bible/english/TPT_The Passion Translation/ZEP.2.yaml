  '7':
  - type: text
    content: Your land will be occupied
  - type: text
    content: by the remnant of the people of Judah.
  - type: text
    content: During the day
  - type: text
    content: ', they will find pasture by the sea,'
  - type: text
    content: and at night, they will rest in the houses of Ashkelon.
  - type: text
    content: Yahweh
  - type: text
    content: ' their God will care for them,'
  - type: text
    content: and make them prosper again.”
  - type: note
    content: 'Or “and return their captives.” The meaning of the root Hebrew expression shub shebut is disputed. There are two possible readings: either “to restore their fortunes” or “to turn their captivity” (i.e., “return their captives”). It may be argued that these two readings are related, providing a dual perspective on God’s gracious restoration of his people.'
  - type: heading
    content: Moab and Ammon
  '8':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have heard the crude taunts of Moab'
  - type: text
    content: and the vile insults of the Ammonites
  - type: text
    content: as they scorned my people
  - type: text
    content: and boasted that they would annex the land of Judah.
  '9':
  - type: text
    content: 'For as surely as I live, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'God of Israel, Commander of Angel Armies, decree:'
  - type: text
    content: Moab will become like Sodom
  - type: text
    content: and the Ammonites like Gomorrah.
  - type: text
    content: The remnant of my people will plunder them;
  - type: text
    content: the survivors of my nation will possess them.
  - type: text
    content: Their lands will become barren forever,
  - type: text
    content: a land of nothing but salt pits and piles of weeds.
