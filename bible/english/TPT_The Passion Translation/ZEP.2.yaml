  - type: heading
    content: A Call to Repentance
  - type: text
    content: 'Go ahead and gather yourselves together, '
  - type: note
    content: The Hebrew verb for “gather” is taken from the same root word for “straw” or “stubble.” The verb is used for gathering straw (see Ex. 5:7, 12) and gathering sticks for firewood (see Num. 15:32; 1 Kings 17:10). Zephaniah’s play on words would not be lost upon the Hebrew reader. Straw would easily burn in a day of God’s fiery anger.
  - type: text
