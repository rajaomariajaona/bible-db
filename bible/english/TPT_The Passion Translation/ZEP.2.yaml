  - type: heading
    content: Assyria
  '13':
  - type: text
    content: “I will attack the northern land of Assyria
  - type: text
    content: and destroy it all.
  - type: text
    content: Nineveh will be left as desolate and dry as a desert.
  - type: note
    content: The river Tigris flowed through the land of Assyria, and the city of Nineveh was known for its canals and waterways. The great city of Nineveh was conquered and leveled by the Medes and Babylonians in 612 BC, so it is likely that Zephaniah lived to see his prophecy fulfilled. In 401 BC, the Greek traveler Xenophon visited its site and wrote that he could find no trace of it, so complete was its destruction.
  '14':
  - type: text
    content: 'It will be '
  - type: text
    content: nothing more than
  - type: text
    content: ' a resting place for flocks and herds,'
  - type: text
    content: along with all creatures of every kind.
  - type: note
    content: Or “all the beasts of the nations” or probably “animals of every species.”
  - type: text
    content: The vulture and owl
  - type: note
    content: The meaning of the Hebrew word used for the first bird, qaʾat, is uncertain. It could be translated “cormorant,” “pelican,” “jackdaw,” “screech owl,” “horned owl,” “desert owl,” or “vulture.” Regardless of this bird’s exact identity, we know it is an unclean bird mentioned in Lev. 11:18 and Deut. 14:17 that is known for inhabiting deserted places (see Ps. 102:6; Isa. 34:11). The second animal is mentioned with the word qippod, which can be translated “owl,” “hedgehog,” “bittern,” “heron,” “porcupine,” or “ruffed bustard.” Zephaniah was not giving us a scientific definition of species but informing us that the land will be occupied only by wild animals that live in desolate places.
  - type: text
    content: will nest at night in its ruins.
  - type: note
    content: Or “on its [broken] pillars.”
  - type: text
    content: Owls will hoot from the windows,
  - type: text
    content: and crows will caw in the doorways—
  - type: text
    content: for all their once-fancy cedar woodwork
  - type: text
    content: will be exposed to the elements.
  - type: note
    content: Or “will be laid bare.”
