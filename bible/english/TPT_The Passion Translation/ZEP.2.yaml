        text: The river Tigris flowed through the land of Assyria, and the city of Nineveh was known for its canals and waterways. The great city of Nineveh was conquered and leveled by the Medes and Babylonians in 612 BC, so it is likely that Zephaniah lived to see his prophecy fulfilled. In 401 BC, the Greek traveler Xenophon visited its site and wrote that he could find no trace of it, so complete was its destruction.
