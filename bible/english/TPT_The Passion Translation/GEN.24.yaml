        usfm: ISA.30.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and when he heard everything the man had told his sister and saw her gold nose ring and the costly bracelets dangling on her wrists, Laban ran out to meet the man waiting at the well—and there he was standing beside his camels.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Laban said to the man, “Friend, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has wonderfully blessed you; please, come to my home. Why are you standing out here when I have prepared the house for you and a place for your camels?” '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: So the man came into the house, and his camels were unloaded and given straw and feed. The servants brought water to wash the man’s feet and the feet of the men with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But when they set food before him, he said, “I won’t eat until I tell you why I’m here.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Please, tell us,” Laban said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“I am Abraham’s servant,” he began. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has wonderfully blessed my master, and he has become extremely wealthy. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “great” or “powerful.”
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has given him flocks and herds, camels and donkeys, a fortune in silver and gold, and many male and female servants. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And my master’s wife, Sarah, has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: miraculously
  - type: text
    text: ' borne him a son in her old age, and my master’s son is the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sole
  - type: text
    text: ' heir of his fortune. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'My master has put me under an oath saying, ‘Do not get a wife for my son from among the daughters of the Canaanites among whom I am living. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Instead, go to my relatives in my native land and find a wife among them for my son.’ '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'In reply I said to my master, ‘Suppose the woman refuses to return with me.’ '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: He answered me, ‘
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', in whose presence I have walked '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all these years
  - type: text
    text: ', will send his angel with you and will make your mission successful. You will find a wife for my son from among my relatives, my father’s family. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'If you go to my relatives, and they will not give her to you, then and only then will you be released from this oath.’ '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from my adjuration.” The Hebrew implies that only if the girl’s family refused to release her would the servant be absolved from the curse and penalty for breaking his oath.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So, when I arrived at the well today, I prayed, ‘O  '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of my master Abraham, make my mission a success. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'I’m here standing at this well. May the right girl for my master’s son come out to draw water. And when she does, I will say to her “Please give me a little drink from your jar.” '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'And if she replies, saying, “Drink, and I will also draw water for your camels,” then I might know that she is the young woman '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has chosen for my master’s son.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '“Before I had even finished my heartfelt prayer, there was Rebekah coming out with her water jar on her shoulder! After she went down to the well and filled her jar, I said to her, ‘Please give me a drink.’ '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'She quickly lowered her jar and said, ‘Drink, and I will also draw water for your camels.’ So, I drank, and she also watered the camels. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Then I asked her, ‘Tell me, who is your father?’ She said, ‘I’m the daughter of Bethuel, son of Nahor, whom Milcah bore to him.’ '
  - type: usfm
    marker: it
    children:
    - type: text
      text: When I learned she was of my master’s family
  - type: text
    text: ', I put a gold ring in her nose and gold bracelets on her wrists, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'and I bowed before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and worshiped him. I praised '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of my master Abraham, who led me perfectly on the right path to find the very daughter of my master’s brother to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: marry
  - type: text
    text: ' his son. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Now, if you will show faithful love to my master and do what is right, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: then give me permission to take Rebekah back to his land
  - type: text
    text: . If not, tell me, and I will go on my way.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will turn to the right or to the left,” which suggests going elsewhere to look for a wife for his master’s son.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: it
    children:
    - type: text
      text: After hearing this
  - type: text
    text: ', Laban and Bethuel said, “This was all planned by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: So many times we think the events of our life are happenstance, but they may be a “divine setup” to release the next phase of destiny in our lives.
    marker-yv: yv-n
  - type: text
    text: 'If this is his plan, what can we say? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “we are not able to speak to you bad or good.” It didn’t matter to Laban and Bethuel what they could add, for they viewed all that happened as God’s will.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Here stands our Rebekah before you. You may take her and go and let her marry your master’s son and fulfill '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s plan for her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'When Abraham’s servant heard their words, he bowed his face down to the ground and worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Then he brought expensive jewelry of silver and gold and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exquisitely embroidered
  - type: text
    text: ' garments, and gave them all to Rebekah, and he gave '
  - type: usfm
    marker: it
    children:
    - type: text
      text: costly
  - type: text
    text: ' gifts to her brother and her mother. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:53
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These “costly gifts” would likely serve as the bride price required by the culture of that day.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Afterward, the servant and his men ate and drank, and they spent the night '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in Laban’s home
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: text
    text: 'First thing in the morning, he said to them, “Allow me now to return to my master.” '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Her brother and mother replied, “Please let Rebekah remain with us a while—for ten days or so, then she may go with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'He responded, “Please, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has made my mission successful. Send me off '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with her
  - type: text
    text: ' to my master, don’t make me wait.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'They answered him, “We will call for Rebekah and see what she wants to do.” '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: So they called for Rebekah and asked her, “Will you go with this man?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“I will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gladly
  - type: text
    text: ' go with him,” she answered. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'So they sent their sister Rebekah away with her servant girls to go with Abraham’s servant and his men. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As she departed
  - type: text
    text: ', they blessed her with these words:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our dear sister,
- type: usfm
  marker: q1
  children:
  - type: text
    text: may you become thousands of ten thousands!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:60
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “may you be [grow into] thousands of myriads!”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: May your descendants gain possession
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the city gates of their foes!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:60
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Destiny hung over them that moment as the Spirit of Prophecy fell. The prophetic blessing was this: The seed (descendants) of Rebekah received the same blessing as the seed of Abraham: they would possess the city gates of their enemies. They would take cities! They would possess the places once held by God’s enemies. This is a prophetic promise of a coming anointing that would reach cities. This city-reaching power comes when God’s people walk with a heart like Rebekah. We must become Rebekah’s spiritual seed, so that we may enter into the gate-taking anointing for our cities.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Then Rebekah and her servant girls mounted the camels and followed the servant and his men.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:61
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Their journey to Isaac’s home would have lasted at least a month.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Isaac Meets Rebekah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Meanwhile, Isaac, who was living in the southern desert of Canaan, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:62
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the land of the Negev.”
    marker-yv: yv-n
  - type: text
    text: 'had just come back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to his camp
  - type: text
    text: ' from the Well of the Living One Who Watches Over Me. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:62
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Beer-Lahai-Roi.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 16:14
      metadata:
        usfm: GEN.16.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Isaac went out in the evening into the field to meditate. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:63
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or possibly “to mourn [the loss of his mother].” The Hebrew is uncertain. Some translations have “Isaac went out into the field to take a walk.”
    marker-yv: yv-n
  - type: text
    text: 'He looked up, and saw camels coming '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in the distance
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'As Rebekah got closer, she raised her eyes, and when she saw Isaac, she nearly fell off her camel! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:64
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew phrase is literally “she fell off her camel” or “she collapsed.” One can imagine their eyes met, they locked eyes with each other, and something sparked between them. Some interpretations suggest that Isaac was simply glowing with God’s light and shining with God’s glory from spending time with God. Rashi (a well-known Torah commentator) writes about Rebekah and this initial meeting: “She saw his [Isaac’s] majestic appearance, and she was astounded by him.”'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: She whispered to the servant, “Who is that man walking in the field toward us?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Why, he’s '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the one about whom I told you
  - type: text
    text: ', that’s my young master!” the servant said. So Rebekah quickly took her veil and covered her face. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Then the servant began to explain to Isaac '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in detail
  - type: text
    text: ' all the amazing things that had happened. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Isaac fell in love '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:67
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Isaac’s love for Rebekah is the second time in the Bible that love is mentioned between people. The first is Abraham’s love for his son, Isaac. And now we have a man who loves his wife. This speaks of the two most loving bonds among humanity: the love of parents for their children and the love bond between husband and wife.'
    marker-yv: yv-n
  - type: text
    text: 'with Rebekah. He took her to be his wife, and they were married, and he brought her into his mother Sarah’s tent. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:67
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: With Rebekah coming into Sarah’s tent, we see the matriarchal continuity from Sarah to Rebekah, a fitting successor.
    marker-yv: yv-n
  - type: text
    text: In this way, Isaac was greatly comforted after his mother’s death.
