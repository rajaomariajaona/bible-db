document_id: GEN.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham Seeks a Wife for Isaac
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had wonderfully blessed Abraham in every way, and he became a very old man, well advanced in years. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “gone in days,” a figure of speech for saying Abraham was very old and had little time left. Perhaps the Hebrew phrase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ba bayamim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is saying that Abraham “lived every day to its fullest.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One day, Abraham '
  - type: usfm
    marker: it
    children:
    - type: text
      text: called for
  - type: text
    text: ' his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: trusted
  - type: text
    text: ' head servant, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “oldest servant.” Many scholars conclude this was Eliezer. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:2
      metadata:
        usfm: GEN.15.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . He becomes a type of the Holy Spirit, who finds and draws a bride for the Son of God by revealing him as Savior.
    marker-yv: yv-n
  - type: text
    text: 'who was in charge of all that he had, and said “Please, put your hand here under my thigh, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abraham is euphemistically referring to his private parts, his “family jewels.” The servant touching his private parts while making this oath was acknowledging that if he broke his solemn promise, Abraham’s seed (offspring) had the right to avenge him of this sin. In Western society, we raise our right hand and swear, but in this episode, the servant put his hand on Abraham’s reproductive power to give life.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and I will make you swear by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of heaven and earth, that you will not acquire a wife for my son among the daughters of the Canaanites among whom I am living. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Promise me you will go instead to my relatives in my native land and find a wife among them for my son Isaac.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The servant asked him, “Suppose the woman is not willing to come back with me to this land. Should I then take your son back to your native land?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Absolutely not,” Abraham answered, “make sure that you do not take my son back there. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of heaven, took me from my father’s house and from the land of my birth. He spoke to me and solemnly promised that he would give this land to my descendants. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I know
  - type: text
    text: ' he will send his angel before you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the angel of God would lead Abraham’s servant to the right woman for his son. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 23:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 32:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 20:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'so that you can find a wife for my son from there. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'And if for any reason the woman is unwilling to come back with you, then you are released from this oath that you swear to me. But '
  - type: usfm
    marker: it
    children:
    - type: text
      text: no matter what
  - type: text
    text: ', do not take my son back there!” '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: So, the servant put his hand under the thigh of his master Abraham and swore an oath to carry out his wishes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We can see a picture here of the Father releasing the Holy Spirit to seek out a bride for his Son, Jesus Christ. It is the Father who brings the bride to Jesus as his love-gift to the Son (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 17:24
      metadata:
        usfm: JHN.17.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). In picture form, the details of this chapter point us to the heavenly scene of gathering a bride for Jesus from the nations of the earth. The church is the bride, the Lamb’s wife (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 21:9
      metadata:
        usfm: REV.21.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). His ministers are friends of the Bridegroom who are sent to awaken bridal love in the nations as they persuade souls to espouse their hearts to him (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 9:15
      metadata:
        usfm: MAT.9.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 3:29
      metadata:
        usfm: JHN.3.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 11:2
      metadata:
        usfm: 2CO.11.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Only the trusted Servant, the Holy Spirit, is capable of drawing hearts to the Son, imparting endless love for him. Although unnamed here, the servant is elsewhere named Eliezer (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:2
      metadata:
        usfm: GEN.15.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), which means “the God of help” or “the God of comfort.” Is not the Holy Spirit our Helper, our Comforter (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Cor. 1:3
      metadata:
        usfm: 2CO.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )? He desires a willing bride for the heavenly “Isaac.” She will be willing to leave all to follow this Prince. She will be willing to follow the Holy Spirit as he leads her back to her Bridegroom.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Woman at the Well
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the servant took ten of his master’s camels, loaded them with all sorts of gifts, some of the best things his master owned, and journeyed toward the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: distant
  - type: text
    text: ' land of Mesopotamia '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Aram Naharaim,” which means “two rivers” and refers to the Tigris and Euphrates Rivers in modern Iraq.
    marker-yv: yv-n
  - type: text
    text: 'until he got to the village where '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abraham’s brother
  - type: text
    text: ' Nahor '
  - type: usfm
    marker: it
    children:
    - type: text
      text: had lived
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: From Canaan to Mesopotamia was a journey of at least five hundred miles (eight hundred kilometers).
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He had his camels kneel by a well outside the village. It was evening, the time when the women came out to draw water. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He prayed: “'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', God of my master Abraham, let my journey here be a success and show your gracious love to my master Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I am standing here by this well, and the young women of the village are coming out to draw water. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Give me a sign
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I will say to one of the girls, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “virgins” (LXX).
    marker-yv: yv-n
  - type: text
    text: '‘Please, lower your jar and give me a drink.’ And if she is the right one, the girl whom you have chosen to be a wife for your servant Isaac, then let her say to me, ‘Drink, and I will also draw water for your camels.’ By this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sign
  - type: text
    text: ' I will know that you have shown your gracious love to my master.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Would the girl be willing to give ten thirsty camels water from the well? The woman’s willingness to serve water showed that she had a true servant-spirit. What work to draw water for these thirsty camels! She had to lower her bucket down the well
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: many
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: times, for one camel can drink twenty gallons—all for a stranger! It was evening, and it would have been dark after she was done. Only an exceptional woman would do something like this. She is a picture of the servant-bride of Jesus Christ.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Suddenly, before he had finished praying, there was Rebekah approaching the well with her jar on her shoulder. She was the daughter of Bethuel and the granddaughter of Milcah and Abraham’s brother Nahor. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The young woman was strikingly beautiful, unmarried, and still a virgin. She walked down to the well, filled her jar, and came back up. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abraham’s servant hurried over to meet her and said, “Please, lower your jar and give me a little drink.” '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'She responded, “Drink, my lord.” She then quickly lowered her jar to give him a drink. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then, after she had finished giving him a drink, she added, “I will also draw water for your camels until they have finished drinking.” '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: She quickly emptied her jar into the watering trough and ran back to the well to draw more water, until she had watered all the camels.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This one act of service qualified Rebekah to be Isaac’s bride and to be brought into the line of Christ and his inheritance. We often do not realize how one act of humble service will affect the world and bring promotion to our own life (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 10:42
      metadata:
        usfm: MAT.10.42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Meanwhile, the servant stared at her, silently pondering whether '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had indeed made his journey successful. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After the camels had finished drinking, he took a costly gold nose ring weighing a half shekel '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, approximately ¼ ounce or 6 grams.
    marker-yv: yv-n
  - type: text
    text: 'and two solid gold bracelets weighing ten shekels, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, approximately 5 ounces or 110 grams.
    marker-yv: yv-n
  - type: text
    text: 'and gave them to Rebekah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he asked her, “Tell me, who is your father? Is there room in your father’s house for me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and my men
  - type: text
    text: ' to stay tonight?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'She replied, “My father’s name is Bethuel, and my grandparents are Milcah and Nahor.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rebekah was Isaac’s second cousin.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'She went on, “There is room for you to spend the night at our home, and plenty of straw and food for the camels.” '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Upon hearing this, the servant bowed down and worshiped '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'saying, “Praised be '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Abraham, for you have faithfully kept your promise to my master and displayed your wonderful kindness and love. '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', you led me straight to the very place of my master’s relatives!”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rebekah’s Family Agrees to the Marriage Arrangement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the girl quickly ran '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: What energy Rebekah had! After filling many buckets of water, she then ran home to tell her household what had taken place.
    marker-yv: yv-n
  - type: text
    text: 'to inform her mother and family about all that had happened. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'Now Rebekah had an older brother named Laban, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:29–30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
