document_id: GEN.24,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham Seeks a Wife for Isaac
  - type: text
    content: 'Now, '
  - type: text
    content: Yahweh
  - type: text
    content: ' had wonderfully blessed Abraham in every way, and he became a very old man, well advanced in years. '
  - type: note
    content: Or “gone in days,” a figure of speech for saying Abraham was very old and had little time left. Perhaps the Hebrew phrase ba bayamim is saying that Abraham “lived every day to its fullest.”
  '10':
  - type: text
    content: 'So the servant took ten of his master’s camels, loaded them with all sorts of gifts, some of the best things his master owned, and journeyed toward the '
  - type: text
    content: distant
  - type: text
    content: ' land of Mesopotamia '
  - type: note
    content: Or “Aram Naharaim,” which means “two rivers” and refers to the Tigris and Euphrates Rivers in modern Iraq.
  - type: text
    content: 'until he got to the village where '
  - type: text
    content: Abraham’s brother
  - type: text
    content: ' Nahor '
  - type: text
    content: had lived
  - type: text
    content: '. '
  - type: note
    content: From Canaan to Mesopotamia was a journey of at least five hundred miles (eight hundred kilometers).
  '11':
  - type: text
    content: 'He had his camels kneel by a well outside the village. It was evening, the time when the women came out to draw water. '
  '12':
  - type: text
    content: 'He prayed: “'
  - type: text
    content: Yahweh
  - type: text
    content: ', God of my master Abraham, let my journey here be a success and show your gracious love to my master Abraham. '
  '13':
  - type: text
    content: 'I am standing here by this well, and the young women of the village are coming out to draw water. '
  - type: text
    content: Give me a sign
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'I will say to one of the girls, '
  - type: note
    content: Or “virgins” (LXX).
  - type: text
    content: '‘Please, lower your jar and give me a drink.’ And if she is the right one, the girl whom you have chosen to be a wife for your servant Isaac, then let her say to me, ‘Drink, and I will also draw water for your camels.’ By this '
  - type: text
    content: sign
  - type: text
    content: ' I will know that you have shown your gracious love to my master.”'
  - type: note
    content: Would the girl be willing to give ten thirsty camels water from the well? The woman’s willingness to serve water showed that she had a true servant-spirit. What work to draw water for these thirsty camels! She had to lower her bucket down the well many times, for one camel can drink twenty gallons—all for a stranger! It was evening, and it would have been dark after she was done. Only an exceptional woman would do something like this. She is a picture of the servant-bride of Jesus Christ.
  '15':
  - type: text
    content: 'Suddenly, before he had finished praying, there was Rebekah approaching the well with her jar on her shoulder. She was the daughter of Bethuel and the granddaughter of Milcah and Abraham’s brother Nahor. '
  '16':
  - type: text
    content: 'The young woman was strikingly beautiful, unmarried, and still a virgin. She walked down to the well, filled her jar, and came back up. '
  '17':
  - type: text
    content: 'Abraham’s servant hurried over to meet her and said, “Please, lower your jar and give me a little drink.” '
  '18':
  - type: text
    content: 'She responded, “Drink, my lord.” She then quickly lowered her jar to give him a drink. '
  '19':
  - type: text
    content: 'Then, after she had finished giving him a drink, she added, “I will also draw water for your camels until they have finished drinking.” '
  '2':
  - type: text
    content: 'One day, Abraham '
  - type: text
    content: called for
  - type: text
    content: ' his '
  - type: text
    content: trusted
  - type: text
    content: ' head servant, '
  - type: note
    content: Or “oldest servant.” Many scholars conclude this was Eliezer. See Gen. 15:2. He becomes a type of the Holy Spirit, who finds and draws a bride for the Son of God by revealing him as Savior.
  - type: text
    content: 'who was in charge of all that he had, and said “Please, put your hand here under my thigh, '
  - type: note
    content: Abraham is euphemistically referring to his private parts, his “family jewels.” The servant touching his private parts while making this oath was acknowledging that if he broke his solemn promise, Abraham’s seed (offspring) had the right to avenge him of this sin. In Western society, we raise our right hand and swear, but in this episode, the servant put his hand on Abraham’s reproductive power to give life.
  '20':
  - type: text
    content: She quickly emptied her jar into the watering trough and ran back to the well to draw more water, until she had watered all the camels.
  - type: note
    content: This one act of service qualified Rebekah to be Isaac’s bride and to be brought into the line of Christ and his inheritance. We often do not realize how one act of humble service will affect the world and bring promotion to our own life (see Matt. 10:42).
  '21':
  - type: text
    content: 'Meanwhile, the servant stared at her, silently pondering whether '
  - type: text
    content: Yahweh
  - type: text
    content: ' had indeed made his journey successful. '
  '22':
  - type: text
    content: 'After the camels had finished drinking, he took a costly gold nose ring weighing a half shekel '
  - type: note
    content: That is, approximately ¼ ounce or 6 grams.
  - type: text
    content: 'and two solid gold bracelets weighing ten shekels, '
  - type: note
    content: That is, approximately 5 ounces or 110 grams.
  - type: text
    content: 'and gave them to Rebekah. '
  '23':
  - type: text
    content: 'Then he asked her, “Tell me, who is your father? Is there room in your father’s house for me '
  - type: text
    content: and my men
  - type: text
    content: ' to stay tonight?”'
  '24':
  - type: text
    content: 'She replied, “My father’s name is Bethuel, and my grandparents are Milcah and Nahor.” '
  - type: note
    content: Rebekah was Isaac’s second cousin.
  '25':
  - type: text
    content: 'She went on, “There is room for you to spend the night at our home, and plenty of straw and food for the camels.” '
  '26':
  - type: text
    content: 'Upon hearing this, the servant bowed down and worshiped '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  '27':
  - type: text
    content: 'saying, “Praised be '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Abraham, for you have faithfully kept your promise to my master and displayed your wonderful kindness and love. '
  - type: text
    content: Yahweh
  - type: text
    content: ', you led me straight to the very place of my master’s relatives!”'
  - type: heading
    content: Rebekah’s Family Agrees to the Marriage Arrangement
  '28':
  - type: text
    content: 'Then the girl quickly ran '
  - type: note
    content: What energy Rebekah had! After filling many buckets of water, she then ran home to tell her household what had taken place.
  - type: text
    content: 'to inform her mother and family about all that had happened. '
  '29':
  - type: text
    content: 'Now Rebekah had an older brother named Laban, '
  - type: note
    content: Rebekah’s brother Laban saw her running home wearing gold jewelry and knew something good must have happened (see Prov. 18:16). Laban means “white.” It is also used poetically for the moon. See Song. 6:10; Isa. 24:23; 30:26.
  - type: text
    content: and when he heard everything the man had told his sister and saw her gold nose ring and the costly bracelets dangling on her wrists, Laban ran out to meet the man waiting at the well—and there he was standing beside his camels.
  '3':
  - type: text
    content: 'and I will make you swear by '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of heaven and earth, that you will not acquire a wife for my son among the daughters of the Canaanites among whom I am living. '
  '31':
  - type: text
    content: 'Then Laban said to the man, “Friend, '
  - type: text
    content: Yahweh
  - type: text
    content: ' has wonderfully blessed you; please, come to my home. Why are you standing out here when I have prepared the house for you and a place for your camels?” '
  '32':
  - type: text
    content: So the man came into the house, and his camels were unloaded and given straw and feed. The servants brought water to wash the man’s feet and the feet of the men with him.
  '33':
  - type: text
    content: But when they set food before him, he said, “I won’t eat until I tell you why I’m here.”
  - type: text
    content: “Please, tell us,” Laban said.
  '34':
  - type: text
    content: '“I am Abraham’s servant,” he began. '
  '35':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ' has wonderfully blessed my master, and he has become extremely wealthy. '
  - type: note
    content: Or “great” or “powerful.”
  - type: text
    content: Yahweh
  - type: text
    content: ' has given him flocks and herds, camels and donkeys, a fortune in silver and gold, and many male and female servants. '
  '36':
  - type: text
    content: 'And my master’s wife, Sarah, has '
  - type: text
    content: miraculously
  - type: text
    content: ' borne him a son in her old age, and my master’s son is the '
  - type: text
    content: sole
  - type: text
    content: ' heir of his fortune. '
  '37':
  - type: text
    content: 'My master has put me under an oath saying, ‘Do not get a wife for my son from among the daughters of the Canaanites among whom I am living. '
  '38':
  - type: text
    content: 'Instead, go to my relatives in my native land and find a wife among them for my son.’ '
  '39':
  - type: text
    content: 'In reply I said to my master, ‘Suppose the woman refuses to return with me.’ '
  '4':
  - type: text
    content: Promise me you will go instead to my relatives in my native land and find a wife among them for my son Isaac.”
  '40':
  - type: text
    content: He answered me, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ', in whose presence I have walked '
  - type: text
    content: all these years
  - type: text
    content: ', will send his angel with you and will make your mission successful. You will find a wife for my son from among my relatives, my father’s family. '
  '41':
  - type: text
    content: 'If you go to my relatives, and they will not give her to you, then and only then will you be released from this oath.’ '
  - type: note
    content: Or “from my adjuration.” The Hebrew implies that only if the girl’s family refused to release her would the servant be absolved from the curse and penalty for breaking his oath.
  '42':
  - type: text
    content: 'So, when I arrived at the well today, I prayed, ‘O  '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of my master Abraham, make my mission a success. '
  '43':
  - type: text
    content: 'I’m here standing at this well. May the right girl for my master’s son come out to draw water. And when she does, I will say to her “Please give me a little drink from your jar.” '
  '44':
  - type: text
    content: 'And if she replies, saying, “Drink, and I will also draw water for your camels,” then I might know that she is the young woman '
  - type: text
    content: Yahweh
  - type: text
    content: ' has chosen for my master’s son.’'
  '45':
  - type: text
    content: '“Before I had even finished my heartfelt prayer, there was Rebekah coming out with her water jar on her shoulder! After she went down to the well and filled her jar, I said to her, ‘Please give me a drink.’ '
  '46':
  - type: text
    content: 'She quickly lowered her jar and said, ‘Drink, and I will also draw water for your camels.’ So, I drank, and she also watered the camels. '
  '47':
  - type: text
    content: 'Then I asked her, ‘Tell me, who is your father?’ She said, ‘I’m the daughter of Bethuel, son of Nahor, whom Milcah bore to him.’ '
  - type: text
    content: When I learned she was of my master’s family
  - type: text
    content: ', I put a gold ring in her nose and gold bracelets on her wrists, '
  '48':
  - type: text
    content: 'and I bowed before '
  - type: text
    content: Yahweh
  - type: text
    content: ' and worshiped him. I praised '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of my master Abraham, who led me perfectly on the right path to find the very daughter of my master’s brother to '
  - type: text
    content: marry
  - type: text
    content: ' his son. '
  '49':
  - type: text
    content: 'Now, if you will show faithful love to my master and do what is right, '
  - type: text
    content: then give me permission to take Rebekah back to his land
  - type: text
    content: . If not, tell me, and I will go on my way.”
  - type: note
    content: Or “I will turn to the right or to the left,” which suggests going elsewhere to look for a wife for his master’s son.
  '5':
  - type: text
    content: The servant asked him, “Suppose the woman is not willing to come back with me to this land. Should I then take your son back to your native land?”
  '50':
  - type: text
    content: After hearing this
  - type: text
    content: ', Laban and Bethuel said, “This was all planned by '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  - type: note
    content: So many times we think the events of our life are happenstance, but they may be a “divine setup” to release the next phase of destiny in our lives.
  - type: text
    content: 'If this is his plan, what can we say? '
  - type: note
    content: Or “we are not able to speak to you bad or good.” It didn’t matter to Laban and Bethuel what they could add, for they viewed all that happened as God’s will.
  '51':
  - type: text
    content: 'Here stands our Rebekah before you. You may take her and go and let her marry your master’s son and fulfill '
  - type: text
    content: Yahweh
  - type: text
    content: ’s plan for her.”
  '52':
  - type: text
    content: 'When Abraham’s servant heard their words, he bowed his face down to the ground and worshiped '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '53':
  - type: text
    content: 'Then he brought expensive jewelry of silver and gold and '
  - type: text
    content: exquisitely embroidered
  - type: text
    content: ' garments, and gave them all to Rebekah, and he gave '
  - type: text
    content: costly
  - type: text
    content: ' gifts to her brother and her mother. '
  - type: note
    content: These “costly gifts” would likely serve as the bride price required by the culture of that day.
  '54':
  - type: text
    content: 'Afterward, the servant and his men ate and drank, and they spent the night '
  - type: text
    content: in Laban’s home
  - type: text
    content: .
  - type: text
    content: 'First thing in the morning, he said to them, “Allow me now to return to my master.” '
  '55':
  - type: text
    content: Her brother and mother replied, “Please let Rebekah remain with us a while—for ten days or so, then she may go with you.”
  '56':
  - type: text
    content: 'He responded, “Please, '
  - type: text
    content: Yahweh
  - type: text
    content: ' has made my mission successful. Send me off '
  - type: text
    content: with her
  - type: text
    content: ' to my master, don’t make me wait.”'
  '57':
  - type: text
    content: 'They answered him, “We will call for Rebekah and see what she wants to do.” '
  '58':
  - type: text
    content: So they called for Rebekah and asked her, “Will you go with this man?”
  - type: text
    content: '“I will '
  - type: text
    content: gladly
  - type: text
    content: ' go with him,” she answered. '
  '59':
  - type: text
    content: 'So they sent their sister Rebekah away with her servant girls to go with Abraham’s servant and his men. '
  '6':
  - type: text
    content: '“Absolutely not,” Abraham answered, “make sure that you do not take my son back there. '
  '60':
  - type: text
    content: As she departed
  - type: text
    content: ', they blessed her with these words:'
  - type: text
    content: “Our dear sister,
  - type: text
    content: may you become thousands of ten thousands!
  - type: note
    content: Or “may you be [grow into] thousands of myriads!”
  - type: text
    content: May your descendants gain possession
  - type: text
    content: of the city gates of their foes!”
  - type: note
    content: 'Destiny hung over them that moment as the Spirit of Prophecy fell. The prophetic blessing was this: The seed (descendants) of Rebekah received the same blessing as the seed of Abraham: they would possess the city gates of their enemies. They would take cities! They would possess the places once held by God’s enemies. This is a prophetic promise of a coming anointing that would reach cities. This city-reaching power comes when God’s people walk with a heart like Rebekah. We must become Rebekah’s spiritual seed, so that we may enter into the gate-taking anointing for our cities.'
  '61':
  - type: text
    content: Then Rebekah and her servant girls mounted the camels and followed the servant and his men.
  - type: note
    content: Their journey to Isaac’s home would have lasted at least a month.
  - type: heading
    content: Isaac Meets Rebekah
  '62':
  - type: text
    content: 'Meanwhile, Isaac, who was living in the southern desert of Canaan, '
  - type: note
    content: Or “the land of the Negev.”
  - type: text
    content: 'had just come back '
  - type: text
    content: to his camp
  - type: text
    content: ' from the Well of the Living One Who Watches Over Me. '
  - type: note
    content: Or “Beer-Lahai-Roi.” See Gen. 16:14.
  '63':
  - type: text
    content: 'Isaac went out in the evening into the field to meditate. '
  - type: note
    content: Or possibly “to mourn [the loss of his mother].” The Hebrew is uncertain. Some translations have “Isaac went out into the field to take a walk.”
  - type: text
    content: 'He looked up, and saw camels coming '
  - type: text
    content: in the distance
  - type: text
    content: '. '
  '64':
  - type: text
    content: 'As Rebekah got closer, she raised her eyes, and when she saw Isaac, she nearly fell off her camel! '
  - type: note
    content: 'The Hebrew phrase is literally “she fell off her camel” or “she collapsed.” One can imagine their eyes met, they locked eyes with each other, and something sparked between them. Some interpretations suggest that Isaac was simply glowing with God’s light and shining with God’s glory from spending time with God. Rashi (a well-known Torah commentator) writes about Rebekah and this initial meeting: “She saw his [Isaac’s] majestic appearance, and she was astounded by him.”'
  '65':
  - type: text
    content: She whispered to the servant, “Who is that man walking in the field toward us?”
  - type: text
    content: '“Why, he’s '
  - type: text
    content: the one about whom I told you
  - type: text
    content: ', that’s my young master!” the servant said. So Rebekah quickly took her veil and covered her face. '
  '66':
  - type: text
    content: 'Then the servant began to explain to Isaac '
  - type: text
    content: in detail
  - type: text
    content: ' all the amazing things that had happened. '
  '67':
  - type: text
    content: 'Isaac fell in love '
  - type: note
    content: 'Isaac’s love for Rebekah is the second time in the Bible that love is mentioned between people. The first is Abraham’s love for his son, Isaac. And now we have a man who loves his wife. This speaks of the two most loving bonds among humanity: the love of parents for their children and the love bond between husband and wife.'
  - type: text
    content: 'with Rebekah. He took her to be his wife, and they were married, and he brought her into his mother Sarah’s tent. '
  - type: note
    content: With Rebekah coming into Sarah’s tent, we see the matriarchal continuity from Sarah to Rebekah, a fitting successor.
  - type: text
    content: In this way, Isaac was greatly comforted after his mother’s death.
  '7':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of heaven, took me from my father’s house and from the land of my birth. He spoke to me and solemnly promised that he would give this land to my descendants. '
  - type: text
    content: I know
  - type: text
    content: ' he will send his angel before you '
  - type: note
    content: That is, the angel of God would lead Abraham’s servant to the right woman for his son. See Ex. 23:20; 32:34; Num. 20:16.
  - type: text
    content: 'so that you can find a wife for my son from there. '
  '8':
  - type: text
    content: 'And if for any reason the woman is unwilling to come back with you, then you are released from this oath that you swear to me. But '
  - type: text
    content: no matter what
  - type: text
    content: ', do not take my son back there!” '
  '9':
  - type: text
    content: So, the servant put his hand under the thigh of his master Abraham and swore an oath to carry out his wishes.
  - type: note
    content: We can see a picture here of the Father releasing the Holy Spirit to seek out a bride for his Son, Jesus Christ. It is the Father who brings the bride to Jesus as his love-gift to the Son (see John 17:24). In picture form, the details of this chapter point us to the heavenly scene of gathering a bride for Jesus from the nations of the earth. The church is the bride, the Lamb’s wife (see Rev. 21:9). His ministers are friends of the Bridegroom who are sent to awaken bridal love in the nations as they persuade souls to espouse their hearts to him (see Matt. 9:15; John 3:29; 2 Cor. 11:2). Only the trusted Servant, the Holy Spirit, is capable of drawing hearts to the Son, imparting endless love for him. Although unnamed here, the servant is elsewhere named Eliezer (see Gen. 15:2), which means “the God of help” or “the God of comfort.” Is not the Holy Spirit our Helper, our Comforter (see 2 Cor. 1:3)? He desires a willing bride for the heavenly “Isaac.” She will be willing to leave all to follow this Prince. She will be willing to follow the Holy Spirit as he leads her back to her Bridegroom.
  - type: heading
    content: The Woman at the Well
