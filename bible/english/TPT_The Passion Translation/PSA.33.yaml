document_id: PSA.33,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Song of Praise
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Poetic praise by King David
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most manuscripts have no inscription for this psalm. However, ancient Qumran evidence suggests this is the original inscription that was later omitted.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: It’s time to sing and shout for joy!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead, all you redeemed ones, do it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Praise him with all you have,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for praise looks lovely on the lips of God’s devoted lovers.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: With his breath he scatters the schemes of nations who oppose him;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will never succeed.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: His destiny-plan for the earth stands sure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His forever-plan remains in place and will never fail.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Blessed and prosperous is that nation who has God as their Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be the people he has chosen for his own.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 13-15
    - type: text
      text: The Lord looks over us from where he rules in heaven.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gazing into every heart from his lofty dwelling place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he observes all the peoples of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Creator of our hearts considers and examines everything we do.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Even if a king had the best-equipped army,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it would never be enough to save him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if the best warrior went to battle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he could not be saved simply by his strength alone.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Human strength and the weapons of man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are false hopes for victory;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they may seem mighty, but they will always disappoint.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The eyes of the Lord are upon
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: even the weakest worshipers
    - type: text
      text: ' who love him—'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who wait in hope and expectation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the strong, steady love of God.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: God will deliver them from death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even the certain death of famine, with no one to help.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Play the guitar as you lift your praises loaded with thanksgiving.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing and make joyous music with all you’ve got inside.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The Lord alone is our radiant hope
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and we trust in him with all our hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His wraparound presence will strengthen us.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: As we trust, we rejoice with an uncontained joy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'flowing from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Let your love and steadfast kindness overshadow us continually,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for we trust and we wait upon you!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Compose new melodies '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are seven new songs mentioned in the Bible. Six are in the Psalms (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 33:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 40:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 96:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 98:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 144:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 149:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and one is in Isaiah (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 42:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: that release new praises to the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Play his praises on instruments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the anointing and skill he gives you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing and shout with passion; make a spectacular sound of joy—
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For God’s Word is something to sing about!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is true to his promises, his word can be trusted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and everything he does is reliable and right.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The Lord loves seeing justice on the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anywhere and everywhere you can find his faithful, unfailing love!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: All he had to do was speak by his Spirit-Wind command,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and God created the heavenlies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filled with galaxies and stars,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the vast cosmos he wonderfully made.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: His voice scooped out the seas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The ocean depths he poured into vast reservoirs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: With breathtaking wonder,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'let everyone worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', this awe-inspiring Creator.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He breathed words and worlds were birthed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let there be,” and there it was—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: springing forth the moment he spoke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no sooner said than done!
