document_id: PSA.33,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Praise
  - type: text
    content: Poetic praise by King David
  - type: note
    content: Most manuscripts have no inscription for this psalm. However, ancient Qumran evidence suggests this is the original inscription that was later omitted.
  - type: text
    content: It’s time to sing and shout for joy!
  - type: text
    content: Go ahead, all you redeemed ones, do it!
  - type: text
    content: Praise him with all you have,
  - type: text
    content: for praise looks lovely on the lips of God’s devoted lovers.
  '10':
  - type: text
    content: With his breath he scatters the schemes of nations who oppose him;
  - type: text
    content: they will never succeed.
  '11':
  - type: text
    content: His destiny-plan for the earth stands sure.
  - type: text
    content: His forever-plan remains in place and will never fail.
  '12':
  - type: text
    content: Blessed and prosperous is that nation who has God as their Lord!
  - type: text
    content: They will be the people he has chosen for his own.
  '13':
  - type: text
    content: The Lord looks over us from where he rules in heaven.
  - type: text
    content: Gazing into every heart from his lofty dwelling place,
  - type: text
    content: he observes all the peoples of the earth.
  - type: text
    content: The Creator of our hearts considers and examines everything we do.
  '16':
  - type: text
    content: Even if a king had the best-equipped army,
  - type: text
    content: it would never be enough to save him.
  - type: text
    content: Even if the best warrior went to battle,
  - type: text
    content: he could not be saved simply by his strength alone.
  '17':
  - type: text
    content: Human strength and the weapons of man
  - type: text
    content: are false hopes for victory;
  - type: text
    content: they may seem mighty, but they will always disappoint.
  '18':
  - type: text
    content: The eyes of the Lord are upon
  - type: text
    content: even the weakest worshipers
  - type: text
    content: ' who love him—'
  - type: text
    content: those who wait in hope and expectation
  - type: text
    content: for the strong, steady love of God.
  '19':
  - type: text
    content: God will deliver them from death,
  - type: text
    content: even the certain death of famine, with no one to help.
  '2':
  - type: text
    content: Play the guitar as you lift your praises loaded with thanksgiving.
  - type: text
    content: Sing and make joyous music with all you’ve got inside.
  '20':
  - type: text
    content: The Lord alone is our radiant hope
  - type: text
    content: and we trust in him with all our hearts.
  - type: text
    content: His wraparound presence will strengthen us.
  '21':
  - type: text
    content: As we trust, we rejoice with an uncontained joy
  - type: text
    content: 'flowing from '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  '22':
  - type: text
    content: Let your love and steadfast kindness overshadow us continually,
  - type: text
    content: for we trust and we wait upon you!
  '3':
  - type: text
    content: 'Compose new melodies '
  - type: note
    content: There are seven new songs mentioned in the Bible. Six are in the Psalms (33:3; 40:3; 96:1; 98:1; 144:9; 149:1) and one is in Isaiah (42:10).
  - type: text
    content: that release new praises to the Lord.
  - type: text
    content: Play his praises on instruments
  - type: text
    content: with the anointing and skill he gives you.
  - type: text
    content: Sing and shout with passion; make a spectacular sound of joy—
  '4':
  - type: text
    content: For God’s Word is something to sing about!
  - type: text
    content: He is true to his promises, his word can be trusted,
  - type: text
    content: and everything he does is reliable and right.
  '5':
  - type: text
    content: The Lord loves seeing justice on the earth.
  - type: text
    content: Anywhere and everywhere you can find his faithful, unfailing love!
  '6':
  - type: text
    content: All he had to do was speak by his Spirit-Wind command,
  - type: text
    content: and God created the heavenlies.
  - type: text
    content: Filled with galaxies and stars,
  - type: text
    content: the vast cosmos he wonderfully made.
  '7':
  - type: text
    content: His voice scooped out the seas.
  - type: text
    content: The ocean depths he poured into vast reservoirs.
  '8':
  - type: text
    content: With breathtaking wonder,
  - type: text
    content: 'let everyone worship '
  - type: text
    content: Yahweh
  - type: text
    content: ', this awe-inspiring Creator.'
  '9':
  - type: text
    content: He breathed words and worlds were birthed.
  - type: text
    content: “Let there be,” and there it was—
  - type: text
    content: springing forth the moment he spoke,
  - type: text
    content: no sooner said than done!
