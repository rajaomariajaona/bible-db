        children:
        - type: text
          text: Or “the house of David.”
      marker-yv: yv-n
    - type: text
      text: 'was told that Syria had formed an alliance with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the northern kingdom of
    - type: text
      text: ' Israel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
