document_id: ISA.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Message for Ahaz
  - type: text
    content: 'During the reign of Ahaz, '
  - type: note
    content: Ahaz was the king of Judah, whose capital was Jerusalem. He took the throne at the age of twenty and reigned sixteen years. He was a young leader facing his first major test as king. See 2 Kings 16. This section of Isaiah (chs. 7–11) is known as the “Book of Immanuel.”
  - type: text
    content: 'the son of Jotham and grandson of Uzziah, two kings launched an attack against Jerusalem: Rezin, the king of Syria, '
  - type: note
    content: Or “Aram,” which is modern-day Syria. Rezin means “wicked pleasure,” a picture of the life of the flesh.
  - type: text
    content: 'and Pekah, '
  - type: note
    content: Pekah means “open-eyed” or “seeing,” a picture of human reasoning. This unholy alliance of the two kings threatened to invade if King Ahaz did not agree to surrender. The northern kingdom of Israel (Pekah) and Syria (Rezin) joined each other to overthrow Ahaz and put “the son of Tabeel” on the throne in his place (see v. 6). The pressure was on King Ahaz to join this united front against the Assyrian expansion.
  - type: text
    content: the son of Remaliah, the king of Israel. But they failed to conquer it.
  - type: note
    content: This verse is a summary statement of what is unfolded in the following verses.
  '10':
  - type: text
    content: 'Again Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Ahaz:'
  '11':
  - type: text
    content: '“Go ahead—ask for a sign from '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God. '
  - type: note
    content: This would be a sign to Ahaz proving that God is trustworthy and keeps his word. God is willing to prove himself to Ahaz and to us.
  - type: text
    content: 'Ask for something big, so miraculous '
  - type: note
    content: Or “as deep as Sheol or as high as heaven”; that is, something so outside human experience that only God can do it.
  - type: text
    content: that you will know only God did it
  - type: text
    content: '!”'
  '12':
  - type: text
    content: 'Ahaz answered, “I will not ask. I won’t attempt to test the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  '13':
  - type: text
    content: 'So Isaiah said, “Pay attention, family of David. It’s bad enough to try the patience of a prophet '
  - type: note
    content: Or “men.” The Targum reads “prophet.”
  - type: text
    content: 'but even worse when you try the patience of my God as well! '
  '14':
  - type: text
    content: 'The Lord himself will give you a sign. '
  - type: note
    content: This is a double sign. There is the sign of the Virgin Mary and the sign of the virgin bride of Christ of the last days. See 2 Cor. 11:2.
  - type: text
    content: 'Behold—the virgin '
  - type: note
    content: Although the ambiguous Hebrew word for “virgin” (‘almah) is more often translated “a girl of marriageable age,” the context is God performing a miracle-sign (v. 11). This sign was not merely for Ahaz but also for the family (or “house,” including descendants) of David. There is nothing miraculous about a young woman having a baby; it happens every day. However, the Septuagint translates this word as “virgin” here, as well as in Matthew’s quotation for the virgin birth of the Messiah (see Matt. 1:23). No child with a human father could be the fulfillment of Immanuel, “God Among Us.” However, some scholars view Isaiah’s other son, “Maher-Shalal-Hash-Baz” (see footnote on Isa. 8:3), as the Immanuel referred to here.
  - type: text
    content: 'will conceive and give birth to a son and will name him God Among Us. '
  - type: note
    content: Or “Immanuel” (“God became one of us,” Matt. 1:23). A new nature was about to be planted in the soil of humanity. Immanuel is a term used for this new creation life coming down out of heaven. It will begin as a man but will soon become a company of men and women. Immanuel is the partnership of heaven and earth, God and humanity.
  '15':
  - type: text
    content: 'He will eat curdled milk and honey, '
  - type: note
    content: This coming “son” would be one who had the kingdom promises as his diet (see John 4:32). Milk and honey represent the promised land, where God fulfills all his promises. Jesus is the only one who has fulfilled the Father’s desires. Feeding on the promises enabled him to choose the right. He resisted temptation by means of the Word of God dwelling in him. Strength to reject evil comes from feeding on truth. See Matt. 4:1–11.
  - type: text
    content: 'and he will know enough to refuse the evil and choose the good. '
  '16':
  - type: text
    content: Yet even before that time comes for him to know good and evil, the lands of those two kings you dread will be deserted.”
  - type: note
    content: This prophecy was fulfilled when Assyria defeated first Syria (732 BC) and then the northern tribes of Israel (722 BC).
  - type: heading
    content: The Whistler
  '17':
  - type: text
    content: '“The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' is going to bring days of catastrophic trouble—on you, on your people, and on the whole royal court—not seen since the northern kingdom of Israel broke off from Judah. He is going to bring the king of Assyria '
  - type: text
    content: with his great army
  - type: text
    content: '!”'
  '18':
  - type: text
    content: 'In that day, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will whistle and call for flies from Egypt’s lower streams. '
  - type: note
    content: Or “Niles,” a reference to the flooding of the Nile that brought swarms of dog flies, which are known to buzz like bees and whose bite is extremely painful.
  - type: text
    content: 'He will whistle for bees from the land of Assyria, '
  '19':
  - type: text
    content: 'and they will swarm '
  - type: text
    content: down upon
  - type: text
    content: ' you and settle into the steep ravines, the crevices of the rocks, on every thorn bush and at every '
  - type: text
    content: stagnant
  - type: text
    content: ' pool.'
  - type: note
    content: Or “every bush” (possibly the stinkwood). In this case, the flies and bees are the foreign warriors coming to invade. God’s whistle brought them into the land. Experts tell us that beekeepers can persuade bees to come out of their hives or return from the fields by whistling. Like bees gathering to sting (the hill country of Assyria was known for its bees), these warriors would land upon every compromise. The steep ravines are a picture of the slippery slopes of darkness that bring defeat into our hearts. These flies and bees are found where there is corruption and decay within the soul. “Crevices of the rocks” are where we hide our compromises. The thorn bushes are symbols of our flesh life, with its briars and offenses that do not yield to God (see Matt. 13:7, 22). “Every stagnant pool” points us to the stagnant places in our lives that we have not allowed to be renewed and revived.
  - type: heading
    content: The Lord’s Razor
  '2':
  - type: text
    content: 'When the royal court '
  - type: note
    content: Or “the house of David.”
  - type: text
    content: 'was told that Syria had formed an alliance with '
  - type: text
    content: the northern kingdom of
  - type: text
    content: ' Israel, '
  - type: note
    content: Or “Ephraim,” a metonym for the ten tribes of the northern kingdom of Israel. They were collectively called “Ephraim,” for their first king (Jeroboam) was from that tribe (see 1 Kings 11:26).
  - type: text
    content: the heart of King Ahaz and all his people trembled with fear, like trees swaying in the wind.
  '20':
  - type: text
    content: 'In that day, the Lord will take his “razor,” the hired king of Assyria from beyond the Euphrates, '
  - type: note
    content: Or “the river.” Ahaz had paid tribute and, in a sense, hired the king of Assyria to shave Syria and the northern kingdom. Instead, the king now served God’s purposes in bringing judgment and devastation to Judah.
  - type: text
    content: 'and he will shave your head, your legs, '
  - type: note
    content: 'Or “the hair of the feet.” In ancient times, the feet were used euphemistically for genitalia. The hair of the head points to the king (Ahaz); the legs, his soldiers; the beard, the officials of the land. Thus, “shaving” was a metaphor for the Lord stripping from them all that they had: their livelihoods, crops, and private ownership of their land. This supernatural “razor” will be Assyria coming to cut off their pride, their glory, and their boasts. Often the victors would shave the heads of the vanquished. Mourners had their heads shaved (see Isa. 15:2). So Judah would mourn over their ways as judgment fell. Shaving off the beard was an embarrassment to Hebrew men (see 2 Sam. 10:4–5).'
  - type: text
    content: 'and also your beard, '
  - type: text
    content: leaving you ashamed and exposed
  - type: text
    content: '!'
  '21':
  - type: text
    content: 'In that day, '
  - type: text
    content: if
  - type: text
    content: ' a farmer keeps alive only one heifer and two goats, '
  '22':
  - type: text
    content: 'they will give so much milk that he will have more than he needs. And everyone left in the land will have all the milk and honey '
  - type: text
    content: they desire
  - type: text
    content: .
  '23':
  - type: text
    content: 'In that day, the fine vineyards, each with a thousand vines and worth a thousand pieces of silver, '
  - type: note
    content: See Song. 8:11–12.
  - type: text
    content: 'will be a wilderness overgrown with weeds, briars, and thorn bushes. '
  - type: note
    content: See Isa. 5:1–7.
  '24':
  - type: text
    content: 'People will hunt there with bow and arrow but will find nothing except thorn bushes and briars! '
  '25':
  - type: text
    content: The once-cultivated hillsides where vineyards used to grow will be completely overgrown with thorns so that people will be afraid to go there. It will become a place where cattle graze and sheep trample.
  '3':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Isaiah and said, “Go and meet with King Ahaz. You’ll find him on the road to the Washerman’s Field '
  - type: note
    content: Or “Fuller’s Field,” where cloth was washed and bleached. In Mark 9:3, the Greek text uses the phrase “whiter than any fuller can make them.” See also Mal. 3:1–3.
  - type: text
    content: 'at the end of the aqueduct where it empties into the upper pool. '
  - type: note
    content: Ahaz was likely inspecting the city’s vulnerable water supply. It is good to be vulnerable and on the road to being purified and made ready for God to use “on the road to the Washerman’s Field.” The heavenly Washerman wants to cleanse our hearts from unbelief, which hides in false belief systems that close our hearts from a true work of the Spirit. God wants to make you an aqueduct or “channel” of the upper (heavenly) pool.
  - type: text
    content: 'Take with you your son, '
  - type: text
    content: whom you named
  - type: text
    content: ' a Remnant Will Return. '
  - type: note
    content: 'Or “Shear-Jashub,” which in Hebrew means “a remnant will return.” Isaiah was married and had at least two sons (see Isa. 8:1–4). Shear-Jashub was a walking oracle of hope, with a promise in his name: God will preserve a “holy seed” as a remnant (Isa. 6:13).'
  '4':
  - type: text
    content: 'Give him this message: ‘Stay calm! Be quiet and guard your heart! Don’t panic or be discouraged over these two smoldering stubs of firewood, because of the rage of Rezin and Aram, the son of Remaliah. '
  - type: note
    content: Both Pekah and Rezin were dead within two years of their hostilities against Ahaz.
  '5':
  - type: text
    content: 'Syria has plotted with the northern kingdom of Israel '
  - type: note
    content: Or “Ephraim.”
  - type: text
    content: 'and the son of Remaliah to come against you. '
  '6':
  - type: text
    content: They are saying, “We will attack Judah and cut off Jerusalem—we will terrorize and conquer it for ourselves and install the son of Tabeel as king!” ’ ”
  '7':
  - type: text
    content: 'Now hear what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “They will not succeed—it will never happen!
  '8':
  - type: text
    content: For the head of Syria is Damascus,
  - type: text
    content: and the head of Damascus is Rezin.
  - type: text
    content: Sixty-five years from now the northern kingdom of Israel
  - type: text
    content: will be shattered, with nothing left of it.
  - type: note
    content: Or “shattered and no longer a people.” Some scholars see this sentence as a scribal commentary that got merged into the text. M. Scott, “Isaiah 7:8,” ExpTim 38 (1926/1927), 525–26.
  '9':
  - type: text
    content: The head of the northern kingdom of Israel is Samaria,
  - type: text
    content: and the head of Samaria is the son of Remaliah.
  - type: note
    content: By implication, the head of Judah would be Jerusalem and the head of Jerusalem would be David’s son, Ahaz. Notice that God sees a city as the head of a nation and the head of a city to be a human leader. This is the principle of the stronghold/strongman. If the chief city of a nation is taken, the nation will fall. If the chief leader/spirit in a city is taken, the city will fall. See Mark 3:27.
  - type: text
    content: If you do not stand firm in your faith,
  - type: text
    content: you will not be able to stand at all!”
  - type: note
    content: Or “If your faith does not hold, you will not be able to hold it together.” We must be willing to take God at his word and lay our fears to rest, or we will be insecure, unstable, and unable to stand against our foes. Sadly, Ahaz did not heed the words of God and instead sought help from the king of Assyria, even using the gold of the temple to buy his favor (see 2 Kings 16:7–8). Ahaz was one of the worst of Judah’s kings, yet he had the living God standing ready to help him if he would turn back to the Lord.
  - type: heading
    content: God with Us
