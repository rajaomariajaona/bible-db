      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ahaz was the king of Judah, whose capital was Jerusalem. He took the throne at the age of twenty and reigned sixteen years. He was a young leader facing his first major test as king. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This section of Isaiah (chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 7–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is known as the “Book of Immanuel.”
      marker-yv: yv-n
    - type: text
      text: 'the son of Jotham and grandson of Uzziah, two kings launched an attack against Jerusalem: Rezin, the king of Syria, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Aram,” which is modern-day Syria. Rezin means “wicked pleasure,” a picture of the life of the flesh.
      marker-yv: yv-n
    - type: text
      text: 'and Pekah, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Pekah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “open-eyed” or “seeing,” a picture of human reasoning. This unholy alliance of the two kings threatened to invade if King Ahaz did not agree to surrender. The northern kingdom of Israel (Pekah) and Syria (Rezin) joined each other to overthrow Ahaz and put “the son of Tabeel” on the throne in his place (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
