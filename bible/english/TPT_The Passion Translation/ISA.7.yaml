        marker: ref
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The pressure was on King Ahaz to join this united front against the Assyrian expansion.
      marker-yv: yv-n
    - type: text
      text: the son of Remaliah, the king of Israel. But they failed to conquer it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
