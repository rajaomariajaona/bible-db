        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: the heart of King Ahaz and all his people trembled with fear, like trees swaying in the wind.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day, the Lord will take his “razor,” the hired king of Assyria from beyond the Euphrates, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the river.” Ahaz had paid tribute and, in a sense, hired the king of Assyria to shave Syria and the northern kingdom. Instead, the king now served God’s purposes in bringing judgment and devastation to Judah.
      marker-yv: yv-n
    - type: text
      text: 'and he will shave your head, your legs, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “the hair of the feet.” In ancient times, the feet were used euphemistically for genitalia. The hair of the head points to the king (Ahaz); the legs, his soldiers; the beard, the officials of the land. Thus, “shaving” was a metaphor for the Lord stripping from them all that they had: their livelihoods, crops, and private ownership of their land. This supernatural “razor” will be Assyria coming to cut off their pride, their glory, and their boasts. Often the victors would shave the heads of the vanquished. Mourners had their heads shaved (see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). So Judah would mourn over their ways as judgment fell. Shaving off the beard was an embarrassment to Hebrew men (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 10:4–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'and also your beard, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: leaving you ashamed and exposed
    - type: text
      text: '!'
