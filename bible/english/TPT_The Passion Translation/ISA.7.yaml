  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go ahead—ask for a sign from '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This would be a sign to Ahaz proving that God is trustworthy and keeps his word. God is willing to prove himself to Ahaz and to us.
      marker-yv: yv-n
    - type: text
      text: 'Ask for something big, so miraculous '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “as deep as Sheol or as high as heaven”; that is, something so outside human experience that only God can do it.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: that you will know only God did it
    - type: text
      text: '!”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz answered, “I will not ask. I won’t attempt to test the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Isaiah said, “Pay attention, family of David. It’s bad enough to try the patience of a prophet '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “men.” The Targum reads “prophet.”
      marker-yv: yv-n
    - type: text
      text: 'but even worse when you try the patience of my God as well! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Lord himself will give you a sign. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a double sign. There is the sign of the Virgin Mary and the sign of the virgin bride of Christ of the last days. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Behold—the virgin '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the ambiguous Hebrew word for “virgin” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: ‘almah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is more often translated “a girl of marriageable age,” the context is God performing a miracle-sign (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This sign was not merely for Ahaz but also for the family (or “house,” including descendants) of David. There is nothing miraculous about a young woman having a baby; it happens every day. However, the Septuagint translates this word as “virgin” here, as well as in Matthew’s quotation for the virgin birth of the Messiah (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). No child with a human father could be the fulfillment of Immanuel, “God Among Us.” However, some scholars view Isaiah’s other son, “Maher-Shalal-Hash-Baz” (see footnote on
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), as the Immanuel referred to here.
      marker-yv: yv-n
    - type: text
      text: 'will conceive and give birth to a son and will name him God Among Us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Immanuel” (“God became one of us,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). A new nature was about to be planted in the soil of humanity.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Immanuel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a term used for this new creation life coming down out of heaven. It will begin as a man but will soon become a company of men and women. Immanuel is the partnership of heaven and earth, God and humanity.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will eat curdled milk and honey, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This coming “son” would be one who had the kingdom promises as his diet (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Milk and honey represent the promised land, where God fulfills all his promises. Jesus is the only one who has fulfilled the Father’s desires. Feeding on the promises enabled him to choose the right. He resisted temptation by means of the Word of God dwelling in him. Strength to reject evil comes from feeding on truth. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 4:1–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and he will know enough to refuse the evil and choose the good. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet even before that time comes for him to know good and evil, the lands of those two kings you dread will be deserted.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy was fulfilled when Assyria defeated first Syria (732 BC) and then the northern tribes of Israel (722 BC).
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Whistler
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is going to bring days of catastrophic trouble—on you, on your people, and on the whole royal court—not seen since the northern kingdom of Israel broke off from Judah. He is going to bring the king of Assyria '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with his great army
    - type: text
      text: '!”'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day, the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will whistle and call for flies from Egypt’s lower streams. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Niles,” a reference to the flooding of the Nile that brought swarms of dog flies, which are known to buzz like bees and whose bite is extremely painful.
      marker-yv: yv-n
    - type: text
      text: 'He will whistle for bees from the land of Assyria, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and they will swarm '
    - type: usfm
      marker: it
      children:
      - type: text
        text: down upon
    - type: text
      text: ' you and settle into the steep ravines, the crevices of the rocks, on every thorn bush and at every '
    - type: usfm
      marker: it
      children:
      - type: text
        text: stagnant
    - type: text
      text: ' pool.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 7:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “every bush” (possibly the stinkwood). In this case, the flies and bees are the foreign warriors coming to invade. God’s whistle brought them into the land. Experts tell us that beekeepers can persuade bees to come out of their hives or return from the fields by whistling. Like bees gathering to sting (the hill country of Assyria was known for its bees), these warriors would land upon every compromise. The steep ravines are a picture of the slippery slopes of darkness that bring defeat into our hearts. These flies and bees are found where there is corruption and decay within the soul. “Crevices of the rocks” are where we hide our compromises. The thorn bushes are symbols of our flesh life, with its briars and offenses that do not yield to God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). “Every stagnant pool” points us to the stagnant places in our lives that we have not allowed to be renewed and revived.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Lord’s Razor
    marker-yv: yv-h
