document_id: PSA.58
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Judge of the Judges
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s golden song of instruction
- type: usfm
  marker: d
  children:
  - type: text
    text: To the tune of “Do Not Destroy”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-2
  - type: text
    text: God’s justice? You high and mighty politicians
- type: usfm
  marker: q1
  children:
  - type: text
    text: know nothing about it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which one of you has walked in justice toward others?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which one of you has treated everyone right and fair?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not one! You only give “justice” in exchange for a bribe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the right price you let others get away with murder.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: Wicked wanderers even from the womb—that’s who you are!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You lie with your words, and your teaching is poison.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:3–4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew reads “venom of a serpent,” which is a clear metaphor for wrong teaching.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Like cobras closing their ears to the most expert of the charmers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: you strike out against all who are near
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O God, break their fangs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: shatter the teeth of these ravenous lions!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let them disappear like water falling on thirsty ground.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let all their weapons be useless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let them be like snails dissolving into the slime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them be cut off, never seeing the light of day!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: God will sweep them away so fast
- type: usfm
  marker: q1
  children:
  - type: text
    text: that they’ll never know what hit them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 58:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew here is recognized by nearly every scholar to be one of the most difficult verses in the Psalms to translate.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The godly will celebrate in the triumph of good over evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the lovers of God will trample
- type: usfm
  marker: q1
  children:
  - type: text
    text: the wickedness of the wicked under their feet!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then everyone will say, “There is a God who judges the judges”
- type: usfm
  marker: q1
  children:
  - type: text
    text: and “There is a great reward in loving God!”
