document_id: PSA.58,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Judge of the Judges
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s golden song of instruction
  - type: text
    content: To the tune of “Do Not Destroy”
  - type: text
    content: God’s justice? You high and mighty politicians
  - type: text
    content: know nothing about it!
  - type: text
    content: Which one of you has walked in justice toward others?
  - type: text
    content: Which one of you has treated everyone right and fair?
  - type: text
    content: Not one! You only give “justice” in exchange for a bribe.
  - type: text
    content: For the right price you let others get away with murder.
  '10':
  - type: text
    content: The godly will celebrate in the triumph of good over evil,
  - type: text
    content: and the lovers of God will trample
  - type: text
    content: the wickedness of the wicked under their feet!
  '11':
  - type: text
    content: Then everyone will say, “There is a God who judges the judges”
  - type: text
    content: and “There is a great reward in loving God!”
  '3':
  - type: text
    content: Wicked wanderers even from the womb—that’s who you are!
  - type: text
    content: You lie with your words, and your teaching is poison.
  - type: note
    content: The Hebrew reads “venom of a serpent,” which is a clear metaphor for wrong teaching.
  '5':
  - type: text
    content: Like cobras closing their ears to the most expert of the charmers,
  - type: text
    content: you strike out against all who are near
  - type: text
    content: .
  '6':
  - type: text
    content: O God, break their fangs;
  - type: text
    content: shatter the teeth of these ravenous lions!
  '7':
  - type: text
    content: Let them disappear like water falling on thirsty ground.
  - type: text
    content: Let all their weapons be useless.
  '8':
  - type: text
    content: Let them be like snails dissolving into the slime.
  - type: text
    content: Let them be cut off, never seeing the light of day!
  '9':
  - type: text
    content: God will sweep them away so fast
  - type: text
    content: that they’ll never know what hit them.
  - type: note
    content: The Hebrew here is recognized by nearly every scholar to be one of the most difficult verses in the Psalms to translate.
