      marker-yv: yv-n
    - type: text
      text: and fine clothes.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Holy women of long ago who had set their hopes in God beautified themselves with lives lived in deference to their own husbands’ authority. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For example, our '
    - type: usfm
      marker: it
      children:
      - type: text
        text: “mother,”
    - type: text
      text: ' Sarah, devoted herself '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
