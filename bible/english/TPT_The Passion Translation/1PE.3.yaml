        - type: text
          text: Or “at the right hand of God.”
      marker-yv: yv-n
    - type: text
      text: The very powers of heaven, including every angel and authority, now yield in submission to him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let your true beauty come from your inner personality, not a focus on the external. For lasting beauty comes from a gentle and peaceful spirit, which is precious in God’s sight '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and is much more important
    - type: text
      text: ' than the outward adornment of elaborate hair, jewelry, '
    - type: usfm
