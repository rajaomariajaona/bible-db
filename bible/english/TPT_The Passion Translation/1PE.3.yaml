      - type: usfm
        marker: ft
        children:
        - type: text
          text: The early church fathers cited this passage, along with others, in the belief that Jesus “descended into hell” (e.g., the Apostles’ Creed, although the earliest versions of it do not include the words “descended into hell”). In this context, between his death and resurrection, Jesus is said to have gone into the underworld and preached (the victory of the cross) to the spirits (fallen angels) who are bound. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 6:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 2:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . However, Augustine, Aquinas, and others argue that the proclamation Jesus made was through Noah by the Holy Spirit to the people of Noah’s day who were disobedient. Nearly every scholar concludes that this passage in 1 Peter is one of the most difficult in the New Testament to interpret.
      marker-yv: yv-n
    - type: text
      text: 'For during the time of Noah God patiently waited while the ark was being prepared, but only a few were brought safely through the floodwaters: a total of eight souls. '
  '21':
