        - type: text
          text: 'Or “by being put to death in/by the flesh.” The passive verb (“having been put to death”) implies that this was something done to him “by flesh” (or “humanity”). The contrast is this: humanity put him on the cross, but the Spirit raised him up to life.'
      marker-yv: yv-n
    - type: text
