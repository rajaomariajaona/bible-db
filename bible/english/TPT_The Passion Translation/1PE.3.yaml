      marker-yv: yv-n
    - type: text
      text: to her husband, Abraham, and even called him “master.” And you have become her daughters when you do what is right without fear and intimidation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the wife is not inferior and should never be intimidated by her husband. The Aramaic can be translated “without being terrified by any fear.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Husbands, you in turn must treat your wives with tenderness, '
