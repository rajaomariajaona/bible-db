document_id: 1PE.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Marriage Relationship
  - type: text
    content: 'And now let me speak to the wives. Be devoted to your own husbands, '
  - type: note
    content: As translated from the Aramaic. The Greek is “defer to the authority of your husbands” (patiently accept, submit).
  - type: text
    content: 'so that even if some of them do not obey the Word of God, your kind conduct may win them over without you saying a thing. '
  '10':
  - type: text
    content: 'For the Scriptures tell us:'
  - type: text
    content: Whoever wants to embrace true life
  - type: text
    content: and find beauty in each day
  '11':
  - type: text
    content: must stop speaking evil, hurtful words
  - type: text
    content: and never deceive in what they say.
  - type: text
    content: Always turn from what is wrong
  - type: text
    content: and cultivate what is good;
  - type: text
    content: eagerly pursue peace in every relationship,
  - type: text
    content: making it your prize.
  '12':
  - type: text
    content: 'For the eyes of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is kurios (lord).
  - type: text
    content: rest upon the godly,
  - type: text
    content: and his heart responds to their prayers.
  - type: text
    content: But he turns his back on those who practice evil.
  - type: note
    content: Or “He sets his face against evildoers.” See Ps. 34:12–16.
  - type: heading
    content: Persecuted for Doing Good
  '13':
  - type: text
    content: 'Why would anyone harm '
  - type: note
    content: The Aramaic can be translated “do evil to you.”
  - type: text
    content: 'you if you’re passionate and devoted '
  - type: note
    content: Or “eager to do good.” The Aramaic word used for “passionate and devoted” is a homonym that can also mean “imitators.” For this reason some Greek manuscripts have “followers/imitators of what is good.”
  - type: text
    content: 'to pleasing God? '
  '14':
  - type: text
    content: 'But even if you happen to suffer for doing what is right, you will have the '
  - type: text
    content: joyful
  - type: text
    content: ' experience of the blessing of God. '
  - type: note
    content: 'There are three things to remember when you suffer mistreatment or persecution for the cause of Christ: (1) The eyes of God rest upon you, v. 12; (2) God’s heart responds to your prayers, v. 12; (3) You will experience the blessing of God in spite of your enemies, with nothing to fear, v. 14.'
  - type: text
    content: And
  - type: text
    content: Don’t be intimidated or terrified
  - type: text
    content: by those who would terrify you.
  - type: note
    content: As translated from the Aramaic. See Isa. 8:12–13.
  '15':
  - type: text
    content: 'But give reverent honor in your hearts to the Anointed One and treat him as the holy Master '
  - type: note
    content: The Aramaic can be translated “Lord Yahweh.” This is a clear statement that Christ is the Lord Yahweh.
  - type: text
    content: of your lives
  - type: text
    content: '. And if anyone asks '
  - type: note
    content: Or “repeatedly asks.”
  - type: text
    content: 'about the hope living within you, always be ready to explain your faith '
  '16':
  - type: text
    content: 'with gentleness and respect. Maintain a clean conscience, so that those who slander you for living a pure life in Christ will have to lie about you and will be ashamed because of their slander. '
  - type: note
    content: Or “be ashamed when they accuse you.” We cannot prevent people from slandering us, but when they do, they should be forced to lie.
  '17':
  - type: text
    content: For it is better to suffer for doing good, if it is in God’s plan, than for doing evil.
  - type: heading
    content: Christ’s Victory
  '18':
  - type: text
    content: 'Christ suffered and died '
  - type: note
    content: There is great variation among reliable texts of this phrase. Some have “Christ suffered,” and others read “Christ died.” This translation has included both concepts.
  - type: text
    content: 'for sins once and for all—the innocent for the guilty '
  - type: note
    content: Or “the just for the unjust.” See Isa. 53:11–12.
  - type: text
    content: '—to bring you near to God by his body '
  - type: note
    content: 'Or “by being put to death in/by the flesh.” The passive verb (“having been put to death”) implies that this was something done to him “by flesh” (or “humanity”). The contrast is this: humanity put him on the cross, but the Spirit raised him up to life.'
  - type: text
    content: 'being put to death and by being raised to life by the Spirit. '
  '19':
  - type: text
    content: 'He went in the spiritual realm '
  - type: note
    content: Or “through the [Holy] Spirit.”
  - type: text
    content: 'and made a proclamation to the spirits in prison '
  - type: note
    content: The Aramaic can be translated Sheol (“Hades”).
  '2':
  - type: text
    content: 'For when they observe your pure, godly life before God, '
  - type: text
    content: it will impact them deeply
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'because of their disobedience of long ago. '
  - type: note
    content: The early church fathers cited this passage, along with others, in the belief that Jesus “descended into hell” (e.g., the Apostles’ Creed, although the earliest versions of it do not include the words “descended into hell”). In this context, between his death and resurrection, Jesus is said to have gone into the underworld and preached (the victory of the cross) to the spirits (fallen angels) who are bound. See also Gen. 6:1–4; 2 Peter 2:4. However, Augustine, Aquinas, and others argue that the proclamation Jesus made was through Noah by the Holy Spirit to the people of Noah’s day who were disobedient. Nearly every scholar concludes that this passage in 1 Peter is one of the most difficult in the New Testament to interpret.
  - type: text
    content: 'For during the time of Noah God patiently waited while the ark was being prepared, but only a few were brought safely through the floodwaters: a total of eight souls. '
  '21':
  - type: text
    content: 'This was a prophetic picture '
  - type: note
    content: The Greek word antitypos means “a picture,” “a type,” “a symbol,” “a pattern,” or “a counterpart.”
  - type: text
    content: 'of the immersion that now saves you—not a bathing of the physical body but rather the response of a good conscience before God '
  - type: note
    content: Or “by the response of a good conscience.” The word often translated “conscience” (syneidēsis) actually means “a joint knowing,” “a virtuous co-knowledge,” or “co-perception.”
  - type: text
    content: 'through the resurrection of Jesus Christ, '
  '22':
  - type: text
    content: 'who is now in heaven at the place of supreme authority next to God. '
  - type: note
    content: Or “at the right hand of God.”
  - type: text
    content: The very powers of heaven, including every angel and authority, now yield in submission to him.
  '3':
  - type: text
    content: 'Let your true beauty come from your inner personality, not a focus on the external. For lasting beauty comes from a gentle and peaceful spirit, which is precious in God’s sight '
  - type: text
    content: and is much more important
  - type: text
    content: ' than the outward adornment of elaborate hair, jewelry, '
  - type: note
    content: Or “braiding of hair or gold ornaments.”
  - type: text
    content: and fine clothes.
  '5':
  - type: text
    content: 'Holy women of long ago who had set their hopes in God beautified themselves with lives lived in deference to their own husbands’ authority. '
  '6':
  - type: text
    content: 'For example, our '
  - type: text
    content: “mother,”
  - type: text
    content: ' Sarah, devoted herself '
  - type: note
    content: As translated from the Aramaic. The Greek is “obeyed.”
  - type: text
    content: to her husband, Abraham, and even called him “master.” And you have become her daughters when you do what is right without fear and intimidation.
  - type: note
    content: That is, the wife is not inferior and should never be intimidated by her husband. The Aramaic can be translated “without being terrified by any fear.”
  '7':
  - type: text
    content: 'Husbands, you in turn must treat your wives with tenderness, '
  - type: note
    content: Or “with intimate insight” (“realistically,” “with considerateness”). That is, with consideration of what they desire and delight in, not ignorant of their preferences.
  - type: text
    content: 'viewing them '
  - type: note
    content: Or “make a home as equals.”
  - type: text
    content: 'as feminine '
  - type: note
    content: Or “weaker vessel,” which is a possible idiom for “weaker livelihood.” Widows and female orphans were horribly disadvantaged in the time this was written. Without an advocate, women were often oppressed by corrupt political officials. However, in Aramaic, the native language of Peter, the word for “weaker” is machal, which means weak, but weak only in the sense of a debtor who has been paid off so he has no power over you and is weakened. Machal carries the idea of neutralizing a threat. The Aramaic word for “vessel” is mana and is taken from the Phoenician word for “clothing.” Its etymological root comes from the Phoenician word for the “outrigging of a ship” (i.e., sail, rudder, anchor). Peter may be describing the wife as the “outrigging of a marriage” that helps keep the relation-“ship” on course and moving.
  - type: text
    content: partners who deserve to be honored, for they are co-heirs with you of the “
  - type: text
    content: divine
  - type: text
    content: ' grace of life,” '
  - type: note
    content: This unique New Testament phrase describes the joyous grace that husband and wife share as a married couple, as coheirs of eternal life. But there is more than a hint of the life they give birth to—that is, the wonderful grace of giving life to a child, “the divine grace of life.”
  - type: text
    content: so that nothing will hinder your prayers.
  - type: heading
    content: Love One Another
  '8':
  - type: text
    content: 'Now, this is the goal: to live in harmony with one another and demonstrate affectionate love, '
  - type: note
    content: Or “brotherly love.”
  - type: text
    content: 'sympathy, '
  - type: note
    content: The Aramaic can be translated “suffer with those who are suffering.”
  - type: text
    content: 'and kindness toward other believers. Let humility describe who you are as you dearly love one another. '
  '9':
  - type: text
    content: 'Never retaliate when someone treats you wrongly, nor insult those who insult you, but instead, respond by speaking a blessing over them—because a blessing is what God promised to give you. '
  - type: note
    content: 'Every believer is blessed by God. There are eight virtues found in vv. 8–9 that should characterize our fellowship as believers who follow Christ: (1) a sublime harmony, (2) demonstration of affectionate (brotherly) love, (3) sympathy, (4) kindness, (5) humility, (6) fervent love, (7) never retaliating evil for evil or insult for insult, and (8) speaking blessings over those who mistreat us.'
