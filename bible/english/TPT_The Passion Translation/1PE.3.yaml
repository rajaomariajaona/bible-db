        marker: fr
        children:
        - type: text
          text: 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with intimate insight” (“realistically,” “with considerateness”). That is, with consideration of what they desire and delight in, not ignorant of their preferences.
      marker-yv: yv-n
    - type: text
      text: 'viewing them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “make a home as equals.”
      marker-yv: yv-n
    - type: text
      text: 'as feminine '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “weaker vessel,” which is a possible idiom for “weaker livelihood.” Widows and female orphans were horribly disadvantaged in the time this was written. Without an advocate, women were often oppressed by corrupt political officials. However, in Aramaic, the native language of Peter, the word for “weaker” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: machal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means weak, but weak only in the sense of a debtor who has been paid off so he has no power over you and is weakened.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Machal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: carries the idea of neutralizing a threat. The Aramaic word for “vessel” is
      - type: usfm
        marker: ft
