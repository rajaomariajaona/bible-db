    children:
    - type: text
      text: 'who is now in heaven at the place of supreme authority next to God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
