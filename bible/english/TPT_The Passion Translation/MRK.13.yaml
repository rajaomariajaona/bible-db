        children:
        - type: text
          text: As translated from the Aramaic, which employs a homonym that can be translated either “this generation will not pass away,” or “this family will not pass away.” The generation in which Jesus lived on earth has indeed passed away, but the Christian “family” of believers remains and endures. Arguably one of the most difficult verses in the Gospels to interpret, “this generation” could also refer to the Jewish people (race).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will not pass away until all I have spoken comes to pass.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The earth and sky will wear out and fade away before one word I speak loses its power or fails to accomplish its purpose.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Live Always Ready for His Appearing
    marker-yv: yv-h
