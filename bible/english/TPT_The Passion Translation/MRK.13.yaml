document_id: MRK.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Prophesies the Destruction of the Temple
  - type: text
    content: As Jesus was leaving the temple courts, one of his disciples came to him and said, “Teacher, look at these magnificent buildings! And what tremendous stones were used to build all this!”
  - type: note
    content: This is Solomon’s Temple, rebuilt by Herod the Great. He began the project in 19 BC, prior to the birth of Christ, using some of the greatest marble and gold ornamentation found in the Middle East. Some of the stones he used were five meters long and over one meter high.
  '10':
  - type: text
    content: But prior to the end of the age,
  - type: text
    content: ' '
  - type: text
    content: the hope of the gospel
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic (lit. “hopes”).
  - type: text
    content: must first
  - type: text
    content: ' '
  - type: note
    content: The chronological reference (“first”) takes us back to v. 7. That is, the end will not come before the gospel is preached to all nations.
  - type: text
    content: be preached to all nations.
  '11':
  - type: text
    content: “So when they put you under arrest and hand you over for trial, don’t even give one thought about what you will say. Simply speak what the Holy Spirit gives you at that very moment. And realize that it won’t be you speaking but the Holy Spirit speaking through you.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Brothers will betray each other unto death—even a father his child. Children will rise up to take a stand against their parents and have them put to death.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Expect to be hated by all because of your allegiance to my name. But determine to be faithful to the end and you will be saved.”
  - type: note
    content: Or “you will be rescued” or “preserved” or “delivered.”
  - type: heading
    content: The Detestable Idol That Brings Misery
  '14':
  - type: text
    content: “When you witness what Daniel prophesied, ‘the disgusting destroyer,’
  - type: text
    content: ' '
  - type: note
    content: Or “the abomination [sin] that brings desolation [desecration].” See Dan. 8:13; 9:27; 11:31; 12:11. Jesus is saying that Daniel’s prophecy had not yet been fulfilled in his time. Many see the fulfillment of this prophecy in AD 70, when Titus, the Roman prince, went into the temple and sacrificed animals to Jupiter.
  - type: text
    content: standing where it must not be
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “the defiling sign of desolation piling up” (setting up).
  - type: text
    content: '[Let the reader learn what it means], '
  - type: note
    content: These parenthetical words were added by Mark to encourage us to seek the Lord for the understanding of this mystery. Jesus, speaking in the role of the true Prophet, gives us truth to ponder in veiled language.
  - type: text
    content: then those in the land of Judah must escape to higher ground.
  - type: text
    content: ' '
  - type: note
    content: See Jer. 16:16; Zech. 14:5; Luke 21:20–22.
  '15':
  - type: text
    content: On that day, if you happen to be outside,
  - type: text
    content: ' '
  - type: note
    content: Or “on the roof.”
  - type: text
    content: don’t go back inside to gather your belongings.
  - type: text
    content: ' '
  '16':
  - type: text
    content: And if you’re working out in the field, don’t run back home to get a coat.
  - type: text
    content: ' '
  '17':
  - type: text
    content: It will be especially hard
  - type: text
    content: ' '
  - type: note
    content: Or “woe.” Jesus is not cursing them, but stating how dreadfully difficult it will be for them.
  - type: text
    content: for pregnant women and for those nursing their babies when those days come.
  - type: text
    content: ' '
  '18':
  - type: text
    content: So pray that your escape will not be during the winter months.
  - type: text
    content: ' '
  '19':
  - type: text
    content: For this will be a time of great misery beyond the magnitude of anything the world has ever seen from the beginning of time
  - type: text
    content: ' '
  - type: note
    content: Or “such as has not been seen from the beginning of the creation that God created until now.”
  - type: text
    content: or ever will see.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Jesus turned to them and said, '
  - type: text
    content: “Take a good look at all these enormous buildings, for I’m telling you, there will not be one stone left upon another. It will all be leveled!”
  - type: note
    content: This prophecy of Jesus was fulfilled by the Roman prince Titus, who, in the Roman war of AD 67–70, destroyed the temple. There is still standing in Rome today the Arch of Titus, which commemorates his conquest of Jerusalem. In about AD 135, the emperor Hadrian completely destroyed the city of Jerusalem and built a new city on its foundations.
  - type: heading
    content: Signs of the End of the Age
  '20':
  - type: text
    content: Unless God limits those days, no one would escape. But because of his love for his chosen ones, he will shorten that time of trouble.
  '21':
  - type: text
    content: “And if you hear reports from people, saying, ‘Look, the Messiah is over here,’ or, ‘The Messiah is over there!’ don’t believe it.
  - type: text
    content: ' '
  '22':
  - type: text
    content: For there will be imposters falsely claiming to be God’s ‘Anointed One.’ And false prophets
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “prophets of lies.”
  - type: text
    content: will arise to perform miracle signs, and if it were possible, they would cause God’s chosen ones to wander off the right track.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Be alert, for I prophesy all this will happen!”
  - type: heading
    content: The Appearing of the Son of Man
  '24':
  - type: text
    content: '“This is what will take place after that suffering:'
  - type: text
    content: The sun will be darkened and the moon will reflect no light.
  '25':
  - type: text
    content: The stars will be falling from the sky
  - type: text
    content: and all the cosmic powers will be shaken.
  - type: note
    content: See Isa. 13:10; 34:4; Joel 2:10; Amos 8:9. This can also be viewed as a Hebraic metaphor of the lights of the natural realm being shut off and replaced with heaven’s glory. Lights out on the old order. Sun, moon, and stars are also representative of the governmental structures failing with great calamity. A new order, a new glory, is coming to replace the fading glories of this world.
  '26':
  - type: text
    content: “Then they will see the Son of Man appearing in the midst of clouds and revealed with mighty power and great glory.
  - type: text
    content: ' '
  - type: note
    content: See Dan. 7:13.
  '27':
  - type: text
    content: At that time he will send his messengers
  - type: text
    content: ' '
  - type: note
    content: Or “angels.” The Greek word for “angels” can also mean “messengers.”
  - type: text
    content: to gather together his beloved chosen ones from every direction—from the ends of the earth to the ends of heaven!”
  - type: heading
    content: The Parable of the Fig Tree
  '28':
  - type: text
    content: “Now, learn the lesson from the parable of the fig tree. When spring arrives, and it sends out its tender branches and sprouts leaves, you know that summer is near.
  - type: text
    content: ' '
  '29':
  - type: text
    content: So also, when you observe all these things progressively taking place, you will know that he
  - type: text
    content: ' '
  - type: note
    content: Or “it.”
  - type: text
    content: is near, even at the door!
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Later, while Jesus was sitting on the Mount of Olives, overlooking the temple, his disciples, Peter, Jacob, John, and Andrew, came to him privately where he was sitting and said, '
  '30':
  - type: text
    content: I assure you, this family
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic, which employs a homonym that can be translated either “this generation will not pass away,” or “this family will not pass away.” The generation in which Jesus lived on earth has indeed passed away, but the Christian “family” of believers remains and endures. Arguably one of the most difficult verses in the Gospels to interpret, “this generation” could also refer to the Jewish people (race).
  - type: text
    content: will not pass away until all I have spoken comes to pass.
  - type: text
    content: ' '
  '31':
  - type: text
    content: The earth and sky will wear out and fade away before one word I speak loses its power or fails to accomplish its purpose.”
  - type: heading
    content: Live Always Ready for His Appearing
  '32':
  - type: text
    content: “Concerning that day and exact hour, no one knows when it will arrive, not the angels of heaven, not even the Son—only the Father knows.
  - type: text
    content: ' '
  '33':
  - type: text
    content: This is why you must be waiting, watching and praying,
  - type: text
    content: ' '
  - type: note
    content: Most Greek manuscripts do not have “and praying”; however, there are ancient authorities who make reference to its inclusion here.
  - type: text
    content: because no one knows when that season of time will come.”
  - type: heading
    content: A Parable of a Man Who Left on a Journey
  '34':
  - type: text
    content: “For those days can be compared to a man who was about to leave on a journey, but before leaving he placed his servants in charge and gave each one work to do while he was away. Then he commanded the watchman
  - type: text
    content: ' '
  - type: note
    content: Or “doorkeeper.”
  - type: text
    content: to be on guard at all times.
  - type: text
    content: ' '
  '35':
  - type: text
    content: So I say to you, keep awake and alert—for you have no idea when the master of the house will return; in the evening, at midnight, at four o’clock in the morning,
  - type: text
    content: ' '
  - type: note
    content: Or “when the rooster crows.”
  - type: text
    content: or at dawn.
  - type: text
    content: ' '
  '36':
  - type: text
    content: Be alert, for he’s coming suddenly and may find you sleeping!
  - type: text
    content: ' '
  '37':
  - type: text
    content: And what I say to the four of you, I say to everyone—be awake at all times!”
  '4':
  - type: text
    content: “Tell us, when will these things happen? And what supernatural sign should we expect to signal your coming and the completion of this age?”
  - type: note
    content: Although it is possible to translate this “the end of the world,” the Hebraic mindset of the end of days is a transition into a new age of the Messiah’s coming that would restore all things. Note also that this teaching regarding the last days was not given publicly but only to four disciples.
  '5':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “At that time deception will run rampant. So beware that you’re not fooled!
  - type: text
    content: ' '
  '6':
  - type: text
    content: For many will appear on the scene claiming my authority
  - type: text
    content: ' '
  - type: note
    content: Or “making use of my name.”
  - type: text
    content: or saying about themselves, ‘I am God’s Anointed,’
  - type: text
    content: ' '
  - type: note
    content: Or “I am” (the one), or “It is I.”
  - type: text
    content: and they will lead many astray.
  - type: text
    content: ' '
  '7':
  - type: text
    content: You will hear rumors of wars nearby, with more rumors of wars to come. Make sure that you are not thrown into a panic or give in to your fears, for these things are destined to happen. Prepare for it,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: but still the end is not yet.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For nations
  - type: text
    content: ' '
  - type: note
    content: 'Or “ethnic groups.” Although implied in the Greek, the Aramaic text is explicit: “Peoples will rise over peoples and kingdoms over kingdoms.”'
  - type: text
    content: will go to war against each other and kingdoms will clash with kingdoms. And there will be terrible earthquakes in place after place—seismic events of epic proportion. And there will be famines and riots.
  - type: text
    content: ' '
  - type: note
    content: The word riots (rebellious uprisings) is found only in the Aramaic manuscripts. See also 2 Chron. 15:6 and Isa. 19:2.
  - type: text
    content: This is how the first contractions and birth pains of the new age will begin.”
  - type: heading
    content: Jesus Warns of Persecution
  '9':
  - type: text
    content: “Be on your guard! For they will hand you over to the ruling councils, and you will be beaten in public gatherings. And you will stand trial before kings and high-ranking governmental leaders as an opportunity to testify to them on my behalf.
  - type: text
    content: ' '
