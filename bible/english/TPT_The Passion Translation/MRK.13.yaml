      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will arise to perform miracle signs, and if it were possible, they would cause God’s chosen ones to wander off the right track.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
