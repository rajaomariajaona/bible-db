    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jesus turned to them and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take a good look at all these enormous buildings, for I’m telling you, there will not be one stone left upon another. It will all be leveled!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy of Jesus was fulfilled by the Roman prince Titus, who, in the Roman war of AD 67–70, destroyed the temple. There is still standing in Rome today the Arch of Titus, which commemorates his conquest of Jerusalem. In about AD 135, the emperor Hadrian completely destroyed the city of Jerusalem and built a new city on its foundations.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Signs of the End of the Age
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Unless God limits those days, no one would escape. But because of his love for his chosen ones, he will shorten that time of trouble.
  '21':
  - type: usfm
