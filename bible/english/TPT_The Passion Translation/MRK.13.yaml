        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although it is possible to translate this “the end of the world,” the Hebraic mindset of the end of days is a transition into a new age of the Messiah’s coming that would restore all things. Note also that this teaching regarding the last days was not given publicly but only to four disciples.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
