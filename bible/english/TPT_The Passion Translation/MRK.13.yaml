verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prophesies the Destruction of the Temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: As Jesus was leaving the temple courts, one of his disciples came to him and said, “Teacher, look at these magnificent buildings! And what tremendous stones were used to build all this!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is Solomon’s Temple, rebuilt by Herod the Great. He began the project in 19 BC, prior to the birth of Christ, using some of the greatest marble and gold ornamentation found in the Middle East. Some of the stones he used were five meters long and over one meter high.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: But prior to the end of the age,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the hope of the gospel
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic (lit. “hopes”).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: must first
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The chronological reference (“first”) takes us back to v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . That is, the end will not come before the gospel is preached to all nations.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: be preached to all nations.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So when they put you under arrest and hand you over for trial, don’t even give one thought about what you will say. Simply speak what the Holy Spirit gives you at that very moment. And realize that it won’t be you speaking but the Holy Spirit speaking through you.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Brothers will betray each other unto death—even a father his child. Children will rise up to take a stand against their parents and have them put to death.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Expect to be hated by all because of your allegiance to my name. But determine to be faithful to the end and you will be saved.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you will be rescued” or “preserved” or “delivered.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Detestable Idol That Brings Misery
    marker-yv: yv-h
  '14':
