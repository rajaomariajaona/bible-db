        children:
        - type: text
          text: . Jesus is saying that Daniel’s prophecy had not yet been fulfilled in his time. Many see the fulfillment of this prophecy in AD 70, when Titus, the Roman prince, went into the temple and sacrificed animals to Jupiter.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: standing where it must not be
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the defiling sign of desolation piling up” (setting up).
      marker-yv: yv-n
    - type: text
      text: '[Let the reader learn what it means], '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These parenthetical words were added by Mark to encourage us to seek the Lord for the understanding of this mystery. Jesus, speaking in the role of the true Prophet, gives us truth to ponder in veiled language.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: then those in the land of Judah must escape to higher ground.
