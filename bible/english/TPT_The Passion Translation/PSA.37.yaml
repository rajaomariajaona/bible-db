document_id: PSA.37
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Song of Wisdom
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Poetic praise by King David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psalm 37
      metadata:
        usfm: PSA.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is an acrostic psalm, in which every other verse begins with a successive letter of the Hebrew alphabet.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Don’t follow after the wicked ones or be jealous of their wealth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t think for a moment they’re better off than you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and their short-lived success
- type: usfm
  marker: q1
  children:
  - type: text
    text: will soon shrivel up and quickly fade away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like grass clippings in the hot sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Keep trusting in the Lord and do what is right in his eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fix your heart on the promises of God, and you will dwell in the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: feasting on his faithfulness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Find your delight '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: delight
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to be soft or tender.”
    marker-yv: yv-n
  - type: text
    text: 'and true pleasure in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will give you what you desire the most.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Give '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here can be translated “commit,” which means “to roll over your burdens on the Lord.”
    marker-yv: yv-n
  - type: text
    text: God the right to direct your life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and as you trust him along the way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ll find he pulled it off perfectly!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He will appear '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew verb found here is also used for giving birth. Perhaps this is a reference to the birth of Christ, our righteousness.
    marker-yv: yv-n
  - type: text
    text: as your righteousness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as sure as the dawning of a new day.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will manifest as your justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as sure and strong as the noonday sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quiet your heart in his presence
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and wait '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The root word of the word for “wait” can mean “to whirl” or “to be in labor [give birth].” What an unusual concept for waiting on God. We may feel like we’re being
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: whirled
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: around by our circumstances, but in the end, our season of waiting
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gives birth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: to greater things.
    marker-yv: yv-n
  - type: text
    text: 'patiently for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: And don’t think for a moment that the wicked, in their prosperity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: are better off than you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Stay away from anger and revenge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Keep envy far from you, for it only leads you into lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For one day the wicked will be destroyed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but those who trust in the Lord
- type: usfm
  marker: q1
  children:
  - type: text
    text: will inherit the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Just a little while longer and the ungodly will vanish;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will look for them in vain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But the humble of heart will inherit every promise
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 5:5
      metadata:
        usfm: MAT.5.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and enjoy abundant peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Let the wicked keep plotting against the godly
- type: usfm
  marker: q1
  children:
  - type: text
    text: with all their sneers and arrogant jeers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: God laughs at the wicked and their plans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for he knows their day is coming!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Evil ones take aim at the poor and helpless;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are ready to slaughter those who do right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But the Lord will turn all their weapons of wickedness back on themselves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: piercing their pride-filled hearts until they are helpless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It is much better to have little
- type: usfm
  marker: q1
  children:
  - type: text
    text: combined with much of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to have the fabulous wealth of the wicked and nothing else.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For the Lord takes care of all his forgiven ones
- type: usfm
  marker: q1
  children:
  - type: text
    text: while the strength of evil men will surely slip away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Day by day the Lord watches the good deeds of the godly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he prepares for them his forever-reward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Even in a time of disaster he will watch over them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they will always have more than enough
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter what happens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All the enemies of God will perish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the wicked have only a momentary value, a fading glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then one day they vanish! Here today, gone tomorrow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They break their promises, borrowing money
- type: usfm
  marker: q1
  children:
  - type: text
    text: but never paying it back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The good man returns what he owes with some extra besides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s blessed ones receive the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the cursed ones will be cut off
- type: usfm
  marker: q1
  children:
  - type: text
    text: with nothing to show for themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' delights in how you live your life,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: he establishes your every step.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: If they stumble badly they will still survive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the Lord lifts them up with his hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'I was once inexperienced, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 37:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “immature.” The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: na’ar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: has a homonym that means “to be driven out,” which may be a reference to David being driven out of Jerusalem by Absalom.
    marker-yv: yv-n
  - type: text
    text: but now I’m old.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Not once have I found a lover of God forsaken by him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor have any of their children gone hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Instead, I’ve found the godly ones
- type: usfm
  marker: q1
  children:
  - type: text
    text: to be the generous ones who give freely to others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their children are blessed and become a blessing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: If you truly want to dwell forever in God’s presence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: forsake evil and do what is right in his eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The Lord loves it when he sees us walking in his justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will never desert his devoted lovers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will be kept forever in his faithful care,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the descendants of the wicked will be banished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The faithful lovers of God will inherit the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: and enjoy every promise of God’s care,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dwelling in peace forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: God-lovers make the best counselors.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their words possess wisdom and are right and trustworthy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The ways of God are in their hearts
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they won’t swerve from the paths of steadfast righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Evil ones spy on the godly ones, stalking them
- type: usfm
  marker: q1
  children:
  - type: text
    text: to find something they could use to accuse them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re out for the kill!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But God will foil all their plots.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The godly will not stand condemned when brought to trial.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So don’t be impatient for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' to act;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: keep moving forward steadily in his ways,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will exalt you to possess the land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ll watch with your own eyes
- type: usfm
  marker: q1
  children:
  - type: text
    text: and see the wicked lose everything.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: I’ve already seen this happen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Once I saw a wicked and violent man
- type: usfm
  marker: q1
  children:
  - type: text
    text: overpower all who were around him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a domineering tyrant with his prideful and oppressive ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then he died and was forgotten.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Now no one cares that he is gone forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: But you can tell who are the blameless and spiritually mature.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: What a different story with them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The godly ones will have a peaceful, prosperous future
- type: usfm
  marker: q1
  children:
  - type: text
    text: with a happy ending.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Every evil sinner will be destroyed, obliterated.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’ll be utter failures with no future!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: But the Lord will be the Savior of all who love him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even in their time of trouble, God will live in them as strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Because of their faith in him, their daily portion will be
- type: usfm
  marker: q1
  children:
  - type: text
    text: a Father’s help and deliverance from evil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This is true for all who turn to hide themselves in him!
