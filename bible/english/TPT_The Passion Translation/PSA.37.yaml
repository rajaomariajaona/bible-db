document_id: PSA.37,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Wisdom
  - type: text
    content: Poetic praise by King David
  - type: note
    content: Psalm 37 is an acrostic psalm, in which every other verse begins with a successive letter of the Hebrew alphabet.
  - type: text
    content: Don’t follow after the wicked ones or be jealous of their wealth.
  - type: text
    content: Don’t think for a moment they’re better off than you.
  '10':
  - type: text
    content: Just a little while longer and the ungodly will vanish;
  - type: text
    content: you will look for them in vain.
  '11':
  - type: text
    content: But the humble of heart will inherit every promise
  - type: note
    content: See Matt. 5:5.
  - type: text
    content: and enjoy abundant peace.
  '12':
  - type: text
    content: Let the wicked keep plotting against the godly
  - type: text
    content: with all their sneers and arrogant jeers.
  '13':
  - type: text
    content: God laughs at the wicked and their plans,
  - type: text
    content: for he knows their day is coming!
  '14':
  - type: text
    content: Evil ones take aim at the poor and helpless;
  - type: text
    content: they are ready to slaughter those who do right.
  '15':
  - type: text
    content: But the Lord will turn all their weapons of wickedness back on themselves,
  - type: text
    content: piercing their pride-filled hearts until they are helpless.
  '16':
  - type: text
    content: It is much better to have little
  - type: text
    content: combined with much of God
  - type: text
    content: than to have the fabulous wealth of the wicked and nothing else.
  '17':
  - type: text
    content: For the Lord takes care of all his forgiven ones
  - type: text
    content: while the strength of evil men will surely slip away.
  '18':
  - type: text
    content: Day by day the Lord watches the good deeds of the godly,
  - type: text
    content: and he prepares for them his forever-reward.
  '19':
  - type: text
    content: Even in a time of disaster he will watch over them,
  - type: text
    content: and they will always have more than enough
  - type: text
    content: no matter what happens.
  '2':
  - type: text
    content: 'They '
  - type: text
    content: and their short-lived success
  - type: text
    content: will soon shrivel up and quickly fade away,
  - type: text
    content: like grass clippings in the hot sun.
  '20':
  - type: text
    content: All the enemies of God will perish.
  - type: text
    content: For the wicked have only a momentary value, a fading glory.
  - type: text
    content: Then one day they vanish! Here today, gone tomorrow.
  '21':
  - type: text
    content: They break their promises, borrowing money
  - type: text
    content: but never paying it back.
  - type: text
    content: The good man returns what he owes with some extra besides.
  '22':
  - type: text
    content: Yahweh
  - type: text
    content: ’s blessed ones receive the land,
  - type: text
    content: but the cursed ones will be cut off
  - type: text
    content: with nothing to show for themselves.
  '23':
  - type: text
    content: 'When '
  - type: text
    content: Yahweh
  - type: text
    content: ' delights in how you live your life,'
  - type: text
    content: he establishes your every step.
  '24':
  - type: text
    content: If they stumble badly they will still survive,
  - type: text
    content: for the Lord lifts them up with his hands.
  '25':
  - type: text
    content: 'I was once inexperienced, '
  - type: note
    content: Or “immature.” The Hebrew word na’ar has a homonym that means “to be driven out,” which may be a reference to David being driven out of Jerusalem by Absalom.
  - type: text
    content: but now I’m old.
  - type: text
    content: Not once have I found a lover of God forsaken by him,
  - type: text
    content: nor have any of their children gone hungry.
  '26':
  - type: text
    content: Instead, I’ve found the godly ones
  - type: text
    content: to be the generous ones who give freely to others.
  - type: text
    content: Their children are blessed and become a blessing.
  '27':
  - type: text
    content: If you truly want to dwell forever in God’s presence,
  - type: text
    content: forsake evil and do what is right in his eyes.
  '28':
  - type: text
    content: The Lord loves it when he sees us walking in his justice.
  - type: text
    content: He will never desert his devoted lovers;
  - type: text
    content: they will be kept forever in his faithful care,
  - type: text
    content: but the descendants of the wicked will be banished.
  '29':
  - type: text
    content: The faithful lovers of God will inherit the earth
  - type: text
    content: and enjoy every promise of God’s care,
  - type: text
    content: dwelling in peace forever.
  '3':
  - type: text
    content: Keep trusting in the Lord and do what is right in his eyes.
  - type: text
    content: Fix your heart on the promises of God, and you will dwell in the land,
  - type: text
    content: feasting on his faithfulness.
  '30':
  - type: text
    content: God-lovers make the best counselors.
  - type: text
    content: Their words possess wisdom and are right and trustworthy.
  '31':
  - type: text
    content: The ways of God are in their hearts
  - type: text
    content: and they won’t swerve from the paths of steadfast righteousness.
  '32':
  - type: text
    content: Evil ones spy on the godly ones, stalking them
  - type: text
    content: to find something they could use to accuse them.
  - type: text
    content: They’re out for the kill!
  '33':
  - type: text
    content: But God will foil all their plots.
  - type: text
    content: The godly will not stand condemned when brought to trial.
  '34':
  - type: text
    content: 'So don’t be impatient for '
  - type: text
    content: Yahweh
  - type: text
    content: ' to act;'
  - type: text
    content: keep moving forward steadily in his ways,
  - type: text
    content: and he will exalt you to possess the land.
  - type: text
    content: You’ll watch with your own eyes
  - type: text
    content: and see the wicked lose everything.
  '35':
  - type: text
    content: I’ve already seen this happen.
  - type: text
    content: Once I saw a wicked and violent man
  - type: text
    content: overpower all who were around him,
  - type: text
    content: a domineering tyrant with his prideful and oppressive ways.
  '36':
  - type: text
    content: Then he died and was forgotten.
  - type: text
    content: Now no one cares that he is gone forever.
  '37':
  - type: text
    content: But you can tell who are the blameless and spiritually mature.
  - type: text
    content: What a different story with them!
  - type: text
    content: The godly ones will have a peaceful, prosperous future
  - type: text
    content: with a happy ending.
  '38':
  - type: text
    content: Every evil sinner will be destroyed, obliterated.
  - type: text
    content: They’ll be utter failures with no future!
  '39':
  - type: text
    content: But the Lord will be the Savior of all who love him.
  - type: text
    content: Even in their time of trouble, God will live in them as strength.
  '4':
  - type: text
    content: 'Find your delight '
  - type: note
    content: The word delight means “to be soft or tender.”
  - type: text
    content: 'and true pleasure in '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and he will give you what you desire the most.
  '40':
  - type: text
    content: Because of their faith in him, their daily portion will be
  - type: text
    content: a Father’s help and deliverance from evil.
  - type: text
    content: This is true for all who turn to hide themselves in him!
  '5':
  - type: text
    content: 'Give '
  - type: note
    content: The Hebrew word used here can be translated “commit,” which means “to roll over your burdens on the Lord.”
  - type: text
    content: God the right to direct your life,
  - type: text
    content: and as you trust him along the way,
  - type: text
    content: you’ll find he pulled it off perfectly!
  '6':
  - type: text
    content: 'He will appear '
  - type: note
    content: The Hebrew verb found here is also used for giving birth. Perhaps this is a reference to the birth of Christ, our righteousness.
  - type: text
    content: as your righteousness,
  - type: text
    content: as sure as the dawning of a new day.
  - type: text
    content: He will manifest as your justice,
  - type: text
    content: as sure and strong as the noonday sun.
  '7':
  - type: text
    content: Quiet your heart in his presence
  - type: text
    content: 'and wait '
  - type: note
    content: The root word of the word for “wait” can mean “to whirl” or “to be in labor [give birth].” What an unusual concept for waiting on God. We may feel like we’re being whirled around by our circumstances, but in the end, our season of waiting gives birth to greater things.
  - type: text
    content: 'patiently for '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: And don’t think for a moment that the wicked, in their prosperity,
  - type: text
    content: are better off than you.
  '8':
  - type: text
    content: Stay away from anger and revenge.
  - type: text
    content: Keep envy far from you, for it only leads you into lies.
  '9':
  - type: text
    content: For one day the wicked will be destroyed,
  - type: text
    content: but those who trust in the Lord
  - type: text
    content: will inherit the land.
