document_id: JHN.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Living Expression
  - type: text
    content: 'In the beginning '
  - type: note
    content: Most scholars consider the first eighteen verses of John to be the words of an ancient hymn or poem that was cherished by first-century believers in Christ.
  - type: text
    content: 'the Living Expression '
  - type: note
    content: The Greek is logos, which has a rich and varied background in both Greek philosophy and Judaism. The Greeks equated logos with the highest principle of cosmic order. God’s logos in the Old Testament conveys his powerful self-expression in creation, revelation, and redemption. In the New Testament we have this new unique view of God given to us by John, which signifies the presence of God himself in the flesh. Some have translated this rich term as “Word.” Though the Greek term logos may be rendered “word,” it would be wrong to think it indicates primarily a lexical unit in a sentence. Logos is more accurately understood as a form of self-revealing or “message.” Jesus Christ is the eternal Message, the creative Word, and the Living Expression of God made visible. He is the divine self-expression of all that God is, contains, and reveals in incarnated flesh. Just as we express ourselves in words, God has perfectly expressed himself in Christ. Jesus is God’s Story.
  - type: text
    content: was already there.
  - type: text
    content: And the Living Expression was with God, yet fully God.
  - type: note
    content: The Living Expression (Christ) fully possesses every attribute of deity held by God the Father (Col. 1:15–20). The Living Expression existed eternally as a separate individual but essentially the same, as one with the Father.
  '10':
  - type: text
    content: He entered into the world he created,
  - type: text
    content: yet the world was unaware.
  - type: note
    content: Or “the world [of humanity] didn’t perceive it.”
  '11':
  - type: text
    content: 'He came to the people he created '
  - type: note
    content: Or “to his own” (things or people).
  - type: text
    content: —
  - type: text
    content: to those who should have received him,
  - type: text
    content: but they did not recognize him.
  '12':
  - type: text
    content: But those who embraced him and took hold of his name
  - type: note
    content: Or “those who are putting faith into his name.” To “lay hold of his name” means to believe everything he represents and put into practice what he taught in the power of his name.
  - type: text
    content: he gave authority to become
  - type: text
    content: the children of God!
  '13':
  - type: text
    content: He was not born by the joining of human parents
  - type: note
    content: Or “not from streams of blood” (i.e., the blood of a father and mother). Although many translations connect this verse with the children of God (v. 12), the old Latin translation as well as two church fathers, Irenaeus and Tertullian, argue that it is John’s reference to the virgin birth of Christ (also v. 14).
  - type: text
    content: 'or from natural means, '
  - type: note
    content: Or “from the natural realm.”
  - type: text
    content: or by a man’s desire,
  - type: text
    content: but he was born of God.
  - type: note
    content: Or “born out from God.” The Living Expression (message) is now “humanized” (and become the messenger). However, the vast majority of translations and expositors see here not Jesus’ virgin birth, but the new birth of those who became “children of God” in v. 12. Both are clearly presented in the Scriptures.
  '14':
  - type: text
    content: And so the Living Expression
  - type: text
    content: 'became a man '
  - type: note
    content: Or “became visible.”
  - type: text
    content: and lived among us!
  - type: note
    content: 'Or “live within us.” This is the fulfillment of Isa. 7:14. The “God with us” is Jesus Christ our Immanuel. He is among us in that he is in human form, and is still in human form within the Trinity eternally. The Greek and Aramaic can be translated “he pitched his tent among us.” John’s wording takes us back into the book of Exodus where: (1) God came down and lived in the tent (tabernacle) in the wilderness (Ex. 25:8). (2) God revealed his glory in the pillar of fire and cloud (Ex. 40:38). (3) God identified himself as the One and Only (“I am Yahweh your God . . . You may have no gods other than me,” [Ex. 20:2; Deut. 6:4]). (4) God proclaimed his wrap-around love (Ex. 34:6).'
  - type: text
    content: We gazed upon his glory,
  - type: note
    content: The Aramaic is “We gazed upon his preciousness.” John gazed upon Jesus’ unveiled glory on the Mount of Transfiguration (Matt. 17:1–8).
  - type: text
    content: the glory of the One and Only
  - type: note
    content: The Aramaic is “Unique and Beloved Son.” The Greek word, monogenes, means “of a single [mono] kind [genes].” This word is also used for Isaac in Heb. 11:17 as Abraham’s uniquely precious son, but not his only one.
  - type: text
    content: who came from the Father overflowing
  - type: text
    content: 'with tender mercy '
  - type: note
    content: The Aramaic word, taybootha, means “loving kindness or goodness.” The Greek word is charis, which can also be translated, “grace, favor, sweetness, pleasure or delight.” This translation has combined all those concepts in the words tender mercy. Truly, Jesus Christ is full of everything that our hearts crave.
  - type: text
    content: and truth!
  '15':
  - type: text
    content: John announced the truth about him
  - type: text
    content: when he taught the people,
  - type: text
    content: “He’s the One!
  - type: text
    content: He’s the One I’ve been telling you would come after me,
  - type: text
    content: even though he ranks far above me,
  - type: text
    content: because he existed before I was even born.”
  - type: note
    content: This reveals the eternal nature of Jesus Christ, for John was older than Jesus. The Aramaic can be translated “He is preferred before me, for he has priority over me.”
  '16':
  - type: text
    content: And from the overflow of his fullness
  - type: text
    content: 'we received '
  - type: note
    content: Or “out of his fullness we are fulfilled” (Aramaic). That is, every believer receives from the fullness of Christ a divine completeness. We are given from him whatever each requires for the perfection of his character and for the fulfillment of his life’s purpose. See Eph. 1:23; Col. 1:19; 2:9.
  - type: text
    content: grace heaped upon more grace!
  - type: note
    content: Or “one gracious gift after another.”
  '17':
  - type: text
    content: Moses gave us the Law, but Jesus, the Anointed One,
  - type: text
    content: unveils truth wrapped in tender mercy.
  - type: note
    content: Moses was the lawgiver, Jesus is the grace-giver. In the first miracle of Moses, he turned water into blood, resulting in death. In the first miracle of grace, Jesus turned water into wine, resulting in life and celebration.
  '18':
  - type: text
    content: 'No one ever before gazed upon '
  - type: text
    content: the full splendor of
  - type: text
    content: ' God'
  - type: text
    content: except his uniquely beloved Son,
  - type: text
    content: who is cherished by the Father
  - type: note
    content: Or “from the lap of the Father.” This is an idiom for the place of closest intimacy.
  - type: text
    content: and held close to his heart.
  - type: text
    content: Now that he has come to us, he has unfolded
  - type: note
    content: Or “He has led the way into the knowledge of God.” The Greek word, exēgēomai, can mean either “to lead the way” or “to explain.”
  - type: text
    content: the full explanation of who God truly is!
  - type: heading
    content: The Ministry of John the Baptizer
  '19':
  - type: text
    content: 'Now this was John’s testimony when some of the Jewish leaders '
  - type: note
    content: Or simply, “Jews,” a metonymy for “Jewish leaders.” Obviously, not all Jews opposed John’s ministry. Some estimate that John and his disciples baptized as many as one million people. It is possible that John was a part of the Essene community of devout Jews.
  - type: text
    content: 'sent an entourage of priests and temple servants '
  - type: note
    content: Or “Levites.”
  - type: text
    content: from Jerusalem to interrogate him. “Who are you?” they asked him.
  '2':
  - type: text
    content: They were together—
  - type: text
    content: face-to-face
  - type: text
    content: ', '
  - type: note
    content: The Greek word used here and the Hebraic concept conveyed is that of being before God’s face. There is no Hebrew word for “presence” (i.e., the “presence” of God), only the word “face.”
  - type: text
    content: in the very beginning.
  - type: note
    content: Both Gen. 1:1 and John 1:1–2 speak of the beginning. In Genesis Moses spoke of the beginning of time, but John speaks of eternity past, a beginning before time existed. The Living Expression is Christ who existed eternally as part of the Trinity. He has no beginning, being one with the Father.
  '20':
  - type: text
    content: John answered them directly, saying, “I am not the Messiah!”
  '21':
  - type: text
    content: “Then who are you?” they asked. “Are you Elijah?”
  - type: text
    content: “No,” John replied.
  - type: text
    content: So they pressed him further, “Are you the prophet Moses said was coming, the one we’re expecting?”
  - type: note
    content: See Deut. 18:15. In Acts 3:22 Jesus is identified as that “Prophet.”
  - type: text
    content: “No,” he replied.
  '22':
  - type: text
    content: “Then who are you?” they demanded. “We need an answer for those who sent us. Tell us something about yourself—anything!”
  '23':
  - type: text
    content: 'John answered them, “I am an urgent, thunderous voice crying out in the desert—clear the way and prepare your hearts for the coming of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  - type: note
    content: As translated from the Aramaic. See Isa. 40:3. The Aramaic is clear that the preparations are for the Lord Yahweh, signifying the deity of Jesus Christ. The Greek is “Make straight the way for the Lord [kurios].”
  '24':
  - type: text
    content: 'Then some members of the religious sect known as the Pharisees '
  - type: note
    content: Or “separated ones.” They were the religious leaders of the day who considered themselves separated from sin and closer to God than other people.
  - type: text
    content: 'questioned John, '
  '25':
  - type: text
    content: “Why do you baptize the people if you are neither the Messiah, Elijah, nor the Prophet?”
  '26':
  - type: text
    content: 'John answered them, “I baptize the people in this river, but the One who will take my place is to be more honored than I, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'but even when he stands among you, you will not recognize or embrace him! I am not worthy enough to stoop down in front of him and untie his sandals!” '
  '28':
  - type: text
    content: 'All these events took place at Bethany, '
  - type: note
    content: This was a different Bethany than the one near Jerusalem, commonly referred to in the Gospels. Some Greek manuscripts have the location as “Bethabara,” however, the Aramaic is clearly Bethany.
  - type: text
    content: where John was baptizing at the place of the crossing of the Jordan River.
  - type: note
    content: As translated from the Aramaic. This place of crossing is likely where the children of Israel crossed into the promised land when the Jordan River parted and they passed through on dry land. See Josh. 3. This place is a powerful reminder of crossing over into a new day, a new era for Israel. God chose this place for John to baptize.
  - type: heading
    content: The Lamb of God
  '29':
  - type: text
    content: 'The very next day, John saw Jesus coming to him to be baptized, and John cried out, “Look! There he is—God’s Lamb! '
  - type: note
    content: Jesus was publicly washed as the Lamb of God and proven to be without flaw or blemish, ready to become the sacrifice for all the world. Although he will become the Lion of the tribe of Judah in resurrection power, John points to him as the meek Lamb, a willing sacrifice for our sins.
  - type: text
    content: 'He takes away '
  - type: note
    content: Or “lift off” (the burden). The Greek word used here is often used for “lifting up and away” an anchor from off the ocean floor.
  - type: text
    content: 'the sin of the entire world! '
  - type: note
    content: The Aramaic is “the sins of the universe.” To take away our sins is a figure of speech that means “he will break sin’s grip from humanity, taking away both its guilt and power from those who believe.”
  '3':
  - type: text
    content: And through his creative inspiration
  - type: text
    content: this Living Expression made all things,
  - type: note
    content: Or “all things happened because of him and nothing happened apart from him.” The Aramaic is “everything was in his hand” (of power). See Ps. 33:6; Isa. 44:24.
  - type: text
    content: for nothing has existence apart from him!
  '30':
  - type: text
    content: 'I told you that a Mighty One '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'would come who is far greater than I am, because he existed long before I was born! '
  '31':
  - type: text
    content: My baptism was for the preparation of his appearing to Israel, even though I didn’t recognize him.”
  '32':
  - type: text
    content: 'Then, as he baptized Jesus, he proclaimed these words: “I see the Spirit of God appear like a dove descending from the heavenly realm and landing upon him—and it remained on him! '
  - type: note
    content: Jesus, the Lamb, took away our sins, and the Holy Spirit, the Dove, brings to man the life of God. Jesus didn’t come to start a movement but to bring the fullness of life to us. This “Dove” points to the dove that Noah released from the ark. It found no place to rest in a fallen world. The final time Noah released the dove it flew and never returned. It flew throughout history over Abraham and the patriarchs, over the prophets and kings, finding no place to rest, until at last, there was a heavenly man who carried the life of heaven—upon him the dove (Holy Spirit) rested and remained. There was nothing that could offend heaven in the life of our Lord Jesus.
  '33':
  - type: text
    content: 'Before this I didn’t know who he was. But the one who sent me to baptize with water had told me, ‘You will see the Spirit come down and stay on someone. He will be the One I have sent to baptize with the Holy Spirit.’ '
  - type: note
    content: Or “the Spirit of Holiness.”
  '34':
  - type: text
    content: Now I have seen this happen and I can tell you for sure that this man is the Son of God.”
  - type: note
    content: Some Greek manuscripts have “the Chosen One of God.” The Aramaic is clearly “the Son of Elohim.”
  - type: heading
    content: Jesus’ First Followers
  '35':
  - type: text
    content: 'The next day, Jesus walked right past where John and two of his disciples were standing. John, gazing upon Jesus, pointed to him and prophesied, “Look! There’s God’s '
  - type: text
    content: sacrificial
  - type: text
    content: ' '
  - type: note
    content: To the Western gentile in the twenty-first century, the phrase “Lamb of God” evokes a fluffy pet. To John and his disciples, lambs were for sacrifice.
  - type: text
    content: 'Lamb!” '
  '37':
  - type: text
    content: And as soon as John’s two disciples heard this, they immediately left John and began to follow a short distance behind Jesus.
  '38':
  - type: text
    content: 'Jesus turned around and saw they were following him and asked, '
  - type: text
    content: “What do you want?”
  - type: text
    content: ' '
  - type: note
    content: 'This is the first recorded saying of Jesus in the Gospels. It is a question that every follower of Jesus should be asked: “What do you want in following me?” Do we want something only for ourselves? A ministry? Answers to prayer? Or do we simply want to be with him? Their answer, “Where are you staying?” shows that they were seeking only him. The first question God asked Adam and Eve was, “Where are you?” The first words of the God-man were, “What do you want?”'
  - type: text
    content: 'They responded, “Rabbi (which means, Master Teacher '
  - type: note
    content: The parenthetical words are added by the author, John. Rabbi is an honorific term that means more than teacher. The Aramaic word is best translated “Master,” or “Master Teacher.”
  - type: text
    content: ), where are you staying?”
  - type: note
    content: Or “Where do you abide?” This is the same word used in ch. 15:4 where it refers to life-union, to be joined to Jesus as the living vine. Jesus wants everyone to come and discover where he “abides” in life-union with his Father. See Song. 1:7.
  '39':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Come and discover for yourselves.”
  - type: text
    content: ' So they went with him and saw where he was staying, and since it was late in the afternoon, they spent the rest of the day with Jesus.'
  '4':
  - type: text
    content: A fountain of
  - type: text
    content: ' life was in him,'
  - type: note
    content: See Ps. 36:9. The Aramaic reads “In him were lives” (plural)—not only multiple human lives, but also spiritual life, eternal life, and life in every form. John used the word life (zoe) thirty-seven times in his gospel.
  - type: text
    content: for his life is light for all humanity.
  - type: note
    content: 'Jesus Christ brings the light of eternal life and the full revelation of God (Heb. 1:2–3). The Gospel of John is easily divided into three sections: life (chs. 1–7), light (chs. 8–12), and love (chs. 13–21).'
  '40':
  - type: text
    content: 'One of the two disciples who heard John’s words and began to follow Jesus was a man named Andrew. '
  - type: note
    content: Andrew means “brave.”
  - type: text
    content: 'He first found his brother, Simon Peter, and told him, “We have found the Anointed One!” '
  - type: note
    content: Or “Messiah.” The word messiah is taken from the Hebrew verb, “to anoint with oil.” In the Old Testament, both priests (Lev. 21:10) and kings (1 Sam. 15:1) were anointed. In the New Testament, Jesus is the Anointed One (Luke 4:18; Acts 10:38) to deliver, to save, and to reconcile us back to God.
  - type: text
    content: '(Which is translated, the Christ.) '
  '42':
  - type: text
    content: 'Then Andrew brought Simon to meet Jesus. When he gazed upon Andrew’s brother, he prophesied to him, '
  - type: text
    content: “You are Simon and your father’s name is John.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic can also be translated “You are Simon, son of the dove.” Simon means “one who hears.”
  - type: text
    content: But from now on, everyone will call you Cephas”
  - type: text
    content: ' (which means, Peter the Rock).'
  - type: note
    content: The Aramaic word is keefa, which means “rock.” It is anglicized as “Peter.” This parenthetical statement is not found in the Aramaic, but only in Greek manuscripts. It appears that the Greek text is admitting it is a translation from the Aramaic.
  - type: heading
    content: Jesus Calls Philip and Nathanael
  '43':
  - type: text
    content: 'The next day, Jesus decided to go to Galilee, where he found Philip. Jesus said to him, '
  - type: text
    content: “Come and follow me.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: '(Now Philip, Andrew, and Peter had all grown up together in the village of Bethsaida.) '
  - type: note
    content: Bethsaida means “place of fishing,” and was a village on Lake Galilee.
  '45':
  - type: text
    content: 'Philip went to look for '
  - type: text
    content: his friend
  - type: text
    content: ', Nathanael, '
  - type: note
    content: Nathanael means “gift of God.” Most scholars agree that he is the same one as the Bartholomew mentioned as one of Jesus’ apostles. Almost every time Philip’s name is listed as an apostle, it is followed by Bartholomew.
  - type: text
    content: and told him, “We’ve found him! We’ve found the One we’ve been waiting for! It’s Jesus, son of Joseph from Nazareth! He’s the One whom Moses and the prophets prophesied would come!”
  '46':
  - type: text
    content: 'Nathanael '
  - type: text
    content: sneered
  - type: text
    content: ', “Nazareth! What good thing could ever come from Nazareth?” '
  - type: note
    content: Jesus and his disciples were Galileans and spoke the northern dialect of Aramaic. Galileans were considered somewhat backward. Isaiah called that region “the land of the gentile peoples, those surrounded with great darkness.” Yet this was the region where the Messiah’s light would shine forth. See Isa. 9:1–2; Matt. 4:15–16.
  - type: text
    content: Philip answered, “Come and let’s find out!”
  '47':
  - type: text
    content: 'When Jesus saw Nathanael approaching, he said, '
  - type: text
    content: “Here comes a true son of Israel—an honest man with no hidden motive!”
  '48':
  - type: text
    content: Nathanael was stunned
  - type: text
    content: ' and said, “But you’ve never met me—how do you know anything about me?”'
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Nathanael, right before Philip came to you, I saw you sitting under the shade of a fig tree.”
  - type: note
    content: 'Although we can only speculate what Nathanael was doing while sitting under the fig tree, it mattered very personally to him. Perhaps, he was confessing to God his love for him and his desire to be pure and holy. Or perhaps, he was meditating on the Scriptures that speak of the coming Messiah. A fig tree is often a biblical metaphor of God’s purpose and destiny coming to fruitfulness, especially as it relates to establishing God’s kingdom on the earth. See Mic. 4:4; Zech. 3:10. Some scholars speculate that the phrase “I saw you under the fig tree” could be an Aramaic idiom for “I knew you since you were in the cradle.” Some Jewish scholars see the term “under the fig tree” as an ancient Jewish idiom that means studying the messianic prophecies. The idiom stems from Mic. 4:4, in a passage describing the future messianic kingdom: “Each of them will sit under their vine, and under their fig tree.”'
  '49':
  - type: text
    content: Nathanael blurted out, “Teacher, you are truly the Son of God and the King of Israel!”
  '5':
  - type: text
    content: And this Light never fails to shine through darkness—
  - type: text
    content: Light that darkness could not overcome!
  - type: note
    content: The Greek has a double meaning here. (1) Darkness could not diminish this Light, nor could it comprehend it. (2) The darkness can also be a metaphor for the sons of darkness.
  '50':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Do you believe simply because I told you I saw you sitting under a fig tree? You will experience even more impressive things than that!
  - type: text
    content: ' '
  '51':
  - type: text
    content: 'I prophesy to you eternal truth:'
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. John records Jesus using this phrase twenty-five times. The Greek is “Amen, amen I say to you.”
  - type: text
    content: From now on,
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: you all will see
  - type: text
    content: ' '
  - type: note
    content: Or “you [plural] will spiritually see.” This is a promise for every believer today.
  - type: text
    content: an open heaven and gaze upon the Son of Man
  - type: text
    content: ' '
  - type: note
    content: “Son of Man” is a messianic term pointing to Christ, not as the son of a man, but the Son of Man (humanity). He is not Joseph’s son, but the Son of God.
  - type: text
    content: like a stairway reaching into the sky
  - type: text
    content: ' '
  - type: note
    content: The “stairway into the sky” is an obvious reference to “Jacob’s Ladder” as the fulfillment of his dream found in Gen. 28:10–22. Jesus Christ is that stairway that joins earth to heaven and brings heaven to earth. The word for “angels” can also be translated “messengers” and could be humans given access into the heavenly realm through the blood of Jesus. Jesus, as the stairway, was both in heaven and on earth as he spoke this to Nathanael. What mysteries surround him!
  - type: text
    content: with the messengers of God climbing up and down upon
  - type: text
    content: ' '
  - type: note
    content: Or “next to.”
  - type: text
    content: him!”
  '6':
  - type: text
    content: Suddenly
  - type: text
    content: ' a man appeared who was sent from God,'
  - type: text
    content: a messenger named John.
  - type: note
    content: This is John, the Baptizer. See Mal. 3:1.
  '7':
  - type: text
    content: 'For he came as a witness, to point the way to the Light '
  - type: text
    content: of Life
  - type: text
    content: ','
  - type: text
    content: and to help everyone believe.
  '8':
  - type: text
    content: John was not that Light but he came to show who is.
  - type: text
    content: For he was merely a messenger to speak the truth about the Light.
  '9':
  - type: text
    content: 'For the perfect Light of Truth '
  - type: note
    content: Or “the True [Genuine, Perfect] Light.”
  - type: text
    content: was coming into the world
  - type: text
    content: and shine upon everyone.
  - type: note
    content: Or “to enlighten everyone.”
