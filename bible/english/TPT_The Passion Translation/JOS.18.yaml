    marker-yv: yv-n
  - type: text
    text: 'who had not yet received their inheritance: “How much more time will you waste until you go out and possess the land that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of your ancestors, has given you? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-7
  - type: text
    text: 'The tribes of Gad, Reuben, and the half-tribe of Manasseh have already received their allotted land east of the Jordan which Moses, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s servant, assigned them. The tribe of Judah already has its territory in the south, and the descendants of Joseph have their territory in the north. So '
  - type: usfm
    marker: it
    children:
    - type: text
      text: let each of the seven remaining tribes
  - type: text
    text: ' select three men and send them to me. I will send them out to survey and make a map of the entire land. Divide the territory into seven districts and bring the description of each district to me. Then I will draw lots before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' our God to determine which section he has chosen for each tribe to receive. But the Levites will not have an allotted portion among you, for their inheritance is to serve as '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s priests.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: usfm
    marker: it
    children:
    - type: text
      text: The tribes each selected three men
  - type: text
    text: ', and as they set out on their journey, Joshua told them, “Go through all the land and write down its description. When you bring the description back here to me, I will ask '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' in Shiloh to divide the land among your tribes.” So the men went through all the land and divided it into seven sections. They wrote a description of each section and also made a list of the towns within each section and returned to Joshua at Shiloh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Joshua cast lots in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s presence at Shiloh and assigned a section of the land to each of the remaining tribes of Israel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Tribal Land of Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The first lot came out for the families of Benjamin. So the first tribe that received territory was the tribe of Benjamin. Joshua assigned them land which lay between the tribe of Judah '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on the south
  - type: text
    text: ' and the descendants of Joseph '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on the north
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Their northern border began in the east at the Jordan River and went up the slope north of Jericho and westward through the hill country as far as the desert '
  - type: usfm
    marker: it
    children:
    - type: text
      text: near the city
  - type: text
    text: ' of Beth Aven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The border then went to the slope on the south side of Luz (that is, Bethel) then down to Ataroth Addar on the mountain south of Lower Beth Horon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The border then turned south from the western side of this mountain and went to the city of Kiriath Baal, which is also called Kiriath Jearim, a town of Judah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'From the outskirts of Kiriath Jearim, the boundary extended to Mount Ephron '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text is uncertain. The Masoretic text reads “westward,” which is not correct. The Septuagint is transliterated as “toward Gasin.” Some translations omit “westward” or “Mount Ephron” entirely. Other scholars suggest “toward Iyyim” or “toward the ruins of Mount Ephron” as the intended meaning of the text.
    marker-yv: yv-n
  - type: text
    text: 'and went from there to the fountain of the Waters of Nephtoah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'It continued down to the foot of the mountain on the north side of the Valley of Rephaites, where the Hinnom Valley begins. From there it went south through the Hinnom Valley to the south slope of Jerusalem '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “the slope of the Jebusites.”
    marker-yv: yv-n
  - type: text
    text: 'and then downward to En Rogel. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: En Rogel is identified with the modern ’Ain Ummel-Daraj, a name which means “the fountain of the virgin.” David’s spies hid at En Rogel during Absalom’s uprising. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 17:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'From there the boundary turned sharply northward to En Shemesh and on to Geliloth, facing the ascent of Adummim, and descended to the Boulder of Bohan, son '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or possibly “grandson.” Bohan apparently distinguished himself by fighting the Canaanites at this large rock.
    marker-yv: yv-n
  - type: text
    text: 'of Reuben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then it passed north of the ridge '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or possibly a place named “Cheteph.”
    marker-yv: yv-n
  - type: text
    text: 'overlooking the Jordan Valley. From there it descended into the valley, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'passing north of the ridge of Beth Hoglah. The southern border ended where the Jordan River empties into the Dead Sea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The eastern border was the Jordan River. The families of the tribe of Benjamin received as their possession the land within these borders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 21-24
  - type: text
    text: 'There were twelve cities, along with the towns around them, which belonged to the tribe of Benjamin:'
- type: usfm
  marker: p
  children:
  - type: text
    text: Jericho, Beth Hoglah, Emek Keziz,
- type: usfm
  marker: p
  children:
  - type: text
    text: Beth Arabah, Zemaraim, Bethel,
- type: usfm
  marker: p
  children:
  - type: text
    text: Avvim, Parah, Ophrah,
- type: usfm
  marker: p
  children:
  - type: text
    text: Chephar Ammoni, Ophni, and Geba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-28
  - type: text
    text: There were another fourteen cities, along with the towns around them, which also belonged to the tribe of Benjamin. These cities were
- type: usfm
  marker: p
  children:
  - type: text
    text: Gibeon, Ramah, Beeroth,
- type: usfm
  marker: p
  children:
  - type: text
    text: Mizpah, Chephirah, Mozah,
- type: usfm
  marker: p
  children:
  - type: text
    text: Rekem, Irpeel, Taralah,
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Zela, Haeleph, Jebus (or Jerusalem), '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:25–28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is interesting that Jerusalem was not given to the tribe of Judah but to the tribe of Benjamin.
    marker-yv: yv-n
  - type: text
    text: Gibeah, and Kiriath. Joshua assigned this land and all these cities to the tribes of Benjamin.
