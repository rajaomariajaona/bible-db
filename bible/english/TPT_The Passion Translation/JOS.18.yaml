    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “whole,” “sound,” “quiet,” “secure,” “health,” or “abundance.” It was the place where Hannah prayed to have a son and then dedicated her miracle son, Samuel, to God (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Sam. 1:3–24
    - type: usfm
      marker: ft
