      - type: text
        text: After seven years of conquest, the Israelites moved the tabernacle that Moses had constructed in the wilderness from Gilgal to Shiloh, where it remained for 369 years. Shiloh became the center of worship throughout the time of the judges (also the time of the book of Ruth).
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
