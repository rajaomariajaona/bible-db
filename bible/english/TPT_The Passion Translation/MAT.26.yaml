      text: '39'
  - type: text
    text: 'Then he walked a short distance away, and overcome with grief, he threw himself facedown on the ground and prayed, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father, if there is any way you can deliver me from this suffering,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:39
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If possible, take away this cup of suffering.” The cup becomes a metaphor of the great suffering that Jesus had to drink that night in the garden. However, Jesus was not asking the Father for a way around the cross. Rather, he was asking God to keep him alive through this night of suffering so that he could carry the cross and take away our sins. According to the prophecies of the Old Testament, Jesus was to be pierced on a cross. We learn from
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 5:7
      metadata:
        usfm: HEB.5.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that Jesus’ prayer was answered that night as the cup was indeed taken from him. An angel of God came to strengthen him and deliver him from premature death. The “cup” he was asking God to let pass from him was the cup of premature death that Satan was trying to make him drink in the garden, not the death he would experience the next day on the cross. He had already sweat drops of blood, but the prophecies had to be fulfilled of being pierced on a cross for our transgressions. God answered his cry and he lived through the agony of Gethsemane so that he could be our sacrifice for sin on Calvary. Jesus did not waver in the garden. We have a brave Savior.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: please take it from me. Yet what I want is not important, for I only desire to fulfill your plan for me.”
  - type: text
