segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Prophesies His Crucifixion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After Jesus had completed his teachings, he said to his disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You know that the Feast of the Passover begins in two more days. That’s when the Son of Man will be betrayed and handed over to be crucified.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Meanwhile, the prominent priests and religious leaders of the nation were gathered in the palace of Caiaphas '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Caiaphas was a Sadducee with political connections to Pilate’s government. He was the son-in-law of Annas, who had been deposed from his office by the Roman procurator Valerious, but he was still viewed by the people as the high priest. In effect, Israel had two high priests at the same time, Annas and Caiaphas, thus violating Jewish law.
    marker-yv: yv-n
  - type: text
    text: 'the high priest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'That’s when they made their decision to secretly '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “deceitfully” (Aramaic “with false testimony”).
    marker-yv: yv-n
  - type: text
    text: 'have Jesus captured and killed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But they all agreed, “We can’t do this during the Passover celebrations or we could have a riot on our hands.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Woman Anoints Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'Then Jesus went to Bethany, to the home of Simon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the house of Simon the leper.” It is implied that he had been healed by Jesus, for a leper. Some scholars equate him with Simon the Pharisee due to similarities with Luke’s account in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 7:36–49
      metadata:
        usfm: LUK.7.36+LUK.7.37+LUK.7.38+LUK.7.39+LUK.7.40+LUK.7.41+LUK.7.42+LUK.7.43+LUK.7.44+LUK.7.45+LUK.7.46+LUK.7.47+LUK.7.48+LUK.7.49
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'a man Jesus had healed of leprosy. A woman came into the house, holding an alabaster flask '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jars such as this usually had a long neck that would be broken off and the oil poured out. The woman is identified as Mary, the sister of Lazarus and Martha. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 1:12
      metadata:
        usfm: SNG.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 14:3
      metadata:
        usfm: MRK.14.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 7:37
      metadata:
        usfm: LUK.7.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 12:1–5
      metadata:
        usfm: JHN.12.1+JHN.12.2+JHN.12.3+JHN.12.4+JHN.12.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'filled with expensive, fragrant oil. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:6–7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was spikenard (or nard), a spice taken from a plant that grows in northern India near the Himalayas. This costly perfume would have been carried over land to the Middle East. Many believe this jar of spikenard would have cost the average worker a year’s wages. It was a common practice among the Jews to prepare a body for burial with fragrant ointment.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: She came right to Jesus, and in a lavish gesture of devotion
  - type: text
    text: ', she poured out the costly oil, and it cascaded over his head as he was at the table. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When the disciples saw this, they were offended. “What a total waste!” they grumbled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “We could have sold it for a great deal of money and given it to the poor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jesus knew their thoughts and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you critical of this woman? She has done a beautiful act of kindness.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You will always have someone poor whom you can help, but you will not always have me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When she poured the fragrant oil over me, she was preparing my body for burial.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is entirely possible that when the Roman soldiers pierced Jesus’ beautiful feet and put the crown of thorns on his lovely head, they could have smelled this fragrant oil.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I promise you that when this wonderful gospel spreads all over the world, the story of her lavish devotion to me will also be mentioned in memory of her.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus’ prophecy is that this woman’s act of devotion, mentioned in three of the four gospels, would be preached as part of the gospel message of new life.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Agrees to Betray Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'One of the twelve apostles, Judas the locksmith, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Judah Iscariot.” Iscariot is not his last name or the name of a town. It means “locksmith.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Iscariot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comes from an Aramaic word for “brass lock.” The one who held the key to the finances of the twelve disciples brazenly wanted to lock up Jesus.
    marker-yv: yv-n
  - type: text
    text: 'went to the leading priests '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and said, “How much are you willing to pay me to betray Jesus into your hands?” They agreed to pay him thirty silver coins. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 11:12–13
      metadata:
        usfm: ZEC.11.12+ZEC.11.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Assuming the thirty pieces of silver were tetradrachms, it would represent about four months’ wages of a skilled worker. If the coins were the Roman denarius, it would be about five weeks’ wages. If they were Jewish shekels, it would have been a very modest sum. How could anyone put a monetary value on the life of the glorious Son of God?
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Immediately Judas began to scheme and look for an opportunity to betray him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Celebrates Passover with His Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On the first day of Passover, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the first day of Unleavened Bread.” The Aramaic reads “on the day before the Passover festival.” This was the first day of an eight-day celebration to commemorate the deliverance of the Hebrew slaves out of Egypt. The Jews would eat a roasted lamb after sunset in a family group of at least ten people. The meal would include bitter herbs (in remembrance of their bitter years of slavery), unleavened bread, and four cups of wine mixed with water. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 9:2–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'the day when all bread made with yeast was removed from every Jewish home, the disciples came to Jesus and asked, “Where should we prepare the Passover meal '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, “the Passover seder.”
    marker-yv: yv-n
  - type: text
    text: for you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My heart longs with great desire to eat this Passover meal with you.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew and other external evidence. The Greek text does not include this sentence; however, it seems to be essentially the same as found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 22:15
      metadata:
        usfm: LUK.22.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which may support the theory that part of Luke’s eyewitness accounts may have included Matthew.'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Go into Jerusalem and you will encounter a man.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek is actually “Mr. So-and-So.” This was someone who would know who the teacher was and understand what it meant when Jesus said, “My time is near.” The Hebrew Matthew adds this line: “He will volunteer for the task.”'
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Tell him that the teacher says, ‘My appointed time
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An obvious ellipsis that could mean “My time of fulfilling my destiny” is near.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: is near. I am coming to your home to eat the Passover meal with my disciples.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The disciples did as Jesus had instructed them, and they prepared the Passover meal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When evening came he took his place at the table and dined with the Twelve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'While they were eating, Jesus spoke up and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “One of you is about to betray me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Feeling deeply hurt by these words, one after another asked him, “You don’t mean me, do you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is one who has shared meals with me as an intimate friend.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he who has dipped his hand with me in the dish.” This is a figure of speech of one who was an intimate friend of Jesus. To break bread together was a sign of friendship throughout the Middle East.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: All that was prophesied of me will take place, but how terrible it will be for the one who betrays the Son of Man. It would be far better for him if he had never been born!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Then finally, Judas the traitor spoke up and asked him, “Teacher, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Notice that the other eleven disciples called Jesus “Lord.” Judas called him “teacher.”
    marker-yv: yv-n
  - type: text
    text: perhaps it is I?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You said it.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Lord’s Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'As they ate, Jesus took the bread and blessed it and broke it and gave it to his disciples. He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is my body. Eat it.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then taking the cup of wine, he gave thanks to the Father, he entered into covenant with them, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: text
    text: 'saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is my blood. Each of you must drink it in fulfillment of the covenant.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For this is the blood that seals the new covenant.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: khawdata
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “new,” but is better rendered “renewed” covenant or “repaired” covenant. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 17:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 31:31–37
      metadata:
        usfm: JER.31.31+JER.31.32+JER.31.33+JER.31.34+JER.31.35+JER.31.36+JER.31.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . After each disciple took the cup and drank from it, they passed it to the next one. This was a love covenant between Jesus and each of his disciples, and it sealed the affection they had for one another.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: It will be poured out for many for the complete forgiveness of sins.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
