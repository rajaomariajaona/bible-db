document_id: MAT.26,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Prophesies His Crucifixion
  - type: text
    content: 'After Jesus had completed his teachings, he said to his disciples, '
  '10':
  - type: text
    content: 'Jesus knew their thoughts and said to them, '
  - type: text
    content: “Why are you critical of this woman? She has done a beautiful act of kindness.
  - type: text
    content: ' '
  '11':
  - type: text
    content: You will always have someone poor whom you can help, but you will not always have me.
  - type: text
    content: ' '
  '12':
  - type: text
    content: When she poured the fragrant oil over me, she was preparing my body for burial.
  - type: text
    content: ' '
  - type: note
    content: It is entirely possible that when the Roman soldiers pierced Jesus’ beautiful feet and put the crown of thorns on his lovely head, they could have smelled this fragrant oil.
  '13':
  - type: text
    content: I promise you that when this wonderful gospel spreads all over the world, the story of her lavish devotion to me will also be mentioned in memory of her.”
  - type: note
    content: Jesus’ prophecy is that this woman’s act of devotion, mentioned in three of the four gospels, would be preached as part of the gospel message of new life.
  - type: heading
    content: Judas Agrees to Betray Jesus
  '14':
  - type: text
    content: 'One of the twelve apostles, Judas the locksmith, '
  - type: note
    content: Or “Judah Iscariot.” Iscariot is not his last name or the name of a town. It means “locksmith.” Iscariot comes from an Aramaic word for “brass lock.” The one who held the key to the finances of the twelve disciples brazenly wanted to lock up Jesus.
  - type: text
    content: 'went to the leading priests '
  '15':
  - type: text
    content: 'and said, “How much are you willing to pay me to betray Jesus into your hands?” They agreed to pay him thirty silver coins. '
  - type: note
    content: See Zech. 11:12–13. Assuming the thirty pieces of silver were tetradrachms, it would represent about four months’ wages of a skilled worker. If the coins were the Roman denarius, it would be about five weeks’ wages. If they were Jewish shekels, it would have been a very modest sum. How could anyone put a monetary value on the life of the glorious Son of God?
  '16':
  - type: text
    content: Immediately Judas began to scheme and look for an opportunity to betray him.
  - type: heading
    content: Jesus Celebrates Passover with His Disciples
  '17':
  - type: text
    content: 'On the first day of Passover, '
  - type: note
    content: Or “the first day of Unleavened Bread.” The Aramaic reads “on the day before the Passover festival.” This was the first day of an eight-day celebration to commemorate the deliverance of the Hebrew slaves out of Egypt. The Jews would eat a roasted lamb after sunset in a family group of at least ten people. The meal would include bitter herbs (in remembrance of their bitter years of slavery), unleavened bread, and four cups of wine mixed with water. See Num. 9:2–5.
  - type: text
    content: 'the day when all bread made with yeast was removed from every Jewish home, the disciples came to Jesus and asked, “Where should we prepare the Passover meal '
  - type: note
    content: That is, “the Passover seder.”
  - type: text
    content: for you?”
  '18':
  - type: text
    content: 'He answered them, '
  - type: text
    content: “My heart longs with great desire to eat this Passover meal with you.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew and other external evidence. The Greek text does not include this sentence; however, it seems to be essentially the same as found in Luke 22:15, which may support the theory that part of Luke’s eyewitness accounts may have included Matthew.
  - type: text
    content: Go into Jerusalem and you will encounter a man.
  - type: text
    content: ' '
  - type: note
    content: 'The Greek is actually “Mr. So-and-So.” This was someone who would know who the teacher was and understand what it meant when Jesus said, “My time is near.” The Hebrew Matthew adds this line: “He will volunteer for the task.”'
  - type: text
    content: Tell him that the teacher says, ‘My appointed time
  - type: text
    content: ' '
  - type: note
    content: An obvious ellipsis that could mean “My time of fulfilling my destiny” is near.
  - type: text
    content: is near. I am coming to your home to eat the Passover meal with my disciples.’ ”
  '19':
  - type: text
    content: 'The disciples did as Jesus had instructed them, and they prepared the Passover meal. '
  '2':
  - type: text
    content: “You know that the Feast of the Passover begins in two more days. That’s when the Son of Man will be betrayed and handed over to be crucified.”
  '20':
  - type: text
    content: 'When evening came he took his place at the table and dined with the Twelve. '
  '21':
  - type: text
    content: 'While they were eating, Jesus spoke up and said, '
  - type: text
    content: “One of you is about to betray me.”
  '22':
  - type: text
    content: Feeling deeply hurt by these words, one after another asked him, “You don’t mean me, do you?”
  '23':
  - type: text
    content: 'He answered, '
  - type: text
    content: “It is one who has shared meals with me as an intimate friend.
  - type: text
    content: ' '
  - type: note
    content: Or “he who has dipped his hand with me in the dish.” This is a figure of speech of one who was an intimate friend of Jesus. To break bread together was a sign of friendship throughout the Middle East.
  '24':
  - type: text
    content: All that was prophesied of me will take place, but how terrible it will be for the one who betrays the Son of Man. It would be far better for him if he had never been born!”
  '25':
  - type: text
    content: 'Then finally, Judas the traitor spoke up and asked him, “Teacher, '
  - type: note
    content: Notice that the other eleven disciples called Jesus “Lord.” Judas called him “teacher.”
  - type: text
    content: perhaps it is I?”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “You said it.”
  - type: heading
    content: The Lord’s Supper
  '26':
  - type: text
    content: 'As they ate, Jesus took the bread and blessed it and broke it and gave it to his disciples. He said to them, '
  - type: text
    content: “This is my body. Eat it.”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then taking the cup of wine, he gave thanks to the Father, he entered into covenant with them, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'saying, '
  - type: text
    content: “This is my blood. Each of you must drink it in fulfillment of the covenant.
  - type: text
    content: ' '
  '28':
  - type: text
    content: For this is the blood that seals the new covenant.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic word khawdata can be translated “new,” but is better rendered “renewed” covenant or “repaired” covenant. See Lev. 17:11; Jer. 31:31–37. After each disciple took the cup and drank from it, they passed it to the next one. This was a love covenant between Jesus and each of his disciples, and it sealed the affection they had for one another.
  - type: text
    content: It will be poured out for many for the complete forgiveness of sins.
  - type: text
    content: ' '
  '29':
  - type: text
    content: The next time we drink this, I will be with you and we will drink it together with a new understanding in the kingdom realm of my Father.”
  - type: note
    content: We are now in the realm of the kingdom of God. The Holy Spirit brings us into the body of Christ and into the reality of the kingdom of God. It is growing and increasing in scope, and every time believers drink of the cup of communion, Jesus is present with us. It is the Lord’s table, not ours. This was a prophecy of what would happen in just a matter of days from then, as believers would break bread together in remembrance of what Jesus did for them. See Acts 2:42. Jesus now drinks it with us in a new way, and not just once a year at Passover, but every time we worship him by taking communion.
  '3':
  - type: text
    content: 'Meanwhile, the prominent priests and religious leaders of the nation were gathered in the palace of Caiaphas '
  - type: note
    content: Caiaphas was a Sadducee with political connections to Pilate’s government. He was the son-in-law of Annas, who had been deposed from his office by the Roman procurator Valerious, but he was still viewed by the people as the high priest. In effect, Israel had two high priests at the same time, Annas and Caiaphas, thus violating Jewish law.
  - type: text
    content: 'the high priest. '
  '30':
  - type: text
    content: 'Then they sang a psalm '
  - type: note
    content: Or “a hymn.” The Aramaic is “They offered praise.” It was the custom after celebrating the Passover seder to conclude with singing one of the Hallel psalms (Pss. 115–118).
  - type: text
    content: and left for the Mount of Olives.
  - type: heading
    content: Jesus Prophesies Peter’s Denial
  '31':
  - type: text
    content: 'Along the way Jesus said to them, '
  - type: text
    content: '“Before the night is over, you will all desert me. This will fulfill the prophecy of the Scripture that says:'
  - type: text
    content: I will strike down the shepherd
  - type: text
    content: and all the sheep will scatter far and wide!
  - type: note
    content: See Zech. 13:7.
  '32':
  - type: text
    content: “But after I am risen, I will go ahead of you to Galilee and will meet you there.”
  '33':
  - type: text
    content: Then Peter spoke up and said, “Even if all the rest lose courage and fall away, I will still be beside you, Jesus!”
  '34':
  - type: text
    content: “Are you sure, Peter?”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “In fact, before the rooster crows a few hours from now, you will have denied me three times.”
  '35':
  - type: text
    content: Peter replied, “I absolutely will never deny you, even if I have to die with you!” And all the others said the same thing.
  - type: heading
    content: Jesus Prays in Gethsemane
  '36':
  - type: text
    content: 'Then Jesus led his disciples to an orchard called “The Oil Press.” '
  - type: note
    content: Or “Gethsemane,” which means “oil press.” This was located on the lower slope of the Mount of Olives near the brook Kidron. King David left Jerusalem weeping as he crossed the Kidron Valley and went up the Mount of Olives (2 Sam. 15:23). Now the Son of David comes into that valley with great sorrow on his way into Jerusalem to be crucified. Kidron comes from the Hebrew verb qadar, which means “to grow dark” or “to mourn.”
  - type: text
    content: 'He told them, '
  - type: text
    content: “Sit here while I go and pray nearby.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'He took Peter, Jacob, and John with him. '
  - type: note
    content: Or “Peter and the two sons of Zebedee.”
  - type: text
    content: 'However, an intense feeling of great sorrow plunged his soul into agony. '
  '38':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “My heart is overwhelmed and crushed with grief. It feels as though I’m dying. Stay here and keep watch with me.”
  '39':
  - type: text
    content: 'Then he walked a short distance away, and overcome with grief, he threw himself facedown on the ground and prayed, '
  - type: text
    content: “My Father, if there is any way you can deliver me from this suffering,
  - type: text
    content: ' '
  - type: note
    content: Or “If possible, take away this cup of suffering.” The cup becomes a metaphor of the great suffering that Jesus had to drink that night in the garden. However, Jesus was not asking the Father for a way around the cross. Rather, he was asking God to keep him alive through this night of suffering so that he could carry the cross and take away our sins. According to the prophecies of the Old Testament, Jesus was to be pierced on a cross. We learn from Heb. 5:7 that Jesus’ prayer was answered that night as the cup was indeed taken from him. An angel of God came to strengthen him and deliver him from premature death. The “cup” he was asking God to let pass from him was the cup of premature death that Satan was trying to make him drink in the garden, not the death he would experience the next day on the cross. He had already sweat drops of blood, but the prophecies had to be fulfilled of being pierced on a cross for our transgressions. God answered his cry and he lived through the agony of Gethsemane so that he could be our sacrifice for sin on Calvary. Jesus did not waver in the garden. We have a brave Savior.
  - type: text
    content: please take it from me. Yet what I want is not important, for I only desire to fulfill your plan for me.”
  - type: text
    content: ' Then an angel from heaven appeared to strengthen him.'
  - type: note
    content: As translated from the Hebrew Matthew. See Luke 22:43, which may be evidence of Luke having access to the Hebrew Matthew account.
  '4':
  - type: text
    content: 'That’s when they made their decision to secretly '
  - type: note
    content: Or “deceitfully” (Aramaic “with false testimony”).
  - type: text
    content: 'have Jesus captured and killed. '
  '40':
  - type: text
    content: 'Later, he came back to his three disciples and found them all sound asleep. He awakened Peter and said to him, '
  - type: text
    content: “Could you not stay awake with me for even one hour?
  - type: text
    content: ' '
  '41':
  - type: text
    content: Keep alert and pray that you’ll be spared from this time of testing. Your spirit is eager enough, but your humanity is weak.”
  - type: note
    content: The Aramaic is “the flesh is failing.”
  '42':
  - type: text
    content: 'Then he left them for a second time to pray in solitude. '
  - type: text
    content: He said to God
  - type: text
    content: ', '
  - type: text
    content: “My Father, if there is not a way that you can deliver me from this suffering,
  - type: text
    content: ' '
  - type: note
    content: See the first footnote for v. 39 and Heb. 5:7.
  - type: text
    content: then your will must be done.”
  '43':
  - type: text
    content: 'He came back to the disciples and found them sound asleep, for they couldn’t keep their eyes open. '
  '44':
  - type: text
    content: So he left them and went away to pray the same prayer for the third time.
  '45':
  - type: text
    content: 'When he returned again to his disciples, he awoke them, saying, '
  - type: text
    content: “Are you still sleeping? Don’t you know the hour has come for the Son of Man to be handed over to the authority of sinful men?
  - type: text
    content: ' '
  '46':
  - type: text
    content: Get up and let’s go, for the betrayer has arrived.”
  - type: heading
    content: The Betrayal and Arrest of Jesus
  '47':
  - type: text
    content: 'At that moment Judas, his once-trusted disciple, appeared, along with a large crowd of men armed with swords and clubs. They had been sent to arrest Jesus by order of the ruling priests and Jewish religious leaders. '
  '48':
  - type: text
    content: Now, Judas, the traitor, had arranged to give them a signal that would identify Jesus, for he had told them, “Jesus is the one whom I will kiss. So seize him!”
  '49':
  - type: text
    content: 'Judas quickly stepped up to Jesus and said, “Shalom, Rabbi,” and he kissed him '
  - type: text
    content: on both cheeks
  - type: text
    content: .
  - type: note
    content: This would have been the customary kiss among the Jews of that day.
  '5':
  - type: text
    content: But they all agreed, “We can’t do this during the Passover celebrations or we could have a riot on our hands.”
  - type: heading
    content: A Woman Anoints Jesus
  '50':
  - type: text
    content: “My beloved friend,”
  - type: text
    content: ' '
  - type: note
    content: As translated from the Hebrew Matthew.
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “is this why you’ve come?”
  - type: note
    content: As translated from the Aramaic. The Greek is “Do what you’ve come to do.”
  - type: text
    content: 'Then the armed men seized Jesus to arrest him. '
  '51':
  - type: text
    content: 'But one of the disciples '
  - type: note
    content: From John 18:10 we learn that the disciple was Peter. Matthew, although knowing it was his friend Peter, kept him from any embarrassment by not naming him in his Gospel narrative.
  - type: text
    content: 'pulled out a dagger and swung it at the servant of the high priest, slashing off his ear. '
  '52':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Put your dagger away. For all those who embrace violence will die by violence.
  - type: text
    content: ' '
  - type: note
    content: The Aramaic reads, “Those who have taken up swords against me will all die by the sword.” The Aramaic is a prophecy that those armed men who came against Jesus in the garden that night would die by the sword.
  '53':
  - type: text
    content: Don’t you realize that I could ask my heavenly Father for angels to come at any time to deliver me? And instantly he would answer me by sending more than twelve legions of angels
  - type: text
    content: ' '
  - type: note
    content: A legion was a detachment of six thousand Roman soldiers. Jesus could have called down seventy-two thousand angels to come to his aid. The number twelve was a reminder to the twelve disciples that God had more than enough protection for them all.
  - type: text
    content: to come and protect us.
  - type: text
    content: ' '
  '54':
  - type: text
    content: But that would thwart the prophetic plan of God. For it has been written that it would happen this way.”
  '55':
  - type: text
    content: 'Then Jesus turned to the mob and said, '
  - type: text
    content: “Why would you arrest me with swords and clubs as though I were an outlaw? Day after day I sat in the temple courts with you, teaching the people, yet you didn’t arrest me.
  - type: text
    content: ' '
  '56':
  - type: text
    content: But all of this fulfills the prophecies of the Scriptures.”
  - type: text
    content: At that point all of his disciples ran away and abandoned him.
  - type: heading
    content: Jesus Is Condemned by the Religious Leaders
  '57':
  - type: text
    content: 'Those who arrested Jesus led him '
  - type: note
    content: 'The Greek word for “led” (apago) is the word used for a shepherd who ties a rope around the neck of a lamb and leads it. This was the fulfillment of Isa. 53:7: “He was led like a gentle lamb to be slaughtered.”'
  - type: text
    content: 'away to Caiaphas, the chief priest, and to a meeting where the religious scholars and the supreme Jewish council were already assembled. '
  - type: note
    content: Or “elders.” The supreme Jewish council (Sanhedrin) is made explicit in v. 59.
  '58':
  - type: text
    content: 'Now, Peter had followed the mob from a distance all the way to the chief priest’s courtyard. And after entering, he sat with the servants '
  - type: note
    content: The Aramaic is “temple ushers.”
  - type: text
    content: 'of the chief priest who had gathered there, waiting to see how things would unfold. '
  '59':
  - type: text
    content: 'The chief priests and the entire supreme Jewish council of leaders '
  - type: note
    content: Or “Sanhedrin” (or Great Sanhedrin), which was a council of seventy men who were appointed to serve as the leadership of the Jewish community and the affairs of the temple.
  - type: text
    content: were doing their best to bring false charges against Jesus, because they were looking for a reason to put him to death.
  '6':
  - type: text
    content: 'Then Jesus went to Bethany, to the home of Simon, '
  - type: note
    content: Or “the house of Simon the leper.” It is implied that he had been healed by Jesus, for a leper. Some scholars equate him with Simon the Pharisee due to similarities with Luke’s account in Luke 7:36–49.
  - type: text
    content: 'a man Jesus had healed of leprosy. A woman came into the house, holding an alabaster flask '
  - type: note
    content: Jars such as this usually had a long neck that would be broken off and the oil poured out. The woman is identified as Mary, the sister of Lazarus and Martha. See Song. 1:12; Mark 14:3; Luke 7:37; John 12:1–5.
  - type: text
    content: 'filled with expensive, fragrant oil. '
  - type: note
    content: This was spikenard (or nard), a spice taken from a plant that grows in northern India near the Himalayas. This costly perfume would have been carried over land to the Middle East. Many believe this jar of spikenard would have cost the average worker a year’s wages. It was a common practice among the Jews to prepare a body for burial with fragrant ointment.
  - type: text
    content: She came right to Jesus, and in a lavish gesture of devotion
  - type: text
    content: ', she poured out the costly oil, and it cascaded over his head as he was at the table. '
  '60':
  - type: text
    content: 'Many false witnesses came forward, but the evidence could not be corroborated. Finally two men came forward '
  '61':
  - type: text
    content: and declared, “This man said, ‘I can destroy God’s temple and build it again in three days!’ ”
  '62':
  - type: text
    content: 'Then the chief priest stood up and said to Jesus, “Have you nothing to say about these allegations? Is what they’re saying about you true?” '
  '63':
  - type: text
    content: But Jesus remained silent before them. So the chief priest said to him, “I charge you under oath—in the name of the living God, tell us once and for all if you are the anointed Messiah, the Son of God!”
  '64':
  - type: text
    content: 'Jesus answered him, '
  - type: text
    content: “You just said it yourself. And more than that, you are about to see the Son of Man seated at the right hand of God, the Almighty.
  - type: text
    content: ' '
  - type: note
    content: See Ps. 110:2; Dan. 7:13.
  - type: text
    content: And one day you will also see the Son of Man coming in the heavenly clouds!”
  '65':
  - type: text
    content: 'This infuriated the chief priest, and as an act of outrage, he tore his robe and shouted, “What blasphemy! No more witnesses are needed, for you heard this grievous blasphemy.” '
  '66':
  - type: text
    content: Turning to the council he said, “Now, what is your verdict?”
  - type: text
    content: '“He’s guilty and deserves the death penalty!” they answered. '
  '67':
  - type: text
    content: 'Then they spat on his face and slapped him. Others struck him over and over with their fists. '
  '68':
  - type: text
    content: Then they taunted him by saying, “Oh, Anointed One, prophesy to us! Tell us which one of us is about to hit you next?”
  - type: heading
    content: Peter’s Denials
  '69':
  - type: text
    content: Meanwhile, Peter was still sitting outside in the courtyard when a servant girl came up to him and said, “I recognize you. You were with Jesus the Galilean.”
  '70':
  - type: text
    content: In front of everyone Peter denied it and said, “I don’t have a clue what you’re talking about.”
  '71':
  - type: text
    content: Later, as he stood near the gateway of the courtyard, another servant girl noticed him and said, “I know this man is a follower of Jesus the Nazarene!”
  '72':
  - type: text
    content: Once again, Peter denied it, and with an oath he said, “I tell you, I don’t know the man!”
  '73':
  - type: text
    content: A short time later, those standing nearby approached Peter and said, “We know you’re one of his disciples—we can tell by your speech. Your Galilean accent gives you away!”
  - type: note
    content: Peter, being from Capernaum in Galilee, spoke the northern dialect of Aramaic, while the people of Jerusalem spoke the southern dialect (Chaldean).
  '74':
  - type: text
    content: 'Peter denied it, and using profanity he said, “I don’t know the man!” At that very moment the sound of a crowing rooster pierced the night. '
  '75':
  - type: text
    content: Then Peter remembered the prophecy of Jesus, “Before the rooster crows you will have denied me three times.” With a shattered heart, Peter left the courtyard, sobbing with bitter tears.
  '8':
  - type: text
    content: 'When the disciples saw this, they were offended. “What a total waste!” they grumbled. '
  '9':
  - type: text
    content: “We could have sold it for a great deal of money and given it to the poor.”
