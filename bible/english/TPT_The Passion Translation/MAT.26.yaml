    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:57
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “elders.” The supreme Jewish council (Sanhedrin) is made explicit in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '59'
      metadata:
        usfm: MAT.26.59
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Now, Peter had followed the mob from a distance all the way to the chief priest’s courtyard. And after entering, he sat with the servants '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:58
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “temple ushers.”
    marker-yv: yv-n
  - type: text
    text: 'of the chief priest who had gathered there, waiting to see how things would unfold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'The chief priests and the entire supreme Jewish council of leaders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:59
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Sanhedrin” (or Great Sanhedrin), which was a council of seventy men who were appointed to serve as the leadership of the Jewish community and the affairs of the temple.
    marker-yv: yv-n
  - type: text
    text: were doing their best to bring false charges against Jesus, because they were looking for a reason to put him to death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Many false witnesses came forward, but the evidence could not be corroborated. Finally two men came forward '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: and declared, “This man said, ‘I can destroy God’s temple and build it again in three days!’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Then the chief priest stood up and said to Jesus, “Have you nothing to say about these allegations? Is what they’re saying about you true?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: But Jesus remained silent before them. So the chief priest said to him, “I charge you under oath—in the name of the living God, tell us once and for all if you are the anointed Messiah, the Son of God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Jesus answered him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You just said it yourself. And more than that, you are about to see the Son of Man seated at the right hand of God, the Almighty.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:64
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 110:2
      metadata:
        usfm: PSA.110.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 7:13
      metadata:
        usfm: DAN.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And one day you will also see the Son of Man coming in the heavenly clouds!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'This infuriated the chief priest, and as an act of outrage, he tore his robe and shouted, “What blasphemy! No more witnesses are needed, for you heard this grievous blasphemy.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Turning to the council he said, “Now, what is your verdict?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“He’s guilty and deserves the death penalty!” they answered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Then they spat on his face and slapped him. Others struck him over and over with their fists. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: Then they taunted him by saying, “Oh, Anointed One, prophesy to us! Tell us which one of us is about to hit you next?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter’s Denials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Meanwhile, Peter was still sitting outside in the courtyard when a servant girl came up to him and said, “I recognize you. You were with Jesus the Galilean.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: In front of everyone Peter denied it and said, “I don’t have a clue what you’re talking about.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Later, as he stood near the gateway of the courtyard, another servant girl noticed him and said, “I know this man is a follower of Jesus the Nazarene!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Once again, Peter denied it, and with an oath he said, “I tell you, I don’t know the man!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: A short time later, those standing nearby approached Peter and said, “We know you’re one of his disciples—we can tell by your speech. Your Galilean accent gives you away!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:73
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Peter, being from Capernaum in Galilee, spoke the northern dialect of Aramaic, while the people of Jerusalem spoke the southern dialect (Chaldean).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Peter denied it, and using profanity he said, “I don’t know the man!” At that very moment the sound of a crowing rooster pierced the night. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: Then Peter remembered the prophecy of Jesus, “Before the rooster crows you will have denied me three times.” With a shattered heart, Peter left the courtyard, sobbing with bitter tears.
