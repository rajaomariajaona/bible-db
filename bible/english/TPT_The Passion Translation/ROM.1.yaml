document_id: ROM.1,1849
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, a loving and loyal servant '
  - type: note
    content: The Greek word doulos signifies more than a servant; it is one who has chosen to serve a master out of love, bound with cords so strong that it could only be severed by death.
  - type: text
    content: 'of the Anointed One, '
  - type: note
    content: “The Anointed One” is the best English translation of the Greek word Christou. Christ is not Jesus’ last name; it is a title for the Hebrew Messiah.
  - type: text
    content: 'Jesus. He called me to be his apostle '
  - type: note
    content: Or “his called apostle.” Paul was a servant before he was an apostle.
  - type: text
    content: 'and set me apart '
  - type: note
    content: Or “permanently separated.” There is an interesting wordplay here. The Aramaic word for “separated” is the root word for “Pharisee,” a separated one. Paul is saying that God is the one who separated him as uniquely God’s, as opposed to a self-righteous superiority. See also Gal. 1:15.
  - type: text
    content: 'with a mission to reveal God’s wonderful gospel. '
  - type: text
    content: '(7) '
  - type: text
    content: 'I write to all his beloved chosen ones in Rome, for you are also called as holy ones. '
  - type: note
    content: This verse, although found in v. 7, has been placed here in Paul’s introduction for purposes of clarity. Verses 1–7 form the longest prescript in any ancient writing, including any of Paul’s letters.
  - type: text
    content: May his joyous grace and total well-being, flowing from our Father and the Lord Jesus Christ, rest upon you.
  '10':
  - type: text
    content: 'My desire and constant prayer is that I would succeed in coming to you, according to the plan and timing of God. '
  - type: note
    content: Or “as God prospers me along the path of his will.”
  '11':
  - type: text
    content: 'I yearn to come and be face-to-face with you and get to know you. For I long to impart to you '
  - type: note
    content: Or “share with you.”
  - type: text
    content: 'some spiritual gift '
  - type: note
    content: See also Rom. 15:29.
  - type: text
    content: 'that will empower you to stand strong in your faith. '
  '12':
  - type: text
    content: Now, this means that when we come together and are side by side, something wonderful will be released. We can expect to be co-encouraged and co-comforted by each other’s faith!
  '13':
  - type: text
    content: 'So, my dear brothers and sisters, please don’t interpret my failure to visit you as indifference, because many times I’ve intended to come but have not been released '
  - type: note
    content: Or “have been hindered” (due to missionary work). There is no implication that the devil hindered Paul from coming, but rather, the missionary work of ministering in Turkey (Asia Minor) hindered him.
  - type: text
    content: 'to do so up to now. For I long to enjoy a harvest of spiritual fruit '
  - type: note
    content: This “fruit” would imply both converts and bringing the believers into maturity.
  - type: text
    content: 'among you, like I have experienced among the nations. '
  '14':
  - type: text
    content: 'Love obligates me to preach to everyone, to those who are among the elite and those who are among the outcasts, '
  - type: note
    content: Or “to the Greek speakers and to the barbarians.” By implication, Paul is obligated by love to preach to the cultured Greek speakers and to those who are uncultured foreigners.
  - type: text
    content: 'to those who are wise and educated as well as to those who are foolish and unlearned. '
  '15':
  - type: text
    content: 'This is why I am so excited '
  - type: note
    content: Or “To my very uttermost I am eager.”
  - type: text
    content: 'about coming to preach the wonderful message of Jesus '
  - type: note
    content: Or “good news” (or “gospel”) or “message of goodness” (well-being). The gospel is good news for the lost, but it is also good news for the believer! Our striving to please God is over; now we rest in the full and complete salvation Jesus has freely given to us.
  - type: text
    content: to you in Rome!
  - type: heading
    content: The Gospel of Power
  '16':
  - type: text
    content: 'I refuse to be ashamed of the wonderful message of God’s liberating power unleashed in us through Christ! For I am thrilled to preach that everyone who believes is saved—the Jew first, '
  - type: note
    content: Salvation comes to us through the Jewish people in our Lord Jesus Christ. The promised salvation message came historically to the Jew first, but by priority and privilege our obligation of love continues to bring the sweet message of Yeshua’s grace to our Jewish friends.
  - type: text
    content: 'and then people everywhere! '
  '17':
  - type: text
    content: 'This gospel unveils a continual revelation of God’s righteousness—a perfect righteousness given to us when we believe. And it moves us from '
  - type: text
    content: receiving life through faith
  - type: text
    content: ', to '
  - type: text
    content: the power of living by
  - type: text
    content: ' faith. '
  - type: note
    content: Ancient expositors taught that we move from what we once believed in to believing in God alone for righteousness. For the Jew it means moving from faith in Torah and doing well to a faith in the works of Yeshua, the Living Torah, who alone brings us into salvation’s power. For those in any religion, it means moving from an impotent faith into the explosive faith of the gospel of Christ.
  - type: text
    content: 'This is what the Scripture means when it says:'
  - type: text
    content: “We are right with God through life-giving faith!”
  - type: note
    content: Or “It is through faith that the righteous enter into life” (salvation). See Hab. 2:4.
  - type: heading
    content: God Reveals His Wrath
  '18':
  - type: text
    content: 'For God in heaven unveils his holy anger '
  - type: note
    content: Or “wrath.” God’s wrath is his action in punishing evil, a holy disapproval of all that is seen as wicked in the eyes of his holiness. In this first chapter, both righteousness and wrath are revealed. Righteousness is revealed in the gospel, but wrath is revealed as an activity God takes to uphold his glory.
  - type: text
    content: 'breaking forth against every form of sin, both toward ungodliness that lives in hearts and evil actions. For the wickedness of humanity deliberately smothers the truth and keeps people from acknowledging the truth about God. '
  '19':
  - type: text
    content: 'In reality, the truth of God is known instinctively, '
  - type: note
    content: Or “The knowability of God is manifest in them.”
  - type: text
    content: 'for God has embedded this knowledge inside every human heart. '
  '2':
  - type: text
    content: 'My commission is to preach the good news. Yet it is not entirely new, but the fulfillment of the hope promised to us through his prophets in the sacred Scriptures. '
  - type: note
    content: This would include the types, shadows, and prophecies of the entire Old Testament. Paul quotes from the Hebrew Scriptures (the Tanakh) more than eighty times in Romans.
  '20':
  - type: text
    content: Opposition to truth cannot be excused on the basis of ignorance
  - type: text
    content: ', '
  - type: note
    content: Implied by the immediate context and by the use of the conjunction because. This form of ellipsis needs to be supplied for the sake of clarity.
  - type: text
    content: 'because from the creation of the world, the invisible qualities '
  - type: note
    content: The Aramaic can be translated “his holy attributes.”
  - type: text
    content: 'of God’s nature have been made visible, such as his eternal power and transcendence. He has made his wonderful attributes easily perceived, '
  - type: note
    content: Or “lies plainly before their eyes.” The literal Greek is “being intellectually apprehended by reflection.”
  - type: text
    content: 'for seeing the visible makes us understand the invisible. '
  - type: note
    content: That is, what the eye sees becomes revelation to the conscience. See Ps. 19:1–4.
  - type: text
    content: So then, this leaves everyone without excuse.
  '21':
  - type: text
    content: Throughout human history
  - type: text
    content: ' '
  - type: note
    content: This phrase is implied by the use of the Greek aorist verb tense and is important for clarity as Paul continues to describe the brokenness of fallen humanity.
  - type: text
    content: 'the fingerprints of God were upon them, '
  - type: note
    content: Or “They instinctively knew (there was a) God.”
  - type: text
    content: 'yet they refused to honor him as God or even be thankful for his kindness. Instead, they entertained corrupt and foolish thoughts about what God was like. '
  - type: note
    content: Or “they became futile in their reasoning.”
  - type: text
    content: 'This left them with nothing but misguided hearts, steeped in moral darkness. '
  '22':
  - type: text
    content: 'Although claiming to be wise, they were in fact shallow fools. '
  - type: note
    content: The Aramaic can be translated “they became insane.”
  '23':
  - type: text
    content: For only a fool would trade the unfading splendor of the immortal God to worship the fading image of other humans, idols made to look like people, animals, birds, and even creeping reptiles!
  '24':
  - type: text
    content: 'This is why God lifted off his restraining hand and let them have full expression of their sinful and shameful desires. They were given over to moral depravity, dishonoring their bodies '
  - type: text
    content: by sexual perversion
  - type: text
    content: ' among themselves—'
  '25':
  - type: text
    content: 'all because they traded the truth of God for a lie. '
  - type: note
    content: An obvious metonymy, equating an idol with “a lie.” See 2 Thess. 2:11.
  - type: text
    content: They worshiped and served the things God made rather than the God who made all things—glory and praises to him forever and ever! Amen!
  '26':
  - type: text
    content: 'For this reason God gave them over to their own disgraceful and vile passions. '
  - type: note
    content: The Aramaic can be translated “disgraceful diseases.”
  - type: text
    content: 'Enflamed with lust for one another, men and women ignored the natural order and exchanged normal sexual relations for homosexuality. Women engaged in lesbian conduct, and men committed shameful acts with men, '
  - type: note
    content: See Lev. 18:22.
  - type: text
    content: receiving in themselves the due penalty for their deviation.
  - type: note
    content: Some see an inference here to sexually transmitted diseases.
  '28':
  - type: text
    content: 'And because they thought it was worthless to embrace the true knowledge of God, God gave them over '
  - type: note
    content: This is the third time that it states, “God gave them over.” See vv. 24, 26–27, and here in v. 28.
  - type: text
    content: 'to a worthless mind-set, to break all rules of proper conduct. '
  '29':
  - type: text
    content: 'Their sinful lives became full of every kind of evil, '
  - type: note
    content: There are twenty-two Greek nouns and adjectives used for evil listed in vv. 29–32. Injustice (selfishness), destructiveness, covetousness, malice, envy, murder, strife, guile, hostility, slander (the hissing sound of a snake charmer), gossip, hateful to God, insolent, arrogant, disobedient to parents, without moral understanding, without faith, without natural affections, hostilities, without mercy.
  - type: text
    content: 'wicked schemes, '
  - type: note
    content: The Aramaic and some Greek manuscripts have “immorality.”
  - type: text
    content: 'greed, '
  - type: note
    content: Or “unrestrained selfishness.”
  - type: text
    content: 'and cruelty. Their hearts overflowed with jealous cravings, and with conflict and strife, which drove them into hateful arguments and murder. They are deceitful liars full of hostility. They are gossips '
  '3':
  - type: text
    content: 'For the gospel is all about God’s Son. As a man he descended from David’s royal lineage, '
  - type: note
    content: Or “the seed of David.” Jesus was the “seed of the woman” in Gen. 3:15, the “seed of Abraham” in Gal. 3:16, and here in Rom. 1, the “seed of David.” See also Acts 13:16–41.
  '30':
  - type: text
    content: 'who love to spread malicious slander. With inflated egos they hurl hateful insults at God, yet they are nothing more than arrogant boasters. They are rebels against their parents and totally immoral. '
  '31':
  - type: text
    content: 'They are senseless, faithless, '
  - type: note
    content: Or “covenant-breakers.”
  - type: text
    content: 'ruthless, heartless, and completely merciless. '
  - type: note
    content: The Aramaic can be translated “They have no stability in themselves, neither love, nor peace, nor compassion.”
  '32':
  - type: text
    content: Although they are fully aware of God’s laws and proper order, and knowing that those who do all of these things deserve to die, yet they still go headlong into darkness, encouraging others to do the same and applauding them when they do!
  '4':
  - type: text
    content: 'but as the mighty Son of God he was raised from the dead and miraculously set apart '
  - type: note
    content: Or “marked [appointed] as God’s Son immersed in power.” The Greek word for “set apart” comes from horizo, meaning “the horizon.” It means “to mark out the boundaries,” “to decree,” or “to define.” The horizon we move toward is Jesus!
  - type: text
    content: 'with a display of triumphant power supplied by the Spirit of Holiness. '
  - type: note
    content: Or “the Holy Spirit.”
  - type: text
    content: 'And now Jesus is our Lord and our Messiah. '
  '5':
  - type: text
    content: 'Through him grace cascaded into us, empowering us with '
  - type: text
    content: the gift of
  - type: text
    content: ' apostleship, '
  - type: note
    content: 'Note that grace comes before service or ministry. This is likely a hendiadys: “We received the grace-gift of apostleship.” See also 1 Cor. 15:9–10; Eph. 4:7–13.'
  - type: text
    content: 'so that we can win people from every nation into the obedience that comes from faith, '
  - type: note
    content: The Greek text is ambiguous and can mean “the obedience to the faith” or “the obedience that springs from faith” or “the obedience that faith produces.” To obey the gospel is simply to believe it!
  - type: text
    content: 'to bring honor to his name. '
  '6':
  - type: text
    content: And you are among the chosen ones who are called to belong to Jesus, the Anointed One.
  - type: note
    content: Verse 7 has been merged into the text of verse 1 to enhance clarity.
  - type: heading
    content: Paul’s Desire to Visit Rome
  '8':
  - type: text
    content: 'I give thanks to God for all of you, '
  - type: note
    content: It was Paul’s constant habit to thank God for any grace he found within any believer.
  - type: text
    content: 'because the testimony of your faith is spreading throughout the world. '
  '9':
  - type: text
    content: 'And God knows that I pray for you continually and at all times. For I serve '
  - type: text
    content: and worship
  - type: text
    content: ' him with my spirit in the gospel of his Son.'
  - type: note
    content: The wonderful revelation of the gospel is a theme in Romans. It is God’s gospel (1:1), the gospel of his Son (1:9), and twice Paul calls it “my gospel” (2:16, 16:25).
