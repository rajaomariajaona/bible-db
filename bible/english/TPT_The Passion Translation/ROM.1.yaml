        text: 1:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “good news” (or “gospel”) or “message of goodness” (well-being). The gospel is good news for the lost, but it is also good news for the believer! Our striving to please God is over; now we rest in the full and complete salvation Jesus has freely given to us.
    marker-yv: yv-n
  - type: text
    text: to you in Rome!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gospel of Power
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I refuse to be ashamed of the wonderful message of God’s liberating power unleashed in us through Christ! For I am thrilled to preach that everyone who believes is saved—the Jew first, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Salvation comes to us through the Jewish people in our Lord Jesus Christ. The promised salvation message came historically to the Jew first, but by priority and privilege our obligation of love continues to bring the sweet message of Yeshua’s grace to our Jewish friends.
    marker-yv: yv-n
  - type: text
    text: 'and then people everywhere! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This gospel unveils a continual revelation of God’s righteousness—a perfect righteousness given to us when we believe. And it moves us from '
  - type: usfm
    marker: it
    children:
    - type: text
