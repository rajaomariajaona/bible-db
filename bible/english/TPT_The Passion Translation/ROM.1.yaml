        usfm: ROM.15.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'that will empower you to stand strong in your faith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Now, this means that when we come together and are side by side, something wonderful will be released. We can expect to be co-encouraged and co-comforted by each other’s faith!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So, my dear brothers and sisters, please don’t interpret my failure to visit you as indifference, because many times I’ve intended to come but have not been released '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “have been hindered” (due to missionary work). There is no implication that the devil hindered Paul from coming, but rather, the missionary work of ministering in Turkey (Asia Minor) hindered him.
    marker-yv: yv-n
  - type: text
    text: 'to do so up to now. For I long to enjoy a harvest of spiritual fruit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This “fruit” would imply both converts and bringing the believers into maturity.
    marker-yv: yv-n
  - type: text
    text: 'among you, like I have experienced among the nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Love obligates me to preach to everyone, to those who are among the elite and those who are among the outcasts, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to the Greek speakers and to the barbarians.” By implication, Paul is obligated by love to preach to the cultured Greek speakers and to those who are uncultured foreigners.
    marker-yv: yv-n
  - type: text
    text: 'to those who are wise and educated as well as to those who are foolish and unlearned. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'This is why I am so excited '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 1:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “To my very uttermost I am eager.”
    marker-yv: yv-n
  - type: text
    text: 'about coming to preach the wonderful message of Jesus '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
