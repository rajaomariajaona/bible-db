document_id: JOS.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua’s Northern Conquest
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When the news of Israel’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: southern
    - type: text
      text: ' victories reached King Jabin '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Jabin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “discerner” or “wise one.”
      marker-yv: yv-n
    - type: text
      text: 'of Hazor, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hazor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fortified” or “castle.” It was a major city-state that lay about nine miles north of Lake Galilee.
      marker-yv: yv-n
    - type: text
      text: 'he '
    - type: usfm
      marker: it
      children:
      - type: text
        text: organized a massive coalition to fight against Israel
    - type: text
      text: '. He sent messages to:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Jobab of Merom,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Madon.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Madon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “strife.” Some scholars, because of historical and archaeological evidence, prefer to read “Merom” (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) here and in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:9–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Merom was three miles west of Lake Galilee.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: the king of Shimron,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shimron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “extreme vigilance.” It was a city-state of the Lower Galilee region and the Jezreel Valley. It is identified today as Tell Samunia or Tell Shimron.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: the king of Achshaph,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Achshaph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “incantation” or “sorcery.” The exact location of Achshaph is unknown, but it is believed to be about thirty miles from Hazor.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Because Hazor at that time was the most powerful of all these kingdoms, Joshua circled back after the battle and conquered it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “struck them down with the mouth of the sword.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'They killed the king, burned Hazor '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The destruction of Hazor has been dated by recent excavations to around 1225 BC. Solomon later rebuilt the city (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 9:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: to the ground, and annihilated all its inhabitants. They spared not one breathing thing, leaving no survivors.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Joshua conquered all those royal cities and their kings. He destroyed them all, as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s servant Moses had commanded. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'However, of all the cities built on mounds, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, cities that were rebuilt on the ruins of earlier settlements.
      marker-yv: yv-n
    - type: text
      text: 'Joshua burned down only Hazor. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The Israelites kept all the spoils of these towns, including the livestock, but the inhabitants they killed with the sword. There were no survivors. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' commanded his servant Moses, so Moses commanded Joshua, and Joshua obeyed everything '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The words “obeyed everything” should be the goal and ambition of our lives. Our calling is not simply to be successful but also to be obedient. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 1:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 2:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' commanded Moses.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Territory Taken by Joshua
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Joshua conquered the entire region: the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judean
    - type: text
      text: ' hills, the southern desert, all the land of Goshen, the foothills, the lowlands of the Jordan Valley, the northern hill country of Israel including its lowlands—'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'everything from Mount Halak, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Mount Halak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “bare mountain”; it is likely Jebel Halaq.
      marker-yv: yv-n
    - type: text
      text: 'which rises toward Seir, all the way to Baal-Gad '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Baal-Gad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “the god of fortune.”
      marker-yv: yv-n
    - type: text
      text: 'in the Lebanon Valley below Mount Hermon. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The southern limit of Joshua’s conquest was Mount Halak, near Edom, south of the Dead Sea; the northern limit was the town of Baal-Gad, not far from Mount Hermon.
      marker-yv: yv-n
    - type: text
      text: Joshua captured all their kings and executed them.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Joshua waged war with all those kings over a long period. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “long period” was about seven years. There are spiritual battles we fight that we do not win easily or quickly. Thankfully, God will ultimately make us victorious in all things. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 17:47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:57
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 6:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 6:10–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Apart from the Hivites living in Gibeon, not one city made peace with Israel. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: By the power of
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: Yahweh
    - type: text
      text: ', Joshua conquered them all. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: the kings of the northern hill country,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The northern hill country would be the modern district of Galilee.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: the kings of the Jordan Valley south of Lake Galilee,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Arabah south of Chinneroth [Galilee].” In biblical times, Arabah referred both to the Jordan Valley between Lake Galilee and the Dead Sea, and also to an area south of Judah.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: the kings of the foothills,
  - type: usfm
    marker: p
    children:
    - type: text
      text: the western kings in the heights of Dor,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the foothills of the Carmel range.” This was the region west of Lake Galilee toward the Mediterranean coastal plains south of Mount Carmel.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Dor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “lofty place”; it was the chief city.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' himself hardened their hearts and made them obstinate so they would attack Israel. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had determined to wipe them out and condemn them to destruction without mercy, just as he had commanded Moses.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Joshua also drove out the Anakim, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Anakim were descendants of Anak. They are mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: as intimidating giants that kept the Israelites fearful in unbelief, which led to their wandering in the wilderness. Here we read that Joshua eliminated these giants and enabled the tribes of Israel to possess their inheritance, just as Jesus does today to the giants keeping us from full faith. Giants are nothing compared to God’s omnipotence.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: a race of giants
    - type: text
      text: ', from the hill country (including the cities of Hebron, Debir, and Anab)—from the entire hill country of Judah and Israel. Joshua destroyed the Anakim and their towns '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'so that there were no surviving Anakim in Israelite territory. Some survived but only in '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Philistine cities of
    - type: text
      text: ' Gaza, Gath, and Ashdod. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “fortified” or “strength,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “wine press,” and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ashdod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “stronghold.” These three cities were Philistine cities. The giant Goliath was from Gath (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Sam. 17:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Joshua conquered the whole land, just as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had promised Moses. Joshua assigned portions of the land to each of the tribes of Israel, and the Israelites lived in peace throughout the land.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the land had rest from war.”
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: the eastern and western Canaanite kings,
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Amorite kings,
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Hittite kings,
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Perizzite kings,
  - type: usfm
    marker: p
    children:
    - type: text
      text: the Jebusite kings in the highlands,
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the Hivite kings who lived near Mount Hermon in the land of Mizpah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:3
      - type: usfm
