document_id: JOS.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joshua’s Northern Conquest
  - type: text
    content: 'When the news of Israel’s '
  - type: text
    content: southern
  - type: text
    content: ' victories reached King Jabin '
  - type: note
    content: Jabin means “discerner” or “wise one.”
  - type: text
    content: 'of Hazor, '
  - type: note
    content: Hazor means “fortified” or “castle.” It was a major city-state that lay about nine miles north of Lake Galilee.
  - type: text
    content: 'he '
  - type: text
    content: organized a massive coalition to fight against Israel
  - type: text
    content: '. He sent messages to:'
  - type: text
    content: King Jobab of Merom,
  - type: note
    content: Or “Madon.” Madon means “strife.” Some scholars, because of historical and archaeological evidence, prefer to read “Merom” (v. 5) here and in 12:9–24. Merom was three miles west of Lake Galilee.
  - type: text
    content: the king of Shimron,
  - type: note
    content: Shimron means “extreme vigilance.” It was a city-state of the Lower Galilee region and the Jezreel Valley. It is identified today as Tell Samunia or Tell Shimron.
  - type: text
    content: the king of Achshaph,
  - type: note
    content: Achshaph means “incantation” or “sorcery.” The exact location of Achshaph is unknown, but it is believed to be about thirty miles from Hazor.
  '10':
  - type: text
    content: 'Because Hazor at that time was the most powerful of all these kingdoms, Joshua circled back after the battle and conquered it. '
  - type: note
    content: Or “struck them down with the mouth of the sword.”
  '11':
  - type: text
    content: 'They killed the king, burned Hazor '
  - type: note
    content: The destruction of Hazor has been dated by recent excavations to around 1225 BC. Solomon later rebuilt the city (see 1 Kings 9:15).
  - type: text
    content: to the ground, and annihilated all its inhabitants. They spared not one breathing thing, leaving no survivors.
  '12':
  - type: text
    content: 'Joshua conquered all those royal cities and their kings. He destroyed them all, as '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant Moses had commanded. '
  '13':
  - type: text
    content: 'However, of all the cities built on mounds, '
  - type: note
    content: That is, cities that were rebuilt on the ruins of earlier settlements.
  - type: text
    content: 'Joshua burned down only Hazor. '
  '14':
  - type: text
    content: 'The Israelites kept all the spoils of these towns, including the livestock, but the inhabitants they killed with the sword. There were no survivors. '
  '15':
  - type: text
    content: 'Just as '
  - type: text
    content: Yahweh
  - type: text
    content: ' commanded his servant Moses, so Moses commanded Joshua, and Joshua obeyed everything '
  - type: note
    content: The words “obeyed everything” should be the goal and ambition of our lives. Our calling is not simply to be successful but also to be obedient. See Luke 1:38; John 2:5.
  - type: text
    content: 'that '
  - type: text
    content: Yahweh
  - type: text
    content: ' commanded Moses.'
  - type: heading
    content: The Territory Taken by Joshua
  '16':
  - type: text
    content: 'So Joshua conquered the entire region: the '
  - type: text
    content: Judean
  - type: text
    content: ' hills, the southern desert, all the land of Goshen, the foothills, the lowlands of the Jordan Valley, the northern hill country of Israel including its lowlands—'
  '17':
  - type: text
    content: 'everything from Mount Halak, '
  - type: note
    content: Mount Halak means “bare mountain”; it is likely Jebel Halaq.
  - type: text
    content: 'which rises toward Seir, all the way to Baal-Gad '
  - type: note
    content: Baal-Gad means “the god of fortune.”
  - type: text
    content: 'in the Lebanon Valley below Mount Hermon. '
  - type: note
    content: The southern limit of Joshua’s conquest was Mount Halak, near Edom, south of the Dead Sea; the northern limit was the town of Baal-Gad, not far from Mount Hermon.
  - type: text
    content: Joshua captured all their kings and executed them.
  '18':
  - type: text
    content: 'Joshua waged war with all those kings over a long period. '
  - type: note
    content: The “long period” was about seven years. There are spiritual battles we fight that we do not win easily or quickly. Thankfully, God will ultimately make us victorious in all things. See 1 Sam. 17:47; 1 Cor. 15:57; Gal. 6:9; Eph. 6:10–13.
  '19':
  - type: text
    content: 'Apart from the Hivites living in Gibeon, not one city made peace with Israel. '
  - type: text
    content: By the power of
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ', Joshua conquered them all. '
  '2':
  - type: text
    content: the kings of the northern hill country,
  - type: note
    content: The northern hill country would be the modern district of Galilee.
  - type: text
    content: the kings of the Jordan Valley south of Lake Galilee,
  - type: note
    content: Or “Arabah south of Chinneroth [Galilee].” In biblical times, Arabah referred both to the Jordan Valley between Lake Galilee and the Dead Sea, and also to an area south of Judah.
  - type: text
    content: the kings of the foothills,
  - type: text
    content: the western kings in the heights of Dor,
  - type: note
    content: Or “the foothills of the Carmel range.” This was the region west of Lake Galilee toward the Mediterranean coastal plains south of Mount Carmel. Dor means “lofty place”; it was the chief city.
  '20':
  - type: text
    content: Yahweh
  - type: text
    content: ' himself hardened their hearts and made them obstinate so they would attack Israel. '
  - type: text
    content: Yahweh
  - type: text
    content: ' had determined to wipe them out and condemn them to destruction without mercy, just as he had commanded Moses.'
  '21':
  - type: text
    content: 'Joshua also drove out the Anakim, '
  - type: note
    content: The Anakim were descendants of Anak. They are mentioned in Num. 13 as intimidating giants that kept the Israelites fearful in unbelief, which led to their wandering in the wilderness. Here we read that Joshua eliminated these giants and enabled the tribes of Israel to possess their inheritance, just as Jesus does today to the giants keeping us from full faith. Giants are nothing compared to God’s omnipotence.
  - type: text
    content: a race of giants
  - type: text
    content: ', from the hill country (including the cities of Hebron, Debir, and Anab)—from the entire hill country of Judah and Israel. Joshua destroyed the Anakim and their towns '
  '22':
  - type: text
    content: 'so that there were no surviving Anakim in Israelite territory. Some survived but only in '
  - type: text
    content: the Philistine cities of
  - type: text
    content: ' Gaza, Gath, and Ashdod. '
  - type: note
    content: Gaza means “fortified” or “strength,” Gath means “wine press,” and Ashdod means “stronghold.” These three cities were Philistine cities. The giant Goliath was from Gath (see 1 Sam. 17:23).
  '23':
  - type: text
    content: 'Joshua conquered the whole land, just as '
  - type: text
    content: Yahweh
  - type: text
    content: ' had promised Moses. Joshua assigned portions of the land to each of the tribes of Israel, and the Israelites lived in peace throughout the land.'
  - type: note
    content: Or “the land had rest from war.”
  '3':
  - type: text
    content: the eastern and western Canaanite kings,
  - type: text
    content: the Amorite kings,
  - type: text
    content: the Hittite kings,
  - type: text
    content: the Perizzite kings,
  - type: text
    content: the Jebusite kings in the highlands,
  - type: text
    content: and the Hivite kings who lived near Mount Hermon in the land of Mizpah.
  - type: note
    content: Mizpah means “watchtower.”
  '4':
  - type: text
    content: 'They came out in full force with a multitude of horses and chariots. Their vast armies were as numerous as the grains of sand on the seashore. '
  - type: note
    content: According to Josephus, the armies of these ten kingdoms were more than three hundred thousand foot soldiers, ten thousand horses, and twenty thousand chariots (see Ant. 5.1.18). Joshua confronted these armies and defeated them all with only an infantry and Yahweh!
  '5':
  - type: text
    content: 'All these kings and their enormous armies joined forces '
  - type: note
    content: Or “met by appointment.”
  - type: text
    content: 'and encamped at Lake Merom '
  - type: note
    content: Or “the waters of Merom,” most likely modern Lake Huleh. Josephus called it “the lake of Semechonitis” (see Ant. 5.5.1).
  - type: text
    content: to fight against Israel.
  '6':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Joshua, saying, “Don’t be afraid of them; by this time tomorrow, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will have them all lying slain before Israel. After the battle, cripple their horses and burn their chariots.”'
  - type: note
    content: Yahweh did not want Israel to trust in the might of horses or chariots but in him alone. See Ps. 20:7; 33:17.
  '7':
  - type: text
    content: 'Joshua launched his surprise attack, and all his army pounced on them at their camp at Lake Merom. '
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' fought '
  - type: note
    content: Or “Yahweh delivered them into their hands.”
  - type: text
    content: 'alongside Joshua’s fighting men to defeat them. Part of the Israelite army attacked and pursued the retreating forces as far north as the cities of Misrephoth Maim '
  - type: note
    content: Misrephoth Maim means “lime kilns by the waters.” It was a city on the border of Israel and Lebanon.
  - type: text
    content: 'and Sidon. '
  - type: note
    content: Or “Great Sidon,” an important Phoenician city north of Israel on the Mediterranean coast.
  - type: text
    content: 'Another part of the Israelite army pursued the enemy as far east as the valley of Mizpah and crushed them all, leaving no survivors. '
  '9':
  - type: text
    content: 'Afterward, Joshua crippled their horses and burned their chariots as '
  - type: text
    content: Yahweh
  - type: text
    content: ' had commanded.'
