document_id: 1TH.3,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Timothy’s Mission
  - type: text
    content: 'When we could bear it no longer, we decided that we would remain in Athens '
  '10':
  - type: text
    content: Every night and day we sincerely and fervently pray that we may see you face-to-face and furnish you with whatever may be lacking in your faith.
  '11':
  - type: text
    content: 'Now may our Father God and our precious Lord Jesus '
  - type: note
    content: Some manuscripts add “the Anointed One.”
  - type: text
    content: 'guide our steps on a path straight back to you. '
  '12':
  - type: text
    content: 'And may the Lord increase your love until it overflows '
  - type: note
    content: Or “May the Lord make you increase and your love superabound.”
  - type: text
    content: 'toward one another and for all people, just as our love overflows toward you. '
  '13':
  - type: text
    content: 'Then your hearts will be strengthened '
  - type: note
    content: The Aramaic can be translated “He will lift up your hearts without contention.”
  - type: text
    content: 'in holiness so that you may be flawless and pure before '
  - type: text
    content: the face of
  - type: text
    content: ' our God and Father at the appearing of our Lord Jesus with all his holy ones. '
  - type: note
    content: Or “at the coming of the Lord of us, Jesus Christ, with all of the holy myriads of himself.”
  - type: text
    content: Amen!
  '2':
  - type: text
    content: 'and send Timothy '
  - type: text
    content: in our place
  - type: text
    content: '. '
  - type: note
    content: This may have been when Paul sent the letter of 2 Thessalonians with Timothy, which would make it earlier than 1 Thessalonians.
  - type: text
    content: 'He is our beloved brother and coworker with God '
  - type: note
    content: Some manuscripts have “servant of God.”
  - type: text
    content: 'in preaching the gospel. '
  - type: text
    content: We knew
  - type: text
    content: ' he would strengthen your faith and encourage your hearts '
  '3':
  - type: text
    content: 'so that no one would be shaken by these persecutions, for you know that we are destined for this. '
  - type: note
    content: That is, the sufferings of persecution are included in God’s destined purpose for those who love God and faithfully follow Christ. See Acts 14:22.
  '4':
  - type: text
    content: 'In fact, when we were with you we forewarned you: “Suffering and persecution is coming.” And so it has happened, as you well know. '
  '5':
  - type: text
    content: 'For this reason, when I could endure it no longer, I sent '
  - type: text
    content: our brother
  - type: text
    content: ' to find out if your faith was still strong, for I was concerned that the tempter '
  - type: note
    content: Or “harasser,” an obvious title for Satan, our adversary.
  - type: text
    content: had somehow enticed you and our labor would have been in vain.
  '6':
  - type: text
    content: 'But now, Timothy has just returned to us and brought us the terrific news of your faith and love. He informed us that you still hold us dear in your hearts and that you long to see us as much as we long to see you. '
  '7':
  - type: text
    content: 'So, our dear brothers and sisters, in the midst of all our distress and difficulties, your steadfastness of faith has greatly encouraged our hearts. '
  '8':
  - type: text
    content: We feel alive again as long as we know that you are standing firm in the Lord.
  '9':
  - type: text
    content: 'How could we ever thank God enough for all the wonderful joy that we feel before our God because of you? '
