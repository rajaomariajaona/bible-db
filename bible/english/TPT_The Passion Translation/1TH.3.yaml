document_id: 1TH.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy’s Mission
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When we could bear it no longer, we decided that we would remain in Athens '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Every night and day we sincerely and fervently pray that we may see you face-to-face and furnish you with whatever may be lacking in your faith.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now may our Father God and our precious Lord Jesus '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts add “the Anointed One.”
      marker-yv: yv-n
    - type: text
      text: 'guide our steps on a path straight back to you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And may the Lord increase your love until it overflows '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “May the Lord make you increase and your love superabound.”
      marker-yv: yv-n
    - type: text
      text: 'toward one another and for all people, just as our love overflows toward you. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Then your hearts will be strengthened '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “He will lift up your hearts without contention.”
      marker-yv: yv-n
    - type: text
      text: 'in holiness so that you may be flawless and pure before '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the face of
    - type: text
      text: ' our God and Father at the appearing of our Lord Jesus with all his holy ones. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “at the coming of the Lord of us, Jesus Christ, with all of the holy myriads of himself.”
      marker-yv: yv-n
    - type: text
      text: Amen!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and send Timothy '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in our place
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This may have been when Paul sent the letter of 2 Thessalonians with Timothy, which would make it earlier than 1 Thessalonians.
      marker-yv: yv-n
    - type: text
      text: 'He is our beloved brother and coworker with God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts have “servant of God.”
      marker-yv: yv-n
    - type: text
      text: 'in preaching the gospel. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: We knew
    - type: text
      text: ' he would strengthen your faith and encourage your hearts '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'so that no one would be shaken by these persecutions, for you know that we are destined for this. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the sufferings of persecution are included in God’s destined purpose for those who love God and faithfully follow Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 14:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'In fact, when we were with you we forewarned you: “Suffering and persecution is coming.” And so it has happened, as you well know. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For this reason, when I could endure it no longer, I sent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our brother
    - type: text
      text: ' to find out if your faith was still strong, for I was concerned that the tempter '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “harasser,” an obvious title for Satan, our adversary.
      marker-yv: yv-n
    - type: text
      text: had somehow enticed you and our labor would have been in vain.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But now, Timothy has just returned to us and brought us the terrific news of your faith and love. He informed us that you still hold us dear in your hearts and that you long to see us as much as we long to see you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So, our dear brothers and sisters, in the midst of all our distress and difficulties, your steadfastness of faith has greatly encouraged our hearts. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: We feel alive again as long as we know that you are standing firm in the Lord.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'How could we ever thank God enough for all the wonderful joy that we feel before our God because of you? '
