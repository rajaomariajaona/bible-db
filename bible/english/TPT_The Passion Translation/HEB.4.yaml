document_id: HEB.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Faith-Rest Life
  - type: text
    content: 'Now the promise of entering into God’s rest is still for us today. So we must be extremely careful to ensure that we all embrace the fullness of that promise and not fail to experience it. '
  '10':
  - type: text
    content: 'As we enter into God’s faith-rest life we cease from our own works, just as God '
  - type: text
    content: celebrates his finished works and
  - type: text
    content: ' rests in them. '
  - type: note
    content: The word used for “Sabbath” in v. 9 is not the usual word, it is the celebratory aspects of the Sabbath that are emphasized in the Greek word sabbatismos.
  '11':
  - type: text
    content: So then we must be eager to experience this faith-rest life, so that no one falls short by following the same pattern of doubt and unbelief.
  '12':
  - type: text
    content: 'For we have the living Word of God, which is full of energy, '
  - type: note
    content: The Aramaic can be translated “all effective.” There is a hint here of the spinning sword of fire, held by the angel guarding the way to the Tree of Life. To come eat its fruit, you must pass through the mighty sword of fire. The context implies we pass through this “fire-sword” on our way into the holy of holies. When the veil was split in two, the cherubim embroidered on the veil parted, as it were, to allow every worshiper to enter into the unveiled presence of God. See Gen. 3:24; Matt. 27:51.
  - type: text
    content: 'like a two-mouthed sword. '
  - type: note
    content: God speaks his word, then we, in agreement, also speak his word and it becomes a “two-mouthed sword.”
  - type: text
    content: 'It will even penetrate to the very core of our being where soul and spirit, bone '
  - type: note
    content: As translated from the Aramaic, the Greek is “joint.”
  - type: text
    content: 'and marrow meet! '
  - type: note
    content: Soul and spirit are the immaterial parts of every person that make us who we are, joint and bone marrow are the physical aspects of our existence. All of this combined forms our humanity. God’s Word has the ability to uncover our hidden aspects and make them known.
  - type: text
    content: 'It interprets and reveals the true thoughts and secret motives of our hearts. '
  '13':
  - type: text
    content: There is not one person who can hide their thoughts from God, for nothing that we do remains a secret, and nothing created is concealed, but everything is exposed and defenseless before his eyes, to whom we must render an account.
  - type: note
    content: The word used here is logos. The Greek could also be translated “in his view the Word is our responsibility.”
  - type: heading
    content: Jesus, Our Compassionate King-Priest
  '14':
  - type: text
    content: 'So then, we must cling in faith to all we know to be true. For we have a magnificent King-Priest, '
  - type: note
    content: As translated from the Aramaic, which uses a word for a priest not of the Levitical order. The Aramaic word here for priest is not cohen but kumrea.
  - type: text
    content: 'Jesus Christ, the Son of God, who rose into the heavenly realm for us, and now sympathizes with us in our frailty. '
  - type: note
    content: The Aramaic can be translated “who has sorrow with us in our affliction.”
  '15':
  - type: text
    content: 'He understands humanity, for as a man, our magnificent King-Priest was tempted in every way just as we are, and conquered sin. '
  - type: note
    content: As translated from the Aramaic. The Greek is “He was without sin” (sinless).
  '16':
  - type: text
    content: 'So now we draw near freely and boldly to where grace is enthroned, '
  - type: note
    content: Or “the throne of grace.”
  - type: text
    content: 'to receive mercy’s kiss and discover the grace we urgently need to strengthen '
  - type: note
    content: The Greek word boetheia means “urgent help,” and is often used as “reinforcing” (a ship in a storm). See Acts 27:17.
  - type: text
    content: us in our time of weakness.
  - type: note
    content: The Aramaic can be translated “tribulation.”
  '2':
  - type: text
    content: 'For we have heard the good news of deliverance just as they did, yet they didn’t join their faith with the Word. '
  - type: note
    content: Or “because they did not join in with those who heard the message with faith” (Joshua and Caleb).
  - type: text
    content: 'Instead, what they heard didn’t affect them deeply, for they doubted. '
  '3':
  - type: text
    content: For those of us who believe, faith activates the promise and we experience the realm of confident rest! For he has said,
  - type: note
    content: See Ps. 95:11; Heb. 3:11.
  - type: text
    content: '“I was grieved '
  - type: note
    content: The Greek word orge is used for any emotion of extreme passion, usually anger.
  - type: text
    content: with them and made a solemn oath,
  - type: text
    content: ‘They will not enter into my rest.’ ”
  - type: text
    content: 'God’s works have all been completed from the foundation of the world, '
  - type: note
    content: Or “God’s works have been completed, even though the world has fallen.” The Greek word katabole means “to fall down,” “to throw down.” It is most often used for “laying down a foundation,” but it can imply the fall of humanity through sin. Even though the world has fallen, God’s works have already been accomplished, unhindered by the sin of man. God’s finished works supersede the brokenness of our planet.
  '4':
  - type: text
    content: for it says in the Scriptures,
  - type: note
    content: See Gen. 2:2.
  - type: text
    content: And on the seventh day God rested from all his works.
  '5':
  - type: text
    content: And again, as stated before,
  - type: text
    content: They will not enter into my rest.
  '6':
  - type: text
    content: 'Those who first heard the good news of deliverance failed to enter into that realm of faith’s rest because of their unbelieving hearts. Yet the fact remains that we still have the opportunity to enter into the faith-rest life and experience the fulfillment of the promise! '
  '7':
  - type: text
    content: For God still has ordained a day for us to enter into called “Today.” For it was long afterwards that God repeated it in David’s words,
  - type: text
    content: “If only today you would listen to his voice
  - type: text
    content: and do not harden your hearts!”
  '8':
  - type: text
    content: 'Now if this promise of “rest” was fulfilled when Joshua brought the people into the land, '
  - type: note
    content: See Josh. 21:44; 22:4.
  - type: text
    content: 'God wouldn’t have spoken later of another “rest” yet to come. '
  '9':
  - type: text
    content: 'So we conclude that there is still a full and complete Sabbath-rest '
  - type: note
    content: The Aramaic can be translated “He arose to be the Sabbath for the people of God.”
  - type: text
    content: 'waiting for believers '
  - type: note
    content: Or “the people of God.”
  - type: text
    content: 'to experience. '
