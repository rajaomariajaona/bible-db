        text: 'Our heavenly Joshua (Jesus) has defeated every principality, power, and stronghold that resists our advance in Christ. The name of God, El (Mighty God), according to its gematria (the numerical value in Jewish culture), equals thirty-one. The meaning of the names of the principalities of these thirty-one kings could represent the thirty-one strongholds that dull our understanding of the finished work of Christ for us: (1) Jericho represents walls, impossibilities, limitations. (2)'
