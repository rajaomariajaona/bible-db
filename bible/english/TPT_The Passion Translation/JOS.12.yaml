  - type: text
    content: 25. The king of Taanach
  - type: text
    content: 26. The king of Megiddo
  - type: text
    content: 27. The king of Kedesh
  - type: text
    content: 28. The king of Jokneam in Carmel
  - type: text
    content: 29. The king of Dor on the coast
  - type: text
    content: '30. The king of Goyim '
  - type: note
    content: The Hebrew word goyim means “peoples.”
  - type: text
    content: in Galilee
  - type: text
    content: 31. The king of Tirzah
  - type: note
    content: 'Our heavenly Joshua (Jesus) has defeated every principality, power, and stronghold that resists our advance in Christ. The name of God, El (Mighty God), according to its gematria (the numerical value in Jewish culture), equals thirty-one. The meaning of the names of the principalities of these thirty-one kings could represent the thirty-one strongholds that dull our understanding of the finished work of Christ for us: (1) Jericho represents walls, impossibilities, limitations. (2) Ai means “heap of ruins” (representing the world system). (3) Jerusalem means “lord of righteousness” (counterfeit spirituality, under the rule of Adoni-zedek). (4) Hebron means “fellowship”; Hoham means “he crushed” (broken fellowship with God). (5) Jarmuth means “lifted up”; Piram means “wild donkey” (pride and arrogance). (6) Lachish means “impregnable”; Japhia means “splendid, bright” (human ingenuity). (7) Eglon means “bull-like” (human arguments and oratory). (8) Gezer means “steep, precipitous” (sharp tongue, stinging words). (9) Debir means “speaker, oracle” (political spirit). (10) Geder means “wall” (defensiveness). (11) Hormah means “destroyed, laid waste” (defeat, depression). (12) Arad means “wild fugitive” (rebellions, lawlessness). (13) Libnah means “white” (self-righteousness, hypocrisy). (14) Adullam means “justice of the people” (approval of others, insecurity). (15) Makkedah means “place of shepherds” (false shepherds, selfish leadership). (16) Bethel means “house of God” (religious spirit). (17) Tappuah means “apple, distillation” (drunkenness). (18) Hepher means “pit, well” (shame, condemnation). (19) Aphek means “strength, fortress” (self-sufficiency). (20) Lasharon means “like the plain” (complacency, passivity). (21) Madon means “strife, contention” (divisive, argumentative). (22) Hazor means “enclosed, fortified”; Jabin means “intelligent” (human wisdom, mind of man). (23) Shimron Meron means “guardian of arrogance” (traditions, prideful opinions). (24) Achshaph means “enchantment” (occult, witchcraft). (25) Taanach means “hard to pass, sandy” (soulish, double mindedness). (26) Megiddo means “place of troops, crowded place” (distraction, anxiety). (27) Kedesh means “sacred, purity” (man-made holiness standards). (28) Jokneam means “possessed by the people” (celebrity worship). (29) Dor means “dwelling, habitation” (worldly comfort). (30) Gilgal means “circle” (dull of heart, refusing to change, going nowhere). (31) Tirzah means “delight, pleasing” (loving worldly pleasures more than loving God). Jesus sets us free from each of these thirty-one strongholds!'
