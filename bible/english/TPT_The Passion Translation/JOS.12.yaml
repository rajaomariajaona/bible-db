document_id: JOS.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Kings Defeated by Moses
  - type: text
    content: 'On the east side of the Jordan, '
  - type: text
    content: Moses and
  - type: text
    content: ' the Israelites had conquered two kings, '
  - type: text
    content: Sihon and Og
  - type: text
    content: '. The Israelites occupied their territory, which extended from the Arnon Valley '
  - type: text
    content: in the south
  - type: text
    content: ' to Mount Hermon '
  - type: text
    content: in the north
  - type: text
    content: ', including the entire eastern desert.'
  - type: note
    content: Or “all the eastern Arabah [dry and desolate area].”
  '2':
  - type: text
    content: 'Sihon, king of the Amorites, reigned in Heshbon '
  - type: note
    content: Heshbon, the capital city of the Amorites, was about fifteen miles northeast of the northern end of the Dead Sea. Heshbon means “reasoning” or “stronghold” and hints at the mind of man.
  - type: text
    content: 'and ruled over '
  - type: text
    content: the southern
  - type: text
    content: ' half of Gilead, from Aroer on the edge of the Arnon River Valley '
  - type: text
    content: in the south
  - type: text
    content: ' to the River Jabbok '
  - type: text
    content: in the north
  - type: text
    content: ', which is the border of the Ammonites. '
  '3':
  - type: text
    content: The western area of
  - type: text
    content: ' his kingdom included the eastern desert from Lake Galilee to the Dead Sea (the Salt Sea). His territory included the area east of the Dead Sea as far as the town of Beth Jeshimoth '
  - type: note
    content: Or “House of Deserts.”
  - type: text
    content: and as far south as Mount Pisgah.
  '4':
  - type: text
    content: 'Og, the king of Bashan, '
  - type: note
    content: Bashan means “snake.” It is the region east and northeast of Lake Galilee.
  - type: text
    content: 'was one of the last of the race of giants. '
  - type: note
    content: Or “Rephaites [giants].” For the defeat of King Og, see Num. 21:33–35.
  - type: text
    content: 'He reigned in the cities of Ashtaroth and Edrei. '
  - type: note
    content: Ashtaroth (also the name of a Canaanite goddess) and Edrei are two cities to the east and southeast of Lake Galilee. Edrei means “by force” or “power.”
  - type: text
    content: 'He ruled over all of Bashan, the northern half of Gilead, to the boundary of Sihon, king of Heshbon. '
  '5':
  - type: text
    content: 'His territory included Mount Hermon '
  - type: text
    content: in the north
  - type: text
    content: ' and Salecah '
  - type: text
    content: in the east
  - type: text
    content: ', and '
  - type: text
    content: south
  - type: text
    content: ' to the boundary of the Geshurites and the Maacathites. '
  '6':
  - type: text
    content: 'Moses and the Israelites conquered the two kings, Sihon and Og. Moses, the servant of '
  - type: text
    content: Yahweh
  - type: text
    content: ', divided their land '
  - type: text
    content: east of the Jordan
  - type: text
    content: ' among the tribes of Reuben, Gad, and half the tribe of Manasseh.'
  - type: heading
    content: The Kings Defeated by Joshua
  '7':
  - type: text
    content: 'On the west side of the Jordan, Joshua and the Israelites defeated '
  - type: text
    content: thirty-one
  - type: text
    content: ' kings, from Baal-Gad in the Lebanon Valley in the north to Mount Halak in the south near Edom. '
  - type: note
    content: Or “which rises toward Seir,” a mountainous region of Edom.
  - type: text
    content: Then Joshua divided this land among the tribes of Israel and gave them their portions as permanent possessions—
  '8':
  - type: text
    content: 'the hill country, the western foothills, and the Jordan Valley, the mountain slopes, the wilderness '
  - type: text
    content: of Judea
  - type: text
    content: ', '
  - type: note
    content: Or “the eastern slopes.”
  - type: text
    content: and the southern desert region—
  - type: text
    content: the land of
  - type: text
    content: ' the Hittites, Amorites, Canaanites, Perizzites, Hivites, and Jebusites.'
  '9':
  - type: text
    content: Here is the list of the thirty-one
  - type: text
    content: ' '
  - type: note
    content: The number thirty-one is also found in 2 Kings 22:1 in reference to the righteous reformer King Josiah (similar in Hb. to Joshua) who reigned thirty-one years.
  - type: text
    content: kings destroyed by Joshua
  - type: text
    content: ':'
  - type: text
    content: 1. The king of Jericho
  - type: text
    content: 2. The king of Ai near Bethel
  - type: text
    content: 3. The king of Jerusalem
  - type: text
    content: 4. The king of Hebron
  - type: text
    content: 5. The king of Jarmuth
  - type: text
