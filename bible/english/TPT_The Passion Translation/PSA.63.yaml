document_id: PSA.63,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Thirsting for God
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: King David’s song when he was exiled in the Judean wilderness
  - type: text
    content: O God of my life, I’m lovesick for you in this weary wilderness.
  - type: text
    content: I thirst with the deepest longings to love you more,
  - type: text
    content: with cravings in my heart that can’t be described.
  - type: text
    content: Such yearning grips my soul for you, my God!
  '10':
  - type: text
    content: They will be consumed by their own evil
  - type: text
    content: and become nothing more than dust under our feet.
  - type: note
    content: Or “food for foxes.”
  '11':
  - type: text
    content: These liars will be silenced forever!
  - type: text
    content: But with the anointing of a king I will dance and rejoice
  - type: text
    content: along with all his devoted lovers who trust in him.
  '2':
  - type: text
    content: I’m energized every time I enter
  - type: text
    content: your heavenly sanctuary to seek more of your power
  - type: text
    content: and drink in more of your glory.
  '3':
  - type: text
    content: For your tender mercies mean more to me than life itself.
  - type: text
    content: How I love and praise you, God!
  '4':
  - type: text
    content: Daily I will worship you passionately and with all my heart.
  - type: text
    content: My arms will wave to you like banners of praise.
  '5':
  - type: text
    content: I overflow with praise when I come before you,
  - type: text
    content: for the anointing of your presence satisfies me like nothing else.
  - type: text
    content: You are such a rich banquet of pleasure to my soul.
  '6':
  - type: text
    content: I lie awake each night thinking of you
  - type: text
    content: and reflecting on how you help me like a father.
  - type: text
    content: I sing through the night under your splendor-shadow,
  - type: text
    content: offering up to you my songs of delight and joy!
  '8':
  - type: text
    content: With passion I pursue and cling to you.
  - type: text
    content: Because I feel your grip on my life,
  - type: text
    content: I keep my soul close to your heart.
  '9':
  - type: text
    content: Those who plot to destroy me shall descend into the darkness of hell.
