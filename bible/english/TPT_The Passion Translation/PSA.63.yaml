document_id: PSA.63
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Thirsting for God
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s song when he was exiled in the Judean wilderness
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God of my life, I’m lovesick for you in this weary wilderness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I thirst with the deepest longings to love you more,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with cravings in my heart that can’t be described.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Such yearning grips my soul for you, my God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I’m energized every time I enter
- type: usfm
  marker: q1
  children:
  - type: text
    text: your heavenly sanctuary to seek more of your power
- type: usfm
  marker: q1
  children:
  - type: text
    text: and drink in more of your glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For your tender mercies mean more to me than life itself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How I love and praise you, God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Daily I will worship you passionately and with all my heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My arms will wave to you like banners of praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I overflow with praise when I come before you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the anointing of your presence satisfies me like nothing else.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are such a rich banquet of pleasure to my soul.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: I lie awake each night thinking of you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and reflecting on how you help me like a father.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sing through the night under your splendor-shadow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: offering up to you my songs of delight and joy!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: With passion I pursue and cling to you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because I feel your grip on my life,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I keep my soul close to your heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Those who plot to destroy me shall descend into the darkness of hell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They will be consumed by their own evil
- type: usfm
  marker: q1
  children:
  - type: text
    text: and become nothing more than dust under our feet.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 63:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “food for foxes.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: These liars will be silenced forever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But with the anointing of a king I will dance and rejoice
- type: usfm
  marker: q1
  children:
  - type: text
    text: along with all his devoted lovers who trust in him.
