  - type: text
    content: ' from Acacia to Gilgal.'
  - type: note
    content: 'This sentence in Hebrew reads simply: “From Shittim [Acacia] to Gilgal.” Shittim is short for Abel Shittim (Hb. ʾabel hashshittim), which translates to “Acacia meadow.” Most scholars see a lacuna, a gap, in the Hebrew text here. The obvious inference is a reference to the miracle-crossing of the Jordan so that Israel could go from her last camp in the wilderness (Acacia) to her first camp in the promised land (Gilgal; see Josh. 3:1–4:19).'
