  '14':
  - type: text
    content: You will eat but not be satisfied;
  - type: text
    content: you will still be hungry.
  - type: note
    content: Or “your filth is inside you.” The Hebrew verb form yeshacha is a hapax legomenon, found only here in the Scriptures. Consequently, Old Testament scholarship recognizes that there is no way to ascertain the true meaning of this term.
