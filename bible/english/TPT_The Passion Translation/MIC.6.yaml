  - type: text
    content: I sent Moses, Aaron, and Miriam to lead you.
  - type: note
    content: Israel was led out of slavery, in part, by a woman—Miriam. She was the older sister of Moses and a prophetess. See Ex. 15:20; (Talmud) Megillah 14a. Another “Miriam” had a role in leading us out of our former slavery to sin, for the mother of Jesus was named Miriam (Mary).
