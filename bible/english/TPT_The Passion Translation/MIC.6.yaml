  - type: note
    content: Or “to [demonstrate] unfailing love [mercy].” This is the almost untranslatable Hebrew word chesed (or hesed), which includes the meanings of “loyalty,” “goodness,” “kindness,” “mercy,” “faithfulness,” “love,” “graciousness,” and more. Many commentators view Mic. 6:8 as one of the greatest sayings in all the Old Testament. See Mark 12:32–33.
