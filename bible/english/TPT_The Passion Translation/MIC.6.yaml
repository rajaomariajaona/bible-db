  '1':
  - type: heading
    content: Yahweh’s Indictment of Israel
  - type: text
    content: 'Now listen to what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Stand up and state your case.
  - type: note
    content: The reading “state your case” translates the Hebrew verb rib. Micah 6:1–5 constitutes what Old Testament scholars call a “rib-oracle”—that is, a “covenant lawsuit.” The Hebrew term rib occurs as both a verb and a noun. In a number of contexts, the verb rib carries the meaning “to conduct [or mount] a legal case [or lawsuit] against someone.” As a noun, rib denotes a “lawsuit,” “[legal] charge/case,” plus other synonymous terms. The essential significance of such an oracle in this context is that Yahweh was launching a formal legal indictment against his people Israel for their violation of the divine covenant law. The assumed setting for such a divine legal prosecution is the heavenly courtroom. In addition, there is the significance of the canonical prophet functioning as a divinely appointed prosecuting attorney, pleading Yahweh’s case against his wayward people. Micah fulfilled this role here, formally, in ch. 6, and it may also be argued that he executed this role informally throughout his entire prophetic work. The same may be said for the prophet Hosea, who participated in another rib-oracle against Israel in Hos. 4–5. For similar uses of the term rib, see Ex. 23:2–3; Deut. 25:1; Jer. 25:31.
