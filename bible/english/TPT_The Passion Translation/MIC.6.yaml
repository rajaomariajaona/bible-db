  - type: note
    content: Or “soul.” The Hebrew term nepesh has a very broad semantic range. Possible meanings can include “life,” “soul,” “living being,” “self,” “person,” “desire,” “appetite,” “emotion,” or “passion,” all with various shades of meanings.
