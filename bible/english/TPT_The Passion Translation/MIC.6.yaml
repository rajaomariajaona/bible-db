  '16':
  - type: text
    content: For you live by the standards of the dynasty of Omri
  - type: note
    content: Omri ruled the Northern Kingdom of Israel from 885 to 874 BC, and his son Ahab followed him from 874 to 853 BC. The Omride dynasty held the throne longer than any other family in the Northern Kingdom, yet they were outstanding for their wickedness.
  - type: text
    content: and follow the evil ways of Ahab and his household.
  - type: note
    content: Or “the house [family] of Ahab.” Ahab and his wife Queen Jezebel encouraged people to worship foreign gods. See 1 Kings 16:23–24; 21:25–26. Ahab’s evil sons ruled after him, first Ahaziah, then Jehoram. See also 1 Kings 22:52; 2 Kings 3:2. Micah’s ministry began more than one hundred years after the Omride dynasty ended.
