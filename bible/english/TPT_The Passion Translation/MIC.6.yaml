  '12':
  - type: text
    content: The wealthy are steeped in violence,
  - type: note
    content: The Hebrew word for violence is chamas (or hamas, in an alternate transliteration style). This implies more than just physical violence. It also involves economic coercion or force. The powerful often seek a monopoly on the use of force.
  - type: text
    content: and the people are liars and speak deceitfully.
  - type: note
    content: See Ps. 116:10–11; Rom. 3:4.
  '13':
