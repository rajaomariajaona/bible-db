      text: But a woman dropped a millstone on his head and fractured his skull.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimelech cried out to his armor-bearer, “Kill me with your sword so no one can say I was killed by a woman.” '
