document_id: JDG.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abimelech’s Conspiracy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abimelech '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abimelech
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “my father is king.”
    marker-yv: yv-n
  - type: text
    text: son of Baal-Fighter (
  - type: usfm
    marker: it
    children:
    - type: text
      text: or Gideon
  - type: text
    text: ') went to his mother’s brothers and to the rest of her clan in Shechem and said to them, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Ask all the leaders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “baals [lords].” In Judges, the word “baal” is found only in this chapter and is used thirteen times in reference to leaders.
    marker-yv: yv-n
  - type: text
    text: 'of Shechem, ‘Which do you prefer: to have just one man as your ruler or have seventy of Baal-Fighter’s sons rule over you?’ And don’t forget, I’m your own flesh and blood.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'When the brothers repeated these words to the leaders of Shechem, their hearts were drawn to Abimelech, for they said, “He is '
  - type: usfm
    marker: it
    children:
    - type: text
      text: from our hometown and
  - type: text
    text: ' from our own clan.” '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They gave him seventy shekels of silver '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, they gave one shekel for each of Abimelech’s seventy brothers, essentially saying each one was worth only a shekel to them.
    marker-yv: yv-n
  - type: text
    text: 'from the temple of Baal-Berith, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Baal [lord]-of-the-covenant.”
    marker-yv: yv-n
  - type: text
    text: 'and Abimelech used it to hire reckless scoundrels to follow him. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He went to his father’s home in Ophrah and on one stone executed his seventy brothers, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The majority of the seventy brothers whom Abimelech killed were his half brothers.
    marker-yv: yv-n
  - type: text
    text: 'the sons of Baal-Fighter. Jotham, Baal-Fighter’s youngest son, escaped and went into hiding. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All the citizens of Shechem and Beth Millo '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Beth Millo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “house of fullness.” Beth Millo may have been the tower of Shechem (see v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '46'
      metadata:
        usfm: JDG.9.46
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: gathered beside the sacred tree at the pillar in Shechem and crowned Abimelech king.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jotham’s Fable: The Thornbush King'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When Jotham learned about this, he climbed up on the top of Mount Gerizim '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was the mountain where half of the tribes of Israel proclaimed the blessings over the people if they kept the covenant (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 27:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It stood opposite Ebal where the other half of the tribes proclaimed curses on the disobedient. Further, Joshua renewed the covenant at Shechem where he wrote the words of the law on a plastered stone that stood between Ebal and Gerizim (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josh. 24:1–28
      metadata:
        usfm: JOS.24.1+JOS.24.2+JOS.24.3+JOS.24.4+JOS.24.5+JOS.24.6+JOS.24.7+JOS.24.8+JOS.24.9+JOS.24.10+JOS.24.11+JOS.24.12+JOS.24.13+JOS.24.14+JOS.24.15+JOS.24.16+JOS.24.17+JOS.24.18+JOS.24.19+JOS.24.20+JOS.24.21+JOS.24.22+JOS.24.23+JOS.24.24+JOS.24.25+JOS.24.26+JOS.24.27+JOS.24.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'and shouted: “Listen to me, citizens of Shechem, so that God may listen to you. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: All the trees one day determined to anoint a king for themselves. They said to the olive tree, ‘Be our king.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “But the olive tree answered, ‘What? Give up my rich oil that is used to honor both gods and men, to hold sway over the trees?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Next, the trees said to the fig tree, ‘Come and be our king.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “But the fig tree replied, ‘What? Give up my good, sweet fruit to hold sway over the trees?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Then the trees said to the vine, ‘Come and be our king.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “But the vine answered, ‘What? Give up my wine, which cheers both gods and men, to hold sway over the trees?’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The three trees represent what believers enjoy in following Christ: (1) Olive tree—the oil of anointing of the Holy Spirit. (2) Fig tree—the goodness and sweetness of Christ’s love. (3) Vine—the joy and cheer that Jesus brings to our lives.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Finally, all the trees said to the thornbush, ‘Come and be our king.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“The thornbush replied, ‘If you really want to anoint me your king, then come and put your trust in my shade. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A thornbush offers no shade, and Abimelech (the thornbush) offered neither shelter nor care to Israel.
    marker-yv: yv-n
  - type: text
    text: If you don’t, then let fire blaze out of my thorny branches and consume the cedars of Lebanon!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Now then let me ask you this: Do you really think you did a right and honorable thing when you made Abimelech king? Do you think you treated Baal-Fighter and his family fairly? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And to think that my father fought for you, and risked his life '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “cast away his soul to a distance.”
    marker-yv: yv-n
  - type: text
    text: 'to save you from the power of the Midianites! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Today, you have revolted against my father’s family, murdered his seventy sons on a single stone, and made Abimelech, the son of his slave girl, king over the citizens of Shechem because he’s your close relative. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: What were you thinking?
  - type: text
    text: ' If you have acted honorably and done what is right by Baal-Fighter and his family today, then may you enjoy Abimelech, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: this thornbush king of yours
  - type: text
    text: ', and may he enjoy you too! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: But if not, let fire come out from Abimelech and consume you, citizens of Shechem and Beth Millo, and let fire come out from you, citizens of Shechem and Beth Millo, and consume Abimelech!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After shouting these words, Jotham ran away and went to live at the Well '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Beer.” Some scholars have identified this place as Beeroth.
    marker-yv: yv-n
  - type: text
    text: because he was afraid of his brother Abimelech.
- type: usfm
  marker: s1
  children:
  - type: text
    text: King Abimelech
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'After Abimelech had ruled Israel for three years, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God did not hand over Israel to a foreign power but to an unscrupulous ruler, Abimelech.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'God sent a spirit to stir up hostility '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a hostile spirit” or “a spirit of dissension.”
    marker-yv: yv-n
  - type: text
    text: 'between Abimelech and the citizens of Shechem, and they rebelled against him. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sent this judgment
  - type: text
    text: ' in order to avenge the brutal murder of Baal-Fighter’s seventy sons and the shedding of their blood. Righteous retribution caught up with both Abimelech, who had instigated the murder of his half brothers, and the citizens of Shechem, who had aided and abetted him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: In their uprising against Abimelech, the citizens of Shechem placed bandits on the hilltops to ambush and rob everyone who passed by, and Abimelech heard of their treachery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'One day, a man named Gaal son of Ebed '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gaal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “to loathe” or “hateful.” It was possibly a nickname. A related Hebrew word means “dung beetle.”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ebed
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “servant.” If Gaal is not his actual name, it could be translated “a loathsome [dung beetle],” “hateful man,” or “a servant’s son.” This derisive name hints at his low social status. He was a troublemaker.
    marker-yv: yv-n
  - type: text
    text: 'moved with his clan into Shechem, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “went on the prowl into Shechem.”
    marker-yv: yv-n
  - type: text
    text: 'and Gaal won the confidence of the people. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'After the grape harvest, they trod the grapes and celebrated a festival '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a praise-festival.”
    marker-yv: yv-n
  - type: text
    text: 'in the temple of '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Baal
  - type: text
    text: ', their god. While they were drinking and feasting, they cursed Abimelech. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Gaal son of Ebed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rose and
  - type: text
    text: ' said, “Who is this Abimelech? We are the Shechemites now! Why should we serve him? Isn’t he Baal-Fighter’s son, and isn’t '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the governor of our city
  - type: text
    text: ' Zebul '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zebul
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “big shot” or “lofty one.”
    marker-yv: yv-n
  - type: text
    text: 'his deputy? Why should we take orders from him; we are descendants of Hamor, Shechem’s founder. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 33:19
      metadata:
        usfm: GEN.33.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Hamor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “an ass [donkey].”
    marker-yv: yv-n
  - type: text
    text: 'Why should we be slaves of Abimelech? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'If only the people of Shechem were under my command, then I would get rid of him. I would say to Abimelech, ‘Assemble your whole army! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: We’ll defeat them all!
  - type: text
    text: ’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Zebul, the governor of the city, was infuriated when he heard of the taunts of Gaal son of Ebed. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'He secretly sent messengers to Abimelech, saying, “Gaal son of Ebed and his clan have come to Shechem. They’re inciting the entire city against you. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Now then, under the cover of darkness, you and your men should come and take up concealed positions in the fields. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: At sunrise launch your surprise attack and advance against the city. When Gaal and his men come out to face you, fight them with all of your might.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “do whatever your hand finds to do.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Eccl. 9:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'So Abimelech and all his men set out by night and took up concealed positions near Shechem in four groups. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Gaal son of Ebed went out and stood in the entrance of the gate of the city just as Abimelech and his soldiers got up from their hiding places.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: When Gaal saw them, he said to Zebul, “Look, an army is marching down from the hilltops!”
- type: usfm
  marker: p
  children:
  - type: text
    text: Zebul replied, “That’s nothing but shadows in the hills; they only look like men.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Gaal spoke up again: “No, look! I see people coming down the center, and another group from the direction of Oracle Oak.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then Zebul said to him, “Where is all your big talk now? Weren’t you the loudmouth who said, ‘Who is Abimelech that he could make us his slaves?’ The men you ridiculed are now coming to fight you! Go ahead—go and fight them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'So Gaal led the men of Shechem and went out to fight Abimelech. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Abimelech chased him, and many Shechemites fell wounded and died before they could retreat to the city gate. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Abimelech returned to his headquarters at Arumah, while Zebul drove Gaal and his clan out of Shechem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'The next day Abimelech found out that the people of Shechem were planning to go out on a foray into the countryside. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'So he divided his men into three groups, and they set out to ambush the Shechemites in the fields. As soon as Abimelech saw the people leaving the city, he sprang up and attacked them. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Abimelech and his men advanced rapidly and occupied the city gate. The other two companies chased them down out into the open fields and killed them. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Abimelech fought hard all day at the gate of Shechem until he had captured the city. He massacred all its people, leveled the city to rubble, and scattered salt over it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Abimelech may have scattered salt over the city as a sign that retribution had been served over the gross injustice of the people of Shechem. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 29:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 17:6
      metadata:
        usfm: JER.17.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Shechem was rebuilt 150 years later in the reign of Jeroboam (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 12:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'When they heard the news, the leading citizens living in the Shechem Tower ran into the stronghold of the temple of Baal-Berith. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'When Abimelech heard that they had assembled there, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'he and all his forces went up Mount Zalmon. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:48
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Zalmon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “dark one”; it possibly refers to Mount Ebal.
    marker-yv: yv-n
  - type: text
    text: 'Taking an axe in his hand, he cut off some branches and hoisted the bundle onto his shoulders. He ordered the men with him, “Quick! Do the same!” '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: So each one cut a bundle of branches and followed Abimelech. They piled them against the walls of the temple and with the people inside they set it on fire. So everyone who fled into the tower of Shechem died; nearly a thousand men and women perished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Next, Abimelech attacked the city of Thebez '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Thebez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “brightness.” It possibly refers to Tirzah.
    marker-yv: yv-n
  - type: text
    text: 'and captured it. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'All the people had fled to the Tower of Strength in the middle of the city. They locked themselves in and climbed up onto the tower roof. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Abimelech advanced as far as the tower, stormed it, and set it on fire. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: But a woman dropped a millstone on his head and fractured his skull.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Abimelech cried out to his armor-bearer, “Kill me with your sword so no one can say I was killed by a woman.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:54
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 11:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'So his servant ran him through, and he died. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: When the Israelites saw that Abimelech was dead, everyone went home.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'God avenged the evil that Abimelech had done to his father by murdering his seventy brothers. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'God also punished the Shechemites for all their wickedness. '
  - type: usfm
    marker: it
    children:
    - type: text
      text: That day
  - type: text
    text: ', the curse of Jotham son of Baal-Fighter was fulfilled.'
