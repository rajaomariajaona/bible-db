document_id: JDG.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Abimelech’s Conspiracy
  - type: text
    content: 'Abimelech '
  - type: note
    content: Abimelech means “my father is king.”
  - type: text
    content: son of Baal-Fighter (
  - type: text
    content: or Gideon
  - type: text
    content: ') went to his mother’s brothers and to the rest of her clan in Shechem and said to them, '
  '10':
  - type: text
    content: “Next, the trees said to the fig tree, ‘Come and be our king.’
  '11':
  - type: text
    content: “But the fig tree replied, ‘What? Give up my good, sweet fruit to hold sway over the trees?’
  '12':
  - type: text
    content: “Then the trees said to the vine, ‘Come and be our king.’
  '13':
  - type: text
    content: “But the vine answered, ‘What? Give up my wine, which cheers both gods and men, to hold sway over the trees?’
  - type: note
    content: 'The three trees represent what believers enjoy in following Christ: (1) Olive tree—the oil of anointing of the Holy Spirit. (2) Fig tree—the goodness and sweetness of Christ’s love. (3) Vine—the joy and cheer that Jesus brings to our lives.'
  '14':
  - type: text
    content: “Finally, all the trees said to the thornbush, ‘Come and be our king.’
  '15':
  - type: text
    content: '“The thornbush replied, ‘If you really want to anoint me your king, then come and put your trust in my shade. '
  - type: note
    content: A thornbush offers no shade, and Abimelech (the thornbush) offered neither shelter nor care to Israel.
  - type: text
    content: If you don’t, then let fire blaze out of my thorny branches and consume the cedars of Lebanon!’
  '16':
  - type: text
    content: '“Now then let me ask you this: Do you really think you did a right and honorable thing when you made Abimelech king? Do you think you treated Baal-Fighter and his family fairly? '
  '17':
  - type: text
    content: 'And to think that my father fought for you, and risked his life '
  - type: note
    content: Or “cast away his soul to a distance.”
  - type: text
    content: 'to save you from the power of the Midianites! '
  '18':
  - type: text
    content: 'Today, you have revolted against my father’s family, murdered his seventy sons on a single stone, and made Abimelech, the son of his slave girl, king over the citizens of Shechem because he’s your close relative. '
  '19':
  - type: text
    content: What were you thinking?
  - type: text
    content: ' If you have acted honorably and done what is right by Baal-Fighter and his family today, then may you enjoy Abimelech, '
  - type: text
    content: this thornbush king of yours
  - type: text
    content: ', and may he enjoy you too! '
  '2':
  - type: text
    content: '“Ask all the leaders '
  - type: note
    content: Or “baals [lords].” In Judges, the word “baal” is found only in this chapter and is used thirteen times in reference to leaders.
  - type: text
    content: 'of Shechem, ‘Which do you prefer: to have just one man as your ruler or have seventy of Baal-Fighter’s sons rule over you?’ And don’t forget, I’m your own flesh and blood.”'
  '20':
  - type: text
    content: But if not, let fire come out from Abimelech and consume you, citizens of Shechem and Beth Millo, and let fire come out from you, citizens of Shechem and Beth Millo, and consume Abimelech!”
  '21':
  - type: text
    content: 'After shouting these words, Jotham ran away and went to live at the Well '
  - type: note
    content: Or “Beer.” Some scholars have identified this place as Beeroth.
  - type: text
    content: because he was afraid of his brother Abimelech.
  - type: heading
    content: King Abimelech
  '22':
  - type: text
    content: 'After Abimelech had ruled Israel for three years, '
  - type: note
    content: God did not hand over Israel to a foreign power but to an unscrupulous ruler, Abimelech.
  '23':
  - type: text
    content: 'God sent a spirit to stir up hostility '
  - type: note
    content: Or “a hostile spirit” or “a spirit of dissension.”
  - type: text
    content: 'between Abimelech and the citizens of Shechem, and they rebelled against him. '
  '24':
  - type: text
    content: 'God '
  - type: text
    content: sent this judgment
  - type: text
    content: ' in order to avenge the brutal murder of Baal-Fighter’s seventy sons and the shedding of their blood. Righteous retribution caught up with both Abimelech, who had instigated the murder of his half brothers, and the citizens of Shechem, who had aided and abetted him. '
  '25':
  - type: text
    content: In their uprising against Abimelech, the citizens of Shechem placed bandits on the hilltops to ambush and rob everyone who passed by, and Abimelech heard of their treachery.
  '26':
  - type: text
    content: 'One day, a man named Gaal son of Ebed '
  - type: note
    content: Gaal means “to loathe” or “hateful.” It was possibly a nickname. A related Hebrew word means “dung beetle.” Ebed means “servant.” If Gaal is not his actual name, it could be translated “a loathsome [dung beetle],” “hateful man,” or “a servant’s son.” This derisive name hints at his low social status. He was a troublemaker.
  - type: text
    content: 'moved with his clan into Shechem, '
  - type: note
    content: Or “went on the prowl into Shechem.”
  - type: text
    content: 'and Gaal won the confidence of the people. '
  '27':
  - type: text
    content: 'After the grape harvest, they trod the grapes and celebrated a festival '
  - type: note
    content: Or “a praise-festival.”
  - type: text
    content: 'in the temple of '
  - type: text
    content: Baal
  - type: text
    content: ', their god. While they were drinking and feasting, they cursed Abimelech. '
  '28':
  - type: text
    content: 'Gaal son of Ebed '
  - type: text
    content: rose and
  - type: text
    content: ' said, “Who is this Abimelech? We are the Shechemites now! Why should we serve him? Isn’t he Baal-Fighter’s son, and isn’t '
  - type: text
    content: the governor of our city
  - type: text
    content: ' Zebul '
  - type: note
    content: Zebul means “big shot” or “lofty one.”
  - type: text
    content: 'his deputy? Why should we take orders from him; we are descendants of Hamor, Shechem’s founder. '
  - type: note
    content: See Gen. 33:19. Hamor means “an ass [donkey].”
  - type: text
    content: 'Why should we be slaves of Abimelech? '
  '29':
  - type: text
    content: 'If only the people of Shechem were under my command, then I would get rid of him. I would say to Abimelech, ‘Assemble your whole army! '
  - type: text
    content: We’ll defeat them all!
  - type: text
    content: ’ ”
  '3':
  - type: text
    content: 'When the brothers repeated these words to the leaders of Shechem, their hearts were drawn to Abimelech, for they said, “He is '
  - type: text
    content: from our hometown and
  - type: text
    content: ' from our own clan.” '
  '30':
  - type: text
    content: 'Zebul, the governor of the city, was infuriated when he heard of the taunts of Gaal son of Ebed. '
  '31':
  - type: text
    content: 'He secretly sent messengers to Abimelech, saying, “Gaal son of Ebed and his clan have come to Shechem. They’re inciting the entire city against you. '
  '32':
  - type: text
    content: 'Now then, under the cover of darkness, you and your men should come and take up concealed positions in the fields. '
  '33':
  - type: text
    content: At sunrise launch your surprise attack and advance against the city. When Gaal and his men come out to face you, fight them with all of your might.”
  - type: note
    content: Or “do whatever your hand finds to do.” See Eccl. 9:10.
  '34':
  - type: text
    content: 'So Abimelech and all his men set out by night and took up concealed positions near Shechem in four groups. '
  '35':
  - type: text
    content: Gaal son of Ebed went out and stood in the entrance of the gate of the city just as Abimelech and his soldiers got up from their hiding places.
  '36':
  - type: text
    content: When Gaal saw them, he said to Zebul, “Look, an army is marching down from the hilltops!”
  - type: text
    content: Zebul replied, “That’s nothing but shadows in the hills; they only look like men.”
  '37':
  - type: text
    content: 'Gaal spoke up again: “No, look! I see people coming down the center, and another group from the direction of Oracle Oak.”'
  '38':
  - type: text
    content: Then Zebul said to him, “Where is all your big talk now? Weren’t you the loudmouth who said, ‘Who is Abimelech that he could make us his slaves?’ The men you ridiculed are now coming to fight you! Go ahead—go and fight them!”
  '39':
  - type: text
    content: 'So Gaal led the men of Shechem and went out to fight Abimelech. '
  '4':
  - type: text
    content: 'They gave him seventy shekels of silver '
  - type: note
    content: That is, they gave one shekel for each of Abimelech’s seventy brothers, essentially saying each one was worth only a shekel to them.
  - type: text
    content: 'from the temple of Baal-Berith, '
  - type: note
    content: Or “Baal [lord]-of-the-covenant.”
  - type: text
    content: 'and Abimelech used it to hire reckless scoundrels to follow him. '
  '40':
  - type: text
    content: 'Abimelech chased him, and many Shechemites fell wounded and died before they could retreat to the city gate. '
  '41':
  - type: text
    content: Abimelech returned to his headquarters at Arumah, while Zebul drove Gaal and his clan out of Shechem.
  '42':
  - type: text
    content: 'The next day Abimelech found out that the people of Shechem were planning to go out on a foray into the countryside. '
  '43':
  - type: text
    content: 'So he divided his men into three groups, and they set out to ambush the Shechemites in the fields. As soon as Abimelech saw the people leaving the city, he sprang up and attacked them. '
  '44':
  - type: text
    content: 'Abimelech and his men advanced rapidly and occupied the city gate. The other two companies chased them down out into the open fields and killed them. '
  '45':
  - type: text
    content: Abimelech fought hard all day at the gate of Shechem until he had captured the city. He massacred all its people, leveled the city to rubble, and scattered salt over it.
  - type: note
    content: Abimelech may have scattered salt over the city as a sign that retribution had been served over the gross injustice of the people of Shechem. See Deut. 29:23; Jer. 17:6. Shechem was rebuilt 150 years later in the reign of Jeroboam (see 1 Kings 12:25).
  '46':
  - type: text
    content: 'When they heard the news, the leading citizens living in the Shechem Tower ran into the stronghold of the temple of Baal-Berith. '
  '47':
  - type: text
    content: 'When Abimelech heard that they had assembled there, '
  '48':
  - type: text
    content: 'he and all his forces went up Mount Zalmon. '
  - type: note
    content: Zalmon means “dark one”; it possibly refers to Mount Ebal.
  - type: text
    content: 'Taking an axe in his hand, he cut off some branches and hoisted the bundle onto his shoulders. He ordered the men with him, “Quick! Do the same!” '
  '49':
  - type: text
    content: So each one cut a bundle of branches and followed Abimelech. They piled them against the walls of the temple and with the people inside they set it on fire. So everyone who fled into the tower of Shechem died; nearly a thousand men and women perished.
  '5':
  - type: text
    content: 'He went to his father’s home in Ophrah and on one stone executed his seventy brothers, '
  - type: note
    content: The majority of the seventy brothers whom Abimelech killed were his half brothers.
  - type: text
    content: 'the sons of Baal-Fighter. Jotham, Baal-Fighter’s youngest son, escaped and went into hiding. '
  '50':
  - type: text
    content: 'Next, Abimelech attacked the city of Thebez '
  - type: note
    content: Thebez means “brightness.” It possibly refers to Tirzah.
  - type: text
    content: 'and captured it. '
  '51':
  - type: text
    content: 'All the people had fled to the Tower of Strength in the middle of the city. They locked themselves in and climbed up onto the tower roof. '
  '52':
  - type: text
    content: 'Abimelech advanced as far as the tower, stormed it, and set it on fire. '
  '53':
  - type: text
    content: But a woman dropped a millstone on his head and fractured his skull.
  '54':
  - type: text
    content: 'Abimelech cried out to his armor-bearer, “Kill me with your sword so no one can say I was killed by a woman.” '
  - type: note
    content: See 2 Sam. 11:21.
  - type: text
    content: 'So his servant ran him through, and he died. '
  '55':
  - type: text
    content: When the Israelites saw that Abimelech was dead, everyone went home.
  '56':
  - type: text
    content: 'God avenged the evil that Abimelech had done to his father by murdering his seventy brothers. '
  '57':
  - type: text
    content: 'God also punished the Shechemites for all their wickedness. '
  - type: text
    content: That day
  - type: text
    content: ', the curse of Jotham son of Baal-Fighter was fulfilled.'
  '6':
  - type: text
    content: 'All the citizens of Shechem and Beth Millo '
  - type: note
    content: Beth Millo means “house of fullness.” Beth Millo may have been the tower of Shechem (see v. 46).
  - type: text
    content: gathered beside the sacred tree at the pillar in Shechem and crowned Abimelech king.
  - type: heading
    content: 'Jotham’s Fable: The Thornbush King'
  '7':
  - type: text
    content: 'When Jotham learned about this, he climbed up on the top of Mount Gerizim '
  - type: note
    content: This was the mountain where half of the tribes of Israel proclaimed the blessings over the people if they kept the covenant (see Deut. 27:12). It stood opposite Ebal where the other half of the tribes proclaimed curses on the disobedient. Further, Joshua renewed the covenant at Shechem where he wrote the words of the law on a plastered stone that stood between Ebal and Gerizim (see Josh. 24:1–28).
  - type: text
    content: 'and shouted: “Listen to me, citizens of Shechem, so that God may listen to you. '
  '8':
  - type: text
    content: All the trees one day determined to anoint a king for themselves. They said to the olive tree, ‘Be our king.’
  '9':
  - type: text
    content: “But the olive tree answered, ‘What? Give up my rich oil that is used to honor both gods and men, to hold sway over the trees?’
