    children:
    - type: text
      text: Jesus Sends Out His Apostles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus summoned together his twelve apostles '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from certain Greek manuscripts and implied in the context.
      marker-yv: yv-n
    - type: text
      text: 'and imparted to them authority over every demon and the power to heal every disease. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Months later
    - type: text
      text: ', '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Matthew infers that they had been sent north and east, possibly as far as Persia to preach to the Jewish residents there, which would take them months to return.
      marker-yv: yv-n
    - type: text
      text: 'the apostles returned from their ministry tour and told Jesus all the wonders and miracles they had witnessed. Jesus, wanting to be alone with the Twelve, quietly slipped away with them toward Bethsaida. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Bethsaida means “house of fishing.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Crowds soon found out about it and took off after him. When they caught up with Jesus, he graciously welcomed them all, taught them more about God’s kingdom, and healed all who were sick.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As the day wore on, the Twelve came to Jesus and told him, “It’s getting late. You should send the crowds to the surrounding villages and farms to get something to eat and find shelter for the night. There’s nothing to eat here in the middle of nowhere.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have the food to feed them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Greek text, the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: you
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here is emphatic. Jesus told his disciples they had food to give to others. Because Jesus lives within us, we can give others the living bread and, if need be, multiply food for others to eat. We are to focus on what we have, not on what we don’t have.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They replied, “All we have are these five small loaves of bread and two dried fish. Do you really expect us to go buy food for all these people? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There are nearly five thousand men here, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with women and children besides
    - type: text
      text: '!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There were likely ten thousand people whom Jesus miraculously fed that day.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He told his disciples, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Have them all sit down in groups of fifty each.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is an interesting correlation between seating the people in groups of fifty and the feast of Pentecost. Fifty was the number of days between Passover and Pentecost.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After everyone was seated, Jesus took the five loaves and two fish, and gazing into the heavenly realm he gave thanks for the food. Then, in the presence of his disciples, he broke off pieces of bread and fish, and kept giving more to each disciple to give to the crowd. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: It was multiplying before their eyes!
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So everyone ate until they were filled, and afterward the disciples gathered up the leftovers—it came to exactly twelve baskets full!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prophesies His Death and Resurrection
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One time, Jesus was praying in a quiet place with his disciples nearby. He went to them and asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who do people think I am?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They answered, “Some are convinced you’re the prophet John who has returned. Others say you are Elijah, or perhaps one of the Jewish prophets brought back from the dead.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he commissioned them to proclaim God’s kingdom and to heal the sick to demonstrate that the kingdom had arrived. As he sent them out, he gave them these instructions: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But who do you believe that I am?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter said, “You are the Anointed One, God’s Messiah!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus gave them strict orders not to tell this to anyone yet, saying, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Son of Man
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the true Man.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is destined to experience great suffering and face complete rejection by the Jewish leaders and religious hierarchy.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is literally “the elders, chief priests, and scribes.” These three groups were represented in the religious hierarchy of the Sanhedrin, a council of seventy-one leaders.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will be killed and raised back to life on the third day.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: What it Means to Follow Jesus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to all of his followers, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you truly desire to be my disciple, you must disown your life completely, embrace my ‘cross’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could also mean being willing to suffer and die for Christ.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: as your own,
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: and surrender to my ways.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For if you choose self-sacrifice, giving up your lives for my glory, you will discover true life. But if you choose to keep your lives for yourselves, you will lose what you try to keep.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even if you gained all the wealth and power of this world, and all the things it could offer you, yet lost your soul in the process, what good is that?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So why then are you ashamed of being my disciple? Are you ashamed of the revelation-truth
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: logos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I give to you?
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I, the Son of Man, will one day return in my radiant brightness, with the holy angels and in the splendor and majesty of my Father. On that day I will be ashamed of everyone who has been ashamed of me.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I promise you this: there are some of you standing here right now who will not die until you have witnessed the presence and the power of God’s kingdom realm.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus prophesied of what was about to take place with Peter, Jacob (James), and John on the Mountain of Transforming Glory. This promise was fulfilled when they experienced the power of God’s kingdom realm and the cloud of glory.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The True Glory of Jesus
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eight days later, Jesus took Peter, Jacob, and John and climbed a high mountain to pray. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he prayed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse is a clear statement of the power of prayer to transform us and release God’s glory in our life. It is impossible to overemphasize the importance of prayer in the life of a believer. Indeed, the present-day ministry of Jesus is to intercede for us on high (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 7:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'his face began to glow until a blinding glory streamed from him. A radiant glory illuminated his entire body. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: His brightness
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text says, “The appearance of his face was altered.” The light shone through his clothing as his glorified body became brilliant with light. This is called Jesus’ transfiguration.
      marker-yv: yv-n
    - type: text
      text: became so intense that it made his clothing blinding white, as multiple flashes of lightning.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Take nothing extra on your journey.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Why did Jesus tell them to go empty-handed? To trust and walk in faith. But also because they already had the five items they were told not to bring, as their spiritual counterparts are found in him (i.e., he is our treasure, our strength, our living bread, our provider, and our righteousness).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Just go as you are. Don’t carry a staff, a backpack, food, money, not even a change of clothes.
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All at once, two men appeared in glorious splendor: Moses and Elijah. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:30–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Moses was the lawgiver, and Elijah was the notable and true prophet. Their appearance with Jesus on the Mountain of Transforming Glory points to the supremacy of Jesus over the Law and the prophets. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 24:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'They spoke with Jesus about his soon departure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:30–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The actual word in Greek is translated “exodus.”
      marker-yv: yv-n
    - type: text
      text: 'from this world and the things the Father destined him to accomplish '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:30–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: What a word is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: accomplish
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '! Jesus was about to die in Jerusalem. We don’t think of death as an accomplishment, but for Jesus, it was the marvelous accomplishment of salvation and victory for all who follow him.'
      marker-yv: yv-n
    - type: text
      text: in Jerusalem.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter and his companions had become very drowsy, but they became fully awake when they saw the glory and splendor of Jesus standing there and the two men with him.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Moses and Elijah were about to return to heaven, Peter impetuously blurted, “Master, this is amazing to see the three of you together! Why don’t we stay here and set up three shelters: one for you, one for Moses, and one for Elijah?”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although Peter was not understanding the importance of this event, he did put Jesus first and left himself out altogether. Peter longed to remain in the glory he witnessed on the mountain.
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Peter was still speaking, a radiant cloud of glory formed above them and overshadowed them. As the glory cloud enveloped them, they were struck with fear. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the voice of God thundered from within the cloud, “This is my Son, my Beloved One. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Several Greek manuscripts have “my Chosen One.”
      marker-yv: yv-n
    - type: text
      text: Listen carefully to all he has to say.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Father, the Son, and the Holy Spirit are all mentioned in this account. The Father spoke, the Son was transfigured, and the Spirit (in the form of the glory cloud) overshadowed those on the mountain.
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the thunderous voice faded away and the cloud disappeared, Jesus was standing there alone. Peter, Jacob, and John were awestruck. But they didn’t say a word to anyone about what they had seen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Power of Faith
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day, a massive crowd was waiting at the foot of the mountain to meet them. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A man in the crowd shouted desperately, “Please, Teacher, I beg of you, do something about my son, my only son. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'An evil spirit possesses him and makes him scream out in torment, and hardly ever leaves him alone. It throws him into convulsions and he foams at the mouth. When it finally does leave him, he’s left with horrible bruises. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whatever home welcomes you as a guest, remain there and make it your base of ministry.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I begged your disciples to drive it out of him, but they didn’t have enough power to do it.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You are an unbelieving people with no faith! You twist your lives with lies that have turned you away from doing the right things. How much longer should I remain here, offering you hope?”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from Aramaic text. Some translate this phrase “How long must I endure you?” However, the Aramaic root word for “endure” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sebar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “hope” or “good news.”'
      marker-yv: yv-n
    - type: text
      text: 'Then he said to the man, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Bring your son to me.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the boy approached, the demon slammed him to the ground and threw him into violent convulsions. Jesus sternly commanded the demon to come out of the boy, and it left immediately. Jesus healed the boy of his injuries and returned him to his father, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saying
    - type: text
      text: ', '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: “Here is your son.”
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone was awestruck and stunned to see such power and the majesty of God flow through Jesus. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Everyone marveled, trying to process what they had just witnessed. Jesus then turned to his disciples and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Listen carefully and let these words sink into your hearts. The Son of Man is about to be betrayed and surrendered to the authority of men.”
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the disciples could not grasp the meaning of what he was saying, for it was a veiled mystery to them, and they were too embarrassed to ask him to explain it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True Greatness
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The disciples began to argue and became preoccupied over who would be the greatest one among them. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fully aware of their innermost thoughts, Jesus called a little child to his side and said to them, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If you tenderly care for this little child
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The little child is representative of unimportant people in general. Treating the least with care and respect makes us truly great.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: on my behalf, you are tenderly caring for me. And if you care for me, you are honoring my Father who sent me. The one who is least important in your eyes is actually the most important one of all.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciple John said, “Master, we found someone casting out demons using your name and we tried to stop him, because he doesn’t follow you as we do.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And wherever your ministry is rejected, you are to leave that town and shake the dust off your shoes as a testimony before them.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shaking the dust off their feet would be a statement against the people who had rejected the gospel, that the messengers would not be responsible for their fate. More than a metaphor, this was an actual custom of the day. However, the words “before them” can also be translated “against them.” Shaking the dust off their feet did not mean they were to stomp off offended and angry, but that they would move on with no defilement or unforgiveness in their hearts toward those who rejected their message. If they did not do that, they would take the “dust” of that offense to the next place they ministered.
      marker-yv: yv-n
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You shouldn’t have hindered him, for anyone who is not against you is your friend.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:50
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jealousy blinds our hearts. Nine disciples combined could not cast out a demon spirit (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and they were jealous of this one who did.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Journey to Jerusalem
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus let nothing distract him from departing for Jerusalem because the time for him to be lifted up '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “Lifted up” refers to the cross, where Jesus was lifted up on a tree to bear the sins of all humankind. His exaltation into glory was through the sacrifice of his life on Calvary’s cross. Nothing would turn him aside from being our Sin-Bearer and Redeemer.
      marker-yv: yv-n
    - type: text
      text: 'drew near, and he was full of passion to complete his mission there. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he sent messengers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The most literal translation is “He sent angels before his face.”
      marker-yv: yv-n
    - type: text
      text: 'ahead of him as envoys to a village of the Samaritans. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as they approached the village, the people turned them away. They would not allow Jesus to enter, for he was on his way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to worship in Jerusalem
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Samaritans had their own place of worship on Mount Gerizim, and they were hostile toward Jews, who wanted to worship in Jerusalem. There were many cultural, religious, and ethnic hostilities between Jews and Samaritans.
      marker-yv: yv-n
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the disciples Jacob and John realized what was happening, they returned to Jesus and said, “Lord, if you wanted to, you could command fire to fall down from heaven, just as Elijah did '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:54
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This sentence is translated from the Aramaic. The earliest Greek manuscripts do not include “just like Elijah did.” Some Greek texts state that the disciples asked, “Do you want us to call down fire and destroy them?”
      marker-yv: yv-n
    - type: text
      text: and destroy all these wicked people.”
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus rebuked them sharply, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t you realize what spews from your hearts when you say that? The Son of Man did not come to destroy life, but to bring life to the earth.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:55
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Translated from Aramaic and a few Greek manuscripts. This pericope reveals the mercy of Jesus. Although the Samaritans refused entry to Jesus and his disciples, in the next chapter Jesus uses an example of a good Samaritan who cared for a stranger. Jesus saw in the Samaritan outcasts a redemptive future (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 10:25–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). He knew the Father had the grace to change even the most stubborn individuals. An entire Samaritan village received Jesus through the witness of a woman (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 4:39–42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and later, as recorded in the book of Acts, the entire region of the Samaritans received the gospel (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 8:9–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). We can never give up on those who seem to be wayward.
      marker-yv: yv-n
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they went to another village instead.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cost to Follow Jesus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On their way, someone came up to Jesus and said, “I want to follow you wherever you go.”
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Yes, but remember this: even animals in the field have holes in the ground to sleep in, and birds have their nests, but the Son of Man has no place to lay down his head.”'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus then turned to another and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come be my disciple.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He replied, “Someday I will, Lord, but allow me first to fulfill my duty as a good son '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:59
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The text is literally “Allow me first to go and bury my father.” This is an idiom for waiting until his father passed away. He wanted an inheritance in this life as his security.
      marker-yv: yv-n
    - type: text
      text: and wait until my father passes away.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The apostles departed and went into the villages with the wonderful news of God’s kingdom, and they healed diseases wherever they went.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Herod Perplexed
    marker-yv: yv-h
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t wait for your father’s burial. Let those who are already dead wait for death. As for you, go and proclaim everywhere that God’s kingdom has arrived.”
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Still another said to him, “Lord, I want to follow you too. But first let me go home and say good-bye to my entire family.”
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus responded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why do you keep looking back to your past and have second thoughts about following me? If you turn back you are not fit for God’s kingdom.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, Herod, the governor, was confused and perplexed when he heard reports of all the miracles of Jesus and his apostles. Many were saying, “John the Baptizer has come back to life!” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Others said, “This has to be Elijah who has reappeared or one of the prophets of old who has risen from the dead.” These were the rumors circulating throughout the land.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Herod exclaimed, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Who is this Man? I keep hearing about him over and over. It can’t be the prophet John; I had him beheaded!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 6:14–29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: So, Herod was very eager to meet Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Feeds Thousands
    marker-yv: yv-h
