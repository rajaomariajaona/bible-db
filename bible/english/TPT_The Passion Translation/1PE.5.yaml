document_id: 1PE.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Elders and the Victor’s Crown of Glory
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, I encourage you as an elder, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter had already identified himself as an apostle (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), but now he takes a humble position equal to that of local church elder. Peter’s identification with the church elders becomes a powerful example of true spiritual leadership.
      marker-yv: yv-n
    - type: text
      text: 'an eyewitness of the sufferings of Christ, and one who shares in the glory that is about to be unveiled. I urge my fellow elders among you '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And then, after your brief suffering, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “slight suffering.” When we are in the midst of suffering, we are convinced it will never end. Peter reminds us that all of our trials are slight, brief, and temporary, but the glory we experience is eternal.
      marker-yv: yv-n
    - type: text
      text: 'the God of all loving grace, who has called you to share in his eternal glory in Christ, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts have “Christ Jesus.” The calling of every believer is to share in the glory of God unveiled in Christ. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 17:22–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:18–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 28–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 2:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'will personally and powerfully restore you and make you stronger than ever. Yes, he will set you firmly in place and build you up. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter knows what he is talking about. After his ordeal of denying three times that he even knew Jesus, God restored him and made him strong. Jesus prophesied to Peter that he would “strengthen the faith of [his] brothers.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 22:31–32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Both of Peter’s letters are anointed by the Holy Spirit to give you strong faith that will not give up.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he has all the power needed to do this '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “To him belongs all the power” (to do this).
      marker-yv: yv-n
    - type: text
      text: '—forever! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “May power be to him forever!” That is, all the power needed to strengthen and build up God’s people belongs to him.
      marker-yv: yv-n
    - type: text
      text: Amen.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concluding Remarks
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, Peter, with the help of Silas, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “through Silvanus.” This could mean that Silas (Silvanus) assisted Peter in writing this letter and/or that he was the courier who brought it to the churches. In the book of Acts, Silas was a ministry partner of Paul who accompanied him on his first and second missionary journeys (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and was imprisoned with Paul in Philippi (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). However, in the epistles, Silas is named Silvanus (the Latin form of Silas). It is believed that Silas was one of the seventy disciples Jesus sent out and that he became the bishop of Thessalonica and was eventually martyred for his faith. The name Silas is the Greek form of the Aramaic name Saili (Saul).
      marker-yv: yv-n
    - type: text
      text: 'whom I consider a trustworthy, faith-filled brother, have written you this short letter so that I might encourage you and personally testify that this is the true, dependable grace of God. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic adds a clause, “by which you have been resurrected.”
      marker-yv: yv-n
    - type: text
      text: Stand fast in this grace.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She who is in Babylon, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Your true sister in Babylon.” This is a literal reference to the church of Babylon, according to the Aramaic. Since the Greek feminine pronoun is used here, many scholars have concluded that this is an allusion to the church, although some believe it could have been a reference to Peter’s wife. Furthermore, Babylon may be a metaphor for the Roman Empire or even the city of Rome.
      marker-yv: yv-n
    - type: text
      text: who is co-elect with you, sends her greetings, along with Mark, my son.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A possible reference to one of Peter’s spiritual disciples, his spiritual “son” is most likely John Mark, a relative of Barnabas (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), who was the author of the Gospel that bears his name. Many believe that Peter was the literary source for much of Mark’s Gospel. See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Acts 12:25–14:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 18:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Tim. 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Philem. 24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greet one another with a kiss of peace.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 16:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 5:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peace to all who are in life union with Christ. Amen.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: compassionate
    - type: text
      text: ' shepherds who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: tenderly
    - type: text
      text: ' care for God’s flock and who feed them well, for you have the responsibility to guide, protect, and oversee. Consider it a joyous pleasure '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'and not merely a religious duty. Lead from the heart under God’s leadership—not as a way to gain finances dishonestly but as a way '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to
    - type: text
      text: ' eagerly and cheerfully '
    - type: usfm
      marker: it
      children:
      - type: text
        text: serve
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Don’t be controlling tyrants '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “masters of the flock” (elevated above all others).
      marker-yv: yv-n
    - type: text
      text: 'but lead others by your beautiful examples to the flock. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the Shepherd-King '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Chief Shepherd.” The Aramaic can be translated “Lord of the shepherds.”
      marker-yv: yv-n
    - type: text
      text: appears, you will win the victor’s crown of glory that never fades away.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In these few verses Peter gives us the seven qualities of true shepherds who serve as elders for the flock: (1) They understand that they serve God’s flock, not their own. (2) They lovingly guide and care for God’s people. (3) They take the responsibilities of oversight willingly. (4) They are eager to serve, not eager for financial gain. (5) They feed and nurture God’s people. (6) They reject a domineering leadership model. (7) They lead by examples of godliness and humility.'
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, the younger ones should willingly support '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hupotasso
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “submit,” it is more often used for “support.” See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 5:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'the leadership of the elders. In every relationship, each of you must wrap around yourself the apron of a humble servant. Because:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God resists you when you are proud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but multiplies grace and favor when you are humble.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 3:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Humility and Faith
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you bow low in God’s awesome presence, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “under his mighty hands.”
      marker-yv: yv-n
    - type: text
      text: he will eventually exalt you as you leave the timing in his hands.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour out all your worries and stress upon him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and leave them there
    - type: text
      text: ', for he always tenderly cares for you.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Load upon him your every anxiety, for he is always watching over you with tender care.” See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 55:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be well balanced and always alert, because your enemy, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: antidikos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a legal term for one who presses a lawsuit that must be defended.
      marker-yv: yv-n
    - type: text
      text: 'the devil, roams around incessantly, like a roaring lion looking for its prey to devour. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The implication in the context is that if you do not bring your worries and cares to God, the devil will use depression and discouragement to devour you. Just as lions go after the feeble, the young, and the stragglers, so the enemy of our souls will always seek out those who are isolated, alone, or depressed to devour them.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take a decisive stand against him and resist his every attack with strong, vigorous faith. For you know that your believing brothers and sisters around the world are experiencing the same kinds of troubles you endure. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Suffering, in part, comes from the activity of the devil. There are sufferings that must be resisted in faith, as part of an attack from our adversary.
      marker-yv: yv-n
