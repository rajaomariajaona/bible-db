document_id: PSA.70,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Cry for Help
  - type: text
    content: To the Pure and Shining One
  - type: text
    content: David’s poetic lament to always remember
  - type: text
    content: Please, Lord! Come quickly and rescue me!
  - type: text
    content: God, show me your favor and restore me.
  '2':
  - type: text
    content: Let all who seek my life be humiliated and confused.
  - type: text
    content: God, send them sprawling, all who wish me evil;
  - type: text
    content: they just want me dead.
  '3':
  - type: text
    content: Scoff at every scoffer and cause them all to be utter failures!
  - type: text
    content: Let them be ashamed and horrified over their complete defeat.
  '4':
  - type: text
    content: But let all who passionately seek you erupt with excitement and joy
  - type: text
    content: over what you’ve done!
  - type: text
    content: Let all your devoted lovers, who continually rejoice in the Savior,
  - type: note
    content: This verse contains the Hebrew root word for Yeshua.
  - type: text
    content: say aloud, “How great and glorious is our God!”
  '5':
  - type: text
    content: Lord, in my place of weakness and need,
  - type: text
    content: won’t you turn your heart toward me and hurry to help me?
  - type: text
    content: For you are my Savior, and I’m always in your thoughts.
  - type: text
    content: So don’t delay to deliver me now, for you are my God.
