document_id: PSA.70,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: A Cry for Help
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: David’s poetic lament to always remember
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Please, Lord! Come quickly and rescue me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, show me your favor and restore me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let all who seek my life be humiliated and confused.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, send them sprawling, all who wish me evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they just want me dead.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Scoff at every scoffer and cause them all to be utter failures!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them be ashamed and horrified over their complete defeat.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: But let all who passionately seek you erupt with excitement and joy
  - type: usfm
    marker: q1
    children:
    - type: text
      text: over what you’ve done!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all your devoted lovers, who continually rejoice in the Savior,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 70:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse contains the Hebrew root word for Yeshua.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: say aloud, “How great and glorious is our God!”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Lord, in my place of weakness and need,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: won’t you turn your heart toward me and hurry to help me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are my Savior, and I’m always in your thoughts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So don’t delay to deliver me now, for you are my God.
