        text: There are varying viewpoints on the identity of Melchizedek; some scholars view Melchizedek as merely a type or picture of Christ or a Canaanite royal priest. Others believe that he was a Christophany, a pre-incarnate appearance of Christ as both a priest of the Most High God and the King of Salem (peace). He appeared out of nowhere, with no genealogy or pedigree other than being a king-priest. Two Dead Sea scrolls dating back to at least the first century BC found in Cave 11 at Qumran (11Q13, 11QMelch), state that Melchizedek was a divine being, and was given the Hebrew title
    - type: usfm
