document_id: GEN.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram Rescues Lot
  - type: text
    content: 'During the reign of Amraphel '
  - type: note
    content: Amraphel most likely means “speaker of dark secrets.” Some Assyriologists and scholars identify him as the famous King Hammurabi of Babylon.
  - type: text
    content: 'king of Babylon, '
  - type: note
    content: Or “Shinar,” which means “country of two rivers.”
  - type: text
    content: 'he allied with three other kings: Arioch '
  - type: note
    content: Arioch means “fierce lion.”
  - type: text
    content: 'king of Ellasar, '
  - type: note
    content: Or “Larsa,” a city-state of lower Chaldea. It was the center of the cult of the sun-god Utu. It is recognized as modern Tell Senkereh in Iraq. Ellasar means “God is chastener.”
  - type: text
    content: 'Kedorlaomer '
  - type: note
    content: Kedorlaomar means “the servant of the goddess Lagamar [no mercy].”
  - type: text
    content: 'king of Elam, '
  - type: note
    content: Elam means “hidden” and was an ancient pre-Iranian kingdom in Persia. Susa was its principal city.
  - type: text
    content: 'and Tidal '
  - type: note
    content: Tidal means “great son.” He was a chief (king) of various nomadic tribes in Mesopotamia.
  - type: text
    content: 'king of Goyim. '
  - type: note
    content: Goyim was likely a country east of the Tigris in the lowlands of Mesopotamia called Gutium. Goyim is also the Hebrew word for “nations” or “peoples.”
  '10':
  - type: text
    content: 'Now the valley of Siddim was full of tar pits, and as the kings of Sodom and Gomorrah and their armies retreated from the battle and fled, some of them fell into the tar pits, and the rest fled to the hill country. '
  '11':
  - type: text
    content: 'The four victorious kings captured all the possessions and all the food of Sodom and Gomorrah and left. '
  '12':
  - type: text
    content: They captured Lot, Abram’s nephew who had been living in Sodom, and took him and all his possessions.
  '13':
  - type: text
    content: 'One who escaped came to Abram the Hebrew and told him what had happened to Lot. Abram was living by the oaks of Mamre the Amorite. Mamre had two brothers, Eshcol '
  - type: note
    content: Eshcol means “cluster.”
  - type: text
    content: 'and Aner, who were allied by treaty with Abram. '
  '14':
  - type: text
    content: 'When Abram heard that his nephew Lot had been taken captive by the four kings, he mobilized all the men in his camp, '
  - type: note
    content: These were not only warriors but also disciples (Hb. hanikh, “trained ones”) of Abram. It was God who supernaturally won this battle, for Abram was facing numerous fierce tribal warriors. Abram realized that the battle would be won with God’s help. Abram was a noble man, for he could have easily left Lot, who chose to live in Sodom, in the hands of his captors.
  - type: text
    content: '318 in all who had been born and trained in his own household, and he pursued the invaders as far '
  - type: text
    content: north
  - type: text
    content: ' as Dan. '
  '15':
  - type: text
    content: 'Then, during the night, Abram strategically divided his forces and defeated them. His forces attacked them and routed them as far as Hobah, '
  - type: note
    content: Hobah means “hiding place.”
  - type: text
    content: 'north of Damascus. '
  '16':
  - type: text
    content: He recovered all the stolen possessions and brought back his nephew Lot, together with the women and all the prisoners.
  - type: heading
    content: Abram Blessed by Melchizedek
  '17':
  - type: text
    content: 'After Abram returned from defeating Kedorlaomer and the kings who were with him, the king of Sodom went out to meet Abram at the valley of the Shaveh '
  - type: note
    content: Shaveh means “level” or “equal [equalize].”
  - type: text
    content: '(known as the King’s Valley). '
  - type: note
    content: The King’s Valley later became known as the Kidron Valley. But the events of this chapter happened in the King’s Valley—the low place where we meet the King.
  '18':
  - type: text
    content: 'And Melchizedek, '
  - type: note
    content: 'There are varying viewpoints on the identity of Melchizedek; some scholars view Melchizedek as merely a type or picture of Christ or a Canaanite royal priest. Others believe that he was a Christophany, a pre-incarnate appearance of Christ as both a priest of the Most High God and the King of Salem (peace). He appeared out of nowhere, with no genealogy or pedigree other than being a king-priest. Two Dead Sea scrolls dating back to at least the first century BC found in Cave 11 at Qumran (11Q13, 11QMelch), state that Melchizedek was a divine being, and was given the Hebrew title Elohim. According to this text, Melchizedek proclaimed the Day of Atonement as a day coming when one will atone for the sins of the people and will be their supernatural deliverer and their judge (see Wise, Abegg, Cook [1996]. The Dead Sea Scrolls: A New Translation). See also footnote on Ps. 110:4; Heb. 4:14–15; 5:6, 10; 6:19–20; 7:1–21. In John 8:56, Jesus said that “Abraham . . . foresaw me coming and was filled with delight!” Abraham saw the day of Jesus as Melchizedek came out to meet him with bread and wine.'
  - type: text
    content: 'who was both a priest of the Most High God and the king of Salem, '
  - type: note
    content: Salem is the name of ancient Jerusalem. See Ps. 76:2. Melchizedek was a priest on behalf of whom? Not the Jews, for Abram was yet to have a son. Rather, it was on behalf of the gentiles. God established a priesthood over the gentiles before he brought forth a priesthood over the Jews. Melchizedek was a gentile king over a gentile city. Gentiles have been in the heart of God from the beginning.
  - type: text
    content: 'brought out to Abram bread and wine. '
  - type: note
    content: Bread and wine is the substance of the Lord’s Table. Melchizedek brought a Communion service to Abram.
  '19':
  - type: text
    content: He spoke over him a special blessing, saying,
  - type: text
    content: “Blessed is Abram by God Most High,
  - type: note
    content: Or “El Elyon.”
  - type: text
    content: 'Creator '
  - type: note
    content: Or “Possessor.”
  - type: text
    content: of heaven and earth.
  '2':
  - type: text
    content: 'These four kings went to war against five kings: Bera '
  - type: note
    content: Bera means “with evil.”
  - type: text
    content: 'king of Sodom, '
  - type: note
    content: Sodom means “burning.”
  - type: text
    content: 'Birsha '
  - type: note
    content: Birsha means “with wickedness.”
  - type: text
    content: 'king of Gomorrah, '
  - type: note
    content: Gomorrah means “submersion.”
  - type: text
    content: 'Shinab '
  - type: note
    content: Although some believe Shinab means “splendor of the father,” the Midrash (Ber. Rab. 42) explains Shinab as sho’-ebh mammon, “one who draws money [wherever he can].”
  - type: text
    content: 'king of Admah, '
  - type: note
    content: Admah means “earth fortress.”
  - type: text
    content: 'Shemeber '
  - type: note
    content: Shemeber likely means “known for being strong.”
  - type: text
    content: 'king of Zeboiim, '
  - type: note
    content: Zeboiim means “gathering of troops” or “gazelles [beautiful ones]” and is recognized as modern Tsvoyim.
  - type: text
    content: 'and the king of Bela, '
  - type: note
    content: Bela means “destruction.”
  - type: text
    content: 'which is Zoar. '
  - type: note
    content: Zoar means “insignificant” or “small.”
  '20':
  - type: text
    content: And blessed be God Most High,
  - type: text
    content: 'whose '
  - type: text
    content: power
  - type: text
    content: ' delivered your enemies into your hands!”'
  - type: note
    content: Abram was not a warrior; he was a prophet. Yet with God’s power behind him, he became a conqueror and won a battle against great odds. Only God gets the glory with every victory we experience.
  - type: text
    content: 'Abram gave Melchizedek a tenth '
  - type: text
    content: of all he possessed
  - type: text
    content: '. '
  - type: note
    content: See Heb. 7:4–10.
  '21':
  - type: text
    content: 'Then the king of Sodom said to Abram, “Just give me the people you rescued; keep all the spoils for yourself.” '
  '22':
  - type: text
    content: 'But Abram said to the king of Sodom, “I raised my hand to '
  - type: text
    content: Yahweh
  - type: text
    content: ', God Most High, and I pledged a solemn oath to the Possessor of heaven and earth '
  '23':
  - type: text
    content: 'that I would keep nothing for myself that belongs to you, not even a thread of a garment or sandal strap. That way, you will never be able to say, ‘I was the one that made Abram rich.’ '
  - type: note
    content: Abram resisted the temptation for acquiring wealth apart from a relationship with God. He wanted God to be his boast and his true wealth. See Jer. 9:24; 1 Cor. 1:31; 10:13.
  '24':
  - type: text
    content: I will take nothing except what my young men have eaten, and the share of those who went with me—Aner, Eshcol, and Mamre. Let them take their share.”
  '3':
  - type: text
    content: 'Kedorlaomer had oppressed these five kings for twelve years until they rebelled against him in the thirteenth year. They all became regional allies in the valley of Siddim, '
  - type: note
    content: Siddim means “division” or “demons.”
  - type: text
    content: which is now the Dead Sea.
  '5':
  - type: text
    content: 'In the fourteenth year, Kedorlaomer went to war with his allied kings. They defeated the Rephaites '
  - type: note
    content: Or “giants.” See Deut. 3:11. The Hebrew word Rephaim also means “shades [ghosts]” or “spirits of the dead.” See Ps. 88:10; Isa. 26:14, 19.
  - type: text
    content: 'in Ashteroth-karnaim, '
  - type: note
    content: Ashteroth was a Canaanite goddess of fertility and coupled with karnaim means “goddess of two horns.” Ashteroth-karnaim was the likely capital city of Og, king of Bashan, east of Lake Galilee.
  - type: text
    content: 'the Zuzites '
  - type: note
    content: Or “Zuzim.” Zuzites means “roving creatures.”
  - type: text
    content: 'in Ham, '
  - type: note
    content: The city of Ham may be the ancient name of the Ammonite capital Rabboth-Ammon.
  - type: text
    content: 'the Emites '
  - type: note
    content: Or “Emim.” Emites means “terrors.” Emites is the Moabite name of a people of giants who once occupied Moab. See Deut. 2:10–11.
  - type: text
    content: 'in Shavah-kiriathaim, '
  - type: note
    content: Shavah-kiriathaim means “the plain of the two cities.”
  '6':
  - type: text
    content: 'and the Horites '
  - type: note
    content: Horites means “cave dwellers.” Mt. Hor is the location where the first high priest, Aaron, was buried. Mt. Hor is near Petra in Jordan. See Num. 20:22–28.
  - type: text
    content: 'in the hill country of Seir, '
  - type: note
    content: Seir means “hairy” or “shaggy” and refers to the mountainous area south of the Dead Sea located in Edom.
  - type: text
    content: 'as far as El Paran '
  - type: note
    content: El Paran means “beautiful oaks.”
  - type: text
    content: 'near the desert. '
  - type: note
    content: The invasion route began east of the Jordan, moved southward, and returned northward toward the Dead Sea, conquering as they went, finally defeating the five kings.
  '7':
  - type: text
    content: 'Then they turned back and attacked En-mishpat '
  - type: note
    content: En-mishpat means “the spring of decision” or “spring of judgment.” Kadesh means “sacred.” En-mishpat is identified as modern ‘Ayn Qadeis, fifty miles south of Beersheba.
  - type: text
    content: '(that is, Kadesh) and subdued all the country of the Amalekites '
  - type: note
    content: Amalekites means “warlike” or “valley dwellers.”
  - type: text
    content: 'and the Amorites '
  - type: note
    content: Amorites means “sayers” or “mountain dwellers.”
  - type: text
    content: who lived in Hazazon-tamar.
  - type: note
    content: Hazazon-tamar means “dividing the date palm” and is identified in 2 Chron. 20:2 as En-gedi, a town on the western shore of the Dead Sea. The tribes mentioned in vv. 5–7 were likely some of the “giants” that were in the land. See Deut. 2:10–11, 20–21; 3:11–13; Josh. 12:4; 13:12; 15:8.
  '8':
  - type: text
    content: 'Then the king of Sodom, the king of Gomorrah, the king of Admah, the king of Zeboiim, and the king of Bela (that is, Zoar), marched out in battle formation in the valley of Siddim. '
  '9':
  - type: text
    content: 'There they faced off against Kedorlaomer, king of Elam; Tidal, king of Goyim; Amraphel, king of Babylon; '
  - type: note
    content: Or “Shinar,” a name for ancient Babylon.
  - type: text
    content: 'and Arioch, king of Ellasar—four kings against five. '
