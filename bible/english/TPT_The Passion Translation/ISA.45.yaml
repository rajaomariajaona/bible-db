document_id: ISA.45,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Shepherd, Cyrus
  - type: text
    content: '“This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to his anointed one,'
  - type: note
    content: Or “Messiah [Anointed One].” The Septuagint reads “To Cyrus, my Christ.” Cyrus became an amazing picture of Jesus, the Anointed One (see Acts 10:38). Both Cyrus and Jesus are called shepherds (see Isa. 44:28; Heb. 13:20) who will perform all God’s pleasure (see John 8:29). God took the right hands of both Cyrus and Christ (see Heb. 10:12–13) and subdued nations before them (see Ps. 2; Phil. 3:21). Both Cyrus and Christ had open doors before them (see Rev. 3:7–8) and were given the treasures of darkness (see Matt. 27:45) and the hidden riches of secret places (see Mark 1:35; Col. 2:3; Rev. 2:17).
  - type: text
    content: 'Cyrus, '
  - type: note
    content: Cyrus, the Persian king, is mentioned twenty-two times in the Bible. His name means “the rays of the sun.” God calls him his “shepherd” (Isa. 44:28) and his “anointed one” (Isa. 45:1). On October 12, 539 BC, he conquered Babylon and its king, Nabonidus, and his son Belshazzar (see Dan. 5:25–31). It is possible that Daniel, after the fall of Babylon, showed Cyrus the prophecies of Jer. 25:11–12 and 29:10.
  - type: text
    content: 'whose right hand I have grasped '
  - type: text
    content: as my servant
  - type: note
    content: That is, God is about to take Cyrus as a partner to accomplish heaven’s purpose.
  - type: text
    content: to conquer nations and dethrone their kings.
  - type: note
    content: Or “The belts of their kings I will loosen,” a Hebrew idiom for disarming or dethroning. Babylon was taken in one night by Cyrus. Belshazzar, the Chaldean king, was killed. See Dan. 5:1–31.
  - type: text
    content: For I will open doors before him
  - type: text
    content: and no fortified gate will remain closed.
  '10':
  - type: text
    content: Shame on the one who complains to a father,
  - type: text
    content: ‘Why in the world did you conceive me?’
  - type: text
    content: Or to a mother, ‘Why in the world did you bring me to birth?’ ”
  '11':
  - type: text
    content: 'Listen to what '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: 'the Holy One of Israel, the One who shaped him, has to say:'
  - type: text
    content: “Why do you question me about the destiny of my children
  - type: note
    content: 'Or “ask me about things to come concerning my children.” If “ask” should be taken in the imperative mood, then the sense would probably be ironic: “Go ahead and question me concerning the things to come; command me concerning my children and the works of my hands.”'
  - type: text
    content: or tell me what to do with my children and what I have made?
  '12':
  - type: text
    content: I created the earth and populated it with people.
  - type: text
    content: With my own hands, I spread out the cosmos
  - type: text
    content: 'and then commanded the starry host '
  - type: text
    content: to shine
  - type: text
    content: '!'
  '13':
  - type: text
    content: 'I am the one who raised him '
  - type: note
    content: Although God has raised up Christ and us in righteousness, the context here points to Cyrus.
  - type: text
    content: up in righteousness!
  - type: text
    content: I will make all his paths straight and level.
  - type: text
    content: He will build my city and release my exiled people,
  - type: text
    content: not because he was bribed or hired to do it,
  - type: text
    content: 'declares the Almighty '
  - type: text
    content: Yahweh
  - type: text
    content: '!”'
  - type: heading
    content: Yahweh, the Hope of the Nations
  '14':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says '
  - type: text
    content: to Cyrus
  - type: text
    content: ':'
  - type: text
    content: '“Egypt’s wealth, Cush’s '
  - type: note
    content: Or “Ethiopia’s.”
  - type: text
    content: treasures, and the tall Sabeans
  - type: note
    content: A people group that once lived in the southern parts of Arabia (modern-day Yemen).
  - type: text
    content: will all be handed over to you.
  - type: text
    content: In chains they will walk behind you.
  - type: text
    content: They will be brought before you and they will bow down
  - type: text
    content: and address you reverently, saying,
  - type: text
    content: ‘Truly God is with you. He alone is God, and there is no other.’ ”
  '15':
  - type: text
    content: Truly, O God of Israel, the Savior,
  - type: text
    content: you are a God who hides himself.
  - type: note
    content: Or “a God who keeps himself hidden.” These words of Isaiah show us that God must be revealed by his Spirit to each heart.
  '16':
  - type: text
    content: All the idol-makers will be ashamed and disgraced,
  - type: text
    content: and each one will walk away in confusion.
  '17':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' saves Israel with everlasting salvation!'
  - type: text
    content: You will not be put to shame nor disgraced for all eternity!
  '18':
  - type: text
    content: 'This is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, heaven’s Creator, who alone is God.'
  - type: text
    content: He created the earth, shaped it, and established it all by himself.
  - type: text
    content: 'He made it fit and orderly and beautiful '
  - type: note
    content: Or “He did not create it a chaos.”
  - type: text
    content: for its inhabitants.
  - type: text
    content: 'He says:'
  - type: text
    content: '“I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', and there is no other god.'
  '19':
  - type: text
    content: I didn’t whisper in secret, in a realm of darkness.
  - type: text
    content: I didn’t say to Jacob’s tribes,
  - type: text
    content: ‘Seek me in vain.’
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: I speak the truth and declare to you what is right!
  '2':
  - type: text
    content: “ ‘I will march out in front of you and level every obstacle.
  - type: note
    content: Or “every swelling,” a possible metaphor for what looms up in front of you.
  - type: text
    content: I will shatter to pieces bronze doors
  - type: text
    content: and slice through iron bars.
  '20':
  - type: text
    content: “Come together! Assemble yourselves!
  - type: text
    content: Draw near, you refugees from among the nations.
  - type: text
    content: 'Those who parade their '
  - type: text
    content: powerless
  - type: text
    content: ' wooden idols'
  - type: text
    content: have no revelation-knowledge.
  - type: text
    content: They keep on praying to gods who cannot save them.
  '21':
  - type: text
    content: Declare what is to be and state your case.
  - type: text
    content: Go ahead and take counsel together.
  - type: text
    content: Who knew all about this and declared it long ago?
  - type: text
    content: 'Was it not I, '
  - type: text
    content: Yahweh
  - type: text
    content: '? There is no god apart from me.'
  - type: text
    content: I am a righteous God and a Savior.
  - type: text
    content: There is no one you can compare to me.
  '22':
  - type: text
    content: So turn your heart to me, face me now,
  - type: text
    content: and be saved wherever you are,
  - type: text
    content: even from the ends of the earth,
  - type: text
    content: for I alone am God, and there is no other.
  '23':
  - type: text
    content: I make this solemn oath to you in my own name;
  - type: text
    content: this word sent from my mouth in righteousness
  - type: text
    content: 'will not return unfulfilled:'
  - type: text
    content: ‘Truly every knee will bow before me
  - type: text
    content: and every tongue will solemnly swear allegiance to me!’
  '24':
  - type: text
    content: All will say of me,
  - type: text
    content: '‘Yes! Only in '
  - type: text
    content: Yahweh
  - type: text
    content: ' do I find righteousness and strength!’'
  - type: text
    content: And all who were angry with me
  - type: text
    content: will come before me and regret it!
  '25':
  - type: text
    content: 'In '
  - type: text
    content: Yahweh
  - type: text
    content: ', all of Israel’s offspring will triumph '
  - type: note
    content: Or “will be made right again.” See Rom. 11:26–27.
  - type: text
    content: and shine!”
  '3':
  - type: text
    content: I will give you hidden treasures of darkness
  - type: note
    content: God is light, so what could be these treasures of darkness? They are the things/truths/revelations that dark powers have stolen from us, God’s people. We will reclaim what was originally part of our inheritance but was stolen and perverted. Revelation that was once hidden will now be brought into the light.
  - type: text
    content: and wealth waiting in secret sites
  - type: text
    content: 'so that you recognize me, for it is I, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the God of Israel, who calls you by your name!
  - type: note
    content: 'The Hebrew wording allows for this possible translation: “I, Yahweh, who calls you by your name, the gods [judges or mighty ones] of Israel.” The word for “gods” is elohim (plural) and is translated in some verses as “judges.” See Ps. 82:1, 6.'
  '4':
  - type: text
    content: For the sake of my servant Jacob, and Israel my chosen,
  - type: text
    content: I call you by your name and give you a title of honor.
  - type: text
    content: But you don’t even know me.
  '5':
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the only God there is,'
  - type: text
    content: and you’ll never find another.
  - type: text
    content: 'I will strengthen you '
  - type: text
    content: for victory
  - type: text
    content: ','
  - type: text
    content: even though you do not intimately know who I am.
  '6':
  - type: text
    content: Yet through you
  - type: text
    content: ' everyone will know who I really am.'
  - type: text
    content: Those from the rising sun in the east to the west,
  - type: text
    content: everyone everywhere will know
  - type: text
    content: 'that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the one and only God,'
  - type: text
    content: and there is no other.
  - type: note
    content: 'There are four reasons God chose and favored Cyrus, the heathen king: (1) so that Cyrus would acknowledge the greatness of God; (2) to accomplish God’s purpose with Judah (see Ps. 78:68–72); (3) so the nations would see that Yahweh is the only true God; and (4) so Jerusalem would be rebuilt.'
  '7':
  - type: text
    content: I create light, and I make it dark.
  - type: text
    content: 'I make bliss, '
  - type: note
    content: This is the Hebrew word shalom and can be translated “prosperity,” “bliss,” “wholeness,” “completeness,” “health,” “peace,” “welfare,” “safety,” “soundness,” “tranquility,” “perfectness,” “fullness,” “rest,” “harmony,” or “the absence of agitation or discord.” Shalom comes from a root verb meaning “to be complete, perfect, and [paid in] full.”
  - type: text
    content: and I create adversity.
  - type: note
    content: Or “woe,” “disaster,” “calamity [judgment],” “affliction,” “disturbance,” “distress,” “misery,” or “trouble.”
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' who does all these things.’'
  '8':
  - type: text
    content: “Shower down righteousness, O heavens above.
  - type: text
    content: Let the clouds drip with deliverance!
  - type: text
    content: 'Let earth’s womb open and bear salvation’s '
  - type: note
    content: The Hebrew word for “salvation,” yĕshuw’ah, is nearly identical to the Hebrew name Yeshua (Jesus).
  - type: text
    content: fruit,
  - type: text
    content: with righteousness rising up beside it!
  - type: note
    content: Or “and blossom with mercy” (LXX).
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have created all of them!'
  '9':
  - type: text
    content: Shame on the one who argues with his Creator,
  - type: text
    content: like one clay pot among other pots arguing with the potter.
  - type: text
    content: Should the clay say to the potter,
  - type: text
    content: ‘What in the world are you doing with me?
  - type: text
    content: Your hands are clumsy’?
  - type: note
    content: Or “Your work has no hands [or handles].” This is a way of saying, “What you’re doing with me shows that you have no skill, like someone who has no hands trying to form me!”
