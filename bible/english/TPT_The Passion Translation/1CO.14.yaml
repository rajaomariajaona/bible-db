        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul uses these four ministries as examples of what builds up the church. Every congregation needs to focus on all four (revelation from God, insights of truth, prophecy, and teaching), as they are all necessary today.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Similarly, if musical instruments, such as flutes or stringed instruments, are out of tune and don’t play the arrangement clearly, how will anyone recognize the melody? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the bugle makes a garbled sound, who will recognize the signal to show up for the battle? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So it is with you. Unless you speak in a language that’s easily understood, how will anyone know what you’re talking about? You might as well save your breath!
