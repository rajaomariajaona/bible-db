          text: zēloō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “a boiling fervor.”
      marker-yv: yv-n
    - type: text
      text: 'to prophesy and don’t forbid anyone from speaking in tongues, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The one who speaks in tongues advances his own spiritual progress, '
