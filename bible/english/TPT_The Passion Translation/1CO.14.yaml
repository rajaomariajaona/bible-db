        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'but are to be in a support role, as in fact the law teaches. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
