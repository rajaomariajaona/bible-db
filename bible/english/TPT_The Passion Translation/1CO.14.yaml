      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “intimate knowledge through experience.”
      marker-yv: yv-n
    - type: text
      text: 'or with a prophecy, or with a clear teaching, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I can enrich you
    - type: text
      text: '. '
    - type: usfm
