  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I would be delighted if you all spoke in tongues, but I desire even more that you impart prophetic revelation to others. Greater gain comes through the one who prophesies than the one who speaks in tongues, unless there is interpretation so that it builds up the entire church.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My dear friends, what good is it if I come to you always speaking in tongues? But if I come with a clear revelation from God, or with insight, '
    - type: usfm
      marker: f
      children:
