  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If they want to inquire about something, let them ask their husbands when they get home, for a woman embarrasses herself when she constantly interrupts the church meeting.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One interpretation of this passage is that Paul is quoting from a letter written by the Corinthians to him. They were the ones saying a woman should remain silent and Paul is responding to their questions. In other words, they were imposing a rule in the church that Paul refutes in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '36'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Some manuscripts move vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34–35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: to after v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '40'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which causes a few scholars to consider this as evidence of an early introduction into the text by Jewish scribes. The only two places in the New Testament where Paul writes about women being quiet or not teaching in the church are in his letters to the church of Ephesus (1 Timothy) and Corinth. Both cities were centers of worship to the goddess Artemis (Diana), where women had the leading roles of teaching and temple prostitution was commonplace. To the Galatians Paul writes that there is no distinction between believing men and women ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gal. 3:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you actually think that you were the starting point for the Word of God going forth? Were you the only ones it was sent to? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I don’t think so!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Inferred by the rhetorical question and the disjunctive particle.
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If anyone considers himself to be a prophet or a spiritual person, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a spiritually gifted person.”
      marker-yv: yv-n
    - type: text
      text: 'let him discern that what I’m writing to you carries the Lord’s authority. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if anyone continues not to recognize this, he should not be recognized!
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, beloved friends, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “brothers and sisters.”
      marker-yv: yv-n
    - type: text
      text: 'with all this in mind, be passionate '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
