document_id: 1CO.14,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Proper Use of Spiritual Gifts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is good that you are enthusiastic and passionate about spiritual gifts, especially prophecy. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that you crave spiritual things” or “that you crave spiritual realities.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I suppose that the world has all sorts of languages, and each conveys meaning to the ones who speak it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I am like a foreigner if I don’t understand the language, and the speaker will be like a foreigner to me. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And that’s what’s happening among you. You are so passionate '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word implies a boiling over with affection and emotion.
      marker-yv: yv-n
    - type: text
      text: about embracing the manifestations of the Holy Spirit! Now become even more passionate about the things that strengthen the entire church.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, if you speak in a tongue, pray for the interpretation to be able to unfold the meaning of what you are saying. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if I am praying in a tongue, my spirit is engaged in prayer but I have no clear understanding of what is being said.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So here’s what I’ve concluded. I will pray in the Spirit, but I will also pray with my mind engaged. I will sing rapturous praises in the Spirit, but I will also sing with my mind engaged. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Otherwise, if you are praising God in your spirit, how could someone without the gift participate by adding his “amen” to your giving of thanks, since he doesn’t have a clue of what you’re saying? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your praise to God is admirable, but it does nothing to strengthen and build up others.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I give thanks to God that I speak in tongues more than all of you, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but in the church setting I would rather speak five words that can be understood than ten thousand exotic words in a tongue. That way I could have a role in teaching others.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Function of the Gifts
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When someone speaks in tongues, no one understands a word he says, because he’s not speaking to people, but to God—he is speaking intimate mysteries in the Spirit. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse makes it clear that the tongues Paul refers to are not known languages but Spirit-inspired utterances.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved ones, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “brothers and sisters.”
      marker-yv: yv-n
    - type: text
      text: don’t remain as immature children in your reasoning. As it relates to evil, be like newborns, but in your thinking be mature adults.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it stands written in the law:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: I will bring my message to this people with strange tongues and foreign lips, yet even then they still will not listen to me, says the Lord.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 28:49
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 28:11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, tongues are not a sign for believers, but a miracle for unbelievers. Prophecy, on the other hand, is not for unbelievers, but a miracle sign for believers.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If the entire church comes together and everyone is speaking in tongues, won’t the visitors say that you have lost your minds? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if everyone is prophesying, and an unbeliever or one without the gift enters your meeting, he will be convicted by all that he hears and will be called to account, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for the intimate secrets of his heart will be brought to light. He will be mystified and fall facedown in worship and say, “God is truly among you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Truly God is in you.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guidelines for Use of the Gifts
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved friends, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “brothers and sisters.”
      marker-yv: yv-n
    - type: text
      text: 'what does all this imply? When you conduct your meetings, you should always let everything be done to build up the church family. Whether you share a song of praise, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a psalm.”
      marker-yv: yv-n
    - type: text
      text: a teaching, a divine revelation, or a tongue and interpretation, let each one contribute what strengthens others.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If someone speaks in a tongue, it should be two or three, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could be a Greek idiom (lit. by twos and threes) meaning “just a few.”
      marker-yv: yv-n
    - type: text
      text: 'one after another, with someone interpreting. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If there’s no one with the interpretation, then he should remain silent in the meeting, content to speak to himself and to God.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: And the same with prophecy
    - type: text
      text: '. Let two or three prophets prophesy and let the other prophets carefully evaluate and discern what is being said. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when someone prophesies, he speaks to encourage people, to build them up, and to bring them comfort. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: paramythia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a hapax legomenon) could also be translated “soothing, calming speech” or “affirmation.” Paul does not describe prophecy here as predictive, but as influential to advance the spiritual welfare of the body.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if someone receives a revelation while someone else is still speaking, the one speaking should conclude '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and allow the one with fresh revelation the opportunity to share it
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God wants a fresh word spoken to his people. The churches must allow God’s “now” voice to be heard and evaluated by the written Word.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you can all prophesy in turn and in an environment where all present can be instructed, encouraged, and strengthened. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The spirits of the prophets are subject to the prophets. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic allows for this translation: “The prophecies (spiritual words) of the prophets are subject to the prophets,” which could imply that the prophet is to be accountable with his/her prophecies. From the context it appears that the Corinthians were speaking in tongues and prophesying without regarding others in the body who also had prophetic words to share or a tongue and interpretation. This caused disorder and confusion in the church meetings, with people speaking up and giving their opinions about what was spoken.'
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God is the God of harmony, not confusion, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “instability.”
      marker-yv: yv-n
    - type: text
      text: as is the pattern in all the churches of God’s holy believers.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The women '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wives.”
      marker-yv: yv-n
    - type: text
      text: 'should be respectfully silent '
    - type: usfm
      marker: it
      children:
      - type: text
        text: during the evaluation of prophecy in the meetings
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the greater context. The theme Paul is addressing is unity and mutual edification, not simply the role of women. Women are permitted to speak in church, to prophesy, and to minister the gospel. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 11:2–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 14:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Paul is apparently prohibiting interrupting the leaders as they evaluate prophetic utterances. It is likely that Paul was addressing a specific issue taking place in the church fellowship of Corinth with women interrupting the meetings with their opinions and questions about the prophetic words just spoken, possibly even words spoken by their husbands.
      marker-yv: yv-n
    - type: text
      text: 'They are not allowed to interrupt, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “speak.” Interrupting the meeting is implied when compared with
      - type: usfm
