  children:
  - type: text
    text: His Tender Love
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Let everyone thank God, for he is good, and he is easy to please!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Give thanks to God, our King over all gods!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Give thanks to the Lord over all lords!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Give thanks to the only miracle-working God!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Give thanks to the Creator who made the heavens with wisdom!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
