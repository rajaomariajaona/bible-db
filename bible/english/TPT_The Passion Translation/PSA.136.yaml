document_id: PSA.136,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: His Tender Love
  - type: text
    content: Let everyone thank God, for he is good, and he is easy to please!
  - type: text
    content: His tender love for us continues on forever!
  '10':
  - type: text
    content: Give thanks to God, who struck down the firstborn in Egypt!
  - type: text
    content: His tender love for us continues on forever!
  '11':
  - type: text
    content: He brought his people out of Egypt with miracles!
  - type: text
    content: His tender love for us continues on forever!
  '12':
  - type: text
    content: With his mighty power he brought them out!
  - type: text
    content: His tender love for us continues on forever!
  '13':
  - type: text
    content: He split open the Red Sea for them!
  - type: text
    content: His tender love for us continues on forever!
  '14':
  - type: text
    content: And led his people right through the middle!
  - type: text
    content: His tender love for us continues on forever!
  '15':
  - type: text
    content: He vanquished Pharaoh’s armies, drowning them all!
  - type: text
    content: His tender love for us continues on forever!
  '16':
  - type: text
    content: He led his people through the wilderness!
  - type: text
    content: His tender love for us continues on forever!
  '17':
  - type: text
    content: He’s the one who smashed mighty kingdoms!
  - type: text
    content: His tender love for us continues on forever!
  '18':
  - type: text
    content: He triumphed over powerful kings who stood in his way!
  - type: text
    content: His tender love for us continues on forever!
  '19':
  - type: text
    content: He conquered Sihon, king of the Amorites!
  - type: text
    content: His tender love for us continues on forever!
  '2':
  - type: text
    content: Give thanks to God, our King over all gods!
  - type: text
    content: His tender love for us continues on forever!
  '20':
  - type: text
    content: He conquered the giant named Og, king of Bashan!
  - type: note
    content: The name Og means “giant.”
  - type: text
    content: His tender love for us continues on forever!
  '21':
  - type: text
    content: Then he gave away their lands as an inheritance!
  - type: text
    content: His tender love for us continues on forever!
  '22':
  - type: text
    content: For he handed it all over to Israel, his beloved!
  - type: text
    content: His tender love for us continues on forever!
  '23':
  - type: text
    content: He’s the God who chose us when we were nothing!
  - type: text
    content: His tender love for us continues on forever!
  '24':
  - type: text
    content: He has rescued us from the power of our enemies!
  - type: text
    content: His tender love for us continues on forever!
  '25':
  - type: text
    content: He provides food for hungry men and animals!
  - type: text
    content: His tender love for us continues on forever!
  '26':
  - type: text
    content: Give thanks to the great God of the heavens!
  - type: text
    content: His tender love for us continues on forever!
  '3':
  - type: text
    content: Give thanks to the Lord over all lords!
  - type: text
    content: His tender love for us continues on forever!
  '4':
  - type: text
    content: Give thanks to the only miracle-working God!
  - type: text
    content: His tender love for us continues on forever!
  '5':
  - type: text
    content: Give thanks to the Creator who made the heavens with wisdom!
  - type: note
    content: See Ps. 104:24; Prov. 8:27–31.
  - type: text
    content: His tender love for us continues on forever!
  '6':
  - type: text
    content: To him who formed dry ground, raising it up from the sea!
  - type: text
    content: His tender love for us continues on forever!
  '7':
  - type: text
    content: Praise the one who created every heavenly light!
  - type: text
    content: His tender love for us continues on forever!
  '8':
  - type: text
    content: He set the sun in the sky to rule over day!
  - type: text
    content: His tender love for us continues on forever!
  '9':
  - type: text
    content: Praise him who set in place the moon and stars to rule over the night!
  - type: text
    content: His tender love for us continues on forever!
