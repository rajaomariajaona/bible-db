- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: To him who formed dry ground, raising it up from the sea!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Praise the one who created every heavenly light!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He set the sun in the sky to rule over day!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Praise him who set in place the moon and stars to rule over the night!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Give thanks to God, who struck down the firstborn in Egypt!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He brought his people out of Egypt with miracles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: With his mighty power he brought them out!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He split open the Red Sea for them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And led his people right through the middle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He vanquished Pharaoh’s armies, drowning them all!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He led his people through the wilderness!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He’s the one who smashed mighty kingdoms!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He triumphed over powerful kings who stood in his way!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He conquered Sihon, king of the Amorites!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He conquered the giant named Og, king of Bashan!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 136:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The name Og means “giant.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then he gave away their lands as an inheritance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For he handed it all over to Israel, his beloved!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He’s the God who chose us when we were nothing!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He has rescued us from the power of our enemies!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He provides food for hungry men and animals!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Give thanks to the great God of the heavens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His tender love for us continues on forever!
