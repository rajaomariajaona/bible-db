document_id: PSA.141,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: An Evening Prayer
  - type: text
    content: King David’s poetic song
  - type: text
    content: Please, Lord, come close and come quickly to help me!
  - type: text
    content: Listen to my prayer as I call out to you.
  '10':
  - type: text
    content: Let them all stumble into their own traps
  - type: text
    content: while I escape without a scratch!
  '2':
  - type: text
    content: Let my prayer be as the evening sacrifice
  - type: text
    content: that burns like fragrant incense, rising as my offering to you
  - type: text
    content: as I lift up my hands in surrendered worship!
  '3':
  - type: text
    content: God, give me grace to guard my lips
  - type: note
    content: The Septuagint reads “Set a fortress door before my lips.”
  - type: text
    content: from speaking what is wrong.
  '4':
  - type: text
    content: Guide me away from temptation and doing evil.
  - type: text
    content: Save me from sinful habits and from keeping company
  - type: text
    content: with those who are experts in evil.
  - type: text
    content: Help me not to share in their sin in any way!
  '5':
  - type: text
    content: When one of your godly ones corrects me
  - type: text
    content: or one of your faithful ones rebukes me,
  - type: text
    content: I will accept it like an honor I cannot refuse.
  - type: text
    content: It will be as healing medicine that I swallow
  - type: text
    content: without an offended heart.
  - type: text
    content: Even if they are mistaken, I will continue to pray.
  - type: note
    content: This is one of most difficult verses to translate, with scholars divided over the meaning of the Hebrew text. Another translation could be “Don’t let the oil of the wicked anoint my head, for I pray continually against their wickedness.”
  '6':
  - type: text
    content: When the leaders and judges are condemned,
  - type: text
    content: falling upon the rocks of justice,
  - type: note
    content: See 2 Chron. 25:12.
  - type: text
    content: then they’ll know my words to them were true!
  '7':
  - type: text
    content: Like an earthquake splits open the earth,
  - type: text
    content: so the world of hell will open its mouth
  - type: text
    content: to swallow their scattered bones.
  '8':
  - type: text
    content: But you are my Lord and my God; I only have eyes for you!
  - type: text
    content: I hide myself in you, so don’t leave me defenseless.
  '9':
  - type: text
    content: Protect me! Keep me from the traps of wickedness they set for me.
