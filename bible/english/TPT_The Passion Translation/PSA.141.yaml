document_id: PSA.141,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: An Evening Prayer
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Please, Lord, come close and come quickly to help me!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my prayer as I call out to you.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Let them all stumble into their own traps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while I escape without a scratch!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let my prayer be as the evening sacrifice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that burns like fragrant incense, rising as my offering to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I lift up my hands in surrendered worship!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: God, give me grace to guard my lips
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 141:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “Set a fortress door before my lips.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from speaking what is wrong.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Guide me away from temptation and doing evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me from sinful habits and from keeping company
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with those who are experts in evil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help me not to share in their sin in any way!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When one of your godly ones corrects me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or one of your faithful ones rebukes me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will accept it like an honor I cannot refuse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be as healing medicine that I swallow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: without an offended heart.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they are mistaken, I will continue to pray.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 141:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is one of most difficult verses to translate, with scholars divided over the meaning of the Hebrew text. Another translation could be “Don’t let the oil of the wicked anoint my head, for I pray continually against their wickedness.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When the leaders and judges are condemned,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: falling upon the rocks of justice,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 141:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 25:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then they’ll know my words to them were true!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Like an earthquake splits open the earth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so the world of hell will open its mouth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to swallow their scattered bones.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But you are my Lord and my God; I only have eyes for you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hide myself in you, so don’t leave me defenseless.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Protect me! Keep me from the traps of wickedness they set for me.
