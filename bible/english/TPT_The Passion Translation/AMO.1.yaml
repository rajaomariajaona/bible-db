  '1':
  - type: heading
    content: Amos Prophesies Yahweh’s Message
  - type: text
    content: 'There was a prophet named Amos, '
  - type: note
    content: The name Amos likely means “burden-bearer.” It can be compared to the name Amasiah (see 2 Chron. 17:16), which in Hebrew sounds like “Yahweh bears [the burden].” Amos may even be a shorter form of the same name. See M. Noth, Die israelitischen Personennamen (1928), 178.
  - type: text
    content: 'a herdsman '
  - type: note
    content: The word here translated “herdsman,” noqed, is not the usual Hebrew word for “shepherd.” Jewish scholars view this as referring to one who oversees and breeds a special kind of dwarf sheep famous for their wool, known by Arabs today as nakad. Hence, an alternative translation of this word may be “sheep breeder.”
  - type: text
    content: 'from the town of Tekoa. '
  - type: note
    content: Tekoa has a homonym that is translated “a stockade” or “a trumpet blast.” The village of Tekoa is about five miles (eight kilometers) southeast of Bethlehem on the edge of the Judean wilderness. See 2 Sam. 14:2.
  - type: text
    content: 'Two years before the great earthquake, '
  - type: note
    content: 'It is believed this great earthquake shook the entire ancient Near East during the mid-700s BC. This mention therefore helps us to date the book of Amos very accurately. Geologist Steven A. Austin has written extensively about this earthquake in the days of Amos; he dates this magnitude 8 earthquake around 750 BC and places the epicenter just north of Israel. See Steven A. Austin, Gordon W. Franz, and Eric G. Frost, “Amos’s Earthquake: An Extraordinary Middle East Seismic Event of 750 B.C.,” International Geology Review 42, no. 7 (2000), 657–71. See also Ps. 75:3; Amos 9:5; Mic. 1:4; Zech. 14:5.'
  - type: text
    content: 'when Uzziah was king of Judah, and Jeroboam son of Jehoash '
  - type: note
    content: Or “Joash,” a variant form of Jehoash. Amos prophesied during the reigns of Uzziah of Judah in the south (792–740 BC) and Jeroboam II of Israel in the north (793–753 BC).
  - type: text
    content: 'was king of Israel, God revealed these prophetic visions to Amos about Israel. '
