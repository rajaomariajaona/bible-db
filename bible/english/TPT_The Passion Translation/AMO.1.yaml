  - type: heading
    content: Damascus
  '3':
  - type: text
    content: 'Here is the message of '
  - type: text
    content: Yahweh
  - type: text
    content: ':'
  - type: text
    content: “For the three terrible crimes of the people of Damascus—
  - type: text
    content: 'no, make that four '
  - type: note
    content: Amos used the literary tool of a Hebrew idiom (“three . . . make that four”) to emphasize the cumulative effect of their sin. See Prov. 30:15. These numbers are symbolic, indicating that there is no limit to the wickedness of Damascus (i.e., Syria) here, plus all the other nations that follow—including, eventually, Israel herself (see Amos 2:6–16). There is also the possibility that the combined total of seven sins, in each case, may itself constitute a perfect symbolic (i.e., spiritual) storm of offenses that knows no bounds.
  - type: text
    content: —
  - type: text
    content: 'I will not turn back '
  - type: text
    content: my wrath
  - type: text
    content: .
  - type: note
    content: Or “I will not bring it”; that is, God’s decree of punishment or the city of Damascus itself. See vv. 6, 9, 11, 13; 2:1, 4, 6.
  - type: text
    content: 'For they have treated the people of Gilead '
  - type: text
    content: with savage cruelty
  - type: text
    content: ','
  - type: text
    content: running over them with a threshing sledge equipped with iron teeth.
  - type: note
    content: This denotes the practice of laying people on the ground and running over them with large threshing carts equipped with toothed iron wheels used at harvest time to thresh the harvested grain. Such a cruel torture was also indicated in 2 Kings 13:7, where the king of Aram (i.e., Syria) similarly reduced the army of Jehoahaz to dust. Gilead was a territory populated with Israelite people east of the Jordan. Iron was a big deal back then. Whoever had the most access to iron had the military (and agricultural) upper hand. The rest had to settle for bronze. That’s why the Philistines (who used iron) kept beating up on the Israelites (equipped with bronze) in David’s era.
