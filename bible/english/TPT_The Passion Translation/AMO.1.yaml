          text: 'It is believed this great earthquake shook the entire ancient Near East during the mid-700s BC. This mention therefore helps us to date the book of Amos very accurately. Geologist Steven A. Austin has written extensively about this earthquake in the days of Amos; he dates this magnitude 8 earthquake around 750 BC and places the epicenter just north of Israel. See Steven A. Austin, Gordon W. Franz, and Eric G. Frost, “Amos’s Earthquake: An Extraordinary Middle East Seismic Event of 750 B.C.,”'
