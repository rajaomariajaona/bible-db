        children:
        - type: text
          text: This denotes the practice of laying people on the ground and running over them with large threshing carts equipped with toothed iron wheels used at harvest time to thresh the harvested grain. Such a cruel torture was also indicated in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', where the king of Aram (i.e., Syria) similarly reduced the army of Jehoahaz to dust. Gilead was a territory populated with Israelite people east of the Jordan. Iron was a big deal back then. Whoever had the most access to iron had the military (and agricultural) upper hand. The rest had to settle for bronze. That’s why the Philistines (who used iron) kept beating up on the Israelites (equipped with bronze) in David’s era.'
      marker-yv: yv-n
