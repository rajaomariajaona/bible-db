document_id: MRK.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Transfiguration of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I tell you the truth, there are some standing here now who won’t experience death until they see God’s kingdom realm manifest with power!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This manifestation of the power of God’s kingdom realm could be seen in three dimensions. (1) Beginning with v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: MRK.9.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the kingdom power of God was seen in Jesus’ transfiguration and the appearing of Moses and Elijah on the mountain. (2) Jesus’ resurrection and ascension into glory inaugurated a new era of God’s kingdom power. (3) The coming of the Holy Spirit at Pentecost, which brought to birth the church of Jesus Christ, and extended God’s kingdom realm to all the earth.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After six days, Jesus took Peter and the two brothers, Jacob and John, and hiked up a high mountain to be alone. And Jesus’ appearance was dramatically altered, for he was transfigured before their very eyes! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'His clothing sparkled and became glistening white—whiter than any bleach in the world could make them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then suddenly, right in front of them, Moses and Elijah appeared, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moses represented the Law and Elijah represented the Prophets. Both Moses and Elijah were associated with Mount Sinai (Horeb), both had a ministry of performing astounding miracles, and both had unusual circumstances surrounding their passing from this life into glory. Peter tells us clearly that what he saw that day was a preview of God’s kingdom realm (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Peter 1:16–17
      metadata:
        usfm: 2PE.1.16+2PE.1.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: and they spoke with Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Peter blurted out, “Good Teacher, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Good Rabbi,” as translated from the Aramaic.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rabbi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is an Aramaic title that means master-teacher.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: this is so amazing to see the three of you together
  - type: text
    text: '! Why don’t we stay here and set up three shelters: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “booths,” a reference to making booths for the Feast of Tabernacles. Peter wanted to celebrate that feast there on the mountaintop with Jesus, Moses, and Elijah. However, Jesus is not to be treated equally with Moses or Elijah—Jesus is the Lord of all creation, including all of humanity.
    marker-yv: yv-n
  - type: text
    text: 'one for you, one for Moses, and one for Elijah?” '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '(For all of the disciples were in total fear, and Peter didn’t have a clue what to say.) '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Just then, a radiant cloud began to spread over them, enveloping them all. And God’s voice suddenly spoke from the cloud, saying, “This is my beloved Son and you need to always listen to him!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You must constantly listen to him.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 18:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 2:7
      metadata:
        usfm: PSA.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 42:1
      metadata:
        usfm: ISA.42.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then suddenly, as they looked around, they saw only Jesus with them, for Moses and Elijah had faded away.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “They saw no one with them anymore except Jesus.” There were two mountains in the life of Jesus that focused on his true identity and mission. On this mountain, his face shone as bright as the sun; yet on Mount Calvary, his face was beaten to a pulp. On this mountain, his clothing was glistening white; yet on Mount Calvary, his clothing was taken from him and he was bleeding crimson. On this mountain, he had at his side two of the greatest men ever to live, Moses and Elijah; yet on Mount Calvary, he had at his side two murderers. On this mountain, the glory of God overshadowed him; yet on Mount Calvary, he was alone, forsaken, in the dark. On this mountain, we hear the Father’s voice of commendation; yet on Calvary’s mountain, the Father was silent. How beautiful was Jesus on both mountains!
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As they all hiked down the mountain together, Jesus ordered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Don’t tell anyone of what you just witnessed. Wait until the Son of Man is raised from the dead.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So they kept it to themselves, puzzled over what Jesus meant about rising from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then they asked him, “Why do the religious scholars insist that Elijah must come before the Messiah?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “come first” (prior to the coming of the Messiah).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'He answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “They’re right. Elijah must come first to put everything in order.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mal. 4:5–6
      metadata:
        usfm: MAL.4.5+MAL.4.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus is obviously referring to John the Baptizer as the one who symbolized Elijah’s coming. Using metaphors, symbols, and parables was Jesus’ preferred way of teaching.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And what about all that is written about the Son of Man? It is true that he must endure many sufferings and be rejected.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Read
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 22
      metadata:
        usfm: PSA.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 53
      metadata:
        usfm: ISA.53
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So Elijah has already appeared, just as it was prophesied,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “just as it was written about him.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they did to him whatever they pleased.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Disciples Unable to Cast Out a Demon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now when they came down the mountain to the other nine disciples, they noticed a large crowd of people gathered around them, with the religious scholars arguing with them. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The crowd was astonished to see Jesus himself walking toward them, so they immediately ran to welcome him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What are you arguing about with the religious scholars?”
  - type: text
    text: ' he asked them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A man spoke up out of the crowd. “Teacher,” he said, “I have a son possessed by a demon that makes him mute. I brought him here to you, Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Whenever the demon takes control of him, it knocks him down, and he foams at the mouth and gnashes his teeth, and his body becomes stiff as a board. I brought him to your disciples, hoping they could deliver him, but they were not able to do it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus said to the crowd, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you such a faithless people?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “generation.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How much longer must I remain with you and put up with your unbelief? Now, bring the boy to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So they brought him to Jesus. As soon as the demon saw him, it threw the boy into convulsions. He fell to the ground, rolling around and foaming at the mouth. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus turned to the father and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How long has your son been tormented like this?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Since childhood,” he replied. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “It tries over and over to kill him by throwing him into fire or into the water. But please, if you’re able to do something, anything—have compassion on us and help us!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What do you mean ‘if’?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied by the use of the most emphatic form of “if” in the Greek text.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you are able to believe,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and the majority of Greek manuscripts. There are, however, some Greek manuscripts that leave out the words “to believe.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: all things are possible to the believer.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: When he heard this, the boy’s father cried out with tears, saying, “I do believe, Lord; help my little faith!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “I do believe; help my unbelief.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now when Jesus saw that the crowd was quickly growing larger, he commanded the demon, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Deaf and mute spirit, I command you to come out of him and never enter him again!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The demon shrieked and threw the boy into terrible seizures and finally came out of him! As the boy lay there, looking like a corpse, everyone thought he was dead. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Jesus stooped down, gently took his hand, and raised him up to his feet, and he stood there completely set free!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 9:43
      metadata:
        usfm: LUK.9.43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: adds “Everyone was awestruck. They were stunned seeing the power and majesty of God flow through Jesus.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Afterwards, when Jesus arrived at the house, his disciples asked him in private, “Why couldn’t we cast out the demon?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This type of powerful spirit can only be cast out by fasting and prayer.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 9:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and some Greek manuscripts. Many reliable Greek texts leave out “fasting.” However, the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fasting
    - type: usfm
      marker: ft
      children:
      - type: text
