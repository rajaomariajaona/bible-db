document_id: TIT.1,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Introduction
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From Paul, God’s willing slave '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bondservant.”
      marker-yv: yv-n
    - type: text
      text: 'and an apostle of Jesus, the Anointed One, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to Titus
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the name Titus is not found until v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', it is included here to enhance the understanding of Paul’s introduction.'
      marker-yv: yv-n
    - type: text
      text: 'I’m writing to you to further the faith '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “according to the faith of God’s elect.”
      marker-yv: yv-n
    - type: text
      text: 'of God’s chosen ones and lead them to the full knowledge of the truth that leads to godliness, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'There are many wayward people, smooth talkers, and deceivers—especially the converts from Judaism. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “those of the circumcision” (group), i.e., Jewish converts. Paul is pointing to three types of people who will refute and argue with church leaders: rebels, empty talkers, and deceivers. The leaders (elders) must be faithful to the Scriptures in order to correct them and set them in order.'
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'They must be silenced '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “reined in.” The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: epistomizo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used for the reins of a horse.
      marker-yv: yv-n
    - type: text
      text: 'because they are disrupting entire families with their corrupt teachings, all for their dishonest greed. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A certain one of them, one of their own prophets, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: prophet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', it is not used here in the biblical sense of a “prophet” of God, for the author of this proverb was a pagan.'
      marker-yv: yv-n
    - type: text
      text: 'said, “Those Cretans are nothing but liars, worthless beasts, and lazy gluttons.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A quote from the Oracles of Epimenides, a six-century BC poet. The first line is quoted from The
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Hymn to Zeus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: by Callimachus.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He certainly knew what he was talking about! For this reason, correct them thoroughly so that their lives will line up with the truths of our faith. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Instruct them not to pay any attention to Jewish myths or follow the teachings of those who reject the truth.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: it
      children:
      - type: text
        text: It’s true that
    - type: text
      text: ' all is pure to those who have pure hearts, but to the corrupt unbelievers nothing is pure. Their minds and consciences are defiled. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They claim to know God, but by their actions they deny him. They are disgusting, disobedient, and disqualified from doing anything good.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'which rests on the hope of eternal life. God, who never lies, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is making quite a statement in this verse. Zeus was said to have been born in Crete, and Cretans were known to be liars (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). So Paul is saying to the Cretans that our God is greater than Zeus and he never lies!
      marker-yv: yv-n
    - type: text
      text: 'has promised this before time began. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'In his own time he unveiled his word through the preaching '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the gospel
    - type: text
      text: ', which was entrusted to me by the command of God our Life Giver.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “Savior.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Titus, you are my true son in the faith we share. May grace and peace descend to you from God the Father and our Savior, the Anointed One, Jesus!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qualities of Church Leaders
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The reason I stationed you in Crete '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A Greek island in the Aegean Sea. Paul’s ship had stopped on the way to Rome at Fair Havens, a small harbor on the southern coast of Crete (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 27:7–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'was so that you could set things in order and complete what was left unfinished, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The unfinished work would be bringing believers into maturity in Christ and raising up godly, qualified leaders who could teach the church and lead it forward.
      marker-yv: yv-n
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to raise up and
    - type: text
      text: ' appoint '
    - type: usfm
      marker: it
      children:
      - type: text
        text: church
    - type: text
      text: ' elders '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ordain elders.” This is the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: presbyteros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “senior leaders.” These are church elders who would function as overseers, teachers, and shepherds of God’s flock. The same Greek word is used for women in'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Although generally assumed to be male in the cultural context of that day, there is nothing to indicate that
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: presbyteros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is gender exclusive. The church elder is called an “overseer” (or “bishop”) in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which indicates that both terms speak of the same office and are synonymous.'
      marker-yv: yv-n
    - type: text
      text: 'in every city, just as I had instructed you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Each of them must be above reproach, devoted solely to his wife, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the husband of one wife” or “married only once.”
      marker-yv: yv-n
    - type: text
      text: 'whose children are believers and not rebellious or out of control. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The overseer, since he serves God’s household, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God’s steward.”
      marker-yv: yv-n
    - type: text
      text: 'must be someone of blameless character and not be opinionated or short-tempered. He must not be a drunkard or violent or greedy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Instead he should be one who is known for his hospitality and a lover of goodness. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 1:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “one who nurtures goodness” (in others). We would say, “one who brings out the best in others.”
      marker-yv: yv-n
    - type: text
      text: 'He should be recognized as one who is fair-minded, pure-hearted, and self-controlled. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He must have a firm grasp of the trustworthy message that he has been taught. This will enable him to both encourage others with healthy teachings and provide convincing answers to those who oppose his message.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Teachers
    marker-yv: yv-h
