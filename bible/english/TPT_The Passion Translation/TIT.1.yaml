document_id: TIT.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: 'From Paul, God’s willing slave '
  - type: note
    content: Or “bondservant.”
  - type: text
    content: 'and an apostle of Jesus, the Anointed One, '
  - type: text
    content: to Titus
  - type: text
    content: '. '
  - type: note
    content: Although the name Titus is not found until v. 4, it is included here to enhance the understanding of Paul’s introduction.
  - type: text
    content: 'I’m writing to you to further the faith '
  - type: note
    content: Or “according to the faith of God’s elect.”
  - type: text
    content: 'of God’s chosen ones and lead them to the full knowledge of the truth that leads to godliness, '
  '10':
  - type: text
    content: 'There are many wayward people, smooth talkers, and deceivers—especially the converts from Judaism. '
  - type: note
    content: 'Or “those of the circumcision” (group), i.e., Jewish converts. Paul is pointing to three types of people who will refute and argue with church leaders: rebels, empty talkers, and deceivers. The leaders (elders) must be faithful to the Scriptures in order to correct them and set them in order.'
  '11':
  - type: text
    content: 'They must be silenced '
  - type: note
    content: Or “reined in.” The Greek word epistomizo is used for the reins of a horse.
  - type: text
    content: 'because they are disrupting entire families with their corrupt teachings, all for their dishonest greed. '
  '12':
  - type: text
    content: 'A certain one of them, one of their own prophets, '
  - type: note
    content: Although the Greek uses the word prophet, it is not used here in the biblical sense of a “prophet” of God, for the author of this proverb was a pagan.
  - type: text
    content: 'said, “Those Cretans are nothing but liars, worthless beasts, and lazy gluttons.” '
  - type: note
    content: A quote from the Oracles of Epimenides, a six-century BC poet. The first line is quoted from The Hymn to Zeus by Callimachus.
  '13':
  - type: text
    content: 'He certainly knew what he was talking about! For this reason, correct them thoroughly so that their lives will line up with the truths of our faith. '
  '14':
  - type: text
    content: Instruct them not to pay any attention to Jewish myths or follow the teachings of those who reject the truth.
  '15':
  - type: text
    content: It’s true that
  - type: text
    content: ' all is pure to those who have pure hearts, but to the corrupt unbelievers nothing is pure. Their minds and consciences are defiled. '
  '16':
  - type: text
    content: They claim to know God, but by their actions they deny him. They are disgusting, disobedient, and disqualified from doing anything good.
  '2':
  - type: text
    content: 'which rests on the hope of eternal life. God, who never lies, '
  - type: note
    content: Paul is making quite a statement in this verse. Zeus was said to have been born in Crete, and Cretans were known to be liars (1:12). So Paul is saying to the Cretans that our God is greater than Zeus and he never lies!
  - type: text
    content: 'has promised this before time began. '
  '3':
  - type: text
    content: 'In his own time he unveiled his word through the preaching '
  - type: text
    content: of the gospel
  - type: text
    content: ', which was entrusted to me by the command of God our Life Giver.'
  - type: note
    content: As translated from the Aramaic. The Greek is “Savior.”
  '4':
  - type: text
    content: Titus, you are my true son in the faith we share. May grace and peace descend to you from God the Father and our Savior, the Anointed One, Jesus!
  - type: heading
    content: Qualities of Church Leaders
  '5':
  - type: text
    content: 'The reason I stationed you in Crete '
  - type: note
    content: A Greek island in the Aegean Sea. Paul’s ship had stopped on the way to Rome at Fair Havens, a small harbor on the southern coast of Crete (Acts 27:7–12).
  - type: text
    content: 'was so that you could set things in order and complete what was left unfinished, '
  - type: note
    content: The unfinished work would be bringing believers into maturity in Christ and raising up godly, qualified leaders who could teach the church and lead it forward.
  - type: text
    content: 'and '
  - type: text
    content: to raise up and
  - type: text
    content: ' appoint '
  - type: text
    content: church
  - type: text
    content: ' elders '
  - type: note
    content: Or “ordain elders.” This is the Greek word presbyteros, which means “senior leaders.” These are church elders who would function as overseers, teachers, and shepherds of God’s flock. The same Greek word is used for women in 1 Tim. 5:2. Although generally assumed to be male in the cultural context of that day, there is nothing to indicate that presbyteros is gender exclusive. The church elder is called an “overseer” (or “bishop”) in v. 7, which indicates that both terms speak of the same office and are synonymous.
  - type: text
    content: 'in every city, just as I had instructed you. '
  '6':
  - type: text
    content: 'Each of them must be above reproach, devoted solely to his wife, '
  - type: note
    content: Or “the husband of one wife” or “married only once.”
  - type: text
    content: 'whose children are believers and not rebellious or out of control. '
  '7':
  - type: text
    content: 'The overseer, since he serves God’s household, '
  - type: note
    content: Or “God’s steward.”
  - type: text
    content: 'must be someone of blameless character and not be opinionated or short-tempered. He must not be a drunkard or violent or greedy. '
  '8':
  - type: text
    content: 'Instead he should be one who is known for his hospitality and a lover of goodness. '
  - type: note
    content: The Aramaic can be translated “one who nurtures goodness” (in others). We would say, “one who brings out the best in others.”
  - type: text
    content: 'He should be recognized as one who is fair-minded, pure-hearted, and self-controlled. '
  '9':
  - type: text
    content: He must have a firm grasp of the trustworthy message that he has been taught. This will enable him to both encourage others with healthy teachings and provide convincing answers to those who oppose his message.
  - type: heading
    content: False Teachers
