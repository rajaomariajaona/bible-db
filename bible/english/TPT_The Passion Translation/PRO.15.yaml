document_id: PRO.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Far Better than Wickedness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Respond gently when you are confronted
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you’ll defuse the rage of another.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Responding with sharp, cutting words '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “painful words.”
    marker-yv: yv-n
  - type: text
    text: will only make it worse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t you know that being angry
- type: usfm
  marker: q1
  children:
  - type: text
    text: can ruin the testimony of even the wisest of men?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This sentence is found only in the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When wisdom speaks, understanding becomes attractive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the words of the fool make their ignorance look laughable.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “The mouths of fools vomit a curse.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The eyes of the Lord '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “The eyes of the Lord” can also be a metaphor for his prophets.
    marker-yv: yv-n
  - type: text
    text: are everywhere
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he takes note of everything that happens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He watches over his lovers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he also sees the wickedness of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When you speak healing words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you offer others fruit from the tree of life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But unhealthy, negative words do nothing but crush their hopes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “perverse words are the crushing of the spirit.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You’re stupid to mock the instruction of a father,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but welcoming correction will make you brilliant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Septuagint adds a verse that is not found in the Hebrew: “In great righteousness there is great strength. But the ungodly will one day perish from the earth.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: There is prosperity in the house of the righteous,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint and the Aramaic read “There is power in the house of the righteous.” Both concepts are valid.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the house of the wicked is filled with trouble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter how much money they have.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When wisdom speaks, revelation-knowledge is released,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “is scattered like seed.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but finding true wisdom in the word of a fool is futile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: It is despicable to the Lord
- type: usfm
  marker: q1
  children:
  - type: text
    text: when people use the worship of the Almighty
- type: usfm
  marker: q1
  children:
  - type: text
    text: as a cloak for their sin,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the sacrifice of the wicked”; that is, worshiping God with a wicked heart, only to hide sin. Our yielded hearts must be the sacrifice we offer to God.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but every prayer of the righteous is pleasing to his heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The Lord detests the lifestyle of the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but he loves those who pursue purity.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “he shows mercy to the one who practices righteousness.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Severe punishment awaits the one
- type: usfm
  marker: q1
  children:
  - type: text
    text: who turns away from the truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and those who rebel against correction will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Even hell itself holds no secrets from the Lord God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for before his eyes, all is exposed—
- type: usfm
  marker: q1
  children:
  - type: text
    text: and so much more the heart of every human being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The know-it-all never esteems the one who tries to correct him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He refuses to seek good advice from the wise.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Another way to say this is “The one who hates authority has no love for being taught.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Living an Ascended Life
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A cheerful heart puts a smile on your face,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a broken heart leads to depression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lovers of God '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The upright” (Aramaic).
    marker-yv: yv-n
  - type: text
    text: hunger after truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but those without understanding
- type: usfm
  marker: q1
  children:
  - type: text
    text: feast on foolishness and don’t even realize it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Everything seems to go wrong
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you feel weak and depressed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when you choose to be cheerful,
- type: usfm
  marker: q1
  children:
  - type: text
    text: every day will bring you more and more joy and fullness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Septuagint reads quite differently: “And the good [heart] is always calm.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: It’s much better to live simply,
- type: usfm
  marker: q1
  children:
  - type: text
    text: surrounded in holy awe and worship of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to have great wealth with a home full of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It’s much better to have a meal of vegetables surrounded with love and grace
- type: usfm
  marker: q1
  children:
  - type: text
    text: than a steak where there is hate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A touchy, hot-tempered man picks a fight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the calm, patient man knows how to silence strife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nothing seems to work right '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The way is blocked with thorns.”
    marker-yv: yv-n
  - type: text
    text: for the lazy man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but life seems smooth and easy when your heart is virtuous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When a son learns wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a father’s heart is glad.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the man who shames '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “despises.”
    marker-yv: yv-n
  - type: text
    text: his mother is a foolish son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The senseless fool treats life like a joke,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the one with living-understanding makes good choices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Your plans will fall apart right in front of you
- type: usfm
  marker: q1
  children:
  - type: text
    text: if you fail to get good advice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But if you first seek out multiple counselors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’ll watch your plans succeed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Everyone enjoys giving great advice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But how delightful it is to say the right thing at the right time!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The life-paths of the prudent lift them progressively heavenward,
- type: usfm
  marker: q1
  children:
  - type: text
    text: delivering them from the death spirals
- type: usfm
  marker: q1
  children:
  - type: text
    text: that keep tugging them downward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The Lord champions the widow’s cause,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The Lord maintains the boundaries of the widow.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but watch him as he smashes down the houses of the haughty!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The Lord detests wicked ways of thinking,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the thoughts of the wicked.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but he enjoys lovely and delightful words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The one who puts earning money above his family
- type: usfm
  marker: q1
  children:
  - type: text
    text: will have trouble at home,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but those who refuse to exploit others
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'will live '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in peace
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Lovers of God think before they speak,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the careless blurt out wicked words meant to cause harm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The Lord doesn’t respond to the wicked,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but he’s moved to answer the prayers of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Eyes that focus on what is beautiful bring joy to the heart,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “The light of the eyes brings joy.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and hearing a good report
- type: usfm
  marker: q1
  children:
  - type: text
    text: refreshes and strengthens the inner being.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 15:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
