document_id: PRO.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Far Better than Wickedness
  - type: text
    content: Respond gently when you are confronted
  - type: text
    content: and you’ll defuse the rage of another.
  - type: text
    content: 'Responding with sharp, cutting words '
  - type: note
    content: Or “painful words.”
  - type: text
    content: will only make it worse.
  - type: text
    content: Don’t you know that being angry
  - type: text
    content: can ruin the testimony of even the wisest of men?
  - type: note
    content: This sentence is found only in the Septuagint.
  '10':
  - type: text
    content: Severe punishment awaits the one
  - type: text
    content: who turns away from the truth,
  - type: text
    content: and those who rebel against correction will die.
  '11':
  - type: text
    content: Even hell itself holds no secrets from the Lord God,
  - type: text
    content: for before his eyes, all is exposed—
  - type: text
    content: and so much more the heart of every human being.
  '12':
  - type: text
    content: The know-it-all never esteems the one who tries to correct him.
  - type: text
    content: He refuses to seek good advice from the wise.
  - type: note
    content: Another way to say this is “The one who hates authority has no love for being taught.”
  - type: heading
    content: Living an Ascended Life
  '13':
  - type: text
    content: A cheerful heart puts a smile on your face,
  - type: text
    content: but a broken heart leads to depression.
  '14':
  - type: text
    content: 'Lovers of God '
  - type: note
    content: Or “The upright” (Aramaic).
  - type: text
    content: hunger after truth,
  - type: text
    content: but those without understanding
  - type: text
    content: feast on foolishness and don’t even realize it.
  '15':
  - type: text
    content: Everything seems to go wrong
  - type: text
    content: when you feel weak and depressed.
  - type: text
    content: But when you choose to be cheerful,
  - type: text
    content: every day will bring you more and more joy and fullness.
  - type: note
    content: 'The Septuagint reads quite differently: “And the good [heart] is always calm.”'
  '16':
  - type: text
    content: It’s much better to live simply,
  - type: text
    content: surrounded in holy awe and worship of God,
  - type: text
    content: than to have great wealth with a home full of trouble.
  '17':
  - type: text
    content: It’s much better to have a meal of vegetables surrounded with love and grace
  - type: text
    content: than a steak where there is hate.
  '18':
  - type: text
    content: A touchy, hot-tempered man picks a fight,
  - type: text
    content: but the calm, patient man knows how to silence strife.
  '19':
  - type: text
    content: 'Nothing seems to work right '
  - type: note
    content: Or “The way is blocked with thorns.”
  - type: text
    content: for the lazy man,
  - type: text
    content: but life seems smooth and easy when your heart is virtuous.
  '2':
  - type: text
    content: When wisdom speaks, understanding becomes attractive.
  - type: text
    content: But the words of the fool make their ignorance look laughable.
  - type: note
    content: The Aramaic reads “The mouths of fools vomit a curse.”
  '20':
  - type: text
    content: When a son learns wisdom,
  - type: text
    content: a father’s heart is glad.
  - type: text
    content: 'But the man who shames '
  - type: note
    content: Or “despises.”
  - type: text
    content: his mother is a foolish son.
  '21':
  - type: text
    content: The senseless fool treats life like a joke,
  - type: text
    content: but the one with living-understanding makes good choices.
  '22':
  - type: text
    content: Your plans will fall apart right in front of you
  - type: text
    content: if you fail to get good advice.
  - type: text
    content: But if you first seek out multiple counselors,
  - type: text
    content: you’ll watch your plans succeed.
  '23':
  - type: text
    content: Everyone enjoys giving great advice.
  - type: text
    content: But how delightful it is to say the right thing at the right time!
  '24':
  - type: text
    content: The life-paths of the prudent lift them progressively heavenward,
  - type: text
    content: delivering them from the death spirals
  - type: text
    content: that keep tugging them downward.
  '25':
  - type: text
    content: The Lord champions the widow’s cause,
  - type: note
    content: Or “The Lord maintains the boundaries of the widow.”
  - type: text
    content: but watch him as he smashes down the houses of the haughty!
  '26':
  - type: text
    content: The Lord detests wicked ways of thinking,
  - type: note
    content: Or “the thoughts of the wicked.”
  - type: text
    content: but he enjoys lovely and delightful words.
  '27':
  - type: text
    content: The one who puts earning money above his family
  - type: text
    content: will have trouble at home,
  - type: text
    content: but those who refuse to exploit others
  - type: text
    content: 'will live '
  - type: text
    content: in peace
  - type: text
    content: .
  '28':
  - type: text
    content: Lovers of God think before they speak,
  - type: text
    content: but the careless blurt out wicked words meant to cause harm.
  '29':
  - type: text
    content: The Lord doesn’t respond to the wicked,
  - type: text
    content: but he’s moved to answer the prayers of the righteous.
  '3':
  - type: text
    content: 'The eyes of the Lord '
  - type: note
    content: “The eyes of the Lord” can also be a metaphor for his prophets.
  - type: text
    content: are everywhere
  - type: text
    content: and he takes note of everything that happens.
  - type: text
    content: He watches over his lovers,
  - type: text
    content: and he also sees the wickedness of the wicked.
  '30':
  - type: text
    content: Eyes that focus on what is beautiful bring joy to the heart,
  - type: note
    content: As translated from the Septuagint. The Hebrew is “The light of the eyes brings joy.”
  - type: text
    content: and hearing a good report
  - type: text
    content: refreshes and strengthens the inner being.
  - type: note
    content: The Hebrew here literally means “makes fat your bones.” Bones picture our inner being.
  '31':
  - type: text
    content: Accepting constructive criticism
  - type: text
    content: opens your heart to the path of life,
  - type: text
    content: making you right at home among the wise.
  '32':
  - type: text
    content: Refusing constructive criticism shows
  - type: text
    content: you have no interest in improving your life,
  - type: text
    content: for revelation-insight only comes as you accept correction
  - type: text
    content: and the wisdom that it brings.
  '33':
  - type: text
    content: The source of revelation-knowledge is found
  - type: text
    content: as you fall down in surrender before the Lord.
  - type: text
    content: Don’t expect to see Shekinah glory
  - type: text
    content: until the Lord sees your sincere humility.
  - type: note
    content: Or “Before honor is humility.” The Hebrew uses the word kabod, which is translated as “glory” 156 times in the Old Testament.
  '4':
  - type: text
    content: When you speak healing words,
  - type: text
    content: you offer others fruit from the tree of life.
  - type: text
    content: But unhealthy, negative words do nothing but crush their hopes.
  - type: note
    content: Or “perverse words are the crushing of the spirit.”
  '5':
  - type: text
    content: You’re stupid to mock the instruction of a father,
  - type: text
    content: but welcoming correction will make you brilliant.
  - type: note
    content: 'The Septuagint adds a verse that is not found in the Hebrew: “In great righteousness there is great strength. But the ungodly will one day perish from the earth.”'
  '6':
  - type: text
    content: There is prosperity in the house of the righteous,
  - type: note
    content: The Septuagint and the Aramaic read “There is power in the house of the righteous.” Both concepts are valid.
  - type: text
    content: but the house of the wicked is filled with trouble,
  - type: text
    content: no matter how much money they have.
  '7':
  - type: text
    content: When wisdom speaks, revelation-knowledge is released,
  - type: note
    content: Or “is scattered like seed.”
  - type: text
    content: but finding true wisdom in the word of a fool is futile.
  '8':
  - type: text
    content: It is despicable to the Lord
  - type: text
    content: when people use the worship of the Almighty
  - type: text
    content: as a cloak for their sin,
  - type: note
    content: Or “the sacrifice of the wicked”; that is, worshiping God with a wicked heart, only to hide sin. Our yielded hearts must be the sacrifice we offer to God.
  - type: text
    content: but every prayer of the righteous is pleasing to his heart.
  '9':
  - type: text
    content: The Lord detests the lifestyle of the wicked,
  - type: text
    content: but he loves those who pursue purity.
  - type: note
    content: The Aramaic reads “he shows mercy to the one who practices righteousness.”
