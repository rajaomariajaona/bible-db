document_id: PRO.15,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Far Better than Wickedness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Respond gently when you are confronted
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you’ll defuse the rage of another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Responding with sharp, cutting words '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “painful words.”
      marker-yv: yv-n
    - type: text
      text: will only make it worse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t you know that being angry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: can ruin the testimony of even the wisest of men?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This sentence is found only in the Septuagint.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Severe punishment awaits the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who turns away from the truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who rebel against correction will die.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even hell itself holds no secrets from the Lord God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for before his eyes, all is exposed—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and so much more the heart of every human being.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The know-it-all never esteems the one who tries to correct him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He refuses to seek good advice from the wise.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Another way to say this is “The one who hates authority has no love for being taught.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living an Ascended Life
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cheerful heart puts a smile on your face,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a broken heart leads to depression.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lovers of God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The upright” (Aramaic).
      marker-yv: yv-n
    - type: text
      text: hunger after truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but those without understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: feast on foolishness and don’t even realize it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everything seems to go wrong
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you feel weak and depressed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you choose to be cheerful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every day will bring you more and more joy and fullness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Septuagint reads quite differently: “And the good [heart] is always calm.”'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s much better to live simply,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: surrounded in holy awe and worship of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to have great wealth with a home full of trouble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s much better to have a meal of vegetables surrounded with love and grace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than a steak where there is hate.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A touchy, hot-tempered man picks a fight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the calm, patient man knows how to silence strife.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nothing seems to work right '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The way is blocked with thorns.”
      marker-yv: yv-n
    - type: text
      text: for the lazy man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but life seems smooth and easy when your heart is virtuous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When wisdom speaks, understanding becomes attractive.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the words of the fool make their ignorance look laughable.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic reads “The mouths of fools vomit a curse.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a son learns wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a father’s heart is glad.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the man who shames '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “despises.”
      marker-yv: yv-n
    - type: text
      text: his mother is a foolish son.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The senseless fool treats life like a joke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one with living-understanding makes good choices.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your plans will fall apart right in front of you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if you fail to get good advice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you first seek out multiple counselors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll watch your plans succeed.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone enjoys giving great advice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But how delightful it is to say the right thing at the right time!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The life-paths of the prudent lift them progressively heavenward,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: delivering them from the death spirals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that keep tugging them downward.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord champions the widow’s cause,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The Lord maintains the boundaries of the widow.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but watch him as he smashes down the houses of the haughty!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord detests wicked ways of thinking,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the thoughts of the wicked.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he enjoys lovely and delightful words.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who puts earning money above his family
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will have trouble at home,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but those who refuse to exploit others
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'will live '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in peace
    - type: text
      text: .
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lovers of God think before they speak,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the careless blurt out wicked words meant to cause harm.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord doesn’t respond to the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he’s moved to answer the prayers of the righteous.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The eyes of the Lord '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: “The eyes of the Lord” can also be a metaphor for his prophets.
      marker-yv: yv-n
    - type: text
      text: are everywhere
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he takes note of everything that happens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He watches over his lovers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he also sees the wickedness of the wicked.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eyes that focus on what is beautiful bring joy to the heart,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “The light of the eyes brings joy.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and hearing a good report
  - type: usfm
    marker: q1
    children:
    - type: text
      text: refreshes and strengthens the inner being.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew here literally means “makes fat your bones.” Bones picture our inner being.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accepting constructive criticism
  - type: usfm
    marker: q1
    children:
    - type: text
      text: opens your heart to the path of life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making you right at home among the wise.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Refusing constructive criticism shows
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have no interest in improving your life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for revelation-insight only comes as you accept correction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the wisdom that it brings.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The source of revelation-knowledge is found
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you fall down in surrender before the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t expect to see Shekinah glory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until the Lord sees your sincere humility.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Before honor is humility.” The Hebrew uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kabod
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which is translated as “glory” 156 times in the Old Testament.'
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you speak healing words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you offer others fruit from the tree of life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But unhealthy, negative words do nothing but crush their hopes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “perverse words are the crushing of the spirit.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You’re stupid to mock the instruction of a father,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but welcoming correction will make you brilliant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Septuagint adds a verse that is not found in the Hebrew: “In great righteousness there is great strength. But the ungodly will one day perish from the earth.”'
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is prosperity in the house of the righteous,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint and the Aramaic read “There is power in the house of the righteous.” Both concepts are valid.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the house of the wicked is filled with trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no matter how much money they have.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When wisdom speaks, revelation-knowledge is released,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “is scattered like seed.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but finding true wisdom in the word of a fool is futile.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is despicable to the Lord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when people use the worship of the Almighty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as a cloak for their sin,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the sacrifice of the wicked”; that is, worshiping God with a wicked heart, only to hide sin. Our yielded hearts must be the sacrifice we offer to God.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but every prayer of the righteous is pleasing to his heart.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord detests the lifestyle of the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he loves those who pursue purity.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic reads “he shows mercy to the one who practices righteousness.”
      marker-yv: yv-n
