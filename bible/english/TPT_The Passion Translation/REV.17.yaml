document_id: REV.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Judgment of the Harlot, Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then one of the seven angels with the seven bowls approached me and said, “Come, and I will show you the judgment of the great prostitute who sits '
  - type: usfm
    marker: it
    children:
    - type: text
      text: enthroned
  - type: text
    text: ' on many waters. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The kings of the earth have fornicated with her, and the people of earth are drunk on the wine of her prostitution.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A metaphor for idolatry. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 1:21
      metadata:
        usfm: ISA.1.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the angel carried me away in the Spirit into a wilderness, and I saw a woman sitting on a wild, bloodred beast with seven heads and ten horns, and it was covered with blasphemous names. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The woman was robed in purple and scarlet and was glittering with gold, precious stones, and pearls. She was holding in her hand a golden chalice brimming full with defiling obscenities and the filth of her lewdness. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 51:7
      metadata:
        usfm: JER.51.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On her forehead was written these mysterious titles: “The great Babylon, mother of prostitutes and of the abominations of the earth.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I saw the woman was drunk with the blood of God’s holy believers—drunk on the blood of the loyal martyrs of Jesus. And when I saw her, I was utterly astonished!
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Interpretation of John’s Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'But the angel said to me, “Why are you so astonished? I will reveal to you the mystery of the woman, and of the wild beast with seven heads and ten horns that carries her. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wild beast you saw once was, now is not, and is destined to ascend out of the deep and go to destruction. All those whose names have not been written in the Book of Life from the foundation of the world will be utterly astonished when they see the wild beast because he once was, now is not, and is about to rise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“This requires a mind that has wisdom to interpret: The seven heads of the beast are seven mountains the woman sits upon; they are also seven kings. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Five kings have fallen, one is, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Scholars who believe in an earlier date of Revelation see these as the emperors of Rome, for Nero (the one who now “is”) was Rome’s sixth Caesar of Rome (AD 54–68).
    marker-yv: yv-n
  - type: text
    text: 'and the other has not yet come—and when he comes he must remain only a little while. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “he will have little desire to rule.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The wild beast '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “the dragon and the wild beast it brought.”
    marker-yv: yv-n
  - type: text
    text: that was but now is not represents an eighth king who is from one of the seven, and he is going to destruction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“The ten horns that you saw represent ten kings who have not yet received a kingdom, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “royal power.”
    marker-yv: yv-n
  - type: text
    text: 'but they and the wild beast are destined to receive authority as kings for '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a short reign of
  - type: text
    text: ' one hour. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They are united in yielding their power and authority to the wild beast. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They will wage war against the Lamb, but the Lamb will conquer them, for he is Lord of lords and King of kings! Those who are with him '
  - type: usfm
    marker: it
    children:
    - type: text
      text: will also conquer them
  - type: text
    text: ', and they are called ‘chosen ones’ and ‘faithful ones.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And he said to me, “The waters that you saw, upon which the great prostitute is seated, represent peoples, multitudes, nations, and languages. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The ten horns and the wild beast will hate the great prostitute and will make her a ruin. They will reduce her to nakedness, and they will devour her flesh and burn her up with fire. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For God has put it in their hearts to carry out his purpose for her by agreeing to give their kingdom '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “their royal power.”
    marker-yv: yv-n
  - type: text
    text: 'to the wild beast until the words of God are fulfilled. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'As for the woman you saw, she is the great city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Babylon
  - type: text
    text: ', which rules '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “has royal dominion [sovereignty] over.”
    marker-yv: yv-n
  - type: text
    text: over the kings of the earth.”
