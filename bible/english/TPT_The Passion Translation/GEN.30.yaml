document_id: GEN.30,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Battle of the Brides
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Rachel saw that she could not give Jacob children, her jealousy toward her sister simmered. So, she said to Jacob, “Give me sons, or I’ll die!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ironically, Rachel died while giving birth to her second son (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 35:16–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 10-11
    - type: text
      text: 'Zilpah bore Jacob a son, and Leah named him Gad, saying, “What good fortune!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:10–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Gad means “good fortune” or “good luck has come.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Zilpah bore Jacob a second son, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'and Leah named him Asher, saying, “Oh happy day! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Asher means “happy.”
      marker-yv: yv-n
    - type: text
      text: All the women will say, ‘She’s happy now!’ ”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'One day, during wheat harvest, Reuben found some mandrake plants '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mandrakes, or “love apples,” had an erotic connotation and were considered in that culture to have aphrodisiac properties. Aphrodite, the Greek goddess of love, beauty, and sex, was known as the “Lady of the Mandrake.” The Hebrew root for “mandrake” is similar to the word for “love.”
      marker-yv: yv-n
    - type: text
      text: in the field and brought them to his mother Leah. Rachel said to Leah, “Please give me some of your son’s mandrakes.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Leah replied, “You already took away '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the affection of
    - type: text
      text: ' my husband, so now you’re going to take my son’s mandrakes, too?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rachel said, “All right then, I’ll let him sleep with you tonight in exchange for some of your son’s mandrakes.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'That evening, when Jacob was coming home from the field, Leah went out to meet him and said, “You must sleep with me tonight, for I’ve paid for your services with my son’s mandrakes.” So Jacob slept with Leah that night. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'God listened compassionately to Leah’s cry, she became pregnant, and bore Jacob a fifth son, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'whom she named Issachar, saying, “God rewarded '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Issachar comes from the Hebrew word for “reward.”
      marker-yv: yv-n
    - type: text
      text: me for giving my maidservant to my husband.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Once again, Leah conceived and bore Jacob a sixth son, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jacob became furious with Rachel and said, “Am I God? He’s the one keeping you from bearing children!” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'whom she named Zebulun, saying, “God has given me good gifts for my husband! Now he will accept '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Zebulun sounds like the Hebrew word for “honor,” “raise up,” or “accept.”
      marker-yv: yv-n
    - type: text
      text: 'me, for I’ve given him six sons.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Lastly, Leah gave birth to a daughter and named her Dinah.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Dinah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “judgment” or “vindication.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'God listened to Rachel’s heart-cry, and had compassion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God remembered.”
      marker-yv: yv-n
    - type: text
      text: on her, and made her fertile.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: 'She conceived, and bore a son, and named him Joseph, saying, “God has taken away my disgrace. May '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' add '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:23–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Joseph means “he adds [another].”
      marker-yv: yv-n
    - type: text
      text: to me another son.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Makes a Deal with Laban
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'After Rachel gave birth to Joseph, Jacob said to Laban, “Release me to go back home to my homeland. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: You know how hard I’ve worked for you these many years to finish paying for my two wives. Give them to me along with my children, and I’ll be on my way.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Laban countered, “If you please, I have learned by divine inquiry '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “by divination [omens, astrology, fortune-tellers].” God forbid divination among his people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 19:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 18:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '14'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
    - type: text
      text: 'that I have become prosperous because of you and the blessing of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that’s on your life
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Just name your price, and I’ll give it to you.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jacob replied, “You know how hard I’ve worked for you and how your livestock has increased under my care. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'She replied, “Here’s my servant Bilhah. Sleep with her. She can be my surrogate; then I can have children through her '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally, “that she may bear upon my knees,” a Hebrew figurative expression that refers to the practice of obtaining children through the service of another woman and legally adopting the child as one’s own. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 50:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and footnote;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 3:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and build a family.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will be built up through her.”
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'The little you had before I came has multiplied greatly, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has blessed you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wonderfully
    - type: text
      text: ' because I am here. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally, “according to my foot,” a figure of speech for “because I am here [working for you].”
      marker-yv: yv-n
    - type: text
      text: But now, I need to provide for my own family, too.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: So Laban asked, “What should I give you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Nothing,” Jacob replied, “You don’t need to give me a thing. If you will do but one thing for me, I will continue to care for your flocks: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Just let me pass through all your flocks today and take out every speckled and spotted sheep or goat, and every black lamb. That’s all the payment I ask. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: And in the future, when you review my wages, the integrity of my dealings with you will be obvious. If you find any animal among mine that is not speckled, spotted, or black, then you will know that I stole it.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '“Agreed!” Laban said. “We’ll do what you’ve suggested.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'But that same day, Laban '
    - type: usfm
      marker: it
      children:
      - type: text
        text: secretly
    - type: text
      text: ' removed all the male and female goats that were speckled or spotted (all that had white on them) and all the black lambs and left them under the care of his sons. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: He set a distance of a three-day journey between himself and Jacob, while Jacob continued to tend the rest of Laban’s flocks.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Jacob, however, cut green branches of poplar, almond, and plane trees and peeled back part of their bark, to expose the white inner wood of the branches. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Then he set the partially peeled branches inside the water troughs where the goats would see them when they came to drink. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'For they mated when they came to the water troughs, and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as they lowered their heads to drink
    - type: text
      text: ', they saw the stripped branches in front of their eyes. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Miraculously
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These were not simply principles of animal husbandry, but a divine miracle revealed to Jacob through a dream (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 31:10–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God always uses unique and puzzling methods to perform a miracle. He may require bathing seven times in the Jordan River (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Kings 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), parting the Red Sea (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), or having the sun stand still (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 10:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God displayed his creative power through the birth of these multicolored young goats. Perhaps the miracle teaches us that what we see or gaze upon can impregnate us with the object of our vision, for you can determine what you conceive by what you behold. What you set your gaze upon is what you will give birth to.
      marker-yv: yv-n
    - type: text
      text: 'they gave birth to streaked, speckled, and spotted young. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So Rachel gave her servant Bilhah to Jacob as another wife, and Jacob slept with her. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'But with the mating ewes, on the other hand, he made them face the streaked or completely black animals in Laban’s flock. By doing this, he produced his own special flocks, which he didn’t allow to mingle with Laban’s. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Moreover, every time the stronger females were in heat, Jacob laid the partially peeled branches in the water troughs in front of the flock, so that they would mate among the branches. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'But he didn’t place the branches in front of the scrawny goats when they mated, leaving the feeble animals for Laban and the stronger for himself. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: In this way, Jacob quickly grew very wealthy and owned large flocks, a great number of camels and donkeys, and many male and female servants.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And Bilhah conceived and bore Jacob a son, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'and Rachel named him Dan, saying, “God has vindicated me. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 30:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “judged me [decided in my favor].” The name Dan sounds like the Hebrew verb meaning “to judge.” The Hebrew contains a wordplay on his name—“God has vindicated [
      - type: usfm
        marker: it
        children:
        - type: text
          text: dananni
      - type: usfm
        marker: ft
