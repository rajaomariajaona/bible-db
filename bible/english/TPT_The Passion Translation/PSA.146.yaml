document_id: PSA.146,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Our True Help
  - type: text
    content: A poetic psalm by Haggai and Zechariah
  - type: note
    content: As translated from the Septuagint. Pss. 146–150 are called “Hallelujah Psalms” because they all begin in Hebrew with the words “Hallelujah, praise the Lord.”
  - type: text
    content: Hallelujah! Praise the Lord!
  - type: text
    content: My innermost being will praise you, Lord!
  '10':
  - type: text
    content: Lord, you will reign forever!
  - type: text
    content: Zion’s God will rule throughout time and eternity!
  - type: text
    content: Hallelujah! Praise the Lord!
  '2':
  - type: text
    content: I will spend my life praising you and
  - type: text
    content: singing high praises to you, my God, every day of my life!
  '3':
  - type: text
    content: We can never look to men for help;
  - type: text
    content: no matter who they are, they can’t save us,
  - type: text
    content: for even our great leaders fail and fall.
  - type: text
    content: They too are just mortals who will one day die.
  - type: text
    content: At death the spirits of all depart and their bodies return to dust.
  - type: text
    content: In the day of their death all their projects and plans are over.
  '5':
  - type: text
    content: But those who hope in the Lord will be happy and pleased!
  - type: text
    content: Our help comes from the God of Jacob!
  '6':
  - type: text
    content: You keep all your promises.
  - type: text
    content: You are the Creator of heaven’s glory,
  - type: text
    content: earth’s grandeur, and the ocean’s greatness.
  '7':
  - type: text
    content: The oppressed get justice with you.
  - type: text
    content: The hungry are satisfied with you.
  - type: text
    content: Prisoners find their freedom with you.
  '8':
  - type: text
    content: You open the eyes of the blind,
  - type: text
    content: and you fully restore those bent over with shame.
  - type: text
    content: You love those who love and honor you.
  '9':
  - type: text
    content: You watch over strangers and immigrants
  - type: text
    content: and support the fatherless and widows.
  - type: text
    content: But you subvert the plans of the ungodly.
