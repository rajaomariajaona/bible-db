document_id: PSA.146
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Our True Help
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A poetic psalm by Haggai and Zechariah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '146'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Pss. 146–150
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: are called “Hallelujah Psalms” because they all begin in Hebrew with the words “Hallelujah, praise the Lord.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hallelujah! Praise the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: My innermost being will praise you, Lord!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will spend my life praising you and
- type: usfm
  marker: q1
  children:
  - type: text
    text: singing high praises to you, my God, every day of my life!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 3-4
  - type: text
    text: We can never look to men for help;
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter who they are, they can’t save us,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for even our great leaders fail and fall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They too are just mortals who will one day die.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At death the spirits of all depart and their bodies return to dust.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the day of their death all their projects and plans are over.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But those who hope in the Lord will be happy and pleased!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our help comes from the God of Jacob!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You keep all your promises.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the Creator of heaven’s glory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: earth’s grandeur, and the ocean’s greatness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The oppressed get justice with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The hungry are satisfied with you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prisoners find their freedom with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You open the eyes of the blind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you fully restore those bent over with shame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You love those who love and honor you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You watch over strangers and immigrants
- type: usfm
  marker: q1
  children:
  - type: text
    text: and support the fatherless and widows.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you subvert the plans of the ungodly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lord, you will reign forever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Zion’s God will rule throughout time and eternity!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah! Praise the Lord!
