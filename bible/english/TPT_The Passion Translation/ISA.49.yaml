document_id: ISA.49,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Special Servant
  - type: text
    content: Listen to what I have to say, you islands.
  - type: text
    content: Pay attention to me, you who live in distant lands.
  - type: text
    content: Yahweh
  - type: text
    content: ' called me '
  - type: text
    content: as his own
  - type: text
    content: ' before I was born'
  - type: text
    content: and named me while I was still in my mother’s womb.
  '10':
  - type: text
    content: They will never be hungry or thirsty.
  - type: text
    content: Neither scorching sun nor desert wind will hurt them,
  - type: note
    content: See Rev. 7:16.
  - type: text
    content: for he, the Loving One, will guide them
  - type: text
    content: 'and lead them to '
  - type: text
    content: restful, renewing
  - type: text
    content: ' streams of water.'
  - type: note
    content: See Ps. 23:1–3.
  '11':
  - type: text
    content: 'I will level all my mountains as a road '
  - type: text
    content: for them
  - type: text
    content: and raise up my highways.
  '12':
  - type: text
    content: Look! They will come from faraway lands—
  - type: text
    content: some from the north, some from the west,
  - type: text
    content: and some from the land of Sinim.”
  - type: note
    content: There is much scholarly debate about the land of Sinim. There are some convincing arguments that link Sinim etymologically and historically to the Qin dynasty, which eventually grew and became modern-day China. The Sinites as a people group are mentioned in Gen. 10:17 and 1 Chron. 1:15. Others see Sinim as a Persian province, a variant name for Phoenicia, or a region in Aswan (Egypt).
  '13':
  - type: text
    content: Sing for joy, you heavens!
  - type: text
    content: Shout, you earth, and rejoice with dancing, shouting, and glee!
  - type: text
    content: Burst into joyous songs, you mountains,
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has comforted his '
  - type: text
    content: beloved
  - type: text
    content: ' people.'
  - type: text
    content: He will show tenderness and compassion
  - type: note
    content: The Hebrew word for “compassion” is racham, a Hebrew homophone for “womb.” The implication is that God has a compassionate love for you, greater than a birth mother has for her child. God’s love comes from deep within his innermost being and births living mercy poured out over us. Racham can be translated “pity,” “grace,” “favor,” “tender affection,” or “compassion.” The very core of God’s being is filled with love and compassion for you.
  - type: text
    content: to his suffering ones.
  - type: heading
    content: God Will Not Forget Zion
  '14':
  - type: text
    content: But Zion has said, “
  - type: text
    content: Yahweh
  - type: text
    content: ' has forsaken me.'
  - type: text
    content: My Lord has forgotten me—
  - type: text
    content: I’m all alone
  - type: text
    content: .”
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: responds
  - type: text
    content: ', “But how could a loving mother forget her nursing child'
  - type: text
    content: and not deeply love the one she bore?
  - type: text
    content: Even if there is a mother who forgets her child,
  - type: text
    content: I could never, no never, forget you.
  '16':
  - type: text
    content: Can’t you see?
  - type: text
    content: I have carved your name on the palms of my hands!
  - type: text
    content: Your walls are always my concern.
  - type: note
    content: Although this is an apparent reference to the walls of Jerusalem, there is an application here for each of us. Wherever you are today, your limitations—your walls—are before God’s eyes. He knows where you are and what you face.
  '17':
  - type: text
    content: 'Your children, your builders, '
  - type: note
    content: The Hebrew root word for “children” (bnyk) is a homonym for “builders.” This translation includes both terms. See also v. 18.
  - type: text
    content: are running back to you
  - type: text
    content: as those who ruined and destroyed you are running away.
  '18':
  - type: text
    content: Lift up your head and look all around you.
  - type: text
    content: See! All your children, your builders, gather to come back to you.
  - type: text
    content: 'As surely as I live, '
  - type: text
    content: I make this promise
  - type: text
    content: ',” says '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: “You will wear them all like jewels,
  - type: text
    content: 'as a '
  - type: text
    content: radiant
  - type: text
    content: ' bride wears her beautiful jewelry!'
  - type: note
    content: The Hebrew word for “bride” (kallah) also means “completed,” “perfected,” or “finished.” A mature bride will arise, wearing her sons and daughters as her jewelry and crown. See 1 Thess. 2:19.
  '19':
  - type: text
    content: “See? Your ruins and devastated places
  - type: text
    content: will soon be overcrowded with settlers
  - type: text
    content: while your destroyers stay far away.
  '2':
  - type: text
    content: He gives me words that pierce and penetrate.
  - type: note
    content: Or “He makes my mouth a sharp sword.” See Heb. 4:12; Rev. 1:16; 2:12, 16; 19:15.
  - type: text
    content: He hid me and protected me in the shadow of his hand.
  - type: note
    content: Jesus was “hidden” in Nazareth for thirty years.
  - type: text
    content: He prepared me like a polished arrow
  - type: text
    content: and concealed me in his quiver.
  '20':
  - type: text
    content: You thought you had lost the children,
  - type: note
    content: Or “the children of your bereavement.”
  - type: text
    content: but you will hear them say,
  - type: text
    content: ‘This place is too cramped for me.
  - type: text
    content: Make more room for me to live in.’
  '21':
  - type: text
    content: And you will say to yourself,
  - type: text
    content: ‘Where in the world did all these children come from?
  - type: text
    content: Who birthed these for me?
  - type: text
    content: I thought I was bereaved and barren.
  - type: text
    content: I thought I was all alone, forgotten in exile—
  - type: text
    content: so how did they all get here?’ ”
  '22':
  - type: text
    content: 'This is what Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Soon I will raise my hand and signal to the nations,
  - type: text
    content: and they will come with your little boys bundled in their arms
  - type: note
    content: Or “lap” or “bosom.”
  - type: text
    content: and your little daughters carried on their shoulders.
  '23':
  - type: text
    content: Kings will be their babysitters
  - type: text
    content: and queens their nursing mothers.
  - type: text
    content: With faces bowed to the ground,
  - type: text
    content: they will lick the dust of your feet.
  - type: text
    content: 'Then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and I will never disappoint those
  - type: text
    content: who entwine their hearts with mine.”
  - type: note
    content: Or “whoever waits on me.”
  '24':
  - type: text
    content: Who can snatch the prey
  - type: text
    content: from the hands of a mighty warrior
  - type: text
    content: or rescue captives from a conqueror?
  - type: note
    content: Or “tyrant” (1QIsaa, Vulgate, Aramaic). The Hebrew reads “a righteous one.”
  '25':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “The prey will be freed from the mighty warrior,
  - type: text
    content: and captives will be rescued from a conqueror!
  - type: text
    content: For I will fight with those who fight with you,
  - type: note
    content: See Gen. 12:1–3.
  - type: text
    content: and I myself will save your children.
  '26':
  - type: text
    content: I will cause the violence of your oppressors
  - type: text
    content: to come back upon them,
  - type: note
    content: Or “I will make your oppressors eat their own flesh,” a figure of speech for violently turning on one another.
  - type: text
    content: and your enemies will kill one another in a killing frenzy!
  - type: note
    content: Or “they will get drunk on their own blood as with wine.” See Rev. 16:6.
  - type: text
    content: 'Then all the earth will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: your Savior, your Kinsman-Redeemer,
  - type: text
    content: the mighty hero of Jacob’s tribes.”
  '3':
  - type: text
    content: And he said to me,
  - type: text
    content: “Israel, you are my special servant;
  - type: text
    content: in you I will be glorified.”
  - type: note
    content: See Gen. 32:28; Deut. 7:6; 26:18–19; Eph. 1:4–6.
  '4':
  - type: text
    content: I said, “I’ve worked and served for nothing.
  - type: text
    content: I have used up all my strength for nothing.”
  - type: note
    content: Or “empty breath.”
  - type: text
    content: 'Yet my rights I leave in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s hands,
  - type: text
    content: and my just reward is with my God.
  '5':
  - type: text
    content: 'And now, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: —
  - type: text
    content: who shaped me in the womb to be his servant,
  - type: text
    content: to bring Jacob’s tribes back to him
  - type: text
    content: that Israel would be gathered back to him,
  - type: text
    content: 'for I am honored in the sight of '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: I find the source of all my strength in my God—
  '6':
  - type: text
    content: 'who says:'
  - type: text
    content: “Is it too small a thing for you, my servant,
  - type: text
    content: to restore greatness to Jacob’s tribes and the survivors of Israel?
  - type: text
    content: I will make you to be a light to the nations and
  - type: text
    content: 'to bring '
  - type: text
    content: the light of
  - type: text
    content: ' my salvation to the ends of the earth!”'
  - type: note
    content: Although Israel is named in this chapter, the future fulfillment of this prophecy is found in Jesus Christ, the true Servant of the Lord. He was called and named from the womb (v. 1). He was equipped and prepared by God (v. 2). He was appointed and commissioned as God’s Servant (v. 3). He would bring Israel back to God (v. 5). He is highly favored in the sight of God (v. 5). Jesus found all his strength in his Father and did only what pleased him (v. 5). He is light and salvation to the nations (gentiles; v. 6).
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: ', Israel’s Kinsman-Redeemer and Holy One,'
  - type: text
    content: says to the one who is deeply despised and repulsed by rulers
  - type: text
    content: 'and a slave to the ruling class:'
  - type: text
    content: “Kings will see and stand up in respect;
  - type: text
    content: 'princes will bow down to honor the faithfulness of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the Holy One of Israel, who has chosen you.”
  - type: heading
    content: God’s Faithfulness
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “When the time of showing you favor has come,
  - type: note
    content: This may be a reference to the year of Jubilee (see Lev. 25:8–13). Believers today are now living in that season of God’s favor. See Luke 4:18–19.
  - type: text
    content: I will answer your heart’s cry.
  - type: text
    content: I will help you in the day of salvation,
  - type: text
    content: for I have fixed my eyes on you.
  - type: text
    content: I have made you a covenant people to restore the land
  - type: text
    content: 'and to resettle '
  - type: text
    content: families
  - type: text
    content: ' on forgotten inheritances.'
  '9':
  - type: text
    content: You will declare to prisoners, ‘You’re free!’
  - type: text
    content: and to those in darkness, ‘Step out into the light!’
  - type: text
    content: They will be like sheep that graze beside the roads
  - type: text
    content: and find pasture on the barren hillside.
