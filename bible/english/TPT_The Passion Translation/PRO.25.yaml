document_id: PRO.25,1849
type_code: eng
verses:
  '1':
  - type: text
    content: 'Solomon’s proverbs, published by the scribes of King Hezekiah:'
  '10':
  - type: text
    content: and gain a reputation for being one
  - type: text
    content: who betrays the confidence of a friend.
  '11':
  - type: text
    content: Winsome words spoken at just the right time
  - type: text
    content: are as appealing as apples gilded in gold
  - type: text
    content: surrounded with silver.
  - type: note
    content: The Aramaic reads “The one who speaks the word is an apple of gold in a setting of silver.” The Septuagint is “A wise word is like a golden apple in a pendant of rubies.” Each one of God’s promises are like apples gilded in gold. When we are full of his Spirit, we can speak and prophesy words of encouragement that are spoken at the right time for the blessing of others.
  '12':
  - type: text
    content: When you humbly receive wise correction,
  - type: text
    content: it adorns your life with beauty
  - type: note
    content: Or “an earring of gold, an ornament of fine gold.” An earring pierces the ear and is an emblem of a listening heart.
  - type: text
    content: and makes you a better person.
  '13':
  - type: text
    content: A reliable, trustworthy messenger
  - type: text
    content: refreshes the heart of his master,
  - type: note
    content: Or “employer.”
  - type: text
    content: like a gentle snowfall at harvest time.
  '14':
  - type: text
    content: Clouds that carry no water
  - type: text
    content: 'and a wind that brings no refreshing rain '
  - type: note
    content: The symbols of clouds, wind, and rain are significant. Clouds are often a metaphor for the people of God filled with glory (see Heb. 12:1; Rev. 1:7). Wind is an emblem of the Holy Spirit bringing new life (see John 3:6–8). Rain often points to teaching the revelation-truths that refresh and water the seeds of spiritual growth (see Isa. 55:10–11). God’s anointed people are to be clouds carried by the wind of the Holy Spirit that bring refreshing truths to his people. When we are empty and false, we are clouds without rain. See also 2 Peter 2:17 and Judah (Jude) 12.
  - type: text
    content: —
  - type: text
    content: that’s what you’re like when you boast
  - type: text
    content: of a gift that you don’t have.
  - type: note
    content: Or “boast of a promised gift you never intend to give.” The Hebrew is literally “to make yourself shine in a gift of falsehood.”
  - type: heading
    content: Wisdom Practices Self-Control
  '15':
  - type: text
    content: Use patience and kindness when you want to persuade leaders
  - type: text
    content: and watch them change their minds right in front of you.
  - type: text
    content: For your gentle wisdom will quell the strongest resistance.
  - type: note
    content: Or “Soft words break bones.”
  '16':
  - type: text
    content: When you discover something sweet,
  - type: text
    content: don’t overindulge and eat more than you need,
  - type: text
    content: for excess in anything can make you sick of even a good thing.
  '17':
  - type: text
    content: Don’t wear out your welcome
  - type: text
    content: by staying too long at the home of your friends,
  - type: text
    content: or they may get fed up with always having you there
  - type: text
    content: and wish you hadn’t come.
  '18':
  - type: text
    content: Lying about and slandering people
  - type: text
    content: are as bad as hitting them with a club,
  - type: text
    content: or wounding them with an arrow,
  - type: text
    content: or stabbing them with a sword.
  '19':
  - type: text
    content: You can’t depend on an unreliable person
  - type: text
    content: when you really need help.
  - type: text
    content: It can be compared to biting down on an abscessed tooth
  - type: text
    content: or walking with a sprained ankle.
  '2':
  - type: text
    content: God conceals the revelation of his word
  - type: note
    content: Many translate this “a matter,” whereas the Hebrew is dabar, which is translated more than eight hundred times in the Old Testament as “word.”
  - type: text
    content: in the hiding place of his glory.
  - type: note
    content: There is beautiful poetry in the Hebrew text. The word for “hide” is cathar, and the word for “word” is dabar. The Hebrew is actually “Kabod [glory] cathar [hidden] dabar [word].”
  - type: text
    content: 'But the honor of kings '
  - type: note
    content: We have been made kings and priests, royal lovers of God, because of God’s grace and Christ’s redeeming blood. See 1 Peter 2:9 and Rev. 5:8–10.
  - type: text
    content: is revealed
  - type: text
    content: by how they thoroughly search out
  - type: text
    content: the deeper meaning of all that God says.
  '20':
  - type: text
    content: When you sing a song of joy to someone suffering
  - type: text
    content: in the deepest grief and heartache,
  - type: text
    content: it can be compared to disrobing in the middle of a blizzard
  - type: text
    content: or rubbing salt in a wound.
  '21':
  - type: text
    content: Is your enemy hungry? Buy him lunch.
  - type: note
    content: Or “Is he thirsty? Give him a drink.”
  - type: text
    content: Win him over with your kindness.
  '22':
  - type: text
    content: Your surprising generosity will awaken his conscience
  - type: note
    content: Or “You will heap coals of fire on his head.” His heart will be moved and his shame exposed.
  - type: text
    content: and God will reward you with favor.
  '23':
  - type: text
    content: As the north wind brings a storm,
  - type: text
    content: 'saying things you shouldn’t '
  - type: note
    content: Or “words of gossip.”
  - type: text
    content: brings a storm to any relationship.
  '24':
  - type: text
    content: It’s better to live all alone in a rundown shack
  - type: text
    content: than to share a castle with a crabby spouse!
  - type: note
    content: With the exception of one Hebrew letter, this verse is identical to 21:9. See footnote. The Aramaic reads “than to live with a contentious woman in a house of divisions.”
  '25':
  - type: text
    content: Like a drink of cool water refreshes a weary, thirsty soul,
  - type: text
    content: so hearing good news revives the spirit.
  '26':
  - type: text
    content: When a lover of God gives in and compromises with wickedness,
  - type: text
    content: it can be compared to contaminating a stream with sewage
  - type: text
    content: or polluting a fountain.
  '27':
  - type: text
    content: It’s good to eat sweet things,
  - type: text
    content: but you can take too much.
  - type: text
    content: It’s good to be honored,
  - type: text
    content: 'but to seek words of praise '
  - type: note
    content: This line is translated from the Aramaic.
  - type: text
    content: is not honor at all.
  '28':
  - type: text
    content: If you live without restraint
  - type: text
    content: and are unable to control your temper,
  - type: text
    content: you’re as helpless as a city with broken-down defenses,
  - type: text
    content: open to attack.
  '3':
  - type: text
    content: The heart of a king is full of understanding,
  - type: text
    content: like the heavens are high and the ocean is deep.
  '4':
  - type: text
    content: If you burn away the impurities from silver,
  - type: text
    content: a sterling vessel will emerge from the fire.
  '5':
  - type: text
    content: And if you purge corruption from the kingdom,
  - type: text
    content: a king’s reign will be established in righteousness.
  '6':
  - type: text
    content: Don’t boast in the presence of a king
  - type: text
    content: or promote yourself by taking a seat at the head table
  - type: text
    content: and pretending that you’re someone important.
  '7':
  - type: text
    content: For it is better for the king to say to you,
  - type: text
    content: “Come, you should sit at the head table,”
  - type: text
    content: than for him to say in front of everyone,
  - type: text
    content: “Please get up and move—
  - type: text
    content: you’re sitting in the place of the prince.”
  '8':
  - type: text
    content: Don’t be hasty to file a lawsuit.
  - type: text
    content: By starting something you wish you hadn’t,
  - type: text
    content: you could be humiliated when you lose your case.
  '9':
  - type: text
    content: Don’t reveal another person’s secret
  - type: text
    content: just to prove a point in an argument,
  - type: text
    content: or you could be accused of being a gossip
