- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But the honor of kings '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We have been made kings and priests, royal lovers of God, because of God’s grace and Christ’s redeeming blood. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Peter 2:9
      metadata:
        usfm: 1PE.2.9
    - type: usfm
      marker: ft
