  - type: text
    text: is revealed
- type: usfm
  marker: q1
  children:
  - type: text
    text: by how they thoroughly search out
- type: usfm
  marker: q1
  children:
  - type: text
    text: the deeper meaning of all that God says.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The heart of a king is full of understanding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like the heavens are high and the ocean is deep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If you burn away the impurities from silver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a sterling vessel will emerge from the fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: And if you purge corruption from the kingdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a king’s reign will be established in righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Don’t boast in the presence of a king
- type: usfm
  marker: q1
  children:
  - type: text
    text: or promote yourself by taking a seat at the head table
- type: usfm
  marker: q1
  children:
  - type: text
    text: and pretending that you’re someone important.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For it is better for the king to say to you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Come, you should sit at the head table,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: than for him to say in front of everyone,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Please get up and move—
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’re sitting in the place of the prince.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Don’t be hasty to file a lawsuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By starting something you wish you hadn’t,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you could be humiliated when you lose your case.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Don’t reveal another person’s secret
- type: usfm
  marker: q1
  children:
  - type: text
    text: just to prove a point in an argument,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or you could be accused of being a gossip
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and gain a reputation for being one
- type: usfm
  marker: q1
  children:
  - type: text
    text: who betrays the confidence of a friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Winsome words spoken at just the right time
- type: usfm
  marker: q1
  children:
  - type: text
    text: are as appealing as apples gilded in gold
- type: usfm
  marker: q1
  children:
  - type: text
    text: surrounded with silver.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic reads “The one who speaks the word is an apple of gold in a setting of silver.” The Septuagint is “A wise word is like a golden apple in a pendant of rubies.” Each one of God’s promises are like apples gilded in gold. When we are full of his Spirit, we can speak and prophesy words of encouragement that are spoken at the right time for the blessing of others.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When you humbly receive wise correction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it adorns your life with beauty
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “an earring of gold, an ornament of fine gold.” An earring pierces the ear and is an emblem of a listening heart.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and makes you a better person.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A reliable, trustworthy messenger
- type: usfm
  marker: q1
  children:
  - type: text
    text: refreshes the heart of his master,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “employer.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a gentle snowfall at harvest time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Clouds that carry no water
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and a wind that brings no refreshing rain '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The symbols of clouds, wind, and rain are significant. Clouds are often a metaphor for the people of God filled with glory (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 12:1
      metadata:
        usfm: HEB.12.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 1:7
      metadata:
        usfm: REV.1.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Wind is an emblem of the Holy Spirit bringing new life (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 3:6–8
      metadata:
        usfm: JHN.3.6+JHN.3.7+JHN.3.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Rain often points to teaching the revelation-truths that refresh and water the seeds of spiritual growth (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 55:10–11
      metadata:
        usfm: ISA.55.10+ISA.55.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). God’s anointed people are to be clouds carried by the wind of the Holy Spirit that bring refreshing truths to his people. When we are empty and false, we are clouds without rain. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Peter 2:17
      metadata:
        usfm: 2PE.2.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judah (Jude) 12
      metadata:
        usfm: JUD.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: —
- type: usfm
  marker: q1
  children:
  - type: text
    text: that’s what you’re like when you boast
- type: usfm
  marker: q1
  children:
  - type: text
    text: of a gift that you don’t have.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “boast of a promised gift you never intend to give.” The Hebrew is literally “to make yourself shine in a gift of falsehood.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Practices Self-Control
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Use patience and kindness when you want to persuade leaders
- type: usfm
  marker: q1
  children:
  - type: text
    text: and watch them change their minds right in front of you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For your gentle wisdom will quell the strongest resistance.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Soft words break bones.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When you discover something sweet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: don’t overindulge and eat more than you need,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for excess in anything can make you sick of even a good thing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Don’t wear out your welcome
- type: usfm
  marker: q1
  children:
  - type: text
    text: by staying too long at the home of your friends,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or they may get fed up with always having you there
- type: usfm
  marker: q1
  children:
  - type: text
    text: and wish you hadn’t come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lying about and slandering people
- type: usfm
  marker: q1
  children:
  - type: text
    text: are as bad as hitting them with a club,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or wounding them with an arrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or stabbing them with a sword.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You can’t depend on an unreliable person
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you really need help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It can be compared to biting down on an abscessed tooth
- type: usfm
  marker: q1
  children:
  - type: text
    text: or walking with a sprained ankle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When you sing a song of joy to someone suffering
- type: usfm
  marker: q1
  children:
  - type: text
    text: in the deepest grief and heartache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: it can be compared to disrobing in the middle of a blizzard
- type: usfm
  marker: q1
  children:
  - type: text
    text: or rubbing salt in a wound.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Is your enemy hungry? Buy him lunch.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Is he thirsty? Give him a drink.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Win him over with your kindness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Your surprising generosity will awaken his conscience
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You will heap coals of fire on his head.” His heart will be moved and his shame exposed.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and God will reward you with favor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: As the north wind brings a storm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'saying things you shouldn’t '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “words of gossip.”
    marker-yv: yv-n
  - type: text
    text: brings a storm to any relationship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: It’s better to live all alone in a rundown shack
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to share a castle with a crabby spouse!
  - type: usfm
    marker: f
    children:
