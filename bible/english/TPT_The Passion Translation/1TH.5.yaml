      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For God has not destined us for wrath but to possess salvation through our Lord Jesus, the Anointed One. '
