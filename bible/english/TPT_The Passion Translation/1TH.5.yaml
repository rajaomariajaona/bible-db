    - type: text
      text: God’s Times and Seasons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, beloved brothers and sisters, concerning the question of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s
    - type: text
      text: ' precise times and specific seasons, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is “the specific intervals of time and the epoch [hinge] periods of time.”
      marker-yv: yv-n
    - type: text
      text: 'you don’t need me to write anything to you. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gave his life for us so that we may share in resurrection life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and implied in the Greek.
      marker-yv: yv-n
    - type: text
      text: 'in union with him—whether we’re awake or asleep. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because of this, encourage the hearts of your fellow believers and support one another, just as you have already been doing.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear brothers and sisters, make sure that you show your deep appreciation for those who cherish you and diligently work as ministers among you. For they are your leaders who care for you, teach you, and stand before the Lord on your behalf. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They value you with great love. Because of their service to you, let peace reign among yourselves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are translated from the Aramaic. The Greek is “Brothers and sisters, we appeal to you to respect [recognize] those who labor among you and have oversight of your lives in the Lord and admonish you. Show them as much respect as possible with great love because of all they do for you. Be at peace among yourselves.” Church leaders deserve our financial support and love because of the work they do for our benefit.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We appeal to you, dear brothers and sisters, to instruct those who are not in their place of battle. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those who are disorderly,” or “those who are idle.” The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ataktos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is often used for troops that are not in battle formation (unarranged).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Be skilled at
    - type: text
      text: ' gently encouraging those who feel themselves inadequate. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those who are losing heart [fainthearted].”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Be faithful
    - type: text
      text: ' to stand your ground. Help the weak to stand again. Be '
    - type: usfm
      marker: it
      children:
      - type: text
        text: quick to
    - type: text
      text: ' demonstrate patience with everyone. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Resist revenge, and make sure that no one pays back evil in place of evil but always pursue doing what is beautiful to one another and to all '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the unbelievers
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let joy be your continual feast. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “Be joyous in every season.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Make your life a prayer. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And in the midst of everything be always giving thanks, for this is God’s perfect plan for you in Christ Jesus.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 16–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'identify three areas our lives we must focus on: (1) unbounded joy, (2) praying continually, and (3) giving thanks to God no matter what happens in our lives. These three virtues combine to form the wonderful expression of Christ’s life within us.'
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Never '
    - type: usfm
