  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And don’t be one who scorns prophecies, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is an implication in the context of vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: that we put out the Spirit’s fire when we scorn prophecy. Prophecy is a valid gift of the Holy Spirit needed by the church today. There is no place in Scripture or in church history that indicates the gift of prophecy has ceased or disappeared. It is an active function of the Holy Spirit in the church around the world. We must not ignore, despise, or scorn any true gift of the Holy Spirit. Putting out the fire of the Holy Spirit (v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is connected to scorning the prophetic ministry. We need prophets and prophecy to keep the fire (inspiration) of the Holy Spirit burning in our hearts. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Cor. 12–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but be faithful to examine them by putting them to the test, and afterward hold tightly to what has proven to be right. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
