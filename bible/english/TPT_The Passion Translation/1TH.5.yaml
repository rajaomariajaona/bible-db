      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avoid every appearance of evil.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now, may the God of peace and harmony set you apart, making you completely holy. And may your entire being—spirit, soul, and body—be kept completely flawless in the appearing of our Lord Jesus, the Anointed One. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The one who calls you by name is trustworthy and will thoroughly complete his work in you.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now, beloved ones, pray for us.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greet every brother and sister with a sacred kiss.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I solemnly '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I put you under oath” (a serious obligation).
      marker-yv: yv-n
    - type: text
      text: plead with you before the Lord to make sure that every holy believer among you has the opportunity to hear this letter read to them.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: May grace from our Lord Jesus Christ be with you. Amen!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For while some are saying, “Finally we have peace and security,” sudden destruction will arrive at their doorstep, like labor pains seizing a pregnant woman—and with no chance of escape!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you, beloved brothers and sisters, are not living in the dark, allowing that day to creep up on you like a thief '
    - type: usfm
      marker: it
      children:
      - type: text
        text: coming to steal
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you are all children of the light and children of the day. We don’t belong to the night nor to darkness. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is why we must not fall asleep, as the rest do, but keep wide awake and clearheaded. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For those who are asleep sleep the night away, and drunkards get drunk at night. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:9–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But since we belong to the day, we must stay alert and clearheaded by placing the breastplate of faith and love '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over our hearts
    - type: text
      text: ', and a helmet of the hope of salvation '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over our thoughts
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “be clearheaded in our vision as we are deployed on the battlefield for faithfulness and love, and set apart with the shield of the hope of everlasting life.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 59:17
      - type: usfm
