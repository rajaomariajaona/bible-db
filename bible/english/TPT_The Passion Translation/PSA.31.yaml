document_id: PSA.31,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: How Great Is Your Goodness
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of poetic praise by King David
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: I trust you, Lord, to be my hiding place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let me down.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let my enemies bring me to shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come and rescue me, for you are the only God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who always does what is right.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I’m exhausted! My life is spent with sorrow,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my years with sighing and sadness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of all these troubles, I have no more strength.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My inner being '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text reads “My bones grow weak.” Bones in the Bible are symbols of our inner being.
      marker-yv: yv-n
    - type: text
      text: is so weak and frail.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My enemies say, “You are nothing!”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even my friends and neighbors hold me in contempt!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dread seeing me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they look the other way when I pass by.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I am totally forgotten, buried away like a dead man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: discarded like a broken dish thrown in the trash.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I overheard their whispered threats, the slander of my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m terrified as they plot and scheme to take my life.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I’m desperate, Lord! I throw myself upon you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you alone are my God!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My life, my every moment, my destiny—it’s all in your hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I know you can deliver me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from those who persecute me relentlessly.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Smile '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cause your face to shine.”
      marker-yv: yv-n
    - type: text
      text: on me, your servant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your undying love and glorious grace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: save me from all this gloom.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: As I call upon you, let my shame and disgrace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be replaced by your favor once again.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But let shame and disgrace fall instead upon the wicked—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those going to their own doom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: drifting down in silence to the dust of death.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: At last their lying lips will be muted in their graves.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they are arrogant, filled with contempt and conceit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they speak against the godly.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Lord, how wonderful you are!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have stored up so many good things for us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a treasure chest heaped up and spilling over with blessings—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all for those who honor and worship you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everybody knows what you can do
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for those who turn and hide themselves in you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Rescue me quickly when I cry out to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the sound of my prayer may your ear be turned to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be my strong shelter and hiding place on high.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pull me into victory and breakthrough.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So hide all your beloved ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the sheltered, secret place before your face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Overshadow them with your glory-presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep them from these accusations, the brutal insults of evil men.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tuck them safely away in the tabernacle where you dwell.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The name of the Lord is blessed and lifted high!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For his marvelous miracle of mercy protected me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I was overwhelmed by my enemies.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I spoke hastily when I said, “The Lord has deserted me.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For in truth, you did hear my prayer and came to rescue me.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Listen to me, all you godly ones: Love the Lord with passion!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord protects and preserves all those who are loyal to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he pays back in full all those who reject him in their pride.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: So cheer up! Take courage, all you who love him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wait for him to break through for you, all who trust in him!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: For you are my high fortress, where I’m kept safe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are to me a stronghold of salvation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you deliver me out of this peril,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will bring glory to your name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As you guide me forth I’ll be kept safe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the hidden snares of the enemy—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the secret traps that lie before me—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have become my rock of strength.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Into your hands I now entrust my spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was quoted by Jesus as he was dying on the cross. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 27:50
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, the God of faithfulness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have rescued and redeemed me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I despise these deceptive illusions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all this pretense and nonsense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I worship only you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: In mercy you have seen my troubles, and you have cared for me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even during this crisis in my soul I will be radiant with joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filled with praise for your love and mercy.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You have kept me from being conquered by my enemy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you broke open the way to bring me to freedom,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a picture of the stone rolled away from the tomb of Jesus.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into a beautiful, broad place.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could be the throne room where Jesus ascended after his death.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: O Lord, help me again! Keep showing me such mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am in anguish, always in tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I’m worn out with weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m becoming old because of grief; my health is broken.
