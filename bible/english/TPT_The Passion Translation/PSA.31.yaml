document_id: PSA.31,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: How Great Is Your Goodness
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A song of poetic praise by King David
  - type: text
    content: I trust you, Lord, to be my hiding place.
  - type: text
    content: Don’t let me down.
  - type: text
    content: Don’t let my enemies bring me to shame.
  - type: text
    content: Come and rescue me, for you are the only God
  - type: text
    content: who always does what is right.
  '10':
  - type: text
    content: I’m exhausted! My life is spent with sorrow,
  - type: text
    content: my years with sighing and sadness.
  - type: text
    content: Because of all these troubles, I have no more strength.
  - type: text
    content: 'My inner being '
  - type: note
    content: The Hebrew text reads “My bones grow weak.” Bones in the Bible are symbols of our inner being.
  - type: text
    content: is so weak and frail.
  '11':
  - type: text
    content: My enemies say, “You are nothing!”
  - type: text
    content: Even my friends and neighbors hold me in contempt!
  - type: text
    content: They dread seeing me,
  - type: text
    content: and they look the other way when I pass by.
  '12':
  - type: text
    content: I am totally forgotten, buried away like a dead man,
  - type: text
    content: discarded like a broken dish thrown in the trash.
  '13':
  - type: text
    content: I overheard their whispered threats, the slander of my enemies.
  - type: text
    content: I’m terrified as they plot and scheme to take my life.
  '14':
  - type: text
    content: I’m desperate, Lord! I throw myself upon you,
  - type: text
    content: for you alone are my God!
  '15':
  - type: text
    content: My life, my every moment, my destiny—it’s all in your hands.
  - type: text
    content: So I know you can deliver me
  - type: text
    content: from those who persecute me relentlessly.
  '16':
  - type: text
    content: 'Smile '
  - type: note
    content: Or “Cause your face to shine.”
  - type: text
    content: on me, your servant.
  - type: text
    content: Let your undying love and glorious grace
  - type: text
    content: save me from all this gloom.
  '17':
  - type: text
    content: As I call upon you, let my shame and disgrace
  - type: text
    content: be replaced by your favor once again.
  - type: text
    content: But let shame and disgrace fall instead upon the wicked—
  - type: text
    content: those going to their own doom,
  - type: text
    content: drifting down in silence to the dust of death.
  '18':
  - type: text
    content: At last their lying lips will be muted in their graves.
  - type: text
    content: For they are arrogant, filled with contempt and conceit
  - type: text
    content: as they speak against the godly.
  '19':
  - type: text
    content: Lord, how wonderful you are!
  - type: text
    content: You have stored up so many good things for us,
  - type: text
    content: like a treasure chest heaped up and spilling over with blessings—
  - type: text
    content: all for those who honor and worship you!
  - type: text
    content: Everybody knows what you can do
  - type: text
    content: for those who turn and hide themselves in you.
  '2':
  - type: text
    content: Rescue me quickly when I cry out to you.
  - type: text
    content: At the sound of my prayer may your ear be turned to me.
  - type: text
    content: Be my strong shelter and hiding place on high.
  - type: text
    content: Pull me into victory and breakthrough.
  '20':
  - type: text
    content: So hide all your beloved ones
  - type: text
    content: in the sheltered, secret place before your face.
  - type: text
    content: Overshadow them with your glory-presence.
  - type: text
    content: Keep them from these accusations, the brutal insults of evil men.
  - type: text
    content: Tuck them safely away in the tabernacle where you dwell.
  '21':
  - type: text
    content: The name of the Lord is blessed and lifted high!
  - type: text
    content: For his marvelous miracle of mercy protected me
  - type: text
    content: when I was overwhelmed by my enemies.
  '22':
  - type: text
    content: I spoke hastily when I said, “The Lord has deserted me.”
  - type: text
    content: For in truth, you did hear my prayer and came to rescue me.
  '23':
  - type: text
    content: 'Listen to me, all you godly ones: Love the Lord with passion!'
  - type: text
    content: The Lord protects and preserves all those who are loyal to him.
  - type: text
    content: But he pays back in full all those who reject him in their pride.
  '24':
  - type: text
    content: So cheer up! Take courage, all you who love him.
  - type: text
    content: Wait for him to break through for you, all who trust in him!
  '3':
  - type: text
    content: For you are my high fortress, where I’m kept safe.
  - type: text
    content: You are to me a stronghold of salvation.
  - type: text
    content: When you deliver me out of this peril,
  - type: text
    content: it will bring glory to your name.
  - type: text
    content: As you guide me forth I’ll be kept safe
  - type: text
    content: from the hidden snares of the enemy—
  - type: text
    content: the secret traps that lie before me—
  - type: text
    content: for you have become my rock of strength.
  '5':
  - type: text
    content: Into your hands I now entrust my spirit.
  - type: note
    content: This was quoted by Jesus as he was dying on the cross. See Matt. 27:50.
  - type: text
    content: O Lord, the God of faithfulness,
  - type: text
    content: you have rescued and redeemed me.
  '6':
  - type: text
    content: I despise these deceptive illusions,
  - type: text
    content: all this pretense and nonsense,
  - type: text
    content: for I worship only you.
  '7':
  - type: text
    content: In mercy you have seen my troubles, and you have cared for me;
  - type: text
    content: even during this crisis in my soul I will be radiant with joy,
  - type: text
    content: filled with praise for your love and mercy.
  '8':
  - type: text
    content: You have kept me from being conquered by my enemy;
  - type: text
    content: you broke open the way to bring me to freedom,
  - type: note
    content: This is a picture of the stone rolled away from the tomb of Jesus.
  - type: text
    content: into a beautiful, broad place.
  - type: note
    content: This could be the throne room where Jesus ascended after his death.
  '9':
  - type: text
    content: O Lord, help me again! Keep showing me such mercy.
  - type: text
    content: For I am in anguish, always in tears,
  - type: text
    content: and I’m worn out with weeping.
  - type: text
    content: I’m becoming old because of grief; my health is broken.
