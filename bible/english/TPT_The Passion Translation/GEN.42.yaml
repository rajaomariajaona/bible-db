document_id: GEN.42,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joseph’s Brothers Go to Egypt
  - type: text
    content: 'When Jacob learned there was food in Egypt, he said to his sons, “Why are you standing around here staring at each other? '
  '10':
  - type: text
    content: 'His brothers replied, “No, master; we’ve come to buy food. '
  '11':
  - type: text
    content: We, your servants, are honest men; we’d never think of spying! We’re blood brothers, sons of one father.”
  '12':
  - type: text
    content: Joseph interrupted, “No! You are spies who have come here to find our weakness!”
  '13':
  - type: text
    content: “We are your servants,” they insisted. “We were twelve brothers, our youngest brother remained behind with our father, and one brother—well, he is no more.”
  '14':
  - type: text
    content: 'Joseph said to them, “It’s just as I said; you are spies! '
  '15':
  - type: text
    content: 'And here is how I’ll test you: unless your younger brother comes and presents himself here '
  - type: text
    content: before me
  - type: text
    content: ', then as surely as Pharaoh lives, you shall not depart from here! '
  '16':
  - type: text
    content: 'One of you must go and bring me your brother, while the rest of you will remain here in confinement. This way I will test your words to see if the story you have told me is true. If not, as surely as Pharaoh lives, you are spies!” '
  '17':
  - type: text
    content: He placed them all in prison together for three days.
  - type: note
    content: Joseph put his brothers in confinement for three days, perhaps to let them know how he had suffered in prison for those many years—not to punish, but to prepare them. They could only conclude that God had confined them because of what they had done to Joseph.
  - type: heading
    content: Joseph Tests His Brothers
  '18':
  - type: text
    content: 'On the third day, Joseph said to them, “Do as I say and you will live. I am a man who respects God. '
  '19':
  - type: text
    content: 'If you are as honest as you say you are, then I will keep just one of your brothers here in confinement while the rest of you carry grain home for your starving families. '
  '2':
  - type: text
    content: 'I hear there is grain in Egypt; go there and buy some for us so we don’t all starve to death.” '
  '20':
  - type: text
    content: You must return with your youngest brother so that I may verify your story, and that you may not die.” So they agreed to do so.
  '21':
  - type: text
    content: With Joseph standing there
  - type: text
    content: ', they began to speak among themselves, saying, “'
  - type: text
    content: Look what’s happened to us!
  - type: text
    content: ' We’re being punished for what we did to Joseph long ago. We heard his cries of anguish and saw the agony of his soul when he begged us for mercy, but we turned a deaf ear. That’s why all this trouble has come upon us!”'
  '22':
  - type: text
    content: 'Then Reuben spoke up, “Didn’t I tell you not to sin against the boy? But you wouldn’t listen! So now we’re paying the price for his murder!” '
  - type: note
    content: Or “Now comes the reckoning for his blood!”
  '23':
  - type: text
    content: They had no clue that Joseph understood every word, for he had been speaking to them through an interpreter.
  '24':
  - type: text
    content: Deeply affected by what he heard
  - type: text
    content: ', Joseph began to weep and hurriedly left their presence. After '
  - type: text
    content: he had composed himself
  - type: text
    content: ', he returned to them, and pointing to Simeon, said, '
  - type: text
    content: “This one will remain here.”
  - type: text
    content: ' '
  - type: note
    content: Joseph wanted to be sure they would return to Egypt. Simeon’s name means “he who hears.” By keeping Simeon, Joseph was showing them that they had “lost their hearing.” Also, Joseph was testing them to see if they would abandon Simeon as they had him. While in prison, Simeon would have lots of time on his hands to listen—and discern. Simeon was known for his cruelty (see Gen. 34:25; 49:5–7), and he might have been the one that led the way in their persecution of Joseph.
  - type: text
    content: 'Then he had him tied and bound while they all watched. '
  '25':
  - type: text
    content: 'Joseph then gave orders to have their bags filled with grain, to hide each man’s money back inside his sack, '
  - type: note
    content: As the nine brothers left for Canaan, Joseph gave them sacks of grain for their journey. At his orders, his brothers’ money was replaced in their sacks of grain. Joseph paid for the grain himself, for he loved his brothers. His secret love paid their debt (see Isa. 55:1). They deserved no grain, they deserved no money, but mercy prevailed. The money in the sacks was also a part of Joseph’s wise plan to test his brothers.
  - type: text
    content: 'and to give them provisions for their journey home. After this was done for them, '
  '26':
  - type: text
    content: they loaded their donkeys with the bags of grain and departed.
  - type: heading
    content: Joseph’s Brothers Return to Canaan
  '27':
  - type: text
    content: 'Later, they camped for the night, and as one of them '
  - type: note
    content: The Midrash identifies him as Levi. See Targum Jonathan.
  - type: text
    content: 'opened his sack of grain to feed his donkey, he discovered that his money was there right on top of the grain! '
  '28':
  - type: text
    content: He shouted to his brothers, “My money! Look, someone put my money back in my sack!” Troubled and trembling, they said to each other, “What in the world has God done to us?”
  '29':
  - type: text
    content: 'When they came to their father Jacob in Canaan, they told him the story of all that happened to them, saying, '
  '3':
  - type: text
    content: 'So Joseph’s ten half brothers went down to buy grain in Egypt, '
  '30':
  - type: text
    content: '“The governor of Egypt spoke harshly to us and accused us of being spies. '
  '31':
  - type: text
    content: 'We told him, ‘We are not spies but honest men. '
  '32':
  - type: text
    content: 'We’re twelve brothers, sons of our father. Our youngest remained with our father in the land of Canaan, and one is no more.’ '
  '33':
  - type: text
    content: 'Then the man, the governor of Egypt, demanded, ‘By this test, I will discern if you are honest men: Leave one of your brothers with me, take the grain you need for your families, and be on your way. '
  '34':
  - type: text
    content: Return to me with your youngest brother, then I’ll know you are not spies, but men of integrity. Then I’ll release your brother back to you, and you’ll be free to trade in the land.’ ”
  '35':
  - type: text
    content: 'As they each emptied their sacks of grain, each man found his money inside his sack! When they and their father saw their money returned to them, they were frightened. '
  '36':
  - type: text
    content: Their father Jacob said to his sons, “You have taken away my children! First, Joseph is gone, and now, Simeon! And now, you want to take Benjamin from me! Everything is against me!”
  - type: note
    content: And how many times have we said that everything is against us when, in fact, everything and every event is being woven together for our good because we love God (see Rom. 8:28)? See also Ps. 34:19; Isa. 41:10, 13.
  '37':
  - type: text
    content: Then Reuben said, “
  - type: text
    content: Father
  - type: text
    content: ', you may put my two sons '
  - type: note
    content: Reuben had four sons, so the Hebrew implies “two of my sons.”
  - type: text
    content: to death if I fail to bring Benjamin back to you! Trust me—I will bring him back!”
  '38':
  - type: text
    content: 'But Jacob replied, “I can’t let my son '
  - type: text
    content: Benjamin
  - type: text
    content: ' go with you. For his brother is dead, and of '
  - type: text
    content: Rachel’s sons
  - type: text
    content: ', he alone is left. '
  - type: note
    content: Jacob could not see how insensitive his remarks were. Reuben was a son, Judah was a son, Levi was a son, and so were all the others. Jacob spoke as if the other sons did not matter; Jacob continued to show favoritism.
  - type: text
    content: 'If he were to meet with disaster on your journey, '
  - type: text
    content: I would die of grief
  - type: text
    content: '! You will send my white hair and broken heart sorrowing down to the grave!”'
  - type: note
    content: Or, in Hebrew, “Sheol.”
  '4':
  - type: text
    content: 'but Jacob did not send Joseph’s '
  - type: text
    content: full
  - type: text
    content: ' brother Benjamin with them, because he feared something might happen to him. '
  '5':
  - type: text
    content: So Israel’s sons were among those who went to Egypt to buy grain, for the famine in the land of Canaan was severe.
  - type: note
    content: Joseph’s ten brothers left for Egypt on a journey of eight to ten days to buy food for their very large families (see Gen. 46:26).
  '6':
  - type: text
    content: 'Now Joseph was the governor of the land of Egypt, which meant he supervised the sale of grain to all the people. '
  - type: text
    content: One day
  - type: text
    content: ', Joseph’s '
  - type: text
    content: ten
  - type: text
    content: ' brothers came and bowed down before him with their faces on the ground. '
  - type: note
    content: Joseph was seventeen when he had his dreams. At the age of thirty, he was exalted over Egypt. About nine years later his brothers come to buy grain from him. After he had waited twenty-two years for the fulfillment of his prophetic dreams, here were his brothers bowing down before him. What a feeling that must have been! When his ten brothers came before him, he knew who they were, even though they didn’t recognize him. His dream was being fulfilled right before his eyes—almost. As they were bowing down before him, he counted them; there were only ten, not eleven. Where was the eleventh? Joseph needed a plan.
  '7':
  - type: text
    content: 'As soon as Joseph saw them, he realized that they were his brothers! But he pretended he didn’t know them and spoke to them harshly: “Where do you come from?”'
  - type: text
    content: “From the land of Canaan,” they answered, “and we’re here to buy food.”
  '8':
  - type: text
    content: 'Although Joseph recognized his brothers, they had no clue that it was Joseph speaking to them. '
  '9':
  - type: text
    content: 'Then at once, Joseph remembered the dreams he had about them '
  - type: text
    content: bowing down before him
  - type: text
    content: '! '
  - type: note
    content: At that moment, Joseph had the choice of revealing his identity to his brothers or remaining in disguise. He chose the latter, for the wisdom of God was in him. He wanted to test them to see if they were repentant of their betrayal. From a human standpoint, Joseph would have been happy for an instant reconciliation with them, but Joseph was a man broken by God and was now prepared to deliver others. Joseph spoke and acted in such a way that their hearts would be revealed and exposed. Did Joseph wonder if they had done to Benjamin what they had done to him? It was not a spirit of revenge driving Joseph, but a true love for his brothers and for the ways of God. The tests Joseph took them through were designed by God to see what they had done and if they had come to repentance. See 2 Peter 3:9.
  - type: text
    content: Pausing
  - type: text
    content: ', he said to them, “You are spies! You’ve come to see where our land is weak!”'
  - type: note
    content: Or “to see the nakedness of the land.”
