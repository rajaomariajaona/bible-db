document_id: GEN.42,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph’s Brothers Go to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jacob learned there was food in Egypt, he said to his sons, “Why are you standing around here staring at each other? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His brothers replied, “No, master; we’ve come to buy food. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We, your servants, are honest men; we’d never think of spying! We’re blood brothers, sons of one father.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph interrupted, “No! You are spies who have come here to find our weakness!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We are your servants,” they insisted. “We were twelve brothers, our youngest brother remained behind with our father, and one brother—well, he is no more.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph said to them, “It’s just as I said; you are spies! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And here is how I’ll test you: unless your younger brother comes and presents himself here '
    - type: usfm
      marker: it
      children:
      - type: text
        text: before me
    - type: text
      text: ', then as surely as Pharaoh lives, you shall not depart from here! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of you must go and bring me your brother, while the rest of you will remain here in confinement. This way I will test your words to see if the story you have told me is true. If not, as surely as Pharaoh lives, you are spies!” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He placed them all in prison together for three days.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph put his brothers in confinement for three days, perhaps to let them know how he had suffered in prison for those many years—not to punish, but to prepare them. They could only conclude that God had confined them because of what they had done to Joseph.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph Tests His Brothers
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the third day, Joseph said to them, “Do as I say and you will live. I am a man who respects God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you are as honest as you say you are, then I will keep just one of your brothers here in confinement while the rest of you carry grain home for your starving families. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hear there is grain in Egypt; go there and buy some for us so we don’t all starve to death.” '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You must return with your youngest brother so that I may verify your story, and that you may not die.” So they agreed to do so.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: With Joseph standing there
    - type: text
      text: ', they began to speak among themselves, saying, “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Look what’s happened to us!
    - type: text
      text: ' We’re being punished for what we did to Joseph long ago. We heard his cries of anguish and saw the agony of his soul when he begged us for mercy, but we turned a deaf ear. That’s why all this trouble has come upon us!”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Reuben spoke up, “Didn’t I tell you not to sin against the boy? But you wouldn’t listen! So now we’re paying the price for his murder!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Now comes the reckoning for his blood!”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They had no clue that Joseph understood every word, for he had been speaking to them through an interpreter.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Deeply affected by what he heard
    - type: text
      text: ', Joseph began to weep and hurriedly left their presence. After '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he had composed himself
    - type: text
      text: ', he returned to them, and pointing to Simeon, said, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: “This one will remain here.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph wanted to be sure they would return to Egypt. Simeon’s name means “he who hears.” By keeping Simeon, Joseph was showing them that they had “lost their hearing.” Also, Joseph was testing them to see if they would abandon Simeon as they had him. While in prison, Simeon would have lots of time on his hands to listen—and discern. Simeon was known for his cruelty (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 34:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49:5–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and he might have been the one that led the way in their persecution of Joseph.
      marker-yv: yv-n
    - type: text
      text: 'Then he had him tied and bound while they all watched. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph then gave orders to have their bags filled with grain, to hide each man’s money back inside his sack, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As the nine brothers left for Canaan, Joseph gave them sacks of grain for their journey. At his orders, his brothers’ money was replaced in their sacks of grain. Joseph paid for the grain himself, for he loved his brothers. His secret love paid their debt (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 55:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). They deserved no grain, they deserved no money, but mercy prevailed. The money in the sacks was also a part of Joseph’s wise plan to test his brothers.
      marker-yv: yv-n
    - type: text
      text: 'and to give them provisions for their journey home. After this was done for them, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: they loaded their donkeys with the bags of grain and departed.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph’s Brothers Return to Canaan
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later, they camped for the night, and as one of them '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Midrash identifies him as Levi. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Targum Jonathan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'opened his sack of grain to feed his donkey, he discovered that his money was there right on top of the grain! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He shouted to his brothers, “My money! Look, someone put my money back in my sack!” Troubled and trembling, they said to each other, “What in the world has God done to us?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they came to their father Jacob in Canaan, they told him the story of all that happened to them, saying, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joseph’s ten half brothers went down to buy grain in Egypt, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The governor of Egypt spoke harshly to us and accused us of being spies. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We told him, ‘We are not spies but honest men. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We’re twelve brothers, sons of our father. Our youngest remained with our father in the land of Canaan, and one is no more.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the man, the governor of Egypt, demanded, ‘By this test, I will discern if you are honest men: Leave one of your brothers with me, take the grain you need for your families, and be on your way. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Return to me with your youngest brother, then I’ll know you are not spies, but men of integrity. Then I’ll release your brother back to you, and you’ll be free to trade in the land.’ ”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they each emptied their sacks of grain, each man found his money inside his sack! When they and their father saw their money returned to them, they were frightened. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Their father Jacob said to his sons, “You have taken away my children! First, Joseph is gone, and now, Simeon! And now, you want to take Benjamin from me! Everything is against me!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: And how many times have we said that everything is against us when, in fact, everything and every event is being woven together for our good because we love God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )? See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 34:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 41:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Reuben said, “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Father
    - type: text
      text: ', you may put my two sons '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Reuben had four sons, so the Hebrew implies “two of my sons.”
      marker-yv: yv-n
    - type: text
      text: to death if I fail to bring Benjamin back to you! Trust me—I will bring him back!”
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jacob replied, “I can’t let my son '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Benjamin
    - type: text
      text: ' go with you. For his brother is dead, and of '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Rachel’s sons
    - type: text
      text: ', he alone is left. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jacob could not see how insensitive his remarks were. Reuben was a son, Judah was a son, Levi was a son, and so were all the others. Jacob spoke as if the other sons did not matter; Jacob continued to show favoritism.
      marker-yv: yv-n
    - type: text
      text: 'If he were to meet with disaster on your journey, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I would die of grief
    - type: text
      text: '! You will send my white hair and broken heart sorrowing down to the grave!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or, in Hebrew, “Sheol.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but Jacob did not send Joseph’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: full
    - type: text
      text: ' brother Benjamin with them, because he feared something might happen to him. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Israel’s sons were among those who went to Egypt to buy grain, for the famine in the land of Canaan was severe.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph’s ten brothers left for Egypt on a journey of eight to ten days to buy food for their very large families (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 46:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joseph was the governor of the land of Egypt, which meant he supervised the sale of grain to all the people. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: One day
    - type: text
      text: ', Joseph’s '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ten
    - type: text
      text: ' brothers came and bowed down before him with their faces on the ground. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph was seventeen when he had his dreams. At the age of thirty, he was exalted over Egypt. About nine years later his brothers come to buy grain from him. After he had waited twenty-two years for the fulfillment of his prophetic dreams, here were his brothers bowing down before him. What a feeling that must have been! When his ten brothers came before him, he knew who they were, even though they didn’t recognize him. His dream was being fulfilled right before his eyes—almost. As they were bowing down before him, he counted them; there were only ten, not eleven. Where was the eleventh? Joseph needed a plan.
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as Joseph saw them, he realized that they were his brothers! But he pretended he didn’t know them and spoke to them harshly: “Where do you come from?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “From the land of Canaan,” they answered, “and we’re here to buy food.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Although Joseph recognized his brothers, they had no clue that it was Joseph speaking to them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then at once, Joseph remembered the dreams he had about them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bowing down before him
    - type: text
      text: '! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: At that moment, Joseph had the choice of revealing his identity to his brothers or remaining in disguise. He chose the latter, for the wisdom of God was in him. He wanted to test them to see if they were repentant of their betrayal. From a human standpoint, Joseph would have been happy for an instant reconciliation with them, but Joseph was a man broken by God and was now prepared to deliver others. Joseph spoke and acted in such a way that their hearts would be revealed and exposed. Did Joseph wonder if they had done to Benjamin what they had done to him? It was not a spirit of revenge driving Joseph, but a true love for his brothers and for the ways of God. The tests Joseph took them through were designed by God to see what they had done and if they had come to repentance. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Peter 3:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Pausing
    - type: text
      text: ', he said to them, “You are spies! You’ve come to see where our land is weak!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 42:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to see the nakedness of the land.”
      marker-yv: yv-n
