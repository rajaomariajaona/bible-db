document_id: PSA.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Witnesses
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A poem of praise by King David, his loving servant
  - type: heading
    content: God’s Story in the Skies
  - type: text
    content: God’s splendor is a tale that is told,
  - type: text
    content: written in the stars.
  - type: note
    content: Or “The heavens are continually rehearsing the glory of God.”
  - type: text
    content: Space itself speaks his story
  - type: text
    content: through the marvels of the heavens.
  - type: text
    content: His truth is on tour in the starry vault of the sky,
  - type: text
    content: showing his skill in creation’s craftsmanship.
  '10':
  - type: text
    content: The rarest treasures of life are found in his truth.
  - type: text
    content: That’s why God’s Word is prized like others prize the finest gold.
  - type: text
    content: Sweeter also than honey are his living words—
  - type: text
    content: sweet words dripping from the honeycomb!
  '11':
  - type: text
    content: For they warn us, your servants,
  - type: text
    content: and keep us from following the wicked way,
  - type: text
    content: 'giving a lifetime guarantee:'
  - type: text
    content: great success to every obedient soul!
  '12':
  - type: text
    content: 'How would I discern the waywardness '
  - type: note
    content: The word waywardness is taken from the Hebrew word for “errors.”
  - type: text
    content: of my heart?
  - type: text
    content: Lord, forgive my hidden flaws whenever you find them.
  '13':
  - type: text
    content: Keep cleansing me, God,
  - type: text
    content: and keep me from my secret, selfish sins;
  - type: text
    content: may they never rule over me!
  - type: text
    content: For only then will I be free from fault
  - type: text
    content: and remain innocent of rebellion.
  '14':
  - type: text
    content: So may the words of my mouth, my meditation-thoughts,
  - type: text
    content: and every movement of my heart be always pure and pleasing,
  - type: text
    content: 'acceptable before your eyes, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: my only Redeemer, my Protector.
  - type: note
    content: Or “my rock [of protection].”
  '2':
  - type: text
    content: 'Each day gushes out its message '
  - type: note
    content: Or “speaks its prophecy.”
  - type: text
    content: to the next,
  - type: text
    content: night by night whispering its knowledge to all—
  '3':
  - type: text
    content: without a sound, without a word, without a voice being heard,
  '4':
  - type: text
    content: yet all the world can hear its echo.
  - type: text
    content: Everywhere its message goes out.
  - type: text
    content: What a heavenly home God has set for the sun,
  - type: text
    content: shining in the superdome of the sky!
  '5':
  - type: text
    content: See how he leaves his celestial chamber each morning,
  - type: text
    content: radiant as a bridegroom ready for his wedding,
  - type: text
    content: like a day-breaking champion eager to run his course.
  '6':
  - type: text
    content: He rises on one horizon, completing his circuit on the other,
  - type: text
    content: warming lives and lands with his heat.
  - type: heading
    content: God’s Story in the Scriptures
  '7':
  - type: text
    content: Yahweh
  - type: text
    content: '’s Word '
  - type: note
    content: Or “The Torah.”
  - type: text
    content: is perfect in every way;
  - type: text
    content: how it revives our souls!
  - type: text
    content: Yahweh
  - type: text
    content: ’s laws lead us to truth,
  - type: text
    content: and his ways change the simple into wise.
  '8':
  - type: text
    content: Yahweh
  - type: text
    content: ’s teachings are right and make us joyful;
  - type: text
    content: his precepts are so pure!
  - type: text
    content: Yahweh
  - type: text
    content: ’s commands challenge us to keep close to his heart!
  - type: text
    content: The revelation-light of his Word makes my spirit shine radiant.
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ’s decrees are trustworthy.
  - type: text
    content: 'The fear of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is pure, enduring forever.'
