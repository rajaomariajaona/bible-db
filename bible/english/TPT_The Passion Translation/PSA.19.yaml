document_id: PSA.19
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God’s Witnesses
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: A poem of praise by King David, his loving servant
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Story in the Skies
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God’s splendor is a tale that is told,
- type: usfm
  marker: q1
  children:
  - type: text
    text: written in the stars.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The heavens are continually rehearsing the glory of God.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Space itself speaks his story
- type: usfm
  marker: q1
  children:
  - type: text
    text: through the marvels of the heavens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His truth is on tour in the starry vault of the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: showing his skill in creation’s craftsmanship.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Each day gushes out its message '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “speaks its prophecy.”
    marker-yv: yv-n
  - type: text
    text: to the next,
- type: usfm
  marker: q1
  children:
  - type: text
    text: night by night whispering its knowledge to all—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: without a sound, without a word, without a voice being heard,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: yet all the world can hear its echo.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Everywhere its message goes out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What a heavenly home God has set for the sun,
- type: usfm
  marker: q1
  children:
  - type: text
    text: shining in the superdome of the sky!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: See how he leaves his celestial chamber each morning,
- type: usfm
  marker: q1
  children:
  - type: text
    text: radiant as a bridegroom ready for his wedding,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a day-breaking champion eager to run his course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He rises on one horizon, completing his circuit on the other,
- type: usfm
  marker: q1
  children:
  - type: text
    text: warming lives and lands with his heat.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Story in the Scriptures
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s Word '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The Torah.”
    marker-yv: yv-n
  - type: text
    text: is perfect in every way;
- type: usfm
  marker: q1
  children:
  - type: text
    text: how it revives our souls!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s laws lead us to truth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and his ways change the simple into wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s teachings are right and make us joyful;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his precepts are so pure!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s commands challenge us to keep close to his heart!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The revelation-light of his Word makes my spirit shine radiant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s decrees are trustworthy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The fear of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' is pure, enduring forever.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The rarest treasures of life are found in his truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s why God’s Word is prized like others prize the finest gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sweeter also than honey are his living words—
- type: usfm
  marker: q1
  children:
  - type: text
    text: sweet words dripping from the honeycomb!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For they warn us, your servants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and keep us from following the wicked way,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'giving a lifetime guarantee:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: great success to every obedient soul!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'How would I discern the waywardness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: waywardness
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is taken from the Hebrew word for “errors.”
    marker-yv: yv-n
  - type: text
    text: of my heart?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lord, forgive my hidden flaws whenever you find them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Keep cleansing me, God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and keep me from my secret, selfish sins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: may they never rule over me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For only then will I be free from fault
- type: usfm
  marker: q1
  children:
  - type: text
    text: and remain innocent of rebellion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: So may the words of my mouth, my meditation-thoughts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and every movement of my heart be always pure and pleasing,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'acceptable before your eyes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: my only Redeemer, my Protector.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 19:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “my rock [of protection].”
    marker-yv: yv-n
