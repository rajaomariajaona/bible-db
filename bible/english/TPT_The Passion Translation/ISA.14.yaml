  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'One and all will say to you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “
    - type: usfm
      marker: it
      children:
      - type: text
        text: Look at you!
    - type: text
      text: ' You’ve become as weak as we are.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now you’re just like us!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Your pompous pride brought you down to the underworld
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the hum of harps.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the sound of your harps.” The Hebrew word for “harp” can also be translated “jars” or “pitchers,” with an implication of the noise of clashing jars being broken.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you will lie on a bed of maggots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a blanket of worms will cover you!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Son of the Dawn
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Look how you have fallen from your heavenly place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'O shining one, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “daystar” or “morning star.” Many scholars and expositors view this passage (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) as not only the fall of Babylon under Nebuchadnezzar but also the fall of Satan from heaven (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 10:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Lucifer, a name for Satan, is the Latin word for “the morning star” or “Venus.” Some view this passage as referring to Adam and the sin of man (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Thess. 2:3–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: son of the dawn!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have been cut down to the ground,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you who conquered nations.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “laid low the people.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You said in your heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘I will ascend into heaven
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and exalt my throne above the stars of God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lucifer wanted to mount up to the heavens. He desired to occupy the highest heavens, to probe the kingdom of the infinite God. His position of favor before God’s throne was not enough. He wanted a throne from which he could exercise final authority and make decisions pertaining to the angelic host (“the stars of God”). He wanted to rule over all the angels.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will rule on the mountain of the congregation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on the highest place of the sacred mountain.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the summit of Zaphon” or “the farthest reaches of the north” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 48:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Lucifer desired to be enthroned in the highest place, having all the angelic assemblies in submission to him. He wanted to be the center of attention.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will rise past the tops of the clouds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rival the Most High God!’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Yet down to the underworld you go—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into the depths of the pit!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cistern,” a metaphor for the underworld.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Everyone will stare at you and ponder your fate, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “peer at you closely.”
      marker-yv: yv-n
    - type: text
      text: saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Is this the man who shook the earth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made the kingdoms tremble?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Is this the man who made the world a desert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and overthrew its cities and refused to free his prisoners
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and let them return home?’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Every king at death lies in state,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: each in his crypt of splendor,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: but you are an unburied, trampled corpse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: thrown out of your grave like a rotten stick
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wrapped in the bloody clothing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of those slain by the sword.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nations will take them back to their own place,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 49:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 60:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 66:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . They will bring them to their own place; that is, into the body of Christ (see
      - type: usfm
