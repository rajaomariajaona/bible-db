document_id: ISA.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Restoration of Judah
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will most certainly'
  - type: text
    content: show tender mercy to the Israelites.
  - type: note
    content: Or “to Jacob.” See Rom. 9–11.
  - type: text
    content: He will choose them again and settle them in their own land.
  - type: note
    content: See 1 Kings 8:56; Isa. 32:18.
  - type: text
    content: Even foreigners will accompany them
  - type: text
    content: and join with the Jewish people.
  - type: note
    content: Or “house of Jacob.” “Foreigners” (gentiles) and Jews make up “the one new race of humanity.” See Eph. 2:11–22.
  '10':
  - type: text
    content: 'One and all will say to you:'
  - type: text
    content: “
  - type: text
    content: Look at you!
  - type: text
    content: ' You’ve become as weak as we are.'
  - type: text
    content: Now you’re just like us!
  '11':
  - type: text
    content: Your pompous pride brought you down to the underworld
  - type: text
    content: with the hum of harps.
  - type: note
    content: Or “the sound of your harps.” The Hebrew word for “harp” can also be translated “jars” or “pitchers,” with an implication of the noise of clashing jars being broken.
  - type: text
    content: But you will lie on a bed of maggots,
  - type: text
    content: and a blanket of worms will cover you!”
  - type: heading
    content: The Son of the Dawn
  '12':
  - type: text
    content: “Look how you have fallen from your heavenly place,
  - type: text
    content: 'O shining one, '
  - type: note
    content: Or “daystar” or “morning star.” Many scholars and expositors view this passage (vv. 12–21) as not only the fall of Babylon under Nebuchadnezzar but also the fall of Satan from heaven (see Luke 10:18). Lucifer, a name for Satan, is the Latin word for “the morning star” or “Venus.” Some view this passage as referring to Adam and the sin of man (see 2 Thess. 2:3–8).
  - type: text
    content: son of the dawn!
  - type: text
    content: You have been cut down to the ground,
  - type: text
    content: you who conquered nations.
  - type: note
    content: Or “laid low the people.”
  '13':
  - type: text
    content: You said in your heart,
  - type: text
    content: ‘I will ascend into heaven
  - type: text
    content: and exalt my throne above the stars of God.
  - type: note
    content: Lucifer wanted to mount up to the heavens. He desired to occupy the highest heavens, to probe the kingdom of the infinite God. His position of favor before God’s throne was not enough. He wanted a throne from which he could exercise final authority and make decisions pertaining to the angelic host (“the stars of God”). He wanted to rule over all the angels.
  - type: text
    content: I will rule on the mountain of the congregation,
  - type: text
    content: on the highest place of the sacred mountain.
  - type: note
    content: Or “the summit of Zaphon” or “the farthest reaches of the north” (Ps. 48:1–2). Lucifer desired to be enthroned in the highest place, having all the angelic assemblies in submission to him. He wanted to be the center of attention.
  '14':
  - type: text
    content: I will rise past the tops of the clouds
  - type: text
    content: and rival the Most High God!’
  '15':
  - type: text
    content: Yet down to the underworld you go—
  - type: text
    content: into the depths of the pit!
  - type: note
    content: Or “cistern,” a metaphor for the underworld.
  '16':
  - type: text
    content: 'Everyone will stare at you and ponder your fate, '
  - type: note
    content: Or “peer at you closely.”
  - type: text
    content: saying,
  - type: text
    content: ‘Is this the man who shook the earth
  - type: text
    content: and made the kingdoms tremble?
  '17':
  - type: text
    content: Is this the man who made the world a desert
  - type: text
    content: and overthrew its cities and refused to free his prisoners
  - type: text
    content: and let them return home?’
  '18':
  - type: text
    content: Every king at death lies in state,
  - type: text
    content: each in his crypt of splendor,
  '19':
  - type: text
    content: but you are an unburied, trampled corpse,
  - type: text
    content: thrown out of your grave like a rotten stick
  - type: text
    content: and wrapped in the bloody clothing
  - type: text
    content: of those slain by the sword.
  '2':
  - type: text
    content: Nations will take them back to their own place,
  - type: note
    content: See Isa. 49:22; 60:9; 66:20. They will bring them to their own place; that is, into the body of Christ (see John 14:1–3; 1 Cor. 12:18; Eph. 4:16).
  - type: text
    content: 'and the Jews '
  - type: note
    content: Or “house of Israel.”
  - type: text
    content: 'will own their enemies '
  - type: note
    content: Or “possess them as menservants and maidservants.”
  - type: text
    content: as their inheritance
  - type: text
    content: 'in the land '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave them.'
  - type: note
    content: See Ps. 126.
  - type: text
    content: They will take their captors captive
  - type: text
    content: and rule over those who once oppressed them.
  - type: note
    content: See Isa. 60:14. The oppressors today are Satan (see Rom. 16:20) and the mind of man (see 2 Cor. 10:3–5).
  - type: heading
    content: Downfall of the King of Babylon
  '20':
  - type: text
    content: You will not have a burial like them,
  - type: text
    content: because you destroyed both your land and your people.
  - type: text
    content: May your wicked descendants never be mentioned again!
  '21':
  - type: text
    content: Prepare to execute his sons because of the sins of their father.
  - type: note
    content: As translated from the Syriac and the Septuagint. Hebrew is “fathers [ancestors].” See Ezek. 18:20.
  - type: text
    content: May they never rise to conquer the earth
  - type: text
    content: and cover the world with their cities.”
  - type: heading
    content: Utter Extermination of Babylon
  '22':
  - type: text
    content: “I will rise up against them,”
  - type: text
    content: 'declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: “I will blot out the name Babylon and her survivors,
  - type: text
    content: 'her offspring and descendants,” declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '23':
  - type: text
    content: “I will turn it into a swampland and a place for wild animals.
  - type: note
    content: The meaning of the Hebrew word qippod is uncertain. Some translate it as “hedgehog,” “porcupine,” or “owl.”
  - type: text
    content: Like dirt on the floor I will sweep it away
  - type: text
    content: with the broom of destruction,”
  - type: text
    content: 'declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: heading
    content: The Lord’s Plan for Assyria
  '24':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: 'makes this solemn decree:'
  - type: text
    content: '“Be sure of this: Just as I have planned, '
  - type: note
    content: Or “imagined it.”
  - type: text
    content: so it will be.
  - type: text
    content: Every purpose of my heart will surely come to pass.
  '25':
  - type: text
    content: I will crush the Assyrians who invade my land.
  - type: text
    content: I will trample them on my mountains.
  - type: text
    content: 'Their yoke '
  - type: text
    content: of slavery
  - type: text
    content: ' will be removed from my people'
  - type: text
    content: and their heavy burden from their shoulders.
  '26':
  - type: text
    content: This is the plan that I have determined for the entire world.
  - type: text
    content: I will accomplish it by the demonstration of my mighty power
  - type: note
    content: Or “the hand stretched out,” a metaphor for God accomplishing by his power.
  - type: text
    content: throughout the earth!”
  '27':
  - type: text
    content: 'For the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies,'
  - type: text
    content: has an amazing strategy, and who can thwart him?
  - type: text
    content: When he moves in power, who can stop him?
  - type: note
    content: Or “When his hand is stretched out, who will turn it back?”
  - type: heading
    content: God’s Judgment of the Philistines
  '28':
  - type: text
    content: 'This prophecy came to Isaiah in the year King Ahaz died:'
  - type: note
    content: This prophecy is one of three that are dated in the book. See Isa. 6; 20:1–2.
  - type: text
    content: Don’t rejoice too soon, you Philistines,
  - type: note
    content: The Hebrew meaning of Philistines is “those who roll in the dust.” They become a picture of believers who are walking in the flesh (see Gal. 5:16) and not living by the dynamic power of the Holy Spirit (see Rom. 8:4).
  - type: text
    content: 'just because the rod '
  - type: note
    content: The “rod” is a likely figure of speech for Ahaz, although some see it as a reference to Uzziah, the demise of the Davidic monarchy, or an Assyrian king.
  - type: text
    content: that beat you is broken!
  '29':
  - type: text
    content: 'A snake '
  - type: note
    content: The “snake” is possibly Ahaz’s son, Hezekiah, who would have been like a snake to the Philistines, ready to strike them.
  - type: text
    content: will sprout from the root of that serpent,
  - type: text
    content: 'and his descendant '
  - type: note
    content: 'Or “firstfruit.” The oldest commentaries and the Jewish Targums interpret this last clause as a prophecy of the Messiah, who would be “like a flying, fiery, burning one.” The Targum states, “For from the sons of the son of Jesse shall the Messiah come forth and his deeds shall be among you as a deadly serpent” (John Frederick Stenning, The Targum of Isaiah [Oxford: Clarendon Press, 1949], pp. 50–51). He would be more dangerous to the Philistines (a metaphor for the flesh) than any other king.'
  - type: text
    content: will be like a flying, fiery, burning one.
  - type: note
    content: Or “seraph [burning one].” Some see the seraph as a type of fiery serpent, but the meaning of the Hebrew word seraph is clearly “a burning one.” See Isa. 6:6.
  '3':
  - type: text
    content: 'In that day, when the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has given you rest from your pain, trouble, and cruel bondage, '
  - type: note
    content: See Matt. 11:28–30; Rom. 6:1–14; Heb. 3–4.
  '30':
  - type: text
    content: And through him the poorest of the poor will find pasture
  - type: note
    content: Or “the firstborn [or firstfruits] of the poor will graze [in my pastures].” The “firstborn of the poor” is likely a figure of speech for “the poorest of the poor.”
  - type: text
    content: and the needy will lie down in peace.
  - type: text
    content: The Lord will starve the root of the Philistines with a famine
  - type: text
    content: that will annihilate your survivors.
  '31':
  - type: text
    content: Wail, O gate! Cry out, O city! Melt with fear, Philistia!
  - type: text
    content: 'For a cloud of smoke '
  - type: note
    content: The Syriac is “a stout [brave, valiant] one.”
  - type: text
    content: comes out of the north,
  - type: text
    content: and there is no straggler among them.
  - type: note
    content: The meaning of this Hebrew clause is uncertain. This seems to be a picture of an invading army; however, the Septuagint is “and there is nothing more they need to live.”
  '32':
  - type: text
    content: And what will be the answer of the messengers of the nations?
  - type: text
    content: That the Lord has laid the foundation of Zion,
  - type: note
    content: See Ps. 118:22; Isa. 28:16; Matt. 21:42; Eph. 2:20; 1 Peter 2:6–7.
  - type: text
    content: and in her his needy ones will find shelter.
  - type: note
    content: Or “through him the humble will be saved” (LXX).
  '4':
  - type: text
    content: 'you will jeer at the king of Babylon and recite this proverb:'
  - type: note
    content: “Proverb” is the Hebrew word mashal, a homonym for both “proverb” (Prov. 1:1) and “to rule [as king],” “to triumph,” or “to take dominion.” The life and power of “Babylon” (confusion) is conquered by the indwelling life of Christ.
  - type: text
    content: “Your oppressor has been stilled and your onslaught is over!
  - type: note
    content: Or “the golden city has ceased.”
  '5':
  - type: text
    content: 'The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has shattered the staff of the wicked,'
  - type: text
    content: 'the brutal rod '
  - type: note
    content: A “brutal rod,” a metonymy, represents the authority of wicked rulers.
  - type: text
    content: of the rulers.
  '6':
  - type: text
    content: With their unceasing blows they used it cruelly
  - type: text
    content: to strike down nations.
  - type: text
    content: They subdued nations in anger with unrelenting persecution.
  '7':
  - type: text
    content: But now the whole earth rests and is at peace.
  - type: text
    content: It bursts out with singing;
  - type: note
    content: With the oppressive tyranny of the systems of Babylon destroyed, the prophet now saw the people break out with rejoicing and singing. See Isa. 44:23; 49:13; 52:9; 54:1; 55:12.
  '8':
  - type: text
    content: 'even the cypresses and cedars of Lebanon '
  - type: note
    content: In the Christian tradition, the cypress is a symbol of death, life, and resurrection. The cypress supplied boards and timber for doors (see 1 Kings 6:15, 33) and beams for roofing the temple (see 2 Chron. 3:5). The towering cedars of Lebanon speak of God’s anointed servants standing tall and upright, bringing favor to the world (see footnote on Ps. 92:12).
  - type: text
    content: join in,
  - type: text
    content: rejoicing over your demise, saying,
  - type: text
    content: ‘Now that you were laid low,
  - type: text
    content: no woodsman comes to cut us down.’ ”
  - type: heading
    content: The Underworld
  '9':
  - type: text
    content: 'The underworld '
  - type: note
    content: Or “Sheol,” which represents both the underworld and the personification of the evil it represents.
  - type: text
    content: is all astir in preparation,
  - type: text
    content: ready to meet you when you show up.
  - type: text
    content: It rouses the spirits of the dead to greet you!
  - type: text
    content: 'All the former tyrants '
  - type: note
    content: Or “great goats,” a likely symbol of tyrants, or “It roused all the giants that ruled the earth” (LXX).
  - type: text
    content: and despots
  - type: note
    content: Or “kings.” These former rulers are depicted in the underworld (Sheol) as sitting on thrones of darkness.
  - type: text
    content: rise from their thrones!
