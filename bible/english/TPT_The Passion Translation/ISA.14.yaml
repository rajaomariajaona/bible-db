        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 8:56
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
