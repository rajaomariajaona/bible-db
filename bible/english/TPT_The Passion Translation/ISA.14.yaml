        marker: ref
        children:
        - type: text
          text: Isa. 32:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even foreigners will accompany them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and join with the Jewish people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “house of Jacob.” “Foreigners” (gentiles) and Jews make up “the one new race of humanity.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:11–22
      - type: usfm
        marker: ft
        children:
        - type: text
