    content: they will always see his face, and his name will be on their foreheads.
  '5':
  - type: text
    content: Night will be no more. They will never need the light of the sun or a lamp, because the Lord God will shine on them.
  - type: text
    content: And they will reign as kings forever and ever!
  - type: note
    content: Verses 1–5 show us that the garden of Eden will be fully restored, and it is described as the heavenly Jerusalem.
  - type: heading
    content: The Testimony of the Angel
  '6':
  - type: text
    content: Then the angel said to me, “These words are entirely trustworthy and true, for the Lord, the God of the spirits of the prophets, has sent his angel to show his loving servants what must occur swiftly.”
  - type: note
    content: Or “what must soon be.” This does not necessarily mean soon from the writer’s perspective, but that once the time comes it will happen quickly. The Greek phrase en tachos (similar to “tachometer”) means that once something starts it will take place swiftly. See also Rev. 1:1.
  - type: heading
    content: The Testimony of Jesus
  '7':
  - type: text
    content: “Behold, I come quickly!
  - type: note
    content: Or “I am continuously coming swiftly.”
  - type: text
    content: Wonderfully blessed is the one
  - type: text
    content: who carefully guards the words
  - type: text
    content: of the prophecy of this book!”
  - type: heading
    content: The Testimony of John
  '8':
  - type: text
    content: 'I, John, am the one who heard and saw these things, and when I heard and saw it all, I fell facedown to worship the messenger who showed me these things. '
  '9':
  - type: text
    content: But he said to me, “Don’t do it! I am but a fellow servant with you and your brothers, the prophets, and with those who cling to the words of this book. Worship God!”
