  '18':
  - type: text
    content: 'I testify to everyone who hears the prophetic words of this book: If anyone adds to them, God will add to him the plagues described in this book. '
  '19':
  - type: text
    content: And if anyone subtracts from the prophetic words of this book, God will remove his portion from the Tree of Life and in the holy city, which are described in this book.
  '2':
  - type: text
    content: 'The river was flowing in the middle of the street of the city, and on either side of the river was the Tree of Life, '
  - type: note
    content: See Gen. 2:9.
  - type: text
