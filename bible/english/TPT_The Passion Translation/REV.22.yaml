  - type: text
    content: ' are outside: the malicious hypocrites, '
  - type: note
    content: Or “dogs,” a likely metaphor of those who pretend to follow Christ while hiding their immorality.
  - type: text
    content: 'the sexually immoral, sorcerers, '
  - type: note
