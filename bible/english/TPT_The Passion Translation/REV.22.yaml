  '1':
  - type: heading
    content: Eden Restored
  - type: text
    content: 'Then the angel showed me the river of the water of life, '
  - type: note
    content: See Gen. 2:10–14; Ps. 46:4; Ezek. 47:1–12; Joel 3:18; John 4:10–14.
  - type: text
    content: 'flowing with water clear as crystal, continuously pouring out from the throne of God and of the Lamb. '
  '10':
  - type: text
    content: 'And he said to me, “Don’t keep secret the prophetic words of this book, for the time is near. '
  '11':
  - type: text
    content: Let the evildoers be at their worst and the morally filthy continue in their depravity—yet the righteous will still do what is right, and the holy will still be holy.”
  - type: note
    content: Or “let the righteous still do what is right, and let the holy ones still be holy.”
  - type: heading
    content: Jesus’ Final Words and John’s Final Testimony
  '12':
  - type: text
    content: “Behold, I am coming quickly!
  - type: note
    content: See footnote for v. 6.
  - type: text
    content: I bring my reward with me
  - type: text
    content: to repay everyone according to their works.
  '13':
  - type: text
    content: I am the Aleph and the Tav,
  - type: note
    content: See footnote for Rev. 1:8.
  - type: text
    content: the First and the Last,
  - type: text
    content: the Beginning and the Completion.”
