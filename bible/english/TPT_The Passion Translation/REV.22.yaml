  - type: text
    content: ' '
  - type: note
    content: Or “scion.” See Isa. 11:1, 10. As the spiritual root of David, Jesus is divine. As the descendant of David, he is human.
  - type: text
    content: and his descendant.”
  - type: note
    content: Or “family of David.” As the Lord of glory, Jesus is the bright Morning Star who signals the end of night and the beginning of God’s perfect day (Num. 24:17). As the Son of Man, he is the descendant of David. Jesus is both human and divine, even in his eternal state.
