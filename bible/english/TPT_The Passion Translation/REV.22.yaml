  - type: text
    content: of the nations.
  '20':
  - type: text
    content: 'The one who testifies to these things says, '
  - type: text
    content: “Yes, I am coming quickly.”
  - type: text
    content: ' Amen! Come, Lord Jesus!'
  '21':
  - type: text
    content: May the grace of the Lord Jesus be with all the holy believers. Amen!
