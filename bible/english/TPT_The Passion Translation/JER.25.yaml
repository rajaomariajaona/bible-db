  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jeremiah the prophet spoke to all the people of Judah and Jerusalem, saying: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“For the last twenty-three years, ever since the thirteenth year that Josiah son of Amon was king, I have been '
  - type: usfm
    marker: it
    children:
    - type: text
      text: warning you and
  - type: text
    text: ' continually '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rising early [to prophesy to you],” a figure of speech for “persistently” or “again and again.”
    marker-yv: yv-n
  - type: text
    text: 'prophesying to you the words of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', but you have not listened. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For over two decades, Jeremiah faithfully prophesied to the people of a coming judgment. His message was rejected by both leaders and people.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Additionally, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has sent all his servants the prophets to you over and over again, but still you have neither listened '
  - type: usfm
    marker: it
    children:
    - type: text
      text: nor humbled your hearts
  - type: text
    text: ' to pay attention to them. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “inclined your ears to hear.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They told you, ‘If you turn, each person, from your evil ways and from your evil doings, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will let you remain in the land that he gave you and your ancestors for all time. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not run after other gods to serve and worship them.’
- type: usfm
  marker: p
  children:
  - type: text
    text: '“ ‘Do not provoke me to anger by '
  - type: usfm
    marker: it
    children:
    - type: text
      text: worshiping idols
  - type: text
    text: ' your own hands have made, and I will do you no harm,’ '
  - type: usfm
