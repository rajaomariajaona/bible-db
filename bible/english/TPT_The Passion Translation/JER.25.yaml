      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This would have been about 605 BC. This unusually accurate dating indicates that Jeremiah knew that the history of Israel was changing dramatically.
    marker-yv: yv-n
  - type: usfm
