      - type: text
        text: There are several possible ways to interpret this event. (1) A literal interpretation. Jeremiah was given a literal cup from the hand of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
