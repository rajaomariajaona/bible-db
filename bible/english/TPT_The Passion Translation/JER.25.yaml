        text: and went to all the locations he mentions. This interpretation is unlikely due to the time it would take to travel to all the nations listed. (2) A visionary interpretation. Jeremiah received this in a vision in which Jeremiah himself really seems to be forcing the cup of the wine of God’s wrath on the nations that he enumerates. (3) A poetic interpretation. God used the symbol of a cup, and whether by writing or sending messengers to the kings of the nations, Jeremiah caused each of the kings to receive their respective messages of coming judgment. (4) A supernatural interpretation. Jeremiah was supernaturally transported (or “translated”; see
