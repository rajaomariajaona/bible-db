verses:
  '1':
  - type: heading
    content: Jeremiah Reviews Twenty-Three Years of Ministry
  - type: text
    content: 'This is the message that came to Jeremiah about the people of Judah. He received this '
  - type: text
    content: prophecy
  - type: text
    content: ' '
  - type: note
    content: The Targum identifies Jeremiah’s message as “prophecy.”
  - type: text
    content: 'in the fourth year that Jehoiakim son of Josiah was king of Judah and the first year of Nebuchadnezzar’s reign in Babylon. '
  - type: note
    content: This would have been about 605 BC. This unusually accurate dating indicates that Jeremiah knew that the history of Israel was changing dramatically.
  '10':
  - type: text
    content: 'Moreover, I will banish the voices of celebration '
  - type: note
    content: Or “mirth.”
  - type: text
    content: 'and laughter from them and the sweet voices of the groom and his bride. I will silence the noise of grinding grain '
  - type: text
    content: in the morning
  - type: text
    content: ', and '
  - type: text
    content: in the evening
  - type: text
    content: ', lamps will no longer burn in their homes. '
  - type: note
    content: That is, life’s daily activities will cease. This verse is quoted in Rev. 18:23.
  '11':
  - type: text
    content: The entire region will become a ruin, empty as a desert, and these nations will be carried off to Babylon to serve her king for seventy years.
  - type: note
    content: Seventy years (seventy is often used symbolically in the Bible) was the approximate length of the Babylonian captivity (see 2 Chron. 36:21; Jer. 29:10; Dan. 9:2), if calculated from 605 BC until 538 BC, when the Persian king Cyrus allowed the Jews to return. Seventy years of captivity meant, presumably, that all who went into exile were buried on foreign soil.
  '12':
  - type: text
    content: '“ ‘Then, after seventy years, I will punish the king of Babylon and the land of the Chaldeans '
  - type: note
    content: That is, Babylonia.
  - type: text
    content: 'for their sin,’ declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. ‘I will make their land desolate forever. '
  '13':
  - type: text
    content: 'I will bring against that land all my words '
  - type: text
    content: of warning
  - type: text
    content: ' that I have spoken against it, everything written in this scroll, which Jeremiah has prophesied against all the nations. '
  '14':
  - type: text
    content: 'Indeed, I will pay back the Babylonians for every wrong they have done. Great kings from many other nations '
  - type: note
    content: Babylon was conquered by the Medes and Persians.
  - type: text
    content: 'will conquer the '
  - type: text
    content: mighty
  - type: text
    content: ' Babylonians and will even make slaves of them.’ ”'
  - type: heading
    content: The Cup of God’s Wrath
  '15':
  - type: text
    content: Yahweh
  - type: text
    content: ', Israel’s God, spoke these words to me: '
  - type: note
    content: Current biblical scholarship tends to believe that vv. 15–38 are out of chronological order in the book of Jeremiah and that this passage originally belonged as an introduction to Jeremiah’s prophecies against the foreign nations of chs. 46–51.
  - type: text
    content: “
  - type: text
    content: Jeremiah
  - type: text
    content: ', take this cup from my hand; it is the cup of the wine of my wrath. '
  - type: note
    content: The “cup” is often seen as a symbol of God’s wrath (see Ps. 75:8; Isa. 51:17, 22; Jer. 49:12; 51:7; Ezek. 23:31–34; Matt. 26:39, 42).
  - type: text
    content: 'Make all the nations to whom I send you drink from it. '
  '16':
  - type: text
    content: 'They will stagger '
  - type: note
    content: Or possibly “vomit.”
  - type: text
    content: 'as drunkards and lose their minds because of the massacres '
  - type: note
    content: Or “the sword.”
  - type: text
    content: I am sending among them.”
  '17':
  - type: text
    content: 'So I took the cup from '
  - type: text
    content: Yahweh
  - type: text
    content: '’s hand and made all the nations to whom '
  - type: text
    content: Yahweh
  - type: text
    content: ' sent me drink from it. '
  - type: note
    content: There are several possible ways to interpret this event. (1) A literal interpretation. Jeremiah was given a literal cup from the hand of Yahweh and went to all the locations he mentions. This interpretation is unlikely due to the time it would take to travel to all the nations listed. (2) A visionary interpretation. Jeremiah received this in a vision in which Jeremiah himself really seems to be forcing the cup of the wine of God’s wrath on the nations that he enumerates. (3) A poetic interpretation. God used the symbol of a cup, and whether by writing or sending messengers to the kings of the nations, Jeremiah caused each of the kings to receive their respective messages of coming judgment. (4) A supernatural interpretation. Jeremiah was supernaturally transported (or “translated”; see Acts 8:39–40 and the first footnote) to each of the kingdoms mentioned and prophesied to them their respective messages of doom and judgment. (5) A parabolic interpretation. Jeremiah received this prophecy as a parable of a cup and God’s judgments of the nations and was not to be understood literally. To “drink” of that cup meant that they would experience the coming wrath of Yahweh.
  '18':
  - type: text
    content: I started with Jerusalem and the cities of Judah. Their kings and leaders were removed from power in disgrace and made an object of horror, derision, and a curse, as they are today.
  '19':
  - type: text
    content: 'Then '
  - type: text
    content: I went to
  - type: text
    content: ' Egypt to her king, Pharaoh, his officials, his leaders, and all the Egyptians, '
  '2':
  - type: text
    content: 'Jeremiah the prophet spoke to all the people of Judah and Jerusalem, saying: '
  '20':
  - type: text
    content: 'and all foreigners who lived there, '
  - type: text
    content: and they, too, drank from the cup
  - type: text
    content: .
  - type: text
    content: Next, I went to
  - type: text
    content: ' all the kings of the land of Uz; '
  - type: note
    content: According to one of the Dead Sea Scrolls (the War Scroll), the land of Uz was situated beyond the river Euphrates. The two major theories of its location are near Syria or near Edom.
  - type: text
    content: all the kings of the territory of the Philistines, of Ashkelon, Gaza, Ekron, and what was still left of Ashdod.
  '21':
  - type: text
    content: Then, I went
  - type: text
    content: ' to the kings of Edom, Moab, and the Ammonites; '
  '22':
  - type: text
    content: 'the kings of Tyre, the kings of Sidon, '
  - type: note
    content: Tyre and Sidon are Phoenician coastal cities; Tyre was a small island, originally not connected to the mainland.
  - type: text
    content: and the kings of the Mediterranean lands.
  '23':
  - type: text
    content: 'Afterward, I went to '
  - type: text
    content: the cities of
  - type: text
    content: ' Dedan, Tema, Buz, '
  - type: note
    content: Dedan, Tema, and Buz were in northwestern Arabia.
  - type: text
    content: 'and all the desert tribes of Arabia, '
  - type: note
    content: Or “all who cut the corners of their hair,” a custom of the Arabian desert tribes. However, the reference to “cutting the fringe” may refer to those tribes who live on the outer extremities of the desert.
  '24':
  - type: text
    content: 'all the kings of Arabia, and all the kings of the mixed people groups who live in the desert, '
  '25':
  - type: text
    content: 'all the kings of Zimri, '
  - type: note
    content: There is conjecture that Zimri is actually Zimran, a son of Abraham by Keturah (see Gen. 25:2).
  - type: text
    content: 'all the kings of Elam, and all the kings of Media, '
  '26':
  - type: text
    content: all the kings of the north, near and far, one after another, to all the kingdoms of the earth.
  - type: text
    content: 'As for the king of Babylon, '
  - type: note
    content: Or “Sheshak.” Sheshak means humiliation, but it is also a secret way of writing “Babylon” in code using a type of cryptogram. The system used here is called an atbash cipher; in it the first letter of the alphabet is exchanged for the final letter, the second letter is exchanged for the second to last letter, and so on.
  - type: text
    content: 'he will drink '
  - type: text
    content: from the cup
  - type: text
    content: ' last of all.'
  '27':
  - type: text
    content: “You will say to each one, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, the God of Israel, says to you: Drink from this cup '
  - type: text
    content: that is full of the wine of my wrath
  - type: text
    content: . Vomit, fall over, and rise no more. And when I send war against the nations, you will be completely defeated.’
  '28':
  - type: text
    content: “If they refuse to drink from the cup from your hand, you will say to them, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says this: You have '
  - type: text
    content: no choice
  - type: text
    content: '—drink! '
  '29':
  - type: text
    content: 'For take note, starting with the city called by my own name, '
  - type: text
    content: Jerusalem
  - type: text
    content: ', everyone on earth will suffer from war. So there is no way I will let you escape unpunished, declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.’'
  '3':
  - type: text
    content: '“For the last twenty-three years, ever since the thirteenth year that Josiah son of Amon was king, I have been '
  - type: text
    content: warning you and
  - type: text
    content: ' continually '
  - type: note
    content: Or “rising early [to prophesy to you],” a figure of speech for “persistently” or “again and again.”
  - type: text
    content: 'prophesying to you the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ', but you have not listened. '
  - type: note
    content: For over two decades, Jeremiah faithfully prophesied to the people of a coming judgment. His message was rejected by both leaders and people.
  '30':
  - type: text
    content: “
  - type: text
