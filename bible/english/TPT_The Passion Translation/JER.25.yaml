    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Targum identifies Jeremiah’s message as “prophecy.”
    marker-yv: yv-n
  - type: text
    text: 'in the fourth year that Jehoiakim son of Josiah was king of Judah and the first year of Nebuchadnezzar’s reign in Babylon. '
