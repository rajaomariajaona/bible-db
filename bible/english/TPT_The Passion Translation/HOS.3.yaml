      text: '2'
  - type: text
    text: 'So I negotiated to buy her for the bride-price of fifteen shekels of silver '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fifteen shekels would be approximately 6 ounces (170 grams) of silver.
    marker-yv: yv-n
  - type: text
    text: 'and nine bushels of barley. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a homer and a lethech of barley.” It is difficult to say precisely how much grain this would be, but assuming a “homer” is approximately what a donkey can carry (about 50 gallons or 220 liters), the Nueva Biblia Viva translates it as “one and a half donkey loads.” It has been estimated that this amount of barley would likewise cost about fifteen shekels. Hosea paid in all the equivalent of thirty shekels of silver, the price of a slave in the law of Moses (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 'Ex. 21:32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). In place of “a lethech of barley,” the Septuagint adds “and a skin of wine.” Since Hosea split his payment between silver and barley (and possibly wine), he seems to have had to scrape together enough to buy Gomer back. He was giving everything he had to take home his bride.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: And I said to her, “
  - type: usfm
    marker: it
    children:
    - type: text
      text: Your sinful life is now over
  - type: text
    text: ', and you must stay with me '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in my home
  - type: text
    text: ' for many days. You will no longer commit adultery by giving yourself to another man, and I will remain faithful to you in the same way.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Hosea committed to not sleep with Gomer for that length of time, possibly for reasons of purification. He did not lay a burden on her that he did not also put upon himself. A combination of syntax, multiple idioms, and the arrangement of phrases makes this verse difficult to interpret.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The Explanation: Israel’s Period of Discipline'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For the Israelites will have to spend many days deprived of political leaders, outward forms of religion, and the means of foretelling the future. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “without king or prince, without sacrifice or pillar [places for sacrifices], and without ephod or teraphim [household idols].” This time of deprivation refers to the captivity of Israel. Yet God would not choose another nation; after their captivity, he resumed his place of loving and leading Israel. The Northern Kingdom would return to the dynasty of David (Southern Kingdom). The scattered remnants of the ten lost tribes would be included in the rebuilding of the nation, which led to the Second Temple period, into which was born Jesus of Nazareth.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But afterward, the Israelites will return and again long for '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' their '
  - type: usfm
    marker: it
    children:
    - type: text
      text: covenant
  - type: text
    text: ' God and for a David-like king. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Like most prophecies, this has multiple layers of meaning. The literal text is “they will seek . . . David their king.” But David was dead. It means a ruler from the lineage of David. However, many Jewish interpreters see this as a Messianic prophecy of the King, whom we know as Jesus Christ. The Jewish Targum refers to him as “the king Messiah.”
    marker-yv: yv-n
  - type: text
    text: 'They will turn trembling in awe to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rediscover
  - type: text
    text: ' his goodness and gifts in the future.'
