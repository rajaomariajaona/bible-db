      - type: text
        text: Or “a woman,” likely a reference to Hosea’s wife, Gomer. There are two different ways to interpret
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ’s instruction. Some believe this refers to a second woman who is a metaphor for the Southern Kingdom, Judah. Gomer (the Northern Kingdom of Israel) was in Assyrian captivity and would not return—that divorce was final. Therefore,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: told Hosea to go find another adulterous woman to take as his wife. However, it is more likely that God was telling Hosea to go back to Gomer. It is good to remember that prophecies often have more than one interpretation and sometimes more than one fulfillment. Prophecies usually contain many layers of meaning and application.
    marker-yv: yv-n
  - type: text
    text: 'again even though she has another lover. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who is loved by another man.” The Syriac reads “who loves another man.” The Septuagint reads “who loves evil.” The vowel markings in this passage make interpretation of the Hebrew text difficult. No doubt, Hosea was still in love with Gomer even though she loved another man. This illustrates God’s unfailing love for a people who are wayward and prone to wander from his heart.
    marker-yv: yv-n
  - type: text
    text: 'Love the adulteress with the same love that I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have for the adulterous Israelites who turn to other gods and love to give offerings to their idols.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 3:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “they love raisin cakes [which they offer to idols].”
    marker-yv: yv-n
