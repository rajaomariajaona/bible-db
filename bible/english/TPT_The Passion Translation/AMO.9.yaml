      children:
      - type: text
        text: . The promise of the restoration of the tabernacle of David is considered a metaphor on at least two levels. First, it refers to the restoration of Israel and its people to the status they experienced under David’s rule. Second, David’s tabernacle was the place of worship during David’s reign (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 16:1–37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). It was different from the dwelling place (or tabernacle) of Moses; essentially, David’s tabernacle consisted of the unveiled ark of glory, with no other furniture, veil, or ritual surrounding it. God prophesied through Amos that this form of worship would be restored in the last days. Constant prayer and worship before God is the central feature of the restored tabernacle of David. It is in the spirit of David’s fallen tabernacle that God, in these last days, has raised up houses of prayer with 24/7 worship as their central focus.
    marker-yv: yv-n
