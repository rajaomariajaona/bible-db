document_id: AMO.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: 'Fifth Vision: The Sanctuary Crumbles'
  - type: text
    content: I saw the Lord standing over the altar,
  - type: note
    content: Or “on the altar” or “beside the altar.”
  - type: text
    content: 'and he gave the command:'
  - type: note
    content: The Lord most likely gave this command to an angel.
  - type: text
    content: “Smash the top of the pillars
  - type: text
    content: so that the foundations shake!
  - type: text
    content: Shatter the pillars and make them
  - type: text
    content: 'crumble upon the heads of all '
  - type: text
    content: the worshipers
  - type: text
    content: .
  - type: note
    content: This reference would remind the Jews of Samson pulling down the columns on the Philistines.
  - type: text
    content: And any survivors I will kill by the sword.
  - type: text
    content: Whoever runs away will not go far.
  - type: text
    content: Whoever tries to escape will not make it.
  '10':
  - type: text
    content: All the sinners of my people will die by the sword who say,
  - type: text
    content: ‘Nothing bad could ever happen to us.’ ”
  - type: heading
    content: Restoration of David’s Tabernacle
  '11':
  - type: text
    content: “One day I will restore
  - type: text
    content: David’s tabernacle that has fallen.
  - type: text
    content: I will repair its broken places
  - type: text
    content: 'and raise up its ruins '
  - type: text
    content: and fix it up like new
  - type: text
    content: .
  - type: text
    content: I will rebuild it and make it what it was long ago.
  - type: note
    content: See Acts 15:16. The promise of the restoration of the tabernacle of David is considered a metaphor on at least two levels. First, it refers to the restoration of Israel and its people to the status they experienced under David’s rule. Second, David’s tabernacle was the place of worship during David’s reign (see 1 Chron. 16:1–37). It was different from the dwelling place (or tabernacle) of Moses; essentially, David’s tabernacle consisted of the unveiled ark of glory, with no other furniture, veil, or ritual surrounding it. God prophesied through Amos that this form of worship would be restored in the last days. Constant prayer and worship before God is the central feature of the restored tabernacle of David. It is in the spirit of David’s fallen tabernacle that God, in these last days, has raised up houses of prayer with 24/7 worship as their central focus.
  '12':
  - type: text
    content: As a result, David’s people will conquer
  - type: text
    content: the nations over which they once ruled for me,
  - type: note
    content: Or “all nations over whom my name is spoken [proclaimed].”
  - type: text
    content: down to the last remnant of Edom.
  - type: note
    content: Edom shares the same root as Adam.
  '13':
  - type: text
    content: 'Behold, I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', make this decree:'
  - type: text
    content: 'The days of '
  - type: text
    content: acceleration
  - type: text
    content: ' are coming,'
  - type: text
    content: 'when '
  - type: text
    content: the harvest will be so great
  - type: text
    content: that those plowing the field will overtake
  - type: text
    content: those still reaping the harvest,
  - type: text
    content: and the ones treading the grapes
  - type: text
    content: will overtake those who are planting.
  - type: text
    content: Blessings
  - type: text
    content: ' will stream forth'
  - type: text
    content: like new wine pouring from every mountain,
  - type: text
    content: 'and every hill will flow '
  - type: text
    content: with favor
  - type: text
    content: .
  '14':
  - type: text
    content: I will restore prosperity and good fortune
  - type: text
    content: to the captives of Israel.
  - type: text
    content: They will rebuild the ruined cities to live in.
  - type: text
    content: They will plant vineyards to produce their wine.
  - type: text
    content: 'And plant '
  - type: text
    content: lush
  - type: text
    content: ' gardens and orchards'
  - type: text
    content: to eat their produce.
  '15':
  - type: text
    content: 'And I will plant them '
  - type: note
    content: See Ps. 1:3.
  - type: text
    content: in their own land,
  - type: text
    content: never to be uprooted again
  - type: text
    content: from the land that I have given them.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, have spoken.”'
  '2':
  - type: text
    content: Even if they were to dig their way down to the underworld,
  - type: note
    content: Or “Sheol,” the place of the dead. In Jewish thought, Sheol is the gathering place for all the dead. It is often considered as a dark world, deep down under the earth, far deeper than the grave.
  - type: text
    content: my hand would haul them out.
  - type: text
    content: Even if they were to climb up to heaven,
  - type: text
    content: I would drag them down from there.
  '3':
  - type: text
    content: If they were to hide on top of Mount Carmel,
  - type: note
    content: Mount Carmel was an ideal hiding place because of its thick forests and two thousand limestone caves.
  - type: text
    content: I would hunt them down and snatch them.
  - type: text
    content: If they were to try to hide from my eyes at the bottom of the sea,
  - type: text
    content: I would order the serpent there to bite them.
  '4':
  - type: text
    content: If their enemies were to herd them into captivity,
  - type: text
    content: even there I would order the sword to kill them.
  - type: text
    content: Yes, I will fix my eyes on them
  - type: text
    content: to destroy them and not to help them.”
  - type: note
    content: Or “for evil and not for good.”
  - type: heading
    content: Amos’ Doxology
  '5':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: you touch the earth and it melts,
  - type: text
    content: and everyone on earth mourns.
  - type: text
    content: All of the land will rise up like the river Nile—
  - type: text
    content: inundated and stirred up by floodwaters—
  - type: text
    content: and then subside, just like the river of Egypt.
  '6':
  - type: text
    content: You build your lofty stairway in the heavens
  - type: text
    content: and suspend your superdome over the earth.
  - type: text
    content: You summon the waters of the sea
  - type: text
    content: 'and pour them over the face of the earth:'
  - type: text
    content: Yahweh
  - type: text
    content: ' is your name!'
  - type: heading
    content: 'Yahweh Declares: Sinners Will All Perish'
  '7':
  - type: text
    content: “Israel, I think as much of the Ethiopians as I do of you;
  - type: text
    content: you’re all the same to me,”
  - type: note
    content: Israel’s special position as God’s people will not save her from punishment. She is no different from other nations.
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: “
  - type: text
    content: Yes
  - type: text
    content: ', I brought you out from Egypt.'
  - type: text
    content: But didn’t I also bring out the Philistines from Crete
  - type: note
    content: Or “Caphtor.” See Gen. 10:13–14.
  - type: text
    content: 'and the Syrians '
  - type: note
    content: Or “Arameans.”
  - type: text
    content: from Kir?
  '8':
  - type: text
    content: 'Behold, the eyes of Lord '
  - type: text
    content: Yahweh
  - type: text
    content: are on the sinful kingdom of Israel.
  - type: text
    content: I will wipe it off the face of the earth.
  - type: text
    content: Yet I will not completely destroy the descendants of Jacob,”
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '9':
  - type: text
    content: “Behold, I will speak the command
  - type: text
    content: to scatter the people of Israel among all the nations.
  - type: text
    content: I will sift them the way sand is shaken in a sieve,
  - type: text
    content: through which not a single pebble falls to the ground.
