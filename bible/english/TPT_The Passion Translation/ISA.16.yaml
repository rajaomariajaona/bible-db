document_id: ISA.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Plea for Mercy
  - type: text
    content: 'Send a '
  - type: text
    content: flock of
  - type: text
    content: ' lambs from the rock '
  - type: note
    content: Or possibly a place in Edom called Sela (see 2 Kings 14:7). Sela means “rock” or “cliff.”
  - type: text
    content: of the desert
  - type: text
    content: as a gift to the leaders in Jerusalem,
  - type: note
    content: Or “Send a lamb of the lord of the land.” This would have been a gift of tribute sent to secure Judah’s protection.
  - type: text
    content: to the mountain of the Daughter of Zion.
  '10':
  - type: text
    content: Joyful celebrations are stilled in the orchards;
  - type: text
    content: in the vineyards, no one sings or shouts,
  - type: text
    content: and no one treads out wine in the presses.
  - type: text
    content: I have silenced your gleeful shouts.
  '11':
  - type: text
    content: Like harp strings, my heartstrings throb for Moab,
  - type: note
    content: Even for pride-filled Moab, God’s heart was moved with compassion.
  - type: text
    content: 'and my inner being sighs for your '
  - type: text
    content: broken
  - type: text
    content: ' walls, Kir-Hareseth.'
  - type: note
    content: Or “for Kir-Hareseth [wall of earthen potsherds].”
  '12':
  - type: text
    content: When Moab comes to their high places
  - type: text
    content: to plead with all their might
  - type: text
    content: and enter their temples to pray, it will have no effect.
  '13':
  - type: text
    content: 'This was the word the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke in the past about Moab, '
  '14':
  - type: text
    content: 'but now the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “In exactly three years, '
  - type: note
    content: Or “in three years as the years of [or “counted by”] a hireling.”
  - type: text
    content: the splendor of Moab and her huge population will shrink to nothing; only a small and feeble remnant will remain.”
  '2':
  - type: text
    content: At the banks of the River Arnon, the women of Moab
  - type: text
    content: are like newly hatched, fluttering birds.
  '3':
  - type: text
    content: They say, “Make a decision!
  - type: text
    content: 'Give us shelter. '
  - type: note
    content: Or “Make your shade like night at noon.”
  - type: text
    content: Hide the fugitives. Don’t betray them!
  '4':
  - type: text
    content: Allow the Moabite fugitives to stay with you.
  - type: text
    content: Be a shelter for them from the destroyer!”
  - type: text
    content: One day the oppressor will be no more.
  - type: text
    content: 'The destroyer '
  - type: note
    content: Or “Destruction.”
  - type: text
    content: will come to an end,
  - type: text
    content: and the tyrant will vanish from the land.
  '5':
  - type: text
    content: 'Then a government of unfailing love '
  - type: note
    content: Or “a throne,” a metonymy for a king or government being established.
  - type: text
    content: will be established,
  - type: text
    content: with a faithful king in the tabernacle of David,
  - type: text
    content: passionate for justice and swift to do what is right.
  - type: heading
    content: Moab’s Demise
  '6':
  - type: text
    content: We have heard about Moab’s pride.
  - type: text
    content: How haughty she is—filled with arrogance and insolence,
  - type: text
    content: with nothing more than empty boasts!
  '7':
  - type: text
    content: So now Moab will wail;
  - type: text
    content: everyone will wail over the ruin of their country.
  - type: text
    content: Lament and grieve for the foundations of Kir-Hareseth.
  - type: note
    content: Or “over the raisin cakes [delicacies] of Kir-Hareseth [wall of earthen potsherds]” or “You shall care for those who dwell in Seth” (LXX).
  '8':
  - type: text
    content: 'All the '
  - type: text
    content: lush
  - type: text
    content: ' fields of Heshbon are dried up.'
  - type: text
    content: The vineyards of Sibmah have struck down the lords of nations,
  - type: note
    content: “The lords of the nations have broken down its vines.”
  - type: text
    content: 'whose vines reached '
  - type: text
    content: northward
  - type: text
    content: ' to Jazer'
  - type: note
    content: Modern Sumia, a suburb of Heshbon.
  - type: text
    content: and spread to the desert.
  - type: text
    content: 'Their shoots spread out and extend across the '
  - type: text
    content: Dead
  - type: text
    content: ' Sea.'
  - type: note
    content: Moab’s spreading, creeping vines of Heshbon (“stronghold”) become a metaphor for the tentacles of pride that spread throughout the heart of man.
  '9':
  - type: text
    content: So I weep along with Jazer over the vines of Sibmah.
  - type: text
    content: I drench you with my tears, O Heshbon and Elealeh,
  - type: note
    content: Elealeh is a city. Elealeh means “a mighty one [God] ascends.” See Num. 32:37.
  - type: text
    content: for the shouts of joy over the harvest
  - type: text
    content: of fruit and grain have ceased.
