document_id: ACT.22
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Defense
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“Ladies and gentlemen, fellow believers and elders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fathers” (or “parents”).
    marker-yv: yv-n
  - type: text
    text: '—please listen to me as I offer my defense.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is literally “Listen to my soul’s outburst.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(Now, when everyone realized he was speaking to them in their Judean Aramaic language, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Hebrew.” Throughout the Middle East, Assyria, and Babylon, Aramaic was the lingua franca, the language of the people of that day. Greek and Latin were also spoken but were not as prevalent as Aramaic.
    marker-yv: yv-n
  - type: text
    text: the crowd became all the more attentive.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Paul said, “I am a Jewish man who was born in Tarsus, a city of Turkey. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Cilicia,” which was known as Asia Minor.
    marker-yv: yv-n
  - type: text
    text: 'However, I grew up in this city and was properly trained in the Mosaic law and tutored by Rabbi Gamaliel according to our ancestral customs. I’ve been extremely passionate in my desire to please God, just as all of you are today. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I’ve hunted down and killed the followers of this Way. I have seized them and thrown them into prison, both men and women. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: All of this can be verified by the high priest and the Supreme Council of Elders. For they even wrote letters to our fellow Jews of Damascus, authorizing me to arrest them and bring them back to Jerusalem as prisoners to be punished.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“As I was on the road approaching Damascus, about noon, a brilliant heavenly light suddenly appeared, flashing all around me. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'As I fell to the ground I heard a voice say, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Saul, Saul . . . why are you persecuting me?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I answered, ‘Who are you, my Lord?’
- type: usfm
  marker: p
  children:
  - type: text
    text: '“He said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘I am Jesus, the Victorious.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Jesus the Nazarene.” The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nazarene
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “the branch” or “Scion.” The Aramaic word implies the title of an heir of a powerful family, or one who is victorious (“Jesus, the Victorious”). Believers are now grafted-in branches of his family tree, victorious ones in Christ.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am the one you are persecuting.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Those who were with me saw the brilliant light, but they didn’t hear the voice of the one who spoke to me.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Greek manuscripts add “and they were afraid.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “So I asked, ‘Lord, what am I to do?’
- type: usfm
  marker: p
  children:
  - type: text
    text: '“And the Lord said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Get up and go into Damascus, and there you will be told about all that you are destined to do.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “Because of the dazzling glory of the light, I couldn’t see—I was left blind. So they had to lead me by the hand the rest of the way into Damascus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“A Jewish man living there named Ananias came to see me. He was a godly man who lived according to the law of Moses and was highly esteemed by the Jewish community. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He stood beside me and said, ‘Saul! My brother, Saul—open your eyes and see again!’ At that very instant I opened my eyes and I could see! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then he said to me, ‘The God of our ancestors has destined you '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “raised you up.”
    marker-yv: yv-n
  - type: text
    text: 'to know his plan and for you to see the Holy One '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the Righteous One” or “the Just One.”
    marker-yv: yv-n
  - type: text
    text: 'and to hear his voice. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'For you will be his witness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “martyr.”
    marker-yv: yv-n
  - type: text
    text: 'to every race of people and will share with them everything that you’ve seen and heard. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So now, what are you waiting for? Get up, be baptized, and wash away your sins as you call upon his name.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“Then I returned to Jerusalem. And while I was praying in the temple, I entered another realm '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “fell into a trance.” The Greek word for trance (
    - type: usfm
      marker: it
      children:
      - type: text
        text: ekstasis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', from which we get the word'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ecstasy
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) literally means “to be taken to another place” (state or realm). (See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Strong’s Concordance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Gr. 1611.) He was actually taken into another realm as a trance came over him.'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and saw him. He said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Hurry and depart from Jerusalem quickly, for the people here will not receive the truths you share about me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“ ‘But Lord,’ I argued, ‘they all know that I’m the one who went into our Jewish meetings to find those who believe in you and had them beaten '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “beat with a whip” (flogged).
    marker-yv: yv-n
  - type: text
    text: 'and imprisoned. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When the blood of your witness '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “martyr.”
    marker-yv: yv-n
  - type: text
    text: 'Stephen was shed, I stood nearby in full approval of what was happening. I even guarded the cloaks of those who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: stoned him to death
  - type: text
    text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Then he said to me, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Go at once, for I am sending you to preach to the non-Jewish nations.’
  - type: text
    text: '  ”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “the far-away nations.” See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 11:13
      metadata:
        usfm: ROM.11.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The crowd listened attentively to Paul up to this point. But when they heard this, all at once they erupted with loud shouts, saying, “Get rid of this man! Kill him! He doesn’t deserve to live!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Roman Commander Interrogates Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'While the crowd was screaming and yelling, removing their outer garments, and throwing handfuls of dust in the air in protest, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: the commander had Paul brought back into the compound. He ordered that he be whipped with a lash and interrogated to find out what he said that so infuriated the crowd.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When the soldiers stretched Paul out with ropes, he said to the captain, who was standing nearby, “Is it legal for you to torture a Roman citizen like this, without a proper trial?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When the officer heard this, he immediately went to his commander and reported it, saying, “This man is a Roman citizen. What should we do now?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The commander came to Paul and asked him, “Tell me the truth, are you a Roman citizen?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes I am,” he replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The commander said, “I had to purchase my citizenship with a great sum of money.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Paul replied, “I was born as a citizen!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: All of the soldiers who were about to whip Paul backed away, because they were afraid of the consequences for tying up and holding a Roman citizen against his will.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The next day the commander ordered that the high priest and the supreme Jewish council '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 22:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Sanhedrin,” a council of seventy of the elders of Israel.
    marker-yv: yv-n
  - type: text
    text: be convened, because he wanted to find out exactly why the Jews were accusing Paul. So he had him untied and brought out to stand before them all.
