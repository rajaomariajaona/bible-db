document_id: ACT.22,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul’s Defense
  - type: text
    content: '“Ladies and gentlemen, fellow believers and elders '
  - type: note
    content: Or “fathers” (or “parents”).
  - type: text
    content: '—please listen to me as I offer my defense.” '
  - type: note
    content: The Aramaic is literally “Listen to my soul’s outburst.”
  '10':
  - type: text
    content: “So I asked, ‘Lord, what am I to do?’
  - type: text
    content: '“And the Lord said to me, '
  - type: text
    content: ‘Get up and go into Damascus, and there you will be told about all that you are destined to do.’
  '11':
  - type: text
    content: “Because of the dazzling glory of the light, I couldn’t see—I was left blind. So they had to lead me by the hand the rest of the way into Damascus.
  '12':
  - type: text
    content: '“A Jewish man living there named Ananias came to see me. He was a godly man who lived according to the law of Moses and was highly esteemed by the Jewish community. '
  '13':
  - type: text
    content: 'He stood beside me and said, ‘Saul! My brother, Saul—open your eyes and see again!’ At that very instant I opened my eyes and I could see! '
  '14':
  - type: text
    content: 'Then he said to me, ‘The God of our ancestors has destined you '
  - type: note
    content: The Aramaic is “raised you up.”
  - type: text
    content: 'to know his plan and for you to see the Holy One '
  - type: note
    content: Or “the Righteous One” or “the Just One.”
  - type: text
    content: 'and to hear his voice. '
  '15':
  - type: text
    content: 'For you will be his witness '
  - type: note
    content: Or “martyr.”
  - type: text
    content: 'to every race of people and will share with them everything that you’ve seen and heard. '
  '16':
  - type: text
    content: So now, what are you waiting for? Get up, be baptized, and wash away your sins as you call upon his name.’
  '17':
  - type: text
    content: '“Then I returned to Jerusalem. And while I was praying in the temple, I entered another realm '
  - type: note
    content: Or “fell into a trance.” The Greek word for trance (ekstasis, from which we get the word ecstasy) literally means “to be taken to another place” (state or realm). (See Strong’s Concordance, Gr. 1611.) He was actually taken into another realm as a trance came over him.
  '18':
  - type: text
    content: 'and saw him. He said to me, '
  - type: text
    content: ‘Hurry and depart from Jerusalem quickly, for the people here will not receive the truths you share about me.’
  '19':
  - type: text
    content: '“ ‘But Lord,’ I argued, ‘they all know that I’m the one who went into our Jewish meetings to find those who believe in you and had them beaten '
  - type: note
    content: Or “beat with a whip” (flogged).
  - type: text
    content: 'and imprisoned. '
  '2':
  - type: text
    content: '(Now, when everyone realized he was speaking to them in their Judean Aramaic language, '
  - type: note
    content: Or “Hebrew.” Throughout the Middle East, Assyria, and Babylon, Aramaic was the lingua franca, the language of the people of that day. Greek and Latin were also spoken but were not as prevalent as Aramaic.
  - type: text
    content: the crowd became all the more attentive.)
  '20':
  - type: text
    content: 'When the blood of your witness '
  - type: note
    content: Or “martyr.”
  - type: text
    content: 'Stephen was shed, I stood nearby in full approval of what was happening. I even guarded the cloaks of those who '
  - type: text
    content: stoned him to death
  - type: text
    content: .’
  '21':
  - type: text
    content: '“Then he said to me, '
  - type: text
    content: ‘Go at once, for I am sending you to preach to the non-Jewish nations.’
  - type: text
    content: '  ”'
  - type: note
    content: The Aramaic is “the far-away nations.” See also Rom. 11:13.
  '22':
  - type: text
    content: The crowd listened attentively to Paul up to this point. But when they heard this, all at once they erupted with loud shouts, saying, “Get rid of this man! Kill him! He doesn’t deserve to live!”
  - type: heading
    content: The Roman Commander Interrogates Paul
  '23':
  - type: text
    content: 'While the crowd was screaming and yelling, removing their outer garments, and throwing handfuls of dust in the air in protest, '
  '24':
  - type: text
    content: the commander had Paul brought back into the compound. He ordered that he be whipped with a lash and interrogated to find out what he said that so infuriated the crowd.
  '25':
  - type: text
    content: When the soldiers stretched Paul out with ropes, he said to the captain, who was standing nearby, “Is it legal for you to torture a Roman citizen like this, without a proper trial?”
  '26':
  - type: text
    content: When the officer heard this, he immediately went to his commander and reported it, saying, “This man is a Roman citizen. What should we do now?”
  '27':
  - type: text
    content: The commander came to Paul and asked him, “Tell me the truth, are you a Roman citizen?”
  - type: text
    content: “Yes I am,” he replied.
  '28':
  - type: text
    content: The commander said, “I had to purchase my citizenship with a great sum of money.”
  - type: text
    content: Paul replied, “I was born as a citizen!”
  '29':
  - type: text
    content: All of the soldiers who were about to whip Paul backed away, because they were afraid of the consequences for tying up and holding a Roman citizen against his will.
  '3':
  - type: text
    content: 'Then Paul said, “I am a Jewish man who was born in Tarsus, a city of Turkey. '
  - type: note
    content: Or “Cilicia,” which was known as Asia Minor.
  - type: text
    content: 'However, I grew up in this city and was properly trained in the Mosaic law and tutored by Rabbi Gamaliel according to our ancestral customs. I’ve been extremely passionate in my desire to please God, just as all of you are today. '
  '30':
  - type: text
    content: 'The next day the commander ordered that the high priest and the supreme Jewish council '
  - type: note
    content: Or “Sanhedrin,” a council of seventy of the elders of Israel.
  - type: text
    content: be convened, because he wanted to find out exactly why the Jews were accusing Paul. So he had him untied and brought out to stand before them all.
  '4':
  - type: text
    content: 'I’ve hunted down and killed the followers of this Way. I have seized them and thrown them into prison, both men and women. '
  '5':
  - type: text
    content: All of this can be verified by the high priest and the Supreme Council of Elders. For they even wrote letters to our fellow Jews of Damascus, authorizing me to arrest them and bring them back to Jerusalem as prisoners to be punished.
  '6':
  - type: text
    content: '“As I was on the road approaching Damascus, about noon, a brilliant heavenly light suddenly appeared, flashing all around me. '
  '7':
  - type: text
    content: 'As I fell to the ground I heard a voice say, '
  - type: text
    content: ‘Saul, Saul . . . why are you persecuting me?’
  '8':
  - type: text
    content: “I answered, ‘Who are you, my Lord?’
  - type: text
    content: '“He said to me, '
  - type: text
    content: ‘I am Jesus, the Victorious.
  - type: text
    content: ' '
  - type: note
    content: Or “Jesus the Nazarene.” The word Nazarene means “the branch” or “Scion.” The Aramaic word implies the title of an heir of a powerful family, or one who is victorious (“Jesus, the Victorious”). Believers are now grafted-in branches of his family tree, victorious ones in Christ.
  - type: text
    content: I am the one you are persecuting.’
  '9':
  - type: text
    content: “Those who were with me saw the brilliant light, but they didn’t hear the voice of the one who spoke to me.
  - type: note
    content: Some Greek manuscripts add “and they were afraid.”
