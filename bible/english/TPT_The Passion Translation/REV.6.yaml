document_id: REV.6,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Breaking Open the Sealed Scroll
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I watched as the Lamb broke open the first of the seven seals. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The breaking open of the seal would allow a portion of the scroll to be read.
      marker-yv: yv-n
    - type: text
      text: 'Immediately I heard one of the four living creatures call out with a powerful voice of revelation sounding like thunder, saying, “Come forth!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Go forth!”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'They cried out with a loud voice, saying, “Sovereign Lord, holy and dependable, how long before you judge those who live on the earth and vindicate '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ekdikeo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can mean “avenge” or “render a fair verdict,” its primary meaning is to “validate” or “vindicate.”
      marker-yv: yv-n
    - type: text
      text: our blood on them?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a vision and is full of symbolism. We are like the souls “under the altar,” for we are under the shelter of the altar where Christ has been sacrificed on our behalf. We are those who cry out for a powerful move of God that will deal with the nature of man and bring the glory of God. This is not simply a cry for revenge but a cry for revival among the nations to break loose.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Each one was given a glistening white robe. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: These symbolize the robes of the priesthood, the clothing of Christ upon our souls.
      marker-yv: yv-n
    - type: text
      text: And they were told to rest a little longer, until the full number was fulfilled of both their fellow servants and brothers and sisters who were going to be killed just as they had been.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And behold! I saw the Lamb break open the sixth seal, which released a powerful earthquake. I saw the sun become pitch black '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “black as sackcloth made of [goat] hair.” This may represent our outward reasoning. What once gave us light is now turned into blackness.
      marker-yv: yv-n
    - type: text
      text: 'and the full moon become bloodred. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'The stars fell from heaven to the earth, as a fig tree shaken by a stormy wind sheds its unripe figs. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The sky receded with a snap—as a scroll rolls itself up. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Scrolls were equal to today’s books. They were unrolled and read, then rolled back up. To have the sky rolled up like a scroll is equal to saying, “The book is closed!” The old heavens must be removed to make room for a new heaven. When Jesus was baptized, the new heavens were opened up to him like a scroll, inaugurating this era of an open heaven through Christ.
      marker-yv: yv-n
    - type: text
      text: 'And every mountain and island was moved from its place. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Upon opening the sixth seal, the scene changes to earth. The power of God is released, which shakes every continent and every island. Yet is this destruction meant to be taken literally? Great earthquakes throughout the Bible were a regular feature of divine visitation. Methods, movements, governments, and structures (mountains and islands) will all be shaken by God in this wonderful visitation. Stars do not literally fall to the earth. Some of them are so huge they are larger than our solar system. If they were to fall, it would destroy all that we know. Yet, as we read further into the book of Revelation, we find that the earth continues to exist. So this scene must be taken symbolically. The old order of the natural realm is passing away and a new order is being established. There are many prophecies of the Old Testament referring to the lights going out on the old order as something new is set in place (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 24:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 15:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Joel 2:30–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). A superior light of the kingdom of God will make dim the light of the old covenant.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the kings of the earth and its great princes '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “high-ranking officers” or “heads of thousands.” The heart of each person is being laid bare by the light and glory of Christ rising upon his people. It was Adam who first wanted to hide from the face of God, but for the believer we hide only in the Father’s love.
      marker-yv: yv-n
    - type: text
      text: 'and generals, the rich and powerful, and everyone, whether they were slave or free, ran for cover and hid in the caves and among the mountain boulders. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'They called out to the mountains and the boulders, saying, “Fall on us at once! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hos. 10:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Hide us quickly from the glorious face of the one seated on the throne and from the wrath of the Lamb, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Few phrases in the Bible could seem more contradictory than “the wrath [anger] of the Lamb” (not the anger of the Lion). This is corrective and redemptive—not beastly rage but fiery passion to judge whatever gets in the way between the Lamb and his bride. The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: orge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to reach out with passionate desire and take hold of.” The simplest definition of the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: orge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: could be “fiery passion.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: for the great day of their wrath has come, and who is able to stand?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'So I looked, and behold, there was a bright white horse. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The horse is an emblem of overcoming, invincible power in battle. The color white is found throughout Revelation, always associated with Christ or spiritual victory.
      marker-yv: yv-n
    - type: text
      text: 'Its rider had a bow '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A bow without arrows shows that he is coming to conquer, not militarily but spiritually. He holds a bow to shoot the arrows of truth into our hearts.
      marker-yv: yv-n
    - type: text
      text: and was given a crown of victory. He rode out as a conqueror ready to conquer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “He went out continually conquering so that he might conquer.” This is Christ coming forth as King in authority and power, riding out to conquer everything within us that hinders the life of Christ emerging in our transformation (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 45:3–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The words “Come forth” reflect the groaning of creation to see the unveiling of the sons of God. See Henry Alford,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Alford’s Greek Testament: An Exegetical and Critical Commentary'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', vol. 4, 1875 (Grand Rapids: Baker, 1980); Henry Barclay Swete,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Commentary on Revelation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Grand Rapids: Kregel Publications, 1977). This is the calling forth of Christ by the power of his Spirit to conquer us fully. All the universe will one day be conquered by the one riding this white horse. Here he rides alone, but in'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 19:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: he does not come alone but with those whom he has conquered. John uses this word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: conquer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: more than any other New Testament writer. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Rev. 2–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
