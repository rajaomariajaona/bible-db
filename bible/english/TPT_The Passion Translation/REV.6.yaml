          text: Mal. 3:1–3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The Greek word for “fiery” or “flames” comes from the word for “pure,” or “to purify.” Christ rides this fiery red horse as one robed in the flames of God to bring purity to his priestly people. See also
      - type: usfm
