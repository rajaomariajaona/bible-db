document_id: REV.6,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Breaking Open the Sealed Scroll
  - type: text
    content: 'Then I watched as the Lamb broke open the first of the seven seals. '
  - type: note
    content: The breaking open of the seal would allow a portion of the scroll to be read.
  - type: text
    content: 'Immediately I heard one of the four living creatures call out with a powerful voice of revelation sounding like thunder, saying, “Come forth!” '
  - type: note
    content: Or “Go forth!”
  '10':
  - type: text
    content: 'They cried out with a loud voice, saying, “Sovereign Lord, holy and dependable, how long before you judge those who live on the earth and vindicate '
  - type: note
    content: Although the Greek word ekdikeo can mean “avenge” or “render a fair verdict,” its primary meaning is to “validate” or “vindicate.”
  - type: text
    content: our blood on them?”
  - type: note
    content: This was a vision and is full of symbolism. We are like the souls “under the altar,” for we are under the shelter of the altar where Christ has been sacrificed on our behalf. We are those who cry out for a powerful move of God that will deal with the nature of man and bring the glory of God. This is not simply a cry for revenge but a cry for revival among the nations to break loose.
  '11':
  - type: text
    content: 'Each one was given a glistening white robe. '
  - type: note
    content: These symbolize the robes of the priesthood, the clothing of Christ upon our souls.
  - type: text
    content: And they were told to rest a little longer, until the full number was fulfilled of both their fellow servants and brothers and sisters who were going to be killed just as they had been.
  '12':
  - type: text
    content: 'And behold! I saw the Lamb break open the sixth seal, which released a powerful earthquake. I saw the sun become pitch black '
  - type: note
    content: Or “black as sackcloth made of [goat] hair.” This may represent our outward reasoning. What once gave us light is now turned into blackness.
  - type: text
    content: 'and the full moon become bloodred. '
  '13':
  - type: text
    content: 'The stars fell from heaven to the earth, as a fig tree shaken by a stormy wind sheds its unripe figs. '
  '14':
  - type: text
    content: 'The sky receded with a snap—as a scroll rolls itself up. '
  - type: note
    content: Scrolls were equal to today’s books. They were unrolled and read, then rolled back up. To have the sky rolled up like a scroll is equal to saying, “The book is closed!” The old heavens must be removed to make room for a new heaven. When Jesus was baptized, the new heavens were opened up to him like a scroll, inaugurating this era of an open heaven through Christ.
  - type: text
    content: 'And every mountain and island was moved from its place. '
  - type: note
    content: Upon opening the sixth seal, the scene changes to earth. The power of God is released, which shakes every continent and every island. Yet is this destruction meant to be taken literally? Great earthquakes throughout the Bible were a regular feature of divine visitation. Methods, movements, governments, and structures (mountains and islands) will all be shaken by God in this wonderful visitation. Stars do not literally fall to the earth. Some of them are so huge they are larger than our solar system. If they were to fall, it would destroy all that we know. Yet, as we read further into the book of Revelation, we find that the earth continues to exist. So this scene must be taken symbolically. The old order of the natural realm is passing away and a new order is being established. There are many prophecies of the Old Testament referring to the lights going out on the old order as something new is set in place (Isa. 24:23; 34:4; Jer. 15:9; Joel 2:30–31; Mic. 3:6). A superior light of the kingdom of God will make dim the light of the old covenant.
  '15':
  - type: text
    content: 'Then the kings of the earth and its great princes '
  - type: note
    content: Or “high-ranking officers” or “heads of thousands.” The heart of each person is being laid bare by the light and glory of Christ rising upon his people. It was Adam who first wanted to hide from the face of God, but for the believer we hide only in the Father’s love.
  - type: text
    content: 'and generals, the rich and powerful, and everyone, whether they were slave or free, ran for cover and hid in the caves and among the mountain boulders. '
  '16':
  - type: text
    content: 'They called out to the mountains and the boulders, saying, “Fall on us at once! '
  - type: note
    content: See Hos. 10:8.
  - type: text
    content: 'Hide us quickly from the glorious face of the one seated on the throne and from the wrath of the Lamb, '
  - type: note
    content: Few phrases in the Bible could seem more contradictory than “the wrath [anger] of the Lamb” (not the anger of the Lion). This is corrective and redemptive—not beastly rage but fiery passion to judge whatever gets in the way between the Lamb and his bride. The Greek word orge means “to reach out with passionate desire and take hold of.” The simplest definition of the Greek word orge could be “fiery passion.”
  '17':
  - type: text
    content: for the great day of their wrath has come, and who is able to stand?”
  '2':
  - type: text
    content: 'So I looked, and behold, there was a bright white horse. '
  - type: note
    content: The horse is an emblem of overcoming, invincible power in battle. The color white is found throughout Revelation, always associated with Christ or spiritual victory.
  - type: text
    content: 'Its rider had a bow '
  - type: note
    content: A bow without arrows shows that he is coming to conquer, not militarily but spiritually. He holds a bow to shoot the arrows of truth into our hearts.
  - type: text
    content: and was given a crown of victory. He rode out as a conqueror ready to conquer.
  - type: note
    content: 'Or “He went out continually conquering so that he might conquer.” This is Christ coming forth as King in authority and power, riding out to conquer everything within us that hinders the life of Christ emerging in our transformation (Ps. 45:3–4). The words “Come forth” reflect the groaning of creation to see the unveiling of the sons of God. See Henry Alford, Alford’s Greek Testament: An Exegetical and Critical Commentary, vol. 4, 1875 (Grand Rapids: Baker, 1980); Henry Barclay Swete, Commentary on Revelation (Grand Rapids: Kregel Publications, 1977). This is the calling forth of Christ by the power of his Spirit to conquer us fully. All the universe will one day be conquered by the one riding this white horse. Here he rides alone, but in Rev. 19:11 he does not come alone but with those whom he has conquered. John uses this word conquer more than any other New Testament writer. See Rev. 2–3.'
  '3':
  - type: text
    content: 'When he broke open the second seal, I heard the second living creature call out: “Come forth!” '
  - type: note
    content: Or “Go forth!”
  '4':
  - type: text
    content: 'And there appeared another horse, red '
  - type: text
    content: like fiery flames
  - type: text
    content: ', '
  - type: note
    content: See Mal. 3:1–3. The Greek word for “fiery” or “flames” comes from the word for “pure,” or “to purify.” Christ rides this fiery red horse as one robed in the flames of God to bring purity to his priestly people. See also Ps. 12:6.
  - type: text
    content: 'and its rider was given a great sword and the power to take peace from the earth, '
  - type: note
    content: See Matt. 10:34; Heb. 4:12; Eph. 6:17.
  - type: text
    content: causing one to put to death another.
  - type: note
    content: See Col. 3:5.
  '5':
  - type: text
    content: 'Then he broke open the third seal, and I heard the third living creature call out, “Come forth!” '
  - type: note
    content: Or “Go forth!”
  - type: text
    content: 'And behold, I saw a black horse right in front of me, and its rider was holding measuring scales. '
  '6':
  - type: text
    content: 'And I heard what seemed to be a voice from among the living creatures '
  - type: note
    content: 'This is likely the voice of the Lord, who dwells in the midst of the living creatures. See Rev. 4:6 and 5:6. These commands are for the four horses to come from the throne room. The Lamb who was slain is giving these decrees. He who gave his life now speaks of four commodities that bring life to us: wheat, barley, oil, and wine (Deut. 8:8). These four commodities point us to the promised land of God’s blessings. The wheat and barley point to the Passover Feast. The second day of the feast was the Feast of Unleavened Bread (wheat). The third day of the feast, a sheaf of barley representing the first grain harvested in the land was waved before the Lord (Lev. 23:9–11). Jesus was crucified on Passover, and on the third day, Jesus, God’s firstfruit (three measures of barley), was raised up from the dead and waved before the Father (1 Cor. 15:20, 23). To truly feed upon him will cost us all we have each day (a day’s pay). See also Prov. 23:23; Rev. 3:18.'
  - type: text
    content: 'saying, “A small measure '
  - type: note
    content: Or “a choenix,” a dry measure slightly less than a quart. It would be equal to the food supply of one man for one day. See Herodotus, Histories 7.187.
  - type: text
    content: 'of wheat for a day’s pay, and three measures of barley for a day’s pay, '
  - type: note
    content: Or “a denarius,” equal to a day’s wage for a laborer.
  - type: text
    content: 'but don’t harm '
  - type: note
    content: Or “damage” or “do wrong to.” The oil and wine will not be limited. We are in the day of the oil and wine being given in fullness to the sons and daughters of God.
  - type: text
    content: the olive trees producing oil and the vines producing wine.”
  '7':
  - type: text
    content: 'When he broke open the fourth seal, I heard the fourth living creature call out, “Come forth!” '
  - type: note
    content: Or “Go forth!”
  '8':
  - type: text
    content: 'And behold, I saw a green '
  - type: note
    content: The Greek word kloros always means “green,” not “pale green.” It is used four times in the New Testament and always refers to grass (green grass) or green living things. The color of the horse speaks of life, but the rider’s name is Death. Death rides on life (life comes through death—Gal. 2:20). The death is his death.
  - type: text
    content: 'horse, and its rider’s name was Death, and Death’s Domain '
  - type: note
    content: Or “Hades.”
  - type: text
    content: 'followed him. They were given authority over a fourth of the earth, to kill with sword, '
  - type: note
    content: This is the sword from his mouth, the word of God that kills and makes alive.
  - type: text
    content: 'famine, '
  - type: note
    content: To kill with hunger is the Lord’s method of starving to death our old ways, desires, and lusts. His resurrection life emerging in us overcomes (starves to death) what we cannot overcome. To hunger and thirst for righteousness is the key to being filled (Matt. 5:6; Col. 3:1–10).
  - type: text
    content: 'death, '
  - type: note
    content: This is not pestilence, but death. To kill with death is not trying to die to flesh, for that is a form of suicide, but to see that the death of Christ is our death too (Gal. 2:20). We cannot kill ourselves or by self-effort bring our flesh to death; it must be wholly the work of Christ. To kill by death is a death by death. Jesus rides into our lives on the green horse to put to death all of Adam through the life poured out by his (Jesus’) death.
  - type: text
    content: and by the wild beasts.
  '9':
  - type: text
    content: 'When the Lamb broke open the fifth seal, I saw gathered under the altar the souls of those who had been slain because of the Word of God and because they had the testimony of the Lamb. '
  - type: note
    content: As translated from the Aramaic. The Greek is “because of their testimony.” These souls gathered under the altar (an emblem of sacrifice unto death), died to every soulish way, and were offered as love sacrifices to God.
