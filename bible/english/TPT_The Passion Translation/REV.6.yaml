        children:
        - type: text
          text: Or “Go forth!”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And there appeared another horse, red '
    - type: usfm
      marker: it
      children:
      - type: text
        text: like fiery flames
    - type: text
      text: ', '
    - type: usfm
      marker: f
