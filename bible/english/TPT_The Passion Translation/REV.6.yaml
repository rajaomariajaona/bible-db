  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then he broke open the third seal, and I heard the third living creature call out, “Come forth!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Go forth!”
      marker-yv: yv-n
    - type: text
      text: 'And behold, I saw a black horse right in front of me, and its rider was holding measuring scales. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And I heard what seemed to be a voice from among the living creatures '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is likely the voice of the Lord, who dwells in the midst of the living creatures. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. These commands are for the four horses to come from the throne room. The Lamb who was slain is giving these decrees. He who gave his life now speaks of four commodities that bring life to us: wheat, barley, oil, and wine ('
      - type: text
        text: Deut. 8:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). These four commodities point us to the promised land of God’s blessings. The wheat and barley point to the Passover Feast. The second day of the feast was the Feast of Unleavened Bread (wheat). The third day of the feast, a sheaf of barley representing the first grain harvested in the land was waved before the Lord (
      - type: text
        text: Lev. 23:9–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jesus was crucified on Passover, and on the third day, Jesus, God’s firstfruit (three measures of barley), was raised up from the dead and waved before the Father (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
