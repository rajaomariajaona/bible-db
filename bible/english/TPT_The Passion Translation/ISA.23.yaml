  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' has stretched out his hand over the sea '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of humanity
- type: usfm
  marker: q1
  children:
  - type: text
    text: and has shaken the kingdoms of this world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has given his command to destroy Phoenicia’s fortresses.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He has given his command to Canaan to destroy its fortresses.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He said, “Fair Sidon, the oppressed one,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your celebrating is over.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rise and cross over to Cyprus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: even there you will find no rest.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Behold the land of the Babylonians.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are a people who have lost their identity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The Assyrians have made her a home for wild animals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They erected siege towers against her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: demolished her palaces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and made her a heap of ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Wail, you merchant ships of Tarshish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for your fortress is destroyed.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'In that day, Tyre will remain forgotten for seventy years, equal to the life span of a king. After seventy years, it will happen to Tyre as in the song about the prostitute:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Take a harp and go about the city,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you prostitute long forgotten.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Make your sweet melody and sing many songs
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that you will be remembered again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'At the end of seventy years, the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will restore Tyre, but she will return to her trade. She will prostitute herself again with every kingdom of the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But her merchandise and earnings will be set apart as holy to the Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '. They will neither be stored nor hoarded, but they will supply abundant '
  - type: usfm
