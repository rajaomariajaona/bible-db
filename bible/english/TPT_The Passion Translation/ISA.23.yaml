  children:
  - type: text
    text: A Prophecy concerning Tyre and Sidon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A prophecy for Tyre and '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sidon
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wail, you cargo ships of Tarshish!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Tarshish refers most likely to the city of Tartessus, Spain, on the Guadalquivir River. Archaeological evidence suggests it may have been near present-day Seville.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Tyre
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tyre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “rock,” “compressed,” or “pressed together.” Tyre, a Phoenician port on the Mediterranean, was once a symbol of power on the sea and a capital of world commerce. It was known as wealthy, influential, and evil. Now it is a small village known as Sur. Isaiah used it as a metaphor for commerce and trafficking.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: your port city
  - type: text
    text: ', has fallen without a house or a harbor!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Word has come to them from the land of Cyprus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Be silent, you inhabitants of the coast
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and you merchants of Sidon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sidon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a coastal town in Lebanon.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sidon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “one who lies in wait,” “to hunt,” or “to trap.”
    marker-yv: yv-n
  - type: text
    text: once thronged by seafarers.
- type: usfm
