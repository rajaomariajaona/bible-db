document_id: ISA.23,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy concerning Tyre and Sidon
  - type: text
    content: 'A prophecy for Tyre and '
  - type: text
    content: Sidon
  - type: text
    content: ':'
  - type: text
    content: Wail, you cargo ships of Tarshish!
  - type: note
    content: Tarshish refers most likely to the city of Tartessus, Spain, on the Guadalquivir River. Archaeological evidence suggests it may have been near present-day Seville.
  - type: text
    content: 'For '
  - type: text
    content: Tyre
  - type: text
    content: ', '
  - type: note
    content: Tyre means “rock,” “compressed,” or “pressed together.” Tyre, a Phoenician port on the Mediterranean, was once a symbol of power on the sea and a capital of world commerce. It was known as wealthy, influential, and evil. Now it is a small village known as Sur. Isaiah used it as a metaphor for commerce and trafficking.
  - type: text
    content: your port city
  - type: text
    content: ', has fallen without a house or a harbor!'
  - type: text
    content: Word has come to them from the land of Cyprus.
  '10':
  - type: text
    content: Daughter Tarshish, cross over your land
  - type: note
    content: Or “farm your land.”
  - type: text
    content: as one crosses the Nile,
  - type: text
    content: for there is no more harbor marketplace.
  - type: note
    content: Or “waistband.” The Hebrew of this verse is uncertain.
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' has stretched out his hand over the sea '
  - type: text
    content: of humanity
  - type: text
    content: and has shaken the kingdoms of this world.
  - type: text
    content: He has given his command to destroy Phoenicia’s fortresses.
  - type: note
    content: Or “He has given his command to Canaan to destroy its fortresses.”
  '12':
  - type: text
    content: He said, “Fair Sidon, the oppressed one,
  - type: text
    content: your celebrating is over.
  - type: text
    content: Rise and cross over to Cyprus;
  - type: text
    content: even there you will find no rest.”
  '13':
  - type: text
    content: Behold the land of the Babylonians.
  - type: text
    content: They are a people who have lost their identity.
  - type: text
    content: The Assyrians have made her a home for wild animals.
  - type: text
    content: They erected siege towers against her,
  - type: text
    content: demolished her palaces,
  - type: text
    content: and made her a heap of ruins.
  '14':
  - type: text
    content: Wail, you merchant ships of Tarshish,
  - type: text
    content: for your fortress is destroyed.
  '15':
  - type: text
    content: 'In that day, Tyre will remain forgotten for seventy years, equal to the life span of a king. After seventy years, it will happen to Tyre as in the song about the prostitute:'
  '16':
  - type: text
    content: Take a harp and go about the city,
  - type: text
    content: you prostitute long forgotten.
  - type: text
    content: Make your sweet melody and sing many songs
  - type: text
    content: so that you will be remembered again.
  '17':
  - type: text
    content: 'At the end of seventy years, the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' will restore Tyre, but she will return to her trade. She will prostitute herself again with every kingdom of the world. '
  '18':
  - type: text
    content: 'But her merchandise and earnings will be set apart as holy to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '. They will neither be stored nor hoarded, but they will supply abundant '
  - type: note
    content: See John 10:10; 3 John 2.
  - type: text
    content: 'food and splendid garments for those who live in the presence of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: note
    content: Or “for those on whom Yahweh’s face shines.” Or “for those who live before Yahweh’s face.”
  '2':
  - type: text
    content: Be silent, you inhabitants of the coast
  - type: text
    content: 'and you merchants of Sidon, '
  - type: note
    content: Sidon is a coastal town in Lebanon. Sidon means “one who lies in wait,” “to hunt,” or “to trap.”
  - type: text
    content: once thronged by seafarers.
  '3':
  - type: text
    content: On the great waters your revenue
  - type: text
    content: was the grain from the Nile basin.
  - type: note
    content: Or “Sihor,” a tributary of the Nile. Sihor means “to wipe out” or “to uproot.”
  - type: text
    content: The harvest of the Nile was your revenue.
  - type: text
    content: You were merchants who traded with the nations.
  '4':
  - type: text
    content: Sidon, be ashamed,
  - type: text
    content: for the sea, the stronghold of the sea, declares,
  - type: text
    content: “I have never gone into labor to give birth to children,
  - type: text
    content: nor have I raised up sons or daughters.”
  - type: note
    content: In this cryptic verse, it appears that Tyre is given the name “sea, the stronghold of the sea.” With poetic impact, the sea is personified and speaks of being childless. There are churches today that are “childless” (without evangelistic outreach) and don’t “raise up sons and daughters” (training and equipping them for ministry).
  '5':
  - type: text
    content: When the Egyptians hear it, they will be stunned
  - type: text
    content: over the destruction of Tyre.
  '6':
  - type: text
    content: Cross over to Tarshish.
  - type: text
    content: Wail, you inhabitants of the coast.
  '7':
  - type: text
    content: Is this your once boisterous city, founded so long ago?
  - type: text
    content: Is this the city that once sent settlers over the sea?
  '8':
  - type: text
    content: Who has planned this for imperial Tyre, who once wore her crown?
  - type: text
    content: Your merchants were nobles,
  - type: text
    content: and your traders were honored by the world.
  '9':
  - type: text
    content: Yahweh
  - type: text
    content: ', the Commander of Angel Armies, has planned it!'
  - type: text
    content: 'His plan is to eliminate '
  - type: note
    content: Or “pollute” or “defile.”
  - type: text
    content: 'the pride of your '
  - type: text
    content: presumed
  - type: text
    content: ' splendor'
  - type: text
    content: and to humiliate the honored of the world.
