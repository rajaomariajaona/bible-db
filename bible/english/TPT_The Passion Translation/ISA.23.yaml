    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The harvest of the Nile was your revenue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You were merchants who traded with the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sidon, be ashamed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the sea, the stronghold of the sea, declares,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I have never gone into labor to give birth to children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor have I raised up sons or daughters.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In this cryptic verse, it appears that Tyre is given the name “sea, the stronghold of the sea.” With poetic impact, the sea is personified and speaks of being childless. There are churches today that are “childless” (without evangelistic outreach) and don’t “raise up sons and daughters” (training and equipping them for ministry).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When the Egyptians hear it, they will be stunned
- type: usfm
  marker: q1
  children:
  - type: text
    text: over the destruction of Tyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cross over to Tarshish.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Wail, you inhabitants of the coast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Is this your once boisterous city, founded so long ago?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is this the city that once sent settlers over the sea?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Who has planned this for imperial Tyre, who once wore her crown?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your merchants were nobles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your traders were honored by the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the Commander of Angel Armies, has planned it!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'His plan is to eliminate '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “pollute” or “defile.”
    marker-yv: yv-n
  - type: text
    text: 'the pride of your '
  - type: usfm
    marker: it
    children:
    - type: text
      text: presumed
  - type: text
    text: ' splendor'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to humiliate the honored of the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Daughter Tarshish, cross over your land
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “farm your land.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: as one crosses the Nile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for there is no more harbor marketplace.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “waistband.” The Hebrew of this verse is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
