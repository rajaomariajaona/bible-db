document_id: ACT.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul Persecutes the Believers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now, Saul agreed to be an accomplice to Stephen’s stoning and participated in his execution. From that day on, a great persecution of the church in Jerusalem began. All the believers scattered into the countryside of Judea and among the Samaritans, except the apostles who remained behind in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God-fearing men gave Stephen a proper burial and mourned greatly over his death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then Saul mercilessly persecuted the church of God, going from house to house into the homes of believers to arrest both men and women and drag them off to prison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Gospel Spreads to Samaria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Although the believers were scattered by persecution, they preached the wonderful news of the word of God wherever they went. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Philip traveled to a Samaritan city '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the main city of Samaria.” Many believe this was the Samaritan city of Sebaste.
    marker-yv: yv-n
  - type: text
    text: 'and preached to them the wonderful news of the Anointed One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The crowds were eager to receive '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic, which indicates they did more than just hear the good news; they silenced those who said anything against Philip’s message.
    marker-yv: yv-n
  - type: text
    text: 'Philip’s message and were persuaded by the many miracles and wonders he performed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Many demon-possessed people were set free and delivered as evil spirits came out of them with loud screams and shrieks, and many who were lame and paralyzed were also healed. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Healings, miracles, and deliverances were being accomplished through others, not just the apostles.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: This resulted in an uncontainable joy filling the city!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Simon the Sorcerer Converted
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now, there was a man who lived there who was steeped in sorcery. For some time he had astounded the people of Samaria with his magic, boasting to be someone great. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “He boasted of himself, saying, ‘I am the great god!’ ”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Everyone, from the least to the greatest among them, was dazzled by his sorcery, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “They were all praying to him” or “bowing down to him.”
    marker-yv: yv-n
  - type: text
    text: 'saying, “This man is the greatest wizard of all! The divine power of God walks among us!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For many years everyone was in awe of him because of his astonishing displays of the magic arts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But as Philip preached the wonderful news of God’s kingdom realm, and the name of Jesus the Anointed One, many believed his message and were baptized, both men and women. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Even Simon believed and was baptized! Wherever Philip went, Simon was right by his side, astounded by all the miracles, signs, and enormous displays of power that he witnessed.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When the apostles in Jerusalem heard that the Samaritans had accepted God’s message of life, they sent Peter and John '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'to pray over them so that they would receive the Holy Spirit. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “take hold of the Holy Spirit.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For they had only been baptized in the name of the Lord Jesus and were yet to have the Holy Spirit fall upon them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: As soon as Peter and John arrived, they laid their hands on the Samaritan believers, one after another, and the Holy Spirit fell and filled each one of them!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the text. The Greek is “They took hold of the Holy Spirit.” That is, the power of the Holy Spirit came upon them and filled them.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Simon saw how the Holy Spirit was released through the laying on of the apostles’ hands, he approached them and offered them money, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'saying, “I want this power too. I’m willing to pay you for the anointing '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “authority.”
    marker-yv: yv-n
  - type: text
    text: that you have, so that I also can lay my hands on everyone to receive the Holy Spirit.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Peter rebuked him and said, “Your money will go with you to destruction! How could you even think that you could purchase God’s supernatural gift with money? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'You will never have this gift or take part in this ministry, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You have no part with us in this word” (
    - type: usfm
      marker: it
      children:
      - type: text
        text: logos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The Aramaic is “You have no portion in this faith.”
    marker-yv: yv-n
  - type: text
    text: 'for your heart is not right with God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Repent this moment for allowing such wickedness to fill you. Plead with the Lord that perhaps he would forgive you the treachery of your heart. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'For I discern that jealous envy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “bitter anger.”
    marker-yv: yv-n
  - type: text
    text: has poisoned you and binds you as a captive to sin.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Simon begged, “Peter, please pray to God for me. Plead with him so that nothing you just said over me may come to pass!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Philip and the Ethiopian
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: After Peter and John had testified and taught the word of God in that city, they returned to Jerusalem, stopping at many Samaritan villages along the way to preach the hope of the gospel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then the Lord’s angel said to Philip, “Now go south from Jerusalem on the desert road to Gaza.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He left immediately on his assignment.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Along the way he encountered an Ethiopian '
  - type: usfm
    marker: it
    children:
    - type: text
      text: who believed in the God of the Jews
  - type: text
    text: ', '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied by the Aramaic word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mhymna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a homonym that can mean “believer” or “eunuch.” It is difficult to understand why a minister of finance would need to become a eunuch.'
    marker-yv: yv-n
  - type: text
    text: 'who was the minister of finance for Candace, queen of Ethiopia. He was on his way home from worshiping God in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: As he rode along in his chariot, he was reading from the scroll of Isaiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The Holy Spirit said to Philip, “Go and walk alongside the chariot.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: So Philip ran to catch up. As he drew closer he overheard the man reading from the scroll of Isaiah the prophet. Philip asked him, “Sir, do you understand what you’re reading?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The man answered, “How can I possibly make sense of this without someone explaining it to me?” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “unless someone guide me.”
    marker-yv: yv-n
  - type: text
    text: So he invited Philip up into his chariot to sit with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The portion from Isaiah he was reading was this:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was led away to the slaughter
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a lamb to be offered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He was like a lamb that is silent
- type: usfm
  marker: q1
  children:
  - type: text
    text: before those who sheared him—
- type: usfm
  marker: q1
  children:
  - type: text
    text: he never even opened his mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: In his lowliness justice was stripped away from him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Which means he had no one there to defend him and stand up for justice.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: And who could fully express his struggles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For his life was taken from the earth.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. Both the Greek and the Aramaic are difficult to translate. The Greek is “Who can describe his posterity?” or “Who could describe the [evil] people of his time?” The Aramaic word for “struggles” (sufferings) and “generation” is the homonym
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: darreh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 53:7–8
      metadata:
        usfm: ISA.53.7+ISA.53.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: The Ethiopian asked Philip, “Please, can you tell me who the prophet is speaking of? Is it himself or another man?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Philip started with this passage and shared with him the wonderful message of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: As they were traveling down the road, the man said, “Look, here’s a pool of water. Why don’t I get baptized right now?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Philip replied, “If you believe with all your heart, I’ll baptize you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The man answered, “I believe that Jesus is the Anointed One, the Son of God.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although only a few later Greek manuscripts include v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: ACT.8.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', it is found in one of the oldest Aramaic texts (Harklean Syriac Version, AD 616) and one Greek uncial from the eighth century. There is widespread consensus among scholars of both Greek and Aramaic texts that v.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '37'
      metadata:
        usfm: ACT.8.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was added as an ancient Christian confession of faith.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The Ethiopian stopped his chariot, and they went down into the water '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There was no need to go down into the water if it was a baptism of sprinkling. Philip immersed the believing Ethiopian man in baptism.
    marker-yv: yv-n
  - type: text
    text: 'and Philip baptized him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 39-40
  - type: text
    text: 'When they came up out of the water, Philip was suddenly snatched up by the Spirit of the Lord and instantly carried away to the city of Ashdod, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:39–40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Azotus.” This translation of Philip was an amazing miracle, as the city of Ashdod would have been fifteen miles or more from the desert road to Gaza. This miracle of being translated also took place with Ezekiel. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 3:12–15
      metadata:
        usfm: EZK.3.12+EZK.3.13+EZK.3.14+EZK.3.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: where he reappeared, preaching the gospel in that city.
- type: usfm
  marker: p
  children:
  - type: text
    text: The man never saw Philip again. He returned to Ethiopia full of great joy. Philip, however, traveled on to all of the towns of that region, bringing them the good news, until he arrived at Caesarea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:39–40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This prominent Roman city was also known as Caesarea by the Sea.
    marker-yv: yv-n
