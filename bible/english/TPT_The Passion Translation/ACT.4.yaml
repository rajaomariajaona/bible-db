      text: The Church Prays
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as they were released from custody, Peter and John went to the other believers and explained all that had happened with the high priest and the elders. '
  '24':
  - type: usfm
    marker: p
    children:
