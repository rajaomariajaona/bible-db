        children:
        - type: text
          text: 'refers to an unrestrained boldness. There was a Greek idiom that said essentially, “If you tell me the truth no matter what that truth turns out to be, I will not punish you.” This was known as the Parresiastic Contract. See M. Foucault, “Discourse and Truth: The Problematization of Parresia,” six lectures given at the University of California at Berkeley, 1983, ed. by Joseph Pearson in 1985.'
