document_id: ACT.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter and John Arrested
  - type: text
    content: 'The teaching and preaching of Peter and John angered the priests, the captain of the temple police, and representatives of the Jewish sect of the Sadducees. '
  - type: note
    content: Of the three major sects of Judaism of that day (Pharisees, Essenes, and Sadducees), the Sadducees were a small but influential group that philosophically denied the supernatural and gravitated instead toward political control of the people. Their denial of the resurrection is what prompted their actions here.
  - type: text
    content: 'They were furious that the people were being taught that in Jesus there is a resurrection from the dead. So while Peter and John were still speaking, the Jewish authorities came to the temple courts to oppose them. '
  '10':
  - type: text
    content: 'you and everyone else in Israel should know that it is by the power of the name of Jesus that the crippled man stands here today completely healed! You crucified Jesus Christ of Nazareth, '
  - type: note
    content: Or “the Nazarene.”
  - type: text
    content: 'but God raised him from the dead. '
  '11':
  - type: text
    content: 'This Jesus is ‘the stone that you, the builders, have rejected, and now he has become the cornerstone!’ '
  - type: note
    content: See Ps. 118:22.
  '12':
  - type: text
    content: 'There is no one else '
  - type: note
    content: Peter insisted there was no man who could claim to be the Messiah other than Jesus.
  - type: text
    content: 'who has the power to save us, for there is only one name to whom God has given authority by which we must experience salvation: '
  - type: note
    content: The Aramaic is “We must experience the Life Giver” or “We must receive the covenant of life.”
  - type: text
    content: the name of Jesus
  - type: text
    content: .”
  '13':
  - type: text
    content: 'The council members were astonished as they witnessed the bold courage '
  - type: note
    content: The Aramaic is “hearing the bold words of Peter and John.”
  - type: text
    content: 'of Peter and John, especially when they discovered that they were just ordinary men who had never had religious training. '
  - type: note
    content: The Aramaic is “They did not know the scrolls.” The Greek is “uneducated.”
  - type: text
    content: 'Then they began to understand the effect Jesus had on them simply by spending time with him. '
  '14':
  - type: text
    content: Standing there with them was the healed man, and there was nothing further they could say.
  '15':
  - type: text
    content: 'So they ordered them to leave the room while they discussed the matter. Among themselves, they said, '
  '16':
  - type: text
    content: '“What should we do with these men? Everyone in Jerusalem can clearly see that they’ve performed a notable sign and wonder—we can’t deny that. '
  '17':
  - type: text
    content: But to keep this propaganda from spreading any further among the people, let’s threaten them severely and warn them to never speak to anyone in this name again.”
  '18':
  - type: text
    content: 'So they had them brought back in before the council, and they commanded them to never teach the people or speak again using the name of Jesus. '
  '19':
  - type: text
    content: 'But Peter and John replied, “You can judge for yourselves—is it better to listen to you or to God? '
  '20':
  - type: text
    content: It’s impossible for us to stop speaking about all the things we’ve seen and heard!”
  '21':
  - type: text
    content: 'Since the members of the council couldn’t come up with a crime they could punish them for, they threatened them once more and let them go. All the people praised God, thrilled over the miraculous healing of the crippled man. '
  - type: note
    content: Made explicit from the text, “over what had happened.”
  '22':
  - type: text
    content: And the man who received this miracle sign of healing was over forty years old.
  - type: note
    content: For the significance of the number forty, see the second footnote on 1:3.
  - type: heading
    content: The Church Prays
  '23':
  - type: text
    content: 'As soon as they were released from custody, Peter and John went to the other believers and explained all that had happened with the high priest and the elders. '
  '24':
  - type: text
    content: 'When the believers heard their report, they raised their voices in unity and prayed, “Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'you are the Lord of all! You created the universe—the earth, the sky, the sea, and everything that is in them. '
  - type: note
    content: See Ex. 20:11; Ps. 146:6.
  '25':
  - type: text
    content: 'And you spoke by the Holy Spirit through your servant David, our forefather, saying:'
  - type: text
    content: ‘How dare the nations plan a rebellion,
  - type: text
    content: ranting and raging against the Lord Most High?
  - type: text
    content: Their foolish plots are futile!
  '26':
  - type: text
    content: Look at how the kings of the earth take their stand,
  - type: text
    content: with the rulers scheming and conspiring together
  - type: text
    content: 'against God '
  - type: note
    content: The Aramaic is “Lord Yahweh,” and the Greek is “Lord” (kurios).
  - type: text
    content: and his anointed Messiah!’
  - type: note
    content: See Ps. 2:1–2.
  '27':
  - type: text
    content: '“In fact, Herod and Pontius Pilate, along with Jews and non-Jews, met together to take their stand against your holy servant, Jesus the Messiah. '
  '28':
  - type: text
    content: 'They did to him all that your purpose and will had determined, according to the destiny you had marked out for him. '
  '29':
  - type: text
    content: 'So now, Lord, listen to their threats to harm us. Empower us, as your servants, to speak the word of God freely and courageously. '
  '3':
  - type: text
    content: 'They had them arrested, and since it was already evening they kept them in custody until the next day. '
  '30':
  - type: text
    content: 'Stretch out your hand of power '
  - type: text
    content: through us
  - type: text
    content: ' to heal, and to move in signs and wonders by the name of your holy Son, Jesus!”'
  - type: note
    content: As translated from the Aramaic. The Greek is “your holy servant, Jesus.”
  '31':
  - type: text
    content: 'As they prayed the earth shook beneath them, causing the building they were in to tremble. '
  - type: note
    content: The Aramaic is “an earthquake.”
  - type: text
    content: Each one of them was filled with the Holy Spirit, and they proclaimed the word of God with unrestrained boldness.
  - type: note
    content: 'The Greek word is parresia. This involves more than confidence; it was a free-flowing, unrestrained boldness. It can also mean “freedom of speech.” Parresia carries nuances that are not easily brought over into English. The person who speaks with parresia will say everything that is on his mind with no restraint, flowing out of his heart with confidence. It involves being frank and honest, hiding nothing and speaking directly to the heart. Most often it is a word used for public speaking. It refers to speech that is not tailored to make everyone happy but to speak the truth, in spite of what that may cost. It is the courage to speak truth into the ears of others. This was reserved for only the highest rank of Greek citizens, not people of other lands or slaves. The right to speak freely was an essential aspect of Athenian democracy. Although it is sometimes associated with negative speech, in this context parresia refers to an unrestrained boldness. There was a Greek idiom that said essentially, “If you tell me the truth no matter what that truth turns out to be, I will not punish you.” This was known as the Parresiastic Contract. See M. Foucault, “Discourse and Truth: The Problematization of Parresia,” six lectures given at the University of California at Berkeley, 1983, ed. by Joseph Pearson in 1985. Parresia is found also in Mark 8:32; John 7:4, 13, 26; 10:24; 11:14, 54; 2 Cor. 3:12; 7:4; Eph. 3:12; 6:19; Phil. 1:20; and numerous other places.'
  '32':
  - type: text
    content: 'All the believers were one in mind and heart. Selfishness was not a part of their community, for they shared everything they had with one another. '
  '33':
  - type: text
    content: 'The apostles gave powerful testimonies about the resurrection of the Lord Jesus, and great measures of grace '
  - type: note
    content: Or “mega-grace.”
  - type: text
    content: 'rested upon them all. '
  '34':
  - type: text
    content: Some who owned houses or land sold them and brought the proceeds before the apostles to distribute to those without. Not a single person among them was needy.
  '36':
  - type: text
    content: For example, there was a Levite from Cyprus named Joseph, who sold his farmland and placed the proceeds at the feet of the apostles. They nicknamed him Barnabas (or “Encourager”).
  - type: note
    content: The name Barnabas means “son of encouragement,” or “son of the prophet.” This was the Barnabas who traveled with Paul as an apostle.
  '4':
  - type: text
    content: 'Yet there were many in the crowd who believed the message, '
  - type: note
    content: Or “the Word” (Gr. logos).
  - type: text
    content: 'bringing the total number of men who believed '
  - type: note
    content: Although the cultural way of numbering the Jewish crowd is technically “adult males,” the usage of the Greek term ton andron is consistently found throughout Greek literature as an inclusive and formal term of respect, similar to “ladies and gentlemen.” Including women and children, the early church swelled rapidly into tens of thousands.
  - type: text
    content: to nearly five thousand!
  '5':
  - type: text
    content: 'The next day many Jewish leaders, religious scholars, and elders of the people convened a meeting in Jerusalem. '
  '6':
  - type: text
    content: 'Annas the high priest was there with Caiaphas, John, Alexander, '
  - type: note
    content: There is little known about John (or Jonathan) and Alexander. It is possible that John was the son of Caiaphas, who would one day be the high priest. Or John and Alexander could have been the leaders of the Sadducees.
  - type: text
    content: 'and others who were members of the high priest’s family. '
  '7':
  - type: text
    content: They made Peter and John stand in front of the council as they questioned them, saying, “Tell us, by what power and authority have you done these things?”
  - type: note
    content: Or “In whose name did you do this?”
  '8':
  - type: text
    content: 'Peter, filled with the Holy Spirit, answered, “Respected elders and leaders of the people, listen. '
  '9':
  - type: text
    content: 'Are we being put on trial today for doing an act of kindness by healing a frail, crippled man? Well then, '
