          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “We must experience the Life Giver” or “We must receive the covenant of life.”
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: the name of Jesus
    - type: text
      text: .”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The council members were astonished as they witnessed the bold courage '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “hearing the bold words of Peter and John.”
      marker-yv: yv-n
    - type: text
      text: 'of Peter and John, especially when they discovered that they were just ordinary men who had never had religious training. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “They did not know the scrolls.” The Greek is “uneducated.”
      marker-yv: yv-n
    - type: text
      text: 'Then they began to understand the effect Jesus had on them simply by spending time with him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Standing there with them was the healed man, and there was nothing further they could say.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they ordered them to leave the room while they discussed the matter. Among themselves, they said, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“What should we do with these men? Everyone in Jerusalem can clearly see that they’ve performed a notable sign and wonder—we can’t deny that. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But to keep this propaganda from spreading any further among the people, let’s threaten them severely and warn them to never speak to anyone in this name again.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they had them brought back in before the council, and they commanded them to never teach the people or speak again using the name of Jesus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Peter and John replied, “You can judge for yourselves—is it better to listen to you or to God? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It’s impossible for us to stop speaking about all the things we’ve seen and heard!”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since the members of the council couldn’t come up with a crime they could punish them for, they threatened them once more and let them go. All the people praised God, thrilled over the miraculous healing of the crippled man. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Made explicit from the text, “over what had happened.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the man who received this miracle sign of healing was over forty years old.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:22
      - type: usfm
        marker: ft
