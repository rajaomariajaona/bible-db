verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter and John Arrested
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The teaching and preaching of Peter and John angered the priests, the captain of the temple police, and representatives of the Jewish sect of the Sadducees. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Of the three major sects of Judaism of that day (Pharisees, Essenes, and Sadducees), the Sadducees were a small but influential group that philosophically denied the supernatural and gravitated instead toward political control of the people. Their denial of the resurrection is what prompted their actions here.
      marker-yv: yv-n
    - type: text
      text: 'They were furious that the people were being taught that in Jesus there is a resurrection from the dead. So while Peter and John were still speaking, the Jewish authorities came to the temple courts to oppose them. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you and everyone else in Israel should know that it is by the power of the name of Jesus that the crippled man stands here today completely healed! You crucified Jesus Christ of Nazareth, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the Nazarene.”
      marker-yv: yv-n
    - type: text
      text: 'but God raised him from the dead. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This Jesus is ‘the stone that you, the builders, have rejected, and now he has become the cornerstone!’ '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
