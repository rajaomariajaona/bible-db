        - type: text
          text: parresia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This involves more than confidence; it was a free-flowing, unrestrained boldness. It can also mean “freedom of speech.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Parresia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: carries nuances that are not easily brought over into English. The person who speaks with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: parresia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: will say everything that is on his mind with no restraint, flowing out of his heart with confidence. It involves being frank and honest, hiding nothing and speaking directly to the heart. Most often it is a word used for public speaking. It refers to speech that is not tailored to make everyone happy but to speak the truth, in spite of what that may cost. It is the courage to speak truth into the ears of others. This was reserved for only the highest rank of Greek citizens, not people of other lands or slaves. The right to speak freely was an essential aspect of Athenian democracy. Although it is sometimes associated with negative speech, in this context
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
