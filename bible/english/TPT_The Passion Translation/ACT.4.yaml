      marker-yv: yv-n
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they prayed the earth shook beneath them, causing the building they were in to tremble. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:31
      - type: usfm
