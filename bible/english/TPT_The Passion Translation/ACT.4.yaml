  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There is no one else '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter insisted there was no man who could claim to be the Messiah other than Jesus.
      marker-yv: yv-n
    - type: text
      text: 'who has the power to save us, for there is only one name to whom God has given authority by which we must experience salvation: '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:12
      - type: usfm
        marker: ft
