  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the believers were one in mind and heart. Selfishness was not a part of their community, for they shared everything they had with one another. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The apostles gave powerful testimonies about the resurrection of the Lord Jesus, and great measures of grace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “mega-grace.”
      marker-yv: yv-n
    - type: text
      text: 'rested upon them all. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some who owned houses or land sold them and brought the proceeds before the apostles to distribute to those without. Not a single person among them was needy.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For example, there was a Levite from Cyprus named Joseph, who sold his farmland and placed the proceeds at the feet of the apostles. They nicknamed him Barnabas (or “Encourager”).
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:36–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The name Barnabas means “son of encouragement,” or “son of the prophet.” This was the Barnabas who traveled with Paul as an apostle.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
