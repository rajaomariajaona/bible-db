  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In fact, Herod and Pontius Pilate, along with Jews and non-Jews, met together to take their stand against your holy servant, Jesus the Messiah. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did to him all that your purpose and will had determined, according to the destiny you had marked out for him. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So now, Lord, listen to their threats to harm us. Empower us, as your servants, to speak the word of God freely and courageously. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They had them arrested, and since it was already evening they kept them in custody until the next day. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stretch out your hand of power '
    - type: usfm
      marker: it
      children:
      - type: text
        text: through us
    - type: text
      text: ' to heal, and to move in signs and wonders by the name of your holy Son, Jesus!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:30
      - type: usfm
        marker: ft
