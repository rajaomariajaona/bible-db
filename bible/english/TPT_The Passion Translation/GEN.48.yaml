document_id: GEN.48,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Blesses Joseph’s Sons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not long afterward, Joseph received the news that his father’s health was failing, so he took his two sons Manasseh and Ephraim along with him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Israel could barely see, for his eyes were failing because of old age. So, Joseph brought his sons closer to him, and Joseph’s father, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: their grandfather
    - type: text
      text: ', hugged and kissed them.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tearfully
    - type: text
      text: ', Israel said to Joseph, “I never thought I’d see your face again, and now, God has let me see my grandchildren as well!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Blesses His Grandchildren
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph then removed them from his father’s knees and bowed low in respect before his father with his face to the ground. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joseph took his sons and had them stand facing their grandfather Israel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By placing them before him like this, Israel recognized Joseph’s sons as his own by adoption. By adopting Joseph’s sons, Jacob removed the firstborn blessing from Reuben and gave it to Joseph’s sons.
      marker-yv: yv-n
    - type: text
      text: 'Ephraim at Israel’s left hand, and Manasseh at Israel’s right hand. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joseph positioned his sons so that Jacob’s right hand would rest on the firstborn, Manasseh.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Israel crossed his arms, and stretched out his right hand on the head of the younger son, Ephraim, and his left hand on the head of the firstborn son, Manasseh. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spoke this blessing over them:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Joseph.” The Septuagint reads “them.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May the God of my fathers, Abraham and Isaac, who lived devoted to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the God who has been my Shepherd from my birth until this day,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Angel who has delivered me from all harm,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Lord had visited Jacob as an Angel, the midnight wrestling Man, his true Friend. At the end of Jacob’s life, he could say that his Shepherd-Friend had delivered him from all harm. Instead of moaning and complaining about his hardships, this servant of God declared the mercy that had preserved him. Christ, the Angel of the Covenant, redeems us from all evil.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: may he bless these boys!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their lives echo my name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the names of my fathers Abraham and Isaac.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they multiply into teeming multitudes throughout the earth!”
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'When Joseph saw his father place his right hand on Ephraim’s head, he was not happy, so he tried to move his father’s hand from Ephraim to Manasseh’s head. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: '“Not that way,” Joseph said to his father, “Here, father, put your right hand on the firstborn’s head.” '
  '19':
  - type: usfm
    marker: m
    children:
    - type: text
      text: But his father refused and said, “I know, my son, I know. Manasseh’s descendants will also multiply and become a great people. His younger brother will become even greater than he, and his tribe will one day give rise to many nations.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As the Spirit of Prophecy fell upon Jacob, he knew that it was God’s will to bless and honor Ephraim above his brother Manasseh. Once again, the younger was set above the older and was given a greater blessing and a greater work. Maneuvering is our choosing, our selecting. Blessing is God’s choice. It had taken Jacob a lifetime to learn this lesson: It is far better to wait until the blessing of God is seen and give up our maneuvering to have our own way.'
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Jacob heard that they had come to see him, Israel rallied his strength and sat up in bed.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jacob blessed them that day, saying,
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Israel will use your names when they pronounce blessings!
  - type: usfm
    marker: p
    children:
    - type: text
      text: They will say, ‘May God make you like Ephraim and like Manasseh!’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ephraim and Manasseh became strong leaders in Israel. Their descendants multiplied and grew mighty. Joshua was of the tribe of Ephraim, and so was Jeroboam. The tribe of Manasseh was divided after the conquest with one half on one side of the Jordan and the other half on the other side of the river. Jacob, foreseeing this division would weaken the tribe, “crossed” his arms! This blessing spoken by Jacob endured and still endures. When the Lord blesses, no one can revoke it (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 23:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '20'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jacob’s hands that had deceived and grasped what was not his now became the hands that blessed out of an overflow of life. The “heel grabber” became the “blessing giver.” The day will come when this transformation will take place in you as well.
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the crossing of his arms during
    - type: text
      text: ' Jacob’s blessing put Ephraim ahead of Manasseh. '
  '21':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then Israel said to Joseph, “Son, I will die soon, but God’s presence will go with you, and one day, he will take you back to the land of your ancestors. '
  '22':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I give you one mountain slope more than your brothers, the mountain slope of Shechem, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the fertile region
    - type: text
      text: ' I took from the Amorites with my own sword and my own bow.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text is somewhat ambiguous, for the word for “mountain slope” can also mean “Shechem.” The translator has chosen to leave both possibilities in the text. Additionally, it may be a reference to Mt. Gerizim, which stands above Shechem. The implication is that because Joseph was raised up, he would inherit the higher ground.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob said to Joseph, “The God who is more than enough appeared to me at Bethel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 48:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Luz,” the ancient name of Bethel. Jacob was referring to the appearance of the heavenly stairway reaching into heaven. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 28:10–19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'in the land of Canaan where he blessed me! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to me, ‘I will make you fruitful and multiply your descendants until I have made you a company of nations. And I will give this land to your descendants for an everlasting possession.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furthermore, I will adopt as my very own your two sons who were born in the land of Egypt before I came here. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yes
    - type: text
      text: ', I claim Ephraim and Manasseh as mine, no less than '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my two oldest
    - type: text
      text: ', Reuben and Simeon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for any children born after them, they will be considered yours. They will receive their portion of the inheritance in the same territory as their brothers. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when I was returning from Paddan-Aram, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: my beloved
    - type: text
      text: ' Rachel died, to my sorrow, in the land of Canaan while we were still on our way, not far from Ephrath. So I buried her there beside the road to Ephrath (that is, Bethlehem).”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Israel noticed Joseph’s two sons, he said, “Who are these?”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “They are the sons that God has graciously given me here,” Joseph said to his father.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Please bring them closer,” he said, “so that I may bless them.”
