document_id: PSA.100,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Praise God
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A poetic song for thanksgiving
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lift up a great shout of joy to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go ahead and do it—everyone, everywhere!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Worship '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' with gladness.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sing your way into his presence with joy!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: And realize what this really means—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'we have the privilege of worshiping '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' our God.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he is our Creator and we belong to him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are the people of his pleasure.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 100:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the sheep of his pasture.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'You can pass through his open gates '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 100:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “gate [doorway]” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: sha’ar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and has multiple meanings. It can also mean “storm.” When you pass through his gates you enter into the stormy, passionate love of God. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: with the password of praise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come right into his presence with thanksgiving.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come bring your thank offering to him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and affectionately bless his beautiful name!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is always good and ready to receive you.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He’s so loving that it will amaze you—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so kind that it will astound you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And he is famous for his faithfulness toward all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Everyone knows our God can be trusted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he keeps his promises to every generation!
