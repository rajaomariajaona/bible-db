document_id: PSA.100,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Praise God
  - type: text
    content: A poetic song for thanksgiving
  - type: text
    content: 'Lift up a great shout of joy to '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: Go ahead and do it—everyone, everywhere!
  '2':
  - type: text
    content: 'Worship '
  - type: text
    content: Yahweh
  - type: text
    content: ' with gladness.'
  - type: text
    content: Sing your way into his presence with joy!
  '3':
  - type: text
    content: And realize what this really means—
  - type: text
    content: 'we have the privilege of worshiping '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God.'
  - type: text
    content: For he is our Creator and we belong to him.
  - type: text
    content: We are the people of his pleasure.
  - type: note
    content: Or “the sheep of his pasture.”
  '4':
  - type: text
    content: 'You can pass through his open gates '
  - type: note
    content: The Hebrew word for “gate [doorway]” is sha’ar and has multiple meanings. It can also mean “storm.” When you pass through his gates you enter into the stormy, passionate love of God. See Rev. 3:20.
  - type: text
    content: with the password of praise.
  - type: text
    content: Come right into his presence with thanksgiving.
  - type: text
    content: Come bring your thank offering to him
  - type: text
    content: and affectionately bless his beautiful name!
  '5':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is always good and ready to receive you.'
  - type: text
    content: He’s so loving that it will amaze you—
  - type: text
    content: so kind that it will astound you!
  - type: text
    content: And he is famous for his faithfulness toward all.
  - type: text
    content: Everyone knows our God can be trusted,
  - type: text
    content: for he keeps his promises to every generation!
