document_id: PSA.145,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Greatness
  - type: text
    content: King David’s poetic song of praise
  - type: text
    content: My heart explodes with praise to you!
  - type: text
    content: Now and forever my heart bows in worship to you,
  - type: text
    content: my King and my God!
  '10':
  - type: text
    content: Everything you have made will praise you, fulfilling its purpose.
  - type: text
    content: And all your godly ones will be found bowing before you.
  '11':
  - type: text
    content: They will tell the world of the lavish splendor of your kingdom
  - type: text
    content: and preach about your limitless power.
  '12':
  - type: text
    content: They will demonstrate for all to see your miracles of might
  - type: text
    content: and reveal the glorious majesty of your kingdom.
  '13':
  - type: text
    content: You are the Lord who reigns over your never-ending kingdom through all the ages of time and eternity!
  - type: text
    content: You are faithful to fulfill every promise you’ve made.
  - type: text
    content: You manifest yourself as kindness in all you do.
  - type: note
    content: The last two lines of this verse are only found in one reliable Hebrew manuscript and in the Septuagint. It could also be translated “All your works are very holy.”
  '14':
  - type: text
    content: Weak and feeble ones you will sustain.
  - type: text
    content: Those bent over with burdens of shame you will lift up.
  '15':
  - type: text
    content: You have captured our attention
  - type: text
    content: and the eyes of all look to you.
  - type: text
    content: You give what they hunger for at just the right time.
  '16':
  - type: text
    content: When you open your generous hand, it’s full of blessings,
  - type: text
    content: satisfying the longings of every living thing.
  '17':
  - type: text
    content: You are fair and righteous in everything you do,
  - type: text
    content: and your love is wrapped into all your works.
  '18':
  - type: text
    content: You draw near to those who call out to you,
  - type: text
    content: listening closely, especially when their hearts are true.
  '19':
  - type: text
    content: Every godly one receives
  - type: text
    content: even more than what they ask for.
  - type: text
    content: For you hear what their hearts really long for,
  - type: text
    content: and you bring them your saving strength.
  '2':
  - type: text
    content: Every day I will lift up my praise to your name
  - type: text
    content: with praises that will last throughout eternity.
  '20':
  - type: text
    content: God, you watch carefully over all your devoted lovers like a bodyguard,
  - type: text
    content: but you will destroy the ungodly.
  '21':
  - type: text
    content: I will praise you, Lord!
  - type: text
    content: Let everyone everywhere join me in praising
  - type: text
    content: the beautiful Lord of holiness from now through eternity!
  '3':
  - type: text
    content: Lord, you are great and worthy of the highest praise!
  - type: text
    content: For there is no end to the discovery
  - type: text
    content: of the greatness that surrounds you.
  '4':
  - type: text
    content: Generation after generation will declare more of your greatness
  - type: text
    content: and declare more of your glory.
  '5':
  - type: text
    content: Your magnificent splendor and the miracles of your majesty
  - type: text
    content: are my constant meditation.
  '6':
  - type: text
    content: Your awe-inspiring acts of power have everyone talking!
  - type: text
    content: I’m telling people everywhere about your excellent greatness!
  '7':
  - type: text
    content: Our hearts bubble over as we celebrate the fame
  - type: text
    content: 'of your marvelous beauty, '
  - type: text
    content: bringing bliss to our hearts
  - type: text
    content: .
  - type: text
    content: We shout with ecstatic joy over your breakthrough for us.
  '8':
  - type: text
    content: You’re kind and tenderhearted to those who don’t deserve it
  - type: text
    content: and very patient with people who fail you.
  - type: text
    content: Your love is like a flooding river overflowing its banks with kindness.
  '9':
  - type: text
    content: God, everyone sees your goodness,
  - type: text
    content: for your tender love is blended into everything you do.
