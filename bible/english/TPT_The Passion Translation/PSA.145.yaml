document_id: PSA.145,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God’s Greatness
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: King David’s poetic song of praise
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: My heart explodes with praise to you!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now and forever my heart bows in worship to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my King and my God!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Everything you have made will praise you, fulfilling its purpose.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all your godly ones will be found bowing before you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They will tell the world of the lavish splendor of your kingdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and preach about your limitless power.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They will demonstrate for all to see your miracles of might
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and reveal the glorious majesty of your kingdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You are the Lord who reigns over your never-ending kingdom through all the ages of time and eternity!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are faithful to fulfill every promise you’ve made.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You manifest yourself as kindness in all you do.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 145:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The last two lines of this verse are only found in one reliable Hebrew manuscript and in the Septuagint. It could also be translated “All your works are very holy.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Weak and feeble ones you will sustain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those bent over with burdens of shame you will lift up.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You have captured our attention
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the eyes of all look to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You give what they hunger for at just the right time.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When you open your generous hand, it’s full of blessings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: satisfying the longings of every living thing.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: You are fair and righteous in everything you do,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your love is wrapped into all your works.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: You draw near to those who call out to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: listening closely, especially when their hearts are true.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Every godly one receives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even more than what they ask for.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you hear what their hearts really long for,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you bring them your saving strength.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Every day I will lift up my praise to your name
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with praises that will last throughout eternity.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: God, you watch carefully over all your devoted lovers like a bodyguard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will destroy the ungodly.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I will praise you, Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let everyone everywhere join me in praising
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the beautiful Lord of holiness from now through eternity!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Lord, you are great and worthy of the highest praise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For there is no end to the discovery
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of the greatness that surrounds you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Generation after generation will declare more of your greatness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and declare more of your glory.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Your magnificent splendor and the miracles of your majesty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are my constant meditation.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Your awe-inspiring acts of power have everyone talking!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m telling people everywhere about your excellent greatness!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Our hearts bubble over as we celebrate the fame
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'of your marvelous beauty, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: bringing bliss to our hearts
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We shout with ecstatic joy over your breakthrough for us.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You’re kind and tenderhearted to those who don’t deserve it
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and very patient with people who fail you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your love is like a flooding river overflowing its banks with kindness.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: God, everyone sees your goodness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your tender love is blended into everything you do.
