      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The “splendor of Israel” is likely a reference to the favor, glory, beauty, and prestige of Jerusalem and the temple. One distinguished Jewish scholar of the Middle Ages, Ibn Ezra, translated this: “'
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: raised Zion up to the clouds and now has cast her down.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Commentary on the Five Megillos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
