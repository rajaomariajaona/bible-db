verses:
  '1':
  - type: heading
    content: The Lord Became like an Enemy
  - type: text
    content: The Lord was so angry that he
  - type: text
    content: shrouded the daughter of Zion with shame.
  - type: text
    content: He hurled down to the ground
  - type: text
    content: the splendor of Israel.
  - type: note
    content: 'The “splendor of Israel” is likely a reference to the favor, glory, beauty, and prestige of Jerusalem and the temple. One distinguished Jewish scholar of the Middle Ages, Ibn Ezra, translated this: “Yahweh raised Zion up to the clouds and now has cast her down.” See Commentary on the Five Megillos.'
  - type: text
    content: He disregarded his footstool
  - type: note
    content: Yahweh’s “footstool” is likely a reference to the temple, where the ark was kept (see 1 Chron. 28:2; Ezek. 43:7). The Hebrew word for “footstool” has a homonym that means “the blood.”
  - type: text
    content: on the day of his anger.
  '10':
  - type: text
    content: The elders of beloved Zion
  - type: text
    content: sit mute on the ground.
  - type: text
    content: They have thrown dust on their heads
  - type: text
    content: and put on sackcloth.
  - type: text
    content: The young virgins of Jerusalem
  - type: text
    content: 'bow their heads '
  - type: text
    content: in sorrow
  - type: text
    content: ' to the ground.'
  '11':
  - type: text
    content: My eyes have no tears left,
  - type: text
    content: and my stomach is tied in knots.
  - type: note
    content: Or “my gut is boiling [churning].”
  - type: text
    content: 'My heart '
  - type: note
    content: Or “My liver.”
  - type: text
    content: is spilled out into the dirt
  - type: text
    content: over the destruction of the daughter of my people.
  - type: text
    content: Little toddlers and children collapse
  - type: text
    content: in the streets of the city.
  '12':
  - type: text
    content: They keep saying,
  - type: text
    content: “Mommy, I’m hungry,”
  - type: note
    content: Or “Where is grain and wine?” Both grain and wine are easy to store in a siege. But even these two things have run out.
  - type: text
    content: as they faint like wounded men
  - type: text
    content: in the city streets.
  - type: text
    content: 'Their souls trickle away, '
  - type: text
    content: and they breathe their last
  - type: text
    content: in the embrace of their mothers.
  '13':
  - type: text
    content: With what can I compare you?
  - type: text
    content: What can I say to you, beloved Jerusalem?
  - type: text
    content: To what can I liken you, in order to comfort you,
  - type: text
    content: fair Zion?
  - type: note
    content: Or “virgin daughter of Zion.”
  - type: text
    content: For your wound is as deep as the sea.
  - type: text
    content: Who can heal you?
  - type: note
    content: 'The Midrash, an ancient commentary on the Scriptures, points out the mention of the “sea” as a reference to the Red Sea: “He to whom you uttered a song at the Red Sea will heal you.” As Yahweh miraculously led his people across the vastness of the Red Sea, so he is also able to heal his people.'
  '14':
  - type: text
    content: The visions your prophets saw for you
  - type: text
    content: were false and deceptive whitewash.
  - type: note
    content: Or “The visions your prophets saw for you are now shattered and mere whitewashing on walls.” See Ezek. 13:10; 22:28; Matt. 23:27; Acts 23:3 and footnote.
  - type: text
    content: They neither exposed your guilt
  - type: text
    content: nor brought you back in repentance.
  - type: note
    content: Or “They did not expose your guilt in order to avoid captivity [restore your fortunes].” The translation “brought you back in repentance” is taken from the Targum and follows other ancient Jewish translations.
  - type: text
    content: The false visions they told you
  - type: text
    content: were nothing but delusions.
  '15':
  - type: text
    content: All who pass your way
  - type: text
    content: applaud in mockery.
  - type: text
    content: They wag their heads with contempt,
  - type: text
    content: saying over beloved Jerusalem,
  - type: text
    content: “Is this really the city called The Perfection of Beauty,
  - type: note
    content: This name for the city is taken from Ps. 50:2.
  - type: text
    content: The Joy of All the Earth?”
  - type: note
    content: This name for the city is taken from Ps. 48:2.
  '16':
  - type: text
    content: Your enemies are a choir
  - type: text
    content: of scoffers and scolders.
  - type: text
    content: They hatefully sneer and glare at you.
  - type: note
    content: Or “All your enemies rail against you; they hiss, they gnash their teeth.”
  - type: text
    content: They gleefully exclaim, “We have destroyed her.
  - type: text
    content: This is the day we’ve been waiting for,
  - type: text
    content: and now we have lived to see it!”
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ' has done everything he planned'
  - type: text
    content: and has carried out his word.
  - type: note
    content: Yahweh had warned his people countless times of the consequences of their unfaithfulness (see Deut. 28:49–68; 1 Kings 9:6–9). His anger toward his people was not wanton rage but his release of justice. Every promise of God can be trusted, even his promise to punish evildoers.
  - type: text
    content: As he ordained long ago,
  - type: text
    content: he has destroyed without pity.
  - type: text
    content: 'He increased the power '
  - type: note
    content: Or “horn.”
  - type: text
    content: of your foes
  - type: text
    content: and caused your enemies to rejoice over you.
  '18':
  - type: text
    content: Beloved Zion, let your walls wail
  - type: text
    content: 'and your heart cry out to '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: 'Let a waterfall of tears '
  - type: note
    content: The Hebrew is singular, “tear.” The implication is that each tear should be like a river.
  - type: text
