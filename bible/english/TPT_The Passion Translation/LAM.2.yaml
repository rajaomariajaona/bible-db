  '3':
  - type: text
    content: In his burning anger,
  - type: note
    content: Yahweh’s anger was a release of justice, not an impulsive response.
  - type: text
    content: 'he shattered all the might '
  - type: note
    content: Or “horn,” a symbol of might and kingly authority.
  - type: text
