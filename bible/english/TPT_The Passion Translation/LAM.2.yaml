  '21':
  - type: text
    content: “Both children and the elderly alike
  - type: text
    content: are lying dead in the dusty streets.
  - type: text
    content: My young men and maidens
  - type: text
    content: have both fallen by the sword.
  - type: text
    content: You have killed them on the day of your anger;
  - type: text
