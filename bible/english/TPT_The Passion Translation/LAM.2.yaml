      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Midrash, an ancient commentary on the Scriptures, points out the mention of the “sea” as a reference to the Red Sea: “He to whom you uttered a song at the Red Sea will heal you.” As'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: miraculously led his people across the vastness of the Red Sea, so he is also able to heal his people.
      marker-yv: yv-n
