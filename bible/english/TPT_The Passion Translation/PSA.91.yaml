document_id: PSA.91,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Safe and Secure
  - type: text
    content: When you abide under the shadow of Shaddai,
  - type: note
    content: Shaddai (šadday) is taken from a Hebrew root word with many expressive meanings. It can mean “God of the Mountain,” “God the Destroyer of Enemies,” “God the Self-Sufficient One,” “God the Nurturer of Babies,” or “God the Almighty.” Moses the lawgiver is the author of this psalm, yet every verse seems to breathe the unlimited grace and mercy of God.
  - type: text
    content: 'you are hidden '
  - type: note
    content: Or “[I] endure through the night.” See Job 39:28, where the same Hebrew word is used for an eagle passing the night on the high cliffs.
  - type: text
    content: in the strength of God Most High.
  '11':
  - type: text
    content: God sends angels with special orders to protect you wherever you go,
  - type: text
    content: defending you from all harm.
  '12':
  - type: text
    content: If you walk into a trap, they’ll be there for you
  - type: text
    content: and keep you from stumbling.
  '13':
  - type: text
    content: You’ll even walk unharmed among the fiercest powers of darkness,
  - type: note
    content: The Hebrew includes the words for “lions,” “snakes,” and “dragons” as the three great symbols of satanic power.
  - type: text
    content: trampling every one of them beneath your feet!
  '14':
  - type: text
    content: 'For here is what the Lord has spoken to me:'
  - type: text
    content: “Because you loved me, delighted in me, and have been loyal to my name,
  - type: text
    content: I will greatly protect you.
  '15':
  - type: text
    content: I will answer your cry for help every time you pray,
  - type: text
    content: and you will feel my presence
  - type: text
    content: in your time of trouble.
  - type: text
    content: I will deliver you and bring you honor.
  '16':
  - type: text
    content: I will satisfy you with a full life and with all that I do for you.
  - type: text
    content: For you will enjoy the fullness of my salvation!”
  '2':
  - type: text
    content: He’s the hope that holds me and the stronghold to shelter me,
  - type: text
    content: the only God for me, and my great confidence.
  '3':
  - type: text
    content: He will rescue you from every hidden trap of the enemy,
  - type: note
    content: Or “hunter.”
  - type: text
    content: and he will protect you from false accusation
  - type: text
    content: and any deadly curse.
  - type: note
    content: As translated from the most ancient Hebrew manuscripts and the Septuagint. The Hebrew word can mean “poisoned arrows.”
  '4':
  - type: text
    content: 'His massive arms '
  - type: note
    content: Or “wings.” Also found in the next sentence, “under his wings,” which speaks not of God having wings, but of the wings of the cherubim resting on the mercy seat. The implication is that we can always come to the mercy seat and rest without fear.
  - type: text
    content: are wrapped around you, protecting you.
  - type: text
    content: You can run under his covering of majesty and hide.
  - type: text
    content: His arms of faithfulness are a shield keeping you from harm.
  '5':
  - type: text
    content: You will never worry about an attack of demonic forces at night
  - type: text
    content: nor have to fear a spirit of darkness coming against you.
  '6':
  - type: text
    content: Don’t fear a thing!
  - type: text
    content: Whether by night or by day, demonic danger will not trouble you,
  - type: note
    content: Verses 5–6 are seen by many Jewish scholars as a reference not merely to pestilence and natural dangers but to the realm of spiritual darkness that would come against God’s servants. These spirits are equated to “arrows that fly in daytime” or “a pestilence that walks” in the darkness. God’s sheltered ones are kept from the harm that could come from natural sources or supernatural sources. What a wonderful place to hide and be secure!
  - type: text
    content: nor will the powers of evil be launched against you.
  '7':
  - type: text
    content: Even in a time of disaster, with thousands and thousands being killed,
  - type: text
    content: you will remain unscathed and unharmed.
  '8':
  - type: text
    content: You will be a spectator as the wicked perish in judgment,
  - type: text
    content: for they will be paid back for what they have done!
  '9':
  - type: text
    content: When we live our lives within the shadow of God Most High,
  - type: text
    content: our secret hiding place, we will always be shielded from harm.
  - type: text
    content: How then could evil prevail against us or disease infect us?
