document_id: PSA.91,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Safe and Secure
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When you abide under the shadow of Shaddai,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Shaddai (
      - type: usfm
        marker: it
        children:
        - type: text
          text: šadday
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is taken from a Hebrew root word with many expressive meanings. It can mean “God of the Mountain,” “God the Destroyer of Enemies,” “God the Self-Sufficient One,” “God the Nurturer of Babies,” or “God the Almighty.” Moses the lawgiver is the author of this psalm, yet every verse seems to breathe the unlimited grace and mercy of God.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'you are hidden '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[I] endure through the night.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 39:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', where the same Hebrew word is used for an eagle passing the night on the high cliffs.'
      marker-yv: yv-n
    - type: text
      text: in the strength of God Most High.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: God sends angels with special orders to protect you wherever you go,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: defending you from all harm.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: If you walk into a trap, they’ll be there for you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and keep you from stumbling.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You’ll even walk unharmed among the fiercest powers of darkness,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew includes the words for “lions,” “snakes,” and “dragons” as the three great symbols of satanic power.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: trampling every one of them beneath your feet!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For here is what the Lord has spoken to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because you loved me, delighted in me, and have been loyal to my name,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will greatly protect you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will answer your cry for help every time you pray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you will feel my presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in your time of trouble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will deliver you and bring you honor.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I will satisfy you with a full life and with all that I do for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you will enjoy the fullness of my salvation!”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: He’s the hope that holds me and the stronghold to shelter me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the only God for me, and my great confidence.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He will rescue you from every hidden trap of the enemy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hunter.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he will protect you from false accusation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and any deadly curse.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the most ancient Hebrew manuscripts and the Septuagint. The Hebrew word can mean “poisoned arrows.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'His massive arms '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wings.” Also found in the next sentence, “under his wings,” which speaks not of God having wings, but of the wings of the cherubim resting on the mercy seat. The implication is that we can always come to the mercy seat and rest without fear.
      marker-yv: yv-n
    - type: text
      text: are wrapped around you, protecting you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can run under his covering of majesty and hide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His arms of faithfulness are a shield keeping you from harm.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You will never worry about an attack of demonic forces at night
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor have to fear a spirit of darkness coming against you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Don’t fear a thing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whether by night or by day, demonic danger will not trouble you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 91:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5–6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are seen by many Jewish scholars as a reference not merely to pestilence and natural dangers but to the realm of spiritual darkness that would come against God’s servants. These spirits are equated to “arrows that fly in daytime” or “a pestilence that walks” in the darkness. God’s sheltered ones are kept from the harm that could come from natural sources or supernatural sources. What a wonderful place to hide and be secure!
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor will the powers of evil be launched against you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Even in a time of disaster, with thousands and thousands being killed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will remain unscathed and unharmed.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You will be a spectator as the wicked perish in judgment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they will be paid back for what they have done!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: When we live our lives within the shadow of God Most High,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: our secret hiding place, we will always be shielded from harm.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How then could evil prevail against us or disease infect us?
