document_id: PSA.84,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Longing for God
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prophetic song written by the prophetic singers of Korah’s clan
  - type: usfm
    marker: d
    children:
    - type: text
      text: Set to the melody of “For the Feast of Harvest”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '84'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “For the wine vats.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: God of Heaven’s Armies, you find so much beauty in your people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They’re like lovely '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 84:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “lovely” used here can also mean “beloved.” This translation includes both of these concepts in this verse.
      marker-yv: yv-n
    - type: text
      text: sanctuaries of your presence.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For just one day of intimacy with you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 84:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in your [temple] courts.”
      marker-yv: yv-n
    - type: text
      text: is like
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a thousand days of joy rolled into one!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’d rather stand at the threshold in front of the Gate Beautiful,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ready to go in and worship my God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to live my life without you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the most beautiful palace of the wicked.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: For the Lord God is brighter than the brilliance of a sunrise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wrapping himself around me like a shield,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he is so generous with his gifts of grace and glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who walk along his paths with integrity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will never lack one thing they need, for he provides it all!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: O Lord of Heaven’s Armies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what euphoria fills those who forever trust in you!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Deep within me are these lovesick longings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: desires and daydreams of living in union with you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I’m near you, my heart and my soul
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will sing and worship with my joyful songs of you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my true source and spring of life!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: O Lord of Heaven’s Armies, my King and my God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even the sparrows and swallows are welcome to build a nest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: among your altars to raise their young.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: What pleasure fills those who live every day in your temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enjoying you as they worship in your presence!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: How enriched are they who find their strength in the Lord;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 84:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic reads “How blessed is the Son of Man with you as his helper.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: within their hearts are the highways of holiness!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 84:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is literally “Roads are in their hearts.” It implies the ways [roads or “highways”] that lead us to God’s holy presence.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Even when their paths wind through the dark valley of tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they dig deep to find a pleasant pool '
    - type: usfm
      marker: it
      children:
      - type: text
        text: where others find only pain
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gives to them a brook of blessing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filled from the rain of an outpouring.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: They grow stronger and stronger with every step forward,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the God of all gods will appear before them in Zion.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Hear my cry, O God of Heaven’s Armies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God of Jacob, listen to my loving prayer.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: God, your wraparound presence is our defense.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In your kindness look upon the faces of your anointed ones.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 84:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the face of your Anointed [Christ].”
      marker-yv: yv-n
