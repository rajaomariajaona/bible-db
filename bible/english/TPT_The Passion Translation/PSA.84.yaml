document_id: PSA.84,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Longing for God
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: A prophetic song written by the prophetic singers of Korah’s clan
  - type: text
    content: Set to the melody of “For the Feast of Harvest”
  - type: note
    content: The Septuagint reads “For the wine vats.”
  - type: text
    content: God of Heaven’s Armies, you find so much beauty in your people!
  - type: text
    content: 'They’re like lovely '
  - type: note
    content: The Hebrew word for “lovely” used here can also mean “beloved.” This translation includes both of these concepts in this verse.
  - type: text
    content: sanctuaries of your presence.
  '10':
  - type: text
    content: 'For just one day of intimacy with you '
  - type: note
    content: Or “in your [temple] courts.”
  - type: text
    content: is like
  - type: text
    content: a thousand days of joy rolled into one!
  - type: text
    content: I’d rather stand at the threshold in front of the Gate Beautiful,
  - type: text
    content: ready to go in and worship my God,
  - type: text
    content: than to live my life without you
  - type: text
    content: in the most beautiful palace of the wicked.
  '11':
  - type: text
    content: For the Lord God is brighter than the brilliance of a sunrise!
  - type: text
    content: Wrapping himself around me like a shield,
  - type: text
    content: he is so generous with his gifts of grace and glory.
  - type: text
    content: Those who walk along his paths with integrity
  - type: text
    content: will never lack one thing they need, for he provides it all!
  '12':
  - type: text
    content: O Lord of Heaven’s Armies,
  - type: text
    content: what euphoria fills those who forever trust in you!
  '2':
  - type: text
    content: Deep within me are these lovesick longings,
  - type: text
    content: desires and daydreams of living in union with you.
  - type: text
    content: When I’m near you, my heart and my soul
  - type: text
    content: will sing and worship with my joyful songs of you,
  - type: text
    content: my true source and spring of life!
  '3':
  - type: text
    content: O Lord of Heaven’s Armies, my King and my God,
  - type: text
    content: even the sparrows and swallows are welcome to build a nest
  - type: text
    content: among your altars to raise their young.
  '4':
  - type: text
    content: What pleasure fills those who live every day in your temple,
  - type: text
    content: enjoying you as they worship in your presence!
  - type: text
    content: Pause in his presence
  '5':
  - type: text
    content: How enriched are they who find their strength in the Lord;
  - type: note
    content: The Aramaic reads “How blessed is the Son of Man with you as his helper.”
  - type: text
    content: within their hearts are the highways of holiness!
  - type: note
    content: The Hebrew is literally “Roads are in their hearts.” It implies the ways [roads or “highways”] that lead us to God’s holy presence.
  '6':
  - type: text
    content: Even when their paths wind through the dark valley of tears,
  - type: text
    content: 'they dig deep to find a pleasant pool '
  - type: text
    content: where others find only pain
  - type: text
    content: .
  - type: text
    content: He gives to them a brook of blessing
  - type: text
    content: filled from the rain of an outpouring.
  '7':
  - type: text
    content: They grow stronger and stronger with every step forward,
  - type: text
    content: and the God of all gods will appear before them in Zion.
  '8':
  - type: text
    content: Hear my cry, O God of Heaven’s Armies!
  - type: text
    content: God of Jacob, listen to my loving prayer.
  - type: text
    content: Pause in his presence
  '9':
  - type: text
    content: God, your wraparound presence is our defense.
  - type: text
    content: In your kindness look upon the faces of your anointed ones.
  - type: note
    content: Or “the face of your Anointed [Christ].”
