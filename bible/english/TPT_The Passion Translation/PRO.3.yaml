document_id: PRO.3,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Rewards of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: My child, if you truly want a long and satisfying life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: never forget the things that I’ve taught you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Follow closely every truth that I’ve given you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will have a full, rewarding life.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then every dimension of your life will overflow with blessings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from an uncontainable source of inner joy!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom’s Correction
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My child, when the Lord God speaks to you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: never take his words lightly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and never be upset when he corrects you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For the Father’s discipline comes only
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from his passionate love and pleasure for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when it seems like his correction is harsh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it’s still better than any father on earth gives to his child.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Blessings pour over the ones who find wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they have obtained living-understanding.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text here implies that wisdom gives the ability to take raw facts and draw right conclusions and meaning from them.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: As wisdom increases, a great treasure is imparted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: greater than many bars of refined gold.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: It is a more valuable commodity than gold and gemstones,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated here as “gemstones” can also refer to rubies, coral, or pearls.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for there is nothing you desire that could compare to her.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Wisdom extends to you long life in one hand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and wealth and promotion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “honor.”
      marker-yv: yv-n
    - type: text
      text: in the other.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of her mouth flows righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her words release both law and mercy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint adds this last sentence, which is not found in the Hebrew.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The ways of wisdom are sweet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: always drawing you into the place of wholeness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated here as “wholeness” can also mean “peace” or “prosperity.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Seeking for her brings the discovery of untold blessings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for she is the healing tree of life to those who taste her fruits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: are recited in contemporary Torah services as the Torah scroll is returned to the ark, where it is kept.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom’s Blueprints
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The Lord laid the earth’s foundations with wisdom’s blueprints.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By his living-understanding all the universe came into being.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When compared with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 1:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', we can see that Wisdom is used as a title in Proverbs for the Living Wisdom, Jesus Christ. See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 1:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: By his divine revelation he broke open
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the hidden fountains of the deep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bringing secret springs to the surface
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as the mist of the night dripped down from heaven.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The dew is a metaphor for the Holy Spirit, who comes from the heavens and drenches us with God’s presence. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 27:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 32:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 6:37–40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 133:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom, Our Hiding Place
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'My child, never drift off course from these two goals for your life:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to walk in wisdom and to discover your purpose.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Like many Hebrew words, there are various possible translations. The word translated here as “purpose” can also mean “discretion,” “counsel,” “meditation,” or “discernment.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t ever forget how they empower you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For they strengthen you inside and out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and inspire you to do what’s right;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “adorn your neck.” The neck is a picture of our will and conscience.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be energized and refreshed by the healing they bring.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: They give you living hope to guide you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and not one of life’s tests will cause you to stumble.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: You will sleep like a baby, safe and sound—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your rest will be sweet and secure.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: You will not be subject to terror, for it will not terrify you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nor will the disrespectful be able to push you aside,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: because God is your confidence in times of crisis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: keeping your heart at rest in every situation.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “keeping your foot from being caught.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom in Relationships
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Why would you withhold payment on your debt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “Why would you withhold from the poor [those who need it]?”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you have the ability to pay? Just do it!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text here literally means “Do not withhold wealth from its owners.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: When your friend comes to ask you for a favor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: why would you say, “Perhaps tomorrow,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you have the money right there in your pocket?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help him today!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Why would you hold a grudge '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “plot evil.”
      marker-yv: yv-n
    - type: text
      text: in your heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toward your neighbor who lives right next door?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Hold on to loyal love and don’t let go,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and be faithful to all that you’ve been taught.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your life be shaped by integrity,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Tie my commands around your neck.” The neck is a symbol of our will and conscience.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with truth written upon your heart.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: And why would you quarrel with those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who have done nothing wrong to you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is that a chip on your shoulder?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 12:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Don’t act like those bullies or learn their ways.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Every violent thug is despised by the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but every tender lover finds friendship with God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will hear his intimate secrets.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 3:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 25:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: The wicked walk under God’s constant curse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the righteous walk under a stream of his blessing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they seek to do what is right.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: If you walk with the mockers you will learn to mock,
