  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meanwhile, Peter was sitting below in the courtyard when a girl, a servant of the high priest, came near the fire. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When she saw Peter there warming himself, she said to him, “I recognize you. You were with that Nazarene, Jesus.”
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Peter denied it, saying, “I don’t have a clue what you’re talking about.” Then he went out to the gateway of the courtyard and the rooster crowed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:68
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts leave out the last phrase, “and the rooster crowed.”
      marker-yv: yv-n
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the servant girl noticed him, she said to all the bystanders, “I know this man is one of his followers!”
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will always have the poor, whom you can help whenever you want, but you will not always have me.
    - type: text
      text: ' '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Once again, Peter denied it. A short time later, the bystanders said to him, “You must be one of them. You’re a Galilean, like he is, for your accent proves it!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:70
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You are also a Galilean.” As a Galilean, Peter spoke a northern dialect of Aramaic that would pronounce certain words slightly differently, much like English is spoken with different accents around the world.
      marker-yv: yv-n
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter cursed and said, “I tell you, I don’t know this man you’re talking about!”
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the same moment Peter spoke those words, the sound of a rooster crowing pierced the night for the second time. And Peter remembered the words Jesus had spoken to him earlier: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Before the rooster crows twice, you will deny me three times.”
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: With his heart shattered
    - type: text
      text: ', Peter broke down and sobbed with bitter tears.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: When she poured the fragrant oil over me, she was preparing my body in advance of my burial.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is possible that when the Roman soldiers pierced Jesus’ feet and placed the crown of thorns on his head, they could have smelled this fragrant oil.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: She has done all that she could to honor me.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I promise you that as this wonderful gospel spreads all over the world, the story of her lavish devotion to me will be mentioned in memory of her.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus’ prophecy is that her sacrifice and love would be included in the Gospel account. Her act of devotion is mentioned in three of the four Gospels. You can’t read the New Testament without knowing of her passionate act of worship. The gospel will always give birth to hearts filled with passion for Jesus.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judas Schemes to Betray Jesus
    marker-yv: yv-h
