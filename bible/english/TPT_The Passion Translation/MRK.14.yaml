verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Plot to Kill Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Two days before the Passover and the Feast of Unleavened Bread, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To commemorate the “passing over” of the death angel over the homes of the Hebrew people in Egypt, God instituted these days of celebration. It was an eight-day observance that began with the Passover and included the Feast of Unleavened Bread. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 12:15–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 34:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Some believe there could have been 250,000 pilgrims who flocked to Jerusalem to observe the celebrations. Jesus, our Passover Lamb, was killed on the day of Passover.
      marker-yv: yv-n
    - type: text
      text: 'the leading priests and religious scholars were committed to finding a way to secretly arrest Jesus and have him executed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the twelve apostles, Judas Iscariot, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Judas the locksmith.” Judas is the name Judah. Iscariot was not his last name. There are two possibilities for the meaning of Iscariot. Some believe it is taken from a Hebrew word that means “lock.” Judah the locksmith. He most likely was the one who locked the collection bag, which means he had the key and could pilfer the fund at will. It’s his sad history that he wanted to lock up Jesus and control him for his own ends. Other scholars see the possibility that Iscariot is actually “Ish [man] of Kerioth” (a town once situated south of Hebron). This would mean Judas was the only non-Galilean among the Twelve.
      marker-yv: yv-n
    - type: text
      text: 'went to the leading priests to inform them of his willingness to betray Jesus into their hands. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were delighted to hear this and agreed to pay him for it. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was thirty pieces of silver, the going price of a slave. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 21:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 26:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: So immediately Judas began to look for the right opportunity to betray him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Passover
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the first day of Unleavened Bread, when the Passover Lamb is sacrificed, Jesus’ disciples asked him, “Where would you like us to prepare the Passover meal '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, “the Passover seder.”
      marker-yv: yv-n
    - type: text
      text: for you?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he sent two of his disciples ahead into Jerusalem with these instructions: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Make your way into the city and watch for a man carrying a pitcher of water. Follow him,
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'and say to the owner of whatever house he enters, ‘The Teacher wants to ask you: “Do you have my room ready where I can eat the Passover meal with my disciples?” ’'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he will show you a large upstairs room ready and with a table set. Make preparations for us there.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went into the city and found everything to be exactly like Jesus had prophesied, and they prepared for him the Passover meal. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This miracle account shows that Jesus had revelation knowledge and prophetic insight into the future. The disciples encountered the man, just like Jesus had said. Carrying water was a task given to women, making it easy to spot a man carrying a water jug. Also, it was somewhat of a miracle that during the feast days, with a quarter of a million pilgrims celebrating Passover in Jerusalem, there would be a large room like this unoccupied. This was the last Passover feast in God’s economy, as the shadow of Passover was fulfilled at the cross, where Jesus was crucified. Passover is now replaced for believers by the communion we share at the Lord’s Supper. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 5:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when evening came, he entered the house and went upstairs with his twelve disciples. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Over dinner, while they were reclining around the table, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Listen to the truth: One of you eating here with me is about to betray me.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Feeling deeply troubled by these words, one after another asked him, “Is it I?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They agreed that their plot could not succeed if they carried it out during the days of the feast, for they said, “There could be a riot among the people.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Anointed for His Death and Burial
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “It is one of you twelve who has shared meals with me as an intimate friend.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “one who dips with me in the bowl.” This is a figure of speech for an intimate friend.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All that was prophesied of me, the Son of Man, is destined to soon take place,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The Son of Man will go where it is written that he must go.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but it will be disastrous for the one who betrays the Son of Man. It would be far better for him if he had never been born!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Shares Communion with His Twelve
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they were dining, Jesus took the bread and blessed it, and broke it, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Although the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: klao
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means to “break bread,” it is better understood as tearing a round loaf of flatbread in half. The symbolism of this communion meal was fulfilled by Jesus giving us his body on the cross. Believers today now feast, not on the crucified body of Jesus, but on the substance of the glorified body of the resurrected Christ.
      marker-yv: yv-n
    - type: text
      text: 'and gave it to his disciples. He said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Receive this; it is my body.”
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then taking the cup of wine and giving thanks to the Father, he declared the new covenant with them. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
    - type: text
      text: 'And as each one drank from the cup, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This is my blood, which seals the new
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A few Greek manuscripts do not have the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: new
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is included in the Aramaic and the majority of Greek texts. This new covenant is a better covenant because it is established on better promises. In this new covenant, God freely gives us forgiveness, life, salvation, and every heavenly spiritual blessing. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 8:6–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:16–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus serves his disciples the bread and the cup (the blood or wine), which means he is serving us his death and resurrection. This is now our feast and our constant supply of life (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 6:51
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: covenant poured out for many.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you the truth, I will not drink again of the fruit of the vine until the day comes when we drink it together in the kingdom
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: feast
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: of my Father.”
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We are now in the realm of the kingdom of God. The Holy Spirit brings us into the body of Christ and into the reality of God’s kingdom realm. It is growing and increasing in scope, and every time believers drink of the cup of communion, Jesus is present with us. It is the Lord’s Table, not ours. This was a prophecy of what would happen in just a matter of days from then, as believers would break bread together in remembrance of what Jesus had done for them. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2:42
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Jesus now drinks it with us in a new way, and not just once a year at Passover, but every time we worship him by taking communion.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they sang a psalm '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a hymn.” The Aramaic is “They offered praise.” It was the custom after celebrating the Passover seder to conclude with singing one of the Hallel psalms (
      - type: text
        text: Pss. 115–118
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: and afterwards left for the Mount of Olives.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prophesies Peter’s Denial
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You will all fall away and desert me.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You will all fall into a trap and be ensnared.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'This will fulfill the prophecy of the Scripture that says:'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will strike down the shepherd
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and all the sheep will scatter.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zech. 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But after I am risen,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus knew he would triumph over death and be raised from the dead.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will go ahead of you to Galilee.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Peter spoke up and said, “Even if all the rest lose their faith and fall away, I will still be beside you!”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jesus was in Bethany, in the home of Simon, a man Jesus had healed of leprosy. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: We are all cleansed lepers, symbolized by Simon. Christ left the religious structure of the temple and went into the house of a leper. Former “lepers” are now the true temple of God.
      marker-yv: yv-n
    - type: text
      text: 'And as he was reclining at the table, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the time of Jesus, meals were not eaten sitting at a table, but rather while reclining on one’s side before a low table. There are two suppers mentioned in this chapter. At one, Jesus was a guest; at the other, he was the host.
      marker-yv: yv-n
    - type: text
      text: 'a woman came into the house, with an alabaster flask '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: An alabaster flask would itself be considered a luxury item in that day. Alabaster was a type of gypsum, very white and possibly translucent. It was found in caves and in limestone deposits.
      marker-yv: yv-n
    - type: text
      text: 'filled with the highest quality of fragrant and expensive oil. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was spikenard (or nard), a spice taken from a plant that grows in northern India near the Himalayas. This costly perfume would have been carried over land to the Middle East. Many believe this jar of spikenard would have cost the average worker a year’s wages. It was a common practice among the Jews to prepare a body for burial with fragrant ointment. John records that it was about twelve ounces of perfume, which would have dripped down all of Jesus’ garments to his feet (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: She came to Jesus, and with a gesture of extreme devotion
    - type: text
      text: ', she broke the flask and poured out the precious oil over his head. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Mark my words, Peter. This very night, before the rooster crows twice a few hours from now, you will deny that you know me three times.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Peter was insistent and replied emphatically, “I will absolutely not! Under no circumstances will I ever deny you—even if I have to die with you!” And all the others repeated the same thing.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prays in Gethsemane
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus led his disciples to an orchard called “The Oil Press.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:32
