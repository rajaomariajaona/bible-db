document_id: ACT.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Trial before Felix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Five days later, Ananias the high priest arrived in Caesarea, accompanied by some Jewish elders and Tertullus, their prosecuting attorney. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “an orator” or “a public speaker.” He was a professional advocate representing the high priest and Jewish elders. Tertullus means “triple-hardened.”
    marker-yv: yv-n
  - type: text
    text: 'They were brought before the governor to present formal charges against Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After Paul was summoned, Tertullus accused him, saying, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“Your Excellency Felix, under the shadow of your wise leadership '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic, “under your shade” (or “shadow”) or “tent.”
    marker-yv: yv-n
  - type: text
    text: we Jews have experienced a long period of peace. Because of your wise foresight, many reforms are coming to pass in our nation because of you, Most Honorable Felix. We deeply appreciate this and thank you very much.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“So that I won’t weary you with a lengthy presentation, I beg you to hear our brief summary, with your customary graciousness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For we have found this man to be a contagious plague, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated literally from the Greek. The Aramaic is “He is an assassin.”
    marker-yv: yv-n
  - type: text
    text: 'a seditious man who continually stirs up riots among the Jews all over the world. He has become a ringleader of the sect known as the Nazarenes. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nazarene
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “the branch” or “Scion.” The Aramaic word implies the title of an heir of a powerful family, or one who is victorious (“Jesus, the Victorious”). Believers are now grafted-in branches of his family tree, victorious ones in Christ (Nazarenes). Many modern-day Arabic speakers still use the term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nazarenes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: when speaking of believers in Jesus.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He has even attempted to desecrate our temple, which is why we had him arrested. We sought to judge him according to our law, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'but Commander Lysias came with great force, snatched him away from our hands, and sent him here to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He has ordered his accusers to come to you so that you could interrogate him and ascertain for yourself that all these charges we are bringing against him are true.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Verse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: ACT.24.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and parts of vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6'
      metadata:
        usfm: ACT.24.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ACT.24.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: are missing in most reliable Greek manuscripts. They are a part of the Aramaic text and included here.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the Jews present joined in the verbal attack, saying, “Yes, it’s true!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Defense before Felix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: The governor motioned that it was Paul’s turn to speak, so he began to answer the accusations.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Because I know that you have been a judge over this nation for many years, I gladly respond in my defense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'You can easily verify that about twelve days ago, I went to Jerusalem to worship. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'No one found me arguing with anyone or causing trouble among the people in the synagogues or in the temple or anywhere in the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They are completely unable to prove these accusations they make against me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But I do confess this to you: I worship the God of our Jewish ancestors as a follower of the Way, which they call a sect. For I believe everything that is written in the Law and the Prophets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And my hope is in God, the same hope that even my accusers have embraced, the hope of a resurrection from the dead of both the righteous and the unrighteous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: That’s why I seek with all my heart to have a clean conscience toward God and toward others.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '“After being away from Jerusalem for several years, I returned to bring to my people gifts for the poor. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “For many years I brought to my people gifts for the poor.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I was in the temple, ritually purified and presenting my offering to God, when they seized me. I had no noisy crowd around me, and I wasn’t causing trouble or making any kind of disturbance whatsoever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'It was a group of Jews from western Turkey '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Asia” (Minor).
    marker-yv: yv-n
  - type: text
    text: 'who were being unruly; they are the ones who should be here now to bring their charges if they have anything against me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or at least these men standing before you should clearly state what crime they found me guilty of when I stood before the Jewish supreme council, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: unless it’s the one thing I passionately spoke out when I stood among them. I am on trial today only because of my belief in the resurrection of the dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Felix, who was well acquainted with the facts about the Way, concluded the hearing with these words: “I will decide your case after Commander Lysias arrives.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He then ordered the captain to keep Paul in protective custody, but to give him a measure of freedom, he allowed any of his friends to visit him and help take care of his needs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Speaks to Felix and Drusilla
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Several days later, Felix came back with his wife, Drusilla, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Drusilla was the youngest daughter of Herod Agrippa I and sister of Agrippa II. As a Jewess, she was likely the source of Felix’s understanding of the Way.
    marker-yv: yv-n
  - type: text
    text: 'who was Jewish. They sent for Paul and listened as he shared with them about faith in Jesus, the Anointed One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: As Paul spoke about true righteousness, self-control, and the coming judgment, Felix became terrified and said, “Leave me for now. I’ll send for you later when it’s more convenient.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 24:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “When my conscience is clear I will call for you.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He expected to receive a bribe from Paul for his release, so for that reason he would send for Paul from time to time to converse with him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Two years later, Felix was succeeded by Porcius Festus. Before he left office he decided to leave Paul in prison as a political favor to the Jews.
