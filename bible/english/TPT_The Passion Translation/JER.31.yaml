  '39':
  - type: text
    content: 'And the measuring line will stretch out farther to the Gareb Hill, turning then to Goah. '
  - type: note
    content: The locations of Gareb Hill and Goah are uncertain. Scholars generally agree, however, that Gareb Hill is likely at the southwestern corner of the city. A few scholars identify Gareb Hill with the hill above the Hinnom Valley (see Josh. 15:8; 18:16) or possibly the hill Josephus cites as “Bezetha” (The Wars of the Jews, 5.149). It is possible that the Hebrew word for “Gareb” (Hb. garab) could also be translated “leprosy,” thus “Leprosy Hill.”
