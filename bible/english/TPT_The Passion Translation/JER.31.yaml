  '31':
  - type: text
    content: Yahweh
  - type: text
    content: ' declares: “Look, the days are coming when I will enter into a brand-new covenant '
  - type: note
    content: Verses 31–34 are some of the most important verses in all the Old Testament. They speak of a future new covenant unlike the old one established at Sinai and based on people’s obedience to God’s laws. The new covenant imparts a new heart and empowers one to fulfill God’s desires. God gives a new, faithful heart to follow him. This is the new covenant that Jesus Christ initiated at the Last Supper with the cup (his blood) and the bread (his body). This new covenant has been ratified and confirmed and forever supersedes the covenant made at Sinai. The Sinai covenant required perfect obedience, but the new covenant extends perfect forgiveness and removes the guilt, stain, and power of sin. The first was written on stones, the second on tender hearts.
  - type: text
    content: 'with the people of Israel and Judah. '
