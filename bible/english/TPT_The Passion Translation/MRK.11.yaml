document_id: MRK.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus’ Triumphal Entry into Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Now, as they were approaching Jerusalem, they arrived at the place of the stables '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or Bethphage, which in Aramaic means “the house of stables.” Transliterated into Greek it means “the house of unripe figs.”
      marker-yv: yv-n
    - type: text
      text: 'near Bethany on the Mount of Olives. Jesus sent two of his disciples ahead '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Blessings rest on this kingdom he ushers in—the kingdom of our father David! Bring us the victory in the highest realms '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of heaven
    - type: text
      text: '!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “You who are in the highest place, save us now!”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Jesus rode through the gates of Jerusalem and up to the temple. After looking around at everything, he left for Bethany with the Twelve to spend the night, for it was already late in the day.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus and a Fruitless Fig Tree
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'The next day, as he left Bethany, Jesus was feeling hungry. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'He noticed a leafy fig tree in the distance, so he walked over to see if there was any fruit on it, but there was none—only leaves (for it wasn’t yet the season for bearing figs). '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The fig tree is first mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', with its leaves being a “covering” for fallen Adam and Eve to hide behind. It also became a hiding place for Zacchaeus, who climbed a sycamore-fig tree to see Jesus. The tree with leaves but no fruit can also be a symbol of Israel’s religious system of that day ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:1–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Jesus next drives out the money changers from the temple, who were rotten fruit. The firstfruits of the harvest Jesus was looking for came on the day of Pentecost, at the end of the Feast of Firstfruits. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jesus spoke '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Answering (the fig tree), he spoke to it.” The text does not say that Jesus cursed the tree, only that he “answered” and spoke to the tree. Peter’s interpretation of this was that Jesus cursed the tree (vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20–21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'to the fig tree, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “No one will ever eat fruit from you again!”
    - type: text
      text: ' And the disciples overheard him.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Drives Merchants Out of the Temple Courts
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'When they came into Jerusalem, Jesus went directly into the temple area and overturned all the tables and benches of the merchants who were doing business there. One by one he drove them all out of the temple courts, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Also known as the court of the gentiles, the only place where non-Jews were allowed in the temple complex.
      marker-yv: yv-n
    - type: text
      text: 'and they scattered away, including the money changers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic reads “the tables that had the firstborn ransom payments.”
      marker-yv: yv-n
    - type: text
      text: 'and those selling doves. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And he would not allow them to use the temple courts as a thoroughfare for carrying their merchandise and their furniture.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then he began to teach the people, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Does not the Scripture say, ‘My house will be a house of prayer for all the world to share’?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 56:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you have made it a hangout of thieves!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 7:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'When the chief priests and religious scholars heard this, they began to hatch a plot as to how they could eliminate Jesus. But they feared him and his influence, because the entire crowd was totally captivated by his teaching. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So he and his disciples spent the nights outside the city.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lessons of Faith
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “As soon as you enter the village ahead, you will find a donkey’s colt tied there that has never been ridden. Untie it and bring it to me.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In the morning, they passed by the fig tree that Jesus spoke to and it was completely withered from the roots up. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Peter remembered and said to him, “Teacher, look! That’s the fig tree you cursed. It’s now all shriveled up and dead.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let the faith of God be in you!
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. It is possible to translate the Greek text as an adjectival phrase, “God-like faith” or “godly faith.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Listen to the truth I speak to you: Whoever says to this mountain with great faith and does not doubt,'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word for
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: doubt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to be divided (undecided) in your heart.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ‘Mountain, be lifted up and thrown into the midst of the sea,’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The mountain and the sea can also be metaphors. Mountains in the Bible can refer to kingdoms, and the sea represents the nations (e.g., “sea of humanity”). Faith lifts up and brings with us the “mountain” of God’s kingdom realm when we go into the nations. The Greek word for mountain,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: oros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', is related to a verb that means “to lift up and carry off and take with you.” This truth Jesus brings us is more than hyperbole; it is the active power of faith to take and carry the power and authority of the mountain—God’s kingdom realm—with us wherever we go.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and believes that what he says will happen, it will be done.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: This is the reason I urge you to boldly believe for whatever you ask for in prayer—be convinced that you have received it and it will be yours.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And whenever you stand praying,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most ancient Jewish prayers require that a person stand to pray.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: if you find that you carry something in your heart against another person, release him and forgive him
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for forgiveness is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: apehiemi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and means “to send away,” “to take away,” “to release,” “to let flow” (away).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that your Father in heaven will also release you and forgive you of your faults.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But if you will not release forgiveness, don’t expect your Father in heaven to release you from your misdeeds.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This verse is omitted by the Greek texts of Nestle-Aland, Wescott & Hort, and most modern translations because it is not found in some of the most reliable and earliest manuscripts. It is found in the Aramaic. Although its inclusion is dubious, this translation includes it, for it does not interfere with the understanding of this pericope and a similar saying is found in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 6:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Religious Leaders Question Jesus’ Authority
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'They came again into Jerusalem, and while Jesus was walking in the temple courts, the Jewish rulers—the chief priest, certain religious scholars, and the elders—approached him. They came up to him '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: and asked, “What right do you have to say and do these things? Who gave you the authority to do all this?”
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I too have a question to ask you. If you can answer this question, then I will tell you by what power I do all these things.
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And if anyone asks, ‘Why are you taking it?’ tell them, ‘The master needs it and will send it back to you soon.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Only once in the Gospels do we see Jesus ever needing anything. In this case he needed a donkey. More than one commentator has seen a picture here of how the Lord “needs” every believer to be his representative in the world.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Where did John’s authority to immerse come from? Was it from heaven or from people? Answer me now.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'They stepped away and debated among themselves, saying, “How should we answer this? If we say, ‘from heaven,’ he will say to us, ‘Then why didn’t you respond to John and believe what he said?’ '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: But if we say, ‘from the people,’ we fear the crowds, for they’re convinced that John was God’s prophet.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So they finally answered, “We don’t know.”
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then neither will I tell you where my power comes from to do these things,”
    - type: text
      text: ' Jesus replied.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As they listened to the parable of the tenant in ch.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', they began to understand that Jesus was the Son of God who came with heaven’s authority to represent the Father.'
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So they went and found the colt outside in the street, tied to a gate. When they started to untie it, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: some people standing there said to them, “Why are you untying that colt?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'They answered just as Jesus had told them: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: “The master needs it, and he will send it back to you soon.”
    - type: text
      text: ' So the bystanders let them go.'
