document_id: MRK.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus’ Triumphal Entry into Jerusalem
  - type: text
    content: 'Now, as they were approaching Jerusalem, they arrived at the place of the stables '
  - type: note
    content: Or Bethphage, which in Aramaic means “the house of stables.” Transliterated into Greek it means “the house of unripe figs.”
  - type: text
    content: 'near Bethany on the Mount of Olives. Jesus sent two of his disciples ahead '
  '10':
  - type: text
    content: 'Blessings rest on this kingdom he ushers in—the kingdom of our father David! Bring us the victory in the highest realms '
  - type: text
    content: of heaven
  - type: text
    content: '!”'
  - type: note
    content: Or “You who are in the highest place, save us now!”
  '11':
  - type: text
    content: Jesus rode through the gates of Jerusalem and up to the temple. After looking around at everything, he left for Bethany with the Twelve to spend the night, for it was already late in the day.
  - type: heading
    content: Jesus and a Fruitless Fig Tree
  '12':
  - type: text
    content: 'The next day, as he left Bethany, Jesus was feeling hungry. '
  '13':
  - type: text
    content: 'He noticed a leafy fig tree in the distance, so he walked over to see if there was any fruit on it, but there was none—only leaves (for it wasn’t yet the season for bearing figs). '
  - type: note
    content: The fig tree is first mentioned in Gen. 3:7, with its leaves being a “covering” for fallen Adam and Eve to hide behind. It also became a hiding place for Zacchaeus, who climbed a sycamore-fig tree to see Jesus. The tree with leaves but no fruit can also be a symbol of Israel’s religious system of that day (Jer. 8:13; 24:1–10). Jesus next drives out the money changers from the temple, who were rotten fruit. The firstfruits of the harvest Jesus was looking for came on the day of Pentecost, at the end of the Feast of Firstfruits. See Acts 2.
  '14':
  - type: text
    content: 'Jesus spoke '
  - type: note
    content: Or “Answering (the fig tree), he spoke to it.” The text does not say that Jesus cursed the tree, only that he “answered” and spoke to the tree. Peter’s interpretation of this was that Jesus cursed the tree (vv. 20–21).
  - type: text
    content: 'to the fig tree, saying, '
  - type: text
    content: “No one will ever eat fruit from you again!”
  - type: text
    content: ' And the disciples overheard him.'
  - type: heading
    content: Jesus Drives Merchants Out of the Temple Courts
  '15':
  - type: text
    content: 'When they came into Jerusalem, Jesus went directly into the temple area and overturned all the tables and benches of the merchants who were doing business there. One by one he drove them all out of the temple courts, '
  - type: note
    content: Also known as the court of the gentiles, the only place where non-Jews were allowed in the temple complex.
  - type: text
    content: 'and they scattered away, including the money changers '
  - type: note
    content: The Aramaic reads “the tables that had the firstborn ransom payments.”
  - type: text
    content: 'and those selling doves. '
  '16':
  - type: text
    content: And he would not allow them to use the temple courts as a thoroughfare for carrying their merchandise and their furniture.
  '17':
  - type: text
    content: 'Then he began to teach the people, saying, '
  - type: text
    content: “Does not the Scripture say, ‘My house will be a house of prayer for all the world to share’?
  - type: text
    content: ' '
  - type: note
    content: See Isa. 56:7.
  - type: text
    content: But you have made it a hangout of thieves!”
  - type: note
    content: See Jer. 7:11.
  '18':
  - type: text
    content: 'When the chief priests and religious scholars heard this, they began to hatch a plot as to how they could eliminate Jesus. But they feared him and his influence, because the entire crowd was totally captivated by his teaching. '
  '19':
  - type: text
    content: So he and his disciples spent the nights outside the city.
  - type: heading
    content: Lessons of Faith
  '2':
  - type: text
    content: 'and said to them, '
  - type: text
    content: “As soon as you enter the village ahead, you will find a donkey’s colt tied there that has never been ridden. Untie it and bring it to me.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'In the morning, they passed by the fig tree that Jesus spoke to and it was completely withered from the roots up. '
  '21':
  - type: text
    content: Peter remembered and said to him, “Teacher, look! That’s the fig tree you cursed. It’s now all shriveled up and dead.”
  '22':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Let the faith of God be in you!
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. It is possible to translate the Greek text as an adjectival phrase, “God-like faith” or “godly faith.”
  '23':
  - type: text
    content: 'Listen to the truth I speak to you: Whoever says to this mountain with great faith and does not doubt,'
  - type: text
    content: ' '
  - type: note
    content: The Aramaic word for doubt means “to be divided (undecided) in your heart.”
  - type: text
    content: ‘Mountain, be lifted up and thrown into the midst of the sea,’
  - type: text
    content: ' '
  - type: note
    content: The mountain and the sea can also be metaphors. Mountains in the Bible can refer to kingdoms, and the sea represents the nations (e.g., “sea of humanity”). Faith lifts up and brings with us the “mountain” of God’s kingdom realm when we go into the nations. The Greek word for mountain, oros, is related to a verb that means “to lift up and carry off and take with you.” This truth Jesus brings us is more than hyperbole; it is the active power of faith to take and carry the power and authority of the mountain—God’s kingdom realm—with us wherever we go.
  - type: text
    content: and believes that what he says will happen, it will be done.
  - type: text
    content: ' '
  '24':
  - type: text
    content: This is the reason I urge you to boldly believe for whatever you ask for in prayer—be convinced that you have received it and it will be yours.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And whenever you stand praying,
  - type: text
    content: ' '
  - type: note
    content: Most ancient Jewish prayers require that a person stand to pray.
  - type: text
    content: if you find that you carry something in your heart against another person, release him and forgive him
  - type: text
    content: ' '
  - type: note
    content: The Greek word for forgiveness is apehiemi and means “to send away,” “to take away,” “to release,” “to let flow” (away).
  - type: text
    content: so that your Father in heaven will also release you and forgive you of your faults.
  - type: text
    content: ' '
  '26':
  - type: text
    content: But if you will not release forgiveness, don’t expect your Father in heaven to release you from your misdeeds.”
  - type: note
    content: This verse is omitted by the Greek texts of Nestle-Aland, Wescott & Hort, and most modern translations because it is not found in some of the most reliable and earliest manuscripts. It is found in the Aramaic. Although its inclusion is dubious, this translation includes it, for it does not interfere with the understanding of this pericope and a similar saying is found in Matt. 6:15.
  - type: heading
    content: The Religious Leaders Question Jesus’ Authority
  '27':
  - type: text
    content: 'They came again into Jerusalem, and while Jesus was walking in the temple courts, the Jewish rulers—the chief priest, certain religious scholars, and the elders—approached him. They came up to him '
  '28':
  - type: text
    content: and asked, “What right do you have to say and do these things? Who gave you the authority to do all this?”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I too have a question to ask you. If you can answer this question, then I will tell you by what power I do all these things.
  - type: text
    content: ' '
  '3':
  - type: text
    content: And if anyone asks, ‘Why are you taking it?’ tell them, ‘The master needs it and will send it back to you soon.’ ”
  - type: note
    content: Only once in the Gospels do we see Jesus ever needing anything. In this case he needed a donkey. More than one commentator has seen a picture here of how the Lord “needs” every believer to be his representative in the world.
  '30':
  - type: text
    content: Where did John’s authority to immerse come from? Was it from heaven or from people? Answer me now.”
  '31':
  - type: text
    content: 'They stepped away and debated among themselves, saying, “How should we answer this? If we say, ‘from heaven,’ he will say to us, ‘Then why didn’t you respond to John and believe what he said?’ '
  '32':
  - type: text
    content: But if we say, ‘from the people,’ we fear the crowds, for they’re convinced that John was God’s prophet.”
  '33':
  - type: text
    content: So they finally answered, “We don’t know.”
  - type: text
    content: “Then neither will I tell you where my power comes from to do these things,”
  - type: text
    content: ' Jesus replied.'
  - type: note
    content: As they listened to the parable of the tenant in ch. 12, they began to understand that Jesus was the Son of God who came with heaven’s authority to represent the Father.
  '4':
  - type: text
    content: 'So they went and found the colt outside in the street, tied to a gate. When they started to untie it, '
  '5':
  - type: text
    content: some people standing there said to them, “Why are you untying that colt?”
  '6':
  - type: text
    content: 'They answered just as Jesus had told them: '
  - type: text
    content: “The master needs it, and he will send it back to you soon.”
  - type: text
    content: ' So the bystanders let them go.'
  - type: note
    content: It is clear that Jesus had supernatural knowledge ahead of time about the colt, where it would be found, and what would be spoken by the bystanders. This would qualify as a “word of revelation knowledge,” listed as one of the gifts of the Holy Spirit given to the church today. See 1 Cor. 12:8. As the Creator, Jesus Christ has the right to be called the “owner” of the donkey.
  '7':
  - type: text
    content: 'The disciples brought the colt to Jesus and piled their cloaks '
  - type: text
    content: and prayer shawls
  - type: text
    content: ' '
  - type: note
    content: Or “garments.” By cultural implication, this would include prayer shawls.
  - type: text
    content: 'on the young donkey, and Jesus rode upon it. '
  - type: note
    content: See Zech. 9:9. Kings rode on horses, not donkeys. Jesus chose the young colt as a symbol of humility and gentleness. It would be difficult for the people not to see the fulfillment of Zechariah’s prophecy in front of their eyes.
  '8':
  - type: text
    content: 'Many people carpeted the road in front of him with their cloaks '
  - type: text
    content: and prayer shawls
  - type: text
    content: ', '
  - type: note
    content: The men would have been wearing their prayer shawls as they welcomed Rabbi Jesus to Jerusalem. See also 2 Kings 9:13.
  - type: text
    content: 'while others gathered palm branches and spread them before him. '
  '9':
  - type: text
    content: 'Jesus rode '
  - type: text
    content: in the center
  - type: text
    content: ' of the procession, with crowds going before him and behind him. They all shouted in celebration, “Bring the victory! '
  - type: note
    content: Or Hosanna, an Aramaic word that means “O, save us now” (or “bring the victory”)! The crowds were recognizing Jesus as Yahweh’s Messiah. It is obvious that the people were expecting Jesus to immediately overthrow the Roman oppression and set the nation free. Many want victory before the cross, but true victory comes after resurrection.
  - type: text
    content: 'We welcome the one coming with blessings sent from the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '! '
  - type: note
    content: As translated from the Aramaic. See Ps. 118:25–26.
