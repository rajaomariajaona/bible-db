      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is clear that Jesus had supernatural knowledge ahead of time about the colt, where it would be found, and what would be spoken by the bystanders. This would qualify as a “word of revelation knowledge,” listed as one of the gifts of the Holy Spirit given to the church today. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
