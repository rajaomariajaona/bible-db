document_id: HOS.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming Judgment
  - type: text
    content: '“Blow the shofar! '
  - type: text
    content: Sound the alarm!
  - type: text
    content: Like a scavenging vulture,
  - type: note
    content: Or “Like an eagle.”
  - type: text
    content: 'disaster is swooping down on '
  - type: text
    content: Yahweh
  - type: text
    content: ’s land
  - type: note
    content: Or “the house of Yahweh .”
  - type: text
    content: because they have violated my covenant
  - type: text
    content: and rebelled against my instruction.
  '10':
  - type: text
    content: Although they have hired allies from among the nations,
  - type: text
    content: 'I will round them up '
  - type: text
    content: for judgment
  - type: text
    content: .
  - type: text
    content: They are already wasting away
  - type: text
    content: under the oppression of the king of princes.”
  - type: note
    content: Or “They will soon cease anointing kings and princes” (LXX). The term king of princes may be a reference to the emperor of Assyria.
  - type: heading
    content: Israel Has Forgotten His Maker
  '11':
  - type: text
    content: “The more altars Ephraim builds,
  - type: text
    content: the more places the people have to sin—
  - type: text
    content: 'altars for sinning '
  - type: text
    content: and not for sin offerings
  - type: text
    content: .
  '12':
  - type: text
    content: Although many times I have written many rules for my people,
  - type: text
    content: Ephraim regards them as something strange and foreign.
  '13':
  - type: text
    content: They love to offer sacrifices to me
  - type: text
    content: so that they can eat the meat.
  - type: text
    content: 'But I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', take no pleasure in them.'
  - type: text
    content: I will not forget their guilt,
  - type: text
    content: and I will punish them for their sins.
  - type: text
    content: They will have to go back to Egypt.
  '14':
  - type: text
    content: Israel has built palaces
  - type: note
    content: Or “temples” (Targum).
  - type: text
    content: but has forgotten his Maker.
  - type: text
    content: Judah keeps on building fortified towns,
  - type: text
    content: but I will rain fire down on his cities
  - type: text
    content: to devour the strongholds with flames.”
  '2':
  - type: text
    content: Of course, they cry out to me, ‘Our God!’
  - type: text
    content: My people, Israel, you claim that you know me,
  '3':
  - type: text
    content: but you have rejected what is good.
  - type: text
    content: Therefore, your enemies will pursue you.”
  - type: heading
    content: Rebellion and Idolatry
  '4':
  - type: text
    content: “They have selected kings but without my consent,
  - type: note
    content: The Northern Kingdom of Israel had a total of ten dynasties. Each ended with the assassination of the king for reasons of political ambition and without consulting Yahweh .
  - type: text
    content: and appointed leaders but without seeking my advice.
  - type: text
    content: They have made idols out of their silver and gold—
  - type: text
    content: what an excellent way to lose their money!
  '5':
  - type: text
    content: 'Samaria, '
  - type: note
    content: Samaria is another name for the Northern Kingdom.
  - type: text
    content: I reject your calf-idol!
  - type: note
    content: Several ancient Near Eastern gods (e.g., Baal) were worshiped by means of idols covered with silver and gold and fashioned into images of young bulls. The Israelites had fallen into pagan idolatry with idols at Bethel and Dan (see 1 Kings 12:28–30 ; 2 Kings 10:29 ).
  - type: text
    content: My anger blazes against your people.
  - type: text
    content: How long before they reclaim their purity?
  '6':
  - type: text
    content: 'Surely, this '
  - type: text
    content: calf-idol
  - type: text
    content: ' originated with Israel.'
  - type: text
    content: A craftsman made it; it’s not even a god at all.
  - type: text
    content: Yes, this calf of Samaria will be shattered to pieces.”
  - type: heading
    content: Israel’s Forbidden Alliances
  '7':
  - type: text
    content: “Since they sow the wind, they will reap the whirlwind.
  - type: note
    content: This is a Hebrew idiom. The wind they sow is the many sins of Israel; the whirlwind they reap is the trouble and judgment that are sure to come.
  - type: text
    content: They will reap
  - type: text
    content: ' headless stalks of grain that produce no flour,'
  - type: note
    content: The Baal fertility cult reaps infertility.
  - type: text
    content: and even if they did produce grain, foreigners would swallow it.
  '8':
  - type: text
    content: Israel has already been swallowed up
  - type: note
    content: Israel was “swallowed up” in 733 BC by the Assyrian invasion of King Tiglath-Pileser III, who seized many of Israel’s inhabitants and scattered many more among the nations (see 2 Kings 15:29 ; 1 Chron. 5:26 ).
  - type: text
    content: and is now powerless among the nations.
  - type: text
    content: Israel, you are like a useless piece of broken pottery.
  - type: note
    content: Or “like a vessel in which there is no pleasure.”
  '9':
  - type: text
    content: For indeed, you have sought assistance from Assyria,
  - type: text
    content: like a wild donkey wandering alone.
  - type: note
    content: The “wild donkey” is the onager, a species of donkey known for staying away from other animals and people.
  - type: text
    content: 'Ephraim '
  - type: note
    content: Ephraim is another name for Israel. There is a Hebrew play on words that is lost in translation. The word for “wild donkey” is a rearrangement of the consonants of the name Ephraim.
  - type: text
    content: has sold herself to other lovers.
