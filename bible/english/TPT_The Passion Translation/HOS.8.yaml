    - type: text
      text: '1'
  - type: text
    text: '“Blow the shofar! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sound the alarm!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like a scavenging vulture,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Like an eagle.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'disaster is swooping down on '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ’s land
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the house of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: because they have violated my covenant
- type: usfm
  marker: q1
  children:
  - type: text
    text: and rebelled against my instruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Of course, they cry out to me, ‘Our God!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: My people, Israel, you claim that you know me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: but you have rejected what is good.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore, your enemies will pursue you.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rebellion and Idolatry
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “They have selected kings but without my consent,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Northern Kingdom of Israel had a total of ten dynasties. Each ended with the assassination of the king for reasons of political ambition and without consulting
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and appointed leaders but without seeking my advice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have made idols out of their silver and gold—
- type: usfm
  marker: q1
  children:
  - type: text
    text: what an excellent way to lose their money!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Samaria, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samaria is another name for the Northern Kingdom.
    marker-yv: yv-n
  - type: text
    text: I reject your calf-idol!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Several ancient Near Eastern gods (e.g., Baal) were worshiped by means of idols covered with silver and gold and fashioned into images of young bulls. The Israelites had fallen into pagan idolatry with idols at Bethel and Dan (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '1 Kings 12:28–30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '2 Kings 10:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: My anger blazes against your people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: How long before they reclaim their purity?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Surely, this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: calf-idol
  - type: text
    text: ' originated with Israel.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A craftsman made it; it’s not even a god at all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, this calf of Samaria will be shattered to pieces.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Forbidden Alliances
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Since they sow the wind, they will reap the whirlwind.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is a Hebrew idiom. The wind they sow is the many sins of Israel; the whirlwind they reap is the trouble and judgment that are sure to come.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: They will reap
  - type: text
    text: ' headless stalks of grain that produce no flour,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Baal fertility cult reaps infertility.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and even if they did produce grain, foreigners would swallow it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Israel has already been swallowed up
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Israel was “swallowed up” in 733 BC by the Assyrian invasion of King Tiglath-Pileser III, who seized many of Israel’s inhabitants and scattered many more among the nations (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '2 Kings 15:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '1 Chron. 5:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and is now powerless among the nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israel, you are like a useless piece of broken pottery.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “like a vessel in which there is no pleasure.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For indeed, you have sought assistance from Assyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a wild donkey wandering alone.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “wild donkey” is the onager, a species of donkey known for staying away from other animals and people.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ephraim '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ephraim is another name for Israel. There is a Hebrew play on words that is lost in translation. The word for “wild donkey” is a rearrangement of the consonants of the name Ephraim.
    marker-yv: yv-n
  - type: text
    text: has sold herself to other lovers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Although they have hired allies from among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I will round them up '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for judgment
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are already wasting away
- type: usfm
  marker: q1
  children:
  - type: text
    text: under the oppression of the king of princes.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “They will soon cease anointing kings and princes” (LXX). The term
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: king of princes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: may be a reference to the emperor of Assyria.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Has Forgotten His Maker
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “The more altars Ephraim builds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the more places the people have to sin—
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'altars for sinning '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and not for sin offerings
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Although many times I have written many rules for my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim regards them as something strange and foreign.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They love to offer sacrifices to me
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that they can eat the meat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', take no pleasure in them.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will not forget their guilt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I will punish them for their sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will have to go back to Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Israel has built palaces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 8:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “temples” (Targum).
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: but has forgotten his Maker.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Judah keeps on building fortified towns,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but I will rain fire down on his cities
- type: usfm
  marker: q1
  children:
  - type: text
    text: to devour the strongholds with flames.”
