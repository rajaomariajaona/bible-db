document_id: JER.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Prophesies Jerusalem’s Doom
  - type: text
    content: 'Judah’s King Zedekiah sent for Pashhur '
  - type: note
    content: This is not the same Pashhur mentioned in Jer. 20:1, but is the Pashhur of 38:1.
  - type: text
    content: 'son of Malchiah and for a priest named Zephaniah son of Maaseiah, and he told them, “Tell Jeremiah to intercede '
  - type: note
    content: Or “inquire.”
  - type: text
    content: 'for us to '
  - type: text
    content: Yahweh
  - type: text
    content: ' because Nebuchadnezzar, '
  - type: note
    content: Or “Nebuchadrezzar,” a name used only by Jeremiah for Nebuchadnezzar, the Babylonian king who destroyed Jerusalem in July 586 BC (see 2 Kings 25:1–11; 2 Chron. 36:17–21).
  - type: text
    content: 'king of Babylon, is coming to war against us. Perhaps '
  - type: text
    content: Yahweh
  - type: text
    content: ' will perform an extraordinary miracle for us, as he has done in times past, and cause the king of Babylon to withdraw from us.”'
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke through Jeremiah to say to them, “Tell King Zedekiah, '
  '10':
  - type: text
    content: '“ ‘For I am determined to bring calamity to this city, not good, declares '
  - type: text
    content: Yahweh
  - type: text
    content: . I will turn the city over to the king of Babylon, and he will burn it to the ground.’ ”
  - type: heading
    content: Yahweh Will Punish the Kings of Judah
  '11':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke through Jeremiah to the household of the king:'
  - type: text
    content: '“Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  '12':
  - type: text
    content: royal family of David.
  - type: text
    content: 'Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you:'
  - type: text
    content: Each new day, make sure that justice is done
  - type: note
    content: The prophets of the Old Testament were preeminently prophets of righteousness and social justice. Turning to God always involves rescuing the downtrodden and oppressed and restoring justice to them.
  - type: text
    content: and rescue those who have been robbed
  - type: text
    content: from the power of their oppressor,
  - type: text
    content: or my wrath will go forth like an unquenchable fire
  - type: text
    content: on account of their evil deeds.
  '13':
  - type: text
    content: Yahweh
  - type: text
    content: ' declares: I will fight against you, '
  - type: text
    content: Jerusalem
  - type: text
    content: ','
  - type: text
    content: you who are enthroned above the valley, a rock over the plain.
  - type: text
    content: Those who say, ‘Who would dare come here and attack us
  - type: text
    content: and penetrate the defenses of our city?’
  '14':
  - type: text
    content: I will punish you as your evil deeds deserve,
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: And I will kindle a fire in your forest,
  - type: note
    content: Some commentators see the reference to the “forest” as the forest of cedar columns in Jerusalem’s palaces.
  - type: text
    content: and it will consume everything around you.”
  '4':
  - type: text
    content: '‘Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel says to King Zedekiah: Behold! I am going to take the weapons your troops are using to fight the Babylonians '
  - type: note
    content: Or “the king of Babylon and the Chaldeans.” The Septuagint lacks the words “the king of Babylon.” The Chaldeans were a people who were absorbed into the Babylonian kingdom and, thus, a metonymy for “Babylonians.”
  - type: text
    content: 'who are outside the city, and I will gather them '
  - type: note
    content: The “them” is left ambiguous, for it could refer to the weapons or to the Babylonians. The latter is more likely.
  - type: text
    content: 'together there. '
  '5':
  - type: text
    content: 'And I myself will fight against you with a strong arm and with all my might. Yes, '
  - type: text
    content: I will fight against you
  - type: text
    content: ', fueled by my furious anger and by my great wrath! '
  '6':
  - type: text
    content: And I will strike down the inhabitants of this city—both people and animals, and they will die from a great plague.
  '7':
  - type: text
    content: '“ ‘And after this, declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', I will hand over Judah’s king, Zedekiah, his officials, and everyone else in the city who survives the disease, war, and food shortages, to King Nebuchadnezzar of Babylon and their enemies. He will slaughter them with the sword and show no mercy, pity, or compassion.’ ”'
  - type: note
    content: See 2 Chron. 36:17.
  - type: heading
    content: Choose Life or Death
  '8':
  - type: text
    content: '“Furthermore, speak to the people the words of '
  - type: text
    content: Yahweh
  - type: text
    content: ': ‘Behold! I will set before you the way that leads to life and the way that leads to death. '
  - type: note
    content: See Deut. 30:15.
  '9':
  - type: text
    content: Whoever remains in this city will die by the sword and by food shortages and by pestilence, but whoever goes out and surrenders to the Chaldeans who are besieging you will live, and they will escape with their lives.
