- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah Prophesies Jerusalem’s Doom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 1-3
  - type: text
    text: 'Judah’s King Zedekiah sent for Pashhur '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:1–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not the same Pashhur mentioned in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jer. 20:1
      metadata:
        usfm: JER.20.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', but is the Pashhur of'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 38:1
      metadata:
        usfm: JER.38.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'son of Malchiah and for a priest named Zephaniah son of Maaseiah, and he told them, “Tell Jeremiah to intercede '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:1–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “inquire.”
    marker-yv: yv-n
  - type: text
    text: 'for us to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' because Nebuchadnezzar, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:1–3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Nebuchadrezzar,” a name used only by Jeremiah for Nebuchadnezzar, the Babylonian king who destroyed Jerusalem in July 586 BC (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Kings 25:1–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 36:17–21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'king of Babylon, is coming to war against us. Perhaps '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' will perform an extraordinary miracle for us, as he has done in times past, and cause the king of Babylon to withdraw from us.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke through Jeremiah to say to them, “Tell King Zedekiah, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '‘Here is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the God of Israel says to King Zedekiah: Behold! I am going to take the weapons your troops are using to fight the Babylonians '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the king of Babylon and the Chaldeans.” The Septuagint lacks the words “the king of Babylon.” The Chaldeans were a people who were absorbed into the Babylonian kingdom and, thus, a metonymy for “Babylonians.”
    marker-yv: yv-n
  - type: text
    text: 'who are outside the city, and I will gather them '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The “them” is left ambiguous, for it could refer to the weapons or to the Babylonians. The latter is more likely.
    marker-yv: yv-n
  - type: text
    text: 'together there. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And I myself will fight against you with a strong arm and with all my might. Yes, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: I will fight against you
  - type: text
    text: ', fueled by my furious anger and by my great wrath! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And I will strike down the inhabitants of this city—both people and animals, and they will die from a great plague.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“ ‘And after this, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', I will hand over Judah’s king, Zedekiah, his officials, and everyone else in the city who survives the disease, war, and food shortages, to King Nebuchadnezzar of Babylon and their enemies. He will slaughter them with the sword and show no mercy, pity, or compassion.’ ”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 36:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Choose Life or Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“Furthermore, speak to the people the words of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ': ‘Behold! I will set before you the way that leads to life and the way that leads to death. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 30:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Whoever remains in this city will die by the sword and by food shortages and by pestilence, but whoever goes out and surrenders to the Chaldeans who are besieging you will live, and they will escape with their lives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“ ‘For I am determined to bring calamity to this city, not good, declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: . I will turn the city over to the king of Babylon, and he will burn it to the ground.’ ”
- type: usfm
  marker: s1
  children:
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' Will Punish the Kings of Judah'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke through Jeremiah to the household of the king:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Hear the word of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: royal family of David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Here is what '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says to you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each new day, make sure that justice is done
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The prophets of the Old Testament were preeminently prophets of righteousness and social justice. Turning to God always involves rescuing the downtrodden and oppressed and restoring justice to them.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and rescue those who have been robbed
- type: usfm
  marker: q1
  children:
  - type: text
    text: from the power of their oppressor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or my wrath will go forth like an unquenchable fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: on account of their evil deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' declares: I will fight against you, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jerusalem
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who are enthroned above the valley, a rock over the plain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who say, ‘Who would dare come here and attack us
- type: usfm
  marker: q1
  children:
  - type: text
    text: and penetrate the defenses of our city?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I will punish you as your evil deeds deserve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'declares '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: And I will kindle a fire in your forest,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some commentators see the reference to the “forest” as the forest of cedar columns in Jerusalem’s palaces.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and it will consume everything around you.”
