document_id: PRO.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom for Today
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The wisdom of Solomon:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The title of this section starting with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: indicates a different form. Solomon’s four hundred sayings of wisdom fill this section, going through
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 22:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This compilation is an assorted collection of proverbs that is not easily outlined but is profound in its scope.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When wisdom comes to a son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: joy comes to a father.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When a son turns from wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a mother grieves.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The troublemaker always has a clever plan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and won’t look you in the eye,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one who speaks correction honestly
  - type: usfm
    marker: q1
    children:
    - type: text
      text: can be trusted to make peace.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “the babbling fool comes to ruin.”
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The teachings of the lovers of God are like
  - type: usfm
    marker: q1
    children:
    - type: text
      text: living truth flowing from the fountain of life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the words of the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hide an ulterior motive.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “hide violence.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Hatred keeps old quarrels alive,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “Hatred stirs up judgment.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but love draws a veil over every insult
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Love will cover up offenses against us, but never our own offenses.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and finds a way to make sin disappear.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Words of wisdom flow from the one with true discernment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But to the heartless, words of wisdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: become like rods beating their backside.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Wise men don’t divulge all that they know,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Those who are wise store up knowledge [like treasure].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but chattering fools blurt out words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that bring them to the brink of ruin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: A rich man’s wealth becomes like a citadel of strength,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “his fortified city.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the poverty of the poor leaves their security in shambles.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: The lovers of God earn their wages for a life of righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wages of the wicked are squandered on a life of sin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “their harvest of wickedness.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: If you readily receive correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you are walking on the path to life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you reject rebuke,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’re guaranteed to go astray.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Aramaic is even more blunt: “Reject rebuke and you’re a moron!”'
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The one who hides his hatred while pretending to be your friend
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is nothing but a liar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the one who slanders you behind your back
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proves that he’s a fool, never to be trusted.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: If you keep talking, it won’t be long
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before you’re saying something really wrong.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prove you’re wise from the very start—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just bite your tongue and be strong!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Gaining wealth through dishonesty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the treasures of wickedness.”
      marker-yv: yv-n
    - type: text
      text: is no gain at all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But honesty brings you a lasting happiness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Righteousness [honesty] delivers you from death.”
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The teachings of the godly ones are like pure silver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bringing words of redemption to others,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The tongue of the just is like choice silver.” Silver is a metaphor for redemption.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the heart of the wicked is corrupt.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The lovers of God feed many with their teachings,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “The lips of the righteous multiply mercy.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the foolish ones starve themselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for lack of an understanding heart.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: True enrichment comes from the blessing of the Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'with rest and contentment '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “with no labor or sorrow attached.”
      marker-yv: yv-n
    - type: text
      text: in knowing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that it all comes from him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The fool '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word translated “fool” means “moron” in the Aramaic.
      marker-yv: yv-n
    - type: text
      text: finds fun in planning to do wrong,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wise delight in having discernment.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The lawless are haunted by their fears
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and what they dread will come upon them,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This speaks of the consequences of sin. There is a Judge who sees all that we do and will call us to account one day.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the longings of the lovers of God will all be fulfilled.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The wicked are blown away by every stormy wind.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when a catastrophe comes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the lovers of God have a secure anchor.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: To trust a lazy person to get a job done
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be as irritating as smoke in your eyes—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as enjoyable as a toothache!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Living in the worship and awe of God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will bring you many years of contented living.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So how could the wicked ever expect to have a long, happy life?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Lovers of God have a joyful feast of gladness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the ungodly see their hopes vanish right before their eyes.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The beautiful ways of God are a safe resting place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for those who have integrity.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “The way of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is power to the perfect.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But to those who work wickedness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the ways of God spell doom.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The Lord satisfies the longings of all his lovers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “satisfies the souls of the righteous.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he withholds from the wicked what their souls crave.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “the property of the evil he demolishes.”
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: God’s lover can never be greatly shaken.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked will never inherit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the covenant blessings.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “land.” This is metaphor for all of the covenantal blessings.
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The teachings of the righteous are loaded with wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the words of the evil ones are crooked and perverse.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Words that bring delight pour from the lips of the godly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the words of the wicked are duplicitous.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Slackers will know what it means to be poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the hard worker becomes wealthy.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Know the importance of the season you’re in
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a wise son you will be.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But what a waste when an incompetent son
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sleeps through his day of opportunity!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “To gather in the summer is to be a wise son, but to sleep through the harvest is a disgrace.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The lover of God is enriched beyond belief,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the evil man only curses his luck.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is ambiguous and is literally translated “the mouth of the wicked covers violence.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The reputation of the righteous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: becomes a sweet memorial to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the wicked life only leaves a rotten stench.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Hebrew manuscripts and the Aramaic read “the name of the wicked will be extinguished.”
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The heart of the wise will easily accept instruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But those who do all the talking
  - type: usfm
    marker: q1
    children:
    - type: text
      text: are too busy to listen and learn.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They’ll just keep stumbling ahead
  - type: usfm
    marker: q1
    children:
    - type: text
      text: into the mess they created.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The one who walks in integrity
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “innocence.” The Aramaic is “He who walks in perfection walks in hope.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will experience a fearless confidence in life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one who is devious
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will eventually be exposed.
