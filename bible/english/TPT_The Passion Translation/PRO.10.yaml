document_id: PRO.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom for Today
  - type: text
    content: 'The wisdom of Solomon:'
  - type: note
    content: The title of this section starting with Prov. 10 indicates a different form. Solomon’s four hundred sayings of wisdom fill this section, going through 22:16. This compilation is an assorted collection of proverbs that is not easily outlined but is profound in its scope.
  - type: text
    content: When wisdom comes to a son,
  - type: text
    content: joy comes to a father.
  - type: text
    content: When a son turns from wisdom,
  - type: text
    content: a mother grieves.
  '10':
  - type: text
    content: The troublemaker always has a clever plan
  - type: text
    content: and won’t look you in the eye,
  - type: text
    content: but the one who speaks correction honestly
  - type: text
    content: can be trusted to make peace.
  - type: note
    content: As translated from the Septuagint. The Hebrew is “the babbling fool comes to ruin.”
  '11':
  - type: text
    content: The teachings of the lovers of God are like
  - type: text
    content: living truth flowing from the fountain of life,
  - type: text
    content: but the words of the wicked
  - type: text
    content: hide an ulterior motive.
  - type: note
    content: Or “hide violence.”
  '12':
  - type: text
    content: Hatred keeps old quarrels alive,
  - type: note
    content: The Aramaic is “Hatred stirs up judgment.”
  - type: text
    content: but love draws a veil over every insult
  - type: note
    content: Love will cover up offenses against us, but never our own offenses.
  - type: text
    content: and finds a way to make sin disappear.
  '13':
  - type: text
    content: Words of wisdom flow from the one with true discernment.
  - type: text
    content: But to the heartless, words of wisdom
  - type: text
    content: become like rods beating their backside.
  '14':
  - type: text
    content: Wise men don’t divulge all that they know,
  - type: note
    content: Or “Those who are wise store up knowledge [like treasure].”
  - type: text
    content: but chattering fools blurt out words
  - type: text
    content: that bring them to the brink of ruin.
  '15':
  - type: text
    content: A rich man’s wealth becomes like a citadel of strength,
  - type: note
    content: Or “his fortified city.”
  - type: text
    content: but the poverty of the poor leaves their security in shambles.
  '16':
  - type: text
    content: The lovers of God earn their wages for a life of righteousness,
  - type: text
    content: but the wages of the wicked are squandered on a life of sin.
  - type: note
    content: Or “their harvest of wickedness.”
  '17':
  - type: text
    content: If you readily receive correction,
  - type: text
    content: you are walking on the path to life.
  - type: text
    content: But if you reject rebuke,
  - type: text
    content: you’re guaranteed to go astray.
  - type: note
    content: 'The Aramaic is even more blunt: “Reject rebuke and you’re a moron!”'
  '18':
  - type: text
    content: The one who hides his hatred while pretending to be your friend
  - type: text
    content: is nothing but a liar.
  - type: text
    content: But the one who slanders you behind your back
  - type: text
    content: proves that he’s a fool, never to be trusted.
  '19':
  - type: text
    content: If you keep talking, it won’t be long
  - type: text
    content: before you’re saying something really wrong.
  - type: text
    content: Prove you’re wise from the very start—
  - type: text
    content: just bite your tongue and be strong!
  '2':
  - type: text
    content: 'Gaining wealth through dishonesty '
  - type: note
    content: Or “the treasures of wickedness.”
  - type: text
    content: is no gain at all.
  - type: text
    content: But honesty brings you a lasting happiness.
  - type: note
    content: Or “Righteousness [honesty] delivers you from death.”
  '20':
  - type: text
    content: The teachings of the godly ones are like pure silver,
  - type: text
    content: bringing words of redemption to others,
  - type: note
    content: Or “The tongue of the just is like choice silver.” Silver is a metaphor for redemption.
  - type: text
    content: but the heart of the wicked is corrupt.
  '21':
  - type: text
    content: The lovers of God feed many with their teachings,
  - type: note
    content: The Aramaic is “The lips of the righteous multiply mercy.”
  - type: text
    content: but the foolish ones starve themselves
  - type: text
    content: for lack of an understanding heart.
  '22':
  - type: text
    content: True enrichment comes from the blessing of the Lord,
  - type: text
    content: 'with rest and contentment '
  - type: note
    content: Or “with no labor or sorrow attached.”
  - type: text
    content: in knowing
  - type: text
    content: that it all comes from him.
  '23':
  - type: text
    content: 'The fool '
  - type: note
    content: The word translated “fool” means “moron” in the Aramaic.
  - type: text
    content: finds fun in planning to do wrong,
  - type: text
    content: but the wise delight in having discernment.
  '24':
  - type: text
    content: The lawless are haunted by their fears
  - type: text
    content: and what they dread will come upon them,
  - type: note
    content: This speaks of the consequences of sin. There is a Judge who sees all that we do and will call us to account one day.
  - type: text
    content: but the longings of the lovers of God will all be fulfilled.
  '25':
  - type: text
    content: The wicked are blown away by every stormy wind.
  - type: text
    content: But when a catastrophe comes,
  - type: text
    content: the lovers of God have a secure anchor.
  '26':
  - type: text
    content: To trust a lazy person to get a job done
  - type: text
    content: will be as irritating as smoke in your eyes—
  - type: text
    content: as enjoyable as a toothache!
  '27':
  - type: text
    content: Living in the worship and awe of God
  - type: text
    content: will bring you many years of contented living.
  - type: text
    content: So how could the wicked ever expect to have a long, happy life?
  '28':
  - type: text
    content: Lovers of God have a joyful feast of gladness,
  - type: text
    content: but the ungodly see their hopes vanish right before their eyes.
  '29':
  - type: text
    content: The beautiful ways of God are a safe resting place
  - type: text
    content: for those who have integrity.
  - type: note
    content: The Aramaic is “The way of Yahweh is power to the perfect.”
  - type: text
    content: But to those who work wickedness
  - type: text
    content: the ways of God spell doom.
  '3':
  - type: text
    content: The Lord satisfies the longings of all his lovers,
  - type: note
    content: Or “satisfies the souls of the righteous.”
  - type: text
    content: but he withholds from the wicked what their souls crave.
  - type: note
    content: The Aramaic is “the property of the evil he demolishes.”
  '30':
  - type: text
    content: God’s lover can never be greatly shaken.
  - type: text
    content: But the wicked will never inherit
  - type: text
    content: the covenant blessings.
  - type: note
    content: Or “land.” This is metaphor for all of the covenantal blessings.
  '31':
  - type: text
    content: The teachings of the righteous are loaded with wisdom,
  - type: text
    content: but the words of the evil ones are crooked and perverse.
  '32':
  - type: text
    content: Words that bring delight pour from the lips of the godly,
  - type: text
    content: but the words of the wicked are duplicitous.
  '4':
  - type: text
    content: Slackers will know what it means to be poor,
  - type: text
    content: while the hard worker becomes wealthy.
  '5':
  - type: text
    content: Know the importance of the season you’re in
  - type: text
    content: and a wise son you will be.
  - type: text
    content: But what a waste when an incompetent son
  - type: text
    content: sleeps through his day of opportunity!
  - type: note
    content: Or “To gather in the summer is to be a wise son, but to sleep through the harvest is a disgrace.”
  '6':
  - type: text
    content: The lover of God is enriched beyond belief,
  - type: text
    content: but the evil man only curses his luck.
  - type: note
    content: The Hebrew is ambiguous and is literally translated “the mouth of the wicked covers violence.”
  '7':
  - type: text
    content: The reputation of the righteous
  - type: text
    content: becomes a sweet memorial to him,
  - type: text
    content: while the wicked life only leaves a rotten stench.
  - type: note
    content: Some Hebrew manuscripts and the Aramaic read “the name of the wicked will be extinguished.”
  '8':
  - type: text
    content: The heart of the wise will easily accept instruction.
  - type: text
    content: But those who do all the talking
  - type: text
    content: are too busy to listen and learn.
  - type: text
    content: They’ll just keep stumbling ahead
  - type: text
    content: into the mess they created.
  '9':
  - type: text
    content: The one who walks in integrity
  - type: note
    content: Or “innocence.” The Aramaic is “He who walks in perfection walks in hope.”
  - type: text
    content: will experience a fearless confidence in life,
  - type: text
    content: but the one who is devious
  - type: text
    content: will eventually be exposed.
