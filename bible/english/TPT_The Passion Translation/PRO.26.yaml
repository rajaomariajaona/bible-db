document_id: PRO.26,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Don’t Be a Fool
  - type: text
    content: It is totally out of place to promote and honor a fool,
  - type: text
    content: just like it’s out of place to have snow in the summer
  - type: text
    content: and rain at harvest time.
  - type: note
    content: Both snow and rain are good in their proper season but harmful in the wrong season. So is it harmful to the fool if you promote and honor him prematurely.
  '10':
  - type: text
    content: Like a reckless archer shooting arrows at random
  - type: text
    content: is the impatient employer
  - type: text
    content: who hires just any fool who comes along—
  - type: text
    content: someone’s going to get hurt!
  - type: note
    content: Implied in the context. This is a difficult verse to translate, and it reads quite differently in the Aramaic and the Septuagint. The Aramaic is “A fool suffers much, like a drunkard crossing the sea.” The Septuagint reads “Every fool endures much hardship and his fury comes to nothing.”
  '11':
  - type: text
    content: Fools are famous for repeating their errors,
  - type: text
    content: like dogs are known to return to their vomit.
  '12':
  - type: text
    content: There’s only one thing worse than a fool,
  - type: text
    content: and that’s the smug, conceited man
  - type: text
    content: always in love with his own opinions.
  - type: heading
    content: Don’t Be Lazy
  '13':
  - type: text
    content: The lazy loafer says,
  - type: text
    content: “I can’t go out and look for a job—
  - type: text
    content: there may be a lion out there roaming wild in the streets!”
  '14':
  - type: text
    content: As a door is hinged to the wall,
  - type: text
    content: so the lazy man keeps turning over, hinged to his bed!
  '15':
  - type: text
    content: There are some people so lazy
  - type: text
    content: they won’t even work to feed themselves.
  '16':
  - type: text
    content: 'A self-righteous person '
  - type: note
    content: Or “sluggard.” This speaks of a person who lives in fantasy and not reality.
  - type: text
    content: is convinced he’s smarter
  - type: text
    content: than seven wise counselors who tell him the truth.
  '17':
  - type: text
    content: It’s better to grab a stray dog by its ears
  - type: text
    content: than to meddle in a quarrel
  - type: note
    content: Or “to become furious because of a quarrel that’s not yours.”
  - type: text
    content: that’s none of your business.
  - type: heading
    content: Watch Your Words
  '18':
  - type: text
    content: The one who is caught lying to his friend,
  - type: text
    content: who says, “I didn’t mean it, I was only joking,”
  - type: text
    content: can be compared to a madman
  - type: text
    content: randomly shooting off deadly weapons.
  '2':
  - type: text
    content: An undeserved curse will be powerless to harm you.
  - type: text
    content: It may flutter over you like a bird,
  - type: text
    content: but it will find no place to land.
  - type: note
    content: There is an implication in some Hebrew manuscripts that the curse will go back and land on the one who wrongly spoke it, like a bird going back to its nest.
  '20':
  - type: text
    content: It takes fuel to have a fire—
  - type: text
    content: a fire dies down when you run out of fuel.
  - type: text
    content: So quarrels disappear when the gossip ends.
  '21':
  - type: text
    content: Add fuel to the fire and the blaze goes on.
  - type: text
    content: So add an argumentative man to the mix,
  - type: text
    content: and you’ll keep strife alive.
  '22':
  - type: text
    content: Gossip is so delicious, and how we love to swallow it!
  - type: text
    content: 'For slander '
  - type: note
    content: Or “complaining.”
  - type: text
    content: is easily absorbed into our innermost being.
  '23':
  - type: text
    content: 'Smooth talk '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “Burning words.”
  - type: text
    content: can hide a corrupt heart
  - type: text
    content: just like a pretty glaze covers a cheap clay pot.
  '24':
  - type: text
    content: Kind words can be a cover to conceal hatred of others,
  - type: text
    content: for hypocrisy loves to hide behind flattery.
  '25':
  - type: text
    content: So don’t be drawn in by the hypocrite,
  - type: text
    content: for his gracious speech is a charade,
  - type: text
    content: nothing but a masquerade covering his hatred and evil on parade.
  - type: note
    content: The Hebrew is “seven abominations hide in his heart.” This is a figure of speech for the fullness of evil, a heart filled to the brim with darkness.
  '26':
  - type: text
    content: Don’t worry—he can’t keep the mask on for long.
  - type: text
    content: One day his hypocrisy will be exposed before all the world.
  '27':
  - type: text
    content: Go ahead, set a trap for others—
  - type: text
    content: and then watch as it snaps back on you!
  - type: text
    content: Start a landslide and you’ll be the one who gets crushed.
  '28':
  - type: text
    content: Hatred is the root of slander
  - type: note
    content: Or “A slanderer hates his victims.”
  - type: text
    content: and insecurity the root of flattery.
  - type: note
    content: Or “A flattering mouth works ruin.” The Aramaic is “Malicious words work trouble.”
  '3':
  - type: text
    content: Guide a horse with a whip,
  - type: text
    content: direct a donkey with a bridle,
  - type: text
    content: and lead a rebellious fool with a beating on his backside!
  '4':
  - type: text
    content: Don’t respond to the words of a fool with more foolish words,
  - type: text
    content: or you will become as foolish as he is!
  '5':
  - type: text
    content: Instead, if you’re asked a silly question,
  - type: text
    content: answer it with words of wisdom
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: so the fool doesn’t think he’s so clever.
  '6':
  - type: text
    content: If you choose a fool to represent you,
  - type: text
    content: you’re asking for trouble.
  - type: text
    content: It will be as bad for you as cutting off your own feet!
  '7':
  - type: text
    content: You can never trust the words of a fool,
  - type: text
    content: just like a crippled man can’t trust his legs to support him.
  - type: note
    content: As translated from the Aramaic.
  '8':
  - type: text
    content: Give honor to a fool and watch it backfire—
  - type: text
    content: like a stone tied to a slingshot.
  '9':
  - type: text
    content: The statements of a fool will hurt others
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: like a thorn bush brandished by a drunk.
