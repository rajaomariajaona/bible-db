document_id: PRO.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Be a Fool
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: It is totally out of place to promote and honor a fool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: just like it’s out of place to have snow in the summer
- type: usfm
  marker: q1
  children:
  - type: text
    text: and rain at harvest time.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Both snow and rain are good in their proper season but harmful in the wrong season. So is it harmful to the fool if you promote and honor him prematurely.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: An undeserved curse will be powerless to harm you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It may flutter over you like a bird,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but it will find no place to land.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an implication in some Hebrew manuscripts that the curse will go back and land on the one who wrongly spoke it, like a bird going back to its nest.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Guide a horse with a whip,
- type: usfm
  marker: q1
  children:
  - type: text
    text: direct a donkey with a bridle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and lead a rebellious fool with a beating on his backside!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Don’t respond to the words of a fool with more foolish words,
- type: usfm
  marker: q1
  children:
  - type: text
    text: or you will become as foolish as he is!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Instead, if you’re asked a silly question,
- type: usfm
  marker: q1
  children:
  - type: text
    text: answer it with words of wisdom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: so the fool doesn’t think he’s so clever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If you choose a fool to represent you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’re asking for trouble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will be as bad for you as cutting off your own feet!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You can never trust the words of a fool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: just like a crippled man can’t trust his legs to support him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Give honor to a fool and watch it backfire—
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a stone tied to a slingshot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The statements of a fool will hurt others
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a thorn bush brandished by a drunk.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Like a reckless archer shooting arrows at random
- type: usfm
  marker: q1
  children:
  - type: text
    text: is the impatient employer
- type: usfm
  marker: q1
  children:
  - type: text
    text: who hires just any fool who comes along—
- type: usfm
  marker: q1
  children:
  - type: text
    text: someone’s going to get hurt!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the context. This is a difficult verse to translate, and it reads quite differently in the Aramaic and the Septuagint. The Aramaic is “A fool suffers much, like a drunkard crossing the sea.” The Septuagint reads “Every fool endures much hardship and his fury comes to nothing.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fools are famous for repeating their errors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like dogs are known to return to their vomit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: There’s only one thing worse than a fool,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and that’s the smug, conceited man
- type: usfm
  marker: q1
  children:
  - type: text
    text: always in love with his own opinions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Don’t Be Lazy
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The lazy loafer says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I can’t go out and look for a job—
- type: usfm
  marker: q1
  children:
  - type: text
    text: there may be a lion out there roaming wild in the streets!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As a door is hinged to the wall,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so the lazy man keeps turning over, hinged to his bed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There are some people so lazy
- type: usfm
  marker: q1
  children:
  - type: text
    text: they won’t even work to feed themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A self-righteous person '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sluggard.” This speaks of a person who lives in fantasy and not reality.
    marker-yv: yv-n
  - type: text
    text: is convinced he’s smarter
- type: usfm
  marker: q1
  children:
  - type: text
    text: than seven wise counselors who tell him the truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It’s better to grab a stray dog by its ears
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to meddle in a quarrel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “to become furious because of a quarrel that’s not yours.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: that’s none of your business.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Watch Your Words
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 18-19
  - type: text
    text: The one who is caught lying to his friend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who says, “I didn’t mean it, I was only joking,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: can be compared to a madman
- type: usfm
  marker: q1
  children:
  - type: text
    text: randomly shooting off deadly weapons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: It takes fuel to have a fire—
- type: usfm
  marker: q1
  children:
  - type: text
    text: a fire dies down when you run out of fuel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So quarrels disappear when the gossip ends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Add fuel to the fire and the blaze goes on.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So add an argumentative man to the mix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you’ll keep strife alive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Gossip is so delicious, and how we love to swallow it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For slander '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “complaining.”
    marker-yv: yv-n
  - type: text
    text: is easily absorbed into our innermost being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Smooth talk '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Septuagint. The Hebrew is “Burning words.”
    marker-yv: yv-n
  - type: text
    text: can hide a corrupt heart
- type: usfm
  marker: q1
  children:
  - type: text
    text: just like a pretty glaze covers a cheap clay pot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kind words can be a cover to conceal hatred of others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for hypocrisy loves to hide behind flattery.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So don’t be drawn in by the hypocrite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for his gracious speech is a charade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nothing but a masquerade covering his hatred and evil on parade.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is “seven abominations hide in his heart.” This is a figure of speech for the fullness of evil, a heart filled to the brim with darkness.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Don’t worry—he can’t keep the mask on for long.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One day his hypocrisy will be exposed before all the world.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Go ahead, set a trap for others—
- type: usfm
  marker: q1
  children:
  - type: text
    text: and then watch as it snaps back on you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Start a landslide and you’ll be the one who gets crushed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Hatred is the root of slander
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A slanderer hates his victims.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and insecurity the root of flattery.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 26:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “A flattering mouth works ruin.” The Aramaic is “Malicious words work trouble.”
    marker-yv: yv-n
