  - type: text
    text: The Message of the Three Angels
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then I witnessed another angel flying in the sky, carrying a message of eternal good news '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “having a message of goodness for eternal ages.” The Aramaic can be translated “carrying a message with blood, for he had the everlasting good news to proclaim.”
    marker-yv: yv-n
  - type: text
    text: 'to announce to the earth—to every tribe, language, people, and nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'With a loud voice he shouted, “You must reverence God and glorify him, for the time has come for him to judge. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
