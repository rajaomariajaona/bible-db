        text: ', which means “divine in character” or “godlike,” and is believed to originate from a word meaning “flashing” (like the flashing of burning incense). An alternate translation of this could be “in union with divine qualities and with fire.”'
    marker-yv: yv-n
  - type: text
    text: 'and fire in the presence of holy angels and of the Lamb. '
  - type: usfm
