  - type: text
    text: 'and with him 144,000 '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It does not say 144,000 men. The Greek construction indicates that it is in fact 144,000 lambs! The Lambkin has become many lambs.
    marker-yv: yv-n
  - type: text
    text: 'who had his name and his Father’s name written on their foreheads. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And I heard a tremendous sound coming out of heaven, like the roar of a waterfall and like the earsplitting sound of a thunderclap. The sound '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of music
  - type: text
    text: ' that I heard was like the sound of many harpists playing their harps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And they were singing a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: wonderful
  - type: text
    text: ' new song before the throne, in front of the four living creatures, and in front of the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: twenty-four
  - type: text
    text: ' elders.'
- type: usfm
  marker: p
