      children:
      - type: text
        text: . Like Mary the virgin, these are pure, obedient, and willing to do the will of God and will bring forth an expression of Christ to the earth.
    marker-yv: yv-n
  - type: text
    text: 'and they join themselves to the Lamb wherever he goes. They have been purchased from humanity and brought forth as the firstfruits '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:4
    - type: usfm
      marker: ft
