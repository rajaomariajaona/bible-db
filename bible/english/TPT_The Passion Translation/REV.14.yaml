  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then a third angel followed them, shouting with a mighty voice, “Whoever worships the wild beast and its image, and receives a mark on his forehead or on his hand, '
  - type: usfm
