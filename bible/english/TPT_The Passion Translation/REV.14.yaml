    text: The Harvest of the Earth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I looked and behold—I saw a white cloud, and sitting upon it was one like the Son of Man, wearing a golden crown and holding a sharp sickle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Another angel came out of the temple, shouting out to the one sitting upon the cloud, “Take your sickle and reap, for the time of reaping the harvest has come and the harvest of the earth is ripe!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So the one sitting upon the white cloud gave his sickle a mighty swing over the earth and reaped its harvest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then another angel came out of the heavenly temple, and he too had a sharp sickle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'And another angel came out from the altar '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of incense
  - type: text
    text: —the angel with authority over fire. He shouted out with a loud voice to the one who had the sharp sickle, saying, “Take now your sharp sickle and harvest the clusters of the vine of the earth, for its grapes are ripe.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So the angel gave his sickle a mighty swing over the earth and gathered the grapes from the vine of the earth and threw them into the great winepress of the wrath '
