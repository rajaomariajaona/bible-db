    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the time of his deciding came.”
    marker-yv: yv-n
  - type: text
    text: Worship at the feet of the Creator of heaven, earth, sea, and springs of water.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then a second angel followed, declaring, “She fell! She fell! Babylon the great is fallen! She once seduced the nations and made them all drink the wine of the passion of her harlotry!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 14:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “immorality,” which becomes a metaphor for idolatry. See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
