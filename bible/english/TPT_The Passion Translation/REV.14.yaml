      children:
      - type: text
        text: There is variation over the exact measurement of a “stade.” Some calculate it to be about 600 feet, which would make it over 180 miles. But in the Aramaic, a stadia (race track) is measured at about 1/8 of a mile, which would make nearly 140 miles. It is impossible to view this as literal, for that much blood of human beings would be over ten thousand times the population of earth. The number forty is the number of testing/trial and 1,600 is forty squared. It becomes a picture of severe testing, even to the point of blood, for the people of God.
