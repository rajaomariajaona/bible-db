      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, they are the first parts of the harvest of Christ’s life within the believer. Set apart for God and the Lamb, they become examples for all others to follow.
    marker-yv: yv-n
  - type: text
    text: 'for God and the Lamb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Their words are always true; '
  - type: usfm
