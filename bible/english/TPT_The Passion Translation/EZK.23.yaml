  '36':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me, “Son of man, are you ready to render judgment upon Oholah and Oholibah and charge them with their detestable practices? '
  '37':
  - type: text
    content: 'They have been wicked adulteresses. Their hands are dripping with blood, and they have committed gross adultery with their vile images. They have even committed murder by offering up their children, who are mine, as burnt sacrifices to feed their false gods! '
  - type: note
    content: See Lev. 18:21; Jer. 7:31; 19:5; 32:35; Ezek. 20:25–26.
  '38':
  - type: text
    content: 'Moreover, they have sinned against me by defiling my sanctuary and dishonoring my Sabbaths. '
  '39':
  - type: text
    content: The same day they sacrificed their children to their idols, they came into my sanctuary and made it unfit for worship. Yes, this is what they have done in my own house!
  '4':
  - type: text
    content: 'Oholah (Samaria) '
  - type: note
    content: Oholah was the nickname for Samaria, the capital city of the Northern Kingdom of Israel. Although she is called the older, the Hebrew word can also mean “bigger” or “greater.” Oholah means “her tent [sanctuary],” implying the Samaritans had established their own worship outside of Jerusalem. Samaria had her own tent, but it was not God’s. Many believers are focused more on their own “tent” (ministry) than on building God’s kingdom.
  - type: text
    content: 'was the older and Oholibah (Jerusalem) '
  - type: note
    content: Oholibah was the nickname for Jerusalem, the capital of the Southern Kingdom of Judah. Oholibah means “my tent [sanctuary] is in her,” implying the true worship of Yahweh was to be in Jerusalem (see John 4:20).
  - type: text
    content: 'her younger sister. I married them both, '
  - type: note
    content: See Ezek. 16:8.
  - type: text
    content: and they bore me sons and daughters.
  '40':
  - type: text
    content: '“Worse still, they sent messengers to summon men from far away '
  - type: text
