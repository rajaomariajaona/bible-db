  - type: text
    content: '. '
  - type: note
    content: Historically, this was likely the attempt made by the king of Judah to form a political alliance with the Babylonians against the Assyrians.
  '17':
  - type: text
    content: 'The Babylonians came to her, shared her love-bed, and defiled her with their lust. Once they had defiled her, she withdrew her affection and turned her back on them. '
  - type: note
    content: Historically, this was likely the instance of the king of Judah changing his political allegiance from the Babylonians to the Egyptians.
  '18':
  - type: text
    content: 'She exposed her naked body to everyone and showed them openly that she was a prostitute. Therefore, I turned my back on her just as I had done with her sister. '
  '19':
  - type: text
    content: 'Yet she began sinking even deeper into her depraved sexual immorality, acting the way she did when she was a young prostitute in Egypt. '
  '2':
  - type: text
    content: '“Son of man, there once were two women, daughters of the same mother. '
  '20':
  - type: text
    content: 'She was driven by insatiable lust for Egyptian men, with genitals as large as donkeys’, ejaculating as forcefully as stallions. '
  - type: note
    content: Undoubtedly, this is the coarsest and most vulgar verse in Ezekiel, if not the entire Bible. The translation team has chosen to leave the Hebrew text in its shocking and graphic form.
  '21':
  - type: text
    content: In that way, you were longing to repeat the debauchery of your youth, when men used to fondle your nipples in Egypt and played with your young breasts.”
  - type: heading
