    content: A Parable of Two Sisters
  - type: text
    content: ' '
  - type: note
    content: This chapter is an allegory that describes the sins of the people of Judah with the same terms as found in Ezek. 16. It describes the unfaithfulness of a wife to her husband and her adulterous affair. Her sexual activities were shocking and would be considered obscene to modern-day English readers. The detailing of her sexual perversion is a picture of Judah’s flirtation with other nations around her to form political alliances instead of turning to Yahweh. The language used in the Hebrew is expressive, vivid, and meant to shock. See the footnote on 16:1.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
