  '23':
  - type: text
    content: 'the Babylonians and all the Chaldeans, men of Pekod, Shoa, and Koa, '
  - type: note
    content: Pekod, Shoa, and Koa were tribes that lived near the Tigris River east of Babylon. Little is known about them, but their names are significant. In Hebrew Pekod means “Punish,” Shoa means “Cry for help,” and Koa means “Scream.” Such a play on words is frequent in the prophetic writings, especially in Ezekiel.
  - type: text
    content: 'and all the Assyrians with them, young and handsome men, all governors, officials, and warriors—all of them skillful horsemen. '
  '24':
  - type: text
    content: 'They will attack you from the north '
  - type: note
    content: As translated from the Septuagint. The Hebrew is uncertain, but possibly, “They will attack you equipped [for battle].”
  - type: text
    content: 'and advance on you with chariots, wagons, and troops, setting themselves against you on all sides with shields '
  - type: note
    content: The Hebrew has different words for shields; two are found in this verse, one for large shields and one for small. Sinnah denotes a large shield like a “body protector,” while magen denotes a smaller, round shield.
  - type: text
    content: 'and helmets. I will commit to them the right to judge you, and they will pass sentence on you as they see fit. '
  '25':
  - type: text
    content: 'I will direct my fiery indignation against you and let them treat you with fury. They will slice off your nose and ears, and what is left of your people will fall by the sword. They will capture your surviving sons and daughters and burn them alive. '
  '26':
  - type: text
    content: They will strip off your clothes and rob you of your fine jewels.
  '27':
  - type: text
