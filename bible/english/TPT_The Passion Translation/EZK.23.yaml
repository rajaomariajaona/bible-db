    content: 'Then I saw that she was completely immoral; both sisters were equally corrupt. '
  '14':
  - type: text
    content: 'But Oholibah sank ever deeper into unrestrained sexual immorality, worse than ever. She saw the wall carvings of the Babylonian men, painted bright red, the images of the elite men of Babylon (natives of Chaldea), '
  - type: note
    content: These images of the Chaldeans (Babylonians) may have been carved and painted on the walls of Jerusalem or inside the temple. Before this, Oholibah had wanted to have sex with the Assyrian men, but now she was aroused by the men of Babylon. The Babylonian Empire replaced the Assyrian Empire at the fall of Nineveh in 612 BC.
  - type: text
    content: 'and her lust was enflamed even more. The men looked magnificent, like officers going into battle on their horses! They were the high-ranking Babylonian chariot officers with beautiful sashes tied around their waists and elaborate turbans on their heads. '
  '16':
