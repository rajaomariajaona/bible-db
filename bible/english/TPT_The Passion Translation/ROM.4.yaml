document_id: ROM.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abraham’s Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Let me use Abraham as an example. It is clear that humanly speaking, he was the founder of Judaism. What was his experience of being made right with God? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Was it by his good works of keeping the law? No. For if it was by the things he did, he would have something to boast about, but no one boasts before God. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Listen to what the Scriptures say:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: Because Abraham believed God’s words, his faith transferred God’s righteousness into his account.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:6
      metadata:
        usfm: GEN.15.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When people work, they earn wages. It can’t be considered a free gift, because they earned it. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But no one earns God’s righteousness. It can only be transferred when we no longer rely on our own works, but believe in the one who powerfully declares the ungodly to be righteous '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “calculated [reckoned] to be righteous.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: logizomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is used eleven times in this chapter. This teaches us that our faith is considered or calculated as righteousness before God.
    marker-yv: yv-n
  - type: text
    text: in his eyes. It is faith that transfers God’s righteousness into your account!
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Even King David himself speaks to us regarding the complete wholeness that comes inside a person when God’s powerful declaration of righteousness is heard over our life. Apart from our works, God’s work is enough. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Here’s what David says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: What happy fulfillment is ahead for those
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 32:1
      metadata:
        usfm: PSA.32.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The Hebrew word for “blessed” or “happy” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: asher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which carries the meaning of “a happy progress.” See also v.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: ROM.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose rebellion has been forgiven
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and whose sins are covered '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by blood
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When David wrote this Psalm, it was during the days of covering sin by the blood of sacrifice. Today our sins are no longer simply covered, but removed forever.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: What happy progress comes to them
- type: usfm
  marker: q1
  children:
  - type: text
    text: when they hear the Lord speak over them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will never hold your sins against you!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek uses the word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: logizomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which means to take an inventory and settle accounts. God has taken inventory of the virtue of Christ, and through our faith in him, his perfect righteousness is now deposited in our account. It is settled; we are declared righteous by faith.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Now, think about it. Does this happiness come only to the Jews, or is it available to all who believe? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Is this happiness then for those who are the circumcision or also for the uncircumcision?”
    marker-yv: yv-n
  - type: text
    text: 'Our answer is this: faith was credited to Abraham as God’s righteousness!'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:6
      metadata:
        usfm: GEN.15.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'How did he receive this gift of righteousness? Was he circumcised at the time God accepted him, or was he still uncircumcised? Clearly, he was an uncircumcised gentile when God said this of him! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It was later that he received the external sign of circumcision as a seal to confirm that God had already transferred his righteousness to him by faith, while he was still uncircumcised. So now this qualifies him to become the father of all who believe among the non-Jewish people. And like their “father of faith,” Abraham, God also transfers his righteousness to them by faith. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Yes, Abraham is obviously the true father of faith for the Jewish people who are not only circumcised but who walk in the way of faith that our father Abraham displayed before his circumcision.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Promise of Faith versus Keeping the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'God promised Abraham and his descendants that they would have an heir who would reign over the world. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “for the promise made to Abraham or to his descendants that he would inherit the world,” and is somewhat confusing since there is no promise in Scripture that Abraham would inherit “the whole world.” This is an obvious statement about Abraham’s heir Jesus Christ, who is given the dominion over the whole world.
    marker-yv: yv-n
  - type: text
    text: 'This royal promise was not fulfilled because Abraham kept all the law, but through the righteousness that was transferred by faith. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if keeping the law earns the inheritance, then faith is robbed of its power and the promise becomes useless. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: For the law provokes punishment, and where no law exists there cannot be a violation of the law.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The promise depends on faith so that it can be experienced as a grace-gift, and now it extends to all the descendants of Abraham. This promise is not only meant for those who obey the law, but also to those who enter into the faith of Abraham, the father of us all. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'That’s what the Scripture means when it says:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: “I have made you the father of many nations.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 17:5
      metadata:
        usfm: GEN.17.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He is our example and father, for in God’s presence he believed that God can raise the dead and call into being things that don’t even exist yet. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is perfectly illustrated with God speaking to Abraham about nations coming from him and his wife even though they had no children and were beyond the age of childbearing. The God who creates out of nothing could give children, and eventually nations, to Abraham and Sarah.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Against all odds, when it looked hopeless, Abraham believed the promise and expected God to fulfill it. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “who beyond hope in hope believed.”
    marker-yv: yv-n
  - type: text
    text: 'He took God at his word, and as a result he became the father of many nations. God’s declaration over him came to pass:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your descendants will be so many
- type: usfm
  marker: q1
  children:
  - type: text
    text: that they will be impossible to count!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Although only a portion of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:5
      metadata:
        usfm: GEN.15.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is quoted here, the entire text is supplied to bring clarity to the English narrative.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'In spite of being nearly one hundred years old when the promise of having a son was made, his faith was so strong that it could not be undermined by the fact that he and Sarah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “and the deadness of Sarah’s womb.”
    marker-yv: yv-n
  - type: text
    text: 'were incapable of conceiving a child. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 20-21
  - type: text
    text: 'He never stopped believing God’s promise, for he was made strong in his faith '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:20–21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he was empowered in faith.”
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: to father a child
  - type: text
    text: . And because he was mighty in faith and convinced that God had all the power needed to fulfill his promises, Abraham glorified God!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So now you can see why Abraham’s faith was credited to his account as righteousness before God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 15:6
      metadata:
        usfm: GEN.15.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'And this declaration was not just spoken over Abraham, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but also over us. For when we believe and embrace the one who brought our Lord Jesus back to life, perfect righteousness will be credited to our account as well. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jesus was handed over to be crucified for the forgiveness of our sins and was raised back to life to prove that he had made us right with God!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In this poetic verse we discover that the blood of the cross is the means of our justification and the resurrection is the proof that God now sees believers as righteous in his eyes.
    marker-yv: yv-n
