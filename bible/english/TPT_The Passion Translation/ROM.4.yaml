document_id: ROM.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham’s Faith
  - type: text
    content: 'Let me use Abraham as an example. It is clear that humanly speaking, he was the founder of Judaism. What was his experience of being made right with God? '
  '10':
  - type: text
    content: 'How did he receive this gift of righteousness? Was he circumcised at the time God accepted him, or was he still uncircumcised? Clearly, he was an uncircumcised gentile when God said this of him! '
  '11':
  - type: text
    content: 'It was later that he received the external sign of circumcision as a seal to confirm that God had already transferred his righteousness to him by faith, while he was still uncircumcised. So now this qualifies him to become the father of all who believe among the non-Jewish people. And like their “father of faith,” Abraham, God also transfers his righteousness to them by faith. '
  '12':
  - type: text
    content: Yes, Abraham is obviously the true father of faith for the Jewish people who are not only circumcised but who walk in the way of faith that our father Abraham displayed before his circumcision.
  - type: heading
    content: The Promise of Faith versus Keeping the Law
  '13':
  - type: text
    content: 'God promised Abraham and his descendants that they would have an heir who would reign over the world. '
  - type: note
    content: As translated from the Aramaic. The Greek is “for the promise made to Abraham or to his descendants that he would inherit the world,” and is somewhat confusing since there is no promise in Scripture that Abraham would inherit “the whole world.” This is an obvious statement about Abraham’s heir Jesus Christ, who is given the dominion over the whole world.
  - type: text
    content: 'This royal promise was not fulfilled because Abraham kept all the law, but through the righteousness that was transferred by faith. '
  '14':
  - type: text
    content: 'For if keeping the law earns the inheritance, then faith is robbed of its power and the promise becomes useless. '
  '15':
  - type: text
    content: For the law provokes punishment, and where no law exists there cannot be a violation of the law.
  '16':
  - type: text
    content: 'The promise depends on faith so that it can be experienced as a grace-gift, and now it extends to all the descendants of Abraham. This promise is not only meant for those who obey the law, but also to those who enter into the faith of Abraham, the father of us all. '
  '17':
  - type: text
    content: 'That’s what the Scripture means when it says:'
  - type: text
    content: “I have made you the father of many nations.”
  - type: note
    content: See Gen. 17:5.
  - type: text
    content: 'He is our example and father, for in God’s presence he believed that God can raise the dead and call into being things that don’t even exist yet. '
  - type: note
    content: This is perfectly illustrated with God speaking to Abraham about nations coming from him and his wife even though they had no children and were beyond the age of childbearing. The God who creates out of nothing could give children, and eventually nations, to Abraham and Sarah.
  '18':
  - type: text
    content: 'Against all odds, when it looked hopeless, Abraham believed the promise and expected God to fulfill it. '
  - type: note
    content: Or “who beyond hope in hope believed.”
  - type: text
    content: 'He took God at his word, and as a result he became the father of many nations. God’s declaration over him came to pass:'
  - type: text
    content: “Your descendants will be so many
  - type: text
    content: that they will be impossible to count!”
  - type: note
    content: Although only a portion of Gen. 15:5 is quoted here, the entire text is supplied to bring clarity to the English narrative.
  '19':
  - type: text
    content: 'In spite of being nearly one hundred years old when the promise of having a son was made, his faith was so strong that it could not be undermined by the fact that he and Sarah '
  - type: note
    content: Or “and the deadness of Sarah’s womb.”
  - type: text
    content: 'were incapable of conceiving a child. '
  '2':
  - type: text
    content: 'Was it by his good works of keeping the law? No. For if it was by the things he did, he would have something to boast about, but no one boasts before God. '
  '20':
  - type: text
    content: 'He never stopped believing God’s promise, for he was made strong in his faith '
  - type: note
    content: Or “he was empowered in faith.”
  - type: text
    content: to father a child
  - type: text
    content: . And because he was mighty in faith and convinced that God had all the power needed to fulfill his promises, Abraham glorified God!
  '22':
  - type: text
    content: 'So now you can see why Abraham’s faith was credited to his account as righteousness before God. '
  - type: note
    content: See Gen. 15:6.
  '23':
  - type: text
    content: 'And this declaration was not just spoken over Abraham, '
  '24':
  - type: text
    content: 'but also over us. For when we believe and embrace the one who brought our Lord Jesus back to life, perfect righteousness will be credited to our account as well. '
  '25':
  - type: text
    content: Jesus was handed over to be crucified for the forgiveness of our sins and was raised back to life to prove that he had made us right with God!
  - type: note
    content: In this poetic verse we discover that the blood of the cross is the means of our justification and the resurrection is the proof that God now sees believers as righteous in his eyes.
  '3':
  - type: text
    content: 'Listen to what the Scriptures say:'
  - type: text
    content: Because Abraham believed God’s words, his faith transferred God’s righteousness into his account.
  - type: note
    content: See Gen. 15:6.
  '4':
  - type: text
    content: 'When people work, they earn wages. It can’t be considered a free gift, because they earned it. '
  '5':
  - type: text
    content: 'But no one earns God’s righteousness. It can only be transferred when we no longer rely on our own works, but believe in the one who powerfully declares the ungodly to be righteous '
  - type: note
    content: Or “calculated [reckoned] to be righteous.” The Greek word logizomai is used eleven times in this chapter. This teaches us that our faith is considered or calculated as righteousness before God.
  - type: text
    content: in his eyes. It is faith that transfers God’s righteousness into your account!
  - type: heading
    content: David’s Faith
  '6':
  - type: text
    content: 'Even King David himself speaks to us regarding the complete wholeness that comes inside a person when God’s powerful declaration of righteousness is heard over our life. Apart from our works, God’s work is enough. '
  '7':
  - type: text
    content: 'Here’s what David says:'
  - type: text
    content: What happy fulfillment is ahead for those
  - type: note
    content: See Ps. 32:1. The Hebrew word for “blessed” or “happy” is asher, which carries the meaning of “a happy progress.” See also v. 8.
  - type: text
    content: whose rebellion has been forgiven
  - type: text
    content: 'and whose sins are covered '
  - type: text
    content: by blood
  - type: text
    content: .
  - type: note
    content: When David wrote this Psalm, it was during the days of covering sin by the blood of sacrifice. Today our sins are no longer simply covered, but removed forever.
  '8':
  - type: text
    content: What happy progress comes to them
  - type: text
    content: when they hear the Lord speak over them,
  - type: text
    content: “I will never hold your sins against you!”
  - type: note
    content: The Greek uses the word logizomai, which means to take an inventory and settle accounts. God has taken inventory of the virtue of Christ, and through our faith in him, his perfect righteousness is now deposited in our account. It is settled; we are declared righteous by faith.
  '9':
  - type: text
    content: 'Now, think about it. Does this happiness come only to the Jews, or is it available to all who believe? '
  - type: note
    content: Or “Is this happiness then for those who are the circumcision or also for the uncircumcision?”
  - type: text
    content: 'Our answer is this: faith was credited to Abraham as God’s righteousness!'
  - type: note
    content: See Gen. 15:6.
