document_id: PSA.107,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: God’s Constant Love
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let everyone give all their praise and thanks to the Lord!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Here’s why—he’s better than anyone could ever imagine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yes, he’s always loving and kind, and his faithful love never ends.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some of us once sat in darkness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: living in the dark shadows of death.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We were prisoners to our pain, chained to our regrets.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For we rebelled against God’s Word
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and rejected the wise counsel of God Most High.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he humbled us through our circumstances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: watching us as we stumbled, with no one there to pick us back up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our own pain became our punishment.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His light broke through the darkness and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he led us out in freedom from death’s dark shadow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and snapped every one of our chains.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So lift your hands and give thanks to God for his marvelous kindness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for his miracles of mercy for those he loves!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he smashed through heavy prison doors and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: shattered the steel bars that held us back, just to set us free!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some of us were such fools, bringing on ourselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sorrow and suffering all because of our sins.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sick and feeble, unable to stand the sight of food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we drew near to the gates of death.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So, go ahead—let everyone know it!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell the world how he broke through
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and delivered you from the power of darkness and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has gathered us together from all over the world.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has set us free to be his very own!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God spoke the words “Be healed,” and we were healed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: delivered from death’s door!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So lift your hands and give thanks to God for his marvelous kindness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for his miracles of mercy for those he loves!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring your praise as an offering and your thanks as a sacrifice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you sing your story of miracles with a joyful song.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some of us set sail upon the sea to faraway ports,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: transporting our goods from ship to shore.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We were witnesses of God’s power out in the ocean deep;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we saw breathtaking wonders upon the high seas.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When God spoke he stirred up a storm,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lifting high the waves with hurricane winds.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ships were tossed by the swelling sea, rising to the sky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then dropping down to the depths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reeling like drunkards, spinning like tops,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: everyone at their wits’ end until even sailors despaired of life, cringing in terror.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God stilled the storm, calmed the waves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he hushed the hurricane winds to only a whisper.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We were so relieved, so glad as he guided us
  - type: usfm
    marker: q1
    children:
    - type: text
      text: safely to harbor in a quiet haven.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So lift your hands and give thanks to God for his marvelous kindness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for his miracles of mercy for those he loves!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let’s exalt him on high and lift up our praises in public;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let all the people and the leaders of the nation know
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'how great and wonderful is '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', our God!'
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whenever he chooses he can dry up a river
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and turn the land into a desert.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or he can take a fruitful land and make it into a saltwater swamp,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all because of the wickedness of those who dwell there.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he also can turn a barren wilderness into an oasis with water!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He can make springs flow into desert lands
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and turn them into fertile valleys so that cities spring up,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he gives it all to those who are hungry.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They can plant their fields and vineyards there
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and reap a bumper crop and gather a fruitful harvest.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will bless them and cause them to multiply and prosper.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But others will become poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: humbled because of their oppression, tyranny, and sorrows.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some of us once wandered in the wilderness like desert nomads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with no true direction or dwelling place.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For God pours contempt upon their arrogant abuse of power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heaping scorn upon their princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and makes them wander among ruins.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he raises up the poor and lowly with his favor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: giving them a safe place to live where no one can touch them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will grant them a large family and bless them!
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The lovers of God will rejoice when they see this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Good men are glad when the evil ones are silenced.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you are truly wise, you’ll learn from what I’ve told you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s time for you to consider these profound lessons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of God’s great love and mercy!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Starving, thirsting, staggering,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we became desperate and filled with despair.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He led us out by the right way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until we reached a suitable city to dwell in.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So lift your hands and thank God for his marvelous kindness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for all his miracles of mercy for those he loves.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How he satisfies the souls of thirsty ones
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and fills the hungry with goodness!
