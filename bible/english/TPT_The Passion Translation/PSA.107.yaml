document_id: PSA.107
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God’s Constant Love
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Let everyone give all their praise and thanks to the Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Here’s why—he’s better than anyone could ever imagine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, he’s always loving and kind, and his faithful love never ends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-3
  - type: text
    text: So, go ahead—let everyone know it!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell the world how he broke through
- type: usfm
  marker: q1
  children:
  - type: text
    text: and delivered you from the power of darkness and
- type: usfm
  marker: q1
  children:
  - type: text
    text: has gathered us together from all over the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has set us free to be his very own!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Some of us once wandered in the wilderness like desert nomads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with no true direction or dwelling place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Starving, thirsting, staggering,
- type: usfm
  marker: q1
  children:
  - type: text
    text: we became desperate and filled with despair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then we cried out, “Lord, help us! Rescue us!” And he did!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He led us out by the right way
- type: usfm
  marker: q1
  children:
  - type: text
    text: until we reached a suitable city to dwell in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: So lift your hands and thank God for his marvelous kindness
- type: usfm
  marker: q1
  children:
  - type: text
    text: and for all his miracles of mercy for those he loves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: How he satisfies the souls of thirsty ones
- type: usfm
  marker: q1
  children:
  - type: text
    text: and fills the hungry with goodness!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Some of us once sat in darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: living in the dark shadows of death.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We were prisoners to our pain, chained to our regrets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For we rebelled against God’s Word
- type: usfm
  marker: q1
  children:
  - type: text
    text: and rejected the wise counsel of God Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So he humbled us through our circumstances,
- type: usfm
  marker: q1
  children:
  - type: text
    text: watching us as we stumbled, with no one there to pick us back up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our own pain became our punishment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then we cried out, “Lord, help us! Rescue us!” And he did!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: His light broke through the darkness and
- type: usfm
  marker: q1
  children:
  - type: text
    text: he led us out in freedom from death’s dark shadow
- type: usfm
  marker: q1
  children:
  - type: text
    text: and snapped every one of our chains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: So lift your hands and give thanks to God for his marvelous kindness
- type: usfm
  marker: q1
  children:
  - type: text
    text: and for his miracles of mercy for those he loves!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: For he smashed through heavy prison doors and
- type: usfm
  marker: q1
  children:
  - type: text
    text: shattered the steel bars that held us back, just to set us free!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Some of us were such fools, bringing on ourselves
- type: usfm
  marker: q1
  children:
  - type: text
    text: sorrow and suffering all because of our sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sick and feeble, unable to stand the sight of food,
- type: usfm
  marker: q1
  children:
  - type: text
    text: we drew near to the gates of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then we cried out, “Lord, help us! Rescue us!” And he did!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: God spoke the words “Be healed,” and we were healed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: delivered from death’s door!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So lift your hands and give thanks to God for his marvelous kindness
- type: usfm
  marker: q1
  children:
  - type: text
    text: and for his miracles of mercy for those he loves!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bring your praise as an offering and your thanks as a sacrifice
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you sing your story of miracles with a joyful song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Some of us set sail upon the sea to faraway ports,
- type: usfm
  marker: q1
  children:
  - type: text
    text: transporting our goods from ship to shore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: We were witnesses of God’s power out in the ocean deep;
- type: usfm
  marker: q1
  children:
  - type: text
    text: we saw breathtaking wonders upon the high seas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When God spoke he stirred up a storm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lifting high the waves with hurricane winds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 26-27
  - type: text
    text: Ships were tossed by the swelling sea, rising to the sky,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then dropping down to the depths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: reeling like drunkards, spinning like tops,
- type: usfm
  marker: q1
  children:
  - type: text
    text: everyone at their wits’ end until even sailors despaired of life, cringing in terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then we cried out, “Lord, help us! Rescue us!” And he did!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: God stilled the storm, calmed the waves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he hushed the hurricane winds to only a whisper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: We were so relieved, so glad as he guided us
- type: usfm
  marker: q1
  children:
  - type: text
    text: safely to harbor in a quiet haven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: So lift your hands and give thanks to God for his marvelous kindness
- type: usfm
  marker: q1
  children:
  - type: text
    text: and for his miracles of mercy for those he loves!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Let’s exalt him on high and lift up our praises in public;
- type: usfm
  marker: q1
  children:
  - type: text
    text: let all the people and the leaders of the nation know
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'how great and wonderful is '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', our God!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Whenever he chooses he can dry up a river
- type: usfm
  marker: q1
  children:
  - type: text
    text: and turn the land into a desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Or he can take a fruitful land and make it into a saltwater swamp,
- type: usfm
  marker: q1
  children:
  - type: text
    text: all because of the wickedness of those who dwell there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: But he also can turn a barren wilderness into an oasis with water!
- type: usfm
  marker: q1
  children:
  - type: text
    text: He can make springs flow into desert lands
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: and turn them into fertile valleys so that cities spring up,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he gives it all to those who are hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: They can plant their fields and vineyards there
- type: usfm
  marker: q1
  children:
  - type: text
    text: and reap a bumper crop and gather a fruitful harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: God will bless them and cause them to multiply and prosper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: But others will become poor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: humbled because of their oppression, tyranny, and sorrows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: For God pours contempt upon their arrogant abuse of power,
- type: usfm
  marker: q1
  children:
  - type: text
    text: heaping scorn upon their princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and makes them wander among ruins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: But he raises up the poor and lowly with his favor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: giving them a safe place to live where no one can touch them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God will grant them a large family and bless them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: The lovers of God will rejoice when they see this.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Good men are glad when the evil ones are silenced.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: If you are truly wise, you’ll learn from what I’ve told you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It’s time for you to consider these profound lessons
- type: usfm
  marker: q1
  children:
  - type: text
    text: of God’s great love and mercy!
