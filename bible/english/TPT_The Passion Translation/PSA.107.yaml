document_id: PSA.107,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Constant Love
  - type: text
    content: Let everyone give all their praise and thanks to the Lord!
  - type: text
    content: Here’s why—he’s better than anyone could ever imagine.
  - type: text
    content: Yes, he’s always loving and kind, and his faithful love never ends.
  '10':
  - type: text
    content: Some of us once sat in darkness,
  - type: text
    content: living in the dark shadows of death.
  - type: text
    content: We were prisoners to our pain, chained to our regrets.
  '11':
  - type: text
    content: For we rebelled against God’s Word
  - type: text
    content: and rejected the wise counsel of God Most High.
  '12':
  - type: text
    content: So he humbled us through our circumstances,
  - type: text
    content: watching us as we stumbled, with no one there to pick us back up.
  - type: text
    content: Our own pain became our punishment.
  '13':
  - type: text
    content: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '14':
  - type: text
    content: His light broke through the darkness and
  - type: text
    content: he led us out in freedom from death’s dark shadow
  - type: text
    content: and snapped every one of our chains.
  '15':
  - type: text
    content: So lift your hands and give thanks to God for his marvelous kindness
  - type: text
    content: and for his miracles of mercy for those he loves!
  '16':
  - type: text
    content: For he smashed through heavy prison doors and
  - type: text
    content: shattered the steel bars that held us back, just to set us free!
  '17':
  - type: text
    content: Some of us were such fools, bringing on ourselves
  - type: text
    content: sorrow and suffering all because of our sins.
  '18':
  - type: text
    content: Sick and feeble, unable to stand the sight of food,
  - type: text
    content: we drew near to the gates of death.
  '19':
  - type: text
    content: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '2':
  - type: text
    content: So, go ahead—let everyone know it!
  - type: text
    content: Tell the world how he broke through
  - type: text
    content: and delivered you from the power of darkness and
  - type: text
    content: has gathered us together from all over the world.
  - type: text
    content: He has set us free to be his very own!
  '20':
  - type: text
    content: God spoke the words “Be healed,” and we were healed,
  - type: text
    content: delivered from death’s door!
  '21':
  - type: text
    content: So lift your hands and give thanks to God for his marvelous kindness
  - type: text
    content: and for his miracles of mercy for those he loves!
  '22':
  - type: text
    content: Bring your praise as an offering and your thanks as a sacrifice
  - type: text
    content: as you sing your story of miracles with a joyful song.
  '23':
  - type: text
    content: Some of us set sail upon the sea to faraway ports,
  - type: text
    content: transporting our goods from ship to shore.
  '24':
  - type: text
    content: We were witnesses of God’s power out in the ocean deep;
  - type: text
    content: we saw breathtaking wonders upon the high seas.
  '25':
  - type: text
    content: When God spoke he stirred up a storm,
  - type: text
    content: lifting high the waves with hurricane winds.
  '26':
  - type: text
    content: Ships were tossed by the swelling sea, rising to the sky,
  - type: text
    content: then dropping down to the depths,
  - type: text
    content: reeling like drunkards, spinning like tops,
  - type: text
    content: everyone at their wits’ end until even sailors despaired of life, cringing in terror.
  '28':
  - type: text
    content: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '29':
  - type: text
    content: God stilled the storm, calmed the waves,
  - type: text
    content: and he hushed the hurricane winds to only a whisper.
  '30':
  - type: text
    content: We were so relieved, so glad as he guided us
  - type: text
    content: safely to harbor in a quiet haven.
  '31':
  - type: text
    content: So lift your hands and give thanks to God for his marvelous kindness
  - type: text
    content: and for his miracles of mercy for those he loves!
  '32':
  - type: text
    content: Let’s exalt him on high and lift up our praises in public;
  - type: text
    content: let all the people and the leaders of the nation know
  - type: text
    content: 'how great and wonderful is '
  - type: text
    content: Yahweh
  - type: text
    content: ', our God!'
  '33':
  - type: text
    content: Whenever he chooses he can dry up a river
  - type: text
    content: and turn the land into a desert.
  '34':
  - type: text
    content: Or he can take a fruitful land and make it into a saltwater swamp,
  - type: text
    content: all because of the wickedness of those who dwell there.
  '35':
  - type: text
    content: But he also can turn a barren wilderness into an oasis with water!
  - type: text
    content: He can make springs flow into desert lands
  '36':
  - type: text
    content: and turn them into fertile valleys so that cities spring up,
  - type: text
    content: and he gives it all to those who are hungry.
  '37':
  - type: text
    content: They can plant their fields and vineyards there
  - type: text
    content: and reap a bumper crop and gather a fruitful harvest.
  '38':
  - type: text
    content: God will bless them and cause them to multiply and prosper.
  '39':
  - type: text
    content: But others will become poor,
  - type: text
    content: humbled because of their oppression, tyranny, and sorrows.
  '4':
  - type: text
    content: Some of us once wandered in the wilderness like desert nomads,
  - type: text
    content: with no true direction or dwelling place.
  '40':
  - type: text
    content: For God pours contempt upon their arrogant abuse of power,
  - type: text
    content: heaping scorn upon their princes,
  - type: text
    content: and makes them wander among ruins.
  '41':
  - type: text
    content: But he raises up the poor and lowly with his favor,
  - type: text
    content: giving them a safe place to live where no one can touch them.
  - type: text
    content: God will grant them a large family and bless them!
  '42':
  - type: text
    content: The lovers of God will rejoice when they see this.
  - type: text
    content: Good men are glad when the evil ones are silenced.
  '43':
  - type: text
    content: If you are truly wise, you’ll learn from what I’ve told you.
  - type: text
    content: It’s time for you to consider these profound lessons
  - type: text
    content: of God’s great love and mercy!
  '5':
  - type: text
    content: Starving, thirsting, staggering,
  - type: text
    content: we became desperate and filled with despair.
  '6':
  - type: text
    content: Then we cried out, “Lord, help us! Rescue us!” And he did!
  '7':
  - type: text
    content: He led us out by the right way
  - type: text
    content: until we reached a suitable city to dwell in.
  '8':
  - type: text
    content: So lift your hands and thank God for his marvelous kindness
  - type: text
    content: and for all his miracles of mercy for those he loves.
  '9':
  - type: text
    content: How he satisfies the souls of thirsty ones
  - type: text
    content: and fills the hungry with goodness!
