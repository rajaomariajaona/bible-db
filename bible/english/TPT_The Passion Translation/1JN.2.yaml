document_id: 1JN.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Christ, Our Answer for Sin
  - type: text
    content: 'You are my dear children, and I write these things to you so that you won’t sin. But if anyone does sin, we continually have a forgiving Redeemer '
  - type: note
    content: Or “Advocate.” The Aramaic can be translated “the Redeemer who ends the curse.” See John 14:16 and the second footnote.
  - type: text
    content: 'who is face-to-face with the Father: '
  - type: note
    content: He is still our Father even when we sin.
  - type: text
    content: 'Jesus Christ, the Righteous One. '
  '10':
  - type: text
    content: 'But the one who truly loves a fellow believer lives in the light, and there is nothing in him that will cause someone else to stumble. '
  - type: note
    content: Or “no fear of stumbling haunts him” or “there is no trap laid for him.”
  '11':
  - type: text
    content: But whoever hates a fellow believer lives in the darkness—stumbling around in the dark with no clue where he is going, for he is blinded by the darkness.
  - type: note
    content: John is equating darkness with the absence of love. To love is to walk in God’s light. To hate is to walk in darkness.
  - type: heading
    content: Three Stages of Spiritual Maturity
  '12':
  - type: text
    content: 'I remind you, dear children: '
  - type: note
    content: The Greek word for “child,” teknion, is a child still in training (under instruction), with an implication of servanthood.
  - type: text
    content: your sins have been permanently removed because of the power of his name.
  - type: note
    content: That is, through faith in who Christ is and what he has done to redeem us through the blood of his sacrifice.
  '13':
  - type: text
    content: 'I remind you, fathers '
  - type: text
    content: and mothers
  - type: text
    content: ': '
  - type: note
    content: Fathers and mothers (parents) are not necessarily “old men” and “old women,” but those who reproduce and raise children.
  - type: text
    content: you have a relationship with the One who has existed from the beginning.
  - type: note
    content: That is, Christ. See John 1:1; 1 John 1:1–3. Nothing more is said about fathers and mothers other than knowing Christ, for what could be more important than that?
  - type: text
    content: 'And I remind you, young people: you have defeated the Evil One.'
  - type: note
    content: Our enemy, Satan, is defeated through our union with Christ as we share in the triumphs of his cross and resurrection, the word of our testimony, the blood of the Lamb, and by not loving our own lives. See Rev. 12:10.
  '14':
  - type: text
    content: 'I write these things to you, dear children, because you truly have a relationship with the Father. I write these things, fathers '
  - type: text
    content: and mothers
  - type: text
    content: ', because you have had a true relationship with him who is from the beginning. And I write these things, young people, because you are strong, the Word of God is treasured in your hearts, and you have defeated the Evil One.'
  - type: note
    content: 'John gives young people (in Hebrew culture this would be anyone under forty) the three main components of spiritual growth: (1) courageous faith, (2) loving the Word of God, and (3) defeating the Evil One through our union with Christ.'
  - type: heading
    content: A Warning Not to Love the World
  '15':
  - type: text
    content: 'Don’t set the affections of your heart on this world '
  - type: note
    content: Or “Stop loving the world system” (the ways of the world).
  - type: text
    content: 'or in loving the things of the world. The love of the Father and the love of the world are incompatible. '
  - type: note
    content: Or “If anyone persists in loving the world, there is no love for the Father in him.”
  '16':
  - type: text
    content: 'For all that the world can offer us—the gratification of our flesh, the allurement of the things of the world, and the obsession with status and importance '
  - type: note
    content: These are the three areas of temptation that the serpent used with Adam and Eve in the garden to pull them away from the Father and what the devil used to tempt Jesus in the wilderness. He is an expert at using these cravings to dilute our love for the Father and cause us to turn our affections to the things of this life. See Gen. 3:6; Matt. 4:1–11. But the values of the kingdom of God are setting our affections on things above, living in the fruit of the Spirit (self-control), and humility, which always waits for God’s timing for promotion.
  - type: text
    content: '—none of these things come from the Father but from the world. '
  '17':
  - type: text
    content: 'This world '
  - type: note
    content: That is, the world system and the desire to be in a world system that leaves God out of the picture are disappearing. Planet earth is not fading away here, but the systems, structure, and world order are.
  - type: text
    content: 'and its desires are in the process of passing away, but those who '
  - type: text
    content: love to
  - type: text
    content: ' '
  - type: note
    content: Implied in the Greek present-tense verb, which means “to continually [habitually] do the will of God.”
  - type: text
    content: do the will of God live forever.
  - type: note
    content: There is an interesting word play in the Aramaic in this verse. The Aramaic word for “world” is alma, and the word for “forever” is alam.
  - type: heading
    content: Believing in Jesus
  '18':
  - type: text
    content: 'Dear children, the end '
  - type: text
    content: of this age
  - type: text
    content: ' is near! You have heard that Antichrist is arising, '
  - type: note
    content: The Greek verb erchomai can be translated “to come,” “to become known,” “to be established,” “to appear,” “to show oneself,” “to arise.”
  - type: text
    content: 'and in fact, many enemies of Christ have already appeared, and this is how we know that we are living in the closing hour '
  - type: text
    content: of this age
  - type: text
    content: '. '
  - type: note
    content: The final hour is John’s description of what Paul describes as the “last days.” The final hour or last days began at Pentecost (Acts 2:16–17; Heb. 1:2). We have been living in the last days for more than two thousand years. In these last days many antichrists will come. They oppose the teachings of Christ, lead people astray, and separate from the true community of Christ followers. There is no one individual named “the antichrist” (or enemy of Christ) in the Bible. (The definite article the is never used in connection to antichrist [or “anti-anointing”].) John tells us that the “spirit of antichrist” has already been in the world (1 John 4:3) and that many antichrists (false teachers who oppose the truth of Christ and have a following) have already come. John’s warning is that we must set our hearts firmly on the truths of Jesus Christ and his Word as protection from the multiple lies that will increasingly try to deceive believers. The words antichrist and antichrists are not found in the book of Revelation but only in 1 and 2 John.
  '19':
  - type: text
    content: For even though they were once a part of us
  - type: text
    content: ', they withdrew from us because they were never really of our number. For if they had truly belonged to us they would have continued with us. '
  - type: note
    content: The Aramaic can be translated “they would have clung to us” or “remained tied to us.”
  - type: text
    content: By leaving our community of believers they made it obvious that they never really belonged to us.
  - type: note
    content: Or “all of them do not belong to us.” Apparently they were not thrown out of the church or excommunicated but left of their own accord. See also 1 John 4:5.
  '2':
  - type: text
    content: 'He is the atoning sacrifice '
  - type: note
    content: Or “satisfaction for our sins,” or “mercy seat.”
  - type: text
    content: for our sins, and not only for ours but also for the sins of the whole world.
  - type: note
    content: 'In these two verses we find three things that Christ is to us: (1) our forgiving Redeemer/Intercessor, (2) the Righteous One who suffered in our place, and (3) the atoning sacrifice for our sins, which cleanses and shelters us.'
  - type: heading
    content: The New Commandment
  '20':
  - type: text
    content: 'But the Holy One has anointed you and you all know '
  - type: text
    content: the truth
  - type: text
    content: '. '
  - type: note
    content: Or “you [have the capacity to] know all things.”
  '21':
  - type: text
    content: So I’m writing to you not because you don’t know the truth, but because you do know it, and no lie belongs to the truth.
  - type: note
    content: Jesus is the new reality and the truth. See John 14:6.
  - type: heading
    content: The Power of the Truth
  '22':
  - type: text
    content: 'Who is the real liar but the one who denies that Jesus is the Christ. He is the real antichrist, the one who denies the Father and the Son. '
  - type: note
    content: We have here the definition of “antichrist.” It is anyone who denies the Son (or denies that Jesus is the anointed Messiah). To deny Christ is to reject the Father, who gave him to us to reveal who the Father truly is. The Father and the Son are one; you cannot receive one and reject the other.
  '23':
  - type: text
    content: 'Whoever rejects the Son rejects the Father. Whoever embraces '
  - type: note
    content: Or “confesses.”
  - type: text
    content: 'the Son embraces the Father also. '
  '24':
  - type: text
    content: 'So you must be sure to keep the message burning '
  - type: note
    content: Or “residing in you.”
  - type: text
    content: 'in your hearts; that is, the message '
  - type: text
    content: of life
  - type: text
    content: ' you heard from the beginning. If you do, you will always be living in close fellowship with the Son and with the Father. '
  '25':
  - type: text
    content: And he himself has promised us the never-ending life of the ages to come!
  '26':
  - type: text
    content: 'I’ve written these things about those who are attempting to lead you astray. '
  '27':
  - type: text
    content: 'But the wonderful anointing you have received from God '
  - type: note
    content: Although absent in the Greek, the words “from God” are found in the Aramaic manuscripts. It is clear from the context that the “anointing” is the Holy Spirit poured into us, bringing life, illumination, wisdom, fruit, and power from the indwelling life of Christ.
  - type: text
    content: is so much greater than their deception and
  - type: text
    content: ' now lives in you. There’s no need for anyone to keep teaching you. '
  - type: note
    content: Or “There is no need for anyone to keep teaching you his opinions [deceptions].” John is not telling them not to continue to be taught the Word of God, for God has placed teachers in the church to instruct us and equip us and bring us into the fullness of Christ (1 Cor. 12:28; Eph. 4:11; Heb. 13:7, 17). John’s warning concerns those who lead us astray by the false doctrines of men. The bride of Christ will always need Holy Spirit-filled teachers who illuminate us in the ways of Christ.
  - type: text
    content: His anointing teaches you all that you need to know, for it will lead you into truth, not a counterfeit. So just as the anointing has taught you, remain in him.
  - type: note
    content: The Greek can be translated “remain in it” (the anointing).
  '28':
  - type: text
    content: And now, dear children, remain in him, so that when he is revealed we may have joyful confidence and not be ashamed when we stand before him at his appearing.
  - type: note
    content: See also Luke 16:3; 2 Cor. 10:8; Phil. 1:20; 1 Peter 4:16.
  '29':
  - type: text
    content: If you know that he is righteous, you may be sure that everyone who lives in righteousness has been divinely fathered by him.
  - type: note
    content: Or “born of him.” Living in righteousness, or doing what is right before God, is the proof that we have been fathered by God himself.
  '3':
  - type: text
    content: 'Here’s how we can be sure that we’ve truly come to know God: if we keep his commands. '
  - type: note
    content: Keeping God’s commands is the proof and evidence of coming to know God, not the means of knowing God.
  '4':
  - type: text
    content: 'If someone claims, “I have come to know God '
  - type: text
    content: by experience
  - type: text
    content: ',” yet doesn’t keep God’s commands, he is a phony and the truth finds no place in him. '
  '5':
  - type: text
    content: But the love of God will be perfected within the one who obeys God’s Word.
  - type: text
    content: 'We can be sure that we’ve truly come to live in '
  - type: text
    content: intimacy with
  - type: text
    content: ' God, '
  '6':
  - type: text
    content: not just by saying, “I am intimate with God,” but by walking in the footsteps of Jesus.
  '7':
  - type: text
    content: 'Beloved, I’m not writing a new commandment to you, but an old one that you had from the beginning, and you’ve already heard it. '
  - type: note
    content: See John 13:34–35.
  '8':
  - type: text
    content: 'Yet, in a sense, it is a new commandment, '
  - type: note
    content: This commandment to love one another is both old and new. It is found in the Old Testament (Lev. 19:18), but it is made radically new and fresh by the teaching of Christ and its application through our lives.
  - type: text
    content: as its truth is made manifest both in Christ and in you, because the darkness is disappearing and the true light is already blazing.
  - type: note
    content: See John 1:5, 9; 8:12. The true light is the revelation of God that shines through Christ. The Aramaic can be translated “The new commandment I write to you became realized in him [Christ] and is in you, destroying the darkness and revealing the light of truth anew.”
  '9':
  - type: text
    content: 'Anyone who says, “I am in the light,” while holding hatred in his heart toward a fellow believer is still in the darkness. '
