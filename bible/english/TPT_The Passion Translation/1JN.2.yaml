document_id: 1JN.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ, Our Answer for Sin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'You are my dear children, and I write these things to you so that you won’t sin. But if anyone does sin, we continually have a forgiving Redeemer '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Advocate.” The Aramaic can be translated “the Redeemer who ends the curse.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 14:16
      metadata:
        usfm: JHN.14.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and the second footnote.
    marker-yv: yv-n
  - type: text
    text: 'who is face-to-face with the Father: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: He is still our Father even when we sin.
    marker-yv: yv-n
  - type: text
    text: 'Jesus Christ, the Righteous One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He is the atoning sacrifice '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “satisfaction for our sins,” or “mercy seat.”
    marker-yv: yv-n
  - type: text
    text: for our sins, and not only for ours but also for the sins of the whole world.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In these two verses we find three things that Christ is to us: (1) our forgiving Redeemer/Intercessor, (2) the Righteous One who suffered in our place, and (3) the atoning sacrifice for our sins, which cleanses and shelters us.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The New Commandment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Here’s how we can be sure that we’ve truly come to know God: if we keep his commands. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Keeping God’s commands is the proof and evidence of coming to know God, not the means of knowing God.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'If someone claims, “I have come to know God '
  - type: usfm
    marker: it
    children:
    - type: text
      text: by experience
  - type: text
    text: ',” yet doesn’t keep God’s commands, he is a phony and the truth finds no place in him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But the love of God will be perfected within the one who obeys God’s Word.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'We can be sure that we’ve truly come to live in '
  - type: usfm
    marker: it
    children:
    - type: text
      text: intimacy with
  - type: text
    text: ' God, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: not just by saying, “I am intimate with God,” but by walking in the footsteps of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Beloved, I’m not writing a new commandment to you, but an old one that you had from the beginning, and you’ve already heard it. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 13:34–35
      metadata:
        usfm: JHN.13.34+JHN.13.35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yet, in a sense, it is a new commandment, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This commandment to love one another is both old and new. It is found in the Old Testament (
    - type: text
      text: Lev. 19:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), but it is made radically new and fresh by the teaching of Christ and its application through our lives.
    marker-yv: yv-n
  - type: text
    text: as its truth is made manifest both in Christ and in you, because the darkness is disappearing and the true light is already blazing.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 1:5
      metadata:
        usfm: JHN.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9'
      metadata:
        usfm: JHN.1.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 8:12
      metadata:
        usfm: JHN.8.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The true light is the revelation of God that shines through Christ. The Aramaic can be translated “The new commandment I write to you became realized in him [Christ] and is in you, destroying the darkness and revealing the light of truth anew.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Anyone who says, “I am in the light,” while holding hatred in his heart toward a fellow believer is still in the darkness. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'But the one who truly loves a fellow believer lives in the light, and there is nothing in him that will cause someone else to stumble. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “no fear of stumbling haunts him” or “there is no trap laid for him.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: But whoever hates a fellow believer lives in the darkness—stumbling around in the dark with no clue where he is going, for he is blinded by the darkness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: John is equating darkness with the absence of love. To love is to walk in God’s light. To hate is to walk in darkness.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Three Stages of Spiritual Maturity
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I remind you, dear children: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “child,”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: teknion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', is a child still in training (under instruction), with an implication of servanthood.'
    marker-yv: yv-n
  - type: text
    text: your sins have been permanently removed because of the power of his name.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, through faith in who Christ is and what he has done to redeem us through the blood of his sacrifice.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I remind you, fathers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and mothers
  - type: text
    text: ': '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Fathers and mothers (parents) are not necessarily “old men” and “old women,” but those who reproduce and raise children.
    marker-yv: yv-n
  - type: text
    text: you have a relationship with the One who has existed from the beginning.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Christ. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 1:1
      metadata:
        usfm: JHN.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 John 1:1–3
      metadata:
        usfm: 1JN.1.1+1JN.1.2+1JN.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Nothing more is said about fathers and mothers other than knowing Christ, for what could be more important than that?
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'And I remind you, young people: you have defeated the Evil One.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Our enemy, Satan, is defeated through our union with Christ as we share in the triumphs of his cross and resurrection, the word of our testimony, the blood of the Lamb, and by not loving our own lives. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 12:10
      metadata:
        usfm: REV.12.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I write these things to you, dear children, because you truly have a relationship with the Father. I write these things, fathers '
  - type: usfm
    marker: it
    children:
    - type: text
      text: and mothers
  - type: text
    text: ', because you have had a true relationship with him who is from the beginning. And I write these things, young people, because you are strong, the Word of God is treasured in your hearts, and you have defeated the Evil One.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'John gives young people (in Hebrew culture this would be anyone under forty) the three main components of spiritual growth: (1) courageous faith, (2) loving the Word of God, and (3) defeating the Evil One through our union with Christ.'
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Warning Not to Love the World
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Don’t set the affections of your heart on this world '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Stop loving the world system” (the ways of the world).
    marker-yv: yv-n
  - type: text
    text: 'or in loving the things of the world. The love of the Father and the love of the world are incompatible. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If anyone persists in loving the world, there is no love for the Father in him.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For all that the world can offer us—the gratification of our flesh, the allurement of the things of the world, and the obsession with status and importance '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These are the three areas of temptation that the serpent used with Adam and Eve in the garden to pull them away from the Father and what the devil used to tempt Jesus in the wilderness. He is an expert at using these cravings to dilute our love for the Father and cause us to turn our affections to the things of this life. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 3:6
      metadata:
        usfm: GEN.3.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 4:1–11
      metadata:
        usfm: MAT.4.1+MAT.4.2+MAT.4.3+MAT.4.4+MAT.4.5+MAT.4.6+MAT.4.7+MAT.4.8+MAT.4.9+MAT.4.10+MAT.4.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . But the values of the kingdom of God are setting our affections on things above, living in the fruit of the Spirit (self-control), and humility, which always waits for God’s timing for promotion.
    marker-yv: yv-n
  - type: text
    text: '—none of these things come from the Father but from the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This world '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the world system and the desire to be in a world system that leaves God out of the picture are disappearing. Planet earth is not fading away here, but the systems, structure, and world order are.
    marker-yv: yv-n
  - type: text
    text: 'and its desires are in the process of passing away, but those who '
  - type: usfm
    marker: it
    children:
    - type: text
      text: love to
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Implied in the Greek present-tense verb, which means “to continually [habitually] do the will of God.”
    marker-yv: yv-n
  - type: text
    text: do the will of God live forever.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is an interesting word play in the Aramaic in this verse. The Aramaic word for “world” is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and the word for “forever” is'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Believing in Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dear children, the end '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of this age
  - type: text
    text: ' is near! You have heard that Antichrist is arising, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: erchomai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: can be translated “to come,” “to become known,” “to be established,” “to appear,” “to show oneself,” “to arise.”
    marker-yv: yv-n
  - type: text
    text: 'and in fact, many enemies of Christ have already appeared, and this is how we know that we are living in the closing hour '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of this age
  - type: text
    text: '. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The final hour is John’s description of what Paul describes as the “last days.” The final hour or last days began at Pentecost (
    - type: usfm
      marker: ref
      children:
      - type: text
