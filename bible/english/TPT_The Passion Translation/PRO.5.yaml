document_id: PRO.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Avoid Promiscuity
  - type: text
    content: Listen to me, my son,
  - type: text
    content: for I know what I’m talking about.
  - type: text
    content: Listen carefully to my advice
  '10':
  - type: text
    content: Why would you let strangers take away your strength
  - type: note
    content: Or “wealth.” This could also refer to spiritual strength and wealth.
  - type: text
    content: while the labors of your house go to someone else?
  '11':
  - type: text
    content: For when you grow old you will groan in anguish and shame
  - type: note
    content: The Hebrew word translated here as “groan” is also used for the roar of a lion or the ocean’s roar.
  - type: text
    content: as sexually transmitted diseases consume your body.
  - type: note
    content: Implied in the context of the topic of sexual promiscuity. The Hebrew word here means “diseases.”
  '12':
  - type: text
    content: And then finally you’ll admit that you were wrong and say,
  - type: text
    content: “If only I had listened to wisdom’s voice
  - type: text
    content: and not stubbornly demanded my own way,
  - type: text
    content: because my heart hated to be told what to do!
  '13':
  - type: text
    content: Why didn’t I take seriously the warning of my wise counselors?
  - type: text
    content: Why was I so stupid to think that I could get away with it?
  '14':
  - type: text
    content: Now I’m totally disgraced and my life is ruined!
  - type: text
    content: I’m paying the price—
  - type: text
    content: for the people of the congregation are now my judges.”
  - type: note
    content: See John 8:1–11.
  - type: heading
    content: Sex Reserved for Marriage
  '15':
  - type: text
    content: My son, share your love with your wife alone.
  - type: text
    content: Drink from her well of pleasure and from no other.
  '16':
  - type: text
    content: Why would you have sex with a stranger
  - type: text
    content: or with anyone other than her?
  '17':
  - type: text
    content: Reserve this pleasure for you and her alone and do not share it with another.
  - type: note
    content: Because of the sudden change in the Hebrew text to the masculine gender (“stranger” or “another”), there is an inference that men having sex with men is forbidden, as well as sex with a woman who is not your wife.
  '18':
  - type: text
    content: Your sex life will be blessed
  - type: note
    content: The Hebrew phrase used here includes the word fountain, which is an obvious metaphor for the sex act. The root word for fountain can also refer to the eyes. It may be a poetic subtlety that your eyes should only be on your wife, not on the nakedness of another. See v. 19.
  - type: text
    content: as you take joy and pleasure in the wife of your youth.
  '19':
  - type: text
    content: Let her breasts be your satisfaction,
  - type: note
    content: The Hebrew includes a picturesque metaphor of the wife being like a “friendly deer and a favored filly.”
  - type: text
    content: 'and let her embrace '
  - type: note
    content: The Septuagint reads “let her share conversation with you.”
  - type: text
    content: intoxicate you at all times.
  - type: text
    content: Be continually delighted and ravished with her love!
  '2':
  - type: text
    content: so that wisdom and discernment will enter your heart,
  - type: text
    content: and then the words you speak will express what you’ve learned.
  '20':
  - type: text
    content: My son, why would you be exhilarated by an adulteress—
  - type: text
    content: 'by embracing a woman '
  - type: note
    content: Or “breasts.”
  - type: text
    content: who is not yours?
  '21':
  - type: text
    content: For God sees everything you do and his eyes are wide open
  - type: text
    content: as he observes every single habit you have.
  '22':
  - type: text
    content: Beware that your sins don’t overtake you
  - type: text
    content: and that the scars of your own conscience don’t
  - type: text
    content: become the ropes that tie you up.
  '23':
  - type: text
    content: Those who choose wickedness die for lack of self-control,
  - type: text
    content: for their foolish ways lead them astray,
  - type: text
    content: carrying them away as hostages—
  - type: text
    content: kidnapped captives robbed of destiny
  - type: text
    content: .
  '3':
  - type: text
    content: 'Remember this:'
  - type: text
    content: 'The lips of a seductress '
  - type: note
    content: Some Jewish expositors view this “seductress” as a metaphor for heresy. She seduces, deceives, and drags to hell. For the believer, the seductress can be a picture of the false anointing of the religious spirit that attempts to seduce us, weaken our message, and rob the anointing of God from our ministries. Of course, there is also a clear and dire warning for all to stay sexually pure or face the consequences.
  - type: text
    content: seem sweet like honey,
  - type: text
    content: and her smooth words are like music in your ears.
  '4':
  - type: text
    content: 'But I promise you this:'
  - type: text
    content: In the end all you’ll be left with is a bitter conscience.
  - type: note
    content: Or “conscience bitter as wormwood.” See Rev. 8:10–11.
  - type: text
    content: For the sting of your sin will pierce your soul like a sword.
  '5':
  - type: text
    content: She will ruin your life, drag you down to death,
  - type: text
    content: and lead you straight to hell.
  - type: note
    content: 'Or “Sheol.” This is the Aramaic and Hebrew word for the place of the dead. The Greeks called it Hades. Sheol is not eternal: it will be destroyed. See Hos. 13:14 and Rev. 20:14.'
  '6':
  - type: text
    content: She has prevented many from considering the paths of life.
  - type: text
    content: Yes, she will take you with her where you don’t want to go,
  - type: text
    content: sliding down a slippery road
  - type: text
    content: and not even realizing where the two of you will end up!
  '7':
  - type: text
    content: Listen to me, young men,
  - type: text
    content: and don’t forget this one thing I’m telling you—
  - type: text
    content: run away from her as fast as you can!
  '8':
  - type: text
    content: Don’t even go near the door of her house
  - type: text
    content: unless you want to fall into her seduction.
  '9':
  - type: text
    content: In disgrace you will relinquish your honor to another,
  - type: text
    content: and all your remaining years will be squandered—
  - type: text
    content: given over to the cruel one.
  - type: note
    content: This would be the devil, who torments the conscience as the result of this sin.
