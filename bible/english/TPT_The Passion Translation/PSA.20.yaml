document_id: PSA.20
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: A Victory Decree
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: For the end times, by David
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The inscription for
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Pss. 20–22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is “For the end times,” as translated from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: May God Hear You
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In your day of danger may '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' answer and deliver you.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'May the name of the God of Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jacob was one transformed by God’s grace, changed from a schemer who took from others into Israel, God’s prince.
    marker-yv: yv-n
  - type: text
    text: set you safely on high!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: May supernatural help be sent from his sanctuary.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May he support you from Zion’s fortress!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: May he remember every gift you have given him
- type: usfm
  marker: q1
  children:
  - type: text
    text: and celebrate every sacrifice of love you have shown him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “May he consider your burnt offerings generous.”
    marker-yv: yv-n
- type: usfm
  marker: qr
  children:
  - type: usfm
    marker: qs
    children:
    - type: text
      text: Pause in his presence
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'May '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' give you every desire of your heart'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and carry out your every plan '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as you go to battle
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: When you succeed, we will celebrate and shout for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Flags will fly when victory is yours!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yes, God will answer your prayers, and we will praise him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I know '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' gives me all that I ask for'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and brings victory to his anointed king.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My deliverance cry will be heard in his holy heaven.
- type: usfm
  marker: q1
  children:
  - type: text
    text: By his mighty hand miracles will manifest
- type: usfm
  marker: q1
  children:
  - type: text
    text: through his saving strength.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Some find their strength in their weapons and wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but my miracle-deliverance can never be won by men.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Our boast is in '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' our God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: who makes us strong and gives us victory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Our enemies will not prevail; they will only collapse and
- type: usfm
  marker: q1
  children:
  - type: text
    text: perish in defeat while we will rise up, full of courage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Give victory to our king, O  '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The day we call on you, give us your answer!
