document_id: PSA.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Victory Decree
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: For the end times, by David
  - type: note
    content: The inscription for Pss. 20–22 is “For the end times,” as translated from the Septuagint.
  - type: heading
    content: May God Hear You
  - type: text
    content: 'In your day of danger may '
  - type: text
    content: Yahweh
  - type: text
    content: ' answer and deliver you.'
  - type: text
    content: 'May the name of the God of Jacob '
  - type: note
    content: Jacob was one transformed by God’s grace, changed from a schemer who took from others into Israel, God’s prince.
  - type: text
    content: set you safely on high!
  '2':
  - type: text
    content: May supernatural help be sent from his sanctuary.
  - type: text
    content: May he support you from Zion’s fortress!
  '3':
  - type: text
    content: May he remember every gift you have given him
  - type: text
    content: and celebrate every sacrifice of love you have shown him.
  - type: note
    content: Or “May he consider your burnt offerings generous.”
  - type: text
    content: Pause in his presence
  '4':
  - type: text
    content: 'May '
  - type: text
    content: Yahweh
  - type: text
    content: ' give you every desire of your heart'
  - type: text
    content: 'and carry out your every plan '
  - type: text
    content: as you go to battle
  - type: text
    content: .
  '5':
  - type: text
    content: When you succeed, we will celebrate and shout for joy.
  - type: text
    content: Flags will fly when victory is yours!
  - type: text
    content: Yes, God will answer your prayers, and we will praise him!
  '6':
  - type: text
    content: 'I know '
  - type: text
    content: Yahweh
  - type: text
    content: ' gives me all that I ask for'
  - type: text
    content: and brings victory to his anointed king.
  - type: text
    content: My deliverance cry will be heard in his holy heaven.
  - type: text
    content: By his mighty hand miracles will manifest
  - type: text
    content: through his saving strength.
  '7':
  - type: text
    content: Some find their strength in their weapons and wisdom,
  - type: text
    content: but my miracle-deliverance can never be won by men.
  - type: text
    content: 'Our boast is in '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God,'
  - type: text
    content: who makes us strong and gives us victory!
  '8':
  - type: text
    content: Our enemies will not prevail; they will only collapse and
  - type: text
    content: perish in defeat while we will rise up, full of courage.
  '9':
  - type: text
    content: 'Give victory to our king, O  '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: text
    content: The day we call on you, give us your answer!
