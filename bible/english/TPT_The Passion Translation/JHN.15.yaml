document_id: JHN.15,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus the Living Vine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am a true sprouting vine, and the farmer who tends the vine is my Father.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you keep my commands, you will live in my love, just as I have kept my Father’s commands, for I continually live nourished and empowered by his love.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My purpose for telling you these things is so that the joy that I experience will fill your hearts with overflowing gladness!
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“So this is my command: Love each other deeply, as much as I have loved you.'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because we are all branches in one vine, if we don’t love one another it means that our fellowship with the vine has been cut off. To bear fruit must come from loving each other, for the same Christ-life lives within every believer. We are not branches of many trees, but of one vine.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For the greatest love of all is a love that sacrifices all. And this great love is demonstrated when a person sacrifices his life
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “willingly lay down his soul for his friends.” The Aramaic word for “friends” is actually “family” or “relatives.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for his friends.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You show that you are my intimate friends when you obey
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek verb indicates “if you keep on obeying as a habit.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: all
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is translated “all”; the Greek is translated “what I command you.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that I command you.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have never called you ‘servants,’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “I will no longer call you servants.” The Greek word for “servants” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: doulos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “slaves.”'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because a master doesn’t confide in his servants, and servants don’t always understand what the master is doing. But I call you my most intimate and cherished friends,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Both the Aramaic and Greek word for “intimate friends” is actually “those cared for from the womb.” You are more than a friend to him, for you were born again from his wounded side.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: for I reveal to you everything that I’ve heard from my Father.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You didn’t choose me, but I’ve chosen
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “I have invited you” (as dinner guests).
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and commissioned you to go into the world
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This could mean “to go on into maturity” (character), or “to go into the world” (ministry). However, the “choosing” and “commissioning” infers the latter.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to bear fruit. And your fruit will last, because whatever you ask of my Father, for my sake,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in my name.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: he will give it to you!
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'So this is my parting command: Love one another deeply!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True Disciples Can Expect Persecution
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Just remember, when the unbelieving world hates you, they first hated me.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If you were to give your allegiance to the world, they would love and welcome you as one of their own. But because you won’t align yourself with the values of this world, they will hate you. I have chosen you and taken you out of the world to be mine.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He cares for the branches connected to me by lifting and propping up the fruitless branches
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek phrase can also be translated “he takes up [to himself] every fruitless branch.” He doesn’t remove these branches, but he takes them to himself. As the wise and loving farmer, he lifts them up off the ground to enhance their growth. In the context, Christ’s endless love for his disciples on the last night of his life on earth seems to emphasize God’s love even for those who fail and disappoint him. Peter’s denial didn’t bring rejection from Jesus.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and pruning
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “pruning,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kathairo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', can also mean “cleansing.”'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: every fruitful branch to yield a greater harvest.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So remember what I taught you, that a servant isn’t superior to his master.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “redeemer.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And since they persecuted me, they will also persecute you. And if they obey my teachings, they will also obey yours.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They will treat you this way because you are mine,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “because of my name.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they don’t know the One who sent me.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If I had not come and spoken these things to the unbelieving world, they would not feel the guilt of their sin, but now their sin is left uncovered.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If anyone hates me, they hate my Father also.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I had not performed miracles in their presence like no one else has done, they would not feel the guilt of their sins. But now, they have seen and hated both me and my Father.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
