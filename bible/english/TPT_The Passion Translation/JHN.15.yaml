document_id: JHN.15,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus the Living Vine
  - type: text
    content: “I am a true sprouting vine, and the farmer who tends the vine is my Father.
  - type: text
    content: ' '
  '10':
  - type: text
    content: If you keep my commands, you will live in my love, just as I have kept my Father’s commands, for I continually live nourished and empowered by his love.
  - type: text
    content: ' '
  '11':
  - type: text
    content: My purpose for telling you these things is so that the joy that I experience will fill your hearts with overflowing gladness!
  '12':
  - type: text
    content: '“So this is my command: Love each other deeply, as much as I have loved you.'
  - type: text
    content: ' '
  - type: note
    content: Because we are all branches in one vine, if we don’t love one another it means that our fellowship with the vine has been cut off. To bear fruit must come from loving each other, for the same Christ-life lives within every believer. We are not branches of many trees, but of one vine.
  '13':
  - type: text
    content: For the greatest love of all is a love that sacrifices all. And this great love is demonstrated when a person sacrifices his life
  - type: text
    content: ' '
  - type: note
    content: Or “willingly lay down his soul for his friends.” The Aramaic word for “friends” is actually “family” or “relatives.”
  - type: text
    content: for his friends.
  '14':
  - type: text
    content: “You show that you are my intimate friends when you obey
  - type: text
    content: ' '
  - type: note
    content: The Greek verb indicates “if you keep on obeying as a habit.”
  - type: text
    content: all
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is translated “all”; the Greek is translated “what I command you.”
  - type: text
    content: that I command you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: I have never called you ‘servants,’
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic. The Greek is “I will no longer call you servants.” The Greek word for “servants” is doulos, which means “slaves.”
  - type: text
    content: because a master doesn’t confide in his servants, and servants don’t always understand what the master is doing. But I call you my most intimate and cherished friends,
  - type: text
    content: ' '
  - type: note
    content: Both the Aramaic and Greek word for “intimate friends” is actually “those cared for from the womb.” You are more than a friend to him, for you were born again from his wounded side.
  - type: text
    content: for I reveal to you everything that I’ve heard from my Father.
  - type: text
    content: ' '
  '16':
  - type: text
    content: You didn’t choose me, but I’ve chosen
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is “I have invited you” (as dinner guests).
  - type: text
    content: and commissioned you to go into the world
  - type: text
    content: ' '
  - type: note
    content: This could mean “to go on into maturity” (character), or “to go into the world” (ministry). However, the “choosing” and “commissioning” infers the latter.
  - type: text
    content: to bear fruit. And your fruit will last, because whatever you ask of my Father, for my sake,
  - type: text
    content: ' '
  - type: note
    content: Or “in my name.”
  - type: text
    content: he will give it to you!
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'So this is my parting command: Love one another deeply!”'
  - type: heading
    content: True Disciples Can Expect Persecution
  '18':
  - type: text
    content: “Just remember, when the unbelieving world hates you, they first hated me.
  - type: text
    content: ' '
  '19':
  - type: text
    content: If you were to give your allegiance to the world, they would love and welcome you as one of their own. But because you won’t align yourself with the values of this world, they will hate you. I have chosen you and taken you out of the world to be mine.
  - type: text
    content: ' '
  '2':
  - type: text
    content: He cares for the branches connected to me by lifting and propping up the fruitless branches
  - type: text
    content: ' '
  - type: note
    content: The Greek phrase can also be translated “he takes up [to himself] every fruitless branch.” He doesn’t remove these branches, but he takes them to himself. As the wise and loving farmer, he lifts them up off the ground to enhance their growth. In the context, Christ’s endless love for his disciples on the last night of his life on earth seems to emphasize God’s love even for those who fail and disappoint him. Peter’s denial didn’t bring rejection from Jesus.
  - type: text
    content: and pruning
  - type: text
    content: ' '
  - type: note
    content: The Greek word for “pruning,” kathairo, can also mean “cleansing.”
  - type: text
    content: every fruitful branch to yield a greater harvest.
  - type: text
    content: ' '
  '20':
  - type: text
    content: So remember what I taught you, that a servant isn’t superior to his master.
  - type: text
    content: ' '
  - type: note
    content: Or “redeemer.” See John 13:16.
  - type: text
    content: And since they persecuted me, they will also persecute you. And if they obey my teachings, they will also obey yours.
  - type: text
    content: ' '
  '21':
  - type: text
    content: They will treat you this way because you are mine,
  - type: text
    content: ' '
  - type: note
    content: Or “because of my name.”
  - type: text
    content: and they don’t know the One who sent me.
  '22':
  - type: text
    content: “If I had not come and spoken these things to the unbelieving world, they would not feel the guilt of their sin, but now their sin is left uncovered.
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic.
  '23':
  - type: text
    content: If anyone hates me, they hate my Father also.
  - type: text
    content: ' '
  '24':
  - type: text
    content: If I had not performed miracles in their presence like no one else has done, they would not feel the guilt of their sins. But now, they have seen and hated both me and my Father.
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'And all of this has happened to fulfill what is written in their Scriptures:'
  - type: text
    content: ' '
  - type: note
    content: Or “written in their law.”
  - type: text
    content: They hated me for no reason.
  - type: note
    content: See Pss. 35:19; 69:4.
  '26':
  - type: text
    content: “And I will send you the Divine Encourager
  - type: text
    content: ' '
  - type: note
    content: Or “Redeemer from the curse.” See the second footnote on John 14:16–17.
  - type: text
    content: from the very presence of my Father. He will come to you, the Spirit of Truth, emanating from the Father, and he will speak
  - type: text
    content: ' '
  - type: note
    content: Or “provide evidence.”
  - type: text
    content: to you about me.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And you will tell everyone the truth about me, for you have walked with me from the start.”
  '3':
  - type: text
    content: The words I have spoken over you have already cleansed
  - type: text
    content: ' '
  - type: note
    content: Or “pruned.”
  - type: text
    content: you.
  - type: text
    content: ' '
  '4':
  - type: text
    content: So you must remain in life-union with me,
  - type: text
    content: ' '
  - type: note
    content: Or “grafted into me.”
  - type: text
    content: for I remain in life-union with you. For as a branch severed from the vine will not bear fruit, so your life will be fruitless unless you live your life intimately joined to mine.
  '5':
  - type: text
    content: “I am the sprouting vine and you’re my branches.
  - type: text
    content: ' '
  - type: note
    content: See Isa. 4:2; 11:1–2; Rev. 1:20. The branch of the Lord is now Christ living in his people, branching out through them. The church is now his lampstand with seven branches.
  - type: text
    content: As you live in union with me as your source, fruitfulness will stream from within you—but when you live separated from me you are powerless.
  - type: text
    content: ' '
  '6':
  - type: text
    content: If a person is separated from me, he is discarded; such branches are gathered up and thrown into the fire to be burned.
  - type: text
    content: ' '
  '7':
  - type: text
    content: But if you live in life-union with me and if my words
  - type: text
    content: ' '
  - type: note
    content: This is the Greek word rhema, which refers to the spoken words, or the sayings, of God.
  - type: text
    content: live powerfully
  - type: text
    content: ' '
  - type: note
    content: The Aramaic is translated “my words take hold (are strong) within you.”
  - type: text
    content: within you—then you can ask
  - type: text
    content: ' '
  - type: note
    content: Or “demand” or “insist.”
  - type: text
    content: whatever you desire and it will be done.
  - type: text
    content: ' '
  '8':
  - type: text
    content: When your lives bear abundant fruit, you demonstrate that you are my mature disciples who glorify my Father!
  '9':
  - type: text
    content: “I love each of you with the same love that the Father loves me. You must continually let my love nourish your hearts.
  - type: text
    content: ' '
