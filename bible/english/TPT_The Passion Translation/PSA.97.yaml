document_id: PSA.97
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God Rules Over All
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of David when his kingdom was established
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '97'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This inscription is from the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' now reigns as King! Let everyone rejoice!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: His rule extends everywhere, even to distant lands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the islands of the sea, let them all be glad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Clouds both dark and mysterious now surround him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 97:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 5:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: His throne of glory rests upon
- type: usfm
  marker: q1
  children:
  - type: text
    text: a foundation of righteousness and justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All around him burns a blazing glory-fire consuming all his foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: When his lightning strikes, it lights up the world.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People are wide-eyed as they tremble and shake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mountains melt away like wax in a fire
- type: usfm
  marker: q1
  children:
  - type: text
    text: when the Lord of all the earth draws near.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Heaven’s messengers preach righteousness, and
- type: usfm
  marker: q1
  children:
  - type: text
    text: people everywhere see God’s glory in the sky!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Shame covers all who boast in other gods, for they worship idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For all the supernatural powers once worshiped
- type: usfm
  marker: q1
  children:
  - type: text
    text: the true and living God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But God’s Zion-people are content,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they know and hear the truth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The people of praise rejoice over all your judgments, O Lord!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For you are King-God, the Most High God over all the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are exalted above every supernatural power!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Listen, you lovers of God! Hate evil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for God can keep you from wrong
- type: usfm
  marker: q1
  children:
  - type: text
    text: and protect you from the power of wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For he sows seeds of light within his devoted lovers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and seeds of joy burst forth for the lovers of God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So be glad and continue to give him thanks,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for God’s holiness is seen in everything he does.
