document_id: PSA.97,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Rules Over All
  - type: text
    content: A psalm of David when his kingdom was established
  - type: note
    content: This inscription is from the Septuagint.
  - type: text
    content: Yahweh
  - type: text
    content: ' now reigns as King! Let everyone rejoice!'
  - type: text
    content: His rule extends everywhere, even to distant lands,
  - type: text
    content: and the islands of the sea, let them all be glad.
  '10':
  - type: text
    content: Listen, you lovers of God! Hate evil,
  - type: text
    content: for God can keep you from wrong
  - type: text
    content: and protect you from the power of wickedness.
  '11':
  - type: text
    content: For he sows seeds of light within his devoted lovers,
  - type: text
    content: and seeds of joy burst forth for the lovers of God!
  '12':
  - type: text
    content: So be glad and continue to give him thanks,
  - type: text
    content: for God’s holiness is seen in everything he does.
  '2':
  - type: text
    content: Clouds both dark and mysterious now surround him.
  - type: note
    content: See Deut. 4:11; 5:22.
  - type: text
    content: His throne of glory rests upon
  - type: text
    content: a foundation of righteousness and justice.
  '3':
  - type: text
    content: All around him burns a blazing glory-fire consuming all his foes.
  '4':
  - type: text
    content: When his lightning strikes, it lights up the world.
  - type: text
    content: People are wide-eyed as they tremble and shake.
  '5':
  - type: text
    content: Mountains melt away like wax in a fire
  - type: text
    content: when the Lord of all the earth draws near.
  '6':
  - type: text
    content: Heaven’s messengers preach righteousness, and
  - type: text
    content: people everywhere see God’s glory in the sky!
  '7':
  - type: text
    content: Shame covers all who boast in other gods, for they worship idols.
  - type: text
    content: For all the supernatural powers once worshiped
  - type: text
    content: the true and living God.
  '8':
  - type: text
    content: But God’s Zion-people are content,
  - type: text
    content: for they know and hear the truth.
  - type: text
    content: The people of praise rejoice over all your judgments, O Lord!
  '9':
  - type: text
    content: For you are King-God, the Most High God over all the earth.
  - type: text
    content: You are exalted above every supernatural power!
