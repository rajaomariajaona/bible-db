  '9':
  - type: text
    content: When they suffered, he suffered with them.
  - type: text
    content: The Angel of His Presence saved them.
  - type: note
    content: Or “Neither an elder or an angel, but the Lord himself saved them.” See Ex. 23:20–23; 33:14–15; Deut. 4:37. “The Angel of His Presence” is literally “the Angel of His Faces.” God has many faces that he reveals to his people. Most scholars conclude that this phrase, a hapax legomenon, does not refer to one of the angelic host but to the Lord himself. Others see this angel as Gabriel, for he is described as the angel who comes from the presence (face) of God (see Luke 1:19).
  - type: text
