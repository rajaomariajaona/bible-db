  - type: text
    content: Why are you withholding from us
  - type: text
    content: 'your feelings '
  - type: note
    content: Or “yearnings.” God has deep feelings toward us, for the Hebrew is literally “[Don’t hold back] the agitation of your intestines.”
  - type: text
