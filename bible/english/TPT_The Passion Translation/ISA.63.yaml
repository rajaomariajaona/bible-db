  '4':
  - type: text
    content: 'For a day of vengeance '
  - type: note
    content: The “day of vengeance” has multiple applications. It can refer to the release of the Jews from Babylon, the release of the church from the Dark Ages, the release of creation from the bondage of corruption brought by sin (see Rom. 8:19–21), or, as some would claim, the future battle of Armageddon. But the context favors an interpretation that this prophecy was fulfilled when Jesus Christ was crucified and rendered judgment on principalities and powers by the blood of his cross and his triumphant resurrection.
  - type: text
    content: was in my heart,
  - type: text
    content: and the time for my redeeming work had come.
  '5':
  - type: text
    content: I looked, but there was no one to help me.
  - type: text
    content: I was amazed that there was no one to support me.
  - type: text
    content: 'So my own power '
  - type: note
    content: Or “my own arm,” a symbol of God’s power.
  - type: text
    content: accomplished salvation,
  - type: text
    content: 'and my wrath '
  - type: note
    content: 'Some Hebrew manuscripts have weṣidqathi: “My victorious [right hand] sustained me.”'
  - type: text
    content: sustained me.
