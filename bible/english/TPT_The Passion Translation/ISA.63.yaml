  - type: text
    content: Yahweh
  - type: text
    content: ', why do you allow us '
  - type: note
    content: The Hebrew word is tatenu (“make us”). Similar to the tolerative form of the Hiphil of ta’ah in Jer. 50:6, it is best seen as “allow us” versus causative, in its usual form, “make us.”
