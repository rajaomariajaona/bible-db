  '1':
  - type: heading
    content: The Day of Vengeance
  - type: text
    content: 'Who is this coming from the city of Bozrah '
  - type: note
    content: Bozrah means “sheepfold” or “fortress.”
  - type: text
    content: in Edom?
  - type: note
    content: Although Edom was an ancient kingdom in Transjordan, the general consensus of scholars is that Edom here is a symbolic term for the enemies of God—a collective archetype of that which stands in God’s way. It is possible, since Edom is a variant form of Adam, sharing the same Hebrew root, that we are seeing how God triumphs over “Adam” by the crimson blood of the Last Adam, Jesus Christ. Additionally, the Edomites were bitter enemies of the Jews and typify the warfare of the flesh versus the spirit (see Gal. 5:17). Isaiah saw this mystery man coming on the road from Bozrah to Zion, clothed in crimson garments, having conquered his enemies, not weary or fainting. He came in the greatness of his strength.
  - type: text
    content: He is dressed in garments of bright scarlet,
  - type: note
    content: Or “majestic in attire.”
  - type: text
    content: robed in a garment dyed bright red,
  - type: text
    content: 'marching '
  - type: text
    content: like a champion
  - type: text
    content: ' in his great power and might.'
  - type: text
    content: “It is I! I am the one who announces righteousness,
  - type: text
    content: 'I am mighty '
  - type: text
    content: and ready
  - type: text
    content: ' to save!”'
  - type: note
    content: This points to Jesus Christ, who is mighty to save those who come to him in faith. Alone, he conquered sin, death, Satan, sickness, fear, and the grave. Isaiah’s focus seems to be on the finished work of Jesus on the cross. See John 19:30; Eph. 1:20–23; Col. 2:15; 1 John 2:14–18.
  '10':
  - type: text
    content: But they rebelled against him
  - type: text
    content: and grieved his Holy Spirit.
  - type: note
    content: The Holy Spirit has feelings that can be hurt, leaving him grieved. See Gen. 6:6; Ps. 78:40; Eph. 4:30.
  - type: text
    content: Only then did he turn against them.
  - type: text
    content: He became their enemy and fought against them.
  - type: heading
