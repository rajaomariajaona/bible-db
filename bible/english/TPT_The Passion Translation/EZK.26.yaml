type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Tyre
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 26:1–28:19 is the eleventh panel (K) in the chiastic parallel structure in Ezekiel. This section is the second of three panels that contain oracles of judgment against the nations. This section contains the climactic oracle of judgment against the nation of Tyre. In Ezekiel’s prophecy, Tyre is the embodiment of blasphemous arrogance, the personification of satanic pride—the quintessential heart of idolatry. Panel K is the central panel, or locus, of the chiasmus as it demonstrates the climactic judgment of Yahweh against the most godless of nations at the time of Ezekiel. This judgment marks the turning point of the prophecy in that it highlights the pinnacle of God’s anger against gross idolatry and rebellion against Yahweh. It is a judgment that is climactic and irreversible. From this point on, principally after the judgments against Sidon and Egypt (panel J1—28:20–32:32), chs. 33–48 (panels I1 through A1) emphasize the glorious provisions of God’s promised renewal, spiritual transformation, and everlasting forgiveness of sin, encapsulated in the provisions of the coming new covenant and the certainty of the promise of the arrival of the Messiah, Jesus Christ, the Son of God, on earth. Chapters 26–28 contain prophecies of judgment against Tyre. The city of Tyre was a prosperous commercial center situated north of Israel on an island in the Mediterranean Sea just off the coast of Phoenicia (see Josh. 19:29). Tyre and her sister city, Sidon, had significant influence on the Northern Kingdom of Israel. Jezebel, wife of Ahab, came from Tyre (see 1 Kings 16:31). Tyre was a city of trade and commerce. Hiram, king of Tyre, was a devoted friend to King David (see 2 Sam. 5:11) and helped him and King Solomon in their building operations (see 1 Kings 5:1–12; 1 Chron. 14:1; 2 Chron. 2:3, 11). The god of Tyre was Melkart, an idol with hands outstretched to receive human blood. Located today in modern Lebanon, Tyre has become a historical example of what happens to a people that mock Israel’s God. Tyre’s worldwide trading empire represents the principle of the love of money, trafficking, and merchandising—the pride of the satanic world system.
  - type: text
    content: 'On the first day of the month '
  - type: note
    content: The dating of this prophecy is incomplete because it does not specify what month of the year. Some translations leave a gap, assuming it is missing from the manuscripts. It is difficult to know what month Ezekiel received this prophecy; however, Jewish scholars conclude it was the fifth month since it was the month that Jerusalem fell.
  - type: text
    content: 'in the eleventh year '
  - type: text
    content: of our captivity
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me and said: '
  '10':
  - type: text
    content: You’ll be covered with dust from their many horses and chariots.
  - type: text
    content: Your walls will shake at the rumble of their chariot wheels.
  - type: text
    content: His thundering horses will make your walls tremble
  - type: text
    content: as they storm through your gates and breach your walls.
  '11':
  - type: text
    content: With galloping horses they will trample through every street
  - type: text
    content: and slaughter your people with the sword!
  - type: text
    content: 'They will throw your mighty pillars '
  - type: note
    content: Or “the pillars of your strength.” This is likely a reference to the famous pillars of the Temple of Heracles in Tyre.
  - type: text
    content: to the ground.
  '12':
  - type: text
    content: Your enemies will take for themselves your valuable possessions
  - type: text
    content: and loot your merchandise.
  - type: text
    content: They will break down your walls and destroy your luxurious homes.
  - type: note
    content: Or “the houses of your desire.”
  - type: text
    content: And they will hurl the rubble and timber into the sea.
  '13':
  - type: text
    content: I will silence the sound of your songs,
  - type: text
    content: and the music of your stringed instruments will not be heard again.
  '14':
  - type: text
    content: I will reduce you to a bare rock
  - type: text
    content: where fishermen dry their nets,
  - type: text
    content: never to be rebuilt.
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken, and I have decreed it.”'
  - type: heading
    content: Lament over Tyre
  '15':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to Tyre: “Surely, the islands will quake with fear at the sound of your fall. They will hear the groan of your wounded when your slaughter takes place. '
  '16':
  - type: text
    content: 'All the princes of the sea '
  - type: note
    content: That is, the leaders of the islands and seacoast nations that traded with Tyre.
  - type: text
    content: 'will vacate their thrones, laying aside their regal robes and embroidered cloaks. They will clothe themselves with trembling as they sit on the ground, stunned at your fate. '
  '17':
  - type: text
    content: 'This is the funeral song they will sing over you:'
  - type: text
    content: “ ‘How you have vanished from the seas,
  - type: text
    content: O famous city, once a sea power with many people!
  - type: text
    content: You inspired great terror
  - type: text
    content: in all those who lived in her.
  '18':
  - type: text
    content: Now, on the day of your fall,
  - type: text
    content: the islands and coasts are trembling with fear.
  - type: text
    content: They are paralyzed with great fear,
  - type: text
    content: because Tyre has vanished completely!’ ”
  - type: heading
    content: Tyre Will Go Down to the Abyss
  '19':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “When I make you a place of ruins like other deserted cities and I raise the deep to sweep over you and the ocean depths to cover you, '
  '2':
  - type: text
    content: '“Son of man, the people of Tyre have been cheering the demise of Jerusalem, saying, ‘Hooray! She is fallen! The Gateway to the Nations is shattered! An '
  - type: text
    content: opportunity
  - type: text
    content: ' has swung open for us. Now we will grow rich off her destruction!’'
  '20':
  - type: text
    content: 'then I will fling you down to the world of the dead to join the people of long ago. I will make you dwell deep in the underworld, '
  - type: note
    content: Or literally “the land of the lowest places.”
  - type: text
    content: 'in the abyss. And like the ruins of long ago, you will sink with them into oblivion. I will make sure that no one will ever live in you again, nor will you take your place in the land of the living. '
  - type: note
    content: As translated from the Septuagint. The Hebrew is “but I will set my beauty [glory] in the land of the living.” By implication, the judgment of God against Tyre will set his glory on display. Ezekiel prophesied the fall of Tyre 250 years before it happened.
  '21':
  - type: text
    content: 'I will bring you to a dreadful, terrifying end, and you will be no more! People will look for you but never find you again. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '3':
  - type: text
    content: '“Therefore, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to Tyre,'
  - type: text
    content: ‘Behold, I am against you,
  - type: text
    content: As the sea raises up its waves
  - type: text
    content: I will raise up many nations surging against you.
  '4':
  - type: text
    content: They will destroy the walls of Tyre,
  - type: text
    content: and demolish her high towers.
  - type: text
    content: I will sweep away her rubble
  - type: text
    content: and reduce her to nothing but a bare rock.
  - type: note
    content: A play on words since Tyre means “rock.”
  '5':
  - type: text
    content: Tyre will be an island where fishermen dry out their nets.
  - type: text
    content: Your enemies will take away everything you have.
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed it.'
  '6':
  - type: text
    content: 'And as for her settlements '
  - type: note
    content: Or “daughters.”
  - type: text
    content: on the mainland,
  - type: text
    content: they will all be slaughtered,
  - type: text
    content: 'and they will certainly learn that I am '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: Nebuchadnezzar Will Attack Tyre
  '7':
  - type: text
    content: '“Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to Tyre:'
  - type: text
    content: “Look! I will bring Nebuchadnezzar,
  - type: text
    content: king of Babylon, the world’s most powerful king,
  - type: text
    content: sweeping down from the north to destroy you
  - type: text
    content: with horses, chariots, cavalry, and an enormous army.
  - type: note
    content: The siege of Tyre lasted thirteen years, but the complete destruction of the city was accomplished later by Alexander the Great.
  '8':
  - type: text
    content: His armies will massacre your settlements on the mainland.
  - type: text
    content: They will lay siege to you and construct towers to attack you.
  - type: text
    content: They will build siege-ramps against you
  - type: text
    content: and lay siege to you with interlocking shields over their heads.
  - type: note
    content: Or literally “raise a shield on you.” This is likely a reference to the Roman military formation called the Tortoise. When Roman soldiers attacked a city wall, they would raise their shields above their heads to protect themselves from arrows, spears, and stones hurled at them. A “roof of shields” is a good description of this defensive military practice.
  '9':
  - type: text
    content: 'His '
  - type: text
    content: soldiers
  - type: text
    content: ' will pummel your walls with battering rams'
  - type: text
    content: and demolish your towers with iron bars.
