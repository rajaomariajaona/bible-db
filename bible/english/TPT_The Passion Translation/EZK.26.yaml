verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against Tyre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ezekiel 26:1–28:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is the eleventh panel (K) in the chiastic parallel structure in Ezekiel. This section is the second of three panels that contain oracles of judgment against the nations. This section contains the climactic oracle of judgment against the nation of Tyre. In Ezekiel’s prophecy, Tyre is the embodiment of blasphemous arrogance, the personification of satanic pride—the quintessential heart of idolatry. Panel K is the central panel, or locus, of the chiasmus as it demonstrates the climactic judgment of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: against the most godless of nations at the time of Ezekiel. This judgment marks the turning point of the prophecy in that it highlights the pinnacle of God’s anger against gross idolatry and rebellion against
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . It is a judgment that is climactic and irreversible. From this point on, principally after the judgments against Sidon and Egypt (panel J
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: —
      - type: text
        text: 28:20–32:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 33–48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (panels I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: through A
      - type: usfm
        marker: ord
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) emphasize the glorious provisions of God’s promised renewal, spiritual transformation, and everlasting forgiveness of sin, encapsulated in the provisions of the coming new covenant and the certainty of the promise of the arrival of the Messiah, Jesus Christ, the Son of God, on earth. Chapters
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 26–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: contain prophecies of judgment against Tyre. The city of Tyre was a prosperous commercial center situated north of Israel on an island in the Mediterranean Sea just off the coast of Phoenicia (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Josh. 19:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Tyre and her sister city, Sidon, had significant influence on the Northern Kingdom of Israel. Jezebel, wife of Ahab, came from Tyre (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 16:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Tyre was a city of trade and commerce. Hiram, king of Tyre, was a devoted friend to King David (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and helped him and King Solomon in their building operations (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 5:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Chron. 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Chron. 2:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The god of Tyre was Melkart, an idol with hands outstretched to receive human blood. Located today in modern Lebanon, Tyre has become a historical example of what happens to a people that mock Israel’s God. Tyre’s worldwide trading empire represents the principle of the love of money, trafficking, and merchandising—the pride of the satanic world system.
      marker-yv: yv-n
    - type: text
      text: 'On the first day of the month '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The dating of this prophecy is incomplete because it does not specify what month of the year. Some translations leave a gap, assuming it is missing from the manuscripts. It is difficult to know what month Ezekiel received this prophecy; however, Jewish scholars conclude it was the fifth month since it was the month that Jerusalem fell.
      marker-yv: yv-n
    - type: text
      text: 'in the eleventh year '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of our captivity
    - type: text
      text: ', '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me and said: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You’ll be covered with dust from their many horses and chariots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your walls will shake at the rumble of their chariot wheels.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His thundering horses will make your walls tremble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they storm through your gates and breach your walls.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: With galloping horses they will trample through every street
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and slaughter your people with the sword!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will throw your mighty pillars '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the pillars of your strength.” This is likely a reference to the famous pillars of the Temple of Heracles in Tyre.
      marker-yv: yv-n
    - type: text
      text: to the ground.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Your enemies will take for themselves your valuable possessions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and loot your merchandise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will break down your walls and destroy your luxurious homes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the houses of your desire.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will hurl the rubble and timber into the sea.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will silence the sound of your songs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the music of your stringed instruments will not be heard again.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will reduce you to a bare rock
  - type: usfm
    marker: q1
    children:
    - type: text
      text: where fishermen dry their nets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: never to be rebuilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken, and I have decreed it.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lament over Tyre
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to Tyre: “Surely, the islands will quake with fear at the sound of your fall. They will hear the groan of your wounded when your slaughter takes place. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'All the princes of the sea '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the leaders of the islands and seacoast nations that traded with Tyre.
      marker-yv: yv-n
    - type: text
      text: 'will vacate their thrones, laying aside their regal robes and embroidered cloaks. They will clothe themselves with trembling as they sit on the ground, stunned at your fate. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'This is the funeral song they will sing over you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘How you have vanished from the seas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O famous city, once a sea power with many people!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You inspired great terror
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in all those who lived in her.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Now, on the day of your fall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the islands and coasts are trembling with fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are paralyzed with great fear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because Tyre has vanished completely!’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tyre Will Go Down to the Abyss
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says: “When I make you a place of ruins like other deserted cities and I raise the deep to sweep over you and the ocean depths to cover you, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, the people of Tyre have been cheering the demise of Jerusalem, saying, ‘Hooray! She is fallen! The Gateway to the Nations is shattered! An '
    - type: usfm
      marker: it
      children:
      - type: text
        text: opportunity
    - type: text
      text: ' has swung open for us. Now we will grow rich off her destruction!’'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'then I will fling you down to the world of the dead to join the people of long ago. I will make you dwell deep in the underworld, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “the land of the lowest places.”
      marker-yv: yv-n
    - type: text
      text: 'in the abyss. And like the ruins of long ago, you will sink with them into oblivion. I will make sure that no one will ever live in you again, nor will you take your place in the land of the living. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “but I will set my beauty [glory] in the land of the living.” By implication, the judgment of God against Tyre will set his glory on display. Ezekiel prophesied the fall of Tyre 250 years before it happened.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'I will bring you to a dreadful, terrifying end, and you will be no more! People will look for you but never find you again. I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have spoken.”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“Therefore, I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to Tyre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Behold, I am against you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the sea raises up its waves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will raise up many nations surging against you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will destroy the walls of Tyre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and demolish her high towers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sweep away her rubble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and reduce her to nothing but a bare rock.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A play on words since
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Tyre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “rock.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tyre will be an island where fishermen dry out their nets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your enemies will take away everything you have.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', have decreed it.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And as for her settlements '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “daughters.”
      marker-yv: yv-n
    - type: text
      text: on the mainland,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will all be slaughtered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and they will certainly learn that I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar Will Attack Tyre
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '“Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says to Tyre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look! I will bring Nebuchadnezzar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: king of Babylon, the world’s most powerful king,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sweeping down from the north to destroy you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with horses, chariots, cavalry, and an enormous army.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The siege of Tyre lasted thirteen years, but the complete destruction of the city was accomplished later by Alexander the Great.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: His armies will massacre your settlements on the mainland.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will lay siege to you and construct towers to attack you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will build siege-ramps against you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and lay siege to you with interlocking shields over their heads.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 26:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “raise a shield on you.” This is likely a reference to the Roman military formation called the Tortoise. When Roman soldiers attacked a city wall, they would raise their shields above their heads to protect themselves from arrows, spears, and stones hurled at them. A “roof of shields” is a good description of this defensive military practice.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'His '
    - type: usfm
      marker: it
      children:
      - type: text
        text: soldiers
    - type: text
      text: ' will pummel your walls with battering rams'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and demolish your towers with iron bars.
