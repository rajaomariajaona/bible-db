document_id: JER.33,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Promise of a Prosperous Future
  - type: text
    content: 'Jeremiah was still confined to the palace guardhouse when the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ' came to him a second time, saying: '
  '10':
  - type: text
    content: '“They say about this place, ‘It is a wasteland, without people or animals.’ But this is what I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you: In the desolate towns of Judah and in the abandoned streets of Jerusalem without people or animals, you will hear once more '
  '11':
  - type: text
    content: 'the '
  - type: text
    content: raucous
  - type: text
    content: ' shouts of joy and mirth and the voice of the bridegroom '
  - type: note
    content: See John 3:29.
  - type: text
    content: and the voice of the bride. You will once again hear the glad songs sung by those who bring thank offerings to my temple, singing,
  - type: text
    content: '‘We give thanks to '
  - type: text
    content: mighty
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: Commander of Angel Armies,
  - type: text
    content: for he is so good,
  - type: note
    content: The Hebrew word for “good” can also be translated “merry,” “pleasant,” “agreeable,” “beautiful,” “kind,” and “happy.”
  - type: text
    content: and he will love you forever!’
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', promise that I will bring back the country’s captives, as before. '
  '12':
  - type: text
    content: 'And surrounding all the towns of this uninhabited wasteland without people or animals, there will once again be pastureland for the shepherds to rest their flocks,” says '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies. '
  '13':
  - type: text
    content: '“In the towns of the highlands, the lowlands, and the southern desert, in the land of Benjamin, in the villages around Jerusalem, and in the towns of Judah, flocks will once again pass under the hand of a shepherd who counts them,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: heading
    content: Yahweh’s Unbroken Covenant with David
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “The time is coming when I will fulfill the gracious promise '
  - type: text
    content: of good things to come
  - type: text
    content: ' that I made to the people of Israel and Judah: '
  '15':
  - type: text
    content: 'At that time, I will cause a righteous Branch '
  - type: note
    content: Jesus Christ, son of David, is the Branch of Righteousness (see Isa. 11:1–5). He is the Vine (see John 15:1–10), and believers are branches vitally joined to him. His righteousness flows into every branch of this living Vine. His life and glory branch out through us to touch the world with his love (the fruit of the Holy Spirit).
  - type: text
    content: 'to sprout from David’s lineage. And he will administer justice and righteousness in the land. '
  '16':
  - type: text
    content: 'Under his rule, Judah will triumph '
  - type: note
    content: Or “Judah will be saved.”
  - type: text
    content: 'and Jerusalem will live in safety. And the city will be called '
  - type: text
    content: Yahweh
  - type: text
    content: ' Is Our Righteousness.”'
  '17':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “There will always be a descendant of David to be king in Israel. '
  '18':
  - type: text
    content: And there will always be priests from the tribe of Levi to stand before me to offer burnt offerings, grain offering, and daily sacrifices to me.”
  - type: note
    content: This prophecy is not a promise of a literal restoration of the Davidic dynasty and the Levitical priesthood. The ultimate fulfillment must be seen in the promise of a kingly and priestly ministry enduring today with believers. The life of David reveals that king-priest ministry. David was the king, but he ministered to God as a priest before the unveiled ark of the covenant (see 2 Sam. 6:12–15) and established the Tabernacle of David. Jesus came as both King and Priest. Every true follower of Jesus is a son of a King-Priest. We are brought into the king-priest ministry of our Lord Jesus by faith. We rule in life as kings (see Rom. 5:17) and offer holy sacrifices of praise (see Rom. 12:1–2; Heb. 13:15) as royal priests (see 1 Peter 2:9–10; Rev. 1:6; 5:10).
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
  '2':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', made the earth, '
  - type: note
    content: The Hebrew reads “it.” Most modern translations have attempted to explain the “it” by inserting the word earth because the verbs used in this verse parallel the creation of the earth. However, some interpret “it” as “[God’s] plans,” others as “Jerusalem.”
  - type: text
    content: 'formed its contours, and set it in place. '
  - type: text
    content: Yahweh
  - type: text
    content: ' is my name. I say to you, '
  '20':
  - type: text
    content: '“I say to you that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have a covenant with the day and the night so that they always come at their appointed times. As no one can break the covenant I made with them, '
  '21':
  - type: text
    content: 'so no one can break the covenant I have made with my servant David '
  - type: note
    content: See 2 Sam. 7:12–16.
  - type: text
    content: 'and with the priests from the tribe of Levi who serve at my altar. '
  - type: note
    content: See Num. 25:10–13.
  - type: text
    content: 'A descendant of David will always rule as king of Israel. '
  '22':
  - type: text
    content: 'Just as no one can count the stars in the sky nor measure the sand of the seashore, so I will increase the descendants of my servant David and the Levites who minister to me '
  - type: text
    content: until they cannot be counted
  - type: text
    content: .”
  '23':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me '
  - type: text
    content: again
  - type: text
    content: ', saying, '
  '24':
  - type: text
    content: “Have you heard that these people are saying, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' has forsaken '
  - type: text
    content: Judah and Israel
  - type: text
    content: ', whom he chose for himself’? They despise my people and no longer consider them as a nation. '
  '25':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you that I will never break my covenant with the day and the night or let the heavens and the earth stop obeying my commands. '
  '26':
  - type: text
    content: In the same way, I will never reject the descendants of Abraham, Isaac, and Jacob, and of David my servant. There will always be a descendant of David to rule over his people. For I will show kindness to my people Israel, and they will prosper and be successful again.”
  '3':
  - type: text
    content: 'cry out to me and I will answer you. '
  - type: note
    content: Prayer is asking God for help, wisdom, strength, grace, forgiveness, guidance, and insight. See Ps. 65:2; Luke 11:9–10; James 1:5.
  - type: text
    content: 'I will reveal to you great things, guarded secrets '
  - type: note
    content: Or “inaccessible things.” The Hebrew word betsurot is used to describe a “hidden fortress,” “fortified city,” or “fortified wall” (15:20). God is able to answer prayer and reveal things that are beyond man’s knowledge.
  - type: text
    content: 'that you never could have known. '
  - type: note
    content: See Matt. 13:11; 1 Cor. 2:9–16; 4:1–2.
  '4':
  - type: text
    content: 'For I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, have something to say about the houses of this city and the dwellings of the kings of Judah. You have torn them down to be used to defend yourselves against the attack of the Babylonian armies. '
  '5':
  - type: text
    content: The defenders of the city will go out and battle the Babylonians, but this will only serve to fill the ruins with the corpses of men who are the victims of my furious anger. I have hidden my face from this city because of all their evil.
  '6':
  - type: text
    content: '“Nevertheless, I will heal them, '
  - type: note
    content: Or “I will give them new flesh.”
  - type: text
    content: 'restore them, '
  - type: note
    content: Or “give them abundance” or “treasures.” The Hebrew word is related to the word for “crown” or “diadem.”
  - type: text
    content: 'and give them prosperity and lasting peace. '
  '7':
  - type: text
    content: 'I will bring back the captives of Israel and Judah and reestablish them as before. '
  '8':
  - type: text
    content: 'I will cleanse them from all the guilt of all the sins they have committed against me. I will even forgive all their sins of rebellion against me. '
  '9':
  - type: text
    content: And it will become to me a source of joy, honor, and splendor for all the earth to see. When they hear of all the prosperity that I bestow upon the people, they will be shaken to the core at all the good and prosperity that I lavish upon it.
  - type: note
    content: The prophecy moves from speaking of Judah, Israel, and Jerusalem (see vv. 4–8) to “it” in v. 9. Read v. 9 with the church in mind as the “it.” Both Israel and the church have been exceedingly blessed by God to be “a source of joy, honor, and splendor for all the earth to see.”
