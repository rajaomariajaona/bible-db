  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', God of Israel, have something to say about the houses of this city and the dwellings of the kings of Judah. You have torn them down to be used to defend yourselves against the attack of the Babylonian armies. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The defenders of the city will go out and battle the Babylonians, but this will only serve to fill the ruins with the corpses of men who are the victims of my furious anger. I have hidden my face from this city because of all their evil.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“Nevertheless, I will heal them, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I will give them new flesh.”
      marker-yv: yv-n
    - type: text
      text: 'restore them, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
