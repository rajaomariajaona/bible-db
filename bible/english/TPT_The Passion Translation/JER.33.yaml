    children:
    - type: text
      text: The Promise of a Prosperous Future
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jeremiah was still confined to the palace guardhouse when the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' came to him a second time, saying: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“They say about this place, ‘It is a wasteland, without people or animals.’ But this is what I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you: In the desolate towns of Judah and in the abandoned streets of Jerusalem without people or animals, you will hear once more '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: raucous
    - type: text
      text: ' shouts of joy and mirth and the voice of the bridegroom '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
