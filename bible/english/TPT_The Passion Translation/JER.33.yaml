          text: John 3:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and the voice of the bride. You will once again hear the glad songs sung by those who bring thank offerings to my temple, singing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘We give thanks to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mighty
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Commander of Angel Armies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he is so good,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “good” can also be translated “merry,” “pleasant,” “agreeable,” “beautiful,” “kind,” and “happy.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he will love you forever!’
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', promise that I will bring back the country’s captives, as before. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'And surrounding all the towns of this uninhabited wasteland without people or animals, there will once again be pastureland for the shepherds to rest their flocks,” says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“In the towns of the highlands, the lowlands, and the southern desert, in the land of Benjamin, in the villages around Jerusalem, and in the towns of Judah, flocks will once again pass under the hand of a shepherd who counts them,” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s Unbroken Covenant with David
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, “The time is coming when I will fulfill the gracious promise '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of good things to come
    - type: text
      text: ' that I made to the people of Israel and Judah: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'At that time, I will cause a righteous Branch '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus Christ, son of David, is the Branch of Righteousness (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:1–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). He is the Vine (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 15:1–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and believers are branches vitally joined to him. His righteousness flows into every branch of this living Vine. His life and glory branch out through us to touch the world with his love (the fruit of the Holy Spirit).
      marker-yv: yv-n
    - type: text
      text: 'to sprout from David’s lineage. And he will administer justice and righteousness in the land. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Under his rule, Judah will triumph '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Judah will be saved.”
      marker-yv: yv-n
    - type: text
      text: 'and Jerusalem will live in safety. And the city will be called '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' Is Our Righteousness.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' says, “There will always be a descendant of David to be king in Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: And there will always be priests from the tribe of Levi to stand before me to offer burnt offerings, grain offering, and daily sacrifices to me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This prophecy is not a promise of a literal restoration of the Davidic dynasty and the Levitical priesthood. The ultimate fulfillment must be seen in the promise of a kingly and priestly ministry enduring today with believers. The life of David reveals that king-priest ministry. David was the king, but he ministered to God as a priest before the unveiled ark of the covenant (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 2 Sam. 6:12–15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and established the Tabernacle of David. Jesus came as both King and Priest. Every true follower of Jesus is a son of a King-Priest. We are brought into the king-priest ministry of our Lord Jesus by faith. We rule in life as kings (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 5:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and offer holy sacrifices of praise (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 12:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Heb. 13:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) as royal priests (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 2:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
