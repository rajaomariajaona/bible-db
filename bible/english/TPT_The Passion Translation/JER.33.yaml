      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
