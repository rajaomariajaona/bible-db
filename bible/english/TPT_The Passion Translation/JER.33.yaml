      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A descendant of David will always rule as king of Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Just as no one can count the stars in the sky nor measure the sand of the seashore, so I will increase the descendants of my servant David and the Levites who minister to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: until they cannot be counted
    - type: text
      text: .”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again
    - type: text
      text: ', saying, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Have you heard that these people are saying, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has forsaken '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judah and Israel
    - type: text
      text: ', whom he chose for himself’? They despise my people and no longer consider them as a nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', say to you that I will never break my covenant with the day and the night or let the heavens and the earth stop obeying my commands. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: In the same way, I will never reject the descendants of Abraham, Isaac, and Jacob, and of David my servant. There will always be a descendant of David to rule over his people. For I will show kindness to my people Israel, and they will prosper and be successful again.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'cry out to me and I will answer you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Prayer is asking God for help, wisdom, strength, grace, forgiveness, guidance, and insight. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 65:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 11:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: James 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'I will reveal to you great things, guarded secrets '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 33:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “inaccessible things.” The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: betsurot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used to describe a “hidden fortress,” “fortified city,” or “fortified wall” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God is able to answer prayer and reveal things that are beyond man’s knowledge.
      marker-yv: yv-n
    - type: text
      text: 'that you never could have known. '
