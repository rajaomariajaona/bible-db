document_id: 1CO.12,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Spiritual Gifts
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'My fellow believers, I don’t want you to be confused about spiritual realities. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pneumatikos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is “spiritual” (things), with the implication of spiritual realities or spiritual gifts. Some scholars believe that “spiritual” may refer to spiritual persons.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: And to another the power to work miracles.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This includes the divine ability to still a storm, feed a multitude, walk on water, cast out demons, turn water into wine, and raise the dead. This gift was one of the distinctive marks of an apostle. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 12:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to another the gift of prophecy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This gift is a supernatural ability, given by the Holy Spirit, to speak the word of God in proclamation and at times in predicting the future. This is one gift that every believer should desire and never despise. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 14:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Thess. 5:19–20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Tim. 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to another the gift to discern what the Spirit is speaking.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This gift imparts divine discernment to know if a prophetic message is from the Holy Spirit or from a human or demonic source. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Discernment is greatly needed in the church today to hear the voice of the Lord clearly and to know when defilement is attempting to enter the assembly.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to another the gift of speaking different kinds of tongues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And to another the gift of interpretation of tongues.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Remember, it is the same Holy Spirit who distributes, activates, and operates these different gifts as he chooses for each believer.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Spiritual gifts are given by the Holy Spirit at any time to anyone he chooses.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: One Body with Many Parts
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Just as the human body is one, though it has many parts that together form one body, so too is Christ. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Christ is now a body with many parts. The human body of Jesus is glorified and enthroned in heaven. So also is the body of Christ. We are co-enthroned with him (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:29–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 2:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 3:1–4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), but we continue to exist on earth to represent him to the world.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'For by one Spirit we all were immersed and mingled into one single body. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is not a baptism into the Spirit (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') but a baptism into the body of Christ. Upon conversion, the Holy Spirit does four things for every believer: (1) He gives us new birth (regeneration—see'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Titus 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (2) He comes to live inside us (indwelling—see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 8:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (3) He places us into the body as a member of Christ’s body on the earth (spiritual baptism—see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). (4) He seals us as the possession of Christ until the redemption of our human body (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 1:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 4:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: And no matter our status—whether we are Jews or non-Jews, oppressed or free—we are all privileged to drink deeply of the same Holy Spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To “drink deeply” of the Spirit is the same as receiving his power and gifts until rivers of living water flow from the inside of us. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 3:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'In fact, the human body is not one single part but rather many parts '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mingled into one
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'So if the foot were to say, “Since I’m not a hand, I’m not a part of the body,” it’s forgetting that it is still a vital part of the body. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: And if the ear were to say, “Since I’m not an eye, I’m not really a part of the body,” it’s forgetting that it is still an important part of the body.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Think of it this way
    - type: text
      text: '. If the whole body were just an eyeball, how could it hear sounds? And if the whole body were just an ear, how could it smell different fragrances? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But God has carefully designed each member and placed it in the body to function as he desires. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Every believer should be content with the place within the body God has placed him. And God is pleased when we serve him with joy in every activity or ministry that we engage in for the sake of the body.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: it
      children:
      - type: text
        text: A diversity is required
    - type: text
      text: ', for if the body consisted of one single part, there wouldn’t be a body at all! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For you know full well that when you were unbelievers you were often led astray '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “carried [or snatched] away.”
      marker-yv: yv-n
    - type: text
      text: 'in one way or another by your worship of idols, which are incapable of talking with you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: So now we see that there are many differing parts and functions, but one body.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: No Competition for Importance within the Body
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'It would be wrong for the eye to say to the hand, “I don’t need you,” and equally wrong if the head said to the foot, “I don’t need you.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'In fact, the weaker our parts, the more vital and essential they are. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Paul is, no doubt, speaking of our internal organs: liver, heart, lungs, etc.'
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'The body parts we think are less honorable we treat with greater respect. And the body parts that need to be covered in public we treat with propriety and clothe them. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'But some of our body parts don’t require as much attention. Instead, God has mingled the body parts together, giving greater honor to the “lesser” members who lacked it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: it
      children:
      - type: text
        text: He has done this intentionally
    - type: text
      text: ' so that every member would look after the others with mutual concern, and so that there will be no division in the body. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: In that way, whatever happens to one member happens to all. If one suffers, everyone suffers. If one is honored, everyone rejoices.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: One Body with Different Gifts
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'You are the body of the Anointed One, and each of you is a unique and vital part of it. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'God has placed in the church the following:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: First apostles,
  - type: usfm
    marker: p
    children:
    - type: text
      text: second prophets,
  - type: usfm
    marker: p
    children:
    - type: text
      text: third teachers,
  - type: usfm
    marker: p
    children:
    - type: text
      text: then those with gifts of miracles, gifts of divine healing,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'gifts of revelation knowledge, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Most translations render the Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: antilēmpsis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a hapax legomenon) as “helps.” However, it is literally “laying hold of” (revelation) or “apprehending” (perception).
      marker-yv: yv-n
    - type: text
      text: gifts of leadership,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is a hapax legomenon that can be translated “guidance” or “one who steers the ship.”
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: and gifts of different kinds of tongues.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Not everyone is an apostle or a prophet or a teacher. Not everyone performs miracles '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Therefore, I want to impart to you an understanding of the following:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No one speaking by the Spirit of God '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some scholars believe this “speaking by the Spirit of God” refers to speaking in tongues.
      marker-yv: yv-n
    - type: text
      text: would ever say, “Jesus is the accursed one.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'No one can say, “Jesus is the Lord '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ',” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 12:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek language has no equivalent for “Lord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ” and uses the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: kurios
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which means “sir, master, wealthy landowner, boss” and is sometimes used for demons. The Aramaic is preferred. It is by divine revelation that one begins to see that the Lord'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
