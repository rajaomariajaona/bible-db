document_id: 2TH.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Coming of the Lord
  - type: text
    content: 'Now, regarding the coming '
  - type: note
    content: Or “presence.”
  - type: text
    content: 'of our Lord Jesus Christ and our gathering together to him, '
  - type: note
    content: The noun form of the Greek word for “gathering together” (episunagoge) is found twice in the New Testament, here and in Heb. 10:25. It is used as a verb (episunago) in Matt. 23:37; 24:31.
  - type: text
    content: 'we plead with you, beloved friends, '
  '10':
  - type: text
    content: 'and every form of evil deception in order to deceive those who are perishing because they rejected the love of the truth '
  - type: note
    content: Or “did not welcome the love for the truth.”
  - type: text
    content: 'that would lead them to being saved. '
  '11':
  - type: text
    content: 'Because of this, God sends them a powerful delusion '
  - type: note
    content: Or “a [power] working of error.” The Aramaic can be translated “God will dispatch to them servants of deception.”
  - type: text
    content: 'that leads them to believe what is false. '
  '12':
  - type: text
    content: So then all who found their pleasure in unrighteousness and did not believe the truth will be judged.
  - type: heading
    content: Chosen for Wholeness
  '13':
  - type: text
    content: 'We always have to thank God for you, brothers and sisters, for you are '
  - type: text
    content: dearly
  - type: text
    content: ' loved by the Lord. He proved it by choosing you from the beginning for salvation '
  - type: note
    content: Or “He has chosen you as firstfruits [in the harvest] for salvation.”
  - type: text
    content: 'through the Spirit, who set you apart for holiness, and through your belief in the truth. '
  - type: note
    content: Or “by sanctifying your spirits and convincing you of his truth.”
  '14':
  - type: text
    content: 'To this end he handpicked you for salvation through the gospel so that you would have '
  - type: note
    content: Or “share in” or “possess.” This is the Greek word peripoiēsis, which means “an encompassing,” “a surrounding” or “encircling.” Believers are brought within the perimeter of the glory of God through Jesus Christ. There is nothing in the context to imply it is a future event, but rather a present enjoyment and participation in the glory of the Lord Jesus Christ (John 17:10, 22).
  - type: text
    content: the glory of our Lord Jesus Christ.
  - type: note
    content: These two verses (13–14) contain some of the most wonderful truths of the New Testament. Read them over again slowly and think about all that God the Father, God the Son, and God the Spirit have done for us (e.g., his eternal love, the drawing work of the Holy Spirit, sanctification or being set apart for holiness, faith in Jesus, and much more). Paul states in v. 14 that the purpose of our salvation is more than being set free from guilt; it is so that we would share in and possess the glory of Christ (John 17:10, 22).
  '15':
  - type: text
    content: 'So then, dear family, stand firm with a masterful grip of the teachings '
  - type: note
    content: Or “traditions.”
  - type: text
    content: we gave you, either by word of mouth or by our letter.
  - type: note
    content: The “letter” Paul refers to is likely 1 Thessalonians.
  '16':
  - type: text
    content: 'Now may the Lord Jesus Christ and our Father God, who loved us and in his wonderful grace gave us eternal comfort and a beautiful hope that cannot fail, '
  '17':
  - type: text
    content: 'encourage your hearts and inspire you with strength to always do and speak what is good and beautiful '
  - type: text
    content: in his eyes
  - type: text
    content: .
  - type: note
    content: The Aramaic can be translated “He will comfort your hearts and will stand by all [your] words and by all (your) beautiful deeds.” Another possible Aramaic translation of this verse is “He will make your hearts a well of prophecy and he will stand you in every word and in every beautiful deed.”
  '2':
  - type: text
    content: 'not to be easily confused or disturbed in your minds by any kind of spirit, rumor, or letter allegedly from us, claiming that the day of the Lord '
  - type: note
    content: This is a common term that describes the day of the Lord’s judgment. (See Jer. 30:7; Joel 1:15; 2:1–2; Amos 5:18; Zech. 1:14–18.)
  - type: text
    content: 'has already come. '
  '3':
  - type: text
    content: 'Don’t let anyone deceive you in any way. Before that day comes the rebellion '
  - type: note
    content: Or “apostasy” or “abandonment” (falling away).
  - type: text
    content: 'must occur and the “outlaw” '
  - type: note
    content: A few manuscripts have “the man who missed the mark” (i.e., Adam), while others have “the person owned by [associated with] lawlessness.”
  - type: text
    content: '—the destructive son—will be revealed '
  - type: text
    content: in his true light
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'He is the opposing counterpart who exalts himself over everything that is called “God” or is worshiped '
  - type: note
    content: See Dan. 11:36.
  - type: text
    content: 'and who sits enthroned in God’s temple '
  - type: note
    content: Some see this prophecy fulfilled in AD 70 during the Roman war, when foreigners came into the temple and desecrated it and declared themselves the true rulers of the Jewish people. Roman emperors were considered to be gods. But the one who sits in God’s temple, which was not made with hands, is the sin of man, a sinful nature that is traced back to Adam.
  - type: text
    content: 'and makes himself out to be a god. '
  - type: note
    content: See also Ezek. 28:2.
  '5':
  - type: text
    content: Don’t you remember that when I was with you I went over all these things?
  '6':
  - type: text
    content: 'Now you are aware of the ruling power '
  - type: note
    content: An intransitive verb meaning “to rule” or “to hold sway” or “to possess.” The Aramaic likewise is “Now you know that which controls.” The neuter form of the Greek participle suggests a principle, not a person, which could be referring to the mystery of lawlessness in human hearts (v. 7). However, some see “it” as the god of this world (Satan) or the Roman Empire, which ruled the world in the days of Paul’s writings.
  - type: text
    content: 'so that he may be fully revealed when his time comes. '
  '7':
  - type: text
    content: 'For the mystery of lawlessness '
  - type: note
    content: Or “the secret power of lawlessness/wickedness.”
  - type: text
    content: 'is already active, but the one who prevails '
  - type: note
    content: Or “restrains.”
  - type: text
    content: 'will do so until he is separated from out of the midst. '
  - type: note
    content: Or “until he is removed.”
  '8':
  - type: text
    content: 'Then the “outlaw” will be openly revealed, and the Lord will overthrow him by the breath of his mouth '
  - type: note
    content: Figuratively, this is the word spoken from his mouth, the Word of God. See also Rev. 19:15, 21.
  - type: text
    content: 'and bring him to an end '
  - type: note
    content: Or “deactivate.”
  - type: text
    content: by the dazzling manifestation of his presence.
  - type: note
    content: Or “coming.”
  '9':
  - type: text
    content: 'The presence '
  - type: note
    content: Or “coming.”
  - type: text
    content: 'of the “outlaw” is apparent by the activity of Satan, who uses all kinds of '
  - type: text
    content: counterfeit
  - type: text
    content: ' miracles, signs, spurious wonders, '
