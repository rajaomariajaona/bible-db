document_id: JDG.14,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson Wants a Wife
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'One day Samson went down to Timnah where a Philistine girl caught his eye, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So Samson’s father accompanied him to Timnah to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: arrange
    - type: text
      text: ' the marriage.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson’s Wedding Feast
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Following the custom for young men '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “young men” can also mean “chosen men [warriors].” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 20:15–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'about to marry, Samson threw a party '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was a wedding feast with alcohol. Assuming Samson was drinking with the others, he again broke another part of his Nazarite vow not to drink alcohol. The only remaining part of his vow was not to cut his hair, but soon he would violate that too.
      marker-yv: yv-n
    - type: text
      text: 'that lasted for seven days. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'When the Philistines saw him, they arranged for thirty '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Philistine
    - type: text
      text: ' men to accompany him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as groomsmen
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Many modern commentators surmise that the Philistines assigned thirty men to keep watch over Samson due to their concern over his unusual strength.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Samson challenged them with a riddle, “Hey, I have a riddle for you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Let me riddle you a riddle.” The Hebrew word for “riddle” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: chidah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) can also mean “dark saying,” “hard question,” or “conundrum,” and is taken from a root word meaning “to tie into a knot.” Riddles were common as a source of entertainment in ancient times. The queen of Sheba tested Solomon’s wisdom by presenting him with riddles (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 10:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). God instructed Ezekiel to present a riddle to the people of Israel (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 17:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The book of Proverbs was written, in part, to “unveil the deeper meaning of parables, poetic riddles, and epigrams” (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'If you can solve my riddle within the seven days of our feast, then I will give each of you a linen garment and a set of fine clothing. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But if you cannot solve it, then you must give me thirty linen garments and thirty sets of fine clothing.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, “costly festive garments,” a cultural mark of favor.
      marker-yv: yv-n
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Ask away,” they said to him. “Let’s hear your riddle.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He said to them:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “From the eater came something to eat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From the strong came something sweet.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After three days, they were still stumped and could not figure it out. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'On the fourth day, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “seventh day” (Masoretic Text).
      marker-yv: yv-n
    - type: text
      text: they said to Samson’s bride, “Have you invited us here to bankrupt us? Do whatever it takes to persuade your husband to tell you the answer to his riddle, or we will burn down your father’s house with you and your family inside!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Samson’s bride went to him and turned on the tears and sobbed, “Honey, you don’t really love me! You hate me! You’ve challenged my countrymen with a riddle, but you haven’t told me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: its meaning
    - type: text
      text: '!”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Listen,” he said to her. “I haven’t even told my parents. So why should I tell you?” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'She continued to cry on his shoulder for the remaining days of their feast, and on the seventh day, because she had so persistently nagged him, he finally '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gave in and
    - type: text
      text: ' divulged the secret. Then she went and explained the riddle to her countrymen.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'On the seventh day before the sun had set, the townsmen answered him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “What could be sweeter than honey?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And what is stronger than a lion?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Samson angrily replied,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you hadn’t used my cow for your plow
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you wouldn’t know my riddle now!”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Then suddenly, the Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' rushed upon Samson, infusing him with power! He went down to Ashkelon '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ashkelon was a Philistine city on the Mediterranean Sea north of Gaza, about two days’ journey from Timnah.
      marker-yv: yv-n
    - type: text
      text: 'and killed thirty of their men. He stripped them of their linen '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Linen was used for the garment of a priest. Thirty is the number of a mature priesthood, for men could only become priests at the age of thirty. Samson’s riddle has revelation hidden within it for the church today. Seven days they feasted trying to solve the riddle. We are in the seventh day from Adam (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pet. 3:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), and we are about to unravel the riddle of life. The ones who solve the riddle receive new garments: costly festive wedding garments (i.e., are clothed with immortality).'
      marker-yv: yv-n
    - type: text
      text: 'tunics and their robes and gave them in payment to those who had explained the riddle. Then, in a blazing fury, he returned to his father’s house. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: so he returned home and told his parents, “At Timnah I noticed a young woman among the daughters of the Philistines; get her for me now to be my wife.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As in many other cultures, parents (especially the fathers) arranged marriages in the ancient Near East. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 21:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 24:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 34:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 21:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Meanwhile, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unknown to
    - type: text
      text: ' Samson, his bride married his best man.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: His parents replied, “Why can’t you find a woman from among our relatives, or at least from our tribe? You don’t have to get a wife from the uncircumcised Philistines.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Samson told his father, “Get her for me; I know she’s the right one for me.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Now, his parents had no idea that Samson’s passion for the girl was part of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ’s plan to create an opportunity to come against the Philistines who ruled over Israel at that time.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson and the Lion
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'One day, Samson decided to go back to Timnah '
    - type: usfm
      marker: it
      children:
      - type: text
        text: to visit the Philistine woman
    - type: text
      text: '. As he was approaching the vineyards of Timnah, a full-grown lion suddenly came roaring toward him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'The Spirit of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' entered Samson '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The Spirit of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rushed upon him.”
      marker-yv: yv-n
    - type: text
      text: 'and empowered him to tear the lion to pieces with his bare hands as if it were a young goat! But he never disclosed to his father and mother what he had done. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Afterward, he went into Timnah and talked with the Philistine woman, because Samson was convinced that she was the right one for him.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Later, Samson returned to marry her. On his way there, he turned aside to look at the lion’s remains, and to his surprise, there was a swarm of bees, honey, and honeycomb in the carcass of the lion! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'He scooped some of the honey '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Jewish historian Josephus writes that Samson took three honeycombs from the lion’s carcass and gave them to a woman in Timnah (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ant.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.5.c.8 sect. 6). Part of the Nazarite vow is a prohibition from touching anything dead or unclean (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 6:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). By touching the carcass of the lion, Samson violated his vow to God.
      marker-yv: yv-n
    - type: text
      text: 'into his hands and continued on his way, eating as he went. When he rejoined his father and mother, he gave some to them, and they ate too. But he did not tell them he had scooped it from the lion’s carcass. '
