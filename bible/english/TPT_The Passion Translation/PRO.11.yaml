document_id: PRO.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living in Righteousness
  - type: text
    content: Dishonest business practice
  - type: note
    content: The Hebrew phrase here literally means “scales of deception [false balances].”
  - type: text
    content: 'is something that '
  - type: text
    content: Yahweh
  - type: text
    content: ' truly hates.'
  - type: text
    content: But it pleases him when we apply the right standards
  - type: text
    content: of measurement.
  - type: note
    content: The Hebrew phrase here literally means “a perfect stone.” Stones were used as the legitimate weights of balance. Jesus is the perfect stone. See Rev. 2:17.
  '10':
  - type: text
    content: The blessing that rests on the righteous
  - type: text
    content: releases strength and favor to the entire city,
  - type: note
    content: As translated from the Aramaic and the Septuagint.
  - type: text
    content: but shouts of joy will be heard when the wicked one dies.
  '11':
  - type: text
    content: The blessing of favor resting upon the righteous
  - type: text
    content: influences a city to lift it higher,
  - type: note
    content: Jesus describes the church as a city. See Matt. 5:14.
  - type: text
    content: but wicked leaders tear it apart by their words.
  '12':
  - type: text
    content: To quarrel with a neighbor is senseless.
  - type: note
    content: Or “To disparage your neighbor is being heartless.”
  - type: text
    content: Bite your tongue; be wise and keep quiet!
  '13':
  - type: text
    content: You can’t trust gossipers with a secret;
  - type: text
    content: they’ll just go blab it all.
  - type: text
    content: Put your confidence instead in a trusted friend,
  - type: text
    content: for he will be faithful to keep it in confidence.
  '14':
  - type: text
    content: People lose their way without wise leadership,
  - type: text
    content: but a nation succeeds and stands in victory
  - type: text
    content: when it has many good counselors to guide it.
  '15':
  - type: text
    content: The evil man will do harm when confronted by a righteous man,
  - type: text
    content: because he hates those who await good news.
  - type: note
    content: As translated from the Aramaic and the Septuagint. The Hebrew is “You’ll be ruined if you cosign for a stranger, and a hater of handshakes will be safe.”
  '16':
  - type: text
    content: A gracious, generous woman
  - type: text
    content: 'will be honored with a splendid '
  - type: note
    content: Or “glorious.”
  - type: text
    content: reputation,
  - type: text
    content: but the woman who hates the truth
  - type: text
    content: 'lives with disgrace '
  - type: note
    content: 'As translated from the older Aramaic and Septuagint texts, but not included in newer Hebrew manuscripts. There is an additional line added by the Aramaic and the Septuagint: “The lazy will lack, but the diligent support themselves financially.”'
  - type: text
    content: and is surrounded by men
  - type: text
    content: who are cutthroats, only greedy for money.
  - type: note
    content: The Septuagint is “the diligent obtain wealth.”
  '17':
  - type: text
    content: A man of kindness attracts favor,
  - type: text
    content: while a cruel man attracts nothing but trouble.
  - type: note
    content: The Hebrew text indicates this trouble could be physical, related to one’s health.
  '18':
  - type: text
    content: Evil people may get a short-term gain,
  - type: note
    content: Or “wages of deception.”
  - type: text
    content: but to sow seeds of righteousness
  - type: text
    content: will bring a true and lasting reward.
  '19':
  - type: text
    content: 'A son of righteousness '
  - type: note
    content: As translated from one Hebrew manuscript, the Aramaic, and the Septuagint. Most Hebrew manuscripts have “The one who pursues righteousness.”
  - type: text
    content: experiences the abundant life,
  - type: text
    content: but the one who pursues evil hurries to his own death.
  '2':
  - type: text
    content: When you act with presumption,
  - type: text
    content: convinced that you’re right,
  - type: text
    content: don’t be surprised if you fall flat on your face!
  - type: text
    content: But humility leads to wisdom.
  '20':
  - type: text
    content: The Lord can’t stand the stubborn heart bent toward evil,
  - type: text
    content: but he treasures those whose ways are pure.
  - type: note
    content: Or “wholehearted.”
  '21':
  - type: text
    content: Assault your neighbor and you will certainly be punished,
  - type: note
    content: As translated from the Aramaic and the Targum (Hebrew-Aramaic commentary).
  - type: text
    content: but God will rescue the children of the godly.
  '22':
  - type: text
    content: A beautiful woman who abandons good morals
  - type: text
    content: is like a fine gold ring dangling from a pig’s snout.
  '23':
  - type: text
    content: True lovers of God are filled with longings
  - type: text
    content: for what is pleasing and good,
  - type: text
    content: but the wicked can only expect doom.
  '24':
  - type: text
    content: Generosity brings prosperity,
  - type: text
    content: but withholding from charity brings poverty.
  '25':
  - type: text
    content: Those who live to bless others
  - type: text
    content: will have blessings heaped upon them,
  - type: text
    content: and the one who pours out his life to pour out blessings
  - type: text
    content: will be saturated with favor.
  - type: note
    content: The Hebrew phrase here literally means “The soul of blessing will grow fat.”
  '26':
  - type: text
    content: People will curse the businessman with no ethics,
  - type: text
    content: but the one with a social conscience receives praise from all.
  - type: note
    content: The Hebrew phrase here literally means “The one who withholds produce will be cursed, but blessing will be on the head of the one who sells it.”
  '27':
  - type: text
    content: Living your life seeking what is good for others brings untold favor,
  - type: text
    content: but those who wish evil for others will find it coming back on them.
  '28':
  - type: text
    content: Keep trusting in your riches and down you’ll go!
  - type: text
    content: But the lovers of God rise up like flowers in the spring.
  '29':
  - type: text
    content: The fool who brings trouble to his own family
  - type: text
    content: will be cut out of the will,
  - type: text
    content: and the family servant will do better than he.
  '3':
  - type: text
    content: Integrity will lead you to success,
  - type: text
    content: but treachery will destroy your dreams.
  '30':
  - type: text
    content: But a life lived loving God bears lasting fruit,
  - type: text
    content: for the one who is truly wise wins souls.
  - type: note
    content: As translated from the Hebrew. The Aramaic and the Septuagint read “the souls of violent ones will be removed.”
  '31':
  - type: text
    content: If the righteous are barely saved,
  - type: text
    content: what’s in store for all the wicked?
  - type: note
    content: As translated from the Septuagint. See 1 Peter 4:18.
  '4':
  - type: text
    content: When judgment day comes,
  - type: text
    content: all the wealth of the world won’t help you one bit.
  - type: text
    content: So be rich in righteousness,
  - type: text
    content: for that’s the only thing that can save you in death.
  '5':
  - type: text
    content: Those with good character walk on a smooth path,
  - type: text
    content: with no detour or deviation.
  - type: text
    content: But the wicked keep falling because of their own wickedness.
  '6':
  - type: text
    content: Integrity will keep a good man from falling.
  - type: text
    content: But the unbeliever is trapped,
  - type: text
    content: held captive to his sinful desires.
  '7':
  - type: text
    content: When an evil man dies, all hope is lost,
  - type: text
    content: for his misplaced confidence goes in the coffin,
  - type: text
    content: buried along with him.
  '8':
  - type: text
    content: The righteous are snatched away from trouble,
  - type: text
    content: and the wicked show up in their place.
  - type: note
    content: Haman is a classic example of this principle. See Est. 7:10; 9:24–25.
  '9':
  - type: text
    content: The teachings of hypocrites can destroy you,
  - type: text
    content: but revelation-knowledge will rescue the righteous.
  - type: note
    content: Or “the righteous will be strengthened.”
