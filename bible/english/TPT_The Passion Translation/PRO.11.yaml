document_id: PRO.11,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in Righteousness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dishonest business practice
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase here literally means “scales of deception [false balances].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'is something that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' truly hates.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it pleases him when we apply the right standards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of measurement.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase here literally means “a perfect stone.” Stones were used as the legitimate weights of balance. Jesus is the perfect stone. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 2:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The blessing that rests on the righteous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: releases strength and favor to the entire city,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and the Septuagint.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but shouts of joy will be heard when the wicked one dies.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The blessing of favor resting upon the righteous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: influences a city to lift it higher,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus describes the church as a city. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but wicked leaders tear it apart by their words.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To quarrel with a neighbor is senseless.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “To disparage your neighbor is being heartless.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bite your tongue; be wise and keep quiet!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can’t trust gossipers with a secret;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they’ll just go blab it all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put your confidence instead in a trusted friend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he will be faithful to keep it in confidence.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People lose their way without wise leadership,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a nation succeeds and stands in victory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when it has many good counselors to guide it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The evil man will do harm when confronted by a righteous man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because he hates those who await good news.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and the Septuagint. The Hebrew is “You’ll be ruined if you cosign for a stranger, and a hater of handshakes will be safe.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gracious, generous woman
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'will be honored with a splendid '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “glorious.”
      marker-yv: yv-n
    - type: text
      text: reputation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the woman who hates the truth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'lives with disgrace '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As translated from the older Aramaic and Septuagint texts, but not included in newer Hebrew manuscripts. There is an additional line added by the Aramaic and the Septuagint: “The lazy will lack, but the diligent support themselves financially.”'
      marker-yv: yv-n
    - type: text
      text: and is surrounded by men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who are cutthroats, only greedy for money.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “the diligent obtain wealth.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A man of kindness attracts favor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while a cruel man attracts nothing but trouble.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew text indicates this trouble could be physical, related to one’s health.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil people may get a short-term gain,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wages of deception.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but to sow seeds of righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will bring a true and lasting reward.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A son of righteousness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from one Hebrew manuscript, the Aramaic, and the Septuagint. Most Hebrew manuscripts have “The one who pursues righteousness.”
      marker-yv: yv-n
    - type: text
      text: experiences the abundant life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one who pursues evil hurries to his own death.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you act with presumption,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: convinced that you’re right,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: don’t be surprised if you fall flat on your face!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But humility leads to wisdom.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord can’t stand the stubborn heart bent toward evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he treasures those whose ways are pure.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wholehearted.”
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Assault your neighbor and you will certainly be punished,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and the Targum (Hebrew-Aramaic commentary).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but God will rescue the children of the godly.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A beautiful woman who abandons good morals
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is like a fine gold ring dangling from a pig’s snout.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: True lovers of God are filled with longings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for what is pleasing and good,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wicked can only expect doom.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Generosity brings prosperity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but withholding from charity brings poverty.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who live to bless others
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will have blessings heaped upon them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the one who pours out his life to pour out blessings
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be saturated with favor.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase here literally means “The soul of blessing will grow fat.”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will curse the businessman with no ethics,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one with a social conscience receives praise from all.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase here literally means “The one who withholds produce will be cursed, but blessing will be on the head of the one who sells it.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Living your life seeking what is good for others brings untold favor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but those who wish evil for others will find it coming back on them.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep trusting in your riches and down you’ll go!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the lovers of God rise up like flowers in the spring.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fool who brings trouble to his own family
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be cut out of the will,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the family servant will do better than he.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Integrity will lead you to success,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but treachery will destroy your dreams.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But a life lived loving God bears lasting fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the one who is truly wise wins souls.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew. The Aramaic and the Septuagint read “the souls of violent ones will be removed.”
      marker-yv: yv-n
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If the righteous are barely saved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what’s in store for all the wicked?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When judgment day comes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all the wealth of the world won’t help you one bit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So be rich in righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for that’s the only thing that can save you in death.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those with good character walk on a smooth path,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with no detour or deviation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the wicked keep falling because of their own wickedness.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Integrity will keep a good man from falling.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the unbeliever is trapped,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: held captive to his sinful desires.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When an evil man dies, all hope is lost,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for his misplaced confidence goes in the coffin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: buried along with him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous are snatched away from trouble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the wicked show up in their place.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Haman is a classic example of this principle. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Est. 7:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 9:24–25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The teachings of hypocrites can destroy you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but revelation-knowledge will rescue the righteous.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 11:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the righteous will be strengthened.”
      marker-yv: yv-n
