  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They trample the poor and helpless into the dirt
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 2:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for the word translated “trample” has a homonym meaning “to be eager,” “to pant for,” or “to long for.” That is, the oppressors “long for the dust of the earth on the head of the poor.” It would then imply that the rich are satisfied only when they see the poor with dust on their heads in a miserable condition. The ever-present (to this day) temptation for those at the top of the economic pyramid, especially during times of prosperity, is to protect their position (with force if necessary) and turn a blind eye to those at the bottom. Hierarchies will always naturally form as the able, intelligent, and powerful take on more responsibility. The question always remains: How are you going to behave when you get to the top? Amos deals with such wise insights that are so very applicable to this prosperous age in which we now live. The sin is not being “at the top.” Someone has to run things. The sin is allowing corruption to pervert our time at the top.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and shove aside the rights of the destitute.
    - type: usfm
