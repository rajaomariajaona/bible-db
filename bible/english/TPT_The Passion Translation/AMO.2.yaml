    content: So I will send fire down into Moab
  - type: text
    content: to devour the fortresses of Kerioth.
  - type: note
    content: The Septuagint translates Kerioth not as a proper name but as “towns.”
  - type: text
    content: Moab will perish in the heat of battle
  - type: text
