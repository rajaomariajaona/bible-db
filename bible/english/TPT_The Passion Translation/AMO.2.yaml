  '13':
  - type: text
    content: Very well! I will press you down
  - type: note
    content: 'The meaning of the Hebrew verb is uncertain. There are at least seven possible ways to translate ʿuq with variant nuances: (1) “to press down [crush]”; (2) “to groan”; (3) “to split [hollow out]”; (4) “to bring to a halt [hinder]”; (5) “to shake [earthquake]”; (6) “to collapse”; (7) “to cut in pieces.” For a detailed study of each possible translation and their criticism, see Hartmut Gese, “Kleine Beiträge zum Verständnis des Amosbuches,” Vetus Testamentum 12.4 (1962), 417–24; Hans-Peter Müller, “Die Wurzeln ʿyq, yʿq, und ʿwq,” Vetus Testamentum 21.5 (1971), 556–64.'
  - type: text
    content: like a cart overloaded with grain.
  '14':
  - type: text
    content: Even the swiftest runner will not escape,
  - type: text
    content: physical strength will not be enough to protect the strong,
  - type: text
    content: nor will the mighty warrior be able to save himself.
  '15':
