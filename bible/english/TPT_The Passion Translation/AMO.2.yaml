          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “[they] bend the way of the afflicted” (i.e., they put stumbling blocks in their way or traps to impede the anticipated enjoyment of their lives).
      marker-yv: yv-n
  - type: usfm
