  - type: text
    content: They burned the bones of the king of Edom to lime.
  - type: note
    content: This historical event of burning the king’s bones did not take place immediately after the death of the unknown king but apparently sometime later, when his tomb was opened and desecrated. The ancient Semites considered this offensive act to be odious.
  '10':
  - type: text
    content: It was I who brought you up from Egypt
