  '7':
  - type: text
    content: They trample the poor and helpless into the dirt
  - type: note
    content: 'The Hebrew for the word translated “trample” has a homonym meaning “to be eager,” “to pant for,” or “to long for.” That is, the oppressors “long for the dust of the earth on the head of the poor.” It would then imply that the rich are satisfied only when they see the poor with dust on their heads in a miserable condition. The ever-present (to this day) temptation for those at the top of the economic pyramid, especially during times of prosperity, is to protect their position (with force if necessary) and turn a blind eye to those at the bottom. Hierarchies will always naturally form as the able, intelligent, and powerful take on more responsibility. The question always remains: How are you going to behave when you get to the top? Amos deals with such wise insights that are so very applicable to this prosperous age in which we now live. The sin is not being “at the top.” Someone has to run things. The sin is allowing corruption to pervert our time at the top.'
  - type: text
    content: and shove aside the rights of the destitute.
  - type: note
    content: Or “[they] bend the way of the afflicted” (i.e., they put stumbling blocks in their way or traps to impede the anticipated enjoyment of their lives).
  - type: text
    content: A son and his father have sex with the same woman,
  - type: note
    content: Expositors are evenly divided over the identity of this young woman or girl. Some view her as a cultic prostitute, and others see her as a domestic servant violated by a son and his father.
  - type: text
    content: and by doing so, they profane my holy name.
  '8':
  - type: text
    content: They lay themselves down beside every altar
  - type: text
    content: on garments taken as security for debts,
  - type: text
    content: and in the house of God they drink the wine
  - type: text
    content: they got from those who have been fined.
  '9':
  - type: text
    content: “Yet it was I who destroyed the Amorites
  - type: note
    content: The Amorites were the original pre-Joshua inhabitants of what became Israel.
  - type: text
    content: before your very eyes.
  - type: text
    content: They stood as tall as cedar trees
  - type: text
    content: and as strong as oaks.
  - type: text
    content: I destroyed them root and branch.
  - type: note
    content: Or “their fruit above and root below.” This is a Hebraic figure of speech (i.e., “from crown to kingdom”) to say that they were completely destroyed. See Job 18:16.
