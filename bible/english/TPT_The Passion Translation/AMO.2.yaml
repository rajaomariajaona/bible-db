    content: I raised up prophets from your sons
  - type: text
    content: 'and Nazirites '
  - type: note
    content: Nazirites were those completely set apart for the service of God. A Nazirite was not allowed to cut his hair, touch any dead thing (person), or drink wine. He had to take several vows that are described in the law of the Nazirite found in Num. 6:1–21.
  - type: text
