document_id: PRO.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Is the Source of Wisdom
  - type: text
    content: 'It’s as easy for God to steer a king’s heart '
  - type: note
    content: Don’t forget, we have been made kings and priests by the blood of the Lamb. See 1 Peter 2:9; Rev. 1:6; 5:10.
  - type: text
    content: for his purposes
  - type: text
    content: as it is for him to direct the course of a stream.
  - type: note
    content: Because a leader’s decisions affect so many people, God will intervene and steer them as a farmer steers the course of a stream to irrigate his fields.
  '10':
  - type: text
    content: The wicked always crave what is evil;
  - type: text
    content: they’ll show no mercy and get no mercy.
  - type: note
    content: The Hebrew is “they show no mercy,” while the Septuagint reads “they’ll receive no mercy.” This translation merges both concepts.
  '11':
  - type: text
    content: Senseless people learn their lessons the hard way,
  - type: text
    content: but the wise are teachable.
  '12':
  - type: text
    content: 'A godly, righteous person '
  - type: note
    content: The Hebrew is “a righteous one,” which can also speak of God, “the Righteous One.”
  - type: text
    content: has the ability
  - type: text
    content: to bring the light of instruction to the wicked
  - type: text
    content: even though he despises what the wicked do.
  - type: note
    content: 'As translated from the Septuagint. There are many examples of this in the Bible: Joseph in Egypt, Daniel in Babylon, and the follower of Jesus today who is living among unbelievers.'
  '13':
  - type: text
    content: If you close your heart to the cries of the poor,
  - type: text
    content: then I’ll close my ears when you cry out to me!
  '14':
  - type: text
    content: Try giving a secret gift to the one who is angry with you
  - type: text
    content: and watch his anger disappear.
  - type: text
    content: A kind, generous gift goes a long way
  - type: text
    content: to soothe the anger of one who is livid.
  - type: note
    content: The Aramaic and Septuagint translate this “He who withholds a gift arouses anger.”
  '15':
  - type: text
    content: When justice is served,
  - type: text
    content: the lovers of God celebrate and rejoice,
  - type: text
    content: but the wicked begin to panic.
  '16':
  - type: text
    content: When you forsake the ways of wisdom,
  - type: text
    content: you will wander into the realm of dark spirits.
  - type: note
    content: Or “the congregation of the Rephaites.” The Rephaites were a pagan tribe of giants and have been equated with spirits of darkness. See Gen. 14:5 and Deut. 2:11.
  '17':
  - type: text
    content: To love pleasure for pleasure’s sake
  - type: text
    content: will introduce you to poverty.
  - type: text
    content: Indulging in a life of luxury
  - type: note
    content: Or “loving wine and oil.”
  - type: text
    content: will never make you wealthy.
  '18':
  - type: text
    content: The wicked bring on themselves
  - type: text
    content: the very suffering they planned for others,
  - type: text
    content: for their treachery comes back to haunt them.
  - type: note
    content: Or “The evil become the ransom payment for the righteous and the faithless for the upright.”
  '19':
  - type: text
    content: It’s better to live in a hut in the wilderness
  - type: text
    content: than with a crabby, scolding spouse!
  '2':
  - type: text
    content: We may think we’re right all the time,
  - type: text
    content: but God thoroughly examines our motives.
  '20':
  - type: text
    content: In wisdom’s house you’ll find delightful treasures
  - type: text
    content: and the oil of the Holy Spirit.
  - type: note
    content: The Hebrew word for “oil” is an emblem of the Holy Spirit.
  - type: text
    content: 'But the stupid '
  - type: note
    content: Or “a fool of a man.”
  - type: text
    content: squander what they’ve been given.
  '21':
  - type: text
    content: The lovers of God who chase after righteousness
  - type: text
    content: 'will find all their dreams come true:'
  - type: text
    content: an abundant life drenched with favor
  - type: text
    content: and a fountain that overflows with satisfaction.
  - type: note
    content: Or “righteousness.”
  '22':
  - type: text
    content: A warrior filled with wisdom ascends into the high place
  - type: text
    content: and releases breakthrough,
  - type: text
    content: bringing down the strongholds of the mighty.
  - type: note
    content: Or “demolishing their strength of confidence.”
  '23':
  - type: text
    content: Watch your words and be careful what you say,
  - type: text
    content: and you’ll be surprised by how few troubles you’ll have.
  '24':
  - type: text
    content: An arrogant man is inflated with pride—
  - type: text
    content: nothing but a snooty scoffer in love with his own opinion.
  - type: text
    content: Mr. Mocker is his name!
  - type: note
    content: 'The Septuagint adds a line: “He who holds a grudge is a sinner.”'
  '25':
  - type: text
    content: Taking the easy way out is the habit of a lazy man,
  - type: text
    content: and it will be his downfall.
  - type: text
    content: All day long he thinks about all the things that he craves,
  - type: text
    content: 'for he hasn’t learned the secret that the generous man has learned:'
  - type: text
    content: extravagant giving never leads to poverty.
  - type: note
    content: This is implied in the context and is necessary to complete the meaning of the proverb. The last line of this verse in the Septuagint reads “the righteous lavish on others mercy and compassion.”
  '27':
  - type: text
    content: To bring an offering to God with an ulterior motive is detestable,
  - type: text
    content: for it amounts to nothing but hypocrisy.
  '28':
  - type: text
    content: No one believes a notorious liar,
  - type: text
    content: but the guarded words of an honest man stand the test of time.
  '29':
  - type: text
    content: The wicked are shameless and stubborn,
  - type: text
    content: but the lovers of God have a holy confidence.
  '3':
  - type: text
    content: It pleases God more when we demonstrate godliness and justice
  - type: text
    content: than when we merely offer him a sacrifice.
  '30':
  - type: text
    content: All your brilliant wisdom and clever insight
  - type: text
    content: will be of no help at all if the Lord is against you.
  '31':
  - type: text
    content: You can do your best to prepare for the battle,
  - type: note
    content: Or “The horse is prepared for the battle.”
  - type: text
    content: but ultimate victory comes from the Lord God.
  '4':
  - type: text
    content: Arrogance, superiority, and pride are the fruits of sin.
  - type: note
    content: Or “the tillage of the wicked.” The Aramaic and the Septuagint have “the lamp of the wicked.”
  '5':
  - type: text
    content: Brilliant ideas pay off and bring you prosperity,
  - type: text
    content: but making hasty, impatient decisions
  - type: text
    content: will only lead to financial loss.
  - type: note
    content: The Aramaic is “The thoughts of the chosen one are trusting, but those of the evil one lead to poverty.” This verse is missing from the Septuagint.
  '6':
  - type: text
    content: You can make a fortune dishonestly,
  - type: text
    content: but your crime will hold you in the snares of death!
  - type: note
    content: As translated from the Aramaic and the Septuagint. The Hebrew is “the money will vanish into thin air.”
  '7':
  - type: text
    content: Violent rebels don’t have a chance,
  - type: text
    content: for their rejection of truth and their love of evil
  - type: text
    content: will drag them deeper into darkness.
  '8':
  - type: text
    content: You can discern that a person is guilty by his devious actions
  - type: text
    content: and the innocence of a person by his honest, sincere ways.
  '9':
  - type: text
    content: It’s better to live all alone in a rickety shack
  - type: text
    content: than to share a castle with a crabby spouse!
  - type: note
    content: The Septuagint reads “It’s better to live in the corner of an attic than in a large home plastered with unrighteousness.”
