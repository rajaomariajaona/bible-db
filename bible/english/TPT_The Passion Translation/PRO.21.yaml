document_id: PRO.21,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God Is the Source of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'It’s as easy for God to steer a king’s heart '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Don’t forget, we have been made kings and priests by the blood of the Lamb. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 2:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: for his purposes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as it is for him to direct the course of a stream.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Because a leader’s decisions affect so many people, God will intervene and steer them as a farmer steers the course of a stream to irrigate his fields.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The wicked always crave what is evil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they’ll show no mercy and get no mercy.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is “they show no mercy,” while the Septuagint reads “they’ll receive no mercy.” This translation merges both concepts.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Senseless people learn their lessons the hard way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wise are teachable.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A godly, righteous person '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is “a righteous one,” which can also speak of God, “the Righteous One.”
      marker-yv: yv-n
    - type: text
      text: has the ability
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to bring the light of instruction to the wicked
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even though he despises what the wicked do.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As translated from the Septuagint. There are many examples of this in the Bible: Joseph in Egypt, Daniel in Babylon, and the follower of Jesus today who is living among unbelievers.'
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: If you close your heart to the cries of the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then I’ll close my ears when you cry out to me!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Try giving a secret gift to the one who is angry with you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and watch his anger disappear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A kind, generous gift goes a long way
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to soothe the anger of one who is livid.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic and Septuagint translate this “He who withholds a gift arouses anger.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When justice is served,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the lovers of God celebrate and rejoice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wicked begin to panic.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When you forsake the ways of wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will wander into the realm of dark spirits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the congregation of the Rephaites.” The Rephaites were a pagan tribe of giants and have been equated with spirits of darkness. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 14:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: To love pleasure for pleasure’s sake
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will introduce you to poverty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Indulging in a life of luxury
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “loving wine and oil.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will never make you wealthy.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The wicked bring on themselves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the very suffering they planned for others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for their treachery comes back to haunt them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The evil become the ransom payment for the righteous and the faithless for the upright.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It’s better to live in a hut in the wilderness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than with a crabby, scolding spouse!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: We may think we’re right all the time,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but God thoroughly examines our motives.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: In wisdom’s house you’ll find delightful treasures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the oil of the Holy Spirit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “oil” is an emblem of the Holy Spirit.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But the stupid '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a fool of a man.”
      marker-yv: yv-n
    - type: text
      text: squander what they’ve been given.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The lovers of God who chase after righteousness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'will find all their dreams come true:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an abundant life drenched with favor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and a fountain that overflows with satisfaction.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “righteousness.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: A warrior filled with wisdom ascends into the high place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and releases breakthrough,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bringing down the strongholds of the mighty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “demolishing their strength of confidence.”
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Watch your words and be careful what you say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you’ll be surprised by how few troubles you’ll have.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: An arrogant man is inflated with pride—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nothing but a snooty scoffer in love with his own opinion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mr. Mocker is his name!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Septuagint adds a line: “He who holds a grudge is a sinner.”'
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 25-26
    - type: text
      text: Taking the easy way out is the habit of a lazy man,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and it will be his downfall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day long he thinks about all the things that he craves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for he hasn’t learned the secret that the generous man has learned:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: extravagant giving never leads to poverty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:25–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is implied in the context and is necessary to complete the meaning of the proverb. The last line of this verse in the Septuagint reads “the righteous lavish on others mercy and compassion.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: To bring an offering to God with an ulterior motive is detestable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for it amounts to nothing but hypocrisy.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: No one believes a notorious liar,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the guarded words of an honest man stand the test of time.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The wicked are shameless and stubborn,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the lovers of God have a holy confidence.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: It pleases God more when we demonstrate godliness and justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than when we merely offer him a sacrifice.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: All your brilliant wisdom and clever insight
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be of no help at all if the Lord is against you.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: You can do your best to prepare for the battle,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “The horse is prepared for the battle.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but ultimate victory comes from the Lord God.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Arrogance, superiority, and pride are the fruits of sin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the tillage of the wicked.” The Aramaic and the Septuagint have “the lamp of the wicked.”
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Brilliant ideas pay off and bring you prosperity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but making hasty, impatient decisions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will only lead to financial loss.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic is “The thoughts of the chosen one are trusting, but those of the evil one lead to poverty.” This verse is missing from the Septuagint.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You can make a fortune dishonestly,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but your crime will hold you in the snares of death!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and the Septuagint. The Hebrew is “the money will vanish into thin air.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Violent rebels don’t have a chance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for their rejection of truth and their love of evil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will drag them deeper into darkness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: You can discern that a person is guilty by his devious actions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the innocence of a person by his honest, sincere ways.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: It’s better to live all alone in a rickety shack
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to share a castle with a crabby spouse!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 21:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “It’s better to live in the corner of an attic than in a large home plastered with unrighteousness.”
      marker-yv: yv-n
