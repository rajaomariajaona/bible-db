document_id: PSA.78,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Lessons from History
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Asaph’s poetic song of instruction
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Beloved ones, listen to this instruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Open your heart to the revelation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of this mystery that I share with you.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: They didn’t really believe the promises of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they refused to trust him and move forward in faith.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They forgot his wonderful works and the miracles of the past,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: even their exodus from Egypt, the epic miracle of his might.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They forgot the glories of his power at the place of passing over.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the fields of Zoan.”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Zoan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “crossing place” or “place of departure.” (See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '43'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .)
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: God split the sea wide open, and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the waters stood at attention on either side
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as the people passed on through!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: By day the moving glory-cloud led them forward.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And all through the night the fire-cloud stood as a sentry of light.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 15-16
    - type: text
      text: In the days of desert dryness, he split open the mighty rock,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the waters flowed like a river before their very eyes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He gave them all they wanted to drink from his living springs.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Yet they kept their rebellion alive against God Most High,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their sins against God continued to be counted.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: In their hearts they tested God just to get what they wanted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: asking for the food their hearts craved.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 19-20
    - type: text
      text: Like spoiled children they grumbled against God,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: demanding he prove his love
    - type: text
      text: ' by saying,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can’t God provide for us in this barren wilderness?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will he give us food, or will he only give us water?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where’s our meal?”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: A parable and a proverb are hidden in what I say—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'an intriguing riddle '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “riddle” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: chidoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) comes from the verb meaning “to tie a knot.” It is something that must be untied and unraveled by the Spirit of God. One of these riddles or wordplays is the name of Jesus hidden in plain sight (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '22'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and footnote).
      marker-yv: yv-n
    - type: text
      text: from the past.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then God heard all their complaining and was furious!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His anger flared up against his people.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: For they turned away from faith and walked away in fear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they failed to trust in his power to save '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word for “save” looks and sounds like Yeshua (Jesus).
      marker-yv: yv-n
    - type: text
      text: them when he was near.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 23-24
    - type: text
      text: Still he spoke on their behalf, and the skies opened up;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the windows of heaven poured out food,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the mercy bread-manna.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The grain of grace fell from the clouds.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Humans ate angels’ food—the meal of the mighty ones.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word for “angels” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: ‘abirim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: which means “brave,” “noble,” or “strong.” The psalmist was saying that God gave them the best, most delicious food imaginable, a meal eaten by the mighty ones, and yet the people grew tired of it and began to complain and demanded some variety.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His grace gave them more than enough!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 26-27
    - type: text
      text: The heavenly winds of miracle power blew in their favor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and food rained down upon them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: succulent quail quieted their hunger as they ate all they wanted.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Food fell from the skies, thick as clouds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their provision floated down right in front of their eyes!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: He gave them all they desired, and they ate to their fill.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 3-4
    - type: text
      text: We’ve heard true stories from our fathers about our rich heritage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will continue to tell our children
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and not hide from the rising generation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the great marvels of our God—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his miracles and power that have brought us all this far.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 30-31
    - type: text
      text: But before they had even finished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even with their food still in their mouths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God’s fiery anger arose against them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: killing the finest of their mighty men.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Yet in spite of all this, they kept right on sinning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when they saw God’s marvels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they refused to believe God could care for them.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: So God cut their lives short with sudden disaster,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with nothing to show for their lives but fear and failure.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: it
      children:
      - type: text
        text: When he cared for them they ignored him
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when he began to kill them, ending their lives in a moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they came running back to God, pleading for mercy.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: They remembered that God, the Mighty One,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was their strong protector,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the Hero-God who would come to their rescue.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 36-37
    - type: text
      text: But their repentance lasted only as long as they were in danger;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they lied through their teeth to the true God of the Covenant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So quickly they wandered away from his promises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: following God with their words and not their hearts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their worship was only flattery.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: But amazingly, God—so full of compassion—still forgave them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He covered over their sins with his love,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: refusing to destroy them all.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Over and over he held back his anger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: restraining wrath to show them mercy.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: He knew that they were made from mere dust—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: frail, fragile, and short-lived, here today and gone tomorrow.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: How many times they rebelled in their desert days!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How they grieved him with their grumblings.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Again and again they limited God, preventing him from blessing them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Continually they turned back from him
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and provoked '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew verb for “provoked” is a hapax legomenon and comes from a root word for “marked.” It is as though Israel’s behavior wounded the heart of God.
      marker-yv: yv-n
    - type: text
      text: the Holy One of Israel!
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: They forgot his great love, how he took them by his hand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with redemption’s kiss
    - type: text
      text: ' he delivered them from their enemies.'
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: They disregarded all the epic signs and marvels they saw
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they escaped from Egypt’s bondage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They forgot the judgment of the plagues that set them free.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: God turned their rivers into blood, leaving the people thirsty.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: He sent them vast swarms of filthy flies that sucked their blood.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent hordes of frogs, ruining their lives.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Grasshoppers consumed all their crops.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Every garden and every orchard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was flattened with blasts of hailstones,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their fruit trees ruined by a killing frost.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Even their cattle fell prey, pounded by the falling hail;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their livestock were struck with bolts of lightning.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Finally, he unleashed upon them the fierceness of his anger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such fury!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sent them sorrow and devastating trouble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by his mighty band of destroying angels;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: messengers of death were dispatched against them.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The story of Israel is a lesson in God’s ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He established decrees for Jacob and established the law in Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he commanded our forefathers to teach them to their children.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 50-51
    - type: text
      text: He lifted his mercy and let loose his fearful anger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and did not spare their lives.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He released the judgment-plagues to rage through their land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God struck down in death all the firstborn sons of Egypt—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the pride and joy of each family.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Then, like a shepherd leading his sheep, God led his people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: out of tyranny, guiding them through the wilderness like a flock.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Safely and carefully God led them out, with nothing to fear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But their enemies he led into the sea.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He took care of them there once and for all!
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Eventually God brought his people to the Holy Land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to a land of hills that he had prepared for them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:54
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic reads “He brought them to the border of his holiness, the mountain possessed by his right hand.”
      marker-yv: yv-n
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: He drove out and scattered all the peoples occupying the land,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: staking out an inheritance, a portion for each of Israel’s tribes.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Yet for all of this, they still rebelled and refused to follow his ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: provoking to anger the God Most High.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 57-58
    - type: text
      text: Like traitors turning back, they forsook him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were even worse than their fathers!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They became treacherous deceivers, crooked and corrupt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and worshiped false gods in the high places,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bringing low the name of God with every idol they erected.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No wonder he was filled with jealousy and furious with anger!
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Enraged with anger, God turned his wrath on them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he rejected his people with disgust.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For perpetuity God’s ways will be passed down
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from one generation to the next, even to those not yet born.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: God walked away from them and left his dwelling place at Shiloh,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abandoning the place where he had lived among them,
  '61':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: allowing his emblem of strength, his glory-ark, to be captured.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enemies stole the very source of Israel’s power.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: God vented his rage, allowing his people to be butchered
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they went out to battle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for his anger was intense against his very own.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: Their young men fell on the battlefield and never came back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their daughters never heard their wedding songs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: since there was no one left to marry!
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Their priests were slaughtered and their widows were killed
  - type: usfm
    marker: q1
    children:
    - type: text
      text: before they had time to weep.
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: Then all at once the Almighty awakened
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as though he had been asleep.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a mighty man he arose, roaring into action!
  '66':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: He blasted into battle, driving back every foe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: defeating them and disgracing them for time and eternity.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: He rejected Joseph’s family, the tribe of Ephraim.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: He chose instead the tribe of Judah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 78:68
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The place of God’s dwelling was moved from the land of Ephraim (Shiloh) to the land of Judah (Jerusalem).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and Mount Zion, which he loves.
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: There he built his towering temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: strong and enduring as the earth itself.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'In this way, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: every generation
    - type: text
      text: ' will set its hope in God'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and not forget his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wonderful
    - type: text
      text: ' works but keep his commandments.'
  '70':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: God also chose his beloved one, David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He promoted him from caring for sheep
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and made him his prophetic servant.
  '71':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 71-72
    - type: text
      text: God prepared David and took this gentle shepherd-king
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and presented him before the people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as the one who would love and care for them
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with integrity, a pure heart, and the anointing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to lead Israel, his holy inheritance.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: By following his ways they will break the past bondage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of their fickle fathers, who were a stubborn, rebellious generation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and whose spirits strayed from the eternal God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They refused to love him with all their hearts.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Take, for example, the sons of Ephraim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though they were all equipped warriors, each with weapons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the battle began they retreated and ran away in fear.
