document_id: PSA.78,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Lessons from History
  - type: text
    content: Asaph’s poetic song of instruction
  - type: text
    content: Beloved ones, listen to this instruction.
  - type: text
    content: Open your heart to the revelation
  - type: text
    content: of this mystery that I share with you.
  '10':
  - type: text
    content: They didn’t really believe the promises of God;
  - type: text
    content: they refused to trust him and move forward in faith.
  '11':
  - type: text
    content: They forgot his wonderful works and the miracles of the past,
  '12':
  - type: text
    content: even their exodus from Egypt, the epic miracle of his might.
  - type: text
    content: They forgot the glories of his power at the place of passing over.
  - type: note
    content: Or “the fields of Zoan.” Zoan means “crossing place” or “place of departure.” (See v. 43.)
  '13':
  - type: text
    content: God split the sea wide open, and
  - type: text
    content: the waters stood at attention on either side
  - type: text
    content: as the people passed on through!
  '14':
  - type: text
    content: By day the moving glory-cloud led them forward.
  - type: text
    content: And all through the night the fire-cloud stood as a sentry of light.
  '15':
  - type: text
    content: In the days of desert dryness, he split open the mighty rock,
  - type: text
    content: and the waters flowed like a river before their very eyes.
  - type: text
    content: He gave them all they wanted to drink from his living springs.
  '17':
  - type: text
    content: Yet they kept their rebellion alive against God Most High,
  - type: text
    content: and their sins against God continued to be counted.
  '18':
  - type: text
    content: In their hearts they tested God just to get what they wanted,
  - type: text
    content: asking for the food their hearts craved.
  '19':
  - type: text
    content: Like spoiled children they grumbled against God,
  - type: text
    content: demanding he prove his love
  - type: text
    content: ' by saying,'
  - type: text
    content: “Can’t God provide for us in this barren wilderness?
  - type: text
    content: Will he give us food, or will he only give us water?
  - type: text
    content: Where’s our meal?”
  '2':
  - type: text
    content: A parable and a proverb are hidden in what I say—
  - type: text
    content: 'an intriguing riddle '
  - type: note
    content: The Hebrew word for “riddle” (chidoth) comes from the verb meaning “to tie a knot.” It is something that must be untied and unraveled by the Spirit of God. One of these riddles or wordplays is the name of Jesus hidden in plain sight (see v. 22 and footnote).
  - type: text
    content: from the past.
  '21':
  - type: text
    content: Then God heard all their complaining and was furious!
  - type: text
    content: His anger flared up against his people.
  '22':
  - type: text
    content: For they turned away from faith and walked away in fear;
  - type: text
    content: 'they failed to trust in his power to save '
  - type: note
    content: The word for “save” looks and sounds like Yeshua (Jesus).
  - type: text
    content: them when he was near.
  '23':
  - type: text
    content: Still he spoke on their behalf, and the skies opened up;
  - type: text
    content: the windows of heaven poured out food,
  - type: text
    content: the mercy bread-manna.
  - type: text
    content: The grain of grace fell from the clouds.
  '25':
  - type: text
    content: Humans ate angels’ food—the meal of the mighty ones.
  - type: note
    content: The word for “angels” is ‘abirim which means “brave,” “noble,” or “strong.” The psalmist was saying that God gave them the best, most delicious food imaginable, a meal eaten by the mighty ones, and yet the people grew tired of it and began to complain and demanded some variety.
  - type: text
    content: His grace gave them more than enough!
  '26':
  - type: text
    content: The heavenly winds of miracle power blew in their favor,
  - type: text
    content: and food rained down upon them;
  - type: text
    content: succulent quail quieted their hunger as they ate all they wanted.
  '28':
  - type: text
    content: Food fell from the skies, thick as clouds;
  - type: text
    content: their provision floated down right in front of their eyes!
  '29':
  - type: text
    content: He gave them all they desired, and they ate to their fill.
  '3':
  - type: text
    content: We’ve heard true stories from our fathers about our rich heritage.
  - type: text
    content: We will continue to tell our children
  - type: text
    content: and not hide from the rising generation
  - type: text
    content: the great marvels of our God—
  - type: text
    content: his miracles and power that have brought us all this far.
  '30':
  - type: text
    content: But before they had even finished,
  - type: text
    content: even with their food still in their mouths,
  - type: text
    content: God’s fiery anger arose against them,
  - type: text
    content: killing the finest of their mighty men.
  '32':
  - type: text
    content: Yet in spite of all this, they kept right on sinning.
  - type: text
    content: Even when they saw God’s marvels,
  - type: text
    content: they refused to believe God could care for them.
  '33':
  - type: text
    content: So God cut their lives short with sudden disaster,
  - type: text
    content: with nothing to show for their lives but fear and failure.
  '34':
  - type: text
    content: When he cared for them they ignored him
  - type: text
    content: ','
  - type: text
    content: but when he began to kill them, ending their lives in a moment,
  - type: text
    content: they came running back to God, pleading for mercy.
  '35':
  - type: text
    content: They remembered that God, the Mighty One,
  - type: text
    content: was their strong protector,
  - type: text
    content: the Hero-God who would come to their rescue.
  '36':
  - type: text
    content: But their repentance lasted only as long as they were in danger;
  - type: text
    content: they lied through their teeth to the true God of the Covenant.
  - type: text
    content: So quickly they wandered away from his promises,
  - type: text
    content: following God with their words and not their hearts!
  - type: text
    content: Their worship was only flattery.
  '38':
  - type: text
    content: But amazingly, God—so full of compassion—still forgave them.
  - type: text
    content: He covered over their sins with his love,
  - type: text
    content: refusing to destroy them all.
  - type: text
    content: Over and over he held back his anger,
  - type: text
    content: restraining wrath to show them mercy.
  '39':
  - type: text
    content: He knew that they were made from mere dust—
  - type: text
    content: frail, fragile, and short-lived, here today and gone tomorrow.
  '40':
  - type: text
    content: How many times they rebelled in their desert days!
  - type: text
    content: How they grieved him with their grumblings.
  '41':
  - type: text
    content: Again and again they limited God, preventing him from blessing them.
  - type: text
    content: Continually they turned back from him
  - type: text
    content: 'and provoked '
  - type: note
    content: The Hebrew verb for “provoked” is a hapax legomenon and comes from a root word for “marked.” It is as though Israel’s behavior wounded the heart of God.
  - type: text
    content: the Holy One of Israel!
  '42':
  - type: text
    content: They forgot his great love, how he took them by his hand,
  - type: text
    content: 'and '
  - type: text
    content: with redemption’s kiss
  - type: text
    content: ' he delivered them from their enemies.'
  '43':
  - type: text
    content: They disregarded all the epic signs and marvels they saw
  - type: text
    content: when they escaped from Egypt’s bondage.
  - type: text
    content: They forgot the judgment of the plagues that set them free.
  '44':
  - type: text
    content: God turned their rivers into blood, leaving the people thirsty.
  '45':
  - type: text
    content: He sent them vast swarms of filthy flies that sucked their blood.
  - type: text
    content: He sent hordes of frogs, ruining their lives.
  '46':
  - type: text
    content: Grasshoppers consumed all their crops.
  '47':
  - type: text
    content: Every garden and every orchard
  - type: text
    content: was flattened with blasts of hailstones,
  - type: text
    content: their fruit trees ruined by a killing frost.
  '48':
  - type: text
    content: Even their cattle fell prey, pounded by the falling hail;
  - type: text
    content: their livestock were struck with bolts of lightning.
  '49':
  - type: text
    content: Finally, he unleashed upon them the fierceness of his anger.
  - type: text
    content: Such fury!
  - type: text
    content: He sent them sorrow and devastating trouble
  - type: text
    content: by his mighty band of destroying angels;
  - type: text
    content: messengers of death were dispatched against them.
  '5':
  - type: text
    content: The story of Israel is a lesson in God’s ways.
  - type: text
    content: He established decrees for Jacob and established the law in Israel,
  - type: text
    content: and he commanded our forefathers to teach them to their children.
  '50':
  - type: text
    content: He lifted his mercy and let loose his fearful anger
  - type: text
    content: and did not spare their lives.
  - type: text
    content: He released the judgment-plagues to rage through their land.
  - type: text
    content: God struck down in death all the firstborn sons of Egypt—
  - type: text
    content: the pride and joy of each family.
  '52':
  - type: text
    content: Then, like a shepherd leading his sheep, God led his people
  - type: text
    content: out of tyranny, guiding them through the wilderness like a flock.
  '53':
  - type: text
    content: Safely and carefully God led them out, with nothing to fear.
  - type: text
    content: But their enemies he led into the sea.
  - type: text
    content: He took care of them there once and for all!
  '54':
  - type: text
    content: Eventually God brought his people to the Holy Land,
  - type: text
    content: to a land of hills that he had prepared for them.
  - type: note
    content: The Aramaic reads “He brought them to the border of his holiness, the mountain possessed by his right hand.”
  '55':
  - type: text
    content: He drove out and scattered all the peoples occupying the land,
  - type: text
    content: staking out an inheritance, a portion for each of Israel’s tribes.
  '56':
  - type: text
    content: Yet for all of this, they still rebelled and refused to follow his ways,
  - type: text
    content: provoking to anger the God Most High.
  '57':
  - type: text
    content: Like traitors turning back, they forsook him.
  - type: text
    content: They were even worse than their fathers!
  - type: text
    content: They became treacherous deceivers, crooked and corrupt,
  - type: text
    content: and worshiped false gods in the high places,
  - type: text
    content: bringing low the name of God with every idol they erected.
  - type: text
    content: No wonder he was filled with jealousy and furious with anger!
  '59':
  - type: text
    content: Enraged with anger, God turned his wrath on them,
  - type: text
    content: and he rejected his people with disgust.
  '6':
  - type: text
    content: For perpetuity God’s ways will be passed down
  - type: text
    content: from one generation to the next, even to those not yet born.
  '60':
  - type: text
    content: God walked away from them and left his dwelling place at Shiloh,
  - type: text
    content: abandoning the place where he had lived among them,
  '61':
  - type: text
    content: allowing his emblem of strength, his glory-ark, to be captured.
  - type: text
    content: Enemies stole the very source of Israel’s power.
  '62':
  - type: text
    content: God vented his rage, allowing his people to be butchered
  - type: text
    content: when they went out to battle,
  - type: text
    content: for his anger was intense against his very own.
  '63':
  - type: text
    content: Their young men fell on the battlefield and never came back.
  - type: text
    content: Their daughters never heard their wedding songs,
  - type: text
    content: since there was no one left to marry!
  '64':
  - type: text
    content: Their priests were slaughtered and their widows were killed
  - type: text
    content: before they had time to weep.
  '65':
  - type: text
    content: Then all at once the Almighty awakened
  - type: text
    content: as though he had been asleep.
  - type: text
    content: Like a mighty man he arose, roaring into action!
  '66':
  - type: text
    content: He blasted into battle, driving back every foe,
  - type: text
    content: defeating them and disgracing them for time and eternity.
  '67':
  - type: text
    content: He rejected Joseph’s family, the tribe of Ephraim.
  '68':
  - type: text
    content: He chose instead the tribe of Judah
  - type: note
    content: The place of God’s dwelling was moved from the land of Ephraim (Shiloh) to the land of Judah (Jerusalem).
  - type: text
    content: and Mount Zion, which he loves.
  '69':
  - type: text
    content: There he built his towering temple,
  - type: text
    content: strong and enduring as the earth itself.
  '7':
  - type: text
    content: 'In this way, '
  - type: text
    content: every generation
  - type: text
    content: ' will set its hope in God'
  - type: text
    content: 'and not forget his '
  - type: text
    content: wonderful
  - type: text
    content: ' works but keep his commandments.'
  '70':
  - type: text
    content: God also chose his beloved one, David.
  - type: text
    content: He promoted him from caring for sheep
  - type: text
    content: and made him his prophetic servant.
  '71':
  - type: text
    content: God prepared David and took this gentle shepherd-king
  - type: text
    content: and presented him before the people
  - type: text
    content: as the one who would love and care for them
  - type: text
    content: with integrity, a pure heart, and the anointing
  - type: text
    content: to lead Israel, his holy inheritance.
  '8':
  - type: text
    content: By following his ways they will break the past bondage
  - type: text
    content: of their fickle fathers, who were a stubborn, rebellious generation
  - type: text
    content: and whose spirits strayed from the eternal God.
  - type: text
    content: They refused to love him with all their hearts.
  '9':
  - type: text
    content: Take, for example, the sons of Ephraim.
  - type: text
    content: Though they were all equipped warriors, each with weapons,
  - type: text
    content: when the battle began they retreated and ran away in fear.
