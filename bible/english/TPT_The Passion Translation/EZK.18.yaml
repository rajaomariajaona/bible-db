      - type: text
        text: is the fifth panel (E) in the chiastic parallel structure in Ezekiel. This section contains the announcement of the covenant curse against Israel, followed by a divine exhortation to new life and heart renewal. This section—panel E—constitutes the parallel with panel E
    - type: usfm
