    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Since God is the Creator and owner of the soul of every person, each individual must stand or fall according to their relationship with God. The sins of others can never determine your destiny.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Three Examples of Personal Responsibility
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
