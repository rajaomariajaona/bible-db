      metadata:
        usfm: MAT.25.35+MAT.25.36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'He does not lend at interest or take any profit. He refuses to do anything evil and gives honest judgment between one person and another. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He keeps my laws and is honest in all that he does. A person like this is righteous, and he will certainly live. I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have decreed it.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“But suppose he has a son who is prone to violence and bloodshed, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'doing what his father never did. He takes part in the heathen feasts on the mountains, commits adultery, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'exploits the poor and needy, robs, and defrauds others. He worships the false gods and engages in despicable practices '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and charges '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exorbitant
  - type: text
    text: ' interest for profit when lending money—such a person will by no means live. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “and living, he will not live.”
    marker-yv: yv-n
  - type: text
    text: Because he committed all these appalling deeds, he will surely be put to death, and he alone will be responsible for his own death.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “his blood will be upon himself.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 20:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ','
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: '11'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 33:4
      metadata:
        usfm: EZK.33.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“But suppose this evil man has a son who sees all the sins his father practiced, yet chooses not to follow his poor example '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and refuses to take part in the heathen feasts on the mountains or worship the false gods of the people of Israel. He does not seduce another man’s wife, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'nor exploit nor defraud anyone. He does not steal but feeds the hungry and clothes the needy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He refuses to do anything evil and does not lend for profit or charge '
  - type: usfm
    marker: it
    children:
    - type: text
      text: exorbitant
  - type: text
    text: ' interest. He faithfully keeps my laws and teachings—such a person will certainly live and not die for his father’s sins. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As for his father, because he practiced fraud, cheated, and robbed others, doing what is wrong among his people, he will most certainly die in his guilt.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he will die for his iniquity.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '“Yet you ask, ‘Why doesn’t the child bear his father’s guilt?’ If a person lives an honest and upright life and keeps my laws and faithfully follows my teachings, he will most certainly live. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: It is the one who sins who will die. A child is not to bear his father’s guilt nor a father his child’s guilt. Good people will be credited for their own righteousness and the wicked with his own wickedness.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Power of Repentance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“However, if the wicked man renounces all the sins he has committed, obeys my laws, and does what is fair and upright, he will most certainly live and will not die. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God is teaching us that sinners can not only be set free from the guilt of their ancestors but also be freed from the guilt and shame of their own past. The individual, not the collective group, is held responsible for sin. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rom. 2:6
      metadata:
        usfm: ROM.2.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'I will not remember any of the sins he committed in the past. Because he has done what is right, he will most certainly live. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say: Do you think I enjoy seeing the wicked die? I would much rather see him renounce his sins and live!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “However, if the righteous man abandons his righteous ways and acts wickedly, and follows all the despicable practices of the wicked, should he be allowed to live? None of his righteous deeds will be remembered from then on, for he is guilty of being unfaithful to me, and he will most certainly die.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“But you complain, ‘The Lord is being unfair. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The way of Lord is not equal [balanced].”
    marker-yv: yv-n
  - type: text
    text: 'That’s not right.’ Now people of Israel, listen to me: Do you think my way of doing things is unjust? Aren’t you the ones who are acting unjustly? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When the righteous man abandons his righteous ways, does what is evil, and dies, he dies responsible for the wrong that he himself committed. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Similarly, when the wicked man abandons his wicked ways to do what is good and right, he saves his own life. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Having considered his ways and having chosen to renounce all his former sins, he will most certainly live and not die. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'And yet the people of Israel say, ‘What the Lord does is not just.’ Really? What I do is not just, people of Israel? Aren’t you the ones who are acting unjustly? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'So from here on, you people of Israel, I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', say to you: I will judge each of you by what he does. Repent, turn away from all your sins, or your own wickedness will be your downfall. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “so that iniquity will not be a stumbling block to you.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
