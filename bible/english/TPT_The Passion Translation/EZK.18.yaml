document_id: EZK.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Personal Responsibility
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 18–19 is the fifth panel (E) in the chiastic parallel structure in Ezekiel. This section contains the announcement of the covenant curse against Israel, followed by a divine exhortation to new life and heart renewal. This section—panel E—constitutes the parallel with panel E1 in ch. 37, containing the vision of the valley of dry bones that conveys the promise of new life and covenant renewal—a spiritual resurrection from the dead.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, '
  '10':
  - type: text
    content: '“But suppose he has a son who is prone to violence and bloodshed, '
  '11':
  - type: text
    content: 'doing what his father never did. He takes part in the heathen feasts on the mountains, commits adultery, '
  '12':
  - type: text
    content: 'exploits the poor and needy, robs, and defrauds others. He worships the false gods and engages in despicable practices '
  '13':
  - type: text
    content: 'and charges '
  - type: text
    content: exorbitant
  - type: text
    content: ' interest for profit when lending money—such a person will by no means live. '
  - type: note
    content: Or “and living, he will not live.”
  - type: text
    content: Because he committed all these appalling deeds, he will surely be put to death, and he alone will be responsible for his own death.
  - type: note
    content: Or “his blood will be upon himself.” See Lev. 20:9, 11; Ezek. 33:4.
  '14':
  - type: text
    content: '“But suppose this evil man has a son who sees all the sins his father practiced, yet chooses not to follow his poor example '
  '15':
  - type: text
    content: 'and refuses to take part in the heathen feasts on the mountains or worship the false gods of the people of Israel. He does not seduce another man’s wife, '
  '16':
  - type: text
    content: 'nor exploit nor defraud anyone. He does not steal but feeds the hungry and clothes the needy. '
  '17':
  - type: text
    content: 'He refuses to do anything evil and does not lend for profit or charge '
  - type: text
    content: exorbitant
  - type: text
    content: ' interest. He faithfully keeps my laws and teachings—such a person will certainly live and not die for his father’s sins. '
  '18':
  - type: text
    content: As for his father, because he practiced fraud, cheated, and robbed others, doing what is wrong among his people, he will most certainly die in his guilt.
  - type: note
    content: Or “he will die for his iniquity.”
  '19':
  - type: text
    content: '“Yet you ask, ‘Why doesn’t the child bear his father’s guilt?’ If a person lives an honest and upright life and keeps my laws and faithfully follows my teachings, he will most certainly live. '
  '2':
  - type: text
    content: '“Why do you keep repeating this proverb in the land of Israel:'
  - type: text
    content: “The parents have eaten sour grapes,
  - type: text
    content: but the children are the ones with the sour taste in their mouths?
  - type: note
    content: Ezekiel’s generation seemed to overlook the truth that they were worse than their fathers and yet were blaming their fathers. The meaning of this parable is that children suffer for something their parents did. The people were quoting this parable because they felt that God was treating them unfairly. They were taken into captivity and lost their homes and land, and they did not think that they deserved to be punished in that way. The basis of this belief is found in Ex. 20:5; Deut. 5:9. This fatalistic attitude left the people of Israel feeling like they had no control over their lives, and it no longer mattered how they lived. Even if they were good, they believed God would punish them for their parents’ evil. In effect, God was annulling Moses’ declaration found in Ex. 34:7, that God would punish up to the third and fourth generation for their ancestors’ sins. This chapter expounds on the doctrine of individual responsibility.
  '20':
  - type: text
    content: It is the one who sins who will die. A child is not to bear his father’s guilt nor a father his child’s guilt. Good people will be credited for their own righteousness and the wicked with his own wickedness.”
  - type: heading
    content: The Power of Repentance
  '21':
  - type: text
    content: '“However, if the wicked man renounces all the sins he has committed, obeys my laws, and does what is fair and upright, he will most certainly live and will not die. '
  - type: note
    content: God is teaching us that sinners can not only be set free from the guilt of their ancestors but also be freed from the guilt and shame of their own past. The individual, not the collective group, is held responsible for sin. See Rom. 2:6.
  '22':
  - type: text
    content: 'I will not remember any of the sins he committed in the past. Because he has done what is right, he will most certainly live. '
  '23':
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say: Do you think I enjoy seeing the wicked die? I would much rather see him renounce his sins and live!'
  '24':
  - type: text
    content: “However, if the righteous man abandons his righteous ways and acts wickedly, and follows all the despicable practices of the wicked, should he be allowed to live? None of his righteous deeds will be remembered from then on, for he is guilty of being unfaithful to me, and he will most certainly die.
  '25':
  - type: text
    content: '“But you complain, ‘The Lord is being unfair. '
  - type: note
    content: Or “The way of Lord is not equal [balanced].”
  - type: text
    content: 'That’s not right.’ Now people of Israel, listen to me: Do you think my way of doing things is unjust? Aren’t you the ones who are acting unjustly? '
  '26':
  - type: text
    content: 'When the righteous man abandons his righteous ways, does what is evil, and dies, he dies responsible for the wrong that he himself committed. '
  '27':
  - type: text
    content: 'Similarly, when the wicked man abandons his wicked ways to do what is good and right, he saves his own life. '
  '28':
  - type: text
    content: 'Having considered his ways and having chosen to renounce all his former sins, he will most certainly live and not die. '
  '29':
  - type: text
    content: 'And yet the people of Israel say, ‘What the Lord does is not just.’ Really? What I do is not just, people of Israel? Aren’t you the ones who are acting unjustly? '
  '3':
  - type: text
    content: '“As I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', live, you will have no reason to repeat this proverb in Israel. '
  '30':
  - type: text
    content: 'So from here on, you people of Israel, I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you: I will judge each of you by what he does. Repent, turn away from all your sins, or your own wickedness will be your downfall. '
  - type: note
    content: Or “so that iniquity will not be a stumbling block to you.”
  '31':
  - type: text
    content: 'You must get rid of all the guilty sins you have committed and clothe '
  - type: note
    content: Or “make yourselves [over].” See Ps. 51:10.
  - type: text
    content: 'yourselves with a new heart and a new spirit. People of Israel, choose life! '
  - type: note
    content: Or “why die?”
  '32':
  - type: text
    content: 'I find no pleasure watching anyone die, '
  - type: note
    content: See 2 Peter 3:9.
  - type: text
    content: 'so repent and live! I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '4':
  - type: text
    content: Listen, every human life belongs to me; both the parent and the child are mine. The one who sins is held responsible and will die.”
  - type: note
    content: See Deut. 24:16; Pss. 15:2–5; 24:3–6; Rom. 14:12; Gal. 6:6–9. Since God is the Creator and owner of the soul of every person, each individual must stand or fall according to their relationship with God. The sins of others can never determine your destiny.
  - type: heading
    content: Three Examples of Personal Responsibility
  '5':
  - type: text
    content: '“Suppose a man is morally good, and his actions are righteous and honest. '
  '6':
  - type: text
    content: 'He does not take part in the heathen feasts on the mountains nor worship the false gods '
  - type: note
    content: Or “lift up his eyes to idols.”
  - type: text
    content: 'of the people of Israel. He does not commit adultery nor have sex with a woman during her period. '
  '7':
  - type: text
    content: 'He exploits and defrauds no one. '
  - type: note
    content: Or “does not withhold a debtor’s collateral.” See Ex. 22:25.
  - type: text
    content: 'He does not steal but '
  - type: text
    content: generously
  - type: text
    content: ' feeds the hungry and clothes the needy. '
  - type: note
    content: See Lev. 25:35–37; Deut. 15:7–11; Isa. 58:7; Matt. 25:35–36.
  '8':
  - type: text
    content: 'He does not lend at interest or take any profit. He refuses to do anything evil and gives honest judgment between one person and another. '
  '9':
  - type: text
    content: 'He keeps my laws and is honest in all that he does. A person like this is righteous, and he will certainly live. I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed it.'
