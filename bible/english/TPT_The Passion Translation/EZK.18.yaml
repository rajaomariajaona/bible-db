    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Why do you keep repeating this proverb in the land of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The parents have eaten sour grapes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the children are the ones with the sour taste in their mouths?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ezekiel’s generation seemed to overlook the truth that they were worse than their fathers and yet were blaming their fathers. The meaning of this parable is that children suffer for something their parents did. The people were quoting this parable because they felt that God was treating them unfairly. They were taken into captivity and lost their homes and land, and they did not think that they deserved to be punished in that way. The basis of this belief is found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 20:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 5:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . This fatalistic attitude left the people of Israel feeling like they had no control over their lives, and it no longer mattered how they lived. Even if they were good, they believed God would punish them for their parents’ evil. In effect, God was annulling Moses’ declaration found in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 34:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', that God would punish up to the third and fourth generation for their ancestors’ sins. This chapter expounds on the doctrine of individual responsibility.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“As I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', live, you will have no reason to repeat this proverb in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Listen, every human life belongs to me; both the parent and the child are mine. The one who sins is held responsible and will die.”
  - type: usfm
