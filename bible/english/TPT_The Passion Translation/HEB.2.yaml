    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'This chapter gives us the 8 victories Christ won for us at Calvary: (1) He is crowned with glory and honor. (2) He brings many sons into his glory. (3) He is made perfect through his sufferings. (4) We are made holy. (5) By his death he destroyed the devil, who held the power of death over us. (6) He delivers us completely from the fear of death. (7) He is now our faithful High Priest. (8) He helps us in every temptation.'
