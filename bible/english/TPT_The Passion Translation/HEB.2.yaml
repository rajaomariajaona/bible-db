        text: . The Aramaic can be translated “Who is man that you would give a thought toward him, for whom the Son of Man should be pledged [to be offered for them].” The phrase “son of man” is used in the New Testament consistently for Jesus Christ, the “Son of Man.” The Hebrew text of
    - type: usfm
