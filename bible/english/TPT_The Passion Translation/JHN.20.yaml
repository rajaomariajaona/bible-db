document_id: JHN.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Empty Tomb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Very early Sunday morning, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “On the first day of the week.”
    marker-yv: yv-n
  - type: text
    text: 'before sunrise, Mary Magdalene made her way to the tomb. And when she arrived she discovered that the stone that sealed the entrance to the tomb was moved away! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'So she went running as fast as she could to go tell Peter and the other disciple, the one Jesus loved. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was obviously John the apostle, the author of this Gospel.
    marker-yv: yv-n
  - type: text
    text: She told them, “They’ve taken the Lord’s body from the tomb, and we don’t know where he is!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then Peter and the other disciple jumped up and ran to the tomb to go see for themselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'They started out together, but the other disciple outran Peter and reached the tomb first. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: How did John outrun Peter to the tomb? Love will always “outrun” curiosity. Some are simply curious to know Jesus, but we must be those who are passionate to experience his love and power.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He didn’t enter the tomb, but peeked in, and saw only the linen cloths lying there. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Peter came behind him and went right into the tomb. He too noticed the linen cloths lying there, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: but the burial cloth that had been on Jesus’ head had been rolled up and placed separate from the other cloths.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then the other disciple who had reached the tomb first went in, and after one look, he believed! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It was lovers of Jesus that were the first to realize the resurrection of Christ. What did John see that caused him to believe? Perhaps it was the linen burial cloths that had not been unwrapped, but simply were empty. And the cloth that had been wrapped around his head was rolled up and placed aside. Jesus left everything pertaining to the old creation in the tomb, signified by the linen cloths and handkerchief left behind.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For until then they hadn’t understood the Scriptures that prophesied '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some of these prophecies would include
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Pss. 2:6–8
      metadata:
        usfm: PSA.2.6+PSA.2.7+PSA.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 16:10
      metadata:
        usfm: PSA.16.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 53:10–12
      metadata:
        usfm: ISA.53.10+ISA.53.11+ISA.53.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hos. 6:2
      metadata:
        usfm: HOS.6.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jonah 1:17
      metadata:
        usfm: JON.1.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'that he was destined to rise from the dead. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Puzzled, Peter and the other disciple then left and went back to their homes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mary arrived '
  - type: usfm
    marker: it
    children:
    - type: text
      text: back at the tomb
  - type: text
    text: ', broken and sobbing. She stooped to peer inside, and through her tears '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: she saw two angels in dazzling white robes, sitting where Jesus’ body had been laid—one at the head and one at the feet!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This becomes a picture of the two golden cherubim engraved on the mercy seat, peering down into the treasures of grace. The empty tomb has become our “mercy seat.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Dear woman, why are you crying?” they asked.
- type: usfm
  marker: p
  children:
  - type: text
    text: Mary answered, “They have taken away my Lord, and I don’t know where they’ve laid him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Then she turned around to leave, and there was Jesus standing in front of her, but she didn’t realize that it was him!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Dear woman, why are you crying? Who are you looking for?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Mary answered, thinking he was only the gardener, “Sir, if you have taken his body somewhere else, tell me, and I will go and . . .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Mary,”
  - type: text
    text: ' Jesus interrupted her.'
- type: usfm
  marker: p
  children:
  - type: text
    text: Turning to face him, she said, “Rabboni!” (Aramaic for “My teacher!”)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus cautioned her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Mary, don’t cling to me,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus was telling Mary, “Don’t cling to me in the way you once knew me, now we are one. Cling to me in my ascension, in my glory.” We don’t cling to a memory of Christ, we cling to the majesty in his glory today.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for I haven’t yet ascended to God, my Father. And he’s not only my Father and God, but now he’s your Father and your God! Now go to my brothers
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the first time in John’s Gospel that Jesus called his disciples “brothers.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 2:10–12
      metadata:
        usfm: HEB.2.10+HEB.2.11+HEB.2.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and tell them what I’ve told you, that I am ascending to my Father—and your Father, to my God—and your God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then Mary Magdalene left to inform the disciples of her encounter with Jesus. “I have seen the Lord!” she told them. And she gave them his message.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to His Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'That evening, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “That Sunday evening.”
    marker-yv: yv-n
  - type: text
    text: 'the disciples gathered together, and because they were afraid of reprisals from the Jewish leaders, they had locked the doors. But suddenly Jesus appeared among them and said, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “came and stood among them.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace to you!”
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the idiomatic equivalent of saying, “Hello, everyone!”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then he showed them the wounds of his hands and his side—they were overjoyed to see the Lord with their own eyes!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus repeated his greeting, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace to you!”
  - type: text
    text: ' And he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Just as the Father has sent me, I’m now sending you.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then, taking a deep breath, he blew '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word used here does not appear elsewhere in the New Testament; however, it is the same word found in the Septuagint for when God “breathed” into Adam’s nostrils the breath of life (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:7
      metadata:
        usfm: GEN.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The beginning of new creation life came from the breath of Jesus. The mighty wind of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 2
      metadata:
        usfm: ACT.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was for power, the breath Jesus breathed into his disciples in this verse was for life.
    marker-yv: yv-n
  - type: text
    text: 'on them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Receive the Holy Spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “accept the Sacred Breath.”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I send you to preach the forgiveness
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “removal, acquittal.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of sins—and people’s sins will be forgiven. But if you don’t proclaim the forgiveness of their sins, they will remain guilty.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If you forgive someone for their sins, their sins will be discharged, but if you retain their sins, their sins will be retained.” Jesus was not giving absolute authority to forgive the guilt of sins, for God alone has that right (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 2:7
      metadata:
        usfm: MRK.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and the apostles at no time assumed that authority. What he gave them, in the context of being his sent ones, was the authority to proclaim the gospel to the nations. If they refused to go and preach the good news, then people would have no opportunity to believe it. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 10:43–44
      metadata:
        usfm: ACT.10.43+ACT.10.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:38
      metadata:
        usfm: ACT.13.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to Thomas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'One of the twelve wasn’t present when Jesus appeared to them—it was Thomas, whose nickname was “the Twin.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So the disciples informed him, “We have seen the Lord with our own eyes!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Still unconvinced, Thomas replied, “There’s no way I’m going to believe this unless I personally see the wounds of the nails '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “the blossom of the nails.” You can imagine a wide nail head that, when struck with a heavy mallet, “blossomed” over the sacred palm of our Lord Jesus. The wound of the nail had imprinted his entire palm. His wounds are like beautiful flowers to the lovers of God.
    marker-yv: yv-n
  - type: text
    text: in his hands, touch them with my finger, and put my hand into the wound of his side where he was pierced!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then eight days later, Thomas and all the others were in the house together. And even though all the doors were locked, Jesus suddenly stood before them! '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace to you,”
  - type: text
    text: ' he said.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then, looking into Thomas’ eyes, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put your finger here in the wounds of my hands. Here—put your hand into my wounded side and see for yourself. Thomas, don’t give in to your doubts any longer, just believe!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Then the words spilled out of his heart—“You are my Lord, and you are my God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jesus responded, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Thomas, now that you’ve seen me, you believe. But there are those who have never seen me with their eyes but have believed in me with their hearts, and they will be blessed even more!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jesus went on to do many more miraculous signs in the presence of his disciples, which are not even included in this book. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'But all that is recorded here is so that you will fully believe '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “never stop believing.”
    marker-yv: yv-n
  - type: text
    text: 'that Jesus is the Anointed One, the Son of God, and that through your faith in him you will experience eternal life '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 20:31
