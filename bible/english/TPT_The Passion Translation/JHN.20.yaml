document_id: JHN.20,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Empty Tomb
  - type: text
    content: 'Very early Sunday morning, '
  - type: note
    content: Or “On the first day of the week.”
  - type: text
    content: 'before sunrise, Mary Magdalene made her way to the tomb. And when she arrived she discovered that the stone that sealed the entrance to the tomb was moved away! '
  '10':
  - type: text
    content: Puzzled, Peter and the other disciple then left and went back to their homes.
  '11':
  - type: text
    content: 'Mary arrived '
  - type: text
    content: back at the tomb
  - type: text
    content: ', broken and sobbing. She stooped to peer inside, and through her tears '
  '12':
  - type: text
    content: she saw two angels in dazzling white robes, sitting where Jesus’ body had been laid—one at the head and one at the feet!
  - type: note
    content: This becomes a picture of the two golden cherubim engraved on the mercy seat, peering down into the treasures of grace. The empty tomb has become our “mercy seat.”
  '13':
  - type: text
    content: “Dear woman, why are you crying?” they asked.
  - type: text
    content: Mary answered, “They have taken away my Lord, and I don’t know where they’ve laid him.”
  '14':
  - type: text
    content: Then she turned around to leave, and there was Jesus standing in front of her, but she didn’t realize that it was him!
  '15':
  - type: text
    content: 'He said to her, '
  - type: text
    content: “Dear woman, why are you crying? Who are you looking for?”
  - type: text
    content: Mary answered, thinking he was only the gardener, “Sir, if you have taken his body somewhere else, tell me, and I will go and . . .”
  '16':
  - type: text
    content: “Mary,”
  - type: text
    content: ' Jesus interrupted her.'
  - type: text
    content: Turning to face him, she said, “Rabboni!” (Aramaic for “My teacher!”)
  '17':
  - type: text
    content: 'Jesus cautioned her, '
  - type: text
    content: “Mary, don’t cling to me,
  - type: text
    content: ' '
  - type: note
    content: Jesus was telling Mary, “Don’t cling to me in the way you once knew me, now we are one. Cling to me in my ascension, in my glory.” We don’t cling to a memory of Christ, we cling to the majesty in his glory today.
  - type: text
    content: for I haven’t yet ascended to God, my Father. And he’s not only my Father and God, but now he’s your Father and your God! Now go to my brothers
  - type: text
    content: ' '
  - type: note
    content: This is the first time in John’s Gospel that Jesus called his disciples “brothers.” See Heb. 2:10–12.
  - type: text
    content: and tell them what I’ve told you, that I am ascending to my Father—and your Father, to my God—and your God!”
  '18':
  - type: text
    content: Then Mary Magdalene left to inform the disciples of her encounter with Jesus. “I have seen the Lord!” she told them. And she gave them his message.
  - type: heading
    content: Jesus Appears to His Disciples
  '19':
  - type: text
    content: 'That evening, '
  - type: note
    content: Or “That Sunday evening.”
  - type: text
    content: 'the disciples gathered together, and because they were afraid of reprisals from the Jewish leaders, they had locked the doors. But suddenly Jesus appeared among them and said, '
  - type: note
    content: Or “came and stood among them.”
  - type: text
    content: “Peace to you!”
  - type: text
    content: ' '
  - type: note
    content: This is the idiomatic equivalent of saying, “Hello, everyone!”
  '2':
  - type: text
    content: 'So she went running as fast as she could to go tell Peter and the other disciple, the one Jesus loved. '
  - type: note
    content: This was obviously John the apostle, the author of this Gospel.
  - type: text
    content: She told them, “They’ve taken the Lord’s body from the tomb, and we don’t know where he is!”
  '20':
  - type: text
    content: Then he showed them the wounds of his hands and his side—they were overjoyed to see the Lord with their own eyes!
  '21':
  - type: text
    content: 'Jesus repeated his greeting, '
  - type: text
    content: “Peace to you!”
  - type: text
    content: ' And he told them, '
  - type: text
    content: “Just as the Father has sent me, I’m now sending you.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'Then, taking a deep breath, he blew '
  - type: note
    content: The Greek word used here does not appear elsewhere in the New Testament; however, it is the same word found in the Septuagint for when God “breathed” into Adam’s nostrils the breath of life (Gen. 2:7). The beginning of new creation life came from the breath of Jesus. The mighty wind of Acts 2 was for power, the breath Jesus breathed into his disciples in this verse was for life.
  - type: text
    content: 'on them and said, '
  - type: text
    content: “Receive the Holy Spirit.
  - type: text
    content: ' '
  - type: note
    content: Or “accept the Sacred Breath.”
  '23':
  - type: text
    content: I send you to preach the forgiveness
  - type: text
    content: ' '
  - type: note
    content: Or “removal, acquittal.”
  - type: text
    content: of sins—and people’s sins will be forgiven. But if you don’t proclaim the forgiveness of their sins, they will remain guilty.”
  - type: note
    content: Or “If you forgive someone for their sins, their sins will be discharged, but if you retain their sins, their sins will be retained.” Jesus was not giving absolute authority to forgive the guilt of sins, for God alone has that right (Mark 2:7), and the apostles at no time assumed that authority. What he gave them, in the context of being his sent ones, was the authority to proclaim the gospel to the nations. If they refused to go and preach the good news, then people would have no opportunity to believe it. See Acts 10:43–44; 13:38.
  - type: heading
    content: Jesus Appears to Thomas
  '24':
  - type: text
    content: 'One of the twelve wasn’t present when Jesus appeared to them—it was Thomas, whose nickname was “the Twin.” '
  '25':
  - type: text
    content: So the disciples informed him, “We have seen the Lord with our own eyes!”
  - type: text
    content: 'Still unconvinced, Thomas replied, “There’s no way I’m going to believe this unless I personally see the wounds of the nails '
  - type: note
    content: The Aramaic is “the blossom of the nails.” You can imagine a wide nail head that, when struck with a heavy mallet, “blossomed” over the sacred palm of our Lord Jesus. The wound of the nail had imprinted his entire palm. His wounds are like beautiful flowers to the lovers of God.
  - type: text
    content: in his hands, touch them with my finger, and put my hand into the wound of his side where he was pierced!”
  '26':
  - type: text
    content: 'Then eight days later, Thomas and all the others were in the house together. And even though all the doors were locked, Jesus suddenly stood before them! '
  - type: text
    content: “Peace to you,”
  - type: text
    content: ' he said.'
  '27':
  - type: text
    content: 'Then, looking into Thomas’ eyes, he said, '
  - type: text
    content: “Put your finger here in the wounds of my hands. Here—put your hand into my wounded side and see for yourself. Thomas, don’t give in to your doubts any longer, just believe!”
  '28':
  - type: text
    content: Then the words spilled out of his heart—“You are my Lord, and you are my God!”
  '29':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “Thomas, now that you’ve seen me, you believe. But there are those who have never seen me with their eyes but have believed in me with their hearts, and they will be blessed even more!”
  '3':
  - type: text
    content: 'Then Peter and the other disciple jumped up and ran to the tomb to go see for themselves. '
  '30':
  - type: text
    content: 'Jesus went on to do many more miraculous signs in the presence of his disciples, which are not even included in this book. '
  '31':
  - type: text
    content: 'But all that is recorded here is so that you will fully believe '
  - type: note
    content: Or “never stop believing.”
  - type: text
    content: 'that Jesus is the Anointed One, the Son of God, and that through your faith in him you will experience eternal life '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: by the power of his name!
  '4':
  - type: text
    content: 'They started out together, but the other disciple outran Peter and reached the tomb first. '
  - type: note
    content: How did John outrun Peter to the tomb? Love will always “outrun” curiosity. Some are simply curious to know Jesus, but we must be those who are passionate to experience his love and power.
  '5':
  - type: text
    content: 'He didn’t enter the tomb, but peeked in, and saw only the linen cloths lying there. '
  '6':
  - type: text
    content: 'Then Peter came behind him and went right into the tomb. He too noticed the linen cloths lying there, '
  '7':
  - type: text
    content: but the burial cloth that had been on Jesus’ head had been rolled up and placed separate from the other cloths.
  '8':
  - type: text
    content: 'Then the other disciple who had reached the tomb first went in, and after one look, he believed! '
  - type: note
    content: It was lovers of Jesus that were the first to realize the resurrection of Christ. What did John see that caused him to believe? Perhaps it was the linen burial cloths that had not been unwrapped, but simply were empty. And the cloth that had been wrapped around his head was rolled up and placed aside. Jesus left everything pertaining to the old creation in the tomb, signified by the linen cloths and handkerchief left behind.
  '9':
  - type: text
    content: 'For until then they hadn’t understood the Scriptures that prophesied '
  - type: note
    content: Some of these prophecies would include Pss. 2:6–8; 16:10; Isa. 53:10–12; Hos. 6:2; Jonah 1:17.
  - type: text
    content: 'that he was destined to rise from the dead. '
  - type: note
    content: As translated from the Aramaic.
