document_id: JDG.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson in Gaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day, Samson went to Gaza, a Philistine town, and slept with a prostitute there. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samson’s moral failures outweighed his physical strength. Samson was a mighty deliverer, but he was riddled with compromise. He was mighty in strength but weak in self-control. He was a man who had some of the greatest potential in the whole Bible, but he proved to be one of the greatest disappointments as well.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: blessed his life from birth (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 13:24
      metadata:
        usfm: JDG.13.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Samson was a leader, a “man’s man,” with God’s Spirit to strengthen him, yet he left a legacy of compromise and moral weakness. He could tear a lion apart, but he could not control his lust. In spite of all this, Samson is listed in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 11:32
      metadata:
        usfm: HEB.11.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: as a man of great faith.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Word soon spread that Samson was in town, so the men of Gaza gathered and hid at the town gates, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cutting off his escape
  - type: text
    text: . They made no move during the night, saying, “We’ll kill him at dawn when he tries to leave.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But in the middle of the night, Samson got up and left. On his way out of Gaza, he took hold of the doors of the town gate and ripped them off their hinges—two posts, the gates, and the locking bar. He hoisted them all on his shoulders and carried them off a great distance to the top of the hill across from Hebron.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This was a superhuman feat to say the least. Samson carried the heavy gates, which were most likely two stories high, and the heavy posts that secured them, uphill to a location nearly forty miles away. Samson’s offering to God in the high place was not an animal but the gates of a city! A supernatural infusion of strength came upon Samson. In Christ, we can do all things, for he strengthens us with might (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 3:20
      metadata:
        usfm: EPH.3.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 4:12–13
      metadata:
        usfm: PHP.4.12+PHP.4.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Let everyone who is weak say they are strong (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joel 3:10
      metadata:
        usfm: JOL.3.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Delilah, a Double Agent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Some time later Samson fell in love with a woman named Delilah '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Delilah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a Philistine name, possibly means “enfeebling,” “weakening,” or “languishing.”'
    marker-yv: yv-n
  - type: text
    text: 'from the Sorek Valley. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Valley of the Choice Vines.” It is known today as Wadi-es-Sarar, which begins about thirteen miles southwest of Jerusalem.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'The rulers of the Philistines went to her '
  - type: usfm
    marker: it
    children:
    - type: text
      text: with a plan
  - type: text
    text: ': “Trick Samson into telling you the secret of his great strength. Find out how we can subdue him. We’ll tie him up and make him helpless. Then each of us will give you eleven hundred pieces of silver.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Five Philistine tyrants (perhaps a picture of our five senses) ruled over five cities. This would mean Delilah was being bribed with fifty-five hundred pieces of silver, an exorbitant amount! This shows how the fear of Samson had gripped these rulers. They were eager to pay any price to capture him.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So Delilah approached Samson and asked, “Please dear, won’t you tell me the secret of your strength and how you could be tied up and made helpless?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samson replied, “If someone bound me with seven new bowstrings that haven’t been dried, I’ll become as weak as an ordinary man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'So the Philistine tyrants brought Delilah seven new bowstrings, and she tied Samson up with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: With men waiting in ambush in one of the inner rooms of her house, she cried out, “Samson! The Philistines are here to capture you!” But Samson snapped the bowstrings like a piece of string snaps when it is burned by a fire. So no one discovered the secret of his strength.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Afterward, Delilah said to him, “You’ve made fun of me and told me lies! Please tell me how you can be tied up securely.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Samson replied, “If someone bound me with brand-new ropes that have never been used, I’ll become as weak as anyone else.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So Delilah took new ropes and tied him up with them, and the men were waiting in ambush in the inner room as before. Delilah cried out, “Samson! The Philistines are here to capture you!” Once again, Samson easily snapped the ropes from his arms like they were threads.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Delilah reprimanded him, saying, “You’ve made a fool of me and lied to me again! Now tell me the truth—how can you be tied up?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Samson replied, “If you weave the seven braids of my hair into the fabric on your loom and tighten it with the pin, I’ll become as weak as anyone else.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So while he slept, Delilah wove the seven braids of his hair into the fabric '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: and pinned it with a peg. Again she cried out, “Samson! The Philistines are here to capture you!” But Samson woke up and yanked his hair from both the loom and the fabric.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“How can you say, ‘I love you,’ ” pouted Delilah, “and yet you don’t tell me your secrets? You’ve tricked me three times now, and you still haven’t told me what makes you so strong!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: She tormented him day after day until he was sick to death of her nagging.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Finally, he confessed to her everything: “I’ve never had my hair cut, because my parents dedicated me to God from birth. If anyone cuts my hair, my power will leave me, and I’ll become as weak as anyone else.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: When Delilah realized he had finally disclosed his secret, she sent for the Philistine rulers. “Come quickly!” she said. “He’s finally told me his secret!” So the Philistine rulers returned with the bribe money in their hands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Delilah lulled Samson to sleep with his head in her lap. Then she called in a barber '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the man.”
    marker-yv: yv-n
  - type: text
    text: 'to cut off the seven locks of his hair. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samson’s true strength was not from some magical power in his long hair but in his devotion to God and in his vow to be pure. The seven braids of hair remind us of the seven Spirits of God that are the true source of strength and anointing for God’s servants. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 11:1–2
      metadata:
        usfm: ISA.11.1+ISA.11.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 1:4
      metadata:
        usfm: REV.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:1
      metadata:
        usfm: REV.3.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:5
      metadata:
        usfm: REV.4.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:6
      metadata:
        usfm: REV.5.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'In this way she weakened him, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “humiliated him.”
    marker-yv: yv-n
  - type: text
    text: and his strength drained from him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Then she cried out, “Samson! The Philistines have come to capture you!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'He woke up and thought, “I’ll do the same as before and shake myself free.” But he didn’t realize that '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had turned away from him.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the Philistines captured him and gouged out his eyes. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The loss of anointing will always lead to spiritual blindness and bondage.
    marker-yv: yv-n
  - type: text
    text: 'They took him down to Gaza, where they bound him with bronze chains and forced him to grind '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grain
  - type: text
    text: ' in the prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: it
    children:
    - type: text
      text: But before long
  - type: text
    text: ', his hair began to grow back.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson’s Victory in Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'One day, the Philistine tyrants celebrated a great festival to offer extravagant sacrifices to their god, Dagon. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dagon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “fish”; it has a homonym meaning “grain.” The image of Dagon, the fish god, was a representation of a half man and half fish.
    marker-yv: yv-n
  - type: text
    text: They praised Dagon, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our god has given us victory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dagon has subdued our strong enemy Samson!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When the people saw their idol, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 16:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “saw him.” This was not Samson, for he was still in the prison, and the Philistines had not yet brought him out to be mocked (which they do in v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: JDG.16.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The “him” is the idol of their god, Dagon.
    marker-yv: yv-n
  - type: text
    text: they too joined in the praises, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our god has delivered our enemy to us!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one who devastated our country
- type: usfm
  marker: q1
  children:
  - type: text
    text: and piled our corpses high!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'By now, the people were getting drunk and demanded, “Bring out Samson and let him dance for us!” So he was brought from the prison to amuse them, and they displayed him between the main pillars '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that supported their temple
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Blind
  - type: text
    text: ' Samson said to the young servant who was leading him by the hand, “Let go of me and let me feel the pillars that hold up the temple. I want to lean against them.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The temple was completely packed with people. All the Philistine rulers were there, and there were some three thousand men and women in the balcony watching as Samson provided them some amusement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Samson prayed to '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', “Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', please remember me again. O God, impart '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your
  - type: text
    text: ' strength to me just one more time. With one blow let me take revenge on the Philistines for gouging out my eyes.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'Then Samson reached toward the two center pillars that held up the temple, his left hand on one and his right hand on the other, and he prayed, “Let me die with the Philistines.” Then with '
  - type: usfm
    marker: it
    children:
    - type: text
      text: all his might
  - type: text
    text: ', with both hands he pushed against the pillars, and the temple came crashing down on the Philistine rulers and all the people. So Samson killed more enemies through his death than in his entire lifetime.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then his brothers and entire family went down '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to Gaza
  - type: text
    text: ' to get his body. They brought him back home and buried him between Zorah and Eshtaol, next to his father, Manoah. Samson had led Israel for twenty years.'
