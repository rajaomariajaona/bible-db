document_id: JDG.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson in Gaza
  - type: text
    content: 'One day, Samson went to Gaza, a Philistine town, and slept with a prostitute there. '
  - type: note
    content: Samson’s moral failures outweighed his physical strength. Samson was a mighty deliverer, but he was riddled with compromise. He was mighty in strength but weak in self-control. He was a man who had some of the greatest potential in the whole Bible, but he proved to be one of the greatest disappointments as well. Yahweh blessed his life from birth (see 13:24). Samson was a leader, a “man’s man,” with God’s Spirit to strengthen him, yet he left a legacy of compromise and moral weakness. He could tear a lion apart, but he could not control his lust. In spite of all this, Samson is listed in Heb. 11:32 as a man of great faith.
  '10':
  - type: text
    content: Afterward, Delilah said to him, “You’ve made fun of me and told me lies! Please tell me how you can be tied up securely.”
  '11':
  - type: text
    content: Samson replied, “If someone bound me with brand-new ropes that have never been used, I’ll become as weak as anyone else.”
  '12':
  - type: text
    content: So Delilah took new ropes and tied him up with them, and the men were waiting in ambush in the inner room as before. Delilah cried out, “Samson! The Philistines are here to capture you!” Once again, Samson easily snapped the ropes from his arms like they were threads.
  '13':
  - type: text
    content: Delilah reprimanded him, saying, “You’ve made a fool of me and lied to me again! Now tell me the truth—how can you be tied up?”
  - type: text
    content: Samson replied, “If you weave the seven braids of my hair into the fabric on your loom and tighten it with the pin, I’ll become as weak as anyone else.”
  - type: text
    content: 'So while he slept, Delilah wove the seven braids of his hair into the fabric '
  '14':
  - type: text
    content: and pinned it with a peg. Again she cried out, “Samson! The Philistines are here to capture you!” But Samson woke up and yanked his hair from both the loom and the fabric.
  '15':
  - type: text
    content: '“How can you say, ‘I love you,’ ” pouted Delilah, “and yet you don’t tell me your secrets? You’ve tricked me three times now, and you still haven’t told me what makes you so strong!” '
  '16':
  - type: text
    content: She tormented him day after day until he was sick to death of her nagging.
  '17':
  - type: text
    content: 'Finally, he confessed to her everything: “I’ve never had my hair cut, because my parents dedicated me to God from birth. If anyone cuts my hair, my power will leave me, and I’ll become as weak as anyone else.”'
  '18':
  - type: text
    content: When Delilah realized he had finally disclosed his secret, she sent for the Philistine rulers. “Come quickly!” she said. “He’s finally told me his secret!” So the Philistine rulers returned with the bribe money in their hands.
  '19':
  - type: text
    content: 'Delilah lulled Samson to sleep with his head in her lap. Then she called in a barber '
  - type: note
    content: Or “the man.”
  - type: text
    content: 'to cut off the seven locks of his hair. '
  - type: note
    content: Samson’s true strength was not from some magical power in his long hair but in his devotion to God and in his vow to be pure. The seven braids of hair remind us of the seven Spirits of God that are the true source of strength and anointing for God’s servants. See Isa. 11:1–2; Rev. 1:4; 3:1; 4:5; 5:6.
  - type: text
    content: 'In this way she weakened him, '
  - type: note
    content: Or “humiliated him.”
  - type: text
    content: and his strength drained from him.
  '2':
  - type: text
    content: 'Word soon spread that Samson was in town, so the men of Gaza gathered and hid at the town gates, '
  - type: text
    content: cutting off his escape
  - type: text
    content: . They made no move during the night, saying, “We’ll kill him at dawn when he tries to leave.”
  '20':
  - type: text
    content: Then she cried out, “Samson! The Philistines have come to capture you!”
  - type: text
    content: 'He woke up and thought, “I’ll do the same as before and shake myself free.” But he didn’t realize that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had turned away from him.'
  '21':
  - type: text
    content: 'So the Philistines captured him and gouged out his eyes. '
  - type: note
    content: The loss of anointing will always lead to spiritual blindness and bondage.
  - type: text
    content: 'They took him down to Gaza, where they bound him with bronze chains and forced him to grind '
  - type: text
    content: grain
  - type: text
    content: ' in the prison. '
  '22':
  - type: text
    content: But before long
  - type: text
    content: ', his hair began to grow back.'
  - type: heading
    content: Samson’s Victory in Death
  '23':
  - type: text
    content: 'One day, the Philistine tyrants celebrated a great festival to offer extravagant sacrifices to their god, Dagon. '
  - type: note
    content: The word Dagon means “fish”; it has a homonym meaning “grain.” The image of Dagon, the fish god, was a representation of a half man and half fish.
  - type: text
    content: They praised Dagon, saying,
  - type: text
    content: “Our god has given us victory!
  - type: text
    content: Dagon has subdued our strong enemy Samson!”
  '24':
  - type: text
    content: 'When the people saw their idol, '
  - type: note
    content: Or “saw him.” This was not Samson, for he was still in the prison, and the Philistines had not yet brought him out to be mocked (which they do in v. 25). The “him” is the idol of their god, Dagon.
  - type: text
    content: they too joined in the praises, saying,
  - type: text
    content: “Our god has delivered our enemy to us!
  - type: text
    content: The one who devastated our country
  - type: text
    content: and piled our corpses high!”
  '25':
  - type: text
    content: 'By now, the people were getting drunk and demanded, “Bring out Samson and let him dance for us!” So he was brought from the prison to amuse them, and they displayed him between the main pillars '
  - type: text
    content: that supported their temple
  - type: text
    content: .
  '26':
  - type: text
    content: Blind
  - type: text
    content: ' Samson said to the young servant who was leading him by the hand, “Let go of me and let me feel the pillars that hold up the temple. I want to lean against them.” '
  '27':
  - type: text
    content: The temple was completely packed with people. All the Philistine rulers were there, and there were some three thousand men and women in the balcony watching as Samson provided them some amusement.
  '28':
  - type: text
    content: 'Then Samson prayed to '
  - type: text
    content: Yahweh
  - type: text
    content: ', “Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', please remember me again. O God, impart '
  - type: text
    content: your
  - type: text
    content: ' strength to me just one more time. With one blow let me take revenge on the Philistines for gouging out my eyes.” '
  '29':
  - type: text
    content: 'Then Samson reached toward the two center pillars that held up the temple, his left hand on one and his right hand on the other, and he prayed, “Let me die with the Philistines.” Then with '
  - type: text
    content: all his might
  - type: text
    content: ', with both hands he pushed against the pillars, and the temple came crashing down on the Philistine rulers and all the people. So Samson killed more enemies through his death than in his entire lifetime.'
  '3':
  - type: text
    content: But in the middle of the night, Samson got up and left. On his way out of Gaza, he took hold of the doors of the town gate and ripped them off their hinges—two posts, the gates, and the locking bar. He hoisted them all on his shoulders and carried them off a great distance to the top of the hill across from Hebron.
  - type: note
    content: This was a superhuman feat to say the least. Samson carried the heavy gates, which were most likely two stories high, and the heavy posts that secured them, uphill to a location nearly forty miles away. Samson’s offering to God in the high place was not an animal but the gates of a city! A supernatural infusion of strength came upon Samson. In Christ, we can do all things, for he strengthens us with might (see Eph. 3:20; Phil. 4:12–13). Let everyone who is weak say they are strong (see Joel 3:10).
  - type: heading
    content: Delilah, a Double Agent
  '31':
  - type: text
    content: 'Then his brothers and entire family went down '
  - type: text
    content: to Gaza
  - type: text
    content: ' to get his body. They brought him back home and buried him between Zorah and Eshtaol, next to his father, Manoah. Samson had led Israel for twenty years.'
  '4':
  - type: text
    content: 'Some time later Samson fell in love with a woman named Delilah '
  - type: note
    content: Delilah, a Philistine name, possibly means “enfeebling,” “weakening,” or “languishing.”
  - type: text
    content: 'from the Sorek Valley. '
  - type: note
    content: Or “Valley of the Choice Vines.” It is known today as Wadi-es-Sarar, which begins about thirteen miles southwest of Jerusalem.
  '5':
  - type: text
    content: 'The rulers of the Philistines went to her '
  - type: text
    content: with a plan
  - type: text
    content: ': “Trick Samson into telling you the secret of his great strength. Find out how we can subdue him. We’ll tie him up and make him helpless. Then each of us will give you eleven hundred pieces of silver.”'
  - type: note
    content: Five Philistine tyrants (perhaps a picture of our five senses) ruled over five cities. This would mean Delilah was being bribed with fifty-five hundred pieces of silver, an exorbitant amount! This shows how the fear of Samson had gripped these rulers. They were eager to pay any price to capture him.
  '6':
  - type: text
    content: So Delilah approached Samson and asked, “Please dear, won’t you tell me the secret of your strength and how you could be tied up and made helpless?”
  '7':
  - type: text
    content: Samson replied, “If someone bound me with seven new bowstrings that haven’t been dried, I’ll become as weak as an ordinary man.”
  '8':
  - type: text
    content: 'So the Philistine tyrants brought Delilah seven new bowstrings, and she tied Samson up with them. '
  '9':
  - type: text
    content: With men waiting in ambush in one of the inner rooms of her house, she cried out, “Samson! The Philistines are here to capture you!” But Samson snapped the bowstrings like a piece of string snaps when it is burned by a fire. So no one discovered the secret of his strength.
