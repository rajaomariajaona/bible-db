      marker: it
      children:
      - type: text
        text: Naphtali
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “wrestling.” This points to the struggle of warfare between flesh and spirit, between living in the natural realm and in the sonship realm of the Spirit.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: Twelve thousand were sealed from the tribe of Manasseh.
  - type: usfm
