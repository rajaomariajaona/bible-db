  children:
  - type: text
    text: John’s Vision of 144,000 Servants of God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, after the sixth seal was broken open. Judgment is temporarily held back by these four angels of mercy.
    marker-yv: yv-n
  - type: text
    text: 'I saw four angels standing at the four corners of the earth, and they were restraining the four winds so that no wind would blow on the land, on the sea, or on any tree. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The number four represents universality (the four corners of the earth), and winds speak of divine agents that bring either blessing or judgment. The trees may point to what is deeply rooted within our souls.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Then I saw another angel ascending from the east, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from the sun rising.” The east is often associated with blessings and the place from which God appears (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 2:8
      metadata:
        usfm: GEN.2.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 43:1–4
      metadata:
        usfm: EZK.43.1+EZK.43.2+EZK.43.3+EZK.43.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 2:1
      metadata:
        usfm: MAT.2.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The messenger was not descending from the east, but ascending. The star of Jesus was rising in the east. This sealing messenger represents the living God and points to Christ, who is rising in his people, bringing the light of a new day. It is a company of messengers arising out of the light of the sunrise to bring the seal of God upon his people.
    marker-yv: yv-n
  - type: text
    text: 'who had the seal of the living God. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This seal is the mind of Christ, for it goes on the forehead (thoughts). Until we have the mind of Christ, we are incapable of discerning properly. Partaking of Christ’s mind empowers us to be righteous judges, righteous kings, and righteous priests. This seal is more than a seal of protection from the coming judgments, but a seal that qualifies them to bring the righteous judgments of God to the earth. This is the nature of God being written upon the foreheads and minds of his holy ones.
    marker-yv: yv-n
  - type: text
    text: 'He shouted out with a loud voice to the four angels who had been given power to damage earth and sea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'saying, “Do not damage the earth, the sea, or the trees until we '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not one messenger; “he” has become “we.”
    marker-yv: yv-n
  - type: text
    text: have marked the loving servants of our God with a seal on their foreheads.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This mighty angel has more authority than the four (the number for worldwide or universality) who would damage the earth, sea, and trees. It is the angel carrying the seal of God that speaks of God’s grace and mercy, which will always triumph over judgment (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: James 2:13
      metadata:
        usfm: JAS.2.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The seal on their foreheads is the mind of Christ, the mark of the Christ. The winds of judgment are being held back until the sons of God have the thoughts and mind of Christ. To be “sealed” means to be protected from judgment (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezek. 9:4–6
      metadata:
        usfm: EZK.9.4+EZK.9.5+EZK.9.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The seal of lamb’s blood on the doors of the Israelites protected them from the death angel. The new covenant seal is the Holy Spirit (the mind of Christ) that opens our hearts to the restoration of heaven. We are the seven-sealed scroll that is broken open so that the all-conquering life of Christ will subdue all things (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 3:21
      metadata:
        usfm: PHP.3.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). We are living letters, written not with ink but by the Spirit of God writing truth upon our hearts. In the volume of the book (scroll) it is written about Christ (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 40:7
      metadata:
        usfm: PSA.40.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'And I discovered the number of those who were sealed. It was one hundred and forty-four thousand, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One hundred and forty-four thousand is 12 x 12 x 1,000. This speaks of completeness and represents God raising up sons and daughters who carry fully his image and likeness. It is not meant to be “a literal head count,” but showing us who they are. It is the number of Christ multiplied in his sons and daughters coming into the likeness of the Son.
    marker-yv: yv-n
  - type: text
    text: sealed out of every tribe of Israel’s people.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Israel’s people” are those who have wrestled with their nature and have been given a new name, a new nature, and have become princes with God. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 32:24–28
      metadata:
        usfm: GEN.32.24+GEN.32.25+GEN.32.26+GEN.32.27+GEN.32.28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gal. 3:29
      metadata:
        usfm: GAL.3.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The names of the twelve tribes of princes with God speak of the virtues of their names. Just as the twelve tribes were not birthed at the same time, so they become a picture of our progression in spiritual life from one “tribe” to another, from glory to glory.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Twelve thousand were sealed from the tribe of Judah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Judah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “praise.” In every list of the twelve tribes, Reuben, the firstborn, is always listed first—but not here. Judah is listed first, not because he was the firstborn but because he was the tribal head of King David and King Jesus, the Lion of the tribe of Judah. Israel begins with the spiritual, not the natural. Judah is the spiritual head of Israel (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 49:2
      metadata:
        usfm: GEN.49.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and points to Christ, the true firstborn of creation and the firstborn of many brothers (the church). As we are sealed into the tribe of Judah, we are given the revelation of our sonship in him.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: Twelve thousand were sealed from the tribe of Reuben.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Reuben
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “Behold, a son!” Once we have seen Judah’s Lion as heaven’s firstborn Son, we move to beholding that Son living in us and fully being formed in us.
    marker-yv: yv-n
- type: usfm
  marker: p
