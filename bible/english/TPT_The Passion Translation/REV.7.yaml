      - type: text
        text: means “son of my right hand.” The cry of Rachel for another son was answered with the birth of Benjamin. As she died in childbirth, her last act was to name her son Benomi, “son of my sorrow.” But Jacob renamed the boy Benjamin, “son of my right hand.” Through the travail of our difficulties, a true son of God’s right hand will come forth. We are now a “right hand” people, given the privilege of sitting enthroned with Christ at the right hand of God (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Eph. 2:6
      metadata:
        usfm: EPH.2.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 3:21
      metadata:
        usfm: REV.3.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). In Benjamin we find the completion of our journey into the fullness of our inheritance (sonship) in Christ. At God’s right hand are a Benjamin company, mature in the fullness of Christ. The above list of the twelve tribes is unlike other lists, showing it to be a symbolic list of God’s people who are brought into the fullness of Christ. The tribe of Ephraim is often listed among the tribes of Israel but is missing in this list because of his (their) rebellion. The tribe of Dan is not listed due to its rebellion and idolatry. Dan means “judge.” Judgment is missing from the list, for Dan is not found among them. Although Dan was removed, Levi was added. The tribe of Levi, although not given an allotment with the other tribes because of their priestly calling, is listed here because of his (their) faithfulness to serve God.
