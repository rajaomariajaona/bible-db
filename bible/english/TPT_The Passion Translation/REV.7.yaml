      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means “a troop.” Jacob gave his son Gad this prophecy: “A troop will troop upon him, but he will troop on their heels and overcome the troop at last” (literal Hebrew of'
    - type: usfm
      marker: ft
