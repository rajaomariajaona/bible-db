      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “joined” (to the Lord) or “union.” Because of Levi’s zeal for the Lord when he refused to worship the golden calf after Israel’s deliverance from Exodus, God rewarded the tribe of Levi by calling them to be his priests so that they would be “joined” to God and find God alone as their inheritance. Today there are those who realize they are the bride of Christ and are determined to live in union with him, joined to his heart (
    - type: usfm
