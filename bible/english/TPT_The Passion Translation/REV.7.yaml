      - type: text
        text: Gen. 49:19
      metadata:
        usfm: GEN.49.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Gad symbolizes the beginning of the victorious life of an overcomer breaking forth. Throughout Israel’s history, the Gadites were tremendous warriors (
    - type: text
      text: 1 Chron. 5:18–20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
