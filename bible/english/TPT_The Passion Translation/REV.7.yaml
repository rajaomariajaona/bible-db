        text: 1 Cor. 6:17
      metadata:
        usfm: 1CO.6.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
