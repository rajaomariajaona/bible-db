      children:
      - type: text
        text: means “happy.” The kingdom of God is full of righteousness, peace, and joy in the Holy Spirit. Our journey into becoming overcomers takes us on a path of endless bliss. A joy unspeakable and full of glory becomes our strength and our song. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
