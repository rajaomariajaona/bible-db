    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Manasseh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “causing me to forget.” There is a realm of grace, where we forget the pain of our struggles and betrayals and enter into the vibrant, victorious life of Christ. We then can say like Manasseh’s father Joseph, “Others meant to harm me, but God meant to bless me and bring good out of all I’ve gone through.”
    marker-yv: yv-n
