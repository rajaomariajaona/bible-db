document_id: PHP.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in Harmony with One Another
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'My dear and precious friends, whom I deeply love, you have truly become my glorious joy and crown of reward. Now arise '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: arise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: implies “resurrection.” The Greek is “stand fast.”
      marker-yv: yv-n
    - type: text
      text: in the fullness of your union with our Lord.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'My heart overflows with joy when I think of how you demonstrated love to me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: by your financial support of my ministry
    - type: text
      text: '. For even though you have so little, you still continue to help me at every opportunity. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'I’m not telling you this because I’m in need, for I have learned to be satisfied in any circumstance. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to give up everything I have.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: 'I know what it means to lack, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “be humbled.”
      marker-yv: yv-n
    - type: text
      text: and I know what it means to experience overwhelming abundance. For I’m trained in the secret of overcoming all things, whether in fullness or in hunger. And I find that the strength of Christ’s explosive power infuses me to conquer every difficulty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to master all things.”
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'You’ve so graciously provided for my essential needs during this season of difficulty. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'For I want you to know that the Philippian church was the only church that supported me in the beginning as I went out to preach the gospel. You were the only church that sowed into me financially, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “accounts of planting and giving.”
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: and when I was in Thessalonica, you supported me for well over a year.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek means “twice you sent gifts.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'I mention this not because I’m requesting a gift, but so that the fruit of your generosity may bring you an abundant reward. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I now have all I need—more than enough—I’m abundantly satisfied! For I’ve received the gift you sent by Epaphroditus and viewed it as a sweet sacrifice, perfumed with the fragrance '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of your faithfulness
    - type: text
      text: ', which is so pleasing to God!'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'I am convinced that my God will fully satisfy every need you have, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for I have seen
    - type: text
      text: ' the abundant riches of glory '
    - type: usfm
      marker: it
      children:
      - type: text
        text: revealed to me
    - type: text
      text: ' through Jesus Christ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'And I plead with Euodia and Syntyche to settle their disagreement and be restored with one mind in our Lord. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In every church there is often found conflict in relationships. Paul seeks to encourage these two dear women to resolve all their disagreements. Their names give us a clue. Euodia comes from a word that means “a fair journey.” Syntyche comes from a word that can mean “an accident.” Along our fair journey we may collide with another, but God always has grace for restoration.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And God our Father will receive all the glory and the honor throughout the eternity of eternities! Amen!
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Give my warm greetings to all the believers in Christ Jesus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: All the brothers and sisters that are here with me send their loving greetings, especially the converts from Caesar’s household.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: May the grace and favor of our Lord Jesus Christ be with your spirit!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'I would like my dear friend and burden-bearer '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Syzygos,” possibly a name, however there is no record of anyone in classical or biblical Greek with this name. Some believe that Syzygos was one of the pastors of the church at Philippi.
      marker-yv: yv-n
    - type: text
      text: 'to help resolve this issue, for both women have diligently labored with me for the prize and helped in spreading the revelation of the gospel, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can also be translated “God’s kingdom realm.”
      marker-yv: yv-n
    - type: text
      text: 'along with Clement '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Clement was one of the men who led the church in Philippi. His name means “mild” or “merciful.”
      marker-yv: yv-n
    - type: text
      text: and the rest of my coworkers. All of their names are written in the Book of Life.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Be cheerful with joyous celebration in every season of life. Let your joy overflow! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'And let gentleness '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word means “fairness;” the Aramaic “humility.”
      marker-yv: yv-n
    - type: text
      text: be seen in every relationship, for our Lord is ever near.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “approaching.”
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Don’t be pulled in different directions or worried about a thing. Be saturated in prayer throughout each day, offering your faith-filled requests before God with overflowing gratitude. Tell him every detail of your life, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'then God’s wonderful peace that transcends human understanding, will guard your heart and mind through Jesus Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Keep your thoughts continually fixed on all that is authentic and real, honorable and admirable, beautiful and respectful, pure and holy, merciful and kind. And fasten your thoughts on every glorious work of God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “acts of glorification.”
      marker-yv: yv-n
    - type: text
      text: 'praising him always. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Put into practice the example
    - type: text
      text: ' of all that you have heard from me or seen in my life and the God of peace will be with you in all things.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul Thanks the Philippians for Their Support
    marker-yv: yv-h
