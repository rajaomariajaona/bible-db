document_id: PHP.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living in Harmony with One Another
  - type: text
    content: 'My dear and precious friends, whom I deeply love, you have truly become my glorious joy and crown of reward. Now arise '
  - type: note
    content: The Aramaic word arise implies “resurrection.” The Greek is “stand fast.”
  - type: text
    content: in the fullness of your union with our Lord.
  '10':
  - type: text
    content: 'My heart overflows with joy when I think of how you demonstrated love to me '
  - type: text
    content: by your financial support of my ministry
  - type: text
    content: '. For even though you have so little, you still continue to help me at every opportunity. '
  '11':
  - type: text
    content: 'I’m not telling you this because I’m in need, for I have learned to be satisfied in any circumstance. '
  - type: note
    content: Or “to give up everything I have.”
  '12':
  - type: text
    content: 'I know what it means to lack, '
  - type: note
    content: Or “be humbled.”
  - type: text
    content: and I know what it means to experience overwhelming abundance. For I’m trained in the secret of overcoming all things, whether in fullness or in hunger. And I find that the strength of Christ’s explosive power infuses me to conquer every difficulty.
  - type: note
    content: Or “to master all things.”
  '14':
  - type: text
    content: 'You’ve so graciously provided for my essential needs during this season of difficulty. '
  '15':
  - type: text
    content: 'For I want you to know that the Philippian church was the only church that supported me in the beginning as I went out to preach the gospel. You were the only church that sowed into me financially, '
  - type: note
    content: The Aramaic can be translated “accounts of planting and giving.”
  '16':
  - type: text
    content: and when I was in Thessalonica, you supported me for well over a year.
  - type: note
    content: As translated from the Aramaic. The Greek means “twice you sent gifts.”
  '17':
  - type: text
    content: 'I mention this not because I’m requesting a gift, but so that the fruit of your generosity may bring you an abundant reward. '
  '18':
  - type: text
    content: 'I now have all I need—more than enough—I’m abundantly satisfied! For I’ve received the gift you sent by Epaphroditus and viewed it as a sweet sacrifice, perfumed with the fragrance '
  - type: text
    content: of your faithfulness
  - type: text
    content: ', which is so pleasing to God!'
  '19':
  - type: text
    content: 'I am convinced that my God will fully satisfy every need you have, '
  - type: text
    content: for I have seen
  - type: text
    content: ' the abundant riches of glory '
  - type: text
    content: revealed to me
  - type: text
    content: ' through Jesus Christ! '
  '2':
  - type: text
    content: 'And I plead with Euodia and Syntyche to settle their disagreement and be restored with one mind in our Lord. '
  - type: note
    content: In every church there is often found conflict in relationships. Paul seeks to encourage these two dear women to resolve all their disagreements. Their names give us a clue. Euodia comes from a word that means “a fair journey.” Syntyche comes from a word that can mean “an accident.” Along our fair journey we may collide with another, but God always has grace for restoration.
  '20':
  - type: text
    content: And God our Father will receive all the glory and the honor throughout the eternity of eternities! Amen!
  '21':
  - type: text
    content: 'Give my warm greetings to all the believers in Christ Jesus. '
  '22':
  - type: text
    content: All the brothers and sisters that are here with me send their loving greetings, especially the converts from Caesar’s household.
  '23':
  - type: text
    content: May the grace and favor of our Lord Jesus Christ be with your spirit!
  '3':
  - type: text
    content: 'I would like my dear friend and burden-bearer '
  - type: note
    content: Or “Syzygos,” possibly a name, however there is no record of anyone in classical or biblical Greek with this name. Some believe that Syzygos was one of the pastors of the church at Philippi.
  - type: text
    content: 'to help resolve this issue, for both women have diligently labored with me for the prize and helped in spreading the revelation of the gospel, '
  - type: note
    content: The Aramaic can also be translated “God’s kingdom realm.”
  - type: text
    content: 'along with Clement '
  - type: note
    content: Clement was one of the men who led the church in Philippi. His name means “mild” or “merciful.”
  - type: text
    content: and the rest of my coworkers. All of their names are written in the Book of Life.
  '4':
  - type: text
    content: 'Be cheerful with joyous celebration in every season of life. Let your joy overflow! '
  '5':
  - type: text
    content: 'And let gentleness '
  - type: note
    content: The Greek word means “fairness;” the Aramaic “humility.”
  - type: text
    content: be seen in every relationship, for our Lord is ever near.
  - type: note
    content: Or “approaching.”
  '6':
  - type: text
    content: 'Don’t be pulled in different directions or worried about a thing. Be saturated in prayer throughout each day, offering your faith-filled requests before God with overflowing gratitude. Tell him every detail of your life, '
  '7':
  - type: text
    content: 'then God’s wonderful peace that transcends human understanding, will guard your heart and mind through Jesus Christ. '
  '8':
  - type: text
    content: 'Keep your thoughts continually fixed on all that is authentic and real, honorable and admirable, beautiful and respectful, pure and holy, merciful and kind. And fasten your thoughts on every glorious work of God, '
  - type: note
    content: The Aramaic can be translated “acts of glorification.”
  - type: text
    content: 'praising him always. '
  '9':
  - type: text
    content: Put into practice the example
  - type: text
    content: ' of all that you have heard from me or seen in my life and the God of peace will be with you in all things.'
  - type: heading
    content: Paul Thanks the Philippians for Their Support
