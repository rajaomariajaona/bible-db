document_id: JHN.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Healing at Bethesda
  - type: text
    content: 'From Galilee, Jesus returned to Jerusalem to observe one of the Jewish feasts. '
  - type: note
    content: 'It is difficult to determine with certainty which of the feasts it was: Passover, Tabernacles, or Purim. Most of the ancient expositors taught that it was the Feast of Pentecost. There is no mention of the disciples being with him at this time.'
  '10':
  - type: text
    content: 'When the Jewish leaders saw the man walking along carrying his sleeping mat, '
  - type: note
    content: Or “cot” or “stretcher.” The Aramaic word is “quilt” or “mat.”
  - type: text
    content: 'they objected and said, “What are you doing carrying that? '
  - type: text
    content: Don’t you know it’s the Sabbath?
  - type: text
    content: ' It’s not lawful for you to carry things on the Sabbath!”'
  '11':
  - type: text
    content: He answered them, “The man who healed me told me to pick it up and walk.”
  '12':
  - type: text
    content: '“What man?” they asked him. “Who was this man who ordered you to carry something on a Sabbath?” '
  - type: note
    content: Malice filled the Jewish leaders. They should have been filled with joy that the man was healed. They should have asked, “Who is the wonderful one who healed you?”
  '13':
  - type: text
    content: But the healed man couldn’t give them an answer, for he didn’t yet know who it was, since Jesus had already slipped away into the crowd.
  '14':
  - type: text
    content: 'A short time later, Jesus found the man at the temple and said to him, '
  - type: text
    content: “Look at you now! You’re healed! Walk away from your sin
  - type: text
    content: ' '
  - type: note
    content: Or “Don’t continue sinning any longer.”
  - type: text
    content: so that nothing worse will happen to you.”
  '15':
  - type: text
    content: 'Then the man went to the Jewish leaders to inform them, “It was Jesus who healed me!” '
  '16':
  - type: text
    content: From that day forward the Jewish leaders began to persecute Jesus because of the things he did on the Sabbath.
  - type: heading
    content: Jesus Responds to the Jewish Leaders
  '17':
  - type: text
    content: 'Jesus answered his critics by saying, '
  - type: text
    content: “Every day my Father is at work, and I will be, too!”
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'This infuriated them and made them all the more eager to devise a plan to kill him. For not only did he break their Sabbath rules, '
  - type: note
    content: Jesus did not break the Sabbath, he “loosed” it (literal Aramaic) from the bondage of tradition and man-made rules.
  - type: text
    content: 'but he also called God '
  - type: text
    content: “my Father,”
  - type: text
    content: ' which made him equal to God.'
  - type: note
    content: They clearly understood that Jesus was claiming God as his Father in a unique way.
  '19':
  - type: text
    content: 'So Jesus said, '
  - type: text
    content: “I speak to you eternal truth. The Son is unable to do anything from himself or through his own initiative. I only do the works that I see the Father doing, for the Son does the same works as his Father.
  '2':
  - type: text
    content: 'Inside the city, near the Sheep Gate, '
  - type: note
    content: Literally “the place of the sheep.” The word gate is not in the Greek text. The sick gathered at the pool were like bruised, wounded sheep, needing healing.
  - type: text
    content: 'there is '
  - type: note
    content: The present tense is here in the text indicates that when John wrote his Gospel, the pool of Bethesda was still there. However, by AD 68–70, Jerusalem had been destroyed, along with the temple, by the Roman invasion. This would indicate John’s Gospel has an earlier date of origin than believed. It is likely that John wrote his gospel prior to AD 67.
  - type: text
    content: 'a pool called in Aramaic, The House of Loving Kindness, '
  - type: note
    content: Or Bethesda. In Hebrew, Beit-Hesed, meaning “House of Loving Kindness.” The spelling of this varies from manuscript to manuscript. Some have “Bethsaida,” or “Bethsatha,” or “Belzetha (House of the Olive).” Archaeologists have discovered a deep double pool near St. Anne’s Church in Jerusalem surrounded by five porticoes located near the Sheep Gate, confirming the validity of the biblical account. The Sheep Gate is where the sacrificial animals were brought into the temple. This points us to the Lamb of God whose cross and sacrifice brought us healing. There is a pool of mercy near the Sheep Gate.
  - type: text
    content: 'surrounded by five covered porches. '
  - type: note
    content: Or “covered walkways” or “alcoves.” The sick were under the “covering” of the Law (the five books of the Torah). But the Law cannot heal; it wounds and brings death (Rom. 7:9–10). Christ is the healer, the living Torah (Matt. 8:16).
  '20':
  - type: text
    content: “Because the Father loves his Son so much, he always reveals to him everything that he is about to do. And you will all be amazed when he shows him even greater works than what you’ve seen so far!
  - type: text
    content: ' '
  '21':
  - type: text
    content: For just as the Father has power to raise the dead, the Son will also raise the dead and give life to whomever he wants.
  '22':
  - type: text
    content: “The Father judges no one, for he has given to the Son all the authority to judge.
  - type: text
    content: ' '
  '23':
  - type: text
    content: Therefore, the honor that belongs to the Father he will now share with his Son. So if you refuse to honor the Son, you are refusing to honor the Father who sent him.
  '24':
  - type: text
    content: '“I speak to you an eternal truth: if you embrace my message and believe in the One who sent me, you will never face condemnation. In me, you have already passed from the realm of death into eternal life!”'
  - type: heading
    content: Two Resurrections
  '25':
  - type: text
    content: '“I speak to you an eternal truth: Soon the dead will hear the voice of the Son of God, and those who listen will arise with life!'
  - type: text
    content: ' '
  '26':
  - type: text
    content: For as the Father is the source of life, so he has given the Son the power to impart life.
  - type: text
    content: ' '
  '27':
  - type: text
    content: The Father has transferred to the Son the authority to judge, because he is the Son of Man.
  '28':
  - type: text
    content: “Don’t be amazed when I tell you these things, for there is a day coming when everyone who has ever died will hear my voice
  - type: text
    content: ' '
  - type: text
    content: calling them back to life,
  - type: text
    content: ' '
  '29':
  - type: text
    content: and they will come out of their graves! Those who have done what is good will experience a resurrection to eternal life. And those who have practiced evil will taste the resurrection of judgment!
  '3':
  - type: text
    content: 'Hundreds of sick people were lying under the covered porches—the paralyzed, the blind, and the crippled—all of them waiting for their healing. '
  '30':
  - type: text
    content: “Nothing I do is from my own initiative. As I hear the judgment passed by my Father, I execute those judgments. And my judgments will be perfect, because I seek only to fulfill the desires of my Father who sent me.
  - type: text
    content: ' '
  '31':
  - type: text
    content: If I were to make claims about myself, you would have reasons to doubt.
  - type: text
    content: ' '
  - type: note
    content: According to the Mosaic laws, a man’s testimony about himself is inadmissible. See Prov. 27:2.
  '32':
  - type: text
    content: But there is another
  - type: text
    content: ' '
  - type: note
    content: This is the Father (see v. 37). Some believe it to be John because of v. 33. However, Jesus states that he does not need human validation.
  - type: text
    content: who bears witness on my behalf, and I know that what he testifies of me is true.”
  - type: heading
    content: John the Baptizer
  '33':
  - type: text
    content: “You have sent messengers to John, and what he testified
  - type: text
    content: ' '
  - type: text
    content: about me
  - type: text
    content: ' '
  - type: text
    content: is true.
  - type: text
    content: ' '
  '34':
  - type: text
    content: I have no need to be validated by men, but I’m explaining these things so that you will
  - type: text
    content: ' '
  - type: text
    content: believe
  - type: text
    content: ' '
  - type: text
    content: and be saved.
  '35':
  - type: text
    content: “John was a blazing, shining torch,
  - type: text
    content: ' '
  - type: note
    content: Or “a lantern of chasing flames.”
  - type: text
    content: and for a short time, you basked in his light with great joy.
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I can provide more substantial proof of who I am that exceeds John’s testimony—my miracles! These works which the Father destined for me to complete—they prove that the Father has sent me!
  - type: text
    content: ' '
  '37':
  - type: text
    content: And my Father himself, who gave me this mission, has also testified that I am his Son.
  - type: text
    content: ' '
  - type: note
    content: 'Or “testified about me.” Jesus was referring to the audible voice that God the Father spoke over Jesus at his baptism. For this reason and the reference to God’s voice, this translation has chosen to make it explicit that it refers to the Father’s testimony at Jesus’ baptism. See Luke 3:21–22. The four witnesses of Christ’s glory are: Jesus himself, John the Baptizer, the Father who spoke over his Son, and the miracles of Jesus.'
  - type: text
    content: But you have never heard his voice nor seen his form,
  - type: text
    content: ' '
  '38':
  - type: text
    content: nor does his Word truly live inside of you, for you refuse to believe in me or to embrace me as God’s messenger.
  '39':
  - type: text
    content: “You are busy analyzing the Scriptures, poring over them hoping to gain eternal life. Everything you read points to me,
  - type: text
    content: ' '
  '4':
  - type: text
    content: For an angel of God periodically descended into the pool to stir the waters, and the first one who stepped into the pool after the waters swirled would instantly be healed.
  - type: note
    content: The majority of manuscripts do not have v. 4, and a few Greek manuscripts do not even have v. 3. However, the absence of the data found in these verses would leave a tremendous gap in the narrative, leaving unanswered why all these sick people would have congregated at the pool of Bethesda, and making v. 7 very confusing. There remains a strong basis found in a diverse set of manuscripts, both Greek and Aramaic, to argue for the inclusion of vv. 3 and 4 here.
  '40':
  - type: text
    content: yet you still refuse to come to me so I can give you the life you’re looking for—eternal life!
  - type: note
    content: There are five witnesses to Christ’s authority and deity in this chapter. Jesus himself (vv. 25–27), John the Baptizer (vv. 32–34), Jesus’ miracles (v. 36), the Father (vv. 36–38), and the Scriptures (vv. 39–40; see also Ps. 40:7).
  '41':
  - type: text
    content: “I do not accept the honor that comes from men,
  - type: text
    content: ' '
  '42':
  - type: text
    content: for I know what kind of people you really are, and I can see that the love of God has found no home in you.
  - type: text
    content: ' '
  '43':
  - type: text
    content: I have come to represent my Father, yet you refuse to embrace me in faith. If someone comes in their own name
  - type: text
    content: ' '
  - type: text
    content: and with their own agenda
  - type: text
    content: ','
  - type: text
    content: ' '
  - type: note
    content: Implied in the text.
  - type: text
    content: you readily accept him.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Of course you’re unable to believe in me. For you live to enjoy the praises of others and not the praise that comes from the one true God.
  '45':
  - type: text
    content: “I will not accuse you before the Father. The one who will incriminate you is Moses, the very one you claim to obey, the one in whom you trust!
  - type: text
    content: ' '
  - type: note
    content: Jesus prophesied that Moses, on the final judgment day, will be the one to accuse those who would not listen to the laws and teachings of the Torah, which point to their fulfillment in Christ.
  '46':
  - type: text
    content: If you really believed what Moses has written, then you would embrace me, for Moses wrote about me!
  - type: text
    content: ' '
  '47':
  - type: text
    content: But since you do not believe what he wrote, no wonder you don’t believe what I say.”
  - type: note
    content: Apparently this concluded Jesus’ ministry in Jerusalem at this time. The text does not tell us of his return to the province of Galilee.
  '5':
  - type: text
    content: 'Among the many sick people lying there was a man who had been disabled for thirty-eight years. '
  - type: note
    content: Under the shelter of religion, there are the sick and lame and blind who can’t be healed unless they do the work and step into the pool. They are helpless and hopeless so near the Sheep Gate. But Jesus puts none of the law’s requirements upon us for our healing, only to believe in one who is greater than angels (Heb. 1:4). The man had been sick for thirty-eight years, the length of time Israel had wandered in the wilderness. See Deut. 2:14.
  '6':
  - type: text
    content: 'When Jesus saw him lying there, he knew that the man had been crippled for a long time. '
  - type: note
    content: Jesus knew by divine revelation this man’s situation.
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Do you truly long to be well?”
  - type: note
    content: Or “Are you convinced that you are already made whole?” The Greek phrase genesthai is actually not a future tense (“want to be healed”) but an aorist middle infinitive that indicates something already accomplished. Jesus was asking the crippled man if he was ready to abandon how he saw himself and now receive the faith for his healing (2 Cor. 5:7).
  '7':
  - type: text
    content: 'The sick man answered, “Sir, '
  - type: note
    content: The Greek word kurios means “lord” or “sir.”
  - type: text
    content: there’s no way I can get healed, for I have no one to lower me into the water when the angel comes. As soon as I try to crawl to the edge of the pool, someone else jumps in ahead of me.”
  '8':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Stand up! Pick up your sleeping mat and you will walk!”
  - type: text
    content: ' '
  '9':
  - type: text
    content: Immediately he stood up—he was healed! So he rolled up his mat and walked again! Now Jesus worked this miracle on the Sabbath.
  - type: note
    content: The healed man took his sleeping (resting) mat with him. The Sabbath was meant to be a day of rest, but the healed man carried his Sabbath “rest” with him. The Sabbath is not a day, but a realm of rest that we carry in our hearts.
