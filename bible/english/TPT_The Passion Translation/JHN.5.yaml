document_id: JHN.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Healing at Bethesda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From Galilee, Jesus returned to Jerusalem to observe one of the Jewish feasts. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'It is difficult to determine with certainty which of the feasts it was: Passover, Tabernacles, or Purim. Most of the ancient expositors taught that it was the Feast of Pentecost. There is no mention of the disciples being with him at this time.'
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'When the Jewish leaders saw the man walking along carrying his sleeping mat, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “cot” or “stretcher.” The Aramaic word is “quilt” or “mat.”
      marker-yv: yv-n
    - type: text
      text: 'they objected and said, “What are you doing carrying that? '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Don’t you know it’s the Sabbath?
    - type: text
      text: ' It’s not lawful for you to carry things on the Sabbath!”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He answered them, “The man who healed me told me to pick it up and walk.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“What man?” they asked him. “Who was this man who ordered you to carry something on a Sabbath?” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Malice filled the Jewish leaders. They should have been filled with joy that the man was healed. They should have asked, “Who is the wonderful one who healed you?”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: But the healed man couldn’t give them an answer, for he didn’t yet know who it was, since Jesus had already slipped away into the crowd.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'A short time later, Jesus found the man at the temple and said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Look at you now! You’re healed! Walk away from your sin
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Don’t continue sinning any longer.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: so that nothing worse will happen to you.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then the man went to the Jewish leaders to inform them, “It was Jesus who healed me!” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: From that day forward the Jewish leaders began to persecute Jesus because of the things he did on the Sabbath.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Responds to the Jewish Leaders
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jesus answered his critics by saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Every day my Father is at work, and I will be, too!”
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'This infuriated them and made them all the more eager to devise a plan to kill him. For not only did he break their Sabbath rules, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus did not break the Sabbath, he “loosed” it (literal Aramaic) from the bondage of tradition and man-made rules.
      marker-yv: yv-n
    - type: text
      text: 'but he also called God '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “my Father,”
    - type: text
      text: ' which made him equal to God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: They clearly understood that Jesus was claiming God as his Father in a unique way.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I speak to you eternal truth. The Son is unable to do anything from himself or through his own initiative. I only do the works that I see the Father doing, for the Son does the same works as his Father.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Inside the city, near the Sheep Gate, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Literally “the place of the sheep.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gate
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is not in the Greek text. The sick gathered at the pool were like bruised, wounded sheep, needing healing.
      marker-yv: yv-n
    - type: text
      text: 'there is '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The present tense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here in the text indicates that when John wrote his Gospel, the pool of Bethesda was still there. However, by AD 68–70, Jerusalem had been destroyed, along with the temple, by the Roman invasion. This would indicate John’s Gospel has an earlier date of origin than believed. It is likely that John wrote his gospel prior to AD 67.
      marker-yv: yv-n
    - type: text
      text: 'a pool called in Aramaic, The House of Loving Kindness, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or Bethesda. In Hebrew,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Beit-Hesed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', meaning “House of Loving Kindness.” The spelling of this varies from manuscript to manuscript. Some have “Bethsaida,” or “Bethsatha,” or “Belzetha (House of the Olive).” Archaeologists have discovered a deep double pool near St. Anne’s Church in Jerusalem surrounded by five porticoes located near the Sheep Gate, confirming the validity of the biblical account. The Sheep Gate is where the sacrificial animals were brought into the temple. This points us to the Lamb of God whose cross and sacrifice brought us healing. There is a pool of mercy near the Sheep Gate.'
      marker-yv: yv-n
    - type: text
      text: 'surrounded by five covered porches. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “covered walkways” or “alcoves.” The sick were under the “covering” of the Law (the five books of the Torah). But the Law cannot heal; it wounds and brings death (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 7:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Christ is the healer, the living Torah (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 8:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Because the Father loves his Son so much, he always reveals to him everything that he is about to do. And you will all be amazed when he shows him even greater works than what you’ve seen so far!
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For just as the Father has power to raise the dead, the Son will also raise the dead and give life to whomever he wants.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Father judges no one, for he has given to the Son all the authority to judge.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Therefore, the honor that belongs to the Father he will now share with his Son. So if you refuse to honor the Son, you are refusing to honor the Father who sent him.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I speak to you an eternal truth: if you embrace my message and believe in the One who sent me, you will never face condemnation. In me, you have already passed from the realm of death into eternal life!”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Two Resurrections
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“I speak to you an eternal truth: Soon the dead will hear the voice of the Son of God, and those who listen will arise with life!'
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For as the Father is the source of life, so he has given the Son the power to impart life.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The Father has transferred to the Son the authority to judge, because he is the Son of Man.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t be amazed when I tell you these things, for there is a day coming when everyone who has ever died will hear my voice
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: calling them back to life,
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they will come out of their graves! Those who have done what is good will experience a resurrection to eternal life. And those who have practiced evil will taste the resurrection of judgment!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hundreds of sick people were lying under the covered porches—the paralyzed, the blind, and the crippled—all of them waiting for their healing. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Nothing I do is from my own initiative. As I hear the judgment passed by my Father, I execute those judgments. And my judgments will be perfect, because I seek only to fulfill the desires of my Father who sent me.
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If I were to make claims about myself, you would have reasons to doubt.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: According to the Mosaic laws, a man’s testimony about himself is inadmissible. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 27:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But there is another
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the Father (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '37'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Some believe it to be John because of v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '33'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . However, Jesus states that he does not need human validation.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: who bears witness on my behalf, and I know that what he testifies of me is true.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptizer
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You have sent messengers to John, and what he testified
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: about me
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is true.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have no need to be validated by men, but I’m explaining these things so that you will
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: believe
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and be saved.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “John was a blazing, shining torch,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a lantern of chasing flames.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and for a short time, you basked in his light with great joy.
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But I can provide more substantial proof of who I am that exceeds John’s testimony—my miracles! These works which the Father destined for me to complete—they prove that the Father has sent me!
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And my Father himself, who gave me this mission, has also testified that I am his Son.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “testified about me.” Jesus was referring to the audible voice that God the Father spoke over Jesus at his baptism. For this reason and the reference to God’s voice, this translation has chosen to make it explicit that it refers to the Father’s testimony at Jesus’ baptism. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 3:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. The four witnesses of Christ’s glory are: Jesus himself, John the Baptizer, the Father who spoke over his Son, and the miracles of Jesus.'
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But you have never heard his voice nor seen his form,
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: wj
      children:
