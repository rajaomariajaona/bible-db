document_id: 1JN.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Proof of Love and the Victory of Faith
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Everyone who believes that Jesus is the Messiah is God’s spiritual child and has been fathered by God himself. And everyone who loves Father God loves his children as well. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'This is how we can be sure that we love the children of God: by having a passionate love for God and by obedience to his commands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'True love for God means obeying his commands, and his commands don’t weigh us down as heavy burdens. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: God’s grace empowers us to love, which makes his commands a delight instead of a duty. The spontaneity of love is never crushed by the commands of a loving God.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: You see
  - type: text
    text: ', every child of God overcomes '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek verb tense indicates continuous action, “continually conquers the world” (system).
    marker-yv: yv-n
  - type: text
    text: 'the world, for our faith is the victorious power that triumphs over the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So who are the world conquerors, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: defeating its power
  - type: text
    text: '? Those who believe that Jesus is the Son of God.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Spirit, the Water, and the Blood
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jesus Christ is the One who was revealed '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as God’s Son
  - type: text
    text: ' by his water '
  - type: usfm
    marker: it
    children:
    - type: text
      text: baptism
  - type: text
    text: ' and by the blood '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of his cross
  - type: text
    text: '—not by water only, but by water and blood. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: At Jesus’ baptism the voice of the Father acknowledged him as his beloved Son. At the cross his blood was shed to bring the reality of Christ to those who believe in him. The majority view of current scholarship is this passage refers to Jesus’ baptism and the cross. It is possible, however, that John is referring to the blood and water that spilled from the side of Jesus after his death.
    marker-yv: yv-n
  - type: text
    text: 'And the Spirit, who is truth, confirms this with his testimony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So we have these three constant witnesses giving their evidence: '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: There is considerable historical and theological debate surrounding vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7–8
      metadata:
        usfm: 1JN.5.7+1JN.5.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Some later, less reliable manuscripts have for vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 7–8
      metadata:
        usfm: 1JN.5.7+1JN.5.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': “There are three that testify in heaven: the Father, the Word, and the Holy Spirit. And these three are one.” This is known as the'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Comma Johanneum
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . But there has been a nearly complete agreement of scholars that this reading was added by copyists, with many theories of who it was. Although there is nothing heretical about this addition, it seems to have been inserted to reinforce the doctrine of the Trinity. It is not included in modern versions nor in the Aramaic.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'the Spirit, the water, and the blood. And these three are in agreement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If we accept the testimony of men, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: how much more should we accept
  - type: text
    text: ' the more authoritative testimony of God that he has testified concerning his Son?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Those who believe in the Son of God have the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: living
  - type: text
    text: ' testimony in their hearts. Those who don’t believe have made God out to be a liar by not believing the testimony God has confirmed about his Son. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is the true testimony: that God has given us eternal life, and this life has its source in his Son. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “this life is in [as connected to him as source] his Son.” It can also mean that God has placed us in life union with his Son to manifest eternal life in us.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Whoever has the Son has '
  - type: usfm
    marker: it
    children:
    - type: text
      text: eternal
  - type: text
    text: ' life; whoever does not have the Son does not possess '
  - type: usfm
    marker: it
    children:
    - type: text
      text: eternal
  - type: text
    text: ' life.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assurance of Eternal Life
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I’ve written this letter to you who believe in the name of the Son of God so that you will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: be assured and
  - type: text
    text: ' know without a doubt that you have eternal life.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Since we have this confidence, we can also have great boldness before him, for if we ask anything agreeable to his will, he will hear us. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And if we know that he hears us in whatever we ask, we also know that we have obtained the requests we ask of him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'If anyone observes a fellow believer habitually sinning in a way that doesn’t lead to death, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, if the sinning is persisted in, it may lead to death. Some believe this may refer to the unforgivable sin of blasphemy of the Holy Spirit (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 12:31–32
      metadata:
        usfm: MAT.12.31+MAT.12.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 3:28–30
      metadata:
        usfm: MRK.3.28+MRK.3.29+MRK.3.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 12:8–10
      metadata:
        usfm: LUK.12.8+LUK.12.9+LUK.12.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), or possibly the sin that brings death in taking communion “unworthily” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Cor. 11:27–30
      metadata:
        usfm: 1CO.11.27+1CO.11.28+1CO.11.29+1CO.11.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), or lying to the Holy Spirit (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 5:1–11
      metadata:
        usfm: ACT.5.1+ACT.5.2+ACT.5.3+ACT.5.4+ACT.5.5+ACT.5.6+ACT.5.7+ACT.5.8+ACT.5.9+ACT.5.10+ACT.5.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). However, John speaks in this letter about the gross apostasy of those who turn away from the truth and depart from the fellowship of believers and follow the teaching of antichrists.
    marker-yv: yv-n
  - type: text
    text: 'you should keep interceding in prayer that God will give that person life. Now, there is a sin that leads to death, and I’m not encouraging you to pray for those who commit it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All unrighteousness is sin, but there is sin that does not result in death.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'We are convinced that everyone fathered by God does not make sinning a way of life, because the Son of God protects the child of God, and the Evil One cannot touch him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'We know that we are God’s children and that the whole world lies under the misery and influence of the Evil One. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: And we know that the Son of God has made our understanding come alive so that we can know by experience the One who is true. And we are in him who is true, God’s Son, Jesus Christ—the true God and eternal life!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: So, little children, guard yourselves from worshiping anything but him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “keep yourselves from idols.” The Aramaic can be translated “Keep your souls from fear of idols.”
    marker-yv: yv-n
