document_id: 1PE.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living in the Grace of God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since Christ, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: though innocent
    - type: text
      text: ', suffered in his flesh for you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and most Greek manuscripts. A few Greek manuscripts have “for us,” while some reliable Greek texts read simply “Christ suffered in his flesh.” Variants of both the Greek and Aramaic text read “Christ died for us.”
      marker-yv: yv-n
    - type: text
      text: 'now you also must be a prepared soldier, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: hoplisasthe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a hapax legomenon, means “to arm yourself” (like a foot soldier). It is used metaphorically to describe the battle we experience for moral purity in a decadent world. See also'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 2:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'having the same mind-set, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “attitude.” That is, learn to think like him. The Aramaic can be translated “you also are nourished by him as you mediate on these things.”
      marker-yv: yv-n
    - type: text
      text: 'for whoever has died in his body is done with sin. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “for the one who suffers in the flesh is done with sin.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 6:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every believer has received grace gifts, so use them to serve one another as faithful stewards of the many-colored tapestry of God’s grace.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: For example
    - type: text
      text: ', if you have a speaking '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gift
    - type: text
      text: ', speak as though God were speaking his words through you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text is simply “If anyone speaks—as God’s words.” This would include preaching, teaching, and prophesying.
      marker-yv: yv-n
    - type: text
      text: 'If you have '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the gift of
    - type: text
      text: ' serving, do it '
    - type: usfm
      marker: it
      children:
      - type: text
        text: passionately
    - type: text
      text: ' with the strength God gives you, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek can also be translated “The one who provides finances should do it with the strength of God, who supplies all things.”
      marker-yv: yv-n
    - type: text
      text: 'so that in everything God '
    - type: usfm
      marker: it
      children:
      - type: text
        text: alone
    - type: text
      text: ' will be glorified through Jesus Christ. For to him belong the power and the glory forever throughout all ages! Amen.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Peter exhorts us in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'to do five things as we see the end drawing closer: (1) be given to prayer, (2) be devoted to loving our fellow believers, (3) be compassionate to the stranger and foreigner, (4) use spiritual gifts to serve one another, and (5) give God glory in all things.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Suffering and Glory
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beloved friends, if life gets extremely difficult, with many tests, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “when the burning of a fiery trial is occurring among you.”
      marker-yv: yv-n
    - type: text
      text: 'don’t be bewildered as though something strange were overwhelming you. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic adds a clause here, “because these things are your communion in the inheritance.”
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Instead, continue to rejoice, for you, in a measure, have shared in the sufferings of the Anointed One so that '
    - type: usfm
      marker: it
      children:
      - type: text
        text: you can share in
    - type: text
      text: ' the revelation of his glory and celebrate with '
    - type: usfm
      marker: it
      children:
      - type: text
        text: even greater
    - type: text
      text: ' gladness! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek verb tenses can imply either present or future. There is a glory unveiled in us as we focus on Christ in our difficulties. This brings immediate joy and rejoicing when we pass through suffering. Yet the greatest joy will be as we are free from mortal pain and see the revelation of his glory throughout eternity.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you are insulted because of the name of Christ, you are greatly blessed, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'because the Spirit of glory and power, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Greek manuscripts have “and of power.” The Aramaic can be translated “the [Shekinah] glory of the Spirit.”
      marker-yv: yv-n
    - type: text
      text: who is the Spirit of God, rests upon you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . A few manuscripts, deemed unreliable, add “On their part he is evil spoken of, but on your part he is glorified.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let none of you merit suffering as a murderer, or thief, or criminal, or as one who meddles in the affairs of others. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you suffer for being a Christian, don’t consider it a disgrace but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a privilege
    - type: text
      text: '. Glorify God because you carry the Anointed One’s name. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “that you bear this name.” The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Christian
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “anointed one.” Christ is the Anointed One, and as his followers who are joined in life union to him, we too are “anointed ones.”
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the time is ripe for judgment to begin in God’s own household. And if it starts with us, what will be the fate of those who refuse to obey the gospel of God?
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If the righteous are barely saved,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “if the righteous are harvested to salvation.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what will become of the wicked and godless?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 11:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (LXX).
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, those who suffer for following God’s will should enfold their lives into the Creator, who will never fail them, and continue to always do what is right.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is interesting that Peter points us to the Creator when we suffer. The faithful Creator, who keeps all things in order and feeds his creation, will never fail to be with us and supply grace and glory in all that we face.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So live the rest of your earthly life no longer concerned with human desires but '
    - type: usfm
      marker: it
      children:
      - type: text
        text: consumed
    - type: text
      text: ' with what brings pleasure to God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you have already spent enough time doing what unbelievers '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “gentiles.”
      marker-yv: yv-n
    - type: text
      text: 'love to do—living in debauchery, sensuality, partying, drunkenness, wild drinking parties, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “orgies.”
      marker-yv: yv-n
    - type: text
      text: 'and the worship of demons. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “idolatries.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They marvel that you no longer rush to join them in the excesses of their corrupt lifestyles, and so they vilify you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But one day they will have to give an account to the one who is destined to judge the living and the dead. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the reason the gospel was preached to the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: martyrs before they gave their lives
    - type: text
      text: '. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “to those who are dead.” Most scholars believe that this refers to those who heard the gospel and eventually suffered and died for Christ. However, some believe it is preaching to the dead (the entire human family), giving them the opportunity to believe.
      marker-yv: yv-n
    - type: text
      text: Even though they were judged by human standards, now they live in spirit by God’s standards.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prayer, Love, and Gifts of Grace
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since we are approaching the end of all things, be intentional, purposeful, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Though the Greek uses only one word (
      - type: usfm
        marker: it
        children:
        - type: text
          text: sōphroneō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), it is best defined by the two English words
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: intentional
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: purposeful
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and self-controlled so that you can be given to prayer.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Above all, constantly echo '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek verb
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: echō
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also mean “to maintain,” “to possess,” “to keep,” or “to be so closely joined to something that you become its echo.” In this case, we join ourselves so closely to God’s love that we “echo” his forgiving, fervent love toward one another.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: God’s
    - type: text
      text: ' intense love for one another, for love will be a canopy over a multitude of sins.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Prov. 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 13:4–7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be compassionate to foreigners '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and implied in the Greek, which can also be translated “Show hospitality to the stranger.”
      marker-yv: yv-n
    - type: text
      text: without complaining.
