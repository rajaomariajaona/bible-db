document_id: 1PE.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living in the Grace of God
  - type: text
    content: 'Since Christ, '
  - type: text
    content: though innocent
  - type: text
    content: ', suffered in his flesh for you, '
  - type: note
    content: As translated from the Aramaic and most Greek manuscripts. A few Greek manuscripts have “for us,” while some reliable Greek texts read simply “Christ suffered in his flesh.” Variants of both the Greek and Aramaic text read “Christ died for us.”
  - type: text
    content: 'now you also must be a prepared soldier, '
  - type: note
    content: The Greek word hoplisasthe, a hapax legomenon, means “to arm yourself” (like a foot soldier). It is used metaphorically to describe the battle we experience for moral purity in a decadent world. See also 1 Peter 2:11.
  - type: text
    content: 'having the same mind-set, '
  - type: note
    content: Or “attitude.” That is, learn to think like him. The Aramaic can be translated “you also are nourished by him as you mediate on these things.”
  - type: text
    content: 'for whoever has died in his body is done with sin. '
  - type: note
    content: As translated from the Aramaic. The Greek is “for the one who suffers in the flesh is done with sin.” See Rom. 6:7.
  '10':
  - type: text
    content: Every believer has received grace gifts, so use them to serve one another as faithful stewards of the many-colored tapestry of God’s grace.
  '11':
  - type: text
    content: For example
  - type: text
    content: ', if you have a speaking '
  - type: text
    content: gift
  - type: text
    content: ', speak as though God were speaking his words through you. '
  - type: note
    content: The Greek text is simply “If anyone speaks—as God’s words.” This would include preaching, teaching, and prophesying.
  - type: text
    content: 'If you have '
  - type: text
    content: the gift of
  - type: text
    content: ' serving, do it '
  - type: text
    content: passionately
  - type: text
    content: ' with the strength God gives you, '
  - type: note
    content: The Greek can also be translated “The one who provides finances should do it with the strength of God, who supplies all things.”
  - type: text
    content: 'so that in everything God '
  - type: text
    content: alone
  - type: text
    content: ' will be glorified through Jesus Christ. For to him belong the power and the glory forever throughout all ages! Amen.'
  - type: note
    content: 'Peter exhorts us in vv. 7–11 to do five things as we see the end drawing closer: (1) be given to prayer, (2) be devoted to loving our fellow believers, (3) be compassionate to the stranger and foreigner, (4) use spiritual gifts to serve one another, and (5) give God glory in all things.'
  - type: heading
    content: Suffering and Glory
  '12':
  - type: text
    content: 'Beloved friends, if life gets extremely difficult, with many tests, '
  - type: note
    content: Or “when the burning of a fiery trial is occurring among you.”
  - type: text
    content: 'don’t be bewildered as though something strange were overwhelming you. '
  - type: note
    content: The Aramaic adds a clause here, “because these things are your communion in the inheritance.”
  '13':
  - type: text
    content: 'Instead, continue to rejoice, for you, in a measure, have shared in the sufferings of the Anointed One so that '
  - type: text
    content: you can share in
  - type: text
    content: ' the revelation of his glory and celebrate with '
  - type: text
    content: even greater
  - type: text
    content: ' gladness! '
  - type: note
    content: The Greek verb tenses can imply either present or future. There is a glory unveiled in us as we focus on Christ in our difficulties. This brings immediate joy and rejoicing when we pass through suffering. Yet the greatest joy will be as we are free from mortal pain and see the revelation of his glory throughout eternity.
  '14':
  - type: text
    content: 'If you are insulted because of the name of Christ, you are greatly blessed, '
  - type: note
    content: See Matt. 5:11.
  - type: text
    content: 'because the Spirit of glory and power, '
  - type: note
    content: Some Greek manuscripts have “and of power.” The Aramaic can be translated “the [Shekinah] glory of the Spirit.”
  - type: text
    content: who is the Spirit of God, rests upon you.
  - type: note
    content: See Isa. 11:2. A few manuscripts, deemed unreliable, add “On their part he is evil spoken of, but on your part he is glorified.”
  '15':
  - type: text
    content: 'Let none of you merit suffering as a murderer, or thief, or criminal, or as one who meddles in the affairs of others. '
  '16':
  - type: text
    content: 'If you suffer for being a Christian, don’t consider it a disgrace but '
  - type: text
    content: a privilege
  - type: text
    content: '. Glorify God because you carry the Anointed One’s name. '
  - type: note
    content: Or “that you bear this name.” The word Christian means “anointed one.” Christ is the Anointed One, and as his followers who are joined in life union to him, we too are “anointed ones.”
  '17':
  - type: text
    content: For the time is ripe for judgment to begin in God’s own household. And if it starts with us, what will be the fate of those who refuse to obey the gospel of God?
  '18':
  - type: text
    content: 'And:'
  - type: text
    content: If the righteous are barely saved,
  - type: note
    content: The Aramaic can be translated “if the righteous are harvested to salvation.”
  - type: text
    content: what will become of the wicked and godless?
  - type: note
    content: See Prov. 11:31 (LXX).
  '19':
  - type: text
    content: So then, those who suffer for following God’s will should enfold their lives into the Creator, who will never fail them, and continue to always do what is right.
  - type: note
    content: It is interesting that Peter points us to the Creator when we suffer. The faithful Creator, who keeps all things in order and feeds his creation, will never fail to be with us and supply grace and glory in all that we face.
  '2':
  - type: text
    content: 'So live the rest of your earthly life no longer concerned with human desires but '
  - type: text
    content: consumed
  - type: text
    content: ' with what brings pleasure to God. '
  '3':
  - type: text
    content: 'For you have already spent enough time doing what unbelievers '
  - type: note
    content: Or “gentiles.”
  - type: text
    content: 'love to do—living in debauchery, sensuality, partying, drunkenness, wild drinking parties, '
  - type: note
    content: Or “orgies.”
  - type: text
    content: 'and the worship of demons. '
  - type: note
    content: As translated from the Aramaic. The Greek is “idolatries.”
  '4':
  - type: text
    content: 'They marvel that you no longer rush to join them in the excesses of their corrupt lifestyles, and so they vilify you. '
  '5':
  - type: text
    content: 'But one day they will have to give an account to the one who is destined to judge the living and the dead. '
  '6':
  - type: text
    content: 'This is the reason the gospel was preached to the '
  - type: text
    content: martyrs before they gave their lives
  - type: text
    content: '. '
  - type: note
    content: Or “to those who are dead.” Most scholars believe that this refers to those who heard the gospel and eventually suffered and died for Christ. However, some believe it is preaching to the dead (the entire human family), giving them the opportunity to believe.
  - type: text
    content: Even though they were judged by human standards, now they live in spirit by God’s standards.
  - type: heading
    content: Prayer, Love, and Gifts of Grace
  '7':
  - type: text
    content: 'Since we are approaching the end of all things, be intentional, purposeful, '
  - type: note
    content: Though the Greek uses only one word (sōphroneō), it is best defined by the two English words intentional and purposeful.
  - type: text
    content: and self-controlled so that you can be given to prayer.
  '8':
  - type: text
    content: 'Above all, constantly echo '
  - type: note
    content: The Greek verb echō can also mean “to maintain,” “to possess,” “to keep,” or “to be so closely joined to something that you become its echo.” In this case, we join ourselves so closely to God’s love that we “echo” his forgiving, fervent love toward one another.
  - type: text
    content: God’s
  - type: text
    content: ' intense love for one another, for love will be a canopy over a multitude of sins.'
  - type: note
    content: As translated from the Aramaic. See Prov. 10:12; 1 Cor. 13:4–7.
  '9':
  - type: text
    content: 'Be compassionate to foreigners '
  - type: note
    content: As translated from the Aramaic and implied in the Greek, which can also be translated “Show hospitality to the stranger.”
  - type: text
    content: without complaining.
