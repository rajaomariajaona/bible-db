document_id: JER.28,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The False Prophet Hananiah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'That same year, at the beginning of the reign of Zedekiah king of Judah, in the fifth month of the fourth year, the prophet Hananiah son of Azzur, a Gibeonite, spoke to me in the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' in the presence of the priests and of all the people: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'All at once, the prophet Hananiah snatched the yoke off Jeremiah’s neck and broke it. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And in front of all the people, Hananiah said, “Hear the word of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ': ‘Just as I broke this yoke, so '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' will free all the nations from the power of King Nebuchadnezzar within two years.’ ” At this, the prophet Jeremiah walked away.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fatal End of Hananiah
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'After the prophet Hananiah had broken the yoke around Jeremiah’s neck, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' gave Jeremiah this message: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Go back and inform Hananiah, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has told me that, indeed, you have broken wooden bars only to forge iron bars in their place. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, Commander of Angel Armies, says: I now lay on the necks of all these nations a heavy iron yoke to enslave them to Nebuchadnezzar king of Babylon. They will be enslaved to him; I will even make the wild animals '
    - type: usfm
      marker: it
      children:
      - type: text
        text: serve him
    - type: text
      text: '!’ ”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Jeremiah said to the prophet Hananiah, “You had better listen, Hananiah. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has not sent you; you have misled the people to trust in a lie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And so, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares, ‘I will remove you from the face of the earth. You will die this year because you have preached rebellion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The rebellion of Hananiah’s prophecy was to reject the word that God had sent through the prophet Jeremiah (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 29:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'against '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .’ ”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The prophet Hananiah died the same year, in the seventh month.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 28:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Scholars date Hananiah’s death two months after the prophecy of Jeremiah (see v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Hananiah had prophesied deliverance in two years, but he died in two months. He had prophesied prosperity without repentance (cf.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 3:7–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The death of the false prophet Hananiah confirmed Jeremiah’s message, thereby proving that Jeremiah was a true prophet.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel, the Commander of Angel Armies, says, ‘I have shattered the yoke of the king of Babylon. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Within two years, I will return all the temple treasures of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' that Nebuchadnezzar king of Babylon carried off from here and took to Babylon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And I will also bring back Jeconiah son of Jehoiakim, king of Judah, and all the exiles of Judah who have gone to Babylon.’ For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' declares, ‘I will shatter the yoke of the king of Babylon.’ ”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Then Jeremiah the prophet replied to Hananiah the prophet in front of the priests and all the people who '
    - type: usfm
      marker: it
      children:
      - type: text
        text: had come to worship
    - type: text
      text: ' at the temple of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“So be it! May he fulfill the words that you have prophesied and return all the temple treasures of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and all the exiles back to this place from Babylon. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nevertheless, listen to this word that I speak to you and the people: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'From ancient times, the prophets who preceded you and me prophesied war, disaster, and plague against many countries and great kingdoms. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'But when a prophet prophesies peace, wait to see if his words come true; then you will have proof that '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had truly sent him.”'
