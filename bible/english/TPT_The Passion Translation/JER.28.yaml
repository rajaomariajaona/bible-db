document_id: JER.28,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The False Prophet Hananiah
  - type: text
    content: 'That same year, at the beginning of the reign of Zedekiah king of Judah, in the fifth month of the fourth year, the prophet Hananiah son of Azzur, a Gibeonite, spoke to me in the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: ' in the presence of the priests and of all the people: '
  '10':
  - type: text
    content: 'All at once, the prophet Hananiah snatched the yoke off Jeremiah’s neck and broke it. '
  '11':
  - type: text
    content: 'And in front of all the people, Hananiah said, “Hear the word of '
  - type: text
    content: Yahweh
  - type: text
    content: ': ‘Just as I broke this yoke, so '
  - type: text
    content: Yahweh
  - type: text
    content: ' will free all the nations from the power of King Nebuchadnezzar within two years.’ ” At this, the prophet Jeremiah walked away.'
  - type: heading
    content: The Fatal End of Hananiah
  '12':
  - type: text
    content: 'After the prophet Hananiah had broken the yoke around Jeremiah’s neck, '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave Jeremiah this message: '
  '13':
  - type: text
    content: “Go back and inform Hananiah, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' has told me that, indeed, you have broken wooden bars only to forge iron bars in their place. '
  '14':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, Commander of Angel Armies, says: I now lay on the necks of all these nations a heavy iron yoke to enslave them to Nebuchadnezzar king of Babylon. They will be enslaved to him; I will even make the wild animals '
  - type: text
    content: serve him
  - type: text
    content: '!’ ”'
  '15':
  - type: text
    content: 'Then Jeremiah said to the prophet Hananiah, “You had better listen, Hananiah. '
  - type: text
    content: Yahweh
  - type: text
    content: ' has not sent you; you have misled the people to trust in a lie. '
  '16':
  - type: text
    content: 'And so, '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares, ‘I will remove you from the face of the earth. You will die this year because you have preached rebellion '
  - type: note
    content: The rebellion of Hananiah’s prophecy was to reject the word that God had sent through the prophet Jeremiah (see 29:32).
  - type: text
    content: 'against '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  '17':
  - type: text
    content: The prophet Hananiah died the same year, in the seventh month.
  - type: note
    content: Scholars date Hananiah’s death two months after the prophecy of Jeremiah (see v. 1). Hananiah had prophesied deliverance in two years, but he died in two months. He had prophesied prosperity without repentance (cf. Matt. 3:7–10). The death of the false prophet Hananiah confirmed Jeremiah’s message, thereby proving that Jeremiah was a true prophet.
  '2':
  - type: text
    content: “
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, the Commander of Angel Armies, says, ‘I have shattered the yoke of the king of Babylon. '
  '3':
  - type: text
    content: 'Within two years, I will return all the temple treasures of '
  - type: text
    content: Yahweh
  - type: text
    content: ' that Nebuchadnezzar king of Babylon carried off from here and took to Babylon. '
  '4':
  - type: text
    content: 'And I will also bring back Jeconiah son of Jehoiakim, king of Judah, and all the exiles of Judah who have gone to Babylon.’ For '
  - type: text
    content: Yahweh
  - type: text
    content: ' declares, ‘I will shatter the yoke of the king of Babylon.’ ”'
  '5':
  - type: text
    content: 'Then Jeremiah the prophet replied to Hananiah the prophet in front of the priests and all the people who '
  - type: text
    content: had come to worship
  - type: text
    content: ' at the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '6':
  - type: text
    content: '“So be it! May he fulfill the words that you have prophesied and return all the temple treasures of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and all the exiles back to this place from Babylon. '
  '7':
  - type: text
    content: 'Nevertheless, listen to this word that I speak to you and the people: '
  '8':
  - type: text
    content: 'From ancient times, the prophets who preceded you and me prophesied war, disaster, and plague against many countries and great kingdoms. '
  '9':
  - type: text
    content: 'But when a prophet prophesies peace, wait to see if his words come true; then you will have proof that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had truly sent him.”'
