  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So before God destroyed the cities of the plain where Lot had settled, he remembered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: his affection for
    - type: text
      text: ' Abraham '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, he honored Abraham’s request. God had not forgotten Abraham and then suddenly remembered him, but rather showed his affection for Abraham by fulfilling his request to spare the righteous.
      marker-yv: yv-n
    - type: text
      text: and spared Lot from all the destruction.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lot and His Daughters
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Lot was so insistent they finally agreed to go to his house. Lot had unleavened bread baked for them and prepared a feast, and they ate. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afraid to remain in Zoar, Lot left there and settled in the hill country and lived in a cave with his two daughters. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: One day
    - type: text
      text: ', his firstborn suggested to the younger, “Our father is getting old, and there isn’t a man anywhere who could impregnate us in the normal way. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Come, let’s get our father drunk with wine and have sex with him. That way we can '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at least
    - type: text
      text: ' have children through our father.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That night, they got their father drunk with wine, and the firstborn went in and slept with him. Lot '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was so drunk
    - type: text
      text: ' he didn’t have a clue about what had happened. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “he did not know when she lay down and when she arose.” See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '35'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This chapter opens with Lot sitting at the gate of Sodom, the seat of authority, and ends with him drunk in a cave—from councilman to caveman! Lot could have returned to his uncle, Abraham, but instead he fled to a cave.
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The next day, the firstborn said to the younger, “I slept with my father last night. Tonight, it’s your turn. We’ll get him drunk with wine, and you can sleep with him and we can preserve our family line through our father.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they got their father drunk the second time; and the younger went in and slept with him. He '
    - type: usfm
      marker: it
      children:
      - type: text
        text: was once again so drunk
    - type: text
      text: ' he had no clue what had happened. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As a result, both Lot’s daughters became pregnant by their father. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The older daughter had a son named Moab, '
    - type: usfm
