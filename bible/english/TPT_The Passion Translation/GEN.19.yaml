document_id: GEN.19,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Wickedness of Sodom
  - type: text
    content: 'That evening, the two angels came to Sodom '
  - type: note
    content: Sodom means “scorched” or “burnt region.”
  - type: text
    content: 'while Lot was sitting at the city’s gateway. '
  - type: note
    content: A city gateway usually consisted of towers, guardrooms, and a meeting area where people could sit. Often, the city leadership would conduct meetings there (see Ruth 4:1–12). Recent archeological discoveries at Tel-Dan revealed a stone bench that was fifteen feet long connected to the wall of one of its towers.
  - type: text
    content: 'When Lot saw them, he got up to meet them and bowed with his face to the ground. '
  '10':
  - type: text
    content: 'but the two angels reached out and pulled Lot safely back into the house and bolted the door. '
  '11':
  - type: text
    content: 'They struck the men outside the house, young and old, with one blazing flash of light '
  - type: note
    content: 'The Hebrew word sanverim is found only here and in 2 Kings 6:18. The word indicates more than sightlessness (Hb. invaron), but a sudden immobilizing and dazzling flash of light. See the Aramaic Targums; Yoma 22b.; H. M. Orlinsky, Notes on the New Translation of the Torah (Philadelphia: Jewish Publication Society, 1969), 93ff.; E. A. Speiser, “The ‘Elative’ in West-Semitic and Akkadian,” JCS 6 (1952): 81ff.'
  - type: text
    content: so that they could not find the door!
  '12':
  - type: text
    content: 'Then the visitors said to Lot, “Who else lives here? Do you have any other family here—sons or daughters, sons-in-law or '
  - type: text
    content: daughters-in-law
  - type: text
    content: ' who live in Sodom? Get them all out of the city, '
  '13':
  - type: text
    content: 'because we are about to destroy this place. A tremendous outcry against the people has come before '
  - type: text
    content: Yahweh
  - type: text
    content: ', and he has sent us here to destroy it!”'
  '14':
  - type: text
    content: 'So Lot went out to find the two men who were pledged to marry his daughters and told them, “Hurry, leave the city, for '
  - type: text
    content: Yahweh
  - type: text
    content: ' is about to destroy it!” But they thought he was only joking '
  - type: text
    content: and paid him no attention
  - type: text
    content: .
  '15':
  - type: text
    content: 'At dawn, the angels urged Lot, saying, “Go! Take your wife and your two daughters and leave or you will be consumed in the judgment about to come to the city!” '
  '16':
  - type: text
    content: 'But Lot hesitated, so the angels grabbed his hands and the hands of his wife and daughters and brought them outside the city, because '
  - type: text
    content: Yahweh
  - type: text
    content: ' was merciful to them. '
  '17':
  - type: text
    content: Once they were safely outside the city, the angels said to them, “Run for your lives! Don’t stop anywhere in the plain until you’ve reached the mountains. And don’t even look back, or you’ll die!”
  '18':
  - type: text
    content: 'Lot replied, “Oh no, my lords. '
  '19':
  - type: text
    content: 'You’ve been so gracious to your servant, and you’ve been so kind to save our lives, but I can’t make it to the mountains. It’s so far from here; disaster will overtake me, and I’ll die! '
  '2':
  - type: text
    content: He said, “Please, my lords, come to your servant’s house to spend the night and wash your feet; then you can rise early and go on your way.”
  - type: text
    content: '“No,” they answered. “We will '
  - type: text
    content: be fine to
  - type: text
    content: ' spend the night in the town square.”'
  '20':
  - type: text
    content: 'Look, over there is a village close enough to run to, and it’s a small one. '
  - type: note
    content: Or “Zoar,” a wordplay in Hebrew. The word for “small” sounds like Zoar.
  - type: text
    content: Let me escape there instead. You can see that it’s such a small village. Let my life be spared!”
  '21':
  - type: text
    content: '“All right,” he replied. “I will grant this request too. '
  - type: note
    content: Or “I have lifted up your face,” a figure of speech for showing favor.
  - type: text
    content: 'I will not destroy that village. '
  '22':
  - type: text
    content: Now, you must hurry. Run to that village, for I can’t do anything until you are there.” (That is why the village was called Zoar.)
  - type: heading
    content: The Destruction of Sodom and Gomorrah
  '23':
  - type: text
    content: 'By mid-morning, '
  - type: note
    content: Or “When the sun had risen upon the earth.”
  - type: text
    content: 'Lot arrived at '
  - type: text
    content: the small village of
  - type: text
    content: ' Zoar, '
  '24':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: '’s fire from heaven fell upon Sodom and Gomorrah. '
  '25':
  - type: text
    content: 'He completely destroyed the cities of the plain, and all their inhabitants and whatever grew in the valley. '
  - type: note
    content: Jesus made it clear that if the miracles he did in Israel had been seen in Sodom, the people of Sodom would have repented. Therefore, it will be more tolerable for them in the Day of Judgment than for the cities of Galilee (see Matt. 11:20–24). Knowing that God will soon judge the corrupt world, it is vital that we live holy lives (see 2 Peter 3:11–15).
  '26':
  - type: text
    content: 'But Lot’s wife turned and gazed '
  - type: text
    content: longingly on the city
  - type: text
    content: ' and turned into a pillar of salt.'
  - type: note
    content: See Luke 9:62; 17:32. Perhaps there really was a salt-pillar that resembled a human. In the book the Wisdom of Solomon 10:7, which was included in the Septuagint, it says, “A pillar of salt stands as a memorial to an unbelieving soul,” and Josephus claimed to have seen it in his day (Ant. 1.203).
  '27':
  - type: text
    content: 'That morning, '
  - type: note
    content: Or “The next morning.” It is unclear whether Abraham saw the moment of the destruction of the cities or if he viewed the smoke rising the next day.
  - type: text
    content: 'Abraham hurried back to the place where he had stood before '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: note
    content: See Gen. 18:22. The implication from Gen. 18:16 and 18:33 is that this high point may have been some distance from Abraham’s camp.
  '28':
  - type: text
    content: 'Looking down toward all the land of the plain, he saw columns of smoke billowing up from Sodom and Gomorrah '
  - type: note
    content: Gomorrah means “a ruined heap” or “to chastise.”
  - type: text
    content: —like the smoke of a furnace!
  '29':
  - type: text
    content: 'So before God destroyed the cities of the plain where Lot had settled, he remembered '
  - type: text
    content: his affection for
  - type: text
    content: ' Abraham '
  - type: note
    content: That is, he honored Abraham’s request. God had not forgotten Abraham and then suddenly remembered him, but rather showed his affection for Abraham by fulfilling his request to spare the righteous.
  - type: text
    content: and spared Lot from all the destruction.
  - type: heading
    content: Lot and His Daughters
  '3':
  - type: text
    content: 'But Lot was so insistent they finally agreed to go to his house. Lot had unleavened bread baked for them and prepared a feast, and they ate. '
  '30':
  - type: text
    content: 'Afraid to remain in Zoar, Lot left there and settled in the hill country and lived in a cave with his two daughters. '
  '31':
  - type: text
    content: One day
  - type: text
    content: ', his firstborn suggested to the younger, “Our father is getting old, and there isn’t a man anywhere who could impregnate us in the normal way. '
  '32':
  - type: text
    content: 'Come, let’s get our father drunk with wine and have sex with him. That way we can '
  - type: text
    content: at least
  - type: text
    content: ' have children through our father.”'
  '33':
  - type: text
    content: 'That night, they got their father drunk with wine, and the firstborn went in and slept with him. Lot '
  - type: text
    content: was so drunk
  - type: text
    content: ' he didn’t have a clue about what had happened. '
  - type: note
    content: Or “he did not know when she lay down and when she arose.” See v. 35. This chapter opens with Lot sitting at the gate of Sodom, the seat of authority, and ends with him drunk in a cave—from councilman to caveman! Lot could have returned to his uncle, Abraham, but instead he fled to a cave.
  '34':
  - type: text
    content: The next day, the firstborn said to the younger, “I slept with my father last night. Tonight, it’s your turn. We’ll get him drunk with wine, and you can sleep with him and we can preserve our family line through our father.”
  '35':
  - type: text
    content: 'So they got their father drunk the second time; and the younger went in and slept with him. He '
  - type: text
    content: was once again so drunk
  - type: text
    content: ' he had no clue what had happened. '
  '36':
  - type: text
    content: 'As a result, both Lot’s daughters became pregnant by their father. '
  '37':
  - type: text
    content: 'The older daughter had a son named Moab, '
  - type: note
    content: Or “from my father,” a wordplay which in Hebrew sounds like “[conceived] from my father.”
  - type: text
    content: 'who is the ancestor of the Moabites of today. '
  - type: note
    content: Jewish tradition views these two daughters as righteous women whose motives were noble. Perhaps they presumed the entire world had been destroyed and that Zoar was spared only while they were there, leaving no other living male except their father. Regardless, one day a descendant of Moab, Ruth, would be included in the roots of the Jewish monarchy as David’s great-grandmother (see Ruth 4:17–22) and listed in the genealogy of Jesus Christ (see Matt. 1:5). There is no sin or evil that can hinder God’s grace from shining through even the darkest cloud of human failure.
  '38':
  - type: text
    content: 'The younger also had a son named Ben-Ammi, '
  - type: note
    content: Or “son of my relative,” a wordplay which in Hebrew sounds like “son of my [paternal] relative.”
  - type: text
    content: the ancestor of the Ammonites of today.
  '4':
  - type: text
    content: 'But before they retired for the night, the men of the city, men young and old, from every part of the city of Sodom, to the last man, surrounded the house. '
  '5':
  - type: text
    content: They shouted out to Lot, “Where are the men who came to your house tonight? Bring them out to us so that we can have sex with them!”
  - type: note
    content: Or “that we may know [yada’] them.” This word is used frequently for sexual relations. They surrounded the house, not simply to introduce themselves to the men, but to sexually abuse them. See Gen. 13:13; Lev. 18:22; 20:13; Deut. 23:18; Judg. 19:22; Rom. 1:18–32; 1 Cor. 6:9–10.
  '6':
  - type: text
    content: 'Lot went outside, shutting the door behind him, '
  '7':
  - type: text
    content: 'and said to them, “No! My brothers, '
  - type: text
    content: I beg you
  - type: text
    content: ', don’t sink to such depravity! '
  '8':
  - type: text
    content: Look, I have two virgin daughters; I’ll bring them out to you, and you can do with them as you please. Only don’t do anything to these men, for they are guests in my house.”
  - type: note
    content: Or “they have come under the shadow of my roof.”
  '9':
  - type: text
    content: '“Get out of our way,” they replied. “This guy comes as a foreigner to live among us, and now he dares to judge us! We’ll inflict more harm on you than on them!” Just then they lunged at Lot and tried to break down the door, '
