      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', and he has sent us here to destroy it!”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Lot went out to find the two men who were pledged to marry his daughters and told them, “Hurry, leave the city, for '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
