          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “from my father,” a wordplay which in Hebrew sounds like “[conceived] from my father.”
      marker-yv: yv-n
    - type: text
      text: 'who is the ancestor of the Moabites of today. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jewish tradition views these two daughters as righteous women whose motives were noble. Perhaps they presumed the entire world had been destroyed and that Zoar was spared only while they were there, leaving no other living male except their father. Regardless, one day a descendant of Moab, Ruth, would be included in the roots of the Jewish monarchy as David’s great-grandmother (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ruth 4:17–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and listed in the genealogy of Jesus Christ (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 1:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). There is no sin or evil that can hinder God’s grace from shining through even the darkest cloud of human failure.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The younger also had a son named Ben-Ammi, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 19:38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
