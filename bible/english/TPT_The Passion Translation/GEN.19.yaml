    - type: usfm
      marker: it
      children:
      - type: text
        text: and paid him no attention
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At dawn, the angels urged Lot, saying, “Go! Take your wife and your two daughters and leave or you will be consumed in the judgment about to come to the city!” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Lot hesitated, so the angels grabbed his hands and the hands of his wife and daughters and brought them outside the city, because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' was merciful to them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Once they were safely outside the city, the angels said to them, “Run for your lives! Don’t stop anywhere in the plain until you’ve reached the mountains. And don’t even look back, or you’ll die!”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot replied, “Oh no, my lords. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You’ve been so gracious to your servant, and you’ve been so kind to save our lives, but I can’t make it to the mountains. It’s so far from here; disaster will overtake me, and I’ll die! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Please, my lords, come to your servant’s house to spend the night and wash your feet; then you can rise early and go on your way.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“No,” they answered. “We will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: be fine to
    - type: text
      text: ' spend the night in the town square.”'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Look, over there is a village close enough to run to, and it’s a small one. '
