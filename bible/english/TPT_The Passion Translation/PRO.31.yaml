document_id: PRO.31,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Inspired Word
  - type: text
    content: 'King Lemuel’s '
  - type: note
    content: Jewish legend is that King Lemuel was a pseudonym for Solomon, which would make his mother mentioned here to be Bathsheba. There is no other mention of Lemuel in the Scriptures. The Hebrew word translated “inspired words” is massa, which some have surmised was a place, meaning “Lemuel, King of Massa.”
  - type: text
    content: 'royal words of wisdom:'
  - type: text
    content: These are the inspired words my mother taught me.
  - type: note
    content: The Septuagint is “These are words spoken by God, and through a king came an answer divine.”
  '10':
  - type: text
    content: 'Who could ever find a wife like this one '
  - type: note
    content: Starting with verse 10 through the end of the book, we have a Hebrew acrostic poem. It is alphabetical in structure, with each of the twenty-two verses beginning with a consecutive letter of the Hebrew alphabet. The implication is that the perfections of this woman would exhaust the entire language. The subject is the perfect bride, the virtuous woman. This woman is both a picture of a virtuous wife and an incredible allegory of the end-time victorious bride of Jesus Christ, full of virtue and grace.
  - type: text
    content: —
  - type: text
    content: she is a woman of strength and mighty valor!
  - type: note
    content: The Hebrew word used to describe this virtuous wife is khayil. The meaning of this word cannot be contained by one English equivalent word. It is often used in connection with military prowess. This is a warring wife. Khayil can be translated “mighty;” “wealthy;” “excellent;” “morally righteous;” “full of substance, integrity, abilities, and strength;” “mighty like an army.” The wife is a metaphor for the last-days church, the virtuous, overcoming bride of Jesus Christ. The word khayil is most often used to describe valiant men. See Ex. 18:21, where it is used for the mighty ones Moses was to commission as elders and leaders among the people. Because many of the cultural terms and metaphors used in this passage are not understood or even used in today’s English-speaking world, this translation makes them explicit.
  - type: text
    content: She’s full of wealth and wisdom.
  - type: text
    content: 'The price paid for her was greater '
  - type: note
    content: Or “her worth.” The price paid for her was the sacred blood of the Lamb of God, her Bridegroom.
  - type: text
    content: than many jewels.
  '11':
  - type: text
    content: Her husband has entrusted his heart to her,
  - type: note
    content: Or “has great confidence in her.”
  - type: text
    content: for she brings him the rich spoils of victory.
  '12':
  - type: text
    content: All throughout her life she brings him what is good and not evil.
  - type: note
    content: The virtuous bride will not bring disgrace to his name. Jesus will not be ashamed to display her to the world.
  '13':
  - type: text
    content: She searches out continually to possess
  - type: text
    content: that which is pure and righteous.
  - type: note
    content: Or “wool and linen [flax].” Wool is a metaphor often used as a symbol of what is pure. See Isa. 1:18; Dan. 7:9; Rev. 1:14. Linen was made from flax and always speaks of righteousness. The priests of the Old Testament wore linen garments as they went before God’s presence to offer sacrifices. The curtains of the tabernacle were likewise made of linen, signifying God’s righteousness. See Ex. 28:39–43 and Rev. 19:8. The virtuous bride of Christ in the last days will be seeking for only what is pure and righteous in the eyes of her Bridegroom.
  - type: text
    content: She delights in the work of her hands.
  - type: note
    content: 'Or “eagerly works with her hands.” The hands, with their five fingers, speak of the five ministries of the present work of Christ on the earth: apostles, prophets, evangelists, pastors, and teachers. These are often referred to as the five-fold ministries. Her delight is to equip others and help those in need.'
  '14':
  - type: text
    content: 'She gives out revelation-truth '
  - type: note
    content: Or “bread.” This is a consistent emblem of spiritual food.
  - type: text
    content: to feed others.
  - type: text
    content: She is like a trading ship bringing divine supplies
  - type: note
    content: Or “supplies from far away.” The implication is that the supplies come from another realm. She is bringing heavenly manna for those she feeds.
  - type: text
    content: from the merchant.
  - type: note
    content: Or “like merchant ships bringing goods.” Like a ship loaded with cargo, the bride of Christ brings heavenly treasures to others. The use of the term merchant points to Jesus Christ. He is described as a merchant in Matt. 13:45 in the parable of the extraordinary pearl. The “pearl” is the church or the believer, which cost all that Jesus had (his blood) to purchase us.
  '15':
  - type: text
    content: 'Even in the night season '
  - type: note
    content: She is interceding in the night, laboring in a night season to help others.
  - type: text
    content: 'she arises '
  - type: note
    content: The Hebrew word translated “arise” can also mean “to rise up in power.” We are told to “rise up in splendor and be radiant, for your light has dawned” in Isa. 60:1, which uses the same Hebrew word for “arise.” The bride of Christ will arise with anointing to feed and bless the people of God.
  - type: text
    content: and sets food on the table
  - type: text
    content: for hungry ones in her house and for others.
  - type: note
    content: Or “female servants.” The servants are a metaphor for other churches and ministries.
  '16':
  - type: text
    content: 'She sets her heart upon a field '
  - type: note
    content: Or “a land” or “a country.”
  - type: text
    content: and takes it as her own.
  - type: text
    content: She labors there to plant the living vines.
  - type: note
    content: Or “By the fruit of her hands she plants a vineyard.” (The Septuagint is “possession.”) For “hands,” see the second footnote for v. 13. This vineyard becomes a metaphor for the local church. We are the branches of the Vine (Christ). See John 15:1–8. She is passionate about bringing forth fruit. She becomes a missionary to the nations, planting churches and bringing new life.
  '17':
  - type: text
    content: 'She wraps herself in strength, '
  - type: note
    content: Or “She girds her loins with strength and makes her shoulders strong.” This is a figure of speech for being anointed with power to do the works of Jesus. See John 14:12.
  - type: text
    content: might, and power in all her works.
  '18':
  - type: text
    content: She tastes and experiences a better substance,
  - type: note
    content: Or “good merchandise.”
  - type: text
    content: and her shining light will not be extinguished,
  - type: text
    content: no matter how dark the night.
  - type: note
    content: Her prayer life (“light”) overcomes her circumstances, even in a culture where darkness prevails.
  '19':
  - type: text
    content: She stretches out her hands to help the needy
  - type: note
    content: As translated from the Septuagint. The Hebrew uses a term for “distaff” (a weaver’s staff), which is taken from a root word for “prosperity.” The poetic nuance of this phrase is that she uses her prosperity to bless the needy.
  - type: text
    content: and she lays hold of the wheels of government.
  - type: note
    content: Or “Her hands grasp the spindle.” The word translated as “spindle” can also mean “governmental circuits” or “wheels.” There is a hint here of the wheels mentioned in Ezek. 1. The throne of God’s government sits on flaming wheels. See Dan. 7:9.
  '2':
  - type: text
    content: Listen, my dear son, son of my womb.
  - type: text
    content: You are the answer to my prayers, my son.
  '20':
  - type: text
    content: She is known by her extravagant generosity to the poor,
  - type: text
    content: 'for she always reaches out her hands '
  - type: note
    content: Notice the mention of her hands. See the second footnote for v. 13.
  - type: text
    content: to those in need.
  '21':
  - type: text
    content: She is not afraid of tribulation,
  - type: note
    content: Or “snow.” This is a figure of speech for the fear of a cold winter season.
  - type: text
    content: for all her household is covered in the dual garments
  - type: note
    content: As translated from the Septuagint. The Hebrew is “everyone is covered in scarlet [blood].” Grace has brought righteousness to those in her house (under her ministry).
  - type: text
    content: of righteousness and grace.
  '22':
  - type: text
    content: 'Her clothing is beautifully knit together '
  - type: note
    content: This clothing speaks of the ministries of the body of Christ, woven and knit together by the Holy Spirit. See Eph. 4:15–16 and Col. 2:2.
  - type: text
    content: —
  - type: text
    content: a purple gown of exquisite linen.
  '23':
  - type: text
    content: Her husband is famous and admired by all,
  - type: text
    content: sitting as the venerable judge of his people.
  - type: note
    content: Or “sitting at the city gates among the elders of the land.” Judgment was rendered at the gates of a city in that day. It was their courtroom. Our heavenly King is also the Judge. So famous, so glorious, yet he is our Bridegroom.
  '24':
  - type: text
    content: Even her works of righteousness
  - type: note
    content: Or “linen.” See the second footnote for v. 13 regarding linen as a symbol for righteousness.
  - type: text
    content: 'she does '
  - type: note
    content: Or “sells them.” The root word for “sell” can also mean “surrender.”
  - type: text
    content: for the benefit of her enemies.
  - type: note
    content: Or “aprons or belts for the Canaanites.” The Canaanites were the traditional enemies of the Hebrews.
  '25':
  - type: text
    content: 'Bold power and glorious majesty '
  - type: note
    content: Or “Beauty, honor, and excellence.”
  - type: text
    content: are wrapped around her
  - type: text
    content: as she laughs with joy over the latter days.
  - type: note
    content: The virtuous and victorious bride has no fear for the days to come. She contemplates eternity and her forever union with the Bridegroom.
  '26':
  - type: text
    content: Her teachings are filled with wisdom and kindness
  - type: text
    content: as loving instruction pours from her lips.
  - type: note
    content: The Septuagint is “she opens her mouth carefully and lawfully.”
  '27':
  - type: text
    content: She watches over the ways of her household
  - type: note
    content: Or “She is a watchman over her house [family].”
  - type: text
    content: and meets every need they have.
  '28':
  - type: text
    content: 'Her sons and daughters arise '
  - type: note
    content: The Hebrew word translated “arise” can also mean “to rise up with power.” The Septuagint is “She raises her children so they will grow rich.”
  - type: text
    content: in one accord to extol her virtues,
  - type: note
    content: Or “Hooray, hooray for our mother!”
  - type: text
    content: and her husband arises to speak of her in glowing terms.
  - type: note
    content: For more of how the heavenly Bridegroom loves his bride, read the Song of Songs.
  '29':
  - type: text
    content: “There are many valiant and noble ones,
  - type: note
    content: Or “Many daughters have obtained wealth because of her.” These valiant and noble ones (daughters) represent the church of previous generations who remained faithful in their pursuit of Jesus. But this final generation will be the bridal company of the lovers of God who do mighty exploits and miracles on the earth.
  - type: text
    content: but you have ascended above them all!”
  - type: note
    content: Or “you are first in his eyes.” See Song. 6:8–9.
  '3':
  - type: text
    content: So keep yourself sexually pure
  - type: text
    content: from the promiscuous, wayward woman.
  - type: text
    content: Don’t waste the strength of your anointing
  - type: text
    content: on those who ruin kings—
  - type: text
    content: you’ll live to regret it!
  - type: note
    content: As translated from the Septuagint.
  '30':
  - type: text
    content: Charm can be misleading,
  - type: text
    content: and beauty is vain and so quickly fades,
  - type: text
    content: but this virtuous woman lives in the wonder, awe,
  - type: text
    content: and fear of the Lord.
  - type: text
    content: 'She will be praised '
  - type: text
    content: throughout eternity
  - type: text
    content: .
  '31':
  - type: text
    content: So go ahead and give her the credit that is due,
  - type: text
    content: for she has become a radiant woman,
  - type: text
    content: and all her loving works of righteousness deserve to be admired
  - type: text
    content: at the gateways of every city!
  - type: note
    content: The Septuagint could be translated “her husband is praised at the city gates.”
  '4':
  - type: text
    content: For you are a king, Lemuel,
  - type: text
    content: and it’s never fitting for a king to be drunk on wine
  - type: text
    content: or for rulers to crave alcohol.
  '5':
  - type: text
    content: For when they drink they forget justice
  - type: text
    content: and ignore the rights of those in need,
  - type: text
    content: those who depend on them for leadership
  - type: text
    content: .
  '6':
  - type: text
    content: Strong drink is given to the terminally ill,
  - type: text
    content: who are suffering at the brink of death.
  - type: text
    content: Wine is for those in depression
  - type: text
    content: in order to drown their sorrows.
  - type: text
    content: Let them drink and forget their poverty and misery.
  '8':
  - type: text
    content: But you are to be a king who speaks up on behalf
  - type: text
    content: of the disenfranchised
  - type: text
    content: and pleads for the legal rights of the defenseless
  - type: text
    content: and those who are dying.
  '9':
  - type: text
    content: Be a righteous king, judging on behalf of the poor
  - type: text
    content: and interceding for those most in need.
  - type: note
    content: See James 1:27.
  - type: heading
    content: The Radiant Bride
