  - type: usfm
    marker: q1
    children:
    - type: text
      text: in order to drown their sorrows.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them drink and forget their poverty and misery.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you are to be a king who speaks up on behalf
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of the disenfranchised
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and pleads for the legal rights of the defenseless
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and those who are dying.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be a righteous king, judging on behalf of the poor
  - type: usfm
    marker: q1
