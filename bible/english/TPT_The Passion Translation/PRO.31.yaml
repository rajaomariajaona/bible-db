document_id: PRO.31,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inspired Word
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'King Lemuel’s '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jewish legend is that King Lemuel was a pseudonym for Solomon, which would make his mother mentioned here to be Bathsheba. There is no other mention of Lemuel in the Scriptures. The Hebrew word translated “inspired words” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: massa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which some have surmised was a place, meaning “Lemuel, King of Massa.”'
      marker-yv: yv-n
    - type: text
      text: 'royal words of wisdom:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These are the inspired words my mother taught me.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “These are words spoken by God, and through a king came an answer divine.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who could ever find a wife like this one '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Starting with verse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: through the end of the book, we have a Hebrew acrostic poem. It is alphabetical in structure, with each of the twenty-two verses beginning with a consecutive letter of the Hebrew alphabet. The implication is that the perfections of this woman would exhaust the entire language. The subject is the perfect bride, the virtuous woman. This woman is both a picture of a virtuous wife and an incredible allegory of the end-time victorious bride of Jesus Christ, full of virtue and grace.
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she is a woman of strength and mighty valor!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word used to describe this virtuous wife is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: khayil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The meaning of this word cannot be contained by one English equivalent word. It is often used in connection with military prowess. This is a warring wife.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Khayil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can be translated “mighty;” “wealthy;” “excellent;” “morally righteous;” “full of substance, integrity, abilities, and strength;” “mighty like an army.” The wife is a metaphor for the last-days church, the virtuous, overcoming bride of Jesus Christ. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: khayil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is most often used to describe valiant men. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 18:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', where it is used for the mighty ones Moses was to commission as elders and leaders among the people. Because many of the cultural terms and metaphors used in this passage are not understood or even used in today’s English-speaking world, this translation makes them explicit.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She’s full of wealth and wisdom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The price paid for her was greater '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “her worth.” The price paid for her was the sacred blood of the Lamb of God, her Bridegroom.
      marker-yv: yv-n
    - type: text
      text: than many jewels.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her husband has entrusted his heart to her,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “has great confidence in her.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for she brings him the rich spoils of victory.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All throughout her life she brings him what is good and not evil.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The virtuous bride will not bring disgrace to his name. Jesus will not be ashamed to display her to the world.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She searches out continually to possess
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that which is pure and righteous.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “wool and linen [flax].” Wool is a metaphor often used as a symbol of what is pure. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 1:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Linen was made from flax and always speaks of righteousness. The priests of the Old Testament wore linen garments as they went before God’s presence to offer sacrifices. The curtains of the tabernacle were likewise made of linen, signifying God’s righteousness. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 28:39–43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 19:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The virtuous bride of Christ in the last days will be seeking for only what is pure and righteous in the eyes of her Bridegroom.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She delights in the work of her hands.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “eagerly works with her hands.” The hands, with their five fingers, speak of the five ministries of the present work of Christ on the earth: apostles, prophets, evangelists, pastors, and teachers. These are often referred to as the five-fold ministries. Her delight is to equip others and help those in need.'
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She gives out revelation-truth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “bread.” This is a consistent emblem of spiritual food.
      marker-yv: yv-n
    - type: text
      text: to feed others.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is like a trading ship bringing divine supplies
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “supplies from far away.” The implication is that the supplies come from another realm. She is bringing heavenly manna for those she feeds.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the merchant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “like merchant ships bringing goods.” Like a ship loaded with cargo, the bride of Christ brings heavenly treasures to others. The use of the term
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: merchant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: points to Jesus Christ. He is described as a merchant in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 13:45
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in the parable of the extraordinary pearl. The “pearl” is the church or the believer, which cost all that Jesus had (his blood) to purchase us.
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Even in the night season '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: She is interceding in the night, laboring in a night season to help others.
      marker-yv: yv-n
    - type: text
      text: 'she arises '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “arise” can also mean “to rise up in power.” We are told to “rise up in splendor and be radiant, for your light has dawned” in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 60:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which uses the same Hebrew word for “arise.” The bride of Christ will arise with anointing to feed and bless the people of God.'
      marker-yv: yv-n
    - type: text
      text: and sets food on the table
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for hungry ones in her house and for others.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “female servants.” The servants are a metaphor for other churches and ministries.
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She sets her heart upon a field '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “a land” or “a country.”
      marker-yv: yv-n
    - type: text
      text: and takes it as her own.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She labors there to plant the living vines.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “By the fruit of her hands she plants a vineyard.” (The Septuagint is “possession.”) For “hands,” see the second footnote for v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . This vineyard becomes a metaphor for the local church. We are the branches of the Vine (Christ). See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 15:1–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . She is passionate about bringing forth fruit. She becomes a missionary to the nations, planting churches and bringing new life.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'She wraps herself in strength, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “She girds her loins with strength and makes her shoulders strong.” This is a figure of speech for being anointed with power to do the works of Jesus. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 14:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: might, and power in all her works.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She tastes and experiences a better substance,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “good merchandise.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her shining light will not be extinguished,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no matter how dark the night.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Her prayer life (“light”) overcomes her circumstances, even in a culture where darkness prevails.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She stretches out her hands to help the needy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew uses a term for “distaff” (a weaver’s staff), which is taken from a root word for “prosperity.” The poetic nuance of this phrase is that she uses her prosperity to bless the needy.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and she lays hold of the wheels of government.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Her hands grasp the spindle.” The word translated as “spindle” can also mean “governmental circuits” or “wheels.” There is a hint here of the wheels mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The throne of God’s government sits on flaming wheels. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, my dear son, son of my womb.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the answer to my prayers, my son.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is known by her extravagant generosity to the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for she always reaches out her hands '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Notice the mention of her hands. See the second footnote for v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: to those in need.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She is not afraid of tribulation,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “snow.” This is a figure of speech for the fear of a cold winter season.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for all her household is covered in the dual garments
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “everyone is covered in scarlet [blood].” Grace has brought righteousness to those in her house (under her ministry).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of righteousness and grace.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her clothing is beautifully knit together '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This clothing speaks of the ministries of the body of Christ, woven and knit together by the Holy Spirit. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Eph. 4:15–16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a purple gown of exquisite linen.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her husband is famous and admired by all,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sitting as the venerable judge of his people.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sitting at the city gates among the elders of the land.” Judgment was rendered at the gates of a city in that day. It was their courtroom. Our heavenly King is also the Judge. So famous, so glorious, yet he is our Bridegroom.
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even her works of righteousness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “linen.” See the second footnote for v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: regarding linen as a symbol for righteousness.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'she does '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “sells them.” The root word for “sell” can also mean “surrender.”
      marker-yv: yv-n
    - type: text
      text: for the benefit of her enemies.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “aprons or belts for the Canaanites.” The Canaanites were the traditional enemies of the Hebrews.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Bold power and glorious majesty '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Beauty, honor, and excellence.”
      marker-yv: yv-n
    - type: text
      text: are wrapped around her
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as she laughs with joy over the latter days.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The virtuous and victorious bride has no fear for the days to come. She contemplates eternity and her forever union with the Bridegroom.
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her teachings are filled with wisdom and kindness
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as loving instruction pours from her lips.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “she opens her mouth carefully and lawfully.”
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She watches over the ways of her household
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “She is a watchman over her house [family].”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and meets every need they have.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Her sons and daughters arise '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word translated “arise” can also mean “to rise up with power.” The Septuagint is “She raises her children so they will grow rich.”
      marker-yv: yv-n
    - type: text
      text: in one accord to extol her virtues,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Hooray, hooray for our mother!”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her husband arises to speak of her in glowing terms.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For more of how the heavenly Bridegroom loves his bride, read the Song of Songs.
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There are many valiant and noble ones,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Many daughters have obtained wealth because of her.” These valiant and noble ones (daughters) represent the church of previous generations who remained faithful in their pursuit of Jesus. But this final generation will be the bridal company of the lovers of God who do mighty exploits and miracles on the earth.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you have ascended above them all!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “you are first in his eyes.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Song. 6:8–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So keep yourself sexually pure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the promiscuous, wayward woman.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t waste the strength of your anointing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on those who ruin kings—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll live to regret it!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
