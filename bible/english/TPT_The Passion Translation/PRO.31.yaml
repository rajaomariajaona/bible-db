      children:
      - type: text
        text: throughout eternity
    - type: text
      text: .
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So go ahead and give her the credit that is due,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for she has become a radiant woman,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all her loving works of righteousness deserve to be admired
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the gateways of every city!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 31:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
