      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are a king, Lemuel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and it’s never fitting for a king to be drunk on wine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or for rulers to crave alcohol.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when they drink they forget justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and ignore the rights of those in need,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: those who depend on them for leadership
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strong drink is given to the terminally ill,
  - type: usfm
    marker: q1
    children:
