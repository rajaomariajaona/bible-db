document_id: ISA.29,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Siege of David’s City
  - type: text
    content: '“Woe to Ariel '
  - type: note
    content: Ariel is a name for the altar in the temple (see Ezek. 43:13–27, including footnote on 43:18). It is used as a metonymy for the entire city of Jerusalem. The meaning of Ariel is “lion of God” or “altar hearth.”
  - type: text
    content: —Ariel, the town where David encamped!
  - type: note
    content: Or “the town David besieged.”
  - type: text
    content: Go ahead—keep your annual feasts,
  - type: text
    content: and year after year celebrate your annual festivals.
  '10':
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' has poured out over you'
  - type: text
    content: 'the spirit of a deep, deep sleep '
  - type: note
    content: See Rom. 11:8.
  - type: text
    content: —
  - type: text
    content: putting the covers over your slumbering seers
  - type: note
    content: Or “He has covered the heads of the seers.”
  - type: text
    content: 'and '
  - type: text
    content: rocking
  - type: text
    content: ' all your prophets to sleep.”'
  '11':
  - type: text
    content: 'This entire prophetic revelation will become to you like the words of a sealed book. If it’s given to one who can read it with the command “Read this,” he responds, “I can’t because it is sealed.” '
  '12':
  - type: text
    content: Or if it’s given to one who is illiterate with the command “Read this,” he responds, “I can’t because I cannot read.”
  '13':
  - type: text
    content: 'This is what the Lord says about these people:'
  - type: text
    content: “They come near to me with hollow words
  - type: text
    content: and honor me superficially with their lips;
  - type: text
    content: all the while their hearts run far away from me!
  - type: text
    content: Their worship is nothing more than man-made rules.
  - type: note
    content: Or “Their fear of me is motivated by man’s teaching [of a fear of punishment].” The Hebrew word for “teaching” is lamed, which traced back to its Semitic roots means “an oxgoad,” something used to punish or prod. It is teaching motivated by the fear of punishment.
  '14':
  - type: text
    content: So therefore, I will again jolt this people awake
  - type: text
    content: with astonishing wonders upon wonders!
  - type: text
    content: And the wisdom of their wise ones will fail,
  - type: text
    content: and the intelligent know-it-alls will have no explanations.
  - type: note
    content: Or “the discernment of the discerning ones will be kept hidden.” See 1 Cor. 1:18–31.
  '15':
  - type: text
    content: Woe to you who think you can hide
  - type: text
    content: 'your plan from the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: Ha! Do you actually think your secret schemes are so hidden
  - type: text
    content: that you say, ‘Who sees us doing this?
  - type: text
    content: No one knows what we’re doing!’
  '16':
  - type: text
    content: Oh, how great is your perversion!
  - type: text
    content: Who is more intelligent—the potter or the clay?
  - type: text
    content: Should a created thing say to its creator,
  - type: text
    content: '‘You didn’t make '
  - type: note
    content: Or “imagine” (Hb. yêtser). The root word of yêtser is yâtsar and has the primary meaning of “to form, fashion, frame, or make, especially as a potter.” Before you can form or frame something, it has to be imagined. The first use of yâtsar in the Bible is Yahweh forming man from the dust of the ground (see Gen. 2:7).
  - type: text
    content: me’?
  - type: text
    content: Should a clay pot say to the potter, ‘You don’t understand’?”
  - type: heading
    content: Our Future Hope
  '17':
  - type: text
    content: Before you know it, Lebanon will be transformed
  - type: text
    content: into a fruitful field, and the fruitful field will seem like a forest.
  - type: note
    content: Isaiah frequently used Lebanon as a metaphor for mighty ones and those with great influence (see Isa. 2:13; 10:34; 35:2). This phrase refers to a restoration of God’s people who have experienced humiliation.
  '18':
  - type: text
    content: In that day the deaf will begin to hear
  - type: text
    content: the words that have been written,
  - type: note
    content: That is, their hearts are now open and tender toward God.
  - type: text
    content: and out of the darkness and gloom,
  - type: text
    content: the eyes of the blind will be opened to see.
  '19':
  - type: text
    content: 'The meek will overflow with fresh joy in the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: and the poor will shout their praises
  - type: text
    content: to the Holy One of Israel!
  '2':
  - type: text
    content: I will bring distress to Ariel and there will be great mourning.
  - type: text
    content: 'Jerusalem will be to me as '
  - type: text
    content: the meaning of the name Ariel
  - type: text
    content: '—a '
  - type: text
    content: burning
  - type: text
    content: ' altar hearth.'
  '20':
  - type: text
    content: 'For the terrible one '
  - type: note
    content: See 2 Thess. 2:3–8.
  - type: text
    content: will be no more,
  - type: text
    content: the scornful jester will not be found,
  - type: text
    content: 'and all the lovers of evil '
  - type: note
    content: Or “all the watchers of wrong [those diligent to do evil].” This would include those who use their political power or influence to harm others.
  - type: text
    content: will be cut off.
  '21':
  - type: text
    content: Those who make the innocent appear guilty,
  - type: text
    content: those who ensnare others with deceitful tactics,
  - type: text
    content: and those who lie to keep the innocent from getting justice
  - type: text
    content: will likewise be destroyed.
  '22':
  - type: text
    content: 'So now, listen to what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, who redeemed Abraham, has to say to Jacob’s tribes:'
  - type: text
    content: '“My people '
  - type: note
    content: Or “Jacob,” a metonymy for God’s people, Israel.
  - type: text
    content: will no longer be disgraced,
  - type: text
    content: and their shame-faces will disappear.
  '23':
  - type: text
    content: 'For when they see '
  - type: text
    content: the miracle of
  - type: text
    content: ' the many children'
  - type: text
    content: that I give them, they will see me as holy and honor me.
  - type: note
    content: Or “they will sanctify my name.”
  - type: text
    content: Yes, they will honor the Holy One of Jacob
  - type: text
    content: and stand in awe of the God of Israel.
  '24':
  - type: text
    content: Those who are in spiritual error
  - type: text
    content: will come to understanding,
  - type: text
    content: and those who are always complaining
  - type: text
    content: will be glad to accept instruction.”
  '3':
  - type: text
    content: 'I will lay siege to you on all sides, '
  - type: note
    content: Or “Like David I will encamp against you” (LXX).
  - type: text
    content: encircling you with towers
  - type: text
    content: and raising up my siege works against you.
  '4':
  - type: text
    content: Brought low, you will speak from the dust of the earth.
  - type: text
    content: Your voice will be heard speaking from the ground,
  - type: text
    content: and like the voice of a ghost, you will whisper out of the dust.
  - type: note
    content: Isaiah is using a series of metaphors to describe Israel’s defeated condition, as though Israel is speaking out of the dust of defeat.
  '5':
  - type: text
    content: Then suddenly, in an instant, your ruthless enemies
  - type: text
    content: will become nothing more than dust in the wind
  - type: text
    content: and your vile tyrants like wind-driven chaff!
  '6':
  - type: text
    content: 'She will be visited by the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: Commander of Angel Armies,
  - type: text
    content: with thunder, earthquake, and deafening noise,
  - type: text
    content: with whirlwind, tempest, and the blaze of a consuming fire!
  '7':
  - type: text
    content: As quickly as a fading dream or as fleeting as a vision of the night,
  - type: text
    content: so will all the vast hordes of all the nations fade away
  - type: text
    content: 'and all who war against Ariel '
  - type: note
    content: Or “attack her and besiege her.”
  - type: text
    content: and her fortress disappear.
  '8':
  - type: text
    content: Just as a hungry man dreams that he is eating
  - type: text
    content: but wakes up still hungry,
  - type: note
    content: Or “Empty is his soul.”
  - type: text
    content: or as a thirsty man dreams that he is drinking
  - type: text
    content: but wakes up weak and still longing for water,
  - type: note
    content: Or “His soul is craving.”
  - type: text
    content: so it will be for the vast hordes of all the nations
  - type: text
    content: that fight against Mount Zion.”
  - type: heading
    content: Insensitive to God
  '9':
  - type: text
    content: 'Be totally shocked and amazed by what I am about to say to you:'
  - type: text
    content: “Blind yourselves—and be totally blind!
  - type: text
    content: (They are drunk but not from wine.
  - type: text
    content: They stagger but not from hard liquor.)
