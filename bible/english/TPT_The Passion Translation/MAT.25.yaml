        text: 25:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew and a few Greek manuscripts. Most Greek manuscripts have only “bridegroom.” This would mean the ten virgins were going to marry one man, a doubtful teaching from Jesus. The ten virgins were bridesmaids, ladies-in-waiting. This was not Jesus condoning polygamy. It is possible that the parable hints of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 8:23
      metadata:
        usfm: ZEC.8.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jesus will be seen as the Bridegroom in the last days. Not only our King and our Lord but also our Bridegroom. When Jesus was asked what the sign of his coming would be (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:3
      metadata:
        usfm: MAT.24.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), he gives his disciples two parables to describe the two types of believers in the last days. One would relate to Jesus as servants to a Master (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 24:45–51
      metadata:
        usfm: MAT.24.45+MAT.24.46+MAT.24.47+MAT.24.48+MAT.24.49+MAT.24.50+MAT.24.51
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), and the other would relate to him as a bride to a Bridegroom (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 25:1–13
      metadata:
        usfm: MAT.25.1+MAT.25.2+MAT.25.3+MAT.25.4+MAT.25.5+MAT.25.6+MAT.25.7+MAT.25.8+MAT.25.9+MAT.25.10+MAT.25.11+MAT.25.12+MAT.25.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 2-4
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Five of them were foolish and ill-prepared, for they took no
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: extra
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: oil
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:2–4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See v.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8'
      metadata:
        usfm: MAT.25.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Oil in the Scriptures is a metaphor of the Holy Spirit, who brings us revelation of the Word of God and power for ministry.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for their lamps. Five of them were wise, for they took flasks of olive oil with their lamps.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When the bridegroom didn’t come when they expected, they all grew drowsy and fell asleep.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then suddenly, in the middle of the night, they were awakened by the shout ‘Get up! The bridegroom is here! Come out and have an encounter with him!’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is not simply “meet him,” for it is a rare Greek noun that means to “have a meeting” or “an encounter.” See also
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Thess. 4:17
      metadata:
        usfm: 1TH.4.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So all the girls got up and trimmed their lamps.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the foolish ones were running out of oil, so they said to the five wise ones, ‘Share your oil with us, because our lamps are going out!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘We can’t,’ they replied. ‘We don’t have enough for all of us. You’ll have to go and buy some for yourselves!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “While the five girls were out buying oil, the bridegroom appeared. Those who were ready and waiting were escorted inside with him and the wedding party to enjoy the feast. And then the door was locked.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Later, the five foolish girls came running up to the door and pleaded, ‘Lord, Lord, let us come in!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But he called back, ‘Go away! Do I know you? I can assure you, I don’t even know you!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “That is the reason you should always stay awake and be alert, because you don’t know the day or the hour when the Bridegroom will appear.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Parable about Financial Stewardship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Again, heaven’s kingdom is like a wealthy man who went on a long journey and summoned all his trusted servants and assigned his financial management over to them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Before he left on his journey, he entrusted a bag of five thousand gold coins to one of his servants, to another a bag of two thousand gold coins, and to the third a bag of one thousand gold coins, each according to his ability to manage.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “five talents . . . two talents . . . one talent.” A talent, although hard to determine exactly how much it represents, is a measure of weight. King Solomon received 666 talents of gold as his yearly tribute. A talent is clearly a large sum of money. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Chron. 9:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 10:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The one entrusted with five thousand gold coins immediately went out and traded with the money, and he doubled his investment.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In the same way, the one who was entrusted with two thousand gold coins traded with the sum and likewise doubled his investment.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the one who had been entrusted with one thousand gold coins dug a hole in the ground and buried his master’s money.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “After much time had passed, the master returned to settle accounts with his servants.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one who was entrusted with five thousand gold coins came and brought ten thousand, saying, ‘See, I have doubled your money.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Commending his servant, the master replied, ‘You have done well, and proven yourself to be my loyal and trustworthy servant. Because you have been a faithful steward to manage a small sum, now I will put you in charge of much, much more. You will experience the delight of your master, who will say to you, “Enter into the joy of your Lord!” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the one who had been entrusted with two thousand gold coins came in and said, ‘See, my master, I have doubled what you have entrusted to me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Commending his servant, the master replied, ‘You have done well, and proven yourself to be my loyal and trustworthy servant. Because you were faithful to manage a small sum, now I will put you in charge of much, much more. You will experience the delight of your master, who will say to you, “Enter into the joy of your Lord!” ’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the one who had been entrusted with one thousand gold coins came to his master and said, ‘Look, sir. I know that you are a hard man to please and you’re a shrewd and ruthless businessman who grows rich on the backs of others.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that you harvest where you didn’t sow and gather where you didn’t plant.” This is most likely a proverb, a figure of speech that reinforces the thought of the servant that his master was strict, harsh, and ruthless. The attitude of the servant was “You are so ruthless; you’re like a man who expects a harvest from a field he didn’t plant!”
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I was afraid of you, so I went and hid your money and buried it in the ground. But here it is—take it, it’s yours.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But his master said to him, ‘You’re an untrustworthy
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “evil.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and lazy servant! If you knew I was a shrewd and ruthless business man who always makes a profit, why didn’t you deposit my money in the bank?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then I would have received it all back with interest when I returned.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic can be translated “Why didn’t you throw my money into the offering? Then I would have returned to ask for what was mine together with its bounty.” The implication is that money given in sacred offering to God will be returned with even more, by God’s generosity. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luke 6:38
      metadata:
        usfm: LUK.6.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But because you were unfaithful, I will take the one thousand gold coins and give them to the one who has ten thousand.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the one who has will be given more, until he overflows with abundance. And the one with hardly anything, even what little he has will be taken from him.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: By implication the parable is stating, “The one who has [a heart of faithful stewardship] will be given more [to manage]. And the one who has very little [faithfulness, wisdom, integrity] will lose the little he has [failed to manage well].”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the master said to his other servants, ‘Now, throw that good-for-nothing servant far away from me into the outer darkness, where there will be great misery and anguish!’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Judgment of the Multitudes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When the Son of Man appears in his majestic glory, with all his angels by his side, he will take his seat on his throne of splendor,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and all the nations will be gathered together before him.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 7:13–14
      metadata:
        usfm: DAN.7.13+DAN.7.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And like a shepherd who separates the sheep from the goats, he will separate all the people.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The ‘sheep’ he will put on his right side and the ‘goats’ on his left.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then the King will turn to those on his right and say, ‘You have a special place in my Father’s heart. Come and experience the full inheritance of the kingdom realm that has been destined for you from before the foundation
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from before the fall” of the world.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: of the world!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For when you saw me hungry, you fed me. When you found me thirsty, you gave me drink. When I had no place to stay, you invited me in,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and when I was poorly clothed, you covered me. When I was sick, you tenderly cared for me, and when I was in prison you visited me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the godly will answer him, ‘Lord, when did we see you hungry or thirsty and give you food and something to drink?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When did we see you with no place to stay and invite you in? When did we see you poorly clothed and cover you?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When did we see you sick and tenderly care for you, or in prison and visit you?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And the King will answer them, ‘Don’t you know? When you cared for one of the least of these, my little ones, my true brothers and sisters, you demonstrated love for me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then to those on his left the King will say, ‘Leave me! For you are under the curse of eternal fire that has been destined for the devil and all his demons.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For when you saw me hungry, you gave me no food, and when you saw me thirsty, you gave me no drink.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I had no place to stay, and you refused to take me in as your guest. When you saw me poorly clothed, you closed your hearts and did not clothe me. When you saw that I was sick, you didn’t lift a finger to help me, and when I was imprisoned, you never came to visit me.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And then those on his left will say, ‘Lord, when did we see you hungry or thirsty and not give you food and something to drink? When did we see you homeless, or poorly clothed? When did we see you sick and not help you, or in prison and not visit you?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then he will answer them, ‘Don’t you know? When you refused to help one of the least important among these my little ones, my true brothers and sisters, you refused to help and honor me.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And they will depart from his presence into eternal punishment. But the godly and beloved ‘sheep’ will enter into eternal bliss.”
