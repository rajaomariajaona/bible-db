document_id: PSA.71
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Psalm of Old Age
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lord, you are my secure shelter. Don’t ever let me down!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let your justice be my breakthrough.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bend low to my whispered cry
- type: usfm
  marker: q1
  children:
  - type: text
    text: and save me from all my enemies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You’re the only place of protection for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I keep coming back to hide myself in you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are like a mountain-cliff fortress where I’m kept safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let me escape from these cruel and wicked men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and save me from the hands of the evil one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For you are my only hope, Lord!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ve hung on to you, trusting in you all my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: It was you who supported me from the day I was born,
- type: usfm
  marker: q1
  children:
  - type: text
    text: loving me, helping me through my life’s journey.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve made me into a miracle;
- type: usfm
  marker: q1
  children:
  - type: text
    text: no wonder I trust you and praise you forever!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many marvel at my success,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but I know it is all because of you, my mighty protector!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I’m overflowing with your praise for all you’ve done,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and your splendor thrills me all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Now that I’m old, don’t set me aside.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t let go of me when my strength is spent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: For all my enemies whisper behind my back.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re waiting for me to fall so they can finish me off.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re convinced you’ve left me
- type: usfm
  marker: q1
  children:
  - type: text
    text: and that you’ll never come to my rescue.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They’re saying, “Let’s get him now! He has no savior!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: O God, stay close to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t just watch from a distance! Hurry to help me, my God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cover these accusers of mine with shame and failure!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destroy them all, for they only want to kill me!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: No matter what, I’ll trust in you to help me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nothing will stop me from praising you to magnify your glory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I couldn’t begin to count the times you’ve been there for me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the skill of a poet I’ll never run out of things to say
- type: usfm
  marker: q1
  children:
  - type: text
    text: about how you faithfully kept me from danger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will come forth in your mighty strength, O my Lord God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 71:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I will enter into the manliness of Lord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll tell everyone that you alone are the perfect one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: From my childhood you’ve been my teacher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and I’m still telling everyone of your miracle-wonders!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: God, now that I’m old and gray, don’t walk away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Give me grace to demonstrate to the next generation
- type: usfm
  marker: q1
  children:
  - type: text
    text: all your mighty miracles and your excitement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to show them your magnificent power!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For your glorious righteousness reaches up to the high heavens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one could ever be compared to you!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is your equal, O God of marvels and wonders?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Even though you’ve let us sink down with trials and troubles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I know you will revive us again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lifting us up from the dust of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Give us even more greatness than before.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Turn and comfort us once again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: My loving God, the harp in my heart will praise you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your faithful heart toward us will be the theme of my song.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Melodies and music will rise to you, the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I will shout and sing your praises for all you are to me—
- type: usfm
  marker: q1
  children:
  - type: text
    text: Savior, lover of my soul!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I’ll never stop telling others how perfect you are,
- type: usfm
  marker: q1
  children:
  - type: text
    text: while all those who seek my harm slink away ashamed and defeated!
