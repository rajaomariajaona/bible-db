document_id: PSA.71,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Psalm of Old Age
  - type: text
    content: Lord, you are my secure shelter. Don’t ever let me down!
  '10':
  - type: text
    content: For all my enemies whisper behind my back.
  - type: text
    content: They’re waiting for me to fall so they can finish me off.
  - type: text
    content: They’re convinced you’ve left me
  - type: text
    content: and that you’ll never come to my rescue.
  - type: text
    content: They’re saying, “Let’s get him now! He has no savior!”
  '12':
  - type: text
    content: O God, stay close to me!
  - type: text
    content: Don’t just watch from a distance! Hurry to help me, my God!
  '13':
  - type: text
    content: Cover these accusers of mine with shame and failure!
  - type: text
    content: Destroy them all, for they only want to kill me!
  '14':
  - type: text
    content: No matter what, I’ll trust in you to help me.
  - type: text
    content: Nothing will stop me from praising you to magnify your glory!
  '15':
  - type: text
    content: I couldn’t begin to count the times you’ve been there for me.
  - type: text
    content: With the skill of a poet I’ll never run out of things to say
  - type: text
    content: about how you faithfully kept me from danger.
  '16':
  - type: text
    content: I will come forth in your mighty strength, O my Lord God.
  - type: note
    content: Or “I will enter into the manliness of Lord Yahweh.”
  - type: text
    content: I’ll tell everyone that you alone are the perfect one.
  '17':
  - type: text
    content: From my childhood you’ve been my teacher,
  - type: text
    content: and I’m still telling everyone of your miracle-wonders!
  '18':
  - type: text
    content: God, now that I’m old and gray, don’t walk away.
  - type: text
    content: Give me grace to demonstrate to the next generation
  - type: text
    content: all your mighty miracles and your excitement,
  - type: text
    content: to show them your magnificent power!
  '19':
  - type: text
    content: For your glorious righteousness reaches up to the high heavens.
  - type: text
    content: No one could ever be compared to you!
  - type: text
    content: Who is your equal, O God of marvels and wonders?
  '2':
  - type: text
    content: Let your justice be my breakthrough.
  - type: text
    content: Bend low to my whispered cry
  - type: text
    content: and save me from all my enemies!
  '20':
  - type: text
    content: Even though you’ve let us sink down with trials and troubles,
  - type: text
    content: I know you will revive us again,
  - type: text
    content: lifting us up from the dust of death.
  '21':
  - type: text
    content: Give us even more greatness than before.
  - type: text
    content: Turn and comfort us once again.
  '22':
  - type: text
    content: My loving God, the harp in my heart will praise you.
  - type: text
    content: Your faithful heart toward us will be the theme of my song.
  - type: text
    content: Melodies and music will rise to you, the Holy One of Israel.
  '23':
  - type: text
    content: I will shout and sing your praises for all you are to me—
  - type: text
    content: Savior, lover of my soul!
  '24':
  - type: text
    content: I’ll never stop telling others how perfect you are,
  - type: text
    content: while all those who seek my harm slink away ashamed and defeated!
  '3':
  - type: text
    content: You’re the only place of protection for me.
  - type: text
    content: I keep coming back to hide myself in you,
  - type: text
    content: for you are like a mountain-cliff fortress where I’m kept safe.
  '4':
  - type: text
    content: Let me escape from these cruel and wicked men,
  - type: text
    content: and save me from the hands of the evil one.
  '5':
  - type: text
    content: For you are my only hope, Lord!
  - type: text
    content: I’ve hung on to you, trusting in you all my life.
  '6':
  - type: text
    content: It was you who supported me from the day I was born,
  - type: text
    content: loving me, helping me through my life’s journey.
  - type: text
    content: You’ve made me into a miracle;
  - type: text
    content: no wonder I trust you and praise you forever!
  - type: text
    content: Many marvel at my success,
  - type: text
    content: but I know it is all because of you, my mighty protector!
  '8':
  - type: text
    content: I’m overflowing with your praise for all you’ve done,
  - type: text
    content: and your splendor thrills me all day long.
  '9':
  - type: text
    content: Now that I’m old, don’t set me aside.
  - type: text
    content: Don’t let go of me when my strength is spent.
