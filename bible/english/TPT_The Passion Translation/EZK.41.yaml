    - type: text
      text: Ezekiel 40–48
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Neither is there any mention of the ark of the covenant, the mercy seat, or a high priest. Ezekiel’s vision of the new temple omits many items from the temple because, in the ultimate heavenly dwelling place of God, there is no longer any need for a physical symbol of God’s residence (viz., the ark of the covenant), nor the symbolic throne of God (viz., the mercy seat). And the role of the high priest has been consummated in the person of Jesus Christ, our eternal High Priest—the Lamb of God.
