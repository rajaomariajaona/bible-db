  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'The outer wall of the side rooms was five cubits thick. On the raised platform there was a terrace all around the side rooms of the temple. It was twenty cubits between the edge of the platform and the rooms '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for the priests
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
