document_id: EZK.41,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Holy Place
  - type: text
    content: 'The '
  - type: text
    content: shining
  - type: text
    content: ' man brought me to the '
  - type: text
    content: Holy
  - type: text
    content: ' Place '
  - type: note
    content: 'The temple proper was divided into three sections: (1) a portico or porch, (2) an outer sanctuary known as the Holy Place, and (3) an inner sanctuary known as the Holy of Holies, or the Most Holy Place.'
  - type: text
    content: 'and measured its doorframes; each was six cubits '
  - type: note
    content: About 10.5 feet (3.2 meters). Also vv. 3, 5, 8.
  - type: text
    content: 'wide. '
  - type: note
    content: There are two Hebrew words at the end of v. 1 whose meaning is difficult to understand. Most translations omit them. The words are “width of the tent [tabernacle].”
  '11':
  - type: text
    content: And the doors of the side rooms faced an open area, one door toward the north and one door toward the south. The width of the open area was five cubits wide all around.
  - type: heading
    content: The Building on the West Side
  '12':
  - type: text
    content: 'The building on the west side of the courtyard was seventy cubits '
  - type: note
    content: About 122.5 feet (37.3 meters).
  - type: text
    content: wide. The wall of the building was five cubits thick all around, and its length was ninety cubits.
  - type: note
    content: About 157.5 feet (48 meters). Apart from the dimensions, we know nothing more about this building and its possible use.
  - type: heading
    content: The Size of the Entire Temple
  '13':
  - type: text
    content: 'Then the '
  - type: text
    content: shining
  - type: text
    content: ' man measured the length of the temple as one hundred cubits. '
  - type: note
    content: About 175 feet (53 meters). Also vv. 14, 15.
  - type: text
    content: 'The length of the courtyard plus the building and its walls was also one hundred cubits. '
  '14':
  - type: text
    content: 'The width of the courtyard on the east, including the front of the temple, was likewise one hundred cubits. '
  '15':
  - type: text
    content: 'Then he measured the length of the building '
  - type: text
    content: west
  - type: text
    content: ' of the courtyard, including its balconies on either side, which was also one hundred cubits.'
  - type: heading
    content: Additional Details of the Temple Building
  - type: text
    content: 'The entire inside of the '
  - type: text
    content: Holy
  - type: text
    content: ' Place, '
  - type: note
    content: See v. 1.
  - type: text
    content: 'the porches of the courtyard, '
  '16':
  - type: text
    content: 'the thresholds, the windows, and the galleries '
  - type: note
    content: Or “ledges” or “balconies.”
  - type: text
    content: 'on three sides that faced the threshold were paneled with wood all around, from the floor up to the windows. And the windows were screened with latticework. '
  '17':
  - type: text
    content: 'On the door to the inner part of the temple and on all the walls all around, both inside and outside, '
  - type: note
    content: The Hebrew text adds an untranslatable word that may be a technical carpentry term referring to a construction technique or pattern.
  '18':
  - type: text
    content: 'were carved alternating cherubim and palm trees. '
  - type: note
    content: See 1 Kings 6:29.
  - type: text
    content: 'Each of the cherubim had two faces, '
  '19':
  - type: text
    content: 'a human face that gazed toward the palm tree on one side and the face of a young lion turned toward the palm tree on the other side. They were carved throughout the temple everywhere. '
  '2':
  - type: text
    content: 'The width of the entrance was ten cubits, '
  - type: note
    content: About 17.5 feet (5.3 meters).
  - type: text
    content: 'and the sides of the entrance were five cubits '
  - type: note
    content: About 8.75 feet (2.65 meters). Also vv. 9–10, 11, 12.
  - type: text
    content: 'on each side, its length was forty cubits, '
  - type: note
    content: About 70 feet (21.3 meters).
  - type: text
    content: and its width twenty cubits.
  - type: note
    content: About 35 feet (10.6 meters). Also vv. 4, 9–10.
  - type: heading
    content: The Holy of Holies
  '20':
  - type: text
    content: 'The Holy Place had the same pattern of cherubim and palm trees carved on the wall from the floor to the space above the doors. '
  '21':
  - type: text
    content: The columns of the doorway to the Holy Place were square, and the columns at the entrance to the Holy of Holies were similar.
  - type: heading
    content: The Wooden Altar
  '22':
  - type: text
    content: 'A wooden altar was there, three cubits high, two cubits long, and two cubits wide. '
  - type: note
    content: Or “three cubits high and two cubits long.” The Hebrew text only gives the altar’s height and length, omitting its width. The Septuagint includes its width, which most translations have also done.
  - type: text
    content: 'Its corners, base, and sides were of wood. '
  - type: note
    content: It is remarkable that silver and gold, which were prominent in Solomon’s Temple and the tabernacle of Moses, are not even mentioned in Ezekiel 40–48. Neither is there any mention of the ark of the covenant, the mercy seat, or a high priest. Ezekiel’s vision of the new temple omits many items from the temple because, in the ultimate heavenly dwelling place of God, there is no longer any need for a physical symbol of God’s residence (viz., the ark of the covenant), nor the symbolic throne of God (viz., the mercy seat). And the role of the high priest has been consummated in the person of Jesus Christ, our eternal High Priest—the Lamb of God.
  - type: text
    content: 'The '
  - type: text
    content: shining
  - type: text
    content: ' man said to me, “This is the table that '
  - type: text
    content: always
  - type: text
    content: ' stands in the presence of '
  - type: text
    content: Yahweh
  - type: text
    content: .”
  - type: note
    content: Most scholars believe this was the altar of incense within the Holy Place.
  - type: heading
    content: The Doors in the Temple
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Holy
  - type: text
    content: ' Place and the Holy of Holies had double doors. '
  '24':
  - type: text
    content: 'Each of the doors had two hinged leaves that swung open in the middle. '
  '25':
  - type: text
    content: 'On the doors of the '
  - type: text
    content: Holy
  - type: text
    content: ' Place were carved cherubim and palm trees just like those carved on the walls. There was a wooden roof '
  - type: note
    content: Or “canopy.” The Hebrew is uncertain. Whatever this covering or roof was, it no doubt served both as a barrier to prevent people from looking into the temple and as a shelter from the rain, sun, and wind for the priests as they entered the temple for their service.
  - type: text
    content: 'over the outside of the doorway to the Holy Place. '
  '26':
  - type: text
    content: 'And there were niches '
  - type: note
    content: Or “recessed windows.” See Ezek. 40:16.
  - type: text
    content: with palm trees on either side in the front walls of the temple porch. And the side rooms of the temple also had canopies.
  '3':
  - type: text
    content: 'Then he went inside the innermost chamber '
  - type: note
    content: The fact that this “shining man” went into the Holy of Holies where only the high priest was allowed to enter is more than a hint of his identity. The shining man is a pre-incarnate manifestation of our High Priest, the Lord Jesus Christ (see Heb. 6:20).
  - type: text
    content: 'and measured the doorframes at the entrance as two cubits, then the entrance as six cubits, and the width of the entrance as seven cubits. '
  - type: note
    content: About 12.25 feet (3.73 meters).
  '4':
  - type: text
    content: He measured its length and width as twenty cubits, at the end of the outer sanctuary. Then he said to me, “This is the Holy of Holies.”
  - type: heading
    content: Side Room of the Temple
  '5':
  - type: text
    content: 'He then measured the wall of the temple as six cubits thick. There were side rooms all around the temple that were each four cubits '
  - type: note
    content: About 7 feet (2.12 meters).
  - type: text
    content: 'wide. '
  '6':
  - type: text
    content: 'And there were three levels of the side rooms, '
  - type: note
    content: There were three stories of side chambers for the priests. Noah’s ark likewise had three stories (see Gen. 6:14–16). See also the three pilgrim festivals in Deut. 16:16 and the mention of three dimensions of spiritual maturity in Prov. 22:20–21; Matt. 13:23; 1 John 2:12–14 (see especially the footnote on 2:14).
  - type: text
    content: 'with thirty rooms on each floor. All around the wall of the temple were ledges '
  - type: note
    content: The meaning of the Hebrew is uncertain.
  - type: text
    content: 'that served as supports for the side rooms so that they did not have to be attached to the temple wall for support. '
  '7':
  - type: text
    content: The rooms were right up to the temple walls. The width of the side rooms increased, floor by floor, because the width of the temple increased as it got higher, from the lowest level through the middle level to the top level.
  - type: note
    content: Some translations and commentaries see in the Hebrew of this verse a winding staircase. Indeed, Solomon’s Temple had steps leading up to the upper levels of the side rooms (see 1 Kings 6:8); however, reasonable sense can be made of the Hebrew without including a stairway.
  '8':
  - type: text
    content: 'Then I looked '
  - type: text
    content: down
  - type: text
    content: ' and saw that the temple stood on a raised platform that surrounded it. The platform was a full measuring reed high (six cubits) and provided a foundation for the side rooms. '
  '9':
  - type: text
    content: 'The outer wall of the side rooms was five cubits thick. On the raised platform there was a terrace all around the side rooms of the temple. It was twenty cubits between the edge of the platform and the rooms '
  - type: text
    content: for the priests
  - type: text
    content: '. '
