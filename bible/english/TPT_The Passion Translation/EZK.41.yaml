    - type: usfm
      marker: ft
      children:
      - type: text
        text: The fact that this “shining man” went into the Holy of Holies where only the high priest was allowed to enter is more than a hint of his identity. The shining man is a pre-incarnate manifestation of our High Priest, the Lord Jesus Christ (see
    - type: usfm
