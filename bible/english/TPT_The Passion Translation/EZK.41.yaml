    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some translations and commentaries see in the Hebrew of this verse a winding staircase. Indeed, Solomon’s Temple had steps leading up to the upper levels of the side rooms (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Kings 6:8
    - type: usfm
      marker: ft
      children:
      - type: text
