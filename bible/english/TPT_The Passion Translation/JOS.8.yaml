document_id: JOS.8,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ai Conquered
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' said to Joshua, “Do not yield to fear nor shrink back '
    - type: usfm
      marker: it
      children:
      - type: text
        text: because of Israel’s failure
    - type: text
      text: '. Now, get up, take all your soldiers with you, and march against Ai. See, I have handed over to you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I have delivered into your hands.”
      marker-yv: yv-n
    - type: text
      text: 'the city, the king, his people, and his land. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So early the next morning, Joshua mustered his troops. He and the leaders of Israel went in front of the army and led them toward Ai. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The entire fighting force with Joshua advanced until they were near the city and encamped north of Ai, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joshua encamped in plain sight of the enemy.
      marker-yv: yv-n
    - type: text
      text: 'with a valley between them and the city. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He placed '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a smaller force
    - type: text
      text: ' of about five thousand men west of the city to set an ambush between Bethel and Ai. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Jewish scholars (Rashi, David Kimchi) suggest that Joshua set a double ambush, one closer to the city than the other. One consisted of five thousand and the larger ambush, thirty thousand.
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The main fighting force north of the city prepared for battle, while the rear guard '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “his heel.”
      marker-yv: yv-n
    - type: text
      text: held a concealed position west of the city. Joshua spent the night in the valley.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint omits v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '13'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: entirely.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At dawn, when the king of Ai saw the Israelites, he and his army rushed out to fight. They ran to attack Israel at a predetermined place en route to the Arabah, not knowing that an ambush had been set against them behind the city. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua and all the main fighting force fled toward the wilderness as though they were being overcome. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Joshua’s tactic
    - type: text
      text: ' drew all of Ai’s reinforcements out of the city, and they set off in hot pursuit of Joshua '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and his men
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not a man remained in Ai or in Bethel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The reference to Bethel is omitted in the Septuagint.
      marker-yv: yv-n
    - type: text
      text: who did not go out in pursuit of Israel, leaving their city undefended.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to Joshua and said, “Now, take the spear in your hand and point it toward Ai, for I will hand the city over to you!” So Joshua pointed his spear toward the city, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and when Joshua gave this signal, all the men waiting in ambush behind the city jumped up from their position and poured into Ai. They quickly captured it and set it on fire.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Do to Ai what you did to Jericho and its king, except this time, you may take the plunder, including livestock. Set an ambush behind the city.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the men of Ai looked back, they saw the smoke of their city rising to the sky. Joshua and his men also saw the smoke and knew that the other Israelite soldiers had captured the city and had set it on fire. The army of Ai had no place to escape, so Joshua and his men turned on them and began killing them. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men who had taken the city came out and joined the battle, so the Israelites had them surrounded. Israel cut them down, leaving neither survivors nor fugitives. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they captured the king of Ai alive and brought him to Joshua.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua’s men killed all the inhabitants of Ai in the fields and in the wilderness where they had chased them. They all fell by the sword. Then the Israelites turned to attack Ai and killed those who were still there. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God did a miracle for Israel with Jericho’s walls crumbling, but with the battle of Ai, it was God’s brilliant strategy carried out by Joshua’s men that won the victory. Every battle in our lives requires that we seek God’s face and obey his instructions so that we will taste the joys of victory. Obedience to God’s plan is the key. Though God assured Israel of victory, they still had to discharge their responsibility.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua kept his spear pointed at Ai until the destruction was complete. Ai’s entire population, twelve thousand men and women, fell that day. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'However, the Israelites took the livestock and the goods captured in the city as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' had instructed Joshua.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua burned Ai to the ground and reduced it to a mound of ruins for all time. It remains desolate to this day. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he hanged the king of Ai on a tree until sunset. Then at sunset, Joshua had the corpse taken down and left it lying in front of where the city gates '
    - type: usfm
      marker: it
      children:
      - type: text
        text: once stood
    - type: text
      text: '. They raised a large pile of stones over his corpse, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: where it remains
    - type: text
      text: ' to this day.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Renewal of the Covenant at Mount Ebal
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua and his entire army set out to attack Ai. He chose thirty thousand valiant warriors and sent them ahead by night '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward, Joshua built near Mount Ebal a stone altar '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This altar was built at Shechem, about twenty miles from Ai, between Mount Ebal and Mount Gerizim.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ebal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “stripped of all covering,” “bare,” “naked,” or “barren.” The law etched upon stones exposes sin, leaves us guilty, and produces death (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 3:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He made it according to the teaching in the law of Moses, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '’s servant. Moses had commanded them to build an altar using stones that had not been cut with iron tools. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 27:1–26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Building the altar without the tools of people teaches us that God alone made the ultimate altar, the cross of Jesus. Salvation is not through the hands of humankind but by the mercy of God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Titus 3:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The altar was to be on Mount Ebal, the place where the curses were read. God has provided an altar of salvation even when sin’s curse defeats us. Mercy’s altar stands on Ebal even when we feel stripped, bare, naked, and barren.
      marker-yv: yv-n
    - type: text
      text: 'On it they offered to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' burnt sacrifices and fellowship offerings. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “peace offerings,” “offerings of well-being,” or “communion sacrifices.” The fellowship offerings were given in gratitude to God. Only the fat was burned (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 7:29–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), and the rest was consumed by the people (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 10:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And with the Israelites looking on, Joshua inscribed on stones the law which Moses had written.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All Israel, including their elders, officials, and judges, stood on either side of the ark. Both native-born citizens and immigrants alike faced the ark of the covenant of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' and the Levitical priests who carried it. In front of half of them stood Mount Gerizim, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Gerizim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “cut up” or “shorn place.” Jesus took our curse and was “shorn” and “cut up” for our sins (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 53:7–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Israel renewed their covenant with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in the valley between Mount Ebal (
      - type: usfm
        marker: it
        children:
        - type: text
          text: ebal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “stripped of all covering,” a picture of the law) and Mount Gerizim (
      - type: usfm
        marker: it
        children:
        - type: text
          text: gerizim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “cut up,” a picture of the cross of Jesus Christ). The new covenant, the Spirit of Life, is now written upon our hearts. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 31:33
      - type: usfm
        marker: ft
