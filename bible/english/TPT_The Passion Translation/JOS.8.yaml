document_id: JOS.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ai Conquered
  - type: text
    content: Yahweh
  - type: text
    content: ' said to Joshua, “Do not yield to fear nor shrink back '
  - type: text
    content: because of Israel’s failure
  - type: text
    content: '. Now, get up, take all your soldiers with you, and march against Ai. See, I have handed over to you '
  - type: note
    content: Or “I have delivered into your hands.”
  - type: text
    content: 'the city, the king, his people, and his land. '
  '10':
  - type: text
    content: 'So early the next morning, Joshua mustered his troops. He and the leaders of Israel went in front of the army and led them toward Ai. '
  '11':
  - type: text
    content: 'The entire fighting force with Joshua advanced until they were near the city and encamped north of Ai, '
  - type: note
    content: Joshua encamped in plain sight of the enemy.
  - type: text
    content: 'with a valley between them and the city. '
  '12':
  - type: text
    content: 'He placed '
  - type: text
    content: a smaller force
  - type: text
    content: ' of about five thousand men west of the city to set an ambush between Bethel and Ai. '
  - type: note
    content: Some Jewish scholars (Rashi, David Kimchi) suggest that Joshua set a double ambush, one closer to the city than the other. One consisted of five thousand and the larger ambush, thirty thousand.
  '13':
  - type: text
    content: 'The main fighting force north of the city prepared for battle, while the rear guard '
  - type: note
    content: Or “his heel.”
  - type: text
    content: held a concealed position west of the city. Joshua spent the night in the valley.
  - type: note
    content: The Septuagint omits v. 13 entirely.
  '14':
  - type: text
    content: 'At dawn, when the king of Ai saw the Israelites, he and his army rushed out to fight. They ran to attack Israel at a predetermined place en route to the Arabah, not knowing that an ambush had been set against them behind the city. '
  '15':
  - type: text
    content: 'Joshua and all the main fighting force fled toward the wilderness as though they were being overcome. '
  '16':
  - type: text
    content: Joshua’s tactic
  - type: text
    content: ' drew all of Ai’s reinforcements out of the city, and they set off in hot pursuit of Joshua '
  - type: text
    content: and his men
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Not a man remained in Ai or in Bethel '
  - type: note
    content: The reference to Bethel is omitted in the Septuagint.
  - type: text
    content: who did not go out in pursuit of Israel, leaving their city undefended.
  '18':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to Joshua and said, “Now, take the spear in your hand and point it toward Ai, for I will hand the city over to you!” So Joshua pointed his spear toward the city, '
  '19':
  - type: text
    content: and when Joshua gave this signal, all the men waiting in ambush behind the city jumped up from their position and poured into Ai. They quickly captured it and set it on fire.
  '2':
  - type: text
    content: Do to Ai what you did to Jericho and its king, except this time, you may take the plunder, including livestock. Set an ambush behind the city.”
  '20':
  - type: text
    content: 'When the men of Ai looked back, they saw the smoke of their city rising to the sky. Joshua and his men also saw the smoke and knew that the other Israelite soldiers had captured the city and had set it on fire. The army of Ai had no place to escape, so Joshua and his men turned on them and began killing them. '
  '22':
  - type: text
    content: 'The men who had taken the city came out and joined the battle, so the Israelites had them surrounded. Israel cut them down, leaving neither survivors nor fugitives. '
  '23':
  - type: text
    content: But they captured the king of Ai alive and brought him to Joshua.
  '24':
  - type: text
    content: 'Joshua’s men killed all the inhabitants of Ai in the fields and in the wilderness where they had chased them. They all fell by the sword. Then the Israelites turned to attack Ai and killed those who were still there. '
  - type: note
    content: God did a miracle for Israel with Jericho’s walls crumbling, but with the battle of Ai, it was God’s brilliant strategy carried out by Joshua’s men that won the victory. Every battle in our lives requires that we seek God’s face and obey his instructions so that we will taste the joys of victory. Obedience to God’s plan is the key. Though God assured Israel of victory, they still had to discharge their responsibility.
  '25':
  - type: text
    content: 'Joshua kept his spear pointed at Ai until the destruction was complete. Ai’s entire population, twelve thousand men and women, fell that day. '
  '27':
  - type: text
    content: 'However, the Israelites took the livestock and the goods captured in the city as '
  - type: text
    content: Yahweh
  - type: text
    content: ' had instructed Joshua.'
  '28':
  - type: text
    content: 'Then Joshua burned Ai to the ground and reduced it to a mound of ruins for all time. It remains desolate to this day. '
  '29':
  - type: text
    content: 'And he hanged the king of Ai on a tree until sunset. Then at sunset, Joshua had the corpse taken down and left it lying in front of where the city gates '
  - type: text
    content: once stood
  - type: text
    content: '. They raised a large pile of stones over his corpse, '
  - type: text
    content: where it remains
  - type: text
    content: ' to this day.'
  - type: heading
    content: Renewal of the Covenant at Mount Ebal
  '3':
  - type: text
    content: 'Joshua and his entire army set out to attack Ai. He chose thirty thousand valiant warriors and sent them ahead by night '
  '30':
  - type: text
    content: 'Afterward, Joshua built near Mount Ebal a stone altar '
  - type: note
    content: This altar was built at Shechem, about twenty miles from Ai, between Mount Ebal and Mount Gerizim. Ebal means “stripped of all covering,” “bare,” “naked,” or “barren.” The law etched upon stones exposes sin, leaves us guilty, and produces death (see 2 Cor. 3:7).
  - type: text
    content: 'to '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel. '
  '31':
  - type: text
    content: 'He made it according to the teaching in the law of Moses, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant. Moses had commanded them to build an altar using stones that had not been cut with iron tools. '
  - type: note
    content: See Deut. 27:1–26. Building the altar without the tools of people teaches us that God alone made the ultimate altar, the cross of Jesus. Salvation is not through the hands of humankind but by the mercy of God (see Titus 3:5). The altar was to be on Mount Ebal, the place where the curses were read. God has provided an altar of salvation even when sin’s curse defeats us. Mercy’s altar stands on Ebal even when we feel stripped, bare, naked, and barren.
  - type: text
    content: 'On it they offered to '
  - type: text
    content: Yahweh
  - type: text
    content: ' burnt sacrifices and fellowship offerings. '
  - type: note
    content: Or “peace offerings,” “offerings of well-being,” or “communion sacrifices.” The fellowship offerings were given in gratitude to God. Only the fat was burned (see Lev. 7:29–34), and the rest was consumed by the people (see Lev. 10:14).
  '32':
  - type: text
    content: And with the Israelites looking on, Joshua inscribed on stones the law which Moses had written.
  '33':
  - type: text
    content: 'All Israel, including their elders, officials, and judges, stood on either side of the ark. Both native-born citizens and immigrants alike faced the ark of the covenant of '
  - type: text
    content: Yahweh
  - type: text
    content: ' and the Levitical priests who carried it. In front of half of them stood Mount Gerizim, '
  - type: note
    content: Gerizim means “cut up” or “shorn place.” Jesus took our curse and was “shorn” and “cut up” for our sins (see Isa. 53:7–8). Israel renewed their covenant with Yahweh in the valley between Mount Ebal (ebal means “stripped of all covering,” a picture of the law) and Mount Gerizim (gerizim means “cut up,” a picture of the cross of Jesus Christ). The new covenant, the Spirit of Life, is now written upon our hearts. See Jer. 31:33; 2 Cor. 3:3; Heb. 8:10; 10:16.
  - type: text
    content: 'and in front of the other half stood Mount Ebal, as '
  - type: text
    content: Yahweh
  - type: text
    content: '’s servant Moses commanded at first to bless the people of Israel. '
  - type: note
    content: See Deut. 11:29.
  '34':
  - type: text
    content: 'Afterward, Joshua read aloud all the words of the law, the blessings and the curses, '
  - type: note
    content: See Lev. 26; Deut. 27–28.
  - type: text
    content: 'exactly as it was written in the scroll of the law. '
  '35':
  - type: text
    content: Joshua read aloud every word that Moses had commanded, and all the assembly of Israel heard it, including the women, the children, and the foreigners who accompanied them.
  - type: note
    content: See Neh. 8:1–12.
  '4':
  - type: text
    content: 'with these instructions: “Now pay attention. Set an ambush behind Ai, but don’t hide very far away. Stay alert and ready for battle! '
  '5':
  - type: text
    content: 'I’ll lead the rest of the army and make a direct assault on the city, and when they come out to fight us, we’ll flee from them as we did the first time. '
  '6':
  - type: text
    content: 'When this happens, they’ll say to themselves, ‘Look! They’re running away from us, just like last time!’ And they’ll keep chasing us until we’ve lured them away from the city. While we’re running away from them, '
  '7':
  - type: text
    content: 'jump up from your hiding place, race into Ai, and seize it. '
  - type: text
    content: Yahweh
  - type: text
    content: ', your God, will deliver the city into your hands! '
  '8':
  - type: text
    content: 'When you’ve captured the city, set it on fire. Now that you have your orders, go and do as '
  - type: text
    content: Yahweh
  - type: text
    content: ' has commanded!”'
  '9':
  - type: text
    content: Joshua then sent them off, and they proceeded to take up a concealed position west of Ai, between Ai and Bethel, while Joshua spent the night with the rest of the troops.
