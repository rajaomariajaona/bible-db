        - type: text
          text: .
      marker-yv: yv-n
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afterward, Joshua read aloud all the words of the law, the blessings and the curses, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 27–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'exactly as it was written in the scroll of the law. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joshua read aloud every word that Moses had commanded, and all the assembly of Israel heard it, including the women, the children, and the foreigners who accompanied them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Neh. 8:1–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'with these instructions: “Now pay attention. Set an ambush behind Ai, but don’t hide very far away. Stay alert and ready for battle! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I’ll lead the rest of the army and make a direct assault on the city, and when they come out to fight us, we’ll flee from them as we did the first time. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When this happens, they’ll say to themselves, ‘Look! They’re running away from us, just like last time!’ And they’ll keep chasing us until we’ve lured them away from the city. While we’re running away from them, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'jump up from your hiding place, race into Ai, and seize it. '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', your God, will deliver the city into your hands! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you’ve captured the city, set it on fire. Now that you have your orders, go and do as '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has commanded!”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joshua then sent them off, and they proceeded to take up a concealed position west of Ai, between Ai and Bethel, while Joshua spent the night with the rest of the troops.
