document_id: ACT.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Judgment of Ananias and Sapphira
  - type: text
    content: 'Now, a man named Ananias and his wife, Sapphira, '
  - type: note
    content: The Aramaic can be translated “Ananias, together with his wife, who was famous for her beauty.” The Aramaic name Shapeera means “beauty.”
  - type: text
    content: 'likewise sold their farm. '
  '10':
  - type: text
    content: At that moment she dropped dead at Peter’s feet.
  - type: text
    content: 'When the young men came in, she was already dead, so they carried her out and buried her next to her husband. '
  '11':
  - type: text
    content: 'The entire church was seized with a powerful sense of the fear of God, '
  - type: note
    content: Or “mega-fear fell on the church.”
  - type: text
    content: which came over all who heard what had happened.
  - type: heading
    content: The Apostles Perform Miracles, Signs, and Wonders
  '12':
  - type: text
    content: 'The apostles performed many signs, wonders, and miracles among the people. '
  '13':
  - type: text
    content: 'And the believers were wonderfully united as they met regularly in the temple courts in the area known as Solomon’s Porch. No one dared harm them, '
  - type: note
    content: As translated from the Aramaic. The Greek is “No one else dared join them,” which is somewhat confusing because of the next verse.
  - type: text
    content: for everyone held them in high regard.
  '14':
  - type: text
    content: 'Continually more and more people believed in the Lord '
  - type: note
    content: The Aramaic is “the Lord Yahweh.”
  - type: text
    content: 'and were added to their number—great crowds of both men and women. '
  '15':
  - type: text
    content: 'In fact, when people knew Peter was going to walk by, they carried the sick out to the streets and laid them down on cots and mats, knowing the incredible power emanating from him would overshadow them '
  - type: text
    content: and heal them
  - type: text
    content: '. '
  - type: note
    content: The Greek word translated “overshadow” is episkiazo, which is used exclusively for the power of the Almighty “overshadowing,” such as with Mary, who conceived a child supernaturally by God. It is also used for the cloud that overshadowed Jesus on the Mount of Transfiguration. See Matt. 17:5; Mark 9:7; Luke 1:35. This was not a natural shadow created by the light of the sun, but the supernatural overshadowing of God’s power coming upon the sick to bring healing.
  '16':
  - type: text
    content: Great numbers of people swarmed into Jerusalem from the nearby villages. They brought with them the sick and those troubled by demons—and everyone was healed!
  - type: heading
    content: The Apostles Persecuted
  '17':
  - type: text
    content: 'The high priest and his officials, who formed the party of the Sadducees, became extremely jealous over all that was happening, '
  '18':
  - type: text
    content: 'so they had the apostles arrested, placed in chains, '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'and thrown into jail. '
  '19':
  - type: text
    content: 'But during the night, the Lord '
  - type: note
    content: The Aramaic is “Lord Yahweh.”
  - type: text
    content: 'sent an angel '
  - type: text
    content: who appeared before them
  - type: text
    content: '. He supernaturally opened their prison doors and brought the apostles outside. '
  '2':
  - type: text
    content: 'They conspired to secretly keep back for themselves a portion of the proceeds. So when Ananias brought the money to the apostles, it was only a portion of the entire sale. '
  '20':
  - type: text
    content: '“Go,” the angel told them. “Stand in the temple courts and preach the words that bring life!” '
  '21':
  - type: text
    content: 'So early that morning they entered the temple courts and taught the people. The high priest and his officials, '
  - type: text
    content: unaware of their supernatural release from prison
  - type: text
    content: ', convened the members of the supreme council. '
  - type: note
    content: Or “the Sanhedrin.”
  - type: text
    content: 'They sent for the apostles to be brought to them from prison. '
  '22':
  - type: text
    content: 'But when the officers came to the prison cell, it was empty! They returned to the council and informed them, '
  '23':
  - type: text
    content: “We found the jail securely locked and the guards standing by their cell, but when we opened the door, there was no one inside!”
  '24':
  - type: text
    content: When the captain of the temple guard and the leading priests heard this report, they were perplexed and at a loss over what to make of it.
  '25':
  - type: text
    content: Someone came and informed them, “The men you put in prison are out there standing in the temple courts, teaching the people!”
  '26':
  - type: text
    content: So the captain of the temple guard and his officers went to arrest them once again, but without using force, for they were afraid the people would stone them.
  '27':
  - type: text
    content: 'When they brought them before the council, the high priest demanded an explanation, '
  '28':
  - type: text
    content: saying, “Didn’t we strictly warn you that you were to never again teach in this name? But instead you have now filled all of Jerusalem with this doctrine and are committed to holding us responsible for this man’s death!”
  - type: note
    content: Or “bringing [the guilt of] this man’s blood on us.”
  '29':
  - type: text
    content: 'Peter and the apostles replied, “We must listen to and obey God more than pleasing religious leaders. '
  '3':
  - type: text
    content: God revealed their secret to Peter
  - type: text
    content: ', '
  - type: note
    content: With supernatural discernment, God revealed to Peter what had happened. The words “pretended to give it all” are not in the original text, but supplied because of the inference of the words “lie to the Holy Spirit.” The true sin was more than simply telling Peter a lie, but lying to the Holy Spirit.
  - type: text
    content: 'so he said to him, “Ananias, why did you let Satan fill your heart and make you think you could lie to the Holy Spirit? You only pretended to give it all, yet you hid back part of the proceeds from the sale of your property to keep for yourselves. '
  '30':
  - type: text
    content: 'You had Jesus arrested and killed by crucifixion, '
  - type: note
    content: Or “by hanging him on a tree,” an Aramaic idiom for crucifixion. See Deut. 21:22–23.
  - type: text
    content: 'but the God of our forefathers '
  - type: note
    content: See Ex. 3:15.
  - type: text
    content: 'has raised him up. '
  '31':
  - type: text
    content: 'He’s the one God has exalted and seated at his right hand as our Savior and Champion. '
  - type: note
    content: Or “Prince.”
  - type: text
    content: 'He is the provider of grace as the Redeemer of Israel. '
  - type: note
    content: As translated from the Aramaic. The Greek is “He gives repentance and removal of sins to Israel.”
  '32':
  - type: text
    content: 'We are witnesses of these things, '
  - type: note
    content: Or “words.” This is the Greek word rhema.
  - type: text
    content: and so is the Holy Spirit, whom God freely gives to all who believe in him.”
  - type: note
    content: As translated from the Aramaic. The Greek is “to those who hear and obey him.”
  '33':
  - type: text
    content: 'When they heard this, they were infuriated and determined to murder them. '
  '34':
  - type: text
    content: 'But a Pharisee named Gamaliel, a noted religious professor who was highly respected by all, stood up. He gave orders to send the apostles outside. '
  '35':
  - type: text
    content: 'Then he said to the council, “Men of Israel, you need to be very careful about how you deal with these men. '
  '36':
  - type: text
    content: Some time ago there was a man named Theudas who rose up claiming to be somebody. He had a following of about four hundred men, but when he was killed, all of his followers were scattered, and nothing came of it.
  '37':
  - type: text
    content: '“After him, in the days of the census, '
  - type: note
    content: Or “registration for the Roman tax.”
  - type: text
    content: 'another man rose up, Judas the Galilean, who got people to follow him in a revolt. He too perished, and all those who followed him were scattered. '
  '38':
  - type: text
    content: 'So in this situation, you should just leave these men to themselves. For if this plan or undertaking originates with men, it will fade away and come to nothing. '
  '39':
  - type: text
    content: But if this movement is of God, you won’t be able to stop it. And you might discover that you were fighting God all along!”
  - type: text
    content: 'Gamaliel’s words convinced the council. '
  '4':
  - type: text
    content: Before you sold it, wasn’t it yours to sell or to keep? And after you sold it, wasn’t the money entirely at your disposal? How could you plot such a thing in your heart? You haven’t lied to people; you’ve lied to God!”
  - type: note
    content: The Aramaic can be translated “You are not a phony with just men, but with God.”
  '40':
  - type: text
    content: So they brought the apostles back in and had them severely beaten. They ordered them never again to speak in the name of Jesus and then let them go.
  '41':
  - type: text
    content: 'The apostles left there rejoicing, thrilled that God had considered them worthy to suffer disgrace for the name of Jesus. '
  '42':
  - type: text
    content: And nothing stopped them! They kept preaching every day in the temple courts and went from house to house, preaching the gospel of Jesus, God’s Anointed One!
  '5':
  - type: text
    content: 'The moment Ananias heard those words, he fell over dead. Everyone was terrified when they heard what had happened. '
  '6':
  - type: text
    content: Some young men came in and removed the body and buried him.
  '7':
  - type: text
    content: Three hours later, his wife came into the room, with no clue what had happened to her husband.
  '8':
  - type: text
    content: Peter said to her, “Tell me, were the two of you paid this amount for the sale of your land?”
  - type: text
    content: Sapphira said, “Yes, that’s how much it was.”
  '9':
  - type: text
    content: 'Peter told her, “Why have you agreed together to test the Spirit of the Lord? '
  - type: note
    content: The Aramaic is “the Spirit of the Lord Yahweh.”
  - type: text
    content: 'I hear the footsteps of those who buried your husband at the door—they’re coming here to bury you too!” '
