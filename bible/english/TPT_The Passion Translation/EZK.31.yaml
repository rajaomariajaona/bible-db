document_id: EZK.31,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Parable of the Cedar Tree
  - type: text
    content: 'In the eleventh year '
  - type: text
    content: of our captivity
  - type: text
    content: ', on the first day of the third month, '
  - type: note
    content: Probably June 21, 587 BC.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying,'
  '10':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “Because it towered so high with its top into the clouds and its heart was proud about its height, '
  '11':
  - type: text
    content: 'I have rejected it! I have handed it over to the mightiest of the nations '
  - type: note
    content: Or literally “a ram of the nations,” a metaphor for Nebuchadnezzar, the powerful king of Babylon.
  - type: text
    content: 'to be punished as its wickedness deserves. '
  '12':
  - type: text
    content: 'The most ruthless of nations cut down the cedar and left it deserted. Its broken branches littered the mountains, the valleys, and every ravine throughout the country. Those who once sat in its shadow have fled and abandoned it. '
  '13':
  - type: text
    content: All the birds of heaven settled in the fallen tree, and all the wild animals lay among its branches.
  '14':
  - type: text
    content: “So from now on, let no tree, no matter how well-watered, grow that high again with its top pushing into the clouds. And let no watered tree grow that tall again. For all of them are doomed to death, and they will join those in the depths of the underworld of mortals with those who go down to the pit.”
  - type: heading
    content: The Nations Quake over the Cedar’s Destruction
  '15':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says: “The day I cast it down to Sheol, '
  - type: note
    content: Sheol is a Hebrew word for the underworld, the realm of the dead. The word Sheol is derived from a root word that means “to ask a question.” We all have questions about the afterlife, don’t we?
  - type: text
    content: 'I caused it to mourn, covering it with the deep springs. '
  - type: note
    content: The meaning of the Hebrew of this sentence is uncertain.
  - type: text
    content: 'For I stopped its '
  - type: text
    content: underground
  - type: text
    content: ' rivers, and I reduced the flow of the once plentiful waters. I clothed Lebanon with gloom as they mourned for the cedar tree, and all the trees withered because of it. '
  '16':
  - type: text
    content: 'I made the nations quake at the crashing sound of its fall. They trembled as I hurled it down to Sheol with those who sink into the pit. In the depths of the underworld, all the trees of Eden, the finest well-watered trees of Lebanon, were comforted '
  - type: text
    content: when the cedar tree joined them
  - type: text
    content: '. '
  '17':
  - type: text
    content: And the nations who sat in its shadow went down to Sheol with it to join those slaughtered by the sword.
  - type: note
    content: This parable of the cedar tree is about Pharaoh, and the other trees are the other kings ruling in their earthly paradise. These other kings (trees), having gone down to the underworld, will find pleasure when Pharaoh joins them among the dead.
  '18':
  - type: text
    content: '“Which of Eden’s trees could be compared to you in glory and greatness? Yet you have been hurled down with the trees of Eden to the depths of the underworld. You will lie among the uncircumcised and with those who have been slaughtered by the sword. So much for Pharaoh and all his multitudes! I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  '2':
  - type: text
    content: '“Son of man, say to Pharaoh king of Egypt and his multitude:'
  - type: text
    content: ‘Who is comparable to you in your greatness?
  '3':
  - type: text
    content: 'I know who: Assyria! Once it was like a cedar tree in Lebanon,'
  - type: text
    content: with its noble branches, its forest shade, and its lofty height,
  - type: text
    content: its treetop among the clouds.
  '4':
  - type: text
    content: Plenty of water has made it grow,
  - type: text
    content: deep springs have made it tall.
  - type: text
    content: Streams flow all around where it was planted,
  - type: text
    content: sending rivulets to all the other trees.
  '5':
  - type: text
    content: So it towered high, much higher than the other trees of the forest.
  - type: text
    content: Because of the plentiful waters making it grow,
  - type: text
    content: its branches increased in number and spread out very far.
  '6':
  - type: text
    content: 'All the birds of heaven nested in its '
  - type: text
    content: strong
  - type: text
    content: ' branches,'
  - type: text
    content: and wild animals gave birth under its shade.
  - type: note
    content: Or “boughs.”
  - type: text
    content: Many, many people sat in its shadow.
  - type: note
    content: That is, great nations lived under its protection. This parable is a warning to Pharaoh from the fate of the Assyrian Empire. Assyria, like Pharaoh, had exalted herself in pride above the nations. Having ruled supreme for four centuries, Assyria was overthrown by the united forces of the Babylonians and the Medes in 605 BC.
  '7':
  - type: text
    content: It was beautiful in its greatness, tall, with such large branches!
  - type: text
    content: For its roots were planted in plentiful waters.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: mighty
  - type: text
    content: ' cedar tree was unrivaled in God’s garden.'
  - type: text
    content: No cypress compares to such lovely branches as these;
  - type: text
    content: 'No sycamore '
  - type: note
    content: Or “plane tree.”
  - type: text
    content: could match its splendor.
  - type: text
    content: No tree in the garden of God could match its beauty.
  '9':
  - type: text
    content: I made it so lovely with its many branches.
  - type: text
    content: It was the envy of every tree in Eden, the garden of God.’ ”
  - type: heading
    content: God Pronounces Judgment on the Cedar Tree
