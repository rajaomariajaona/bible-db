document_id: EZK.31
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parable of the Cedar Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the eleventh year '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of our captivity
  - type: text
    text: ', on the first day of the third month, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Probably June 21, 587 BC.
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' spoke to me, saying,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, say to Pharaoh king of Egypt and his multitude:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Who is comparable to you in your greatness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I know who: Assyria! Once it was like a cedar tree in Lebanon,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: with its noble branches, its forest shade, and its lofty height,
- type: usfm
  marker: q1
  children:
  - type: text
    text: its treetop among the clouds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Plenty of water has made it grow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: deep springs have made it tall.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Streams flow all around where it was planted,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sending rivulets to all the other trees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So it towered high, much higher than the other trees of the forest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of the plentiful waters making it grow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: its branches increased in number and spread out very far.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'All the birds of heaven nested in its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: strong
  - type: text
    text: ' branches,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: and wild animals gave birth under its shade.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “boughs.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Many, many people sat in its shadow.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, great nations lived under its protection. This parable is a warning to Pharaoh from the fate of the Assyrian Empire. Assyria, like Pharaoh, had exalted herself in pride above the nations. Having ruled supreme for four centuries, Assyria was overthrown by the united forces of the Babylonians and the Medes in 605 BC.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It was beautiful in its greatness, tall, with such large branches!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For its roots were planted in plentiful waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mighty
  - type: text
    text: ' cedar tree was unrivaled in God’s garden.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: No cypress compares to such lovely branches as these;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'No sycamore '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “plane tree.”
    marker-yv: yv-n
  - type: text
    text: could match its splendor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No tree in the garden of God could match its beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I made it so lovely with its many branches.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It was the envy of every tree in Eden, the garden of God.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God Pronounces Judgment on the Cedar Tree
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Therefore, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: “Because it towered so high with its top into the clouds and its heart was proud about its height, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I have rejected it! I have handed it over to the mightiest of the nations '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “a ram of the nations,” a metaphor for Nebuchadnezzar, the powerful king of Babylon.
    marker-yv: yv-n
  - type: text
    text: 'to be punished as its wickedness deserves. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The most ruthless of nations cut down the cedar and left it deserted. Its broken branches littered the mountains, the valleys, and every ravine throughout the country. Those who once sat in its shadow have fled and abandoned it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: All the birds of heaven settled in the fallen tree, and all the wild animals lay among its branches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “So from now on, let no tree, no matter how well-watered, grow that high again with its top pushing into the clouds. And let no watered tree grow that tall again. For all of them are doomed to death, and they will join those in the depths of the underworld of mortals with those who go down to the pit.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Nations Quake over the Cedar’s Destruction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' says: “The day I cast it down to Sheol, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sheol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a Hebrew word for the underworld, the realm of the dead. The word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Sheol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is derived from a root word that means “to ask a question.” We all have questions about the afterlife, don’t we?
    marker-yv: yv-n
  - type: text
    text: 'I caused it to mourn, covering it with the deep springs. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew of this sentence is uncertain.
    marker-yv: yv-n
  - type: text
    text: 'For I stopped its '
  - type: usfm
    marker: it
    children:
    - type: text
      text: underground
  - type: text
    text: ' rivers, and I reduced the flow of the once plentiful waters. I clothed Lebanon with gloom as they mourned for the cedar tree, and all the trees withered because of it. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I made the nations quake at the crashing sound of its fall. They trembled as I hurled it down to Sheol with those who sink into the pit. In the depths of the underworld, all the trees of Eden, the finest well-watered trees of Lebanon, were comforted '
  - type: usfm
    marker: it
    children:
    - type: text
      text: when the cedar tree joined them
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: And the nations who sat in its shadow went down to Sheol with it to join those slaughtered by the sword.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 31:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This parable of the cedar tree is about Pharaoh, and the other trees are the other kings ruling in their earthly paradise. These other kings (trees), having gone down to the underworld, will find pleasure when Pharaoh joins them among the dead.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Which of Eden’s trees could be compared to you in glory and greatness? Yet you have been hurled down with the trees of Eden to the depths of the underworld. You will lie among the uncircumcised and with those who have been slaughtered by the sword. So much for Pharaoh and all his multitudes! I, Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', have spoken.”'
