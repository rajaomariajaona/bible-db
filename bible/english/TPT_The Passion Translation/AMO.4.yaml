document_id: AMO.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Must Return to God
  - type: text
    content: 'Listen to this, you '
  - type: text
    content: women of Samaria
  - type: text
    content: '!'
  - type: text
    content: 'You’re like the '
  - type: text
    content: fattened
  - type: text
    content: ', '
  - type: text
    content: well-fed
  - type: text
    content: ' cows of Bashan'
  - type: note
    content: Bashan was famous for its pastureland and excellent cattle. Those who tormented Jesus during his crucifixion were described as strong bulls of Bashan (see Ps. 22:12 and footnote). The reference here to the “cows of Bashan” symbolizes the wealth and luxury of the women of Samaria. See Ezek. 39:18.
  - type: text
    content: 'grazing on the '
  - type: text
    content: fertile
  - type: text
    content: ' mountain of Samaria.'
  - type: text
    content: You women who exploit the weak
  - type: text
    content: 'and crush the poor and then command your husbands:'
  - type: text
    content: “Bring us some drinks!”
  '10':
  - type: text
    content: “I sent plagues against you
  - type: text
    content: like I did against Egypt.
  - type: text
    content: I killed your young men with the sword
  - type: text
    content: and stole away all your war horses.
  - type: text
    content: I filled your nostrils with the stench
  - type: text
    content: of your unburied corpses,
  - type: note
    content: Or “stench of your camps [armies].”
  - type: text
    content: and still, you would not return to me.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '11':
  - type: text
    content: “I destroyed some of you
  - type: text
    content: like I destroyed Sodom and Gomorrah.
  - type: text
    content: Your survivors were like burning sticks
  - type: text
    content: plucked from a fire,
  - type: text
    content: and still, you would not return to me.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '12':
  - type: text
    content: “So here is what I plan to do to you, Israel,
  - type: text
    content: and because of what I am planning,
  - type: text
    content: prepare to meet your God.”
  - type: heading
    content: Doxology
  '13':
  - type: text
    content: Behold, the Mountain-Maker
  - type: text
    content: and Wind-Creator,
  - type: text
    content: who reveals his intimate thoughts to people,
  - type: note
    content: 'Or “who reveals the thoughts of people.” The Septuagint is interesting here: “who reveals his christos to people.” Literally “who reveals his Christ [Anointing] to people.”'
  - type: text
    content: who changes the dawn into darkness
  - type: note
    content: Or “who makes dawn and darkness” (LXX).
  - type: text
    content: and moves over the mountains of the earth.
  - type: text
    content: 'His name is '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the God of Angel Armies.
  '2':
  - type: text
    content: 'Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has sworn by his holiness:'
  - type: note
    content: See Ps. 89:34–35.
  - type: text
    content: “Behold, the day is soon coming
  - type: text
    content: 'when they will use hooks '
  - type: note
    content: Or “baskets.” The Hebrew is uncertain.
  - type: text
    content: to drag you away,
  - type: text
    content: every last one of you with fishhooks.
  - type: note
    content: Or “in fishermen’s pots.” The Hebrew is uncertain. The essential meaning of this verse is that nobody will escape deportation.
  '3':
  - type: text
    content: 'They will force you '
  - type: text
    content: like cattle
  - type: text
    content: ' in a chute'
  - type: text
    content: through the gaps of the broken walls
  - type: text
    content: and herd you off toward Hermon.
  - type: note
    content: Or “Harmon” or “Haharmon.” The Hebrew is uncertain. The essential meaning is that they will be taken captive to Assyria. Hermon is a mountain on the border of Israel and Syria. Harmon means “high fortress.”
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: Israel Refuses to Learn God’s Lesson
  '4':
  - type: text
    content: “Go to Bethel and sin!
  - type: text
    content: Go to Gilgal and sin some more!
  - type: note
    content: Verses 4–5 are very sarcastic. Bethel and Gilgal were once like “beachheads” for Israel in the promised land. Bethel and Gilgal were places where Israel worshiped God. Yahweh was speaking scornfully of how the people polluted their worship of him. He was telling them that their pagan “worship” was sin.
  - type: text
    content: You sin when
  - type: text
    content: ' you bring your sacrifices each morning.'
  - type: text
    content: You sin when
  - type: text
    content: ' you bring your tithes every third day'
  - type: note
    content: The tribute offering of the tithe was a very ancient Hebrew custom dating back to Jacob’s vow. See Gen. 28:22; Deut. 14:22–28.
  '5':
  - type: text
    content: and burn your thank offerings of bread made with yeast.
  - type: note
    content: In Lev. 2:11, Israel was commanded not to offer as a burnt offering to God anything containing yeast or honey. This is perfectly in line with the scathing sarcasm of the divine indictment here—namely, that God instructed his people to do explicitly what he had forbidden them to do in the law in relation to godly worship practices. This reinforces the brutal irony of the preceding verse. See Lev. 7:13.
  - type: text
    content: Brag about your extra offerings, people of Israel,
  - type: text
    content: for this is what makes you happy!
  - type: text
    content: 'I, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '6':
  - type: text
    content: '“In every town, I left you hungry '
  - type: note
    content: Or “I gave you clean teeth,” a figure of speech for having nothing to eat.
  - type: text
    content: —
  - type: text
    content: a food shortage in all your villages—
  - type: text
    content: and still, you would not hunger for me.
  - type: note
    content: Or “you would not come back to me.” God expected his punishments of his people to bring them to repentance, but they refused.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '7':
  - type: text
    content: “I even withheld the rain from you
  - type: text
    content: three months short of harvest.
  - type: text
    content: I sent rain to fall on one town
  - type: text
    content: but not on another.
  - type: text
    content: One field had plenty of rain,
  - type: text
    content: and another became dry as dust.
  '8':
  - type: text
    content: People would stagger from city to city,
  - type: text
    content: longing for a drink of water
  - type: text
    content: yet never quenching their thirst.
  - type: text
    content: And still you had no thirst for me.
  - type: note
    content: Or “you would not come back to me.”
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '9':
  - type: text
    content: “I struck your crops with blight and disease
  - type: text
    content: and dried up your many gardens and vineyards.
  - type: text
    content: Locusts kept devouring your fig trees and olive trees,
  - type: text
    content: and still, you would not return to me.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
