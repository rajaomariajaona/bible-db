  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: enemies
    - type: text
      text: ' are gathering in the north,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a river rising.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like a terrible flood that will cover
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the land '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of the Philistines
    - type: text
      text: ' and everything in it,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the towns and everyone living in them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People will cry for help,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all the people of your land will cry and scream
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they hear the hoofbeats of the horses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the clatter of the war chariots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the rumbling of the wheels.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: In their panic
    - type: text
      text: ', parents will forget to turn back for their children;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'their hands will fall limp '
    - type: usfm
      marker: it
      children:
      - type: text
        text: at their sides
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the day has come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for all the Philistines to be destroyed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for Tyre and Sidon to be stripped
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of every ally they have left.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is destroying the Philistines,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the survivors from the Isle of Crete.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Caphtor.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 2:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 9:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Crete was possibly the homeland of the Philistines. The main wave of the migration came as they settled in the land in the twelfth century BC.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Gaza will mourn with great sorrow,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Baldness [shaving the head as a sign of sorrow] has come to Gaza.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for Ashkelon has been destroyed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “reduced to silence,” a euphemistic way of saying that Ashkelon has been destroyed.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You descendants of the giants,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “You survivors of the Anakim” (the Anakim were a race of giants; see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Num. 13:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 9:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Hebrew is “You who remain in the valley,” possibly a reference to the entire Philistine plain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how long will you slash yourselves?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 47:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, to rouse the pity of their gods. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 18:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Oh, sword '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the hand
    - type: text
      text: ' of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how long until you rest?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Go back into your sheath,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rest and be still!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet how can you rest
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'when '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' has given you an assignment?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have ordered it to attack
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the people of Ashkelon and the seacoast.”
