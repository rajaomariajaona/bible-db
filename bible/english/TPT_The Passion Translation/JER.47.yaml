document_id: JER.47,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against the Philistines
  - type: text
    content: Yahweh
  - type: text
    content: ' gave the prophet Jeremiah a message for the Philistines before Pharaoh attacked Gaza.'
  - type: note
    content: Other prophecies concerning Philistia can be found in Isa. 14:28–32; Ezek. 25:15–17; Amos 1:6–8; Zeph. 2:4–7; Zech. 9:1–7.
  '2':
  - type: text
    content: '“Look, '
  - type: text
    content: enemies
  - type: text
    content: ' are gathering in the north,'
  - type: text
    content: like a river rising.
  - type: text
    content: They are like a terrible flood that will cover
  - type: text
    content: 'the land '
  - type: text
    content: of the Philistines
  - type: text
    content: ' and everything in it,'
  - type: text
    content: the towns and everyone living in them.
  - type: text
    content: People will cry for help,
  - type: text
    content: and all the people of your land will cry and scream
  '3':
  - type: text
    content: when they hear the hoofbeats of the horses
  - type: text
    content: and the clatter of the war chariots,
  - type: text
    content: the rumbling of the wheels.
  - type: text
    content: In their panic
  - type: text
    content: ', parents will forget to turn back for their children;'
  - type: text
    content: 'their hands will fall limp '
  - type: text
    content: at their sides
  - type: text
    content: .
  '4':
  - type: text
    content: For the day has come
  - type: text
    content: for all the Philistines to be destroyed,
  - type: text
    content: for Tyre and Sidon to be stripped
  - type: text
    content: of every ally they have left.
  - type: text
    content: 'Yes, '
  - type: text
    content: Yahweh
  - type: text
    content: ' is destroying the Philistines,'
  - type: text
    content: the survivors from the Isle of Crete.
  - type: note
    content: Or “Caphtor.” See Deut. 2:23; Amos 9:7. Crete was possibly the homeland of the Philistines. The main wave of the migration came as they settled in the land in the twelfth century BC.
  '5':
  - type: text
    content: The people of Gaza will mourn with great sorrow,
  - type: note
    content: Or “Baldness [shaving the head as a sign of sorrow] has come to Gaza.”
  - type: text
    content: for Ashkelon has been destroyed.
  - type: note
    content: Or “reduced to silence,” a euphemistic way of saying that Ashkelon has been destroyed.
  - type: text
    content: You descendants of the giants,
  - type: note
    content: The Septuagint reads “You survivors of the Anakim” (the Anakim were a race of giants; see Num. 13:33; Deut. 9:2). The Hebrew is “You who remain in the valley,” possibly a reference to the entire Philistine plain.
  - type: text
    content: how long will you slash yourselves?
  - type: note
    content: That is, to rouse the pity of their gods. See 1 Kings 18:28.
  '6':
  - type: text
    content: '“Oh, sword '
  - type: text
    content: in the hand
  - type: text
    content: ' of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: how long until you rest?
  - type: text
    content: Go back into your sheath,
  - type: text
    content: rest and be still!
  '7':
  - type: text
    content: Yet how can you rest
  - type: text
    content: 'when '
  - type: text
    content: Yahweh
  - type: text
    content: ' has given you an assignment?'
  - type: text
    content: I have ordered it to attack
  - type: text
    content: the people of Ashkelon and the seacoast.”
