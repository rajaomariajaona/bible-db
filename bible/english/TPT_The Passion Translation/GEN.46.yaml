document_id: GEN.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel and His Family Go to Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Israel packed up all he had and went to Beersheba, where he offered sacrifices to the God of his father Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God spoke to him in visions of the night, and called, “Jacob, Jacob!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 46:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For the first time in twenty-two years, God appeared to Jacob. He was now one hundred and thirty years old. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 47:9
      metadata:
        usfm: GEN.47.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, I’m here,” he answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“I am God, the God of your father. Do not be afraid to go to Egypt; for I will make your descendants a great nation there. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will go with you to Egypt, and I will bring your descendants back to this land. And the hand of Joseph will be there to close your eyes when you die.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 46:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Within Jewish culture, even to this day, the nearest relative or oldest son would gently close the eyes of a loved one at death. Indeed, Joseph did as God had promised Jacob. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Gen. 49:33–50:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Jacob set out from Beersheba. His sons put him, their little ones, and their wives in the wagons that Pharaoh had sent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: 'They took their livestock and the possessions they had acquired in Canaan and went to Egypt. Jacob took all his descendants with him: his sons, his grandsons, his daughters, his granddaughters.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Family of Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Now these are the names of Jacob’s descendants, the Israelites who went to Egypt with him:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Reuben, Jacob’s firstborn, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and his sons: Hanoch, Pallu, Hezron, and Carmi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Simeon and his sons: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul (the son of a Canaanite woman).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Levi and his sons: Gershon, Kohath, and Merari.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Judah and his sons: Shelah, Perez, and Zerah. (Judah’s other sons, Er and Onan, had died in Canaan.) Perez’s sons were Hezron and Hamul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Issachar and his sons: Tola, Puah, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 46:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Masoretic text reads “Puvah.” This translation follows the Samaritan Pentateuch and Syriac (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 7:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Jashub, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 46:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Masoretic text reads “Job.” This translation follows the Samaritan Pentateuch and some Septuagint manuscripts which read “Jashub,” following
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 26:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 7:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: and Shimron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Zebulun and his sons: Sered, Elon, and Jahleel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These thirty-three were the sons that Jacob and Leah had while in Paddan-Aram, besides his daughter Dinah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Gad and his sons: Zephon, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 46:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Masoretic text reads “Ziphion.” This translation follows the Samaritan Pentateuch and the Septuagint which read “Zephon,” following
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 26:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Haggi, Shuni, Ezbon, Eri, Arodi, and Areli.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Asher and his sons: Imnah, Ishvah, Ishvi, Beriah, and their sister Serah. Beriah’s sons were Heber and Malchiel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: These sixteen were the descendants of Jacob and Zilpah (the slave woman whom Laban gave to his daughter Leah).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jacob’s sons with Rachel were Joseph and Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In Egypt, Joseph had two sons, Manasseh and Ephraim, by Asenath (the daughter of Potiphera, a priest of On). '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Benjamin’s sons were Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These fourteen were the descendants of Jacob by Rachel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dan and his son: Hushim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Naphtali and his sons: Jahzeel, Guni, Jezer, and Shillem. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: These seven are the descendants of Jacob and Bilhah (the slave woman Laban gave to his daughter Rachel).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The total number of the direct descendants of Jacob who went to Egypt was sixty-six, not including his sons’ wives. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Two sons were born to Joseph in Egypt, bringing the total number of Jacob’s family who went there to seventy.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph and His Father Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jacob sent Judah ahead to ask Joseph to lead them in Goshen. When they arrived, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Joseph got in his chariot and rode to Goshen to meet his father, Israel. As soon as Joseph saw '
  - type: usfm
    marker: it
    children:
    - type: text
      text: his father
  - type: text
    text: ', he threw his arms around his '
  - type: usfm
    marker: it
    children:
    - type: text
      text: father’s
  - type: text
    text: ' neck and wept for a long time. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 46:29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Words completely fail to describe the emotion of this scene as father and son embraced! The great Egyptian lord was once more only a boy needing his father. After two decades, Jacob saw the son he had given up for dead. The two men stood holding each other and weeping. What a family reunion this was!
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Israel said to Joseph, “I am ready to die, now that I have seen you and know that you are still alive.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Joseph said to his brothers and all his father’s family, “I must go and tell the king that my brothers and all my father’s family have come to me from Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'I will tell him that you are shepherds and take care of livestock and that you have brought with you your flocks and herds and all you own. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When the king calls for you and asks what your occupation is, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: be sure to tell him that you and your fathers before you have herded livestock all your lives. Then he will let you live in the region of Goshen.” Joseph said this because Egyptians despise shepherds.
