document_id: GEN.46,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel and His Family Go to Egypt
  - type: text
    content: 'Israel packed up all he had and went to Beersheba, where he offered sacrifices to the God of his father Isaac. '
  '10':
  - type: text
    content: 'Simeon and his sons: Jemuel, Jamin, Ohad, Jachin, Zohar, and Shaul (the son of a Canaanite woman).'
  '11':
  - type: text
    content: 'Levi and his sons: Gershon, Kohath, and Merari.'
  '12':
  - type: text
    content: 'Judah and his sons: Shelah, Perez, and Zerah. (Judah’s other sons, Er and Onan, had died in Canaan.) Perez’s sons were Hezron and Hamul.'
  '13':
  - type: text
    content: 'Issachar and his sons: Tola, Puah, '
  - type: note
    content: The Masoretic text reads “Puvah.” This translation follows the Samaritan Pentateuch and Syriac (see 1 Chron. 7:1).
  - type: text
    content: 'Jashub, '
  - type: note
    content: The Masoretic text reads “Job.” This translation follows the Samaritan Pentateuch and some Septuagint manuscripts which read “Jashub,” following Num. 26:24 and 1 Chron. 7:1.
  - type: text
    content: and Shimron.
  '14':
  - type: text
    content: 'Zebulun and his sons: Sered, Elon, and Jahleel.'
  '15':
  - type: text
    content: These thirty-three were the sons that Jacob and Leah had while in Paddan-Aram, besides his daughter Dinah.
  '16':
  - type: text
    content: 'Gad and his sons: Zephon, '
  - type: note
    content: The Masoretic text reads “Ziphion.” This translation follows the Samaritan Pentateuch and the Septuagint which read “Zephon,” following Num. 26:15.
  - type: text
    content: Haggi, Shuni, Ezbon, Eri, Arodi, and Areli.
  '17':
  - type: text
    content: 'Asher and his sons: Imnah, Ishvah, Ishvi, Beriah, and their sister Serah. Beriah’s sons were Heber and Malchiel.'
  '18':
  - type: text
    content: These sixteen were the descendants of Jacob and Zilpah (the slave woman whom Laban gave to his daughter Leah).
  '19':
  - type: text
    content: 'Jacob’s sons with Rachel were Joseph and Benjamin. '
  '2':
  - type: text
    content: God spoke to him in visions of the night, and called, “Jacob, Jacob!”
  - type: note
    content: For the first time in twenty-two years, God appeared to Jacob. He was now one hundred and thirty years old. See Gen. 47:9.
  - type: text
    content: “Yes, I’m here,” he answered.
  '20':
  - type: text
    content: 'In Egypt, Joseph had two sons, Manasseh and Ephraim, by Asenath (the daughter of Potiphera, a priest of On). '
  '21':
  - type: text
    content: 'Benjamin’s sons were Bela, Becher, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim, and Ard. '
  '22':
  - type: text
    content: These fourteen were the descendants of Jacob by Rachel.
  '23':
  - type: text
    content: 'Dan and his son: Hushim.'
  '24':
  - type: text
    content: 'Naphtali and his sons: Jahzeel, Guni, Jezer, and Shillem. '
  '25':
  - type: text
    content: These seven are the descendants of Jacob and Bilhah (the slave woman Laban gave to his daughter Rachel).
  '26':
  - type: text
    content: 'The total number of the direct descendants of Jacob who went to Egypt was sixty-six, not including his sons’ wives. '
  '27':
  - type: text
    content: Two sons were born to Joseph in Egypt, bringing the total number of Jacob’s family who went there to seventy.
  - type: heading
    content: Joseph and His Father Jacob
  '28':
  - type: text
    content: 'Jacob sent Judah ahead to ask Joseph to lead them in Goshen. When they arrived, '
  '29':
  - type: text
    content: 'Joseph got in his chariot and rode to Goshen to meet his father, Israel. As soon as Joseph saw '
  - type: text
    content: his father
  - type: text
    content: ', he threw his arms around his '
  - type: text
    content: father’s
  - type: text
    content: ' neck and wept for a long time. '
  - type: note
    content: Words completely fail to describe the emotion of this scene as father and son embraced! The great Egyptian lord was once more only a boy needing his father. After two decades, Jacob saw the son he had given up for dead. The two men stood holding each other and weeping. What a family reunion this was!
  '3':
  - type: text
    content: '“I am God, the God of your father. Do not be afraid to go to Egypt; for I will make your descendants a great nation there. '
  '30':
  - type: text
    content: Israel said to Joseph, “I am ready to die, now that I have seen you and know that you are still alive.”
  '31':
  - type: text
    content: 'Then Joseph said to his brothers and all his father’s family, “I must go and tell the king that my brothers and all my father’s family have come to me from Canaan. '
  '32':
  - type: text
    content: 'I will tell him that you are shepherds and take care of livestock and that you have brought with you your flocks and herds and all you own. '
  '33':
  - type: text
    content: 'When the king calls for you and asks what your occupation is, '
  '34':
  - type: text
    content: be sure to tell him that you and your fathers before you have herded livestock all your lives. Then he will let you live in the region of Goshen.” Joseph said this because Egyptians despise shepherds.
  '4':
  - type: text
    content: I will go with you to Egypt, and I will bring your descendants back to this land. And the hand of Joseph will be there to close your eyes when you die.”
  - type: note
    content: Within Jewish culture, even to this day, the nearest relative or oldest son would gently close the eyes of a loved one at death. Indeed, Joseph did as God had promised Jacob. See Gen. 49:33–50:1.
  '5':
  - type: text
    content: 'Then Jacob set out from Beersheba. His sons put him, their little ones, and their wives in the wagons that Pharaoh had sent. '
  '6':
  - type: text
    content: 'They took their livestock and the possessions they had acquired in Canaan and went to Egypt. Jacob took all his descendants with him: his sons, his grandsons, his daughters, his granddaughters.'
  - type: heading
    content: The Family of Jacob
  '8':
  - type: text
    content: 'Now these are the names of Jacob’s descendants, the Israelites who went to Egypt with him:'
  - type: text
    content: 'Reuben, Jacob’s firstborn, '
  '9':
  - type: text
    content: 'and his sons: Hanoch, Pallu, Hezron, and Carmi.'
