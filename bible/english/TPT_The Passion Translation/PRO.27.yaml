document_id: PRO.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Heed Wisdom’s Warnings
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Never brag about the plans you have for tomorrow,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you don’t have a clue what tomorrow may bring to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let someone else honor you for your accomplishments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for self-praise is never appropriate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: It’s easier to carry a heavy boulder and a ton of sand
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to be provoked by a fool and have to carry that burden!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The rage and anger of others can be overwhelming,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but it’s nothing compared to jealousy’s fire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It’s better to be corrected openly
- type: usfm
  marker: q1
  children:
  - type: text
    text: if it stems from hidden love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You can trust a friend who wounds you with his honesty,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Amen [effective and faithful] are the wounds of love.” This could be a reference to the wounds Jesus endured because of his love for us.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but your enemy’s pretended flattery '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “kisses.”
    marker-yv: yv-n
  - type: text
    text: comes from insincerity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When your soul is full, you turn down even the sweetest honey.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But when your soul is starving,
- type: usfm
  marker: q1
  children:
  - type: text
    text: every bitter thing becomes sweet.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When we are full of many things and many opinions, the sweet word of God, like revelation honey, is spurned. Instead, we eat and fill our souls with things that can never satisfy.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Like a bird that has fallen from its nest
- type: usfm
  marker: q1
  children:
  - type: text
    text: is the one who is dislodged from his home.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “banished from his place,” as translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sweet friendships '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “counsel.”
    marker-yv: yv-n
  - type: text
    text: refresh the soul and awaken our hearts with joy,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for good friends are like the anointing oil
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that yields the fragrant incense '
  - type: usfm
    marker: it
    children:
    - type: text
      text: of God’s presence
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text refers to the sacred anointing oil and the incense that burns in the Holy Place.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So never give up on a friend or abandon a friend of your father—
- type: usfm
  marker: q1
  children:
  - type: text
    text: for in the day of your brokenness
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: you won’t have to run to a relative for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A friend nearby is better than a relative far away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My son, when you walk in wisdom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my heart is filled with gladness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the way you live is proof
- type: usfm
  marker: q1
  children:
  - type: text
    text: that I’ve not taught you in vain.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “that I may answer those who reproach me.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A wise, shrewd person discerns the danger ahead
- type: usfm
  marker: q1
  children:
  - type: text
    text: and prepares himself,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the naïve simpleton never looks ahead
- type: usfm
  marker: q1
  children:
  - type: text
    text: and suffers the consequences.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cosign for one you barely know and you will pay a great price!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anyone stupid enough to guarantee the loan of another
- type: usfm
  marker: q1
  children:
  - type: text
    text: deserves to have his property seized in payment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Do you think you’re blessing your neighbors
- type: usfm
  marker: q1
  children:
  - type: text
    text: when you sing at the top of your lungs early in the morning?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t be fooled—
- type: usfm
  marker: q1
  children:
  - type: text
    text: they’ll curse you for doing it!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “He who sings in a loud voice early in the morning, thinking he’s blessing his neighbor, is no different from he who pronounces a curse.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: An endless drip, drip, drip, from a leaky faucet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a constant drip on a rainy day.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the words of a cranky, nagging wife have the same effect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Can you stop the north wind from blowing
- type: usfm
  marker: q1
  children:
  - type: text
    text: or grasp a handful of oil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s easier than to stop her from complaining.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It takes a grinding wheel to sharpen a blade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and so one person sharpens the character of another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tend an orchard and you’ll have fruit to eat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Serve the Master’s interests
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you’ll receive honor that’s sweet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Just as no two faces are exactly alike,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so every heart is different.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and the Septuagint.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Death and destruction are never filled,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the desires of men’s hearts are insatiable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fire is the way to test the purity of silver and gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the character of a man is tested
- type: usfm
  marker: q1
  children:
  - type: text
    text: by giving him a measure of fame.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “by the things he praises.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: You can beat a fool half to death
- type: usfm
  marker: q1
  children:
  - type: text
    text: and still never beat the foolishness out of him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “If you pound a fool in a mortar with a pestle like dried grain, still his foolishness will not depart from him.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A shepherd should pay close attention to the faces of his flock
- type: usfm
  marker: q1
  children:
  - type: text
    text: and hold close to his heart the condition of those he cares for.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A man’s strength, power, and riches '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew says merely “riches,” while the Aramaic adds “power [dominion]” and the Septuagint adds “strength.” This translation combines them.
    marker-yv: yv-n
  - type: text
    text: will one day fade away;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'not even nations '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a crown” or “diadem [dominion].”
    marker-yv: yv-n
  - type: text
    text: endure forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 25-27
  - type: text
    text: Take care of your responsibilities
- type: usfm
  marker: q1
  children:
  - type: text
    text: and be diligent in your business
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you will have more than enough—
- type: usfm
  marker: q1
  children:
  - type: text
    text: an abundance of food, clothing, and plenty for your household.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 27:25–27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An agricultural analogy is used in the Hebrew and Aramaic. The analogy of a farming enterprise has been changed to business here in order to transfer meaning. It is literally “Gather the hay of the field and hills, and new grass will appear. Lambs will provide clothing, goats will pay for the price of the field, and there will be enough goat’s milk for you, your family, and your servant girls.”
    marker-yv: yv-n
