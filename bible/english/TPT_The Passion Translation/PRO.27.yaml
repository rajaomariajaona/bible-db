document_id: PRO.27,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Heed Wisdom’s Warnings
  - type: text
    content: Never brag about the plans you have for tomorrow,
  - type: text
    content: for you don’t have a clue what tomorrow may bring to you.
  '10':
  - type: text
    content: So never give up on a friend or abandon a friend of your father—
  - type: text
    content: for in the day of your brokenness
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: you won’t have to run to a relative for help.
  - type: text
    content: A friend nearby is better than a relative far away.
  '11':
  - type: text
    content: My son, when you walk in wisdom,
  - type: text
    content: my heart is filled with gladness,
  - type: text
    content: for the way you live is proof
  - type: text
    content: that I’ve not taught you in vain.
  - type: note
    content: Or “that I may answer those who reproach me.”
  '12':
  - type: text
    content: A wise, shrewd person discerns the danger ahead
  - type: text
    content: and prepares himself,
  - type: text
    content: but the naïve simpleton never looks ahead
  - type: text
    content: and suffers the consequences.
  '13':
  - type: text
    content: Cosign for one you barely know and you will pay a great price!
  - type: text
    content: Anyone stupid enough to guarantee the loan of another
  - type: text
    content: deserves to have his property seized in payment.
  '14':
  - type: text
    content: Do you think you’re blessing your neighbors
  - type: text
    content: when you sing at the top of your lungs early in the morning?
  - type: text
    content: Don’t be fooled—
  - type: text
    content: they’ll curse you for doing it!
  - type: note
    content: Or “He who sings in a loud voice early in the morning, thinking he’s blessing his neighbor, is no different from he who pronounces a curse.”
  '15':
  - type: text
    content: An endless drip, drip, drip, from a leaky faucet
  - type: note
    content: Or “a constant drip on a rainy day.”
  - type: text
    content: and the words of a cranky, nagging wife have the same effect.
  '16':
  - type: text
    content: Can you stop the north wind from blowing
  - type: text
    content: or grasp a handful of oil?
  - type: text
    content: That’s easier than to stop her from complaining.
  '17':
  - type: text
    content: It takes a grinding wheel to sharpen a blade,
  - type: text
    content: and so one person sharpens the character of another.
  '18':
  - type: text
    content: Tend an orchard and you’ll have fruit to eat.
  - type: text
    content: Serve the Master’s interests
  - type: text
    content: and you’ll receive honor that’s sweet.
  '19':
  - type: text
    content: Just as no two faces are exactly alike,
  - type: text
    content: so every heart is different.
  - type: note
    content: As translated from the Aramaic and the Septuagint.
  '2':
  - type: text
    content: Let someone else honor you for your accomplishments,
  - type: text
    content: for self-praise is never appropriate.
  '20':
  - type: text
    content: Death and destruction are never filled,
  - type: text
    content: and the desires of men’s hearts are insatiable.
  '21':
  - type: text
    content: Fire is the way to test the purity of silver and gold,
  - type: text
    content: but the character of a man is tested
  - type: text
    content: by giving him a measure of fame.
  - type: note
    content: Or “by the things he praises.”
  '22':
  - type: text
    content: You can beat a fool half to death
  - type: text
    content: and still never beat the foolishness out of him.
  - type: note
    content: Or “If you pound a fool in a mortar with a pestle like dried grain, still his foolishness will not depart from him.”
  '23':
  - type: text
    content: A shepherd should pay close attention to the faces of his flock
  - type: text
    content: and hold close to his heart the condition of those he cares for.
  '24':
  - type: text
    content: 'A man’s strength, power, and riches '
  - type: note
    content: The Hebrew says merely “riches,” while the Aramaic adds “power [dominion]” and the Septuagint adds “strength.” This translation combines them.
  - type: text
    content: will one day fade away;
  - type: text
    content: 'not even nations '
  - type: note
    content: Or “a crown” or “diadem [dominion].”
  - type: text
    content: endure forever.
  '25':
  - type: text
    content: Take care of your responsibilities
  - type: text
    content: and be diligent in your business
  - type: text
    content: and you will have more than enough—
  - type: text
    content: an abundance of food, clothing, and plenty for your household.
  - type: note
    content: An agricultural analogy is used in the Hebrew and Aramaic. The analogy of a farming enterprise has been changed to business here in order to transfer meaning. It is literally “Gather the hay of the field and hills, and new grass will appear. Lambs will provide clothing, goats will pay for the price of the field, and there will be enough goat’s milk for you, your family, and your servant girls.”
  '3':
  - type: text
    content: It’s easier to carry a heavy boulder and a ton of sand
  - type: text
    content: than to be provoked by a fool and have to carry that burden!
  '4':
  - type: text
    content: The rage and anger of others can be overwhelming,
  - type: text
    content: but it’s nothing compared to jealousy’s fire.
  '5':
  - type: text
    content: It’s better to be corrected openly
  - type: text
    content: if it stems from hidden love.
  '6':
  - type: text
    content: You can trust a friend who wounds you with his honesty,
  - type: note
    content: Or “Amen [effective and faithful] are the wounds of love.” This could be a reference to the wounds Jesus endured because of his love for us.
  - type: text
    content: 'but your enemy’s pretended flattery '
  - type: note
    content: Or “kisses.”
  - type: text
    content: comes from insincerity.
  '7':
  - type: text
    content: When your soul is full, you turn down even the sweetest honey.
  - type: text
    content: But when your soul is starving,
  - type: text
    content: every bitter thing becomes sweet.
  - type: note
    content: When we are full of many things and many opinions, the sweet word of God, like revelation honey, is spurned. Instead, we eat and fill our souls with things that can never satisfy.
  '8':
  - type: text
    content: Like a bird that has fallen from its nest
  - type: text
    content: is the one who is dislodged from his home.
  - type: note
    content: Or “banished from his place,” as translated from the Aramaic.
  '9':
  - type: text
    content: 'Sweet friendships '
  - type: note
    content: Or “counsel.”
  - type: text
    content: refresh the soul and awaken our hearts with joy,
  - type: text
    content: for good friends are like the anointing oil
  - type: text
    content: 'that yields the fragrant incense '
  - type: text
    content: of God’s presence
  - type: text
    content: .
  - type: note
    content: The Hebrew text refers to the sacred anointing oil and the incense that burns in the Holy Place.
