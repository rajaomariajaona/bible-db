      children:
      - type: text
        text: ). Joseph did not lie with Potiphar’s wife, even though she begged him. Joseph gained by purity what Reuben lost by defilement. This birthright was the inheritance not only of a double portion of land and possessions but also the privileges of headship and priesthood. Reuben lost it all, even though he likely repented and was pardoned. You may be first in line for the blessing, but it is how you finish that counts. Sinful acts can disqualify you for spiritual privilege and leadership.
    marker-yv: yv-n
