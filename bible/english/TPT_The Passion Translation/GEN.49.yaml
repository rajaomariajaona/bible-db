    - type: usfm
      marker: ft
      children:
      - type: text
        text: The struggle between flesh and spirit had been fierce and protracted in Jacob, but as the end drew near, he ministered from a deep well as the Spirit of Prophecy fell upon him. Jacob became a shaper of destiny for his children as God revealed to him the futures of his sons. His prophecies were based both on their characters and on their actions. He spoke into their destinies and described God’s plan for each one. The prophecies of
    - type: usfm
