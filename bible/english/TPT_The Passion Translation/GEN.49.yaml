      children:
      - type: text
        text: Jacob chose neither Simeon nor Levi to replace Reuben as the firstborn, and they received no blessing because they were men of anarchy, not righteousness. Both Simeon and Levi had a disposition to kill others. Instead of using their swords for self-defense, they wielded their weapons in cruel rage to slaughter and plunder the city of Shechem (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
