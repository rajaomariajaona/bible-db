        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Issachar is truly a picture of the intercessor. There is an anointing of rest for those who give their lives in intercession. Nothing will shake their confidence, for they have entered the Spirit’s rest (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Heb. 3:11
      metadata:
        usfm: HEB.3.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Issachar, the donkey, saw that rest was good. Nobody else did. He saw the anointing of rest. Burdens must be carried, but carried within the pleasant land of resting in God’s sweet presence. We must bend our shoulders to the burden of the Lord. God has a burden to share, but he waits for intercessors to find the resting place and bend their shoulders to his burden. True sons of Issachar will submit to voluntary labor and become slaves to prayer! Issachar bore the burden because he could see by the Spirit what God wanted to do in the land. God offers his intercessors, his friends, the opportunity to partner with him to bring his will to pass. Remember, it was a donkey that carried Jesus into Jerusalem. Could it be that intercessors are those whom God has chosen to carry his presence into the nations? We are to release the intercessors, for the Master needs them.
    marker-yv: yv-n
