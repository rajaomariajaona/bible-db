      - type: text
        text: Having spoken of the tribe from which Jesus was born (Judah), Jacob now prophesied about Zebulun, the tribe in whose territory he lived. Jesus began his ministry in the area settled by Zebulun. The people of Zebulun were the first to see this great Light dawning (see
    - type: usfm
