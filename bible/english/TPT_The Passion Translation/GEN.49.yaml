  - type: text
    text: “Issachar is a strong donkey
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The sons of Issachar were donkeys; they were meant to be burden bearers. A horse loves speed; a donkey is made for carrying burdens. A donkey is focused and sure-footed when it walks on mountain heights. A horse needs blinders or things will easily distract it; but a donkey keeps its attention on the trail ahead. As a donkey can endure weeks of hard conditions with little rest, so true intercessors don’t stop until they get their answer. The men of Issachar were noted in Scripture as those who understood the times and knew what Israel should do (
    - type: text
      text: 1 Chron. 12:32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). They represent the intercessor of today.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: lying down between its saddlebags.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
