      metadata:
        usfm: MAT.4.15+MAT.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The disciples of Galilee were like a fleet of ships carrying the light of the gospel to the nations. It was from a mountaintop in Galilee that Jesus sent out his disciples to the nations like ships of mercy (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 28:16–19
      metadata:
        usfm: MAT.28.16+MAT.28.17+MAT.28.18+MAT.28.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). As the disciples went out with the glad tidings, they became havens of refuge and a blessing to many. The descendants of Zebulun were known as merchants dwelling near the sea who traded goods with others. Deborah praised their bravery for rallying to the cause and fighting against Sisera (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
