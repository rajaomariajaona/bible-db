document_id: GEN.49,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob’s Last Words
  - type: text
    content: 'Jacob called all his sons together and gathered them around his bedside. He said to them, “Let me prophesy to you about your future '
  - type: text
    content: destinies
  - type: text
    content: ':'
  - type: note
    content: The struggle between flesh and spirit had been fierce and protracted in Jacob, but as the end drew near, he ministered from a deep well as the Spirit of Prophecy fell upon him. Jacob became a shaper of destiny for his children as God revealed to him the futures of his sons. His prophecies were based both on their characters and on their actions. He spoke into their destinies and described God’s plan for each one. The prophecies of Gen. 49 also apply to the day in which we live. The rest of the Old Testament and all the New Testament are the development of Gen. 49. These verses require the whole Bible for their understanding. How profound were the prophecies of Jacob!
  '10':
  - type: text
    content: The scepter of rulership will not be taken from Judah,
  - type: text
    content: nor the ruler’s staff from his descendants,
  - type: text
    content: until the Shiloh comes
  - type: note
    content: Or “until he comes to Shiloh.” The Messiah is the One given the name “Shiloh” or “the One whose right it is [to take the throne]” (Ezek. 21:27). When Jesus stood before Pilate, the people willingly allowed the staff, or authority to rule, to depart from Judah (see John 18:31). They gave up the power to rule and handed it over to foreigners (the Romans). The departing of the staff was a sign that Shiloh, the One whose right it was to rule, had come! He has taken the staff as the emblem of his authority to rule over nations. See Num. 24:17; Ps. 45:6.
  - type: text
    content: and takes what is due him,
  - type: text
    content: for the obedience of nations belongs to him.
  '11':
  - type: text
    content: He will tether his donkey to the vine
  - type: text
    content: and his purebred colt to the choicest branch.
  - type: text
    content: He will wash his garments in wine
  - type: text
    content: and his robe in the blood of grapes.
  - type: note
    content: In this poetic prophecy, we are given wonderful descriptions of the fruit of Christ’s righteous rule over us. There will be great prosperity and fullness. He will impart his servant nature (the “donkey” tethered to a vine, the church) and the display of his splendor (the “purebred colt”; Jesus rode into Jerusalem riding on a colt) to the church (the “choicest branch”; we are the branches of his life, see John 15). His garments (gifts) will be washed in wine (soaked in the anointing of the Holy Spirit), and his robes (righteous life) in the blood of grapes (in the power of the Spirit and the blood, see Isa. 63:2).
  '12':
  - type: text
    content: His eyes are more exhilarating than wine
  - type: note
    content: As translated from the Septuagint. The Hebrew is “red with wine” or “darker than wine.”
  - type: text
    content: and his teeth whiter than milk.
  - type: note
    content: Judah’s dark eyes and white teeth point to the coming One, who will bring an abundance of wine and milk. His eyes are darker than wine—not in outward coloring, but from the inward, energizing wine of God’s Spirit. The redness of his eyes speaks of the fires of holy passion (see Rev. 1:14). His white teeth speak of the vigor and healthy power of his person. He is rich in love and rich in power! He has drunk deeply of the Holy Spirit and without measure from the milk of God’s loving heart.
  '13':
  - type: text
    content: '“Zebulun '
  - type: note
    content: Having spoken of the tribe from which Jesus was born (Judah), Jacob now prophesied about Zebulun, the tribe in whose territory he lived. Jesus began his ministry in the area settled by Zebulun. The people of Zebulun were the first to see this great Light dawning (see Matt. 4:15–16). The disciples of Galilee were like a fleet of ships carrying the light of the gospel to the nations. It was from a mountaintop in Galilee that Jesus sent out his disciples to the nations like ships of mercy (see Matt. 28:16–19). As the disciples went out with the glad tidings, they became havens of refuge and a blessing to many. The descendants of Zebulun were known as merchants dwelling near the sea who traded goods with others. Deborah praised their bravery for rallying to the cause and fighting against Sisera (see Judg. 5:14–18). Elon, one of the mighty deliverers mentioned in Judges, was a valiant man from this tribe (see Judg. 12:11–12). They were men of undivided loyalty to the king (1 Chron. 12:33).
  - type: text
    content: will settle along the seashore
  - type: text
    content: and become a safe harbor for ships,
  - type: text
    content: and his borders will extend to Sidon.
  - type: note
    content: Sidon is often a metonymy for Phoenicia, or southern Lebanon.
  '14':
  - type: text
    content: “Issachar is a strong donkey
  - type: note
    content: The sons of Issachar were donkeys; they were meant to be burden bearers. A horse loves speed; a donkey is made for carrying burdens. A donkey is focused and sure-footed when it walks on mountain heights. A horse needs blinders or things will easily distract it; but a donkey keeps its attention on the trail ahead. As a donkey can endure weeks of hard conditions with little rest, so true intercessors don’t stop until they get their answer. The men of Issachar were noted in Scripture as those who understood the times and knew what Israel should do (1 Chron. 12:32). They represent the intercessor of today.
  - type: text
    content: lying down between its saddlebags.
  - type: note
    content: The Hebrew word mishpetayim is a homonym for “sheepfolds.” Some scholars render it “campfires.” It implies that the burdened donkey found a resting place near the sheep, near the campfire, and between saddlebags, ready to carry afresh the burden of the Lord.
  '15':
  - type: text
    content: When he sees that his resting place is good,
  - type: text
    content: 'and his portion '
  - type: note
    content: Or “his land.”
  - type: text
    content: is so pleasant,
  - type: text
    content: then he will bend his shoulder to the burden
  - type: text
    content: and labor for his master.
  - type: note
    content: Issachar is truly a picture of the intercessor. There is an anointing of rest for those who give their lives in intercession. Nothing will shake their confidence, for they have entered the Spirit’s rest (see Heb. 3:11). Issachar, the donkey, saw that rest was good. Nobody else did. He saw the anointing of rest. Burdens must be carried, but carried within the pleasant land of resting in God’s sweet presence. We must bend our shoulders to the burden of the Lord. God has a burden to share, but he waits for intercessors to find the resting place and bend their shoulders to his burden. True sons of Issachar will submit to voluntary labor and become slaves to prayer! Issachar bore the burden because he could see by the Spirit what God wanted to do in the land. God offers his intercessors, his friends, the opportunity to partner with him to bring his will to pass. Remember, it was a donkey that carried Jesus into Jerusalem. Could it be that intercessors are those whom God has chosen to carry his presence into the nations? We are to release the intercessors, for the Master needs them.
  '16':
  - type: text
    content: '“Dan will provide justice '
  - type: note
    content: Or “judge.” This is a wordplay on the name Dan. See Gen. 30:6 and footnote.
  - type: text
    content: for his people
  - type: text
    content: as one of the tribes of Israel.
  '17':
  - type: text
    content: Dan will be a snake waiting by the roadside,
  - type: text
    content: like a snake in the grass.
  - type: text
    content: He bites the horse’s heels,
  - type: text
    content: making its rider fall backward.
  - type: note
    content: The destiny of the tribe of Dan was to provide justice. As the conscience of the nation, they were to excel in helping against the suppression of an enemy. Just as a snake can strike at the legs of a horse and overthrow a mightier animal, so God would anoint Dan to administer justice when the Israelites oppressed by others. Like a crafty serpent, this tribe would attack their enemies suddenly. Samson, one of the judges, was a Danite. Like a cunning serpent, Samson pulled down the house on the heads of the Philistines (see Judg. 16:23–30). Although the descendants of Dan won the victory, they became more independent and more proud. Soon, the tribe established a center of worship among them, with an idol made by Micah (see Judg. 18:30). The idolatry of the tribe of Dan became one of the greatest stumbling blocks for the nation of Israel. Dan also bit the heels of God’s people and made them stumble backwards! What potential we each have to bless or hinder God’s people. The genealogies of 1 and 2 Chronicles omit the tribe of Dan altogether. During Joshua’s conquest and allotment of the land, he gave the Danites no specific borders. Dan is not listed among the sealed tribes in Rev. 7.
  '18':
  - type: text
    content: '“I wait in hope for your salvation, O  '
  - type: text
    content: Yahweh
  - type: text
    content: '!'
  - type: note
    content: Jacob interrupted his prophecy with a prayer. See Ps. 119:166. The Hebrew word for “salvation” is similar to Yeshua, the Hebrew name for Jesus. Jacob, looking to the end of the ages, saw the coming of Jesus! Jesus is the true Judge of all the earth, who alone will provide justice for his people. Where Dan failed, Jesus will succeed in leading us into the salvation of the Lord.
  '19':
  - type: text
    content: “Gad will be raided by raiders,
  - type: text
    content: but he will raid at their heels and overcome them at last.
  - type: note
    content: Or literally, “A troop will troop upon Gad, but he will troop on their heels and overcome the troop at last.” Gad symbolizes the beginning of the victorious life of an overcomer breaking forth. Throughout Israel’s history, the Gadites were tremendous warriors. See Deut. 33:20–21; 1 Chron. 5:18–20; 12:8.
  '2':
  - type: text
    content: “Come together and listen to me, O sons of Jacob,
  - type: text
    content: Listen to your father Israel.
  - type: note
    content: The order of the blessings given by Jacob corresponds to the sons of Leah, then the sons of Bilhah, the sons of Zilpah, two more sons of Leah, and finally the two sons of Rachel (Joseph and Benjamin). In the book of Numbers, the order of Jacob’s sons is given by where their camps were situated in relation to the tabernacle. In Exodus, they are represented by the twelve gemstones on the breastplate of the high priest. In Revelation, they are the twelve gates of the New Jerusalem. One of the surprising things in the Bible is that the names of Jacob’s sons are inscribed on the gates of pearls through which God’s people must pass. The names of the gates of pearl are Jacob’s sons. This shows that God is the one who transforms the worst of us and makes us his pearls for eternity. All who enter the New Jerusalem will enter by the gates of the tribes. As Jacob’s spiritual sons, we can see our lives in the history and transformation of Jacob’s sons.
  '20':
  - type: text
    content: “Asher’s food will be rich,
  - type: text
    content: and he will provide delicacies fit for a king.
  - type: note
    content: Moses said of the tribe of Asher in Deut. 33:24–25 that their feet would be bathed in oil. Oil soaked feet speaks of walking in the anointing and richness of the Holy Spirit. Asher’s footprints would be in oil. He would be anointed with the oil of gladness. Everywhere he walked he would leave the anointing and blessing of the Holy Spirit. The tribe of Asher settled in one of the most fertile places in Canaan and became exporters of oil and crops. In Christ, we feast on food fit for kings, for we are in his royal family. Truly, we are blessed in grace—we have both a kingly family and royal dining! How would you like a prophetic word like this spoken over you? Asher’s portion would be blessed with royal delicacies. In the victory of Christ, Asher’s portion is yours!
  '21':
  - type: text
    content: “Naphtali is a doe set free,
  - type: note
    content: The Hebrew root word for “doe” can be translated “mighty man.” What a wonderful word picture this is. Psalm 22 has in its inscription, “To the tune of ‘The Deer at the Dawning of the Day.’ ” Psalm 22 prophesied the death and resurrection of our Lord. Jesus is the “Doe set free.” In Naphtali, we see Christ not only as the victorious Lion but also as the resurrected Doe skipping on the mountaintops in freedom. He is the Resurrected Doe of the Morning Glory! The name Naphtali means “wrestling.” What freedom we experience when we get up from our “wrestling match” a changed person and run to the mountains with Christ in victory (Song. 4:6–15). He has paid the price for our freedom; he has loosed us from our sins that we may run with him in resurrection life. We are his beautiful fawns.
  - type: text
    content: who bestows beauty on his offspring.
  - type: note
    content: Or “speaks beautiful words” or “speaks words that glisten.” How lovely and powerful are the words of our resurrected Doe. This could refer to the Great Commission of Matt. 28 when Jesus gathered his disciples together on a mountaintop and sent them out with beautiful words, good news to preach to all peoples. When we have tasted the resurrection, we have beautiful words to give others.
  '22':
  - type: text
    content: “Joseph is a fruitful vine,
  - type: text
    content: a fruitful vine growing by a spring,
  - type: note
    content: Or “near a spring” or “by a fountain.” Joseph, the clearest type of Christ in the Old Testament, is seen as a fruitful vine. The Lord Jesus called himself the Vine and us his branches (see John 15). When the Fruitful Vine lives through us, the fruit of the Spirit begins to be seen in our personalities (see Gal. 5:22–23). Jesus “branches out” through us, just as he branches out from the Father. Joseph, as a fruitful vine, dwelt near God. Joseph was God’s “branching out” in a man (see Zech. 3:8; 6:12). The “spring” or “fountain” is the life of the Father (see Gen. 16:14; Ps. 68:26; John 4:14). The source of his life and purity is from the spring of eternal life dwelling in him (see Ps. 1:3). All Joseph’s fruitfulness came from the water of that divine Spring.
  - type: text
    content: 'whose branches '
  - type: note
    content: Or “daughters.”
  - type: text
    content: run over a wall.
  - type: note
    content: Joseph, as a fruitful vine, has branches that run over the wall. The life of Christ in the believer will climb over a wall. Nothing will limit the branching forth of Christ in us when we walk in the Joseph anointing. We have many branches that climb over the walls around us. No matter how high the wall, our branches will run over it. Even if we are taken into captivity in Egypt’s dungeon, the springing well will cause our branches to climb over the walls. Nothing can hem you in if you dwell by the Fountain. We are branches connected to a fruitful Vine who will bear his likeness and the fruit of his life in us. The enemy will always try to erect walls to restrict our fruitfulness, but in the Vine will still climb over them all.
  '23':
  - type: text
    content: 'Persecutors '
  - type: note
    content: Or “Warriors [enemies].”
  - type: text
    content: fiercely attacked him;
  - type: text
    content: they pursued him with their bow and arrows.
  - type: note
    content: Arrows were often used metaphorically for slander and false accusation. Joseph was a victim of both. See Jer. 9:7–8. The slander and abuse of others could not keep Joseph from his destined promotion, nor can the words of others hold you back when you set your heart on pleasing God.
  '24':
  - type: text
    content: But Joseph’s bow remained steady,
  - type: text
    content: because the power of the Mighty One of Jacob strengthened him,
  - type: note
    content: The Hebrew text literally reads “the arms of his hands were made strong by the hands of the Mighty One of Jacob.” God is pictured as putting his hands on Joseph’s hands, placing his arms on Joseph’s arms. The mighty God laid his hand upon Joseph’s hand, stretched his arm upon the arm of Joseph, and strengthened him! And God will do this for you!
  - type: text
    content: 'by the name of the '
  - type: text
    content: loving
  - type: text
    content: ' Shepherd, the Rock of Israel.'
  - type: note
    content: See Ps. 80:1; Isa. 30:29. The Hebrew is “the Stone of Israel,” which may refer to the stone Jacob used as a pillow when he saw the stairway of the sky (see Gen. 28:11–12, 18).
  '25':
  - type: text
    content: 'The God of your father will help '
  - type: text
    content: and protect
  - type: text
    content: ' you;'
  - type: text
    content: the God who is more than enough will bless you.
  - type: text
    content: He will bless you
  - type: text
    content: ' with the blessings of heaven,'
  - type: text
    content: blessings of the deep that lie beneath,
  - type: text
    content: and blessings of the breast and womb.
  '26':
  - type: text
    content: The blessings of your father will be greater
  - type: text
    content: than the blessings of the eternal mountains,
  - type: text
    content: surpassing the blessings of my ancestors!
  - type: note
    content: The Hebrew is uncertain.
  - type: text
    content: May Joseph’s blessings crown his head
  - type: text
    content: and rest on the brow of the one set apart,
  - type: note
    content: The Hebrew implies Joseph was “separated like a Nazarite [for God].” It looked as if Joseph had been in exile for thirteen years when, in fact, he was being prepared by God and set apart for his true destiny.
  - type: text
    content: prince among his brothers.
  '27':
  - type: text
    content: “Benjamin is a ferocious wolf.
  - type: note
    content: Or possibly “Benjamin shall tear a wolf in pieces.” This would mean that Benjamin goes after the “wolf (nature),” tearing it into pieces and turning it into food for the hungry. This is all accomplished in the “morning” of a new day.
  - type: text
    content: He devours his prey;
  - type: text
    content: in the evening, he divides the spoil.”
  - type: note
    content: The men of Benjamin were warlike and known as fearless soldiers. See Judg. 3:15; 5:14; 20:15–16, 21, 25; 1 Chron. 12:2. King Saul was a Benjamite. In the New Testament, Saul of Tarsus, a Benjamite, became the apostle Paul, who fought the excellent fight of faith (see Phil. 3:5; 1 Tim. 6:12).
  '28':
  - type: text
    content: 'All these men became the twelve tribes of Israel. '
  - type: note
    content: This is the first of many biblical references to the “twelve tribes of Israel.”
  - type: text
    content: These were prophetic words their father spoke to them when he blessed them, blessing each son with a parting word appropriate to him.
  - type: heading
    content: The Death of Jacob
  '29':
  - type: text
    content: 'Afterward, Jacob '
  - type: text
    content: sat on the side of his bed
  - type: text
    content: ' and instructed his sons with these words: “I am about to join my people '
  - type: text
    content: in death
  - type: text
    content: . Bury me with my ancestors in the cave of the field of Ephron the Hittite—
  '3':
  - type: text
    content: “Reuben, my firstborn, you are my strength
  - type: text
    content: and the firstfruits of my manhood.
  - type: text
    content: You are preeminent in pride
  - type: text
    content: and surpassing others in power.
  '30':
  - type: text
    content: 'the cave in the field of Machpelah, near Mamre, in the land of Canaan. My grandfather Abraham purchased that field as a burial site from Ephron the Hittite. '
  '31':
  - type: text
    content: My grandfather
  - type: text
    content: ' Abraham and '
  - type: text
    content: my grandmother
  - type: text
    content: ' Sarah are buried there. '
  - type: text
    content: My father
  - type: text
    content: ' Isaac and '
  - type: text
    content: my mother
  - type: text
    content: ' Rebekah were buried there also. And it is the place I buried my wife Leah. '
  '32':
  - type: text
    content: 'So, '
  - type: text
    content: bury me there
  - type: text
    content: ', in that cave, in the field that was purchased from the Hittites.”'
  '33':
  - type: text
    content: When Jacob finished his final words of instruction to his sons, he lifted his feet onto the bed, breathed his last, and was gathered to his people.
  '4':
  - type: text
    content: You are unstable—as turbulent as floodwaters;
  - type: text
    content: you will no longer excel,
  - type: text
    content: for you have slept with my concubine
  - type: note
    content: Or “you went up to your father’s bed,” a euphemism for sleeping with his father’s concubine.
  - type: text
    content: and defiled yourself in your father’s bed!
  - type: note
    content: See Gen. 35:22. Joseph received Reuben’s birthright because he fled from the very defilement Reuben indulged in (see Gen. 39:7–12). Joseph did not lie with Potiphar’s wife, even though she begged him. Joseph gained by purity what Reuben lost by defilement. This birthright was the inheritance not only of a double portion of land and possessions but also the privileges of headship and priesthood. Reuben lost it all, even though he likely repented and was pardoned. You may be first in line for the blessing, but it is how you finish that counts. Sinful acts can disqualify you for spiritual privilege and leadership.
  '5':
  - type: text
    content: '“Simeon and Levi, you are '
  - type: text
    content: two of a kind
  - type: text
    content: ' and brothers '
  - type: text
    content: in crime
  - type: text
    content: ','
  - type: text
    content: for your swords have committed violent acts.
  '6':
  - type: text
    content: O my soul, let me not join in their secret plans.
  - type: note
    content: See Ps. 1:1.
  - type: text
    content: O my heart, never let me be counted in their assembly,
  - type: text
    content: for they killed men in fits of rage,
  - type: text
    content: and for pleasure, they maimed an ox.
  - type: note
    content: Figuratively, Joseph was the ox they tried to hurt (see Deut. 33:17).
  '7':
  - type: text
    content: Cursed be their anger, for it is fierce,
  - type: text
    content: and their wrath so relentless.
  - type: text
    content: 'I will divide your descendants throughout Jacob’s '
  - type: text
    content: territory
  - type: text
    content: and scatter them throughout Israel.
  - type: note
    content: Jacob chose neither Simeon nor Levi to replace Reuben as the firstborn, and they received no blessing because they were men of anarchy, not righteousness. Both Simeon and Levi had a disposition to kill others. Instead of using their swords for self-defense, they wielded their weapons in cruel rage to slaughter and plunder the city of Shechem (see Gen. 34:25–30). Simeon and Levi themselves were not cursed, only their anger. By all accounts, Simeon became the fiercest tribe among all of Israel. When Ezekiel described the final division of the land, he included a portion for Simeon (see Ezek. 48:24). His is one of the sealed tribes mentioned in Rev. 7:7. There is also a gate in the eternal city on which the name Simeon is inscribed (Rev. 21:12). In the New Testament another “Simeon” is named (Simon Peter), who once used a sword to cut off an ear. Even so, this Simeon’s destiny was to be “one who hears” from God (see Gen. 29:33 and footnote) and who blessed others with God’s Word by writing the books of 1 and 2 Peter. Concerning Levi, because his natural ways were transformed, he was privileged to carry God’s Urim and Thummim as a priest (see Deut. 33:8). The Levites had the wonderful privilege of serving God in his presence. Their inheritance was not a piece of land (see Josh. 14:4) but the privilege of intimate worship. From the story of the Levites, we learn that God can redeem and transform us, even if we have lost our blessing because of past failures. Moses, the author of Genesis, was from the tribe of Levi!
  '8':
  - type: text
    content: “O Judah, your brothers will praise you.
  - type: note
    content: Judah eventually became the source of leadership in Israel, the father of the Davidic dynasty, and ancestor of the Messiah, Jesus Christ. Even the word “Jew” is derived from the word Yehudi (“Judahite”). In the Spirit, Jacob saw the blessing of honor and power descending upon his son Judah. He would be a strong and courageous leader, with others showing him great honor. Remember, Judah became a changed man and displayed his true character by offering himself as a substitute for Benjamin (see Gen. 44:33–34). The tribe of Judah produced many kings, and some were quite notable in their exploits for God. A conquering, ruling tribe, Judah remained somewhat faithful when the nation divided. Judah was to have the leadership among his brothers. See 1 Chron. 5:2.
  - type: text
    content: You will conquer your foes in battle,
  - type: note
    content: Or “Your hand will be upon the neck of your enemies.”
  - type: text
    content: And your father’s sons will bow down before you.
  '9':
  - type: text
    content: Judah, my son, you are like a young lion
  - type: text
    content: who has devoured its prey and departed.
  - type: text
    content: Like a lion, he crouches and lies down,
  - type: text
    content: and like a lioness—who dares to awaken him?
  - type: note
    content: 'Judah is a wonderful picture of the One who is seen as the mighty Lion of Judah. Jesus Christ is the One who places his omnipotent hand on the neck of his enemies and delivers us. The lion, the king of beasts, terrifies its prey with his roar. When he seizes his prey, no one can resist him. After he has seized his prey, no one pursues him or seeks revenge, for the lion is a conqueror. Jacob compared Judah to three kinds of lions: a young lion, a mature hunting lion, and a lioness. This is more than a prophecy about the tribe of Judah becoming strong and mighty; it is a prophecy of One who will come from Judah to devour his prey. Jesus is not a raging Lion; he is a resting Lion who has conquered every foe. He crouched and took his cross but now lies down in perfect peace. His victory is total and secure. Who would dare rouse a lion when he is lying down after his kill, and who would rouse a lioness while she is guarding her cubs? These three phrases to describe the lion are truly descriptive of what our Savior-King has done for us! Jesus came as our Savior: “a young lion who has devoured its prey . . . and departed.” He laid down his life on the cross to destroy the one who held us in fear of death. He was raised again to be seated at God’s right hand: “like a lion, he crouches and lies down.” Today, he guards us with tender love and compassion “like a lioness.”'
