        text: In this poetic prophecy, we are given wonderful descriptions of the fruit of Christ’s righteous rule over us. There will be great prosperity and fullness. He will impart his servant nature (the “donkey” tethered to a vine, the church) and the display of his splendor (the “purebred colt”; Jesus rode into Jerusalem riding on a colt) to the church (the “choicest branch”; we are the branches of his life, see
    - type: usfm
