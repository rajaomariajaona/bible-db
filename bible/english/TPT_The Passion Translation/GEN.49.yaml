        text: Judah’s dark eyes and white teeth point to the coming One, who will bring an abundance of wine and milk. His eyes are darker than wine—not in outward coloring, but from the inward, energizing wine of God’s Spirit. The redness of his eyes speaks of the fires of holy passion (see
    - type: usfm
