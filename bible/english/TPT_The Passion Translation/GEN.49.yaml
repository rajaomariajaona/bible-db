        text: has in its inscription, “To the tune of ‘The Deer at the Dawning of the Day.’ ”
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psalm 22
      metadata:
