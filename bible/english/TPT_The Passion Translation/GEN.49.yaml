- type: usfm
  marker: q1
  children:
  - type: text
    text: making its rider fall backward.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 49:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The destiny of the tribe of Dan was to provide justice. As the conscience of the nation, they were to excel in helping against the suppression of an enemy. Just as a snake can strike at the legs of a horse and overthrow a mightier animal, so God would anoint Dan to administer justice when the Israelites oppressed by others. Like a crafty serpent, this tribe would attack their enemies suddenly. Samson, one of the judges, was a Danite. Like a cunning serpent, Samson pulled down the house on the heads of the Philistines (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 16:23–30
      metadata:
        usfm: JDG.16.23+JDG.16.24+JDG.16.25+JDG.16.26+JDG.16.27+JDG.16.28+JDG.16.29+JDG.16.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Although the descendants of Dan won the victory, they became more independent and more proud. Soon, the tribe established a center of worship among them, with an idol made by Micah (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Judg. 18:30
      metadata:
        usfm: JDG.18.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). The idolatry of the tribe of Dan became one of the greatest stumbling blocks for the nation of Israel. Dan also bit the heels of God’s people and made them stumble backwards! What potential we each have to bless or hinder God’s people. The genealogies of 1 and 2 Chronicles omit the tribe of Dan altogether. During Joshua’s conquest and allotment of the land, he gave the Danites no specific borders. Dan is not listed among the sealed tribes in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
