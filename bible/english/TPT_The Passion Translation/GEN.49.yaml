      marker: fr
      children:
      - type: text
        text: 49:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moses said of the tribe of Asher in
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 33:24–25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that their feet would be bathed in oil.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Oil soaked feet
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: speaks of walking in the anointing and richness of the Holy Spirit. Asher’s footprints would be in oil. He would be anointed with the oil of gladness. Everywhere he walked he would leave the anointing and blessing of the Holy Spirit. The tribe of Asher settled in one of the most fertile places in Canaan and became exporters of oil and crops. In Christ, we feast on food fit for kings, for we are in his royal family. Truly, we are blessed in grace—we have both a kingly family and royal dining! How would you like a prophetic word like this spoken over you? Asher’s portion would be blessed with royal delicacies. In the victory of Christ, Asher’s portion is yours!
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
