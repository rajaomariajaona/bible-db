      - type: text
        text: is a homonym for “sheepfolds.” Some scholars render it “campfires.” It implies that the burdened donkey found a resting place near the sheep, near the campfire, and between saddlebags, ready to carry afresh the burden of the Lord.
    marker-yv: yv-n
