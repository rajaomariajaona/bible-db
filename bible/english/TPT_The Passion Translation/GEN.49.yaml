      - type: text
        text: . Joseph received Reuben’s birthright because he fled from the very defilement Reuben indulged in (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Gen. 39:7–12
      metadata:
