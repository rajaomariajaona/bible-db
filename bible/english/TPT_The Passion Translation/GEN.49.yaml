        text: Gen. 34:25–30
      metadata:
        usfm: GEN.34.25+GEN.34.26+GEN.34.27+GEN.34.28+GEN.34.29+GEN.34.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). Simeon and Levi themselves were not cursed, only their anger. By all accounts, Simeon became the fiercest tribe among all of Israel. When Ezekiel described the final division of the land, he included a portion for Simeon (see
