        text: Joseph, as a fruitful vine, has branches that run over the wall. The life of Christ in the believer will climb over a wall. Nothing will limit the branching forth of Christ in us when we walk in the Joseph anointing. We have many branches that climb over the walls around us. No matter how high the wall, our branches will run over it. Even if we are taken into captivity in Egypt’s dungeon, the springing well will cause our branches to climb over the walls. Nothing can hem you in if you dwell by the Fountain. We are branches connected to a fruitful Vine who will bear his likeness and the fruit of his life in us. The enemy will always try to erect walls to restrict our fruitfulness, but in the Vine will still climb over them all.
