      marker: fr
      children:
      - type: text
        text: 49:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Judah is a wonderful picture of the One who is seen as the mighty Lion of Judah. Jesus Christ is the One who places his omnipotent hand on the neck of his enemies and delivers us. The lion, the king of beasts, terrifies its prey with his roar. When he seizes his prey, no one can resist him. After he has seized his prey, no one pursues him or seeks revenge, for the lion is a conqueror. Jacob compared Judah to three kinds of lions: a young lion, a mature hunting lion, and a lioness. This is more than a prophecy about the tribe of Judah becoming strong and mighty; it is a prophecy of One who will come from Judah to devour his prey. Jesus is not a raging Lion; he is a resting Lion who has conquered every foe. He crouched and took his cross but now lies down in perfect peace. His victory is total and secure. Who would dare rouse a lion when he is lying down after his kill, and who would rouse a lioness while she is guarding her cubs? These three phrases to describe the lion are truly descriptive of what our Savior-King has done for us! Jesus came as our Savior: “a young lion who has devoured its prey . . . and departed.” He laid down his life on the cross to destroy the one who held us in fear of death. He was raised again to be seated at God’s right hand: “like a lion, he crouches and lies down.” Today, he guards us with tender love and compassion “like a lioness.”'
    marker-yv: yv-n
