    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: prophesied the death and resurrection of our Lord. Jesus is the “Doe set free.” In Naphtali, we see Christ not only as the victorious Lion but also as the resurrected Doe skipping on the mountaintops in freedom. He is the Resurrected Doe of the Morning Glory! The name
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Naphtali
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: means “wrestling.” What freedom we experience when we get up from our “wrestling match” a changed person and run to the mountains with Christ in victory (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Song. 4:6–15
      metadata:
        usfm: SNG.4.6+SNG.4.7+SNG.4.8+SNG.4.9+SNG.4.10+SNG.4.11+SNG.4.12+SNG.4.13+SNG.4.14+SNG.4.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). He has paid the price for our freedom; he has loosed us from our sins that we may run with him in resurrection life. We are his beautiful fawns.
    marker-yv: yv-n
