    - type: usfm
      marker: ft
      children:
      - type: text
        text: The order of the blessings given by Jacob corresponds to the sons of Leah, then the sons of Bilhah, the sons of Zilpah, two more sons of Leah, and finally the two sons of Rachel (Joseph and Benjamin). In the book of Numbers, the order of Jacob’s sons is given by where their camps were situated in relation to the tabernacle. In Exodus, they are represented by the twelve gemstones on the breastplate of the high priest. In Revelation, they are the twelve gates of the New Jerusalem. One of the surprising things in the Bible is that the names of Jacob’s sons are inscribed on the gates of pearls through which God’s people must pass. The names of the gates of pearl are Jacob’s sons. This shows that God is the one who transforms the worst of us and makes us his pearls for eternity. All who enter the New Jerusalem will enter by the gates of the tribes. As Jacob’s spiritual sons, we can see our lives in the history and transformation of Jacob’s sons.
    marker-yv: yv-n
