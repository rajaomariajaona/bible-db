document_id: ZEC.10,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh Cares for His People
  - type: text
    content: 'Ask '
  - type: text
    content: Yahweh
  - type: text
    content: ' for rain'
  - type: text
    content: in the season of the latter rain.
  - type: text
    content: 'For '
  - type: text
    content: Yahweh
  - type: text
    content: ' is the Thunderstorm-Maker.'
  - type: text
    content: He will give them the outpouring of rain,
  - type: text
    content: causing the grain of the field to flourish.
  '10':
  - type: text
    content: For I will bring them home from Egypt
  - type: text
    content: and gather them back from Assyria;
  - type: text
    content: I will lead them back into the land of Gilead and Lebanon,
  - type: text
    content: yet even there they will not have enough space.
  '11':
  - type: text
    content: '“I '
  - type: note
    content: That is, the Lord. The Hebrew is “He,” and the Greek is “They [the people of Israel].”
  - type: text
    content: will cross the turbulent sea of trouble
  - type: text
    content: and calm its waves.
  - type: note
    content: Or “strike down its waves.” Jesus calmed the troubled sea (see Matt. 8:23–27; Mark 4:35–41).
  - type: text
    content: All the depths of the Nile will dry up.
  - type: text
    content: I will humble arrogant Assyria
  - type: text
    content: 'and dismantle the power '
  - type: note
    content: Or “scepter,” a metaphor for the power and dominion of Egypt.
  - type: text
    content: of Egypt.
  '12':
  - type: text
    content: I will make my people mighty in me,
  - type: text
    content: 'and they will walk '
  - type: note
    content: Or “glory [boast]” (LXX).
  - type: text
    content: in my name.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare it.”'
  '2':
  - type: text
    content: 'The household gods '
  - type: note
    content: Or “teraphim,” a term used for family gods passed down through generations, usually figurines in human form. God was saying, “Don’t ask idols to help you; it will be in vain. I am the one who will provide the rain, crops, and all that you need.”
  - type: text
    content: babble nonsense,
  - type: text
    content: the fortune tellers see false visions,
  - type: text
    content: dreamers peddle delusions and give comfort in vain.
  - type: text
    content: Therefore, the people have strayed like scattered, suffering, lost sheep
  - type: text
    content: because they have no shepherd.
  '3':
  - type: text
    content: “I am enraged at the so-called shepherds,
  - type: text
    content: and I will vent my anger and punish the proud leaders.
  - type: note
    content: Or literally “he-goats,” a metaphor for domineering, oppressive leaders. See Isa. 14:9; Ezek. 34:17.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: care deeply for my flock, the people of Judah.
  - type: text
    content: 'I will transform them '
  - type: text
    content: from a shepherdless flock of sheep
  - type: text
    content: 'into '
  - type: text
    content: brave
  - type: text
    content: ' battle horses of splendor.'
  '4':
  - type: text
    content: 'Out of them will emerge the cornerstone '
  - type: note
    content: This can be viewed as a Messianic prophecy of Christ, our Chief Cornerstone. See Ps. 118:22; Isa. 28:16; Mark 12:10; Acts 4:11; 1 Peter 2:5–8.
  - type: text
    content: and the tent peg.
  - type: note
    content: See Judg. 4:21–22; 5:26; Isa. 22:23–24.
  - type: text
    content: From them will emerge battle bows
  - type: text
    content: and warrior captains.
  - type: text
    content: 'Together '
  '5':
  - type: text
    content: they will be like warriors
  - type: text
    content: 'trampling '
  - type: text
    content: the foe
  - type: text
    content: ' in battle like mud in the streets.'
  - type: text
    content: 'They will fight because '
  - type: text
    content: Yahweh
  - type: text
    content: ' fights with them;'
  - type: text
    content: they will defeat and humiliate the horsemen.
  '6':
  - type: text
    content: “I will make the people of Judah mighty
  - type: text
    content: and the descendants of Joseph victorious.
  - type: text
    content: And I will bring them back home
  - type: text
    content: because I have compassion on them.
  - type: text
    content: They will be as though I had never rejected them,
  - type: text
    content: 'for I am '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God, and I will answer their prayers.'
  '7':
  - type: text
    content: 'The people of Israel '
  - type: note
    content: Or “Ephraim,” a metonymy for the Northern Kingdom of Israel.
  - type: text
    content: will be like warriors.
  - type: text
    content: Their hearts will be cheered as though by wine.
  - type: text
    content: Their children will see this and be full of joy,
  - type: text
    content: 'and their hearts will celebrate and rejoice in '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '8':
  - type: text
    content: '“I will whistle to call them home '
  - type: text
    content: as a shepherd gathers his sheep
  - type: text
    content: ','
  - type: text
    content: for I have redeemed them.
  - type: text
    content: And they will be as numerous as ever before.
  '9':
  - type: text
    content: Though I sowed my people as seed among the nations,
  - type: text
    content: they will remember me in those faraway lands.
  - type: text
    content: They will all return and rear their children.
