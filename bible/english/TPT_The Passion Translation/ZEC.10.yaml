document_id: ZEC.10,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' Cares for His People'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ask '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' for rain'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the season of the latter rain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is the Thunderstorm-Maker.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will give them the outpouring of rain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: causing the grain of the field to flourish.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will bring them home from Egypt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and gather them back from Assyria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lead them back into the land of Gilead and Lebanon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet even there they will not have enough space.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the Lord. The Hebrew is “He,” and the Greek is “They [the people of Israel].”
      marker-yv: yv-n
    - type: text
      text: will cross the turbulent sea of trouble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and calm its waves.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “strike down its waves.” Jesus calmed the troubled sea (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 8:23–27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 4:35–41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the depths of the Nile will dry up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will humble arrogant Assyria
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and dismantle the power '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “scepter,” a metaphor for the power and dominion of Egypt.
      marker-yv: yv-n
    - type: text
      text: of Egypt.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make my people mighty in me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and they will walk '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “glory [boast]” (LXX).
      marker-yv: yv-n
    - type: text
      text: in my name.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', declare it.”'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The household gods '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “teraphim,” a term used for family gods passed down through generations, usually figurines in human form. God was saying, “Don’t ask idols to help you; it will be in vain. I am the one who will provide the rain, crops, and all that you need.”
      marker-yv: yv-n
    - type: text
      text: babble nonsense,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the fortune tellers see false visions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dreamers peddle delusions and give comfort in vain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, the people have strayed like scattered, suffering, lost sheep
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they have no shepherd.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I am enraged at the so-called shepherds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will vent my anger and punish the proud leaders.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “he-goats,” a metaphor for domineering, oppressive leaders. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 14:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 34:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', Commander of Angel Armies,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: care deeply for my flock, the people of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will transform them '
    - type: usfm
      marker: it
      children:
      - type: text
        text: from a shepherdless flock of sheep
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: brave
    - type: text
      text: ' battle horses of splendor.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Out of them will emerge the cornerstone '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This can be viewed as a Messianic prophecy of Christ, our Chief Cornerstone. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 118:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 28:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mark 12:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Peter 2:5–8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: and the tent peg.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Judg. 4:21–22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 22:23–24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From them will emerge battle bows
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and warrior captains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Together '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will be like warriors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'trampling '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the foe
    - type: text
      text: ' in battle like mud in the streets.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will fight because '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' fights with them;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will defeat and humiliate the horsemen.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make the people of Judah mighty
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the descendants of Joseph victorious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And I will bring them back home
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I have compassion on them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be as though I had never rejected them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for I am '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' their God, and I will answer their prayers.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The people of Israel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 10:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Ephraim,” a metonymy for the Northern Kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: will be like warriors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their hearts will be cheered as though by wine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their children will see this and be full of joy,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and their hearts will celebrate and rejoice in '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I will whistle to call them home '
    - type: usfm
      marker: it
      children:
      - type: text
        text: as a shepherd gathers his sheep
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have redeemed them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will be as numerous as ever before.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I sowed my people as seed among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will remember me in those faraway lands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will all return and rear their children.
