document_id: MAT.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Superficial Spirituality versus Genuine Humility
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Jesus addressed both the crowds and his disciples and said, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The religious scholars and the Pharisees sit in Moses’ seat
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Moses’ seat was a special seat in the ancient synagogues where the most respected elders of the people would sit to instruct them. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 17:10–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 9:28–29
      metadata:
        usfm: JHN.9.28+JHN.9.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as the authorized interpreters of the Law.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So listen and follow what they teach, but don’t do what they do, for they tell you one thing and do another.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They tie on your backs an oppressive burden of religious obligations and insist that you carry them, but will never lift a finger to help ease your load.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Everything they do is done for show and to be noticed by others.
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: They want to be seen as holy
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ', so they wear oversized prayer boxes on their arms and foreheads with Scriptures inside, and wear extra-long tassels on their outer garments.'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 15:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 22:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They crave the seats of highest honor at banquets and in their meeting places.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And how they love to be admired by men with their titles of respect, aspiring to be recognized in public and have others call them ‘Reverend.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rabbi,” an Aramaic word that means “master,” “chief,” “great one,” or “teacher.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But you are to be different from that. You are not to be called ‘master,’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “rabbi.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you have only one Master, and you are all brothers and sisters.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And you are not to be addressed as ‘father,’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Hebrew Matthew and the Aramaic. The Greek is “Call no one father.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you have one Father, who is in heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Nor are you to be addressed as ‘teacher,’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “leader.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for you have one Teacher, the Anointed One.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jesus is emphasizing the priority of God over titles of men and over all teachers, fathers, and leaders. He is not teaching us to be disrespectful to teachers, fathers, and leaders, but that God must be in first place over all others. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 17:9–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The greatest among you will be the one who always serves others.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Remember this: If you have a lofty opinion of yourself and seek to be honored, you will be humbled. But if you have a modest opinion of yourself and choose to humble yourself, you will be honored.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Pronounces Seven Woes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Great sorrow awaits
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “woe.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you religious scholars and you Pharisees—such frauds and pretenders! You do all you can to keep people from experiencing the reality of heaven’s kingdom realm.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew Matthew is “You have hidden the keys of knowledge and shut the kingdom of heaven from the children of men.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Not only do you refuse to enter in, you also forbid anyone else from entering in!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “
  - type: usfm
    marker: wj
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Great sorrow awaits you religious scholars and you Pharisees—frauds and pretenders! For you eat up the widow’s household with the ladle of your prayers. Because of this, you will receive a greater judgment.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic and the Hebrew Matthew. The most reliable Greek manuscripts do not include this verse, and it is omitted by modern translations.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Great sorrow awaits you religious scholars and you Pharisees—such frauds and pretenders! For you will travel over land and sea to find one disciple, only to make him twice the child of hell
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “son of Gehenna.” Gehenna is an Aramaic word for the garbage dump outside of Jerusalem, which became a metaphor for hell.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: as yourselves.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You blind guides!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic is “blind rescuers.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Great sorrow awaits you, for you teach that there’s nothing binding when you swear by God’s temple, but if you swear by the gold of the temple, you are bound by your oath.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are deceived and blind!
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “you blind fools.”
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Which is greater, the gold or the temple that makes the gold sacred?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And you say that whoever takes an oath by swearing, ‘By the altar,’ it is nothing. But if you swear, ‘By the gift upon the altar,’ then you are obligated to keep your oath.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What deception! For what is greater, the gift or the altar that makes the gift sacred?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whoever swears by the altar swears by the altar and everything offered on it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whoever swears by the temple swears by it and the one who dwells in it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And whoever swears by heaven swears by the throne of God and by God, who sits upon it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Great sorrow awaits you religious scholars and Pharisees—frauds and pretenders! For you are obsessed with peripheral issues, like insisting on paying meticulous tithes on the smallest herbs that grow in your gardens.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You tithe on mint, dill, and cumin [caraway seed].” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Lev. 27:30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 18:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 14:22–23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The law of Moses only obligated tithing on grain, wine, and oil. The religious scholars added to the law their interpretation, which added vegetables and herbs to their list of what should be tithed.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'These matters are fine, yet you ignore the most important duties of all: to walk in the love of God, to display mercy to others, and to live with integrity.'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “faithfulness.” The Hebrew Matthew is “justice, loving-kindness, and truth.” The Aramaic is “justice, grace, and faith.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mic. 6:8
      metadata:
        usfm: MIC.6.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zech. 7:9
      metadata:
        usfm: ZEC.7.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Readjust your values and place first things first.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: What blind guides! Nitpickers! You will spoon out a gnat from your drink, yet at the same time you’ve gulped down a camel without realizing it!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is best seen as an Aramaic pun, because the Aramaic word for gnat is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: qamla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', and the word for camel is'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gamla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . The gnat becomes a metaphor of what is least and insignificant, for swallowing a gnat will not hurt you. But the camel becomes a picture of self-righteousness. To swallow a camel would indeed kill you.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Great sorrow awaits you religious scholars and Pharisees—frauds and imposters! You are like one who will only wipe clean the outside of a cup or bowl, leaving the inside filthy. You are foolish to ignore the greed and self-indulgence that live like germs within you.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are blind to your evil. Shouldn’t the one who cleans the outside also be concerned with cleaning the inside? You need to have more than clean dishes; you need clean hearts!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
