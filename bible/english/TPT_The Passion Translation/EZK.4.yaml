document_id: EZK.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Ezekiel Symbolizes the Siege of Jerusalem
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: said
  - type: text
    content: ', “Son of man, take a clay tile '
  - type: note
    content: Or “sun-dried brick [slab of clay].” These clay tiles were used for building materials and were generally about a foot wide and two feet long. Ezekiel, a man of clay, was the “clay tile” God wrote his message upon.
  - type: text
    content: 'and lay it in front of you. Sketch the city of Jerusalem on the tile. '
  '10':
  - type: text
    content: 'Of these grains, make a small loaf of bread '
  - type: note
    content: Or “weigh out twenty shekels [about 8 ounces or 220 grams] for a daily portion.”
  - type: text
    content: 'at a set time each day. '
  '11':
  - type: text
    content: 'And you are to ration the water you drink to two cups '
  - type: note
    content: Or “the sixth part of a hin,” about 1.26 pints (0.6 liter).
  - type: text
    content: 'at a set time each day. '
  '12':
  - type: text
    content: Eat the food as you would a barley cake. While everyone can see you, build a fire with dried human excrement, then bake the bread on the coals.”
  - type: note
    content: Ezekiel’s actions were meant to dramatize symbolically what would happen during the siege of Jerusalem. There would be little food and water and little or no fuel to build fires to cook it. And the same situation would follow them when they would be taken into captivity. Additionally, the mixture of polluted bread and its strange odor can symbolize the traditions of men that Paul said were like “manure” (Phil. 3:1–14; see Mark 7:13).
  '13':
  - type: text
    content: 'And '
  - type: text
    content: Yahweh
  - type: text
    content: ' said, “In this same way the Israelites will have to eat defiled food among the nations where I will disperse them.”'
  '14':
  - type: text
    content: 'Then I replied, “Oh no! Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', I have never defiled myself, from childhood until now. I have never eaten meat from any animal that died a natural death or was killed by wild animals. Nothing unclean has ever entered my mouth.”'
  - type: note
    content: See Acts 10:9–16.
  '15':
  - type: text
    content: '“Very well,” he said, “I will let you use dried cow manure '
  - type: note
    content: Dried cow dung is commonly used as fuel in the East.
  - type: text
    content: 'instead of human excrement as fuel to bake your bread.” '
  '16':
  - type: text
    content: 'Then he added, “Son of man, I am going to cut off Jerusalem’s food supply. In their horrible distress, the food they eat and the water they drink will be rationed. '
  '17':
  - type: text
    content: 'They will watch as it all runs out and look at each other in total despair. And they will '
  - type: text
    content: slowly
  - type: text
    content: ' die of starvation '
  - type: note
    content: Or literally “rot and decay.” There are four prophetic signs given in chs. 4–5. (1) The sign of the model of Jerusalem, 4:1–3. (2) The sign of the prophet lying bound on his side, 4:4–8. (3) The sign of the defiled bread, 4:9–17. (4) The sign of the barber’s razor, 5:1–4. It appears that all these prophetic signs took place during the period of Ezekiel’s silence (3:24–27). These signs became more eloquent than words.
  - type: text
    content: because of their guilt.”
  '2':
  - type: text
    content: 'Build a wall around it and, to '
  - type: text
    content: represent
  - type: text
    content: ' a siege, pile up a dirt ramp against the wall. Then prepare to attack it '
  - type: text
    content: as if it were a real city
  - type: text
    content: '. Surround it with armed soldiers and station battering rams on all sides. '
  '3':
  - type: text
    content: 'Then take an iron frying pan '
  - type: note
    content: The iron frying pan represented the total severing of relationship, like an iron wall of stubbornness that stood between God and the people of Jerusalem.
  - type: text
    content: 'and place it '
  - type: text
    content: on edge
  - type: text
    content: ' as though it were an iron wall between you and the city. Then direct your gaze toward the city, for it is under siege and you are besieging it. This is to be a sign, '
  - type: text
    content: an object lesson
  - type: text
    content: ' for the people of Israel.'
  '4':
  - type: text
    content: '“Then lie down on your left side and stay like that for 390 days. The people of Israel sinned for 390 years, and you will lie one day for each year they sinned. You will '
  - type: text
    content: symbolically
  - type: text
    content: ' bear '
  - type: note
    content: Or “lift up.”
  - type: text
    content: 'their guilt for as many days as you lie on that side and bear their punishment. '
  '6':
  - type: text
    content: 'After that, lie down a second time but turn over on your right side and stay like that for forty days, one day for each year of the guilt of the people of Judah. '
  '7':
  - type: text
    content: 'Then direct your gaze on '
  - type: text
    content: the model of
  - type: text
    content: ' the siege of Jerusalem, shake your fist at the city '
  - type: note
    content: Like a warrior prepared for battle, Ezekiel was to act like he was threatening the city to attack it. See Isa. 52:10.
  - type: text
    content: 'and prophesy against her. '
  '8':
  - type: text
    content: Behold, I am going to tie you up, and you will not be able to turn from one side to the other until the period of your seclusion is over.
  - type: note
    content: Or “until you have finished the days of your siege(s).” Ezekiel was commanded to be bound with ropes and to lie on his side for a total of 430 days as a sign of the guilt of Israel and Judah. The calculation of the years must be made in a religious sense, not political. For 390 years, Jerusalem was the religious capital of all Israel, even during the divided monarchy. The only time Jerusalem was the capital of Judah alone was for the 40 years before Josiah recaptured the northern region of Israel. The sins referred to here are in reference to the 430 years of sins against Yahweh’s temple-presence in Jerusalem, as the religious capital of both Israel and Judah. Additionally, 430 years was the duration Israel spent as slaves in Egypt.
  '9':
  - type: text
    content: '“Now take some wheat, barley, beans, lentils, and other grains; '
  - type: note
    content: Or “millet and spelt [emmer],” which are grains not generally used for bread.
  - type: text
    content: 'store them all together and make bread for yourself. This will be your food for the 390 days you are lying on your side. '
