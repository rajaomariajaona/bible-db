document_id: EZK.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezekiel Symbolizes the Siege of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: nd
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Yahweh
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: said
  - type: text
    text: ', “Son of man, take a clay tile '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sun-dried brick [slab of clay].” These clay tiles were used for building materials and were generally about a foot wide and two feet long. Ezekiel, a man of clay, was the “clay tile” God wrote his message upon.
    marker-yv: yv-n
  - type: text
    text: 'and lay it in front of you. Sketch the city of Jerusalem on the tile. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Build a wall around it and, to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: represent
  - type: text
    text: ' a siege, pile up a dirt ramp against the wall. Then prepare to attack it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: as if it were a real city
  - type: text
    text: '. Surround it with armed soldiers and station battering rams on all sides. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then take an iron frying pan '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The iron frying pan represented the total severing of relationship, like an iron wall of stubbornness that stood between God and the people of Jerusalem.
    marker-yv: yv-n
  - type: text
    text: 'and place it '
  - type: usfm
    marker: it
    children:
    - type: text
      text: on edge
  - type: text
    text: ' as though it were an iron wall between you and the city. Then direct your gaze toward the city, for it is under siege and you are besieging it. This is to be a sign, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: an object lesson
  - type: text
    text: ' for the people of Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 4-5
  - type: text
    text: '“Then lie down on your left side and stay like that for 390 days. The people of Israel sinned for 390 years, and you will lie one day for each year they sinned. You will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: symbolically
  - type: text
    text: ' bear '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “lift up.”
    marker-yv: yv-n
  - type: text
    text: 'their guilt for as many days as you lie on that side and bear their punishment. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'After that, lie down a second time but turn over on your right side and stay like that for forty days, one day for each year of the guilt of the people of Judah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then direct your gaze on '
  - type: usfm
    marker: it
    children:
    - type: text
      text: the model of
  - type: text
    text: ' the siege of Jerusalem, shake your fist at the city '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Like a warrior prepared for battle, Ezekiel was to act like he was threatening the city to attack it. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 52:10
      metadata:
        usfm: ISA.52.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'and prophesy against her. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Behold, I am going to tie you up, and you will not be able to turn from one side to the other until the period of your seclusion is over.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “until you have finished the days of your siege(s).” Ezekiel was commanded to be bound with ropes and to lie on his side for a total of 430 days as a sign of the guilt of Israel and Judah. The calculation of the years must be made in a religious sense, not political. For 390 years, Jerusalem was the religious capital of all Israel, even during the divided monarchy. The only time Jerusalem was the capital of Judah alone was for the 40 years before Josiah recaptured the northern region of Israel. The sins referred to here are in reference to the 430 years of sins against
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ’s temple-presence in Jerusalem, as the religious capital of both Israel and Judah. Additionally, 430 years was the duration Israel spent as slaves in Egypt.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“Now take some wheat, barley, beans, lentils, and other grains; '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “millet and spelt [emmer],” which are grains not generally used for bread.
    marker-yv: yv-n
  - type: text
    text: 'store them all together and make bread for yourself. This will be your food for the 390 days you are lying on your side. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Of these grains, make a small loaf of bread '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “weigh out twenty shekels [about 8 ounces or 220 grams] for a daily portion.”
    marker-yv: yv-n
  - type: text
    text: 'at a set time each day. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'And you are to ration the water you drink to two cups '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the sixth part of a hin,” about 1.26 pints (0.6 liter).
    marker-yv: yv-n
  - type: text
    text: 'at a set time each day. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eat the food as you would a barley cake. While everyone can see you, build a fire with dried human excrement, then bake the bread on the coals.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ezekiel’s actions were meant to dramatize symbolically what would happen during the siege of Jerusalem. There would be little food and water and little or no fuel to build fires to cook it. And the same situation would follow them when they would be taken into captivity. Additionally, the mixture of polluted bread and its strange odor can symbolize the traditions of men that Paul said were like “manure” (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Phil. 3:1–14
      metadata:
        usfm: PHP.3.1+PHP.3.2+PHP.3.3+PHP.3.4+PHP.3.5+PHP.3.6+PHP.3.7+PHP.3.8+PHP.3.9+PHP.3.10+PHP.3.11+PHP.3.12+PHP.3.13+PHP.3.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Mark 7:13
      metadata:
        usfm: MRK.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'And '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' said, “In this same way the Israelites will have to eat defiled food among the nations where I will disperse them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then I replied, “Oh no! Lord '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', I have never defiled myself, from childhood until now. I have never eaten meat from any animal that died a natural death or was killed by wild animals. Nothing unclean has ever entered my mouth.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Acts 10:9–16
      metadata:
        usfm: ACT.10.9+ACT.10.10+ACT.10.11+ACT.10.12+ACT.10.13+ACT.10.14+ACT.10.15+ACT.10.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“Very well,” he said, “I will let you use dried cow manure '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dried cow dung is commonly used as fuel in the East.
    marker-yv: yv-n
  - type: text
    text: 'instead of human excrement as fuel to bake your bread.” '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then he added, “Son of man, I am going to cut off Jerusalem’s food supply. In their horrible distress, the food they eat and the water they drink will be rationed. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'They will watch as it all runs out and look at each other in total despair. And they will '
  - type: usfm
    marker: it
    children:
    - type: text
      text: slowly
  - type: text
    text: ' die of starvation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 4:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or literally “rot and decay.” There are four prophetic signs given in chs.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 4–5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . (1) The sign of the model of Jerusalem,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:1–3
      metadata:
        usfm: EZK.4.1+EZK.4.2+EZK.4.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . (2) The sign of the prophet lying bound on his side,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:4–8
      metadata:
        usfm: EZK.4.4+EZK.4.5+EZK.4.6+EZK.4.7+EZK.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . (3) The sign of the defiled bread,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 4:9–17
      metadata:
        usfm: EZK.4.9+EZK.4.10+EZK.4.11+EZK.4.12+EZK.4.13+EZK.4.14+EZK.4.15+EZK.4.16+EZK.4.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . (4) The sign of the barber’s razor,
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 5:1–4
      metadata:
        usfm: EZK.5.1+EZK.5.2+EZK.5.3+EZK.5.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . It appears that all these prophetic signs took place during the period of Ezekiel’s silence (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 3:24–27
      metadata:
        usfm: EZK.3.24+EZK.3.25+EZK.3.26+EZK.3.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ). These signs became more eloquent than words.
    marker-yv: yv-n
  - type: text
    text: because of their guilt.”
