document_id: 1CO.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Immorality in the Church
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 1-2
    - type: text
      text: 'It’s been widely reported that there is gross sexual immorality among you—the kind of immorality that’s so revolting it’s not even tolerated by the social norms of unbelievers. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “pagans” (gentiles).
      marker-yv: yv-n
    - type: text
      text: 'Are you proud of the fact that one of your men is having sex with his stepmother? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1–2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “his father’s wife.” This incestuous relationship was forbidden by the law. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 18:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The sin is more than the illicit acts of this unnamed man, but the tolerance of a church that refused to correct and deal with the sin in their midst. Indeed, this chapter implies that the church was somewhat smug and arrogant (“puffed up”) over conduct that violated sensibility.
      marker-yv: yv-n
    - type: text
      text: Shouldn’t this heartbreaking scandal bring you to your knees in tears? You must remove the offender from among you!
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Yet in no way was I referring to avoiding contact with unbelievers who are immoral, or greedy, or swindlers, or those who worship other gods—for that would mean you’d have to isolate yourself from the world entirely! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “leave the world.” Our Lord Jesus has commanded his disciples to go into all the world and preach the gospel. We do not isolate ourselves from unbelievers but seek opportunities to share the gospel with them.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'But now I’m writing to you so that you would exclude from your fellowship anyone who calls himself a fellow believer and practices sexual immorality, or is consumed with greed, or is an idolater, or is verbally abusive or a drunkard or a swindler. Don’t mingle with them or even have a meal with someone like that. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 12-13
    - type: text
      text: What right do I have to pronounce judgment on unbelievers? That’s God’s responsibility. But those who are inside the church family are our responsibility to discern and judge. So it’s your duty to remove that wicked one from among you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated “Remove wickedness from among you.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Deut. 17:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The local church has the authority to discipline erring believers who persist in sin. Under the old covenant, that discipline was physical (execution by stoning), but under the new covenant, church discipline is spiritual. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matt. 18:15–17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Even though I am physically far away from you, my spirit is present with you. And as one who is present with you, I have already evaluated and judged the perpetrator. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: call a meeting
    - type: text
      text: ', and when you gather together in the name of our Lord Jesus, and you know my spirit is present with you in the infinite power of our Lord Jesus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: God had given Paul exceptional ability to have his spirit present, along with the power of God, in their meetings together.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'release this man over to Satan '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Satan means “accusing adversary.” When one is put out of the fellowship of the church family, the accuser has access to harass and oppress. There is a blessed protection in the fellowship of God’s people, for the Lord is present with us when we gather in his name.
      marker-yv: yv-n
    - type: text
      text: 'for the destruction of his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rebellious
    - type: text
      text: ' flesh, in hope that his spirit may be rescued and restored in the day of the Lord.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Turn this man over to Satan for the destruction of your fleshly works so that your spirit may be saved in the day of the Lord.” Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3–5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comprise one long, complicated Greek sentence. Many see this difficult passage as a prescription for ex-communication from the church. Aramaic speakers see in this passage the words “Turn him over to the accuser,” as a figure of speech meaning “Let him suffer the consequences of his actions.” We have similar sayings in English. “Let him stew in his own juices.” Or “Give him enough rope to hang himself.” Or “Let him learn his lesson the hard way.” Regardless, it is not a light thing to be handed over to Satan. Apparently this man learned his lesson and repented, for Paul instructs the Corinthians in his second letter to forgive and comfort him. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Cor. 2:6–11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Boasting '
    - type: usfm
      marker: it
      children:
      - type: text
        text: over your tolerance of sin
    - type: text
      text: ' is inappropriate. Don’t you understand that even a small compromise with sin permeates the entire fellowship, just as a little leaven permeates a batch of dough? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So remove every trace of your “leaven” of compromise with sin so that you might become new and pure again. For indeed, you are clean '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “unleavened.” Paul uses encouragement here to stir them to embrace a lifestyle that is already theirs. We are all made “clean” by the blood of the Lamb.
      marker-yv: yv-n
    - type: text
      text: 'because Christ, our Passover Lamb, has been sacrificed for us. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Verses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '6'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: contain the interesting metaphor of yeast and its effect on a batch of dough. It is literally “Don’t you know that a little yeast affects the whole batch of dough? You must clean out the old yeast so that you can become a new batch of dough. For you are without yeast, because Christ, our Passover Lamb, has been sacrificed.” Leaven is most often used as a metaphor for corrupting influence, especially false teaching.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So now we can celebrate our continual feast, not with the old “leaven,” the yeast of wickedness or bitterness, but we will feast on the freshly baked bread of innocence and holiness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Greek is “the unleavened bread of sincerity and unhidden reality.”
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Correcting a Misunderstanding
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I wrote you '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in my previous letter
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Paul is referring to a previous letter to the Corinthians, known as the lost letter, because a manuscript has never been found.
      marker-yv: yv-n
    - type: text
      text: 'asking you not to associate with those who practice sexual immorality. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In the Greek culture of that day, the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: pornos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: referred to male prostitution or paramour, although in this context it is not limited to one form of sexual immorality but includes all sexual acts forbidden by Scripture.
      marker-yv: yv-n
