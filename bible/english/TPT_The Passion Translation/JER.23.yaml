  - type: usfm
    marker: q1
    children:
    - type: text
      text: they lead wicked lives and misuse their power.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of a curse, the land is in mourning,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the pastures of the wilderness have dried up.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The irony is clear: they have committed spiritual adultery by the worship of the fertility deities, which has brought a curse of barrenness, drought, and the loss of a harvest.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophecy against the False Prophets
