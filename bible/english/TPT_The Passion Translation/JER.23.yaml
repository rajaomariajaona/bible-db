  '13':
  - type: text
    content: 'The prophets of Samaria '
  - type: note
    content: The capital of the Northern Kingdom of Israel was Samaria, which fell to the Assyrians in 722 BC.
  - type: text
    content: 'were disgusting '
  - type: note
    content: The Hebrew word for “disgusting” is the word tipelah, which means folly or foolishness. Tipelah comes from the root word tapel, which in its Semitic root means “tasteless” or “unseasoned.” The Phoenicians used the word tapel for unsalted fish. The Hebraic concept of wisdom is often equated with salt. A tasteless (saltless) prophet would therefore be unwise and foolish. See Matt. 5:13.
  - type: text
    content: to me!
  - type: text
    content: They prophesied in the name of Baal
  - type: text
    content: and led my people Israel astray.
  '14':
  - type: text
    content: 'And I have seen the prophets of Jerusalem do horrible acts:'
  - type: text
    content: adultery, persistent lying,
  - type: text
    content: and promoting the cause of the wicked,
  - type: text
    content: so that no one renounces his evil ways.
  - type: text
    content: To me, they are all depraved like Sodom,
  - type: text
    content: 'and the people '
  - type: text
