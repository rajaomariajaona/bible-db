  - type: text
    content: and caused them to turn from their evil ways
  - type: text
    content: and their wicked deeds.
  - type: note
    content: The false prophets could have become true prophets who spoke in the name of Yahweh if they had given themselves to God and heard his true message for the people. One purpose of the prophetic is to turn the wayward back to God and away from evil.
  '23':
  - type: text
    content: '“Am I just a God nearby,” demands '
  - type: text
    content: Yahweh
  - type: text
    content: ', “and not a God who is both near and far away? '
  - type: note
    content: Another possible meaning of this verse could be similar to “Am I a local deity or the God of the universe?”
  '24':
  - type: text
    content: 'Can anyone hide somewhere in secret where I do not see him?” declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. “Is there anywhere in heaven or on earth where I am not present?” declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '25':
  - type: text
    content: '“I have heard the lies of those prophets who claim to have received a message from me. ‘I dreamed a dream,’ they say, ‘I dreamed a dream!’ '
  '26':
  - type: text
    content: 'How long must this go on? These prophets of falsehood preach illusions from their own minds. '
  '27':
  - type: text
    content: 'Their dreams, by which one tries to outdo the other, make my people forget me just as their ancestors forgot me in favor of Baal. '
  '28':
  - type: text
    content: 'Let the prophet who has a dream tell the dream, but let the one who has my word speak my word faithfully. For what do straw and grain have in common?” '
  - type: note
    content: The “straw” is the dream, but the “grain” is the life-giving message spoken through God’s true prophets. Dreams are legitimate avenues of divine communication, but they can never take the place of the words of God. One is subjective, but the other contains life.
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '29':
  - type: text
    content: '“Is not my word like a '
  - type: text
    content: mighty
  - type: text
    content: ' fire? Is it not like a powerful hammer shattering a rock in pieces?” '
  - type: note
    content: In this context, it is God’s prophetic word that burns like fire and is a hammer that shatters the most stubborn resistance. In vv. 28–29, God gives three distinguishing marks of the word that comes from God’s mouth, in contrast to the words that come from lying prophets. (1) The word of God is wheat that has substance and nourishes God’s people. (2) The word of God is like fire that will kindle an awareness of the Holy God instead of leaving the hearer unmoved and untouched. (3) The word of God is like a powerful hammer that shatters the strongholds in the human heart.
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '3':
  - type: text
    content: '“But I will gather the remnant of my flock from all the countries where I have scattered them and will bring them back to their folds where they will thrive and increase in number.” '
