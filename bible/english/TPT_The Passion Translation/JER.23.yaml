  '5':
  - type: text
    content: '“Listen '
  - type: text
    content: to me
  - type: text
    content: '! I, the Lord, promise you that a time is coming when I will raise up a righteous Branch, '
  - type: note
    content: Or “a righteous Scion.” The prophecy of a coming righteous Branch is clearly Messianic (see Zech. 3:8; 6:12) and fulfilled by Jesus Christ. As the righteous Branch, he now branches out through us, who are “in life-union” with him by faith (John 15:1–9). He is a Branch from the Tree of Life, the Rod of priestly authority that budded in the Holy Place, the Branch of the Lampstand, and the Righteous One who makes all who believe in him righteous before God.
  - type: text
    content: 'who will sprout from David’s lineage. He will rule as their King, and his reign will prosper with wisdom and understanding. He will succeed in bringing justice and righteousness to all. '
  '6':
  - type: text
    content: 'Under his rule, Judah and Israel will be kept safe and secure. He will be known by this name: '
  - type: text
