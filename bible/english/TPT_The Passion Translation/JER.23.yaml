      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Another possible meaning of this verse could be similar to “Am I a local deity or the God of the universe?”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Can anyone hide somewhere in secret where I do not see him?” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. “Is there anywhere in heaven or on earth where I am not present?” declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have heard the lies of those prophets who claim to have received a message from me. ‘I dreamed a dream,’ they say, ‘I dreamed a dream!’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'How long must this go on? These prophets of falsehood preach illusions from their own minds. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their dreams, by which one tries to outdo the other, make my people forget me just as their ancestors forgot me in favor of Baal. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the prophet who has a dream tell the dream, but let the one who has my word speak my word faithfully. For what do straw and grain have in common?” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 23:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The “straw” is the dream, but the “grain” is the life-giving message spoken through God’s true prophets. Dreams are legitimate avenues of divine communication, but they can never take the place of the words of God. One is subjective, but the other contains life.
      marker-yv: yv-n
    - type: text
      text: 'declares '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
