      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Am I just a God nearby,” demands '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', “and not a God who is both near and far away? '
