  '39':
  - type: text
    content: 'then believe me, I will pick you up '
  - type: note
    content: The Hebrew verb for “pick . . . up” is of a similar root as the Hebrew word for “burden.” God is saying, “I will pick you up like a burden.” There is a continuing wordplay in the narrative that is lost in translation.
  - type: text
