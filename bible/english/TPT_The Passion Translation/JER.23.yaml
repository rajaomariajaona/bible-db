  '18':
  - type: text
    content: '“Yet which of these '
  - type: text
    content: prophets
  - type: text
    content: 'ever stood in '
  - type: text
    content: Yahweh
  - type: text
    content: ’s council
  - type: note
    content: The word for “council” (Hb. sod) is the same as the word for “secret.” The divine council is where God reveals his secrets and his plans (see Deut. 29:29). The divine council is said to meet with God to decide the fate of people and nations. For example, in 1 Kings 22:19–23, God allows the spirit-members of his council to decide how to carry out his decree that Ahab must die. See Job 15:8; Pss. 82:1; 89:5–7. Some see this divine council as made up of a rank of heavenly beings. The throne room of God has many thrones, indicating other ranks of rulers and powers in the heavenly realm. See Dan. 7:9–10; Rev. 4–5. Apparently, Jeremiah felt that God admitted a true prophet to these meetings, where he received Yahweh’s message (see Isa. 6:1–8), but the false prophets had not been present in the heavenly council.
  - type: text
    content: to hear and receive his word?
  - type: text
    content: Who has truly heard and paid attention to his message?
