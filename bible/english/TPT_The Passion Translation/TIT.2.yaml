segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Character Consistent with Godliness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Your duty is to teach them to embrace a lifestyle that is consistent with sound doctrine. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lead the male elders '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “old men.”
    marker-yv: yv-n
  - type: text
    text: into disciplined lives full of dignity and self-control. Urge them to have a solid faith, generous love, and patient endurance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Likewise with the female elders, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “old women.”
    marker-yv: yv-n
  - type: text
    text: 'lead them into lives free from gossip and drunkenness and to be teachers of beautiful things. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: As translated from the Aramaic. The Greek is “good things.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'This will enable them to teach the younger women '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul is contrasting the “elders” with the “younger” (Gr.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: neos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and could possibly be referring to those who are newly converted.
    marker-yv: yv-n
  - type: text
    text: 'to love their husbands, to love their children, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and to be self-controlled and pure, taking care of their household and being devoted to '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “supportive of.”
    marker-yv: yv-n
  - type: text
    text: their husbands. By doing these things the word of God will not be discredited.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Likewise, guide the younger men into living disciplined lives '
  - type: usfm
    marker: it
    children:
    - type: text
      text: for Christ
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Be an Example
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Above all, set yourself apart as a model of a life nobly lived. With dignity, demonstrate integrity in all that you teach. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Integrity in all that you teach” would imply serious study of God’s Word and its personal application in our lives, and not teaching impulsively from one’s opinion, which only leads to arguments and divisions. This kind of integrity gives someone the right to be heard.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Bring a clear, wholesome message '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “with sound speech.”
    marker-yv: yv-n
  - type: text
    text: that cannot be condemned, and then your critics will be embarrassed, with nothing bad to say about us.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul and Titus were a team. If one were to err, it would affect the other.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Servants '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “bondservants.”
    marker-yv: yv-n
  - type: text
    text: 'are to be supportive of '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “submitted to.”
    marker-yv: yv-n
  - type: text
    text: 'their masters and do what is pleasing in every way. They are not to be argumentative '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'nor steal '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Businesses today lose millions of dollars to employee theft. Believers are to be meticulously honest in the workplace.
    marker-yv: yv-n
  - type: text
    text: 'but prove themselves to be completely loyal and trustworthy. By doing this they will advertise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “adorn [beautify] the doctrine of God.”
    marker-yv: yv-n
  - type: text
    text: through all that they do the beautiful teachings of God our Savior.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Grace, Our Motivation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'God’s marvelous grace '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Grace extends God’s kindness and love to us every moment and makes us “worthy” of his acceptance. Grace is unconditional, unmerited, indescribable favor from God.
    marker-yv: yv-n
  - type: text
    text: 'has manifested '
  - type: usfm
    marker: it
    children:
    - type: text
      text: in person
  - type: text
    text: ', bringing salvation for everyone. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, grace has revealed a salvation available for everyone. Or “God’s marvelous grace has appeared to all, bringing salvation.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This same grace teaches us how to live each day as we turn our backs on ungodliness and indulgent lifestyles, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek word for “ungodliness” is singular, while the word for “indulgent lifestyles” is plural. This has led some scholars to believe that we are to turn our backs on both the root principle of ungodliness and the specific acts that result from ungodliness.
    marker-yv: yv-n
  - type: text
    text: 'and it equips us to live self-controlled, upright, godly lives in this present age. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: These three adjectives—“self-controlled,” “upright,” and “godly”—refer to our behavior, our behavior toward others and toward God.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For we continue to wait for the fulfillment of our hope in the dawning splendor '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the blessed hope and glorious appearing.” The Greek word is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: epiphaneia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (epiphany) and is a nominalized verb that means “a brightness shining all around.” It was through
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: epiphaneia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', the beautiful appearing of Christ as a baby, that a wonderful hope was brought to all the world.'
    marker-yv: yv-n
  - type: text
    text: 'of the glory of our great God and Savior, Jesus, the Anointed One. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “our great God and our Savior, Jesus Christ.” Note the four great truths of grace in vv.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 11–13
      metadata:
        usfm: TIT.2.11+TIT.2.12+TIT.2.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': (1) Grace is a person—“our great God and Savior, Jesus, the Anointed One.” (2) Grace brings salvation for all. (3) Grace educates us on how to live pure lives. (4) Grace brings a hope of the manifestation (appearing) of Christ. This is a hope worth waiting for.'
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He sacrificed himself for us that he might purchase our freedom from every lawless deed and to purify for himself a people who are his very own, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: We are a people encircled by God himself. The compound Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: periousios
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is translated from “around,” as a circle, and the verb “to be.” It can mean something surrounded by something. It can be charted by a dot within a circle. As the circle surrounds the dot, so God is around each one of his saints. The circle has the dot all to itself. So God has his very own all to himself. We are unique in that we belong only to him. Uniquely his, we are monopolized by God, taken into himself by grace through faith and surrounded by his love.
    marker-yv: yv-n
  - type: text
    text: passionate to do what is beautiful in his eyes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So preach these truths and exhort others to follow them. Be willing to expose sin in order to bring correction with full authority, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Speak these things; exhort or rebuke [speak in order to expose sin and bring correction] with all authority.”
    marker-yv: yv-n
  - type: text
    text: 'without being intimidated '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 2:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “disregarded.”
    marker-yv: yv-n
  - type: text
    text: by anyone.
