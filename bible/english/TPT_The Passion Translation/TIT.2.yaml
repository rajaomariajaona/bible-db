document_id: TIT.2,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Character Consistent with Godliness
  - type: text
    content: 'Your duty is to teach them to embrace a lifestyle that is consistent with sound doctrine. '
  '10':
  - type: text
    content: 'nor steal '
  - type: note
    content: Businesses today lose millions of dollars to employee theft. Believers are to be meticulously honest in the workplace.
  - type: text
    content: 'but prove themselves to be completely loyal and trustworthy. By doing this they will advertise '
  - type: note
    content: Or “adorn [beautify] the doctrine of God.”
  - type: text
    content: through all that they do the beautiful teachings of God our Savior.
  - type: heading
    content: God’s Grace, Our Motivation
  '11':
  - type: text
    content: 'God’s marvelous grace '
  - type: note
    content: Grace extends God’s kindness and love to us every moment and makes us “worthy” of his acceptance. Grace is unconditional, unmerited, indescribable favor from God.
  - type: text
    content: 'has manifested '
  - type: text
    content: in person
  - type: text
    content: ', bringing salvation for everyone. '
  - type: note
    content: That is, grace has revealed a salvation available for everyone. Or “God’s marvelous grace has appeared to all, bringing salvation.”
  '12':
  - type: text
    content: 'This same grace teaches us how to live each day as we turn our backs on ungodliness and indulgent lifestyles, '
  - type: note
    content: The Greek word for “ungodliness” is singular, while the word for “indulgent lifestyles” is plural. This has led some scholars to believe that we are to turn our backs on both the root principle of ungodliness and the specific acts that result from ungodliness.
  - type: text
    content: 'and it equips us to live self-controlled, upright, godly lives in this present age. '
  - type: note
    content: These three adjectives—“self-controlled,” “upright,” and “godly”—refer to our behavior, our behavior toward others and toward God.
  '13':
  - type: text
    content: 'For we continue to wait for the fulfillment of our hope in the dawning splendor '
  - type: note
    content: Or “the blessed hope and glorious appearing.” The Greek word is epiphaneia (epiphany) and is a nominalized verb that means “a brightness shining all around.” It was through epiphaneia, the beautiful appearing of Christ as a baby, that a wonderful hope was brought to all the world.
  - type: text
    content: 'of the glory of our great God and Savior, Jesus, the Anointed One. '
  - type: note
    content: 'Or “our great God and our Savior, Jesus Christ.” Note the four great truths of grace in vv. 11–13: (1) Grace is a person—“our great God and Savior, Jesus, the Anointed One.” (2) Grace brings salvation for all. (3) Grace educates us on how to live pure lives. (4) Grace brings a hope of the manifestation (appearing) of Christ. This is a hope worth waiting for.'
  '14':
  - type: text
    content: 'He sacrificed himself for us that he might purchase our freedom from every lawless deed and to purify for himself a people who are his very own, '
  - type: note
    content: We are a people encircled by God himself. The compound Greek word periousios is translated from “around,” as a circle, and the verb “to be.” It can mean something surrounded by something. It can be charted by a dot within a circle. As the circle surrounds the dot, so God is around each one of his saints. The circle has the dot all to itself. So God has his very own all to himself. We are unique in that we belong only to him. Uniquely his, we are monopolized by God, taken into himself by grace through faith and surrounded by his love.
  - type: text
    content: passionate to do what is beautiful in his eyes.
  '15':
  - type: text
    content: 'So preach these truths and exhort others to follow them. Be willing to expose sin in order to bring correction with full authority, '
  - type: note
    content: Or “Speak these things; exhort or rebuke [speak in order to expose sin and bring correction] with all authority.”
  - type: text
    content: 'without being intimidated '
  - type: note
    content: Or “disregarded.”
  - type: text
    content: by anyone.
  '2':
  - type: text
    content: 'Lead the male elders '
  - type: note
    content: Or “old men.”
  - type: text
    content: into disciplined lives full of dignity and self-control. Urge them to have a solid faith, generous love, and patient endurance.
  '3':
  - type: text
    content: 'Likewise with the female elders, '
  - type: note
    content: Or “old women.”
  - type: text
    content: 'lead them into lives free from gossip and drunkenness and to be teachers of beautiful things. '
  - type: note
    content: As translated from the Aramaic. The Greek is “good things.”
  '4':
  - type: text
    content: 'This will enable them to teach the younger women '
  - type: note
    content: Paul is contrasting the “elders” with the “younger” (Gr. neos) and could possibly be referring to those who are newly converted.
  - type: text
    content: 'to love their husbands, to love their children, '
  '5':
  - type: text
    content: 'and to be self-controlled and pure, taking care of their household and being devoted to '
  - type: note
    content: Or “supportive of.”
  - type: text
    content: their husbands. By doing these things the word of God will not be discredited.
  '6':
  - type: text
    content: 'Likewise, guide the younger men into living disciplined lives '
  - type: text
    content: for Christ
  - type: text
    content: .
  - type: heading
    content: Be an Example
  '7':
  - type: text
    content: 'Above all, set yourself apart as a model of a life nobly lived. With dignity, demonstrate integrity in all that you teach. '
  - type: note
    content: “Integrity in all that you teach” would imply serious study of God’s Word and its personal application in our lives, and not teaching impulsively from one’s opinion, which only leads to arguments and divisions. This kind of integrity gives someone the right to be heard.
  '8':
  - type: text
    content: 'Bring a clear, wholesome message '
  - type: note
    content: Or “with sound speech.”
  - type: text
    content: that cannot be condemned, and then your critics will be embarrassed, with nothing bad to say about us.
  - type: note
    content: Paul and Titus were a team. If one were to err, it would affect the other.
  '9':
  - type: text
    content: 'Servants '
  - type: note
    content: Or “bondservants.”
  - type: text
    content: 'are to be supportive of '
  - type: note
    content: Or “submitted to.”
  - type: text
    content: 'their masters and do what is pleasing in every way. They are not to be argumentative '
