document_id: ZEC.12,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh Rescues Jerusalem
  - type: text
    content: 'A prophecy. A message of '
  - type: text
    content: Yahweh
  - type: text
    content: ' to Israel.'
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', the Heaven-Unfolder, the Earth-Foundation-Layer, and the Spirit-Shaper of every human spirit, announce to you:'
  '10':
  - type: text
    content: 'But I will pour out over the rulers and people of Jerusalem the Spirit of Grace and the '
  - type: text
    content: Spirit of
  - type: text
    content: ' Prayer. '
  - type: note
    content: Or “the Spirit of Favor [acceptance] and the Spirit of Mercy [compassion].” The word translated “prayer” is tachanunim, which denotes pleas for favor or mercy, or “supplications.” By implication, it is the Spirit of Intercession that God always pours out prior to, and as a part of, revival.
  - type: text
    content: 'And they will gaze upon me, the Pierced One. '
  - type: note
    content: See John 19:37; Rev. 1:7.
  - type: text
    content: 'They will mourn for the one they pierced as though for an only child and weep bitterly for him as people weep for a firstborn child. '
  '11':
  - type: text
    content: 'In that day, '
  - type: note
    content: This is the seventh and final occurrence of the discourse marker “In that day” found in this chapter.
  - type: text
    content: 'the mourning in Jerusalem will be as great as the mourning for Hadad Rimmon in the Plain of Megiddo. '
  - type: note
    content: Hadad Rimmon is mentioned only here in the Bible. Hadad Rimmon may be the name of a West Semitic storm god (Tammuz; see Ezek. 8:14) since the etymology of Rimmon points to the connotation of “thunderer.” Others view it as a toponym for a high place (shrine) or village (see 2 Kings 5:18); however, archaeologists have not found a place with that name near the Plain of Megiddo. The Plain of Megiddo, also known as the Valley of Jezreel, is a large agricultural area in the north of Israel (see Judg. 6:33; Hos. 1:5).
  '12':
  - type: text
    content: 'And the people of the land will mourn each clan by itself and their women '
  - type: note
    content: Or “wives” and likewise in the following verses.
  - type: text
    content: 'by themselves:'
  - type: text
    content: The clan of David’s family and their women,
  - type: text
    content: the clan of Nathan’s family and their women,
  - type: note
    content: That is, Nathan the son of David (see 2 Sam. 5:14; 1 Chron. 3:5; 14:4; Luke 3:23–38).
  '13':
  - type: text
    content: the clan of Levi’s family and their women,
  - type: text
    content: the clan of Shimei’s family and their women,
  - type: note
    content: Shimei was likely the grandson of Levi and son of Gershon (see Num. 3:17–18; 1 Chron. 6:16–17).
  '14':
  - type: text
    content: and all the rest of the clans and their women.”
  '2':
  - type: text
    content: '“Behold! I am about to make Jerusalem an '
  - type: text
    content: intoxicating
  - type: text
    content: ' cup '
  - type: text
    content: filled with the wine of my wrath
  - type: text
    content: . Any nation around her who dares to drink from it will stagger and fall. And a siege will be laid against Judah and Jerusalem.
  '3':
  - type: text
    content: “In that day, when all the nations join forces against her, I will make Jerusalem like a heavy stone. All who lift it will severely injure themselves.
  '4':
  - type: text
    content: '“In that day, I will confuse every horse with panic and their riders with madness,” says '
  - type: text
    content: Yahweh
  - type: text
    content: . “
  - type: text
    content: Yes
  - type: text
    content: ', I will strike the horses of the enemies with blindness, but I will watch over the people of Judah. '
  '5':
  - type: text
    content: 'Then the leaders of Judah will say to themselves, ‘The people of Jerusalem are strong '
  - type: note
    content: Or “The people of Jerusalem are my strength.”
  - type: text
    content: 'because '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, is their God.’'
  '6':
  - type: text
    content: '“In that day, I will make Judah’s leaders like a blazing pot in a pile of dry brush, like a flaming torch in straw. They will destroy in all directions the surrounding nations. The people of Jerusalem will continue to live safely in their own city. '
  '7':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will save the tents of Judah first so that the descendants of David and the people of Jerusalem do not receive more honor than the rest of Judah.'
  '8':
  - type: text
    content: '“In that day, my '
  - type: text
    content: wraparound
  - type: text
    content: ' presence will protect the people of Jerusalem. And in that day '
  - type: text
    content: I will transform
  - type: text
    content: ' the weakest '
  - type: note
    content: Or “the most frail” or “the one who [repeatedly] stumbles.”
  - type: text
    content: 'among them to become as mighty as David, and the dynasty of David will be like God, like the angel of '
  - type: text
    content: Yahweh
  - type: text
    content: ' going before them.”'
  - type: note
    content: If the weakest will have the mighty strength of the famous King David, those who are of David’s descendants and have his character will have superhuman strength, the strength of God. See Ex. 4:16; see also Ex. 14:19; 23:20; 32:34.
  - type: heading
    content: The People Mourn
  '9':
  - type: text
    content: '“I am determined in that day to destroy all the nations who attack Jerusalem. '
