        text: Outline
    - type: text
      text: ': The focal point of the book of Joel is the dual manifestation of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. The structure of the book may be described as a chiasmus, comprised of two reinforcing, contrasting, and parallel emphases on that day—one negative and one positive. These two cycles hinge on the central call to repentance in 2:12–17. This pivotal central section serves as a transitional movement from presenting the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' as a dreadful judgment on his people for their disobedience to displaying that day as a manifestation of God’s supreme grace.'
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: 'A: 1:1–2:11 The day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' in judgment'
  - type: usfm
    marker: ili3
    children:
    - type: text
      text: 'i. Locust invasion (a): literal economic devastation of the land (1:1–12)'
  - type: usfm
    marker: ili3
    children:
    - type: text
      text: ii. Initial call to repentance (1:13–14)
  - type: usfm
    marker: ili3
    children:
    - type: text
      text: 'iii. Locust invasion (b): economic devastation continued (1:15–20)'
  - type: usfm
    marker: ili3
    children:
    - type: text
      text: 'iv. Locust invasion (c): likened to a military destruction of the land (2:1–11)'
  - type: usfm
    marker: ili2
    children:
    - type: text
      text: 'B: 2:12–17 Central call to repentance'
  - type: usfm
    marker: ili3
    children:
    - type: text
      text: i. Exhortation to return to the Lord God (2:12–14)
  - type: usfm
    marker: ili3
    children:
    - type: text
      text: 'ii. Instructions to declare a fast and summon a sacred assembly before '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' (2:15–17)'
  - type: usfm
