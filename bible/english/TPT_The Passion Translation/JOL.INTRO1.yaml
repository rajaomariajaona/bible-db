    content: Outline
  - type: text
    content: ': The focal point of the book of Joel is the dual manifestation of the day of '
  - type: text
    content: Yahweh
  - type: text
    content: '. The structure of the book may be described as a chiasmus, comprised of two reinforcing, contrasting, and parallel emphases on that day—one negative and one positive. These two cycles hinge on the central call to repentance in 2:12–17. This pivotal central section serves as a transitional movement from presenting the day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' as a dreadful judgment on his people for their disobedience to displaying that day as a manifestation of God’s supreme grace.'
  - type: text
    content: 'A: 1:1–2:11 The day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' in judgment'
  - type: text
    content: 'i. Locust invasion (a): literal economic devastation of the land (1:1–12)'
  - type: text
    content: ii. Initial call to repentance (1:13–14)
  - type: text
    content: 'iii. Locust invasion (b): economic devastation continued (1:15–20)'
  - type: text
    content: 'iv. Locust invasion (c): likened to a military destruction of the land (2:1–11)'
  - type: text
