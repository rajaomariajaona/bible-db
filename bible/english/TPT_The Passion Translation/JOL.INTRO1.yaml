      - type: text
        text: Seeing Jesus in the Book.
    - type: text
      text: ' The crucial passage in Joel that reveals an undeniable allusion to the person of Jesus and the gospel is 2:28–32: the spiritual consummation of the day of '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', with God’s promise to “pour out my Spirit on everyone.” The reason we can be so sure of this claim lies in the recorded words of the apostle Peter’s sermon on the day of Pentecost in Acts 2:14–41, in which he explicitly quoted this passage (Acts 2:17–21) and some three thousand people were converted and baptized (Acts 2:41)—a phenomenon that signaled the birth of the new covenant church community and the beginning of the new covenant age of the Spirit of God. Immediately prior to this sermon, the Holy Spirit was visibly poured out on Peter and the other apostles in the form of “tongues of fire.”'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: The focus of Peter’s message was on the reality and centrality of Jesus’ physical resurrection from the dead after his atoning sacrificial death on the cross that led to his body lying in the grave for three days. Following his resurrection, Jesus ascended to heaven and took his seat at the right hand of his Father. He then actioned the pouring out of the Spirit of God, initially on his apostolic followers and then on all of his followers from that point on. After Peter concluded his sermon, he immediately exhorted his listeners to repent in the name of Jesus Christ for the forgiveness of their sins (Acts 2:38). And if they did so, they would receive the same gift of the Spirit of God as the apostles had a short time before. None of this could have happened if Jesus Christ had not been crucified, had not perished and lain in the grave for three days, and had not risen from the dead and ascended to heaven to reign with his heavenly Father. The prophet Joel foresaw all of this in the climactic prophetic passage of Joel 2:28–32.
