    - type: text
      text: ' (“The Hope”). It echoes the bold aspirations of the final segment of Joel, where Zion is restored and God’s power and healing emanate from his dwelling among his people in new and powerful ways. Joel starts with a plague and ends with a promise.'
  - type: usfm
    marker: ip
    children:
