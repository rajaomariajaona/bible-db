document_id: RUT.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Tragedy Comes to a Family
  - type: text
    content: 'During the era when champion-deliverers ruled in Israel, '
  - type: note
    content: The period of the champion-deliverers, or judges, covered about three hundred years (1400–1100 BC).
  - type: text
    content: 'a severe famine overtook the land. Elimelech, '
  - type: note
    content: Elimelech means “my God is King.” He was a descendant of Nahshon, a prince of the tribe of Judah (see Num. 1:7), and an ancestor of David. Elimelech takes his family and leaves the “house of bread” (Bethlehem).
  - type: text
    content: 'a man of importance, '
  - type: note
    content: The Hebrew word ish means “a certain man.” In Rabbinic literature, ish refers to a man of importance either in learning or in social status (i.e., a wealthy man).
  - type: text
    content: 'left Bethlehem and immigrated to the country '
  - type: note
    content: Or “fields of Moab.” Moab was the son of Lot’s incestuous relationship with his daughter (see Gen. 19:30–37). Moab and his tribe lived east of the Dead Sea.
  - type: text
    content: 'of Moab. He took with him his wife Naomi '
  - type: note
    content: Naomi means “pleasant,” “gracious,” “sweet,” “agreeable,” “delightful,” and “unsurpassed in beauty.”
  - type: text
    content: 'and their two sons, Mahlon '
  - type: note
    content: Mahlon means “ill [sickly],” “worn out,” “afflicted,” or “wounded.” Ruth was married to Mahlon, a picture of the law that is unable to save us (see Acts 13:39; Rom. 3:20; 7:9–11; 8:3; Heb. 7:19). But Ruth (and we) will find another spouse (Boaz/Jesus).
  - type: text
    content: 'and Chilion. '
  - type: note
    content: Chilion means “destruction” or “consumption.”
  - type: text
    content: 'They belonged to the clan of Ephrath from Bethlehem in Judah. While residing in Moab, '
  '10':
  - type: text
    content: Through their tears
  - type: text
    content: ', they said to her, “No! We want to be with you and go with you to your people.”'
  '11':
  - type: text
    content: '“My daughters, you must go back,” Naomi answered. “Why do you want to come with me? Do you think I could have sons again to give you new husbands? '
  - type: note
    content: Naomi was referring to the law of levirate marriage, where the next closest relative marries a widow to produce a child and heir for the deceased husband so that their inheritance will not be lost.
  '12':
  - type: text
    content: 'Turn around my daughters and go back home, for I’m too old to marry again. Even if I thought there was still hope for me, and married today and gave birth to sons, '
  '13':
  - type: text
    content: 'would you wait until they had grown up? Should you live for so many years without husbands? No, my daughters, '
  - type: text
    content: you must not return with me
  - type: text
    content: '. My life is too bitter for you to share it with me because '
  - type: text
    content: Yahweh
  - type: text
    content: ' has brought calamity to my life!”'
  - type: note
    content: Or “the hand of Yahweh has gone out against me.”
  '14':
  - type: text
    content: 'When they heard Naomi’s words, Orpah and Ruth wailed and sobbed again. Then Orpah embraced and kissed her mother-in-law goodbye '
  - type: text
    content: and went back home
  - type: text
    content: ', '
  - type: note
    content: Orpah never saw the face of her kinsman-redeemer. She died as she lived—in Moab. See Luke 9:62; John 6:63–69.
  - type: text
    content: 'but Ruth clung tightly to Naomi and refused to let go of her. '
  - type: note
    content: The Hebrew verb for “cling tightly” is davqah. It carries the sense of permanent bonding (as with adhesive). The term is used in the Bible for covenantal devotion and clinging to God or a person. Loaded with spiritual meaning to a Hebrew speaker, this is the major term for spiritual cleaving to God in Rabbinic literature. In a sense, Ruth was entering into a covenant with Naomi. The Targum states, using several sources, that Ruth truly desired to be a proselyte to the Jewish faith. (See Ruth R. 2.20; B. Yev. 47b; and Rashi on 1:16–17.) The Jewess Naomi is a type of Israel, and the gentile Ruth is a type of the church. As Ruth stayed connected to Naomi (Israel), Naomi would lead her to Boaz (a type of our Kinsman-Redeemer, Jesus).
  '15':
  - type: text
    content: 'Naomi said, “Ruth, listen. Your sister-in-law is going back '
  - type: text
    content: to Moab
  - type: text
    content: ' to her people and to her gods. '
  - type: note
    content: One of the gods of the Moabites was Chemosh (see Num. 21:29; 1 Kings 11:33). On our road to full restoration, we all face a choice either to return to Judah (the land of praise) and to Boaz (Jesus) or to turn back to other gods and the old order.
  - type: text
    content: Now go with her.”
  '16':
  - type: text
    content: But tearfully
  - type: text
    content: ', Ruth insisted, “Please don’t ask me '
  - type: text
    content: again
  - type: text
    content: ' to leave you! I want to go with you and stay with you. Wherever you go, I will go; wherever you live, I will live. Your people will now be my people, and your God will now be my God. '
  - type: note
    content: See 1 Kings 22:4; 2 Kings 3:7; 2 Chron. 18:3; Jer. 31:33; 32:38. Ruth uses the name “Shaddai” (the Almighty) for God.
  '17':
  - type: text
    content: 'Wherever you die, I will die there, too; '
  - type: note
    content: The old Ruth died. We, too, have been crucified with Christ. His cross was our cross (see Rom. 6:1–23; Gal. 2:20).
  - type: text
    content: that’s where your people will bury me—
  - type: text
    content: next to you
  - type: text
    content: . Nothing but death itself will separate me from you, so help me God!”
  '18':
  - type: text
    content: When Naomi realized that Ruth’s heart was set on going with her, she said nothing more.
  - type: heading
    content: Naomi Returns to Bethlehem with Ruth
  '19':
  - type: text
    content: 'Naomi and Ruth traveled together '
  - type: text
    content: from Moab
  - type: text
    content: ' until they came to Bethlehem. The entire town was buzzing '
  - type: note
    content: Or “they were beside themselves.”
  - type: text
    content: 'when they heard they had arrived! Astounded, the women of the town said to one another, “Is this really Naomi, '
  - type: text
    content: who left us so long ago
  - type: text
    content: ?”
  '20':
  - type: text
    content: '“Please don’t call me Naomi anymore,” she insisted. “Instead, call me Marah, '
  - type: note
    content: Or “Mara [a form of Miriam].” Mara means “bitter.” Naomi means “pleasant.” Life sometimes takes us from seasons of great pleasure into a wilderness where we drink “bitter waters.” Yet in the wilderness, God will meet us and turn our bitterness into something sweet. See Ex. 15:22–27; Judg. 14:8; Rom. 8:28.
  - type: text
    content: 'because Almighty God '
  - type: note
    content: Or “Shaddai.” This name of God is found forty-eight times in the Bible, with thirty-one of them in Job and six in Genesis. It is the most frequently used name for God prior to Moses’ reception of the law at Sinai. Shaddai is taken from a Hebrew root word that carries multiple expressive meanings. It can mean “God of the holy mountain,” “God of the wilderness,” “God the destroyer of enemies,” “God the all-sufficient One,” “God the nurturer of babies [the breasted One],” “God the almighty,” “the sovereign God,” or “the God who is more than enough.”
  - type: text
    content: 'has dealt me a bitter blow. '
  '21':
  - type: text
    content: 'When I left here, my heart was full '
  - type: note
    content: That is, blessed with husband and sons.
  - type: text
    content: 'and content '
  - type: text
    content: with my family
  - type: text
    content: ', but '
  - type: text
    content: Yahweh
  - type: text
    content: ' has brought me back empty and destitute. Why call me by my name, ‘Pleasant,’ when '
  - type: text
    content: Yahweh
  - type: text
    content: ' has opposed me, and Almighty God has brought me so much trouble?”'
  '22':
  - type: text
    content: 'So Naomi returned to her village with Ruth, her Moabite daughter-in-law. '
  - type: note
    content: Naomi’s sojourn in Moab lasted about ten years.
  - type: text
    content: They arrived in Bethlehem just as the barley harvest had begun.
  - type: note
    content: The season of famine had ended, and the season of harvest had begun. In Israel, the harvest season for barley is from mid-March through mid-April, the time of the Feast of Passover.
  '3':
  - type: text
    content: 'Elimelech died and left his widow Naomi alone with her two sons. '
  '4':
  - type: text
    content: 'The two sons both married Moabite '
  - type: note
    content: According to Deuteronomy 23:3–6, the Israelites were not to marry with the Moabites, and the people of God were never to welcome the Moabites’ descendants into their families. However, it is the graciousness of Yahweh, who excludes such persons through sin, that will welcome through his abounding love and kindness the very ones he excluded. And Yahweh would go further in that this family line would include David, Solomon, and Jesus, and thus establish an eternal throne and home by turning the cursed into the blessed.
  - type: text
    content: 'women, Orpah '
  - type: note
    content: Orpah, a homonym, can mean either “fawn” or “[back of the] neck.” The proper name Orpah sounds like the Hebrew word for “rebellious.” Orpah turned her back on Naomi and returned to her home. Orpah was a good woman but not as faithful and resolute as Ruth.
  - type: text
    content: 'and Ruth. '
  - type: note
    content: The Hebrew name Ruth has many possible meanings, including “close friend,” “neighbor,” “shepherdess,” “beautiful,” “delightful,” “pleasing,” and “satisfied.” Ruth also sounds like the Hebrew word for “refreshing.” The name Ruth occurs 12 times in this book. However, the Hebrew word ruth (or a variant form) is used 187 times in the Old Testament. See also Matt. 1:5.
  - type: text
    content: 'About ten years later, '
  '5':
  - type: text
    content: Mahlon and Chilion also died and left Naomi all alone without husband or sons.
  - type: heading
    content: Naomi and Ruth Return to Bethlehem
  '6':
  - type: text
    content: 'Sometime later, Naomi heard that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had visited his people and blessed them with an abundant harvest; '
  - type: note
    content: Or “Yahweh had visited [observed, taken note of] his people and given them food.” It is notable that, while in the law, famine is attributed to unfaithfulness and fruitfulness to faithfulness, here Yahweh simply blessed the people in the days of the judges when everyone did whatever they wanted to do. This reveals the mercies of Yahweh, who still brings sunrise and rainfall to all, whether they do good or evil (see Matt. 5:45). The theme of the goodness and faithfulness of Yahweh runs throughout this book.
  - type: text
    content: 'so she decided to leave Moab with her daughters-in-law. '
  '7':
  - type: text
    content: 'With Orpah and Ruth at her side, Naomi began her journey to return to the land of Judah. '
  '8':
  - type: text
    content: But soon
  - type: text
    content: ' Naomi said to them, “Each of you, go back to your mother’s home. May '
  - type: text
    content: Yahweh
  - type: text
    content: ' show his loyal love and kindness to you—the same loyal love and kindness you’ve shown to me and to those who have died. '
  '9':
  - type: text
    content: 'And may '
  - type: text
    content: Yahweh
  - type: text
    content: ' give you another husband and cause you to find rest in a '
  - type: text
    content: happy
  - type: text
    content: ' home.”'
  - type: text
    content: 'Then Naomi '
  - type: text
    content: tenderly embraced
  - type: text
    content: ' Orpah and Ruth and kissed them goodbye, but they wailed and sobbed. '
