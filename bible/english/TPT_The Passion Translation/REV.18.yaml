document_id: REV.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Destruction of Babylon
  - type: text
    content: 'After these things, I saw another angel coming from the heavenly realm with great authority, and the earth was flooded with the brilliance of his splendor. '
  - type: note
    content: This mighty angel is clearly the Lord Jesus Christ. (1) The symbol of an angel stands for Jesus, the Messenger who is the Word of God. (2) Jesus frequently is described as the One who came down from heaven. (3) Jesus Christ has power and authority above all others. (4) He floods the earth with the brilliance of his splendor. No heavenly being is capable of drenching the earth with glory but the Lord Jesus Christ. This is the same “angel” of Rev. 10:1–2.
  '10':
  - type: text
    content: 'And they will stand far off, in fear of her torment, saying:'
  - type: text
    content: '“Oh no! '
  - type: text
    content: You who were once
  - type: text
    content: the great and powerful city Babylon,
  - type: text
    content: now in one hour your complete devastation has come!”
  '11':
  - type: text
    content: 'The earth’s merchants weep and mourn for her because no one buys their merchandise '
  - type: note
    content: Or “ship’s cargo.”
  - type: text
    content: 'anymore: '
  '12':
  - type: text
    content: 'their gold, silver, jewels, and pearls, their fine linen, purple cloth, silk, and scarlet cloth, all kinds of things made from expensive wood, '
  - type: note
    content: Or “citron wood.”
  - type: text
    content: 'ivory, bronze, iron, and marble, '
  '13':
  - type: text
    content: 'quantities of the finest cinnamon, spice, incense, frankincense, and myrrh, wine, olive oil, wheat, and the finest flour, sheep, cattle, horses, and their four-wheeled carriages, and the trafficking of the bodies and souls of people. '
  '14':
  - type: text
    content: 'And they will say:'
  - type: text
    content: 'The splendid delicacies '
  - type: note
    content: Or “ripe fruit,” a metaphor for life’s delicacies.
  - type: text
    content: for which your soul craved have departed from you. All your elegance and splendor have disappeared, never to be seen again.
  '15':
  - type: text
    content: 'Those who sold these things and grew wealthy through their business with her will stand far off, terrified over her torment. They will weep and mourn, saying:'
  '16':
  - type: text
    content: “How horrible!
  - type: text
    content: The great city that once clothed herself
  - type: text
    content: with fine linen and purple and scarlet cloth
  - type: text
    content: glittering with gold, with jewels and with pearls—
  '17':
  - type: text
    content: in one brief moment such vast wealth is now laid waste!”
  - type: text
    content: 'Every ship’s captain and his crew, every seafarer and mariner, watched from far away '
  '18':
  - type: text
    content: 'and cried out as they saw her go up in flames:'
  - type: text
    content: '“What city was ever like the great city '
  - type: text
    content: Babylon
  - type: text
    content: ?”
  '19':
  - type: text
    content: As a sign of their dismay
  - type: text
    content: ', they threw dust on their heads'
  - type: text
    content: 'and shouted with sobs and grief:'
  - type: text
    content: “How horrible, so horrible, O great city Babylon!
  - type: text
    content: For in one moment you suffered such destruction—
  - type: text
    content: you who once made the merchants on the sea
  - type: text
    content: so very wealthy.
  '2':
  - type: text
    content: 'He shouted out with a thunderous voice:'
  - type: text
    content: “Fallen, fallen is Babylon the great!
  - type: text
    content: She has become a demonic dwelling place,
  - type: text
    content: a prison for every unclean spirit, unclean bird,
  - type: text
    content: and every unclean, detestable beast.
  - type: note
    content: See Isa. 13:21; 34:11.
  '20':
  - type: text
    content: Rejoice over her, O heaven
  - type: text
    content: You apostles and prophets and holy believers, rejoice!
  - type: text
    content: For on your behalf
  - type: text
    content: God pronounced the judgment against her
  - type: text
    content: that she wanted to bring upon you!”
  '21':
  - type: text
    content: 'Then a mighty angel took up a stone, like a huge millstone, and threw it into the sea, saying:'
  - type: text
    content: “With this kind of sudden violence, the great city Babylon
  - type: text
    content: will be thrown down and exist no more.
  '22':
  - type: text
    content: The music of harps, minstrels, flutes, and trumpets
  - type: note
    content: Or “the sound of harpists, minstrels, flutists, and trumpeters.”
  - type: text
    content: will never grace your city again.
  - type: text
    content: No artisan of any trade will ever be found in you again,
  - type: text
    content: 'and the noise of factories '
  - type: note
    content: Or “the noise of a mill.”
  - type: text
    content: falls silent.
  '23':
  - type: text
    content: The light of a lamp will never shine in you again,
  - type: text
    content: 'Nor will the joyous laughter of a wedding '
  - type: note
    content: Or “the voice of bridegroom and bride.”
  - type: text
    content: be heard in you.
  - type: text
    content: Your merchants were once the tycoons of the world,
  - type: text
    content: But you deceived all the nations by your sorcery.
  - type: note
    content: Or “magic” (spells), which often involved drug usage.
  '24':
  - type: text
    content: For the bloodstains of the holy believers and the prophets
  - type: text
    content: and all who were slaughtered were all over you!”
  - type: note
    content: Or “her.”
  '3':
  - type: text
    content: All the nations have drunk
  - type: note
    content: Or “have fallen because of the wine of her wrath.”
  - type: text
    content: of the wine of her immoral passion,
  - type: text
    content: and the kings of the earth
  - type: text
    content: 'have committed fornication '
  - type: note
    content: A metaphor for idolatry.
  - type: text
    content: with her,
  - type: text
    content: and merchants of the earth have grown wealthy
  - type: text
    content: because of her power and luxury.”
  '4':
  - type: text
    content: 'Then I heard another voice from heaven saying:'
  - type: text
    content: “My people, come out from her
  - type: text
    content: so that you don’t participate in her sins
  - type: text
    content: and have no share with her in her plagues,
  '5':
  - type: text
    content: because her sins are heaped as high as heaven
  - type: note
    content: Or “her sins have touched the heaven.”
  - type: text
    content: and God has remembered her vileness.
  - type: note
    content: Or “iniquities.”
  '6':
  - type: text
    content: So repay to her double the same treatment
  - type: text
    content: that she has treated others with—
  - type: text
    content: pay her back double for all her deeds
  - type: text
    content: and make her drink twice the brew she gave to others!
  - type: note
    content: Or “Mix a double amount for her in the cup she mixed.”
  '7':
  - type: text
    content: With the same measure she exalted herself
  - type: text
    content: and lived luxuriously,
  - type: text
    content: give her that measure of torment and grief,
  - type: text
    content: because she said in her heart,
  - type: text
    content: ‘I am no widow; I rule as a queen!
  - type: text
    content: I will never experience grief.’
  '8':
  - type: text
    content: Therefore, her plagues will fall on her in one day—
  - type: text
    content: disease, famine and mourning.
  - type: text
    content: She will be burned with fire.
  - type: text
    content: For mighty is the Lord God who judges her!”
  '9':
  - type: text
    content: 'The kings of the earth who fornicated with her and lived in luxury with her will weep and wail over her when they see the smoke of the fire that burns her up. '
