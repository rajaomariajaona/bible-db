document_id: REV.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Destruction of Babylon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After these things, I saw another angel coming from the heavenly realm with great authority, and the earth was flooded with the brilliance of his splendor. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This mighty angel is clearly the Lord Jesus Christ. (1) The symbol of an angel stands for Jesus, the Messenger who is the Word of God. (2) Jesus frequently is described as the One who came down from heaven. (3) Jesus Christ has power and authority above all others. (4) He floods the earth with the brilliance of his splendor. No heavenly being is capable of drenching the earth with glory but the Lord Jesus Christ. This is the same “angel” of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Rev. 10:1–2
      metadata:
        usfm: REV.10.1+REV.10.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He shouted out with a thunderous voice:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Fallen, fallen is Babylon the great!
- type: usfm
  marker: q1
  children:
  - type: text
    text: She has become a demonic dwelling place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a prison for every unclean spirit, unclean bird,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and every unclean, detestable beast.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Isa. 13:21
      metadata:
        usfm: ISA.13.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 34:11
      metadata:
        usfm: ISA.34.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: All the nations have drunk
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “have fallen because of the wine of her wrath.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: of the wine of her immoral passion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the kings of the earth
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'have committed fornication '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A metaphor for idolatry.
    marker-yv: yv-n
  - type: text
    text: with her,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and merchants of the earth have grown wealthy
- type: usfm
  marker: q1
  children:
  - type: text
    text: because of her power and luxury.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then I heard another voice from heaven saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My people, come out from her
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that you don’t participate in her sins
- type: usfm
  marker: q1
  children:
  - type: text
    text: and have no share with her in her plagues,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: because her sins are heaped as high as heaven
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “her sins have touched the heaven.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and God has remembered her vileness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “iniquities.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: So repay to her double the same treatment
- type: usfm
  marker: q1
  children:
  - type: text
    text: that she has treated others with—
- type: usfm
  marker: q1
  children:
  - type: text
    text: pay her back double for all her deeds
- type: usfm
  marker: q1
  children:
  - type: text
    text: and make her drink twice the brew she gave to others!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Mix a double amount for her in the cup she mixed.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: With the same measure she exalted herself
- type: usfm
  marker: q1
  children:
  - type: text
    text: and lived luxuriously,
- type: usfm
  marker: q1
  children:
  - type: text
    text: give her that measure of torment and grief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because she said in her heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I am no widow; I rule as a queen!
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will never experience grief.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Therefore, her plagues will fall on her in one day—
- type: usfm
  marker: q1
  children:
  - type: text
    text: disease, famine and mourning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will be burned with fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For mighty is the Lord God who judges her!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The kings of the earth who fornicated with her and lived in luxury with her will weep and wail over her when they see the smoke of the fire that burns her up. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And they will stand far off, in fear of her torment, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Oh no! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: You who were once
- type: usfm
  marker: q1
  children:
  - type: text
    text: the great and powerful city Babylon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: now in one hour your complete devastation has come!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The earth’s merchants weep and mourn for her because no one buys their merchandise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “ship’s cargo.”
    marker-yv: yv-n
  - type: text
    text: 'anymore: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'their gold, silver, jewels, and pearls, their fine linen, purple cloth, silk, and scarlet cloth, all kinds of things made from expensive wood, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “citron wood.”
    marker-yv: yv-n
  - type: text
    text: 'ivory, bronze, iron, and marble, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'quantities of the finest cinnamon, spice, incense, frankincense, and myrrh, wine, olive oil, wheat, and the finest flour, sheep, cattle, horses, and their four-wheeled carriages, and the trafficking of the bodies and souls of people. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'And they will say:'
- type: usfm
  marker: mi
  children:
  - type: text
    text: 'The splendid delicacies '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “ripe fruit,” a metaphor for life’s delicacies.
    marker-yv: yv-n
  - type: text
    text: for which your soul craved have departed from you. All your elegance and splendor have disappeared, never to be seen again.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Those who sold these things and grew wealthy through their business with her will stand far off, terrified over her torment. They will weep and mourn, saying:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “How horrible!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The great city that once clothed herself
- type: usfm
  marker: q1
  children:
  - type: text
    text: with fine linen and purple and scarlet cloth
- type: usfm
  marker: q1
  children:
  - type: text
    text: glittering with gold, with jewels and with pearls—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: in one brief moment such vast wealth is now laid waste!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Every ship’s captain and his crew, every seafarer and mariner, watched from far away '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and cried out as they saw her go up in flames:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“What city was ever like the great city '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Babylon
  - type: text
    text: ?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: it
    children:
    - type: text
      text: As a sign of their dismay
  - type: text
    text: ', they threw dust on their heads'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and shouted with sobs and grief:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “How horrible, so horrible, O great city Babylon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For in one moment you suffered such destruction—
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who once made the merchants on the sea
- type: usfm
  marker: q1
  children:
  - type: text
    text: so very wealthy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rejoice over her, O heaven
- type: usfm
  marker: q1
  children:
  - type: text
    text: You apostles and prophets and holy believers, rejoice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For on your behalf
- type: usfm
  marker: q1
  children:
  - type: text
    text: God pronounced the judgment against her
- type: usfm
  marker: q1
  children:
  - type: text
    text: that she wanted to bring upon you!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then a mighty angel took up a stone, like a huge millstone, and threw it into the sea, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With this kind of sudden violence, the great city Babylon
- type: usfm
  marker: q1
  children:
  - type: text
    text: will be thrown down and exist no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The music of harps, minstrels, flutes, and trumpets
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the sound of harpists, minstrels, flutists, and trumpeters.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: will never grace your city again.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No artisan of any trade will ever be found in you again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and the noise of factories '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the noise of a mill.”
    marker-yv: yv-n
  - type: text
    text: falls silent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The light of a lamp will never shine in you again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Nor will the joyous laughter of a wedding '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the voice of bridegroom and bride.”
    marker-yv: yv-n
  - type: text
    text: be heard in you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your merchants were once the tycoons of the world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you deceived all the nations by your sorcery.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “magic” (spells), which often involved drug usage.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For the bloodstains of the holy believers and the prophets
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all who were slaughtered were all over you!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 18:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “her.”
    marker-yv: yv-n
