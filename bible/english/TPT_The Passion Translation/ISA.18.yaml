document_id: ISA.18,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy regarding Cush
  - type: text
    content: Ah, the land of whirring wings,
  - type: note
    content: Or “locusts.”
  - type: text
    content: that is beyond the rivers of Cush,
  - type: note
    content: The Hebrew word kuwsh (Ethiopia, or modern-day Sudan) means “burned” or “darkened.”
  '2':
  - type: text
    content: sending their messengers by the way of the Nile
  - type: text
    content: in papyrus vessels gliding on the water!
  - type: text
    content: Go, you swift messengers,
  - type: text
    content: 'to a tall, smooth-skinned people '
  - type: note
    content: The meaning of this Hebrew clause is uncertain.
  - type: text
    content: feared far and wide,
  - type: text
    content: to a mighty conquering nation whose land the rivers divide.
  - type: note
    content: That is, the Upper Nile region. The land is divided by the White Nile and the Blue Nile rivers.
  '3':
  - type: text
    content: Everyone everywhere, all who dwell on the earth,
  - type: text
    content: when a signal flag is raised on the mountain, take notice!
  - type: text
    content: When the shofar is blown, listen!
  '4':
  - type: text
    content: 'Here is what the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' said to me:'
  - type: text
    content: '“I will rest calm and confident '
  - type: note
    content: See Isa. 57:20; 62:1; Heb. 3–4.
  - type: text
    content: as I look from my dwelling place,
  - type: note
    content: The body of Christ is now his dwelling place (see Eph. 2:19–22).
  - type: text
    content: serene as on a pleasant summer day
  - type: note
    content: The meaning of this Hebrew clause is uncertain.
  - type: text
    content: 'or as a cool, refreshing cloud '
  - type: note
    content: See Isa. 19:1; 25:5; 44:22; 60:8.
  - type: text
    content: in the heat of harvest.”
  '5':
  - type: text
    content: Before the harvest, when the bud is ripening
  - type: text
    content: and the flower finishes, he will take his pruning hooks
  - type: text
    content: and cut off the shoots and remove them.
  '6':
  - type: text
    content: They will all be left for the birds of prey on the mountains
  - type: text
    content: 'and for the wild animals '
  - type: text
    content: to devour
  - type: text
    content: .
  - type: text
    content: Birds will eat them throughout the summer,
  - type: text
    content: 'and the animals will '
  - type: text
    content: gnaw on the bones of the fallen
  - type: text
    content: ' all winter.'
  - type: note
    content: Scripture often mentions birds of prey and wild animals as symbols of demonic powers.
  '7':
  - type: text
    content: At that time, a tall, smooth-skinned people will bring gifts of tribute
  - type: note
    content: See Pss. 68:28–29; 76:11; Matt. 2:11.
  - type: text
    content: 'to the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: They are a people feared far and wide,
  - type: text
    content: a mighty conquering nation whose land the rivers divide.
  - type: text
    content: They will bring their gifts to Mount Zion,
  - type: text
    content: 'the place of the name of the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: Commander of Angel Armies.
