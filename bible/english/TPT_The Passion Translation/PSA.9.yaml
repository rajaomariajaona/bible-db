document_id: PSA.9,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Triumphant Thanks
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: To the tune of “The Secrets of the Son”
  - type: note
    content: As translated by Augustine, an early church father. The Hebrew is “to the death of the son.” Because of David’s sin with Bathsheba, the son born to them had to die, not as a judgment upon the child, but as a sacrifice to cleanse David of his sin. This was God’s way of restoring David. A sinless son bore the guilt. This is a picture of Jesus!
  - type: text
    content: A Psalm of David
  - type: heading
    content: Delighting in God
  - type: text
    content: 'I will worship you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: text
    content: with extended hands
  - type: text
    content: as my whole heart erupts with praise!
  - type: note
    content: The Hebrew word for “praise” is yadah, which can mean “to shoot [an arrow]” or “to worship with extended hands.” It implies an ecstatic burst of praise that is thrown into the heavens like a shout. It is the praise that breaks strongholds. A fresh determination arose in David’s spirit to praise his way into victory.
  - type: text
    content: I will tell everyone everywhere about your wonderful works!
  '10':
  - type: text
    content: 'For everyone who knows your '
  - type: text
    content: wonderful
  - type: text
    content: ' name'
  - type: text
    content: keeps putting their trust in you.
  - type: text
    content: They can count on you for help no matter what.
  - type: text
    content: O Lord, you will never, no never, neglect those
  - type: text
    content: who come to you.
  '11':
  - type: text
    content: Listen, everyone! Sing out your praises to the God
  - type: text
    content: who rules in Zion!
  - type: text
    content: Tell the world about all the miracles he has done!
  '12':
  - type: text
    content: He tracks down killers and avenges bloodshed,
  - type: text
    content: but he will never forget the ones forgotten by others,
  - type: text
    content: hearing every one of their cries for justice.
  - type: heading
    content: Daughter of Zion
  '13':
  - type: text
    content: So now, O Lord, don’t forget me.
  - type: text
    content: Have mercy on me.
  - type: text
    content: Take note of how I’ve been humiliated
  - type: text
    content: at the hands of those who hate me.
  - type: text
    content: You are the one who can snatch me away from the gates of death.
  '14':
  - type: text
    content: Then I will sing your praises as I pass through the gates
  - type: text
    content: of the Daughter of Zion, rejoicing in your deliverance!
  '15':
  - type: text
    content: For the nations get trapped
  - type: text
    content: in the very snares they set for others.
  - type: text
    content: The hidden trap they set for the weak
  - type: text
    content: has snapped shut upon themselves!
  '16':
  - type: text
    content: Yahweh
  - type: text
    content: ' is famous for his justice.'
  - type: text
    content: While the wicked are digging a pit for others,
  - type: text
    content: they are actually setting the terms for their own judgment.
  - type: text
    content: They will fall into their own pit.
  - type: text
    content: Consider the truth of this
  - type: text
    content: ' '
  - type: note
    content: The Hebrew word higgaion means “to consider the truth of the matter.”
  - type: text
    content: and pause in his presence
  - type: heading
    content: Destruction of the Wicked
  '17':
  - type: text
    content: Don’t forget this
  - type: text
    content: ': all the wicked will one day'
  - type: text
    content: fall into the darkness of death’s domain,
  - type: note
    content: This is the word Sheol, the underworld, which is frequently translated “hell.”
  - type: text
    content: including the nations that forget God and reject his ways.
  '18':
  - type: text
    content: He will not forget the needs of the poor.
  - type: text
    content: One day the needy will be remembered,
  - type: text
    content: and their hopes will not be forever dashed in disappointment.
  '19':
  - type: text
    content: Yahweh
  - type: text
    content: ', it’s time to arise and judge'
  - type: text
    content: the nations who defy you.
  - type: text
    content: Don’t let rebellious men triumph.
  '2':
  - type: text
    content: I will be glad and shout in triumph.
  - type: text
    content: 'I will sing praise to your '
  - type: text
    content: exalted
  - type: text
    content: ' name, O Most High.'
  - type: heading
    content: Deliverance
  '20':
  - type: text
    content: Make them tremble in fear before your presence.
  - type: text
    content: Place a lawgiver over them.
  - type: text
    content: Make them know that they are only puny, frail humans
  - type: text
    content: who must give account to you!
  - type: text
    content: Pause in his presence
  '3':
  - type: text
    content: For when you appear, I worship
  - type: text
    content: you while my enemies run in retreat.
  - type: text
    content: They stumble and perish before your presence.
  '4':
  - type: text
    content: For you have stood up for my cause
  - type: text
    content: 'and vindicated me '
  - type: text
    content: when I needed you the most
  - type: text
    content: .
  - type: text
    content: From your righteous throne you have given me justice.
  - type: heading
    content: Divine Judgment
  '5':
  - type: text
    content: With a blast of your rebuke, nations are destroyed.
  - type: text
    content: You obliterated their names forever and ever.
  '6':
  - type: text
    content: The Lord thundered
  - type: text
    content: ' and our enemies have been cut off,'
  - type: text
    content: vanished in everlasting ruins.
  - type: text
    content: All their cities have been destroyed—
  - type: text
    content: even the memory of them has been erased.
  '7':
  - type: text
    content: 'But '
  - type: text
    content: Yahweh
  - type: text
    content: ', '
  - type: text
    content: our mighty God
  - type: text
    content: ', reigns forever!'
  - type: text
    content: He sits enthroned as King ready to render his verdicts
  - type: text
    content: and judge all with righteousness.
  '8':
  - type: text
    content: He will issue his decrees of judgment,
  - type: text
    content: deciding what is right for the entire world,
  - type: text
    content: dispensing justice to all.
  '9':
  - type: text
    content: 'All who are oppressed may come to '
  - type: text
    content: Yahweh
  - type: text
    content: ' as a high'
  - type: text
    content: shelter in the time of trouble, a perfect hiding place.
