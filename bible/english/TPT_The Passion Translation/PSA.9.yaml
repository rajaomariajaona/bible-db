document_id: PSA.9,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: Triumphant Thanks
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the Pure and Shining One
  - type: usfm
    marker: d
    children:
    - type: text
      text: To the tune of “The Secrets of the Son”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated by Augustine, an early church father. The Hebrew is “to the death of the son.” Because of David’s sin with Bathsheba, the son born to them had to die, not as a judgment upon the child, but as a sacrifice to cleanse David of his sin. This was God’s way of restoring David. A sinless son bore the guilt. This is a picture of Jesus!
      marker-yv: yv-n
  - type: usfm
    marker: d
    children:
    - type: text
      text: A Psalm of David
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Delighting in God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will worship you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: with extended hands
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as my whole heart erupts with praise!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “praise” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: yadah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which can mean “to shoot [an arrow]” or “to worship with extended hands.” It implies an ecstatic burst of praise that is thrown into the heavens like a shout. It is the praise that breaks strongholds. A fresh determination arose in David’s spirit to praise his way into victory.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will tell everyone everywhere about your wonderful works!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For everyone who knows your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wonderful
    - type: text
      text: ' name'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: keeps putting their trust in you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They can count on you for help no matter what.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Lord, you will never, no never, neglect those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who come to you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, everyone! Sing out your praises to the God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who rules in Zion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tell the world about all the miracles he has done!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He tracks down killers and avenges bloodshed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he will never forget the ones forgotten by others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: hearing every one of their cries for justice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daughter of Zion
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So now, O Lord, don’t forget me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Have mercy on me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take note of how I’ve been humiliated
  - type: usfm
    marker: q1
    children:
    - type: text
      text: at the hands of those who hate me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are the one who can snatch me away from the gates of death.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then I will sing your praises as I pass through the gates
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of the Daughter of Zion, rejoicing in your deliverance!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the nations get trapped
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the very snares they set for others.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hidden trap they set for the weak
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has snapped shut upon themselves!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' is famous for his justice.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: While the wicked are digging a pit for others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they are actually setting the terms for their own judgment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will fall into their own pit.
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Consider the truth of this
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: qs
        children:
        - type: text
          text: higgaion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “to consider the truth of the matter.”
      marker-yv: yv-n
    - type: usfm
      marker: qs
      children:
      - type: text
        text: and pause in his presence
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Destruction of the Wicked
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Don’t forget this
    - type: text
      text: ': all the wicked will one day'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fall into the darkness of death’s domain,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 9:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Sheol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the underworld, which is frequently translated “hell.”'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: including the nations that forget God and reject his ways.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not forget the needs of the poor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One day the needy will be remembered,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their hopes will not be forever dashed in disappointment.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', it’s time to arise and judge'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the nations who defy you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t let rebellious men triumph.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be glad and shout in triumph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will sing praise to your '
    - type: usfm
      marker: it
      children:
      - type: text
        text: exalted
    - type: text
      text: ' name, O Most High.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deliverance
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them tremble in fear before your presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Place a lawgiver over them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make them know that they are only puny, frail humans
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who must give account to you!
  - type: usfm
    marker: qr
    children:
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause in his presence
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For when you appear, I worship
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you while my enemies run in retreat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They stumble and perish before your presence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have stood up for my cause
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and vindicated me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: when I needed you the most
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From your righteous throne you have given me justice.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divine Judgment
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a blast of your rebuke, nations are destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You obliterated their names forever and ever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: The Lord thundered
    - type: text
      text: ' and our enemies have been cut off,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vanished in everlasting ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All their cities have been destroyed—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even the memory of them has been erased.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', '
    - type: usfm
      marker: it
      children:
      - type: text
        text: our mighty God
    - type: text
      text: ', reigns forever!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sits enthroned as King ready to render his verdicts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and judge all with righteousness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will issue his decrees of judgment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deciding what is right for the entire world,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dispensing justice to all.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'All who are oppressed may come to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' as a high'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: shelter in the time of trouble, a perfect hiding place.
