document_id: PSA.137
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Song of Our Captivity
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Along the banks of Babylon’s rivers
- type: usfm
  marker: q1
  children:
  - type: text
    text: we sat as exiles, mourning our captivity,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and wept with great love for Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Our music and mirth were no longer heard, only sadness
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: We hung up our harps on the willow trees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Our captors tormented us, saying, “Make music for us and
- type: usfm
  marker: q1
  children:
  - type: text
    text: sing one of your happy Zion-songs!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But how could we sing the song of the Lord
- type: usfm
  marker: q1
  children:
  - type: text
    text: in this foreign wilderness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May my hands never make music again
- type: usfm
  marker: q1
  children:
  - type: text
    text: if I ever forget you, O Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May I never be able to sing again if I fail to honor Jerusalem supremely!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And Lord, may you never forget
- type: usfm
  marker: q1
  children:
  - type: text
    text: what the sons of Edom did to us, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let’s raze the city of Jerusalem and burn it to the ground!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 137:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text reads “Strip her [Jerusalem] naked!”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Listen, O Babylon, you evil destroyer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The one who destroys you will be rewarded above all others.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will be repaid for what you’ve done to us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Great honor will come to those who destroy you and your future,
- type: usfm
  marker: q1
  children:
  - type: text
    text: by smashing your infants against the rubble of your own destruction.
