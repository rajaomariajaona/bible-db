document_id: PSA.137,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Song of Our Captivity
  - type: text
    content: Along the banks of Babylon’s rivers
  - type: text
    content: we sat as exiles, mourning our captivity,
  - type: text
    content: and wept with great love for Zion.
  '2':
  - type: text
    content: Our music and mirth were no longer heard, only sadness
  - type: text
    content: .
  - type: text
    content: We hung up our harps on the willow trees.
  '3':
  - type: text
    content: Our captors tormented us, saying, “Make music for us and
  - type: text
    content: sing one of your happy Zion-songs!”
  '4':
  - type: text
    content: But how could we sing the song of the Lord
  - type: text
    content: in this foreign wilderness?
  '5':
  - type: text
    content: May my hands never make music again
  - type: text
    content: if I ever forget you, O Jerusalem.
  '6':
  - type: text
    content: May I never be able to sing again if I fail to honor Jerusalem supremely!
  '7':
  - type: text
    content: And Lord, may you never forget
  - type: text
    content: what the sons of Edom did to us, saying,
  - type: text
    content: “Let’s raze the city of Jerusalem and burn it to the ground!”
  - type: note
    content: The Hebrew text reads “Strip her [Jerusalem] naked!”
  '8':
  - type: text
    content: Listen, O Babylon, you evil destroyer!
  - type: text
    content: The one who destroys you will be rewarded above all others.
  - type: text
    content: You will be repaid for what you’ve done to us.
  '9':
  - type: text
    content: Great honor will come to those who destroy you and your future,
  - type: text
    content: by smashing your infants against the rubble of your own destruction.
