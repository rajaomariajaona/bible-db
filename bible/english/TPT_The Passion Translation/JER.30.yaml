document_id: JER.30,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Yahweh’s Promise to His People
  - type: text
    content: 'This is the message that '
  - type: text
    content: Yahweh
  - type: text
    content: ' gave to Jeremiah. '
  - type: note
    content: The dominant message of chs. 1–29 is that of judgment upon the nation of Israel because of her rejection of Yahweh. Then, with chs. 30–31, a new theme is introduced (summarized in 30:3). This section of Jeremiah is known as the Book of Consolation. Another good title for these chapters could be the Song of Restoration.
  '10':
  - type: text
    content: Yahweh
  - type: text
    content: ' says,'
  - type: text
    content: “My servant Jacob, do not fear;
  - type: text
    content: Israel, do not be alarmed.
  - type: text
    content: I will rescue you and your descendants
  - type: text
    content: from that foreign land in which you are held captive.
  - type: text
    content: You will return and live in peace,
  - type: text
    content: safe and secure, with no one to trouble you.
  '11':
  - type: text
    content: For I am with you and will save you,”
  - type: text
    content: Yahweh
  - type: text
    content: ' declares.'
  - type: text
    content: “Someday, I will bring destruction to all the nations
  - type: text
    content: where I have driven you,
  - type: text
    content: but I will not destroy you.
  - type: text
    content: I will discipline you
  - type: text
    content: but in moderation.
  - type: text
    content: I will not let you go entirely unpunished.”
  - type: heading
    content: Yahweh Will Heal Israel and Judah
  '12':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Your wound is incurable;
  - type: text
    content: your injuries are so serious, they’re beyond healing.
  '13':
  - type: text
    content: Everyone has given up on you.
  - type: text
    content: At least for an ulcer there are remedies,
  - type: text
    content: but for you, there’s no cure at all.
  '14':
  - type: text
    content: 'All those ‘lovers’ '
  - type: note
    content: That is, Israel’s supposed allies. See 22:20.
  - type: text
    content: you had
  - type: text
    content: have abandoned you;
  - type: text
    content: they could not care less.
  - type: text
    content: Yes, I struck you with cruel punishment
  - type: text
    content: because of your great guilt and countless sins.
  - type: text
    content: I struck you mercilessly like you were my enemy.
  '15':
  - type: text
    content: There is no point in crying out over your pain,
  - type: text
    content: for your wound is incurable.
  - type: text
    content: I have treated you like this
  - type: text
    content: because of your great guilt and countless sins.
  '16':
  - type: text
    content: '“But '
  - type: text
    content: rest assured
  - type: text
    content: ', all those who devoured you will be devoured;'
  - type: text
    content: all your enemies, every one of them, will go into captivity.
  - type: text
    content: Those who devastated you will be devastated,
  - type: text
    content: and all who made you their prey, I will make a prey.
  - type: note
    content: By the power of the cross, our Lord Jesus has fulfilled this verse regarding our spiritual enemies.
  '17':
  - type: text
    content: 'For I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you who were once called ‘Outcast,’'
  - type: text
    content: I will heal your wounds.
  - type: note
    content: See Hos. 6:1–3.
  - type: text
    content: And to you who were once called ‘Forgotten Zion,’
  - type: text
    content: I will restore your health.”
  '18':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “See, I will restore the fortunes of the tents of Jacob
  - type: note
    content: See Joel 2:25; Acts 3:21 (and the second footnote).
  - type: text
    content: and have compassion on his families.
  - type: note
    content: Or “tents [dwellings].”
  - type: text
    content: The city will be rebuilt on its mound
  - type: note
    content: That is, Jerusalem.
  - type: text
    content: with the city fortress in its rightful place.
  '19':
  - type: text
    content: 'Out of them will be heard the '
  - type: text
    content: joyous
  - type: text
    content: ' songs of thanksgiving'
  - type: note
    content: Or “thank offerings.”
  - type: text
    content: 'and the '
  - type: text
    content: raucous
  - type: text
    content: ' shouts of joy.'
  - type: text
    content: I will cause them to flourish and not diminish.
  - type: text
    content: I will bring them honor, and they will not be humiliated.
  '2':
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel, gave Jeremiah this command: “Write everything I have told you in a book. '
  - type: note
    content: This “book” (scroll) would serve largely as a promissory note of future blessing (redemption) for those taken as captives to Babylon. In a sense, we all are returning captives, leaving our bondage to sin and returning to the Father’s heart (see Rom. 8:14–23). This section of Jeremiah is a potent revelation for the children of God today, for it teaches of a love that will never be lifted off his people in spite of our waywardness.
  '20':
  - type: text
    content: Their descendants will be just like they were before.
  - type: text
    content: Their community will be fixed firmly before me,
  - type: text
    content: and I shall punish all their oppressors.
  '21':
  - type: text
    content: 'Their majestic '
  - type: text
    content: prince
  - type: text
    content: ' will be one of their own.'
  - type: note
    content: This prophecy is clearly Messianic and points to a Jewish prince and a ruler who was coming. The Talmud uses the words “Anointed One.” Jesus is the “majestic prince” who will have special access to Yahweh, even greater than Moses did (see Ex. 24:2). Most scholars interpret this to mean that the Messiah will combine the kingly and priestly offices. Jesus is both our King and our High Priest.
  - type: text
    content: Their ruler will arise from among them,
  - type: text
    content: and I will give him free and easy access to me.
  - type: note
    content: That is, “I will invite him to come into my presence.”
  - type: text
    content: For who is he who will pledge his heart
  - type: note
    content: The Hebrew word for “pledge” refers to putting one’s own heart as the guarantee or pledge in order to have the privilege of access to God.
  - type: text
    content: 'to remain close to me?” '
  - type: text
    content: Yahweh
  - type: text
    content: ' asks.'
  '22':
  - type: text
    content: “You will be my very own people,
  - type: text
    content: and I shall be your very own God.”
  '23':
  - type: text
    content: 'Behold, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s anger is '
  - type: text
    content: like
  - type: text
    content: the fury of a fearsome whirlwind
  - type: text
    content: about to hit the wicked head-on with gale-force winds.
  '24':
  - type: text
    content: Yahweh
  - type: text
    content: ’s anger will not relent
  - type: text
    content: until he has perfectly carried out what he has in mind.
  - type: text
    content: In the latter days, you will clearly understand this.
  '3':
  - type: text
    content: 'For I decree that the time is coming when I will restore '
  - type: text
    content: all that you have lost
  - type: text
    content: ' and bring back my captive people, Israel and Judah,” says '
  - type: text
    content: Yahweh
  - type: text
    content: . “I will bring them back to possess the land that I gave to their ancestors.”
  '4':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' told me to say to Israel and Judah:'
  - type: note
    content: 'This chapter and the next (see 30:4–31:40) contain at least thirteen separate messages from Yahweh: (1) A day of terror and a day of hope (see 30:4–7). (2) Yahweh’s promise to break the yoke of captivity (see 30:8–9). (3) Yahweh’s promise to bring his people to their homeland (see 30:10–11). (4) No cure for the present but abundant hope for the future (see 30:12–17). (5) The coming restoration (see 30:18–22). (6) The storm of Yahweh’s anger (see 30:23–24). (7) Israel’s return home (see 31:1–14). (8) The return of Rachel’s children (see 31:15–17). (9) The return of God’s wayward child (see 31:18–22). (10) The prosperity of God’s people (see 31:23–30). (11) Yahweh’s new covenant with his people (see 31:31–34). (12) Israel as God’s people forever (see 31:35–37). (13) The promise of Jerusalem being rebuilt (see 31:38–40).'
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', hear the voice of panic,'
  - type: text
    content: the screams of terror,
  - type: text
    content: and no sound of peace anywhere.
  '6':
  - type: text
    content: 'Now, ask yourself this and carefully consider:'
  - type: text
    content: can a man give birth to a child?
  - type: text
    content: Then why do I see each man
  - type: text
    content: gripping his sides like a woman in labor?
  - type: text
    content: How terrible! Why has every face turned pale?
  '7':
  - type: text
    content: A disaster! A terrible day like no other.
  - type: text
    content: It will be great tribulation for Jacob,
  - type: note
    content: “Jacob” is a collective term for all the tribes of Jacob. Jacob means “heel-grabber”; the term can also be understood as a spiritual picture of the “flesh life” of the believer.
  - type: text
    content: yet he will be saved out of it.
  '8':
  - type: text
    content: '“In that day,” declares '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, '
  - type: note
    content: Jeremiah used the title “Yahweh, Commander of Angel Armies” over forty times in his writings.
  - type: text
    content: '“I will break off the yoke from your neck and snap your chains, and foreigners will no longer enslave you. '
  '9':
  - type: text
    content: 'But Israel and Judah will be servants of '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God, and I will raise up a king for them from the lineage of David.”'
