      - type: text
        text: Yahweh
    - type: text
      text: ' says: I am going to fill all the people of this land with a drunken stupor, including the kings of David’s descendants, the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: unfaithful
    - type: text
      text: ' priests, the prophets, and all the inhabitants of Jerusalem. '
