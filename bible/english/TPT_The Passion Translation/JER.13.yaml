document_id: JER.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Allegory of the Linen Loincloth
  - type: text
    content: 'Here is the command '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me: “Go and buy a linen loincloth '
  - type: note
    content: There were two types of loincloths worn in that day. One was depicted on a Canaanite warrior and did not pass between the legs. The other (depicted in an Egyptian painting of Syrians) did pass between the legs. It is impossible to know which is implied here. The fact that it was made of linen points to the linen clothing of the priests (see Ex. 28:39; Lev. 16:4). This linen loincloth, soon to become dirty, was a fitting symbol of a corrupt priesthood.
  - type: text
    content: 'and put it around your waist, but don’t wash it.” '
  - type: note
    content: Or “don’t put it in water.” New linen needs to be soaked in water in order to make it comfortable to wear as an undergarment. Wearing an unwashed linen undergarment for many days would have made Jeremiah uncomfortable and would have soiled the loincloth, yet the prophet obeyed God.
  '10':
  - type: text
    content: 'These evil ones refuse to hear my words, they stubbornly follow the inclinations of their own hearts, and they follow other gods to serve and worship them. So then, they will all become like this worthless, rotten undergarment. '
  '11':
  - type: text
    content: 'For as the loincloth clings snugly to the loins of a man, so I brought close to me all the people of Israel and Judah, says '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  - type: text
    content: I wanted them to cling to me
  - type: text
    content: ' as my people and bring honor to me and proclaim my glory. But they would not obey.”'
  - type: heading
    content: The Allegory of the Wine Jars
  '12':
  - type: text
    content: '“Speak this word to them: ‘Here is what '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel says: Every wine jar should be filled with wine.’ And if they say to you, ‘Of course, everyone knows that wine jars should be filled with wine. Do you think we don’t know that?’ '
  '13':
  - type: text
    content: then answer them, ‘
  - type: text
    content: Yahweh
  - type: text
    content: ' says: I am going to fill all the people of this land with a drunken stupor, including the kings of David’s descendants, the '
  - type: text
    content: unfaithful
  - type: text
    content: ' priests, the prophets, and all the inhabitants of Jerusalem. '
  '14':
  - type: text
    content: 'And I will smash them one against the other, parents and children alike, says '
  - type: text
    content: Yahweh
  - type: text
    content: . I will show no pity or compassion, and my mercy will not stop me from destroying them.’ ”
  - type: heading
    content: Jeremiah Warns against Pride
  '15':
  - type: text
    content: Hear this and listen well.
  - type: text
    content: Forsake your pride,
  - type: text
    content: 'for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken.'
  '16':
  - type: text
    content: 'Give all glory to '
  - type: text
    content: Yahweh
  - type: text
    content: ' your God'
  - type: text
    content: before he brings darkness,
  - type: text
    content: and you stumble and fall
  - type: text
    content: 'on mountain '
  - type: text
    content: paths
  - type: text
    content: ' in the dusk of twilight.'
  - type: text
    content: Give him glory
  - type: text
    content: ' before he turns the light you’re longing for'
  - type: note
    content: That is, the false hope of help coming from Egypt.
  - type: text
    content: into a death shadow and deep gloom.
  '17':
  - type: text
    content: If you will not listen,
  - type: text
    content: I will weep bitterly in secret
  - type: text
    content: from the depths of my soul
  - type: text
    content: because of your stubborn pride.
  - type: text
    content: 'My eyes gush with copious tears running down '
  - type: text
    content: my face
  - type: text
    content: ','
  - type: text
    content: 'because the flock of '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: Jeremiah is known as the Weeping Prophet, being moved by compassion to weep over the fate of God’s people. Even though they had sinned grievously, Jeremiah still saw the people as “the flock of Yahweh.”
  - type: text
    content: is taken captive.
  '18':
  - type: text
    content: 'Say to King '
  - type: text
    content: Jehoiachin
  - type: text
    content: ' and his mother,'
  - type: note
    content: The king’s mother was Nehushta, the daughter of Elnathan of Jerusalem (see 2 Kings 24:8). This prophecy may have taken place in 597 BC, on the eve of the fall of Jerusalem. Jehoiachin and his family were taken as captives to Babylon after a short reign of only three months.
  - type: text
    content: '“Come down from your '
  - type: text
    content: high
  - type: text
    content: ' thrones'
  - type: text
    content: and take a humble seat,
  - type: text
    content: for your glorious crown has tumbled off your heads.”
  '19':
  - type: text
    content: The cities in southern Judah are under siege,
  - type: text
    content: and no one can free them.
  - type: text
    content: All the people of Judah will be carried into exile,
  - type: text
    content: carried completely away.
  - type: heading
    content: Jerusalem Is like a Shameless Woman
  '2':
  - type: text
    content: 'So I obeyed '
  - type: text
    content: Yahweh
  - type: text
    content: '’s command, and I bought the loincloth and wore it '
  - type: text
    content: under my tunic
  - type: text
    content: .
  '20':
  - type: text
    content: Lift up your eyes and see
  - type: text
    content: 'the '
  - type: text
    content: Babylonians
  - type: text
    content: ' coming from the north.'
  - type: text
    content: What will become of the cities of Judah?
  - type: text
    content: Like a beautiful flock of lambs,
  - type: text
    content: they were entrusted to your care.
  '21':
  - type: text
    content: What will you say when those you courted as allies
  - type: text
    content: are appointed as your masters?
  - type: note
    content: The Hebrew text of this sentence is uncertain.
  - type: text
    content: You will be gripped with pain
  - type: text
    content: as a woman giving birth.
  '22':
  - type: text
    content: And when you ask yourself,
  - type: text
    content: “Why are these things happening to me?”—
  - type: text
    content: 'it is because your sin '
  - type: note
    content: The great sin is unbelief and unfaithfulness (see Heb. 11:6).
  - type: text
    content: was so enormous
  - type: text
    content: that your skirts are lifted up
  - type: text
    content: and your private parts exposed.
  - type: note
    content: The Hebrew word chamas means “to suffer violence.” It may be a reference to a sexual assault. See Lam. 1:8; Ezek. 16:37–39; Hos. 2:3, 10; Nah. 3:5.
  '23':
  - type: text
    content: Can the Ethiopian change the color of his skin,
  - type: text
    content: or the leopard remove his spots?
  - type: text
    content: Of course not.
  - type: text
    content: ' And neither can you change'
  - type: text
    content: from being schooled to do evil to doing good.
  '24':
  - type: text
    content: '“This is why I will scatter you '
  - type: note
    content: Or “them.”
  - type: text
    content: like dust
  - type: note
    content: Or “chaff.” See Pss. 1:4; 83:13.
  - type: text
    content: driven by the desert wind.
  '25':
  - type: text
    content: You have it coming,
  - type: text
    content: 'and I have precisely measured your '
  - type: text
    content: punishment
  - type: text
    content: ',”'
  - type: text
    content: 'declares '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: “because you have trusted in lies
  - type: text
    content: and forgotten me entirely.
  '26':
  - type: text
    content: I, in turn, will lift your skirts over your face,
  - type: text
    content: and everyone will see your nakedness.
  '27':
  - type: text
    content: Woe to you, Jerusalem!
  - type: text
    content: I have seen your adulteries,
  - type: text
    content: your lustful neighing,
  - type: text
    content: your shameless prostitution,
  - type: text
    content: your vile acts on the hills and in the fields.
  - type: text
    content: How long will you continue being unclean?”
  '3':
  - type: text
    content: 'Then, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me a second time: '
  '4':
  - type: text
    content: '“Now, take the loincloth you bought and are wearing and go at once to Perath '
  - type: note
    content: Or “Parah” or possibly “Euphrates.” Parah is a stream about three miles (five kilometers) northeast of Anathoth, Jeremiah’s hometown. It is unlikely that God told Jeremiah to travel to the Euphrates since a round trip would have been a seven-hundred-mile (over one-thousand-kilometer) journey north through enemy territory. The Hebrew word for “Parah” is virtually identical with that for “Euphrates” and so this could possibly be understood as symbolic of the Euphrates. However, there are scholars who believe that, indeed, Jeremiah made the round trip to Babylon twice.
  - type: text
    content: 'and cover it up there in a crevice of the rock.” '
  '5':
  - type: text
    content: 'So, I obeyed '
  - type: text
    content: Yahweh
  - type: text
    content: ' and went and buried it at Perath. '
  '6':
  - type: text
    content: 'Then, after a long time, '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me again, saying, “Go at once to Perath and dig up the loincloth that I commanded you to bury there.” '
  '7':
  - type: text
    content: So I went to Perath and dug up the loincloth from where I had buried it, and I found it ruined. It was worthless.
  '8':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke these words to me: '
  '9':
  - type: text
    content: '“Even so, '
  - type: text
    content: like a soiled undergarment
  - type: text
    content: ', '
  - type: note
    content: The rotting linen loincloth was a picture of what God would do in humbling the people of Judah and Jerusalem. Pride is a rotten thing that will ruin even the best of people. The pride of Israel was her wealth and strength.
  - type: text
    content: 'I will ruin all the arrogant pride of Judah and Jerusalem, says '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
