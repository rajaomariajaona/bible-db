          text: Or “Parah” or possibly “Euphrates.” Parah is a stream about three miles (five kilometers) northeast of Anathoth, Jeremiah’s hometown. It is unlikely that God told Jeremiah to travel to the Euphrates since a round trip would have been a seven-hundred-mile (over one-thousand-kilometer) journey north through enemy territory. The Hebrew word for “Parah” is virtually identical with that for “Euphrates” and so this could possibly be understood as symbolic of the Euphrates. However, there are scholars who believe that, indeed, Jeremiah made the round trip to Babylon twice.
      marker-yv: yv-n
