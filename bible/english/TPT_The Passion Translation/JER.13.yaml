  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Allegory of the Linen Loincloth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Here is the command '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' spoke to me: “Go and buy a linen loincloth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There were two types of loincloths worn in that day. One was depicted on a Canaanite warrior and did not pass between the legs. The other (depicted in an Egyptian painting of Syrians) did pass between the legs. It is impossible to know which is implied here. The fact that it was made of linen points to the linen clothing of the priests (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Ex. 28:39
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 16:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). This linen loincloth, soon to become dirty, was a fitting symbol of a corrupt priesthood.
      marker-yv: yv-n
    - type: text
      text: 'and put it around your waist, but don’t wash it.” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “don’t put it in water.” New linen needs to be soaked in water in order to make it comfortable to wear as an undergarment. Wearing an unwashed linen undergarment for many days would have made Jeremiah uncomfortable and would have soiled the loincloth, yet the prophet obeyed God.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'These evil ones refuse to hear my words, they stubbornly follow the inclinations of their own hearts, and they follow other gods to serve and worship them. So then, they will all become like this worthless, rotten undergarment. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For as the loincloth clings snugly to the loins of a man, so I brought close to me all the people of Israel and Judah, says '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: '. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: I wanted them to cling to me
    - type: text
      text: ' as my people and bring honor to me and proclaim my glory. But they would not obey.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Allegory of the Wine Jars
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Speak this word to them: ‘Here is what '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ', the God of Israel says: Every wine jar should be filled with wine.’ And if they say to you, ‘Of course, everyone knows that wine jars should be filled with wine. Do you think we don’t know that?’ '
