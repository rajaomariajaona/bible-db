document_id: HEB.13,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Live Pleasing to God
  - type: text
    content: 'No matter what, make room in your heart to love every believer. '
  '10':
  - type: text
    content: 'We feast on a sacrifice at our spiritual altar, but those who serve as priests in the old system of worship have no right to eat of it. '
  '11':
  - type: text
    content: 'For the high priest carries the blood of animals into the holiest chamber as a sacrifice for sin, and then burns the bodies of the animals outside the city. '
  - type: note
    content: See Lev. 16:14, 27.
  '12':
  - type: text
    content: And Jesus, our sin-sacrifice, also suffered death outside the city walls to make us holy by his own blood.
  '13':
  - type: text
    content: 'So we must arise and join him outside the religious “walls” and bear his disgrace. '
  - type: note
    content: Or “carry his insults” or “endure the abuse he suffered.”
  '14':
  - type: text
    content: 'For we have no city here on earth to be our permanent home, but we seek the city that is destined to come. '
  - type: note
    content: Or “the city that is intended.” The Aramaic can be translated “the city which is anxiously awaited.”
  '15':
  - type: text
    content: 'So we no longer offer up a steady stream of blood sacrifices, but through Jesus, we will offer up to God a steady stream of praise sacrifices—these are “the lambs” '
  - type: note
    content: As translated from the Aramaic. The Greek is “the fruit of” our lips.
  - type: text
    content: we offer from our lips that celebrate his name!
  - type: note
    content: See Ps. 50:14, 23.
  '16':
  - type: text
    content: 'We will show mercy to the poor '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: and not miss an opportunity to do acts of kindness for others, for these are the true sacrifices that delight God’s heart.
  '17':
  - type: text
    content: 'Obey your spiritual leaders and recognize their authority, for they keep watch over your soul without resting '
  - type: note
    content: The Greek word agrypnein is often used for staying awake through the night.
  - type: text
    content: since they will have to give an account to God for their work. So it will benefit you when you make their work a pleasure and not a heavy burden.
  '18':
  - type: text
    content: 'And keep praying for us that we continue to live with a clear conscience, for we desire to live honorably in all that we do. '
  '19':
  - type: text
    content: And I especially ask you to pray that God would send me back to you very soon.
  - type: heading
    content: Apostolic Blessing and Conclusion
  '2':
  - type: text
    content: 'And show hospitality to strangers, for they may be angels from God showing up as your guests. '
  - type: note
    content: The Aramaic can be translated “for this is how you are worthy to receive angels while awake.” See also Matt. 25:35.
  '20':
  - type: text
    content: 'Now may the God who brought us peace by raising from the dead our Lord Jesus Christ so that he would be the Great Shepherd of his flock; and by the power of the blood of the eternal covenant '
  '21':
  - type: text
    content: 'may he work perfection into every part of you giving you all that you need to fulfill your destiny. And may he express through you all that is excellent and pleasing '
  - type: note
    content: The Aramaic can be translated “beautiful.”
  - type: text
    content: to him through your life-union with Jesus the Anointed One who is to receive all glory forever! Amen!
  '22':
  - type: text
    content: 'My dear brothers and sisters, I urge you to let your spirits flow through this message of love '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: 'that I’ve written to you in these few words. '
  '23':
  - type: text
    content: 'I want you to know that our brother Timothy is free again and as soon as he arrives here we’ll come together to see you. We extend our greetings to all your leaders and all the holy believers. '
  '24':
  - type: text
    content: 'The Italian believers also send their greetings. '
  - type: note
    content: The Aramaic has this sentence at the end, “The end of the letter to the Hebrews written from Italy.”
  '25':
  - type: text
    content: Now may God’s wonderful grace be poured out upon you all! Amen!
  '3':
  - type: text
    content: Identify with those who are in prison as though you were there suffering with them, and those who are mistreated as if you could feel their pain.
  - type: note
    content: The Aramaic can be translated “as if you were people who wear their bodies” (vulnerable to their pain).
  '4':
  - type: text
    content: Honor the sanctity of marriage and keep your vows of purity to one another, for God will judge sexual immorality in any form, whether single or married.
  '5':
  - type: text
    content: Don’t be obsessed with money but live content with what you have, for you always have God’s presence. For hasn’t he promised you,
  - type: text
    content: '“I will never leave you, never! And I will not loosen my grip '
  - type: note
    content: Or “hand” as translated from the Aramaic. See also Deut. 31:6, 8.
  - type: text
    content: on your life!”
  '6':
  - type: text
    content: 'So we can say with great confidence:'
  - type: text
    content: “I know the Lord is for me
  - type: text
    content: and I will never be afraid of what people may do to me!”
  - type: note
    content: See Ps. 118:6–7.
  '7':
  - type: text
    content: 'Don’t forget the example of your spiritual leaders who have spoken God’s messages to you, take a close look at how their lives ended, '
  - type: note
    content: Or “consider the outcome [spiritual fruit] of the way they lived.”
  - type: text
    content: and then follow their walk of faith.
  '8':
  - type: text
    content: 'Jesus, the Anointed One, is always the same—yesterday, today, and forever. '
  - type: note
    content: The Aramaic can be translated “Jesus the Messiah is the fulfillment of yesterday, today, and forever.”
  '9':
  - type: text
    content: 'So don’t let anyone lead you astray with all sorts of novel and exotic teachings. It is more beautiful to feast on grace and be inwardly strengthened than to be obsessed with dietary rules '
  - type: note
    content: Or “ceremonial foods.”
  - type: text
    content: which in themselves have no lasting benefit.
