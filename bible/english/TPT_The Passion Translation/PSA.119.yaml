document_id: PSA.119,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Words of God This psalm is an acrostic poem, a mathematical masterpiece. It consists of twenty-two stanzas of eight lines each. Each stanza begins with the same Hebrew letter at the beginning of every one of its eight lines, going in succession, by strophes, from alef—the first letter of the Hebrew alphabet, as the first letter of each line in the first strophe—to taw—the last letter of the Hebrew alphabet, as the first letter of each line in the last strophe. Like the eight lines of each stanza, there are eight Hebrew words, all synonyms, used to refer to the Word of God. Although many believe Ezra wrote Ps. 119, the acrostic poetic style is unique to King David within the book of Psalms, which points to his authorship of this psalm.
  - type: heading
    content: The Way to Happiness
  - type: text
    content: You’re only truly happy when you walk in total integrity,
  - type: text
    content: walking in the light of God’s Word.
  - type: note
    content: Or “perfection.” The Hebrew reads “utterances.”
  '10':
  - type: text
    content: I have longed for you with the passion of my heart;
  - type: text
    content: don’t let me stray from your directions!
  '100':
  - type: text
    content: You have graced me with more insight than the old sages
  - type: text
    content: because I have not failed to walk in the light of your ways.
  '101':
  - type: text
    content: I refused to bend my morals when temptation was before me
  - type: text
    content: so that I could become obedient to your Word.
  '102':
  - type: text
    content: I refuse to turn away from difficult truths,
  - type: text
    content: for you yourself have taught me to love your words.
  '103':
  - type: text
    content: How sweet are your living promises to me;
  - type: text
    content: sweeter than honey is your revelation-light.
  '104':
  - type: text
    content: For your truth is the source of my understanding,
  - type: text
    content: not the falsehoods of those who don’t know you, which I despise.
  - type: heading
    content: Truth’s Shining Light
  '105':
  - type: text
    content: Truth’s shining light guides me in my choices and decisions;
  - type: text
    content: the revelation of your Word makes my pathway clear.
  '106':
  - type: text
    content: To live my life by your righteous rules
  - type: text
    content: has been my holy and lifelong commitment.
  '107':
  - type: text
    content: I’m bruised and broken, overwhelmed by it all;
  - type: text
    content: breathe life into me again by your living word.
  '108':
  - type: text
    content: Lord, receive my grateful thanks
  - type: text
    content: and teach me more of how to please you.
  '109':
  - type: text
    content: Even though my life hangs in the balance,
  - type: text
    content: I’ll keep following what you’ve taught me, no matter what.
  '11':
  - type: text
    content: I consider your Word to be my greatest treasure,
  - type: text
    content: and I treasure it in my heart
  - type: text
    content: to keep me from committing sin’s treason against you.
  '110':
  - type: text
    content: The ungodly have done their best to throw me off track,
  - type: text
    content: but I’ll not deviate from what you’ve told me to do.
  '111':
  - type: text
    content: Everything you speak to me is like joyous treasure,
  - type: text
    content: filling my life with gladness.
  '112':
  - type: text
    content: I have determined in my heart to obey whatever you say,
  - type: text
    content: fully and forever!
  - type: heading
    content: Trust and Obey
  '113':
  - type: text
    content: I despise those who can’t keep commitments,
  - type: text
    content: for I passionately love your revelation-light!
  '114':
  - type: text
    content: You’re my place of quiet retreat, and your wraparound presence
  - type: text
    content: becomes my shield as I wrap myself in your Word!
  '115':
  - type: text
    content: Go away! Leave me, all you workers of wickedness,
  - type: text
    content: for you can’t stop me from following every command of my God.
  '116':
  - type: text
    content: Lord, strengthen my inner being by the promises of your Word
  - type: text
    content: so that I may live faithful and unashamed for you.
  '117':
  - type: text
    content: Lift me up and I will be safe.
  - type: text
    content: Empower me to live every moment in the light of your ways.
  '118':
  - type: text
    content: Lord, you reject those who reject your laws,
  - type: text
    content: for they fool no one but themselves!
  '119':
  - type: text
    content: The wicked are thrown away, discarded and valueless.
  - type: text
    content: That’s why I will keep loving all of your laws!
  '12':
  - type: text
    content: My wonderful God, you are to be praised above all;
  - type: text
    content: teach me the power of your decrees!
  '120':
  - type: text
    content: My body trembles in holy awe of you, leaving me speechless,
  - type: text
    content: for I’m frightened of your righteous judgments.
  - type: heading
    content: I Will Follow Your Ways
  '121':
  - type: text
    content: Don’t leave me to the mercies of those who hate me,
  - type: text
    content: for I live to do what is just and fair.
  '122':
  - type: text
    content: Let me hear your promise of blessing over my life,
  - type: text
    content: breaking me free from the proud oppressors.
  '123':
  - type: text
    content: As a lovesick lover, I yearn for more of your salvation
  - type: text
    content: and for your virtuous promises.
  '124':
  - type: text
    content: Let me feel your tender love, for I am yours.
  - type: text
    content: Give me more understanding of your wonderful ways.
  '125':
  - type: text
    content: I need more revelation from your Word
  - type: text
    content: to know more about you, for I’m in love with you!
  '126':
  - type: text
    content: Lord, the time has come for you to break through,
  - type: text
    content: for evil men keep breaking your laws.
  '127':
  - type: text
    content: Truly, your message of truth means more to me
  - type: text
    content: than a vault filled with the purest gold.
  '128':
  - type: text
    content: Every word you speak, every truth revealed, is always right
  - type: text
    content: and beautiful to me, for I hate what is phony or false.
  - type: heading
    content: I Long to Obey You
  '129':
  - type: text
    content: Your marvelous words are living miracles;
  - type: text
    content: no wonder I long to obey everything you say.
  '13':
  - type: text
    content: I speak continually of your laws
  - type: text
    content: as I recite out loud your counsel to me.
  '130':
  - type: text
    content: Break open your Word within me until revelation-light shines out!
  - type: text
    content: Those with open hearts are given insight into your plans.
  '131':
  - type: text
    content: I open my mouth and inhale the Word of God
  - type: text
    content: because I crave the revelation of your commands.
  '132':
  - type: text
    content: Turn your heart to me, Lord, and show me your grace
  - type: text
    content: like you do to every one of your godly lovers.
  '133':
  - type: text
    content: Prepare before me a path filled with your promises,
  - type: text
    content: and don’t allow even one sin to have dominion over me.
  '134':
  - type: text
    content: Rescue me from the oppression of ungodly men
  - type: text
    content: so that I can keep all your precepts.
  '135':
  - type: text
    content: 'Smile on me, '
  - type: note
    content: Or “Cause your face to shine on me.”
  - type: text
    content: your loving servant.
  - type: text
    content: Instruct me in what is right in your eyes.
  '136':
  - type: text
    content: When I witness the rebellious breaking your laws,
  - type: text
    content: it makes me weep uncontrollably!
  - type: heading
    content: His Word Is True
  '137':
  - type: text
    content: Lord, your judgments reveal your righteousness,
  - type: text
    content: and your verdicts are always fair.
  '138':
  - type: text
    content: The motive behind your every word is pure,
  - type: text
    content: and your teachings are remarkably faithful and true.
  '139':
  - type: text
    content: I’ve been consumed with a furious passion to do what’s right,
  - type: text
    content: all because of the way my enemies disrespect your laws.
  '14':
  - type: text
    content: I find more joy in following what you tell me to do
  - type: text
    content: than in chasing after all the wealth of the world.
  '140':
  - type: text
    content: All your promises glow with fire;
  - type: note
    content: As translated from the Septuagint and implied in the Hebrew.
  - type: text
    content: that’s why I’m a lover of your Word.
  '141':
  - type: text
    content: Even though I’m considered insignificant and despised
  - type: text
    content: by the world, I’ll never abandon your ways.
  '142':
  - type: text
    content: Your righteousness has no end; it is everlasting,
  - type: text
    content: and your rules are perfectly fair.
  '143':
  - type: text
    content: Even though my troubles overwhelm me with anguish,
  - type: text
    content: I still delight and cherish every message you speak to me.
  '144':
  - type: text
    content: Give me more revelation so that I can live for you,
  - type: text
    content: for nothing is more pure and eternal than your truth.
  - type: heading
    content: Save Me, God
  '145':
  - type: text
    content: Answer my passionate prayer, O Lord,
  - type: text
    content: and I’ll obey everything you say.
  '146':
  - type: text
    content: Save me, God, and I’ll follow your every instruction.
  '147':
  - type: text
    content: Before the day dawns, I’ll be crying out for help
  - type: text
    content: and wrapping your words into my life.
  '148':
  - type: text
    content: I lie awake every night pondering your promises to me.
  '149':
  - type: text
    content: Lord, listen to my heart’s cry, for I know your love is real for me;
  - type: text
    content: breathe life into me again by the revelation of your justice.
  '15':
  - type: text
    content: I set my heart on your precepts
  - type: text
    content: and pay close attention to all your ways.
  '150':
  - type: text
    content: Here they come—these lawless rebels are coming near,
  - type: text
    content: but they are all so far away from your laws.
  '151':
  - type: text
    content: God, you are near me always, so close to me;
  - type: text
    content: every one of your commands reveals truth.
  '152':
  - type: text
    content: I’ve known all along how true and unchanging
  - type: text
    content: is every word you speak, established forever!
  - type: heading
    content: Breathe Life into Me Again
  '153':
  - type: text
    content: Look upon all my misery and come be my hero to rescue me,
  - type: text
    content: for I will never forget what you’ve revealed to me.
  '154':
  - type: text
    content: Take my side and defend me in these sufferings;
  - type: text
    content: redeem me and revive me, just like you promised you would.
  '155':
  - type: text
    content: The wicked are so far from salvation,
  - type: text
    content: for they could not care less about your message of truth.
  '156':
  - type: text
    content: Your tender mercies are what I need, O God;
  - type: text
    content: give me back my life again
  - type: text
    content: through the revelation of your judgments.
  '157':
  - type: text
    content: I have so many enemies who persecute me,
  - type: text
    content: yet I won’t swerve from following your ways.
  '158':
  - type: text
    content: I grieve when I see how the faithless ones live,
  - type: text
    content: for they just walk away from your promises.
  '159':
  - type: text
    content: Lord, see how much I truly love your instructions.
  - type: text
    content: So in your tender kindness, breathe life into me again.
  '16':
  - type: text
    content: My delight is found in all your laws,
  - type: text
    content: and I won’t forget to walk in your words.
  - type: heading
    content: The Abundant Life
  '160':
  - type: text
    content: The sum total of all your words adds up to absolute truth,
  - type: text
    content: and every one of your righteous decrees is everlasting.
  - type: heading
    content: Devoted to God’s Word
  '161':
  - type: text
    content: The powerful elite have persecuted me without a cause,
  - type: text
    content: but my heart trembles in awe because of your miracle-words.
  '162':
  - type: text
    content: Your promises are the source of my bubbling joy;
  - type: text
    content: the revelation of your Word thrills me
  - type: text
    content: like one who has discovered hidden treasure.
  '163':
  - type: text
    content: I despise every lie and hate every falsehood,
  - type: text
    content: for I am passionate about keeping your precepts.
  '164':
  - type: text
    content: I stop to praise you seven times a day,
  - type: text
    content: all because your ways are perfect!
  '165':
  - type: text
    content: There is such a great peace and well-being that comes
  - type: text
    content: to the lovers of your Word, and they will never be offended.
  '166':
  - type: text
    content: Lord, I’m longing for more of your salvation,
  - type: text
    content: for I want to do what pleases you.
  '167':
  - type: text
    content: My love for your ways is indescribable;
  - type: text
    content: in my innermost being I want to follow them perfectly!
  '168':
  - type: text
    content: I will keep your instructions and follow your counsel;
  - type: text
    content: all my ways are an open book before you.
  - type: heading
    content: I Want to Follow You
  '169':
  - type: text
    content: Lord, listen to my prayer. It’s like a sacrifice I bring to you;
  - type: text
    content: I must have more revelation of your Word!
  '17':
  - type: text
    content: Let me, your servant, walk in abundance of life
  - type: text
    content: that I may always live to obey your truth.
  '170':
  - type: text
    content: Take my words to heart when I ask you, Lord;
  - type: text
    content: rescue me, just like you promised!
  '171':
  - type: text
    content: I offer you my joyous praise for all that you’ve taught me.
  '172':
  - type: text
    content: Your wonderful words will become my song of worship,
  - type: text
    content: for everything you’ve commanded is perfect and true.
  '173':
  - type: text
    content: Place your hands of strength and favor upon me,
  - type: text
    content: for I’ve made my choice to follow your ways.
  '174':
  - type: text
    content: I wait for your deliverance, O Lord,
  - type: text
    content: for your words thrill me like nothing else!
  '175':
  - type: text
    content: Invigorate my life so that I can praise you even more,
  - type: text
    content: and may your truth be my strength!
  '176':
  - type: text
    content: I’ll never forget what you’ve taught me, Lord,
  - type: text
    content: but when I wander off and lose my way,
  - type: text
    content: come after me, for I am your beloved!
  '18':
  - type: text
    content: Open my eyes to see the miracle-wonders hidden in Scripture.
  - type: note
    content: Or “your law.”
  '19':
  - type: text
    content: My life on earth is so brief, so tutor me in the ways of your wisdom.
  '2':
  - type: text
    content: What joy overwhelms everyone who keeps the ways of God,
  - type: text
    content: those who seek him as their heart’s passion!
  '20':
  - type: text
    content: I am continually consumed by these irresistible longings,
  - type: text
    content: these cravings to obey your every commandment!
  '21':
  - type: text
    content: Your displeasure rests with those who are arrogant,
  - type: text
    content: who think they know everything;
  - type: text
    content: you rebuke the rebellious who refuse your laws.
  '22':
  - type: text
    content: Don’t let them mock and scorn me for obeying you.
  '23':
  - type: text
    content: For even if the princes and my leaders choose to criticize me,
  - type: text
    content: I will continue to serve you and walk in your plans for my life.
  '24':
  - type: text
    content: Your commandments are my counselors;
  - type: text
    content: your Word is my light and delight!
  - type: heading
    content: Revived by the Word
  '25':
  - type: text
    content: Lord, I’m fading away. I’m discouraged and lying in the dust;
  - type: text
    content: revive me by your word, just like you promised you would.
  '26':
  - type: text
    content: I’ve poured out my life before you,
  - type: text
    content: and you’ve always been there for me.
  - type: text
    content: 'So now I ask: teach me more of your holy decrees.'
  '27':
  - type: text
    content: Open up my understanding to the ways of your wisdom,
  - type: text
    content: and I will meditate deeply on your splendor and your wonders.
  '28':
  - type: text
    content: My life’s strength melts away with grief and sadness;
  - type: text
    content: come strengthen me and encourage me with your words.
  '29':
  - type: text
    content: Keep me far away from what is false;
  - type: text
    content: give me grace to stay true to your laws.
  '3':
  - type: text
    content: They’ll never do what’s wrong
  - type: text
    content: but will always choose the paths of the Lord.
  '30':
  - type: text
    content: I’ve chosen to obey your truth
  - type: text
    content: and walk in the splendor-light of all that you teach me.
  '31':
  - type: text
    content: Lord, don’t allow me to make a mess of my life,
  - type: text
    content: for I cling to your commands and follow them as closely as I can.
  '32':
  - type: text
    content: I will run after you with delight in my heart,
  - type: text
    content: for you will make me obedient to your instructions.
  - type: heading
    content: Understanding God’s Ways
  '33':
  - type: text
    content: Give me revelation about the meaning of your ways
  - type: text
    content: so I can enjoy the reward of following them fully.
  '34':
  - type: text
    content: Give me an understanding heart so that I can
  - type: text
    content: passionately know and obey your truth.
  '35':
  - type: text
    content: Guide me into the paths that please you,
  - type: text
    content: for I take delight in all that you say.
  '36':
  - type: text
    content: Cause my heart to bow before your words of wisdom
  - type: text
    content: and not to the wealth of this world.
  '37':
  - type: text
    content: Help me turn my eyes away from illusions
  - type: text
    content: so that I pursue only that which is true;
  - type: text
    content: drench my soul with life as I walk in your paths.
  - type: note
    content: The Masoretic Text and the Dead Sea Scrolls read “Preserve my life according to your word.”
  '38':
  - type: text
    content: Reassure me of your promises, for I am your beloved,
  - type: text
    content: your servant who bows before you.
  '39':
  - type: text
    content: Defend me from the criticism I face
  - type: text
    content: for keeping your beautiful words.
  '4':
  - type: text
    content: 'God has prescribed the right way to live:'
  - type: text
    content: obeying his laws with all our hearts.
  '40':
  - type: text
    content: See how I long with cravings for more of your ways?
  - type: text
    content: Let your righteousness revive my spirit!
  - type: heading
    content: Trust in the Lord
  '41':
  - type: text
    content: May your tender love overwhelm me, O Lord,
  - type: text
    content: for you are my Savior and you keep your promises.
  '42':
  - type: text
    content: I’ll always have an answer for those who mock me
  - type: text
    content: because I trust in your word.
  '43':
  - type: text
    content: May I never forget your truth, for I rely upon your precepts.
  '44':
  - type: text
    content: I will observe your laws every moment of the day
  - type: text
    content: and will never forget the words you say.
  '45':
  - type: text
    content: I will walk with you in complete freedom,
  - type: text
    content: for I seek to follow your every command.
  '46':
  - type: text
    content: When I stand before kings, I will tell them the truth
  - type: text
    content: and will never be ashamed.
  '47':
  - type: text
    content: My passion and delight is in your word,
  - type: text
    content: for I love what you say to me!
  '48':
  - type: text
    content: I long for more revelation of your truth,
  - type: text
    content: for I love the light of your word as I meditate on your decrees.
  - type: heading
    content: My Comfort
  '49':
  - type: text
    content: Lord, never forget the promises you’ve made to me,
  - type: text
    content: for they are my hope and confidence.
  '5':
  - type: text
    content: How I long for my life to bring you glory
  - type: text
    content: as I follow each and every one of your holy precepts!
  '50':
  - type: text
    content: In all of my affliction I find great comfort in your promises,
  - type: text
    content: for they have kept me alive!
  '51':
  - type: text
    content: No matter how bitterly the proud mockers speak against me,
  - type: text
    content: I refuse to budge from your precepts.
  '52':
  - type: text
    content: Your revelation-light is eternal;
  - type: text
    content: I’m encouraged every time I think about your truth!
  '53':
  - type: text
    content: Whenever I see the wicked breaking your laws, I feel horrible.
  '54':
  - type: text
    content: As I journey through life, I put all your statutes to music;
  - type: text
    content: they become the theme of my joyous songs.
  '55':
  - type: text
    content: Throughout the night I think of you, dear God;
  - type: text
    content: I treasure your every word to me.
  '56':
  - type: text
    content: All this joy is mine as I follow your ways!
  - type: heading
    content: My Heart Is Devoted to You
  '57':
  - type: text
    content: You are my satisfaction, Lord, and all that I need,
  - type: text
    content: so I’m determined to do everything you say.
  '58':
  - type: text
    content: With all my heart I seek your favor;
  - type: text
    content: pour out your grace on me as you promised!
  '59':
  - type: text
    content: When I realize that I’m going astray,
  - type: text
    content: I turn back to obey your instructions.
  '6':
  - type: text
    content: Then I’ll never be ashamed,
  - type: text
    content: for I take strength from all your commandments.
  '60':
  - type: text
    content: I give my all to follow your revelation-light; I will not delay to obey.
  '61':
  - type: text
    content: Even when temptations encircle me with evil,
  - type: text
    content: I won’t forget for a moment to follow your commands.
  '62':
  - type: text
    content: In the middle of the night I awake to give thanks to you
  - type: text
    content: because of all your revelation-light—so right and true!
  '63':
  - type: text
    content: Anyone who loves you and bows in obedience to your words
  - type: text
    content: will be my friend.
  '64':
  - type: text
    content: Give me more revelation of your ways,
  - type: text
    content: for I see your love and tender care everywhere.
  - type: heading
    content: My True Treasure
  '65':
  - type: text
    content: Your extravagant kindness to me
  - type: text
    content: makes me want to follow your words even more!
  '66':
  - type: text
    content: Teach me how to make good decisions,
  - type: text
    content: and give me revelation-light, for I believe in your commands.
  '67':
  - type: text
    content: Before I was humbled I used to always wander astray,
  - type: text
    content: but now I see the wisdom of your words.
  '68':
  - type: text
    content: Everything you do is beautiful, flowing from your goodness;
  - type: text
    content: teach me the power of your wonderful words!
  '69':
  - type: text
    content: Proud boasters make up lies about me
  - type: text
    content: because I am passionate to follow all that you say.
  '7':
  - type: text
    content: I will give my thanks to you from a heart of love and truth.
  - type: text
    content: And every time I learn more of your righteous judgments,
  '70':
  - type: text
    content: Their hearts are dull and void of feelings,
  - type: text
    content: but I find my true treasure in your truth.
  '71':
  - type: text
    content: The punishment you brought me through was the best thing
  - type: text
    content: that could have happened to me, for it taught me your ways.
  '72':
  - type: text
    content: The words you speak to me are worth more
  - type: text
    content: than all the riches and wealth in the whole world!
  - type: heading
    content: Growth through the Word
  '73':
  - type: text
    content: Your very hands have held me and made me who I am;
  - type: text
    content: give me more revelation-light so I may learn to please you more.
  '74':
  - type: text
    content: May all your devoted lovers see how you treat me and be glad,
  - type: text
    content: for your words are entwined with my heart.
  '75':
  - type: text
    content: Lord, I know that your judgments are always right.
  - type: text
    content: Even when it’s me you judge, you’re still faithful and true.
  '76':
  - type: text
    content: Send your kind mercy-kiss to comfort me, your servant,
  - type: text
    content: just like you promised you would.
  '77':
  - type: text
    content: Love me tenderly so I can go on,
  - type: text
    content: for I delight in your life-giving truth.
  '78':
  - type: text
    content: Shame upon the proud liars! See how they oppress me,
  - type: text
    content: all because of my passion for your precepts!
  '79':
  - type: text
    content: May all your devoted lovers follow me
  - type: text
    content: as I follow the path of your instruction.
  '8':
  - type: text
    content: I will be faithful to all that your Word reveals—
  - type: text
    content: so don’t ever give up on me!
  - type: heading
    content: True Joy
  '80':
  - type: text
    content: Make me passionate and wholehearted to fulfill your every wish,
  - type: text
    content: so that I’ll never have to be ashamed of myself.
  - type: heading
    content: Deliver Me
  '81':
  - type: text
    content: I’m lovesick with yearnings for more of your salvation,
  - type: text
    content: for my heart is entwined with your Word.
  '82':
  - type: text
    content: I’m consumed with longings for your promises,
  - type: text
    content: so I ask, “When will they all come true?”
  '83':
  - type: text
    content: My soul feels dry and shriveled, useless and forgotten,
  - type: text
    content: but I will never forget your living truth.
  '84':
  - type: text
    content: How much longer must I wait until you punish my persecutors?
  - type: text
    content: For I am your loving servant.
  '85':
  - type: text
    content: Arrogant men who hate your truth and never obey your laws
  - type: text
    content: have laid a trap for my life.
  '86':
  - type: text
    content: They don’t know that everything you say is true,
  - type: text
    content: so they harass me with their lies. Help me, Lord!
  '87':
  - type: text
    content: They’ve nearly destroyed my life, but I refuse to yield;
  - type: text
    content: I still live according to your Word.
  '88':
  - type: text
    content: Revive me with your tender love and
  - type: text
    content: spare my life by your kindness, and I will continue to obey you.
  - type: heading
    content: Faith in the Word of God
  '89':
  - type: text
    content: Standing firm in the heavens and fastened to eternity
  - type: text
    content: is the Word of God.
  '9':
  - type: text
    content: How can a young man stay pure?
  - type: text
    content: Only by living in the Word of God and walking in its truth.
  '90':
  - type: text
    content: Your faithfulness flows from one generation to the next;
  - type: text
    content: all that you created sits firmly in place to testify of you.
  '91':
  - type: text
    content: By your decree everything stands at attention,
  - type: text
    content: for all that you have made serves you.
  '92':
  - type: text
    content: Because your words are my deepest delight,
  - type: text
    content: I didn’t give up when all else was lost.
  '93':
  - type: text
    content: I can never forget the profound revelations you’ve taught me,
  - type: text
    content: for they have kept me alive more than once.
  '94':
  - type: text
    content: Lord, I’m all yours, and you are my Savior;
  - type: text
    content: I have sought to live my life pleasing to you.
  '95':
  - type: text
    content: Even though evil men wait in ambush to kill me,
  - type: text
    content: I will set my heart before you to understand more of your ways.
  '96':
  - type: text
    content: I’ve learned that there is nothing perfect
  - type: text
    content: in this imperfect world except your words,
  - type: text
    content: for they bring such fantastic freedom into my life!
  - type: heading
    content: I Love the Word of God
  '97':
  - type: text
    content: O how I love and treasure your law;
  - type: text
    content: throughout the day I fill my heart with its light!
  '98':
  - type: text
    content: By considering your commands I have an edge over my enemies,
  - type: text
    content: for I take seriously everything you say.
  '99':
  - type: text
    content: You have given me more understanding than those who teach me,
  - type: text
    content: for I’ve absorbed your eye-opening revelation.
