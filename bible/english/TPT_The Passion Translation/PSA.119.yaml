document_id: PSA.119,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms4
    children:
    - type: text
      text: The Words of God
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, a mathematical masterpiece. It consists of twenty-two stanzas of eight lines each. Each stanza begins with the same Hebrew letter at the beginning of every one of its eight lines, going in succession, by strophes, from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: alef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: —the first letter of the Hebrew alphabet, as the first letter of each line in the first strophe—to
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: taw
      - type: usfm
        marker: ft
        children:
        - type: text
          text: —the last letter of the Hebrew alphabet, as the first letter of each line in the last strophe. Like the eight lines of each stanza, there are eight Hebrew words, all synonyms, used to refer to the Word of God. Although many believe Ezra wrote
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 119
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', the acrostic poetic style is unique to King David within the book of Psalms, which points to his authorship of this psalm.'
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Way to Happiness
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: You’re only truly happy when you walk in total integrity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: walking in the light of God’s Word.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 119:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “perfection.” The Hebrew reads “utterances.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I have longed for you with the passion of my heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: don’t let me stray from your directions!
  '100':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '100'
    - type: text
      text: You have graced me with more insight than the old sages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I have not failed to walk in the light of your ways.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '101'
    - type: text
      text: I refused to bend my morals when temptation was before me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that I could become obedient to your Word.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '102'
    - type: text
      text: I refuse to turn away from difficult truths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you yourself have taught me to love your words.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '103'
    - type: text
      text: How sweet are your living promises to me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sweeter than honey is your revelation-light.
  '104':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '104'
    - type: text
      text: For your truth is the source of my understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not the falsehoods of those who don’t know you, which I despise.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Truth’s Shining Light
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '105'
    - type: text
      text: Truth’s shining light guides me in my choices and decisions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the revelation of your Word makes my pathway clear.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '106'
    - type: text
      text: To live my life by your righteous rules
  - type: usfm
    marker: q1
    children:
    - type: text
      text: has been my holy and lifelong commitment.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '107'
    - type: text
      text: I’m bruised and broken, overwhelmed by it all;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breathe life into me again by your living word.
  '108':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '108'
    - type: text
      text: Lord, receive my grateful thanks
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and teach me more of how to please you.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '109'
    - type: text
      text: Even though my life hangs in the balance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’ll keep following what you’ve taught me, no matter what.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I consider your Word to be my greatest treasure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I treasure it in my heart
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to keep me from committing sin’s treason against you.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '110'
    - type: text
      text: The ungodly have done their best to throw me off track,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I’ll not deviate from what you’ve told me to do.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '111'
    - type: text
      text: Everything you speak to me is like joyous treasure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: filling my life with gladness.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '112'
    - type: text
      text: I have determined in my heart to obey whatever you say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fully and forever!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trust and Obey
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '113'
    - type: text
      text: I despise those who can’t keep commitments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I passionately love your revelation-light!
  '114':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '114'
    - type: text
      text: You’re my place of quiet retreat, and your wraparound presence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: becomes my shield as I wrap myself in your Word!
  '115':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '115'
    - type: text
      text: Go away! Leave me, all you workers of wickedness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you can’t stop me from following every command of my God.
  '116':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '116'
    - type: text
      text: Lord, strengthen my inner being by the promises of your Word
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that I may live faithful and unashamed for you.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '117'
    - type: text
      text: Lift me up and I will be safe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Empower me to live every moment in the light of your ways.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '118'
    - type: text
      text: Lord, you reject those who reject your laws,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they fool no one but themselves!
  '119':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '119'
    - type: text
      text: The wicked are thrown away, discarded and valueless.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s why I will keep loving all of your laws!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: My wonderful God, you are to be praised above all;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teach me the power of your decrees!
  '120':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '120'
    - type: text
      text: My body trembles in holy awe of you, leaving me speechless,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I’m frightened of your righteous judgments.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Will Follow Your Ways
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '121'
    - type: text
      text: Don’t leave me to the mercies of those who hate me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I live to do what is just and fair.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '122'
    - type: text
      text: Let me hear your promise of blessing over my life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breaking me free from the proud oppressors.
  '123':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '123'
    - type: text
      text: As a lovesick lover, I yearn for more of your salvation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and for your virtuous promises.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '124'
    - type: text
      text: Let me feel your tender love, for I am yours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give me more understanding of your wonderful ways.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '125'
    - type: text
      text: I need more revelation from your Word
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to know more about you, for I’m in love with you!
  '126':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '126'
    - type: text
      text: Lord, the time has come for you to break through,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for evil men keep breaking your laws.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '127'
    - type: text
      text: Truly, your message of truth means more to me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than a vault filled with the purest gold.
  '128':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '128'
    - type: text
      text: Every word you speak, every truth revealed, is always right
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and beautiful to me, for I hate what is phony or false.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Long to Obey You
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '129'
    - type: text
      text: Your marvelous words are living miracles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no wonder I long to obey everything you say.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I speak continually of your laws
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I recite out loud your counsel to me.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '130'
    - type: text
      text: Break open your Word within me until revelation-light shines out!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those with open hearts are given insight into your plans.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '131'
    - type: text
      text: I open my mouth and inhale the Word of God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I crave the revelation of your commands.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '132'
    - type: text
      text: Turn your heart to me, Lord, and show me your grace
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like you do to every one of your godly lovers.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '133'
    - type: text
      text: Prepare before me a path filled with your promises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and don’t allow even one sin to have dominion over me.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '134'
    - type: text
      text: Rescue me from the oppression of ungodly men
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that I can keep all your precepts.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '135'
    - type: text
      text: 'Smile on me, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 119:135
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Cause your face to shine on me.”
      marker-yv: yv-n
    - type: text
      text: your loving servant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Instruct me in what is right in your eyes.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '136'
    - type: text
      text: When I witness the rebellious breaking your laws,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it makes me weep uncontrollably!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: His Word Is True
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '137'
    - type: text
      text: Lord, your judgments reveal your righteousness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your verdicts are always fair.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '138'
    - type: text
      text: The motive behind your every word is pure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your teachings are remarkably faithful and true.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '139'
    - type: text
      text: I’ve been consumed with a furious passion to do what’s right,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all because of the way my enemies disrespect your laws.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I find more joy in following what you tell me to do
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than in chasing after all the wealth of the world.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '140'
    - type: text
      text: All your promises glow with fire;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 119:140
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint and implied in the Hebrew.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that’s why I’m a lover of your Word.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '141'
    - type: text
      text: Even though I’m considered insignificant and despised
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by the world, I’ll never abandon your ways.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '142'
    - type: text
      text: Your righteousness has no end; it is everlasting,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and your rules are perfectly fair.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '143'
    - type: text
      text: Even though my troubles overwhelm me with anguish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I still delight and cherish every message you speak to me.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '144'
    - type: text
      text: Give me more revelation so that I can live for you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for nothing is more pure and eternal than your truth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Save Me, God
    marker-yv: yv-h
  '145':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '145'
    - type: text
      text: Answer my passionate prayer, O Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I’ll obey everything you say.
  '146':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '146'
    - type: text
      text: Save me, God, and I’ll follow your every instruction.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '147'
    - type: text
      text: Before the day dawns, I’ll be crying out for help
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wrapping your words into my life.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '148'
    - type: text
      text: I lie awake every night pondering your promises to me.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '149'
    - type: text
      text: Lord, listen to my heart’s cry, for I know your love is real for me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: breathe life into me again by the revelation of your justice.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I set my heart on your precepts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and pay close attention to all your ways.
  '150':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '150'
    - type: text
      text: Here they come—these lawless rebels are coming near,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they are all so far away from your laws.
  '151':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '151'
    - type: text
      text: God, you are near me always, so close to me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every one of your commands reveals truth.
  '152':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '152'
    - type: text
      text: I’ve known all along how true and unchanging
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is every word you speak, established forever!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Breathe Life into Me Again
    marker-yv: yv-h
  '153':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '153'
    - type: text
      text: Look upon all my misery and come be my hero to rescue me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I will never forget what you’ve revealed to me.
  '154':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '154'
    - type: text
      text: Take my side and defend me in these sufferings;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: redeem me and revive me, just like you promised you would.
  '155':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '155'
    - type: text
      text: The wicked are so far from salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they could not care less about your message of truth.
  '156':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '156'
    - type: text
      text: Your tender mercies are what I need, O God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: give me back my life again
  - type: usfm
    marker: q1
    children:
    - type: text
      text: through the revelation of your judgments.
  '157':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '157'
    - type: text
      text: I have so many enemies who persecute me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet I won’t swerve from following your ways.
  '158':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '158'
    - type: text
      text: I grieve when I see how the faithless ones live,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they just walk away from your promises.
  '159':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '159'
    - type: text
      text: Lord, see how much I truly love your instructions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So in your tender kindness, breathe life into me again.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: My delight is found in all your laws,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I won’t forget to walk in your words.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Abundant Life
    marker-yv: yv-h
  '160':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '160'
    - type: text
      text: The sum total of all your words adds up to absolute truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every one of your righteous decrees is everlasting.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Devoted to God’s Word
    marker-yv: yv-h
  '161':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '161'
    - type: text
      text: The powerful elite have persecuted me without a cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but my heart trembles in awe because of your miracle-words.
  '162':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '162'
    - type: text
      text: Your promises are the source of my bubbling joy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the revelation of your Word thrills me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like one who has discovered hidden treasure.
  '163':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '163'
    - type: text
      text: I despise every lie and hate every falsehood,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I am passionate about keeping your precepts.
  '164':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '164'
    - type: text
      text: I stop to praise you seven times a day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all because your ways are perfect!
  '165':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '165'
    - type: text
      text: There is such a great peace and well-being that comes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the lovers of your Word, and they will never be offended.
  '166':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '166'
    - type: text
      text: Lord, I’m longing for more of your salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I want to do what pleases you.
  '167':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '167'
    - type: text
      text: My love for your ways is indescribable;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in my innermost being I want to follow them perfectly!
  '168':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '168'
    - type: text
      text: I will keep your instructions and follow your counsel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all my ways are an open book before you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Want to Follow You
    marker-yv: yv-h
  '169':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '169'
    - type: text
      text: Lord, listen to my prayer. It’s like a sacrifice I bring to you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I must have more revelation of your Word!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Let me, your servant, walk in abundance of life
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that I may always live to obey your truth.
  '170':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '170'
    - type: text
      text: Take my words to heart when I ask you, Lord;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rescue me, just like you promised!
  '171':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '171'
    - type: text
      text: I offer you my joyous praise for all that you’ve taught me.
  '172':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '172'
    - type: text
      text: Your wonderful words will become my song of worship,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for everything you’ve commanded is perfect and true.
  '173':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '173'
    - type: text
      text: Place your hands of strength and favor upon me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I’ve made my choice to follow your ways.
  '174':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '174'
    - type: text
      text: I wait for your deliverance, O Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your words thrill me like nothing else!
  '175':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '175'
    - type: text
      text: Invigorate my life so that I can praise you even more,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and may your truth be my strength!
  '176':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '176'
    - type: text
      text: I’ll never forget what you’ve taught me, Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when I wander off and lose my way,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come after me, for I am your beloved!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Open my eyes to see the miracle-wonders hidden in Scripture.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 119:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “your law.”
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: My life on earth is so brief, so tutor me in the ways of your wisdom.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: What joy overwhelms everyone who keeps the ways of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those who seek him as their heart’s passion!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I am continually consumed by these irresistible longings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: these cravings to obey your every commandment!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Your displeasure rests with those who are arrogant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who think they know everything;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you rebuke the rebellious who refuse your laws.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Don’t let them mock and scorn me for obeying you.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: For even if the princes and my leaders choose to criticize me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will continue to serve you and walk in your plans for my life.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Your commandments are my counselors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your Word is my light and delight!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revived by the Word
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Lord, I’m fading away. I’m discouraged and lying in the dust;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: revive me by your word, just like you promised you would.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I’ve poured out my life before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you’ve always been there for me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So now I ask: teach me more of your holy decrees.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Open up my understanding to the ways of your wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will meditate deeply on your splendor and your wonders.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: My life’s strength melts away with grief and sadness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come strengthen me and encourage me with your words.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Keep me far away from what is false;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: give me grace to stay true to your laws.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: They’ll never do what’s wrong
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but will always choose the paths of the Lord.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: I’ve chosen to obey your truth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and walk in the splendor-light of all that you teach me.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Lord, don’t allow me to make a mess of my life,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I cling to your commands and follow them as closely as I can.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: I will run after you with delight in my heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you will make me obedient to your instructions.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Understanding God’s Ways
    marker-yv: yv-h
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Give me revelation about the meaning of your ways
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I can enjoy the reward of following them fully.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Give me an understanding heart so that I can
  - type: usfm
    marker: q1
    children:
    - type: text
      text: passionately know and obey your truth.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Guide me into the paths that please you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I take delight in all that you say.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Cause my heart to bow before your words of wisdom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and not to the wealth of this world.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Help me turn my eyes away from illusions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that I pursue only that which is true;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: drench my soul with life as I walk in your paths.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 119:37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Masoretic Text and the Dead Sea Scrolls read “Preserve my life according to your word.”
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Reassure me of your promises, for I am your beloved,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your servant who bows before you.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Defend me from the criticism I face
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for keeping your beautiful words.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'God has prescribed the right way to live:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: obeying his laws with all our hearts.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: See how I long with cravings for more of your ways?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let your righteousness revive my spirit!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Trust in the Lord
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: May your tender love overwhelm me, O Lord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you are my Savior and you keep your promises.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: I’ll always have an answer for those who mock me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I trust in your word.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: May I never forget your truth, for I rely upon your precepts.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: I will observe your laws every moment of the day
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will never forget the words you say.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: I will walk with you in complete freedom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I seek to follow your every command.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: When I stand before kings, I will tell them the truth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and will never be ashamed.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: My passion and delight is in your word,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I love what you say to me!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: I long for more revelation of your truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I love the light of your word as I meditate on your decrees.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: My Comfort
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Lord, never forget the promises you’ve made to me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they are my hope and confidence.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: How I long for my life to bring you glory
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I follow each and every one of your holy precepts!
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: In all of my affliction I find great comfort in your promises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they have kept me alive!
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: No matter how bitterly the proud mockers speak against me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I refuse to budge from your precepts.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Your revelation-light is eternal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I’m encouraged every time I think about your truth!
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Whenever I see the wicked breaking your laws, I feel horrible.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: As I journey through life, I put all your statutes to music;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they become the theme of my joyous songs.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Throughout the night I think of you, dear God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I treasure your every word to me.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: All this joy is mine as I follow your ways!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: My Heart Is Devoted to You
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: You are my satisfaction, Lord, and all that I need,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I’m determined to do everything you say.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: With all my heart I seek your favor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour out your grace on me as you promised!
  '59':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: When I realize that I’m going astray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I turn back to obey your instructions.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Then I’ll never be ashamed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I take strength from all your commandments.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: I give my all to follow your revelation-light; I will not delay to obey.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Even when temptations encircle me with evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I won’t forget for a moment to follow your commands.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: In the middle of the night I awake to give thanks to you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of all your revelation-light—so right and true!
  '63':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: Anyone who loves you and bows in obedience to your words
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be my friend.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Give me more revelation of your ways,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I see your love and tender care everywhere.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: My True Treasure
    marker-yv: yv-h
  '65':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: Your extravagant kindness to me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: makes me want to follow your words even more!
  '66':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Teach me how to make good decisions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and give me revelation-light, for I believe in your commands.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: Before I was humbled I used to always wander astray,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but now I see the wisdom of your words.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: Everything you do is beautiful, flowing from your goodness;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: teach me the power of your wonderful words!
  '69':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: Proud boasters make up lies about me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I am passionate to follow all that you say.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will give my thanks to you from a heart of love and truth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And every time I learn more of your righteous judgments,
  '70':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: Their hearts are dull and void of feelings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I find my true treasure in your truth.
  '71':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: The punishment you brought me through was the best thing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that could have happened to me, for it taught me your ways.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: The words you speak to me are worth more
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than all the riches and wealth in the whole world!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Growth through the Word
    marker-yv: yv-h
  '73':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '73'
    - type: text
      text: Your very hands have held me and made me who I am;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: give me more revelation-light so I may learn to please you more.
  '74':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '74'
    - type: text
      text: May all your devoted lovers see how you treat me and be glad,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your words are entwined with my heart.
  '75':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '75'
    - type: text
      text: Lord, I know that your judgments are always right.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even when it’s me you judge, you’re still faithful and true.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '76'
    - type: text
      text: Send your kind mercy-kiss to comfort me, your servant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: just like you promised you would.
  '77':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '77'
    - type: text
      text: Love me tenderly so I can go on,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I delight in your life-giving truth.
  '78':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '78'
    - type: text
      text: Shame upon the proud liars! See how they oppress me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all because of my passion for your precepts!
  '79':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '79'
    - type: text
      text: May all your devoted lovers follow me
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as I follow the path of your instruction.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: I will be faithful to all that your Word reveals—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so don’t ever give up on me!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: True Joy
    marker-yv: yv-h
  '80':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '80'
    - type: text
      text: Make me passionate and wholehearted to fulfill your every wish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that I’ll never have to be ashamed of myself.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deliver Me
    marker-yv: yv-h
  '81':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '81'
    - type: text
      text: I’m lovesick with yearnings for more of your salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my heart is entwined with your Word.
  '82':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '82'
    - type: text
      text: I’m consumed with longings for your promises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so I ask, “When will they all come true?”
  '83':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '83'
    - type: text
      text: My soul feels dry and shriveled, useless and forgotten,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I will never forget your living truth.
  '84':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '84'
    - type: text
      text: How much longer must I wait until you punish my persecutors?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am your loving servant.
  '85':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '85'
    - type: text
      text: Arrogant men who hate your truth and never obey your laws
  - type: usfm
    marker: q1
    children:
    - type: text
      text: have laid a trap for my life.
  '86':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '86'
    - type: text
      text: They don’t know that everything you say is true,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so they harass me with their lies. Help me, Lord!
  '87':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '87'
    - type: text
      text: They’ve nearly destroyed my life, but I refuse to yield;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I still live according to your Word.
  '88':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '88'
    - type: text
      text: Revive me with your tender love and
  - type: usfm
    marker: q1
    children:
    - type: text
      text: spare my life by your kindness, and I will continue to obey you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faith in the Word of God
    marker-yv: yv-h
  '89':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '89'
    - type: text
      text: Standing firm in the heavens and fastened to eternity
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is the Word of God.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: How can a young man stay pure?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Only by living in the Word of God and walking in its truth.
  '90':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '90'
    - type: text
      text: Your faithfulness flows from one generation to the next;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all that you created sits firmly in place to testify of you.
  '91':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '91'
    - type: text
      text: By your decree everything stands at attention,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for all that you have made serves you.
  '92':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '92'
    - type: text
      text: Because your words are my deepest delight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I didn’t give up when all else was lost.
  '93':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '93'
    - type: text
      text: I can never forget the profound revelations you’ve taught me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they have kept me alive more than once.
  '94':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '94'
    - type: text
      text: Lord, I’m all yours, and you are my Savior;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have sought to live my life pleasing to you.
  '95':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '95'
    - type: text
      text: Even though evil men wait in ambush to kill me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will set my heart before you to understand more of your ways.
  '96':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '96'
    - type: text
      text: I’ve learned that there is nothing perfect
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in this imperfect world except your words,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they bring such fantastic freedom into my life!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: I Love the Word of God
    marker-yv: yv-h
  '97':
  - type: usfm
