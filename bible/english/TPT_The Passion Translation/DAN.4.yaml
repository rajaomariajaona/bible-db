document_id: DAN.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Nebuchadnezzar Praises God
  - type: text
    content: 'King Nebuchadnezzar, to all peoples, nations, and language groups in the land:'
  - type: text
    content: '“I wish you perfect peace and prosperity! '
  '10':
  - type: text
    content: '“While I slept, these visions passed through my mind: I saw a huge tree in the midst of the earth. '
  '11':
  - type: text
    content: 'And the tree grew taller and stronger until its top reached into the heavens, '
  - type: note
    content: One Greek version reads “its top came close to heaven and its trunk to the clouds.”
  - type: text
    content: 'and it could be seen from the far reaches of the land. '
  '12':
  - type: text
    content: Its branches and foliage were beautiful, its fruit abundant, providing enough food for all. Animals rested under its shade, and birds found shelter in its sturdy branches. All living creatures were nourished from it.”
  - type: heading
    content: A Watcher Angel
  '13':
  - type: text
    content: '“While I was still asleep, I saw another vision: I saw a watcher, a holy one, '
  - type: note
    content: 'Or literally “[a being] watchful and holy” (see vv. 17, 23). A watcher (or sentinel) is a heavenly being that never sleeps and is always in the presence of the holy God. Some consider the “watchers” to be a special class of angels. The earliest account of the watchers is found in the Book of the Watchers (250–200 BC), which can be found in chs. 1–36 of 1 Enoch. “Watchers” is a translation of the Aramaic (lit. “the awake ones”). The watchers are mentioned extensively in the books of Enoch and the Dead Sea Scrolls (1QApGen). They are not demons or mythological creatures but angels from heaven. Some have fallen from their holy place before God, and some have not. The books of Enoch indicate that the angels or “sons of God” who had sex with women who gave birth to the Nephilim were watchers. The books mention a few of the leaders of the two hundred watchers by name. In the Jewish literature of the Hellenistic and early Roman periods, the watchers are widely acknowledged. (See L. D. Merino, “Los ‘vigilantes’ en la literatura intertestamentaria,” Simposio Biblico Español: Salamanca, 1982, ed. N. Fernandez-Marcos, et al. [Madrid: Universidad Complutense, 1984], 575–609.)'
  - type: text
    content: 'come down from heaven. '
  '14':
  - type: text
    content: 'At the top of his voice, he announced: ‘Cut down the tree, lop off its branches, strip off its leaves, and scatter its fruit. Drive away the animals from beneath its shelter and the birds from its branches. '
  '15':
  - type: text
    content: 'But leave the stump with its roots in the ground. '
  - type: note
    content: A stump with its roots implies the hope of restoration (see Job 14:8–9; Isa. 11:1).
  - type: text
    content: 'Encircle it with chains of iron and bronze, surrounded by the grass of the field. '
  - type: text
    content: Night after night
  - type: text
    content: ', let him be damp with heaven’s dew. Let him live with the animals among the plants of the earth as his appointed lot. Let him eat the grass '
  - type: note
    content: Or “plants [vegetation].”
  - type: text
    content: 'of the field. '
  '16':
  - type: text
    content: 'For seven years, '
  - type: note
    content: Or “seven seasons [periods].”
  - type: text
    content: 'let his mind '
  - type: note
    content: Or “heart.”
  - type: text
    content: 'be altered into the mind of a beast. '
  '17':
  - type: text
    content: 'Such is the sentence decreed by the watchers, the decision by the word of the holy ones, so that everyone living may learn that the Most High '
  - type: text
    content: God
  - type: text
    content: ' is sovereign over '
  - type: note
    content: Or “is powerful over” (also in v. 25). The Most High God is contrasted with the “gods” mentioned in vv. 8 and 9.
  - type: text
    content: the kingdoms of men. He can give them to whomever he pleases and raises up over them the lowliest of all people.’ ”
  '18':
  - type: text
    content: Then King Nebuchadnezzar concluded, “That was my dream. Now it is for you, Belteshazzar, to interpret its meaning, since not one of the wise men in my kingdom has been able to interpret it for me, but I know that you can, since the spirit of the holy gods resides in you.”
  - type: note
    content: Nebuchadnezzar didn’t pick up on Daniel’s switch to singular in v. 17, where he used “the Most High God.” They were talking past each other, and this gives the dialogue the feel of authenticity.
  - type: heading
    content: Daniel Interprets the King’s Dream
  '19':
  - type: text
    content: 'Upon hearing this, Daniel (known as Belteshazzar) was visibly shaken for a while and troubled in his thoughts. The king '
  - type: text
    content: noticed this
  - type: text
    content: ' and said to him, “Belteshazzar, do not be alarmed by the dream and its meaning.”'
  - type: text
    content: 'Belteshazzar answered, “My lord, if only the dream applied to those who hate you and its interpretation were for your enemies! '
  '2':
  - type: text
    content: It is my royal pleasure to inform you of the mighty signs and wonders that the Most High God has performed for me.
  '20':
  - type: text
    content: 'The huge tree you saw, so large and tall that it reached into the heavens and could be seen from anywhere in the land, '
  '21':
  - type: text
    content: 'the tree with beautiful branches and foliage and abundant fruit, providing food for all and shade for the wild animals, and birds with nests in its branches: '
  '22':
  - type: text
    content: that tree, Your Majesty, is you! You are now so great and strong that it reaches into heaven, and your authority reaches over the entire land.
  '23':
  - type: text
    content: '“Now you, O king, saw a watcher—a holy messenger—come down from heaven, saying, ‘Cut the tree down and destroy it, but leave the stump and roots in the ground. Encircle it with chains of iron and bronze in the midst of the grass of the field. Let him be damp with the dew every night. Let him live with the animals among the plants of the earth as his appointed lot until seven years '
  - type: note
    content: Or “seven times.” See v. 25.
  - type: text
    content: 'have passed by for him.’ '
  '24':
  - type: text
    content: 'So, the meaning of what you saw, Your Majesty, and the decree the Most High has decreed over you, my lord the king, is this:'
  '25':
  - type: text
    content: '“You will be driven far from human society and will make your home with the wild beasts for seven years. Like cattle, you will eat grass, and you will be damp with the dew of heaven, '
  - type: note
    content: By implication, Nebuchadnezzar will sleep in the open fields as an animal as the morning dew falls upon him.
  - type: text
    content: until you have learned that the Most High is sovereign over the kingdoms of men and can give them to whomever he pleases.
  '26':
  - type: text
    content: '“And the '
  - type: text
    content: watcher’s
  - type: text
    content: ' order, ‘Leave the stump with its roots in the ground,’ means this: '
  - type: text
    content: God
  - type: text
    content: ' will restore your kingdom to you '
  - type: note
    content: Nebuchadnezzar was like the tree being cut down, which symbolized his disgrace and removal from the throne, but the leaving of the stump in the ground was a promise that he and his kingdom would one day be restored. The encircling of the stump with chains may suggest that he was protected by God until God’s purposes for him were fulfilled.
  - type: text
    content: 'once you come to '
  - type: text
    content: your senses and
  - type: text
    content: ' understand that Heaven rules over all.'
  '27':
  - type: text
    content: '“Your Majesty, please be willing to do what I say and accept my advice. Renounce '
  - type: note
    content: Or “break off,” a word used for breaking off a yoke (see Gen. 27:40).
  - type: text
    content: your sins by doing what is right. Turn from your wickedness by showing mercy to the poor and unfortunate, and perhaps your prosperity will continue.”
  - type: heading
    content: The Dream Comes True
  '28':
  - type: text
    content: 'All '
  - type: text
    content: that was predicted
  - type: text
    content: ' happened to King Nebuchadnezzar. '
  '29':
  - type: text
    content: 'A year later, while strolling on the roof of his royal palace in Babylon, '
  '3':
  - type: text
    content: “How great are his signs!
  - type: text
    content: How overwhelming are his wonders!
  - type: text
    content: His kingdom will last forever,
  - type: text
    content: and his dominion endures from one generation to the next.”
  - type: heading
    content: Nebuchadnezzar Dreams about a Great Tree
  '30':
  - type: text
    content: 'the king began to boast: “'
  - type: text
    content: Look at you!
  - type: text
    content: ' Is not this Babylon the great? By my brilliant wisdom, '
  - type: note
    content: Or “mighty power.”
  - type: text
    content: 'I built all this as my royal residence to display the glory of my majesty.” '
  '31':
  - type: text
    content: 'The words were no sooner out of his mouth than a voice spoke '
  - type: note
    content: Or literally “a voice fell from heaven.”
  - type: text
    content: 'from out of heaven:'
  - type: text
    content: '“Here is my verdict concerning you, King Nebuchadnezzar: I have now taken your kingdom from you! '
  '32':
  - type: text
    content: 'You will be driven far from human society for seven years. You will make your home with the wild beasts, '
  - type: note
    content: When people give themselves the glory for what God has done, they become beastlike. At least beasts behave the way beasts should behave. But we who are made in the image of God, when we become arrogant and boastful and refuse to humble ourselves before our Creator, we become even worse than beasts. See Rom. 1:24–28; Rev. 11:7; 13:1; 14:9–11.
  - type: text
    content: 'and you will eat grass like cattle until you have learned that '
  - type: text
    content: I
  - type: text
    content: ', the Most High, am sovereign over the kingdoms of men and can give them to whomever I please.”'
  '33':
  - type: text
    content: 'It was no sooner said than done: Nebuchadnezzar was '
  - type: text
    content: forced to live like a wild animal
  - type: text
    content: ' and was driven far from human society and ate grass as cattle do. '
  - type: text
    content: Night after night
  - type: text
    content: ' he was damp with the dew of heaven, his hair grew remarkably long like eagle’s '
  - type: text
    content: feathers
  - type: text
    content: ', and his nails became like a bird’s '
  - type: text
    content: talons
  - type: text
    content: .
  - type: note
    content: 'This is known as lycanthropy (or zoanthropy or boanthropy), a condition in which sufferers imitate dogs, wolves, cows, and other wild animals. (See Richard Hunter and Ida Macalpine, Three Hundred Years of Psychiatry, 1535–1860 [Oxford: Oxford University Press, 1963], 168; E. B. Pusey, Daniel the Prophet [Minneapolis: Klock & Klock, 1978], 425–33; R. K. Harrison, Introduction to the Old Testament [Grand Rapids: Eerdmans, 1979], 1116–17.)'
  - type: heading
    content: Nebuchadnezzar Praises the Most High
  '34':
  - type: text
    content: '“When the appointed time '
  - type: note
    content: Or “the days.”
  - type: text
    content: 'had come, I, Nebuchadnezzar, raised my eyes to heaven, and my sanity returned to me. And I blessed the Most High, praising and glorifying him who lives forever:'
  - type: text
    content: “His kingdom is an everlasting kingdom,
  - type: text
    content: and his dominion endures from one generation to the next.
  '35':
  - type: text
    content: All who dwell on earth are regarded as nothing compared to him.
  - type: text
    content: He does whatever he pleases with the armies of heaven
  - type: text
    content: and with those who dwell on earth.
  - type: text
    content: 'No one can '
  - type: text
    content: restrain
  - type: text
    content: ' his mighty hand'
  - type: text
    content: or dare ask him, ‘What are you doing?’
  '36':
  - type: text
    content: At the moment I began to praise him,
  - type: text
    content: I was restored to my right mind.
  - type: text
    content: The Most High
  - type: text
    content: ' gave me back'
  - type: text
    content: the majesty and splendor of my kingdom.
  - type: text
    content: My advisers and noblemen came looking for me.
  - type: text
    content: I was restored to my throne,
  - type: text
    content: and still more greatness was added to me.
  '37':
  - type: text
    content: And now I, Nebuchadnezzar,
  - type: text
    content: 'praise, extol, and glorify '
  - type: text
    content: God
  - type: text
    content: ', the King of heaven!'
  - type: text
    content: All his works are right and true,
  - type: text
    content: and all his ways are right.
  - type: text
    content: He knows how to humble those who strut around in pride.”
  - type: note
    content: See 1 Sam. 2:7.
  '4':
  - type: text
    content: '“I, Nebuchadnezzar, '
  - type: note
    content: Or “In the seventeenth year of his reign, Nebuchadnezzar said” (LXX). The Aramaic text marks these verses as 3:31–33 and places them in the previous chapter; however, these verses appear in most English Bibles as Dan. 4:1–3. It is likely that the events of ch. 4 happened twenty years or more after the episode of the fiery furnace described in ch. 3.
  - type: text
    content: 'was content and at peace in my house—thoroughly enjoying a life of luxury in my palace. '
  '5':
  - type: text
    content: One night
  - type: text
    content: ', I had a terrifying dream. While I was lying on my bed, frightening visions passed through my head, and I was tormented by what I saw. '
  '6':
  - type: text
    content: 'So I issued a decree that all the sages of Babylon must come and explain to me what my dream meant. '
  '7':
  - type: text
    content: 'Magicians, enchanters, wizards, and wise men '
  - type: note
    content: Or “Chaldeans [astrologers],” likely a general term for all who practiced divination. The Babylonians were known as those who specialized in the magic arts.
  - type: text
    content: 'came, and I explained my dream to them, but they were unable to interpret it for me. '
  '8':
  - type: text
    content: 'Finally, Daniel came before me. (I had renamed him Belteshazzar, '
  - type: note
    content: One of the principal Babylonian deities was called “Bel” (Isa. 46:1), a cognate of “Baal.”
  - type: text
    content: 'after my own god.) The spirit of the holy gods '
  - type: note
    content: 'Or “the spirit of the holy God.” See vv. 9, 18; cf. Josh. 24:19. Although Nebuchadnezzar was not a monotheist, he had already referred to Elohim as the “Great God” or “Most High God” (Dan. 3:26; 4:2). The singular (Theou) is also found in Theodotion’s Greek text. (See Edward J. Young, The Prophecy of Daniel: A Commentary [Grand Rapids, MI: Eerdmans, 1980], 99; Leon J. Wood, A Commentary on Daniel [Grand Rapids, MI: Zondervan, 1973], 106; and J. A. Montgomery, A Critical and Exegetical Commentary on the Book of Daniel, The International Critical Commentary [Edinburgh: T & T Clark, 1927], 225–26.)'
  - type: text
    content: 'resides in him. I then told Daniel my dream:'
  '9':
  - type: text
    content: '“Belteshazzar, chief of all my wise men, '
  - type: note
    content: Or literally “chief magician,” which may confuse the English reader, since Daniel did not dabble in magic but was anointed with the Spirit of revelation (see Eph. 1:17).
  - type: text
    content: I know that the spirit of the holy gods resides in you and that there is no mystery that you cannot solve. So, listen to my dream and tell me what it means.
