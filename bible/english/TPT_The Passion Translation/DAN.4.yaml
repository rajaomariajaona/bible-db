document_id: DAN.4,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar Praises God
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'King Nebuchadnezzar, to all peoples, nations, and language groups in the land:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I wish you perfect peace and prosperity! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“While I slept, these visions passed through my mind: I saw a huge tree in the midst of the earth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'And the tree grew taller and stronger until its top reached into the heavens, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: One Greek version reads “its top came close to heaven and its trunk to the clouds.”
      marker-yv: yv-n
    - type: text
      text: 'and it could be seen from the far reaches of the land. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Its branches and foliage were beautiful, its fruit abundant, providing enough food for all. Animals rested under its shade, and birds found shelter in its sturdy branches. All living creatures were nourished from it.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Watcher Angel
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“While I was still asleep, I saw another vision: I saw a watcher, a holy one, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “[a being] watchful and holy” (see vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '23'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). A watcher (or sentinel) is a heavenly being that never sleeps and is always in the presence of the holy God. Some consider the “watchers” to be a special class of angels. The earliest account of the watchers is found in the
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Book of the Watchers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (250–200 BC), which can be found in chs. 1–36 of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 1 Enoch
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . “Watchers” is a translation of the Aramaic (lit. “the awake ones”). The watchers are mentioned extensively in the books of Enoch and the Dead Sea Scrolls (1QApGen). They are not demons or mythological creatures but angels from heaven. Some have fallen from their holy place before God, and some have not. The books of Enoch indicate that the angels or “sons of God” who had sex with women who gave birth to the Nephilim were watchers. The books mention a few of the leaders of the two hundred watchers by name. In the Jewish literature of the Hellenistic and early Roman periods, the watchers are widely acknowledged. (See L. D. Merino, “Los ‘vigilantes’ en la literatura intertestamentaria,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Simposio Biblico Español: Salamanca, 1982'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ed. N. Fernandez-Marcos, et al. [Madrid: Universidad Complutense, 1984], 575–609.)'
      marker-yv: yv-n
    - type: text
      text: 'come down from heaven. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'At the top of his voice, he announced: ‘Cut down the tree, lop off its branches, strip off its leaves, and scatter its fruit. Drive away the animals from beneath its shelter and the birds from its branches. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But leave the stump with its roots in the ground. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A stump with its roots implies the hope of restoration (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Job 14:8–9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 11:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Encircle it with chains of iron and bronze, surrounded by the grass of the field. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Night after night
    - type: text
      text: ', let him be damp with heaven’s dew. Let him live with the animals among the plants of the earth as his appointed lot. Let him eat the grass '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “plants [vegetation].”
      marker-yv: yv-n
    - type: text
      text: 'of the field. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'For seven years, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “seven seasons [periods].”
      marker-yv: yv-n
    - type: text
      text: 'let his mind '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “heart.”
      marker-yv: yv-n
    - type: text
      text: 'be altered into the mind of a beast. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Such is the sentence decreed by the watchers, the decision by the word of the holy ones, so that everyone living may learn that the Most High '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' is sovereign over '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “is powerful over” (also in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). The Most High God is contrasted with the “gods” mentioned in vv.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '9'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the kingdoms of men. He can give them to whomever he pleases and raises up over them the lowliest of all people.’ ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then King Nebuchadnezzar concluded, “That was my dream. Now it is for you, Belteshazzar, to interpret its meaning, since not one of the wise men in my kingdom has been able to interpret it for me, but I know that you can, since the spirit of the holy gods resides in you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nebuchadnezzar didn’t pick up on Daniel’s switch to singular in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', where he used “the Most High God.” They were talking past each other, and this gives the dialogue the feel of authenticity.'
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel Interprets the King’s Dream
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Upon hearing this, Daniel (known as Belteshazzar) was visibly shaken for a while and troubled in his thoughts. The king '
    - type: usfm
      marker: it
      children:
      - type: text
        text: noticed this
    - type: text
      text: ' and said to him, “Belteshazzar, do not be alarmed by the dream and its meaning.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Belteshazzar answered, “My lord, if only the dream applied to those who hate you and its interpretation were for your enemies! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It is my royal pleasure to inform you of the mighty signs and wonders that the Most High God has performed for me.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The huge tree you saw, so large and tall that it reached into the heavens and could be seen from anywhere in the land, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'the tree with beautiful branches and foliage and abundant fruit, providing food for all and shade for the wild animals, and birds with nests in its branches: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: that tree, Your Majesty, is you! You are now so great and strong that it reaches into heaven, and your authority reaches over the entire land.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“Now you, O king, saw a watcher—a holy messenger—come down from heaven, saying, ‘Cut the tree down and destroy it, but leave the stump and roots in the ground. Encircle it with chains of iron and bronze in the midst of the grass of the field. Let him be damp with the dew every night. Let him live with the animals among the plants of the earth as his appointed lot until seven years '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “seven times.” See v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '25'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'have passed by for him.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'So, the meaning of what you saw, Your Majesty, and the decree the Most High has decreed over you, my lord the king, is this:'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“You will be driven far from human society and will make your home with the wild beasts for seven years. Like cattle, you will eat grass, and you will be damp with the dew of heaven, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: By implication, Nebuchadnezzar will sleep in the open fields as an animal as the morning dew falls upon him.
      marker-yv: yv-n
    - type: text
      text: until you have learned that the Most High is sovereign over the kingdoms of men and can give them to whomever he pleases.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“And the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: watcher’s
    - type: text
      text: ' order, ‘Leave the stump with its roots in the ground,’ means this: '
    - type: usfm
      marker: it
      children:
      - type: text
        text: God
    - type: text
      text: ' will restore your kingdom to you '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nebuchadnezzar was like the tree being cut down, which symbolized his disgrace and removal from the throne, but the leaving of the stump in the ground was a promise that he and his kingdom would one day be restored. The encircling of the stump with chains may suggest that he was protected by God until God’s purposes for him were fulfilled.
      marker-yv: yv-n
    - type: text
      text: 'once you come to '
    - type: usfm
      marker: it
      children:
      - type: text
        text: your senses and
    - type: text
      text: ' understand that Heaven rules over all.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“Your Majesty, please be willing to do what I say and accept my advice. Renounce '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “break off,” a word used for breaking off a yoke (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 27:40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: your sins by doing what is right. Turn from your wickedness by showing mercy to the poor and unfortunate, and perhaps your prosperity will continue.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Dream Comes True
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'All '
    - type: usfm
      marker: it
      children:
      - type: text
        text: that was predicted
    - type: text
      text: ' happened to King Nebuchadnezzar. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'A year later, while strolling on the roof of his royal palace in Babylon, '
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “How great are his signs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How overwhelming are his wonders!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His kingdom will last forever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his dominion endures from one generation to the next.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nebuchadnezzar Dreams about a Great Tree
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'the king began to boast: “'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Look at you!
    - type: text
      text: ' Is not this Babylon the great? By my brilliant wisdom, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “mighty power.”
      marker-yv: yv-n
    - type: text
      text: 'I built all this as my royal residence to display the glory of my majesty.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'The words were no sooner out of his mouth than a voice spoke '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “a voice fell from heaven.”
      marker-yv: yv-n
    - type: text
      text: 'from out of heaven:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Here is my verdict concerning you, King Nebuchadnezzar: I have now taken your kingdom from you! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'You will be driven far from human society for seven years. You will make your home with the wild beasts, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 4:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When people give themselves the glory for what God has done, they become beastlike. At least beasts behave the way beasts should behave. But we who are made in the image of God, when we become arrogant and boastful and refuse to humble ourselves before our Creator, we become even worse than beasts. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 1:24–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 11:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
