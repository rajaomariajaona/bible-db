document_id: PSA.105,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Wonderful Works The first fifteen verses of this psalm were sung as the ark of glory was brought up to Jerusalem. See 2 Sam. 6; 1 Chron. 13–16.
  - type: text
    content: Go ahead and give God thanks
  - type: text
    content: for all the glorious things he has done!
  - type: text
    content: Go ahead and worship him!
  - type: text
    content: Tell everyone about his wonders!
  '10':
  - type: text
    content: His promises have become an everlasting covenant to Jacob,
  - type: text
    content: as a decree to Jacob.
  '11':
  - type: text
    content: He said to them, “I will give you all the land of Canaan
  - type: text
    content: as your inheritance.”
  '12':
  - type: text
    content: They were very few in number
  - type: text
    content: when God gave them that promise,
  - type: text
    content: and they were all foreigners to that land.
  '13':
  - type: text
    content: They were wandering from one land to another
  - type: text
    content: and from one kingdom to another.
  - type: note
    content: Or “from a kingdom to another nation.”
  '14':
  - type: text
    content: Yet God would not permit anyone to touch them,
  - type: text
    content: punishing even kings who came against them.
  '15':
  - type: text
    content: He said to them, “Don’t you dare lay a hand on my anointed ones,
  - type: text
    content: and don’t do a thing to hurt my prophets!”
  '16':
  - type: text
    content: So God decreed a famine upon Canaan-land,
  - type: text
    content: cutting off their food supply.
  '17':
  - type: text
    content: But he had already sent a man ahead of his people to Egypt;
  - type: text
    content: it was Joseph, who was sold as a slave.
  '18':
  - type: text
    content: His feet were bruised by strong shackles
  - type: text
    content: and his soul was held by iron.
  '19':
  - type: text
    content: God’s promise to Joseph purged his character
  - type: text
    content: until it was time for his dreams to come true.
  '2':
  - type: text
    content: Let’s sing his praises! Sing, and put all of his miracles to music!
  '20':
  - type: text
    content: Eventually, the king of Egypt sent for him, setting him free at last.
  '21':
  - type: text
    content: Then Joseph was put in charge of everything under the king;
  - type: text
    content: he became the master of the palace
  - type: text
    content: over all the royal possessions.
  '22':
  - type: text
    content: Pharoah gave him authority over all the princes of the land,
  - type: text
    content: and Joseph became the teacher of wisdom to the king’s advisers.
  '23':
  - type: text
    content: Then Jacob, with all of Joseph’s family,
  - type: text
    content: came from Canaan to Egypt and settled in Goshen.
  - type: note
    content: Or “lived as a foreigner in the land of Ham [Egypt].” Ham was a son of Noah.
  '24':
  - type: text
    content: God made them very fruitful, and they multiplied incredibly
  - type: text
    content: until they were greater in number than those who ruled them.
  '25':
  - type: text
    content: God turned their hearts to hate his people
  - type: text
    content: and to deal treacherously with his servants.
  '26':
  - type: text
    content: But he sent them his faithful servant, Moses, the deliverer,
  - type: text
    content: and chose Aaron to accompany him.
  '27':
  - type: text
    content: Their command brought down signs and wonders,
  - type: text
    content: working miracles in Egypt.
  '28':
  - type: text
    content: By God’s direction, they spoke and released a plague
  - type: text
    content: of thick darkness over the land.
  '29':
  - type: text
    content: God turned their rivers to blood, causing every fish to die.
  '3':
  - type: text
    content: Shine and make your joyful boast in him, you lovers of God.
  - type: text
    content: Let’s be happy and keep rejoicing no matter what.
  '30':
  - type: text
    content: And the judgment-plague of frogs came in enormous numbers,
  - type: text
    content: swarming everywhere, even into Pharaoh’s bedroom!
  '31':
  - type: text
    content: God spoke and another plague was released—
  - type: text
    content: massive swarms of flies, vast clouds of insects, covered the land.
  '32':
  - type: text
    content: God rained down hail and flaming fire upon Egypt.
  '33':
  - type: text
    content: Their gardens and vines were all destroyed,
  - type: text
    content: shattering trees into splinters throughout the territory.
  '34':
  - type: text
    content: God spoke, and devouring hordes of locusts swept over the land,
  '35':
  - type: text
    content: picking the ground clean of vegetation and crops.
  '36':
  - type: text
    content: Then God struck down their firstborn sons,
  - type: text
    content: 'the pride and joy '
  - type: note
    content: Or “the beginning of all their strength.”
  - type: text
    content: of every Egyptian family.
  '37':
  - type: text
    content: At last, God freed all the Hebrews from their slavery
  - type: text
    content: and sent them away laden with the silver and gold of Egypt.
  - type: text
    content: 'And not even one was feeble '
  - type: note
    content: Or “Not one of his tribes was a pauper” or “Not one stumbled.”
  - type: text
    content: on their way out!
  '38':
  - type: text
    content: Egypt was relieved at their exodus, ready to see them go,
  - type: text
    content: for the terror of the Lord of the Hebrews had fallen upon them!
  '39':
  - type: text
    content: God spread out a cloud as shade as they moved ahead
  - type: text
    content: and a cloud of fire to light up their night.
  '4':
  - type: text
    content: Seek more of his strength! Seek more of him!
  - type: text
    content: Let’s always be seeking the light of his face.
  '40':
  - type: text
    content: Moses prayed and God brought them quail to eat.
  - type: text
    content: He satisfied them with heaven’s bread falling from the sky.
  '41':
  - type: text
    content: He broke open the boulder
  - type: text
    content: and the waters poured out like a river in the desert.
  '42':
  - type: text
    content: For God could never forget
  - type: text
    content: his holy promise to his servant Abraham.
  '43':
  - type: text
    content: So God brought out his chosen ones with singing;
  - type: text
    content: with a joyful shout they were set free!
  '44':
  - type: text
    content: He gave them lands and nations, just like he promised.
  - type: text
    content: Fruitful lands of crops they had never planted were now theirs.
  '45':
  - type: text
    content: All this was done for them so that they would be faithful
  - type: text
    content: to keep the ways of God, obeying his laws and following his truths.
  - type: text
    content: Hallelujah! Praise the Lord!
  '5':
  - type: text
    content: Don’t you ever forget his miracles and marvels.
  - type: text
    content: Hold to your heart every judgment he has decreed.
  '6':
  - type: text
    content: For you are his servants, the true seed of Abraham,
  - type: text
    content: and you are the chosen ones, Jacob’s sons.
  '7':
  - type: text
    content: For he is the Lord our God,
  - type: text
    content: 'and his wise authority '
  - type: note
    content: Or “judgments.”
  - type: text
    content: can be seen in all he does.
  '8':
  - type: text
    content: For though a thousand generations may pass away,
  - type: text
    content: he is still true to his word.
  - type: text
    content: 'He has kept every promise '
  - type: note
    content: Or “promise of the covenant [pact].”
  - type: text
    content: he made to Abraham and to Isaac.
