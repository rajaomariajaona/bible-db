document_id: PSA.105
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: God’s Wonderful Works
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '105'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The first fifteen verses of this psalm were sung as the ark of glory was brought up to Jerusalem. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 2 Sam. 6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1 Chron. 13–16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Go ahead and give God thanks
- type: usfm
  marker: q1
  children:
  - type: text
    text: for all the glorious things he has done!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Go ahead and worship him!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell everyone about his wonders!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let’s sing his praises! Sing, and put all of his miracles to music!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Shine and make your joyful boast in him, you lovers of God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s be happy and keep rejoicing no matter what.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Seek more of his strength! Seek more of him!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let’s always be seeking the light of his face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Don’t you ever forget his miracles and marvels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hold to your heart every judgment he has decreed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For you are his servants, the true seed of Abraham,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you are the chosen ones, Jacob’s sons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For he is the Lord our God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'and his wise authority '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 105:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “judgments.”
    marker-yv: yv-n
  - type: text
    text: can be seen in all he does.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: For though a thousand generations may pass away,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he is still true to his word.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'He has kept every promise '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 105:8–9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “promise of the covenant [pact].”
    marker-yv: yv-n
  - type: text
    text: he made to Abraham and to Isaac.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His promises have become an everlasting covenant to Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as a decree to Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He said to them, “I will give you all the land of Canaan
- type: usfm
  marker: q1
  children:
  - type: text
    text: as your inheritance.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They were very few in number
- type: usfm
  marker: q1
  children:
  - type: text
    text: when God gave them that promise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they were all foreigners to that land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They were wandering from one land to another
- type: usfm
  marker: q1
  children:
  - type: text
    text: and from one kingdom to another.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 105:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “from a kingdom to another nation.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Yet God would not permit anyone to touch them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: punishing even kings who came against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He said to them, “Don’t you dare lay a hand on my anointed ones,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and don’t do a thing to hurt my prophets!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So God decreed a famine upon Canaan-land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cutting off their food supply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But he had already sent a man ahead of his people to Egypt;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it was Joseph, who was sold as a slave.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: His feet were bruised by strong shackles
- type: usfm
  marker: q1
  children:
  - type: text
    text: and his soul was held by iron.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God’s promise to Joseph purged his character
- type: usfm
  marker: q1
  children:
  - type: text
    text: until it was time for his dreams to come true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eventually, the king of Egypt sent for him, setting him free at last.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Joseph was put in charge of everything under the king;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he became the master of the palace
- type: usfm
  marker: q1
  children:
  - type: text
    text: over all the royal possessions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pharoah gave him authority over all the princes of the land,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and Joseph became the teacher of wisdom to the king’s advisers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then Jacob, with all of Joseph’s family,
- type: usfm
  marker: q1
  children:
  - type: text
    text: came from Canaan to Egypt and settled in Goshen.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 105:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “lived as a foreigner in the land of Ham [Egypt].” Ham was a son of Noah.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: God made them very fruitful, and they multiplied incredibly
- type: usfm
  marker: q1
  children:
  - type: text
    text: until they were greater in number than those who ruled them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: God turned their hearts to hate his people
- type: usfm
  marker: q1
  children:
  - type: text
    text: and to deal treacherously with his servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: But he sent them his faithful servant, Moses, the deliverer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and chose Aaron to accompany him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Their command brought down signs and wonders,
- type: usfm
  marker: q1
  children:
  - type: text
    text: working miracles in Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: By God’s direction, they spoke and released a plague
- type: usfm
  marker: q1
  children:
  - type: text
    text: of thick darkness over the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: God turned their rivers to blood, causing every fish to die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: And the judgment-plague of frogs came in enormous numbers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: swarming everywhere, even into Pharaoh’s bedroom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: God spoke and another plague was released—
- type: usfm
  marker: q1
  children:
  - type: text
    text: massive swarms of flies, vast clouds of insects, covered the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: God rained down hail and flaming fire upon Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Their gardens and vines were all destroyed,
- type: usfm
  marker: q1
  children:
  - type: text
    text: shattering trees into splinters throughout the territory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: God spoke, and devouring hordes of locusts swept over the land,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: picking the ground clean of vegetation and crops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then God struck down their firstborn sons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the pride and joy '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 105:36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the beginning of all their strength.”
    marker-yv: yv-n
  - type: text
    text: of every Egyptian family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: At last, God freed all the Hebrews from their slavery
- type: usfm
  marker: q1
  children:
  - type: text
    text: and sent them away laden with the silver and gold of Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'And not even one was feeble '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 105:37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Not one of his tribes was a pauper” or “Not one stumbled.”
    marker-yv: yv-n
  - type: text
    text: on their way out!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Egypt was relieved at their exodus, ready to see them go,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the terror of the Lord of the Hebrews had fallen upon them!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: God spread out a cloud as shade as they moved ahead
- type: usfm
  marker: q1
  children:
  - type: text
    text: and a cloud of fire to light up their night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Moses prayed and God brought them quail to eat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He satisfied them with heaven’s bread falling from the sky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: He broke open the boulder
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the waters poured out like a river in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: For God could never forget
- type: usfm
  marker: q1
  children:
  - type: text
    text: his holy promise to his servant Abraham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: So God brought out his chosen ones with singing;
- type: usfm
  marker: q1
  children:
  - type: text
    text: with a joyful shout they were set free!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: He gave them lands and nations, just like he promised.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fruitful lands of crops they had never planted were now theirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: All this was done for them so that they would be faithful
- type: usfm
  marker: q1
  children:
  - type: text
    text: to keep the ways of God, obeying his laws and following his truths.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah! Praise the Lord!
