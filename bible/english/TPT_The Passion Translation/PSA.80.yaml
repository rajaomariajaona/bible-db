document_id: PSA.80,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Rescue and Restore
  - type: text
    content: For the Pure and Shining One
  - type: text
    content: Asaph’s poetic song To the tune of “Your Decrees Are like Lilies”
  - type: text
    content: God-Enthroned, be revealed in splendor
  - type: text
    content: as you ride upon the cherubim!
  - type: text
    content: How perfectly you lead us, a people set free.
  - type: note
    content: Or “You lead Joseph like a flock.” Joseph, as a metaphor, becomes a picture of the saga of God’s people once imprisoned and now set free to rule and reign.
  - type: text
    content: Loving shepherd of Israel—listen to our hearts’ cry!
  - type: text
    content: Shine forth from your throne of dazzling light.
  '10':
  - type: text
    content: Because of your favor on your vineyard,
  - type: text
    content: blessing extended to every mountain of influence.
  - type: text
    content: Through this flourishing vineyard mighty ones were raised up.
  - type: text
    content: The nations were blessed by your fruitful vineyard of Israel,
  - type: text
    content: 'all the way from the Mediterranean Sea '
  - type: note
    content: This translation makes explicit the symbols in the text. The “vineyard” is Israel, the mountains are the high places of influence in culture, the cedars (“mighty ones”) are the mighty and powerful of men, and the “Sea” speaks of the nations (sea of humanity).
  - type: text
    content: to the Euphrates.
  '12':
  - type: text
    content: So Lord, why have you broken down
  - type: text
    content: your fence of favor around us?
  - type: text
    content: Trespassers can steal the fruit from off our vines,
  - type: text
    content: and now every wild beast comes
  - type: text
    content: breaking through our wall to ravage us.
  - type: text
    content: You’ve left us without protection!
  '14':
  - type: text
    content: Come back, come back, O God to restore us!
  - type: text
    content: You are the Commander of Angel Armies.
  - type: text
    content: Look down from heaven and see our crisis.
  - type: text
    content: Come down and care for your lovely vineyard once again.
  '15':
  - type: text
    content: Nurture our root and our fruit with your loving care.
  - type: text
    content: Raise up the Branch-Man, the Son whom you’ve made strong.
  '16':
  - type: text
    content: Enemies chopped down our vine and set it on fire;
  - type: text
    content: now show them your anger and let them perish by your frown.
  '17':
  - type: text
    content: Strengthen this Branch-Man, the Son of your love,
  - type: text
    content: the Son of Man who dwells at your right hand.
  '18':
  - type: text
    content: Then we will never turn back from you.
  - type: text
    content: Revive us again, that we may trust in you.
  '19':
  - type: text
    content: O God, the mighty Commander of Angel Armies,
  - type: text
    content: come back and rescue us!
  - type: text
    content: Let your beaming face shine upon us
  - type: text
    content: with the sunrise rays of glory.
  - type: text
    content: Then nothing will ever stop us again!
  '2':
  - type: text
    content: In the sight of Benjamin, Ephraim, and Manasseh,
  - type: note
    content: The Hebrew text includes the names Ephraim (“doubly fruitful”), Benjamin (“son of my right hand”), and Manasseh (“you made me forget”). These three sons of Rachel marched together behind the ark of glory (see Num. 2:17–24) and became representatives of all who follow the glory of God. They will be “doubly fruitful,” “sons of his right hand,” and those who have “forgotten” their lives in Adam.
  - type: text
    content: stir up your mighty power in full display before our eyes.
  - type: text
    content: Break through and reveal yourself by coming to our rescue.
  '3':
  - type: text
    content: Revive us, O God! Let your beaming face shine upon us
  - type: text
    content: with the sunrise rays of glory;
  - type: text
    content: then nothing will be able to stop us.
  '4':
  - type: text
    content: O God, the mighty Commander of Angel Armies,
  - type: text
    content: how much longer will you smolder in anger?
  - type: text
    content: How much longer will you be disgusted with your people
  - type: text
    content: even when they pray?
  '5':
  - type: text
    content: You have fed us with sorrow and grief
  - type: text
    content: and made us drink our tears by the bowlful.
  '6':
  - type: text
    content: You’ve made us a thorn in the side of all the neighboring lands,
  - type: text
    content: and now they just laugh at us with their mocking scorn.
  '7':
  - type: text
    content: Come back, come back, O God, and restore us!
  - type: text
    content: You are the Commander of Angel Armies.
  - type: text
    content: Let your beaming face shine upon us with the sunrise rays of glory,
  - type: text
    content: and then nothing will be able to stop us!
  '8':
  - type: text
    content: Remember how you transplanted us here
  - type: text
    content: like a tender vine from Egypt.
  - type: text
    content: You cleared the land for your vineyard,
  - type: text
    content: evicting the nations from your land and planting us here.
  - type: text
    content: The roots of your vineyard went deep into the soil
  - type: text
    content: and filled the land with fruit.
