document_id: PSA.80
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: Rescue and Restore
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the Pure and Shining One
- type: usfm
  marker: d
  children:
  - type: text
    text: Asaph’s poetic song To the tune of “Your Decrees Are like Lilies”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: God-Enthroned, be revealed in splendor
- type: usfm
  marker: q1
  children:
  - type: text
    text: as you ride upon the cherubim!
- type: usfm
  marker: q1
  children:
  - type: text
    text: How perfectly you lead us, a people set free.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 80:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You lead Joseph like a flock.” Joseph, as a metaphor, becomes a picture of the saga of God’s people once imprisoned and now set free to rule and reign.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loving shepherd of Israel—listen to our hearts’ cry!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shine forth from your throne of dazzling light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In the sight of Benjamin, Ephraim, and Manasseh,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 80:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew text includes the names Ephraim (“doubly fruitful”), Benjamin (“son of my right hand”), and Manasseh (“you made me forget”). These three sons of Rachel marched together behind the ark of glory (see
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Num. 2:17–24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) and became representatives of all who follow the glory of God. They will be “doubly fruitful,” “sons of his right hand,” and those who have “forgotten” their lives in Adam.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: stir up your mighty power in full display before our eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Break through and reveal yourself by coming to our rescue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Revive us, O God! Let your beaming face shine upon us
- type: usfm
  marker: q1
  children:
  - type: text
    text: with the sunrise rays of glory;
- type: usfm
  marker: q1
  children:
  - type: text
    text: then nothing will be able to stop us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: O God, the mighty Commander of Angel Armies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: how much longer will you smolder in anger?
- type: usfm
  marker: q1
  children:
  - type: text
    text: How much longer will you be disgusted with your people
- type: usfm
  marker: q1
  children:
  - type: text
    text: even when they pray?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You have fed us with sorrow and grief
- type: usfm
  marker: q1
  children:
  - type: text
    text: and made us drink our tears by the bowlful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: You’ve made us a thorn in the side of all the neighboring lands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and now they just laugh at us with their mocking scorn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Come back, come back, O God, and restore us!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the Commander of Angel Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let your beaming face shine upon us with the sunrise rays of glory,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and then nothing will be able to stop us!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 8-9
  - type: text
    text: Remember how you transplanted us here
- type: usfm
  marker: q1
  children:
  - type: text
    text: like a tender vine from Egypt.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You cleared the land for your vineyard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: evicting the nations from your land and planting us here.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The roots of your vineyard went deep into the soil
- type: usfm
  marker: q1
  children:
  - type: text
    text: and filled the land with fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-11
  - type: text
    text: Because of your favor on your vineyard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: blessing extended to every mountain of influence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Through this flourishing vineyard mighty ones were raised up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nations were blessed by your fruitful vineyard of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'all the way from the Mediterranean Sea '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 80:10–11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This translation makes explicit the symbols in the text. The “vineyard” is Israel, the mountains are the high places of influence in culture, the cedars (“mighty ones”) are the mighty and powerful of men, and the “Sea” speaks of the nations (sea of humanity).
    marker-yv: yv-n
  - type: text
    text: to the Euphrates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 12-13
  - type: text
    text: So Lord, why have you broken down
- type: usfm
  marker: q1
  children:
  - type: text
    text: your fence of favor around us?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Trespassers can steal the fruit from off our vines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and now every wild beast comes
- type: usfm
  marker: q1
  children:
  - type: text
    text: breaking through our wall to ravage us.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You’ve left us without protection!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Come back, come back, O God to restore us!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are the Commander of Angel Armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look down from heaven and see our crisis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come down and care for your lovely vineyard once again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nurture our root and our fruit with your loving care.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raise up the Branch-Man, the Son whom you’ve made strong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Enemies chopped down our vine and set it on fire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: now show them your anger and let them perish by your frown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Strengthen this Branch-Man, the Son of your love,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the Son of Man who dwells at your right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Then we will never turn back from you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revive us again, that we may trust in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O God, the mighty Commander of Angel Armies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: come back and rescue us!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let your beaming face shine upon us
- type: usfm
  marker: q1
  children:
  - type: text
    text: with the sunrise rays of glory.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then nothing will ever stop us again!
