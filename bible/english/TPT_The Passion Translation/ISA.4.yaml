          text: ). Our “family tree” is the branch of the Lord in his beauty. The branch of Lord that is magnificent (or “beautiful”) and “glorious” reveals Christ’s divine nature; “the fruit of the earth” represents his human nature (man was formed from the earth). Jesus is the fruit of the earth, the fruit of the womb of Mary, and the fruit on the Tree of Life. Heaven gave its beauty and the earth its fruit for you and me.
