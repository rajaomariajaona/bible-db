          text: By the Spirit of justice and by the Spirit of burning, the Lord (Adonai) will wash away the filth from the churches of Christ—even bloodstains. The Hebrew word for “Spirit” can also be translated “breath” or “blast.” The blast of justice and the blast of fire are coming to cleanse God’s people. This Spirit of justice releases holy vision to see things as God sees them. Decisions will be made by the justice of God, not the prejudices of men. It is not that he merely executes judgment but that he demonstrates perfect discernment to see what is holy and what is not. This Spirit of burning (a possible reference to the baptism of fire, see
      - type: usfm
