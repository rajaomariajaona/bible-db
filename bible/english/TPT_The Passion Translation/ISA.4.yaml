          text: regarding the daughters of Zion. The daughters of Zion can also be a metaphor for the church. There is coming a day when the church will become so destitute of answers that she will turn to one man, the Lord Jesus, and take hold of him. We have taken hold of the world, and we have taken hold of clever ideas, but the “seven women” (seven churches of
