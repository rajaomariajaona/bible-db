    - type: text
      text: '41'
  - type: text
    text: “Look! They’re coming! Warriors approach from the north.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hab. 1:6–8
      metadata:
        usfm: HAB.1.6+HAB.1.7+HAB.1.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the remote parts of the earth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: great nations and mighty kings are preparing for war.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Armed with bows and scimitars,
- type: usfm
  marker: q1
  children:
  - type: text
    text: they are merciless and without compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sound of their armies riding their horses
- type: usfm
  marker: q1
  children:
  - type: text
    text: is like the roaring sea.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The cavalry is in battle formation
- type: usfm
  marker: q1
  children:
  - type: text
    text: and ready to attack you, Fair Babylon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: The king of Babylon heard the news, and his strength melted away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anguish seized him, like the pain of a woman in labor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '“Behold, like a lion suddenly comes out of the jungle of the Jordan to a rich pastureland, I will suddenly make the people of Babylon run away, and I will appoint a leader that I choose. For who can be compared to me? Who is able to challenge me? Name the ruler '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “shepherd.”
    marker-yv: yv-n
  - type: text
    text: 'who can stand up to me. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'So now, listen to the plans that I have against you, Babylon. Listen to what I have in store for the land of the Chaldeans. Like little lambs, your children will be dragged away before your own eyes, and everyone will be horrified! '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 50:45
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “they will be appalled because of what has happened to the sheep.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: The earth will shudder at the sound of Babylon’s downfall as their cry echoes to the nations.”
