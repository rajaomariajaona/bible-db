document_id: JER.50,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Prophecy against Babylon
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me this prophecy against '
  - type: text
    content: mighty
  - type: text
    content: ' Babylon, the land of the Chaldeans:'
  - type: note
    content: Jeremiah devotes two entire chapters to Yahweh’s message to Babylon (see chs. 50–51; see also Rev. 17–18), the most influential nation on earth at the time of his writing. Inside the nation of Babylon was a subgroup known as the Chaldeans. (Chaldeans possibly means “astrologers” or “occultists.”) They were a tribe of people who settled near the city of Babylon and the city of Ur. The Babylonian Empire (Babylonia) absorbed the Chaldean tribe and created a country of Chaldea in the southern part of their empire. The Chaldeans were known as a violent, fearsome people. Babylon’s King Nebuchadnezzar II was a Chaldean ruler in what became known as the Neo-Babylonian Empire, and the Chaldeans gradually became rulers of the empire.
  '10':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that Chaldea will be plundered,'
  - type: text
    content: and all who plunder her will be satisfied.”
  - type: heading
    content: The Fall of Babylon
  '11':
  - type: text
    content: “
  - type: text
    content: I
  - type: text
    content: ', '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to the people of Babylon'
  - type: text
    content: ':'
  - type: text
    content: You rejoiced when you robbed my people, my inheritance.
  - type: text
    content: You had a good time,
  - type: text
    content: making more noise than horses neighing
  - type: text
    content: and frolicking like playful heifers
  - type: text
    content: at the time of the threshing of grain.
  - type: note
    content: See Deut. 25:4.
  '12':
  - type: text
    content: But your motherland is covered with shame,
  - type: text
    content: and the city that nurtured you like a mother
  - type: text
    content: is totally disgraced.
  - type: text
    content: Now, she is the least of nations,
  - type: text
    content: nothing but a desert, a parched wasteland.
  '13':
  - type: text
    content: 'Because of '
  - type: text
    content: Yahweh
  - type: text
    content: ’s anger,
  - type: text
    content: Babylon will become desolate and uninhabited forever.
  - type: text
    content: Everyone who passes by
  - type: text
    content: will be shocked to see what has happened
  - type: text
    content: and will hiss out their scorn.
  '14':
  - type: text
    content: Archers! Take your positions against Babylon
  - type: text
    content: and surround her.
  - type: text
    content: Shoot at her! Empty your quiver,
  - type: text
    content: 'for she has sinned against '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '15':
  - type: text
    content: Raise the war cry against her from all sides.
  - type: text
    content: She surrenders!
  - type: text
    content: The attackers have broken down
  - type: text
    content: her fortifications and walls.
  - type: note
    content: 'According to Streane: “This was not done by Cyrus, who, after diverting the river, entered the city beneath its walls by the riverbed. It therefore points to the later capture of Babylon by Darius who ‘having become the master of the place, destroyed the wall, and tore down all the gates.’ Herodotus III, 159.” A. W. Streane, The Book of the Prophet Jeremiah: Together with the Lamentations (Cambridge: University Press, 1952), 322.'
  - type: text
    content: 'This is '
  - type: text
    content: Yahweh
  - type: text
    content: ’s vengeance! Take revenge on her.
  - type: text
    content: Do to them what they did to others.
  '16':
  - type: text
    content: Uproot from Babylon those
  - type: text
    content: who plant fields and harvest crops.
  - type: text
    content: They have all fled from the attacking army
  - type: text
    content: and returned to their homelands.”
  - type: heading
    content: Israel’s Return
  '17':
  - type: text
    content: “Israel was like straying lambs,
  - type: text
    content: driven away and scattered by lions.
  - type: text
    content: '“First, the king of Assyria devoured them, '
  - type: note
    content: The Assyrians conquered Samaria, capital of the Northern Kingdom of Israel, in 722 BC.
  - type: text
    content: 'and now, Nebuchadnezzar king of Babylon has gnawed their bones. '
  '18':
  - type: text
    content: 'So I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', God of Israel, Commander of Angel Armies, say this: Behold, I will punish the king of Babylon and his nation as I punished the king of Assyria.'
  '19':
  - type: text
    content: “I will bring Israel back to her own land.
  - type: text
    content: The people will be like sheep eating their fill on Mount Carmel,
  - type: text
    content: in Bashan, in the hill country of Ephraim, and in Gilead.
  - type: text
    content: They will all be satisfied.
  '2':
  - type: text
    content: '“Tell the nations the news; proclaim it '
  - type: text
    content: everywhere
  - type: text
    content: .
  - type: text
    content: Publicize it far and wide;
  - type: text
    content: 'make no secret of it, and declare:'
  - type: text
    content: ‘Babylon has fallen!
  - type: text
    content: Her god Marduk is greatly humiliated, and his power is broken.
  - type: note
    content: Or “Bel is put to shame; Merodach is dismayed.” Bel and Merodach are two names for “Marduk,” the chief god of Babylon.
  - type: text
    content: Her idols are disgraced;
  - type: text
    content: 'her filthy images '
  - type: note
    content: The word for “filthy images” (Hb. gillulim) is a somewhat crude word, meaning literally “a ball of excrement.” This is a term frequently applied to foreign gods and their images (in Ezekiel nearly forty times, often translated “idols”).
  - type: text
    content: are shattered.’
  '20':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', declare that at that time,'
  - type: text
    content: you may look for Israel’s guilt, but it will disappear,
  - type: text
    content: you may search for Judah’s sins, but you will not find them,
  - type: text
    content: for I will forgive the remnant whose lives I have spared.”
  - type: heading
    content: Yahweh’s Message to the Enemies of Babylon
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: ' says:'
  - type: text
    content: “Now, carry out my instructions to the letter.
  - type: text
    content: Attack the land of Merathaim
  - type: text
    content: and those who live in Pekod!
  - type: note
    content: 'Merathaim means “double-rebellion” or “double-bitterness.” Merathaim could be seen as a sarcastic pun used as a reference to Babylon. See J. Andrew Dearman, Jeremiah and Lamentations, The NIV Application Commentary (Grand Rapids, MI: Zondervan, 2002), 410. These two locations represent an untranslatable play on words in Hebrew: Marratim was the name of a district of southern Babylonia at the head of the Persian Gulf (Marratim means “the land of the bitter river”), while Puqudu was the name of a people in the eastern region of the Babylonian Empire. Used together, Merathaim and Pekod make an implied connection between rebellion and punishment.'
  - type: text
    content: Kill them and destroy everything they leave behind.
  '22':
  - type: text
    content: For the noise of battle fills the land,
  - type: text
    content: and already great destruction is taking place.
  '23':
  - type: text
    content: Babylon, you hammered the whole world to pieces,
  - type: text
    content: but now your hammer is broken and shattered to pieces.
  - type: text
    content: Now you are an object of horror to the nations.
  '24':
  - type: text
    content: You defied me and fought against me, Babylon,
  - type: text
    content: so I laid a trap for you.
  - type: text
    content: You were caught before you knew it!
  '25':
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies,'
  - type: text
    content: had a work to do in Babylon,
  - type: text
    content: So, I opened my armory and brought out
  - type: text
    content: the mighty weapons of my wrath.
  '26':
  - type: text
    content: Attack it from every side!
  - type: text
    content: Open her granaries.
  - type: text
    content: Pile her up like heaps of grain;
  - type: text
    content: curse her with destruction
  - type: text
    content: until nothing is left of her.
  '27':
  - type: text
    content: Slaughter all her warriors;
  - type: note
    content: Or “bulls,” a figure of speech for warriors. See Ps. 22:12; Isa. 34:7.
  - type: text
    content: lead them away as cattle to be slaughtered.
  - type: text
    content: Woe to them, for their day of reckoning has come,
  - type: text
    content: their time for being punished is here.
  '28':
  - type: text
    content: Listen! Fugitives and refugees
  - type: text
    content: from the country of Babylon arrive in Zion,
  - type: text
    content: proclaiming on Mount Zion
  - type: text
    content: 'how '
  - type: text
    content: Yahweh
  - type: text
    content: ' our God has punished the Babylonians'
  - type: text
    content: for destroying his temple!”
  - type: heading
    content: The Sin of Arrogance
  '29':
  - type: text
    content: “Assemble the archers and attack Babylon!
  - type: text
    content: Encamp around her and leave no way of escape.
  - type: text
    content: Treat her as she has treated others
  - type: text
    content: and repay her for all she has done,
  - type: text
    content: 'for she was arrogant and defiant to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: the Holy One of Israel.
  '3':
  - type: text
    content: For a nation is attacking Babylon from the north
  - type: note
    content: That is, Persia. Although Persia is not directly north of Babylon, to the Jews, the north was a colloquialism to describe where enemy invaders came from.
  - type: text
    content: that will reduce her nation to a desert.
  - type: text
    content: People and animals will flee,
  - type: text
    content: and no one will inhabit it.”
  - type: heading
    content: Israel’s Return
  '30':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to you:'
  - type: text
    content: On that day, your young men will fall in the streets,
  - type: text
    content: and all your warriors will perish.
  '31':
  - type: text
    content: I am against you, O arrogant one!
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, decree:'
  - type: text
    content: Your day of reckoning has now come,
  - type: text
    content: the time for me to punish you is here.
  '32':
  - type: text
    content: Your proud, arrogant city will stumble and fall
  - type: text
    content: with no one to lift her up.
  - type: text
    content: I will set the cities of Babylon on fire,
  - type: text
    content: and everything around you will go up in flames.”
  - type: heading
    content: Yahweh, the Avenger of Israel
  '33':
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies, says:'
  - type: text
    content: “My people, Israel and Judah, are oppressed,
  - type: text
    content: You hold them fast and will not let them go.
  '34':
  - type: text
    content: 'But their Redeemer '
  - type: note
    content: This is the Hebrew word gaʾal, which means “kinsman-redeemer.” See Ruth 2:20.
  - type: text
    content: is powerful!
  - type: text
    content: 'My name is '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  - type: text
    content: 'I will take up their cause '
  - type: text
    content: and rescue them
  - type: text
    content: .
  - type: text
    content: I will give the nation rest
  - type: text
    content: but make the people of Babylon tremble.
  '35':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have decreed war against the Chaldeans,'
  - type: text
    content: against the people of Babylon,
  - type: text
    content: and against her mighty rulers and advisers.
  '36':
  - type: text
    content: I have decreed war against her false prophets.
  - type: text
    content: May they lose their wits!
  - type: text
    content: I have decreed
  - type: text
    content: ' war against her warriors;'
  - type: text
    content: let them panic.
  '37':
  - type: text
    content: War against her horses, her chariots,
  - type: text
    content: and the foreign troops among them!
  - type: text
    content: 'Their '
  - type: text
    content: mighty warriors
  - type: text
    content: ' will become '
  - type: text
    content: frightened
  - type: text
    content: ' like ordinary citizens.'
  - type: note
    content: Or “like women.” See 51:30.
  - type: text
    content: May the war result in all their treasure being plundered!
  '38':
  - type: text
    content: 'May a drought '
  - type: note
    content: The root word for “drought” is the same as that for the word for “sword.” This play on words achieved through the use of the homonym is lost in translation.
  - type: text
    content: dry up all their rivers!
  - type: note
    content: The city of Babylon was famous for its never-ending source of water, the Euphrates River.
  - type: text
    content: For it is a country full of idols,
  - type: text
    content: and their terrors make them delirious.
  '39':
  - type: text
    content: 'Demons and dark spirits '
  - type: note
    content: Although the Hebrew can be translated “wild beasts [desert creatures] and hyenas [jackals],” many scholars and commentators see them as metaphors for creatures of the demonic realm. One commentator translates this as “ghouls and goblins.”
  - type: text
    content: 'dwell in '
  - type: text
    content: Babylon
  - type: text
    content: ','
  - type: text
    content: 'and ostriches '
  - type: note
    content: Or “desert owls.”
  - type: text
    content: make their home there.
  - type: text
    content: For all generations, no one will live there again.
  '4':
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: text
    content: says
  - type: text
    content: ':'
  - type: text
    content: “When that day comes
  - type: text
    content: the people of Israel and the people of Judah
  - type: text
    content: will go out together with tears streaming down their cheeks
  - type: text
    content: 'to seek '
  - type: text
    content: Yahweh
  - type: text
    content: ' their God.'
  '40':
  - type: text
    content: As Sodom and Gomorrah and their neighboring towns
  - type: text
    content: were destroyed and left uninhabited,
  - type: text
    content: not one person will ever settle in Babylon again,
  - type: text
    content: 'for I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '41':
  - type: text
    content: “Look! They’re coming! Warriors approach from the north.
  - type: note
    content: See Hab. 1:6–8.
  - type: text
    content: From the remote parts of the earth,
  - type: text
    content: great nations and mighty kings are preparing for war.
  '42':
  - type: text
    content: Armed with bows and scimitars,
  - type: text
    content: they are merciless and without compassion.
  - type: text
    content: The sound of their armies riding their horses
  - type: text
    content: is like the roaring sea.
  - type: text
    content: The cavalry is in battle formation
  - type: text
    content: and ready to attack you, Fair Babylon.
  '43':
  - type: text
    content: The king of Babylon heard the news, and his strength melted away.
  - type: text
    content: Anguish seized him, like the pain of a woman in labor.
  '44':
  - type: text
    content: '“Behold, like a lion suddenly comes out of the jungle of the Jordan to a rich pastureland, I will suddenly make the people of Babylon run away, and I will appoint a leader that I choose. For who can be compared to me? Who is able to challenge me? Name the ruler '
  - type: note
    content: Or “shepherd.”
  - type: text
    content: 'who can stand up to me. '
  '45':
  - type: text
    content: 'So now, listen to the plans that I have against you, Babylon. Listen to what I have in store for the land of the Chaldeans. Like little lambs, your children will be dragged away before your own eyes, and everyone will be horrified! '
  - type: note
    content: Or “they will be appalled because of what has happened to the sheep.”
  '46':
  - type: text
    content: The earth will shudder at the sound of Babylon’s downfall as their cry echoes to the nations.”
  '5':
  - type: text
    content: They will ask the way to Zion
  - type: text
    content: 'and turn their faces toward her, '
  - type: text
    content: saying to one another
  - type: text
    content: ','
  - type: text
    content: '‘Come, let us bind our hearts to '
  - type: text
    content: Yahweh
  - type: text
    content: in an eternal covenant,
  - type: text
    content: which we will never break.’
  '6':
  - type: text
    content: “My people are like lost sheep;
  - type: text
    content: 'their shepherds '
  - type: note
    content: That is, their rulers.
  - type: text
    content: led them astray.
  - type: text
    content: They are lost, wandering about in the mountains.
  - type: text
    content: They went from mountain to hill,
  - type: note
    content: The implication is that Israel’s leaders led them into spiritual danger by practicing idolatry.
  - type: text
    content: forgetting their resting place.
  '7':
  - type: text
    content: Whoever came across them took advantage of them.
  - type: text
    content: Their enemies said, ‘We are not to blame,
  - type: text
    content: 'for they have sinned against '
  - type: text
    content: Yahweh
  - type: text
    content: ', the '
  - type: text
    content: 'True'
  - type: text
    content: ' Home of Justice,'
  - type: note
    content: God, the “True Home of Justice,” is the source and fountain of true righteousness, justice, and peace.
  - type: text
    content: 'against '
  - type: text
    content: Yahweh
  - type: text
    content: ', the '
  - type: text
    content: Living
  - type: text
    content: ' Hope of their ancestors.’'
  '8':
  - type: text
    content: “
  - type: text
    content: My people
  - type: text
    content: ', flee Babylon '
  - type: note
    content: See Rev. 18:4.
  - type: text
    content: and run from
  - type: text
    content: the land of the Chaldeans.
  - type: text
    content: Be the first ones to leave!
  - type: note
    content: Or “Be like he-goats, leading the sheep!” He-goats are known for their characteristic of being the first to push themselves through when a gate is opened. God was encouraging the captives of Judah to push forward and be the first to enjoy their freedom.
  '9':
  - type: text
    content: For listen, I am stirring up trouble
  - type: text
    content: out of the north against Babylon,
  - type: text
    content: and raising up a coalition of mighty nations to attack her.
  - type: text
    content: They will take up battle positions against her
  - type: text
    content: and conquer her.
  - type: text
    content: Their arrows are like a skilled soldier who kills
  - type: text
    content: and never returns empty-handed.
