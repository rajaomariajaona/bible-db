        text: possibly means “astrologers” or “occultists.”) They were a tribe of people who settled near the city of Babylon and the city of Ur. The Babylonian Empire (Babylonia) absorbed the Chaldean tribe and created a country of Chaldea in the southern part of their empire. The Chaldeans were known as a violent, fearsome people. Babylon’s King Nebuchadnezzar II was a Chaldean ruler in what became known as the Neo-Babylonian Empire, and the Chaldeans gradually became rulers of the empire.
