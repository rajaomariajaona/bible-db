document_id: 1TI.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Conduct toward Others
  - type: text
    content: 'Don’t be harsh or verbally abusive to an older man; '
  - type: note
    content: Or “elder” (one who is given responsibility within the church).
  - type: text
    content: 'it is better to appeal to him as a father. And as you minister to the younger men it is best to encourage them as your dear brothers. '
  '10':
  - type: text
    content: 'They should have a beautiful testimony of raising their families, practicing hospitality, encouraging other believers, comforting troubled ones, '
  - type: note
    content: Or “paying the expenses of those who are persecuted.”
  - type: text
    content: and have a reputation for doing good works.
  '11':
  - type: text
    content: 'But you need not concern yourself with the younger widows, for some will depart from the Messiah because of their desire to remarry. '
  - type: note
    content: There is a sexual connotation implied in the text.
  '12':
  - type: text
    content: 'For they will face their own punishment '
  - type: note
    content: Or “judgment.”
  - type: text
    content: 'of living with a disturbed conscience for invalidating their former faith. '
  '13':
  - type: text
    content: 'Those widows who go around from house to house as busybodies '
  - type: note
    content: The Greek word used for “busybodies” can also imply “gaining illegal knowledge of the supernatural.” See Acts 19:19 where the same Greek word is used for black magic.
  - type: text
    content: are only learning to be lazy, making their situation even worse by talking too much, gossiping, and speaking things they shouldn’t. They become far too obsessed with empty things that will not bear good fruit.
  '14':
  - type: text
    content: 'For this reason, teach the younger women to remarry and bear children and care for their household. This will keep them from giving our adversary a reason to gloat. '
  '15':
  - type: text
    content: For there are already those who have begun to turn aside from their faith and are influenced by Satan.
  '16':
  - type: text
    content: So if any believer has a widow in their family, instruct them to support her financially so that the church will not be burdened with her care. This will leave finances available for those widows who are truly in need.
  - type: heading
    content: Respect toward Church Leaders
  '17':
  - type: text
    content: 'The pastors '
  - type: note
    content: Or “elders,” also v. 19.
  - type: text
    content: 'who lead the church well should be paid well. They should receive double honor for faithfully preaching and teaching the revelation of the Word of God. '
  '18':
  - type: text
    content: 'For the Scriptures have taught us: “Do not muzzle an ox or forbid it to eat while it grinds the grain.” '
  - type: note
    content: See Deut. 25:4.
  - type: text
    content: And also, “The one who labors deserves his wages.”
  - type: note
    content: See Lev. 19:13; Deut. 24:15.
  '19':
  - type: text
    content: 'Refuse to listen to suspicious accusations against the pastors who lead the flock unless you have two or three witnesses '
  - type: text
    content: to confirm the accusations
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Honor the older women '
  - type: note
    content: Or “woman elders.”
  - type: text
    content: as mothers, and the younger women, treat as your dear sisters with utmost purity.
  - type: note
    content: Or “holiness.”
  '20':
  - type: text
    content: But if indeed you find that they have sinned, bring correction to them before the congregation so that the rest of the people will respect you.
  - type: note
    content: Or “fear.” That is, the congregation will see proper correction and fear falling into sin.
  '21':
  - type: text
    content: 'Timothy, in the presence of God and our Lord Jesus Christ, and before the chosen messengers, '
  - type: note
    content: This word can refer to angels or men.
  - type: text
    content: I solemnly charge you to put into practice all these matters without bias, prejudice, or favoritism.
  '22':
  - type: text
    content: 'Don’t be hasty to ordain them with the laying on of hands, or you may end up sharing in their guilt should they fall. Keep yourself pure and holy with your standards high. '
  '23':
  - type: text
    content: '(If drinking the water causes you to have stomach ailments, '
  - type: note
    content: The Greek text literally means “bladder frequency.” This translation has chosen to bracket this parenthetical verse to show it is inserted in the middle of Paul’s words regarding the topic of ordination (laying on of hands). Paul does not encourage the drinking of wine, nor does he condemn its moderate use.
  - type: text
    content: drink some wine instead.)
  '24':
  - type: text
    content: 'The sins of some people stand out and are well known. Yet there are others whose sins are not as obvious, but the truth of who they really are will eventually be seen and will bring them judgment. '
  - type: note
    content: An alternate Aramaic translation is “there are some who confess their sins and bring them [their sins] to judgment, and there are those whose sins follow them.”
  '25':
  - type: text
    content: It is the same way with good works, even if they are not known at first, they will eventually be recognized and acknowledged.
  '3':
  - type: text
    content: 'The church needs to honor and support the widows, especially those who are in dire need. '
  '4':
  - type: text
    content: But if they have children or grandchildren at home, then it is only proper to let them provide for the ones who raised them when they were children, for kindness begins at home and it pleases God.
  '5':
  - type: text
    content: 'For the true widow '
  - type: note
    content: There is an implication in the Aramaic that the “true widow” is one whose husband was killed due to persecution of believers.
  - type: text
    content: 'is all alone and has placed her complete hope in God. She is Messiah’s missionary '
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: and will need the support of the church
  - type: text
    content: ' as one who remains in prayer day and night. '
  '6':
  - type: text
    content: But the widow who serves only herself lives a life of self-indulgence and is wasting her life away.
  '7':
  - type: text
    content: 'Be sure to give clear instruction concerning these matters so that none of them will live with shame. '
  '8':
  - type: text
    content: 'For if a believer fails to provide for their own relatives when they are in need, they have compromised '
  - type: note
    content: Or “denied.”
  - type: text
    content: 'their convictions of faith '
  - type: text
    content: and need to be corrected
  - type: text
    content: ', for they are living worse than the unbelievers.'
  '9':
  - type: text
    content: 'The widows who are worthy to be supported by the church should be at least sixty years old and not remarried. '
