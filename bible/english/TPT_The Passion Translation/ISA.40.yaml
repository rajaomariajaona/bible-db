  - type: text
    content: Yahweh
  - type: text
    content: ’s radiant glory will be unveiled,
  - type: text
    content: 'and all humanity '
  - type: note
    content: Or “all flesh” (i.e., Jews and gentiles).
  - type: text
    content: will experience it together.
  - type: note
    content: Or “all flesh will see it as one.” See Rom. 8:19.
  - type: text
    content: Believe it
  - type: text
    content: ', for '
  - type: text
    content: Yahweh
  - type: text
    content: ' has spoken his decree!”'
  - type: note
    content: See Luke 3:5–6.
