  '28':
  - type: text
    content: Don’t you know? Haven’t you been listening?
  - type: text
    content: Yahweh
  - type: text
    content: ' is the '
  - type: text
    content: one and only
  - type: text
    content: ' everlasting God,'
  - type: text
    content: the Creator of all you can see and imagine!
  - type: text
    content: He never gets weary or worn out.
  - type: text
    content: His intelligence is unlimited;
  - type: text
    content: he is never puzzled over what to do!
  '29':
  - type: text
    content: He empowers the feeble
  - type: text
    content: and infuses the powerless with increasing strength.
  '3':
  - type: text
    content: 'A '
  - type: text
    content: thunderous
  - type: text
    content: ' voice cries out in the wilderness:'
  - type: text
    content: '“Prepare the way '
  - type: text
    content: for
  - type: text
    content: ' '
  - type: text
    content: Yahweh
  - type: text
    content: ’s arrival!
  - type: note
    content: Or “In the wilderness prepare the way for Yahweh’s arrival.” This was a prophecy of John the Baptizer and his ministry of calling people to repentance in preparation for the appearing of the Lord Jesus. Although John came in the spirit of Elijah, he worked no miracles. His prophecy was not to begin a road project but to prepare people’s hearts. Even now the voice of the Spirit is crying out in the wilderness of people’s souls, bringing them to repentance and faith in Christ.
  - type: text
    content: Make a highway straight through the desert for our God!
  - type: note
    content: See John 14:6.
  '30':
  - type: text
    content: Even young people faint and get exhausted;
  - type: text
    content: 'athletic ones '
  - type: note
    content: Or “young men.”
  - type: text
    content: may stumble and fall.
  '31':
  - type: text
    content: 'But those who entwine their hearts with '
  - type: text
    content: Yahweh
  - type: note
    content: Or “wait on Yahweh.” The Hebrew word for “wait” means to “tie,” “twist,” “bind,” or “entwine [to make a rope].” Waiting on God is never passive; it is binding our hearts to who God is as we wait for God’s plan to unfold.
  - type: text
    content: 'will experience '
  - type: text
    content: divine
  - type: text
    content: ' strength.'
  - type: note
    content: Or “will grow new feathers like eagles” (LXX) or “renew their strength.” An eagle has the longest lifespan of any bird. See Ps. 103:5.
  - type: text
    content: They will rise up on soaring wings and fly like eagles,
  - type: text
    content: 'run '
  - type: text
    content: their races
  - type: text
    content: ' without growing weary,'
  - type: text
    content: 'and walk '
  - type: text
    content: through life
  - type: text
    content: ' without giving up.'
  - type: note
    content: Or “without fainting.” The outer court is where we walk, the Holy Place is where we run, and we soar like eagles into the heavenly realm in the Holy of Holies (see Heb. 10:19).
  '4':
  - type: text
    content: Every valley will be raised up, every mountain brought low.
  - type: text
    content: The rugged terrain will become level ground
  - type: text
    content: and the rough places a plain.
