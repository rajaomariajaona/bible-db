document_id: ISA.40,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Comfort My People
  - type: text
    content: 'Your God says to you:'
  - type: text
    content: '“Comfort, comfort my people '
  - type: note
    content: The Targum reads “You prophets, prophesy comfort, comfort to my people.” See Jer. 31:13, 20; Zeph. 3:14–17; 2 Cor. 1:3.
  - type: text
    content: with gentle, compassionate words
  - type: text
    content: .
  - type: note
    content: 'The Hebrew word nacham connotes deep emotion, compassionate words that give relief and tender consolation to people. Beginning in Isaiah 40, the prophet’s tone changed from that of his words throughout chs. 1–39. In a similar way, the New Testament brings us an even sweeter, more glorious message than the Old Testament (see 2 Cor. 3:9). The New Testament begins with John the Baptizer quoting from Isaiah 40, demonstrating that the time has come for the removal of our sins. Compare Isa. 40:3 and Mark 1:3. Isaiah 1–39 speaks of a worldwide desolation; Isaiah 40–66 speaks of a worldwide restoration. The later chapters of this book are described by some scholars as the “New Testament of Isaiah.” The New Testament has twenty-seven books, corresponding to Isaiah’s last twenty-seven chapters. An outline of the remainder of the book could be: The Book of Comfort (chs. 40–44), The Book of Cyrus (chs. 45–48), The Book of Messiah, the Servant of the Lord (chs. 49–55), The Book of Judah, the Victory of the Bride (chs. 56–66).'
  '10':
  - type: text
    content: 'Look! Here comes Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' as a victorious warrior;'
  - type: text
    content: he triumphs with his awesome power.
  - type: note
    content: Or “his mighty arm rules for him.”
  - type: text
    content: Watch as he brings with him his reward
  - type: text
    content: 'and the spoils of victory to give '
  - type: text
    content: to his people
  - type: text
    content: .
  '11':
  - type: text
    content: He will care for you
  - type: text
    content: ' as a shepherd tends his flock,'
  - type: text
    content: 'gathering the '
  - type: text
    content: weak
  - type: text
    content: ' lambs and taking them in his arms.'
  - type: text
    content: He carries them close to his heart
  - type: text
    content: and gently leads those that have young.
  - type: note
    content: These verses are somewhat parallel to Eph. 4:11, where we can see the apostle’s “awesome power” (v. 10), the prophet’s “reward” (v. 10 and Matt. 10:41), the evangelist’s “spoils of victory [he gives] to his people” (v. 10), the pastor or “shepherd [who] tends his flock” (v. 11), and the teacher who “gently leads” into truth (v. 11).
  - type: heading
    content: The Infinite God
  '12':
  - type: text
    content: 'Who has measured the waters '
  - type: text
    content: of the sea
  - type: text
    content: in the hollow of his hand
  - type: text
    content: and used his hand-width to mark off the heavens?
  - type: text
    content: Who knows the exact weight of all the dust of the earth
  - type: note
    content: Or “Who has weighed the dust of the earth in a basket [third of an ephah]?” The Creator can never be measured by his creation; he is infinitely greater.
  - type: text
    content: and has weighed all the mountains and hills on his scale?
  '13':
  - type: text
    content: 'Who fully understands the Spirit of '
  - type: text
    content: Yahweh
  - type: note
    content: See Eph. 1:17.
  - type: text
    content: or is wise enough to counsel him?
  - type: note
    content: See Rom. 11:34; 1 Cor. 2:16.
  '14':
  - type: text
    content: Whom does he consult to be enlightened?
  - type: text
    content: Who teaches him the ways of justice?
  - type: note
    content: Or “Who teaches him the right way to do things?” or “Who gives him insight to make right decisions?”
  - type: text
    content: Who imparts knowledge to him
  - type: text
    content: or shows him the true path of wisdom?
  - type: note
    content: That is, who is capable enough to show God how to skillfully design his plan or give him the wisdom needed to carry it out? He is too wise to make a mistake. These verses show us God’s heart of love (v. 11), God’s hand of power (v. 12), and God’s mind of wisdom (vv. 13–14).
  '15':
  - type: text
    content: 'Even the nations are to him like a drop '
  - type: note
    content: The Hebrew word used for “drop” is not a drop of water but a drop of myrrh. Myrrh was harvested by piercing a tree and collecting drops of sap in a bucket. Nations are more than a drop of water but rather are like myrrh dropping into a bucket.
  - type: text
    content: in a bucket,
  - type: text
    content: regarded as nothing more than dust on a scale.
  - type: text
    content: He picks up the islands like fine grains of sand.
  '16':
  - type: text
    content: 'All of Lebanon’s '
  - type: text
    content: trees
  - type: text
    content: ' '
  - type: note
    content: Lebanon was known for its lumber and forests.
  - type: text
    content: 'are not enough firewood '
  - type: text
    content: for him
  - type: text
    content: ','
  - type: text
    content: nor are all its animals enough for a burnt offering.
  '17':
  - type: text
    content: The nations are nothing in his eyes;
  - type: text
    content: he regards them as absolutely nothing.
  - type: note
    content: Or “from nothing but emptiness” (as though they didn’t exist).
  - type: heading
    content: Idols Cannot Be Compared to God
  '18':
  - type: text
    content: Who even comes close to being compared to God?
  - type: note
    content: This is the Hebrew word ‘el, “the mighty God.”
  - type: text
    content: How could you ever compare God to an idol?
  '19':
  - type: text
    content: 'A craftsman forms '
  - type: note
    content: Or “melts [pours out].”
  - type: text
    content: an idol-god,
  - type: text
    content: then a goldsmith overlays it with gold
  - type: text
    content: and forges its silver chains.
  - type: note
    content: The Hebrew clause is uncertain.
  '2':
  - type: text
    content: 'Speak '
  - type: text
    content: tenderly
  - type: text
    content: ' from the heart '
  - type: note
    content: Or “Speak to the heart [to revive].”
  - type: text
    content: 'to '
  - type: text
    content: revive
  - type: text
    content: ' those in Jerusalem,'
  - type: note
    content: Scripture often contains multiple meanings and applications. Jerusalem here can also mean the church. The church does not replace Jerusalem (Israel), but can be viewed as a “new” Israel (see Gal. 6:16). Believers today find themselves in the New Jerusalem, where God and man have become one. See Gal. 4:26; Heb. 12:22.
  - type: text
    content: and proclaim that their warfare is over.
  - type: note
    content: For the overcoming believer, the warfare of Romans 7 has ended as we become the victorious overcomers who move into Christ’s victory found in Romans 8. Our race begins at the finish line (see Rom. 6:5–7).
  - type: text
    content: Her debt of sin is paid for, and she will not be treated as guilty.
  - type: note
    content: See John 19:30; Rom. 8:1; Col. 2:13–14; 1 Peter 3:18.
  - type: text
    content: Prophesy to her
  - type: text
    content: ' that she has received from the hand of '
  - type: text
    content: Yahweh
  - type: text
    content: 'twice as '
  - type: text
    content: many blessings as
  - type: text
    content: ' all her sins.”'
  - type: note
    content: The Hebrew text is somewhat ambiguous. It could mean double punishment or double blessing. That is, they will receive from the hand of God twice what they have lost. Favor and mercy always triumph over judgment. God will excel in grace toward his people and give us back even more than what our sins took from us. See Ex. 22:4, 7, 9; Job 42:10; Isa. 61:7; Zech. 9:12; Rom. 5.
  '20':
  - type: text
    content: The one who is poor and cannot afford silver or gold
  - type: note
    content: The Hebrew clause is uncertain.
  - type: text
    content: 'chooses a tree '
  - type: note
    content: Adam and Eve chose the Tree of the Knowledge of Good and Evil. See Jer. 10:3–4.
  - type: text
    content: that will not rot,
  - type: text
    content: then seeks a skilled workman
  - type: text
    content: to make an idol that will not topple.
  - type: heading
    content: Fear Not
  '21':
  - type: text
    content: Don’t you realize that God is the Creator?
  - type: text
    content: 'Don’t you hear '
  - type: text
    content: the truth
  - type: text
    content: '?'
  - type: note
    content: Or “Do you not know? Do you not hear?” These two questions (imperfect tense) are best seen as invitations rather than surprise over their ignorance. See Young, Book of Isaiah, vol. 3, 40–66.
  - type: text
    content: Haven’t you been told this from the beginning?
  - type: text
    content: Haven’t you understood this
  - type: text
    content: since he laid a firm foundation for the earth?
  - type: note
    content: See Ps. 24:2.
  '22':
  - type: text
    content: He sits enthroned high above the circle of the earth;
  - type: note
    content: The “circle of the earth” could not only mean that the earth is round but also be a reference to the circular orbit of the earth.
  - type: text
    content: to him the people of earth are like grasshoppers!
  - type: text
    content: He stretches out the heavens like a curtain,
  - type: text
    content: spreading it open like a tent to live in.
  - type: note
    content: See Ex. 25:8.
  '23':
  - type: text
    content: He reduces rulers to nothing
  - type: text
    content: and makes the elite of the earth as nothing at all.
  '24':
  - type: text
    content: 'They barely get planted and barely take root '
  - type: text
    content: in their position of power
  - type: text
    content: when the Lord blows on them and they wither away,
  - type: text
    content: carried off like straw in the stormy wind.
  - type: heading
    content: God Above All Others
  '25':
  - type: text
    content: 'The Holy One asks:'
  - type: text
