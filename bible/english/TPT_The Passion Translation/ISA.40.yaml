  - type: text
    content: And I ask, “What should I say?”
  - type: text
    content: “All people are as frail as grass,
  - type: text
    content: and their elegance is like a wilting wildflower.
  '7':
  - type: text
    content: The grass withers, the flower fades
  - type: text
    content: 'when the breath of '
  - type: text
    content: Yahweh
  - type: text
