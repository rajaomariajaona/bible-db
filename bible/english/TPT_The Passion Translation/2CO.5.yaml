document_id: 2CO.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Living by Faith
  - type: text
    content: 'We are convinced that even if these bodies we live in are folded up at death like tents, we will still have a God-built home that no human hands have built, which will last forever in the heavenly realm. '
  '10':
  - type: text
    content: 'For one day we will all be openly revealed before Christ on his throne '
  - type: note
    content: Or “judgment seat.”
  - type: text
    content: 'so that each of us will be duly recompensed for our actions done in life, '
  - type: note
    content: Or “done in the body” or “time spent in the body.” The judgment for our sins fell upon Christ on the cross, and the believer will never be judged for his sins. This judgment (scrutinizing) is for rewards. There will be different levels of reward given to believers after death. For some, there will be no reward, yet they will still be saved. See Rom. 14:10–12; 1 Cor. 3:10–15.
  - type: text
    content: whether good or worthless.
  - type: heading
    content: The Message of Reconciliation
  '11':
  - type: text
    content: 'Since we are those who stand in holy awe of the Lord, '
  - type: note
    content: Although the Greek word phobos is usually associated with fear or dread, the classic use of the word is “deepest awe/respect.” See 1 John 4:18.
  - type: text
    content: 'we make it our passion to persuade others '
  - type: text
    content: to turn to him
  - type: text
    content: '. We know that our lives are transparent before the God who knows us fully, and I hope that we are also well known to your consciences. '
  '12':
  - type: text
    content: 'Again, we are not taking an opportunity to brag, '
  - type: text
    content: but giving you information
  - type: text
    content: ' that will enable you to be proud of us, and to answer those who esteem outward appearances while overlooking what is in the heart.'
  '13':
  - type: text
    content: 'If we are out of our minds in a blissful, divine ecstasy, '
  - type: note
    content: The Greek word existēmi means to be outside of one’s self in a state of blissful ecstasy and filled with pleasure. It is to come into another state of consciousness of being lost in wonder and amazement.
  - type: text
    content: 'it is for God, but if we are in our right minds, it is for your benefit. '
  '14':
  - type: text
    content: 'For it is Christ’s love that fuels our passion and holds us tightly, '
  - type: note
    content: 'Paul uses the Greek word synechō (syn = “together with”; echō is where we get our English word echo), which is translated as “seize,” “compel,” “urge,” “control,” “lay hold of,” “overwhelm,” “to be held together,” “to grip tightly,” “completely dominate.” Paul is stating that the motivating passion of his life is Christ’s love filling his heart, leaving him no choice but to surrender everything to God. Paul gives us seven empowering motivations by which we are to live our lives: (1) the Holy Spirit—v. 5, (2) faith—v. 7, (3) a joyful confidence that we have new bodies waiting for us in heaven—v. 8, (4) our life’s passion to live for Christ—v. 9, (5) the knowledge of our appointment to stand before Christ—v. 10, (6) our holy awe of God—v. 11, (7) Christ’s endless love for us—v. 14.'
  - type: text
    content: 'because we are convinced that he has given his life for all of us. This means all died with him, '
  '15':
  - type: text
    content: 'so that those who live '
  - type: note
    content: Or “and he died for all so that those who live.” The repetitive phrase from v. 14 has been enfolded into the verse for the sake of English clarity.
  - type: text
    content: 'should no longer live self-absorbed lives but lives that are poured out for him—the one who died for us and now lives again. '
  '16':
  - type: text
    content: So, from now on, we refuse to evaluate people merely by their outward appearances. For that’s how we once viewed the Anointed One, but no longer do we see him with limited human insight.
  - type: note
    content: From man’s point of view, Christ was a blasphemer and false teacher. Yet when we see him from the eyes of faith, we view him as the pure and holy one, God’s Son.
  '17':
  - type: text
    content: 'Now, if anyone is enfolded into Christ, he has become an entirely new person. All that is related to the old order has vanished. '
  - type: note
    content: This would include our old identity, our life of sin, the power of Satan, the religious works of trying to please God, our old relationship with the world, and our old mind-sets. We are not reformed or simply refurbished, we are made completely new by our union with Christ and the indwelling of the Holy Spirit.
  - type: text
    content: 'Behold, everything is fresh and new. '
  - type: note
    content: Or “Behold, a new order has come!”
  '18':
  - type: text
    content: 'And God has made all things new, '
  - type: note
    content: As translated from the Aramaic and implied in the Greek.
  - type: text
    content: 'and reconciled '
  - type: note
    content: Or “who has restored us to friendship with God.”
  - type: text
    content: 'us to himself, and given us the ministry of reconciling others to God. '
  '19':
  - type: text
    content: 'In other words, it was through the Anointed One that God was shepherding the world, '
  - type: note
    content: As translated from the Aramaic. The Greek is “God was reconciling the world to himself, not counting their trespasses against them.”
  - type: text
    content: 'not even keeping records of their transgressions, and he has entrusted to us the ministry of opening the door of reconciliation to God. '
  - type: note
    content: As translated from the Aramaic.
  '2':
  - type: text
    content: 'We inwardly sigh '
  - type: note
    content: The Aramaic uses the phrase “to sigh and yearn.”
  - type: text
    content: as we live in these physical
  - type: text
    content: ' “'
  - type: text
    content: tents
  - type: text
    content: ',” longing to put on a new body for our life in heaven, '
  '20':
  - type: text
    content: 'We are ambassadors '
  - type: note
    content: To be ambassadors for Christ means that we are his diplomatic agents of the highest rank sent to represent King Jesus and authorized to speak on his behalf. We are the voice of heaven to the earth, invested with royal power through the name of Jesus and authority of his blood.
  - type: text
    content: 'of the Anointed One who carry the message of Christ to the world, as though God were tenderly pleading '
  - type: note
    content: Or “begging.”
  - type: text
    content: 'with them directly through our lips. So we tenderly plead with you on Christ’s behalf, “Turn back to God and be reconciled to him.” '
  '21':
  - type: text
    content: 'For God made '
  - type: note
    content: The Greek word Paul uses is poieō, a verb that, when nominalized, is poiema (poem, or poetry). Christ is God’s poetic masterpiece who became the glorious sacrifice for sin. Though disturbing to the eyes of man, God saw the work of redemption culminated in the masterful poetry of his Son suspended on a cross to give us heaven’s righteousness. Read Isa. 52:10–53:12.
  - type: text
    content: 'the only one who did not know sin to become sin for us, '
  - type: note
    content: Or “the sin offering.” See Ex. 29:14; Lev. 4:3; Num. 8:8; Eph. 5:2.
  - type: text
    content: so that we might become the righteousness of God through our union with him.
  - type: note
    content: This one verse is perhaps the greatest verse in the New Testament to describe our salvation through the sinless Savior and his substitutionary death on the cross. A wonderful divine exchange took place at the cross. All of our sins were left there, our guilt was removed and forever gone, and we walked away with all of God’s righteousness. What bliss is ours! Every believer today possesses the perfect and complete righteousness of Christ. We are seen by the Father as righteous as his Son.
  '3':
  - type: text
    content: 'in the belief that once we put on our new “clothing” we won’t find ourselves “naked.” '
  '4':
  - type: text
    content: 'So, while living in this “tent,” we groan under its burden, not because we want to die but because we want these new bodies. We crave for all that is mortal to be swallowed up by '
  - type: text
    content: eternal
  - type: text
    content: ' life. '
  '5':
  - type: text
    content: And this is no empty hope
  - type: text
    content: ', for God himself is the one who has prepared us for this wonderful destiny. And to confirm this promise, he has given us the Holy Spirit, like an engagement ring, as a guarantee.'
  - type: note
    content: By giving us the Holy Spirit, God is making us a promise, a guarantee of receiving our full inheritance. The Greek word for “down payment” (or “pledge”) is arrabōn and is used in Greek culture for “engagement ring.”
  '6':
  - type: text
    content: That’s why we’re always full of courage. Even while we’re at home in the body, we’re homesick to be with the Master—
  '7':
  - type: text
    content: 'for we live by faith, not by what we see with our eyes. '
  '8':
  - type: text
    content: 'We live with a joyful confidence, yet at the same time we take delight in the thought of leaving our bodies behind to be at home with the Lord. '
  '9':
  - type: text
    content: 'So whether we live or die '
  - type: note
    content: Or “at home or away from home.”
  - type: text
    content: 'we make it our life’s passion '
  - type: note
    content: Or “our driving ambition.”
  - type: text
    content: 'to live our lives pleasing to him. '
  - type: note
    content: Or “in full agreement with him.”
