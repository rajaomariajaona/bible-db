  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus turned to the Roman officer and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Go home. All that you have believed for will be done for you!”
    - type: text
      text: ' And his son was healed at that very moment.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Everyone in Capernaum
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus entered Peter’s home and found Peter’s mother-in-law bedridden, severely ill with a fever. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The moment Jesus touched her hand she was healed! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the fever left her.”
      marker-yv: yv-n
    - type: text
      text: Immediately she got up and began to make dinner for them.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That evening the people brought to him many who were demonized. And by Jesus only speaking a word of healing over them, they were totally set free from their torment, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Matthew gives us six instances of setting the demonized free:'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 8:28–33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 9:32–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 12:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 15:22–28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 17:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and everyone who was sick received their healing! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In doing this, Jesus fulfilled the prophecy of Isaiah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He put upon himself our weaknesses,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic “wounds” or “sores.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 53:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he carried away our diseases and made us well.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the sight of large crowds gathering around him, Jesus gave orders to his disciples to get ready to sail back over to the other side of the lake. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This was the eastern bank of Lake Galilee, located on the Syrian side.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Just then, a religious scholar '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “expert of the Law” (scribe). These were the top religious scholars among the Pharisees, whose occupation was the systematic study of the law of Moses.
      marker-yv: yv-n
    - type: text
      text: approached him and said, “Teacher, I’ll follow you wherever you go!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suddenly, a leper walked up to Jesus and threw himself down before him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in worship
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic and Hebrew Matthew, and implied in the Greek.
      marker-yv: yv-n
    - type: text
      text: and said, “Lord, you have the power to heal me . . . if you really want to.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Foxes have dens, birds have nests, but the Son of Man
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “this True Man.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:13–14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: has no true home in this world.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “no place to lay my head” (homeless).
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then another man spoke up and said, “Lord, I’ll follow you, but first I must take care of my aged father and bury him when he dies.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “but first let me go bury my father.” This is a figure of speech for saying, “I can’t follow you, but I will after my father dies.”
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus said to him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now is the time to follow me, and let those who are dead bury their own dead.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jesus requires that following him supersede any cultural or religious duty. Jewish culture in the time of Jesus gave the family the responsibility of a re-interment of the bones of the deceased into an ossuary one year after death. It is possible that this man’s father had passed away but the year had not yet completed. He was saying, “I’ll follow you after this year is completed.” Jesus is not telling him to dishonor his father by not doing a burial, but that the custom of waiting a year (tradition) must never trump following him. He is telling the man that the spiritually dead are capable of burying the dead, so nothing should keep anyone from following him.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Calms a Storm
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They all got into a boat and began to cross over to the other side of the lake. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: And Jesus, exhausted, fell asleep
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suddenly a violent storm '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “earthquake.” This could have been a temblor that caused tidal waves that swamped their boat. Most expositors equate this instead to the shaking of a violent storm.
      marker-yv: yv-n
    - type: text
      text: 'developed, with waves so high the boat was about to be swamped. Yet Jesus continued to sleep soundly. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples woke him up, saying, “Save us, Lord! We’re going to die!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 44:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus reprimanded them. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you gripped with fear?
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Why are you so cowardly, you of such little faith?” Jesus is implying that if they had faith, they could have commanded the storm to be stilled and it would happen.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Where is your faith?”
    - type: text
      text: ' Then he stood and rebuked '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is the same Greek word that is used when Jesus rebuked demons.
      marker-yv: yv-n
    - type: text
      text: 'the storm, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be still!”
    - type: text
      text: ' And instantly it became perfectly calm.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 89:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 107:23–30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples were astonished by this miracle and said to one another, “Who is this Man? Even the wind and waves obey his Word.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Sets Free Two Demonized Men
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they arrived on the other side of the lake, in the region of the Gadarenes, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are three possible locations for the region of the Gadarenes. (1) It could be only a few miles from the city of Gadara (modern-day Um Qeis). Gadara means “thorn hedge.” (2) The du Tillet translation of Hebrew Matthew has “the region of the Girgashites.” (3) Other scholars have concluded that it is the region near the town of Gergesa.
      marker-yv: yv-n
    - type: text
      text: 'two demonized men confronted Jesus. They lived among the tombs of a cemetery and were considered so extremely violent that no one felt safe passing through that area. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The demons screamed at Jesus, shouting, “Son of God, what do you want with us? '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The demons immediately sensed the true identity of Jesus and knew a day of judgment was coming for them. Sadly, many people today have yet to realize who Jesus is and that there is a coming day of judgment for them.
      marker-yv: yv-n
    - type: text
      text: Leave us alone! Have you come to torment us before the appointed time?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus reached out his hand and touched the leper and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Of course I want to heal you—be healed!”
    - type: text
      text: ' And instantly, all signs of leprosy '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: leprosy
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used for various skin disorders. For Jesus to touch a leper was to render him ceremonially unclean, but Jesus wasn’t defiled by touching the leper—the leper was healed!
      marker-yv: yv-n
    - type: text
      text: 'disappeared! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was a large herd of pigs feeding nearby. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the demons pleaded, “If you cast us out, send us into that herd of pigs.” '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus commanded, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then go!”
    - type: text
      text: ' And at once the demons came out of the men and went into the pigs. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: How amazing that Jesus answered the request of the demons. How much more will he answer your prayers. This mass exorcism is an astonishing miracle demonstrating the authority and power of Jesus. It is also amazing that the people of the town didn’t ask Jesus to remain with them. The one who can deliver two men from demonic power can also deliver a city.
      marker-yv: yv-n
    - type: text
      text: Then the entire herd of crazed pigs stampeded down the steep slope and fell into the water and drowned.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men who were herding the pigs fled to the nearby town and informed the people of all that had happened to the demonized men. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then everyone from the town went out to confront Jesus and urged him to go away and leave them alone.
    - type: usfm
      marker: f
      children:
      - type: usfm
