document_id: MAT.8,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Leper
  - type: text
    content: 'After he came down from teaching on the hillside, massive crowds began following him. '
  - type: note
    content: It is best to view this verse as an extension of 7:29. Chapter and verse breaks are not part of the inspired text but were added centuries later to aid in our study of God’s Word.
  '10':
  - type: text
    content: 'Jesus was astonished when he heard this and said to those who were following him, '
  - type: text
    content: “He has greater faith than anyone I’ve encountered in Israel!
  - type: text
    content: ' '
  '11':
  - type: text
    content: Listen to what I am about to tell you. Multitudes of Gentiles will stream from the east and the west, to enter into the heavenly kingdom with Abraham, Isaac, and Jacob.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But many Israelites, born to be heirs of the kingdom, will be turned away and banished into the darkness where there will be bitter weeping and unbearable anguish.”
  - type: note
    content: Or “gnashing of teeth.” See also Job 16:9; Pss. 35:16; 37:12; 112:10; Jer. 9:9–14.
  '13':
  - type: text
    content: 'Then Jesus turned to the Roman officer and said, '
  - type: text
    content: “Go home. All that you have believed for will be done for you!”
  - type: text
    content: ' And his son was healed at that very moment.'
  - type: heading
    content: Jesus Heals Everyone in Capernaum
  '14':
  - type: text
    content: 'Then Jesus entered Peter’s home and found Peter’s mother-in-law bedridden, severely ill with a fever. '
  '15':
  - type: text
    content: 'The moment Jesus touched her hand she was healed! '
  - type: note
    content: Or “the fever left her.”
  - type: text
    content: Immediately she got up and began to make dinner for them.
  '16':
  - type: text
    content: 'That evening the people brought to him many who were demonized. And by Jesus only speaking a word of healing over them, they were totally set free from their torment, '
  - type: note
    content: 'Matthew gives us six instances of setting the demonized free: 8:16; 8:28–33; 9:32–34; 12:22; 15:22–28; 17:18.'
  - type: text
    content: 'and everyone who was sick received their healing! '
  '17':
  - type: text
    content: 'In doing this, Jesus fulfilled the prophecy of Isaiah:'
  - type: text
    content: He put upon himself our weaknesses,
  - type: note
    content: The Aramaic “wounds” or “sores.” See Isa. 53:4.
  - type: text
    content: and he carried away our diseases and made us well.
  '18':
  - type: text
    content: 'At the sight of large crowds gathering around him, Jesus gave orders to his disciples to get ready to sail back over to the other side of the lake. '
  - type: note
    content: This was the eastern bank of Lake Galilee, located on the Syrian side.
  '19':
  - type: text
    content: 'Just then, a religious scholar '
  - type: note
    content: Or “expert of the Law” (scribe). These were the top religious scholars among the Pharisees, whose occupation was the systematic study of the law of Moses.
  - type: text
    content: approached him and said, “Teacher, I’ll follow you wherever you go!”
  '2':
  - type: text
    content: 'Suddenly, a leper walked up to Jesus and threw himself down before him '
  - type: text
    content: in worship
  - type: text
    content: ' '
  - type: note
    content: As translated from the Aramaic and Hebrew Matthew, and implied in the Greek.
  - type: text
    content: and said, “Lord, you have the power to heal me . . . if you really want to.”
  '20':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Foxes have dens, birds have nests, but the Son of Man
  - type: text
    content: ' '
  - type: note
    content: Or “this True Man.” See Dan. 7:13–14.
  - type: text
    content: has no true home in this world.”
  - type: note
    content: Or “no place to lay my head” (homeless).
  '21':
  - type: text
    content: Then another man spoke up and said, “Lord, I’ll follow you, but first I must take care of my aged father and bury him when he dies.”
  - type: note
    content: Or “but first let me go bury my father.” This is a figure of speech for saying, “I can’t follow you, but I will after my father dies.”
  '22':
  - type: text
    content: 'But Jesus said to him, '
  - type: text
    content: “Now is the time to follow me, and let those who are dead bury their own dead.”
  - type: note
    content: Jesus requires that following him supersede any cultural or religious duty. Jewish culture in the time of Jesus gave the family the responsibility of a re-interment of the bones of the deceased into an ossuary one year after death. It is possible that this man’s father had passed away but the year had not yet completed. He was saying, “I’ll follow you after this year is completed.” Jesus is not telling him to dishonor his father by not doing a burial, but that the custom of waiting a year (tradition) must never trump following him. He is telling the man that the spiritually dead are capable of burying the dead, so nothing should keep anyone from following him.
  - type: heading
    content: Jesus Calms a Storm
  '23':
  - type: text
    content: 'They all got into a boat and began to cross over to the other side of the lake. '
  - type: text
    content: And Jesus, exhausted, fell asleep
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Suddenly a violent storm '
  - type: note
    content: Or “earthquake.” This could have been a temblor that caused tidal waves that swamped their boat. Most expositors equate this instead to the shaking of a violent storm.
  - type: text
    content: 'developed, with waves so high the boat was about to be swamped. Yet Jesus continued to sleep soundly. '
  '25':
  - type: text
    content: The disciples woke him up, saying, “Save us, Lord! We’re going to die!”
  - type: note
    content: See Ps. 44:23.
  '26':
  - type: text
    content: 'But Jesus reprimanded them. '
  - type: text
    content: “Why are you gripped with fear?
  - type: text
    content: ' '
  - type: note
    content: Or “Why are you so cowardly, you of such little faith?” Jesus is implying that if they had faith, they could have commanded the storm to be stilled and it would happen.
  - type: text
    content: Where is your faith?”
  - type: text
    content: ' Then he stood and rebuked '
  - type: note
    content: This is the same Greek word that is used when Jesus rebuked demons.
  - type: text
    content: 'the storm, saying, '
  - type: text
    content: “Be still!”
  - type: text
    content: ' And instantly it became perfectly calm.'
  - type: note
    content: See Pss. 89:9; 107:23–30.
  '27':
  - type: text
    content: The disciples were astonished by this miracle and said to one another, “Who is this Man? Even the wind and waves obey his Word.”
  - type: heading
    content: Jesus Sets Free Two Demonized Men
  '28':
  - type: text
    content: 'When they arrived on the other side of the lake, in the region of the Gadarenes, '
  - type: note
    content: There are three possible locations for the region of the Gadarenes. (1) It could be only a few miles from the city of Gadara (modern-day Um Qeis). Gadara means “thorn hedge.” (2) The du Tillet translation of Hebrew Matthew has “the region of the Girgashites.” (3) Other scholars have concluded that it is the region near the town of Gergesa.
  - type: text
    content: 'two demonized men confronted Jesus. They lived among the tombs of a cemetery and were considered so extremely violent that no one felt safe passing through that area. '
  '29':
  - type: text
    content: 'The demons screamed at Jesus, shouting, “Son of God, what do you want with us? '
  - type: note
    content: The demons immediately sensed the true identity of Jesus and knew a day of judgment was coming for them. Sadly, many people today have yet to realize who Jesus is and that there is a coming day of judgment for them.
  - type: text
    content: Leave us alone! Have you come to torment us before the appointed time?”
  '3':
  - type: text
    content: 'Jesus reached out his hand and touched the leper and said, '
  - type: text
    content: “Of course I want to heal you—be healed!”
  - type: text
    content: ' And instantly, all signs of leprosy '
  - type: note
    content: The word leprosy was used for various skin disorders. For Jesus to touch a leper was to render him ceremonially unclean, but Jesus wasn’t defiled by touching the leper—the leper was healed!
  - type: text
    content: 'disappeared! '
  '30':
  - type: text
    content: 'There was a large herd of pigs feeding nearby. '
  '31':
  - type: text
    content: 'And the demons pleaded, “If you cast us out, send us into that herd of pigs.” '
  '32':
  - type: text
    content: 'Jesus commanded, '
  - type: text
    content: “Then go!”
  - type: text
    content: ' And at once the demons came out of the men and went into the pigs. '
  - type: note
    content: How amazing that Jesus answered the request of the demons. How much more will he answer your prayers. This mass exorcism is an astonishing miracle demonstrating the authority and power of Jesus. It is also amazing that the people of the town didn’t ask Jesus to remain with them. The one who can deliver two men from demonic power can also deliver a city.
  - type: text
    content: Then the entire herd of crazed pigs stampeded down the steep slope and fell into the water and drowned.
  '33':
  - type: text
    content: 'The men who were herding the pigs fled to the nearby town and informed the people of all that had happened to the demonized men. '
  '34':
  - type: text
    content: Then everyone from the town went out to confront Jesus and urged him to go away and leave them alone.
  - type: note
    content: It is possible that the people of this region worshiped the sow goddess, called “Nut” in Egypt. In Rome she was called “Maia,” from which we get the month of May. The swine herders were possibly soothsayers and shamans. The mass suicide of these pigs proved that the Son of God had authority over the principality of that region that confronted him the moment he came into their region.
  '4':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: “Don’t speak to anyone, but go at once and find a priest and show him what has happened to you. Make sure to take the offering Moses commanded so he can certify your healing.”
  - type: note
    content: Or “as a testimony to them.” See Lev. 13–14 for the prescribed ritual for the cleansing of a leper.
  - type: heading
    content: Jesus Heals the Son of a Roman Officer
  '5':
  - type: text
    content: 'When Jesus entered the village of Capernaum, a captain '
  - type: note
    content: Or “centurion.”
  - type: text
    content: 'in the Roman army approached him, asking for a miracle. '
  - type: note
    content: Implied in the narrative.
  '6':
  - type: text
    content: '“Lord,” he said, “I have a son '
  - type: note
    content: As translated from the Aramaic and Hebrew Matthew. The Greek is “servant.”
  - type: text
    content: who is lying in my home, paralyzed and suffering terribly.”
  '7':
  - type: text
    content: 'Jesus responded, '
  - type: text
    content: “I will go with you and heal him.”
  '8':
  - type: text
    content: 'But the Roman officer interjected, “Lord, who am I to have you come into my house? '
  - type: text
    content: I understand your authority
  - type: text
    content: ', for I too am a man who walks under authority and have authority over soldiers who serve under me. I can tell one to go and he’ll go, and another to come and he’ll come. I command my servants and they’ll do whatever I ask. So I know that all you need to do is to stand here and command healing over my son and he will be instantly healed.”'
