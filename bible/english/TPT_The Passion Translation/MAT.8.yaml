    - type: text
      text: Jesus Heals a Leper
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he came down from teaching on the hillside, massive crowds began following him. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: It is best to view this verse as an extension of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 7:29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Chapter and verse breaks are not part of the inspired text but were added centuries later to aid in our study of God’s Word.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus was astonished when he heard this and said to those who were following him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “He has greater faith than anyone I’ve encountered in Israel!
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Listen to what I am about to tell you. Multitudes of Gentiles will stream from the east and the west, to enter into the heavenly kingdom with Abraham, Isaac, and Jacob.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But many Israelites, born to be heirs of the kingdom, will be turned away and banished into the darkness where there will be bitter weeping and unbearable anguish.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 8:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “gnashing of teeth.” See also
      - type: usfm
