document_id: JDG.21,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Compassion for the Tribe of Benjamin
  - type: text
    content: 'The men of Israel had bound themselves by an oath at Mizpah: “Not one of us will give his daughter in marriage to a Benjamite.” '
  '10':
  - type: text
    content: 'So the people sent twelve thousand soldiers with the command: “Go to the inhabitants of Jabesh-Gilead and kill them with the sword, including the women and children. '
  '11':
  - type: text
    content: 'This is what you are to do: exterminate every man and every woman who is not a virgin.” '
  '12':
  - type: text
    content: And they found four hundred unmarried young virgins among those living in Jabesh-Gilead. They seized them and brought them to the camp at Shiloh in the land of Canaan.
  '13':
  - type: text
    content: 'Then the whole congregation sent word to the Benjamites at Rimmon Rock and offered them peace. '
  - type: note
    content: Or “proclaimed peace to them.”
  '14':
  - type: text
    content: The Benjamites returned, and the Israelites presented the young women they had spared at Jabesh-Gilead. But they were not a sufficient number of wives for them all.
  - type: note
    content: Apparently, there were only four hundred wives for six hundred men (20:47).
  '15':
  - type: text
    content: 'The people were remorseful and had compassion on the tribe of Benjamin because '
  - type: text
    content: Yahweh
  - type: text
    content: ' had taken out a tribe of Israel. '
  '16':
  - type: text
    content: 'The elders of the tribes said, “Where are we to find wives for the survivors of Benjamin since there are no more women left in their tribe?” '
  '17':
  - type: text
    content: 'And they said, “There must be heirs for the survivors of Benjamin to prevent the tribe from being wiped out from Israel. '
  '18':
  - type: text
    content: Yet we cannot give them any of our daughters as wives.” For the Israelites had sworn, “A curse will rest on anyone who gives a wife to a Benjamite.”
  - type: heading
    content: The Festival at Shiloh
  '19':
  - type: text
    content: 'So they said, “Look, '
  - type: text
    content: Yahweh
  - type: text
    content: '’s yearly festival is taking place at Shiloh, just north of Bethel, and east of the main road that goes up from Bethel to Shechem, and a little south of Lebonah.” '
  - type: note
    content: Some Jewish scholars believe the location described here was not Shiloh, but where the vineyards were. Lebonah is recognized as modern el-Lubban, about three miles northwest of Shiloh.
  '2':
  - type: text
    content: 'And then the people came to Bethel and sat until evening before God, and they raised their voice with groaning and great weeping. '
  '20':
  - type: text
    content: 'And they instructed the Benjamites, “Go and hide in the vineyards. '
  '21':
  - type: text
    content: 'Watch for the young women of Shiloh to come out for their dances. When they come out of the vineyards, grab one of the young women of Shiloh to be your wife. Then go and live in your tribal land of Benjamin. '
  '22':
  - type: text
    content: If their fathers or their brothers come to complain to us, we’ll tell them, ‘Do us this favor, please. Grant us permission for the Benjamites to keep them as wives because in battle we didn’t seize them from you. And since you didn’t give them to us, you’re not guilty of breaking your oath.’ ”
  '23':
  - type: text
    content: 'So the Benjamites took as many wives as there were men from among the dancers, and they carried them away. Then they returned to their own territory and rebuilt towns to live in. '
  '24':
  - type: text
    content: The Israelites dispersed by tribes and families, and they went out from there to their own territories.
  '25':
  - type: text
    content: In those days, Israel had no king, and everyone did whatever they wanted to do.
  '3':
  - type: text
    content: They said, “
  - type: text
    content: Yahweh
  - type: text
    content: ', the '
  - type: text
    content: 'true'
  - type: text
    content: ' God of Israel, we have lost one of our own tribes today. Why has this happened to Israel?”'
  '4':
  - type: text
    content: 'When the next day dawned, the people got up early, built an altar there, and offered burnt offerings and peace offerings. '
  '5':
  - type: text
    content: 'Then the Israelites asked one another, “Which tribe of Israel failed to appear in our assembly before '
  - type: text
    content: Yahweh
  - type: text
    content: '?” Under the terms of their solemn oath, whoever did not come before '
  - type: text
    content: Yahweh
  - type: text
    content: ' at Mizpah should be put to death. '
  '6':
  - type: text
    content: 'Even so, the Israelites had compassion for their brothers of the tribe of Benjamin and were grieved deeply '
  - type: text
    content: over their loss
  - type: text
    content: '. They lamented, “One of our tribes has been eliminated from Israel this day. '
  '7':
  - type: text
    content: 'How can we provide wives for the few survivors since we have sworn by '
  - type: text
    content: Yahweh
  - type: text
    content: ' that we will not give any of our daughters as wives for them?”'
  '8':
  - type: text
    content: 'Then they inquired, “Were there any from the tribes of Israel who did not come up before '
  - type: text
    content: Yahweh
  - type: text
    content: ' at Mizpah?” They found out that no one from Jabesh-Gilead had come to the assembly. '
  '9':
  - type: text
    content: 'When the roll was called among the people, not one of the inhabitants of Jabesh-Gilead was there. '
