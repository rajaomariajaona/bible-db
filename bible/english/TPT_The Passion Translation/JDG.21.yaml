document_id: JDG.21
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Compassion for the Tribe of Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The men of Israel had bound themselves by an oath at Mizpah: “Not one of us will give his daughter in marriage to a Benjamite.” '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'And then the people came to Bethel and sat until evening before God, and they raised their voice with groaning and great weeping. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They said, “
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', the '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'true'
  - type: text
    text: ' God of Israel, we have lost one of our own tribes today. Why has this happened to Israel?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the next day dawned, the people got up early, built an altar there, and offered burnt offerings and peace offerings. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the Israelites asked one another, “Which tribe of Israel failed to appear in our assembly before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '?” Under the terms of their solemn oath, whoever did not come before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' at Mizpah should be put to death. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Even so, the Israelites had compassion for their brothers of the tribe of Benjamin and were grieved deeply '
  - type: usfm
    marker: it
    children:
    - type: text
      text: over their loss
  - type: text
    text: '. They lamented, “One of our tribes has been eliminated from Israel this day. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'How can we provide wives for the few survivors since we have sworn by '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' that we will not give any of our daughters as wives for them?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then they inquired, “Were there any from the tribes of Israel who did not come up before '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' at Mizpah?” They found out that no one from Jabesh-Gilead had come to the assembly. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When the roll was called among the people, not one of the inhabitants of Jabesh-Gilead was there. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'So the people sent twelve thousand soldiers with the command: “Go to the inhabitants of Jabesh-Gilead and kill them with the sword, including the women and children. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'This is what you are to do: exterminate every man and every woman who is not a virgin.” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: And they found four hundred unmarried young virgins among those living in Jabesh-Gilead. They seized them and brought them to the camp at Shiloh in the land of Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then the whole congregation sent word to the Benjamites at Rimmon Rock and offered them peace. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “proclaimed peace to them.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The Benjamites returned, and the Israelites presented the young women they had spared at Jabesh-Gilead. But they were not a sufficient number of wives for them all.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Apparently, there were only four hundred wives for six hundred men (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 20:47
      metadata:
        usfm: JDG.20.47
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The people were remorseful and had compassion on the tribe of Benjamin because '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ' had taken out a tribe of Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The elders of the tribes said, “Where are we to find wives for the survivors of Benjamin since there are no more women left in their tribe?” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And they said, “There must be heirs for the survivors of Benjamin to prevent the tribe from being wiped out from Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Yet we cannot give them any of our daughters as wives.” For the Israelites had sworn, “A curse will rest on anyone who gives a wife to a Benjamite.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival at Shiloh
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'So they said, “Look, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '’s yearly festival is taking place at Shiloh, just north of Bethel, and east of the main road that goes up from Bethel to Shechem, and a little south of Lebonah.” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 21:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Jewish scholars believe the location described here was not Shiloh, but where the vineyards were. Lebonah is recognized as modern el-Lubban, about three miles northwest of Shiloh.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And they instructed the Benjamites, “Go and hide in the vineyards. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Watch for the young women of Shiloh to come out for their dances. When they come out of the vineyards, grab one of the young women of Shiloh to be your wife. Then go and live in your tribal land of Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: If their fathers or their brothers come to complain to us, we’ll tell them, ‘Do us this favor, please. Grant us permission for the Benjamites to keep them as wives because in battle we didn’t seize them from you. And since you didn’t give them to us, you’re not guilty of breaking your oath.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So the Benjamites took as many wives as there were men from among the dancers, and they carried them away. Then they returned to their own territory and rebuilt towns to live in. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: The Israelites dispersed by tribes and families, and they went out from there to their own territories.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: In those days, Israel had no king, and everyone did whatever they wanted to do.
