  - type: text
    content: and the serpent’s food will be dust.
  - type: note
    content: See Gen. 3:14; 1 Cor. 15:47–49. Man was made from dust. The serpent feeds on whatever we withhold from God. The devil’s dining room is the fallen human nature and the minds of men who are not yielded to God. Over time, the serpent feeds and grows into the great dragon (see Rev. 12:9).
