  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore, this is what the Lord God says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “My servants will eat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will go hungry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My servants will drink,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will go thirsty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My servants will rejoice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will be put to shame.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My servants will sing joyfully with hearts of gladness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you will cry out from the pain deep inside,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and wail from a broken heart.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you die, your name will become a curse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: used by my chosen ones.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord God will put you to death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: godly
    - type: text
      text: ' servants'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will leave behind the legacy of an honorable name.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For whoever pronounces a blessing on the earth
  - type: usfm
    marker: q1
