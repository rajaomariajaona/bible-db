      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And who pours new wine into an old wineskin? If someone did, the old wineskin would burst and the new wine would be lost.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: New wine must always be poured into new wineskins.
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Christ is our new garment (righteousness) and our new wine that is poured into a new wineskin (our new life and divine nature). Many today are trying to patch up their old garments (self-righteousness), hoping their old lives can hold the new wine of the Spirit.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yet you say, ‘The old ways are better,’ and you refuse to even taste the new wine that I bring.”
