document_id: LUK.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Miracle Catch of Fish
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On one occasion, Jesus was preaching to a crowd on the shore of Lake Galilee. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Gennesaret,” which is known as Lake Galilee.
    marker-yv: yv-n
  - type: text
    text: 'A vast multitude of people was pushing to get close to Jesus to hear the word of God. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He noticed two fishing boats at the water’s edge, with the fishermen nearby, rinsing their nets. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus climbed into the boat belonging to Simon Peter and said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Let me use your boat. Push it off a short distance away from the shore so I can speak to the crowd.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jesus sat down and taught the people from the boat. When he had finished, he said to Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now row out to deep water to cast your nets and you will have a great catch.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Master,” Peter replied, “we’ve just come back from fishing all night and didn’t catch a thing. But if you insist, we’ll go out again and let down our nets because of your word.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When they pulled up their nets, they were shocked to see a huge catch of fish, and their nets were ready to burst! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They waved to their business partners in the other boat for help. They ended up completely filling both boats with fish until they began to sink!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It has been estimated that this was a catch of nearly one ton of fish, what was typically caught in two weeks’ time. The miracle is even greater when we consider that fishing was normally only done at night.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When Simon Peter saw this '
  - type: usfm
    marker: it
    children:
    - type: text
      text: astonishing miracle
  - type: text
    text: ', he knelt at Jesus’ feet and begged him, “Go away from me, Master, for I am a sinful man!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'Simon Peter and the other fishermen—including his fishing partners, Jacob '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:9–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “James.” Both Greek and Aramaic leave the Hebrew name as it is, Jacob. This translation will use Jacob throughout.
    marker-yv: yv-n
  - type: text
    text: and John, the sons of Zebedee—were awestruck over the miracle catch of fish.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not yield to your fear, Simon Peter. From now on, you will catch men for salvation!”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:9–10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Translated from the Aramaic text. The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zoogreo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a compound word of
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: zoos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (meaning “life”) and
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: agreuo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (meaning “to catch”). Fishermen catch fish that die and are consumed, but Peter was to catch men and give them life and freedom.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: After pulling their boats to the shore, they left everything behind and followed Jesus.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: When you leave everything behind to follow Jesus, you are actually in the position to have it all. Jesus will be your everything. Later, Peter will once again leave his nets behind to swim to Jesus. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: John 21:4–8
      metadata:
        usfm: JHN.21.4+JHN.21.5+JHN.21.6+JHN.21.7+JHN.21.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus, the Healer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: One day, while Jesus was in a certain city, he came upon a man covered with leprous sores. When the man recognized Jesus, he fell on his face at Jesus’ feet and begged to be healed, saying, “If you were willing, you could completely heal me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 13-14
  - type: text
    text: 'Jesus reached out and touched him '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:13–14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: For the religious Jew, touching a leper was forbidden because of the contamination. Jesus was not defiled in touching the leper; rather, the leper was healed.
    marker-yv: yv-n
  - type: text
    text: 'and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Of course I am willing to heal you, and now you will be healed.”
  - type: text
    text: ' Instantly, the leprous sores were healed, and his skin became smooth.'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Tell no one what has happened, but go to the temple priests and show them you’ve been healed. And to show that you are purified, make an offering for your cleansing, just as Moses commanded. You will become a living testimony to them!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'After this miracle, the news about Jesus spread even farther. Massive crowds continually gathered to hear him speak and to be healed from their illnesses. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: But Jesus often slipped away from them and went into the wilderness to pray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'One day, many Jewish religious leaders known as Pharisees, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Pharisees” means “separated ones.”
    marker-yv: yv-n
  - type: text
    text: along with many religious scholars, came from every village in Galilee, throughout Judea, and even from Jerusalem to hear Jesus teach. And the power of the Lord God surged through him to instantly heal the sick.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Some men came to Jesus, carrying a paraplegic man on a stretcher. They attempted to bring him in past the crowd to set him down in front of Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But because there were so many people crowding the door, they had no way to bring him inside. So they crawled onto the roof, dug their way through the roof tiles, and lowered the man, stretcher and all, into the middle of the crowd, right in front of Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Seeing the demonstration of their faith, Jesus said to the paraplegic man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My friend, your sins are forgiven!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The Jewish religious leaders and the religious scholars '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “scribes.” They were the experts in the law of Moses.
    marker-yv: yv-n
  - type: text
    text: 'whispered objections among themselves. “Who does this man think he is to speak such blasphemy? Only God can forgive sins! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Does he think he is God?
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 22-23
  - type: text
    text: 'Jesus, knowing their thoughts, said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Why do you argue in your hearts over what I do and think that it is blasphemy for me to say his sins are forgiven? Let me ask you, which is easier to prove: when I say, ‘Your sins are forgiven,’ or when I say, ‘Stand up, carry your stretcher, and walk’?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus turned to the paraplegic man and said, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “To prove to you all that I, the Son of Man,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the title Jesus uses for himself more than any other, especially in Luke. This refers to the vision of Daniel when he saw the Ancient of Days, and walking before the Ancient of Days was one like the Son of Man who would be given the right to judge the world. Calling himself the Son of Man was Jesus’ claim to heavenly authority. It was more of an exalted and heavenly concept than being a human, the “son of a man.” See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Dan. 7:13
      metadata:
        usfm: DAN.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matt. 16:13–20
      metadata:
        usfm: MAT.16.13+MAT.16.14+MAT.16.15+MAT.16.16+MAT.16.17+MAT.16.18+MAT.16.19+MAT.16.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: have the lawful authority on earth to forgive sins, I say to you now, stand up! Carry your stretcher and go on home, for you are healed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: In an instant, the man rose right before their eyes. He stood, picked up his stretcher, and went home, giving God the glory with every step he took.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The people were seized with astonishment and dumbfounded over what they had just witnessed. And they all praised God, remarking over and over, “Incredible! What an unbelievable miracle '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “things we never expected,” or “paradox.”
    marker-yv: yv-n
  - type: text
    text: we’ve seen today!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calls Matthew to Follow Him
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Afterward, Jesus went out and looked for a man named Matthew. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Greek text is “Levi,” another name for Matthew.
    marker-yv: yv-n
  - type: text
    text: 'He found him sitting at his tax booth, for he was a tax collector. Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be my disciple and follow me.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: That very moment, Matthew got up, left everything behind, and followed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 29-30
  - type: text
    text: 'Matthew wanted to throw a banquet to honor Jesus. So he invited Jesus to his home for dinner, along with many of Levi’s fellow tax collectors and other guests. But the Jewish religious leaders and experts of the law complained to Jesus’ disciples, “Why would you defile yourselves by eating and drinking with tax collectors and sinners? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Doesn’t Jesus know it’s wrong to do that?
  - type: text
    text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesus overheard their complaining and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who goes to the doctor for a cure? Those who are well or those who are sick?
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The word used here is the Greek word for “evil.” Sickness is a form of evil in God’s eyes. Jesus came to heal the “evil” or sicknesses of earth.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I have not come to call the ‘righteous,’ but to call those who know they are sinners and bring them to repentance.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Question about Fasting
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Jesus’ critics questioned him. “John the prophet is known for leading his disciples to fast often and pray. As the religious leaders of the land, we do the same. Why do you and your disciples spend most of your time feasting at banquets?”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: It is likely that Matthew held his banquet on one of the Jewish fast days.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Should you make the sons of the bridal chamber fast while celebrating with the Bridegroom?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But when the Bridegroom is taken away from them, then you will see them fasting.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'And he gave them this illustration: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “No one rips up a new garment to make patches for an old, worn-out one. If you tear up the new to make a patch for the old, it would not match the old garment.
  - type: text
    text: ' '
  - type: usfm
    marker: v
