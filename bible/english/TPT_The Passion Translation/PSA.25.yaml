document_id: PSA.25,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalms 25–39 are fifteen poetic songs about bringing pure worship before God. Pss. 25–29 speak of our confidence to worship God. Pss. 30–34 point us to receiving life eternal from our Hero-God. The last five, Pss. 35–39, bring us to the importance of personal purity and holiness before God as we worship him in truth.Don’t Fail Me, God!
  - type: text
    content: King David’s poetic praise to God
  - type: text
    content: Always
  - type: text
    content: ' I will lift up my soul into your presence, '
  - type: text
    content: Yahweh
  - type: text
    content: .
  '10':
  - type: text
    content: 'Loving are all the ways of '
  - type: text
    content: Yahweh
  - type: text
    content: ', loving and faithful for those who keep his covenant.'
  '11':
  - type: text
    content: 'For the honor of your name, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: never count my many sins, and forgive them all—
  - type: text
    content: lift their burden off of my life!
  - type: note
    content: The Hebrew word used here for “forgive” or “pardon” is a rare word used only twice in the Old Testament and comes from a root word meaning “to lift off a burden.”
  '12':
  - type: text
    content: 'Who are they that live in the holy fear of '
  - type: text
    content: Yahweh
  - type: text
    content: '?'
  - type: text
    content: You will show them the right path to take.
  '13':
  - type: text
    content: Then prosperity and favor will be their portion,
  - type: text
    content: and their descendants will inherit the earth.
  '14':
  - type: text
    content: 'There’s a private place reserved for the devoted lovers of '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: where they sit near him and receive
  - type: text
    content: the revelation-secrets of his promises.
  - type: note
    content: Or “covenant.”
  '15':
  - type: text
    content: 'Rescue me, '
  - type: text
    content: Yahweh
  - type: text
    content: ', for you free my feet from every trap.'
  '16':
  - type: text
    content: Sorrows fill my heart as I feel helpless, mistreated—
  - type: text
    content: I’m all alone and in misery!
  - type: text
    content: Come closer to me now, for I need your mercy.
  '17':
  - type: text
    content: Turn to me, for my problems seem to be going from bad to worse.
  - type: text
    content: Only you can free me from all these troubles!
  '18':
  - type: text
    content: Until you lift this burden, the burden of all my sins,
  - type: text
    content: my troubles and trials will be more than I can handle.
  - type: text
    content: Can’t you feel my pain?
  '19':
  - type: text
    content: 'Vicious, violent '
  - type: note
    content: This is the Hebrew word hamas.
  - type: text
    content: enemies hate me.
  - type: text
    content: There are so many, Lord. Can’t you see?
  '2':
  - type: text
    content: Be there for me
  - type: text
    content: ', my God, for I keep trusting in you.'
  - type: text
    content: Don’t allow my foes to gloat over me or
  - type: text
    content: the shame of defeat to overtake me.
  '20':
  - type: text
    content: Will you protect me from their power against me? I have taken shelter in you.
  - type: text
    content: Let it never be said that when I trusted you,
  - type: text
    content: you didn’t come to my rescue.
  '21':
  - type: text
    content: Your perfection and faithfulness are my bodyguards,
  - type: text
    content: for you are my hope and I trust in you as my only protection.
  '22':
  - type: text
    content: Zealously, God, we ask you
  - type: text
    content: to come save Israel from all her troubles,
  - type: text
    content: for you provide the ransom price for your people!
  - type: note
    content: Psalm 25 is an acrostic psalm; that is, in the Hebrew text every verse begins with a progressive letter of the alphabet. It is considered a poetic device of Hebrew literature. Go back through the psalm and notice how many verses begin with the next letter of our English alphabet. See if you can find them.
  '3':
  - type: text
    content: Could anyone be disgraced
  - type: text
    content: when he has entwined his heart with yours?
  - type: text
    content: But my foes will all be defeated and ashamed
  - type: text
    content: when they harm the innocent.
  '4':
  - type: text
    content: 'Direct me, '
  - type: text
    content: Yahweh
  - type: text
    content: ', throughout my journey'
  - type: text
    content: so I can experience your plans for my life.
  - type: text
    content: 'Reveal the life-paths '
  - type: text
    content: that are pleasing to you
  - type: text
    content: .
  '5':
  - type: text
    content: 'Escort me into your truth; '
  - type: text
    content: take me by the hand
  - type: text
    content: ' and teach me.'
  - type: note
    content: Or “Reveal your truth to me as I move forward.”
  - type: text
    content: For you are the God of my salvation;
  - type: text
    content: I have wrapped my heart into yours all day long!
  - type: note
    content: The Hebrew word most commonly translated as “wait” (wait upon the Lord) is qavah, which also means “to tie together by twisting” or “to entwine” or “to wrap tightly.” This is a beautiful concept of waiting upon God, not passively, but entwining our hearts with him and his purposes.
  '6':
  - type: text
    content: Forgive my failures as a young man,
  - type: text
    content: and overlook the sins of my immaturity.
  - type: text
    content: 'Give me grace, '
  - type: text
    content: Yahweh
  - type: text
    content: '! Always look at me'
  - type: text
    content: through your eyes of love—
  - type: text
    content: your forgiving eyes of mercy and compassion.
  - type: text
    content: When you think of me, see me as one you love and care for.
  '8':
  - type: text
    content: How good you are to me!
  - type: text
    content: 'When people turn to you, '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: they discover how easy you are to please—so faithful and true!
  - type: text
    content: Joyfully you teach them the proper path,
  - type: text
    content: even when they go astray.
  '9':
  - type: text
    content: Keep showing the humble your path,
  - type: text
    content: and lead them into the best decision.
  - type: text
    content: Bring revelation-light that trains them in the truth.
