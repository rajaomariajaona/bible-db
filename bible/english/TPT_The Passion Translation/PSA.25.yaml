    marker-yv: yv-n
  - type: text
    text: Don’t Fail Me, God!
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: King David’s poetic praise to God
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Always
  - type: text
    text: ' I will lift up my soul into your presence, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Be there for me
  - type: text
    text: ', my God, for I keep trusting in you.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t allow my foes to gloat over me or
- type: usfm
  marker: q1
  children:
  - type: text
    text: the shame of defeat to overtake me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Could anyone be disgraced
- type: usfm
  marker: q1
  children:
  - type: text
    text: when he has entwined his heart with yours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my foes will all be defeated and ashamed
- type: usfm
  marker: q1
  children:
  - type: text
    text: when they harm the innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Direct me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', throughout my journey'
- type: usfm
  marker: q1
  children:
  - type: text
    text: so I can experience your plans for my life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Reveal the life-paths '
  - type: usfm
    marker: it
    children:
    - type: text
      text: that are pleasing to you
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Escort me into your truth; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: take me by the hand
  - type: text
    text: ' and teach me.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Reveal your truth to me as I move forward.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: For you are the God of my salvation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have wrapped my heart into yours all day long!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word most commonly translated as “wait” (wait upon the Lord) is
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: qavah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', which also means “to tie together by twisting” or “to entwine” or “to wrap tightly.” This is a beautiful concept of waiting upon God, not passively, but entwining our hearts with him and his purposes.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 6-7
  - type: text
    text: Forgive my failures as a young man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and overlook the sins of my immaturity.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Give me grace, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '! Always look at me'
- type: usfm
  marker: q1
  children:
  - type: text
    text: through your eyes of love—
- type: usfm
  marker: q1
  children:
  - type: text
    text: your forgiving eyes of mercy and compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you think of me, see me as one you love and care for.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: How good you are to me!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'When people turn to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: they discover how easy you are to please—so faithful and true!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joyfully you teach them the proper path,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even when they go astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Keep showing the humble your path,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and lead them into the best decision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring revelation-light that trains them in the truth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Loving are all the ways of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', loving and faithful for those who keep his covenant.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'For the honor of your name, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: never count my many sins, and forgive them all—
- type: usfm
  marker: q1
  children:
  - type: text
    text: lift their burden off of my life!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew word used here for “forgive” or “pardon” is a rare word used only twice in the Old Testament and comes from a root word meaning “to lift off a burden.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Who are they that live in the holy fear of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will show them the right path to take.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then prosperity and favor will be their portion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and their descendants will inherit the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There’s a private place reserved for the devoted lovers of '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: where they sit near him and receive
- type: usfm
  marker: q1
  children:
  - type: text
    text: the revelation-secrets of his promises.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “covenant.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rescue me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', for you free my feet from every trap.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Sorrows fill my heart as I feel helpless, mistreated—
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’m all alone and in misery!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Come closer to me now, for I need your mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Turn to me, for my problems seem to be going from bad to worse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Only you can free me from all these troubles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Until you lift this burden, the burden of all my sins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: my troubles and trials will be more than I can handle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Can’t you feel my pain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vicious, violent '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This is the Hebrew word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: hamas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: enemies hate me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There are so many, Lord. Can’t you see?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Will you protect me from their power against me? I have taken shelter in you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let it never be said that when I trusted you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you didn’t come to my rescue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Your perfection and faithfulness are my bodyguards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you are my hope and I trust in you as my only protection.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Zealously, God, we ask you
- type: usfm
  marker: q1
  children:
  - type: text
    text: to come save Israel from all her troubles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you provide the ransom price for your people!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 25:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
