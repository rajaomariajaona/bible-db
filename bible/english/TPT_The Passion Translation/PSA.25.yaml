    - type: usfm
      marker: ft
      children:
      - type: text
        text: is an acrostic psalm; that is, in the Hebrew text every verse begins with a progressive letter of the alphabet. It is considered a poetic device of Hebrew literature. Go back through the psalm and notice how many verses begin with the next letter of our English alphabet. See if you can find them.
    marker-yv: yv-n
