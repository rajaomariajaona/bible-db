document_id: HOS.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment Coming for Israel and Judah
  - type: text
    content: “Hear this, you priests!
  - type: text
    content: Pay attention, you leaders of Israel!
  - type: text
    content: Listen, all of you among the royal household!
  - type: text
    content: You are responsible for administering justice,
  - type: note
    content: 'Or “For judgment applies to you.” Hebrew prophetic poetry often has a double meaning. If this is the case, one could translate this verse: “Since you are the ones who are supposed to bring justice, judgment will fall on you.” See Mic. 3:9–12 .'
  - type: text
    content: but you have led the people into idolatry
  - type: text
    content: by setting a trap at Mizpah
  - type: text
    content: and spreading a net over Mount Tabor.
  - type: note
    content: Mizpah and Mount Tabor were two places where the leaders entrapped their people in the cultic worship seen among the neighboring nations.
  '10':
  - type: text
    content: “I am angry with the leaders of Judah,
  - type: text
    content: 'for they came into '
  - type: text
    content: the Northern Kingdom
  - type: text
    content: ' and stole their land.'
  - type: note
    content: Or “for the princes of Judah are the ones who have removed the ancient boundary stones.”
  - type: text
    content: I will pour my wrath out on them like a flood.
  '11':
  - type: text
    content: Ephraim is oppressed, crushed by the verdict,
  - type: text
    content: for having deliberately chased a lie.
  - type: note
    content: Or “human reasoning,” “vanity,” or “dung”; that is, idolatry.
  '12':
  - type: text
    content: 'Because of this, I will be like a maggot '
  - type: note
    content: Or “moth,” “larvae,” or “pus,” the discharge from a festering wound. The Septuagint reads “I will be like a terror to Ephraim.”
  - type: text
    content: in the wound of Ephraim
  - type: text
    content: 'and like gangrene '
  - type: note
    content: Or “dry rot.”
  - type: text
    content: for the people of Judah.
  '13':
  - type: text
    content: Once Ephraim realized that he was sick
  - type: text
    content: and that Judah had an ulcer,
  - type: text
    content: 'Ephraim then turned to Assyria '
  - type: text
    content: for help
  - type: text
    content: and sent messengers to the great king,
  - type: note
    content: Or literally “a king who will contend,” likely an Aramaic idiom for “a great king.” Assyria eventually laid waste to Ephraim in 722 BC.
  - type: text
    content: but he has no power to cure you
  - type: text
    content: or to heal your wound.
  '14':
  - type: text
    content: For I will attack Ephraim like a lion
  - type: text
    content: and the land of Judah like a young lion.
  - type: text
    content: I will maul my prey and drag them away,
  - type: text
    content: and no one will be able to snatch them from my hands.
  '15':
  - type: text
    content: I will return to my place
  - type: text
    content: until they confess their guilt and seek my face.
  - type: text
    content: Then, in their distress,
  - type: text
    content: 'they will eagerly seek me '
  - type: text
    content: and my grace
  - type: text
    content: .”
  '2':
  - type: text
    content: You have dug a deep ditch of sexual immorality,
  - type: note
    content: Or “They are entrenched in their deceitfulness” or “They have made a deep pit of [at] [the city of] Acacia.” The Hebrew of this line is uncertain and possibly has some emendations.
  - type: text
    content: and so, I will punish you all.
  '3':
  - type: text
    content: “Israel, you cannot hide from me;
  - type: text
    content: 'for I know Ephraim '
  - type: note
    content: Ephraim is used poetically as a metonymy for the Northern Kingdom of Israel.
  - type: text
    content: through and through.
  - type: text
    content: Yet you have been unfaithful to me.
  - type: text
    content: 'Israel’s worship of me is '
  - type: text
    content: grossly
  - type: text
    content: ' defiled.'
  '4':
  - type: text
    content: 'They no longer even know me, '
  - type: text
    content: Yahweh
  - type: text
    content: .
  - type: text
    content: Their evil deeds block the way for them to return to me, their God,
  - type: text
    content: because they are possessed by a spirit of prostitution.
  '5':
  - type: text
    content: Israel’s own arrogance speaks for itself.
  - type: text
    content: 'Israel and Ephraim '
  - type: text
    content: have no one else to blame
  - type: text
    content: ','
  - type: text
    content: for their own guilt makes them stumble.
  - type: text
    content: Judah will be dragged down with them.
  '6':
  - type: text
    content: No matter how many animals they bring
  - type: text
    content: 'to offer as sacrifices to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: note
    content: Or “With their flocks and herds they go to seek Yahweh .”
  - type: text
    content: they will not find him,
  - type: text
    content: for he has withdrawn himself from them.
  '7':
  - type: text
    content: 'They have been proven unfaithful to '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: having fathered illegitimate children.
  - type: text
    content: Now, before the new moon festival,
  - type: text
    content: they and their fields will be devoured.”
  - type: note
    content: The meaning of the Hebrew of this sentence is uncertain and has a number of interpretations.
  - type: heading
    content: Sounding the Alarm in Benjamin
  '8':
  - type: text
    content: “Sound the shofar in Gibeah, blow the trumpet in Ramah,
  - type: text
    content: 'and raise the war cry at Bethel:'
  - type: note
    content: Or “at the house of evil [Beth Aven],” a derisive term for Bethel. Once the house of God, Bethel had become a center of idolatry.
  - type: text
    content: ‘On your guard, men of Benjamin!’
  - type: note
    content: Or “Tremble, O Benjamin” or “We are behind you, Benjamin.” The Hebrew is uncertain.
  '9':
  - type: text
    content: When the day of reckoning comes, Ephraim will be overthrown.
  - type: text
    content: 'For I have pronounced certain '
  - type: text
    content: doom
  - type: text
    content: ' on the tribes of Israel.”'
  - type: heading
    content: The Crimes of God’s People
