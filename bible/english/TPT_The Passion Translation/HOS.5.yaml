document_id: HOS.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment Coming for Israel and Judah
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Hear this, you priests!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay attention, you leaders of Israel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, all of you among the royal household!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are responsible for administering justice,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or “For judgment applies to you.” Hebrew prophetic poetry often has a double meaning. If this is the case, one could translate this verse: “Since you are the ones who are supposed to bring justice, judgment will fall on you.” See'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Mic. 3:9–12
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you have led the people into idolatry
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by setting a trap at Mizpah
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and spreading a net over Mount Tabor.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mizpah and Mount Tabor were two places where the leaders entrapped their people in the cultic worship seen among the neighboring nations.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “I am angry with the leaders of Judah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they came into '
    - type: usfm
      marker: it
      children:
      - type: text
        text: the Northern Kingdom
    - type: text
      text: ' and stole their land.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for the princes of Judah are the ones who have removed the ancient boundary stones.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pour my wrath out on them like a flood.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ephraim is oppressed, crushed by the verdict,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for having deliberately chased a lie.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “human reasoning,” “vanity,” or “dung”; that is, idolatry.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Because of this, I will be like a maggot '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “moth,” “larvae,” or “pus,” the discharge from a festering wound. The Septuagint reads “I will be like a terror to Ephraim.”
      marker-yv: yv-n
    - type: text
      text: in the wound of Ephraim
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and like gangrene '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “dry rot.”
      marker-yv: yv-n
    - type: text
      text: for the people of Judah.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Once Ephraim realized that he was sick
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and that Judah had an ulcer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraim then turned to Assyria '
    - type: usfm
      marker: it
      children:
      - type: text
        text: for help
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and sent messengers to the great king,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or literally “a king who will contend,” likely an Aramaic idiom for “a great king.” Assyria eventually laid waste to Ephraim in 722 BC.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he has no power to cure you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or to heal your wound.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: For I will attack Ephraim like a lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the land of Judah like a young lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will maul my prey and drag them away,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and no one will be able to snatch them from my hands.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will return to my place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: until they confess their guilt and seek my face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, in their distress,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they will eagerly seek me '
    - type: usfm
      marker: it
      children:
      - type: text
        text: and my grace
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You have dug a deep ditch of sexual immorality,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “They are entrenched in their deceitfulness” or “They have made a deep pit of [at] [the city of] Acacia.” The Hebrew of this line is uncertain and possibly has some emendations.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and so, I will punish you all.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “Israel, you cannot hide from me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for I know Ephraim '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Ephraim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is used poetically as a metonymy for the Northern Kingdom of Israel.
      marker-yv: yv-n
    - type: text
      text: through and through.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you have been unfaithful to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Israel’s worship of me is '
    - type: usfm
      marker: it
      children:
      - type: text
        text: grossly
    - type: text
      text: ' defiled.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'They no longer even know me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their evil deeds block the way for them to return to me, their God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they are possessed by a spirit of prostitution.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Israel’s own arrogance speaks for itself.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Israel and Ephraim '
    - type: usfm
      marker: it
      children:
      - type: text
        text: have no one else to blame
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for their own guilt makes them stumble.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Judah will be dragged down with them.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: No matter how many animals they bring
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to offer as sacrifices to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “With their flocks and herds they go to seek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will not find him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he has withdrawn himself from them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'They have been proven unfaithful to '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: having fathered illegitimate children.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now, before the new moon festival,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they and their fields will be devoured.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew of this sentence is uncertain and has a number of interpretations.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sounding the Alarm in Benjamin
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Sound the shofar in Gibeah, blow the trumpet in Ramah,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and raise the war cry at Bethel:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “at the house of evil [Beth Aven],” a derisive term for Bethel. Once the house of God, Bethel had become a center of idolatry.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘On your guard, men of Benjamin!’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Tremble, O Benjamin” or “We are behind you, Benjamin.” The Hebrew is uncertain.
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: When the day of reckoning comes, Ephraim will be overthrown.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I have pronounced certain '
    - type: usfm
      marker: it
      children:
      - type: text
        text: doom
    - type: text
      text: ' on the tribes of Israel.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Crimes of God’s People
    marker-yv: yv-h
