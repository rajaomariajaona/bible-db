document_id: REV.4,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: John’s Vision of the Throne Room
  - type: text
    content: 'Then suddenly, after I wrote down these messages, I saw a portal open into the heavenly realm, and the same trumpet-voice I heard speaking with me at the beginning '
  - type: note
    content: See Rev. 1:10.
  - type: text
    content: 'said, '
  - type: text
    content: “Ascend into this realm!
  - type: text
    content: ' '
  - type: note
    content: John did not simply watch these things happen through an open door, he was taken through the open door into the heavenly realm. In 3:20 Jesus stood knocking, ready to pass through the door; now John passes through an open door into heaven.
  - type: text
    content: I want to reveal to you what must happen
  - type: text
    content: ' '
  - type: note
    content: Or “come to be” as in “give birth.” The Greek word for “happen” is ginomai (similar to our English word genome) and is translated three times in Rom. 7:3–4 as “married.”
  - type: text
    content: after this.”
  '10':
  - type: text
    content: 'the twenty-four elders fell facedown before the one seated on the throne and they worshiped the one who lives forever and ever. And they surrendered their crowns before the throne, singing:'
  '11':
  - type: text
    content: “You are worthy, our Lord and God,
  - type: text
    content: to receive glory, honor, and power,
  - type: text
    content: for you created all things,
  - type: text
    content: 'and for your pleasure '
  - type: note
    content: Or “by your plan.”
  - type: text
    content: they were created and exist.”
  - type: note
    content: Or “they existed and were created,” an obvious figure of speech called hysteron proteron.
  '2':
  - type: text
    content: 'Instantly I was taken into the spirit realm, '
  - type: note
    content: 'Or “I came to be [Gr. ginomai] within Spirit.” Four times John uses this phrase (1:10; 4:2; 17:3; 21:10). Although some commentators believe John was in his human spirit, John went into an ecstatic state or prophetic trance and was shown these things in the spirit realm. The implication is that he was taken into the heavenly realm as these pictures were unveiled before him. After seeing the first vision of Jesus walking among the lampstands and the messages to the seven churches, John was taken into heaven for more revelation. See R. H. Mounce, Revelation, New International Commentary on the New Testament, 75; G. B. Caird, A Commentary on the Revelation of St. John the Divine, Black’s New Testament Commentaries, edited by Henry Chadwick (London: Adam & Charles Black, 1966); George Eldon Ladd, A Commentary of the Revelation of John (Grand Rapids: William B. Eerdmans, 1972); David E. Aune, Revelation, Word Biblical Commentary, vols. 52a and 52b, edited by Ralph P. Martin (Nashville: Thomas Nelson, 1997 and 1998).'
  - type: text
    content: 'and behold—I saw a heavenly throne '
  - type: note
    content: John uses the word throne forty times in the book of Revelation, fourteen times in this chapter alone. God’s throne is the governmental center of the universe.
  - type: text
    content: 'being set in place and someone seated upon it. '
  '3':
  - type: text
    content: 'His appearance was '
  - type: text
    content: sparkling
  - type: text
    content: ' like crystal '
  - type: note
    content: Or “jasper,” an aggregate of microgranular quartz. It is likely that the word used here is not identical to our modern jasper, but instead refers to a clear stone like crystal (cryptocrystalline jasper). Revelation 21:11 describes it as being clear like crystal. The most common Hebrew word for jasper is yashĕpheh, as found in Ex. 28:20 and 39:13, which describes the last or twelfth jewel on the breastplate of Aaron, the high priest. The word yashĕpheh literally means “polished.” Jasper is recognized as a symbol of the glory of God in all his splendor, brightness, and beauty.
  - type: text
    content: 'and '
  - type: text
    content: glowing
  - type: text
    content: ' like a carnelian gemstone. '
  - type: note
    content: “Carnelian” (also known as “sard”) is a mineral red in color and commonly described as a glassy, translucent, semiprecious gemstone. The etymological origin of carnelian comes from the Latin word cornum, used for the cornel cherry. Assuming it to be cherry-red (blood red) in color, translucent light was glowing from the one seated on the throne. The sardius (carnelian) stone was placed first in order upon the high priest’s breastplate.
  - type: text
    content: 'Surrounding the throne was a '
  - type: text
    content: circle of green light
  - type: text
    content: ', '
  - type: note
    content: Or “halo.”
  - type: text
    content: 'like an emerald rainbow. '
  - type: note
    content: 'See Ezek. 1:28. This was not a typical rainbow, for a rainbow has seven colors. This was more like a halo of light, shining all around the throne. It was a full circle, not a half-circle. It could have been horizontally or vertically around the throne. The Greek also allows for the translation “a rainbow made of emerald.” The emerald rainbow points to God’s mercy and covenant love, for he gave the sign of a rainbow to Noah, signifying that he would never again destroy the world through a flood. The rainbow around the throne would be a clear symbol that everything God does (coming from his throne of majesty) is surrounded with grace and mercy. The Hebrew word for “emerald” is bareqeth, which can also be translated “flashing of light” (Ex. 28:17). God’s glory is represented by these three stones: jasper, carnelian, and emerald.'
  '4':
  - type: text
    content: 'Encircling the great throne were twenty-four thrones with elders '
  - type: note
    content: Scholars are divided over who these twenty-four elders are, either (1) the union of Jew (twelve tribes of Israel) and the church (twelve apostles of Jesus), (2) a rank of heavenly beings serving as God’s cabinet officers, (3) a symbol of the twenty-four prophetic books of the Old Testament, or (4) an actual council of elders (believers) who are subordinate to God but ruling with authority and wisdom. They are enthroned and have crowns, which would speak of regal authority. Made up from the overcomers from among the community of the redeemed, the twenty-four elders are robed in Christ’s righteousness (white garments), enthroned with him (Eph. 2:6; Rev. 3:21), and crowned with glory.
  - type: text
    content: 'in '
  - type: text
    content: glistening
  - type: text
    content: ' white garments seated upon them, each wearing a golden crown of victory. '
  '5':
  - type: text
    content: 'And '
  - type: text
    content: pulsing
  - type: text
    content: ' from the throne were '
  - type: text
    content: blinding
  - type: text
    content: ' flashes of lightning, '
  - type: note
    content: Lightning is often an emblem of the revelation-word of God breaking forth on the earth (Ps. 97:4), which dismantles the works of Satan (Luke 10:18). As God’s Word goes forth, there will always be voices to carry the fresh revelation of heaven.
  - type: text
    content: 'crashes of thunder, and voices. '
  - type: note
    content: Or “sounds.” See also Ex. 19:16; Ps. 77:18.
  - type: text
    content: 'And burning before the throne were seven blazing torches, which represent the seven Spirits of God. '
  - type: note
    content: Or “the seven-fold Spirit of God.”
  '6':
  - type: text
    content: 'And in front of the throne there was '
  - type: text
    content: pavement
  - type: text
    content: ' '
  - type: note
    content: See Ex. 24:10; Ezek. 1:22, 26.
  - type: text
    content: like a crystal sea of glass.
  - type: note
    content: The blazing torches reflected off the glassy crystal sea would appear to be heaven’s analogue to the Red Sea. See also 15:2–4. One of the miracles of the Red Sea crossing was that the waters congealed and became like glass (Ex. 15:8). John is seeing a hint of the chaotic “sea of humanity” (Dan. 7:2; Ezek. 32:2) being calmed before God’s sovereign throne.
  - type: heading
    content: Worship around the Throne
  - type: text
    content: 'Around the throne and on each side '
  - type: note
    content: A possible inference in the Greek is that the four living creatures are supporting the throne; that is, the throne (chariot of God) rested upon them. See Ezek. 1:15–26. The number four points to the four winds and the four seasons (the whole created order).
  - type: text
    content: 'stood four living creatures, '
  - type: note
    content: Or “creatures of life.”
  - type: text
    content: 'full of eyes in front and behind. '
  - type: note
    content: They had eyes to see into different realms and into times past and future (in front and behind).
  '7':
  - type: text
    content: 'The first living creature resembled a lion, the second an ox, '
  - type: note
    content: Or “calf, a sprout, a young one.”
  - type: text
    content: 'the third had a human face, and the fourth was like an eagle in flight. '
  '8':
  - type: text
    content: Each of the four living creatures had six wings, full of eyes all around and under their wings. They worshiped without ceasing, day and night, singing,
  - type: text
    content: “Holy, holy, holy is the Lord God, the Almighty!
  - type: note
    content: See Isa. 6:1–3.
  - type: text
    content: 'The Was, '
  - type: note
    content: See John 1:1; 2 Cor. 5:19; 1 Tim. 3:16.
  - type: text
    content: 'the Is, '
  - type: note
    content: He who was (Christ in his early life) is now the one who is within us. See 1 Cor. 14:25.
  - type: text
    content: and the Coming!”
  - type: note
    content: Or “the coming one.” He is coming to be all that he is within us. See 2 Thess. 1:10.
  '9':
  - type: text
    content: 'And whenever the living creatures gave glory, honor, and thanks to the One who is enthroned and who lives forever and ever, '
