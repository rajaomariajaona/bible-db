        text: Scholars are divided over who these twenty-four elders are, either (1) the union of Jew (twelve tribes of Israel) and the church (twelve apostles of Jesus), (2) a rank of heavenly beings serving as God’s cabinet officers, (3) a symbol of the twenty-four prophetic books of the Old Testament, or (4) an actual council of elders (believers) who are subordinate to God but ruling with authority and wisdom. They are enthroned and have crowns, which would speak of regal authority. Made up from the overcomers from among the community of the redeemed, the twenty-four elders are robed in Christ’s righteousness (white garments), enthroned with him (
