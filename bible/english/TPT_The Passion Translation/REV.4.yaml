        text: . This was not a typical rainbow, for a rainbow has seven colors. This was more like a halo of light, shining all around the throne. It was a full circle, not a half-circle. It could have been horizontally or vertically around the throne. The Greek also allows for the translation “a rainbow made of emerald.” The emerald rainbow points to God’s mercy and covenant love, for he gave the sign of a rainbow to Noah, signifying that he would never again destroy the world through a flood. The rainbow around the throne would be a clear symbol that everything God does (coming from his throne of majesty) is surrounded with grace and mercy. The Hebrew word for “emerald” is
