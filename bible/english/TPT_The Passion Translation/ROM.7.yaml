document_id: ROM.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joined to God’s Anointed One
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I write to you, dear brothers and sisters, who are familiar with the law. Don’t you know that when a person dies, it ends his obligation to the law? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'For example, a married couple is bound by the law to remain together until separated by death. But when one spouse dies, the other is released from the law of the marriage. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So then if a wife is joined to another man while still married, she commits adultery. But if her husband dies, she is obviously free from the marriage contract and may marry another man without being charged with adultery.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “if joined to another man, she is not an adulteress.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So, my dear brothers and sisters, the same principle applies to your relationship with God. For you died to '
  - type: usfm
    marker: it
    children:
    - type: text
      text: your first husband
  - type: text
    text: ', the law, by being co-crucified with the body of the Messiah. So you are now free to “marry” another—the one who was raised from the dead so that you may now bear spiritual fruit '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “offspring.”
    marker-yv: yv-n
  - type: text
    text: for God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When we were merely living natural lives, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, before we came to know Jesus Christ.
    marker-yv: yv-n
  - type: text
    text: 'the law, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: through defining sin
  - type: text
    text: ', actually awakened sinful desires within us, which resulted in bearing the fruit of death. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'But now that we have been fully released from the power of the law, we are dead to what once controlled us. And our lives are no longer motivated by the obsolete way of following the written code, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “the oldness of the letter.”
    marker-yv: yv-n
  - type: text
    text: so that now we may serve God by living in the freshness of a new life in the power of the Holy Spirit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “by a new, Holy Spirit-empowered life.”
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Purpose of the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'So, what shall we say about all this? Am I suggesting that the law is sinful? Of course not! In fact, it was the law that gave us the clear definition of sin. For example, when the law said, “Do not covet,” '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Ex. 20:17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Deut. 5:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'it became the catalyst to see how wrong it was for me to crave what belongs to someone else. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'It was through God’s commandment that sin was awakened in me and built its base of operation '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “a starting point.”
    marker-yv: yv-n
  - type: text
    text: within me to stir up every kind of wrong desire. For in the absence of the law, sin hides dormant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “is lifeless.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 9-10
  - type: text
    text: 'I once lived without a clear understanding of the law, but when I heard God’s commandments, sin sprang to life and brought with it a death sentence. The commandment that was intended to bring life brought me death instead. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sin, by means of the commandment, built a base of operation within me, to overpower me '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “deceive me” or “lead me astray.”
    marker-yv: yv-n
  - type: text
    text: 'and put me to death. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So then, we have to conclude that the problem is not with the law itself, for the law is holy and its commandments are correct and for our good.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Life under the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So, did something meant to be good become death to me? Certainly not! It was not the law but sin unmasked that produced my spiritual death. The sacred commandment merely uncovered the evil of sin so it could be seen for what it is. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For we know that the law is divinely inspired and comes from the spiritual realm, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “is spiritual.”
    marker-yv: yv-n
  - type: text
    text: but I am a human being made of flesh and trafficked as a slave under sin’s authority.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “sold and ruined under sin.” The Greek word
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: piprasko
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: refers to a slave who is “sold for exportation, betrayed and ruined.”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I’m a mystery to myself, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Paul’s use of “I” is most likely his identification with the people of Israel under the law prior to receiving Christ. It is not merely an autobiographical statement that Paul experienced all of these things, but a rhetorical device of solidarity with the experience of those who live under the law. Romans ch.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '7'
      metadata:
        usfm: ROM.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is not the present experience of any one person, but the testimony of a delivered person describing the condition of an undelivered one.
    marker-yv: yv-n
  - type: text
    text: 'for I want to do what is right, but end up doing what my moral instincts condemn. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And if my behavior is not in line with my desire, my conscience still confirms the excellence of the law. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And now I realize that it is no longer my true self doing it, but the unwelcome intruder of sin in my humanity. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For I know that nothing good lives within the flesh of my fallen humanity. The longings to do what is right are within me, but willpower is not enough to accomplish it. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Greek manuscripts have “but I don’t know how to do it.”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My lofty desires to do what is good are dashed when I do the things I want to avoid. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So if my behavior contradicts my desires to do good, I must conclude that it’s not my true identity doing it, but the unwelcome intruder of sin '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hindering me from being who I really am
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Through my experience of this principle, I discover that even when I want to do good, evil is ready to sabotage me. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Truly, deep within my true identity, I love to do what pleases God. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But I discern another power operating in my humanity, waging a war against the moral principles of my conscience '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “warring against the law of my mind.”
    marker-yv: yv-n
  - type: text
    text: 'and bringing me into captivity as a prisoner to the “law” of sin—this unwelcome intruder in my humanity. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'What an agonizing situation I am in! So who has the power to rescue this miserable man from the unwelcome intruder of sin and death? '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Who will free me from this body of death?”
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I give all my thanks to God, for his mighty power has finally provided a way out through our Lord Jesus, the Anointed One! So if left to myself, the flesh is aligned with the law of sin, but now my renewed mind is fixed on and submitted to God’s righteous principles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 7:25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “God’s law.”
    marker-yv: yv-n
