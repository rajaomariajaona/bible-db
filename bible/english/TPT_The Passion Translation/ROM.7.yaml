document_id: ROM.7,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Joined to God’s Anointed One
  - type: text
    content: 'I write to you, dear brothers and sisters, who are familiar with the law. Don’t you know that when a person dies, it ends his obligation to the law? '
  '11':
  - type: text
    content: 'Sin, by means of the commandment, built a base of operation within me, to overpower me '
  - type: note
    content: Or “deceive me” or “lead me astray.”
  - type: text
    content: 'and put me to death. '
  '12':
  - type: text
    content: So then, we have to conclude that the problem is not with the law itself, for the law is holy and its commandments are correct and for our good.
  - type: heading
    content: Life under the Law
  '13':
  - type: text
    content: 'So, did something meant to be good become death to me? Certainly not! It was not the law but sin unmasked that produced my spiritual death. The sacred commandment merely uncovered the evil of sin so it could be seen for what it is. '
  '14':
  - type: text
    content: 'For we know that the law is divinely inspired and comes from the spiritual realm, '
  - type: note
    content: Or “is spiritual.”
  - type: text
    content: but I am a human being made of flesh and trafficked as a slave under sin’s authority.
  - type: note
    content: Or “sold and ruined under sin.” The Greek word piprasko refers to a slave who is “sold for exportation, betrayed and ruined.”
  '15':
  - type: text
    content: 'I’m a mystery to myself, '
  - type: note
    content: Paul’s use of “I” is most likely his identification with the people of Israel under the law prior to receiving Christ. It is not merely an autobiographical statement that Paul experienced all of these things, but a rhetorical device of solidarity with the experience of those who live under the law. Romans ch. 7 is not the present experience of any one person, but the testimony of a delivered person describing the condition of an undelivered one.
  - type: text
    content: 'for I want to do what is right, but end up doing what my moral instincts condemn. '
  '16':
  - type: text
    content: 'And if my behavior is not in line with my desire, my conscience still confirms the excellence of the law. '
  '17':
  - type: text
    content: 'And now I realize that it is no longer my true self doing it, but the unwelcome intruder of sin in my humanity. '
  '18':
  - type: text
    content: 'For I know that nothing good lives within the flesh of my fallen humanity. The longings to do what is right are within me, but willpower is not enough to accomplish it. '
  - type: note
    content: Some Greek manuscripts have “but I don’t know how to do it.”
  '19':
  - type: text
    content: 'My lofty desires to do what is good are dashed when I do the things I want to avoid. '
  '2':
  - type: text
    content: 'For example, a married couple is bound by the law to remain together until separated by death. But when one spouse dies, the other is released from the law of the marriage. '
  '20':
  - type: text
    content: 'So if my behavior contradicts my desires to do good, I must conclude that it’s not my true identity doing it, but the unwelcome intruder of sin '
  - type: text
    content: hindering me from being who I really am
  - type: text
    content: .
  '21':
  - type: text
    content: 'Through my experience of this principle, I discover that even when I want to do good, evil is ready to sabotage me. '
  '22':
  - type: text
    content: 'Truly, deep within my true identity, I love to do what pleases God. '
  '23':
  - type: text
    content: 'But I discern another power operating in my humanity, waging a war against the moral principles of my conscience '
  - type: note
    content: Or “warring against the law of my mind.”
  - type: text
    content: 'and bringing me into captivity as a prisoner to the “law” of sin—this unwelcome intruder in my humanity. '
  '24':
  - type: text
    content: 'What an agonizing situation I am in! So who has the power to rescue this miserable man from the unwelcome intruder of sin and death? '
  - type: note
    content: Or “Who will free me from this body of death?”
  '25':
  - type: text
    content: I give all my thanks to God, for his mighty power has finally provided a way out through our Lord Jesus, the Anointed One! So if left to myself, the flesh is aligned with the law of sin, but now my renewed mind is fixed on and submitted to God’s righteous principles.
  - type: note
    content: Or “God’s law.”
  '3':
  - type: text
    content: So then if a wife is joined to another man while still married, she commits adultery. But if her husband dies, she is obviously free from the marriage contract and may marry another man without being charged with adultery.
  - type: note
    content: Or “if joined to another man, she is not an adulteress.”
  '4':
  - type: text
    content: 'So, my dear brothers and sisters, the same principle applies to your relationship with God. For you died to '
  - type: text
    content: your first husband
  - type: text
    content: ', the law, by being co-crucified with the body of the Messiah. So you are now free to “marry” another—the one who was raised from the dead so that you may now bear spiritual fruit '
  - type: note
    content: Or “offspring.”
  - type: text
    content: for God.
  '5':
  - type: text
    content: 'When we were merely living natural lives, '
  - type: note
    content: That is, before we came to know Jesus Christ.
  - type: text
    content: 'the law, '
  - type: text
    content: through defining sin
  - type: text
    content: ', actually awakened sinful desires within us, which resulted in bearing the fruit of death. '
  '6':
  - type: text
    content: 'But now that we have been fully released from the power of the law, we are dead to what once controlled us. And our lives are no longer motivated by the obsolete way of following the written code, '
  - type: note
    content: Or “the oldness of the letter.”
  - type: text
    content: so that now we may serve God by living in the freshness of a new life in the power of the Holy Spirit.
  - type: note
    content: Or “by a new, Holy Spirit-empowered life.”
  - type: heading
    content: The Purpose of the Law
  '7':
  - type: text
    content: 'So, what shall we say about all this? Am I suggesting that the law is sinful? Of course not! In fact, it was the law that gave us the clear definition of sin. For example, when the law said, “Do not covet,” '
  - type: note
    content: See Ex. 20:17; Deut. 5:21.
  - type: text
    content: 'it became the catalyst to see how wrong it was for me to crave what belongs to someone else. '
  '8':
  - type: text
    content: 'It was through God’s commandment that sin was awakened in me and built its base of operation '
  - type: note
    content: Or “a starting point.”
  - type: text
    content: within me to stir up every kind of wrong desire. For in the absence of the law, sin hides dormant.
  - type: note
    content: Or “is lifeless.”
  '9':
  - type: text
    content: 'I once lived without a clear understanding of the law, but when I heard God’s commandments, sin sprang to life and brought with it a death sentence. The commandment that was intended to bring life brought me death instead. '
