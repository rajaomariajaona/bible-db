document_id: ISA.41,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: God Promises to Help Israel
  - type: text
    content: “You lands of the sea, stand silent before me!
  - type: note
    content: Or “hold a feast to me” (LXX).
  - type: text
    content: Let the people renew their strength!
  - type: text
    content: Let them approach me and state their case.
  - type: text
    content: Let’s come together to decide who is right.
  '10':
  - type: text
    content: Do not yield to fear, for I am always near.
  - type: text
    content: 'Never turn your gaze from me, '
  - type: note
    content: Or “Don’t be frightened.” The Hebrew root word shāʿah means “to gaze, to look around.”
  - type: text
    content: 'for I am your '
  - type: text
    content: faithful
  - type: text
    content: ' God.'
  - type: text
    content: I will infuse you with my strength
  - type: text
    content: and help you in every situation.
  - type: note
    content: See Deut. 31:6–8.
  - type: text
    content: I will hold you firmly with my victorious right hand.’
  '11':
  - type: text
    content: “All who rage against you will be ashamed and disgraced.
  - type: text
    content: All who contend with you will perish and disappear.
  '12':
  - type: text
    content: You will look for your enemies in vain;
  - type: text
    content: those who war against you will vanish without a trace!
  '13':
  - type: text
    content: 'I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', your mighty God!'
  - type: text
    content: 'I grip your right hand '
  - type: text
    content: and won’t let you go
  - type: text
    content: '!'
  - type: text
    content: 'I whisper to you:'
  - type: text
    content: ‘Don’t be afraid; I am here to help you!’
  '14':
  - type: text
    content: '“Jacob, '
  - type: text
    content: although you feel like
  - type: text
    content: ' a grub worm, '
  - type: note
    content: David used this term to prophetically point to Jesus as he was being crucified. See Ps. 22:6. The Hebrew word is tola, which is a species of worm found in the Middle East (Coccus ilicus) that reproduces itself when the female fastens herself to a tree and lays eggs between her body and the tree. When the eggs hatch, the baby worms feed on her living body. When the eggs emerge, the blood remains on the tree as a crimson stain. When Jesus died on the cross (tree), his blood left a crimson stain, and he gave birth to the church. He nourishes us and sustains us with his body and blood.
  - type: text
    content: have no fear!
  - type: text
    content: O men of Israel, I am here to help you!
  - type: text
    content: I am your Kinsman-Redeemer,
  - type: note
    content: A kinsman-redeemer (go’el) is a male relative who was culturally responsible to act on behalf of a relative who was in trouble or danger, needed to be redeemed from slavery, or was in need of rescue. He became like a “savior” or “family protector” for his next of kin. Jesus, our next of kin, is our Kinsman-Redeemer. The Hebrew verb ga’al (“to act as redeemer”) is found more than one hundred times in the Hebrew Bible. See Ruth 2:20.
  - type: text
    content: the Holy One of Israel!
  - type: note
    content: Although God is holy, he stoops to tenderly help those who feel unholy.
  '15':
  - type: text
    content: I am making you into a powerful threshing instrument,
  - type: note
    content: Or “a threshing sledge,” a board with iron studs like teeth that is driven over wheat to grind the chaff off the grain, which is then winnowed.
  - type: text
    content: with teeth new and sharp!
  - type: note
    content: Or “the owner of two mouths.” The Word of God is like a “two-mouthed sword” (Heb. 4:12), for it is spoken from God’s mouth and is released in power as it is spoken from our mouths. We will become God’s two-mouthed threshing instrument!
  - type: text
    content: 'You will reduce hills to chaff and crush mountains '
  - type: note
    content: Mountains are a frequent biblical metaphor for kingdoms and nations.
  - type: text
    content: into dust!
  '16':
  - type: text
    content: You will winnow them, and the stormy wind will blow them away!
  - type: text
    content: 'Then you will spin and dance with rejoicing '
  - type: note
    content: The Hebrew word for “rejoice” (giyl) implies “twirling,” “spinning,” or “shouting with delight and joy.”
  - type: text
    content: 'in '
  - type: text
    content: Yahweh
  - type: text
    content: ','
  - type: text
    content: boasting with admiration in the Holy One of Israel!
  - type: note
    content: Or “You will rejoice among the holy things of Israel.”
  '17':
  - type: text
    content: '“I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', will respond to the cry of the poor and needy'
  - type: text
    content: when they are thirsty and their tongues are parched with thirst!
  - type: text
    content: When they seek a drink of water but there is none,
  - type: text
    content: I, the God of Israel, will not abandon them.
  '18':
  - type: text
    content: 'I will open up refreshing streams '
  - type: note
    content: See John 7:37–39.
  - type: text
    content: on the barren hills
  - type: text
    content: and springing fountains in the valleys.
  - type: note
    content: See Ps. 84:6.
  - type: text
    content: I will make the desert a pleasant pool
  - type: note
    content: See Isa. 35:1–10.
  - type: text
    content: and the dry land springs of water.
  - type: note
    content: See Ps. 78:15–16.
  '19':
  - type: text
    content: 'I will plant in the '
  - type: text
    content: treeless
  - type: text
    content: ' desert cedars and acacias,'
  - type: note
    content: Acacia wood was used extensively in the tabernacle and was used to form the ark of the covenant.
  - type: text
    content: 'myrtle '
  - type: note
    content: “Myrtle” is the Hebrew word hadassah, Esther’s Jewish name.
  - type: text
    content: and olive trees.
  - type: note
    content: Or “trees of oil” (the Holy Spirit).
  - type: text
    content: I will set in the wilderness evergreens,
  - type: note
    content: Or “fir trees.”
  - type: text
    content: together with many elms and cypresses.
  - type: note
    content: These seven trees speak of the fullness of new creation life. Compare them to the seven branches of the lampstand and the seven Spirits of God.
  '2':
  - type: text
    content: Who raised up the conqueror from the east?
  - type: note
    content: See Isa. 46:11.
  - type: text
    content: Who commissioned him for his righteous purpose?
  - type: note
    content: Or “Righteousness summoned him to his foot.” Some see King Cyrus as the conqueror mentioned here; others, Abraham. This can also be viewed as a prophecy of the Lord Jesus. He is the Mighty One who conquers nations with his love.
  - type: text
    content: The Lord
  - type: text
    content: ' hands nations over to him'
  - type: note
    content: See Gen. 12:1–3; Ps. 2:8; Rev. 2:26–29.
  - type: text
    content: to trample kings under his feet,
  - type: note
    content: See Ps. 149:6–9.
  - type: text
    content: to make them like dust with his sword
  - type: note
    content: See Eph. 6:17–18; Heb. 4:12.
  - type: text
    content: and like windblown chaff with his bow.
  - type: note
    content: See Rev. 6:1–2.
  '20':
  - type: text
    content: Everyone will see
  - type: text
    content: 'and know that I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', with my mighty hands have done this.'
  - type: text
    content: They will consider and comprehend
  - type: text
    content: that the Holy One of Israel has created it.”
  - type: note
    content: That is, the Lord created the unity of this forest. God is the one who makes us one.
  - type: heading
    content: Pagan Gods Are Nothing
  '21':
  - type: text
    content: Yahweh
  - type: text
    content: ' says, “Present your case.”'
  - type: text
    content: “Let’s hear your arguments,” says the King of Jacob’s tribes.
  '22':
  - type: text
    content: “
  - type: text
    content: Come, you idols, and
  - type: text
    content: ' let’s hear your prophecy for the future.'
  - type: text
    content: 'Tell us, tell us about your former '
  - type: text
    content: prophecies
  - type: text
    content: so we can test them and see if they were fulfilled,
  - type: text
    content: or decree some future event for us.
  '23':
  - type: text
    content: Prophesy what the future holds
  - type: text
    content: to prove to us that you are gods.
  - type: text
    content: Do something—anything!
  - type: note
    content: Or “Do good, do harm.”
  - type: text
    content: Frighten us or put us in awe!
  '24':
  - type: text
    content: But you are nothing at all! What have you ever accomplished?
  - type: text
    content: Whoever chooses to worship you is disgusting!
  '25':
  - type: text
    content: “I stirred up one from the north,
  - type: text
    content: who comes from the rising of the sun.
  - type: text
    content: He will call on my name.
  - type: note
    content: Or “He is summoned in my name.” Some believe that Cyrus fulfilled this prophecy, for he came from the east (Persia) and descended on Israel from the north. Others believe this is the Messiah, who came from the north (see Ps. 48:2) and is the Dayspring (the rising of the sun).
  - type: text
    content: He will trample rulers into the mud as a potter treads clay.
  '26':
  - type: text
    content: Which of you foretold this from the start?
  - type: text
    content: Who prophesied it from long ago that we can say, ‘He is right’?
  - type: text
    content: None of you prophesied it!
  - type: text
    content: None of you announced it ahead of time!
  - type: text
    content: No one heard you say a thing about it!
  '27':
  - type: text
    content: I was the first to decree to Zion, ‘Look, this is what’s about to happen!’
  - type: note
    content: Fulfilled prophecy is one of many evidences that God is real and powerful and that he knows all things.
  - type: text
    content: I am bringing a messenger to Jerusalem with good news.
  '28':
  - type: text
    content: But when I look, I find no one who is capable to counsel me!
  - type: text
    content: There is no one who can respond to me with the right answer!
  - type: text
    content: Who could I even ask?
  '29':
  - type: text
    content: 'Look, all these '
  - type: text
    content: gods
  - type: text
    content: ' are nothingness!'
  - type: text
    content: What have they ever accomplished?
  - type: text
    content: Their metal images are nothing but empty wind and confusion!
  '3':
  - type: text
    content: Swiftly he pursues them and advances unscathed
  - type: text
    content: as he passes over unfamiliar land.
  - type: note
    content: Or “No shackle is placed on his feet” (Old Aramaic).
  '4':
  - type: text
    content: Who achieved all this and made it happen?
  - type: text
    content: Who guides the destiny of each generation
  - type: text
    content: 'from the first '
  - type: text
    content: until now
  - type: text
    content: '?'
  - type: note
    content: Or “calling nations [to be formed] from the beginning.”
  - type: text
    content: 'I am the one! I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', the first,'
  - type: text
    content: 'the '
  - type: text
    content: unchanging
  - type: text
    content: ' one who will be there in the end!”'
  '5':
  - type: text
    content: The islands see it and panic;
  - type: text
    content: the ends of the earth tremble;
  - type: text
    content: they approach and draw near.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: idol-makers
  - type: text
    content: ' all bolster one another up,'
  - type: text
    content: saying, “Take courage!”
  '7':
  - type: text
    content: The woodworker encourages the metalsmith;
  - type: text
    content: the one who flattens with the hammer
  - type: text
    content: spurs on the one who strikes the anvil,
  - type: text
    content: saying of the welding, “Looks good!”
  - type: text
    content: They nail down the idol so it won’t topple.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Yahweh sings three poems of comfort in this chapter: to his chosen servant, Israel (vv. 8–13), to his redeemed warrior-bride (vv. 14–16), and to the poor and needy (vv. 17–20).'
  - type: text
    content: “But you—my servant, Israel,
  - type: text
    content: Jacob, whom I’ve chosen,
  - type: text
    content: 'seed of my beloved friend Abraham '
  - type: note
    content: See James 2:23.
  - type: text
    content: —
  '9':
  - type: text
    content: I drew you to myself from the ends of the earth
  - type: text
    content: and called you from its farthest corner.
  - type: text
    content: 'I say to you:'
  - type: text
    content: ‘You are my servant; I have chosen you.
  - type: text
    content: I have not rejected you!
