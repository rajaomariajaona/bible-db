  - type: text
    text: A Prayer for Mercy and Restoration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Unlike chs.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: 1–4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ch.'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5'
      metadata:
        usfm: LAM.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is not an alphabetical acrostic.
    marker-yv: yv-n
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', remember all that we’ve endured;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: look and see our disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Our inheritance '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, their ancestral land and the temple. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ps. 79:1
      metadata:
        usfm: PSA.79.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: has passed to strangers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our homes to foreigners.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: We have no fathers; we are orphans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our mothers are widows.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We have to pay for drinking water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our firewood comes at a steep price.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Our pursuers are breathing down our necks;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we are exhausted and allowed no rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We made a pact with Egypt and Assyria
- type: usfm
  marker: q2
  children:
  - type: text
    text: just to have enough food to eat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Our ancestors sinned, and they are no more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and now we suffer their punishment.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: One must constantly be vigilant to keep from moral and ethical entropy. God’s covenant was what held the nation together. Ignore that and everything begins to unravel. Every society needs a well-maintained organizing principle in order to thrive. Dysfunction (as well as blessing) can be passed down and amplified through the generations.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Slaves rule over us;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Prov. 30:21–22
      metadata:
        usfm: PRO.30.21+PRO.30.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one to rescue us from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: We risk our lives to earn our bread
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of armed gangs in the wilderness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Our skin is scorched
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the heat of famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Our enemies violated Zion’s women
- type: usfm
  marker: q2
  children:
  - type: text
    text: and young girls in the towns of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Our leaders have been taken and hanged;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our elders have received no respect.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Young men are forced into menial labor,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Young men grind at the mill.” Grinding grain was often the work of animals, prisoners, or servants and slaves.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: boys stagger under loads of wood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The elders no longer give their advice;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “have deserted the city gate.” It was at the city gates where the elders would render their decisions and give counsel to the people of the city. See
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ruth 4:1
      metadata:
        usfm: RUT.4.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ;
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: text
      text: Est. 2:21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: the young no longer make music.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Joy has vanished from our hearts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: our dancing has turned to mourning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Our joyful celebrations are over.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “The crown [festive garland] has fallen from our head.” This is possibly a metaphor for saying something like, “The joyous festivities are gone.” However, it may express realization of the end of the Davidic kingship and the collapse of the monarchy.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: We have sinned, and we are doomed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For this is why our hearts are sick
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our eyes are veiled with tears,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: because Mount Zion lies desolate
- type: usfm
  marker: q2
  children:
  - type: text
    text: with jackals roaming over it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Yet you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: ', reign forever!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your throne endures from age to age.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Have you forgotten us forever?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why have you abandoned us for so long?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Draw us back to yourself, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Yahweh
  - type: text
    text: '; let us come back '
  - type: usfm
    marker: it
    children:
    - type: text
      text: to you
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Restore us as we were before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Have you utterly rejected us?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is there no limit to your anger?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 5:22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Unless you have utterly rejected us in an anger that has no limit.”
    marker-yv: yv-n
