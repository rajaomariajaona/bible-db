document_id: LAM.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prayer for Mercy and Restoration
  - type: text
    content: ' '
  - type: note
    content: Unlike chs. 1–4, ch. 5 is not an alphabetical acrostic.
  - type: text
    content: Yahweh
  - type: text
    content: ', remember all that we’ve endured;'
  - type: text
    content: look and see our disgrace.
  '10':
  - type: text
    content: Our skin is scorched
  - type: text
    content: from the heat of famine.
  '11':
  - type: text
    content: Our enemies violated Zion’s women
  - type: text
    content: and young girls in the towns of Judah.
  '12':
  - type: text
    content: Our leaders have been taken and hanged;
  - type: text
    content: our elders have received no respect.
  '13':
  - type: text
    content: Young men are forced into menial labor,
  - type: note
    content: Or “Young men grind at the mill.” Grinding grain was often the work of animals, prisoners, or servants and slaves.
  - type: text
    content: boys stagger under loads of wood.
  '14':
  - type: text
    content: The elders no longer give their advice;
  - type: note
    content: Or “have deserted the city gate.” It was at the city gates where the elders would render their decisions and give counsel to the people of the city. See Ruth 4:1; Est. 2:21.
  - type: text
    content: the young no longer make music.
  '15':
  - type: text
    content: Joy has vanished from our hearts;
  - type: text
    content: our dancing has turned to mourning.
  '16':
  - type: text
    content: Our joyful celebrations are over.
  - type: note
    content: Or “The crown [festive garland] has fallen from our head.” This is possibly a metaphor for saying something like, “The joyous festivities are gone.” However, it may express realization of the end of the Davidic kingship and the collapse of the monarchy.
  - type: text
    content: We have sinned, and we are doomed!
  '17':
  - type: text
    content: For this is why our hearts are sick
  - type: text
    content: and our eyes are veiled with tears,
  '18':
  - type: text
    content: because Mount Zion lies desolate
  - type: text
    content: with jackals roaming over it.
  '19':
  - type: text
    content: 'Yet you, '
  - type: text
    content: Yahweh
  - type: text
    content: ', reign forever!'
  - type: text
    content: Your throne endures from age to age.
  '2':
  - type: text
    content: 'Our inheritance '
  - type: note
    content: That is, their ancestral land and the temple. See Ps. 79:1.
  - type: text
    content: has passed to strangers,
  - type: text
    content: our homes to foreigners.
  '20':
  - type: text
    content: Have you forgotten us forever?
  - type: text
    content: Why have you abandoned us for so long?
  '21':
  - type: text
    content: 'Draw us back to yourself, '
  - type: text
    content: Yahweh
  - type: text
    content: '; let us come back '
  - type: text
    content: to you
  - type: text
    content: '!'
  - type: text
    content: Restore us as we were before.
  '22':
  - type: text
    content: Have you utterly rejected us?
  - type: text
    content: Is there no limit to your anger?
  - type: note
    content: Or “Unless you have utterly rejected us in an anger that has no limit.”
  '3':
  - type: text
    content: We have no fathers; we are orphans,
  - type: text
    content: and our mothers are widows.
  '4':
  - type: text
    content: We have to pay for drinking water,
  - type: text
    content: and our firewood comes at a steep price.
  '5':
  - type: text
    content: Our pursuers are breathing down our necks;
  - type: text
    content: we are exhausted and allowed no rest.
  '6':
  - type: text
    content: We made a pact with Egypt and Assyria
  - type: text
    content: just to have enough food to eat.
  '7':
  - type: text
    content: Our ancestors sinned, and they are no more;
  - type: text
    content: and now we suffer their punishment.
  - type: note
    content: One must constantly be vigilant to keep from moral and ethical entropy. God’s covenant was what held the nation together. Ignore that and everything begins to unravel. Every society needs a well-maintained organizing principle in order to thrive. Dysfunction (as well as blessing) can be passed down and amplified through the generations.
  '8':
  - type: text
    content: Slaves rule over us;
  - type: note
    content: See Prov. 30:21–22.
  - type: text
    content: there is no one to rescue us from them.
  '9':
  - type: text
    content: We risk our lives to earn our bread
  - type: text
    content: because of armed gangs in the wilderness.
