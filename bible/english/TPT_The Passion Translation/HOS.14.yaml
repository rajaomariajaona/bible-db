        text: ) is written in the Hebrew imperfect tense. This means that any promise discussed in this passage is something that God has initiated and was/is coming into being, incomplete, and not yet certain. It depended on whether the people of the Northern Kingdom (and we for that matter) chose to receive this free-gift promise and take part in making this potentiality a reality. These are not “predictions” of a certain future, but they are available to Israel and to us should we receive them and live into them. Classical Hebrew has no future tense in the sense that we have a future perfect in English. These promises are incomplete possibilities that can be made finished and perfect should we receive them. They are ours for the taking. They also can be ignored and discarded. The Northern Kingdom chose the latter and, after 722 BC, was heard from no more.
    marker-yv: yv-n
