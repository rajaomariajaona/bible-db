  - type: note
    content: 'A reallocation of the verse sequence is evident here: the Hebrew text of Hos. 14 ends with v. 10 . However, the English translation of the prophecy concludes with v. 9 . No content has been excluded in this translation; this simply reflects a difference in verse numbering. Verse and chapter numbers were not original parts of the inspired texts but instead were later additions.'
