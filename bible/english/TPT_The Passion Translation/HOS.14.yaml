  '4':
  - type: text
    content: '“I will heal '
  - type: note
    content: This entire segment (vv. 4–8 ) is written in the Hebrew imperfect tense. This means that any promise discussed in this passage is something that God has initiated and was/is coming into being, incomplete, and not yet certain. It depended on whether the people of the Northern Kingdom (and we for that matter) chose to receive this free-gift promise and take part in making this potentiality a reality. These are not “predictions” of a certain future, but they are available to Israel and to us should we receive them and live into them. Classical Hebrew has no future tense in the sense that we have a future perfect in English. These promises are incomplete possibilities that can be made finished and perfect should we receive them. They are ours for the taking. They also can be ignored and discarded. The Northern Kingdom chose the latter and, after 722 BC, was heard from no more.
  - type: text
    content: you of your unfaithfulness.
  - type: note
    content: Hosea used wordplay throughout his book. Here, the word for “unfaithfulness” comes from the same root word as the word translated “return” and “come back” in vv. 1–2 .
  - type: text
    content: I will love you with all my heart,
  - type: note
    content: Or “I will love you freely [without restraint].” The Hebrew word for “freely” also means “freewill offering.” God’s love for you is extravagant, generous, and without limit.
