document_id: REV.5,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Scroll and the Lamb
  - type: text
    content: 'And I saw that the one seated on the throne was holding in '
  - type: note
    content: Or “upon (the palm of) his right hand.” The scroll is being offered to anyone who can break open its seals.
  - type: text
    content: 'his right hand an unopened scroll with writing on the inside and on the outside, '
  - type: note
    content: See Isa. 29:11; Ezek. 2:9–10; Dan. 12:4. The revelation God gave to Daniel was to be sealed, but what John saw was a book that is to be broken open.
  - type: text
    content: 'and it was sealed with seven seals. '
  '10':
  - type: text
    content: You have chosen us to serve our God
  - type: text
    content: and formed us into a kingdom of priests
  - type: text
    content: 'who reign '
  - type: note
    content: 'The present tense of the Greek verb indicates that the reign of believers on earth has already begun. See Henry Alford, Alford’s Greek Testament: An Exegetical and Critical Commentary, vol. 4, 1875 (Grand Rapids: Baker, 1980); Henry Barclay Swete, Commentary on Revelation (Grand Rapids: Kregel Publications, 1977); G. K. Beale, The Book of Revelation, A Commentary on the Greek Text, The New International Greek Testament Commentary (Grand Rapids: Eerdmans, 1999).'
  - type: text
    content: on the earth.”
  - type: heading
    content: Angelic Worship of the Lamb
  '11':
  - type: text
    content: 'Then I looked, and I heard the voices of myriads of angels in circles around the throne, as well as the voices of the living creatures and the elders—myriads and myriads! '
  - type: note
    content: Or “ten thousands of ten thousands, and thousands of thousands.” If taken literally, this would exceed 110 million angels.
  '12':
  - type: text
    content: 'And as I watched, all of them were singing with thunderous voices:'
  - type: text
    content: “Worthy is Christ the Lamb who was slaughtered to receive great power and might, wealth and wisdom, and honor, glory, and praise!”
  '13':
  - type: text
    content: 'Then every living being joined the angelic choir. Every creature in heaven and on earth, under the earth, in the sea, and everything in them, were '
  - type: text
    content: worshiping
  - type: text
    content: ' with one voice, saying:'
  - type: text
    content: “Praise, honor, glory, and dominion
  - type: text
    content: be to God-Enthroned
  - type: text
    content: and to Christ the Lamb
  - type: text
    content: forever and ever!”
  '14':
  - type: text
    content: 'Then the four living creatures responded:'
  - type: text
    content: “Amen!”
  - type: text
    content: And the twenty-four elders threw themselves facedown to the ground and worshiped.
  - type: note
    content: This powerful scene of heavenly worship begins near the throne and then races outwardly to every being in heaven until it extends even further, cascading upon the earth like a waterfall.
  '2':
  - type: text
    content: 'Then I saw an incredibly powerful angel '
  - type: note
    content: There are twenty-six unidentified angels mentioned in the book of Revelation. Additionally, there are possibly fifteen angels identified as men.
  - type: text
    content: 'proclaiming '
  - type: note
    content: The Greek word for “proclaiming” is related to the task of a herald to shout out a royal proclamation.
  - type: text
    content: 'with a great, loud voice, “Who is worthy to open the scroll and able to break '
  - type: note
    content: Or “release” or “untie.”
  - type: text
    content: 'its '
  - type: text
    content: seven
  - type: text
    content: ' seals?” '
  '3':
  - type: text
    content: 'But no person could be found, living or dead, in all of creation '
  - type: note
    content: Or “on heaven or on earth or under the earth.”
  - type: text
    content: '—no one was worthy to open the scroll and read its contents. '
  '4':
  - type: text
    content: So I broke down weeping with intense sorrow, because there was found no one worthy to break open the scroll and read its contents.
  - type: note
    content: Or “look into it.” Some see this scroll as the title deed of the universe that contains the right of ownership and the timing and plans of fulfilling the eternal destiny of all creation.
  '5':
  - type: text
    content: 'Then one of the elders said to me, “Stop weeping. Look! The mighty Lion of Judah’s tribe, '
  - type: note
    content: See Gen. 49:10.
  - type: text
    content: the root of David—he has conquered! He is the worthy one who can open the scroll and its seven seals.”
  '6':
  - type: text
    content: 'Then I saw a young Lamb '
  - type: note
    content: Or “Lambkin.” Jesus is both a fierce Lion and a gentle Lamb. The Lamb holds the scroll.
  - type: text
    content: 'standing before '
  - type: note
    content: Or “in the middle of the throne (area).”
  - type: text
    content: 'the throne, encircled by the four living creatures and the twenty-four elders. He appeared to have been slaughtered '
  - type: text
    content: but was now alive
  - type: text
    content: '! '
  - type: note
    content: This is our Lord Jesus Christ with the marks of sacrifice still upon him.
  - type: text
    content: 'He had seven horns '
  - type: note
    content: Horns are a picture of power and authority (Ps. 89:17; Dan. 7:8), while seven is the number of perfection. Perfect authority now belongs to the Lamb who was slain.
  - type: text
    content: and seven eyes, which are the seven Spirits of God sent out to the ends of the earth.
  '7':
  - type: text
    content: 'I saw the young Lamb approach the throne and take the scroll from the right hand of the one who sat there. '
  '8':
  - type: text
    content: 'And when the twenty-four elders and the four living creatures saw the Lamb had taken the scroll, they fell facedown at the feet of the Lamb and worshiped him. Each of them had a harp and golden bowls brimming full of sweet fragrant incense—which are the prayers of God’s holy lovers. '
  '9':
  - type: text
    content: 'And they were all singing this new song '
  - type: text
    content: of praise to the Lamb
  - type: text
    content: ':'
  - type: text
    content: “Because you were slaughtered for us,
  - type: text
    content: you are worthy to take the scroll and open its seals.
  - type: text
    content: Your blood was the price paid to redeem us.
  - type: text
    content: You purchased us to bring us to God
  - type: text
    content: out of every tribe, language, people group, and nation.
