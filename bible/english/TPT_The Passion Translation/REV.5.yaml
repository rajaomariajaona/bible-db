document_id: REV.5,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Scroll and the Lamb
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw that the one seated on the throne was holding in '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “upon (the palm of) his right hand.” The scroll is being offered to anyone who can break open its seals.
      marker-yv: yv-n
    - type: text
      text: 'his right hand an unopened scroll with writing on the inside and on the outside, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Isa. 29:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezek. 2:9–10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 12:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The revelation God gave to Daniel was to be sealed, but what John saw was a book that is to be broken open.
      marker-yv: yv-n
    - type: text
      text: 'and it was sealed with seven seals. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have chosen us to serve our God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and formed us into a kingdom of priests
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'who reign '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The present tense of the Greek verb indicates that the reign of believers on earth has already begun. See Henry Alford,
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: 'Alford’s Greek Testament: An Exegetical and Critical Commentary'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', vol. 4, 1875 (Grand Rapids: Baker, 1980); Henry Barclay Swete,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Commentary on Revelation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Grand Rapids: Kregel Publications, 1977); G. K. Beale,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: The Book of Revelation, A Commentary on the Greek Text
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', The New International Greek Testament Commentary (Grand Rapids: Eerdmans, 1999).'
      marker-yv: yv-n
    - type: text
      text: on the earth.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Angelic Worship of the Lamb
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I looked, and I heard the voices of myriads of angels in circles around the throne, as well as the voices of the living creatures and the elders—myriads and myriads! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “ten thousands of ten thousands, and thousands of thousands.” If taken literally, this would exceed 110 million angels.
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And as I watched, all of them were singing with thunderous voices:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “Worthy is Christ the Lamb who was slaughtered to receive great power and might, wealth and wisdom, and honor, glory, and praise!”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then every living being joined the angelic choir. Every creature in heaven and on earth, under the earth, in the sea, and everything in them, were '
    - type: usfm
      marker: it
      children:
      - type: text
        text: worshiping
    - type: text
      text: ' with one voice, saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Praise, honor, glory, and dominion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: be to God-Enthroned
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and to Christ the Lamb
  - type: usfm
    marker: q1
    children:
    - type: text
      text: forever and ever!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the four living creatures responded:'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: “Amen!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the twenty-four elders threw themselves facedown to the ground and worshiped.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This powerful scene of heavenly worship begins near the throne and then races outwardly to every being in heaven until it extends even further, cascading upon the earth like a waterfall.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw an incredibly powerful angel '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There are twenty-six unidentified angels mentioned in the book of Revelation. Additionally, there are possibly fifteen angels identified as men.
      marker-yv: yv-n
    - type: text
      text: 'proclaiming '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “proclaiming” is related to the task of a herald to shout out a royal proclamation.
      marker-yv: yv-n
    - type: text
      text: 'with a great, loud voice, “Who is worthy to open the scroll and able to break '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “release” or “untie.”
      marker-yv: yv-n
    - type: text
      text: 'its '
    - type: usfm
      marker: it
      children:
      - type: text
        text: seven
    - type: text
      text: ' seals?” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But no person could be found, living or dead, in all of creation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “on heaven or on earth or under the earth.”
      marker-yv: yv-n
    - type: text
      text: '—no one was worthy to open the scroll and read its contents. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I broke down weeping with intense sorrow, because there was found no one worthy to break open the scroll and read its contents.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “look into it.” Some see this scroll as the title deed of the universe that contains the right of ownership and the timing and plans of fulfilling the eternal destiny of all creation.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of the elders said to me, “Stop weeping. Look! The mighty Lion of Judah’s tribe, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 49:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: the root of David—he has conquered! He is the worthy one who can open the scroll and its seven seals.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw a young Lamb '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Lambkin.” Jesus is both a fierce Lion and a gentle Lamb. The Lamb holds the scroll.
      marker-yv: yv-n
    - type: text
      text: 'standing before '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the middle of the throne (area).”
      marker-yv: yv-n
    - type: text
      text: 'the throne, encircled by the four living creatures and the twenty-four elders. He appeared to have been slaughtered '
    - type: usfm
      marker: it
      children:
      - type: text
        text: but was now alive
    - type: text
      text: '! '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is our Lord Jesus Christ with the marks of sacrifice still upon him.
      marker-yv: yv-n
    - type: text
      text: 'He had seven horns '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 5:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Horns are a picture of power and authority (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ps. 89:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 7:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), while seven is the number of perfection. Perfect authority now belongs to the Lamb who was slain.
      marker-yv: yv-n
    - type: text
      text: and seven eyes, which are the seven Spirits of God sent out to the ends of the earth.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw the young Lamb approach the throne and take the scroll from the right hand of the one who sat there. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the twenty-four elders and the four living creatures saw the Lamb had taken the scroll, they fell facedown at the feet of the Lamb and worshiped him. Each of them had a harp and golden bowls brimming full of sweet fragrant incense—which are the prayers of God’s holy lovers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And they were all singing this new song '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of praise to the Lamb
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because you were slaughtered for us,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you are worthy to take the scroll and open its seals.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your blood was the price paid to redeem us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You purchased us to bring us to God
  - type: usfm
    marker: q1
    children:
    - type: text
      text: out of every tribe, language, people group, and nation.
