    children:
    - type: text
      text: The Beast Out of the Sea
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then I saw a wild beast '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The word beast (
      - type: usfm
        marker: it
        children:
        - type: text
          text: therion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is used in the Bible for an evil person or in describing the sinful nature of man. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Eccl. 3:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Pss. 22:12–13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 73:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Therion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is found extensively in classical Greek describing wicked or pathetic people. Plato (
      - type: usfm
        marker: it
        children:
        - type: text
          text: Phaedrus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 204b) applies it to people: “A flatterer is a horrid creature ['
      - type: usfm
        marker: it
        children:
        - type: text
          text: therion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '] who does great harm.” See also Aristophanes,'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Clouds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 184. John was not just giving us a code word for the Emperor Nero, he was pointing us to the sin of man that turned Nebuchadnezzar into a beast ('
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and to the riotous human “beasts” who came against Paul at Ephesus (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Acts 19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Cor. 15:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'rising from the sea with ten horns and seven heads. On its horns were ten royal crowns, and on its heads were blasphemous names. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For the one who leads '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' into captivity, into captivity he goes. The one who kills '
    - type: usfm
      marker: it
      children:
      - type: text
        text: others
    - type: text
      text: ' by the sword, by the sword he will be put to death. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This is one of the more difficult verses in Revelation to translate and interpret, with many variations found in differing manuscripts. It could also be translated “If anyone is destined for captivity, into captivity he goes. If anyone is destined to be killed by the sword, by the sword he will be killed.” See also
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jer. 15:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: This is a call for the endurance and faithfulness of the holy believers.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beast from the Earth
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Then I saw another wild beast coming up from the ground. It had two horns like a ram, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “lamb.”
      marker-yv: yv-n
    - type: text
      text: 'but it spoke like the dragon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'It operated in all the authority of the first beast on its behalf, causing the earth and its inhabitants to worship the first beast, whose mortal wound had been healed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'It performed great miracle-signs, even publicly causing fire to fall out of heaven to the earth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'And through these startling miracles that he performed on behalf of the first beast, he deceived the world, telling the people to erect a statue in the image of the beast that had been wounded by the sword and yet lived. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'The beast from the earth was empowered to breathe life '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “spirit.”
      marker-yv: yv-n
    - type: text
      text: 'into the image of the first beast so that it could speak and kill those who refused to worship its image. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'It also caused everyone, small and great, rich and poor, free and bound, to be marked '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word used here for “marked” (or “engraved”) is same root word from which we get the word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: character
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . The character of the beast is now upon the people.
      marker-yv: yv-n
    - type: text
      text: 'on the right hand or on the forehead. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: This meant no one could buy or sell unless they had the mark; that is, the name of the beast or its number.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'This will require wisdom to understand: Let the one with insight interpret the number of the wild beast, for it is humanity’s number '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “man’s number.” The Aramaic can be translated “the son of Adam’s number.” There is no reference to the Antichrist in the book of Revelation. The beast is equated to the nature of humanity. The number 666 is the number of man; not an incarnation of the devil, but human nature. The number six is always equated with man, for man was created on the sixth day. The wild beast rising out of the ground (which man was made from) is the sin of man that wars against our souls and prevents the image of Christ from emerging in fullness within believers. The number 666 cannot be literal, for a literal number would need no wisdom to interpret. Both the mark of the beast and the mark on the foreheads of God’s faithful followers is a metaphor of the character of the beast revealed by thoughts (foreheads) and by actions (the hands). By associating “the wild beast” with 666, John is pointing us to the dimensions of Nebuchadnezzar’s idol (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Dan. 3:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and to Solomon’s fall into sin (
      - type: text
        text: 1 Kings 10:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: —666.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'It was like a leopard with feet like a bear’s, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic can be translated either a “wolf” or a “bear.”
      marker-yv: yv-n
    - type: text
      text: and its mouth like the mouth of a lion. The dragon shared his power, throne, and great authority with the wild beast.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'One of the heads of the wild beast seemed to have received a deathly wound, but the wound had been healed. After this, the whole world was filled with fascination and followed the wild beast. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They worshiped the dragon because he had given the beast its ruling authority. They also worshiped the wild beast, saying, “Who is like the wild beast? And who is able to make war against him?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The wild beast was given a mouth to speak boastful and blasphemous words, and he was permitted to exercise authority for forty-two months. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'So the wild beast began to blaspheme against God, blaspheming his '
    - type: usfm
      marker: it
      children:
      - type: text
        text: holy
    - type: text
      text: ' name and his dwelling place; '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “tabernacle.”
      marker-yv: yv-n
    - type: text
      text: 'that is, those who dwell in heaven. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those continually tabernacle in heaven.”
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The beast was given the authority to wage war against the holy believers. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some manuscripts add “and conquered them.”
      marker-yv: yv-n
    - type: text
      text: 'And he was given authority over every tribe, people, language, and nation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Everyone on earth will worship the wild beast—those whose names have not been written from the foundation '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek word for “foundation,”
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: katabole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', can also mean “overthrow” or “cast down,” which would be a reference to the “fall” of man.'
      marker-yv: yv-n
    - type: text
      text: of the world in the Book of the Life of the Lamb who was slain.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 13:8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “those whose names were not written in the Lamb’s Book of Life, who was slain from the foundation of the world.”
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If anyone has been given ears to hear, he’d better listen! '
