document_id: PRO.16,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom Exalts God
  - type: text
    content: Go ahead and make all the plans you want,
  - type: text
    content: but it’s the Lord who will ultimately direct your steps.
  - type: note
    content: As translated from the Septuagint. The Hebrew and Aramaic read “the Lord gives the right reply.”
  '10':
  - type: text
    content: A king speaks the revelation of truth,
  - type: text
    content: so he must be extraordinarily careful in the decrees that he makes.
  '11':
  - type: text
    content: The Lord expects you to be fair in every business deal,
  - type: text
    content: for he is the one who sets the standards for righteousness.
  - type: note
    content: Or “Honesty with scales and balances is the way of the Lord, for all the stones in the bag are established by him.”
  '12':
  - type: text
    content: Kings and leaders despise wrongdoing,
  - type: text
    content: for the true authority to rule and reign
  - type: text
    content: is built on a foundation of righteousness.
  '13':
  - type: text
    content: Kings and leaders love to hear godly counsel,
  - type: text
    content: and they love those who tell them the truth.
  '14':
  - type: text
    content: The anger of a king releases the messenger of death,
  - type: note
    content: See 1 Kings 2:25, 29–34, 46.
  - type: text
    content: but a wise person will know how to pacify his wrath.
  '15':
  - type: text
    content: Life-giving light streams from the presence of a king,
  - type: note
    content: The Septuagint reads “The king’s son is in the light of life.”
  - type: text
    content: and his favor is showered upon those who please him.
  '16':
  - type: text
    content: 'Everyone wants gold, but wisdom’s worth '
  - type: note
    content: The Septuagint is “nests of wisdom.”
  - type: text
    content: is far greater.
  - type: text
    content: Silver is sought after,
  - type: text
    content: but a heart of understanding yields a greater return.
  '17':
  - type: text
    content: Repenting from evil places you on the highway of holiness.
  - type: text
    content: Protect purity and you protect your life.
  - type: note
    content: 'There are two proverbs inserted here in the Septuagint that are not found in the Hebrew or Aramaic: “Receive instruction and you’ll be prosperous; he who listens to correction shall be made wise.” “He who guards his ways preserves his own soul; he who loves his life will watch his words.”'
  '18':
  - type: text
    content: Your boast becomes a prophecy of a future failure.
  - type: text
    content: The higher you lift yourself up in pride,
  - type: note
    content: Or “overconfidence.”
  - type: text
    content: the harder you’ll fall in disgrace.
  '19':
  - type: text
    content: It’s better to be meek and lowly and live among the poor
  - type: text
    content: than to live high and mighty among the rich and famous.
  '2':
  - type: text
    content: We are all in love with our own opinions,
  - type: text
    content: convinced they’re correct.
  - type: text
    content: But the Lord is in the midst of us,
  - type: note
    content: Or “in the midst of spirits.”
  - type: text
    content: testing and probing our every motive.
  '20':
  - type: text
    content: One skilled in business discovers prosperity,
  - type: text
    content: but the one who trusts in God is blessed beyond belief!
  - type: heading
    content: Walking with Wisdom
  '21':
  - type: text
    content: The one with a wise heart is called “discerning,”
  - type: text
    content: and speaking sweetly to others
  - type: text
    content: makes your teaching even more convincing.
  '22':
  - type: text
    content: Wisdom is a deep well of understanding
  - type: text
    content: opened up within you as a fountain of life for others,
  - type: text
    content: but it’s senseless to try to instruct a fool.
  '23':
  - type: text
    content: Winsome words pour from a heart of wisdom,
  - type: text
    content: adding value to all you teach.
  '24':
  - type: text
    content: Nothing is more appealing
  - type: text
    content: than speaking beautiful, life-giving words.
  - type: text
    content: For they release sweetness to our souls
  - type: text
    content: and inner healing to our spirits.
  - type: note
    content: Or “healing to the bones.” Bones are a metaphor for our inner being.
  '25':
  - type: text
    content: Before every person there is a path
  - type: text
    content: that seems like the right one to take,
  - type: text
    content: but it leads straight to hell!
  - type: note
    content: As translated from the Septuagint. The Hebrew is “the ways of death.”
  '26':
  - type: text
    content: Life motivation comes from the deep longings of the heart,
  - type: text
    content: and the passion to see them fulfilled urges you onward.
  - type: note
    content: The meaning of the Hebrew in this verse is uncertain.
  '27':
  - type: text
    content: A wicked scoundrel wants to dig up dirt on others,
  - type: text
    content: only to spread slander and shred their reputation.
  '28':
  - type: text
    content: A twisted person spreads rumors;
  - type: text
    content: a whispering gossip ruins good friendships.
  '29':
  - type: text
    content: A vicious criminal can be persuasive,
  - type: text
    content: enticing others to join him as partners in crime,
  - type: text
    content: but he leads them all down a despicable path.
  '3':
  - type: text
    content: Before you do anything,
  - type: text
    content: put your trust totally in God and not in yourself.
  - type: note
    content: Or “commit your business to God.”
  - type: text
    content: Then every plan you make will succeed.
  '30':
  - type: text
    content: It’s easy to tell when a wicked man
  - type: text
    content: is hatching some crooked scheme—
  - type: text
    content: it’s written all over his face.
  - type: text
    content: His looks betray him as he gives birth to his sin.
  '31':
  - type: text
    content: Old age with wisdom will crown you with dignity and honor,
  - type: note
    content: Or “Gray hair is a crown of splendor.” In the Hebrew culture the old were honored above all, especially if they acquired wisdom. See Lev. 19:32.
  - type: text
    content: for it takes a lifetime of righteousness to acquire it.
  '32':
  - type: text
    content: Do you want to be a mighty warrior?
  - type: text
    content: It’s better to be known as one who is patient and slow to anger.
  - type: note
    content: The Septuagint is “It’s better to be forgiving than strong.”
  - type: text
    content: Do you want to conquer a city?
  - type: text
    content: Rule over your temper before you attempt to rule a city.
  '33':
  - type: text
    content: We may toss the coin and roll the dice,
  - type: text
    content: but God’s will is greater than luck.
  - type: note
    content: Or “Into the center the lot is cast and from Yahweh is all its judgment.” The casting of lots was a common form of divination in premodern societies.
  '4':
  - type: text
    content: The Lord works everything together to accomplish his purpose.
  - type: note
    content: Or “for its answer.”
  - type: text
    content: Even the wicked are included in his plans—
  - type: text
    content: he sets them aside for the day of disaster.
  '5':
  - type: text
    content: Yahweh
  - type: text
    content: ' detests all the proud '
  - type: note
    content: The Hebrew word for “proud” is gavah, which comes from a root word that means “locust” (as a reference to a locust swarm that devours all the crops). Pride is like a locust swarm that always hinders a true spiritual harvest within us.
  - type: text
    content: of heart,
  - type: text
    content: for pride attracts his punishment—
  - type: text
    content: and you can count on that!
  '6':
  - type: text
    content: You can avoid evil through surrendered worship
  - type: text
    content: and the fear of God,
  - type: text
    content: for the power of his faithful love
  - type: text
    content: removes sin’s guilt and grip over you.
  '7':
  - type: text
    content: When the Lord is pleased with the decisions you’ve made,
  - type: text
    content: he activates grace to turn enemies into friends.
  '8':
  - type: text
    content: It is better to have little with a heart that loves justice
  - type: text
    content: than to be rich and not have God on your side.
  '9':
  - type: text
    content: Within your heart you can make plans for your future,
  - type: text
    content: but the Lord chooses the steps you take to get there.
  - type: heading
    content: Living like a King
