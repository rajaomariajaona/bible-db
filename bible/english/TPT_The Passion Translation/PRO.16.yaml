document_id: PRO.16,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom Exalts God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Go ahead and make all the plans you want,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but it’s the Lord who will ultimately direct your steps.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew and Aramaic read “the Lord gives the right reply.”
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: A king speaks the revelation of truth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so he must be extraordinarily careful in the decrees that he makes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The Lord expects you to be fair in every business deal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for he is the one who sets the standards for righteousness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Honesty with scales and balances is the way of the Lord, for all the stones in the bag are established by him.”
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Kings and leaders despise wrongdoing,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the true authority to rule and reign
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is built on a foundation of righteousness.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Kings and leaders love to hear godly counsel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they love those who tell them the truth.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The anger of a king releases the messenger of death,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Kings 2:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 29–34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ','
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: '46'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a wise person will know how to pacify his wrath.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Life-giving light streams from the presence of a king,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint reads “The king’s son is in the light of life.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and his favor is showered upon those who please him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Everyone wants gold, but wisdom’s worth '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “nests of wisdom.”
      marker-yv: yv-n
    - type: text
      text: is far greater.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Silver is sought after,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a heart of understanding yields a greater return.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Repenting from evil places you on the highway of holiness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protect purity and you protect your life.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There are two proverbs inserted here in the Septuagint that are not found in the Hebrew or Aramaic: “Receive instruction and you’ll be prosperous; he who listens to correction shall be made wise.” “He who guards his ways preserves his own soul; he who loves his life will watch his words.”'
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Your boast becomes a prophecy of a future failure.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The higher you lift yourself up in pride,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “overconfidence.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the harder you’ll fall in disgrace.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: It’s better to be meek and lowly and live among the poor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to live high and mighty among the rich and famous.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: We are all in love with our own opinions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: convinced they’re correct.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the Lord is in the midst of us,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “in the midst of spirits.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: testing and probing our every motive.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: One skilled in business discovers prosperity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one who trusts in God is blessed beyond belief!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Walking with Wisdom
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: The one with a wise heart is called “discerning,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and speaking sweetly to others
  - type: usfm
    marker: q1
    children:
    - type: text
      text: makes your teaching even more convincing.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Wisdom is a deep well of understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: opened up within you as a fountain of life for others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but it’s senseless to try to instruct a fool.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Winsome words pour from a heart of wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: adding value to all you teach.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Nothing is more appealing
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than speaking beautiful, life-giving words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they release sweetness to our souls
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and inner healing to our spirits.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “healing to the bones.” Bones are a metaphor for our inner being.
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Before every person there is a path
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that seems like the right one to take,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but it leads straight to hell!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint. The Hebrew is “the ways of death.”
      marker-yv: yv-n
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Life motivation comes from the deep longings of the heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the passion to see them fulfilled urges you onward.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew in this verse is uncertain.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: A wicked scoundrel wants to dig up dirt on others,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: only to spread slander and shred their reputation.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: A twisted person spreads rumors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a whispering gossip ruins good friendships.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: A vicious criminal can be persuasive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enticing others to join him as partners in crime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he leads them all down a despicable path.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Before you do anything,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: put your trust totally in God and not in yourself.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “commit your business to God.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then every plan you make will succeed.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: It’s easy to tell when a wicked man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: is hatching some crooked scheme—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it’s written all over his face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His looks betray him as he gives birth to his sin.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Old age with wisdom will crown you with dignity and honor,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Gray hair is a crown of splendor.” In the Hebrew culture the old were honored above all, especially if they acquired wisdom. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: Lev. 19:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for it takes a lifetime of righteousness to acquire it.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Do you want to be a mighty warrior?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s better to be known as one who is patient and slow to anger.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Septuagint is “It’s better to be forgiving than strong.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do you want to conquer a city?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rule over your temper before you attempt to rule a city.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: We may toss the coin and roll the dice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but God’s will is greater than luck.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Into the center the lot is cast and from
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is all its judgment.” The casting of lots was a common form of divination in premodern societies.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The Lord works everything together to accomplish his purpose.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “for its answer.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even the wicked are included in his plans—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he sets them aside for the day of disaster.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' detests all the proud '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 16:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “proud” is
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: gavah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', which comes from a root word that means “locust” (as a reference to a locust swarm that devours all the crops). Pride is like a locust swarm that always hinders a true spiritual harvest within us.'
      marker-yv: yv-n
    - type: text
      text: of heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for pride attracts his punishment—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you can count on that!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: You can avoid evil through surrendered worship
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the fear of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the power of his faithful love
  - type: usfm
    marker: q1
    children:
    - type: text
      text: removes sin’s guilt and grip over you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When the Lord is pleased with the decisions you’ve made,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he activates grace to turn enemies into friends.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: It is better to have little with a heart that loves justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: than to be rich and not have God on your side.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
