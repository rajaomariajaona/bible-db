document_id: PSA.148
type_code: eng
segments:
- type: usfm
  marker: ms4
  children:
  - type: text
    text: The Cosmic Chorus of Praise
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hallelujah! Praise the Lord! Let the skies be filled with praise
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the highest heavens with the shouts of glory!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Go ahead—praise him, all you his messengers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Praise him some more, all you heavenly hosts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Keep it up, sun and moon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Don’t stop now, all you twinkling stars of light!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Take it up even higher—up to the highest heavens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: until the cosmic chorus thunders his praise!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 148:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Poetic implication in the text. The literal Hebrew reads “[Praise him] you waters above the sky.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Let the entire universe erupt with praise to God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He spoke and created it all—from nothing to something.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: He established the cosmos to last forever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he stands behind his commands
- type: usfm
  marker: q1
  children:
  - type: text
    text: so his orders will never be revoked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let the earth join in with this parade of praise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: You mighty creatures of the ocean’s depths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: echo in exaltation!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lightning, hail, snow, clouds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the stormy winds that fulfill his word—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: bring your melody, O mountains and hills;
- type: usfm
  marker: q1
  children:
  - type: text
    text: trees of the forest and field, harmonize your praise!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: 10-12
  - type: text
    text: Praise him, all beasts and birds, mice and men,
- type: usfm
  marker: q1
  children:
  - type: text
    text: kings, queens, princes, and princesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: young men and maidens, children and babes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: old and young alike, everyone everywhere!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Let them all join in with this orchestra of praise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the name of the Lord is the only name we raise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: His stunning splendor ascends higher than the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He anoints his people with strength and authority,
- type: usfm
  marker: q1
  children:
  - type: text
    text: showing his great favor to all his godly lovers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: even to his princely people, Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who are so close to his heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hallelujah! Praise the Lord!
