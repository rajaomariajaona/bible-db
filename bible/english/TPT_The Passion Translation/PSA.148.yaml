document_id: PSA.148,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Cosmic Chorus of Praise
  - type: text
    content: Hallelujah! Praise the Lord! Let the skies be filled with praise
  - type: text
    content: and the highest heavens with the shouts of glory!
  '10':
  - type: text
    content: Praise him, all beasts and birds, mice and men,
  - type: text
    content: kings, queens, princes, and princesses,
  - type: text
    content: young men and maidens, children and babes,
  - type: text
    content: old and young alike, everyone everywhere!
  '13':
  - type: text
    content: Let them all join in with this orchestra of praise.
  - type: text
    content: For the name of the Lord is the only name we raise!
  - type: text
    content: His stunning splendor ascends higher than the heavens.
  '14':
  - type: text
    content: He anoints his people with strength and authority,
  - type: text
    content: showing his great favor to all his godly lovers,
  - type: text
    content: even to his princely people, Israel,
  - type: text
    content: who are so close to his heart.
  - type: text
    content: Hallelujah! Praise the Lord!
  '2':
  - type: text
    content: Go ahead—praise him, all you his messengers!
  - type: text
    content: Praise him some more, all you heavenly hosts!
  '3':
  - type: text
    content: Keep it up, sun and moon!
  - type: text
    content: Don’t stop now, all you twinkling stars of light!
  '4':
  - type: text
    content: Take it up even higher—up to the highest heavens,
  - type: text
    content: until the cosmic chorus thunders his praise!
  - type: note
    content: Poetic implication in the text. The literal Hebrew reads “[Praise him] you waters above the sky.”
  '5':
  - type: text
    content: Let the entire universe erupt with praise to God.
  - type: text
    content: He spoke and created it all—from nothing to something.
  '6':
  - type: text
    content: He established the cosmos to last forever,
  - type: text
    content: and he stands behind his commands
  - type: text
    content: so his orders will never be revoked.
  '7':
  - type: text
    content: Let the earth join in with this parade of praise!
  - type: text
    content: You mighty creatures of the ocean’s depths,
  - type: text
    content: echo in exaltation!
  '8':
  - type: text
    content: Lightning, hail, snow, clouds,
  - type: text
    content: and the stormy winds that fulfill his word—
  '9':
  - type: text
    content: bring your melody, O mountains and hills;
  - type: text
    content: trees of the forest and field, harmonize your praise!
