    - type: text
      text: The Ascension of Jesus
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Terrified, the women fell to the ground on their faces.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men in white said to them, “Why would you look for the Living One '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic text is literally “the Life.”
      marker-yv: yv-n
    - type: text
      text: 'in a tomb? He is not here, for he has risen! '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus led his disciples out to Bethany. He lifted his hands over them and blessed them in his love. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was still speaking words of love and blessing, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: he floated off the ground into the sky
    - type: text
      text: ', ascending into heaven before their very eyes! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And all they could do was worship him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Overwhelmed and ecstatic with joy, they made their way back to Jerusalem. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Every day they went to the temple, to praise and worship God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:53
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: So ends the glorious Gospel of Luke. The one who walked with his friends on the way to Emmaus wants to walk with us. May we never walk in sadness or unbelief, for Jesus has risen from the grave and lives victorious as the living God in resurrection life! May you pause here and rejoice, believing that Jesus is the Christ, the Son of the living God and the only one who will bring us to the Father. Trust in him alone to save you, and you will spend eternity with him.
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have you forgotten what he said to you while he was still in Galilee: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘The destiny of the Son of Man is to be handed over to sinful men, to be nailed to a cross, and on the third day to rise again’?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All at once they remembered his words. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Leaving the tomb, they went to break the news to the Eleven and to all the others of what they had seen and heard.
    - type: usfm
