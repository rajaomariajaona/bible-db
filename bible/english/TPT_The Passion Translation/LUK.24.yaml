  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The disciples were ecstatic, yet dumbfounded, unable to fully comprehend it.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Knowing that they were still wondering if he was real, Jesus said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Here, let me show you. Give me something to eat.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They handed him a piece of broiled fish and some honeycomb. And they watched him eat.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Don’t you remember the words that I spoke to you when I was still with you? I told you that I would fulfill everything written about me, including all the prophecies from the law of Moses through the Psalms and the writings of the prophets.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:44
      - type: usfm
