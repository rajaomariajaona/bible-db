  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Everything that has happened fulfills what the Scriptures prophesied of me. The Messiah was destined to suffer and rise from the dead on the third day.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:46
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: There is not an explicit reference to the Messiah dying and rising on the third day. This must have been on the symbolic level of interpreting Scripture. May Jesus open our understanding to the Bible to see it on this level.
      marker-yv: yv-n
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now you must go into all the nations and preach repentance
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:47
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
