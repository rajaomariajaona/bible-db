      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the disciples heard the testimony of the women, it made no sense, and they were unable to believe what they heard. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Peter jumped up and ran the entire distance to the tomb to see for himself. Stooping down, he looked inside and discovered it was empty! There was only the linen sheet lying there. Staggered by this, he walked away, wondering what it meant.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Walks to Emmaus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Later that same day, two of Jesus’ disciples were walking from Jerusalem to Emmaus, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek text states that the distance from Jerusalem to Emmaus was sixty stadia = seven miles in the majority of manuscripts. However some patristic writers such as Eusebius, Sozomen, and Jerome, as well as a few Greek manuscripts read one hundred sixty stadia which would be seventeen miles. There is an ancient site in modern-day Israel identified as Hamat (Emmaus) that is seventeen miles from Jerusalem and is known for its hot (burning) springs. The word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Emmaus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is taken from a Hebrew root that means “the burning place.”
      marker-yv: yv-n
    - type: text
      text: 'a journey of about seventeen miles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were in the midst of a discussion about all the events of the last few days when Jesus walked up and accompanied them in their journey. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were unaware that it was actually Jesus walking alongside them, for God prevented them from recognizing him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “You seem to be in a deep discussion about something. What are you talking about, so sad and gloomy?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They stopped, and the one named Cleopas '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:17–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cleopas means “from a renowned father.” Some scholars believe this could be the Clopas mentioned in
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: John 19:25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: answered, “Haven’t you heard? Are you the only one in Jerusalem unaware of the things that have happened over the last few days?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “What things?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The things about Jesus, the man from Nazareth,” they replied. “He was a mighty prophet of God who performed miracles and wonders. His words were powerful and he had great favor with God and the people. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arriving at the tomb they discovered that the huge stone covering the entrance had been rolled aside, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But three days ago the high priest and the rulers of the people sentenced him to death and had him crucified. We had all hoped that he was the one who would redeem and rescue Israel. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early this morning, some of the women informed us of something amazing. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said they went to the tomb and found it empty. They claimed two angels appeared and told them that Jesus is now alive. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of us went to see for ourselves and found the tomb exactly as the women had said. But no one has seen him.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Why are you so thick-headed? Why do you find it so hard to believe every word the prophets have spoken?
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wasn’t it necessary for the Messiah to experience all these sufferings and afterward to enter into his glory?”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And beginning with Moses and all the prophets he carefully unveiled to them the revelation of himself throughout the Scriptures.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they approached the village, Jesus walked on ahead, telling them he was going on to a distant place. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They urged him to remain there with them and pleaded, “Stay with us. It will be dark soon.” So Jesus went with them into the village.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so they went in to look. But the tomb was empty. The body of Jesus was gone!
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joining them at the table for supper, he took bread and blessed it and broke it, then gave it to them. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All at once their eyes were opened and they realized he was Jesus! Then suddenly, in a flash, Jesus vanished from before their eyes!
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Stunned, they looked at each other and said, “Why didn’t we recognize him? Didn’t our hearts burn with the flames of holy passion '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Greek text. The Aramaic manuscript reads, “Were not our hearts dull as he taught us?” This is also the translation of the Latin text. The Aramaic words for “burning” and “dull” are almost identical.
      marker-yv: yv-n
    - type: text
      text: while we walked beside him? He unveiled for us such profound revelation from the Scriptures!”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They left at once and hurried back to Jerusalem to tell the other disciples. When they found the Eleven and the other disciples all together, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'they overheard them saying, “It’s really true! The Lord has risen from the dead. He even appeared to Peter!” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the two disciples told the others what had happened to them on the road to Emmaus and how Jesus had unveiled himself in the breaking of bread.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Luke’s Gospel begins and ends with similar stories. In the beginning of Jesus’ life we have the story of his parents walking off from Jerusalem and leaving him in the temple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2:41–52
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), unaware that they had left Jesus behind. Luke ends with the story of Jesus walking alongside two disciples and they weren’t aware of who was walking next to them. Both accounts were after the Feast. In both stories they were leaving Jerusalem. And both the Jewish scholars in the temple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) and the two Emmaus road disciples (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luke 24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) were astounded at what Jesus taught them.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Appears to the Disciples
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they were still discussing all of this, Jesus suddenly appeared right in front of their eyes! Startled and terrified, the disciples were convinced they were seeing a ghost. Standing there among them he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be at peace. I am the living God. Don’t be afraid.
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:36–37
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The words “I am the living God. Don’t be afraid” are only found in the Aramaic text and the Latin Vulgate. The Greek text omits this sentence.
      marker-yv: yv-n
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Why are you so frightened? Don’t let doubt enter your hearts.
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: See my pierced hands and feet. See for yourselves, it is I, standing here alive. Touch me and know that my wounds are real. A spirit does not have a body of flesh and bone as you see that I have.”
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They stood there, stunned and perplexed. Suddenly, two men appeared above them in dazzling white robes shining like lightning. '
    - type: usfm
