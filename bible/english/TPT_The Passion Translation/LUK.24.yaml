        children:
        - type: text
          text: The Aramaic reads “grace” or “conversion.”
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and forgiveness of sins so that they will turn to me. Start right here in Jerusalem,
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
