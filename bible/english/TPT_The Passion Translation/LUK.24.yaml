      text: The Resurrection of Jesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Very early that Sunday morning, the women made their way to the tomb, carrying the spices they had prepared. '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: '(10) '
    - type: text
      text: 'Among them were Mary Magdalene, Joanna, and Jesus’ mother Mary. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 24:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: For the sake of the English narrative, the information found in v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
