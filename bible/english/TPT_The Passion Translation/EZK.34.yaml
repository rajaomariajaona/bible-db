  - type: text
    content: 'And they will no longer have to endure the insults of other nations. '
  '3':
  - type: text
    content: 'Yet you eat the fat, '
  - type: note
    content: The fat of a sacrifice, according to the law of Moses, was reserved for God (see Lev. 3:16; 7:23–25). Some translators change the vocalization of the Hebrew to read “you eat [drink] the milk.”
