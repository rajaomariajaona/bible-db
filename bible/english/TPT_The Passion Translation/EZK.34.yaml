  - type: heading
    content: The Rulers of Israel
  - type: text
    content: ' '
  - type: note
    content: Ezekiel 34 constitutes panel H1 in the chiastic structure of the book. It deals with the metaphorical theme of shepherds and sheep, with two distinct applications. The first of these focuses on the corrupt and godless leaders of Israel—the heartless and cruel “shepherds of Israel” who brutalize their “flock” (vv. 2–4). The second application of the metaphor focuses on Yahweh as the quintessential “good shepherd,” who nurtures and lovingly cares for his people, his “flock” (vv. 12–13). Yahweh will also provide a legacy of godly leaders for the future, via the spiritual descendants of King David. This metaphor is taken up by Jesus in John 10, where he declared himself the ultimate “Good Shepherd” (John 10:14), caring for all those followers God, his Father, gives him. This chapter serves as a contrasting parallel with Ezek. 22–23 (panel H), a metaphorical allegory of the two adulterous sisters, identifying them with the godless and immoral kingdoms of Israel and Judah.
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying, '
