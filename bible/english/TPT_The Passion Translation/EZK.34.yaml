  - type: text
    content: ', will be their God, and my servant, '
  - type: text
    content: like
  - type: text
    content: ' David, will be '
  - type: text
    content: their
  - type: text
    content: ' prince taken from among them. '
  - type: note
    content: This is a prophecy of Jesus, the Son of David, who came as the Messiah and King of Israel.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken. '
  '25':
  - type: text
    content: 'I will make a covenant of peace with them and rid the land of its wild beasts. Then they will be able to live securely in the wilderness and sleep '
  - type: text
    content: soundly
  - type: text
    content: ' in the forest. '
  '26':
  - type: text
    content: 'And I will make them '
  - type: note
    content: In the context, “them” takes us back to vv. 20–22. It is the “weak [persecuted]” sheep that God will make a blessing. The strong sheep have exploited them, but God takes note of it all and promises to “bless” the weak sheep. Then he will cause showers of blessings, which likely represent prosperity. This is associated with actual rains coming in their seasons to bring blessing to the land and the growth of abundant crops. This will come after the “weak” suffer at the hands of the strong, powerful sheep with horns (authority), the ones who get rich by making others poor.
  - type: text
    content: 'and the places all around my '
  - type: text
    content: sacred
  - type: text
    content: ' hill a blessing. And I will send showers of blessing '
  - type: note
    content: See Joel 2:25–32; Zech. 10:1; Mal. 3:10.
  - type: text
    content: '—showers will come down in their season. '
