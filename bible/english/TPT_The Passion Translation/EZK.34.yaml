  - type: note
    content: Or “I will restrain you from tending the flock.”
  - type: text
    content: No longer will you feed only yourselves because I will rescue my sheep from your mouths. You will help yourselves to my sheep no longer.’ ”
  - type: note
    content: Or “My flock will no longer be a source of food for you!” This prophecy (vv. 1–10) is an elaboration of Jeremiah’s prophecy in Jer. 23:1–8.
  - type: heading
