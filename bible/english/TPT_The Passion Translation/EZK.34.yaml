  - type: text
    content: 'Foreign powers will no longer plunder them; the wild beasts of the land will no longer feast on them. They will live safe and secure, with no one to frighten them. '
  '29':
  - type: text
    content: 'I will establish for them a planting of renown '
  - type: note
    content: Or “a famous planting.” Jesus Christ is that “famous planting” or “planting of renown” that was planted into our hearts as the Seed of God (1 Peter 1:23).
  - type: text
    content: 'so that they will no longer suffer from famine. '
  - type: note
