  '4':
  - type: text
    content: 'You haven’t cared for the weak ones, brought healing to the sick, nor bandaged those who are injured. '
  - type: note
    content: These “sheep” (v. 3) represent followers of God who are often found weak, wounded, and needing inner healing. True shepherds will care for them and bring them into wholeness. See Luke 10:29–36; Gal. 6:1.
  - type: text
    content: 'You haven’t looked for the strays nor brought the lost back '
  - type: text
    content: to the fold
  - type: text
    content: '. Instead, you have ruled over them cruelly and treated them harshly. '
