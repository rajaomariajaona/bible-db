  '13':
  - type: text
    content: 'I will bring them back from foreign countries and gather them together '
  - type: text
    content: as my flock
  - type: text
    content: ' and return them to their own land. I will feed them on the mountains of Israel, '
  - type: note
    content: The “mountains” were where the bad shepherds failed to care for the flock. Yahweh, the Good Shepherd, will feed them there.
  - type: text
    content: 'in the valley streams and in all the fertile places. '
  - type: note
    content: Or “in all the inhabited places of the country,” that is, the fertile regions where people could live off the land.
  '14':
  - type: text
    content: 'I will feed them in fair meadows and on the slopes of the mountains of Israel. There they will lie down in good grazing grounds and graze in green pastures on the mountains of Israel. '
  '15':
  - type: text
    content: 'I myself will be the shepherd of my sheep, and I will give them rest. I will seek out the lost one, bring back the stray, bandage the injured, and heal those that are sick. I will watch over '
  - type: note
    content: As translated from ancient versions, which make a minor change to the Hebrew. The Hebrew is “I will destroy.”
  - type: text
