  '17':
  - type: text
    content: '“ ‘As for you, my sheep, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: I am the one who judges between one sheep and the other, between rams and billy goats. '
  '18':
  - type: text
    content: 'Since you’re not satisfied with feeding from the best pastures, you also trample down the rest of the grass. You’re not satisfied to drink the clean water; must you also muddy up the rest of the water with your feet? '
  '19':
  - type: text
    content: 'Is it right that my sheep have to eat what you have walked all over? Is it right that they must drink muddy water because of your trampling feet? '
  '2':
  - type: text
    content: '“Son of man, prophesy against the leaders '
  - type: note
    content: Or “shepherds.”
  - type: text
    content: 'of Israel; prophesy and say to them, ‘Listen, you leaders, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' has a message for you: Disaster is in store for the shepherds of Israel whose only concern is to feed themselves. Aren’t shepherds supposed to feed the sheep? '
  '20':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: I am the one who judges between the strong sheep and the weak. '
  - type: note
    content: Or “the fat sheep and the lean sheep.”
  '21':
  - type: text
    content: 'Because you shove with your side and your shoulder and thrust your horns at all the weak sheep until you scatter them, therefore, '
  '22':
  - type: text
    content: I will come and save my sheep and rescue them from being victimized. I will judge between one sheep and another.
  '23':
  - type: text
    content: '“ ‘I will raise up one shepherd over them, '
  - type: text
    content: like
  - type: text
    content: ' my servant David, '
  - type: note
    content: The reference to David cannot be literal since he died nearly four hundred years prior to Ezekiel’s ministry in Babylon. However, the prophetic context of this section clearly indicates that the reference to David is typological. He is one of the greatest Messianic forerunners in the Old Testament of the Lord Jesus Christ—the perfect embodiment of the Good Shepherd—and he is undoubtedly anticipated by this profound metaphorical description (see v. 24).
  - type: text
    content: 'and put him in charge of my flock to feed them. He will care for them and be their shepherd. '
