document_id: PRO.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Wisdom’s Virtues
  - type: text
    content: A simple, humble life with peace and quiet
  - type: text
    content: is far better than an opulent lifestyle with nothing
  - type: text
    content: but quarrels and strife at home.
  '10':
  - type: text
    content: One word of correction breaks open a teachable heart,
  - type: text
    content: but a fool can be corrected a hundred times
  - type: text
    content: and still not know what hit him.
  '11':
  - type: text
    content: Rebellion thrives in an evil man,
  - type: text
    content: 'so a messenger of vengeance '
  - type: note
    content: Or “merciless angels.”
  - type: text
    content: will be sent to punish him.
  - type: note
    content: This could mean an evil spirit or calamities and sorrows.
  '12':
  - type: text
    content: It’s safer to meet a grizzly bear robbed of her cubs
  - type: text
    content: than to confront a reckless fool.
  '13':
  - type: text
    content: The one who returns evil for good
  - type: text
    content: can expect to be treated the same way for the rest of his life.
  - type: note
    content: Or “evil will haunt his house.”
  '14':
  - type: text
    content: Don’t be one who is quick to quarrel,
  - type: text
    content: for an argument is hard to stop,
  - type: text
    content: and you never know how it will end,
  - type: text
    content: so don’t even start down that road!
  - type: note
    content: The Aramaic for this verse reads “To shed blood provokes the judgment of a ruler.”
  '15':
  - type: text
    content: There is nothing God hates more
  - type: text
    content: than condemning the one who is innocent
  - type: text
    content: and acquitting the one who is guilty.
  '16':
  - type: text
    content: Why pay tuition to educate a fool?
  - type: text
    content: For he has no intention of acquiring true wisdom.
  '17':
  - type: text
    content: A dear friend will love you no matter what,
  - type: text
    content: and a family sticks together through all kinds of trouble.
  '18':
  - type: text
    content: It’s stupid to run up bills you’ll never be able to pay
  - type: text
    content: or to cosign for the loan of your friend.
  - type: text
    content: Save yourself the trouble
  - type: text
    content: ' and don’t do either one.'
  '19':
  - type: text
    content: If you love to argue,
  - type: text
    content: then you must be in love with sin.
  - type: text
    content: 'For the one who loves to boast '
  - type: note
    content: Or “he who builds a high gate.” The gate becomes a picture of the mouth. This is a figure of speech for proud boasting.
  - type: text
    content: is only asking for trouble.
  '2':
  - type: text
    content: A wise, intelligent servant will be honored above a shameful son.
  - type: text
    content: He’ll even end up having a portion left to him in his master’s will.
  '20':
  - type: text
    content: The one with a perverse heart never has anything good to say,
  - type: note
    content: Or “can expect calamity.”
  - type: text
    content: and the chronic liar tumbles into constant trouble.
  '21':
  - type: text
    content: Parents of a numbskull will have many sorrows,
  - type: text
    content: for there’s nothing about his lifestyle that will make them proud.
  '22':
  - type: text
    content: A joyful, cheerful heart brings healing to both body and soul.
  - type: text
    content: But the one whose heart is crushed
  - type: text
    content: struggles with sickness and depression.
  '23':
  - type: text
    content: When you take a secret bribe,
  - type: text
    content: your actions reveal your true character,
  - type: text
    content: for you pervert the ways of justice.
  '24':
  - type: text
    content: Even the face of a wise man shows his intelligence.
  - type: text
    content: But the wandering eyes of a fool will look for wisdom everywhere
  - type: text
    content: except right in front of his nose.
  '25':
  - type: text
    content: A father grieves over the foolishness of his child,
  - type: text
    content: and bitter sorrow fills his mother.
  '26':
  - type: text
    content: It’s horrible to persecute a holy lover of God
  - type: text
    content: or to strike an honorable man for his integrity!
  '27':
  - type: text
    content: Can you bridle your tongue when your heart is under pressure?
  - type: text
    content: That’s how you show that you are wise.
  - type: text
    content: An understanding heart keeps you cool, calm, and collected,
  - type: text
    content: no matter what you’re facing.
  '28':
  - type: text
    content: When even a fool bites his tongue
  - type: note
    content: The Septuagint is “When an unthinking man asks a question.”
  - type: text
    content: he’s considered wise.
  - type: text
    content: So shut your mouth when you are provoked—
  - type: text
    content: it will make you look smart.
  '3':
  - type: text
    content: In the same way that gold and silver are refined by fire,
  - type: text
    content: the Lord purifies your heart by the tests and trials of life.
  '4':
  - type: text
    content: Those eager to embrace evil listen to slander,
  - type: text
    content: for a liar loves to listen to lies.
  '5':
  - type: text
    content: Mock the poor, will you?
  - type: text
    content: You insult your Creator every time you do!
  - type: text
    content: If you make fun of others’ misfortune,
  - type: text
    content: you’d better watch out—your punishment is on its way.
  '6':
  - type: text
    content: 'Grandparents have the crowning glory of life:'
  - type: text
    content: grandchildren!
  - type: text
    content: And it’s only proper for children to take pride in their parents.
  - type: note
    content: 'Or “fathers.” There is an additional verse found in the Septuagint that is inserted here: “A whole world of riches belongs to the faithful, but the unfaithful don’t get even a cent.”'
  '7':
  - type: text
    content: It is not proper for a leader to lie and deceive,
  - type: text
    content: and don’t expect excellent words to be spoken by a fool.
  - type: note
    content: Two absurd things are to find a fool in leadership and to have a leader in foolishness.
  '8':
  - type: text
    content: 'Wise instruction '
  - type: note
    content: “Instruction” is taken from the Aramaic and the Septuagint. The Hebrew reads “bribe.”
  - type: text
    content: is like a costly gem.
  - type: text
    content: It turns the impossible into success.
  '9':
  - type: text
    content: Love overlooks the mistakes of others,
  - type: text
    content: but dwelling on the failures of others devastates friendships.
