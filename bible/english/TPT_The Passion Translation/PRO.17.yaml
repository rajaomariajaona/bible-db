document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom’s Virtues
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A simple, humble life with peace and quiet
- type: usfm
  marker: q1
  children:
  - type: text
    text: is far better than an opulent lifestyle with nothing
- type: usfm
  marker: q1
  children:
  - type: text
    text: but quarrels and strife at home.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A wise, intelligent servant will be honored above a shameful son.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He’ll even end up having a portion left to him in his master’s will.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In the same way that gold and silver are refined by fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the Lord purifies your heart by the tests and trials of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those eager to embrace evil listen to slander,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for a liar loves to listen to lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mock the poor, will you?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You insult your Creator every time you do!
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you make fun of others’ misfortune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you’d better watch out—your punishment is on its way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Grandparents have the crowning glory of life:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: grandchildren!
- type: usfm
  marker: q1
  children:
  - type: text
    text: And it’s only proper for children to take pride in their parents.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or “fathers.” There is an additional verse found in the Septuagint that is inserted here: “A whole world of riches belongs to the faithful, but the unfaithful don’t get even a cent.”'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It is not proper for a leader to lie and deceive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and don’t expect excellent words to be spoken by a fool.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Two absurd things are to find a fool in leadership and to have a leader in foolishness.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Wise instruction '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: “Instruction” is taken from the Aramaic and the Septuagint. The Hebrew reads “bribe.”
    marker-yv: yv-n
  - type: text
    text: is like a costly gem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It turns the impossible into success.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Love overlooks the mistakes of others,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but dwelling on the failures of others devastates friendships.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: One word of correction breaks open a teachable heart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but a fool can be corrected a hundred times
- type: usfm
  marker: q1
  children:
  - type: text
    text: and still not know what hit him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Rebellion thrives in an evil man,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'so a messenger of vengeance '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “merciless angels.”
    marker-yv: yv-n
  - type: text
    text: will be sent to punish him.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This could mean an evil spirit or calamities and sorrows.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It’s safer to meet a grizzly bear robbed of her cubs
- type: usfm
  marker: q1
  children:
  - type: text
    text: than to confront a reckless fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The one who returns evil for good
- type: usfm
  marker: q1
  children:
  - type: text
    text: can expect to be treated the same way for the rest of his life.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “evil will haunt his house.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Don’t be one who is quick to quarrel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for an argument is hard to stop,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and you never know how it will end,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so don’t even start down that road!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Aramaic for this verse reads “To shed blood provokes the judgment of a ruler.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: There is nothing God hates more
- type: usfm
  marker: q1
  children:
  - type: text
    text: than condemning the one who is innocent
- type: usfm
  marker: q1
  children:
  - type: text
    text: and acquitting the one who is guilty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Why pay tuition to educate a fool?
- type: usfm
  marker: q1
  children:
  - type: text
    text: For he has no intention of acquiring true wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A dear friend will love you no matter what,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and a family sticks together through all kinds of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: It’s stupid to run up bills you’ll never be able to pay
- type: usfm
  marker: q1
  children:
  - type: text
    text: or to cosign for the loan of your friend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Save yourself the trouble
  - type: text
    text: ' and don’t do either one.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: If you love to argue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then you must be in love with sin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the one who loves to boast '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he who builds a high gate.” The gate becomes a picture of the mouth. This is a figure of speech for proud boasting.
    marker-yv: yv-n
  - type: text
    text: is only asking for trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The one with a perverse heart never has anything good to say,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “can expect calamity.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the chronic liar tumbles into constant trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Parents of a numbskull will have many sorrows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for there’s nothing about his lifestyle that will make them proud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A joyful, cheerful heart brings healing to both body and soul.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the one whose heart is crushed
- type: usfm
  marker: q1
  children:
  - type: text
    text: struggles with sickness and depression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When you take a secret bribe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: your actions reveal your true character,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you pervert the ways of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Even the face of a wise man shows his intelligence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But the wandering eyes of a fool will look for wisdom everywhere
- type: usfm
  marker: q1
  children:
  - type: text
    text: except right in front of his nose.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A father grieves over the foolishness of his child,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and bitter sorrow fills his mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: It’s horrible to persecute a holy lover of God
- type: usfm
  marker: q1
  children:
  - type: text
    text: or to strike an honorable man for his integrity!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Can you bridle your tongue when your heart is under pressure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: That’s how you show that you are wise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: An understanding heart keeps you cool, calm, and collected,
- type: usfm
  marker: q1
  children:
  - type: text
    text: no matter what you’re facing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When even a fool bites his tongue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 17:28
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint is “When an unthinking man asks a question.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: he’s considered wise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So shut your mouth when you are provoked—
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will make you look smart.
