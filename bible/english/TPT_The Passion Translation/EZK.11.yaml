document_id: EZK.11,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem’s Corrupt Leaders
  - type: text
    content: 'God’s Spirit '
  - type: note
    content: Or “A wind.”
  - type: text
    content: 'swept me off my feet and transported me to the eastern gate of the temple of '
  - type: text
    content: Yahweh
  - type: text
    content: '. And behold, there at the entrance to the gate facing east stood twenty-five men, '
  - type: note
    content: It is likely that these twenty-five men were the same as those mentioned in Ezek. 8:16.
  - type: text
    content: including the two officials Jaazaniah son of Azzur and Pelatiah son of Benaiah.
  '10':
  - type: text
    content: 'I will judge you at the border of Israel and you will fall by the sword. Then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'For this city will not be your safe storage pot, nor will you be the meat inside. I will execute justice on you on the border of Israel. '
  '12':
  - type: text
    content: 'And then you will know that I am '
  - type: text
    content: Yahweh
  - type: text
    content: ', whose laws and commands you have disobeyed. Instead, you have embraced the customs of the neighboring nations.’ ”'
  '13':
  - type: text
    content: 'While I was prophesying, Pelatiah son of Benaiah dropped dead. I threw myself facedown to the ground and cried out, “Oh no, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', are you going to annihilate the remnant left in Israel?”'
  - type: heading
    content: Hope for Israel’s Restoration
  '14':
  - type: text
    content: Yahweh
  - type: text
    content: ' spoke to me, saying: '
  '15':
  - type: text
    content: '“Son of man, the people living in Jerusalem are talking about you, your close relatives, and all the people of Israel. They are saying that the people in exile are away from '
  - type: text
    content: Yahweh
  - type: text
    content: '. ‘This country was given to us as our possession!’ '
  - type: note
    content: Jeremiah had already prophesied that Yahweh would favor the exiles, not those spared from deportation (see Jer. 24). Now, those left behind and living in the land considered themselves the chosen ones of the nation.
  '16':
  - type: text
    content: 'Now give this message to your fellow exiles: ‘The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says to you: Although I have sent you far away among the nations and I have scattered you to foreign countries, yet I have been your sanctuary '
  - type: note
    content: See Isa. 8:14.
  - type: text
    content: 'for the time being '
  - type: note
    content: Or “to some extent” or “for a little while.”
  - type: text
    content: 'wherever you have gone.’ '
  '17':
  - type: text
    content: 'And tell them, ‘The Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: I will gather you back from the peoples, and draw you together from the countries where you have been scattered and give you the land of Israel. '
  - type: note
    content: Literally “the dirt [dust] of Israel,” possibly a hint that God will give them the “nature” of Israel (Israel means “a prince with God”; see Gen. 32:28 and footnote).
  '18':
  - type: text
    content: 'When you return, '
  - type: note
    content: That is, when they return to the Father, not just return to the land.
  - type: text
    content: 'you will purge the land of all its filthy '
  - type: text
    content: idols
  - type: text
    content: ' and detestable practices. '
  '19':
  - type: text
    content: 'I will give you a new, undivided heart, '
  - type: note
    content: Or “a different heart” (LXX) or “I will give them one [undivided] heart.” For the believer today, this is fulfilled by our new birth, our life given from above.
  - type: text
    content: 'and I will put a new spirit in you. I will remove your '
  - type: text
    content: stubborn
  - type: text
    content: ' heart of stone and give you a tender heart that responds to me—a '
  - type: text
    content: devoted
  - type: text
    content: ' heart. '
  - type: note
    content: Or “a heart of flesh.”
  '2':
  - type: text
    content: 'Then '
  - type: text
    content: Yahweh
  - type: text
    content: ' '
  - type: note
    content: As found in the Septuagint and Syriac. The Hebrew is “he.”
  - type: text
    content: 'said to me, “Son of man, these men are making evil plans to spread their wicked counsel throughout this city. '
  '20':
  - type: text
    content: 'Therefore, you will keep my laws and faithfully obey my commands. Then you will truly be the people of my '
  - type: text
    content: heart
  - type: text
    content: ', and I will be the God '
  - type: text
    content: you worship
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'But I will punish those whose hearts are devoted to their filthy '
  - type: text
    content: idols
  - type: text
    content: ' and detestable practices. I will repay them for their conduct, declares Lord '
  - type: text
    content: Yahweh
  - type: text
    content: .’ ”
  - type: heading
    content: The Glory of Yahweh Leaves Jerusalem
  '22':
  - type: text
    content: 'Then the cherubim raised their wings '
  - type: text
    content: to fly
  - type: text
    content: ', and the wheels moved in unison with them; above them was the '
  - type: text
    content: radiant
  - type: text
    content: ' glory of the God of Israel. '
  '23':
  - type: text
    content: 'And the glory of '
  - type: text
    content: Yahweh
  - type: text
    content: ' went up from Jerusalem and stood above the mountain to the east of the city.'
  - type: note
    content: That is, the Mount of Olives, where Jesus stood and wept over Jerusalem (see Luke 19:41).
  '24':
  - type: text
    content: 'Then, the Spirit snatched me away and transported me back among the exiles in Babylon. This was the vision given to me by the Spirit of God. '
  - type: note
    content: Everything Ezekiel describes in chs. 8–11 was what the prophet experienced in a trance-like vision.
  - type: text
    content: 'Then the vision faded away. '
  '25':
  - type: text
    content: 'And I told the exiles everything that '
  - type: text
    content: Yahweh
  - type: text
    content: ' had revealed to me.'
  '3':
  - type: text
    content: 'They say, ‘Isn’t it time to start building houses again? '
  - type: note
    content: Or possibly “This is not yet the time to be building houses.”
  - type: text
    content: 'Jerusalem is like an iron storage pot, and we are like meat, stored safely away.’ '
  - type: note
    content: Or “The city [Jerusalem] is a cooking pot, and we are the meat.”
  '4':
  - type: text
    content: Therefore, prophesy against them. Prophesy, son of man!”
  '5':
  - type: text
    content: 'Then the Spirit of '
  - type: text
    content: Yahweh
  - type: text
    content: ' fell '
  - type: note
    content: That is, the Holy Spirit overpowered the prophet. See 1 Sam. 10:6; 1 Kings 22:24.
  - type: text
    content: 'on me, and said to me, “Tell the people: ‘I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', say to the people of Israel, I know what you think, your every secret thought. '
  '6':
  - type: text
    content: 'You have murdered so many people in this city that its streets are filled with corpses. '
  '7':
  - type: text
    content: 'Therefore, Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' says this: Yes, this city is the pot, and the corpses you have thrown into the streets, they are the meat! But I will drive you out of the city. '
  - type: note
    content: As translated from most ancient versions. The Hebrew is, “He has brought you out of it [the city].”
  '8':
  - type: text
    content: 'Are you afraid of the sword? Then I will bring the sword against you, declares the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'And I will bring you to justice and will drive you out of Jerusalem and hand you over to foreigners! '
