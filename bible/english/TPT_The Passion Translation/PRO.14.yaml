document_id: PRO.14,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The House of Wisdom
  - type: text
    content: Every wise woman encourages and builds up her family,
  - type: text
    content: but a foolish woman over time will tear it down by her own actions.
  '10':
  - type: text
    content: Don’t expect anyone else to fully understand
  - type: text
    content: both the bitterness and the joys
  - type: text
    content: of all you experience in your life.
  '11':
  - type: text
    content: The household of the wicked is soon torn apart,
  - type: text
    content: while the family of the righteous flourishes.
  '12':
  - type: text
    content: You can rationalize it all you want
  - type: text
    content: and justify the path of error you have chosen,
  - type: text
    content: but you’ll find out in the end that you took the road to destruction.
  '13':
  - type: text
    content: Superficial laughter can hide a heavy heart,
  - type: text
    content: but when the laughter ends, the pain resurfaces.
  '14':
  - type: text
    content: Those who turn from the truth get what they deserve,
  - type: text
    content: but a good person receives a sweet reward.
  - type: note
    content: As translated from Hebrew manuscripts. The Aramaic is “a good man will be filled from the awe of his soul.”
  '15':
  - type: text
    content: A gullible person will believe anything,
  - type: text
    content: but a sensible person will confirm the facts.
  '16':
  - type: text
    content: A wise person is careful in all things and turns quickly from evil,
  - type: text
    content: while the impetuous fool moves ahead with overconfidence.
  '17':
  - type: text
    content: An impulsive person has a short fuse and can ruin everything,
  - type: text
    content: but the wise show self-control.
  - type: note
    content: As translated from the Aramaic. The Hebrew is “and a crafty schemer is hated.” The Greek Septuagint is “a sensible man bears up under many things.”
  '18':
  - type: text
    content: The naïve demonstrate a lack of wisdom,
  - type: text
    content: but the lovers of wisdom are crowned with revelation-knowledge.
  '19':
  - type: text
    content: Evil ones will pay tribute to good people
  - type: text
    content: and eventually come to be servants of the godly.
  - type: note
    content: The Hebrew phrase literally means “they will come [or bow] at the gates of the righteous.”
  '2':
  - type: text
    content: Lovers of truth follow the right path
  - type: text
    content: because of their wonderment and worship of God.
  - type: text
    content: But the devious display their disdain for him.
  '20':
  - type: text
    content: The poor are disliked even by their neighbors,
  - type: text
    content: but everyone wants to get close to the wealthy.
  '21':
  - type: text
    content: It’s a sin to despise one who is less fortunate than you,
  - type: note
    content: Implied in the Hebrew parallelism. The Hebrew phrase here literally means “your neighbor.”
  - type: text
    content: but when you are kind to the poor,
  - type: text
    content: you will prosper and be blessed.
  '22':
  - type: text
    content: Haven’t you noticed how evil schemers always wander astray?
  - type: text
    content: But kindness and truth come to those
  - type: text
    content: who make plans to be pure in all their ways.
  - type: note
    content: 'Both the Aramaic and the Septuagint insert a verse here that is not found in the Hebrew: “The followers of evil don’t understand mercy and faith, but you’ll find kindness and faith with those who do good.”'
  '23':
  - type: text
    content: If you work hard at what you do,
  - type: text
    content: great abundance will come to you.
  - type: text
    content: But merely talking about getting rich
  - type: text
    content: while living to only pursue your pleasures
  - type: note
    content: As translated from the Septuagint.
  - type: text
    content: brings you face-to-face with poverty.
  - type: note
    content: 'There is an additional verse found here in the Aramaic that is missing from the Hebrew text: “The Lord Yahweh heals every sickness, but evil speaking makes you sick [harms you].”'
  '24':
  - type: text
    content: 'The true net worth of the wise '
  - type: note
    content: Or “the crown of the wise.”
  - type: text
    content: is the wealth that wisdom imparts.
  - type: text
    content: But the way of life for the fool is his foolishness.
  - type: note
    content: The Aramaic word translated here as “foolishness” can also mean “insanity.”
  '25':
  - type: text
    content: Speak the truth and you’ll save souls,
  - type: text
    content: but in the spreading of lies treachery thrives.
  '26':
  - type: text
    content: Confidence and strength flood the hearts
  - type: text
    content: of the lovers of God who live in awe of him,
  - type: text
    content: and their devotion provides their children
  - type: text
    content: with a place of shelter and security.
  - type: note
    content: To live as a passionate lover of God will bring benefit even to your children.
  '27':
  - type: text
    content: To worship God in wonder and awe
  - type: text
    content: opens a fountain of life within you,
  - type: text
    content: empowering you to escape death’s domain.
  - type: note
    content: Or “empowering you to turn from the deadly snares.”
  '28':
  - type: text
    content: A king glories in the number of his loyal followers,
  - type: text
    content: but a dwindling population spells ruin for any leader.
  '29':
  - type: text
    content: When your heart overflows with understanding
  - type: text
    content: you’ll be very slow to get angry.
  - type: text
    content: But if you have a quick temper,
  - type: text
    content: your impatience will be quickly seen by all.
  '3':
  - type: text
    content: The words of a proud fool will all come back to haunt him.
  - type: text
    content: But the words of the wise
  - type: text
    content: will become a shield of protection around them.
  '30':
  - type: text
    content: A tender, tranquil heart will make you healthy,
  - type: note
    content: Or “A heart of healing is the life of the flesh.”
  - type: text
    content: but jealousy can make you sick.
  '31':
  - type: text
    content: Insult your Creator, will you?
  - type: text
    content: That’s exactly what you do
  - type: text
    content: every time you oppress the powerless!
  - type: note
    content: Or “slander the poor.” Every human being is made in God’s image, including the poor.
  - type: text
    content: Showing kindness to the poor is equal to honoring your maker.
  '32':
  - type: text
    content: The wicked are crushed by every calamity,
  - type: text
    content: but the righteous find a strong hope
  - type: text
    content: in the time of death.
  - type: note
    content: 'As translated from the Masoretic Text. Our strong hope is that our lives will continue in the presence of God in the resurrection glory. Both the Septuagint and the Aramaic read quite differently: “but the righteous have a refuge in their integrity.”'
  '33':
  - type: text
    content: Wisdom soothes the heart of the one with living-understanding,
  - type: text
    content: but the heart of the fool just stockpiles stupidity.
  '34':
  - type: text
    content: A nation is exalted by the righteousness of its people,
  - type: text
    content: but sin heaps disgrace upon the land.
  '35':
  - type: text
    content: A wise and faithful servant receives promotion from the king,
  - type: text
    content: but the one who acts disgracefully
  - type: text
    content: gets to taste the anger of the king.
  - type: note
    content: As translated from the Hebrew. The Septuagint reads “and by his good behavior shame is removed.”
  '4':
  - type: text
    content: The only clean stable is an empty stable.
  - type: text
    content: So if you want the work of an ox and to enjoy an abundant harvest,
  - type: text
    content: you’ll have a mess or two to clean up!
  '5':
  - type: text
    content: An honest witness will never lie,
  - type: text
    content: but a deceitful witness lies with every breath.
  '6':
  - type: text
    content: The intellectually arrogant seek for wisdom,
  - type: text
    content: but they never seem to discover
  - type: text
    content: what they claim they’re looking for.
  - type: text
    content: For revelation-knowledge flows to the one
  - type: text
    content: who hungers for understanding.
  '7':
  - type: text
    content: The words of the wise are like weapons of knowledge.
  - type: note
    content: As translated from the Aramaic.
  - type: text
    content: If you need wise counsel, stay away from the fool.
  '8':
  - type: text
    content: For the wisdom of the wise will keep life on the right track,
  - type: text
    content: while the fool only deceives himself
  - type: text
    content: and refuses to face reality.
  '9':
  - type: text
    content: Fools mock the need for repentance,
  - type: note
    content: Or “Fools mock guilt [or guilt offering].” The Septuagint is “The house of the transgressor owes purification.”
  - type: text
    content: while the favor of God rests upon all his lovers.
