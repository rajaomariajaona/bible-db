document_id: PRO.14,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The House of Wisdom
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Every wise woman encourages and builds up her family,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a foolish woman over time will tear it down by her own actions.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Don’t expect anyone else to fully understand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both the bitterness and the joys
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of all you experience in your life.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The household of the wicked is soon torn apart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the family of the righteous flourishes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You can rationalize it all you want
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and justify the path of error you have chosen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but you’ll find out in the end that you took the road to destruction.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Superficial laughter can hide a heavy heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when the laughter ends, the pain resurfaces.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who turn from the truth get what they deserve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a good person receives a sweet reward.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from Hebrew manuscripts. The Aramaic is “a good man will be filled from the awe of his soul.”
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A gullible person will believe anything,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a sensible person will confirm the facts.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise person is careful in all things and turns quickly from evil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the impetuous fool moves ahead with overconfidence.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An impulsive person has a short fuse and can ruin everything,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the wise show self-control.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic. The Hebrew is “and a crafty schemer is hated.” The Greek Septuagint is “a sensible man bears up under many things.”
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The naïve demonstrate a lack of wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the lovers of wisdom are crowned with revelation-knowledge.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil ones will pay tribute to good people
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and eventually come to be servants of the godly.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew phrase literally means “they will come [or bow] at the gates of the righteous.”
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lovers of truth follow the right path
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of their wonderment and worship of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the devious display their disdain for him.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor are disliked even by their neighbors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but everyone wants to get close to the wealthy.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It’s a sin to despise one who is less fortunate than you,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Implied in the Hebrew parallelism. The Hebrew phrase here literally means “your neighbor.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when you are kind to the poor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will prosper and be blessed.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Haven’t you noticed how evil schemers always wander astray?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But kindness and truth come to those
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who make plans to be pure in all their ways.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Both the Aramaic and the Septuagint insert a verse here that is not found in the Hebrew: “The followers of evil don’t understand mercy and faith, but you’ll find kindness and faith with those who do good.”'
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you work hard at what you do,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: great abundance will come to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But merely talking about getting rich
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while living to only pursue your pleasures
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Septuagint.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brings you face-to-face with poverty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'There is an additional verse found here in the Aramaic that is missing from the Hebrew text: “The Lord'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Yahweh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: heals every sickness, but evil speaking makes you sick [harms you].”
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The true net worth of the wise '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “the crown of the wise.”
      marker-yv: yv-n
    - type: text
      text: is the wealth that wisdom imparts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the way of life for the fool is his foolishness.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Aramaic word translated here as “foolishness” can also mean “insanity.”
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Speak the truth and you’ll save souls,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but in the spreading of lies treachery thrives.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confidence and strength flood the hearts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: of the lovers of God who live in awe of him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and their devotion provides their children
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with a place of shelter and security.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: To live as a passionate lover of God will bring benefit even to your children.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To worship God in wonder and awe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: opens a fountain of life within you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: empowering you to escape death’s domain.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “empowering you to turn from the deadly snares.”
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A king glories in the number of his loyal followers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a dwindling population spells ruin for any leader.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When your heart overflows with understanding
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll be very slow to get angry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if you have a quick temper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your impatience will be quickly seen by all.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of a proud fool will all come back to haunt him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the words of the wise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will become a shield of protection around them.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A tender, tranquil heart will make you healthy,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “A heart of healing is the life of the flesh.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but jealousy can make you sick.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Insult your Creator, will you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That’s exactly what you do
  - type: usfm
    marker: q1
    children:
    - type: text
      text: every time you oppress the powerless!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “slander the poor.” Every human being is made in God’s image, including the poor.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Showing kindness to the poor is equal to honoring your maker.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked are crushed by every calamity,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the righteous find a strong hope
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in the time of death.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'As translated from the Masoretic Text. Our strong hope is that our lives will continue in the presence of God in the resurrection glory. Both the Septuagint and the Aramaic read quite differently: “but the righteous have a refuge in their integrity.”'
      marker-yv: yv-n
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Wisdom soothes the heart of the one with living-understanding,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the heart of the fool just stockpiles stupidity.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A nation is exalted by the righteousness of its people,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but sin heaps disgrace upon the land.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wise and faithful servant receives promotion from the king,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the one who acts disgracefully
  - type: usfm
    marker: q1
    children:
    - type: text
      text: gets to taste the anger of the king.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Hebrew. The Septuagint reads “and by his good behavior shame is removed.”
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The only clean stable is an empty stable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So if you want the work of an ox and to enjoy an abundant harvest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you’ll have a mess or two to clean up!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: An honest witness will never lie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but a deceitful witness lies with every breath.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The intellectually arrogant seek for wisdom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but they never seem to discover
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what they claim they’re looking for.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For revelation-knowledge flows to the one
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who hungers for understanding.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The words of the wise are like weapons of knowledge.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: As translated from the Aramaic.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you need wise counsel, stay away from the fool.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the wisdom of the wise will keep life on the right track,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the fool only deceives himself
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and refuses to face reality.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fools mock the need for repentance,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 14:9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “Fools mock guilt [or guilt offering].” The Septuagint is “The house of the transgressor owes purification.”
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while the favor of God rests upon all his lovers.
