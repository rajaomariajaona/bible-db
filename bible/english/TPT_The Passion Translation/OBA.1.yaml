document_id: OBA.1,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment Pronounced on Edom
  - type: text
    content: 'This is the vision that Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ' revealed'
  - type: text
    content: to Obadiah concerning Edom.
  - type: text
    content: 'We have heard a report '
  - type: note
    content: Or “message” or “directive.”
  - type: text
    content: 'from '
  - type: text
    content: Yahweh
  - type: text
    content: ':'
  - type: text
    content: “I have sent a messenger throughout the nations, saying,
  - type: text
    content: ‘Rise up! Let us march against this people.
  - type: text
    content: Prepare for war!’
  '10':
  - type: text
    content: “Shame will cover you
  - type: text
    content: and you will be annihilated
  - type: text
    content: because you violently slaughtered
  - type: note
    content: This is the Hebrew word chamas (or hamas in an alternate transliteration style).
  - type: text
    content: your relatives, the Israelites.
  - type: note
    content: Or “your brother Jacob.” Jacob is a synecdoche for the land of Judah. The Edomites violently mistreated their distant relatives and became Israel’s perpetual enemies. See Gen. 25:22–28; 27:27–29; 32:4–33:16; Num. 20:14–21; Deut. 23:7–8; Ps. 137:7; Lam. 4:21–22; Ezek. 25:12–14; 35:5–12; 36:2, 5.
  '11':
  - type: text
    content: You deserted Israel at her time of need.
  - type: text
    content: 'On that day '
  - type: text
    content: of infamy
  - type: text
    content: ', you stood aloof and did nothing'
  - type: text
    content: as foreigners broke through the city gates of Jerusalem
  - type: note
    content: Verses 11–14 may also be seen as predictive prophecy of the events surrounding the destruction of the Second Temple and sacking of Jerusalem in AD 70 by the Romans. The Edomites were called the Idumeans by then. At that time, much as with these events that Obadiah narrated (the destruction of the First Temple and sacking of Jerusalem in 586 BC by the Babylonians), the Edomites failed to help their brothers.
  - type: text
    content: and divided the city among themselves by casting lots.
  - type: text
    content: Strangers carried off all her treasures,
  - type: text
    content: and you were as one with the invaders.
  '12':
  - type: text
    content: Do not gloat over your relatives
  - type: text
    content: on the day of their misfortune.
  - type: text
    content: Do not rejoice over the people of Judah
  - type: text
    content: on the day of their ruin.
  - type: note
    content: All the verbs of v. 12 are imperatives. Literally “Gloat not . . . rejoice not . . . boast not.” See Mic. 4:11.
  - type: text
    content: Do not boast
  - type: note
    content: Or “make your mouth big,” which could mean derisive laughter.
  - type: text
    content: that they suffered such anguish.
  '13':
  - type: text
    content: You should not have entered my people’s city
  - type: text
    content: on their day of calamity.
  - type: note
    content: There is a wordplay in the Hebrew that is lost in translation, as the word for “calamity” resembles the name Edom. See Ezek. 35:5.
  - type: text
    content: You should not have feasted your eyes on their suffering
  - type: text
    content: on their day of misery.
  - type: text
    content: You should not have seized their wealth
  - type: text
    content: on their day of sorrow.
  '14':
  - type: text
    content: You should not have waited at the crossroads
  - type: text
    content: 'to cut off '
  - type: note
    content: Or “kill.”
  - type: text
    content: those who tried to escape.
  - type: text
    content: Why did you hand over their survivors
  - type: text
    content: on the day of their distress?”
  - type: heading
    content: God Will Judge the Nations
  '15':
  - type: text
    content: '“The day of '
  - type: text
    content: Yahweh
  - type: text
    content: ' is drawing near'
  - type: text
    content: for all the nations.
  - type: text
    content: 'As you have done to others, so will it be done to you:'
  - type: text
    content: you will be paid back for all that your deeds deserve.
  - type: note
    content: This is lex talionis, Latin for “the law of retribution.” This approach to justice is found in numerous verses of the Old Testament. See Ex. 21:23–26; Deut. 19:21; Jer. 50:15, 29; Lam. 3:64; Joel 3:4, 7.
  '16':
  - type: text
    content: '“Just as you have drunk '
  - type: text
    content: and caroused
  - type: text
    content: on my sacred hill,
  - type: note
    content: That is, Mount Zion (Jerusalem). See Ezek. 35:12.
  - type: text
    content: so all the surrounding nations
  - type: text
    content: will drink continually from my bitter cup of judgment.
  - type: note
    content: The metaphor of a cup of wine is frequently used for God’s punishment (see Ps. 75:8; Jer. 25:15–29; 49:12; Hab. 2:16). The New Testament uses the metaphor of a cup pointing both to Christ’s suffering (see Mark 14:36; John 18:11) and God’s anger (see Rev. 14:10; 16:19).
  - type: text
    content: They will drink and drink and gulp it down,
  - type: text
    content: but they will stagger and be destroyed.”
  - type: heading
    content: Israel Will Defeat Her Enemies
  '17':
  - type: text
    content: “But on Mount Zion a remnant will escape,
  - type: text
    content: for that place will be a reconsecrated sanctuary.
  - type: text
    content: And Jacob’s tribes will possess
  - type: text
    content: what is rightfully theirs by inheritance.
  - type: note
    content: Or “Jacob will dispossess those that dispossessed them.”
  '18':
  - type: text
    content: 'Then the people of Judah '
  - type: note
    content: Or “house of Jacob.”
  - type: text
    content: will be a fire,
  - type: text
    content: 'the people of Israel '
  - type: note
    content: Or “house of Joseph.”
  - type: text
    content: a flame,
  - type: text
    content: 'and the people of Esau '
  - type: note
    content: Or “house of Esau”—that is, the Edomites.
  - type: text
    content: like stubble.
  - type: text
    content: They will set them on fire and consume them,
  - type: text
    content: and there will be no survivors from Esau’s descendants.
  - type: note
    content: Esau’s descendants, the Edomites, became known as the Idumeans, who eventually disappeared from history. The Herods of the New Testament were Idumeans. But after the wars between Rome and the Jews, the Idumeans were never heard from again.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: heading
    content: The New Israel
  '19':
  - type: text
    content: People from southern Judah will capture Edom;
  - type: note
    content: Or “the mountains of Esau.”
  - type: text
    content: those from the western foothills will occupy Philistia;
  - type: text
    content: Israelites will take back the territory of Ephraim and Samaria;
  - type: text
    content: and the people of Benjamin will possess Gilead.
  '2':
  - type: text
    content: “Behold, I have reduced you to the least among the nations.
  - type: text
    content: You are now utterly despised.
  '20':
  - type: text
    content: The company of exiles from among the people of Israel
  - type: text
    content: will possess the land of the Canaanites as far as Zarephath
  - type: note
    content: The town of Zarephath was where the prophet Elijah lived for a while (see 1 Kings 17:9–10; Luke 4:26). Zarephath was in modern-day Lebanon.
  - type: text
    content: while the exiles from Jerusalem now in Sardis
  - type: note
    content: Or “Sepharad.” Sepharad means “separated.” The exact location of Sepharad is uncertain, and a number of possible locations have been suggested, including Spain, Media, and Libya. Modern scholarly opinion tends to agree that Sepharad is another name for the town of Sardis, the capital city of Lydia in Asia Minor. Archaeologists found in Sardis an inscription dated from the 400s BC that noted a significant Jewish community there at that time.
  - type: text
    content: will occupy the cities of southern Judah.
  '21':
  - type: text
    content: 'Victorious deliverers '
  - type: note
    content: Or “saviors,” “avengers,” or “liberators.”
  - type: text
    content: will go out from Mount Zion
  - type: note
    content: Or “up to Mount Zion.”
  - type: text
    content: 'to rule '
  - type: note
    content: Or “to judge.”
  - type: text
    content: over the land of Edom,
  - type: note
    content: Or “the hill country of Esau.”
  - type: text
    content: 'and the kingdom will be '
  - type: text
    content: Yahweh
  - type: text
    content: ’s.
  - type: note
    content: Or “Yahweh himself will be king.”
  '3':
  - type: text
    content: Your proud heart has deceived you;
  - type: text
    content: you who are perched in the hidden places of the rock,
  - type: note
    content: Pride has the power to deceive and to destroy. The antidote to pride is hiding ourselves in the Rock, Jesus Christ, making his righteousness our own.
  - type: text
    content: whose home is in the heights.
  - type: note
    content: That is, Edom’s capital, Ha-Sela, which some believe is now Petra in Jordan. The Edomites were driven out of Petra by the Nabateans around 400 BC. The Edomites eventually settled south of Judea and were known by the Romans as Idumeans. Sela (selaʿ is Hebrew for “rock”) and Petra (a later Nabatean city; petra is Greek for “rock”) are often confused with each other. The entire landscape of Edom is, indeed, rocky and elevated.
  - type: text
    content: You think to yourself,
  - type: text
    content: ‘Who can ever topple me to the ground?’
  '4':
  - type: text
    content: Though you soar like an eagle,
  - type: text
    content: and your nest is nestled among the stars,
  - type: text
    content: I am more than able to bring you down from there.
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.”'
  - type: note
    content: See the similarities between vv. 1–4 and Jer. 49:14–16.
  - type: heading
    content: Edom Annihilated
  '5':
  - type: text
    content: '“When thieves come at night to rob '
  - type: text
    content: your home
  - type: text
    content: ','
  - type: text
    content: wouldn’t they only steal the things they wanted?
  - type: text
    content: When people gather grapes,
  - type: text
    content: wouldn’t they miss a few and leave some gleanings behind?
  - type: text
    content: But you, Edom—your enemies will totally destroy you!
  - type: note
    content: Or “how [totally] you will be destroyed!”
  '6':
  - type: text
    content: 'How Esau’s '
  - type: note
    content: Esau is used here as a synecdoche for the Edomites, of whom Esau was the progenitor. See Gen. 36:1, 8, 19.
  - type: text
    content: descendants
  - type: text
    content: ' will be looted,'
  - type: text
    content: 'their hidden treasures sought out '
  - type: text
    content: and ransacked
  - type: text
    content: '!'
  - type: note
    content: Compare vv. 5–6 with Jer. 49:9–10. It is possible that Jeremiah quoted Obadiah. However, some scholars believe Obadiah was quoting Jeremiah.
  '7':
  - type: text
    content: Your allies will deceive you.
  - type: text
    content: They will overpower you and chase you off your homeland.
  - type: text
    content: 'Your ‘trusted friends’ '
  - type: note
    content: Or “men of your peace your bread [those you sat and ate with].” There is the sense of “those from your close friendship circle,” denoted by the Hebrew phrase ʾaneshe shelomeka lechem. This reading is legitimated by the term shalom within that phrase, which covers a broad semantic field, denoting the primary senses of “peace,” “wholeness,” “[sound] health,” “prosperity,” and “friendship.”
  - type: text
    content: will lay a trap for you,
  - type: note
    content: See Ps. 41:9.
  - type: text
    content: and you’ll have no clue it’s coming.
  - type: note
    content: Or “he has no understanding.”
  '8':
  - type: text
    content: In that day, will I not destroy all the wise men of Edom
  - type: text
    content: 'and erase all their '
  - type: text
    content: pseudo
  - type: text
    content: -intelligence from the mountains of Esau?
  - type: text
    content: 'I, '
  - type: text
    content: Yahweh
  - type: text
    content: ', have spoken.'
  '9':
  - type: text
    content: 'Teman, '
  - type: note
    content: Teman was a major city of northern Edom and is here used to designate the entire country.
  - type: text
    content: all your brave warriors will be shattered
  - type: text
    content: so that everyone will be destroyed from Esau’s mountain.”
  - type: note
    content: That is, the kingdom of Edom.
  - type: heading
    content: Edom’s Guilt
