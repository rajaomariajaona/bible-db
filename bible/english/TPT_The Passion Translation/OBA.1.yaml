          text: may also be seen as predictive prophecy of the events surrounding the destruction of the Second Temple and sacking of Jerusalem in AD 70 by the Romans. The Edomites were called the Idumeans by then. At that time, much as with these events that Obadiah narrated (the destruction of the First Temple and sacking of Jerusalem in 586 BC by the Babylonians), the Edomites failed to help their brothers.
