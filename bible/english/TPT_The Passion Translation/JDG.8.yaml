    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Gideon replied, “What have I accomplished compared to you? What your tribe did is worth so much more than what my whole clan has done. '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
