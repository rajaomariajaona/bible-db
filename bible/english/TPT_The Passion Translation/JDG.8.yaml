        text: 8:2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Is not the gleaning of Ephraim better than the vintage of Abiezer?” This is a figure of speech, or proverb, meant to assuage the anger of the Ephraimites. Gideon was telling them that their mop-up operation was more effective than what Gideon and his army did.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: After all, through the power of God, you killed both Midianite chiefs, Oreb and Zeeb. What have I done compared with you?” After he said this, they calmed down and were no longer so angry.
