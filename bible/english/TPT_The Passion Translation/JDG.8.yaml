    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ephraim, the strongest and largest of the northern tribes, resented that a smaller tribe near their territory went into battle without them. Their pride had been wounded, and now they were jealous.
    marker-yv: yv-n
  - type: text
    text: got into a heated argument with Gideon and complained to him, “Why didn’t you tell us you were going to fight the Midianites? Why did you do that to us?”
- type: usfm
  marker: p
  children:
