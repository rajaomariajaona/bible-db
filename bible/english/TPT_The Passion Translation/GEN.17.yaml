document_id: GEN.17,1849
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Covenant of Circumcision
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When Abram was ninety-nine years old, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Thirteen years elapsed between chs.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '16'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: and
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Abram and Sarai were incapable of conceiving a child. See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rom. 4:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Yahweh
    - type: text
      text: ' appeared to him '
    - type: usfm
      marker: it
      children:
      - type: text
        text: again
    - type: text
      text: ' and said, “I am the God who is more than enough. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “I am El Shaddai.” This is the most frequently used name for God prior to the Law being given at Sinai.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is one of the words for God.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shaddai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: it
        children:
        - type: text
          text: šadday
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) is taken from a Hebrew root word that carries multiple expressive meanings. It can mean “God of the Holy Mountain,” “God of the Wilderness,” “God the Destroyer of Enemies,” “God the All-Sufficient One,” “God the Nurturer of Babies [the Breasted One],” “God the Almighty,” “the Sovereign God,” or “the God who is more than enough.” The combination of
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Almighty) with
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Shaddai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: describes the tender heart of God, one who cares for his beloved ones. To a man ninety-nine years of age, God All-Sufficient was a revelation that would sustain Abraham.
      marker-yv: yv-n
    - type: text
      text: 'Live your life in my presence '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “before me.” Living consciously before God frees us from the false self that lives only before others.
      marker-yv: yv-n
    - type: text
      text: 'and be blameless. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: tamim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: can also mean “perfect,” “complete,” “whole,” or “full.” The more-than-enough God is telling Abram to walk continuously in the fullness of God’s presence, which will make him perfect and complete. A new revelation of God’s goodness (The God of more than enough) will always be followed by a new challenge (walk blameless before God). Because he is Almighty, we can live in holiness, following his ways.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'So here is the '
    - type: usfm
      marker: it
      children:
      - type: text
        text: sign of the
    - type: text
      text: ' covenant that you are to keep, so that it will endure between you and me and your descendants: circumcise '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew word for “circumcision” (
      - type: usfm
        marker: it
        children:
        - type: text
          text: muwl
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) means “to cut short,” “curtail,” “to blunt,” “to cut off,” or “to destroy.” With a new name, Abraham was to perform circumcision on the eighth (number of new beginning) day. This external sign of circumcision would set the Israelites apart for God. The New Testament truth of heart-circumcision is the cutting away of our flesh (our rights to ourselves), in dedication to God (see
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Phil. 3:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Col. 2:11–12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'every male among you. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'You must undergo cutting off the flesh of your foreskin as a special sign of the covenant between me and you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Throughout your generations, each male child must be circumcised eight days after his birth. This includes those not of your descendants—those born in your household and foreign-born servants whom you have purchased; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'they must be circumcised, homeborn and purchased alike. In this way, you will carry in your flesh the sign of my everlasting covenant. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Any uncircumcised male who does not have the foreskin of his flesh cut off will be cut off from his people, for he has broken my covenant.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'God also said to Abraham:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Concerning your wife Sarai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you are not to call her Sarai anymore, but Sarah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The names Sarai and Sarah appear to be dialectical variations of the word for “princess” or “queen.” God was emphasizing to Abraham and Sarah that the past, with its season of waiting, was over. Their new names signified a new era, a new fulfillment of promises, and a new destiny calling them forward.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: ‘My Princess,’
    - type: text
      text: ' will be her name.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I will '
    - type: usfm
      marker: it
      children:
      - type: text
        text: wonderfully
    - type: text
      text: ' bless her,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will certainly give you a son through her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yes, I will bless her '
    - type: usfm
      marker: it
      children:
      - type: text
        text: greatly
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and she will become '
    - type: usfm
      marker: it
      children:
      - type: text
        text: a mother of
    - type: text
      text: ' nations;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: kings of nations will arise among her children!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Then Abraham laughed so hard he fell to the ground, saying to himself, “How '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in the world
    - type: text
      text: ' can a hundred-year-old man become a father? How can my wife Sarah get pregnant at ninety?” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And then he spoke out loud: “O, that Ishmael might prosper with your blessing!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “O, that Ishmael might live in your sight!” a metaphoric way of saying that he longed for Ishmael to prosper and live under God’s favor. Ishmael was Abraham’s “plan B,” and Abraham is still hoping that the promises God had given to him could transfer over to Ishmael. God, however, has no “plan B.” He will always accomplish his original, perfect plan.
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'God said, “Listen to me. I promise that you and Sarah will have a son, and you will call him Isaac. '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Isaac
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “he laughs.” It can mean “he [God] laughs” or “he [Abraham] laughs.”
      marker-yv: yv-n
    - type: text
      text: 'I will confirm my everlasting covenant of love with him and his seed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will confirm my covenant between me and you, and I will greatly multiply your descendants.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'And regarding Ishmael, I have heard your cry and I will indeed bless him. I will cause him to have many, many descendants. He will father twelve rulers, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “princes.” See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Gen. 25:12–18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: text
        text: 1 Chron. 1:29–31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'and I will make him into a great nation. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'But my everlasting covenant relationship is with Isaac, who will be born to you and Sarah about this time next year.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'When he had finished speaking with Abraham, God ascended '
    - type: usfm
      marker: it
      children:
      - type: text
        text: up to heaven
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or “God rose from upon” (lit. Hb.) or “God went up from Abraham.” The implication is that God ascended, returning to heaven after coming down to meet with Abraham.
      marker-yv: yv-n
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'So '
    - type: usfm
      marker: it
      children:
      - type: text
        text: without delay
    - type: text
      text: ' Abraham obeyed God and took his son Ishmael and every male in his household (whether born in his house or foreign-born servants) and circumcised them that very same day. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Abraham was already ninety-nine years old when he was circumcised, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'and his son Ishmael was thirteen. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'They were both circumcised on the same day, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: along with all the men of his household (whether born in his house or foreign-born servants).
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then Abram fell on his face '
    - type: usfm
      marker: it
      children:
      - type: text
        text: in awe
    - type: text
      text: ' before God, '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: When man bows in the dust, God will speak in grace. Abram’s posture is a picture of his humility as he ponders this revelation in the presence of God.
      marker-yv: yv-n
    - type: text
      text: 'and God said to him, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“I establish my covenant with you:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You will become a father of many nations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You will no longer be named Abram
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: because I am changing
    - type: text
      text: ' your name to Abraham,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “exalted father”;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: it
        children:
        - type: text
          text: Abraham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: means “father of a multitude.” The church today does not need exalted fathers; we need fathers who will multiply themselves in their sons and daughters. Generational transfer is in the heart of God and was here revealed to Abraham.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for I have made you a father of many nations.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'I will make you abundantly fruitful, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: more than you expect
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make nations out of you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and kings will trace their lineage back to you.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: 17:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: David, Solomon, and Hezekiah, for example, were kings and leaders who came forth from Abraham’s blessed relationship with God. He has likewise made us kings and priests! See
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Rev. 1:6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ;
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 5:10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Yes, I will establish my eternal covenant '
    - type: usfm
      marker: it
      children:
      - type: text
        text: of love
    - type: text
      text: ' between me and you,'
  - type: usfm
    marker: q1
    children:
    - type: text
