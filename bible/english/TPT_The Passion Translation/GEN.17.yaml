document_id: GEN.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Covenant of Circumcision
  - type: text
    content: 'When Abram was ninety-nine years old, '
  - type: note
    content: Thirteen years elapsed between chs. 16 and 17. Abram and Sarai were incapable of conceiving a child. See Rom. 4:19.
  - type: text
    content: Yahweh
  - type: text
    content: ' appeared to him '
  - type: text
    content: again
  - type: text
    content: ' and said, “I am the God who is more than enough. '
  - type: note
    content: Or “I am El Shaddai.” This is the most frequently used name for God prior to the Law being given at Sinai. El is one of the words for God. Shaddai (šadday) is taken from a Hebrew root word that carries multiple expressive meanings. It can mean “God of the Holy Mountain,” “God of the Wilderness,” “God the Destroyer of Enemies,” “God the All-Sufficient One,” “God the Nurturer of Babies [the Breasted One],” “God the Almighty,” “the Sovereign God,” or “the God who is more than enough.” The combination of El (Almighty) with Shaddai describes the tender heart of God, one who cares for his beloved ones. To a man ninety-nine years of age, God All-Sufficient was a revelation that would sustain Abraham.
  - type: text
    content: 'Live your life in my presence '
  - type: note
    content: Or “before me.” Living consciously before God frees us from the false self that lives only before others.
  - type: text
    content: 'and be blameless. '
  - type: note
    content: The Hebrew word tamim can also mean “perfect,” “complete,” “whole,” or “full.” The more-than-enough God is telling Abram to walk continuously in the fullness of God’s presence, which will make him perfect and complete. A new revelation of God’s goodness (The God of more than enough) will always be followed by a new challenge (walk blameless before God). Because he is Almighty, we can live in holiness, following his ways.
  '10':
  - type: text
    content: 'So here is the '
  - type: text
    content: sign of the
  - type: text
    content: ' covenant that you are to keep, so that it will endure between you and me and your descendants: circumcise '
  - type: note
    content: The Hebrew word for “circumcision” (muwl) means “to cut short,” “curtail,” “to blunt,” “to cut off,” or “to destroy.” With a new name, Abraham was to perform circumcision on the eighth (number of new beginning) day. This external sign of circumcision would set the Israelites apart for God. The New Testament truth of heart-circumcision is the cutting away of our flesh (our rights to ourselves), in dedication to God (see Phil. 3:3; Col. 2:11–12).
  - type: text
    content: 'every male among you. '
  '11':
  - type: text
    content: 'You must undergo cutting off the flesh of your foreskin as a special sign of the covenant between me and you. '
  '12':
  - type: text
    content: 'Throughout your generations, each male child must be circumcised eight days after his birth. This includes those not of your descendants—those born in your household and foreign-born servants whom you have purchased; '
  '13':
  - type: text
    content: 'they must be circumcised, homeborn and purchased alike. In this way, you will carry in your flesh the sign of my everlasting covenant. '
  '14':
  - type: text
    content: Any uncircumcised male who does not have the foreskin of his flesh cut off will be cut off from his people, for he has broken my covenant.”
  '15':
  - type: text
    content: 'God also said to Abraham:'
  - type: text
    content: “Concerning your wife Sarai,
  - type: text
    content: you are not to call her Sarai anymore, but Sarah,
  - type: note
    content: The names Sarai and Sarah appear to be dialectical variations of the word for “princess” or “queen.” God was emphasizing to Abraham and Sarah that the past, with its season of waiting, was over. Their new names signified a new era, a new fulfillment of promises, and a new destiny calling them forward.
  - type: text
    content: ‘My Princess,’
  - type: text
    content: ' will be her name.'
  '16':
  - type: text
    content: 'I will '
  - type: text
    content: wonderfully
  - type: text
    content: ' bless her,'
  - type: text
    content: and I will certainly give you a son through her.
  - type: text
    content: 'Yes, I will bless her '
  - type: text
    content: greatly
  - type: text
    content: ','
  - type: text
    content: 'and she will become '
  - type: text
    content: a mother of
  - type: text
    content: ' nations;'
  - type: text
    content: kings of nations will arise among her children!”
  '17':
  - type: text
    content: 'Then Abraham laughed so hard he fell to the ground, saying to himself, “How '
  - type: text
    content: in the world
  - type: text
    content: ' can a hundred-year-old man become a father? How can my wife Sarah get pregnant at ninety?” '
  '18':
  - type: text
    content: 'And then he spoke out loud: “O, that Ishmael might prosper with your blessing!”'
  - type: note
    content: Or “O, that Ishmael might live in your sight!” a metaphoric way of saying that he longed for Ishmael to prosper and live under God’s favor. Ishmael was Abraham’s “plan B,” and Abraham is still hoping that the promises God had given to him could transfer over to Ishmael. God, however, has no “plan B.” He will always accomplish his original, perfect plan.
  '19':
  - type: text
    content: 'God said, “Listen to me. I promise that you and Sarah will have a son, and you will call him Isaac. '
  - type: note
    content: Isaac means “he laughs.” It can mean “he [God] laughs” or “he [Abraham] laughs.”
  - type: text
    content: 'I will confirm my everlasting covenant of love with him and his seed. '
  '2':
  - type: text
    content: I will confirm my covenant between me and you, and I will greatly multiply your descendants.”
  '20':
  - type: text
    content: 'And regarding Ishmael, I have heard your cry and I will indeed bless him. I will cause him to have many, many descendants. He will father twelve rulers, '
  - type: note
    content: Or “princes.” See Gen. 25:12–18; 1 Chron. 1:29–31.
  - type: text
    content: 'and I will make him into a great nation. '
  '21':
  - type: text
    content: 'But my everlasting covenant relationship is with Isaac, who will be born to you and Sarah about this time next year.” '
  '22':
  - type: text
    content: 'When he had finished speaking with Abraham, God ascended '
  - type: text
    content: up to heaven
  - type: text
    content: .
  - type: note
    content: Or “God rose from upon” (lit. Hb.) or “God went up from Abraham.” The implication is that God ascended, returning to heaven after coming down to meet with Abraham.
  '23':
  - type: text
    content: 'So '
  - type: text
    content: without delay
  - type: text
    content: ' Abraham obeyed God and took his son Ishmael and every male in his household (whether born in his house or foreign-born servants) and circumcised them that very same day. '
  '24':
  - type: text
    content: 'Abraham was already ninety-nine years old when he was circumcised, '
  '25':
  - type: text
    content: 'and his son Ishmael was thirteen. '
  '26':
  - type: text
    content: 'They were both circumcised on the same day, '
  '27':
  - type: text
    content: along with all the men of his household (whether born in his house or foreign-born servants).
  '3':
  - type: text
    content: 'Then Abram fell on his face '
  - type: text
    content: in awe
  - type: text
    content: ' before God, '
  - type: note
    content: When man bows in the dust, God will speak in grace. Abram’s posture is a picture of his humility as he ponders this revelation in the presence of God.
  - type: text
    content: 'and God said to him, '
  '4':
  - type: text
    content: '“I establish my covenant with you:'
  - type: text
    content: “You will become a father of many nations.
  '5':
  - type: text
    content: You will no longer be named Abram
  - type: text
    content: because I am changing
  - type: text
    content: ' your name to Abraham,'
  - type: note
    content: Abram means “exalted father”; Abraham means “father of a multitude.” The church today does not need exalted fathers; we need fathers who will multiply themselves in their sons and daughters. Generational transfer is in the heart of God and was here revealed to Abraham.
  - type: text
    content: for I have made you a father of many nations.
  '6':
  - type: text
    content: 'I will make you abundantly fruitful, '
  - type: text
    content: more than you expect
  - type: text
    content: .
  - type: text
    content: I will make nations out of you,
  - type: text
    content: and kings will trace their lineage back to you.
  - type: note
    content: David, Solomon, and Hezekiah, for example, were kings and leaders who came forth from Abraham’s blessed relationship with God. He has likewise made us kings and priests! See Rev. 1:6; 5:10.
  '7':
  - type: text
    content: 'Yes, I will establish my eternal covenant '
  - type: text
    content: of love
  - type: text
    content: ' between me and you,'
  - type: text
    content: and it will extend to your descendants throughout their generations.
  - type: text
    content: 'I will be your children’s '
  - type: note
    content: Or “descendants’.”
  - type: text
    content: God, just as I am your God.
  '8':
  - type: text
    content: I will give to you and your seed
  - type: text
    content: the land to which you have migrated.
  - type: text
    content: The entire land of Canaan will be yours and your descendants’
  - type: note
    content: Or “seed.”
  - type: text
    content: as an everlasting possession.
  - type: text
    content: 'And I will be their God '
  - type: text
    content: forever
  - type: text
    content: '!”'
  '9':
  - type: text
    content: 'God explained to Abraham, “Your part of the covenant is to obey its terms, you and your descendants throughout the ages. '
