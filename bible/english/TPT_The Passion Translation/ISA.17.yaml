document_id: ISA.17,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy about Damascus
  - type: text
    content: 'This is God’s message for Damascus:'
  - type: text
    content: “Behold, Damascus is gone!
  - type: text
    content: It is no longer a city, only a heap of rubble.
  '10':
  - type: text
    content: For you have ignored and forgotten the God who saves you
  - type: text
    content: and have not remembered your Rock of Safety.
  - type: note
    content: See Deut. 32:15.
  - type: text
    content: So what do you do?
  - type: text
    content: You cultivate your beautiful gardens and plant imported vines.
  '11':
  - type: text
    content: Even if on the day you plant them they begin to grow,
  - type: text
    content: and even if immediately you see them bud,
  - type: text
    content: your harvest will wither away in a day of grief and agony.
  - type: heading
    content: The Uproar of the Nations
  '12':
  - type: text
    content: Ah, the thunder of many people joining together!
  - type: note
    content: That is, the armies of Assyria. See Ps. 2:1–3.
  - type: text
    content: They roar like the roar of the sea.
  - type: text
    content: Woe to the uproar of the many nations!
  - type: text
    content: They thunder like the crashing of ocean waves.
  '13':
  - type: text
    content: The nations are roaring like the roar of a massive waterfall,
  - type: text
    content: but when God rebukes them they disperse
  - type: text
    content: like chaff on the mountains,
  - type: text
    content: 'like a '
  - type: text
    content: tumbleweed
  - type: text
    content: ' whirling in the wind.'
  '14':
  - type: text
    content: In the evening—behold, sudden terror!
  - type: text
    content: Before the morning comes, they vanish!
  - type: text
    content: Such is the fate of those who plunder and try to rob us.
  - type: note
    content: See John 10:10.
  '2':
  - type: text
    content: 'Her ruins '
  - type: note
    content: Or “The towns of Aroer.” Aroer means “ruins.”
  - type: text
    content: will be abandoned—
  - type: text
    content: left for flocks to lie down in with nothing to fear.
  '3':
  - type: text
    content: Damascus will lose the power of her fortress,
  - type: text
    content: 'and the strongholds of the northern kingdom '
  - type: note
    content: Or “Ephraim.”
  - type: text
    content: will disappear.
  - type: text
    content: 'The remnant of Syria '
  - type: note
    content: Or “Aram.”
  - type: text
    content: will be like Israel—
  - type: text
    content: stripped of its
  - type: text
    content: ' glory,”'
  - type: text
    content: 'says the Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', Commander of Angel Armies.'
  '4':
  - type: text
    content: '“On that day, the beautiful splendor of Jacob’s '
  - type: text
    content: northern tribes
  - type: text
    content: will be brought low, and they will become like skin and bones.
  '5':
  - type: text
    content: It will be as when a farmer harvests the standing grain
  - type: text
    content: and gathers armloads of grain,
  - type: text
    content: and as one gathers ears of grain in the Valley of Giants.
  - type: note
    content: Or “mighty men” (Hb. rephaim). Jesus’ life within us will soon reap a harvest of glory (see James 3:18). Armloads (sons and daughters of power) of grain (spiritual harvest) will be seen in coming days through mighty men and women.
  '6':
  - type: text
    content: Yet some gleanings will remain,
  - type: text
    content: as when an olive tree is shaken,
  - type: note
    content: Olives were harvested by shaking (Hb. “beating”) the tree. See Heb. 12:26.
  - type: text
    content: leaving two or three olives in the highest branches
  - type: note
    content: The Torah required farmers to leave some fruit behind for the poor and the stranger to glean. See Lev. 19:9–10. “Two or three” are sufficient for any need when they gather in agreement with Jesus. See Matt. 18:19–20. The uppermost branches point us to our heavenly life in the heavenly realm, our glorious resurrection life (see Col. 3:1–5).
  - type: text
    content: and four or five on its fruitful branches,”
  - type: note
    content: Or “on her boughs, the many-branched one.” This points to the fruitful branches of Christ as he branches out through us and brings his fruit to the earth through yielded believers. See John 15:1–8. God appoints some to the “four or five” grace ministries appointed to “nurture and prepare all the holy believers” (see Eph. 4:11–12).
  - type: text
    content: 'declares Lord '
  - type: text
    content: Yahweh
  - type: text
    content: ', the God of Israel.'
  '7':
  - type: text
    content: In that day, people will gaze toward their Creator,
  - type: note
    content: Or “At that time, the Adam will look toward the Creator.” See James 1:22–25.
  - type: text
    content: 'and their eyes will look '
  - type: text
    content: in faith
  - type: text
    content: ' toward the Holy One of Israel.'
  '8':
  - type: text
    content: They will not be infatuated with the religious altars
  - type: text
    content: their own hands crafted,
  - type: text
    content: nor by what their own fingers have made,
  - type: note
    content: See Acts 17:18–34.
  - type: text
    content: 'nor with their sacred groves '
  - type: note
    content: Or “poles” or “goddesses” (Hb. asherim). Asherim (plural) had a specific pagan context with the Canaanite religions stretching back into Israel’s history. See Ex. 34:13–14.
  - type: text
    content: or altars of incense.
  '9':
  - type: text
    content: On that day their bustling cities will become deserted
  - type: text
    content: like those conquered by the Israelites—
  - type: text
    content: abandoned to thickets and undergrowth,
  - type: text
    content: it will all become desolate.
