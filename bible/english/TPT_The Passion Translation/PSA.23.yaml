        text: 23:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “your cup cheers me like the best wine (LXX),” or “my chalice that inebriates me, how goodly it is (Vulgate).”
    marker-yv: yv-n
- type: usfm
  marker: q1
