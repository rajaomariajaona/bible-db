document_id: PSA.23,1849
type_code: eng
verses:
  '1':
  - type: heading
    content: The Good Shepherd
  - type: text
    content: David’s poetic praise to God
  - type: text
    content: Yahweh
  - type: text
    content: ' is my best friend and my shepherd.'
  - type: note
    content: The word most commonly used for “shepherd” is taken from the root word ra‘ah, which is also the Hebrew word for “best friend.” This translation includes both meanings. The unique term for shepherd is ro’eh tzon—“lover of the flock.” This teaches us that a shepherd was not just a responsible overseer, but a caring father figure, tending to his flock out of a deep sense of love. Shepherds were also fierce protectors of their flocks. Jesus is the Fierce Protector of his people.
  - type: text
    content: I always have more than enough.
  - type: note
    content: Or “I lack nothing.” What a wonderful declaration over your life! To never be in lack, always possessing more than enough. Our God meets our emotional, physical, and spiritual needs.
  '2':
  - type: text
    content: He offers a resting place for me in his luxurious love.
  - type: note
    content: Or “in spring [green] meadows.” A good shepherd knows where to pasture his flock. These green meadows would be a resting place, free from all fear. The Greek verb “to love” is agapao, which is a merging of two words and two concepts. Ago means “to lead like a shepherd,” and pao is a verb that means “to rest.” Love is our Shepherd leading us to the place of true rest in his heart.
  - type: text
    content: 'His tracks take me to an oasis of peace near '
  - type: text
    content: the quiet brook of bliss
  - type: text
    content: .
  - type: note
    content: The Hebrew word menuhâ means “the waters of a resting place.” See Isa. 11:10.
  '3':
  - type: text
    content: That’s where he restores and revives my life.
  - type: note
    content: Or “he causes my life [or “soul,” Hb. nephesh] to return.” So often life drains out of us through our many activities, but, as David found, God restores our well-being when we pursue what pleases God and when we rest in him.
  - type: text
    content: He opens before me the right path
  - type: text
    content: and leads me along in his footsteps of righteousness
  - type: note
    content: Or “circular paths of righteousness.” It is a common trait for sheep on the hillsides of Israel to circle their way up higher. They eventually form a path that keeps leading them higher. This is what the psalm is referring to here. Each step we take following our Shepherd will lead us higher, even though it may seem we are going in circles.
  - type: text
    content: so that I can bring honor to his name.
  '4':
  - type: text
    content: Even when your path takes me through
  - type: text
    content: the valley of deepest darkness,
  - type: text
    content: fear will never conquer me, for you already have!
  - type: text
    content: Your authority is my strength and my peace.
  - type: note
    content: Or “Your rod and your staff, they comfort me.”
  - type: text
    content: The comfort of your love takes away my fear.
  - type: text
    content: I’ll never be lonely, for you are near.
  '5':
  - type: text
    content: You become my delicious feast
  - type: text
    content: even when my enemies dare to fight.
  - type: text
    content: You anoint me with the fragrance of your Holy Spirit;
  - type: note
    content: Or “You anoint my head with oil.” “Oil” or “fragrance” becomes a symbol of the Holy Spirit.
  - type: text
    content: you give me all I can drink of you until my cup overflows.
  - type: note
    content: Or “your cup cheers me like the best wine (LXX),” or “my chalice that inebriates me, how goodly it is (Vulgate).”
  '6':
  - type: text
    content: So why would I fear the future?
  - type: text
    content: Only goodness and tender love pursue me all the days of my life.
  - type: text
    content: Then afterward, when my life is through,
  - type: text
    content: 'I’ll return to your glorious presence '
  - type: note
    content: Or “return to Yahweh’s palace.”
  - type: text
    content: to be forever with you!
