      children:
      - type: text
        text: —“lover of the flock.” This teaches us that a shepherd was not just a responsible overseer, but a caring father figure, tending to his flock out of a deep sense of love. Shepherds were also fierce protectors of their flocks. Jesus is the Fierce Protector of his people.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: I always have more than enough.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “I lack nothing.” What a wonderful declaration over your life! To never be in lack, always possessing more than enough. Our God meets our emotional, physical, and spiritual needs.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
