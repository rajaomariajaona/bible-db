      marker: fr
      children:
      - type: text
        text: 23:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “he causes my life [or “soul,” Hb.
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: nephesh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '] to return.” So often life drains out of us through our many activities, but, as David found, God restores our well-being when we pursue what pleases God and when we rest in him.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: He opens before me the right path
- type: usfm
  marker: q1
  children:
  - type: text
    text: and leads me along in his footsteps of righteousness
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “circular paths of righteousness.” It is a common trait for sheep on the hillsides of Israel to circle their way up higher. They eventually form a path that keeps leading them higher. This is what the psalm is referring to here. Each step we take following our Shepherd will lead us higher, even though it may seem we are going in circles.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that I can bring honor to his name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Even when your path takes me through
- type: usfm
  marker: q1
  children:
  - type: text
    text: the valley of deepest darkness,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fear will never conquer me, for you already have!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your authority is my strength and my peace.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “Your rod and your staff, they comfort me.”
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The comfort of your love takes away my fear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I’ll never be lonely, for you are near.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You become my delicious feast
- type: usfm
  marker: q1
  children:
  - type: text
    text: even when my enemies dare to fight.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You anoint me with the fragrance of your Holy Spirit;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: 23:5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or “You anoint my head with oil.” “Oil” or “fragrance” becomes a symbol of the Holy Spirit.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
