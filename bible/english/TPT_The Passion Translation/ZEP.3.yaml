  - type: text
    content: Yes, he will soothe you with his love.
  - type: note
    content: Or “quiet you with his love” or “seal [engrave] you with his love.” To rest in God’s love is a silent ecstasy. God’s love both renews and soothes the troubled soul.
  - type: text
    content: He will sing over you his song of praise.
  - type: note
    content: The word for “song” is ranan, which is a song of praise. See 1 Cor. 4:5.
  '18':
  - type: text
    content: “I will remove the sadness over your appointed feasts,
  - type: text
    content: and you will not be ashamed about them again.
  - type: note
    content: Or “I will gather together those who mourn for the appointed feasts—those people belong to you, so you will no longer suffer reproach.” The Hebrew verb ʾasap or ʾasaph can mean either “to gather” or “to remove,” depending on the context. The precise meaning of the Hebrew of this sentence is uncertain.
