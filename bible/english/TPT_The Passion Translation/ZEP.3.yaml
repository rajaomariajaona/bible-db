  '1':
  - type: heading
    content: Jerusalem Will Be Punished
  - type: text
    content: 'Doomed is the filthy '
  - type: note
    content: 'Or “rebellious.” The Hebrew word morʾah is taken from the root word for “excrement.” Zephaniah was saying that the city is full of rebellion and filth. There are three Hebrew terms that qualify her spiritual and moral corruption in this opening verse: morʾah, nigʾalah, and hayyonah—participial adjectives. The first of these derives from the verb maraʾ or marah, which means “rebellious.” The second derives from the verb gaʾal, with the sense of “polluted” or “defiled”—and it is this latter meaning that is particularly appropriate for Jerusalem since it accurately describes the extent of both her ceremonial and moral impurity. And the third participle derives from the verb yanah, meaning “oppressive.”'
  - type: text
    content: and foul city—
  - type: text
    content: the city of oppression!
