  '2':
  - type: text
    content: 'Her people do not listen to the voice '
  - type: text
    content: of God
  - type: text
    content: and will not accept correction.
  - type: note
    content: See Jer. 7:28.
  - type: text
    content: 'They do not trust in '
  - type: text
    content: Yahweh
  - type: text
    content: ' anymore'
  - type: text
    content: and do not want a close relationship with their God.
  - type: note
    content: This is perhaps the whole issue of the golden calf, that which stood in the way of intimacy between God and Israel. Intimacy requires acknowledgment of the total “otherness” of God and our inability to fathom him and his grace toward the depths of our beings, which we will never fully understand. This grace relationship with God allows us to go forth and love others with the same graciousness.
