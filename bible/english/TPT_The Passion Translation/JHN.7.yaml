  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'They argued, “Oh, so now you’re an advocate for this Galilean! Search the Scriptures, Nicodemus, and you’ll see that there’s no mention of a prophet coming out of Galilee!” '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
