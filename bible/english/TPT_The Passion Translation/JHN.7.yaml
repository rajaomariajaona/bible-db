      marker: wj
      children:
      - type: usfm
        marker: it
        children:
        - type: text
          text: to gain man’s approval.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The world can’t hate you, but it does me, for I am exposing their evil deeds.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You can go ahead and celebrate the feast without me—my appointed time has not yet come.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: 9-10
    - type: text
      text: 'Jesus lingered in Galilee until his brothers had left for the feast in Jerusalem. Then later, Jesus took a back road and went into Jerusalem in secret. '
